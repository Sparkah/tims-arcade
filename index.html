<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tim's Game Lab</title>
  <link rel="stylesheet" href="/style.css">
  <meta name="description" content="A wild testground of HTML5 games. Play, like, dislike. New games most days.">
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <h1>Tim's Game Lab</h1>
      <p class="tagline">A daily testground of small browser games. Play, like, dislike — feedback shapes what gets built next.</p>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="top">⭐ Top Rated</button>
    <button class="tab" data-tab="recent">🆕 Recent</button>
    <button class="tab" data-tab="liked">💛 Liked by Me</button>
    <button class="tab" data-tab="all">🎮 All</button>
    <input class="search" id="search" type="search" placeholder="Search…">
  </nav>

  <main id="grid" class="grid"></main>

  <div id="empty" class="empty hidden"></div>

  <footer>
    <nav class="footer-links" aria-label="Subscribe and source">
      <a href="https://t.me/timsgamelab" target="_blank" rel="noopener" title="New game every morning on Telegram">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M12 0a12 12 0 100 24 12 12 0 000-24zm5.6 8.2l-1.9 8.8c-.1.6-.5.8-1 .5l-2.8-2-1.4 1.3c-.2.2-.3.3-.6.3l.2-2.8 5.2-4.7c.2-.2 0-.3-.3-.1L8.6 12.6 6 11.8c-.6-.2-.6-.6.1-.9l10.7-4.1c.5-.2.9.1.8.6z"/></svg>
        Telegram
      </a>
      <a href="/rss.xml" target="_blank" rel="noopener" title="RSS feed of new games">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M6.18 15.64a2.18 2.18 0 012.18 2.18C8.36 19 7.38 20 6.18 20A2.18 2.18 0 014 17.82a2.18 2.18 0 012.18-2.18M4 4.44A15.56 15.56 0 0119.56 20h-2.83A12.73 12.73 0 004 7.27V4.44m0 5.66a9.9 9.9 0 019.9 9.9h-2.83A7.07 7.07 0 004 12.93V10.1z"/></svg>
        RSS
      </a>
      <a href="https://github.com/Sparkah/tims-arcade" target="_blank" rel="noopener" title="Source on GitHub">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M12 .3a12 12 0 00-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1-.7.1-.7.1-.7 1.2 0 1.9 1.2 1.9 1.2 1 1.8 2.8 1.3 3.5 1 0-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.2.5-2.3 1.3-3.1-.1-.4-.6-1.6.1-3.2 0 0 1-.3 3.4 1.2a11.5 11.5 0 016 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.6.2 2.8.1 3.2.8.8 1.3 1.9 1.3 3.1 0 4.6-2.8 5.6-5.5 5.9.5.4.9 1.2.9 2.4v3.5c0 .3.2.7.8.6A12 12 0 0012 .3"/></svg>
        Source
      </a>
    </nav>
    <p class="byline"><a href="https://github.com/Sparkah" target="_blank" rel="noopener">Mr Tim's works</a></p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
