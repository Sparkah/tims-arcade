  <meta name="twitter:title" content="Tim's Game Lab">

  <meta name="theme-color" content="#0e0e12">
  <link rel="alternate" type="application/rss+xml" title="Tim's Game Lab — new games" href="/rss.xml">

  <link rel="preload" href="/fonts/Fraunces-700.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/IBMPlexSans-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/JetBrainsMono-Regular.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Theme is loaded from localStorage BEFORE the stylesheet so we don't
       paint a flash of the wrong theme. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('gallery-theme');
        if (t === 'lab' || t === 'brutalist' || t === 'editorial') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Sign-in pill — left of theme switcher, top-right area -->
  <div class="auth-pill" id="auth-pill" style="position:fixed;top:16px;right:240px;z-index:99;font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase">
    <a href="/login" id="auth-link" style="display:none;background:var(--bg-card);border:1px solid var(--rule);border-radius:999px;padding:5px 12px;color:var(--ink-soft);text-decoration:none;transition:all 0.15s">Sign in</a>
    <span id="auth-user" style="display:none;background:var(--bg-card);border:1px solid var(--rule);border-radius:999px;padding:5px 12px;color:var(--ink)"><span id="auth-user-letter"></span> <a href="/api/auth/logout" title="Sign out" style="color:var(--ink-muted);text-decoration:none;margin-left:6px;border-left:1px solid var(--rule);padding-left:8px">×</a></span>
  </div>

  <!-- Theme switcher — fixed top-right, three options -->
  <nav class="theme-switch" id="theme-switch" aria-label="Theme switcher">
    <button data-theme-btn="lab"        class="active">Lab</button>
    <button data-theme-btn="brutalist">Raw</button>
    <button data-theme-btn="editorial">Print</button>
  </nav>

  <header class="hero" id="hero" data-build="" data-date="">
    <div class="hero-inner">
      <h1>Tim's <em>Game</em> Lab</h1>
      <p class="tagline">3 new game mechanics built daily. The most liked, commented and played gets an extra feature the next day. Play and see your favourite game evolving.</p>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="top">Top</button>
    <button class="tab" data-tab="recent">Recent</button>
    <button class="tab" data-tab="liked">Liked</button>
    <button class="tab" data-tab="all">All</button>
    <input class="search" id="search" type="search" placeholder="Search…">
  </nav>

  <nav class="genres" id="genres" aria-label="Genre filter"></nav>

  <section id="featured" class="featured hidden" aria-label="Featured game"></section>

  <main id="grid" class="grid"></main>

  <div id="empty" class="empty hidden"></div>

  <footer>
    <nav class="footer-links" aria-label="Subscribe and source">
      <a href="https://t.me/timsgamelab" target="_blank" rel="noopener" title="New game every morning on Telegram">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M12 0a12 12 0 100 24 12 12 0 000-24zm5.6 8.2l-1.9 8.8c-.1.6-.5.8-1 .5l-2.8-2-1.4 1.3c-.2.2-.3.3-.6.3l.2-2.8 5.2-4.7c.2-.2 0-.3-.3-.1L8.6 12.6 6 11.8c-.6-.2-.6-.6.1-.9l10.7-4.1c.5-.2.9.1.8.6z"/></svg>
        Telegram
      </a>
      <a href="/rss.xml" target="_blank" rel="noopener" title="RSS feed">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M6.18 15.64a2.18 2.18 0 012.18 2.18C8.36 19 7.38 20 6.18 20A2.18 2.18 0 014 17.82a2.18 2.18 0 012.18-2.18M4 4.44A15.56 15.56 0 0119.56 20h-2.83A12.73 12.73 0 004 7.27V4.44m0 5.66a9.9 9.9 0 019.9 9.9h-2.83A7.07 7.07 0 004 12.93V10.1z"/></svg>

      <a href="https://github.com/Sparkah/tims-arcade" target="_blank" rel="noopener" title="Source on GitHub">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M12 .3a12 12 0 00-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1-.7.1-.7.1-.7 1.2 0 1.9 1.2 1.9 1.2 1 1.8 2.8 1.3 3.5 1 0-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.2.5-2.3 1.3-3.1-.1-.4-.6-1.6.1-3.2 0 0 1-.3 3.4 1.2a11.5 11.5 0 016 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.6.2 2.8.1 3.2.8.8 1.3 1.9 1.3 3.1 0 4.6-2.8 5.6-5.5 5.9.5.4.9 1.2.9 2.4v3.5c0 .3.2.7.8.6A12 12 0 0012 .3"/></svg>

    <p class="byline">Maintained by <a href="https://github.com/Sparkah" target="_blank" rel="noopener">Mr Tim</a> · built daily by an AI factory</p>
  </footer>

  <script src="/identity.js"></script>
  <script src="/app.js"></script>
  <script>
    // Theme switcher wiring
    (function () {
      const html = document.documentElement;
      const switchEl = document.getElementById('theme-switch');
      function setTheme(t) {
        html.setAttribute('data-theme', t);
        try { localStorage.setItem('gallery-theme', t); } catch (e) {}
        switchEl.querySelectorAll('button').forEach(b =>
          b.classList.toggle('active', b.dataset.themeBtn === t));
      }
      switchEl.addEventListener('click', e => {
        const btn = e.target.closest('button[data-theme-btn]');
        if (btn) setTheme(btn.dataset.themeBtn);
      });
      // Sync the active class on first paint based on whatever the inline
      // pre-script set on <html>.
      const current = html.getAttribute('data-theme') || 'lab';
      switchEl.querySelectorAll('button').forEach(b =>
        b.classList.toggle('active', b.dataset.themeBtn === current));
    })();
  </script>
</body>
</html>
