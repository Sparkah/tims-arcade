<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Play — Tim's Game Lab</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0a0a14">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; color: #e7e7ee; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; }
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: rgba(10,10,20,0.95);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 10;
    }
    .topbar .back, .topbar .vote {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #b0b0c0;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s ease;
    }
    .topbar .back:hover, .topbar .vote:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .topbar .vote.active.like   { background: rgba(46,204,113,0.18); border-color: #2ecc71; color: #2ecc71; }
    .topbar .vote.active.dislike{ background: rgba(231,76,60,0.18); border-color: #e74c3c; color: #e74c3c; }
    .topbar .title { font-weight: 700; font-size: 14px; flex: 1; text-align: center; color: #f7f7fa; }
    .frame-wrap {
      position: fixed;
      top: 44px; left: 0; right: 0; bottom: 0;
    }
    iframe {
      width: 100%; height: 100%;
      border: none;
      background: #0a0a14;
    }
    .err {
      max-width: 480px; margin: 80px auto; padding: 0 20px; text-align: center; color: #8a8aa0;
    }

    /* More-games rail — slides up from bottom edge after a delay */
    .more-rail {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: linear-gradient(180deg, transparent, rgba(10,10,20,0.95) 30%);
      padding: 40px 16px 14px;
      z-index: 9;
      transform: translateY(100%);
      transition: transform 0.35s ease-out;
      pointer-events: none;
    }
    .more-rail.visible { transform: translateY(0); pointer-events: auto; }
    .more-rail .row {
      display: flex; gap: 10px; justify-content: center; align-items: stretch;
      max-width: 920px; margin: 0 auto;
    }
    .more-rail .label {
      text-align: center;
      color: #8a8aa0;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .more-rail a.tile {
      flex: 1 1 0;
      min-width: 0;
      max-width: 280px;
      background: rgba(20,20,42,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
      text-decoration: none;
      color: #e7e7ee;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .more-rail a.tile:hover {
      transform: translateY(-3px);
      border-color: rgba(77,208,225,0.45);
      text-decoration: none;
    }
    .more-rail .thumb {
      aspect-ratio: 16 / 9;
      background: #1a1d3a center/cover no-repeat;
    }
    .more-rail .meta {
      padding: 8px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .more-rail .name { font-size: 13px; font-weight: 700; color: #f7f7fa; }
    .more-rail .hook { font-size: 11px; color: #8a8aa0; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .more-rail .close {
      position: absolute;
      top: 6px; right: 10px;
      background: rgba(255,255,255,0.06);
      border: none;
      color: #8a8aa0;
      width: 24px; height: 24px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }
    .more-rail .close:hover { color: #fff; }
    @media (max-width: 600px) {
      .more-rail { padding: 24px 8px 10px; }
      .more-rail .row { gap: 6px; }
      .more-rail .name { font-size: 12px; }
      .more-rail .hook { display: none; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="/">← Back</a>
    <div class="title" id="title"></div>
    <button class="vote" id="share" aria-label="Share">↗ Share</button>
    <button class="vote like"    id="like"    aria-label="Like">👍 <span id="like-num">0</span></button>
    <button class="vote dislike" id="dislike" aria-label="Dislike">👎 <span id="dislike-num">0</span></button>
  </div>
  <div class="frame-wrap" id="frame-wrap"></div>

  <div class="more-rail" id="more-rail" aria-label="More games">
    <button class="close" id="more-close" aria-label="Hide">×</button>
    <div class="label">More games</div>
    <div class="row" id="more-row"></div>
  </div>

  <script src="/identity.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const slug = (params.get('slug') || '').replace(/[^a-z0-9_-]/gi, '');

    const myVotesRaw = localStorage.getItem('myVotes') || '{}';
    let myVotes = {};
    try { myVotes = JSON.parse(myVotesRaw); } catch (e) {}

    let games = [];
    async function init() {
      if (!slug) { showError('No game specified.'); return; }
      games = await (await fetch('/games.json', { cache: 'no-store' })).json();
      const game = games.find(g => g.slug === slug);
      if (!game) { showError('Game not found.'); return; }

      document.getElementById('title').textContent = game.title;

      const wrap = document.getElementById('frame-wrap');
      const iframe = document.createElement('iframe');
      iframe.src = `/games/${slug}/index.html`;
      iframe.allow = 'autoplay; fullscreen; gamepad';
      wrap.appendChild(iframe);

      // Fire-and-forget play counter ping (one per page load)
      fetch('/api/play', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ slug }),
      }).catch(() => {});

      // Heartbeat — track actual visible play time at 5-second granularity,
      // flush to server every 2 minutes (or on pagehide via sendBeacon).
      //
      // Why this shape: hitting the server every 5s would burn KV writes; a
      // pure 2-min poll loses any session shorter than 2 min. So we tick
      // locally and flush the *actual delta* instead of a fixed 120s.
      const TICK_MS  = 5 * 1000;
      const FLUSH_MS = 120 * 1000;
      let pending = 0;
      let tickTimer = null;
      let flushTimer = null;

      function startTicks() {
        if (!tickTimer) tickTimer = setInterval(() => { pending += TICK_MS / 1000; }, TICK_MS);
        if (!flushTimer) flushTimer = setInterval(() => flush(false), FLUSH_MS);
      }
      function stopTicks() {
        if (tickTimer)  { clearInterval(tickTimer);  tickTimer  = null; }
        if (flushTimer) { clearInterval(flushTimer); flushTimer = null; }
      }
      function flush(useBeacon) {
        if (pending <= 0) return;
        const seconds = Math.round(pending);
        pending = 0;
        const body = JSON.stringify({ slug, seconds });
        if (useBeacon && navigator.sendBeacon) {
          navigator.sendBeacon('/api/heartbeat', new Blob([body], { type: 'application/json' }));
        } else {
          fetch('/api/heartbeat', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body,
            keepalive: true,
          }).catch(() => {});
        }
      }

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') startTicks();
        else { stopTicks(); flush(false); }
      });
      window.addEventListener('pagehide', () => { stopTicks(); flush(true); });

      if (document.visibilityState === 'visible') startTicks();

      // ── More-games rail ─────────────────────────────────────────────────
      // Slide up after 30s of visible play. Lets players who've engaged see
      // alternatives without nagging fast-bouncers.
      (function buildRail() {
        const candidates = games.filter(g => g.slug !== slug && g.published !== false);
        if (candidates.length === 0) return;
        for (let i = candidates.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
        }
        const picks = candidates.slice(0, 3);
        const row = document.getElementById('more-row');
        row.innerHTML = picks.map(g => `
          <a class="tile" href="/play.html?slug=${encodeURIComponent(g.slug)}">
            <div class="thumb" style="background-image: url('/thumbs/${g.slug}.png')"></div>
            <div class="meta"><div class="name"></div><div class="hook"></div></div>
          </a>
        `).join('');
        Array.from(row.querySelectorAll('.tile')).forEach((el, i) => {
          el.querySelector('.name').textContent = picks[i].title;
          el.querySelector('.hook').textContent = picks[i].hook || '';
        });
      })();

      // The "More games" rail must NEVER pop mid-game — it would yank focus
      // off the canvas while the player is still in a round. We surface it
      // only after the game actively signals end-of-round via postMessage
      // (see GF.gameEnded() in gf-lib.js), and only ONCE per page load.
      const rail = document.getElementById('more-rail');
      let railShown = false;
      function showRail() {
        if (railShown) return;
        rail.classList.add('visible');
        railShown = true;
      }
      window.addEventListener('message', (e) => {
        const data = e && e.data;
        if (data && data.type === 'gf:gameEnded') showRail();
      });
      document.getElementById('more-close').addEventListener('click', () => {
        rail.classList.remove('visible');
      });

      // load current vote counts
      let counts = { likes: 0, dislikes: 0 };
      try {
        const r = await fetch('/api/counts', { cache: 'no-store' });
        if (r.ok) {
          const all = await r.json();
          counts = all[slug] || counts;
        }
      } catch (e) {}
      paintCounts(counts);

      document.getElementById('like').addEventListener('click', () => onVote('like'));
      document.getElementById('dislike').addEventListener('click', () => onVote('dislike'));

      // Share button — Web Share API on mobile (and recent desktop), clipboard
      // copy fallback elsewhere. Always shares the /p/<slug> URL so the link
      // unfurls with the OG card on Twitter/Telegram/Slack/etc.
      const shareUrl = `${location.origin}/p/${encodeURIComponent(slug)}`;
      const shareBtn = document.getElementById('share');
      shareBtn.addEventListener('click', async () => {
        const data = { title: game.title, text: game.hook || `Play ${game.title}`, url: shareUrl };
        try {
          if (navigator.share) {
            await navigator.share(data);
          } else {
            await navigator.clipboard.writeText(shareUrl);
            shareBtn.innerHTML = '✓ Copied';
            setTimeout(() => { shareBtn.innerHTML = '↗ Share'; }, 1600);
          }
        } catch (e) { /* user cancelled */ }
      });

      function onVote(action) {
        const prev = myVotes[slug] || null;
        const next = prev === action ? null : action;
        let dl = 0, dd = 0;
        if (prev === 'like')    dl -= 1;
        if (prev === 'dislike') dd -= 1;
        if (next === 'like')    dl += 1;
        if (next === 'dislike') dd += 1;

        if (next) myVotes[slug] = next; else delete myVotes[slug];
        localStorage.setItem('myVotes', JSON.stringify(myVotes));
        counts.likes    = Math.max(0, counts.likes + dl);
        counts.dislikes = Math.max(0, counts.dislikes + dd);
        paintCounts(counts);

        fetch('/api/vote', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ slug, deltaLike: dl, deltaDislike: dd }),
        }).then(r => r.ok ? r.json() : null).then(updated => {
          if (updated) { counts = updated; paintCounts(counts); }
        }).catch(() => {});
      }

      function paintCounts(c) {
        document.getElementById('like-num').textContent    = c.likes || 0;
        document.getElementById('dislike-num').textContent = c.dislikes || 0;
        document.getElementById('like').classList.toggle('active',    myVotes[slug] === 'like');
        document.getElementById('dislike').classList.toggle('active', myVotes[slug] === 'dislike');
      }
    }

    function showError(msg) {
      document.getElementById('frame-wrap').innerHTML =
        `<div class="err"><h2>${msg}</h2><p><a href="/" style="color:#4dd0e1">← back to gallery</a></p></div>`;
    }

    init();
  </script>
</body>
</html>
