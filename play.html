<!DOCTYPE html>
<html lang="en" data-theme="lab">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Play — Tim's Game Lab</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0e0e12">

  <!-- Pre-paint theme detection — must run BEFORE the stylesheet so we
       paint the right theme on first frame, not flash dark→light. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('gallery-theme');
        if (t === 'lab' || t === 'brutalist' || t === 'editorial') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="/style.css">
  <style>
    /* Play-page-specific chrome built on top of the theme variables. The
       gallery's style.css defines --bg / --ink / --rule / --accent / --font-*
       per data-theme, and this file just composes them into the topbar +
       more-rail + rate-overlay layout. */
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--ink); font-family: var(--font-body); }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 44px;
      background: var(--bg-card);
      display: flex; align-items: center; gap: 10px;
      padding: 0 12px;
      border-bottom: 1px solid var(--rule);
      z-index: 10;
    }
    .topbar .back, .topbar .vote {
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink-soft);
      border-radius: var(--radius);
      padding: 5px 11px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
      transition: all 0.15s ease;
    }
    .topbar .back:hover, .topbar .vote:hover { border-color: var(--ink); color: var(--ink); }
    .topbar .vote.active.like    { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
    .topbar .vote.active.dislike { background: rgba(200,69,31,0.10); border-color: var(--warn); color: var(--warn); }
    .topbar .title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      flex: 1;
      text-align: center;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    /* Editorial wants italic title here */
    html[data-theme="editorial"] .topbar .title { font-style: italic; }
    /* Brutalist title is uppercase + heavier */
    html[data-theme="brutalist"] .topbar .title { font-family: var(--font-display); font-weight: 700; text-transform: uppercase; font-size: 14px; letter-spacing: 0; }
    /* Brutalist topbar — hard borders, no rounded buttons */
    html[data-theme="brutalist"] .topbar { border-bottom-width: 2px; }
    html[data-theme="brutalist"] .topbar .back,
    html[data-theme="brutalist"] .topbar .vote { border-width: 2px; border-radius: 0; font-weight: 700; }
    html[data-theme="brutalist"] .topbar .vote.active.like    { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    html[data-theme="brutalist"] .topbar .vote.active.dislike { background: var(--warn); color: var(--ink); border-color: var(--warn); }

    .frame-wrap { position: fixed; top: 44px; left: 0; right: 0; bottom: 0; }
    iframe { width: 100%; height: 100%; border: none; background: var(--bg); }

    /* Comments panel — slides down from under the topbar when 💬 is clicked.
       Reads /api/comments?slug=… and renders anonymous player notes. */
    .comments-panel {
      position: fixed; top: 44px; right: 0;
      width: min(420px, 92vw);
      max-height: calc(100vh - 60px);
      background: var(--bg-card);
      border-left: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      box-shadow: -8px 16px 40px -16px rgba(14,14,18,0.25);
      z-index: 8;
      transform: translateX(100%);
      transition: transform 0.28s ease-out;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .comments-panel.visible { transform: translateX(0); }
    .comments-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--rule);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: var(--tracking-cap);
    }
    .comments-count { flex: 1; }
    .comments-close {
      background: transparent; border: 1px solid var(--rule); color: var(--ink-soft);
      width: 26px; height: 26px;
      border-radius: 50%; cursor: pointer; padding: 0;
      font-size: 14px; line-height: 1;
    }
    .comments-close:hover { color: var(--ink); border-color: var(--ink); }
    .comments-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .comment {
      padding: 10px 16px;
      border-bottom: 1px solid var(--rule-soft, rgba(14,14,18,0.05));
      display: flex; gap: 10px;
    }
    .comment:last-child { border-bottom: none; }
    .comment-vote {
      flex: 0 0 auto;
      width: 22px; height: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px;
      filter: grayscale(0.2);
    }
    .comment-body {
      flex: 1;
      font-size: 13px;
      line-height: 1.45;
      color: var(--ink);
    }
    .comment-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
      margin-top: 3px;
    }
    .comments-empty {
      padding: 30px 18px;
      text-align: center;
      color: var(--ink-muted);
      font-size: 13px;
      font-style: italic;
      line-height: 1.5;
    }
    @media (max-width: 600px) {
      .comments-panel { width: 100vw; left: 0; right: auto; border-left: none; }
    }
    .err { max-width: 480px; margin: 80px auto; padding: 0 20px; text-align: center; color: var(--ink-muted); font-family: var(--font-body); }

    /* More-games rail — slides up from bottom edge */
    .more-rail {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: linear-gradient(180deg, transparent 0%, var(--bg-card) 30%);
      padding: 44px 16px 14px;
      z-index: 9;
      transform: translateY(100%);
      transition: transform 0.32s ease-out;
      pointer-events: none;
      border-top: 1px solid var(--rule);
    }
    .more-rail.visible { transform: translateY(0); pointer-events: auto; }
    .more-rail .row {
      display: flex; gap: 10px; justify-content: center; align-items: stretch;
      max-width: 920px; margin: 0 auto;
    }
    .more-rail .label {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 10px;
    }
    .more-rail a.tile {
      flex: 1 1 0;
      min-width: 0;
      max-width: 280px;
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      overflow: hidden;
      text-decoration: none;
      color: var(--ink);
      display: flex; flex-direction: column;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .more-rail a.tile:hover { transform: translateY(-2px); border-color: var(--ink); text-decoration: none; }
    html[data-theme="brutalist"] .more-rail a.tile { border-width: 2px; }
    html[data-theme="brutalist"] .more-rail a.tile:hover { transform: none; background: var(--rule); }
    .more-rail .thumb { aspect-ratio: 16 / 9; background: var(--rule-soft) center/cover no-repeat; }
    .more-rail .meta { padding: 8px 10px 10px; display: flex; flex-direction: column; gap: 2px; }
    .more-rail .name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    html[data-theme="editorial"] .more-rail .name { font-style: italic; }
    html[data-theme="brutalist"] .more-rail .name { text-transform: uppercase; font-family: var(--font-display); }
    .more-rail .hook {
      font-family: var(--font-body);
      font-size: 11px;
      color: var(--ink-muted);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .more-rail .close {
      position: absolute;
      top: 28px;
      right: max(12px, calc((100% - 920px) / 2));
      background: var(--bg-card);
      border: 1px solid var(--rule);
      color: var(--ink);
      width: 28px; height: 28px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      z-index: 11;
      transition: all 0.15s ease;
    }
    .more-rail .close:hover { background: var(--ink); color: var(--bg-card); transform: scale(1.05); }
    html[data-theme="brutalist"] .more-rail .close { border-radius: 0; border-width: 2px; }

    @media (max-width: 600px) {
      .more-rail { padding: 30px 8px 10px; }
      .more-rail .row { gap: 6px; }
      .more-rail .hook { display: none; }
      .more-rail .close { top: 8px; right: 8px; width: 26px; height: 26px; font-size: 14px; }
    }

    /* Theme switcher hidden 2026-05-07 (Lab is the only public-facing theme).
       Kept selectors below — switch via localStorage for screenshots. */
    .theme-switch { display: none !important; }

    .theme-switch.__legacy {
      position: fixed; top: 52px; right: 12px;
      z-index: 100;
      display: flex; gap: 0;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: 999px;
      padding: 2px;
      opacity: 0.8;
    }
    .theme-switch:hover { opacity: 1; }
    @media (max-width: 600px) { .theme-switch { display: none; } }
    .theme-switch button {
      padding: 4px 9px;
      border-radius: 999px;
      color: var(--ink-muted);
      font-weight: 500;
      transition: color 0.15s, background 0.15s;
      border: none;
      background: none;
      cursor: pointer;
    }
    .theme-switch button.active { background: var(--ink); color: var(--bg-card); }
    html[data-theme="brutalist"] .theme-switch { border-radius: 0; border-width: 2px; padding: 0; }
    html[data-theme="brutalist"] .theme-switch button { border-radius: 0; border-right: 2px solid var(--ink); }
    html[data-theme="brutalist"] .theme-switch button:last-child { border-right: none; }
    html[data-theme="brutalist"] .theme-switch button.active { background: var(--accent); color: var(--bg); }
  </style>
</head>
<body>
  <nav class="theme-switch" id="theme-switch" aria-label="Theme switcher">
    <button data-theme-btn="lab"        class="active">Lab</button>
    <button data-theme-btn="brutalist">Raw</button>
    <button data-theme-btn="editorial">Print</button>
  </nav>

  <div class="topbar">
    <a class="back" href="/">← Back</a>
    <div class="title" id="title"></div>
    <button class="vote" id="comments-btn" aria-label="Comments" aria-expanded="false">💬 <span id="comments-num">0</span></button>
    <button class="vote" id="share" aria-label="Share">↗ Share</button>
    <button class="vote like"    id="like"    aria-label="Like">👍 <span id="like-num">0</span></button>
    <button class="vote dislike" id="dislike" aria-label="Dislike">👎 <span id="dislike-num">0</span></button>
  </div>
  <div class="frame-wrap" id="frame-wrap"></div>

  <!-- Comments panel — slides down from under the topbar when 💬 is clicked.
       Reads from /api/comments?slug=…, shows the latest 10 anonymous notes
       players left via the rate-on-leave overlay. -->
  <aside class="comments-panel" id="comments-panel" aria-hidden="true">
    <div class="comments-header">
      <span class="comments-count" id="comments-count-label">No comments yet — be first via 👍/👎 + note when you leave.</span>
      <button class="comments-close" id="comments-close" aria-label="Close">×</button>
    </div>
    <div class="comments-list" id="comments-list"></div>
  </aside>

  <div class="more-rail" id="more-rail" aria-label="More games">
    <button class="close" id="more-close" aria-label="Hide">×</button>
    <div class="label">More games</div>
    <div class="row" id="more-row"></div>
  </div>

  <!-- Rate-on-leave overlay — appears after 20s of play when leaving via
       back nav or "play another". Captures 👍/👎 + optional one-line comment. -->
  <div id="rate-overlay" class="rate-overlay">
    <div class="rate-card">
      <div class="rate-title">Quick rate?</div>
      <div class="rate-sub">10 seconds — feedback shapes what gets built next.</div>
      <div class="rate-row">
        <button id="rate-up"   class="rate-thumb up"  >👍</button>
        <button id="rate-down" class="rate-thumb down">👎</button>
      </div>
      <textarea id="rate-comment" placeholder="One thing that worked / didn't work? (optional)" rows="2"></textarea>
      <div class="rate-actions">
        <button id="rate-skip" class="rate-skip">Skip</button>
        <button id="rate-send" class="rate-send">Send</button>
      </div>
    </div>
  </div>

  <style>
    /* Rate-on-leave styles use the theme tokens */
    .rate-overlay {
      display: none;
      position: fixed; inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.66);
      backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .rate-card {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      padding: 22px 22px 18px;
      max-width: 360px; width: 100%;
      color: var(--ink);
      font-family: var(--font-body);
    }
    html[data-theme="brutalist"] .rate-card { border-width: 2px; border-radius: 0; box-shadow: 8px 8px 0 var(--accent); }
    .rate-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 19px;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 6px;
    }
    html[data-theme="editorial"] .rate-title { font-style: italic; }
    html[data-theme="brutalist"] .rate-title { text-transform: uppercase; }
    .rate-sub {
      font-size: 13px;
      color: var(--ink-muted);
      margin-bottom: 14px;
      font-family: var(--font-body);
    }
    html[data-theme="editorial"] .rate-sub { font-style: italic; font-family: var(--font-display); font-size: 15px; }
    .rate-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .rate-thumb {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--rule);
      background: var(--bg);
      color: var(--ink);
      border-radius: var(--radius);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    html[data-theme="brutalist"] .rate-thumb { border-width: 2px; border-radius: 0; }
    .rate-thumb:hover { background: var(--rule-soft); }
    .rate-thumb.up:hover    { border-color: var(--accent); color: var(--accent); }
    .rate-thumb.down:hover  { border-color: var(--warn); color: var(--warn); }
    #rate-comment {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--rule);
      color: var(--ink);
      border-radius: var(--radius);
      padding: 10px;
      font-size: 13px;
      font-family: var(--font-body);
      resize: none;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    #rate-comment:focus { border-color: var(--accent); }
    html[data-theme="brutalist"] #rate-comment { border-width: 2px; border-radius: 0; }
    .rate-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .rate-skip {
      padding: 8px 14px;
      background: transparent;
      border: none;
      color: var(--ink-muted);
      font-size: 13px;
      cursor: pointer;
      font-family: var(--font-body);
    }
    .rate-skip:hover { color: var(--ink); }
    .rate-send {
      padding: 8px 16px;
      background: var(--ink);
      color: var(--bg-card);
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }
    .rate-send:hover { background: var(--accent); }
    html[data-theme="brutalist"] .rate-send { background: var(--accent); color: var(--bg); border-radius: 0; font-weight: 700; }
    html[data-theme="brutalist"] .rate-send:hover { background: var(--ink); color: var(--accent); }
    html[data-theme="editorial"] .rate-send { background: transparent; color: var(--ink); border: none; border-bottom: 1px solid var(--ink); border-radius: 0; padding: 0 0 1px; font-family: var(--font-display); font-style: italic; font-size: 15px; text-transform: none; letter-spacing: 0; }
  </style>

  <script src="/posthog-init"></script>
  <script src="/identity.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const slug = (params.get('slug') || '').replace(/[^a-z0-9_-]/gi, '');

    const myVotesRaw = localStorage.getItem('myVotes') || '{}';
    let myVotes = {};
    try { myVotes = JSON.parse(myVotesRaw); } catch (e) {}

    let games = [];
    async function init() {
      if (!slug) { showError('No game specified.'); return; }
      games = await (await fetch('/games.json', { cache: 'no-store' })).json();
      const game = games.find(g => g.slug === slug);
      if (!game) { showError('Game not found.'); return; }

      document.getElementById('title').textContent = game.title;

      const wrap = document.getElementById('frame-wrap');
      const iframe = document.createElement('iframe');
      iframe.src = `/games/${slug}/index.html`;
      iframe.allow = 'autoplay; fullscreen; gamepad';
      wrap.appendChild(iframe);

      // Fire-and-forget play counter ping (one per page load)
      fetch('/api/play', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ slug }),
      }).catch(() => {});

      if (window.posthog) posthog.capture('game_play_started', { slug, game_title: game.title });

      // Heartbeat — track ACTUAL ACTIVE play time. Two layers of defense
      // against inflated session times:
      //   1. Page Visibility API: pause when tab is hidden / minimised
      //   2. Inactivity timeout: pause after 60s with no input (mouse, key,
      //      touch — counted both on parent doc AND inside the game iframe).
      //   3. Flush cap: each flush reports max FLUSH_MS_CAP seconds, which
      //      prevents any leak from blowing up the daily total.
      //
      // Why bother with all three: tab-visible-but-walked-away is the
      // common case (laptop open in coffee shop, player back from bathroom).
      // Without #2, we'd report walking-away minutes as engagement.
      const TICK_MS       = 5 * 1000;
      const FLUSH_MS      = 120 * 1000;
      const INACTIVE_MS   = 60 * 1000;        // 60s no input → pause
      const FLUSH_CAP_SEC = 130;              // hard cap per flush submission
      let pending = 0;
      let tickTimer = null;
      let flushTimer = null;
      let lastActivity = Date.now();
      let isActive = true;

      function markActive() {
        lastActivity = Date.now();
        if (!isActive && document.visibilityState === 'visible') {
          isActive = true;
          startTicks();
        }
      }
      // Listen on parent doc (covers HUD clicks, vote buttons, share)
      ['mousemove', 'mousedown', 'keydown', 'touchstart', 'wheel', 'pointermove'].forEach(evt => {
        document.addEventListener(evt, markActive, { passive: true, capture: true });
      });

      function startTicks() {
        if (!tickTimer) tickTimer = setInterval(() => {
          // Inactivity guard — if no input for INACTIVE_MS, pause + flush
          if (Date.now() - lastActivity > INACTIVE_MS) {
            isActive = false;
            stopTicks();
            flush(false);
            return;
          }
          pending += TICK_MS / 1000;
          // Hard safety cap on `pending` itself in case timer drift accumulates
          if (pending > FLUSH_CAP_SEC * 2) pending = FLUSH_CAP_SEC * 2;
        }, TICK_MS);
        if (!flushTimer) flushTimer = setInterval(() => flush(false), FLUSH_MS);
      }
      function stopTicks() {
        if (tickTimer)  { clearInterval(tickTimer);  tickTimer  = null; }
        if (flushTimer) { clearInterval(flushTimer); flushTimer = null; }
      }
      function flush(useBeacon) {
        if (pending <= 0) return;
        // Cap per-flush reported seconds. Defends against any logic bug
        // accumulating huge pending values.
        const seconds = Math.min(FLUSH_CAP_SEC, Math.round(pending));
        pending = 0;
        const body = JSON.stringify({ slug, seconds });
        if (useBeacon && navigator.sendBeacon) {
          navigator.sendBeacon('/api/heartbeat', new Blob([body], { type: 'application/json' }));
        } else {
          fetch('/api/heartbeat', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body,
            keepalive: true,
          }).catch(() => {});
        }
      }

      // Wire iframe activity tracking too — game iframe is same-origin so we
      // can listen to its document. Fires after iframe finishes loading.
      iframe.addEventListener('load', () => {
        try {
          const iDoc = iframe.contentDocument;
          if (!iDoc) return;
          ['mousemove', 'mousedown', 'keydown', 'touchstart', 'pointermove'].forEach(evt => {
            iDoc.addEventListener(evt, markActive, { passive: true, capture: true });
          });
        } catch (e) { /* cross-origin — shouldn't happen for /games/<slug>/ */ }
      });

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          markActive();   // treat tab return as activity
        } else {
          isActive = false;
          stopTicks();
          flush(false);
        }
      });
      window.addEventListener('pagehide', () => { stopTicks(); flush(true); });

      if (document.visibilityState === 'visible') startTicks();

      // ── More-games rail ─────────────────────────────────────────────────
      // Slide up after 30s of visible play. Lets players who've engaged see
      // alternatives without nagging fast-bouncers.
      (function buildRail() {
        const candidates = games.filter(g => g.slug !== slug && g.published !== false);
        if (candidates.length === 0) return;
        for (let i = candidates.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
        }
        const picks = candidates.slice(0, 3);
        const row = document.getElementById('more-row');
        row.innerHTML = picks.map(g => `
          <a class="tile" href="/play.html?slug=${encodeURIComponent(g.slug)}">
            <div class="thumb" style="background-image: url('/thumbs/${g.slug}.png')"></div>
            <div class="meta"><div class="name"></div><div class="hook"></div></div>
          </a>
        `).join('');
        Array.from(row.querySelectorAll('.tile')).forEach((el, i) => {
          el.querySelector('.name').textContent = picks[i].title;
          el.querySelector('.hook').textContent = picks[i].hook || '';
        });
      })();

      // The "More games" rail must NEVER pop mid-game — it would yank focus
      // off the canvas while the player is still in a round. We surface it
      // only after the game actively signals end-of-round via postMessage
      // (see GF.gameEnded() in gf-lib.js), and dismiss it the moment the
      // player resumes play (gf:gameStarted, or a click inside the iframe).
      const rail = document.getElementById('more-rail');
      let railShown = false;
      function showRail() {
        if (railShown) return;
        rail.classList.add('visible');
        railShown = true;
        if (window.posthog) posthog.capture('more_games_rail_shown', { slug });
      }
      function hideRail() {
        if (!rail.classList.contains('visible')) return;
        rail.classList.remove('visible');
      }
      window.addEventListener('message', (e) => {
        const data = e && e.data;
        if (!data) return;
        if (data.type === 'gf:gameEnded') showRail();
        if (data.type === 'gf:gameStarted') hideRail();
      });
      document.getElementById('more-close').addEventListener('click', hideRail);

      // Defensive auto-hide: if the player taps inside the game iframe
      // (any "Next Level", "Retry", or just resuming play), dismiss the rail
      // — even if the game itself never emits gf:gameStarted.
      // The iframe is created dynamically further up (no id), so resolve it
      // off `wrap` rather than getElementById; otherwise this throws and the
      // entire init() chain dies before like/share/dislike handlers attach.
      function bindIframeDismiss() {
        const frameEl = wrap.querySelector('iframe');
        if (!frameEl) return;
        try {
          const idoc = frameEl.contentDocument;
          if (!idoc) return;
          const handler = () => hideRail();
          idoc.addEventListener('mousedown', handler, { capture: true });
          idoc.addEventListener('touchstart', handler, { capture: true, passive: true });
          idoc.addEventListener('keydown', handler, { capture: true });
        } catch (_) { /* cross-origin guard — should never trip for our games */ }
      }
      const _frame = wrap.querySelector('iframe');
      if (_frame) {
        _frame.addEventListener('load', bindIframeDismiss);
        bindIframeDismiss(); // also bind immediately if iframe is already loaded
      }

      // load current vote counts
      let counts = { likes: 0, dislikes: 0 };
      try {
        const r = await fetch('/api/counts', { cache: 'no-store' });
        if (r.ok) {
          const all = await r.json();
          counts = all[slug] || counts;
        }
      } catch (e) {}
      paintCounts(counts);

      document.getElementById('like').addEventListener('click', () => onVote('like'));
      document.getElementById('dislike').addEventListener('click', () => onVote('dislike'));

      function trackVote(action) {
        if (window.posthog) posthog.capture('game_voted', { slug, action, seconds_played: Math.round(pending) });
      }

      // ── Comments panel ───────────────────────────────────────────────
      // Fetches /api/comments?slug=… on first open, renders the latest 10
      // anonymous notes. Re-fetches after the rate-on-leave overlay submits
      // so the writer sees their own comment land.
      const commentsBtn      = document.getElementById('comments-btn');
      const commentsPanel    = document.getElementById('comments-panel');
      const commentsList     = document.getElementById('comments-list');
      const commentsCloseBtn = document.getElementById('comments-close');
      const commentsCountEl  = document.getElementById('comments-num');
      const commentsLabel    = document.getElementById('comments-count-label');
      let commentsLoaded     = false;
      let commentsCount      = 0;

      function relTime(ts) {
        if (!ts) return '';
        const sec = Math.max(1, Math.round((Date.now() - ts) / 1000));
        if (sec < 60)    return `${sec}s ago`;
        const min = Math.round(sec / 60);
        if (min < 60)    return `${min}m ago`;
        const hr  = Math.round(min / 60);
        if (hr  < 24)    return `${hr}h ago`;
        const d   = Math.round(hr / 24);
        if (d   < 30)    return `${d}d ago`;
        const mo  = Math.round(d / 30);
        return `${mo}mo ago`;
      }

      function escapeText(s) {
        const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML;
      }

      async function loadComments({ silent } = {}) {
        try {
          const r = await fetch(`/api/comments?slug=${encodeURIComponent(slug)}&limit=10`, { cache: 'no-store' });
          if (!r.ok) throw new Error('http ' + r.status);
          const payload = await r.json();
          const list = (payload && payload.comments) || [];
          commentsCount = list.length;
          commentsCountEl.textContent = commentsCount;
          if (!list.length) {
            commentsLabel.textContent = 'No comments yet — be the first via 👍/👎 + note when you leave.';
            commentsList.innerHTML = '<div class="comments-empty">Players leave a quick note when they finish a session. None yet for this game — your feedback shapes what gets built next.</div>';
          } else {
            commentsLabel.textContent = `${commentsCount} comment${commentsCount === 1 ? '' : 's'}`;
            commentsList.innerHTML = list.map(c => {
              const emoji = c.vote === 'like' ? '👍' : c.vote === 'dislike' ? '👎' : '💬';
              return `<div class="comment">
                <div class="comment-vote">${emoji}</div>
                <div>
                  <div class="comment-body">${escapeText(c.comment)}</div>
                  <div class="comment-meta">${relTime(c.ts)}</div>
                </div>
              </div>`;
            }).join('');
          }
          commentsLoaded = true;
        } catch (e) {
          if (!silent) {
            commentsLabel.textContent = 'Couldn\'t load comments';
            commentsList.innerHTML = '<div class="comments-empty">Comments are temporarily unavailable. Refresh in a moment.</div>';
          }
        }
      }

      function openComments() {
        commentsPanel.classList.add('visible');
        commentsPanel.setAttribute('aria-hidden', 'false');
        commentsBtn.setAttribute('aria-expanded', 'true');
        if (!commentsLoaded) loadComments();
        if (window.posthog) posthog.capture('comments_panel_opened', { slug });
      }
      function closeComments() {
        commentsPanel.classList.remove('visible');
        commentsPanel.setAttribute('aria-hidden', 'true');
        commentsBtn.setAttribute('aria-expanded', 'false');
      }
      commentsBtn.addEventListener('click', () => {
        if (commentsPanel.classList.contains('visible')) closeComments();
        else openComments();
      });
      commentsCloseBtn.addEventListener('click', closeComments);

      // Background prefetch of the count so the topbar shows the real number
      // before the user clicks. Cheap — single KV read; 30s edge cached.
      loadComments({ silent: true });

      // After the rate-on-leave overlay POSTs, refresh the cache so a
      // returning player sees their own note land.
      window._refreshComments = () => loadComments({ silent: true });

      // Share button — Web Share API on mobile (and recent desktop), clipboard
      // copy fallback elsewhere. Always shares the /p/<slug> URL so the link
      // unfurls with the OG card on Twitter/Telegram/Slack/etc.
      const shareUrl = `${location.origin}/p/${encodeURIComponent(slug)}`;
      const shareBtn = document.getElementById('share');
      shareBtn.addEventListener('click', async () => {
        const data = { title: game.title, text: game.hook || `Play ${game.title}`, url: shareUrl };
        try {
          if (navigator.share) {
            await navigator.share(data);
            if (window.posthog) posthog.capture('game_shared', { slug, method: 'share_api' });
          } else {
            await navigator.clipboard.writeText(shareUrl);
            shareBtn.innerHTML = '✓ Copied';
            setTimeout(() => { shareBtn.innerHTML = '↗ Share'; }, 1600);
            if (window.posthog) posthog.capture('game_shared', { slug, method: 'clipboard' });
          }
        } catch (e) { /* user cancelled */ }
      });

      function onVote(action) {
        const prev = myVotes[slug] || null;
        const next = prev === action ? null : action;
        trackVote(next || 'clear');
        let dl = 0, dd = 0;
        if (prev === 'like')    dl -= 1;
        if (prev === 'dislike') dd -= 1;
        if (next === 'like')    dl += 1;
        if (next === 'dislike') dd += 1;

        if (next) myVotes[slug] = next; else delete myVotes[slug];
        localStorage.setItem('myVotes', JSON.stringify(myVotes));
        counts.likes    = Math.max(0, counts.likes + dl);
        counts.dislikes = Math.max(0, counts.dislikes + dd);
        paintCounts(counts);

        fetch('/api/vote', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ slug, deltaLike: dl, deltaDislike: dd }),
        }).then(r => r.ok ? r.json() : null).then(updated => {
          if (updated) { counts = updated; paintCounts(counts); }
        }).catch(() => {});
      }

      function paintCounts(c) {
        document.getElementById('like-num').textContent    = c.likes || 0;
        document.getElementById('dislike-num').textContent = c.dislikes || 0;
        document.getElementById('like').classList.toggle('active',    myVotes[slug] === 'like');
        document.getElementById('dislike').classList.toggle('active', myVotes[slug] === 'dislike');
      }
    }

    function showError(msg) {
      document.getElementById('frame-wrap').innerHTML =
        `<div class="err"><h2>${msg}</h2><p><a href="/" style="color:#4dd0e1">← back to gallery</a></p></div>`;
    }

    // ── Rate-on-leave ──────────────────────────────────────────────────────
    // Intercept the "← Back" click and "Play another" tile clicks so we can
    // ask for a 👍/👎 + optional comment if the player engaged for 20+ sec.
    // Skipped if they already voted on this slug.
    (function setupRateOnLeave() {
      const overlay = document.getElementById('rate-overlay');
      const sentKey = 'rateSent_' + slug;
      const tStart = Date.now();
      let firing = false;
      let pendingHref = null;

      function shouldAsk() {
        if (sessionStorage.getItem(sentKey)) return false;
        const myVotesNow = JSON.parse(localStorage.getItem('myVotes') || '{}');
        if (myVotesNow[slug]) return false;     // already voted on this slug
        if (Date.now() - tStart < 20000) return false;  // played < 20s
        return true;
      }

      function showOverlay(href) {
        pendingHref = href;
        overlay.style.display = 'flex';
        document.getElementById('rate-comment').focus();
      }

      function close() { overlay.style.display = 'none'; }
      function go()    { sessionStorage.setItem(sentKey, '1'); if (pendingHref) location.href = pendingHref; }

      async function send(vote) {
        const comment = document.getElementById('rate-comment').value.trim().slice(0, 500);
        if (window.posthog) posthog.capture('game_feedback_submitted', { slug, vote, has_comment: comment.length > 0 });
        try {
          const body = JSON.stringify({ slug, vote, comment });
          if (navigator.sendBeacon) {
            navigator.sendBeacon('/api/feedback', new Blob([body], { type: 'application/json' }));
          } else {
            await fetch('/api/feedback', { method: 'POST', headers: { 'content-type': 'application/json' }, body, keepalive: true });
          }
        } catch (e) { /* tolerate */ }
        // Also reflect in local vote state so the gallery sees it
        const myVotesNow = JSON.parse(localStorage.getItem('myVotes') || '{}');
        myVotesNow[slug] = vote;
        localStorage.setItem('myVotes', JSON.stringify(myVotesNow));
        close(); go();
      }

      document.getElementById('rate-up').addEventListener('click',   () => send('like'));
      document.getElementById('rate-down').addEventListener('click', () => send('dislike'));
      document.getElementById('rate-skip').addEventListener('click', () => { close(); go(); });
      document.getElementById('rate-send').addEventListener('click', () => {
        // No vote selected, treat skip with comment as a neutral note
        const comment = document.getElementById('rate-comment').value.trim();
        if (comment) send('neutral'); else { close(); go(); }
      });

      // Intercept the back link
      const backLink = document.querySelector('.back');
      if (backLink) {
        backLink.addEventListener('click', (e) => {
          if (firing) return;
          if (!shouldAsk()) return;
          e.preventDefault();
          firing = true;
          showOverlay(backLink.href);
        });
      }
      // Intercept "Play another" tile clicks once the rail is shown
      document.addEventListener('click', (e) => {
        const tile = e.target.closest('.more-rail .tile');
        if (!tile) return;
        if (firing) return;
        if (!shouldAsk()) return;
        e.preventDefault();
        firing = true;
        showOverlay(tile.href);
      });
    })();

    init();
  </script>

  <script>
    // Theme switcher — same behaviour as gallery: pill of three buttons,
    // localStorage-persistent, syncs with the data-theme attribute.
    (function () {
      const html = document.documentElement;
      const switchEl = document.getElementById('theme-switch');
      function setTheme(t) {
        html.setAttribute('data-theme', t);
        try { localStorage.setItem('gallery-theme', t); } catch (e) {}
        switchEl.querySelectorAll('button').forEach(b =>
          b.classList.toggle('active', b.dataset.themeBtn === t));
      }
      switchEl.addEventListener('click', e => {
        const btn = e.target.closest('button[data-theme-btn]');
        if (btn) setTheme(btn.dataset.themeBtn);
      });
      const current = html.getAttribute('data-theme') || 'lab';
      switchEl.querySelectorAll('button').forEach(b =>
        b.classList.toggle('active', b.dataset.themeBtn === current));
    })();
  </script>
</body>
</html>
