<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>Player creation -- Tim's Game Lab</title>
  <style>
    :root { --bg:#0e0e12; --ink:#f3f1e8; --rule:#2a2a33; --accent:#4f86d6; }
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; background:var(--bg); color:var(--ink); font-family:-apple-system,system-ui,sans-serif; overflow:hidden; }
    .cbar { display:flex; align-items:center; gap:12px; height:44px; padding:0 14px; border-bottom:1px solid var(--rule); }
    .cback { color:var(--ink); text-decoration:none; font-size:14px; opacity:0.85; }
    .cback:hover { opacity:1; }
    .ctitle { font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .cby { color:#9a9aa6; font-size:12px; margin-left:auto; }
    .cwrap { position:absolute; top:44px; left:0; right:0; bottom:0; background:#000; }
    .cwrap iframe { width:100%; height:100%; border:0; display:block; }
    .cerr { padding:24px; color:#c8451f; font-family:ui-monospace,monospace; }
  </style>
</head>
<body>
  <header class="cbar">
    <a class="cback" href="/">&larr; Gallery</a>
    <span class="ctitle" id="ctitle">Player creation</span>
    <span class="cby" id="cby"></span>
  </header>
  <div class="cwrap" id="cwrap"></div>

  <script src="/identity.js?v=55021ea3"></script>
  <script>
    (function () {
      var q = new URLSearchParams(location.search);
      var id = (q.get('id') || '').toLowerCase();
      var slug = (q.get('slug') || '').toLowerCase();
      var title = q.get('title') || '';
      var by = q.get('by') || '';
      if (title) document.getElementById('ctitle').textContent = title;
      if (by) document.getElementById('cby').textContent = 'by ' + by;
      if (!/^[0-9a-z]{8,40}$/.test(id)) { document.getElementById('cwrap').innerHTML = '<div class="cerr">Bad creation link.</div>'; return; }

      // Embed the generated game -- sandboxed, no same-origin (opaque origin).
      // Fullscreen is granted by the iframe allowfullscreen attribute; there is
      // no valid allow-fullscreen token for the sandbox attribute.
      var f = document.createElement('iframe');
      f.setAttribute('sandbox', 'allow-scripts allow-pointer-lock');
      f.setAttribute('allow', 'autoplay');
      f.setAttribute('allowfullscreen', '');
      f.setAttribute('title', title || 'Player creation');
      f.src = '/g/' + id;
      document.getElementById('cwrap').appendChild(f);

      // Level-builder bridge: generated games are intentionally sandboxed with
      // no network access, so the trusted wrapper fetches creator-authored level
      // data and delivers it by postMessage. New generated games listen for this.
      var levelPayload = null;
      function sendLevels() {
        if (!levelPayload || !f.contentWindow) return;
        try { f.contentWindow.postMessage(levelPayload, '*'); } catch (e) {}
      }
      f.addEventListener('load', sendLevels);
      fetch('/api/creation-levels?id=' + encodeURIComponent(id), { credentials: 'same-origin', cache: 'no-store' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          if (!d || !d.ok || !Array.isArray(d.levels)) return;
          levelPayload = {
            type: 'gameFactoryLevels',
            schema: d.schema || 'game-factory-generic-levels-v1',
            id: id,
            levels: d.levels,
            updatedTs: d.updatedTs || 0
          };
          sendLevels();
        })
        .catch(function () {});

      // Metrics: count the play + flush VISIBLE playtime. kind:'creation' so the
      // server records plays/seconds but does NOT accrue prompt credits (sandboxed
      // iframe = can't input-gate, so it must not feed the economy).
      var validSlug = /^[a-z0-9_-]{1,60}$/.test(slug);
      if (validSlug) {
        try { fetch('/api/play', { method: 'POST', headers: { 'content-type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify({ slug: slug }) }); } catch (e) {}
        var vis = 0;
        setInterval(function () { if (document.visibilityState === 'visible') vis++; }, 1000);
        function flush(beacon) {
          var s = Math.min(300, vis); if (s <= 0) return; vis = 0;
          var body = JSON.stringify({ slug: slug, seconds: s, kind: 'creation' });
          if (beacon && navigator.sendBeacon) navigator.sendBeacon('/api/heartbeat', new Blob([body], { type: 'application/json' }));
          else { try { fetch('/api/heartbeat', { method: 'POST', headers: { 'content-type': 'application/json' }, credentials: 'same-origin', body: body, keepalive: true }); } catch (e) {} }
        }
        setInterval(function () { flush(false); }, 120000);
        document.addEventListener('visibilitychange', function () { if (document.visibilityState === 'hidden') flush(false); });
        window.addEventListener('pagehide', function () { flush(true); });
      }
    })();
  </script>
</body>
</html>
