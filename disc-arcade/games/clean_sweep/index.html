// ── DRAW DONUT ────────────────────────────────────────────────────────────────
function drawDonut(x, y) {
  // Sprite path: AI render with built-in shadow + sprinkles.
  var spriteSize = (DR * 2) * S * 1.15; // slightly bigger than design radius (sprite has shadow padding)
  if (sprites.donut && sprites.donut.complete && sprites.donut.naturalWidth > 0) {
    var skin = getSkin(skinId);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(donut.angle * 0.25); // gentle rotation so it still feels alive
    if (skin.tint) {
      // iter#3: tint the donut sprite in an offscreen scratch so the source-atop
      // composite doesn't bleed onto the main canvas (tested via deep_playtest).
      if (!_skinScratch) {
        _skinScratch = document.createElement('canvas');
        _skinScratchCtx = _skinScratch.getContext('2d');
      }
      var sw = Math.ceil(spriteSize), sh = Math.ceil(spriteSize);
      if (_skinScratch.width !== sw || _skinScratch.height !== sh) {
        _skinScratch.width = sw; _skinScratch.height = sh;
      }
      _skinScratchCtx.clearRect(0, 0, sw, sh);
      _skinScratchCtx.drawImage(sprites.donut, 0, 0, sw, sh);
      _skinScratchCtx.globalCompositeOperation = 'source-atop';
      _skinScratchCtx.fillStyle = skin.tint;
      _skinScratchCtx.fillRect(0, 0, sw, sh);
      _skinScratchCtx.globalCompositeOperation = 'source-over';
      ctx.drawImage(_skinScratch, -sw/2, -sh/2, sw, sh);
    } else {
      ctx.drawImage(sprites.donut, -spriteSize/2, -spriteSize/2, spriteSize, spriteSize);
    }
    ctx.restore();
    return;
  }
  // Fallback: original procedural donut
  drawDonutProcedural(x, y);
}
var _skinScratch = null, _skinScratchCtx = null;

function drawDonutProcedural(x, y) {
  var r = DR * S, hole = DHOLE * S;
  ctx.save();
  ctx.translate(x, y);

  // shadow
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur  = 10 * S;
  ctx.shadowOffsetY = 3 * S;

  // dough body
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.arc(0, 0, hole, 0, Math.PI*2, true);
  ctx.fillStyle = '#F5DEB3';
  ctx.fill();
  ctx.shadowColor = 'transparent';

  // icing ring (color comes from selected skin - iter#3)
  ctx.beginPath();
  ctx.arc(0, 0, r*0.88, 0, Math.PI*2);
  ctx.arc(0, 0, hole*1.15, 0, Math.PI*2, true);
  ctx.fillStyle = (getSkin(skinId).ring) || '#FFB7C5';
  ctx.fill();

  // icing highlight
  ctx.beginPath();
  ctx.arc(-r*0.15, -r*0.15, r*0.3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fill();

  // sprinkles (rotate with movement)
  var spkColors = ['#FF6B6B','#4ECDC4','#FFE66D','#A78BFA','#FB923C'];
  var midR = hole + (r - hole) * 0.52;
  for (var i = 0; i < 7; i++) {
    var a = donut.angle + (i / 7) * Math.PI * 2;
    var sx = Math.cos(a) * midR, sy = Math.sin(a) * midR;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(a + Math.PI/2);
    ctx.fillStyle = spkColors[i % spkColors.length];
    ctx.fillRect(-3.5*S, -1.2*S, 7*S, 2.4*S);
    ctx.restore();
  }

  // hole (punch through to bg)
  ctx.beginPath();
  ctx.arc(0, 0, hole, 0, Math.PI*2);
  ctx.fillStyle = '#0a0a12';
  ctx.fill();

  ctx.restore();
}

// ── DRAW DEBRIS ───────────────────────────────────────────────────────────────
function drawDebris(d) {
  var wb = Math.sin(d.wobble) * 1.2 * S;

  // Sprite path: scale sprite to ~3x the procedural radius (sprites have padding/glow built in)
  var spriteName = d.typeId; // 'crumb' | 'mud' | 'wrapper' | 'trash'
  var spriteImg = sprites[spriteName];
  if (spriteImg && spriteImg.complete && spriteImg.naturalWidth > 0) {
    var spriteSize = d.r * 2.6;
    ctx.save();
    ctx.translate(d.x, d.y + wb);
    if (spriteName === 'wrapper') ctx.rotate(d.phase);
    ctx.drawImage(spriteImg, -spriteSize/2, -spriteSize/2, spriteSize, spriteSize);
    ctx.restore();
    return;
  }

  // Fallback: procedural drawing
  ctx.save();
  ctx.translate(d.x, d.y + wb);

  if (d.typeId === 'crumb') {
    ctx.beginPath(); ctx.arc(0, 0, d.r, 0, Math.PI*2);
    ctx.fillStyle = d.color; ctx.fill();
    ctx.beginPath(); ctx.arc(-d.r*0.25, -d.r*0.3, d.r*0.45, 0, Math.PI*2);
    ctx.fillStyle = d.shine; ctx.fill();

  } else if (d.typeId === 'mud') {
    ctx.beginPath();
    for (var i = 0; i <= 8; i++) {
      var a = (i/8)*Math.PI*2;
      var br = d.r * (0.78 + Math.sin(d.phase + i*0.9)*0.22);
      if (i===0) ctx.moveTo(Math.cos(a)*br, Math.sin(a)*br);
      else       ctx.lineTo(Math.cos(a)*br, Math.sin(a)*br);
    }
    ctx.closePath(); ctx.fillStyle = d.color; ctx.fill();
    ctx.beginPath(); ctx.arc(-d.r*0.2,-d.r*0.2,d.r*0.35,0,Math.PI*2);
    ctx.fillStyle = d.shine; ctx.fill();

  } else if (d.typeId === 'wrapper') {
    ctx.rotate(d.phase);
    var ww = d.r*2.8, wh = d.r*1.1;
    rr(ctx, -ww/2, -wh/2, ww, wh, 3*S);
    ctx.fillStyle = d.color; ctx.fill();
    // crinkle lines
    ctx.strokeStyle = d.shine; ctx.lineWidth = 1.5*S;
    ctx.beginPath(); ctx.moveTo(-ww*0.3,-wh/2); ctx.lineTo(-ww*0.3,wh/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( ww*0.3,-wh/2); ctx.lineTo( ww*0.3,wh/2); ctx.stroke();
    // shine
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    rr(ctx, -ww/2, -wh/2, ww, wh*0.38, 3*S);
    ctx.fill();

  } else { // trash bag
    ctx.beginPath(); ctx.arc(0, 0, d.r, 0, Math.PI*2);
    ctx.fillStyle = d.color; ctx.fill();
    // bag tie
    ctx.beginPath(); ctx.arc(0, -d.r*0.75, d.r*0.22, 0, Math.PI*2);
    ctx.fillStyle = d.shine; ctx.fill();
    // sheen
    ctx.beginPath(); ctx.arc(-d.r*0.28,-d.r*0.28,d.r*0.38,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.18)'; ctx.fill();
    // exclamation
    ctx.font = 'bold '+(d.r*0.9)+'px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('!', 0, d.r*0.15);
  }
  ctx.restore();
}

// ── iter#12: draw a single golden sprinkle pickup ────────────────────────────
function drawSprinkle(s) {
  var bob = Math.sin(s.bob) * 2.4;
  var twinkle = 0.7 + Math.sin(s.phase * 1.4) * 0.3;
  var r = s.r * S;
  ctx.save();
  ctx.translate(s.x, s.y + bob);
  // outer glow
  ctx.globalAlpha = 0.35 * twinkle;
  ctx.beginPath(); ctx.arc(0, 0, r * 2.0, 0, Math.PI*2);
  ctx.fillStyle = '#FFD700'; ctx.fill();
  ctx.globalAlpha = 1;
  // 4-point star (sprinkle)
  ctx.rotate(s.phase * 0.35);
  ctx.beginPath();
  for (var k = 0; k < 8; k++) {
    var ang = (k / 8) * Math.PI * 2;
    var rad = (k % 2 === 0) ? r * 1.05 : r * 0.42;
    var px = Math.cos(ang) * rad;
    var py = Math.sin(ang) * rad;
    if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  var grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
  grad.addColorStop(0, '#FFF8C0');
  grad.addColorStop(0.6, '#FFD700');
  grad.addColorStop(1, '#B8860B');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1.2 * S; ctx.stroke();
  // tiny center sparkle
  ctx.globalAlpha = twinkle;
  ctx.beginPath(); ctx.arc(0, 0, r*0.22, 0, Math.PI*2);
  ctx.fillStyle = '#FFFFFF'; ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── DRAW ARENA ────────────────────────────────────────────────────────────────
function drawArena() {
  var ar = arena();
  ctx.fillStyle = '#16162a';
  ctx.fillRect(ar.x, ar.y, ar.w, ar.h);

  // subtle tile grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  var gs2 = 44 * S;
  for (var x = ar.x; x <= ar.x+ar.w; x += gs2) {
    ctx.beginPath(); ctx.moveTo(x, ar.y); ctx.lineTo(x, ar.y+ar.h); ctx.stroke();
  }
  for (var y = ar.y; y <= ar.y+ar.h; y += gs2) {
    ctx.beginPath(); ctx.moveTo(ar.x, y); ctx.lineTo(ar.x+ar.w, y); ctx.stroke();
  }
  // border glow
  ctx.strokeStyle = 'rgba(100,180,255,0.12)';
  ctx.lineWidth = 2;
  ctx.strokeRect(ar.x, ar.y, ar.w, ar.h);
}

// ── DRAW HUD ──────────────────────────────────────────────────────────────────
function drawHUD() {
  var inset = platformSafeInsets();
  var bh = HUD_H * S;
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, W, bh);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, bh); ctx.lineTo(W, bh); ctx.stroke();

  var pad = 14*S, rightX = W - pad - inset.right, fs = clamp(13*S, 11, 17), fy = bh*0.78;
  var bigFs = clamp(18*S, 14, 24);
  ctx.textBaseline = 'alphabetic';

  // Level (left)
  ctx.fillStyle = '#555'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(t('level'), pad, bh*0.42);
  ctx.fillStyle = '#fff'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(level, pad, fy);

  // Score (right)
  ctx.fillStyle = '#555'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(t('score'), rightX, bh*0.42);
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(score, rightX, fy);

  // Best (small, below score on the right) - pulses gold when score has just beaten it
  if (best > 0) {
    var bestFs = clamp(11*S, 9, 14);
    ctx.font = 'bold '+bestFs+'px sans-serif';
    ctx.textAlign = 'right';
    if (bestPulse > 0) {
      ctx.fillStyle = '#FFD700';
      ctx.globalAlpha = 0.6 + bestPulse * 0.4;
    } else {
      ctx.fillStyle = '#777';
    }
    ctx.fillText(t('best')+': '+best, rightX, bh + bestFs + 4*S);
    ctx.globalAlpha = 1;
  }
  // iter#9: persistent best chain under the BEST line (only show after a chain exists)
  if (bestCombo > 1) {
    var chainFs = clamp(11*S, 9, 14);
    ctx.font = 'bold '+chainFs+'px sans-serif';
    ctx.textAlign = 'right';
    if (chainPulse > 0) {
      ctx.fillStyle = '#FFD700';
      ctx.globalAlpha = 0.6 + chainPulse * 0.4;
    } else {
      ctx.fillStyle = '#777';
    }
    var chainY = bh + chainFs*2 + 8*S;
    ctx.fillText(t('chain')+' '+t('chainBest')+': x'+bestCombo, W-pad, chainY);
    ctx.globalAlpha = 1;
  }

  // Clean meter (center)
  var pct = totalDebris > 0 ? Math.round((1 - debrisList.length/totalDebris)*100) : 100;
  var mw = clamp(W*0.35, 120, 240), mh = 10*S;
  var mx = cx - mw/2, my = bh*0.58;
  ctx.fillStyle = '#666'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(t('clean')+' '+pct+'%', cx, bh*0.36);
  // bar bg
  rr(ctx, mx, my, mw, mh, mh/2); ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill();
  // bar fill
  if (pct > 0) {
    var fg = ctx.createLinearGradient(mx, 0, mx+mw, 0);
    fg.addColorStop(0, '#2ecc71'); fg.addColorStop(1, '#1abc9c');
    rr(ctx, mx, my, mw*pct/100, mh, mh/2); ctx.fillStyle = fg; ctx.fill();
  }

  // Timer (3/4 right)
  var tx = W*0.75;
  var tc = timeLeft < 12 ? '#e74c3c' : timeLeft < 25 ? '#f39c12' : '#aaa';
  // iter#12: TIME flashes gold for the half-second after a sprinkle pickup
  if (sprinkleHudPulse > 0) tc = '#FFD700';
  ctx.fillStyle = tc; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(t('time'), tx, bh*0.42);
  ctx.font = 'bold '+bigFs+'px sans-serif';
  if (sprinkleHudPulse > 0) { ctx.globalAlpha = 0.7 + sprinkleHudPulse * 0.3; }
  ctx.fillText(Math.ceil(timeLeft)+t('secAbbr'), tx, fy);
  ctx.globalAlpha = 1;

  // Combo badge
  if (combo > 1 && comboTimer > 0) {
    var alpha = Math.min(1, comboTimer);
    ctx.globalAlpha = alpha;
    var badgeY = H - 55*S;
    ctx.font = 'bold '+clamp(22*S,16,32)+'px sans-serif';
    ctx.fillStyle = '#FFD700'; ctx.textAlign = 'center';
    ctx.fillText(t('combo')+' x'+combo+'!', cx, badgeY);
    ctx.globalAlpha = 1;
  }
}

// ── DRAW MENU / END SCREENS ───────────────────────────────────────────────────
function drawOverlay(title, sub, btnText, btnFn, sub2) {
  buttons = [];
  ctx.fillStyle = 'rgba(8,8,18,0.88)';
  ctx.fillRect(0, 0, W, H);

  var titleFs = clamp(36*S, 22, 52);
  var subFs   = clamp(16*S, 12, 22);
  var isWide  = W / H > 1.15;
  var btnW    = clamp(240*S, 160, 320), btnH = clamp(52*S, 40, 66);
  if (isWide) { btnW = Math.round(btnW * 1.4); btnH = Math.round(btnH * 1.35); }
  // textBlockBottom: sub2 line or sub line; sub at cy-16*S, sub2 at cy+2*S
  var textBlockBottom = cy + (sub2 ? 2*S + subFs : sub ? -16*S + subFs : -50*S + titleFs);
  var clearMargin = btnH / 2 + 16;
  var wideFloor = H * 0.50;
  // Skin picker is below the button - cap so button bottom stays above H*0.62
  var wideCeil = H * 0.62 - btnH;
  var btnY = isWide ? Math.min(Math.max(textBlockBottom + clearMargin, wideFloor), wideCeil) : cy + 20*S;
  var btnX    = cx - btnW/2;

  // glow effect behind title
  ctx.shadowColor = 'rgba(46,204,113,0.4)'; ctx.shadowBlur = 30*S;
  ctx.font = 'bold '+titleFs+'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(title, cx, cy - 50*S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  if (sub) {
    ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#999';
    ctx.fillText(sub, cx, cy - 16*S);
  }
  if (sub2) {
    ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#aaa';
    ctx.fillText(sub2, cx, cy + 2*S);
  }

  // Button - hit rect at stable base position; pulse applied visually only on wide
  var drawBtnX = btnX, drawBtnY = btnY, drawBtnW = btnW, drawBtnH = btnH;
  if (isWide) {
    var t_pulse = performance.now() / 1000;
    var pulse = 1 + 0.05 * Math.sin(t_pulse * 2.2);
    var pw = btnW * pulse, ph = btnH * pulse;
    drawBtnX = cx - pw / 2; drawBtnY = btnY + (btnH - ph) / 2;
    drawBtnW = pw; drawBtnH = ph;
    ctx.shadowColor = 'rgba(46,204,113,0.55)';
    ctx.shadowBlur = 18 + 10 * Math.abs(Math.sin(t_pulse * 2.2));
  }
  var grad = ctx.createLinearGradient(drawBtnX, drawBtnY, drawBtnX, drawBtnY+drawBtnH);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
  rr(ctx, drawBtnX, drawBtnY, drawBtnW, drawBtnH, drawBtnH/2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = 'bold '+clamp((isWide?20:16)*S,14,26)+'px sans-serif'; ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(btnText, cx, btnY + btnH/2);
  ctx.textBaseline = 'alphabetic';

  buttons.push({ x:btnX, y:btnY, w:btnW, h:btnH, fn:function(){ sfxClick(); btnFn(); } });

  if (best > 0) {
    ctx.font = clamp(13*S,10,17)+'px sans-serif'; ctx.fillStyle = '#555';
    ctx.fillText(t('best')+': '+best, cx, btnY+btnH+28*S);
  }
}

// iter#10: Big 3-star row drawn on LEVELEND between the title and the NEXT
// button. Filled gold stars for stars earned this clear; outline stars for
// the remainder. Subtle pulse + 'NEW BEST!' label when this clear beat the
// previously-saved best for this level.
var _starPulseT = 0;
function drawLevelEndStars() {
  if (!lastLevelStars) return;
  _starPulseT += 0.05;
  var size = clamp(38*S, 22, 54);
  var gap  = clamp(14*S, 10, 22);
  var totalW = size*3 + gap*2;
  var startX = cx - totalW/2 + size/2;
  var y = cy - 8*S;
  var pulse = 1 + Math.sin(_starPulseT * 4) * (lastLevelStarsNewBest ? 0.08 : 0.02);
  for (var i = 0; i < 3; i++) {
    var filled = (i < lastLevelStars);
    var px = startX + i*(size + gap);
    ctx.save();
    ctx.translate(px, y);
    ctx.scale(filled ? pulse : 1, filled ? pulse : 1);
    if (filled) {
      ctx.shadowColor = 'rgba(255,215,0,0.7)';
      ctx.shadowBlur = 18*S;
      drawStar(0, 0, size*0.92, '#FFD700', null);
      ctx.shadowColor = 'transparent';
    } else {
      drawStar(0, 0, size*0.92, 'rgba(255,255,255,0.18)', null);
    }
    ctx.restore();
  }
  if (lastLevelStarsNewBest) {
    var fs = clamp(13*S, 10, 16);
    ctx.font = 'bold ' + fs + 'px sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(t('starsNewBest'), cx, y + size*0.7 + fs);
  }
}

// iter#13: PERFECT SWEEP stamp drawn on LEVELEND. Renders only when the player
// cleared the level without ever letting the combo timer expire after the first
// pickup. Sits BELOW the star row and ABOVE the NEXT button so it doesn't fight
// either UI. Gold pill with subtle pulse - matches the +50 score bonus already
// granted on level clear.
var _perfectPulseT = 0;
function drawPerfectSweepStamp() {
  if (!lastLevelPerfect) return;
  _perfectPulseT += 0.07;
  var size = clamp(38*S, 22, 54);
  // Y mirrors drawLevelEndStars: stars centred at cy - 8*S; this stamp goes
  // ~size*1.0 below the stars so the NEW BEST sub-line (if present) doesn't
  // get sat-on. Stays well above the NEXT button (at cy + ~30*S).
  var y = cy - 8*S + size * 1.05;
  var fs = clamp(15*S, 12, 20);
  var pulse = 1 + Math.sin(_perfectPulseT * 5) * 0.04;
  var label = t('perfectSweep') + '  ' + t('perfectBonus');
  ctx.save();
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  var tw = ctx.measureText(label).width;
  var padX = clamp(14*S, 10, 22);
  var padY = clamp(7*S, 5, 12);
  var pw = (tw + padX * 2) * pulse;
  var ph = (fs + padY * 2) * pulse;
  var px = cx - pw/2;
  var py = y - ph/2;
  rr(ctx, px, py, pw, ph, ph/2);
  ctx.shadowColor = 'rgba(255,215,0,0.5)';
  ctx.shadowBlur = 14*S;
  ctx.fillStyle = '#FFD700';
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1.3 * S;
  ctx.stroke();
  ctx.fillStyle = '#1a1a2e';
  ctx.fillText(label, cx, y);
  ctx.restore();
}

// iter#10: Tiny *N/30 pill drawn on MENU near the top to show lifetime stars
// collected across all 10 levels (3 stars per level × 10 levels = 30 max).
// Sits in the top-left so it doesn't fight day-seed (centred-top), streak
// (above day-seed), mute (top-right), or the daily leaderboard cluster.
function drawTotalStarsPill() { drawTotalStarsPillAt(14*S, 14*S); }
function drawTotalStarsPillAt(px, py) {
  var total = totalLevelStars();
  if (total <= 0) return;
  var max = STARS_MAX_LEVEL * 3;
  var fs = clamp(13*S, 11, 16);
  var padX = clamp(10*S, 7, 14), padY = clamp(6*S, 4, 10);
  var label = total + '/' + max;
  var iconSz = fs * 1.15;
  ctx.save();
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  var tw = ctx.measureText(label).width;
  var pw = tw + iconSz + 5*S + padX*2;
  var ph = fs + padY*2;
  rr(ctx, px, py, pw, ph, ph/2);
  ctx.fillStyle = 'rgba(40,30,8,0.7)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,215,0,0.5)';
  ctx.lineWidth = 1.2 * S;
  ctx.stroke();
  drawStar(px + padX + iconSz/2, py + ph/2, iconSz, '#FFD700', null);
  ctx.fillStyle = '#FFD700';
  ctx.fillText(label, px + padX + iconSz + 5*S, py + ph/2);
  ctx.restore();
}

// iter#9: Small max-chain summary line drawn on GAMEOVER only. Sits to the
// LEFT of the title row so it doesn't fight the leaderboard / NEW BEST banner
// / skin picker. Uses tiny font; only renders when player actually built a
// chain this run.
function drawChainSummary() {
  if (maxComboThisRun < 2) return;
  var fs = clamp(13*S, 10, 16);
  var y = cy - 75*S;
  ctx.save();
  ctx.font = 'bold '+fs+'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  if (newBestCombo) {
    // gold treatment when this run set a new lifetime ceiling
    ctx.shadowColor = 'rgba(255,215,0,0.6)';
    ctx.shadowBlur = 14*S;
    ctx.fillStyle = '#FFD700';
    ctx.fillText(t('chain')+' x'+maxComboThisRun+'  '+t('chainNew'), cx, y);
    ctx.shadowColor = 'transparent';
  } else {
    ctx.fillStyle = '#aaa';
    var line = t('chain')+' x'+maxComboThisRun;
    if (bestCombo > 1) line += '  ('+t('chainBest')+' x'+bestCombo+')';
    ctx.fillText(line, cx, y);
  }
  ctx.restore();
}

// Yellow celebratory NEW BEST! banner - drawn over the GAMEOVER overlay when
// the player just beat their saved high score this run.
var newBestAnim = 0;
function drawNewBestBanner() {
  newBestAnim += 0.04;
  var pulse = 1 + Math.sin(newBestAnim * 3) * 0.06;
  var bannerFs = clamp(28*S, 18, 40) * pulse;
  var bannerY = cy - 110*S;

  ctx.save();
  // soft glow halo
  ctx.shadowColor = 'rgba(255,215,0,0.85)';
  ctx.shadowBlur = 30*S;
  ctx.font = 'bold '+bannerFs+'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // outline
  ctx.strokeStyle = 'rgba(120,80,0,0.9)';
  ctx.lineWidth = 5*S;
  ctx.strokeText(t('newbest'), cx, bannerY);
  // gold fill
  ctx.fillStyle = '#FFD700';
  ctx.fillText(t('newbest'), cx, bannerY);
  ctx.restore();

  // sparkle particles around banner
  if (Math.random() < 0.4) {
    var ax = cx + (Math.random()-0.5) * 240*S;
    var ay = bannerY + (Math.random()-0.5) * 50*S;
    spawnParticles(ax, ay, '#FFD700', 1);
  }
}

// ── DRAW DAY SEED BADGE (iter#4) ─────────────────────────────────────────────
// Tiny, low-key label that prints today's UTC date + the seed number so
// players see "everyone's playing the same layout today". Drawn near the top
// of the MENU/GAMEOVER overlay so it sits naturally above the title.
function drawDaySeedBadge() {
  var dateKey = getDayKey();
  var seedNum = getDaySeed();
  var fs = clamp(11*S, 9, 14);
  ctx.save();
  ctx.font = 'bold '+fs+'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  // teal pill bg
  var label = t('daySeed') + ' · ' + dateKey;
  var padX = 12*S, padY = 5*S;
  var w = ctx.measureText(label).width + padX*2;
  var h = fs + padY*2;
  var bx = cx - w/2, by = cy - 130*S;
  ctx.fillStyle = 'rgba(72,201,176,0.18)';
  rr(ctx, bx, by, w, h, h/2);
  ctx.fill();
  ctx.fillStyle = '#48c9b0';
  ctx.fillText(label, cx, by + h - padY - 1*S);
  // sub-line
  var subFs = clamp(10*S, 8, 13);
  ctx.font = subFs+'px sans-serif';
  ctx.fillStyle = '#666';
  ctx.fillText(t('sameLayout'), cx, by + h + subFs + 4*S);
  ctx.restore();
}

// ── DRAW STREAK PILL (iter#5) ────────────────────────────────────────────────
// Small flame-orange pill above the day-seed badge. Shows current streak count
// + "come back tomorrow" sub-line. Pulses on first frame of the visit that
// incremented the streak. No-op when streak is 0 (defensive).
var _streakAnim = 0;
function drawStreakPill() {
  if (streak <= 0) return;
  _streakAnim += 0.06;
  var pulse = streakBumped ? (1 + Math.sin(_streakAnim * 4) * 0.07) : 1;
  var fs = clamp(11*S, 9, 14) * pulse;
  ctx.save();
  ctx.font = 'bold '+fs+'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  // flame icon (vector) + count text
  var label = streak + ' ' + t('streakDays');
  var iconSz = fs * 1.3;
  var padX = 12*S, padY = 5*S;
  var w = ctx.measureText(label).width + iconSz + 6*S + padX*2;
  var h = fs + padY*2;
  var bx = cx - w/2;
  var by = cy - 170*S; // sits above the daily-seed badge (which is at cy - 130*S)
  // pill bg - flame orange, slightly stronger when bumped
  ctx.fillStyle = streakBumped ? 'rgba(255,140,50,0.32)' : 'rgba(255,140,50,0.18)';
  rr(ctx, bx, by, w, h, h/2);
  ctx.fill();
  drawFlameIcon(bx + padX + iconSz/2, by + h/2, iconSz, '#ff944d');
  ctx.fillStyle = '#ff944d';
  ctx.textAlign = 'left';
  ctx.fillText(label, bx + padX + iconSz + 6*S, by + h - padY - 1*S);
  ctx.textAlign = 'center';
  // sub-line only on first visit of the day (don't shout at returning players)
  if (streakBumped) {
    var subFs = clamp(10*S, 8, 13);
    ctx.font = subFs+'px sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText(t('comeBack'), cx, by + h + subFs + 4*S);
  }
  ctx.restore();
}

// ── DRAW ACHIEVEMENT ROW (iter#6) ────────────────────────────────────────────
// Compact 5-icon row drawn at a given vertical centre. Unlocked badges glow,
// locked ones are dimmed + monochrome. Pure display - no input wiring (badges
// are passive milestone markers, tapping them shouldn't do anything).
function drawAchievementRow(yCenter) {
  var iconFs = clamp(20*S, 14, 26);
  var labelFs = clamp(10*S, 8, 13);
  var slotW = iconFs * 2.2;
  var totalW = slotW * (ACHIEVEMENTS.length - 1);
  var startX = cx - totalW / 2;

  // header label "BADGES  3/5"
  ctx.save();
  ctx.font = 'bold '+labelFs+'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#888';
  ctx.fillText(t('badges') + '  ' + achUnlockedCount() + '/' + ACHIEVEMENTS.length,
               cx, yCenter - iconFs - 4*S);

  for (var i = 0; i < ACHIEVEMENTS.length; i++) {
    var a = ACHIEVEMENTS[i];
    var unlocked = !!achUnlocked[a.id];
    var bx = startX + i * slotW;
    if (unlocked) {
      ctx.globalAlpha = 1;
      ctx.shadowColor = 'rgba(255,200,80,0.55)';
      ctx.shadowBlur = 12*S;
      drawBadgeIcon(a.id, bx, yCenter, iconFs, '#ffd57a');
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    } else {
      ctx.globalAlpha = 0.32;
      drawBadgeIcon(a.id, bx, yCenter, iconFs, '#888');
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();
}

// ── DRAW ACHIEVEMENT TOAST (iter#6) ──────────────────────────────────────────
// In-run popup on the frame an unlock fires. Sits high on the screen so it
// doesn't collide with the day-seed/streak pills on the menus, or the score HUD.
function drawAchievementToast() {
  if (!achToastActive) return;
  var ach = null;
  for (var i=0;i<ACHIEVEMENTS.length;i++) if (ACHIEVEMENTS[i].id === achToastActive.id) ach = ACHIEVEMENTS[i];
  if (!ach) return;
  var life = achToastActive.life;
  var alpha = life < 0.15 ? life / 0.15 : 1;
  var fs = clamp(13*S, 10, 17);
  var iconFs = clamp(20*S, 14, 26);
  var headFs = clamp(11*S, 9, 14);
  var label = t(ach.tKey);
  var heading = t('badgeUnlocked');
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = 'bold '+fs+'px sans-serif';
  var w1 = ctx.measureText(label).width;
  ctx.font = 'bold '+headFs+'px sans-serif';
  var w2 = ctx.measureText(heading).width;
  var w = Math.max(w1, w2) + iconFs + 28*S;
  var h = iconFs + fs + 22*S;
  var bx = cx - w/2, by = HUD_H * S + 10*S;
  // warm glow pill
  ctx.shadowColor = 'rgba(255,200,80,0.55)';
  ctx.shadowBlur = 20*S;
  ctx.fillStyle = 'rgba(20,16,8,0.92)';
  rr(ctx, bx, by, w, h, h/2);
  ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  // border accent
  ctx.strokeStyle = '#ffd57a';
  ctx.lineWidth = 2*S;
  rr(ctx, bx, by, w, h, h/2);
  ctx.stroke();
  // icon (vector)
  drawBadgeIcon(ach.id, bx + 14*S + iconFs/2, by + h/2, iconFs, '#ffd57a');
  // heading + label
  ctx.textAlign = 'left';
  ctx.font = 'bold '+headFs+'px sans-serif';
  ctx.fillStyle = '#ffd57a';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(heading, bx + 14*S + iconFs + 10*S, by + headFs + 4*S);
  ctx.font = 'bold '+fs+'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(label, bx + 14*S + iconFs + 10*S, by + h - 7*S);
  ctx.restore();
}

// ════════════════════════════════════════════════════════════════════════════
// ── VECTOR ICONS (milestone#1 - replace ALL emoji; emoji = tofu on headless/
//    Android per Game Build Hygiene #1). Each draws centred at (x,y), size sz.
// ════════════════════════════════════════════════════════════════════════════
function drawSpeakerIcon(x, y, sz, muted) {
  ctx.save(); ctx.translate(x, y);
  var s = sz / 2;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(-s*0.7, -s*0.28); ctx.lineTo(-s*0.28, -s*0.28);
  ctx.lineTo(s*0.05, -s*0.6); ctx.lineTo(s*0.05, s*0.6);
  ctx.lineTo(-s*0.28, s*0.28); ctx.lineTo(-s*0.7, s*0.28); ctx.closePath(); ctx.fill();
  if (muted) {
    ctx.strokeStyle = '#ff8080'; ctx.lineWidth = Math.max(2, sz*0.08); ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(s*0.28, -s*0.32); ctx.lineTo(s*0.72, s*0.32);
    ctx.moveTo(s*0.72, -s*0.32); ctx.lineTo(s*0.28, s*0.32); ctx.stroke();
  } else {
    ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(1.5, sz*0.06); ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(s*0.18, 0, s*0.4, -Math.PI/3, Math.PI/3); ctx.stroke();
    ctx.beginPath(); ctx.arc(s*0.18, 0, s*0.62, -Math.PI/3.2, Math.PI/3.2); ctx.stroke();
  }
  ctx.restore();
}
function drawPlayTvIcon(x, y, sz, col) {
  // a small "rewarded video" glyph: rounded screen + play triangle
  ctx.save(); ctx.translate(x, y);
  var w = sz, h = sz * 0.74;
  rr(ctx, -w/2, -h/2, w, h, sz*0.14);
  ctx.fillStyle = col || '#1a1a2e'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = Math.max(1.4, sz*0.06); ctx.stroke();
  ctx.fillStyle = col || '#1a1a2e';
  ctx.beginPath();
  ctx.moveTo(-sz*0.12, -sz*0.18); ctx.lineTo(sz*0.2, 0); ctx.lineTo(-sz*0.12, sz*0.18); ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.fill();
  ctx.restore();
}
function drawFlameIcon(x, y, sz, col) {
  ctx.save(); ctx.translate(x, y);
  var s = sz / 2;
  ctx.beginPath();
  ctx.moveTo(0, -s);
  ctx.bezierCurveTo(s*0.9, -s*0.2, s*0.5, s*0.9, 0, s);
  ctx.bezierCurveTo(-s*0.55, s*0.9, -s*0.85, -s*0.05, 0, -s);
  ctx.closePath();
  ctx.fillStyle = col || '#ff944d'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, -s*0.1);
  ctx.bezierCurveTo(s*0.42, s*0.2, s*0.22, s*0.7, 0, s*0.75);
  ctx.bezierCurveTo(-s*0.28, s*0.7, -s*0.36, s*0.12, 0, -s*0.1);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,235,120,0.9)'; ctx.fill();
  ctx.restore();
}
// Sprinkle (the currency) - a chunky rounded capsule like a real sprinkle, gold.
function drawSprinkleIcon(x, y, sz, col) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(-0.5);
  var w = sz, h = sz * 0.42;
  rr(ctx, -w/2, -h/2, w, h, h/2);
  var g = ctx.createLinearGradient(-w/2, 0, w/2, 0);
  g.addColorStop(0, '#FFF1A8'); g.addColorStop(0.5, col || '#FFD700'); g.addColorStop(1, '#E0A800');
  ctx.fillStyle = g; ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  rr(ctx, -w*0.34, -h*0.28, w*0.5, h*0.26, h*0.13); ctx.fill();
  ctx.restore();
}
// Per-tool vector icon, switched on tool id. Drawn centred at (x,y), size sz.
function drawToolIcon(id, x, y, sz, col) {
  ctx.save(); ctx.translate(x, y);
  var s = sz / 2;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = Math.max(2, sz*0.085);
  if (id === 'mop') {                    // mop: handle + fan of strands
    ctx.beginPath(); ctx.moveTo(-s*0.5, -s*0.7); ctx.lineTo(s*0.2, s*0.1); ctx.stroke();
    ctx.beginPath();
    for (var i=-2;i<=2;i++){ ctx.moveTo(s*0.2, s*0.1); ctx.lineTo(s*0.2 + i*s*0.16, s*0.72); }
    ctx.stroke();
  } else if (id === 'wax') {             // wax: shine sparkle (4-point)
    ctx.beginPath();
    ctx.moveTo(0,-s*0.85); ctx.lineTo(s*0.18,-s*0.18); ctx.lineTo(s*0.85,0); ctx.lineTo(s*0.18,s*0.18);
    ctx.lineTo(0,s*0.85); ctx.lineTo(-s*0.18,s*0.18); ctx.lineTo(-s*0.85,0); ctx.lineTo(-s*0.18,-s*0.18);
    ctx.closePath(); ctx.fill();
  } else if (id === 'timer') {           // fresh batch: clock
    ctx.beginPath(); ctx.arc(0,0,s*0.8,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-s*0.5); ctx.moveTo(0,0); ctx.lineTo(s*0.4,s*0.2); ctx.stroke();
  } else if (id === 'magnet') {          // magnet: horseshoe
    ctx.lineWidth = Math.max(2.5, sz*0.13);
    ctx.beginPath(); ctx.arc(0,-s*0.1,s*0.55,Math.PI,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s*0.55,-s*0.1); ctx.lineTo(-s*0.55,s*0.6);
    ctx.moveTo(s*0.55,-s*0.1); ctx.lineTo(s*0.55,s*0.6); ctx.stroke();
  } else if (id === 'combo') {           // combo glaze: chain links
    ctx.beginPath(); ctx.arc(-s*0.3,0,s*0.34,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(s*0.3,0,s*0.34,0,Math.PI*2); ctx.stroke();
  } else if (id === 'earn') {            // tip jar: sprinkle on a jar
    rr(ctx, -s*0.5, -s*0.2, s, s*0.95, s*0.18); ctx.stroke();
    drawSprinkleIcon(0, -s*0.55, sz*0.55, col);
  } else if (id === 'shield') {          // crumb shield: shield outline
    ctx.beginPath();
    ctx.moveTo(0,-s*0.85); ctx.lineTo(s*0.7,-s*0.5); ctx.lineTo(s*0.7,s*0.1);
    ctx.bezierCurveTo(s*0.7,s*0.6,0,s*0.9,0,s*0.9);
    ctx.bezierCurveTo(0,s*0.9,-s*0.7,s*0.6,-s*0.7,s*0.1);
    ctx.lineTo(-s*0.7,-s*0.5); ctx.closePath(); ctx.stroke();
  } else if (id === 'golden') {          // golden roller: 5-point star
    ctx.beginPath();
    for (var k=0;k<10;k++){ var a=-Math.PI/2+k*Math.PI/5; var rr2=(k%2===0)?s*0.85:s*0.38; var px=Math.cos(a)*rr2, py=Math.sin(a)*rr2; if(k===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); }
    ctx.closePath(); ctx.fill();
  } else {                                // fallback: filled dot
    ctx.beginPath(); ctx.arc(0,0,s*0.6,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
// 5-point star (vector) - replaces the * glyph (load-bearing star ratings).
function drawStar(x, y, sz, fill, stroke) {
  ctx.save(); ctx.translate(x, y);
  var s = sz / 2;
  ctx.beginPath();
  for (var k = 0; k < 10; k++) {
    var a = -Math.PI/2 + k * Math.PI/5;
    var rad = (k % 2 === 0) ? s : s * 0.42;
    var px = Math.cos(a) * rad, py = Math.sin(a) * rad;
    if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = Math.max(1.4, sz*0.06); ctx.stroke(); }
  ctx.restore();
}
// Badge icons (iter#6) as vector shapes - replaces emoji badges.
function drawBadgeIcon(id, x, y, sz, col) {
  ctx.save(); ctx.translate(x, y);
  var s = sz / 2;
  ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = Math.max(2, sz*0.085);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (id === 'first_sweep') { drawToolIcon('mop', 0, 0, sz, col); }
  else if (id === 'combo_5') { drawFlameIcon(0, 0, sz*0.95, col); }
  else if (id === 'combo_10') {            // bolt
    ctx.beginPath();
    ctx.moveTo(s*0.15,-s*0.85); ctx.lineTo(-s*0.4,s*0.12); ctx.lineTo(0,s*0.12);
    ctx.lineTo(-s*0.15,s*0.85); ctx.lineTo(s*0.45,-s*0.18); ctx.lineTo(0,-s*0.18); ctx.closePath(); ctx.fill();
  } else if (id === 'level_3') {           // target
    ctx.beginPath(); ctx.arc(0,0,s*0.8,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,s*0.42,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,s*0.1,0,Math.PI*2); ctx.fill();
  } else if (id === 'level_5') {           // crown
    ctx.beginPath();
    ctx.moveTo(-s*0.75,s*0.5); ctx.lineTo(-s*0.75,-s*0.35); ctx.lineTo(-s*0.3,s*0.05);
    ctx.lineTo(0,-s*0.55); ctx.lineTo(s*0.3,s*0.05); ctx.lineTo(s*0.75,-s*0.35);
    ctx.lineTo(s*0.75,s*0.5); ctx.closePath(); ctx.fill();
  } else { ctx.beginPath(); ctx.arc(0,0,s*0.6,0,Math.PI*2); ctx.fill(); }
  ctx.restore();
}

// ── DRAW SKIN SELECTOR (iter#3) ──────────────────────────────────────────────
// iter#8: Mute button - 36×36 circle in top-right corner of the canvas.
// Drawn on MENU + GAMEOVER overlays ONLY (never during PLAYING so it
// can't overlap the HUD or compete with the combo badge). Sits in the
// top-right where no existing UI ever renders. Click toggles SFX.
function drawMuteButton() {
  var inset = platformSafeInsets();
  var sz   = clamp(36*S, 28, 48);
  var pad  = clamp(14*S, 10, 20);
  var bx   = W - inset.right - pad - sz;
  var by   = pad;
  muteBtnRect = { x: bx, y: by, w: sz, h: sz };
  // background pill
  ctx.save();
  rr(ctx, bx, by, sz, sz, sz/2);
  ctx.fillStyle = sfxMuted ? 'rgba(60,20,28,0.85)' : 'rgba(20,40,60,0.85)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = 1.4 * S;
  ctx.stroke();
  // icon (vector - no emoji tofu)
  drawSpeakerIcon(bx + sz/2, by + sz/2, sz*0.52, sfxMuted);
  ctx.restore();
  buttons.push({ x: bx, y: by, w: sz, h: sz, fn: toggleMute });
}

// Renders the cosmetic donut row on MENU + GAMEOVER. Tap to swap (only unlocked
// rows are tappable). Locked rows show "BEST 100" hint. Adds button hits to
// the existing buttons[] array so the existing checkButtons() handler picks
// them up - no input rewrite needed.
function drawSkinSelector(yCenter) {
  var skinFs = clamp(11*S, 9, 14);
  var labelFs = clamp(10*S, 8, 13);
  var swatchR = clamp(20*S, 14, 26);
  // 2026-05-15: gap was swatchR*2.6 - too tight for RU labels ("Рекорд 300")
  // which run ~80px wide. Bumped to 3.8× swatchR (with floor) so labels
  // never bleed into each other across languages.
  var gap = Math.max(swatchR * 3.8, 90 * S);
  var totalW = gap * (DONUT_SKINS.length - 1);
  var startX = cx - totalW / 2;

  ctx.font = 'bold '+skinFs+'px sans-serif';
  ctx.fillStyle = '#888';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(t('skin'), cx, yCenter - swatchR - 8*S);

  for (var i = 0; i < DONUT_SKINS.length; i++) {
    var skin = DONUT_SKINS[i];
    var sx = startX + i * gap;
    var sy = yCenter;
    var unlocked = isSkinUnlocked(skin);
    var selected = (skin.id === skinId);

    // outer ring (selection indicator)
    if (selected && unlocked) {
      ctx.beginPath(); ctx.arc(sx, sy, swatchR + 4*S, 0, Math.PI*2);
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2.5*S; ctx.stroke();
    }

    // swatch (donut shape - outer ring + hole)
    ctx.save();
    ctx.globalAlpha = unlocked ? 1 : 0.35;
    ctx.beginPath(); ctx.arc(sx, sy, swatchR, 0, Math.PI*2);
    ctx.arc(sx, sy, swatchR*0.42, 0, Math.PI*2, true);
    ctx.fillStyle = '#F5DEB3'; ctx.fill();
    ctx.beginPath(); ctx.arc(sx, sy, swatchR*0.88, 0, Math.PI*2);
    ctx.arc(sx, sy, swatchR*0.5, 0, Math.PI*2, true);
    ctx.fillStyle = skin.ring;
    ctx.fill();
    ctx.restore();

    // lock overlay
    if (!unlocked) {
      ctx.font = 'bold '+labelFs+'px sans-serif';
      ctx.fillStyle = '#999';
      ctx.fillText(t('unlockAt')+skin.unlock, sx, sy + swatchR + labelFs + 4*S);
    } else {
      ctx.font = labelFs+'px sans-serif';
      ctx.fillStyle = selected ? '#FFD700' : '#aaa';
      var dispName = (lang === 'ru' ? skin.nameRu : skin.name);
      ctx.fillText(dispName, sx, sy + swatchR + labelFs + 4*S);
    }

    // hit area - only for unlocked
    if (unlocked) {
      (function(targetId){
        buttons.push({
          x: sx - swatchR, y: sy - swatchR, w: swatchR*2, h: swatchR*2,
          fn: function() {
            if (skinId !== targetId) { skinId = targetId; saveSkin(); }
          }
        });
      })(skin.id);
    }
  }
}

function drawSkinUnlockToast() {
  if (skinUnlockToast <= 0 || !skinUnlockToastId) return;
  var skin = getSkin(skinUnlockToastId);
  var alpha = Math.min(1, skinUnlockToast * 1.2);
  var fs = clamp(15*S, 12, 20);
  var nameFs = clamp(13*S, 10, 17);
  var toastY = HUD_H * S + 30*S;
  ctx.save();
  ctx.globalAlpha = alpha;
  // pill bg
  ctx.font = 'bold '+fs+'px sans-serif';
  var label = t('unlockedToast');
  var dispName = (lang === 'ru' ? skin.nameRu : skin.name);
  var w = Math.max(ctx.measureText(label).width, ctx.measureText(dispName).width) + 32*S;
  rr(ctx, cx - w/2, toastY - fs, w, fs * 2.6, fs);
  ctx.fillStyle = 'rgba(255,215,0,0.92)';
  ctx.fill();
  // label
  ctx.fillStyle = '#3b2a00';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, toastY);
  ctx.font = 'bold '+nameFs+'px sans-serif';
  ctx.fillText(dispName, cx, toastY + fs * 1.1);
  ctx.restore();
}

// ── DRAW LEADERBOARD (iter#2) ────────────────────────────────────────────────
// Renders the cached top-N below the game-over button. Highlights current
// player's row. Skips silently when offline / list empty.
function drawLeaderboard() {
  if (!leaderboard || leaderboard.length === 0) return;

  // Show up to 5 rows on the overlay (top-10 cached, top-5 displayed for space)
  var rows = leaderboard.slice(0, 5);
  var btnH = clamp(52*S, 40, 66);
  var btnY = cy + 20*S;
  var startY = btnY + btnH + 60*S;
  var rowH = clamp(20*S, 16, 26);
  var headerFs = clamp(13*S, 11, 17);
  var rowFs = clamp(12*S, 10, 16);

  // Header
  var headerTxt = t('leaderboard');
  if (myRank) headerTxt += ' - ' + t('rank') + ': #' + myRank;
  ctx.font = 'bold '+headerFs+'px sans-serif';
  ctx.fillStyle = '#48c9b0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(headerTxt, cx, startY);

  // Rows
  ctx.font = rowFs+'px sans-serif';
  for (var i = 0; i < rows.length; i++) {
    var entry = rows[i];
    var rowY = startY + (i + 1) * rowH + 4*S;
    var isMe = entry.name && entry.name === playerName;
    ctx.fillStyle = isMe ? '#FFD700' : '#aaa';
    var rank = '#' + (i + 1);
    var name = (entry.name || '?').slice(0, 12);
    if (isMe) name += ' (' + t('you') + ')';
    var sc = entry.score;
    // simple 3-column row centered around cx
    ctx.textAlign = 'left';
    ctx.fillText(rank, cx - 110*S, rowY);
    ctx.textAlign = 'left';
    ctx.fillText(name, cx - 80*S, rowY);
    ctx.textAlign = 'right';
    ctx.fillText(String(sc), cx + 110*S, rowY);
  }
}

// iter#11: GAMEOVER "Yesterday -> Today" pill - daily-seed delta loop.
// Renders below the leaderboard (or, if no leaderboard, below the retry/revive
// stack). Stays compact + single-line on mobile to avoid clipping bottom of
// viewport. Gold delta if today > yesterday, dim if today < yesterday, neutral
// if equal. If there's no yesterday entry (first-day player) we show a
// one-line "come back tomorrow" hint instead - closes the loop without
// pretending data exists.
function drawYesterdayPill() {
  // Y anchor: stack BELOW the leaderboard if it rendered, else below the
  // revive button. Same math as drawLeaderboard for the base Y.
  var btnH = clamp(52*S, 40, 66);
  var btnY = cy + 20*S;
  var lbHasRows = (leaderboard && leaderboard.length > 0);
  var rowH = clamp(20*S, 16, 26);
  var startY;
  if (lbHasRows) {
    var rows = Math.min(5, leaderboard.length);
    var lbStartY = btnY + btnH + 60*S;
    startY = lbStartY + (rows + 1) * rowH + 22*S;
  } else {
    // below revive button (if shown) or below retry
    startY = btnY + btnH + (extraTimeUsed ? 30*S : (clamp(42*S,34,54) + 30*S));
  }

  // Compose the line
  var fs = clamp(12*S, 10, 16);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';

  if (yesterdayScore <= 0) {
    // first-day player - short hint, low chroma so it doesn't fight the LB
    ctx.fillStyle = '#7a7a8a';
    ctx.font = fs + 'px sans-serif';
    ctx.fillText(t('firstDailyRun'), cx, startY);
    return;
  }

  // Use the higher of today's run vs today's saved (in case multiple runs today)
  var todayShown = Math.max(todayBestScore, score);
  var delta = todayShown - yesterdayScore;
  var deltaStr = (delta >= 0 ? '+' : '') + delta;
  var col = delta > 0 ? '#FFD700' : (delta < 0 ? '#c97070' : '#aaaaaa');

  // Single line: "Yesterday: 1240 -> Today: 1320 (+80)"
  var line = t('yesterday') + ': ' + yesterdayScore + '  ' + String.fromCharCode(0x2192) + '  ' +
             t('today') + ': ' + todayShown + '  (' + deltaStr + ')';
  // measure to make sure it fits the canvas - if not, downsize one notch
  var widthGuess = ctx.measureText(line).width;
  if (widthGuess > W - 24*S) {
    fs = Math.max(10, fs - 2);
    ctx.font = 'bold ' + fs + 'px sans-serif';
  }
  ctx.fillStyle = col;
  ctx.fillText(line, cx, startY);
}

// ── iter#14: GAMEOVER 7-day rolling best pill ────────────────────────────────
// Sits BELOW the yesterday pill (which already sits below the leaderboard).
// Renders nothing while we have no data points (weekBestScore === 0). Purple
// because every other meta pill already claimed a colour (teal=seed,
// orange=streak, gold=newbest, grey=neutral). Gold pulse + sub-line when
// weekBestIsNew (this run beat the prior 6-day high).
var _weekPillAnim = 0;
function drawWeekBestPill() {
  if (weekBestScore <= 0) return;
  // Compute Y by stacking under the yesterday pill. The yesterday pill uses
  // the same anchor math as drawLeaderboard - replicate so we stay in sync.
  var btnH = clamp(52*S, 40, 66);
  var btnY = cy + 20*S;
  var lbHasRows = (leaderboard && leaderboard.length > 0);
  var rowH = clamp(20*S, 16, 26);
  var yesterdayY;
  if (lbHasRows) {
    var rows = Math.min(5, leaderboard.length);
    var lbStartY = btnY + btnH + 60*S;
    yesterdayY = lbStartY + (rows + 1) * rowH + 22*S;
  } else {
    yesterdayY = btnY + btnH + (extraTimeUsed ? 30*S : (clamp(42*S,34,54) + 30*S));
  }
  // Our Y: ~22*S below the yesterday line
  var startY = yesterdayY + clamp(22*S, 16, 28);
  // Pulse animation on new 7-day best
  _weekPillAnim += 0.06;
  var pulse = weekBestIsNew ? (1 + Math.sin(_weekPillAnim * 4) * 0.06) : 1;
  var fs = clamp(11*S, 9, 14) * pulse;
  ctx.save();
  ctx.font = 'bold '+fs+'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  var label = t('weekBest') + ': ' + weekBestScore;
  var padX = 12*S, padY = 5*S;
  var w = ctx.measureText(label).width + padX*2;
  var h = fs + padY*2;
  var bx = cx - w/2, by = startY - h + padY;
  // Purple pill bg, gold tint when fresh best
  if (weekBestIsNew) {
    ctx.fillStyle = 'rgba(255,215,0,0.22)';
  } else {
    ctx.fillStyle = 'rgba(155,120,210,0.18)';
  }
  rr(ctx, bx, by, w, h, h/2);
  ctx.fill();
  ctx.fillStyle = weekBestIsNew ? '#FFD700' : '#b89df0';
  ctx.fillText(label, cx, by + h - padY - 1*S);
  // Sub-line only when this run set a new ceiling
  if (weekBestIsNew) {
    var subFs = clamp(10*S, 8, 13);
    ctx.font = 'bold '+subFs+'px sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.fillText(t('weekBestNew'), cx, by + h + subFs + 4*S);
  }
  ctx.restore();
}

// ════════════════════════════════════════════════════════════════════════════
// ── WORKSHOP OVERLAY (milestone#1/#2/#3) - the meta hub ──────────────────────
//   Fully OPAQUE fullscreen panel (Build Hygiene #12) reachable mid-run (pause),
//   from the MENU, and from GAMEOVER. Two tabs: TOOLS (equip + upgrade the
//   playtime-item ladder) and QUESTS (claim daily quests). Closes back to where
//   it was opened (prevGs). All buttons register into the shared buttons[] array.
// ════════════════════════════════════════════════════════════════════════════
var prevGs = 'MENU';        // state to return to when the workshop closes
var workshopTab = 'tools';  // 'tools' | 'quests'
function openWorkshop() {
  if (gs === 'WORKSHOP') return;
  prevGs = gs; gs = 'WORKSHOP';
  ensureDailyQuests();
  try { sfxClick(); } catch(e) {}
}
function closeWorkshop() {
  gs = (prevGs === 'WORKSHOP') ? 'MENU' : prevGs;
  try { sfxClick(); } catch(e) {}
}

// Top sprinkle-balance chip used across overlays. Returns the bottom Y.
function drawSprinkleBalance(centerX, topY) {
  var fs = clamp(15*S, 12, 20);
  var iconSz = fs * 1.25;
  var label = String(meta ? meta.sprinkles : 0);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  var tw = ctx.measureText(label).width;
  var padX = clamp(12*S, 9, 16), padY = clamp(7*S, 5, 11);
  var w = tw + iconSz + 7*S + padX*2, h = fs + padY*2;
  var bx = centerX - w/2;
  rr(ctx, bx, topY, w, h, h/2);
  ctx.fillStyle = 'rgba(255,215,0,0.12)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,215,0,0.45)'; ctx.lineWidth = 1.2*S; ctx.stroke();
  drawSprinkleIcon(bx + padX + iconSz/2, topY + h/2, iconSz, '#FFD700');
  ctx.fillStyle = '#FFE066'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  if (sprinkleEarnFlash > 0) ctx.globalAlpha = 0.7 + sprinkleEarnFlash * 0.3;
  ctx.fillText(label, bx + padX + iconSz + 7*S, topY + h/2);
  ctx.globalAlpha = 1; ctx.textBaseline = 'alphabetic';
  return topY + h;
}

function drawWorkshop() {
  buttons = [];
  // OPAQUE fullscreen fill (#12 - no bleed-through of the menu/gameplay behind).
  ctx.fillStyle = '#13101e'; ctx.fillRect(0, 0, W, H);
  // soft top vignette
  var vg = ctx.createLinearGradient(0, 0, 0, H);
  vg.addColorStop(0, 'rgba(46,204,113,0.10)'); vg.addColorStop(0.25, 'rgba(46,204,113,0)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);

  var marginX = clamp(W * 0.07, 16, W * 0.16);
  var titleFs = clamp(24*S, 18, 34);
  // Title
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(t('workshop'), cx, 44*S);

  // Close (X) - top-right
  var xSz = clamp(34*S, 28, 44), xPad = clamp(12*S, 9, 18);
  var xX = W - xPad - xSz, xY = xPad;
  rr(ctx, xX, xY, xSz, xSz, xSz*0.28);
  ctx.fillStyle = 'rgba(255,255,255,0.10)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = Math.max(2, xSz*0.07);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(xX + xSz*0.32, xY + xSz*0.32); ctx.lineTo(xX + xSz*0.68, xY + xSz*0.68);
  ctx.moveTo(xX + xSz*0.68, xY + xSz*0.32); ctx.lineTo(xX + xSz*0.32, xY + xSz*0.68);
  ctx.stroke();
  buttons.push({ x: xX, y: xY, w: xSz, h: xSz, fn: closeWorkshop });

  // Sprinkle balance chip (centered under title)
  var balBottom = drawSprinkleBalance(cx, 60*S);

  // Tab switcher (TOOLS / QUESTS)
  var tabY = balBottom + 12*S;
  var tabH = clamp(34*S, 28, 44);
  var tabW = clamp(120*S, 90, 160);
  var tabGap = 8*S;
  var tabsX = cx - tabW - tabGap/2;
  var tabDefs = [ ['tools', t('tools')], ['quests', t('quests')] ];
  for (var ti = 0; ti < 2; ti++) {
    var tabX = tabsX + ti * (tabW + tabGap);
    var active = (workshopTab === tabDefs[ti][0]);
    rr(ctx, tabX, tabY, tabW, tabH, tabH/2);
    ctx.fillStyle = active ? 'rgba(46,204,113,0.85)' : 'rgba(255,255,255,0.07)';
    ctx.fill();
    ctx.fillStyle = active ? '#06200f' : '#bbb';
    ctx.font = 'bold ' + clamp(13*S, 11, 17) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    // quest claimable badge
    var lbl = tabDefs[ti][1];
    ctx.fillText(lbl, tabX + tabW/2, tabY + tabH/2);
    if (tabDefs[ti][0] === 'quests') {
      var qc = questClaimable();
      if (qc > 0) {
        var bdR = clamp(9*S, 7, 12);
        var bdX = tabX + tabW - bdR - 4*S, bdY = tabY + bdR + 3*S;
        ctx.beginPath(); ctx.arc(bdX, bdY, bdR, 0, Math.PI*2);
        ctx.fillStyle = '#FFD700'; ctx.fill();
        ctx.fillStyle = '#1a1a2e'; ctx.font = 'bold ' + clamp(11*S,9,13) + 'px sans-serif';
        ctx.fillText(String(qc), bdX, bdY + 0.5*S);
      }
    }
    ctx.textBaseline = 'alphabetic';
    (function(tab){ buttons.push({ x: tabX, y: tabY, w: tabW, h: tabH, fn: function(){ workshopTab = tab; try{sfxClick();}catch(e){} } }); })(tabDefs[ti][0]);
  }
  ctx.textAlign = 'center';

  var bodyTop = tabY + tabH + 16*S;
  if (workshopTab === 'tools') drawWorkshopTools(marginX, bodyTop);
  else                          drawWorkshopQuests(marginX, bodyTop);
}

// TOOLS tab - the playtime-item ladder: each tool row shows icon, name, level,
// equip toggle, and an upgrade button (cost in sprinkles). Locked rows show the
// "play N min to unlock" hint. Scroll-free: rows are sized to fit the column.
function drawWorkshopTools(marginX, top) {
  // equipped-slots strip
  var slotSz = clamp(46*S, 36, 60), slotGap = clamp(12*S, 8, 18);
  var slotsW = slotSz * 3 + slotGap * 2;
  var slotsX = cx - slotsW/2;
  ctx.font = 'bold ' + clamp(11*S,9,14) + 'px sans-serif';
  ctx.fillStyle = '#888'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(t('equipped'), cx, top);
  var slotsY = top + 8*S;
  for (var si = 0; si < 3; si++) {
    var sX = slotsX + si * (slotSz + slotGap);
    rr(ctx, sX, slotsY, slotSz, slotSz, slotSz*0.22);
    ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
    ctx.strokeStyle = 'rgba(46,204,113,0.5)'; ctx.setLineDash([4*S,4*S]); ctx.lineWidth = 1.4*S;
    ctx.stroke(); ctx.setLineDash([]);
    var eid = meta && meta.equipped[si];
    if (eid && TOOL_BY_ID[eid]) {
      drawToolIcon(eid, sX + slotSz/2, slotSz/2 + slotsY, slotSz*0.56, TOOL_BY_ID[eid].col);
      (function(id){ buttons.push({ x: sX, y: slotsY, w: slotSz, h: slotSz, fn: function(){ toggleEquip(id); } }); })(eid);
    }
  }

  // tool ladder list
  var listTop = slotsY + slotSz + 16*S;
  var rowH = clamp(50*S, 40, 62), rowGap = 7*S;
  var rowW = W - marginX*2;
  var n = TOOL_DEFS.length;
  // shrink rows if they'd overflow the viewport bottom
  var avail = H - listTop - 14*S;
  var totalNeeded = n * rowH + (n-1) * rowGap;
  if (totalNeeded > avail) { rowH = Math.max(30, (avail - (n-1)*rowGap) / n); }
  var mins = totalPlayMin();
  for (var i = 0; i < n; i++) {
    var def = TOOL_DEFS[i];
    var owned = meta && meta.tools[def.id];
    var rowY = listTop + i * (rowH + rowGap);
    if (rowY > H - 10*S) break;
    rr(ctx, marginX, rowY, rowW, rowH, clamp(10*S,7,14));
    ctx.fillStyle = owned ? 'rgba(255,255,255,0.055)' : 'rgba(255,255,255,0.02)';
    ctx.fill();
    var iconCX = marginX + rowH*0.5;
    ctx.globalAlpha = owned ? 1 : 0.4;
    // icon disc
    ctx.beginPath(); ctx.arc(iconCX, rowY + rowH/2, rowH*0.32, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fill();
    drawToolIcon(def.id, iconCX, rowY + rowH/2, rowH*0.42, owned ? def.col : '#777');
    ctx.globalAlpha = 1;
    // name + desc
    var nameFs = clamp(13*S, 11, 16), descFs = clamp(10*S, 8, 12);
    var textX = iconCX + rowH*0.42;
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    ctx.font = 'bold ' + nameFs + 'px sans-serif';
    ctx.fillStyle = owned ? '#fff' : '#999';
    var nm = (lang === 'ru' ? def.ru : def.en);
    var c = owned ? meta.tools[def.id] : null;
    ctx.fillText(nm + (c ? '  ' + t('lvlAbbr') + c.lvl : ''), textX, rowY + rowH*0.42);
    ctx.font = descFs + 'px sans-serif'; ctx.fillStyle = '#9a9aaa';
    ctx.fillText((lang === 'ru' ? def.descRu : def.descEn), textX, rowY + rowH*0.72);

    // right side: equip toggle + upgrade button (owned) OR unlock hint (locked)
    var btnH = clamp(rowH*0.56, 22, 34);
    var btnY = rowY + (rowH - btnH)/2;
    if (owned) {
      var isEq = meta.equipped.indexOf(def.id) >= 0;
      // upgrade button
      var maxed = c.lvl >= TOOL_MAX_LVL;
      var upW = clamp(76*S, 58, 100);
      var upX = marginX + rowW - upW - 8*S;
      rr(ctx, upX, btnY, upW, btnH, btnH/2);
      var canAfford = !maxed && meta.sprinkles >= upCost(def.id);
      ctx.fillStyle = maxed ? 'rgba(255,255,255,0.08)' : (canAfford ? 'rgba(255,215,0,0.85)' : 'rgba(255,215,0,0.22)');
      ctx.fill();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + clamp(11*S,9,13) + 'px sans-serif';
      if (maxed) { ctx.fillStyle = '#888'; ctx.fillText(t('maxed'), upX + upW/2, btnY + btnH/2); }
      else {
        ctx.fillStyle = canAfford ? '#3a2a00' : '#8a7320';
        var costSz = btnH*0.5;
        var costLbl = String(upCost(def.id));
        var ctw = ctx.measureText(costLbl).width;
        drawSprinkleIcon(upX + upW/2 - ctw/2 - costSz*0.6, btnY + btnH/2, costSz, canAfford ? '#3a2a00' : '#8a7320');
        ctx.fillText(costLbl, upX + upW/2 + costSz*0.35, btnY + btnH/2);
      }
      if (!maxed) (function(id){ buttons.push({ x: upX, y: btnY, w: upW, h: btnH, fn: function(){ buyToolUpgrade(id); } }); })(def.id);
      // equip toggle
      var eqW = clamp(72*S, 54, 96);
      var eqX = upX - eqW - 7*S;
      rr(ctx, eqX, btnY, eqW, btnH, btnH/2);
      ctx.fillStyle = isEq ? 'rgba(46,204,113,0.85)' : 'rgba(255,255,255,0.10)';
      ctx.fill();
      ctx.fillStyle = isEq ? '#06200f' : '#ccc';
      ctx.font = 'bold ' + clamp(11*S,9,13) + 'px sans-serif';
      ctx.fillText(isEq ? t('unequip') : t('equip'), eqX + eqW/2, btnY + btnH/2);
      (function(id){ buttons.push({ x: eqX, y: btnY, w: eqW, h: btnH, fn: function(){ toggleEquip(id); } }); })(def.id);
      ctx.textBaseline = 'alphabetic';
    } else {
      // locked: "play N min" hint
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + clamp(11*S,9,14) + 'px sans-serif';
      ctx.fillStyle = '#FFD700';
      var remain = Math.max(0, Math.ceil(def.min - mins));
      ctx.fillText(remain + t('minAbbr'), marginX + rowW - 12*S, rowY + rowH/2);
      ctx.fillStyle = '#777'; ctx.font = clamp(9*S,8,11) + 'px sans-serif';
      ctx.fillText(t('locked2'), marginX + rowW - 12*S, rowY + rowH*0.74);
      ctx.textBaseline = 'alphabetic';
    }
  }
  ctx.textAlign = 'center';
}

// QUESTS tab - 3 daily quests with progress bars + claim buttons.
function drawWorkshopQuests(marginX, top) {
  ensureDailyQuests();
  var items = (meta && meta.quests.items) || [];
  var rowW = W - marginX*2;
  var rowH = clamp(64*S, 50, 82), rowGap = 12*S;
  for (var i = 0; i < items.length; i++) {
    var q = items[i];
    var def = questDef(q.id); if (!def) continue;
    var rowY = top + i * (rowH + rowGap);
    rr(ctx, marginX, rowY, rowW, rowH, clamp(12*S,8,16));
    ctx.fillStyle = q.done ? 'rgba(46,204,113,0.10)' : 'rgba(255,255,255,0.045)';
    ctx.fill();
    // label
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    ctx.font = 'bold ' + clamp(13*S,11,16) + 'px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText((lang === 'ru' ? def.ru : def.en), marginX + 14*S, rowY + 22*S);
    // progress bar
    var barX = marginX + 14*S, barW = rowW - 28*S - clamp(86*S,64,110), barH = 9*S;
    var barY = rowY + rowH - 22*S;
    rr(ctx, barX, barY, barW, barH, barH/2);
    ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fill();
    var prog = Math.min(1, q.prog / q.goal);
    if (prog > 0) {
      rr(ctx, barX, barY, barW * prog, barH, barH/2);
      ctx.fillStyle = q.done ? '#FFD700' : '#2ecc71'; ctx.fill();
    }
    ctx.font = clamp(11*S,9,13) + 'px sans-serif'; ctx.fillStyle = '#aaa';
    ctx.fillText(Math.min(q.prog, q.goal) + ' / ' + q.goal, barX, rowY + rowH - 28*S);
    // reward / claim button
    var rw = clamp(86*S, 64, 110), rh = clamp(36*S, 28, 46);
    var rX = marginX + rowW - rw - 12*S, rY = rowY + (rowH - rh)/2;
    rr(ctx, rX, rY, rw, rh, rh/2);
    var claimable = q.done && !q.claimed;
    ctx.fillStyle = q.claimed ? 'rgba(255,255,255,0.06)' : (claimable ? 'rgba(255,215,0,0.9)' : 'rgba(255,255,255,0.08)');
    ctx.fill();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + clamp(11*S,9,13) + 'px sans-serif';
    if (q.claimed) { ctx.fillStyle = '#777'; ctx.fillText(t('claimed'), rX + rw/2, rY + rh/2); }
    else if (claimable) {
      ctx.fillStyle = '#3a2a00';
      var rSz = rh*0.5; var rLbl = '+25';
      var rtw = ctx.measureText(rLbl).width;
      drawSprinkleIcon(rX + rw/2 - rtw/2 - rSz*0.55, rY + rh/2, rSz, '#3a2a00');
      ctx.fillText(rLbl, rX + rw/2 + rSz*0.35, rY + rh/2);
      (function(id){ buttons.push({ x: rX, y: rY, w: rw, h: rh, fn: function(){ claimQuest(id); } }); })(q.id);
    } else {
      ctx.fillStyle = '#bbb';
      var rSz2 = rh*0.5; var rLbl2 = '+25';
      var rtw2 = ctx.measureText(rLbl2).width;
      drawSprinkleIcon(rX + rw/2 - rtw2/2 - rSz2*0.55, rY + rh/2, rSz2, '#bbb');
      ctx.fillText(rLbl2, rX + rw/2 + rSz2*0.35, rY + rh/2);
    }
    ctx.textBaseline = 'alphabetic';
  }
  // Baker's Pass + 2x-ad card below the quests (milestone#3 monetization).
  var passY = top + items.length * (rowH + rowGap) + 6*S;
  drawPassCard(marginX, passY, rowW);
  ctx.textAlign = 'center';
}

// milestone#3: one-time Baker's Pass + a rewarded 2x-sprinkle button. Never
// punishing; if not owned, shows the offer; if owned, shows ACTIVE.
function drawPassCard(marginX, y, rowW) {
  if (y > H - 60*S) return; // skip if it would overflow (mobile)
  var h = clamp(58*S, 46, 72);
  rr(ctx, marginX, y, rowW, h, clamp(12*S,8,16));
  var owned = meta && meta.pass;
  ctx.fillStyle = owned ? 'rgba(255,215,0,0.12)' : 'rgba(167,139,250,0.14)';
  ctx.fill();
  ctx.strokeStyle = owned ? 'rgba(255,215,0,0.5)' : 'rgba(167,139,250,0.5)';
  ctx.lineWidth = 1.3*S; ctx.stroke();
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold ' + clamp(13*S,11,16) + 'px sans-serif';
  ctx.fillStyle = owned ? '#FFD700' : '#c4b5fd';
  ctx.fillText(t('bakerPass'), marginX + 14*S, y + 22*S);
  ctx.font = clamp(10*S,8,12) + 'px sans-serif'; ctx.fillStyle = '#9a9aaa';
  ctx.fillText(t('passDesc'), marginX + 14*S, y + h - 14*S);
  var bw = clamp(96*S, 72, 124), bh = clamp(34*S, 28, 44);
  var bX = marginX + rowW - bw - 12*S, bY = y + (h - bh)/2;
  rr(ctx, bX, bY, bw, bh, bh/2);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + clamp(11*S,9,13) + 'px sans-serif';
  if (owned) { ctx.fillStyle = 'rgba(255,215,0,0.25)'; ctx.fill(); ctx.fillStyle = '#FFD700'; ctx.fillText(t('passOwned'), bX + bw/2, bY + bh/2); }
  else { ctx.fillStyle = 'rgba(167,139,250,0.9)'; ctx.fill(); ctx.fillStyle = '#1a0f2e'; ctx.fillText(t('getPass'), bX + bw/2, bY + bh/2);
    buttons.push({ x: bX, y: bY, w: bw, h: bh, fn: buyBakerPass }); }
  ctx.textBaseline = 'alphabetic';
}

// ── WELCOME-BACK / DAILY LOGIN CARD ──────────────────────────────────────────
// Shown on MENU when there's an unclaimed login/overnight reward. A single
// CLAIM button banks the sprinkles. Non-RV recovery from dead-broke (1.15) -
// this always grants the player currency just for opening the game.
function drawLoginCard() {
  if (pendingLogin <= 0) return;
  // dim scrim so the card reads as a modal
