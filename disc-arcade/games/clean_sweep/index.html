// ── HANDS-ON TUTORIAL (milestone - action-gated, animated demo hand) ─────────
// The game had NO interactive tutorial (just static menu strings shown nowhere).
// This is action-gated per Game Build Hygiene #10: the tutorial ends only after
// the player performs the REAL action. An animated vector HAND demonstrates the
// gesture; a slim caption pill sits above it; a SKIP button is always available.
//   clean the first 3 debris objects (drag/roll) - then tutorial is done
var TUT_KEY = 'clean_sweep_seen_tut_v2';
var tut = { active:false, step:0, t:0, startCleans:0 };
function maybeStartTutorial() {
  var seen = false;
  try { seen = localStorage.getItem(TUT_KEY) === '1'; } catch(e) {}
  if (seen) return;
  tut.active = true; tut.step = 0; tut.t = 0; tut.startCleans = 0;
}
function endTutorial() {
  tut.active = false;
  try { localStorage.setItem(TUT_KEY, '1'); } catch(e) {}
}
function drawTutorial() {
  if (!tut.active || gs !== 'PLAYING') return;
  tut.t += 0.016;
  var capKey = 'tut_drag';
  // dim scrim (light - keep the board visible, per the demo-hand UX note)
  ctx.save();
  ctx.fillStyle = 'rgba(6,5,15,0.22)'; ctx.fillRect(0, 0, W, H);
  // animated hand: a looping drag near the donut toward the nearest crumb
  var hx = donut.x, hy = donut.y;
  var tx = hx + 70*S, ty = hy; // default direction
  // aim at the nearest debris if any
  var best = 1e9, bd = null;
  for (var i = 0; i < debrisList.length; i++) {
    var d = debrisList[i]; var dx = d.x - hx, dy = d.y - hy; var dd = dx*dx+dy*dy;
    if (dd < best) { best = dd; bd = d; }
  }
  if (bd) { tx = bd.x; ty = bd.y; }
  var loop = (tut.t % 1.8) / 1.8;
  var px = lerp(hx, tx, Math.min(1, loop * 1.4));
  var py = lerp(hy, ty, Math.min(1, loop * 1.4));
  // dashed path
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2*S; ctx.setLineDash([6*S, 6*S]);
  ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(tx, ty); ctx.stroke(); ctx.setLineDash([]);
  // rings: grab (yellow) at start, target (green) at end
  ctx.strokeStyle = 'rgba(255,215,0,0.8)'; ctx.lineWidth = 2.5*S;
  ctx.beginPath(); ctx.arc(hx, hy, 22*S, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = 'rgba(46,204,113,0.8)';
  ctx.beginPath(); ctx.arc(tx, ty, 16*S, 0, Math.PI*2); ctx.stroke();
  drawHand(px, py, 30*S);
  ctx.restore();
  // caption pill above the hand
  var capFs = clamp(15*S, 12, 20);
  ctx.font = 'bold ' + capFs + 'px sans-serif';
  var cap = t(capKey);
  var cw = ctx.measureText(cap).width + 28*S, ch = capFs + 18*S;
  var cyy = Math.max(HUD_H*S + 50*S, Math.min(py - 60*S, H - 120*S));
  var cxx = clamp(px, cw/2 + 8, W - cw/2 - 8);
  rr(ctx, cxx - cw/2, cyy, cw, ch, ch/2);
  ctx.fillStyle = 'rgba(12,12,24,0.92)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1.2*S; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(cap, cxx, cyy + ch/2);
  ctx.textBaseline = 'alphabetic';
  // SKIP button - top-right under the HUD
  var skFs = clamp(11*S, 9, 14);
  ctx.font = 'bold ' + skFs + 'px sans-serif';
  var skLbl = t('tutSkip');
  var skW = ctx.measureText(skLbl).width + 22*S, skH = skFs + 12*S;
  var skX = W - skW - 12*S, skY = HUD_H*S + 8*S;
  rr(ctx, skX, skY, skW, skH, skH/2);
  ctx.fillStyle = 'rgba(255,255,255,0.10)'; ctx.fill();
  ctx.fillStyle = '#bbb'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(skLbl, skX + skW/2, skY + skH/2);
  ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'center';
  buttons.push({ x: skX, y: skY, w: skW, h: skH, fn: endTutorial });
}
// Vector hand (pointing) - reused by the tutorial demo.
function drawHand(x, y, sz) {
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = Math.max(1.2, sz*0.04);
  var s = sz;
  // palm
  rr(ctx, -s*0.22, -s*0.05, s*0.5, s*0.62, s*0.18);
  ctx.fill(); ctx.stroke();
  // index finger pointing up-left
  ctx.save(); ctx.rotate(-0.35);
  rr(ctx, -s*0.16, -s*0.5, s*0.18, s*0.55, s*0.09);
  ctx.fill(); ctx.stroke();
  ctx.restore();
  ctx.restore();
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function frame(ts) {
  var dt = Math.min((ts - lastTs) / 1000, 0.08);
  lastTs = ts;

  update(dt);

  var sx = 0, sy = 0;
  if (shake > 0) { sx=(Math.random()-0.5)*shake*12*S; sy=(Math.random()-0.5)*shake*12*S; }

  ctx.save();
  ctx.translate(sx, sy);
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(-20, -20, W+40, H+40);

  if (gs === 'PLAYING' || gs === 'LEVELEND') {
    drawArena();

    // debris
    for (var i = 0; i < debrisList.length; i++) drawDebris(debrisList[i]);
    // iter#12: golden sprinkle pickups (drawn after debris so they sit on top)
    for (var spi2 = 0; spi2 < sprinkleList.length; spi2++) drawSprinkle(sprinkleList[spi2]);

    // particles
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
    }
    ctx.globalAlpha = 1;

    // floating texts
    for (var i = 0; i < floats.length; i++) {
      var f = floats[i];
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.font = 'bold '+clamp(14*S,11,20)+'px sans-serif';
      ctx.fillStyle = f.col; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(f.txt, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    drawDonut(donut.x, donut.y);
    drawHUD();
    // milestone#1/#2: meta HUD - WORKSHOP pill + sprinkle bank + "next tool in Nm"
    if (gs === 'PLAYING') drawMetaHud();
  }

  ctx.restore();

  if (gs === 'MENU') {
    ctx.fillStyle = '#0a0a12'; ctx.fillRect(0,0,W,H);
    drawOverlay(t('title'), t('sub'), t('play'), function() { score=0; maybeStartTutorial(); startLevel(1); });
    // iter#5: streak pill above the day-seed badge
    drawStreakPill();
    // iter#4: daily-seed badge above the title
    drawDaySeedBadge();
    // iter#3: cosmetic donut picker below the BEST: line
    drawSkinSelector(cy + 20*S + clamp(52*S, 40, 66) + 80*S);
    // iter#6: achievement badge row near the bottom of the menu
    drawAchievementRow(H - 36*S);
    // milestone#3: limited-time event banner - between the skin picker and badges
    drawEventBanner(cy + 20*S + clamp(52*S, 40, 66) + 80*S + clamp(20*S,14,26) + 30*S);
    // milestone#1/#2: WORKSHOP button (opens the meta hub) - top-left, fixed slot
    drawWorkshopButton(14*S, 14*S);
    // iter#10: *N/30 lifetime stars pill - below the workshop button when present
    drawTotalStarsPillAt(14*S, 14*S + clamp(30*S, 24, 40) + 8*S);
    // iter#8: mute toggle (top-right corner)
    drawMuteButton();
    // milestone#2: welcome-back / daily-login card (drawn LAST = on top, modal)
    drawLoginCard();
  }
  if (gs === 'LEVELEND') {
    drawOverlay(t('complete'), t('score')+': '+score, t('next'),
      function() { startLevel(level+1); });
    // iter#10: per-level 1-3 star rating between title and NEXT button
    drawLevelEndStars();
    // iter#13: PERFECT SWEEP stamp (sits below the star row, above the NEXT button)
    drawPerfectSweepStamp();
    // milestone#1: show sprinkles earned this level + a WORKSHOP shortcut
    if (lastLevelSprinkles > 0) {
      var leFs = clamp(14*S, 11, 18);
      ctx.font = 'bold ' + leFs + 'px sans-serif';
      var leLbl = '+' + lastLevelSprinkles;
      var leIc = leFs * 1.2;
      var leTw = ctx.measureText(leLbl).width;
      var leY = cy - 8*S + clamp(38*S,22,54) * 1.7;
      drawSprinkleIcon(cx - leTw/2 - leIc*0.6, leY, leIc, '#FFD700');
      ctx.fillStyle = '#FFE066'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(leLbl, cx + leIc*0.3, leY);
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    }
    drawWorkshopButton(14*S, 14*S);
    drawMuteButton();
  }
  if (gs === 'GAMEOVER') {
    // (best is already live-tracked during play; saveBest also runs on each new high)
    // iter#7: RETRY now routes through a throttled interstitial (Yandex 4.1)
    drawOverlay(t('gameover'), t('score')+': '+score, t('retry'),
      function() { showInterstitial(function() { score=0; startLevel(1); }); });

    // iter#7: EXTRA TIME (rewarded ad). One revive per level; user-click only.
    if (!extraTimeUsed) {
      var _btnW = clamp(240*S, 160, 320), _btnH = clamp(52*S, 40, 66);
      var _btnY = cy + 26*S;
      var rW = _btnW, rH = clamp(42*S, 34, 54);
      var rX = cx - rW/2;
      var rY = _btnY + _btnH + 14*S;
      reviveBtnRect = { x: rX, y: rY, w: rW, h: rH };
      rr(ctx, rX, rY, rW, rH, rH/2);
      var gradR = ctx.createLinearGradient(rX, rY, rX, rY+rH);
      gradR.addColorStop(0, '#FFD700'); gradR.addColorStop(1, '#8a6a00');
      ctx.fillStyle = gradR; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1.4 * S;
      ctx.stroke();
      ctx.font = 'bold ' + clamp(14*S, 11, 18) + 'px sans-serif';
      ctx.fillStyle = '#1a1a2e';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      var _etLabel = t('extraTime');
      var _etIconSz = clamp(18*S, 14, 22);
      var _etTw = ctx.measureText(_etLabel).width;
      drawPlayTvIcon(cx - _etTw/2 - _etIconSz*0.7, rY + rH/2, _etIconSz, '#1a1a2e');
      ctx.fillText(_etLabel, cx + _etIconSz*0.45, rY + rH/2);
      ctx.textBaseline = 'alphabetic';
      buttons.push({ x: rX, y: rY, w: rW, h: rH, fn: showRewardedExtraTime });
    }

    // iter#5: streak pill above the day-seed badge
    drawStreakPill();
    // iter#4: daily-seed badge so players know their leaderboard rank is on
    // today's shared layout, not a random one
    drawDaySeedBadge();
    if (newBest) drawNewBestBanner();
    drawChainSummary(); // iter#9
    drawLeaderboard();
    drawYesterdayPill(); // iter#11
    drawWeekBestPill();  // iter#14
    // iter#3: skin picker on GAMEOVER (only on desktop - mobile portrait
    // is too tight; the picker IS still on MENU for everyone).
    // Achievement row is MENU-only - on GAMEOVER it stacked under the skin
    // labels and made visual mess (2026-05-15 layout audit).
    if (H >= 720) {
      drawSkinSelector(H - 80*S);
    }
    // milestone#1/#2: WORKSHOP shortcut from GAMEOVER (top-left, away from the
    // leaderboard / NEW BEST cluster).
    drawWorkshopButton(14*S, 14*S);
    // iter#8: mute toggle (top-right corner)
    drawMuteButton();
  }

  // milestone#1/#2/#3: the WORKSHOP overlay (drawn over a fully-opaque fill).
  if (gs === 'WORKSHOP') {
    drawWorkshop();
  }

  // iter#3: in-run toast when a new donut tier unlocks during play
  if ((gs === 'PLAYING' || gs === 'LEVELEND') && skinUnlockToast > 0) {
    drawSkinUnlockToast();
  }
  // milestone#1: in-run toast when a Cleaning Tool unlocks from playtime
  if ((gs === 'PLAYING' || gs === 'LEVELEND') && toolUnlockToast > 0) {
    drawToolUnlockToast();
  }
  // milestone - hands-on action-gated tutorial (PLAYING only, drawn on top)
  drawTutorial();
  // iter#6: in-run toast when an achievement unlocks (any state, sits high so
  // it doesn't fight the score HUD or the gameover overlay; off-by-default
  // for MENU so first-load isn't noisy)
  if (gs !== 'MENU' && gs !== 'WORKSHOP' && achToastActive) {
    drawAchievementToast();
  }

  // mobile joystick hint (first 3 seconds of level 1). Localized (Yandex 8.2.3)
  // and raised ABOVE the "next tool in" pill so the two bottom-center hints never
  // overlap (Yandex 1.10.3) - the pill lives at ~H-33*S..H-10*S.
  if (gs === 'PLAYING' && level === 1 && timeLeft > 57 && 'ontouchstart' in window) {
    ctx.globalAlpha = Math.min(1, (timeLeft-57)*3);
    ctx.font = clamp(13*S,10,16)+'px sans-serif';
    ctx.fillStyle = '#888'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText(t('dragHint'), cx, H - 44*S);
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(frame);
}

// ── SPRITES ──────────────────────────────────────────────────────────────────
// AI-generated sprites under ./sprites/. Loaded once on boot. drawSprite()
// falls back to the procedural drawing functions if a sprite isn't loaded
// (works locally during dev without sprites/, and survives any 404).
var SPRITE_NAMES = ['donut', 'crumb', 'mud', 'wrapper', 'trash'];
var sprites = {};
function loadSprites() {
  return Promise.all(SPRITE_NAMES.map(function(name) {
    return new Promise(function(resolve) {
      var img = new Image();
      img.onload  = function() { sprites[name] = img;  resolve(); };
      img.onerror = function() { sprites[name] = null; resolve(); };
      img.src = './sprites/' + name + '.png';
    });
  }));
}
function drawSpriteAt(name, x, y, size, fallbackFn) {
  var img = sprites[name];
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, x - size/2, y - size/2, size, size);
  } else if (typeof fallbackFn === 'function') {
    fallbackFn();
  }
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
var started = false;
// Expose game state for the post-build-tester / yandex-testing harness.
// Without this, __gfState() returns null and every state-aware check skips,
// degrading the suite to "generic" adapter mode (2026-05-15 audit).
window.__gfState = function () {
  try {
    return {
      gs: gs,
      level: level,
      score: score,
      best: best,
      timeLeft: timeLeft,
      combo: combo,
      achEarned: (typeof achUnlockedCount === 'number') ? achUnlockedCount : Object.keys(achUnlocked || {}).length,
      achTotal: (typeof ACHIEVEMENTS !== 'undefined') ? ACHIEVEMENTS.length : 5,
      sfxMuted: sfxMuted,
      bestCombo: bestCombo,
      maxComboThisRun: maxComboThisRun,
      lastLevelStars: lastLevelStars,
      totalLevelStars: (typeof totalLevelStars === 'function') ? totalLevelStars() : 0,
      yesterdayScore: yesterdayScore,
      todayBestScore: todayBestScore,
      sprinklesCollected: sprinklesCollected,
      sprinklesOnField: sprinkleList.length,
      lastLevelPerfect: lastLevelPerfect,
      perfectChainAlive: perfectChainAlive,
      chainStartedThisLevel: chainStartedThisLevel,
      weekBestScore: weekBestScore,
      weekBestIsNew: weekBestIsNew,
      // milestone#1/#2 meta
      sprinkles: meta ? meta.sprinkles : 0,
      totalPlayMin: Math.round(totalPlayMin() * 10) / 10,
      toolsOwned: meta ? Object.keys(meta.tools).length : 0,
      equipped: meta ? meta.equipped.slice() : [],
      questsClaimable: questClaimable(),
      pendingLogin: pendingLogin,
      tutActive: tut.active,
      tutStep: tut.step,
      activeEvent: activeEvent().id,
    };
  } catch (e) { return { __error: String(e) }; }
};

// ── milestone#1/#2 test seams (verify-by-playing; harmless in production) ─────
// Drive the meta in headless Puppeteer: fast-forward playtime, grant currency,
// open the workshop, read state. Mirrors the beast_bazaar/devourling pattern.
window._csInfo = function () {
  return {
    gs: gs, sprinkles: meta ? meta.sprinkles : 0, totalPlayMin: totalPlayMin(),
    toolsOwned: meta ? Object.keys(meta.tools).length : 0,
    equipped: meta ? meta.equipped.slice() : [], nextTool: nextTool() ? nextTool().id : null,
    questsClaimable: questClaimable(), pendingLogin: pendingLogin,
    workshopPill: workshopPillRect, buttons: buttons.map(function(b){ return {x:b.x,y:b.y,w:b.w,h:b.h}; }),
  };
};
window._csSetPlay = function (mins) { if (meta) { meta.totalPlaySec = (mins||0)*60; runPlaySec = 0; checkToolUnlocks(); saveMeta(); } };
window._csGrant = function (n) { awardSprinkles(n||100); };
window._csOpenWorkshop = function () { openWorkshop(); };
window._csTab = function (tab) { workshopTab = (tab === 'quests' ? 'quests' : 'tools'); };

function boot() {
  if (started) return;
  started = true;
  try {
    best = parseInt(localStorage.getItem(BEST_KEY)||'0')||0;
    // Migrate from pre-iter#1 key 'cs_best' if present and larger
    var legacy = parseInt(localStorage.getItem('cs_best')||'0')||0;
    if (legacy > best) { best = legacy; saveBest(); }
  } catch(e) {}
  loadSkinState();      // iter#3
  loadStreak();         // iter#5
  loadAchievements();   // iter#6
  loadMute();           // iter#8
  loadBestCombo();      // iter#9
  loadLevelStars();     // iter#10
  loadDailyScores();    // iter#11
  recomputeWeekBest();  // iter#14 - seed rolling 7-day ceiling from loaded daily scores
  loadSprinkleStats();  // iter#12
  loadMeta();                  // milestone#1 - the Bakery / tools / sprinkles
  // streak is loaded just above; the login reward scales with it.
  processLoginAndOvernight();  // milestone#2 - overnight accrual + daily login
  ensureDailyQuests();         // milestone#2 - today's 3 quests
  // If lifetime best already crosses higher tiers, mark them seen on first
  // boot so we don't dump multiple toasts on a returning player. checkSkinUnlocks
  // would otherwise fire all of them on the next collect.
  for (var __i=0;__i<DONUT_SKINS.length;__i++) {
    var __s = DONUT_SKINS[__i];
    if (best >= __s.unlock) skinSeen[__s.id] = true;
  }
  // Persist in case this was a brand-new install
  try {
    var __ids = Object.keys(skinSeen).filter(function(k){ return skinSeen[k]; });
    localStorage.setItem(SKIN_SEEN_KEY, __ids.join(','));
  } catch(e) {}
  // Guard: if persisted skin is locked (e.g. localStorage tampering, best was
  // reset), revert to strawberry rather than render a tinted donut the player
  // hasn't earned.
  if (!isSkinUnlocked(getSkin(skinId))) { skinId = 'strawberry'; saveSkin(); }
  loadSprites().then(function() {
    if (window.ysdk && window.ysdk.features && window.ysdk.features.LoadingAPI) {
      window.ysdk.features.LoadingAPI.ready();
    }
    gs = 'MENU';
    lastTs = performance.now();
    requestAnimationFrame(frame);
    // pre-warm today's leaderboard so it shows instantly on first game-over
    fetchLeaderboard();
    // CLAUDE.md #9 - platform builds (Yandex/CrazyGames/GD/GP) inject
    // window.__GF_AUTOSTART so the player drops STRAIGHT into gameplay; the
    // gallery never gets the flag and keeps its MENU. The WORKSHOP / login card
    // stay reachable in-run (the HUD pill) so autostart players aren't stranded.
    if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU') {
      score = 0;
      maybeStartTutorial();   // first-timers still get the hands-on coach
      startLevel(1);
    }
  });
}

// Expose tracked state to window for the deep_playtest harness (and any
// debug overlay). Read-only snapshot via getters so internal mutation still
// drives the values.
Object.defineProperty(window, 'gs',         { get: function(){ return gs; } });
Object.defineProperty(window, 'score',      { get: function(){ return score; } });
Object.defineProperty(window, 'best',       { get: function(){ return best; } });
Object.defineProperty(window, 'level',      { get: function(){ return level; } });
Object.defineProperty(window, 'timeLeft',   { get: function(){ return timeLeft; } });
Object.defineProperty(window, 'combo',      { get: function(){ return combo; } });
Object.defineProperty(window, 'newBest',    { get: function(){ return newBest; } });
Object.defineProperty(window, 'myRank',     { get: function(){ return myRank; } });
Object.defineProperty(window, 'lbCount',    { get: function(){ return leaderboard ? leaderboard.length : 0; } });
Object.defineProperty(window, 'skinId',     { get: function(){ return skinId; } });
Object.defineProperty(window, 'skinUnlockCount', { get: function(){
  var n = 0; for (var i=0;i<DONUT_SKINS.length;i++) if (best >= DONUT_SKINS[i].unlock) n++; return n;
} });
Object.defineProperty(window, 'daySeed',    { get: function(){ return daySeed; } });
Object.defineProperty(window, 'streak',     { get: function(){ return streak; } });
Object.defineProperty(window, 'streakBest', { get: function(){ return streakBest; } });
// iter#6: badge tracker - playtest can verify unlock-on-collect / unlock-on-level
Object.defineProperty(window, 'achUnlockedCount', { get: function(){ return achUnlockedCount(); } });
Object.defineProperty(window, 'achTotal',         { get: function(){ return ACHIEVEMENTS.length; } });
// iter#8: sfx mute state - playtest can verify persisted toggle
Object.defineProperty(window, 'sfxMuted',         { get: function(){ return sfxMuted; } });
Object.defineProperty(window, 'sfxReady',         { get: function(){ return !!_ac; } });
// iter#9: persistent best-chain tracker - playtest can verify run-max + lifetime
Object.defineProperty(window, 'bestCombo',        { get: function(){ return bestCombo; } });
Object.defineProperty(window, 'maxComboThisRun',  { get: function(){ return maxComboThisRun; } });
// iter#10: per-level star ratings - playtest can verify clear->stars->persist
Object.defineProperty(window, 'lastLevelStars',   { get: function(){ return lastLevelStars; } });
Object.defineProperty(window, 'totalLevelStars',  { get: function(){ return totalLevelStars(); } });
// iter#11: yesterday-vs-today daily-seed delta - playtest can verify record+render
Object.defineProperty(window, 'yesterdayScore',   { get: function(){ return yesterdayScore; } });
Object.defineProperty(window, 'todayBestScore',   { get: function(){ return todayBestScore; } });
// iter#13: PERFECT SWEEP bonus - playtest can verify chain-break detection + bonus award
Object.defineProperty(window, 'lastLevelPerfect',     { get: function(){ return lastLevelPerfect; } });
Object.defineProperty(window, 'perfectChainAlive',    { get: function(){ return perfectChainAlive; } });
Object.defineProperty(window, 'chainStartedThisLevel',{ get: function(){ return chainStartedThisLevel; } });
// iter#14: rolling 7-day best - playtest can verify ceiling recomputes + new-best flag
Object.defineProperty(window, 'weekBestScore',        { get: function(){ return weekBestScore; } });
Object.defineProperty(window, 'weekBestIsNew',        { get: function(){ return weekBestIsNew; } });

(function() {
  if (typeof YaGames === 'undefined') { boot(); return; }
  YaGames.init().then(function(ysdk) {
    window.ysdk = ysdk;
    try {
      var l = ysdk.environment && ysdk.environment.i18n && ysdk.environment.i18n.lang;
      if (l) lang = l.startsWith('ru') ? 'ru' : 'en';
    } catch(e) {}
    boot();
  }).catch(function() { boot(); });
  setTimeout(boot, 3000);
})();

})();
</script>
