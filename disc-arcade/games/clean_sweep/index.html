function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

window._jumpLevel = function(n) {
  // n=99 is the yandex-testing harness "drop me into GAMEOVER" signal so
  // it can exercise the retry/cycle path without burning 60s. (2026-05-15
  // adapter compatibility - without this Clean Sweep falls back to the
  // 'generic' yandex-testing adapter and skips every click test.)
  if (n === 99) {
    gs = 'GAMEOVER'; timeLeft = 0;
    // iter#11 visual-test hook: seed a plausible yesterday score so the
    // "Yesterday -> Today" pill renders for screenshot harness runs that
    // otherwise have an empty dailyScores map.
    if (yesterdayScore <= 0) { yesterdayScore = 800; }
    if (todayBestScore <= 0 && score > 0) todayBestScore = score;
    // iter#14 visual-test hook: seed a plausible rolling 7-day ceiling so the
    // 7-DAY BEST pill renders for screenshot harness runs that otherwise have
    // an empty dailyScores map. Also flip weekBestIsNew if the seeded score
    // exceeds it, so harness can also capture the gold "NEW 7-DAY BEST!" path.
    if (weekBestScore <= 0) { weekBestScore = 1200; }
    if (score > 0 && score > weekBestScore) weekBestIsNew = true;
    return;
  }
  // iter#10: n=98 is the visual-test "drop me into LEVELEND with 3 stars"
  // signal so the iteration harness can verify the new star UI without
  // physically clearing the level. Harmless in production; no UI exposure.
  if (n === 98) {
    if (!levelStartTime) { startLevel(1); }
    lastLevelStars = 3;
    var priorStars = levelStars[level] || 0;
    if (lastLevelStars > priorStars) { levelStars[level] = lastLevelStars; saveLevelStars(); lastLevelStarsNewBest = true; }
    else { lastLevelStarsNewBest = false; }
    // iter#13 visual-test hook: also seed PERFECT SWEEP so harness paints the stamp
    lastLevelPerfect = true;
    gs = 'LEVELEND';
    return;
  }
  score = 0;
  startLevel(n);
};

// ── iter#7: Yandex ads (rewarded "Extra Time" + throttled interstitial) ─────
// All ad triggers are user-click only (Yandex 4.4). Interstitial throttled
// to ≥3min between fullscreen ads (Yandex 4.1). When the SDK isn't present
// (gallery preview / local dev) helpers no-op for interstitial and grant
// the revive immediately for rewarded - so the feature stays exercisable.
var INTERSTITIAL_GAP_MS = 3 * 60 * 1000;
var lastInterstitialMs = -INTERSTITIAL_GAP_MS;
var extraTimeUsed = false;     // one "+15s" revive per level
var extraTimeLoading = false;  // disables the button while the ad loads
var reviveBtnRect = null;      // hit-test rect for the EXTRA TIME button
var EXTRA_TIME_SEC = 15;

function showInterstitial(onDone) {
  var now = performance.now();
  if (now - lastInterstitialMs < INTERSTITIAL_GAP_MS) { onDone && onDone(); return; }
  if (window.gp && window.gp.ads && typeof window.gp.ads.showFullscreen === 'function') {
    lastInterstitialMs = now;
    var gpSettled = false;
    function gpDone() {
      if (gpSettled) return; gpSettled = true;
      resumeAudioForAd();
      onDone && onDone();
    }
    try {
      pauseAudioForAd();
      window.gp.ads.showFullscreen().then(gpDone).catch(gpDone);
      setTimeout(gpDone, 30000);
    } catch(e) { gpDone(); }
    return;
  }
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showFullscreenAdv) { onDone && onDone(); return; }
  lastInterstitialMs = now;
  var opened = false, settled = false, openTimer = null, maxTimer = null;
  function done() {
    if (settled) return;
    settled = true;
    if (openTimer) { clearTimeout(openTimer); openTimer = null; }
    if (maxTimer) { clearTimeout(maxTimer); maxTimer = null; }
    resumeAudioForAd();
    onDone && onDone();
  }
  // No-fill guard: if Yandex never opens or closes the ad, keep the game moving.
  openTimer = setTimeout(function() { if (!opened) done(); }, 4500);
  try {
    window.ysdk.adv.showFullscreenAdv({
      callbacks: {
        onOpen:  function() {
          opened = true;
          if (openTimer) { clearTimeout(openTimer); openTimer = null; }
          maxTimer = setTimeout(done, 180000);
          pauseAudioForAd();
        },
        onClose: function() { done(); },
        onError: function() { done(); },
      },
    });
  } catch(e) { done(); }
}
// ── iter#15: ad/visibility audio pause (Yandex 4.7 ad-audio + 1.3 pause-on-hide) ──
// One guard so an ad and a tab-hide can't double-toggle. Suspends BOTH the SFX
// AudioContext and the music bed; restores only if the player hasn't muted.
var audioHeld = false;
function pauseAudioForAd() {
  if (audioHeld) return; audioHeld = true;
  try { if (_ac && _ac.state === 'running') _ac.suspend(); } catch(e) {}
  pauseMusic();
}
function resumeAudioForAd() {
  if (!audioHeld) return; audioHeld = false;
  if (sfxMuted) return;
  try { if (_ac && _ac.state === 'suspended') _ac.resume(); } catch(e) {}
  resumeMusic();
}
function showRewardedExtraTime() {
  if (extraTimeUsed || extraTimeLoading) return;
  extraTimeLoading = true;
  if (window.gp && window.gp.ads && typeof window.gp.ads.showRewardedVideo === 'function') {
    var gpSettled = false;
    function gpSettle(grant) {
      if (gpSettled) return; gpSettled = true;
      extraTimeLoading = false;
      resumeAudioForAd();
      if (grant) grantExtraTime();
    }
    try {
      pauseAudioForAd();
      window.gp.ads.showRewardedVideo()
        .then(function(success) { gpSettle(!!success); })
        .catch(function() { gpSettle(true); });
      setTimeout(function() { gpSettle(true); }, 30000);
    } catch(e) { gpSettle(true); }
    return;
  }
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showRewardedVideo) {
    extraTimeLoading = false; grantExtraTime(); return;
  }
  var rewarded = false, opened = false, settled = false, adWatchdog = null;
  function settleExtraTime(grant) {
    if (settled) return; settled = true;
    if (adWatchdog) { clearTimeout(adWatchdog); adWatchdog = null; }
    extraTimeLoading = false;
    resumeAudioForAd(); // iter#15: Yandex 4.7 - restore audio after the ad closes
    if (grant) grantExtraTime();
  }
  // No-fill guard: if the rewarded ad never OPENS within 4.5s (no ad fill, as in
  // any draft/preview), grant so the button never sticks dead. Matches no-SDK fallback.
  adWatchdog = setTimeout(function() { if (!opened) settleExtraTime(true); }, 4500);
  try {
    window.ysdk.adv.showRewardedVideo({
      callbacks: {
        onOpen:     function() { opened = true; pauseAudioForAd(); if (adWatchdog) { clearTimeout(adWatchdog); adWatchdog = null; } },
        onRewarded: function() { rewarded = true; },
        onClose:    function() { settleExtraTime(rewarded); },
        onError:    function() { settleExtraTime(true); },
      },
    });
  } catch(e) { settleExtraTime(true); }
}
function grantExtraTime() {
  extraTimeUsed = true;
  timeLeft = EXTRA_TIME_SEC;
  gs = 'PLAYING';
}

// ── iter#8: SFX (procedural Web Audio - zero asset files) ────────────────────
// Additive sound design pass. No <audio> tags, no files - every sound is a
// short oscillator + envelope so the build stays the same size and there's
// no Yandex risk over asset loading. Engine init is lazy on first user
// gesture (so Chrome's autoplay policy doesn't block us). Mute state
// persists in localStorage as 'clean_sweep_muted'. The mute button is a
// 36×36 speaker icon top-right above the canvas (drawn on MENU + GAMEOVER
// overlays only - never during gameplay, no HUD overlap risk).
var MUTE_KEY = 'clean_sweep_muted';
var sfxMuted = false;
var platformAudioMuted = false;
var _ac = null;
var muteBtnRect = null;
function audioMuted() {
  return sfxMuted || platformAudioMuted;
}
function loadMute() {
  try { sfxMuted = (localStorage.getItem(MUTE_KEY) === '1'); } catch(e) {}
}
function saveMute() {
  try { localStorage.setItem(MUTE_KEY, sfxMuted ? '1' : '0'); } catch(e) {}
}
function ac() {
  if (!_ac) {
    try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (_ac && _ac.state === 'suspended' && !platformAudioMuted) { try { _ac.resume(); } catch(e) {} }
  return _ac;
}
function _play(fn) {
  if (audioMuted()) return;
  var ctx2 = ac();
  if (!ctx2) return;
  try { fn(ctx2); } catch(e) {}
}
function _tone(ctx2, freq, dur, type, gain) {
  var g = ctx2.createGain();
  var t0 = ctx2.currentTime;
  g.gain.setValueAtTime(gain, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  g.connect(ctx2.destination);
  var o = ctx2.createOscillator();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t0);
  o.connect(g); o.start(t0); o.stop(t0 + dur + 0.02);
}
// Crumb pickup - pitch rises with combo so chaining FEELS rewarding.
function sfxCollect(c) { _play(function(ctx2){
  var base = 380 + Math.min(c, 12) * 55;
  _tone(ctx2, base, 0.09, 'triangle', 0.16);
}); }
// Big trash thump - when shake fires.
function sfxBigPickup() { _play(function(ctx2){
  _tone(ctx2, 180, 0.18, 'sawtooth', 0.18);
  _tone(ctx2, 90,  0.22, 'sine',     0.22);
}); }
// Level end fanfare - 3-note rising arpeggio.
function sfxLevelEnd() { _play(function(ctx2){
  var notes = [523, 659, 784];
  for (var i = 0; i < notes.length; i++) (function(idx, freq){
    var g = ctx2.createGain();
    var t0 = ctx2.currentTime + idx * 0.09;
    g.gain.setValueAtTime(0.22, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.28);
    g.connect(ctx2.destination);
    var o = ctx2.createOscillator();
    o.type = 'sine'; o.frequency.setValueAtTime(freq, t0);
    o.connect(g); o.start(t0); o.stop(t0 + 0.3);
  })(i, notes[i]);
}); }
// Game over - falling descent.
function sfxGameOver() { _play(function(ctx2){
  var g = ctx2.createGain();
  var t0 = ctx2.currentTime;
  g.gain.setValueAtTime(0.22, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.5);
  g.connect(ctx2.destination);
  var o = ctx2.createOscillator();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(420, t0);
  o.frequency.exponentialRampToValueAtTime(110, t0 + 0.45);
  o.connect(g); o.start(t0); o.stop(t0 + 0.5);
}); }
// Achievement / skin sparkle - short 2-note bell.
function sfxBadge() { _play(function(ctx2){
  _tone(ctx2, 880, 0.12, 'sine', 0.18);
  setTimeout(function(){ _play(function(c2){ _tone(c2, 1320, 0.18, 'sine', 0.16); }); }, 80);
}); }
function sfxSkin() { _play(function(ctx2){
  _tone(ctx2, 740, 0.1, 'triangle', 0.18);
  setTimeout(function(){ _play(function(c2){ _tone(c2, 1175, 0.14, 'triangle', 0.16); }); }, 70);
}); }
// UI button click - tiny chirp.
function sfxClick() { _play(function(ctx2){
  _tone(ctx2, 640, 0.05, 'square', 0.12);
}); }
function toggleMute() {
  sfxMuted = !sfxMuted;
  saveMute();
  // tap the engine so iOS keeps it primed when the player unmutes
  if (!audioMuted()) { ac(); startMusic(); }
  // mirror to the background-music bed so one button controls SFX + music
  MUS.master && (MUS.master.gain.value = audioMuted() ? 0 : MUS_VOL);
}

// ── BACKGROUND MUSIC (procedural WebAudio loop - no asset file, respects mute) ─
// milestone#1: the game shipped SFX but NO music bed, which HARD-fails the
// Yandex audio gate (it needs BOTH). This adds a light, cozy "kitchen jingle"
// loop synthesised in WebAudio - zero asset files, zero credits, loops forever.

// ── playtime-item helpers ────────────────────────────────────────────────────

// Summed run bonus across EQUIPPED tools whose stat matches (per × lvl).

function upCost(id) {

}
function buyToolUpgrade(id) {

// ── milestone#2: daily quests + login + overnight accrual ────────────────────
function pickDailyQuests() {
  // Deterministic 3-of-6 selection seeded from today's date so every player
  // shares the same daily quest set (matches the daily-seed fairness theme).
  var seedRng = makeRng(getDaySeed() * 7 + 13);
  var pool = QUEST_DEFS.slice();
  var picks = [];
  for (var i = 0; i < 3 && pool.length; i++) {
    var idx = Math.floor(seedRng() * pool.length) % pool.length;
    var q = pool.splice(idx, 1)[0];
    // seed 20-40% pre-progress for momentum transfer (never on a 1-goal quest)
    var seeded = q.goal > 1 ? Math.floor(q.goal * (0.2 + seedRng() * 0.2)) : 0;
    picks.push({ id:q.id, prog:seeded, goal:q.goal, done:false, claimed:false });
  }
  return picks;
}
function ensureDailyQuests() {
  if (!meta) return;
  var key = getDayKey();
  if (meta.quests.key !== key || !meta.quests.items || meta.quests.items.length === 0) {
    meta.quests = { key: key, items: pickDailyQuests() };
    saveMeta();
  }
}
function questDef(id) { for (var i=0;i<QUEST_DEFS.length;i++) if (QUEST_DEFS[i].id===id) return QUEST_DEFS[i]; return null; }
// Bump a quest's progress. kind = quest id; val = absolute (max-style) or +1.
function bumpQuest(id, val, absolute) {
  if (!meta || !meta.quests.items) return;
  for (var i = 0; i < meta.quests.items.length; i++) {
    var q = meta.quests.items[i];
    if (q.id !== id || q.done) continue;
    var nv = absolute ? Math.max(q.prog, val) : q.prog + (val || 1);
    if (nv === q.prog) return;
    q.prog = nv;
    if (q.prog >= q.goal) { q.prog = q.goal; q.done = true; try { sfxBadge(); } catch(e) {} }
    saveMeta();
    return;
  }
}
function questClaimable() {
  if (!meta || !meta.quests.items) return 0;
  var n = 0;
  for (var i=0;i<meta.quests.items.length;i++) { var q=meta.quests.items[i]; if (q.done && !q.claimed) n++; }
  return n;
}
function claimQuest(id) {
  if (!meta || !meta.quests.items) return 0;
  for (var i=0;i<meta.quests.items.length;i++) {
    var q = meta.quests.items[i];
    if (q.id === id && q.done && !q.claimed) {
      q.claimed = true;
      var reward = 25;
      awardSprinkles(reward);
      saveMeta();
      return reward;
    }

  return 0;
}
// Login + overnight accrual, computed once on boot.
function processLoginAndOvernight() {
  if (!meta) return;
  var now = Date.now();
  // overnight accrual since last session (capped). Only if we have a prior seen.
  if (meta.lastSeenMs > 0) {
    var awaySec = Math.max(0, (now - meta.lastSeenMs) / 1000);
    var earnSec = Math.min(awaySec, OVERNIGHT_CAP_SEC);
    pendingOvernight = Math.floor(earnSec * OVERNIGHT_RATE);
  }
  // daily login reward - once per UTC day, escalates with the existing streak.
  // IMPORTANT: lastLoginKey is advanced ONLY in claimLogin() (at CLAIM time), not
  // here at display/boot time. Keying it here marked the reward "given" the moment
  // the card showed, so dismissing the card without claiming (e.g. tapping PLAY,
  // which sits over the card and stays clickable) permanently burned the day's
  // reward. Recompute the offer on every boot until the player actually claims.
  var key = getDayKey();
  if (meta.lastLoginKey !== key) {
    var streakMul = 1 + Math.min(streak, 7) * 0.25; // up to ~2.75x at a 7-day streak
    pendingLogin = Math.round(LOGIN_BASE * streakMul) + pendingOvernight;
  } else {
    // already claimed login today; still surface overnight if any accrued
    pendingLogin = pendingOvernight;
  }

  saveMeta();
}
function claimLogin() {
  if (pendingLogin <= 0) return;
  awardSprinkles(pendingLogin);
  pendingLogin = 0; pendingOvernight = 0;
  // Mark today's login reward claimed ONLY now, at claim time, so a dismissed
  // (unclaimed) card re-offers the reward on the next boot instead of losing it.
  if (meta) meta.lastLoginKey = getDayKey();
  try { sfxBadge(); } catch(e) {}
  saveMeta();
}

// milestone#3 (deferred-tune): Baker's Pass. No real IAP SDK is wired here, so

// falls through to a direct grant when no ad is available (preview/gallery). The
// Pass is a permanent +25% sprinkle bonus + the Golden Roller tool. Economy
// tuning is post-launch on real data per the iterate skill.
function grantBakerPass() {
  if (!meta || meta.pass) return;
  meta.pass = 1;
  if (!meta.tools.golden) {
    meta.tools.golden = { lvl: 1 };
    for (var s = 0; s < meta.equipped.length; s++) { if (!meta.equipped[s]) { meta.equipped[s] = 'golden'; break; } }
  }

function buyBakerPass() {
  if (!meta || meta.pass) return;
  // route through a rewarded ad if the SDK is present; else grant directly.
  if (window.gp && window.gp.ads && typeof window.gp.ads.showRewardedVideo === 'function') {
    var gpDone = false;
    function gpFinish(grant) {
      if (gpDone) return; gpDone = true;
      resumeAudioForAd();
      if (grant) grantBakerPass();
    }
    try {
      pauseAudioForAd();
      window.gp.ads.showRewardedVideo()
        .then(function(success) { gpFinish(!!success); })
        .catch(function() { gpFinish(true); });
      setTimeout(function() { gpFinish(true); }, 30000);
    } catch(e) { gpFinish(true); }

  }
  if (window.ysdk && window.ysdk.adv && window.ysdk.adv.showRewardedVideo) {
    var done = false, opened = false;

    try {

        onOpen: function(){ opened = true; pauseAudioForAd(); clearTimeout(wd); },
        onRewarded: function(){ if (!done) { done = true; grantBakerPass(); } },
        onClose: function(){ resumeAudioForAd(); if (!done) { done = true; grantBakerPass(); } },
        onError: function(){ resumeAudioForAd(); if (!done) { done = true; grantBakerPass(); } },
      }});
    } catch(e) { resumeAudioForAd(); grantBakerPass(); }
  } else { grantBakerPass(); }
}

// ── DAILY SEED (iter#4: shared layout per day) ───────────────────────────────
// Mulberry32 - deterministic seeded PRNG. Used ONLY for level layout
// (debris placement) so that every player on the same UTC date faces the
// EXACT same starting puzzle and the daily leaderboard is a fair race.
// Visual jitter (particles, floats, screen shake) keeps Math.random() so
// every run still feels alive.
function makeRng(seed) {
  var s = seed | 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    var t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function getDaySeed() {
  var d = new Date();
  return d.getUTCFullYear() * 10000 + (d.getUTCMonth()+1) * 100 + d.getUTCDate();
}
var daySeed = 0;        // YYYYMMDD numeric - fixed for the whole calendar day
var levelRng = Math.random; // replaced per startLevel() with mulberry32(daySeed * 100 + level)

// ── DAILY STREAK (iter#5: come-back-tomorrow loop on top of daily seed) ──────
// Tracks consecutive UTC-day visits. Increments when last-played-date is
// exactly yesterday, resets to 1 when the gap is >1 day, no-ops on same-day
// re-launches. Surfaced as a small flame pill above the daily-seed badge so
// players can SEE the streak they're protecting tomorrow.
var STREAK_KEY      = 'clean_sweep_streak';      // integer count
var STREAK_DATE_KEY = 'clean_sweep_streak_date'; // YYYY-MM-DD of last visit
var STREAK_BEST_KEY = 'clean_sweep_streak_best'; // lifetime longest streak
var streak = 0, streakBest = 0;
var streakBumped = false; // true if this session is the one that incremented (drives a one-time flash)

function dayKeyToDate(key) {
  // YYYY-MM-DD -> ms epoch (UTC midnight). Safe for both '2026-05-14' and bad input.
  var parts = String(key).split('-');
  if (parts.length !== 3) return NaN;
  return Date.UTC(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
}
function loadStreak() {
  try {
    streak = parseInt(localStorage.getItem(STREAK_KEY) || '0') || 0;
    streakBest = parseInt(localStorage.getItem(STREAK_BEST_KEY) || '0') || 0;
    var lastKey = localStorage.getItem(STREAK_DATE_KEY) || '';
    var today = getDayKey();
    if (lastKey === today) {
      // same UTC day - leave as-is, no flash
      return;
    }
    var lastMs = dayKeyToDate(lastKey);
    var todayMs = dayKeyToDate(today);
    if (isNaN(lastMs) || isNaN(todayMs)) {
      // first ever launch (or corrupted key) - start a streak today
      streak = 1;
    } else {
      var gapDays = Math.round((todayMs - lastMs) / 86400000);
      if (gapDays === 1)      streak = streak + 1;   // consecutive - extend
      else if (gapDays > 1)   streak = 1;            // gap - restart at today
      else                    streak = Math.max(streak, 1); // clock skew / future date - clamp
    }
    streakBumped = true;
    if (streak > streakBest) streakBest = streak;
    localStorage.setItem(STREAK_KEY, String(streak));
    localStorage.setItem(STREAK_BEST_KEY, String(streakBest));
    localStorage.setItem(STREAK_DATE_KEY, today);
  } catch(e) {}
}

    keepalive: true,
  })
  .then(function(r) { return r.ok ? r.json() : null; })
  .then(function(data) {

  .catch(function() { fetchLeaderboard(); });
}

var donut = { x:0, y:0, vx:0, vy:0, angle:0 };

// ── INPUT ─────────────────────────────────────────────────────────────────────
var keys = {};

document.addEventListener('keyup',   function(e) { keys[e.code] = false; });

// iter#15: Yandex 1.3 - suspend all audio when the tab/app is hidden, restore on

var touch = { active: false, sx: 0, sy: 0, dx: 0, dy: 0, id: null };

  var t0 = e.changedTouches[0];
  touch.active = true; touch.id = t0.identifier;
  touch.sx = t0.clientX; touch.sy = t0.clientY;

    var dx = t0.clientX - touch.sx, dy = t0.clientY - touch.sy;

  for (var i = 0; i < e.changedTouches.length; i++) {

// ── PARTICLES & FLOATS ────────────────────────────────────────────────────────

// ── ARENA BOUNDS ──────────────────────────────────────────────────────────────
function arena() {
  var inset = platformSafeInsets();
  var pad = 12 * S;
  var top = (HUD_H + 6) * S;
  return { x: pad, y: top, w: W - pad*2 - inset.right, h: H - top - pad - inset.bottom };
}

// ── LEVEL SETUP ───────────────────────────────────────────────────────────────
function startLevel(lvl) {
  level = lvl;
  debrisList = []; particles = []; floats = []; buttons = [];
  combo = 0; comboTimer = 0; shake = 0;
  // iter#13: per-level reset - combo-break tracker for the PERFECT SWEEP bonus
  chainStartedThisLevel = false; perfectChainAlive = true; lastLevelPerfect = false;
  // newBest is per-RUN, not per-level - only reset when starting a fresh run from level 1
  if (lvl === 1) { newBest = false; bestPulse = 0; lbSubmitted = false; myRank = null; maxComboThisRun = 0; newBestCombo = false; chainPulse = 0; lastLevelStars = 0; lastLevelStarsNewBest = false; sprinkleHudPulse = 0; sprinkleToastTimer = 0; runPlaySec = 0; _runEnded = false; }
  // milestone#1: per-level reset of the one-shot Crumb Shield grace
  window._shieldUsedThisLevel = false;
  // iter#7: reset the "+15s" rewarded-ad slot each level
  extraTimeUsed = false; extraTimeLoading = false; reviveBtnRect = null;
  // milestone#1: fold equipped Cleaning Tool bonuses into this run.
  applyToolBonuses();
  timeLeft = Math.max(25, 70 - (lvl - 1) * 6) + toolTime; // Fresh Batch tool adds start seconds
  levelStartTime = timeLeft; // iter#10: cache for star-rating denominator on level clear

  // iter#4: seed the level-layout RNG from today's date + level number so
  // every player on the same UTC date faces the EXACT same debris layout
  // for the same level. The wobble/phase decorations stay seeded too so
  // crumb animation phases match (cosmetic - keeps visuals deterministic
  // for screenshot tools, harmless if not).
  daySeed = getDaySeed();
  levelRng = makeRng(daySeed * 100 + lvl);

  var ar = arena();
  donut.x = ar.x + ar.w / 2;
  donut.y = ar.y + ar.h / 2;
  donut.vx = 0; donut.vy = 0; donut.angle = 0;

  for (var ti = 0; ti < TYPES.length; ti++) {
    var tp = TYPES[ti];
    var count = tp.base + Math.floor((lvl - 1) * tp.base * 0.5);
    for (var i = 0; i < count; i++) {
      for (var att = 0; att < 60; att++) {
        var mg = (tp.r + 4) * S;
        var dx = ar.x + mg + levelRng() * (ar.w - mg*2);
        var dy = ar.y + mg + levelRng() * (ar.h - mg*2);
        // keep away from donut start
        var ddx = dx - donut.x, ddy = dy - donut.y;
        if (Math.sqrt(ddx*ddx + ddy*ddy) < 90*S) continue;

        var ok = true;
        for (var j = 0; j < debrisList.length; j++) {
          var dj = debrisList[j];
          var ex = dx-dj.x, ey = dy-dj.y;
          if (Math.sqrt(ex*ex+ey*ey) < (tp.r + dj.typeR)*S*1.4) { ok=false; break; }
        }
        if (!ok) continue;
        debrisList.push({ x:dx, y:dy, typeId:tp.id, typeR:tp.r, r:tp.r*S,
          score:tp.score, color:tp.color, shine:tp.shine,
          wobble:levelRng()*Math.PI*2, phase:levelRng()*Math.PI*2 });
        break;
      }
    }
  }
  totalDebris = debrisList.length;
  // iter#12: golden sprinkle pickups (2-3 per level, +3s + score x5 on collect)
  spawnSprinklesForLevel(lvl);
  // iter#6: badge checks tied to depth reached
  checkAchievementsOnLevel(lvl);
  gs = 'PLAYING';
  try{parent.postMessage({type:'gf:gameStarted'},'*')}catch(_){};
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
var lastTs = 0;
function update(dt) {

  // milestone#1: accrue cumulative playtime + surface tool unlocks LIVE (cheap
  // check; grant happens in-memory, only saveMeta()s on an actual unlock).
  runPlaySec += dt;
  if (sprinkleEarnFlash > 0) sprinkleEarnFlash = Math.max(0, sprinkleEarnFlash - dt * 0.8);
  if (toolUnlockToast > 0) toolUnlockToast = Math.max(0, toolUnlockToast - dt * 0.3);
  checkToolUnlocks();

  timeLeft -= dt;
  if (timeLeft <= 0) {
    // milestone#1: Crumb Shield tool grants grace seconds before the run ends
    // (consumed once per level so it can't loop forever).
    if (toolShield >= 1 && !window._shieldUsedThisLevel) {
      window._shieldUsedThisLevel = true;
      timeLeft = Math.round(toolShield);
      spawnFloat(donut.x, donut.y - 24*S, '+' + Math.round(toolShield) + t('secAbbr'), '#60a5fa');
      try { sfxBadge(); } catch(e) {}
    } else {
    timeLeft = 0; sfxGameOver(); gs = 'GAMEOVER';try{parent.postMessage({type:'gf:gameEnded'},'*')}catch(_){};
    // milestone#1/#2: fold this run into the persistent meta - playtime, sprinkles
    // earned (score-scaled, boosted by Tip Jar + Bonus Pay event), run count, quests.
    onRunEnd();
    // iter#14: snapshot prior 7-day ceiling BEFORE writing today's score so we
    // can detect a fresh 7-day best on this run. recordDailyScore mutates
    // dailyScores; recomputeWeekBest then refreshes the rolling ceiling for
    // the GAMEOVER pill.
    var _priorWB = priorWeekBestExcludingToday();
    submitAndFetchLeaderboard(); recordDailyScore(score);
    recomputeWeekBest();
    weekBestIsNew = (score > 0 && score > _priorWB);
    return;
    }
  }

  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) { combo = 0; if (chainStartedThisLevel) perfectChainAlive = false; } } // iter#13: combo decay also breaks the PERFECT SWEEP chain
  if (shake > 0) shake = Math.max(0, shake - dt * 8);
  if (bestPulse > 0) bestPulse = Math.max(0, bestPulse - dt * 0.6);
  if (chainPulse > 0) chainPulse = Math.max(0, chainPulse - dt * 0.6); // iter#9
  if (sprinkleHudPulse > 0) sprinkleHudPulse = Math.max(0, sprinkleHudPulse - dt * 0.7); // iter#12
  if (sprinkleToastTimer > 0) sprinkleToastTimer = Math.max(0, sprinkleToastTimer - dt * 0.35); // iter#12
  // iter#12: also wobble the sprinkle bob phases
  // milestone#1: Sprinkle Magnet tool gently pulls nearby gold sprinkles in.
  var magR = 70 * S * (1 + toolMagnet * 4); // base small radius, grows with the tool
  for (var spi = 0; spi < sprinkleList.length; spi++) {
    var _sp = sprinkleList[spi];
    _sp.bob += dt * 2.2; _sp.phase += dt * 1.6;
    if (toolMagnet > 0) {
      var mdx = donut.x - _sp.x, mdy = donut.y - _sp.y;
      var md = Math.sqrt(mdx*mdx + mdy*mdy);
      if (md > 1 && md < magR) {

      }
    }
  }
  if (skinUnlockToast > 0) skinUnlockToast = Math.max(0, skinUnlockToast - dt * 0.35);
  // iter#6: drive achievement toast queue (one at a time, ~2.5s each)
  if (!achToastActive && achToastQueue.length > 0) achToastActive = achToastQueue.shift();
  if (achToastActive) {
    achToastActive.life -= dt * 0.4;
    if (achToastActive.life <= 0) achToastActive = null;
  }

  // movement
  var ax = 0, ay = 0;
  if (keys['ArrowLeft']  || keys['KeyA']) ax -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) ax += 1;
  if (keys['ArrowUp']    || keys['KeyW']) ay -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) ay += 1;
  if (touch.active) { ax += touch.dx; ay += touch.dy; }
  var alen = Math.sqrt(ax*ax + ay*ay);
  if (alen > 0) { ax /= alen; ay /= alen; }

  // milestone#1/#3: Floor Wax tool + Speed Week event raise top speed + accel.
  var spdMul = 1 + toolSpeed + (activeEvent().id === 'speedweek' ? 0.25 : 0);
  donut.vx = (donut.vx + ax * ACCEL * spdMul * S) * FRICTION;
  donut.vy = (donut.vy + ay * ACCEL * spdMul * S) * FRICTION;
  var spd = Math.sqrt(donut.vx*donut.vx + donut.vy*donut.vy);
  var maxSpd = MAX_SPD * spdMul;
  if (spd > maxSpd * S) { donut.vx = donut.vx/spd*maxSpd*S; donut.vy = donut.vy/spd*maxSpd*S; }
  donut.angle += spd * 0.04;

  donut.x += donut.vx; donut.y += donut.vy;

  var ar = arena(), dr = DR * S;
  donut.x = clamp(donut.x, ar.x + dr, ar.x + ar.w - dr);
  donut.y = clamp(donut.y, ar.y + dr, ar.y + ar.h - dr);

  // collect - Wide Mop tool widens the pickup reach; Combo Glaze widens window.
  var reachMul = 0.82 * (1 + toolRadius);
  var comboWin = 1.3 + toolCombo;
  var removed = 0;
  for (var i = debrisList.length - 1; i >= 0; i--) {
    var d = debrisList[i];
    var ex = donut.x - d.x, ey = donut.y - d.y;
    if (Math.sqrt(ex*ex + ey*ey) < (DR*S + d.r) * reachMul) {
      var now = performance.now();
      if (now - lastCollect < 700) { combo++; comboTimer = comboWin; }
      else { combo = 1; comboTimer = comboWin; }
      lastCollect = now;
      chainStartedThisLevel = true; // iter#13: PERFECT SWEEP - arm the chain on first collect
      var pts = d.score * Math.max(1, Math.floor(combo * 0.7 + 0.5));
      score += pts;
      // live-track best so a closed tab mid-run doesn't lose the high-water mark
      if (score > best) {
        if (best > 0 && !newBest) bestPulse = 1; // first-time-this-run beat
        best = score;
        newBest = true;
        saveBest();
        checkSkinUnlocks(); // iter#3: surface any cosmetic unlocks crossed live
      }
      spawnParticles(d.x, d.y, d.color, 5 + Math.ceil(d.typeR * 0.8));
      spawnParticles(d.x, d.y, d.shine, 3);
      if (combo > 1) spawnFloat(d.x, d.y - 20*S, 'x'+combo+' +'+pts, '#FFD700');
      else           spawnFloat(d.x, d.y - 14*S, '+'+pts, '#eee');
      // iter#6: badge checks tied to collect / combo
      checkAchievementsOnCollect();
      // iter#9: persistent max-combo tracker - update run-max and live-best
      if (combo > maxComboThisRun) {
        maxComboThisRun = combo;
        bumpQuest('combo8', maxComboThisRun, true); // milestone#2: track best combo this day
        if (maxComboThisRun > bestCombo) {
          if (bestCombo > 0 && !newBestCombo) chainPulse = 1; // first beat this run
          bestCombo = maxComboThisRun;
          newBestCombo = true;
          saveBestCombo();
        }
      }

      if (d.typeR >= 19) { sfxBigPickup(); shake = 0.25; }
      else               { sfxCollect(combo); }
      debrisList.splice(i, 1);
      removed++;
      // milestone tutorial (action-gated): stop after 3 real pickups. The
      // gameplay input fell THROUGH to here, so completion only happens on the
      // genuine action (Game Build Hygiene #10).
      if (tut.active) {
        tut.startCleans++;
        if (tut.startCleans >= 3) endTutorial();
      }
    }
  }

  // iter#12: sprinkle collection - separate loop so the +3s + score bonus
  // doesn't fight the cleanup-percentage math (debrisList drives totalDebris).
  for (var si = sprinkleList.length - 1; si >= 0; si--) {
    var sp = sprinkleList[si];
    var sex = donut.x - sp.x, sey = donut.y - sp.y;
    if (Math.sqrt(sex*sex + sey*sey) < (DR*S + sp.r*S) * (0.85 * (1 + toolRadius))) {
      var sBonus = 5 * Math.max(1, Math.floor(combo * 0.7 + 0.5));
      score += sBonus;
      timeLeft += 3; // grant +3s on the live clock
      sprinklesCollected++;
      saveSprinkleStats();
      bumpQuest('sprink5', 1); // milestone#2: daily quest progress
      sprinkleHudPulse = 1;
      sprinkleToastTimer = 1;
      // live-best tracking matches the debris path
      if (score > best) {
        if (best > 0 && !newBest) bestPulse = 1;
        best = score;
        newBest = true;
        saveBest();
        checkSkinUnlocks();
      }
      spawnParticles(sp.x, sp.y, '#FFD700', 22);
      spawnParticles(sp.x, sp.y, '#FFF8C0', 14);
      spawnFloat(sp.x, sp.y - 22*S, t('sprinkleToast'), '#FFD700');
      // chime - re-uses the achievement bell SFX for distinct gold feedback
      try { if (typeof sfxBadge === 'function') sfxBadge(); else sfxCollect(combo); } catch(e) {}
      sprinkleList.splice(si, 1);

  }

  if (debrisList.length === 0) {
    var bonus = Math.round(timeLeft * 8);
    score += bonus;
    spawnFloat(cx, cy - 30*S, t('bonus')+' +'+bonus, '#2ecc71');
    spawnParticles(donut.x, donut.y, '#FFD700', 25);
    sfxLevelEnd(); // iter#8
    // iter#13: PERFECT SWEEP bonus - clear without ever breaking the combo chain
    if (chainStartedThisLevel && perfectChainAlive) {
      lastLevelPerfect = true;
      score += PERFECT_BONUS;
      spawnFloat(cx, cy + 12*S, t('perfectSweep')+' '+t('perfectBonus'), '#FFD700');
      spawnParticles(donut.x, donut.y, '#FFD700', 18);
      spawnParticles(donut.x, donut.y, '#FFF8C0', 12);
      try { if (typeof sfxBadge === 'function') sfxBadge(); } catch(e) {}
      // live-best tracking matches debris/sprinkle paths
      if (score > best) {
        if (best > 0 && !newBest) bestPulse = 1;
        best = score; newBest = true; saveBest();
        if (typeof checkSkinUnlocks === 'function') checkSkinUnlocks();

    } else {
      lastLevelStarsNewBest = false;
    }

    // the player spends in the Workshop). Scales with level + stars, boosted by
    // the Tip Jar tool + Bonus Pay event. Bump the "clear N levels" daily quest.
    lastLevelSprinkles = sprinklesForClear(level, lastLevelStars);
    awardSprinkles(lastLevelSprinkles);
    bumpQuest('clean3', 1);
    if (lastLevelPerfect) bumpQuest('perfect1', 1);
