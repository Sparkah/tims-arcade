  <script>window.__GF_AUTOSTART=1;</script>
  <style>

    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── GAME-SPECIFIC CONFIG ─────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Pixel Reveal',
    sub:   'Deduce the hidden picture',
    play: 'PLAY', retry: 'RETRY', next: 'NEXT', menu: 'MENU',
    score: 'SCORE', best: 'BEST',
    gameover: 'OUT OF TOKENS',
    won: 'ALL CLEAR!',
    solved: 'SOLVED!',
    puzzle: 'Puzzle',
    fill: 'FILL', mark: 'MARK',
    mode: 'Mode',
    tokens: 'Tokens',
    best_errors: 'Best errors',
    errors_used: 'Errors',

    help: '?',
    back: 'Menu',
    tut_goal: 'Goal: Read the row and column numbers to deduce which cells are filled, uncovering a hidden pixel picture.',

    tut_win: 'Win: Fill every correct cell to reveal the picture. Clear all 6 puzzles to finish.',
    tut_lose: 'Lose: A wrong fill costs one error token. Run out of tokens and the puzzle is over.',
    tut_tip: 'Tip: A clue number is the length of one unbroken run of filled cells, read left-to-right or top-to-bottom.',
  },
  ru: {
    title: 'Пиксель-логика',
    sub:   'Вычислите скрытую картинку',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', next: 'ДАЛЬШЕ', menu: 'МЕНЮ',
    score: 'ОЧКИ', best: 'РЕКОРД',
    gameover: 'ЖЕТОНЫ КОНЧИЛИСЬ',
    won: 'ВСЁ ПРОЙДЕНО!',
    solved: 'РЕШЕНО!',
    puzzle: 'Уровень',
    fill: 'ЗАЛИТЬ', mark: 'МЕТКА',
    mode: 'Режим',
    tokens: 'Жетоны',
    best_errors: 'Лучший',
    errors_used: 'Ошибки',
    moves_used: 'Ходы',
    help: '?',
    back: 'Меню',
    tut_goal: 'Цель: По числам строк и столбцов вычислите, какие клетки залиты, и откройте скрытую пиксельную картинку.',
    tut_controls: 'Управление: Нажмите на клетку, чтобы залить её. Кнопка режима переключает на метки — отмечайте пустые клетки (метки бесплатны).',
    tut_win: 'Победа: Залейте все нужные клетки, чтобы открыть картинку. Пройдите все 6 уровней.',
    tut_lose: 'Поражение: Неверная заливка стоит одного жетона. Жетоны кончились — уровень проигран.',
    tut_tip: 'Подсказка: Число подсказки — это длина непрерывной серии залитых клеток слева направо или сверху вниз.',
  },
};

// Optional AI decorative decals (procedural fallback always present)
var SPRITE_NAMES = ['reveal_bg', 'solved_stamp'];

// ── TUNABLES ─────────────────────────────────────────────────────────────
var GRID = 10;
var START_TOKENS = 5;
var PUZZLE_COUNT = 6;
var CELL_GAP = 2;
var REVEAL_FLASH_SEC = 1.6;
var WRONG_SHAKE = 0.6;
var HINT_PULSE_HZ = 3.5;
var MARK_DOT_RATIO = 0.18;

// ── PUZZLE LIBRARY (10x10 pictures; clues derived) ─────────────────────────
// Density escalates: 40, 52, 58, 68, 70, 89 filled cells.
var PICTURES = [
  { name: 'arrow', accent: '#4dd0e1', rows: [
    '....#.....','...##.....','..###.....','.#########','##########',
    '.#########','..###.....','...##.....','....#.....','..........' ] },
  { name: 'heart', accent: '#ff5a7a', rows: [
    '.##..##...','##########','##########','.########.','.########.',
    '..######..','...####...','....##....','..........','..........' ] },
  { name: 'tree', accent: '#5fd86a', rows: [
    '....##....','...####...','..######..','.########.','##########',
    '.########.','..######..','.########.','....##....','...####...' ] },
  { name: 'cat', accent: '#ffb454', rows: [
    '##......##','###....###','##########','#.######.#','##########',
    '##########','.########.','..######..','..#....#..','.##....##.' ] },
  { name: 'robot', accent: '#a78bfa', rows: [
    '.########.','.#.####.#.','.########.','.########.','##########',
    '##.####.##','##.####.##','.########.','.#......#.','.##....##.' ] },
  { name: 'crown', accent: '#ffd34d', rows: [
    '#..#..#..#','##.##.##.#','##########','##########','##########',
    '##########','##########','#.######.#','##########','##########' ] },
];

// Cell value flags
var SOLID = 1, BLANK = 0;        // solution
var ST_UNKNOWN = 0, ST_FILLED = 1, ST_MARKED = 2;  // player state

// Derive run-length clues from a line of solution values.
function clueFromLine(vals) {
  var out = [], run = 0;
  for (var i = 0; i < vals.length; i++) {
    if (vals[i] === SOLID) run++;
    else if (run > 0) { out.push(run); run = 0; }
  }
  if (run > 0) out.push(run);
  if (out.length === 0) out.push(0);
  return out;
}

function buildPuzzle(idx) {
  var pic = PICTURES[idx % PICTURES.length];
  var sol = [];      // sol[r][col] = SOLID|BLANK
  for (var r = 0; r < GRID; r++) {
    var row = [];
    for (var col = 0; col < GRID; col++) {
      row.push(pic.rows[r].charAt(col) === '#' ? SOLID : BLANK);
    }
    sol.push(row);
  }
  var rowClues = [], colClues = [];
  for (var r2 = 0; r2 < GRID; r2++) rowClues.push(clueFromLine(sol[r2]));
  for (var col2 = 0; col2 < GRID; col2++) {
    var colVals = [];
    for (var rr2 = 0; rr2 < GRID; rr2++) colVals.push(sol[rr2][col2]);
    colClues.push(clueFromLine(colVals));
  }
  var target = 0;
  for (var a = 0; a < GRID; a++) for (var b = 0; b < GRID; b++) if (sol[a][b] === SOLID) target++;
  return { name: pic.name, accent: pic.accent, sol: sol, rowClues: rowClues, colClues: colClues, target: target };
}

// Deterministic daily seed → featured puzzle index (all 6 still playable).
function dailySeedIndex() {
  var d = new Date();
  var key = d.getUTCFullYear() * 372 + (d.getUTCMonth() + 1) * 31 + d.getUTCDate();
  return key % PUZZLE_COUNT;
}

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';                 // MENU | PLAYING | GAMEOVER | WON | CLEAR
var puzzleIdx = 0;
var puzzle = null;
var cellState = [];              // [r][col] = ST_*
var tokens = START_TOKENS;
var solvedCount = 0;
var moves = 0;
var errorsThisPuzzle = 0;
var mode = 'fill';               // fill | mark
var best = 0;                    // best (lowest) total errors across a full clear
var bestErrors = {};             // per-puzzle best errors {idx: n}

// layout (recomputed each frame in draw)
var layout = { ox: 0, oy: 0, cell: 0, gutterL: 0, gutterT: 0, boardX: 0, boardY: 0 };
var revealT = 0;                 // counts up during CLEAR/WON flourish
var lastWrong = { r: -1, c: -1, t: 0 };
var pulseT = 0;

// long-press tracking
var press = { r: -1, c: -1, t0: 0 };
var LONG_PRESS_MS = 380;

// ── HELPERS ──────────────────────────────────────────────────────────────
function loadBest() {
  try {
    var b = parseInt(localStorage.getItem('pixel_reveal_best') || '0');
    if (!isNaN(b)) best = b;
    var be = localStorage.getItem('pixel_reveal_best_errors');
    if (be) bestErrors = JSON.parse(be) || {};
  } catch (e) {}
}
function saveBestErrors() {
  try { localStorage.setItem('pixel_reveal_best_errors', JSON.stringify(bestErrors)); } catch (e) {}
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startPuzzle(idx) {
  puzzleIdx = ((idx % PUZZLE_COUNT) + PUZZLE_COUNT) % PUZZLE_COUNT;
  puzzle = buildPuzzle(puzzleIdx);
  cellState = [];
  for (var r = 0; r < GRID; r++) {
    var row = [];
    for (var c = 0; c < GRID; c++) row.push(ST_UNKNOWN);
    cellState.push(row);
  }
  tokens = START_TOKENS;
  solvedCount = 0;
  moves = 0;
  errorsThisPuzzle = 0;
  mode = 'fill';
  revealT = 0;
  lastWrong.t = 0;
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function startGame() {
  startPuzzle(dailySeedIndex());
}

function retryPuzzle() {
  startPuzzle(puzzleIdx);
}

function nextPuzzle() {
  if (puzzleIdx + 1 >= PUZZLE_COUNT) {
    goWon();
  } else {
    startPuzzle(puzzleIdx + 1);
  }
}

function goMenu() {
  gs = 'MENU';
  GF.gameEnded();
  GF.saveRun();
}

function goWon() {
  gs = 'WON';
  revealT = 0;
  var total = 0;
  for (var i = 0; i < PUZZLE_COUNT; i++) total += (bestErrors[i] != null ? bestErrors[i] : 0);
  var newBest = (best === 0) || total < best;
  if (newBest) {
    best = total;
    try { localStorage.setItem('pixel_reveal_best', String(best)); } catch (e) {}
  }
  GF.gameEnded();
  GF.happytime();
  GF.saveRun();
}

function gameOver() {
  gs = 'GAMEOVER';
  GF.gameEnded();
  GF.saveRun();
}

function puzzleSolved() {
  gs = 'CLEAR';
  revealT = 0;
  var prev = bestErrors[puzzleIdx];
  if (prev == null || errorsThisPuzzle < prev) {
    bestErrors[puzzleIdx] = errorsThisPuzzle;
    saveBestErrors();
  }
  GF.gameEnded();
  GF.happytime();
  GF.saveRun();
}

// Player tapped a board cell (already validated as inside the grid).
function tapCell(r, c, asMark) {
  if (gs !== 'PLAYING') return;
  var st = cellState[r][c];
  if (asMark || mode === 'mark') {
    if (st === ST_FILLED) return; // can't mark an already-filled correct cell
    cellState[r][c] = (st === ST_MARKED) ? ST_UNKNOWN : ST_MARKED;
    moves++;
    GF.saveRun();
    return;
  }
  // FILL mode
  if (st === ST_FILLED) return;      // already filled — no-op
  moves++;
  if (puzzle.sol[r][c] === SOLID) {
    cellState[r][c] = ST_FILLED;
    solvedCount++;
    var fx = layout.boardX + c * layout.cell + layout.cell / 2;
    var fy = layout.boardY + r * layout.cell + layout.cell / 2;
    GF.spawnParticles(fx, fy, puzzle.accent, 7);
    if (solvedCount >= puzzle.target) { puzzleSolved(); return; }
  } else {
    // wrong fill — spend a token, leave a mark so the player learns it's empty
    cellState[r][c] = ST_MARKED;
    tokens--;
    errorsThisPuzzle++;
    lastWrong.r = r; lastWrong.c = c; lastWrong.t = 1;
    GF.setShake(WRONG_SHAKE);
    var wx = layout.boardX + c * layout.cell + layout.cell / 2;
    var wy = layout.boardY + r * layout.cell + layout.cell / 2;
    GF.spawnParticles(wx, wy, '#ff4d4d', 6);
    if (tokens <= 0) { gameOver(); return; }
  }
  GF.saveRun();
}

function toggleMode() {
  if (gs !== 'PLAYING') return;
  mode = (mode === 'fill') ? 'mark' : 'fill';
  GF.saveRun();
}

// Screenshot helper — fast-forward into a busy mid-game state.
window._jumpLevel = function(n) {
  var idx = (n != null ? n : 3);
  startPuzzle(idx);
  var revealRatio = 0.72;
  for (var r = 0; r < GRID; r++) {
    for (var c = 0; c < GRID; c++) {
      if (puzzle.sol[r][c] === SOLID && Math.random() < revealRatio) {
        cellState[r][c] = ST_FILLED; solvedCount++;
      } else if (puzzle.sol[r][c] === BLANK && Math.random() < 0.18) {
        cellState[r][c] = ST_MARKED;
      }
    }
  }
  if (solvedCount >= puzzle.target) { cellState[0][0] = ST_UNKNOWN; solvedCount--; }
  tokens = 4;
};

// Force a specific state. 1=PLAYING 2=WON 3=GAMEOVER 4=CLEAR 0=MENU
window._setState = function(s) {
  if (s === 1 || s === 'PLAYING') { if (!puzzle || gs !== 'PLAYING') window._jumpLevel(2); gs = 'PLAYING'; }
  else if (s === 2 || s === 'WON') { if (!puzzle) startPuzzle(0); gs = 'WON'; revealT = REVEAL_FLASH_SEC; }
  else if (s === 3 || s === 'GAMEOVER') { if (!puzzle) startPuzzle(0); gs = 'GAMEOVER'; }
  else if (s === 4 || s === 'CLEAR') { if (!puzzle) window._jumpLevel(2); gs = 'CLEAR'; revealT = REVEAL_FLASH_SEC; }
  else { gs = 'MENU'; }
};

// Setup for take_screenshots.js — a partially solved dense grid.
window._setupForScreenshot = function(n) {
  window._jumpLevel(n != null ? n : 4);
  gs = 'PLAYING';
};

window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return "system-ui, -apple-system, sans-serif"; };

// Expose state for the post-build-tester gate.
GF.exposeState(function() {
  return { gs: gs, puzzleIdx: puzzleIdx, tokens: tokens, solvedCount: solvedCount,
           target: puzzle ? puzzle.target : 0, moves: moves, errors: errorsThisPuzzle,
           mode: mode };
});

// ── LAYOUT ───────────────────────────────────────────────────────────────
function computeLayout() {
  var W = GF.W, H = GF.H;
  var topBarH = GF.clamp(58 * GF.S, 48, 84);   // HUD: puzzle + progress + token pips row
  var modeH = GF.clamp(54 * GF.S, 44, 72);     // bottom mode-toggle button
  var modeGap = GF.clamp(14 * GF.S, 10, 24);   // gap between board and mode button
  var availTop = topBarH + GF.clamp(6 * GF.S, 5, 14);
  var availBot = H - GF.clamp(10 * GF.S, 8, 20);  // bottom margin
  var availH = availBot - availTop;
  var pad = GF.clamp(6 * GF.S, 5, 14);
  // Gutter (clue band) is a fraction of the board cells. 10-wide lines rarely
  // need >4 clue numbers, so ~2.3 cells of gutter is enough and frees board
  // width on narrow phones.
  var gutterCells = 2.3;
  // Board + gutter must fit the width; on portrait, width is usually the
  // limiter. We also reserve modeH+modeGap of the play band for the button so
  // the board grows into the remaining height when the screen is tall.
  var usableW = W - pad * 2;
  var usableH = availH - modeH - modeGap;
  var cellByW = usableW / (GRID + gutterCells);
  var cellByH = usableH / (GRID + gutterCells);
  var cell = Math.floor(Math.min(cellByW, cellByH));
  cell = Math.max(cell, 14);
  var gutter = cell * gutterCells;
  var boardW = cell * GRID;
  var totalW = gutter + boardW;
  var totalH = gutter + boardW;
  // Position the board+button GROUP near the top of the play band. On tall
  // portrait the square board can't fill the height (width is the limiter), so
  // any leftover slack must go SOMEWHERE — pooling it below the grouped button
  // reads as natural breathing room, whereas centering sandwiches an ugly gap
  // between the HUD and the board. Use a small top offset (≤18% of slack).
  var groupH = totalH + modeGap + modeH;
  var slack = Math.max(0, availH - groupH);
  var groupTop = availTop + Math.min(slack * 0.18, GF.clamp(24 * GF.S, 14, 40));
  var ox = (W - totalW) / 2;
  var oy = groupTop;
  layout.cell = cell;
  layout.gutterL = gutter;
  layout.gutterT = gutter;
  layout.boardX = ox + gutter;
  layout.boardY = oy + gutter;
  layout.topBarH = topBarH;
  layout.modeH = modeH;
  // Mode button sits just under the board (grouped), clamped above the bottom.
  layout.modeY = Math.min(oy + totalH + modeGap, H - modeH - GF.clamp(10 * GF.S, 8, 20));
  layout.modeW = GF.clamp(220 * GF.S, 150, 300);
  layout.W = W; layout.H = H;
}

// HUD button rects in CANVAS pixel space. Calls computeLayout() so the mode
// button position is always in sync with the board (input handlers and draw
// both rely on this).
function hudRects() {
  computeLayout();
  var W = GF.W;
  var s = GF.clamp(38 * GF.S, 30, 50);
  var pad = GF.clamp(8 * GF.S, 6, 14);
  var backW = GF.clamp(74 * GF.S, 58, 110);
  var backH = s;
  var backX = W - pad - backW;
  var backY = pad;
  var helpX = backX - pad - s;
  var helpY = pad;
  var modeW = layout.modeW;
  var modeH = layout.modeH;
  var modeX = (W - modeW) / 2;
  var modeY = layout.modeY;
  return {
    back: { x: backX, y: backY, w: backW, h: backH },
    help: { x: helpX, y: helpY, w: s, h: s },
    mode: { x: modeX, y: modeY, w: modeW, h: modeH },
  };
}

// Map a client (CSS) coordinate to canvas pixel coordinate — per-click scale.
function toCanvas(clientX, clientY) {
  var rect = GF.canvas.getBoundingClientRect();
  var sx = GF.canvas.width / rect.width;
  var sy = GF.canvas.height / rect.height;
  return { x: (clientX - rect.left) * sx, y: (clientY - rect.top) * sy };
}

function pointInRect(px, py, r) {
  return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

// ── INPUT ──────────────────────────────────────────────────────────────
function onPointerDown(clientX, clientY) {
  var p = toCanvas(clientX, clientY);
  var rects = hudRects();

  if (helpOpen) { helpOpen = false; return; }

  if (gs === 'PLAYING' || gs === 'GAMEOVER' || gs === 'WON' || gs === 'CLEAR') {
    if (pointInRect(p.x, p.y, rects.back)) { goMenu(); return; }
    if (pointInRect(p.x, p.y, rects.help)) { helpOpen = true; return; }
  }

  if (gs === 'MENU') {
    if (pointInRect(p.x, p.y, menuPlayRect)) startGame();
    return;
  }
  if (gs === 'GAMEOVER') {
    if (pointInRect(p.x, p.y, ovRetryRect)) retryPuzzle();
    else if (pointInRect(p.x, p.y, ovMenuRect)) goMenu();
    return;
  }
  if (gs === 'CLEAR') {
    if (revealT < 0.4) return; // let the flourish breathe
    if (pointInRect(p.x, p.y, ovNextRect)) nextPuzzle();
    else if (pointInRect(p.x, p.y, ovMenuRect)) goMenu();
    return;
  }
  if (gs === 'WON') {
    if (pointInRect(p.x, p.y, ovMenuRect)) goMenu();
    return;
  }

  if (gs === 'PLAYING') {
    if (pointInRect(p.x, p.y, rects.mode)) { toggleMode(); return; }
    var cell = cellAt(p.x, p.y);
    if (cell) { press.r = cell.r; press.c = cell.c; press.t0 = Date.now(); }
    else { press.r = -1; }
  }
}

function onPointerUp(clientX, clientY) {
  if (gs !== 'PLAYING') return;
  if (press.r < 0) return;
  var p = toCanvas(clientX, clientY);
  var cell = cellAt(p.x, p.y);
  var held = Date.now() - press.t0;
  if (cell && cell.r === press.r && cell.c === press.c) {
    if (held >= LONG_PRESS_MS) tapCell(cell.r, cell.c, true); // long-press = mark
    else tapCell(cell.r, cell.c, false);
  }
  press.r = -1;
}

function cellAt(px, py) {
  var c = Math.floor((px - layout.boardX) / layout.cell);
  var r = Math.floor((py - layout.boardY) / layout.cell);
  if (r >= 0 && r < GRID && c >= 0 && c < GRID) return { r: r, c: c };
  return null;
}

var _cv = GF.canvas;
_cv.addEventListener('mousedown', function(e) { onPointerDown(e.clientX, e.clientY); });
_cv.addEventListener('mouseup',   function(e) { onPointerUp(e.clientX, e.clientY); });
_cv.addEventListener('touchstart', function(e) {
  if (e.changedTouches && e.changedTouches[0]) onPointerDown(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, { passive: false });
_cv.addEventListener('touchend', function(e) {
  if (e.changedTouches && e.changedTouches[0]) onPointerUp(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, { passive: false });

// ── OVERLAY RECT STORAGE (filled during draw) ─────────────────────────────
var menuPlayRect = { x: 0, y: 0, w: 0, h: 0 };
var ovRetryRect  = { x: 0, y: 0, w: 0, h: 0 };
var ovNextRect   = { x: 0, y: 0, w: 0, h: 0 };
var ovMenuRect   = { x: 0, y: 0, w: 0, h: 0 };
var helpOpen = false;

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  pulseT += dt;
  if (lastWrong.t > 0) lastWrong.t = Math.max(0, lastWrong.t - dt * 2.2);
  if (gs === 'CLEAR' || gs === 'WON') revealT += dt;
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function bodyFont() { return "system-ui, -apple-system, 'Segoe UI', sans-serif"; }

function bgGradient(ctx) {
  var g = ctx.createLinearGradient(0, 0, 0, GF.H);
  g.addColorStop(0, '#0d1020');
  g.addColorStop(1, '#070810');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, GF.W, GF.H);
}

function fitFont(ctx, txt, maxW, basePx, weight) {
  var px = basePx;
  ctx.font = (weight || '') + px + 'px ' + bodyFont();
  while (ctx.measureText(txt).width > maxW && px > 8) {
    px -= 1;
    ctx.font = (weight || '') + px + 'px ' + bodyFont();
  }
  return px;
}

function draw(ctx) {
  computeLayout();
  bgGradient(ctx);

  if (gs === 'PLAYING' || gs === 'CLEAR' || gs === 'WON' || gs === 'GAMEOVER') {
    drawBoard(ctx);
    drawClues(ctx);
    drawTopBar(ctx);
    drawHUDButtons(ctx);
    if (gs === 'PLAYING') drawModeButton(ctx);
  }

  if (gs === 'CLEAR')    drawClearOverlay(ctx);
  if (gs === 'WON')      drawWonOverlay(ctx);
  if (gs === 'GAMEOVER') drawGameOverOverlay(ctx);
  if (gs === 'MENU')     drawMenu(ctx);

  if (helpOpen) drawHelpPanel(ctx);
}

function drawBoard(ctx) {
  var cell = layout.cell, bx = layout.boardX, by = layout.boardY;
  var gap = GF.clamp(CELL_GAP * GF.S, 1, 3);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  GF.rr(ctx, bx - 3, by - 3, cell * GRID + 6, cell * GRID + 6, 6);
  ctx.fill();

  var reveal = (gs === 'CLEAR' || gs === 'WON');
  var rp = reveal ? GF.clamp(revealT / REVEAL_FLASH_SEC, 0, 1) : 0;
  var rad = Math.max(2, cell * 0.12);

  for (var r = 0; r < GRID; r++) {
    for (var c = 0; c < GRID; c++) {
      var x = bx + c * cell, y = by + r * cell;
      var st = cellState[r][c];
      var isSolid = puzzle.sol[r][c] === SOLID;
      ctx.fillStyle = ((r + c) % 2 === 0) ? 'rgba(255,255,255,0.055)' : 'rgba(255,255,255,0.025)';
      GF.rr(ctx, x + gap, y + gap, cell - gap * 2, cell - gap * 2, rad);
      ctx.fill();

      if (reveal) {
        if (isSolid) {
          ctx.globalAlpha = 0.45 + 0.55 * rp;
          ctx.fillStyle = puzzle.accent;
          GF.rr(ctx, x + gap, y + gap, cell - gap * 2, cell - gap * 2, rad);
          ctx.fill();
          ctx.globalAlpha = 0.18 * rp;
          ctx.fillStyle = '#ffffff';
          GF.rr(ctx, x + gap, y + gap, cell - gap * 2, (cell - gap * 2) * 0.4, rad);
          ctx.fill();
          ctx.globalAlpha = 1;
        } else {
          ctx.globalAlpha = 0.25 * (1 - rp);
          ctx.fillStyle = '#1a2030';
          GF.rr(ctx, x + gap, y + gap, cell - gap * 2, cell - gap * 2, rad);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
        continue;
      }

      if (st === ST_FILLED) {
        ctx.fillStyle = puzzle.accent;
        GF.rr(ctx, x + gap, y + gap, cell - gap * 2, cell - gap * 2, rad);
        ctx.fill();
        ctx.globalAlpha = 0.16;
        ctx.fillStyle = '#ffffff';
        GF.rr(ctx, x + gap, y + gap, cell - gap * 2, (cell - gap * 2) * 0.42, rad);
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (st === ST_MARKED) {
        var dr = (cell - gap * 2) * MARK_DOT_RATIO;
        ctx.strokeStyle = 'rgba(255,90,90,0.55)';
        ctx.lineWidth = Math.max(1.5, cell * 0.06);
        var cxp = x + cell / 2, cyp = y + cell / 2;
        ctx.beginPath();
        ctx.moveTo(cxp - dr, cyp - dr); ctx.lineTo(cxp + dr, cyp + dr);
        ctx.moveTo(cxp + dr, cyp - dr); ctx.lineTo(cxp - dr, cyp + dr);
        ctx.stroke();
      }
      if (lastWrong.t > 0 && lastWrong.r === r && lastWrong.c === c) {
        ctx.globalAlpha = lastWrong.t;
        ctx.strokeStyle = '#ff4d4d';
        ctx.lineWidth = 3;
        GF.rr(ctx, x + gap, y + gap, cell - gap * 2, cell - gap * 2, rad);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
  }

  // 5-cell group separators
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1.5;
  for (var k = 0; k <= GRID; k += 5) {
    var gx = bx + k * cell;
    ctx.beginPath(); ctx.moveTo(gx, by); ctx.lineTo(gx, by + cell * GRID); ctx.stroke();
    var gy = by + k * cell;
    ctx.beginPath(); ctx.moveTo(bx, gy); ctx.lineTo(bx + cell * GRID, gy); ctx.stroke();
  }
}

function drawClues(ctx) {
  if (!puzzle) return;
  var cell = layout.cell, bx = layout.boardX, by = layout.boardY;
  var fs = Math.max(9, Math.floor(cell * 0.34));
  ctx.font = '600 ' + fs + 'px ' + bodyFont();
  ctx.fillStyle = '#cfe3ff';
  ctx.textBaseline = 'middle';

  ctx.textAlign = 'right';
  for (var r = 0; r < GRID; r++) {
    var clue = puzzle.rowClues[r];
    var cy = by + r * cell + cell / 2;
    ctx.fillText(clue.join(' '), bx - Math.max(4, cell * 0.18), cy);
  }
  ctx.textAlign = 'center';
  for (var c = 0; c < GRID; c++) {
    var clueC = puzzle.colClues[c];
    var cxp = bx + c * cell + cell / 2;
    var n = clueC.length;
    var lineH = fs + 2;
    var startY = by - Math.max(4, cell * 0.14) - (n - 1) * lineH;
    for (var i = 0; i < n; i++) ctx.fillText(String(clueC[i]), cxp, startY + i * lineH);
  }
  ctx.textBaseline = 'alphabetic';
}

function drawTopBar(ctx) {
  var W = GF.W;
  var pad = GF.clamp(12 * GF.S, 8, 20);
  var y = GF.clamp(26 * GF.S, 20, 40);
  var fs = GF.clamp(15 * GF.S, 12, 20);
  ctx.font = '700 ' + fs + 'px ' + bodyFont();
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#9fb4d6';
  ctx.textAlign = 'left';
  ctx.fillText(GF.t('puzzle') + ' ' + (puzzleIdx + 1) + '/' + PUZZLE_COUNT, pad, y);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  if (puzzle) ctx.fillText(solvedCount + ' / ' + puzzle.target, W / 2, y);
  drawTokenPips(ctx, y + GF.clamp(24 * GF.S, 18, 34));
  ctx.textBaseline = 'alphabetic';
}

function drawTokenPips(ctx, y) {
  var pad = GF.clamp(12 * GF.S, 8, 20);
  var fs = GF.clamp(13 * GF.S, 11, 18);
  ctx.font = '600 ' + fs + 'px ' + bodyFont();
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#8aa3c0';
  var label = GF.t('tokens') + ': ';
  ctx.fillText(label, pad, y);
  var lw = ctx.measureText(label).width;
  var pipR = GF.clamp(7 * GF.S, 5, 11);
  var gap = pipR * 2.4;
  var x0 = pad + lw + pipR + 2;
  for (var i = 0; i < START_TOKENS; i++) {
    var on = i < tokens;
    var px = x0 + i * gap;
    var pulse = (tokens === 1 && on && i === 0) ? (0.6 + 0.4 * Math.sin(pulseT * 6)) : 1;
    ctx.beginPath();
    ctx.moveTo(px, y - pipR);
    ctx.lineTo(px + pipR, y);
    ctx.lineTo(px, y + pipR);
    ctx.lineTo(px - pipR, y);
    ctx.closePath();
    if (on) { ctx.globalAlpha = pulse; ctx.fillStyle = '#ffd34d'; ctx.fill(); ctx.globalAlpha = 1; }
    else { ctx.strokeStyle = 'rgba(255,80,80,0.55)'; ctx.lineWidth = 1.5; ctx.stroke(); }
  }
  ctx.textBaseline = 'alphabetic';
}

function drawHUDButtons(ctx) {
  var rects = hudRects();
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  GF.rr(ctx, rects.help.x, rects.help.y, rects.help.w, rects.help.h, 8); ctx.fill();
  ctx.fillStyle = '#dce8ff';
  ctx.font = '700 ' + GF.clamp(20 * GF.S, 16, 28) + 'px ' + bodyFont();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('help'), rects.help.x + rects.help.w / 2, rects.help.y + rects.help.h / 2 + 1);

  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  GF.rr(ctx, rects.back.x, rects.back.y, rects.back.w, rects.back.h, 8); ctx.fill();
  ctx.fillStyle = '#dce8ff';
  fitFont(ctx, GF.t('back'), rects.back.w - 16, GF.clamp(14 * GF.S, 11, 18), '600 ');
  ctx.fillText(GF.t('back'), rects.back.x + rects.back.w / 2, rects.back.y + rects.back.h / 2 + 1);
  ctx.textBaseline = 'alphabetic';
}

function drawModeButton(ctx) {
  var rects = hudRects();
  var r = rects.mode;
  var isFill = mode === 'fill';
  var g = ctx.createLinearGradient(r.x, r.y, r.x, r.y + r.h);
  if (isFill) { g.addColorStop(0, '#2ecc71'); g.addColorStop(1, '#27ae60'); }
  else        { g.addColorStop(0, '#e67e22'); g.addColorStop(1, '#d35400'); }
  GF.rr(ctx, r.x, r.y, r.w, r.h, r.h / 2); ctx.fillStyle = g; ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var label = GF.t('mode') + ': ' + (isFill ? GF.t('fill') : GF.t('mark'));
  fitFont(ctx, label, r.w - 28, GF.clamp(18 * GF.S, 14, 24), '700 ');
  ctx.fillText(label, r.x + r.w / 2, r.y + r.h / 2 + 1);
  ctx.textBaseline = 'alphabetic';
}

// ── OVERLAYS ───────────────────────────────────────────────────────────────
function dimScrim(ctx, a) {
  ctx.fillStyle = 'rgba(6,8,16,' + (a || 0.82) + ')';
  ctx.fillRect(0, 0, GF.W, GF.H);
}

function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

function drawButton(ctx, rect, label, kind) {
  var g = ctx.createLinearGradient(rect.x, rect.y, rect.x, rect.y + rect.h);
  if (kind === 'menu') { g.addColorStop(0, '#3a4358'); g.addColorStop(1, '#2a3145'); }
  else { g.addColorStop(0, '#2ecc71'); g.addColorStop(1, '#27ae60'); }
  GF.rr(ctx, rect.x, rect.y, rect.w, rect.h, rect.h / 2); ctx.fillStyle = g; ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  fitFont(ctx, label, rect.w - 24, GF.clamp(17 * GF.S, 13, 22), '700 ');
  ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2 + 1);
  ctx.textBaseline = 'alphabetic';
}

function drawMenu(ctx) {
  dimScrim(ctx, 0.9);
  var W = GF.W, H = GF.H, cx = GF.cx;
  var titleFs = GF.clamp(40 * GF.S, 26, 60);
  ctx.shadowColor = 'rgba(77,208,225,0.5)'; ctx.shadowBlur = 26 * GF.S;
  ctx.font = '800 ' + titleFs + 'px ' + bodyFont();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  var titleY = GF.clamp(H * 0.15, 56, 170);
  ctx.fillText(GF.t('title'), cx, titleY);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  ctx.font = GF.clamp(15 * GF.S, 12, 20) + 'px ' + bodyFont();
  ctx.fillStyle = '#9fb4d6';
  ctx.fillText(GF.t('sub'), cx, titleY + GF.clamp(28 * GF.S, 20, 38));

  var maxW = Math.min(W - 48, GF.clamp(420 * GF.S, 280, 520));
  var fs = GF.clamp(13 * GF.S, 11, 16);
  ctx.font = fs + 'px ' + bodyFont();
  var lineH = fs + 4;
  var items = [GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip')];
  var y = titleY + GF.clamp(56 * GF.S, 42, 78);
  ctx.fillStyle = '#c7d4ea';
  for (var k = 0; k < items.length; k++) {
    var lines = wrapLines(ctx, items[k], maxW);
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], cx, y); y += lineH; }
    y += Math.round(lineH * 0.45);
  }

  var wide = W / H > 1.15;
  var btnW = GF.clamp(240 * GF.S, 170, 320), btnH = GF.clamp(54 * GF.S, 44, 68);
  var drawW = wide ? GF.clamp(320 * GF.S, 180, 420) : btnW;
  var drawH = wide ? GF.clamp(70 * GF.S, 48, 90) : btnH;
  var textBlockBottom = y;
  var clearMargin = drawH / 2 + 16;
  var wideFloor = H * 0.56;
  var baseY = Math.min(textBlockBottom + GF.clamp(8 * GF.S, 6, 16), H - btnH - GF.clamp(24 * GF.S, 16, 40));
  var drawY = wide ? Math.max(textBlockBottom + clearMargin, wideFloor) : baseY;
  // stable hit-rect at base size
  menuPlayRect = { x: cx - btnW / 2, y: drawY + (drawH - btnH) / 2, w: btnW, h: btnH };
  if (wide) {
    var _t = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000;
    var _k = Math.sin(_t * 2.2);
    var _p = 1 + 0.05 * _k;
    var pw = drawW * _p, ph = drawH * _p;
    var px = cx - pw / 2, py2 = drawY + (drawH - ph) / 2;
    ctx.save();
    ctx.shadowColor = 'rgba(46,204,113,' + (0.4 + 0.28 * _k).toFixed(3) + ')';
    ctx.shadowBlur = (22 + 10 * _k) * GF.S;
    var pulsedRect = { x: px, y: py2, w: pw, h: ph };
    drawButton(ctx, pulsedRect, '▶ ' + GF.t('play'), 'play');
    ctx.restore();
  } else {
    drawButton(ctx, { x: cx - drawW / 2, y: drawY, w: drawW, h: drawH }, GF.t('play'), 'play');
  }

  if (best > 0) {
    ctx.font = GF.clamp(12 * GF.S, 10, 16) + 'px ' + bodyFont();
    ctx.fillStyle = '#6e7da0';
    ctx.fillText(GF.t('best_errors') + ': ' + best, cx, drawY + drawH + GF.clamp(24 * GF.S, 16, 34));
  }
}

function layoutOverlayButtons(twoButtons) {
  var W = GF.W, H = GF.H, cx = GF.cx;
  var btnW = GF.clamp(150 * GF.S, 118, 200), btnH = GF.clamp(52 * GF.S, 42, 64);
  var y = H * 0.72;
  if (twoButtons) {
    var gap = GF.clamp(14 * GF.S, 10, 24);
    var totW = btnW * 2 + gap;
    var x0 = cx - totW / 2;
    return [{ x: x0, y: y, w: btnW, h: btnH }, { x: x0 + btnW + gap, y: y, w: btnW, h: btnH }];
  }
  return [{ x: cx - btnW / 2, y: y, w: btnW, h: btnH }];
}

function drawClearOverlay(ctx) {
  var rp = GF.clamp(revealT / REVEAL_FLASH_SEC, 0, 1);
  ctx.fillStyle = 'rgba(6,8,16,' + (0.30 + 0.10 * rp) + ')';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var cx = GF.cx;
  var titleFs = GF.clamp(34 * GF.S, 24, 52);
  ctx.shadowColor = (puzzle ? puzzle.accent : '#4dd0e1'); ctx.shadowBlur = 24 * GF.S;
  ctx.font = '800 ' + titleFs + 'px ' + bodyFont();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  var ty = GF.clamp(GF.H * 0.12, 50, 140);
  ctx.fillText(GF.t('solved'), cx, ty);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = GF.clamp(14 * GF.S, 12, 20) + 'px ' + bodyFont();
  ctx.fillStyle = '#cfe3ff';
  ctx.fillText(GF.t('errors_used') + ': ' + errorsThisPuzzle + '   ' + GF.t('moves_used') + ': ' + moves,
               cx, ty + GF.clamp(28 * GF.S, 20, 36));

  var btns = layoutOverlayButtons(true);
  ovNextRect = btns[0]; ovMenuRect = btns[1];
  drawButton(ctx, ovNextRect, GF.t('next'), 'play');
  drawButton(ctx, ovMenuRect, GF.t('menu'), 'menu');
}

function drawWonOverlay(ctx) {
  var rp = GF.clamp(revealT / REVEAL_FLASH_SEC, 0, 1);
  ctx.fillStyle = 'rgba(6,8,16,' + (0.30 + 0.10 * rp) + ')';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var cx = GF.cx;
  var titleFs = GF.clamp(38 * GF.S, 24, 56);
  ctx.shadowColor = '#ffd34d'; ctx.shadowBlur = 26 * GF.S;
  ctx.font = '800 ' + titleFs + 'px ' + bodyFont();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  var ty = GF.clamp(GF.H * 0.12, 50, 140);
  ctx.fillText(GF.t('won'), cx, ty);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = GF.clamp(14 * GF.S, 12, 20) + 'px ' + bodyFont();
  ctx.fillStyle = '#cfe3ff';
  ctx.fillText(GF.t('best_errors') + ': ' + best, cx, ty + GF.clamp(28 * GF.S, 20, 36));

  var btns = layoutOverlayButtons(false);
  ovMenuRect = btns[0];
  drawButton(ctx, ovMenuRect, GF.t('menu'), 'menu');
}

function drawGameOverOverlay(ctx) {
  dimScrim(ctx, 0.78);
  var cx = GF.cx;
  var titleFs = GF.clamp(32 * GF.S, 22, 50);
  ctx.shadowColor = 'rgba(255,80,80,0.5)'; ctx.shadowBlur = 22 * GF.S;
  ctx.font = '800 ' + titleFs + 'px ' + bodyFont();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  var ty = GF.clamp(GF.H * 0.30, 80, 260);
  fitFont(ctx, GF.t('gameover'), GF.W - 48, titleFs, '800 ');
  ctx.fillText(GF.t('gameover'), cx, ty);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = GF.clamp(14 * GF.S, 12, 20) + 'px ' + bodyFont();
  ctx.fillStyle = '#cfe3ff';
  ctx.fillText(GF.t('errors_used') + ': ' + errorsThisPuzzle, cx, ty + GF.clamp(28 * GF.S, 20, 36));

  var btns = layoutOverlayButtons(true);
  ovRetryRect = btns[0]; ovMenuRect = btns[1];
  drawButton(ctx, ovRetryRect, GF.t('retry'), 'play');
  drawButton(ctx, ovMenuRect, GF.t('menu'), 'menu');
}

function drawHelpPanel(ctx) {
  dimScrim(ctx, 0.9);
  var W = GF.W, cx = GF.cx;
  var titleFs = GF.clamp(24 * GF.S, 18, 34);
  ctx.font = '800 ' + titleFs + 'px ' + bodyFont();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  var ty = GF.clamp(GF.H * 0.12, 50, 140);
  ctx.fillText(GF.t('title'), cx, ty);
  var maxW = Math.min(W - 48, GF.clamp(440 * GF.S, 280, 540));
  var fs = GF.clamp(14 * GF.S, 12, 18);
  ctx.font = fs + 'px ' + bodyFont();
  var lineH = fs + 5;
  var items = [GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip')];
  var y = ty + GF.clamp(40 * GF.S, 30, 56);
  ctx.fillStyle = '#c7d4ea';
  for (var k = 0; k < items.length; k++) {
    var lines = wrapLines(ctx, items[k], maxW);
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], cx, y); y += lineH; }
    y += Math.round(lineH * 0.5);
  }
  ctx.fillStyle = '#7d8db0';
  ctx.font = GF.clamp(12 * GF.S, 10, 16) + 'px ' + bodyFont();
  ctx.fillText('(' + GF.t('back') + ')', cx, y + GF.clamp(8 * GF.S, 4, 14));
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 480,
  designH: 800,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'pixel_reveal',
  onReady: function() {
    loadBest();
    // ── Yandex 1.9 — RUN PROGRESS MUST PERSIST ACROSS RELOAD ──
    GF.persist('pixel_reveal_run_v1',
      function() {
        if (gs !== 'PLAYING') return { gs: gs, puzzleIdx: puzzleIdx };
        return {
          gs: gs, puzzleIdx: puzzleIdx, tokens: tokens, solvedCount: solvedCount,
          moves: moves, errors: errorsThisPuzzle, mode: mode, cells: cellState,
        };
      },
      function(s) {
        if (!s) return;
        puzzleIdx = s.puzzleIdx || 0;
        if (s.gs === 'PLAYING' && s.cells) {
          puzzle = buildPuzzle(puzzleIdx);
          cellState = s.cells;
          tokens = (s.tokens != null) ? s.tokens : START_TOKENS;
          solvedCount = s.solvedCount || 0;
          moves = s.moves || 0;
          errorsThisPuzzle = s.errors || 0;
          mode = s.mode || 'fill';
          gs = 'PLAYING';
        } else {
          gs = 'MENU';
        }
      }
    );
    if (gs !== 'PLAYING') gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// ── YANDEX MUST-HAVES — DON'T REMOVE WITHOUT READING ─────────────────────
// 1. ALL UI TEXT THROUGH GF.t() / STRINGS  (Yandex 8.2.3) — every label routes
//    through GF.t(); both en + ru present. Clue numbers are language-neutral.
// 2. SAVE RUN STATE ACROSS RELOAD  (Yandex 1.9) — GF.persist() above stores the
//    grid, tokens, puzzleIdx, mode; GF.saveRun() called after every mutating
//    action (tapCell, toggleMode, all state transitions).
// 3. FULLSCREEN-EXIT RESIZE  (Yandex 1.6.2.3) — handled by gf-lib listeners.
// 4. ADS ON USER-CLICK ONLY  (Yandex 4.4) — no fullscreen ad is fired on a
//    state transition. This v1 ships no interstitials and no rewarded ads; any
//    future ad must be gated inside a button-click handler with a no-fill
//    watchdog (see the template pattern).
// ─────────────────────────────────────────────────────────────────────────

})();
</script>
