<script>
(function () {
'use strict';

// ── LOCALISED STRINGS (en + ru — Yandex 8.2.3) ────────────────────────────
var STRINGS = {

    tut_win: 'Бесконечно: сдавай руду, покупай апгрейды, спускайся в богатые биомы.',
    tut_lose: 'Без смерти - перегрев лишь на миг глушит бур.',
    tut_tip: 'Совет: построй маршрут, что кончается на самоцветах - горячее комбо умножит их цену.',
    coachDrag: 'Держи и веди бур по руде',
  },
};

// ── TUNABLES (exposed via GF.exposeState) ─────────────────────────────────
var SHIFT_SECONDS = 45;
var HEAT_MAX = 100, HEAT_WARN = 70;
var HEAT_PER_SEC = 42, COOL_PER_SEC = 54, OVERHEAT_LOCK = 1.6;
var BEAM_RADIUS = 30, BEAM_POWER = 200;
var COMBO_WINDOW = 1.3, COMBO_MAX_MULT = 6;
var CARGO_BASE = 220, MAGNET_BASE = 0;
var DRONE_RATE = 14;            // hardness/s per drone

// ── ORE NODE TYPES ─────────────────────────────────────────────────────────
// hardness = beam-seconds*BEAM_POWER to clear; value = ore on break.
var ORE = {
  dust:   { hardness: 18,  value: 2,  r: 22, col: '#4fd6e6', col2: '#1c8a99', combo: 'dust' },
  copper: { hardness: 40,  value: 5,  r: 25, col: '#f08a3c', col2: '#9a4a16', combo: 'copper' },
  iron:   { hardness: 80,  value: 11, r: 27, col: '#9fb0c4', col2: '#4a5566', combo: 'iron' },
  gem:    { hardness: 120, value: 30, r: 27, col: '#d65cff', col2: '#6a1d99', combo: 'gem' },
  geode:  { hardness: 55,  value: 7,  r: 28, col: '#b9803f', col2: '#5a3a18', combo: 'copper', special: 'geode' },
  hot:    { hardness: 30,  value: 4,  r: 24, col: '#ff5a3c', col2: '#8a1d0c', combo: 'hot', special: 'hot' },
  ice:    { hardness: 36,  value: 6,  r: 25, col: '#a8e6ff', col2: '#3a7a99', combo: 'ice', special: 'ice' },
};
// biome bands by depth → weighted node table + node count
var BIOMES = [
  { name: 'biome0', sky: ['#142033', '#0c1422'], rock: '#1b2740', count: 16,
    table: [['dust', 45], ['copper', 35], ['iron', 12], ['geode', 8]] },
  { name: 'biome1', sky: ['#2a1f16', '#160f0a'], rock: '#33271a', count: 18,
    table: [['dust', 22], ['copper', 30], ['iron', 26], ['geode', 12], ['hot', 10]] },
  { name: 'biome2', sky: ['#1a1230', '#0e0820'], rock: '#241a3a', count: 20,
    table: [['copper', 24], ['iron', 22], ['gem', 24], ['ice', 14], ['geode', 10], ['hot', 6]] },
  { name: 'biome3', sky: ['#330f12', '#1a0608'], rock: '#3a141a', count: 22,
    table: [['copper', 14], ['iron', 22], ['gem', 34], ['hot', 22], ['geode', 8]] },
];
function biomeForDepth(d) { return BIOMES[Math.min(BIOMES.length - 1, Math.floor(d / 2))]; }

// ── UPGRADE TRACKS ─────────────────────────────────────────────────────────
var UPGRADES = [
  { key: 'power',  max: 8, base: 30, growth: 1.5  },
  { key: 'width',  max: 6, base: 45, growth: 1.55 },
  { key: 'cool',   max: 6, base: 40, growth: 1.55 },
  { key: 'magnet', max: 5, base: 55, growth: 1.6  },
  { key: 'drone',  max: 4, base: 90, growth: 1.7  },
  { key: 'refine', max: 5, base: 75, growth: 1.8  },
];
function upById(k) { for (var i = 0; i < UPGRADES.length; i++) if (UPGRADES[i].key === k) return UPGRADES[i]; return null; }
function upCost(u) { return Math.floor(u.base * Math.pow(u.growth, meta.up[u.key])); }
function upMaxed(u) { return meta.up[u.key] >= u.max; }

// effective stats (from upgrades)
function statPower() { return BEAM_POWER + meta.up.power * 30; }
function statRadius() { return BEAM_RADIUS + meta.up.width * 5; }
function statCool() { return COOL_PER_SEC + meta.up.cool * 9; }
function statHeatGain() { return Math.max(18, HEAT_PER_SEC - meta.up.cool * 3); }
function statMagnet() { return MAGNET_BASE + meta.up.magnet * 60; }
function statDrones() { return meta.up.drone; }
function statRefine() { return 1 + meta.up.refine * 0.12; }

// ── PERSISTENT META ────────────────────────────────────────────────────────
var meta = {
  ore: 0, depth: 0, best: 0, totalOre: 0,
  up: { power: 0, width: 0, cool: 0, magnet: 0, drone: 0, refine: 0 },
};
function loadMeta() {
  try {
    var raw = localStorage.getItem('cursor_mine_meta_v1');
    if (raw) {
      var s = JSON.parse(raw);
      if (s && typeof s === 'object') {
        meta.ore = s.ore | 0; meta.depth = s.depth | 0; meta.best = s.best | 0; meta.totalOre = s.totalOre | 0;
        if (s.up) for (var k in meta.up) if (typeof s.up[k] === 'number') meta.up[k] = s.up[k] | 0;
      }
    }
  } catch (e) {}
}
function saveMeta() { try { localStorage.setItem('cursor_mine_meta_v1', JSON.stringify(meta)); } catch (e) {} }

// ── GAME STATE ─────────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | MINING | CASHOUT | SHOP
var nodes = [], chips = [], drones = [];
var shiftT = SHIFT_SECONDS, cargo = 0, cargoMax = CARGO_BASE, nodesLeft = 0;
var heat = 0, overheatT = 0, mining = false;
var combo = 0, comboMult = 1, comboT = 0, lastCombo = '';
var drill = { x: 0, y: 0, tx: 0, ty: 0, on: false, ang: 0, tipGlow: 0 };
var tally = { banked: 0, sweep: false, best: false, t: 0 };
var seenTut = false, helpOpen = false;
var fieldRect = { x: 0, y: 0, w: 0, h: 0 };

var rr = GF.rr, clamp = GF.clamp, lerp = GF.lerp;
function R(a, b) { return a + (b - a) * Math.random(); }
function RI(a, b) { return Math.floor(R(a, b + 1)); }

// ── AUDIO ──────────────────────────────────────────────────────────────────
var audioMuted = GF.muted;
var sfxLast = {};
function sfxRL(name, gapMs) {
  var now = Date.now(); if (sfxLast[name] && now - sfxLast[name] < (gapMs || 70)) return;
  sfxLast[name] = now; GF.sfx(name);
}
function toggleMute() { audioMuted = GF.toggleMute(); GF.setMusicMuted(audioMuted); }

// ── BUTTON BOOKKEEPING ──────────────────────────────────────────────────────
var uiButtons = [];     // overlay buttons (screen space)
var hudButtons = [];    // in-run HUD buttons (screen space)
var shopScroll = null;  // GF.makeScroll controller (lazy)
var shopRows = [];      // content-space buy hit rects
function hit(b, x, y) { return x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }

// ── FIELD / NODE GENERATION ──────────────────────────────────────────────────
function computeField() {
  var W = GF.W, H = GF.H, S = GF.S;
  // the ore field is the central play area; HUD reserves a band top + bottom.
  var top = 84 * S, bot = 96 * S;
  fieldRect = { x: 20 * S, y: top, w: W - 40 * S, h: H - top - bot };
}
function pickOre(table) {
  var tot = 0, i; for (i = 0; i < table.length; i++) tot += table[i][1];
  var r = Math.random() * tot, acc = 0;
  for (i = 0; i < table.length; i++) { acc += table[i][1]; if (r <= acc) return table[i][0]; }
  return table[0][0];
}
function genField() {
  computeField();
  nodes = []; chips = [];
  var b = biomeForDepth(meta.depth);
  var d = Math.min(meta.depth, 9);
  var hardMul = 1 + d * 0.05, valMul = 1 + d * 0.06;
  var fr = fieldRect;
  // DENSE packed field: a tight grid where most cells hold ore, so a drag
  // continuously carves a vein (no big empty gaps between nodes). Cell size is
  // driven so neighbouring nodes nearly touch — the beam stays on ore through a
  // stroke. Same-type runs cluster into veins for big combos.
  var cellW = clamp(58 * GF.S, 40, 86);                 // target cell ~ node diameter
  var cols = Math.max(4, Math.floor(fr.w / cellW));
  var rows = Math.max(4, Math.floor(fr.h / cellW));
  cellW = fr.w / cols; var cellH = fr.h / rows;
  var fillFrac = 0.82;                                   // ~82% of cells hold ore
  var typeGrid = [];                                     // for vein clustering
  for (var ry = 0; ry < rows; ry++) {
    typeGrid[ry] = [];
    for (var cx0 = 0; cx0 < cols; cx0++) {
      if (Math.random() > fillFrac) { typeGrid[ry][cx0] = null; continue; }
      // vein bias: 55% chance to inherit the left/up neighbour's type (a streak)
      var type = null;
      if (cx0 > 0 && typeGrid[ry][cx0 - 1] && Math.random() < 0.5) type = typeGrid[ry][cx0 - 1];
      else if (ry > 0 && typeGrid[ry - 1][cx0] && Math.random() < 0.45) type = typeGrid[ry - 1][cx0];
      if (!type) type = pickOre(b.table);
      typeGrid[ry][cx0] = type;
      var o = ORE[type];
      var jitter = 0.12;
      var px = fr.x + (cx0 + 0.5 + R(-jitter, jitter)) * cellW;
      var py = fr.y + (ry + 0.5 + R(-jitter, jitter)) * cellH;
      // scale node radius to the cell so they pack snugly without big overlaps
      var nr = Math.min(o.r, (Math.min(cellW, cellH) / GF.S) * 0.46);
      var hardness = o.hardness * hardMul;
      nodes.push({ type: type, x: px, y: py, r: nr, hp: hardness, maxHp: hardness,
        value: Math.round(o.value * valMul), col: o.col, col2: o.col2, combo: o.combo,
        special: o.special || null, dead: false, hitT: 0 });
    }
  }
  nodesLeft = nodes.length;
}

// ── LIFECYCLE ────────────────────────────────────────────────────────────────
function startShift() {
  genField();
  shiftT = SHIFT_SECONDS; cargo = 0; cargoMax = Math.round(CARGO_BASE * (1 + Math.min(meta.depth, 12) * 0.12));
  heat = 0; overheatT = 0; mining = false;
  combo = 0; comboMult = 1; comboT = 0; lastCombo = '';
  drill.on = false; drill.tipGlow = 0;
  drill.x = GF.cx; drill.y = GF.cy; drill.tx = GF.cx; drill.ty = GF.cy;
  drones = [];
  for (var i = 0; i < statDrones(); i++) drones.push({ x: GF.cx + R(-40, 40), y: GF.cy + R(-40, 40), tgt: null });
  gs = 'MINING';
  GF.gameStarted();
  GF.saveRun();
  if (!seenTut && !window._silent) startTutorial();
}
function endShift(sweep) {
  // the round is over — make sure no coach/help overlay lingers to swallow the
  // CASHOUT button taps (the tutorial would otherwise hijack input on a forced end).
  if (GF.tutorial.active) { GF.tutorial.active = false; seenTut = true; }
  helpOpen = false; drill.on = false; mining = false;
  var banked = Math.min(cargo, cargoMax);
  banked = Math.round(banked * statRefine());
  meta.ore += banked; meta.totalOre += banked;
  var newBest = banked > meta.best;
  if (newBest) meta.best = banked;
  meta.depth += 1;
  saveMeta(); GF.saveRun();
  tally = { banked: banked, sweep: !!sweep, best: newBest, t: 0 };
  gs = 'CASHOUT';
  _pendingAd = true;
  GF.gameEnded();
  if (newBest && banked > 0) GF.happytime();
  GF.sfx(newBest ? 'win' : 'reward');
}
var _pendingAd = false;
function onContinue() {
  // ad fires from THIS user click only (Yandex 4.4), then go to shop
  if (_pendingAd) { _pendingAd = false; GF.ads.interstitial(); }
  openShop();
}
function onDescendFromCashout() {
  if (_pendingAd) { _pendingAd = false; GF.ads.interstitial(); }
  startShift();
}

// ── UPGRADE PURCHASE ──────────────────────────────────────────────────────────
function buyUpgrade(key) {
  var u = upById(key); if (!u || upMaxed(u)) { GF.sfx('error'); return; }
  var cost = upCost(u);
  if (meta.ore < cost) { GF.sfx('error'); return; }
  meta.ore -= cost; meta.up[key]++;
  saveMeta();
  GF.sfx('unlock');
}
function openShop() { gs = 'SHOP'; shopScroll = null; GF.saveRun(); }

// ── MINING UPDATE ─────────────────────────────────────────────────────────────
function breakNode(nd) {
  nd.dead = true; nodesLeft--;
  // combo
  if (lastCombo === nd.combo && comboT > 0) { comboMult = Math.min(COMBO_MAX_MULT, comboMult + 0.5); combo++; }
  else { comboMult = 1; combo = 1; }
  lastCombo = nd.combo; comboT = COMBO_WINDOW;
  var gain = Math.max(1, Math.round(nd.value * comboMult));
  cargo += gain;
  GF.spawnFloat(nd.x, nd.y - 10 * GF.S, '+' + gain + (comboMult > 1 ? ' x' + comboMult : ''), comboMult >= 3 ? '#ffd166' : '#fff');
  GF.spawnParticles(nd.x, nd.y, nd.col, 12);
  // special effects
  if (nd.special === 'hot') { heat = Math.min(HEAT_MAX, heat + 28); GF.setShake(0.25); GF.sfx('hurt'); }
  else if (nd.special === 'ice') { heat = Math.max(0, heat - 40); GF.sfx('pickup'); spawnChipBurst(nd.x, nd.y, '#cdeeff', 5); }
  else if (nd.special === 'geode') { spawnChipBurst(nd.x, nd.y, '#ffe0a0', RI(4, 7)); GF.sfx('merge'); }
  if (nd.type === 'gem') { GF.setShake(0.4); GF.sfx('coin'); }
  else if (nd.type === 'iron') { GF.setShake(0.2); GF.sfx('hit'); }
  else sfxRL('hit', 50);
  // first node breaks the tutorial gate
  if (GF.tutorial.active) GF.tutorial.next();
  if (nodesLeft <= 0) { endShift(true); }
}
function spawnChipBurst(x, y, col, n) {
  for (var i = 0; i < n; i++) {
    var a = R(0, 6.28), sp = R(40, 160) * GF.S;
    chips.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60 * GF.S,
      col: col, life: 3.0, val: 1, r: R(3, 6) * GF.S, picked: false });
  }
}
function update(dt) {
  GF.tutorial.update(dt);
  if (window.__shotFreeze) return;
  if (gs === 'CASHOUT') { tally.t += dt; return; }
  if (gs !== 'MINING') return;
  if (helpOpen) {
    // help card open: fully freeze the world (no mining, no clock)
    updateChips(dt); return;
  }
  // During the TUTORIAL the player learns by actually mining — so mining runs, but
  // it's NO-FAIL: the shift clock + heat penalty are suspended until the coach ends.
  var tut = GF.tutorial.active;

  // drill follows pointer tightly so the beam is where the finger is during a sweep
  drill.x = lerp(drill.x, drill.tx, 0.7);
  drill.y = lerp(drill.y, drill.ty, 0.7);

  if (!tut) {
    // shift clock (frozen during the tutorial)
    shiftT -= dt;
    if (shiftT <= 0) { shiftT = 0; endShift(false); return; }
  }

  // overheat lock (skipped during the tutorial — no-fail)
  if (!tut && overheatT > 0) {
    overheatT -= dt;
    heat = Math.max(0, heat - statCool() * 1.3 * dt);   // forced cool while locked
    drill.tipGlow = lerp(drill.tipGlow, 0, 0.2);
    updateChips(dt); updateDrones(dt); decayCombo(dt);
    return;
  }

  var activelyMining = false;
  if (mining && drill.on) {
    // AREA mining: every node whose body overlaps the beam tip radius takes damage
    // this frame. The CLOSEST node takes full power; others within radius take a
    // share. This makes a drag-sweep across a cluster chew through it (the path is
    // the game), while a single hard node (iron/gem) still needs you to dwell.
    var reach = statRadius() * GF.S;
    var heatScale = heat > HEAT_WARN ? lerp(1, 0.4, (heat - HEAT_WARN) / (HEAT_MAX - HEAT_WARN)) : 1;
    var pwr = statPower() * heatScale;
    var broke = [], workDmg = 0;
    for (var i = 0; i < nodes.length; i++) {
      var nd = nodes[i]; if (nd.dead) continue;
      var dx = nd.x - drill.x, dy = nd.y - drill.y, d = Math.sqrt(dx * dx + dy * dy);
      var edge = reach + nd.r * GF.S;
      if (d <= edge) {
        activelyMining = true;
        // closeness 1 at the tip, ~0.5 at the rim → a focused tap on one node is
        // strongest, a wide sweep spreads damage across several.
        var close = clamp(1 - (d / Math.max(1, edge)) * 0.5, 0.5, 1);
        var dealt = pwr * close * dt;
        nd.hp -= dealt; workDmg += dealt; nd.hitT = 0.12;
        if (Math.random() < 0.5) GF.spawnParticles(nd.x, nd.y, nd.col, 1);
        if (nd.hp <= 0) broke.push(nd);
      }
    }
    if (activelyMining) {
      drill.tipGlow = lerp(drill.tipGlow, 1, 0.3); sfxRL('tap', 70);
      // HEAT = a base time component (statHeatGain*dt, holding the trigger over ore)
      // + a WORK component (workDmg already includes dt) proportional to ore carved.
      // So greedy fast sweeps through dense clusters heat you just as much as grinding
      // one hard node — lift to cool. Tuned so a non-stop dense sweep overheats in
      // ~2-2.5s at lvl0; HEAT_WORK shrinks as cooling upgrades raise statCool.
      // Suppressed during the tutorial so the first lesson is no-fail.
      if (!tut) {
        heat += statHeatGain() * 0.55 * dt + workDmg * 0.26;
        if (heat >= HEAT_MAX) { heat = HEAT_MAX; overheatT = OVERHEAT_LOCK; GF.setShake(0.5); GF.sfx('error'); GF.sfx('hurt'); }
      }
    }
    for (var bi = 0; bi < broke.length; bi++) breakNode(broke[bi]);
  }
  if (!activelyMining) {
    heat = Math.max(0, heat - statCool() * dt);
    drill.tipGlow = lerp(drill.tipGlow, 0, 0.15);
  }

  decayCombo(dt);
  updateDrones(dt);
  updateChips(dt);
}
function decayCombo(dt) {
  if (comboT > 0) { comboT -= dt; if (comboT <= 0) { combo = 0; comboMult = 1; lastCombo = ''; } }
}
function updateDrones(dt) {
  if (!drones.length) return;
  for (var i = 0; i < drones.length; i++) {
    var dr = drones[i];
    if (!dr.tgt || dr.tgt.dead) dr.tgt = nearestLiveNode(dr.x, dr.y);
    if (dr.tgt) {
      dr.x = lerp(dr.x, dr.tgt.x, 0.04); dr.y = lerp(dr.y, dr.tgt.y, 0.04);
      var dx = dr.tgt.x - dr.x, dy = dr.tgt.y - dr.y;
      if (Math.sqrt(dx * dx + dy * dy) < (dr.tgt.r + 18) * GF.S) {
        dr.tgt.hp -= DRONE_RATE * dt; dr.tgt.hitT = 0.1;
        if (Math.random() < 0.2) GF.spawnParticles(dr.tgt.x, dr.tgt.y, dr.tgt.col, 1);

    );

    GF.exposeReach(function () {
      var W = GF.W, H = GF.H;
      if (gs === 'SHOP') {
        var L = shopLayout();
        var items = shopRows.map(function (r, i) { return { id: 'buy_' + r.key, x: r.x, y: r.y, w: r.w, h: r.h }; });
        uiButtons.forEach(function (b, i) { items.push({ id: 'pin_' + i, x: b.x, y: b.y, w: b.w, h: b.h, pinned: true }); });
        return { screen: 'shop', items: items, scrollId: 'shop', viewportH: L.vp.h, screenH: H };
      }
      var its = uiButtons.map(function (b, i) { return { id: 'btn_' + i, x: b.x, y: b.y, w: b.w, h: b.h }; });
      hudButtons.forEach(function (b, i) { its.push({ id: 'hud_' + i, x: b.x, y: b.y, w: b.w, h: b.h }); });
      return { screen: gs.toLowerCase(), items: its, viewportH: H, screenH: H, scrollMaxY: 0 };
    });
    GF.exposeTour([
      { name: 'menu', go: function () { gs = 'MENU'; helpOpen = false; } },
      { name: 'mining', go: function () { if (gs !== 'MINING') startShift(); window.__shotFreeze = false; } },
      { name: 'cashout', go: function () { if (gs !== 'MINING') startShift(); endShift(false); } },
      { name: 'shop', go: function () { meta.ore = Math.max(meta.ore, 200); openShop(); } },
    ]);
  },
  onUpdate: update,
  onDraw: draw,
});

// ── YANDEX MUST-HAVES (do not remove) ─────────────────────────────────────
// 1. All UI text via GF.t()/STRINGS (en+ru). 2. Run/meta state persisted via
// saveMeta() + GF.persist/saveRun() after transitions. 3. Fullscreen/orientation
// resize handled in gf-lib. 4. Ads fire only from the CASHOUT CONTINUE user
// click (onContinue/onDescendFromCashout), never auto. No console.* anywhere.
})();
</script>
