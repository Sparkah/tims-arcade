<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>City Destruction Simulator</title>
  <link rel="stylesheet" href="./tokens.css">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overflow-x: clip;
      background: var(--color-paper);
      color: var(--color-ink);
      font-family: var(--font-body);
      touch-action: none;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #shell {
      position: relative;
      width: 100vw;
      height: 100dvh;
      min-height: 100vh;
      background: var(--color-paper);
      contain: layout style paint;
    }

    #game {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    .hud {
      position: absolute;
      left: var(--space-md);
      right: var(--space-md);
      top: var(--space-md);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--space-md);
      pointer-events: none;
      align-items: start;
    }

    .panel,
    .tools {
      background: color-mix(in oklch, var(--color-paper-2) 88%, transparent);
      border: var(--rule-thin) solid var(--color-rule);
      border-radius: var(--radius-md);
      box-shadow: 0 16px 48px color-mix(in oklch, var(--color-shadow) 42%, transparent);
      backdrop-filter: blur(10px);
    }

    .panel {
      max-width: 420px;
      padding: var(--space-md);
      pointer-events: auto;
    }

    .title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--space-md);
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(22px, 4.2vw, 44px);
      line-height: .9;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      text-transform: uppercase;
    }

    .contract {
      margin-top: var(--space-sm);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-sm);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-muted);
    }

    .resource-strip {
      margin-top: var(--space-sm);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-xs);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-muted);
    }

    .resource-strip strong {
      display: block;
      margin-top: 2px;
      color: var(--color-ink);
      font-size: var(--text-sm);
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .metric strong {
      display: block;
      margin-top: 2px;
      color: var(--color-ink);
      font-size: var(--text-lg);
      font-family: var(--font-body);
      font-variant-numeric: tabular-nums;
    }

    .bar {
      height: 8px;
      margin-top: var(--space-md);
      border-radius: 999px;
      background: var(--color-paper-3);
      overflow: hidden;
      border: var(--rule-thin) solid var(--color-rule);
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--color-accent-2), var(--color-accent), var(--color-good));
      transition: width var(--dur-med) var(--ease-out);
    }

    .objective {
      margin-top: var(--space-sm);
      padding-top: var(--space-sm);
      border-top: var(--rule-thin) solid var(--color-rule);
      font-family: var(--font-mono);
    }

    .objective-head,
    .objective-foot {
      display: flex;
      justify-content: space-between;
      gap: var(--space-sm);
      color: var(--color-muted);
      font-size: 10px;
      text-transform: uppercase;
    }

    .objective-head strong {
      color: var(--color-ink);
      overflow-wrap: anywhere;
    }

    .objective-text {
      margin-top: 5px;
      color: var(--color-ink);
      font-size: var(--text-xs);
      line-height: 1.25;
    }

    .mini-bar {
      height: 6px;
      margin-top: var(--space-xs);
      border-radius: 999px;
      background: var(--color-paper-3);
      border: var(--rule-thin) solid var(--color-rule);
      overflow: hidden;
    }

    .mini-bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--color-accent), var(--color-good));
      transition: width var(--dur-med) var(--ease-out);
    }

    .map-row {
      margin-top: var(--space-sm);
      display: grid;
      grid-template-columns: auto minmax(140px, 1fr);
      align-items: center;
      gap: var(--space-sm);
    }

    .map-row label {
      color: var(--color-muted);
      font: 800 var(--text-xs) / 1 var(--font-mono);
      text-transform: uppercase;
    }

    .map-row select {
      min-width: 0;
      min-height: 36px;
      border: var(--rule-thin) solid var(--color-rule);
      border-radius: var(--radius-sm);
      background: var(--color-paper-3);
      color: var(--color-ink);
      font: 800 var(--text-xs) / 1 var(--font-mono);
      text-transform: uppercase;
      padding: 0 var(--space-md);
      cursor: pointer;
    }

    .map-row select:hover {
      border-color: var(--color-accent);
    }

    .map-row select:focus-visible {
      outline: 3px solid var(--color-accent);
      outline-offset: 2px;
    }

    @supports (appearance: base-select) {
      .map-row select,
      .map-row select::picker(select) {
        appearance: base-select;
      }
    }

    .side-stack {
      display: grid;
      gap: var(--space-sm);
      pointer-events: auto;
    }

    .tools {
      pointer-events: auto;
      display: grid;
      grid-template-columns: repeat(7, minmax(54px, 1fr));
      gap: var(--space-xs);
      padding: var(--space-sm);
      min-width: min(620px, calc(100vw - 24px));
    }

    .workshop {
      pointer-events: auto;
      max-width: min(620px, calc(100vw - 24px));
      max-height: min(34vh, 260px);
      overflow: auto;
      padding: var(--space-sm);
      background: color-mix(in oklch, var(--color-paper-2) 88%, transparent);
      border: var(--rule-thin) solid var(--color-rule);
      border-radius: var(--radius-md);
      box-shadow: 0 16px 48px color-mix(in oklch, var(--color-shadow) 35%, transparent);
      backdrop-filter: blur(10px);
    }

    .workshop-title {
      display: flex;
      justify-content: space-between;
      gap: var(--space-sm);
      color: var(--color-muted);
      font: 800 10px / 1 var(--font-mono);
      text-transform: uppercase;
      cursor: pointer;
      list-style: none;
    }

    .workshop-title::-webkit-details-marker {
      display: none;
    }

    .workshop:not([open]) {
      max-height: none;
    }

    .workshop:not([open]) .shop-list {
      display: none;
    }

    .shop-list {
      margin-top: var(--space-xs);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-xs);
    }

    .shop-list button {
      min-height: 50px;
      padding: 6px 8px;
      text-align: left;
      line-height: 1.15;
    }

    .shop-list button span {
      display: block;
      color: var(--color-muted);
      font-size: 9px;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }

    button {
      min-height: 44px;
      border: var(--rule-thin) solid var(--color-rule);
      border-radius: var(--radius-sm);
      background: var(--color-paper-3);
      color: var(--color-ink);
      font: 800 var(--text-xs) / 1 var(--font-mono);
      letter-spacing: 0;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out);
    }

    button:hover,
    button.is-hover {
      background: color-mix(in oklch, var(--color-paper-3) 76%, var(--color-accent) 24%);
      border-color: var(--color-accent);
    }

    button:focus-visible,
    button.is-focus {
      outline: 3px solid var(--color-accent);
      outline-offset: 2px;
    }

    button:active,
    button.is-active {
      transform: translateY(1px);
    }

    button:disabled,
    button.is-disabled {
      opacity: .46;
      cursor: not-allowed;
    }

    button[data-active="true"] {
      background: var(--color-accent);
      color: var(--color-paper);
      border-color: var(--color-accent);
    }

    @media (max-width: 740px) {
      .hud {
        grid-template-columns: minmax(0, 1fr);
      }

      .panel {
        max-width: none;
        padding: var(--space-sm);
      }

      .tools {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        min-width: 0;
      }

      .workshop {
        max-width: none;
        max-height: 24vh;
      }

      .shop-list {
        grid-template-columns: minmax(0, 1fr);
      }

      button {
        min-height: 48px;
        font-size: 10px;
      }

      .contract {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .resource-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .map-row {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition-duration: 1ms !important;
        animation-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main id="shell" aria-label="City Destruction Simulator">
    <canvas id="game"></canvas>
    <section class="hud" aria-label="Game controls">
      <div class="panel">
        <div class="title-row">
          <h1>City Destruction Simulator</h1>
        </div>
        <div class="contract">
          <div class="metric">Clear<strong id="clearStat">0%</strong></div>
          <div class="metric">Score<strong id="scoreStat">0</strong></div>
          <div class="metric">Energy<strong id="energyStat">100</strong></div>
        </div>
        <div class="resource-strip" aria-label="Progress resources">
          <div>Cash<strong id="cashStat">$0</strong></div>
          <div>Scrap<strong id="scrapStat">0</strong></div>
          <div>Rep<strong id="repStat">0</strong></div>
          <div>Blueprint<strong id="blueprintStat">0/7</strong></div>
        </div>
        <div class="bar" aria-hidden="true"><span id="clearBar"></span></div>
        <div class="objective" aria-label="Active contract">
          <div class="objective-head">
            <strong id="contractName">Contract</strong>
            <span id="contractReward">$0</span>
          </div>
          <div class="objective-text" id="contractObjective">Clear the block.</div>
          <div class="mini-bar" aria-hidden="true"><span id="contractBar"></span></div>
          <div class="objective-foot">
            <span id="contractProgress">0/0</span>
            <span id="dailyStat">Daily 0/7</span>
          </div>
        </div>
        <div class="map-row">
          <label for="mapSelect">Map</label>
          <select id="mapSelect" name="map">
            <option value="downtown">Downtown Core</option>
            <option value="oldtown">Old Town</option>
            <option value="megablocks">Megablocks</option>
            <option value="waterfront">Waterfront</option>
            <option value="gasworks">Gasworks</option>
          </select>
        </div>
      </div>
      <div class="side-stack">
        <div class="tools" role="toolbar" aria-label="Demolition tools">
          <button type="button" data-tool="ram" data-label="Ram" data-active="true">Ram</button>
          <button type="button" data-tool="charge" data-label="Charge">Charge</button>
          <button type="button" data-tool="cut" data-label="Cut">Cut</button>
          <button type="button" data-tool="quake" data-label="Quake">Quake</button>
          <button type="button" data-tool="wreck" data-label="Wreck">Wreck</button>
          <button type="button" data-tool="missile" data-label="Missile">Missile</button>
          <button type="button" id="resetBtn">Reset</button>
        </div>
        <details class="workshop" id="workshopDetails" aria-label="Workshop">
          <summary class="workshop-title">
            <span>Workshop</span>
            <span id="licenseStat">License 0</span>
          </summary>
          <div class="shop-list" id="shopList"></div>
        </details>
      </div>
    </section>
  </main>
  <script src="./game.js"></script>
</body>
</html>
