    coins: 'МОНЕТЫ', earned: 'ПОЛУЧЕНО', shed: 'МАСТЕРСКАЯ', upgrades: 'УЛУЧШЕНИЯ',
    back: 'НАЗАД', buy: 'УЛУЧШИТЬ', maxed: 'МАКС', locked: 'НУЖНО',

    lvl: 'Ур', next_up: 'Следующее улучшение', have: 'есть', resume: 'ПРОДОЛЖИТЬ',
    // M2 — daily / streak / idle / quests
    welcome_back: 'С ВОЗВРАЩЕНИЕМ', day_streak: 'ДНЕЙ ПОДРЯД', daily_bonus: 'Ежедневный бонус',
    idle_earned: 'Бригада убирала', collect: 'ЗАБРАТЬ', day: 'День',
    quests: 'ЗАДАНИЯ ДНЯ', q_all: 'Все задания', q_alldone: 'ВСЕ ЗАДАНИЯ!',
    q_rooms: 'Убери {n} комнат', q_dirt: 'Собери {n} грязи', q_combo: 'Комбо x{n}',
    q_coins: 'Заработай {n} монет', q_perfect: 'Убери комнату быстро', q_done: 'ГОТОВО',
    streak_hint: 'Завтра получишь', tasks_left: 'заданий осталось',
  },
};
function t(k) { return (STRINGS[lang] || STRINGS.en)[k] || k; }
window._setLang = function(l) { lang = (l === 'ru' ? 'ru' : 'en'); };

// ── UTILS ───────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
// deterministic seedable rng
function mulberry(s) { return function() {
  s = (s + 0x6D2B79F5) | 0;
  var t = s;
  t = Math.imul(t ^ (t >>> 15), t | 1);
  t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}; }

// ── CONSTANTS ───────────────────────────────────────────────────────────────
var HUD_H = 56;
var PLAYER_R = 18, PLAYER_BRUSH = 28;
var SPEED_BASE = 5.2;

// Room palettes — each room visually distinct (name resolved at draw via STRINGS rn0..rn5)
var ROOMS = [
  { nameKey:'rn0', floor:'#7a5c3b', plank:'#5e4530', accent:'#d4a017' },
  { nameKey:'rn1', floor:'#a8c8d8', plank:'#85a8b8', accent:'#5dade2' },
  { nameKey:'rn2', floor:'#7d6c5c', plank:'#5d4f3f', accent:'#c39ee5' },
  { nameKey:'rn3', floor:'#b8a888', plank:'#8a7a5a', accent:'#e07b5a' },
  { nameKey:'rn4', floor:'#5d5848', plank:'#403d33', accent:'#f1c40f' },
  { nameKey:'rn5', floor:'#404a55', plank:'#2c333b', accent:'#48c9b0' },
];

// ── STATE ───────────────────────────────────────────────────────────────────
var gs = 'MENU';
var room = 1, score = 0, best = 0, timeLeft = 0;
var palette = ROOMS[0];
var furniture = [], dirt = [];
var totalDirt = 0;
var player = { x: 0, y: 0, vx: 0, vy: 0 };
var particles = [], floats = [], buttons = [];
var combo = 0, comboT = 0;
var revealT = 0; // 0..1 reveal animation when room complete
var coinsRun = 0; // coins banked THIS room (shown on clear/gameover)

// ── PERSISTENT META (M1 core meta loop, 2026-06-07) ──────────────────────────
// Owned across sessions: coins + 3 deep upgrade tracks (the Tool Shed). The
// player BUILDS their cleaning kit run after run — the reason to return.
// Persisted via GF.persist; saved on every meaningful transition (never in update()).
var coins = 0;          // total owned currency
var resumeRoom = 0;     // furthest room reached, for CONTINUE on the menu
// 8 deep levels per track so progression doesn't cap in 2-3 levels
// (scrub_master player: "upgrades done after 2-3 levels, no progression further").
var UPGRADES = [
  { key:'brush', nameKey:'up_brush', descKey:'up_brush_d', icon:'brush',
    costs:[40,90,160,260,400,600,900,1300], max:8 },
  { key:'speed', nameKey:'up_speed', descKey:'up_speed_d', icon:'speed',
    costs:[50,110,190,300,460,680,1000,1450], max:8 },
  { key:'time',  nameKey:'up_time', descKey:'up_time_d', icon:'time',
    costs:[45,100,175,280,430,640,950,1380], max:8 },
];
var upg = { brush:0, speed:0, time:0 };
var shedReturn = 'MENU'; // which screen the Shed returns to (MENU or GAMEOVER)
function upgDef(key){ for (var i=0;i<UPGRADES.length;i++) if (UPGRADES[i].key===key) return UPGRADES[i]; return null; }
function upgLevel(key){ return upg[key]||0; }
function upgCost(key){ var d=upgDef(key), l=upgLevel(key); return (d && l<d.max) ? d.costs[l] : null; }
// Applied gameplay effects from owned upgrades:
function brushRadius(){ return PLAYER_BRUSH + upgLevel('brush')*4.5; }   // 28 → 64
function moveSpeed(){ return SPEED_BASE + upgLevel('speed')*0.45; }       // 5.2 → 8.8
function bonusTime(){ return upgLevel('time')*4; }                        // +0 → +32s
// "One upgrade away" session-end hook: the cheapest affordable-soon next upgrade.
function nextUpgradeHint(){
  var best=null;
  for (var i=0;i<UPGRADES.length;i++){
    var d=UPGRADES[i], c=upgCost(d.key);
    if (c==null) continue;
    if (!best || c<best.cost) best={ key:d.key, nameKey:d.nameKey, lvl:upgLevel(d.key)+1, cost:c };
  }
  return best;
}
function buyUpgrade(key){
  var c=upgCost(key);
  if (c==null || coins<c) { if (GF&&GF.sfx) GF.sfx('error'); return false; }
  coins-=c; upg[key]=(upg[key]||0)+1;
  if (GF&&GF.sfx) GF.sfx('levelup');
  spawnFloat(cx, cy, '-'+c, '#FFD700');
  saveMeta();
  return true;
}
var metaDirty = false; // quest ticks mark dirty; flushed on room clear / run end / pagehide
function saveMeta(){
  metaDirty = false;
  // Unclaimed idle must survive reload-before-claim: hold lastSeen back until
  // claimReturnRewards() banks it (claim sets lastSeen=now itself) — otherwise
  // the new-day ensureQuests() save would zero the idle pile on refresh.
  if (!(pending.idle > 0)) lastSeen = Date.now();
  if (GF&&GF.saveRun) GF.saveRun();
}
window.addEventListener('pagehide', function(){ if (metaDirty) saveMeta(); });
var GF = window.GF || {};

// ── M2: REASON TO RETURN (daily reward + streak + idle accrual + quests) ─────
// 2026-06-11. Gives tomorrow a concrete payout so the habit forms across real
// days (not just within a session). All folded into the same apt_meta_v1 save.
var DAY_MS = 86400000;
// Idle: crew keeps sweeping while away. Rate scales with furthest room (meta
// progress feeds idle income — ties M1<->M2). Capped so the cap IS the return
// trigger (uncapped idle kills the return — Retention spec).
var IDLE_CAP_H = 10;
function idleRatePerHour(){ return 18 + Math.max(0, resumeRoom) * 6; } // coins/hr
// 7-day login streak: day N reward escalates, plateaus at day 7.
var LOGIN_REWARDS = [30, 45, 65, 90, 120, 160, 220]; // day 1..7+
function loginRewardFor(streakDay){ return LOGIN_REWARDS[clamp(streakDay-1,0,LOGIN_REWARDS.length-1)]; }

var lastDay = 0;        // day-index (floor(now/DAY_MS)) of last login reward claimed
var streak = 0;         // consecutive-day login streak
var lastSeen = 0;       // epoch ms of last save (for idle accrual)
var questDay = 0;       // day-index the current quest set was generated for
var quests = [];        // [{id,type,target,prog,done,claimed,reward}]
// pending payouts surfaced on the DAILY overlay (computed on first menu open):
var pending = { idle:0, idleHrs:0, login:0, streakDay:0 };

// Quest templates — seeded per day, one is tuned EASY (momentum transfer).
var QUEST_POOL = [
  { type:'rooms',  target:3,   reward:60,  nameKey:'q_rooms'  },
  { type:'rooms',  target:1,   reward:25,  nameKey:'q_rooms'  },   // easy momentum
  { type:'dirt',   target:200, reward:55,  nameKey:'q_dirt'   },
  { type:'dirt',   target:120, reward:35,  nameKey:'q_dirt'   },
  { type:'combo',  target:6,   reward:50,  nameKey:'q_combo'  },
  { type:'combo',  target:4,   reward:30,  nameKey:'q_combo'  },
  { type:'coins',  target:120, reward:45,  nameKey:'q_coins'  },
  { type:'perfect',target:1,   reward:70,  nameKey:'q_perfect'},   // clear a room with time>15s left
];
var ALL_QUESTS_BONUS = 80; // completing all 3 in a day
function dayIndex(ms){ return Math.floor((ms||Date.now()) / DAY_MS); }
function genQuests(di){
  // deterministic per day so a refresh keeps the same set; pick 3 distinct types,
  // guarantee at least one EASY (low target) for momentum transfer.
  var rng = mulberry(di*2654435761 ^ 0x9e3779b9);
  var pool = QUEST_POOL.slice();
  var chosen = [], types = {};
  // first pick: force an easy one (target<=1 rooms / <=4 combo / <=120 dirt)
  var easy = pool.filter(function(q){ return (q.type==='rooms'&&q.target<=1)||(q.type==='combo'&&q.target<=4)||(q.type==='dirt'&&q.target<=120); });
  var e = easy[Math.floor(rng()*easy.length)];
  chosen.push(e); types[e.type]=1;
  var guard=0;
  while (chosen.length < 3 && guard++ < 50) {
    var q = pool[Math.floor(rng()*pool.length)];
    if (types[q.type]) continue;
    types[q.type]=1; chosen.push(q);
  }
  return chosen.map(function(q,i){
    return { id:di+'_'+i, type:q.type, target:q.target, reward:q.reward,
             nameKey:q.nameKey, prog:0, done:false, claimed:false };
  });
}
function ensureQuests(){
  var di = dayIndex();
  if (questDay !== di || !quests || quests.length === 0) {
    questDay = di; quests = genQuests(di);
    saveMeta();
  }
}
function questsAllDone(){ for (var i=0;i<quests.length;i++) if (!quests[i].done) return false; return quests.length>0; }
function allQuestsRewardClaimed(){ // the +ALL bonus is auto-banked; flag stored on quests[0]
  return quests.length>0 && quests[0]._allClaimed;
}
// progress a quest type during play; banks reward immediately on completion + toast
function questProgress(type, amount){
  ensureQuests();
  var changed=false, justDone=null;
  for (var i=0;i<quests.length;i++){
    var q=quests[i];
    if (q.type!==type || q.done) continue;
    q.prog = Math.min(q.target, q.prog + amount);
    if (q.prog >= q.target) { q.done=true; coins+=q.reward; justDone=q; changed=true; }
    else changed=true;
  }
  if (justDone){
    spawnFloat(cx, cy - 60*S, '✓ +'+justDone.reward, '#2ecc71');
    if (GF.sfx) GF.sfx('unlock');
    // all-three bonus
    if (questsAllDone() && !allQuestsRewardClaimed()){
      coins += ALL_QUESTS_BONUS; quests[0]._allClaimed = true;
      spawnFloat(cx, cy - 36*S, t('q_alldone')+' +'+ALL_QUESTS_BONUS, '#FFD700');
      if (GF.sfx) GF.sfx('win');
    }
  }
  if (justDone) saveMeta();           // completion banks coins — persist now
  else if (changed) metaDirty = true; // per-tile ticks batch to the next flush (mobile jank)
}
// For "reach a value" quests (combo peak): set progress to the max seen.
function questSetMax(type, value){
  ensureQuests();
  var justDone=null;
  for (var i=0;i<quests.length;i++){
    var q=quests[i];
    if (q.type!==type || q.done) continue;
    if (value > q.prog) q.prog = Math.min(q.target, value);
    if (q.prog >= q.target){ q.done=true; coins+=q.reward; justDone=q; }
  }
  if (justDone){
    spawnFloat(cx, cy - 60*S, '✓ +'+justDone.reward, '#2ecc71');
    if (GF.sfx) GF.sfx('unlock');
    if (questsAllDone() && !allQuestsRewardClaimed()){
      coins += ALL_QUESTS_BONUS; quests[0]._allClaimed = true;
      spawnFloat(cx, cy - 36*S, t('q_alldone')+' +'+ALL_QUESTS_BONUS, '#FFD700');
      if (GF.sfx) GF.sfx('win');
    }
    saveMeta();
  }
}
// Quest label with {n} substitution (target injected).
function questLabel(q){ return t(q.nameKey).replace('{n}', q.target); }
// Compute idle + login when the player opens the game (called once on boot,
// AFTER persist load). Fills `pending`; the DAILY overlay then offers CLAIM.
function computeReturnRewards(){
  var now = Date.now();
  var di = dayIndex(now);
  // ── idle accrual since lastSeen, capped ──
  if (lastSeen > 0) {
    var hrs = Math.min(IDLE_CAP_H, (now - lastSeen) / 3600000);
    if (hrs > 0.05) {
      pending.idle = Math.floor(hrs * idleRatePerHour());
      pending.idleHrs = hrs;
    }
  }
  // ── daily login + streak ──
  if (lastDay === 0 && lastSeen === 0) {
    // FIRST-EVER visit: no "welcome back" — they've not been anywhere. Start the
    // streak at day 1 and silently bank the day-1 bonus; drop them on the MENU.
    streak = 1; coins += loginRewardFor(1); lastDay = di; pending.streakDay = 1;
    saveMeta();
  } else if (di > lastDay) {
    // Bumped streak lives in `pending` ONLY until claim — ensureQuests() below
    // persists meta, so mutating `streak` here would save an unclaimed bump and
    // a reload-before-claim would re-increment it (+1 per reload).
    var nextStreak = (di === lastDay + 1) ? streak + 1 : 1; // consecutive → grow, gap → reset
    pending.login = loginRewardFor(nextStreak); pending.streakDay = nextStreak;
  } else {
    pending.streakDay = streak; // already claimed today
  }
  ensureQuests();
}
function claimReturnRewards(){
  if (pending.idle > 0) coins += pending.idle;
  if (pending.login > 0) { coins += pending.login; streak = pending.streakDay; lastDay = dayIndex(); }
  lastSeen = Date.now();
  pending.idle = 0; pending.login = 0;
  if (GF.sfx) GF.sfx('reward');
  saveMeta();
}
// Test seams (harness-only): the preview recorder + progression probe drive the
// daily-claim flow through these; not reachable from player input.
window._claimDaily = function(){ claimReturnRewards(); };
window._setReturnState = function(idle, login, sd){ pending.idle=idle||0; pending.login=login||0; pending.streakDay=sd||1; pending.idleHrs=2; gs='DAILY'; };

// ── INPUT ───────────────────────────────────────────────────────────────────
var keys = {};
document.addEventListener('keydown', function(e) { keys[e.code] = true; });
document.addEventListener('keyup',   function(e) { keys[e.code] = false; });
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('wheel',     function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

var touch = { active: false, dx: 0, dy: 0, sx: 0, sy: 0, id: null };
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t0 = e.changedTouches[0];
  touch.active = true; touch.id = t0.identifier;
  touch.sx = t0.clientX; touch.sy = t0.clientY;
  touch.dx = 0; touch.dy = 0;
  if (hitMute(t0.clientX, t0.clientY)) { touch.active = false; return; }
  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    if (t0.clientX >= b.x && t0.clientX <= b.x+b.w && t0.clientY >= b.y && t0.clientY <= b.y+b.h) b.fn();
  }
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t0 = e.changedTouches[i];
    if (t0.identifier !== touch.id) continue;
    var dx = t0.clientX - touch.sx, dy = t0.clientY - touch.sy;
    var d = Math.sqrt(dx*dx + dy*dy);
    if (d > 8) { touch.dx = dx / Math.max(d, 50); touch.dy = dy / Math.max(d, 50); }
  }
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === touch.id) {
      touch.active = false; touch.dx = 0; touch.dy = 0;
    }
  }
}, { passive: false });
canvas.addEventListener('click', function(e) {
  if (hitMute(e.clientX, e.clientY)) return;
  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    if (e.clientX >= b.x && e.clientX <= b.x+b.w && e.clientY >= b.y && e.clientY <= b.y+b.h) b.fn();
  }
});

// ── ARENA ───────────────────────────────────────────────────────────────────
function arena() {
  var pad = 24 * S;
  var top = (HUD_H + 8) * S;
  return { x: pad, y: top, w: W - pad*2, h: H - top - pad };
}

// ── ROOM SETUP (deterministic per room number) ──────────────────────────────
function startRoom(n) {
  room = n;
  palette = ROOMS[(n - 1) % ROOMS.length];
  particles = []; floats = []; buttons = [];
  combo = 0; comboT = 0; revealT = 0; coinsRun = 0;
  timeLeft = Math.max(28, 75 - (n - 1) * 5) + bonusTime();

  var rng = mulberry(n * 9301 + 49297);
  var ar = arena();

  // Build furniture (rectangles fixed within the room)
  furniture = [];
  var furnCount = 4 + (n % 4);
  var attempts = 0;
  while (furniture.length < furnCount && attempts < 200) {
    attempts++;
    var fw = (60 + rng() * 100) * S;
    var fh = (40 + rng() * 80) * S;
    var fx = ar.x + 12*S + rng() * (ar.w - fw - 24*S);
    var fy = ar.y + 12*S + rng() * (ar.h - fh - 24*S);
    // skip if overlaps player spawn
    if (Math.abs(fx + fw/2 - (ar.x + ar.w/2)) < 80*S &&
        Math.abs(fy + fh/2 - (ar.y + ar.h/2)) < 80*S) continue;
    // skip if overlaps existing
    var ok = true;
    for (var i = 0; i < furniture.length; i++) {
      var f = furniture[i];
      if (fx < f.x + f.w + 18*S && fx + fw + 18*S > f.x &&
          fy < f.y + f.h + 18*S && fy + fh + 18*S > f.y) { ok = false; break; }
    }
    if (!ok) continue;
    furniture.push({ x: fx, y: fy, w: fw, h: fh, kind: Math.floor(rng() * 4) });
  }

  // Sprinkle dirt patches in walkable area
  dirt = [];
  var dirtCount = 36 + n * 6;
  var triesLeft = dirtCount * 8;
  while (dirt.length < dirtCount && triesLeft-- > 0) {
    var dx = ar.x + 16*S + rng() * (ar.w - 32*S);
    var dy = ar.y + 16*S + rng() * (ar.h - 32*S);
    if (insideFurniture(dx, dy)) continue;
    var dr = (10 + rng() * 14) * S;
    dirt.push({ x: dx, y: dy, r: dr, life: 1, kind: Math.floor(rng() * 3), wobble: rng() * Math.PI * 2 });
  }
  totalDirt = dirt.length;

  // Player spawn — center of arena, away from furniture
  player.x = ar.x + ar.w / 2;
  player.y = ar.y + ar.h / 2;
  player.vx = 0; player.vy = 0;

  gs = 'PLAYING';
}
window._jumpLevel = function(n) { score = 0; startRoom(n); };
// Test seams (consistent with _jumpLevel) for the visual-check + reachability tooling.
window._gotoShed = function(from) { shedReturn = from || 'MENU'; gs = 'SHED'; };
window._buyUpg = function(key) { return buyUpgrade(key); };
// visual-check seam: force an end-screen overlay with a sample coins-earned value
window._showEnd = function(state, earned, rm) { if (rm) { room = rm; palette = ROOMS[(rm-1)%ROOMS.length]; } coinsRun = (earned==null?42:earned); revealT = 1; gs = state; };
// Fast-forward seam for the progression probe (this game runs its own RAF loop,
// so expose update() stepping directly). Mirrors the template's window.__gfStep.
window.__gfStep = function(sec) { update(Math.min(sec || 0.05, 0.08)); };

function insideFurniture(x, y) {
  for (var i = 0; i < furniture.length; i++) {
    var f = furniture[i];
    if (x > f.x - 6*S && x < f.x + f.w + 6*S &&
        y > f.y - 6*S && y < f.y + f.h + 6*S) return true;
  }
  return false;
}

function spawnParticles(x, y, color, n) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = (1.5 + Math.random() * 3.5) * S;
    particles.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      r:(2 + Math.random()*4)*S, color:color, life:1 });
  }
}
function spawnFloat(x, y, txt, col) {
  floats.push({ x:x, y:y, txt:txt, col:col||'#fff', life:1.3, vy:-2*S });
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
var lastTs = 0;
function update(dt) {
  if (gs === 'LEVELEND') {
    revealT = Math.min(1, revealT + dt * 1.2);
  }
  if (gs !== 'PLAYING') return;

  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    // Partial payout for what got cleaned — a failed run still banks coins toward
    // the next upgrade, so leaving feels like progress (non-punishing recovery).
    var cleanedN = totalDirt - dirt.length;
    coinsRun = 3 + Math.round(cleanedN * 0.5);
    coins += coinsRun;
    saveMeta();
    if (GF.sfx) GF.sfx('lose');
    gs = 'GAMEOVER';try{parent.postMessage({type:'gf:gameEnded'},'*')}catch(_){};
    return;
  }

  if (comboT > 0) { comboT -= dt; if (comboT <= 0) combo = 0; }

  // movement
  var ax = 0, ay = 0;
  if (keys['ArrowLeft']  || keys['KeyA']) ax -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) ax += 1;
  if (keys['ArrowUp']    || keys['KeyW']) ay -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) ay += 1;
  if (touch.active) { ax += touch.dx; ay += touch.dy; }
  var alen = Math.sqrt(ax*ax + ay*ay);
  if (alen > 0) { ax /= alen; ay /= alen; }

  player.vx = (player.vx + ax * 0.85 * S) * 0.83;
  player.vy = (player.vy + ay * 0.85 * S) * 0.83;
  var spd = Math.sqrt(player.vx*player.vx + player.vy*player.vy);
  var max = moveSpeed() * S;
  if (spd > max) { player.vx = player.vx/spd*max; player.vy = player.vy/spd*max; }

  var nx = player.x + player.vx, ny = player.y + player.vy;
  // collide with furniture (axis-aligned)
  for (var i = 0; i < furniture.length; i++) {
    var f = furniture[i], r = PLAYER_R * S;
    if (nx + r > f.x && nx - r < f.x + f.w && ny + r > f.y && ny - r < f.y + f.h) {
      // resolve along smaller penetration
      var px1 = (nx + r) - f.x;            // from left
      var px2 = (f.x + f.w) - (nx - r);    // from right
      var py1 = (ny + r) - f.y;
      var py2 = (f.y + f.h) - (ny - r);
      var minp = Math.min(px1, px2, py1, py2);
      if (minp === px1) { nx = f.x - r; player.vx = 0; }
      else if (minp === px2) { nx = f.x + f.w + r; player.vx = 0; }
      else if (minp === py1) { ny = f.y - r; player.vy = 0; }
      else { ny = f.y + f.h + r; player.vy = 0; }
    }
  }
  var ar = arena(), pr = PLAYER_R * S;
  player.x = clamp(nx, ar.x + pr, ar.x + ar.w - pr);
  player.y = clamp(ny, ar.y + pr, ar.y + ar.h - pr);

  // collect dirt with brush radius (brushRadius grows with the owned Brush upgrade)
  var br = brushRadius() * S;
  for (var i = dirt.length - 1; i >= 0; i--) {
    var d = dirt[i];
    var dx = player.x - d.x, dy = player.y - d.y;
    if (Math.sqrt(dx*dx + dy*dy) < br + d.r * 0.6) {
      var pts = (d.kind === 0 ? 1 : d.kind === 1 ? 2 : 4) * Math.max(1, Math.floor(combo * 0.5 + 1));
      score += pts;
      if (comboT > 0) combo++; else combo = 1;
      comboT = 1.2;
      var prevCombo = combo;
      spawnParticles(d.x, d.y, palette.accent, 4 + Math.ceil(d.r));
      if (GF.sfxRL) GF.sfxRL(prevCombo > 4 ? 'combo' : 'sweep', 55);
      if (combo > 1) spawnFloat(d.x, d.y - 12*S, 'x'+combo+' +'+pts, '#FFD700');
      questProgress('dirt', 1);
      questSetMax('combo', combo);             // combo quest = peak combo reached
      dirt.splice(i, 1);
    } else {
      d.wobble += dt * 1.6;
    }
  }

  if (dirt.length === 0) {
    var bonus = Math.round(timeLeft * 5);
    score += bonus;
    // Coins earned this room: full clear pays out generously (clean = income).
    coinsRun = 8 + room * 2 + Math.round(timeLeft * 0.6);
    coins += coinsRun;
    resumeRoom = Math.max(resumeRoom, room);
    // ── M2 quest hooks on a full room clear ──
    questProgress('rooms', 1);
    questProgress('coins', coinsRun);
    if (timeLeft > 15) questProgress('perfect', 1); // "clear a room fast" (>15s left)
    saveMeta();
    spawnFloat(cx, cy - 30*S, t('bonus')+' +'+bonus, '#2ecc71');
    spawnParticles(player.x, player.y, '#FFD700', 22);
    if (GF.sfx) GF.sfx('win');
    revealT = 0;
    gs = 'LEVELEND';try{parent.postMessage({type:'gf:gameEnded'},'*')}catch(_){};
  }

  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05*S;
    p.life -= dt * 1.6;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (var i = floats.length - 1; i >= 0; i--) {
    var f = floats[i];
    f.y += f.vy; f.life -= dt * 1.0;
    if (f.life <= 0) floats.splice(i, 1);
  }
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function drawFloor() {
  var ar = arena();
  // wood plank floor with palette
  ctx.fillStyle = palette.plank;
  ctx.fillRect(ar.x - 4*S, ar.y - 4*S, ar.w + 8*S, ar.h + 8*S);
  // wall trim
  ctx.fillStyle = '#1a1426';
  ctx.fillRect(ar.x - 12*S, ar.y - 12*S, ar.w + 24*S, 8*S);
  ctx.fillRect(ar.x - 12*S, ar.y + ar.h + 4*S, ar.w + 24*S, 8*S);
  ctx.fillRect(ar.x - 12*S, ar.y - 12*S, 8*S, ar.h + 24*S);
  ctx.fillRect(ar.x + ar.w + 4*S, ar.y - 12*S, 8*S, ar.h + 24*S);

  // planks
  ctx.fillStyle = palette.floor;
  var pw = 64 * S, ph = 24 * S;
  for (var py = ar.y; py < ar.y + ar.h; py += ph) {
    var off = ((py - ar.y) / ph) % 2 === 0 ? 0 : pw / 2;
    for (var px = ar.x - pw; px < ar.x + ar.w; px += pw) {
      ctx.fillRect(px + off, py, pw - 1, ph - 1);
    }
  }
  // grain lines
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 1;
  for (var py = ar.y; py < ar.y + ar.h; py += ph) {
    ctx.beginPath();
    ctx.moveTo(ar.x, py);
    ctx.lineTo(ar.x + ar.w, py);
    ctx.stroke();
  }

  // soft vignette
  var vg = ctx.createRadialGradient(ar.x + ar.w/2, ar.y + ar.h/2, 0, ar.x + ar.w/2, ar.y + ar.h/2, Math.max(ar.w, ar.h)*0.7);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vg;
  ctx.fillRect(ar.x, ar.y, ar.w, ar.h);
}

function drawFurniture(f) {
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  ctx.fillRect(f.x + 4*S, f.y + 4*S, f.w, f.h);

  // base
  if (f.kind === 0) {
    // sofa
    ctx.fillStyle = palette.accent;
    rr(ctx, f.x, f.y, f.w, f.h, 8*S); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    rr(ctx, f.x + 6*S, f.y + 6*S, f.w - 12*S, f.h * 0.32, 6*S); ctx.fill();
    // cushions
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    var cn = Math.floor(f.w / (40*S));
    for (var i = 1; i < cn; i++) {
      var cx0 = f.x + (f.w / cn) * i;
      ctx.beginPath();
      ctx.moveTo(cx0, f.y + 14*S);
      ctx.lineTo(cx0, f.y + f.h - 8*S);
      ctx.stroke();
    }
  } else if (f.kind === 1) {
    // table (lighter)
    ctx.fillStyle = '#7a5c3b';
    rr(ctx, f.x, f.y, f.w, f.h, 4*S); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.22)';
    ctx.lineWidth = 1;
    for (var i = 0; i < 5; i++) {
      var ly = f.y + (i+1) * (f.h/6);
      ctx.beginPath(); ctx.moveTo(f.x + 6*S, ly); ctx.lineTo(f.x + f.w - 6*S, ly); ctx.stroke();
    }
  } else if (f.kind === 2) {
    // bed / counter
    ctx.fillStyle = '#fff';
    rr(ctx, f.x, f.y, f.w, f.h, 6*S); ctx.fill();
    ctx.fillStyle = palette.accent;
    rr(ctx, f.x + 8*S, f.y + 8*S, f.w - 16*S, 14*S, 4*S); ctx.fill();
    // pillow lines
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath();
    ctx.moveTo(f.x + f.w/2, f.y + 26*S);
    ctx.lineTo(f.x + f.w/2, f.y + f.h - 8*S);
    ctx.stroke();
  } else {
    // shelf / cabinet
    ctx.fillStyle = '#5e4530';
    rr(ctx, f.x, f.y, f.w, f.h, 4*S); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1.5*S;
    var rows = Math.max(2, Math.floor(f.h / (30*S)));
    for (var i = 1; i < rows; i++) {
      var ly = f.y + (i * (f.h / rows));
      ctx.beginPath(); ctx.moveTo(f.x, ly); ctx.lineTo(f.x + f.w, ly); ctx.stroke();
    }
    // small items on shelves
    for (var i = 0; i < rows; i++) {
      var sy = f.y + (i + 0.5) * (f.h / rows);
      ctx.fillStyle = palette.accent;
      ctx.fillRect(f.x + 8*S, sy - 4*S, 14*S, 8*S);
      ctx.fillStyle = '#fff';
      ctx.fillRect(f.x + 30*S, sy - 4*S, 8*S, 8*S);
    }
  }

  // outline
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.lineWidth = 1.5*S;
  rr(ctx, f.x, f.y, f.w, f.h, 4*S); ctx.stroke();
}

function drawDirt(d) {
  var wb = Math.sin(d.wobble) * 1.0 * S;
  ctx.save();
  ctx.translate(d.x, d.y + wb);
  if (d.kind === 0) {
    // dust bunny
    ctx.fillStyle = '#8a7a68';
    for (var i = 0; i < 4; i++) {
      var a = (i/4)*Math.PI*2;
      ctx.beginPath();
      ctx.arc(Math.cos(a)*d.r*0.5, Math.sin(a)*d.r*0.5, d.r*0.55, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle = '#a39785';
    ctx.beginPath(); ctx.arc(0, 0, d.r*0.5, 0, Math.PI*2); ctx.fill();
  } else if (d.kind === 1) {
    // muddy footprint smudge
    ctx.fillStyle = '#4a3a28';
    ctx.beginPath();
    ctx.ellipse(0, 0, d.r, d.r*0.6, d.wobble * 0.1, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#6b5235';
    ctx.beginPath();
    ctx.ellipse(-d.r*0.3, -d.r*0.15, d.r*0.4, d.r*0.25, 0, 0, Math.PI*2);
    ctx.fill();
  } else {
    // crumpled wrapper
    ctx.fillStyle = '#d4a017';
    rr(ctx, -d.r, -d.r*0.6, d.r*2, d.r*1.2, d.r*0.3);
    ctx.fill();
    ctx.strokeStyle = '#8c6d10';
    ctx.lineWidth = 1.2*S;
    ctx.beginPath(); ctx.moveTo(-d.r*0.4, -d.r*0.6); ctx.lineTo(-d.r*0.4, d.r*0.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( d.r*0.4, -d.r*0.6); ctx.lineTo( d.r*0.4, d.r*0.6); ctx.stroke();
  }
  ctx.restore();
}

function drawPlayer() {
  var r = PLAYER_R * S, br = PLAYER_BRUSH * S;
  // brush halo
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.arc(player.x, player.y, br, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1.5*S;
  ctx.beginPath(); ctx.arc(player.x, player.y, br, 0, Math.PI*2); ctx.stroke();

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(player.x, player.y + r*0.7, r*0.9, r*0.4, 0, 0, Math.PI*2); ctx.fill();

  // body
  var grd = ctx.createRadialGradient(player.x - r*0.3, player.y - r*0.3, 0, player.x, player.y, r);
  grd.addColorStop(0, '#5dade2'); grd.addColorStop(1, '#1f6391');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(player.x, player.y, r, 0, Math.PI*2); ctx.fill();
  // bristles around player
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.2*S;
  for (var i = 0; i < 12; i++) {
    var a = (i/12)*Math.PI*2 + performance.now()/600;
    ctx.beginPath();
    ctx.moveTo(player.x + Math.cos(a)*r, player.y + Math.sin(a)*r);
    ctx.lineTo(player.x + Math.cos(a)*r*1.35, player.y + Math.sin(a)*r*1.35);
    ctx.stroke();
  }
  // smile/eye for friendliness
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(player.x + r*0.25, player.y - r*0.1, r*0.15, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(player.x + r*0.3, player.y - r*0.1, r*0.07, 0, Math.PI*2); ctx.fill();
}

function drawHUD() {
  var bh = HUD_H * S;
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, W, bh);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, bh); ctx.lineTo(W, bh); ctx.stroke();

  var pad = 14*S, fs = clamp(13*S, 11, 17), fy = bh*0.78;
  var bigFs = clamp(18*S, 14, 24);
  ctx.textBaseline = 'alphabetic';

  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(t('room')+' '+room, pad, bh*0.42);
  ctx.fillStyle = '#fff'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(t(palette.nameKey), pad, fy);

  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(t('score'), W-pad, bh*0.42);
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(score, W-pad, fy);

  // clean meter
  var pct = totalDirt > 0 ? Math.round(((totalDirt - dirt.length) / totalDirt) * 100) : 100;
  var mw = clamp(W*0.32, 110, 240), mh = 10*S;
  var mx = cx - mw/2, my = bh*0.58;
  ctx.fillStyle = '#666'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(t('clean')+' '+pct+'%', cx, bh*0.36);
  rr(ctx, mx, my, mw, mh, mh/2); ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();
  if (pct > 0) {
    var fg = ctx.createLinearGradient(mx, 0, mx+mw, 0);
    fg.addColorStop(0, '#2ecc71'); fg.addColorStop(1, '#1abc9c');
    rr(ctx, mx, my, mw*pct/100, mh, mh/2); ctx.fillStyle = fg; ctx.fill();
  }

  // timer
  var tx = W*0.78;
  var tc = timeLeft < 10 ? '#e74c3c' : timeLeft < 20 ? '#f39c12' : '#aaa';
  ctx.fillStyle = tc; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(t('time'), tx, bh*0.42);
  ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(Math.ceil(timeLeft)+'s', tx, fy);

  if (combo > 1 && comboT > 0) {
    ctx.globalAlpha = Math.min(1, comboT);
    ctx.font = 'bold '+clamp(22*S,16,32)+'px sans-serif';
    ctx.fillStyle = '#FFD700'; ctx.textAlign = 'center';
    ctx.fillText(t('combo')+' x'+combo+'!', cx, H - 50*S);
    ctx.globalAlpha = 1;
  }
}

// ── VECTOR UPGRADE ICONS (never emoji — tofu on headless/Android) ────────────
function drawUpgIcon(icon, x, y, r, col) {
  ctx.save(); ctx.translate(x, y);
  ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = Math.max(2, r*0.14);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (icon === 'brush') {
    // brush handle + bristle block
    ctx.beginPath(); ctx.moveTo(-r*0.55, -r*0.55); ctx.lineTo(r*0.1, r*0.1); ctx.stroke();
    ctx.save(); ctx.rotate(Math.PI/4); ctx.translate(0, r*0.35);
    rr(ctx, -r*0.42, 0, r*0.84, r*0.5, r*0.12); ctx.fill();
    ctx.strokeStyle = '#0c0c1a'; ctx.lineWidth = Math.max(1, r*0.08);
    for (var i=-2;i<=2;i++){ ctx.beginPath(); ctx.moveTo(i*r*0.16, r*0.1); ctx.lineTo(i*r*0.16, r*0.46); ctx.stroke(); }
    ctx.restore();
  } else if (icon === 'speed') {
    // lightning bolt
    ctx.beginPath();
    ctx.moveTo(r*0.18,-r*0.6); ctx.lineTo(-r*0.32,r*0.08); ctx.lineTo(r*0.02,r*0.08);
    ctx.lineTo(-r*0.18,r*0.6); ctx.lineTo(r*0.36,-r*0.06); ctx.lineTo(0,-r*0.06); ctx.closePath(); ctx.fill();
  } else {
    // clock
    ctx.beginPath(); ctx.arc(0,0,r*0.6,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-r*0.38); ctx.moveTo(0,0); ctx.lineTo(r*0.28,r*0.1); ctx.stroke();
  }
  ctx.restore();
}

// ── COIN PILL (drawn on overlays + HUD) ──────────────────────────────────────
function drawCoinPill(x, y, val, fs) {
  ctx.save();
  var label = '' + val;
  ctx.font = 'bold '+fs+'px sans-serif';
  var tw = ctx.measureText(label).width;
  var r = fs*0.55, padL = r*2.1, padR = fs*0.55;
  var w = padL + tw + padR, h = r*2.2;
  rr(ctx, x - w/2, y - h/2, w, h, h/2); ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();
  // coin disc
  var cox = x - w/2 + r*1.15;
  ctx.beginPath(); ctx.arc(cox, y, r*0.78, 0, Math.PI*2);
  var cg = ctx.createRadialGradient(cox-r*0.2, y-r*0.2, 0, cox, y, r*0.8);
  cg.addColorStop(0,'#ffe27a'); cg.addColorStop(1,'#e0a417'); ctx.fillStyle = cg; ctx.fill();
  ctx.strokeStyle = '#a87908'; ctx.lineWidth = Math.max(1, fs*0.05); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold '+fs+'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x - w/2 + padL, y + fs*0.04);
  ctx.restore();
  return { x:x-w/2, y:y-h/2, w:w, h:h };
}

// ── MUTE BUTTON (vector speaker icon, persisted) ─────────────────────────────
var muteBtn = { x:0, y:0, r:0 };
function drawMuteBtn() {
  var r = clamp(15*S, 11, 20);
  // top-right, clear of the HUD score readout during play
  var x = W - r - clamp(14*S, 8, 22);
  var y = (gs === 'PLAYING' || gs === 'LEVELEND') ? (HUD_H*S + r + 8*S) : (r + clamp(14*S, 8, 22));
  muteBtn.x = x; muteBtn.y = y; muteBtn.r = r;
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r*1.35, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();
  ctx.restore();
  if (GF.drawMuteIcon) GF.drawMuteIcon(ctx, x, y, r, GF.muted);
}
function hitMute(px, py) {
  if (!muteBtn.r) return false;
  var dx = px - muteBtn.x, dy = py - muteBtn.y;
  if (dx*dx + dy*dy <= (muteBtn.r*1.6)*(muteBtn.r*1.6)) {
    if (GF.toggleMute) GF.toggleMute();
    return true;
  }
  return false;
}

// ── TOOL SHED — persistent upgrade screen (the owned meta) ───────────────────
// ── M2: streak pip row (7 days) ──────────────────────────────────────────────
function drawStreakPips(x, y, activeDays, r){
  var n = 7, gap = r*2.9, totalW = (n-1)*gap;
  var startX = x - totalW/2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (var i=0;i<n;i++){
    var px = startX + i*gap, on = i < activeDays;
    ctx.beginPath(); ctx.arc(px, y, r, 0, Math.PI*2);
    if (on){
      var g = ctx.createRadialGradient(px-r*0.3, y-r*0.3, 0, px, y, r);
      g.addColorStop(0,'#ffe27a'); g.addColorStop(1,'#e0a417'); ctx.fillStyle=g; ctx.fill();
      ctx.strokeStyle='#a87908'; ctx.lineWidth=Math.max(1,r*0.12); ctx.stroke();
    } else {
      ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1; ctx.stroke();
    }
    ctx.fillStyle = on ? '#3a2a00' : '#667';
    ctx.font = 'bold '+(r*0.95)+'px sans-serif';
    ctx.fillText(''+(i+1), px, y + r*0.06);
  }
  ctx.textBaseline = 'alphabetic';
}

function drawShed() {
  buttons = [];
  ctx.fillStyle = 'rgba(8,12,28,0.94)'; ctx.fillRect(0, 0, W, H);

  var titleFs = clamp(30*S, 20, 42);
  ctx.font = 'bold '+titleFs+'px sans-serif'; ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = 'rgba(93,173,226,0.5)'; ctx.shadowBlur = 18*S;
  ctx.fillText(t('shed'), cx, clamp(58*S, 40, 90));
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  // coins owned
  drawCoinPill(cx, clamp(92*S, 66, 130), coins, clamp(17*S, 13, 22));

  // upgrade rows
  var topY = clamp(120*S, 92, 168);
  var rowH = clamp(76*S, 58, 96);
  var gap = 12*S;
  var cardW = Math.min(W - 36*S, 460*S);
  var cardX = cx - cardW/2;
  for (var i = 0; i < UPGRADES.length; i++) {
    var d = UPGRADES[i];
    var ry = topY + i*(rowH+gap);
    var lvl = upgLevel(d.key), maxed = lvl >= d.max, cost = upgCost(d.key);
    var afford = cost != null && coins >= cost;

    rr(ctx, cardX, ry, cardW, rowH, 12*S);
    ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
    ctx.strokeStyle = afford ? 'rgba(46,204,113,0.55)' : 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1.5*S; ctx.stroke();

    // icon badge
    var iconR = rowH*0.32, iconX = cardX + rowH*0.5, iconY = ry + rowH/2;
    ctx.beginPath(); ctx.arc(iconX, iconY, iconR, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(93,173,226,0.16)'; ctx.fill();
    drawUpgIcon(d.icon, iconX, iconY, iconR, '#9ed0f5');

    // name + desc + level pips — clip text so it never bleeds under the buy button
    var txX = iconX + iconR + 12*S;
    var nameFs = clamp(16*S, 12, 20), descFs = clamp(11*S, 9, 14);
    var bWp = clamp(96*S, 72, 130);                 // buy button width (matches below)
    var txMaxX = cardX + cardW - bWp - 18*S;          // text must stop before the button
    ctx.save();
    ctx.beginPath(); ctx.rect(txX - 2*S, ry, Math.max(10*S, txMaxX - txX), rowH); ctx.clip();
    ctx.textAlign = 'left';
    ctx.font = 'bold '+nameFs+'px sans-serif'; ctx.fillStyle = '#fff';
    ctx.fillText(t(d.nameKey), txX, ry + rowH*0.34);
    ctx.font = descFs+'px sans-serif'; ctx.fillStyle = '#8aa';
    ctx.fillText(t(d.descKey), txX, ry + rowH*0.54);
    ctx.restore();
    // level pips
    var pipR = clamp(3.4*S, 2.4, 5), pipGap = pipR*2.7, pipY = ry + rowH*0.74;
    for (var p = 0; p < d.max; p++) {
      ctx.beginPath(); ctx.arc(txX + pipR + p*pipGap, pipY, pipR, 0, Math.PI*2);
      ctx.fillStyle = p < lvl ? '#2ecc71' : 'rgba(255,255,255,0.18)'; ctx.fill();
    }

    // buy button / maxed badge
    var bW = clamp(96*S, 72, 130), bH = rowH*0.56, bX = cardX + cardW - bW - 10*S, bY = ry + (rowH-bH)/2;
    if (maxed) {
      rr(ctx, bX, bY, bW, bH, bH/2); ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fill();
      ctx.font = 'bold '+clamp(13*S,10,16)+'px sans-serif'; ctx.fillStyle = '#6c8';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(t('maxed'), bX+bW/2, bY+bH/2);
      ctx.textBaseline = 'alphabetic';
    } else {
      var grad = ctx.createLinearGradient(bX, bY, bX, bY+bH);
      if (afford) { grad.addColorStop(0,'#2ecc71'); grad.addColorStop(1,'#1e8449'); }
      else { grad.addColorStop(0,'#3a3a4a'); grad.addColorStop(1,'#2a2a36'); }
      rr(ctx, bX, bY, bW, bH, bH/2); ctx.fillStyle = grad; ctx.fill();
      // coin + cost
      var cFs = clamp(14*S, 11, 18);
      ctx.font = 'bold '+cFs+'px sans-serif';
      var ctw = ctx.measureText(''+cost).width;
      var grp = bX + bW/2 - (ctw + cFs*0.9)/2;
      ctx.beginPath(); ctx.arc(grp + cFs*0.4, bY+bH/2, cFs*0.42, 0, Math.PI*2);
      ctx.fillStyle = afford ? '#ffe27a' : '#888'; ctx.fill();
      ctx.fillStyle = afford ? '#fff' : '#aab'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(''+cost, grp + cFs*0.95, bY+bH/2 + cFs*0.03);
      ctx.textBaseline = 'alphabetic';
      (function (key) {
        buttons.push({ x:bX, y:bY, w:bW, h:bH, fn:function(){ if (buyUpgrade(key)) {} } });
      })(d.key);
    }
  }

  // BACK button
  var backW = clamp(200*S, 150, 300), backH = clamp(50*S, 40, 64);
  var backX = cx - backW/2, backY = H - backH - clamp(24*S, 16, 40);
  rr(ctx, backX, backY, backW, backH, backH/2);
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5*S; ctx.stroke();
  ctx.font = 'bold '+clamp(17*S,13,22)+'px sans-serif'; ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('‹ '+t('back'), cx, backY+backH/2);
  ctx.textBaseline = 'alphabetic';
  buttons.push({ x:backX, y:backY, w:backW, h:backH, fn:function(){ if (GF.sfx) GF.sfx('tap'); gs = shedReturn; } });

  drawMuteBtn();
}

function drawOverlay(title, sub, btnText, btnFn, sub2, opts) {
  opts = opts || {};
  buttons = [];
  ctx.fillStyle = 'rgba(8,12,28,0.85)';
  ctx.fillRect(0, 0, W, H);

  // coins owned — top pill (the persistent meta, always visible on menu screens)
  if (opts.meta) drawCoinPill(cx, clamp(34*S, 24, 54), coins, clamp(16*S, 12, 21));

  var titleFs = clamp(38*S, 22, 56);
  var subFs   = clamp(16*S, 12, 22);
  var wide    = W / H > 1.15;
  var btnW    = clamp((wide?320:240)*S, 160, 400), btnH = clamp((wide?64:52)*S, 40, 82);
  var btnX    = cx - btnW/2;
  // The MENU stacks a lot below PLAY (BEST + Tool Shed + upgrade hint + daily-quests
  // panel). On a wide/short viewport that runs off the bottom (Step 3b: 1280x720
  // clipped the panel), so lift the whole overlay up when the quest panel is shown.
  // (The gallery preview recorder reaches gameplay via the __gfBot 'start' seam, so
  // moving PLAY off 800x600-centre no longer breaks the preview.)
  var ay = cy - ((opts.quests && wide) ? 132*S : 0);
  var textBlockBottom = ay - 16*S + subFs + (sub2 ? subFs + 18*S : 0);
  var btnY = wide
    ? Math.max(textBlockBottom + btnH / 2 + 16, (opts.quests ? H * 0.20 : H * 0.58))
    : cy + 20*S;

  ctx.shadowColor = 'rgba(46,204,113,0.45)'; ctx.shadowBlur = 30*S;
  ctx.font = 'bold '+titleFs+'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(title, cx, ay - 50*S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  if (sub) {
    ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#9ab';
    ctx.fillText(sub, cx, ay - 16*S);
  }
  if (sub2) {
    ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#bcd';
    ctx.fillText(sub2, cx, ay + 2*S);
  }

  // animated PLAY button (only for the start-game call; also applies to retry/next but fine)
  var _t = performance.now() / 1000, _k = Math.sin(_t * 2.2), _p = wide ? (1 + 0.05 * _k) : 1;
  var _w = btnW * _p, _h = btnH * _p, _x = cx - _w / 2, _y = btnY + btnH / 2 - _h / 2;
  var grad = ctx.createLinearGradient(_x, _y, _x, _y+_h);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#1e8449');
  ctx.save();
  if (wide) { ctx.shadowColor = 'rgba(46,224,122,'+(0.4+0.28*_k).toFixed(3)+')'; ctx.shadowBlur = (22+10*_k)*S; }
  rr(ctx, _x, _y, _w, _h, _h/2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.restore();
  ctx.font = 'bold '+clamp((wide?22:16)*S,14,28)+'px sans-serif'; ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(wide ? ('▶ '+btnText) : btnText, cx, btnY + btnH/2);
  ctx.textBaseline = 'alphabetic';

  buttons.push({ x:btnX, y:btnY, w:btnW, h:btnH, fn:btnFn });

  var infoY = btnY + btnH + 26*S;
  if (best > 0) {
    ctx.font = clamp(13*S,10,17)+'px sans-serif'; ctx.fillStyle = '#557';
    ctx.textAlign = 'center';
    ctx.fillText(t('best')+': '+best, cx, infoY);
    infoY += 22*S;
  }

  // ── Persistent-meta UI: Tool Shed button + "one upgrade away" return hook ──
  if (opts.meta) {
    var sW = clamp((wide?260:220)*S, 150, 320), sH = clamp((wide?52:46)*S, 38, 64);
    var sX = cx - sW/2, sY = infoY + 4*S;
    rr(ctx, sX, sY, sW, sH, sH/2);
    var sg = ctx.createLinearGradient(sX, sY, sX, sY+sH);
    sg.addColorStop(0, '#3a4d6b'); sg.addColorStop(1, '#24304a');
    ctx.fillStyle = sg; ctx.fill();
    ctx.strokeStyle = 'rgba(158,208,245,0.4)'; ctx.lineWidth = 1.5*S; ctx.stroke();
    // wrench-ish icon + label
    drawUpgIcon('brush', sX + sH*0.55, sY + sH/2, sH*0.28, '#9ed0f5');
    ctx.font = 'bold '+clamp(16*S,12,20)+'px sans-serif'; ctx.fillStyle = '#dfe7ff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t('shed'), cx + sH*0.2, sY + sH/2);
    ctx.textBaseline = 'alphabetic';
    buttons.push({ x:sX, y:sY, w:sW, h:sH, fn:function(){ if (GF.sfx) GF.sfx('tap'); shedReturn = gs; gs = 'SHED'; } });

    // session-end hook: "Next upgrade: Brush II — 40 (you have 32)"
    var hint = nextUpgradeHint();
    if (hint) {
      var hy = sY + sH + 24*S;
      ctx.font = clamp(12.5*S,10,16)+'px sans-serif'; ctx.textAlign = 'center';
      ctx.fillStyle = '#8aa';
      var label = t('next_up')+': '+t(hint.nameKey)+' '+hint.lvl;
      ctx.fillText(label, cx, hy);
      ctx.fillStyle = coins >= hint.cost ? '#2ecc71' : '#c9a227';
      ctx.font = 'bold '+clamp(12.5*S,10,16)+'px sans-serif';
      ctx.fillText(hint.cost+'  ('+t('have')+' '+coins+')', cx, hy + 18*S);
      infoY = hy + 18*S;
    } else { infoY = sY + sH; }
  }

  // ── M2: compact daily-quests panel on the MENU (reason-to-return surfaced) ──
  if (opts.quests && quests && quests.length) {
    var qTop = infoY + clamp(26*S, 18, 40);
    var qGap = 6*S, qRowH = clamp(26*S, 21, 34);
    var doneN = 0; for (var qi=0; qi<quests.length; qi++) if (quests[qi].done) doneN++;
    // header
    ctx.textAlign = 'center'; ctx.font = 'bold '+clamp(13*S,11,17)+'px sans-serif';
    ctx.fillStyle = '#9ed0f5';
    ctx.fillText(t('quests')+'  '+doneN+'/'+quests.length, cx, qTop);
    var qy = qTop + clamp(14*S, 10, 20);
    var qCardW = Math.min(W - 44*S, 380*S), qCardX = cx - qCardW/2;
    for (var qi=0; qi<quests.length; qi++) {
      var q = quests[qi];
      rr(ctx, qCardX, qy, qCardW, qRowH, 7*S);
      ctx.fillStyle = q.done ? 'rgba(46,204,113,0.14)' : 'rgba(255,255,255,0.045)'; ctx.fill();
      // progress fill (under text)
      if (!q.done && q.target>0) {
        ctx.save(); rr(ctx, qCardX, qy, qCardW*Math.min(1,q.prog/q.target), qRowH, 7*S);
        ctx.fillStyle = 'rgba(93,173,226,0.13)'; ctx.fill(); ctx.restore();
      }
      // label (clip so it never runs under the reward); cap to compressed row height
      var qFs = Math.min(clamp(11.5*S, 9.5, 15), qRowH*0.62);
      ctx.save();
      ctx.beginPath(); ctx.rect(qCardX+9*S, qy, qCardW-70*S, qRowH); ctx.clip();
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = (q.done?'bold ':'')+qFs+'px sans-serif';
      ctx.fillStyle = q.done ? '#7fe0a8' : '#cdd6e6';
      ctx.fillText((q.done?'✓ ':'')+questLabel(q), qCardX+10*S, qy+qRowH/2);
      ctx.restore();
      // right side: reward or DONE
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.font = 'bold '+qFs+'px sans-serif';
      if (q.done){ ctx.fillStyle = '#6c8'; ctx.fillText(t('q_done'), qCardX+qCardW-10*S, qy+qRowH/2); }
      else { ctx.fillStyle = '#ffd35a'; ctx.fillText('+'+q.reward+(q.target>1?'  '+q.prog+'/'+q.target:''), qCardX+qCardW-10*S, qy+qRowH/2); }
      ctx.textBaseline = 'alphabetic';
      qy += qRowH + qGap;
    }
    // streak teaser: come back tomorrow for +N
    if (streak > 0) {
      ctx.textAlign = 'center'; ctx.font = clamp(11*S,9,14)+'px sans-serif'; ctx.fillStyle = '#778';
      var nextR = loginRewardFor(streak+1);
      ctx.fillText(t('streak_hint')+' +'+nextR+' ('+t('day')+' '+(streak+1)+')', cx, qy + 10*S);
    }
  }

  drawMuteBtn();
}

// ── MAIN LOOP ───────────────────────────────────────────────────────────────
function frame(ts) {
  var dt = Math.min((ts - lastTs) / 1000, 0.08);
  lastTs = ts;

  update(dt);

  ctx.fillStyle = '#0c0c1a';
  ctx.fillRect(0, 0, W, H);

  if (gs === 'PLAYING' || gs === 'LEVELEND') {
    drawFloor();
    for (var i = 0; i < furniture.length; i++) drawFurniture(furniture[i]);
    for (var i = 0; i < dirt.length; i++) drawDirt(dirt[i]);

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
    }
    ctx.globalAlpha = 1;

    drawPlayer();

    for (var i = 0; i < floats.length; i++) {
      var f = floats[i];
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.font = 'bold '+clamp(15*S,11,22)+'px sans-serif';
      ctx.fillStyle = f.col; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(f.txt, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    drawHUD();
    drawMuteBtn();

    if (gs === 'LEVELEND') {
      // bright reveal sweep across the floor
      var ar = arena();
      ctx.fillStyle = 'rgba(255,255,200,'+(0.15 * (1 - revealT))+')';
      ctx.fillRect(ar.x, ar.y, ar.w * revealT, ar.h);
    }
  }

  if (gs === 'SHED') {
    drawShed();
  }

  if (gs === 'DAILY') {
    ctx.fillStyle = '#0c0c1a'; ctx.fillRect(0,0,W,H);
    drawDaily();
  }

  if (gs === 'MENU') {
    ctx.fillStyle = '#0c0c1a'; ctx.fillRect(0,0,W,H);
    var menuBtnTxt = resumeRoom > 0 ? t('resume') : t('play');
    var menuSub2 = resumeRoom > 0 ? (t('room')+' '+resumeRoom+' • '+t('best')+' '+best) : null;
    drawOverlay(t('title'), t('sub'), menuBtnTxt,
      function() { if (GF.sfx) GF.sfx('tap'); score=0; startRoom(resumeRoom > 0 ? resumeRoom : 1); },
      menuSub2, { meta:true, quests:true });
  }
  if (gs === 'LEVELEND' && revealT >= 1) {
    drawOverlay(t('complete')+' (' + t(palette.nameKey) + ')', t('score')+': '+score, t('next'),
      function() { if (GF.sfx) GF.sfx('tap'); startRoom(room+1); },
      '+'+coinsRun+' '+t('coins'), { meta:true });
  }
  if (gs === 'GAMEOVER') {
    if (score > best) {
      best = score;
      try { localStorage.setItem('apt_best', best); } catch(e) {}
      saveMeta();
    }
    drawOverlay(t('gameover'), t('score')+': '+score, t('retry'),
      function() { if (GF.sfx) GF.sfx('tap'); score=0; startRoom(room); },
      '+'+coinsRun+' '+t('coins'), { meta:true });
  }

  requestAnimationFrame(frame);
}

// ── BOOT ────────────────────────────────────────────────────────────────────
var booted = false;
function boot() {
  if (booted) return;
  booted = true;
  GF = window.GF || {};

  // legacy best (pre-M1) — migrate as a fallback before persist load overwrites
  try { best = parseInt(localStorage.getItem('apt_best')||'0')||0; } catch(e) {}

  // ── Persistent meta: load owned coins + upgrades + best + furthest room ──
  if (GF.persist) {
    GF.persist('apt_meta_v1',
      function () { return { coins:coins, upg:upg, best:best, resumeRoom:resumeRoom,
        lastDay:lastDay, streak:streak, lastSeen:lastSeen, questDay:questDay, quests:quests }; },
      function (s) {
        if (!s) return;
        coins = s.coins || 0;
        if (s.upg) { upg.brush = s.upg.brush||0; upg.speed = s.upg.speed||0; upg.time = s.upg.time||0; }
        best = Math.max(best, s.best||0);
        resumeRoom = s.resumeRoom || 0;
        // ── M2 restore ──
        lastDay = s.lastDay || 0;
        streak = s.streak || 0;
        lastSeen = s.lastSeen || 0;
        questDay = s.questDay || 0;
        quests = Array.isArray(s.quests) ? s.quests : [];
      });
  }

  // ── M2: compute return rewards (idle + daily login/streak) on open ──
  computeReturnRewards();

  // ── State seam for the post-build-tester gate ──
  if (GF.exposeState) GF.exposeState(function () {
    var qDone=0; for (var i=0;i<quests.length;i++) if (quests[i].done) qDone++;
    return { gs:gs, score:score, best:best, room:room, coins:coins,
             upgBrush:upg.brush, upgSpeed:upg.speed, upgTime:upg.time,
             dirtLeft:dirt.length, timeLeft:Math.ceil(timeLeft),
             streak:streak, questsDone:qDone, questsTotal:quests.length,
             pendingIdle:pending.idle, pendingLogin:pending.login };
  });

  // ── Bot contract for the progression probe ──
  if (GF.exposeBot) GF.exposeBot(
    function () {
      if (gs === 'SHED') {
        var acts = ['exitShed'];
        for (var i=0;i<UPGRADES.length;i++){ var c=upgCost(UPGRADES[i].key); if (c!=null && coins>=c) acts.push('buy_'+UPGRADES[i].key); }
        return acts;
      }
      if (gs === 'DAILY') { return ['claimDaily']; }
      if (gs === 'MENU' || gs === 'GAMEOVER' || gs === 'LEVELEND') {
        var acts = ['start'];
        // affordable upgrades become bot actions so the probe exercises the meta
        for (var i=0;i<UPGRADES.length;i++){ var c=upgCost(UPGRADES[i].key); if (c!=null && coins>=c) acts.push('buy_'+UPGRADES[i].key); }
        return acts;
      }
      if (gs === 'PLAYING') {
        // steer toward nearest dirt
        return ['toNearestDirt'];
      }
      return [];
    },
    function (a) {
      if (a === 'exitShed') { gs = shedReturn || 'MENU'; return; }
      if (a === 'claimDaily') { claimReturnRewards(); gs = 'MENU'; return; }
      if (a === 'start') {
        if (gs==='SHED') gs = shedReturn || 'MENU';
        if (gs==='DAILY') { claimReturnRewards(); gs='MENU'; }
        if (gs==='MENU') { score=0; startRoom(resumeRoom>0?resumeRoom:1); }
        else if (gs==='LEVELEND') startRoom(room+1);
        else if (gs==='GAMEOVER') { score=0; startRoom(room); }
        return;
      }
      if (a && a.indexOf('buy_')===0) { buyUpgrade(a.slice(4)); return; }
      if (a === 'toNearestDirt' && gs==='PLAYING' && dirt.length) {
        var nd=null, bd=1e9;
        for (var i=0;i<dirt.length;i++){ var dx=dirt[i].x-player.x, dy=dirt[i].y-player.y, dd=dx*dx+dy*dy; if (dd<bd){bd=dd;nd=dirt[i];} }
        if (nd) { var dx=nd.x-player.x, dy=nd.y-player.y, m=Math.sqrt(dx*dx+dy*dy)||1; touch.active=true; touch.dx=dx/m; touch.dy=dy/m; }
      }
    });

  if (window.ysdk && window.ysdk.features && window.ysdk.features.LoadingAPI) {
    window.ysdk.features.LoadingAPI.ready();
  }

  // ── Music bed (no-credit procedural; cozy fits the calm-cleaning vibe) ──
  if (GF.startMusic) (function(){ var go=function(){ GF.music('audio/bg_track.mp3', 0.55); ['pointerdown','keydown','touchstart','mousedown'].forEach(function(ev){ document.removeEventListener(ev, go, true); }); }; ['pointerdown','keydown','touchstart','mousedown'].forEach(function(ev){ document.addEventListener(ev, go, true); }); })(); /* bespoke synth_track music */

  gs = 'MENU';

  // ── M2: show the WELCOME-BACK / daily-claim screen first if there's a
  //    login bonus or idle pile waiting (gallery + platform-with-menu only). ──
  var hasReturnReward = (pending.idle > 0 || pending.login > 0);

  // ── PLATFORM AUTOSTART (CLAUDE.md #9): drop straight into gameplay on
  //    Yandex/CrazyGames; the gallery (no flag) keeps its menu. We still BANK
  //    any daily/idle reward silently so it's never lost — just skip the screen. ──
  if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU') {
    if (hasReturnReward) claimReturnRewards();   // silent bank, no overlay
    score = 0; startRoom(resumeRoom > 0 ? resumeRoom : 1);
  } else if (hasReturnReward && !window._silent) {
    gs = 'DAILY';   // gallery: greet returning player with their payout
  }

  lastTs = performance.now();
  requestAnimationFrame(frame);
}

(function() {
  if (typeof YaGames === 'undefined') { boot(); return; }
  YaGames.init().then(function(ysdk) {
    window.ysdk = ysdk;
    try {
      var l = ysdk.environment && ysdk.environment.i18n && ysdk.environment.i18n.lang;
      if (l) lang = l.startsWith('ru') ? 'ru' : 'en';
    } catch(e) {}
    boot();
  }).catch(function() { boot(); });
  setTimeout(boot, 3000);
})();

})();
</script>
