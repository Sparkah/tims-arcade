// ── HELPERS ────────────────────────────────────────────────────────────────
function S(){ return GF.S; }
function rnd(a,b){ return a + Math.random()*(b-a); }
function pick(arr){ return arr[(Math.random()*arr.length)|0]; }
function todayIdx(){ return Math.floor(Date.now()/86400000); }
function playTop(){ return Math.max(64*S(), 56) + 8; }
function playBot(){ return GF.H - rageBarH() - 6; }
function rageBarH(){ return GF.clamp(70*S(), 56, 96); }
function comboMult(){ return Math.min(1 + Math.floor(combo/4), COMBO_MULT_CAP); }

// ── TROPHY / HALL helpers (M1 persistent owned meta) ───────────────────────
function trophyCount(){ var n=0; for (var i=0;i<TROPHIES.length;i++) if (trophies[TROPHIES[i].id]) n++; return n; }
// the next trophy not yet owned — discovery is ordered, so THIS is what the
// rooms ahead might be hiding (the session-end reason to keep going).
function nextUndiscovered(){
  for (var i=0;i<TROPHIES.length;i++){ if (!trophies[TROPHIES[i].id]) return TROPHIES[i]; }
  return null;
}
// permanent cash multiplier from every trophy you own (the world-visible payoff:
// a returning player's smashes pay more the moment they reload).
function cashBonus(){ var b=0; for (var i=0;i<TROPHIES.length;i++) if (trophies[TROPHIES[i].id]) b+=TROPHIES[i].bonus; return b; }
function trophyById(id){ for (var i=0;i<TROPHIES.length;i++) if (TROPHIES[i].id===id) return TROPHIES[i]; return null; }
// capture: smashing a trophy object banks it into the Hall forever + big cash
function captureTrophy(o, rc){
  if (o.trophy && !trophies[o.trophy]){
    trophies[o.trophy] = true;
    gainedTrophyThisRun = true;
    trophyToastT = 2.4; trophyToastId = o.trophy;
    var tdef = trophyById(o.trophy);
    var reward = 120 + room*25;
    cash += reward; runCash += reward;
    GF.sfx('unlock'); GF.sfx('win');
    GF.spawnParticles(rc.x, rc.y, tdef?tdef.tint:'#ffd54a', 26);
    GF.spawnFloat(rc.x, rc.y - rc.h*0.5, '+'+reward, '#ffd54a');
    GF.setShake(1.2);
    checkpoint();
  }
}

function evXY(e){
  var r = cv.getBoundingClientRect();
  var sx = cv.width / (r.width||1), sy = cv.height / (r.height||1);
  return { x:(e.clientX - r.left)*sx, y:(e.clientY - r.top)*sy };
}
function objRect(o){
  var pt = playTop(), ph = playBot()-pt, s = S();
  var mx = 40*s;
  var x = mx + o.fx*(GF.W - 2*mx);
  var y = pt + o.fy*ph;
  return { x:x, y:y, w:o.t.bw*s*o.sc, h:o.t.bh*s*o.sc };
}
function aliveCount(){ var n=0; for (var i=0;i<objects.length;i++) if(!objects[i].dead) n++; return n; }
// room clears when all JUNK is gone — bombs are avoidable hazards, never block progress
function aliveJunk(){ var n=0; for (var i=0;i<objects.length;i++){ var o=objects[i]; if(!o.dead && !o.bomb) n++; } return n; }

// ── ROOM GENERATION ────────────────────────────────────────────────────────
function spawnRoom(n){
  objects = [];
  var theme = THEMES[Math.min(n-1, THEMES.length-1)];
  if (n > THEMES.length) theme = THEMES[THEMES.length-1];
  var count = Math.min(ROOM_BASE_OBJECTS + (n-1)*2, 18);
  var bombs = Math.min(BOMB_BASE + Math.floor(n*0.6), 6);  // room 1=2, 2=3, 3=3, 4=4, 5=5
  if (n === 1 && bombs < 2) bombs = 2;   // room 1 always shows bombs to teach avoidance

  // loose jittered grid so the room looks full but not a perfect lattice
  var cols = Math.ceil(Math.sqrt(count*0.62));
  var rows = Math.ceil(count/cols);
  var slots = [];
  for (var r=0;r<rows;r++) for (var c=0;c<cols;c++) slots.push({c:c,r:r});
  // shuffle
  for (var i=slots.length-1;i>0;i--){ var j=(Math.random()*(i+1))|0; var tmp=slots[i]; slots[i]=slots[j]; slots[j]=tmp; }

  for (var k=0;k<count;k++){
    var sl = slots[k % slots.length];
    var fx = (sl.c + 0.5 + rnd(-0.28,0.28)) / cols;
    var fy = (sl.r + 0.5 + rnd(-0.26,0.26)) / rows;
    fx = GF.clamp(fx, 0.06, 0.94);
    fy = GF.clamp(fy, 0.05, 0.90);   // keep every object comfortably tappable + clear of the rage bar
    var isBomb = k < bombs;
    if (isBomb){
      objects.push({ bomb:true, t:{bw:50,bh:50}, mat:null, fx:fx, fy:fy, sc:1, hp:1, maxhp:1, dead:false, lastSwipe:-1, ph:Math.random()*6.28 });
    } else {
      var tk = pick(theme.types);
      var t = TYPES[tk];
      var m = MAT[t.mat];
      var hp = m.hp + (n>3 && Math.random()<0.3 ? 1 : 0);
      objects.push({ bomb:false, type:tk, t:t, mat:t.mat, m:m, fx:fx, fy:fy,
        sc:rnd(0.9,1.12), hp:hp, maxhp:hp, dead:false, lastSwipe:-1, rot:rnd(-0.05,0.05) });
    }
  }
  // ── TROPHY injection (M1 owned-meta hook): from room 2, while an undiscovered
  // relic remains, a rare golden landmark may appear. Smashing it banks it into
  // the Hall forever. Chance ramps a little with room depth so progress never stalls.
  var nextTr = nextUndiscovered();
  if (nextTr && n >= 2){
    var chance = Math.min(TROPHY_DROP_BASE + (n-2)*0.03, 0.42);
    if (Math.random() < chance){
      // convert a random NON-bomb object slot into the trophy (keeps room count stable)
      var cand = [];
      for (var qi=0;qi<objects.length;qi++) if (!objects[qi].bomb) cand.push(qi);
      if (cand.length){
        var slot = cand[(Math.random()*cand.length)|0];
        var old = objects[slot];
        var tdef = TYPES[nextTr.base] || TYPES.vase;
        objects[slot] = { bomb:false, trophy:nextTr.id, trdef:nextTr, type:nextTr.base, t:tdef,
          mat:tdef.mat, m:MAT[tdef.mat], fx:old.fx, fy:old.fy, sc:1.25,
          hp:2, maxhp:2, dead:false, lastSwipe:-1, rot:0, ph:Math.random()*6.28 };
      }
    }
  }
  // shuffle so bombs aren't clustered in the first cells
  for (var a=objects.length-1;a>0;a--){ var b=(Math.random()*(a+1))|0; var t2=objects[a]; objects[a]=objects[b]; objects[b]=t2; }
  roomClearT = 0;
}

// ── SMASH LOGIC ────────────────────────────────────────────────────────────
function hitAt(px, py, swipe){
  // topmost-first so overlapping piles resolve to the visible object
  for (var i=objects.length-1;i>=0;i--){
    var o = objects[i];
    if (o.dead) continue;
    if (swipe && o.lastSwipe === curSwipe) continue;
    if (swipe && o.bomb) continue;   // swipes harmlessly skip bombs — only a deliberate TAP detonates one
    var rc = objRect(o);
    var s = S();
    var aw = rc.w/2 + 10*s, ah = rc.h/2 + 10*s;
    if (swipe){ // a touch radius for sweeping
      var sr = (equipped===4 ? 34 : 22) * s;
      aw += sr*0.4; ah += sr*0.4;
    }
    if (px >= rc.x-aw && px <= rc.x+aw && py >= rc.y-ah && py <= rc.y+ah){
      o.lastSwipe = curSwipe;
      strike(o, rc);
      return true;
    }
  }
  return false;
}

function strike(o, rc){
  var tool = TOOLS[equipped];
  if (rageMode){ detonate(o, rc, true); return; }
  if (o.bomb){
    if (coachActive){ // harmless during the coach
      o.dead = true; spawnShards(rc, '#ff8f6a', 10); GF.spawnParticles(rc.x, rc.y, '#ffb38a', 14);
      GF.setShake(0.5); sndBomb(true);
      if (coachActive && coachStep===0) coachAdvance();
      return;
    }
    loseLife(o, rc); return;
  }
  o.hp -= tool.dmg;
  // tool splash
  if (tool.aoe > 0) splash(rc.x, rc.y, tool.aoe*S(), 1, o);
  if (o.hp <= 0){ destroy(o, rc, false); }
  else { hitFx(o, rc); }
}

function hitFx(o, rc){
  GF.spawnParticles(rc.x, rc.y, o.m.shard, 4);
  GF.setShake(0.35);
  sndHit(o.m.snd);
  o.shakeT = 0.12;
}

function destroy(o, rc, fromRage){
  if (o.dead) return;
  o.dead = true;
  var m = o.m || MAT.glass;
  var mult = comboMult() * (rageMode?2:1);
  var sv = Math.round((o.bomb?40:m.score) * mult);
  score += sv;
  // owned trophies grant a permanent cash bonus — the world-visible payoff of the Hall
  var cg = Math.round((o.bomb?6:m.cash) * (rageMode?2:1) * (1 + cashBonus()));
  cash += cg; runCash += cg;
  if (o.trophy) captureTrophy(o, rc);
  if (!rageMode) rage = Math.min(RAGE_MAX, rage + (o.bomb?8:m.rage) * TOOLS[equipped].rageMult);
  combo++; comboTimer = COMBO_WINDOW_SEC;
  spawnShards(rc, m.shard, o.bomb?12:(8 + (m.hp>1?5:0)));
  GF.spawnParticles(rc.x, rc.y, o.bomb?'#ffb38a':m.accent, o.bomb?16:8);
  GF.spawnFloat(rc.x, rc.y - rc.h*0.4, '+'+sv, mult>2?'#ffd54a':'#ffffff');
  GF.setShake(o.bomb?0.9:(0.4 + Math.min(rc.w,rc.h)/(220*S())));
  if (!fromRage){ if (o.bomb) sndBomb(true); else sndDestroy(m.snd); }  // rage plays ONE cluster boom (detonate), not per-object
  if (combo>0 && combo%8===0) GF.sfx('coin');
  if (coachActive && coachStep===0) coachAdvance();
  if (coachActive && coachStep===1) swipeDestroyed++;
  checkRoomClear();
}

function splash(x, y, rad, dmg, except){
  for (var i=0;i<objects.length;i++){
    var o = objects[i];
    if (o.dead || o===except || o.bomb) continue;
    var rc = objRect(o);
    if (GF.dist(x,y,rc.x,rc.y) <= rad){
      o.hp -= dmg;
      if (o.hp<=0) destroy(o, rc, false); else hitFx(o, rc);
    }
  }
}

function detonate(o, rc, big){
  // RAGE mode: instakill in a radius around the tap
  rings.push({ x:rc.x, y:rc.y, r:10, max:RAGE_AOE_RADIUS*S(), life:1 });
  GF.setShake(1.0); sndRageHit();
  var rad = RAGE_AOE_RADIUS*S();
  for (var i=0;i<objects.length;i++){
    var t = objects[i];
    if (t.dead) continue;
    var tr = objRect(t);
    if (GF.dist(rc.x,rc.y,tr.x,tr.y) <= rad){
      destroy(t, tr, true);
    }
  }
}

function loseLife(o, rc){
  o.dead = true;
  lives--;
  combo = 0; comboTimer = 0;
  flashT = 0.45;
  GF.setShake(1.3);
  spawnShards(rc, '#ff7a52', 18);
  GF.spawnParticles(rc.x, rc.y, '#ff5a3c', 22);
  GF.spawnFloat(rc.x, rc.y, '-1', '#ff5a3c');
  sndBomb(false);
  checkpoint();
  if (lives <= 0){ gameOver(); }
}

function checkRoomClear(){
  if (gs !== 'PLAYING' || roomClearT > 0) return;
  if (aliveJunk() === 0){
    roomBonus = room*40 + lives*30;
    score += roomBonus;
    roomClearT = 1.3;
    GF.sfx('levelup');
    checkpoint();
  }
}

function triggerRage(){
  if (rage < RAGE_MAX || rageMode || gs!=='PLAYING') return;
  rageMode = true; rageTimer = RAGE_DURATION_SEC; rage = RAGE_MAX;
  GF.setShake(1.2);
  GF.sfx('win');
  if (coachActive && coachStep===3) coachAdvance();
  checkpoint();
}

function gameOver(){
  gs = 'GAMEOVER';
  rageMode = false;
  bestPending = score > best;          // recompute each game-over (don't stick true forever)
  if (bestPending) best = score;
  _pendingAd = true;          // offer rewarded ad (double run cash) on the next click
  GF.gameEnded();
  GF.sfx('lose');
  checkpoint();
}

function restart(){
  gs = 'PLAYING';
  score = 0; room = 1; lives = MAX_LIVES; combo = 0; comboTimer = 0;
  rage = 0; rageMode = false; rageTimer = 0; flashT = 0;
  bestPending = false; runCash = 0;
  gainedTrophyThisRun = false;
  shards = []; rings = [];
  spawnRoom(1);
  GF.gameStarted();
  checkpoint();
}

// ── COACH (first-session interactive tutorial) ─────────────────────────────
function startCoach(){
  var done = false;
  try { done = (localStorage.getItem(COACH_KEY) === '1'); } catch(e){}
  if (done){ coachActive = false; return; }
  coachActive = true; coachStep = 0; coachT = 0;
}
function coachAdvance(){
  coachStep++; coachT = 0;
  if (coachStep >= COACH_STEPS.length){
    coachActive = false;
    try { localStorage.setItem(COACH_KEY,'1'); } catch(e){}
  } else if (COACH_STEPS[coachStep] === 'c_bomb'){
    // pick a live bomb to point at
    coachBomb = null;
    for (var i=0;i<objects.length;i++){ if (objects[i].bomb && !objects[i].dead){ coachBomb = objects[i]; break; } }
  }
}
function reopenCoach(){
  helpOpen = true;   // the "?" panel is the static reference card
}

// ── PERSISTENCE (event-based, never per-frame — see Build Hygiene) ─────────
function saveMeta(){
  try {
    var ow = []; for (var k in owned) if (owned[k]) ow.push(+k);
    var tr = []; for (var tk in trophies) if (trophies[tk]) tr.push(tk);
    localStorage.setItem('rage_room_meta_v1', JSON.stringify({
      cash:cash, owned:ow, equipped:equipped, best:best, daily:lastDailyDay, trophies:tr
    }));
  } catch(e){}
}
function loadMeta(){
  try {
    var raw = localStorage.getItem('rage_room_meta_v1');
    if (raw){
      var m = JSON.parse(raw);
      cash = m.cash||0; best = m.best||0; equipped = m.equipped||0; lastDailyDay = (m.daily==null?-1:m.daily);
      owned = {0:true};
      if (m.owned) for (var i=0;i<m.owned.length;i++) owned[m.owned[i]] = true;
      if (!owned[equipped]) equipped = 0;
      trophies = {};
      if (m.trophies) for (var ti=0;ti<m.trophies.length;ti++){ if (trophyById(m.trophies[ti])) trophies[m.trophies[ti]] = true; }
    }
  } catch(e){}
}
function checkpoint(){ saveMeta(); GF.saveRun(); }

// ── INPUT ──────────────────────────────────────────────────────────────────
function onDown(p){
  // overlay layers first (priority: help > shop > gameover > hub)
  if (helpOpen){ if (hitUI(p)) return; helpOpen = false; return; }
  if (hallOpen){ hitUI(p); return; }
  if (shopOpen){ hitUI(p); return; }
  if (gs === 'GAMEOVER'){ hitUI(p); return; }
  if (paused){ hitUI(p); return; }
  // HUD buttons
  if (btnPause && inRect(p, btnPause)){ paused = true; checkpoint(); GF.sfx('click'); return; }
  if (btnRage && rage >= RAGE_MAX && !rageMode && inRect(p, btnRage)){ triggerRage(); return; }
  // gameplay smash
  if (roomClearT > 0) return;
  curSwipe++; swipeDestroyed = 0; pdown = true; lastPX = p.x; lastPY = p.y;
  hitAt(p.x, p.y, false);
}
function onMove(p){
  if (!pdown || paused || shopOpen || helpOpen || hallOpen || gs!=='PLAYING' || roomClearT>0) return;
  // interpolate along the swipe so fast drags don't skip objects
  var steps = Math.max(1, Math.floor(GF.dist(lastPX,lastPY,p.x,p.y) / (14*S())));
  for (var i=1;i<=steps;i++){
    var t = i/steps;
    hitAt(lastPX + (p.x-lastPX)*t, lastPY + (p.y-lastPY)*t, true);
  }
  lastPX = p.x; lastPY = p.y;
}
function onUp(){
  if (coachActive && coachStep===1 && swipeDestroyed>=2) coachAdvance();
  pdown = false;
}
cv.addEventListener('pointerdown', function(e){ e.preventDefault(); onDown(evXY(e)); }, {passive:false});
cv.addEventListener('pointermove', function(e){ e.preventDefault(); onMove(evXY(e)); }, {passive:false});
window.addEventListener('pointerup', function(){ onUp(); });
cv.addEventListener('pointercancel', function(){ onUp(); });

function inRect(p, r){ return p.x>=r.x && p.x<=r.x+r.w && p.y>=r.y && p.y<=r.y+r.h; }
function hitUI(p){
  for (var i=0;i<uiButtons.length;i++){ if (inRect(p, uiButtons[i])){ uiButtons[i].fn(); return true; } }
  return false;
}

// ── SHARDS (polygon debris) ────────────────────────────────────────────────
function spawnShards(rc, color, n){
  if (shards.length > 320) return;
  var s = S();
  for (var i=0;i<n;i++){
    var a = Math.random()*6.28;
    var sp = (1.2 + Math.random()*3.6)*s;
    shards.push({ x:rc.x+rnd(-rc.w*0.3,rc.w*0.3), y:rc.y+rnd(-rc.h*0.3,rc.h*0.3),
      vx:Math.cos(a)*sp, vy:Math.sin(a)*sp - 2*s, rot:Math.random()*6.28, vr:rnd(-0.3,0.3),
      sz:(3+Math.random()*5)*s, color:color, life:1, sides:(Math.random()<0.5?3:4) });
  }
}
function updateShards(dt){
  for (var i=shards.length-1;i>=0;i--){
    var p = shards[i];
    p.x+=p.vx; p.y+=p.vy; p.vy += 0.32*S(); p.vx*=0.99; p.rot+=p.vr;
    p.life -= dt*1.1;
    if (p.life<=0 || p.y>GF.H+40) shards.splice(i,1);
  }
}
function drawShards(c){
  for (var i=0;i<shards.length;i++){
    var p = shards[i];
    c.save(); c.globalAlpha = Math.max(0,Math.min(1,p.life)); c.translate(p.x,p.y); c.rotate(p.rot);
    c.fillStyle = p.color; c.beginPath();
    for (var k=0;k<p.sides;k++){ var ang=k/p.sides*6.28; var rr=p.sz*(k%2?0.7:1); if(k===0)c.moveTo(Math.cos(ang)*rr,Math.sin(ang)*rr); else c.lineTo(Math.cos(ang)*rr,Math.sin(ang)*rr); }
    c.closePath(); c.fill(); c.restore();
  }
  c.globalAlpha = 1;
}

// ── AUDIO (per-material synth + bg music; rate-limited) ─────────────────────
var _lastSnd = 0;
function sndGate(){ var n=Date.now(); if (n-_lastSnd < 16) return false; _lastSnd=n; return true; }
function sndHit(mat){
  if (!sndGate()) return;
  if (mat==='wood') GF.tone(150,0.07,'sawtooth',0.08,90);
  else if (mat==='metal') GF.tone(420,0.06,'triangle',0.06,300);
  else if (mat==='conc') GF.tone(110,0.08,'sawtooth',0.09,70);
  else if (mat==='elec') GF.tone(600,0.05,'square',0.05,900);
  else GF.tone(520,0.04,'triangle',0.05);
}
function sndDestroy(mat){
  if (!sndGate()) return;
  var p = 0.9 + Math.random()*0.2;   // pitch variance so rapid smashes never sound machine-gun-identical
  switch(mat){
    case 'glass':   GF.arp([1200*p,1700*p,2100*p],24,0.10,'triangle',0.07); break;
    case 'ceramic': GF.tone(680*p,0.09,'square',0.08,360*p); GF.tone(420*p,0.07,'triangle',0.06); break;
    case 'wood':    GF.tone(120*p,0.13,'sawtooth',0.11,70*p); break;
    case 'elec':    GF.tone(380*p,0.09,'square',0.08,1300*p); GF.tone(90*p,0.12,'sawtooth',0.08); break;
    case 'metal':   GF.tone(300*p,0.16,'triangle',0.10,520*p); GF.tone(180*p,0.12,'square',0.06); break;
    case 'conc':    GF.tone(95*p,0.16,'sawtooth',0.12,60*p); break;
    default:        GF.sfx('hit');
  }
}
function sndBomb(safe){
  if (safe){ GF.tone(420,0.10,'square',0.10,1200); GF.tone(120,0.18,'sawtooth',0.10,60); }
  else { GF.tone(90,0.4,'sawtooth',0.16,40); GF.tone(200,0.18,'square',0.10,60); }
}
function sndRageHit(){ if(!sndGate())return; GF.tone(120,0.18,'sawtooth',0.14,55); GF.tone(520,0.12,'square',0.08,1500); GF.tone(220,0.14,'triangle',0.08,90); }

// ── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt){
  updateShards(dt);
  for (var i=rings.length-1;i>=0;i--){ var rg=rings[i]; rg.r += (rg.max-rg.r)*0.18 + 2; rg.life -= dt*2.2; if (rg.life<=0) rings.splice(i,1); }
  if (flashT>0) flashT = Math.max(0, flashT-dt);
  if (trophyToastT>0) trophyToastT = Math.max(0, trophyToastT-dt);

  if (gs!=='PLAYING' || paused || helpOpen || hallOpen) return;

  for (var j=0;j<objects.length;j++){ if (objects[j].shakeT>0) objects[j].shakeT-=dt; }

  if (comboTimer>0){ comboTimer-=dt; if (comboTimer<=0){ combo=0; } }

  if (rageMode){
    rageTimer -= dt;
    rage = Math.max(0, RAGE_MAX * (rageTimer/RAGE_DURATION_SEC));
    if (rageTimer<=0){ rageMode=false; rage=0; }
  }

  if (roomClearT>0){
    roomClearT -= dt;
    if (roomClearT<=0){ room++; spawnRoom(room); GF.gameStarted(); checkpoint(); }
  }

  if (coachActive){
    coachT += dt;
    var stepKey = COACH_STEPS[coachStep];
    if ((stepKey==='c_bomb' || stepKey==='c_rage') && coachT >= COACH_AUTO[coachStep]) coachAdvance();
    else if (coachT >= COACH_AUTO[coachStep]) coachAdvance();   // safety: never stall
  }
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function draw(c){
  var W=GF.W, H=GF.H, s=S();
  drawRoomBg(c, W, H);

  // objects
  for (var i=0;i<objects.length;i++){
    var o = objects[i];
    if (o.dead) continue;
    var rc = objRect(o);
    var ox=0, oy=0;
    if (o.shakeT>0){ ox=rnd(-2,2)*s; oy=rnd(-2,2)*s; }
    // ground shadow
    c.fillStyle='rgba(0,0,0,0.28)';
    c.beginPath(); c.ellipse(rc.x, rc.y+rc.h*0.5, rc.w*0.42, rc.h*0.12, 0, 0, 6.28); c.fill();
    c.save(); c.translate(rc.x+ox, rc.y+oy);
    if (o.bomb) drawBomb(c, rc.w, rc.h, o);
    else if (o.trophy){
      // golden landmark: glow halo + tinted material + sparkle so it reads as RARE
      var td = o.trdef || {tint:'#ffd54a',accent:'#a87a16'};
      var pulse = 0.5 + 0.5*Math.sin(Date.now()/220 + (o.ph||0));
      c.save();
      c.shadowColor = td.tint; c.shadowBlur = (16+8*pulse)*s;
      var gm = { fill:td.tint, accent:td.accent, shard:td.tint, hp:o.maxhp };
      o.t.draw(c, rc.w, rc.h, gm);
      c.restore();
      if (o.maxhp>1 && o.hp<o.maxhp) drawCracks(c, rc.w, rc.h, 1-o.hp/o.maxhp);
      // sparkle marks
      c.fillStyle='rgba(255,255,255,'+(0.5+0.5*pulse)+')';
      for (var sp=0; sp<3; sp++){
        var sa=(o.ph||0)+sp*2.1+Date.now()/600;
        var srx=Math.cos(sa)*rc.w*0.42, sry=Math.sin(sa*1.3)*rc.h*0.42;
        c.beginPath(); c.arc(srx, sry, 1.6*s, 0, 6.28); c.fill();
      }
    } else {
      o.t.draw(c, rc.w, rc.h, o.m);
      if (o.maxhp>1 && o.hp<o.maxhp) drawCracks(c, rc.w, rc.h, 1-o.hp/o.maxhp);
    }
    c.restore();
  }

  drawShards(c);

  // shockwave rings
  for (var k=0;k<rings.length;k++){
    var rg=rings[k];
    c.save(); c.globalAlpha=Math.max(0,rg.life)*0.6; c.strokeStyle='#ffce4a'; c.lineWidth=4*s;
    c.beginPath(); c.arc(rg.x,rg.y,rg.r,0,6.28); c.stroke(); c.restore();
  }
  c.globalAlpha=1;

  if (rageMode) drawRageTint(c, W, H);
  if (flashT>0){ c.fillStyle='rgba(255,40,30,'+(flashT*0.5)+')'; c.fillRect(0,0,W,H); }

  drawHUD(c, W, H);
  drawRageBar(c, W, H);
  if (roomClearT>0) drawRoomCleared(c, W, H);
  if (trophyToastT>0) drawTrophyToast(c, W, H);
  if (coachActive) drawCoach(c, W, H);

  if (paused && !shopOpen && !helpOpen && !hallOpen) drawHub(c, W, H);
  if (gs==='GAMEOVER' && !shopOpen && !helpOpen && !hallOpen) drawGameOver(c, W, H);
  if (shopOpen) drawShop(c, W, H);     // shop draws above hub/gameover so it works from either
  if (hallOpen) drawHall(c, W, H);     // the Hall (owned-trophy collection) overlays too
  if (helpOpen) drawHelp(c, W, H);
}

function drawRoomBg(c, W, H){
  var theme = THEMES[Math.min(room-1, THEMES.length-1)];
  var g = c.createLinearGradient(0,0,0,H);
  g.addColorStop(0, theme.bg[0]); g.addColorStop(1, theme.bg[1]);
  c.fillStyle=g; c.fillRect(0,0,W,H);
  // floor band
  var fy = playBot()+2;
  c.fillStyle='rgba(0,0,0,0.22)'; c.fillRect(0, fy, W, H-fy);
  // faint wall grid
  c.strokeStyle='rgba(255,255,255,0.04)'; c.lineWidth=1;
  for (var x=0;x<W;x+=Math.max(48, W/8)){ c.beginPath(); c.moveTo(x,playTop()); c.lineTo(x,fy); c.stroke(); }
  c.beginPath(); c.moveTo(0,fy); c.lineTo(W,fy); c.strokeStyle='rgba(255,255,255,0.08)'; c.stroke();
}

function drawRageTint(c, W, H){
  var p = 0.18 + 0.10*Math.sin(Date.now()/90);
  var g = c.createRadialGradient(W/2,H/2,H*0.2, W/2,H/2,H*0.75);
  g.addColorStop(0,'rgba(255,40,20,0)'); g.addColorStop(1,'rgba(220,20,10,'+p.toFixed(3)+')');
  c.fillStyle=g; c.fillRect(0,0,W,H);
}

// ── HUD ──────────────────────────────────────────────────────────────────
function drawHUD(c, W, H){
  var s=S();
  // top strip
  var grad=c.createLinearGradient(0,0,0,playTop());
  grad.addColorStop(0,'rgba(8,4,8,0.72)'); grad.addColorStop(1,'rgba(8,4,8,0)');
  c.fillStyle=grad; c.fillRect(0,0,W,playTop());

  // pause button (top-left)
  var pb = GF.clamp(34*s,28,42);
  btnPause = { x:10*s, y:10*s, w:pb, h:pb };
  c.fillStyle='rgba(255,255,255,0.12)'; GF.rr(c, btnPause.x,btnPause.y,pb,pb,8*s); c.fill();
  c.fillStyle='#e9eefc';
  c.fillRect(btnPause.x+pb*0.32, btnPause.y+pb*0.28, pb*0.12, pb*0.44);
  c.fillRect(btnPause.x+pb*0.56, btnPause.y+pb*0.28, pb*0.12, pb*0.44);

  // lives (hearts) right of pause
  var hx = btnPause.x+pb+10*s, hy = 14*s, hr = GF.clamp(11*s,9,14);
  for (var i=0;i<MAX_LIVES;i++) drawHeart(c, hx+i*(hr*2.2), hy+hr*0.6, hr, i<lives);

  // cash under lives
  drawCoin(c, hx+hr*0.8, hy+hr*2.4, hr*0.9);
  c.fillStyle='#ffd54a'; c.font='bold '+(GF.clamp(15*s,12,19))+'px '+FONT;
  c.textAlign='left'; c.textBaseline='middle';
  c.fillText(''+cash, hx+hr*2.2, hy+hr*2.5);

  // room (top center)
  c.textAlign='center'; c.textBaseline='top';
  c.fillStyle='#cdd6ea'; c.font='bold '+(GF.clamp(13*s,11,16))+'px '+FONT;
  c.fillText(GF.t('room')+' '+room+'  -  '+aliveJunk(), W/2, 12*s);

  // live-trophy hint: when a golden relic is in the room, nudge the player to smash it
  if (trophyToastT<=0){
    var hasTrophy=false; for (var ti=0;ti<objects.length;ti++){ if (objects[ti].trophy && !objects[ti].dead){ hasTrophy=true; break; } }
    if (hasTrophy){
      var hp2=0.55+0.45*Math.sin(Date.now()/260);
      c.fillStyle='rgba(255,210,90,'+(0.55+0.4*hp2)+')'; c.font='bold '+(GF.clamp(12*s,10,15))+'px '+FONT;
      c.fillText(GF.t('trophy_hint'), W/2, 12*s+18*s);
    }
  }

  // score (top right)
  c.textAlign='right';
  c.fillStyle='#9aa6bd'; c.font=(GF.clamp(11*s,9,13))+'px '+FONT;
  c.fillText(GF.t('score'), W-12*s, 10*s);
  c.fillStyle='#ffffff'; c.font='bold '+(GF.clamp(22*s,16,28))+'px '+FONT;
  c.fillText(''+score, W-12*s, 22*s);

  // combo (center, below room) when active
  if (combo>1 && comboTimer>0){
    var cy=playTop()+18*s;
    var m=comboMult();
    c.textAlign='center'; c.textBaseline='middle';
    c.fillStyle = m>=5?'#ff6a3c':(m>=3?'#ffb02e':'#ffd54a');
    c.font='bold '+(GF.clamp(30*s,20,44)+Math.min(8,combo*0.2))+'px '+FONT;
    c.fillText('x'+m, W/2, cy);
    // decay bar
    var bw=70*s, bx=W/2-bw/2, by=cy+18*s;
    c.fillStyle='rgba(255,255,255,0.15)'; GF.rr(c,bx,by,bw,4*s,2*s); c.fill();
    c.fillStyle=c.fillStyle='#ffd54a'; GF.rr(c,bx,by,bw*(comboTimer/COMBO_WINDOW_SEC),4*s,2*s); c.fill();
  }
}

function drawRageBar(c, W, H){
  var s=S(), h=rageBarH(), y=H-h, pad=12*s;
  var full = rage>=RAGE_MAX && !rageMode;
  btnRage = { x:pad, y:y+8*s, w:W-pad*2, h:h-16*s };
  // track
  c.fillStyle='rgba(0,0,0,0.55)'; c.fillRect(0,y,W,h);
  var bx=btnRage.x, by=btnRage.y, bw=btnRage.w, bh=btnRage.h;
  c.fillStyle='rgba(255,255,255,0.08)'; GF.rr(c,bx,by,bw,bh,bh/2); c.fill();

}

// ── THE HALL — owned-trophy collection (M1 persistent meta) ────────────────
// A returning player opens this and SEES their growing gallery of conquered
// relics + the live cash bonus those relics grant. Owned ones render as gold
// pedestals; the next undiscovered one shows a "?" silhouette = the pull.
function drawHall(c, W, H){
  uiButtons = [];
  scrim(c, W, H, 0.95);
  var s=S();
  c.textAlign='center'; c.textBaseline='top';
  c.fillStyle='#ffd54a'; c.font='bold '+(GF.clamp(28*s,20,38))+'px '+FONT;
  c.fillText(GF.t('hall_title'), W/2, H*0.07);
  c.fillStyle='#cdd6ea'; c.font=(GF.clamp(13*s,11,16))+'px '+FONT;
  c.fillText(GF.t('hall_sub'), W/2, H*0.07+38*s);
  // active cash bonus banner
  var cb=Math.round(cashBonus()*100);
  c.fillStyle='#3ddc84'; c.font='bold '+(GF.clamp(15*s,12,19))+'px '+FONT;
  c.fillText(GF.t('hall_bonus')+': +'+cb+'%   ('+trophyCount()+'/'+TROPHIES.length+')', W/2, H*0.07+60*s);

  // pedestal grid (2 columns)
  var cols=2, cellW=Math.min((W-56*s)/cols, 190*s), gx=(W-cellW*cols-18*s)/2;
  var cellH=GF.clamp(96*s,78,116), gy=H*0.20, gap=14*s;
  var nextId = nextUndiscovered() ? nextUndiscovered().id : null;
  for (var i=0;i<TROPHIES.length;i++){
    var tdef=TROPHIES[i], col=i%cols, rrow=(i/cols)|0;
    var px=gx+col*(cellW+18*s), py=gy+rrow*(cellH+gap);
    var owned_=!!trophies[tdef.id], isNext=(tdef.id===nextId);
    // card bg
    var fa = owned_? ['#3a2f12','#241d0a'] : (isNext? ['#26223a','#1a1726'] : ['#1c1a24','#141118']);
    var g=c.createLinearGradient(px,py,px,py+cellH); g.addColorStop(0,fa[0]); g.addColorStop(1,fa[1]);
    GF.rr(c,px,py,cellW,cellH,12*s); c.fillStyle=g; c.fill();
    if (owned_){ c.strokeStyle=tdef.tint; c.lineWidth=2*s; GF.rr(c,px,py,cellW,cellH,12*s); c.stroke(); }
    // pedestal + trophy icon
    var ix=px+cellW*0.32, iy=py+cellH*0.52;
    c.fillStyle='rgba(0,0,0,0.35)'; c.beginPath(); c.ellipse(ix,iy+cellH*0.22,cellW*0.16,cellH*0.05,0,0,6.28); c.fill();
    if (owned_){
      c.save(); c.translate(ix, iy); c.shadowColor=tdef.tint; c.shadowBlur=10*s;
      var td=TYPES[tdef.base]||TYPES.vase;
      td.draw(c, td.bw*s*0.7, td.bh*s*0.7, { fill:tdef.tint, accent:tdef.accent, shard:tdef.tint, hp:1 });
      c.restore();
    } else {
      // locked silhouette "?"
      c.fillStyle = isNext? 'rgba(255,210,90,0.65)' : 'rgba(150,150,170,0.30)';
      c.textAlign='center'; c.textBaseline='middle'; c.font='bold '+(GF.clamp(34*s,24,46))+'px '+FONT;
      c.fillText('?', ix, iy);
    }
    // name + bonus / locked label
    c.textAlign='left'; c.textBaseline='top';
    c.fillStyle = owned_? '#ffe9a8' : (isNext? '#cdd6ea' : '#6a6f80');
    c.font='bold '+(GF.clamp(13*s,11,16))+'px '+FONT;
    var nm = owned_? GF.t(tdef.id) : (isNext? GF.t(tdef.id) : '???');
    c.fillText(nm, px+cellW*0.50, py+cellH*0.30);
    c.fillStyle = owned_? '#3ddc84' : '#8a8f9e';
    c.font=(GF.clamp(11*s,9,14))+'px '+FONT;
    c.fillText('+'+Math.round(tdef.bonus*100)+'% '+GF.t('cash'), px+cellW*0.50, py+cellH*0.52);
    if (!owned_ && isNext){ c.fillStyle='#caa12e'; c.fillText(GF.t('hall_locked'), px+cellW*0.50, py+cellH*0.70); }
  }
  var rows=Math.ceil(TROPHIES.length/cols);
  var by=gy+rows*(cellH+gap)+6*s;
  var bw=Math.min(W-64*s,360*s);
  bigBtn(c, GF.t('back'), W/2-bw/2, Math.min(by, H-72*s), bw, GF.clamp(52*s,44,62), ['#caa12e','#9a7016'], function(){ hallOpen=false; GF.sfx('click'); });
}

function watchDoubleCash(){
  if (!_pendingAd){ return; }
  _pendingAd = false;
  var bonus = runCash;   // double only THIS run's earnings, never the whole bank
  var done = false;
  function finish(reward){
    if (done) return; done = true;
    if (reward && bonus>0){ cash += bonus; runCash += bonus; GF.sfx('reward'); GF.spawnFloat(GF.W/2, GF.H*0.4, '+'+bonus, '#ffd54a'); checkpoint(); }
    resumeMusic();
  }
  if (GF.platform === 'local'){ finish(true); return; }   // gallery has no ad network — reward the click
  pauseMusic();
  setTimeout(function(){ finish(false); }, 6000);   // no-fill watchdog (Yandex 4.5): never leave the ad/music hanging
  // Yandex maps GF.showAd('rewarded') to an interstitial (rewarded:false), so call the real rewarded video here
  if (GF.platform === 'yandex' && window.ysdk && window.ysdk.adv && window.ysdk.adv.showRewardedVideo){
    var got = false;
    window.ysdk.adv.showRewardedVideo({ callbacks: {
      onRewarded: function(){ got = true; },
      onClose:    function(){ finish(got); },
      onError:    function(){ finish(false); }
    }});
  } else {
    GF.showAd('rewarded').then(function(res){ finish(res && (res.rewarded || res.shown)); });
  }
}

// ── TEXT WRAP (measured, returns next baseline y) ──────────────────────────
function wrapText(c, text, cx2, y, maxW, lh){
  var words=String(text).split(/\s+/), line='', yy=y;
  for (var i=0;i<words.length;i++){
    var probe=line?line+' '+words[i]:words[i];
    if (c.measureText(probe).width>maxW && line){ c.fillText(line,cx2,yy); line=words[i]; yy+=lh; }
    else line=probe;
  }
  if (line) c.fillText(line,cx2,yy);
  return yy;
}
function wrapTextC(c, text, cx2, cyc, maxW, lh){
  var words=String(text).split(/\s+/), lines=[], line='';
  for (var i=0;i<words.length;i++){
    var probe=line?line+' '+words[i]:words[i];
    if (c.measureText(probe).width>maxW && line){ lines.push(line); line=words[i]; }
    else line=probe;
  }
  if (line) lines.push(line);
  var sy=cyc-(lines.length-1)*lh/2;
  for (var j=0;j<lines.length;j++) c.fillText(lines[j],cx2,sy+j*lh);
}

// ── BACKGROUND MUSIC (procedural WebAudio loop — no asset file, respects mute) ─
// A driving, percussive rage bed: kick + bass + hats + power-chord stabs in E
// minor, with a lead arp every few bars so it never flatlines. Uses its own
// AudioContext, started on the first user gesture (autoplay policy), suspended
// on tab-hide, and silenced whenever GF.muted is set.
var MUS = { ctx:null, master:null, on:false, step:0, bar:0, nextT:0, timer:null, bpm:140 };
var BASS = [82.4,0,82.4,0, 98,0,82.4,0, 110,0,110,0, 146.8,0,123.5,0]; // E2..D3 drive
function musEnsure(){
  if (MUS.ctx) return;
  try { MUS.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return; }
  MUS.master = MUS.ctx.createGain(); MUS.master.gain.value = 0; MUS.master.connect(MUS.ctx.destination);
}
function musOsc(freq, t, dur, type, gain, slideTo){
  var o=MUS.ctx.createOscillator(), g=MUS.ctx.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t+dur);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(gain,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(MUS.master); o.start(t); o.stop(t+dur+0.02);
}
function musKick(t){ var o=MUS.ctx.createOscillator(), g=MUS.ctx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(45,t+0.12);
  g.gain.setValueAtTime(0.8,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.17);
  o.connect(g); g.connect(MUS.master); o.start(t); o.stop(t+0.19); }
function musHat(t,loud){ var o=MUS.ctx.createOscillator(), g=MUS.ctx.createGain();
  o.type='square'; o.frequency.setValueAtTime(8000,t);
  g.gain.setValueAtTime(loud?0.05:0.025,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.04);
  o.connect(g); g.connect(MUS.master); o.start(t); o.stop(t+0.05); }
var LEAD = [329.6,392,493.9,392, 329.6,493.9,659.3,493.9];
function musSchedule(){
  if (!MUS.ctx) return;
  MUS.master.gain.value = GF.muted ? 0 : 0.13;
  if (MUS.nextT < MUS.ctx.currentTime) MUS.nextT = MUS.ctx.currentTime + 0.05; // no catch-up burst after suspend/resume
  var spb = 60/MUS.bpm/4; // 16th-note seconds
  while (MUS.nextT < MUS.ctx.currentTime + 0.13){
    var s = MUS.step % 16;
    if (s === 0) MUS.bar++;
    if (!GF.muted){
      if (s % 4 === 0) musKick(MUS.nextT);
      if (s % 4 === 2) musHat(MUS.nextT, true); else if (s % 2 === 1) musHat(MUS.nextT, false);
      if (BASS[s]) musOsc(BASS[s], MUS.nextT, spb*1.7, 'sawtooth', 0.10);
      if (s === 0) { musOsc(164.8, MUS.nextT, spb*3, 'square', 0.05); musOsc(246.9, MUS.nextT, spb*3, 'square', 0.04); } // E+B stab
      if (MUS.bar % 4 >= 2 && s % 2 === 0) musOsc(LEAD[(s/2)|0], MUS.nextT, spb*1.4, 'triangle', 0.045); // lead every other bar-pair
    }
    MUS.nextT += spb; MUS.step++;
  }
  MUS.timer = setTimeout(musSchedule, 26);
}
function startMusic(){
  musEnsure(); if (!MUS.ctx) return;
  if (MUS.ctx.state === 'suspended') { try { MUS.ctx.resume(); } catch(e){} }
  if (MUS.on) return;
  MUS.on = true; MUS.step = 0; MUS.bar = 0; MUS.nextT = MUS.ctx.currentTime + 0.06;
  musSchedule();
}
function pauseMusic(){ if (MUS.ctx && MUS.ctx.state==='running'){ try { MUS.ctx.suspend(); } catch(e){} } }
function resumeMusic(){ if (MUS.ctx && !GF.muted){ try { MUS.ctx.resume(); } catch(e){} } }
(function(){
  var kick = function(){ startMusic(); };
  window.addEventListener('pointerdown', kick, { passive:true });
  window.addEventListener('touchstart', kick, { passive:true });
  window.addEventListener('keydown', kick);
  document.addEventListener('visibilitychange', function(){
    if (!MUS.ctx) return;
    try { if (document.hidden) MUS.ctx.suspend(); else if (!GF.muted) MUS.ctx.resume(); } catch(e){}
  });
})();

      function(s){ if(!s) return;
        if (s.gs==='GAMEOVER'){ room=1; score=0; lives=MAX_LIVES; return; }   // don't resume a dead run on reload
        room=s.room||1; score=s.score||0; lives=(s.lives==null?MAX_LIVES:s.lives); if (lives<=0) lives=MAX_LIVES; }
    );
    GF.exposeState(function(){ return { gs:gs, score:score, room:room, lives:lives, combo:combo, cash:cash, rage:Math.round(rage), paused:paused, shopOpen:shopOpen, helpOpen:helpOpen, hallOpen:hallOpen, coach:coachActive, clearT:Math.round(roomClearT*100)/100, trophies:trophyCount(), cashBonus:Math.round(cashBonus()*100) }; });
    // progression-probe steering wheel: list available actions + perform one
    if (GF.exposeBot) GF.exposeBot(
      function(){
        if (gs==='GAMEOVER') return ['retry'];
        var acts=[];
        for (var bi=0;bi<objects.length;bi++){ if (!objects[bi].dead && !objects[bi].bomb) acts.push('smash'); }
        if (rage>=RAGE_MAX && !rageMode) acts.push('rage');
        return acts.length?acts:['retry'];
      },
      function(a){
        if (a==='retry'){ restart(); return; }
        if (a==='rage'){ if (rage>=RAGE_MAX && !rageMode) triggerRage(); return; }
        // smash a random live non-bomb object (trophies included — drives the meta)
        var live=[]; for (var bi=0;bi<objects.length;bi++){ var o=objects[bi]; if(!o.dead && !o.bomb) live.push(o); }
        if (live.length){ var o=live[(Math.random()*live.length)|0]; var rc=objRect(o); o.hp-=TOOLS[equipped].dmg; if(o.hp<=0) destroy(o,rc,false); else hitFx(o,rc); }
      }
    );
    if (gs!=='PLAYING') gs='PLAYING';
    spawnRoom(room);
    startCoach();
    // ▶ PLATFORM AUTOSTART (CLAUDE.md #9): on Yandex/CG drop straight into play —
    // suppress the first-session coach so platform players land IN the game.
    if (window.__GF_AUTOSTART && !window._silent){
      coachActive = false;
      try { localStorage.setItem(COACH_KEY,'1'); } catch(e){}
    }
    startMusic();   // procedural background bed (started for real on first user gesture)
    GF.gameStarted();
  },
  onUpdate: update,
  onDraw: draw,
});

// ── SCREENSHOT / TEST / LOCALE-AUDIT HOOKS ─────────────────────────────────
window._jumpLevel = function(){
  // land on a busy mid-game state for screenshots/tests
  gs='PLAYING'; paused=false; shopOpen=false; helpOpen=false; coachActive=false;
  try{ localStorage.setItem(COACH_KEY,'1'); }catch(e){}
  room=4; lives=MAX_LIVES; score=4200; cash=1400; combo=14; comboTimer=COMBO_WINDOW_SEC;
  owned={0:true,1:true,2:true,3:true}; equipped=2;
  trophies={ tr_vase:true, tr_bust:true, tr_skull:true };   // show a partly-filled Hall
  rage=RAGE_MAX*0.8; rageMode=false;
  spawnRoom(4);
};
window._setupForScreenshot = function(lvl){
  window._jumpLevel();
  room = Math.max(5, lvl|0 || 5);   // dense late-game room (18 objects)
  spawnRoom(room);
  combo = 32; comboTimer = COMBO_WINDOW_SEC;   // show a high combo multiplier
  // pre-damage multi-hit objects so cracks + variety show
  for (var i=0;i<objects.length;i++){ if (i%3===0 && !objects[i].bomb && objects[i].maxhp>1){ objects[i].hp=1; } }
  // toss action (shards + particles + a score float) at several points
  for (var k=0;k<8;k++){ var o=objects[(k*2)%objects.length]; if(o && !o.dead){ var rc=objRect(o); GF.spawnParticles(rc.x,rc.y,(o.m?o.m.accent:'#fc6'),9); spawnShards(rc,(o.m?o.m.shard:'#fff'),9); } }
  GF.spawnFloat(GF.W*0.5, GF.H*0.4, '+640', '#ffd54a');
  rage = RAGE_MAX;   // rage bar full + glowing
};
// rage-mode promo view: red tint + shockwave ring mid-blast
window._setRageView = function(){
  window._setupForScreenshot(6);
  rageMode = true; rageTimer = RAGE_DURATION_SEC*0.7;
  var rc = objRect(objects[(objects.length/2)|0] || {fx:0.5,fy:0.5,t:{bw:40,bh:40},sc:1});
  rings.push({ x:GF.W*0.5, y:GF.H*0.42, r:30, max:RAGE_AOE_RADIUS*S()*1.4, life:1 });
  for (var k=0;k<10;k++){ GF.spawnParticles(GF.W*(0.3+0.05*k), GF.H*(0.3+0.04*k), '#ff8a3c', 8); }
};
// locale_overflow_check.js hooks
window._setState = function(stt){
  paused=false; shopOpen=false; helpOpen=false; hallOpen=false; gs='PLAYING';
  if (stt==='GAMEOVER'){ gs='GAMEOVER'; }
  else if (stt==='MENU' || stt==='HUB' || stt==='PAUSED'){ paused=true; }
  else if (stt==='SHOP' || stt==='TOOLS'){ paused=true; shopOpen=true; }
  else if (stt==='HALL'){ paused=true; hallOpen=true; }
  else if (stt==='HELP'){ helpOpen=true; }
};
window._getI18N   = function(){ return STRINGS; };
window._getFontBody = function(){ return FONT; };
// for locale_overflow_check.js — labelled overlay buttons in the current state
window._getButtons = function(){ var o=[]; for (var i=0;i<uiButtons.length;i++){ var b=uiButtons[i]; if (b.label) o.push({ x:b.x, y:b.y, w:b.w, h:b.h, label:b.label }); } return o; };

})();
</script>
