<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Game Factory Arcade</title>
<style>
  :root { --bg:#0e0b1a; --fg:#f4f1ff; --accent:#7c5cff; --ok:#36d399; --err:#ff5c7c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; overflow:hidden; }
  body { background:radial-gradient(circle at 50% 0%, #1a1430, #0e0b1a 70%); color:var(--fg);
         font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; height:100%; }
  #app { height:100%; display:flex; flex-direction:column; }

  /* header */
  header { display:flex; align-items:center; gap:10px; padding:14px 18px calc(14px + env(safe-area-inset-top)); flex:0 0 auto; }
  .brand { font-size:11px; letter-spacing:.32em; color:var(--accent); font-weight:700; text-transform:uppercase; }
  .brand b { color:var(--fg); font-weight:800; }
  .conn { margin-left:auto; display:inline-flex; align-items:center; gap:6px; font-size:11px; opacity:.7; }
  .dot { width:8px; height:8px; border-radius:50%; background:#ffb454; box-shadow:0 0 10px currentColor; color:#ffb454; }
  .dot.ok { background:var(--ok); color:var(--ok); }

  /* hub */
  #hub { flex:1 1 auto; overflow-y:auto; padding:6px 18px 24px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; max-width:720px; margin:0 auto; }
  .tile { position:relative; aspect-ratio:4/3; border-radius:16px; border:none; cursor:pointer; color:var(--fg);
          background:linear-gradient(150deg,#3a2b7a,#221a45); overflow:hidden; text-align:left;
          box-shadow:0 6px 20px #0006; transition:transform .12s ease, box-shadow .12s ease; }
  .tile:hover { transform:translateY(-3px); box-shadow:0 10px 26px #0008; }
  .tile .art { position:absolute; inset:0; background-size:cover; background-position:center; opacity:.9; }
  .tile .scrim { position:absolute; inset:0; background:linear-gradient(to top, #0c0a18e0 22%, transparent 70%); }
  .tile .label { position:absolute; left:12px; right:12px; bottom:10px; }
  .tile .t { font-size:16px; font-weight:700; }
  .tile .g { font-size:11px; opacity:.7; text-transform:uppercase; letter-spacing:.08em; }
  .tile .play { position:absolute; top:10px; right:10px; width:30px; height:30px; border-radius:50%;
                background:#7c5cffcc; display:flex; align-items:center; justify-content:center; }
  .tile .play::after { content:''; border-left:9px solid #fff; border-top:6px solid transparent; border-bottom:6px solid transparent; margin-left:2px; }

  /* game view */
  #gameView { position:fixed; inset:0; display:none; background:#000; z-index:10; }
  #gameFrame { width:100%; height:100%; border:0; display:block; }
  #back { position:fixed; top:calc(10px + env(safe-area-inset-top)); left:12px; z-index:11;
          background:#0c0a18cc; color:#fff; border:1px solid #ffffff22; border-radius:999px;
          padding:8px 14px; font-size:13px; cursor:pointer; backdrop-filter:blur(6px); }
  .center { flex:1; display:flex; align-items:center; justify-content:center; font-size:14px; opacity:.7; }
</style>
</head>
<body>
  <div id="app">
    <header>
      <div class="brand">Game Factory <b>Arcade</b></div>
      <div class="conn" id="conn" style="display:none"><span class="dot" id="dot"></span><span id="connText">Discord</span></div>
    </header>
    <div id="boot" class="center">Starting...</div>
    <div id="hub" style="display:none"><div class="grid" id="grid"></div></div>
  </div>

  <div id="gameView">
    <button id="back">&#8592; Arcade</button>
    <iframe id="gameFrame" allow="autoplay; fullscreen; gamepad; microphone" title="game"></iframe>
  </div>

  <script src="./config.js"></script>
  <script type="module">
    const cfg = window.DISC_CONFIG || {};
    const CLIENT_ID = cfg.DISCORD_CLIENT_ID;
    const $ = id => document.getElementById(id);

    // --- game catalogue: synced from the live Telegram library by sync_disc.mjs ---
    let GAMES = [];
    async function loadGames() {
      try { const r = await fetch('./games.json', { cache:'no-store' }); GAMES = r.ok ? await r.json() : []; }
      catch { GAMES = []; }
    }

    function renderHub() {
      $('boot').style.display = 'none';
      $('hub').style.display = 'block';
      const grid = $('grid');
      grid.innerHTML = '';
      GAMES.forEach(g => {
        const b = document.createElement('button');
        b.className = 'tile';
        b.addEventListener('click', () => openGame(g.slug));
        const art = document.createElement('div'); art.className = 'art';
        if (g.thumb) { art.style.backgroundImage = 'url(' + g.thumb + ')'; }
        else { art.style.background = 'linear-gradient(150deg,#3a2b7a,#221a45)'; }
        const scrim = document.createElement('div'); scrim.className = 'scrim';
        const play = document.createElement('div'); play.className = 'play';
        const label = document.createElement('div'); label.className = 'label';
        const t = document.createElement('div'); t.className = 't'; t.textContent = g.title;
        const ge = document.createElement('div'); ge.className = 'g'; ge.textContent = g.genre;
        label.append(t, ge); b.append(art, scrim, play, label); grid.append(b);
      });
    }
    function openGame(slug) {
      $('gameFrame').src = './games/' + slug + '/'; // trailing slash -> 200 (avoids CF 308 under Discord proxy)
      $('gameView').style.display = 'block';
    }
    $('back').addEventListener('click', () => {
      $('gameView').style.display = 'none';
      $('gameFrame').src = 'about:blank'; // stop the running game
    });

    // --- Discord handshake (if launched as an Activity) ---
    const inDiscord = new URLSearchParams(location.search).has('frame_id');
    await loadGames();
    if (!inDiscord) {
      renderHub(); // standalone: hub is directly playable for testing
    } else {
      $('conn').style.display = 'inline-flex';
      try {
        const { DiscordSDK } = await import('./vendor/embedded-app-sdk.mjs');
        const sdk = new DiscordSDK(CLIENT_ID);
        $('connText').textContent = 'Connecting...';
        await sdk.ready();
        $('dot').classList.add('ok');
        $('connText').textContent = 'Connected';
      } catch (e) {
        $('dot').classList.add('err');
        $('connText').textContent = 'SDK error';
      }
      renderHub(); // show the synced library whether or not the handshake succeeded
    }
  </script>
</body>
</html>
