<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Game Factory Arcade</title>
<style>
  :root { --bg:#0e0b1a; --fg:#f4f1ff; --accent:#7c5cff; --ok:#36d399; --err:#ff5c7c; --panel:#151028; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; overflow:hidden; }
  body { background:radial-gradient(circle at 50% 0%, #1a1430, #0e0b1a 70%); color:var(--fg);
         font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; height:100%; }
  #app { height:100%; display:flex; flex-direction:column; }

  /* header */
  header { display:flex; align-items:center; gap:10px; padding:14px 18px calc(14px + env(safe-area-inset-top)); flex:0 0 auto; min-width:0; }
  .brand { font-size:11px; letter-spacing:.32em; color:var(--accent); font-weight:700; text-transform:uppercase; }
  .brand b { color:var(--fg); font-weight:800; }
  .actions { margin-left:auto; display:flex; align-items:center; gap:8px; min-width:0; }
  .conn { display:inline-flex; align-items:center; gap:6px; font-size:11px; opacity:.78; min-width:0; }
  #connText { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; max-width:min(38vw, 180px); }
  .dot { width:8px; height:8px; border-radius:50%; background:#ffb454; box-shadow:0 0 10px currentColor; color:#ffb454; }
  .dot.ok { background:var(--ok); color:var(--ok); }
  .dot.err { background:var(--err); color:var(--err); }
  .iconBtn { border:1px solid #ffffff20; background:#ffffff0d; color:var(--fg); border-radius:999px; min-width:34px; height:34px;
             display:inline-flex; align-items:center; justify-content:center; cursor:pointer; font-size:15px; backdrop-filter:blur(8px); }
  .iconBtn:hover { background:#ffffff18; }

  /* hub */
  #hub { flex:1 1 auto; overflow-y:auto; padding:6px 18px 24px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; max-width:720px; margin:0 auto; }
  .tile { position:relative; aspect-ratio:4/3; border-radius:16px; border:none; cursor:pointer; color:var(--fg);
          background:linear-gradient(150deg,#3a2b7a,#221a45); overflow:hidden; text-align:left;
          box-shadow:0 6px 20px #0006; transition:transform .12s ease, box-shadow .12s ease; }
  .tile:hover { transform:translateY(-3px); box-shadow:0 10px 26px #0008; }
  .tile .art { position:absolute; inset:0; background-size:cover; background-position:center; opacity:.9; }
  .tile .scrim { position:absolute; inset:0; background:linear-gradient(to top, #0c0a18e0 22%, transparent 70%); }
  .tile .label { position:absolute; left:12px; right:12px; bottom:10px; }
  .tile .t { font-size:16px; font-weight:700; }
  .tile .g { font-size:11px; opacity:.7; text-transform:uppercase; letter-spacing:.08em; }
  .tile .play { position:absolute; top:10px; right:10px; width:30px; height:30px; border-radius:50%;
                background:#7c5cffcc; display:flex; align-items:center; justify-content:center; }
  .tile .play::after { content:''; border-left:9px solid #fff; border-top:6px solid transparent; border-bottom:6px solid transparent; margin-left:2px; }

  /* game view */
  #gameView { position:fixed; inset:0; display:none; background:#000; z-index:10; }
  #gameFrame { width:100%; height:100%; border:0; display:block; }
  #back { position:fixed; top:calc(10px + env(safe-area-inset-top)); left:12px; z-index:11;
          background:#0c0a18cc; color:#fff; border:1px solid #ffffff22; border-radius:999px;
          padding:8px 14px; font-size:13px; cursor:pointer; backdrop-filter:blur(6px); }
  #scoreHud { position:fixed; top:calc(10px + env(safe-area-inset-top)); right:12px; z-index:11;
              min-width:96px; max-width:42vw; display:none; text-align:right; color:#fff;
              background:#0c0a18cc; border:1px solid #ffffff22; border-radius:12px; padding:7px 10px; backdrop-filter:blur(6px); }
  #scoreHud .k { font-size:10px; opacity:.7; letter-spacing:.08em; text-transform:uppercase; }
  #scoreHud .v { font-size:18px; font-weight:800; line-height:1.05; font-variant-numeric:tabular-nums; }
  .center { flex:1; display:flex; align-items:center; justify-content:center; font-size:14px; opacity:.7; }
  #leaderPanel { position:fixed; top:0; right:0; bottom:0; width:min(360px, 92vw); z-index:20; transform:translateX(100%);
                 transition:transform .16s ease; background:color-mix(in srgb, var(--panel) 94%, #000); color:var(--fg);
                 box-shadow:-18px 0 40px #0008; border-left:1px solid #ffffff14; padding:calc(16px + env(safe-area-inset-top)) 16px 18px;
                 display:flex; flex-direction:column; gap:14px; }
  #leaderPanel.open { transform:translateX(0); }
  .panelHead { display:flex; align-items:flex-start; gap:12px; }
  .panelHead h2 { font-size:18px; line-height:1.1; flex:1; }
  .panelHead p { font-size:12px; color:#bfb7e8; margin-top:4px; }
  #leaderClose { flex:0 0 auto; }
  #leaderRows { display:flex; flex-direction:column; gap:7px; overflow:auto; padding-right:3px; }
  .rankRow { display:grid; grid-template-columns:28px 1fr auto; align-items:center; gap:10px; min-height:42px;
             border:1px solid #ffffff12; background:#ffffff08; border-radius:8px; padding:7px 9px; }
  .rankRow .r { color:#a99dff; font-weight:800; font-size:12px; font-variant-numeric:tabular-nums; }
  .rankRow .n { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; font-size:13px; }
  .rankRow .s { font-weight:800; font-size:13px; font-variant-numeric:tabular-nums; }
  .empty { color:#bfb7e8; font-size:13px; line-height:1.4; padding:12px 2px; }
  @media (max-width:420px) {
    header { padding-left:12px; padding-right:12px; }
    .brand { letter-spacing:.22em; }
    .grid { grid-template-columns:repeat(auto-fill,minmax(132px,1fr)); gap:10px; }
  }
</style>
</head>
<body>
  <div id="app">
    <header>
      <div class="brand">Game Factory <b>Arcade</b></div>
      <div class="actions">
        <button class="iconBtn" id="leadersBtn" title="Leaderboard" aria-label="Leaderboard">#</button>
        <div class="conn" id="conn" style="display:none"><span class="dot" id="dot"></span><span id="connText">Discord</span></div>
      </div>
    </header>
    <div id="boot" class="center">Starting...</div>
    <div id="hub" style="display:none"><div class="grid" id="grid"></div></div>
  </div>

  <div id="gameView">
    <button id="back">&#8592; Arcade</button>
    <div id="scoreHud"><div class="k">Score</div><div class="v" id="scoreHudValue">0</div></div>
    <iframe id="gameFrame" allow="autoplay; fullscreen; gamepad; microphone" title="game"></iframe>
  </div>
  <aside id="leaderPanel" aria-label="Leaderboard">
    <div class="panelHead">
      <div>
        <h2 id="leaderTitle">Leaderboard</h2>
        <p id="leaderSub">Pick a game to see Discord scores.</p>
      </div>
      <button class="iconBtn" id="leaderClose" title="Close" aria-label="Close leaderboard">x</button>
    </div>
    <div id="leaderRows"><div class="empty">No game selected yet.</div></div>
  </aside>

  <script src="./config.js"></script>
  <script type="module">
    const cfg = window.DISC_CONFIG || {};
    const CLIENT_ID = cfg.DISCORD_CLIENT_ID;
    const API_BASE = String(cfg.API_BASE || '');
    const $ = id => document.getElementById(id);
    let discordSdk = null;
    let discSession = null;
    let currentGame = null;
    let scoreTimer = null;
    let currentRunToken = '';
    let bestSeenScore = 0;
    let lastSubmitted = new Map();

    function apiPath(path) {
      return API_BASE ? new URL(path, API_BASE).toString() : path;
    }

    function setConn(text, mode) {
      $('conn').style.display = 'inline-flex';
      $('connText').textContent = text;
      $('dot').className = 'dot' + (mode ? ' ' + mode : '');
    }

    // --- game catalogue: synced from the live Telegram library by sync_disc.mjs ---
    let GAMES = [];
    async function loadGames() {
      try { const r = await fetch('./games.json', { cache:'no-store' }); GAMES = r.ok ? await r.json() : []; }
      catch { GAMES = []; }
    }

    function renderHub() {
      $('boot').style.display = 'none';
      $('hub').style.display = 'block';
      const grid = $('grid');
      grid.innerHTML = '';
      GAMES.forEach(g => {
        const b = document.createElement('button');
        b.className = 'tile';
        b.addEventListener('click', () => openGame(g.slug));
        const art = document.createElement('div'); art.className = 'art';
        if (g.thumb) { art.style.backgroundImage = 'url(' + g.thumb + ')'; }
        else { art.style.background = 'linear-gradient(150deg,#3a2b7a,#221a45)'; }
        const scrim = document.createElement('div'); scrim.className = 'scrim';
        const play = document.createElement('div'); play.className = 'play';
        const label = document.createElement('div'); label.className = 'label';
        const t = document.createElement('div'); t.className = 't'; t.textContent = g.title;
        const ge = document.createElement('div'); ge.className = 'g'; ge.textContent = g.genre;
        label.append(t, ge); b.append(art, scrim, play, label); grid.append(b);
      });
    }
    async function openGame(slug) {
      currentGame = GAMES.find(g => g.slug === slug) || { slug, title: slug };
      currentRunToken = '';
      bestSeenScore = 0;
      $('gameFrame').src = './games/' + slug + '/'; // trailing slash -> 200 (avoids CF 308 under Discord proxy)
      $('gameView').style.display = 'block';
      $('scoreHud').style.display = 'block';
      $('scoreHudValue').textContent = '0';
      loadLeaderboard(slug);
      await startScoreRun(slug);
      startScoreWatch();
    }
    async function closeGame() {
      await sampleAndSubmit('close');
      stopScoreWatch();
      $('gameView').style.display = 'none';
      $('scoreHud').style.display = 'none';
      $('gameFrame').src = 'about:blank'; // stop the running game
      currentRunToken = '';
    }
    $('back').addEventListener('click', closeGame);

    function scoreFromState(state) {
      if (!state || typeof state !== 'object') return null;
      const candidates = [state.score, state.bestValue, state.points, state.value, state.cash, state.coins];
      for (const value of candidates) {
        const n = Math.floor(Number(value));
        if (Number.isFinite(n) && n >= 0) return n;
      }
      return null;
    }

    function readGameState() {
      try {
        const win = $('gameFrame').contentWindow;
        if (win && typeof win.__gfState === 'function') return win.__gfState();
      } catch {}
      return null;
    }

    async function sampleAndSubmit(reason) {
      if (!currentGame) return;
      const score = scoreFromState(readGameState());
      if (score === null) return;
      bestSeenScore = Math.max(bestSeenScore, score);
      $('scoreHudValue').textContent = String(bestSeenScore);
      if (!discSession || !discSession.sessionToken || !currentRunToken || bestSeenScore <= 0) return;
      const previous = lastSubmitted.get(currentGame.slug) || 0;
      if (bestSeenScore <= previous) return;
      try {
        const r = await fetch(apiPath('/api/disc-score'), {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            game: currentGame.slug,
            score: bestSeenScore,
            sessionToken: discSession.sessionToken,
            runToken: currentRunToken,
            reason,
          }),
        });
        if (!r.ok) return;
        const data = await r.json();
        lastSubmitted.set(currentGame.slug, bestSeenScore);
        renderLeaderboard(data.entries || [], currentGame);
      } catch {}
    }

    function startScoreWatch() {
      stopScoreWatch();
      scoreTimer = setInterval(() => sampleAndSubmit('poll'), 3000);
      setTimeout(() => sampleAndSubmit('start'), 1200);
    }
    function stopScoreWatch() {
      if (scoreTimer) clearInterval(scoreTimer);
      scoreTimer = null;
    }

    async function startScoreRun(slug) {
      if (!discSession || !discSession.sessionToken) return;
      try {
        const r = await fetch(apiPath('/api/disc-run'), {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ game: slug, sessionToken: discSession.sessionToken }),
        });
        if (!r.ok) return;
        const data = await r.json();
        currentRunToken = data.runToken || '';
      } catch {}
    }

    window.addEventListener('message', (event) => {
      if (event.source !== $('gameFrame').contentWindow) return;
      const type = event.data && event.data.type;
      if (type === 'gf:gameEnded') setTimeout(() => sampleAndSubmit('gameEnded'), 100);
      if (type === 'gf:gameStarted') {
        bestSeenScore = 0;
        $('scoreHudValue').textContent = '0';
      }
    });

    function renderLeaderboard(entries, game) {
      $('leaderTitle').textContent = game ? game.title || game.slug : 'Leaderboard';
      $('leaderSub').textContent = discSession && discSession.user
        ? 'Discord scores for this Activity.'
        : 'Sign in through Discord to post your score.';
      const rows = $('leaderRows');
      rows.textContent = '';
      if (!entries || !entries.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = game ? 'No Discord scores yet.' : 'Pick a game to see Discord scores.';
        rows.append(empty);
        return;
      }
      entries.forEach(entry => {
        const row = document.createElement('div'); row.className = 'rankRow';
        const r = document.createElement('div'); r.className = 'r'; r.textContent = '#' + entry.rank;
        const n = document.createElement('div'); n.className = 'n'; n.textContent = entry.user && entry.user.displayName || 'Player';
        const s = document.createElement('div'); s.className = 's'; s.textContent = String(entry.score || 0);
        row.append(r, n, s); rows.append(row);
      });
    }

    async function loadLeaderboard(slug) {
      const game = GAMES.find(g => g.slug === slug) || currentGame;
      if (!slug) return renderLeaderboard([], null);
      try {
        const r = await fetch(apiPath('/api/disc-score?game=' + encodeURIComponent(slug) + '&limit=20'), { cache:'no-store' });
        if (!r.ok) throw new Error('leaderboard');
        const data = await r.json();
        renderLeaderboard(data.entries || [], game);
      } catch {
        renderLeaderboard([], game);
      }
    }

    $('leadersBtn').addEventListener('click', () => {
      $('leaderPanel').classList.add('open');
      if (currentGame) loadLeaderboard(currentGame.slug);
    });
    $('leaderClose').addEventListener('click', () => $('leaderPanel').classList.remove('open'));

    window.__disc = {
      get user() { return discSession && discSession.user || null; },
      getLeaderboard: (game, limit = 20) => fetch(apiPath('/api/disc-score?game=' + encodeURIComponent(game) + '&limit=' + encodeURIComponent(limit)), { cache:'no-store' }).then(r => r.json()),
    };

    // --- Discord handshake (if launched as an Activity) ---
    const inDiscord = new URLSearchParams(location.search).has('frame_id');
    function activityContext(sdk) {
      const qs = new URLSearchParams(location.search);
      return {
        instanceId: qs.get('instance_id') || sdk.instanceId || '',
        channelId: qs.get('channel_id') || sdk.channelId || '',
        guildId: qs.get('guild_id') || sdk.guildId || '',
        locationId: qs.get('location_id') || '',
        platform: qs.get('platform') || '',
      };
    }

    async function authenticateDiscord(sdk) {
      const { code } = await sdk.commands.authorize({
        client_id: CLIENT_ID,
        response_type: 'code',
        state: '',
        prompt: 'none',
        scope: ['identify'],
      });
      const tokenResponse = await fetch(apiPath('/api/disc-oauth'), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ code }),
      });
      const token = await tokenResponse.json().catch(() => ({}));
      if (!tokenResponse.ok || !token.access_token) throw new Error(token.error || 'token');
      const auth = await sdk.commands.authenticate({ access_token: token.access_token });
      if (!auth) throw new Error('authenticate');
      const sessionResponse = await fetch(apiPath('/api/disc-auth'), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ accessToken: token.access_token, context: activityContext(sdk) }),
      });
      const session = await sessionResponse.json().catch(() => ({}));
      if (!sessionResponse.ok || !session.sessionToken) throw new Error(session.error || 'session');
      discSession = session;
      setConn(session.user && session.user.displayName ? session.user.displayName : 'Signed in', 'ok');
    }

    await loadGames();
    if (!inDiscord) {
      setConn('Standalone', '');
      renderHub(); // standalone: hub is directly playable for testing
    } else {
      try {
        const { DiscordSDK } = await import('./vendor/embedded-app-sdk.mjs');
        discordSdk = new DiscordSDK(CLIENT_ID);
        setConn('Connecting...', '');
        await discordSdk.ready();
        setConn('Connected', 'ok');
        try {
          await authenticateDiscord(discordSdk);
        } catch (authError) {
          setConn(authError && /configured/.test(String(authError.message)) ? 'Auth not configured' : 'Guest mode', '');
        }
      } catch (e) {
        setConn('SDK error', 'err');
      }
      renderHub(); // show the synced library whether or not the handshake succeeded
    }
  </script>
</body>
</html>
