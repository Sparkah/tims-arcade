# Cloudflare Pages config for Tim's Game Lab.
# Tied to namespace VOTES created via `wrangler kv namespace create VOTES`.

name = "tims-arcade"
compatibility_date = "2025-01-01"
pages_build_output_dir = "."

# KV binding for vote counts.
# Pages Functions read this binding via `env.VOTES`.
[[kv_namespaces]]
binding = "VOTES"
id = "77b47ed18e7549dcb26673a3f834619e"

# PostHog analytics — the project token is a write-only client key, safe
# to expose per PostHog's own docs. Read by functions/posthog-init.js and
# inlined into the served JS snippet at request time.
[vars]
PUBLIC_POSTHOG_KEY = "phc_u4gRcGzmTJ6Yzu6AERFd3QX8Jh6mJDUEGxQHytAMm4bP"
PUBLIC_POSTHOG_HOST = "https://eu.i.posthog.com"
