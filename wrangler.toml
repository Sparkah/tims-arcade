# Cloudflare Pages config for Tim's Game Lab.
# Tied to namespace VOTES created via `wrangler kv namespace create VOTES`.

name = "tims-arcade"
compatibility_date = "2025-01-01"
pages_build_output_dir = "."

[vars]
# Deliberate research-safety interlock. Opening collection also requires
# DISSERTATION_ETHICS_CONFIRMATION_ID and DISSERTATION_CONSENT_VERSION.
DISSERTATION_STUDY_OPEN = "0"

# KV binding for vote counts.
# Pages Functions read this binding via `env.VOTES`.
[[kv_namespaces]]
binding = "VOTES"
id = "77b47ed18e7549dcb26673a3f834619e"

[[d1_databases]]
binding = "DISSERTATION_DB"
database_name = "dissertation-study"
database_id = "f1a12346-55d9-45ca-8e1f-81877130c898"
migrations_dir = "migrations"

# PostHog analytics — values are stored in Cloudflare Pages secrets (set
# via `wrangler pages secret bulk`), not in this file. Committed inline
# values were rejected by the git-triggered CF build pipeline.
# Read by functions/posthog-init.js via env.PUBLIC_POSTHOG_KEY / _HOST.
