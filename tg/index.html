<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="robots" content="noindex">
<title>Game Factory</title>
<!-- Telegram Mini App wrapper: picker + embedded game player.
     Opened by @gamesfactorybot via web_app buttons (?game=<slug>) or
     t.me direct links (start_param). Works in a plain browser too (all
     Telegram.WebApp calls are guarded) so it can be tested locally. -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg:        #f3f1e8;
    --bg-card:   #fbfaf4;
    --ink:       #1b2733;
    --muted:     #5d6b7a;
    --accent:    #0747a6;
    --accent-soft:#dbe5f4;
    --line:      #e2ddcd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
  }
  /* ---------- picker ---------- */
  #picker {
    height: 100vh;
    height: 100dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: calc(12px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
  }
  header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  header h1 { font-size: 20px; letter-spacing: -0.02em; }
  header .count { font-size: 12px; color: var(--muted); }
  .sub { font-size: 12.5px; color: var(--muted); margin-bottom: 14px; }
  #grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform .08s ease;
  }
  .card:active { transform: scale(.97); }
  .thumbwrap { position: relative; aspect-ratio: 800 / 470; background: var(--accent-soft); }
  .thumbwrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .badge {
    position: absolute; top: 6px; left: 6px;
    background: rgba(27,39,51,.82); color: #ffd34d;
    font-size: 10.5px; font-weight: 600;
    padding: 2px 7px; border-radius: 99px;
  }
  .card .meta { padding: 8px 10px 10px; }
  .card .title { font-size: 13.5px; font-weight: 650; line-height: 1.25; }
  .card .hook {
    font-size: 11px; color: var(--muted); line-height: 1.35; margin-top: 3px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  #loading, #error {
    padding: 48px 20px; text-align: center; color: var(--muted); font-size: 14px;
  }
  /* ---------- game mode ---------- */
  #player {
    display: none;
    position: fixed; inset: 0;
    background: #000;
  }
  #player.on { display: block; }
  #player iframe { width: 100%; height: 100%; border: 0; display: block; }
  #backpill {
    position: fixed;
    top: calc(8px + env(safe-area-inset-top)); left: 10px;
    z-index: 10;
    background: rgba(27,39,51,.72); color: #fff;
    border: 0; border-radius: 99px;
    font-size: 13px; padding: 7px 14px;
    display: none;
  }
  #player.on #backpill.show { display: block; }
</style>
</head>
<body>

<div id="picker">
  <header><h1>🎮 Game Factory</h1><span class="count" id="count"></span></header>
  <div class="sub" id="sub">New games built daily. Tap one to play.</div>
  <div id="loading">Loading games…</div>
  <div id="error" style="display:none">Couldn't load the game list.</div>
  <div id="grid"></div>
</div>

<div id="player">
  <button id="backpill">‹ Games</button>
</div>

<script>
(function () {
  'use strict';
  var tg = window.Telegram && window.Telegram.WebApp;
  var ORIGIN = location.origin;
  var RU = false;
  try { RU = ((tg && tg.initDataUnsafe.user && tg.initDataUnsafe.user.language_code) || navigator.language || '').slice(0, 2) === 'ru'; } catch (e) {}

  // --- Telegram chrome ---
  if (tg) {
    try {
      tg.ready();
      tg.expand();
      if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
      if (tg.setHeaderColor) tg.setHeaderColor('#f3f1e8');
      if (tg.setBackgroundColor) tg.setBackgroundColor('#f3f1e8');
    } catch (e) {}
  }

  var grid = document.getElementById('grid');
  var player = document.getElementById('player');
  var backpill = document.getElementById('backpill');
  var games = [];          // playable manifest entries
  var bySlug = {};
  var iframe = null;

  if (RU) {
    document.getElementById('sub').textContent = 'Новые игры каждый день. Нажмите, чтобы играть.';
    backpill.textContent = '‹ Игры';
  }

  function T(g, f) { return (RU && g[f + '_ru']) || g[f] || ''; }

  // --- data ---
  function load() {
    var manifest = fetch(ORIGIN + '/games.json').then(function (r) { return r.json(); });
    var trending = fetch(ORIGIN + '/api/trending').then(function (r) { return r.json(); }).catch(function () { return null; });
    Promise.all([manifest, trending]).then(function (res) {
      var all = res[0], tr = (res[1] && res[1].games) || {};
      games = all.filter(function (g) { return !g.external && g.published !== false && g.slug; });
      games.forEach(function (g) {
        bySlug[g.slug] = g;
        g._score = (tr[g.slug] && tr[g.slug].score) || 0;
      });
      games.sort(function (a, b) { return (b._score - a._score) || ((b.num || 0) - (a.num || 0)); });
      render();
      route();
    }).catch(function () {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    });
  }

  function render() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('count').textContent = games.length + (RU ? ' игр' : ' games');
    var hot = RU ? '🔥 Сегодня в топе' : '🔥 Hot today';
    var html = games.map(function (g, i) {
      return '<div class="card" data-slug="' + g.slug + '">' +
        '<div class="thumbwrap">' +
          (g._score > 0 && i < 6 ? '<span class="badge">' + hot + '</span>' : '') +
          '<img loading="lazy" src="/thumbs/' + g.slug + '.webp" onerror="this.onerror=null;this.src=\'/thumbs/' + g.slug + '.png\'" alt="">' +
        '</div>' +
        '<div class="meta"><div class="title"></div><div class="hook"></div></div>' +
      '</div>';
    }).join('');
    grid.innerHTML = html;
    // text via textContent (manifest strings stay data, not markup)
    var cards = grid.children;
    for (var i = 0; i < cards.length; i++) {
      var g = games[i];
      cards[i].querySelector('.title').textContent = T(g, 'title');
      cards[i].querySelector('.hook').textContent = T(g, 'hook');
    }
    grid.addEventListener('click', function (ev) {
      var card = ev.target.closest('.card');
      if (card) openGame(card.getAttribute('data-slug'), true);
    });
  }

  // --- game mode ---
  function openGame(slug, push) {
    var g = bySlug[slug];
    if (!g) return;
    if (push) history.pushState({ g: slug }, '', '?game=' + encodeURIComponent(slug));
    if (iframe) iframe.remove();
    iframe = document.createElement('iframe');
    iframe.allow = 'autoplay; fullscreen; gamepad';
    iframe.src = '/games/' + slug + '/index.html';
    player.appendChild(iframe);
    player.classList.add('on');
    // count the play (best-effort, same endpoint the gallery uses)
    try {
      fetch(ORIGIN + '/api/play', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ slug: slug }),
        keepalive: true
      }).catch(function () {});
    } catch (e) {}
    if (tg) {
      try {
        tg.BackButton.onClick(goBack);
        tg.BackButton.show();
        tg.enableClosingConfirmation();
      } catch (e) {}
    } else {
      backpill.classList.add('show');
    }
  }

  function closeGame() {
    if (iframe) { iframe.remove(); iframe = null; }
    player.classList.remove('on');
    backpill.classList.remove('show');
    if (tg) {
      try { tg.BackButton.hide(); tg.disableClosingConfirmation(); } catch (e) {}
    }
  }

  function goBack() { history.back(); }
  backpill.addEventListener('click', goBack);
  window.addEventListener('popstate', function (ev) {
    if (ev.state && ev.state.g) openGame(ev.state.g, false);
    else closeGame();
  });

  // --- entry routing: ?game=<slug> or Telegram start_param (g_<slug>) ---
  function route() {
    var slug = new URLSearchParams(location.search).get('game');
    if (!slug && tg) {
      var sp = tg.initDataUnsafe && tg.initDataUnsafe.start_param;
      if (sp) slug = sp.replace(/^g_/, '');
    }
    if (slug && bySlug[slug]) {
      history.replaceState({}, '', location.pathname);
      openGame(slug, true);
    }
  }

  load();
})();
</script>
</body>
</html>
