<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            padding: 20px;
        }
        
        .game-container {
            background-color: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: rgba(30, 30, 50, 0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
        }
        
        .pad-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 15px;
            margin-bottom: 30px;
        }
        
        .pad {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .pad:hover {
            transform: scale(1.05);
        }
        
        .pad:active {
            transform: scale(0.95);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        button {
            background: linear-gradient(to bottom, #4a90e2, #2a5cb0);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        #start-btn {
            background: linear-gradient(to bottom, #50c878, #3a9e5a);
        }
        
        #restart-btn {
            background: linear-gradient(to bottom, #ff6b6b, #d35454);
        }
        
        .message {
            color: white;
            font-size: 1.3rem;
            min-height: 40px;
            margin: 15px 0;
            padding: 10px;
            border-radius: 10px;
            background: rgba(30, 30, 50, 0.7);
        }
        
        .sequence-display {
            color: #ffd700;
            font-size: 1.2rem;
            margin-bottom: 20px;
            height: 30px;
        }
        
        .pad-1 { background: linear-gradient(135deg, #ff6b6b, #ee5a52); }
        .pad-2 { background: linear-gradient(135deg, #4ecdc4, #45b7b0); }
        .pad-3 { background: linear-gradient(135deg, #45b7b0, #3a9e5a); }
        .pad-4 { background: linear-gradient(135deg, #ffd700, #ffa500); }
        
        .highlight {
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
            transform: scale(1.05);
        }
        
        .error {
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .game-over.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .game-over-content {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        
        .game-over h2 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .game-over p {
            color: #ffd700;
            font-size: 1.8rem;
            margin: 15px 0;
        }
        
        .instructions {
            color: #aaa;
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        @media (max-width: 500px) {
            .game-container {
                padding: 20px 15px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .pad-grid {
                grid-gap: 10px;
            }
            
            button {
                padding: 10px 20px;
                font-size: 1rem;
            }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div class="game-container">
        <h1>PATTERN ECHO</h1>
        
        <div class="stats">
            <div class="score">Round: <span id="round">1</span></div>
            <div class="lives">Lives: <span id="lives">3</span></div>
        </div>
        
        <div class="sequence-display" id="sequence-display">Watch the sequence...</div>
        
        <div class="pad-grid">
            <div class="pad pad-1" data-id="1"></div>
            <div class="pad pad-2" data-id="2"></div>
            <div class="pad pad-3" data-id="3"></div>
            <div class="pad pad-4" data-id="4"></div>
        </div>
        
        <div class="message" id="message">Press START to begin</div>
        
        <div class="controls">
            <button id="start-btn">START</button>
            <button id="restart-btn">RESTART</button>
        </div>
        
        <div class="instructions">
            <p>Watch the sequence, then repeat it. Each round adds one more pad.</p>
            <p>Use mouse, touch, or keys 1-4 to play.</p>
        </div>
    </div>
    
    <div class="game-over" id="game-over">
        <div class="game-over-content">
            <h2>GAME OVER</h2>
            <p>Round Reached: <span id="final-round">1</span></p>
            <p>Score: <span id="final-score">0</span></p>
            <button id="play-again-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game elements
            const pads = document.querySelectorAll('.pad');
            const startBtn = document.getElementById('start-btn');
            const restartBtn = document.getElementById('restart-btn');
            const messageEl = document.getElementById('message');
            const sequenceDisplay = document.getElementById('sequence-display');
            const roundEl = document.getElementById('round');
            const livesEl = document.getElementById('lives');
            const gameOverScreen = document.getElementById('game-over');
            const finalRoundEl = document.getElementById('final-round');
            const finalScoreEl = document.getElementById('final-score');
            const playAgainBtn = document.getElementById('play-again-btn');
            
            // Game state
            let sequence = [];
            let playerSequence = [];
            let currentRound = 1;
            let lives = 3;
            let isPlayingSequence = false;
            let isWaitingForInput = false;
            let currentSequenceIndex = 0;
            let gameActive = false;
            
            // Initialize game
            function initGame() {
                sequence = [];
                playerSequence = [];
                currentRound = 1;
                lives = 3;
                isPlayingSequence = false;
                isWaitingForInput = false;
                currentSequenceIndex = 0;
                gameActive = false;
                
                updateStats();
                messageEl.textContent = 'Press START to begin';
                sequenceDisplay.textContent = 'Watch the sequence...';
                gameOverScreen.classList.remove('show');
                
                // Reset pad styles
                pads.forEach(pad => {
                    pad.classList.remove('highlight', 'error');
                });
            }
            
            // Update score and lives display
            function updateStats() {
                roundEl.textContent = currentRound;
                livesEl.textContent = lives;
            }
            
            // Add a new pad to the sequence
            function addToSequence() {
                const randomPad = Math.floor(Math.random() * 4) + 1;
                sequence.push(randomPad);
            }
            
            // Play the sequence
            function playSequence() {
                if (sequence.length === 0) return;
                
                isPlayingSequence = true;
                isWaitingForInput = false;
                sequenceDisplay.textContent = 'Watch the sequence...';
                messageEl.textContent = 'Memorize the pattern!';
                
                let index = 0;
                
                const playNext = () => {
                    if (index >= sequence.length) {
                        isPlayingSequence = false;
                        isWaitingForInput = true;
                        sequenceDisplay.textContent = 'Repeat the sequence!';
                        messageEl.textContent = 'Repeat the pattern!';
                        return;
                    }
                    
                    const padId = sequence[index];
                    const pad = document.querySelector(`.pad[data-id="${padId}"]`);
                    
                    // Highlight the pad
                    pad.classList.add('highlight');
                    setTimeout(() => {
                        pad.classList.remove('highlight');
                        index++;
                        setTimeout(playNext, 500);
                    }, 500);
                };
                
                playNext();
            }
            
            // Handle pad click
            function handlePadClick(padId) {
                if (!isWaitingForInput || isPlayingSequence) return;
                
                const expectedPad = sequence[currentSequenceIndex];
                
                if (padId === expectedPad) {
                    // Correct input
                    const pad = document.querySelector(`.pad[data-id="${padId}"]`);
                    pad.classList.add('highlight');
                    
                    setTimeout(() => {
                        pad.classList.remove('highlight');
                    }, 300);
                    
                    playerSequence.push(padId);
                    currentSequenceIndex++;
                    
                    if (currentSequenceIndex >= sequence.length) {
                        // Completed sequence
                        messageEl.textContent = 'Correct! Next round...';
                        setTimeout(() => {
                            nextRound();
                        }, 1000);
                    } else {
                        messageEl.textContent = `Correct! ${sequence.length - currentSequenceIndex} more to go`;
                    }
                } else {
                    // Wrong input
                    const pad = document.querySelector(`.pad[data-id="${padId}"]`);
                    pad.classList.add('error');
                    
                    setTimeout(() => {
                        pad.classList.remove('error');
                    }, 500);
                    
                    lives--;
                    updateStats();
                    messageEl.textContent = 'Wrong! Try again.';
                    
                    if (lives <= 0) {
                        // Game over
                        gameOver();
                    } else {
                        // Replay sequence
                        setTimeout(() => {
                            playerSequence = [];
                            currentSequenceIndex = 0;
                            playSequence();
                        }, 1000);
                    }
                }
            }
            
            // Start next round
            function nextRound() {
                currentRound++;
                playerSequence = [];
                currentSequenceIndex = 0;
                addToSequence();
                playSequence();
            }
            
            // Game over
            function gameOver() {
                gameActive = false;
                finalRoundEl.textContent = currentRound - 1;
                finalScoreEl.textContent = currentRound - 1;
                gameOverScreen.classList.add('show');
            }
            
            // Event listeners for pads
            pads.forEach(pad => {
                pad.addEventListener('click', () => {
                    handlePadClick(parseInt(pad.dataset.id));
                });
            });
            
            // Keyboard support
            document.addEventListener('keydown', (e) => {
                if (!gameActive) return;
                
                const key = parseInt(e.key);
                if (key >= 1 && key <= 4) {
                    handlePadClick(key);
                }
            });
            
            // Start button
            startBtn.addEventListener('click', () => {
                if (gameActive) return;
                
                gameActive = true;
                initGame();
                addToSequence();
                playSequence();
            });
            
            // Restart button
            restartBtn.addEventListener('click', () => {
                initGame();
                startBtn.click();
            });
            
            // Play again button
            playAgainBtn.addEventListener('click', () => {
                initGame();
                startBtn.click();
            });
            
            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
