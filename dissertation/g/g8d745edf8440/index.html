<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .score-board {
            display: flex;
            justify-content: space-between;
            width: 320px;
            height: 60px;
            background-color: #2c3e50;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 1.5rem;
            font-weight: 700;
            align-items: center;
        }
        
        .board {
            display: grid;
            grid-template-columns: 150px 150px;
            grid-template-rows: 150px 150px;
            gap: 10px;
            width: 320px;
            height: 320px;
            background-color: #2c3e50;
            border-radius: 8px;
            padding: 10px;
        }
        
        .pad {
            background-color: #4a90e2;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 100ms ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            user-select: none;
        }
        
        .pad:hover {
            transform: scale(1.05);
        }
        
        .pad:nth-child(1) { grid-column: 1; grid-row: 1; }
        .pad:nth-child(2) { grid-column: 2; grid-row: 1; }
        .pad:nth-child(3) { grid-column: 1; grid-row: 2; }
        .pad:nth-child(4) { grid-column: 2; grid-row: 2; }
        
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 200ms;
            width: 120px;
            height: 40px;
        }
        
        button:hover {
            background-color: #3a7bc8;
        }
        
        .message {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            min-height: 40px;
        }
        
        .flash {
            animation: flash 150ms ease;
        }
        
        @keyframes flash {
            0% { background-color: #4a90e2; }
            50% { background-color: #ffffff; }
            100% { background-color: #4a90e2; }
        }
        
        .error-flash {
            animation: error-flash 150ms ease;
        }
        
        @keyframes error-flash {
            0% { background-color: #4a90e2; }
            50% { background-color: #ff4757; }
            100% { background-color: #4a90e2; }
        }
        
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 26, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .game-over-content {
            background-color: #2c3e50;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 90%;
        }
        
        .game-over h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .game-over p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div class="game-container">
        <div class="score-board">
            <div>Round: <span id="round">1</span></div>
            <div>Lives: <span id="lives">3</span></div>
        </div>
        
        <div class="board" id="board">
            <div class="pad" data-pad="1">1</div>
            <div class="pad" data-pad="2">2</div>
            <div class="pad" data-pad="3">3</div>
            <div class="pad" data-pad="4">4</div>
        </div>
        
        <div class="message" id="message">Press Start to Play</div>
        
        <div class="controls">
            <button id="start-button">Start</button>
            <button id="restart-button" style="display: none;">Restart</button>
        </div>
    </div>
    
    <div class="game-over" id="game-over" style="display: none;">
        <div class="game-over-content">
            <h2>Game Over</h2>
            <p>You reached round <span id="final-round">1</span></p>
            <button id="final-restart">Play Again</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game state
            const state = {
                sequence: [],
                playerSequence: [],
                currentStep: 0,
                round: 1,
                lives: 3,
                isPlaying: false,
                isReplaying: false,
                gameActive: false,
                inputEnabled: false
            };
            
            // DOM elements
            const board = document.getElementById('board');
            const startButton = document.getElementById('start-button');
            const restartButton = document.getElementById('restart-button');
            const finalRestartButton = document.getElementById('final-restart');
            const messageElement = document.getElementById('message');
            const roundElement = document.getElementById('round');
            const livesElement = document.getElementById('lives');
            const gameOverScreen = document.getElementById('game-over');
            const finalRoundElement = document.getElementById('final-round');
            
            // Pad elements
            const pads = document.querySelectorAll('.pad');
            
            // Initialize game
            function initGame() {
                state.sequence = [];
                state.playerSequence = [];
                state.currentStep = 0;
                state.round = 1;
                state.lives = 3;
                state.isPlaying = false;
                state.isReplaying = false;
                state.gameActive = false;
                state.inputEnabled = false;
                
                updateUI();
                messageElement.textContent = 'Press Start to Play';
                startButton.style.display = 'block';
                restartButton.style.display = 'none';
                gameOverScreen.style.display = 'none';
                
                // Reset pad styles
                pads.forEach(pad => {
                    pad.classList.remove('flash', 'error-flash');
                });
            }
            
            // Update UI elements
            function updateUI() {
                roundElement.textContent = state.round;
                livesElement.textContent = state.lives;
            }
            
            // Add a new pad to the sequence
            function addToSequence() {
                const randomPad = Math.floor(Math.random() * 4) + 1;
                state.sequence.push(randomPad);
            }
            
            // Start a new round
            function startRound() {
                state.isPlaying = true;
                state.isReplaying = false;
                state.playerSequence = [];
                state.currentStep = 0;
                state.inputEnabled = false;
                
                messageElement.textContent = 'Watch the sequence...';
                
                // Add new pad to sequence
                if (state.round > 1) {
                    addToSequence();
                } else {
                    // First round
                    state.sequence = [Math.floor(Math.random() * 4) + 1];
                }
                
                // Start sequence playback immediately
                playSequence();
            }
            
            // Play the sequence
            function playSequence() {
                state.isPlaying = true;
                state.inputEnabled = false;
                messageElement.textContent = 'Watch the sequence...';
                
                let step = 0;
                const playNext = () => {
                    if (step >= state.sequence.length) {
                        state.isPlaying = false;
                        state.inputEnabled = true;
                        messageElement.textContent = 'Repeat the sequence!';
                        return;
                    }
                    
                    const pad = state.sequence[step];
                    const padElement = document.querySelector(`.pad[data-pad="${pad}"]`);
                    
                    padElement.classList.add('flash');
                    setTimeout(() => {
                        padElement.classList.remove('flash');
                        step++;
                        setTimeout(playNext, 300);
                    }, 300);
                };
                
                playNext();
            }
            
            // Handle player input
            function handlePadClick(padNumber) {
                // Only process input if game is active and input is enabled
                if (!state.gameActive || !state.inputEnabled) return;
                
                // Check if pad matches current sequence step
                if (padNumber === state.sequence[state.currentStep]) {
                    // Correct input
                    const padElement = document.querySelector(`.pad[data-pad="${padNumber}"]`);
                    padElement.classList.add('flash');
                    
                    setTimeout(() => {
                        padElement.classList.remove('flash');
                        state.currentStep++;
                        
                        if (state.currentStep >= state.sequence.length) {
                            // Sequence completed
                            state.round++;
                            messageElement.textContent = 'Correct! Next round...';
                            updateUI();
                            setTimeout(startRound, 500);
                        }
                    }, 150);
                } else {
                    // Wrong input
                    state.lives--;
                    updateUI();
                    
                    if (state.lives <= 0) {
                        // Game over
                        endGame();
                    } else {
                        // Replay sequence
                        state.isReplaying = true;
                        state.inputEnabled = false;
                        messageElement.textContent = 'Try again!';
                        
                        // Flash the wrong pad
                        const padElement = document.querySelector(`.pad[data-pad="${padNumber}"]`);
                        padElement.classList.add('error-flash');
                        
                        setTimeout(() => {
                            padElement.classList.remove('error-flash');
                            state.isReplaying = false;
                            state.inputEnabled = false;
                            setTimeout(playSequence, 500);
                        }, 150);
                    }
                }
            }
            
            // End the game
            function endGame() {
                state.gameActive = false;
                messageElement.textContent = 'Game Over!';
                finalRoundElement.textContent = state.round - 1;
                gameOverScreen.style.display = 'flex';
            }
            
            // Event listeners
            startButton.addEventListener('click', () => {
                startButton.style.display = 'none';
                state.gameActive = true;
                startRound();
            });
            
            restartButton.addEventListener('click', initGame);
            finalRestartButton.addEventListener('click', initGame);
            
            // Pad click handlers
            pads.forEach(pad => {
                pad.addEventListener('click', () => {
                    const padNumber = parseInt(pad.dataset.pad);
                    handlePadClick(padNumber);
                });
            });
            
            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                if (!state.gameActive) return;
                
                const keyMap = {
                    '1': 1,
                    '2': 2,
                    '3': 3,
                    '4': 4
                };
                
                if (keyMap[e.key]) {
                    handlePadClick(keyMap[e.key]);
                }
            });
            
            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
