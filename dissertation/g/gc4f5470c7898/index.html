<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            padding: 20px;
        }
        
        .game-container {
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }
        
        .stat-box {
            color: white;
            font-size: 1.2rem;
        }
        
        .stat-value {
            font-weight: bold;
            font-size: 1.4rem;
            color: #4CAF50;
        }
        
        .pad-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 15px;
            margin-bottom: 30px;
        }
        
        .pad {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .pad:hover {
            transform: scale(1.05);
        }
        
        .pad:active {
            transform: scale(0.95);
        }
        
        .pad-1 { background: linear-gradient(135deg, #FF5252, #B71C1C); }
        .pad-2 { background: linear-gradient(135deg, #4CAF50, #2E7D32); }
        .pad-3 { background: linear-gradient(135deg, #2196F3, #0D47A1); }
        .pad-4 { background: linear-gradient(135deg, #FFC107, #FF8F00); }
        
        .controls {
            margin-top: 20px;
        }
        
        button {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        .message {
            color: white;
            font-size: 1.5rem;
            margin: 20px 0;
            min-height: 2rem;
        }
        
        .highlight {
            animation: highlight 0.3s ease;
            transform: scale(1.1);
        }
        
        .error {
            animation: error 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
        }
        
        @keyframes highlight {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        @keyframes error {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        
        .game-over {
            display: none;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
            margin-top: 20px;
        }
        
        .game-over h2 {
            color: #FF5252;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        .final-score {
            color: #4CAF50;
            font-size: 1.8rem;
            margin: 20px 0;
        }
        
        .instructions {
            color: #aaa;
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        @media (max-width: 500px) {
            .game-container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .pad {
                font-size: 2rem;
            }
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div class="game-container">
        <h1>PATTERN ECHO</h1>
        
        <div class="stats">
            <div class="stat-box">
                <div>ROUND</div>
                <div class="stat-value" id="round">1</div>
            </div>
            <div class="stat-box">
                <div>LIVES</div>
                <div class="stat-value" id="lives">3</div>
            </div>
            <div class="stat-box">
                <div>SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
        </div>
        
        <div class="message" id="message">Press START to begin</div>
        
        <div class="pad-grid" id="pad-grid">
            <div class="pad pad-1" data-id="1"></div>
            <div class="pad pad-2" data-id="2"></div>
            <div class="pad pad-3" data-id="3"></div>
            <div class="pad pad-4" data-id="4"></div>
        </div>
        
        <div class="controls">
            <button id="start-btn">START</button>
        </div>
        
        <div class="game-over" id="game-over">
            <h2>GAME OVER</h2>
            <div class="final-score">You reached round <span id="final-round">1</span></div>
            <div class="final-score">Final Score: <span id="final-score">0</span></div>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>
        
        <div class="instructions">
            <p>Watch the sequence, then repeat it. Each round adds one more pad to the sequence.</p>
            <p>Use mouse, touch, or keys 1-4 to play.</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game elements
            const padGrid = document.getElementById('pad-grid');
            const startBtn = document.getElementById('start-btn');
            const restartBtn = document.getElementById('restart-btn');
            const messageEl = document.getElementById('message');
            const roundEl = document.getElementById('round');
            const livesEl = document.getElementById('lives');
            const scoreEl = document.getElementById('score');
            const gameOverScreen = document.getElementById('game-over');
            const finalRoundEl = document.getElementById('final-round');
            const finalScoreEl = document.getElementById('final-score');
            
            // Game state
            let sequence = [];
            let playerSequence = [];
            let currentStep = 0;
            let round = 1;
            let lives = 3;
            let score = 0;
            let gameActive = false;
            let isPlayingSequence = false;
            
            // Pad elements
            const pads = document.querySelectorAll('.pad');
            
            // Initialize game
            function initGame() {
                sequence = [];
                playerSequence = [];
                currentStep = 0;
                round = 1;
                lives = 3;
                score = 0;
                gameActive = false;
                isPlayingSequence = false;
                
                updateStats();
                messageEl.textContent = "Press START to begin";
                gameOverScreen.style.display = "none";
                startBtn.textContent = "START";
            }
            
            // Update stats display
            function updateStats() {
                roundEl.textContent = round;
                livesEl.textContent = lives;
                scoreEl.textContent = score;
            }
            
            // Add a new pad to the sequence
            function addToSequence() {
                const randomPad = Math.floor(Math.random() * 4) + 1;
                sequence.push(randomPad);
            }
            
            // Play the sequence
            function playSequence() {
                if (sequence.length === 0) return;
                
                isPlayingSequence = true;
                messageEl.textContent = "Watch the sequence...";
                let step = 0;
                
                const playStep = () => {
                    if (step >= sequence.length) {
                        isPlayingSequence = false;
                        messageEl.textContent = "Repeat the sequence!";
                        gameActive = true;
                        return;
                    }
                    
                    const padId = sequence[step];
                    const pad = document.querySelector(`.pad[data-id="${padId}"]`);
                    
                    // Highlight the pad
                    pad.classList.add('highlight');
                    setTimeout(() => {
                        pad.classList.remove('highlight');
                        step++;
                        setTimeout(playStep, 500);
                    }, 500);
                };
                
                setTimeout(playStep, 500);
            }
            
            // Handle pad click
            function handlePadClick(padId) {
                if (!gameActive || isPlayingSequence) return;
                
                const pad = document.querySelector(`.pad[data-id="${padId}"]`);
                
                // Check if correct
                if (padId === sequence[currentStep]) {
                    // Correct input
                    pad.classList.add('highlight');
                    setTimeout(() => {
                        pad.classList.remove('highlight');
                    }, 300);
                    
                    playerSequence.push(padId);
                    currentStep++;
                    
                    if (currentStep === sequence.length) {
                        // Sequence completed
                        score += round;
                        round++;
                        messageEl.textContent = "Correct! Next round...";
                        setTimeout(() => {
                            addToSequence();
                            playerSequence = [];
                            currentStep = 0;
                            updateStats();
                            playSequence();
                        }, 1000);
                    } else {
                        messageEl.textContent = `Correct! ${sequence.length - currentStep} more...`;
                    }
                } else {
                    // Wrong input
                    pad.classList.add('error');
                    setTimeout(() => {
                        pad.classList.remove('error');
                    }, 300);
                    
                    lives--;
                    updateStats();
                    
                    if (lives <= 0) {
                        // Game over
                        endGame();
                    } else {
                        messageEl.textContent = "Wrong! Try again...";
                        playerSequence = [];
                        currentStep = 0;
                        setTimeout(() => {
                            playSequence();
                        }, 1000);
                    }
                }
            }
            
            // End the game
            function endGame() {
                gameActive = false;
                isPlayingSequence = false;
                messageEl.textContent = "Game Over!";
                finalRoundEl.textContent = round - 1;
                finalScoreEl.textContent = score;
                gameOverScreen.style.display = "block";
                startBtn.textContent = "START";
            }
            
            // Start a new game
            function startGame() {
                if (gameActive) return;
                
                initGame();
                gameActive = true;
                startBtn.textContent = "RESTART";
                messageEl.textContent = "Get ready...";
                
                setTimeout(() => {
                    addToSequence();
                    playSequence();
                }, 1000);
            }
            
            // Event listeners
            startBtn.addEventListener('click', startGame);
            restartBtn.addEventListener('click', startGame);
            
            // Pad click events
            pads.forEach(pad => {
                pad.addEventListener('click', () => {
                    const padId = parseInt(pad.dataset.id);
                    handlePadClick(padId);
                });
            });
            
            // Keyboard support
            document.addEventListener('keydown', (e) => {
                if (e.key >= '1' && e.key <= '4') {
                    const padId = parseInt(e.key);
                    handlePadClick(padId);
                }
            });
            
            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
