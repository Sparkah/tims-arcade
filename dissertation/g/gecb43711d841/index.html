<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .status {
            display: flex;
            justify-content: space-between;
            width: 300px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(2, 140px);
            grid-template-rows: repeat(2, 140px);
            gap: 10px;
            background-color: #333333;
            padding: 20px;
            border-radius: 8px;
        }

        .pad {
            width: 140px;
            height: 140px;
            background-color: #333333;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            transition: all 0.1s ease;
            box-shadow: 0 0 0 2px #333333;
        }

        .pad:hover {
            box-shadow: 0 0 0 2px #4a90e2;
        }

        .pad.active {
            background-color: #4a90e2;
        }

        .pad.success {
            background-color: #7ed321;
        }

        .pad.error {
            background-color: #d0021b;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        .title {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .game-over-content {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            max-width: 80%;
        }

        .game-over h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }

        .pulse {
            animation: pulse 0.2s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div class="game-container">
        <h1 class="title">Pattern Echo</h1>
        <div class="status">
            <div>Round: <span id="round">1</span></div>
            <div>Lives: <span id="lives">3</span></div>
        </div>
        <div class="board" id="board">
            <div class="pad" data-index="0"></div>
            <div class="pad" data-index="1"></div>
            <div class="pad" data-index="2"></div>
            <div class="pad" data-index="3"></div>
        </div>
        <div class="buttons">
            <button id="start-btn">Start Game</button>
            <button id="restart-btn" class="hidden">Play Again</button>
        </div>
    </div>

    <div id="game-over" class="game-over hidden">
        <div class="game-over-content">
            <h2>Game Over</h2>
            <p>You reached round <span id="final-round">1</span></p>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn-game-over">Play Again</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game state
            const state = {
                sequence: [],
                playerSequence: [],
                currentStep: 0,
                round: 1,
                lives: 3,
                isPlaying: false,
                isReplaying: false,
                gameActive: false
            };

            // DOM elements
            const board = document.getElementById('board');
            const pads = document.querySelectorAll('.pad');
            const startBtn = document.getElementById('start-btn');
            const restartBtn = document.getElementById('restart-btn');
            const restartBtnGameOver = document.getElementById('restart-btn-game-over');
            const roundDisplay = document.getElementById('round');
            const livesDisplay = document.getElementById('lives');
            const gameOverScreen = document.getElementById('game-over');
            const finalRound = document.getElementById('final-round');
            const finalScore = document.getElementById('final-score');

            // Pad colors
            const DEFAULT_COLOR = '#333333';
            const HIGHLIGHT_COLOR = '#4a90e2';
            const SUCCESS_COLOR = '#7ed321';
            const ERROR_COLOR = '#d0021b';

            // Initialize game
            function initGame() {
                state.sequence = [];
                state.playerSequence = [];
                state.currentStep = 0;
                state.round = 1;
                state.lives = 3;
                state.isPlaying = false;
                state.isReplaying = false;
                state.gameActive = false;

                updateDisplays();
                hideGameOver();
                startBtn.classList.remove('hidden');
                restartBtn.classList.add('hidden');
                restartBtnGameOver.classList.add('hidden');
                
                // Reset pad colors
                pads.forEach(pad => {
                    pad.style.backgroundColor = DEFAULT_COLOR;
                });
            }

            // Update displays
            function updateDisplays() {
                roundDisplay.textContent = state.round;
                livesDisplay.textContent = state.lives;
            }

            // Show game over screen
            function showGameOver() {
                finalRound.textContent = state.round;
                finalScore.textContent = state.round;
                gameOverScreen.classList.remove('hidden');
            }

            // Hide game over screen
            function hideGameOver() {
                gameOverScreen.classList.add('hidden');
            }

            // Add a new pad to the sequence
            function addToSequence() {
                const randomIndex = Math.floor(Math.random() * 4);
                state.sequence.push(randomIndex);
            }

            // Play the sequence
            async function playSequence() {
                state.isPlaying = true;
                state.gameActive = false;
                state.currentStep = 0;

                for (let i = 0; i < state.sequence.length; i++) {
                    const padIndex = state.sequence[i];
                    const pad = pads[padIndex];
                    
                    // Highlight the pad
                    pad.style.backgroundColor = HIGHLIGHT_COLOR;
                    await sleep(500);
                    pad.style.backgroundColor = DEFAULT_COLOR;
                    await sleep(250);
                }

                state.isPlaying = false;
                state.gameActive = true;
            }

            // Flash pad for feedback
            function flashPad(padIndex, isSuccess) {
                const pad = pads[padIndex];
                if (isSuccess) {
                    pad.style.backgroundColor = SUCCESS_COLOR;
                } else {
                    pad.style.backgroundColor = ERROR_COLOR;
                }
                
                setTimeout(() => {
                    pad.style.backgroundColor = DEFAULT_COLOR;
                    pad.style.backgroundColor = HIGHLIGHT_COLOR;
                    
                    setTimeout(() => {
                        pad.style.backgroundColor = DEFAULT_COLOR;
                    }, 100);
                }, 150);
            }

            // Handle pad click
            function handlePadClick(index) {
                if (!state.gameActive || state.isPlaying || state.isReplaying) return;

                // Check if correct pad
                if (index === state.sequence[state.currentStep]) {
                    // Correct pad
                    state.currentStep++;
                    flashPad(index, true);
                    
                    if (state.currentStep >= state.sequence.length) {
                        // Sequence completed
                        state.round++;
                        updateDisplays();
                        state.gameActive = false;
                        
                        // Add new pad to sequence
                        setTimeout(() => {
                            addToSequence();
                            playSequence();
                        }, 500);
                    }
                } else {
                    // Wrong pad
                    state.lives--;
                    updateDisplays();
                    flashPad(index, false);
                    
                    if (state.lives <= 0) {
                        // Game over
                        showGameOver();
                        startBtn.classList.add('hidden');
                        restartBtn.classList.remove('hidden');
                        restartBtnGameOver.classList.remove('hidden');
                        return;
                    }
                    
                    // Replay sequence
                    state.isReplaying = true;
                    setTimeout(() => {
                        playSequence();
                        state.isReplaying = false;
                    }, 500);
                }
            }

            // Sleep function for delays
            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            // Start game
            function startGame() {
                initGame();
                startBtn.classList.add('hidden');
                restartBtn.classList.remove('hidden');
                addToSequence();
                playSequence();
            }

            // Event listeners
            startBtn.addEventListener('click', startGame);
            restartBtn.addEventListener('click', startGame);
            restartBtnGameOver.addEventListener('click', startGame);

            // Pad click handlers
            pads.forEach((pad, index) => {
                pad.addEventListener('click', () => handlePadClick(index));
            });

            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                if (e.key >= '1' && e.key <= '4') {
                    const index = parseInt(e.key) - 1;
                    handlePadClick(index);
                }
            });

            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
