<!DOCTYPE html>
<html>
<head>
    <title>Orbit Tap</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #gameCanvas {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            display: block;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
        }
        
        #missesDisplay {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ff6b6b;
            font-size: 18px;
            text-shadow: 0 0 5px rgba(255, 107, 107, 0.7);
        }
        
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 36px;
            text-align: center;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        #restartButton {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            background: #4ecdc4;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        #restartButton:hover {
            background: #3aa8a0;
            transform: translateX(-50%) scale(1.05);
        }
        
        .hit {
            animation: hitPulse 0.3s ease-out;
        }
        
        .miss {
            animation: missShake 0.5s ease-out;
        }
        
        @keyframes hitPulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        @keyframes missShake {
            0% { transform: translate(-50%, -50%) translateX(0); }
            25% { transform: translate(-50%, -50%) translateX(-10px); }
            50% { transform: translate(-50%, -50%) translateX(10px); }
            75% { transform: translate(-50%, -50%) translateX(-10px); }
            100% { transform: translate(-50%, -50%) translateX(0); }
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div id="scoreDisplay">Score: 0</div>
        <div id="missesDisplay">Misses: 0/3</div>
        <div id="message"></div>
        <button id="restartButton">Play Again</button>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const missesDisplay = document.getElementById('missesDisplay');
        const messageElement = document.getElementById('message');
        const restartButton = document.getElementById('restartButton');
        
        // Game state
        let score = 0;
        let misses = 0;
        let gameActive = true;
        let targetAngle = 0;
        let targetSize = 0.2; // Proportion of the circle
        let dotAngle = 0;
        let dotSpeed = 0.02;
        let animationId;
        
        // Initialize game
        function initGame() {
            score = 0;
            misses = 0;
            gameActive = true;
            targetAngle = Math.random() * Math.PI * 2;
            targetSize = 0.2;
            dotAngle = 0;
            updateDisplays();
            messageElement.style.opacity = '0';
            restartButton.style.opacity = '0';
            restartButton.style.pointerEvents = 'none';
            animate();
        }
        
        // Update displays
        function updateDisplays() {
            scoreDisplay.textContent = `Score: ${score}`;
            missesDisplay.textContent = `Misses: ${misses}/3`;
        }
        
        // Draw the game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw ring
            ctx.beginPath();
            ctx.arc(250, 250, 200, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Draw target arc
            ctx.beginPath();
            ctx.arc(250, 250, 200, targetAngle - targetSize/2, targetAngle + targetSize/2);
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 15;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Draw dot
            const dotX = 250 + Math.cos(dotAngle) * 200;
            const dotY = 250 + Math.sin(dotAngle) * 200;
            ctx.beginPath();
            ctx.arc(dotX, dotY, 15, 0, Math.PI * 2);
            ctx.fillStyle = '#ff6b6b';
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw center dot
            ctx.beginPath();
            ctx.arc(250, 250, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#ff6b6b';
            ctx.fill();
        }
        
        // Check if dot is in target
        function checkHit() {
            // Normalize angles to 0-2π
            let normalizedDotAngle = dotAngle % (Math.PI * 2);
            let normalizedTargetAngle = targetAngle % (Math.PI * 2);
            
            if (normalizedDotAngle < 0) normalizedDotAngle += Math.PI * 2;
            if (normalizedTargetAngle < 0) normalizedTargetAngle += Math.PI * 2;
            
            // Calculate the angle difference
            let angleDiff = Math.abs(normalizedDotAngle - normalizedTargetAngle);
            if (angleDiff > Math.PI) {
                angleDiff = Math.PI * 2 - angleDiff;
            }
            
            // Check if dot is within target
            const targetHalfSize = targetSize / 2;
            const dotInTarget = angleDiff <= targetHalfSize;
            
            return dotInTarget;
        }
        
        // Handle tap
        function handleTap() {
            if (!gameActive) return;
            
            const hit = checkHit();
            
            if (hit) {
                // Hit
                score++;
                targetSize *= 0.85; // Shrink target
                messageElement.textContent = 'HIT!';
                messageElement.className = 'hit';
                messageElement.style.opacity = '1';
                
                // Visual feedback
                setTimeout(() => {
                    messageElement.style.opacity = '0';
                }, 300);
                
                // Make target move to a new position
                targetAngle = Math.random() * Math.PI * 2;
            } else {
                // Miss
                misses++;
                messageElement.textContent = 'MISS!';
                messageElement.className = 'miss';
                messageElement.style.opacity = '1';
                
                // Visual feedback
                setTimeout(() => {
                    messageElement.style.opacity = '0';
                }, 500);
                
                if (misses >= 3) {
                    endGame();
                }
            }
            
            updateDisplays();
        }
        
        // End game
        function endGame() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            
            messageElement.textContent = `Game Over!\nFinal Score: ${score}`;
            messageElement.style.opacity = '1';
            messageElement.style.fontSize = '28px';
            
            restartButton.style.opacity = '1';
            restartButton.style.pointerEvents = 'auto';
        }
        
        // Animation loop
        function animate() {
            if (!gameActive) return;
            
            dotAngle += dotSpeed;
            draw();
            animationId = requestAnimationFrame(animate);
        }
        
        // Event listeners
        canvas.addEventListener('click', handleTap);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleTap();
            }
        });
        restartButton.addEventListener('click', initGame);
        
        // Initialize the game
        initGame();
    </script>
</body>
</html>
