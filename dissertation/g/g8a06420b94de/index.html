<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            overflow: hidden;
            position: relative;
        }
        
        .game-container {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #gameCanvas {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .score-display {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            z-index: 10;
        }
        
        .misses-display {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ff6b6b;
            font-size: 18px;
            font-weight: bold;
            z-index: 10;
        }
        
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 30px 50px;
            border-radius: 15px;
            text-align: center;
            z-index: 20;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            display: none;
        }
        
        .message h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #4ecdc4;
        }
        
        .message p {
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        .btn {
            background: linear-gradient(to right, #4ecdc4, #1a936f);
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .hit-feedback {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(78, 205, 196, 0.5);
            pointer-events: none;
            z-index: 5;
            animation: hitAnimation 0.5s forwards;
        }
        
        @keyframes hitAnimation {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        .miss-feedback {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 107, 107, 0.5);
            pointer-events: none;
            z-index: 5;
            animation: missAnimation 0.5s forwards;
        }
        
        @keyframes missAnimation {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        .instructions {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            font-size: 14px;
            width: 100%;
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div class="game-container">
        <div class="score-display">Score: <span id="score">0</span></div>
        <div class="misses-display">Misses: <span id="misses">0</span>/3</div>
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div class="message" id="gameOverScreen">
            <h2>Game Over</h2>
            <p>Your score: <span id="finalScore">0</span></p>
            <button class="btn" id="restartButton">Play Again</button>
        </div>
        <div class="instructions">Click or press SPACE to tap</div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const missesElement = document.getElementById('misses');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreElement = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');
        
        // Game state
        let score = 0;
        let misses = 0;
        let gameRunning = true;
        let targetAngle = 0;
        let targetWidth = 0.3; // radians
        let dotAngle = 0;
        let dotSpeed = 0.02; // radians per frame
        let lastTime = 0;
        let animationId;
        
        // Initialize game
        function initGame() {
            score = 0;
            misses = 0;
            gameRunning = true;
            targetAngle = Math.random() * Math.PI * 2;
            targetWidth = 0.3;
            dotAngle = 0;
            lastTime = 0;
            
            scoreElement.textContent = score;
            missesElement.textContent = misses;
            gameOverScreen.style.display = 'none';
            
            // Start game loop
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Draw the game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw ring
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 200, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // Draw target arc
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 200, 
                    targetAngle - targetWidth/2, targetAngle + targetWidth/2);
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Draw dot
            const dotX = canvas.width/2 + Math.cos(dotAngle) * 200;
            const dotY = canvas.height/2 + Math.sin(dotAngle) * 200;
            ctx.beginPath();
            ctx.arc(dotX, dotY, 15, 0, Math.PI * 2);
            ctx.fillStyle = '#ff6b6b';
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw center point
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#4ecdc4';
            ctx.fill();
        }
        
        // Check if dot is in target
        function checkHit() {
            // Normalize angles to 0-2π range
            let normalizedDotAngle = dotAngle % (Math.PI * 2);
            let normalizedTargetAngle = targetAngle % (Math.PI * 2);
            
            if (normalizedDotAngle < 0) normalizedDotAngle += Math.PI * 2;
            if (normalizedTargetAngle < 0) normalizedTargetAngle += Math.PI * 2;
            
            // Calculate the difference
            let diff = Math.abs(normalizedDotAngle - normalizedTargetAngle);
            if (diff > Math.PI) diff = Math.PI * 2 - diff;
            
            // Check if within target width
            return diff <= targetWidth/2;
        }
        
        // Handle tap
        function handleTap() {
            if (!gameRunning) return;
            
            const hit = checkHit();
            
            if (hit) {
                // Hit
                score++;
                scoreElement.textContent = score;
                
                // Create hit feedback
                createFeedback(dotAngle, true);
                
                // Shrink target
                targetWidth = Math.max(0.05, targetWidth * 0.85);
                
                // Move target to new position
                targetAngle = Math.random() * Math.PI * 2;
                
            } else {
                // Miss
                misses++;
                missesElement.textContent = misses;
                
                // Create miss feedback
                createFeedback(dotAngle, false);
                
                if (misses >= 3) {
                    // Game over
                    gameRunning = false;
                    finalScoreElement.textContent = score;
                    gameOverScreen.style.display = 'block';
                }
            }
        }
        
        // Create visual feedback
        function createFeedback(angle, isHit) {
            const feedback = document.createElement('div');
            feedback.className = isHit ? 'hit-feedback' : 'miss-feedback';
            
            const x = canvas.width/2 + Math.cos(angle) * 200;
            const y = canvas.height/2 + Math.sin(angle) * 200;
            
            feedback.style.left = (x - 50) + 'px';
            feedback.style.top = (y - 50) + 'px';
            
            document.querySelector('.game-container').appendChild(feedback);
            
            // Remove after animation
            setTimeout(() => {
                feedback.remove();
            }, 500);
        }
        
        // Game loop
        function gameLoop(timestamp) {
            if (!gameRunning) return;
            
            // Calculate delta time for smooth animation
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            // Update dot position
            dotAngle += dotSpeed;
            
            // Draw everything
            draw();
            
            // Continue game loop
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Event listeners
        canvas.addEventListener('click', handleTap);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleTap();
            }
        });
        
        restartButton.addEventListener('click', initGame);
        
        // Start the game
        initGame();
    </script>
</body>
</html>
