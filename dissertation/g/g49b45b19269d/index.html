<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1E3A8A;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: white;
            font-family: Arial, sans-serif;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .score-container {
            display: flex;
            justify-content: space-between;
            width: 400px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: 190px 190px;
            grid-template-rows: 190px 190px;
            gap: 10px;
            width: 400px;
            height: 400px;
        }

        .pad {
            background-color: #FBBF24;
            border: 2px solid #1E3A8A;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 0 10px #F8FAFC;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .pad:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .pad:nth-child(2) {
            background-color: #3B82F6;
        }

        .pad:nth-child(3) {
            background-color: #10B981;
        }

        .pad:nth-child(4) {
            background-color: #EF4444;
        }

        .pad.active {
            box-shadow: 0 0 0 10px #F8FAFC;
        }

        .pad.flash {
            animation: flash 150ms ease;
        }

        .pad.error {
            animation: error 200ms ease;
        }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        @keyframes error {
            0% { background-color: #EF4444; }
            50% { background-color: #FEE2E2; }
            100% { background-color: #EF4444; }
        }

        .button {
            background-color: #FBBF24;
            color: #1E3A8A;
            border: none;
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            margin-top: 10px;
        }

        .button:hover {
            background-color: #FCD34D;
            transform: scale(1.05);
        }

        .button:active {
            transform: scale(0.95);
        }

        .title {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .game-over {
            display: none;
            text-align: center;
            background-color: rgba(30, 58, 138, 0.9);
            padding: 30px;
            border-radius: 10px;
            width: 400px;
        }

        .game-over h2 {
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .final-score {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .hidden {
            display: none;
        }

        .sequence-playback {
            pointer-events: none;
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div class="game-container">
        <h1 class="title">Pattern Echo</h1>
        
        <div class="score-container">
            <div class="round">Round: <span id="round">1</span></div>
            <div class="lives">Lives: <span id="lives">3</span></div>
            <div class="score">Score: <span id="score">0</span></div>
        </div>
        
        <div class="grid" id="grid">
            <div class="pad" data-index="0"></div>
            <div class="pad" data-index="1"></div>
            <div class="pad" data-index="2"></div>
            <div class="pad" data-index="3"></div>
        </div>
        
        <button class="button" id="start-button">Start Game</button>
        
        <div class="game-over" id="game-over">
            <h2>Game Over</h2>
            <div class="final-score">Final Round: <span id="final-round">1</span></div>
            <div class="final-score">Score: <span id="final-score">0</span></div>
            <button class="button" id="restart-button">Play Again</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game state
            const gameState = {
                sequence: [],
                playerSequence: [],
                currentStep: 0,
                round: 1,
                lives: 3,
                score: 0,
                isPlaying: false,
                isSequencePlaying: false,
                isGameOver: false,
                padElements: document.querySelectorAll('.pad'),
                grid: document.getElementById('grid'),
                startButton: document.getElementById('start-button'),
                restartButton: document.getElementById('restart-button'),
                roundDisplay: document.getElementById('round'),
                livesDisplay: document.getElementById('lives'),
                scoreDisplay: document.getElementById('score'),
                gameOverScreen: document.getElementById('game-over'),
                finalRound: document.getElementById('final-round'),
                finalScore: document.getElementById('final-score')
            };

            // Initialize game
            function initGame() {
                gameState.sequence = [];
                gameState.playerSequence = [];
                gameState.currentStep = 0;
                gameState.round = 1;
                gameState.lives = 3;
                gameState.score = 0;
                gameState.isPlaying = false;
                gameState.isSequencePlaying = false;
                gameState.isGameOver = false;
                
                updateDisplays();
                gameState.gameOverScreen.style.display = 'none';
                gameState.startButton.style.display = 'block';
                gameState.grid.classList.remove('sequence-playback');
            }

            // Update score and lives displays
            function updateDisplays() {
                gameState.roundDisplay.textContent = gameState.round;
                gameState.livesDisplay.textContent = gameState.lives;
                gameState.scoreDisplay.textContent = gameState.score;
            }

            // Generate a random pad index (0-3)
            function getRandomPad() {
                return Math.floor(Math.random() * 4);
            }

            // Add a new pad to the sequence
            function addToSequence() {
                gameState.sequence.push(getRandomPad());
            }

            // Play the sequence
            function playSequence() {
                if (gameState.isGameOver) return;
                
                gameState.isSequencePlaying = true;
                gameState.grid.classList.add('sequence-playback');
                
                let step = 0;
                const totalSteps = gameState.sequence.length;
                
                const playStep = () => {
                    if (step >= totalSteps || gameState.isGameOver) {
                        gameState.isSequencePlaying = false;
                        gameState.grid.classList.remove('sequence-playback');
                        gameState.isPlaying = true;
                        return;
                    }
                    
                    const padIndex = gameState.sequence[step];
                    const pad = gameState.padElements[padIndex];
                    
                    // Flash the pad
                    pad.classList.add('flash');
                    setTimeout(() => {
                        pad.classList.remove('flash');
                    }, 150);
                    
                    step++;
                    setTimeout(playStep, 600); // Delay between steps
                };
                
                playStep();
            }

            // Handle pad click
            function handlePadClick(index) {
                if (!gameState.isPlaying || gameState.isSequencePlaying || gameState.isGameOver) {
                    return;
                }
                
                const pad = gameState.padElements[index];
                
                // Flash the clicked pad
                pad.classList.add('flash');
                setTimeout(() => {
                    pad.classList.remove('flash');
                }, 150);
                
                // Check if correct
                if (index === gameState.sequence[gameState.currentStep]) {
                    gameState.currentStep++;
                    
                    // If sequence complete
                    if (gameState.currentStep >= gameState.sequence.length) {
                        // Update score
                        gameState.score++;
                        
                        // Reset player sequence and current step
                        gameState.playerSequence = [];
                        gameState.currentStep = 0;
                        
                        // Add new pad to sequence
                        addToSequence();
                        
                        // Update displays
                        updateDisplays();
                        
                        // Play the new sequence
                        setTimeout(() => {
                            playSequence();
                        }, 500);
                    }
                } else {
                    // Wrong pad clicked
                    pad.classList.add('error');
                    setTimeout(() => {
                        pad.classList.remove('error');
                    }, 200);
                    
                    // Lose a life
                    gameState.lives--;
                    updateDisplays();
                    
                    if (gameState.lives <= 0) {
                        // Game over
                        gameState.isGameOver = true;
                        gameState.gameOverScreen.style.display = 'block';
                        gameState.finalRound.textContent = gameState.round;
                        gameState.finalScore.textContent = gameState.score;
                        gameState.startButton.style.display = 'none';
                    } else {
                        // Replay current sequence
                        gameState.currentStep = 0;
                        setTimeout(() => {
                            playSequence();
                        }, 500);
                    }
                }
            }

            // Start the game
            function startGame() {
                if (gameState.isPlaying) return;
                
                initGame();
                gameState.isPlaying = true;
                gameState.startButton.style.display = 'none';
                
                // Add first pad to sequence
                addToSequence();
                
                // Play the sequence
                setTimeout(() => {
                    playSequence();
                }, 500);
            }

            // Event listeners
            gameState.startButton.addEventListener('click', startGame);
            gameState.restartButton.addEventListener('click', startGame);
            
            // Pad click handlers
            gameState.padElements.forEach((pad, index) => {
                pad.addEventListener('click', () => handlePadClick(index));
            });
            
            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                if (e.key >= '1' && e.key <= '4') {
                    const index = parseInt(e.key) - 1;
                    handlePadClick(index);
                }
            });

            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
