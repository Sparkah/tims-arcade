<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            overflow: hidden;
        }
        
        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB, #1E90FF);
            display: block;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        #gameOverScreen.visible {
            opacity: 1;
            pointer-events: all;
        }
        
        #finalScore {
            font-size: 60px;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }
        
        #restartButton {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }
        
        #restartButton:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }
        
        #restartButton:active {
            transform: scale(0.98);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 18px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="uiOverlay">
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 45s</div>
            <div id="gameOverScreen">
                <div id="finalScore">Score: 0</div>
                <button id="restartButton">Play Again</button>
            </div>
            <div id="instructions">Use ← → or A/D keys, or mouse/touch to move the basket</div>
        </div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');
        
        // Game state
        let score = 0;
        let timeLeft = 45;
        let gameActive = false;
        let gameTimer = null;
        let gem = null;
        let basket = {
            x: canvas.width / 2 - 50,
            y: canvas.height - 60,
            width: 100,
            height: 40,
            speed: 8
        };
        
        // Input handling
        let keys = {};
        let mouseX = 0;
        let isDragging = false;
        
        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 45;
            gameActive = true;
            gameOverScreen.classList.remove('visible');
            
            // Reset basket position
            basket.x = canvas.width / 2 - basket.width / 2;
            
            // Create first gem
            createGem();
            
            // Update displays
            updateDisplays();
            
            // Start game timer
            if (gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(updateTimer, 1000);
            
            // Start game loop
            requestAnimationFrame(gameLoop);
        }
        
        // Create a new falling gem
        function createGem() {
            gem = {
                x: Math.random() * (canvas.width - 60) + 30,
                y: -30,
                width: 40,
                height: 40,
                speed: 3
            };
        }
        
        // Update game timer
        function updateTimer() {
            if (!gameActive) return;
            
            timeLeft--;
            updateDisplays();
            
            if (timeLeft <= 0) {
                endGame();
            }
        }
        
        // Update displays
        function updateDisplays() {
            scoreDisplay.textContent = `Score: ${score}`;
            timerDisplay.textContent = `Time: ${timeLeft}s`;
        }
        
        // End the game
        function endGame() {
            gameActive = false;
            clearInterval(gameTimer);
            
            // Show game over screen
            finalScoreDisplay.textContent = `Score: ${score}`;
            gameOverScreen.classList.add('visible');
        }
        
        // Game loop
        function gameLoop() {
            if (!gameActive) return;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background elements
            drawBackground();
            
            // Update and draw basket
            drawBasket();
            
            // Update and draw gem
            if (gem) {
                updateGem();
                drawGem();
            }
            
            // Continue game loop
            requestAnimationFrame(gameLoop);
        }
        
        // Draw background elements
        function drawBackground() {
            // Draw some clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(100, 80, 30, 0, Math.PI * 2);
            ctx.arc(130, 70, 35, 0, Math.PI * 2);
            ctx.arc(160, 80, 30, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(600, 100, 25, 0, Math.PI * 2);
            ctx.arc(625, 90, 30, 0, Math.PI * 2);
            ctx.arc(650, 100, 25, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Draw basket
        function drawBasket() {
            // Basket body
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
            
            // Basket handle
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(basket.x - 10, basket.y + 10, 10, 20);
            ctx.fillRect(basket.x + basket.width, basket.y + 10, 10, 20);
            
            // Basket rim
            ctx.fillStyle = '#D2691E';
            ctx.fillRect(basket.x, basket.y - 5, basket.width, 5);
        }
        
        // Update gem position
        function updateGem() {
            if (!gem) return;
            
            // Move gem down
            gem.y += gem.speed;
            
            // Check if gem is caught
            if (gem.y + gem.height > basket.y && 
                gem.x + gem.width > basket.x && 
                gem.x < basket.x + basket.width) {
                
                // Gem caught
                score++;
                updateDisplays();
                
                // Create new gem
                createGem();
            }
            // Check if gem is missed
            else if (gem.y > canvas.height) {
                // Gem missed - just create a new one
                createGem();
            }
        }
        
        // Draw gem
        function drawGem() {
            if (!gem) return;
            
            // Gem body
            ctx.fillStyle = '#00FFFF';
            ctx.beginPath();
            ctx.arc(gem.x + gem.width/2, gem.y + gem.height/2, gem.width/2, 0, Math.PI * 2);
            ctx.fill();
            
            // Gem highlight
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(gem.x + gem.width/3, gem.y + gem.height/3, gem.width/6, 0, Math.PI * 2);
            ctx.fill();
            
            // Gem shine
            ctx.fillStyle = '#87CEEB';
            ctx.beginPath();
            ctx.arc(gem.x + gem.width/2, gem.y + gem.height/4, gem.width/8, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Handle keyboard input
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // Handle mouse input
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                
                // Keep basket within canvas
                if (basket.x < 0) basket.x = 0;
                if (basket.x + basket.width > canvas.width) basket.x = canvas.width - basket.width;
            }
        });
        
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            basket.x = mouseX - basket.width / 2;
        });
        
        window.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        // Handle touch input
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.touches[0].clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                
                // Keep basket within canvas
                if (basket.x < 0) basket.x = 0;
                if (basket.x + basket.width > canvas.width) basket.x = canvas.width - basket.width;
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
            basket.x = mouseX - basket.width / 2;
        });
        
        window.addEventListener('touchend', () => {
            isDragging = false;
        });
        
        // Handle basket movement
        function moveBasket() {
            if (!gameActive) return;
            
            // Keyboard controls
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                basket.x -= basket.speed;
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                basket.x += basket.speed;
            }
            
            // Keep basket within canvas
            if (basket.x < 0) basket.x = 0;
            if (basket.x + basket.width > canvas.width) basket.x = canvas.width - basket.width;
        }
        
        // Game loop for input handling
        function inputLoop() {
            moveBasket();
            requestAnimationFrame(inputLoop);
        }
        
        // Restart button
        restartButton.addEventListener('click', initGame);
        
        // Initialize the game
        initGame();
        inputLoop();
    </script>
</body>
</html>
