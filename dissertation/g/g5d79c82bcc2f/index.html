<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            overflow: hidden;
            position: relative;
        }
        
        .game-container {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #gameCanvas {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .score-display {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            letter-spacing: 2px;
        }
        
        .misses-display {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ff6b6b;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }
        
        .instructions {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            font-size: 16px;
            max-width: 80%;
            line-height: 1.5;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
        }
        
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .game-over.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .game-over h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-shadow: 0 0 15px rgba(255, 107, 107, 0.7);
        }
        
        .final-score {
            font-size: 32px;
            margin-bottom: 30px;
            color: #4ecdc4;
        }
        
        .restart-btn {
            background: linear-gradient(to right, #4ecdc4, #1a936f);
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .restart-btn:active {
            transform: translateY(1px);
        }
        
        .hit-feedback {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(78, 205, 196, 0.7);
            pointer-events: none;
            opacity: 0;
            z-index: 5;
        }
        
        .miss-feedback {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 107, 107, 0.7);
            pointer-events: none;
            opacity: 0;
            z-index: 5;
        }
        
        .pulse {
            animation: pulse 0.5s ease-out;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        .target-indicator {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #ff6b6b;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff6b6b;
            z-index: 2;
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div class="game-container">
        <div class="score-display">SCORE: <span id="score">0</span></div>
        <div class="misses-display">MISSES: <span id="misses">0</span>/3</div>
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div class="instructions">Tap or press SPACEBAR to hit the target!</div>
        <div class="game-over" id="gameOver">
            <h1>GAME OVER</h1>
            <div class="final-score">Final Score: <span id="finalScore">0</span></div>
            <button class="restart-btn" id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreElement = document.getElementById('score');
            const missesElement = document.getElementById('misses');
            const gameOverScreen = document.getElementById('gameOver');
            const finalScoreElement = document.getElementById('finalScore');
            const restartBtn = document.getElementById('restartBtn');
            
            // Game state
            let score = 0;
            let misses = 0;
            let gameActive = true;
            let targetAngle = 0;
            let targetWidth = 0.3; // radians
            let dotAngle = 0;
            let dotSpeed = 0.02; // radians per frame
            let lastTime = 0;
            let animationId = null;
            
            // Canvas setup
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const ringRadius = 200;
            const dotRadius = 10;
            const targetIndicator = document.createElement('div');
            targetIndicator.className = 'target-indicator';
            document.querySelector('.game-container').appendChild(targetIndicator);
            
            // Initialize game
            function initGame() {
                score = 0;
                misses = 0;
                gameActive = true;
                targetAngle = Math.random() * Math.PI * 2;
                targetWidth = 0.3;
                dotAngle = 0;
                updateUI();
                gameOverScreen.classList.remove('show');
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
                gameLoop();
            }
            
            // Update UI elements
            function updateUI() {
                scoreElement.textContent = score;
                missesElement.textContent = misses;
            }
            
            // Draw the game
            function draw() {
                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw ring
                ctx.beginPath();
                ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Draw target arc
                ctx.beginPath();
                ctx.arc(centerX, centerY, ringRadius, 
                        targetAngle - targetWidth/2, 
                        targetAngle + targetWidth/2);
                ctx.strokeStyle = '#4ecdc4';
                ctx.lineWidth = 8;
                ctx.stroke();
                
                // Draw target indicator
                const indicatorX = centerX + Math.cos(targetAngle) * ringRadius;
                const indicatorY = centerY + Math.sin(targetAngle) * ringRadius;
                targetIndicator.style.left = (indicatorX - 7.5) + 'px';
                targetIndicator.style.top = (indicatorY - 7.5) + 'px';
                
                // Draw dot
                const dotX = centerX + Math.cos(dotAngle) * ringRadius;
                const dotY = centerY + Math.sin(dotAngle) * ringRadius;
                
                ctx.beginPath();
                ctx.arc(dotX, dotY, dotRadius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff6b6b';
                ctx.fill();
                
                // Draw dot glow
                ctx.beginPath();
                ctx.arc(dotX, dotY, dotRadius + 5, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    dotX, dotY, dotRadius,
                    dotX, dotY, dotRadius + 5
                );
                gradient.addColorStop(0, 'rgba(255, 107, 107, 0.8)');
                gradient.addColorStop(1, 'rgba(255, 107, 107, 0)');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            // Check if dot is in target
            function checkHit() {
                // Normalize angles to [0, 2π)
                let normalizedDotAngle = dotAngle % (Math.PI * 2);
                let normalizedTargetAngle = targetAngle % (Math.PI * 2);
                
                if (normalizedDotAngle < 0) normalizedDotAngle += Math.PI * 2;
                if (normalizedTargetAngle < 0) normalizedTargetAngle += Math.PI * 2;
                
                // Calculate distance between angles
                let angleDiff = Math.abs(normalizedDotAngle - normalizedTargetAngle);
                if (angleDiff > Math.PI) {
                    angleDiff = Math.PI * 2 - angleDiff;
                }
                
                // Check if dot is in target
                if (angleDiff <= targetWidth / 2) {
                    return true;
                }
                return false;
            }
            
            // Create visual feedback
            function createFeedback(x, y, isHit) {
                const feedback = document.createElement('div');
                feedback.className = isHit ? 'hit-feedback' : 'miss-feedback';
                feedback.style.left = (x - 50) + 'px';
                feedback.style.top = (y - 50) + 'px';
                document.querySelector('.game-container').appendChild(feedback);
                
                feedback.classList.add('pulse');
                
                setTimeout(() => {
                    feedback.remove();
                }, 500);
            }
            
            // Handle player input
            function handleInput() {
                if (!gameActive) return;
                
                const hit = checkHit();
                
                if (hit) {
                    // Hit
                    score++;
                    targetWidth *= 0.9; // Shrink target
                    
                    // Create hit feedback
                    const dotX = centerX + Math.cos(dotAngle) * ringRadius;
                    const dotY = centerY + Math.sin(dotAngle) * ringRadius;
                    createFeedback(dotX, dotY, true);
                } else {
                    // Miss
                    misses++;
                    createFeedback(centerX, centerY, false);
                    
                    if (misses >= 3) {
                        // Game over
                        gameActive = false;
                        finalScoreElement.textContent = score;
                        gameOverScreen.classList.add('show');
                        cancelAnimationFrame(animationId);
                        return;
                    }
                }
                
                updateUI();
                targetAngle = Math.random() * Math.PI * 2;
            }
            
            // Game loop
            function gameLoop(timestamp) {
                if (!lastTime) lastTime = timestamp;
                const deltaTime = timestamp - lastTime;
                lastTime = timestamp;
                
                // Update game state
                if (gameActive) {
                    dotAngle += dotSpeed;
                    draw();
                }
                
                animationId = requestAnimationFrame(gameLoop);
            }
            
            // Event listeners
            canvas.addEventListener('click', handleInput);
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    handleInput();
                }
            });
            
            restartBtn.addEventListener('click', initGame);
            
            // Start the game
            initGame();
        });
    </script>
</body>
</html>
