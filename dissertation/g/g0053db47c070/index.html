<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #canvas {
            background-color: #1a1a2e;
            display: block;
        }
        
        #score-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        
        #title-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(26, 26, 46, 0.9);
            color: #00d4ff;
            text-align: center;
            z-index: 10;
        }
        
        #game-over-screen {
            display: none;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.7);
        }
        
        #final-score {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #50c878;
        }
        
        .btn {
            background-color: #16213e;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }
        
        .btn:hover {
            background-color: #00b3ff;
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .feedback {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="game-container">
        <div id="score-display">Score: 0</div>
        <canvas id="canvas" width="500" height="500"></canvas>
        <div id="title-screen">
            <h1>ORBIT TAP</h1>
            <button class="btn" id="start-btn">START GAME</button>
        </div>
        <div id="game-over-screen">
            <h1>GAME OVER</h1>
            <div id="final-score">Score: 0</div>
            <button class="btn" id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // Game constants
        const CANVAS_WIDTH = 500;
        const CANVAS_HEIGHT = 500;
        const RING_RADIUS = 100;
        const RING_STROKE_WIDTH = 20;
        const DOT_RADIUS = 6;
        const INITIAL_TARGET_ANGLE = 30; // degrees
        const TARGET_SHRINK_FACTOR = 0.9;
        const FEEDBACK_DURATION = 300; // milliseconds
        const MAX_MISSES = 3;
        
        // Game state
        let gameState = 'title'; // 'title', 'playing', 'gameOver'
        let score = 0;
        let misses = 0;
        let targetAngle = INITIAL_TARGET_ANGLE;
        let dotPosition = 0; // in radians
        let dotSpeed = 0.02; // radians per frame
        let animationId = null;
        let lastTime = 0;
        let feedbackElement = null;
        
        // DOM elements
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const finalScoreDisplay = document.getElementById('final-score');
        const titleScreen = document.getElementById('title-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        
        // Initialize game
        function init() {
            // Set up event listeners
            startBtn.addEventListener('click', startGame);
            restartBtn.addEventListener('click', startGame);
            document.addEventListener('click', handleTap);
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    handleTap();
                }
            });
            
            // Center the canvas in the container
            canvas.style.margin = '0 auto';
            
            // Draw initial state
            draw();
        }
        
        // Start the game
        function startGame() {
            gameState = 'playing';
            score = 0;
            misses = 0;
            targetAngle = INITIAL_TARGET_ANGLE;
            dotPosition = 0;
            scoreDisplay.textContent = `Score: ${score}`;
            titleScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            // Start animation loop
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            lastTime = performance.now();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Main game loop
        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            // Update game state
            update(deltaTime);
            
            // Draw everything
            draw();
            
            // Continue the loop
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Update game state
        function update(deltaTime) {
            if (gameState !== 'playing') return;
            
            // Move the dot
            dotPosition += dotSpeed;
            if (dotPosition >= Math.PI * 2) {
                dotPosition -= Math.PI * 2;
            }
        }
        
        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw ring
            ctx.beginPath();
            ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, RING_RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = '#16213e';
            ctx.lineWidth = RING_STROKE_WIDTH;
            ctx.stroke();
            
            // Draw target arc
            const startAngle = (Math.PI / 2) - (targetAngle / 2 * Math.PI / 180);
            const endAngle = (Math.PI / 2) + (targetAngle / 2 * Math.PI / 180);
            
            ctx.beginPath();
            ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, RING_RADIUS, startAngle, endAngle);
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = RING_STROKE_WIDTH;
            ctx.stroke();
            
            // Draw dot
            const dotX = CANVAS_WIDTH / 2 + Math.cos(dotPosition) * RING_RADIUS;
            const dotY = CANVAS_HEIGHT / 2 + Math.sin(dotPosition) * RING_RADIUS;
            
            ctx.beginPath();
            ctx.arc(dotX, dotY, DOT_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            
            // Draw feedback if exists
            if (feedbackElement) {
                const rect = feedbackElement.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, DOT_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = feedbackElement.style.backgroundColor;
                ctx.fill();
            }
        }
        
        // Handle tap/click
        function handleTap() {
            if (gameState !== 'playing') return;
            
            // Calculate if dot is in target
            const dotAngle = dotPosition;
            const startAngle = (Math.PI / 2) - (targetAngle / 2 * Math.PI / 180);
            const endAngle = (Math.PI / 2) + (targetAngle / 2 * Math.PI / 180);
            
            // Normalize angles
            let normalizedDotAngle = dotAngle;
            let normalizedStartAngle = startAngle;
            let normalizedEndAngle = endAngle;
            
            // Handle angle wraparound
            if (normalizedDotAngle < 0) normalizedDotAngle += Math.PI * 2;
            if (normalizedStartAngle < 0) normalizedStartAngle += Math.PI * 2;
            if (normalizedEndAngle < 0) normalizedEndAngle += Math.PI * 2;
            
            // Check if dot is in target
            let inTarget = false;
            if (normalizedStartAngle < normalizedEndAngle) {
                inTarget = normalizedDotAngle >= normalizedStartAngle && 
                           normalizedDotAngle <= normalizedEndAngle;
            } else {
                // Target crosses 0 angle
                inTarget = normalizedDotAngle >= normalizedStartAngle || 
                           normalizedDotAngle <= normalizedEndAngle;
            }
            
            // Show feedback
            showFeedback(inTarget);
            
            if (inTarget) {
                // Hit
                score++;
                scoreDisplay.textContent = `Score: ${score}`;
                targetAngle *= TARGET_SHRINK_FACTOR;
                if (targetAngle < 5) targetAngle = 5; // Minimum target size
            } else {
                // Miss
                misses++;
                if (misses >= MAX_MISSES) {
                    endGame();
                }
            }
        }
        
        // Show visual feedback
        function showFeedback(isHit) {
            // Remove previous feedback if exists
            if (feedbackElement) {
                feedbackElement.remove();
            }
            
            // Create feedback element
            feedbackElement = document.createElement('div');
            feedbackElement.className = 'feedback';
            
            // Position at current dot position
            const dotX = CANVAS_WIDTH / 2 + Math.cos(dotPosition) * RING_RADIUS;
            const dotY = CANVAS_HEIGHT / 2 + Math.sin(dotPosition) * RING_RADIUS;
            feedbackElement.style.left = (dotX - DOT_RADIUS) + 'px';
            feedbackElement.style.top = (dotY - DOT_RADIUS) + 'px';
            
            // Set color
            feedbackElement.style.backgroundColor = isHit ? '#50c878' : '#ff6b6b';
            
            // Add to document
            document.getElementById('game-container').appendChild(feedbackElement);
            
            // Remove after feedback duration
            setTimeout(() => {
                if (feedbackElement) {
                    feedbackElement.remove();
                    feedbackElement = null;
                }
            }, FEEDBACK_DURATION);
        }
        
        // End the game
        function endGame() {
            gameState = 'gameOver';
            finalScoreDisplay.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'flex';
            
            // Stop animation
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }
        
        // Initialize the game when page loads
        window.onload = init;
    </script>
</body>
</html>
