<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            padding: 20px;
        }
        
        .game-container {
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }
        
        .stat-box {
            color: white;
            font-size: 1.2rem;
        }
        
        .stat-value {
            font-weight: bold;
            color: #ffcc00;
            font-size: 1.4rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 15px;
            margin-bottom: 30px;
        }
        
        .pad {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .pad:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .pad:active {
            transform: translateY(1px);
        }
        
        .pad-1 { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .pad-2 { background: linear-gradient(135deg, #38ef7d, #11998e); }
        .pad-3 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .pad-4 { background: linear-gradient(135deg, #f093fb, #f5576c); }
        
        .controls {
            margin-top: 20px;
        }
        
        button {
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            border: none;
            border-radius: 50px;
            color: #1a1a1a;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        .message {
            color: white;
            font-size: 1.5rem;
            margin: 20px 0;
            min-height: 2rem;
        }
        
        .flash {
            animation: flash 0.3s ease;
        }
        
        .error {
            animation: error 0.5s ease;
        }
        
        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        @keyframes error {
            0% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .game-over {
            display: none;
        }
        
        .game-over h2 {
            color: #ff416c;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .game-over p {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        
        .instructions {
            color: #aaa;
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        @media (max-width: 500px) {
            .game-container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .pad {
                font-size: 1.5rem;
            }
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div class="game-container">
        <h1>PATTERN ECHO</h1>
        
        <div class="stats">
            <div class="stat-box">
                Round: <span id="round" class="stat-value">1</span>
            </div>
            <div class="stat-box">
                Lives: <span id="lives" class="stat-value">3</span>
            </div>
            <div class="stat-box">
                Score: <span id="score" class="stat-value">0</span>
            </div>
        </div>
        
        <div class="message" id="message">Press START to begin</div>
        
        <div class="grid" id="grid">
            <div class="pad pad-1" data-id="1"></div>
            <div class="pad pad-2" data-id="2"></div>
            <div class="pad pad-3" data-id="3"></div>
            <div class="pad pad-4" data-id="4"></div>
        </div>
        
        <div class="controls">
            <button id="start-btn">START</button>
        </div>
        
        <div class="game-over" id="game-over">
            <h2>GAME OVER</h2>
            <p>Final Round: <span id="final-round">0</span></p>
            <p>Score: <span id="final-score">0</span></p>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>
        
        <div class="instructions">
            <p>Watch the sequence, remember it, and repeat it!</p>
            <p>Use mouse, touch, or keys 1-4 to play</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game elements
            const grid = document.getElementById('grid');
            const startBtn = document.getElementById('start-btn');
            const restartBtn = document.getElementById('restart-btn');
            const messageEl = document.getElementById('message');
            const roundEl = document.getElementById('round');
            const livesEl = document.getElementById('lives');
            const scoreEl = document.getElementById('score');
            const gameOverScreen = document.getElementById('game-over');
            const finalRoundEl = document.getElementById('final-round');
            const finalScoreEl = document.getElementById('final-score');
            
            // Game state
            let gameActive = false;
            let sequence = [];
            let playerSequence = [];
            let currentStep = 0;
            let lives = 3;
            let round = 1;
            let score = 0;
            let isPlayingSequence = false;
            
            // Pad elements
            const pads = document.querySelectorAll('.pad');
            
            // Initialize game
            function initGame() {
                gameActive = false;
                sequence = [];
                playerSequence = [];
                currentStep = 0;
                lives = 3;
                round = 1;
                score = 0;
                isPlayingSequence = false;
                
                updateStats();
                messageEl.textContent = 'Press START to begin';
                gameOverScreen.style.display = 'none';
                startBtn.textContent = 'START';
            }
            
            // Update stats display
            function updateStats() {
                roundEl.textContent = round;
                livesEl.textContent = lives;
                scoreEl.textContent = score;
            }
            
            // Add a new pad to the sequence
            function addToSequence() {
                const randomPad = Math.floor(Math.random() * 4) + 1;
                sequence.push(randomPad);
            }
            
            // Play the sequence
            async function playSequence() {
                isPlayingSequence = true;
                messageEl.textContent = 'Watch the sequence...';
                
                for (let i = 0; i < sequence.length; i++) {
                    const padId = sequence[i];
                    const pad = document.querySelector(`.pad[data-id="${padId}"]`);
                    
                    // Flash the pad
                    pad.classList.add('flash');
                    await new Promise(resolve => setTimeout(resolve, 500));
                    pad.classList.remove('flash');
                    
                    // Wait before next pad
                    await new Promise(resolve => setTimeout(resolve, 300));
                }
                
                isPlayingSequence = false;
                messageEl.textContent = 'Repeat the sequence!';
                playerSequence = [];
                currentStep = 0;
            }
            
            // Handle pad click
            function handlePadClick(padId) {
                if (!gameActive || isPlayingSequence) return;
                
                const pad = document.querySelector(`.pad[data-id="${padId}"]`);
                
                // Flash the pad
                pad.classList.add('flash');
                setTimeout(() => pad.classList.remove('flash'), 200);
                
                // Check if correct
                if (padId === sequence[currentStep]) {
                    // Correct input
                    playerSequence.push(padId);
                    currentStep++;
                    
                    if (currentStep === sequence.length) {
                        // Sequence completed
                        score += round;
                        round++;
                        messageEl.textContent = 'Correct! Next round...';
                        setTimeout(() => {
                            addToSequence();
                            playSequence();
                        }, 1000);
                    } else {
                        messageEl.textContent = `Correct! ${sequence.length - currentStep} more`;
                    }
                } else {
                    // Wrong input
                    pad.classList.add('error');
                    setTimeout(() => pad.classList.remove('error'), 500);
                    lives--;
                    updateStats();
                    
                    if (lives <= 0) {
                        // Game over
                        endGame();
                    } else {
                        messageEl.textContent = 'Wrong! Try again';
                        setTimeout(() => {
                            playSequence();
                        }, 1000);
                    }
                }
            }
            
            // End the game
            function endGame() {
                gameActive = false;
                startBtn.textContent = 'START';
                messageEl.textContent = 'Game Over!';
                finalRoundEl.textContent = round;
                finalScoreEl.textContent = score;
                gameOverScreen.style.display = 'block';
            }
            
            // Start a new game
            function startGame() {
                if (gameActive) return;
                
                initGame();
                gameActive = true;
                startBtn.textContent = 'RESTART';
                messageEl.textContent = 'Watch the sequence...';
                
                // Start with first sequence
                addToSequence();
                playSequence();
            }
            
            // Event listeners
            startBtn.addEventListener('click', startGame);
            restartBtn.addEventListener('click', startGame);
            
            // Pad click events
            pads.forEach(pad => {
                pad.addEventListener('click', () => {
                    const padId = parseInt(pad.dataset.id);
                    handlePadClick(padId);
                });
            });
            
            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                if (e.key >= '1' && e.key <= '4') {
                    const padId = parseInt(e.key);
                    handlePadClick(padId);
                }
            });
            
            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
