<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            overflow: hidden;
        }
        
        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB, #1E90FF);
            display: block;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        #gameOverScreen.visible {
            opacity: 1;
            pointer-events: all;
        }
        
        #finalScore {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }
        
        #restartButton {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }
        
        #restartButton:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }
        
        #restartButton:active {
            transform: scale(0.98);
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            pointer-events: all;
        }
        
        #gameTitle {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
        }
        
        #startButton {
            background: linear-gradient(to bottom, #2196F3, #0D47A1);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }
        
        #startButton:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }
        
        #instructions {
            margin-top: 30px;
            text-align: center;
            max-width: 80%;
            font-size: 18px;
            line-height: 1.6;
            color: #E0E0E0;
        }
        
        .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 5px;
            margin: 0 5px;
        }
    </style>

  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="uiOverlay">
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 45s</div>
            <div id="gameOverScreen">
                <div id="finalScore">Score: 0</div>
                <button id="restartButton">Play Again</button>
            </div>
            <div id="startScreen">
                <h1 id="gameTitle">Gem Catch Sprint</h1>
                <button id="startButton">Start Game</button>
                <div id="instructions">
                    <p>Move the basket to catch falling gems!</p>
                    <p>Use <span class="key">←</span> <span class="key">→</span> or <span class="key">A</span> <span class="key">D</span> keys to move</p>
                    <p>Or drag with your mouse/touch</p>
                    <p>Catch as many gems as you can in 45 seconds!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');
        const startScreen = document.getElementById('startScreen');
        const startButton = document.getElementById('startButton');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let timeLeft = 45;
        let gameTimer = null;
        let gem = null;
        let basket = {
            x: canvas.width / 2 - 50,
            y: canvas.height - 50,
            width: 100,
            height: 30,
            speed: 8
        };
        
        // Input handling
        let keys = {};
        let mouseX = 0;
        let mouseDown = false;
        
        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 45;
            gameRunning = true;
            
            // Reset basket position
            basket.x = canvas.width / 2 - basket.width / 2;
            
            // Create first gem
            createGem();
            
            // Update displays
            updateDisplays();
            
            // Hide screens
            gameOverScreen.classList.remove('visible');
            startScreen.style.display = 'none';
            
            // Start game loop
            if (gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(update, 1000/60);
        }
        
        // Create a new gem
        function createGem() {
            gem = {
                x: Math.random() * (canvas.width - 60) + 30,
                y: 30,
                width: 50,
                height: 50,
                speed: 3
            };
        }
        
        // Update game state
        function update() {
            if (!gameRunning) return;
            
            // Move basket
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                basket.x = Math.max(0, basket.x - basket.speed);
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                basket.x = Math.min(canvas.width - basket.width, basket.x + basket.speed);
            }
            
            // Move gem
            if (gem) {
                gem.y += gem.speed;
                
                // Check if gem is caught
                if (gem.y + gem.height > basket.y &&
                    gem.x + gem.width > basket.x &&
                    gem.x < basket.x + basket.width) {
                    score++;
                    updateDisplays();
                    createGem();
                }
                // Check if gem is missed
                else if (gem.y > canvas.height) {
                    createGem();
                }
            }
            
            // Draw everything
            draw();
        }
        
        // Draw game elements
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background elements
            drawBackground();
            
            // Draw basket
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
            
            // Draw basket details
            ctx.fillStyle = '#A0522D';
            for (let i = 0; i < 5; i++) {
                ctx.fillRect(basket.x + i * 20, basket.y, 10, 5);
            }
            
            // Draw gem if exists
            if (gem) {
                drawGem(gem.x, gem.y);
            }
        }
        
        // Draw background elements
        function drawBackground() {
            // Draw sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#1E90FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw some clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            drawCloud(100, 80, 30);
            drawCloud(300, 50, 40);
            drawCloud(600, 70, 35);
        }
        
        // Draw a cloud
        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y - size * 0.2, size * 0.8, 0, Math.PI * 2);
            ctx.arc(x + size * 1.5, y, size * 0.9, 0, Math.PI * 2);
            ctx.arc(x + size * 1.2, y + size * 0.2, size * 0.7, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Draw a gem
        function drawGem(x, y) {
            // Gem body
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(x + gem.width/2, y + gem.height/2, gem.width/2, 0, Math.PI * 2);
            ctx.fill();
            
            // Gem highlights
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(x + gem.width/3, y + gem.height/3, gem.width/6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(x + gem.width/2, y + gem.height/4, gem.width/8, 0, Math.PI * 2);
            ctx.fill();
            
            // Gem shine
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(x + gem.width/1.5, y + gem.height/1.5, gem.width/10, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Update score and timer displays
        function updateDisplays() {
            scoreDisplay.textContent = `Score: ${score}`;
            timerDisplay.textContent = `Time: ${timeLeft}s`;
        }
        
        // Game over
        function gameOver() {
            gameRunning = false;
            clearInterval(gameTimer);
            finalScore.textContent = `Score: ${score}`;
            gameOverScreen.classList.add('visible');
        }
        
        // Event listeners
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (mouseDown && gameRunning) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                // Keep basket within bounds
                basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));
            }
        });
        
        canvas.addEventListener('mousedown', (e) => {
            mouseDown = true;
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            basket.x = mouseX - basket.width / 2;
        });
        
        window.addEventListener('mouseup', () => {
            mouseDown = false;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameRunning) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const clientX = touch.clientX;
                basket.x = clientX - rect.left - basket.width / 2;
                // Keep basket within bounds
                basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));
            }
        }, { passive: false });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const clientX = touch.clientX;
            basket.x = clientX - rect.left - basket.width / 2;
        }, { passive: false });
        
        restartButton.addEventListener('click', initGame);
        startButton.addEventListener('click', initGame);
        
        // Timer loop
        function timerLoop() {
            if (gameRunning) {
                timeLeft--;
                updateDisplays();
                
                if (timeLeft <= 0) {
                    gameOver();
                }
            }
            setTimeout(timerLoop, 1000);
        }
        
        // Start the timer loop
        timerLoop();
        
        // Initial draw
        draw();
    </script>
</body>
</html>
