<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0F172A;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            width: 400px;
            height: 400px;
        }
        
        canvas {
            background-color: #0F172A;
            border-radius: 8px;
        }
        
        #score-display {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: #3B82F6;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        #game-over.visible {
            opacity: 1;
            pointer-events: all;
        }
        
        #final-score {
            font-size: 1.2rem;
            color: #3B82F6;
            margin-bottom: 20px;
            text-align: center;
        }
        
        #restart-button {
            background-color: #3B82F6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        #restart-button:hover {
            background-color: #2563EB;
        }
        
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(15, 23, 42, 0.9);
            border-radius: 8px;
        }
        
        #start-button {
            background-color: #3B82F6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
        }
        
        #start-button:hover {
            background-color: #2563EB;
        }
        
        h1 {
            color: #3B82F6;
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
        }
        
        p {
            color: #94A3B8;
            text-align: center;
            max-width: 80%;
            line-height: 1.5;
            margin-bottom: 20px;
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="400" height="400"></canvas>
        <div id="score-display">0</div>
        <div id="game-over">
            <div id="final-score">Game Over! Final Score: 0</div>
            <button id="restart-button">Play Again</button>
        </div>
        <div id="start-screen">
            <h1>Orbit Tap</h1>
            <p>Tap or press spacebar when the dot enters the target arc to score points!</p>
            <p>Target arc gets smaller after each hit - make it count!</p>
            <button id="start-button">Start Game</button>
        </div>
    </div>

    <script>
        // Game constants
        const CANVAS_WIDTH = 400;
        const CANVAS_HEIGHT = 400;
        const RING_RADIUS = 100;
        const RING_CENTER_X = CANVAS_WIDTH / 2;
        const RING_CENTER_Y = CANVAS_HEIGHT / 2;
        const DOT_RADIUS = 12;
        const TARGET_WIDTH = 30;
        const INITIAL_TARGET_ANGLE = Math.PI / 6; // 30 degrees
        const ROTATION_SPEED = 0.01; // radians per frame
        const MAX_MISSES = 3;
        const SHRINK_FACTOR = 0.9;
        
        // Game state
        let gameState = 'title'; // 'title', 'playing', 'gameOver'
        let score = 0;
        let misses = 0;
        let dotAngle = 0;
        let targetAngle = 0;
        let targetWidth = INITIAL_TARGET_ANGLE;
        let lastTime = 0;
        let animationId = null;
        let dotColor = '#3B82F6';
        let targetColor = '#10B981';
        let feedback = null;
        let feedbackTimer = 0;
        
        // DOM elements
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');
        const restartButton = document.getElementById('restart-button');
        const startScreen = document.getElementById('start-screen');
        const startButton = document.getElementById('start-button');
        
        // Initialize game
        function initGame() {
            score = 0;
            misses = 0;
            dotAngle = 0;
            targetAngle = Math.random() * Math.PI * 2;
            targetWidth = INITIAL_TARGET_ANGLE;
            dotColor = '#3B82F6';
            feedback = null;
            updateScoreDisplay();
            gameOverScreen.classList.remove('visible');
            startScreen.style.display = 'none';
            gameState = 'playing';
        }
        
        // Update score display
        function updateScoreDisplay() {
            scoreDisplay.textContent = score;
            // Add bounce animation effect
            scoreDisplay.style.transform = 'scale(1.1)';
            setTimeout(() => {
                scoreDisplay.style.transform = 'scale(1)';
            }, 100);
        }
        
        // Draw the circular ring
        function drawRing() {
            ctx.beginPath();
            ctx.arc(RING_CENTER_X, RING_CENTER_Y, RING_RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = '#3B82F6';
            ctx.lineWidth = 12;
            ctx.stroke();
        }
        
        // Draw the moving dot
        function drawDot() {
            ctx.beginPath();
            const x = RING_CENTER_X + Math.cos(dotAngle) * RING_RADIUS;
            const y = RING_CENTER_Y + Math.sin(dotAngle) * RING_RADIUS;
            
            ctx.arc(x, y, DOT_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = dotColor;
            ctx.fill();
            
            // Add glow effect
            ctx.shadowColor = dotColor;
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Draw the target arc
        function drawTarget() {
            const startAngle = targetAngle - targetWidth / 2;
            const endAngle = targetAngle + targetWidth / 2;
            
            ctx.beginPath();
            ctx.arc(RING_CENTER_X, RING_CENTER_Y, RING_RADIUS, startAngle, endAngle);
            ctx.strokeStyle = targetColor;
            ctx.lineWidth = TARGET_WIDTH;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Add glow effect
            ctx.shadowColor = targetColor;
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        
        // Draw feedback effects
        function drawFeedback() {
            if (!feedback) return;
            
            const x = RING_CENTER_X + Math.cos(dotAngle) * RING_RADIUS;
            const y = RING_CENTER_Y + Math.sin(dotAngle) * RING_RADIUS;
            
            if (feedback.type === 'hit') {
                // Pulse effect
                const pulseSize = DOT_RADIUS * (1 + Math.sin(feedbackTimer * 0.1) * 0.3);
                ctx.beginPath();
                ctx.arc(x, y, pulseSize, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(16, 185, 129, 0.3)';
                ctx.fill();
            } else if (feedback.type === 'miss') {
                // Flash effect
                const flashOpacity = 0.3 + Math.sin(feedbackTimer * 0.1) * 0.3;
                ctx.beginPath();
                ctx.arc(x, y, DOT_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(239, 68, 68, ${flashOpacity})`;
                ctx.fill();
            }
        }
        
        // Update game state
        function update(deltaTime) {
            if (gameState !== 'playing') return;
            
            // Update dot position
            dotAngle += ROTATION_SPEED * deltaTime;
            if (dotAngle > Math.PI * 2) dotAngle -= Math.PI * 2;
            
            // Update feedback timer
            if (feedback) {
                feedbackTimer += deltaTime;
                if (feedbackTimer > 1000) { // Reset feedback after 1 second
                    feedback = null;
                    feedbackTimer = 0;
                }
            }
        }
        
        // Check if dot is in target
        function checkHit() {
            const dotAngleNormalized = dotAngle;
            const targetStart = targetAngle - targetWidth / 2;
            const targetEnd = targetAngle + targetWidth / 2;
            
            // Handle angle wrap-around
            let inTarget = false;
            if (targetStart < 0 && targetEnd > Math.PI * 2) {
                // Target spans 0 degrees
                inTarget = dotAngleNormalized >= targetStart + Math.PI * 2 || 
                           dotAngleNormalized <= targetEnd - Math.PI * 2;
            } else {
                inTarget = dotAngleNormalized >= targetStart && dotAngleNormalized <= targetEnd;
            }
            
            return inTarget;
        }
        
        // Handle player input
        function handleInput() {
            if (gameState !== 'playing') return;
            
            const inTarget = checkHit();
            
            if (inTarget) {
                // Hit
                score++;
                updateScoreDisplay();
                dotColor = '#10B981'; // Green
                feedback = { type: 'hit', timer: 0 };
                feedbackTimer = 0;
                
                // Shrink target
                targetWidth *= SHRINK_FACTOR;
                if (targetWidth < 0.05) targetWidth = 0.05;
                
                // Move target to new random position
                targetAngle = Math.random() * Math.PI * 2;
            } else {
                // Miss
                misses++;
                dotColor = '#EF4444'; // Red
                feedback = { type: 'miss', timer: 0 };
                feedbackTimer = 0;
                
                if (misses >= MAX_MISSES) {
                    endGame();
                }
            }
        }
        
        // End the game
        function endGame() {
            gameState = 'gameOver';
            finalScoreDisplay.textContent = `Game Over! Final Score: ${score}`;
            gameOverScreen.classList.add('visible');
        }
        
        // Render the game
        function render() {
            // Clear canvas
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw game elements
            drawRing();
            drawTarget();
            drawDot();
            drawFeedback();
        }
        
        // Game loop
        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            update(deltaTime);
            render();
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Event listeners
        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleInput();
            }
        });
        
        restartButton.addEventListener('click', initGame);
        startButton.addEventListener('click', initGame);
        
        // Start the game loop
        animationId = requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
