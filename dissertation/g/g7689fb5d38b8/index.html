<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB, #1E90FF);
            display: block;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #FF6347;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            text-align: center;
            pointer-events: auto;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
        }
        
        h2 {
            font-size: 36px;
            margin-bottom: 30px;
            color: #4CAF50;
        }
        
        p {
            font-size: 22px;
            margin-bottom: 30px;
            max-width: 80%;
            line-height: 1.6;
        }
        
        #finalScore {
            font-size: 42px;
            font-weight: bold;
            color: #FFD700;
            margin: 20px 0;
        }
        
        .btn {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            margin-top: 20px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            background: linear-gradient(to bottom, #66BB6A, #388E3C);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #CCCCCC;
            font-size: 18px;
        }
        
        .gem {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 15px currentColor;
        }
        
        .basket {
            position: absolute;
            background: linear-gradient(to bottom, #8B4513, #5D2906);
            border: 3px solid #A0522D;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="uiOverlay">
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 45</div>
            <div id="instructions">Use ← → keys or A/D to move the basket</div>
        </div>
        
        <div id="startScreen">
            <h1>Gem Catch Sprint</h1>
            <p>Catch falling gems to score points!</p>
            <p>Move the basket under the gems to catch them.</p>
            <p>You have 45 seconds to get the highest score!</p>
            <button id="startBtn" class="btn">Start Game</button>
        </div>
        
        <div id="gameOverScreen">
            <h1>Game Over!</h1>
            <h2>Your Score</h2>
            <div id="finalScore">0</div>
            <button id="restartBtn" class="btn">Play Again</button>
        </div>
    </div>

    <script>
        // Game elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        
        // Game state
        let score = 0;
        let timeLeft = 45;
        let gameActive = false;
        let gameTimer;
        let gem;
        let basket;
        let keys = {};
        let mouseX = 0;
        let mouseDown = false;
        
        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 45;
            scoreDisplay.textContent = `Score: ${score}`;
            timerDisplay.textContent = `Time: ${timeLeft}`;
            
            // Create basket
            basket = {
                x: canvas.width / 2 - 60,
                y: canvas.height - 80,
                width: 120,
                height: 40,
                speed: 8
            };
            
            // Create first gem
            createGem();
            
            // Hide screens
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            // Start game loop
            gameActive = true;
            requestAnimationFrame(gameLoop);
            
            // Start timer
            clearInterval(gameTimer);
            gameTimer = setInterval(updateTimer, 1000);
        }
        
        // Create a new gem
        function createGem() {
            gem = {
                x: Math.random() * (canvas.width - 60) + 30,
                y: 30,
                radius: 30,
                speed: 3,
                color: getRandomGemColor()
            };
        }
        
        // Get random gem color
        function getRandomGemColor() {
            const colors = [
                '#FF0000', // Red
                '#00FF00', // Green
                '#0000FF', // Blue
                '#FFFF00', // Yellow
                '#FF00FF', // Magenta
                '#00FFFF'  // Cyan
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // Update game timer
        function updateTimer() {
            timeLeft--;
            timerDisplay.textContent = `Time: ${timeLeft}`;
            
            if (timeLeft <= 0) {
                endGame();
            }
        }
        
        // Game loop
        function gameLoop() {
            if (!gameActive) return;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background elements
            drawBackground();
            
            // Update and draw basket
            updateBasket();
            drawBasket();
            
            // Update and draw gem
            updateGem();
            drawGem();
            
            // Continue game loop
            requestAnimationFrame(gameLoop);
        }
        
        // Draw background elements
        function drawBackground() {
            // Draw some clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(100, 80, 30, 0, Math.PI * 2);
            ctx.arc(130, 70, 35, 0, Math.PI * 2);
            ctx.arc(160, 80, 30, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(600, 120, 30, 0, Math.PI * 2);
            ctx.arc(630, 110, 35, 0, Math.PI * 2);
            ctx.arc(660, 120, 30, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Update basket position
        function updateBasket() {
            // Keyboard controls
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                basket.x = Math.max(0, basket.x - basket.speed);
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                basket.x = Math.min(canvas.width - basket.width, basket.x + basket.speed);
            }
            
            // Mouse/touch controls
            if (mouseDown) {
                basket.x = mouseX - basket.width / 2;
                basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));
            }
        }
        
        // Draw basket
        function drawBasket() {
            // Basket body
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
            
            // Basket rim
            ctx.fillStyle = '#5D2906';
            ctx.fillRect(basket.x, basket.y, basket.width, 10);
            
            // Basket handle
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(basket.x + 10, basket.y - 15, 10, 15);
            ctx.fillRect(basket.x + basket.width - 20, basket.y - 15, 10, 15);
        }
        
        // Update gem position
        function updateGem() {
            gem.y += gem.speed;
            
            // Check if gem is caught
            if (gem.y + gem.radius > basket.y && 
                gem.y - gem.radius < basket.y + basket.height &&
                gem.x > basket.x && 
                gem.x < basket.x + basket.width) {
                // Gem caught
                score++;
                scoreDisplay.textContent = `Score: ${score}`;
                createGem();
            }
            
            // Check if gem is missed
            if (gem.y > canvas.height) {
                createGem();
            }
        }
        
        // Draw gem
        function drawGem() {
            // Gem body
            ctx.fillStyle = gem.color;
            ctx.beginPath();
            ctx.arc(gem.x, gem.y, gem.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Gem highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(gem.x - gem.radius/3, gem.y - gem.radius/3, gem.radius/3, 0, Math.PI * 2);
            ctx.fill();
            
            // Gem shine
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.arc(gem.x + gem.radius/2, gem.y - gem.radius/4, gem.radius/4, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // End game
        function endGame() {
            gameActive = false;
            clearInterval(gameTimer);
            finalScore.textContent = score;
            gameOverScreen.style.display = 'flex';
        }
        
        // Event listeners
        startBtn.addEventListener('click', initGame);
        restartBtn.addEventListener('click', initGame);
        
        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // Mouse controls
        canvas.addEventListener('mousedown', (e) => {
            mouseDown = true;
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (mouseDown) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
            }
        });
        
        window.addEventListener('mouseup', () => {
            mouseDown = false;
        });
        
        // Touch controls for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseDown = true;
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (mouseDown) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.touches[0].clientX - rect.left;
            }
        });
        
        canvas.addEventListener('touchend', () => {
            mouseDown = false;
        });
        
        // Initial setup
        createGem();
    </script>
</body>
</html>
