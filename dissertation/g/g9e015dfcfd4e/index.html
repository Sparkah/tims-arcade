<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            width: 400px;
            height: 400px;
        }
        
        #game-canvas {
            background-color: #1a1a2e;
            display: block;
        }
        
        #score-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: bold;
            z-index: 10;
        }
        
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 20;
        }
        
        #game-over.show {
            opacity: 1;
            pointer-events: all;
        }
        
        #game-over-box {
            background-color: #1a1a2e;
            width: 200px;
            height: 100px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }
        
        #final-score {
            color: #ffffff;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        #restart-button {
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        #restart-button:hover {
            background-color: #ff5252;
        }
        
        .pulse {
            animation: pulse 150ms ease;
        }
        
        .shake {
            animation: shake 200ms ease;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="game-container">
        <div id="score-display">Score: 0</div>
        <canvas id="game-canvas" width="400" height="400"></canvas>
        <div id="game-over">
            <div id="game-over-box">
                <div id="final-score">Score: 0</div>
                <button id="restart-button">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        // Game constants
        const CANVAS_WIDTH = 400;
        const CANVAS_HEIGHT = 400;
        const RING_RADIUS = 100;
        const RING_THICKNESS = 20;
        const DOT_RADIUS = 6; // 12px diameter
        const TARGET_ANGLE = 60; // degrees
        const INITIAL_TARGET_SIZE = TARGET_ANGLE;
        const TARGET_SHRINK_FACTOR = 0.9;
        const MAX_MISSES = 3;
        const DOT_SPEED = 0.02; // radians per frame (constant speed)
        const ANIMATION_SPEED = 0.01; // radians per frame for target rotation
        
        // Game state
        let canvas = document.getElementById('game-canvas');
        let ctx = canvas.getContext('2d');
        let scoreDisplay = document.getElementById('score-display');
        let gameOverScreen = document.getElementById('game-over');
        let finalScoreDisplay = document.getElementById('final-score');
        let restartButton = document.getElementById('restart-button');
        
        let gameState = {
            score: 0,
            misses: 0,
            targetAngle: INITIAL_TARGET_SIZE,
            dotPosition: 0,
            targetPosition: Math.PI / 2, // Start at top
            gameRunning: true,
            lastTime: 0,
            animationFrameId: null
        };
        
        // Initialize game
        function initGame() {
            gameState = {
                score: 0,
                misses: 0,
                targetAngle: INITIAL_TARGET_SIZE,
                dotPosition: 0,
                targetPosition: Math.PI / 2,
                gameRunning: true,
                lastTime: 0,
                animationFrameId: null
            };
            
            scoreDisplay.textContent = `Score: ${gameState.score}`;
            gameOverScreen.classList.remove('show');
            animate();
        }
        
        // Normalize angle to [0, 2π)
        function normalizeAngle(angle) {
            while (angle < 0) angle += Math.PI * 2;
            while (angle >= Math.PI * 2) angle -= Math.PI * 2;
            return angle;
        }
        
        // Draw the ring
        function drawRing() {
            ctx.beginPath();
            ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, RING_RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = RING_THICKNESS;
            ctx.stroke();
        }
        
        // Draw the target arc
        function drawTargetArc() {
            const startAngle = normalizeAngle(gameState.targetPosition - (gameState.targetAngle / 2) * Math.PI / 180);
            const endAngle = normalizeAngle(gameState.targetPosition + (gameState.targetAngle / 2) * Math.PI / 180);
            
            ctx.beginPath();
            ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, RING_RADIUS, startAngle, endAngle);
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = RING_THICKNESS;
            ctx.stroke();
        }
        
        // Draw the dot
        function drawDot() {
            const x = CANVAS_WIDTH / 2 + Math.cos(gameState.dotPosition) * RING_RADIUS;
            const y = CANVAS_HEIGHT / 2 + Math.sin(gameState.dotPosition) * RING_RADIUS;
            
            ctx.beginPath();
            ctx.arc(x, y, DOT_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff88';
            ctx.fill();
        }
        
        // Check if dot is in target
        function isInTarget() {
            const dotAngle = normalizeAngle(gameState.dotPosition);
            const targetStart = normalizeAngle(gameState.targetPosition - (gameState.targetAngle / 2) * Math.PI / 180);
            const targetEnd = normalizeAngle(gameState.targetPosition + (gameState.targetAngle / 2) * Math.PI / 180);
            
            // Handle case where target crosses 0 degrees
            if (targetStart > targetEnd) {
                return dotAngle >= targetStart || dotAngle <= targetEnd;
            } else {
                return dotAngle >= targetStart && dotAngle <= targetEnd;
            }
        }
        
        // Handle player input
        function handleInput() {
            if (!gameState.gameRunning) return;
            
            const inTarget = isInTarget();
            
            if (inTarget) {
                // Hit
                gameState.score++;
                scoreDisplay.textContent = `Score: ${gameState.score}`;
                
                // Shrink target
                gameState.targetAngle = Math.max(5, gameState.targetAngle * TARGET_SHRINK_FACTOR);
                
                // Visual feedback
                drawRing();
                drawTargetArc();
                drawDot();
                
                // Add pulse animation to canvas
                canvas.classList.add('pulse');
                setTimeout(() => canvas.classList.remove('pulse'), 150);
            } else {
                // Miss
                gameState.misses++;
                
                if (gameState.misses >= MAX_MISSES) {
                    // Game over
                    endGame();
                } else {
                    // Visual feedback for miss
                    drawRing();
                    drawTargetArc();
                    drawDot();
                    
                    // Add shake animation to canvas
                    canvas.classList.add('shake');
                    setTimeout(() => canvas.classList.remove('shake'), 200);
                }
            }
        }
        
        // End the game
        function endGame() {
            gameState.gameRunning = false;
            cancelAnimationFrame(gameState.animationFrameId);
            
            finalScoreDisplay.textContent = `Score: ${gameState.score}`;
            gameOverScreen.classList.add('show');
        }
        
        // Animation loop
        function animate(timestamp) {
            // Clear canvas
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Update dot position at constant speed
            gameState.dotPosition += DOT_SPEED;
            gameState.dotPosition = normalizeAngle(gameState.dotPosition);
            
            // Update target position (rotate slowly)
            gameState.targetPosition += ANIMATION_SPEED;
            gameState.targetPosition = normalizeAngle(gameState.targetPosition);
            
            // Draw game elements
            drawRing();
            drawTargetArc();
            drawDot();
            
            // Continue animation
            gameState.animationFrameId = requestAnimationFrame(animate);
        }
        
        // Event listeners
        canvas.addEventListener('click', handleInput);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleInput();
            }
        });
        restartButton.addEventListener('click', initGame);
        
        // Start the game
        initGame();
    </script>
</body>
</html>
