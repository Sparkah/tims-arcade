<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 400px;
            height: 400px;
        }
        
        #gameCanvas {
            background-color: #1a1a2e;
            border-radius: 50%;
            display: block;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #f8f9fa;
            height: 60px;
            line-height: 60px;
        }
        
        #titleScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #f8f9fa;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #ffd166;
        }
        
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 80%;
        }
        
        button {
            background-color: #06d6a0;
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        
        button:hover {
            background-color: #05b48a;
            transform: scale(1.05);
        }
        
        .feedback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
        }
        
        .hit {
            background-color: rgba(239, 71, 111, 0.3);
            border-radius: 50%;
            animation: pulse 0.2s ease-in-out;
        }
        
        .miss {
            background-color: rgba(255, 0, 0, 0.2);
            animation: shake 0.2s ease-in-out;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.5); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0; }
        }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="scoreDisplay">Score: 0</div>
        <div id="titleScreen">
            <h1>Orbit Tap</h1>
            <p>Tap or press spacebar when the dot is inside the target arc</p>
            <button id="startButton">Start Game</button>
        </div>
        <div id="gameOverScreen">
            <h1>Game Over</h1>
            <p id="finalScore">Score: 0</p>
            <button id="restartButton">Play Again</button>
        </div>
        <div id="hitFeedback" class="feedback"></div>
        <div id="missFeedback" class="feedback"></div>
    </div>

    <script>
        // Game constants
        const CANVAS_WIDTH = 400;
        const CANVAS_HEIGHT = 400;
        const RING_RADIUS = 150;
        const DOT_RADIUS = 12;
        const INITIAL_TARGET_ANGLE = 30;
        const TARGET_SHRINK = 5;
        const MIN_TARGET_ANGLE = 5;
        const ROTATION_SPEED = 0.005; // radians per frame
        const MAX_MISSES = 3;
        
        // Game state
        let gameState = 'title'; // 'title', 'playing', 'gameOver'
        let score = 0;
        let misses = 0;
        let targetAngle = INITIAL_TARGET_ANGLE;
        let dotAngle = 0;
        let lastTime = 0;
        let animationId = null;
        
        // DOM elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const titleScreen = document.getElementById('titleScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const hitFeedback = document.getElementById('hitFeedback');
        const missFeedback = document.getElementById('missFeedback');
        
        // Initialize canvas
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;
        
        // Event listeners
        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', startGame);
        document.addEventListener('keydown', handleKeyPress);
        canvas.addEventListener('click', handleTap);
        
        // Game functions
        function startGame() {
            gameState = 'playing';
            score = 0;
            misses = 0;
            targetAngle = INITIAL_TARGET_ANGLE;
            dotAngle = 0;
            lastTime = 0;
            
            titleScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            scoreDisplay.textContent = 'Score: 0';
            
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function handleKeyPress(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'playing') {
                    attemptHit();
                }
            }
        }
        
        function handleTap() {
            if (gameState === 'playing') {
                attemptHit();
            }
        }
        
        function attemptHit() {
            // Calculate the angle of the dot
            const dotPosition = getDotPosition();
            
            // Calculate the target arc boundaries
            const targetStart = (dotAngle - targetAngle / 2) % 360;
            const targetEnd = (dotAngle + targetAngle / 2) % 360;
            
            // Normalize angles to 0-360 range
            const normalizedDot = dotPosition.angle;
            let normalizedStart = targetStart < 0 ? targetStart + 360 : targetStart;
            let normalizedEnd = targetEnd < 0 ? targetEnd + 360 : targetEnd;
            
            // Handle case where arc crosses 0 degrees
            let isHit = false;
            if (normalizedStart <= normalizedEnd) {
                // Normal case
                isHit = normalizedDot >= normalizedStart && normalizedDot <= normalizedEnd;
            } else {
                // Arc crosses 0 degrees
                isHit = normalizedDot >= normalizedStart || normalizedDot <= normalizedEnd;
            }
            
            if (isHit) {
                // Hit successful
                score++;
                scoreDisplay.textContent = `Score: ${score}`;
                
                // Show hit feedback
                showHitFeedback();
                
                // Shrink target
                targetAngle = Math.max(MIN_TARGET_ANGLE, targetAngle - TARGET_SHRINK);
                
                // Add a small delay to make it more noticeable
                setTimeout(() => {
                    // Update target arc for next frame
                }, 100);
            } else {
                // Miss
                misses++;
                showMissFeedback();
                
                if (misses >= MAX_MISSES) {
                    endGame();
                }
            }
        }
        
        function getDotPosition() {
            const centerX = CANVAS_WIDTH / 2;
            const centerY = CANVAS_HEIGHT / 2;
            const x = centerX + Math.cos(dotAngle) * RING_RADIUS;
            const y = centerY + Math.sin(dotAngle) * RING_RADIUS;
            const angle = (dotAngle * 180 / Math.PI) % 360;
            return { x, y, angle };
        }
        
        function showHitFeedback() {
            hitFeedback.style.opacity = '1';
            setTimeout(() => {
                hitFeedback.style.opacity = '0';
            }, 200);
        }
        
        function showMissFeedback() {
            missFeedback.style.opacity = '1';
            setTimeout(() => {
                missFeedback.style.opacity = '0';
            }, 200);
        }
        
        function endGame() {
            gameState = 'gameOver';
            finalScore.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'flex';
            cancelAnimationFrame(animationId);
        }
        
        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            // Clear canvas
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            if (gameState === 'playing') {
                // Update dot position
                dotAngle += ROTATION_SPEED * deltaTime;
                
                // Draw ring
                ctx.beginPath();
                ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, RING_RADIUS, 0, Math.PI * 2);
                ctx.strokeStyle = '#f8f9fa';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Draw target arc
                const startAngle = (dotAngle - targetAngle / 2) * Math.PI / 180;
                const endAngle = (dotAngle + targetAngle / 2) * Math.PI / 180;
                
                ctx.beginPath();
                ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, RING_RADIUS, startAngle, endAngle);
                ctx.strokeStyle = '#06d6a0';
                ctx.lineWidth = 12;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                // Draw dot
                const dotPos = getDotPosition();
                ctx.beginPath();
                ctx.arc(dotPos.x, dotPos.y, DOT_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = '#ffd166';
                ctx.fill();
                
                // Draw dot glow
                ctx.beginPath();
                ctx.arc(dotPos.x, dotPos.y, DOT_RADIUS + 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 209, 102, 0.3)';
                ctx.fill();
            }
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Start the game loop
        gameLoop(0);
    </script>
</body>
</html>
