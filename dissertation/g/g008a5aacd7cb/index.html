<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            overflow: hidden;
        }
        
        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB, #1E90FF);
            display: block;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        #gameOverScreen.visible {
            opacity: 1;
            pointer-events: all;
        }
        
        #finalScore {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }
        
        #restartButton {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        
        #restartButton:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }
        
        #restartButton:active {
            transform: scale(0.98);
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            pointer-events: all;
        }
        
        #title {
            font-size: 50px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
        }
        
        #instructions {
            font-size: 22px;
            text-align: center;
            max-width: 80%;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        #startButton {
            background: linear-gradient(to bottom, #2196F3, #0D47A1);
            border: none;
            color: white;
            padding: 15px 50px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        
        #startButton:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }
        
        #startButton:active {
            transform: scale(0.98);
        }
        
        .gem {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
        }
        
        .basket {
            position: absolute;
            border-radius: 10px;
            background: linear-gradient(to bottom, #8B4513, #5D2906);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="uiOverlay">
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 45s</div>
            <div id="gameOverScreen">
                <div id="finalScore">Score: 0</div>
                <button id="restartButton">Play Again</button>
            </div>
            <div id="startScreen">
                <h1 id="title">Gem Catch Sprint</h1>
                <p id="instructions">Move the basket to catch falling gems!<br>Use ← → keys or A/D to move.<br>Press any key to start!</p>
                <button id="startButton">Start Game</button>
            </div>
        </div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');
        const startScreen = document.getElementById('startScreen');
        const startButton = document.getElementById('startButton');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let timeLeft = 45;
        let gameTimer = null;
        let gem = null;
        let basket = null;
        let keys = {};
        let mouseX = 0;
        let mouseDown = false;
        
        // Gem class
        class Gem {
            constructor() {
                this.size = 40;
                this.x = Math.random() * (canvas.width - this.size);
                this.y = -this.size;
                this.speed = 3;
                this.color = this.getRandomColor();
            }
            
            getRandomColor() {
                const colors = [
                    '#FFD700', // Gold
                    '#FF0000', // Red
                    '#00FF00', // Green
                    '#0000FF', // Blue
                    '#FF00FF', // Magenta
                    '#00FFFF'  // Cyan
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.y += this.speed;
            }
            
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x + this.size/2, this.y + this.size/2, this.size/2, 0, Math.PI * 2);
                ctx.fill();
                
                // Add shine effect
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.beginPath();
                ctx.arc(this.x + this.size/3, this.y + this.size/3, this.size/6, 0, Math.PI * 2);
                ctx.fill();
            }
            
            isOffScreen() {
                return this.y > canvas.height;
            }
        }
        
        // Basket class
        class Basket {
            constructor() {
                this.width = 100;
                this.height = 30;
                this.x = (canvas.width - this.width) / 2;
                this.y = canvas.height - this.height - 20;
                this.speed = 8;
            }
            
            update() {
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                    this.x = Math.max(0, this.x - this.speed);
                }
                if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                    this.x = Math.min(canvas.width - this.width, this.x + this.speed);
                }
                // Mouse control
                if (mouseDown) {
                    this.x = mouseX - this.width/2;
                    this.x = Math.max(0, Math.min(canvas.width - this.width, this.x));
                }
            }
            
            draw() {
                // Basket body
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // Basket handle
                ctx.fillStyle = '#5D2906';
                ctx.fillRect(this.x - 10, this.y + 5, 10, this.height - 10);
                ctx.fillRect(this.x + this.width, this.y + 5, 10, this.height - 10);
                
                // Basket rim
                ctx.fillStyle = '#A0522D';
                ctx.fillRect(this.x, this.y, this.width, 5);
            }
            
            checkCollision(gem) {
                return (
                    gem.x < this.x + this.width &&
                    gem.x + gem.size > this.x &&
                    gem.y < this.y + this.height &&
                    gem.y + gem.size > this.y
                );
            }
        }
        
        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 45;
            scoreDisplay.textContent = `Score: ${score}`;
            timerDisplay.textContent = `Time: ${timeLeft}s`;
            
            gem = new Gem();
            basket = new Basket();
            
            gameOverScreen.classList.remove('visible');
            startScreen.style.display = 'none';
            
            gameRunning = true;
            
            // Start game timer
            if (gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(updateTimer, 1000);
            
            // Start game loop
            requestAnimationFrame(gameLoop);
        }
        
        // Update timer
        function updateTimer() {
            if (!gameRunning) return;
            
            timeLeft--;
            timerDisplay.textContent = `Time: ${timeLeft}s`;
            
            if (timeLeft <= 0) {
                endGame();
            }
        }
        
        // Game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background elements
            drawBackground();
            
            // Update and draw basket
            basket.update();
            basket.draw();
            
            // Update and draw gem
            if (gem) {
                gem.update();
                gem.draw();
                
                // Check if gem is caught
                if (basket.checkCollision(gem)) {
                    score++;
                    scoreDisplay.textContent = `Score: ${score}`;
                    gem = new Gem(); // Create new gem
                }
                
                // Check if gem is missed
                if (gem.isOffScreen()) {
                    gem = new Gem(); // Create new gem
                }
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        // Draw background elements
        function drawBackground() {
            // Draw some clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(100, 80, 30, 0, Math.PI * 2);
            ctx.arc(130, 70, 35, 0, Math.PI * 2);
            ctx.arc(160, 80, 30, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(600, 100, 30, 0, Math.PI * 2);
            ctx.arc(630, 90, 35, 0, Math.PI * 2);
            ctx.arc(660, 100, 30, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            
            // Draw grass
            ctx.fillStyle = '#2E8B57';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 5);
        }
        
        // End game
        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            
            finalScore.textContent = `Score: ${score}`;
            gameOverScreen.classList.add('visible');
        }
        
        // Event listeners
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            // Start game with any key
            if (startScreen.style.display !== 'none' && gameRunning === false) {
                initGame();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
            }
        });
        
        canvas.addEventListener('mousedown', () => {
            mouseDown = true;
        });
        
        canvas.addEventListener('mouseup', () => {
            mouseDown = false;
        });
        
        canvas.addEventListener('mouseleave', () => {
            mouseDown = false;
        });
        
        // Touch support
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameRunning) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.touches[0].clientX - rect.left;
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseDown = true;
        });
        
        canvas.addEventListener('touchend', () => {
            mouseDown = false;
        });
        
        restartButton.addEventListener('click', initGame);
        startButton.addEventListener('click', initGame);
        
        // Initialize the game
        window.onload = function() {
            // Draw initial background
            drawBackground();
        };
    </script>
</body>
</html>
