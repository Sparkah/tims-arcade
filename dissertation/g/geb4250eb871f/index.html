<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        #gameCanvas {
            background: #0d1b2a;
            display: block;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #4dff4d;
            text-shadow: 0 0 10px rgba(77, 255, 77, 0.5);
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            text-align: center;
            pointer-events: auto;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
        }
        
        h2 {
            font-size: 36px;
            margin-bottom: 30px;
            color: #4dff4d;
        }
        
        p {
            font-size: 22px;
            margin-bottom: 30px;
            max-width: 80%;
            line-height: 1.6;
        }
        
        #finalScore {
            font-size: 42px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }
        
        .btn {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 22px;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            font-weight: bold;
            margin-top: 20px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            background: linear-gradient(to bottom, #66BB6A, #388E3C);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #aaa;
            font-size: 18px;
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="uiOverlay">
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 45s</div>
            <div id="instructions">Use ← → or A/D keys, or mouse/touch to move</div>
        </div>
        
        <div id="startScreen">
            <h1>Gem Catch Sprint</h1>
            <p>Catch falling gems to score points!</p>
            <p>Move your basket to catch gems before they fall!</p>
            <button id="startBtn" class="btn">Start Game</button>
        </div>
        
        <div id="gameOverScreen">
            <h1>Game Over!</h1>
            <h2>Your Score</h2>
            <div id="finalScore">0</div>
            <button id="restartBtn" class="btn">Play Again</button>
        </div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let timeLeft = 45;
        let gameTimer;
        let gem;
        let basket;
        let keys = {};
        
        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 45;
            updateUI();
            
            // Create basket
            basket = {
                x: canvas.width / 2 - 50,
                y: canvas.height - 60,
                width: 100,
                height: 40,
                speed: 8
            };
            
            // Create initial gem
            createGem();
            
            // Reset game state
            gameRunning = true;
        }
        
        // Create a new falling gem
        function createGem() {
            gem = {
                x: Math.random() * (canvas.width - 60) + 30,
                y: 30,
                radius: 25,
                speed: 3,
                color: getRandomGemColor()
            };
        }
        
        // Get a random gem color
        function getRandomGemColor() {
            const colors = [
                '#FFD700', // Gold
                '#00BFFF', // Blue
                '#FF69B4', // Pink
                '#32CD32', // Lime
                '#FF4500', // Orange
                '#9370DB'  // Purple
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // Update UI elements
        function updateUI() {
            scoreDisplay.textContent = `Score: ${score}`;
            timerDisplay.textContent = `Time: ${timeLeft}s`;
        }
        
        // Draw basket
        function drawBasket() {
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
            
            // Draw basket details
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(basket.x + 5, basket.y + 5, basket.width - 10, 10);
            ctx.fillRect(basket.x + 5, basket.y + 25, basket.width - 10, 10);
            
            // Draw basket handle
            ctx.fillStyle = '#654321';
            ctx.fillRect(basket.x - 10, basket.y + 10, 10, 20);
            ctx.fillRect(basket.x + basket.width, basket.y + 10, 10, 20);
        }
        
        // Draw gem
        function drawGem() {
            ctx.beginPath();
            ctx.arc(gem.x, gem.y, gem.radius, 0, Math.PI * 2);
            ctx.fillStyle = gem.color;
            ctx.fill();
            
            // Add shine effect
            ctx.beginPath();
            ctx.arc(gem.x - gem.radius/3, gem.y - gem.radius/3, gem.radius/3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.fill();
        }
        
        // Check collision between gem and basket
        function checkCollision() {
            // Simple bounding box collision
            return gem.x > basket.x - gem.radius &&
                   gem.x < basket.x + basket.width + gem.radius &&
                   gem.y > basket.y - gem.radius &&
                   gem.y < basket.y + basket.height + gem.radius;
        }
        
        // Update game state
        function update() {
            if (!gameRunning) return;
            
            // Move basket based on input
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                basket.x = Math.max(0, basket.x - basket.speed);
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                basket.x = Math.min(canvas.width - basket.width, basket.x + basket.speed);
            }
            
            // Move gem down
            gem.y += gem.speed;
            
            // Check if gem is caught
            if (checkCollision()) {
                score++;
                updateUI();
                createGem(); // Create a new gem
            }
            
            // Check if gem is missed (falls off screen)
            if (gem.y > canvas.height + gem.radius) {
                createGem(); // Create a new gem
            }
        }
        
        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            
            // Vertical lines
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            // Horizontal lines
            for (let y = 0; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // Draw game elements
            drawBasket();
            drawGem();
        }
        
        // Game loop
        function gameLoop() {
            update();
            draw();
            
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // Start game
        function startGame() {
            initGame();
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            gameLoop();
            
            // Start timer
            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft--;
                updateUI();
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }
        
        // End game
        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'flex';
        }
        
        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        
        // Keyboard input
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // Mouse movement
        let isDragging = false;
        
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging && gameRunning) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                
                // Keep basket within canvas
                if (basket.x < 0) basket.x = 0;
                if (basket.x > canvas.width - basket.width) {
                    basket.x = canvas.width - basket.width;
                }
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging && gameRunning) {
                const rect = canvas.getBoundingClientRect();
                const touchX = e.touches[0].clientX - rect.left;
                basket.x = touchX - basket.width / 2;
                
                // Keep basket within canvas
                if (basket.x < 0) basket.x = 0;
                if (basket.x > canvas.width - basket.width) {
                    basket.x = canvas.width - basket.width;
                }
            }
        });
        
        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });
        
        // Initial UI update
        updateUI();
    </script>
</body>
</html>
