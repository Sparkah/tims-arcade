<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            padding: 20px;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 300px;
        }

        #score-display {
            display: flex;
            justify-content: space-between;
            width: 100%;
            height: 40px;
            background-color: #16213e;
            border-radius: 8px;
            padding: 0 15px;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d4ff;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            width: 300px;
            height: 300px;
            background-color: #16213e;
            border-radius: 10px;
            padding: 10px;
        }

        .pad {
            background-color: #00d4ff;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            color: rgba(26, 26, 46, 0.7);
        }

        .pad:hover {
            opacity: 1.1;
        }

        .pad:active {
            transform: scale(0.95);
        }

        #start-button, #restart-button {
            background-color: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #start-button:hover, #restart-button:hover {
            transform: scale(1.05);
        }

        #start-button:active, #restart-button:active {
            transform: scale(0.95);
        }

        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 46, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            display: none;
        }

        #game-over-content {
            background-color: #16213e;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            width: 300px;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #game-over-content h2 {
            color: #ff6b6b;
            font-size: 1.8rem;
        }

        #final-score {
            color: #00d4ff;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .flash-success {
            animation: flashSuccess 0.2s;
        }

        .flash-error {
            animation: flashError 0.3s;
        }

        @keyframes flashSuccess {
            0% { background-color: #00d4ff; }
            50% { background-color: #4ecdc4; }
            100% { background-color: #00d4ff; }
        }

        @keyframes flashError {
            0% { background-color: #00d4ff; }
            50% { background-color: #ff6b6b; }
            100% { background-color: #00d4ff; }
        }

        .pad:focus {
            outline: 2px solid #00d4ff;
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="score-display">
            <div>Round: <span id="round">1</span></div>
            <div>Lives: <span id="lives">3</span></div>
        </div>
        <div id="board">
            <div class="pad" data-index="0"></div>
            <div class="pad" data-index="1"></div>
            <div class="pad" data-index="2"></div>
            <div class="pad" data-index="3"></div>
        </div>
        <button id="start-button">Start Game</button>
    </div>

    <div id="game-over">
        <div id="game-over-content">
            <h2>Game Over</h2>
            <div id="final-score">Score: 0</div>
            <button id="restart-button">Play Again</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game state
            const gameState = {
                sequence: [],
                playerSequence: [],
                currentStep: 0,
                round: 1,
                lives: 3,
                isPlaying: false,
                isReplaying: false,
                gameActive: false
            };

            // DOM elements
            const board = document.getElementById('board');
            const pads = document.querySelectorAll('.pad');
            const startButton = document.getElementById('start-button');
            const restartButton = document.getElementById('restart-button');
            const roundDisplay = document.getElementById('round');
            const livesDisplay = document.getElementById('lives');
            const gameOverScreen = document.getElementById('game-over');
            const finalScoreDisplay = document.getElementById('final-score');

            // Pad colors
            const padColors = ['#00d4ff', '#ff6b6b', '#4ecdc4', '#ffd166'];

            // Initialize game
            function initGame() {
                gameState.sequence = [];
                gameState.playerSequence = [];
                gameState.currentStep = 0;
                gameState.round = 1;
                gameState.lives = 3;
                gameState.isPlaying = false;
                gameState.isReplaying = false;
                gameState.gameActive = false;

                updateDisplays();
                hideGameOver();
                startButton.style.display = 'block';
                restartButton.style.display = 'none';
            }

            // Update displays
            function updateDisplays() {
                roundDisplay.textContent = gameState.round;
                livesDisplay.textContent = gameState.lives;
            }

            // Show game over screen
            function showGameOver() {
                finalScoreDisplay.textContent = `Score: ${gameState.round - 1}`;
                gameOverScreen.style.display = 'flex';
            }

            // Hide game over screen
            function hideGameOver() {
                gameOverScreen.style.display = 'none';
            }

            // Add a new pad to the sequence
            function addToSequence() {
                const randomIndex = Math.floor(Math.random() * 4);
                gameState.sequence.push(randomIndex);
            }

            // Play the sequence
            function playSequence() {
                if (gameState.sequence.length === 0) return;
                
                gameState.isPlaying = true;
                let step = 0;
                
                const playStep = () => {
                    if (step >= gameState.sequence.length) {
                        gameState.isPlaying = false;
                        return;
                    }
                    
                    const padIndex = gameState.sequence[step];
                    const pad = document.querySelector(`.pad[data-index="${padIndex}"]`);
                    
                    pad.classList.add('flash-success');
                    setTimeout(() => {
                        pad.classList.remove('flash-success');
                        step++;
                        setTimeout(playStep, 300);
                    }, 300);
                };
                
                setTimeout(playStep, 300);
            }

            // Handle pad click
            function handlePadClick(index) {
                if (!gameState.gameActive || gameState.isPlaying || gameState.isReplaying) return;
                
                const pad = document.querySelector(`.pad[data-index="${index}"]`);
                
                // Check if correct
                if (index === gameState.sequence[gameState.currentStep]) {
                    // Correct input
                    pad.classList.add('flash-success');
                    gameState.currentStep++;
                    
                    setTimeout(() => {
                        pad.classList.remove('flash-success');
                        
                        // Check if sequence completed
                        if (gameState.currentStep >= gameState.sequence.length) {
                            // Move to next round
                            gameState.round++;
                            gameState.currentStep = 0;
                            addToSequence();
                            updateDisplays();
                            
                            // Play next sequence after a delay
                            setTimeout(() => {
                                playSequence();
                            }, 500);
                        }
                    }, 200);
                } else {
                    // Wrong input
                    pad.classList.add('flash-error');
                    gameState.lives--;
                    updateDisplays();
                    
                    if (gameState.lives <= 0) {
                        // Game over
                        showGameOver();
                        gameState.gameActive = false;
                        startButton.style.display = 'block';
                        restartButton.style.display = 'none';
                    } else {
                        // Replay sequence
                        gameState.isReplaying = true;
                        setTimeout(() => {
                            pad.classList.remove('flash-error');
                            playSequence();
                            gameState.isReplaying = false;
                        }, 300);
                    }
                }
            }

            // Start the game
            function startGame() {
                initGame();
                startButton.style.display = 'none';
                restartButton.style.display = 'block';
                gameState.gameActive = true;
                addToSequence();
                playSequence();
            }

            // Event listeners
            startButton.addEventListener('click', startGame);
            restartButton.addEventListener('click', startGame);

            pads.forEach(pad => {
                pad.addEventListener('click', () => {
                    const index = parseInt(pad.getAttribute('data-index'));
                    handlePadClick(index);
                });
                
                pad.addEventListener('keydown', (e) => {
                    if (e.key >= '1' && e.key <= '4') {
                        const index = parseInt(e.key) - 1;
                        handlePadClick(index);
                    }
                });
            });

            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' && !gameState.gameActive) {
                    startGame();
                }
            });

            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
