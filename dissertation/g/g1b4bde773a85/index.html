<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            padding: 20px;
        }
        
        .game-container {
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }
        
        .stat-box {
            color: white;
            font-size: 1.2rem;
        }
        
        .stat-value {
            font-weight: bold;
            font-size: 1.4rem;
            color: #4CAF50;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 15px;
            margin-bottom: 30px;
        }
        
        .pad {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .pad:hover {
            transform: scale(1.05);
        }
        
        .pad:active {
            transform: scale(0.95);
        }
        
        .pad-1 { background-color: #FF5252; }
        .pad-2 { background-color: #448AFF; }
        .pad-3 { background-color: #69F0AE; }
        .pad-4 { background-color: #FFD740; }
        
        .pad.active {
            box-shadow: 0 0 25px currentColor;
            transform: scale(1.05);
        }
        
        .pad.correct {
            box-shadow: 0 0 25px #4CAF50;
            background-color: #4CAF50;
        }
        
        .pad.wrong {
            box-shadow: 0 0 25px #F44336;
            background-color: #F44336;
        }
        
        .controls {
            margin-top: 20px;
        }
        
        button {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        .message {
            color: white;
            font-size: 1.3rem;
            margin: 20px 0;
            min-height: 2rem;
        }
        
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .game-over.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .game-over-content {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            width: 500px;
        }
        
        .game-over h2 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .final-score {
            color: #FFD740;
            font-size: 2rem;
            margin: 20px 0;
        }
        
        .instructions {
            color: #ccc;
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        @media (max-width: 500px) {
            .game-container {
                padding: 15px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .grid {
                grid-gap: 10px;
            }
            
            .pad {
                font-size: 1.5rem;
            }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div class="game-container">
        <h1>PATTERN ECHO</h1>
        
        <div class="stats">
            <div class="stat-box">
                Round: <span id="round" class="stat-value">1</span>
            </div>
            <div class="stat-box">
                Lives: <span id="lives" class="stat-value">3</span>
            </div>
            <div class="stat-box">
                Score: <span id="score" class="stat-value">0</span>
            </div>
        </div>
        
        <div class="grid" id="grid">
            <div class="pad pad-1" data-id="1"></div>
            <div class="pad pad-2" data-id="2"></div>
            <div class="pad pad-3" data-id="3"></div>
            <div class="pad pad-4" data-id="4"></div>
        </div>
        
        <div class="message" id="message">Press START to begin</div>
        
        <div class="controls">
            <button id="start-btn">START</button>
        </div>
        
        <div class="instructions">
            <p>Watch the sequence, then repeat it. Each round adds one more pad.</p>
            <p>Use mouse, touch, or keys 1-4 to play.</p>
        </div>
    </div>
    
    <div class="game-over" id="game-over">
        <div class="game-over-content">
            <h2>GAME OVER</h2>
            <div class="final-score">Score: <span id="final-score">0</span></div>
            <div class="final-score">Round: <span id="final-round">0</span></div>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game elements
            const grid = document.getElementById('grid');
            const startBtn = document.getElementById('start-btn');
            const restartBtn = document.getElementById('restart-btn');
            const messageEl = document.getElementById('message');
            const roundEl = document.getElementById('round');
            const livesEl = document.getElementById('lives');
            const scoreEl = document.getElementById('score');
            const gameOverScreen = document.getElementById('game-over');
            const finalScoreEl = document.getElementById('final-score');
            const finalRoundEl = document.getElementById('final-round');
            
            // Game state
            let sequence = [];
            let playerSequence = [];
            let currentStep = 0;
            let round = 1;
            let lives = 3;
            let score = 0;
            let isPlaying = false;
            let isShowingSequence = false;
            let gameActive = false;
            
            // Pad colors
            const padColors = {
                1: 'pad-1',
                2: 'pad-2',
                3: 'pad-3',
                4: 'pad-4'
            };
            
            // Initialize game
            function initGame() {
                sequence = [];
                playerSequence = [];
                currentStep = 0;
                round = 1;
                lives = 3;
                score = 0;
                isPlaying = false;
                isShowingSequence = false;
                gameActive = false;
                
                updateStats();
                messageEl.textContent = 'Press START to begin';
                startBtn.textContent = 'START';
                gameOverScreen.classList.remove('show');
                
                // Clear any active classes
                document.querySelectorAll('.pad').forEach(pad => {
                    pad.classList.remove('active', 'correct', 'wrong');
                });
            }
            
            // Update stats display
            function updateStats() {
                roundEl.textContent = round;
                livesEl.textContent = lives;
                scoreEl.textContent = score;
            }
            
            // Add a new pad to the sequence
            function addToSequence() {
                const randomPad = Math.floor(Math.random() * 4) + 1;
                sequence.push(randomPad);
            }
            
            // Show the sequence to the player
            function showSequence() {
                isShowingSequence = true;
                currentStep = 0;
                messageEl.textContent = 'Watch the sequence...';
                
                // Disable input during sequence playback
                document.querySelectorAll('.pad').forEach(pad => {
                    pad.style.pointerEvents = 'none';
                });
                
                // Play sequence
                let step = 0;
                const playStep = () => {
                    if (step >= sequence.length) {
                        isShowingSequence = false;
                        messageEl.textContent = 'Repeat the sequence!';
                        // Re-enable input
                        document.querySelectorAll('.pad').forEach(pad => {
                            pad.style.pointerEvents = 'auto';
                        });
                        return;
                    }
                    
                    const padId = sequence[step];
                    const pad = document.querySelector(`.pad[data-id="${padId}"]`);
                    
                    // Highlight pad
                    pad.classList.add('active');
                    setTimeout(() => {
                        pad.classList.remove('active');
                    }, 500);
                    
                    step++;
                    setTimeout(playStep, 600);
                };
                
                setTimeout(playStep, 300);
            }
            
            // Handle player input
            function handlePadClick(padId) {
                if (!gameActive || isShowingSequence) return;
                
                const pad = document.querySelector(`.pad[data-id="${padId}"]`);
                
                // Flash pad
                pad.classList.add('active');
                setTimeout(() => {
                    pad.classList.remove('active');
                }, 200);
                
                // Check if correct
                if (padId === sequence[currentStep]) {
                    // Correct input
                    pad.classList.add('correct');
                    setTimeout(() => {
                        pad.classList.remove('correct');
                    }, 200);
                    
                    playerSequence.push(padId);
                    currentStep++;
                    
                    if (currentStep >= sequence.length) {
                        // Sequence completed
                        score += round;
                        round++;
                        messageEl.textContent = 'Correct! Next round...';
                        setTimeout(() => {
                            addToSequence();
                            showSequence();
                        }, 1000);
                    }
                } else {
                    // Wrong input
                    pad.classList.add('wrong');
                    setTimeout(() => {
                        pad.classList.remove('wrong');
                    }, 300);
                    
                    lives--;
                    updateStats();
                    
                    if (lives <= 0) {
                        // Game over
                        endGame();
                    } else {
                        messageEl.textContent = 'Wrong! Try again...';
                        // Replay sequence after delay
                        setTimeout(() => {
                            showSequence();
                        }, 1000);
                    }
                }
            }
            
            // End the game
            function endGame() {
                gameActive = false;
                messageEl.textContent = 'Game Over!';
                finalScoreEl.textContent = score;
                finalRoundEl.textContent = round - 1;
                gameOverScreen.classList.add('show');
            }
            
            // Start a new game
            function startGame() {
                if (gameActive) return;
                
                initGame();
                gameActive = true;
                isPlaying = true;
                startBtn.textContent = 'RESTART';
                messageEl.textContent = 'Watch the sequence...';
                
                // Add first pad to sequence
                addToSequence();
                showSequence();
            }
            
            // Event listeners
            startBtn.addEventListener('click', startGame);
            
            restartBtn.addEventListener('click', () => {
                startGame();
            });
            
            // Pad click handlers
            document.querySelectorAll('.pad').forEach(pad => {
                pad.addEventListener('click', () => {
                    const padId = parseInt(pad.dataset.id);
                    handlePadClick(padId);
                });
            });
            
            // Keyboard support
            document.addEventListener('keydown', (e) => {
                if (e.key >= '1' && e.key <= '4') {
                    const padId = parseInt(e.key);
                    handlePadClick(padId);
                }
            });
            
            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
