<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #game-canvas {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            display: block;
        }
        
        #score-display {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
        }
        
        #misses-display {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ff5555;
            font-size: 18px;
            text-shadow: 0 0 8px rgba(255, 85, 85, 0.7);
        }
        
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            display: none;
            z-index: 10;
        }
        
        #game-over h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ffcc00;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.7);
        }
        
        #final-score {
            font-size: 36px;
            margin-bottom: 30px;
            color: #4caf50;
        }
        
        #restart-button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        #restart-button:hover {
            background: #45a049;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        #restart-button:active {
            transform: translateY(1px);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
        }
        
        .hit-effect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.7);
            pointer-events: none;
            animation: hitEffect 0.5s forwards;
        }
        
        @keyframes hitEffect {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }
        
        .miss-effect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(244, 67, 54, 0.7);
            pointer-events: none;
            animation: missEffect 0.5s forwards;
        }
        
        @keyframes missEffect {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="500" height="500"></canvas>
        <div id="score-display">Score: 0</div>
        <div id="misses-display">Misses: 0/3</div>
        <div id="game-over">
            <h1>GAME OVER</h1>
            <div id="final-score">Score: 0</div>
            <button id="restart-button">PLAY AGAIN</button>
        </div>
        <div id="instructions">Tap or press SPACE to hit the target</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            const scoreDisplay = document.getElementById('score-display');
            const missesDisplay = document.getElementById('misses-display');
            const gameOverScreen = document.getElementById('game-over');
            const finalScoreDisplay = document.getElementById('final-score');
            const restartButton = document.getElementById('restart-button');
            
            // Game state
            let score = 0;
            let misses = 0;
            let gameRunning = true;
            let targetAngle = 0;
            let targetSize = 0.2; // Fraction of the circle
            let dotAngle = 0;
            let dotSpeed = 0.02;
            let lastTime = 0;
            
            // Center of the circle
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 200;
            
            // Draw the game
            function draw() {
                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw the ring
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 10;
                ctx.stroke();
                
                // Draw the target arc
                const startAngle = targetAngle - targetSize / 2;
                const endAngle = targetAngle + targetSize / 2;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.strokeStyle = '#4caf50';
                ctx.lineWidth = 15;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                // Draw the dot
                const dotX = centerX + Math.cos(dotAngle) * radius;
                const dotY = centerY + Math.sin(dotAngle) * radius;
                
                ctx.beginPath();
                ctx.arc(dotX, dotY, 15, 0, Math.PI * 2);
                ctx.fillStyle = '#ffcc00';
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Draw a glow effect for the dot
                ctx.beginPath();
                ctx.arc(dotX, dotY, 20, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    dotX, dotY, 15,
                    dotX, dotY, 20
                );
                gradient.addColorStop(0, 'rgba(255, 204, 0, 0.5)');
                gradient.addColorStop(1, 'rgba(255, 204, 0, 0)');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            // Update game state
            function update(deltaTime) {
                if (!gameRunning) return;
                
                // Move the dot
                dotAngle += dotSpeed;
                if (dotAngle > Math.PI * 2) dotAngle -= Math.PI * 2;
                
                // Move the target slightly
                targetAngle += 0.005;
                if (targetAngle > Math.PI * 2) targetAngle -= Math.PI * 2;
            }
            
            // Handle a hit
            function hit() {
                // Check if dot is in target
                const dotInTarget = 
                    (dotAngle >= targetAngle - targetSize / 2) && 
                    (dotAngle <= targetAngle + targetSize / 2);
                
                if (dotInTarget) {
                    // Successful hit
                    score++;
                    targetSize *= 0.9; // Shrink target
                    
                    // Add visual feedback
                    createEffect(centerX + Math.cos(dotAngle) * radius, 
                                centerY + Math.sin(dotAngle) * radius, 
                                'hit');
                    
                    // Update UI
                    scoreDisplay.textContent = `Score: ${score}`;
                } else {
                    // Miss
                    misses++;
                    missesDisplay.textContent = `Misses: ${misses}/3`;
                    
                    // Add visual feedback
                    createEffect(centerX + Math.cos(dotAngle) * radius, 
                                centerY + Math.sin(dotAngle) * radius, 
                                'miss');
                    
                    if (misses >= 3) {
                        gameOver();
                    }
                }
            }
            
            // Create visual effect at position
            function createEffect(x, y, type) {
                const effect = document.createElement('div');
                effect.className = type + '-effect';
                effect.style.left = (x - 15) + 'px';
                effect.style.top = (y - 15) + 'px';
                document.getElementById('game-container').appendChild(effect);
                
                // Remove element after animation
                setTimeout(() => {
                    effect.remove();
                }, 500);
            }
            
            // Game over
            function gameOver() {
                gameRunning = false;
                finalScoreDisplay.textContent = `Score: ${score}`;
                gameOverScreen.style.display = 'flex';
            }
            
            // Restart game
            function restart() {
                score = 0;
                misses = 0;
                targetAngle = 0;
                targetSize = 0.2;
                dotAngle = 0;
                gameRunning = true;
                
                scoreDisplay.textContent = `Score: ${score}`;
                missesDisplay.textContent = `Misses: ${misses}/3`;
                gameOverScreen.style.display = 'none';
            }
            
            // Game loop
            function gameLoop(timestamp) {
                if (!lastTime) lastTime = timestamp;
                const deltaTime = timestamp - lastTime;
                lastTime = timestamp;
                
                update(deltaTime);
                draw();
                
                requestAnimationFrame(gameLoop);
            }
            
            // Event listeners
            canvas.addEventListener('click', () => {
                if (gameRunning) hit();
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && gameRunning) {
                    e.preventDefault();
                    hit();
                }
            });
            
            restartButton.addEventListener('click', restart);
            
            // Start the game
            requestAnimationFrame(gameLoop);
        });
    </script>
</body>
</html>
