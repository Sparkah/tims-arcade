<!DOCTYPE html>
<html>
<head>
    <title>Gem Catch Sprint</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
        }
        
        #gameCanvas {
            background-color: #1a1a2e;
            display: block;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 100px;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 24px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.7);
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffff00;
            font-size: 20px;
            text-shadow: 0 0 5px rgba(255, 255, 0, 0.7);
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 600px;
            background-color: rgba(26, 26, 46, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 300ms ease-in-out;
        }
        
        #gameOverScreen.visible {
            opacity: 1;
            pointer-events: all;
        }
        
        #finalScore {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        #restartButton {
            background-color: #00ff88;
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            pointer-events: all;
            transition: background-color 0.2s;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        #restartButton:hover {
            background-color: #00cc6a;
        }
        
        #gem {
            position: absolute;
            border-radius: 50%;
            background-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.7);
        }
        
        #gem::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.8);
        }
        
        #basket {
            position: absolute;
            width: 120px;
            height: 30px;
            background-color: #00ff88;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.7);
        }
        
        #basket:hover {
            background-color: #00ff99;
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="gameContainer">
        <div id="gameCanvas"></div>
        <div id="uiOverlay">
            <div id="scoreDisplay">SCORE: 0</div>
            <div id="timerDisplay">TIME: 45</div>
        </div>
        <div id="gameOverScreen">
            <div id="finalScore">SCORE: 0</div>
            <button id="restartButton">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // Game variables
        const gameContainer = document.getElementById('gameContainer');
        const gameCanvas = document.getElementById('gameCanvas');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');
        
        // Game state
        let score = 0;
        let timeLeft = 45;
        let gameActive = false;
        let basket = null;
        let gem = null;
        let gemY = -40;
        let gemX = 0;
        let basketX = 340;
        let animationId = null;
        let lastTime = 0;
        let gemSpeed = 2;
        
        // Initialize game
        function initGame() {
            // Reset game state
            score = 0;
            timeLeft = 45;
            gameActive = true;
            gemY = -40;
            basketX = 340;
            
            // Update displays
            scoreDisplay.textContent = `SCORE: ${score}`;
            timerDisplay.textContent = `TIME: ${timeLeft}`;
            
            // Hide game over screen
            gameOverScreen.classList.remove('visible');
            
            // Create basket element
            if (basket) {
                basket.remove();
            }
            basket = document.createElement('div');
            basket.id = 'basket';
            basket.style.left = `${basketX}px`;
            basket.style.top = '520px';
            gameContainer.appendChild(basket);
            
            // Create gem element
            if (gem) {
                gem.remove();
            }
            gem = document.createElement('div');
            gem.id = 'gem';
            gem.style.width = '40px';
            gem.style.height = '40px';
            gem.style.left = `${gemX}px`;
            gem.style.top = `${gemY}px`;
            gameContainer.appendChild(gem);
            
            // Start game loop
            lastTime = performance.now();
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Game loop
        function gameLoop(timestamp) {
            if (!gameActive) return;
            
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            // Update game state
            updateGame(deltaTime);
            
            // Render game
            renderGame();
            
            // Continue loop
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Update game state
        function updateGame(deltaTime) {
            // Move gem down
            gemY += gemSpeed;
            
            // Check if gem is caught
            const basketRect = basket.getBoundingClientRect();
            const gemRect = gem.getBoundingClientRect();
            
            if (gemY > 520 - 40 && 
                gemX + 40 > basketRect.left - gameContainer.getBoundingClientRect().left && 
                gemX < basketRect.right - gameContainer.getBoundingClientRect().left) {
                // Gem caught
                score++;
                scoreDisplay.textContent = `SCORE: ${score}`;
                
                // Animate catch
                gem.style.transform = 'scale(1.2)';
                gem.style.opacity = '0';
                
                setTimeout(() => {
                    // Reset gem position
                    gemY = -40;
                    gemX = Math.random() * 720 + 40;
                    gem.style.transform = 'scale(1)';
                    gem.style.opacity = '1';
                }, 200);
            }
            
            // Check if gem is missed
            if (gemY > 600) {
                // Gem missed - just reset position
                gemY = -40;
                gemX = Math.random() * 720 + 40;
            }
            
            // Update timer
            if (deltaTime > 0) {
                timeLeft -= deltaTime / 1000;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    endGame();
                }
                timerDisplay.textContent = `TIME: ${Math.ceil(timeLeft)}`;
            }
        }
        
        // Render game
        function renderGame() {
            // Update gem position
            gem.style.left = `${gemX}px`;
            gem.style.top = `${gemY}px`;
            
            // Update basket position
            basket.style.left = `${basketX}px`;
        }
        
        // End game
        function endGame() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            
            // Show game over screen
            finalScore.textContent = `SCORE: ${score}`;
            gameOverScreen.classList.add('visible');
        }
        
        // Handle keyboard input
        function handleKeyDown(e) {
            if (!gameActive) return;
            
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                basketX = Math.max(0, basketX - 20);
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                basketX = Math.min(680, basketX + 20);
            }
        }
        
        // Handle mouse/touch movement
        function handleMouseMove(e) {
            if (!gameActive) return;
            
            const rect = gameContainer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            basketX = Math.max(0, Math.min(680, x - 60));
        }
        
        function handleTouchMove(e) {
            if (!gameActive) return;
            
            e.preventDefault();
            const rect = gameContainer.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            basketX = Math.max(0, Math.min(680, x - 60));
        }
        
        // Event listeners
        document.addEventListener('keydown', handleKeyDown);
        gameContainer.addEventListener('mousemove', handleMouseMove);
        gameContainer.addEventListener('touchmove', handleTouchMove, { passive: false });
        restartButton.addEventListener('click', initGame);
        
        // Start the game
        initGame();
    </script>
</body>
</html>
