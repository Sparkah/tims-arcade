<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        
        #gameCanvas {
            background-color: #f0f8ff;
            display: block;
        }
        
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }
        
        #titleScreen {
            background-color: rgba(240, 248, 255, 0.95);
        }
        
        #gameOverScreen {
            background-color: rgba(240, 248, 255, 0.95);
            display: none;
        }
        
        h1 {
            font-size: 32px;
            font-weight: bold;
            color: #2d3436;
            margin-bottom: 30px;
        }
        
        .score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #2d3436;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 5;
        }
        
        .timer-display {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #2d3436;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 5;
        }
        
        #startButton, #restartButton {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            transition: all 150ms ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        #startButton:hover, #restartButton:hover {
            background-color: #ffd93d;
            transform: scale(1.05);
        }
        
        #startButton:focus, #restartButton:focus {
            outline: 2px solid #ffd93d;
            outline-offset: 2px;
        }
        
        #finalScore {
            font-size: 28px;
            font-weight: bold;
            color: #2d3436;
            margin: 20px 0;
        }
        
        .gem {
            position: absolute;
            border-radius: 50%;
            background-color: #4ecdc4;
            box-shadow: 0 0 8px rgba(78, 205, 196, 0.5);
            z-index: 2;
        }
        
        .basket {
            position: absolute;
            background-color: #ff6b6b;
            border-radius: 5px;
            z-index: 3;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="gameContainer">
        <div id="titleScreen" class="screen">
            <h1>Gem Catch Sprint</h1>
            <p>Move the basket to catch falling gems!</p>
            <p>Score as many points as you can in 45 seconds.</p>
            <button id="startButton">Start Game</button>
        </div>
        
        <div id="gameOverScreen" class="screen">
            <h1>Game Over!</h1>
            <div id="finalScore">Score: 0</div>
            <button id="restartButton">Play Again</button>
        </div>
        
        <div class="score-display">Score: <span id="score">0</span></div>
        <div class="timer-display">Time: <span id="timer">45</span>s</div>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        // Game constants
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const BASKET_WIDTH = 120;
        const BASKET_HEIGHT = 40;
        const BASKET_Y = CANVAS_HEIGHT - 40;
        const GEM_SIZE = 60;
        const GEM_SPEED = 100; // pixels per second
        const GAME_DURATION = 45; // seconds
        
        // Game state
        const gameState = {
            score: 0,
            timeLeft: GAME_DURATION,
            gameRunning: false,
            gems: [],
            basket: {
                x: CANVAS_WIDTH / 2 - BASKET_WIDTH / 2,
                y: BASKET_Y,
                width: BASKET_WIDTH,
                height: BASKET_HEIGHT
            },
            lastTime: 0,
            animationId: null
        };
        
        // DOM elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const titleScreen = document.getElementById('titleScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const finalScoreElement = document.getElementById('finalScore');
        
        // Initialize game
        function initGame() {
            gameState.score = 0;
            gameState.timeLeft = GAME_DURATION;
            gameState.gameRunning = true;
            gameState.gems = [];
            gameState.basket.x = CANVAS_WIDTH / 2 - BASKET_WIDTH / 2;
            
            scoreElement.textContent = gameState.score;
            timerElement.textContent = gameState.timeLeft;
            
            // Create first gem
            createGem();
            
            // Start game loop
            if (gameState.animationId) {
                cancelAnimationFrame(gameState.animationId);
            }
            gameState.lastTime = performance.now();
            gameState.animationId = requestAnimationFrame(gameLoop);
        }
        
        // Create a new gem
        function createGem() {
            const gem = {
                x: Math.random() * (CANVAS_WIDTH - GEM_SIZE),
                y: -GEM_SIZE,
                size: GEM_SIZE,
                speed: GEM_SPEED
            };
            gameState.gems.push(gem);
        }
        
        // Check collision between gem and basket
        function checkCollision(gem, basket) {
            // Simple rectangle collision detection
            return gem.x < basket.x + basket.width &&
                   gem.x + gem.size > basket.x &&
                   gem.y < basket.y + basket.height &&
                   gem.y + gem.size > basket.y;
        }
        
        // Update game state
        function update(deltaTime) {
            if (!gameState.gameRunning) return;
            
            // Update timer
            gameState.timeLeft -= deltaTime / 1000;
            if (gameState.timeLeft <= 0) {
                gameState.timeLeft = 0;
                endGame();
                return;
            }
            timerElement.textContent = Math.ceil(gameState.timeLeft);
            
            // Update gems
            for (let i = gameState.gems.length - 1; i >= 0; i--) {
                const gem = gameState.gems[i];
                gem.y += gem.speed * (deltaTime / 1000);
                
                // Check if gem is caught
                if (checkCollision(gem, gameState.basket)) {
                    gameState.score++;
                    scoreElement.textContent = gameState.score;
                    gameState.gems.splice(i, 1);
                    createGem();
                }
                // Remove gem if it goes off screen
                else if (gem.y > CANVAS_HEIGHT) {
                    gameState.gems.splice(i, 1);
                    createGem();
                }
            }
        }
        
        // Render game
        function render() {
            // Clear canvas
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw basket
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(gameState.basket.x, gameState.basket.y, 
                        gameState.basket.width, gameState.basket.height);
            
            // Draw gems
            ctx.fillStyle = '#4ecdc4';
            ctx.shadowColor = 'rgba(78, 205, 196, 0.5)';
            ctx.shadowBlur = 8;
            
            for (const gem of gameState.gems) {
                ctx.beginPath();
                ctx.arc(gem.x + gem.size/2, gem.y + gem.size/2, gem.size/2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Reset shadow
            ctx.shadowBlur = 0;
        }
        
        // Game loop
        function gameLoop(timestamp) {
            const deltaTime = timestamp - gameState.lastTime;
            gameState.lastTime = timestamp;
            
            update(deltaTime);
            render();
            
            if (gameState.gameRunning) {
                gameState.animationId = requestAnimationFrame(gameLoop);
            }
        }
        
        // End game
        function endGame() {
            gameState.gameRunning = false;
            if (gameState.animationId) {
                cancelAnimationFrame(gameState.animationId);
            }
            finalScoreElement.textContent = `Score: ${gameState.score}`;
            gameOverScreen.style.display = 'flex';
        }
        
        // Event listeners
        startButton.addEventListener('click', () => {
            titleScreen.classList.add('hidden');
            initGame();
        });
        
        restartButton.addEventListener('click', () => {
            gameOverScreen.classList.add('hidden');
            initGame();
        });
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameState.gameRunning) return;
            
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                gameState.basket.x = Math.max(0, gameState.basket.x - 20);
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                gameState.basket.x = Math.min(CANVAS_WIDTH - BASKET_WIDTH, gameState.basket.x + 20);
            }
        });
        
        // Mouse controls
        let isDragging = false;
        
        canvas.addEventListener('mousedown', (e) => {
            if (!gameState.gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            
            // Check if click is on basket
            if (mouseX >= gameState.basket.x && 
                mouseX <= gameState.basket.x + BASKET_WIDTH) {
                isDragging = true;
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (!gameState.gameRunning || !isDragging) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            
            gameState.basket.x = Math.max(0, Math.min(CANVAS_WIDTH - BASKET_WIDTH, mouseX - BASKET_WIDTH/2));
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });
        
        // Touch controls
        canvas.addEventListener('touchstart', (e) => {
            if (!gameState.gameRunning) return;
            
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const touchX = touch.clientX - rect.left;
            
            // Check if touch is on basket
            if (touchX >= gameState.basket.x && 
                touchX <= gameState.basket.x + BASKET_WIDTH) {
                isDragging = true;
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            if (!gameState.gameRunning || !isDragging) return;
            
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const touchX = touch.clientX - rect.left;
            
            gameState.basket.x = Math.max(0, Math.min(CANVAS_WIDTH - BASKET_WIDTH, touchX - BASKET_WIDTH/2));
        });
        
        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });
    </script>
</body>
</html>
