<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }
        
        .game-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        
        .status {
            font-size: 1.5rem;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .board {
            width: 300px;
            height: 300px;
            margin: 0 auto 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            background-color: #333333;
            border-radius: 8px;
            padding: 10px;
        }
        
        .pad {
            background-color: #333333;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
        }
        
        .pad:hover {
            background-color: #444444;
        }
        
        .pad:active {
            transform: scale(0.95);
        }
        
        .pad.highlight {
            background-color: #4a90e2;
        }
        
        .pad.error {
            background-color: #e74c3c;
        }
        
        .pad.correct {
            background-color: #4a90e2;
        }
        
        .controls {
            margin: 20px 0;
        }
        
        button {
            background-color: #333333;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 10px 0;
            width: 120px;
            transition: background-color 0.2s;
        }
        
        button:hover {
            background-color: #444444;
        }
        
        button:focus {
            outline: 2px solid #4a90e2;
        }
        
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
        }
        
        .game-over-content {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 90%;
        }
        
        .game-over h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        .game-over p {
            font-size: 1.5rem;
            margin: 10px 0;
        }
        
        .hidden {
            display: none;
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div class="game-container">
        <div class="status">
            <div>Round: <span id="round">1</span></div>
            <div>Lives: <span id="lives">3</span></div>
        </div>
        
        <div class="board" id="board">
            <div class="pad" data-index="0"></div>
            <div class="pad" data-index="1"></div>
            <div class="pad" data-index="2"></div>
            <div class="pad" data-index="3"></div>
        </div>
        
        <div class="controls">
            <button id="start-btn">Start</button>
            <button id="restart-btn" class="hidden">Restart</button>
        </div>
    </div>
    
    <div id="game-over" class="game-over hidden">
        <div class="game-over-content">
            <h2>Game Over</h2>
            <p>Round: <span id="final-round">0</span></p>
            <p>Score: <span id="final-score">0</span></p>
            <button id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game elements
            const board = document.getElementById('board');
            const startBtn = document.getElementById('start-btn');
            const restartBtn = document.getElementById('restart-btn');
            const playAgainBtn = document.getElementById('play-again-btn');
            const gameOverScreen = document.getElementById('game-over');
            const roundDisplay = document.getElementById('round');
            const livesDisplay = document.getElementById('lives');
            const finalRoundDisplay = document.getElementById('final-round');
            const finalScoreDisplay = document.getElementById('final-score');
            
            // Game state
            let sequence = [];
            let playerSequence = [];
            let round = 1;
            let lives = 3;
            let isPlaying = false;
            let isShowingSequence = false;
            let currentSequenceIndex = 0;
            
            // Pad elements
            const pads = document.querySelectorAll('.pad');
            
            // Initialize game
            function initGame() {
                sequence = [];
                playerSequence = [];
                round = 1;
                lives = 3;
                isPlaying = false;
                isShowingSequence = false;
                currentSequenceIndex = 0;
                
                updateDisplays();
                hideGameOver();
                startBtn.classList.remove('hidden');
                restartBtn.classList.add('hidden');
                
                // Clear pad states
                pads.forEach(pad => {
                    pad.classList.remove('highlight', 'error', 'correct');
                });
            }
            
            // Update displays
            function updateDisplays() {
                roundDisplay.textContent = round;
                livesDisplay.textContent = lives;
            }
            
            // Show game over screen
            function showGameOver() {
                finalRoundDisplay.textContent = round;
                finalScoreDisplay.textContent = round;
                gameOverScreen.classList.remove('hidden');
            }
            
            // Hide game over screen
            function hideGameOver() {
                gameOverScreen.classList.add('hidden');
            }
            
            // Add a new pad to the sequence
            function addToSequence() {
                const randomIndex = Math.floor(Math.random() * 4);
                sequence.push(randomIndex);
            }
            
            // Show the sequence to the player
            function showSequence() {
                isShowingSequence = true;
                currentSequenceIndex = 0;
                
                // Disable pad clicks during sequence playback
                pads.forEach(pad => {
                    pad.style.pointerEvents = 'none';
                });
                
                // Show sequence
                const showNextPad = () => {
                    if (currentSequenceIndex >= sequence.length) {
                        // Sequence finished, enable pad clicks
                        pads.forEach(pad => {
                            pad.style.pointerEvents = 'auto';
                        });
                        isShowingSequence = false;
                        return;
                    }
                    
                    const padIndex = sequence[currentSequenceIndex];
                    const pad = pads[padIndex];
                    
                    // Highlight pad
                    pad.classList.add('highlight');
                    
                    setTimeout(() => {
                        pad.classList.remove('highlight');
                        currentSequenceIndex++;
                        setTimeout(showNextPad, 300);
                    }, 500);
                };
                
                setTimeout(showNextPad, 300);
            }
            
            // Handle player input
            function handlePadClick(index) {
                if (isShowingSequence || !isPlaying) return;
                
                // Add to player sequence
                playerSequence.push(index);
                
                // Visual feedback
                const pad = pads[index];
                pad.classList.add('correct');
                setTimeout(() => {
                    pad.classList.remove('correct');
                }, 150);
                
                // Check if correct
                const correctIndex = playerSequence.length - 1;
                if (playerSequence[correctIndex] !== sequence[correctIndex]) {
                    // Wrong input
                    pad.classList.add('error');
                    lives--;
                    updateDisplays();
                    
                    setTimeout(() => {
                        pad.classList.remove('error');
                        if (lives <= 0) {
                            // Game over
                            isPlaying = false;
                            showGameOver();
                        } else {
                            // Replay sequence
                            playerSequence = [];
                            showSequence();
                        }
                    }, 200);
                } else {
                    // Correct input
                    if (playerSequence.length === sequence.length) {
                        // Round complete
                        round++;
                        playerSequence = [];
                        updateDisplays();
                        
                        // Add new pad to sequence
                        addToSequence();
                        
                        // Show new sequence after a delay
                        setTimeout(() => {
                            showSequence();
                        }, 500);
                    }
                }
            }
            
            // Start a new game
            function startGame() {
                initGame();
                isPlaying = true;
                startBtn.classList.add('hidden');
                restartBtn.classList.remove('hidden');
                
                // Add first pad to sequence
                addToSequence();
                
                // Show the sequence
                showSequence();
            }
            
            // Event listeners
            startBtn.addEventListener('click', startGame);
            
            restartBtn.addEventListener('click', () => {
                initGame();
                startGame();
            });
            
            playAgainBtn.addEventListener('click', () => {
                initGame();
                startGame();
            });
            
            // Pad click handlers
            pads.forEach((pad, index) => {
                pad.addEventListener('click', () => {
                    handlePadClick(index);
                });
            });
            
            // Keyboard controls (keys 1-4)
            document.addEventListener('keydown', (e) => {
                const key = parseInt(e.key);
                if (key >= 1 && key <= 4) {
                    handlePadClick(key - 1);
                }
            });
            
            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
