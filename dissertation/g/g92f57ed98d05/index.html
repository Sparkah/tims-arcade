<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            padding: 20px;
        }
        
        #game-container {
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        #stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
        }
        
        #pad-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 15px;
            margin-bottom: 30px;
        }
        
        .pad {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .pad:hover {
            transform: scale(1.05);
        }
        
        .pad:active {
            transform: scale(0.95);
        }
        
        #start-button {
            background: linear-gradient(to right, #4CAF50, #8BC34A);
            border: none;
            border-radius: 50px;
            color: white;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        #start-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        #start-button:active {
            transform: translateY(1px);
        }
        
        #game-over {
            display: none;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
            color: white;
        }
        
        #game-over h2 {
            color: #ff5252;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        
        #final-score {
            font-size: 1.5rem;
            margin: 20px 0;
        }
        
        .highlight {
            animation: highlight 0.5s ease;
        }
        
        .error {
            animation: error 0.3s ease;
        }
        
        @keyframes highlight {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.7; transform: scale(1); }
        }
        
        @keyframes error {
            0% { background-color: #ff5252; transform: scale(1); }
            25% { background-color: #ff1744; transform: scale(1.1); }
            50% { background-color: #ff5252; transform: scale(1); }
            75% { background-color: #ff1744; transform: scale(1.1); }
            100% { background-color: #ff5252; transform: scale(1); }
        }
        
        .pad-1 { background: linear-gradient(135deg, #FF5252, #FF1744); }
        .pad-2 { background: linear-gradient(135deg, #448AFF, #2979FF); }
        .pad-3 { background: linear-gradient(135deg, #69F0AE, #00E676); }
        .pad-4 { background: linear-gradient(135deg, #FFD740, #FFAB00); }
        
        .pad-1.highlight { background: linear-gradient(135deg, #FF1744, #FF5252); }
        .pad-2.highlight { background: linear-gradient(135deg, #2979FF, #448AFF); }
        .pad-3.highlight { background: linear-gradient(135deg, #00E676, #69F0AE); }
        .pad-4.highlight { background: linear-gradient(135deg, #FFAB00, #FFD740); }
        
        .pad-1.error { background: linear-gradient(135deg, #FF1744, #FF5252); }
        .pad-2.error { background: linear-gradient(135deg, #2979FF, #448AFF); }
        .pad-3.error { background: linear-gradient(135deg, #00E676, #69F0AE); }
        .pad-4.error { background: linear-gradient(135deg, #FFAB00, #FFD740); }
        
        .instructions {
            color: #ccc;
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .key-hint {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 2px;
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="game-container">
        <h1>PATTERN ECHO</h1>
        
        <div id="stats">
            <div>Round: <span id="round">1</span></div>
            <div>Lives: <span id="lives">3</span></div>
            <div>Score: <span id="score">0</span></div>
        </div>
        
        <div id="pad-grid">
            <div class="pad pad-1" data-id="1"></div>
            <div class="pad pad-2" data-id="2"></div>
            <div class="pad pad-3" data-id="3"></div>
            <div class="pad pad-4" data-id="4"></div>
        </div>
        
        <button id="start-button">START GAME</button>
        
        <div class="instructions">
            <p>Watch the sequence, then repeat it. Use keys 1-4 or click the pads.</p>
        </div>
        
        <div id="game-over">
            <h2>GAME OVER</h2>
            <p>You reached round <span id="final-round">1</span></p>
            <p>Final score: <span id="final-score">0</span></p>
            <button id="restart-button">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game elements
            const padGrid = document.getElementById('pad-grid');
            const startButton = document.getElementById('start-button');
            const restartButton = document.getElementById('restart-button');
            const roundDisplay = document.getElementById('round');
            const livesDisplay = document.getElementById('lives');
            const scoreDisplay = document.getElementById('score');
            const gameOverScreen = document.getElementById('game-over');
            const finalRoundDisplay = document.getElementById('final-round');
            const finalScoreDisplay = document.getElementById('final-score');
            
            // Game state
            let sequence = [];
            let playerSequence = [];
            let currentStep = 0;
            let round = 1;
            let lives = 3;
            let score = 0;
            let isPlayingSequence = false;
            let gameActive = false;
            
            // Pad elements
            const pads = document.querySelectorAll('.pad');
            
            // Initialize game
            function initGame() {
                sequence = [];
                playerSequence = [];
                currentStep = 0;
                round = 1;
                lives = 3;
                score = 0;
                isPlayingSequence = false;
                gameActive = false;
                
                updateStats();
                gameOverScreen.style.display = 'none';
                startButton.style.display = 'block';
                
                // Reset pad colors
                pads.forEach(pad => {
                    pad.classList.remove('highlight', 'error');
                });
            }
            
            // Update stats display
            function updateStats() {
                roundDisplay.textContent = round;
                livesDisplay.textContent = lives;
                scoreDisplay.textContent = score;
            }
            
            // Generate a random pad ID (1-4)
            function getRandomPad() {
                return Math.floor(Math.random() * 4) + 1;
            }
            
            // Add a new pad to the sequence
            function addToSequence() {
                sequence.push(getRandomPad());
            }
            
            // Play the sequence
            function playSequence() {
                isPlayingSequence = true;
                playerSequence = [];
                currentStep = 0;
                
                // Disable pad interaction during sequence playback
                pads.forEach(pad => {
                    pad.style.pointerEvents = 'none';
                });
                
                let step = 0;
                
                const playStep = () => {
                    if (step >= sequence.length) {
                        isPlayingSequence = false;
                        pads.forEach(pad => {
                            pad.style.pointerEvents = 'auto';
                        });
                        return;
                    }
                    
                    const padId = sequence[step];
                    const pad = document.querySelector(`.pad[data-id="${padId}"]`);
                    
                    // Highlight the pad
                    pad.classList.add('highlight');
                    
                    setTimeout(() => {
                        pad.classList.remove('highlight');
                        step++;
                        setTimeout(playStep, 300);
                    }, 500);
                };
                
                setTimeout(playStep, 300);
            }
            
            // Handle pad click
            function handlePadClick(padId) {
                if (isPlayingSequence || !gameActive) return;
                
                const pad = document.querySelector(`.pad[data-id="${padId}"]`);
                
                // Check if correct pad
                if (sequence[currentStep] === padId) {
                    // Correct pad
                    pad.classList.add('highlight');
                    setTimeout(() => {
                        pad.classList.remove('highlight');
                    }, 300);
                    
                    playerSequence.push(padId);
                    currentStep++;
                    
                    if (currentStep === sequence.length) {
                        // Sequence completed
                        score += round;
                        round++;
                        updateStats();
                        
                        // Add a new pad to sequence
                        addToSequence();
                        
                        // Play next sequence after a delay
                        setTimeout(() => {
                            playSequence();
                        }, 500);
                    }
                } else {
                    // Wrong pad
                    pad.classList.add('error');
                    lives--;
                    updateStats();
                    
                    setTimeout(() => {
                        pad.classList.remove('error');
                    }, 300);
                    
                    if (lives <= 0) {
                        // Game over
                        endGame();
                    } else {
                        // Replay current sequence
                        setTimeout(() => {
                            playSequence();
                        }, 500);
                    }
                }
            }
            
            // Start the game
            function startGame() {
                initGame();
                gameActive = true;
                startButton.style.display = 'none';
                
                // Start with first sequence
                addToSequence();
                playSequence();
            }
            
            // End the game
            function endGame() {
                gameActive = false;
                finalRoundDisplay.textContent = round;
                finalScoreDisplay.textContent = score;
                gameOverScreen.style.display = 'block';
            }
            
            // Event listeners
            startButton.addEventListener('click', startGame);
            restartButton.addEventListener('click', startGame);
            
            // Pad click events
            pads.forEach(pad => {
                pad.addEventListener('click', () => {
                    const padId = parseInt(pad.dataset.id);
                    handlePadClick(padId);
                });
            });
            
            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                const key = parseInt(e.key);
                if (key >= 1 && key <= 4) {
                    handlePadClick(key);
                }
            });
            
            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
