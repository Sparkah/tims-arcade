<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }
        
        #game-container {
            text-align: center;
            padding: 20px;
        }
        
        #title-screen, #game-over-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        
        #game-over-screen {
            display: none;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        #score-display, #lives-display {
            font-size: 1.5rem;
            font-weight: normal;
            margin: 10px 0;
        }
        
        #board {
            display: grid;
            grid-template-columns: repeat(2, 140px);
            grid-template-rows: repeat(2, 140px);
            gap: 10px;
            margin: 20px auto;
            width: 300px;
            height: 300px;
            padding: 20px;
            background-color: #222222;
            border-radius: 10px;
        }
        
        .pad {
            background-color: #333333;
            border: 2px solid #555555;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            transition: background-color 0.1s;
        }
        
        .pad:hover {
            background-color: #444444;
        }
        
        .pad.active {
            background-color: #4a90e2;
        }
        
        .pad.correct {
            background-color: #7ed321;
        }
        
        .pad.wrong {
            background-color: #e74c3c;
        }
        
        #start-button, #restart-button {
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            width: 120px;
            transition: background-color 0.2s;
        }
        
        #start-button:hover, #restart-button:hover {
            background-color: #357abd;
        }
        
        #start-button:focus, #restart-button:focus {
            outline: 2px solid #4a90e2;
        }
        
        .hidden {
            display: none;
        }
        
        .flash {
            animation: flash 150ms ease-out;
        }
        
        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        .sequence-flash {
            animation: sequenceFlash 500ms ease-out;
        }
        
        @keyframes sequenceFlash {
            0% { background-color: #333333; }
            50% { background-color: #4a90e2; }
            100% { background-color: #333333; }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="title-screen">
            <h1>Pattern Echo</h1>
            <button id="start-button">Start Game</button>
        </div>
        
        <div id="game-screen" class="hidden">
            <div id="score-display">Round: 1</div>
            <div id="lives-display">Lives: 3</div>
            <div id="board">
                <div class="pad" data-index="0">1</div>
                <div class="pad" data-index="1">2</div>
                <div class="pad" data-index="2">3</div>
                <div class="pad" data-index="3">4</div>
            </div>
        </div>
        
        <div id="game-over-screen">
            <h1>Game Over</h1>
            <div id="final-score">Score: 0</div>
            <button id="restart-button">Play Again</button>
        </div>
    </div>

    <script>
        // Game state
        const gameState = {
            round: 1,
            lives: 3,
            sequence: [],
            playerSequence: [],
            isPlaying: false,
            isReplaying: false,
            currentSequenceIndex: 0,
            pads: document.querySelectorAll('.pad')
        };

        // DOM elements
        const titleScreen = document.getElementById('title-screen');
        const gameScreen = document.getElementById('game-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startButton = document.getElementById('start-button');
        const restartButton = document.getElementById('restart-button');
        const scoreDisplay = document.getElementById('score-display');
        const livesDisplay = document.getElementById('lives-display');
        const finalScore = document.getElementById('final-score');
        const board = document.getElementById('board');

        // Initialize game
        function initGame() {
            gameState.round = 1;
            gameState.lives = 3;
            gameState.sequence = [];
            gameState.playerSequence = [];
            gameState.isPlaying = false;
            gameState.isReplaying = false;
            gameState.currentSequenceIndex = 0;
            
            updateDisplays();
            titleScreen.classList.remove('hidden');
            gameScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
        }

        // Update score and lives displays
        function updateDisplays() {
            scoreDisplay.textContent = `Round: ${gameState.round}`;
            livesDisplay.textContent = `Lives: ${gameState.lives}`;
        }

        // Start a new game
        function startGame() {
            titleScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            generateSequence();
            playSequence();
        }

        // Generate a new sequence
        function generateSequence() {
            gameState.sequence = [];
            // Start with one pad
            gameState.sequence.push(Math.floor(Math.random() * 4));
            
            // Add pads for each round
            for (let i = 1; i < gameState.round; i++) {
                gameState.sequence.push(Math.floor(Math.random() * 4));
            }
            
            gameState.playerSequence = [];
            gameState.currentSequenceIndex = 0;
        }

        // Play the sequence
        async function playSequence() {
            gameState.isPlaying = true;
            gameState.isReplaying = false;
            
            for (let i = 0; i < gameState.sequence.length; i++) {
                const padIndex = gameState.sequence[i];
                const pad = document.querySelector(`.pad[data-index="${padIndex}"]`);
                
                // Highlight pad
                pad.classList.add('active');
                await sleep(500);
                pad.classList.remove('active');
                await sleep(200);
            }
            
            gameState.isPlaying = false;
        }

        // Handle pad click
        function handlePadClick(index) {
            if (gameState.isPlaying || gameState.isReplaying) return;
            
            const pad = document.querySelector(`.pad[data-index="${index}"]`);
            
            // Check if correct
            if (index === gameState.sequence[gameState.currentSequenceIndex]) {
                // Correct input
                pad.classList.add('correct', 'flash');
                gameState.currentSequenceIndex++;
                
                // Move to next sequence position
                if (gameState.currentSequenceIndex >= gameState.sequence.length) {
                    // Sequence completed
                    setTimeout(() => {
                        pad.classList.remove('correct', 'flash');
                        gameState.round++;
                        updateDisplays();
                        generateSequence();
                        playSequence();
                    }, 200);
                } else {
                    // Continue with current sequence
                    setTimeout(() => {
                        pad.classList.remove('correct', 'flash');
                    }, 200);
                }
            } else {
                // Wrong input
                pad.classList.add('wrong', 'flash');
                gameState.lives--;
                updateDisplays();
                
                if (gameState.lives <= 0) {
                    // Game over
                    endGame();
                } else {
                    // Replay sequence
                    gameState.isReplaying = true;
                    setTimeout(() => {
                        pad.classList.remove('wrong', 'flash');
                        playSequence();
                    }, 200);
                }
            }
        }

        // End the game
        function endGame() {
            gameScreen.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
            finalScore.textContent = `Score: ${gameState.round - 1}`;
        }

        // Sleep function for delays
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Keyboard support
        function handleKeyDown(e) {
            if (e.key >= '1' && e.key <= '4') {
                const index = parseInt(e.key) - 1;
                handlePadClick(index);
            }
        }

        // Event listeners
        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', initGame);
        document.addEventListener('keydown', handleKeyDown);
        
        // Pad click handlers
        gameState.pads.forEach(pad => {
            pad.addEventListener('click', () => {
                const index = parseInt(pad.getAttribute('data-index'));
                handlePadClick(index);
            });
        });

        // Initialize the game
        initGame();
    </script>
</body>
</html>
