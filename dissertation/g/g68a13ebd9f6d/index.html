<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .game-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-gap: 10px;
            margin-bottom: 30px;
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }

        .pad {
            background-color: #333333;
            border: 2px solid #555555;
            border-radius: 8px;
            cursor: pointer;
            transition: all 150ms ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            user-select: none;
        }

        .pad:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(255, 255, 255, 0.2);
        }

        .pad:active {
            transform: translateY(2px);
        }

        .pad.red { background-color: #f44336; }
        .pad.blue { background-color: #2196f3; }
        .pad.green { background-color: #4caf50; }
        .pad.yellow { background-color: #ffeb3b; }

        .pad.highlight {
            background-color: #ffffff;
            border: 3px solid #ffffff;
        }

        .pad.correct {
            background-color: #4caf50;
            animation: flash 100ms ease-out;
        }

        .pad.incorrect {
            background-color: #f44336;
            animation: flash 100ms ease-out;
        }

        @keyframes flash {
            0% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            padding: 12px 20px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 150ms ease;
            background-color: #444444;
            color: #ffffff;
        }

        .btn:hover {
            background-color: #555555;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(2px);
        }

        .btn-start {
            background-color: #2196f3;
        }

        .btn-start:hover {
            background-color: #1976d2;
        }

        .btn-restart {
            background-color: #4caf50;
        }

        .btn-restart:hover {
            background-color: #388e3c;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-over-content {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 90%;
            width: 300px;
        }

        .game-over h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #f44336;
        }

        .final-score {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #ccc;
        }

        .instructions p {
            margin-bottom: 10px;
        }

        .key-label {
            display: inline-block;
            background-color: #333;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 2px;
        }

        @media (max-width: 480px) {
            .game-board {
                width: 250px;
                height: 250px;
            }
            
            .pad {
                width: 115px;
                height: 115px;
            }
            
            .game-title {
                font-size: 2rem;
            }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">Pattern Echo</h1>
        
        <div class="game-info">
            <div class="lives">Lives: <span id="lives">3</span></div>
            <div class="score">Score: <span id="score">0</span></div>
        </div>
        
        <div class="game-board" id="game-board">
            <div class="pad red" data-key="1" data-color="red"></div>
            <div class="pad blue" data-key="2" data-color="blue"></div>
            <div class="pad green" data-key="3" data-color="green"></div>
            <div class="pad yellow" data-key="4" data-color="yellow"></div>
        </div>
        
        <div class="controls">
            <button class="btn btn-start" id="start-btn">Start Game</button>
            <button class="btn btn-restart" id="restart-btn" style="display: none;">Play Again</button>
        </div>
        
        <div class="instructions">
            <p>Watch the sequence, remember it, and repeat it!</p>
            <p>Use keys 1-4 or click/tap pads</p>
        </div>
    </div>
    
    <div class="game-over" id="game-over" style="display: none;">
        <div class="game-over-content">
            <h2>Game Over!</h2>
            <div class="final-score">You reached round <span id="final-round">1</span></div>
            <div class="final-score">Final Score: <span id="final-score">0</span></div>
            <button class="btn btn-restart" id="final-restart">Play Again</button>
        </div>
    </div>

    <script>
        // Game state
        const gameState = {
            lives: 3,
            score: 0,
            round: 1,
            sequence: [],
            playerSequence: [],
            isPlayingSequence: false,
            isPlayerInputEnabled: false,
            currentSequenceIndex: 0,
            gameActive: false
        };

        // DOM elements
        const gameBoard = document.getElementById('game-board');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const finalRestartBtn = document.getElementById('final-restart');
        const livesDisplay = document.getElementById('lives');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over');
        const finalRoundDisplay = document.getElementById('final-round');
        const finalScoreDisplay = document.getElementById('final-score');

        // Pad colors mapping
        const padColors = {
            '1': 'red',
            '2': 'blue',
            '3': 'green',
            '4': 'yellow'
        };

        // Pad elements
        const pads = document.querySelectorAll('.pad');

        // Initialize game
        function initGame() {
            gameState.lives = 3;
            gameState.score = 0;
            gameState.round = 1;
            gameState.sequence = [];
            gameState.playerSequence = [];
            gameState.isPlayingSequence = false;
            gameState.isPlayerInputEnabled = false;
            gameState.currentSequenceIndex = 0;
            gameState.gameActive = false;
            
            updateDisplays();
            hideGameOver();
            startBtn.style.display = 'block';
            restartBtn.style.display = 'none';
            
            // Reset pad styles
            pads.forEach(pad => {
                pad.classList.remove('highlight', 'correct', 'incorrect');
            });
        }

        // Update displays
        function updateDisplays() {
            livesDisplay.textContent = gameState.lives;
            scoreDisplay.textContent = gameState.score;
        }

        // Start the game
        function startGame() {
            gameState.gameActive = true;
            startBtn.style.display = 'none';
            restartBtn.style.display = 'block';
            generateSequence();
            playSequence();
        }

        // Generate a new sequence
        function generateSequence() {
            gameState.sequence = [];
            // Start with one pad
            gameState.sequence.push(getRandomPad());
            
            // Add pads for each round
            for (let i = 1; i < gameState.round; i++) {
                gameState.sequence.push(getRandomPad());
            }
            
            gameState.playerSequence = [];
            gameState.currentSequenceIndex = 0;
        }

        // Get a random pad (1-4)
        function getRandomPad() {
            return Math.floor(Math.random() * 4) + 1;
        }

        // Play the sequence
        async function playSequence() {
            gameState.isPlayingSequence = true;
            gameState.isPlayerInputEnabled = false;
            
            // Highlight each pad in the sequence
            for (let i = 0; i < gameState.sequence.length; i++) {
                const padKey = gameState.sequence[i];
                const padElement = document.querySelector(`.pad[data-key="${padKey}"]`);
                
                // Highlight the pad
                padElement.classList.add('highlight');
                await sleep(500);
                padElement.classList.remove('highlight');
                await sleep(200);
            }
            
            // Enable player input
            gameState.isPlayingSequence = false;
            gameState.isPlayerInputEnabled = true;
        }

        // Handle player input
        function handlePlayerInput(padKey) {
            if (!gameState.isPlayerInputEnabled || !gameState.gameActive) return;
            
            const expectedPad = gameState.sequence[gameState.currentSequenceIndex];
            
            if (padKey === expectedPad) {
                // Correct input
                const padElement = document.querySelector(`.pad[data-key="${padKey}"]`);
                padElement.classList.add('correct');
                
                // Remove correct class after animation
                setTimeout(() => {
                    padElement.classList.remove('correct');
                }, 100);
                
                // Advance sequence position
                gameState.currentSequenceIndex++;
                
                // Check if sequence is complete
                if (gameState.currentSequenceIndex >= gameState.sequence.length) {
                    // Round complete
                    completeRound();
                }
            } else {
                // Incorrect input
                const padElement = document.querySelector(`.pad[data-key="${padKey}"]`);
                padElement.classList.add('incorrect');
                
                // Remove incorrect class after animation
                setTimeout(() => {
                    padElement.classList.remove('incorrect');
                }, 100);
                
                // Lose a life
                gameState.lives--;
                updateDisplays();
                
                if (gameState.lives <= 0) {
                    // Game over
                    gameOver();
                } else {
                    // Replay sequence
                    setTimeout(() => {
                        playSequence();
                    }, 500);
                }
            }
        }

        // Complete a round
        function completeRound() {
            gameState.score++;
            gameState.round++;
            updateDisplays();
            
            // Add a new pad to the sequence
            generateSequence();
            
            // Play the new sequence
            setTimeout(() => {
                playSequence();
            }, 500);
        }

        // Game over
        function gameOver() {
            gameState.gameActive = false;
            finalRoundDisplay.textContent = gameState.round;
            finalScoreDisplay.textContent = gameState.score;
            gameOverScreen.style.display = 'flex';
        }

        // Hide game over screen
        function hideGameOver() {
            gameOverScreen.style.display = 'none';
        }

        // Sleep function for delays
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', initGame);
        finalRestartBtn.addEventListener('click', initGame);

        // Pad click events
        pads.forEach(pad => {
            pad.addEventListener('click', () => {
                if (gameState.gameActive) {
                    const padKey = pad.dataset.key;
                    handlePlayerInput(parseInt(padKey));
                }
            });
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (gameState.gameActive) {
                const key = parseInt(e.key);
                if (key >= 1 && key <= 4) {
                    handlePlayerInput(key);
                }
            } else if (e.key === 'Enter') {
                // Start game with Enter key
                if (!gameState.gameActive && startBtn.style.display !== 'none') {
                    startGame();
                }
            }
        });

        // Initialize the game
        initGame();
    </script>
</body>
</html>
