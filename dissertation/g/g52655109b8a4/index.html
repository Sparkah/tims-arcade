<!DOCTYPE html>
<html>
<head>
    <title>Orbit Tap</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #gameCanvas {
            background: #0f3460;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.7);
        }
        
        #missesDisplay {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ff6b6b;
            font-size: 18px;
            font-weight: bold;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            display: none;
        }
        
        #finalScore {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            color: #4ecdc4;
        }
        
        #restartButton {
            background: #4ecdc4;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            color: #0f3460;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }
        
        #restartButton:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: #a9a9a9;
            font-size: 16px;
        }
        
        .hitEffect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(78, 205, 196, 0.7);
            pointer-events: none;
            animation: hitAnimation 0.5s forwards;
        }
        
        @keyframes hitAnimation {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        
        .missEffect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 107, 107, 0.7);
            pointer-events: none;
            animation: missAnimation 0.5s forwards;
        }
        
        @keyframes missAnimation {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div id="scoreDisplay">Score: 0</div>
        <div id="missesDisplay">Misses: 0/3</div>
        <div id="gameOverScreen">
            <h1>Game Over</h1>
            <div id="finalScore">Score: 0</div>
            <button id="restartButton">Play Again</button>
        </div>
        <div id="instructions">Tap or press SPACE to hit</div>
    </div>

    <script>
        // Game constants
        const CANVAS_WIDTH = 500;
        const CANVAS_HEIGHT = 500;
        const CENTER_X = CANVAS_WIDTH / 2;
        const CENTER_Y = CANVAS_HEIGHT / 2;
        const RING_RADIUS = 180;
        const DOT_RADIUS = 12;
        const TARGET_START_ANGLE = 0;
        const TARGET_WIDTH = 0.5; // in radians
        const ROTATION_SPEED = 0.02;
        const INITIAL_TARGET_SIZE = 0.5;
        const TARGET_SHRINK_FACTOR = 0.8;
        const MAX_MISSES = 3;
        
        // Game state
        let canvas = document.getElementById('gameCanvas');
        let ctx = canvas.getContext('2d');
        let score = 0;
        let misses = 0;
        let targetAngle = TARGET_START_ANGLE;
        let targetWidth = INITIAL_TARGET_SIZE;
        let dotAngle = 0;
        let gameRunning = true;
        let animationId = null;
        
        // DOM elements
        const scoreDisplay = document.getElementById('scoreDisplay');
        const missesDisplay = document.getElementById('missesDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');
        
        // Initialize game
        function initGame() {
            score = 0;
            misses = 0;
            targetAngle = TARGET_START_ANGLE;
            targetWidth = INITIAL_TARGET_SIZE;
            dotAngle = 0;
            gameRunning = true;
            
            scoreDisplay.textContent = `Score: ${score}`;
            missesDisplay.textContent = `Misses: ${misses}/${MAX_MISSES}`;
            
            gameOverScreen.style.display = 'none';
            
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            
            gameLoop();
        }
        
        // Draw the game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw ring
            ctx.beginPath();
            ctx.arc(CENTER_X, CENTER_Y, RING_RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 8;
            ctx.stroke();
            
            // Draw target arc
            ctx.beginPath();
            ctx.arc(CENTER_X, CENTER_Y, RING_RADIUS, 
                    targetAngle, targetAngle + targetWidth);
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Draw dot
            const dotX = CENTER_X + Math.cos(dotAngle) * RING_RADIUS;
            const dotY = CENTER_Y + Math.sin(dotAngle) * RING_RADIUS;
            
            ctx.beginPath();
            ctx.arc(dotX, dotY, DOT_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Draw dot glow
            ctx.beginPath();
            ctx.arc(dotX, dotY, DOT_RADIUS + 5, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(
                dotX, dotY, DOT_RADIUS,
                dotX, dotY, DOT_RADIUS + 5
            );
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        // Update game state
        function update() {
            // Move dot
            dotAngle += ROTATION_SPEED;
            
            // Keep angle within 0 to 2π
            if (dotAngle > Math.PI * 2) {
                dotAngle -= Math.PI * 2;
            }
        }
        
        // Check if dot is in target
        function checkHit() {
            // Normalize angles to be between 0 and 2π
            let normalizedDotAngle = dotAngle;
            let normalizedTargetAngle = targetAngle;
            
            if (normalizedDotAngle < 0) normalizedDotAngle += Math.PI * 2;
            if (normalizedTargetAngle < 0) normalizedTargetAngle += Math.PI * 2;
            
            // Check if dot is in target
            const targetEndAngle = normalizedTargetAngle + targetWidth;
            let inTarget = false;
            
            if (normalizedTargetAngle < targetEndAngle) {
                // Target doesn't cross 0 angle
                inTarget = normalizedDotAngle >= normalizedTargetAngle && 
                           normalizedDotAngle <= targetEndAngle;
            } else {
                // Target crosses 0 angle
                inTarget = normalizedDotAngle >= normalizedTargetAngle || 
                           normalizedDotAngle <= targetEndAngle;
            }
            
            return inTarget;
        }
        
        // Handle hit
        function handleHit() {
            score++;
            scoreDisplay.textContent = `Score: ${score}`;
            
            // Create hit effect
            createEffect(CENTER_X + Math.cos(dotAngle) * RING_RADIUS, 
                        CENTER_Y + Math.sin(dotAngle) * RING_RADIUS, 
                        'hit');
            
            // Shrink target
            targetWidth *= TARGET_SHRINK_FACTOR;
            
            // Prevent target from getting too small
            if (targetWidth < 0.05) {
                targetWidth = 0.05;
            }
        }
        
        // Handle miss
        function handleMiss() {
            misses++;
            missesDisplay.textContent = `Misses: ${misses}/${MAX_MISSES}`;
            
            // Create miss effect
            createEffect(CENTER_X + Math.cos(dotAngle) * RING_RADIUS, 
                        CENTER_Y + Math.sin(dotAngle) * RING_RADIUS, 
                        'miss');
            
            if (misses >= MAX_MISSES) {
                endGame();
            }
        }
        
        // Create visual effect
        function createEffect(x, y, type) {
            const effect = document.createElement('div');
            effect.className = type + 'Effect';
            effect.style.left = (x - 15) + 'px';
            effect.style.top = (y - 15) + 'px';
            document.getElementById('gameContainer').appendChild(effect);
            
            // Remove effect after animation
            setTimeout(() => {
                effect.remove();
            }, 500);
        }
        
        // End the game
        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            finalScoreDisplay.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'flex';
        }
        
        // Game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Handle user input
        function handleTap() {
            if (!gameRunning) return;
            
            const inTarget = checkHit();
            
            if (inTarget) {
                handleHit();
            } else {
                handleMiss();
            }
        }
        
        // Event listeners
        canvas.addEventListener('click', handleTap);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleTap();
            }
        });
        
        restartButton.addEventListener('click', initGame);
        
        // Start the game
        initGame();
    </script>
</body>
</html>
