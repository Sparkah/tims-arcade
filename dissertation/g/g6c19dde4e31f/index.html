<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #4ecdc4;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            border: 2px solid #16213e;
        }
        
        #gameCanvas {
            background-color: #1a1a2e;
            display: block;
        }
        
        #scoreTimer {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 100px;
            height: 40px;
            background-color: rgba(26, 26, 46, 0.8);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            border: 1px solid #16213e;
        }
        
        #restartButton {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 40px;
            background-color: #16213e;
            border: 2px solid #00d4ff;
            border-radius: 5px;
            color: #4ecdc4;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }
        
        #restartButton:hover {
            background-color: #00d4ff;
            color: #1a1a2e;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 46, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none;
        }
        
        #finalScore {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ff6b6b;
        }
        
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 16px;
            color: #4ecdc4;
            max-width: 300px;
            line-height: 1.5;
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="scoreTimer">0:45</div>
        <div id="instructions">Use ← → or A/D keys to move the basket</div>
        <button id="restartButton">Play Again</button>
        <div id="gameOverScreen">
            <div id="finalScore">Score: 0</div>
            <button id="restartButton2">Play Again</button>
        </div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreTimer = document.getElementById('scoreTimer');
        const restartButton = document.getElementById('restartButton');
        const restartButton2 = document.getElementById('restartButton2');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let timeLeft = 45;
        let basket = {
            x: canvas.width / 2 - 60,
            y: canvas.height - 30,
            width: 120,
            height: 30,
            speed: 8
        };
        
        let gem = {
            x: canvas.width / 2,
            y: 0,
            radius: 20,
            speed: 3
        };
        
        let keys = {};
        let animationId;
        
        // Initialize game
        function init() {
            gameRunning = true;
            score = 0;
            timeLeft = 45;
            basket.x = canvas.width / 2 - 60;
            gem.x = canvas.width / 2;
            gem.y = 0;
            gameOverScreen.style.display = 'none';
            updateScoreTimer();
        }
        
        // Update score and timer display
        function updateScoreTimer() {
            scoreTimer.textContent = `0:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
        }
        
        // Draw basket
        function drawBasket() {
            ctx.fillStyle = '#1a1a2e';
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(basket.x, basket.y, basket.width, basket.height, 5);
            ctx.fill();
            ctx.stroke();
        }
        
        // Draw gem
        function drawGem() {
            ctx.fillStyle = '#ff6b6b';
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(gem.x, gem.y, gem.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        }
        
        // Check collision between gem and basket
        function checkCollision() {
            // Simple bounding box collision
            return (
                gem.x + gem.radius > basket.x &&
                gem.x - gem.radius < basket.x + basket.width &&
                gem.y + gem.radius > basket.y &&
                gem.y - gem.radius < basket.y + basket.height
            );
        }
        
        // Flash gem when caught
        function flashGem() {
            const originalFill = ctx.fillStyle;
            const originalStroke = ctx.strokeStyle;
            
            ctx.fillStyle = '#4ecdc4';
            ctx.strokeStyle = '#4ecdc4';
            ctx.beginPath();
            ctx.arc(gem.x, gem.y, gem.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            setTimeout(() => {
                ctx.fillStyle = originalFill;
                ctx.strokeStyle = originalStroke;
                drawGem();
            }, 200);
        }
        
        // Game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid background
            ctx.strokeStyle = '#16213e';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // Move basket
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                basket.x = Math.max(0, basket.x - basket.speed);
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                basket.x = Math.min(canvas.width - basket.width, basket.x + basket.speed);
            }
            
            // Move gem
            gem.y += gem.speed;
            
            // Check if gem is caught
            if (checkCollision()) {
                score++;
                gem.y = 0;
                gem.x = Math.random() * (canvas.width - 40) + 20;
                flashGem();
            }
            
            // Check if gem is missed
            if (gem.y > canvas.height) {
                gem.y = 0;
                gem.x = Math.random() * (canvas.width - 40) + 20;
            }
            
            // Draw game elements
            drawBasket();
            drawGem();
            
            // Continue game loop
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Start game
        function startGame() {
            init();
            gameLoop();
        }
        
        // Timer
        function startTimer() {
            const timer = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timer);
                    return;
                }
                
                timeLeft--;
                updateScoreTimer();
                
                if (timeLeft <= 0) {
                    gameRunning = false;
                    clearInterval(timer);
                    endGame();
                }
            }, 1000);
        }
        
        // End game
        function endGame() {
            cancelAnimationFrame(animationId);
            finalScore.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'flex';
        }
        
        // Event listeners
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            basket.x = mouseX - basket.width / 2;
            // Keep basket within canvas
            if (basket.x < 0) basket.x = 0;
            if (basket.x > canvas.width - basket.width) basket.x = canvas.width - basket.width;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchX = e.touches[0].clientX - rect.left;
            basket.x = touchX - basket.width / 2;
            // Keep basket within canvas
            if (basket.x < 0) basket.x = 0;
            if (basket.x > canvas.width - basket.width) basket.x = canvas.width - basket.width;
        });
        
        restartButton.addEventListener('click', () => {
            startGame();
            startTimer();
        });
        
        restartButton2.addEventListener('click', () => {
            startGame();
            startTimer();
        });
        
        // Initialize and start the game
        startGame();
        startTimer();
    </script>
</body>
</html>
