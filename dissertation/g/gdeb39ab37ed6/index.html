<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            padding: 20px;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            width: 320px;
            font-size: 1.5rem;
            font-weight: 600;
            color: #e6e6e6;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(2, 150px);
            grid-template-rows: repeat(2, 150px);
            gap: 10px;
            width: 320px;
            height: 320px;
        }

        .pad {
            background-color: #16213e;
            border: 10px solid #0f3460;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 400;
            color: #e6e6e6;
        }

        .pad:hover {
            border: 10px solid #e6e6e6;
        }

        .pad.active {
            background-color: #e6e6e6;
            box-shadow: 0 0 15px rgba(230, 230, 230, 0.7);
        }

        .pad.error {
            background-color: #ff6b6b;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.7);
        }

        .start-button {
            background-color: #16213e;
            border: 2px solid #0f3460;
            color: #e6e6e6;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .start-button:hover {
            background-color: #0f3460;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #e6e6e6;
            font-size: 1.5rem;
            font-weight: 600;
            gap: 20px;
            display: none;
        }

        .game-over h2 {
            font-size: 2rem;
            font-weight: 600;
        }

        .game-over p {
            font-size: 1.2rem;
            font-weight: 400;
        }

        .restart-button {
            background-color: #16213e;
            border: 2px solid #0f3460;
            color: #e6e6e6;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .restart-button:hover {
            background-color: #0f3460;
        }

        .flash {
            animation: flash 100ms ease;
        }

        @keyframes flash {
            0% { background-color: #e6e6e6; }
            100% { background-color: #16213e; }
        }

        .error-flash {
            animation: error-flash 200ms ease;
        }

        @keyframes error-flash {
            0% { background-color: #ff6b6b; }
            100% { background-color: #16213e; }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div class="game-container">
        <div class="stats">
            <div class="score">Round: <span id="round">1</span></div>
            <div class="lives">Lives: <span id="lives">3</span></div>
        </div>
        <div class="board" id="board">
            <div class="pad" data-index="0" style="background-color: #FF6B6B;"></div>
            <div class="pad" data-index="1" style="background-color: #4ECDC4;"></div>
            <div class="pad" data-index="2" style="background-color: #FFE66D;"></div>
            <div class="pad" data-index="3" style="background-color: #6A0572;"></div>
        </div>
        <button class="start-button" id="start-button">Start Game</button>
    </div>
    <div class="game-over" id="game-over">
        <h2>Game Over</h2>
        <p>Final Round: <span id="final-round">1</span></p>
        <button class="restart-button" id="restart-button">Play Again</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game elements
            const board = document.getElementById('board');
            const startButton = document.getElementById('start-button');
            const gameOverScreen = document.getElementById('game-over');
            const restartButton = document.getElementById('restart-button');
            const roundDisplay = document.getElementById('round');
            const livesDisplay = document.getElementById('lives');
            const finalRoundDisplay = document.getElementById('final-round');

            // Game state
            let sequence = [];
            let playerSequence = [];
            let currentRound = 1;
            let lives = 3;
            let isPlayingSequence = false;
            let isPlayerTurn = false;
            let currentSequenceIndex = 0;
            let gameActive = false;

            // Pad elements
            const padElements = document.querySelectorAll('.pad');

            // Initialize game
            function initGame() {
                sequence = [];
                playerSequence = [];
                currentRound = 1;
                lives = 3;
                isPlayingSequence = false;
                isPlayerTurn = false;
                currentSequenceIndex = 0;
                gameActive = false;

                // Reset UI
                roundDisplay.textContent = currentRound;
                livesDisplay.textContent = lives;
                padElements.forEach(pad => {
                    pad.classList.remove('active', 'error', 'flash', 'error-flash');
                });
                gameOverScreen.style.display = 'none';
                startButton.textContent = 'Start Game';
                startButton.disabled = false;
            }

            // Add a new pad to the sequence
            function addToSequence() {
                const randomIndex = Math.floor(Math.random() * 4);
                sequence.push(randomIndex);
            }

            // Play the sequence
            function playSequence() {
                isPlayingSequence = true;
                isPlayerTurn = false;
                currentSequenceIndex = 0;
                let index = 0;

                const playNext = () => {
                    if (index >= sequence.length) {
                        isPlayingSequence = false;
                        isPlayerTurn = true;
                        return;
                    }

                    const padIndex = sequence[index];
                    const pad = padElements[padIndex];
                    
                    // Flash the pad
                    pad.classList.add('active');
                    setTimeout(() => {
                        pad.classList.remove('active');
                        index++;
                        setTimeout(playNext, 300);
                    }, 300);
                };

                playNext();
            }

            // Handle pad click
            function handlePadClick(index) {
                if (!isPlayerTurn || isPlayingSequence) return;

                // Highlight the pad
                const pad = padElements[index];
                pad.classList.add('active');
                setTimeout(() => {
                    pad.classList.remove('active');
                }, 150);

                // Check if correct
                if (index === sequence[currentSequenceIndex]) {
                    // Correct input
                    playerSequence.push(index);
                    currentSequenceIndex++;

                    // Check if sequence is complete
                    if (currentSequenceIndex === sequence.length) {
                        // Move to next round
                        currentRound++;
                        roundDisplay.textContent = currentRound;
                        playerSequence = [];
                        currentSequenceIndex = 0;
                        addToSequence();
                        setTimeout(playSequence, 500);
                    }
                } else {
                    // Wrong input
                    pad.classList.add('error');
                    lives--;
                    livesDisplay.textContent = lives;
                    
                    setTimeout(() => {
                        pad.classList.remove('error');
                        if (lives <= 0) {
                            // Game over
                            gameOver();
                        } else {
                            // Replay sequence
                            setTimeout(playSequence, 500);
                        }
                    }, 300);
                }
            }

            // Game over
            function gameOver() {
                gameActive = false;
                finalRoundDisplay.textContent = currentRound;
                gameOverScreen.style.display = 'flex';
                startButton.disabled = true;
            }

            // Start game
            function startGame() {
                if (gameActive) return;
                
                initGame();
                gameActive = true;
                startButton.textContent = 'Next Round';
                addToSequence();
                setTimeout(playSequence, 500);
            }

            // Event listeners
            startButton.addEventListener('click', startGame);
            restartButton.addEventListener('click', initGame);

            // Pad click events
            padElements.forEach((pad, index) => {
                pad.addEventListener('click', () => handlePadClick(index));
            });

            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                if (!gameActive) return;
                
                const keyMap = {
                    '1': 0,
                    '2': 1,
                    '3': 2,
                    '4': 3
                };
                
                if (keyMap[e.key] !== undefined) {
                    handlePadClick(keyMap[e.key]);
                }
            });

            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
