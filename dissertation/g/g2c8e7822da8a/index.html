<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #game-canvas {
            background-color: #1a1a2e;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }
        
        #score-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
        }
        
        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
        }
        
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 46, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        #game-over.show {
            opacity: 1;
            pointer-events: all;
        }
        
        #game-over h1 {
            color: #00d4ff;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
        }
        
        #final-score {
            color: #00ff9d;
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
        }
        
        #restart-button {
            background-color: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 4px;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }
        
        #restart-button:hover {
            background-color: #00ff9d;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.7);
        }
        
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(26, 26, 46, 0.95);
        }
        
        #game-title {
            color: #00d4ff;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.7);
        }
        
        #start-button {
            background-color: #00ff9d;
            color: #1a1a2e;
            border: none;
            border-radius: 4px;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.5);
        }
        
        #start-button:hover {
            background-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.7);
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="500" height="500"></canvas>
        <div id="score-display">Score: 0</div>
        <div id="flash"></div>
        <div id="game-over">
            <h1>Game Over</h1>
            <div id="final-score">Score: 0</div>
            <button id="restart-button">Play Again</button>
        </div>
        <div id="start-screen">
            <h1 id="game-title">Orbit Tap</h1>
            <button id="start-button">Start Game</button>
        </div>
    </div>

    <script>
        // Game constants
        const CANVAS_WIDTH = 500;
        const CANVAS_HEIGHT = 500;
        const RING_RADIUS = 150;
        const RING_STROKE_WIDTH = 12;
        const DOT_RADIUS = 8;
        const TARGET_WIDTH = 30;
        const TARGET_START_ANGLE = Math.PI / 2; // 90 degrees
        const TARGET_ANGLE = Math.PI / 9; // 20 degrees
        const INITIAL_TARGET_SIZE = TARGET_ANGLE;
        const TARGET_SHRINK_FACTOR = 0.9;
        const MIN_TARGET_SIZE = INITIAL_TARGET_SIZE * 0.05;
        const MAX_MISSES = 3;
        const ANIMATION_SPEED = 0.02;
        
        // Game state
        let gameState = 'title'; // 'title', 'playing', 'gameOver'
        let score = 0;
        let misses = 0;
        let targetAngle = INITIAL_TARGET_SIZE;
        let dotAngle = 0;
        let animationId = null;
        let flashTimeout = null;
        
        // DOM elements
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const flashElement = document.getElementById('flash');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');
        const restartButton = document.getElementById('restart-button');
        const startScreen = document.getElementById('start-screen');
        const startButton = document.getElementById('start-button');
        
        // Initialize game
        function initGame() {
            score = 0;
            misses = 0;
            targetAngle = INITIAL_TARGET_SIZE;
            dotAngle = 0;
            updateScoreDisplay();
            gameOverScreen.classList.remove('show');
            startScreen.style.display = 'none';
            gameState = 'playing';
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            animate();
        }
        
        // Update score display
        function updateScoreDisplay() {
            scoreDisplay.textContent = `Score: ${score}`;
        }
        
        // Draw the ring
        function drawRing() {
            ctx.beginPath();
            ctx.arc(
                CANVAS_WIDTH / 2,
                CANVAS_HEIGHT / 2,
                RING_RADIUS,
                0,
                Math.PI * 2
            );
            ctx.strokeStyle = '#16213e';
            ctx.lineWidth = RING_STROKE_WIDTH;
            ctx.stroke();
        }
        
        // Draw the target arc
        function drawTarget() {
            const centerX = CANVAS_WIDTH / 2;
            const centerY = CANVAS_HEIGHT / 2;
            
            ctx.beginPath();
            ctx.arc(
                centerX,
                centerY,
                RING_RADIUS,
                TARGET_START_ANGLE - targetAngle / 2,
                TARGET_START_ANGLE + targetAngle / 2
            );
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = TARGET_WIDTH;
            ctx.lineCap = 'round';
            ctx.stroke();
        }
        
        // Draw the dot
        function drawDot() {
            const centerX = CANVAS_WIDTH / 2;
            const centerY = CANVAS_HEIGHT / 2;
            const x = centerX + Math.cos(dotAngle) * RING_RADIUS;
            const y = centerY + Math.sin(dotAngle) * RING_RADIUS;
            
            ctx.beginPath();
            ctx.arc(x, y, DOT_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff9d';
            ctx.fill();
        }
        
        // Show visual feedback
        function showFeedback(isHit) {
            flashElement.style.backgroundColor = isHit ? '#00ff9d' : '#ff385c';
            flashElement.style.opacity = '0.7';
            
            if (flashTimeout) {
                clearTimeout(flashTimeout);
            }
            
            flashTimeout = setTimeout(() => {
                flashElement.style.opacity = '0';
            }, 150);
        }
        
        // Check if dot is in target
        function isDotInTarget() {
            const normalizedDotAngle = (dotAngle + Math.PI * 2) % (Math.PI * 2);
            const targetStart = TARGET_START_ANGLE - targetAngle / 2;
            const targetEnd = TARGET_START_ANGLE + targetAngle / 2;
            
            // Normalize target angles
            const normalizedTargetStart = (targetStart + Math.PI * 2) % (Math.PI * 2);
            const normalizedTargetEnd = (targetEnd + Math.PI * 2) % (Math.PI * 2);
            
            // Handle case where target crosses 0 radians
            if (normalizedTargetStart > normalizedTargetEnd) {
                return normalizedDotAngle >= normalizedTargetStart || 
                       normalizedDotAngle <= normalizedTargetEnd;
            } else {
                return normalizedDotAngle >= normalizedTargetStart && 
                       normalizedDotAngle <= normalizedTargetEnd;
            }
        }
        
        // Check if target is visible (not overlapping with itself)
        function isTargetVisible() {
            // Target is visible if it's not completely overlapping with itself
            // This check ensures the target arc is not so small it becomes invisible
            return targetAngle > MIN_TARGET_SIZE * 0.1;
        }
        
        // Handle tap
        function handleTap() {
            if (gameState !== 'playing') return;
            
            // Only allow scoring if target is visible
            if (!isTargetVisible()) {
                misses++;
                showFeedback(false);
                if (misses >= MAX_MISSES) {
                    endGame();
                }
                return;
            }
            
            const inTarget = isDotInTarget();
            
            if (inTarget) {
                // Hit
                score++;
                updateScoreDisplay();
                showFeedback(true);
                
                // Shrink target
                targetAngle = Math.max(MIN_TARGET_SIZE, targetAngle * TARGET_SHRINK_FACTOR);
            } else {
                // Miss
                misses++;
                showFeedback(false);
                
                if (misses >= MAX_MISSES) {
                    endGame();
                    return;
                }
            }
        }
        
        // End game
        function endGame() {
            gameState = 'gameOver';
            finalScoreDisplay.textContent = `Score: ${score}`;
            gameOverScreen.classList.add('show');
        }
        
        // Animation loop
        function animate() {
            if (gameState !== 'playing') return;
            
            // Clear canvas
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Update dot position
            dotAngle += ANIMATION_SPEED;
            
            // Draw game elements
            drawRing();
            drawTarget();
            drawDot();
            
            // Continue animation
            animationId = requestAnimationFrame(animate);
        }
        
        // Event listeners
        canvas.addEventListener('click', handleTap);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleTap();
            }
        });
        
        restartButton.addEventListener('click', initGame);
        startButton.addEventListener('click', initGame);
        
        // Initial setup
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
    </script>
</body>
</html>
