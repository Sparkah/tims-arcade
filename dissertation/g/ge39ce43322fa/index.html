<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            overflow: hidden;
            position: relative;
        }
        
        #gameContainer {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #gameCanvas {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            display: block;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            z-index: 10;
        }
        
        #missesDisplay {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 20px;
            color: #ff6b6b;
            text-shadow: 0 0 5px rgba(255, 107, 107, 0.7);
            z-index: 10;
        }
        
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        #restartButton {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            background: #4ecdc4;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
        }
        
        #restartButton:hover {
            background: #3aa8a0;
            transform: translateX(-50%) scale(1.05);
        }
        
        #restartButton:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        .hit {
            animation: hitPulse 0.3s ease-out;
        }
        
        .miss {
            animation: missShake 0.5s ease-in-out;
        }
        
        @keyframes hitPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        @keyframes missShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .target-arc {
            transition: width 0.3s ease;
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="gameContainer">
        <div id="scoreDisplay">Score: 0</div>
        <div id="missesDisplay">Misses: 0/3</div>
        <div id="message">Tap when dot is in target!</div>
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <button id="restartButton">Play Again</button>
    </div>

    <script>
        // Game elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const missesDisplay = document.getElementById('missesDisplay');
        const message = document.getElementById('message');
        const restartButton = document.getElementById('restartButton');
        
        // Game state
        let score = 0;
        let misses = 0;
        let gameActive = true;
        let targetAngle = 0;
        let targetWidth = 0.3; // radians
        let dotAngle = 0;
        let dotSpeed = 0.02; // radians per frame
        let lastTime = 0;
        let animationId;
        
        // Initialize game
        function initGame() {
            score = 0;
            misses = 0;
            gameActive = true;
            targetAngle = Math.random() * Math.PI * 2;
            targetWidth = 0.3;
            dotAngle = 0;
            updateDisplays();
            message.textContent = "Tap when dot is in target!";
            message.style.opacity = 1;
            message.style.color = "white";
            restartButton.style.opacity = 0;
            restartButton.style.pointerEvents = 'none';
        }
        
        // Update displays
        function updateDisplays() {
            scoreDisplay.textContent = `Score: ${score}`;
            missesDisplay.textContent = `Misses: ${misses}/3`;
        }
        
        // Draw the game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw ring
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const ringRadius = 200;
            const ringWidth = 20;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = ringWidth;
            ctx.stroke();
            
            // Draw target arc
            const targetStart = targetAngle - targetWidth / 2;
            const targetEnd = targetAngle + targetWidth / 2;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius, targetStart, targetEnd);
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = ringWidth;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Draw dot
            const dotX = centerX + Math.cos(dotAngle) * ringRadius;
            const dotY = centerY + Math.sin(dotAngle) * ringRadius;
            
            ctx.beginPath();
            ctx.arc(dotX, dotY, 15, 0, Math.PI * 2);
            ctx.fillStyle = '#ff6b6b';
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Draw center dot
            ctx.beginPath();
            ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#ff6b6b';
            ctx.fill();
        }
        
        // Update game state
        function update(timestamp) {
            if (!gameActive) return;
            
            // Calculate time delta
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            // Update dot position
            dotAngle += dotSpeed;
            if (dotAngle > Math.PI * 2) dotAngle -= Math.PI * 2;
            
            // Redraw
            draw();
            
            // Continue animation
            animationId = requestAnimationFrame(update);
        }
        
        // Handle player input
        function handleInput() {
            if (!gameActive) return;
            
            // Check if dot is in target
            const dotInTarget = isDotInTarget();
            
            if (dotInTarget) {
                // Hit
                score++;
                targetWidth *= 0.85; // Shrink target
                message.textContent = "HIT!";
                message.className = "hit";
                message.style.color = "#4ecdc4";
                message.style.opacity = 1;
                
                // Reset message after delay
                setTimeout(() => {
                    message.style.opacity = 0;
                    message.className = "";
                }, 500);
                
                // Add visual feedback
                document.getElementById('gameContainer').classList.add('hit');
                setTimeout(() => {
                    document.getElementById('gameContainer').classList.remove('hit');
                }, 300);
            } else {
                // Miss
                misses++;
                message.textContent = "MISS!";
                message.className = "miss";
                message.style.color = "#ff6b6b";
                message.style.opacity = 1;
                
                // Reset message after delay
                setTimeout(() => {
                    message.style.opacity = 0;
                    message.className = "";
                }, 500);
                
                // Add visual feedback
                document.getElementById('gameContainer').classList.add('miss');
                setTimeout(() => {
                    document.getElementById('gameContainer').classList.remove('miss');
                }, 500);
                
                // Check for game over
                if (misses >= 3) {
                    endGame();
                }
            }
            
            updateDisplays();
        }
        
        // Check if dot is in target
        function isDotInTarget() {
            // Normalize angles to 0-2π range
            let normalizedDotAngle = dotAngle;
            let normalizedTargetAngle = targetAngle;
            
            while (normalizedDotAngle < 0) normalizedDotAngle += Math.PI * 2;
            while (normalizedTargetAngle < 0) normalizedTargetAngle += Math.PI * 2;
            
            const targetStart = normalizedTargetAngle - targetWidth / 2;
            const targetEnd = normalizedTargetAngle + targetWidth / 2;
            
            // Handle case where target crosses 0 radians
            if (targetStart < 0 && targetEnd > 0) {
                return normalizedDotAngle <= targetEnd || normalizedDotAngle >= targetStart + Math.PI * 2;
            } else if (targetStart > 0 && targetEnd > Math.PI * 2) {
                return normalizedDotAngle >= targetStart || normalizedDotAngle <= targetEnd - Math.PI * 2;
            } else {
                return normalizedDotAngle >= targetStart && normalizedDotAngle <= targetEnd;
            }
        }
        
        // End the game
        function endGame() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            
            message.textContent = `Game Over! Score: ${score}`;
            message.style.color = "#fff";
            message.style.opacity = 1;
            
            restartButton.style.opacity = 1;
            restartButton.style.pointerEvents = 'auto';
        }
        
        // Event listeners
        canvas.addEventListener('click', handleInput);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleInput();
            }
        });
        
        restartButton.addEventListener('click', () => {
            initGame();
            lastTime = performance.now();
            animationId = requestAnimationFrame(update);
        });
        
        // Start the game
        initGame();
        lastTime = performance.now();
        animationId = requestAnimationFrame(update);
    </script>
</body>
</html>
