<!DOCTYPE html>
<html>
<head>
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #1a2980, #26d0ce);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            text-align: center;
            pointer-events: auto;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
        }
        
        h2 {
            font-size: 36px;
            margin-bottom: 30px;
            color: #4caf50;
        }
        
        p {
            font-size: 22px;
            margin-bottom: 30px;
            max-width: 80%;
            line-height: 1.6;
        }
        
        #finalScore {
            font-size: 42px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }
        
        .btn {
            background: linear-gradient(to bottom, #4caf50, #2e7d32);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
            margin-top: 20px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            background: linear-gradient(to bottom, #66bb6a, #388e3c);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="uiOverlay">
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 45</div>
            <div id="instructions">Use ← → or A/D keys, or mouse/touch to move the basket</div>
        </div>
        
        <div id="startScreen">
            <h1>Gem Catch Sprint</h1>
            <p>Catch falling gems to score points!</p>
            <p>Move the basket under the falling gem to catch it.</p>
            <p>Game lasts for 45 seconds.</p>
            <button id="startButton" class="btn">Start Game</button>
        </div>
        
        <div id="gameOverScreen">
            <h1>Game Over!</h1>
            <h2>Your Score</h2>
            <div id="finalScore">0</div>
            <button id="restartButton" class="btn">Play Again</button>
        </div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        
        // Set canvas dimensions
        canvas.width = 800;
        canvas.height = 600;
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let timeLeft = 45;
        let gameTimer = null;
        let gem = null;
        let basket = {
            x: canvas.width / 2 - 50,
            y: canvas.height - 60,
            width: 100,
            height: 40,
            speed: 8
        };
        
        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 45;
            scoreDisplay.textContent = `Score: ${score}`;
            timerDisplay.textContent = `Time: ${timeLeft}`;
            
            // Create initial gem
            gem = {
                x: Math.random() * (canvas.width - 60) + 30,
                y: 30,
                width: 50,
                height: 50,
                speed: 3
            };
            
            // Reset basket position
            basket.x = canvas.width / 2 - 50;
        }
        
        // Draw basket
        function drawBasket() {
            // Basket body
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
            
            // Basket rim
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(basket.x - 5, basket.y + basket.height - 10, basket.width + 10, 10);
            
            // Basket handle
            ctx.fillStyle = '#D2691E';
            ctx.fillRect(basket.x - 10, basket.y + 10, 10, 20);
            ctx.fillRect(basket.x + basket.width, basket.y + 10, 10, 20);
        }
        
        // Draw gem
        function drawGem() {
            // Gem body
            ctx.fillStyle = '#00BFFF';
            ctx.beginPath();
            ctx.arc(gem.x, gem.y, gem.width/2, 0, Math.PI * 2);
            ctx.fill();
            
            // Gem highlight
            ctx.fillStyle = '#87CEEB';
            ctx.beginPath();
            ctx.arc(gem.x - gem.width/4, gem.y - gem.height/4, gem.width/4, 0, Math.PI * 2);
            ctx.fill();
            
            // Gem shine
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(gem.x + gem.width/6, gem.y - gem.height/6, gem.width/8, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Draw background
        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a2980');
            gradient.addColorStop(1, '#26d0ce');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Stars
            ctx.fillStyle = 'white';
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radius = Math.random() * 1.5;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Check collision between gem and basket
        function checkCollision() {
            return (
                gem.x > basket.x - gem.width/2 &&
                gem.x < basket.x + basket.width + gem.width/2 &&
                gem.y > basket.y - gem.height/2 &&
                gem.y < basket.y + basket.height + gem.height/2
            );
        }
        
        // Update game state
        function update() {
            if (!gameRunning) return;
            
            // Move gem down
            gem.y += gem.speed;
            
            // Check if gem is caught
            if (checkCollision()) {
                score++;
                scoreDisplay.textContent = `Score: ${score}`;
                
                // Create new gem at top
                gem.x = Math.random() * (canvas.width - 60) + 30;
                gem.y = 30;
            }
            
            // Check if gem is missed (falls off screen)
            if (gem.y > canvas.height) {
                // Gem disappears and new one appears (no penalty)
                gem.x = Math.random() * (canvas.width - 60) + 30;
                gem.y = 30;
            }
        }
        
        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background
            drawBackground();
            
            // Draw game objects
            drawBasket();
            drawGem();
        }
        
        // Game loop
        function gameLoop() {
            if (gameRunning) {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }
        
        // Start game
        function startGame() {
            initGame();
            gameRunning = true;
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            gameLoop();
            
            // Start timer
            gameTimer = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = `Time: ${timeLeft}`;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }
        
        // End game
        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'flex';
        }
        
        // Handle keyboard input
        function handleKeyDown(e) {
            if (!gameRunning) return;
            
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                basket.x = Math.max(0, basket.x - basket.speed);
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                basket.x = Math.min(canvas.width - basket.width, basket.x + basket.speed);
            }
        }
        
        // Handle mouse/touch movement
        function handleMouseMove(e) {
            if (!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            basket.x = Math.max(0, Math.min(canvas.width - basket.width, mouseX - basket.width/2));
        }
        
        function handleTouchMove(e) {
            if (!gameRunning) return;
            
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const touchX = touch.clientX - rect.left;
            basket.x = Math.max(0, Math.min(canvas.width - basket.width, touchX - basket.width/2));
        }
        
        // Event listeners
        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', startGame);
        document.addEventListener('keydown', handleKeyDown);
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('touchmove', handleTouchMove);
        
        // Initialize canvas
        drawBackground();
        drawBasket();
        drawGem();
    </script>
</body>
</html>
