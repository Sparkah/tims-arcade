<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            overflow: hidden;
            position: relative;
        }
        
        #game-container {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #game-canvas {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            display: block;
        }
        
        #score-display {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            z-index: 10;
        }
        
        #misses-display {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 20px;
            color: #ff6b6b;
            text-shadow: 0 0 8px rgba(255, 107, 107, 0.7);
            z-index: 10;
        }
        
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        #game-over.visible {
            opacity: 1;
            pointer-events: all;
        }
        
        #game-over h1 {
            color: #ff6b6b;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 107, 107, 0.8);
        }
        
        #final-score {
            color: #4ecdc4;
            font-size: 36px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(78, 205, 196, 0.7);
        }
        
        #restart-btn {
            background: linear-gradient(to right, #4ecdc4, #1a936f);
            border: none;
            border-radius: 50px;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        #restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        #restart-btn:active {
            transform: translateY(1px);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            z-index: 10;
        }
        
        .hit-effect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(78, 205, 196, 0.7);
            pointer-events: none;
            animation: hitEffect 0.5s ease-out forwards;
            z-index: 5;
        }
        
        @keyframes hitEffect {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }
        
        .miss-effect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 107, 107, 0.7);
            pointer-events: none;
            animation: missEffect 0.5s ease-out forwards;
            z-index: 5;
        }
        
        @keyframes missEffect {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="500" height="500"></canvas>
        <div id="score-display">Score: 0</div>
        <div id="misses-display">Misses: 0/3</div>
        <div id="game-over">
            <h1>Game Over</h1>
            <div id="final-score">Score: 0</div>
            <button id="restart-btn">Play Again</button>
        </div>
        <div id="instructions">Tap or press SPACE to hit</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            const scoreDisplay = document.getElementById('score-display');
            const missesDisplay = document.getElementById('misses-display');
            const gameOverScreen = document.getElementById('game-over');
            const finalScoreDisplay = document.getElementById('final-score');
            const restartBtn = document.getElementById('restart-btn');
            
            // Game state
            let score = 0;
            let misses = 0;
            let gameRunning = true;
            let targetAngle = 0;
            let targetWidth = 0.3; // radians
            let dotAngle = 0;
            let dotSpeed = 0.02;
            let lastTime = 0;
            let centerX = canvas.width / 2;
            let centerY = canvas.height / 2;
            let ringRadius = 180;
            let dotRadius = 12;
            let targetArcRadius = ringRadius + 15;
            
            // Initialize game
            function initGame() {
                score = 0;
                misses = 0;
                gameRunning = true;
                targetAngle = Math.random() * Math.PI * 2;
                targetWidth = 0.3;
                dotAngle = 0;
                dotSpeed = 0.02;
                updateDisplays();
                gameOverScreen.classList.remove('visible');
            }
            
            // Update displays
            function updateDisplays() {
                scoreDisplay.textContent = `Score: ${score}`;
                missesDisplay.textContent = `Misses: ${misses}/3`;
            }
            
            // Create visual effect
            function createEffect(x, y, isHit) {
                const effect = document.createElement('div');
                effect.className = isHit ? 'hit-effect' : 'miss-effect';
                effect.style.left = `${x - 15}px`;
                effect.style.top = `${y - 15}px`;
                document.getElementById('game-container').appendChild(effect);
                
                // Remove effect after animation
                setTimeout(() => {
                    effect.remove();
                }, 500);
            }
            
            // Handle player input
            function handleInput() {
                if (!gameRunning) return;
                
                // Check if dot is in target
                const targetStart = targetAngle - targetWidth / 2;
                const targetEnd = targetAngle + targetWidth / 2;
                
                // Normalize angles
                let normalizedDotAngle = dotAngle;
                while (normalizedDotAngle < 0) normalizedDotAngle += Math.PI * 2;
                while (normalizedDotAngle > Math.PI * 2) normalizedDotAngle -= Math.PI * 2;
                
                let normalizedTargetStart = targetStart;
                let normalizedTargetEnd = targetEnd;
                while (normalizedTargetStart < 0) normalizedTargetStart += Math.PI * 2;
                while (normalizedTargetEnd < 0) normalizedTargetEnd += Math.PI * 2;
                
                let inTarget = false;
                if (normalizedTargetStart < normalizedTargetEnd) {
                    inTarget = normalizedDotAngle >= normalizedTargetStart && 
                              normalizedDotAngle <= normalizedTargetEnd;
                } else {
                    inTarget = normalizedDotAngle >= normalizedTargetStart || 
                              normalizedDotAngle <= normalizedTargetEnd;
                }
                
                if (inTarget) {
                    // Hit!
                    score++;
                    targetWidth = Math.max(0.1, targetWidth * 0.85); // Shrink target
                    dotSpeed += 0.002; // Increase speed
                    createEffect(
                        centerX + Math.cos(dotAngle) * targetArcRadius,
                        centerY + Math.sin(dotAngle) * targetArcRadius,
                        true
                    );
                } else {
                    // Miss!
                    misses++;
                    createEffect(
                        centerX + Math.cos(dotAngle) * targetArcRadius,
                        centerY + Math.sin(dotAngle) * targetArcRadius,
                        false
                    );
                    
                    if (misses >= 3) {
                        gameRunning = false;
                        finalScoreDisplay.textContent = `Score: ${score}`;
                        gameOverScreen.classList.add('visible');
                    }
                }
                
                updateDisplays();
            }
            
            // Draw game elements
            function draw() {
                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw ring
                ctx.beginPath();
                ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 4;
                ctx.stroke();
                
                // Draw target arc
                ctx.beginPath();
                ctx.arc(centerX, centerY, targetArcRadius, targetAngle - targetWidth/2, targetAngle + targetWidth/2);
                ctx.strokeStyle = '#4ecdc4';
                ctx.lineWidth = 8;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                // Draw target indicator
                const targetStartX = centerX + Math.cos(targetAngle - targetWidth/2) * targetArcRadius;
                const targetStartY = centerY + Math.sin(targetAngle - targetWidth/2) * targetArcRadius;
                const targetEndX = centerX + Math.cos(targetAngle + targetWidth/2) * targetArcRadius;
                const targetEndY = centerY + Math.sin(targetAngle + targetWidth/2) * targetArcRadius;
                
                ctx.beginPath();
                ctx.arc(targetStartX, targetStartY, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#4ecdc4';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(targetEndX, targetEndY, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#4ecdc4';
                ctx.fill();
                
                // Draw dot
                const dotX = centerX + Math.cos(dotAngle) * ringRadius;
                const dotY = centerY + Math.sin(dotAngle) * ringRadius;
                
                ctx.beginPath();
                ctx.arc(dotX, dotY, dotRadius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff6b6b';
                ctx.fill();
                
                // Add glow effect to dot
                ctx.beginPath();
                ctx.arc(dotX, dotY, dotRadius + 5, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    dotX, dotY, dotRadius,
                    dotX, dotY, dotRadius + 5
                );
                gradient.addColorStop(0, 'rgba(255, 107, 107, 0.8)');
                gradient.addColorStop(1, 'rgba(255, 107, 107, 0)');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            // Game loop
            function gameLoop(timestamp) {
                if (!lastTime) lastTime = timestamp;
                const deltaTime = timestamp - lastTime;
                lastTime = timestamp;
                
                if (gameRunning) {
                    // Update dot position
                    dotAngle += dotSpeed;
                    if (dotAngle > Math.PI * 2) dotAngle -= Math.PI * 2;
                    
                    // Update target position
                    targetAngle += 0.005;
                    if (targetAngle > Math.PI * 2) targetAngle -= Math.PI * 2;
                }
                
                draw();
                requestAnimationFrame(gameLoop);
            }
            
            // Event listeners
            canvas.addEventListener('click', handleInput);
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    handleInput();
                }
            });
            
            restartBtn.addEventListener('click', initGame);
            
            // Start game
            initGame();
            requestAnimationFrame(gameLoop);
        });
    </script>
</body>
</html>
