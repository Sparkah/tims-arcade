<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        #game-container {
            width: 400px;
            height: 500px;
            background-color: #1a1a1a;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        #score-display {
            height: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        #pad-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 15px;
            flex-grow: 1;
        }
        
        .pad {
            background-color: #333333;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            transition: transform 0.1s;
            user-select: none;
        }
        
        .pad:hover {
            background-color: #444444;
        }
        
        .pad:active {
            transform: scale(0.95);
        }
        
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(26, 26, 26, 0.9);
            z-index: 10;
        }
        
        #game-over-screen {
            display: none;
        }
        
        .screen-title {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .screen-text {
            color: #ffffff;
            font-size: 1.1rem;
            margin-bottom: 30px;
            text-align: center;
            max-width: 80%;
        }
        
        .btn {
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .btn:hover {
            background-color: #3a7bc8;
        }
        
        .highlight {
            background-color: #4a90e2;
            animation: highlight 200ms ease-out;
        }
        
        .correct-flash {
            background-color: #7ed321;
            animation: correct-flash 150ms ease-out;
        }
        
        .error-flash {
            background-color: #e74c3c;
            animation: error-flash 200ms ease-out;
        }
        
        @keyframes highlight {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        @keyframes correct-flash {
            0% { opacity: 0.7; }
            100% { opacity: 0; }
        }
        
        @keyframes error-flash {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .pad-1 { background-color: #333333; }
        .pad-2 { background-color: #333333; }
        .pad-3 { background-color: #333333; }
        .pad-4 { background-color: #333333; }
        
        .pad-1.highlight { background-color: #4a90e2; }
        .pad-2.highlight { background-color: #4a90e2; }
        .pad-3.highlight { background-color: #4a90e2; }
        .pad-4.highlight { background-color: #4a90e2; }
        
        .pad-1.correct-flash { background-color: #7ed321; }
        .pad-2.correct-flash { background-color: #7ed321; }
        .pad-3.correct-flash { background-color: #7ed321; }
        .pad-4.correct-flash { background-color: #7ed321; }
        
        .pad-1.error-flash { background-color: #e74c3c; }
        .pad-2.error-flash { background-color: #e74c3c; }
        .pad-3.error-flash { background-color: #e74c3c; }
        .pad-4.error-flash { background-color: #e74c3c; }
        
        .pad-1.active { background-color: #4a90e2; }
        .pad-2.active { background-color: #4a90e2; }
        .pad-3.active { background-color: #4a90e2; }
        .pad-4.active { background-color: #4a90e2; }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="score-display">
            <div>Round: <span id="round">1</span></div>
            <div>Lives: <span id="lives">3</span></div>
        </div>
        
        <div id="pad-grid">
            <div class="pad pad-1" data-pad="1"></div>
            <div class="pad pad-2" data-pad="2"></div>
            <div class="pad pad-3" data-pad="3"></div>
            <div class="pad pad-4" data-pad="4"></div>
        </div>
        
        <div id="start-screen">
            <h1 class="screen-title">Pattern Echo</h1>
            <p class="screen-text">Watch the sequence, remember it, and repeat it!</p>
            <button class="btn" id="start-btn">Start Game</button>
        </div>
        
        <div id="game-over-screen">
            <h1 class="screen-title">Game Over</h1>
            <p class="screen-text">You survived <span id="final-round">1</span> rounds</p>
            <button class="btn" id="restart-btn">Play Again</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game state
            const gameState = {
                sequence: [],
                playerSequence: [],
                round: 1,
                lives: 3,
                isPlaying: false,
                isReplaying: false,
                currentStep: 0,
                canInput: false
            };
            
            // DOM Elements
            const padGrid = document.getElementById('pad-grid');
            const startScreen = document.getElementById('start-screen');
            const gameOverScreen = document.getElementById('game-over-screen');
            const startBtn = document.getElementById('start-btn');
            const restartBtn = document.getElementById('restart-btn');
            const roundDisplay = document.getElementById('round');
            const livesDisplay = document.getElementById('lives');
            const finalRoundDisplay = document.getElementById('final-round');
            
            // Pad elements
            const pads = document.querySelectorAll('.pad');
            
            // Initialize game
            function initGame() {
                gameState.sequence = [];
                gameState.playerSequence = [];
                gameState.round = 1;
                gameState.lives = 3;
                gameState.isPlaying = false;
                gameState.isReplaying = false;
                gameState.currentStep = 0;
                gameState.canInput = false;
                
                updateDisplays();
                hideScreens();
                resetPads();
            }
            
            // Update displays
            function updateDisplays() {
                roundDisplay.textContent = gameState.round;
                livesDisplay.textContent = gameState.lives;
            }
            
            // Hide all screens
            function hideScreens() {
                startScreen.style.display = 'none';
                gameOverScreen.style.display = 'none';
            }
            
            // Show start screen
            function showStartScreen() {
                startScreen.style.display = 'flex';
            }
            
            // Show game over screen
            function showGameOverScreen() {
                finalRoundDisplay.textContent = gameState.round;
                gameOverScreen.style.display = 'flex';
            }
            
            // Reset pads to base state
            function resetPads() {
                pads.forEach(pad => {
                    pad.className = 'pad pad-' + pad.dataset.pad;
                });
            }
            
            // Add a new pad to the sequence
            function addPadToSequence() {
                const randomPad = Math.floor(Math.random() * 4) + 1;
                gameState.sequence.push(randomPad);
            }
            
            // Start a new round
            function startRound() {
                gameState.canInput = false;
                gameState.isReplaying = false;
                gameState.currentStep = 0;
                gameState.playerSequence = [];
                
                if (gameState.round === 1) {
                    addPadToSequence();
                } else {
                    addPadToSequence();
                }
                
                updateDisplays();
                playSequence();
            }
            
            // Play the sequence
            function playSequence() {
                gameState.isPlaying = true;
                resetPads();
                
                let step = 0;
                const totalSteps = gameState.sequence.length;
                
                const playStep = () => {
                    if (step >= totalSteps) {
                        gameState.isPlaying = false;
                        gameState.canInput = true;
                        return;
                    }
                    
                    const padNumber = gameState.sequence[step];
                    const padElement = document.querySelector(`.pad-${padNumber}`);
                    
                    padElement.classList.add('highlight');
                    
                    setTimeout(() => {
                        padElement.classList.remove('highlight');
                        step++;
                        setTimeout(playStep, 300);
                    }, 500);
                };
                
                setTimeout(playStep, 300);
            }
            
            // Handle pad click
            function handlePadClick(padNumber) {
                if (!gameState.canInput || gameState.isPlaying || gameState.isReplaying) {
                    return;
                }
                
                const padElement = document.querySelector(`.pad-${padNumber}`);
                
                // Check if correct pad
                if (padNumber === gameState.sequence[gameState.currentStep]) {
                    // Correct input
                    padElement.classList.add('correct-flash');
                    
                    gameState.currentStep++;
                    gameState.playerSequence.push(padNumber);
                    
                    setTimeout(() => {
                        padElement.classList.remove('correct-flash');
                        
                        // Check if sequence is complete
                        if (gameState.currentStep >= gameState.sequence.length) {
                            // Round complete
                            gameState.round++;
                            setTimeout(() => {
                                startRound();
                            }, 300);
                        }
                    }, 150);
                } else {
                    // Wrong input
                    padElement.classList.add('error-flash');
                    gameState.lives--;
                    updateDisplays();
                    
                    setTimeout(() => {
                        padElement.classList.remove('error-flash');
                        
                        if (gameState.lives <= 0) {
                            // Game over
                            showGameOverScreen();
                        } else {
                            // Replay sequence
                            gameState.isReplaying = true;
                            gameState.canInput = false;
                            gameState.currentStep = 0;
                            gameState.playerSequence = [];
                            
                            setTimeout(() => {
                                playSequence();
                            }, 300);
                        }
                    }, 200);
                }
            }
            
            // Event Listeners
            startBtn.addEventListener('click', () => {
                initGame();
                startRound();
            });
            
            restartBtn.addEventListener('click', () => {
                initGame();
                startRound();
            });
            
            // Pad click events
            pads.forEach(pad => {
                pad.addEventListener('click', () => {
                    const padNumber = parseInt(pad.dataset.pad);
                    handlePadClick(padNumber);
                });
            });
            
            // Keyboard support
            document.addEventListener('keydown', (e) => {
                if (e.key >= '1' && e.key <= '4') {
                    const padNumber = parseInt(e.key);
                    handlePadClick(padNumber);
                }
            });
            
            // Initialize the game
            showStartScreen();
        });
    </script>
</body>
</html>
