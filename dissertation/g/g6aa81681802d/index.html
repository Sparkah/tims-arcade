<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 800px;
            width: 100%;
        }

        .score-display {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 300px;
            height: 100px;
            margin: 20px 0;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            width: 300px;
            height: 300px;
            max-width: 80vw;
            padding: 20px;
            background-color: #333333;
            border-radius: 10px;
        }

        .pad {
            background-color: #333333;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            transition: all 0.1s ease;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .pad::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .pad:hover::before {
            opacity: 0.1;
        }

        .pad:active {
            transform: scale(0.95);
        }

        .pad-1 { background-color: #4CAF50; }
        .pad-2 { background-color: #2196F3; }
        .pad-3 { background-color: #FFC107; }
        .pad-4 { background-color: #FF5722; }

        .controls {
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn {
            background-color: #444444;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin: 10px;
            transition: all 0.2s;
            width: 120px;
            height: 50px;
        }

        .btn:hover {
            background-color: #555555;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .message {
            font-size: 2rem;
            font-weight: 700;
            margin: 20px 0;
            text-align: center;
            min-height: 3rem;
        }

        .flash {
            animation: flash 100ms ease;
        }

        .error-flash {
            animation: error-flash 200ms ease;
        }

        @keyframes flash {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes error-flash {
            0% { transform: scale(1); background-color: #333333; }
            25% { transform: scale(1.1); background-color: #F44336; }
            50% { transform: scale(1); background-color: #F44336; }
            75% { transform: scale(1.1); background-color: #F44336; }
            100% { transform: scale(1); background-color: #333333; }
        }

        .pulse {
            animation: pulse 0.5s ease-in-out 3;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .hidden {
            display: none;
        }

        .instructions {
            text-align: center;
            margin: 20px 0;
            max-width: 500px;
            line-height: 1.6;
        }

        .key-hint {
            display: inline-block;
            background-color: #444444;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 2px;
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div class="game-container">
        <div class="score-display">
            <div>Round: <span id="round">1</span></div>
            <div>Lives: <span id="lives">3</span></div>
        </div>

        <div class="message" id="message">Press Start to Play</div>

        <div class="game-board" id="game-board">
            <div class="pad pad-1" data-pad="1"></div>
            <div class="pad pad-2" data-pad="2"></div>
            <div class="pad pad-3" data-pad="3"></div>
            <div class="pad pad-4" data-pad="4"></div>
        </div>

        <div class="controls">
            <button class="btn" id="start-btn">Start Game</button>
            <button class="btn hidden" id="restart-btn">Restart</button>
        </div>

        <div class="instructions">
            <p>Watch the sequence, then repeat it by clicking the pads or using keys <span class="key-hint">1</span> to <span class="key-hint">4</span></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game state
            const gameState = {
                sequence: [],
                playerSequence: [],
                currentStep: 0,
                round: 1,
                lives: 3,
                isPlaying: false,
                isReplaying: false,
                gameActive: false
            };

            // DOM elements
            const gameBoard = document.getElementById('game-board');
            const startBtn = document.getElementById('start-btn');
            const restartBtn = document.getElementById('restart-btn');
            const messageEl = document.getElementById('message');
            const roundEl = document.getElementById('round');
            const livesEl = document.getElementById('lives');

            // Pad elements
            const pads = document.querySelectorAll('.pad');

            // Initialize game
            function initGame() {
                gameState.sequence = [];
                gameState.playerSequence = [];
                gameState.currentStep = 0;
                gameState.round = 1;
                gameState.lives = 3;
                gameState.isPlaying = false;
                gameState.isReplaying = false;
                gameState.gameActive = false;

                updateUI();
                messageEl.textContent = 'Press Start to Play';
                startBtn.classList.remove('hidden');
                restartBtn.classList.add('hidden');
            }

            // Update UI elements
            function updateUI() {
                roundEl.textContent = gameState.round;
                livesEl.textContent = gameState.lives;
            }

            // Generate a random pad number (1-4)
            function getRandomPad() {
                return Math.floor(Math.random() * 4) + 1;
            }

            // Add a new pad to the sequence
            function addToSequence() {
                gameState.sequence.push(getRandomPad());
            }

            // Play the sequence
            function playSequence() {
                if (gameState.sequence.length === 0) return;

                gameState.isPlaying = true;
                gameState.currentStep = 0;
                messageEl.textContent = 'Watch the sequence...';

                let step = 0;
                const playNext = () => {
                    if (step >= gameState.sequence.length) {
                        gameState.isPlaying = false;
                        messageEl.textContent = 'Repeat the sequence!';
                        return;
                    }

                    const padNumber = gameState.sequence[step];
                    const padElement = document.querySelector(`.pad[data-pad="${padNumber}"]`);
                    
                    padElement.classList.add('flash');
                    setTimeout(() => {
                        padElement.classList.remove('flash');
                        step++;
                        setTimeout(playNext, 500);
                    }, 300);
                };

                playNext();
            }

            // Handle pad click
            function handlePadClick(padNumber) {
                if (!gameState.isPlaying && !gameState.isReplaying && gameState.gameActive) {
                    // Check if this is the correct pad
                    if (padNumber === gameState.sequence[gameState.currentStep]) {
                        // Correct pad
                        const padElement = document.querySelector(`.pad[data-pad="${padNumber}"]`);
                        padElement.classList.add('flash');
                        
                        setTimeout(() => {
                            padElement.classList.remove('flash');
                            gameState.currentStep++;
                            
                            if (gameState.currentStep >= gameState.sequence.length) {
                                // Sequence completed
                                gameState.round++;
                                messageEl.textContent = 'Correct! Next round...';
                                
                                // Add a new pad to the sequence
                                addToSequence();
                                
                                // Wait a bit before starting next sequence
                                setTimeout(() => {
                                    playSequence();
                                }, 1000);
                            } else {
                                // Continue with current sequence
                                messageEl.textContent = 'Good! Keep going...';
                            }
                        }, 100);
                    } else {
                        // Wrong pad
                        const padElement = document.querySelector(`.pad[data-pad="${padNumber}"]`);
                        padElement.classList.add('error-flash');
                        
                        gameState.lives--;
                        updateUI();
                        
                        setTimeout(() => {
                            padElement.classList.remove('error-flash');
                            
                            if (gameState.lives <= 0) {
                                // Game over
                                messageEl.textContent = 'Game Over!';
                                endGame();
                            } else {
                                // Replay sequence
                                messageEl.textContent = 'Try again!';
                                gameState.isReplaying = true;
                                
                                setTimeout(() => {
                                    gameState.isReplaying = false;
                                    playSequence();
                                }, 1000);
                            }
                        }, 200);
                    }
                }
            }

            // Start the game
            function startGame() {
                if (gameState.gameActive) return;
                
                gameState.gameActive = true;
                startBtn.classList.add('hidden');
                restartBtn.classList.remove('hidden');
                messageEl.textContent = 'Get ready...';
                
                // Start with first sequence
                setTimeout(() => {
                    gameState.sequence = [];
                    addToSequence();
                    playSequence();
                }, 1000);
            }

            // End the game
            function endGame() {
                gameState.gameActive = false;
                messageEl.textContent = `Game Over! Final Round: ${gameState.round - 1}`;
                restartBtn.classList.remove('hidden');
            }

            // Win the game
            function winGame() {
                gameState.gameActive = false;
                messageEl.textContent = 'You Win! All rounds completed!';
                gameBoard.classList.add('pulse');
                restartBtn.classList.remove('hidden');
            }

            // Keyboard support
            document.addEventListener('keydown', (e) => {
                if (!gameState.gameActive) return;
                
                const key = parseInt(e.key);
                if (key >= 1 && key <= 4) {
                    handlePadClick(key);
                }
            });

            // Event listeners for pads
            pads.forEach(pad => {
                pad.addEventListener('click', () => {
                    const padNumber = parseInt(pad.dataset.pad);
                    handlePadClick(padNumber);
                });
            });

            // Start button
            startBtn.addEventListener('click', startGame);

            // Restart button
            restartBtn.addEventListener('click', () => {
                gameBoard.classList.remove('pulse');
                initGame();
            });

            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
