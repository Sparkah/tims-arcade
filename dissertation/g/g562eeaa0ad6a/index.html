<!DOCTYPE html>
<html>
<head>
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #1a2980, #26d0ce);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        
        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            display: block;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            display: none;
        }
        
        #finalScore {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #FFD700;
        }
        
        #restartButton {
            padding: 15px 40px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        #restartButton:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        
        #startTitle {
            font-size: 50px;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        #startInstructions {
            font-size: 22px;
            max-width: 80%;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        #startButton {
            padding: 15px 40px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        #startButton:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        .gem {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
        }
        
        .basket {
            position: absolute;
            border-radius: 50% 50% 0 0;
            background: linear-gradient(to bottom, #8B4513, #A0522D);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="uiOverlay">
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 45s</div>
            <div id="gameOverScreen">
                <div id="finalScore">Score: 0</div>
                <button id="restartButton">Play Again</button>
            </div>
            <div id="startScreen">
                <h1 id="startTitle">Gem Catch Sprint</h1>
                <p id="startInstructions">Catch falling gems with your basket. Use arrow keys, A/D, or mouse to move. Catch as many as you can in 45 seconds!</p>
                <button id="startButton">Start Game</button>
            </div>
        </div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');
        const startScreen = document.getElementById('startScreen');
        const startButton = document.getElementById('startButton');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let timeLeft = 45;
        let gameTimer;
        let gem;
        let basket;
        let keys = {};
        let mouseX = 0;
        let mouseDown = false;
        
        // Gem class
        class Gem {
            constructor() {
                this.size = 50;
                this.x = Math.random() * (canvas.width - this.size);
                this.y = -this.size;
                this.speed = 3;
                this.color = this.getRandomColor();
            }
            
            getRandomColor() {
                const colors = [
                    '#FFD700', // Gold
                    '#FF0000', // Red
                    '#00FF00', // Green
                    '#0000FF', // Blue
                    '#FF00FF', // Magenta
                    '#00FFFF'  // Cyan
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.y += this.speed;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x + this.size/2, this.y + this.size/2, this.size/2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Add shine effect
                ctx.beginPath();
                ctx.arc(this.x + this.size/3, this.y + this.size/3, this.size/6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.fill();
            }
        }
        
        // Basket class
        class Basket {
            constructor() {
                this.width = 120;
                this.height = 60;
                this.x = canvas.width / 2 - this.width / 2;
                this.y = canvas.height - this.height - 20;
                this.speed = 8;
            }
            
            update() {
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                    this.x = Math.max(0, this.x - this.speed);
                }
                if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                    this.x = Math.min(canvas.width - this.width, this.x + this.speed);
                }
            }
            
            draw() {
                // Draw basket base
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.height);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.lineTo(this.x + this.width - 20, this.y);
                ctx.lineTo(this.x + 20, this.y);
                ctx.closePath();
                ctx.fillStyle = '#8B4513';
                ctx.fill();
                ctx.strokeStyle = '#A0522D';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Draw basket handle
                ctx.beginPath();
                ctx.arc(this.x + 20, this.y, 15, 0, Math.PI * 2);
                ctx.arc(this.x + this.width - 20, this.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = '#A0522D';
                ctx.fill();
            }
        }
        
        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 45;
            scoreDisplay.textContent = 'Score: 0';
            timerDisplay.textContent = 'Time: 45s';
            
            gem = new Gem();
            basket = new Basket();
            
            gameOverScreen.style.display = 'none';
            startScreen.style.display = 'none';
            
            gameRunning = true;
            
            // Start game timer
            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = `Time: ${timeLeft}s`;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
            
            // Start game loop
            requestAnimationFrame(gameLoop);
        }
        
        // Game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Update and draw basket
            basket.update();
            basket.draw();
            
            // Update and draw gem
            gem.update();
            gem.draw();
            
            // Check collision
            if (gem.y + gem.size > basket.y &&
                gem.x + gem.size > basket.x &&
                gem.x < basket.x + basket.width) {
                // Gem caught
                score++;
                scoreDisplay.textContent = `Score: ${score}`;
                
                // Create new gem
                gem = new Gem();
            }
            
            // Check if gem is missed
            if (gem.y > canvas.height) {
                // Gem missed, just create a new one
                gem = new Gem();
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        // End game
        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            finalScore.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'flex';
        }
        
        // Event listeners
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (mouseDown && gameRunning) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                // Keep basket within canvas bounds
                basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));
            }
        });
        
        canvas.addEventListener('mousedown', (e) => {
            mouseDown = true;
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            basket.x = mouseX - basket.width / 2;
        });
        
        canvas.addEventListener('mouseup', () => {
            mouseDown = false;
        });
        
        canvas.addEventListener('mouseleave', () => {
            mouseDown = false;
        });
        
        // Touch events for mobile
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameRunning) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                mouseX = touch.clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                // Keep basket within canvas bounds
                basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            basket.x = mouseX - basket.width / 2;
        });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
        });
        
        restartButton.addEventListener('click', initGame);
        startButton.addEventListener('click', initGame);
        
        // Initial setup
        ctx.font = '20px Arial';
        ctx.textAlign = 'center';
    </script>
</body>
</html>
