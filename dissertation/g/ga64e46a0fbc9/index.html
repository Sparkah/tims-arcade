<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #gameCanvas {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            display: block;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
        }
        
        #missesDisplay {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ff6b6b;
            font-size: 18px;
            font-weight: bold;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            display: none;
        }
        
        #finalScore {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            color: #4ecdc4;
        }
        
        #restartButton {
            background: #4ecdc4;
            color: #1a2a6c;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        #restartButton:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
        }
        
        .hit-effect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(78, 205, 196, 0.7);
            pointer-events: none;
            animation: hitEffect 0.5s forwards;
        }
        
        @keyframes hitEffect {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        
        .miss-effect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 107, 107, 0.7);
            pointer-events: none;
            animation: missEffect 0.5s forwards;
        }
        
        @keyframes missEffect {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div id="scoreDisplay">Score: 0</div>
        <div id="missesDisplay">Misses: 0/3</div>
        <div id="gameOverScreen">
            <h1>Game Over</h1>
            <div id="finalScore">Score: 0</div>
            <button id="restartButton">Play Again</button>
        </div>
        <div id="instructions">Tap or press SPACE to hit the target</div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const missesDisplay = document.getElementById('missesDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');
        
        // Game state
        let score = 0;
        let misses = 0;
        let gameRunning = true;
        let targetAngle = 0;
        let targetSize = 0.2; // Fraction of the circle
        let dotAngle = 0;
        let dotSpeed = 0.02;
        let centerX = canvas.width / 2;
        let centerY = canvas.height / 2;
        let ringRadius = 180;
        let dotRadius = 12;
        
        // Initialize game
        function initGame() {
            score = 0;
            misses = 0;
            gameRunning = true;
            targetAngle = Math.random() * Math.PI * 2;
            targetSize = 0.2;
            dotAngle = 0;
            updateDisplays();
            gameOverScreen.style.display = 'none';
        }
        
        // Update displays
        function updateDisplays() {
            scoreDisplay.textContent = `Score: ${score}`;
            missesDisplay.textContent = `Misses: ${misses}/3`;
        }
        
        // Draw the game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw ring
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // Draw target arc
            const startAngle = targetAngle - targetSize / 2;
            const endAngle = targetAngle + targetSize / 2;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius, startAngle, endAngle);
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Draw dot
            const dotX = centerX + Math.cos(dotAngle) * ringRadius;
            const dotY = centerY + Math.sin(dotAngle) * ringRadius;
            
            ctx.beginPath();
            ctx.arc(dotX, dotY, dotRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#ff6b6b';
            ctx.fill();
            
            // Draw dot highlight
            ctx.beginPath();
            ctx.arc(dotX - 4, dotY - 4, dotRadius / 3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fill();
        }
        
        // Update game state
        function update() {
            if (!gameRunning) return;
            
            // Move dot
            dotAngle += dotSpeed;
            if (dotAngle > Math.PI * 2) dotAngle -= Math.PI * 2;
            
            // Occasionally change target position
            if (Math.random() < 0.005) {
                targetAngle = Math.random() * Math.PI * 2;
            }
        }
        
        // Handle player hit
        function hit() {
            if (!gameRunning) return;
            
            // Calculate if hit is within target
            const startAngle = targetAngle - targetSize / 2;
            const endAngle = targetAngle + targetSize / 2;
            
            // Normalize angles
            let normalizedDotAngle = dotAngle;
            let normalizedStartAngle = startAngle;
            let normalizedEndAngle = endAngle;
            
            // Normalize to 0-2π range
            while (normalizedDotAngle < 0) normalizedDotAngle += Math.PI * 2;
            while (normalizedStartAngle < 0) normalizedStartAngle += Math.PI * 2;
            while (normalizedEndAngle < 0) normalizedEndAngle += Math.PI * 2;
            
            // Handle case where target crosses 0/2π boundary
            if (normalizedStartAngle > normalizedEndAngle) {
                if (normalizedDotAngle >= normalizedStartAngle || normalizedDotAngle <= normalizedEndAngle) {
                    // Hit!
                    score++;
                    targetSize = Math.max(0.05, targetSize * 0.85); // Shrink target
                    createEffect(dotAngle, true);
                    updateDisplays();
                    return;
                }
            } else {
                if (normalizedDotAngle >= normalizedStartAngle && normalizedDotAngle <= normalizedEndAngle) {
                    // Hit!
                    score++;
                    targetSize = Math.max(0.05, targetSize * 0.85); // Shrink target
                    createEffect(dotAngle, true);
                    updateDisplays();
                    return;
                }
            }
            
            // Miss!
            misses++;
            createEffect(dotAngle, false);
            updateDisplays();
            
            if (misses >= 3) {
                gameOver();
            }
        }
        
        // Create visual effect
        function createEffect(angle, isHit) {
            const effectX = centerX + Math.cos(angle) * ringRadius;
            const effectY = centerY + Math.sin(angle) * ringRadius;
            
            const effect = document.createElement('div');
            effect.className = isHit ? 'hit-effect' : 'miss-effect';
            effect.style.left = (effectX - 15) + 'px';
            effect.style.top = (effectY - 15) + 'px';
            document.getElementById('gameContainer').appendChild(effect);
            
            // Remove effect after animation
            setTimeout(() => {
                effect.remove();
            }, 500);
        }
        
        // Game over
        function gameOver() {
            gameRunning = false;
            finalScore.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'flex';
        }
        
        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Event listeners
        canvas.addEventListener('click', hit);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                hit();
            }
        });
        restartButton.addEventListener('click', initGame);
        
        // Start the game
        initGame();
        gameLoop();
    </script>
</body>
</html>
