<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #game-canvas {
            background-color: #0f3460;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
            cursor: pointer;
        }
        
        #score-display {
            position: absolute;
            top: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            z-index: 10;
        }
        
        #controls {
            position: absolute;
            bottom: 60px;
            left: 0;
            width: 100%;
            text-align: center;
        }
        
        #restart-button {
            background: linear-gradient(to bottom, #ff6b6b, #ff5252);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
            z-index: 10;
        }
        
        #restart-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        
        #restart-button:active {
            transform: translateY(1px);
        }
        
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 52, 96, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 20;
        }
        
        #game-over.show {
            opacity: 1;
            pointer-events: all;
        }
        
        #game-over h2 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        #final-score {
            font-size: 3rem;
            font-weight: bold;
            color: #ffd93d;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 217, 61, 0.5);
        }
        
        .hit-feedback {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: #ffd93d;
            border-radius: 50%;
            opacity: 0.7;
            pointer-events: none;
            animation: fadeOut 300ms forwards;
            z-index: 5;
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: scale(3);
            }
        }
        
        .pulse {
            animation: pulse 150ms ease-in-out;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        .flash {
            animation: flash 150ms;
        }
        
        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>

  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="500" height="500"></canvas>
        <div id="score-display">Score: 0</div>
        <div id="controls">
            <button id="restart-button">Play Again</button>
        </div>
        <div id="game-over">
            <h2>Game Over</h2>
            <div id="final-score">Score: 0</div>
            <button id="restart-button-game-over">Play Again</button>
        </div>
    </div>

    <script>
        // Game constants
        const CANVAS_WIDTH = 500;
        const CANVAS_HEIGHT = 500;
        const RING_RADIUS = 150;
        const RING_THICKNESS = 20;
        const DOT_RADIUS = 12;
        const TARGET_WIDTH = 20;
        const TARGET_ANGLE = Math.PI; // 180 degrees
        
        // Game state
        let score = 0;
        let misses = 0;
        let targetRadius = RING_RADIUS;
        let targetAngle = 0;
        let dotAngle = 0;
        let dotSpeed = 0.03;
        let gameActive = true;
        let animationId = null;
        
        // DOM elements
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const restartButton = document.getElementById('restart-button');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');
        const restartButtonGameOver = document.getElementById('restart-button-game-over');
        
        // Initialize game
        function initGame() {
            score = 0;
            misses = 0;
            targetRadius = RING_RADIUS;
            targetAngle = 0;
            dotAngle = 0;
            gameActive = true;
            gameOverScreen.classList.remove('show');
            updateScore();
            
            // Start animation
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            animate();
        }
        
        // Update score display
        function updateScore() {
            scoreDisplay.textContent = `Score: ${score}`;
        }
        
        // Draw the game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw ring
            ctx.beginPath();
            ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, targetRadius + RING_THICKNESS / 2, 0, Math.PI * 2);
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = RING_THICKNESS;
            ctx.stroke();
            
            // Draw target arc
            const startAngle = targetAngle - TARGET_ANGLE / 2;
            const endAngle = targetAngle + TARGET_ANGLE / 2;
            
            ctx.beginPath();
            ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, targetRadius, startAngle, endAngle);
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = TARGET_WIDTH;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Draw dot
            const dotX = CANVAS_WIDTH / 2 + Math.cos(dotAngle) * targetRadius;
            const dotY = CANVAS_HEIGHT / 2 + Math.sin(dotAngle) * targetRadius;
            
            ctx.beginPath();
            ctx.arc(dotX, dotY, DOT_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            
            // Draw dot highlight
            ctx.beginPath();
            ctx.arc(dotX - 4, dotY - 4, DOT_RADIUS / 3, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff88';
            ctx.fill();
        }
        
        // Update game state
        function update() {
            if (!gameActive) return;
            
            // Move dot
            dotAngle += dotSpeed;
            
            // Move target
            targetAngle += dotSpeed * 0.5;
        }
        
        // Handle player input
        function handleInput() {
            if (!gameActive) return;
            
            // Check if dot is in target area
            const startAngle = targetAngle - TARGET_ANGLE / 2;
            const endAngle = targetAngle + TARGET_ANGLE / 2;
            
            // Normalize angles to be between 0 and 2π
            let normalizedDotAngle = dotAngle % (Math.PI * 2);
            if (normalizedDotAngle < 0) normalizedDotAngle += Math.PI * 2;
            
            let normalizedStartAngle = startAngle % (Math.PI * 2);
            if (normalizedStartAngle < 0) normalizedStartAngle += Math.PI * 2;
            
            let normalizedEndAngle = endAngle % (Math.PI * 2);
            if (normalizedEndAngle < 0) normalizedEndAngle += Math.PI * 2;
            
            // Check if dot is in target
            let inTarget = false;
            
            if (normalizedStartAngle <= normalizedEndAngle) {
                // Normal case: start angle is less than end angle
                inTarget = normalizedDotAngle >= normalizedStartAngle && 
                          normalizedDotAngle <= normalizedEndAngle;
            } else {
                // Wrap case: target crosses 0 radians
                inTarget = normalizedDotAngle >= normalizedStartAngle || 
                          normalizedDotAngle <= normalizedEndAngle;
            }
            
            if (inTarget) {
                // Hit!
                score++;
                updateScore();
                
                // Shrink target
                targetRadius = Math.max(80, targetRadius - 10);
                
                // Visual feedback
                showHitFeedback();
                
                // Add pulse effect to target
                const targetElement = document.querySelector('#game-canvas');
                targetElement.classList.add('pulse');
                setTimeout(() => targetElement.classList.remove('pulse'), 150);
            } else {
                // Miss!
                misses++;
                
                // Visual feedback
                showMissFeedback();
                
                // Flash target
                const targetElement = document.querySelector('#game-canvas');
                targetElement.classList.add('flash');
                setTimeout(() => targetElement.classList.remove('flash'), 150);
                
                if (misses >= 3) {
                    endGame();
                }
            }
        }
        
        // Show hit feedback
        function showHitFeedback() {
            const feedback = document.createElement('div');
            feedback.className = 'hit-feedback';
            const dotX = CANVAS_WIDTH / 2 + Math.cos(dotAngle) * targetRadius;
            const dotY = CANVAS_HEIGHT / 2 + Math.sin(dotAngle) * targetRadius;
            feedback.style.left = (dotX - 12) + 'px';
            feedback.style.top = (dotY - 12) + 'px';
            document.getElementById('game-container').appendChild(feedback);
            
            setTimeout(() => {
                feedback.remove();
            }, 300);
        }
        
        // Show miss feedback
        function showMissFeedback() {
            const dotElement = document.querySelector('#game-canvas');
            dotElement.classList.add('flash');
            setTimeout(() => dotElement.classList.remove('flash'), 150);
        }
        
        // End the game
        function endGame() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            finalScoreDisplay.textContent = `Score: ${score}`;
            gameOverScreen.classList.add('show');
        }
        
        // Animation loop
        function animate() {
            update();
            draw();
            animationId = requestAnimationFrame(animate);
        }
        
        // Event listeners
        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleInput();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleInput();
            }
        });
        
        restartButton.addEventListener('click', initGame);
        restartButtonGameOver.addEventListener('click', initGame);
        
        // Start the game
        initGame();
    </script>
</body>
</html>
