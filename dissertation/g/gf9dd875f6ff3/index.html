<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        #gameCanvas {
            background: #0d1b2a;
            display: block;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #4dff4d;
            text-shadow: 0 0 10px rgba(77, 255, 77, 0.7);
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            text-align: center;
            pointer-events: auto;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }
        
        h2 {
            font-size: 36px;
            margin-bottom: 30px;
            color: #4dff4d;
        }
        
        p {
            font-size: 22px;
            margin-bottom: 30px;
            max-width: 80%;
            line-height: 1.6;
        }
        
        #finalScore {
            font-size: 40px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }
        
        .btn {
            background: linear-gradient(to bottom, #ff8c00, #ff4500);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
            margin-top: 20px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            background: linear-gradient(to bottom, #ff9d00, #ff5500);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #aaa;
            font-size: 18px;
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="uiOverlay">
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 45s</div>
            <div id="instructions">Use ← → or A/D keys, or mouse/touch to move</div>
        </div>
        
        <div id="startScreen">
            <h1>Gem Catch Sprint</h1>
            <p>Catch falling gems to score points!</p>
            <p>Move your basket to catch gems before they fall!</p>
            <button id="startBtn" class="btn">Start Game</button>
        </div>
        
        <div id="gameOverScreen">
            <h1>Game Over!</h1>
            <h2>Your Score</h2>
            <div id="finalScore">0</div>
            <button id="restartBtn" class="btn">Play Again</button>
        </div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let timeLeft = 45;
        let gameTimer;
        let gem;
        let basket;
        let keys = {};
        let mouseX = 0;
        let mouseDown = false;
        
        // Basket properties
        const basketWidth = 120;
        const basketHeight = 40;
        const basketSpeed = 8;
        
        // Gem properties
        const gemSize = 50;
        const gemSpeed = 3;
        
        // Initialize basket
        function initBasket() {
            basket = {
                x: canvas.width / 2 - basketWidth / 2,
                y: canvas.height - basketHeight - 20,
                width: basketWidth,
                height: basketHeight
            };
        }
        
        // Initialize gem
        function initGem() {
            gem = {
                x: Math.random() * (canvas.width - gemSize),
                y: -gemSize,
                size: gemSize,
                color: getRandomGemColor()
            };
        }
        
        // Get random gem color
        function getRandomGemColor() {
            const colors = [
                '#FFD700', // Gold
                '#00BFFF', // Deep Sky Blue
                '#FF69B4', // Hot Pink
                '#32CD32', // Lime Green
                '#FF4500', // Orange Red
                '#9400D3'  // Dark Violet
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // Draw basket
        function drawBasket() {
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
            
            // Draw basket details
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(basket.x + 5, basket.y + 5, basket.width - 10, basket.height - 10);
            
            // Draw basket rim
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 3;
            ctx.strokeRect(basket.x, basket.y, basket.width, basket.height);
        }
        
        // Draw gem
        function drawGem() {
            ctx.fillStyle = gem.color;
            ctx.beginPath();
            ctx.arc(gem.x + gem.size/2, gem.y + gem.size/2, gem.size/2, 0, Math.PI * 2);
            ctx.fill();
            
            // Add shine effect
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(gem.x + gem.size/3, gem.y + gem.size/3, gem.size/6, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Draw background
        function drawBackground() {
            // Draw gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0d1b2a');
            gradient.addColorStop(1, '#1b263b');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw stars
            ctx.fillStyle = 'white';
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radius = Math.random() * 1.5;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Update game state
        function update() {
            if (!gameRunning) return;
            
            // Move basket
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                basket.x = Math.max(0, basket.x - basketSpeed);
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                basket.x = Math.min(canvas.width - basket.width, basket.x + basketSpeed);
            }
            
            // Move gem
            gem.y += gemSpeed;
            
            // Check if gem is caught
            if (gem.y + gem.size >= basket.y && 
                gem.y <= basket.y + basket.height &&
                gem.x + gem.size > basket.x && 
                gem.x < basket.x + basket.width) {
                // Gem caught
                score++;
                scoreDisplay.textContent = `Score: ${score}`;
                gem.color = getRandomGemColor();
                gem.y = -gemSize;
                gem.x = Math.random() * (canvas.width - gemSize);
            }
            
            // Check if gem is missed
            if (gem.y > canvas.height) {
                // Gem missed, just reset it
                gem.y = -gemSize;
                gem.x = Math.random() * (canvas.width - gemSize);
            }
        }
        
        // Draw everything
        function draw() {
            drawBackground();
            drawGem();
            drawBasket();
        }
        
        // Game loop
        function gameLoop() {
            update();
            draw();
            
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // Start game
        function startGame() {
            score = 0;
            timeLeft = 45;
            scoreDisplay.textContent = `Score: ${score}`;
            timerDisplay.textContent = `Time: ${timeLeft}s`;
            
            initBasket();
            initGem();
            
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            gameRunning = true;
            
            // Start game timer
            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = `Time: ${timeLeft}s`;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
            
            gameLoop();
        }
        
        // End game
        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'flex';
        }
        
        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        
        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // Mouse controls
        canvas.addEventListener('mousemove', (e) => {
            if (mouseDown && gameRunning) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                
                // Keep basket within canvas
                if (basket.x < 0) basket.x = 0;
                if (basket.x > canvas.width - basket.width) {
                    basket.x = canvas.width - basket.width;
                }
            }
        });
        
        canvas.addEventListener('mousedown', (e) => {
            mouseDown = true;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            basket.x = mouseX - basket.width / 2;
        });
        
        window.addEventListener('mouseup', () => {
            mouseDown = false;
        });
        
        // Touch controls
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameRunning) {
                const rect = canvas.getBoundingClientRect();
                const touchX = e.touches[0].clientX - rect.left;
                basket.x = touchX - basket.width / 2;
                
                // Keep basket within canvas
                if (basket.x < 0) basket.x = 0;
                if (basket.x > canvas.width - basket.width) {
                    basket.x = canvas.width - basket.width;
                }
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchX = e.touches[0].clientX - rect.left;
            basket.x = touchX - basket.width / 2;
        });
        
        // Initialize game
        initBasket();
        initGem();
    </script>
</body>
</html>
