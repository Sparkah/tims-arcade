<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #1a1a2e;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #uiContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2rem;
            font-weight: bold;
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            font-weight: bold;
        }
        
        #titleScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        
        #titleScreen {
            background-color: rgba(26, 26, 46, 0.9);
        }
        
        #gameOverScreen {
            background-color: rgba(26, 26, 46, 0.9);
            display: none;
        }
        
        #titleText {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
        }
        
        #finalScore {
            font-size: 2rem;
            margin-bottom: 30px;
        }
        
        #restartButton {
            background-color: #4361ee;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            transition: background-color 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        
        #restartButton:hover {
            background-color: #3a56d4;
        }
        
        #restartButton:focus {
            outline: 2px solid white;
        }
        
        .pulse {
            animation: pulse 1s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .catch-animation {
            animation: catch 0.3s ease-out;
        }
        
        @keyframes catch {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.5); }
        }
        
        .win-flash {
            animation: winFlash 0.5s;
        }
        
        @keyframes winFlash {
            0% { color: white; }
            50% { color: #4cc9f0; }
            100% { color: white; }
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="uiContainer">
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 45</div>
            <div id="titleScreen">
                <h1 id="titleText">Gem Catch Sprint</h1>
                <button id="startButton">Start Game</button>
            </div>
            <div id="gameOverScreen">
                <div id="finalScore">Score: 0</div>
                <button id="restartButton">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        // Game constants
        const BASKET_WIDTH = 80;
        const BASKET_HEIGHT = 40;
        const GEM_DIAMETER = 40;
        const GEM_SPEED = 2;
        const GAME_DURATION = 45000; // 45 seconds in milliseconds
        const INITIAL_GEM_Y = -GEM_DIAMETER;
        
        // Game state
        const gameState = {
            score: 0,
            timeLeft: GAME_DURATION,
            gameRunning: false,
            basketX: 0,
            gemX: 0,
            gemY: INITIAL_GEM_Y,
            lastTime: 0,
            animationId: null
        };
        
        // DOM elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const titleScreen = document.getElementById('titleScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        
        // Set canvas size to match window
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gameState.basketX = canvas.width / 2 - BASKET_WIDTH / 2;
            gameState.gemX = canvas.width / 2 - GEM_DIAMETER / 2;
        }
        
        // Initialize game
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // Event listeners for controls
            document.addEventListener('keydown', handleKeyDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            
            // Button event listeners
            startButton.addEventListener('click', startGame);
            restartButton.addEventListener('click', startGame);
            
            // Initial draw
            draw();
        }
        
        // Start the game
        function startGame() {
            gameState.score = 0;
            gameState.timeLeft = GAME_DURATION;
            gameState.gameRunning = true;
            gameState.basketX = canvas.width / 2 - BASKET_WIDTH / 2;
            gameState.gemY = INITIAL_GEM_Y;
            gameState.gemX = canvas.width / 2 - GEM_DIAMETER / 2;
            
            titleScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            scoreDisplay.textContent = 'Score: 0';
            timerDisplay.textContent = 'Time: 45';
            
            // Start game loop
            if (gameState.animationId) {
                cancelAnimationFrame(gameState.animationId);
            }
            gameState.lastTime = performance.now();
            gameState.animationId = requestAnimationFrame(gameLoop);
        }
        
        // Game loop
        function gameLoop(timestamp) {
            if (!gameState.gameRunning) return;
            
            const deltaTime = timestamp - gameState.lastTime;
            gameState.lastTime = timestamp;
            
            // Update game state
            update(deltaTime);
            
            // Draw everything
            draw();
            
            // Continue the loop
            gameState.animationId = requestAnimationFrame(gameLoop);
        }
        
        // Update game state
        function update(deltaTime) {
            // Update timer
            gameState.timeLeft -= deltaTime;
            const secondsLeft = Math.ceil(gameState.timeLeft / 1000);
            timerDisplay.textContent = `Time: ${secondsLeft}`;
            
            // Check if game is over
            if (gameState.timeLeft <= 0) {
                endGame();
                return;
            }
            
            // Move gem
            gameState.gemY += GEM_SPEED;
            
            // Check if gem is missed (reaches bottom)
            if (gameState.gemY > canvas.height) {
                // Reset gem position
                gameState.gemY = INITIAL_GEM_Y;
                gameState.gemX = Math.random() * (canvas.width - GEM_DIAMETER);
            }
            
            // Check collision
            if (checkCollision()) {
                // Gem caught
                gameState.score++;
                scoreDisplay.textContent = `Score: ${gameState.score}`;
                
                // Reset gem position
                gameState.gemY = INITIAL_GEM_Y;
                gameState.gemX = Math.random() * (canvas.width - GEM_DIAMETER);
            }
        }
        
        // Check collision between basket and gem
        function checkCollision() {
            const basketRect = {
                x: gameState.basketX,
                y: canvas.height - BASKET_HEIGHT,
                width: BASKET_WIDTH,
                height: BASKET_HEIGHT
            };
            
            const gemRect = {
                x: gameState.gemX,
                y: gameState.gemY,
                width: GEM_DIAMETER,
                height: GEM_DIAMETER
            };
            
            // Simple rectangle collision detection
            return (
                basketRect.x < gemRect.x + gemRect.width &&
                basketRect.x + basketRect.width > gemRect.x &&
                basketRect.y < gemRect.y + gemRect.height &&
                basketRect.y + basketRect.height > gemRect.y
            );
        }
        
        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw basket
            ctx.fillStyle = '#f72585';
            ctx.fillRect(gameState.basketX, canvas.height - BASKET_HEIGHT, BASKET_WIDTH, BASKET_HEIGHT);
            
            // Draw gem
            ctx.fillStyle = '#4cc9f0';
            ctx.beginPath();
            ctx.arc(
                gameState.gemX + GEM_DIAMETER / 2,
                gameState.gemY + GEM_DIAMETER / 2,
                GEM_DIAMETER / 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // Add pulse animation to gem
            ctx.shadowColor = '#4cc9f0';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                gameState.gemX + GEM_DIAMETER / 2,
                gameState.gemY + GEM_DIAMETER / 2,
                GEM_DIAMETER / 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Handle keyboard input
        function handleKeyDown(e) {
            if (!gameState.gameRunning) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    gameState.basketX = Math.max(0, gameState.basketX - 10);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    gameState.basketX = Math.min(canvas.width - BASKET_WIDTH, gameState.basketX + 10);
                    break;
            }
        }
        
        // Handle mouse movement
        function handleMouseMove(e) {
            if (!gameState.gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            gameState.basketX = Math.max(0, Math.min(canvas.width - BASKET_WIDTH, mouseX - BASKET_WIDTH / 2));
        }
        
        // Handle touch movement
        function handleTouchMove(e) {
            if (!gameState.gameRunning) return;
            
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const touchX = touch.clientX - rect.left;
            gameState.basketX = Math.max(0, Math.min(canvas.width - BASKET_WIDTH, touchX - BASKET_WIDTH / 2));
        }
        
        // Handle mouse down for dragging
        function handleMouseDown(e) {
            if (!gameState.gameRunning) return;
            handleMouseMove(e);
        }
        
        // Handle touch start for dragging
        function handleTouchStart(e) {
            if (!gameState.gameRunning) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const touchX = touch.clientX - rect.left;
            gameState.basketX = Math.max(0, Math.min(canvas.width - BASKET_WIDTH, touchX - BASKET_WIDTH / 2));
        }
        
        // End the game
        function endGame() {
            gameState.gameRunning = false;
            cancelAnimationFrame(gameState.animationId);
            
            // Show game over screen
            finalScore.textContent = `Score: ${gameState.score}`;
            gameOverScreen.style.display = 'flex';
            
            // Add win flash effect to score
            scoreDisplay.classList.add('win-flash');
            setTimeout(() => {
                scoreDisplay.classList.remove('win-flash');
            }, 500);
        }
        
        // Initialize the game when the page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
