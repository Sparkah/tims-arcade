<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            overflow: hidden;
            position: relative;
        }
        
        #game-container {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #game-canvas {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            display: block;
        }
        
        #score-display {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            z-index: 10;
        }
        
        #misses-display {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ff6b6b;
            font-size: 20px;
            font-weight: bold;
            z-index: 10;
        }
        
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            display: none;
        }
        
        #game-over h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-shadow: 0 0 15px rgba(255, 107, 107, 0.7);
        }
        
        #final-score {
            font-size: 36px;
            margin-bottom: 30px;
            color: #4ecdc4;
        }
        
        #restart-button {
            background: #4ecdc4;
            color: #1a2a6c;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        #restart-button:hover {
            background: #ff6b6b;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            z-index: 10;
        }
        
        .hit-effect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(78, 205, 196, 0.7);
            pointer-events: none;
            animation: hitEffect 0.5s forwards;
            z-index: 5;
        }
        
        @keyframes hitEffect {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        
        .miss-effect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 107, 107, 0.7);
            pointer-events: none;
            animation: missEffect 0.5s forwards;
            z-index: 5;
        }
        
        @keyframes missEffect {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="score-display">Score: 0</div>
        <div id="misses-display">Misses: 0/3</div>
        <canvas id="game-canvas" width="500" height="500"></canvas>
        <div id="game-over">
            <h1>Game Over</h1>
            <div id="final-score">Score: 0</div>
            <button id="restart-button">Play Again</button>
        </div>
        <div id="instructions">Tap or press SPACE to hit the target</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            const scoreDisplay = document.getElementById('score-display');
            const missesDisplay = document.getElementById('misses-display');
            const gameOverScreen = document.getElementById('game-over');
            const finalScoreDisplay = document.getElementById('final-score');
            const restartButton = document.getElementById('restart-button');
            
            // Game state
            let score = 0;
            let misses = 0;
            let gameRunning = true;
            let targetAngle = 0;
            let targetWidth = 0.3; // radians
            let dotAngle = 0;
            let dotSpeed = 0.02; // radians per frame
            let lastTime = 0;
            
            // Center of the canvas
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const ringRadius = 180;
            const dotRadius = 12;
            const targetRadius = ringRadius + 10;
            
            // Initialize game
            function initGame() {
                score = 0;
                misses = 0;
                gameRunning = true;
                targetAngle = Math.random() * Math.PI * 2;
                targetWidth = 0.3;
                dotAngle = 0;
                lastTime = 0;
                
                updateDisplays();
                gameOverScreen.style.display = 'none';
            }
            
            // Update score and misses displays
            function updateDisplays() {
                scoreDisplay.textContent = `Score: ${score}`;
                missesDisplay.textContent = `Misses: ${misses}/3`;
            }
            
            // Draw the game
            function draw() {
                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw ring
                ctx.beginPath();
                ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 4;
                ctx.stroke();
                
                // Draw target arc
                ctx.beginPath();
                ctx.arc(centerX, centerY, targetRadius, 
                        targetAngle - targetWidth/2, 
                        targetAngle + targetWidth/2);
                ctx.strokeStyle = '#4ecdc4';
                ctx.lineWidth = 8;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                // Draw dot
                const dotX = centerX + Math.cos(dotAngle) * ringRadius;
                const dotY = centerY + Math.sin(dotAngle) * ringRadius;
                
                ctx.beginPath();
                ctx.arc(dotX, dotY, dotRadius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff6b6b';
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Draw dot highlight
                ctx.beginPath();
                ctx.arc(dotX - 4, dotY - 4, dotRadius/3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();
            }
            
            // Handle player input
            function handleInput() {
                if (!gameRunning) return;
                
                // Check if dot is in target
                const dotAngleNormalized = normalizeAngle(dotAngle);
                const targetStart = normalizeAngle(targetAngle - targetWidth/2);
                const targetEnd = normalizeAngle(targetAngle + targetWidth/2);
                
                let inTarget = false;
                
                if (targetStart < targetEnd) {
                    inTarget = dotAngleNormalized >= targetStart && dotAngleNormalized <= targetEnd;
                } else {
                    inTarget = dotAngleNormalized >= targetStart || dotAngleNormalized <= targetEnd;
                }
                
                if (inTarget) {
                    // Hit!
                    score++;
                    targetWidth *= 0.85; // Shrink target
                    createEffect(dotX, dotY, true);
                    updateDisplays();
                    
                    // Move target to new position
                    targetAngle = Math.random() * Math.PI * 2;
                } else {
                    // Miss!
                    misses++;
                    createEffect(dotX, dotY, false);
                    updateDisplays();
                    
                    if (misses >= 3) {
                        endGame();
                    }
                }
            }
            
            // Create visual effect at position
            function createEffect(x, y, isHit) {
                const effect = document.createElement('div');
                effect.className = isHit ? 'hit-effect' : 'miss-effect';
                effect.style.left = (x - 15) + 'px';
                effect.style.top = (y - 15) + 'px';
                document.getElementById('game-container').appendChild(effect);
                
                // Remove effect after animation
                setTimeout(() => {
                    effect.remove();
                }, 500);
            }
            
            // Normalize angle to [0, 2π)
            function normalizeAngle(angle) {
                while (angle < 0) angle += Math.PI * 2;
                while (angle >= Math.PI * 2) angle -= Math.PI * 2;
                return angle;
            }
            
            // End the game
            function endGame() {
                gameRunning = false;
                finalScoreDisplay.textContent = `Score: ${score}`;
                gameOverScreen.style.display = 'flex';
            }
            
            // Game loop
            function gameLoop(timestamp) {
                if (!lastTime) lastTime = timestamp;
                const deltaTime = timestamp - lastTime;
                lastTime = timestamp;
                
                if (gameRunning) {
                    // Update dot position
                    dotAngle += dotSpeed;
                    
                    // Draw everything
                    draw();
                }
                
                requestAnimationFrame(gameLoop);
            }
            
            // Event listeners
            canvas.addEventListener('click', handleInput);
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    handleInput();
                }
            });
            
            restartButton.addEventListener('click', initGame);
            
            // Start the game
            initGame();
            requestAnimationFrame(gameLoop);
        });
    </script>
</body>
</html>
