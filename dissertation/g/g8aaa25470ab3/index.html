<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        #gameCanvas {
            background: #0d1b2a;
            display: block;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #4dff4d;
            text-shadow: 0 0 10px rgba(77, 255, 77, 0.5);
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            text-align: center;
            pointer-events: auto;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
        }
        
        h2 {
            font-size: 36px;
            margin-bottom: 30px;
            color: #4dff4d;
        }
        
        p {
            font-size: 22px;
            margin-bottom: 30px;
            max-width: 80%;
            line-height: 1.6;
        }
        
        #finalScore {
            font-size: 42px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }
        
        .btn {
            background: linear-gradient(to bottom, #ff8c00, #ff4500);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
            margin-top: 20px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            background: linear-gradient(to bottom, #ff9d00, #ff5500);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #aaa;
            font-size: 18px;
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="uiOverlay">
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 45s</div>
            <div id="instructions">Use ← → keys or A/D to move the basket</div>
        </div>
        
        <div id="startScreen">
            <h1>Gem Catch Sprint</h1>
            <p>Catch falling gems to score points!</p>
            <p>Move your basket to catch gems before they fall!</p>
            <button id="startBtn" class="btn">Start Game</button>
        </div>
        
        <div id="gameOverScreen">
            <h1>Game Over!</h1>
            <h2>Your Score</h2>
            <div id="finalScore">0</div>
            <button id="restartBtn" class="btn">Play Again</button>
        </div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let timeLeft = 45;
        let gameTimer = null;
        let gem = null;
        let basket = {
            x: canvas.width / 2 - 50,
            y: canvas.height - 60,
            width: 100,
            height: 40,
            speed: 8
        };
        
        // Input handling
        let keys = {};
        let mouseX = 0;
        let isDragging = false;
        
        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 45;
            scoreDisplay.textContent = `Score: ${score}`;
            timerDisplay.textContent = `Time: ${timeLeft}s`;
            
            // Create initial gem
            gem = {
                x: Math.random() * (canvas.width - 60) + 30,
                y: 30,
                width: 50,
                height: 50,
                speed: 3
            };
            
            // Reset basket position
            basket.x = canvas.width / 2 - 50;
            
            gameRunning = true;
        }
        
        // Draw basket
        function drawBasket() {
            // Basket body
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
            
            // Basket rim
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(basket.x - 5, basket.y, 5, basket.height);
            ctx.fillRect(basket.x + basket.width, basket.y, 5, basket.height);
            
            // Basket handle
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(basket.x + basket.width/2, basket.y - 10, 15, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Draw gem
        function drawGem() {
            // Gem body
            ctx.fillStyle = '#4169E1';
            ctx.beginPath();
            ctx.arc(gem.x, gem.y, gem.width/2, 0, Math.PI * 2);
            ctx.fill();
            
            // Gem shine
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(gem.x - gem.width/4, gem.y - gem.height/4, gem.width/6, 0, Math.PI * 2);
            ctx.fill();
            
            // Gem highlight
            ctx.fillStyle = '#87CEEB';
            ctx.beginPath();
            ctx.arc(gem.x + gem.width/4, gem.y + gem.height/4, gem.width/8, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Draw background
        function drawBackground() {
            // Draw stars
            ctx.fillStyle = 'white';
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                ctx.fillRect(x, y, size, size);
            }
        }
        
        // Check collision between gem and basket
        function checkCollision() {
            return (
                gem.x + gem.width/2 > basket.x &&
                gem.x - gem.width/2 < basket.x + basket.width &&
                gem.y + gem.height/2 > basket.y &&
                gem.y - gem.height/2 < basket.y + basket.height
            );
        }
        
        // Update game state
        function update() {
            if (!gameRunning) return;
            
            // Move gem down
            gem.y += gem.speed;
            
            // Check if gem is caught
            if (checkCollision()) {
                score++;
                scoreDisplay.textContent = `Score: ${score}`;
                
                // Create new gem at top
                gem.x = Math.random() * (canvas.width - 60) + 30;
                gem.y = 30;
            }
            
            // Check if gem is missed (falls off screen)
            if (gem.y > canvas.height) {
                // Gem disappears, new one appears at top
                gem.x = Math.random() * (canvas.width - 60) + 30;
                gem.y = 30;
            }
            
            // Update timer
            if (timeLeft > 0) {
                timeLeft -= 0.016; // Approximate 60fps
                timerDisplay.textContent = `Time: ${Math.ceil(timeLeft)}s`;
            } else {
                endGame();
            }
        }
        
        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background
            drawBackground();
            
            // Draw game elements
            drawGem();
            drawBasket();
        }
        
        // Game loop
        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // Start game
        function startGame() {
            initGame();
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            gameLoop();
        }
        
        // End game
        function endGame() {
            gameRunning = false;
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'flex';
        }
        
        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        
        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            // Handle spacebar for restart
            if (e.key === ' ' && !gameRunning) {
                startGame();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // Mouse controls
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging && gameRunning) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                
                // Keep basket within bounds
                if (basket.x < 0) basket.x = 0;
                if (basket.x + basket.width > canvas.width) basket.x = canvas.width - basket.width;
            }
        });
        
        canvas.addEventListener('mousedown', (e) => {
            if (gameRunning) {
                isDragging = true;
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });
        
        // Touch controls
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameRunning) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const clientX = touch.clientX;
                mouseX = clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                
                // Keep basket within bounds
                if (basket.x < 0) basket.x = 0;
                if (basket.x + basket.width > canvas.width) basket.x = canvas.width - basket.width;
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) {
                isDragging = true;
            }
        });
        
        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });
        
        // Handle keyboard movement
        function handleKeyboardMovement() {
            if (!gameRunning) return;
            
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                basket.x -= basket.speed;
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                basket.x += basket.speed;
            }
            
            // Keep basket within bounds
            if (basket.x < 0) basket.x = 0;
            if (basket.x + basket.width > canvas.width) basket.x = canvas.width - basket.width;
        }
        
        // Continuous keyboard handling
        setInterval(handleKeyboardMovement, 16);
    </script>
</body>
</html>
