<!DOCTYPE html>
<html>
<head>
    <title>Orbit Tap</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #gameCanvas {
            background: #0f3460;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
        }
        
        #missesDisplay {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ff6b6b;
            font-size: 18px;
            font-weight: bold;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            display: none;
        }
        
        #finalScore {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            color: #4ecdc4;
        }
        
        #restartButton {
            background: #4ecdc4;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            color: #0f3460;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        #restartButton:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: #a9a9a9;
            font-size: 16px;
        }
        
        .hitEffect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(78, 205, 196, 0.7);
            pointer-events: none;
            animation: hitAnimation 0.5s forwards;
        }
        
        @keyframes hitAnimation {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        
        .missEffect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 107, 107, 0.7);
            pointer-events: none;
            animation: missAnimation 0.5s forwards;
        }
        
        @keyframes missAnimation {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div id="scoreDisplay">Score: 0</div>
        <div id="missesDisplay">Misses: 0/3</div>
        <div id="gameOverScreen">
            <h2>Game Over</h2>
            <div id="finalScore">Score: 0</div>
            <button id="restartButton">Play Again</button>
        </div>
        <div id="instructions">Click or press SPACE to tap</div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const missesDisplay = document.getElementById('missesDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');
        
        // Game state
        let score = 0;
        let misses = 0;
        let gameRunning = true;
        let targetAngle = 0;
        let targetSize = 0.2; // radians
        let dotAngle = 0;
        let dotSpeed = 0.02;
        let animationId;
        
        // Center of the canvas
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const ringRadius = 200;
        const dotRadius = 10;
        const targetRadius = ringRadius - 20;
        
        // Initialize game
        function initGame() {
            score = 0;
            misses = 0;
            gameRunning = true;
            targetAngle = Math.random() * Math.PI * 2;
            targetSize = 0.2;
            dotAngle = 0;
            updateDisplays();
            gameOverScreen.style.display = 'none';
            animate();
        }
        
        // Update score and misses displays
        function updateDisplays() {
            scoreDisplay.textContent = `Score: ${score}`;
            missesDisplay.textContent = `Misses: ${misses}/3`;
        }
        
        // Draw the game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw ring
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // Draw target arc
            ctx.beginPath();
            ctx.arc(centerX, centerY, targetRadius, targetAngle - targetSize/2, targetAngle + targetSize/2);
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Draw dot
            const dotX = centerX + Math.cos(dotAngle) * targetRadius;
            const dotY = centerY + Math.sin(dotAngle) * targetRadius;
            
            ctx.beginPath();
            ctx.arc(dotX, dotY, dotRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw dot glow
            ctx.beginPath();
            ctx.arc(dotX, dotY, dotRadius + 5, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(dotX, dotY, dotRadius, dotX, dotY, dotRadius + 5);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        // Update game state
        function update() {
            // Move dot
            dotAngle += dotSpeed;
            
            // Keep angle within 0 to 2π
            if (dotAngle > Math.PI * 2) {
                dotAngle -= Math.PI * 2;
            }
        }
        
        // Handle player input
        function handleTap() {
            if (!gameRunning) return;
            
            // Calculate if dot is in target
            const dotInTarget = isDotInTarget();
            
            if (dotInTarget) {
                // Hit
                score++;
                targetSize *= 0.9; // Shrink target
                createEffect(centerX + Math.cos(dotAngle) * targetRadius, 
                           centerY + Math.sin(dotAngle) * targetRadius, 
                           true);
                if (targetSize < 0.05) targetSize = 0.05; // Minimum size
            } else {
                // Miss
                misses++;
                createEffect(centerX + Math.cos(dotAngle) * targetRadius, 
                           centerY + Math.sin(dotAngle) * targetRadius, 
                           false);
                
                if (misses >= 3) {
                    endGame();
                    return;
                }
            }
            
            updateDisplays();
            // Move target to new random position
            targetAngle = Math.random() * Math.PI * 2;
        }
        
        // Check if dot is in target
        function isDotInTarget() {
            // Normalize angles to 0 to 2π
            let normalizedDotAngle = dotAngle;
            let normalizedTargetAngle = targetAngle;
            
            while (normalizedDotAngle < 0) normalizedDotAngle += Math.PI * 2;
            while (normalizedTargetAngle < 0) normalizedTargetAngle += Math.PI * 2;
            
            // Calculate difference
            let diff = Math.abs(normalizedDotAngle - normalizedTargetAngle);
            if (diff > Math.PI) diff = Math.PI * 2 - diff;
            
            // Check if within target
            return diff < targetSize / 2;
        }
        
        // Create visual effect
        function createEffect(x, y, isHit) {
            const effect = document.createElement('div');
            effect.className = isHit ? 'hitEffect' : 'missEffect';
            effect.style.left = (x - 15) + 'px';
            effect.style.top = (y - 15) + 'px';
            document.getElementById('gameContainer').appendChild(effect);
            
            // Remove effect after animation
            setTimeout(() => {
                effect.remove();
            }, 500);
        }
        
        // End the game
        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            finalScore.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'flex';
        }
        
        // Animation loop
        function animate() {
            update();
            draw();
            if (gameRunning) {
                animationId = requestAnimationFrame(animate);
            }
        }
        
        // Event listeners
        canvas.addEventListener('click', handleTap);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleTap();
            }
        });
        
        restartButton.addEventListener('click', initGame);
        
        // Start the game
        initGame();
    </script>
</body>
</html>
