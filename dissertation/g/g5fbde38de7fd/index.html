<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            overflow: hidden;
        }
        
        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB, #1E90FF);
            display: block;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        #gameOverScreen.visible {
            opacity: 1;
            pointer-events: all;
        }
        
        #finalScore {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }
        
        #restartButton {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        
        #restartButton:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }
        
        #restartButton:active {
            transform: scale(0.98);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 18px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="uiOverlay">
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 45s</div>
            <div id="gameOverScreen">
                <div id="finalScore">Score: 0</div>
                <button id="restartButton">Play Again</button>
            </div>
            <div id="instructions">Use ← → keys or A/D to move | Catch gems to score</div>
        </div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');
        
        // Game state
        let score = 0;
        let timeLeft = 45;
        let gameActive = false;
        let gameTimer;
        let gem;
        let basket;
        let keys = {};
        let mouseX = 0;
        let isDragging = false;
        
        // Gem class
        class Gem {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * (canvas.width - 60) + 30;
                this.y = -30;
                this.size = 40;
                this.speed = 3;
                this.color = this.getRandomColor();
            }
            
            getRandomColor() {
                const colors = [
                    '#FFD700', // Gold
                    '#FF0000', // Red
                    '#00FF00', // Green
                    '#0000FF', // Blue
                    '#FF00FF', // Magenta
                    '#00FFFF'  // Cyan
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.y += this.speed;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size/2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Add shine effect
                ctx.beginPath();
                ctx.arc(this.x - this.size/4, this.y - this.size/4, this.size/6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();
            }
        }
        
        // Basket class
        class Basket {
            constructor() {
                this.width = 100;
                this.height = 40;
                this.x = canvas.width / 2 - this.width / 2;
                this.y = canvas.height - 60;
                this.speed = 8;
            }
            
            update() {
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                    this.x = Math.max(0, this.x - this.speed);
                }
                if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                    this.x = Math.min(canvas.width - this.width, this.x + this.speed);
                }
            }
            
            draw() {
                // Basket body
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // Basket handle
                ctx.fillStyle = '#A0522D';
                ctx.fillRect(this.x - 10, this.y + 10, 10, 20);
                ctx.fillRect(this.x + this.width, this.y + 10, 10, 20);
                
                // Basket rim
                ctx.strokeStyle = '#654321';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.width, this.y);
                ctx.stroke();
            }
        }
        
        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 45;
            gameActive = true;
            
            gem = new Gem();
            basket = new Basket();
            
            updateUI();
            gameOverScreen.classList.remove('visible');
            
            // Start game timer
            clearInterval(gameTimer);
            gameTimer = setInterval(updateTimer, 1000);
            
            // Start game loop
            requestAnimationFrame(gameLoop);
        }
        
        // Update UI elements
        function updateUI() {
            scoreDisplay.textContent = `Score: ${score}`;
            timerDisplay.textContent = `Time: ${timeLeft}s`;
        }
        
        // Update timer
        function updateTimer() {
            timeLeft--;
            updateUI();
            
            if (timeLeft <= 0) {
                endGame();
            }
        }
        
        // Game loop
        function gameLoop() {
            if (!gameActive) return;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Update and draw basket
            basket.update();
            basket.draw();
            
            // Update and draw gem
            gem.update();
            gem.draw();
            
            // Check for collision
            if (checkCollision()) {
                score++;
                updateUI();
                gem.reset();
            }
            
            // Check if gem is missed
            if (gem.y > canvas.height) {
                gem.reset();
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        // Collision detection
        function checkCollision() {
            const gemCenterX = gem.x;
            const gemCenterY = gem.y;
            const basketLeft = basket.x;
            const basketRight = basket.x + basket.width;
            const basketTop = basket.y;
            const basketBottom = basket.y + basket.height;
            
            // Simple bounding box collision
            return (
                gemCenterX + gem.size/2 > basketLeft &&
                gemCenterX - gem.size/2 < basketRight &&
                gemCenterY + gem.size/2 > basketTop &&
                gemCenterY - gem.size/2 < basketBottom
            );
        }
        
        // End game
        function endGame() {
            gameActive = false;
            clearInterval(gameTimer);
            finalScore.textContent = `Score: ${score}`;
            gameOverScreen.classList.add('visible');
        }
        
        // Event listeners
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging && gameActive) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                // Keep basket within canvas bounds
                basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));
            }
        });
        
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            canvas.addEventListener('mousemove', handleMouseMove);
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            canvas.removeEventListener('mousemove', handleMouseMove);
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
            canvas.removeEventListener('mousemove', handleMouseMove);
        });
        
        function handleMouseMove(e) {
            if (isDragging && gameActive) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                // Keep basket within canvas bounds
                basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));
            }
        }
        
        // Touch support for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            basket.x = mouseX - basket.width / 2;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging && gameActive) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                mouseX = touch.clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                // Keep basket within canvas bounds
                basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));
            }
        });
        
        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });
        
        restartButton.addEventListener('click', initGame);
        
        // Initialize the game
        initGame();
    </script>
</body>
</html>
