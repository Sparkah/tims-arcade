<!DOCTYPE html>
<html>
<head>
    <title>Orbit Tap</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #gameCanvas {
            background-color: #0d1b2a;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
        }
        
        #missesDisplay {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ff6b6b;
            font-size: 18px;
            font-weight: bold;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            display: none;
        }
        
        #finalScore {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            color: #4ecdc4;
        }
        
        #restartButton {
            background: linear-gradient(to bottom, #4ecdc4, #1a936f);
            border: none;
            border-radius: 50px;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }
        
        #restartButton:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        #restartButton:active {
            transform: translateY(1px);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
        }
        
        .hitEffect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: rgba(78, 205, 196, 0.7);
            animation: hitAnimation 0.5s forwards;
            pointer-events: none;
        }
        
        @keyframes hitAnimation {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        
        .missEffect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: rgba(255, 107, 107, 0.7);
            animation: missAnimation 0.5s forwards;
            pointer-events: none;
        }
        
        @keyframes missAnimation {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div id="scoreDisplay">Score: 0</div>
        <div id="missesDisplay">Misses: 0/3</div>
        <div id="gameOverScreen">
            <h1>Game Over</h1>
            <div id="finalScore">Score: 0</div>
            <button id="restartButton">Play Again</button>
        </div>
        <div id="instructions">Tap or press SPACE to hit the target</div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const missesDisplay = document.getElementById('missesDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');
        
        // Game state
        let score = 0;
        let misses = 0;
        let gameRunning = true;
        let targetAngle = 0;
        let targetWidth = Math.PI / 3; // 60 degrees
        let dotAngle = 0;
        let dotSpeed = 0.02;
        let lastTime = 0;
        let animationId;
        
        // Center of the canvas
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const ringRadius = 200;
        const dotRadius = 10;
        
        // Initialize game
        function initGame() {
            score = 0;
            misses = 0;
            gameRunning = true;
            targetAngle = Math.random() * Math.PI * 2;
            targetWidth = Math.PI / 3;
            dotAngle = 0;
            dotSpeed = 0.02;
            gameOverScreen.style.display = 'none';
            updateDisplays();
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            gameLoop();
        }
        
        // Update score and misses displays
        function updateDisplays() {
            scoreDisplay.textContent = `Score: ${score}`;
            missesDisplay.textContent = `Misses: ${misses}/3`;
        }
        
        // Draw the game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw ring
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
            ctx.strokeStyle = '#4a5568';
            ctx.lineWidth = 10;
            ctx.stroke();
            
            // Draw target arc
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius, targetAngle - targetWidth/2, targetAngle + targetWidth/2);
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 15;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Draw dot
            const dotX = centerX + Math.cos(dotAngle) * ringRadius;
            const dotY = centerY + Math.sin(dotAngle) * ringRadius;
            
            ctx.beginPath();
            ctx.arc(dotX, dotY, dotRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#ff6b6b';
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw dot glow
            ctx.beginPath();
            ctx.arc(dotX, dotY, dotRadius + 5, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(dotX, dotY, dotRadius, dotX, dotY, dotRadius + 5);
            gradient.addColorStop(0, 'rgba(255, 107, 107, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 107, 107, 0)');
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        // Create visual feedback for hit/miss
        function createFeedback(x, y, isHit) {
            const feedback = document.createElement('div');
            feedback.className = isHit ? 'hitEffect' : 'missEffect';
            feedback.style.left = (x - 15) + 'px';
            feedback.style.top = (y - 15) + 'px';
            document.getElementById('gameContainer').appendChild(feedback);
            
            setTimeout(() => {
                feedback.remove();
            }, 500);
        }
        
        // Handle player hit
        function handleHit() {
            const dotX = centerX + Math.cos(dotAngle) * ringRadius;
            const dotY = centerY + Math.sin(dotAngle) * ringRadius;
            
            // Check if dot is in target
            const dotAngleInTarget = (dotAngle - targetAngle + Math.PI) % (Math.PI * 2) - Math.PI;
            
            if (Math.abs(dotAngleInTarget) < targetWidth / 2) {
                // Hit!
                score++;
                targetWidth *= 0.9; // Shrink target
                if (targetWidth < 0.2) targetWidth = 0.2; // Minimum size
                createFeedback(dotX, dotY, true);
            } else {
                // Miss!
                misses++;
                createFeedback(dotX, dotY, false);
                if (misses >= 3) {
                    endGame();
                    return;
                }
            }
            
            updateDisplays();
            // Reset target position
            targetAngle = Math.random() * Math.PI * 2;
        }
        
        // End the game
        function endGame() {
            gameRunning = false;
            finalScore.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'flex';
        }
        
        // Game loop
        function gameLoop(timestamp) {
            if (!gameRunning) return;
            
            // Calculate delta time for smooth animation
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            // Update dot position
            dotAngle += dotSpeed;
            if (dotAngle >= Math.PI * 2) {
                dotAngle -= Math.PI * 2;
            }
            
            // Draw everything
            draw();
            
            // Continue animation loop
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Event listeners
        canvas.addEventListener('click', () => {
            if (gameRunning) {
                handleHit();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning) {
                    handleHit();
                }
            }
        });
        
        restartButton.addEventListener('click', initGame);
        
        // Start the game
        initGame();
    </script>
</body>
</html>
