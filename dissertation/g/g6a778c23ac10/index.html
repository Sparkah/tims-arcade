<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            padding: 20px;
        }
        
        .game-container {
            background-color: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: rgba(30, 30, 50, 0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
        }
        
        .pad-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 15px;
            margin-bottom: 30px;
        }
        
        .pad {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
            background: #444;
        }
        
        .pad:hover {
            transform: scale(1.03);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }
        
        .pad:active {
            transform: scale(0.98);
        }
        
        .pad.active {
            transform: scale(0.95);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
        
        .pad.correct {
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.7);
        }
        
        .pad.incorrect {
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        button {
            background: linear-gradient(to bottom, #4a90e2, #2a5cb0);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        #start-btn {
            background: linear-gradient(to bottom, #50c878, #3a9c5a);
        }
        
        #restart-btn {
            background: linear-gradient(to bottom, #ff6b6b, #d32f2f);
        }
        
        .message {
            color: #fff;
            font-size: 1.3rem;
            min-height: 40px;
            margin: 15px 0;
            padding: 10px;
            border-radius: 10px;
            background: rgba(30, 30, 50, 0.7);
        }
        
        .game-over {
            display: none;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
            margin-top: 20px;
        }
        
        .game-over h2 {
            color: #ff6b6b;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        
        .game-over p {
            color: white;
            font-size: 1.5rem;
            margin: 10px 0;
        }
        
        .key-hint {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        @media (max-width: 500px) {
            .game-container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .pad-grid {
                grid-gap: 10px;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            button {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div class="game-container">
        <h1>Pattern Echo</h1>
        
        <div class="stats">
            <div class="score">Round: <span id="round">1</span></div>
            <div class="lives">Lives: <span id="lives">3</span></div>
        </div>
        
        <div class="pad-grid">
            <div class="pad" id="pad-1" data-pad="1"></div>
            <div class="pad" id="pad-2" data-pad="2"></div>
            <div class="pad" id="pad-3" data-pad="3"></div>
            <div class="pad" id="pad-4" data-pad="4"></div>
        </div>
        
        <div class="message" id="message">Press Start to begin!</div>
        
        <div class="controls">
            <button id="start-btn">Start Game</button>
            <button id="restart-btn">Restart</button>
        </div>
        
        <div class="key-hint">Controls: 1, 2, 3, 4 keys or click/tap pads</div>
        
        <div class="game-over" id="game-over">
            <h2>Game Over!</h2>
            <p>Final Round: <span id="final-round">0</span></p>
            <p>Score: <span id="final-score">0</span></p>
            <button id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game elements
            const pads = document.querySelectorAll('.pad');
            const startBtn = document.getElementById('start-btn');
            const restartBtn = document.getElementById('restart-btn');
            const messageEl = document.getElementById('message');
            const roundEl = document.getElementById('round');
            const livesEl = document.getElementById('lives');
            const gameOverScreen = document.getElementById('game-over');
            const finalRoundEl = document.getElementById('final-round');
            const finalScoreEl = document.getElementById('final-score');
            const playAgainBtn = document.getElementById('play-again-btn');
            
            // Game state
            let gameActive = false;
            let sequence = [];
            let playerSequence = [];
            let currentStep = 0;
            let lives = 3;
            let round = 1;
            let isReplaying = false;
            
            // Pad colors
            const padColors = {
                1: '#FF6B6B', // Red
                2: '#4ECDC4', // Teal
                3: '#FFD166', // Yellow
                4: '#6A0572'  // Purple
            };
            
            // Initialize pads with colors
            pads.forEach(pad => {
                const padId = parseInt(pad.dataset.pad);
                pad.style.backgroundColor = padColors[padId];
            });
            
            // Start game
            startBtn.addEventListener('click', startGame);
            
            // Restart game
            restartBtn.addEventListener('click', restartGame);
            playAgainBtn.addEventListener('click', restartGame);
            
            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                if (!gameActive || isReplaying) return;
                
                let padId = null;
                switch(e.key) {
                    case '1': padId = 1; break;
                    case '2': padId = 2; break;
                    case '3': padId = 3; break;
                    case '4': padId = 4; break;
                }
                
                if (padId !== null) {
                    handlePadClick(padId);
                }
            });
            
            // Pad click handlers
            pads.forEach(pad => {
                pad.addEventListener('click', () => {
                    if (!gameActive || isReplaying) return;
                    const padId = parseInt(pad.dataset.pad);
                    handlePadClick(padId);
                });
            });
            
            function startGame() {
                resetGame();
                gameActive = true;
                messageEl.textContent = "Watch the sequence...";
                messageEl.style.color = "#4ECDC4";
                
                // Start with first sequence
                generateSequence();
                playSequence();
            }
            
            function restartGame() {
                resetGame();
                gameOverScreen.style.display = 'none';
                messageEl.textContent = "Press Start to begin!";
                messageEl.style.color = "#fff";
                startBtn.disabled = false;
            }
            
            function resetGame() {
                gameActive = false;
                sequence = [];
                playerSequence = [];
                currentStep = 0;
                lives = 3;
                round = 1;
                isReplaying = false;
                
                roundEl.textContent = round;
                livesEl.textContent = lives;
                
                // Reset pad styles
                pads.forEach(pad => {
                    pad.classList.remove('active', 'correct', 'incorrect');
                });
            }
            
            function generateSequence() {
                // Start with 1 pad for round 1, then add one each round
                const sequenceLength = round;
                
                // Generate new sequence
                for (let i = 0; i < sequenceLength; i++) {
                    sequence.push(Math.floor(Math.random() * 4) + 1);
                }
            }
            
            function playSequence() {
                isReplaying = true;
                messageEl.textContent = "Watch the sequence...";
                messageEl.style.color = "#4ECDC4";
                
                let step = 0;
                
                const playStep = () => {
                    if (step >= sequence.length) {
                        isReplaying = false;
                        messageEl.textContent = "Repeat the sequence!";
                        messageEl.style.color = "#FFD166";
                        return;
                    }
                    
                    const padId = sequence[step];
                    const pad = document.getElementById(`pad-${padId}`);
                    
                    // Highlight pad
                    pad.classList.add('active');
                    setTimeout(() => {
                        pad.classList.remove('active');
                        step++;
                        setTimeout(playStep, 500);
                    }, 500);
                };
                
                setTimeout(playStep, 500);
            }
            
            function handlePadClick(padId) {
                // Highlight clicked pad
                const pad = document.getElementById(`pad-${padId}`);
                pad.classList.add('active');
                setTimeout(() => {
                    pad.classList.remove('active');
                }, 200);
                
                // Add to player sequence
                playerSequence.push(padId);
                
                // Check if correct
                if (padId !== sequence[currentStep]) {
                    // Wrong pad
                    pad.classList.add('incorrect');
                    setTimeout(() => {
                        pad.classList.remove('incorrect');
                    }, 300);
                    
                    lives--;
                    livesEl.textContent = lives;
                    
                    if (lives <= 0) {
                        gameOver();
                    } else {
                        // Replay current sequence
                        playerSequence = [];
                        currentStep = 0;
                        playSequence();
                    }
                    return;
                }
                
                // Correct pad
                pad.classList.add('correct');
                setTimeout(() => {
                    pad.classList.remove('correct');
                }, 300);
                
                currentStep++;
                
                // Check if sequence complete
                if (currentStep >= sequence.length) {
                    // Round complete
                    round++;
                    roundEl.textContent = round;
                    playerSequence = [];
                    currentStep = 0;
                    
                    // Add new pad to sequence
                    sequence.push(Math.floor(Math.random() * 4) + 1);
                    
                    // Play next sequence
                    setTimeout(() => {
                        playSequence();
                    }, 500);
                }
            }
            
            function gameOver() {
                gameActive = false;
                messageEl.textContent = "Game Over!";
                messageEl.style.color = "#ff6b6b";
                finalRoundEl.textContent = round;
                finalScoreEl.textContent = round - 1;
                gameOverScreen.style.display = 'block';
            }
        });
    </script>
</body>
</html>
