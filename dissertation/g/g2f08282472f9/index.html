<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1D3557;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 500px;
            width: 100%;
        }

        #ui-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 10px 20px;
            background-color: rgba(67, 97, 238, 0.2);
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
        }

        #pad-grid {
            display: grid;
            grid-template-columns: 180px 180px;
            grid-template-rows: 180px 180px;
            gap: 20px;
            width: 400px;
            height: 400px;
        }

        .pad {
            background-color: #4361EE;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            transition: all 0.1s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            user-select: none;
        }

        .pad:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(76, 201, 240, 0.4);
        }

        .pad.active {
            transform: scale(1.05);
            border: 4px solid #4CC9F0;
            box-shadow: 0 0 15px rgba(76, 201, 240, 0.7);
        }

        .pad.correct {
            background-color: #4CAF50;
            animation: flash 150ms ease;
        }

        .pad.error {
            background-color: #F44336;
            animation: flash 150ms ease;
        }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        #controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        #start-button, #restart-button {
            background-color: #4361EE;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        #start-button:hover, #restart-button:hover {
            background-color: #4CC9F0;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        #start-button:active, #restart-button:active {
            transform: translateY(0);
        }

        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(29, 53, 87, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #game-over.show {
            opacity: 1;
            pointer-events: all;
        }

        #game-over h2 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        #final-score {
            color: #4CC9F0;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .instructions {
            color: white;
            text-align: center;
            max-width: 80%;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        @media (max-width: 500px) {
            #pad-grid {
                width: 300px;
                height: 300px;
            }
            
            .pad {
                width: 130px;
                height: 130px;
                font-size: 2rem;
            }
            
            #pad-grid {
                grid-template-columns: 130px 130px;
                grid-template-rows: 130px 130px;
            }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="ui-bar">
            <div id="score">Score: 0</div>
            <div id="lives">Lives: 3</div>
        </div>
        
        <div id="pad-grid">
            <div class="pad" data-index="0">1</div>
            <div class="pad" data-index="1">2</div>
            <div class="pad" data-index="2">3</div>
            <div class="pad" data-index="3">4</div>
        </div>
        
        <div id="controls">
            <button id="start-button">Start Game</button>
            <div class="instructions">
                Watch the sequence, then repeat it. Use keys 1-4 or click pads.
            </div>
        </div>
    </div>
    
    <div id="game-over">
        <h2>Game Over</h2>
        <div id="final-score">Score: 0</div>
        <button id="restart-button">Play Again</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game state
            const gameState = {
                score: 0,
                lives: 3,
                sequence: [],
                playerSequence: [],
                currentStep: 0,
                isPlaying: false,
                isReplaying: false,
                gameActive: false
            };

            // DOM elements
            const padGrid = document.getElementById('pad-grid');
            const pads = document.querySelectorAll('.pad');
            const startButton = document.getElementById('start-button');
            const restartButton = document.getElementById('restart-button');
            const scoreDisplay = document.getElementById('score');
            const livesDisplay = document.getElementById('lives');
            const gameOverScreen = document.getElementById('game-over');
            const finalScoreDisplay = document.getElementById('final-score');

            // Initialize game
            function initGame() {
                gameState.score = 0;
                gameState.lives = 3;
                gameState.sequence = [];
                gameState.playerSequence = [];
                gameState.currentStep = 0;
                gameState.isPlaying = false;
                gameState.isReplaying = false;
                gameState.gameActive = false;
                
                updateUI();
                hideGameOver();
                startButton.style.display = 'block';
                restartButton.style.display = 'none';
            }

            // Update UI displays
            function updateUI() {
                scoreDisplay.textContent = `Score: ${gameState.score}`;
                livesDisplay.textContent = `Lives: ${gameState.lives}`;
            }

            // Show game over screen
            function showGameOver() {
                finalScoreDisplay.textContent = `Score: ${gameState.score}`;
                gameOverScreen.classList.add('show');
            }

            // Hide game over screen
            function hideGameOver() {
                gameOverScreen.classList.remove('show');
            }

            // Add a new pad to the sequence
            function addToSequence() {
                const randomPad = Math.floor(Math.random() * 4);
                gameState.sequence.push(randomPad);
            }

            // Play the sequence
            async function playSequence() {
                gameState.isPlaying = true;
                gameState.isReplaying = false;
                
                for (let i = 0; i < gameState.sequence.length; i++) {
                    const padIndex = gameState.sequence[i];
                    const pad = pads[padIndex];
                    
                    // Highlight the pad
                    pad.classList.add('active');
                    await sleep(1000);
                    pad.classList.remove('active');
                    await sleep(500);
                }
                
                gameState.isPlaying = false;
            }

            // Start a new round
            function startRound() {
                if (gameState.sequence.length === 0) {
                    addToSequence();
                } else {
                    addToSequence();
                }
                
                gameState.playerSequence = [];
                gameState.currentStep = 0;
                playSequence();
            }

            // Handle pad click
            function handlePadClick(padIndex) {
                if (!gameState.gameActive || gameState.isPlaying || gameState.isReplaying) {
                    return;
                }
                
                const pad = pads[padIndex];
                pad.classList.add('correct');
                setTimeout(() => pad.classList.remove('correct'), 150);
                
                // Check if the player's input matches the sequence
                if (padIndex === gameState.sequence[gameState.currentStep]) {
                    gameState.currentStep++;
                    
                    if (gameState.currentStep === gameState.sequence.length) {
                        // Player completed the sequence
                        gameState.score++;
                        updateUI();
                        
                        // Check for win condition
                        if (gameState.score >= 10) {
                            // Player wins
                            gameState.gameActive = false;
                            showGameOver();
                            return;
                        }
                        
                        // Start next round
                        setTimeout(startRound, 500);
                    }
                } else {
                    // Player made a mistake
                    pad.classList.add('error');
                    setTimeout(() => pad.classList.remove('error'), 150);
                    
                    gameState.lives--;
                    updateUI();
                    
                    if (gameState.lives <= 0) {
                        // Game over
                        gameState.gameActive = false;
                        showGameOver();
                        return;
                    }
                    
                    // Replay the sequence
                    gameState.isReplaying = true;
                    setTimeout(() => {
                        playSequence();
                        gameState.isReplaying = false;
                    }, 500);
                }
            }

            // Keyboard controls
            function handleKeyPress(e) {
                if (!gameState.gameActive) return;
                
                let padIndex = -1;
                
                switch(e.key) {
                    case '1': padIndex = 0; break;
                    case '2': padIndex = 1; break;
                    case '3': padIndex = 2; break;
                    case '4': padIndex = 3; break;
                }
                
                if (padIndex !== -1) {
                    handlePadClick(padIndex);
                }
            }

            // Sleep function for delays
            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            // Event listeners
            startButton.addEventListener('click', () => {
                gameState.gameActive = true;
                startButton.style.display = 'none';
                restartButton.style.display = 'block';
                startRound();
            });

            restartButton.addEventListener('click', initGame);

            pads.forEach(pad => {
                pad.addEventListener('click', () => {
                    const padIndex = parseInt(pad.dataset.index);
                    handlePadClick(padIndex);
                });
            });

            document.addEventListener('keydown', handleKeyPress);

            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
