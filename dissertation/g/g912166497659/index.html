<!DOCTYPE html>
<html>
<head>
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffff;
        }
        
        h2 {
            font-size: 36px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        #finalScore {
            font-size: 42px;
            margin-bottom: 30px;
            color: #ffcc00;
        }
        
        .btn {
            background: linear-gradient(to bottom, #ffcc00, #ff9900);
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 18px;
            color: #aaa;
        }
        
        .gem {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 15px currentColor;
        }
        
        .basket {
            position: absolute;
            background: linear-gradient(to bottom, #8B4513, #5D2906);
            border: 3px solid #A0522D;
            border-radius: 10px 10px 0 0;
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="uiOverlay">
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 45</div>
            <div id="instructions">Use ← → or A/D keys, or mouse/touch to move basket</div>
        </div>
        <div id="startScreen">
            <h1>GEM CATCH SPRINT</h1>
            <h2>Collect falling gems for points!</h2>
            <button id="startButton" class="btn">START GAME</button>
        </div>
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <h2>Your Score</h2>
            <div id="finalScore">0</div>
            <button id="restartButton" class="btn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        
        // Set canvas size
        canvas.width = 800;
        canvas.height = 600;
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let timeLeft = 45;
        let gameTimer = null;
        let gem = null;
        let basket = {
            x: canvas.width / 2 - 50,
            y: canvas.height - 80,
            width: 100,
            height: 40
        };
        
        // Gem class
        class Gem {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * (canvas.width - 60) + 30;
                this.y = -30;
                this.size = 30;
                this.speed = 2;
                this.color = this.getRandomColor();
            }
            
            getRandomColor() {
                const colors = [
                    '#FF0000', // Red
                    '#00FF00', // Green
                    '#0000FF', // Blue
                    '#FFFF00', // Yellow
                    '#FF00FF', // Magenta
                    '#00FFFF'  // Cyan
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.y += this.speed;
            }
            
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Add shine effect
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.beginPath();
                ctx.arc(this.x - this.size/3, this.y - this.size/3, this.size/3, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 45;
            scoreDisplay.textContent = `Score: ${score}`;
            timerDisplay.textContent = `Time: ${timeLeft}`;
            
            gem = new Gem();
            basket.x = canvas.width / 2 - 50;
            
            gameRunning = true;
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            // Start game timer
            clearInterval(gameTimer);
            gameTimer = setInterval(updateTimer, 1000);
            
            // Start game loop
            requestAnimationFrame(gameLoop);
        }
        
        // Update timer
        function updateTimer() {
            if (!gameRunning) return;
            
            timeLeft--;
            timerDisplay.textContent = `Time: ${timeLeft}`;
            
            if (timeLeft <= 0) {
                endGame();
            }
        }
        
        // Game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background
            drawBackground();
            
            // Update and draw gem
            gem.update();
            gem.draw();
            
            // Draw basket
            drawBasket();
            
            // Check collision
            checkCollision();
            
            // Check if gem is missed
            if (gem.y > canvas.height) {
                gem.reset();
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        // Draw background
        function drawBackground() {
            // Draw gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a2a');
            gradient.addColorStop(1, '#1a1a4a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw stars
            ctx.fillStyle = 'white';
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                ctx.fillRect(x, y, size, size);
            }
        }
        
        // Draw basket
        function drawBasket() {
            // Basket body
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
            
            // Basket rim
            ctx.fillStyle = '#5D2906';
            ctx.fillRect(basket.x - 5, basket.y, basket.width + 10, 10);
            
            // Basket handle
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(basket.x + 10, basket.y - 15, 20, 15);
            ctx.fillRect(basket.x + 60, basket.y - 15, 20, 15);
        }
        
        // Check collision between gem and basket
        function checkCollision() {
            const gemCenterX = gem.x;
            const gemCenterY = gem.y;
            const basketLeft = basket.x;
            const basketRight = basket.x + basket.width;
            const basketTop = basket.y;
            const basketBottom = basket.y + basket.height;
            
            // Check if gem is within basket boundaries
            if (gemCenterX > basketLeft && 
                gemCenterX < basketRight && 
                gemCenterY > basketTop && 
                gemCenterY < basketBottom) {
                // Gem caught
                score++;
                scoreDisplay.textContent = `Score: ${score}`;
                gem.reset();
            }
        }
        
        // End game
        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'flex';
        }
        
        // Handle keyboard input
        function handleKeyDown(e) {
            if (!gameRunning) return;
            
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                basket.x = Math.max(0, basket.x - 20);
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                basket.x = Math.min(canvas.width - basket.width, basket.x + 20);
            }
        }
        
        // Mouse/touch movement
        let isDragging = false;
        
        function handleMouseMove(e) {
            if (!gameRunning || !isDragging) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            basket.x = mouseX - basket.width / 2;
            
            // Keep basket within bounds
            basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));
        }
        
        function handleTouchMove(e) {
            if (!gameRunning) return;
            
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const touchX = touch.clientX - rect.left;
            basket.x = touchX - basket.width / 2;
            
            // Keep basket within bounds
            basket.x = Math.max(0, Math.min(canvas.width - basket.width, basket.x));
        }
        
        // Event listeners
        startButton.addEventListener('click', initGame);
        restartButton.addEventListener('click', initGame);
        
        document.addEventListener('keydown', handleKeyDown);
        
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('mousedown', () => { isDragging = true; });
        canvas.addEventListener('mouseup', () => { isDragging = false; });
        canvas.addEventListener('mouseleave', () => { isDragging = false; });
        
        canvas.addEventListener('touchmove', handleTouchMove);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
        });
        canvas.addEventListener('touchend', () => { isDragging = false; });
        
        // Initialize
        window.addEventListener('load', () => {
            // Draw initial background
            drawBackground();
        });
    </script>
</body>
</html>
