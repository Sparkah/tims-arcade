<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            overflow: hidden;
            position: relative;
        }
        
        #game-container {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #game-canvas {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            display: block;
        }
        
        #score-display {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            z-index: 10;
        }
        
        #misses-display {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ff6b6b;
            font-size: 20px;
            font-weight: bold;
            z-index: 10;
        }
        
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            display: none;
        }
        
        #final-score {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            color: #4ecdc4;
            text-shadow: 0 0 15px rgba(78, 205, 196, 0.7);
        }
        
        #restart-btn {
            background: #4ecdc4;
            color: #1a2a6c;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        #restart-btn:hover {
            background: #ff6b6b;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.7);
        }
        
        #instructions {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            z-index: 10;
        }
        
        .hit-effect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(78, 205, 196, 0.7);
            pointer-events: none;
            animation: hitEffect 0.5s forwards;
        }
        
        @keyframes hitEffect {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        
        .miss-effect {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 107, 107, 0.7);
            pointer-events: none;
            animation: missEffect 0.5s forwards;
        }
        
        @keyframes missEffect {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="500" height="500"></canvas>
        <div id="score-display">Score: 0</div>
        <div id="misses-display">Misses: 0/3</div>
        <div id="game-over">
            <h2>Game Over</h2>
            <div id="final-score">Score: 0</div>
            <button id="restart-btn">Play Again</button>
        </div>
        <div id="instructions">Tap or press SPACE to hit the target</div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const missesDisplay = document.getElementById('misses-display');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');
        
        // Game state
        let score = 0;
        let misses = 0;
        let gameRunning = true;
        let targetAngle = 0;
        let targetWidth = 0.3; // radians
        let dotAngle = 0;
        let dotSpeed = 0.02; // radians per frame
        let lastTime = 0;
        let animationId;
        
        // Initialize game
        function initGame() {
            score = 0;
            misses = 0;
            gameRunning = true;
            targetAngle = Math.random() * Math.PI * 2;
            targetWidth = 0.3;
            dotAngle = 0;
            updateDisplays();
            gameOverScreen.style.display = 'none';
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            gameLoop();
        }
        
        // Update displays
        function updateDisplays() {
            scoreDisplay.textContent = `Score: ${score}`;
            missesDisplay.textContent = `Misses: ${misses}/3`;
        }
        
        // Create visual effect
        function createEffect(x, y, isHit) {
            const effect = document.createElement('div');
            effect.className = isHit ? 'hit-effect' : 'miss-effect';
            effect.style.left = (x - 15) + 'px';
            effect.style.top = (y - 15) + 'px';
            document.getElementById('game-container').appendChild(effect);
            
            setTimeout(() => {
                effect.remove();
            }, 500);
        }
        
        // Handle player input
        function handleInput() {
            if (!gameRunning) return;
            
            // Check if dot is in target
            const dotInTarget = isDotInTarget();
            
            if (dotInTarget) {
                // Hit
                score++;
                targetWidth *= 0.85; // Shrink target
                if (targetWidth < 0.05) targetWidth = 0.05; // Minimum size
                createEffect(
                    canvas.width/2 + Math.cos(targetAngle) * 180,
                    canvas.height/2 + Math.sin(targetAngle) * 180,
                    true
                );
            } else {
                // Miss
                misses++;
                createEffect(
                    canvas.width/2 + Math.cos(dotAngle) * 180,
                    canvas.height/2 + Math.sin(dotAngle) * 180,
                    false
                );
                
                if (misses >= 3) {
                    endGame();
                    return;
                }
            }
            
            updateDisplays();
            // Move target to new random position
            targetAngle = Math.random() * Math.PI * 2;
        }
        
        // Check if dot is in target
        function isDotInTarget() {
            // Normalize angles to 0-2π
            let normalizedDot = dotAngle % (Math.PI * 2);
            let normalizedTarget = targetAngle % (Math.PI * 2);
            
            if (normalizedDot < 0) normalizedDot += Math.PI * 2;
            if (normalizedTarget < 0) normalizedTarget += Math.PI * 2;
            
            // Calculate the angular distance
            let diff = Math.abs(normalizedDot - normalizedTarget);
            if (diff > Math.PI) diff = Math.PI * 2 - diff;
            
            // Check if within target width
            return diff <= targetWidth / 2;
        }
        
        // End game
        function endGame() {
            gameRunning = false;
            finalScoreDisplay.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'flex';
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        }
        
        // Draw game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw ring
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 180, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Draw target arc
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 180, 
                    targetAngle - targetWidth/2, 
                    targetAngle + targetWidth/2);
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 15;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Draw dot
            const dotX = canvas.width/2 + Math.cos(dotAngle) * 180;
            const dotY = canvas.height/2 + Math.sin(dotAngle) * 180;
            
            ctx.beginPath();
            ctx.arc(dotX, dotY, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#ff6b6b';
            ctx.fill();
            
            // Draw dot glow
            ctx.beginPath();
            ctx.arc(dotX, dotY, 20, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(
                dotX, dotY, 12,
                dotX, dotY, 20
            );
            gradient.addColorStop(0, 'rgba(255, 107, 107, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 107, 107, 0)');
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        // Game loop
        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            if (gameRunning) {
                // Update dot position
                dotAngle += dotSpeed;
                if (dotAngle > Math.PI * 2) dotAngle -= Math.PI * 2;
                
                // Draw everything
                draw();
            }
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Event listeners
        canvas.addEventListener('click', handleInput);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleInput();
            }
        });
        restartBtn.addEventListener('click', initGame);
        
        // Start the game
        initGame();
    </script>
</body>
</html>
