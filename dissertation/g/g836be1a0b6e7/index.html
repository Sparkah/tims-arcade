<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            overflow: hidden;
            position: relative;
        }
        
        .game-container {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #gameCanvas {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .score-display {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
        }
        
        .misses-display {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ff6b6b;
            font-size: 18px;
            font-weight: bold;
        }
        
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .game-over.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .game-over h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-shadow: 0 0 15px rgba(255, 107, 107, 0.7);
        }
        
        .final-score {
            font-size: 32px;
            margin-bottom: 30px;
        }
        
        .restart-btn {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .restart-btn:active {
            transform: translateY(1px);
        }
        
        .instructions {
            position: absolute;
            bottom: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            max-width: 80%;
            line-height: 1.5;
        }
        
        .hit-feedback {
            position: absolute;
            pointer-events: none;
            font-size: 24px;
            font-weight: bold;
            opacity: 0;
            animation: feedbackFade 1s forwards;
        }
        
        @keyframes feedbackFade {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.5); }
        }
        
        .miss-feedback {
            position: absolute;
            pointer-events: none;
            font-size: 24px;
            font-weight: bold;
            color: #ff6b6b;
            opacity: 0;
            animation: feedbackFade 1s forwards;
        }
    </style>
  <script src="/dissertation/study-bridge.js?v=token-ready-v2"></script>
  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div class="game-container">
        <div class="score-display">SCORE: <span id="score">0</span></div>
        <div class="misses-display">MISSES: <span id="misses">0</span>/3</div>
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div class="game-over" id="gameOver">
            <h1>GAME OVER</h1>
            <div class="final-score">Final Score: <span id="finalScore">0</span></div>
            <button class="restart-btn" id="restartBtn">PLAY AGAIN</button>
        </div>
        <div class="instructions">Tap or press SPACE to hit the target</div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const missesElement = document.getElementById('misses');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        
        // Game state
        let score = 0;
        let misses = 0;
        let gameRunning = true;
        let targetAngle = 0;
        let targetWidth = Math.PI / 3; // 60 degrees
        let dotAngle = 0;
        let dotSpeed = 0.02;
        let feedbackElements = [];
        
        // Center of the canvas
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const ringRadius = 200;
        const dotRadius = 12;
        
        // Initialize game
        function initGame() {
            score = 0;
            misses = 0;
            gameRunning = true;
            targetAngle = 0;
            targetWidth = Math.PI / 3;
            dotAngle = 0;
            scoreElement.textContent = score;
            missesElement.textContent = misses;
            gameOverScreen.classList.remove('show');
            feedbackElements = [];
        }
        
        // Draw the game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw ring
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // Draw target arc
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius, 
                    targetAngle - targetWidth/2, 
                    targetAngle + targetWidth/2);
            ctx.strokeStyle = '#4facfe';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Draw dot
            const dotX = centerX + Math.cos(dotAngle) * ringRadius;
            const dotY = centerY + Math.sin(dotAngle) * ringRadius;
            
            ctx.beginPath();
            ctx.arc(dotX, dotY, dotRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#ff6b6b';
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw feedback
            feedbackElements.forEach((el) => {
                ctx.fillStyle = el.color;
                ctx.font = 'bold 24px Arial';
                ctx.fillText(el.text, el.x, el.y);
            });
        }
        
        // Update game state
        function update() {
            if (!gameRunning) return;
            
            // Move dot
            dotAngle += dotSpeed;
            if (dotAngle > Math.PI * 2) dotAngle -= Math.PI * 2;
            
            // Move target
            targetAngle += dotSpeed * 0.7;
            if (targetAngle > Math.PI * 2) targetAngle -= Math.PI * 2;
            
            // Update feedback elements
            feedbackElements = feedbackElements.filter(el => {
                el.y -= 2;
                return el.y > -20;
            });
        }
        
        // Handle player hit
        function hit() {
            if (!gameRunning) return;
            
            // Calculate if hit is within target
            let dotAngleInTarget = (dotAngle - targetAngle + Math.PI) % (Math.PI * 2) - Math.PI;
            // Normalize to -π to π range
            if (dotAngleInTarget > Math.PI) {
                dotAngleInTarget -= Math.PI * 2;
            } else if (dotAngleInTarget < -Math.PI) {
                dotAngleInTarget += Math.PI * 2;
            }
            
            const isHit = Math.abs(dotAngleInTarget) < targetWidth / 2;
            
            if (isHit) {
                // Successful hit
                score++;
                scoreElement.textContent = score;
                
                // Shrink target
                targetWidth *= 0.9;
                if (targetWidth < Math.PI / 12) targetWidth = Math.PI / 12;
                
                // Add feedback
                createFeedback(centerX, centerY - 50, "HIT!", "#4facfe");
            } else {
                // Miss
                misses++;
                missesElement.textContent = misses;
                
                // Add feedback
                createFeedback(centerX, centerY - 50, "MISS!", "#ff6b6b");
                
                if (misses >= 3) {
                    gameOver();
                }
            }
        }
        
        // Create feedback text
        function createFeedback(x, y, text, color) {
            const feedback = {
                x: x,
                y: y,
                text: text,
                color: color
            };
            
            feedbackElements.push(feedback);
        }
        
        // Game over
        function gameOver() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            gameOverScreen.classList.add('show');
        }
        
        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Event listeners
        canvas.addEventListener('click', hit);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                hit();
            }
        });
        restartBtn.addEventListener('click', initGame);
        
        // Start the game
        initGame();
        gameLoop();
    </script>
</body>
</html>
