<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            overflow: hidden;
        }
        
        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB, #1E90FF);
            display: block;
        }
        
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 5px black;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
        }
        
        #timerDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 5px black;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        #gameOverScreen.visible {
            opacity: 1;
            pointer-events: all;
        }
        
        #finalScore {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }
        
        #restartButton {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
            margin-top: 20px;
        }
        
        #restartButton:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }
        
        #restartButton:active {
            transform: scale(0.98);
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            pointer-events: all;
        }
        
        #startScreen h1 {
            font-size: 50px;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }
        
        #startScreen p {
            font-size: 22px;
            max-width: 80%;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        #startButton {
            background: linear-gradient(to bottom, #2196F3, #0D47A1);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }
        
        #startButton:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
        }
    </style>

  <script>(()=>{const loadToken=new URLSearchParams(window.location.search).get("studyLoad");const sendReady=()=>window.parent.postMessage({source:"dissertation-game",type:"ready",inputMethod:"unknown",loadToken},"*");if(document.readyState==="complete"){sendReady();}else{window.addEventListener("load",sendReady,{once:true});}})();</script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="uiOverlay">
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 45s</div>
            <div id="instructions">Use ← → or A/D keys, or mouse/touch to move</div>
        </div>
        
        <div id="startScreen">
            <h1>Gem Catch Sprint</h1>
            <p>Catch falling gems to score points. You have 45 seconds to get the highest score possible!</p>
            <button id="startButton">Start Game</button>
        </div>
        
        <div id="gameOverScreen">
            <div id="finalScore">Score: 0</div>
            <button id="restartButton">Play Again</button>
        </div>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let timeLeft = 45;
        let gameTimer = null;
        let gem = null;
        let basket = {
            x: canvas.width / 2 - 50,
            y: canvas.height - 60,
            width: 100,
            height: 40,
            speed: 8
        };
        
        // Input handling
        let keys = {};
        let mouseX = 0;
        let isDragging = false;
        
        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 45;
            updateUI();
            
            // Create initial gem
            gem = {
                x: Math.random() * (canvas.width - 60) + 30,
                y: 30,
                width: 50,
                height: 50,
                speed: 3
            };
            
            // Reset basket position
            basket.x = canvas.width / 2 - basket.width / 2;
            
            // Hide screens
            startScreen.style.display = 'none';
            gameOverScreen.classList.remove('visible');
            
            // Start game loop
            gameRunning = true;
            requestAnimationFrame(gameLoop);
        }
        
        // Update UI elements
        function updateUI() {
            scoreDisplay.textContent = `Score: ${score}`;
            timerDisplay.textContent = `Time: ${timeLeft}s`;
        }
        
        // Game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background elements
            drawBackground();
            
            // Update and draw basket
            drawBasket();
            
            // Update and draw gem
            updateGem();
            drawGem();
            
            // Continue game loop
            requestAnimationFrame(gameLoop);
        }
        
        // Draw background elements
        function drawBackground() {
            // Draw sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#1E90FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw some clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            drawCloud(100, 80, 30);
            drawCloud(300, 50, 40);
            drawCloud(600, 70, 35);
        }
        
        // Draw a cloud
        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y - size * 0.2, size * 0.8, 0, Math.PI * 2);
            ctx.arc(x + size * 1.5, y, size * 0.9, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y + size * 0.2, size * 0.7, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Draw basket
        function drawBasket() {
            // Basket body
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
            
            // Basket rim
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(basket.x - 5, basket.y + 5, basket.width + 10, 10);
            
            // Basket handle
            ctx.beginPath();
            ctx.arc(basket.x + 15, basket.y + 10, 15, 0, Math.PI);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(basket.x + basket.width - 15, basket.y + 10, 15, 0, Math.PI);
            ctx.stroke();
        }
        
        // Update gem position and check for collisions
        function updateGem() {
            // Move gem down
            gem.y += gem.speed;
            
            // Check if gem is caught
            if (gem.y + gem.height > basket.y &&
                gem.y < basket.y + basket.height &&
                gem.x + gem.width > basket.x &&
                gem.x < basket.x + basket.width) {
                // Gem caught
                score++;
                updateUI();
                
                // Create new gem at top
                gem.x = Math.random() * (canvas.width - 60) + 30;
                gem.y = 30;
            }
            
            // Check if gem is missed
            if (gem.y > canvas.height) {
                // Gem missed - just create a new one
                gem.x = Math.random() * (canvas.width - 60) + 30;
                gem.y = 30;
            }
        }
        
        // Draw gem
        function drawGem() {
            // Gem body
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(gem.x + gem.width/2, gem.y + gem.height/2, gem.width/2, 0, Math.PI * 2);
            ctx.fill();
            
            // Gem highlight
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(gem.x + gem.width/3, gem.y + gem.height/3, gem.width/6, 0, Math.PI * 2);
            ctx.fill();
            
            // Gem shine
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(gem.x + gem.width/2, gem.y + gem.height/4, gem.width/8, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Handle keyboard input
        function handleKeyDown(e) {
            keys[e.key] = true;
        }
        
        function handleKeyUp(e) {
            keys[e.key] = false;
        }
        
        // Handle mouse/touch input
        function handleMouseMove(e) {
            if (isDragging && gameRunning) {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                
                // Keep basket within canvas
                if (basket.x < 0) basket.x = 0;
                if (basket.x + basket.width > canvas.width) basket.x = canvas.width - basket.width;
            }
        }
        
        function handleMouseDown(e) {
            isDragging = true;
            handleMouseMove(e);
        }
        
        function handleMouseUp() {
            isDragging = false;
        }
        
        // Touch events for mobile
        function handleTouchMove(e) {
            e.preventDefault();
            if (isDragging && gameRunning) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                mouseX = touch.clientX - rect.left;
                basket.x = mouseX - basket.width / 2;
                
                // Keep basket within canvas
                if (basket.x < 0) basket.x = 0;
                if (basket.x + basket.width > canvas.width) basket.x = canvas.width - basket.width;
            }
        }
        
        function handleTouchStart(e) {
            isDragging = true;
            handleTouchMove(e);
        }
        
        function handleTouchEnd() {
            isDragging = false;
        }
        
        // Start game timer
        function startTimer() {
            gameTimer = setInterval(() => {
                timeLeft--;
                updateUI();
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }
        
        // End game
        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            
            // Show game over screen
            finalScore.textContent = `Score: ${score}`;
            gameOverScreen.classList.add('visible');
        }
        
        // Event listeners
        startButton.addEventListener('click', () => {
            initGame();
            startTimer();
        });
        
        restartButton.addEventListener('click', () => {
            initGame();
            startTimer();
        });
        
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('mousedown', handleMouseDown);
        window.addEventListener('mouseup', handleMouseUp);
        canvas.addEventListener('touchmove', handleTouchMove);
        canvas.addEventListener('touchstart', handleTouchStart);
        window.addEventListener('touchend', handleTouchEnd);
        
        // Handle keyboard movement
        function handleMovement() {
            if (!gameRunning) return;
            
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                basket.x -= basket.speed;
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                basket.x += basket.speed;
            }
            
            // Keep basket within canvas
            if (basket.x < 0) basket.x = 0;
            if (basket.x + basket.width > canvas.width) basket.x = canvas.width - basket.width;
        }
        
        // Game loop for keyboard input
        setInterval(handleMovement, 16);
    </script>
</body>
</html>
