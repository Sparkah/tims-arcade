<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Echo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            padding: 20px;
        }
        
        #game-container {
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        #stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
        }
        
        #pad-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 15px;
            margin-bottom: 30px;
        }
        
        .pad {
            aspect-ratio: 1;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .pad:hover {
            transform: scale(1.05);
        }
        
        .pad:active {
            transform: scale(0.95);
        }
        
        #start-btn {
            background: linear-gradient(to right, #4CAF50, #8BC34A);
            border: none;
            border-radius: 50px;
            color: white;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            width: 100%;
        }
        
        #start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        #start-btn:active {
            transform: translateY(1px);
        }
        
        #game-over {
            display: none;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 15px;
            padding: 30px;
            margin-top: 20px;
        }
        
        #game-over h2 {
            color: #ff5252;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        #final-score {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 25px;
        }
        
        .highlight {
            animation: highlight 0.5s ease;
        }
        
        .error {
            animation: error 0.3s ease;
        }
        
        @keyframes highlight {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); background: rgba(255, 255, 255, 0.3); }
            100% { transform: scale(1); }
        }
        
        @keyframes error {
            0% { background: rgba(255, 0, 0, 0.5); }
            25% { background: rgba(255, 0, 0, 0.8); transform: scale(1.05); }
            50% { background: rgba(255, 0, 0, 0.5); }
            75% { background: rgba(255, 0, 0, 0.8); transform: scale(1.05); }
            100% { background: rgba(255, 0, 0, 0.5); }
        }
        
        .red { background: linear-gradient(135deg, #ff5252, #b71c1c); }
        .blue { background: linear-gradient(135deg, #2196F3, #0d47a1); }
        .green { background: linear-gradient(135deg, #4CAF50, #1B5E20); }
        .yellow { background: linear-gradient(135deg, #FFEB3B, #FF8F00); }
        
        .instructions {
            color: #ccc;
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .key-hint {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 2px;
        }
        
        .pad[data-pad="0"] { box-shadow: 0 0 15px rgba(255, 82, 82, 0.5); }
        .pad[data-pad="1"] { box-shadow: 0 0 15px rgba(33, 150, 243, 0.5); }
        .pad[data-pad="2"] { box-shadow: 0 0 15px rgba(76, 175, 80, 0.5); }
        .pad[data-pad="3"] { box-shadow: 0 0 15px rgba(255, 235, 59, 0.5); }
        
        .pad.active {
            transform: scale(0.95);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.7);
        }
        
        .pad.flash {
            animation: flash 0.3s ease;
        }
        
        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="game-container">
        <h1>Pattern Echo</h1>
        
        <div id="stats">
            <div>Round: <span id="round">1</span></div>
            <div>Lives: <span id="lives">3</span></div>
            <div>Score: <span id="score">0</span></div>
        </div>
        
        <div id="pad-grid">
            <div class="pad red" data-pad="0"></div>
            <div class="pad blue" data-pad="1"></div>
            <div class="pad green" data-pad="2"></div>
            <div class="pad yellow" data-pad="3"></div>
        </div>
        
        <button id="start-btn">Start Game</button>
        
        <div class="instructions">
            <p>Watch the sequence, then repeat it. Use keys 1-4 or click pads.</p>
        </div>
        
        <div id="game-over">
            <h2>Game Over!</h2>
            <div id="final-score">You reached round 1 with a score of 0</div>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game elements
            const padGrid = document.getElementById('pad-grid');
            const startBtn = document.getElementById('start-btn');
            const restartBtn = document.getElementById('restart-btn');
            const roundDisplay = document.getElementById('round');
            const livesDisplay = document.getElementById('lives');
            const scoreDisplay = document.getElementById('score');
            const gameOverScreen = document.getElementById('game-over');
            const finalScoreDisplay = document.getElementById('final-score');
            
            // Game state
            let gameActive = false;
            let sequence = [];
            let playerSequence = [];
            let currentStep = 0;
            let lives = 3;
            let round = 1;
            let score = 0;
            let isPlayingSequence = false;
            let currentPadIndex = -1;
            
            // Pad colors
            const padColors = ['red', 'blue', 'green', 'yellow'];
            
            // Initialize game
            function initGame() {
                gameActive = true;
                sequence = [];
                playerSequence = [];
                currentStep = 0;
                lives = 3;
                round = 1;
                score = 0;
                isPlayingSequence = false;
                currentPadIndex = -1;
                
                updateStats();
                gameOverScreen.style.display = 'none';
                startBtn.textContent = 'Start Game';
                startBtn.disabled = false;
                
                // Add event listeners to pads
                document.querySelectorAll('.pad').forEach((pad, index) => {
                    pad.addEventListener('click', () => handlePadClick(index));
                });
                
                // Add keyboard event listeners
                document.addEventListener('keydown', handleKeyPress);
            }
            
            // Update stats display
            function updateStats() {
                roundDisplay.textContent = round;
                livesDisplay.textContent = lives;
                scoreDisplay.textContent = score;
            }
            
            // Start a new round
            function startRound() {
                if (!gameActive) return;
                
                // Add a new pad to the sequence
                const randomPad = Math.floor(Math.random() * 4);
                sequence.push(randomPad);
                
                // Reset player sequence
                playerSequence = [];
                currentStep = 0;
                
                // Start playing the sequence
                playSequence();
            }
            
            // Play the sequence
            function playSequence() {
                if (!gameActive) return;
                
                isPlayingSequence = true;
                startBtn.disabled = true;
                
                let step = 0;
                const totalSteps = sequence.length;
                
                const playStep = () => {
                    if (step >= totalSteps) {
                        isPlayingSequence = false;
                        startBtn.disabled = false;
                        return;
                    }
                    
                    const padIndex = sequence[step];
                    const pad = document.querySelector(`.pad[data-pad="${padIndex}"]`);
                    
                    // Highlight pad
                    pad.classList.add('highlight');
                    setTimeout(() => {
                        pad.classList.remove('highlight');
                    }, 500);
                    
                    step++;
                    setTimeout(playStep, 600);
                };
                
                setTimeout(playStep, 300);
            }
            
            // Handle pad click
            function handlePadClick(padIndex) {
                if (!gameActive || isPlayingSequence) return;
                
                // Add visual feedback
                const pad = document.querySelector(`.pad[data-pad="${padIndex}"]`);
                pad.classList.add('active');
                setTimeout(() => {
                    pad.classList.remove('active');
                }, 150);
                
                // Check if the pad is correct
                if (padIndex === sequence[currentStep]) {
                    // Correct pad
                    const pad = document.querySelector(`.pad[data-pad="${padIndex}"]`);
                    pad.classList.add('highlight');
                    
                    setTimeout(() => {
                        pad.classList.remove('highlight');
                    }, 200);
                    
                    playerSequence.push(padIndex);
                    currentStep++;
                    
                    // Check if sequence is complete
                    if (currentStep === sequence.length) {
                        // Round complete
                        score += round;
                        round++;
                        updateStats();
                        
                        // Start next round after a delay
                        setTimeout(startRound, 1000);
                    }
                } else {
                    // Wrong pad
                    const pad = document.querySelector(`.pad[data-pad="${padIndex}"]`);
                    pad.classList.add('error');
                    
                    setTimeout(() => {
                        pad.classList.remove('error');
                    }, 300);
                    
                    // Lose a life
                    lives--;
                    updateStats();
                    
                    if (lives <= 0) {
                        // Game over
                        endGame();
                    } else {
                        // Replay the current sequence
                        setTimeout(() => {
                            playSequence();
                        }, 500);
                    }
                }
            }
            
            // Handle keyboard input
            function handleKeyPress(e) {
                if (!gameActive) return;
                
                let padIndex = -1;
                switch(e.key) {
                    case '1': padIndex = 0; break;
                    case '2': padIndex = 1; break;
                    case '3': padIndex = 2; break;
                    case '4': padIndex = 3; break;
                }
                
                if (padIndex !== -1) {
                    handlePadClick(padIndex);
                }
            }
            
            // End the game
            function endGame() {
                gameActive = false;
                startBtn.disabled = true;
                finalScoreDisplay.textContent = `You reached round ${round} with a score of ${score}`;
                gameOverScreen.style.display = 'block';
            }
            
            // Event listeners
            startBtn.addEventListener('click', () => {
                if (!gameActive) {
                    initGame();
                }
                startRound();
                startBtn.textContent = 'Next Round';
            });
            
            restartBtn.addEventListener('click', initGame);
            
            // Initialize the game
            initGame();
        });
    </script>
</body>
</html>
