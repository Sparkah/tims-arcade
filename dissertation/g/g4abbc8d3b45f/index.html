<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        canvas {
            background-color: #1a1a2e;
            display: block;
        }
        
        #score-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e6e6e6;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        #title-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #e6e6e6;
            text-align: center;
            z-index: 10;
        }
        
        #game-over-screen {
            display: none;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }
        
        #final-score {
            font-size: 2rem;
            margin: 20px 0;
            color: #4ecdc4;
        }
        
        button {
            background-color: #4ecdc4;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        
        button:hover {
            background-color: #3aa89a;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            z-index: 5;
        }
        
        .hit-flash {
            background-color: #4ecdc4;
        }
        
        .miss-flash {
            background-color: #ff6b6b;
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="500" height="500"></canvas>
        <div id="score-display">0/10</div>
        
        <div id="title-screen">
            <h1>ORBIT TAP</h1>
            <button id="start-button">START GAME</button>
        </div>
        
        <div id="game-over-screen">
            <h1>GAME OVER</h1>
            <div id="final-score">Score: 0</div>
            <button id="restart-button">PLAY AGAIN</button>
        </div>
        
        <div id="hit-flash" class="flash hit-flash"></div>
        <div id="miss-flash" class="flash miss-flash"></div>
    </div>

    <script>
        // Game constants
        const CANVAS_WIDTH = 500;
        const CANVAS_HEIGHT = 500;
        const RING_RADIUS = 100;
        const RING_THICKNESS = 12;
        const DOT_RADIUS = 8;
        const TARGET_START_ANGLE = 0;
        const TARGET_SWEEP = 30; // degrees
        const DOT_SPEED = 180; // degrees per second
        const FLASH_DURATION = 200; // milliseconds
        
        // Game state
        let gameState = {
            score: 0,
            misses: 0,
            targetAngle: TARGET_START_ANGLE,
            targetSweep: TARGET_SWEEP,
            dotAngle: 0,
            isPlaying: false,
            isFlashing: false,
            flashType: '',
            lastTime: 0,
            targetArcCenter: 0,
            targetArcStart: 0,
            targetArcEnd: 0
        };
        
        // DOM elements
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const titleScreen = document.getElementById('title-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startButton = document.getElementById('start-button');
        const restartButton = document.getElementById('restart-button');
        const finalScoreDisplay = document.getElementById('final-score');
        const hitFlash = document.getElementById('hit-flash');
        const missFlash = document.getElementById('miss-flash');
        
        // Initialize canvas
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;
        
        // Center of the canvas
        const centerX = CANVAS_WIDTH / 2;
        const centerY = CANVAS_HEIGHT / 2;
        
        // Update target arc boundaries
        function updateTargetArc() {
            gameState.targetArcCenter = gameState.targetAngle;
            gameState.targetArcStart = gameState.targetAngle - gameState.targetSweep / 2;
            gameState.targetArcEnd = gameState.targetAngle + gameState.targetSweep / 2;
        }
        
        // Check if dot is within target arc
        function isDotInTarget() {
            // Convert angles to radians
            const dotRad = (gameState.dotAngle * Math.PI) / 180;
            const startRad = (gameState.targetArcStart * Math.PI) / 180;
            const endRad = (gameState.targetArcEnd * Math.PI) / 180;
            
            // Normalize angles to [0, 2π]
            const normalizedDot = dotRad % (2 * Math.PI);
            const normalizedStart = startRad % (2 * Math.PI);
            const normalizedEnd = endRad % (2 * Math.PI);
            
            // Handle case where the arc crosses 0°
            if (normalizedStart > normalizedEnd) {
                return normalizedDot >= normalizedStart || normalizedDot <= normalizedEnd;
            } else {
                return normalizedDot >= normalizedStart && normalizedDot <= normalizedEnd;
            }
        }
        
        // Handle hit
        function handleHit() {
            gameState.score++;
            gameState.targetSweep = Math.max(5, gameState.targetSweep - 2);
            gameState.isFlashing = true;
            gameState.flashType = 'hit';
            
            // Flash effect
            hitFlash.style.opacity = '0.7';
            setTimeout(() => {
                hitFlash.style.opacity = '0';
                gameState.isFlashing = false;
            }, FLASH_DURATION);
            
            updateTargetArc();
            updateScoreDisplay();
        }
        
        // Handle miss
        function handleMiss() {
            gameState.misses++;
            gameState.isFlashing = true;
            gameState.flashType = 'miss';
            
            // Flash effect
            missFlash.style.opacity = '0.7';
            setTimeout(() => {
                missFlash.style.opacity = '0';
                gameState.isFlashing = false;
            }, FLASH_DURATION);
            
            updateScoreDisplay();
            
            if (gameState.misses >= 3) {
                endGame();
            }
        }
        
        // Update score display
        function updateScoreDisplay() {
            scoreDisplay.textContent = `${gameState.score}/10`;
        }
        
        // Start the game
        function startGame() {
            gameState = {
                score: 0,
                misses: 0,
                targetAngle: TARGET_START_ANGLE,
                targetSweep: TARGET_SWEEP,
                dotAngle: 0,
                isPlaying: true,
                isFlashing: false,
                flashType: '',
                lastTime: 0,
                targetArcCenter: 0,
                targetArcStart: 0,
                targetArcEnd: 0
            };
            
            titleScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            updateScoreDisplay();
            updateTargetArc();
        }
        
        // End the game
        function endGame() {
            gameState.isPlaying = false;
            finalScoreDisplay.textContent = `Score: ${gameState.score}`;
            gameOverScreen.style.display = 'flex';
        }
        
        // Draw the ring
        function drawRing() {
            ctx.beginPath();
            ctx.arc(centerX, centerY, RING_RADIUS, 0, 2 * Math.PI);
            ctx.strokeStyle = '#16213e';
            ctx.lineWidth = RING_THICKNESS;
            ctx.stroke();
        }
        
        // Draw the target arc
        function drawTargetArc() {
            const startAngle = (gameState.targetArcStart * Math.PI) / 180;
            const endAngle = (gameState.targetArcEnd * Math.PI) / 180;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, RING_RADIUS, startAngle, endAngle);
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 20;
            ctx.lineCap = 'round';
            ctx.stroke();
        }
        
        // Draw the dot
        function drawDot() {
            const angle = (gameState.dotAngle * Math.PI) / 180;
            const x = centerX + RING_RADIUS * Math.cos(angle);
            const y = centerY + RING_RADIUS * Math.sin(angle);
            
            ctx.beginPath();
            ctx.arc(x, y, DOT_RADIUS, 0, 2 * Math.PI);
            ctx.fillStyle = '#e6e6e6';
            ctx.fill();
        }
        
        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw ring
            drawRing();
            
            // Draw target arc
            drawTargetArc();
            
            // Draw dot
            drawDot();
        }
        
        // Update game state
        function update(deltaTime) {
            if (!gameState.isPlaying || gameState.isFlashing) return;
            
            // Update dot position
            gameState.dotAngle += (DOT_SPEED * deltaTime) / 1000;
            if (gameState.dotAngle >= 360) gameState.dotAngle -= 360;
            
            // Update target arc position (move it slowly)
            gameState.targetAngle += 0.5;
            if (gameState.targetAngle >= 360) gameState.targetAngle -= 360;
            
            updateTargetArc();
        }
        
        // Game loop
        function gameLoop(timestamp) {
            if (!gameState.lastTime) gameState.lastTime = timestamp;
            const deltaTime = timestamp - gameState.lastTime;
            gameState.lastTime = timestamp;
            
            update(deltaTime);
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Handle user input
        function handleInput() {
            if (!gameState.isPlaying || gameState.isFlashing) return;
            
            if (isDotInTarget()) {
                handleHit();
            } else {
                handleMiss();
            }
        }
        
        // Event listeners
        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', startGame);
        
        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleInput();
            }
        });
        
        // Start the game loop
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
