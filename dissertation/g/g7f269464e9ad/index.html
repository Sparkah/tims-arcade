<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Catch Sprint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #f0f8ff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: 700;
            color: #2f4f4f;
            text-shadow: 2px 2px 2px rgba(255, 255, 255, 0.5);
            width: 100px;
            text-align: center;
        }

        #timerDisplay {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: 700;
            color: #2f4f4f;
            text-shadow: 2px 2px 2px rgba(255, 255, 255, 0.5);
            width: 100px;
            text-align: center;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(240, 248, 255, 0.9);
            z-index: 10;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2f4f4f;
            margin-bottom: 30px;
            text-align: center;
        }

        #startButton, #restartButton {
            background-color: #32cd32;
            border: 3px solid #228b22;
            border-radius: 8px;
            color: white;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #1e7a1e;
        }

        #startButton:hover, #restartButton:hover {
            background-color: #228b22;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1e7a1e;
        }

        #startButton:active, #restartButton:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #finalScore {
            font-size: 2rem;
            font-weight: 700;
            color: #2f4f4f;
            margin: 20px 0;
            text-shadow: 2px 2px 2px rgba(255, 255, 255, 0.5);
        }

        .pulse {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="scoreDisplay">0</div>
        <div id="timerDisplay">45</div>
        
        <div id="startScreen">
            <h1>Gem Catch Sprint</h1>
            <p>Move the basket to catch falling gems!</p>
            <p>Use ← → keys or A/D to move</p>
            <button id="startButton">Start Game</button>
        </div>
        
        <div id="gameOverScreen">
            <h1>Game Over!</h1>
            <div id="finalScore">Score: 0</div>
            <button id="restartButton">Play Again</button>
        </div>
    </div>

    <script>
        // Game elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const finalScore = document.getElementById('finalScore');

        // Set canvas size
        canvas.width = 800;
        canvas.height = 600;

        // Game state
        let gameRunning = false;
        let score = 0;
        let timeLeft = 45;
        let timer;
        let basket = {
            x: 340,
            y: 570,
            width: 120,
            height: 30,
            speed: 8
        };

        let gem = {
            x: 400,
            y: -25,
            radius: 25,
            speed: 3
        };

        // Initialize game
        function initGame() {
            score = 0;
            timeLeft = 45;
            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;
            basket.x = 340;
            gem.x = 400;
            gem.y = -25;
            gameRunning = true;
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            updateTimer();
            gameLoop();
        }

        // Update timer
        function updateTimer() {
            timer = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // End game
        function endGame() {
            gameRunning = false;
            clearInterval(timer);
            finalScore.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'flex';
        }

        // Draw basket
        function drawBasket() {
            ctx.fillStyle = '#4682b4';
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
            ctx.fillStyle = '#3a6d9c';
            ctx.fillRect(basket.x + 5, basket.y + 5, basket.width - 10, basket.height - 10);
            ctx.fillStyle = '#4682b4';
            ctx.fillRect(basket.x + 10, basket.y + 10, basket.width - 20, basket.height - 20);
        }

        // Draw gem
        function drawGem() {
            ctx.beginPath();
            ctx.arc(gem.x, gem.y, gem.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffd700';
            ctx.fill();
            ctx.strokeStyle = '#daa520';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Inner glow
            ctx.beginPath();
            ctx.arc(gem.x, gem.y, gem.radius - 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.fill();
        }

        // Check collision
        function checkCollision() {
            const basketLeft = basket.x;
            const basketRight = basket.x + basket.width;
            const basketTop = basket.y;
            const basketBottom = basket.y + basket.height;
            
            const gemLeft = gem.x - gem.radius;
            const gemRight = gem.x + gem.radius;
            const gemTop = gem.y - gem.radius;
            const gemBottom = gem.y + gem.radius;
            
            return (
                gemLeft < basketRight &&
                gemRight > basketLeft &&
                gemTop < basketBottom &&
                gemBottom > basketTop
            );
        }

        // Update game state
        function update() {
            // Move gem
            gem.y += gem.speed;
            
            // Check if gem is caught
            if (checkCollision()) {
                score++;
                scoreDisplay.textContent = score;
                // Reset gem position
                gem.x = Math.random() * (canvas.width - 50) + 25;
                gem.y = -25;
            }
            
            // Check if gem is missed
            if (gem.y > canvas.height + 50) {
                // Reset gem position
                gem.x = Math.random() * (canvas.width - 50) + 25;
                gem.y = -25;
            }
        }

        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background
            ctx.fillStyle = '#f0f8ff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw basket
            drawBasket();
            
            // Draw gem
            drawGem();
        }

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            
            requestAnimationFrame(gameLoop);
        }

        // Handle keyboard input
        function handleKeyDown(e) {
            if (!gameRunning) return;
            
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                basket.x = Math.max(0, basket.x - basket.speed);
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                basket.x = Math.min(canvas.width - basket.width, basket.x + basket.speed);
            }
        }

        // Mouse and touch controls
        let isDragging = false;

        function handleMouseDown(e) {
            if (!gameRunning) return;
            isDragging = true;
            updateBasketPosition(e);
        }

        function handleMouseMove(e) {
            if (!isDragging || !gameRunning) return;
            updateBasketPosition(e);
        }

        function handleMouseUp() {
            isDragging = false;
        }

        function updateBasketPosition(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            
            if (clientX) {
                let mouseX = clientX - rect.left;
                basket.x = Math.max(0, Math.min(canvas.width - basket.width, mouseX - basket.width / 2));
            }
        }

        // Event listeners
        startButton.addEventListener('click', initGame);
        restartButton.addEventListener('click', initGame);
        document.addEventListener('keydown', handleKeyDown);
        canvas.addEventListener('mousedown', handleMouseDown);
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleMouseDown(e.touches[0]);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleMouseMove(e.touches[0]);
        });
        canvas.addEventListener('touchend', handleMouseUp);

        // Initialize the game
        initGame();
    </script>
</body>
</html>
