<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #game-canvas {
            background-color: #1a1a2e;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        
        #score-display {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #f8f9fa;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        #lives-display {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #f8f9fa;
        }
        
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 46, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        #game-over.show {
            opacity: 1;
            pointer-events: all;
        }
        
        #game-over h1 {
            font-size: 2rem;
            font-weight: bold;
            color: #f8f9fa;
            margin-bottom: 20px;
        }
        
        #final-score {
            font-size: 1.5rem;
            color: #4ecdc4;
            margin-bottom: 30px;
        }
        
        #restart-button {
            background-color: #4ecdc4;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: semibold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        
        #restart-button:hover {
            background-color: #a8ff78;
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }
        
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(26, 26, 46, 0.95);
            border-radius: 8px;
        }
        
        #start-screen h1 {
            font-size: 2.5rem;
            font-weight: bold;
            color: #f8f9fa;
            margin-bottom: 20px;
            text-align: center;
        }
        
        #start-screen p {
            color: #f8f9fa;
            text-align: center;
            max-width: 80%;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        #start-button {
            background-color: #4ecdc4;
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: semibold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        
        #start-button:hover {
            background-color: #a8ff78;
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }
        
        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
        }
        
        .hit-flash {
            background-color: #a8ff78;
        }
        
        .miss-flash {
            background-color: #ff6b6b;
        }
        
        .flash.active {
            animation: flash 0.3s ease-out;
        }
        
        @keyframes flash {
            0% { opacity: 0.7; }
            100% { opacity: 0; }
        }
        
        .shake {
            animation: shake 0.3s ease;
        }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="500" height="500"></canvas>
        <div id="score-display">Score: 0</div>
        <div id="lives-display">Lives: 3</div>
        <div id="game-over">
            <h1>Game Over</h1>
            <div id="final-score">Score: 0</div>
            <button id="restart-button">Play Again</button>
        </div>
        <div id="start-screen">
            <h1>Orbit Tap</h1>
            <p>Tap or press spacebar when the dot is inside the red target arc to score points. The target gets smaller after each hit!</p>
            <button id="start-button">Start Game</button>
        </div>
        <div id="hit-flash" class="flash hit-flash"></div>
        <div id="miss-flash" class="flash miss-flash"></div>
    </div>

    <script>
        // Game constants
        const CANVAS_WIDTH = 500;
        const CANVAS_HEIGHT = 500;
        const RING_RADIUS = 200;
        const RING_THICKNESS = 20;
        const DOT_RADIUS = 6;
        const TARGET_START_ANGLE = 0;
        const TARGET_START_ARC = 0.1; // 10% of ring circumference
        const TARGET_SHRINK_FACTOR = 0.9;
        const ROTATION_SPEED = 2 * Math.PI / 5; // 5 seconds for full rotation
        const MAX_LIVES = 3;
        const FLASH_DURATION = 150;
        const SHAKE_DURATION = 100;

        // Game state
        let gameState = {
            score: 0,
            lives: MAX_LIVES,
            targetAngle: 0,
            targetArc: TARGET_START_ARC,
            dotAngle: 0,
            isPlaying: false,
            isGameOver: false,
            lastTime: 0,
            flashTimeout: null,
            shakeTimeout: null
        };

        // DOM elements
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const livesDisplay = document.getElementById('lives-display');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');
        const restartButton = document.getElementById('restart-button');
        const startScreen = document.getElementById('start-screen');
        const startButton = document.getElementById('start-button');
        const hitFlash = document.getElementById('hit-flash');
        const missFlash = document.getElementById('miss-flash');

        // Initialize canvas
        function initCanvas() {
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;
        }

        // Draw the ring
        function drawRing() {
            ctx.beginPath();
            ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, RING_RADIUS, 0, 2 * Math.PI);
            ctx.strokeStyle = '#16213e';
            ctx.lineWidth = RING_THICKNESS;
            ctx.stroke();
        }

        // Draw the target arc
        function drawTargetArc() {
            const startAngle = gameState.targetAngle;
            const endAngle = gameState.targetAngle + gameState.targetArc * 2 * Math.PI;
            
            ctx.beginPath();
            ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, RING_RADIUS, startAngle, endAngle);
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = RING_THICKNESS;
            ctx.stroke();
        }

        // Draw the dot
        function drawDot() {
            const x = CANVAS_WIDTH / 2 + RING_RADIUS * Math.cos(gameState.dotAngle);
            const y = CANVAS_HEIGHT / 2 + RING_RADIUS * Math.sin(gameState.dotAngle);
            
            ctx.beginPath();
            ctx.arc(x, y, DOT_RADIUS, 0, 2 * Math.PI);
            ctx.fillStyle = '#4ecdc4';
            ctx.fill();
        }

        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw game elements
            drawRing();
            drawTargetArc();
            drawDot();
        }

        // Update game state
        function update(deltaTime) {
            if (!gameState.isPlaying || gameState.isGameOver) return;
            
            // Update dot position
            gameState.dotAngle += ROTATION_SPEED * deltaTime;
            
            // Normalize angle
            if (gameState.dotAngle > 2 * Math.PI) {
                gameState.dotAngle -= 2 * Math.PI;
            }
        }

        // Handle hit
        function handleHit() {
            // Calculate if dot is inside target
            const targetStart = gameState.targetAngle;
            const targetEnd = gameState.targetAngle + gameState.targetArc * 2 * Math.PI;
            
            // Normalize dot angle to be within [0, 2π]
            let normalizedDotAngle = gameState.dotAngle;
            if (normalizedDotAngle < 0) normalizedDotAngle += 2 * Math.PI;
            
            // Check if dot is within target arc
            let isHit = false;
            
            if (targetStart < targetEnd) {
                // Normal case: target doesn't cross 0
                isHit = normalizedDotAngle >= targetStart && normalizedDotAngle <= targetEnd;
            } else {
                // Special case: target crosses 0
                isHit = normalizedDotAngle >= targetStart || normalizedDotAngle <= targetEnd;
            }
            
            if (isHit) {
                // Hit!
                gameState.score++;
                scoreDisplay.textContent = `Score: ${gameState.score}`;
                
                // Flash effect
                hitFlash.classList.add('active');
                setTimeout(() => {
                    hitFlash.classList.remove('active');
                }, FLASH_DURATION);
                
                // Shrink target
                gameState.targetArc *= TARGET_SHRINK_FACTOR;
                
                // Reset target position
                gameState.targetAngle = Math.random() * 2 * Math.PI;
            } else {
                // Miss!
                gameState.lives--;
                livesDisplay.textContent = `Lives: ${gameState.lives}`;
                
                // Flash effect
                missFlash.classList.add('active');
                setTimeout(() => {
                    missFlash.classList.remove('active');
                }, FLASH_DURATION);
                
                // Shake effect
                const gameContainer = document.getElementById('game-container');
                gameContainer.classList.add('shake');
                setTimeout(() => {
                    gameContainer.classList.remove('shake');
                }, SHAKE_DURATION);
                
                // Reset target to original size
                gameState.targetArc = TARGET_START_ARC;
                gameState.targetAngle = Math.random() * 2 * Math.PI;
                
                // Check for game over
                if (gameState.lives <= 0) {
                    endGame();
                }
            }
        }

        // Start the game
        function startGame() {
            gameState = {
                score: 0,
                lives: MAX_LIVES,
                targetAngle: Math.random() * 2 * Math.PI,
                targetArc: TARGET_START_ARC,
                dotAngle: 0,
                isPlaying: true,
                isGameOver: false,
                lastTime: 0
            };
            
            scoreDisplay.textContent = `Score: ${gameState.score}`;
            livesDisplay.textContent = `Lives: ${gameState.lives}`;
            
            startScreen.style.display = 'none';
            gameOverScreen.classList.remove('show');
            
            // Start game loop
            requestAnimationFrame(gameLoop);
        }

        // End the game
        function endGame() {
            gameState.isPlaying = false;
            gameState.isGameOver = true;
            finalScoreDisplay.textContent = `Score: ${gameState.score}`;
            gameOverScreen.classList.add('show');
        }

        // Game loop
        function gameLoop(timestamp) {
            if (!gameState.isPlaying) return;
            
            // Calculate delta time
            const deltaTime = timestamp - gameState.lastTime;
            gameState.lastTime = timestamp;
            
            // Update game state
            update(deltaTime / 1000);
            
            // Draw everything
            draw();
            
            // Continue loop
            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        canvas.addEventListener('click', () => {
            if (gameState.isPlaying && !gameState.isGameOver) {
                handleHit();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState.isPlaying && !gameState.isGameOver) {
                    handleHit();
                }
            }
        });

        restartButton.addEventListener('click', startGame);
        startButton.addEventListener('click', startGame);

        // Initialize
        initCanvas();
        draw();
    </script>
</body>
</html>
