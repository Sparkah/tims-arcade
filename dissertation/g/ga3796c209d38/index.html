<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            width: 500px;
            height: 500px;
        }
        
        #game-canvas {
            background-color: #1a1a2e;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }
        
        #score-display {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
        }
        
        #title-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(26, 26, 46, 0.95);
            border-radius: 8px;
            z-index: 10;
        }
        
        #game-over-screen {
            display: none;
        }
        
        h1 {
            color: #00d4ff;
            font-size: 3rem;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.8);
        }
        
        #final-score {
            color: #50c878;
            font-size: 1.8rem;
            margin-bottom: 30px;
        }
        
        .btn {
            background-color: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 50px;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .feedback {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }
        
        .hit-feedback {
            background-color: #50c878;
            animation: pulse 150ms ease-out;
        }
        
        .miss-feedback {
            background-color: #ff6b6b;
            animation: shake 150ms ease-out;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        
        .dot {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }
        
        .hit-dot {
            background-color: #50c878;
            box-shadow: 0 0 15px rgba(80, 200, 120, 0.9);
        }
        
        .miss-dot {
            background-color: #ff6b6b;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.9);
        }
    </style>
  <script src="/dissertation/study-bridge.js"></script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="500" height="500"></canvas>
        <div id="score-display">Score: 0</div>
        
        <div id="title-screen">
            <h1>ORBIT TAP</h1>
            <button class="btn" id="start-btn">START GAME</button>
        </div>
        
        <div id="game-over-screen">
            <h1>GAME OVER</h1>
            <div id="final-score">Score: 0</div>
            <button class="btn" id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // Game constants
        const CANVAS_WIDTH = 500;
        const CANVAS_HEIGHT = 500;
        const RING_RADIUS = 150;
        const RING_STROKE = 12;
        const TARGET_WIDTH = 30;
        const TARGET_START_ANGLE = Math.PI / 2;
        const TARGET_ARC = Math.PI / 3; // 60 degrees
        const DOT_RADIUS = 6;
        const INITIAL_TARGET_SIZE = TARGET_ARC;
        const TARGET_SHRINK_FACTOR = 0.1;
        const MIN_TARGET_SIZE = INITIAL_TARGET_SIZE * 0.05;
        const MISS_COUNT_MAX = 3;
        
        // Game state
        let gameState = 'title'; // 'title', 'playing', 'gameOver'
        let score = 0;
        let misses = 0;
        let targetSize = INITIAL_TARGET_SIZE;
        let dotAngle = 0;
        let dotSpeed = 0.02;
        let animationId = null;
        let feedbackElements = [];
        
        // DOM elements
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const titleScreen = document.getElementById('title-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        
        // Initialize game
        function initGame() {
            score = 0;
            misses = 0;
            targetSize = INITIAL_TARGET_SIZE;
            dotAngle = 0;
            scoreDisplay.textContent = `Score: ${score}`;
            updateScoreDisplay();
            
            // Clear any existing feedback elements
            feedbackElements.forEach(el => el.remove());
            feedbackElements = [];
            
            // Hide screens
            titleScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            // Set game state
            gameState = 'playing';
            
            // Start animation
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            animate();
        }
        
        // Update score display
        function updateScoreDisplay() {
            scoreDisplay.textContent = `Score: ${score}`;
        }
        
        // Draw the game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw ring
            ctx.beginPath();
            ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, RING_RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = '#16213e';
            ctx.lineWidth = RING_STROKE;
            ctx.stroke();
            
            // Draw target arc
            const targetStartAngle = TARGET_START_ANGLE - targetSize / 2;
            const targetEndAngle = TARGET_START_ANGLE + targetSize / 2;
            
            ctx.beginPath();
            ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, RING_RADIUS, targetStartAngle, targetEndAngle);
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = TARGET_WIDTH;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Draw dot
            const dotX = CANVAS_WIDTH / 2 + Math.cos(dotAngle) * RING_RADIUS;
            const dotY = CANVAS_HEIGHT / 2 + Math.sin(dotAngle) * RING_RADIUS;
            
            ctx.beginPath();
            ctx.arc(dotX, dotY, DOT_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = '#00d4ff';
            ctx.fill();
            ctx.shadowColor = '#00d4ff';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Create feedback element
        function createFeedback(x, y, type) {
            const feedback = document.createElement('div');
            feedback.className = `feedback ${type}-feedback`;
            feedback.style.left = `${x - 10}px`;
            feedback.style.top = `${y - 10}px`;
            document.getElementById('game-container').appendChild(feedback);
            
            // Remove after animation
            setTimeout(() => {
                feedback.remove();
            }, 150);
        }
        
        // Handle player tap
        function handleTap() {
            if (gameState !== 'playing') return;
            
            // Calculate dot position
            const dotX = CANVAS_WIDTH / 2 + Math.cos(dotAngle) * RING_RADIUS;
            const dotY = CANVAS_HEIGHT / 2 + Math.sin(dotAngle) * RING_RADIUS;
            
            // Calculate angle of dot
            const dotAngleAtTap = Math.atan2(dotY - CANVAS_HEIGHT / 2, dotX - CANVAS_WIDTH / 2);
            
            // Normalize angle to be between 0 and 2π
            const normalizedDotAngle = (dotAngleAtTap + Math.PI * 2) % (Math.PI * 2);
            
            // Calculate target arc boundaries
            const targetStartAngle = TARGET_START_ANGLE - targetSize / 2;
            const targetEndAngle = TARGET_START_ANGLE + targetSize / 2;
            
            // Check if dot is within target
            let inTarget = false;
            
            if (targetStartAngle < targetEndAngle) {
                // Normal case
                inTarget = normalizedDotAngle >= targetStartAngle && normalizedDotAngle <= targetEndAngle;
            } else {
                // Case where target crosses 0° (360°)
                inTarget = normalizedDotAngle >= targetStartAngle || normalizedDotAngle <= targetEndAngle;
            }
            
            if (inTarget) {
                // Hit
                score++;
                updateScoreDisplay();
                
                // Create hit feedback
                createFeedback(dotX, dotY, 'hit');
                
                // Shrink target arc
                targetSize = Math.max(MIN_TARGET_SIZE, targetSize * (1 - TARGET_SHRINK_FACTOR));
            } else {
                // Miss
                misses++;
                
                // Create miss feedback
                createFeedback(dotX, dotY, 'miss');
                
                // Flash target red for a moment
                ctx.beginPath();
                ctx.arc(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, RING_RADIUS, targetStartAngle, targetEndAngle);
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = TARGET_WIDTH;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                // Reset flash after delay
                setTimeout(() => {
                    if (gameState === 'playing') {
                        draw();
                    }
                }, 100);
                
                // Check for game over
                if (misses >= MISS_COUNT_MAX) {
                    endGame();
                }
            }
        }
        
        // End game
        function endGame() {
            gameState = 'gameOver';
            finalScoreDisplay.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'flex';
            cancelAnimationFrame(animationId);
        }
        
        // Animation loop
        function animate() {
            if (gameState !== 'playing') return;
            
            // Update dot position
            dotAngle += dotSpeed;
            
            // Draw everything
            draw();
            
            // Continue animation
            animationId = requestAnimationFrame(animate);
        }
        
        // Event listeners
        startBtn.addEventListener('click', initGame);
        restartBtn.addEventListener('click', initGame);
        
        canvas.addEventListener('click', () => {
            handleTap();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleTap();
            }
        });
        
        // Initialize the game
        draw();
    </script>
</body>
</html>
