<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#031009">
<title>Bloodtread</title>
<link rel="icon" type="image/png" href="icon-180.png">
<meta name="description" content="Drive a blood-fuelled war machine through endless biomech hordes. Crush, upgrade, survive - with optional boosts via Telegram Stars or TON.">
<meta property="og:image" content="https://game-factory.tech/tg-bloodtread/cover.png">
<script src="https://telegram.org/js/telegram-web-app.js?62"></script>
<script src="./config.js?v=p1"></script>
<script async src="https://sad.adsgram.ai/js/sad.min.js"></script>
<script>
(function () {
  var zone = window.BLOODTREAD_MONETAG_ZONE_ID;
  var src = window.BLOODTREAD_MONETAG_SDK_SRC;
  if (!zone || !src || window['show_' + zone]) return;
  var tag = document.createElement('script');
  tag.async = true;
  tag.src = src;
  tag.dataset.zone = zone;
  tag.dataset.sdk = 'show_' + zone;
  document.head.appendChild(tag);
})();
</script>
<script src="https://unpkg.com/@tonconnect/ui@3.0.0/dist/tonconnect-ui.min.js"></script>
<style>
  :root {
    color-scheme: dark;
    --bg: #031009;
    --panel: rgba(3, 18, 10, .94);
    --panel-2: rgba(7, 36, 20, .96);
    --line: rgba(84, 255, 150, .24);
    --text: #effff5;
    --muted: #9ac4aa;
    --green: #54ff96;
    --amber: #ffd24a;
    --red: #ff6a4a;
    --ink: #02120a;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    letter-spacing: 0;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }

  button {
    font: inherit;
    color: inherit;
    border: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #app, #game {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #game {
    border: 0;
    display: block;
    background: #031009;
  }

  /* Shop is IN-GAME (Gore Vault -> Blood Market / STORE mode), not a wrapper button - the old floating
     shop-fab was removed 2026-07-01 (it was a Megaton-style bottom-left FAB that did not belong here). */
  .wide:active, .buy:active { transform: translateY(1px) scale(.985); }

  .screen {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: grid;
    place-items: center;
    padding: calc(16px + env(safe-area-inset-top)) 14px calc(16px + env(safe-area-inset-bottom));
    background: rgba(1, 8, 4, .74);
    backdrop-filter: blur(8px);
  }

  .screen[hidden] { display: none; }

  .panel {
    width: min(100%, 480px);
    max-height: min(760px, 94dvh);
    overflow: auto;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    box-shadow: 0 24px 80px rgba(0, 0, 0, .48), inset 0 0 40px rgba(84, 255, 150, .05);
    padding: 16px;
  }

  .head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  h1, h2, h3, p { margin: 0; }
  h1 {
    font-size: clamp(28px, 9vw, 48px);
    line-height: .95;
    letter-spacing: 0;
    text-transform: uppercase;
    color: var(--green);
  }

  .tag {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 0 10px;
    border: 1px solid rgba(255, 210, 74, .5);
    border-radius: 999px;
    color: var(--amber);
    font-size: 12px;
    font-weight: 850;
    white-space: nowrap;
  }

  .lede {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.42;
    margin-bottom: 14px;
  }

  .shop-list {
    display: grid;
    gap: 9px;
  }

  .shop-item {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 12px;
    min-height: 74px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 255, 255, .045);
    padding: 11px;
  }

  .shop-item.god {
    border-color: rgba(255, 210, 74, .62);
    background: linear-gradient(180deg, rgba(255, 210, 74, .12), rgba(84, 255, 150, .055));
  }

  .shop-item h3 {
    color: var(--text);
    font-size: 15px;
    line-height: 1.12;
  }

  .shop-item p {
    margin-top: 5px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.28;
  }

  .buy {
    min-width: 92px;
    min-height: 44px;
    border-radius: 8px;
    background: var(--amber);
    color: var(--ink);
    font-weight: 900;
    font-size: 13px;
  }

  .buy-row {
    display: grid;
    gap: 7px;
    justify-items: end;
    min-width: 96px;
  }

  .buy.ton {
    background: var(--green);
  }

  .buy[disabled] {
    cursor: wait;
    opacity: .68;
  }

  .ton-connect {
    display: flex;
    justify-content: flex-end;
    min-height: 36px;
    margin: -2px 0 10px;
  }

  .ton-connect:empty {
    display: none;
  }

  .wide {
    width: 100%;
    min-height: 50px;
    margin-top: 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: rgba(84, 255, 150, .13);
    color: var(--green);
    font-weight: 900;
  }

  .fine {
    margin-top: 10px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
  }

  .fine a { color: var(--green); }

  #toast {
    position: fixed;
    left: 50%;
    bottom: calc(62px + env(safe-area-inset-bottom));
    z-index: 40;
    max-width: min(420px, calc(100% - 28px));
    transform: translateX(-50%);
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(1, 10, 5, .92);
    color: var(--text);
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.3;
    box-shadow: 0 16px 36px rgba(0, 0, 0, .4);
  }

  #toast[hidden] { display: none; }
</style>
</head>
<body>
<div id="app">
  <iframe id="game" data-src="../games/bloodtread_mobile/?tg=1" allow="autoplay; fullscreen; gamepad"></iframe>
</div>

<section class="screen" id="shopScreen" hidden>
  <div class="panel">
    <div class="head">
      <div>
        <h1>Bloodtread</h1>
        <p class="lede">Use Telegram Stars or TON for optional blood, hull and arsenal upgrades, and the Bloodgod Pact. Purchases sync to your Telegram profile.</p>
      </div>
      <span class="tag">Stars + TON</span>
    </div>
    <div class="ton-connect" id="tonConnectButton"></div>
    <div class="shop-list" id="shopList"></div>
    <button class="wide" type="button" id="closeShopBtn">Close</button>
    <p class="fine">Digital items are optional. <a href="./terms.html" target="_blank" rel="noopener">Terms</a></p>
  </div>
</section>

<div id="toast" hidden></div>

<script>
(function () {
  'use strict';
  var GAME_ID = 'bloodtread';
  var SAVE_KEY = 'bloodtread_v5';
  var tg = window.Telegram && window.Telegram.WebApp;
  var HAS_TG = Boolean(tg && tg.initData);
  var game = document.getElementById('game');
  var shopScreen = document.getElementById('shopScreen');
  var shopList = document.getElementById('shopList');
  var toastEl = document.getElementById('toast');
  var toastTimer = 0;
  var saveTimer = 0;
  var gameStarted = false;
  var tonConnectUI = null;
	  var pendingTonTimer = 0;
	  var PENDING_TON_KEY = 'bloodtread_ton_pending';
	  var adBusy = false;

  var PRODUCTS = {
    starter: {
      title: 'War Chest',
      desc: '2,000 blood plus a Tread tier to start fast.',
      stars: 25,
      ton: '0.20'
    },
    blood_cache: {
      title: 'Blood Cache',
      desc: '6,000 blood for the next upgrade wall.',
      stars: 49,
      ton: '0.40'
    },
    hull_kit: {
      title: 'Reinforced Hull Kit',
      desc: '+2 Armor, +2 Blood-Core, and 2,000 blood.',
      stars: 75,
      ton: '0.60'
    },
    arsenal: {
      title: 'Arsenal Overhaul',
      desc: '+2 Cannon, +1 Frenzy, and 2,500 blood.',
      stars: 99,
      ton: '0.80'
    },
    ad_free: {
      title: 'Remove Ads',
      desc: 'Skip the rewarded-ad revive prompt - revive instantly, forever.',
      stars: 150,
      ton: '1.20'
    },
    bloodgod: {
      title: 'Bloodgod Pact',
      desc: 'Ad-free play, every tread tier maxed, and 250,000 blood.',
      ton: '20.00',
      god: true
    }
  };

  if (tg) {
    try {
      tg.ready();
      tg.expand();
      if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
      if (tg.setHeaderColor) tg.setHeaderColor('#031009');
      if (tg.setBackgroundColor) tg.setBackgroundColor('#031009');
    } catch (e) {}
  }

  function toast(msg, ms) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.hidden = false;
    toastTimer = setTimeout(function () { toastEl.hidden = true; }, ms || 2600);
  }

  function sleep(ms) {
    return new Promise(function (resolve) { setTimeout(resolve, ms); });
  }

  async function apiPost(path, body, keepalive) {
    var res = await fetch(path, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
      keepalive: Boolean(keepalive)
    });
    var data = await res.json().catch(function () { return {}; });
    if (!res.ok) {
      var err = new Error(data.error || ('http_' + res.status));
      err.status = res.status;
      err.data = data;
      throw err;
    }
    return data;
  }

  function readLocalState() {
    try {
      var raw = localStorage.getItem(SAVE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  function writeLocalState(state) {
    if (!state || typeof state !== 'object') return false;
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify(state));
      return true;
    } catch (e) {
      return false;
    }
  }

  function stateStamp(state) {
    return state && Number(state.lastSeen || state.state_rev || 0) || 0;
  }

  async function loadRemoteState() {
    if (!HAS_TG) return null;
    try {
      var data = await apiPost('/api/tg-state', {
        action: 'load',
        game: GAME_ID,
        initData: tg.initData
      });
      if (!data || !data.state) return null;
      var local = readLocalState();
      if (!local || stateStamp(data.state) >= stateStamp(local)) {
        writeLocalState(data.state);
      } else {
        queueSave(600);
      }
      return data.state;
    } catch (e) {
      if (e.status !== 503) console.warn('Bloodtread Telegram state load failed', e.message);
      return null;
    }
  }

  async function saveRemoteState(reason, keepalive) {
    if (!HAS_TG) return false;
    var state = readLocalState();
    if (!state || typeof state !== 'object') return false;
    try {
      await apiPost('/api/tg-state', {
        action: 'save',
        game: GAME_ID,
        initData: tg.initData,
        reason: reason || 'autosave',
        state: state
      }, keepalive);
      return true;
    } catch (e) {
      if (e.status !== 503) console.warn('Bloodtread Telegram state save failed', e.message);
      return false;
    }
  }

  function queueSave(ms) {
    if (!HAS_TG) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function () { saveRemoteState('queued'); }, ms || 900);
  }

  function tonPriceFor(id) {
    var catalog = window.BLOODTREAD_TON_PRICES || {};
    var configured = catalog[id];
    if (configured && configured.ton && configured.nanotons) return configured;
    var product = PRODUCTS[id];
    return product && product.ton ? { ton: product.ton, nanotons: '' } : null;
  }

  function setBuyBusy(btn, busy) {
    if (!btn) return;
    btn.disabled = Boolean(busy);
    btn.setAttribute('aria-busy', busy ? 'true' : 'false');
  }

  function renderShop() {
    shopList.textContent = '';
    Object.keys(PRODUCTS).forEach(function (id) {
      var p = PRODUCTS[id];
      if (p.hidden) return;
      var ton = tonPriceFor(id);
      var item = document.createElement('div');
      var copy = document.createElement('div');
      var title = document.createElement('h3');
      var desc = document.createElement('p');
      var actions = document.createElement('div');

      item.className = 'shop-item' + (p.god ? ' god' : '');
      title.textContent = p.title;
      desc.textContent = p.desc;
      actions.className = 'buy-row';

      if (p.stars) {
        var starsBtn = document.createElement('button');
        starsBtn.className = 'buy';
        starsBtn.type = 'button';
        starsBtn.textContent = p.stars + ' Stars';
        starsBtn.addEventListener('click', function () {
          setBuyBusy(starsBtn, true);
          buyProduct(id, 'XTR').finally(function () { setBuyBusy(starsBtn, false); });
        });
        actions.appendChild(starsBtn);
      }

      if (ton) {
        var tonBtn = document.createElement('button');
        tonBtn.className = 'buy ton';
        tonBtn.type = 'button';
        tonBtn.textContent = ton.ton + ' TON';
        tonBtn.addEventListener('click', function () {
          setBuyBusy(tonBtn, true);
          buyProduct(id, 'TON').finally(function () { setBuyBusy(tonBtn, false); });
        });
        actions.appendChild(tonBtn);
      }

      copy.appendChild(title);
      copy.appendChild(desc);
      item.appendChild(copy);
      item.appendChild(actions);
      shopList.appendChild(item);
    });
  }

  function openShop() {
    if (window.BLOODTREAD_SHOP_ENABLED === false) { toast('Shop is coming soon.'); return; }
    renderShop();
    shopScreen.hidden = false;
    if (HAS_TG) getTonConnectUI().catch(function () {});
  }

  function closeShop() {
    shopScreen.hidden = true;
  }

  async function getTonConnectUI() {
    if (tonConnectUI) return tonConnectUI;
    for (var i = 0; i < 45; i += 1) {
      if (window.TON_CONNECT_UI && window.TON_CONNECT_UI.TonConnectUI) {
        break;
      }
      await sleep(100);
    }
    if (!window.TON_CONNECT_UI || !window.TON_CONNECT_UI.TonConnectUI) {
      throw new Error('tonconnect_unavailable');
    }
    tonConnectUI = new window.TON_CONNECT_UI.TonConnectUI({
      manifestUrl: window.BLOODTREAD_TON_MANIFEST_URL || 'https://game-factory.tech/tg-bloodtread/tonconnect-manifest.json',
      buttonRootId: 'tonConnectButton',
      actionsConfiguration: {
        returnStrategy: 'back',
        twaReturnUrl: 'https://t.me/gamesfactorybot/bloodtread'
      },
      uiPreferences: {
        theme: window.TON_CONNECT_UI.THEME && window.TON_CONNECT_UI.THEME.DARK
      }
    });
    return tonConnectUI;
  }

  async function waitForTonWallet(ui) {
    if (ui.account) return ui.account;
    try { ui.openModal(); } catch (e) {}
    for (var i = 0; i < 180; i += 1) {
      if (ui.account) return ui.account;
      await sleep(500);
    }
    throw new Error('wallet_not_connected');
  }

  function writePendingTon(pending) {
    try {
      if (pending) localStorage.setItem(PENDING_TON_KEY, JSON.stringify(pending));
      else localStorage.removeItem(PENDING_TON_KEY);
    } catch (e) {}
  }

  function readPendingTon() {
    try {
      var raw = localStorage.getItem(PENDING_TON_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  async function verifyTonPayment(order, boc, walletAddress, attempts) {
    if (!order || !order.payload || !HAS_TG) return null;
    var maxAttempts = attempts || 18;
    for (var i = 0; i < maxAttempts; i += 1) {
      try {
        var data = await apiPost('/api/tg-ton-verify', {
          game: GAME_ID,
          initData: tg.initData,
          payload: order.payload,
          boc: boc || order.boc || null,
          walletAddress: walletAddress || order.walletAddress || null
        });
        if (data && data.paid && (data.granted || (data.grant && data.grant.granted))) return data;
      } catch (e) {
        if (e.status === 503 || e.status === 404) return null;
      }
      await sleep(Math.min(4500, 1200 + i * 260));
    }
    return null;
  }

  async function resumePendingTonPurchase() {
    if (!HAS_TG || pendingTonTimer) return;
    var pending = readPendingTon();
    if (!pending || !pending.payload || !pending.productId) return;
    if (Date.now() - Number(pending.createdAt || 0) > 48 * 3600000) {
      writePendingTon(null);
      return;
    }
    pendingTonTimer = 1;
    try {
      var verified = await verifyTonPayment(pending, pending.boc, pending.walletAddress, 4);
      if (verified && verified.paid) {
        var rpid = verified.productId || pending.productId;
        await applyPaidPayload(pending.payload, rpid, PRODUCTS[rpid], verified);   // idempotent: TON resume can fire repeatedly
        writePendingTon(null);
        toast('TON purchase applied: ' + (PRODUCTS[rpid] || {}).title);
      }
    } finally {
      pendingTonTimer = 0;
    }
  }

  async function buyTonProduct(id, cb) {
    var product = PRODUCTS[id];
    var price = tonPriceFor(id);
    if (!product || !price) return { ok: false, status: 'bad_product' };
    if (!HAS_TG) {
      toast('Open Bloodtread in Telegram to buy with TON.');
      if (cb) cb('not_telegram');
      return { ok: false, status: 'not_telegram' };
    }
    try {
      toast('Connecting TON wallet...', 2400);
      var ui = await getTonConnectUI();
      var wallet = await waitForTonWallet(ui);
      var order = await apiPost('/api/tg-ton-order', {
        game: GAME_ID,
        productId: id,
        initData: tg.initData
      });
      var pending = {
        payload: order.payload,
        productId: id,
        createdAt: Date.now(),
        walletAddress: wallet && wallet.address || null
      };
      writePendingTon(pending);
      toast('Confirm ' + order.ton + ' TON in your wallet.', 4200);
      var result = await ui.sendTransaction({
        validUntil: order.validUntil,
        network: order.network || '-239',
        messages: [{
          address: order.recipient,
          amount: order.nanotons,
          payload: order.payloadBoc
        }]
      });
      pending.boc = result && result.boc || null;
      writePendingTon(pending);
      toast('Waiting for TON confirmation...', 3000);
      var verified = await verifyTonPayment(pending, pending.boc, pending.walletAddress, 18);
      if (verified && verified.paid) {
        await applyPaidPayload(pending.payload, verified.productId || id, product, verified);   // idempotent (guards the resume path re-applying)
        writePendingTon(null);
        toast('TON purchase applied: ' + product.title);
        if (cb) cb('paid');
        return { ok: true, status: 'paid', txHash: verified.txHash || null };
      }
      toast('TON sent. Reward will unlock when the chain indexer catches up.', 4200);
      if (cb) cb('pending');
      return { ok: true, status: 'pending' };
    } catch (e) {
      if (String(e && e.message || '').indexOf('wallet_not_connected') >= 0) {
        toast('TON wallet was not connected.');
        if (cb) cb('cancelled');
        return { ok: false, status: 'cancelled' };
      }
      if (String(e && e.message || '').indexOf('UserRejects') >= 0 || String(e && e.message || '').indexOf('reject') >= 0) {
        toast('TON transaction cancelled.');
        if (cb) cb('cancelled');
        return { ok: false, status: 'cancelled' };
      }
      toast('TON checkout failed: ' + (e && e.message || 'unknown_error'));
      if (cb) cb('error');
      return { ok: false, status: 'error', error: e && e.message || 'unknown_error' };
    }
  }

  async function buyProduct(id, currency, cb) {
    if (window.BLOODTREAD_SHOP_ENABLED === false) {
      toast('Shop is coming soon.');
      if (cb) cb('shop_disabled');
      return { ok: false, status: 'shop_disabled' };
    }
    if (typeof currency === 'function') {
      cb = currency;
      currency = 'XTR';
    }
    currency = currency || 'XTR';
    var product = PRODUCTS[id];
    if (!product) return { ok: false, status: 'bad_product' };
    if (currency === 'TON') return buyTonProduct(id, cb);
    if (currency !== 'XTR') {
      toast('TON checkout is not enabled for this item yet.');
      if (cb) cb('unsupported_currency');
      return { ok: false, status: 'unsupported_currency' };
    }
    if (!product.stars) {
      toast('This item is TON-only.');
      if (cb) cb('unsupported_currency');
      return { ok: false, status: 'unsupported_currency' };
    }
    if (!HAS_TG) {
      toast('Open Bloodtread in Telegram to buy with Stars.');
      if (cb) cb('not_telegram');
      return { ok: false, status: 'not_telegram' };
    }
    try {
      toast('Opening Telegram Stars invoice...', 2200);
      var res = await fetch('/api/tg-invoice', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          game: 'bloodtread',
          productId: id,
          initData: tg.initData
        })
      });
      var data = await res.json().catch(function () { return {}; });
      if (!res.ok || !data.invoiceLink) throw new Error(data.error || 'invoice_failed');
      return await new Promise(function (resolve) {
        tg.openInvoice(data.invoiceLink, function (status) {
        if (status === 'paid') {
          waitForPurchase(data.payload).then(async function (serverPaid) {
            // SERVER-AUTHORITATIVE GRANT: only refresh state after the backend confirms and applies the paid row.
            // A spoofed openInvoice callback cannot unlock anything because the wrapper never grants locally.
            if (!serverPaid) {
              toast('Payment received - unlocking once the receipt confirms.', 3200);
              schedulePurchaseRetry(data.payload, id, product);
              if (cb) cb('pending');
              resolve({ ok: false, status: 'pending_receipt' });
              return;
            }
            if (product.noAutoApply) { toast(product.title + ' paid'); await loadRemoteState(); }
            else if (await applyPaidPayload(data.payload, id, product, serverPaid)) toast('Purchase applied: ' + product.title);
            else toast(product.title + ' already applied');
            if (cb) cb('paid');
            resolve({ ok: true, status: 'paid', serverPaid: true });
          }).catch(function (e) {
            toast('Payment unlock failed: ' + (e && e.message || 'unknown_error'));
            if (cb) cb('error');
            resolve({ ok: false, status: 'unlock_error' });
          });
        } else if (status === 'cancelled') {
          toast('Invoice cancelled');
          if (cb) cb('cancelled');
          resolve({ ok: false, status: 'cancelled' });
        } else {
          toast('Invoice status: ' + status);
          if (cb) cb(status);
          resolve({ ok: false, status: status });
        }
      });
      });
    } catch (e) {
      toast('Payment setup failed: ' + e.message);
      if (cb) cb('error');
      return { ok: false, status: 'error', error: e.message };
    }
  }

  async function waitForPurchase(payload) {
    if (!payload || !HAS_TG) return false;
    for (var i = 0; i < 12; i += 1) {
      try {
        var data = await apiPost('/api/tg-purchase', {
          action: 'claim',
          game: GAME_ID,
          initData: tg.initData,
          payload: payload
        });
        if (data && data.paid && (data.granted || (data.grant && data.grant.granted))) return data;
      } catch (e) {
        if (e.status === 503) return null;
      }
      await sleep(750);
    }
    return null;
  }

  // IDEMPOTENT SERVER STATE REFRESH: a confirmed-paid payload is already granted by the backend. The wrapper
  // writes the returned cloud state mirror and reloads the iframe so tg.js hydrates it; it never calls a local
  // paid-product grant hook.
  var APPLIED_KEY = 'bloodtread_applied_payloads';
  function payloadApplied(payload) {
    try { var a = JSON.parse(localStorage.getItem(APPLIED_KEY) || '[]'); return Array.isArray(a) && a.indexOf(payload) >= 0; } catch (e) { return false; }
  }
  function markPayloadApplied(payload) {
    try {
      var a = JSON.parse(localStorage.getItem(APPLIED_KEY) || '[]');
      if (!Array.isArray(a)) a = [];
      if (a.indexOf(payload) < 0) a.push(payload);
      while (a.length > 80) a.shift();
      localStorage.setItem(APPLIED_KEY, JSON.stringify(a));
    } catch (e) {}
  }
  async function applyServerPaidState(serverData, id) {
    var state = serverData && (serverData.state || (serverData.grant && serverData.grant.state));
    if (state) writeLocalState(state);
    else await loadRemoteState();
    closeShop();
    // GACHA (box_*/mythic_*): redeem LIVE so the pull rolls + reveals in place (no reload). Bundles: reload the
    // iframe so the game re-hydrates the server-applied delta (bank/tiers/adFree).
    var isGacha = typeof id === 'string' && (id.indexOf('box_') === 0 || id.indexOf('mythic_') === 0);
    try {
      var cw = game.contentWindow;
      if (isGacha && cw && typeof cw.__tgRedeemPending === 'function') { cw.__tgRedeemPending(); return true; }
      if (cw && cw.location) cw.location.reload();
    } catch (e) {}
    return true;
  }
  // Reflect a BACKEND-CONFIRMED product once. Only call after waitForPurchase / TON verify returns paid.
  async function applyPaidPayload(payload, id, product, serverData) {
    var firstApply = !(payload && payloadApplied(payload));
    await applyServerPaidState(serverData, id);
    if (payload) markPayloadApplied(payload);
    return firstApply;
  }
  // Receipt lagging past the inline 9s poll: keep retrying in the background, then refresh state once confirmed.
  function schedulePurchaseRetry(payload, id, product) {
    var tries = 0;
    (function again() {
      if (!payload || payloadApplied(payload) || !HAS_TG) return;
      if (tries++ > 20) return;
      waitForPurchase(payload).then(async function (paid) {
        if (paid) { await applyPaidPayload(payload, id, product, paid); toast('Purchase applied: ' + (product ? product.title : id)); }
        else setTimeout(again, 6000);
      });
    })();
  }

	  function waitForAdSdk(predicate, ms) {
	    var started = Date.now();
	    return new Promise(function (resolve) {
	      (function tick() {
	        var value = null;
	        try { value = predicate(); } catch (e) { value = null; }
	        if (value) { resolve(value); return; }
	        if (Date.now() - started >= ms) { resolve(null); return; }
	        setTimeout(tick, 120);
	      })();
	    });
	  }

	  function monetagShowFn() {
	    var zone = window.BLOODTREAD_MONETAG_ZONE_ID;
	    var fn = zone && window['show_' + zone];
	    return typeof fn === 'function' ? fn : null;
	  }

	  function showMonetagAd(type) {
	    var fn = monetagShowFn();
	    if (!fn) return null;
	    if (type === 'rewarded') return fn();
	    return fn({
	      type: 'inApp',
	      requestVar: 'bloodtread_midgame',
	      inAppSettings: window.BLOODTREAD_MONETAG_INAPP_SETTINGS || {
	        frequency: 1,
	        capping: 0.1,
	        interval: 60,
	        timeout: 5,
	        everyPage: false
	      }
	    });
	  }

	  function showAd(type, cb) {
	    type = type === 'rewarded' ? 'rewarded' : 'interstitial';
	    if (adBusy) {
	      var busy = { shown: false, rewarded: false, reason: 'busy' };
	      if (cb) cb(false, busy);
	      return Promise.resolve(busy);
	    }
	    adBusy = true;
	    var settled = false;
	    var done = function (result) {
	      if (settled) return result || { shown: false, rewarded: false };
	      settled = true;
	      adBusy = false;
	      result = result || { shown: false, rewarded: false };
	      var ok = Boolean(result.rewarded || result.shown);
	      if (!ok) toast('Ad not ready. Try again in a moment.', 1600);
	      if (cb) cb(ok, result);
	      return result;
	    };
	    var fallbackToMonetag = function () {
	      return waitForAdSdk(monetagShowFn, 3500).then(function (fn) {
	        if (!fn) return done({ shown: false, rewarded: false, reason: 'sdk_missing' });
	        var res;
	        try { res = showMonetagAd(type); } catch (e) { return done({ shown: false, rewarded: false, reason: 'monetag_throw' }); }
	        return Promise.resolve(res)
	          .then(function () { return done({ shown: true, rewarded: type === 'rewarded', network: 'monetag' }); })
	          .catch(function () { return done({ shown: false, rewarded: false, network: 'monetag', reason: 'closed_or_no_fill' }); });
	      });
	    };
	    var promise;
	    if (type === 'rewarded') {
	      promise = waitForAdSdk(function () {
	        return window.BLOODTREAD_ADSGRAM_BLOCK_ID && window.Adsgram && typeof window.Adsgram.init === 'function' ? window.Adsgram : null;
	      }, 3500).then(function (adsgramApi) {
	        if (!adsgramApi) return fallbackToMonetag();
	        try {
	          var adsgram = window.__bloodtreadAdsgram || (window.__bloodtreadAdsgram = adsgramApi.init({ blockId: window.BLOODTREAD_ADSGRAM_BLOCK_ID }));
	          return Promise.resolve(adsgram.show())
	            .then(function () { return done({ shown: true, rewarded: true, network: 'adsgram' }); })
	            .catch(fallbackToMonetag);
	        } catch (e) {
	          return fallbackToMonetag();
	        }
	      });
	    } else {
	      promise = fallbackToMonetag();
	    }
	    setTimeout(function () { done({ shown: false, rewarded: false, reason: 'timeout' }); }, 32000);
	    return promise.then(done).catch(function () { return done({ shown: false, rewarded: false, reason: 'error' }); });
	  }

  window.__tg = {
    buy: buyProduct,
    showAd: showAd,
    // Clear a redeemed gacha pull server-side (the game calls this after it rolls + reveals a pending pull).
    ackPending: function (payload) {
      if (!payload || !HAS_TG) return Promise.resolve(false);
      return apiPost('/api/tg-purchase', { action: 'ack', game: GAME_ID, initData: tg.initData, payload: payload })
        .then(function () { return true; }).catch(function () { return false; });
    },
    saveState: function (obj) {
      if (obj && typeof obj === 'object') writeLocalState(obj);
      return saveRemoteState('hook');
    },
    loadState: async function () {
      await loadRemoteState();
      return readLocalState();
    },
    getProducts: function () {
      return JSON.parse(JSON.stringify(PRODUCTS));
    }
  };

  function attachGameAdapter() {
    try {
      var cw = game.contentWindow;
      if (cw) cw.__tg = window.__tg;
    } catch (e) {}
  }

  function startGame() {
    if (gameStarted) return;
    gameStarted = true;
    var gameSrc = game.getAttribute('data-src') || '../games/bloodtread_mobile/?tg=1';
    try {
      var adsgramBlock = (location.search.match(/[?&]adsgram=([0-9]+)/) || [])[1];
      if (adsgramBlock) gameSrc += '&adsgram=' + adsgramBlock;
    } catch (e) {}
    game.src = gameSrc;
  }

  async function boot() {
    await loadRemoteState();
    startGame();
    resumePendingTonPurchase();
    if (HAS_TG) {
      setInterval(function () { saveRemoteState('interval'); }, 15000);
      setInterval(resumePendingTonPurchase, 30000);
    }
  }

  // No wrapper shop button anymore - purchases start from the in-game Blood Market (STORE) via window.__tg.buy.
  document.getElementById('closeShopBtn').addEventListener('click', closeShop);
  game.addEventListener('load', attachGameAdapter);
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'hidden') saveRemoteState('hidden', true);
  });
  window.addEventListener('pagehide', function () { saveRemoteState('pagehide', true); });

  window.render_game_to_text = function () {
    try {
      var cw = game.contentWindow;
      if (cw && typeof cw.render_game_to_text === 'function') return cw.render_game_to_text();
    } catch (e) {}
    return JSON.stringify({ game: 'Bloodtread', screen: shopScreen.hidden ? 'game' : 'shop', telegram: HAS_TG });
  };

  window.advanceTime = function (ms) {
    try {
      var cw = game.contentWindow;
      if (cw && typeof cw.advanceTime === 'function') return cw.advanceTime(ms);
    } catch (e) {}
    return window.render_game_to_text();
  };

  boot();
})();
</script>
