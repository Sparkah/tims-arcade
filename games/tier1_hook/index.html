// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';                  // MENU | PLAYING | REVEAL | WON | GAMEOVER
var turn = 0;                     // 0..MAX_TURNS
var picks = [];                   // length = slots already locked
var pending = -1;                 // index of currently highlighted card, -1 = none
var offer = [];                   // current turn's offered cards
var pool = [];                    // 4 slots x CARDS_PER_TURN cards
var seedStr = '';                 // daily seed string
var thumbsUp = 0;                 // computed at REVEAL entry
var revealStartT = 0;             // ms time when reveal began
var revealedCount = 0;            // # buyers already shown
var voteResults = [];             // [{up:bool, score:int}, ...]
var best = 0;
var layout = {};                  // cached pixel layout

// ── SEEDED RANDOM ────────────────────────────────────────────────────────
function seedFromDate() {
  var d = new Date();
  return d.getUTCFullYear() * 10000 + (d.getUTCMonth()+1) * 100 + d.getUTCDate();
}
function mulberry32(s) {
  return function() {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    var t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function shuffleSeeded(arr, rnd) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rnd() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function clampNum(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

// ── POOL BUILD ───────────────────────────────────────────────────────────
function buildPool() {
  var s = seedFromDate();
  seedStr = String(s);
  var rnd = mulberry32(s);
  pool = [];
  for (var slot = 0; slot < MAX_TURNS; slot++) {
    var src = CARD_POOLS[slot];
    var picked = shuffleSeeded(src, rnd).slice(0, CARDS_PER_TURN);
    var out = picked.map(function(card) {
      var noisy = card.base.map(function(v) {
        var n = Math.round((rnd() - 0.5) * 1.4);
        return clampNum(v + n, APPEAL_MIN, APPEAL_MAX);
      });
      return { en: card.en, ru: card.ru, hintK: card.hintK, appeal: noisy };
    });
    pool.push(out);
  }
}

// ── LIFECYCLE ────────────────────────────────────────────────────────────
function startGame() {
  buildPool();
  turn = 0;
  picks = [];
  pending = -1;
  thumbsUp = 0;
  revealStartT = 0;
  revealedCount = 0;
  voteResults = [];
  offer = pool[0];
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
  recomputeLayout();
  GF.tutorial.start(buildTutorialSteps(), { storageKey: 'tier1_hook_seen_tutorial' });
}

function lockChoice() {
  if (gs !== 'PLAYING') return;
  if (pending < 0) return;
  picks.push(pool[turn][pending]);
  turn++;
  pending = -1;
  if (turn >= MAX_TURNS) {
    enterReveal();
  } else {
    offer = pool[turn];
  }
  GF.saveRun();
}

function enterReveal() {
  gs = 'REVEAL';
  revealStartT = performance.now();
  revealedCount = 0;
  voteResults = [];
  for (var b = 0; b < BUYER_COUNT; b++) {
    var sum = 0;
    for (var p = 0; p < picks.length; p++) sum += picks[p].appeal[b];
    voteResults.push({ up: sum >= BUYER_THUMB_THRESHOLD, score: sum });
  }
  thumbsUp = 0;
  for (var i = 0; i < voteResults.length; i++) if (voteResults[i].up) thumbsUp++;
}

function finishReveal() {
  if (thumbsUp >= WIN_THUMBS) {
    gs = 'WON';
    if (thumbsUp > best) { best = thumbsUp; try { localStorage.setItem('tier1_hook_best', String(best)); } catch (e) {} }
  } else {
    gs = 'GAMEOVER';
  }
  GF.gameEnded();
  GF.saveRun();
}

// Screenshot helper + runtime-gate terminal jump.
window._jumpLevel = function (level) {
  buildPool();
  if (level && level >= 90) {
    // Force terminal — pick worst card from each slot then run reveal so
    // thumbsUp lands below WIN_THUMBS and gs flips to GAMEOVER.
    picks = [];
    for (var s = 0; s < MAX_TURNS; s++) {
      var worst = 0, worstSum = Infinity;
      for (var i = 0; i < pool[s].length; i++) {
        var sum = 0;
        for (var b = 0; b < BUYER_COUNT; b++) sum += pool[s][i].appeal[b];
        if (sum < worstSum) { worstSum = sum; worst = i; }
      }
      picks.push(pool[s][worst]);
    }
    turn = MAX_TURNS;
    pending = -1;
    enterReveal();
    finishReveal();
    if (GF.tutorial && GF.tutorial.active !== undefined) GF.tutorial.active = false;
    recomputeLayout();
    return;
  }
  picks = [ pool[0][0], pool[1][1] ];
  turn = 2;
  offer = pool[2];
  pending = 1;
  thumbsUp = 0;
  revealedCount = 0;
  voteResults = [];
  gs = 'PLAYING';
  if (GF.tutorial && GF.tutorial.active !== undefined) GF.tutorial.active = false;
  recomputeLayout();
};
window._setupForScreenshot = function () {
  buildPool();
  picks = [ pool[0][0], pool[1][1], pool[2][0] ];
  turn = 3;
  offer = pool[3];
  pending = 0;
  thumbsUp = 0;
  revealedCount = 0;
  voteResults = [];
  gs = 'PLAYING';
  if (GF.tutorial && GF.tutorial.active !== undefined) GF.tutorial.active = false;
  recomputeLayout();
};

// ── INPUT ────────────────────────────────────────────────────────────────
function onPress(x, y) {
  if (GF.tutorial.handleClick(x, y)) return;
  if (gs === 'PLAYING') {
    // Help button takes priority.
    if (layout.helpBtn) {
      var h = layout.helpBtn;
      if (x >= h.x && x <= h.x+h.w && y >= h.y && y <= h.y+h.h) {
        GF.tutorial.start(buildTutorialSteps(), { storageKey: 'tier1_hook_seen_tutorial', force: true });
        return;
      }
    }
    // Card row hit-test
    if (layout.cards) {
      for (var i = 0; i < layout.cards.length; i++) {
        var c = layout.cards[i];
        if (x >= c.x && x <= c.x + c.w && y >= c.y && y <= c.y + c.h) {
          if (pending === i) lockChoice();
          else pending = i;
          return;
        }
      }
    }
    if (layout.lockBtn) {
      var b = layout.lockBtn;
      if (x >= b.x && x <= b.x+b.w && y >= b.y && y <= b.y+b.h) { lockChoice(); return; }
    }
  } else if (gs === 'REVEAL') {
    revealStartT -= REVEAL_STAGGER_MS; // tap to speed up
  }
}

// Pointer / touch routing. The lib's canvas already preventsDefaults on
// touchstart; we register on the canvas to align with its event chain.
GF.canvas.addEventListener('mousedown', function (e) { onPress(e.clientX, e.clientY); });
GF.canvas.addEventListener('touchstart', function (e) {
  if (!e.changedTouches || !e.changedTouches.length) return;
  var t = e.changedTouches[0];
  onPress(t.clientX, t.clientY);
}, { passive: true });

// ── TUTORIAL ─────────────────────────────────────────────────────────────
function firstCardTarget() {
  if (!layout.cards || !layout.cards[0]) return null;
  var c = layout.cards[0];
  return { x: c.x + c.w/2, y: c.y + c.h/2, r: Math.max(c.w, c.h) * 0.55 };
}
function lockBtnTarget() {
  if (!layout.lockBtn) return null;
  var b = layout.lockBtn;
  return { x: b.x + b.w/2, y: b.y + b.h/2, r: Math.max(b.w, b.h) * 0.65 };
}
function buyersTarget() {
  if (!layout.buyers || !layout.buyers[0]) return null;
  var bx = 0, by = 0;
  for (var i = 0; i < layout.buyers.length; i++) { bx += layout.buyers[i].x; by += layout.buyers[i].y; }
  bx /= layout.buyers.length; by /= layout.buyers.length;
  return { x: bx, y: by, r: 110 * GF.S };
}
function buildTutorialSteps() {
  return [
    { text: GF.t('tut_goal'),     target: buyersTarget,    advance: 'click_any' },
    { text: GF.t('tut_controls'), target: firstCardTarget, advance: 'click_any' },
    { text: GF.t('tut_tip'),      target: lockBtnTarget,   advance: 'click_any' },
  ];
}

// ── LAYOUT ───────────────────────────────────────────────────────────────
function recomputeLayout() {
  var S = GF.S;
  var W = GF.W, H = GF.H;
  layout = {};
  // Buyer panel: top strip.
  var topH = Math.max(108 * S, 88);
  layout.topH = topH;
  layout.buyers = [];
  var bw = Math.min(W * 0.16, 110 * S);
  var bgap = 8 * S;
  var totalBW = BUYER_COUNT * bw + (BUYER_COUNT - 1) * bgap;
  var bx0 = (W - totalBW) / 2;
  for (var i = 0; i < BUYER_COUNT; i++) {
    layout.buyers.push({
      x: bx0 + i * (bw + bgap) + bw / 2,
      y: topH * 0.50,
      r: Math.min(bw, topH) * 0.38,
    });
  }
  // Slot row (committed picks). Middle band, just below buyers.
  var slotY = topH + 16 * S;
  var slotH = Math.max(90 * S, 72);
  var slotGap = 8 * S;
  var slotW = (W - 24 * S - (MAX_TURNS - 1) * slotGap) / MAX_TURNS;
  layout.slots = [];
  for (var s = 0; s < MAX_TURNS; s++) {
    layout.slots.push({
      x: 12 * S + s * (slotW + slotGap),
      y: slotY,
      w: slotW,
      h: slotH,
      idx: s,
    });
  }
  // Lock button reserved at bottom.
  var lbH = Math.max(54 * S, 46);
  var lbW = Math.min(220 * S, W * 0.55);
  layout.lockBtn = { x: GF.cx - lbW/2, y: H - lbH - 14 * S, w: lbW, h: lbH };
  // Offer row between slots and lock btn.
  var offerTop = slotY + slotH + 18 * S;
  var offerBottom = layout.lockBtn.y - 14 * S;
  var offerH = offerBottom - offerTop;
  if (offerH < 130) offerH = 130;
  var cardGap = 10 * S;
  var cardW = (W - 24 * S - (CARDS_PER_TURN - 1) * cardGap) / CARDS_PER_TURN;
  var maxCardW = 280 * S;
  layout.cards = [];
  if (cardW > maxCardW) {
    cardW = maxCardW;
    var rowW = cardW * CARDS_PER_TURN + cardGap * (CARDS_PER_TURN - 1);
    var x0 = (W - rowW) / 2;
    for (var k = 0; k < CARDS_PER_TURN; k++) {
      layout.cards.push({ x: x0 + k * (cardW + cardGap), y: offerTop, w: cardW, h: offerH });
    }
  } else {
    for (var k2 = 0; k2 < CARDS_PER_TURN; k2++) {
      layout.cards.push({ x: 12 * S + k2 * (cardW + cardGap), y: offerTop, w: cardW, h: offerH });
    }
  }
  // Help (?) button — top-right.
  var hb = Math.max(36 * S, 30);
  layout.helpBtn = { x: W - hb - 10 * S, y: 10 * S, w: hb, h: hb };
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  GF.tutorial.update(dt);
  if (gs === 'REVEAL') {
    var elapsed = performance.now() - revealStartT;
    var wantRevealed = Math.min(BUYER_COUNT, Math.floor(elapsed / REVEAL_STAGGER_MS) + 1);
    while (revealedCount < wantRevealed) {
      var bIdx = revealedCount;
      var b = layout.buyers && layout.buyers[bIdx];
      var v = voteResults[bIdx];
      if (b && v) GF.spawnParticles(b.x, b.y, v.up ? '#22c55e' : '#ef4444', v.up ? 18 : 12);
      revealedCount++;
    }
    if (revealedCount >= BUYER_COUNT && elapsed > BUYER_COUNT * REVEAL_STAGGER_MS + 420) {
      finishReveal();
    }
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  recomputeLayout();
  var bg = ctx.createLinearGradient(0, 0, 0, GF.H);
  bg.addColorStop(0, '#12132c');
  bg.addColorStop(0.55, '#0a0a18');
  bg.addColorStop(1, '#070712');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'PLAYING' || gs === 'REVEAL') {
    drawBuyerPanel(ctx);
    drawSlots(ctx);
    if (gs === 'PLAYING') {
      drawOfferRow(ctx);
      drawLockBtn(ctx);
    } else {
      drawRevealHint(ctx);
    }
    drawHUD(ctx);
    drawHelpBtn(ctx);
    GF.tutorial.draw(ctx);
  }

  if (gs === 'MENU') {
    drawMenuOverlay(ctx);
  }
  if (gs === 'GAMEOVER') {
    GF.drawOverlay({
      title: GF.t('gameover'),
      sub: GF.t('thumbs') + ': ' + thumbsUp + ' / ' + BUYER_COUNT,
      sub2: GF.t('best') + ': ' + best + ' / ' + BUYER_COUNT,
      btnText: GF.t('retry'),
      btnFn: startGame,
    });
  }
  if (gs === 'WON') {
    GF.drawOverlay({
      title: GF.t('won'),
      sub: GF.t('thumbs') + ': ' + thumbsUp + ' / ' + BUYER_COUNT,
      sub2: GF.t('best') + ': ' + best + ' / ' + BUYER_COUNT,
      btnText: GF.t('retry'),
      btnFn: startGame,
    });
  }
}

function drawMenuOverlay(ctx) {
  // Full-canvas dark scrim
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var S = GF.S;
  var titleFs = GF.clamp(38*S, 22, 56);
  var subFs   = GF.clamp(16*S, 12, 22);

  // Title
  ctx.shadowColor = 'rgba(77,208,225,0.5)';
  ctx.shadowBlur = 28*S;
  ctx.font = 'bold '+titleFs+'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t('title'), GF.cx, GF.cy - 170*S);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.font = subFs+'px sans-serif';
  ctx.fillStyle = '#9ab';
  ctx.textAlign = 'center';
  ctx.fillText(GF.t('sub'), GF.cx, GF.cy - 130*S);

  // Tutorial copy lines
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  var tfs = GF.clamp(15*S, 12, 19);
  ctx.font = tfs + 'px sans-serif';
  ctx.fillStyle = '#cde';
  ctx.textAlign = 'left';
  var maxLineW = Math.min(GF.W - 40 * S, 640);
  var leftX = GF.cx - maxLineW / 2;
  var lineY = GF.cy - 80 * S;
  var lineH = tfs * 1.55;
  for (var i = 0; i < lines.length; i++) {
    ctx.fillText('• ' + lines[i], leftX, lineY + i * lineH);
  }

  // PLAY button — drawn via GF.drawOverlay's internal register? We use
  // canvas click handled by the lib's button-system since GF.drawOverlay
  // populates buttons[]. We'll call drawOverlay just to register the button
  // bg sub-content overlaps. Simpler: draw button + register via re-using
  // GF.drawOverlay style and routing through our own onPress.
  var btnW = GF.clamp(240*S, 160, 320);
  var btnH = GF.clamp(52*S, 40, 66);
  var btnX = GF.cx - btnW/2;
  var btnY = GF.cy + 95*S;
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY+btnH);
  grad.addColorStop(0, '#22c55e');
  grad.addColorStop(1, '#15803d');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH/2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.font = 'bold '+subFs+'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), GF.cx, btnY + btnH/2);
  ctx.textBaseline = 'alphabetic';
  // Cache so onPress can hit-test
  layout.menuPlayBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  // Best score
  if (best > 0) {
    ctx.font = GF.clamp(13*S, 10, 17) + 'px sans-serif';
    ctx.fillStyle = '#557';
    ctx.textAlign = 'center';
    ctx.fillText(GF.t('best') + ': ' + best + ' / ' + BUYER_COUNT, GF.cx, btnY + btnH + 26*S);
  }
}

// Augment onPress for MENU's play button.
var _originalOnPress = onPress;
onPress = function (x, y) {
  if (gs === 'MENU') {
    var b = layout.menuPlayBtn;
    if (b && x >= b.x && x <= b.x+b.w && y >= b.y && y <= b.y+b.h) {
      startGame();
      return;
    }
  }
  _originalOnPress(x, y);
};
// Re-bind canvas listeners to pick up the new onPress closure.
GF.canvas.addEventListener('mousedown', function (e) { onPress(e.clientX, e.clientY); });
GF.canvas.addEventListener('touchstart', function (e) {
  if (!e.changedTouches || !e.changedTouches.length) return;
  var t = e.changedTouches[0];
  onPress(t.clientX, t.clientY);
}, { passive: true });

function wrapText(c, text, x, y, maxW, lineH) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  for (var j = 0; j < lines.length; j++) c.fillText(lines[j], x, y + j * lineH);
}

function drawBuyerPanel(ctx) {
  var S = GF.S;
  ctx.fillStyle = 'rgba(30,30,55,0.55)';
  GF.rr(ctx, 8*S, 8*S, GF.W - 16*S, layout.topH - 4*S, 12*S);
  ctx.fill();
  ctx.fillStyle = '#9ab';
  ctx.font = 'bold ' + GF.clamp(12*S, 10, 16) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('buyers'), 16*S, 14*S);

  for (var i = 0; i < BUYER_COUNT; i++) {
    var b = layout.buyers[i];
    var revealed = (gs === 'REVEAL' && i < revealedCount) || gs === 'WON' || gs === 'GAMEOVER';
    var v = voteResults[i];
    // Avatar disc
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = revealed && v ? (v.up ? '#16432a' : '#4a1818') : '#2a2a44';
    ctx.fill();
    ctx.lineWidth = 2 * S;
    ctx.strokeStyle = REGION_COLORS[i];
    ctx.stroke();
    // Flag glyph inside disc
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + GF.clamp(14*S, 11, 18) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(regionFlag(i), b.x, b.y);
    // Region name underneath
    ctx.font = GF.clamp(10*S, 8, 13) + 'px sans-serif';
    ctx.fillStyle = '#cde';
    ctx.textBaseline = 'top';
    ctx.fillText(GF.t(REGION_KEYS[i]), b.x, b.y + b.r + 4 * S);
    // Thumb stamp
    if (revealed && v) {
      drawThumb(ctx, b.x + b.r * 0.85, b.y - b.r * 0.7, b.r * 0.55, v.up);
    }
  }
}

function drawThumb(ctx, x, y, r, up) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = up ? '#22c55e' : '#ef4444';
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (r * 1.4) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(up ? '+' : '-', 0, 0);
  ctx.restore();
}

function drawSlots(ctx) {
  var S = GF.S;
  for (var i = 0; i < MAX_TURNS; i++) {
    var sl = layout.slots[i];
    var filled = i < picks.length;
    var active = (gs === 'PLAYING' && i === turn);
    var card = filled ? picks[i] : null;
    ctx.fillStyle = filled ? 'rgba(45,60,100,0.55)' : (active ? 'rgba(80,40,120,0.55)' : 'rgba(20,22,40,0.5)');
    GF.rr(ctx, sl.x, sl.y, sl.w, sl.h, 10 * S);
    ctx.fill();
    ctx.lineWidth = active ? 2.5 * S : 1.5 * S;
    ctx.strokeStyle = active ? '#a855f7' : (filled ? '#4dd0e1' : '#3a3d5c');
    ctx.stroke();
    // Slot label
    ctx.fillStyle = '#9ab';
    ctx.font = 'bold ' + GF.clamp(10*S, 8, 14) + 'px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(GF.t(SLOT_KEYS[i]), sl.x + 8 * S, sl.y + 6 * S);
    if (filled) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + GF.clamp(13*S, 11, 17) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      var label = card[GF.lang] || card.en;
      wrapText(ctx, label, sl.x + sl.w / 2, sl.y + sl.h / 2 + 4 * S, sl.w - 12 * S, GF.clamp(15*S, 12, 19));
    } else {
      ctx.fillStyle = active ? '#cde' : '#445';
      ctx.font = (active ? 'bold ' : '') + GF.clamp(14*S, 11, 18) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(active ? '...' : slotIcon(i), sl.x + sl.w / 2, sl.y + sl.h / 2 + 4 * S);
    }
  }
}

function drawOfferRow(ctx) {
  var S = GF.S;
  var t = performance.now();
  for (var i = 0; i < layout.cards.length; i++) {
    var c = layout.cards[i];
    var card = offer[i];
    if (!card) continue;
    var selected = (pending === i);
    var lift = selected ? CARD_HOVER_LIFT * S : 0;
    var yy = c.y - lift;
    ctx.fillStyle = selected ? 'rgba(80,40,120,0.92)' : 'rgba(28,30,55,0.88)';
    GF.rr(ctx, c.x, yy, c.w, c.h, 14 * S);
    ctx.fill();
    ctx.lineWidth = selected ? 3 * S : 1.5 * S;
    ctx.strokeStyle = selected ? '#e879f9' : '#4a5172';
    ctx.stroke();
    // Slot tag at top
    ctx.fillStyle = '#9ab';
    ctx.font = 'bold ' + GF.clamp(10*S, 8, 13) + 'px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(GF.t(SLOT_KEYS[turn]), c.x + 12 * S, yy + 10 * S);
    // Big label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + GF.clamp(20*S, 14, 28) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    var label = card[GF.lang] || card.en;
    wrapText(ctx, label, c.x + c.w / 2, yy + c.h * 0.45, c.w - 16 * S, GF.clamp(22*S, 16, 30));
    // Hint
    var pulse = selected ? 0.85 + 0.15 * Math.sin(t / HINT_PULSE_MS * Math.PI * 2) : 1;
    ctx.fillStyle = selected ? 'rgba(232,121,249,' + (0.9*pulse) + ')' : '#7a86b0';
    ctx.font = GF.clamp(13*S, 10, 17) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    wrapText(ctx, GF.t(card.hintK), c.x + c.w / 2, yy + c.h - 18 * S, c.w - 16 * S, GF.clamp(14*S, 11, 18));
  }
}

function drawLockBtn(ctx) {
  var b = layout.lockBtn;
  var S = GF.S;
  var active = (pending >= 0);
  var grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
  if (active) { grad.addColorStop(0, '#22c55e'); grad.addColorStop(1, '#15803d'); }
  else { grad.addColorStop(0, '#3a3d5c'); grad.addColorStop(1, '#22243d'); }
  GF.rr(ctx, b.x, b.y, b.w, b.h, b.h / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = active ? '#fff' : '#7a86b0';
  ctx.font = 'bold ' + GF.clamp(18*S, 14, 24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('lock'), b.x + b.w / 2, b.y + b.h / 2);
}

function drawRevealHint(ctx) {
  var S = GF.S;
  ctx.fillStyle = '#cde';
  ctx.font = 'bold ' + GF.clamp(18*S, 13, 24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var y = layout.cards && layout.cards[0] ? layout.cards[0].y + layout.cards[0].h / 2 : GF.cy;
  ctx.fillText(GF.t('buyers') + ' ...', GF.cx, y);
}

function drawHUD(ctx) {
  var S = GF.S;
  ctx.fillStyle = '#cde';
  ctx.font = 'bold ' + GF.clamp(14*S, 11, 18) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  var displayTurn = Math.min(turn + 1, MAX_TURNS);
  ctx.fillText(GF.t('turn') + ' ' + displayTurn + ' ' + GF.t('of') + ' ' + MAX_TURNS, 12 * S, layout.topH + 4 * S);
  if (gs === 'PLAYING') {
    ctx.fillStyle = pending < 0 ? '#9ab' : '#22c55e';
    ctx.font = GF.clamp(12*S, 10, 15) + 'px sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'top';
    var maxRightX = layout.helpBtn ? layout.helpBtn.x - 8 * S : GF.W - 12 * S;
    ctx.fillText(pending < 0 ? GF.t('pickHint') : GF.t('lockHint'), maxRightX, layout.topH + 4 * S);
  }
}

function drawHelpBtn(ctx) {
  var h = layout.helpBtn;
  var S = GF.S;
  ctx.beginPath();
  ctx.arc(h.x + h.w/2, h.y + h.h/2, h.w/2, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(50,55,90,0.7)'; ctx.fill();
  ctx.lineWidth = 1.5 * S; ctx.strokeStyle = '#4dd0e1'; ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (h.h * 0.55) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', h.x + h.w/2, h.y + h.h/2);
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: [],
  saveKey: 'tier1_hook',
  onReady: function () {
    try { best = parseInt(localStorage.getItem('tier1_hook_best') || '0') || 0; } catch (e) {}
    buildPool();
    offer = pool[0];
    GF.persist('tier1_hook_run_v1',
      function () {
        return { gs: gs, turn: turn, picks: picks, pending: pending, seedStr: seedStr, thumbsUp: thumbsUp };
      },
      function (s) {
        if (!s) return;
        if (s.seedStr === seedStr) {
          gs    = s.gs    || 'MENU';
          turn  = s.turn  || 0;
          picks = s.picks || [];
          pending = (typeof s.pending === 'number') ? s.pending : -1;
          thumbsUp = s.thumbsUp || 0;
          if (turn < MAX_TURNS) offer = pool[turn] || [];
        }
      }
    );
    if (gs === 'REVEAL') gs = 'PLAYING';
    if (gs !== 'MENU' && gs !== 'PLAYING' && gs !== 'WON' && gs !== 'GAMEOVER') gs = 'MENU';
    recomputeLayout();
  },
  onUpdate: update,
  onDraw: draw,
});

// ── STATE EXPOSURE FOR RUNTIME GATE ──────────────────────────────────────
GF.exposeState(function () {
  return {
    gs: gs,
    turn: turn,
    pending: pending,
    thumbsUp: thumbsUp,
    revealedCount: revealedCount,
    picksLength: picks.length,
    seedStr: seedStr,
    MAX_TURNS: MAX_TURNS,
    CARDS_PER_TURN: CARDS_PER_TURN,
    BUYER_COUNT: BUYER_COUNT,
    WIN_THUMBS: WIN_THUMBS,
    BUYER_THUMB_THRESHOLD: BUYER_THUMB_THRESHOLD,
    APPEAL_MIN: APPEAL_MIN,
    APPEAL_MAX: APPEAL_MAX,
    REVEAL_STAGGER_MS: REVEAL_STAGGER_MS,
    CARD_HOVER_LIFT: CARD_HOVER_LIFT,
    HINT_PULSE_MS: HINT_PULSE_MS,
  };
});

})();
</script>
