var EGG_SLOTS       = 6;

// ── CRYSTAL + CLASS KEYS ─────────────────────────────────────────────────

var CLASSES  = ['gold', 'gem', 'scrap'];

// 9 items, 3 per class

  gold:  ['coin', 'bar', 'ring'],
  gem:   ['ruby', 'sapphire', 'emerald'],
  scrap: ['iron', 'copper', 'bone'],

// Flat list with class index
var ALL_ITEMS = [];
(function(){
  for (var ci = 0; ci < CLASSES.length; ci++) {
    var cls = CLASSES[ci];
    var arr = ITEMS_BY_CLASS[cls];
    for (var i = 0; i < arr.length; i++) {
      ALL_ITEMS.push({ id: arr[i], cls: cls });
    }
  }
})();

    tut_goal:     'Цель: Вычисли, какой кристалл смещает золото, самоцвет или лом, разбивая яйца.',
    tut_controls: 'Управление: Нажми кристалл, затем яйцо. На таблице свяжи кристалл с классом. Нажми ДОГАДКА.',
    tut_win:      'Победа: Сдай верное соответствие до того, как закончатся попытки.',
    tut_lose:     'Поражение: 30 разбитий или 3 догадки потрачены без верного ответа.',
    tut_tip:      'Совет: Кристалл утраивает шанс одного класса. Сравнивай яйца с приманкой и без.',
    score_line: 'Разбито {c} из {m}. Попыток: {g}',

  },
};

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';   // MENU | PLAYING | GAMEOVER | WON
var cracksLeft = MAX_CRACKS;
var luresLeft  = LURE_MOVES;
var guessAttemptsLeft = MAX_GUESSES;
var selectedCrystal = -1;          // 0..2 or -1
var biasMap = [0, 1, 2];           // hidden permutation: biasMap[crystalIdx] = classIdx
var guessMap = [-1, -1, -1];       // player's current mapping (per crystal -> classIdx)
var eggs = [];                     // tray of egg slots
var nextEggId = 1;
var solved = false;
var lastDrop = null;               // {crystal, cls, itemId}
var feedbackText = '';
var feedbackColor = '#cfd2dc';
var crackAnim = null;              // {slotIdx, t, item, crystal}
var best = 99;                     // lowest crack count on win
var caseSeed = 0;
var tutOpen = false;
var tutSeen = false;
var historyLog = [];               // {crystal:-1|0|1|2, cls:0|1|2}

// Click target rects (refreshed per draw)
var eggRects = [];                 // [{x,y,w,h,slotIdx}]
var crystalRects = [];             // [{x,y,w,h,idx}]
var gridRects = [];                // [{x,y,w,h,crystal,cls}]
var submitRect = null;
var playRect = null;
var helpRect = null;

// ── SEED + RNG ───────────────────────────────────────────────────────────
function daySeed() {
  var d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}
// Mulberry32
function rngFor(seed) {
  var s = (seed >>> 0) || 1;
  return function() {
    s |= 0; s = (s + 0x6D2B79F5) | 0;
    var t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffleInPlace(arr, r) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(r() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

// Hidden bias: deterministic permutation per day
function buildBias(seed) {
  var r = rngFor(seed ^ 0xA5A5A5);
  var perm = [0, 1, 2];
  shuffleInPlace(perm, r);
  return perm;
}

// ── LIFECYCLE ────────────────────────────────────────────────────────────
function refillTray() {
  eggs = [];
  for (var i = 0; i < EGG_SLOTS; i++) {
    eggs.push({ id: nextEggId++, cracked: false, staged: -1 });
  }
}

function startGame() {
  caseSeed = daySeed();
  biasMap = buildBias(caseSeed);
  cracksLeft = MAX_CRACKS;
  luresLeft  = LURE_MOVES;
  guessAttemptsLeft = MAX_GUESSES;
  selectedCrystal = -1;
  guessMap = [-1, -1, -1];
  solved = false;
  lastDrop = null;
  feedbackText = '';
  feedbackColor = '#cfd2dc';
  crackAnim = null;
  historyLog = [];
  nextEggId = 1;
  refillTray();
  gs = 'PLAYING';
  tutOpen = false;
  if (typeof GF.saveRun === 'function') GF.saveRun();
  if (typeof GF.gameStarted === 'function') GF.gameStarted();
}

function gameOver() {
  gs = 'GAMEOVER';
  if (typeof GF.saveRun === 'function') GF.saveRun();
  if (typeof GF.gameEnded === 'function') GF.gameEnded();
}

function gameWon() {
  var used = MAX_CRACKS - cracksLeft;
  if (used < best) {
    best = used;
    try { localStorage.setItem('lucky_egg_bias_best', best); } catch (e) {}
  }
  gs = 'WON';
  if (typeof GF.saveRun === 'function') GF.saveRun();
  if (typeof GF.gameEnded === 'function') GF.gameEnded();
}

// ── EGG MECHANICS ────────────────────────────────────────────────────────
function pickItemForCrack(crystalIdx) {
  // Build weighted pool of items
  // Each item has weight 1 by default. If a crystal is applied, items
  // belonging to biasMap[crystalIdx] get BIAS_MULTIPLIER weight.
  var biasedCls = (crystalIdx >= 0) ? biasMap[crystalIdx] : -1;
  var pool = [];
  for (var i = 0; i < ALL_ITEMS.length; i++) {
    var it = ALL_ITEMS[i];
    var w = 1;
    if (biasedCls >= 0 && CLASSES.indexOf(it.cls) === biasedCls) w = BIAS_MULTIPLIER;
    for (var k = 0; k < w; k++) pool.push(it);
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

function crackEgg(slotIdx) {
  if (gs !== 'PLAYING') return;
  if (slotIdx < 0 || slotIdx >= eggs.length) return;
  var egg = eggs[slotIdx];
  if (egg.cracked) return;
  if (cracksLeft <= 0) return;
  // If a crystal is selected, stage it now and consume a lure-move.
  var crystalUsed = -1;
  if (selectedCrystal >= 0 && luresLeft > 0) {
    crystalUsed = selectedCrystal;
    egg.staged = crystalUsed;
    luresLeft -= 1;
    // Crystal becomes available again immediately (it isn't physically
    // consumed — the LURE_MOVES counter is the only budget).
    selectedCrystal = -1;
  } else if (selectedCrystal >= 0 && luresLeft <= 0) {
    // No lures left — silently fall through to a bare crack and clear sel.
    selectedCrystal = -1;
  }
  cracksLeft -= 1;
  var item = pickItemForCrack(crystalUsed);
  crackAnim = { slotIdx: slotIdx, t: 0, item: item, crystal: crystalUsed };
  GF.spawnParticles(eggCenterX(slotIdx), eggCenterY(), '#f5e6c8', 18);
  if (crystalUsed >= 0) {
    GF.spawnParticles(eggCenterX(slotIdx), eggCenterY(), crystalCssColor(crystalUsed), 12);
  }
  GF.setShake(0.18);
  egg.cracked = true;
  egg.item = item;
  egg.appliedCrystal = crystalUsed;
  lastDrop = { crystal: crystalUsed, cls: item.cls, itemId: item.id };
  historyLog.push({ crystal: crystalUsed, cls: CLASSES.indexOf(item.cls), itemId: item.id });
  if (historyLog.length > 30) historyLog.shift();
  if (typeof GF.saveRun === 'function') GF.saveRun();
  // Refill tray when all eggs cracked, while budget remains
  setTimeout(function() {
    if (gs !== 'PLAYING') return;
    var allCracked = eggs.every(function(e) { return e.cracked; });
    if (allCracked && cracksLeft > 0) refillTray();
    // Lose check
    if (cracksLeft <= 0 && !solved) gameOver();
  }, CRACK_ANIM_MS + 60);
}

function eggCenterX(slotIdx) {
  // Used by particle spawn; recomputed each draw, but we approximate from
  // the most recent eggRects (set during draw). Falls back to canvas center.
  var r = eggRects[slotIdx];
  if (r) return r.x + r.w / 2;
  return GF.cx;
}
function eggCenterY() {
  var r = eggRects[0];
  if (r) return r.y + r.h / 2;
  return GF.cy * 0.6;
}

function crystalCssColor(idx) {
  return ['#ef5350', '#42a5f5', '#66bb6a'][idx] || '#fff';
}
function crystalShadow(idx) {
  return ['#ff8e8e', '#7bbef0', '#9ddf9d'][idx] || '#fff';
}

// ── GUESS ────────────────────────────────────────────────────────────────
function setGuessCell(crystalIdx, classIdx) {
  if (gs !== 'PLAYING') return;
  // If the player assigns the same class to two crystals, clear the other.
  for (var i = 0; i < CRYSTAL_COUNT; i++) {
    if (i !== crystalIdx && guessMap[i] === classIdx) guessMap[i] = -1;
  }
  guessMap[crystalIdx] = classIdx;
  if (typeof GF.saveRun === 'function') GF.saveRun();
}

function submitGuess() {
  if (gs !== 'PLAYING') return;
  for (var i = 0; i < CRYSTAL_COUNT; i++) {
    if (guessMap[i] === -1) return; // not fully assigned
  }
  guessAttemptsLeft -= 1;
  var correct = 0;
  for (var j = 0; j < CRYSTAL_COUNT; j++) {
    if (guessMap[j] === biasMap[j]) correct += 1;
  }
  if (correct === CRYSTAL_COUNT) {
    solved = true;
    feedbackText = GF.t('feedback_solved');
    feedbackColor = '#9be58e';
    gameWon();
    return;
  }
  feedbackText = GF.t('feedback_partial').replace('{n}', correct);
  feedbackColor = correct >= 2 ? '#ffd24d' : '#ef6f6f';
  GF.setShake(0.5);
  if (typeof GF.saveRun === 'function') GF.saveRun();
  if (guessAttemptsLeft <= 0 && !solved) {
    setTimeout(gameOver, 400);
  }
}

// ── SCREENSHOT / GATE HELPERS ────────────────────────────────────────────
// Drive into mid-PLAYING state with crystals placed, deduction grid
// populated, and item-history visible. Used for screenshots ≥70% gameplay.
window._setupForScreenshot = function() {
  startGame();
  // Pre-crack a few eggs with various crystals so the play area looks rich.
  // We deterministically populate eggs[0..4] without consuming animation
  // frames — fill state directly.
  // First refill tray so we have 6 eggs again
  refillTray();
  var preset = [
    { slot: 0, crystal: 0, itemId: 'coin',     cls: 'gold' },
    { slot: 1, crystal: -1, itemId: 'ruby',    cls: 'gem' },
    { slot: 2, crystal: 1, itemId: 'sapphire', cls: 'gem' },
    { slot: 3, crystal: 2, itemId: 'copper',   cls: 'scrap' },
    { slot: 4, crystal: 0, itemId: 'bar',      cls: 'gold' },
  ];
  for (var i = 0; i < preset.length; i++) {
    var p = preset[i];
    var e = eggs[p.slot];
    e.cracked = true;
    e.staged = p.crystal;
    e.appliedCrystal = p.crystal;
    e.item = { id: p.itemId, cls: p.cls };
    historyLog.push({ crystal: p.crystal, cls: CLASSES.indexOf(p.cls), itemId: p.itemId });
  }
  cracksLeft = MAX_CRACKS - preset.length;
  luresLeft  = LURE_MOVES - 3;
  guessAttemptsLeft = MAX_GUESSES - 1;
  // Pre-populate two deduction cells so the grid looks engaged
  guessMap[0] = 0; // red -> gold (visual guess)
  guessMap[1] = 1; // blue -> gem
  lastDrop = { crystal: 0, cls: 'gold', itemId: 'bar' };
  feedbackText = GF.t('feedback_partial').replace('{n}', 2);
  feedbackColor = '#ffd24d';
  selectedCrystal = 2; // green crystal selected, ready to place
  gs = 'PLAYING';
};

window._jumpLevel = function(n) {
  if (n == null || n === 1) {
    // For screenshots: land on the rich mid-play state.
    window._setupForScreenshot();
    return;
  }
  if (n >= 99) {
    startGame();
    cracksLeft = 0;
    gameOver();
    return;
  }
  window._setupForScreenshot();
};

// ── INPUT ────────────────────────────────────────────────────────────────
function hit(rect, x, y) {
  return rect && x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
}

function onPress(x, y) {
  // Tutorial overlay first
  if (tutOpen) { tutOpen = false; return; }
  // Help (?) button always wins
  if (hit(helpRect, x, y)) { tutOpen = true; return; }

  if (gs === 'MENU') {
    if (hit(playRect, x, y)) {
      try { localStorage.setItem('lucky_egg_bias_seen_tutorial', '1'); } catch (e) {}
      tutSeen = true;
      startGame();
      return;
    }
    // Tap-anywhere fallback
    if (Date.now() > (_menuArmedAt || 0)) {
      try { localStorage.setItem('lucky_egg_bias_seen_tutorial', '1'); } catch (e) {}
      tutSeen = true;
      startGame();
    }
    return;
  }

  if (gs === 'PLAYING') {
    // Eggs
    for (var i = 0; i < eggRects.length; i++) {
      if (hit(eggRects[i], x, y)) { crackEgg(eggRects[i].slotIdx); return; }
    }
    // Crystals
    for (var j = 0; j < crystalRects.length; j++) {
      if (hit(crystalRects[j], x, y)) {
        var idx = crystalRects[j].idx;
        selectedCrystal = (selectedCrystal === idx) ? -1 : idx;
        return;
      }
    }
    // Grid cells
    for (var k = 0; k < gridRects.length; k++) {
      if (hit(gridRects[k], x, y)) {
        setGuessCell(gridRects[k].crystal, gridRects[k].cls);
        return;
      }
    }
    // Submit
    if (hit(submitRect, x, y)) {
      var allAssigned = guessMap[0] !== -1 && guessMap[1] !== -1 && guessMap[2] !== -1;
      if (allAssigned && guessAttemptsLeft > 0) submitGuess();
      return;
    }
    return;
  }

  if (gs === 'GAMEOVER' || gs === 'WON') {
    if (hit(playRect, x, y)) { startGame(); return; }
    // Tap-anywhere retry after a short cooldown
    startGame();
    return;
  }
}

var _menuArmedAt = 0;
// Wire DOM input. We listen on document so taps anywhere on the page
// land. gf-lib's button[] system is used for overlays, but we maintain
// our own click-region table so eggs/crystals/grid cells work uniformly.
document.addEventListener('click', function(e) {
  onPress(e.clientX, e.clientY);
});
document.addEventListener('touchstart', function(e) {
  if (!e.changedTouches || !e.changedTouches.length) return;
  var t = e.changedTouches[0];
  onPress(t.clientX, t.clientY);
}, { passive: true });

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (crackAnim) {
    crackAnim.t += dt * 1000;
    if (crackAnim.t >= CRACK_ANIM_MS) crackAnim = null;
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx, cy = GF.cy;

  // Background — moody gradient
  var bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1a1432');
  bg.addColorStop(1, '#06060f');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  // Vignette
  var grd = ctx.createRadialGradient(cx, cy, Math.min(W, H) * 0.25, cx, cy, Math.max(W, H) * 0.7);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  if (gs === 'PLAYING' || gs === 'GAMEOVER' || gs === 'WON') {
    drawHUD(ctx);
    drawEggTray(ctx);
    drawCrystalRail(ctx);
    drawDeductionGrid(ctx);
    drawDropLog(ctx);
    drawSubmitButton(ctx);
    drawFeedback(ctx);
    drawHelpButton(ctx);
  }

  if (gs === 'MENU') {
    drawMenu(ctx);
  }
  if (gs === 'GAMEOVER') {
    var subg = GF.t('score_line')
      .replace('{c}', MAX_CRACKS - cracksLeft)
      .replace('{m}', MAX_CRACKS)
      .replace('{g}', guessAttemptsLeft);
    drawTerminalOverlay(ctx, GF.t('gameover'), subg, '#ef6f6f');
  }
  if (gs === 'WON') {
    var subw = GF.t('score_line')
      .replace('{c}', MAX_CRACKS - cracksLeft)
      .replace('{m}', MAX_CRACKS)
      .replace('{g}', guessAttemptsLeft);
    drawTerminalOverlay(ctx, GF.t('won'), subw, '#9be58e');
  }

  if (tutOpen && gs !== 'MENU') drawTutorialOverlay(ctx);
}

function drawMenu(ctx) {
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx, cy = GF.cy;
  // Decorative egg in the background
  drawDecorativeEgg(ctx, cx, cy - 220 * S, 80 * S);

  // Title
  var titleFs = GF.clamp(46 * S, 26, 64);
  ctx.shadowColor = 'rgba(255, 196, 80, 0.5)';
  ctx.shadowBlur = 40 * S;
  ctx.fillStyle = '#f7e8c2';
  ctx.font = 'bold ' + titleFs + 'px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t('title'), cx, cy - 110 * S);
  ctx.shadowBlur = 0;

  var subFs = GF.clamp(16 * S, 12, 22);
  ctx.fillStyle = '#aab1c1';
  ctx.font = 'italic ' + subFs + 'px Georgia, serif';
  ctx.fillText(GF.t('sub'), cx, cy - 78 * S);

  // Tutorial copy
  var tFs = GF.clamp(14 * S, 11, 18);
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  ctx.font = tFs + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#d4d7e0';
  var lineH = tFs + 8 * S;
  var startY = cy - 38 * S;
  var y = startY;
  ctx.textBaseline = 'top';
  for (var i = 0; i < lines.length; i++) {
    y = drawWrappedTextTop(ctx, lines[i], cx, y, W * 0.86, lineH) + 4 * S;
  }
  ctx.textBaseline = 'alphabetic';

  // PLAY button
  var isWide  = W / H > 1.15;
  var btnW = GF.clamp(280 * S, 200, 360);
  var btnH = GF.clamp(58 * S, 44, 70);
  if (isWide) { btnW = Math.round(btnW * 1.4); btnH = Math.round(btnH * 1.35); }
  var btnX = cx - btnW / 2;
  var textBlockBottom = y; // y is the bottom of the last tutorial line after the wrapping loop
  var clearMargin = btnH / 2 + 16;
  var wideFloor = H * 0.58;
  var btnY = isWide
    ? Math.max(textBlockBottom + clearMargin, wideFloor)
    : Math.min(Math.max(y + 14 * S, cy + 126 * S), H - btnH - 26 * S);
  // hit rect at stable base position
  playRect = { x: btnX, y: btnY, w: btnW, h: btnH };

  var drawBtnX = btnX, drawBtnY = btnY, drawBtnW = btnW, drawBtnH = btnH;
  if (isWide) {
    var t_pulse = performance.now() / 1000;
    var pulse = 1 + 0.05 * Math.sin(t_pulse * 2.2);
    var pw = btnW * pulse, ph = btnH * pulse;
    drawBtnX = cx - pw / 2; drawBtnY = btnY + (btnH - ph) / 2;
    drawBtnW = pw; drawBtnH = ph;
    ctx.shadowColor = 'rgba(212,163,92,0.65)';
    ctx.shadowBlur = 20 + 12 * Math.abs(Math.sin(t_pulse * 2.2));
  }
  var g = ctx.createLinearGradient(drawBtnX, drawBtnY, drawBtnX, drawBtnY + drawBtnH);
  g.addColorStop(0, '#d4a35c');
  g.addColorStop(1, '#9a7530');
  GF.rr(ctx, drawBtnX, drawBtnY, drawBtnW, drawBtnH, drawBtnH / 2);
  ctx.fillStyle = g; ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2 * S; ctx.stroke();
  ctx.font = 'bold ' + GF.clamp(isWide ? 20 : 18, 14, 24) * S + 'px Inter, sans-serif';
  ctx.fillStyle = '#fff7e0';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), cx, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  _menuArmedAt = _menuArmedAt || (Date.now() + 250);

  if (best < 99) {
    ctx.font = GF.clamp(13 * S, 10, 16) + 'px Inter, sans-serif';
    ctx.fillStyle = '#7c7f8e';
    ctx.fillText(GF.t('best_line').replace('{b}', best), cx, btnY + btnH + 28 * S);
  }
}

function drawTerminalOverlay(ctx, title, sub, color) {
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx, cy = GF.cy;
  ctx.fillStyle = 'rgba(8,8,18,0.86)';
  ctx.fillRect(0, 0, W, H);
  var titleFs = GF.clamp(40 * S, 22, 56);
  ctx.shadowColor = color + '88'; ctx.shadowBlur = 30 * S;
  ctx.font = 'bold ' + titleFs + 'px Georgia, serif';
  ctx.fillStyle = color;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(title, cx, cy - 40 * S);
  ctx.shadowBlur = 0;

  var subFs = GF.clamp(16 * S, 12, 22);
  ctx.font = subFs + 'px Inter, sans-serif';
  ctx.fillStyle = '#cfd2dc';
  ctx.fillText(sub, cx, cy - 4 * S);

  // Reveal correct mapping on game-over so the player learns
  if (gs === 'GAMEOVER' || gs === 'WON') {
    var rFs = GF.clamp(15 * S, 11, 20);
    ctx.font = rFs + 'px Inter, sans-serif';
    ctx.fillStyle = '#c79e5a';
    for (var ci = 0; ci < CRYSTAL_COUNT; ci++) {
      var crKey = 'cr_' + CRYSTALS[ci];
      var clsKey = 'cls_' + CLASSES[biasMap[ci]];
      var line = GF.t(crKey) + ' → ' + GF.t(clsKey);
      ctx.fillText(line, cx, cy + 28 * S + ci * (rFs + 6 * S));
    }
  }

  var btnW = GF.clamp(260 * S, 180, 320);
  var btnH = GF.clamp(54 * S, 40, 64);
  var btnX = cx - btnW / 2;
  var btnY = cy + 130 * S;
  var g = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  g.addColorStop(0, '#d4a35c');
  g.addColorStop(1, '#9a7530');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = g; ctx.fill();
  ctx.font = 'bold ' + GF.clamp(17 * S, 13, 22) + 'px Inter, sans-serif';
  ctx.fillStyle = '#fff7e0';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('retry'), cx, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  playRect = { x: btnX, y: btnY, w: btnW, h: btnH };

  if (best < 99) {
    ctx.font = GF.clamp(13 * S, 10, 16) + 'px Inter, sans-serif';
    ctx.fillStyle = '#7c7f8e';
    ctx.fillText(GF.t('best_line').replace('{b}', best), cx, btnY + btnH + 28 * S);
  }
}

// ── HUD ──────────────────────────────────────────────────────────────────
function drawHUD(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  var pad = 14 * S;
  var fs = GF.clamp(15 * S, 11, 19);
  ctx.font = 'bold ' + fs + 'px Inter, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#cfd2dc';
  ctx.fillText(GF.t('cracks_label') + ' ' + cracksLeft + '/' + MAX_CRACKS, pad, pad);
  ctx.fillStyle = '#9bd3ff';
  ctx.fillText(GF.t('lures_label') + ' ' + luresLeft + '/' + LURE_MOVES, pad, pad + fs + 6 * S);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffb86b';
  ctx.fillText(GF.t('guesses_label') + ' ' + guessAttemptsLeft + '/' + MAX_GUESSES, W - pad, pad);
}

function drawHelpButton(ctx) {
  var S = GF.S;
  var size = GF.clamp(32 * S, 26, 42);
  var x = GF.W - size - 12 * S;
  var y = GF.H - size - 12 * S;
  ctx.fillStyle = 'rgba(40, 40, 60, 0.65)';
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.lineWidth = 1.5 * S;
  GF.rr(ctx, x, y, size, size, size * 0.25);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#cfd2dc';
  ctx.font = 'bold ' + (size * 0.55) + 'px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', x + size / 2, y + size / 2 + 1 * S);
  ctx.textBaseline = 'alphabetic';
  helpRect = { x: x, y: y, w: size, h: size };
}

// ── EGG TRAY ─────────────────────────────────────────────────────────────
function drawEggTray(ctx) {
  eggRects = [];
  var W = GF.W, H = GF.H, S = GF.S;
  var portrait = W < H * 0.95;
  // Tray bounds
  var trayY = GF.clamp(60 * S, 50, 90);
  var trayH = GF.clamp(150 * S, 110, 200);
  var trayPad = W * 0.05;
  var trayW = W - trayPad * 2;

  // Tray background
  ctx.fillStyle = 'rgba(28, 22, 50, 0.6)';
  ctx.strokeStyle = 'rgba(199, 158, 90, 0.4)';
  ctx.lineWidth = 1.5 * S;
  GF.rr(ctx, trayPad, trayY, trayW, trayH, 12 * S);
  ctx.fill(); ctx.stroke();

  // Label
  var lblFs = GF.clamp(11 * S, 9, 14);
  ctx.font = lblFs + 'px Inter, sans-serif';
  ctx.fillStyle = '#7c7f8e';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(GF.t('hud_legend'), trayPad + 10 * S, trayY + 6 * S);

  // Egg slots
  var slotGap = 8 * S;
  var slotW = (trayW - slotGap * (EGG_SLOTS + 1)) / EGG_SLOTS;
  var slotH = trayH - 36 * S;
  var startX = trayPad + slotGap;
  var startY = trayY + 28 * S;

  for (var i = 0; i < EGG_SLOTS; i++) {
    var x = startX + i * (slotW + slotGap);
    var egg = eggs[i];
    var animHere = crackAnim && crackAnim.slotIdx === i ? crackAnim.t / CRACK_ANIM_MS : 0;
    drawEggSlot(ctx, x, startY, slotW, slotH, egg, animHere);
    eggRects.push({ x: x, y: startY, w: slotW, h: slotH, slotIdx: i });
  }
}

function drawEggSlot(ctx, x, y, w, h, egg, anim) {
  var S = GF.S;
  // Slot frame
  ctx.fillStyle = 'rgba(18, 14, 30, 0.55)';
  ctx.strokeStyle = 'rgba(80, 65, 100, 0.6)';
  ctx.lineWidth = 1 * S;
  GF.rr(ctx, x, y, w, h, 10 * S);
  ctx.fill(); ctx.stroke();

  var cxL = x + w / 2;
  var cyL = y + h / 2;
  var eggR = Math.min(w, h) * 0.32;

  if (!egg.cracked) {
    // Whole egg with optional staged-crystal glow
    if (egg.staged >= 0 || (selectedCrystal >= 0 && _highlightSlot === egg.id)) {
      // (we don't track hover; staged is set on crack only)
    }
    if (selectedCrystal >= 0) {
      // Show a faint pre-stage glow on every egg when a crystal is selected
      ctx.save();
      ctx.shadowColor = crystalShadow(selectedCrystal);
      ctx.shadowBlur = 16 * S;
      ctx.globalAlpha = 0.7;
      drawWholeEgg(ctx, cxL, cyL, eggR);
      ctx.restore();
    } else {
      drawWholeEgg(ctx, cxL, cyL, eggR);
    }
  } else {
    // Crack anim or final state — show item
    if (anim > 0 && anim < 1) {
      // Shell falling apart: draw two half-shells offset by anim
      var off = anim * eggR * 0.9;
      drawHalfEggLeft(ctx, cxL - off, cyL, eggR, anim);
      drawHalfEggRight(ctx, cxL + off, cyL, eggR, anim);
      // Item rises
      var iy = cyL - anim * eggR * 0.6;
      drawItemIcon(ctx, cxL, iy, eggR * 0.85, egg.item);
    } else {
      // Final: item with shell fragments at base
      drawShellShards(ctx, cxL, cyL + eggR * 0.5, eggR);
      drawItemIcon(ctx, cxL, cyL - 2 * S, eggR * 0.9, egg.item);
    }
    // Crystal applied indicator (top-right of slot)
    if (egg.appliedCrystal >= 0) {
      drawCrystalIcon(ctx, x + w - 12 * S, y + 12 * S, 8 * S, egg.appliedCrystal);
    }
  }
}

function drawWholeEgg(ctx, cx, cy, r) {
  var S = GF.S;
  // Body — oval with shading
  ctx.save();
  ctx.translate(cx, cy);
  var grad = ctx.createRadialGradient(-r * 0.3, -r * 0.4, r * 0.1, 0, 0, r * 1.4);
  grad.addColorStop(0, '#fff7e0');
  grad.addColorStop(0.6, '#e9d6a8');
  grad.addColorStop(1, '#8e7440');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, 0, r * 0.78, r, 0, 0, Math.PI * 2);
  ctx.fill();
  // Speckles
  ctx.fillStyle = 'rgba(80, 60, 30, 0.35)';
  for (var s = 0; s < 6; s++) {
    var a = (s / 6) * Math.PI * 2;
    var rr = r * (0.4 + ((s * 13) % 7) / 16);
    var ax = Math.cos(a) * r * 0.45;
    var ay = Math.sin(a) * r * 0.55;
    ctx.beginPath();
    ctx.arc(ax, ay, r * 0.05 + (s % 3) * 0.02, 0, Math.PI * 2);
    ctx.fill();
  }
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.ellipse(-r * 0.25, -r * 0.5, r * 0.18, r * 0.32, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawHalfEggLeft(ctx, cx, cy, r, anim) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-anim * 0.5);
  ctx.fillStyle = '#e9d6a8';
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.bezierCurveTo(-r, -r, -r * 0.78, r, 0, r);
  ctx.lineTo(0, -r);
  ctx.fill();
  ctx.restore();
}
function drawHalfEggRight(ctx, cx, cy, r, anim) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(anim * 0.5);
  ctx.fillStyle = '#d4be8f';
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.bezierCurveTo(r, -r, r * 0.78, r, 0, r);
  ctx.lineTo(0, -r);
  ctx.fill();
  ctx.restore();
}

function drawShellShards(ctx, cx, cy, r) {
  ctx.fillStyle = '#a48b54';
  ctx.beginPath();
  ctx.moveTo(cx - r * 0.6, cy);
  ctx.lineTo(cx - r * 0.2, cy + r * 0.2);
  ctx.lineTo(cx + r * 0.1, cy + r * 0.05);
  ctx.lineTo(cx + r * 0.5, cy + r * 0.18);
  ctx.lineTo(cx + r * 0.4, cy + r * 0.28);
  ctx.lineTo(cx - r * 0.55, cy + r * 0.22);
  ctx.closePath();
  ctx.fill();
}

function drawItemIcon(ctx, cx, cy, size, item) {
  if (!item) return;
  var S = GF.S;
  var cls = item.cls;
  ctx.save();
  ctx.translate(cx, cy);
  // Glow per class
  ctx.shadowColor = classGlow(cls);
  ctx.shadowBlur = 14 * S;
  if (item.id === 'coin') drawCoin(ctx, size * 0.45);
  else if (item.id === 'bar') drawBar(ctx, size * 0.55);
  else if (item.id === 'ring') drawRing(ctx, size * 0.42);
  else if (item.id === 'ruby') drawGem(ctx, size * 0.45, '#ff6b8a');
  else if (item.id === 'sapphire') drawGem(ctx, size * 0.45, '#5da6ff');
  else if (item.id === 'emerald') drawGem(ctx, size * 0.45, '#5ee08a');
  else if (item.id === 'iron') drawScrap(ctx, size * 0.5, '#9aa3b2');
  else if (item.id === 'copper') drawScrap(ctx, size * 0.5, '#d68856');
  else if (item.id === 'bone') drawScrap(ctx, size * 0.5, '#f0e8d2');
  ctx.restore();
}
function classGlow(cls) {
  if (cls === 'gold') return '#ffd24d';
  if (cls === 'gem')  return '#7bbef0';
  return '#8a8a8a';
}
function drawCoin(ctx, r) {
  var g = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
  g.addColorStop(0, '#fff2a0'); g.addColorStop(1, '#c98a1f');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#7a5a14'; ctx.lineWidth = 1.5; ctx.stroke();
}
function drawBar(ctx, w) {
  var h = w * 0.55;
  var g = ctx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
  g.addColorStop(0, '#ffea8d'); g.addColorStop(1, '#b27510');
  ctx.fillStyle = g;
  ctx.fillRect(-w / 2, -h / 2, w, h);
  ctx.strokeStyle = '#5a3e08'; ctx.lineWidth = 1.5;
  ctx.strokeRect(-w / 2, -h / 2, w, h);
}
function drawRing(ctx, r) {
  ctx.strokeStyle = '#f7d35a'; ctx.lineWidth = r * 0.32;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
}
function drawGem(ctx, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.lineTo(r * 0.8, -r * 0.2);
  ctx.lineTo(r * 0.5, r);
  ctx.lineTo(-r * 0.5, r);
  ctx.lineTo(-r * 0.8, -r * 0.2);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.moveTo(-r * 0.4, -r * 0.6);
  ctx.lineTo(r * 0.2, -r * 0.3);
  ctx.lineTo(0, r * 0.2);
  ctx.closePath();
  ctx.fill();
}
function drawScrap(ctx, w, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-w * 0.5, -w * 0.2);
  ctx.lineTo(-w * 0.2, -w * 0.45);
  ctx.lineTo(w * 0.35, -w * 0.25);
  ctx.lineTo(w * 0.5, w * 0.1);
  ctx.lineTo(w * 0.15, w * 0.4);
  ctx.lineTo(-w * 0.3, w * 0.3);
  ctx.lineTo(-w * 0.5, -w * 0.2);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawCrystalIcon(ctx, cx, cy, r, idx) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = crystalCssColor(idx);
  ctx.shadowColor = crystalShadow(idx);
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.lineTo(r * 0.7, 0);
  ctx.lineTo(0, r);
  ctx.lineTo(-r * 0.7, 0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}
function drawDecorativeEgg(ctx, cx, cy, r) {
  ctx.save();
  ctx.shadowColor = 'rgba(255, 196, 80, 0.5)';
  ctx.shadowBlur = 30;
  drawWholeEgg(ctx, cx, cy, r);
  ctx.restore();
}

// ── CRYSTAL RAIL ─────────────────────────────────────────────────────────
function drawCrystalRail(ctx) {
  crystalRects = [];
  var W = GF.W, H = GF.H, S = GF.S;
  var portrait = W < H * 0.95;
  // Place crystals as a horizontal row under the tray
  var railY = GF.clamp(220 * S, 170, 280);
  var railH = GF.clamp(80 * S, 60, 110);
  var pad = W * 0.05;
  var railW = W - pad * 2;

  // Label
  var lblFs = GF.clamp(11 * S, 9, 14);
  ctx.font = 'bold ' + lblFs + 'px Inter, sans-serif';
  ctx.fillStyle = '#aab1c1';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(GF.t('crystals_label'), pad, railY - lblFs - 4 * S);

  var gap = 14 * S;
  var btnW = (railW - gap * (CRYSTAL_COUNT - 1)) / CRYSTAL_COUNT;
  var btnH = railH;
  for (var i = 0; i < CRYSTAL_COUNT; i++) {
    var x = pad + i * (btnW + gap);
    var selected = (selectedCrystal === i);
    var available = (luresLeft > 0);
    var alpha = available ? 1 : 0.4;
    ctx.save();
    ctx.globalAlpha = alpha;
    // Background
    var g = ctx.createLinearGradient(x, railY, x, railY + btnH);
    g.addColorStop(0, selected ? '#3c3060' : '#241c40');
    g.addColorStop(1, selected ? '#221848' : '#100c20');
    ctx.fillStyle = g;
    ctx.strokeStyle = selected ? crystalShadow(i) : 'rgba(120, 100, 160, 0.45)';
    ctx.lineWidth = selected ? 3 * S : 1.5 * S;
    GF.rr(ctx, x, railY, btnW, btnH, 12 * S);
    ctx.fill(); ctx.stroke();
    // Crystal icon
    drawCrystalIcon(ctx, x + btnW * 0.3, railY + btnH / 2, GF.clamp(18 * S, 14, 26), i);
    // Label
    var lFs = GF.clamp(15 * S, 11, 19);
    ctx.font = 'bold ' + lFs + 'px Inter, sans-serif';
    ctx.fillStyle = '#f5e6c8';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('cr_' + CRYSTALS[i]), x + btnW * 0.5, railY + btnH / 2);
    ctx.restore();
    crystalRects.push({ x: x, y: railY, w: btnW, h: btnH, idx: i });
  }
}

// ── DEDUCTION GRID ───────────────────────────────────────────────────────
function drawDeductionGrid(ctx) {
  gridRects = [];
  var W = GF.W, H = GF.H, S = GF.S;
  var gridY = GF.clamp(330 * S, 260, 410);
  var gridW = Math.min(W * 0.92, 520 * S);
  var pad = (W - gridW) / 2;
  var rowH = GF.clamp(46 * S, 36, 60);
  var headerH = GF.clamp(28 * S, 22, 36);
  var totalH = headerH + rowH * CRYSTAL_COUNT;

  // Background panel
  ctx.fillStyle = 'rgba(20, 16, 36, 0.7)';
  ctx.strokeStyle = 'rgba(199, 158, 90, 0.4)';
  ctx.lineWidth = 1.5 * S;
  GF.rr(ctx, pad, gridY, gridW, totalH, 10 * S);
  ctx.fill(); ctx.stroke();

  // Heading text
  var lblFs = GF.clamp(11 * S, 9, 14);
  ctx.font = 'bold ' + lblFs + 'px Inter, sans-serif';
  ctx.fillStyle = '#aab1c1';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(GF.t('deduce_label'), pad + 10 * S, gridY - lblFs - 4 * S);

  // Column headers (classes)
  var labelColW = gridW * 0.28;
  var cellW = (gridW - labelColW) / ITEM_CLASSES;
  var headerFs = GF.clamp(13 * S, 10, 17);
  ctx.font = 'bold ' + headerFs + 'px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (var c = 0; c < ITEM_CLASSES; c++) {
    var hx = pad + labelColW + c * cellW;
    ctx.fillStyle = '#cfd2dc';
    ctx.fillText(GF.t('cls_' + CLASSES[c]), hx + cellW / 2, gridY + headerH / 2);
  }

  // Rows (crystals)
  for (var r = 0; r < CRYSTAL_COUNT; r++) {
    var rowY = gridY + headerH + r * rowH;
    // Label cell (crystal)
    var midY = rowY + rowH / 2;
    drawCrystalIcon(ctx, pad + 18 * S, midY, GF.clamp(11 * S, 9, 16), r);
    ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px Inter, sans-serif';
    ctx.fillStyle = crystalCssColor(r);
    ctx.textAlign = 'left';
    ctx.fillText(GF.t('cr_' + CRYSTALS[r]), pad + 36 * S, midY);
    // Class cells
    for (var cc = 0; cc < ITEM_CLASSES; cc++) {
      var cellX = pad + labelColW + cc * cellW;
      var picked = (guessMap[r] === cc);
      ctx.fillStyle = picked ? 'rgba(199, 158, 90, 0.32)' : 'rgba(40, 30, 60, 0.4)';
      ctx.strokeStyle = picked ? '#c79e5a' : 'rgba(120, 100, 160, 0.35)';
      ctx.lineWidth = picked ? 2 * S : 1 * S;
      GF.rr(ctx, cellX + 4 * S, rowY + 4 * S, cellW - 8 * S, rowH - 8 * S, 6 * S);
      ctx.fill(); ctx.stroke();
      if (picked) {
        ctx.fillStyle = '#fff7e0';
        ctx.font = 'bold ' + GF.clamp(18 * S, 14, 24) + 'px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('✓', cellX + cellW / 2, midY);
      }
      gridRects.push({ x: cellX + 4 * S, y: rowY + 4 * S, w: cellW - 8 * S, h: rowH - 8 * S, crystal: r, cls: cc });
    }
  }
}

// ── DROP LOG (bottom strip of last few cracks) ───────────────────────────
function drawDropLog(ctx) {
  var W = GF.W, S = GF.S;
  // Show last 6 drops as a horizontal strip just under the grid.
  var stripY = GF.clamp(530 * S, 410, 620);
  var lblFs = GF.clamp(11 * S, 9, 14);
  ctx.font = 'bold ' + lblFs + 'px Inter, sans-serif';
  ctx.fillStyle = '#aab1c1';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(GF.t('last_drop'), W * 0.05, stripY - lblFs - 4 * S);

  var n = Math.min(6, historyLog.length);
  var slotW = GF.clamp(48 * S, 36, 60);
  var slotH = GF.clamp(48 * S, 36, 60);
  var gap = 8 * S;
  var startX = W * 0.05;
  for (var i = 0; i < n; i++) {
    var h = historyLog[historyLog.length - n + i];
    var x = startX + i * (slotW + gap);
    ctx.fillStyle = 'rgba(20, 16, 36, 0.7)';
    ctx.strokeStyle = h.crystal >= 0 ? crystalShadow(h.crystal) : 'rgba(120, 100, 160, 0.4)';
    ctx.lineWidth = h.crystal >= 0 ? 2 * S : 1 * S;
    GF.rr(ctx, x, stripY, slotW, slotH, 8 * S);
    ctx.fill(); ctx.stroke();
    // Item dot
    var item = { id: h.itemId, cls: CLASSES[h.cls] };
    drawItemIcon(ctx, x + slotW / 2, stripY + slotH / 2, slotH * 0.7, item);
    // Crystal dot top-left
    if (h.crystal >= 0) {
      drawCrystalIcon(ctx, x + 8 * S, stripY + 8 * S, 5 * S, h.crystal);
    }
  }
}

// ── SUBMIT BUTTON ────────────────────────────────────────────────────────
function drawSubmitButton(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  var allAssigned = guessMap[0] !== -1 && guessMap[1] !== -1 && guessMap[2] !== -1;
  var enabled = allAssigned && guessAttemptsLeft > 0 && gs === 'PLAYING';
  var btnW = GF.clamp(220 * S, 160, 280);
  var btnH = GF.clamp(48 * S, 36, 58);
  var btnX = W - btnW - W * 0.05;
  var btnY = GF.clamp(530 * S, 410, 620) + GF.clamp(48 * S, 36, 60) - btnH;
  var g = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  if (enabled) { g.addColorStop(0, '#d4a35c'); g.addColorStop(1, '#9a7530'); }
  else { g.addColorStop(0, '#3a3550'); g.addColorStop(1, '#1e1a30'); }
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = enabled ? 'rgba(255,255,255,0.25)' : 'rgba(100,90,120,0.4)';
  ctx.lineWidth = 2 * S; ctx.stroke();
  ctx.font = 'bold ' + GF.clamp(16 * S, 12, 20) + 'px Inter, sans-serif';
  ctx.fillStyle = enabled ? '#fff7e0' : '#7c7f8e';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('submit_label'), btnX + btnW / 2, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  submitRect = { x: btnX, y: btnY, w: btnW, h: btnH };
}

function drawFeedback(ctx) {
  if (!feedbackText) return;
  var W = GF.W, H = GF.H, S = GF.S;
  var fs = GF.clamp(16 * S, 12, 22);
  ctx.font = 'bold ' + fs + 'px Inter, sans-serif';
  ctx.fillStyle = feedbackColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(feedbackText, GF.cx, H - 60 * S);
}

// ── TUTORIAL OVERLAY ─────────────────────────────────────────────────────
function drawTutorialOverlay(ctx) {
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx, cy = GF.cy;
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, 0, W, H);
  var fs = GF.clamp(15 * S, 11, 19);
  ctx.font = fs + 'px Inter, sans-serif';
  ctx.fillStyle = '#f5e6c8';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  var lineH = fs + 8 * S;
  var totalH = measureWrappedBlock(ctx, lines, W * 0.86, lineH, 6 * S);
  var startY = Math.max(24 * S, cy - totalH / 2);
  var y = startY;
  for (var i = 0; i < lines.length; i++) {
    y = drawWrappedTextTop(ctx, lines[i], cx, y, W * 0.86, lineH) + 6 * S;
  }
  ctx.font = GF.clamp(13 * S, 10, 16) + 'px Inter, sans-serif';
  ctx.fillStyle = '#aab1c1';
  ctx.fillText('— ' + GF.t('close') + ' —', cx, y + 6 * S);
  ctx.textBaseline = 'alphabetic';
}

function measureWrappedBlock(ctx, items, maxW, lineH, gap) {
  var total = 0;
  for (var i = 0; i < items.length; i++) {
    total += wrapLines(ctx, items[i], maxW).length * lineH;
    if (i < items.length - 1) total += gap;
  }
  return total;
}

function drawWrappedTextTop(ctx, text, cx, y, maxW, lineH) {
  var lines = wrapLines(ctx, text, maxW);
  for (var j = 0; j < lines.length; j++) ctx.fillText(lines[j], cx, y + j * lineH);
  return y + lines.length * lineH;
}

function wrapTextCentered(ctx, text, cx, cy, maxW, lineH) {
  if (!text) return;
  var lines = wrapLines(ctx, text, maxW);
  var startY = cy - ((lines.length - 1) * lineH) / 2;
  for (var j = 0; j < lines.length; j++) ctx.fillText(lines[j], cx, startY + j * lineH);
}

function wrapLines(ctx, text, maxW) {
  if (!text) return [];
  var words = String(text).split(/\s+/);
  var lines = [];
  var line = '';
  for (var i = 0; i < words.length; i++) {
    var probe = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && line) {
      lines.push(line); line = words[i];
    } else { line = probe; }
  }
  if (line) lines.push(line);
  return lines;
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: [],
  saveKey: 'lucky_egg_bias',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('lucky_egg_bias_best') || '99') || 99; } catch (e) {}
    try { tutSeen = !!localStorage.getItem('lucky_egg_bias_seen_tutorial'); } catch (e) {}
    GF.persist('lucky_egg_bias_run_v1',
      function() {
        return {
          gs: gs,
          cracksLeft: cracksLeft,
          luresLeft: luresLeft,
          guessAttemptsLeft: guessAttemptsLeft,
          biasMap: biasMap,
          guessMap: guessMap,
          eggs: eggs,
          solved: solved,
          historyLog: historyLog.slice(-12),
          caseSeed: caseSeed,
        };
      },
      function(s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        cracksLeft = (typeof s.cracksLeft === 'number') ? s.cracksLeft : MAX_CRACKS;
        luresLeft  = (typeof s.luresLeft === 'number') ? s.luresLeft : LURE_MOVES;
        guessAttemptsLeft = (typeof s.guessAttemptsLeft === 'number') ? s.guessAttemptsLeft : MAX_GUESSES;
        if (Array.isArray(s.biasMap) && s.biasMap.length === 3) biasMap = s.biasMap;
        if (Array.isArray(s.guessMap) && s.guessMap.length === 3) guessMap = s.guessMap;
        if (Array.isArray(s.eggs)) eggs = s.eggs;
        if (typeof s.solved === 'boolean') solved = s.solved;
        if (Array.isArray(s.historyLog)) historyLog = s.historyLog;
        caseSeed = s.caseSeed || 0;
        // Sanity: never resume PLAYING into a terminal state
        if (gs === 'PLAYING' && cracksLeft <= 0 && !solved) gs = 'GAMEOVER';
        if (gs === 'PLAYING' && guessAttemptsLeft <= 0 && !solved) gs = 'GAMEOVER';
      }
    );
  },
  onUpdate: update,
  onDraw: draw,
});

// Expose state for the runtime gate
GF.exposeState(function() {
  return {
    gs: gs,
    cracksLeft: cracksLeft,
    luresLeft: luresLeft,
    guessAttemptsLeft: guessAttemptsLeft,
    selectedCrystal: selectedCrystal,
    solved: solved,
    guessAssigned: guessMap.filter(function(v) { return v !== -1; }).length,
    historyLen: historyLog.length,
  };
});

// guard placeholder
var _highlightSlot = -1;

})();
</script>
