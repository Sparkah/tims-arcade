})();

// ── XP / LEVEL MATH ──────────────────────────────────────────────────────
var _cum = [0, 0];   // cumulative xp to REACH level index (cum[2] = xp for lvl 2)
function needXp(l) { return Math.round(BAL.LEVEL_XP_BASE * Math.pow(BAL.LEVEL_XP_GROWTH, l - 1)); }
function cumXp(l) {
  while (_cum.length <= l) _cum.push(_cum[_cum.length - 1] + needXp(_cum.length - 1));
  return _cum[l];
}
function lvlOf(skill) {
  var xp = st.xp[skill], l = 1;
  while (l < BAL.LEVEL_CAP && xp >= cumXp(l + 1)) l++;
  return l;
}
function totalLevel() { var s = 0, k; for (k in st.xp) s += lvlOf(k); return s; }
function lvlFrac(skill) {
  var l = lvlOf(skill);
  if (l >= BAL.LEVEL_CAP) return 1;
  return (st.xp[skill] - cumXp(l)) / (cumXp(l + 1) - cumXp(l));
}
function addXp(skill, amount, fx, fy) {
  var before = lvlOf(skill);
  st.xp[skill] += amount;
  score += amount;
  var after = lvlOf(skill);
  if (fx != null) GF.spawnFloat(fx, fy, '+' + amount + ' XP', '#ffd84d');
  if (after > before) {
    GF.sfx('levelup'); GF.setShake(0.5);
    toast(GF.t('sk_' + skill) + ' ' + GF.t('lvl') + ' ' + after + '!');
    if (BAL.skills[skill]) BAL.skills[skill].tiers.forEach(function(tr) {
      if (tr.lvl > before && tr.lvl <= after) { GF.sfx('unlock'); toast(GF.t('res_' + tr.id) + ' ' + GF.t('unlocked_t')); }
    });
    saveRun();
  }
}

// ── ECONOMY HELPERS ──────────────────────────────────────────────────────
function fmt(n) {
  n = Math.floor(n);
  var s = String(n), out = '';
  while (s.length > 3) { out = ' ' + s.slice(-3) + out; s = s.slice(0, -3); }
  return s + out;
}
function roman(n) { return ['I','II','III','IV','V'][n - 1] || String(n); }
function gatherMult() { return 1 + BAL.upgrades.whetstone.speedPer * st.upg.whetstone; }
function actionTime(skill, tierIdx) {
  return BAL.skills[skill].tiers[tierIdx].t * Math.pow(BAL.TOOL_SPEED, st.tools[TOOL_FOR[skill]]) / gatherMult();
}
function bestTierIdx(skill) {
  var L = lvlOf(skill), b = 0;
  BAL.skills[skill].tiers.forEach(function(tr, i) { if (tr.lvl <= L) b = i; });
  return b;
}
function skillOfRes(resId) {
  for (var i = 0; i < SOURCE.length; i++)
    if (BAL.skills[SOURCE[i]].tiers.some(function(tr) { return tr.id === resId; })) return SOURCE[i];
  return null;
}
function resOf(resId) {
  var s = skillOfRes(resId);
  return BAL.skills[s].tiers.filter(function(tr) { return tr.id === resId; })[0];
}
function toolCost(kind, tierIdx) {
  var t = BAL.toolTiers[tierIdx];
  return {
    wood: BAL.skills.woodcut.tiers[tierIdx].id, woodN: t.wood,
    ore: BAL.skills.mine.tiers[tierIdx].id, oreN: t.ore,
    coins: t.coins + (kind === 'spear' ? BAL.spearExtraCoins[tierIdx] : 0),
    smithLvl: t.smithLvl, xp: t.xp,
  };
}
function canCraft(kind) {
  var next = st.tools[kind];
  if (next >= BAL.toolTiers.length) return null;
  var c = toolCost(kind, next);
  c.ok = lvlOf('smith') >= c.smithLvl && (st.inv[c.wood] || 0) >= c.woodN &&
         (st.inv[c.ore] || 0) >= c.oreN && st.coins >= c.coins;
  return c;
}
function craftTool(kind) {
  var c = canCraft(kind);
  if (!c || !c.ok) { GF.sfx('error'); return false; }
  st.inv[c.wood] -= c.woodN; st.inv[c.ore] -= c.oreN; st.coins -= c.coins;
  st.tools[kind]++;
  GF.sfx('evolve'); GF.setShake(0.6);
  GF.spawnParticles(GF.cx, GF.H * 0.3, '#ffb347', 22);
  toast(GF.t('tool_' + kind) + ' ' + roman(st.tools[kind]) + '!');
  addXp('smith', c.xp);
  if (GF.tutorial.active && GF.tutorial.step === 5 && kind === 'axe') GF.tutorial.next();
  saveRun();
  return true;
}
function mealCount() { var n = 0, k; for (k in st.meals) n += st.meals[k]; return n; }
function canCook(mealIdx) {
  var m = BAL.meals[mealIdx];

}
function cookMeal(mealIdx) {

  GF.sfx('pickup'); GF.spawnParticles(GF.cx, GF.H * 0.3, '#ff9d5c', 10);
  addXp('cook', m.xp);
  saveRun();
  return true;
}
function sellRes(resId, n) {

  var v = resOf(resId).sell * n;
  st.inv[resId] -= n; st.coins += v; st.lifetimeCoins += v;
  GF.sfx('coin'); GF.spawnFloat(GF.cx, GF.H * 0.4, '+' + fmt(v), '#ffd84d');
  saveRun();
}
function sellLoot(lootId, n) {

  n = Math.min(n, have);
  if (n <= 0) return;
  var z = BAL.zones.filter(function(zz) { return zz.lootId === lootId; })[0];
  var v = z.lootSell * n;
  st.loot[lootId] -= n; st.coins += v; st.lifetimeCoins += v;

}
function buyUpgrade(key) {

// ── CAMP BOARD WORK ORDERS ───────────────────────────────────────────────
function ensureBoard() {

function orderDone(o) { ensureBoard(); return !!st.board.done[o.id]; }
function orderHave(o) {

  return 0;
}
function orderNeed(o) { return o.type === 'zone' ? 1 : o.n; }
function orderReady(o) { return !orderDone(o) && orderHave(o) >= orderNeed(o); }
function boardDoneCount() {

// ── DAILY CAMP HABIT LOOP ────────────────────────────────────────────────
function dayKey(ts) {
  var d = new Date(ts == null ? Date.now() : ts);
  var m = String(d.getMonth() + 1); if (m.length < 2) m = '0' + m;
  var day = String(d.getDate()); if (day.length < 2) day = '0' + day;
  return d.getFullYear() + '-' + m + '-' + day;
}
function dayNum(key) {
  var p = String(key || '').split('-');
  return Date.UTC(parseInt(p[0] || '1970', 10), parseInt(p[1] || '1', 10) - 1, parseInt(p[2] || '1', 10)) / 86400000;
}
function seededInt(key) {
  var h = 2166136261;
  for (var i = 0; i < key.length; i++) {
    h ^= key.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function campPileGains() {
  if (!st.campPile) st.campPile = { gains: [] };
  if (st.campPile.res) {
    st.campPile = {
      gains: [{ res: st.campPile.res, skill: st.campPile.skill, n: st.campPile.n || 0, xp: st.campPile.xp || 0 }],
      awayS: st.campPile.awayS || 0, capH: st.campPile.capH || BAL.OFFLINE_CAP_H,
      rate: st.campPile.rate || BAL.OFFLINE_RATE, capped: !!st.campPile.capped,
    };
  }
  if (!st.campPile.gains) st.campPile.gains = [];
  return st.campPile.gains;
}
function campPileAmount(resId) {
  var n = 0;
  campPileGains().forEach(function(g) { if (g.res === resId) n += g.n || 0; });
  return n;
}
function campPileTotal() {
  var n = 0;
  campPileGains().forEach(function(g) { n += g.n || 0; });
  return n;
}
function campPileReady() { return campPileTotal() > 0; }
function primaryCampPileGain() {
  var best = null;
  campPileGains().forEach(function(g) { if (!best || (g.n || 0) > (best.n || 0)) best = g; });
  return best;
}
function queueCampPile(o) {
  if (!o || !o.n) return false;
  var gains = campPileGains();
  var found = null;
  gains.forEach(function(g) { if (g.res === o.res && g.skill === o.skill) found = g; });
  if (found) { found.n += o.n; found.xp += o.xp || 0; }
  else gains.push({ res: o.res, skill: o.skill, n: o.n, xp: o.xp || 0 });
  st.campPile.awayS = (st.campPile.awayS || 0) + (o.awayS || 0);
  st.campPile.rate = o.rate || st.campPile.rate || BAL.OFFLINE_RATE;
  st.campPile.capH = o.capH || st.campPile.capH || BAL.OFFLINE_CAP_H;
  st.campPile.capped = !!(st.campPile.capped || o.capped);
  st.campPile.addedAt = Date.now();
  return true;
}
function claimCampPile() {
  var gains = campPileGains().slice();
  if (!gains.length) { GF.sfx('error'); return false; }
  gains.forEach(function(g) {
    st.inv[g.res] = (st.inv[g.res] || 0) + (g.n || 0);
    if (g.skill && g.xp) addXp(g.skill, g.xp);
  });
  st.campPile = { gains: [] };
  st.pendingOffline = null;
  GF.sfx('reward'); GF.setShake(0.45);
  GF.spawnParticles(GF.cx, layout().scene.y + layout().scene.h * 0.46, '#ffd84d', 28);
  toast(GF.t('camp_pile_ready'));
  saveRun();
  return true;
}
function currentStockWithPile(bag, item) {
  var have = (st[bag] && st[bag][item]) || 0;
  return bag === 'inv' ? have + campPileAmount(item) : have;
}
function buildDailyGoals(date, streak) {
  var seed = seededInt(date);
  var skill = SOURCE[seed % SOURCE.length];
  var tier = bestTierIdx(skill);
  var res = BAL.skills[skill].tiers[tier].id;
  var have = currentStockWithPile('inv', res);
  var need = Math.max(5, Math.min(28, have > 0 ? Math.ceil(have / 0.78) : 6 + (seed % 4)));
  var mealIdx = 0;
  for (var mi = BAL.meals.length - 1; mi >= 0; mi--) if (BAL.meals[mi].cookLvl <= lvlOf('cook')) { mealIdx = mi; break; }
  var meal = BAL.meals[mealIdx];
  var mealHave = currentStockWithPile('meals', meal.id);
  var mealNeed = Math.max(1, Math.min(4, mealHave > 0 ? mealHave + 1 : 1));
  return [
    { id: 'stock_' + res, type: 'deliver', bag: 'inv', item: res, n: need,
      coins: 28 + tier * 18 + Math.min(streak, 7) * 4, xpSkill: skill, xp: Math.round(32 + need * (tier + 1) * 4) },
    { id: 'pack_' + meal.id, type: 'deliver', bag: 'meals', item: meal.id, n: mealNeed,
      coins: 42 + mealIdx * 24 + Math.min(streak, 7) * 5, xpSkill: 'cook', xp: 42 + mealIdx * 28 },
    { id: 'board_delivery', type: 'board', n: 1,
      coins: 55 + Math.min(streak, 7) * 8, xpSkill: 'smith', xp: 60 + Math.min(streak, 7) * 6 },
  ];
}
function ensureDaily(silent) {
  var today = dayKey();
  if (!st.daily || st.daily.date !== today || !st.daily.goals) {
    var prev = st.daily && st.daily.date;
    var prevStreak = st.daily && st.daily.streak ? st.daily.streak : 0;
    var gap = prev ? dayNum(today) - dayNum(prev) : 999;
    var streak = gap === 1 ? prevStreak + 1 : 1;
    st.daily = {
      date: today, streak: streak, loginClaimed: 0, boardClaims: 0,
      goals: buildDailyGoals(today, streak),

    if (!silent) toast(GF.t('daily_new'));

  }
  if (typeof st.daily.boardClaims !== 'number') st.daily.boardClaims = 0;
  st.daily.goals.forEach(function(g) { if (typeof g.claimed !== 'number') g.claimed = g.claimed ? 1 : 0; });
  return false;
}
function dailyHave(g) {

  if (g.type === 'deliver') return (st[g.bag] && st[g.bag][g.item]) || 0;
  return 0;
}
function dailyReady(g) { return !g.claimed && dailyHave(g) >= g.n; }
function dailyReadyCount() {

function dailyRewardText(g) {

}

function claimDailyGoal(g) {

// ── JOB (gathering) ──────────────────────────────────────────────────────
var ticksSinceSave = 0;
function startJob(skill, tierIdx) {
  var tr = BAL.skills[skill].tiers[tierIdx];
  if (tr.lvl > lvlOf(skill)) { GF.sfx('error'); return; }
  st.job = { skill: skill, tier: tierIdx, prog: 0 };
  GF.sfx('click');
  if (GF.tutorial.active) {
    if (GF.tutorial.step === 0 && skill === 'woodcut') GF.tutorial.next();
  }
  saveRun();
}
function jobTick(dt) {
  if (!st.job || hunt) return;
  var at = actionTime(st.job.skill, st.job.tier);
  st.job.prog += dt;
  var guard = 0;
  while (st.job.prog >= at && guard++ < 200) {
    st.job.prog -= at;
    var tr = BAL.skills[st.job.skill].tiers[st.job.tier];
    var bonus = Math.random() < BAL.TOOL_BONUS * st.tools[TOOL_FOR[st.job.skill]];
    st.inv[tr.id] = (st.inv[tr.id] || 0) + (bonus ? 2 : 1);
    tickFlash = 1;
    if (TAB_OF_SKILL[st.job.skill] === tab) {
      var r = sceneRect();
      GF.spawnParticles(r.x + r.w * 0.62, r.y + r.h * 0.55, tierColor(st.job.skill, st.job.tier), bonus ? 14 : 7);
      GF.spawnFloat(r.x + r.w * 0.62, r.y + r.h * 0.42, '+' + (bonus ? 2 : 1) + ' ' + GF.t('res_' + tr.id), '#cfe8d4');
      addXp(st.job.skill, tr.xp, r.x + r.w * 0.38, r.y + r.h * 0.42);
    } else {
      addXp(st.job.skill, tr.xp);
    }
    if (animT - lastTickSfx > 0.18) { GF.sfx('tap'); lastTickSfx = animT; }
    if (GF.tutorial.active && GF.tutorial.step === 1) GF.tutorial.next();
    else if (GF.tutorial.active && GF.tutorial.step === 3 && st.job.skill === 'mine') {
      ensureTutorialForgeMats();
      GF.tutorial.next();
    }
    if (++ticksSinceSave >= 25) { ticksSinceSave = 0; saveRun(); }
  }
}

// ── HUNT ─────────────────────────────────────────────────────────────────
function playerMaxHp() { return BAL.HP_BASE + BAL.HP_PER_LVL * lvlOf('hunt'); }
function buildPack() {
  var pack = [];
  for (var i = BAL.meals.length - 1; i >= 0; i--) {
    var m = BAL.meals[i], have = st.meals[m.id] || 0;
    while (have > 0 && pack.length < BAL.PACK_SIZE) { pack.push(m.id); have--; }
  }
  return pack;
}
function startHunt(zoneIdx) {
  if (hunt || gs !== 'PLAYING') return;
  if (zoneIdx > st.zonesCleared || zoneIdx >= BAL.zones.length) { GF.sfx('error'); return; }
  var z = BAL.zones[zoneIdx];
  var pack = buildPack();
  pack.forEach(function(id) { st.meals[id]--; });   // packed meals leave camp stock
  hunt = {
    zone: zoneIdx, kills: 0, ehp: z.hp, hp: playerMaxHp(),
    swingCd: BAL.SWING_SEC, strikeCd: 0, eatCd: 0, gapT: 0,
    buffAtk: 0, buffDef: 0, buffT: 0, pack: pack, lungeT: 0, hitT: 0,
  };
  tab = 'trail';
  GF.sfx('spawn'); GF.gameStarted();
  if (!st.huntCoach && !GF.tutorial.active) {
    st.huntCoach = 1;
    GF.tutorial.start([
      { text: GF.t('h1'), target: enemyTarget, advance: 'manual' },
      { text: GF.t('h2'), target: eatTarget, advance: 'auto', after: 2800 },
    ], { storageKey: 'cedar_hollow_hunt_tut_v1', force: true });
  }
  saveRun();
}
function enemyTarget() { var r = sceneRect(); return { x: r.x + r.w * 0.68, y: r.y + r.h * 0.52, r: 46 * GF.S }; }
function eatTarget() { var r = sceneRect(); return { x: r.x + r.w * 0.5, y: r.y + r.h - 32 * uiS(), r: 40 * GF.S }; }
function endHunt(returnPack) {
  if (!hunt) return;
  if (returnPack) hunt.pack.forEach(function(id) { st.meals[id]++; });
  hunt = null;
  GF.gameEnded();
  saveRun();
}
function huntStrike() {
  if (!hunt || hunt.gapT > 0 || hunt.strikeCd > 0) return;
  hunt.strikeCd = BAL.STRIKE_CD;
  hunt.lungeT = 0.18;
  GF.sfx('hit'); GF.setShake(0.25);
  var et = enemyTarget();
  GF.spawnParticles(et.x, et.y, '#ffe26b', 8);
  if (GF.tutorial.active && GF.tutorial.steps.length === 2 && GF.tutorial.step === 0) GF.tutorial.next();
  damageEnemy(BAL.STRIKE_DMG);
}
function huntEat() {
  if (!hunt || hunt.eatCd > 0) return;
  if (!hunt.pack.length) { GF.sfx('error'); return; }
  var id = hunt.pack.shift();
  var m = BAL.meals.filter(function(mm) { return mm.id === id; })[0];
  hunt.hp = Math.min(playerMaxHp(), hunt.hp + m.heal);
  hunt.eatCd = BAL.EAT_CD;
  if (m.buff) {
    hunt.buffAtk = Math.max(hunt.buffAtk, m.buff.atk || 0);
    hunt.buffDef = Math.max(hunt.buffDef, m.buff.def || 0);
    hunt.buffT = Math.max(hunt.buffT, m.buff.dur);
  }
  GF.sfx('pickup');
  var et = eatTarget();
  GF.spawnFloat(et.x, et.y - 30 * GF.S, '+' + m.heal + ' ' + GF.t('hp'), '#7CFC9A');
}
function damageEnemy(dmg) {
  if (!hunt) return;
  hunt.ehp -= dmg;
  hunt.hitT = 0.12;
  if (hunt.ehp <= 0) {
    var z = BAL.zones[hunt.zone];
    hunt.kills++;
    st.killsTotal++;
    st.coins += z.lootCoins; st.lifetimeCoins += z.lootCoins;
    st.loot[z.lootId] = (st.loot[z.lootId] || 0) + 1;
    addXp('hunt', z.killXp);
    GF.sfx('merge');
    var et = enemyTarget();
    GF.spawnParticles(et.x, et.y, '#ff7d6b', 18);
    GF.spawnFloat(et.x, et.y - 20 * GF.S, '+' + z.lootCoins, '#ffd84d');
    if (hunt.kills >= z.kills) huntVictory();
    else { hunt.gapT = BAL.KILL_GAP_SEC; hunt.ehp = z.hp; }
  }
}
function huntVictory() {
  var z = BAL.zones[hunt.zone];
  var first = hunt.zone === st.zonesCleared;
  var ck = Math.round(z.clearCoins * (first ? 1 : 0.4));
  var cxp = Math.round(z.clearXp * (first ? 1 : 0.4));
  st.coins += ck; st.lifetimeCoins += ck;
  addXp('hunt', cxp);
  if (first) { st.zonesCleared = hunt.zone + 1; GF.happytime(); }
  banner = { zone: hunt.zone, coins: ck, xp: cxp, t: 3.2, first: first };
  GF.sfx('win'); GF.setShake(0.8);
  endHunt(true);
}
function huntDefeat() {
  st.defeats++;
  endHunt(false);          // unused packed meals are LOST on defeat (+ clear bonus)
  gs = 'GAMEOVER';
  pendingAd = true;
  if (score > best) { best = score; try { localStorage.setItem('cedar_hollow_best', best); } catch (e) {} }
  GF.sfx('lose');
  saveRun();
}
function huntTick(dt) {
  if (!hunt || gs !== 'PLAYING') return;
  var z = BAL.zones[hunt.zone];
  if (hunt.buffT > 0) { hunt.buffT -= dt; if (hunt.buffT <= 0) { hunt.buffAtk = 0; hunt.buffDef = 0; } }
  hunt.strikeCd = Math.max(0, hunt.strikeCd - dt);
  hunt.eatCd = Math.max(0, hunt.eatCd - dt);
  hunt.lungeT = Math.max(0, hunt.lungeT - dt);
  hunt.hitT = Math.max(0, hunt.hitT - dt);
  if (hunt.gapT > 0) { hunt.gapT -= dt; return; }
  hunt.swingCd -= dt;
  if (hunt.swingCd <= 0) {
    hunt.swingCd += BAL.SWING_SEC;
    hunt.lungeT = 0.22;
    damageEnemy((BAL.ATK_BASE + BAL.ATK_PER_SPEAR * st.tools.spear) * (1 + hunt.buffAtk));
  }
  if (!hunt) return;
  hunt.hp -= z.dps * (1 - hunt.buffDef) * dt;
  if (hunt.hp < playerMaxHp() * 0.4 && animT - hurtSfx > 1.6) { GF.sfx('hurt'); hurtSfx = animT; }
  if (hunt.hp <= 0) huntDefeat();
}
function retryHunt() {
  gs = 'PLAYING';
  GF.gameStarted();
  // a 0-meal retry is always doomed (sim T4c) - route to the campfire instead
  if (mealCount() === 0) { tab = 'camp'; toast(GF.t('no_meals')); GF.sfx('error'); saveRun(); return; }
  tab = 'trail';
  if (lastDefeatZone <= st.zonesCleared) startHunt(lastDefeatZone);
  saveRun();
}

// ── OFFLINE ──────────────────────────────────────────────────────────────
function computeOffline() {
  var elapsed = (Date.now() - (st.lastSeen || Date.now())) / 1000;
  if (elapsed < BAL.OFFLINE_MIN_S || !st.job) return null;
  var capS = (st.upg.packmule ? BAL.upgrades.packmule.capH[st.upg.packmule - 1] : BAL.OFFLINE_CAP_H) * 3600;
  var rate = st.upg.lantern ? BAL.upgrades.lantern.rate[st.upg.lantern - 1] : BAL.OFFLINE_RATE;
  var eff = Math.min(elapsed, capS);
  var n = Math.floor(eff / actionTime(st.job.skill, st.job.tier) * rate);
  if (n <= 0) return null;
  var tr = BAL.skills[st.job.skill].tiers[st.job.tier];
  return { n: n, res: tr.id, xp: n * tr.xp, skill: st.job.skill, awayS: elapsed,
           rate: rate, capH: capS / 3600, capped: elapsed > capS };
}
function claimOffline() {
  if (!offlinePending) { modal = null; return; }
  var o = offlinePending;
  st.inv[o.res] = (st.inv[o.res] || 0) + o.n;
  addXp(o.skill, o.xp);
  GF.sfx('reward'); GF.setShake(0.4);
  GF.spawnParticles(GF.cx, GF.cy, '#ffd84d', 30);
  offlinePending = null;
  st.pendingOffline = null;
  modal = null;
  saveRun();
}

// ── LAYOUT ───────────────────────────────────────────────────────────────
function uiS() { return GF.clamp(Math.min(GF.W / 420, GF.H / 800), 0.62, 1.45); }
function layout() {
  var u = uiS();
  var topH = 50 * u;
  var tabH = 62 * u;
  var colW = Math.min(GF.W, 620 * u);
  var colX = (GF.W - colW) / 2;
  var sceneH = GF.clamp(GF.H * 0.32, 150 * u, 300 * u);
  var stripH = 52 * u;
  return {
    u: u, colX: colX, colW: colW,
    top: { x: 0, y: 0, w: GF.W, h: topH },
    scene: { x: colX, y: topH, w: colW, h: sceneH },
    strip: { x: colX, y: topH + sceneH, w: colW, h: stripH },
    list: { x: colX, y: topH + sceneH + stripH, w: colW, h: Math.max(60, GF.H - topH - sceneH - stripH - tabH) },
    tabs: { x: 0, y: GF.H - tabH, w: GF.W, h: tabH },
  };
}
function sceneRect() { return layout().scene; }
function tabRect(i) {
  var L = layout();
  var w = Math.min(L.colW, GF.W) / TABS.length;
  var x0 = (GF.W - w * TABS.length) / 2;

}

// ── INPUT ────────────────────────────────────────────────────────────────
var ptr = { down: false, sy: 0, dragging: false, inList: false };
function pointerXY(e) {
  var rect = GF.canvas.getBoundingClientRect();
  var sx = rect.width ? GF.canvas.width / rect.width : 1;
  var sy = rect.height ? GF.canvas.height / rect.height : 1;
  return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
}
function onDown(x, y) {
  ptr.down = true; ptr.dragging = false; ptr.sy = y;
  ptr.inList = gs === 'PLAYING' && !modal && sc && sc.contains(x, y);
  if (ptr.inList) sc.dragStart(y);
}
function onMove(x, y) {
  if (!ptr.down) return;
  if (ptr.inList && Math.abs(y - ptr.sy) > 9) ptr.dragging = true;
  if (ptr.dragging && sc) sc.dragMove(y);
}
function onUp(x, y) {
  if (!ptr.down) return;
  ptr.down = false;
  if (sc) sc.dragEnd();
  if (ptr.dragging) { ptr.dragging = false; return; }
  if (GF.tutorial.active) {
    var stepBefore = GF.tutorial.step;
    var consumed = GF.tutorial.handleClick(x, y);
    if (consumed && !GF.tutorial.active) return;                       // skip pressed (or finished)
    if (consumed && GF.tutorial.step !== stepBefore) return;           // step advanced by the click
    // manual/auto steps swallow by default - fall through so the world stays live
  }
  for (var i = uiButtons.length - 1; i >= 0; i--) {
    var b = uiButtons[i], hit;
    if (b.scrolled) {
      if (!sc || !sc.contains(x, y)) continue;
      var cyy = sc.screenToContentY(y);
      hit = x >= b.x && x <= b.x + b.w && cyy >= b.y && cyy <= b.y + b.h;
    } else {
      hit = x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h;
    }
    if (hit) { b.fn(); return; }
  }
}
var canvasEl = GF.canvas;
canvasEl.addEventListener('pointerdown', function(e) { var p = pointerXY(e); onDown(p.x, p.y); });
canvasEl.addEventListener('pointermove', function(e) { var p = pointerXY(e); onMove(p.x, p.y); });
canvasEl.addEventListener('pointerup', function(e) { var p = pointerXY(e); onUp(p.x, p.y); });

GF.init({

    st = freshState();

      function() {
        // mid-hunt saves return the packed meals to camp stock in the SNAPSHOT
        // (reload drops the hunt, so the pack must not be silently lost; an
        // actual DEFEAT still consumes it - that loss happens before this save)
        var snapSt = st;
        if (hunt && hunt.pack.length) {
          var meals2 = {}, mk;
          for (mk in st.meals) meals2[mk] = st.meals[mk];
          hunt.pack.forEach(function(id) { meals2[id] = (meals2[id] || 0) + 1; });

        }

      },
      function(s) {
        if (!s || !s.st) return;

        Object.keys(f).forEach(function(k) { if (s.st[k] !== undefined) f[k] = s.st[k]; });
        var fx = freshState().xp;
        Object.keys(fx).forEach(function(k) { if (typeof f.xp[k] !== 'number') f.xp[k] = 0; });
        st = f;
        score = s.score || 0;
        tab = TABS.indexOf(s.tab) >= 0 ? s.tab : 'forest';
      }
    );
    gs = 'PLAYING';            // no boot menu - straight into gameplay (hard rule)
    hunt = null;               // hunts never persist; reload lands on a safe screen
    var returningHabit = false;

      // Unclaimed gains persist as a visible camp pile, not a blocking popup:
      // closing the tab can never eat the reward, and tomorrow's board goals
      // can be finished from the pile immediately.
      if (st.pendingOffline) {

        st.pendingOffline = null;
      }

    }

    if (restored && (returningHabit || newDaily || campPileReady() || dailyReadyCount() > 0)) {
      tab = 'camp';
      modal = null;
    }
    st.lastSeen = Date.now();
    GF.saveRun();
    GF.startMusic({ preset: 'idle', muted: GF.muted });
    GF.gameStarted();

    GF.exposeState(function() {

        job: st.job ? st.job.skill + ':' + st.job.tier : null,
        tools: st.tools,
      };
    });
    GF.exposeBot(
      function() {
        var acts = [];
        if (gs === 'GAMEOVER') return ['retry', 'to_camp'];
        if (modal === 'offline') return ['claim'];
        if (modal) return ['close_modal'];
        if (hunt) {
          acts.push('strike', 'flee');
          if (hunt.pack.length && hunt.eatCd <= 0) acts.push('eat');
          return acts;
        }
        if (campPileReady()) acts.push('collect_pile');
        if (st.daily && !st.daily.loginClaimed) acts.push('daily_login');
        if (st.daily && st.daily.goals && st.daily.goals.some(function(g) { return dailyReady(g); })) acts.push('daily_claim');
        if (boardReadyCount() > 0) acts.push('board_claim');
        acts.push('work_best');
        if (BAL.toolKinds.some(function(k) { var c2 = canCraft(k); return c2 && c2.ok; })) acts.push('smith');
        // 'cook' is offered when any unlocked recipe's input TIERS are reachable;
        // act('cook') assembles missing inputs by switching the job (multi-step).
        for (var mi3 = 0; mi3 < BAL.meals.length; mi3++) {
          var m3 = BAL.meals[mi3];
          if (m3.cookLvl > lvlOf('cook')) continue;
          var reachable = true, rk;
          for (rk in m3.inputs) {
            var rs = skillOfRes(rk);
            if (resOf(rk).lvl > lvlOf(rs)) { reachable = false; break; }
          }
          if (reachable) { acts.push('cook'); break; }
        }
        if (st.zonesCleared < BAL.zones.length) acts.push('hunt');
        var hasLoot = false, lk;
        for (lk in st.loot) if (st.loot[lk] > 0) hasLoot = true;
        if (hasLoot) acts.push('sell');
        for (lk in BAL.upgrades) {
          var l2 = st.upg[lk];
          if (l2 < BAL.upgrades[lk].costs.length && st.coins >= BAL.upgrades[lk].costs[l2]) { acts.push('upgrade'); break; }
        }
        return acts;
      },
      function(a) {
        if (a === 'retry') { pendingAd = false; retryHunt(); return; }
        if (a === 'to_camp') { pendingAd = false; gs = 'PLAYING'; tab = 'camp'; return; }
        if (a === 'claim') { claimOffline(); return; }
        if (a === 'close_modal') { modal = null; return; }
        if (a === 'strike') { if (hunt) { hunt.strikeCd = 0; huntStrike(); } return; }
        if (a === 'eat') { if (hunt) { hunt.eatCd = 0; huntEat(); } return; }
        if (a === 'flee') { endHunt(true); return; }
        if (a === 'collect_pile') { tab = 'camp'; claimCampPile(); return; }
        if (a === 'daily_login') { tab = 'camp'; claimDailyLogin(); return; }
        if (a === 'daily_claim') {
          if (st.daily && st.daily.goals) {
            for (var gi = 0; gi < st.daily.goals.length; gi++) if (dailyReady(st.daily.goals[gi])) { tab = 'camp'; claimDailyGoal(st.daily.goals[gi]); return; }
          }
          return;
        }
        if (a === 'board_claim') {
          for (var oi = 0; oi < CAMP_ORDERS.length; oi++) if (orderReady(CAMP_ORDERS[oi])) { tab = 'camp'; claimOrder(CAMP_ORDERS[oi]); return; }
          return;
        }
        if (a === 'work_best') {
          var bs = null, bv = 0;
          SOURCE.forEach(function(s) {
            var i = bestTierIdx(s), v = BAL.skills[s].tiers[i].xp / actionTime(s, i);
            if (v > bv) { bv = v; bs = [s, i]; }
          });
          tab = TAB_OF_SKILL[bs[0]]; startJob(bs[0], bs[1]); return;
        }
        if (a === 'smith') {
          for (var ki = 0; ki < BAL.toolKinds.length; ki++) {
            var c3 = canCraft(BAL.toolKinds[ki]);
            if (c3 && c3.ok) { tab = 'camp'; craftTool(BAL.toolKinds[ki]); return; }
          }
          return;
        }
        if (a === 'cook') {
          // cook the best ready recipe, else start gathering its first missing input
          for (var mi2 = BAL.meals.length - 1; mi2 >= 0; mi2--) {
            var m2 = BAL.meals[mi2];
            if (m2.cookLvl > lvlOf('cook')) continue;
            var missing = null, rk2, okTiers = true;
            for (rk2 in m2.inputs) {
              var rs2 = skillOfRes(rk2);
              if (resOf(rk2).lvl > lvlOf(rs2)) { okTiers = false; break; }
              if (!missing && (st.inv[rk2] || 0) < m2.inputs[rk2]) missing = rk2;
            }
            if (!okTiers) continue;
            if (!missing) { tab = 'camp'; cookMeal(mi2); return; }
            var ms = skillOfRes(missing), mt = 0;
            BAL.skills[ms].tiers.forEach(function(tr, j) { if (tr.id === missing) mt = j; });
            tab = TAB_OF_SKILL[ms]; startJob(ms, mt); return;
          }
          return;
        }
        if (a === 'hunt') { lastDefeatZone = st.zonesCleared; startHunt(st.zonesCleared); return; }
        if (a === 'sell') {
          for (var lk2 in st.loot) if (st.loot[lk2] > 0) sellLoot(lk2, 1e9);
          return;
        }
        if (a === 'upgrade') {
          for (var uk2 in BAL.upgrades) buyUpgrade(uk2);
          return;
        }
      }
    );
    GF.exposeReach(function() {
      var items = [];
      uiButtons.forEach(function(b) {
        items.push(b.scrolled
          ? { id: b.id, x: b.x, y: b.y, w: b.w, h: b.h }           // content space
          : { id: b.id, x: b.x, y: b.y, w: b.w, h: b.h, pinned: true });
      });
      return {
        screen: gs === 'GAMEOVER' ? 'gameover' : (modal || tab),
        items: items,
        scrollId: 'list',
        viewportH: sc ? sc.vp.h : GF.H,
      };
    });
    function tourTo(name) { gs = 'PLAYING'; modal = null; if (hunt) endHunt(true); tab = name; if (sc) sc.scrollTo(0); }
    GF.exposeTour([
      { name: 'forest', go: function() { tourTo('forest'); } },
      { name: 'quarry', go: function() { tourTo('quarry'); } },
      { name: 'river', go: function() { tourTo('river'); } },
      { name: 'meadow', go: function() { tourTo('meadow'); } },
      { name: 'camp', go: function() { tourTo('camp'); } },
      { name: 'trail', go: function() { tourTo('trail'); } },
      { name: 'hub', go: function() { tourTo('forest'); modal = 'hub'; } },
      { name: 'help', go: function() { tourTo('forest'); modal = 'help'; } },
      { name: 'stats', go: function() { tourTo('forest'); modal = 'stats'; } },
      { name: 'board', go: function() { tourTo('camp'); boardScrollPending = true; } },
      { name: 'gameover', go: function() { tourTo('trail'); gs = 'GAMEOVER'; } },
    ]);

    // -- WS-E economy sim hook (econ_sim_check.js gate). Pure headless model
    // over the SAME BAL constants the game ships - declared ONLY under the sim
    // flag, never in normal play. Models the core coin economy: gather wood+ore
    // at the goal tier, sell surplus at trader prices, smith all 5 tool kinds,
    // buy whetstones. Hunts/meals are EXCLUDED (conservative: their coins/XP
    // land on top of what this model earns). ---------------------------------
    if (window.__gfSimMode || window._silent) (function() {
      function lvlFromXp(xp) { // pure twin of lvlOf() (which reads live st)
        var l = 1; while (l < BAL.LEVEL_CAP && xp >= cumXp(l + 1)) l++; return l;
      }
      function recipe(kind, ti) {
        var tt = BAL.toolTiers[ti];
        var coins = tt.coins + (kind === 'spear' ? BAL.spearExtraCoins[ti] : 0);
        return { wood: tt.wood, ore: tt.ore, coins: coins, smithLvl: tt.smithLvl, xp: tt.xp,
                 scalar: coins + tt.wood * BAL.skills.woodcut.tiers[ti].sell
                               + tt.ore * BAL.skills.mine.tiers[ti].sell };
      }
      function crafts(s) {
        var out = [];
        BAL.toolKinds.forEach(function(k) {
          var ti = s.tools[k];
          if (ti >= BAL.toolTiers.length) return;
          var r = recipe(k, ti);
          if (lvlFromXp(s.xpS) < r.smithLvl) return;
          out.push({ id: k + (ti + 1), kind: k, ti: ti, r: r });
        });
        return out;
      }
      function gather(s, sk, dt) {
        var ts = BAL.skills[sk].tiers, lv = lvlFromXp(sk === 'woodcut' ? s.xpW : s.xpM);
        var ti = 0, i;
        for (i = 0; i < ts.length; i++) if (ts[i].lvl <= lv) ti = i;
        // goal-directed: if the cheapest pending craft still needs THIS skill's
        // tier resource and that tier is unlocked, gather it instead of best-XP
        var pend = crafts(s).sort(function(a, b) { return a.r.scalar - b.r.scalar; })[0];
        if (pend) {
          var bank = (sk === 'woodcut' ? s.w : s.o)[pend.ti] || 0;
          var need = sk === 'woodcut' ? pend.r.wood : pend.r.ore;
          if (bank < need && ts[pend.ti].lvl <= lv) ti = pend.ti;
        }
        var tool = sk === 'woodcut' ? s.tools.axe : s.tools.pick;
        var per = ts[ti].t * Math.pow(BAL.TOOL_SPEED, tool) /
                  (1 + BAL.upgrades.whetstone.speedPer * s.whet);
        var n = dt / per, arr = sk === 'woodcut' ? s.w : s.o;
        arr[ti] += n;
        if (sk === 'woodcut') s.xpW += n * ts[ti].xp; else s.xpM += n * ts[ti].xp;
        // sell every unit pending recipes do not reserve (trader is lossless,
        // so a greedy player liquidates surplus to fund coin sinks)
        var cs = crafts(s), j;
        for (j = 0; j < ts.length; j++) {
          var keep = 0;
          cs.forEach(function(c) {
            if (c.ti === j) keep = Math.max(keep, sk === 'woodcut' ? c.r.wood : c.r.ore);
          });
          if (arr[j] > keep) { s.coins += (arr[j] - keep) * ts[j].sell; arr[j] = keep; }
        }
      }
      window.__gfEcon = {
        genre: 'idle',
        params: { LEVEL_XP_BASE: BAL.LEVEL_XP_BASE, LEVEL_XP_GROWTH: BAL.LEVEL_XP_GROWTH,
                  TOOL_SPEED: BAL.TOOL_SPEED, toolTiers: BAL.toolTiers,
                  whetstoneCosts: BAL.upgrades.whetstone.costs,
                  note: 'hunt/meal economy excluded (conservative coin model)' },
        initialState: function() {
          return { xpW: 0, xpM: 0, xpS: 0, coins: 0, whet: 0,
                   w: [0, 0, 0, 0, 0], o: [0, 0, 0, 0, 0],
                   tools: { axe: 0, pick: 0, rod: 0, basket: 0, spear: 0 } };
        },
        actions: function(s) {
          var out = crafts(s).map(function(c) {
            return { id: c.id, cost: c.r.scalar,
                     ready: s.w[c.ti] >= c.r.wood && s.o[c.ti] >= c.r.ore && s.coins >= c.r.coins };
          });
          var uc = BAL.upgrades.whetstone.costs;
          if (s.whet < uc.length)
            out.push({ id: 'whet' + (s.whet + 1), cost: uc[s.whet], ready: s.coins >= uc[s.whet] });
          return out;
        },
        step: function(s, a) {
          if (a.id === 'wait') { gather(s, 'woodcut', a.dt / 2); gather(s, 'mine', a.dt / 2); return s; }
          if (a.id.indexOf('whet') === 0) { s.coins -= BAL.upgrades.whetstone.costs[s.whet]; s.whet++; return s; }
          var c = crafts(s).filter(function(x) { return x.id === a.id; })[0];
          if (c) { s.w[c.ti] -= c.r.wood; s.o[c.ti] -= c.r.ore; s.coins -= c.r.coins;
                   s.tools[c.kind]++; s.xpS += c.r.xp; }
          return s;
        },
        metrics: function(s) {
          var bought = s.tools.axe + s.tools.pick + s.tools.rod + s.tools.basket + s.tools.spear + s.whet;
          return { currency: s.coins, progress: s.xpW + s.xpM + s.xpS + bought * 100 };
        },
      };
    })();
  },
  onUpdate: update,
  onDraw: draw,
});

// ── YANDEX MUST-HAVES (load-bearing, from the factory template) ──────────
// 1. ALL UI TEXT THROUGH GF.t() / STRINGS  (Yandex 8.2.3)
// 2. SAVE RUN STATE ACROSS RELOAD via GF.persist (Yandex 1.9)
// 3. FULLSCREEN-EXIT RESIZE handled by gf-lib (Yandex 1.6.2.3)
// 4. ADS ON USER-CLICK ONLY (Yandex 4.4): the interstitial fires inside the
//    RETRY / TO CAMP click handlers via fireAdThen (flag set on defeat, ad on
//    the user's next click); rewarded video only from the rations button.

})();
</script>
