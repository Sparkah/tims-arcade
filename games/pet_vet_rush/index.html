    c_nurse: 'Медсестра', c_dental: 'Стоматолог', c_surgery: 'Хирургия',
    cond_exam: 'жар', cond_bath: 'блохи', cond_xray: 'перелом',

var SPRITE_NAMES = [];   // pure vector art for v0.1

// ── TUNABLES (every one exposed via GF.exposeState) ─────────────────
var ARRIVAL_BASE      = 3.0;
var ARRIVAL_DECAY     = 0.90;
var PATIENCE_DRAIN    = 9;
var STATION_TIME      = 3.2;
var CURE_REWARD       = 12;
var TIP_WINDOW        = 0.55;
var TIP_BONUS         = 8;
var CLINIC_HEARTS     = 5;
var QUOTA_BASE        = 6;
var QUOTA_GROW        = 2;
var UPGRADE_COST_GROW = 1.45;
var VIP_CHANCE        = 0.14;
var MISASSIGN_PENALTY = 8;
var CONDS_PER_DAY     = 1;

// Sizes (design space; scaled by GF.S at draw time)
var SEAT_R    = 30;
var STATION_H = 96;
var BTN_H     = 52;

// Board readability caps — keep the station stack legible; past these the
// upgrade depth comes from assistants / speed / dispensers, not infinite bays.
var STATION_CAP      = 9;   // total stations on the board
var DUP_CAP_PER_TYPE = 3;   // max bays of any one condition type

// ── Station / condition catalogue (≥6 types) ────────────────────────
// Each entry: id, palette accent, icon glyph drawer key, base treat secs.
// `order` = the day index at which this type unlocks (day starts at 1).
var TYPES = [
  { id: 'exam',    accent: '#36c2a8', icon: 'cross',  order: 1, treat: 1.00 },
  { id: 'bath',    accent: '#4aa3e0', icon: 'bath',   order: 1, treat: 1.05 },
  { id: 'xray',    accent: '#8a7be0', icon: 'bone',   order: 2, treat: 1.15 },
  { id: 'nurse',   accent: '#e08a5a', icon: 'syringe',order: 3, treat: 0.95 },
  { id: 'dental',  accent: '#e0c14a', icon: 'tooth',  order: 4, treat: 1.10 },
  { id: 'surgery', accent: '#e05a7a', icon: 'pulse',  order: 5, treat: 1.30 },
];
function typeById(id) { for (var i = 0; i < TYPES.length; i++) if (TYPES[i].id === id) return TYPES[i]; return TYPES[0]; }
function typeIndex(id) { for (var i = 0; i < TYPES.length; i++) if (TYPES[i].id === id) return i; return 0; }

// Pet species (cute vector faces) chosen per pet for variety.
var SPECIES = ['dog', 'cat', 'rabbit', 'bird', 'hamster'];

// ── GAME STATE ──────────────────────────────────────────────────────
var gs = 'MENU';     // MENU | PLAYING | SUMMARY | GAMEOVER
var helpOpen = false;
var day = 1, bestDay = 0;
var cash = 0, dayEarned = 0;
var hearts = CLINIC_HEARTS;
var served = 0, dayQuota = QUOTA_BASE;
var spawnedThisDay = 0;          // how many pets we've spawned this day (cap to quota+buffer)
var arrivalTimer = 0;            // countdown to next arrival
var pets = [];                   // waiting + in-treatment pets
var stations = [];               // owned station instances
var ownedTypes = {};             // typeId -> count of stations of that type
var selected = null;             // selected waiting pet id
var petSeq = 1, stationSeq = 1;
var flashT = 0;                  // red damage flash timer
var dayBanner = 0;               // "Day N" banner timer at day start
var summaryRows = [];            // built on entering SUMMARY
var nextUnlockType = null;       // type id that will unlock next day (for summary preview)
var firstPetFrozen = false;      // freeze first pet's patience during tutorial

// upgrade counters (drive escalating cost + effect)
var speedLevel = 0;              // each -12% (multiplicative floor)
var dispenserLevel = 0;          // each -15% patience drain
var seatBonus = 0;               // extra seats beyond the base layout cap
var assistantsBought = 0;

var L = {};                      // layout rects, recomputed each frame
var shopScroll = null;           // summary upgrade-list scroll controller

// ── helpers ─────────────────────────────────────────────────────────
function rnd(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[(Math.random() * arr.length) | 0]; }
function fmt(n) { n = Math.floor(n); if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M'; if (n >= 1e4) return (n / 1e3).toFixed(1) + 'K'; return '' + n; }
function findPet(id) { for (var i = 0; i < pets.length; i++) if (pets[i].id === id) return pets[i]; return null; }
function findStation(id) { for (var i = 0; i < stations.length; i++) if (stations[i].id === id) return stations[i]; return null; }
function waitingPets() { var o = []; for (var i = 0; i < pets.length; i++) if (pets[i].state === 'wait') o.push(pets[i]); return o; }

// max waiting seats available right now (base grid + purchased seats)
function seatCap() { return 4 + seatBonus; }
// how many station-treatment-time multiplier from speed upgrades
function speedMult() { return Math.pow(0.88, speedLevel); }
// patience drain multiplier from dispensers
function drainMult() { return Math.pow(0.85, dispenserLevel); }

// types unlocked for the CURRENT day
function unlockedTypes() {
  var o = [];
  for (var i = 0; i < TYPES.length; i++) if (TYPES[i].order <= day) o.push(TYPES[i]);
  return o;
}

// ── lifecycle ───────────────────────────────────────────────────────
function resetRun() {
  day = 1; cash = 0; dayEarned = 0; hearts = CLINIC_HEARTS;
  served = 0; dayQuota = QUOTA_BASE; spawnedThisDay = 0;
  pets = []; stations = []; ownedTypes = {};
  selected = null; petSeq = 1; stationSeq = 1;
  speedLevel = 0; dispenserLevel = 0; seatBonus = 0; assistantsBought = 0;
  // start with the two day-1 station types
  addStation('exam'); addStation('bath');
  startDay(1, true);
}

function addStation(typeId) {
  stations.push({
    id: stationSeq++, type: typeId, pet: null, progress: 0, dur: 0,
    assistant: false, x: 0, y: 0, w: 0, h: 0, glow: 0,
  });
  ownedTypes[typeId] = (ownedTypes[typeId] || 0) + 1;
}

function startDay(n, isReset) {
  day = n;
  dayQuota = QUOTA_BASE + (n - 1) * QUOTA_GROW;
  served = 0; dayEarned = 0; spawnedThisDay = 0;
  arrivalTimer = 0.6;            // first pet lands fast
  selected = null;
  dayBanner = 1.6;
  gs = 'PLAYING';
  // freeze the very first pet of a fresh game until the tutorial finishes
  firstPetFrozen = isReset && GF.tutorial && !tutorialDone();
  GF.gameStarted();
  save();
}

function tutorialDone() {
  try { return !!localStorage.getItem('pet_vet_rush_seen_tutorial'); } catch (e) { return false; }
}

function startGame() {
  resetRun();
  if (!tutorialDone()) {
    // The coach needs a pet to point at. Spawn the first one immediately and
    // resolve seat positions so step 1's target lands on a real pet.
    spawnPet();
    layout(GF.W, GF.H, GF.S);
    startTutorial(false);
  }
}

function gameOver() {
  if (day > bestDay) { bestDay = day; try { localStorage.setItem('pet_vet_rush_best', bestDay); } catch (e) {} }
  gs = 'GAMEOVER';
  GF.sfx('lose');
  GF.gameEnded();
  GF.ads.interstitial();        // capped, safe no-op locally
  save();
}

// ── arrivals ────────────────────────────────────────────────────────
function arrivalInterval() {
  // faster each day, plus a mild within-day ramp as the quota fills
  var base = ARRIVAL_BASE * Math.pow(ARRIVAL_DECAY, day - 1);
  var ramp = 1 - 0.18 * (served / Math.max(1, dayQuota));
  return Math.max(0.9, base * ramp);
}

function spawnPet() {
  if (waitingPets().length >= seatCap()) return;        // no seat -> skip this beat
  var uts = unlockedTypes();
  var t = pick(uts);
  var isVip = (day >= 3) && (Math.random() < VIP_CHANCE);
  var basePat = isVip ? 7.5 : (12.5 - Math.min(5, (day - 1) * 0.6));
  var p = {
    id: petSeq++, type: t.id, species: pick(SPECIES),
    state: 'wait',                 // wait | walking | treat | done | leaving
    patience: 100, patMax: 100, patSecs: basePat,
    vip: isVip,
    seatX: 0, seatY: 0,            // resolved at layout
    wx: 0, wy: 0,                  // walking position
    targetStation: null,
    bob: Math.random() * 6.28,
    faceT: 0, leaveT: 0, bounce: 0,
  };
  pets.push(p);
  spawnedThisDay++;
  GF.sfx('spawn');
}

// ── assignment (2-tap) ──────────────────────────────────────────────
function tryAssign(pet, st) {
  if (!pet || !st || pet.state !== 'wait') return false;
  if (st.pet) { GF.sfx('error'); return false; }        // busy
  if (st.type !== pet.type) {
    // misassign — bounce back, small patience nick, no heart lost
    pet.patience = Math.max(2, pet.patience - MISASSIGN_PENALTY);
    pet.bounce = 0.4;
    GF.sfx('error');
    GF.spawnFloat(pet.seatX, pet.seatY - 20 * GF.S, 'X', '#ff8a6a');
    selected = null;
    return false;
  }
  // valid assign
  pet.state = 'walking';
  pet.targetStation = st.id;
  pet.wx = pet.seatX; pet.wy = pet.seatY;
  st.glow = 0;
  selected = null;
  GF.sfx('pickup');
  GF.spawnParticles(st.x + st.w / 2, st.y + st.h / 2, typeById(st.type).accent, 8);
  return true;
}

function finishTreatment(st) {
  var pet = st.pet;
  if (!pet) return;
  // tip if patience still high at completion
  var tip = pet.patience >= TIP_WINDOW * 100;
  var reward = (CURE_REWARD + (day - 1) * 2) * (pet.vip ? 2.2 : 1);
  if (tip) { reward += TIP_BONUS + (day - 1); }
  reward = Math.round(reward);
  cash += reward; dayEarned += reward;
  served++;
  pet.state = 'done'; pet.faceT = 0.9;
  st.pet = null; st.progress = 0;
  GF.spawnParticles(st.x + st.w / 2, st.y + st.h * 0.4, '#9be7c4', 16);
  GF.spawnFloat(st.x + st.w / 2, st.y + 14 * GF.S, '+$' + reward, tip ? '#ffd95a' : '#9be7c4');
  if (tip) { GF.sfx('reward'); GF.spawnFloat(st.x + st.w / 2, st.y - 6 * GF.S, GF.t('tip_pop'), '#ffd95a'); }
  else GF.sfx('coin');
  save();
  // day complete?
  if (served >= dayQuota) endDay();
}

function petLeavesAngry(pet) {
  pet.state = 'leaving'; pet.leaveT = 0.6;
  hearts--;
  flashT = 0.4;
  GF.setShake(0.5);
  GF.sfx('hurt');
  GF.spawnFloat(pet.seatX, pet.seatY - 16 * GF.S, '-1', '#ff5a6a');
  if (selected === pet.id) selected = null;
  if (hearts <= 0) gameOver();
  save();
}

// ── day end / summary ───────────────────────────────────────────────
function endDay() {
  // clear any leftover waiting pets gracefully (they go home happy, no penalty)
  for (var i = 0; i < pets.length; i++) if (pets[i].state === 'wait' || pets[i].state === 'walking') pets[i].state = 'done', pets[i].faceT = 0.5;
  gs = 'SUMMARY';
  selected = null;
  // figure out the next type that will unlock (for the preview line)
  nextUnlockType = null;
  for (var k = 0; k < TYPES.length; k++) { if (TYPES[k].order === day + 1) { nextUnlockType = TYPES[k].id; break; } }
  buildSummaryRows();
  GF.sfx('win');
  GF.gameEnded();
  GF.ads.interstitial();
  save();
}

// build the purchasable upgrade rows for the summary (deep tree)
function buildSummaryRows() {
  summaryRows = [];
  // 1) New station for the type unlocking THIS upcoming day (if any & not owned)
  if (nextUnlockType && !ownedTypes[nextUnlockType]) {
    summaryRows.push({ kind: 'station', type: nextUnlockType, cost: stationCost(nextUnlockType), tag: 'new' });
  }
  // 2) Duplicate bays for each owned type (parallelise) — capped so the board
  //    stays readable; past the cap, depth comes from assistants/speed/dispenser.
  var uts = unlockedTypes();
  if (stations.length < STATION_CAP) {
    for (var i = 0; i < uts.length; i++) {
      var t = uts[i];
      if (ownedTypes[t.id] && (ownedTypes[t.id] < DUP_CAP_PER_TYPE)) summaryRows.push({ kind: 'dup', type: t.id, cost: dupCost(t.id) });
    }
  }
  // 3) Hire assistant (auto-run a bay)
  summaryRows.push({ kind: 'assistant', cost: assistantCost() });
  // 4) Faster service (repeatable)
  summaryRows.push({ kind: 'speed', cost: speedCost() });
  // 5) Treat dispenser (slow patience drain, repeatable)
  summaryRows.push({ kind: 'dispenser', cost: dispenserCost() });
  // 6) Add a waiting seat (repeatable)
  summaryRows.push({ kind: 'seat', cost: seatCost() });
}

// New-station cost scales with the DAY it unlocks (its `order`), tuned to ~65-80%
// of that day's expected earnings so the "new condition each day" cadence holds
// without stalling. Day2 ~88, Day3 ~158, Day4 ~240, Day5 ~333.
function stationCost(typeId)  { var ord = typeById(typeId).order; return Math.round(35 * Math.pow(ord, 1.35)); }
function dupCost(typeId)      { var c = (ownedTypes[typeId] || 1); return Math.round(60 * Math.pow(UPGRADE_COST_GROW, c)); }
function assistantCost()      { return Math.round(80 * Math.pow(UPGRADE_COST_GROW, assistantsBought)); }
function speedCost()          { return Math.round(55 * Math.pow(UPGRADE_COST_GROW, speedLevel)); }
function dispenserCost()      { return Math.round(50 * Math.pow(UPGRADE_COST_GROW, dispenserLevel)); }
function seatCost()           { return Math.round(45 * Math.pow(UPGRADE_COST_GROW, seatBonus)); }

function buyRow(row) {
  if (!row || cash < row.cost) { GF.sfx('error'); return false; }
  if (row.kind === 'station')      { cash -= row.cost; addStation(row.type); }
  else if (row.kind === 'dup')     {
    if (stations.length >= STATION_CAP || (ownedTypes[row.type] || 0) >= DUP_CAP_PER_TYPE) { GF.sfx('error'); return false; }
    cash -= row.cost; addStation(row.type);
  }
  else if (row.kind === 'assistant'){
    // attach to the first owned station that has no assistant yet
    var target = null;
    for (var i = 0; i < stations.length; i++) if (!stations[i].assistant) { target = stations[i]; break; }
    if (!target) { GF.sfx('error'); return false; }
    cash -= row.cost; target.assistant = true; assistantsBought++;
  }
  else if (row.kind === 'speed')   { cash -= row.cost; speedLevel++; }
  else if (row.kind === 'dispenser'){ cash -= row.cost; dispenserLevel++; }
  else if (row.kind === 'seat')    { cash -= row.cost; seatBonus++; }
  GF.sfx('levelup');
  GF.setShake(0.18);
  buildSummaryRows();   // refresh costs / availability
  save();
  return true;
}

function nextDay() {
  startDay(day + 1, false);
}

// ── persistence (Yandex 1.9) ────────────────────────────────────────
function save() { GF.saveRun(); }

// ====================================================================
//  UPDATE
// ====================================================================
function update(dt) {
  GF.tutorial.update(dt);
  if (flashT > 0) flashT -= dt;
  if (dayBanner > 0) dayBanner -= dt;

  // station glow animation always runs (cheap)
  for (var s = 0; s < stations.length; s++) {
    var st = stations[s];
    st.glow += dt * (selected && canSelectedGoTo(st) ? 4 : -4);
    st.glow = GF.clamp(st.glow, 0, 1);
  }

  if (gs !== 'PLAYING') return;
  if (GF.tutorial.active) {
    // during the coach, still let walking/treating animate, but freeze arrivals
    // and the FIRST pet's patience so the opening can't fail.
    updatePetsMotion(dt, true);
    return;
  }

  // arrivals
  arrivalTimer -= dt;
  if (arrivalTimer <= 0) {
    // keep spawning while the day isn't met and we haven't massively overfilled
    if (served + countActivePets() < dayQuota + 2) spawnPet();
    arrivalTimer = arrivalInterval();
  }

  // patience drain (faster with more waiting pets — "encroaching crowd")
  var waiting = waitingPets();
  var crowdMult = 1 + Math.max(0, waiting.length - 1) * 0.16;
  for (var i = 0; i < waiting.length; i++) {
    var p = waiting[i];
    var perSec = (100 / p.patSecs) * crowdMult * drainMult();
    p.patience -= perSec * dt;
    if (p.patience <= 0) { p.patience = 0; petLeavesAngry(p); }
  }

  updatePetsMotion(dt, false);

  // assistants: auto-pull a matching waiting pet into a free bay
  for (var a = 0; a < stations.length; a++) {
    var as = stations[a];
    if (!as.assistant || as.pet) continue;
    var cand = null, best = -1;
    for (var w = 0; w < pets.length; w++) {
      var cp = pets[w];
      if (cp.state === 'wait' && cp.type === as.type) {
        // grab the most urgent (lowest patience) matching pet
        if (best < 0 || cp.patience < best) { best = cp.patience; cand = cp; }
      }
    }
    if (cand) { cand.state = 'walking'; cand.targetStation = as.id; cand.wx = cand.seatX; cand.wy = cand.seatY; }
  }

  // station treatment progress
  for (var t = 0; t < stations.length; t++) {
    var st2 = stations[t];
    if (st2.pet && st2.dur > 0) {
      st2.progress += dt / st2.dur;
      if (st2.progress >= 1) { st2.progress = 1; finishTreatment(st2); }
    }
  }

  // cull finished/left pets
  for (var c = pets.length - 1; c >= 0; c--) {
    var pp = pets[c];
    if (pp.state === 'done') { pp.faceT -= dt; if (pp.faceT <= 0) pets.splice(c, 1); }
    else if (pp.state === 'leaving') { pp.leaveT -= dt; if (pp.leaveT <= 0) pets.splice(c, 1); }
  }
}

function countActivePets() {
  var n = 0; for (var i = 0; i < pets.length; i++) { var s = pets[i].state; if (s === 'wait' || s === 'walking' || s === 'treat') n++; } return n;
}

function updatePetsMotion(dt, frozen) {
  for (var i = 0; i < pets.length; i++) {
    var p = pets[i];
    p.bob += dt * 3;
    if (p.bounce > 0) p.bounce -= dt;
    if (p.faceT > 0 && p.state === 'done') p.faceT -= 0; // handled in cull
    if (p.state === 'walking') {
      var st = findStation(p.targetStation);
      if (!st || st.pet) { // target lost/taken -> back to waiting
        if (st && st.pet) { p.state = 'wait'; p.targetStation = null; continue; }
      }
      var tx = st.x + st.w / 2, ty = st.y + st.h * 0.42;
      var dx = tx - p.wx, dy = ty - p.wy, d = Math.hypot(dx, dy);
      var spd = 520 * GF.S * dt;
      if (d <= spd) {
        p.wx = tx; p.wy = ty;
        // begin treatment
        p.state = 'treat';
        st.pet = p; st.progress = 0;
        st.dur = STATION_TIME * typeById(st.type).treat * speedMult();
      } else { p.wx += dx / d * spd; p.wy += dy / d * spd; }
    }
  }
}

// can the currently-selected pet be assigned to station st?
function canSelectedGoTo(st) {
  if (!selected || st.pet) return false;
  var p = findPet(selected); if (!p || p.state !== 'wait') return false;
  return st.type === p.type;
}

// ====================================================================
//  DRAW
// ====================================================================
function draw(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;

  if (gs === 'MENU') {
    // MENU bg is a CALM full-screen gradient (no clinic-floor seam, which would
    // show through the menu overlay as an ugly horizontal band on desktop).
    drawMenuBg(ctx, W, H);
    drawMenu(ctx);
    return;
  }
  // Drop the MENU's stale centred PLAY rect so a mid-game tap near screen-centre
  // can't re-fire startGame() and reset the run. SUMMARY/GAMEOVER use their own
  // L.* rects via this game's onDown, not the lib's button list.
  GF.clearButtons();
  drawClinicBg(ctx, W, H);

  layout(W, H, S);
  drawTopBar(ctx);
  drawWaitingRoom(ctx);
  drawStations(ctx);
  drawGoalLine(ctx);

  if (dayBanner > 0 && gs === 'PLAYING') drawDayBanner(ctx);

  // damage flash
  if (flashT > 0) { ctx.save(); ctx.globalAlpha = GF.clamp(flashT * 1.6, 0, 0.5); ctx.fillStyle = '#ff2b3a'; ctx.fillRect(0, 0, W, H); ctx.restore(); }

  if (gs === 'SUMMARY') drawSummary(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
  if (helpOpen) drawHelp(ctx);

  // tutorial overlay LAST
  GF.tutorial.draw(ctx);
}

function layout(W, H, S) {
  L.topH = GF.clamp(58 * S, 48, 78);
  L.goalY = L.topH + 4 * S;
  L.goalH = GF.clamp(26 * S, 22, 34);
  // waiting room region
  L.wrTop = L.goalY + L.goalH + 6 * S;
  L.wrBot = L.wrTop + (H - L.topH) * 0.38;
  // stations region
  L.stTop = L.wrBot + 6 * S;
  L.stBot = H - 6 * S;

  // seat slots — responsive grid that fits seatCap()
  layoutSeats(W, H, S);
  // station cards — vertical stack, scroll not needed (cap stations to fit by shrinking)
  layoutStations(W, H, S);

  // HUD buttons
  var bs = GF.clamp(30 * S, 26, 40);
  L.muteBtn = { x: W - bs - 8 * S, y: 6 * S, w: bs, h: bs };
  L.helpBtn = { x: W - bs * 2 - 16 * S, y: 6 * S, w: bs, h: bs };
}

function layoutSeats(W, H, S) {
  L.seats = [];
  var cap = seatCap();
  var cols = cap <= 4 ? 2 : (cap <= 6 ? 3 : 4);
  var rows = Math.ceil(cap / cols);
  var pad = 10 * S;
  var areaW = W - pad * 2, areaH = (L.wrBot - L.wrTop) - pad;
  var cw = areaW / cols, ch = areaH / rows;
  for (var i = 0; i < cap; i++) {
    var r = (i / cols) | 0, c = i % cols;
    L.seats.push({ x: pad + c * cw + cw / 2, y: L.wrTop + pad + r * ch + ch / 2, idx: i });
  }
  // assign waiting pets to seat positions in order
  var wp = waitingPets();
  for (var k = 0; k < wp.length; k++) {
    var seat = L.seats[k % L.seats.length];
    wp[k].seatX = seat.x; wp[k].seatY = seat.y;
    if (wp[k].state === 'wait') { wp[k].wx = seat.x; wp[k].wy = seat.y; }
  }
}

function layoutStations(W, H, S) {
  var n = stations.length;
  var pad = 8 * S, gap = 6 * S;
  var avail = (L.stBot - L.stTop) - pad;
  var hEach = GF.clamp((avail - gap * (n - 1)) / Math.max(1, n), 56 * S, STATION_H * S);
  // if too many to fit, allow 2 columns
  var cols = 1, rows = n;
  if (hEach * n + gap * (n - 1) > avail && n > 3) {
    cols = 2; rows = Math.ceil(n / 2);
    hEach = GF.clamp((avail - gap * (rows - 1)) / Math.max(1, rows), 52 * S, STATION_H * S);
  }
  var cw = (W - pad * 2 - (cols - 1) * gap) / cols;
  for (var i = 0; i < n; i++) {
    var r = (i / cols) | 0, c = i % cols;
    var st = stations[i];
    st.x = pad + c * (cw + gap);
    st.y = L.stTop + pad + r * (hEach + gap);
    st.w = cw; st.h = hEach;
  }
}

// ── background ──────────────────────────────────────────────────────
function drawClinicBg(ctx, W, H) {
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#bfeee4');
  g.addColorStop(0.45, '#9fe0d6');
  g.addColorStop(0.46, '#f3e7d2');
  g.addColorStop(1, '#e6d3b4');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // subtle wall tiles in the upper band
  ctx.save(); ctx.globalAlpha = 0.10; ctx.strokeStyle = '#2a8c7a'; ctx.lineWidth = 1;
  var tile = Math.max(40, W / 8);
  for (var x = 0; x < W; x += tile) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H * 0.45); ctx.stroke(); }
  for (var y = 0; y < H * 0.45; y += tile) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  ctx.restore();
}

// ── top bar ─────────────────────────────────────────────────────────
function drawTopBar(ctx) {
  var W = GF.W, S = GF.S, h = L.topH;
  ctx.save();
  ctx.fillStyle = 'rgba(20, 60, 54, 0.92)';
  ctx.fillRect(0, 0, W, h);
  // cash (left)
  var fs = GF.clamp(17 * S, 13, 22);
  ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'left'; ctx.fillStyle = '#ffe08a';
  drawCoinIcon(ctx, 14 * S, h / 2, fs * 0.5);
  ctx.fillText(fmt(cash), 14 * S + fs * 0.9, h / 2 + 1);
  // day (center, short so it never collides with the hearts on narrow screens)
  ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + GF.clamp(17 * S, 13, 22) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('day') + ' ' + day, W * 0.40, h / 2 + 1);
  // hearts (right, before the mute/help buttons)
  drawHearts(ctx, W - (GF.clamp(30 * S, 26, 40) * 2 + 22 * S), h / 2);
  ctx.restore();
  // mute + help
  drawMuteIconBtn(ctx, L.muteBtn);
  drawHelpBtn(ctx, L.helpBtn);
}

function drawHearts(ctx, rightX, cy) {
  var S = GF.S; var r = GF.clamp(8 * S, 7, 12); var gap = r * 2.4;
  var max = CLINIC_HEARTS;
  var startX = rightX - (max - 1) * gap;
  for (var i = 0; i < max; i++) {
    var filled = i < hearts;
    drawHeart(ctx, startX + i * gap, cy, r, filled);
  }
}

function drawHeart(ctx, x, y, r, filled) {
  ctx.save(); ctx.translate(x, y); ctx.beginPath();
  ctx.moveTo(0, r * 0.35);
  ctx.bezierCurveTo(r * 1.1, -r * 0.7, r * 0.55, -r * 1.25, 0, -r * 0.45);
  ctx.bezierCurveTo(-r * 0.55, -r * 1.25, -r * 1.1, -r * 0.7, 0, r * 0.35);
  ctx.closePath();
  if (filled) { ctx.fillStyle = '#ff5a6a'; ctx.fill(); }
  else { ctx.fillStyle = 'rgba(255,255,255,0.18)'; ctx.fill(); ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.4; ctx.stroke(); }
  ctx.restore();
}

function drawCoinIcon(ctx, x, y, r) {
  ctx.save(); ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28);
  ctx.fillStyle = '#ffd24a'; ctx.fill();
  ctx.lineWidth = Math.max(1, r * 0.18); ctx.strokeStyle = '#c98f1a'; ctx.stroke();
  ctx.fillStyle = '#c98f1a'; ctx.font = 'bold ' + (r * 1.1) + 'px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('$', x, y + 1);
  ctx.restore();
}

function drawMuteIconBtn(ctx, b) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.16)'; GF.rr(ctx, b.x, b.y, b.w, b.h, 8 * GF.S); ctx.fill();
  GF.drawMuteIcon(ctx, b.x + b.w / 2, b.y + b.h / 2, b.w * 0.30, GF.muted);
  ctx.restore();
}

function drawHelpBtn(ctx, b) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.16)'; GF.rr(ctx, b.x, b.y, b.w, b.h, 8 * GF.S); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (b.h * 0.55) + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', b.x + b.w / 2, b.y + b.h / 2 + 1);
  ctx.restore();
}

// ── goal line ───────────────────────────────────────────────────────
function drawGoalLine(ctx) {
  var W = GF.W, S = GF.S;
  var left = Math.max(0, dayQuota - served);
  var prog = GF.t('cured') + ' ' + served + '/' + dayQuota;
  var txt = left > 0 ? (prog + '  ·  ' + left + ' ' + GF.t('quota_left')) : GF.t('quota_done');
  ctx.save(); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = 'rgba(20,60,54,0.85)';
  ctx.fillText(txt, W / 2, L.goalY + L.goalH / 2);
  ctx.restore();
}

// ── waiting room ────────────────────────────────────────────────────
function drawWaitingRoom(ctx) {
  var S = GF.S;
  // empty seat outlines
  for (var i = 0; i < L.seats.length; i++) {
    var s = L.seats[i];
    ctx.save(); ctx.globalAlpha = 0.25; ctx.strokeStyle = '#2a8c7a'; ctx.lineWidth = 2;
    ctx.setLineDash([4 * S, 4 * S]);
    ctx.beginPath(); ctx.arc(s.x, s.y, SEAT_R * S * 0.95, 0, 6.28); ctx.stroke(); ctx.restore();
  }
  // "full" tag
  if (waitingPets().length >= seatCap()) {
    ctx.save(); ctx.fillStyle = 'rgba(224,90,90,0.92)'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.font = 'bold ' + GF.clamp(11 * S, 9, 15) + 'px Inter, system-ui, sans-serif';
    ctx.fillText(GF.t('full'), GF.W / 2, L.wrTop + 2 * S);
    ctx.restore();
  }
  // pets that are waiting or walking get drawn here (walking handled at its wx,wy)
  for (var k = 0; k < pets.length; k++) {
    var p = pets[k];
    if (p.state === 'wait') drawPet(ctx, p, p.seatX, p.seatY, true);
    else if (p.state === 'walking') drawPet(ctx, p, p.wx, p.wy, false);
    else if (p.state === 'leaving') drawPet(ctx, p, p.seatX, p.seatY + (1 - p.leaveT / 0.6) * 30 * S, false, true);
  }
}

// ── a cute vector pet token ─────────────────────────────────────────
function drawPet(ctx, p, x, y, showPatience, angry) {
  var S = GF.S, r = SEAT_R * S;
  var bob = Math.sin(p.bob) * 2 * S;
  y += bob;
  if (p.bounce > 0) y -= Math.sin(p.bounce / 0.4 * 3.14) * 8 * S;
  var sel = (selected === p.id && p.state === 'wait');

  // selection / VIP ring
  if (sel) {
    ctx.save(); ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 4 * S; ctx.shadowColor = '#ffd24a'; ctx.shadowBlur = 12 * S;
    ctx.beginPath(); ctx.arc(x, y, r + 6 * S, 0, 6.28); ctx.stroke(); ctx.restore();
  }
  // patience ring (waiting only)
  if (showPatience && p.state === 'wait') {
    var frac = p.patience / 100;
    var col = frac > 0.5 ? '#5ad07a' : (frac > 0.25 ? '#e0c14a' : '#e05a5a');
    ctx.save(); ctx.lineWidth = 4 * S; ctx.lineCap = 'round';
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(x, y, r + 2 * S, 0, 6.28); ctx.stroke();
    ctx.strokeStyle = col;
    ctx.beginPath(); ctx.arc(x, y, r + 2 * S, -1.57, -1.57 + 6.28 * frac); ctx.stroke();
    ctx.restore();
  }

  drawAnimalFace(ctx, p.species, x, y, r, angry ? 'angry' : (p.state === 'done' ? 'happy' : 'neutral'), p.vip);

  // condition badge (mirrors the station icon) — bottom-right of the token
  var bx = x + r * 0.72, by = y + r * 0.72, br = r * 0.52;
  ctx.save();
  ctx.beginPath(); ctx.arc(bx, by, br, 0, 6.28);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.lineWidth = 2 * S; ctx.strokeStyle = typeById(p.type).accent; ctx.stroke();
  drawTypeIcon(ctx, typeById(p.type), bx, by, br * 0.95);
  ctx.restore();

  // VIP tag
  if (p.vip) {
    ctx.save(); ctx.fillStyle = '#e0a83c'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + (r * 0.42) + 'px Inter, system-ui, sans-serif';
    ctx.fillText(GF.t('vip'), x, y - r - 8 * S);
    ctx.restore();
  }
}

function drawAnimalFace(ctx, species, x, y, r, mood, vip) {
  ctx.save();
  // body/head base color per species
  var col = species === 'dog' ? '#c79a6b' : species === 'cat' ? '#9aa3ad' : species === 'rabbit' ? '#e7dccf' : species === 'bird' ? '#6fc4e0' : '#e0b58a';
  // ears
  ctx.fillStyle = col;
  if (species === 'dog') {
    ctx.beginPath(); ctx.ellipse(x - r * 0.78, y - r * 0.2, r * 0.34, r * 0.6, 0.4, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + r * 0.78, y - r * 0.2, r * 0.34, r * 0.6, -0.4, 0, 6.28); ctx.fill();
  } else if (species === 'cat') {
    ctx.beginPath(); ctx.moveTo(x - r * 0.85, y - r * 0.5); ctx.lineTo(x - r * 0.35, y - r * 0.95); ctx.lineTo(x - r * 0.25, y - r * 0.35); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + r * 0.85, y - r * 0.5); ctx.lineTo(x + r * 0.35, y - r * 0.95); ctx.lineTo(x + r * 0.25, y - r * 0.35); ctx.closePath(); ctx.fill();
  } else if (species === 'rabbit') {
    ctx.beginPath(); ctx.ellipse(x - r * 0.42, y - r * 1.05, r * 0.22, r * 0.7, 0.06, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + r * 0.42, y - r * 1.05, r * 0.22, r * 0.7, -0.06, 0, 6.28); ctx.fill();
  } else if (species === 'bird') {
    ctx.beginPath(); ctx.moveTo(x, y - r * 0.9); ctx.lineTo(x - r * 0.18, y - r * 1.25); ctx.lineTo(x + r * 0.05, y - r * 0.95); ctx.closePath(); ctx.fill();
  }
  // head
  ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28); ctx.fillStyle = col; ctx.fill();
  // muzzle/cheeks lighter
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath(); ctx.ellipse(x, y + r * 0.28, r * 0.55, r * 0.4, 0, 0, 6.28); ctx.fill();
  // eyes
  var ey = y - r * 0.12, ex = r * 0.38;
  ctx.fillStyle = '#2a2320';
  if (mood === 'happy') {
    ctx.lineWidth = r * 0.13; ctx.strokeStyle = '#2a2320'; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(x - ex, ey, r * 0.18, 3.4, 6.0); ctx.stroke();
    ctx.beginPath(); ctx.arc(x + ex, ey, r * 0.18, 3.4, 6.0); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(x - ex, ey, r * 0.15, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(x + ex, ey, r * 0.15, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x - ex + r * 0.05, ey - r * 0.05, r * 0.05, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(x + ex + r * 0.05, ey - r * 0.05, r * 0.05, 0, 6.28); ctx.fill();
  }
  // nose
  ctx.fillStyle = '#7a4a3a'; ctx.beginPath(); ctx.arc(x, y + r * 0.18, r * 0.10, 0, 6.28); ctx.fill();
  // mouth by mood
  ctx.strokeStyle = '#5a3a2a'; ctx.lineWidth = r * 0.08; ctx.lineCap = 'round';
  if (mood === 'angry') { ctx.beginPath(); ctx.arc(x, y + r * 0.55, r * 0.22, 3.6, 5.8); ctx.stroke(); }
  else if (mood === 'happy') { ctx.beginPath(); ctx.arc(x, y + r * 0.32, r * 0.26, 0.3, 2.84); ctx.stroke(); }
  else { ctx.beginPath(); ctx.moveTo(x - r * 0.12, y + r * 0.4); ctx.lineTo(x + r * 0.12, y + r * 0.4); ctx.stroke(); }
  // vip crown trim
  if (vip) {
    ctx.fillStyle = '#ffd24a'; ctx.strokeStyle = '#c98f1a'; ctx.lineWidth = r * 0.05;
    ctx.beginPath();
    ctx.moveTo(x - r * 0.5, y - r * 0.78);
    ctx.lineTo(x - r * 0.5, y - r * 1.05); ctx.lineTo(x - r * 0.22, y - r * 0.85);
    ctx.lineTo(x, y - r * 1.12); ctx.lineTo(x + r * 0.22, y - r * 0.85);
    ctx.lineTo(x + r * 0.5, y - r * 1.05); ctx.lineTo(x + r * 0.5, y - r * 0.78);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}

// ── stations ────────────────────────────────────────────────────────
function drawStations(ctx) {
  var S = GF.S;
  for (var i = 0; i < stations.length; i++) {
    var st = stations[i];
    var t = typeById(st.type);
    var canTake = canSelectedGoTo(st);
    // card
    ctx.save();
    if (st.glow > 0 && canTake) { ctx.shadowColor = '#ffd24a'; ctx.shadowBlur = (8 + st.glow * 14) * S; }
    var g = ctx.createLinearGradient(st.x, st.y, st.x, st.y + st.h);
    g.addColorStop(0, shade(t.accent, 0.14)); g.addColorStop(1, shade(t.accent, -0.16));
    ctx.fillStyle = g; GF.rr(ctx, st.x, st.y, st.w, st.h, 12 * S); ctx.fill();
    ctx.restore();
    // border (brighter if it can take the selected pet)
    ctx.save(); ctx.lineWidth = (canTake ? 3.5 : 1.5) * S;
    ctx.strokeStyle = canTake ? '#ffe08a' : 'rgba(255,255,255,0.25)';
    GF.rr(ctx, st.x, st.y, st.w, st.h, 12 * S); ctx.stroke(); ctx.restore();

    // icon disc (left)
    var ir = Math.min(st.h * 0.32, st.w * 0.16);
    var icx = st.x + ir + 12 * S, icy = st.y + st.h * 0.36;
    ctx.save(); ctx.beginPath(); ctx.arc(icx, icy, ir, 0, 6.28); ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.fill(); ctx.restore();
    drawTypeIcon(ctx, t, icx, icy, ir * 0.95);

    // name + state
    ctx.save(); ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(14 * S, 11, 18) + 'px Inter, system-ui, sans-serif';
    ctx.fillText(GF.t('c_' + st.type), icx + ir + 10 * S, st.y + st.h * 0.30);
    // assistant badge (vector star + AUTO text; no emoji)
    if (st.assistant) {
      var badgeY = st.y + st.h * 0.30 + GF.clamp(16 * S, 13, 20);
      var sr = GF.clamp(6 * S, 5, 9);
      drawStar(ctx, icx + ir + 10 * S + sr, badgeY - sr * 0.2, sr, '#ffd24a');
      ctx.fillStyle = '#ffd24a'; ctx.font = 'bold ' + GF.clamp(10 * S, 8, 13) + 'px Inter, system-ui, sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(GF.t('auto'), icx + ir + 10 * S + sr * 2.4, badgeY);
    }
    ctx.restore();

    // pet inside (during treat)
    if (st.pet) {
      drawPet(ctx, st.pet, st.x + st.w - st.h * 0.4 - 8 * S, st.y + st.h * 0.42, false);
    }

    // progress bar (bottom)
    var bx = icx - ir, bw = st.w - (icx - ir - st.x) - 12 * S, by = st.y + st.h - 14 * S, bh = 7 * S;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.28)'; GF.rr(ctx, bx, by, bw, bh, bh / 2); ctx.fill();
    if (st.pet) {
      ctx.fillStyle = '#9be7c4'; GF.rr(ctx, bx, by, bw * st.progress, bh, bh / 2); ctx.fill();
    } else {
      ctx.fillStyle = canTake ? 'rgba(255,224,138,0.85)' : 'rgba(255,255,255,0.32)';
      ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
      ctx.font = 'bold ' + GF.clamp(10 * S, 8, 13) + 'px Inter, system-ui, sans-serif';
      ctx.fillText(GF.t('free'), bx + 2 * S, by + bh + 1);
    }
    ctx.restore();
  }
}

// vector star (assistant badge / glyph) — no emoji
function drawStar(ctx, x, y, r, col) {
  ctx.save(); ctx.translate(x, y); ctx.beginPath();
  for (var i = 0; i < 5; i++) {
    var a = -1.5708 + i * 1.2566;
    ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    var a2 = a + 0.6283;
    ctx.lineTo(Math.cos(a2) * r * 0.45, Math.sin(a2) * r * 0.45);
  }
  ctx.closePath(); ctx.fillStyle = col; ctx.fill(); ctx.restore();
}

// vector glyphs for non-typed upgrade rows (assistant/speed/dispenser/seat) — no emoji
function drawUpgradeGlyph(ctx, kind, x, y, r) {
  ctx.save(); ctx.translate(x, y);
  ctx.strokeStyle = '#fff'; ctx.fillStyle = '#fff'; ctx.lineWidth = Math.max(2, r * 0.3); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (kind === 'assistant') {
    ctx.restore(); drawStar(ctx, x, y, r * 1.15, '#fff'); return;
  } else if (kind === 'speed') {
    // double chevron »
    ctx.beginPath(); ctx.moveTo(-r * 0.6, -r * 0.6); ctx.lineTo(0, 0); ctx.lineTo(-r * 0.6, r * 0.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -r * 0.6); ctx.lineTo(r * 0.6, 0); ctx.lineTo(0, r * 0.6); ctx.stroke();
  } else if (kind === 'dispenser') {
    // heart (calm pets) drawn as a filled vector heart
    ctx.beginPath();
    ctx.moveTo(0, r * 0.5);
    ctx.bezierCurveTo(r * 1.1, -r * 0.55, r * 0.5, -r, 0, -r * 0.3);
    ctx.bezierCurveTo(-r * 0.5, -r, -r * 1.1, -r * 0.55, 0, r * 0.5);
    ctx.closePath(); ctx.fill();
  } else {
    // plus (seat / generic add)
    ctx.beginPath(); ctx.moveTo(0, -r * 0.7); ctx.lineTo(0, r * 0.7); ctx.moveTo(-r * 0.7, 0); ctx.lineTo(r * 0.7, 0); ctx.stroke();
  }
  ctx.restore();
}

// vector station/condition icons
function drawTypeIcon(ctx, t, x, y, r) {
  ctx.save(); ctx.translate(x, y);
  ctx.strokeStyle = t.accent; ctx.fillStyle = t.accent; ctx.lineWidth = Math.max(2, r * 0.22); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (t.icon === 'cross') {
    ctx.beginPath(); ctx.moveTo(0, -r * 0.7); ctx.lineTo(0, r * 0.7); ctx.moveTo(-r * 0.7, 0); ctx.lineTo(r * 0.7, 0); ctx.stroke();
  } else if (t.icon === 'bath') {
    // water drop + sparkle (grooming)
    ctx.beginPath(); ctx.moveTo(0, -r * 0.75); ctx.bezierCurveTo(r * 0.7, -r * 0.05, r * 0.5, r * 0.7, 0, r * 0.7); ctx.bezierCurveTo(-r * 0.5, r * 0.7, -r * 0.7, -r * 0.05, 0, -r * 0.75); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(1, r * 0.12); ctx.beginPath(); ctx.arc(-r * 0.15, r * 0.15, r * 0.18, 1.2, 3.2); ctx.stroke();
  } else if (t.icon === 'bone') {
    ctx.lineWidth = Math.max(2, r * 0.34);
    ctx.beginPath(); ctx.moveTo(-r * 0.5, -r * 0.4); ctx.lineTo(r * 0.5, r * 0.4); ctx.stroke();
    ctx.fillStyle = t.accent;
    [[-r * 0.5, -r * 0.4], [r * 0.5, r * 0.4]].forEach(function (e) {
      ctx.beginPath(); ctx.arc(e[0] - r * 0.16, e[1] - r * 0.16, r * 0.2, 0, 6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(e[0] + r * 0.16, e[1] + r * 0.16, r * 0.2, 0, 6.28); ctx.fill();
    });
  } else if (t.icon === 'syringe') {
    ctx.beginPath(); ctx.moveTo(-r * 0.55, r * 0.55); ctx.lineTo(r * 0.45, -r * 0.45); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r * 0.2, -r * 0.65); ctx.lineTo(r * 0.65, -r * 0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r * 0.6, r * 0.35); ctx.lineTo(-r * 0.35, r * 0.6); ctx.stroke();
  } else if (t.icon === 'tooth') {
    ctx.beginPath();
    ctx.moveTo(-r * 0.55, -r * 0.3);
    ctx.bezierCurveTo(-r * 0.6, -r * 0.8, r * 0.6, -r * 0.8, r * 0.55, -r * 0.3);
    ctx.bezierCurveTo(r * 0.5, r * 0.2, r * 0.3, r * 0.8, r * 0.18, r * 0.35);
    ctx.bezierCurveTo(r * 0.08, r * 0.0, -r * 0.08, r * 0.0, -r * 0.18, r * 0.35);
    ctx.bezierCurveTo(-r * 0.3, r * 0.8, -r * 0.5, r * 0.2, -r * 0.55, -r * 0.3);
    ctx.closePath(); ctx.fill();
  } else if (t.icon === 'pulse') {
    ctx.beginPath();
    ctx.moveTo(-r * 0.75, 0); ctx.lineTo(-r * 0.3, 0); ctx.lineTo(-r * 0.1, -r * 0.55);
    ctx.lineTo(r * 0.12, r * 0.55); ctx.lineTo(r * 0.32, 0); ctx.lineTo(r * 0.75, 0);
    ctx.stroke();
  }
  ctx.restore();
}

// ── day banner ──────────────────────────────────────────────────────
function drawDayBanner(ctx) {
  var W = GF.W, S = GF.S;
  var a = GF.clamp(dayBanner * 1.4, 0, 1);
  ctx.save(); ctx.globalAlpha = a; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(20,60,54,0.92)';
  var bw = Math.min(W * 0.72, 360 * S), bh = 56 * S, by = GF.H * 0.30;
  GF.rr(ctx, W / 2 - bw / 2, by - bh / 2, bw, bh, 14 * S); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(24 * S, 18, 32) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('day') + ' ' + day, W / 2, by);

// ── color helper ────────────────────────────────────────────────────
function shade(hex, amt) {
  var c = hex.replace('#', '');
  if (c.length === 3) c = c[0] + c[0] + c[1] + c[1] + c[2] + c[2];
  var r = parseInt(c.substr(0, 2), 16), g = parseInt(c.substr(2, 2), 16), b = parseInt(c.substr(4, 2), 16);
  r = Math.round(GF.clamp(r + amt * 255, 0, 255));
  g = Math.round(GF.clamp(g + amt * 255, 0, 255));
  b = Math.round(GF.clamp(b + amt * 255, 0, 255));
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

// ── overlays ────────────────────────────────────────────────────────
function panel(ctx, titleTxt) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.save(); ctx.fillStyle = 'rgba(8,20,18,0.7)'; ctx.fillRect(0, 0, W, H); ctx.restore();
  var pw = Math.min(W * 0.9, 440 * S), ph = Math.min(H * 0.86, 660 * S);
  var px = (W - pw) / 2, py = (H - ph) / 2;
  ctx.save();
  ctx.fillStyle = '#f3efe4'; GF.rr(ctx, px, py, pw, ph, 18 * S); ctx.fill();
  ctx.strokeStyle = '#2a8c7a'; ctx.lineWidth = 3 * S; GF.rr(ctx, px, py, pw, ph, 18 * S); ctx.stroke();
  ctx.fillStyle = '#1a4c44'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + GF.clamp(22 * S, 17, 28) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(titleTxt, W / 2, py + 18 * S);
  ctx.restore();
  return { px: px, py: py, pw: pw, ph: ph };
}

function bigBtn(ctx, rect, label, c1, c2) {
  var S = GF.S;
  var g = ctx.createLinearGradient(rect.x, rect.y, rect.x, rect.y + rect.h);
  g.addColorStop(0, c1); g.addColorStop(1, c2);
  ctx.save(); GF.rr(ctx, rect.x, rect.y, rect.w, rect.h, rect.h / 2); ctx.fillStyle = g; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(17 * S, 13, 22) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2 + 1);
  ctx.restore();
}

// ── SUMMARY (between days) — scrollable upgrade list ────────────────
function drawSummary(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  var p = panel(ctx, GF.t('day_complete').replace('{n}', day));
  // earned line
  ctx.save(); ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillStyle = '#1a4c44';
  ctx.font = 'bold ' + GF.clamp(15 * S, 12, 19) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('earned') + ': $' + fmt(dayEarned) + '   ·   ' + GF.t('cash') + ': $' + fmt(cash), W / 2, p.py + 50 * S);
  ctx.font = GF.clamp(13 * S, 10, 16) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#3a6c64';
  ctx.fillText(GF.t('upgrades'), W / 2, p.py + 74 * S);
  ctx.restore();

  // list region
  var listTop = p.py + 96 * S;
  var btnH = GF.clamp(BTN_H * S, 44, 62);
  var listBot = p.py + p.ph - btnH - 22 * S;
  var listX = p.px + 14 * S, listW = p.pw - 28 * S;
  var rowH = GF.clamp(56 * S, 48, 66), rowGap = 8 * S;

  if (!shopScroll) shopScroll = GF.makeScroll('vetsummary', { x: listX, y: listTop, w: listW, h: listBot - listTop });
  shopScroll.setViewport({ x: listX, y: listTop, w: listW, h: listBot - listTop });
  var contentH = summaryRows.length * (rowH + rowGap);
  shopScroll.setContentHeight(contentH);
  shopScroll.update();

  // Rows are drawn in CONTENT space (begin() already translates by vp.y - offset),
  // so row i sits at content-y = i*(rowH+rowGap). Hit-rects store the same content-y;
  // hitScrolled() maps a screen tap into content space via screenToContentY.
  L.summaryRowRects = [];
  shopScroll.begin(ctx);
  for (var i = 0; i < summaryRows.length; i++) {
    var row = summaryRows[i];
    var cy = i * (rowH + rowGap);
    L.summaryRowRects.push({ x: listX, y: cy, w: listW, h: rowH, row: row });
    drawUpgradeRow(ctx, row, listX, cy, listW, rowH);
  }
  shopScroll.end(ctx);
  shopScroll.draw(ctx);   // scrollbar + top/bottom fades so the player knows there's more

  // NEXT DAY button
  L.nextDayBtn = { x: p.px + 20 * S, y: p.py + p.ph - btnH - 14 * S, w: p.pw - 40 * S, h: btnH };
  var nlabel = GF.t('next_day');
  if (nextUnlockType && !ownedTypes[nextUnlockType]) {} // preview shown per-row
  bigBtn(ctx, L.nextDayBtn, nlabel, '#3fd08a', '#2aa86a');
}

function drawUpgradeRow(ctx, row, x, y, w, h) {
  var S = GF.S;
  var affordable = cash >= row.cost;
  ctx.save();
  ctx.fillStyle = affordable ? 'rgba(63,176,138,0.18)' : 'rgba(120,120,120,0.12)';
  GF.rr(ctx, x, y, w, h, 12 * S); ctx.fill();
  if (affordable) { ctx.strokeStyle = '#3fd08a'; ctx.lineWidth = 2 * S; GF.rr(ctx, x, y, w, h, 12 * S); ctx.stroke(); }
  // icon disc
  var ir = h * 0.32, icx = x + ir + 10 * S, icy = y + h / 2;
  if (row.type) {
    var t = typeById(row.type);
    ctx.beginPath(); ctx.arc(icx, icy, ir, 0, 6.28); ctx.fillStyle = '#fff'; ctx.fill();
    ctx.lineWidth = 2 * S; ctx.strokeStyle = t.accent; ctx.stroke();
    drawTypeIcon(ctx, t, icx, icy, ir * 0.9);
  } else {
    var disc = row.kind === 'assistant' ? '#ffd24a' : (row.kind === 'speed' ? '#5ad0c4' : (row.kind === 'dispenser' ? '#e08a5a' : '#8a9ad0'));
    ctx.beginPath(); ctx.arc(icx, icy, ir, 0, 6.28); ctx.fillStyle = disc; ctx.fill();
    drawUpgradeGlyph(ctx, row.kind, icx, icy, ir * 0.6);
  }
  // name + effect
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  var name = upgradeName(row), eff = upgradeEff(row);
  ctx.fillStyle = '#1a4c44'; ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(name, icx + ir + 10 * S, y + h * 0.34);
  ctx.fillStyle = '#3a6c64'; ctx.font = GF.clamp(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(eff, icx + ir + 10 * S, y + h * 0.66);
  // "new" tag
  if (row.tag === 'new') {
    ctx.fillStyle = '#e05a7a'; ctx.font = 'bold ' + GF.clamp(9 * S, 8, 12) + 'px Inter, system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(GF.t('new_today').toUpperCase(), icx + ir + 10 * S, y + h * 0.06 + 6 * S);
  }
  // cost (right)
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = affordable ? '#1a7c54' : '#a05a5a';
  ctx.font = 'bold ' + GF.clamp(14 * S, 11, 18) + 'px Inter, system-ui, sans-serif';
  ctx.fillText('$' + fmt(row.cost), x + w - 12 * S, y + h / 2);
  ctx.restore();
}

function upgradeName(row) {
  if (row.kind === 'station') return GF.t('c_' + row.type);
  if (row.kind === 'dup') return GF.t('u_dup') + ' ' + GF.t('c_' + row.type);
  return GF.t('u_' + row.kind);
}
function upgradeEff(row) {
  if (row.kind === 'station') return GF.t('cond_' + row.type) + ' - ' + GF.t('eff_station');
  if (row.kind === 'dup') return GF.t('eff_dup');
  return GF.t('eff_' + row.kind);
}

// measured word-wrap; returns the y AFTER the last drawn line
function wrapText(ctx, text, x, y, maxW, lh) {
  var words = String(text).split(/\s+/), cur = '', yy = y;
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { ctx.fillText(cur, x, yy); yy += lh; cur = words[i]; }
    else cur = probe;
  }
  if (cur) { ctx.fillText(cur, x, yy); }
  return yy;
}

// Calm menu background — smooth teal->deep gradient (NO seam) + a soft radial
// vignette that centres focus on the title/PLAY so the menu reads as intentional
// on a wide desktop instead of a tiny block floating in empty space.
function drawMenuBg(ctx, W, H) {
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#173a3a');
  g.addColorStop(0.5, '#10302f');
  g.addColorStop(1, '#0b2422');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // subtle wall tiles, full-height, very faint (keeps the vet-clinic flavour)
  ctx.save(); ctx.globalAlpha = 0.06; ctx.strokeStyle = '#5fd0bf'; ctx.lineWidth = 1;
  var tile = Math.max(48, W / 12);
  for (var x = tile; x < W; x += tile) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (var y = tile; y < H; y += tile) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  ctx.restore();
  // centre glow
  var rg = ctx.createRadialGradient(W/2, H*0.46, 0, W/2, H*0.46, Math.max(W, H) * 0.6);
  rg.addColorStop(0, 'rgba(46,224,170,0.12)');
  rg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
}

// ── MENU (gallery only; platform builds autostart) ──────────────────
function drawMenu(ctx) {
  GF.drawOverlay({
    title: GF.t('title'), sub: GF.t('sub'),

    bestText: bestDay > 0 ? GF.t('best') + ': ' + bestDay : null,

// ====================================================================
//  INPUT (pointer; rect-scale recompute each event; tap-only)
// ====================================================================
function evtPos(e) {
  var rect = canvas.getBoundingClientRect();
  var sx = canvas.width / rect.width, sy = canvas.height / rect.height;
  var cx = (e.touches ? e.touches[0].clientX : e.clientX);
  var cy = (e.touches ? e.touches[0].clientY : e.clientY);
  return { x: (cx - rect.left) * sx, y: (cy - rect.top) * sy };
}
function hit(r, x, y) { return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
function hitScrolled(rect, x, y, sc) {
  if (!rect || !sc) return false;
  if (!sc.contains(x, y)) return false;
  var cy = sc.screenToContentY(y);
  return x >= rect.x && x <= rect.x + rect.w && cy >= rect.y && cy <= rect.y + rect.h;
}

var canvas = GF.canvas;
var pointerDown = false, TAP_SLOP = 8, press = null;

function onDown(x, y) {
  // tutorial routing: skip pill consumes; 'auto' swallows; 'manual' falls through
  if (GF.tutorial.active) {
    var stp = GF.tutorial.steps[GF.tutorial.step];
    var sb = GF.tutorial._skipBtn;
    if (sb && x >= sb.x && x <= sb.x + sb.w && y >= sb.y && y <= sb.y + sb.h) { GF.tutorial.handleClick(x, y); return; }
    if (stp && stp.advance === 'auto') return;
    // manual step — fall through to the real selection / assignment below
  }

  // overlays first
  if (helpOpen) { if (hit(L.helpClose, x, y)) { helpOpen = false; GF.sfx('tap'); } return; }
  if (gs === 'GAMEOVER') {
    if (hit(L.retryBtn, x, y)) { startGame(); }
    else if (hit(L.goHelpBtn, x, y)) { helpOpen = true; GF.sfx('tap'); }
    return;
  }
  if (gs === 'SUMMARY') {
    if (hit(L.nextDayBtn, x, y)) { nextDay(); return; }
    if (shopScroll && shopScroll.contains(x, y)) { press = { x0: x, y0: y, scroll: shopScroll, moved: false }; return; }
    return;
  }
  if (gs === 'MENU') return;   // drawOverlay's own button handler covers PLAY

  // PLAYING:
  if (hit(L.muteBtn, x, y)) { var m = GF.toggleMute(); GF.setMusicMuted(m); GF.sfx('tap'); return; }
  if (hit(L.helpBtn, x, y)) { helpOpen = true; GF.sfx('tap'); return; }

  // 1) tap a station with a pet selected -> try assign
  for (var s = 0; s < stations.length; s++) {
    var st = stations[s];
    if (x >= st.x && x <= st.x + st.w && y >= st.y && y <= st.y + st.h) {
      if (selected) {
        var pet = findPet(selected);
        var ok = tryAssign(pet, st);
        if (ok && GF.tutorial.active) {
          var cs = GF.tutorial.steps[GF.tutorial.step];
          if (cs && cs.advance === 'manual' && GF.tutorial.step === 1) GF.tutorial.next();
        }
      } else { GF.sfx('tap'); }
      return;
    }
  }

  // 2) tap a waiting pet -> select / deselect
  var wp = waitingPets();
  var bestId = null, bestD = 1e9;
  for (var i = 0; i < wp.length; i++) {
    var p = wp[i];
    var dx = x - p.seatX, dy = y - p.seatY, d = dx * dx + dy * dy;
    var rr = (SEAT_R * GF.S + 18 * GF.S); rr = rr * rr;
    if (d <= rr && d < bestD) { bestD = d; bestId = p.id; }
  }
  if (bestId !== null) {
    if (selected === bestId) { selected = null; GF.sfx('tap'); }
    else {
      selected = bestId; GF.sfx('click');
      if (GF.tutorial.active) {
        var cs2 = GF.tutorial.steps[GF.tutorial.step];
        if (cs2 && cs2.advance === 'manual' && GF.tutorial.step === 0) GF.tutorial.next();
      }
    }
    return;
  }
  // tapped empty space -> deselect
  if (selected) { selected = null; }
}

function onMove(x, y) {
  if (press) {
    if (!press.moved && (Math.abs(x - press.x0) > TAP_SLOP || Math.abs(y - press.y0) > TAP_SLOP)) {
      press.moved = true; if (press.scroll) press.scroll.dragStart(press.y0);
    }
    if (press.moved && press.scroll) press.scroll.dragMove(y);
  }
}
function onUp(x, y) {
  if (press) {
    if (press.scroll) press.scroll.dragEnd();
    if (!press.moved) summaryTap(x, y);
    press = null;
  }
}
function summaryTap(x, y) {
  if (!L.summaryRowRects || !shopScroll) return;
  for (var i = 0; i < L.summaryRowRects.length; i++) {
    var rr = L.summaryRowRects[i];
    if (hitScrolled(rr, x, y, shopScroll)) { buyRow(rr.row); return; }
  }
}
function onWheel(dy) { if (shopScroll && gs === 'SUMMARY') shopScroll.handleWheel(dy); }

canvas.addEventListener('mousedown', function (e) { e.preventDefault(); var p = evtPos(e); pointerDown = true; onDown(p.x, p.y); });
window.addEventListener('mousemove', function (e) { if (!pointerDown) return; var p = evtPos(e); onMove(p.x, p.y); });
window.addEventListener('mouseup', function (e) { if (!pointerDown) return; pointerDown = false; var p = evtPos(e); onUp(p.x, p.y); });
canvas.addEventListener('touchstart', function (e) { e.preventDefault(); var p = evtPos(e); pointerDown = true; onDown(p.x, p.y); }, { passive: false });
canvas.addEventListener('touchmove', function (e) { e.preventDefault(); if (!pointerDown) return; var p = evtPos(e); onMove(p.x, p.y); }, { passive: false });
canvas.addEventListener('touchend', function (e) { e.preventDefault(); if (!pointerDown) return; pointerDown = false; var t = e.changedTouches[0]; var rect = canvas.getBoundingClientRect(); var sx = canvas.width / rect.width, sy = canvas.height / rect.height; onUp((t.clientX - rect.left) * sx, (t.clientY - rect.top) * sy); }, { passive: false });
canvas.addEventListener('wheel', function (e) { var rect = canvas.getBoundingClientRect(); var sy = canvas.height / rect.height; onWheel(e.deltaY * sy); }, { passive: false });

// ====================================================================
//  TUTORIAL (demo hand, action-gated)
// ====================================================================
function startTutorial(force) {
  GF.tutorial.start([
    { text: GF.t('tut_step_pick'),
      target: function () {
        var wp = waitingPets();
        if (wp.length) return { x: wp[0].seatX, y: wp[0].seatY, r: SEAT_R * GF.S };
        return { x: GF.cx, y: L.wrTop ? (L.wrTop + 40 * GF.S) : GF.cy, r: SEAT_R * GF.S };
      },
      gesture: 'tap', advance: 'manual' },
    { text: GF.t('tut_step_assign'),
      target: function () {
        // point at the first FREE station that matches the selected pet (or any matching the first waiting pet)
        var want = null;
        var sp = selected ? findPet(selected) : null;
        var wp = waitingPets();
        var refType = sp ? sp.type : (wp.length ? wp[0].type : null);
        for (var i = 0; i < stations.length; i++) {
          var st = stations[i];
          if (!st.pet && (refType == null || st.type === refType)) { want = st; break; }
        }
        if (!want && stations.length) want = stations[0];
        if (want) return { x: want.x + want.w / 2, y: want.y + want.h / 2, r: Math.min(want.w, want.h) * 0.4 };
        return { x: GF.cx, y: GF.H * 0.7, r: 40 * GF.S };
      },
      gesture: 'tap', advance: 'manual' },
    { text: GF.t('tut_step_done'), advance: 'auto', after: 2200,
      onAdvance: function () { firstPetFrozen = false; } },
  ], { storageKey: 'pet_vet_rush_seen_tutorial', force: !!force });
  if (force) GF.tutorial.reopen();
}

// ====================================================================
//  BOOT
// ====================================================================
GF.init({
  designW: 480,
  designH: 854,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'pet_vet_rush',
  onReady: function () {
    try { bestDay = parseInt(localStorage.getItem('pet_vet_rush_best') || '0') || 0; } catch (e) {}

    // Yandex 1.9 — persist run across reload
    GF.persist('pet_vet_rush_run_v1',
      function () {
        return {
          gs: gs, day: day, cash: cash, dayEarned: dayEarned, hearts: hearts,
          served: served, dayQuota: dayQuota, spawnedThisDay: spawnedThisDay,
          speedLevel: speedLevel, dispenserLevel: dispenserLevel, seatBonus: seatBonus,
          assistantsBought: assistantsBought,
          stations: stations.map(function (s) { return { type: s.type, assistant: s.assistant }; }),
          ownedTypes: ownedTypes,
        };
      },
      function (s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        day = s.day || 1; cash = s.cash || 0; dayEarned = s.dayEarned || 0;
        hearts = (typeof s.hearts === 'number') ? s.hearts : CLINIC_HEARTS;
        served = s.served || 0; dayQuota = s.dayQuota || QUOTA_BASE;
        spawnedThisDay = s.spawnedThisDay || 0;
        speedLevel = s.speedLevel || 0; dispenserLevel = s.dispenserLevel || 0;
        seatBonus = s.seatBonus || 0; assistantsBought = s.assistantsBought || 0;
        // rebuild stations from saved types
        stations = []; ownedTypes = {}; stationSeq = 1;
        if (s.stations && s.stations.length) {
          for (var i = 0; i < s.stations.length; i++) { addStation(s.stations[i].type); if (s.stations[i].assistant) stations[stations.length - 1].assistant = true; }
        } else { addStation('exam'); addStation('bath'); }
        pets = []; selected = null; arrivalTimer = 0.6;
        // a restored mid-day run resumes PLAYING; SUMMARY rebuilds its rows
        if (gs === 'SUMMARY') { nextUnlockType = null; for (var k = 0; k < TYPES.length; k++) if (TYPES[k].order === day + 1) { nextUnlockType = TYPES[k].id; break; } buildSummaryRows(); }
        if (gs === 'GAMEOVER') { /* keep */ }
      }
    );
    // safe entry on a fresh boot (no saved run): menu on gallery
    if (gs === 'PLAYING' && stations.length === 0) gs = 'MENU';
    if (gs === 'MENU') { /* gallery shows menu */ }

    // Reachability gate hooks (prove every interactive rect is reachable).
    GF.exposeReach(reachState);
    GF.exposeTour(REACH_TOUR);

    // MUSIC (HARD RULE 8) — cozy bed, mute-aware
    GF.startMusic({ preset: 'cozy', muted: GF.muted });

    // PLATFORM AUTOSTART (HARD RULE 9) — drop straight into PLAYING
    if (window.__GF_AUTOSTART && !window._silent) {
      if (gs !== 'PLAYING') startGame();
    }
  },
  onUpdate: update,
  onDraw: draw,
});

// ── screenshot helper: jump into a busy mid-day clinic ──────────────
window._setupForScreenshot = function (level) {
  window._silent = true;
  resetRun();
  var targetDay = Math.max(3, (level || 4));
  // fast-forward day & unlocks
  day = targetDay;
  dayQuota = QUOTA_BASE + (day - 1) * QUOTA_GROW;
  // own all unlocked types + a couple of duplicates + an assistant for richness
  stations = []; ownedTypes = {};
  var uts = unlockedTypes();
  for (var i = 0; i < uts.length; i++) addStation(uts[i].id);
  addStation('exam'); addStation('bath');     // duplicates
  stations[0].assistant = true;
  speedLevel = 2; dispenserLevel = 1; seatBonus = 2; assistantsBought = 1;
  cash = 320; served = 2;
  gs = 'PLAYING'; GF.tutorial.active = false;
  pets = [];
  // fill the waiting room with a variety of conditions + a VIP, mid-patience
  var fillN = Math.min(seatCap(), 6);
  for (var k = 0; k < fillN; k++) {
    var t = uts[k % uts.length];
    pets.push({ id: petSeq++, type: t.id, species: SPECIES[k % SPECIES.length], state: 'wait',
      patience: 35 + (k * 11) % 55, patMax: 100, patSecs: 12, vip: (k === 1),
      seatX: 0, seatY: 0, wx: 0, wy: 0, targetStation: null, bob: k, faceT: 0, leaveT: 0, bounce: 0 });
  }
  // put one pet into treatment so a progress bar shows
  if (stations.length > 2) {
    var tp = { id: petSeq++, type: stations[2].type, species: 'rabbit', state: 'treat',
      patience: 80, patMax: 100, patSecs: 12, vip: false, seatX: 0, seatY: 0, wx: 0, wy: 0, targetStation: stations[2].id, bob: 0, faceT: 0, leaveT: 0, bounce: 0 };
    pets.push(tp); stations[2].pet = tp; stations[2].progress = 0.55; stations[2].dur = STATION_TIME;
  }
  selected = pets.length ? pets[0].id : null;   // show a selected pet + glowing stations
};
// _jumpLevel: gate driver. Small n -> a busy mid-day clinic (reachability /
// playing). Large n (e.g. 99) -> force the terminal GAMEOVER so the runtime
// gate can verify the lose state + the post-terminal click cycle.
window._jumpLevel = function (n) {
  n = n || 3;
  window._silent = true;
  if (GF.tutorial) GF.tutorial.active = false;
  if (n >= 50) {
    if (!stations.length) resetRun();
    day = Math.max(day, 4);
    hearts = 0;
    gameOver();
    return;
  }
  window._setupForScreenshot(n);
};

// ====================================================================
//  REACHABILITY GATE HOOKS (every interactive rect must be reachable)
// ====================================================================
function reachState() {
  var S = GF.S;
  var res = { screen: gs, viewportH: GF.H, screenH: GF.H, items: [] };
  var items = res.items;
  function push(id, r, pinned) { if (!r) return; items.push({ id: id, x: r.x, y: r.y, w: r.w, h: r.h, pinned: !!pinned }); }
  if (helpOpen) { push('help_close', L.helpClose, true); return res; }
  if (gs === 'GAMEOVER') { push('retry', L.retryBtn, true); push('help', L.goHelpBtn, true); return res; }
  if (gs === 'SUMMARY') {
    push('next_day', L.nextDayBtn, true);
    if (L.summaryRowRects && shopScroll) {
      res.scrollId = 'vetsummary';
      res.viewportH = shopScroll.vp.h;
      for (var i = 0; i < L.summaryRowRects.length; i++) { var rr = L.summaryRowRects[i]; push('uprow_' + i, { x: rr.x, y: rr.y, w: rr.w, h: rr.h }); }
    }
    return res;
  }
  if (gs === 'MENU') return res;   // drawOverlay button handled by lib
  // PLAYING — pinned HUD + seats + stations
  push('mute', L.muteBtn, true);
  push('help', L.helpBtn, true);
  if (L.seats) for (var s = 0; s < L.seats.length; s++) { var st = L.seats[s]; push('seat_' + s, { x: st.x - SEAT_R * S, y: st.y - SEAT_R * S, w: SEAT_R * S * 2, h: SEAT_R * S * 2 }, true); }
  for (var k = 0; k < stations.length; k++) { var sc = stations[k]; push('station_' + k, { x: sc.x, y: sc.y, w: sc.w, h: sc.h }, true); }
  return res;
}
var REACH_TOUR = [
  { name: 'playing', go: function () { helpOpen = false; if (gs !== 'PLAYING') { if (!stations.length) resetRun(); gs = 'PLAYING'; } if (GF.tutorial) GF.tutorial.active = false; } },
  { name: 'summary', go: function () { helpOpen = false; if (!stations.length) resetRun(); endDay(); if (shopScroll) shopScroll.scrollTo(0); } },
  { name: 'summary_bottom', go: function () { helpOpen = false; if (gs !== 'SUMMARY') { if (!stations.length) resetRun(); endDay(); } if (shopScroll) shopScroll.scrollTo(shopScroll.maxOffset()); } },
  { name: 'gameover', go: function () { helpOpen = false; gs = 'GAMEOVER'; } },
  { name: 'help', go: function () { gs = 'PLAYING'; helpOpen = true; } },
];

// ====================================================================
//  GATE HOOKS — exposeState (all DESIGN vars) + exposeBot (#276)
// ====================================================================
GF.exposeState(function () {
  return {
    // state machine + core
    gs: gs, day: day, bestDay: bestDay, cash: cash, dayEarned: dayEarned,
    hearts: hearts, served: served, dayQuota: dayQuota, spawnedThisDay: spawnedThisDay,
    selected: selected,
    waiting: waitingPets().length, activePets: countActivePets(),
    stations: stations.length, stationTypes: Object.keys(ownedTypes).length,
    assistants: assistantsBought, speedLevel: speedLevel,
    dispenserLevel: dispenserLevel, seatBonus: seatBonus, seatCap: seatCap(),
    score: bestDay, level: day, lives: hearts,
    // tunables (DESIGN cross-check)
    ARRIVAL_BASE: ARRIVAL_BASE, ARRIVAL_DECAY: ARRIVAL_DECAY, PATIENCE_DRAIN: PATIENCE_DRAIN,
    STATION_TIME: STATION_TIME, CURE_REWARD: CURE_REWARD, TIP_WINDOW: TIP_WINDOW,
    TIP_BONUS: TIP_BONUS, CLINIC_HEARTS: CLINIC_HEARTS, QUOTA_BASE: QUOTA_BASE,
    QUOTA_GROW: QUOTA_GROW, UPGRADE_COST_GROW: UPGRADE_COST_GROW, VIP_CHANCE: VIP_CHANCE,
    MISASSIGN_PENALTY: MISASSIGN_PENALTY, CONDS_PER_DAY: CONDS_PER_DAY,
    SEAT_R: SEAT_R, STATION_H: STATION_H, BTN_H: BTN_H,
  };
});

GF.exposeBot(
  function () {
    // actions available RIGHT NOW
    var acts = [];
    if (gs === 'PLAYING') {
      var wp = waitingPets();
      for (var i = 0; i < wp.length; i++) {
        var p = wp[i];
        for (var s = 0; s < stations.length; s++) {
          var st = stations[s];
          if (!st.pet && st.type === p.type) acts.push('assign:' + p.id + ':' + st.id);
        }
      }
      if (!acts.length) acts.push('wait');
    } else if (gs === 'SUMMARY') {
      for (var r = 0; r < summaryRows.length; r++) {
        if (cash >= summaryRows[r].cost) acts.push('buy:' + summaryRows[r].kind + (summaryRows[r].type ? ':' + summaryRows[r].type : ''));
      }
      acts.push('next_day');
    } else if (gs === 'GAMEOVER' || gs === 'MENU') {
      acts.push('start');
    }
    return acts;
  },
  function (a) {
    if (!a) return;
    if (a === 'start') { startGame(); return; }
    if (a === 'next_day') { if (gs === 'SUMMARY') nextDay(); return; }
    if (a === 'wait') { return; }
    if (a.indexOf('assign:') === 0) {
      var parts = a.split(':');
      var pet = findPet(parseInt(parts[1], 10));
      var st = findStation(parseInt(parts[2], 10));
      tryAssign(pet, st);
      return;
    }
    if (a.indexOf('buy:') === 0) {
      var bp = a.split(':');
      var kind = bp[1], type = bp[2];
      for (var r = 0; r < summaryRows.length; r++) {
        if (summaryRows[r].kind === kind && (!type || summaryRows[r].type === type)) { buyRow(summaryRows[r]); return; }
      }
    }
  }
);

})();
</script>
