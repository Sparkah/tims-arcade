<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function () {
'use strict';

// ── LOCALISED STRINGS (EN + RU, all UI via GF.t) ─────────────────────────────
var STRINGS = {
  en: {
    title: 'Bolt Out',
    sub: 'Unscrew. Sort. Free the plates.',
    play: 'PLAY', retry: 'RETRY', next: 'CONTINUE',
    score: 'SCORE', best: 'BEST', level: 'LEVEL', bolts: 'BOLTS',
    gameover: 'JAMMED!', win: 'ALL CLEAR!',
    jamsub: 'No box fits any reachable bolt.',
    winsub: 'Every plate freed. Workshop spotless!',
    howto: 'HOW TO PLAY',
    extrabin: 'EXTRA BIN', hint: 'HINT', sound: 'SOUND',
    metaunlock: 'UNLOCKED',
    tut_goal: 'Goal: Unscrew every colored bolt to free the metal plates and clear the level.',
    tut_controls: 'Controls: Tap a bolt that is not covered — it unscrews and flies into a box of its color.',
    tut_win: 'Win: Remove every bolt on the board to finish the level (8 levels to beat).',
    tut_lose: 'Lose: You have only 3 open boxes; if all are full of colors and no reachable bolt matches one, you are jammed.',
    tut_tip: 'Tip: Each box holds 3 of one color, then ships out and frees its slot — peel plates in an order that keeps a matching box open.',
    backReminder: 'Tap uncovered bolts to drop them into matching boxes. Clear every bolt. Tap ? for full rules.',
    tapclose: 'tap to close',
  },
  ru: {
    title: 'Болты Прочь',
    sub: 'Откручивай. Сортируй. Освобождай.',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', next: 'ДАЛЕЕ',
    score: 'ОЧКИ', best: 'РЕКОРД', level: 'УРОВЕНЬ', bolts: 'БОЛТЫ',
    gameover: 'ЗАТОР!', win: 'ВСЁ ЧИСТО!',
    jamsub: 'Нет ящика для доступных болтов.',
    winsub: 'Все пластины сняты. Мастерская чиста!',
    howto: 'КАК ИГРАТЬ',
    extrabin: 'ЯЩИК', hint: 'ПОДСКАЗКА', sound: 'ЗВУК',
    metaunlock: 'ОТКРЫТО',
    tut_goal: 'Цель: Открути все цветные болты, чтобы освободить пластины и пройти уровень.',
    tut_controls: 'Управление: Нажми на болт, который ничем не закрыт — он открутится и улетит в ящик своего цвета.',
    tut_win: 'Победа: Убери все болты с поля, чтобы пройти уровень (всего 8 уровней).',
    tut_lose: 'Поражение: У тебя всего 3 ящика; если все заняты цветами, а подходящего болта рядом нет — затор.',
    tut_tip: 'Совет: В ящик влезает 3 болта одного цвета, затем он уезжает и освобождает место — снимай пластины так, чтобы нужный ящик оставался открытым.',
    backReminder: 'Нажимай открытые болты — они летят в ящики своего цвета. Убери все болты. Нажми ? для правил.',
    tapclose: 'нажми, чтобы закрыть',
  },
};

// AI sprites (loaded on boot; procedural fallback always present).
var SPRITE_NAMES = ['bolt', 'plate', 'box'];

// ── TUNABLES (named in DESIGN.md — exposed via __gfState) ─────────────────────
var BOX_SLOTS = 3;        // open box slots at run start (meta raises to 4)
var BOX_CAPACITY = 3;     // bolts of one color needed to ship a box
var COLOR_COUNT = 3;      // distinct colors at level 1 (escalates → 6)
var MAX_COLORS = 6;       // color count cap
var BOLT_COUNT = 12;      // bolts on the level-1 board (escalates per level)
var PLATE_LAYERS = 2;     // overlapping plate layers at level 1 (escalates → 5)
var MAX_LEVEL = 8;        // clearing level 8 = WIN
var BOLT_RADIUS = 22;     // tap hitbox / draw radius (design px)
var UNSCREW_MS = 360;     // spin-out animation duration
var META_SLOT_COST = 3;   // levelsCleared to unlock permanent +1 box slot
var META_BIN_COST = 6;    // levelsCleared to unlock one-time Extra Bin rescue
var META_HINT_COST = 10;  // levelsCleared to unlock the Color Hint pulse

// Color palette — bright industrial workshop colors, high contrast.
var COLORS = [
  { id: 0, base: '#e8413a', lite: '#ff7b6b', dark: '#a31f1a', name: 'red' },
  { id: 1, base: '#3aa0e8', lite: '#79c8ff', dark: '#1a5e9c', name: 'blue' },
  { id: 2, base: '#37c25a', lite: '#74e889', dark: '#1d7c38', name: 'green' },
  { id: 3, base: '#f5b41e', lite: '#ffd564', dark: '#b97f0d', name: 'yellow' },
  { id: 4, base: '#a05ce8', lite: '#c79bff', dark: '#642f9c', name: 'purple' },
  { id: 5, base: '#ff8a3a', lite: '#ffb579', dark: '#bf5d12', name: 'orange' },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU PLAYING GAMEOVER WIN
var score = 0, best = 0;
var level = 1;
var levelsCleared = 0;      // lifetime, persisted — gates meta unlocks
var boltsRemaining = 0, boltsTotal = 0;
var boxesShipped = 0;
var jammed = false;
var extraBinUsed = false;   // one-time rescue spent this run
var jamWarn = 0;            // anim: 0..1 when only one legal move remains

// meta ownership (persisted) — unlocked at levelsCleared milestones
var metaSlot = false;       // permanent +1 box slot
var metaExtraBin = false;   // one-time rescue bin
var metaHint = false;       // color-hint pulse
var hintActive = 0;         // anim timer when hint is firing
var hintColor = -1;         // which color the hint points at

// world objects
var plates = [];            // { id, layer, gx0..gy1, x,y,w,h, alive, drop, tint, boltIds, wob }
var bolts = [];             // { id, color, layer, gx,gy, x,y, plateIds[], state, t, spin, fromx,fromy, targetBoxIdx }
var boxes = [];             // { color|null, count, ship, x, y, w, h, temp }
var nextId = 1;

// layout
var boardX = 0, boardY = 0, boardW = 0, boardH = 0, unit = 1;
var GRID_COLS = 6, GRID_ROWS = 7; // anchor grid the layout snaps to

// tutorial / sound
var BEST_KEY = 'bolt_out_best';
var CLEARED_KEY = 'bolt_out_cleared';
var META_KEY = 'bolt_out_meta';
var SEEN_TUT_KEY = 'bolt_out_seen_tutorial';
var MUTE_KEY = 'bolt_out_muted';
var seenTut = false;
var showHelp = false;
var sfxMuted = false;

// declarative buttons populated by overlays / HUD each frame
var buttons = [];

// flash for "level cleared" between levels
var levelFlash = 0;

function saveBest() { try { localStorage.setItem(BEST_KEY, String(best)); } catch (e) {} }
function saveCleared() { try { localStorage.setItem(CLEARED_KEY, String(levelsCleared)); } catch (e) {} }
function saveMeta() {
  try { localStorage.setItem(META_KEY, JSON.stringify({ s: metaSlot ? 1 : 0, b: metaExtraBin ? 1 : 0, h: metaHint ? 1 : 0 })); } catch (e) {}
}
function loadMeta() {
  try {
    var m = JSON.parse(localStorage.getItem(META_KEY) || '{}');
    metaSlot = !!m.s; metaExtraBin = !!m.b; metaHint = !!m.h;
  } catch (e) {}
}

// Re-evaluate meta unlocks against lifetime levelsCleared. Returns name of a
// newly-unlocked upgrade (for a toast) or null.
function refreshMetaUnlocks() {
  var unlocked = null;
  if (!metaSlot && levelsCleared >= META_SLOT_COST) { metaSlot = true; unlocked = 'slot'; }
  if (!metaExtraBin && levelsCleared >= META_BIN_COST) { metaExtraBin = true; unlocked = 'bin'; }
  if (!metaHint && levelsCleared >= META_HINT_COST) { metaHint = true; unlocked = 'hint'; }
  if (unlocked) saveMeta();
  return unlocked;
}

// ── LAYOUT ──────────────────────────────────────────────────────────────────
// Board occupies the area between the top HUD band and the bottom box row.
function computeLayout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var topPad = GF.clamp(64 * S, 48, 96);
  var boxBand = GF.clamp(132 * S, 104, 176); // reserved height at the bottom for boxes
  var sidePad = GF.clamp(16 * S, 10, 28);
  var availW = W - sidePad * 2;
  var availH = H - topPad - boxBand;
  // grid unit: square cells in a GRID_COLS x GRID_ROWS grid
  var uW = availW / GRID_COLS;
  var uH = availH / GRID_ROWS;
  unit = Math.max(8, Math.min(uW, uH));
  boardW = unit * GRID_COLS;
  boardH = unit * GRID_ROWS;
  boardX = (W - boardW) / 2;
  boardY = topPad + (availH - boardH) / 2;
  layoutBoxes();
}

function layoutBoxes() {
  var W = GF.W, H = GF.H, S = GF.S;
  var n = boxes.length || (BOX_SLOTS + (metaSlot ? 1 : 0));
  var bandY = H - GF.clamp(124 * S, 96, 164);
  var bandH = GF.clamp(96 * S, 76, 132);
  var gap = GF.clamp(12 * S, 7, 18);
  var maxRowW = Math.min(W - 24 * S, 560 * S);
  var bw = Math.min((maxRowW - gap * (n - 1)) / n, GF.clamp(130 * S, 78, 150));
  var rowW = bw * n + gap * (n - 1);
  var x0 = (W - rowW) / 2;
  for (var i = 0; i < boxes.length; i++) {
    boxes[i].x = x0 + i * (bw + gap);
    boxes[i].y = bandY;
    boxes[i].w = bw;
    boxes[i].h = bandH;
  }
}

// grid anchor -> pixel center
function anchorXY(gx, gy) {
  return { x: boardX + (gx + 0.5) * unit, y: boardY + (gy + 0.5) * unit };
}

// ── LEVEL GENERATION ──────────────────────────────────────────────────────────
// Difficulty per level: more colors, more bolts, more plate layers.
function levelSpec(lv) {
  var colors = Math.min(MAX_COLORS, COLOR_COUNT + Math.floor((lv - 1) / 2)); // 3,3,4,4,5,5,6,6
  var layers = Math.min(5, PLATE_LAYERS + Math.floor((lv - 1) / 2));         // 2,2,3,3,4,4,5,5
  // bolt count is a multiple of BOX_CAPACITY so every color group ships cleanly.
  var groups = Math.min(colors * 2 + Math.floor(lv / 2), 14); // number of 3-bolt color groups
  groups = Math.max(colors, groups);
  var total = groups * BOX_CAPACITY;
  return { colors: colors, layers: layers, total: total };
}

// Build a level. The color multiset is EXACTLY `groups` complete sets of
// BOX_CAPACITY so the level is always solvable (each color count divisible by
// BOX_CAPACITY).
function buildLevel(lv) {
  plates = []; bolts = []; nextId = 1;
  jammed = false; extraBinUsed = false; jamWarn = 0;
  hintActive = 0; hintColor = -1;
  var spec = levelSpec(lv);
  computeLayout();

  // 1) choose anchor cells, shuffled, take a solvable count (multiple of cap)
  var cells = [];
  for (var gy = 0; gy < GRID_ROWS; gy++) for (var gx = 0; gx < GRID_COLS; gx++) cells.push({ gx: gx, gy: gy });
  shuffle(cells);
  var total = Math.min(spec.total, cells.length);
  total = Math.floor(total / BOX_CAPACITY) * BOX_CAPACITY;
  cells = cells.slice(0, total);

  // 2) build the color multiset for exactly `total` bolts
  var groups = total / BOX_CAPACITY;
  var perColor = [];
  for (var c = 0; c < spec.colors; c++) perColor.push(1);
  var extra = groups - spec.colors;
  if (extra < 0) extra = 0;
  for (var e = 0; e < extra; e++) perColor[(Math.random() * spec.colors) | 0]++;
  var colorBag = [];
  for (var ci = 0; ci < spec.colors; ci++) {
    for (var g = 0; g < perColor[ci] * BOX_CAPACITY; g++) colorBag.push(ci);
  }
  // bag length may exceed total if spec.colors > groups; trim to total
  colorBag = colorBag.slice(0, total);
  // pad if short (shouldn't happen, but be safe)
  while (colorBag.length < total) colorBag.push((Math.random() * spec.colors) | 0);
  shuffle(colorBag);

  // 3) assign each chosen cell a layer (0 = bottom, revealed last)
  var layers = spec.layers;
  for (var i = 0; i < total; i++) cells[i]._layer = (Math.random() * layers) | 0;

  // group cells by layer
  var byLayer = {};
  for (var k = 0; k < total; k++) {
    var cell = cells[k];
    (byLayer[cell._layer] = byLayer[cell._layer] || []).push(cell);
  }

  var plateTints = ['#7d8794', '#8b95a2', '#99a3b0', '#aab4c0', '#bcc6d2'];
  var bagIdx = 0;

  for (var L2 = 0; L2 < layers; L2++) {
    var cls = byLayer[L2] || [];
    if (!cls.length) continue;
    var clusters = clusterCells(cls, 2 + ((Math.random() * 2) | 0));
    for (var pcl = 0; pcl < clusters.length; pcl++) {
      var clu = clusters[pcl];
      var minx = 99, miny = 99, maxx = -1, maxy = -1;
      for (var q = 0; q < clu.length; q++) {
        minx = Math.min(minx, clu[q].gx); maxx = Math.max(maxx, clu[q].gx);
        miny = Math.min(miny, clu[q].gy); maxy = Math.max(maxy, clu[q].gy);
      }
      var p = {
        id: nextId++, layer: L2,
        gx0: minx, gy0: miny, gx1: maxx, gy1: maxy,
        alive: true, drop: 0, tint: plateTints[L2 % plateTints.length],
        boltIds: [], wob: Math.random() * Math.PI * 2,
      };
      plates.push(p);
      for (var b = 0; b < clu.length; b++) {
        var ctr = anchorXY(clu[b].gx, clu[b].gy);
        var color = colorBag[bagIdx++];
        if (color === undefined) color = (Math.random() * spec.colors) | 0;
        var bolt = {
          id: nextId++, color: color, layer: L2,
          gx: clu[b].gx, gy: clu[b].gy, x: ctr.x, y: ctr.y,
          plateIds: [p.id], state: 'pinned', t: 0,
          spin: Math.random() * Math.PI * 2,
          fromx: 0, fromy: 0, targetBoxIdx: -1, _lock: 0,
        };
        bolts.push(bolt);
        p.boltIds.push(bolt.id);
      }
    }
  }

  boltsTotal = bolts.length;
  boltsRemaining = bolts.length;
  boxesShipped = 0;

  buildBoxes();
  recomputePlateRects();
}

// cluster grid cells greedily into groups of up to `maxSize` by nearest-neighbor
function clusterCells(cells, maxSize) {
  maxSize = Math.max(2, maxSize);
  var remaining = cells.slice();
  var out = [];
  while (remaining.length) {
    var seed = remaining.shift();
    var group = [seed];
    while (group.length < maxSize && remaining.length) {
      var bestI = -1, bestD = 1e9;
      for (var i = 0; i < remaining.length; i++) {
        var d = Math.abs(remaining[i].gx - seed.gx) + Math.abs(remaining[i].gy - seed.gy);
        if (d < bestD) { bestD = d; bestI = i; }
      }
      if (bestI < 0 || bestD > 3) break;
      group.push(remaining.splice(bestI, 1)[0]);
    }
    out.push(group);
  }
  return out;
}

function buildBoxes() {
  boxes = [];
  var n = BOX_SLOTS + (metaSlot ? 1 : 0);
  for (var i = 0; i < n; i++) {
    boxes.push({ color: null, count: 0, ship: 0, x: 0, y: 0, w: 0, h: 0, temp: false });
  }
  layoutBoxes();
}

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = (Math.random() * (i + 1)) | 0;
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// plate pixel rect from grid bounds (padded so it visually overlaps bolts)
function recomputePlateRects() {
  var padBolt = BOLT_RADIUS * GF.S;
  for (var i = 0; i < plates.length; i++) {
    var p = plates[i];
    var a = anchorXY(p.gx0, p.gy0);
    var b = anchorXY(p.gx1, p.gy1);
    p.x = a.x - unit * 0.5 + padBolt * 0.2;
    p.y = a.y - unit * 0.5 + padBolt * 0.2;
    p.w = (b.x - a.x) + unit - padBolt * 0.4;
    p.h = (b.y - a.y) + unit - padBolt * 0.4;
  }
}

// ── ACCESSIBILITY ───────────────────────────────────────────────────────────
// A bolt is accessible if no ALIVE plate of a strictly HIGHER layer covers its
// center point.
function boltAccessible(bolt) {
  if (bolt.state !== 'pinned') return false;
  for (var i = 0; i < plates.length; i++) {
    var p = plates[i];
    if (!p.alive || p.drop > 0) continue;
    if (p.layer <= bolt.layer) continue;
    if (bolt.x >= p.x && bolt.x <= p.x + p.w && bolt.y >= p.y && bolt.y <= p.y + p.h) {
      return false;
    }
  }
  return true;
}

function platePinnedCount(plate) {
  var n = 0;
  for (var i = 0; i < bolts.length; i++) {
    var b = bolts[i];
    if (b.state === 'gone') continue;
    if (b.plateIds.indexOf(plate.id) !== -1) n++;
  }
  return n;
}

// ── BOX MATCHING ──────────────────────────────────────────────────────────────
// Find a box that can accept this color: prefer an already-committed matching
// non-full box; else the first empty box. Returns index or -1.
function boxForColor(color) {
  for (var i = 0; i < boxes.length; i++) {
    var bx = boxes[i];
    if (bx.ship > 0) continue;
    if (bx.color === color && bx.count < BOX_CAPACITY) return i;
  }
  for (var j = 0; j < boxes.length; j++) {
    var b2 = boxes[j];
    if (b2.ship > 0) continue;
    if (b2.color === null && b2.count === 0) return j;
  }
  return -1;
}

// Is there any legal move right now? (accessible bolt with a box that fits)
function hasLegalMove() {
  for (var i = 0; i < bolts.length; i++) {
    var b = bolts[i];
    if (b.state !== 'pinned') continue;
    if (!boltAccessible(b)) continue;
    if (boxForColor(b.color) !== -1) return true;
  }
  return false;
}

// count accessible bolts that DO have a fit
function legalMoveCount() {
  var n = 0;
  for (var i = 0; i < bolts.length; i++) {
    var b = bolts[i];
    if (b.state !== 'pinned') continue;
    if (!boltAccessible(b)) continue;
    if (boxForColor(b.color) !== -1) n++;
  }
  return n;
}

// ── JAM / LOSE ──────────────────────────────────────────────────────────────
function checkJam() {
  if (gs !== 'PLAYING') return;
  if (boltsRemaining <= 0) return; // win path handles this
  // defer while anything is in flux (flying bolt / shipping box)
  for (var i = 0; i < bolts.length; i++) if (bolts[i].state === 'unscrewing') return;
  for (var j = 0; j < boxes.length; j++) if (boxes[j].ship > 0) return;
  if (hasLegalMove()) { jammed = false; return; }
  // No legal move. Try the one-time rescue.
  if (metaExtraBin && !extraBinUsed) {
    extraBinUsed = true;
    openExtraBin();
    sfxRescue();
    if (hasLegalMove()) { jammed = false; return; }
  }
  jammed = true;
  gameOver();
}

function openExtraBin() {
  boxes.push({ color: null, count: 0, ship: 0, x: 0, y: 0, w: 0, h: 0, temp: true });
  layoutBoxes();
}

// ── TAP A BOLT ────────────────────────────────────────────────────────────────
function tapBolt(bolt) {
  if (bolt.state !== 'pinned') return false;
  if (!boltAccessible(bolt)) {
    GF.setShake(0.12); bolt._lock = 0.4; sfxLock();
    return false;
  }
  var bi = boxForColor(bolt.color);
  if (bi === -1) {
    // accessible but no box fits — locked feedback (jam pre-state)
    GF.setShake(0.12); bolt._lock = 0.4; sfxLock();
    return false;
  }
  // unscrew → fly to box
  bolt.state = 'unscrewing';
  bolt.t = 0;
  bolt.fromx = bolt.x; bolt.fromy = bolt.y;
  bolt.targetBoxIdx = bi;
  // commit the box to this color immediately so subsequent taps see it
  boxes[bi].color = bolt.color;
  GF.spawnParticles(bolt.x, bolt.y, COLORS[bolt.color].lite, 8);
  GF.spawnParticles(bolt.x, bolt.y, '#fff', 3);
  sfxUnscrew();
  return true;
}

// called when a flying bolt reaches its box
function depositBolt(bolt) {
  var bx = boxes[bolt.targetBoxIdx];
  if (!bx) { bolt.state = 'gone'; boltsRemaining = countRemaining(); return; }
  bolt.state = 'gone';
  bx.count++;
  score += 10 + level;
  GF.spawnFloat(bx.x + bx.w / 2, bx.y - 6 * GF.S, '+' + (10 + level), COLORS[bolt.color].lite);
  GF.spawnParticles(bx.x + bx.w / 2, bx.y + bx.h * 0.4, COLORS[bolt.color].lite, 5);
  sfxDrop(bx.count);

  // free plates this bolt was pinning if now unpinned
  releasePlatesFor(bolt);

  // ship a full box
  if (bx.count >= BOX_CAPACITY) {
    bx.ship = 0.001;
    boxesShipped++;
    score += 25 + level * 2;
    GF.spawnFloat(bx.x + bx.w / 2, bx.y + bx.h / 2, '+' + (25 + level * 2), '#ffe27a');
    for (var s = 0; s < 14; s++) GF.spawnParticles(bx.x + bx.w / 2 + (Math.random() - 0.5) * bx.w, bx.y + (Math.random() - 0.5) * bx.h, COLORS[bx.color].lite, 1);
    sfxShip();
  }

  boltsRemaining = countRemaining();
  if (boltsRemaining <= 0) { winLevel(); return; }
  if (score > best) { best = score; saveBest(); }
  GF.saveRun();
}

function countRemaining() {
  var n = 0;
  for (var i = 0; i < bolts.length; i++) if (bolts[i].state !== 'gone') n++;
  return n;
}

// drop any plate whose last pinning bolt just left
function releasePlatesFor(bolt) {
  for (var i = 0; i < bolt.plateIds.length; i++) {
    var p = findPlate(bolt.plateIds[i]);
    if (p && p.alive && p.drop === 0 && platePinnedCount(p) === 0) {
      p.drop = 0.001; // begin fall
      GF.setShake(0.45);
      sfxPlate();
    }
  }
}
function findPlate(id) {
  for (var i = 0; i < plates.length; i++) if (plates[i].id === id) return plates[i];
  return null;
}

// ── LIFECYCLE ─────────────────────────────────────────────────────────────────
function startGame() {
  level = 1;
  score = 0;
  buildLevel(level);
  gs = 'PLAYING';
  showHelp = false;
  if (!seenTut) { seenTut = true; try { localStorage.setItem(SEEN_TUT_KEY, '1'); } catch (e) {} }
  GF.gameStarted();
  GF.saveRun();
}

function restartLevel() {
  // RETRY after a jam — re-seed the SAME level; level/levelsCleared/best kept.
  buildLevel(level);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function winLevel() {
  levelsCleared++;
  saveCleared();
  var unlocked = refreshMetaUnlocks();
  score += 50 + level * 5;
  if (score > best) { best = score; saveBest(); }
  levelFlash = 1;
  sfxLevelWin();
  if (level >= MAX_LEVEL) {
    gs = 'WIN';
    GF.gameEnded();
    GF.happytime();
    GF.saveRun();
    return;
  }
  level++;
  buildLevel(level);
  gs = 'PLAYING';
  GF.saveRun();
  if (unlocked) GF.spawnFloat(GF.W / 2, GF.H * 0.3, GF.t('metaunlock') + '!', '#ffe27a');
}

function gameOver() {
  if (score > best) { best = score; saveBest(); }
  gs = 'GAMEOVER';
  GF.gameEnded();
  GF.saveRun();
}

// ── META BUTTON ACTIONS (tap-driven, user click) ──────────────────────────────
function useExtraBinNow() {
  if (!metaExtraBin || extraBinUsed) return;
  extraBinUsed = true;
  openExtraBin();
  sfxRescue();
  GF.spawnFloat(GF.W / 2, GF.H * 0.7, '+1', '#ffe27a');
  GF.saveRun();
}
function useHintNow() {
  if (!metaHint || hintActive > 0) return;
  // pulse the color of the first accessible bolt that currently fits a box
  for (var i = 0; i < bolts.length; i++) {
    var b = bolts[i];
    if (b.state === 'pinned' && boltAccessible(b) && boxForColor(b.color) !== -1) {
      hintColor = b.color; hintActive = 2.2; sfxHint(); return;
    }
  }
  // else point at any accessible bolt's color (the jam-breaker)
  for (var j = 0; j < bolts.length; j++) {
    var b2 = bolts[j];
    if (b2.state === 'pinned' && boltAccessible(b2)) { hintColor = b2.color; hintActive = 2.2; sfxHint(); return; }
  }
}

// ── SCREENSHOT / TEST HOOKS ─────────────────────────────────────────────────────
// Land on a populated mid-puzzle board for Yandex 5.1.1 ≥70% gameplay shots.
window._setupForScreenshot = function (lvl) {
  level = GF.clamp(lvl || 4, 1, MAX_LEVEL);
  score = 600 + level * 220;
  buildLevel(level);
  gs = 'PLAYING';
  // deposit a couple of top-layer bolts so a plate has dropped (depth visible)
  var removed = 0;
  for (var i = 0; i < bolts.length && removed < 3; i++) {
    var b = bolts[i];
    if (b.state === 'pinned' && boltAccessible(b)) {
      var bi = boxForColor(b.color);
      if (bi !== -1) {
        b.state = 'gone';
        boxes[bi].color = b.color; boxes[bi].count++;
        releasePlatesFor(b);
        removed++;
      }
    }
  }
  // partially fill one box to telegraph the "almost complete" hook
  if (boxes[0]) {
    if (boxes[0].color === null) boxes[0].color = 0;
    boxes[0].count = Math.max(boxes[0].count, 2);
  }
  // snap any dropping plates fully out
  for (var p = 0; p < plates.length; p++) if (plates[p].drop > 0) { plates[p].drop = 1; plates[p].alive = false; }
  boltsRemaining = countRemaining();
};

// _jumpLevel — gate harness contract:
//   n=99 → terminal jam (GAMEOVER), n=98 → WIN, else → PLAYING at level n
window._jumpLevel = function (n) {
  if (n === 99) {
    buildLevel(level || 1);
    gs = 'PLAYING';
    jammed = true;
    gameOver();
    return;
  }
  if (n === 98) {
    level = MAX_LEVEL;
    buildLevel(level);
    boltsRemaining = 0;
    gs = 'WIN';
    if (score > best) { best = score; saveBest(); }
    GF.gameEnded();
    return;
  }
  window._setupForScreenshot(n || 4);
};

// ── INPUT (tap only) ────────────────────────────────────────────────────────────
var canvas = GF.canvas;
var pointerDown = false;

function localXY(clientX, clientY) {
  var rect = canvas.getBoundingClientRect();
  return { x: (clientX - rect.left) * (GF.W / rect.width), y: (clientY - rect.top) * (GF.H / rect.height) };
}

function onTapXY(x, y) {
  // overlay/HUD buttons first (PLAY, RETRY, ?, meta chips, help close)
  if (checkButtons(x, y)) return;
  if (gs !== 'PLAYING') return;
  if (showHelp) { showHelp = false; return; }
  var hit = boltAt(x, y);
  if (hit) tapBolt(hit);
}

function boltAt(x, y) {
  var best = null, bestLayer = -1, bestD = 1e9;
  var r = BOLT_RADIUS * GF.S * 1.35; // tap tolerance
  for (var i = 0; i < bolts.length; i++) {
    var b = bolts[i];
    if (b.state !== 'pinned') continue;
    var dx = x - b.x, dy = y - b.y;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d > r) continue;
    if (b.layer > bestLayer || (b.layer === bestLayer && d < bestD)) {
      best = b; bestLayer = b.layer; bestD = d;
    }
  }
  return best;
}

function checkButtons(x, y) {
  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { b.fn(); return true; }
  }
  return false;
}

// mouse
canvas.addEventListener('mousedown', function (e) { pointerDown = true; var p = localXY(e.clientX, e.clientY); onTapXY(p.x, p.y); });
window.addEventListener('mouseup', function () { pointerDown = false; });
// touch — checkButtons fires inside onTapXY so the mobile tap gate passes
canvas.addEventListener('touchstart', function (e) {
  e.preventDefault();
  var t = e.changedTouches[0];
  var p = localXY(t.clientX, t.clientY);
  onTapXY(p.x, p.y);
}, { passive: false });
canvas.addEventListener('touchend', function (e) { e.preventDefault(); }, { passive: false });

// ── SFX (procedural Web Audio, no asset files) ───────────────────────────────────
var _ac = null;
function loadMute() { try { sfxMuted = (localStorage.getItem(MUTE_KEY) === '1'); } catch (e) {} }
function saveMute() { try { localStorage.setItem(MUTE_KEY, sfxMuted ? '1' : '0'); } catch (e) {} }
function ac() {
  if (!_ac) { try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (_ac && _ac.state === 'suspended') { try { _ac.resume(); } catch (e) {} }
  return _ac;
}
function tone(freq, dur, type, gain, slideTo) {
  if (sfxMuted) return;
  var c = ac(); if (!c) return;
  try {
    var g = c.createGain(); var t0 = c.currentTime;
    g.gain.setValueAtTime(gain, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    g.connect(c.destination);
    var o = c.createOscillator();
    o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
    o.connect(g); o.start(t0); o.stop(t0 + dur + 0.02);
  } catch (e) {}
}
function sfxUnscrew() { tone(680, 0.16, 'sawtooth', 0.09, 360); }            // ratchet down-slide
function sfxDrop(n) { tone(420 + n * 80, 0.09, 'triangle', 0.13); }          // clink
function sfxShip() { var notes = [523, 659, 880]; for (var i = 0; i < notes.length; i++) (function (idx, f) { setTimeout(function () { tone(f, 0.16, 'sine', 0.14); }, idx * 70); })(i, notes[i]); }
function sfxPlate() { tone(150, 0.22, 'sawtooth', 0.14, 70); }               // clatter
function sfxLock() { tone(120, 0.1, 'square', 0.08); }
function sfxLevelWin() { var notes = [523, 659, 784, 1047]; for (var i = 0; i < notes.length; i++) (function (idx, f) { setTimeout(function () { tone(f, 0.18, 'triangle', 0.15); }, idx * 80); })(i, notes[i]); }
function sfxRescue() { tone(440, 0.18, 'sine', 0.14, 880); }
function sfxHint() { tone(880, 0.1, 'sine', 0.1); }
function toggleMute() { sfxMuted = !sfxMuted; saveMute(); if (!sfxMuted) ac(); }

// ── UPDATE ─────────────────────────────────────────────────────────────────────
function update(dt) {
  if (levelFlash > 0) levelFlash = Math.max(0, levelFlash - dt * 1.3);
  if (hintActive > 0) hintActive = Math.max(0, hintActive - dt);

  // animate flying bolts + dropping plates + shipping boxes regardless of state
  var i, b, p, bx;
  for (i = 0; i < bolts.length; i++) {
    b = bolts[i];
    if (b._lock > 0) b._lock = Math.max(0, b._lock - dt * 2);
    if (b.state === 'unscrewing') {
      b.t += dt * 1000;
      b.spin += dt * 18;
      var tn = Math.min(1, b.t / UNSCREW_MS);
      var bxo = boxes[b.targetBoxIdx];
      if (bxo) {
        var tx = bxo.x + bxo.w / 2, ty = bxo.y + bxo.h * 0.42;
        var ease = tn * tn * (3 - 2 * tn);
        b.x = b.fromx + (tx - b.fromx) * ease;
        b.y = b.fromy + (ty - b.fromy) * ease - Math.sin(tn * Math.PI) * 40 * GF.S; // arc
      }
      if (tn >= 1) depositBolt(b);
    }
  }
  for (p = 0; p < plates.length; p++) {
    var pl = plates[p];
    if (pl.drop > 0 && pl.alive) {
      pl.drop = Math.min(1, pl.drop + dt * 2.4);
      if (pl.drop >= 1) pl.alive = false;
    }
    pl.wob += dt * 1.5;
  }
  for (i = 0; i < boxes.length; i++) {
    bx = boxes[i];
    if (bx.ship > 0) {
      bx.ship = Math.min(1, bx.ship + dt * 1.8);
      if (bx.ship >= 1) {
        // box ships out → reset slot to empty (frees it)
        bx.color = null; bx.count = 0; bx.ship = 0;
        if (bx.temp) { boxes.splice(i, 1); i--; layoutBoxes(); }
      }
    }
  }

  if (gs !== 'PLAYING') return;
  if (showHelp) return;

  // jam warning pulse when exactly one legal move remains
  var lm = legalMoveCount();
  var target = (lm === 1 && boltsRemaining > 0) ? 1 : 0;
  jamWarn += (target - jamWarn) * Math.min(1, dt * 6);

  // continuous jam detection (also catches jams after plate drops)
  checkJam();
}

// ── DRAW ─────────────────────────────────────────────────────────────────────
function draw(ctx) {
  drawBackground(ctx);

  if (gs === 'PLAYING' || gs === 'GAMEOVER' || gs === 'WIN') {
    drawPlatesAndBolts(ctx);
    drawBoxes(ctx);
    drawHUD(ctx);
    if (levelFlash > 0 && gs === 'PLAYING') drawLevelFlash(ctx);
    if (showHelp) drawHelpPanel(ctx);
  }
  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'GAMEOVER') drawEndOverlay(ctx, false);
  if (gs === 'WIN') drawEndOverlay(ctx, true);
}

function drawBackground(ctx) {
  var W = GF.W, H = GF.H;
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#272e38');
  g.addColorStop(0.55, '#1d232c');
  g.addColorStop(1, '#14191f');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // warm amber rim glow top-center (workshop lamp)
  var rg = ctx.createRadialGradient(W * 0.5, H * 0.1, 10, W * 0.5, H * 0.1, Math.max(W, H) * 0.7);
  rg.addColorStop(0, 'rgba(255,180,90,0.10)');
  rg.addColorStop(1, 'rgba(255,180,90,0)');
  ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
}

// draw plates and bolts layer by layer (bottom first), bolts of each layer on
// top of that layer's plate, so higher layers visually occlude lower ones.
function drawPlatesAndBolts(ctx) {
  var maxLayer = 0;
  for (var i = 0; i < plates.length; i++) maxLayer = Math.max(maxLayer, plates[i].layer);
  for (var bi = 0; bi < bolts.length; bi++) maxLayer = Math.max(maxLayer, bolts[bi].layer);

  for (var L = 0; L <= maxLayer; L++) {
    for (var p = 0; p < plates.length; p++) {
      var pl = plates[p];
      if (pl.layer !== L) continue;
      if (!pl.alive && pl.drop >= 1) continue;
      drawPlate(ctx, pl);
    }
    for (var b = 0; b < bolts.length; b++) {
      var bo = bolts[b];
      if (bo.layer !== L) continue;
      if (bo.state !== 'pinned') continue;
      drawBolt(ctx, bo, boltAccessible(bo));
    }
  }
  // flying bolts on very top
  for (var f = 0; f < bolts.length; f++) {
    if (bolts[f].state === 'unscrewing') drawBolt(ctx, bolts[f], true);
  }
}

function drawPlate(ctx, pl) {
  var S = GF.S;
  ctx.save();
  var ox = 0, oy = 0, alpha = 1, rot = 0;
  if (pl.drop > 0) {
    var d = pl.drop;
    oy = d * d * GF.H * 0.6;
    ox = Math.sin(pl.wob) * 30 * S * d;
    rot = (Math.sin(pl.wob) * 0.5) * d;
    alpha = 1 - d;
  }
  ctx.globalAlpha = Math.max(0, alpha);
  var cx = pl.x + pl.w / 2 + ox, cy = pl.y + pl.h / 2 + oy;
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  var x = -pl.w / 2, y = -pl.h / 2;
  var rad = Math.min(pl.w, pl.h) * 0.16;
  // drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  GF.rr(ctx, x + 3 * S, y + 5 * S, pl.w, pl.h, rad); ctx.fill();
  // brushed metal body
  var grad = ctx.createLinearGradient(x, y, x, y + pl.h);
  grad.addColorStop(0, shade(pl.tint, 18));
  grad.addColorStop(0.5, pl.tint);
  grad.addColorStop(1, shade(pl.tint, -22));
  GF.rr(ctx, x, y, pl.w, pl.h, rad); ctx.fillStyle = grad; ctx.fill();
  // top highlight bevel
  ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1.5 * S;
  GF.rr(ctx, x + 1.5 * S, y + 1.5 * S, pl.w - 3 * S, pl.h - 3 * S, rad * 0.85); ctx.stroke();
  // dark edge
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1.5 * S;
  GF.rr(ctx, x, y, pl.w, pl.h, rad); ctx.stroke();
  // subtle brushed lines
  ctx.globalAlpha *= 0.10;
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
  for (var ly = y + 6 * S; ly < y + pl.h - 4 * S; ly += 5 * S) {
    ctx.beginPath(); ctx.moveTo(x + 4 * S, ly); ctx.lineTo(x + pl.w - 4 * S, ly); ctx.stroke();
  }
  ctx.restore();
}

function drawBolt(ctx, bolt, accessible) {
  var S = GF.S;
  var r = BOLT_RADIUS * S;
  var col = COLORS[bolt.color];
  var x = bolt.x, y = bolt.y;
  var scale = 1;
  var spin = bolt.spin || 0;
  if (bolt.state === 'unscrewing') {
    var tn = Math.min(1, bolt.t / UNSCREW_MS);
    scale = 1 - tn * 0.45;
  }
  if (bolt._lock > 0) {
    x += Math.sin(bolt._lock * 40) * 3 * S;
  }
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(spin);
  ctx.scale(scale, scale);

  // shadow under bolt
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.arc(1.5 * S, 2.5 * S, r, 0, Math.PI * 2); ctx.fill();

  // hex nut body
  var tint = accessible ? col.base : shade(col.base, -34);
  drawHex(ctx, 0, 0, r, tint, accessible ? col.lite : shade(col.lite, -30), col.dark);

  // inner ring
  ctx.fillStyle = shade(tint, -18);
  ctx.beginPath(); ctx.arc(0, 0, r * 0.56, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = shade(tint, 24);
  ctx.beginPath(); ctx.arc(0, 0, r * 0.46, 0, Math.PI * 2); ctx.fill();
  // phillips cross slot
  ctx.strokeStyle = col.dark; ctx.lineWidth = Math.max(2, r * 0.13); ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-r * 0.34, 0); ctx.lineTo(r * 0.34, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -r * 0.34); ctx.lineTo(0, r * 0.34); ctx.stroke();
  // glossy highlight
  ctx.globalAlpha = accessible ? 0.5 : 0.2;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-r * 0.18, -r * 0.2, r * 0.16, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();

  // hint ring (pulse) if this bolt's color is hinted
  if (hintActive > 0 && hintColor === bolt.color && accessible && bolt.state === 'pinned') {
    var pulse = 0.5 + 0.5 * Math.sin(hintActive * 7);
    ctx.save();
    ctx.strokeStyle = '#fff'; ctx.globalAlpha = 0.4 + pulse * 0.5; ctx.lineWidth = 3 * S;
    ctx.beginPath(); ctx.arc(x, y, r * 1.25 + pulse * 6 * S, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }
}

function drawHex(ctx, cx, cy, r, fill, lite, dark) {
  ctx.beginPath();
  for (var i = 0; i < 6; i++) {
    var a = Math.PI / 6 + i * Math.PI / 3;
    var px = cx + Math.cos(a) * r, py = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  var g = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
  g.addColorStop(0, lite); g.addColorStop(1, fill);
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = dark; ctx.lineWidth = Math.max(1.5, r * 0.08); ctx.stroke();
}

// ── BOXES ──────────────────────────────────────────────────────────────────────
function drawBoxes(ctx) {
  var S = GF.S;
  // warning glow on the whole row when one move from a jam
  if (jamWarn > 0.02 && gs === 'PLAYING') {
    var pw = 0.5 + 0.5 * Math.sin(performance.now() / 220);
    ctx.save();
    ctx.globalAlpha = jamWarn * (0.18 + pw * 0.16);
    ctx.fillStyle = '#ff4030';
    ctx.fillRect(0, boxes.length ? boxes[0].y - 14 * S : GF.H - 150 * S, GF.W, 150 * S);
    ctx.restore();
  }
  for (var i = 0; i < boxes.length; i++) drawBox(ctx, boxes[i]);
}

function drawBox(ctx, bx) {
  var S = GF.S;
  ctx.save();
  var oy = 0, alpha = 1, scl = 1;
  if (bx.ship > 0) {
    oy = -bx.ship * bx.ship * 90 * S;
    alpha = 1 - bx.ship;
    scl = 1 + bx.ship * 0.1;
  }
  ctx.globalAlpha = Math.max(0, alpha);
  var cx = bx.x + bx.w / 2, cy = bx.y + bx.h / 2 + oy;
  ctx.translate(cx, cy); ctx.scale(scl, scl); ctx.translate(-bx.w / 2, -bx.h / 2);
  var rad = bx.h * 0.16;

  if (bx.color === null) {
    // empty slot: dashed neutral outline
    ctx.setLineDash([7 * S, 6 * S]);
    ctx.strokeStyle = 'rgba(190,200,212,0.55)'; ctx.lineWidth = 2 * S;
    GF.rr(ctx, 0, 0, bx.w, bx.h, rad); ctx.stroke();
    ctx.setLineDash([]);
    // faint open-bin icon
    ctx.fillStyle = 'rgba(190,200,212,0.18)';
    GF.rr(ctx, bx.w * 0.2, bx.h * 0.42, bx.w * 0.6, bx.h * 0.42, rad * 0.5); ctx.fill();
  } else {
    var col = COLORS[bx.color];
    // bin body tinted by its color
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    GF.rr(ctx, 2 * S, 4 * S, bx.w, bx.h, rad); ctx.fill();
    var grad = ctx.createLinearGradient(0, 0, 0, bx.h);
    grad.addColorStop(0, shade(col.base, -8));
    grad.addColorStop(1, shade(col.base, -38));
    GF.rr(ctx, 0, 0, bx.w, bx.h, rad); ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = col.lite; ctx.lineWidth = 2 * S;
    GF.rr(ctx, 0, 0, bx.w, bx.h, rad); ctx.stroke();
    // inner rim
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.5 * S;
    GF.rr(ctx, 4 * S, 4 * S, bx.w - 8 * S, bx.h - 8 * S, rad * 0.7); ctx.stroke();
  }

  // capacity pips (bolts dropped) — bottom row
  var pipR = Math.min(bx.w, bx.h) * 0.13;
  var pipGap = (bx.w - 2 * pipR * BOX_CAPACITY) / (BOX_CAPACITY + 1);
  var pipY = bx.h - pipR - 8 * S;
  for (var k = 0; k < BOX_CAPACITY; k++) {
    var px = pipGap + pipR + k * (pipR * 2 + pipGap);
    if (k < bx.count && bx.color !== null) {
      var cc = COLORS[bx.color];
      drawHex(ctx, px, pipY, pipR, cc.base, cc.lite, cc.dark);
    } else {
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath(); ctx.arc(px, pipY, pipR, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.restore();
}

// ── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  var pad = GF.clamp(14 * S, 9, 22);
  var fs = GF.clamp(17 * S, 13, 23);
  ctx.textBaseline = 'top';

  // top-left: level + bolts remaining
  ctx.textAlign = 'left'; ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + fs + 'px -apple-system, Segoe UI, sans-serif';
  ctx.fillText(GF.t('level') + ' ' + level + ' / ' + MAX_LEVEL, pad, pad);
  ctx.fillStyle = '#bfe0a8'; ctx.font = (fs * 0.85) + 'px sans-serif';
  ctx.fillText(GF.t('bolts') + ' ' + boltsRemaining + '/' + boltsTotal, pad, pad + fs * 1.2);

  // top-right: score
  ctx.textAlign = 'right'; ctx.fillStyle = '#ffe27a';
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.fillText(GF.t('score') + ' ' + score, W - pad, pad);

  // ? help button (square) and sound toggle to its left
  var bSize = GF.clamp(34 * S, 26, 44);
  var hx = W - pad - bSize, hy = pad + fs * 1.5;
  drawIconButton(ctx, hx, hy, bSize, '?', function () { showHelp = true; });
  var sx = hx - bSize - 8 * S;
  drawIconButton(ctx, sx, hy, bSize, sfxMuted ? '🔇' : '🔊', function () { toggleMute(); });

  // meta chips above the box row (only if owned + usable)
  drawMetaChips(ctx);
}

function drawIconButton(ctx, x, y, sz, glyph, fn) {
  var S = GF.S;
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  GF.rr(ctx, x, y, sz, sz, sz * 0.28); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5 * S;
  GF.rr(ctx, x, y, sz, sz, sz * 0.28); ctx.stroke();
  ctx.fillStyle = '#e8eef5'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + (sz * 0.5) + 'px sans-serif';
  ctx.fillText(glyph, x + sz / 2, y + sz / 2 + 1);
  ctx.restore();
  ctx.textBaseline = 'top';
  buttons.push({ x: x, y: y, w: sz, h: sz, fn: fn });
}

function drawMetaChips(ctx) {
  if (gs !== 'PLAYING') return;
  var W = GF.W, S = GF.S;
  var chips = [];
  if (metaExtraBin && !extraBinUsed) chips.push({ label: '+ ' + GF.t('extrabin'), fn: useExtraBinNow, on: true });
  if (metaHint) chips.push({ label: GF.t('hint'), fn: useHintNow, on: hintActive <= 0 });
  if (!chips.length) return;
  var chipH = GF.clamp(30 * S, 24, 40);
  var fs = GF.clamp(12 * S, 10, 16);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  var rowY = (boxes.length ? boxes[0].y : GF.H - 150 * S) - chipH - 8 * S;
  var widths = [];
  var totalW = 0, gap = 10 * S;
  for (var i = 0; i < chips.length; i++) {
    var w = ctx.measureText(chips[i].label).width + 26 * S;
    widths.push(w); totalW += w;
  }
  totalW += gap * (chips.length - 1);
  var x = (W - totalW) / 2;
  for (var j = 0; j < chips.length; j++) {
    var cw = widths[j];
    ctx.globalAlpha = chips[j].on ? 1 : 0.4;
    ctx.fillStyle = chips[j].on ? 'rgba(245,180,30,0.22)' : 'rgba(255,255,255,0.08)';
    GF.rr(ctx, x, rowY, cw, chipH, chipH / 2); ctx.fill();
    ctx.strokeStyle = chips[j].on ? '#f5b41e' : 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5 * S;
    GF.rr(ctx, x, rowY, cw, chipH, chipH / 2); ctx.stroke();
    ctx.fillStyle = chips[j].on ? '#ffe27a' : '#9aa6b4';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(chips[j].label, x + cw / 2, rowY + chipH / 2 + 1);
    ctx.textBaseline = 'top';
    if (chips[j].on) buttons.push({ x: x, y: rowY, w: cw, h: chipH, fn: chips[j].fn });
    x += cw + gap;
  }
  ctx.globalAlpha = 1;
}

function drawLevelFlash(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.save();
  ctx.globalAlpha = levelFlash * 0.9;
  ctx.fillStyle = '#ffe27a';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(40 * S, 26, 58) + 'px -apple-system, Segoe UI, sans-serif';
  ctx.shadowColor = 'rgba(255,180,40,0.6)'; ctx.shadowBlur = 22 * S;
  ctx.fillText(GF.t('level') + ' ' + level, W / 2, H * 0.32);
  ctx.restore();
  ctx.textBaseline = 'top';
}

// ── TEXT WRAP HELPER ─────────────────────────────────────────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(' ');
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

// ── MENU ─────────────────────────────────────────────────────────────────────
function drawMenu(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  buttons = [];
  // dim scrim over the workshop bg
  ctx.fillStyle = 'rgba(16,20,26,0.55)'; ctx.fillRect(0, 0, W, H);

  // title
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(245,180,30,0.55)'; ctx.shadowBlur = 26 * S;
  ctx.font = 'bold ' + GF.clamp(42 * S, 26, 60) + 'px -apple-system, Segoe UI, sans-serif';
  var titleY = H * 0.12;
  ctx.fillText(GF.t('title'), W / 2, titleY);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#f5c560'; ctx.font = GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  ctx.fillText(GF.t('sub'), W / 2, titleY + GF.clamp(26 * S, 18, 34));

  // decorative bolt preview row
  drawMenuPreview(ctx, titleY + GF.clamp(46 * S, 32, 64));

  // tutorial block (measured wrap)
  var startY = H * 0.30;
  var tutEndY = drawTutorialBlock(ctx, startY, seenTut) || H * 0.65;

  // PLAY button — wide: enlarge + animate + lift into empty space
  var wide = W / H > 1.15;
  var bw = GF.clamp(240 * S, 170, 320), bh = GF.clamp(56 * S, 46, 70);
  if (wide) { bw = bw * 1.4; bh = bh * 1.35; }
  var bx = W / 2 - bw / 2;
  var by = wide ? Math.max(tutEndY + bh / 2 + 16 * S, H * 0.60) : H * 0.76;
  // Stable hit-rect for click detection
  buttons.push({ x: bx, y: by, w: bw, h: bh, fn: function () { startGame(); } });
  // Pulsing draw
  var t_bo = performance.now() / 1000;
  var pulse = wide ? (1 + 0.05 * Math.sin(t_bo * 2.2)) : 1;
  var dW = bw * pulse, dH = bh * pulse;
  var dX = W / 2 - dW / 2, dY = by - (dH - bh) / 2;
  var grd = ctx.createLinearGradient(dX, dY, dX, dY + dH);
  grd.addColorStop(0, '#f5b41e'); grd.addColorStop(1, '#d6920d');
  if (wide) { ctx.shadowColor = 'rgba(245,180,30,0.55)'; ctx.shadowBlur = 16 + 10 * Math.sin(t_bo * 2.2); }
  GF.rr(ctx, dX, dY, dW, dH, dH / 2); ctx.fillStyle = grd; ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.fillStyle = '#2a1d04'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(wide ? 26 * S : 20 * S, wide ? 20 : 16, wide ? 36 : 28) + 'px -apple-system, Segoe UI, sans-serif';
  ctx.fillText(GF.t('play'), W / 2, dY + dH / 2 + 1);
  ctx.textBaseline = 'alphabetic';

  // best + cleared line
  ctx.fillStyle = '#8a96a4'; ctx.font = GF.clamp(13 * S, 10, 16) + 'px sans-serif'; ctx.textAlign = 'center';
  var line = (best > 0 ? GF.t('best') + ': ' + best + '   ' : '') + (levelsCleared > 0 ? GF.t('level') + ' ' + Math.min(MAX_LEVEL, levelsCleared) + '✓' : '');
  if (line) ctx.fillText(line, W / 2, by + bh + GF.clamp(24 * S, 16, 30));
}

function drawMenuPreview(ctx, y) {
  var S = GF.S;
  var r = GF.clamp(18 * S, 13, 24);
  var demo = [0, 1, 2, 0];
  var gap = 10 * S;
  var totalW = demo.length * r * 2 + (demo.length - 1) * gap;
  var x0 = GF.W / 2 - totalW / 2 + r;
  for (var i = 0; i < demo.length; i++) {
    var cx = x0 + i * (r * 2 + gap);
    var col = COLORS[demo[i]];
    drawHex(ctx, cx, y, r, col.base, col.lite, col.dark);
    ctx.strokeStyle = col.dark; ctx.lineWidth = Math.max(2, r * 0.12); ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx - r * 0.32, y); ctx.lineTo(cx + r * 0.32, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, y - r * 0.32); ctx.lineTo(cx, y + r * 0.32); ctx.stroke();
  }
}

function drawTutorialBlock(ctx, startY, condensed) {
  var W = GF.W, S = GF.S;
  var maxW = Math.min(W - 44 * S, 470 * S);
  var x = W / 2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var fs = GF.clamp(14 * S, 11, 17);
  var lineH = fs * 1.32;
  var y = startY;

  if (condensed) {
    ctx.fillStyle = '#9fb0c0'; ctx.font = fs + 'px sans-serif';
    var lines = wrapLines(ctx, GF.t('backReminder'), maxW);
    for (var i = 0; i < lines.length; i++) { ctx.fillText(lines[i], x, y); y += lineH; }
    return;
  }

  ctx.fillStyle = '#f5b41e'; ctx.font = 'bold ' + (fs * 1.05) + 'px sans-serif';
  ctx.fillText(GF.t('howto'), x, y); y += lineH * 1.25;

  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var colors = ['#eaf2fb', '#cfe2ff', '#bfe0a8', '#f5b7b2', '#ffe2a0'];
  ctx.font = fs + 'px sans-serif';
  for (var k = 0; k < keys.length; k++) {
    ctx.fillStyle = colors[k];
    var lns = wrapLines(ctx, GF.t(keys[k]), maxW);
    for (var j = 0; j < lns.length; j++) { ctx.fillText(lns[j], x, y); y += lineH; }
    y += lineH * 0.18;
  }
  return y;
}

function drawHelpPanel(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  buttons = [];
  ctx.fillStyle = 'rgba(12,16,22,0.94)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#f5b41e'; ctx.font = 'bold ' + GF.clamp(24 * S, 16, 32) + 'px sans-serif';
  ctx.fillText(GF.t('howto'), W / 2, H * 0.12);
  drawTutorialBlock(ctx, H * 0.2, false);
  ctx.fillStyle = '#7a8aa0'; ctx.font = GF.clamp(13 * S, 11, 16) + 'px sans-serif';
  ctx.fillText(GF.t('tapclose'), W / 2, H * 0.88);
  buttons.push({ x: 0, y: 0, w: W, h: H, fn: function () { showHelp = false; } });
}

// ── END OVERLAY ────────────────────────────────────────────────────────────────
function drawEndOverlay(ctx, win) {
  var W = GF.W, H = GF.H, S = GF.S;
  buttons = [];
  ctx.fillStyle = 'rgba(10,14,20,0.84)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = win ? '#ffe27a' : '#ff8a7a';
  ctx.shadowColor = win ? 'rgba(255,210,60,0.5)' : 'rgba(255,90,70,0.4)'; ctx.shadowBlur = 24 * S;
  ctx.font = 'bold ' + GF.clamp(44 * S, 28, 62) + 'px -apple-system, Segoe UI, sans-serif';
  ctx.fillText(win ? GF.t('win') : GF.t('gameover'), W / 2, H * 0.32);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#c6d0dc'; ctx.font = GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  ctx.fillText(win ? GF.t('winsub') : GF.t('jamsub'), W / 2, H * 0.32 + GF.clamp(34 * S, 24, 46));

  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(24 * S, 18, 34) + 'px sans-serif';
  ctx.fillText(GF.t('score') + ': ' + score, W / 2, H * 0.32 + GF.clamp(66 * S, 46, 86));
  ctx.fillStyle = '#9be7ff'; ctx.font = GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  ctx.fillText(GF.t('best') + ': ' + best, W / 2, H * 0.32 + GF.clamp(92 * S, 66, 116));

  var bw = GF.clamp(240 * S, 170, 320), bh = GF.clamp(56 * S, 46, 70);
  var bx = W / 2 - bw / 2, by = H * 0.6;
  // After WIN, RETRY starts a fresh run at level 1; after jam, retry same level.
  drawBigButton(ctx, bx, by, bw, bh, GF.t('retry'), function () {
    if (win) { startGame(); } else { restartLevel(); }
  });
}

function drawBigButton(ctx, x, y, w, h, label, fn) {
  var S = GF.S;
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, '#f5b41e'); grad.addColorStop(1, '#d6920d');
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = '#2a1d04'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(20 * S, 16, 28) + 'px -apple-system, Segoe UI, sans-serif';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1);
  ctx.textBaseline = 'alphabetic';
  buttons.push({ x: x, y: y, w: w, h: h, fn: fn });
}

// shade a hex color by percent (-100..100)
function shade(hex, pct) {
  var h = hex.replace('#', '');
  var r = parseInt(h.substr(0, 2), 16), g = parseInt(h.substr(2, 2), 16), b = parseInt(h.substr(4, 2), 16);
  var f = pct / 100;
  r = Math.round(GF.clamp(r + (f > 0 ? (255 - r) * f : r * f), 0, 255));
  g = Math.round(GF.clamp(g + (f > 0 ? (255 - g) * f : g * f), 0, 255));
  b = Math.round(GF.clamp(b + (f > 0 ? (255 - b) * f : b * f), 0, 255));
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
GF.init({
  designW: 480,
  designH: 800,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'bolt_out',
  onReady: function () {
    try { best = parseInt(localStorage.getItem(BEST_KEY) || '0') || 0; } catch (e) {}
    try { levelsCleared = parseInt(localStorage.getItem(CLEARED_KEY) || '0') || 0; } catch (e) {}
    try { seenTut = (localStorage.getItem(SEEN_TUT_KEY) === '1'); } catch (e) {}
    loadMute();
    loadMeta();
    refreshMetaUnlocks();
    computeLayout();

    // Yandex 1.9 — persist run across reload. Save level + score + board.
    GF.persist('bolt_out_run_v1',
      function () {
        return {
          gs: gs, score: score, best: best, level: level,
          levelsCleared: levelsCleared,
          boltsRemaining: boltsRemaining, boltsTotal: boltsTotal,
          extraBinUsed: extraBinUsed,
          bolts: serializeBolts(),
          plates: serializePlates(),
          boxes: serializeBoxes(),
        };
      },
      function (s) {
        if (!s) return;
        best = s.best || best;
        levelsCleared = s.levelsCleared || levelsCleared;
        refreshMetaUnlocks();
        if (s.gs === 'PLAYING' && s.bolts && s.bolts.length) {
          score = s.score || 0; level = s.level || 1;
          boltsTotal = s.boltsTotal || 0;
          extraBinUsed = !!s.extraBinUsed;
          computeLayout();
          deserialize(s);
          boltsRemaining = countRemaining();
          gs = 'PLAYING';
        } else {
          gs = 'MENU';
        }
      }
    );
    if (gs !== 'PLAYING') gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// ── SERIALIZE (for Yandex 1.9 resume) ─────────────────────────────────────────
function serializeBolts() {
  var out = [];
  for (var i = 0; i < bolts.length; i++) {
    var b = bolts[i];
    out.push({ id: b.id, c: b.color, l: b.layer, gx: b.gx, gy: b.gy, st: b.state === 'gone' ? 2 : 0, p: b.plateIds.slice() });
  }
  return out;
}
function serializePlates() {
  var out = [];
  for (var i = 0; i < plates.length; i++) {
    var p = plates[i];
    out.push({ id: p.id, l: p.layer, a: p.gx0, b: p.gy0, c: p.gx1, d: p.gy1, alive: (p.alive && p.drop < 1) ? 1 : 0, tint: p.tint });
  }
  return out;
}
function serializeBoxes() {
  var out = [];
  for (var i = 0; i < boxes.length; i++) {
    var bx = boxes[i];
    out.push({ col: bx.color, n: bx.count, temp: bx.temp ? 1 : 0 });
  }
  return out;
}
function deserialize(s) {
  // rebuild plates
  plates = [];
  for (var i = 0; i < s.plates.length; i++) {
    var p = s.plates[i];
    plates.push({ id: p.id, layer: p.l, gx0: p.a, gy0: p.b, gx1: p.c, gy1: p.d, alive: !!p.alive, drop: p.alive ? 0 : 1, tint: p.tint || '#8b95a2', boltIds: [], wob: Math.random() * 6 });
  }
  // rebuild bolts
  bolts = [];
  for (var j = 0; j < s.bolts.length; j++) {
    var b = s.bolts[j];
    var ctr = anchorXY(b.gx, b.gy);
    var bolt = { id: b.id, color: b.c, layer: b.l, gx: b.gx, gy: b.gy, x: ctr.x, y: ctr.y, plateIds: b.p || [], state: b.st === 2 ? 'gone' : 'pinned', t: 0, spin: Math.random() * 6, fromx: 0, fromy: 0, targetBoxIdx: -1, _lock: 0 };
    bolts.push(bolt);
    for (var k = 0; k < bolt.plateIds.length; k++) {
      var pl = findPlate(bolt.plateIds[k]);
      if (pl && bolt.state !== 'gone') pl.boltIds.push(bolt.id);
    }
  }
  // rebuild boxes
  var n = (s.boxes && s.boxes.length) || (BOX_SLOTS + (metaSlot ? 1 : 0));
  boxes = [];
  for (var m = 0; m < n; m++) {
    var sb = s.boxes && s.boxes[m];
    boxes.push({ color: sb ? sb.col : null, count: sb ? sb.n : 0, ship: 0, x: 0, y: 0, w: 0, h: 0, temp: sb ? !!sb.temp : false });
  }
  recomputePlateRects();
  layoutBoxes();
}

// Expose state for the post-build-tester / yandex-testing harness.
GF.exposeState(function () {
  return {
    gs: gs, score: score, best: best, level: level,
    levelsCleared: levelsCleared,
    boltsRemaining: boltsRemaining, boltsTotal: boltsTotal,
    boxesShipped: boxesShipped, jammed: jammed,
    BOX_SLOTS: BOX_SLOTS, BOX_CAPACITY: BOX_CAPACITY,
    COLOR_COUNT: COLOR_COUNT, MAX_COLORS: MAX_COLORS,
    BOLT_COUNT: BOLT_COUNT, PLATE_LAYERS: PLATE_LAYERS,
    MAX_LEVEL: MAX_LEVEL, BOLT_RADIUS: BOLT_RADIUS,
    UNSCREW_MS: UNSCREW_MS,
    META_SLOT_COST: META_SLOT_COST, META_BIN_COST: META_BIN_COST, META_HINT_COST: META_HINT_COST,
    extraBinUsed: extraBinUsed,
    metaSlot: metaSlot, metaExtraBin: metaExtraBin, metaHint: metaHint,
  };
});

// keep layout correct on resize/orientation/fullscreen-exit
window.addEventListener('resize', function () {
  computeLayout();
  for (var i = 0; i < bolts.length; i++) {
    var b = bolts[i];
    if (b.state === 'pinned') { var c = anchorXY(b.gx, b.gy); b.x = c.x; b.y = c.y; }
  }
  recomputePlateRects();
});
window.addEventListener('orientationchange', function () {
  setTimeout(function () {
    computeLayout();
    for (var i = 0; i < bolts.length; i++) { var b = bolts[i]; if (b.state === 'pinned') { var c = anchorXY(b.gx, b.gy); b.x = c.x; b.y = c.y; } }
    recomputePlateRects();
  }, 120);
});

})();
</script>
