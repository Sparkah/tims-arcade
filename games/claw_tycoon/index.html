// ── PERSISTENT ARCADE META ────────────────────────────────────────────────
function normalizeMeta(m) {
  var out = freshMeta();
  if (!m || typeof m !== 'object') return out;
  out.version = 2;
  out.tickets = Math.max(0, Number(m.tickets) || 0);
  out.totalPrizes = Math.max(0, Math.floor(Number(m.totalPrizes) || 0));
  out.rarePrizes = Math.max(0, Math.floor(Number(m.rarePrizes) || 0));
  out.shelfLevel = GF.clamp(Math.floor(Number(m.shelfLevel) || 0), 0, META_MAX_SHELF);
  out.franchiseLevel = GF.clamp(Math.floor(Number(m.franchiseLevel) || 0), 0, META_MAX_FRANCHISE);
  out.cabinets = GF.clamp(Math.floor(Number(m.cabinets) || 1), 1, META_MAX_CABINETS);
  out.bestMachine = GF.clamp(Math.floor(Number(m.bestMachine) || 0), 0, MAX_MACHINE);
  if (Array.isArray(m.collection)) {
    for (var i = 0; i < 4; i++) out.collection[i] = Math.max(0, Math.floor(Number(m.collection[i]) || 0));
  }
  out.lastSeenAt = Math.max(0, Number(m.lastSeenAt) || Date.now());
  out.lastLoginDay = Math.floor(Number(m.lastLoginDay));
  if (!isFinite(out.lastLoginDay)) out.lastLoginDay = -1;
  out.streak = GF.clamp(Math.floor(Number(m.streak) || 0), 0, 365);
  out.loginPending = !!m.loginPending;
  out.loginReward = Math.max(0, Math.floor(Number(m.loginReward) || 0));
  out.pendingVisitors = Math.max(0, Math.floor(Number(m.pendingVisitors) || 0));
  out.pendingTickets = Math.max(0, Math.floor(Number(m.pendingTickets) || 0));
  out.pendingHours = GF.clamp(Number(m.pendingHours) || 0, 0, OFFLINE_CAP_HOURS);
  out.dailyDay = Math.floor(Number(m.dailyDay));
  if (!isFinite(out.dailyDay)) out.dailyDay = -1;
  out.dailyTasks = normalizeDailyTasks(m.dailyTasks);
  return out;
}
function dayIndex(t) { return Math.floor((Number(t) || Date.now()) / DAY_MS); }
function seededRand(seed) {
  var x = (seed >>> 0) || 1;
  return function () {
    x = (x * 1664525 + 1013904223) >>> 0;
    return x / 4294967296;
  };
}
function dailyTarget(id) {
  if (id === 'catch') return 3 + Math.min(4, meta.cabinets) + Math.floor(meta.bestMachine / 3);
  if (id === 'serve') return 4 + Math.min(5, meta.cabinets);
  if (id === 'tickets') return 14 + meta.cabinets * 4 + meta.shelfLevel * 3;
  if (id === 'upgrade') return 2;
  return 3;
}
function buildDailyTasks(idx) {
  var rand = seededRand((idx * 2654435761 + meta.totalPrizes * 97 + meta.cabinets * 131) >>> 0);
  var defs = DAILY_TASK_DEFS.slice();
  for (var i = defs.length - 1; i > 0; i--) {
    var j = Math.floor(rand() * (i + 1));
    var tmp = defs[i]; defs[i] = defs[j]; defs[j] = tmp;
  }
  var tasks = [];
  for (var k = 0; k < 3; k++) {
    var d = defs[k];
    var target = dailyTarget(d.id);
    var momentum = 0.62 + rand() * 0.24;
    var progress = Math.floor(target * momentum);
    if (d.id === 'upgrade') progress = 1;
    progress = GF.clamp(progress, 0, Math.max(0, target - 1));
    tasks.push({ id: d.id, target: target, progress: progress, reward: 8 + meta.cabinets * 3 + meta.streak * 2 + k * 4, claimed: false });
  }
  return tasks;
}
function normalizeDailyTasks(tasks) {
  var out = [];
  if (!Array.isArray(tasks)) return out;
  for (var i = 0; i < tasks.length && out.length < 3; i++) {
    var t = tasks[i] || {};
    var ok = false;
    for (var j = 0; j < DAILY_TASK_DEFS.length; j++) if (DAILY_TASK_DEFS[j].id === t.id) ok = true;
    if (!ok) continue;
    var target = Math.max(1, Math.floor(Number(t.target) || dailyTarget(t.id)));
    out.push({ id: t.id, target: target,
      progress: GF.clamp(Math.floor(Number(t.progress) || 0), 0, target),
      reward: Math.max(1, Math.floor(Number(t.reward) || 10)), claimed: !!t.claimed });
  }
  return out;
}
function dailyLoginReward() { return 10 + meta.cabinets * 3 + Math.min(30, meta.streak * 3); }
function ensureDailyState(now) {
  var idx = dayIndex(now);
  var changed = false;
  if (meta.dailyDay !== idx) {
    meta.streak = meta.lastLoginDay === idx - 1 ? Math.min(365, meta.streak + 1) : 1;
    meta.lastLoginDay = idx;
    meta.dailyDay = idx;
    meta.loginPending = true;
    meta.loginReward = dailyLoginReward();
    meta.dailyTasks = buildDailyTasks(idx);

}
function dailyTaskDef(id) {

// ── ECONOMY HELPERS ────────────────────────────────────────────────────────
function machineValue(t) { return Math.pow(MACHINE_MULT, t); }      // raw mult of machine tier t
function shelfMult() { return Math.pow(1.4, shelfLvl); }            // Prize Shelf multiplier
function clerkMult() { return 1 + clerks * 0.04; }                  // small global boost from staff
function comboMult() { return Math.min(COMBO_MAX, 1 + combo * COMBO_STEP); }
function grip() { return GRIP_BASE + gripLvl * 0.5 + franchiseGripBonus(); } // grab strength
function accuracy() { return Math.min(0.98, ACCURACY_BASE + accLvl * 0.045 + meta.franchiseLevel * 0.006); }
function dropSpeed() { return DROP_SPEED_BASE + dropLvl * 90; }
function restockTime() { return Math.max(0.9, RESTOCK_BASE - restockLvl * 0.55); }
// value of selling a plushie of tier pt on the current machine
function prizeValue(pt) {
  var tierMult = [1, 2.4, 6, 15][pt] || 1;            // common→rare
  return BASE_PRIZE * tierMult * machineValue(machineTier) * shelfMult() * clerkMult() * franchiseMult();
}
function clerkPerSec() { return clerks * AUTOCLERK_BASE_CPS * machineValue(machineTier) * shelfMult() * franchiseMult() * franchiseStaffBonus(); }
function coinsPerSec() { return clerkPerSec(); }

// upgrade costs (geometric scaling)
function gripCost()    { return Math.ceil(gripCost0 * Math.pow(COST_GROWTH * 1.18, gripLvl)); }
function accCost()     { return Math.ceil(accCost0 * Math.pow(COST_GROWTH * 1.2, accLvl)); }
function dropCost()    { return Math.ceil(dropCost0 * Math.pow(COST_GROWTH * 1.15, dropLvl)); }
function clerkCost()   { return Math.ceil(clerkCost0 * Math.pow(COST_GROWTH, clerks)); }
function shelfCost()   { return Math.ceil(shelfCost0 * Math.pow(COST_GROWTH * 1.5, shelfLvl)); }
function restockCost() { return Math.ceil(restockCost0 * Math.pow(COST_GROWTH * 1.3, restockLvl)); }
function machineUnlockCost(t) { return Math.ceil(120 * Math.pow(8.5, t - 1)); }   // unlocking tier t
function maxQueue() { return MAX_QUEUE_BASE + machinesUnlocked; }

// highest plushie tier available on the current machine (rarer prizes deeper in)
function maxPlushTier() { return Math.min(3, Math.floor(machineTier / 2)); }

// ── NUMBER FORMAT (idle games show big numbers compactly) ─────────────────
function fmt(n) {
  if (n < 1000) return (n % 1 === 0 ? n.toString() : n.toFixed(n < 10 ? 1 : 0));
  var units = ['', 'K', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc', 'No', 'Dc'];
  var u = 0;
  while (n >= 1000 && u < units.length - 1) { n /= 1000; u++; }
  return (n >= 100 ? n.toFixed(0) : n.toFixed(2)) + units[u];
}

// ── PLUSHIE PILE ───────────────────────────────────────────────────────────
function plushColor(tier) {
  var pal = MACHINE_COL[machineTier].plush;
  return pal[GF.clamp(tier, 0, pal.length - 1)];
}
function makePlush(slot) {
  // tier weighted toward common; rarer tiers available deeper machines
  var maxT = maxPlushTier();
  var r = Math.random();
  var tier = 0;
  if (maxT >= 1 && r > 0.62) tier = 1;
  if (maxT >= 2 && r > 0.86) tier = 2;
  if (maxT >= 3 && r > 0.96) tier = 3;
  // heavier plushies for higher tiers (need more grip)
  var weight = 0.8 + tier * 0.75 + Math.random() * 0.3;
  return { slot: slot, tier: tier, weight: weight, color: plushColor(tier),
           x: 0, y: 0, wob: Math.random() * Math.PI * 2, scl: 0.9 + Math.random() * 0.25,
           popping: 0 };
}
function fillPile() {
  plushies = [];
  for (var i = 0; i < stockSlots; i++) plushies.push(makePlush(i));
  layoutPile();
}
function layoutPile() {
  // arrange plushies in a loose grid along the cabinet floor
  if (!L.cabW) return;
  var n = plushies.length;
  var perRow = Math.max(3, Math.floor(L.cabW / (PLUSH_R() * 2.1)));
  var gapX = L.cabW / (perRow + 1);
  var floorBottom = L.cabY + L.cabH - PLUSH_R() * 1.2;
  for (var i = 0; i < n; i++) {
    var p = plushies[i];
    var col = i % perRow, row = Math.floor(i / perRow);
    p.x = L.cabX + gapX * (col + 1);
    p.y = floorBottom - row * PLUSH_R() * 1.7;
  }
}
function PLUSH_R() { return GF.clamp(30 * GF.S, 18, 46); }
function GRAB_R()  { return GF.clamp(46 * GF.S, 28, 66); }
function CLAW_W()  { return GF.clamp(70 * GF.S, 44, 110); }
function CUST_R()  { return GF.clamp(19 * GF.S, 13, 28); }

// ── CLAW + GRAB (the active core beat) ────────────────────────────────────
function startDrop() {
  if (gs !== 'PLAYING' || clawState !== 'idle') return;
  clawState = 'dropping';
  GF.sfx('click');
}
function resolveGrab() {
  // find the nearest plushie within GRAB_R of the claw center
  var best = null, bestD = 1e9;
  for (var i = 0; i < plushies.length; i++) {
    var p = plushies[i];
    if (p.popping > 0) continue;
    var dx = p.x - clawX;
    var dd = Math.abs(dx);
    if (dd < bestD) { bestD = dd; best = p; }
  }
  var gr = GRAB_R();
  var success = false;
  if (best && bestD <= gr) {
    // success probability: accuracy, scaled by how centered, and grip vs weight
    var centerFactor = 1 - (bestD / gr) * 0.45;      // closer = better (softer penalty)
    var gripFactor = GF.clamp(grip() / best.weight, 0.45, 1.2);
    // a well-centered grab on a plushie within grip is reliable; off-center / heavy is risky
    var pSucc = GF.clamp(accuracy() * centerFactor * gripFactor, 0.08, 0.98);
    if (bestD <= PLUSH_R() * 0.55 && grip() >= best.weight * 0.85) success = true;
    else if (Math.random() < pSucc) success = true;
    if (success) {
      best.popping = 1;
      clawHeld = best;
    }
  }
  if (success) {
    onGoodGrab(clawHeld);
  } else {
    onMissGrab();
  }
}
function onGoodGrab(p) {
  totalGrabs++;
  if (!firstGrab) firstGrab = true;
  // combo
  combo = Math.min(99, combo + 1);
  comboTimer = COMBO_DECAY;
  // serve the front customer (refill + tip)
  var served = serveFrontCustomer();
  if (served) addDailyProgress('serve', 1);
  // sale value
  var val = prizeValue(p.tier) * comboMult();
  if (served && served.vip) val *= VIP_TIP;
  coins += val; score += val;
  recordPrizeMeta(p);
  GF.sfx(p.tier >= 2 ? 'reward' : 'coin');
  GF.spawnFloat(clawX, clawY - 10 * GF.S, '+' + fmt(val), p.tier >= 2 ? '#ffe27a' : '#fff0b0');
  if (combo >= 2) GF.spawnFloat(clawX, clawY - 34 * GF.S, GF.t('combo') + ' ×' + comboMult().toFixed(1), '#7CFC9A');
  GF.spawnParticles(clawX, clawY, p.color, 8);
  GF.setShake(0.12);
  checkRankUp();
  GF.saveRun();
}
function onMissGrab() {
  GF.sfx('error');
  GF.spawnFloat(clawX, clawY - 8 * GF.S, GF.t('missed'), '#ff8a8a');
  // combo breaks on a clean miss only if we already had one
  if (combo > 0) { combo = 0; }
}
function serveFrontCustomer() {
  if (!customers.length) return null;
  var c = customers.shift();
  satisfaction = Math.min(SAT_MAX, satisfaction + SERVE_REFILL + meta.franchiseLevel * 1.5);
  return c;
}

// ── UPGRADE ACTIONS ──────────────────────────────────────────────────────

function buyAcc()  { var c = accCost();  if (coins < c) return; coins -= c; accLvl++;  afterBuy('u_acc', accLvl, '#6fd6ff', L); }
function buyDrop() { var c = dropCost(); if (coins < c) return; coins -= c; dropLvl++; afterBuy('u_drop', dropLvl, '#ffb454', L); }
function buyClerk(){ var c = clerkCost();if (coins < c) return; coins -= c; clerks++;
  GF.sfx('unlock'); GF.spawnFloat(GF.cx, L.listY - 10 * GF.S, '+1 ' + GF.t('u_clerk'), '#ff9a3c');
  GF.spawnParticles(GF.cx, L.listY, '#ff9a3c', 10); GF.setShake(0.12); GF.saveRun(); }

// ── RATING (progression milestones) ───────────────────────────────────────
function checkRankUp() {
  while (ratingTier < RATING_THRESHOLDS.length - 1 && score >= RATING_THRESHOLDS[ratingTier + 1]) {
    ratingTier++;
    rankFlash = 1.3;
    GF.sfx('win'); GF.setShake(0.4);
    GF.spawnFloat(GF.cx, GF.H * 0.3, GF.t('rankup') + ' ' + ratingName(ratingTier), '#ffe27a');
    GF.spawnParticles(GF.cx, GF.H * 0.3, '#ffe27a', 24);
  }
}
function ratingProgress() {
  if (ratingTier >= RATING_THRESHOLDS.length - 1) return 1;
  var lo = RATING_THRESHOLDS[ratingTier], hi = RATING_THRESHOLDS[ratingTier + 1];
  return GF.clamp((score - lo) / (hi - lo), 0, 1);
}

// ── LOSE (arcade empties) ─────────────────────────────────────────────────
function emptyOut() {
  if (gs === 'GAMEOVER') return;
  var newBest = score > best;
  if (newBest) { best = score; try { localStorage.setItem('claw_tycoon_best', Math.floor(best)); } catch (e) {} }
  gs = 'GAMEOVER';
  GF.sfx('lose'); GF.setShake(0.8);
  GF.spawnParticles(GF.cx, GF.cy, '#ff5b6b', 40);
  GF.gameEnded(); GF.saveRun();
  if (newBest && best > 0) GF.happytime();
}
function resume() {
  satisfaction = SAT_MAX;
  customers = []; spawnAcc = 0;
  gs = 'PLAYING';
  GF.gameStarted(); GF.saveRun();
}

// ── GAME LIFECYCLE ─────────────────────────────────────────────────────────
function startGame() {
  coins = 0; score = 0;

  machineTier = 0; machinesUnlocked = 1; maxMachineReached = 0;
  satisfaction = SAT_MAX; ratingTier = 0;
  combo = 0; comboTimer = 0; totalGrabs = 0; firstGrab = false;
  clawState = 'idle'; clawHeld = null; clawY = 0; swayT = 0; dragging = false;
  stockSlots = stockCapacity(); restockAcc = 0; spawnAcc = 0; clerkAcc = 0; tickAcc = 0;

// ── TUTORIAL (interactive demo hand, action-gated) ────────────────────────

      target2: function () { var p = nearestPlushTarget(); return { x: p.x, y: L.railY + 24 * GF.S, r: GF.clamp(18 * GF.S, 14, 24) }; },
      gesture: 'drag', advance: 'manual' },
    { text: (GF.lang === 'ru' ? 'Тапни, чтобы опустить клешню и схватить!' : 'Tap to drop the claw and grab!'),
      target: function () { return { x: clawX, y: L.railY + 30 * GF.S, r: GF.clamp(18 * GF.S, 14, 24) }; },
      gesture: 'tap', advance: 'manual' },
    { text: (GF.lang === 'ru' ? 'Накопи монеты и купи улучшение внизу!' : 'Save coins and buy an upgrade below!'),

    { text: (GF.lang === 'ru' ? 'Автопродавцы зарабатывают сами. Лови игрушки, чтобы радовать клиентов!' : 'Auto-clerks earn for you. Keep grabbing to keep customers happy!'),

}
function nearestPlushTarget() {
  // a target a bit away from the claw so the demo drag clearly moves

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (newMachineFlash > 0) newMachineFlash = Math.max(0, newMachineFlash - dt);
  if (rankFlash > 0) rankFlash = Math.max(0, rankFlash - dt);
  if (shop) shop.update();

  GF.tutorial.update(dt);
  updateTutorialFocus(dt);
  // freeze the world (no drain/spawn) while the coach is up — first seconds can't fail
  var coachFreeze = GF.tutorial.active;

  // ── claw motion (runs even during coach so the demo gesture is real) ──
  updateClaw(dt);

  if (gs !== 'PLAYING') return;

  if (!coachFreeze) {
    // customer spawns (faster with more machines)
    spawnAcc += dt;
    var spawnEvery = SPAWN_BASE / (1 + (machinesUnlocked - 1) * 0.18);
    if (spawnAcc >= spawnEvery && customers.length < maxQueue()) {
      spawnAcc = 0;
      var vip = machinesUnlocked >= 2 && Math.random() < VIP_CHANCE;
      customers.push({ vip: vip, waited: 0 });
      if (vip) GF.sfx('spawn');
    }
    // satisfaction drain from waiting customers. The FRONT customer (being
    // served next) drains at full rate; those behind are more patient (waiting
    // in line) so they drain less — this keeps "1 customer ≈ 22s to empty" as
    // the doing-nothing lose, without a 3-deep queue becoming a death spiral.
    if (customers.length > 0) {
      var drain = 0;
      for (var i = 0; i < customers.length; i++) {
        customers[i].waited += dt;
        var posFactor = i === 0 ? 1 : 0.15;           // back of line is patient (serve the front!)
        drain += DRAIN_PER_WAITING * posFactor * (1 + customers[i].waited * 0.012);
      }
      satisfaction = Math.max(0, satisfaction - drain * dt);
      if (satisfaction <= 0) { emptyOut(); return; }
    } else {
      // no queue -> recover reputation
      satisfaction = Math.min(SAT_MAX, satisfaction + 7 * dt);
    }

    // auto-clerk passive income tick
    tickAcc += dt;
    while (tickAcc >= 0.1) {
      tickAcc -= 0.1;
      if (clerks > 0) {
        var gain = clerkPerSec() * 0.1;
        coins += gain; score += gain;
      }
    }
    if (clerks > 0) checkRankUp();
    // auto-clerk periodic serve (relieves satisfaction)
    if (clerks > 0 && customers.length > 0) {
      clerkAcc += dt;
      var serveEvery = Math.max(1.2, 4.5 / clerks);
      if (clerkAcc >= serveEvery) {
        clerkAcc = 0;
        serveFrontCustomer();
        GF.spawnParticles(L.cabX + L.cabW * 0.5, L.queueY + L.queueH / 2, '#ffd166', 5);
      }
    }

    // restock plushies on a timer (can refill several slots if behind, so the
    // machine stays grabbable and never starves the loop)
    if (plushies.length < stockSlots) {
      restockAcc += dt;
      var rt = restockTime();
      var refilled = false;
      while (restockAcc >= rt && plushies.length < stockSlots) {
        restockAcc -= rt;
        plushies.push(makePlush(plushies.length));
        refilled = true;
      }
      if (refilled) layoutPile();
    } else {
      restockAcc = 0;
    }

    // combo decay
    if (combo > 0) {
      comboTimer -= dt;
      if (comboTimer <= 0) { combo = 0; }
    }
  }

  // smoothed coins/sec readout
  coinsPerSecDisp = GF.lerp(coinsPerSecDisp, coinsPerSec(), Math.min(1, dt * 5));
}

function updateClaw(dt) {
  var railTopY = L.railY + 26 * GF.S;
  if (clawState === 'idle') {
    if (dragging) {
      clawX = GF.lerp(clawX, clawTargetX, Math.min(1, dt * 14));
    } else {

      swayT += dt;
      var swayAmp = L.cabW * 0.16;

    }
    clawX = GF.clamp(clawX, L.cabX + CLAW_W() * 0.5, L.cabX + L.cabW - CLAW_W() * 0.5);
    clawY = railTopY;
  } else if (clawState === 'dropping') {

    if (clawY >= floorY) {

    }

    if (GF.tutorial.step === 0 && dragging) { dragging = false; GF.tutorial.next(); }
    return;
  }
  if (dragging) {

    // release over the cabinet = drop the claw (tap-to-drop also lands here)
    if (clawState === 'idle') startDrop();

}
var shopDidDrag = false;
function beginAim(x, y) {
  dragging = true;
  clawTargetX = GF.clamp(x, L.cabX + CLAW_W() * 0.5, L.cabX + L.cabW - CLAW_W() * 0.5);
}
function inCabinet(x, y) { return x >= L.cabX && x <= L.cabX + L.cabW && y >= L.cabY && y <= L.cabY + L.cabH; }
function inRect(x, y, r) { return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
function doUpgrade(kind) {
  if (kind === 'idle_claim') claimIdleVisitors();
  else if (kind === 'daily_login') claimDailyLogin();
  else if (kind && kind.indexOf('daily_task') === 0) claimDailyTask(parseInt(kind.replace('daily_task', ''), 10) || 0);
  else if (kind === 'meta_shelf') buyMetaShelf();
  else if (kind === 'meta_franchise') buyMetaFranchise();
  else if (kind === 'meta_cabinet') buyMetaCabinet();
  else if (kind === 'grip') buyGrip();
  else if (kind === 'acc') buyAcc();
  else if (kind === 'drop') buyDrop();
  else if (kind === 'clerk') buyClerk();
  else if (kind === 'shelf') buyShelf();
  else if (kind === 'restock') buyRestock();
  else if (kind === 'machine') unlockNextMachine();
}

// ── LAYOUT ───────────────────────────────────────────────────────────────
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  L.topH = GF.clamp(50 * S, 42, 72);
  L.satY = L.topH;
  L.satH = GF.clamp(22 * S, 18, 32);
  var pad = GF.clamp(9 * S, 6, 14);
  L.queueY = L.satY + L.satH + pad * 0.6;
  L.queueH = GF.clamp(40 * S, 30, 56);

  // shop occupies the bottom ~42%
  var shopTop = H * 0.585;
  L.listY = shopTop;
  L.listH = H - shopTop - pad;

  // cabinet fills the band between queue and shop
  var cabTop = L.queueY + L.queueH + pad;
  var cabBot = L.listY - pad;
  L.cabH = cabBot - cabTop;
  L.cabW = Math.min(W - pad * 2, W * 0.96);
  L.cabX = (W - L.cabW) / 2;
  L.cabY = cabTop;
  L.railY = L.cabY + GF.clamp(8 * S, 5, 14);
  L.floorY = L.cabY + L.cabH;

  var hb = GF.clamp(32 * S, 26, 42);
  helpBtn = { x: W - hb - pad, y: pad * 0.7, w: hb, h: hb };
  muteBtn = { x: W - hb * 2 - pad * 2.2, y: pad * 0.7, w: hb, h: hb };

  // shop scroll controller
  if (!shop) shop = GF.makeScroll('claw_shop', { x: L.cabX, y: L.listY, w: L.cabW, h: L.listH });
  shop.setViewport({ x: pad, y: L.listY, w: W - pad * 2, h: L.listH });

  layoutPile();
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  layout();
  var mc = MACHINE_COL[machineTier];

  // candy-arcade background gradient
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#2a0f3a');
  g.addColorStop(0.5, '#1c0b2e');
  g.addColorStop(1, '#120820');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // neon floor glow tinted by machine
  var fg = ctx.createRadialGradient(W / 2, H, 0, W / 2, H, H * 0.7);
  fg.addColorStop(0, hexA(mc.g, 0.16));
  fg.addColorStop(1, hexA(mc.g, 0));
  ctx.fillStyle = fg; ctx.fillRect(0, 0, W, H);
  // carpet dots
  drawCarpet(ctx, mc);

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawTopStrip(ctx);
    drawSatBar(ctx);
    drawQueue(ctx);
    drawCabinet(ctx);
    drawShop(ctx);
    drawHelpButton(ctx);
    drawMuteButton(ctx);

    if (newMachineFlash > 0) {
      ctx.globalAlpha = newMachineFlash / 1.5 * 0.5;
      ctx.fillStyle = mc.g; ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
      drawBanner(ctx, newMachineLabel, mc.a);
    }
    if (rankFlash > 0) {
      ctx.globalAlpha = rankFlash / 1.3 * 0.4;
      ctx.fillStyle = '#ffe27a'; ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }
  }

  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);

  // tutorial overlay last
  GF.tutorial.draw(ctx);
  drawTutorialCue(ctx);
}

function hexA(hex, a) {
  var h = hex.replace('#', '');
  var r = parseInt(h.substr(0, 2), 16), gg = parseInt(h.substr(2, 2), 16), b = parseInt(h.substr(4, 2), 16);
  return 'rgba(' + r + ',' + gg + ',' + b + ',' + a + ')';
}
function drawCarpet(ctx, mc) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.save();
  ctx.globalAlpha = 0.06;
  var step = 34 * S;
  ctx.fillStyle = mc.a;
  for (var y = H * 0.6; y < H; y += step) {
    for (var x = (Math.floor(y / step) % 2) * step / 2; x < W; x += step) {
      ctx.beginPath(); ctx.arc(x, y, 2.2 * S, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.restore();
}

// ── SATISFACTION BAR (lose signal) ─────────────────────────────────────────
function drawSatBar(ctx) {
  var W = GF.W, S = GF.S;
  var pad = GF.clamp(9 * S, 6, 14);
  var x = pad, y = L.satY + 2 * S, w = W - pad * 2, h = L.satH - 4 * S;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fill();
  var frac = GF.clamp(satisfaction / SAT_MAX, 0, 1);
  var col = frac > 0.4 ? '#5ed3a8' : frac > 0.2 ? '#ffc24a' : '#ff5b6b';
  // pulse when low
  if (frac <= 0.2 && gs === 'PLAYING') {
    var p = 0.6 + 0.4 * Math.sin(Date.now() / 120);
    ctx.globalAlpha = p;
  }
  var grd = ctx.createLinearGradient(x, 0, x + w, 0);
  grd.addColorStop(0, col); grd.addColorStop(1, shade(col, 1.25));
  ctx.fillStyle = grd;
  GF.rr(ctx, x, y, Math.max(h, w * frac), h, h / 2); ctx.fill();
  ctx.globalAlpha = 1;
  // label
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('sat'), x + 8 * S, y + h / 2);
  if (frac <= 0.2 && gs === 'PLAYING') {

  }

}
function shade(hex, f) {
  var h = hex.replace('#', '');
  var r = Math.min(255, parseInt(h.substr(0, 2), 16) * f) | 0;
  var g = Math.min(255, parseInt(h.substr(2, 2), 16) * f) | 0;
  var b = Math.min(255, parseInt(h.substr(4, 2), 16) * f) | 0;
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

// ── CUSTOMER QUEUE ─────────────────────────────────────────────────────────
function drawQueue(ctx) {
  var W = GF.W, S = GF.S;
  var pad = GF.clamp(9 * S, 6, 14);
  var r = CUST_R();
  var y = L.queueY + L.queueH / 2;
  var x0 = pad + r + 4 * S;
  var gap = r * 2.3;
  // queue label backing
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  GF.rr(ctx, pad, L.queueY, W - pad * 2, L.queueH, 10 * S); ctx.fill();
  for (var i = 0; i < customers.length; i++) {
    var c = customers[i];
    var cx = x0 + i * gap;
    if (cx > W - pad - r) break;
    var front = i === 0;
    drawCustomer(ctx, cx, y, r, c.vip, front);
  }
  // empty hint
  if (customers.length === 0 && gs === 'PLAYING') {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = GF.clamp(12 * S, 10, 16) + 'px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.lang === 'ru' ? 'нет клиентов' : 'no customers', W / 2, y);
    ctx.textAlign = 'left';
  }
}
function drawCustomer(ctx, x, y, r, vip, front) {
  ctx.save();
  if (front) {
    ctx.shadowColor = vip ? '#ffd24a' : '#7ee0a8';
    ctx.shadowBlur = 10;
  }
  // body
  ctx.fillStyle = vip ? '#ffd24a' : '#bfe3ff';
  ctx.beginPath(); ctx.arc(x, y - r * 0.15, r * 0.7, 0, Math.PI * 2); ctx.fill();
  // shoulders
  ctx.beginPath();
  ctx.moveTo(x - r * 0.85, y + r);
  ctx.quadraticCurveTo(x, y + r * 0.2, x + r * 0.85, y + r);
  ctx.closePath(); ctx.fill();
  ctx.shadowColor = 'transparent';
  // face dot eyes
  ctx.fillStyle = '#2a1a3a';
  ctx.beginPath(); ctx.arc(x - r * 0.22, y - r * 0.2, r * 0.1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + r * 0.22, y - r * 0.2, r * 0.1, 0, Math.PI * 2); ctx.fill();
  if (vip) {
    ctx.strokeStyle = '#fff6c8'; ctx.lineWidth = 2 * GF.S;
    ctx.beginPath(); ctx.arc(x, y, r + 2 * GF.S, 0, Math.PI * 2); ctx.stroke();
    // vector star crown (NEVER emoji — beast_bazaar tofu bug)
    drawStar(ctx, x, y - r * 0.95, r * 0.36, '#fff0a6');
  }
  ctx.restore();
}

// ── CABINET + PLUSHIES + CLAW ──────────────────────────────────────────────
function drawCabinet(ctx) {
  var S = GF.S, mc = MACHINE_COL[machineTier];
  var x = L.cabX, y = L.cabY, w = L.cabW, h = L.cabH;
  // glass body
  ctx.save();
  var gg = ctx.createLinearGradient(x, y, x, y + h);
  gg.addColorStop(0, hexA(mc.g, 0.28));
  gg.addColorStop(0.5, hexA(mc.g, 0.12));
  gg.addColorStop(1, hexA(mc.g, 0.22));
  ctx.fillStyle = gg;
  GF.rr(ctx, x, y, w, h, 14 * S); ctx.fill();
  // frame
  ctx.strokeStyle = mc.f; ctx.lineWidth = GF.clamp(6 * S, 4, 10);
  GF.rr(ctx, x, y, w, h, 14 * S); ctx.stroke();
  // glass shine
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  GF.rr(ctx, x + 6 * S, y + 6 * S, w * 0.28, h - 12 * S, 8 * S); ctx.fill();
  ctx.restore();

  // gantry rail
  ctx.save();
  ctx.strokeStyle = mc.f; ctx.lineWidth = 4 * S;
  ctx.beginPath(); ctx.moveTo(x + 8 * S, L.railY); ctx.lineTo(x + w - 8 * S, L.railY); ctx.stroke();
  ctx.restore();

  // machine name (top inside)
  ctx.fillStyle = hexA(mc.a, 0.9);
  ctx.font = 'bold ' + GF.clamp(13 * S, 11, 18) + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(machineName(machineTier), x + w / 2, L.railY + 6 * S);
  drawArcadeBadge(ctx, x, y, w, h);
  drawDailyBoard(ctx);

  // combo meter (top-right inside)
  if (combo >= 2) {
    ctx.fillStyle = '#7CFC9A';
    ctx.font = 'bold ' + GF.clamp(13 * S, 11, 18) + 'px Inter, system-ui, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(GF.t('combo') + ' ×' + comboMult().toFixed(1), x + w - 10 * S, L.railY + 6 * S);
  }

  // plushies
  for (var i = 0; i < plushies.length; i++) {
    var p = plushies[i];
    if (p === clawHeld) continue; // drawn with claw
    drawPlush(ctx, p);
  }

  // stock pips (bottom inside)
  drawPrizeShelf(ctx);
  drawStockPips(ctx);

  // claw
  drawClaw(ctx);

  // next-goal line (just below cabinet, inside the gap before shop)
  drawNextGoal(ctx);

  // carried plushie on the claw
  if (clawHeld) drawPlush(ctx, clawHeld);
}

function drawPlush(ctx, p) {
  var r = PLUSH_R() * p.scl;
  var pop = p.popping > 0 ? (1 + (1 - p.popping) * 0.3) : 1;
  r *= pop;
  ctx.save();
  ctx.translate(p.x, p.y);
  var wob = Math.sin((Date.now() / 600) + p.wob) * 0.06;
  ctx.rotate(wob);
  // sprite or procedural
  var spriteName = 'plush' + p.tier;
  GF.drawSprite(spriteName, 0, 0, r * 2.2, function (c, cx2, cy2, size) {
    proceduralPlush(c, 0, 0, r, p.color, p.tier);
  });
  // rare sparkle (vector — NEVER emoji)
  if (p.tier >= 2) {
    var spk = 0.5 + 0.5 * Math.sin(Date.now() / 200);
    drawSparkle(ctx, r * 0.55, -r * 0.55, r * 0.34 * (0.8 + spk * 0.4), 'rgba(255,255,255,' + spk.toFixed(2) + ')');
  }
  ctx.restore();
}
function proceduralPlush(ctx, x, y, r, color, tier) {
  ctx.save();
  ctx.translate(x, y);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(0, r * 0.95, r * 0.85, r * 0.28, 0, 0, Math.PI * 2); ctx.fill();
  // body
  var grd = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.2, 0, 0, r);
  grd.addColorStop(0, shade(color, 1.25));
  grd.addColorStop(1, color);
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  // ears
  ctx.beginPath(); ctx.arc(-r * 0.6, -r * 0.7, r * 0.32, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.6, -r * 0.7, r * 0.32, 0, Math.PI * 2); ctx.fill();
  // inner ears
  ctx.fillStyle = shade(color, 0.7);
  ctx.beginPath(); ctx.arc(-r * 0.6, -r * 0.7, r * 0.16, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.6, -r * 0.7, r * 0.16, 0, Math.PI * 2); ctx.fill();
  // eyes
  ctx.fillStyle = '#2a1a2a';
  ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.05, r * 0.13, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.3, -r * 0.05, r * 0.13, 0, Math.PI * 2); ctx.fill();
  // eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-r * 0.26, -r * 0.1, r * 0.05, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.34, -r * 0.1, r * 0.05, 0, Math.PI * 2); ctx.fill();
  // cheeks
  ctx.fillStyle = 'rgba(255,120,150,0.45)';
  ctx.beginPath(); ctx.arc(-r * 0.5, r * 0.25, r * 0.13, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.5, r * 0.25, r * 0.13, 0, Math.PI * 2); ctx.fill();
  // smile
  ctx.strokeStyle = '#2a1a2a'; ctx.lineWidth = Math.max(1.2, r * 0.07); ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, r * 0.12, r * 0.22, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
  ctx.restore();
}
function drawClaw(ctx) {
  var S = GF.S, mc = MACHINE_COL[machineTier];
  var cw = CLAW_W();
  // cable
  ctx.strokeStyle = '#cfcfe0'; ctx.lineWidth = 3 * S;
  ctx.beginPath(); ctx.moveTo(clawX, L.railY); ctx.lineTo(clawX, clawY - cw * 0.2); ctx.stroke();
  // hub
  ctx.fillStyle = '#9aa0b8';
  GF.rr(ctx, clawX - cw * 0.22, clawY - cw * 0.32, cw * 0.44, cw * 0.22, 4 * S); ctx.fill();
  // claw prongs (clamp tighter while lifting/carrying)
  var open = clawState === 'lifting' || clawHeld ? 0.45 : (clawState === 'dropping' ? 0.8 : 1.0);
  ctx.save();
  GF.drawSprite('claw', clawX, clawY - cw * 0.02, cw * 1.15, function () {
    proceduralClaw(ctx, clawX, clawY, cw, open, mc);
  });
  ctx.restore();
}
function proceduralClaw(ctx, x, y, cw, open, mc) {
  ctx.save();
  ctx.translate(x, y - cw * 0.1);
  ctx.strokeStyle = '#c2c7da'; ctx.fillStyle = '#aeb4cc';
  ctx.lineWidth = Math.max(2, cw * 0.06); ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  var spread = cw * 0.42 * open;
  // three prongs
  for (var k = -1; k <= 1; k++) {
    var bx = k * spread * 0.5;
    ctx.beginPath();
    ctx.moveTo(0, -cw * 0.1);
    ctx.quadraticCurveTo(bx, cw * 0.18, k * spread, cw * 0.42);
    ctx.lineTo(k * spread + (k === 0 ? 0 : k * cw * 0.02), cw * 0.42);
    ctx.stroke();
  }
  // tips
  ctx.fillStyle = mc.f;
  for (var j = -1; j <= 1; j++) {
    ctx.beginPath(); ctx.arc(j * spread, cw * 0.42, cw * 0.06, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawDailyBoard(ctx) {

    ctx.fillText(fmt(meta.pendingVisitors) + ' ' + GF.t('visitors'), x + 8 * S, y + h * 0.68);
    drawTicketIcon(ctx, x + w - 44 * S, y + h * 0.68, 5.5 * S);
    ctx.textAlign = 'right';
    ctx.fillText(fmt(meta.pendingTickets), x + w - 8 * S, y + h * 0.68);
  } else if (meta.dailyTasks.length) {
    var task = meta.dailyTasks[0];
    for (var i = 0; i < meta.dailyTasks.length; i++) {
      if (!meta.dailyTasks[i].claimed) { task = meta.dailyTasks[i]; break; }
    }
    ctx.fillText(dailyTaskLabel(task) + ' ' + dailyProgressText(task), x + 8 * S, y + h * 0.7);
  }
  ctx.restore();
}
function drawPrizeShelf(ctx) {
  var S = GF.S;

  var h = GF.clamp(25 * S, 20, 34);

  ctx.fillText(GF.t('shelf') + ' ' + GF.t('lvl') + ' ' + meta.shelfLevel, x + 8 * S, y + h / 2);
  var r = h * 0.22;
  var startX = x + w - 78 * S;
  for (var i = 0; i < 4; i++) {
    var cx = startX + i * 21 * S;
    ctx.fillStyle = MACHINE_COL[Math.min(machineTier, MACHINE_COL.length - 1)].plush[i];
    ctx.beginPath(); ctx.arc(cx, y + h / 2, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + GF.clamp(7.5 * S, 6, 10) + 'px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(Math.min(99, meta.collection[i] || 0), cx, y + h / 2 + 0.5 * S);
  }
  ctx.restore();
}
function drawStockPips(ctx) {
  var S = GF.S;
  var n = stockSlots;
  var filled = plushies.length;
  var pr = GF.clamp(4 * S, 3, 7);
  var gap = pr * 2.6;
  var totalW = (n - 1) * gap;
  var startX = L.cabX + L.cabW / 2 - totalW / 2;
  var y = L.cabY + L.cabH - 10 * S;
  for (var i = 0; i < n; i++) {
    ctx.beginPath();
    ctx.arc(startX + i * gap, y, pr, 0, Math.PI * 2);
    ctx.fillStyle = i < filled ? MACHINE_COL[machineTier].a : 'rgba(255,255,255,0.18)';
    ctx.fill();
  }
}
function drawNextGoal(ctx) {
  var S = GF.S;
  var txt = nextGoalText();
  if (!txt) return;
  ctx.fillStyle = 'rgba(255,255,255,0.78)';
  ctx.font = GF.clamp(12 * S, 10, 16) + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText(txt, GF.W / 2, L.listY - 4 * S);
  ctx.textBaseline = 'alphabetic';
}
function nextGoalText() {
  // cheapest not-yet-affordable meaningful target, else next machine / rank
  var opts = [];
  if (machineTier < MAX_MACHINE) opts.push({ c: machineUnlockCost(machineTier + 1), label: GF.t('goal_unlock') + ' ' + machineName(machineTier + 1) });
  if (ratingTier < RATING_THRESHOLDS.length - 1) opts.push({ c: RATING_THRESHOLDS[ratingTier + 1], label: GF.t('goal_rank') + ' ' + ratingName(ratingTier + 1), isScore: true });
  // pick the nearest target above current resources
  var bestO = null;
  for (var i = 0; i < opts.length; i++) {
    var o = opts[i];
    var have = o.isScore ? score : coins;
    if (have < o.c) {
      if (!bestO || o.c < bestO.c) bestO = o;
    }
  }
  if (bestO) return GF.t('goal_save') + ' ' + fmt(Math.ceil(bestO.c)) + ' ' + bestO.label;
  return '';
}

// ── SHOP (scrollable upgrade list) ─────────────────────────────────────────
function shopItems() {
  // build the live list of upgrade rows in a fixed order; machine unlock pinned near top
  var items = [];
  if (meta.pendingTickets > 0) {
    items.push({ kind: 'idle_claim', name: GF.t('morning_shift'), desc: fmt(meta.pendingVisitors) + ' ' + GF.t('visitors') + ' · ' + GF.t('cap_10h'),
      cost: meta.pendingTickets, costType: 'tickets', lvl: null, col: '#7ee0a8', claim: true });
  }
  if (meta.loginPending) {
    items.push({ kind: 'daily_login', name: GF.t('daily_streak') + ' ' + meta.streak, desc: GF.t('daily_login_d'),
      cost: meta.loginReward || dailyLoginReward(), costType: 'tickets', lvl: null, col: '#ffd24a', claim: true });
  }
  for (var d = 0; d < meta.dailyTasks.length; d++) {
    var task = meta.dailyTasks[d];
    items.push({ kind: 'daily_task' + d, name: GF.t('daily_goal') + ': ' + dailyTaskLabel(task),
      desc: dailyTaskDesc(task), cost: task.reward, costType: 'tickets', lvl: null, col: task.claimed ? '#888' : '#ffe27a',
      claim: true, locked: task.progress < task.target, maxed: task.claimed, lockText: dailyProgressText(task) });
  }
  items.push({ kind: 'meta_cabinet', name: GF.t('u_meta_cabinet'), desc: metaCabinetReady() ? GF.t('u_meta_cabinet_d') : (GF.t('next_cabinet') + ': ' + Math.max(0, nextCabinetNeed() - meta.totalPrizes) + ' ' + GF.t('more_catches')),
    cost: metaCabinetCost(), costType: 'tickets', lvl: meta.cabinets, col: '#ffe27a', own: true,
    locked: !metaCabinetReady(), maxed: meta.cabinets >= META_MAX_CABINETS });
  items.push({ kind: 'meta_shelf', name: GF.t('u_meta_shelf'), desc: GF.t('u_meta_shelf_d'),
    cost: metaShelfCost(), costType: 'tickets', lvl: meta.shelfLevel, col: '#ff8ad1',
    maxed: meta.shelfLevel >= META_MAX_SHELF });
  items.push({ kind: 'meta_franchise', name: GF.t('u_meta_franchise'), desc: GF.t('u_meta_franchise_d'),
    cost: metaFranchiseCost(), costType: 'tickets', lvl: meta.franchiseLevel, col: '#6fd6ff',
    maxed: meta.franchiseLevel >= META_MAX_FRANCHISE });
  if (machineTier < MAX_MACHINE) {
    items.push({ kind: 'machine', name: GF.t('u_machine') + ': ' + machineName(machineTier + 1), desc: GF.t('u_machine_d'),
      cost: machineUnlockCost(machineTier + 1), lvl: null, col: MACHINE_COL[Math.min(MAX_MACHINE, machineTier + 1)].g });
  }
  items.push({ kind: 'grip', name: GF.t('u_grip'), desc: GF.t('u_grip_d'), cost: gripCost(), lvl: gripLvl, col: '#ffd166' });
  items.push({ kind: 'acc', name: GF.t('u_acc'), desc: GF.t('u_acc_d'), cost: accCost(), lvl: accLvl, col: '#6fd6ff' });
  items.push({ kind: 'clerk', name: GF.t('u_clerk'), desc: GF.t('u_clerk_d'), cost: clerkCost(), lvl: clerks, col: '#ff9a3c', own: true });
  items.push({ kind: 'shelf', name: GF.t('u_shelf'), desc: GF.t('u_shelf_d'), cost: shelfCost(), lvl: shelfLvl, col: '#ff8ad1' });
  items.push({ kind: 'drop', name: GF.t('u_drop'), desc: GF.t('u_drop_d'), cost: dropCost(), lvl: dropLvl, col: '#ffb454' });
  items.push({ kind: 'restock', name: GF.t('u_restock'), desc: GF.t('u_restock_d'), cost: restockCost(), lvl: restockLvl, col: '#7ee0a8' });
  return items;
}
function itemAffordable(it) {
  if (it.claim) return !it.maxed && !it.locked;
  if (it.maxed || it.locked) return false;
  return it.costType === 'tickets' ? meta.tickets >= it.cost : coins >= it.cost;
}
function drawShop(ctx) {
  var W = GF.W, S = GF.S;
  var pad = GF.clamp(9 * S, 6, 14);
  var items = shopItems();
  L.rowGap = GF.clamp(7 * S, 4, 11);
  L.rowH = GF.clamp(64 * S, 50, 84);
  var rowFull = W - pad * 2;
  var contentH = items.length * (L.rowH + L.rowGap);
  shop.setContentHeight(contentH);

  // panel backing
  ctx.fillStyle = 'rgba(14,8,26,0.55)';
  GF.rr(ctx, pad - 2 * S, L.listY - 2 * S, rowFull + 4 * S, L.listH + 4 * S, 12 * S); ctx.fill();

  upgradeRects = [];
  shop.begin(ctx);
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var ry = i * (L.rowH + L.rowGap);
    var screenY = ry + L.listY - shop.offset; // for hit rect
    drawShopRow(ctx, it, pad, ry, rowFull, L.rowH);
    if (GF.tutorial.active && GF.tutorial.step === 2 && it.kind === tutorialFocusKind) {
      drawShopTutorialFocus(ctx, pad, ry, rowFull, L.rowH, it.col);
    }
    upgradeRects.push({ kind: it.kind, x: pad, y: screenY, w: rowFull, h: L.rowH,
      cost: it.cost, enabled: itemAffordable(it) });
  }
  shop.end(ctx);
  shop.draw(ctx);
}
function drawShopTutorialFocus(ctx, x, y, w, h, col) {
  var pulse = 0.5 + 0.5 * Math.sin(tutorialCueT * 6);
  ctx.save();
  ctx.strokeStyle = col || '#7CFC9A';
  ctx.globalAlpha = 0.78 + pulse * 0.22;
  ctx.lineWidth = Math.max(3, 3.5 * GF.S);
  ctx.shadowColor = col || '#7CFC9A';
  ctx.shadowBlur = 12 * GF.S;
  GF.rr(ctx, x + 3 * GF.S, y + 3 * GF.S, w - 6 * GF.S, h - 6 * GF.S, 12 * GF.S);
  ctx.stroke();
  ctx.restore();
}
function drawShopRow(ctx, it, x, y, w, h) {
  var S = GF.S;
  var afford = itemAffordable(it);
  var maxed = !!it.maxed || (it.kind === 'machine' && machineTier >= MAX_MACHINE);
  // row bg
  var grd = ctx.createLinearGradient(x, y, x, y + h);
  if (afford) { grd.addColorStop(0, 'rgba(46,28,68,0.95)'); grd.addColorStop(1, 'rgba(34,20,52,0.95)'); }
  else { grd.addColorStop(0, 'rgba(28,18,42,0.9)'); grd.addColorStop(1, 'rgba(22,14,34,0.9)'); }
  ctx.save();
  if (afford) { ctx.shadowColor = hexA(it.col, 0.5); ctx.shadowBlur = 10 * S; }
  ctx.fillStyle = grd;
  GF.rr(ctx, x, y, w, h, 11 * S); ctx.fill();
  ctx.restore();
  // accent stripe + icon disc
  ctx.fillStyle = it.col;
  GF.rr(ctx, x, y, 5 * S, h, 2 * S); ctx.fill();
  var icR = h * 0.32;
  var icX = x + 14 * S + icR, icY = y + h / 2;
  ctx.fillStyle = hexA(it.col, 0.25);
  ctx.beginPath(); ctx.arc(icX, icY, icR, 0, Math.PI * 2); ctx.fill();
  drawUpgradeIcon(ctx, it.kind, icX, icY, icR * 0.9, it.col);

  // name + desc
  var tx = icX + icR + 12 * S;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + GF.clamp(14 * S, 12, 18) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(it.name, tx, y + h * 0.42);
  ctx.fillStyle = 'rgba(220,210,240,0.75)';
  ctx.font = GF.clamp(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(it.desc, tx, y + h * 0.72);
  // level / own pip
  if (it.lvl !== null && it.lvl !== undefined && it.lvl > 0) {
    ctx.fillStyle = hexA(it.col, 0.9);
    ctx.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';
    ctx.textAlign = 'left';
    var lbl = (it.own ? (GF.t('own') + ' ' + it.lvl) : (GF.t('lvl') + ' ' + it.lvl));
    ctx.fillText(lbl, tx, y + h - 4 * S);
  }

  // cost pill (right)
  if (maxed) {
    ctx.fillStyle = '#888'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px Inter, sans-serif';
    ctx.fillText(it.claim ? GF.t('daily_done') : GF.t('maxed'), x + w - 14 * S, y + h / 2);
  } else if (it.locked) {
    ctx.fillStyle = '#3a3050';
    var lockW = GF.clamp(108 * S, 82, 148), lockH = h * 0.5;
    var lockX = x + w - lockW - 10 * S, lockY = y + (h - lockH) / 2;
    GF.rr(ctx, lockX, lockY, lockW, lockH, lockH / 2); ctx.fill();
    ctx.fillStyle = '#bbb1cc';
    ctx.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px Inter, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(it.lockText || (Math.max(0, nextCabinetNeed() - meta.totalPrizes) + ' ' + GF.t('need_catches')), lockX + lockW / 2, lockY + lockH / 2);
  } else {
    var pillW = it.claim ? GF.clamp(102 * S, 80, 138) : GF.clamp(82 * S, 60, 120), pillH = h * 0.5;
    var pillX = x + w - pillW - 10 * S, pillY = y + (h - pillH) / 2;
    var pg = ctx.createLinearGradient(pillX, pillY, pillX, pillY + pillH);
    if (afford) { pg.addColorStop(0, '#ffe27a'); pg.addColorStop(1, '#f4b842'); }
    else { pg.addColorStop(0, '#3a3050'); pg.addColorStop(1, '#2c2440'); }
    ctx.fillStyle = pg;
    GF.rr(ctx, pillX, pillY, pillW, pillH, pillH / 2); ctx.fill();
    if (it.costType === 'tickets') drawTicketIcon(ctx, pillX + 14 * S, pillY + pillH / 2, pillH * 0.3);
    else drawCoinIcon(ctx, pillX + 14 * S, pillY + pillH / 2, pillH * 0.28);
    ctx.fillStyle = afford ? '#2a1408' : '#888';
    ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px Inter, sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText((it.claim ? (GF.t('claim') + ' ') : '') + fmt(it.cost), pillX + 24 * S, pillY + pillH / 2 + 0.5 * S);
    // affordable ▲ glow
    if (afford) {
      ctx.fillStyle = '#7CFC9A'; ctx.textAlign = 'center';
      ctx.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px Inter, sans-serif';
      ctx.fillText('▲', pillX - 8 * S, pillY + pillH / 2 + 1 * S);
    }
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}
function drawUpgradeIcon(ctx, kind, x, y, r, col) {
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = Math.max(1.6, r * 0.16);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (kind === 'grip') {
    // claw prongs
    for (var k = -1; k <= 1; k++) { ctx.beginPath(); ctx.moveTo(0, -r * 0.6); ctx.lineTo(k * r * 0.6, r * 0.6); ctx.stroke(); }
  } else if (kind === 'idle_claim') {
    ctx.beginPath(); ctx.arc(-r * 0.32, -r * 0.18, r * 0.22, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(r * 0.28, -r * 0.2, r * 0.2, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r * 0.62, r * 0.52); ctx.quadraticCurveTo(-r * 0.32, r * 0.06, 0, r * 0.52); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r * 0.02, r * 0.52); ctx.quadraticCurveTo(r * 0.28, r * 0.08, r * 0.58, r * 0.52); ctx.stroke();
  } else if (kind === 'daily_login') {
    ctx.beginPath(); GF.rr(ctx, -r * 0.58, -r * 0.48, r * 1.16, r * 0.96, r * 0.12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r * 0.58, -r * 0.2); ctx.lineTo(r * 0.58, -r * 0.2); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, r * 0.14, r * 0.18, 0, Math.PI * 2); ctx.fill();
  } else if (kind && kind.indexOf('daily_task') === 0) {
    ctx.beginPath(); GF.rr(ctx, -r * 0.48, -r * 0.58, r * 0.96, r * 1.16, r * 0.1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r * 0.22, -r * 0.2); ctx.lineTo(-r * 0.02, 0); ctx.lineTo(r * 0.34, -r * 0.34); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r * 0.25, r * 0.28); ctx.lineTo(r * 0.32, r * 0.28); ctx.stroke();
  } else if (kind === 'meta_shelf') {
    ctx.beginPath(); ctx.moveTo(-r * 0.65, r * 0.25); ctx.lineTo(r * 0.65, r * 0.25); ctx.moveTo(-r * 0.5, -r * 0.25); ctx.lineTo(r * 0.5, -r * 0.25); ctx.stroke();
    ctx.beginPath(); ctx.arc(-r * 0.32, -r * 0.52, r * 0.18, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(r * 0.28, -r * 0.5, r * 0.22, 0, Math.PI * 2); ctx.fill();
  } else if (kind === 'meta_franchise') {
    ctx.beginPath(); GF.rr(ctx, -r * 0.55, -r * 0.45, r * 1.1, r * 0.9, r * 0.12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r * 0.3, -r * 0.45); ctx.lineTo(-r * 0.3, -r * 0.7); ctx.lineTo(r * 0.3, -r * 0.7); ctx.lineTo(r * 0.3, -r * 0.45); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, r * 0.16, 0, Math.PI * 2); ctx.fill();
  } else if (kind === 'meta_cabinet') {
    ctx.beginPath(); GF.rr(ctx, -r * 0.56, -r * 0.62, r * 1.12, r * 1.24, r * 0.15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r * 0.35, -r * 0.35); ctx.lineTo(r * 0.35, -r * 0.35); ctx.moveTo(-r * 0.35, r * 0.08); ctx.lineTo(r * 0.35, r * 0.08); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, -r * 0.08, r * 0.14, 0, Math.PI * 2); ctx.fill();
  } else if (kind === 'acc') {
    // target
    ctx.beginPath(); ctx.arc(0, 0, r * 0.7, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, r * 0.3, 0, Math.PI * 2); ctx.stroke();
  } else if (kind === 'drop') {
    // down arrow
    ctx.beginPath(); ctx.moveTo(0, -r * 0.6); ctx.lineTo(0, r * 0.5); ctx.moveTo(-r * 0.4, r * 0.1); ctx.lineTo(0, r * 0.6); ctx.lineTo(r * 0.4, r * 0.1); ctx.stroke();
  } else if (kind === 'clerk') {
    // person
    ctx.beginPath(); ctx.arc(0, -r * 0.3, r * 0.32, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-r * 0.55, r * 0.6); ctx.quadraticCurveTo(0, -r * 0.1, r * 0.55, r * 0.6); ctx.closePath(); ctx.fill();
  } else if (kind === 'shelf') {
    // shelf lines
    ctx.beginPath(); ctx.moveTo(-r * 0.6, -r * 0.3); ctx.lineTo(r * 0.6, -r * 0.3); ctx.moveTo(-r * 0.6, r * 0.3); ctx.lineTo(r * 0.6, r * 0.3); ctx.stroke();
    ctx.beginPath(); ctx.arc(-r * 0.25, -r * 0.55, r * 0.16, 0, Math.PI * 2); ctx.fill();
  } else if (kind === 'restock') {
    // recycle-ish arrows
    ctx.beginPath(); ctx.arc(0, 0, r * 0.55, -0.4 * Math.PI, 1.1 * Math.PI); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r * 0.1, -r * 0.6); ctx.lineTo(r * 0.55, -r * 0.4); ctx.lineTo(r * 0.3, -r * 0.05); ctx.stroke();
  } else if (kind === 'machine') {
    // cabinet
    ctx.beginPath(); GF.rr(ctx, -r * 0.5, -r * 0.6, r, r * 1.2, r * 0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -r * 0.5); ctx.lineTo(0, -r * 0.1); ctx.stroke();
  }
  ctx.restore();
}

// ── VECTOR GLYPHS (NEVER emoji — beast_bazaar tofu bug) ────────────────────
function drawStar(ctx, x, y, r, col) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = col;
  ctx.beginPath();
  for (var i = 0; i < 10; i++) {
    var ang = -Math.PI / 2 + i * Math.PI / 5;
    var rad = i % 2 === 0 ? r : r * 0.45;
    var px = Math.cos(ang) * rad, py = Math.sin(ang) * rad;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}
function drawSparkle(ctx, x, y, r, col) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = col;
  // four-point sparkle (diamond cross)
  ctx.beginPath();
  ctx.moveTo(0, -r); ctx.quadraticCurveTo(r * 0.15, -r * 0.15, r, 0);
  ctx.quadraticCurveTo(r * 0.15, r * 0.15, 0, r);
  ctx.quadraticCurveTo(-r * 0.15, r * 0.15, -r, 0);
  ctx.quadraticCurveTo(-r * 0.15, -r * 0.15, 0, -r);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ── COIN ICON (procedural — NEVER emoji) ───────────────────────────────────
function drawCoinIcon(ctx, x, y, r) {
  ctx.save();
  ctx.translate(x, y);
  var grd = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.2, 0, 0, r);
  grd.addColorStop(0, '#fff3b0'); grd.addColorStop(0.6, '#ffd34a'); grd.addColorStop(1, '#e0a020');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#b8841a'; ctx.lineWidth = Math.max(1, r * 0.14);
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#b8841a';
  ctx.font = 'bold ' + (r * 1.2) + 'px Inter, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('$', 0, r * 0.08);
  ctx.restore();
}

// How-to-play card body (shared by MENU). The tut_* strings already embed their
// own label ("Goal: ...", "Цель: ..."), so we render them as-is (no double label).
function howToLines() {
  return [
    { text: GF.t('tut_goal') },
    { text: GF.t('tut_controls') },
    { text: GF.t('tut_win') },
    { text: GF.t('tut_lose') },
    { text: GF.t('tut_tip') },
  ];
}
function wrapTextLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

function drawMenu(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  // dim
  ctx.fillStyle = 'rgba(12,6,22,0.82)'; ctx.fillRect(0, 0, W, H);
  // title
  ctx.fillStyle = '#ffd6f0';
  ctx.font = 'bold ' + GF.clamp(34 * S, 24, 46) + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#ff7eb3'; ctx.shadowBlur = 18 * S;
  ctx.fillText(GF.t('title'), W / 2, H * 0.13);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#9ad6ff';
  ctx.font = GF.clamp(13 * S, 11, 17) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('sub'), W / 2, H * 0.13 + GF.clamp(30 * S, 22, 40));

  // How-to card
  var cardX = W * 0.07, cardW = W * 0.86;
  var cardY = H * 0.24;
  var maxW = cardW - 24 * S;
  var lh = GF.clamp(16 * S, 13, 21);
  ctx.font = GF.clamp(12 * S, 10, 16) + 'px Inter, system-ui, sans-serif';
  // measure
  var lines = howToLines();
  var totalH = 14 * S;
  for (var i = 0; i < lines.length; i++) {
    var wl = wrapTextLines(ctx, lines[i].text, maxW);
    totalH += wl.length * lh + 8 * S;
  }
  // card bg
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  GF.rr(ctx, cardX, cardY, cardW, totalH, 14 * S); ctx.fill();
  ctx.strokeStyle = 'rgba(255,126,179,0.4)'; ctx.lineWidth = 1.5 * S;
  GF.rr(ctx, cardX, cardY, cardW, totalH, 14 * S); ctx.stroke();
  // text
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  var ty = cardY + 12 * S;
  for (var j = 0; j < lines.length; j++) {
    var full = lines[j].text;
    var wls = wrapTextLines(ctx, full, maxW);
    for (var k = 0; k < wls.length; k++) {
      if (k === 0) {
        // bold label portion
        ctx.fillStyle = '#ffd24a';
      } else ctx.fillStyle = 'rgba(235,228,248,0.92)';
      // simple: draw whole wrapped line; first line shows label color emphasis
      ctx.fillStyle = k === 0 ? '#ffe1a6' : 'rgba(235,228,248,0.9)';
      ctx.fillText(wls[k], cardX + 12 * S, ty);
      ty += lh;
    }
    ty += 8 * S;
  }

  // PLAY button (use gf-lib overlay button registration via custom rect)
  var btnW = GF.clamp(200 * S, 150, 280), btnH = GF.clamp(54 * S, 44, 70);
  var btnX = W / 2 - btnW / 2, btnY = cardY + totalH + 18 * S;
  if (btnY + btnH > H - 14 * S) btnY = H - btnH - 14 * S;
  var bg = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  bg.addColorStop(0, '#ff9ad1'); bg.addColorStop(1, '#ff5b9b');
  ctx.save(); ctx.shadowColor = 'rgba(255,90,155,0.6)'; ctx.shadowBlur = 18 * S;
  ctx.fillStyle = bg; GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(20 * S, 16, 28) + 'px Inter, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('▶ ' + GF.t('play'), W / 2, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  playBtnRect = { x: btnX, y: btnY, w: btnW, h: btnH };

  // best
  if (best > 0) {
    ctx.fillStyle = '#9ad6ff'; ctx.font = GF.clamp(13 * S, 11, 17) + 'px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(GF.t('best') + ': ' + fmt(best), W / 2, btnY + btnH + 24 * S);
  }
}

// ── UNIFIED POINTER (mouse + touch) ───────────────────────────────────────
function evtXY(e) {
  if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}
function overlayDown(x, y) {
  // PLAY / RESUME on menu + gameover
  if ((gs === 'MENU' || gs === 'GAMEOVER') && playBtnRect) {
    if (inRect(x, y, playBtnRect)) {
      if (gs === 'MENU') startGame(); else resume();
      return true;
    }
    // mute reachable on overlays too
    if (inRect(x, y, muteBtn)) { var m = GF.toggleMute(); GF.setMusicMuted(m); ClawTycoonMusic.setMuted(m); return true; }
    return true; // swallow other taps on overlay
  }
  return false;
}

function runAdNoFillProbe(kind) {
  var oldTimeout = window.__GF_AD_WATCHDOG_MS;
  window.__GF_AD_WATCHDOG_MS = 650;
  var p = kind === 'rewarded' ? GF.ads.rewarded({}) : GF.ads.interstitial({ force: true });
  return new Promise(function (resolve) {
    var done = false;
    var timer = setTimeout(function () {
      if (done) return;
      done = true;
      window.__GF_AD_WATCHDOG_MS = oldTimeout;
      resolve({ verdict: 'FAIL', detail: kind + ' no-fill did not resolve before watchdog' });
    }, 2200);
    p.then(function (r) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      window.__GF_AD_WATCHDOG_MS = oldTimeout;
      resolve({ verdict: 'PASS', detail: kind + ' no-fill recovered (shown=' + !!(r && r.shown) + ', rewarded=' + !!(r && r.rewarded) + ')' });
    }).catch(function (e) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      window.__GF_AD_WATCHDOG_MS = oldTimeout;
      resolve({ verdict: 'FAIL', detail: kind + ' no-fill rejected: ' + (e && e.message ? e.message : e) });
    });
  });
}

    metaCollection: meta.collection.slice(),
    dailyStreak: meta.streak, dailyDay: meta.dailyDay, dailyComplete: dailyCompleteCount(),
    dailyClaimable: dailyClaimableCount(), dailyLoginPending: meta.loginPending,
    pendingVisitors: meta.pendingVisitors, pendingTickets: meta.pendingTickets, pendingHours: meta.pendingHours,
    dailyTasks: meta.dailyTasks.map(function (t) { return { id: t.id, progress: t.progress, target: t.target, reward: t.reward, claimed: t.claimed }; }),
    franchiseMult: franchiseMult(), nextMetaHook: nextMetaHook(),
    gripLvl: gripLvl, accLvl: accLvl, dropLvl: dropLvl, clerks: clerks, shelfLvl: shelfLvl, restockLvl: restockLvl,
    combo: combo, comboMult: comboMult(), totalGrabs: totalGrabs,
    grip: grip(), accuracy: accuracy(), dropSpeed: dropSpeed(), restockTime: restockTime(),
    queueLen: customers.length, stock: plushies.length, stockSlots: stockSlots,
    // tunables (DESIGN.md §Tunables) — names must match DESIGN.md
    SPAWN_BASE: SPAWN_BASE, DRAIN_PER_WAITING: DRAIN_PER_WAITING, SAT_MAX: SAT_MAX,
    SERVE_REFILL: SERVE_REFILL, GRIP_BASE: GRIP_BASE, ACCURACY_BASE: ACCURACY_BASE,
    DROP_SPEED_BASE: DROP_SPEED_BASE, BASE_PRIZE: BASE_PRIZE, AUTOCLERK_BASE_CPS: AUTOCLERK_BASE_CPS,
    COST_GROWTH: COST_GROWTH, MACHINE_MULT: MACHINE_MULT, COMBO_STEP: COMBO_STEP, COMBO_MAX: COMBO_MAX,
    RESTOCK_BASE: RESTOCK_BASE, RATING_THRESHOLDS: RATING_THRESHOLDS,
  };
});

// Bot contract for the progression probe (#276). This is a decision/management
// game: getActions returns what's available NOW; doAction performs one. The bot
// drops the claw (grab) when idle and greedily buys every upgrade (buy fns no-op
// when unaffordable), exercising the full economy loop.
GF.exposeBot(
  function () {
    if (gs !== 'PLAYING') return [];
    var a = [];
    if (clawState === 'idle') a.push('drop');
    a.push('aim');
    if (meta.pendingTickets > 0) a.push('idle_claim');
    if (meta.loginPending) a.push('daily_login');
    for (var i = 0; i < meta.dailyTasks.length; i++) a.push('daily_task' + i);
    a.push('grip', 'acc', 'drop_up', 'clerk', 'shelf', 'restock', 'machine');
    a.push('meta_shelf', 'meta_franchise', 'meta_cabinet');
    return a;
  },
  function (act) {
    if (gs !== 'PLAYING') return;
    if (act === 'drop') { if (clawState === 'idle') startDrop(); }
    else if (act === 'aim') {
      // snap the claw onto a real plushie center so a bot can land grabs (skill-aim emulation)
      if (plushies.length) {
        var p = plushies[Math.floor(Math.random() * plushies.length)];
        clawTargetX = GF.clamp(p.x, L.cabX + CLAW_W() * 0.5, L.cabX + L.cabW - CLAW_W() * 0.5);
        clawX = clawTargetX;
        dragging = true; // freeze sway so the aim holds
      }
    }
    else if (act === 'idle_claim') claimIdleVisitors();
    else if (act === 'daily_login') claimDailyLogin();
    else if (act && act.indexOf('daily_task') === 0) claimDailyTask(parseInt(act.replace('daily_task', ''), 10) || 0);
    else if (act === 'grip') buyGrip();
    else if (act === 'acc') buyAcc();
    else if (act === 'drop_up') buyDrop();
    else if (act === 'clerk') buyClerk();
    else if (act === 'shelf') buyShelf();
    else if (act === 'restock') buyRestock();
    else if (act === 'machine') unlockNextMachine();
    else if (act === 'meta_shelf') buyMetaShelf();
    else if (act === 'meta_franchise') buyMetaFranchise();
    else if (act === 'meta_cabinet') buyMetaCabinet();
  }
);

})();
</script>
