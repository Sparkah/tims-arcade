(function () {
'use strict';

// ============================================================================

// ============================================================================

    gameover: 'Подземелье сломило тебя', reached: 'Глубина %n',

    st_counter: 'Контр', st_window: 'Окно', st_hp: 'Макс ЗД', st_lifesteal: 'Вампиризм',
    rar_common: 'Обычный', rar_rare: 'Редкий', rar_epic: 'Эпический', rar_legendary: 'Легендарный',
    shop_title: 'ТОРГОВЕЦ', continue_btn: 'ДАЛЬШЕ', buy: 'КУПИТЬ',
    shop_heal: 'Зелье', shop_heal_d: 'Восстановить 40 ЗД',
    shop_reroll: 'Реролл предмета', shop_reroll_d: 'Новый случайный предмет',
    shop_buy: 'Купить предмет', shop_buy_d: 'Гарантированное улучшение',
    cant_afford: 'Нужно %n золота',
    paused: 'Пауза', resume: 'Продолжить', how_to: 'Как играть',
    perfect: 'ИДЕАЛ', miss: 'МИМО', late: 'ПОЗДНО', early: 'РАНО', tap_cue: 'ТАП',
    armored: 'БРОНЯ', poison: 'ЯД', enraged: 'ЯРОСТЬ',
    coach_tap: 'ТАПНИ, когда бегунок войдёт в ЗЕЛЁНУЮ зону!',
    coach_again: 'Поймай момент - жди зелёного',
    sound: 'Звук', snd_on: 'вкл', snd_off: 'выкл',
    tut_goal_l: 'Цель', tut_controls_l: 'Управление', tut_win_l: 'Спуск', tut_lose_l: 'Поражение', tut_tip_l: 'Совет',
    tut_goal: 'Спускайтесь в подземелье как можно глубже, парируя по одному монстру.',
    tut_controls: 'ТАПНИТЕ в любом месте (или Пробел) ровно когда бегунок войдёт в ЗЕЛЁНУЮ зону - парирование и контрудар. Тапните карту добычи, чтобы надеть, или ПРОДАЙТЕ её за золото.',
    tut_win: 'Игра бесконечна - идите ГЛУБЖЕ. Каждая комната повышает глубину. Каждая 5-я комната - босс.',
    tut_lose: 'Промах по зелёной зоне - удар проходит. При 0 ЗД забег окончен.',
    tut_tip: 'Следите за СВЕЧЕНИЕМ замаха - оно задаёт ритм за миг до бегунка. Предметы с вампиризмом лечат на чистых парированиях.',
    en_rat: 'Крыса', en_skeleton: 'Скелет', en_archer: 'Лучник', en_mage: 'Маг',
    en_ogre: 'Огр', en_twin: 'Двуручник', en_wraith: 'Призрак', en_brute: 'Громила', en_boss: 'Владыка',
  },
};

// AI sprites (loaded on boot; vector fallback if missing).
var SPRITE_NAMES = ['knight', 'rat', 'skeleton', 'archer', 'mage', 'ogre', 'twin', 'wraith', 'brute', 'boss'];

// ── TUNABLES (exposed via GF.exposeState for the gate / DESIGN cross-check) ──
var PARRY_WINDOW_MS = 320;          // base parry window half-extent (ms) at depth 1
var WINDOW_SHRINK_PER_DEPTH = 6;    // ms narrower each depth
var PARRY_WINDOW_MIN_MS = 90;       // floor
var HERO_MAX_HP = 100;
var COUNTER_DMG_BASE = 22;          // counter damage on a perfect parry (pre-gear)
var DMG_SCALE_PER_DEPTH = 0.05;     // monster dmg multiplier growth per depth
var BOSS_EVERY = 5;
var SHOP_EVERY = 6;
var WINDUP_BASE_MS = 1100;          // wind-up sweep duration at depth 1
var WINDUP_SHRINK_PER_DEPTH = 22;
var WINDUP_MIN_MS = 420;
var ELITE_FROM_DEPTH = 12;
var SELL_GOLD_BY_RARITY = [6, 12, 24, 48];

// ── RARITY ──────────────────────────────────────────────────────────────────
var RARITY = [
  { id: 0, key: 'rar_common',    col: '#b9c2cf', glow: 'rgba(185,194,207,0.5)' },
  { id: 1, key: 'rar_rare',      col: '#48a6ff', glow: 'rgba(72,166,255,0.6)' },
  { id: 2, key: 'rar_epic',      col: '#c061ff', glow: 'rgba(192,97,255,0.65)' },
  { id: 3, key: 'rar_legendary', col: '#ffb031', glow: 'rgba(255,176,49,0.75)' },
];

// ── ENEMY ARCHETYPES ──────────────────────────────────────────────────────
// pattern: array of swings. Each swing = a marker sweep that must be parried.
// 'feint' swings show a wind-up but the marker fakes (a beat of pause) before
// committing. 'invisible' hides the marker until it flashes near the zone.
// rhythmMul scales the gap before each swing (alternating / speed shifts).
var ARCH = {
  rat:      { name: 'en_rat',      hp: 1, dmg: 7,  windupMul: 1.30, swings: [{}], col: '#9c8b6b', tint: '#caa', size: 0.72 },
  skeleton: { name: 'en_skeleton', hp: 2, dmg: 16, windupMul: 1.55, swings: [{ heavy: true }], col: '#d8d2c4', tint: '#eee', size: 0.95 },
  archer:   { name: 'en_archer',   hp: 2, dmg: 9,  windupMul: 0.92, swings: [{}, { gap: 0.34 }], col: '#7faf6a', tint: '#bdb', size: 0.85 },
  mage:     { name: 'en_mage',     hp: 2, dmg: 13, windupMul: 1.20, swings: [{ feint: true }], col: '#8a6fd6', tint: '#caf', size: 0.88 },
  ogre:     { name: 'en_ogre',     hp: 3, dmg: 11, windupMul: 1.10, swings: [{}, { gap: 0.30 }, { gap: 0.30 }], col: '#b06a4a', tint: '#e9a', size: 1.10 },
  twin:     { name: 'en_twin',     hp: 3, dmg: 8,  windupMul: 0.85, swings: [{ rhythmMul: 0.7 }, { gap: 0.42, rhythmMul: 1.3 }, { gap: 0.30, rhythmMul: 0.7 }], col: '#5fb6b0', tint: '#aee', size: 0.92 },
  wraith:   { name: 'en_wraith',   hp: 3, dmg: 14, windupMul: 1.0,  swings: [{ invisible: true }, { gap: 0.40, invisible: true }], col: '#6b6f99', tint: '#99c', size: 0.95 },
  brute:    { name: 'en_brute',    hp: 4, dmg: 15, windupMul: 1.40, swings: [{ heavy: true }, { gap: 0.46, heavy: true }], col: '#a05545', tint: '#d88', size: 1.18 },
  boss:     { name: 'en_boss',     hp: 8, dmg: 18, windupMul: 1.15, boss: true, col: '#caa23a', tint: '#fd8', size: 1.45 },
};
// Unlock schedule: which archetypes are eligible by depth (non-boss rooms).
function poolForDepth(d) {
  var p = ['rat'];
  if (d >= 2) p.push('skeleton');
  if (d >= 3) p.push('archer', 'brute');
  if (d >= 4) p.push('mage');
  if (d >= 6) p.push('twin');
  if (d >= 7) p.push('ogre');
  if (d >= 9) p.push('wraith');
  return p;
}

// ── GAME STATE ────────────────────────────────────────────────────────────
var gs = 'MENU';                    // MENU | PLAYING | LOOT | SHOP | PAUSED | GAMEOVER
var depth = 0, bestDepth = 0, gold = 0;
var heroHp = HERO_MAX_HP;
var runEarnedGold = 0;
var helpOpen = false, pausedFrom = 'PLAYING';

// equipped gear: each slot {rar, counter, window, hp, lifesteal}
var gear = { weapon: null, shield: null, trinket: null };

// current monster
var mon = null;
// current loot offer
var loot = null;
// shop offers
var shop = null;

// the active parry sweep
var sweep = null;
// recent result banner
var resultT = 0, resultTxt = '', resultCol = '#fff';
var bannerT = 0, bannerTxt = '';
var hitFlash = 0, parryFlash = 0;
var heroLungeT = 0, monStaggerT = 0, monShakeT = 0;
var roomFadeT = 0;                  // room transition fade

// coach (interactive first-fight tutorial)
var coachOn = false, coachStep = 0, coachHold = false;
var seenTut = false;

// settings
var _resume = null;

// hero idle anim
var animT = 0;

// ── LAYOUT ────────────────────────────────────────────────────────────────
var L = {};
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  L.trackY = H * 0.615;
  L.trackW = Math.min(W * 0.84, 520 * S);
  L.trackX = (W - L.trackW) / 2;
  L.trackH = clamp(26 * S, 18, 40);
  L.monY = H * 0.30;
  L.heroY = H * 0.80;
  // HUD chips
  var cr = clamp(19 * S, 15, 26);
  L.btnMute  = { x: W - cr - 12 * S, y: 14 * S + cr, r: cr };
  L.btnPause = { x: W - cr * 3 - 26 * S, y: 14 * S + cr, r: cr };
  L.btnHelp  = { x: W - cr * 5 - 40 * S, y: 14 * S + cr, r: cr };
  // overlay buttons (loot/shop) registered dynamically
  uiBtns = [];
}
function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

var uiBtns = []; // [{id,x,y,w,h,fn}] for LOOT/SHOP custom rects

// ── GEAR GENERATION ────────────────────────────────────────────────────────
var SLOTS = ['weapon', 'shield', 'trinket'];
function rollRarity(d, floorR) {
  // deeper => higher rarity odds
  var r = Math.random();
  var t = clamp(d / 22, 0, 1);
  var rar;
  if (r < 0.55 - t * 0.40) rar = 0;
  else if (r < 0.83 - t * 0.30) rar = 1;
  else if (r < 0.96 - t * 0.10) rar = 2;
  else rar = 3;
  if (floorR != null && rar < floorR) rar = floorR;
  return rar;
}
function makeGear(slot, d, floorR) {
  var rar = rollRarity(d, floorR);
  var g = { slot: slot, rar: rar, counter: 0, window: 0, hp: 0, lifesteal: 0 };
  var mag = 1 + rar; // magnitude scales with rarity
  if (slot === 'weapon') {
    g.counter = (5 + Math.floor(Math.random() * 4)) * mag;            // +counter dmg
    if (rar >= 2) g.lifesteal = rar - 1;                              // epics/legendaries can lifesteal
  } else if (slot === 'shield') {
    g.window = (10 + Math.floor(Math.random() * 12)) * mag;           // +parry window ms
    g.hp = (4 + Math.floor(Math.random() * 5)) * mag;                 // +max hp
  } else { // trinket
    var pick = Math.random();
    if (pick < 0.4) g.lifesteal = mag;
    else if (pick < 0.7) g.counter = (4 + Math.floor(Math.random() * 4)) * mag;
    else g.window = (6 + Math.floor(Math.random() * 8)) * mag;
    g.hp += (2 + Math.floor(Math.random() * 3)) * mag;
  }
  return g;
}
function gearStatLines(g) {
  var L = [];
  if (g.counter)   L.push({ k: 'st_counter', v: g.counter, suf: '' });
  if (g.window)    L.push({ k: 'st_window', v: g.window, suf: 'ms' });
  if (g.hp)        L.push({ k: 'st_hp', v: g.hp, suf: '' });
  if (g.lifesteal) L.push({ k: 'st_lifesteal', v: g.lifesteal, suf: '' });
  return L;
}
// aggregate equipped bonuses
function bonus(field) {
  var s = 0;
  for (var i = 0; i < SLOTS.length; i++) { var g = gear[SLOTS[i]]; if (g) s += g[field] || 0; }
  return s;
}
function maxHp() { return HERO_MAX_HP + bonus('hp'); }
function counterDmg() { return COUNTER_DMG_BASE + bonus('counter'); }
function lifesteal() { return bonus('lifesteal'); }
// effective parry window (ms half-extent), depth-shrunk + gear-widened
function windowMs() {
  var base = PARRY_WINDOW_MS - depth * WINDOW_SHRINK_PER_DEPTH + bonus('window');
  return Math.max(PARRY_WINDOW_MIN_MS, base);
}
function windupMs() {
  return Math.max(WINDUP_MIN_MS, WINDUP_BASE_MS - depth * WINDUP_SHRINK_PER_DEPTH);
}
function dmgScale() { return 1 + depth * DMG_SCALE_PER_DEPTH; }

// ── ELITE MODIFIERS ────────────────────────────────────────────────────────
function rollElite(d) {
  if (d < ELITE_FROM_DEPTH) return null;
  if (Math.random() > 0.45) return null;
  var opts = ['armored', 'poison', 'enraged'];
  return opts[Math.floor(Math.random() * opts.length)];
}

// ── ROOM / MONSTER SPAWN ───────────────────────────────────────────────────
function isBossRoom(d) { return d % BOSS_EVERY === 0; }
function isShopRoom(d) { return d % SHOP_EVERY === 0 && !isBossRoom(d); }

function spawnMonster() {
  var d = depth, archKey, elite = null;
  if (isBossRoom(d)) {
    archKey = 'boss';
  } else {
    var pool = poolForDepth(d);
    archKey = pool[Math.floor(Math.random() * pool.length)];
    elite = rollElite(d);
  }
  var a = ARCH[archKey];
  var hp = a.hp;
  if (a.boss) hp = 6 + Math.floor(d / BOSS_EVERY) * 2;     // bosses scale
  if (elite === 'armored') hp += 1;
  mon = {
    arch: archKey, a: a, maxHp: hp, hp: hp, elite: elite,
    swingIdx: 0, phase: 0, state: 'idle', stateT: 0,
    poisonStacks: 0, glow: 0, breakHits: 0,
  };
  // build the swing sequence for this monster (bosses get phase patterns)
  mon.swings = buildSwings(archKey, d);
  mon.swingIdx = 0;
  scheduleNextSwing(0.7);  // a beat before the first wind-up (generous on room 1)
}

function buildSwings(archKey, d) {
  var a = ARCH[archKey];
  if (a.boss) {
    // multi-phase boss: feints, double-strikes, speed shifts; grows with tier
    var tier = Math.floor(d / BOSS_EVERY); // 1,2,3...
    var s = [
      { heavy: true },
      { gap: 0.34, feint: true },
      { gap: 0.30 }, { gap: 0.26 },              // double-strike
    ];
    if (tier >= 2) s.push({ gap: 0.40, invisible: true }, { gap: 0.30, rhythmMul: 0.7 });
    if (tier >= 3) s.push({ gap: 0.24, rhythmMul: 0.6 }, { gap: 0.24, feint: true });
    return s;
  }
  // normal archetypes loop their pattern; clone so we can mutate safely
  return a.swings.map(function (x) { var o = {}; for (var k in x) o[k] = x[k]; return o; });
}

var nextSwingDelay = 0;
function scheduleNextSwing(delay) {
  mon.state = 'wait';
  mon.stateT = 0;
  nextSwingDelay = delay;
}

// begin a wind-up for the current swing
function startWindup() {
  var sw = mon.swings[mon.swingIdx % mon.swings.length];
  var dur = windupMs() * mon.a.windupMul * (sw.rhythmMul || 1);
  if (mon.elite === 'enraged') dur *= 0.78;
  if (sw.heavy) dur *= 1.15;
  mon.state = 'windup';
  mon.glow = 0;
  sweep = {
    t: 0,                  // 0..1 marker progress across the track
    dur: dur,              // ms
    win: windowMs(),       // ms half-extent of the green zone (centered at 0.5 of dur-time)
    feint: !!sw.feint,
    invisible: !!sw.invisible,
    heavy: !!sw.heavy,
    resolved: false,
    feintDone: false,
    parried: false,
    armorNeeded: (mon.elite === 'armored') ? 2 : 1,
    armorHits: 0,
  };
  GF.sfx && sfxWindup();
}

// ── COMBAT RESOLUTION ──────────────────────────────────────────────────────
// The green window is centered at sweep progress t=0.5. Half-extent in
// progress-units = win / dur. Marker travels 0->1 over dur ms.
function windowHalfFrac() { return sweep ? (sweep.win / sweep.dur) : 0.1; }
function inWindow() {
  if (!sweep) return false;
  var hf = windowHalfFrac();
  return Math.abs(sweep.t - 0.5) <= hf;
}

function doParry() {
  if (gs !== 'PLAYING') return;
  if (coachOn && coachHold) return;          // during coach pause, ignore until cue
  if (!sweep || sweep.resolved) return;
  // feint: an early tap before the commit is a whiff (early)
  if (sweep.invisible && sweep.t < 0.40) { return; }  // can't read yet — ignore very early
  if (inWindow()) {
    // PERFECT — armored may need a 2nd parry within the same swing
    sweep.armorHits++;
    parryFlash = 1; GF.setShake && GF.setShake(4);
    sfxClang();
    spark(L.trackX + L.trackW * 0.5, L.trackY, '#9fe8ff', 16);
    if (sweep.armorHits < sweep.armorNeeded) {
      // re-arm a quick second window
      showResult('armored', '#caa', false);
      sweep.t = 0.5 - windowHalfFrac() * 1.6;  // nudge marker back for the 2nd tap
      return;
    }
    sweep.resolved = true; sweep.parried = true;
    showResult('perfect', '#7CFC9A', true);
    counterHit();
  } else {
    // early or late mistap = take damage (failed parry)
    var early = sweep.t < 0.5;
    sweep.resolved = true; sweep.parried = false;
    showResult(early ? 'early' : 'late', '#ff7a6a', false);
    takeHit();
  }
}

function counterHit() {
  // hero counter-attacks the monster
  heroLungeT = 0.32;
  var dmg = counterDmg();
  mon.hp -= dmg;
  monStaggerT = 0.3; monShakeT = 0.25;
  sfxCounter();
  spark(GF.W * 0.5, L.monY, '#fff0a0', 18);
  GF.spawnFloat(GF.W * 0.5, L.monY - 30 * GF.S, '-' + dmg, '#ffd95e');
  // lifesteal
  var ls = lifesteal();
  if (ls > 0) { heroHp = Math.min(maxHp(), heroHp + ls); GF.spawnFloat(GF.W * 0.28, L.heroY - 40 * GF.S, '+' + ls, '#7CFC9A'); }
  if (mon.hp <= 0) { killMonster(); return; }
  // advance to next swing in the pattern
  advanceSwing();
}

function takeHit() {
  var sw = mon.swings[mon.swingIdx % mon.swings.length];
  var dmg = Math.round(mon.a.dmg * dmgScale() * (sw.heavy ? 1.0 : 1.0));
  heroHp -= dmg;
  hitFlash = 1; GF.setShake && GF.setShake(9);
  sfxHurt();
  spark(GF.W * 0.28, L.heroY - 20 * GF.S, '#ff5a4a', 14);
  GF.spawnFloat(GF.W * 0.28, L.heroY - 50 * GF.S, '-' + dmg, '#ff6a5a');
  // poison elite applies a stack on a landed hit
  if (mon.elite === 'poison') { mon.poisonStacks = Math.min(4, mon.poisonStacks + 1); }
  if (heroHp <= 0) { heroHp = 0; gameOver(); return; }
  advanceSwing();
}

function advanceSwing() {
  sweep = null;
  mon.swingIdx++;
  var sw = mon.swings[mon.swingIdx % mon.swings.length];
  var gap = (sw.gap != null ? sw.gap : 0.62);
  if (mon.elite === 'enraged') gap *= 0.78;
  // bosses shift speed across phases (read swingIdx)
  scheduleNextSwing(gap);
}

function killMonster() {
  sweep = null;
  monStaggerT = 0.5;
  sfxMonsterDie();
  for (var i = 0; i < 26; i++) spark(GF.W * 0.5 + (Math.random() - 0.5) * 60 * GF.S, L.monY + (Math.random() - 0.5) * 40 * GF.S, mon.a.tint, 1);
  // gear drop: bosses guarantee rare+ (floor 1), elites floor 1 too
  var floorR = (mon.a.boss ? 2 : (mon.elite ? 1 : null));
  var slot = SLOTS[Math.floor(Math.random() * SLOTS.length)];
  loot = makeGear(slot, depth, floorR);
  sfxLoot();
  gs = 'LOOT';
  GF.saveRun && GF.saveRun();
}

// ── ROOM PROGRESSION ───────────────────────────────────────────────────────
function nextRoom() {
  depth++;
  if (depth > bestDepth) { bestDepth = depth; }
  roomFadeT = 0.45;
  // poison wears off between rooms
  loot = null;
  if (isShopRoom(depth)) {
    openShop();
  } else {
    spawnMonster();
    if (mon.a.boss) { bannerTxt = GF.t('boss_now'); bannerT = 1.6; sfxBossRoar(); }
    gs = 'PLAYING';
  }
  GF.saveRun && GF.saveRun();
}

// equip loot then advance
function equipLoot() {
  if (!loot) return;
  gear[loot.slot] = loot;
  heroHp = Math.min(maxHp(), heroHp); // hp bonus raises cap; keep current
  sfxEquip();
  showBanner(GF.t('equipped'), 0.9);
  loot = null;
  nextRoom();
}
function sellLoot() {
  if (!loot) return;
  var g = SELL_GOLD_BY_RARITY[loot.rar];
  gold += g; runEarnedGold += g;
  sfxCoin();
  showBanner(GF.t('sold').replace('%n', g), 0.9);
  loot = null;
  nextRoom();
}

// ── SHOP ───────────────────────────────────────────────────────────────────
function openShop() {
  var d = depth;
  shop = {
    items: [
      { id: 'heal', cost: Math.round(14 + d * 0.6), kind: 'heal' },
      { id: 'reroll', cost: Math.round(10 + d * 0.5), kind: 'reroll' },
      { id: 'buy', cost: Math.round(26 + d * 1.1), kind: 'buy', gear: makeGear(SLOTS[Math.floor(Math.random() * SLOTS.length)], d, 1) },
    ],
    bought: {},
  };
  gs = 'SHOP';
  GF.saveRun && GF.saveRun();
}
function buyShop(item) {
  if (shop.bought[item.id]) return;
  if (gold < item.cost) { showBanner(GF.t('cant_afford').replace('%n', item.cost), 0.9); sfxError(); return; }
  gold -= item.cost; shop.bought[item.id] = true;
  if (item.kind === 'heal') { heroHp = Math.min(maxHp(), heroHp + 40); GF.spawnFloat(GF.W / 2, GF.H * 0.4, '+40', '#7CFC9A'); }
  else if (item.kind === 'reroll') { item.gear = makeGear(SLOTS[Math.floor(Math.random() * SLOTS.length)], depth, null); loot = item.gear; gs = 'LOOT'; }
  else if (item.kind === 'buy') { gear[item.gear.slot] = item.gear; }
  sfxEquip();
  GF.saveRun && GF.saveRun();
}

// ── BANNERS / RESULT ───────────────────────────────────────────────────────
function showResult(key, col, perfect) {
  resultTxt = GF.t(key); resultCol = col; resultT = perfect ? 0.7 : 0.6;
}
function showBanner(txt, t) { bannerTxt = txt; bannerT = t; }

// ── PARTICLE SPARK helper (uses gf-lib spawnParticles) ──────────────────────
function spark(x, y, col, n) { GF.spawnParticles(x, y, col, n); }

// ── LIFECYCLE ──────────────────────────────────────────────────────────────
function startRun(fromTutorial) {
  depth = 0; gold = 0; runEarnedGold = 0;
  heroHp = HERO_MAX_HP;
  gear = { weapon: null, shield: null, trinket: null };
  loot = null; shop = null; sweep = null; mon = null;
  helpOpen = false;
  resultT = 0; bannerT = 0; hitFlash = 0; parryFlash = 0;
  // start tutorial coach on a fresh first-ever run
  coachOn = !seenTut && !fromTutorial;
  coachStep = 0; coachHold = false;
  nextRoom(); // -> depth 1, spawns first monster
  gs = 'PLAYING';
  GF.gameStarted && GF.gameStarted();
  GF.saveRun && GF.saveRun();
}

function gameOver() {
  sweep = null;
  if (depth > bestDepth) bestDepth = depth;
  try { localStorage.setItem('parry_knight_best', bestDepth); } catch (e) {}
  var newBest = depth >= bestDepth;
  sfxDeath();
  GF.setShake && GF.setShake(14);
  gs = 'GAMEOVER';
  GF.gameEnded && GF.gameEnded();
  if (newBest && bestDepth > 0) GF.happytime && GF.happytime();
  GF.saveRun && GF.saveRun();
}

// ── UPDATE ─────────────────────────────────────────────────────────────────
function update(dt) {
  animT += dt;
  if (resultT > 0) resultT -= dt;
  if (bannerT > 0) bannerT -= dt;
  if (hitFlash > 0) hitFlash -= dt * 2.2;
  if (parryFlash > 0) parryFlash -= dt * 2.6;
  if (heroLungeT > 0) heroLungeT -= dt;
  if (monStaggerT > 0) monStaggerT -= dt;
  if (monShakeT > 0) monShakeT -= dt;
  if (roomFadeT > 0) roomFadeT -= dt;

  if (gs !== 'PLAYING') return;
  if (helpOpen) return;
  if (!mon) return;

  // poison chip over time
  if (mon.elite === 'poison' && mon.poisonStacks > 0) {
    heroHp -= 3 * mon.poisonStacks * dt;
    if (Math.random() < dt * 6) GF.spawnParticles(GF.W * 0.28, L.heroY - 30 * GF.S, '#7bd66a', 1);
    if (heroHp <= 0) { heroHp = 0; gameOver(); return; }
  }

  mon.stateT += dt;
  mon.glow = Math.min(1, mon.glow + dt * (mon.state === 'windup' ? 2.4 : -3));

  if (mon.state === 'wait') {
    // coach: hold the very first wind-up until the player has seen the cue
    if (mon.stateT >= nextSwingDelay) {
      startWindup();
    }
    return;
  }

  if (mon.state === 'windup' && sweep) {
    // coach gating: on the first ever swing, pause the marker right before the
    // window and pulse the cue until the player taps inside.
    if (coachOn && coachStep === 0 && !sweep.resolved) {
      var hf = windowHalfFrac();
      if (sweep.t >= 0.5 - hf - 0.02 && !coachHold) {
        // entering window soon — keep moving but at slow speed; cue is shown
      }
    }
    var spd = 1;
    // feint: pause partway, then commit (the "delayed feint" read)
    if (sweep.feint && !sweep.feintDone && sweep.t >= 0.32) {
      sweep.feintHold = (sweep.feintHold || 0) + dt;
      if (sweep.feintHold < 0.45) { spd = 0; }
      else { sweep.feintDone = true; }
    }
    // coach slow-mo on the first swing so it's learnable
    if (coachOn && coachStep === 0) spd *= 0.55;
    sweep.t += (dt * 1000 / sweep.dur) * spd;
    mon.glow = Math.min(1, mon.glow + dt * 3);

    if (sweep.t >= 1 && !sweep.resolved) {
      // marker ran past the window with no tap = MISS (failed parry)
      sweep.resolved = true; sweep.parried = false;
      showResult('miss', '#ff7a6a', false);
      // advance coach hint (still a no-fail teach on the very first swing)
      if (coachOn && coachStep === 0) {
        // give the player another generous attempt instead of damage
        showBanner(GF.t('coach_again'), 1.2);
        sweep = null; mon.swingIdx = 0; scheduleNextSwing(0.8);
        return;
      }
      takeHit();
    }
  }
}

// ── DRAW ───────────────────────────────────────────────────────────────────
function draw(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  drawBackground(ctx);

  if (gs === 'MENU') { drawMenu(ctx); return; }

  // world
  if (mon) drawMonster(ctx);
  drawHero(ctx);

  if (gs === 'PLAYING' || gs === 'LOOT' || gs === 'SHOP' || gs === 'PAUSED') {
    drawTrack(ctx);
    drawHUD(ctx);
  }

  // damage / parry full-screen flashes
  if (hitFlash > 0) { ctx.fillStyle = 'rgba(220,40,40,' + (hitFlash * 0.35) + ')'; ctx.fillRect(0, 0, W, H); }
  if (parryFlash > 0) { ctx.fillStyle = 'rgba(160,235,255,' + (parryFlash * 0.20) + ')'; ctx.fillRect(0, 0, W, H); }

  // result text (PERFECT/MISS) center
  if (resultT > 0 && (gs === 'PLAYING')) {
    var a = clamp(resultT * 2, 0, 1);
    ctx.save(); ctx.globalAlpha = a;
    ctx.font = 'bold ' + clamp(40 * S, 26, 60) + 'px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = resultCol; ctx.shadowColor = resultCol; ctx.shadowBlur = 18 * S;
    ctx.fillText(resultTxt, W / 2, L.trackY - 70 * S);
    ctx.restore();
  }
  // banner (boss room / sold / equipped)
  if (bannerT > 0 && gs !== 'LOOT' && gs !== 'SHOP') {
    var ba = clamp(bannerT, 0, 1);
    ctx.save(); ctx.globalAlpha = ba;
    ctx.font = 'bold ' + clamp(22 * S, 16, 30) + 'px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffe08a'; ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 8 * S;
    ctx.fillText(bannerTxt, W / 2, H * 0.46);
    ctx.restore();
  }

  if (coachOn && gs === 'PLAYING') drawCoach(ctx);

  if (gs === 'LOOT') drawLoot(ctx);
  if (gs === 'SHOP') drawShop(ctx);
  if (gs === 'PAUSED') drawPaused(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
  if (helpOpen) drawHelp(ctx);

  // room transition fade
  if (roomFadeT > 0) { ctx.fillStyle = 'rgba(8,5,14,' + clamp(roomFadeT * 2, 0, 0.7) + ')'; ctx.fillRect(0, 0, W, H); }
}

function drawBackground(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  if (GF.sprites && GF.sprites['bg']) {
    GF.drawSprite('bg', W / 2, H / 2, Math.max(W, H), function () {});
    // darken for contrast
    ctx.fillStyle = 'rgba(8,5,14,0.34)'; ctx.fillRect(0, 0, W, H);
  } else {
    var g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#1a1326'); g.addColorStop(0.5, '#120c1d'); g.addColorStop(1, '#0a0710');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    // stone arch suggestion
    ctx.strokeStyle = 'rgba(120,100,150,0.10)'; ctx.lineWidth = 2 * S;
    for (var i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.arc(W / 2, -H * 0.2, (W * 0.3 + i * W * 0.16), 0, Math.PI, false);
      ctx.stroke();
    }
    // floor line
    var fy = GF.H * 0.88;
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0, fy, W, H - fy);
    ctx.strokeStyle = 'rgba(140,120,170,0.12)'; ctx.beginPath(); ctx.moveTo(0, fy); ctx.lineTo(W, fy); ctx.stroke();
  }
}

// ── HERO ────────────────────────────────────────────────────────────────────
function drawHero(ctx) {
  var W = GF.W, S = GF.S;
  var x = W * 0.30, y = L.heroY;
  var lunge = heroLungeT > 0 ? Math.sin((0.32 - heroLungeT) / 0.32 * Math.PI) : 0;
  var size = 92 * S;
  ctx.save();
  ctx.translate(x + lunge * 26 * S, y);
  // shield raise during a parry window / counter
  var raising = (sweep && !sweep.resolved && inWindow()) || parryFlash > 0.3;
  if (GF.sprites && GF.sprites['knight']) {
    GF.drawSprite('knight', lunge * 4 * S, -size * 0.32, size, function () {});
  } else {
    drawKnightVector(ctx, size, raising, lunge);
  }
  ctx.restore();
  // shield glint when raising
  if (raising) { spark2(ctx, x + 30 * S, y - 30 * S, '#bfe8ff', 0.5); }
}
function drawKnightVector(ctx, s, raising, lunge) {
  // body
  ctx.fillStyle = '#3a4a66'; rrect(ctx, -s * 0.18, -s * 0.55, s * 0.36, s * 0.55, s * 0.08); ctx.fill();
  // helmet
  ctx.fillStyle = '#9aa7bd'; ctx.beginPath(); ctx.arc(0, -s * 0.62, s * 0.16, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#11141c'; rrect(ctx, -s * 0.10, -s * 0.66, s * 0.20, s * 0.07, 2); ctx.fill(); // visor
  // legs
  ctx.fillStyle = '#2a3550'; rrect(ctx, -s * 0.15, -s * 0.06, s * 0.12, s * 0.18, 2); ctx.fill();
  rrect(ctx, s * 0.03, -s * 0.06, s * 0.12, s * 0.18, 2); ctx.fill();
  // shield (raised front-right)
  var sx = s * (raising ? 0.30 : 0.22), sy = -s * (raising ? 0.52 : 0.34);
  ctx.save(); ctx.translate(sx, sy); ctx.rotate(raising ? -0.25 : 0.1);
  var sg = ctx.createLinearGradient(0, -s * 0.2, 0, s * 0.2);
  sg.addColorStop(0, '#d9c06a'); sg.addColorStop(1, '#8a6f2e');
  ctx.fillStyle = sg; ctx.strokeStyle = '#5a4720'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -s * 0.22); ctx.lineTo(s * 0.16, -s * 0.12); ctx.lineTo(s * 0.16, s * 0.12);
  ctx.lineTo(0, s * 0.24); ctx.lineTo(-s * 0.16, s * 0.12); ctx.lineTo(-s * 0.16, -s * 0.12);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.beginPath(); ctx.arc(0, 0, s * 0.05, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // sword (counter lunge)
  if (lunge > 0.05) {
    ctx.save(); ctx.translate(-s * 0.2, -s * 0.4); ctx.rotate(-0.5 - lunge * 0.6);
    ctx.fillStyle = '#dfe6f0'; rrect(ctx, -s * 0.03, -s * 0.5, s * 0.06, s * 0.5, 2); ctx.fill();
    ctx.fillStyle = '#6a5a2a'; rrect(ctx, -s * 0.08, 0, s * 0.16, s * 0.05, 2); ctx.fill();
    ctx.restore();
  }
}

// ── MONSTER ─────────────────────────────────────────────────────────────────
function drawMonster(ctx) {
  if (!mon) return;
  var W = GF.W, S = GF.S;
  var sx = (monShakeT > 0 ? (Math.random() - 0.5) * 10 * S : 0);
  var stagger = monStaggerT > 0 ? Math.sin((0.5 - monStaggerT) / 0.5 * Math.PI) * 8 * S : 0;
  var x = W * 0.5 + sx, y = L.monY + stagger;
  var a = mon.a;
  var size = 120 * S * (a.size || 1);
  ctx.save();
  ctx.translate(x, y);
  // wind-up telegraph glow
  if (mon.glow > 0.02 && mon.state === 'windup') {
    var pulse = 0.6 + 0.4 * Math.sin(animT * 14);
    ctx.save();
    ctx.shadowColor = a.tint; ctx.shadowBlur = (24 + 18 * pulse) * S * mon.glow;
    ctx.fillStyle = 'rgba(255,120,90,' + (0.10 * mon.glow) + ')';
    ctx.beginPath(); ctx.arc(0, 0, size * 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  var bob = Math.sin(animT * 2.2) * 4 * S;
  ctx.translate(0, bob);
  if (GF.sprites && GF.sprites[mon.arch]) {
    GF.drawSprite(mon.arch, 0, 0, size, function () {});
  } else {
    drawMonsterVector(ctx, mon.arch, size, mon.glow);
  }
  ctx.restore();

  // elite badge
  if (mon.elite) {
    var key = mon.elite;
    var col = key === 'armored' ? '#bcd' : key === 'poison' ? '#7bd66a' : '#ff7a4a';
    ctx.font = 'bold ' + clamp(12 * S, 9, 16) + 'px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillStyle = col; ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 4 * S;
    ctx.fillText(GF.t(key), x, y - size * 0.55);
    ctx.shadowBlur = 0;
  }
  // monster HP bar (for bosses + multi-hp foes)
  if (mon.maxHp > 1) drawMonHpBar(ctx, x, y - size * 0.5 - (mon.elite ? 18 * S : 6 * S));
  // monster name
  ctx.font = 'bold ' + clamp(13 * S, 10, 18) + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(220,210,235,0.85)';
  ctx.fillText(GF.t(a.name), x, y + size * 0.45);
}
function drawMonHpBar(ctx, x, y) {
  var S = GF.S, w = clamp(110 * S, 80, 180), h = 7 * S;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; rrect(ctx, x - w / 2, y, w, h, h / 2); ctx.fill();
  var f = clamp(mon.hp / mon.maxHp, 0, 1);
  var col = mon.a.boss ? '#ffb031' : '#e0604a';
  ctx.fillStyle = col; rrect(ctx, x - w / 2, y, w * f, h, h / 2); ctx.fill();
}
function drawMonsterVector(ctx, arch, s, glow) {
  var a = ARCH[arch];
  ctx.fillStyle = a.col;
  if (arch === 'rat') {
    ctx.beginPath(); ctx.ellipse(0, 0, s * 0.3, s * 0.2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(-s * 0.22, -s * 0.06, s * 0.12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-s * 0.26, -s * 0.08, s * 0.02, 0, Math.PI * 2); ctx.fill();
  } else if (arch === 'skeleton') {
    ctx.fillStyle = a.col; rrect(ctx, -s * 0.14, -s * 0.1, s * 0.28, s * 0.4, s * 0.04); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -s * 0.24, s * 0.16, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(-s * 0.06, -s * 0.24, s * 0.03, 0, Math.PI * 2); ctx.arc(s * 0.06, -s * 0.24, s * 0.03, 0, Math.PI * 2); ctx.fill();
    // scythe
    ctx.strokeStyle = '#cfcabb'; ctx.lineWidth = 3 * GF.S; ctx.beginPath(); ctx.moveTo(s * 0.2, -s * 0.4); ctx.lineTo(s * 0.2, s * 0.2); ctx.stroke();
  } else if (arch === 'archer') {
    ctx.beginPath(); ctx.arc(0, 0, s * 0.22, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#3a5a2a'; ctx.beginPath(); ctx.arc(0, -s * 0.04, s * 0.14, Math.PI * 0.1, Math.PI * 0.9); ctx.fill();
    ctx.strokeStyle = '#caa'; ctx.lineWidth = 2.5 * GF.S; ctx.beginPath(); ctx.arc(s * 0.18, 0, s * 0.28, -Math.PI * 0.4, Math.PI * 0.4); ctx.stroke();
  } else if (arch === 'mage') {
    ctx.beginPath(); ctx.moveTo(0, -s * 0.36); ctx.lineTo(s * 0.22, s * 0.24); ctx.lineTo(-s * 0.22, s * 0.24); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#e0c2ff'; ctx.beginPath(); ctx.arc(0, -s * 0.06, s * 0.09, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffd95e'; ctx.beginPath(); ctx.arc(s * 0.24, -s * 0.3, s * 0.06 * (1 + glow), 0, Math.PI * 2); ctx.fill();
  } else if (arch === 'ogre') {
    ctx.beginPath(); ctx.arc(0, 0, s * 0.32, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -s * 0.26, s * 0.18, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#3a1d12'; ctx.beginPath(); ctx.arc(-s * 0.07, -s * 0.27, s * 0.03, 0, Math.PI * 2); ctx.arc(s * 0.07, -s * 0.27, s * 0.03, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#777'; rrect(ctx, s * 0.26, -s * 0.4, s * 0.1, s * 0.5, 3); ctx.fill();
  } else if (arch === 'twin') {
    ctx.beginPath(); ctx.arc(0, 0, s * 0.22, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#cfe'; ctx.lineWidth = 3 * GF.S;
    ctx.beginPath(); ctx.moveTo(-s * 0.3, -s * 0.3); ctx.lineTo(-s * 0.1, -s * 0.05); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s * 0.3, -s * 0.3); ctx.lineTo(s * 0.1, -s * 0.05); ctx.stroke();
  } else if (arch === 'wraith') {
    ctx.globalAlpha = 0.6 + 0.3 * glow;
    ctx.beginPath(); ctx.moveTo(0, -s * 0.34);
    ctx.quadraticCurveTo(s * 0.3, 0, s * 0.18, s * 0.28);
    ctx.lineTo(-s * 0.18, s * 0.28); ctx.quadraticCurveTo(-s * 0.3, 0, 0, -s * 0.34); ctx.fill();
    ctx.globalAlpha = 1; ctx.fillStyle = '#cde'; ctx.beginPath(); ctx.arc(-s * 0.06, -s * 0.12, s * 0.03, 0, Math.PI * 2); ctx.arc(s * 0.06, -s * 0.12, s * 0.03, 0, Math.PI * 2); ctx.fill();
  } else if (arch === 'brute') {
    ctx.beginPath(); ctx.arc(0, 0, s * 0.34, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#5a2a1a'; rrect(ctx, -s * 0.34, -s * 0.06, s * 0.68, s * 0.12, 3); ctx.fill();
    ctx.fillStyle = '#888'; rrect(ctx, -s * 0.46, -s * 0.16, s * 0.16, s * 0.32, 3); ctx.fill();
  } else if (arch === 'boss') {
    var bg = ctx.createLinearGradient(0, -s * 0.5, 0, s * 0.5);
    bg.addColorStop(0, '#e0b94a'); bg.addColorStop(1, '#7a5a1e');
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(0, 0, s * 0.4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2a1d0a';

// ── PARRY TRACK ─────────────────────────────────────────────────────────────
function drawTrack(ctx) {
  var S = GF.S;
  var tx = L.trackX, ty = L.trackY, tw = L.trackW, th = L.trackH;
  // base track
  ctx.fillStyle = 'rgba(20,16,30,0.85)';
  rrect(ctx, tx, ty - th / 2, tw, th, th / 2); ctx.fill();
  ctx.strokeStyle = 'rgba(120,100,160,0.4)'; ctx.lineWidth = 1.5 * S;
  rrect(ctx, tx, ty - th / 2, tw, th, th / 2); ctx.stroke();

  if (!sweep || (gs !== 'PLAYING')) {

    return;
  }
  // green window centered at t=0.5
  var hf = windowHalfFrac();

  ctx.lineWidth = 2 * S;
  ctx.strokeStyle = win ? '#9fffb0' : 'rgba(120,255,160,0.7)';
  rrect(ctx, gx, ty - th / 2, gw, th, th / 4); ctx.stroke();

  // the sweeping marker
  if (!(sweep.invisible && sweep.t < 0.40)) {

    ctx.shadowColor = win ? '#7CFC9A' : '#fff'; ctx.shadowBlur = 12 * S;
    rrect(ctx, mx - 3 * S, ty - th / 2 - 5 * S, 6 * S, th + 10 * S, 3 * S); ctx.fill();
    // triangle pointers
    ctx.beginPath(); ctx.moveTo(mx, ty - th / 2 - 6 * S); ctx.lineTo(mx - 6 * S, ty - th / 2 - 14 * S); ctx.lineTo(mx + 6 * S, ty - th / 2 - 14 * S); ctx.closePath(); ctx.fill();
    ctx.restore();
  } else {
    // invisible-phase: show "?" centered to signal a hidden marker is coming
    ctx.fillStyle = 'rgba(180,160,210,0.5)';
    ctx.font = 'bold ' + clamp(20 * S, 14, 28) + 'px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', tx + tw * 0.5, ty);
  }
  // "TAP" prompt under the track when the marker nears the window
  if (Math.abs(sweep.t - 0.5) < hf + 0.12 && !sweep.resolved) {
    ctx.fillStyle = win ? '#7CFC9A' : 'rgba(200,220,200,0.6)';
    ctx.font = 'bold ' + clamp(14 * S, 11, 20) + 'px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(GF.t('tap_cue'), tx + tw * 0.5, ty + th / 2 + 8 * S);
  }
}

// ── COACH (interactive tutorial over the first fight) ───────────────────────
function drawCoach(ctx) {

// ── LOOT OVERLAY ────────────────────────────────────────────────────────────
function drawLoot(ctx) {

// ── INPUT ───────────────────────────────────────────────────────────────────
function evtPos(e) {
  var r = GF.canvas.getBoundingClientRect();
  // sx/sy already map CSS px -> canvas backing px. gf-lib sizes the backing
  // store to CSS px (canvas.width = W, NOT DPR-scaled), so DIVIDING by
  // devicePixelRatio shrank every tap 2-3x on retina/mobile -> clicks landed
  // below the buttons and DESCEND did nothing. No DPR division. (Tim 2026-06-10)
  var sx = GF.canvas.width / r.width, sy = GF.canvas.height / r.height;
  var t = e.touches && e.touches[0] ? e.touches[0] : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0] : e);
  return { x: (t.clientX - r.left) * sx, y: (t.clientY - r.top) * sy };
}
function hitChip(b, x, y) { var dx = x - b.x, dy = y - b.y; return dx * dx + dy * dy <= (b.r + 8 * GF.S) * (b.r + 8 * GF.S); }

function onDown(x, y) {
  // help overlay first
  if (helpOpen) { for (var i = 0; i < uiBtns.length; i++) { var b = uiBtns[i]; if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { GF.sfx('click'); b.fn(); return; } } return; }

  // HUD chips during play-ish states
  if (gs === 'PLAYING' || gs === 'LOOT' || gs === 'SHOP') {
    if (hitChip(L.btnMute, x, y))  { var m = GF.toggleMute(); GF.setMusicMuted(m); return; }
    if (hitChip(L.btnPause, x, y)) { pausedFrom = gs; gs = 'PAUSED'; GF.sfx('click'); return; }
    if (hitChip(L.btnHelp, x, y))  { helpOpen = true; GF.sfx('click'); return; }
  }

  // overlay/menu buttons (MENU, LOOT, SHOP, PAUSED, GAMEOVER use uiBtns)
  if (gs !== 'PLAYING') {
    for (var j = 0; j < uiBtns.length; j++) { var bb = uiBtns[j]; if (x >= bb.x && x <= bb.x + bb.w && y >= bb.y && y <= bb.y + bb.h) { GF.sfx('click'); bb.fn(); return; } }
    return;
  }

  // PLAYING: tap anywhere = parry
  ensureAudio();
  doParry();
}

// ── BOT CONTRACT (progression probe) ────────────────────────────────────────
function botActions() {
  if (helpOpen) return ['help_close'];
  if (gs === 'PLAYING') {
    // only offer 'parry' while the marker is inside the green window
    if (sweep && !sweep.resolved && inWindow() && !(sweep.invisible && sweep.t < 0.40)) return ['parry'];
    return [];
  }
  if (gs === 'LOOT') return ['equip_0', 'sell_0'];
  if (gs === 'SHOP') {
    var a = ['continue'];
    for (var i = 0; i < shop.items.length; i++) if (!shop.bought[shop.items[i].id] && gold >= shop.items[i].cost) a.push('buy_' + i);
    return a;
  }
  if (gs === 'PAUSED') return ['resume'];
  if (gs === 'GAMEOVER') return ['retry'];
  if (gs === 'MENU') return ['play'];
  return [];
}
function botAct(a) {
  if (a === 'parry') { doParry(); return; }
  if (a === 'equip_0') { equipLoot(); return; }
  if (a === 'sell_0') { sellLoot(); return; }
  if (a === 'continue') { nextRoom(); return; }
  if (a && a.indexOf('buy_') === 0) { var idx = parseInt(a.slice(4), 10); if (shop && shop.items[idx]) buyShop(shop.items[idx]); return; }
  if (a === 'resume') { gs = pausedFrom; return; }
  if (a === 'retry') { startRun(true); return; }
  if (a === 'play') { startRun(false); return; }
  if (a === 'help_close') { helpOpen = false; return; }
}

    else if (_resume.gs === 'SHOP' && _resume.shop) { shop = _resume.shop; gs = 'SHOP'; }

  if ((n | 0) >= 99) {
    // drive a terminal state
    if (gs === 'MENU' || gs === 'GAMEOVER') startRun(true);
    heroHp = 0; gameOver();
  } else {
    seenTut = true; coachOn = false;
    startRun(true);
  }
  window._silent = false;
};

})();
</script>
