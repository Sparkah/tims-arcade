var SPRITE_NAMES = [];

// ── Biomes (abstract, cartoon — no realistic anatomy) ──
var BIOMES = [
  { key: 'b_mouth',   c1: '#56d6c6', c2: '#2c9286', wall: '#1f7a70' },

];
var TRACT_LEN = 3600;                 // design units for one full mouth->exit tract
var BIOME_LEN = TRACT_LEN / BIOMES.length;

// ── State ──
var gs = 'MENU';                      // MENU | PLAYING | GAMEOVER | HELP | LAB
var prevGs = 'MENU';
var depthD = 0, cycleStartD = 0, cycle = 0;
var mass = 100, score = 0, best = 0;
var player = { x: 0, y: 0, squish: 0 };
var targetX = 0;
var ents = [];
var lastSpawnD = 0;
var biomeIdx = 0, toast = 0, toastKey = '';
var exitFlash = 0;
var muted = false;
// per-run meta tracking (folded into Biomass at run end)
var nutrientsEaten = 0, tractClears = 0;
var shields = 0;                     // shield charges from 'shield' cultures (absorb a hit)
var deepGut = false;                 // M3 Deep Gut harder endless mode (toggled on MENU)
var runScoreMul = 1;                 // 'score' culture multiplier applied this run
var runArmor = 0;                    // 'armor' culture damage reduction this run (0..~0.5)
var runFeed = 0;                     // 'feed' culture extra mass per nutrient this run
var runMagnet = 0;                   // 'magnet' culture extra collide x-tolerance this run (fraction)

// ════════════════════════════════════════════════════════════════════════
// THE MICROBIOME — persistent retention meta (M1 cultures + M2 daily + M3 depth)
// Stored under its OWN localStorage key so the in-run resume slot
// (bolus_run_v1) is never touched. Currency = Biomass (vector-drawn icon).
// Mirrors the Beast Bazaar "Charm/Vault" pattern, themed to gut flora.
// ════════════════════════════════════════════════════════════════════════
var META_KEY = 'bolus_meta_v1';
var CULTURE_MAX_LVL = 5;
var CULTURE_SLOTS = 3;        // base equip slots (Gut Pass adds a 4th)
// FIXED ladder, unlocked by CUMULATIVE PLAYTIME (meta.totalPlaySec). Each is a
// passive RUN boost, equippable into the slots, upgradeable 1→5 with Biomass.
var CULTURE_DEFS = [
  { id: 'lacto',   min: 5,   col: '#7ed957', stat: 'score',  per: 0.06, en: 'Lactobacillus',   ru: 'Лактобактерия' },
  { id: 'villi',   min: 15,  col: '#ffd24a', stat: 'magnet', per: 0.14, en: 'Hungry Villi',    ru: 'Голодные ворсинки' },
  { id: 'mucus',   min: 25,  col: '#56d6c6', stat: 'armor',  per: 0.10, en: 'Mucus Coat',      ru: 'Слизистый щит' },
  { id: 'enzyme',  min: 40,  col: '#f0a23c', stat: 'feed',   per: 1.5,  en: 'Enzyme Surge',    ru: 'Всплеск ферментов' },
  { id: 'flora',   min: 60,  col: '#9cd45a', stat: 'bank',   per: 0.08, en: 'Gut Flora',       ru: 'Микрофлора' },
  { id: 'biofilm', min: 90,  col: '#6aa9e0', stat: 'shield', per: 1,    en: 'Biofilm Shield',  ru: 'Биоплёнка' },
  { id: 'probio',  min: 130, col: '#c77dff', stat: 'idle',   per: 0.12, en: 'Probiotic Bloom', ru: 'Пробиотик' },
  { id: 'apex',    min: 200, col: '#ff7b6b', stat: 'score',  per: 0.10, en: 'Apex Strain',     ru: 'Апекс-штамм' },
];
var CULTURE_BY_ID = {};
for (var _ki = 0; _ki < CULTURE_DEFS.length; _ki++) CULTURE_BY_ID[CULTURE_DEFS[_ki].id] = CULTURE_DEFS[_ki];
var MAX_SHIELDS = 5;          // cap total shield charges per run
var IDLE_CAP_H = 10;          // overnight ferment caps at 10h (the cap IS the return trigger)
var IDLE_PER_OWNED_PER_H = 5; // Biomass/hour per owned culture (fermenterLevel)

// ── DAILY QUESTS (reset at UTC midnight, claim for Biomass) ──
var QUEST_DEFS = [
  { kind: 'eat',   goals: [25, 45, 70],      reward: [40, 70, 110], key: 'q_eat' },
  { kind: 'clear', goals: [2, 4, 6],         reward: [40, 70, 110], key: 'q_clear' },
  { kind: 'exit',  goals: [1, 1, 1],         reward: [40, 70, 110], key: 'q_exit' },
  { kind: 'cycle', goals: [2, 3, 5],         reward: [40, 70, 110], key: 'q_cycle' },
  { kind: 'score', goals: [600, 1200, 2200], reward: [40, 70, 110], key: 'q_score' },
];
var QUEST_BY_KIND = {};
for (var _qi = 0; _qi < QUEST_DEFS.length; _qi++) QUEST_BY_KIND[QUEST_DEFS[_qi].kind] = QUEST_DEFS[_qi];

var meta = null;             // loaded in onReady
var runPlaySec = 0;          // seconds played THIS run (folded into meta.totalPlaySec at end)
var lastBiomass = 0;         // Biomass banked from the most recent run (session-end hook)
var lastBiomassBase = 0;     // base (pre-double) Biomass of the most recent run (for the ad)
var doubleUsed = false;      // GAMEOVER 2x-Biomass ad used this run
var cultureToast = null;     // { def, t } NEW CULTURE flourish when a milestone unlocks
var questToast = null;       // { q, t } QUEST DONE flourish
var bootBannerT = 0;         // welcome-back banner timer at boot
var idleClaim = 0, idleHoursAway = 0, dailyClaim = 0, streakJustGrew = false;
var labTab = 'cultures';     // 'cultures' | 'quests'

function defaultMeta() {
  return {
    biomass: 0,                  // permanent currency
    cultures: {},                // id -> { lvl: 1..MAX }
    equipped: [null, null, null],// culture id per equip slot
    totalPlaySec: 0,             // cumulative playtime (drives culture unlocks)
    runs: 0,
    lastClose: 0,                // epoch ms of last close (overnight-ferment anchor)
    // M2 daily
    lastLoginDay: '', streak: 0, bestStreak: 0,
    questDay: '', quests: [],
    // M3 depth + monetization
    evolutions: 0,               // prestige count (+10% Biomass each)
    gutPass: false,              // one-time unlock (+50% Biomass, 4th slot)
    deepUnlocked: false,         // Deep Gut mode unlocked (first tract clear / cycle>=3 ever)
  };
}
function loadMeta() {
  var m = defaultMeta();
  try {
    var raw = localStorage.getItem(META_KEY);
    if (raw) {
      var s = JSON.parse(raw);
      if (s && typeof s === 'object') {
        m.biomass = Math.max(0, +s.biomass || 0);
        m.totalPlaySec = Math.max(0, +s.totalPlaySec || 0);
        m.runs = +s.runs || 0;
        m.lastClose = +s.lastClose || 0;
        m.lastLoginDay = s.lastLoginDay || ''; m.streak = +s.streak || 0; m.bestStreak = +s.bestStreak || 0;
        m.questDay = s.questDay || ''; m.quests = Array.isArray(s.quests) ? s.quests : [];
        m.evolutions = Math.max(0, +s.evolutions || 0);
        m.gutPass = !!s.gutPass; m.deepUnlocked = !!s.deepUnlocked;
        if (s.cultures && typeof s.cultures === 'object') {
          for (var cid in s.cultures) {
            if (s.cultures.hasOwnProperty(cid) && CULTURE_BY_ID[cid]) {
              var lv = +(s.cultures[cid] && s.cultures[cid].lvl) || 1;
              m.cultures[cid] = { lvl: GF.clamp(lv, 1, CULTURE_MAX_LVL) };
            }
          }
        }
        if (Array.isArray(s.equipped)) {
          for (var si = 0; si < 4; si++) {
            var eid = s.equipped[si];
            if (eid && m.cultures[eid]) m.equipped[si] = eid;
            else if (si < m.equipped.length) m.equipped[si] = null;
          }
        }
      }
    }
  } catch (e) {}
  // Gut Pass grants a 4th slot — ensure the array is the right length.
  ensureSlots(m);
  return m;
}
function ensureSlots(m) {
  var want = (m.gutPass ? 4 : 3);
  while (m.equipped.length < want) m.equipped.push(null);
  if (m.equipped.length > want) m.equipped = m.equipped.slice(0, want);
}
function slotCount() { return meta ? meta.equipped.length : CULTURE_SLOTS; }
function saveMeta() {
  if (!meta) return;
  try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch (e) {}
}

// live cumulative playtime (persisted + in-progress run), seconds / minutes
function totalPlaySec() { return (meta ? meta.totalPlaySec : 0) + runPlaySec; }
function totalPlayMin() { return totalPlaySec() / 60; }
// the next not-yet-owned culture on the ladder (the visible goal), or null
function nextCulture() {
  if (!meta) return null;
  for (var i = 0; i < CULTURE_DEFS.length; i++) if (!meta.cultures[CULTURE_DEFS[i].id]) return CULTURE_DEFS[i];
  return null;
}
function ownedCultureCount() {
  if (!meta) return 0;
  var n = 0; for (var i = 0; i < CULTURE_DEFS.length; i++) if (meta.cultures[CULTURE_DEFS[i].id]) n++;
  return n;
}
// grant any culture whose playtime milestone has been crossed; returns newly-granted defs
function checkCultureUnlocks() {
  if (!meta) return [];
  var mins = totalPlayMin(), granted = [];
  for (var i = 0; i < CULTURE_DEFS.length; i++) {
    var d = CULTURE_DEFS[i];
    if (mins >= d.min && !meta.cultures[d.id]) {
      meta.cultures[d.id] = { lvl: 1 };
      // auto-equip the first unlocks into a free slot so they're felt immediately
      for (var sgi = 0; sgi < meta.equipped.length; sgi++) { if (!meta.equipped[sgi]) { meta.equipped[sgi] = d.id; break; } }
      granted.push(d);
    }
  }
  if (granted.length) saveMeta();
  return granted;
}
// summed bonus across EQUIPPED cultures whose stat matches (per × level)
function cultureVal(stat) {
  if (!meta) return 0;
  var v = 0;
  for (var i = 0; i < meta.equipped.length; i++) {
    var id = meta.equipped[i]; if (!id) continue;
    var def = CULTURE_BY_ID[id], c = meta.cultures[id];
    if (def && c && def.stat === stat) v += def.per * c.lvl;
  }
  return v;
}
function cultureUpCost(id) {
  var c = meta && meta.cultures[id]; if (!c) return Infinity;
  if (c.lvl >= CULTURE_MAX_LVL) return Infinity;
  var def = CULTURE_BY_ID[id];
  return Math.round((30 + def.min * 0.5) * Math.pow(1.6, c.lvl - 1));
}
function buyCultureUpgrade(id) {
  var cost = cultureUpCost(id);
  if (!meta || !isFinite(cost) || meta.biomass < cost) return false;
  meta.biomass -= cost; meta.cultures[id].lvl += 1; saveMeta();
  return true;
}
function toggleEquip(id) {
  if (!meta || !meta.cultures[id]) return false;
  var at = meta.equipped.indexOf(id);
  if (at >= 0) { meta.equipped[at] = null; saveMeta(); return true; }
  for (var s = 0; s < meta.equipped.length; s++) { if (!meta.equipped[s]) { meta.equipped[s] = id; saveMeta(); return true; } }
  return false; // slots full — unequip one first
}
function unequipSlot(slot) {
  if (!meta || !meta.equipped[slot]) return false;
  meta.equipped[slot] = null; saveMeta(); return true;
}
function cultureName(def) { return (GF.lang === 'ru' ? def.ru : def.en) || def.en; }
function cultureBonusText(def, lvl) {
  var v = def.per * lvl, ru = (GF.lang === 'ru');
  if (def.stat === 'score' || def.stat === 'magnet' || def.stat === 'armor' || def.stat === 'bank' || def.stat === 'idle') v = Math.round(v * 100) + '%';
  else v = '+' + v;
  switch (def.stat) {
    case 'score':  return '+' + v + (ru ? ' очки' : ' score');
    case 'magnet': return '+' + v + (ru ? ' радиус' : ' catch radius');
    case 'armor':  return '-' + (Math.round(def.per * lvl * 100) + '%') + (ru ? ' урон' : ' damage');
    case 'feed':   return v + (ru ? ' масса/нутр.' : ' mass/nutrient');
    case 'bank':   return '+' + v + (ru ? ' биомасса' : ' Biomass');
    case 'shield': return '+' + (def.per * lvl) + (ru ? ' щит' : ' shield');
    case 'idle':   return '+' + v + (ru ? ' ночное брожение' : ' overnight ferment');
  }
  return '';
}
// total bonus multiplier from evolutions + gut pass, applied to banked Biomass
function biomassMult() {
  var m = (1 + (meta ? meta.evolutions : 0) * 0.10) * (meta && meta.gutPass ? 1.5 : 1);
  if (bloomActive()) m *= 1.5;
  return m;
}

// ── M3 EVOLVE (prestige) ──
function canEvolve() {
  if (!meta) return false;
  var n = 0;
  for (var id in meta.cultures) { if (meta.cultures.hasOwnProperty(id) && meta.cultures[id].lvl >= 3) n++; }
  return n >= 4;
}
function doEvolve() {
  if (!canEvolve()) return false;
  for (var id in meta.cultures) { if (meta.cultures.hasOwnProperty(id)) meta.cultures[id].lvl = 1; } // keep ownership, reset levels
  meta.evolutions += 1; saveMeta();
  return true;
}

// ── M3 BLOOM (deterministic 3-day-on / 4-day-off, stable across reloads) ──
function utcDayNum() { return Math.floor(Date.now() / 86400000); }
function bloomActive() { return (utcDayNum() % 7) < 3; }
function bloomDaysLeft() { var p = utcDayNum() % 7; return p < 3 ? (3 - p) : 0; }

// ── DAILY QUESTS ──
function utcDayStr(offset) {
  var d = new Date(); if (offset) d.setUTCDate(d.getUTCDate() + offset);
  return d.getUTCFullYear() + '-' + (d.getUTCMonth() + 1) + '-' + d.getUTCDate();
}
function questLabel(q) {
  var d = QUEST_BY_KIND[q.kind]; if (!d) return '';
  return GF.t(d.key).replace('{g}', q.goal);
}
function maybeRollQuests() {
  if (!meta) return;
  var today = utcDayStr(0);
  if (meta.questDay === today && Array.isArray(meta.quests) && meta.quests.length) return;
  meta.questDay = today;
  var pool = QUEST_DEFS.slice(), picked = [];
  for (var n = 0; n < 3 && pool.length; n++) {
    var idx = Math.floor(Math.random() * pool.length);
    var d = pool.splice(idx, 1)[0];
    var tier = Math.floor(Math.random() * d.goals.length);
    picked.push({ kind: d.kind, goal: d.goals[tier], prog: 0, done: false, claimed: false, reward: d.reward[tier] });
  }
  // seed ONE quest ~70% pre-progressed (transfer momentum). Skip single-step quests (exit).
  for (var pi = 0; pi < picked.length; pi++) {
    if (picked[pi].goal > 1) { picked[pi].prog = Math.floor(picked[pi].goal * 0.7); break; }
  }
  meta.quests = picked;
  saveMeta();
}
// advance any active quest of this kind ('cycle'/'exit' track a max, others accumulate)
function questProgress(kind, amount) {
  if (!meta || !Array.isArray(meta.quests)) return;
  var changed = false;
  for (var i = 0; i < meta.quests.length; i++) {
    var q = meta.quests[i];
    if (q.kind !== kind || q.done) continue;
    var before = q.prog;
    if (kind === 'cycle' || kind === 'exit' || kind === 'score') q.prog = Math.max(q.prog, amount); else q.prog += amount;
    if (q.prog >= q.goal) { q.prog = q.goal; q.done = true; questToast = { q: q, t: 3.4 }; if (GF.happytime) GF.happytime(); }
    if (q.prog !== before) changed = true;   // only persist on real change (score quest fires every frame)
  }
  if (changed) saveMeta();
}
function claimQuest(i) {
  var q = meta && meta.quests && meta.quests[i];
  if (!q || !q.done || q.claimed) return false;
  q.claimed = true; meta.biomass += q.reward; saveMeta(); return true;
}
function claimableQuests() {
  if (!meta || !Array.isArray(meta.quests)) return 0;
  var n = 0; for (var i = 0; i < meta.quests.length; i++) if (meta.quests[i].done && !meta.quests[i].claimed) n++;
  return n;
}
function hoursToReset() { var d = new Date(); return 24 - (d.getUTCHours() + d.getUTCMinutes() / 60); }

// ── M2 reason-to-return: overnight ferment + daily login/streak (on MENU/boot) ──
function claimOnOpen() {
  if (!meta) return;
  idleClaim = 0; dailyClaim = 0; streakJustGrew = false; idleHoursAway = 0;
  var now = Date.now();
  if (meta.lastClose > 0) {
    var hrs = Math.min(IDLE_CAP_H, (now - meta.lastClose) / 3600000);
    if (hrs >= 0.05) {
      idleHoursAway = hrs;
      var fermenter = ownedCultureCount();
      idleClaim = Math.round(hrs * fermenter * IDLE_PER_OWNED_PER_H * (1 + cultureVal('idle')));
      if (idleClaim > 0) meta.biomass += idleClaim;
    }
  }
  var today = utcDayStr(0);
  if (meta.lastLoginDay !== today) {
    if (meta.lastLoginDay === utcDayStr(-1)) meta.streak = (meta.streak || 0) + 1;
    else meta.streak = 1;
    meta.bestStreak = Math.max(meta.bestStreak || 0, meta.streak);
    meta.lastLoginDay = today;
    streakJustGrew = true;
    dailyClaim = 30 + Math.min(meta.streak, 7) * 10 + (meta.streak >= 7 ? 50 : 0);
    meta.biomass += dailyClaim;
  }
  meta.lastClose = now;
  maybeRollQuests();
  saveMeta();
}
// ── M1 session-end hook: bank Biomass + fold playtime + unlock cultures ──
function bankRun() {
  if (!meta) return 0;
  var base = Math.floor(nutrientsEaten * 2 + tractClears * 20 + cycle * 5 + score * 0.02);
  base = Math.floor(base * (1 + cultureVal('bank')));   // 'bank' cultures (Gut Flora)
  base = Math.floor(base * biomassMult());               // evolutions + Gut Pass + Bloom
  lastBiomassBase = base;
  lastBiomass = base;
  meta.biomass += base;
  meta.runs += 1;
  meta.totalPlaySec += runPlaySec; runPlaySec = 0;
  if (cycle >= 3 || tractClears >= 1) meta.deepUnlocked = true;
  meta.lastClose = Date.now();
  checkCultureUnlocks();
  saveMeta();
  return base;
}
// GAMEOVER "Watch: 2x Biomass" — base is ALWAYS already granted; the ad adds the rest.
function grantDoubleBiomass() {
  if (!meta || doubleUsed) return;
  doubleUsed = true;
  meta.biomass += lastBiomassBase;   // +1x more on top of the base already banked = 2x total
  lastBiomass = lastBiomassBase * 2;
  saveMeta();
  GF.spawnFloat(GF.W / 2, GF.H * 0.5, '+' + lastBiomassBase, '#7ed957');
  if (GF.happytime) GF.happytime();
}

// ── Audio (Suno-generated bed; graceful fallback) ──
var bgm = null, audioOn = false;
function audioInit() {
  try {
    bgm = new Audio('audio/bg_loop.mp3');
    bgm.loop = true; bgm.volume = 0.32; bgm.preload = 'auto';
    bgm.addEventListener('error', function () { bgm = null; });
  } catch (e) { bgm = null; }
}
function audioStart() {                // only ever called from a user gesture
  if (!bgm || muted || audioOn) return;
  var p = bgm.play();
  if (p && p.then) { p.then(function () { audioOn = true; }).catch(function () { audioOn = false; }); }
  else { audioOn = true; }
}
function toggleMute() {
  muted = !muted;
  try { localStorage.setItem('bolus_muted', muted ? '1' : '0'); } catch (e) {}
  if (muted) { if (bgm) { try { bgm.pause(); } catch (e) {} } audioOn = false; }
  else { audioStart(); }
}

// ── Layout helpers (recomputed each frame; resize-safe) ──
function playerY() { return GF.H * 0.40; }
function laneW() { return Math.min(GF.W * 0.84, 480 * GF.S); }
function laneL() { return (GF.W - laneW()) / 2; }
function sx(fx) { return laneL() + fx * laneW(); }
function pr() { return GF.clamp(18 + mass * 0.14, 16, 38) * GF.S; }
function topBarH() { return 58 * GF.S; }

// ── Lifecycle ──
function startGame() {
  score = 0; mass = 100; depthD = 0; cycleStartD = 0; cycle = 0;
  ents.length = 0; lastSpawnD = 0; biomeIdx = 0; exitFlash = 0;
  player.x = GF.W / 2; targetX = player.x; player.squish = 0;
  // ── apply equipped Microbiome culture boosts to THIS run ──
  nutrientsEaten = 0; tractClears = 0; doubleUsed = false; lastBiomass = 0; lastBiomassBase = 0;
  runScoreMul = 1 + cultureVal('score');
  runArmor    = Math.min(0.7, cultureVal('armor'));          // damage reduction fraction
  runFeed     = cultureVal('feed');                          // extra mass per nutrient
  runMagnet   = cultureVal('magnet');                        // extra collide x-tolerance (fraction)
  shields     = Math.min(MAX_SHIELDS, Math.round(cultureVal('shield')));
  gs = 'PLAYING';
  audioStart();
  GF.gameStarted();
  GF.saveRun();
}

function gameOver() {
  if (gs === 'GAMEOVER') return;
  var nb = score > best;
  if (nb) { best = Math.floor(score); try { localStorage.setItem('bolus_best', best); } catch (e) {} }
  gs = 'GAMEOVER';
  bankRun();            // M1 session-end hook: bank Biomass, fold playtime, unlock cultures
  GF.gameEnded();
  if (nb && best > 0) GF.happytime();
  GF.saveRun();
}

// Shield ('biofilm') — absorb one hazard/ring hit instead of losing mass.
// Returns true if a charge was spent (caller skips the damage).
function absorbHit(x, y) {
  if (shields <= 0) return false;
  shields--;
  GF.setShake(0.35);
  GF.spawnParticles(x, y, '#6aa9e0', 16);
  GF.spawnFloat(x, y - pr(), GF.lang === 'ru' ? 'щит!' : 'blocked!', '#9cd4ff');
  GF.saveRun();
  return true;
}

function spawnEnt(kind, fx, aheadScreenPx) {
  var aheadD = (typeof aheadScreenPx === 'number' ? aheadScreenPx : (GF.H - playerY() + 90)) / GF.S;
  var e = { kind: kind, depthD: depthD + aheadD, fx: fx, done: false, r: 16 * GF.S, gap: 0.34, gfx: Math.random() };
  if (kind === 'hazard') e.r = (16 + Math.random() * 8) * GF.S;
  else if (kind === 'nutrient') e.r = 13 * GF.S;
  else if (kind === 'ring') { e.gap = 0.30 + Math.random() * 0.12; e.gapc = 0.22 + Math.random() * 0.56; }
  ents.push(e);
}

function speedD() {
  var into = (depthD - cycleStartD) / TRACT_LEN;
  return (150 + cycle * 26) * (1 + Math.min(into, 1) * 0.18) * (deepGut ? 1.32 : 1);
}
function spawnGapD() {
  var g = Math.max(150, 320 - cycle * 16 - biomeIdx * 14);
  return deepGut ? Math.max(118, g * 0.78) : g;   // denser hazards in Deep Gut
}

// ── Update ──
function update(dt) {
  toast = Math.max(0, toast - dt);
  exitFlash = Math.max(0, exitFlash - dt * 1.6);
  player.squish = Math.max(0, player.squish - dt * 4);
  if (cultureToast) { cultureToast.t -= dt; if (cultureToast.t <= 0) cultureToast = null; }
  if (questToast) { questToast.t -= dt; if (questToast.t <= 0) questToast = null; }
  if (bootBannerT > 0) bootBannerT = Math.max(0, bootBannerT - dt);
  if (gs === 'LAB') return;          // Lab overlay open — freeze the run (reach the meta without losing)
  if (gs !== 'PLAYING') return;

  // accrue playtime → unlock cultures on the cumulative-time ladder (multi-day pull)
  runPlaySec += dt;
  var fresh = checkCultureUnlocks();
  if (fresh.length) { cultureToast = { def: fresh[fresh.length - 1], t: 3.4 }; if (GF.happytime) GF.happytime(); }

  var sp = speedD();
  depthD += sp * dt;
  score += sp * dt * 0.08 * runScoreMul;

  // steer — drag below the top bar, or keyboard. Ignore touches that land on the
  // pause pill (so opening the Lab doesn't yank the player toward the pill).
  if (GF.touch.active && GF.touch.y > topBarH() && !inRect(GF.touch.x, GF.touch.y, pausePillRect)) targetX = GF.touch.x;
  if (GF.keys['ArrowLeft'] || GF.keys['KeyA']) targetX -= 560 * GF.S * dt;
  if (GF.keys['ArrowRight'] || GF.keys['KeyD']) targetX += 560 * GF.S * dt;
  targetX = GF.clamp(targetX, laneL() + pr(), laneL() + laneW() - pr());
  player.x += (targetX - player.x) * Math.min(1, dt * 12);
  player.x = GF.clamp(player.x, laneL() + pr(), laneL() + laneW() - pr());

  // biome
  var bi = GF.clamp(Math.floor((depthD - cycleStartD) / BIOME_LEN), 0, BIOMES.length - 1);
  if (bi !== biomeIdx) { biomeIdx = bi; toast = 1.6; toastKey = BIOMES[bi].key; }

  // spawn
  if (depthD - lastSpawnD >= spawnGapD()) {
    lastSpawnD = depthD;
    var roll = Math.random();
    var fx = 0.16 + Math.random() * 0.68;
    if (biomeIdx >= 1 && roll < 0.18) spawnEnt('ring', 0.5);
    else if (roll < 0.62) spawnEnt('hazard', fx);
    else spawnEnt('nutrient', fx);
  }

  // move / collide / cull
  var py = playerY();
  for (var i = ents.length - 1; i >= 0; i--) {
    var e = ents[i];
    var dyScreen = (e.depthD - depthD) * GF.S;
    if (e.kind === 'ring') {
      if (!e.done && dyScreen < pr() * 0.7 && dyScreen > -pr() * 0.7) {
        e.done = true;
        var pfx = (player.x - laneL()) / laneW();
        var half = e.gap / 2;
        if (pfx < e.gapc - half || pfx > e.gapc + half) {
          if (!absorbHit(player.x, py)) {
            mass -= 18 * (1 - runArmor); GF.setShake(0.6); GF.spawnParticles(player.x, py, '#ff5468', 14); player.squish = 1;
            GF.saveRun(); if (mass <= 0) { gameOver(); return; }
          }
        }
      }
    } else if (!e.done) {
      var ex = sx(e.fx);
      // 'magnet' cultures widen the nutrient catch radius (not hazards).
      var tol = (e.kind === 'nutrient') ? 0.88 * (1 + runMagnet) : 0.88;
      if (Math.abs(dyScreen) < (pr() + e.r) && Math.abs(ex - player.x) < (pr() + e.r) * tol) {
        e.done = true;
        if (e.kind === 'hazard') {
          if (!absorbHit(player.x, py)) {
            mass -= 20 * (1 - runArmor); GF.setShake(0.6); GF.spawnParticles(player.x, py, '#ff5468', 16); player.squish = 1;
            GF.saveRun(); if (mass <= 0) { gameOver(); return; }
          }
        } else {
          mass = Math.min(100, mass + 8 + runFeed); score += 25 * runScoreMul;
          nutrientsEaten++; questProgress('eat', 1);
          GF.spawnParticles(ex, sy(e), '#ffd24a', 10); GF.spawnFloat(ex, sy(e), '+' + Math.round(25 * runScoreMul), '#ffe27a');
          GF.saveRun();
        }
      }
    }
    if ((e.depthD - depthD) * GF.S < -110) ents.splice(i, 1);
  }

  // exit gate -> clear tract, speed up, loop
  if (depthD - cycleStartD >= TRACT_LEN) {
    exitFlash = 1; score += 200 * runScoreMul; cycle++; cycleStartD = depthD; biomeIdx = 0;
    mass = Math.min(100, mass + 22);
    toast = 1.8; toastKey = 'exit';
    tractClears++;
    questProgress('clear', 1); questProgress('cycle', cycle); questProgress('exit', 1);
    if (!meta || !meta.deepUnlocked) { if (meta) { meta.deepUnlocked = true; saveMeta(); } }
    GF.spawnParticles(GF.W / 2, py, '#ffffff', 30);
    if (score > best) { best = Math.floor(score); try { localStorage.setItem('bolus_best', best); } catch (e) {} GF.happytime(); }
    GF.saveRun();
  }
  // 'exit' biome quest also fires whenever you reach the final biome within a tract
  if (biomeIdx >= BIOMES.length - 1) questProgress('exit', 1);
  // score quest tracks the live max
  questProgress('score', Math.floor(score));
}
function sy(e) { return playerY() + (e.depthD - depthD) * GF.S; }

// ── Draw ──
function draw(ctx) {
  var W = GF.W, H = GF.H, S = GF.S, b = BIOMES[biomeIdx];
  // background gradient
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, b.c1); g.addColorStop(1, b.c2);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // descent motion — soft horizontal bands scrolling down
  ctx.globalAlpha = 0.10; ctx.fillStyle = '#ffffff';
  var bandStep = 90 * S, off = (depthD * S * 0.6) % bandStep;
  for (var by = -bandStep + off; by < H + bandStep; by += bandStep) {
    ctx.fillRect(0, by, W, 26 * S);
  }
  ctx.globalAlpha = 1;
  // lane walls (wavy)
  drawWalls(ctx, b);
  // entities (far first)
  for (var i = 0; i < ents.length; i++) drawEnt(ctx, ents[i]);
  // player
  if (gs === 'PLAYING' || gs === 'GAMEOVER' || gs === 'HELP') drawPlayer(ctx);
  if (gs === 'PLAYING' && shields > 0) drawShieldRing(ctx);
  // exit flash
  if (exitFlash > 0) { ctx.globalAlpha = exitFlash * 0.6; ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1; }
  // HUD
  if (gs === 'PLAYING' || gs === 'GAMEOVER') drawHUD(ctx);
  drawTopButtons(ctx);
  if (gs === 'PLAYING') { drawNextCultureHint(ctx); drawPausePill(ctx); }
  // toast (biome / exit name)
  if (toast > 0) drawToast(ctx);

  if (gs === 'MENU') { GF.drawOverlay({ title: GF.t('title'), sub: GF.t('sub'), sub2: GF.t('sub2'), btnText: GF.t('play'), btnFn: startGame, bestText: best > 0 ? GF.t('best') + ': ' + best : null }); drawMenuMeta(ctx); }
  if (gs === 'GAMEOVER') { GF.drawOverlay({ title: GF.t('gameover'), sub: GF.t('score') + ': ' + Math.floor(score), btnText: GF.t('retry'), btnFn: startGame, bestText: GF.t('best') + ': ' + best }); drawGameOverMeta(ctx); }
  if (gs === 'HELP') drawHelp(ctx);
  if (gs === 'LAB') drawLab(ctx);
  // floating toasts (above everything except the Lab modal)
  if (gs !== 'LAB') {
    if (cultureToast) drawCultureToast(ctx);
    else if (questToast) drawQuestToast(ctx);
    if (bootBannerT > 0 && gs !== 'GAMEOVER') drawBootBanner(ctx);
  }
}

function drawWalls(ctx, b) {
  var W = GF.W, H = GF.H, S = GF.S, L = laneL(), R = L + laneW();
  ctx.fillStyle = b.wall;
  ctx.beginPath(); ctx.moveTo(0, 0);
  for (var y = 0; y <= H; y += 24 * S) {
    var w = L + Math.sin((y + depthD * S) * 0.018) * 10 * S;
    ctx.lineTo(w, y);
  }
  ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(W, 0);
  for (var y2 = 0; y2 <= H; y2 += 24 * S) {
    var w2 = R + Math.sin((y2 + depthD * S) * 0.018 + 1.7) * 10 * S;
    ctx.lineTo(w2, y2);
  }
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
}

function drawEnt(ctx, e) {
  var S = GF.S, y = sy(e);
  if (y < -120 * S || y > GF.H + 120 * S) return;
  if (e.kind === 'ring') {
    var L = laneL(), w = laneW(), half = e.gap / 2;
    var gl = L + (e.gapc - half) * w, gr = L + (e.gapc + half) * w;
    ctx.fillStyle = BIOMES[biomeIdx].wall;
    ctx.globalAlpha = 0.95;
    roundRect(ctx, L, y - 13 * S, gl - L, 26 * S, 8 * S); ctx.fill();
    roundRect(ctx, gr, y - 13 * S, (L + w) - gr, 26 * S, 8 * S); ctx.fill();
    ctx.globalAlpha = 1;
    return;
  }
  var x = sx(e.fx);
  if (e.kind === 'hazard') {
    ctx.fillStyle = '#ff5468';
    ctx.beginPath();
    for (var a = 0; a < Math.PI * 2; a += Math.PI / 5) {
      var rr = e.r * (a % (Math.PI / 2.5) < 0.3 ? 1.25 : 1);
      var px = x + Math.cos(a + e.gfx) * rr, pyv = y + Math.sin(a + e.gfx) * rr;
      if (a === 0) ctx.moveTo(px, pyv); else ctx.lineTo(px, pyv);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#7a1622';
    ctx.beginPath(); ctx.arc(x, y, e.r * 0.42, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.fillStyle = '#ffd24a';
    ctx.beginPath(); ctx.arc(x, y, e.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff7d0';
    ctx.beginPath(); ctx.arc(x - e.r * 0.3, y - e.r * 0.3, e.r * 0.32, 0, Math.PI * 2); ctx.fill();
  }
}

function drawPlayer(ctx) {
  var S = GF.S, x = player.x, y = playerY(), r = pr();
  var sq = 1 - player.squish * 0.22;
  ctx.save();
  ctx.translate(x, y); ctx.scale(1 / sq, sq);
  // body
  ctx.fillStyle = '#f2b06a';
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#d98e42';
  ctx.beginPath(); ctx.arc(0, r * 0.28, r * 0.92, 0.15 * Math.PI, 0.85 * Math.PI); ctx.fill();
  // face
  ctx.fillStyle = '#2a1c0e';
  ctx.beginPath(); ctx.arc(-r * 0.32, -r * 0.12, r * 0.13, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.32, -r * 0.12, r * 0.13, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#2a1c0e'; ctx.lineWidth = Math.max(1.5, r * 0.09); ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, r * 0.05, r * 0.42, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
  ctx.restore();
}

function drawHUD(ctx) {
  var S = GF.S, W = GF.W, fs = GF.clamp(15 * S, 12, 20);
  // top bar
  ctx.fillStyle = 'rgba(8,10,18,0.32)'; ctx.fillRect(0, 0, W, topBarH());
  // score (center)
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('score') + ': ' + Math.floor(score), W / 2, topBarH() * 0.5);
  // mass bar (under bar)
  var bx = 56 * S, bw = W - 112 * S, byy = topBarH() + 8 * S, bh = 12 * S;
  ctx.fillStyle = 'rgba(0,0,0,0.28)'; roundRect(ctx, bx, byy, bw, bh, bh / 2); ctx.fill();
  var frac = GF.clamp(mass / 100, 0, 1);
  ctx.fillStyle = frac > 0.5 ? '#5ad24a' : (frac > 0.25 ? '#f0c23c' : '#ff5468');
  roundRect(ctx, bx, byy, bw * frac, bh, bh / 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (10 * S) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.fillText(GF.t('mass'), bx, byy - 8 * S);
  // tract progress (right edge)
  var pgH = GF.H * 0.5, pgY = GF.H * 0.28, pgX = W - 14 * S;
  ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 4 * S; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(pgX, pgY); ctx.lineTo(pgX, pgY + pgH); ctx.stroke();
  var pf = GF.clamp((depthD - cycleStartD) / TRACT_LEN, 0, 1);
  ctx.strokeStyle = '#fff'; ctx.beginPath(); ctx.moveTo(pgX, pgY + pgH); ctx.lineTo(pgX, pgY + pgH - pgH * pf); ctx.stroke();
}

// ════════════════════════════════════════════════════════════════════════
// MICROBIOME UI — vector icons, pause pill, HUD hint, Lab overlay, menu/gameover
// extras, toasts. All hit-target rects are stored here and consumed in onTap.
// ════════════════════════════════════════════════════════════════════════
var pausePillRect = null;     // top-center PLAYING pill → opens the Lab
var labBtnRect = null;        // MENU "Lab" button
var deepToggleRect = null;    // MENU Deep Gut / Normal toggle
var evolveBtnRect = null;     // MENU "Evolve" button
var gutPassBtnRect = null;    // MENU/GAMEOVER "Get Gut Pass" button
var doubleBtnRect = null;     // GAMEOVER "Watch: 2x Biomass" button
var labTabRects = [];         // [{tab,x,y,w,h}]
var cultureTileRects = [];    // [{id,x,y,w,h}] owned-culture tile (tap = equip toggle)
var cultureUpRects = [];      // [{id,x,y,w,h,afford}] upgrade buttons
var equipSlotRects = [];      // [{slot,x,y,w,h}] equip slots (tap filled = unequip)
var questClaimRects = [];     // [{i,x,y,w,h,can}] quest claim buttons
var labResumeRect = null, labMenuRect = null, labEvolveRect = null, labPassRect = null;

function fmtBio(n) { n = Math.round(n || 0); return n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k' : '' + n; }

// Biomass currency icon: a green cell with a darker nucleus (NEVER emoji).
function drawBiomassIcon(ctx, x, y, r) {
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = '#7ed957'; ctx.fill();
  ctx.lineWidth = Math.max(1, r * 0.16); ctx.strokeStyle = '#3c7a20'; ctx.stroke();
  // membrane highlight
  ctx.beginPath(); ctx.arc(x - r * 0.32, y - r * 0.32, r * 0.26, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.fill();
  // nucleus
  ctx.beginPath(); ctx.arc(x + r * 0.12, y + r * 0.08, r * 0.34, 0, Math.PI * 2);
  ctx.fillStyle = '#2f6418'; ctx.fill();
  ctx.restore();
}
// Per-culture vector glyph — a distinct shape per stat (no fonts, no emoji).
function drawCultureIcon(ctx, def, x, y, r) {
  ctx.save();
  ctx.fillStyle = def.col;
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = Math.max(1, r * 0.12);
  var i, ang, rr2, px, py;
  switch (def.stat) {
    case 'score':  // 5-point star
      ctx.beginPath();
      for (i = 0; i < 10; i++) { ang = i * Math.PI / 5 - Math.PI / 2; rr2 = (i % 2 === 0) ? r : r * 0.45; px = x + Math.cos(ang) * rr2; py = y + Math.sin(ang) * rr2; if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'magnet': // crescent of villi (rounded prongs)
      ctx.beginPath(); ctx.arc(x, y, r, 0.15 * Math.PI, 0.85 * Math.PI); ctx.lineWidth = Math.max(2, r * 0.4); ctx.strokeStyle = def.col; ctx.stroke();
      ctx.lineWidth = Math.max(1, r * 0.12); ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      for (i = 0; i < 3; i++) { ang = (0.3 + i * 0.2) * Math.PI; ctx.beginPath(); ctx.arc(x + Math.cos(ang) * r, y + Math.sin(ang) * r, r * 0.18, 0, Math.PI * 2); ctx.fillStyle = def.col; ctx.fill(); }
      break;
    case 'armor':  // shield
      ctx.beginPath(); ctx.moveTo(x, y - r);
      ctx.lineTo(x + r * 0.82, y - r * 0.45); ctx.lineTo(x + r * 0.82, y + r * 0.3);
      ctx.quadraticCurveTo(x, y + r * 1.05, x - r * 0.82, y + r * 0.3);
      ctx.lineTo(x - r * 0.82, y - r * 0.45); ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'feed':   // droplet
      ctx.beginPath(); ctx.moveTo(x, y - r);
      ctx.bezierCurveTo(x + r * 0.9, y - r * 0.1, x + r * 0.6, y + r, x, y + r);
      ctx.bezierCurveTo(x - r * 0.6, y + r, x - r * 0.9, y - r * 0.1, x, y - r);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'bank':   // cell cluster (3 dots) = flora
      ctx.beginPath(); ctx.arc(x, y - r * 0.4, r * 0.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(x - r * 0.5, y + r * 0.4, r * 0.45, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(x + r * 0.5, y + r * 0.4, r * 0.45, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      break;
    case 'shield': // hexagon (biofilm)
      ctx.beginPath();
      for (i = 0; i < 6; i++) { ang = i * Math.PI / 3 - Math.PI / 2; px = x + Math.cos(ang) * r; py = y + Math.sin(ang) * r; if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'idle':   // spiral-ish ring (slow ferment)
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(x, y, r * 0.45, 0, Math.PI * 1.4); ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = Math.max(1, r * 0.16); ctx.stroke();
      break;
    default:
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}

// Glowing shield aura around the player while charges remain ('biofilm').
function drawShieldRing(ctx) {
  var x = player.x, y = playerY(), r = pr();
  var t = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000;
  var pulse = 0.6 + 0.4 * Math.sin(t * 4);
  ctx.save();
  ctx.globalAlpha = 0.5 + 0.3 * pulse;
  ctx.strokeStyle = '#6aa9e0'; ctx.lineWidth = Math.max(2, r * 0.16 * pulse);
  ctx.beginPath(); ctx.arc(x, y, r * 1.45, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}

// PLAYING HUD hint: "next culture in N min" — its own faint chip CENTERED just

  ctx.textBaseline = 'middle';
  drawCultureIcon(ctx, nc, cx + 8 * S + icr, hy, icr);

}

// Top-center pause pill: shows banked Biomass + a claimable-quest badge; tap = Lab.

function btnRects() {

}
function drawTopButtons(ctx) {
  var S = GF.S, B = btnRects();

  ctx.fillStyle = 'rgba(8,10,18,0.45)';
  ctx.beginPath(); ctx.arc(B.mute.cx, B.mute.cy, B.mute.r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  var mx = B.mute.cx, my = B.mute.cy, u = B.mute.r * 0.5;
  ctx.beginPath();
  ctx.moveTo(mx - u * 0.9, my - u * 0.35); ctx.lineTo(mx - u * 0.3, my - u * 0.35);
  ctx.lineTo(mx + u * 0.3, my - u * 0.8); ctx.lineTo(mx + u * 0.3, my + u * 0.8);
  ctx.lineTo(mx - u * 0.3, my + u * 0.35); ctx.lineTo(mx - u * 0.9, my + u * 0.35);

    ctx.moveTo(mx + u * 1.05, my - u * 0.5); ctx.lineTo(mx + u * 0.55, my + u * 0.5); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(mx + u * 0.5, my, u * 0.5, -0.6, 0.6); ctx.stroke();

  }
}

// ── THE LAB overlay (mirrors the Beast Bazaar Vault) — CULTURES + QUESTS tabs ──
function drawLab(ctx) {
  var S = GF.S, W = GF.W, H = GF.H, ru = (GF.lang === 'ru');
  ctx.fillStyle = 'rgba(8,16,10,0.94)'; ctx.fillRect(0, 0, W, H);

  // biomass count under title (with icon)
  var biow = ctx.measureText(fmtBio(meta ? meta.biomass : 0)).width;
  drawBiomassIcon(ctx, GF.cx - biow / 2 - 14 * S, ty + 16 * S, GF.clamp(8 * S, 7, 11));

    ctx.fillText('✦ ' + GF.t('bloom') + ' x1.5 · ' + GF.t('bloomEnds') + ' ' + bloomDaysLeft() + GF.t('days'), GF.cx, headY + 2 * S);

  }

  for (var t = 0; t < tabs.length; t++) {

    ctx.strokeStyle = on ? '#7ed957' : 'rgba(255,255,255,0.16)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
    ctx.fillStyle = on ? '#7ed957' : '#8aa07a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px sans-serif';
    ctx.fillText(tabs[t].label, bx + tabW / 2, tabY + tabH / 2);
    if (tabs[t].badge) {
      var br = GF.clamp(8 * S, 7, 11);
      ctx.beginPath(); ctx.arc(bx + tabW - br - 2 * S, tabY + br + 2 * S, br, 0, Math.PI * 2);
      ctx.fillStyle = '#ff5b5b'; ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(9 * S, 8, 12) + 'px sans-serif';

  }
  ctx.textBaseline = 'alphabetic';

  if (paused) {

    GF.rr(ctx, bx0, by, bw, bh, bh / 2); ctx.fillStyle = gr; ctx.fill();
    ctx.fillStyle = '#08240f'; ctx.font = 'bold ' + GF.clamp(16 * S, 13, 22) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(GF.t('resume'), bx0 + bw / 2, by + bh / 2);

    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
    ctx.fillStyle = '#cde8b0'; ctx.fillText(GF.t('menu'), mx2 + bw / 2, by + bh / 2);

    ctx.fillStyle = '#cde8b0'; ctx.font = 'bold ' + GF.clamp(16 * S, 13, 22) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(GF.t('menu'), bx0 + bw / 2, by + bh / 2);
    labResumeRect = null; labMenuRect = { x: bx0, y: by, w: bw, h: bh };

// CULTURES tab — next-culture progress + equip slots + culture grid (locked = dim
// silhouette + "play Xm"; owned = vector icon + Lv + upgrade chip) + Evolve action.
function drawCulturePanel(ctx, topY, maxW) {
  var S = GF.S, ru = (GF.lang === 'ru'), x = GF.cx - maxW / 2, pad = 12 * S;
  cultureTileRects = []; cultureUpRects = []; equipSlotRects = []; labEvolveRect = null;
  var slotR = GF.clamp(22 * S, 18, 28);
  var tileH = GF.clamp(58 * S, 48, 72);
  var cols = 4, gap = 7 * S, tileW = (maxW - pad * 2 - gap * (cols - 1)) / cols;
  var gridRows = Math.ceil(CULTURE_DEFS.length / cols);
  var headH = 36 * S, slotsH = slotR * 2 + 22 * S, evoH = 40 * S;
  var panelH = pad + headH + slotsH + (tileH * gridRows + gap * (gridRows - 1)) + 10 * S + evoH + pad;
  GF.rr(ctx, x, topY, maxW, panelH, 14 * S); ctx.fillStyle = 'rgba(16,28,16,0.94)'; ctx.fill();
  ctx.strokeStyle = 'rgba(126,217,87,0.28)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  var cy = topY + pad;
  // next-culture progress (the visible pull)
  var nc = nextCulture();
  if (nc) {
    var prevMin = 0;
    for (var pi = 0; pi < CULTURE_DEFS.length; pi++) { if (CULTURE_DEFS[pi].id === nc.id) break; prevMin = CULTURE_DEFS[pi].min; }
    var frac = GF.clamp((totalPlayMin() - prevMin) / (nc.min - prevMin), 0, 1);
    var left = Math.max(0, Math.ceil(nc.min - totalPlayMin()));
    ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillStyle = '#cde8b0'; ctx.font = GF.clamp(10.5 * S, 9, 13.5) + 'px sans-serif';
    ctx.fillText(GF.t('nextCulture') + ' ' + left + ' ' + GF.t('mins') + '  ·  ' + cultureName(nc), x + pad, cy);
    var barW = maxW - pad * 2, barH = 6 * S, barY = cy + 15 * S;
    GF.rr(ctx, x + pad, barY, barW, barH, barH / 2); ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fill();
    GF.rr(ctx, x + pad, barY, Math.max(barH, barW * frac), barH, barH / 2); ctx.fillStyle = nc.col; ctx.fill();
  } else {
    ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillStyle = '#7ed957'; ctx.font = GF.clamp(10.5 * S, 9, 13.5) + 'px sans-serif';
    ctx.fillText(GF.t('allCultured'), x + pad, cy);
  }
  cy += headH;
  // equip slots row
  ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillStyle = '#8aa07a';
  ctx.font = GF.clamp(10 * S, 8.5, 13) + 'px sans-serif';
  ctx.fillText(GF.t('equipped').toUpperCase(), x + pad, cy);
  var slotsY = cy + 14 * S, slotGap = GF.clamp(14 * S, 8, 22), ns = slotCount();
  var totalSlotsW = ns * (slotR * 2) + (ns - 1) * slotGap;
  var slotStartX = GF.cx - totalSlotsW / 2;
  for (var s = 0; s < ns; s++) {
    var scx = slotStartX + slotR + s * (slotR * 2 + slotGap), scy = slotsY + slotR;
    var eid = meta ? meta.equipped[s] : null;
    ctx.beginPath(); ctx.arc(scx, scy, slotR, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
    ctx.strokeStyle = eid ? CULTURE_BY_ID[eid].col : 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2 * S;
    ctx.setLineDash(eid ? [] : [4 * S, 4 * S]); ctx.stroke(); ctx.setLineDash([]);
    if (eid) drawCultureIcon(ctx, CULTURE_BY_ID[eid], scx, scy, slotR * 0.6);
    equipSlotRects.push({ slot: s, x: scx - slotR, y: scy - slotR, w: slotR * 2, h: slotR * 2 });
  }
  cy = slotsY + slotR * 2 + 14 * S;
  // culture grid
  for (var i = 0; i < CULTURE_DEFS.length; i++) {
    var def = CULTURE_DEFS[i], col = i % cols, row = Math.floor(i / cols);
    var bx = x + pad + col * (tileW + gap), byy = cy + row * (tileH + gap);
    var owned = !!(meta && meta.cultures[def.id]);
    var equipped = !!(meta && meta.equipped.indexOf(def.id) >= 0);
    GF.rr(ctx, bx, byy, tileW, tileH, 9 * S);
    ctx.fillStyle = owned ? (equipped ? 'rgba(126,217,87,0.14)' : 'rgba(255,255,255,0.06)') : 'rgba(255,255,255,0.03)'; ctx.fill();
    ctx.strokeStyle = equipped ? '#7ed957' : (owned ? 'rgba(126,217,87,0.4)' : 'rgba(255,255,255,0.12)'); ctx.lineWidth = 1.5 * S; ctx.stroke();
    var icx = bx + tileW / 2, icy = byy + tileH * 0.32, ir = GF.clamp(13 * S, 10, 17);
    if (owned) {
      drawCultureIcon(ctx, def, icx, icy, ir);
      ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillStyle = '#cde8b0';
      ctx.font = 'bold ' + GF.clamp(8.5 * S, 7.5, 11) + 'px sans-serif';
      ctx.fillText(GF.t('lv') + ' ' + meta.cultures[def.id].lvl, icx, byy + tileH * 0.54);
      var cost = cultureUpCost(def.id), maxed = !isFinite(cost);
      var afford = !!(meta && !maxed && meta.biomass >= cost);
      var chW = tileW - 8 * S, chH = GF.clamp(15 * S, 12, 19), chX = bx + 4 * S, chY = byy + tileH - chH - 4 * S;
      GF.rr(ctx, chX, chY, chW, chH, 5 * S);
      ctx.fillStyle = maxed ? 'rgba(126,217,87,0.18)' : (afford ? 'rgba(126,217,87,0.2)' : 'rgba(255,255,255,0.05)'); ctx.fill();
      ctx.fillStyle = maxed ? '#7ed957' : (afford ? '#cde8b0' : '#6f7a5f'); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + GF.clamp(8.5 * S, 7, 11) + 'px sans-serif';
      ctx.fillText(maxed ? GF.t('upMax') : fmtBio(cost), chX + chW / 2, chY + chH / 2);
      cultureTileRects.push({ id: def.id, x: bx, y: byy, w: tileW, h: tileH - chH - 4 * S });
      cultureUpRects.push({ id: def.id, x: chX, y: chY, w: chW, h: chH, afford: afford });
    } else {
      ctx.globalAlpha = 0.4; drawCultureIcon(ctx, def, icx, icy, ir); ctx.globalAlpha = 1;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillStyle = '#7d8a6d';
      ctx.font = GF.clamp(8.5 * S, 7.5, 11) + 'px sans-serif';
      ctx.fillText(GF.t('playMins') + ' ' + def.min + GF.t('mins'), icx, byy + tileH * 0.56);
    }
  }
  cy += tileH * gridRows + gap * (gridRows - 1) + 10 * S;
  // Evolve (prestige) action
  var evo = canEvolve();
  GF.rr(ctx, x + pad, cy, maxW - pad * 2, evoH, 9 * S);
  ctx.fillStyle = evo ? 'rgba(199,125,255,0.2)' : 'rgba(255,255,255,0.04)'; ctx.fill();
  ctx.strokeStyle = evo ? '#c77dff' : 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = evo ? '#e3c8ff' : '#8a7d9a'; ctx.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px sans-serif';
  ctx.fillText(GF.t('evolve') + (meta && meta.evolutions ? '  (' + GF.t('evolved') + ' ' + meta.evolutions + ')' : ''), x + pad + 10 * S, cy + evoH * 0.36);
  ctx.fillStyle = evo ? '#c77dff' : '#7d7488'; ctx.font = GF.clamp(9 * S, 8, 12) + 'px sans-serif';
  ctx.fillText(evo ? GF.t('evolveBonus') : GF.t('evolveNeed'), x + pad + 10 * S, cy + evoH * 0.72);
  labEvolveRect = evo ? { x: x + pad, y: cy, w: maxW - pad * 2, h: evoH } : null;
  ctx.textBaseline = 'alphabetic';
  return topY + panelH;
}

// QUESTS tab — 3 daily quests, each a progress bar + CLAIM button + "resets in Nh".
function drawQuestPanel(ctx, topY, maxW) {
  var S = GF.S, ru = (GF.lang === 'ru'), x = GF.cx - maxW / 2, pad = 12 * S;
  questClaimRects = [];
  var rowH = GF.clamp(54 * S, 46, 66), rowGap = 8 * S;
  var quests = (meta && meta.quests) ? meta.quests : [];
  var headH = 26 * S;
  var panelH = pad + headH + (rowH * 3 + rowGap * 2) + pad;
  GF.rr(ctx, x, topY, maxW, panelH, 14 * S); ctx.fillStyle = 'rgba(16,28,16,0.94)'; ctx.fill();
  ctx.strokeStyle = 'rgba(126,217,87,0.28)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  var cy = topY + pad;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillStyle = '#7ed957';
  ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px sans-serif';

// ── utils ──
function roundRect(ctx, x, y, w, h, r) {
  if (w < 0) { x += w; w = -w; } r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}
function wrapText(ctx, text, x, y, maxW, lh) {
  var words = text.split(' '), line = '', yy = y;
  for (var n = 0; n < words.length; n++) {
    var test = line + words[n] + ' ';
    if (ctx.measureText(test).width > maxW && n > 0) { ctx.fillText(line, x, yy); line = words[n] + ' '; yy += lh; }
    else line = test;
  }
  ctx.fillText(line, x, yy);
  return (yy - y) + lh;
}
function inRect(x, y, r) { return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

// ════════════════════════════════════════════════════════════════════════
// REWARDED ADS (player-initiated, Yandex 1.15-safe). Prefers a true rewarded
// video where the platform exposes one; the reward is granted ONLY on the
// rewarded callback. There is ALWAYS a non-RV recovery: the base Biomass is
// already banked before the button is shown, and Gut Pass is also obtainable
// (the reward is never REQUIRED to progress). Watchdog resolves if no ad fills.
// ════════════════════════════════════════════════════════════════════════
var adBusy = false;
function showRewarded(onReward) {
  if (adBusy) return; adBusy = true;
  var rewarded = false, opened = false, done = false;
  var finish = function () { if (done) return; done = true; adBusy = false; if (rewarded && onReward) onReward(); };
  var watchdog = setTimeout(function () { if (!opened) finish(); }, 4500);
  try {
    // Yandex — true rewarded video
    if (typeof window.ysdk !== 'undefined' && window.ysdk && window.ysdk.adv && window.ysdk.adv.showRewardedVideo) {
      window.ysdk.adv.showRewardedVideo({ callbacks: {
        onOpen: function () { opened = true; },
        onRewarded: function () { rewarded = true; },
        onClose: function () { clearTimeout(watchdog); finish(); },
        onError: function () { clearTimeout(watchdog); finish(); },
      }});
      setTimeout(function () { clearTimeout(watchdog); finish(); }, 30000);
      return;
    }
    // CrazyGames — rewarded ad
    if (window.CrazyGames && window.CrazyGames.SDK && window.CrazyGames.SDK.ad) {
      opened = true;
      window.CrazyGames.SDK.ad.requestAd('rewarded', {
        adFinished: function () { rewarded = true; clearTimeout(watchdog); finish(); },
        adError:    function () { clearTimeout(watchdog); finish(); },
        adStarted:  function () {},
      });
      setTimeout(function () { clearTimeout(watchdog); finish(); }, 30000);
      return;
    }
    // GamePush — rewarded video
    if (GF.platform === 'gamepush' && window.gp && window.gp.ads && window.gp.ads.showRewardedVideo) {
      opened = true;
      window.gp.ads.showRewardedVideo()
        .then(function (ok) { rewarded = !!ok; clearTimeout(watchdog); finish(); })
        .catch(function () { clearTimeout(watchdog); finish(); });
      setTimeout(function () { clearTimeout(watchdog); finish(); }, 30000);
      return;
    }
    // Local / gallery / unknown — grant immediately so the feature is testable
    // (no ad network present means no monetization context to gate on).
    clearTimeout(watchdog); rewarded = true; finish();
  } catch (e) { clearTimeout(watchdog); finish(); }
}
// Gut Pass: IAP if GF exposes a purchase API, else a rewarded-unlock fallback.
function buyGutPass() {
  if (!meta || meta.gutPass) return;
  var grant = function () {
    if (!meta || meta.gutPass) return;
    meta.gutPass = true; ensureSlots(meta); saveMeta();
    GF.spawnFloat(GF.W / 2, GF.H * 0.5, '★ ' + GF.t('gutPass'), '#ffd24a');
    if (GF.happytime) GF.happytime();
  };
  // Yandex IAP (payments) if available — else rewarded-unlock fallback (always works).
  try {
    if (typeof window.ysdk !== 'undefined' && window.ysdk && window.ysdk.getPayments) {
      window.ysdk.getPayments({ signed: true }).then(function (p) {
        p.purchase({ id: 'gut_pass' }).then(function () { grant(); }).catch(function () { showRewarded(grant); });
      }).catch(function () { showRewarded(grant); });
      return;
    }
  } catch (e) {}
  showRewarded(grant);   // non-IAP platforms / local → rewarded-unlock fallback
}

// ── Custom button taps (mute / help / back + all Microbiome meta UI). Bound to
//    BOTH click and touchstart (mobile) with a dedupe guard so a tap doesn't
//    fire twice. gf-lib handles the GF.drawOverlay PLAY/RETRY button itself. ──
function openLab() { prevGs = (gs === 'LAB' ? prevGs : gs); gs = 'LAB'; }
function closeLab() { gs = (prevGs === 'PLAYING') ? 'PLAYING' : 'MENU'; }
function onTap(x, y) {
  var B = btnRects();
  // LAB overlay — handle its own controls, swallow everything else
  if (gs === 'LAB') {
    for (var ti = 0; ti < labTabRects.length; ti++) { if (inRect(x, y, labTabRects[ti])) { labTab = labTabRects[ti].tab; return; } }
    if (inRect(x, y, labResumeRect)) { closeLab(); return; }
    if (inRect(x, y, labMenuRect)) { gs = 'MENU'; prevGs = 'MENU'; return; }   // Yandex 1.15 back-to-menu
    if (labTab === 'cultures') {
      if (inRect(x, y, labEvolveRect)) { if (doEvolve() && GF.happytime) GF.happytime(); return; }
      for (var ci = 0; ci < cultureUpRects.length; ci++) { if (inRect(x, y, cultureUpRects[ci])) { if (cultureUpRects[ci].afford && buyCultureUpgrade(cultureUpRects[ci].id) && GF.happytime) GF.happytime(); return; } }
      for (var cj = 0; cj < cultureTileRects.length; cj++) { if (inRect(x, y, cultureTileRects[cj])) { toggleEquip(cultureTileRects[cj].id); return; } }
      for (var ck = 0; ck < equipSlotRects.length; ck++) { if (inRect(x, y, equipSlotRects[ck])) { unequipSlot(equipSlotRects[ck].slot); return; } }
      return;
    }
    if (labTab === 'quests') {
      for (var qi = 0; qi < questClaimRects.length; qi++) { if (inRect(x, y, questClaimRects[qi])) { if (questClaimRects[qi].can && claimQuest(questClaimRects[qi].i) && GF.happytime) GF.happytime(); return; } }
      return;
    }
    return;
  }
  // mute / help / help-back always available
  if (inRect(x, y, B.mute)) { toggleMute(); return; }
  if (gs === 'HELP') { if (inRect(x, y, helpBackRect)) gs = prevGs; return; }
  if (inRect(x, y, B.help)) { prevGs = (gs === 'HELP' ? prevGs : gs); gs = 'HELP'; return; }
  // PLAYING — pause pill opens the Lab (freezes the run; no losing required)
  if (gs === 'PLAYING') { if (inRect(x, y, pausePillRect)) { openLab(); return; } return; }
  // MENU — Lab / Deep Gut toggle / Gut Pass
  if (gs === 'MENU') {
    if (inRect(x, y, labBtnRect)) { openLab(); return; }
    if (inRect(x, y, deepToggleRect)) { deepGut = !deepGut; return; }
    if (inRect(x, y, gutPassBtnRect)) { buyGutPass(); return; }
    return;
  }
  // GAMEOVER — Watch:2x Biomass / Gut Pass (RETRY is handled by gf-lib)
  if (gs === 'GAMEOVER') {
    if (inRect(x, y, doubleBtnRect)) { showRewarded(grantDoubleBiomass); return; }
    if (inRect(x, y, gutPassBtnRect)) { buyGutPass(); return; }
    return;
  }
}

// ── Boot ──
GF.init({
  designW: 450,
  designH: 800,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'bolus',
  onReady: function () {
    try { best = parseInt(localStorage.getItem('bolus_best') || '0') || 0; } catch (e) {}
    try { muted = localStorage.getItem('bolus_muted') === '1'; } catch (e) {}
    audioInit();
    meta = loadMeta();   // owned cross-session progression (Biomass / cultures / daily / idle)
    claimOnOpen();       // M2: overnight ferment + daily login streak bonus
    GF.persist('bolus_run_v1',
      function () {
        // persist the underlying run even while the Lab is open (treat LAB as PLAYING)
        var saveGs = (gs === 'LAB') ? (prevGs === 'PLAYING' ? 'PLAYING' : 'MENU') : gs;
        return { gs: saveGs, depthD: depthD, cycleStartD: cycleStartD, cycle: cycle, mass: mass, score: score, px: player.x,
                 nutrientsEaten: nutrientsEaten, tractClears: tractClears, shields: shields, deepGut: deepGut };
      },
      function (s) {
        if (!s) return;
        gs = (s.gs === 'PLAYING' || s.gs === 'GAMEOVER') ? s.gs : 'MENU';
        depthD = s.depthD || 0; cycleStartD = s.cycleStartD || 0; cycle = s.cycle || 0;
        mass = (typeof s.mass === 'number') ? s.mass : 100; score = s.score || 0;
        player.x = s.px || GF.W / 2; targetX = player.x;
        nutrientsEaten = s.nutrientsEaten || 0; tractClears = s.tractClears || 0;
        shields = s.shields || 0; deepGut = !!s.deepGut;
        biomeIdx = GF.clamp(Math.floor((depthD - cycleStartD) / BIOME_LEN), 0, BIOMES.length - 1);
        // a resumed mid-run keeps its equipped-culture boosts active
        if (gs === 'PLAYING') {
          runScoreMul = 1 + cultureVal('score'); runArmor = Math.min(0.7, cultureVal('armor'));
          runFeed = cultureVal('feed'); runMagnet = cultureVal('magnet');
        } else if (gs === 'GAMEOVER') {
          // resumed onto a finished run — the Biomass was already banked last session;
          // recompute the DISPLAY value only (don't re-grant). doubleUsed=true hides the
          // 2x button so it can't double-grant a run that already ended.
          var b = Math.floor(nutrientsEaten * 2 + tractClears * 20 + cycle * 5 + score * 0.02);
          b = Math.floor(b * (1 + cultureVal('bank'))); b = Math.floor(b * biomassMult());
          lastBiomass = b; lastBiomassBase = b; doubleUsed = true;
        }
      }
    );
    GF.exposeState(function () {
      return {
        gs: gs, score: Math.floor(score), mass: mass, cycle: cycle, depth: Math.floor(depthD),
        // Microbiome meta (post-build-tester visibility)
        biomass: meta ? meta.biomass : 0, biomassBanked: Math.round(lastBiomass),
        nutrientsEaten: nutrientsEaten, tractClears: tractClears, shields: shields,
        deepGut: deepGut, evolutions: meta ? meta.evolutions : 0, gutPass: meta ? meta.gutPass : false,
        streak: meta ? meta.streak : 0, equipped: meta ? meta.equipped.slice() : [],
        ownedCultures: ownedCultureCount(), totalPlayMin: Math.floor(totalPlayMin()),
        claimableQuests: claimableQuests(), bloom: bloomActive(),
      };
    });
    // Bind custom taps to BOTH click (desktop) and touchstart (mobile). A dedupe
    // window stops the synthesized click that follows a touch from double-firing.
    var lastTapT = 0;
    function dispatchTap(x, y) { var n = Date.now(); if (n - lastTapT < 350) return; lastTapT = n; onTap(x, y); }
    GF.canvas.addEventListener('click', function (e) { dispatchTap(e.clientX, e.clientY); });
    GF.canvas.addEventListener('touchstart', function (e) {
      if (e.changedTouches && e.changedTouches.length) { var t0 = e.changedTouches[0]; dispatchTap(t0.clientX, t0.clientY); }
    }, { passive: true });
    // surface overnight ferment + daily streak as a brief boot banner
    if (idleClaim > 0 || dailyClaim > 0) bootBannerT = 4.0;
  },
  onUpdate: update,
  onDraw: draw,
});

// ── Screenshot hooks (take_screenshots.js) — land on a busy mid-tract frame ──
window._setupForScreenshot = function (n) {
  // give the meta some content so MENU / GAMEOVER frames show a populated Lab
  if (meta) {
    meta.biomass = Math.max(meta.biomass, 640);
    meta.totalPlaySec = Math.max(meta.totalPlaySec, 28 * 60);   // ~3 cultures unlocked
    meta.deepUnlocked = true;
    checkCultureUnlocks();
  }
  startGame();
  depthD = cycleStartD + BIOME_LEN * 2.4;     // mid-stomach
  biomeIdx = 2; cycle = 1; nutrientsEaten = 22; tractClears = 1;
  ents.length = 0;
  var py = playerY();
  spawnEnt('hazard', 0.28, GF.H * 0.18 - py); spawnEnt('nutrient', 0.66, GF.H * 0.05 - py);
  spawnEnt('hazard', 0.72, GF.H * 0.42 - py); spawnEnt('nutrient', 0.30, GF.H * 0.62 - py);
  spawnEnt('hazard', 0.50, GF.H * 0.86 - py);
  player.x = laneL() + laneW() * 0.42; targetX = player.x;
  score = 480 + (n || 0) * 60;
};
window._jumpLevel = function (n) {
  if (n && n >= 99) { window._setupForScreenshot(0); score = 360; mass = 1; gameOver(); return; }   // terminal for the test harness
  window._setupForScreenshot(n || 1);
};
// Test seams (same family as _setupForScreenshot/_jumpLevel) — no console output.
window._bolusSetPlay = function (mins) { if (meta) { meta.totalPlaySec = Math.max(0, (+mins || 0) * 60); runPlaySec = 0; checkCultureUnlocks(); saveMeta(); } };
window._bolusGrant = function (b) { if (meta) { meta.biomass += (+b || 0); saveMeta(); } };
window._bolusOpenLab = function (tab) { labTab = (tab === 'quests') ? 'quests' : 'cultures'; openLab(); };
window._bolusInfo = function () {
  return {
    gs: gs, biomass: meta ? meta.biomass : 0, totalPlayMin: Math.floor(totalPlayMin()),
    ownedCultures: ownedCultureCount(), equipped: meta ? meta.equipped.slice() : [],
    cultures: meta ? meta.cultures : {}, nextCulture: (function () { var c = nextCulture(); return c ? { id: c.id, min: c.min } : null; }()),
    shields: shields, deepGut: deepGut, evolutions: meta ? meta.evolutions : 0, gutPass: meta ? meta.gutPass : false,
    quests: (meta && meta.quests) ? meta.quests.map(function (q) { return { kind: q.kind, goal: q.goal, prog: q.prog, done: q.done, claimed: q.claimed, reward: q.reward }; }) : [],
    claimableQuests: claimableQuests(), streak: meta ? meta.streak : 0, bloom: bloomActive(),
    labTab: labTab, tabRects: labTabRects, cultureTiles: cultureTileRects, cultureUps: cultureUpRects,
    equipSlots: equipSlotRects, questClaims: questClaimRects, pausePill: pausePillRect,
    labBtn: labBtnRect, deepToggle: deepToggleRect, doubleBtn: doubleBtnRect, gutPassBtn: gutPassBtnRect,
    labResume: labResumeRect, labMenu: labMenuRect, evolveBtn: labEvolveRect,
  };
};

})();
</script>
