<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Forge Heir</title>
  <script src="/sdk.js"></script>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0f08; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── LOCALISED STRINGS ────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Forge Heir',
    sub:   'Un-forge the cursed sword stroke by stroke.',
    play: 'PLAY', retry: 'RETRY',
    score: 'ROUND', best: 'BEST',
    gameover: 'SHATTERED', won: 'BLADE CLEANSED',
    stamina: 'STAMINA', curses: 'CURSES', round: 'ROUND',
    light: 'LIGHT', medium: 'MEDIUM', heavy: 'HEAVY',
    mode: 'HAMMER',
    'tut_goal': 'Goal: Strip every glowing rune-curse off the 8 sword segments.',
    'tut_controls': 'Controls: Tap a segment to hammer it. Press 1 / 2 / 3 (or buttons) for Light / Medium / Heavy.',
    'tut_win': 'Win: All curses cleared with at least one segment alive.',
    'tut_lose': 'Lose: A segment cracks past fragility 5 (shatters) OR stamina hits 0 with curses left.',
    'tut_tip': 'Tip: Heavy clears 2 curses but adds fragility — Light is safe but pricey.',
    staminaOut: 'Out of stamina!',
    shattered: 'Segment shattered!',
    cleansed: 'Curse removed!',
  },
  ru: {
    title: 'Наследник Кузнеца',
    sub:   'Расковать проклятый меч удар за ударом.',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ',
    score: 'РАУНД', best: 'РЕКОРД',
    gameover: 'РАСКОЛОТ', won: 'КЛИНОК ОЧИЩЕН',
    stamina: 'СИЛЫ', curses: 'ПРОКЛЯТИЯ', round: 'РАУНД',
    light: 'ЛЁГКИЙ', medium: 'СРЕДНИЙ', heavy: 'ТЯЖЁЛЫЙ',
    mode: 'МОЛОТ',
    'tut_goal': 'Цель: Снять все светящиеся руны-проклятия с 8 сегментов меча.',
    'tut_controls': 'Управление: Тап по сегменту — удар. 1 / 2 / 3 (или кнопки) — Лёгкий / Средний / Тяжёлый.',
    'tut_win': 'Победа: Все проклятия сняты, хотя бы один сегмент уцелел.',
    'tut_lose': 'Проигрыш: Хрупкость > 5 (раскол) ИЛИ силы = 0 с проклятиями.',
    'tut_tip': 'Совет: Тяжёлый снимает 2 проклятия, но добавляет хрупкость.',
    staminaOut: 'Силы кончились!',
    shattered: 'Сегмент раскололся!',
    cleansed: 'Проклятие снято!',
  },
};

// AI sprites (loaded on boot; falls back to procedural drawing if missing).
var SPRITE_NAMES = ['anvil', 'hammer_light', 'hammer_medium', 'hammer_heavy', 'segment'];

// ── TUNABLES ─────────────────────────────────────────────────────────────
var NUM_SEGMENTS    = 8;
var STAMINA_MAX     = 20;
var LIGHT_COST      = 1;
var MED_COST        = 2;
var HEAVY_COST      = 4;
var LIGHT_REMOVE    = 1;
var MED_REMOVE      = 1;
var HEAVY_REMOVE    = 2;
var HEAVY_FRAG_ADD  = 1;
var MED_FRAG_RISK   = 0.30;
var BASE_CURSE_COUNT = 2;
var START_FRAG_MIN  = 1;
var START_FRAG_MAX  = 3;

// Curse rune colours
var RUNE_COLORS = ['#e85d75', '#7c5dff', '#5dbef5', '#f5c45d', '#5df58c', '#f08fd6'];

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | PLAYING | GAMEOVER | WON | TUTORIAL_OVERLAY
var prevGs = 'MENU';        // remembered when ? button reopens tutorial overlay
var round = 1, best = 1;
var stamina = STAMINA_MAX;
var segments = [];          // [{ idx, curses:[{color}], fragility, inspected, x, y, w, h, hitFlash }]
var hammerMode = 'medium';  // 'light' | 'medium' | 'heavy'
var lastMessage = '';
var lastMessageT = 0;
var screenshotMode = false;

// Layout helpers (recomputed on draw)
var anvilRect = null;
var swordRect = null;
var modeButtons = [];
var helpButton = null;

// ── HELPERS ──────────────────────────────────────────────────────────────
function rndInt(lo, hi) { return Math.floor(lo + Math.random() * (hi - lo + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function curseCountForRound(r) {
  return Math.min(4, BASE_CURSE_COUNT + Math.floor((r - 1) / 2));
}

function buildSword() {
  segments = [];
  var maxC = curseCountForRound(round);
  var bonusFragIdx = round > 1 ? rndInt(0, NUM_SEGMENTS - 1) : -1;
  for (var i = 0; i < NUM_SEGMENTS; i++) {
    var n = rndInt(1, maxC);
    var curses = [];
    for (var j = 0; j < n; j++) curses.push({ color: pick(RUNE_COLORS) });
    var frag = rndInt(START_FRAG_MIN, START_FRAG_MAX);
    if (i === bonusFragIdx) frag = Math.min(4, frag + 1);
    segments.push({
      idx: i,
      curses: curses,
      fragility: frag,
      inspected: false,
      x: 0, y: 0, w: 0, h: 0,
      hitFlash: 0,
      shatterT: 0,
    });
  }
}

function totalCurses() {
  var t = 0;
  for (var i = 0; i < segments.length; i++) t += segments[i].curses.length;
  return t;
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  if (gs === 'WON') {
    round += 1;
    if (round > best) {
      best = round;
      try { localStorage.setItem('forge_heir_best', best); } catch (e) {}
    }
  } else if (gs === 'GAMEOVER') {
    round = 1;
  } else {
    round = 1;
  }
  stamina = STAMINA_MAX;
  hammerMode = 'medium';
  buildSword();
  lastMessage = '';
  lastMessageT = 0;
  gs = 'PLAYING';
  GF.gameStarted && GF.gameStarted();
}

function gameOver() {
  if (gs === 'PLAYING') {
    gs = 'GAMEOVER';
    GF.setShake(0.6);
    GF.gameEnded && GF.gameEnded();
  }
}

function winRound() {
  if (round > best) {
    best = round;
    try { localStorage.setItem('forge_heir_best', best); } catch (e) {}
  }
  gs = 'WON';
  GF.gameEnded && GF.gameEnded();
}

// Screenshot helper — fast-forward into a busy game state.
// Called by post-build-tester gate: small n => populated PLAYING state,
// very large n (>=10) => force terminal state for gate's reachability check.
window._jumpLevel = function(n) {
  if (n >= 10) {
    // Force game over for the runtime gate
    round = 1;
    stamina = STAMINA_MAX;
    hammerMode = 'medium';
    buildSword();
    if (segments.length > 0) {
      segments[0].fragility = 5;
      segments[0].shatterT = 1.0;
    }
    gs = 'GAMEOVER';
    return;
  }
  window._setupForScreenshot(n || 2);
};

window._setupForScreenshot = function(level) {
  screenshotMode = true;
  round = (level || 2);
  startGame();
  // Inspect most segments and bump fragility on a few so the run looks alive
  for (var i = 0; i < segments.length; i++) {
    segments[i].inspected = true;
    if (i % 3 === 0) segments[i].fragility = Math.min(4, segments[i].fragility + 1);
    if (i === 1 && segments[i].curses.length > 0) {
      // simulate a recent hit flash on segment 1
      segments[i].hitFlash = 0.8;
    }
  }
  stamina = 13;
  hammerMode = 'heavy';
  // Spawn some sparks for visual life
  if (segments[1]) {
    var ax = segments[1].x + segments[1].w / 2;
    var ay = segments[1].y + segments[1].h / 2;
    GF.spawnParticles(ax, ay, '#ffae3e', 18);
    GF.spawnFloat(ax, ay - 20, '-1', '#ffe27a');
  }
};

// ── INPUT ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (gs !== 'PLAYING') return;
  if (e.code === 'Digit1' || e.code === 'Numpad1') hammerMode = 'light';
  else if (e.code === 'Digit2' || e.code === 'Numpad2') hammerMode = 'medium';
  else if (e.code === 'Digit3' || e.code === 'Numpad3') hammerMode = 'heavy';
});

GF.canvas.addEventListener('click', function(e) {
  if (gs === 'PLAYING') {
    handleClick(e.clientX, e.clientY);
  } else if (gs === 'TUTORIAL_OVERLAY') {
    gs = prevGs;
  }
});
GF.canvas.addEventListener('touchstart', function(e) {
  if (!e.changedTouches || !e.changedTouches[0]) return;
  var t0 = e.changedTouches[0];
  if (gs === 'PLAYING') {
    handleClick(t0.clientX, t0.clientY);
  } else if (gs === 'TUTORIAL_OVERLAY') {
    gs = prevGs;
  }
}, { passive: true });

function handleClick(x, y) {
  // Help button
  if (helpButton && pointIn(x, y, helpButton)) {
    prevGs = gs;
    gs = 'TUTORIAL_OVERLAY';
    return;
  }
  // Mode buttons
  for (var i = 0; i < modeButtons.length; i++) {
    var b = modeButtons[i];
    if (pointIn(x, y, b)) { hammerMode = b.mode; return; }
  }
  // Segment hit
  for (var s = 0; s < segments.length; s++) {
    var seg = segments[s];
    if (seg.fragility >= 5) continue;
    if (pointIn(x, y, seg)) { strikeSegment(seg); return; }
  }
}

function pointIn(x, y, r) {
  return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}

function strikeSegment(seg) {
  var cost = (hammerMode === 'light') ? LIGHT_COST : (hammerMode === 'medium') ? MED_COST : HEAVY_COST;
  if (stamina < cost) {
    lastMessage = GF.t('staminaOut');
    lastMessageT = 1.0;
    return;
  }
  stamina -= cost;
  seg.hitFlash = 1.0;
  GF.setShake(hammerMode === 'heavy' ? 0.45 : hammerMode === 'medium' ? 0.25 : 0.12);

  // First strike inspects the segment (reveals curses)
  if (!seg.inspected) {
    seg.inspected = true;
  }

  // Apply curse removal
  var remove = (hammerMode === 'light') ? LIGHT_REMOVE : (hammerMode === 'medium') ? MED_REMOVE : HEAVY_REMOVE;
  var actuallyRemoved = 0;
  for (var i = 0; i < remove; i++) {
    if (seg.curses.length > 0) {
      seg.curses.pop();
      actuallyRemoved++;
    }
  }

  // Apply fragility
  if (hammerMode === 'heavy') {
    seg.fragility += HEAVY_FRAG_ADD;
  } else if (hammerMode === 'medium') {
    if (Math.random() < MED_FRAG_RISK) seg.fragility += 1;
  }

  // FX
  var cx = seg.x + seg.w / 2, cy = seg.y + seg.h / 2;
  if (actuallyRemoved > 0) {
    GF.spawnParticles(cx, cy, '#ffe27a', 16);
    GF.spawnFloat(cx, cy - 18, '-' + actuallyRemoved, '#ffe27a');
  } else {
    GF.spawnParticles(cx, cy, '#ff8a3e', 8);
  }

  // Check shatter
  if (seg.fragility >= 5) {
    seg.shatterT = 1.0;
    GF.spawnParticles(cx, cy, '#c44', 32);
    lastMessage = GF.t('shattered');
    lastMessageT = 1.6;
    GF.setShake(0.8);
    setTimeout(gameOver, 350);
    return;
  }

  // Check win
  if (totalCurses() === 0) {
    setTimeout(winRound, 250);
    return;
  }
  // Check stamina-out lose
  if (stamina <= 0 && totalCurses() > 0) {
    setTimeout(gameOver, 200);
    return;
  }
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (lastMessageT > 0) lastMessageT -= dt;
  for (var i = 0; i < segments.length; i++) {
    if (segments[i].hitFlash > 0) segments[i].hitFlash -= dt * 2.6;
    if (segments[i].hitFlash < 0) segments[i].hitFlash = 0;
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  // Forge background gradient
  var grad = ctx.createRadialGradient(GF.cx, GF.H * 0.85, 40, GF.cx, GF.H * 0.85, Math.max(GF.W, GF.H));
  grad.addColorStop(0, '#5a1a08');
  grad.addColorStop(0.4, '#2a120a');
  grad.addColorStop(1, '#0d0703');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GF.W, GF.H);

  // Subtle ember particles in background — purely visual, drawn cheap
  drawEmbers(ctx);

  if (gs === 'PLAYING' || gs === 'GAMEOVER' || gs === 'WON' || gs === 'TUTORIAL_OVERLAY') {
    drawAnvilAndSword(ctx);
    drawHammerAndStaminaHUD(ctx);
    drawModeButtons(ctx);
    drawHelpButton(ctx);
    drawTopHUD(ctx);
    drawMessage(ctx);
  }

  if (gs === 'MENU') drawMenuOverlay();
  if (gs === 'GAMEOVER') drawEndOverlay(GF.t('gameover'), GF.t('round') + ': ' + round, GF.t('retry'), startGame);
  if (gs === 'WON') drawEndOverlay(GF.t('won'), GF.t('round') + ' ' + round + ' ✓', GF.t('retry'), startGame);
  if (gs === 'TUTORIAL_OVERLAY') drawTutorialOverlay();
}

var emberSeeds = null;
function drawEmbers(ctx) {
  if (!emberSeeds) {
    emberSeeds = [];
    for (var i = 0; i < 28; i++) {
      emberSeeds.push({
        x: Math.random() * GF.W,
        y: Math.random() * GF.H,
        s: 0.5 + Math.random() * 1.8,
        v: 0.3 + Math.random() * 0.6,
        h: Math.random()
      });
    }
  }
  var t = performance.now() * 0.001;
  for (var i = 0; i < emberSeeds.length; i++) {
    var e = emberSeeds[i];
    var y = ((e.y - t * e.v * 30) % GF.H + GF.H) % GF.H;
    var alpha = 0.25 + 0.4 * (Math.sin(t * 2 + e.h * 10) * 0.5 + 0.5);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ff8b3e';
    ctx.beginPath();
    ctx.arc(e.x, y, e.s * GF.S, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawTopHUD(ctx) {
  var fs = GF.clamp(15 * GF.S, 11, 20);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffd9a8';
  ctx.fillText(GF.t('round') + ': ' + round, 14 * GF.S, 14 * GF.S);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffd9a8';
  ctx.fillText(GF.t('best') + ': ' + best, GF.W - 60 * GF.S, 14 * GF.S);

  // Curses remaining centre-top
  var cTotal = totalCurses();
  ctx.textAlign = 'center';
  ctx.fillStyle = (cTotal === 0) ? '#5df58c' : '#ff8e8e';
  ctx.fillText(GF.t('curses') + ': ' + cTotal, GF.cx, 14 * GF.S);
}

function drawAnvilAndSword(ctx) {
  // Layout the anvil on the lower-right, sword diagonal across most of the canvas
  var pad = 24 * GF.S;
  var anvilW = GF.clamp(220 * GF.S, 140, 300);
  var anvilH = GF.clamp(110 * GF.S, 70, 150);
  var anvilX = GF.W - anvilW - pad;
  var anvilY = GF.H - anvilH - pad - 90 * GF.S;
  anvilRect = { x: anvilX, y: anvilY, w: anvilW, h: anvilH };

  // Anvil base
  ctx.fillStyle = '#1c1410';
  ctx.fillRect(anvilX - 10 * GF.S, anvilY + anvilH, anvilW + 20 * GF.S, 12 * GF.S);
  // Anvil body
  GF.drawSprite('anvil', anvilX + anvilW / 2, anvilY + anvilH / 2, Math.max(anvilW, anvilH), function(c, x, y, s) {
    var aw = anvilW, ah = anvilH;
    var ax = anvilX, ay = anvilY;
    // Trapezoidal anvil
    c.fillStyle = '#3a2920';
    c.beginPath();
    c.moveTo(ax + aw * 0.15, ay + ah);
    c.lineTo(ax + aw * 0.85, ay + ah);
    c.lineTo(ax + aw * 0.95, ay + ah * 0.55);
    c.lineTo(ax + aw * 0.05, ay + ah * 0.55);
    c.closePath();
    c.fill();
    // Top plate
    c.fillStyle = '#54403a';
    c.fillRect(ax, ay + ah * 0.35, aw, ah * 0.22);
    // Horn
    c.beginPath();
    c.moveTo(ax + aw, ay + ah * 0.4);
    c.lineTo(ax + aw + aw * 0.18, ay + ah * 0.46);
    c.lineTo(ax + aw, ay + ah * 0.55);
    c.closePath();
    c.fillStyle = '#3a2920';
    c.fill();
    // Highlight
    c.fillStyle = 'rgba(255,180,120,0.25)';
    c.fillRect(ax, ay + ah * 0.35, aw, ah * 0.05);
  });

  // Sword: diagonal blade with 8 segments. Position: pommel at bottom-left, tip up-right above the anvil.
  var swX1 = pad + 30 * GF.S;
  var swY1 = GF.H - pad - 110 * GF.S;
  var swX2 = anvilX + anvilW * 0.5;
  var swY2 = anvilY + anvilH * 0.05;
  var dx = swX2 - swX1, dy = swY2 - swY1;
  var len = Math.sqrt(dx * dx + dy * dy);
  var ux = dx / len, uy = dy / len;
  var nx = -uy, ny = ux; // perpendicular

  // Pommel
  var pommelR = 14 * GF.S;
  ctx.fillStyle = '#3a2a1f';
  ctx.beginPath(); ctx.arc(swX1, swY1, pommelR, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#88663a'; ctx.lineWidth = 2 * GF.S; ctx.stroke();

  // Grip
  var gripStart = 18 * GF.S, gripEnd = 56 * GF.S;
  ctx.lineWidth = 12 * GF.S;
  ctx.strokeStyle = '#5a3a22';
  ctx.beginPath();
  ctx.moveTo(swX1 + ux * gripStart, swY1 + uy * gripStart);
  ctx.lineTo(swX1 + ux * gripEnd,   swY1 + uy * gripEnd);
  ctx.stroke();

  // Crossguard
  var guardCx = swX1 + ux * (gripEnd + 6 * GF.S);
  var guardCy = swY1 + uy * (gripEnd + 6 * GF.S);
  var guardLen = 36 * GF.S;
  ctx.lineWidth = 8 * GF.S;
  ctx.strokeStyle = '#9a7340';
  ctx.beginPath();
  ctx.moveTo(guardCx - nx * guardLen, guardCy - ny * guardLen);
  ctx.lineTo(guardCx + nx * guardLen, guardCy + ny * guardLen);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // Blade segments
  var bladeStart = gripEnd + 18 * GF.S;
  var bladeEnd = len - 14 * GF.S;
  var bladeLen = bladeEnd - bladeStart;
  var segLen = bladeLen / NUM_SEGMENTS;
  var halfW = 22 * GF.S;
  swordRect = { x1: swX1, y1: swY1, x2: swX2, y2: swY2 };

  for (var i = 0; i < NUM_SEGMENTS; i++) {
    var seg = segments[i];
    if (!seg) continue;
    var t0 = bladeStart + i * segLen;
    var t1 = bladeStart + (i + 1) * segLen;
    // Taper toward tip
    var taperA = 1 - (i / NUM_SEGMENTS) * 0.45;
    var taperB = 1 - ((i + 1) / NUM_SEGMENTS) * 0.45;
    var aHalf = halfW * taperA;
    var bHalf = halfW * taperB;
    // Corners
    var ax0 = swX1 + ux * t0 - nx * aHalf;
    var ay0 = swY1 + uy * t0 - ny * aHalf;
    var ax1 = swX1 + ux * t0 + nx * aHalf;
    var ay1 = swY1 + uy * t0 + ny * aHalf;
    var bx0 = swX1 + ux * t1 + nx * bHalf;
    var by0 = swY1 + uy * t1 + ny * bHalf;
    var bx1 = swX1 + ux * t1 - nx * bHalf;
    var by1 = swY1 + uy * t1 - ny * bHalf;

    // Bounding rect for click hit-test (axis-aligned)
    var minX = Math.min(ax0, ax1, bx0, bx1);
    var maxX = Math.max(ax0, ax1, bx0, bx1);
    var minY = Math.min(ay0, ay1, by0, by1);
    var maxY = Math.max(ay0, ay1, by0, by1);
    seg.x = minX; seg.y = minY; seg.w = maxX - minX; seg.h = maxY - minY;

    // Fill (if shattered, draw cracked/missing)
    var shattered = seg.fragility >= 5;
    var fragRatio = Math.min(1, (seg.fragility - 1) / 4);

    if (shattered) {
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#3a2a22';
    } else {
      ctx.globalAlpha = 1;
      // Base steel colour darkens with fragility
      var bRed = Math.floor(180 - fragRatio * 80);
      var bGrn = Math.floor(190 - fragRatio * 90);
      var bBlu = Math.floor(210 - fragRatio * 110);
      ctx.fillStyle = 'rgb(' + bRed + ',' + bGrn + ',' + bBlu + ')';
    }
    ctx.beginPath();
    ctx.moveTo(ax0, ay0); ctx.lineTo(ax1, ay1); ctx.lineTo(bx0, by0); ctx.lineTo(bx1, by1); ctx.closePath();
    ctx.fill();

    // Edge highlight
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.4 * GF.S;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Hit flash
    if (seg.hitFlash > 0) {
      ctx.globalAlpha = seg.hitFlash * 0.6;
      ctx.fillStyle = '#fff5c0';
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Cracks for fragility 3+
    if (!shattered && seg.fragility >= 3) {
      ctx.globalAlpha = 0.55;
      ctx.strokeStyle = '#1a0a08';
      ctx.lineWidth = 1.2 * GF.S;
      var cxMid = (ax0 + bx0) / 2, cyMid = (ay0 + by0) / 2;
      var cxA = (ax0 + ax1) / 2, cyA = (ay0 + ay1) / 2;
      var cxB = (bx0 + bx1) / 2, cyB = (by0 + by1) / 2;
      ctx.beginPath();
      ctx.moveTo(cxA, cyA);
      ctx.lineTo(cxMid, cyMid);
      ctx.lineTo(cxB, cyB);
      ctx.stroke();
      if (seg.fragility >= 4) {
        ctx.beginPath();
        ctx.moveTo(ax0 + (ax1 - ax0) * 0.3, ay0 + (ay1 - ay0) * 0.3);
        ctx.lineTo(bx1 + (bx0 - bx1) * 0.7, by1 + (by0 - by1) * 0.7);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    // Curse runes (only if inspected)
    if (seg.inspected && !shattered) {
      var rcx = (ax0 + ax1 + bx0 + bx1) / 4;
      var rcy = (ay0 + ay1 + by0 + by1) / 4;
      drawRunes(ctx, seg, rcx, rcy);
    }

    // "?" mark if uninspected
    if (!seg.inspected && !shattered) {
      ctx.font = 'bold ' + (16 * GF.S) + 'px sans-serif';
      ctx.fillStyle = '#1a0a08';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      var qcx = (ax0 + ax1 + bx0 + bx1) / 4;
      var qcy = (ay0 + ay1 + by0 + by1) / 4;
      ctx.fillText('?', qcx, qcy);
    }
  }

  // Tip triangle
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#a0bccd';
  ctx.beginPath();
  var tipBaseT = bladeEnd;
  var tipHalf = halfW * (1 - 0.45);
  var tx0 = swX1 + ux * tipBaseT - nx * tipHalf;
  var ty0 = swY1 + uy * tipBaseT - ny * tipHalf;
  var tx1 = swX1 + ux * tipBaseT + nx * tipHalf;
  var ty1 = swY1 + uy * tipBaseT + ny * tipHalf;
  var tipX = swX1 + ux * len;
  var tipY = swY1 + uy * len;
  ctx.moveTo(tx0, ty0); ctx.lineTo(tipX, tipY); ctx.lineTo(tx1, ty1); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.globalAlpha = 0.4; ctx.lineWidth = 1.4 * GF.S; ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawRunes(ctx, seg, cx, cy) {
  var n = seg.curses.length;
  if (n === 0) return;
  var radius = 12 * GF.S;
  var spacing = 14 * GF.S;
  var startOff = -((n - 1) * spacing) / 2;
  for (var i = 0; i < n; i++) {
    var rx = cx + Math.cos(0) * (startOff + i * spacing);
    var ry = cy + Math.sin(0) * (startOff + i * spacing);
    var col = seg.curses[i].color;
    // Glow
    ctx.shadowColor = col; ctx.shadowBlur = 10 * GF.S;
    ctx.fillStyle = col;
    ctx.beginPath();
    drawRunePath(ctx, rx, ry, radius * 0.55, i + seg.idx);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawRunePath(ctx, x, y, r, seed) {
  // Draw a small angular rune (varies by seed)
  ctx.save();
  ctx.translate(x, y);
  var k = seed % 4;
  if (k === 0) {
    // diamond with cross
    ctx.beginPath();
    ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0); ctx.closePath();
  } else if (k === 1) {
    // triangle
    ctx.beginPath();
    ctx.moveTo(0, -r); ctx.lineTo(r * 0.9, r * 0.7); ctx.lineTo(-r * 0.9, r * 0.7); ctx.closePath();
  } else if (k === 2) {
    // hexagon
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var a = i / 6 * Math.PI * 2;
      var px = Math.cos(a) * r, py = Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
  } else {
    // star
    ctx.beginPath();
    for (var j = 0; j < 10; j++) {
      var aa = j / 10 * Math.PI * 2 - Math.PI / 2;
      var rr2 = (j % 2 === 0) ? r : r * 0.5;
      var pxx = Math.cos(aa) * rr2, pyy = Math.sin(aa) * rr2;
      if (j === 0) ctx.moveTo(pxx, pyy); else ctx.lineTo(pxx, pyy);
    }
    ctx.closePath();
  }
  ctx.restore();
}

function drawHammerAndStaminaHUD(ctx) {
  // Stamina bar — top-left under HUD
  var barX = 14 * GF.S;
  var barY = 40 * GF.S;
  var barW = GF.clamp(220 * GF.S, 140, 300);
  var barH = 16 * GF.S;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  GF.rr(ctx, barX, barY, barW, barH, barH / 2); ctx.fill();
  var pct = Math.max(0, stamina) / STAMINA_MAX;
  var grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
  grad.addColorStop(0, '#5df58c');
  grad.addColorStop(0.5, '#f5c45d');
  grad.addColorStop(1, '#e85d75');
  ctx.fillStyle = grad;
  GF.rr(ctx, barX, barY, barW * pct, barH, barH / 2); ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1 * GF.S; ctx.stroke();
  // Label
  ctx.font = 'bold ' + (12 * GF.S) + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('stamina') + '  ' + Math.max(0, stamina) + '/' + STAMINA_MAX, barX + 8 * GF.S, barY + barH / 2);
}

function drawModeButtons(ctx) {
  modeButtons = [];
  var modes = [
    { mode: 'light',  label: '1 ' + GF.t('light'),  cost: LIGHT_COST,  col: '#5dbef5' },
    { mode: 'medium', label: '2 ' + GF.t('medium'), cost: MED_COST,    col: '#f5c45d' },
    { mode: 'heavy',  label: '3 ' + GF.t('heavy'),  cost: HEAVY_COST,  col: '#e85d75' },
  ];
  var bw = GF.clamp(110 * GF.S, 80, 160);
  var bh = GF.clamp(54 * GF.S, 38, 70);
  var gap = 8 * GF.S;
  var totalW = bw * 3 + gap * 2;
  var startX = (GF.W - totalW) / 2;
  var y = GF.H - bh - 12 * GF.S;

  ctx.font = 'bold ' + GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (var i = 0; i < modes.length; i++) {
    var m = modes[i];
    var x = startX + i * (bw + gap);
    var active = (hammerMode === m.mode);
    var b = { x: x, y: y, w: bw, h: bh, mode: m.mode };
    modeButtons.push(b);
    ctx.fillStyle = active ? m.col : 'rgba(40,28,22,0.85)';
    GF.rr(ctx, x, y, bw, bh, 10 * GF.S); ctx.fill();
    ctx.strokeStyle = active ? '#fff' : m.col;
    ctx.lineWidth = (active ? 2.5 : 1.5) * GF.S;
    GF.rr(ctx, x, y, bw, bh, 10 * GF.S); ctx.stroke();
    ctx.fillStyle = active ? '#1a0a08' : m.col;
    ctx.fillText(m.label, x + bw / 2, y + bh / 2 - 8 * GF.S);
    ctx.fillStyle = active ? '#1a0a08' : '#ddd';
    ctx.font = (10 * GF.S) + 'px sans-serif';
    ctx.fillText(m.cost + ' ' + GF.t('stamina'), x + bw / 2, y + bh / 2 + 12 * GF.S);
    ctx.font = 'bold ' + GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
  }
}

function drawHelpButton(ctx) {
  var size = GF.clamp(36 * GF.S, 26, 48);
  var x = GF.W - size - 14 * GF.S;
  var y = 38 * GF.S;
  helpButton = { x: x, y: y, w: size, h: size };
  ctx.fillStyle = 'rgba(40,28,22,0.85)';
  GF.rr(ctx, x, y, size, size, 8 * GF.S); ctx.fill();
  ctx.strokeStyle = '#ffd9a8'; ctx.lineWidth = 1.5 * GF.S;
  GF.rr(ctx, x, y, size, size, 8 * GF.S); ctx.stroke();
  ctx.fillStyle = '#ffd9a8';
  ctx.font = 'bold ' + (size * 0.55) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', x + size / 2, y + size / 2);
}

function drawMessage(ctx) {
  if (lastMessageT <= 0 || !lastMessage) return;
  var alpha = Math.min(1, lastMessageT / 0.5);
  ctx.globalAlpha = alpha;
  ctx.font = 'bold ' + GF.clamp(20 * GF.S, 14, 28) + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(lastMessage, GF.cx, GF.H * 0.32);
  ctx.globalAlpha = 1;
}

// ── OVERLAYS (custom: include tutorial copy) ────────────────────────────
function drawMenuOverlay() {
  var ctx = GF.ctx;
  ctx.fillStyle = 'rgba(8,4,2,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(40 * GF.S, 24, 60);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#ffd9a8';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = 'rgba(255,140,60,0.5)';
  ctx.shadowBlur = 28 * GF.S;
  ctx.fillText(GF.t('title'), GF.cx, GF.H * 0.18);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#caa78a';
  ctx.font = GF.clamp(15 * GF.S, 11, 20) + 'px sans-serif';
  ctx.fillText(GF.t('sub'), GF.cx, GF.H * 0.18 + 30 * GF.S);

  // Tutorial copy
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  var tutFs = GF.clamp(13 * GF.S, 10, 18);
  ctx.font = tutFs + 'px sans-serif';
  ctx.fillStyle = '#e0c59a';
  var startY = GF.H * 0.34;
  var lineH = tutFs * 1.55;
  for (var i = 0; i < lines.length; i++) {
    drawWrappedLine(ctx, lines[i], GF.cx, startY + i * lineH, GF.W * 0.86, tutFs);
  }

  // Play button
  var btnW = GF.clamp(240 * GF.S, 160, 320), btnH = GF.clamp(52 * GF.S, 40, 66);
  var btnX = GF.cx - btnW / 2, btnY = GF.H * 0.78;
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#e85d3e'); grad.addColorStop(1, '#a13a20');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#ffd9a8'; ctx.lineWidth = 2 * GF.S; ctx.stroke();
  ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 22) + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), GF.cx, btnY + btnH / 2);

  // Best
  if (best > 1) {
    ctx.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
    ctx.fillStyle = '#776';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, btnY + btnH + 28 * GF.S);
  }

  // Bind a button via the lib's button slot — register it on each frame
  registerOverlayButton(btnX, btnY, btnW, btnH, function() {
    try { localStorage.setItem('forge_heir_seen_tutorial', '1'); } catch (e) {}
    startGame();
  });
}

function drawEndOverlay(title, sub, btnText, btnFn) {
  var ctx = GF.ctx;
  ctx.fillStyle = 'rgba(8,4,2,0.85)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(40 * GF.S, 24, 60);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = (gs === 'WON') ? '#5df58c' : '#e85d75';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = 'rgba(255,140,60,0.4)';
  ctx.shadowBlur = 28 * GF.S;
  ctx.fillText(title, GF.cx, GF.cy - 30 * GF.S);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#caa78a';
  ctx.font = GF.clamp(16 * GF.S, 12, 22) + 'px sans-serif';
  ctx.fillText(sub, GF.cx, GF.cy + 4 * GF.S);

  ctx.fillStyle = '#a98870';
  ctx.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
  ctx.fillText(GF.t('best') + ': ' + best, GF.cx, GF.cy + 28 * GF.S);

  var btnW = GF.clamp(240 * GF.S, 160, 320), btnH = GF.clamp(52 * GF.S, 40, 66);
  var btnX = GF.cx - btnW / 2, btnY = GF.cy + 56 * GF.S;
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#e85d3e'); grad.addColorStop(1, '#a13a20');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#ffd9a8'; ctx.lineWidth = 2 * GF.S; ctx.stroke();
  ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 22) + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(btnText, GF.cx, btnY + btnH / 2);

  registerOverlayButton(btnX, btnY, btnW, btnH, btnFn);
}

function drawTutorialOverlay() {
  var ctx = GF.ctx;
  ctx.fillStyle = 'rgba(8,4,2,0.88)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  var tutFs = GF.clamp(15 * GF.S, 11, 20);
  ctx.font = tutFs + 'px sans-serif';
  ctx.fillStyle = '#e0c59a';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var startY = GF.H * 0.3;
  var lineH = tutFs * 1.6;
  for (var i = 0; i < lines.length; i++) {
    drawWrappedLine(ctx, lines[i], GF.cx, startY + i * lineH, GF.W * 0.86, tutFs);
  }
  ctx.font = 'bold ' + tutFs + 'px sans-serif';
  ctx.fillStyle = '#ffd9a8';
  ctx.fillText('TAP TO CLOSE', GF.cx, GF.H * 0.85);
}

function drawWrappedLine(ctx, text, cx, cy, maxW, fs) {
  // Simple word-wrap into 2 lines max
  var words = text.split(' ');
  var line = '', lines = [];
  for (var i = 0; i < words.length; i++) {
    var test = line ? (line + ' ' + words[i]) : words[i];
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = words[i];
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  var n = lines.length;
  for (var j = 0; j < n; j++) {
    ctx.fillText(lines[j], cx, cy + (j - (n - 1) / 2) * fs * 1.15);
  }
}

// Overlay buttons — reuse GF's click hit-test by injecting into its button list.
// gf-lib's `buttons` is internal — we re-implement a minimal click handler here.
var overlayButtons = [];
function registerOverlayButton(x, y, w, h, fn) {
  // overlayButtons gets reset every draw; we register them in draw() for current frame.
  overlayButtons.push({ x: x, y: y, w: w, h: h, fn: fn });
}

GF.canvas.addEventListener('click', function(e) {
  for (var i = 0; i < overlayButtons.length; i++) {
    var b = overlayButtons[i];
    if (e.clientX >= b.x && e.clientX <= b.x + b.w && e.clientY >= b.y && e.clientY <= b.y + b.h) {
      b.fn();
      return;
    }
  }
});
GF.canvas.addEventListener('touchstart', function(e) {
  if (!e.changedTouches || !e.changedTouches[0]) return;
  var t0 = e.changedTouches[0];
  for (var i = 0; i < overlayButtons.length; i++) {
    var b = overlayButtons[i];
    if (t0.clientX >= b.x && t0.clientX <= b.x + b.w && t0.clientY >= b.y && t0.clientY <= b.y + b.h) {
      b.fn();
      return;
    }
  }
}, { passive: true });

// Reset overlay buttons each frame
function preDraw() { overlayButtons = []; }

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 960,
  designH: 600,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'forge_heir',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('forge_heir_best') || '1') || 1; } catch (e) {}
    gs = 'MENU';
  },
  onUpdate: update,
  onDraw: function(ctx, dt) { preDraw(); draw(ctx); },
});

// Expose state for post-build-tester gate
GF.exposeState(function() {
  return {
    gs: gs,
    round: round,
    stamina: stamina,
    cursesRemaining: totalCurses(),
    segments: segments.length,
    hammerMode: hammerMode,
    best: best,
  };
});

})();
</script>
