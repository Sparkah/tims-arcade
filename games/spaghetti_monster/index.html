<script>
(function() {
'use strict';

// ── LOCALISED STRINGS (Yandex 8.2.3 — both languages) ────────────────────

    gameover: 'ИГРА ОКОНЧЕНА', sauce: 'Соус', next: 'Далее', max: 'МАКС',
    tier_0: 'Закуска', tier_1: 'Обед', tier_2: 'Пир', tier_3: 'Фестиваль', tier_4: 'Кайдзю',
    tierup: 'НОВЫЙ УРОВЕНЬ!', pow_marinara: 'Маринара', pow_shield: 'Щит', pow_speed: 'Скорость',
    up_tent: 'Ещё рука', up_magnet: 'Магнит', up_resist: 'Крепкая лапша',
    up_tent_eff: '+1 рука в начале', up_magnet_eff: '+6 к захвату', up_resist_eff: '-1 при срезе',
    frenzy: 'БЕЗУМИЕ', ready: 'ГОТОВО', banked: 'Соус',
    tut_step_drag: 'Веди пальцем и управляй монстром',
    tut_step_slurp: 'Касайся еды лапшой',
    tut_step_grow: 'Расти! Берегись ножниц поваров',
    tut_goal: 'Вырасти самого большого монстра, поглощая уличную еду.',
    tut_controls: 'Веди пальцем; лапша сама всасывает всё, чего коснётся.',
    tut_win: 'Бесконечно: расти по уровням ради рекорда.',
    tut_lose: 'Повара режут лапшу; кончится длина, игра окончена.',
    tut_tip: 'Хватай соус маринара, чтобы глотать поваров целиком.',
  },
};

// food_sausage intentionally omitted — it draws from its vector fallback (the
// Flux content filter rejects every sausage/bratwurst prompt); no load, no 404.
var SPRITE_NAMES = ['core', 'food_noodle', 'food_meatball', 'food_dumpling'];

// ── REMOTE CONFIG DEFAULTS (live-ops DATA channel; offline = these) ───────
var CFG = {
  tuning: { speed_mult: 1, spawn_mult: 1 },
  events: { golden_rush: false },
  daily:  { seed: 0 },
  motd:   { en: '', ru: '' },
  version: 0,
};

// ── TUNABLES (see DESIGN.md) ─────────────────────────────────────────────
var SEG_LEN = 15, SEG_START = 8, MAX_SEG = 20, CORE_R0 = 20;
var SLURP_RADIUS = 26, SLURP_SPEED = 9, CORE_SPEED = 235, STRAND_DAMP = 0.86;
var CONSTRAINT_ITERS = 3, SNIP_COST = 4, LENGTH_MIN = 8, CHEF_SPEED = 66;
var POWERUP_TIME = 6, START_TENTACLES = 3, OUTWARD = 30;
// CHEF_SPEED tuned so chefs keep pace with a moving monster yet stay dodgeable.
var TIER_SCORES = [30, 70, 130, 210];
var FRENZY_STEP = 100;           // score past Kaiju (210) per post-Kaiju frenzy wave
var TIER_NAMES = ['tier_0', 'tier_1', 'tier_2', 'tier_3', 'tier_4'];
var FOOD_R = 11, CHEF_R = 18, BLADE_R = 22, FORK_R = 16, SAUCE_R = 14;

// food catalogue: value + first tier it appears + colour
// Pickup hues are kept deliberately DISTINCT from the saucy-red strands and the
// tan plaza so food reads as collectible at a glance (each also gets a dark rim
// + pulse halo in drawFoods). glow = the pulse-halo colour.
var FOOD_DEFS = [
  { k: 'noodle',   spr: 'food_noodle',   v: 1, minTier: 0, col: '#ffd21f', glow: '#fff3a0' },
  { k: 'meatball', spr: 'food_meatball', v: 3, minTier: 1, col: '#8a4a22', glow: '#e8b070' },
  { k: 'sausage',  spr: 'food_sausage',  v: 4, minTier: 2, col: '#b8674a', glow: '#f0b49a' },
  { k: 'dumpling', spr: 'food_dumpling', v: 6, minTier: 3, col: '#f4efe2', glow: '#ffffff' },
  { k: 'hotdog',   spr: 'food_noodle',   v: 8, minTier: 1, col: '#ffe14a', glow: '#fff6c0', rare: true },
];
var POWER_KINDS = ['marinara', 'shield', 'speed'];
var STALL_COLORS = [
  ['#c63d32', '#f7d26a'],
  ['#2f8f74', '#f4efe2'],
  ['#3d6fb2', '#f2b36d'],
  ['#8a58a8', '#f7d26a'],
];

// ── STATE ────────────────────────────────────────────────────────────────
var gs = 'MENU';                 // MENU | PLAYING | GAMEOVER
var score = 0, best = 0, noodleLength = 24, tier = 0, tentacleCount = START_TENTACLES;
var core = { x: 0, y: 0, vx: 0, vy: 0, r: CORE_R0, mouth: 0 };
var tentacles = [], foods = [], chefs = [], forks = [], sauces = [];
var arenaW = 900, arenaH = 1200;
var camScale = 1, time = 0, saveAccum = 0, spawnAccum = 0, sauceAccum = 0;
var power = { type: null, t: 0 };
var lookX = 0, lookY = -1;
var flashRed = 0, tierupFlash = 0;
var frenzy = 0, sauceMult = 1;   // post-Kaiju endless ramp: waves + sauce-prestige multiplier
var lastRunBank = 0;             // sauce banked by the most recent run (for the game-over payoff)
var _pendingAd = false;

// persistent meta
var meta = { best: 0, sauce: 0, up: { tent: 0, magnet: 0, resist: 0 } };
var META_KEY = 'spaghetti_monster_meta_v1';

// input
var ptr = { active: false, x: 0, y: 0, dnx: 0, dny: 0, moved: false };
var uiButtons = [];              // rebuilt per frame for HUD + game-over
var uiCaptured = false;
var _ssInvuln = false;           // screenshot-only: block snips so captures never fall to GAMEOVER

// derived from meta
function slurpR()  { return SLURP_RADIUS + meta.up.magnet * 6; }
function snipCost(){ return Math.max(2, SNIP_COST - meta.up.resist); }

// ── CAMERA (world <-> screen; folds GF.S device scale + tier zoom) ────────
function zoom()   { return camScale * GF.S; }
function w2sx(x)  { return (x - core.x) * zoom() + GF.cx; }
function w2sy(y)  { return (y - core.y) * zoom() + GF.cy; }
function s2wx(sx) { return (sx - GF.cx) / zoom() + core.x; }
function s2wy(sy) { return (sy - GF.cy) / zoom() + core.y; }

// ── UTILS ──────────────────────────────────────────────────────────────
function rand(a, b) { return a + Math.random() * (b - a); }
function hyp(x, y)  { return Math.sqrt(x * x + y * y); }
function unlockedFoods() {
  var out = [];
  for (var i = 0; i < FOOD_DEFS.length; i++) if (FOOD_DEFS[i].minTier <= tier) out.push(FOOD_DEFS[i]);
  return out;
}

// ── TENTACLES (verlet spaghetti strands) ─────────────────────────────────
function makeTentacle(angle) {
  var t = { angle: angle, seg: SEG_START, pts: [], pin: 0, pinIdx: -1, pinX: 0, pinY: 0, cut: 0, phase: rand(0, 6.28) };
  for (var i = 0; i <= t.seg; i++) {
    var d = i * SEG_LEN;
    var x = core.x + Math.cos(angle) * (core.r + d);
    var y = core.y + Math.sin(angle) * (core.r + d);
    t.pts.push({ x: x, y: y, px: x, py: y });
  }
  return t;
}
function spreadTentacles() {
  for (var i = 0; i < tentacles.length; i++) {
    tentacles[i].angle = -Math.PI / 2 + (i / tentacles.length) * Math.PI * 2;
  }
}
function recomputeLength() {
  var n = 0;
  for (var i = 0; i < tentacles.length; i++) n += tentacles[i].seg;
  noodleLength = n;
}
function growSegments(units) {
  while (units > 0) {
    var best_i = -1, minSeg = 1e9;
    for (var i = 0; i < tentacles.length; i++) {
      if (tentacles[i].seg < MAX_SEG && tentacles[i].seg < minSeg) { minSeg = tentacles[i].seg; best_i = i; }
    }
    if (best_i < 0) break;              // all maxed
    var t = tentacles[best_i];
    t.seg++;
    var tip = t.pts[t.pts.length - 1], prev = t.pts[t.pts.length - 2] || tip;
    var dx = tip.x - prev.x, dy = tip.y - prev.y, d = hyp(dx, dy) || 1;
    var nx = tip.x + dx / d * SEG_LEN, ny = tip.y + dy / d * SEG_LEN;
    t.pts.push({ x: nx, y: ny, px: nx, py: ny });
    units--;
  }
  recomputeLength();
}
function updateTentacles(dt) {
  var out = OUTWARD * (power.type === 'speed' ? 1.35 : 1);
  for (var ti = 0; ti < tentacles.length; ti++) {
    var t = tentacles[ti];
    if (t.pin > 0) t.pin -= dt;
    if (t.cut > 0) t.cut -= dt;
    var n = t.seg;
    var ax = core.x + Math.cos(t.angle) * core.r, ay = core.y + Math.sin(t.angle) * core.r;
    t.pts[0].x = ax; t.pts[0].y = ay; t.pts[0].px = ax; t.pts[0].py = ay;
    var ox = Math.cos(t.angle), oy = Math.sin(t.angle), perpx = -oy, perpy = ox;
    for (var i = 1; i <= n; i++) {
      var p = t.pts[i];
      if (t.pin > 0 && i === t.pinIdx) { p.x = t.pinX; p.y = t.pinY; p.px = t.pinX; p.py = t.pinY; continue; }
      var vx = (p.x - p.px) * STRAND_DAMP, vy = (p.y - p.py) * STRAND_DAMP;
      p.px = p.x; p.py = p.y;
      var frac = i / n;
      var wig = Math.sin(time * 4.2 + t.phase + i * 0.55) * 22 * frac;
      p.x += vx + (ox * out * frac + perpx * wig) * dt;
      p.y += vy + (oy * out * frac + perpy * wig) * dt;
    }
    for (var k = 0; k < CONSTRAINT_ITERS; k++) {
      for (var j = 0; j < n; j++) {
        var a = t.pts[j], b = t.pts[j + 1];
        var dx2 = b.x - a.x, dy2 = b.y - a.y, dd = hyp(dx2, dy2) || 0.0001;
        var diff = (SEG_LEN - dd) / dd * 0.5;
        var offx = dx2 * diff, offy = dy2 * diff;
        var aFixed = (j === 0) || (t.pin > 0 && j === t.pinIdx);
        var bFixed = (t.pin > 0 && (j + 1) === t.pinIdx);
        if (aFixed && !bFixed) { b.x += offx * 2; b.y += offy * 2; }
        else if (bFixed && !aFixed) { a.x -= offx * 2; a.y -= offy * 2; }
        else if (!aFixed && !bFixed) { a.x -= offx; a.y -= offy; b.x += offx; b.y += offy; }
      }
    }
  }
}
function tentPointAt(t, segT) {
  segT = Math.max(0, Math.min(t.seg, segT));
  var i0 = Math.floor(segT), i1 = Math.min(t.seg, i0 + 1), f = segT - i0;
  var a = t.pts[i0], b = t.pts[i1];
  return { x: a.x + (b.x - a.x) * f, y: a.y + (b.y - a.y) * f };
}

// ── SPAWNING ─────────────────────────────────────────────────────────────
function randArenaPos(minFromCore) {
  for (var tries = 0; tries < 12; tries++) {
    var x = rand(60, arenaW - 60), y = rand(60, arenaH - 60);
    if (!minFromCore || hyp(x - core.x, y - core.y) > minFromCore) return { x: x, y: y };
  }
  return { x: rand(60, arenaW - 60), y: rand(60, arenaH - 60) };
}
function foodTarget() { return Math.round((14 + tier * 7 + arenaW / 130) * CFG.tuning.spawn_mult); }
function spawnFood(nearCore) {
  var pool = unlockedFoods();
  var def = pool[(Math.random() * pool.length) | 0];
  if (def.rare && Math.random() > 0.12) def = pool[0];   // hotdog stays rare
  // regular food spawns clear of the monster's reach, so growth requires active
  // steering (a passive monster does not self-heal faster than chefs cut it).
  var p = nearCore ? { x: core.x + rand(-70, 70), y: core.y + rand(60, 120) } : randArenaPos(core.r + SEG_START * SEG_LEN + 55);
  p.x = Math.max(40, Math.min(arenaW - 40, p.x));
  p.y = Math.max(40, Math.min(arenaH - 40, p.y));
  foods.push({ x: p.x, y: p.y, def: def, cap: false, ti: -1, segT: 0, wob: rand(0, 6.28), sc: 1 });
}
function topUpFood() { var tgt = foodTarget(); var guard = 0; while (foods.length < tgt && guard++ < 80) spawnFood(false); }

function spawnChef(type, pos) {
  var p = pos || randArenaPos(220);
  var speed = CHEF_SPEED * (type === 'cleaver' ? 1.45 : 1) * (type === 'granny' ? 1.7 : 1);
  var ch = { x: p.x, y: p.y, type: type, r: CHEF_R, speed: speed, cool: rand(1.2, 2.4),
             windup: 0, blink: rand(0, 3), dirx: 0, diry: 0, summon: 6, zx: null, zy: null, zr: 0 };
  if (type === 'granny') { var a = rand(0, 6.28); ch.dirx = Math.cos(a); ch.diry = Math.sin(a); }
  chefs.push(ch);
}
function desiredChefs() {
  return { scissor: 1 + tier, cleaver: tier >= 3 ? tier - 2 : 0, granny: tier >= 4 ? 1 : 0, inspector: tier >= 4 ? 1 : 0 };
}
function topUpChefs() {
  var want = desiredChefs(), have = { scissor: 0, cleaver: 0, granny: 0, inspector: 0 };
  for (var i = 0; i < chefs.length; i++) have[chefs[i].type]++;
  for (var k in want) { while (have[k] < want[k]) { spawnChef(k); have[k]++; } }
}
function topUpForks() {
  if (tier < 2) return;
  var want = Math.min(4, tier);
  while (forks.length < want) { var p = randArenaPos(160); forks.push({ x: p.x, y: p.y, wob: rand(0, 6.28) }); }
}

// ── GAME LIFECYCLE ─────────────────────────────────────────────────────
function startGame() {
  score = 0; tier = 0;
  tentacleCount = Math.min(6, START_TENTACLES + meta.up.tent);
  arenaW = 900; arenaH = 1200;
  core.x = arenaW / 2; core.y = arenaH / 2; core.vx = 0; core.vy = 0; core.r = CORE_R0; core.mouth = 0;
  tentacles = [];
  for (var i = 0; i < tentacleCount; i++) tentacles.push(makeTentacle(0));
  spreadTentacles();
  recomputeLength();
  foods = []; chefs = []; forks = []; sauces = [];
  power = { type: null, t: 0 };
  camScale = 1; flashRed = 0; tierupFlash = 0;
  frenzy = 0; sauceMult = 1;
  spawnFood(true); spawnFood(true);           // food beside the monster for the coach
  topUpFood();
  spawnChef('scissor');
  gs = 'PLAYING';
  GF.gameStarted();
  maybeStartCoach();
  GF.saveRun();
}
function runSauce() { return Math.round(score * sauceMult); }   // sauce this run would bank (prestige-scaled)
function gameOver() {
  if (score > best) best = score;
  meta.best = Math.max(meta.best, score);
  lastRunBank = runSauce();                // post-Kaiju sauce-prestige multiplier pays out here
  meta.sauce += lastRunBank;
  saveMeta();
  gs = 'GAMEOVER';
  _pendingAd = true;
  GF.gameEnded();
  if (score > 0 && score >= best) GF.happytime();
  GF.saveRun();
}
function addScore(v, wx, wy) {
  score += v;
  growSegments(v);
  core.mouth = 1;
  GF.spawnFloat(w2sx(wx), w2sy(wy), '+' + v, '#ffe680');
  GF.spawnParticles(w2sx(wx), w2sy(wy), '#ffd21f', 6);
  checkTier();
  checkFrenzy();
}
// Post-Kaiju endless ramp: once past the top tier, every FRENZY_STEP of score
// spawns an escalating chef wave + a food bonanza and raises the sauce-prestige
// multiplier — so minute 6-10 keeps introducing something new and pays out more.
function checkFrenzy() {
  var kaiju = TIER_SCORES[TIER_SCORES.length - 1];
  if (score < kaiju) return;
  var want = Math.floor((score - kaiju) / FRENZY_STEP);
  while (frenzy < want) {
    frenzy++;
    sauceMult = 1 + frenzy * 0.5;                 // x1.5, x2.0, x2.5 ...
    spawnChef(frenzy % 2 ? 'cleaver' : 'scissor'); spawnChef('scissor');   // escalating wave
    for (var i = 0; i < 6; i++) spawnFood(false);                          // food bonanza
    if (frenzy % 2 === 0) spawnFood(false), spawnFood(false);
    GF.sfx('levelup'); GF.setShake(0.45);
    GF.spawnFloat(GF.cx, GF.cy - 60 * GF.S, GF.t('frenzy') + ' x' + frenzy + '  ' + GF.t('sauce') + ' x' + sauceMult.toFixed(1), '#ff7a3c');
    GF.saveRun();
  }
}
function checkTier() {
  while (tier < TIER_SCORES.length && score >= TIER_SCORES[tier]) {
    tier++;
    tentacles.push(makeTentacle(0)); spreadTentacles(); recomputeLength();
    core.r = CORE_R0 + tier * 5;
    arenaW = 900 + tier * 240; arenaH = 1200 + tier * 300;
    camScale = Math.max(0.62, 1.05 - tier * 0.09);
    tierupFlash = 1.2;
    GF.sfx('levelup');
    GF.spawnFloat(GF.cx, GF.cy - 40 * GF.S, GF.t('tierup') + ' ' + GF.t(TIER_NAMES[tier]), '#7CFC9A');
    for (var i = 0; i < 22; i++) GF.spawnParticles(GF.cx + rand(-60, 60), GF.cy + rand(-60, 60), i % 2 ? '#7CFC9A' : '#ffd54a', 1);
    GF.setShake(0.5);
    topUpForks();
    GF.saveRun();
  }
}

// ── EATING / SLURP ────────────────────────────────────────────────────
function updateFoods(dt) {
  var sr = slurpR();
  for (var fi = foods.length - 1; fi >= 0; fi--) {
    var f = foods[fi];
    f.wob += dt * 3;
    if (f.cap) {
      var t = tentacles[f.ti];
      if (!t) { f.cap = false; continue; }
      f.segT = Math.min(f.segT, t.seg);
      f.segT -= SLURP_SPEED * dt;
      f.sc = 0.6 + 0.4 * (f.segT / Math.max(1, t.seg));
      if (f.segT <= 0.4) { addScore(f.def.v, core.x, core.y); GF.sfx('coin'); foods.splice(fi, 1); continue; }
      var pp = tentPointAt(t, f.segT); f.x = pp.x; f.y = pp.y;
      continue;
    }
    if (hyp(f.x - core.x, f.y - core.y) < core.r + FOOD_R) { addScore(f.def.v, f.x, f.y); GF.sfx('coin'); foods.splice(fi, 1); continue; }
    var captured = false;
    for (var ti = 0; ti < tentacles.length && !captured; ti++) {
      var tt = tentacles[ti];
      for (var i = 1; i <= tt.seg; i++) {
        var p = tt.pts[i];
        if (hyp(p.x - f.x, p.y - f.y) < sr + FOOD_R) {
          f.cap = true; f.ti = ti; f.segT = i; captured = true; GF.sfx('click');
          if (GF.tutorial.active && GF.tutorial.step === 1) GF.tutorial.next();
          break;
        }
      }
    }
  }
  spawnAccum += dt;
  if (spawnAccum > 0.6) { spawnAccum = 0; if (foods.length < foodTarget()) spawnFood(false); }
}

// ── CHEFS / HAZARDS ──────────────────────────────────────────────────
// a tentacle is "cuttable" only while it still has segments above the floor
function cuttable(t) { return t.seg > 2; }
function nearestTentPointInZone(zx, zy, zr, cuttableOnly) {
  var bestT = -1, bestI = -1, bd = zr * zr;
  for (var ti = 0; ti < tentacles.length; ti++) {
    var t = tentacles[ti];
    if (cuttableOnly && !cuttable(t)) continue;
    for (var i = 1; i <= t.seg; i++) {
      var p = t.pts[i], dx = p.x - zx, dy = p.y - zy, d2 = dx * dx + dy * dy;
      if (d2 < bd) { bd = d2; bestT = ti; bestI = i; }
    }
  }
  return bestT < 0 ? null : { ti: bestT, i: bestI };
}
// nearest strand point to (fromX,fromY) — chefs hunt CUTTABLE noodles so they
// move on to a fresh strand instead of gnawing a spent 2-segment stub forever
function nearestTentPoint(fromX, fromY, cuttableOnly) {
  var bx = 0, by = 0, bd = 1e18, found = false;
  for (var ti = 0; ti < tentacles.length; ti++) {
    var t = tentacles[ti];
    if (cuttableOnly && !cuttable(t)) continue;
    for (var i = 1; i <= t.seg; i++) {
      var p = t.pts[i], dx = p.x - fromX, dy = p.y - fromY, d2 = dx * dx + dy * dy;
      if (d2 < bd) { bd = d2; bx = p.x; by = p.y; found = true; }
    }
  }
  return found ? { x: bx, y: by, d: Math.sqrt(bd) } : null;
}
function doSnip(ch, zx, zy, zr) {

// ── INPUT ───────────────────────────────────────────────────────────────

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {

  if (core.mouth > 0) core.mouth = Math.max(0, core.mouth - dt * 2.2);
  GF.tutorial.update(dt);
  if (gs !== 'PLAYING') return;

  var tx = core.x, ty = core.y, steering = false;
  if (ptr.active && !uiCaptured) { tx = s2wx(ptr.x); ty = s2wy(ptr.y); steering = true; }
  var kx = 0, ky = 0;
  if (GF.keys['ArrowLeft'] || GF.keys['KeyA']) kx -= 1;
  if (GF.keys['ArrowRight'] || GF.keys['KeyD']) kx += 1;
  if (GF.keys['ArrowUp'] || GF.keys['KeyW']) ky -= 1;
  if (GF.keys['ArrowDown'] || GF.keys['KeyS']) ky += 1;
  var spd = CORE_SPEED * (power.type === 'speed' ? 1.6 : 1) * CFG.tuning.speed_mult;
  if (kx || ky) { var kl = hyp(kx, ky); tx = core.x + kx / kl * 200; ty = core.y + ky / kl * 200; steering = true; }
  if (steering) {

    if (d > 2) { var ux = dx / d, uy = dy / d, target = Math.min(spd, d * 5); core.vx += (ux * target - core.vx) * 0.25; core.vy += (uy * target - core.vy) * 0.25; lookX = ux; lookY = uy; }

  var mg = core.r + 10;
  core.x = Math.max(mg, Math.min(arenaW - mg, core.x));
  core.y = Math.max(mg, Math.min(arenaH - mg, core.y));

  updateTentacles(dt);
  updateFoods(dt);
  updateChefs(dt);
  updateForks(dt);
  updateSauce(dt);
  topUpChefs();

  saveAccum += dt;
  if (saveAccum > 5) { saveAccum = 0; GF.saveRun(); }
}

// ── GAME OVER (custom: score + 3 upgrade cards + retry) ──────────────────
var UP_DEFS = [
  { k: 'tent', max: 3, cost: [40, 90, 160] },
  { k: 'magnet', max: 4, cost: [30, 70, 130, 220] },
  { k: 'resist', max: 2, cost: [45, 110] },
];
function upCost(u) { return meta.up[u.k] >= u.max ? null : u.cost[meta.up[u.k]]; }
// cheapest not-yet-maxed upgrade — the carrot the in-run HUD points the player at
function nextUpgrade() {
  var best = null;

    var c = upCost(UP_DEFS[i]);
    if (c == null) continue;
    if (!best || c < best.cost) best = { u: UP_DEFS[i], cost: c };
  }
  return best;
}
function buyUpgrade(u) {
  var c = upCost(u);
  if (c == null || meta.sauce < c) { GF.sfx('lose'); return; }
  meta.sauce -= c; meta.up[u.k]++; saveMeta(); GF.sfx('unlock');
  GF.spawnFloat(GF.cx, GF.cy, GF.t('up_' + u.k) + ' +1', '#7CFC9A');
}
function drawGameOver(ctx) {

  ctx.font = GF.clamp(16 * S, 12, 22) + 'px sans-serif'; ctx.fillStyle = '#eaccaa';
  ctx.fillText(GF.t('score') + ': ' + score + '    ' + GF.t('best') + ': ' + best, GF.cx, y);
  y += 30 * S;

  ctx.font = 'bold ' + GF.clamp(26 * S, 18, 38) + 'px sans-serif';
  var sTxt = GF.t('sauce') + ' ' + meta.sauce;

  ctx.fillStyle = '#e05a3a'; ctx.beginPath(); ctx.arc(GF.cx - sW / 2 - sIcR - 4 * S, y - GF.clamp(8 * S, 6, 12), sIcR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffd54a'; ctx.fillText(sTxt, GF.cx + sIcR * 0.7, y);
  if (lastRunBank > 0) {
    y += 20 * S;
    ctx.font = 'bold ' + GF.clamp(14 * S, 11, 19) + 'px sans-serif'; ctx.fillStyle = '#7CFC9A';
    ctx.fillText('+' + lastRunBank + ' ' + GF.t('banked') + (sauceMult > 1 ? '   x' + sauceMult.toFixed(1) : ''), GF.cx, y);
  }
  y += 18 * S;

  var cardW = GF.clamp(110 * S, 86, 158), cardH = GF.clamp(120 * S, 98, 150), gap = GF.clamp(10 * S, 7, 14);
  var totalW = cardW * 3 + gap * 2, startX = GF.cx - totalW / 2, cardY = y + 4 * S;
  for (var i = 0; i < UP_DEFS.length; i++) {
    var u = UP_DEFS[i], cxp = startX + i * (cardW + gap), c = upCost(u);
    var afford = c != null && meta.sauce >= c;
    GF.rr(ctx, cxp, cardY, cardW, cardH, 13 * S);
    ctx.fillStyle = afford ? 'rgba(89,168,107,0.30)' : 'rgba(255,255,255,0.07)'; ctx.fill();
    ctx.strokeStyle = afford ? '#7CFC9A' : 'rgba(255,255,255,0.16)'; ctx.lineWidth = (afford ? 2.5 : 2) * S; ctx.stroke();
    drawUpgradeIcon(ctx, u.k, cxp + cardW / 2, cardY + cardH * 0.24, GF.clamp(16 * S, 12, 22));
    // title
    ctx.fillStyle = '#fff'; var tfs = GF.clamp(12 * S, 10, 16); ctx.font = 'bold ' + tfs + 'px sans-serif';
    fitText(ctx, GF.t('up_' + u.k), cardW - 10 * S, tfs);
    ctx.fillText(GF.t('up_' + u.k), cxp + cardW / 2, cardY + cardH * 0.48);
    // concrete before/after effect copy
    ctx.fillStyle = '#cfe8d4'; var efs = GF.clamp(10 * S, 8, 13); ctx.font = efs + 'px sans-serif';
    fitText2(ctx, GF.t('up_' + u.k + '_eff'), cardW - 8 * S, efs);
    ctx.fillText(GF.t('up_' + u.k + '_eff'), cxp + cardW / 2, cardY + cardH * 0.62);
    // cost
    ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px sans-serif';
    ctx.fillStyle = c == null ? '#9ad' : (afford ? '#ffd54a' : '#a88');
    ctx.fillText(c == null ? GF.t('max') : (GF.t('sauce') + ' ' + c), cxp + cardW / 2, cardY + cardH * 0.8);
    for (var l = 0; l < u.max; l++) { ctx.fillStyle = l < meta.up[u.k] ? '#7CFC9A' : 'rgba(255,255,255,0.22)'; ctx.beginPath(); ctx.arc(cxp + cardW / 2 + (l - (u.max - 1) / 2) * 9 * S, cardY + cardH - 9 * S, 2.8 * S, 0, Math.PI * 2); ctx.fill(); }
    (function (uu) { uiButtons.push({ x: cxp, y: cardY, w: cardW, h: cardH, fn: function () { buyUpgrade(uu); } }); })(u);
  }

  var btnW = GF.clamp(230 * S, 170, 360), btnH = GF.clamp(56 * S, 44, 76);
  var btnX = GF.cx - btnW / 2, btnY = cardY + cardH + 20 * S;
  var g = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  g.addColorStop(0, '#2ee07a'); g.addColorStop(1, '#23a657');
  ctx.save(); ctx.shadowColor = 'rgba(46,224,122,0.5)'; ctx.shadowBlur = 20 * S;
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2); ctx.fillStyle = g; ctx.fill(); ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(20 * S, 15, 28) + 'px sans-serif'; ctx.textBaseline = 'middle';
  ctx.fillText('▶ ' + GF.t('retry'), GF.cx, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  uiButtons.push({ x: btnX, y: btnY, w: btnW, h: btnH, fn: function () { doRetry(); } });
}
function fitText(ctx, txt, maxW, baseFs) {
  var fs = baseFs;
  while (ctx.measureText(txt).width > maxW && fs > 8) { fs--; ctx.font = 'bold ' + fs + 'px sans-serif'; }
}
function fitText2(ctx, txt, maxW, baseFs) {   // non-bold variant for the effect copy line
  var fs = baseFs;
  while (ctx.measureText(txt).width > maxW && fs > 7) { fs--; ctx.font = fs + 'px sans-serif'; }
}
function drawUpgradeIcon(c, k, x, y, r) {
  c.save(); c.translate(x, y);
  if (k === 'tent') { c.strokeStyle = '#f4c430'; c.lineWidth = r * 0.4; c.lineCap = 'round'; c.beginPath(); c.moveTo(-r, r); c.quadraticCurveTo(0, -r * 0.5, r, r); c.stroke(); }
  else if (k === 'magnet') { c.strokeStyle = '#e8b64a'; c.lineWidth = r * 0.35; c.beginPath(); c.arc(0, 0, r * 0.7, Math.PI * 0.15, Math.PI * 0.85, true); c.stroke(); c.beginPath(); c.arc(0, 0, r * 0.7, Math.PI * 1.15, Math.PI * 1.85, true); c.stroke(); }
  else { c.strokeStyle = '#f4c430'; c.fillStyle = 'rgba(244,196,48,0.3)'; c.lineWidth = r * 0.28; c.beginPath(); c.moveTo(0, -r); c.lineTo(r * 0.85, -r * 0.4); c.lineTo(r * 0.6, r * 0.8); c.lineTo(-r * 0.6, r * 0.8); c.lineTo(-r * 0.85, -r * 0.4); c.closePath(); c.fill(); c.stroke(); }
  c.restore();
}
function doRetry() {
  if (_pendingAd) { _pendingAd = false; try { GF.ads.interstitial(); } catch (e) {} }
  startGame();
}

// ── BOOT ─────────────────────────────────────────────────────────────────
function loadMeta() {
  try {
    var raw = localStorage.getItem(META_KEY);
    if (raw) { var m = JSON.parse(raw); if (m) { meta = m; if (!meta.up) meta.up = { tent: 0, magnet: 0, resist: 0 }; best = meta.best || 0; } }
  } catch (e) {}
}
function saveMeta() { try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch (e) {} }

GF.init({
  designW: 450,
  designH: 800,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'spaghetti_monster',
  onReady: function () {
    loadMeta();

    // Yandex 1.9 — run progress persists across reload (lightweight resume).
    GF.persist('spaghetti_monster_run_v1',
      function () { return { gs: gs, score: score, tier: tier, tentacleCount: tentacles.length, noodleLength: noodleLength }; },
      function (s) {
        if (!s || s.gs !== 'PLAYING') return;
        startGame();
        score = s.score || 0; tier = Math.min(TIER_SCORES.length, s.tier || 0);
        var wantT = Math.min(6, Math.max(tentacleCount, s.tentacleCount || tentacleCount));
        while (tentacles.length < wantT) tentacles.push(makeTentacle(0));
        spreadTentacles();
        if (s.noodleLength) growSegments(Math.max(0, s.noodleLength - noodleLength));
        core.r = CORE_R0 + tier * 5;
        arenaW = 900 + tier * 240; arenaH = 1200 + tier * 300;
        camScale = Math.max(0.62, 1.05 - tier * 0.09);
        core.x = arenaW / 2; core.y = arenaH / 2;
        topUpFood();
      }
    );
    if (gs !== 'PLAYING') gs = 'MENU';

    // MUSIC (HARD RULE 8) — mp3-first, procedural fallback, mute-aware.
    GF.bgMusic({ file: 'audio/bg_track.mp3', preset: 'arcade', muted: GF.muted });

    GF.remoteConfig('spaghetti_monster', CFG, {
      clamps: { 'tuning.speed_mult': [0.5, 2], 'tuning.spawn_mult': [0.5, 2] },
      onUpdate: function (c) { CFG = c; },
    }).then(function (c) { CFG = c; });

    var cv = GF.canvas;
    cv.addEventListener('pointerdown', function (e) { onDown(e.clientX, e.clientY); });
    cv.addEventListener('pointermove', function (e) { onMove(e.clientX, e.clientY); });
    cv.addEventListener('pointerup',   function () { onUp(); });
    cv.addEventListener('pointercancel', function () { onUp(); });

    // PLATFORM AUTOSTART (HARD RULE 9) — straight into gameplay on platforms.
    if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU') { startGame(); }
  },
  onUpdate: update,
  onDraw: draw,
});

// state exposure for the post-build-tester gate (matches DESIGN.md vars)
GF.exposeState(function () {
  // coreX/coreY are the player-steered variables — exposing them lets the funnel
  // probe detect the first input (a drag moves the core) against the auto-evolving
  // food/score counts.
  return { gs: gs, score: score, noodleLength: noodleLength, tier: tier, tentacleCount: tentacles.length, saucePoints: meta.sauce, best: best, frenzy: frenzy, sauceMult: sauceMult, coreX: Math.round(core.x), coreY: Math.round(core.y), chefs: chefs.length, foods: foods.length };
});
window.render_game_to_text = function () {
  var st = window.__gfState ? window.__gfState() : {};
  st.coordinateSystem = 'world pixels, origin top-left, x right, y down';
  st.tutorial = { active: !!GF.tutorial.active, step: GF.tutorial.step || 0 };
  st.power = power.type ? { type: power.type, seconds: Math.round(power.t * 10) / 10 } : null;
  st.nearestFood = (function () {
    var f = nearestFood();
    return f ? { x: Math.round(f.x), y: Math.round(f.y), kind: f.def.k, value: f.def.v } : null;
  })();
  st.core = { x: Math.round(core.x), y: Math.round(core.y), r: Math.round(core.r) };
  st.visibleChefs = chefs.slice(0, 6).map(function (c) {
    return { x: Math.round(c.x), y: Math.round(c.y), type: c.type, windup: Math.round(c.windup * 10) / 10 };
  });
  st.visibleForks = forks.slice(0, 5).map(function (f) {
    return { x: Math.round(f.x), y: Math.round(f.y) };
  });
  st.visibleSauces = sauces.slice(0, 4).map(function (s) {
    return { x: Math.round(s.x), y: Math.round(s.y), kind: s.kind };
  });
  return JSON.stringify(st);
};
window.advanceTime = function (ms) {
  var steps = Math.max(1, Math.round((ms || 16.67) / (1000 / 60)));
  if (typeof window.__gfStep === 'function') window.__gfStep(steps, 1 / 60);
  draw(GF.ctx);
};
// reachability hook (Yandex 1.10.x) — the interactive controls are the HUD
// mute/help pills and, on game-over, the upgrade cards + retry; all are drawn
// clear of the screen edges so nothing hides under platform chrome.
GF.exposeReach(function () {
  return { screen: gs, viewportH: GF.H, items: uiButtons.map(function (b, i) { return { id: 'ui_' + i, x: b.x, y: b.y, w: b.w, h: b.h }; }) };
});
// balance-probe bot
GF.exposeBot(
  function () {
    if (gs === 'GAMEOVER') { var a = []; if (meta.sauce >= 30) a.push('buy'); a.push('retry'); return a; }
    if (gs === 'PLAYING') return ['seek'];
    return ['start'];
  },
  function (action) {
    if (action === 'start') { startGame(); return; }
    if (action === 'retry') { doRetry(); return; }
    if (action === 'buy') { for (var i = 0; i < UP_DEFS.length; i++) { if (upCost(UP_DEFS[i]) != null && meta.sauce >= upCost(UP_DEFS[i])) { buyUpgrade(UP_DEFS[i]); return; } } return; }
    if (action === 'seek') { var f = nearestFood(); if (f) { ptr.active = true; ptr.x = w2sx(f.x); ptr.y = w2sy(f.y); } }
  }
);

// screenshot / test hooks.
// _jumpLevel(n) contract (webapp_gate relies on it):
//   n=1  -> a clean PLAYING run (coach suppressed)
//   n=99 -> a terminal GAMEOVER state
//   n>=2 -> a dense, framed mid-game scene for promo screenshots
function setupDense(n) {
  _ssInvuln = true;                       // captures never die mid-shoot
  var target = 140;                       // Festival tier (dumplings, cleaver chef, forks)
  if (n <= 2) target = 40; else if (n === 3) target = 90; else if (n >= 6) target = 220;
  score = target; checkTier();
  growSegments(26);
  camScale = 0.95;                        // frame the hero + surrounding market
  spawnChef('scissor'); spawnChef('scissor'); spawnChef('cleaver');
  if (tier >= 4) spawnChef('inspector');
  topUpForks();
  sauces.push({ x: core.x + 130, y: core.y - 60, kind: 'marinara', wob: 0 });
  topUpFood();
  // fan several foods onto the strands so slurps read as mid-flight
  for (var k = 0; k < 8 && k < foods.length; k++) { var a = k / 8 * 6.28, rr = rand(70, 160); foods[k].x = core.x + Math.cos(a) * rr; foods[k].y = core.y + Math.sin(a) * rr; foods[k].cap = false; }
}
window._jumpLevel = function (n) {
  n = (typeof n === 'number') ? n : 1;
  if (n >= 99) { if (gs !== 'PLAYING') startGame(); GF.tutorial.active = false; if (score < 1) score = 1; gameOver(); return; }
  startGame();
  try { localStorage.setItem('spaghetti_monster_seen_tutorial', '1'); } catch (e) {}
  GF.tutorial.active = false;
  if (n >= 2) setupDense(n);
};
window._setupForScreenshot = function (level) { window._jumpLevel(level || 5); };

})();
</script>
