<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Color Gate</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a18; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── GAME-SPECIFIC CONFIG ─────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Color Gate',
    sub:   'Bounce up. Match the color. Slip through.',
    play: 'PLAY', retry: 'RETRY', menu: 'MENU', back: 'BACK',
    daily: 'DAILY RUN', skins: 'SKINS',
    revive: '▶ REVIVE',
    height: 'HEIGHT', best: 'BEST', stars: 'STARS', stage: 'STAGE',
    gameover: 'GAME OVER',
    reached: 'Height', earned: '+%n ★',
    tap_to_climb: 'TAP to bounce up!',
    match_hint: 'Slip through the %c gate',
    daily_best: 'Daily best',
    locked: 'LOCKED', equipped: 'ON', equip: 'EQUIP', cost_star: '★ %n',
    seed_label: 'Seed',
    tut_goal:     'Goal: Climb as high as you can. Slip the ball UP through the gate arc that matches the ball’s color.',
    tut_controls: 'Controls: TAP anywhere (or Space) to bounce up. Gravity always pulls the ball back down.',
    tut_win:      'Win: Endless - every gate you clear adds height. Beat your best climb.',
    tut_lose:     'Lose: Touch a gate arc whose color does NOT match your ball and the run ends.',
    tut_tip:      'Tip: Paint splats swap your color - line up the matching arc before you bounce through. Stars unlock new looks.',
    col_red: 'red', col_blue: 'blue', col_green: 'green', col_yellow: 'yellow',
  },
  ru: {
    title: 'Color Gate',
    sub:   'Прыгай вверх. Лови цвет. Проскользни.',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', menu: 'МЕНЮ', back: 'НАЗАД',
    daily: 'ЗАБЕГ ДНЯ', skins: 'СКИНЫ',
    revive: '▶ ОЖИВИТЬ',
    height: 'ВЫСОТА', best: 'РЕКОРД', stars: 'ЗВЁЗДЫ', stage: 'ЭТАП',
    gameover: 'ИГРА ОКОНЧЕНА',
    reached: 'Высота', earned: '+%n ★',
    tap_to_climb: 'НАЖМИ, чтобы подпрыгнуть!',
    match_hint: 'Пройди через %c ворота',
    daily_best: 'Рекорд дня',
    locked: 'ЗАКРЫТО', equipped: 'ВКЛ', equip: 'НАДЕТЬ', cost_star: '★ %n',
    seed_label: 'Сид',
    tut_goal:     'Цель: поднимайся как можно выше. Проводи шар ВВЕРХ через дугу, совпадающую по цвету с шаром.',
    tut_controls: 'Управление: НАЖМИ в любом месте (или Пробел), чтобы подпрыгнуть. Гравитация всё время тянет шар вниз.',
    tut_win:      'Победа: бесконечно - каждые пройденные ворота добавляют высоту. Побей свой рекорд.',
    tut_lose:     'Поражение: касание дуги ворот, цвет которой НЕ совпадает с шаром, завершает забег.',
    tut_tip:      'Совет: кляксы меняют твой цвет - заранее наведись на нужную дугу. Звёзды открывают новые скины.',
    col_red: 'красные', col_blue: 'синие', col_green: 'зелёные', col_yellow: 'жёлтые',
  },
};

var SPRITE_NAMES = []; // procedural art

// ── TUNABLES (DESIGN.md contract; base values never mutated) ──────────────
var GRAVITY        = 1500;   // px/s^2 downward accel (design space)
var BOUNCE_IMPULSE = 620;    // upward velocity applied on tap (design space)
var MAX_FALL       = 1100;   // terminal downward speed clamp
var BALL_RADIUS    = 16;     // ball collision radius (design px)
var RING_THICKNESS = 18;     // visual ring stroke half-thickness
var CONTACT_BAND   = 20;     // |distToRingCenter - radius| <= this = touching
var BASE_SPIN      = 0.65;   // obstacle angular speed (rad/s) at stage 0
var SPIN_PER_STAGE = 0.18;   // added rad/s per stage
var ARC_GAP_BASE   = 0.5;    // gap fraction at stage 0 (safe slack)
var ARC_GAP_MIN    = 0.2;    // gap fraction floor at high stages
var SPAWN_GAP      = 250;    // vertical px between obstacles (design space)
var COLOR_COUNT    = 3;      // active colors at stage 0
var MAX_COLORS     = 4;      // palette ceiling
var STAGE_GATES    = 6;      // obstacles cleared per difficulty stage
var SPLAT_EVERY    = 4;      // paint-splat spawns ~every N obstacles
var STAR_EVERY     = 3;      // star spawns ~every N obstacles

// Palette - index 0..3. High contrast, color-blind-leaning hue spread.
var COLORS    = ['#ff4d5e', '#3da5ff', '#3ddc84', '#ffd23d'];
var COLOR_DK  = ['#a31526', '#114f8a', '#127a40', '#a37d00'];
var COLOR_KEY = ['col_red', 'col_blue', 'col_green', 'col_yellow'];

// Obstacle types
var OB_SINGLE = 'single', OB_DOUBLE = 'double', OB_LINE = 'line', OB_CROSS = 'cross';

// Cosmetic skins (ball core color + trail). idx0 = default (free).
var SKINS = [
  { key: 'classic', cost: 0,  ball: '#ffffff', trail: 'rgba(255,255,255,0.5)' },
  { key: 'ember',   cost: 8,  ball: '#ff8a3d', trail: 'rgba(255,138,61,0.5)' },
  { key: 'mint',    cost: 16, ball: '#5edef0', trail: 'rgba(94,222,240,0.5)' },
  { key: 'gold',    cost: 30, ball: '#ffd54f', trail: 'rgba(255,213,79,0.55)' },
  { key: 'violet',  cost: 48, ball: '#c07bff', trail: 'rgba(192,123,255,0.5)' },
];

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | PLAYING | GAMEOVER | SKINS
var height = 0;             // meters climbed this run
var bestHeight = 0;         // persisted all-time best
var bestDaily = 0;          // persisted best for today's seed
var stage = 0;              // difficulty stage
var cleared = 0;            // obstacles cleared this run
var stars = 0;              // persistent meta currency
var runStars = 0;           // stars collected this run (credited at game over)
var unlocks = [true, false, false, false, false]; // skin unlock flags
var equippedSkin = 0;
var isDaily = false;        // current run is daily-seeded
var dailySeed = 0;          // YYYYMMDD for the daily run
var seenTutorial = false;

// World-scroll model: the ball climbs in world-space; the camera keeps it at
// a fixed fraction of screen height. worldY DECREASES as the ball rises.
var ball = { wx: 0, wy: 0, vy: 0, color: 0, trail: [] };
var camY = 0;               // world-Y at the top of the screen
var camPeak = 0;            // highest (min) ball wy reached - camera anchor
var obstacles = [];         // active obstacles in world space
var splats = [];            // paint-splat pickups
var starItems = [];         // star pickups
var spawnCursor = 0;        // world-Y of the next obstacle to spawn
var obstacleIndex = 0;      // running count of spawned obstacles (for cadence)
var rngState = 1;           // seeded RNG state (daily) or Math.random passthru
var useSeed = false;        // when true, rng() is deterministic
var tutorialOpen = false;
var pulseT = 0;
var deathFlash = 0;
var swapFlash = 0;
var startFloorY = 0;        // world-Y the ball started at (height baseline)
var firstTapDone = false;
var bgScroll = 0;
var milestones = [];        // {wy, stage} bands drawn on the climb
var _ssMode = false;        // screenshot freeze

// Ads
var reviveUsed = false;
var reviveLoading = false;
var lastInterstitialMs = -1e9;
var INTERSTITIAL_GAP_MS = 180000;

function curStrings() { return STRINGS[GF.lang] || STRINGS.en; }

// ── SEEDED RNG (mulberry32) for the daily run ─────────────────────────────
function rng() {
  if (!useSeed) return Math.random();
  rngState |= 0; rngState = (rngState + 0x6D2B79F5) | 0;
  var t = Math.imul(rngState ^ (rngState >>> 15), 1 | rngState);
  t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}
function todaySeed() {
  var d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

// ── PERSISTENCE ──────────────────────────────────────────────────────────
function loadBest() { try { return parseInt(localStorage.getItem('color_gate_best') || '0') || 0; } catch (e) { return 0; } }
function saveBest() { try { localStorage.setItem('color_gate_best', bestHeight); } catch (e) {} }
function loadStars() { try { return parseInt(localStorage.getItem('color_gate_stars') || '0') || 0; } catch (e) { return 0; } }
function saveStars() { try { localStorage.setItem('color_gate_stars', stars); } catch (e) {} }
function loadUnlocks() {
  try {
    var s = JSON.parse(localStorage.getItem('color_gate_unlocks') || 'null');
    if (Array.isArray(s) && s.length === SKINS.length) return s;
  } catch (e) {}
  var a = SKINS.map(function() { return false; }); a[0] = true; return a;
}
function saveUnlocks() { try { localStorage.setItem('color_gate_unlocks', JSON.stringify(unlocks)); } catch (e) {} }
function loadEquipped() { try { return parseInt(localStorage.getItem('color_gate_skin') || '0') || 0; } catch (e) { return 0; } }
function saveEquipped() { try { localStorage.setItem('color_gate_skin', equippedSkin); } catch (e) {} }
function loadDailyBest() {
  try {
    var raw = JSON.parse(localStorage.getItem('color_gate_daily') || 'null');
    if (raw && raw.seed === todaySeed()) return raw.best | 0;
  } catch (e) {}
  return 0;
}
function saveDailyBest() {
  try { localStorage.setItem('color_gate_daily', JSON.stringify({ seed: todaySeed(), best: bestDaily })); } catch (e) {}
}
function loadTutorialSeen() { try { return localStorage.getItem('color_gate_seen_tutorial') === '1'; } catch (e) { return false; } }
function saveTutorialSeen() { try { localStorage.setItem('color_gate_seen_tutorial', '1'); seenTutorial = true; } catch (e) {} }

// ── DIFFICULTY HELPERS ────────────────────────────────────────────────────
function activeColorCount() { return Math.min(MAX_COLORS, COLOR_COUNT + Math.floor(stage / 2)); }
function spinForStage() { return BASE_SPIN + SPIN_PER_STAGE * stage; }
function gapFracForStage() { return Math.max(ARC_GAP_MIN, ARC_GAP_BASE - stage * 0.04); }

// Pick an obstacle type weighted by stage (more variety as you climb).
function pickType() {
  var r = rng();
  if (stage === 0) return OB_SINGLE;            // stage 0 teaches the basic gate
  if (stage === 1) return r < 0.6 ? OB_SINGLE : OB_LINE;
  // stage 2+: full mix
  if (r < 0.34) return OB_SINGLE;
  if (r < 0.58) return OB_LINE;
  if (r < 0.80) return OB_DOUBLE;
  return OB_CROSS;
}

// Build one obstacle in world space at worldY = wy.
function makeObstacle(wy, forceTrivial) {
  var type = forceTrivial ? OB_SINGLE : pickType();
  var nCol = forceTrivial ? 2 : activeColorCount();
  // choose which palette colors are in play (first nCol)
  var palette = [];
  for (var i = 0; i < nCol; i++) palette.push(i);
  var spin = forceTrivial ? 0.45 : spinForStage();
  var dir = rng() < 0.5 ? 1 : -1;
  var gapFrac = forceTrivial ? 0.6 : gapFracForStage();
  var rad = (type === OB_DOUBLE) ? 110 : (type === OB_CROSS) ? 96 : 92;
  var ob = {
    type: type, wy: wy, ang: rng() * Math.PI * 2, spin: spin * dir,
    radius: rad, palette: palette, gapFrac: gapFrac,
    passed: false, idx: obstacleIndex,
    // matchColor = the color the player must be to slip through this gate's gap.
    matchColor: palette[(rng() * palette.length) | 0],
  };
  if (type === OB_DOUBLE) {
    ob.innerRadius = 60;
    ob.innerAng = rng() * Math.PI * 2;
    ob.innerSpin = -spin * dir * 1.15;
    ob.innerMatch = palette[(rng() * palette.length) | 0];
  }
  return ob;
}

// ── SPAWNING ──────────────────────────────────────────────────────────────
function spawnAhead() {
  // Spawn obstacles until the cursor is comfortably above the camera top.
  var topNeed = camY - GF.H / GF.S * 1.4;
  while (spawnCursor > topNeed) {
    spawnCursor -= SPAWN_GAP;
    var trivial = (obstacleIndex === 0); // first gate is the implicit tutorial
    var ob = makeObstacle(spawnCursor, trivial);
    obstacles.push(ob);

    // pickups float in the gap between THIS obstacle and the next-spawn slot
    var midY = spawnCursor + SPAWN_GAP * 0.5;
    if (!trivial && obstacleIndex % SPLAT_EVERY === 0) {
      // a paint splat that flips the player to a NEW color present in play
      var nc = activeColorCount();
      var newCol = (ob.matchColor + 1 + ((rng() * (nc - 1)) | 0)) % nc;
      splats.push({ wx: (rng() - 0.5) * 0.4, wy: midY, color: newCol, taken: false, bob: rng() * 6.28 });
    }
    if (obstacleIndex % STAR_EVERY === 1) {
      starItems.push({ wx: (rng() - 0.5) * 0.5, wy: midY - 40, taken: false, bob: rng() * 6.28 });
    }

    // milestone band at each stage boundary
    if (obstacleIndex > 0 && obstacleIndex % STAGE_GATES === 0) {
      milestones.push({ wy: spawnCursor + SPAWN_GAP * 0.5, stage: Math.floor(obstacleIndex / STAGE_GATES) });
    }
    obstacleIndex++;
  }
}

// ── COORDINATE HELPERS ─────────────────────────────────────────────────────
// World->screen: x is centered, world x is a fraction of half-width.
function obstacleScreenX() { return GF.cx; }
function worldToScreenY(wy) { return (wy - camY) * GF.S; }
function ballScreenX() { return GF.cx + ball.wx * (GF.W * 0.5 - 40 * GF.S); }

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame(daily) {
  isDaily = !!daily;
  useSeed = isDaily;
  if (isDaily) { dailySeed = todaySeed(); rngState = dailySeed | 0; }
  height = 0; stage = 0; cleared = 0; runStars = 0;
  obstacleIndex = 0;
  obstacles.length = 0; splats.length = 0; starItems.length = 0; milestones.length = 0;
  // ball starts in world space at 0, launched upward
  ball.wy = 0; ball.wx = 0; ball.vy = -BOUNCE_IMPULSE * 0.5; ball.trail.length = 0;
  startFloorY = ball.wy;
  camPeak = ball.wy;
  camY = camPeak - (GF.H / GF.S) * 0.40;
  ball.color = 0;
  // first gate sits ~one comfortable bounce above the ball; spawnAhead fills up.
  spawnCursor = ball.wy + 30; // start just below so the first decrement lands close
  spawnAhead();
  // make sure the ball's starting color matches the FIRST (trivial) gate
  if (obstacles.length) ball.color = obstacles[0].matchColor;
  firstTapDone = false;
  tutorialOpen = false;
  deathFlash = 0; swapFlash = 0;
  reviveUsed = false; reviveLoading = false;
  _ssMode = false;
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function gameOver() {
  var metric = isDaily ? bestDaily : bestHeight;
  var newBest = height > metric;
  if (isDaily) {
    if (newBest) { bestDaily = Math.floor(height); saveDailyBest(); }
  } else {
    if (newBest) { bestHeight = Math.floor(height); saveBest(); }
  }
  // credit stars collected this run
  stars += runStars; saveStars();
  gs = 'GAMEOVER';
  GF.gameEnded();
  GF.saveRun();
  if (newBest && height > 0) GF.happytime();
}

function doBounce() {
  if (gs !== 'PLAYING' || tutorialOpen || _ssMode) return;
  ball.vy = -BOUNCE_IMPULSE;
  firstTapDone = true;
  GF.spawnParticles(ballScreenX(), worldToScreenY(ball.wy) + BALL_RADIUS * GF.S, COLORS[ball.color], 4);
}

window.__lastDeath = null;
function die() {
  if (_ssMode) return;
  deathFlash = 0.5;
  GF.setShake(0.6);
  GF.spawnParticles(ballScreenX(), worldToScreenY(ball.wy), COLORS[ball.color], 30);
  GF.spawnParticles(ballScreenX(), worldToScreenY(ball.wy), '#ffffff', 14);
  gameOver();
}

// ── ADS (Yandex) - all triggers user-initiated ───────────────────────────
function showInterstitial(onDone) {
  var now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  if (now - lastInterstitialMs < INTERSTITIAL_GAP_MS) { if (onDone) onDone(); return; }
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showFullscreenAdv) { if (onDone) onDone(); return; }
  lastInterstitialMs = now;
  // No-fill watchdog: on no ad (always true in draft/preview) the SDK fires NO
  // callback, so onDone would never run and the caller could hang. Resume after
  // 4.5s unless the ad actually opened. (Yandex Rejection Patterns 4.5/1.14)
  var done = false, opened = false;
  var finish = function() { if (done) return; done = true; if (onDone) onDone(); };
  var watchdog = setTimeout(function() { if (!opened) finish(); }, 4500);
  try {
    window.ysdk.adv.showFullscreenAdv({ callbacks: {
      onOpen:  function() { opened = true; },
      onClose: function() { clearTimeout(watchdog); finish(); },
      onError: function() { clearTimeout(watchdog); finish(); },
    }});
  } catch (e) { clearTimeout(watchdog); finish(); }
}
function showRewardedRevive() {
  if (reviveUsed || reviveLoading) return;
  reviveLoading = true;
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showRewardedVideo) {
    reviveLoading = false; doRevive(); return; // local/gallery: grant so it's testable
  }
  var rewarded = false, opened = false, done = false;
  // No-fill watchdog: if the ad never opens, neither onClose nor onError fires,
  // so reviveLoading would stick true and the Revive button would stay dead
  // forever. Unstick after 4.5s unless the ad actually opened (4.5/1.14).
  var finish = function() { if (done) return; done = true; reviveLoading = false; if (rewarded) doRevive(); };
  var watchdog = setTimeout(function() { if (!opened) finish(); }, 4500);
  try {
    window.ysdk.adv.showRewardedVideo({ callbacks: {
      onOpen:     function() { opened = true; },
      onRewarded: function() { rewarded = true; },
      onClose:    function() { clearTimeout(watchdog); finish(); },
      onError:    function() { clearTimeout(watchdog); finish(); },
    }});
  } catch (e) { clearTimeout(watchdog); finish(); }
}
function doRevive() {
  reviveUsed = true;
  // clear nearby obstacles so the player gets a fair breath, keep height/stage
  ball.vy = -BOUNCE_IMPULSE * 0.6;
  for (var i = obstacles.length - 1; i >= 0; i--) {
    if (Math.abs(obstacles[i].wy - ball.wy) < SPAWN_GAP * 1.2) obstacles.splice(i, 1);
  }
  // re-color the ball to the next gate above
  var next = nextGateAbove();
  if (next) ball.color = next.matchColor;
  deathFlash = 0;
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function nextGateAbove() {
  var best = null, bd = 1e9;
  for (var i = 0; i < obstacles.length; i++) {
    var o = obstacles[i];
    if (o.passed) continue;
    var d = ball.wy - o.wy;        // positive = obstacle is above
    if (d > 0 && d < bd) { bd = d; best = o; }
  }
  return best;
}

// ── SKINS ──────────────────────────────────────────────────────────────────
function buySkin(i) {
  if (unlocks[i]) { equippedSkin = i; saveEquipped(); return; }
  if (stars >= SKINS[i].cost) {
    stars -= SKINS[i].cost; saveStars();
    unlocks[i] = true; saveUnlocks();
    equippedSkin = i; saveEquipped();
    GF.spawnFloat(GF.cx, GF.cy, '-' + SKINS[i].cost + ' ★', '#ffd54f');
  }
}

// ── ARC COLLISION ───────────────────────────────────────────────────────────
// For a ring whose covered region is split into arcs (everything except a gap
// of width gapFrac centered on the matching-color arc), determine whether the
// ball at angle `a` (relative to ring center) is in the SAFE gap or hitting a
// solid colored arc. Returns the color index of the arc hit, or -1 if in gap.
// Color-Switch rule: the ring is split into equal colored arcs (one per active
// palette color). The ball passes freely through an arc of ITS OWN color and
// dies on any other color. So the color you currently are = your opening. The
// matchColor field marks the SUGGESTED color to be (used by the hint + the
// glow), but collision is purely "touch your own color = safe". Returns the
// color index of the arc at angle `a` (relative to the ring's center).
function arcHitColor(ob, a) {
  var nSlots = ob.palette.length;
  var slotW = (Math.PI * 2) / nSlots;
  var rel = ((a - ob.ang) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  var slot = Math.floor(rel / slotW) % nSlots;
  return ob.palette[slot];
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  pulseT += dt;
  bgScroll += dt;
  if (deathFlash > 0) deathFlash = Math.max(0, deathFlash - dt);
  if (swapFlash > 0) swapFlash = Math.max(0, swapFlash - dt);
  if (gs !== 'PLAYING' || tutorialOpen || _ssMode) return;

  var S = GF.S;

  // physics (work in design-space units, then * S where drawn)
  ball.vy += GRAVITY * dt;
  if (ball.vy > MAX_FALL) ball.vy = MAX_FALL;
  ball.wy += ball.vy * dt;

  // spin obstacles
  for (var i = 0; i < obstacles.length; i++) {
    var o = obstacles[i];
    o.ang += o.spin * dt;
    if (o.type === OB_DOUBLE) o.innerAng += o.innerSpin * dt;
  }

  // camera tracks the ball's highest point so the ball sits near 60% of the
  // screen and the next gate is always visible above. We track the ball's
  // MIN wy (its peak), not its live wy, so a fall doesn't scroll the view back
  // down - the ball drops toward the bottom (losing ground) while the gates
  // it already cleared stay above. This keeps gates reliably descending toward
  // the ball as it climbs (decoupled from the bob).
  if (ball.wy < camPeak) camPeak = ball.wy;
  camY = camPeak - (GF.H / S) * 0.40;

  // height = how far above the start floor (design px -> meters /10)
  var climbed = Math.max(0, (startFloorY - ball.wy) / 10);
  if (climbed > height) height = climbed;

  spawnAhead();

  // trail
  ball.trail.push({ x: ballScreenX(), y: worldToScreenY(ball.wy) });
  if (ball.trail.length > 12) ball.trail.shift();

  // fell off the bottom of the play field -> die
  var ballScrY = worldToScreenY(ball.wy);
  if (ballScrY > GF.H + BALL_RADIUS * S * 2) { die(); return; }

  // collisions with obstacles.
  // The ball travels straight up the vertical centerline, so it crosses each
  // ring at exactly ONE point: the ring's BOTTOM edge (screen angle +PI/2) as
  // it enters from below. We test the gap/arc color at that single crossing
  // point. Each obstacle is checked ONCE (the frame the ball's center first
  // enters the ring's contact band from below); after the center passes the
  // ring center it is "through" and can never be killed on the way out. This
  // is the Color-Switch contract: line up the gap at the bottom, slip through.
  var bx = ballScreenX(), by = ballScrY;
  var cx = obstacleScreenX();
  var bottomAngle = Math.PI / 2; // ring bottom in screen space (+y down)
  for (var k = 0; k < obstacles.length; k++) {
    var ob = obstacles[k];
    var oy = worldToScreenY(ob.wy);
    // distance from ball to ring center (ball is ~on the centerline)
    var dy = by - oy;                       // >0 when ball is below the ring
    var distC = Math.abs(dy);               // vertical distance to ring center
    var dyInner = ob.type === OB_DOUBLE ? distC : 0;

    // single-point contact test at the ring's BOTTOM edge, fired once, only
    // while the ball is still BELOW the ring center and entering the band.
    if (!ob.passed && !ob.hit && dy > -RING_THICKNESS * S) {
      var killColor = -1;
      if (ob.type === OB_LINE) {
        if (Math.abs(distC - ob.radius * S) <= (CONTACT_BAND + RING_THICKNESS * 0.4) * S)
          killColor = arcHitColor(ob, bottomAngle);
      } else if (ob.type === OB_CROSS) {
        if (Math.abs(distC - ob.radius * S) <= (CONTACT_BAND + 14) * S)
          killColor = crossHitColor(ob, bottomAngle, distC);
      } else { // SINGLE / DOUBLE
        if (Math.abs(distC - ob.radius * S) <= CONTACT_BAND * S)
          killColor = arcHitColor(ob, bottomAngle);
        else if (ob.type === OB_DOUBLE && Math.abs(distC - ob.innerRadius * S) <= CONTACT_BAND * S)
          killColor = arcHitColorInner(ob, bottomAngle);
      }
      if (killColor >= 0) {
        if (killColor !== ball.color) {
          window.__lastDeath = { type: ob.type, wy: ob.wy, killColor: killColor, ballColor: ball.color };
          die();
          return;
        }
        // matched the bottom arc/gap-edge color -> safe contact, lock so the
        // ball can't be re-killed by the same ring as it continues up.
        ob.hit = true;
      }
    }

    if (!ob.passed && ball.wy < ob.wy - 6) {
      // ball center has risen above the ring center -> it is through; pass it.
      ob.passed = true;
      cleared++;
      GF.spawnFloat(cx, oy, '+' + Math.max(1, Math.round(SPAWN_GAP / 10)) + 'm', COLORS[ball.color]);
      GF.spawnParticles(cx, oy, COLORS[ob.matchColor], 8);
      var ns = Math.floor(cleared / STAGE_GATES);
      if (ns > stage) { stage = ns; GF.setShake(0.25); }
      GF.saveRun();
    }
  }

  // pickups: paint splats (color swap)
  for (var s = 0; s < splats.length; s++) {
    var sp = splats[s];
    if (sp.taken) continue;
    var spx = cx + sp.wx * (GF.W * 0.5 - 40 * S);
    var spy = worldToScreenY(sp.wy);
    if (GF.dist(bx, by, spx, spy) <= (BALL_RADIUS + 18) * S) {
      sp.taken = true;
      ball.color = sp.color;
      swapFlash = 0.35;
      GF.spawnParticles(spx, spy, COLORS[sp.color], 16);
      GF.spawnFloat(spx, spy - 14 * S, '●', COLORS[sp.color]);
    }
  }
  // pickups: stars
  for (var t = 0; t < starItems.length; t++) {
    var st = starItems[t];
    if (st.taken) continue;
    var stx = cx + st.wx * (GF.W * 0.5 - 40 * S);
    var sty = worldToScreenY(st.wy);
    if (GF.dist(bx, by, stx, sty) <= (BALL_RADIUS + 18) * S) {
      st.taken = true; runStars++;
      GF.spawnParticles(stx, sty, '#ffd54f', 14);
      GF.spawnFloat(stx, sty - 14 * S, '★', '#ffd54f');
    }
  }

  // cull off-screen-below objects (memory)
  var cullY = camY + (GF.H / S) + SPAWN_GAP;
  for (var c = obstacles.length - 1; c >= 0; c--) if (obstacles[c].wy > cullY) obstacles.splice(c, 1);
  for (var c2 = splats.length - 1; c2 >= 0; c2--) if (splats[c2].wy > cullY || splats[c2].taken) splats.splice(c2, 1);
  for (var c3 = starItems.length - 1; c3 >= 0; c3--) if (starItems[c3].wy > cullY || starItems[c3].taken) starItems.splice(c3, 1);
  for (var c4 = milestones.length - 1; c4 >= 0; c4--) if (milestones[c4].wy > cullY) milestones.splice(c4, 1);
}

function crossHitColor(ob, ang, d) {
  // 4 blades at ob.ang + k*pi/2; each blade is a wedge of half-width ~0.34 rad.
  // matching color blade is the one == matchColor; ALL blades are solid colored.
  if (d > (ob.radius + CONTACT_BAND) * GF.S) return -2;
  var rel = ((ang - ob.ang) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  for (var b = 0; b < 4; b++) {
    var center = b * (Math.PI / 2);
    var diff = Math.abs(((rel - center) % (Math.PI * 2) + Math.PI * 3) % (Math.PI * 2) - Math.PI);
    if (diff < 0.36) {
      // blade colors cycle through palette
      return ob.palette[b % ob.palette.length];
    }
  }
  return -1; // between blades = safe lane
}

function arcHitColorInner(ob, a) {
  var nSlots = ob.palette.length;
  var slotW = (Math.PI * 2) / nSlots;
  var rel = ((a - ob.innerAng) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  var slot = Math.floor(rel / slotW) % nSlots;
  return ob.palette[slot];
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  drawBackground(ctx);

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawMilestones(ctx);
    drawObstacles(ctx);
    drawPickups(ctx);
    drawBall(ctx);
  }
  if (gs === 'PLAYING') {
    drawHUD(ctx);
    if (!firstTapDone) drawTapPrompt(ctx);
    if (tutorialOpen) drawTutorialPanel(ctx);
  }
  if (deathFlash > 0) { ctx.fillStyle = 'rgba(255,60,80,' + (deathFlash * 0.5) + ')'; ctx.fillRect(0, 0, GF.W, GF.H); }
  if (swapFlash > 0) { ctx.fillStyle = 'rgba(255,255,255,' + (swapFlash * 0.25) + ')'; ctx.fillRect(0, 0, GF.W, GF.H); }

  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'SKINS') drawSkins(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
}

function drawBackground(ctx) {
  var g = ctx.createLinearGradient(0, 0, 0, GF.H);
  g.addColorStop(0, '#181838');
  g.addColorStop(0.55, '#0e0e22');
  g.addColorStop(1, '#08080f');
  ctx.fillStyle = g; ctx.fillRect(0, 0, GF.W, GF.H);
  // faint parallax dot field scrolling down as we climb
  var off = ((camY * GF.S) * -0.25) % (60 * GF.S);
  ctx.fillStyle = 'rgba(150,170,230,0.07)';
  var step = 60 * GF.S;
  for (var y = -step; y < GF.H + step; y += step) {
    for (var x = step * 0.5; x < GF.W; x += step) {
      ctx.beginPath();
      ctx.arc(x + (((y / step) | 0) % 2) * step * 0.5, y + off, 1.6 * GF.S, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawMilestones(ctx) {
  for (var i = 0; i < milestones.length; i++) {
    var m = milestones[i];
    var y = worldToScreenY(m.wy);
    if (y < -30 || y > GF.H + 30) continue;
    ctx.strokeStyle = 'rgba(180,200,255,0.20)';
    ctx.lineWidth = 1.5; ctx.setLineDash([8 * GF.S, 8 * GF.S]);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GF.W, y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.font = 'bold ' + GF.clamp(13 * GF.S, 10, 18) + 'px sans-serif';
    ctx.fillStyle = 'rgba(180,200,255,0.55)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('stage') + ' ' + (m.stage + 1), GF.cx, y - 12 * GF.S);
  }
}

// Draw a colored ring as equal solid arcs (one per active palette color). The
// arc matching the BALL's current color is YOUR safe opening - pass through it
// and die on any other color. We glow + thicken that arc and dim the rest so
// the "slip through your color" goal is unmistakable (requirement #1).
function drawRing(ctx, cx, cy, radius, ang, palette, safeColor, gapFrac, isInner) {
  var nSlots = palette.length;
  var slotW = (Math.PI * 2) / nSlots;
  var lw = (isInner ? RING_THICKNESS * 0.85 : RING_THICKNESS) * GF.S;
  for (var s = 0; s < nSlots; s++) {
    var col = palette[s];
    var a0 = ang + s * slotW + 0.04;   // tiny seam so adjacent arcs read distinctly
    var a1 = a0 + slotW - 0.08;
    var isSafe = (col === safeColor);
    if (isSafe) {
      // bright, thicker, glowing - this is the slot the player threads
      ctx.beginPath(); ctx.arc(cx, cy, radius * GF.S, a0, a1);
      ctx.strokeStyle = COLORS[col]; ctx.lineWidth = lw * 1.25;
      ctx.lineCap = 'round';
      ctx.shadowColor = COLORS[col]; ctx.shadowBlur = 14 * GF.S;
      ctx.stroke(); ctx.shadowBlur = 0;
    } else {
      // dimmer wall - still clearly its color so the player can plan a swap
      strokeArc(ctx, cx, cy, radius * GF.S, a0, a1, COLORS[col], COLOR_DK[col], lw);
    }
  }
}

function strokeArc(ctx, cx, cy, r, a0, a1, col, dk, lw) {
  ctx.beginPath();
  ctx.arc(cx, cy, r, a0, a1);
  ctx.strokeStyle = col;
  ctx.lineWidth = lw;
  ctx.lineCap = 'butt';
  ctx.shadowColor = col; ctx.shadowBlur = 6 * GF.S;
  ctx.stroke();
  ctx.shadowBlur = 0;
  // inner darker edge for a glossy, tactile read
  ctx.beginPath();
  ctx.arc(cx, cy, r - lw * 0.32, a0, a1);
  ctx.strokeStyle = dk;
  ctx.lineWidth = lw * 0.34;
  ctx.stroke();
}


function drawObstacles(ctx) {
  var cx = obstacleScreenX();
  for (var i = 0; i < obstacles.length; i++) {
    var ob = obstacles[i];
    var cy = worldToScreenY(ob.wy);
    if (cy < -ob.radius * GF.S - 60 || cy > GF.H + ob.radius * GF.S + 60) continue;

    if (ob.type === OB_LINE) {
      drawLineBar(ctx, cx, cy, ob);
    } else if (ob.type === OB_CROSS) {
      drawCross(ctx, cx, cy, ob);
    } else {
      drawRing(ctx, cx, cy, ob.radius, ob.ang, ob.palette, ball.color, ob.gapFrac, false);
      if (ob.type === OB_DOUBLE) {
        drawRing(ctx, cx, cy, ob.innerRadius, ob.innerAng, ob.palette, ball.color, ob.gapFrac, true);
      }
    }
    // center hub dot
    ctx.beginPath(); ctx.arc(cx, cy, 4 * GF.S, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,210,255,0.35)'; ctx.fill();
  }
}

// Line bar = a spinning ring band of solid colored arcs; the ball-color arc is
// the safe slot. (Visually distinct from single via fewer, wider segments.)
function drawLineBar(ctx, cx, cy, ob) {
  drawRing(ctx, cx, cy, ob.radius, ob.ang, ob.palette, ball.color, ob.gapFrac, false);
}

function drawCross(ctx, cx, cy, ob) {
  var lw = RING_THICKNESS * 1.5 * GF.S;
  var len = ob.radius * GF.S;
  for (var b = 0; b < 4; b++) {
    var a = ob.ang + b * (Math.PI / 2);
    var col = ob.palette[b % ob.palette.length];
    var ex = cx + Math.cos(a) * len, ey = cy + Math.sin(a) * len;
    ctx.beginPath();
    ctx.moveTo(cx, cy); ctx.lineTo(ex, ey);
    ctx.strokeStyle = COLORS[col]; ctx.lineWidth = lw; ctx.lineCap = 'round';
    ctx.shadowColor = COLORS[col]; ctx.shadowBlur = 6 * GF.S; ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.beginPath(); ctx.arc(cx, cy, lw * 0.5, 0, Math.PI * 2);
  ctx.fillStyle = '#1a1a2e'; ctx.fill();
}

function drawPickups(ctx) {
  var cx = obstacleScreenX();
  for (var s = 0; s < splats.length; s++) {
    var sp = splats[s]; if (sp.taken) continue;
    var x = cx + sp.wx * (GF.W * 0.5 - 40 * GF.S);
    var y = worldToScreenY(sp.wy) + Math.sin(pulseT * 3 + sp.bob) * 4 * GF.S;
    if (y < -30 || y > GF.H + 30) continue;
    var r = 13 * GF.S;
    // blobby splat
    ctx.fillStyle = COLORS[sp.color];
    ctx.shadowColor = COLORS[sp.color]; ctx.shadowBlur = 12 * GF.S;
    ctx.beginPath();
    for (var k = 0; k < 9; k++) {
      var a = (Math.PI * 2 / 9) * k;
      var rr = r * (0.78 + 0.32 * Math.sin(a * 3 + sp.bob));
      var px = x + Math.cos(a) * rr, py = y + Math.sin(a) * rr;
      if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.arc(x - r * 0.3, y - r * 0.3, r * 0.28, 0, Math.PI * 2); ctx.fill();
  }
  for (var t = 0; t < starItems.length; t++) {
    var st = starItems[t]; if (st.taken) continue;
    var sx = cx + st.wx * (GF.W * 0.5 - 40 * GF.S);
    var sy = worldToScreenY(st.wy) + Math.sin(pulseT * 3 + st.bob) * 4 * GF.S;
    if (sy < -30 || sy > GF.H + 30) continue;
    drawStar(ctx, sx, sy, 12 * GF.S, '#ffd54f');
  }
}

function drawStar(ctx, x, y, r, col) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 10 * GF.S;
  ctx.beginPath();
  for (var i = 0; i < 10; i++) {
    var a = -Math.PI / 2 + i * Math.PI / 5;
    var rr = (i % 2 === 0) ? r : r * 0.45;
    var px = Math.cos(a) * rr, py = Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore(); ctx.shadowBlur = 0;
}

function drawBall(ctx) {
  var x = ballScreenX();
  var y = worldToScreenY(ball.wy);
  var r = BALL_RADIUS * GF.S;
  var skin = SKINS[equippedSkin];
  // trail
  for (var i = 0; i < ball.trail.length; i++) {
    var tp = ball.trail[i];
    var a = i / ball.trail.length;
    ctx.globalAlpha = a * 0.4;
    ctx.fillStyle = COLORS[ball.color];
    ctx.beginPath(); ctx.arc(tp.x, tp.y, r * (0.4 + a * 0.5), 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // outer colored halo = the ball's CURRENT GATE COLOR (the load-bearing read)
  ctx.beginPath(); ctx.arc(x, y, r + 5 * GF.S, 0, Math.PI * 2);
  ctx.fillStyle = COLORS[ball.color];
  ctx.shadowColor = COLORS[ball.color]; ctx.shadowBlur = 16 * GF.S;
  ctx.fill(); ctx.shadowBlur = 0;
  // ball body (skin core)
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = skin.ball; ctx.fill();
  // colored inner ring so color is readable even with a white core
  ctx.beginPath(); ctx.arc(x, y, r * 0.62, 0, Math.PI * 2);
  ctx.fillStyle = COLORS[ball.color]; ctx.fill();
  // gloss
  ctx.beginPath(); ctx.arc(x - r * 0.32, y - r * 0.34, r * 0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fill();
}

// ── HUD ──────────────────────────────────────────────────────────────────
var helpBtn = null;
function drawHUD(ctx) {
  var fs = GF.clamp(18 * GF.S, 14, 26);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textBaseline = 'top';
  // height top-left
  ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
  ctx.fillText(Math.floor(height) + ' m', 14 * GF.S, 14 * GF.S);
  // stage + required color swatch top-center
  ctx.textAlign = 'center'; ctx.fillStyle = '#bcd';
  ctx.font = 'bold ' + GF.clamp(14 * GF.S, 11, 20) + 'px sans-serif';
  ctx.fillText(GF.t('stage') + ' ' + (stage + 1), GF.cx, 16 * GF.S);
  // color swatch under the stage label
  var sw = GF.clamp(22 * GF.S, 18, 30);
  var swx = GF.cx - sw / 2, swy = 16 * GF.S + fs + 4 * GF.S;
  GF.rr(ctx, swx, swy, sw, sw, 6 * GF.S);
  ctx.fillStyle = COLORS[ball.color];
  ctx.shadowColor = COLORS[ball.color]; ctx.shadowBlur = 8 * GF.S; ctx.fill(); ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2; ctx.stroke();

  // stars chip + help button top-right
  var rightPad = 14 * GF.S;
  var helpSz = GF.clamp(34 * GF.S, 28, 46);
  helpBtn = { x: GF.W - rightPad - helpSz, y: 12 * GF.S, w: helpSz, h: helpSz };
  GF.rr(ctx, helpBtn.x, helpBtn.y, helpBtn.w, helpBtn.h, 8 * GF.S);
  ctx.fillStyle = 'rgba(40,48,80,0.85)'; ctx.fill();
  ctx.strokeStyle = 'rgba(160,180,230,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#cfe';
  ctx.font = 'bold ' + (helpSz * 0.55) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', helpBtn.x + helpSz / 2, helpBtn.y + helpSz / 2 + 1);
  // stars chip left of help
  ctx.font = 'bold ' + GF.clamp(15 * GF.S, 12, 21) + 'px sans-serif';
  ctx.fillStyle = '#ffd54f'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillText('★ ' + (stars + runStars), helpBtn.x - 10 * GF.S, helpBtn.y + helpSz / 2);
  ctx.textBaseline = 'top';
}

function drawTapPrompt(ctx) {
  var pulse = 0.55 + 0.45 * Math.sin(pulseT * 5);
  ctx.font = 'bold ' + GF.clamp(20 * GF.S, 15, 28) + 'px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,' + (0.6 + 0.4 * pulse) + ')';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('tap_to_climb'), GF.cx, GF.H * 0.5);
  // a hint of the goal: which color to slip through next
  var ng = nextGateAbove();
  if (ng) {
    ctx.font = GF.clamp(14 * GF.S, 11, 19) + 'px sans-serif';
    ctx.fillStyle = COLORS[ng.matchColor];
    var label = GF.t('match_hint').replace('%c', GF.t(COLOR_KEY[ng.matchColor]));
    ctx.fillText(label, GF.cx, GF.H * 0.5 + 30 * GF.S);
  }
}

// ── BUTTON HELPER ──────────────────────────────────────────────────────────
var uiButtons = [];
var uiLockUntil = 0;
function drawButton(ctx, x, y, w, h, label, fn, opts) {
  opts = opts || {};
  var enabled = opts.enabled !== false;
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  if (!enabled) { grad.addColorStop(0, '#3a3f52'); grad.addColorStop(1, '#2b2f3e'); }
  else if (opts.accent === 'gold') { grad.addColorStop(0, '#ffca28'); grad.addColorStop(1, '#ffa000'); }
  else if (opts.accent === 'ghost') { grad.addColorStop(0, 'rgba(60,70,100,0.6)'); grad.addColorStop(1, 'rgba(40,48,72,0.6)'); }
  else { grad.addColorStop(0, '#42a5f5'); grad.addColorStop(1, '#1e88e5'); }
  GF.rr(ctx, x, y, w, h, Math.min(h / 2, 16 * GF.S));
  ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = enabled ? (opts.accent === 'gold' ? '#3a2a00' : '#fff') : '#7a8096';
  ctx.font = 'bold ' + GF.clamp((opts.fs || 18) * GF.S, 13, 24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1);
  ctx.textBaseline = 'alphabetic';
  if (enabled && fn) uiButtons.push({ x: x, y: y, w: w, h: h, fn: fn });
}

function _wrapTextLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var test = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width <= maxW || !cur) cur = test;
    else { lines.push(cur); cur = words[i]; }
  }
  if (cur) lines.push(cur);
  return lines;
}

// ── MENU ───────────────────────────────────────────────────────────────────
function drawMenu(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(10,10,24,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(42 * GF.S, 28, 60);
  ctx.shadowColor = 'rgba(80,180,255,0.5)'; ctx.shadowBlur = 26 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  var topY = GF.clamp(GF.H * 0.11, 46, 130);
  ctx.fillText(GF.t('title'), GF.cx, topY);
  ctx.shadowBlur = 0;

  // mini color-ring motif under title (visual goal cue)
  drawMenuRing(ctx, GF.cx, topY + titleFs * 0.7);

  ctx.font = GF.clamp(14 * GF.S, 11, 19) + 'px sans-serif';
  ctx.fillStyle = '#8fb';
  ctx.fillText(GF.t('sub'), GF.cx, topY + titleFs * 0.7 + 52 * GF.S);

  var bodyFs = GF.clamp(13 * GF.S, 11, 16);
  ctx.font = bodyFs + 'px sans-serif';
  var maxW = Math.min(GF.W * 0.88, 470 * GF.S);
  var lineH = bodyFs * 1.32;
  var blockGap = bodyFs * 0.5;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var y = topY + titleFs * 0.7 + 52 * GF.S + GF.clamp(22 * GF.S, 14, 32);
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (var k = 0; k < keys.length; k++) {
    var lines = _wrapTextLines(ctx, GF.t(keys[k]), maxW);
    ctx.fillStyle = (keys[k] === 'tut_tip') ? '#ffd54f' : '#cdd6ea';
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], GF.cx, y); y += lineH; }
    y += blockGap;
  }

  var isWide = GF.W / GF.H > 1.15;
  var baseBtnW = GF.clamp(230 * GF.S, 180, 300), baseBtnH = GF.clamp(54 * GF.S, 50, 64);
  var btnW = baseBtnW, btnH = baseBtnH;
  var gapY = 11 * GF.S;
  var stackH = btnH * 3 + gapY * 2;
  // lift PLAY into empty space on wide; secondary buttons follow immediately below
  var clearMargin = (isWide ? baseBtnH * 1.4 : baseBtnH) / 2 + 16;
  var wideFloor = GF.H * 0.52;
  var btnY = isWide
    ? Math.max(y + clearMargin, wideFloor)
    : Math.min(y + 8 * GF.S, GF.H - stackH - 36 * GF.S);
  var btnX = GF.cx - btnW / 2;

  // PLAY button: enlarged + animated on wide; stable hit-rect always base size
  if (isWide) {
    var playW = baseBtnW * 1.4, playH = baseBtnH * 1.4;
    var pulse = 1 + 0.05 * Math.sin(performance.now() / 1000 * 2.2);
    var drawW = playW * pulse, drawH = playH * pulse;
    var drawX = GF.cx - drawW / 2, drawY = btnY + (playH - drawH) / 2;
    ctx.save();
    ctx.shadowColor = 'rgba(66,165,245,0.55)'; ctx.shadowBlur = 18 + 10 * Math.sin(performance.now() / 1000 * 2.2);
    var grad = ctx.createLinearGradient(drawX, drawY, drawX, drawY + drawH);
    grad.addColorStop(0, '#42a5f5'); grad.addColorStop(1, '#1e88e5');
    GF.rr(ctx, drawX, drawY, drawW, drawH, Math.min(drawH / 2, 16 * GF.S));
    ctx.fillStyle = grad; ctx.fill();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + GF.clamp(18 * GF.S * 1.3, 18, 28) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('play'), GF.cx, btnY + playH / 2 + 1);
    ctx.restore();
    ctx.textBaseline = 'alphabetic';
    // register stable hit-rect (base size)
    uiButtons.push({ x: btnX, y: btnY, w: baseBtnW, h: baseBtnH, fn: function() { saveTutorialSeen(); startGame(false); } });
    // secondary buttons below the enlarged play button
    var sec1Y = btnY + playH + gapY;
    drawButton(ctx, btnX, sec1Y, btnW, btnH, GF.t('daily'), function() { saveTutorialSeen(); startGame(true); }, { accent: 'ghost' });
    drawButton(ctx, btnX, sec1Y + btnH + gapY, btnW, btnH, GF.t('skins'), function() { gs = 'SKINS'; }, { accent: 'ghost' });
    var ry = sec1Y + btnH + gapY + btnH + 20 * GF.S;
    ctx.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
    ctx.fillStyle = '#88a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('best') + ': ' + bestHeight + ' m   ★ ' + stars, GF.cx, ry);
  } else {
    drawButton(ctx, btnX, btnY, btnW, btnH, GF.t('play'), function() { saveTutorialSeen(); startGame(false); });
    drawButton(ctx, btnX, btnY + btnH + gapY, btnW, btnH, GF.t('daily'), function() { saveTutorialSeen(); startGame(true); }, { accent: 'ghost' });
    drawButton(ctx, btnX, btnY + (btnH + gapY) * 2, btnW, btnH, GF.t('skins'), function() { gs = 'SKINS'; }, { accent: 'ghost' });
    ctx.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
    ctx.fillStyle = '#88a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    var ry = btnY + stackH + 20 * GF.S;
    var line = GF.t('best') + ': ' + bestHeight + ' m   ★ ' + stars;
    ctx.fillText(line, GF.cx, ry);
  }
}

function drawMenuRing(ctx, cx, cy) {
  var r = 30 * GF.S;
  var pal = [0, 1, 2];
  var slotW = (Math.PI * 2) / pal.length;
  var ang = pulseT * 0.8;
  for (var s = 0; s < pal.length; s++) {
    var a0 = ang + s * slotW, a1 = a0 + slotW;
    if (pal[s] === 0) { // gap on red slot
      var gapW = slotW * 0.55, st = a0 + (slotW - gapW) / 2;
      strokeArc(ctx, cx, cy, r, a0, st, COLORS[0], COLOR_DK[0], 8 * GF.S);
      strokeArc(ctx, cx, cy, r, st + gapW, a1, COLORS[0], COLOR_DK[0], 8 * GF.S);
    } else strokeArc(ctx, cx, cy, r, a0, a1, COLORS[pal[s]], COLOR_DK[pal[s]], 8 * GF.S);
  }
  // little red ball aimed at the gap
  ctx.beginPath(); ctx.arc(cx, cy + r + 14 * GF.S, 7 * GF.S, 0, Math.PI * 2);
  ctx.fillStyle = COLORS[0]; ctx.shadowColor = COLORS[0]; ctx.shadowBlur = 10 * GF.S; ctx.fill(); ctx.shadowBlur = 0;
}

// ── SKINS SCREEN ─────────────────────────────────────────────────────────
function drawSkins(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(10,10,24,0.96)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(30 * GF.S, 22, 42);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var topY = GF.clamp(GF.H * 0.07, 28, 80);
  ctx.fillText(GF.t('skins'), GF.cx, topY);
  ctx.font = 'bold ' + GF.clamp(16 * GF.S, 13, 22) + 'px sans-serif';
  ctx.fillStyle = '#ffd54f'; ctx.textBaseline = 'middle';
  ctx.fillText('★ ' + stars, GF.cx, topY + titleFs + 12 * GF.S);

  var rowH = GF.clamp(66 * GF.S, 54, 84);
  var rowW = Math.min(GF.W * 0.9, 440 * GF.S);
  var rowX = GF.cx - rowW / 2;
  var y = topY + titleFs + 34 * GF.S;
  for (var i = 0; i < SKINS.length; i++) {
    var sk = SKINS[i];
    GF.rr(ctx, rowX, y, rowW, rowH, 12 * GF.S);
    ctx.fillStyle = 'rgba(30,36,58,0.9)'; ctx.fill();
    ctx.strokeStyle = (equippedSkin === i) ? '#3ddc84' : 'rgba(120,140,200,0.25)';
    ctx.lineWidth = (equippedSkin === i) ? 2.5 : 1; ctx.stroke();
    // ball preview
    var bx = rowX + rowH * 0.5, by = y + rowH / 2, br = rowH * 0.26;
    ctx.beginPath(); ctx.arc(bx, by, br + 3 * GF.S, 0, Math.PI * 2);
    ctx.fillStyle = COLORS[0]; ctx.globalAlpha = 0.7; ctx.fill(); ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fillStyle = sk.ball; ctx.fill();
    ctx.beginPath(); ctx.arc(bx - br * 0.3, by - br * 0.3, br * 0.28, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fill();
    // name
    ctx.font = 'bold ' + GF.clamp(15 * GF.S, 12, 20) + 'px sans-serif';
    ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(sk.key.toUpperCase(), rowX + rowH + 6 * GF.S, by);
    // button
    var bW = GF.clamp(96 * GF.S, 78, 130), bH = GF.clamp(40 * GF.S, 36, 52);
    var bX = rowX + rowW - bW - 12 * GF.S, bY = y + (rowH - bH) / 2;
    var label, accent, enabled = true, fn;
    if (equippedSkin === i) { label = GF.t('equipped'); accent = 'ghost'; enabled = false; fn = null; }
    else if (unlocks[i]) { label = GF.t('equip'); accent = undefined; fn = (function(idx) { return function() { buySkin(idx); }; })(i); }
    else if (stars >= sk.cost) { label = GF.t('cost_star').replace('%n', sk.cost); accent = 'gold'; fn = (function(idx) { return function() { buySkin(idx); }; })(i); }
    else { label = GF.t('cost_star').replace('%n', sk.cost); accent = 'ghost'; enabled = false; fn = null; }
    drawButton(ctx, bX, bY, bW, bH, label, fn, { accent: accent, enabled: enabled, fs: 15 });
    y += rowH + 10 * GF.S;
  }
  var backW = GF.clamp(190 * GF.S, 150, 260), backH = GF.clamp(54 * GF.S, 50, 64);
  drawButton(ctx, GF.cx - backW / 2, Math.min(y + 6 * GF.S, GF.H - backH - 18 * GF.S), backW, backH,
    GF.t('back'), function() { gs = 'MENU'; }, { accent: 'ghost' });
}

// ── GAME OVER ──────────────────────────────────────────────────────────────
function drawGameOver(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(10,8,18,0.9)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(36 * GF.S, 22, 54);
  ctx.shadowColor = 'rgba(255,82,82,0.4)'; ctx.shadowBlur = 24 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var topY = GF.H * 0.24;
  ctx.fillText(GF.t('gameover'), GF.cx, topY);
  ctx.shadowBlur = 0;

  var subFs = GF.clamp(17 * GF.S, 13, 23);
  ctx.font = subFs + 'px sans-serif'; ctx.fillStyle = '#bcd';
  ctx.fillText(GF.t('reached') + ': ' + Math.floor(height) + ' m', GF.cx, topY + titleFs * 0.85);
  ctx.fillStyle = '#ffd54f'; ctx.font = 'bold ' + subFs + 'px sans-serif';
  ctx.fillText(GF.t('earned').replace('%n', runStars), GF.cx, topY + titleFs * 0.85 + subFs * 1.5);

  var btnW = GF.clamp(230 * GF.S, 180, 300), btnH = GF.clamp(52 * GF.S, 48, 62), gapY = 11 * GF.S;
  var items = [];
  if (!reviveUsed) items.push({ l: GF.t('revive'), f: showRewardedRevive, o: { accent: 'gold', enabled: !reviveLoading } });
  items.push({ l: GF.t('retry'), f: function() { showInterstitial(function() { startGame(isDaily); }); } });
  items.push({ l: GF.t('skins'), f: function() { gs = 'SKINS'; }, o: { accent: reviveUsed ? 'gold' : 'ghost' } });
  items.push({ l: GF.t('menu'),  f: function() { gs = 'MENU'; }, o: { accent: 'ghost' } });

  var n = items.length;
  var stackH = n * btnH + (n - 1) * gapY;
  var btnX = GF.cx - btnW / 2;
  var minY = topY + titleFs * 0.85 + subFs * 2.4;
  var btnY = GF.clamp(GF.cy - 20 * GF.S, minY, GF.H - stackH - 48 * GF.S);
  for (var i = 0; i < n; i++) drawButton(ctx, btnX, btnY + i * (btnH + gapY), btnW, btnH, items[i].l, items[i].f, items[i].o || {});

  ctx.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
  ctx.fillStyle = '#88a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var bestLine = (isDaily ? GF.t('daily_best') : GF.t('best')) + ': ' + (isDaily ? bestDaily : bestHeight) + ' m';
  ctx.fillText(bestLine, GF.cx, btnY + stackH + 20 * GF.S);
}

// ── TUTORIAL PANEL ───────────────────────────────────────────────────────
function drawTutorialPanel(ctx) {
  ctx.fillStyle = 'rgba(10,10,24,0.94)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(24 * GF.S, 18, 34);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var topY = GF.clamp(GF.H * 0.1, 36, 120);
  ctx.fillText(GF.t('title'), GF.cx, topY);

  var bodyFs = GF.clamp(14 * GF.S, 11, 18);
  ctx.font = bodyFs + 'px sans-serif';
  var maxW = Math.min(GF.W * 0.88, 480 * GF.S);
  var lineH = bodyFs * 1.34;
  var blockGap = bodyFs * 0.55;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var y = topY + titleFs * 1.5;
  for (var k = 0; k < keys.length; k++) {
    var lines = _wrapTextLines(ctx, GF.t(keys[k]), maxW);
    ctx.fillStyle = (keys[k] === 'tut_tip') ? '#ffd54f' : '#cdd6ea';
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], GF.cx, y); y += lineH; }
    y += blockGap;
  }
  ctx.fillStyle = '#9ab'; ctx.font = bodyFs + 'px sans-serif';
  ctx.fillText(GF.lang === 'ru' ? '(нажмите, чтобы закрыть)' : '(tap anywhere to close)',
    GF.cx, Math.min(y + 8 * GF.S, GF.H - 26 * GF.S));
}

// ── INPUT ──────────────────────────────────────────────────────────────────
function uiHit(px, py) {
  for (var i = 0; i < uiButtons.length; i++) {
    var b = uiButtons[i];
    if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
      uiLockUntil = Date.now() + 450;
      b.fn();
      return true;
    }
  }
  return false;
}

function onPress(px, py) {
  if (Date.now() < uiLockUntil) return;
  if (gs === 'MENU') { uiHit(px, py); return; }
  if (gs === 'SKINS') { uiHit(px, py); return; }
  if (gs === 'GAMEOVER') { uiHit(px, py); return; }
  if (gs === 'PLAYING') {
    if (tutorialOpen) { tutorialOpen = false; return; }
    if (helpBtn && px >= helpBtn.x && px <= helpBtn.x + helpBtn.w &&
        py >= helpBtn.y && py <= helpBtn.y + helpBtn.h) { tutorialOpen = true; return; }
    doBounce();
  }
}

var _lastPressTs = 0, _lastPressX = -999, _lastPressY = -999;
function pressGuarded(x, y) {
  var now = Date.now();
  if (now - _lastPressTs < 60 &&
      Math.abs(x - _lastPressX) < 6 && Math.abs(y - _lastPressY) < 6) return;
  _lastPressTs = now; _lastPressX = x; _lastPressY = y;
  onPress(x, y);
}
var _canvas = document.getElementById('c');
_canvas.addEventListener('pointerdown', function(e) {
  var rect = _canvas.getBoundingClientRect();
  var sx = _canvas.width / rect.width, sy = _canvas.height / rect.height;
  pressGuarded((e.clientX - rect.left) * sx, (e.clientY - rect.top) * sy);
}, { passive: true });
_canvas.addEventListener('click', function(e) {
  var rect = _canvas.getBoundingClientRect();
  var sx = _canvas.width / rect.width, sy = _canvas.height / rect.height;
  pressGuarded((e.clientX - rect.left) * sx, (e.clientY - rect.top) * sy);
});

document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    if (gs === 'PLAYING' && !tutorialOpen) { doBounce(); e.preventDefault(); }
  }
});

// ── SCREENSHOT / GATE HOOKS ──────────────────────────────────────────────
window._setupForScreenshot = function(level) {
  startGame(false);
  _ssMode = true;
  stage = Math.max(1, (level || 2));
  cleared = stage * STAGE_GATES + 2;
  height = 40 + (level || 2) * 35;
  obstacleIndex = cleared + 1;
  // build a clean, readable mid-run field: ball mid-screen with a near-pass
  obstacles.length = 0; splats.length = 0; starItems.length = 0; milestones.length = 0;
  ball.wy = 0; ball.vy = 60; ball.color = 1; // blue ball
  ball.trail.length = 0;
  for (var i = 0; i < 8; i++) ball.trail.push({ x: ballScreenX(), y: 0 });
  camY = ball.wy - (GF.H / GF.S) * 0.62;
  // a single ring just above the ball, turned so its BLUE gap is lined up (near-pass)
  var nearWy = ball.wy - 70;
  var ob1 = makeObstacle(nearWy, false);
  ob1.type = OB_SINGLE; ob1.palette = [0, 1, 2]; ob1.matchColor = 1; ob1.radius = 92;
  ob1.gapFrac = 0.4;
  // orient so the blue gap faces straight down toward the ball
  var slotW = (Math.PI * 2) / ob1.palette.length;
  var blueSlot = ob1.palette.indexOf(1);
  ob1.ang = (Math.PI / 2) - blueSlot * slotW - slotW / 2; // blue slot center points down
  obstacles.push(ob1);
  // a double ring above it
  var ob2 = makeObstacle(ball.wy - 70 - SPAWN_GAP, false);
  ob2.type = OB_DOUBLE; ob2.palette = [0, 1, 2, 3]; ob2.matchColor = 2; ob2.innerMatch = 0;
  ob2.radius = 110; ob2.innerRadius = 60; ob2.gapFrac = 0.34;
  obstacles.push(ob2);
  // a cross higher
  var ob3 = makeObstacle(ball.wy - 70 - SPAWN_GAP * 2, false);
  ob3.type = OB_CROSS; ob3.palette = [0, 1, 2, 3]; ob3.radius = 96;
  obstacles.push(ob3);
  // a line bar between
  var ob4 = makeObstacle(ball.wy - 70 - SPAWN_GAP * 3, false);
  ob4.type = OB_LINE; ob4.palette = [0, 1, 2]; ob4.matchColor = 3; ob4.radius = 92;
  obstacles.push(ob4);
  // a star + splat in the field
  starItems.push({ wx: 0.35, wy: ball.wy - 70 - SPAWN_GAP * 0.5, taken: false, bob: 0.5 });
  splats.push({ wx: -0.3, wy: ball.wy - 70 - SPAWN_GAP * 1.5, color: 2, taken: false, bob: 1.0 });
  firstTapDone = true;
};
window._jumpLevel = function(n) {
  if (n >= 99) {
    // near-death scenario: ball is RED and sits exactly on the BOTTOM contact
    // edge of a frozen ring whose bottom arc is BLUE (a non-matching color), so
    // the very next update frame registers a wrong-color contact -> GAME OVER.
    startGame(false);
    ball.color = 0; // red
    obstacles.length = 0;
    var rad = 92;
    // ring center placed exactly one radius above the ball -> ball is at the
    // ring's bottom edge (distC == radius), inside the contact band immediately.
    var ob = makeObstacle(ball.wy - rad, false);
    ob.type = OB_SINGLE; ob.palette = [0, 1, 2]; ob.radius = rad; ob.spin = 0;
    // orient so the BLUE (1) arc center sits at the bottom (screen +PI/2)
    var sW = (Math.PI * 2) / ob.palette.length;
    var blueSlot = ob.palette.indexOf(1);
    ob.ang = (Math.PI / 2) - blueSlot * sW - sW / 2;
    obstacles.push(ob);
    ball.vy = -20; // drift up gently so it lingers in the contact band
    GF.saveRun();
    return;
  }
  window._setupForScreenshot(n || 2);
};

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 414,
  designH: 896,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'color_gate',
  onReady: function() {
    bestHeight = loadBest();
    stars = loadStars();
    unlocks = loadUnlocks();
    equippedSkin = loadEquipped();
    bestDaily = loadDailyBest();
    seenTutorial = loadTutorialSeen();
    GF.persist('color_gate_run_v1',
      function() {
        return { gs: gs, height: height, stage: stage, cleared: cleared,
                 runStars: runStars, isDaily: isDaily, ballColor: ball.color };
      },
      function(s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        height = s.height || 0;
        stage = s.stage || 0;
        cleared = s.cleared || 0;
        runStars = s.runStars || 0;
        isDaily = !!s.isDaily;
      }
    );
    // Resume to a safe screen (Yandex 1.9) - never drop into live physics.
    if (gs === 'PLAYING') gs = 'MENU';
    if (gs !== 'MENU' && gs !== 'SKINS' && gs !== 'GAMEOVER') gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// Expose state for the post-build-tester (DESIGN.md cross-check).
GF.exposeState(function() {
  return {
    gs: gs, height: height, bestHeight: bestHeight, stage: stage,
    cleared: cleared, stars: stars, runStars: runStars,
    ballColor: ball.color, obstacleCount: obstacles.length,
    splatCount: splats.length, starCount: starItems.length,
    isDaily: isDaily, dailySeed: dailySeed, equippedSkin: equippedSkin,
    unlocks: unlocks, tutorialOpen: tutorialOpen, seenTutorial: seenTutorial,
    GRAVITY: GRAVITY, BOUNCE_IMPULSE: BOUNCE_IMPULSE, MAX_FALL: MAX_FALL,
    BALL_RADIUS: BALL_RADIUS, RING_THICKNESS: RING_THICKNESS, CONTACT_BAND: CONTACT_BAND,
    BASE_SPIN: BASE_SPIN, SPIN_PER_STAGE: SPIN_PER_STAGE,
    ARC_GAP_BASE: ARC_GAP_BASE, ARC_GAP_MIN: ARC_GAP_MIN, SPAWN_GAP: SPAWN_GAP,
    COLOR_COUNT: COLOR_COUNT, MAX_COLORS: MAX_COLORS, STAGE_GATES: STAGE_GATES,
    SPLAT_EVERY: SPLAT_EVERY, STAR_EVERY: STAR_EVERY,
  };
});

// Test/automation hooks (safe to ship).
window._setLang = function(l) { GF.lang = l; };
window._setState = function(s) { gs = s; };
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'sans-serif'; };
window._bounce = function() { doBounce(); };
window._setBallColor = function(i) { ball.color = i % COLORS.length; };
// Read-only accessor: the matchColor of the next un-passed gate above the ball
// (used by automated playtests to simulate a skilled run). Returns -1 if none.
window.__nextGateColor = function() { var g = nextGateAbove(); return g ? g.matchColor : -1; };
// Read-only: is the next gate's safe gap aligned where the rising ball will
// contact it (the ring's BOTTOM point, screen angle +PI/2, since the centered
// ball climbs the vertical centerline)? Lets the playtest sim "time" a bounce.
var CONTACT_ANGLE = Math.PI / 2; // bottom of the ring in screen space (+y down)
window.__diag = function() {
  var g = nextGateAbove();
  return { ballWy: ball.wy, ballScrY: worldToScreenY(ball.wy), camY: camY,
           obCount: obstacles.length,
           nearWy: g ? g.wy : null, nearScrY: g ? worldToScreenY(g.wy) : null,
           nearType: g ? g.type : null, nearPassed: g ? g.passed : null,
           firstObWy: obstacles.length ? obstacles[0].wy : null,
           firstPassed: obstacles.length ? obstacles[0].passed : null };
};
window.__gapAlignedUp = function() {
  var g = nextGateAbove();
  if (!g) return true;
  if (g.type === OB_CROSS) {
    // cross: safe when the bottom is a gap between blades, OR a blade of our color
    var c = crossHitColor(g, CONTACT_ANGLE, g.radius * GF.S);
    return c === -1 || c === ball.color;
  }
  // rings / line: safe when the arc at the bottom is the ball's own color
  return arcHitColor(g, CONTACT_ANGLE) === ball.color;
};

})();

<script>
/* bespoke synth_track.py soundtrack: start on first gesture (autoplay policy),
   M toggles mute (this game has no on-screen mute button). */

  if(!window.GF||!GF.music) return;
  var go=function(){ GF.music('audio/bg_track.mp3', 0.6);
    ['pointerdown','keydown','touchstart','mousedown'].forEach(function(ev){document.removeEventListener(ev,go,true);}); };
  ['pointerdown','keydown','touchstart','mousedown'].forEach(function(ev){document.addEventListener(ev,go,true);});
  document.addEventListener('keydown',function(e){ if(e.code==='KeyM'&&GF.toggleMute){ GF.toggleMute(); } });
})();
