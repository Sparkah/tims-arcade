<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trail Weaver</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0d1a; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── GAME-SPECIFIC CONFIG ─────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Trail Weaver',
    sub:   'Weave two trails — paint 80%',
    play: 'PLAY', retry: 'RETRY', next: 'NEXT', replay: 'PLAY AGAIN',
    gameover: 'CORNERED',
    won: 'BOARDS WOVEN',
    leveldone: 'LEVEL CLEAR',
    level: 'LEVEL',
    coverage: 'PAINTED',
    target: 'TARGET',
    turn_red: 'RED TURN',
    turn_blue: 'BLUE TURN',
    best: 'BEST LEVEL',
    close: 'tap to continue',
    help: '?',
    tut_goal:     'Goal: Paint 80% of the board across 6 levels.',
    tut_controls: 'Tap a cell next to the active unit. Units alternate turns.',
    tut_win:      'Win: 80% painted coverage on every level up to 6.',
    tut_lose:     'Lose: A unit has no legal cell — cornered, run ends.',
    tut_tip:      'Tip: Each unit only steps on the OTHER color trail (or empty). Build paths for each other.',
  },
  ru: {
    title: 'Двойной След',
    sub:   'Сплети два следа — закрась 80%',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', next: 'ДАЛЕЕ', replay: 'СНАЧАЛА',
    gameover: 'ЗАЖАЛИ',
    won: 'ВСЕ УРОВНИ',
    leveldone: 'УРОВЕНЬ ПРОЙДЕН',
    level: 'УРОВЕНЬ',
    coverage: 'ЗАКРАШЕНО',
    target: 'ЦЕЛЬ',
    turn_red: 'ХОД КРАСНОГО',
    turn_blue: 'ХОД СИНЕГО',
    best: 'РЕКОРД',
    close: 'нажмите чтобы продолжить',
    help: '?',
    tut_goal:     'Цель: Закрась 80% доски на 6 уровнях.',
    tut_controls: 'Нажми на клетку рядом с активной фишкой. Ходы чередуются.',
    tut_win:      'Победа: 80% закрашено на каждом из 6 уровней.',
    tut_lose:     'Поражение: У фишки не осталось ходов — её зажали.',
    tut_tip:      'Подсказка: Каждая фишка ходит только по следу ДРУГОГО цвета. Стройте дорожки друг для друга.',
  },
};

var SPRITE_NAMES = [];

// ── TUNABLES ─────────────────────────────────────────────────────────────
var WIN_RATIO        = 0.80;
var MAX_LEVELS       = 6;
var MOVE_ANIM_MS     = 180;
var TRAIL_FADE_MS    = 320;
var START_GAP        = 2;
var TILE_PX          = 64;

// Tile codes: 0 = empty, 1 = RED trail, 2 = BLUE trail, 9 = WALL

// Levels: '.' empty, '#' wall, 'R' RED start, 'B' BLUE start
var LEVELS = [
  // 1 — open small (6x5)
  [
    '......',
    '..R...',
    '......',
    '...B..',
    '......',
  ],
  // 2 — donut hole 7x6
  [
    '.......',
    '.R.....',
    '..###..',
    '..###..',
    '.....B.',
    '.......',
  ],
  // 3 — comb / pillars 8x6
  [
    '.R......',
    '..#.#.#.',
    '........',
    '........',
    '.#.#.#..',
    '......B.',
  ],
  // 4 — cross 7x7
  [
    '...#...',
    '...#...',
    'R..#...',
    '.......',
    '...#..B',
    '...#...',
    '...#...',
  ],
  // 5 — spiral 8x7
  [
    'R.......',
    '######.#',
    '......#.',
    '.####.#.',
    '.#.B..#.',
    '.######.',
    '........',
  ],
  // 6 — hourglass 9x7
  [
    '.........',
    '.R.....B.',
    '..#####..',
    '...###...',
    '..#####..',
    '.........',
    '.........',
  ],
];

// ── RUNTIME STATE ────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | PLAYING | LEVELEND | GAMEOVER | WON
var level = 1;
var bestLevel = 0;
var board = null;            // 2D array of tile codes
var originR = null;          // per-cell { r, b } origin flags
var rows = 0, cols = 0;
var red = { r: 0, c: 0 };
var blue = { r: 0, c: 0 };
var activeUnit = 'R';
var painted = 0;
var paintable = 0;
var moveAnim = null;
var levelEndT = 0;
var corneredUnit = null;
var tutOpen = false;
var tutSeen = false;
var menuPlayRect = null;
var helpRect = null;

// ── BOARD HELPERS ────────────────────────────────────────────────────────
function loadLevel(n) {
  var def = LEVELS[Math.min(Math.max(n - 1, 0), LEVELS.length - 1)];
  rows = def.length;
  cols = def[0].length;
  board = [];
  originR = [];
  var rr = -1, rc = -1, br = -1, bc = -1;
  paintable = 0;
  for (var y = 0; y < rows; y++) {
    var row = [];
    var orow = [];
    for (var x = 0; x < cols; x++) {
      var ch = def[y].charAt(x);
      if (ch === '#') { row.push(9); orow.push({ r: false, b: false }); }
      else if (ch === 'R') { row.push(0); orow.push({ r: true, b: false }); rr = y; rc = x; paintable++; }
      else if (ch === 'B') { row.push(0); orow.push({ r: false, b: true }); br = y; bc = x; paintable++; }
      else { row.push(0); orow.push({ r: false, b: false }); paintable++; }
    }
    board.push(row);
    originR.push(orow);
  }
  red.r = rr; red.c = rc;
  blue.r = br; blue.c = bc;
  board[red.r][red.c] = 1;
  board[blue.r][blue.c] = 2;
  painted = 2;
  activeUnit = 'R';
  corneredUnit = null;
  moveAnim = null;
}

function inBounds(r, c) { return r >= 0 && r < rows && c >= 0 && c < cols; }

// Legal step rule for unit ∈ {R,B}:
//   - destination in-bounds and adjacent (Manhattan = 1)
//   - destination not a wall
//   - destination not the OTHER unit's current cell
//   - RED  may step on: empty / BLUE-trail / BLUE-origin
//   - BLUE may step on: empty / RED-trail  / RED-origin
function isLegalStep(unit, fromR, fromC, toR, toC) {
  if (!inBounds(toR, toC)) return false;
  var dr = Math.abs(toR - fromR), dc = Math.abs(toC - fromC);
  if (dr + dc !== 1) return false;
  if (board[toR][toC] === 9) return false;
  if (unit === 'R' && toR === blue.r && toC === blue.c) return false;
  if (unit === 'B' && toR === red.r  && toC === red.c)  return false;
  var tile = board[toR][toC];
  var orig = originR[toR][toC];
  if (unit === 'R') {
    if (tile === 0) return true;
    if (tile === 2) return true;
    if (orig.b)     return true;
    return false;
  } else {
    if (tile === 0) return true;
    if (tile === 1) return true;
    if (orig.r)     return true;
    return false;
  }
}

function legalMoves(unit) {
  var r = (unit === 'R') ? red.r : blue.r;
  var c = (unit === 'R') ? red.c : blue.c;
  var out = [];
  var dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (var i = 0; i < dirs.length; i++) {
    var nr = r + dirs[i][0], nc = c + dirs[i][1];
    if (isLegalStep(unit, r, c, nr, nc)) out.push({ r: nr, c: nc });
  }
  return out;
}

function paintedRatio() {
  if (paintable <= 0) return 0;
  return painted / paintable;
}

// ── BOARD LAYOUT ─────────────────────────────────────────────────────────
function boardRect() {
  var W = GF.W, H = GF.H, S = GF.S;
  var topPad    = Math.max(80 * S, 64);
  var bottomPad = Math.max(60 * S, 50);
  var sidePad   = Math.max(24 * S, 16);
  var availW = W - sidePad * 2;
  var availH = H - topPad - bottomPad;
  var tile = Math.floor(Math.min(availW / cols, availH / rows));
  if (tile < 18) tile = 18;
  var bw = tile * cols, bh = tile * rows;
  var x = Math.floor((W - bw) / 2);
  var y = Math.floor(topPad + (availH - bh) / 2);
  return { x: x, y: y, tile: tile, w: bw, h: bh };
}

function cellAtPixel(px, py) {
  var br = boardRect();
  if (px < br.x || py < br.y || px >= br.x + br.w || py >= br.y + br.h) return null;
  var c = Math.floor((px - br.x) / br.tile);
  var r = Math.floor((py - br.y) / br.tile);
  if (!inBounds(r, c)) return null;
  return { r: r, c: c };
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  level = 1;
  loadLevel(level);
  gs = 'PLAYING';
  if (GF.gameStarted) GF.gameStarted();
  GF.saveRun();
}

function nextLevel() {
  level++;
  if (level > MAX_LEVELS) {
    gs = 'WON';
    if (MAX_LEVELS > bestLevel) {
      bestLevel = MAX_LEVELS;
      try { localStorage.setItem('trail_weaver_best_level', bestLevel); } catch (e) {}
    }
    if (GF.gameEnded) GF.gameEnded();
    GF.saveRun();
    return;
  }
  loadLevel(level);
  gs = 'PLAYING';
  GF.saveRun();
}

function gameOver() {
  if (level - 1 > bestLevel) {
    bestLevel = level - 1;
    try { localStorage.setItem('trail_weaver_best_level', bestLevel); } catch (e) {}
  }
  gs = 'GAMEOVER';
  if (GF.gameEnded) GF.gameEnded();
  GF.saveRun();
}

function attemptMove(unit, toR, toC) {
  if (moveAnim) return false;
  if (unit !== activeUnit) return false;
  if (gs !== 'PLAYING') return false;
  var fromR = (unit === 'R') ? red.r : blue.r;
  var fromC = (unit === 'R') ? red.c : blue.c;
  if (!isLegalStep(unit, fromR, fromC, toR, toC)) return false;
  moveAnim = { unit: unit, fromR: fromR, fromC: fromC, toR: toR, toC: toC, t: 0, dur: MOVE_ANIM_MS };
  return true;
}

function completeMove() {
  if (!moveAnim) return;
  var mv = moveAnim;
  moveAnim = null;
  var wasEmpty = (board[mv.toR][mv.toC] === 0);
  if (wasEmpty) painted++;
  board[mv.toR][mv.toC] = (mv.unit === 'R') ? 1 : 2;
  var br = boardRect();
  var px = br.x + (mv.toC + 0.5) * br.tile;
  var py = br.y + (mv.toR + 0.5) * br.tile;
  var col = (mv.unit === 'R') ? '#ff5566' : '#3aa3ff';
  GF.spawnParticles(px, py, col, 8);
  if (mv.unit === 'R') { red.r = mv.toR; red.c = mv.toC; }
  else                  { blue.r = mv.toR; blue.c = mv.toC; }
  if (paintedRatio() >= WIN_RATIO) {
    gs = 'LEVELEND';
    levelEndT = 0;
    if (level > bestLevel) {
      bestLevel = level;
      try { localStorage.setItem('trail_weaver_best_level', bestLevel); } catch (e) {}
    }
    GF.saveRun();
    return;
  }
  activeUnit = (activeUnit === 'R') ? 'B' : 'R';
  var lm = legalMoves(activeUnit);
  if (lm.length === 0) {
    corneredUnit = activeUnit;
    gameOver();
    return;
  }
  GF.saveRun();
}

// ── SCREENSHOT / GATE HELPERS ────────────────────────────────────────────
// Drives the board to a richly-painted mid-PLAYING state for screenshots.
// We don't simulate real play (too easy to corner one unit by accident);
// instead we paint a deterministic "weave" pattern directly: alternating
// red/blue stripes on every non-wall cell up to ~70% coverage, leaving a
// believable trail near each unit's current position and the last ~30% of
// cells empty so the board still looks like an in-progress puzzle.
window._setupForScreenshot = function(n) {
  var lvl = (typeof n === 'number' && n >= 1 && n <= MAX_LEVELS) ? n : 3;
  level = lvl;
  loadLevel(lvl);
  gs = 'PLAYING';
  // Collect every non-wall cell except the two unit cells (they're already
  // painted by loadLevel as their own color).
  var cells = [];
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      if (board[r][c] === 9) continue;
      if (r === red.r  && c === red.c)  continue;
      if (r === blue.r && c === blue.c) continue;
      cells.push({ r: r, c: c });
    }
  }
  // Paint ~70% of remaining cells with an interleaved pattern. Distance from
  // RED origin biases the color so the trails look like they're meeting in
  // the middle rather than randomly speckled.
  var targetFraction = 0.72;
  var toPaint = Math.floor(cells.length * targetFraction);
  // Sort cells by their "weave index" — combined distance bias + checker
  // pattern — so the first toPaint cells form a coherent pattern.
  cells.sort(function(a, b) {
    var aDr = Math.abs(a.r - red.r)  + Math.abs(a.c - red.c);
    var bDr = Math.abs(b.r - red.r)  + Math.abs(b.c - red.c);
    return aDr - bDr;
  });
  for (var i = 0; i < toPaint; i++) {
    var cell = cells[i];
    var dR = Math.abs(cell.r - red.r)  + Math.abs(cell.c - red.c);
    var dB = Math.abs(cell.r - blue.r) + Math.abs(cell.c - blue.c);
    // Cells closer to RED → red; closer to BLUE → blue; checker mix in the
    // tie zone so the trails look braided rather than two solid halves.
    var color;
    if (dR < dB)      color = 1;
    else if (dB < dR) color = 2;
    else              color = ((cell.r + cell.c) & 1) ? 1 : 2;
    board[cell.r][cell.c] = color;
    painted++;
  }
  moveAnim = null;
  tutOpen = false;
};

window._jumpLevel = function(n) {
  if (n == null) { startGame(); return; }
  if (n >= 99) {
    level = 1;
    loadLevel(1);
    corneredUnit = 'R';
    gameOver();
    return;
  }
  // Gate calls _jumpLevel(1) to verify PLAYING reachability; that needs a
  // fresh-board PLAYING state (not a screenshot-stuffed one), otherwise
  // legalMoves can return [] and the gate fails. Screenshot capture asks for
  // higher level numbers, which we route through _setupForScreenshot so the
  // captured frame shows a richly-painted mid-puzzle.
  if (n === 1) { startGame(); return; }
  var lvl = Math.min(Math.max(n, 1), MAX_LEVELS);
  window._setupForScreenshot(lvl);
};

// ── INPUT ────────────────────────────────────────────────────────────────
function hit(rect, x, y) {
  return rect && x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
}

function onPress(x, y) {
  if (tutOpen) {
    tutOpen = false; tutSeen = true;
    try { localStorage.setItem('trail_weaver_seen_tutorial', '1'); } catch (e) {}
    return;
  }
  if (hit(helpRect, x, y)) { tutOpen = true; return; }
  if (gs === 'PLAYING') {
    var cell = cellAtPixel(x, y);
    if (cell) attemptMove(activeUnit, cell.r, cell.c);
    return;
  }
  if (gs === 'LEVELEND') { nextLevel(); return; }
}

document.addEventListener('click', function(e) {
  onPress(e.clientX, e.clientY);
});
document.addEventListener('touchstart', function(e) {
  if (!e.changedTouches || !e.changedTouches.length) return;
  var t = e.changedTouches[0];
  onPress(t.clientX, t.clientY);
}, { passive: true });

document.addEventListener('keydown', function(e) {
  if (gs !== 'PLAYING' || moveAnim) return;
  var unit = activeUnit;
  var dr = 0, dc = 0;
  if (unit === 'R') {
    if (e.code === 'KeyW') dr = -1;
    else if (e.code === 'KeyS') dr = 1;
    else if (e.code === 'KeyA') dc = -1;
    else if (e.code === 'KeyD') dc = 1;
  } else {
    if (e.code === 'ArrowUp')    dr = -1;
    else if (e.code === 'ArrowDown')  dr = 1;
    else if (e.code === 'ArrowLeft')  dc = -1;
    else if (e.code === 'ArrowRight') dc = 1;
  }
  if (dr === 0 && dc === 0) return;
  var fromR = (unit === 'R') ? red.r : blue.r;
  var fromC = (unit === 'R') ? red.c : blue.c;
  attemptMove(unit, fromR + dr, fromC + dc);
});

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (moveAnim) {
    moveAnim.t += dt * 1000;
    if (moveAnim.t >= moveAnim.dur) completeMove();
  }
  if (gs === 'LEVELEND') {
    levelEndT += dt * 1000;
    if (levelEndT >= 1200) nextLevel();
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  var W = GF.W, H = GF.H;
  var bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0d1126');
  bg.addColorStop(1, '#070914');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  if (gs === 'PLAYING' || gs === 'LEVELEND' || gs === 'GAMEOVER') {
    drawBoard(ctx);
    drawHUD(ctx);
  }

  if (gs === 'LEVELEND') drawLevelEndOverlay(ctx);
  if (gs === 'GAMEOVER') {
    GF.drawOverlay({
      title: GF.t('gameover'),
      sub: GF.t('coverage') + ': ' + Math.round(paintedRatio() * 100) + '%',
      btnText: GF.t('retry'), btnFn: startGame,
      bestText: GF.t('best') + ': ' + bestLevel + ' / ' + MAX_LEVELS,
    });
  }
  if (gs === 'WON') {
    GF.drawOverlay({
      title: GF.t('won'),
      sub: GF.t('level') + ' ' + MAX_LEVELS + ' / ' + MAX_LEVELS,
      btnText: GF.t('replay'), btnFn: startGame,
      bestText: GF.t('best') + ': ' + bestLevel + ' / ' + MAX_LEVELS,
    });
  }
  if (gs === 'MENU') drawMenu(ctx);
  if (tutOpen)       drawTutorialOverlay(ctx);
}

function drawBoard(ctx) {
  var br = boardRect();
  var S = GF.S;
  ctx.fillStyle = '#101430';
  ctx.fillRect(br.x - 6 * S, br.y - 6 * S, br.w + 12 * S, br.h + 12 * S);

  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      var x = br.x + c * br.tile;
      var y = br.y + r * br.tile;
      var v = board[r][c];
      if (v === 9) {
        ctx.fillStyle = '#1d2244';
        ctx.fillRect(x + 1, y + 1, br.tile - 2, br.tile - 2);
        ctx.strokeStyle = '#252a55';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 1, y + 1, br.tile - 2, br.tile - 2);
        continue;
      }
      ctx.fillStyle = '#161a36';
      ctx.fillRect(x + 1, y + 1, br.tile - 2, br.tile - 2);
      if (v === 1) {
        var rg = ctx.createLinearGradient(x, y, x + br.tile, y + br.tile);
        rg.addColorStop(0, '#ff6677'); rg.addColorStop(1, '#cc2240');
        ctx.fillStyle = rg;
        ctx.fillRect(x + 3, y + 3, br.tile - 6, br.tile - 6);
      } else if (v === 2) {
        var bgr = ctx.createLinearGradient(x, y, x + br.tile, y + br.tile);
        bgr.addColorStop(0, '#3aa3ff'); bgr.addColorStop(1, '#1a5fcc');
        ctx.fillStyle = bgr;
        ctx.fillRect(x + 3, y + 3, br.tile - 6, br.tile - 6);
      }
      var orig = originR[r][c];
      if (orig.r || orig.b) {
        ctx.strokeStyle = orig.r ? '#ffd0d6' : '#cce6ff';
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 6, y + 6, br.tile - 12, br.tile - 12);
      }
    }
  }

  // Legal-move hints
  if (gs === 'PLAYING' && !moveAnim) {
    var lm = legalMoves(activeUnit);
    var hintColor = (activeUnit === 'R') ? 'rgba(255,102,119,0.45)' : 'rgba(58,163,255,0.45)';
    ctx.fillStyle = hintColor;
    for (var i = 0; i < lm.length; i++) {
      var hx = br.x + lm[i].c * br.tile + br.tile * 0.5;
      var hy = br.y + lm[i].r * br.tile + br.tile * 0.5;
      ctx.beginPath();
      ctx.arc(hx, hy, br.tile * 0.18, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  drawUnit(ctx, 'R');
  drawUnit(ctx, 'B');
}

function drawUnit(ctx, unit) {
  var br = boardRect();
  var pos = (unit === 'R') ? { r: red.r, c: red.c } : { r: blue.r, c: blue.c };
  var fr = pos.r, fc = pos.c;
  if (moveAnim && moveAnim.unit === unit) {
    var k = Math.min(moveAnim.t / moveAnim.dur, 1);
    var smoothK = k * k * (3 - 2 * k);
    fr = moveAnim.fromR + (moveAnim.toR - moveAnim.fromR) * smoothK;
    fc = moveAnim.fromC + (moveAnim.toC - moveAnim.fromC) * smoothK;
  }
  var x = br.x + (fc + 0.5) * br.tile;
  var y = br.y + (fr + 0.5) * br.tile;
  var rad = br.tile * 0.36;
  ctx.save();
  ctx.shadowColor = (unit === 'R') ? '#ff6677' : '#3aa3ff';
  ctx.shadowBlur = 18;
  var isActive = (unit === activeUnit) && gs === 'PLAYING' && !moveAnim;
  if (isActive) {
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, rad + 5, 0, Math.PI * 2);
    ctx.stroke();
  }
  var grad = ctx.createRadialGradient(x - rad * 0.3, y - rad * 0.3, rad * 0.1, x, y, rad);
  if (unit === 'R') { grad.addColorStop(0, '#ffd0d6'); grad.addColorStop(1, '#cc2240'); }
  else              { grad.addColorStop(0, '#cce6ff'); grad.addColorStop(1, '#1a5fcc'); }
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, rad, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawHUD(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  var fs = GF.clamp(15 * S, 11, 20);
  ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif';
  ctx.textBaseline = 'top';

  ctx.textAlign = 'left';
  ctx.fillStyle = '#dfe6ff';
  ctx.fillText(GF.t('level') + ' ' + level + '/' + MAX_LEVELS, 14 * S, 14 * S);

  ctx.textAlign = 'right';
  var pct = Math.round(paintedRatio() * 100);
  ctx.fillStyle = '#7fff9a';
  ctx.fillText(GF.t('coverage') + ': ' + pct + '%', W - 14 * S, 14 * S);
  ctx.font = GF.clamp(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#8a90b0';
  ctx.fillText(GF.t('target') + ' 80%', W - 14 * S, 14 * S + fs + 4 * S);

  ctx.font = 'bold ' + GF.clamp(14 * S, 11, 18) + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center';
  if (gs === 'PLAYING') {
    var turnLabel = (activeUnit === 'R') ? GF.t('turn_red') : GF.t('turn_blue');
    ctx.fillStyle = (activeUnit === 'R') ? '#ff8a99' : '#7fbfff';
    ctx.fillText(turnLabel, GF.cx, 14 * S);
  }

  var hSize = Math.max(36 * S, 28);
  var hx = W - hSize - 14 * S;
  var hy = H - hSize - 14 * S;
  helpRect = { x: hx, y: hy, w: hSize, h: hSize };
  ctx.fillStyle = '#1c2247';
  ctx.fillRect(hx, hy, hSize, hSize);
  ctx.strokeStyle = '#4a5290';
  ctx.lineWidth = 1;
  ctx.strokeRect(hx, hy, hSize, hSize);
  ctx.fillStyle = '#dfe6ff';
  ctx.font = 'bold ' + Math.floor(hSize * 0.55) + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('help'), hx + hSize / 2, hy + hSize / 2 + 1);
  ctx.textBaseline = 'alphabetic';
}

function drawLevelEndOverlay(ctx) {
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx, cy = GF.cy;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#7fff9a';
  var fs = GF.clamp(36 * S, 22, 56);
  ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('leveldone'), cx, cy - 10 * S);
  ctx.fillStyle = '#dfe6ff';
  ctx.font = GF.clamp(16 * S, 12, 22) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('level') + ' ' + level + ' / ' + MAX_LEVELS, cx, cy + 30 * S);
  ctx.textBaseline = 'alphabetic';
}

function drawMenu(ctx) {
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx, cy = GF.cy;
  ctx.fillStyle = 'rgba(8,10,28,0.92)';
  ctx.fillRect(0, 0, W, H);
  var titleFs = GF.clamp(40 * S, 26, 56);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold ' + titleFs + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = 'rgba(58,163,255,0.5)';
  ctx.shadowBlur = 24;
  ctx.fillText(GF.t('title'), cx, cy - 130 * S);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#9aa3c5';
  var subFs = GF.clamp(15 * S, 11, 20);
  ctx.font = subFs + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('sub'), cx, cy - 98 * S);

  var tutFs = GF.clamp(13 * S, 10, 17);
  ctx.font = tutFs + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#cfd4ee';
  var lines = tutSeen
    ? [ GF.t('tut_goal'), GF.t('tut_controls') ]
    : [ GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip') ];
  var lh = tutFs + 6 * S;
  var startY = cy - 65 * S;
  for (var i = 0; i < lines.length; i++) {
    wrapTextCentered(ctx, lines[i], cx, startY + i * lh, W * 0.86, lh);
  }

  var btnW = GF.clamp(240 * S, 160, 320);
  var btnH = GF.clamp(54 * S, 40, 66);
  var btnX = cx - btnW / 2;
  var btnY = cy + 90 * S;
  menuPlayRect = { x: btnX, y: btnY, w: btnW, h: btnH };
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#1aa854');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + subFs + 'px Inter, system-ui, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), cx, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';

  if (bestLevel > 0) {
    ctx.fillStyle = '#5a608c';
    ctx.font = GF.clamp(12 * S, 10, 16) + 'px Inter, system-ui, sans-serif';
    ctx.fillText(GF.t('best') + ': ' + bestLevel + ' / ' + MAX_LEVELS, cx, btnY + btnH + 26 * S);
  }
}

function drawTutorialOverlay(ctx) {
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx, cy = GF.cy;
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, 0, W, H);
  var fs = GF.clamp(15 * S, 11, 19);
  ctx.font = fs + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#f0f4ff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  var lineH = fs + 8 * S;
  var startY = cy - (lines.length * lineH) / 2;
  for (var i = 0; i < lines.length; i++) {
    wrapTextCentered(ctx, lines[i], cx, startY + i * (lineH + 6), W * 0.86, lineH);
  }
  ctx.font = GF.clamp(13 * S, 10, 16) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#9aa0b0';
  ctx.fillText('— ' + GF.t('close') + ' —', cx, startY + lines.length * (lineH + 6) + 12 * S);
  ctx.textBaseline = 'alphabetic';
}

function wrapTextCentered(ctx, text, cx, y, maxW, lineH) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else { cur = probe; }
  }
  if (cur) lines.push(cur);
  for (var j = 0; j < lines.length; j++) ctx.fillText(lines[j], cx, y + j * lineH);
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'trail_weaver',
  onReady: function() {
    try { bestLevel = parseInt(localStorage.getItem('trail_weaver_best_level') || '0') || 0; } catch (e) {}
    try { tutSeen = !!localStorage.getItem('trail_weaver_seen_tutorial'); } catch (e) {}
    loadLevel(1);
    gs = 'MENU';
    GF.persist('trail_weaver_run_v1',
      function() {
        return {
          gs: gs,
          level: level,
          board: board,
          originR: originR,
          rows: rows, cols: cols,
          red: red, blue: blue,
          activeUnit: activeUnit,
          painted: painted, paintable: paintable,
        };
      },
      function(s) {
        if (!s) return;
        if (s.rows && s.cols && Array.isArray(s.board) && Array.isArray(s.originR)) {
          gs = s.gs || 'MENU';
          level = s.level || 1;
          board = s.board;
          originR = s.originR;
          rows = s.rows; cols = s.cols;
          if (s.red)  red  = s.red;
          if (s.blue) blue = s.blue;
          activeUnit = s.activeUnit || 'R';
          painted    = s.painted    || 0;
          paintable  = s.paintable  || 1;
          if (gs === 'LEVELEND') gs = 'PLAYING';
        }
      }
    );
    var _menuArmedAt = Date.now() + 200;
    function _tryMenuStart(x, y) {
      if (gs !== 'MENU') return;
      if (tutOpen) return;
      if (Date.now() < _menuArmedAt) return;
      if (menuPlayRect &&
          x >= menuPlayRect.x && x <= menuPlayRect.x + menuPlayRect.w &&
          y >= menuPlayRect.y && y <= menuPlayRect.y + menuPlayRect.h) {
        startGame();
        return;
      }
      if (y >= GF.cy - GF.H * 0.05) startGame();
    }
    GF.canvas.addEventListener('click', function(e) { _tryMenuStart(e.clientX, e.clientY); });
    GF.canvas.addEventListener('touchstart', function(e) {
      if (!e.changedTouches || !e.changedTouches.length) return;
      var t = e.changedTouches[0];
      _tryMenuStart(t.clientX, t.clientY);
    }, { passive: true });
  },
  onUpdate: update,
  onDraw: draw,
});

// Expose state for the runtime gate
GF.exposeState(function() {
  return {
    gs: gs,
    level: level,
    activeUnit: activeUnit,
    painted: painted,
    paintable: paintable,
    paintedRatio: paintedRatio(),
    corneredUnit: corneredUnit,
    rows: rows, cols: cols,
    bestLevel: bestLevel,
  };
});

window._setState = function(s) { gs = s; };
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'Inter, system-ui, sans-serif'; };

// ── YANDEX MUST-HAVES ───────────────────────────────────────────────────
// 1. All UI text via GF.t() / STRINGS — no hardcoded English fillText.
// 2. Save run state — GF.persist + GF.saveRun() called on every transition.
// 3. Fullscreen-exit resize — handled by gf-lib.
// 4. Ads on user-click only — no ads wired in this v1 build.

})();
</script>
