// ── STYLE SCORING ──────────────────────────────────────────────────────────
// equipped: { slot -> pieceId | null }. Returns {score, perfectTags, matchedTags, colorHit, breakdown}
function scoreOutfit(equipped, brief) {
  var score = 0;
  var matched = {};        // brief tag -> covered?
  var tagHits = {};        // brief tag -> how many pieces hit it (for diminishing returns)
  for (var ti=0; ti<brief.tags.length; ti++) { matched[brief.tags[ti]] = false; tagHits[brief.tags[ti]] = 0; }
  var colorHit = false, slotsFilled = 0, suitorLike = 0;
  var sui = suitorById(currentSuitor);
  for (var si=0; si<SLOTS.length; si++) {
    var pid = equipped[SLOTS[si]];
    if (!pid) continue;
    var p = pieceById(pid); if (!p) continue;
    slotsFilled++;
    // tag matches vs brief - FIRST piece to cover a required tag scores big (+12);
    // extra pieces hitting the same tag give a small reinforcement only (+2, capped),
    // so you can't pass by stacking one tag and ignoring the other (Codex 2026-06-05).
    for (var bi=0; bi<brief.tags.length; bi++) {
      if (p.tags.indexOf(brief.tags[bi]) >= 0) {
        if (!matched[brief.tags[bi]]) { matched[brief.tags[bi]] = true; score += 12; }
        else if (tagHits[brief.tags[bi]] < 2) { score += 2; }
        tagHits[brief.tags[bi]]++;
      }
    }
    // palette colour match (once per matching piece, but the headline is the first)
    if (p.color === brief.color) { score += colorHit ? 2 : 8; colorHit = true; }
    // suitor preference bonus (his likes)
    if (sui) for (var li=0; li<sui.likes.length; li++) if (p.tags.indexOf(sui.likes[li])>=0) { score += 2; suitorLike++; }
    // tier bonus (upgraded pieces look sharper)
    score += Math.max(0, (pieceTier(pid)-1)) * 2;
    // rarity polish
    score += (p.rarity - 1) * 2;
  }
  // completeness: filling all 5 slots
  score += slotsFilled * 3;
  // both required tags covered = big harmony bonus
  var allTags = true; for (var k in matched) if (!matched[k]) allTags = false;
  if (allTags && brief.tags.length) score += 20;
  // clash penalty: a tag OPPOSITE to the brief drags it down
  var OPP = { elegant:'edgy', edgy:'elegant', smart:'casual', casual:'smart', cosy:'edgy', soft:'edgy' };
  for (var sj=0; sj<SLOTS.length; sj++) {
    var qid = equipped[SLOTS[sj]]; if (!qid) continue;
    var q = pieceById(qid); if (!q) continue;
    for (var bj=0; bj<brief.tags.length; bj++) {
      var opp = OPP[brief.tags[bj]];
      if (opp && q.tags.indexOf(opp) >= 0) score -= 6;
    }
  }
  score = Math.max(0, Math.round(score));
  return { score: score, matched: matched, allTags: allTags, colorHit: colorHit, slotsFilled: slotsFilled, suitorLike: suitorLike };
}
// A look PASSES only if it clears the score threshold AND covers EVERY required
// tag (you must satisfy the whole brief, not stack one tag). This is the gate.
function outfitPasses(equipped, brief) {
  var r = scoreOutfit(equipped, brief);
  return r.score >= PASS_THRESHOLD && r.allTags;
}
// Guarantee the player can not only COVER a brief's tags but actually assemble a
// PASSING look for it (the gate needs score>=70 AND all tags; a thin wardrobe of
// clashing starter pieces can cover the tags yet still score too low). So this
// "welcome kit" grants, per slot, the single best brief-matching piece IF the
// player currently owns no on-brief piece in that slot - enough for a clean pass
// while leaving plenty still to collect. Runs on suitor unlock + as a startDate
// safety net. Removes the RNG soft-lock AND the thin-wardrobe-cannot-pass case.
function ensureCanDress(brief) {
  var granted = [];
  function fit(p){ var s=0; for (var t=0;t<brief.tags.length;t++) if (p.tags.indexOf(brief.tags[t])>=0) s+=3; if (p.color===brief.color) s+=2; return s; }
  for (var si=0; si<SLOTS.length; si++){
    var slot = SLOTS[si];
    var ownsOnBrief = PIECES.some(function(p){ return p.slot===slot && pieceTier(p.id)>0 && brief.tags.some(function(t){ return p.tags.indexOf(t)>=0; }); });
    if (ownsOnBrief) continue;
    var best=null, bestFit=0;
    for (var pi=0; pi<PIECES.length; pi++){ var p=PIECES[pi]; if (p.slot!==slot) continue; var f=fit(p); if (f>0 && f>bestFit){ bestFit=f; best=p; } }
    if (best && !pieceTier(best.id)){ M.owned[best.id]=1; granted.push(best.id); }
  }
  return granted;
}

// custom asset loader (assets/*.webp) - separate from gf-lib's ./sprites/*.png
var ASSETS = {};
var _assetsReady = false;
function loadAssets(names){
  return Promise.all(names.map(function(n){
    return new Promise(function(res){
      var im = new Image();
      im.onload = function(){ ASSETS[n] = im; res(); };
      im.onerror = function(){ ASSETS[n] = null; res(); };
      im.src = './assets/' + n + '.webp';
    });
  }));
}
function A(name){ return ASSETS[name] || null; }
function hasImg(name){ var im = ASSETS[name]; return im && im.complete && im.naturalWidth>0; }

var ASSET_NAMES = (function(){
  var s = {};
  for (var i=0;i<SUITORS.length;i++) s[SUITORS[i].img]=1;
  for (var d=0;d<DATES.length;d++){ s[DATES[d].bg]=1; s[DATES[d].still]=1; }
  for (var p=0;p<PIECES.length;p++) if (PIECES[p].img) s[PIECES[p].img]=1;
  return Object.keys(s);
})();

function rr(c,x,y,w,h,r){ GF.rr(c,x,y,w,h,r); }
function bg(c){

// vector hairstyle drawn on a head (used on canvas-portrait fallback + hair icons)
function drawHair(c, cx, cy, w, style, col){
  c.save(); c.fillStyle = COLORS[col]||'#3a2a20';
  if (style==='tousled'){
    c.beginPath(); c.moveTo(cx-w*0.55, cy);
    c.bezierCurveTo(cx-w*0.6, cy-w*0.7, cx-w*0.2, cy-w*0.85, cx, cy-w*0.8);
    c.bezierCurveTo(cx+w*0.25, cy-w*0.9, cx+w*0.6, cy-w*0.65, cx+w*0.55, cy);
    c.bezierCurveTo(cx+w*0.4, cy-w*0.3, cx+w*0.2, cy-w*0.25, cx+w*0.1, cy-w*0.45);
    c.bezierCurveTo(cx, cy-w*0.2, cx-w*0.2, cy-w*0.3, cx-w*0.3, cy-w*0.5);
    c.bezierCurveTo(cx-w*0.4, cy-w*0.25, cx-w*0.5, cy-w*0.2, cx-w*0.55, cy);
    c.closePath(); c.fill();
  } else if (style==='neat'){
    c.beginPath(); c.moveTo(cx-w*0.55, cy);
    c.quadraticCurveTo(cx-w*0.55, cy-w*0.85, cx+w*0.1, cy-w*0.82);
    c.quadraticCurveTo(cx+w*0.6, cy-w*0.78, cx+w*0.55, cy);
    c.quadraticCurveTo(cx+w*0.3, cy-w*0.45, cx-w*0.05, cy-w*0.4);
    c.quadraticCurveTo(cx-w*0.35, cy-w*0.4, cx-w*0.55, cy);
    c.closePath(); c.fill();
  } else { // undercut
    c.beginPath(); c.moveTo(cx-w*0.42, cy-w*0.15);
    c.quadraticCurveTo(cx-w*0.3, cy-w*0.85, cx+w*0.15, cy-w*0.82);
    c.quadraticCurveTo(cx+w*0.5, cy-w*0.8, cx+w*0.42, cy-w*0.1);
    c.lineTo(cx+w*0.3, cy-w*0.1);
    c.quadraticCurveTo(cx+w*0.34, cy-w*0.6, cx+w*0.05, cy-w*0.55);
    c.quadraticCurveTo(cx-w*0.18, cy-w*0.55, cx-w*0.3, cy-w*0.12);
    c.closePath(); c.fill();
  }
  c.restore();
}
// stylized canvas portrait fallback (when a suitor image is missing)
function drawPortraitFallback(c, sui, x, y, w, h){
  c.save();
  rr(c,x,y,w,h,18*S()); c.clip();
  var g=c.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0, sui.accent); g.addColorStop(1, '#2a2236');
  c.fillStyle=g; c.fillRect(x,y,w,h);
  var cx=x+w/2, hy=y+h*0.5, r=w*0.22;
  // shoulders
  c.fillStyle='#3a3247'; c.beginPath(); c.moveTo(x+w*0.12,y+h);
  c.quadraticCurveTo(cx, y+h*0.62, x+w*0.88, y+h); c.closePath(); c.fill();
  // face
  c.fillStyle='#f0c9a8'; c.beginPath(); c.ellipse(cx, hy, r, r*1.15, 0,0,Math.PI*2); c.fill();
  // eyes + smile
  c.fillStyle='#2a2230'; c.beginPath(); c.arc(cx-r*0.36, hy-r*0.1, r*0.09,0,Math.PI*2); c.arc(cx+r*0.36, hy-r*0.1, r*0.09,0,Math.PI*2); c.fill();
  c.strokeStyle='#9a5a4a'; c.lineWidth=Math.max(2,r*0.06); c.beginPath(); c.arc(cx, hy+r*0.25, r*0.4, 0.2, Math.PI-0.2); c.stroke();
  drawHair(c, cx, hy-r*0.15, r*1.3, sui.hair, sui.hairCol);
  c.restore();
}
// draw the equipped-icon strip overlay on the portrait (the "look" preview)
function drawLookChips(c, x, y, w){
  var n=0; for (var s=0;s<SLOTS.length;s++) if (equipped[SLOTS[s]]) n++;
  if (!n) return;
  var chip = GF.clamp(34*S(), 26, 44), gap=6*S();
  var totalW = n*chip + (n-1)*gap;
  var sx = x + w/2 - totalW/2, sy = y;
  var k=0;
  for (var si=0; si<SLOTS.length; si++){
    var pid = equipped[SLOTS[si]]; if (!pid) continue;
    var p = pieceById(pid);
    var cxp = sx + k*(chip+gap);
    c.save(); c.shadowColor='rgba(0,0,0,0.4)'; c.shadowBlur=6; rr(c,cxp,sy,chip,chip,8*S());
    c.fillStyle='rgba(20,16,30,0.85)'; c.fill(); c.restore();
    drawPieceArt(c, p, cxp+chip*0.5, sy+chip*0.5, chip*0.84, false);
    k++;
  }
}
// draw a piece's icon (image or canvas-drawn) centered at (cx,cy) sized ~s
function drawPieceArt(c, p, cx, cy, s, bgFill){
  if (p.img && hasImg(p.img)){
    var im=A(p.img); var ar = im.naturalWidth/im.naturalHeight;
    var dw=s, dh=s; if (ar>1) dh=s/ar; else dw=s*ar;
    c.drawImage(im, cx-dw/2, cy-dh/2, dw, dh);
    return;
  }
  // canvas-drawn fallbacks (hair + missing icons), keyed by slot/hair
  c.save();
  if (p.slot==='hair'){
    // a head silhouette + hairstyle
    c.fillStyle='#e8c2a0'; c.beginPath(); c.ellipse(cx, cy+s*0.05, s*0.26, s*0.3, 0,0,Math.PI*2); c.fill();
    drawHair(c, cx, cy-s*0.08, s*0.42, p.hair||'tousled', p.color);
  } else {
    var col = COLORS[p.color]||'#888';
    c.fillStyle=col; c.strokeStyle='rgba(0,0,0,0.25)'; c.lineWidth=Math.max(1.5,s*0.03);
    if (p.slot==='top'){ // a tee shape
      var w=s*0.62,h=s*0.6,x=cx-w/2,y=cy-h/2;
      c.beginPath();
      c.moveTo(x+w*0.18,y); c.lineTo(x-w*0.16,y+h*0.22); c.lineTo(x,y+h*0.4); c.lineTo(x+w*0.18,y+h*0.28);
      c.lineTo(x+w*0.18,y+h); c.lineTo(x+w*0.82,y+h); c.lineTo(x+w*0.82,y+h*0.28);
      c.lineTo(x+w,y+h*0.4); c.lineTo(x+w*1.16,y+h*0.22); c.lineTo(x+w*0.82,y);
      c.quadraticCurveTo(cx,y+h*0.18,x+w*0.18,y); c.closePath(); c.fill(); c.stroke();
    } else if (p.slot==='bottom'){ // trousers
      var w2=s*0.5,h2=s*0.66,x2=cx-w2/2,y2=cy-h2/2;
      c.beginPath(); c.moveTo(x2,y2); c.lineTo(x2+w2,y2);
      c.lineTo(x2+w2,y2+h2); c.lineTo(x2+w2*0.58,y2+h2); c.lineTo(x2+w2*0.5,y2+h2*0.45);
      c.lineTo(x2+w2*0.42,y2+h2); c.lineTo(x2,y2+h2); c.closePath(); c.fill(); c.stroke();
    } else if (p.slot==='outer'){ // jacket
      var w3=s*0.7,h3=s*0.64,x3=cx-w3/2,y3=cy-h3/2;
      c.beginPath(); c.moveTo(x3+w3*0.5,y3); c.lineTo(x3,y3+h3*0.18); c.lineTo(x3+w3*0.12,y3+h3);
      c.lineTo(x3+w3*0.4,y3+h3); c.lineTo(x3+w3*0.5,y3+h3*0.3); c.lineTo(x3+w3*0.6,y3+h3);
      c.lineTo(x3+w3*0.88,y3+h3); c.lineTo(x3+w3,y3+h3*0.18); c.closePath(); c.fill(); c.stroke();
    } else { // acc - a small circle/badge
      c.beginPath(); c.arc(cx,cy,s*0.28,0,Math.PI*2); c.fill(); c.stroke();
      c.strokeStyle='rgba(255,255,255,0.6)'; c.lineWidth=Math.max(1.5,s*0.04);
      c.beginPath(); c.arc(cx,cy,s*0.14,0,Math.PI*2); c.stroke();
    }
  }
  c.restore();
}
function rarityCol(r){ return r>=3?'#e0b84d':r>=2?'#9b6fe0':'#6f8fae'; }

// Could the player assemble a PASSING look for this brief from OWNED pieces?
// (greedy best per slot, then test the gate.) Used as the soft-lock guard.
function canAssemblePassingLook(brief){
  var test = { top:null, bottom:null, outer:null, acc:null, hair:null };
  for (var si=0; si<SLOTS.length; si++){
    var slot=SLOTS[si], best=null, bestSc=-1;
    for (var pi=0; pi<PIECES.length; pi++){ var p=PIECES[pi]; if (p.slot!==slot || pieceTier(p.id)<=0) continue; var save=test[slot]; test[slot]=p.id; var sc=scoreOutfit(test,brief).score; test[slot]=save; if (sc>bestSc){ bestSc=sc; best=p.id; } }
    if (best) test[slot]=best;
  }
  return outfitPasses(test, brief);
}
function startDate(d){
  challengeMode = false; // a normal date is NOT a challenge (startChallenge re-sets it)
  // belt-and-suspenders: never strand the player on a brief they can't pass with
  // their owned wardrobe (grant a minimal on-brief welcome kit if so). Idempotent.
  if (!canAssemblePassingLook(d)) { ensureCanDress(d); saveMeta(); }
  currentDate = d;
  currentSuitor = d.suitor;
  // keep equipped pieces if still owned; else clear
  for (var s=0;s<SLOTS.length;s++){ var pid=equipped[SLOTS[s]]; if (pid && !pieceTier(pid)) equipped[SLOTS[s]]=null; }
  activeTab='top'; gs='STYLE';
  recompute();
}
var canPass = false; // clears threshold AND covers every required tag
function recompute(){
  if (!currentDate) return;
  var r = scoreOutfit(equipped, currentDate);
  styleScore = r.score;
  canPass = (styleScore >= PASS_THRESHOLD) && r.allTags;
  // rating label - high score but a missing required tag still reads "needs work"
  if (canPass && styleScore >= 95) { ratingTxt=T('perfect'); ratingCol='#ffd86b'; }
  else if (canPass) { ratingTxt=T('great'); ratingCol='#7CFC9A'; }
  else if (styleScore >= 40 || r.matched && Object.keys(r.matched).some(function(k){return r.matched[k];})) { ratingTxt=T('nice'); ratingCol='#bcd'; }
  else { ratingTxt=T('meh'); ratingCol='#c98'; }
}
function equip(pid){
  var p = pieceById(pid); if (!p) return;
  var prev = equipped[p.slot];
  equipped[p.slot] = (prev===pid) ? null : pid; // tap again to remove
  GF.sfx(equipped[p.slot]?'tap':'click');
  if (GF.tutorial.active) GF.tutorial.next();
  var before = styleScore;
  recompute();
  ratingFlash = 1;
  if (styleScore > before){
    // perfect-match sparkle on big jumps / all-tags
    var r = scoreOutfit(equipped, currentDate);
    if (r.allTags && r.colorHit){ sparkT = 1; GF.sfx('reward'); GF.spawnParticles(W()/2, H()*0.34, '#ffd86b', 14); }
    else GF.sfx('pickup');
  }
  saveMeta();
}
function tryTakeDate(){
  if (!currentDate) return;
  if (!outfitPasses(equipped, currentDate)){ toast=1.4; toastTxt=T('locked'); toastCol='#e0a35d'; GF.sfx('error'); GF.setShake(0.4); return; }
  GF.sfx('win'); GF.happytime();
  beginVignette(currentDate, styleScore);
}

function drawStyle(c){
  bg(c);
  var pad = 12*S();
  var topH = Math.min(H()*0.07, 56*S());
  // ── top bar: suitor name + gems + boutique button ──
  var sui = suitorById(currentSuitor);
  softText(c, T(sui.nameK), pad, topH*0.5+6*S(), GF.clamp(18*S(),14,24), '#fff', 'left', true);
  softText(c, T(sui.jobK), pad, topH*0.5+24*S(), GF.clamp(11*S(),9,14), '#b8a9d0', 'left', false);
  // gems pill (top-right)
  drawGemPill(c, W()-pad-86*S(), topH*0.5-14*S(), 86*S(), 28*S());
  // boutique button below gems
  var bbW=86*S(), bbH=24*S(), bbx=W()-pad-bbW, bby=topH*0.5+18*S();
  drawMiniBtn(c, bbx, bby, bbW, bbH, T('boutique'), '#3a2f52', function(){ gs='BOUTIQUE'; GF.sfx('click'); });

  // ── BRIEF card ──
  var brY = topH + 8*S();
  var brH = Math.min(H()*0.085, 66*S());
  c.save(); c.shadowColor='rgba(0,0,0,0.35)'; c.shadowBlur=8;
  rr(c, pad, brY, W()-pad*2, brH, 12*S()); c.fillStyle='rgba(46,36,64,0.92)'; c.fill(); c.restore();
  var bx = pad+12*S();
  softText(c, T('brief')+': '+T(currentDate.themeK), bx, brY+20*S(), GF.clamp(14*S(),12,18), '#fff','left',true);
  // required tags chips
  var tcx = bx, tcy = brY+brH-16*S();
  softText(c, T('need')+':', bx, tcy, GF.clamp(11*S(),9,13), '#b8a9d0','left',false);
  tcx = bx + c.measureText(T('need')+': ').width + 6*S();
  var r0 = scoreOutfit(equipped, currentDate);
  for (var ti=0; ti<currentDate.tags.length; ti++){
    var tg = currentDate.tags[ti], lab = T('tg'+tg.charAt(0).toUpperCase()+tg.slice(1));
    c.font='bold '+GF.clamp(11*S(),9,13)+'px Inter, sans-serif';
    var tw = c.measureText(lab).width + 14*S();
    var done = r0.matched[tg];
    rr(c, tcx, tcy-12*S(), tw, 17*S(), 8*S());
    c.fillStyle = done? 'rgba(124,252,154,0.25)':'rgba(255,255,255,0.08)'; c.fill();
    c.strokeStyle = done? '#7CFC9A':'rgba(255,255,255,0.2)'; c.lineWidth=1; c.stroke();
    softText(c, lab, tcx+7*S(), tcy, GF.clamp(11*S(),9,13), done?'#7CFC9A':'#cdbfe6','left',true);
    tcx += tw + 6*S();
  }
  // palette swatch (top-right of brief)
  var swx = W()-pad-46*S(), swy = brY+brH*0.5;
  c.save(); c.beginPath(); c.arc(swx, swy, 13*S(),0,Math.PI*2);
  c.fillStyle = COLORS[currentDate.color]; c.fill();
  c.lineWidth=2; c.strokeStyle = r0.colorHit?'#7CFC9A':'rgba(255,255,255,0.5)'; c.stroke(); c.restore();
  softText(c, T('palette'), swx, brY+brH*0.5-18*S(), GF.clamp(9*S(),8,11), '#b8a9d0','center',false);

  // ── SUITOR portrait (center, prominent) ──
  var portY = brY + brH + 8*S();
  var wardTop = H() - wardrobeHeight();
  var portH = wardTop - portY - 64*S();
  var portW = Math.min(W()-pad*2, portH*0.78);
  var portX = W()/2 - portW/2;
  c.save(); c.shadowColor='rgba(0,0,0,0.5)'; c.shadowBlur=14;
  rr(c, portX, portY, portW, portH, 18*S());
  if (hasImg(sui.img)){ c.save(); rr(c,portX,portY,portW,portH,18*S()); c.clip();
    var im=A(sui.img), ar=im.naturalWidth/im.naturalHeight, dw=portW, dh=portW/ar;
    if (dh<portH){ dh=portH; dw=portH*ar; }
    c.drawImage(im, portX+portW/2-dw/2, portY, dw, dh); c.restore();
    c.lineWidth=2; c.strokeStyle='rgba(255,255,255,0.12)'; rr(c,portX,portY,portW,portH,18*S()); c.stroke();
  } else { c.restore(); drawPortraitFallback(c, sui, portX, portY, portW, portH); c.save(); }
  c.restore();
  // sparkle on perfect
  if (sparkT>0){ drawSparkles(c, portX, portY, portW, portH); }

  var btnW = Math.min(W()-pad*2, 320*S()), btnH=40*S();

  var grad=c.createLinearGradient(btnX,btnY,btnX,btnY+btnH);
  if (canPass){ grad.addColorStop(0,'#ff7eb3'); grad.addColorStop(1,'#e0568f'); }
  else { grad.addColorStop(0,'#4a4060'); grad.addColorStop(1,'#3a3350'); }
  c.save(); if (canPass){ c.shadowColor='rgba(255,126,179,0.5)'; c.shadowBlur=16; }
  rr(c,btnX,btnY,btnW,btnH,btnH/2); c.fillStyle=grad; c.fill(); c.restore();
  softText(c, canPass?T('pass'):T('locked'), W()/2, btnY+btnH*0.5+5*S(), GF.clamp(15*S(),13,19), canPass?'#fff':'#9a90b0','center',true);
  HOT(btnX,btnY,btnW,btnH, tryTakeDate, 'take');

  // ── WARDROBE (tabbed, fixed compact grid) ──
  drawWardrobe(c, wardTop);

  // mute icon (top, just left of gems would overlap - place at far left under name)

}

function drawSparkles(c, x, y, w, h){
  var n=10; var t=(1-sparkT);
  for (var i=0;i<n;i++){
    var a = (i/n)*Math.PI*2 + t*2;
    var rad = (0.3+0.5*t)*Math.min(w,h)*0.5;
    var px = x+w/2+Math.cos(a)*rad, py=y+h*0.4+Math.sin(a)*rad*0.8;
    c.save(); c.globalAlpha = sparkT*0.9; c.fillStyle='#ffe9a8';
    c.translate(px,py); c.rotate(a);
    var s=6*S()*sparkT;
    c.beginPath(); c.moveTo(0,-s); c.lineTo(s*0.3,0); c.lineTo(0,s); c.lineTo(-s*0.3,0); c.closePath(); c.fill();
    c.restore();
  }
}
function drawStyleBar(c, x, y, w, h){
  rr(c,x,y,w,h,h/2); c.fillStyle='rgba(0,0,0,0.35)'; c.fill();
  // threshold tick
  var tickX = x + w*(PASS_THRESHOLD/100);
  var pct = GF.clamp(shownScore/100, 0, 1.0);
  if (pct>0){
    rr(c,x,y,Math.max(h, w*pct),h,h/2);
    var g=c.createLinearGradient(x,0,x+w,0);
    g.addColorStop(0,'#ff9ec4'); g.addColorStop(0.6,'#ff7eb3'); g.addColorStop(1,'#ffd86b');
    c.fillStyle=g; c.fill();
  }
  // threshold marker line
  c.strokeStyle='rgba(255,255,255,0.85)'; c.lineWidth=2;
  c.beginPath(); c.moveTo(tickX, y-3*S()); c.lineTo(tickX, y+h+3*S()); c.stroke();
  softText(c, T('style'), x+8*S(), y+h*0.5+4*S(), GF.clamp(11*S(),9,13), '#fff','left',true);
  softText(c, Math.round(shownScore)+'', x+w-8*S(), y+h*0.5+4*S(), GF.clamp(12*S(),10,15), '#fff','right',true);
}
function wardrobeHeight(){ return Math.min(H()*0.32, 230*S()); }
function drawWardrobe(c, top){
  var h = wardrobeHeight();
  c.fillStyle='rgba(18,13,28,0.96)'; c.fillRect(0,top,W(),h);
  c.fillStyle='rgba(255,255,255,0.06)'; c.fillRect(0,top,W(),1);
  var pad=10*S();
  // tabs row
  var tabY = top+8*S(), tabH=30*S();
  var tabW = (W()-pad*2 - 4*(SLOTS.length-1)*S())/SLOTS.length;
  for (var i=0;i<SLOTS.length;i++){
    var slot=SLOTS[i];
    var tx = pad + i*(tabW + 4*S());
    var on = activeTab===slot;
    rr(c, tx, tabY, tabW, tabH, 8*S());
    c.fillStyle = on? '#ff7eb3':'rgba(255,255,255,0.07)'; c.fill();
    // dot if a piece is equipped in this slot
    if (equipped[slot]){ c.beginPath(); c.arc(tx+tabW-9*S(), tabY+9*S(), 3*S(),0,Math.PI*2); c.fillStyle=on?'#fff':'#7CFC9A'; c.fill(); }
    softText(c, T(SLOT_TAB[slot]), tx+tabW/2, tabY+tabH*0.5+4*S(), GF.clamp(11*S(),9,13), on?'#fff':'#cdbfe6','center',true);
    (function(sl){ HOT(tx,tabY,tabW,tabH, function(){ activeTab=sl; GF.sfx('click'); wardrobePage=0; }, 'tab'); })(slot);
  }
  // pieces grid for active slot (owned only)
  var list = PIECES.filter(function(p){ return p.slot===activeTab && pieceTier(p.id)>0; });
  var gridY = tabY+tabH+8*S();
  var cols = 4;
  var cellW = (W()-pad*2 - (cols-1)*8*S())/cols;
  var cellH = Math.min(cellW, (h - (tabH+24*S())) - 8*S());
  cellH = Math.max(54*S(), Math.min(cellH, cellW));
  var rows = Math.floor((h - (gridY-top) - 6*S())/(cellH+8*S()));
  if (rows<1) rows=1;
  var perPage = cols*rows;
  var pages = Math.max(1, Math.ceil(list.length/perPage));
  if (wardrobePage>=pages) wardrobePage=pages-1;
  var startI = wardrobePage*perPage;
  for (var k=0; k<perPage; k++){
    var p = list[startI+k]; if (!p) break;
    var col = k%cols, row=Math.floor(k/cols);
    var cxp = pad + col*(cellW+8*S());
    var cyp = gridY + row*(cellH+8*S());
    var on = equipped[p.slot]===p.id;
    c.save(); if (on){ c.shadowColor='rgba(255,126,179,0.6)'; c.shadowBlur=10; }
    rr(c, cxp, cyp, cellW, cellH, 10*S());
    c.fillStyle = on? 'rgba(255,126,179,0.18)':'rgba(255,255,255,0.05)'; c.fill();
    c.lineWidth=on?2:1; c.strokeStyle = on? '#ff7eb3': rarityCol(p.rarity); c.globalAlpha=on?1:0.6; c.stroke(); c.globalAlpha=1;
    c.restore();
    drawPieceArt(c, p, cxp+cellW/2, cyp+cellH*0.42, cellH*0.6, true);
    // tier pips
    var tier = pieceTier(p.id);
    if (tier>1){ for (var tp=0; tp<Math.min(tier-1,3); tp++){ c.beginPath(); c.arc(cxp+8*S()+tp*7*S(), cyp+8*S(), 2.5*S(),0,Math.PI*2); c.fillStyle='#ffd86b'; c.fill(); } }
    softText(c, lang()==='ru'?p.ru:p.en, cxp+cellW/2, cyp+cellH-6*S(), GF.clamp(9*S(),8,11), on?'#fff':'#bcaede','center',false);
    (function(pp){ HOT(cxp,cyp,cellW,cellH, function(){ equip(pp.id); }, 'piece'); })(p);
  }
  // page dots
  if (pages>1){
    var dy = top+h-7*S();
    var dW = pages*10*S();
    for (var pg=0; pg<pages; pg++){
      var dx = W()/2 - dW/2 + pg*10*S();
      c.beginPath(); c.arc(dx, dy, 3*S(),0,Math.PI*2); c.fillStyle = pg===wardrobePage?'#ff7eb3':'rgba(255,255,255,0.25)'; c.fill();
    }
    // tap left/right halves of wardrobe to page
    HOT(0, gridY, W()*0.25, h-(gridY-top), function(){ if (wardrobePage>0){ wardrobePage--; GF.sfx('click'); } }, 'pgL');
    HOT(W()*0.75, gridY, W()*0.25, h-(gridY-top), function(){ if (wardrobePage<pages-1){ wardrobePage++; GF.sfx('click'); } }, 'pgR');
  }
}

//  DATE VIGNETTE
// ════════════════════════════════════════════════════════════════════════
function beginVignette(d, score){
  gs='DATE'; vDate=d;
  vignetteLines = (lang()==='ru'?d.ru:d.en).slice();
  vLine=0; vLineT=0; vBlush=0;
  vAff0 = M.aff[d.suitor]||0;
  // score-scaled affinity gain (better look = more affinity)
  var bonus = score>=95? 16 : score>=85? 8 : 0;
  vAffGain = d.aff + bonus;
  vAffShow = 0; vBondUp=false; vUnlock='';
  // apply affinity
  var beforeLv = bondLevel(vAff0);
  var beforeUnlockedSuitors = SUITOR_CHAIN.filter(function(s){ return suitorUnlocked(s,M); }).length;
  M.aff[d.suitor] = vAff0 + vAffGain;
  var afterLv = bondLevel(M.aff[d.suitor]);
  if (afterLv>beforeLv) vBondUp=true;
  // reward gems for the date
  M.gems += score>=95? 14 : 10;
  // record memory (unique per date - keep best score)
  var found=false;
  for (var i=0;i<M.memories.length;i++){ if (M.memories[i].date===d.id){ found=true; if (score>M.memories[i].score){ M.memories[i].score=score; M.memories[i].ts=Date.now(); } } }
  if (!found){ M.memories.unshift({ date:d.id, suitor:d.suitor, still:d.still, theme:d.themeK, score:score, ts:Date.now() }); }
  if (score>M.bestScore){ M.bestScore=score; best=score; }
  // detect newly-unlocked suitor / date
  var afterUnlockedSuitors = SUITOR_CHAIN.filter(function(s){ return suitorUnlocked(s,M); }).length;
  vNewSuitor = '';
  if (afterUnlockedSuitors>beforeUnlockedSuitors){
    var ns = SUITOR_CHAIN[afterUnlockedSuitors-1]; vUnlock = T('unlockSuitor')+' '+T(suitorById(ns).nameK); vNewSuitor = ns;
    // welcome gift: guarantee the new suitor's first date is dressable (no RNG soft-lock)
    var firstDate = datesForSuitor(ns)[0];
    if (firstDate) ensureCanDress(firstDate);
  }
  saveMeta();
  GF.spawnParticles(W()/2, H()*0.4, '#ff9ec4', 18);
  heartBurst = []; for (var hb=0; hb<10; hb++) heartBurst.push({ x:W()/2+(Math.random()-0.5)*W()*0.3, y:H()*0.6, vy:-(1+Math.random()*2)*S(), vx:(Math.random()-0.5)*S(), life:1, sz:(8+Math.random()*8)*S() });
}
function vignetteNext(){
  if (vLine < vignetteLines.length-1){ vLine++; vLineT=0; GF.sfx('pickup'); }
  else {
    // done - return to style screen for the NEXT available date of this suitor (or first locked->boutique)
    GF.sfx('click');
    advanceAfterDate();
  }
}
function advanceAfterDate(){
  // If this date unlocked a NEW suitor, surface them: jump to the Suitors screen
  // so the player notices + can pick the new face (Codex 2026-06-05 - don't bury
  // the unlock under another repeat of the same suitor).
  if (vNewSuitor){ vNewSuitor=''; gs='SUITORS'; return; }
  var sui = currentSuitor;
  var ds = datesForSuitor(sui);
  // prefer a date for THIS suitor we have NOT collected a memory for yet
  var collected = {}; for (var m=0;m<M.memories.length;m++) collected[M.memories[m].date]=1;
  var next = null;
  for (var i=0;i<ds.length;i++){ if (dateUnlocked(ds[i],M) && ds[i].id!==vDate.id && !collected[ds[i].id]){ next=ds[i]; break; } }
  // else the next unlocked date for this suitor (replay for affinity grind)
  if (!next){ for (var j=0;j<ds.length;j++){ if (dateUnlocked(ds[j],M) && ds[j].id!==vDate.id){ next=ds[j]; break; } } }
  // else any other suitor's uncollected unlocked date
  if (!next){ for (var d=0; d<DATES.length; d++){ if (dateUnlocked(DATES[d],M) && DATES[d].id!==vDate.id && !collected[DATES[d].id]){ next=DATES[d]; break; } } }
  if (next){ startDate(next); }
  else { gs='SUITORS'; } // nothing new - let the player choose / replay from Suitors
}
function drawDate(c){
  bg(c);
  var d=vDate, sui=suitorById(d.suitor);
  // backdrop image (full-bleed, dimmed)
  if (hasImg(d.bg)){ c.save(); var im=A(d.bg), ar=im.naturalWidth/im.naturalHeight, dw=W(), dh=W()/ar; if (dh<H()){ dh=H(); dw=H()*ar; } c.globalAlpha=0.5; c.drawImage(im, W()/2-dw/2, H()/2-dh/2, dw, dh); c.restore(); }
  c.fillStyle='rgba(20,14,30,0.45)'; c.fillRect(0,0,W(),H());
  // milestone still (the pre-composed full-look reveal) - centered card
  var sw = Math.min(W()*0.9, 520*S()), sh = sw*0.72;
  var sx = W()/2-sw/2, sy = H()*0.12;
  c.save(); c.shadowColor='rgba(0,0,0,0.6)'; c.shadowBlur=20;
  rr(c,sx,sy,sw,sh,16*S());
  if (hasImg(d.still)){ c.save(); rr(c,sx,sy,sw,sh,16*S()); c.clip();
    var sm=A(d.still), sar=sm.naturalWidth/sm.naturalHeight, sdw=sw, sdh=sw/sar; if (sdh<sh){ sdh=sh; sdw=sh*sar; }
    c.drawImage(sm, sx+sw/2-sdw/2, sy+sh/2-sdh/2, sdw, sdh); c.restore();
    c.lineWidth=2; c.strokeStyle='rgba(255,255,255,0.15)'; rr(c,sx,sy,sw,sh,16*S()); c.stroke();
  } else { c.fillStyle='#2c2440'; c.fill(); drawPortraitFallback(c, sui, sx+sw*0.5-sh*0.4, sy, sh*0.8, sh); softText(c, T('dateDone'), W()/2, sy+sh*0.5, GF.clamp(16*S(),13,20),'#fff','center',true); }
  c.restore();

  // name + theme
  softText(c, T(sui.nameK)+' · '+T(d.themeK), W()/2, sy+sh+26*S(), GF.clamp(15*S(),13,19), '#fff','center',true);

  // dialogue bubble (current line; tap to advance)
  var bubH = 76*S(), bubW = Math.min(W()*0.9, 520*S()), bubX=W()/2-bubW/2, bubY=sy+sh+40*S();
  c.save(); c.shadowColor='rgba(0,0,0,0.4)'; c.shadowBlur=10;
  rr(c,bubX,bubY,bubW,bubH,14*S()); c.fillStyle='rgba(40,30,56,0.96)'; c.fill();
  c.lineWidth=2; c.strokeStyle=sui.accent; c.globalAlpha=0.5; c.stroke(); c.globalAlpha=1; c.restore();
  // typewriter
  var full = vignetteLines[vLine]||'';
  var shown = full.substr(0, Math.floor(vLineT*38));
  c.font=GF.clamp(14*S(),12,18)+'px Inter, system-ui, sans-serif'; c.fillStyle='#fff'; c.textAlign='left'; c.textBaseline='top';
  wrapText(c, '“'+shown+(shown.length<full.length?'':'”'), bubX+14*S(), bubY+12*S(), bubW-28*S(), GF.clamp(19*S(),16,24));
  softText(c, (vLine+1)+'/'+vignetteLines.length, bubX+bubW-14*S(), bubY+bubH-10*S(), GF.clamp(10*S(),9,12), '#b8a9d0','right',false);
  softText(c, (vLine<vignetteLines.length-1)?T('cont'):T('cont'), bubX+14*S(), bubY+bubH-10*S(), GF.clamp(10*S(),9,12), sui.accent,'left',true);

  // affinity gain panel
  var apY = bubY+bubH+14*S();
  var apW = Math.min(W()*0.9, 520*S()), apX=W()/2-apW/2, apH=44*S();
  rr(c,apX,apY,apW,apH,12*S()); c.fillStyle='rgba(255,255,255,0.06)'; c.fill();
  softText(c, T('affinity'), apX+12*S(), apY+18*S(), GF.clamp(12*S(),10,15), '#ff9ec4','left',true);
  // affinity bar (animated to show the gain)
  var aff = vAff0 + vAffShow;
  var lo=bondPrev(aff), hi=bondNext(aff);
  var p2 = GF.clamp((aff-lo)/Math.max(1,(hi-lo)), 0, 1);
  var abX=apX+12*S(), abY=apY+24*S(), abW=apW-24*S(), abH=10*S();
  rr(c,abX,abY,abW,abH,abH/2); c.fillStyle='rgba(0,0,0,0.4)'; c.fill();
  rr(c,abX,abY,Math.max(abH, abW*p2),abH,abH/2); c.fillStyle='#ff7eb3'; c.fill();
  softText(c, '+'+Math.round(vAffShow), apX+apW-12*S(), apY+18*S(), GF.clamp(12*S(),10,15), '#7CFC9A','right',true);
  softText(c, T('bond')+' '+T('lv')+' '+bondLevel(aff), abX, abY+abH+14*S(), GF.clamp(11*S(),9,13), '#cdbfe6','left',false);
  if (vBondUp && vAffShow>=vAffGain) softText(c, T('bondUp'), W()/2, abY+abH+14*S(), GF.clamp(12*S(),10,15), '#ffd86b','center',true);

  // unlock banner
  if (vUnlock && vAffShow>=vAffGain){ softText(c, vUnlock, W()/2, apY+apH+22*S(), GF.clamp(13*S(),11,16), '#ffd86b','center',true); }

  // continue button (mirror tap-anywhere)
  HOT(0,0,W(),H(), vignetteNext, 'vnext');

  // floating hearts
  for (var i=0;i<heartBurst.length;i++){ var hbt=heartBurst[i]; if (hbt.life>0){ c.save(); c.globalAlpha=hbt.life; drawHeart(c, hbt.x, hbt.y, hbt.sz, '#ff7eb3'); c.restore(); } }
}
function drawHeart(c, x, y, s, col){
  c.save(); c.translate(x,y); c.fillStyle=col; c.beginPath();
  c.moveTo(0, s*0.3);
  c.bezierCurveTo(-s*0.5, -s*0.3, -s*0.5, -s*0.7, 0, -s*0.4);
  c.bezierCurveTo(s*0.5, -s*0.7, s*0.5, -s*0.3, 0, s*0.3);
  c.closePath(); c.fill(); c.restore();
}
function wrapText(c, text, x, y, maxW, lineH){
  var words = String(text).split(' '); var line='', yy=y;
  for (var i=0;i<words.length;i++){ var test=line?line+' '+words[i]:words[i];
    if (c.measureText(test).width>maxW && line){ c.fillText(line, x, yy); line=words[i]; yy+=lineH; } else line=test; }
  if (line) c.fillText(line, x, yy);
}

function drawBoutique(c){
  bg(c);

  drawGemPill(c, W()-pad-92*S(), 14*S(), 92*S(), 30*S());

  c.save(); c.shadowColor='rgba(255,126,179,0.3)'; c.shadowBlur=14;
  rr(c, pad, y, cardW, cardH, 16*S());
  var g=c.createLinearGradient(pad,y,pad+cardW,y+cardH);
  g.addColorStop(0,'#3a2750'); g.addColorStop(1,'#542a44'); c.fillStyle=g; c.fill(); c.restore();
  softText(c, T('pull'), pad+16*S(), y+28*S(), GF.clamp(18*S(),15,24), '#fff','left',true);

  for (var i=0;i<3;i++){ drawGiftBox(c, pad+cardW-150*S()+i*48*S(), y+cardH*0.42, 38*S(), i); }
  var pullW=Math.min(cardW-32*S(), 280*S()), pullH=42*S(), pullX=pad+cardW/2-pullW/2, pullY=y+cardH-pullH-12*S();
  // pulls remain available while ANY piece is below max tier 4 (dupes tier-up),
  // not just while a unique piece is unowned (Codex 2026-06-05).
  var anyPullable = PIECES.some(function(p){ return pieceTier(p.id) < 4; });
  var canPull = M.gems>=20 && anyPullable;
  var pg2=c.createLinearGradient(pullX,pullY,pullX,pullY+pullH);
  if (canPull){ pg2.addColorStop(0,'#ffd86b'); pg2.addColorStop(1,'#e0a93f'); } else { pg2.addColorStop(0,'#4a4060'); pg2.addColorStop(1,'#3a3350'); }
  rr(c,pullX,pullY,pullW,pullH,pullH/2); c.fillStyle=pg2; c.fill();

  if (canPull) HOT(pullX,pullY,pullW,pullH, doPull, 'pull');

  // ── DAILY STYLE CHALLENGE ──

  drawNavCard(c, pad+navW+8*S(), y, navW, navH, T('memories'), '#e08a5d', function(){ gs='MEMORIES'; memPage=0; GF.sfx('click'); });
  drawNavCard(c, pad+2*(navW+8*S()), y, navW, navH, T('wardrobe'), '#b05de0', function(){ gs='SUITORS'; GF.sfx('click'); });

  // watch-ad for gems
  y += navH + 14*S();
  var adW=Math.min(W()-pad*2, 300*S()), adH=38*S(), adX=W()/2-adW/2;
  rr(c,adX,y,adW,adH,adH/2); c.fillStyle='rgba(124,252,154,0.15)'; c.fill(); c.lineWidth=1; c.strokeStyle='#7CFC9A'; c.stroke();
  softText(c, T('adGems'), W()/2, y+adH*0.5+5*S(), GF.clamp(13*S(),11,16), '#7CFC9A','center',true);
  HOT(adX,y,adW,adH, watchAdGems, 'adgems');

  drawMute(c, pad, 16*S());
  if (toast>0) drawToast(c);
  if (pullState) drawPullOverlay(c);
}
function drawGiftBox(c, x, y, s, i){
  var cols=['#ff7eb3','#7CFC9A','#ffd86b'];
  c.save(); c.translate(x,y);

function doPull(){
  if (M.gems<20){ toast=1.4; toastTxt=T('needGems'); toastCol='#e0a35d'; GF.sfx('error'); return; }
  // pull a piece the player does NOT own at full, weighted by rarity + pity
  var pool = PIECES.filter(function(p){ return pieceTier(p.id) < 4; });
  if (!pool.length){ toast=1.4; toastTxt=T('soldout'); toastCol='#ffd86b'; return; }
  M.gems -= 20;
  M.pity++;
  // pity: force a rare+ every 6 pulls
  var forceRare = M.pity>=6;
  var roll = Math.random();
  var wantRarity = forceRare ? (Math.random()<0.4?3:2) : (roll<0.62?1: roll<0.9?2:3);
  var tier = pool.filter(function(p){ return p.rarity===wantRarity; });
  if (!tier.length) tier = pool;
  // prefer NEW pieces
  var fresh = tier.filter(function(p){ return pieceTier(p.id)===0; });
  var pick = (fresh.length?fresh:tier)[Math.floor(Math.random()*(fresh.length?fresh.length:tier.length))];
  if (pick.rarity>=2) M.pity=0;
  var dupe = pieceTier(pick.id)>0;
  M.owned[pick.id] = (M.owned[pick.id]||0) + 1; // tier-up on dupe
  saveMeta();
  pullState = { piece: pick, dupe: dupe, t: 0 };
  GF.sfx('unlock'); GF.spawnParticles(W()/2, H()*0.4, rarityCol(pick.rarity), 16);
}
function drawPullOverlay(c){
  c.fillStyle='rgba(8,5,16,0.92)'; c.fillRect(0,0,W(),H());

  var cx=W()/2, cy=H()*0.42;

  c.save(); c.translate(cx,cy); c.globalAlpha=0.4*t;
  for (var i=0;i<12;i++){ c.rotate(Math.PI/6); c.fillStyle=rarityCol(p.rarity); c.beginPath(); c.moveTo(0,0); c.lineTo(14*S(),-160*S()*t); c.lineTo(-14*S(),-160*S()*t); c.closePath(); c.fill(); }
  c.restore();
  // card
  var cardW=180*S(), cardH=220*S(), cx2=cx-cardW/2, cy2=cy-cardH/2;
  var sc = 0.6+0.4*t;
  c.save(); c.translate(cx,cy); c.scale(sc,sc); c.translate(-cx,-cy);

  rr(c,cx2,cy2,cardW,cardH,16*S()); c.fillStyle='rgba(30,22,44,0.98)'; c.fill();

  softText(c, lang()==='ru'?p.ru:p.en, cx, cy2+cardH-34*S(), GF.clamp(14*S(),12,18), '#fff','center',true);

  c.restore();
  // tap to dismiss
  if (t>=1){ softText(c, T('cont'), cx, cy+cardH*0.6, GF.clamp(13*S(),11,16), '#cdbfe6','center',false); }

function claimDaily(){
  if (M.lastDaily===dayIndex()){ toast=1.4; toastTxt=T('chDone'); toastCol='#bcd'; GF.sfx('click'); return; }
  // streak continues if claimed yesterday, else resets
  if (M.lastDaily===dayIndex()-1) M.streak = Math.min(M.streak+1, 7); else M.streak=1;

var challengeMode = false;
function startChallenge(){
  if (M.lastChallenge===dayIndex()){ toast=1.4; toastTxt=T('chDone'); toastCol='#bcd'; GF.sfx('click'); return; }
  // pick a random unlocked suitor + a synthetic brief that the player CAN actually
  // satisfy with OWNED pieces (the pass gate now requires every required tag, so a
  // brief asking for tags the player can't cover would be unwinnable). We derive the
  // two tags + palette from tags/colours actually present in the owned wardrobe.
  var unlocked = SUITOR_CHAIN.filter(function(s){ return suitorUnlocked(s,M); });
  var su = unlocked[Math.floor(Math.random()*unlocked.length)];
  var tmpl = datesForSuitor(su)[0];
  // tags coverable by owned pieces
  var coverTags = {}, coverCols = {};
  for (var i=0;i<PIECES.length;i++){ if (pieceTier(PIECES[i].id)>0){ for (var t=0;t<PIECES[i].tags.length;t++) coverTags[PIECES[i].tags[t]]=1; coverCols[PIECES[i].color]=1; } }
  var tagList = Object.keys(coverTags), colList = Object.keys(coverCols);
  var seed = dayIndex();
  var t1 = tagList[seed % tagList.length];
  var t2 = tagList[(seed*3+1) % tagList.length];
  // ensure two DIFFERENT, non-opposite tags so the brief is harmonious + solvable
  var OPP = { elegant:'edgy', edgy:'elegant', smart:'casual', casual:'smart', cosy:'edgy', soft:'edgy' };
  var tries=0;
  while ((t2===t1 || OPP[t1]===t2) && tries<tagList.length){ t2 = tagList[(seed*3+1+ ++tries) % tagList.length]; }
  if (t2===t1){ t2=null; } // degenerate (tiny wardrobe): fall back to a single-tag brief
  var tags = t2 ? [t1,t2] : [t1];
  var col = colList[seed % colList.length];
  var ch = { id:'challenge', suitor:su, themeK:'challenge', tags:tags, color: col, bg: tmpl.bg, still: tmpl.still, minBond:0, aff: 0,
    en:tmpl.en, ru:tmpl.ru };
  startDate(ch);          // clears challengeMode...
  challengeMode = true;   // ...then we mark this round as the challenge
}

}

function update(dt){
  GF.tutorial.update(dt);
  // animate shown score toward target
  shownScore += (styleScore - shownScore) * Math.min(1, dt*8);
  if (Math.abs(styleScore-shownScore)<0.5) shownScore=styleScore;
  if (ratingFlash>0) ratingFlash=Math.max(0, ratingFlash-dt*2);
  if (sparkT>0) sparkT=Math.max(0, sparkT-dt*1.1);
  if (toast>0) toast=Math.max(0, toast-dt);
  if (bootBanner>0) bootBanner=Math.max(0, bootBanner-dt);
  if (gs==='DATE'){ vLineT+=dt; if (vAffShow<vAffGain){ vAffShow=Math.min(vAffGain, vAffShow+dt*vAffGain*1.1); } vBlush=Math.min(1,vBlush+dt); }
  if (pullState){ pullState.t+=dt; }
  for (var i=heartBurst.length-1;i>=0;i--){ var h=heartBurst[i]; h.x+=h.vx; h.y+=h.vy; h.vy-=0.02*S(); h.life-=dt*0.5; if (h.life<=0) heartBurst.splice(i,1); }
}

}
function draw(c, dt){
  hot.length=0;
  if (!_assetsReady){ drawLoadingSplash(c); return; }
  // safety: STYLE/DATE require a current date; fall back to SUITORS if missing
  if ((gs==='STYLE' && !currentDate) || (gs==='DATE' && !vDate)) gs='SUITORS';
  if (gs==='STYLE') drawStyle(c);
  else if (gs==='DATE') drawDate(c);
  else if (gs==='BOUTIQUE') drawBoutique(c);
  else if (gs==='SUITORS') drawSuitors(c);
  else if (gs==='MEMORIES') drawMemories(c);
  else if (currentDate) drawStyle(c);
  else drawSuitors(c);
  if (bootBanner>0 && gs!=='DATE'){ drawBootBanner(c); }
}
function drawBootBanner(c){
  var a=Math.min(1, bootBanner*1.2);
  c.save(); c.globalAlpha=a;
  var tw=Math.min(W()*0.8, 360*S()), th=44*S(), tx=W()/2-tw/2, ty=H()-th-20*S();
  c.shadowColor='rgba(0,0,0,0.4)'; c.shadowBlur=10; rr(c,tx,ty,tw,th,th/2); c.fillStyle='rgba(255,216,107,0.95)'; c.fill(); c.restore();
  softText(c, bootBannerTxt, W()/2, ty+th*0.5+5*S(), GF.clamp(13*S(),11,16), '#2a1f12','center',true);
}

// ── INPUT ────────────────────────────────────────────────────────────────
function onPress(x, y){
  // When the tutorial is active, its steps advance on the REAL action
  // (equip() -> GF.tutorial.next()). We must NOT let GF.tutorial.handleClick
  // swallow the tap for manual steps, or the equip never fires. So we only
  // consult the tutorial for its SKIP button, then always route the tap to the
  // real hit-targets (wardrobe pieces / tabs), letting equip() drive .next().
  if (GF.tutorial.active){
    var b = GF.tutorial._skipBtn;
    if (b && x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h){
      GF.tutorial.active = false;
      try { localStorage.setItem('styled_heart_tut_v1','1'); } catch(e){}
      GF.sfx('click');
      return;
    }
  }
  hitHot(x, y);
}
function pointFromEvent(e){
  var rect = GF.canvas.getBoundingClientRect();
  var sx = GF.canvas.width / rect.width, sy = GF.canvas.height / rect.height;
  var cxp, cyp;
  if (e.touches && e.touches.length){ cxp=e.touches[0].clientX; cyp=e.touches[0].clientY; }
  else if (e.changedTouches && e.changedTouches.length){ cxp=e.changedTouches[0].clientX; cyp=e.changedTouches[0].clientY; }
  else { cxp=e.clientX; cyp=e.clientY; }
  return { x:(cxp-rect.left)*sx, y:(cyp-rect.top)*sy };
}
// own pointer handlers (rect-based scale math each event - touch + mouse)
GF.canvas.addEventListener('pointerdown', function(e){ e.preventDefault(); var p=pointFromEvent(e); onPress(p.x, p.y); }, { passive:false });
// fallback for browsers without pointer events
GF.canvas.addEventListener('touchstart', function(e){ if (window.PointerEvent) return; e.preventDefault(); var p=pointFromEvent(e); onPress(p.x,p.y); }, { passive:false });
GF.canvas.addEventListener('mousedown', function(e){ if (window.PointerEvent) return; var p=pointFromEvent(e); onPress(p.x,p.y); });

function lang(){ return GF.lang; }

// ── TUTORIAL ─────────────────────────────────────────────────────────────
function startTutorialIfNeeded(force){
  if (!force && M.seenTut) return;
  // 3 steps; each advances on the REAL action (equip a piece) via equip()->next()
  var wardTop = function(){ return H()-wardrobeHeight(); };
  var firstCellTarget = function(){
    // center of the first wardrobe cell in the active tab
    var pad=10*S(); var tabH=30*S();
    var gy = wardTop()+8*S()+tabH+8*S();
    var cols=4; var cellW=(W()-pad*2-(cols-1)*8*S())/cols;
    return { x: pad+cellW/2, y: gy+cellW*0.4, r: cellW*0.5 };
  };
  GF.tutorial.start([
    { text: T('tut1'), target: firstCellTarget, gesture:'tap', advance:'manual' },
    { text: T('tut2'), target: firstCellTarget, gesture:'tap', advance:'manual' },
    { text: T('tut3'), target: function(){ return { x:W()/2, y:H()-wardrobeHeight()-40*S(), r:40*S() }; }, advance:'auto', after: 2600 },
  ], { storageKey:'styled_heart_tut_v1', force: force||!M.seenTut });
  M.seenTut=1; saveMeta();
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 420,
  designH: 820,
  strings: STRINGS,
  saveKey: 'styled_heart',
  onReady: function () {
    M = loadMeta();
    best = M.bestScore|0;
    GF.startMusic({ preset: 'cozy', muted: GF.muted });

    // overnight daily nudge: if a daily is available, flash a boot banner
    if (M.lastDaily !== dayIndex()){ bootBanner = 4.0; bootBannerTxt = T('daily')+' '+T('claim')+' →'; }

    // persist (Yandex 1.9) - we save meta on every change; persist run = the
    // current styling context so a refresh resumes the same date.
    GF.persist('styled_heart_run_v1',
      function(){ return currentDate ? { date: currentDate.id, equipped: equipped, tab: activeTab } : null; },
      function(s){ if (s && s.date){ var d=dateById(s.date); if (d){ currentDate=d; currentSuitor=d.suitor; if (s.equipped) equipped=s.equipped; if (s.tab) activeTab=s.tab; } } }
    );

    // choose the date to style NOW (sync) so state is valid while art streams in:
    // resumed date, else the first unlocked (kai_cafe).
    if (!currentDate){
      var nd=null; for (var d=0;d<DATES.length;d++){ if (dateUnlocked(DATES[d],M)){ nd=DATES[d]; break; } }
      currentDate = nd || DATES[0];
      currentSuitor = currentDate.suitor;
    }
    recompute();
    // boot STRAIGHT into the styling challenge (gallery + platform both - no
    // boutique/collection landing). __GF_AUTOSTART is honored: we are already in
    // STYLE, so platform autostart is satisfied. Gallery also boots to STYLE
    // (this game has no menu by design; the boutique is in-game).
    gs = 'STYLE';
    // load art, then drop the loading splash + start the hands-on tutorial. Until
    // _assetsReady, draw() shows a brief loading splash (not the canvas fallback),
    // so we don't flash placeholder art before the real portraits land (Codex).
    loadAssets(ASSET_NAMES).then(function(){
      _assetsReady = true;
      startTutorialIfNeeded(false);
    });
  },
  onUpdate: update,
  onDraw: draw,
});

// pause/resume audio around ad lifecycle (Yandex 4.7 / 1.3). watchAdGems wraps
// GF.showAd with a watchdog so a no-fill never freezes the UI.
function watchAdGems(){
  pauseAudio();
  var settled=false;
  // Reward ONLY on a real rewarded completion (res.rewarded), never on res.shown
  // (a skipped/closed interstitial reports shown:true but rewarded:false).
  // gf-lib's showAd resolves on no-fill via its own callbacks (+30s internal
  // safety), so we don't add an aggressive watchdog that could unmute mid-ad and
  // hand out the reward early (Codex 2026-06-05). A long backstop only restores
  // audio if the SDK never resolves at all.
  GF.showAd('rewarded').then(function(res){
    if (settled) return; settled=true; resumeAudio();
    if (res && res.rewarded){ M.gems += 20; saveMeta(); toast=2.0; toastTxt=T('got')+' 20 '+T('gems'); toastCol='#ffd86b'; GF.sfx('reward'); GF.spawnParticles(W()/2,H()*0.3,'#ffd86b',14); }
  });
  setTimeout(function(){ if (settled) return; settled=true; resumeAudio(); }, 32000); // audio backstop only (no reward)
}

// visibility: pause music when hidden (gf-lib handles ctx suspend; also save)
document.addEventListener('visibilitychange', function(){ if (document.hidden){ saveMeta(); } });
window.addEventListener('pagehide', saveMeta);

// expose state for the post-build tester (verifies progression + meta)
GF.exposeState(function(){
  return {
    gs: gs, styleScore: styleScore, threshold: PASS_THRESHOLD,
    gems: M.gems, owned: ownedCount(), totalPieces: PIECES.length,
    affKai: M.aff.kai, affTheo: M.aff.theo, affRowan: M.aff.rowan, affAsher: M.aff.asher,
    bondKai: bondLevel(M.aff.kai), memories: M.memories.length, best: M.bestScore,
    suitor: currentSuitor, date: currentDate?currentDate.id:null,
    suitorsUnlocked: SUITOR_CHAIN.filter(function(s){ return suitorUnlocked(s,M); }).length,
  };
});

// ── DEV/TEST SEAMS ─────────────────────────────────────────────────────────
// Read-only state + screenshot helpers ALWAYS ship (screenshot + post-build
// tooling needs them; they mutate nothing the player can exploit). The CHEAT
// seams (grant gems, jump screens, auto-style, raw-tap) are gated to dev hosts
// only so a published platform build can't be economy-cheated (Codex 2026-06-05).
var _DEV = (function(){ try {
  var h = location.hostname || '';
  return location.protocol === 'file:' || h === 'localhost' || h === '127.0.0.1' || /game-factory\.tech$/.test(h);
} catch(e){ return false; } })();

window._shInfo = function(){
  var info = { gs:gs, styleScore:styleScore, threshold:PASS_THRESHOLD, gems:M.gems, owned:ownedCount(),
    suitor:currentSuitor, date:currentDate?currentDate.id:null, tab:activeTab,
    equipped:JSON.parse(JSON.stringify(equipped)), aff:JSON.parse(JSON.stringify(M.aff)),
    bondKai:bondLevel(M.aff.kai), memories:M.memories.length, suitorsUnlocked:SUITOR_CHAIN.filter(function(s){return suitorUnlocked(s,M);}).length,
    hot: hot.map(function(b){ return { tag:b.tag, x:b.x, y:b.y, w:b.w, h:b.h }; }) };
  return info;
};
function _autoStyle(){
  // greedily equip the best-matching owned piece per slot to clear the threshold
  for (var s=0;s<SLOTS.length;s++){
    var slot=SLOTS[s]; var best=null, bestGain=-999;
    var list=PIECES.filter(function(p){ return p.slot===slot && pieceTier(p.id)>0; });
    for (var i=0;i<list.length;i++){ var save=equipped[slot]; equipped[slot]=list[i].id; var sc=scoreOutfit(equipped,currentDate).score; equipped[slot]=save; if (sc>bestGain){ bestGain=sc; best=list[i].id; } }
    if (best){ equipped[slot]=best; }
  }
  recompute(); saveMeta(); return styleScore;
}
window._jumpLevel = function(){ /* no levels; satisfies screenshot tooling */ };
window._setupForScreenshot = function(n){ _autoStyle(); gs='STYLE'; }; // dress him for a gameplay shot
if (_DEV){
  window._shTap = function(px,py){ hot.length=0; draw(GF.ctx,0); hitHot(px,py); };
  window._shAutoStyle = _autoStyle;
  window._shGrant = function(n){ M.gems += (n||100); saveMeta(); return M.gems; };
  window._shGoBoutique = function(){ gs='BOUTIQUE'; };
  window._shSetTab = function(t){ activeTab=t; };
}

})();
</script>
