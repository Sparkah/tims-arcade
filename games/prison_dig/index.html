var SPRITE_NAMES = []; // all vector — no image assets

// ── TUNABLES (exposed via GF.exposeState; gate cross-checks DESIGN.md) ───────
var GRID_COLS = 12;
var SURFACE_ROWS = 3;
var LAYER_ROWS = 6;
var LAYER_COUNT = 4;
var GRID_ROWS = SURFACE_ROWS + LAYER_ROWS * LAYER_COUNT; // 27
var STAMINA_MAX = 100;
var STAMINA_DIG = 3.0;
var STAMINA_STEP = 0.35;
var BAG_BASE = 8;
var DETECT_MAX = 100;
var DETECT_RATE = 46;
var DETECT_DECAY = 30;
var NOISE_MAX = 100;
var NOISE_PER_DIG = 18;
var NOISE_DECAY = 22;
var NOISE_PULL = 0.55;
var DIG_TIME_SOIL = 0.40;
var HARDNESS = [1, 1.8, 2.6, 4.0];
var SWEEP_EVERY = 26;
var SWEEP_LEN = 6;
var GUARD_SPEED = 1.5;
var CONE_HALF_ANGLE = 0.46;
var CONE_RANGE = 4.2;
var ORE_VALUE = { tin: 3, copper: 6, iron: 10, silver: 16, gold: 26, stash: 34 };

// Upgrade definitions (cost in banked ore; persisted)
var SHOVEL_COSTS  = [0, 20, 48, 90];    // L3 = the drill (bedrock + hatch)
var BAG_COSTS     = [0, 22, 50, 100];
var BAG_CAP       = [10, 14, 20, 28];
var MUFFLER_COSTS = [0, 20, 50, 100];
var MUFFLER_MULT  = [1, 0.7, 0.45, 0.25];
var ROPE_COSTS    = [0, 35, 80, 150];   // rope L>=1 lets fast-descend to deepest layer reached
var DISGUISE_COST = 45;
var DISGUISE_TIME = 8;                    // sec of detection immunity
var DIG_SPEED_MULT = [1, 1.25, 1.55, 1.9];// shovel tier dig-speed bonus

var SAVE_KEY = 'prison_dig';

// ── PERSISTENT (meta) STATE ─────────────────────────────────────────────────
var bank = 0;            // banked ore (currency, persists)
var totalOre = 0;        // lifetime ore (score)
var bestDepth = 0;       // deepest layer index reached (persists)
var shovelLv = 0, bagLv = 0, mufflerLv = 0, ropeLv = 0;
var disguises = 0;       // owned consumable disguises
var shiftCount = 0;
var lastCrateDay = '';   // YYYY-M-D string of last claimed daily crate
var seenTut = false;

// ── RUN (per-prison) STATE ──────────────────────────────────────────────────
var gs = 'MENU';   // MENU | HUB | SHIFT | CAUGHT | ESCAPED
var grid = [];     // grid[r][c] = tile object
var guards = [];
var inmate = null;
var ore = 0;       // ore carried this shift (unbanked)
var stamina = STAMINA_MAX;
var noise = 0;
var detect = 0;
var depthReached = 0;   // deepest layer reached THIS prison
var escaped = false;
var sweepT = SWEEP_EVERY;   // time until next sweep
var sweepActive = 0;        // remaining sweep time (>0 = sweeping)
var path = [];              // queued move target cells {c,r}
var digTarget = null;       // {c,r} tile being dug
var digProg = 0;            // 0..1 progress on current dig tile
var carefulDig = false;     // hold modifier
var caughtT = 0;            // countdown on CAUGHT flash
var goalText = '';
var crateMsgT = 0, crateMsg = '';
var newWingMsg = 0;

// Tile kinds
// solid diggable: DIRT STONE SEWER ROCK ; ORE (diggable+drops) ; PIPE BARS (cover, indestructible)
// DUG (empty tunnel/cover) ; HATCH (goal) ; SKY (above ground, non-solid) ; CELL (start/bank tile)
function layerOfRow(r) {
  if (r < SURFACE_ROWS) return -1;
  return Math.floor((r - SURFACE_ROWS) / LAYER_ROWS); // 0..3
}

// ── LAYOUT (pixel geometry) ─────────────────────────────────────────────────
var cell = 40, gridX = 0, gridY = 0, gridPxW = 0, gridPxH = 0;
var camY = 0;           // vertical camera scroll (px into the grid)
var hubBtns = {};       // hub buttons rects
var muteBtn = null, helpBtn = null;
var helpOpen = false, helpCloseBtn = null;

function layout() {
  var W = GF.W, H = GF.H;
  // play column: fit GRID_COLS across, leave a right margin for the depth ruler
  var rulerW = GF.clamp(34 * GF.S, 24, 54);
  var avail = W - rulerW - 8;
  cell = Math.floor(avail / GRID_COLS);
  if (cell < 14) cell = 14;
  gridPxW = cell * GRID_COLS;
  gridPxH = cell * GRID_ROWS;
  gridX = Math.floor((W - gridPxW - rulerW) / 2) + 4;
  if (gridX < 4) gridX = 4;
  gridY = 0; // top of grid sits at top; HUD overlays the top strip
}

// camera follows the inmate, keeping it vertically centred-ish, clamped to grid
function updateCam() {
  var H = GF.H;
  var topHud = topHudH();
  var viewTop = topHud, viewH = H - topHud;
  if (!inmate) { camY = 0; return; }
  var py = inmate.y * cell + cell / 2;
  var want = py - (viewTop + viewH * 0.45);
  var maxCam = Math.max(0, gridPxH - viewH);
  // shift maxCam reference: content drawn from gridY - camY; we want content
  // to stop at the bottom. Visible content height = viewH starting at viewTop.
  camY = GF.clamp(want, 0, Math.max(0, gridPxH - viewH));
}

function topHudH() { return GF.clamp(46 * GF.S, 38, 64); }

// world cell -> screen px (top-left of the cell)
function cellToScreen(c, r) {
  return { x: gridX + c * cell, y: topHudH() + (r * cell - camY) };
}
function screenToCell(sx, sy) {
  var c = Math.floor((sx - gridX) / cell);
  var r = Math.floor((sy - topHudH() + camY) / cell);
  return { c: c, r: r };
}

// ════════════════════════════════════════════════════════════════════════════
// PRISON GENERATION
// ════════════════════════════════════════════════════════════════════════════
var rng = Math.random;
function buildPrison() {
  grid = [];
  for (var r = 0; r < GRID_ROWS; r++) {
    var row = [];
    for (var c = 0; c < GRID_COLS; c++) {
      var lay = layerOfRow(r);
      var t = { kind: 'DIRT', layer: lay, ore: null };
      if (lay === -1) {
        t.kind = 'SKY';
      } else if (lay === 0) {
        t.kind = 'DIRT';
      } else if (lay === 1) {
        t.kind = 'STONE';
      } else if (lay === 2) {
        t.kind = 'SEWER';
      } else {
        t.kind = 'ROCK';
      }
      row.push(t);
    }
    grid.push(row);
  }
  // The cell: top-left surface tile is the inmate's cell (start + bank point).
  var cellC = 1, cellR = SURFACE_ROWS - 1;
  grid[cellR][cellC].kind = 'CELL';
  // open a starter shaft cell right below the cell so the inmate has a foothold
  // (the very first tile under the cell is pre-dug so digging "down" is obvious)
  grid[cellR + 1][cellC].kind = 'DUG';

  // scatter ore by layer
  for (var rr2 = SURFACE_ROWS; rr2 < GRID_ROWS; rr2++) {
    var L = layerOfRow(rr2);
    for (var cc = 0; cc < GRID_COLS; cc++) {
      var tile = grid[rr2][cc];
      if (tile.kind === 'DUG' || tile.kind === 'CELL') continue;
      var oreChance = [0.30, 0.26, 0.24, 0.24][L];
      if (rng() < oreChance) {
        tile.ore = oreTypeForLayer(L);
      }
    }
  }
  // sewer: vertical/horizontal pipe runs as hard cover (block vision + movement)
  var sewerTop = SURFACE_ROWS + LAYER_ROWS * 2;
  for (var pc = 0; pc < 3; pc++) {
    var col = 2 + Math.floor(rng() * (GRID_COLS - 4));
    var len = 2 + Math.floor(rng() * 3);
    var startR = sewerTop + Math.floor(rng() * (LAYER_ROWS - len));
    for (var k = 0; k < len; k++) { var tt = grid[startR + k][col]; tt.kind = 'PIPE'; tt.ore = null; }
  }
  // a guaranteed contraband stash in the sewer
  var stashC = 1 + Math.floor(rng() * (GRID_COLS - 2));
  var stashR = sewerTop + 1 + Math.floor(rng() * (LAYER_ROWS - 2));
  if (grid[stashR][stashC].kind === 'PIPE') grid[stashR][stashC].kind = 'SEWER';
  grid[stashR][stashC].ore = 'stash';

  // surface bars near the cell as cover landmarks (indestructible)
  for (var bc = 0; bc < GRID_COLS; bc++) {
    if (rng() < 0.18 && bc !== cellC) grid[SURFACE_ROWS - 1][bc].kind = 'BARS';
  }
  grid[cellR][cellC].kind = 'CELL'; // ensure not overwritten

  // escape hatch in the deepest layer (bottom rows), away from the start column
  var bedTop = SURFACE_ROWS + LAYER_ROWS * 3;
  var hatchC = Math.max(3, Math.min(GRID_COLS - 2, 3 + Math.floor(rng() * (GRID_COLS - 5))));
  var hatchR = GRID_ROWS - 2;
  grid[hatchR][hatchC].kind = 'HATCH';
  grid[hatchR][hatchC].ore = null;

  // guards: one patrol rail on the surface, +1 per deeper layer reached gate.
  guards = [];
  // surface guard patrols horizontally along a surface row just below sky
  guards.push(makeGuard(2, SURFACE_ROWS - 1, 'H', 1, GRID_COLS - 2, 2));
  // stone-layer guard patrols horizontally inside the stone band (over tunnels)
  var stoneRow = SURFACE_ROWS + LAYER_ROWS + 1;
  guards.push(makeGuard(GRID_COLS - 3, stoneRow, 'H', 1, GRID_COLS - 2, -2));
  // sewer searchlight: a guard that roves and points DOWN (a ceiling light)
  var swRow = sewerTop;
  guards.push(makeGuard(3, swRow, 'H', 1, GRID_COLS - 2, 2, 'down'));

  inmate = { c: cellC, r: cellR, x: cellC, y: cellR, moving: false };
  camY = 0;
}

function oreTypeForLayer(L) {
  if (L === 0) return rng() < 0.7 ? 'tin' : 'copper';
  if (L === 1) return rng() < 0.6 ? 'copper' : 'iron';
  if (L === 2) return rng() < 0.6 ? 'iron' : 'silver';
  return rng() < 0.5 ? 'silver' : 'gold';
}

// guard: patrols between [lo,hi] on its rail; faces along movement (or fixed face)
function makeGuard(c, row, axis, lo, hi, dir, faceOverride) {
  return {
    c: c, r: row, x: c, y: row, axis: axis, lo: lo, hi: hi, dir: dir,
    faceX: dir > 0 ? 1 : -1, faceY: 0, faceOverride: faceOverride || null,
    coneAng: 0,
  };
}

// ════════════════════════════════════════════════════════════════════════════
// LIFECYCLE
// ════════════════════════════════════════════════════════════════════════════
function newPrison(keepGear) {
  if (!keepGear) {
    // full reset (only used if ever needed); normally gear persists
    bank = 0; bestDepth = 0;
    shovelLv = bagLv = mufflerLv = ropeLv = 0; disguises = 0;
  }
  escaped = false;
  shiftCount = 0;
  buildPrison();
  saveRun();
}

function startShift() {
  // begin a live shift from the cell
  if (!grid.length || !inmate) buildPrison();
  // reset inmate to cell, refill stamina, clear shift meters
  var cellPos = findCell();
  inmate.c = cellPos.c; inmate.r = cellPos.r; inmate.x = cellPos.c; inmate.y = cellPos.r;
  inmate.moving = false;
  // rope fast-descend: if rope owned and a tunnel exists deep, drop the inmate
  // to the deepest dug cell in the start column for a head-start.
  if (ropeLv >= 1) {
    var deepest = deepestDugInColumn(cellPos.c);
    if (deepest && deepest.r > cellPos.r + 1) { inmate.r = deepest.r; inmate.y = deepest.r; inmate.c = deepest.c; inmate.x = deepest.c; }
  }
  stamina = STAMINA_MAX; noise = 0; detect = 0; ore = 0;
  path = []; digTarget = null; digProg = 0; carefulDig = false;
  sweepT = SWEEP_EVERY; sweepActive = 0; disguiseT = 0;
  shiftCount++;
  gs = 'SHIFT';
  updateGoal();
  GF.gameStarted();
  saveRun();
  // coach on the very first shift ever
  if (!seenTut) startCoach();
}

function deepestDugInColumn(c) {
  var best = null;
  for (var r = GRID_ROWS - 1; r >= 0; r--) {
    if (grid[r][c].kind === 'DUG') { best = { c: c, r: r }; break; }
  }
  return best;
}

function findCell() {
  for (var r = 0; r < GRID_ROWS; r++) for (var c = 0; c < GRID_COLS; c++) if (grid[r][c].kind === 'CELL') return { c: c, r: r };
  return { c: 1, r: SURFACE_ROWS - 1 };
}
function findHatch() {
  for (var r = GRID_ROWS - 1; r >= 0; r--) for (var c = 0; c < GRID_COLS; c++) if (grid[r][c].kind === 'HATCH') return { c: c, r: r };
  return null;
}
// BFS from the inmate through walkable cells; return the nearest diggable tile
// adjacent to any reached walkable cell (optionally requiring it to hold ore).
// Used by the bot to harvest when straight-down is locked. (Pure helper.)
function nearestReachableDiggable(requireOre) {
  if (!inmate) return null;
  function key(c, r) { return c + ',' + r; }
  var q = [[inmate.c, inmate.r]], seen = {}; seen[key(inmate.c, inmate.r)] = true;
  var guard = 0;
  while (q.length && guard++ < 3000) {
    var cur = q.shift();
    var nb = [[cur[0] - 1, cur[1]], [cur[0] + 1, cur[1]], [cur[0], cur[1] - 1], [cur[0], cur[1] + 1]];
    for (var i = 0; i < nb.length; i++) {
      var c = nb[i][0], r = nb[i][1];
      if (c < 0 || c >= GRID_COLS || r < 0 || r >= GRID_ROWS) continue;
      var t = grid[r][c];
      if (isDiggable(t) && (!requireOre || t.ore)) return { c: c, r: r };
      if (isWalkable(t) && !seen[key(c, r)]) { seen[key(c, r)] = true; q.push([c, r]); }
    }
  }
  return null;
}

function endShiftToHub() {
  gs = 'HUB';
  path = []; digTarget = null;
  GF.gameEnded();
  saveRun();
}

// Voluntary return to the cell hub (bank already done) — keeps ALL progress,
// lets the player shop, then START SHIFT again from the cell. Distinct from
// getCaught (which drops the unbanked bag).
function enterCellHub() {
  GF.sfx('click');
  gs = 'HUB';
  path = []; digTarget = null; digProg = 0; pendingDig = null;
  GF.gameEnded();
  saveRun();
}

function getCaught() {
  // drop unbanked ore, flash, return to hub
  helpOpen = false;
  GF.sfx('hurt'); GF.sfx('lose'); GF.setShake(1.0);
  ore = 0;
  detect = 0; noise = 0;
  caughtT = 1.4;
  gs = 'CAUGHT';
  GF.gameEnded();
  saveRun();
}

function bankOre() {
  if (ore <= 0) return;
  bank += ore; totalOre += ore;
  GF.sfx('reward');
  var p = cellToScreen(inmate.c, inmate.r);
  GF.spawnFloat(p.x + cell / 2, p.y, '+' + ore + ' ' + GF.t('ore'), '#ffd54a');
  GF.spawnParticles(p.x + cell / 2, p.y + cell / 2, '#ffd54a', 14);
  ore = 0;
  if (coachStep === 2) advanceCoach();
  updateGoal();
  saveRun();
}

function doEscape() {
  escaped = true;
  GF.sfx('win'); GF.happytime();
  gs = 'ESCAPED';
  if (depthReached > bestDepth) bestDepth = depthReached;
  GF.gameEnded();
  saveRun();
}

var disguiseT = 0; // remaining disguise immunity

// ════════════════════════════════════════════════════════════════════════════
// UPDATE
// ════════════════════════════════════════════════════════════════════════════
function update(dt) {
  if (GF.tutorial.active) { GF.tutorial.update(dt); }
  if (crateMsgT > 0) crateMsgT -= dt;
  if (newWingMsg > 0) newWingMsg -= dt;

  if (gs === 'CAUGHT') {
    caughtT -= dt;
    if (caughtT <= 0) endShiftToHub();
    return;
  }
  if (gs !== 'SHIFT') return;

  var coaching = GF.tutorial.active;

  // ── guards patrol (frozen visually-soft during coach so it's no-fail) ──
  updateGuards(dt, coaching);

  // ── sweep scheduler ──
  if (!coaching) {
    if (sweepActive > 0) {
      sweepActive -= dt;
      if (sweepActive <= 0) sweepT = SWEEP_EVERY;
    } else {
      sweepT -= dt;
      if (sweepT <= 0) { sweepActive = SWEEP_LEN; GF.sfx('error'); }
    }
  }

  // ── inmate movement + dig ──
  carefulDig = GF.keys['ShiftLeft'] || GF.keys['ShiftRight'] || holdActive;

  // keyboard step movement (desktop)
  handleKeyStep();

  // path following (tap-to-move) + contextual dig
  stepAlongPath(dt);

  // active dig progress
  if (digTarget) {
    var tt = grid[digTarget.r] && grid[digTarget.r][digTarget.c];
    if (!tt || !isDiggable(tt)) { digTarget = null; digProg = 0; }
    else {
      var hard = HARDNESS[Math.max(0, tt.layer)] || 1;
      var time = DIG_TIME_SOIL * hard / DIG_SPEED_MULT[shovelLv];
      var rate = (carefulDig ? 0.5 : 1) / time;
      digProg += dt * rate;
      // emit dirt particles + noise as we dig
      if (Math.random() < dt * 14) {
        var ps = cellToScreen(digTarget.c, digTarget.r);
        GF.spawnParticles(ps.x + cell / 2, ps.y + cell / 2, tileDirtColor(tt), 2);
      }
      if (digProg >= 1) finishDig(tt, digTarget.c, digTarget.r);
    }
  }

  // ── meters ──
  // noise decays
  noise = Math.max(0, noise - NOISE_DECAY * dt);
  // detection: rising if a cone sees the inmate AND inmate exposed (not in DUG tunnel)
  if (disguiseT > 0) disguiseT = Math.max(0, disguiseT - dt);
  var seen = !coaching && disguiseT <= 0 && inmateSeen();
  if (seen) {
    detect = Math.min(DETECT_MAX, detect + DETECT_RATE * dt * (sweepActive > 0 ? 1.4 : 1));
    if (detect >= DETECT_MAX) { getCaught(); return; }
  } else {
    detect = Math.max(0, detect - DETECT_DECAY * dt);
  }

  // stamina exhaustion -> auto walk home hint (not a hard fail)
  if (stamina <= 0 && !digTarget && path.length === 0) {
    // gently nudge goal
  }

  // track depth reached
  var L = layerOfRow(inmate.r);
  if (L >= 0 && L > depthReached) {
    depthReached = L;
    if (L > bestDepth) bestDepth = L;
    GF.sfx('unlock');
    layerBanner = L; layerBannerT = 2.2;
    updateGoal();
    saveRun();
    if (coachStep === 1) {} // hide step advances on move not depth
  }

  updateCam();
}

var layerBanner = -1, layerBannerT = 0;
var holdActive = false; // long-press careful-dig flag

function handleKeyStep() {
  // one-cell step per fresh keypress (desktop). We debounce per key.
  var dirs = [
    { k: ['ArrowLeft', 'KeyA'], dc: -1, dr: 0 },
    { k: ['ArrowRight', 'KeyD'], dc: 1, dr: 0 },
    { k: ['ArrowUp', 'KeyW'], dc: 0, dr: -1 },
    { k: ['ArrowDown', 'KeyS'], dc: 0, dr: 1 },
  ];
  for (var i = 0; i < dirs.length; i++) {
    var d = dirs[i];
    var down = d.k.some(function (kk) { return GF.keys[kk]; });
    if (down && !keyHeld[i]) {
      keyHeld[i] = true;
      tryStepOrDig(inmate.c + d.dc, inmate.r + d.dr);
    } else if (!down) {
      keyHeld[i] = false;
    }
  }
}
var keyHeld = [false, false, false, false];

// Attempt to move to / dig an ADJACENT cell.
function tryStepOrDig(c, r) {
  if (inmate.moving) return;
  if (c < 0 || c >= GRID_COLS || r < 0 || r >= GRID_ROWS) return;
  var t = grid[r][c];
  if (isWalkable(t)) {
    // walk one cell
    path = [{ c: c, r: r }];
    digTarget = null; digProg = 0;
  } else if (isDiggable(t)) {
    setDig(c, r);
  }
}

function setDig(c, r) {
  // only if adjacent (4-neighbour) to the inmate
  if (Math.abs(c - inmate.c) + Math.abs(r - inmate.r) !== 1) {
    // not adjacent: route there first, dig handled on arrival via path target
    path = computePath(inmate.c, inmate.r, c, r, true);
    digTarget = null; digProg = 0;
    pendingDig = { c: c, r: r };
    return;
  }
  digTarget = { c: c, r: r }; digProg = 0;
  pendingDig = null;
}
var pendingDig = null;
var returningHome = false;

// Dig a target tile that may be non-adjacent: if adjacent dig now, else route to
// a walkable neighbour and queue the dig (used by the bot's harvest fallback).
function setDigVia(target) {
  if (!target) return;
  if (Math.abs(target.c - inmate.c) + Math.abs(target.r - inmate.r) === 1) { setDig(target.c, target.r); return; }
  var ph = computePath(inmate.c, inmate.r, target.c, target.r, true);
  if (ph.length) { path = ph; digTarget = null; digProg = 0; pendingDig = { c: target.c, r: target.r }; }
}

function finishDig(tt, c, r) {
  // dropping ore?
  if (tt.ore) {
    var val = ORE_VALUE[tt.ore] || 2;
    var cap = BAG_CAP[bagLv];
    if (ore < cap) {
      var room = cap - ore;
      var got = Math.min(room, val <= 0 ? 1 : 1); // each ore tile = 1 unit visually but value-weighted
      // value-weighted: add the ore's value but clamp to capacity
      var add = Math.min(val, cap - ore);
      ore += add;
      GF.sfx(tt.ore === 'stash' ? 'unlock' : 'coin');
      var ps = cellToScreen(c, r);
      GF.spawnFloat(ps.x + cell / 2, ps.y, '+' + add, oreColor(tt.ore));
    } else {
      GF.sfx('tap');
    }
  } else {
    GF.sfx('hit');
  }
  // hatch?
  var wasHatch = (tt.kind === 'HATCH');
  tt.kind = 'DUG'; tt.ore = null;
  digTarget = null; digProg = 0;
  stamina = Math.max(0, stamina - STAMINA_DIG * (HARDNESS[Math.max(0, tt.layer)] || 1) * 0.6);
  noise = Math.min(NOISE_MAX, noise + NOISE_PER_DIG * MUFFLER_MULT[mufflerLv] * (carefulDig ? 0.15 : 1));
  GF.setShake(carefulDig ? 0.12 : 0.28);
  // step the inmate INTO the dug cell (you tunnel forward)
  inmate.c = c; inmate.r = r; inmate.x = c; inmate.y = r;
  if (wasHatch) { doEscape(); return; }
  if (coachStep === 0) advanceCoach();
  if (onCell()) bankOre();
  updateGoal();
  saveRun();
}

// movement along path: lerp inmate from cell to cell; dig on arrival if pending
function stepAlongPath(dt) {
  if (digTarget) return; // don't move while digging
  if (path.length === 0) {
    // arrived: if a pending dig was queued and we're adjacent, start it
    if (pendingDig && Math.abs(pendingDig.c - inmate.c) + Math.abs(pendingDig.r - inmate.r) === 1) {
      var pd = pendingDig; pendingDig = null; setDig(pd.c, pd.r);
    }
    inmate.moving = false;
    return;
  }
  inmate.moving = true;
  var next = path[0];
  // snap if essentially there
  var spd = 7.5; // cells/sec
  var dx = next.c - inmate.x, dy = next.r - inmate.y;
  var d = Math.sqrt(dx * dx + dy * dy);
  if (d < 0.03) {
    inmate.x = next.c; inmate.y = next.r; inmate.c = next.c; inmate.r = next.r;
    path.shift();
    stamina = Math.max(0, stamina - STAMINA_STEP);
    if (onCell()) { bankOre(); if (returningHome && path.length === 0) { returningHome = false; enterCellHub(); return; } }
  } else {
    var step = Math.min(d, spd * dt);
    inmate.x += dx / d * step; inmate.y += dy / d * step;
    if (d <= spd * dt) { inmate.c = next.c; inmate.r = next.r; }
  }
}

function onCell() {
  var t = grid[inmate.r] && grid[inmate.r][inmate.c];
  return t && t.kind === 'CELL';
}

// ── BFS path through walkable (DUG/CELL/SKY) cells; optionally allow ending on
// a diggable target's NEAREST walkable neighbour. ──
function computePath(sc, sr, tc, tr, toDigTarget) {
  function key(c, r) { return c + ',' + r; }
  var goalCells = [];
  if (toDigTarget) {
    // we want to reach a walkable cell adjacent to (tc,tr)
    var nb = [[tc - 1, tr], [tc + 1, tr], [tc, tr - 1], [tc, tr + 1]];
    for (var i = 0; i < nb.length; i++) {
      var nc = nb[i][0], nr = nb[i][1];
      if (nc >= 0 && nc < GRID_COLS && nr >= 0 && nr < GRID_ROWS && isWalkable(grid[nr][nc])) goalCells.push(key(nc, nr));
    }
    if (goalCells.length === 0) return [];
  } else {
    goalCells.push(key(tc, tr));
  }
  var q = [[sc, sr]]; var came = {}; came[key(sc, sr)] = null; var found = null;
  var guard = 0;
  while (q.length && guard++ < 4000) {
    var cur = q.shift(); var ck = key(cur[0], cur[1]);
    if (goalCells.indexOf(ck) >= 0) { found = cur; break; }
    var ns = [[cur[0] - 1, cur[1]], [cur[0] + 1, cur[1]], [cur[0], cur[1] - 1], [cur[0], cur[1] + 1]];
    for (var j = 0; j < ns.length; j++) {
      var x = ns[j][0], y = ns[j][1];
      if (x < 0 || x >= GRID_COLS || y < 0 || y >= GRID_ROWS) continue;
      var kk = key(x, y);
      if (came.hasOwnProperty(kk)) continue;
      if (!isWalkable(grid[y][x])) continue;
      came[kk] = ck; q.push([x, y]);
    }
  }
  if (!found) return [];
  var out = []; var ck2 = key(found[0], found[1]);
  while (ck2) {
    var parts = ck2.split(','); out.unshift({ c: +parts[0], r: +parts[1] });
    ck2 = came[ck2];

}

function isWalkable(t) { return t.kind === 'DUG' || t.kind === 'CELL' || t.kind === 'SKY'; }
function isDiggable(t) {
  if (t.kind === 'DIRT' || t.kind === 'STONE' || t.kind === 'SEWER' || t.kind === 'ROCK') {
    return canDigKind(t);
  }
  if (t.kind === 'HATCH') return shovelLv >= 3; // drill needed
  return false;
}
function canDigKind(t) {
  // shovel gating: stone needs L1, sewer L1 (slow), rock needs L3 (drill)
  if (t.kind === 'STONE') return shovelLv >= 1;
  if (t.kind === 'SEWER') return shovelLv >= 1;
  if (t.kind === 'ROCK') return shovelLv >= 3;
  return true; // DIRT always
}

// ── GUARDS ───────────────────────────────────────────────────────────────────
function updateGuards(dt, soft) {
  for (var i = 0; i < guards.length; i++) {
    var g = guards[i];
    var spd = GUARD_SPEED * (sweepActive > 0 ? 1.8 : 1) * (soft ? 0.4 : 1);
    // patrol along axis
    g.x += g.dir * spd * dt;
    if (g.x <= g.lo) { g.x = g.lo; g.dir = 1; }
    if (g.x >= g.hi) { g.x = g.hi; g.dir = -1; }
    g.c = Math.round(g.x);
    // facing: along travel unless overridden (searchlight points down)
    if (g.faceOverride === 'down') { g.faceX = 0; g.faceY = 1; }
    else { g.faceX = g.dir > 0 ? 1 : -1; g.faceY = 0; }
    // noise bends the cone toward the inmate (rotate facing toward inmate by NOISE_PULL*noise)
    g.coneAng = Math.atan2(g.faceY, g.faceX);
    if (!soft && inmate && noise > 8) {
      var toAng = Math.atan2((inmate.y) - g.y, (inmate.x) - g.c);
      var pull = NOISE_PULL * (noise / NOISE_MAX);
      g.coneAng = angLerp(g.coneAng, toAng, pull * 0.5);
    }
  }
}

function angLerp(a, b, t) {
  var d = Math.atan2(Math.sin(b - a), Math.cos(b - a));
  return a + d * t;
}

// is the inmate currently inside a guard's vision cone AND exposed (not in a DUG tunnel)?
function inmateSeen() {
  if (!inmate) return false;
  var it = grid[inmate.r] && grid[inmate.r][inmate.c];
  // standing inside a dug tunnel = cover (cannot be seen). CELL/SKY are exposed.
  if (it && it.kind === 'DUG') return false;
  var ix = inmate.x, iy = inmate.y;
  var range = CONE_RANGE * (sweepActive > 0 ? 1.4 : 1);
  var half = CONE_HALF_ANGLE * (sweepActive > 0 ? 1.5 : 1);
  for (var i = 0; i < guards.length; i++) {
    var g = guards[i];
    var dx = ix - g.c, dy = iy - g.y;
    var dd = Math.sqrt(dx * dx + dy * dy);
    if (dd > range || dd < 0.01) continue;
    var ang = Math.atan2(dy, dx);
    var diff = Math.abs(Math.atan2(Math.sin(ang - g.coneAng), Math.cos(ang - g.coneAng)));
    if (diff > half) continue;
    // line-of-sight: a PIPE/BARS or solid tile between guard and inmate blocks it
    if (coneBlocked(g.c, g.y, ix, iy)) continue;
    return true;
  }
  return false;
}

// sample along the segment; if any cell is hard cover (PIPE/BARS) or solid terrain
// (not yet dug), the cone is blocked.
function coneBlocked(gx, gy, ix, iy) {
  var steps = Math.ceil(Math.max(Math.abs(ix - gx), Math.abs(iy - gy)) * 2);
  for (var s = 1; s < steps; s++) {
    var t = s / steps;
    var cc = Math.round(gx + (ix - gx) * t);
    var rr3 = Math.round(gy + (iy - gy) * t);
    if (cc < 0 || cc >= GRID_COLS || rr3 < 0 || rr3 >= GRID_ROWS) continue;
    var k = grid[rr3][cc].kind;
    if (k === 'PIPE' || k === 'BARS') return true;
  }
  return false;
}

// ── GOAL TEXT ────────────────────────────────────────────────────────────────
function updateGoal() {
  var cap = BAG_CAP[bagLv];
  if (ore >= cap) { goalText = GF.t('goal_full'); return; }
  if (stamina <= 12) { goalText = GF.t('goal_tired'); return; }
  if (ore > 0 && (depthReached >= 1)) { /* encourage banking sometimes */ }
  if (depthReached < 1) goalText = GF.t('goal_dig');
  else if (depthReached < 2) goalText = GF.t('goal_sewer');
  else if (depthReached < 3) goalText = GF.t('goal_bedrock');
  else if (shovelLv < 3) goalText = GF.t('goal_drill');
  else goalText = GF.t('goal_hatch');
}

// ════════════════════════════════════════════════════════════════════════════
// DRAW
// ════════════════════════════════════════════════════════════════════════════
function draw(ctx) {
  var W = GF.W, H = GF.H;
  // bg
  ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, 0, W, H);

  if (gs === 'MENU') {
    drawCellWallBg(ctx);
    GF.drawOverlay({ title: GF.t('title'), sub: GF.t('sub'), btnText: GF.t('play'), btnFn: function () { onPlay(); },
      bestText: bestDepth > 0 ? GF.t('best_depth') + ': ' + GF.t('layer' + bestDepth) : null });
    return;
  }
  if (gs === 'ESCAPED') {
    drawGrid(ctx); // show the tunnel behind
    GF.drawOverlay({ title: GF.t('escaped'), sub: GF.t('escaped_sub') + ' ' + shiftCount + ' ' + GF.t('shifts'),
      sub2: GF.t('bank') + ': ' + bank + ' ' + GF.t('ore'),
      btnText: GF.t('again'), btnFn: function () { onPlayAgain(); },
      bestText: GF.t('best_depth') + ': ' + GF.t('layer' + bestDepth) });
    return;
  }

  // SHIFT / HUB / CAUGHT all draw the grid
  drawGrid(ctx);

  if (gs === 'SHIFT' || gs === 'CAUGHT') {
    drawDepthRuler(ctx);
    drawTopHud(ctx);
    drawGoalPill(ctx);
    if (gs === 'SHIFT') drawCellButton(ctx);
    if (sweepActive > 0 || sweepT < 2.4) drawSweepBanner(ctx);
    if (layerBannerT > 0) drawLayerBanner(ctx);
    drawHudCorner(ctx);
  }

  if (gs === 'CAUGHT') drawCaughtFlash(ctx);
  if (gs === 'HUB') drawHub(ctx);

  if (GF.tutorial.active) GF.tutorial.draw(ctx);
  if (helpOpen) drawHelp(ctx);
}

function tileDirtColor(t) { return oreFaint(t); }
function oreFaint(t) {
  switch (t.kind) {
    case 'DIRT': return '#7a4a28';
    case 'STONE': return '#7c8089';
    case 'SEWER': return '#5a7a64';
    case 'ROCK': return '#3c3550';
    default: return '#7a4a28';
  }
}

function drawGrid(ctx) {
  var W = GF.W, H = GF.H;
  var topH = topHudH();
  // clip the grid view below the HUD
  ctx.save();
  ctx.beginPath(); ctx.rect(0, gs === 'SHIFT' || gs === 'CAUGHT' || gs === 'HUB' ? topH : 0, W, H); ctx.clip();

  // layered earth background bands
  for (var L = -1; L < LAYER_COUNT; L++) {
    var rTop = (L === -1) ? 0 : SURFACE_ROWS + L * LAYER_ROWS;
    var rBot = (L === -1) ? SURFACE_ROWS : SURFACE_ROWS + (L + 1) * LAYER_ROWS;
    var yT = cellToScreen(0, rTop).y, yB = cellToScreen(0, rBot).y;
    var grad = ctx.createLinearGradient(0, yT, 0, yB);
    var band = bandColors(L);
    grad.addColorStop(0, band[0]); grad.addColorStop(1, band[1]);
    ctx.fillStyle = grad;
    ctx.fillRect(gridX, yT, gridPxW, yB - yT);
  }

  // tiles
  var view0 = screenToCell(gridX, topH).r - 1;
  var view1 = screenToCell(gridX, H).r + 1;
  for (var r = Math.max(0, view0); r <= Math.min(GRID_ROWS - 1, view1); r++) {
    for (var c = 0; c < GRID_COLS; c++) {
      drawTile(ctx, c, r, grid[r][c]);
    }
  }

  // guards + cones (only when shift active or caught/hub showing the world)
  for (var gi = 0; gi < guards.length; gi++) drawGuard(ctx, guards[gi]);

  // inmate
  if (inmate) drawInmate(ctx);

  ctx.restore();
}

function bandColors(L) {
  if (L === -1) return ['#3b4a6b', '#586a3a']; // sky -> grass
  if (L === 0) return ['#6b4326', '#583620'];  // soil
  if (L === 1) return ['#5a5e67', '#44464f'];  // stone
  if (L === 2) return ['#3f5a48', '#2e4536'];  // sewer
  return ['#2a2540', '#161228'];               // bedrock
}

function drawTile(ctx, c, r, t) {
  var p = cellToScreen(c, r);
  var x = p.x, y = p.y;
  if (t.kind === 'SKY') {
    return; // background band already drawn
  }
  if (t.kind === 'DUG') {
    // tunnel: darker carved hollow with subtle inner shadow
    ctx.fillStyle = 'rgba(10,8,16,0.55)';
    GF.rr(ctx, x + 1, y + 1, cell - 2, cell - 2, Math.min(6, cell * 0.18)); ctx.fill();
    return;
  }
  if (t.kind === 'CELL') {
    // cell floor with bars motif
    ctx.fillStyle = '#2b2f3e';
    GF.rr(ctx, x + 1, y + 1, cell - 2, cell - 2, 4); ctx.fill();
    ctx.strokeStyle = '#7d8aa5'; ctx.lineWidth = Math.max(1, cell * 0.06);
    for (var b = 1; b <= 3; b++) { ctx.beginPath(); ctx.moveTo(x + cell * (b / 4), y + 3); ctx.lineTo(x + cell * (b / 4), y + cell - 3); ctx.stroke(); }
    // "▲ bank" marker
    ctx.fillStyle = '#ffd54a'; ctx.font = 'bold ' + (cell * 0.4) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('▲', x + cell / 2, y + cell / 2);
    return;
  }
  if (t.kind === 'PIPE') {
    ctx.fillStyle = '#9aa3ad';
    GF.rr(ctx, x + cell * 0.18, y + 1, cell * 0.64, cell - 2, cell * 0.3); ctx.fill();
    ctx.strokeStyle = '#5d646d'; ctx.lineWidth = Math.max(1, cell * 0.05); ctx.stroke();
    return;
  }
  if (t.kind === 'BARS') {
    ctx.fillStyle = '#4a4f5e';
    ctx.fillRect(x + 1, y + 1, cell - 2, cell - 2);
    ctx.strokeStyle = '#aab3c8'; ctx.lineWidth = Math.max(1, cell * 0.08);
    for (var bb = 1; bb <= 2; bb++) { ctx.beginPath(); ctx.moveTo(x + cell * (bb / 3), y + 2); ctx.lineTo(x + cell * (bb / 3), y + cell - 2); ctx.stroke(); }
    return;
  }
  if (t.kind === 'HATCH') {
    // trapdoor
    ctx.fillStyle = '#caa15a';
    GF.rr(ctx, x + 2, y + 2, cell - 4, cell - 4, 4); ctx.fill();
    ctx.strokeStyle = '#6e4d1f'; ctx.lineWidth = Math.max(1, cell * 0.06);
    ctx.strokeRect(x + 4, y + 4, cell - 8, cell - 8);
    ctx.beginPath(); ctx.moveTo(x + 4, y + 4); ctx.lineTo(x + cell - 4, y + cell - 4); ctx.stroke();
    // ring handle
    ctx.beginPath(); ctx.arc(x + cell * 0.68, y + cell * 0.5, cell * 0.12, 0, Math.PI * 2); ctx.stroke();
    if (shovelLv < 3) { // locked look
      ctx.fillStyle = 'rgba(0,0,0,0.35)'; GF.rr(ctx, x + 2, y + 2, cell - 4, cell - 4, 4); ctx.fill();
    }
    return;
  }
  // solid diggable terrain (DIRT/STONE/SEWER/ROCK)
  var base = solidColor(t);
  ctx.fillStyle = base;
  GF.rr(ctx, x + 0.5, y + 0.5, cell - 1, cell - 1, Math.min(5, cell * 0.14)); ctx.fill();
  // texture speckle
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  ctx.fillRect(x + cell * 0.2, y + cell * 0.55, cell * 0.16, cell * 0.12);
  ctx.fillRect(x + cell * 0.6, y + cell * 0.25, cell * 0.14, cell * 0.1);
  // ore gem
  if (t.ore) drawOreGem(ctx, x + cell / 2, y + cell / 2, cell * 0.26, t.ore);
  // can't-dig hint (needs better shovel) — faint lock tint
  if (!canDigKind(t)) {
    ctx.fillStyle = 'rgba(20,20,40,0.32)';
    GF.rr(ctx, x + 0.5, y + 0.5, cell - 1, cell - 1, Math.min(5, cell * 0.14)); ctx.fill();
  }
  // active dig overlay
  if (digTarget && digTarget.c === c && digTarget.r === r) {
    ctx.strokeStyle = '#ffe08a'; ctx.lineWidth = Math.max(2, cell * 0.08);
    GF.rr(ctx, x + 2, y + 2, cell - 4, cell - 4, 4); ctx.stroke();
    // progress arc
    ctx.fillStyle = 'rgba(255,224,138,0.25)';
    ctx.fillRect(x + 2, y + cell - 4 - (cell - 6) * digProg, cell - 4, (cell - 6) * digProg);
  }
}

function solidColor(t) {
  switch (t.kind) {
    case 'DIRT': return '#8a5630';
    case 'STONE': return '#6d727c';
    case 'SEWER': return '#4f6b57';
    case 'ROCK': return '#473f5e';
    default: return '#8a5630';
  }
}

function oreColor(o) {
  return { tin: '#cfd6da', copper: '#d98a4a', iron: '#b9c2cc', silver: '#e7eef5', gold: '#ffd54a', stash: '#9b6bff' }[o] || '#fff';
}
function drawOreGem(ctx, x, y, r, o) {
  ctx.save();
  ctx.fillStyle = oreColor(o);
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = Math.max(1, r * 0.18);
  ctx.beginPath();
  ctx.moveTo(x, y - r); ctx.lineTo(x + r * 0.9, y); ctx.lineTo(x, y + r); ctx.lineTo(x - r * 0.9, y); ctx.closePath();
  ctx.fill(); ctx.stroke();

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.moveTo(x, y - r); ctx.lineTo(x + r * 0.45, y - r * 0.1); ctx.lineTo(x, y); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawInmate(ctx) {
  var p = cellToScreen(inmate.x, inmate.y);
  var x = p.x + cell / 2, y = p.y + cell / 2;
  var rad = cell * 0.34;
  var inTunnel = grid[inmate.r] && grid[inmate.r][inmate.c] && grid[inmate.r][inmate.c].kind === 'DUG';
  ctx.save();
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(x, y + rad * 0.9, rad * 0.9, rad * 0.35, 0, 0, Math.PI * 2); ctx.fill();
  // body (orange jumpsuit) with stripes
  ctx.fillStyle = inTunnel ? '#e08a3a' : '#f29a3e';
  GF.rr(ctx, x - rad * 0.8, y - rad * 0.2, rad * 1.6, rad * 1.5, rad * 0.4); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = Math.max(1, rad * 0.16);
  for (var s = 0; s < 2; s++) { ctx.beginPath(); ctx.moveTo(x - rad * 0.8, y + rad * (0.2 + s * 0.5)); ctx.lineTo(x + rad * 0.8, y + rad * (0.2 + s * 0.5)); ctx.stroke(); }
  // head
  ctx.fillStyle = '#ffd9b0';
  ctx.beginPath(); ctx.arc(x, y - rad * 0.55, rad * 0.55, 0, Math.PI * 2); ctx.fill();
  // little shovel in hand
  ctx.strokeStyle = '#9a6a3a'; ctx.lineWidth = Math.max(1.5, rad * 0.18); ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x + rad * 0.7, y); ctx.lineTo(x + rad * 1.2, y + rad * 0.6); ctx.stroke();
  ctx.fillStyle = '#b9c2cc';
  ctx.beginPath(); ctx.arc(x + rad * 1.25, y + rad * 0.7, rad * 0.22, 0, Math.PI * 2); ctx.fill();
  // disguise shimmer
  if (disguiseT > 0) {
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(Date.now() / 120);
    ctx.strokeStyle = '#9b6bff'; ctx.lineWidth = Math.max(1.5, rad * 0.2);
    ctx.beginPath(); ctx.arc(x, y, rad * 1.3, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function drawGuard(ctx, g) {
  var gp = cellToScreen(g.c, g.y);
  var gx = gp.x + cell / 2, gy = gp.y + cell / 2;
  // vision cone
  var range = CONE_RANGE * (sweepActive > 0 ? 1.4 : 1) * cell;
  var half = CONE_HALF_ANGLE * (sweepActive > 0 ? 1.5 : 1);
  var a0 = g.coneAng - half, a1 = g.coneAng + half;
  var grad = ctx.createRadialGradient(gx, gy, cell * 0.2, gx, gy, range);
  var hot = sweepActive > 0;
  grad.addColorStop(0, hot ? 'rgba(255,90,80,0.42)' : 'rgba(255,220,120,0.34)');
  grad.addColorStop(1, hot ? 'rgba(255,90,80,0)' : 'rgba(255,220,120,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.moveTo(gx, gy);
  ctx.arc(gx, gy, range, a0, a1); ctx.closePath(); ctx.fill();
  // cone edges
  ctx.strokeStyle = hot ? 'rgba(255,120,110,0.5)' : 'rgba(255,230,150,0.45)';
  ctx.lineWidth = Math.max(1, cell * 0.04);
  ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(gx + Math.cos(a0) * range, gy + Math.sin(a0) * range);
  ctx.moveTo(gx, gy); ctx.lineTo(gx + Math.cos(a1) * range, gy + Math.sin(a1) * range); ctx.stroke();
  // guard body (cap + torso)
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(gx, gy + cell * 0.32, cell * 0.32, cell * 0.12, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2f3b8a'; // navy uniform
  GF.rr(ctx, gx - cell * 0.26, gy - cell * 0.1, cell * 0.52, cell * 0.5, cell * 0.16); ctx.fill();
  ctx.fillStyle = '#ffd9b0';
  ctx.beginPath(); ctx.arc(gx, gy - cell * 0.2, cell * 0.2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1f2a66'; // cap
  ctx.beginPath(); ctx.arc(gx, gy - cell * 0.26, cell * 0.22, Math.PI, Math.PI * 2); ctx.fill();
  ctx.fillRect(gx - cell * 0.24, gy - cell * 0.28, cell * 0.48, cell * 0.05);
  ctx.restore();
}

// ── HUD ──────────────────────────────────────────────────────────────────────
function drawTopHud(ctx) {
  var W = GF.W, topH = topHudH();
  ctx.fillStyle = 'rgba(8,10,18,0.92)'; ctx.fillRect(0, 0, W, topH);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, topH); ctx.lineTo(W, topH); ctx.stroke();

  var pad = GF.clamp(8 * GF.S, 6, 14);
  var corner = GF.clamp(34 * GF.S, 26, 48); // reserve right corner for mute+help
  var avail = W - pad * 2 - corner * 2 - 8;
  var barW = avail / 4 - 6;
  var barH = GF.clamp(9 * GF.S, 7, 14);
  var y0 = pad + 2;
  var labelFs = GF.clamp(9 * GF.S, 8, 13) | 0;

  drawMeter(ctx, pad + (barW + 6) * 0, y0, barW, barH, stamina / STAMINA_MAX, '#5ed27a', 'STA', labelFs);
  // bag
  var cap = BAG_CAP[bagLv];
  drawMeter(ctx, pad + (barW + 6) * 1, y0, barW, barH, ore / cap, '#ffd54a', '', labelFs);
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + labelFs + 'px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  drawOreGem(ctx, pad + (barW + 6) * 1 + 6, y0 + barH + labelFs * 0.9, labelFs * 0.6, 'gold');
  ctx.fillStyle = '#cfd6da';
  ctx.fillText(ore + '/' + cap, pad + (barW + 6) * 1 + 14, y0 + barH + 2);
  // noise
  drawMeter(ctx, pad + (barW + 6) * 2, y0, barW, barH, noise / NOISE_MAX, '#7fb6ff', 'NOISE', labelFs);
  // detection (red, pulse when high)
  var dpulse = detect > 60 ? (0.6 + 0.4 * Math.sin(Date.now() / 90)) : 1;
  ctx.save(); if (detect > 60) ctx.globalAlpha = dpulse;
  drawMeter(ctx, pad + (barW + 6) * 3, y0, barW, barH, detect / DETECT_MAX, '#ff5a50', 'SEEN', labelFs);
  ctx.restore();
}

function drawMeter(ctx, x, y, w, h, frac, col, label, fs) {
  frac = GF.clamp(frac, 0, 1);
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fill();
  if (frac > 0.001) {
    ctx.fillStyle = col;
    GF.rr(ctx, x, y, Math.max(h, w * frac), h, h / 2); ctx.fill();
  }
  if (label) {
    ctx.fillStyle = '#aab3c8'; ctx.font = 'bold ' + fs + 'px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(label, x, y + h + 2);
  }
}

function drawHudCorner(ctx) {
  var W = GF.W, topH = topHudH();
  var r = GF.clamp(13 * GF.S, 11, 18);
  var my = topH / 2;
  // mute
  var mx = W - r - 8;
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.beginPath(); ctx.arc(mx, my, r, 0, Math.PI * 2); ctx.fill();
  GF.drawMuteIcon(ctx, mx, my, r * 0.7, GF.muted);
  muteBtn = { x: mx - r, y: my - r, w: r * 2, h: r * 2 };
  // help
  var hx = mx - r * 2 - 10;
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.beginPath(); ctx.arc(hx, my, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#dfe7ff'; ctx.font = 'bold ' + (r * 1.1) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', hx, my + 1);
  helpBtn = { x: hx - r, y: my - r, w: r * 2, h: r * 2 };
}

function drawDepthRuler(ctx) {
  var W = GF.W, H = GF.H, topH = topHudH();
  var rw = GF.clamp(34 * GF.S, 24, 54);
  var rx = W - rw + 2;
  ctx.fillStyle = 'rgba(8,10,18,0.5)';
  ctx.fillRect(rx, topH, rw - 2, H - topH);
  var usable = H - topH;
  for (var L = 0; L < LAYER_COUNT; L++) {
    var fy = topH + usable * (L / LAYER_COUNT);
    var fh = usable / LAYER_COUNT;
    var reached = depthReached >= L;
    ctx.fillStyle = reached ? layerTint(L) : 'rgba(255,255,255,0.05)';
    ctx.fillRect(rx + 3, fy + 2, rw - 8, fh - 4);
    ctx.fillStyle = reached ? '#fff' : '#6a7080';
    var fs = GF.clamp(8 * GF.S, 7, 11) | 0;
    ctx.save();
    ctx.translate(rx + rw / 2, fy + fh / 2); ctx.rotate(-Math.PI / 2);
    ctx.font = 'bold ' + fs + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('layer' + L), 0, 0);
    ctx.restore();
  }
  // current depth marker
  var cl = Math.max(0, layerOfRow(inmate ? inmate.r : 0));
  if (inmate && layerOfRow(inmate.r) >= 0) {
    var my = topH + usable * (cl / LAYER_COUNT) + (usable / LAYER_COUNT) * (((inmate.r - SURFACE_ROWS) % LAYER_ROWS) / LAYER_ROWS);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.moveTo(rx - 4, my); ctx.lineTo(rx + 4, my - 5); ctx.lineTo(rx + 4, my + 5); ctx.closePath(); ctx.fill();
  }
}
function layerTint(L) { return ['rgba(138,86,48,0.6)', 'rgba(109,114,124,0.6)', 'rgba(79,107,87,0.6)', 'rgba(71,63,94,0.7)'][L]; }

function drawGoalPill(ctx) {
  if (!goalText) return;
  var W = GF.W, H = GF.H;
  ctx.font = 'bold ' + (GF.clamp(13 * GF.S, 11, 17) | 0) + 'px sans-serif';
  var tw = ctx.measureText(goalText).width;
  var pad = 12 * GF.S, h = GF.clamp(30 * GF.S, 26, 40);
  var w = tw + pad * 2;
  var x = (W - w) / 2, y = H - h - GF.clamp(10 * GF.S, 8, 18);
  ctx.fillStyle = 'rgba(16,20,30,0.9)';
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,213,74,0.5)'; ctx.lineWidth = 1.5; GF.rr(ctx, x, y, w, h, h / 2); ctx.stroke();
  ctx.fillStyle = '#ffe9a8'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(goalText, W / 2, y + h / 2 + 1);
}

var cellBtn = null;
function drawCellButton(ctx) {
  // "TO CELL ▸" — routes the inmate home; tapping while on the cell opens the hub.
  var W = GF.W, topH = topHudH();
  var onIt = onCell();
  var w = GF.clamp(96 * GF.S, 78, 140), h = GF.clamp(30 * GF.S, 26, 40);
  var x = W - w - GF.clamp(40 * GF.S, 30, 56), y = topH + GF.clamp(6 * GF.S, 4, 10);
  // shift below the depth ruler chevrons — place at top-left instead to avoid ruler
  x = GF.clamp(8 * GF.S, 6, 14); y = topH + GF.clamp(34 * GF.S, 28, 48);
  var glow = onIt ? (0.5 + 0.5 * Math.sin(Date.now() / 280)) : 0;
  ctx.save();
  if (onIt) { ctx.shadowColor = 'rgba(255,213,74,' + (0.4 + 0.4 * glow) + ')'; ctx.shadowBlur = 12; }
  ctx.fillStyle = onIt ? '#ffd54a' : 'rgba(40,46,62,0.85)';
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = onIt ? '#3a2e06' : '#cfd6da';
  ctx.font = 'bold ' + (GF.clamp(11 * GF.S, 10, 15) | 0) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('cell') + ' ▸', x + w / 2, y + h / 2 + 1);
  cellBtn = { x: x, y: y, w: w, h: h };
}

function drawSweepBanner(ctx) {
  var W = GF.W, topH = topHudH();
  var a = 0.6 + 0.4 * Math.sin(Date.now() / 110);
  ctx.save(); ctx.globalAlpha = a;
  var h = GF.clamp(26 * GF.S, 22, 36);
  var y = topH + 4;
  ctx.fillStyle = 'rgba(255,70,60,0.9)';
  var txt = GF.t('sweep');
  ctx.font = 'bold ' + (GF.clamp(13 * GF.S, 11, 17) | 0) + 'px sans-serif';
  var tw = ctx.measureText(txt).width; var w = tw + 28 * GF.S;
  var x = (W - w) / 2;
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(txt, W / 2, y + h / 2 + 1);
  ctx.restore();
}

function drawLayerBanner(ctx) {
  layerBannerT -= 1 / 60;
  var W = GF.W, H = GF.H;
  var a = Math.min(1, layerBannerT);
  ctx.save(); ctx.globalAlpha = a;
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (GF.clamp(26 * GF.S, 20, 40) | 0) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 8;
  ctx.fillText(GF.t('layer' + layerBanner), W / 2, H * 0.4);
  ctx.restore();
}

function drawCaughtFlash(ctx) {
  var W = GF.W, H = GF.H;
  var a = GF.clamp(caughtT / 1.4, 0, 1);
  ctx.fillStyle = 'rgba(180,30,30,' + (0.45 * a + 0.15) + ')'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (GF.clamp(34 * GF.S, 22, 50) | 0) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('caught'), W / 2, H * 0.42);
  ctx.font = (GF.clamp(15 * GF.S, 12, 22) | 0) + 'px sans-serif';
  ctx.fillText(GF.t('caught_sub'), W / 2, H * 0.42 + GF.clamp(34 * GF.S, 26, 46));
}

// ── HUB (between-shift cell screen) ──────────────────────────────────────────
function drawCellWallBg(ctx) {
  var W = GF.W, H = GF.H;
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a1f2e'); g.addColorStop(1, '#0c0f18');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // brick lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
  for (var y = 0; y < H; y += 28) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
}

function drawHub(ctx) {
  var W = GF.W, H = GF.H;
  drawCellWallBg(ctx);
  hubBtns = {};

  var pad = GF.clamp(16 * GF.S, 12, 28);
  var x = pad, w = W - pad * 2;
  var y = GF.clamp(20 * GF.S, 16, 40);

  // header
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (GF.clamp(22 * GF.S, 18, 32) | 0) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('cell'), x, y);
  // banked ore — placed LEFT of the corner mute/help buttons so it never overlaps
  var cornerClear = GF.clamp(76 * GF.S, 64, 110); // reserve the top-right corner buttons
  var bankRight = W - pad - cornerClear;
  ctx.textAlign = 'right';
  drawOreGem(ctx, bankRight - GF.clamp(58 * GF.S, 44, 80), y + GF.clamp(10 * GF.S, 8, 16), GF.clamp(9 * GF.S, 7, 13), 'gold');
  ctx.fillStyle = '#ffd54a'; ctx.font = 'bold ' + (GF.clamp(20 * GF.S, 16, 30) | 0) + 'px sans-serif';
  ctx.fillText(String(bank), bankRight, y);
  ctx.font = (GF.clamp(10 * GF.S, 9, 14) | 0) + 'px sans-serif'; ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t('bank'), bankRight, y + GF.clamp(22 * GF.S, 18, 30));
  ctx.textAlign = 'left';

  y += GF.clamp(44 * GF.S, 36, 60);

  // ── shop rows ──
  var rowH = GF.clamp(46 * GF.S, 40, 60);
  var gap = GF.clamp(7 * GF.S, 5, 11);
  var rows = [
    shopRow('shovel', shovelLv, SHOVEL_COSTS, '#f29a3e', shovelLv >= 3 ? GF.t('drill') : null),
    shopRow('bag_u', bagLv, BAG_COSTS, '#ffd54a', null, BAG_CAP[bagLv]),
    shopRow('muffler', mufflerLv, MUFFLER_COSTS, '#7fb6ff', null),
    shopRow('rope', ropeLv, ROPE_COSTS, '#b98a5a', null),
  ];
  for (var i = 0; i < rows.length; i++) {
    drawShopRow(ctx, x, y, w, rowH, rows[i], i);
    y += rowH + gap;
  }
  // disguise (consumable) row
  drawDisguiseRow(ctx, x, y, w, rowH);
  y += rowH + gap * 2;

  // ── DAILY CRATE (big) + START SHIFT (big) ──
  var bigH = GF.clamp(54 * GF.S, 46, 72);
  var half = (w - gap) / 2;
  // crate
  var crateReady = canClaimCrate();
  var cx = x, cy = y;
  var crateGlow = crateReady ? (0.5 + 0.5 * Math.sin(Date.now() / 300)) : 0;
  ctx.save();
  if (crateReady) { ctx.shadowColor = 'rgba(155,107,255,' + (0.5 + 0.4 * crateGlow) + ')'; ctx.shadowBlur = 18; }
  ctx.fillStyle = crateReady ? '#6a4bb0' : 'rgba(80,70,110,0.5)';
  GF.rr(ctx, cx, cy, half, bigH, 12); ctx.fill();
  ctx.restore();
  // crate icon
  ctx.fillStyle = crateReady ? '#caa9ff' : '#7a7290';
  GF.rr(ctx, cx + half / 2 - bigH * 0.18, cy + bigH * 0.16, bigH * 0.36, bigH * 0.3, 3); ctx.fill();
  ctx.fillStyle = crateReady ? '#fff' : '#aab';
  ctx.font = 'bold ' + (GF.clamp(13 * GF.S, 11, 17) | 0) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('crate'), cx + half / 2, cy + bigH * 0.72);
  hubBtns.crate = { x: cx, y: cy, w: half, h: bigH, ready: crateReady };

  // start shift
  var sx = x + half + gap, sy = y;
  var sg = 0.5 + 0.5 * Math.sin(Date.now() / 360);
  ctx.save(); ctx.shadowColor = 'rgba(46,224,122,' + (0.4 + 0.3 * sg) + ')'; ctx.shadowBlur = 16;
  var grad = ctx.createLinearGradient(sx, sy, sx, sy + bigH);
  grad.addColorStop(0, '#2ee07a'); grad.addColorStop(1, '#23a657');
  ctx.fillStyle = grad; GF.rr(ctx, sx, sy, half, bigH, 12); ctx.fill(); ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (GF.clamp(16 * GF.S, 13, 22) | 0) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('▶ ' + GF.t('start_shift'), sx + half / 2, sy + bigH / 2 + 1);
  hubBtns.start = { x: sx, y: sy, w: half, h: bigH };

  // corner mute + help
  drawHudCorner(ctx);

  // crate message
  if (crateMsgT > 0) {
    ctx.globalAlpha = Math.min(1, crateMsgT);
    ctx.fillStyle = '#caa9ff'; ctx.font = 'bold ' + (GF.clamp(16 * GF.S, 13, 22) | 0) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.fillText(crateMsg, W / 2, cy - GF.clamp(16 * GF.S, 12, 24));
    ctx.globalAlpha = 1;
  }
  if (newWingMsg > 0) {
    ctx.globalAlpha = Math.min(1, newWingMsg);
    ctx.fillStyle = '#9ab'; ctx.font = (GF.clamp(12 * GF.S, 10, 16) | 0) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.fillText(GF.t('new_wing'), W / 2, GF.clamp(16 * GF.S, 12, 24));
    ctx.globalAlpha = 1;
  }
}

function shopRow(key, lv, costs, col, badge, capVal) {
  var maxed = lv >= costs.length - 1;
  var cost = maxed ? 0 : costs[lv + 1];
  return { key: key, lv: lv, maxed: maxed, cost: cost, col: col, badge: badge, capVal: capVal };
}

function drawShopRow(ctx, x, y, w, h, row, idx) {
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  GF.rr(ctx, x, y, w, h, 8); ctx.fill();
  // icon chip
  var ic = h * 0.6, ix = x + h * 0.2, iy = y + (h - ic) / 2;
  ctx.fillStyle = row.col; GF.rr(ctx, ix, iy, ic, ic, 6); ctx.fill();
  // name + level pips
  var nx = ix + ic + 10;
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (GF.clamp(13 * GF.S, 11, 17) | 0) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  var name = GF.t(row.key);
  ctx.fillText(name, nx, y + h * 0.34);
  // level pips / cap
  ctx.font = (GF.clamp(10 * GF.S, 9, 13) | 0) + 'px sans-serif'; ctx.fillStyle = '#9ab';
  var sub = '';
  if (row.capVal != null) sub = GF.t('owned') + ': ' + row.capVal;
  else sub = 'L' + row.lv + (row.badge ? ' · ' + row.badge : '');
  ctx.fillText(sub, nx, y + h * 0.68);
  // buy button
  var bw = GF.clamp(74 * GF.S, 60, 110), bh = h * 0.62, bx = x + w - bw - 8, by = y + (h - bh) / 2;
  var afford = bank >= row.cost && !row.maxed;
  ctx.fillStyle = row.maxed ? 'rgba(120,130,150,0.3)' : (afford ? '#2ee07a' : 'rgba(120,130,150,0.3)');
  GF.rr(ctx, bx, by, bw, bh, bh / 2); ctx.fill();
  ctx.fillStyle = row.maxed ? '#aab' : (afford ? '#06281a' : '#cdd');
  ctx.font = 'bold ' + (GF.clamp(11 * GF.S, 10, 15) | 0) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (row.maxed) ctx.fillText(GF.t('max'), bx + bw / 2, by + bh / 2 + 1);
  else { ctx.fillText(GF.t('buy') + ' ' + row.cost, bx + bw / 2, by + bh / 2 + 1); }
  hubBtns['buy_' + row.key] = { x: bx, y: by, w: bw, h: bh, cost: row.cost, key: row.key, maxed: row.maxed, afford: afford };
}

function drawDisguiseRow(ctx, x, y, w, h) {
  ctx.fillStyle = 'rgba(155,107,255,0.10)';
  GF.rr(ctx, x, y, w, h, 8); ctx.fill();
  var ic = h * 0.6, ix = x + h * 0.2, iy = y + (h - ic) / 2;
  ctx.fillStyle = '#9b6bff'; GF.rr(ctx, ix, iy, ic, ic, 6); ctx.fill();
  var nx = ix + ic + 10;
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (GF.clamp(13 * GF.S, 11, 17) | 0) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('disguise'), nx, y + h * 0.34);

function drawHelp(ctx) {
  var W = GF.W, H = GF.H;
  ctx.fillStyle = 'rgba(6,8,16,0.92)'; ctx.fillRect(0, 0, W, H);
  var pad = GF.clamp(22 * GF.S, 16, 40);
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var y = GF.clamp(50 * GF.S, 36, 90);
  ctx.font = 'bold ' + (GF.clamp(22 * GF.S, 18, 32) | 0) + 'px sans-serif';
  ctx.fillText(GF.t('help'), W / 2, y); y += GF.clamp(40 * GF.S, 30, 56);
  var lines = [
    GF.t('tut_goal'), GF.t('tut_controls'),
    GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip'),
  ];
  ctx.font = (GF.clamp(14 * GF.S, 12, 20) | 0) + 'px sans-serif';
  var lh = GF.clamp(22 * GF.S, 18, 30);
  for (var i = 0; i < lines.length; i++) {
    ctx.fillStyle = '#cdd6e6';
    y = wrapText(ctx, lines[i], W / 2, y, W - pad * 2, lh) + lh * 0.5;
  }
  // close button
  var bw = GF.clamp(150 * GF.S, 120, 220), bh = GF.clamp(46 * GF.S, 40, 60);
  var bx = (W - bw) / 2, by = H - bh - GF.clamp(28 * GF.S, 20, 44);
  ctx.fillStyle = '#2ee07a'; GF.rr(ctx, bx, by, bw, bh, bh / 2); ctx.fill();
  ctx.fillStyle = '#06281a'; ctx.font = 'bold ' + (GF.clamp(16 * GF.S, 13, 22) | 0) + 'px sans-serif';

}

function wrapText(ctx, text, cx2, y, maxW, lh) {
  var words = String(text).split(/\s+/), line = '', yy = y;
  ctx.textAlign = 'center';
  for (var i = 0; i < words.length; i++) {
    var probe = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && line) { ctx.fillText(line, cx2, yy); yy += lh; line = words[i]; }
    else line = probe;
  }
  if (line) { ctx.fillText(line, cx2, yy); yy += lh; }
  return yy;
}

function todayKey() { var d = new Date(); return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate(); }
function canClaimCrate() { return lastCrateDay !== todayKey(); }
function claimCrate() {
  if (!canClaimCrate()) return;
  lastCrateDay = todayKey();
  var bonus = 18 + Math.floor(Math.random() * 22);
  bank += bonus; totalOre += bonus;
  var gotDisguise = Math.random() < 0.4;
  if (gotDisguise) disguises += 1;
  crateMsg = GF.t('crate_got') + ' +' + bonus + (gotDisguise ? ' + ' + GF.t('disguise') : '');
  crateMsgT = 2.6;
  GF.sfx('unlock');
  saveRun();
}

var pressX = 0, pressY = 0, pressTime = 0, pressMoved = false, holdTimer = null;

function onPress(x, y) {
  // tutorial swallows first
  if (GF.tutorial.active) {
    if (GF.tutorial.handleClick(x, y)) return;
  }
  // mute / help corner always live
  if (muteBtn && inRect(x, y, muteBtn)) { GF.toggleMute(); GF.setMusicMuted(GF.muted); GF.sfx('click'); return; }
  if (helpBtn && inRect(x, y, helpBtn)) { helpOpen = true; GF.sfx('click'); return; }
  if (helpOpen) { if (helpCloseBtn && inRect(x, y, helpCloseBtn)) { helpOpen = false; GF.sfx('click'); } return; }

  if (gs === 'HUB') { onHubPress(x, y); return; }
  if (gs !== 'SHIFT') return;

  // "TO CELL" button: if on the cell, open the hub; else route home + auto-enter
  if (cellBtn && inRect(x, y, cellBtn)) {
    if (onCell()) { bankOre(); enterCellHub(); }
    else {
      var cp = findCell();
      var pth = computePath(inmate.c, inmate.r, cp.c, cp.r, false);
      if (pth.length) { path = pth; digTarget = null; digProg = 0; pendingDig = null; returningHome = true; }
    }
    return;
  }

  // SHIFT: tap a tile to move/dig
  pressX = x; pressY = y; pressTime = Date.now(); pressMoved = false;
  holdActive = false;
  if (holdTimer) clearTimeout(holdTimer);
  holdTimer = setTimeout(function () { holdActive = true; }, 260);

  var cellHit = screenToCell(x, y);
  handleTileTap(cellHit.c, cellHit.r);
}

function onPressMove(x, y) {
  if (Math.abs(x - pressX) > 10 || Math.abs(y - pressY) > 10) pressMoved = true;
  if (gs === 'SHIFT' && pressMoved) {
    // drag-paint a move target (re-route as the finger moves)
    var cellHit = screenToCell(x, y);
    handleTileTap(cellHit.c, cellHit.r, true);
  }
}

function onRelease() {
  if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  holdActive = false;
}

function handleTileTap(c, r, isDrag) {
  if (c < 0 || c >= GRID_COLS || r < 0 || r >= GRID_ROWS) return;
  var t = grid[r][c];
  // tapping your OWN cell while standing on it = bank + enter the cell (shop hub)
  if (t.kind === 'CELL' && inmate.c === c && inmate.r === r && !isDrag) {
    bankOre(); enterCellHub(); return;
  }
  if (isWalkable(t)) {
    var pth = computePath(inmate.c, inmate.r, c, r, false);
    if (pth.length) { path = pth; digTarget = null; digProg = 0; pendingDig = null; }
  } else if (isDiggable(t)) {
    setDig(c, r);
  } else {
    // not diggable (needs better gear): show a hint via goal pill flash
    if (!isDrag) { goalText = GF.t('need_shovel'); GF.sfx('error'); setTimeout(updateGoal, 1200); }
  }
}

function onHubPress(x, y) {
  if (hubBtns.start && inRect(x, y, hubBtns.start)) { GF.sfx('click'); startShift(); return; }
  if (hubBtns.crate && inRect(x, y, hubBtns.crate)) {
    if (hubBtns.crate.ready) { claimCrate(); } else { GF.sfx('error'); crateMsg = GF.t('crate_done'); crateMsgT = 1.8; }
    return;
  }
  // shop buys
  var keys = ['shovel', 'bag_u', 'muffler', 'rope'];
  for (var i = 0; i < keys.length; i++) {
    var b = hubBtns['buy_' + keys[i]];
    if (b && inRect(x, y, b)) { tryBuy(keys[i], b); return; }
  }
  var bd = hubBtns.buy_disguise;
  if (bd && inRect(x, y, bd)) {
    if (bd.afford) { bank -= DISGUISE_COST; disguises += 1; GF.sfx('coin'); saveRun(); }
    else GF.sfx('error');
    return;
  }
}

function tryBuy(key, b) {
  if (b.maxed) { GF.sfx('error'); return; }
  if (!b.afford) { GF.sfx('error'); return; }
  bank -= b.cost;
  if (key === 'shovel') shovelLv++;
  else if (key === 'bag_u') bagLv++;
  else if (key === 'muffler') mufflerLv++;
  else if (key === 'rope') ropeLv++;
  GF.sfx('levelup');
  saveRun();
}

function inRect(x, y, b) { return b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }

function onPlay() {
  GF.sfx('click');
  // first ever launch or returning: go to HUB (cell), with a fresh prison if none
  if (!grid.length) newPrison(true);
  gs = 'HUB';
  saveRun();
}
function onPlayAgain() {
  GF.sfx('click');

  newPrison(true);
  newWingMsg = 2.5;
  gs = 'HUB';
  saveRun();
}

// PERSIST
// ════════════════════════════════════════════════════════════════════════════
function serializeGrid() {
  // compact: only store non-default tiles (DUG cells + cleared HATCH/ore changes
  // would be lost on a fresh prison anyway). We store the FULL kind grid + ore so
  // a mid-shift reload restores the exact dug state (Yandex 1.9).
  var k = [], o = [];
  for (var r = 0; r < GRID_ROWS; r++) {
    var kr = '', orr = '';
    for (var c = 0; c < GRID_COLS; c++) {
      kr += KIND_CODE[grid[r][c].kind] || '.';
      orr += grid[r][c].ore ? ORE_CODE[grid[r][c].ore] : '.';
    }
    k.push(kr); o.push(orr);
  }
  return { k: k, o: o };
}
var KIND_CODE = { SKY: 'y', DIRT: 'd', STONE: 's', SEWER: 'w', ROCK: 'r', DUG: 'u', CELL: 'c', PIPE: 'p', BARS: 'b', HATCH: 'h' };
var CODE_KIND = {}; for (var kc in KIND_CODE) CODE_KIND[KIND_CODE[kc]] = kc;
var ORE_CODE = { tin: 't', copper: 'c', iron: 'i', silver: 's', gold: 'g', stash: 'x' };
var CODE_ORE = {}; for (var oc in ORE_CODE) CODE_ORE[ORE_CODE[oc]] = oc;

function deserializeGrid(data) {
  if (!data || !data.k || data.k.length !== GRID_ROWS) return false;
  grid = [];
  for (var r = 0; r < GRID_ROWS; r++) {
    var row = [];
    for (var c = 0; c < GRID_COLS; c++) {
      var kind = CODE_KIND[data.k[r][c]] || 'DIRT';
      var oreCh = data.o && data.o[r] ? data.o[r][c] : '.';
      row.push({ kind: kind, layer: layerOfRow(r), ore: oreCh !== '.' ? (CODE_ORE[oreCh] || null) : null });
    }
    grid.push(row);
  }
  return true;
}

function saveRun() { try { GF.saveRun(); } catch (e) {} }

// ════════════════════════════════════════════════════════════════════════════
// BOT CONTRACT (progression probe — drives a headless run)
// ════════════════════════════════════════════════════════════════════════════
function botActions() {
  if (gs === 'MENU') return ['play'];
  if (gs === 'ESCAPED') return ['again'];
  if (gs === 'CAUGHT') return ['wait'];
  if (gs === 'HUB') {
    var a = ['shift'];
    if (canClaimCrate()) a.push('crate');
    if (bank >= SHOVEL_COSTS[Math.min(shovelLv + 1, 3)] && shovelLv < 3) a.push('buy_shovel');
    if (bank >= BAG_COSTS[Math.min(bagLv + 1, 3)] && bagLv < 3) a.push('buy_bag');
    return a;
  }
  // SHIFT: dig toward bedrock; return to the cell when full/tired/stuck to shop.
  var acts = ['dig_down', 'bank', 'go_cell'];
  return acts;
}
// can the inmate dig anything that makes downward progress right now?
function botCanProgress() {
  if (!inmate) return false;
  var below = grid[inmate.r + 1] && grid[inmate.r + 1][inmate.c];
  if (below && (isDiggable(below) || isWalkable(below))) return true;
  // any diggable in the 3x3 below-ish neighbourhood
  var probe = [[inmate.c - 1, inmate.r + 1], [inmate.c + 1, inmate.r + 1], [inmate.c - 1, inmate.r], [inmate.c + 1, inmate.r]];
  for (var i = 0; i < probe.length; i++) {
    var c = probe[i][0], r = probe[i][1];
    if (c < 0 || c >= GRID_COLS || r < 0 || r >= GRID_ROWS) continue;
    if (isDiggable(grid[r][c])) return true;
  }
  // hatch reachable + diggable?
  var h = findHatch(); if (h && isDiggable(grid[h.r][h.c])) return true;
  return false;
}
function botAct(a) {
  if (a === 'play') { onPlay(); return; }
  if (a === 'again') { onPlayAgain(); return; }
  if (a === 'shift') { startShift(); return; }
  if (a === 'wait') { caughtT = 0.01; return; }
  if (a === 'crate') { claimCrate(); return; }
  if (a === 'buy_shovel') { if (shovelLv < 3) { bank -= SHOVEL_COSTS[shovelLv + 1]; shovelLv++; } return; }
  if (a === 'buy_bag') { if (bagLv < 3) { bank -= BAG_COSTS[bagLv + 1]; bagLv++; } return; }
  if (a === 'bank' || a === 'go_cell') {
    // route to cell and (for go_cell) enter the hub on arrival to shop
    var cp = findCell();
    if (inmate.c === cp.c && inmate.r === cp.r) { bankOre(); enterCellHub(); return; }
    var pth = computePath(inmate.c, inmate.r, cp.c, cp.r, false);
    if (pth.length) { path = pth; if (a === 'go_cell') returningHome = true; }
    return;
  }
  if (a === 'dig_down') {
    // depth-seeking heuristic: ALWAYS prefer going down. Try the tile directly
    // below, then diagonals below, then sideways. This is the bot's pathing for
    // the progression gate; a human taps wherever.
    // If the drill is owned AND we're already in the bedrock layer, STEER toward
    // the hatch column so the probe can reach + dig the escape (win path). Until
    // bedrock, keep digging straight down through the upper layers.
    // CRITICAL: the bot may only act on 4-ADJACENT tiles (you can only dig/step
    // what you can reach). Build an order of ADJACENT cells only.
    var hatchC = null;
    if (shovelLv >= 3 && layerOfRow(inmate.r) >= 3) { var hh = findHatch(); if (hh) hatchC = hh.c; }
    var below = { c: inmate.c, r: inmate.r + 1 };
    var sideToward = null, sideAway = null;
    if (hatchC != null && hatchC !== inmate.c) {
      sideToward = { c: hatchC < inmate.c ? inmate.c - 1 : inmate.c + 1, r: inmate.r };
      sideAway = { c: hatchC < inmate.c ? inmate.c + 1 : inmate.c - 1, r: inmate.r };
    }
    // Helper: act on an adjacent cell — dig if solid-diggable, step if walkable.
    function actCell(cc, rr3) {
      if (cc < 0 || cc >= GRID_COLS || rr3 < 0 || rr3 >= GRID_ROWS) return false;
      if (Math.abs(cc - inmate.c) + Math.abs(rr3 - inmate.r) !== 1) return false;
      var t = grid[rr3][cc];
      if (isDiggable(t)) { setDig(cc, rr3); return true; }   // prefer DIGGING new ground
      if (isWalkable(t)) { tryStepOrDig(cc, rr3); return true; }
      return false;
    }
    // 1) In bedrock heading for the hatch and not yet at its column: tunnel
    //    sideways toward it first (dig fresh rock), then drop down.
    if (sideToward && Math.abs(hatchC - inmate.c) >= 1 && layerOfRow(inmate.r) >= 3) {
      if (actCell(sideToward.c, sideToward.r)) return;
    }
    // 2) Go DOWN: dig the tile below, or descend into a tunnel below.
    if (actCell(below.c, below.r)) {
      // but if "below" was just a step into an already-dug tunnel, that's fine —
      // we descend; the next tick re-evaluates from the deeper cell.
      return;
    }
    // 3) Down is blocked (locked layer / bedrock w/o drill). Hatch ready? win it.
    var hatch = findHatch();
    if (hatch && isDiggable(grid[hatch.r][hatch.c])) {
      // dig the hatch if adjacent, else route to a walkable neighbour of it
      if (Math.abs(hatch.c - inmate.c) + Math.abs(hatch.r - inmate.r) === 1) { setDig(hatch.c, hatch.r); return; }
      var ph = computePath(inmate.c, inmate.r, hatch.c, hatch.r, true);
      if (ph.length) { path = ph; pendingDig = { c: hatch.c, r: hatch.r }; return; }
    }
    // 4) Harvest the nearest reachable ORE (fresh ground) to bank toward gear.
    var oreT = nearestReachableDiggable(true);
    if (oreT) { setDigVia(oreT); return; }
    // 5) No ore left reachable: dig the nearest fresh diggable tile to expand.
    var anyT = nearestReachableDiggable(false);
    if (anyT) { setDigVia(anyT); return; }
    // truly stuck (e.g. only ROCK left, no drill, all ore harvested): go home to
    // the cell to bank + shop, so the loop never soft-locks.
    botAct('go_cell');
    return;
  }
}

// ── screenshot helper ──
window._jumpLevel = function () {
  if (!grid.length) buildPrison();
  if (gs === 'MENU') { onPlay(); }
  startShift();
  if (GF.tutorial) GF.tutorial.active = false;
  // pre-dig a vertical shaft so screenshots show a tunnel + reach the stone layer
  var cp = findCell();
  for (var r = cp.r + 1; r < SURFACE_ROWS + LAYER_ROWS + 3 && r < GRID_ROWS; r++) {
    if (grid[r][cp.c].kind !== 'CELL') grid[r][cp.c].kind = 'DUG';
  }
  inmate.c = cp.c; inmate.r = SURFACE_ROWS + LAYER_ROWS + 2; inmate.x = cp.c; inmate.y = inmate.r;
  ore = 5; depthReached = 1;
  updateCam(); updateGoal();
};
// _setupForScreenshot escape hatch: a denser, gameplay-forward frame
window._setupForScreenshot = function () { window._jumpLevel(); };

})();
</script>
