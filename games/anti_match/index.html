<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anti-Match</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── LOCALISED STRINGS ────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Anti-Match',
    sub: 'NEVER line up three of the same colour — survive 50 drops.',
    play: 'PLAY', retry: 'RETRY',
    score: 'SCORE', best: 'BEST',
    drops: 'Drops', maxh: 'Tallest', empty: 'Empty',
    gameover: 'TOWER COLLAPSED',
    won: 'SURVIVED 50',
    tut_goal:     'Goal: survive 50 drops without forming any 3-in-a-row of the same colour.',
    tut_controls: 'Controls: tap a column (or Left/Right arrows then Space) to drop the gem.',
    tut_win:      'Win: outlast all 50 drops with every column under height 12.',
    tut_lose:     'Lose: any column reaches height 12 — the tower collapses.',
    tut_tip:      'Tip: matches EXPLODE but PERMANENTLY shrink that column buffer by 1 — relief is a trap.',
    help: '?',
    tap_continue: 'Tap to continue',
  },
  ru: {
    title: 'Антиматч',
    sub: 'НИКОГДА не выстраивай три камня одного цвета — продержись 50 капель.',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ',
    score: 'ОЧКИ', best: 'РЕКОРД',
    drops: 'Капли', maxh: 'Выше', empty: 'Пусто',
    gameover: 'БАШНЯ РУХНУЛА',
    won: 'ПЕРЕЖИЛ 50',
    tut_goal:     'Цель: продержись 50 капель — не ставь три камня одного цвета подряд.',
    tut_controls: 'Управление: коснись колонки (стрелки и Пробел).',
    tut_win:      'Победа: переживи все 50 капель — каждая колонка ниже 12.',
    tut_lose:     'Проигрыш: любая колонка достигла высоты 12 — башня рухнула.',
    tut_tip:      'Тройка ВЗРЫВАЕТСЯ, но НАВСЕГДА уменьшает буфер колонки на 1 — спасение оборачивается ловушкой.',
    help: '?',
    tap_continue: 'Нажми, чтобы продолжить',
  },
};

var SPRITE_NAMES = [];

// ── TUNABLES (mirror DESIGN.md) ──────────────────────────────────────────
var GRID_COLS = 6;
var GRID_ROWS = 12;
var COL_HEIGHT_CAP = 12;
var DROP_BUDGET = 50;
var COLOR_COUNT = 4;
var GEM_FALL_SPEED = 14;
var SETTLE_DELAY_MS = 80;
var EXPLOSION_PARTICLES = 18;
var CHAIN_BONUS = 5;
var GEM_PIXEL_SIZE = 56;

// ── PALETTE ──────────────────────────────────────────────────────────────
var COL_BG_TOP = '#0c0d1f';
var COL_BG_BOT = '#1a0d2e';
var COL_LANE = 'rgba(255,255,255,0.04)';
var COL_LANE_HOVER = 'rgba(255,255,255,0.10)';
var COL_CAP_LINE = '#ef4760';
var COL_CAP_LINE_SOFT = 'rgba(239,71,96,0.35)';
var COL_GRID_RIM = 'rgba(255,255,255,0.07)';
var COL_HUD = '#e8eaff';
var COL_HUD_DIM = '#7c83a8';
var COL_WARN = '#ffb84d';

// Gem colours — high contrast, distinct hues
var GEM_COLORS = [
  { fill: '#ff5a7a', edge: '#a82540', glow: '#ff8aa3' }, // red
  { fill: '#4dd0e1', edge: '#1d6b78', glow: '#7ee4f0' }, // cyan
  { fill: '#ffd24d', edge: '#a07520', glow: '#ffe488' }, // amber
  { fill: '#8b5cf6', edge: '#4b2c8e', glow: '#b89cf5' }, // purple
];

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | PLAYING | GAMEOVER | WON
var board;                  // board[col][row] = colorIdx or -1; row 0 = bottom
var heights;                // heights[col] = settled stack height (0..GRID_ROWS)
var capPerCol;              // capPerCol[col] = effective ceiling (starts at COL_HEIGHT_CAP, shrinks on explode)
var dropsUsed = 0;
var score = 0;
var best = 0;
var hoverCol = -1;
var fallingGem = null;      // { col, color }
var explosions = [];
var settleTimer = 0;
var lastChain = 0;
var seenTutorial = false;
var tutorialOpen = false;
var helpBtn = null;
var menuPlayBtn = null;
var retryBtn = null;
var tutCloseBtn = null;
var nextColorIdx = 0;

// ── HELPERS ──────────────────────────────────────────────────────────────
function rngInt(n) { return Math.floor(Math.random() * n); }

function newBoard() {
  board = [];
  heights = [];
  capPerCol = [];
  for (var c = 0; c < GRID_COLS; c++) {
    var col = [];
    for (var r = 0; r < GRID_ROWS; r++) col.push(-1);
    board.push(col);
    heights.push(0);
    capPerCol.push(COL_HEIGHT_CAP);
  }
}

function spawnNextGem() {
  fallingGem = { col: Math.floor(GRID_COLS / 2), color: nextColorIdx };
  nextColorIdx = rngInt(COLOR_COUNT);
}

function emptyCellsCount() {
  if (!heights) return 0;
  var n = 0;
  for (var c = 0; c < GRID_COLS; c++) n += (GRID_ROWS - heights[c]);
  return n;
}

function maxHeight() {
  if (!heights) return 0;
  var m = 0;
  for (var c = 0; c < GRID_COLS; c++) if (heights[c] > m) m = heights[c];
  return m;
}

function compactColumn(c) {
  var stack = [];
  for (var r = 0; r < GRID_ROWS; r++) if (board[c][r] !== -1) stack.push(board[c][r]);
  for (var r2 = 0; r2 < GRID_ROWS; r2++) board[c][r2] = (r2 < stack.length) ? stack[r2] : -1;
  heights[c] = stack.length;
}

function findMatches() {
  var hits = {};
  function mark(c, r) { hits[c + ',' + r] = { c: c, r: r }; }

  // Horizontal runs
  for (var r = 0; r < GRID_ROWS; r++) {
    var run = 1;
    for (var c = 1; c < GRID_COLS; c++) {
      var prev = board[c-1][r], cur = board[c][r];
      if (cur !== -1 && cur === prev) {
        run++;
        if (run >= 3) { mark(c, r); mark(c-1, r); mark(c-2, r); }
      } else { run = 1; }
    }
  }
  // Vertical runs
  for (var cc = 0; cc < GRID_COLS; cc++) {
    var run2 = 1;
    for (var rr = 1; rr < GRID_ROWS; rr++) {
      var prev2 = board[cc][rr-1], cur2 = board[cc][rr];
      if (cur2 !== -1 && cur2 === prev2) {
        run2++;
        if (run2 >= 3) { mark(cc, rr); mark(cc, rr-1); mark(cc, rr-2); }
      } else { run2 = 1; }
    }
  }
  var out = [];
  for (var k in hits) if (Object.prototype.hasOwnProperty.call(hits, k)) out.push(hits[k]);
  return out;
}

function resolveMatches() {
  var totalExploded = 0;
  var chain = 0;
  while (true) {
    var matches = findMatches();
    if (!matches.length) break;
    chain++;
    var shrunkCols = {};
    for (var i = 0; i < matches.length; i++) {
      var m = matches[i];
      var color = board[m.c][m.r];
      board[m.c][m.r] = -1;
      var px = colToPx(m.c);
      var py = rowToPx(m.r);
      var pal = GEM_COLORS[color] || GEM_COLORS[0];
      GF.spawnParticles(px, py, pal.fill, EXPLOSION_PARTICLES);
      explosions.push({ c: m.c, r: m.r, color: color, t: 0.5 });
      totalExploded++;
      if (!shrunkCols[m.c]) shrunkCols[m.c] = true;
    }
    for (var c = 0; c < GRID_COLS; c++) compactColumn(c);
    for (var sc in shrunkCols) {
      if (Object.prototype.hasOwnProperty.call(shrunkCols, sc)) {
        var ci = +sc;
        capPerCol[ci] = Math.max(3, capPerCol[ci] - 1);
        var cx = colToPx(ci);
        var cy = rowToPx(capPerCol[ci]);
        GF.spawnFloat(cx, cy, '−1 cap', '#ef4760');
      }
    }
    GF.setShake(0.4 + 0.2 * chain);
  }
  if (chain > 1) {
    GF.spawnFloat(GF.cx, GF.cy - 60 * GF.S, 'CHAIN x' + chain, '#ffd24d');
    score += CHAIN_BONUS * chain;
  }
  lastChain = chain;
  return totalExploded;
}

// ── GEOMETRY ─────────────────────────────────────────────────────────────
function boardOrigin() {
  var maxByH = (GF.H - 180 * GF.S) / GRID_ROWS;
  var maxByW = (GF.W - 80 * GF.S) / GRID_COLS;
  var s = Math.max(20, Math.min(maxByH, maxByW));
  var totalW = s * GRID_COLS;
  var totalH = s * GRID_ROWS;
  var x0 = (GF.W - totalW) / 2;
  var y0 = (GF.H - totalH) / 2 + 30 * GF.S;
  return { x0: x0, y0: y0, cell: s, totalW: totalW, totalH: totalH };
}
function colToPx(c) {
  var o = boardOrigin();
  return o.x0 + (c + 0.5) * o.cell;
}
function rowToPx(r) {
  var o = boardOrigin();
  return o.y0 + o.totalH - (r + 0.5) * o.cell;
}
function pxToCol(px) {
  var o = boardOrigin();
  if (px < o.x0 || px > o.x0 + o.totalW) return -1;
  var c = Math.floor((px - o.x0) / o.cell);
  if (c < 0 || c >= GRID_COLS) return -1;
  return c;
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  newBoard();
  dropsUsed = 0;
  score = 0;
  explosions = [];
  nextColorIdx = rngInt(COLOR_COUNT);
  spawnNextGem();
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function gameOver() {
  if (score > best) {
    best = score;
    try { localStorage.setItem('anti_match_best', String(best)); } catch (e) {}
  }
  gs = 'GAMEOVER';
  GF.setShake(1.4);
  GF.gameEnded();
  GF.saveRun();
}

function gameWon() {
  score = (50 - maxHeight()) * 10 + emptyCellsCount() * 2 + dropsUsed * 5;
  if (score > best) {
    best = score;
    try { localStorage.setItem('anti_match_best', String(best)); } catch (e) {}
  }
  gs = 'WON';
  GF.gameEnded();
  GF.saveRun();
}

function commitGem(col) {
  if (gs !== 'PLAYING' || !fallingGem || settleTimer > 0) return false;
  if (col < 0 || col >= GRID_COLS) return false;
  fallingGem.col = col;
  if (heights[col] >= GRID_ROWS) { gameOver(); return true; }
  var landRow = heights[col];
  board[col][landRow] = fallingGem.color;
  heights[col]++;
  dropsUsed++;
  fallingGem = null;
  settleTimer = SETTLE_DELAY_MS;

  var exploded = resolveMatches();
  if (exploded === 0) score += 3;

  // Lose if any column reached its effective cap
  for (var c = 0; c < GRID_COLS; c++) {
    if (heights[c] >= capPerCol[c] || heights[c] >= GRID_ROWS) {
      gameOver();
      return true;
    }
  }
  if (dropsUsed >= DROP_BUDGET) { gameWon(); return true; }
  spawnNextGem();
  GF.saveRun();
  return true;
}

// Screenshot helper — populate to mid-game state for take_screenshots.js
function _populateForShot(level) {
  newBoard();
  dropsUsed = 0;
  score = 80;
  // Deterministic non-matching seed (no 3-in-a-row inside columns; horizontal
  // rows checked manually to avoid triggering resolveMatches)
  var seed = [
    [0, 1, 2, 3, 0, 1, 2],
    [1, 2, 0, 3, 1],
    [2, 3, 1, 0, 2, 3],
    [3, 0, 2, 1, 3, 0],
    [0, 2, 3, 1, 0, 2, 1, 3],
    [1, 0, 2, 1]
  ];
  for (var c = 0; c < GRID_COLS; c++) {
    var s = seed[c] || [];
    for (var r = 0; r < s.length; r++) {
      board[c][r] = s[r];
    }
    heights[c] = s.length;
  }
  dropsUsed = 24 + (level || 0);
  nextColorIdx = rngInt(COLOR_COUNT);
  spawnNextGem();
  gs = 'PLAYING';
  GF.saveRun();
}
window._jumpLevel = function(n) {
  if (typeof n === 'number' && n >= 99) {
    _populateForShot(0);
    gameOver();
    return;
  }
  _populateForShot(n || 0);
};
window._setupForScreenshot = function(level) { _populateForShot(level || 0); };

// ── INPUT ────────────────────────────────────────────────────────────────
function onPointer(x, y) {
  if (helpBtn && gs === 'PLAYING' &&
      x >= helpBtn.x && x <= helpBtn.x + helpBtn.w &&
      y >= helpBtn.y && y <= helpBtn.y + helpBtn.h) {
    tutorialOpen = !tutorialOpen;
    return true;
  }
  if (tutorialOpen && tutCloseBtn &&
      x >= tutCloseBtn.x && x <= tutCloseBtn.x + tutCloseBtn.w &&
      y >= tutCloseBtn.y && y <= tutCloseBtn.y + tutCloseBtn.h) {
    tutorialOpen = false;
    return true;
  }
  if (tutorialOpen) return true;

  if (gs === 'MENU') {
    if (menuPlayBtn && x >= menuPlayBtn.x && x <= menuPlayBtn.x + menuPlayBtn.w &&
        y >= menuPlayBtn.y && y <= menuPlayBtn.y + menuPlayBtn.h) {
      try { localStorage.setItem('anti_match_seen_tutorial', '1'); } catch (e) {}
      seenTutorial = true;
      startGame();
      return true;
    }
    // Tapping anywhere on MENU also starts (after small delay) — improves mobile UX
    startGame();
    return true;
  }
  if (gs === 'GAMEOVER' || gs === 'WON') {
    if (retryBtn && x >= retryBtn.x && x <= retryBtn.x + retryBtn.w &&
        y >= retryBtn.y && y <= retryBtn.y + retryBtn.h) {
      startGame();
      return true;
    }
    startGame();
    return true;
  }
  if (gs === 'PLAYING') {
    var c = pxToCol(x);
    if (c >= 0) { commitGem(c); return true; }
  }
  return false;
}

GF.canvas.addEventListener('click', function(e) {
  onPointer(e.clientX, e.clientY);
});
GF.canvas.addEventListener('touchstart', function(e) {
  if (e.changedTouches && e.changedTouches.length) {
    var t = e.changedTouches[0];
    onPointer(t.clientX, t.clientY);
  }
}, { passive: false });
GF.canvas.addEventListener('mousemove', function(e) {
  if (gs !== 'PLAYING') { hoverCol = -1; return; }
  hoverCol = pxToCol(e.clientX);
});

document.addEventListener('keydown', function(e) {
  if (gs !== 'PLAYING') {
    if (e.code === 'Space' || e.code === 'Enter') {
      if (gs === 'MENU' || gs === 'GAMEOVER' || gs === 'WON') startGame();
    }
    return;
  }
  if (!fallingGem) return;
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
    fallingGem.col = Math.max(0, fallingGem.col - 1);
  } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
    fallingGem.col = Math.min(GRID_COLS - 1, fallingGem.col + 1);
  } else if (e.code === 'Space' || e.code === 'ArrowDown' || e.code === 'KeyS') {
    commitGem(fallingGem.col);
  }
});

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (gs !== 'PLAYING') return;
  if (settleTimer > 0) settleTimer -= dt * 1000;
  for (var i = explosions.length - 1; i >= 0; i--) {
    explosions[i].t -= dt;
    if (explosions[i].t <= 0) explosions.splice(i, 1);
  }
  if (fallingGem && hoverCol >= 0) fallingGem.col = hoverCol;
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  var bg = ctx.createLinearGradient(0, 0, 0, GF.H);
  bg.addColorStop(0, COL_BG_TOP);
  bg.addColorStop(1, COL_BG_BOT);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, GF.W, GF.H);

  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  for (var i = 0; i < 30; i++) {
    var sx = (i * 73) % GF.W;
    var sy = (i * 137) % GF.H;
    ctx.fillRect(sx, sy, 2, 2);
  }

  if (gs === 'PLAYING' || gs === 'GAMEOVER' || gs === 'WON') {
    drawBoard(ctx);
    drawHUD(ctx);
  }
  if (gs === 'MENU')     drawMenu(ctx);
  if (gs === 'GAMEOVER') drawTerminal(ctx, GF.t('gameover'), '#ef4760');
  if (gs === 'WON')      drawTerminal(ctx, GF.t('won'), '#4dd0e1');
  if (tutorialOpen)      drawTutorialOverlay(ctx);
}

function drawBoard(ctx) {
  var o = boardOrigin();
  var s = o.cell;

  for (var c = 0; c < GRID_COLS; c++) {
    var hovered = (hoverCol === c && gs === 'PLAYING');
    ctx.fillStyle = hovered ? COL_LANE_HOVER : COL_LANE;
    ctx.fillRect(o.x0 + c * s, o.y0, s, o.totalH);
  }

  ctx.strokeStyle = COL_GRID_RIM;
  ctx.lineWidth = 1;
  for (var c2 = 0; c2 <= GRID_COLS; c2++) {
    ctx.beginPath();
    ctx.moveTo(o.x0 + c2 * s, o.y0);
    ctx.lineTo(o.x0 + c2 * s, o.y0 + o.totalH);
    ctx.stroke();
  }

  // Per-column cap line (shrinks on explosions)
  for (var c3 = 0; c3 < GRID_COLS; c3++) {
    var capRow = capPerCol[c3];
    var yCap = o.y0 + o.totalH - capRow * s;
    ctx.strokeStyle = COL_CAP_LINE_SOFT;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(o.x0 + c3 * s + 2, yCap);
    ctx.lineTo(o.x0 + (c3 + 1) * s - 2, yCap);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Outer frame + red death line
  ctx.strokeStyle = COL_GRID_RIM;
  ctx.lineWidth = 2;
  ctx.strokeRect(o.x0, o.y0, o.totalW, o.totalH);
  var yDeath = o.y0;
  ctx.strokeStyle = COL_CAP_LINE;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(o.x0, yDeath);
  ctx.lineTo(o.x0 + o.totalW, yDeath);
  ctx.stroke();

  // Gems
  for (var c4 = 0; c4 < GRID_COLS; c4++) {
    for (var r4 = 0; r4 < heights[c4]; r4++) {
      var color = board[c4][r4];
      if (color === -1) continue;
      drawGem(ctx, c4, r4, color, 1);
    }
  }

  // Falling gem preview
  if (gs === 'PLAYING' && fallingGem) {
    var pcol = fallingGem.col;
    var px = colToPx(pcol);
    var topY = o.y0 - s * 0.65;
    var pal = GEM_COLORS[fallingGem.color];
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(o.x0 + pcol * s, o.y0, s, o.totalH);
    drawGemPixel(ctx, px, topY, s * 0.42, pal);
    ctx.fillStyle = pal.fill;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(px - 8 * GF.S, topY + s * 0.55);
    ctx.lineTo(px + 8 * GF.S, topY + s * 0.55);
    ctx.lineTo(px, topY + s * 0.9);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawGem(ctx, c, r, color, alpha) {
  var px = colToPx(c);
  var py = rowToPx(r);
  var o = boardOrigin();
  var pal = GEM_COLORS[color];
  if (alpha != null) ctx.globalAlpha = alpha;
  drawGemPixel(ctx, px, py, o.cell * 0.42, pal);
  ctx.globalAlpha = 1;
}

function drawGemPixel(ctx, x, y, r, pal) {
  var grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.2, x, y, r * 1.2);
  grad.addColorStop(0, pal.glow);
  grad.addColorStop(0.7, pal.fill);
  grad.addColorStop(1, pal.edge);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(x, y - r);
  ctx.lineTo(x + r, y);
  ctx.lineTo(x, y + r);
  ctx.lineTo(x - r, y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = pal.edge;
  ctx.lineWidth = Math.max(1, r * 0.08);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.moveTo(x, y - r * 0.55);
  ctx.lineTo(x + r * 0.25, y - r * 0.2);
  ctx.lineTo(x, y);
  ctx.lineTo(x - r * 0.25, y - r * 0.2);
  ctx.closePath();
  ctx.fill();
}

function drawHUD(ctx) {
  var fs = GF.clamp(16 * GF.S, 12, 22);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillStyle = COL_HUD;

  ctx.textAlign = 'left';
  ctx.fillText(GF.t('drops') + ': ' + (DROP_BUDGET - dropsUsed) + '/' + DROP_BUDGET, 16 * GF.S, 14 * GF.S);

  ctx.textAlign = 'center';
  var mh = maxHeight();
  var warn = mh >= COL_HEIGHT_CAP - 2;
  ctx.fillStyle = warn ? COL_WARN : COL_HUD;
  ctx.fillText(GF.t('maxh') + ': ' + mh + '/' + COL_HEIGHT_CAP, GF.cx, 14 * GF.S);
  ctx.fillStyle = COL_HUD;

  ctx.textAlign = 'right';
  ctx.fillText(GF.t('score') + ': ' + score, GF.W - 70 * GF.S, 14 * GF.S);

  // Help button
  var hbS = GF.clamp(36 * GF.S, 28, 48);
  var hbX = GF.W - hbS - 14 * GF.S;
  var hbY = 14 * GF.S;
  helpBtn = { x: hbX, y: hbY, w: hbS, h: hbS };
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  GF.rr(ctx, hbX, hbY, hbS, hbS, 8 * GF.S);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = COL_HUD;
  ctx.font = 'bold ' + (hbS * 0.55) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', hbX + hbS / 2, hbY + hbS / 2);
  ctx.textBaseline = 'alphabetic';
}

function drawMenu(ctx) {
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(46 * GF.S, 28, 64);
  var subFs   = GF.clamp(16 * GF.S, 12, 22);
  var lineFs  = GF.clamp(14 * GF.S, 11, 18);

  ctx.shadowColor = 'rgba(77,208,225,0.6)';
  ctx.shadowBlur = 30 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t('title'), GF.cx, GF.cy - 200 * GF.S);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  ctx.font = subFs + 'px sans-serif';
  ctx.fillStyle = '#9ab';
  wrapText(ctx, GF.t('sub'), GF.cx, GF.cy - 160 * GF.S, GF.W - 60 * GF.S, subFs + 4);

  ctx.font = lineFs + 'px sans-serif';
  ctx.textAlign = 'center';
  var ty = GF.cy - 100 * GF.S;
  var lineH = lineFs + 8 * GF.S;
  ctx.fillStyle = '#ffd24d'; ty = wrapText(ctx, GF.t('tut_goal'),     GF.cx, ty, GF.W - 60 * GF.S, lineH);
  ctx.fillStyle = '#9bd9ff'; ty = wrapText(ctx, GF.t('tut_controls'), GF.cx, ty + 4 * GF.S, GF.W - 60 * GF.S, lineH);
  ctx.fillStyle = '#a0e3a0'; ty = wrapText(ctx, GF.t('tut_win'),      GF.cx, ty + 4 * GF.S, GF.W - 60 * GF.S, lineH);
  ctx.fillStyle = '#ff8aa3'; ty = wrapText(ctx, GF.t('tut_lose'),     GF.cx, ty + 4 * GF.S, GF.W - 60 * GF.S, lineH);
  ctx.fillStyle = '#c9b8ff'; ty = wrapText(ctx, GF.t('tut_tip'),      GF.cx, ty + 4 * GF.S, GF.W - 60 * GF.S, lineH);

  var btnW = GF.clamp(260 * GF.S, 180, 340);
  var btnH = GF.clamp(58 * GF.S, 44, 72);
  var btnX = GF.cx - btnW / 2;
  var btnY = Math.min(GF.cy + 140 * GF.S, GF.H - btnH - 60 * GF.S);
  menuPlayBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#4dd0e1');
  grad.addColorStop(1, '#1f8a99');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.font = 'bold ' + GF.clamp(20 * GF.S, 14, 24) + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), GF.cx, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';

  if (best > 0) {
    ctx.font = GF.clamp(13 * GF.S, 10, 16) + 'px sans-serif';
    ctx.fillStyle = '#557';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, btnY + btnH + 28 * GF.S);
  }
}

function drawTerminal(ctx, titleText, color) {
  ctx.fillStyle = 'rgba(8,8,18,0.86)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(42 * GF.S, 26, 56);
  var subFs   = GF.clamp(18 * GF.S, 12, 24);

  ctx.shadowColor = color;
  ctx.shadowBlur = 30 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(titleText, GF.cx, GF.cy - 60 * GF.S);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  ctx.font = subFs + 'px sans-serif';
  ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t('score') + ': ' + score, GF.cx, GF.cy - 20 * GF.S);
  ctx.fillText(GF.t('best')  + ': ' + best,  GF.cx, GF.cy + 6 * GF.S);

  var btnW = GF.clamp(240 * GF.S, 160, 320);
  var btnH = GF.clamp(54 * GF.S, 40, 66);
  var btnX = GF.cx - btnW / 2;
  var btnY = GF.cy + 50 * GF.S;
  retryBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 22) + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('retry'), GF.cx, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';
}

function drawTutorialOverlay(ctx) {
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var fs = GF.clamp(15 * GF.S, 11, 19);
  ctx.font = 'bold ' + GF.clamp(26 * GF.S, 18, 36) + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t('title'), GF.cx, GF.cy - 160 * GF.S);

  ctx.font = fs + 'px sans-serif';
  var ty = GF.cy - 110 * GF.S;
  var lineH = fs + 10 * GF.S;
  ctx.fillStyle = '#ffd24d'; ty = wrapText(ctx, GF.t('tut_goal'),     GF.cx, ty, GF.W - 60 * GF.S, lineH);
  ctx.fillStyle = '#9bd9ff'; ty = wrapText(ctx, GF.t('tut_controls'), GF.cx, ty + 4 * GF.S, GF.W - 60 * GF.S, lineH);
  ctx.fillStyle = '#a0e3a0'; ty = wrapText(ctx, GF.t('tut_win'),      GF.cx, ty + 4 * GF.S, GF.W - 60 * GF.S, lineH);
  ctx.fillStyle = '#ff8aa3'; ty = wrapText(ctx, GF.t('tut_lose'),     GF.cx, ty + 4 * GF.S, GF.W - 60 * GF.S, lineH);
  ctx.fillStyle = '#c9b8ff'; ty = wrapText(ctx, GF.t('tut_tip'),      GF.cx, ty + 4 * GF.S, GF.W - 60 * GF.S, lineH);

  var btnW = GF.clamp(200 * GF.S, 140, 260);
  var btnH = GF.clamp(48 * GF.S, 38, 60);
  var btnX = GF.cx - btnW / 2;
  var btnY = ty + 28 * GF.S;
  tutCloseBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#4dd0e1'); grad.addColorStop(1, '#1f8a99');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + GF.clamp(16 * GF.S, 12, 20) + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('tap_continue'), GF.cx, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  var words = String(text).split(/\s+/);
  var line = '';
  var cy = y;
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy);
      line = words[i];
      cy += lineH;
    } else {
      line = test;
    }
  }
  if (line) { ctx.fillText(line, x, cy); cy += lineH; }
  return cy;
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 1100,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'anti_match',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('anti_match_best') || '0') || 0; } catch (e) {}
    try { seenTutorial = !!localStorage.getItem('anti_match_seen_tutorial'); } catch (e) {}
    newBoard();
    nextColorIdx = rngInt(COLOR_COUNT);

    GF.persist('anti_match_run_v1',
      function () {
        return {
          gs: gs,
          board: board,
          heights: heights,
          capPerCol: capPerCol,
          dropsUsed: dropsUsed,
          score: score,
          fallingGem: fallingGem,
          nextColorIdx: nextColorIdx,
        };
      },
      function (s) {
        if (!s) return;
        if (s.board && s.heights && s.capPerCol) {
          board = s.board;
          heights = s.heights;
          capPerCol = s.capPerCol;
          dropsUsed = s.dropsUsed | 0;
          score = s.score | 0;
          fallingGem = s.fallingGem || null;
          nextColorIdx = s.nextColorIdx | 0;
          gs = s.gs || 'MENU';
        }
      }
    );
    if (gs === 'PLAYING' && !fallingGem) gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

GF.exposeState(function () {
  return {
    gs: gs,
    score: score,
    best: best,
    dropsUsed: dropsUsed,
    dropsRemaining: DROP_BUDGET - dropsUsed,
    maxHeight: maxHeight(),
    emptyCells: emptyCellsCount(),
    GRID_COLS: GRID_COLS,
    GRID_ROWS: GRID_ROWS,
    COL_HEIGHT_CAP: COL_HEIGHT_CAP,
    DROP_BUDGET: DROP_BUDGET,
    COLOR_COUNT: COLOR_COUNT,
    GEM_FALL_SPEED: GEM_FALL_SPEED,
    SETTLE_DELAY_MS: SETTLE_DELAY_MS,
    EXPLOSION_PARTICLES: EXPLOSION_PARTICLES,
    CHAIN_BONUS: CHAIN_BONUS,
    GEM_PIXEL_SIZE: GEM_PIXEL_SIZE,
  };
});

})();
