<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Battleships Skirmish</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #061726; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── LOCALISATION ─────────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Battleships Skirmish',
    sub:   'Place fleet. Sink theirs in the fewest turns.',
    play: 'PLAY', retry: 'RETRY', share: 'SHARE',
    win: 'FLEET SUNK', gameover: 'YOU SANK', budgetout: 'OUT OF SHOTS',
    turnsLeft: 'turns left', salvo: 'salvo',
    placeHdr: 'Place your fleet',
    placeShip: 'Place ship', rotate: 'ROTATE (R)', auto: 'AUTO PLACE',
    yourGrid: 'YOUR FLEET', enemyGrid: 'ENEMY WATERS',
    miss: 'miss', hit: 'HIT', sunk: 'SUNK',
    yourTurn: 'YOUR SHOT', enemyTurn: 'ENEMY SHOT',
    bonusShot: 'SALVO BONUS! +1 SHOT',
    daily: 'Daily seed',
    wonIn: 'Won in', turns: 'turns',
    longest: 'longest salvo',
    bestToday: 'Best today', best: 'Best',
  },
  ru: {
    title: 'Морской бой — суточный поединок',
    sub:   'Расставь флот. Топи врага меньшим числом ходов.',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', share: 'ПОДЕЛИТЬСЯ',
    win: 'ФЛОТ ПОТОПЛЕН', gameover: 'ВАС ПОТОПИЛИ', budgetout: 'ХОДЫ ЗАКОНЧИЛИСЬ',
    turnsLeft: 'ходов', salvo: 'залп',
    placeHdr: 'Расставьте флот',
    placeShip: 'Корабль', rotate: 'ПОВОРОТ (R)', auto: 'АВТО',
    yourGrid: 'ВАШ ФЛОТ', enemyGrid: 'ВРАЖЕСКИЕ ВОДЫ',
    miss: 'мимо', hit: 'ПОПАЛ', sunk: 'ПОТОПЛЕН',
    yourTurn: 'ВАШ ХОД', enemyTurn: 'ВРАГ СТРЕЛЯЕТ',
    bonusShot: 'ЗАЛП! +1 ВЫСТРЕЛ',
    daily: 'Сид дня',
    wonIn: 'Победа за', turns: 'ходов',
    longest: 'дольший залп',
    bestToday: 'Сегодня', best: 'Рекорд',
  },
};

var SPRITE_NAMES = [];

// ── TUNABLES (mirrors DESIGN.md) ─────────────────────────────────────────
var GRID_SIZE             = 8;
var MAX_TURNS             = 80;
var SHIPS                 = [5, 4, 3, 3, 2];
var SALVO_THRESHOLD       = 2;
var SALVO_BONUS           = 1;
var AI_HUNT_AGGRESSION    = 0.85;
var AI_RANDOM_SHOTS_FIRST = 10;
var DAILY_SEED_HASH_SALT  = 'battleships_skirmish';

// ── DAILY SEED + RNG ─────────────────────────────────────────────────────
function utcDateStr() {
  var d = new Date();
  var y = d.getUTCFullYear();
  var m = String(d.getUTCMonth() + 1).padStart(2, '0');
  var dd = String(d.getUTCDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}
function simpleHash(str) {
  var h = 2166136261;
  for (var i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = (h * 16777619) >>> 0;
  }
  return h >>> 0;
}
function makeRNG(seed) {
  var s = seed >>> 0;
  if (s === 0) s = 1;
  return function() {
    s ^= s << 13; s >>>= 0;
    s ^= s >>> 17;
    s ^= s << 5;  s >>>= 0;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';
var dailyDate = utcDateStr();
var dailySeed = simpleHash(DAILY_SEED_HASH_SALT + '_' + dailyDate);

var playerBoard = null;
var aiBoard     = null;
var playerShots = null;
var aiShots     = null;
var playerFleet = null;
var aiFleet     = null;

var turnsUsed   = 0;
var consecutiveHits = 0;
var longestSalvo    = 0;
var bonusShots      = 0;
var pendingMessage  = '';
var pendingMessageT = 0;
var phaseTurn = 'player';
var enemyShotDelay = 0;

var placeIndex     = 0;
var placeOrient    = 'h';
var hoverCell      = null;
var placementButtons = [];

var lastShot      = null;
var bestToday     = 0;
var bestAllTime   = 0;

var aiHuntTargets = [];
var aiLastHit     = null;

var L = {};
var shareBtnRect = null;

// ── HELPERS ──────────────────────────────────────────────────────────────
function emptyBoard() {
  var b = [];
  for (var r = 0; r < GRID_SIZE; r++) {
    b.push([]);
    for (var c = 0; c < GRID_SIZE; c++) b[r].push({ ship: null });
  }
  return b;
}
function emptyShots() {
  var s = [];
  for (var r = 0; r < GRID_SIZE; r++) {
    s.push([]);
    for (var c = 0; c < GRID_SIZE; c++) s[r].push('unknown');
  }
  return s;
}
function shipsAlive(fleet) {
  var n = 0;
  for (var i = 0; i < fleet.length; i++) if (fleet[i].hits < fleet[i].len) n++;
  return n;
}
function placeShipOnBoard(board, fleet, len, r, c, orient, shipIdx) {
  var cells = [];
  for (var i = 0; i < len; i++) {
    var rr = r + (orient === 'v' ? i : 0);
    var cc = c + (orient === 'h' ? i : 0);
    if (rr < 0 || rr >= GRID_SIZE || cc < 0 || cc >= GRID_SIZE) return null;
    if (board[rr][cc].ship !== null) return null;
    cells.push({ r: rr, c: cc });
  }
  for (var k = 0; k < cells.length; k++) board[cells[k].r][cells[k].c].ship = shipIdx;
  fleet[shipIdx] = { cells: cells, hits: 0, len: len, sunk: false };
  return true;
}
function autoPlaceFleet(board, fleet, lengths, rng) {
  for (var i = 0; i < lengths.length; i++) {
    var tries = 0;
    while (tries < 500) {
      tries++;
      var orient = rng() < 0.5 ? 'h' : 'v';
      var maxR = orient === 'v' ? GRID_SIZE - lengths[i] : GRID_SIZE - 1;
      var maxC = orient === 'h' ? GRID_SIZE - lengths[i] : GRID_SIZE - 1;
      var r = Math.floor(rng() * (maxR + 1));
      var c = Math.floor(rng() * (maxC + 1));
      if (placeShipOnBoard(board, fleet, lengths[i], r, c, orient, i)) break;
    }
  }
}
function canPlaceAt(board, len, r, c, orient) {
  for (var i = 0; i < len; i++) {
    var rr = r + (orient === 'v' ? i : 0);
    var cc = c + (orient === 'h' ? i : 0);
    if (rr < 0 || rr >= GRID_SIZE || cc < 0 || cc >= GRID_SIZE) return false;
    if (board[rr][cc].ship !== null) return false;
  }
  return true;
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  dailyDate = utcDateStr();
  dailySeed = simpleHash(DAILY_SEED_HASH_SALT + '_' + dailyDate);

  playerBoard = emptyBoard();
  aiBoard     = emptyBoard();
  playerShots = emptyShots();
  aiShots     = emptyShots();
  playerFleet = [];
  aiFleet     = [];

  var aiRng = makeRNG(dailySeed);
  autoPlaceFleet(aiBoard, aiFleet, SHIPS, aiRng);

  turnsUsed = 0;
  consecutiveHits = 0;
  longestSalvo = 0;
  bonusShots = 0;
  pendingMessage = '';
  pendingMessageT = 0;
  phaseTurn = 'player';
  enemyShotDelay = 0;
  placeIndex = 0;
  placeOrient = 'h';
  hoverCell = null;
  lastShot = null;
  aiHuntTargets = [];
  aiLastHit = null;

  loadBest();
  gs = 'PLACEMENT';
}

function autoPlacePlayer() {
  var localRng = makeRNG((Math.random() * 0xFFFFFFFF) >>> 0);
  playerBoard = emptyBoard();
  playerFleet = [];
  autoPlaceFleet(playerBoard, playerFleet, SHIPS, localRng);
  placeIndex = SHIPS.length;
  beginCombat();
}

function beginCombat() {
  phaseTurn = 'player';
  bonusShots = 0;
  consecutiveHits = 0;
  pendingMessage = STRINGS[GF.lang || 'en'].yourTurn;
  pendingMessageT = 1.0;
  gs = 'PLAYING';
}

function endRound(state) {
  gs = state;
  if (state === 'WIN') saveBest(turnsUsed);
  pendingMessage = '';
  pendingMessageT = 0;
  GF.gameEnded();
}

function loadBest() {
  try {
    var k = 'battleships_skirmish_best_' + dailyDate;
    bestToday = parseInt(localStorage.getItem(k) || '0') || 0;
    bestAllTime = parseInt(localStorage.getItem('battleships_skirmish_pb_alltime') || '0') || 0;
  } catch (e) {}
}
function saveBest(turns) {
  try {
    var k = 'battleships_skirmish_best_' + dailyDate;
    if (bestToday === 0 || turns < bestToday) { bestToday = turns; localStorage.setItem(k, String(turns)); }
    if (bestAllTime === 0 || turns < bestAllTime) { bestAllTime = turns; localStorage.setItem('battleships_skirmish_pb_alltime', String(turns)); }
  } catch (e) {}
}

// ── INPUT ────────────────────────────────────────────────────────────────
window.addEventListener('keydown', function(e) {
  if (e.code === 'KeyR' || e.code === 'Space') {
    if (gs === 'PLACEMENT') placeOrient = (placeOrient === 'h' ? 'v' : 'h');
  }
});

function attachInput() {
  var cv = GF.canvas;
  cv.addEventListener('click', onTap);
  cv.addEventListener('touchstart', function(e) {
    if (!e.changedTouches || !e.changedTouches.length) return;
    var t = e.changedTouches[0];
    onTap({ clientX: t.clientX, clientY: t.clientY, _touch: true });
  }, { passive: false });
  cv.addEventListener('mousemove', function(e) {
    if (gs !== 'PLACEMENT') { hoverCell = null; return; }
    hoverCell = pickPlayerCell(e.clientX, e.clientY);
  });
}

function onTap(e) {
  // Share button (only on terminal screens)
  if (shareBtnRect && (gs === 'WIN' || gs === 'GAMEOVER')) {
    var b = shareBtnRect;
    if (e.clientX >= b.x && e.clientX <= b.x + b.w && e.clientY >= b.y && e.clientY <= b.y + b.h) {
      doShare();
      return;
    }
  }
  if (gs === 'PLACEMENT') {
    for (var i = 0; i < placementButtons.length; i++) {
      var pb = placementButtons[i];
      if (e.clientX >= pb.x && e.clientX <= pb.x + pb.w && e.clientY >= pb.y && e.clientY <= pb.y + pb.h) { pb.fn(); return; }
    }
    var cell = pickPlayerCell(e.clientX, e.clientY);
    if (cell && placeIndex < SHIPS.length) {
      var len = SHIPS[placeIndex];
      if (canPlaceAt(playerBoard, len, cell.r, cell.c, placeOrient)) {
        placeShipOnBoard(playerBoard, playerFleet, len, cell.r, cell.c, placeOrient, placeIndex);
        placeIndex++;
        if (placeIndex >= SHIPS.length) beginCombat();
      }
    }
  } else if (gs === 'PLAYING' && phaseTurn === 'player') {
    var ec = pickEnemyCell(e.clientX, e.clientY);
    if (ec) playerFire(ec.r, ec.c);
  }
}

function pickPlayerCell(x, y) {
  if (!L.player) return null;
  var g = L.player;
  if (x < g.x || x > g.x + g.w || y < g.y || y > g.y + g.w) return null;
  var c = Math.floor((x - g.x) / g.cell);
  var r = Math.floor((y - g.y) / g.cell);
  if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return null;
  return { r: r, c: c };
}
function pickEnemyCell(x, y) {
  if (!L.enemy) return null;
  var g = L.enemy;
  if (x < g.x || x > g.x + g.w || y < g.y || y > g.y + g.w) return null;
  var c = Math.floor((x - g.x) / g.cell);
  var r = Math.floor((y - g.y) / g.cell);
  if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return null;
  if (playerShots[r][c] !== 'unknown') return null;
  return { r: r, c: c };
}

// ── COMBAT ───────────────────────────────────────────────────────────────
function playerFire(r, c) {
  if (playerShots[r][c] !== 'unknown') return;
  turnsUsed++;
  var cell = aiBoard[r][c];
  if (cell.ship !== null) {
    playerShots[r][c] = 'hit';
    var ship = aiFleet[cell.ship];
    ship.hits++;
    if (L.enemy) GF.spawnParticles(L.enemy.x + (c + 0.5) * L.enemy.cell, L.enemy.y + (r + 0.5) * L.enemy.cell, '#ff5040', 14);
    GF.setShake(0.6);
    consecutiveHits++;
    if (consecutiveHits > longestSalvo) longestSalvo = consecutiveHits;
    if (ship.hits >= ship.len) {
      ship.sunk = true;
      pendingMessage = (GF.t('sunk') + '!').toUpperCase();
      pendingMessageT = 1.4;
    } else {
      pendingMessage = GF.t('hit') + '!';
      pendingMessageT = 0.9;
    }
    if (consecutiveHits >= SALVO_THRESHOLD) {
      bonusShots += SALVO_BONUS;
      pendingMessage = GF.t('bonusShot');
      pendingMessageT = 1.4;
      GF.spawnFloat(GF.cx, GF.cy - 60 * GF.S, '+1', '#ffd54a');
    }
    lastShot = { r: r, c: c, hit: true, t: 0.6 };
  } else {
    playerShots[r][c] = 'miss';
    if (L.enemy) GF.spawnParticles(L.enemy.x + (c + 0.5) * L.enemy.cell, L.enemy.y + (r + 0.5) * L.enemy.cell, '#7fb8d4', 8);
    consecutiveHits = 0;
    lastShot = { r: r, c: c, hit: false, t: 0.6 };
    pendingMessage = GF.t('miss');
    pendingMessageT = 0.6;
  }

  if (shipsAlive(aiFleet) === 0) { endRound('WIN'); return; }
  if (turnsUsed >= MAX_TURNS && shipsAlive(aiFleet) > 0) { endRound('GAMEOVER'); return; }

  if (bonusShots > 0) { bonusShots--; return; }

  phaseTurn = 'enemy';
  enemyShotDelay = 0.55;
}

function aiFire() {
  var r = -1, c = -1;
  var avail = [];
  for (var rr = 0; rr < GRID_SIZE; rr++) for (var cc = 0; cc < GRID_SIZE; cc++) {
    if (aiShots[rr][cc] === 'unknown') avail.push({ r: rr, c: cc });
  }
  if (avail.length === 0) return;

  if (aiHuntTargets.length > 0 && Math.random() < AI_HUNT_AGGRESSION) {
    while (aiHuntTargets.length > 0) {
      var t = aiHuntTargets.shift();
      if (t.r >= 0 && t.r < GRID_SIZE && t.c >= 0 && t.c < GRID_SIZE && aiShots[t.r][t.c] === 'unknown') {
        r = t.r; c = t.c; break;
      }
    }
  }
  if (r < 0) {
    var pool = avail;
    if (turnsUsed >= AI_RANDOM_SHOTS_FIRST) {
      var checker = avail.filter(function(p) { return ((p.r + p.c) & 1) === 0; });
      if (checker.length > 0) pool = checker;
    }
    var pick = pool[Math.floor(Math.random() * pool.length)];
    r = pick.r; c = pick.c;
  }

  var cell = playerBoard[r][c];
  if (cell.ship !== null) {
    aiShots[r][c] = 'hit';
    var ship = playerFleet[cell.ship];
    ship.hits++;
    if (L.player) GF.spawnParticles(L.player.x + (c + 0.5) * L.player.cell, L.player.y + (r + 0.5) * L.player.cell, '#ff5040', 14);
    GF.setShake(0.5);
    if (ship.hits >= ship.len) {
      ship.sunk = true;
      aiHuntTargets = [];
      aiLastHit = null;
    } else {
      aiHuntTargets.push({ r: r - 1, c: c });
      aiHuntTargets.push({ r: r + 1, c: c });
      aiHuntTargets.push({ r: r,     c: c - 1 });
      aiHuntTargets.push({ r: r,     c: c + 1 });
      aiLastHit = { r: r, c: c };
    }
  } else {
    aiShots[r][c] = 'miss';
  }

  if (shipsAlive(playerFleet) === 0 && shipsAlive(aiFleet) > 0) { endRound('GAMEOVER'); return; }
  phaseTurn = 'player';
  pendingMessage = STRINGS[GF.lang || 'en'].yourTurn;
  pendingMessageT = 0.6;
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (pendingMessageT > 0) pendingMessageT -= dt;
  if (lastShot && lastShot.t > 0) lastShot.t -= dt;
  if (gs === 'PLAYING' && phaseTurn === 'enemy') {
    enemyShotDelay -= dt;
    if (enemyShotDelay <= 0) aiFire();
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  var grd = ctx.createLinearGradient(0, 0, 0, GF.H);
  grd.addColorStop(0, '#0a2238');
  grd.addColorStop(1, '#04111c');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, GF.W, GF.H);
  drawWaves(ctx);

  shareBtnRect = null;

  if (gs === 'PLACEMENT') { computeLayout(true); drawPlacement(ctx); return; }
  if (gs === 'PLAYING' || gs === 'WIN' || gs === 'GAMEOVER') {
    computeLayout(false);
    drawCombat(ctx);
  }
  if (gs === 'MENU') {
    GF.drawOverlay({
      title: GF.t('title'),
      sub:   GF.t('sub'),
      sub2:  GF.t('daily') + ': ' + dailyDate,
      btnText: GF.t('play'),
      btnFn: startGame,
      bestText: bestAllTime > 0 ? (GF.t('best') + ': ' + bestAllTime + ' ' + GF.t('turns')) : null,
    });
  }
  if (gs === 'WIN') {
    var subTxt = GF.t('wonIn') + ' ' + turnsUsed + ' ' + GF.t('turns') + ' • ' + GF.t('longest') + ': ' + longestSalvo;
    GF.drawOverlay({
      title: GF.t('win'),
      sub:   subTxt,
      sub2:  GF.t('daily') + ': ' + dailyDate,
      btnText: GF.t('retry'),
      btnFn: startGame,
      bestText: bestToday > 0 ? (GF.t('bestToday') + ': ' + bestToday + ' ' + GF.t('turns')) : null,
    });
    drawShareBtn(ctx);
  }
  if (gs === 'GAMEOVER') {
    var why = (turnsUsed >= MAX_TURNS && shipsAlive(playerFleet) > 0) ? GF.t('budgetout') : GF.t('gameover');
    GF.drawOverlay({
      title: why,
      sub:   GF.t('turns') + ': ' + turnsUsed,
      sub2:  GF.t('daily') + ': ' + dailyDate,
      btnText: GF.t('retry'),
      btnFn: startGame,
      bestText: bestToday > 0 ? (GF.t('bestToday') + ': ' + bestToday + ' ' + GF.t('turns')) : null,
    });
    drawShareBtn(ctx);
  }
}

function drawWaves(ctx) {
  ctx.strokeStyle = 'rgba(120, 180, 220, 0.06)';
  ctx.lineWidth = 1;
  var t = performance.now() / 4500;
  for (var y = 0; y < GF.H; y += 28) {
    ctx.beginPath();
    for (var x = 0; x <= GF.W; x += 18) {
      var ny = y + Math.sin((x * 0.012) + t + y * 0.05) * 4;
      if (x === 0) ctx.moveTo(x, ny); else ctx.lineTo(x, ny);
    }
    ctx.stroke();
  }
}

function computeLayout(placement) {
  var W = GF.W, H = GF.H;
  var portrait = H > W;
  var pad = Math.max(12, Math.min(W, H) * 0.025);

  if (placement) {
    var avail = Math.min(W - pad * 2, H * 0.62);
    var size = Math.min(avail, 480);
    var cell = Math.floor(size / GRID_SIZE);
    size = cell * GRID_SIZE;
    var x = Math.floor((W - size) / 2);
    var y = Math.floor((H - size) / 2 + (portrait ? -30 : -10));
    L.player = { x: x, y: y, w: size, cell: cell, label: GF.t('yourGrid') };
    L.enemy = null;
    return;
  }

  if (portrait) {
    var totalH = H - pad * 4;
    var maxW = W - pad * 2;
    var size = Math.min(maxW, Math.floor(totalH / 2.1));
    var cell = Math.floor(size / GRID_SIZE);
    size = cell * GRID_SIZE;
    var bx = Math.floor((W - size) / 2);
    var topY = Math.max(pad * 3.0, Math.floor((H - size * 2 - pad * 2) / 2));
    L.enemy  = { x: bx, y: topY,                 w: size, cell: cell, label: GF.t('enemyGrid') };
    L.player = { x: bx, y: topY + size + pad * 2, w: size, cell: cell, label: GF.t('yourGrid') };
  } else {
    var maxH = H - pad * 4;
    var perW = (W - pad * 4) / 2;
    var size = Math.min(maxH, perW);
    var cell = Math.floor(size / GRID_SIZE);
    size = cell * GRID_SIZE;
    var totalW = size * 2 + pad * 2;
    var x1 = Math.floor((W - totalW) / 2);
    var y1 = Math.floor((H - size) / 2 + pad * 0.6);
    L.player = { x: x1,                  y: y1, w: size, cell: cell, label: GF.t('yourGrid') };
    L.enemy  = { x: x1 + size + pad * 2, y: y1, w: size, cell: cell, label: GF.t('enemyGrid') };
  }
}

function drawCombat(ctx) {
  drawHUD(ctx);
  ctx.fillStyle = '#a3c8e0';
  var fs = Math.max(11, Math.min(18, L.player.cell * 0.42));
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(L.player.label, L.player.x, L.player.y - 6);
  ctx.fillText(L.enemy.label,  L.enemy.x,  L.enemy.y - 6);
  drawPlayerGrid(ctx, L.player);
  drawEnemyGrid(ctx, L.enemy);
  if (pendingMessageT > 0 && pendingMessage) drawBanner(ctx, pendingMessage, pendingMessageT);
}

function drawPlacement(ctx) {
  var fs = Math.max(14, Math.min(28, GF.H * 0.035));
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t('placeHdr'), GF.cx, L.player.y - GF.H * 0.07);
  var sub = GF.t('placeShip') + ' ' + (placeIndex + 1) + '/' + SHIPS.length + ' (len ' + (SHIPS[placeIndex] || '-') + ')';
  ctx.fillStyle = '#9bd';
  ctx.font = Math.max(11, fs * 0.65) + 'px sans-serif';
  ctx.fillText(sub, GF.cx, L.player.y - GF.H * 0.04);

  drawPlayerGrid(ctx, L.player);

  if (hoverCell && placeIndex < SHIPS.length) {
    var len = SHIPS[placeIndex];
    var ok = canPlaceAt(playerBoard, len, hoverCell.r, hoverCell.c, placeOrient);
    var col = ok ? 'rgba(80, 220, 150, 0.45)' : 'rgba(240, 80, 80, 0.45)';
    for (var i = 0; i < len; i++) {
      var rr = hoverCell.r + (placeOrient === 'v' ? i : 0);
      var cc = hoverCell.c + (placeOrient === 'h' ? i : 0);
      if (rr >= 0 && rr < GRID_SIZE && cc >= 0 && cc < GRID_SIZE) {
        ctx.fillStyle = col;
        ctx.fillRect(L.player.x + cc * L.player.cell + 1, L.player.y + rr * L.player.cell + 1, L.player.cell - 2, L.player.cell - 2);
      }
    }
  }

  placementButtons = [];
  var btnFs = Math.max(12, Math.min(20, GF.H * 0.025));
  var btnH = btnFs * 2.6;
  var btnW = Math.max(140, GF.W * 0.22);
  var bx1 = GF.cx - btnW - 12;
  var bx2 = GF.cx + 12;
  var by  = L.player.y + L.player.w + GF.H * 0.04;
  drawBtn(ctx, bx1, by, btnW, btnH, GF.t('rotate'), function() { placeOrient = (placeOrient === 'h' ? 'v' : 'h'); });
  drawBtn(ctx, bx2, by, btnW, btnH, GF.t('auto'),   function() { autoPlacePlayer(); });
}

function drawBtn(ctx, x, y, w, h, label, fn) {
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#1f8b50');
  GF.rr(ctx, x, y, w, h, h / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = '#fff';
  var fs = Math.max(11, h * 0.4);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2);
  ctx.textBaseline = 'alphabetic';
  placementButtons.push({ x: x, y: y, w: w, h: h, fn: fn });
}

function drawPlayerGrid(ctx, g) {
  ctx.fillStyle = 'rgba(20, 50, 80, 0.45)';
  ctx.fillRect(g.x, g.y, g.w, g.w);
  for (var r = 0; r < GRID_SIZE; r++) {
    for (var c = 0; c < GRID_SIZE; c++) {
      var cx = g.x + c * g.cell, cy = g.y + r * g.cell;
      ctx.strokeStyle = 'rgba(120, 180, 220, 0.25)';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx + 0.5, cy + 0.5, g.cell - 1, g.cell - 1);
      if (playerBoard && playerBoard[r][c].ship !== null) {
        var ship = playerFleet[playerBoard[r][c].ship];
        var sunk = ship && ship.sunk;
        ctx.fillStyle = sunk ? '#5a4040' : '#7e8d9d';
        ctx.fillRect(cx + 2, cy + 2, g.cell - 4, g.cell - 4);
        ctx.fillStyle = sunk ? '#382828' : '#465562';
        ctx.fillRect(cx + g.cell / 2 - 2, cy + g.cell / 2 - 2, 4, 4);
      }
      if (gs !== 'PLACEMENT' && aiShots && aiShots[r][c] !== 'unknown') {
        if (aiShots[r][c] === 'hit') {
          ctx.fillStyle = '#ff5040';
          drawX(ctx, cx + g.cell / 2, cy + g.cell / 2, g.cell * 0.32);
        } else {
          ctx.fillStyle = 'rgba(180, 220, 255, 0.55)';
          ctx.beginPath(); ctx.arc(cx + g.cell / 2, cy + g.cell / 2, Math.max(2, g.cell * 0.16), 0, Math.PI * 2); ctx.fill();
        }
      }
    }
  }
  ctx.strokeStyle = '#5fa0c8';
  ctx.lineWidth = 2;
  ctx.strokeRect(g.x + 0.5, g.y + 0.5, g.w - 1, g.w - 1);
}

function drawEnemyGrid(ctx, g) {
  ctx.fillStyle = 'rgba(40, 20, 30, 0.55)';
  ctx.fillRect(g.x, g.y, g.w, g.w);
  for (var r = 0; r < GRID_SIZE; r++) {
    for (var c = 0; c < GRID_SIZE; c++) {
      var cx = g.x + c * g.cell, cy = g.y + r * g.cell;
      ctx.strokeStyle = 'rgba(220, 140, 140, 0.25)';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx + 0.5, cy + 0.5, g.cell - 1, g.cell - 1);
      var s = playerShots ? playerShots[r][c] : 'unknown';
      if (s === 'hit') {
        var sunk = aiBoard[r][c].ship !== null && aiFleet[aiBoard[r][c].ship].sunk;
        ctx.fillStyle = sunk ? '#7a3030' : '#a04848';
        ctx.fillRect(cx + 2, cy + 2, g.cell - 4, g.cell - 4);
        ctx.fillStyle = '#ffd54a';
        drawX(ctx, cx + g.cell / 2, cy + g.cell / 2, g.cell * 0.34);
      } else if (s === 'miss') {
        ctx.fillStyle = 'rgba(140, 200, 240, 0.55)';
        ctx.beginPath(); ctx.arc(cx + g.cell / 2, cy + g.cell / 2, Math.max(2, g.cell * 0.16), 0, Math.PI * 2); ctx.fill();
      }
    }
  }
  if (gs === 'PLAYING' && phaseTurn === 'player' && lastShot && lastShot.t > 0) {
    var a = Math.max(0, lastShot.t / 0.6);
    ctx.strokeStyle = 'rgba(255, 213, 74,' + a + ')';
    ctx.lineWidth = 3;
    ctx.strokeRect(g.x + lastShot.c * g.cell + 1.5, g.y + lastShot.r * g.cell + 1.5, g.cell - 3, g.cell - 3);
  }
  ctx.strokeStyle = '#c87070';
  ctx.lineWidth = 2;
  ctx.strokeRect(g.x + 0.5, g.y + 0.5, g.w - 1, g.w - 1);
}

function drawX(ctx, x, y, r) {
  ctx.lineWidth = Math.max(2, r * 0.35);
  ctx.lineCap = 'round';
  ctx.strokeStyle = ctx.fillStyle;
  ctx.beginPath();
  ctx.moveTo(x - r, y - r); ctx.lineTo(x + r, y + r);
  ctx.moveTo(x + r, y - r); ctx.lineTo(x - r, y + r);
  ctx.stroke();
}

function drawHUD(ctx) {
  var fs = Math.max(13, Math.min(20, GF.H * 0.024));
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  var pad = Math.max(8, GF.W * 0.012);
  ctx.fillText(GF.t('turnsLeft') + ': ' + Math.max(0, MAX_TURNS - turnsUsed), pad, pad);
  ctx.fillStyle = consecutiveHits >= SALVO_THRESHOLD ? '#ffd54a' : '#9bd';
  ctx.fillText(GF.t('salvo') + ': ' + consecutiveHits, pad, pad + fs * 1.3);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#7faecc';
  ctx.fillText(GF.t('daily') + ': ' + dailyDate, GF.W - pad, pad);
  if (bestToday > 0) {
    ctx.fillStyle = '#bcd';
    ctx.fillText(GF.t('bestToday') + ': ' + bestToday, GF.W - pad, pad + fs * 1.3);
  }
}

function drawBanner(ctx, txt, t) {
  var alpha = Math.min(1, t * 1.6);
  var fs = Math.max(16, Math.min(38, GF.H * 0.045));
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var w = ctx.measureText(txt).width + fs * 1.4;
  var h = fs * 1.8;
  var x = GF.cx - w / 2, y = GF.H * 0.08;
  ctx.fillStyle = 'rgba(8, 18, 30,' + (alpha * 0.85) + ')';
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fill();
  ctx.fillStyle = 'rgba(255, 213, 74,' + alpha + ')';
  ctx.fillText(txt, GF.cx, y + h / 2);
  ctx.textBaseline = 'alphabetic';
}

function drawShareBtn(ctx) {
  var btnW = Math.max(160, Math.min(320, 240 * GF.S));
  var btnH = Math.max(40, Math.min(66, 52 * GF.S));
  var x = GF.cx - btnW / 2;
  var y = GF.cy + 20 * GF.S + btnH + 16 * GF.S;
  var grad = ctx.createLinearGradient(x, y, x, y + btnH);
  grad.addColorStop(0, '#4dd0e1'); grad.addColorStop(1, '#2aa0b0');
  GF.rr(ctx, x, y, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad; ctx.fill();
  var fs = Math.max(12, Math.min(22, 16 * GF.S));
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.fillStyle = '#0a1a24'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('share'), GF.cx, y + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  shareBtnRect = { x: x, y: y, w: btnW, h: btnH };
}

function doShare() {
  var primary = (gs === 'WIN') ? (turnsUsed + ' turns') : (turnsUsed + '/' + MAX_TURNS);
  var secondary = 'Longest salvo: ' + longestSalvo;
  var footer = 'Daily seed ' + dailyDate;
  GF.shareCard({
    gameTitle: 'Battleships Skirmish',
    primaryLabel: gs === 'WIN' ? 'I won in' : 'I lasted',
    primaryStat: primary,
    secondaryStat: secondary,
    footer: footer,
    slug: 'battleships_skirmish',
    bg: { from: '#04111c', mid: '#0a2238', to: '#04111c' },
    accent: '#4dd0e1',
  }).then(function(blob) {
    GF.shareBlob(blob, {
      fileName: 'battleships-' + dailyDate + '.png',
      title: "Battleships Skirmish — Tim's Game Lab",
      text: 'Beat my Battleships time: https://game-factory.tech/p/battleships_skirmish',
    });
  });
}

window._jumpLevel = function() {
  startGame();
  autoPlacePlayer();
  var safety = 0;
  while (gs === 'PLAYING' && safety < 25) {
    safety++;
    var fired = false;
    outer: for (var r = 0; r < GRID_SIZE; r++) {
      for (var c = 0; c < GRID_SIZE; c++) {
        if (playerShots[r][c] === 'unknown') { playerFire(r, c); fired = true; break outer; }
      }
    }
    if (!fired) break;
    if (gs === 'PLAYING' && phaseTurn === 'enemy') aiFire();
    if (safety >= 14) break;
  }
};

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'battleships_skirmish',
  onReady: function() {
    loadBest();
    attachInput();
    gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

GF.exposeState(function() {
  return {
    gs: gs,
    turnsUsed: turnsUsed,
    turnsLeft: MAX_TURNS - turnsUsed,
    consecutiveHits: consecutiveHits,
    longestSalvo: longestSalvo,
    bonusShots: bonusShots,
    playerShipsAlive: playerFleet ? shipsAlive(playerFleet) : 0,
    aiShipsAlive: aiFleet ? shipsAlive(aiFleet) : 0,
    placeIndex: placeIndex,
    phaseTurn: phaseTurn,
    dailyDate: dailyDate,
    dailySeed: dailySeed,
    MAX_TURNS: MAX_TURNS,
    GRID_SIZE: GRID_SIZE,
    SHIPS: SHIPS,
    SALVO_THRESHOLD: SALVO_THRESHOLD,
    SALVO_BONUS: SALVO_BONUS,
    AI_HUNT_AGGRESSION: AI_HUNT_AGGRESSION,
    AI_RANDOM_SHOTS_FIRST: AI_RANDOM_SHOTS_FIRST,
    DAILY_SEED_HASH_SALT: DAILY_SEED_HASH_SALT,
  };
});

})();
</script>
