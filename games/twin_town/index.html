// ── RNG ─────────────────────────────────────────────────────────────────────
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function rRange(lo, hi) { return lo + rng() * (hi - lo); }
function rInt(lo, hi) { return Math.floor(rRange(lo, hi + 1)); }
function rPick(arr) { return arr[Math.floor(rng() * arr.length)]; }

// ── COLOR HELPERS ──────────────────────────────────────────────────────────
function shadeHex(hex, amt) {
  if (!hex || hex[0] !== '#') return hex || '#cccccc';
  var n = parseInt(hex.slice(1), 16);
  var r = Math.max(0, Math.min(255, ((n>>16)&255) + amt));
  var g = Math.max(0, Math.min(255, ((n>>8)&255) + amt));
  var b = Math.max(0, Math.min(255, (n&255) + amt));
  return '#' + ((1<<24) + (r<<16) + (g<<8) + b).toString(16).slice(1);
}
function withA(hex, a) {
  var n = parseInt(hex.slice(1), 16);
  return 'rgba(' + ((n>>16)&255) + ',' + ((n>>8)&255) + ',' + (n&255) + ',' + a + ')';
}

// ── SCENE MODEL GENERATION (normalized 0..100 box) ─────────────────────────
function genScene(seed, theme) {
  var R = mulberry32(seed);
  function rr(lo, hi) { return lo + R() * (hi - lo); }
  function ri(lo, hi) { return Math.floor(lo + R() * (hi - lo + 1)); }
  function rp(arr) { return arr[Math.floor(R() * arr.length)]; }
  var objs = [];
  var acc = theme.accents;

  objs.push({ kind:'sun_moon', x: rr(12, 88), y: rr(10, 22), size: rr(7, 10),
    color: theme.night ? '#fdf3c0' : '#fff4cf', variant: theme.night ? 1 : 0 });

  var nClouds = ri(2, 4);
  for (var i = 0; i < nClouds; i++) {
    objs.push({ kind:'cloud', x: rr(8, 92), y: rr(8, 30), size: rr(8, 15),
      color: theme.night ? '#cfd6ec' : '#ffffff', variant: ri(0, 2), flip: R() < 0.5 ? -1 : 1 });
  }
  var nBirds = ri(1, 3);
  for (var i = 0; i < nBirds; i++) {
    objs.push({ kind:'bird', x: rr(15, 85), y: rr(14, 34), size: rr(2.2, 3.6), color: theme.night ? '#b8c0e0' : '#5a5a6a' });
  }

  var nHouses = ri(3, 4);
  var hx = rr(8, 16), gap = (84 - hx) / nHouses;
  for (var i = 0; i < nHouses; i++) {
    var hw = rr(13, 19), hh = rr(16, 26);
    objs.push({ kind:'house', x: hx + i * gap + gap * 0.1, y: 70, size: hw,
      color: rp(acc), roofColor: shadeHex(rp(acc), -30), h: hh, variant: ri(0, 2), roofType: ri(0, 1) });
    hx += rr(-1.5, 1.5);
  }

  var nWin = ri(3, 5);
  for (var i = 0; i < nWin; i++) {
    objs.push({ kind:'window', x: rr(14, 82), y: rr(56, 66), size: rr(2.6, 3.8),
      color: theme.night ? rp(['#ffd968','#ffe89a','#1b2740']) : '#bfe3f2', variant: ri(0, 1),
      lit: theme.night ? (R() < 0.6) : false });
  }
  var nDoor = ri(1, 2);
  for (var i = 0; i < nDoor; i++) {
    objs.push({ kind:'door', x: rr(16, 80), y: rr(64, 70), size: rr(3.0, 4.2), color: rp(acc), variant: ri(0, 1) });
  }

  var nAwn = ri(1, 3);
  for (var i = 0; i < nAwn; i++) {
    objs.push({ kind:'awning', x: rr(18, 80), y: rr(60, 68), size: rr(6, 10), color: rp(acc), variant: ri(0, 1) });
  }

  if (R() < 0.8) objs.push({ kind:'flag', x: rr(20, 80), y: rr(48, 58), size: rr(5, 8), color: rp(acc), flip: R() < 0.5 ? -1 : 1 });
  if (R() < 0.7) objs.push({ kind:'sign', x: rr(18, 82), y: rr(70, 78), size: rr(4, 6), color: rp(acc), variant: ri(0, 2) });

  var nTrees = ri(2, 4);
  for (var i = 0; i < nTrees; i++) {
    objs.push({ kind:'tree', x: rr(8, 92), y: rr(72, 82), size: rr(6, 11),
      color: theme.snow ? '#dfeee0' : (theme.id==='autumn' ? rp(['#c1452f','#d97b2b','#e7b53f']) : rp(['#3a8c4f','#4fa05c','#2f7a42'])),
      trunk:'#7a5236', variant: ri(0, 2) });
  }
  var nBush = ri(2, 4);
  for (var i = 0; i < nBush; i++) {
    objs.push({ kind:'bush', x: rr(10, 90), y: rr(82, 88), size: rr(3.5, 6),
      color: theme.snow ? '#e6f0e8' : '#4f9a55' });
  }
  if (R() < 0.7) objs.push({ kind:'planter', x: rr(14, 86), y: rr(84, 89), size: rr(3, 5), color: rp(acc) });

  var nLamp = ri(1, 3);
  for (var i = 0; i < nLamp; i++) {
    objs.push({ kind:'lamp', x: rr(12, 88), y: rr(78, 86), size: rr(7, 10), color:'#4a4a58',
      glow: theme.night ? '#ffdf80' : '#fff2c0', on: theme.night });
  }
  var nBarrel = ri(1, 3);
  for (var i = 0; i < nBarrel; i++) {
    objs.push({ kind: R() < 0.5 ? 'barrel' : 'crate', x: rr(12, 88), y: rr(84, 90), size: rr(3, 4.6),
      color: rp(['#9a6a3a','#b07d44','#8a5a30']) });
  }

  objs.sort(function(a, b) {
    var sa = (a.kind==='sun_moon'||a.kind==='cloud'||a.kind==='bird') ? -1000 + a.y : a.y;
    var sb = (b.kind==='sun_moon'||b.kind==='cloud'||b.kind==='bird') ? -1000 + b.y : b.y;
    return sa - sb;
  });
  for (var i = 0; i < objs.length; i++) objs[i].id = i;
  return { objs: objs, theme: theme };
}

function cloneObj(o) { var c = {}; for (var k in o) c[k] = o[k]; return c; }
function cloneModel(m) {
  var objs = [];
  for (var i = 0; i < m.objs.length; i++) objs.push(cloneObj(m.objs[i]));
  return { objs: objs, theme: m.theme };
}

// ── MUTATION ENGINE ─────────────────────────────────────────────────────────
function mutateScene(modelA, n, lvl) {
  var modelB = cloneModel(modelA);
  var theme = modelA.theme;
  var idxs = [];
  for (var i = 0; i < modelB.objs.length; i++) idxs.push(i);
  for (var i = idxs.length - 1; i > 0; i--) { var j = Math.floor(rng() * (i + 1)); var t = idxs[i]; idxs[i] = idxs[j]; idxs[j] = t; }

  var diffList = [];
  var usedRegions = [];
  var types;
  if (lvl <= 1) types = ['recolor','remove','add'];
  else if (lvl <= 3) types = ['recolor','remove','add','move'];
  else types = ['recolor','remove','add','move','resize','flip'];

  var pi = 0;
  while (diffList.length < n && pi < idxs.length) {
    var oi = idxs[pi++];
    var o = modelB.objs[oi];
    var ox = o.x, oy = o.y;
    var tooClose = false;
    for (var r = 0; r < usedRegions.length; r++) {
      var dx = usedRegions[r].x - ox, dy = usedRegions[r].y - oy;
      if (dx*dx + dy*dy < 9*9) { tooClose = true; break; }
    }
    if (tooClose) continue;

    var type = rPick(types);
    if (o.kind === 'sun_moon' && (type === 'remove' || type === 'flip')) type = 'recolor';
    if ((o.kind === 'window' || o.kind === 'bird') && type === 'flip') type = 'recolor';

    var applied = applyMutation(modelB, oi, type, theme);
    if (!applied) continue;

    diffList.push({ id: o.id, nx: applied.nx, ny: applied.ny, type: type, found: false, hintLit: 0, popT: 0 });
    usedRegions.push({ x: applied.nx, y: applied.ny });
  }
  while (diffList.length < n) {
    var oi2 = idxs[(pi++) % idxs.length];
    var o2 = modelB.objs[oi2];
    var ap = applyMutation(modelB, oi2, 'recolor', theme);
    if (ap) diffList.push({ id:o2.id, nx:ap.nx, ny:ap.ny, type:'recolor', found:false, hintLit:0, popT:0 });
    if (pi > idxs.length * 3) break;
  }
  return { modelB: modelB, diffs: diffList };
}

function applyMutation(modelB, oi, type, theme) {
  var o = modelB.objs[oi];
  var nx = o.x, ny = o.y;
  if (type === 'recolor') {
    if (o.kind === 'sun_moon') {
      // keep the sun/moon a warm/natural disc — shift tone, don't swap to a random accent
      o.color = o.variant === 1 ? '#cdd6ec' : (rng() < 0.5 ? '#ffd24a' : '#ffb86c');
      return { nx: nx, ny: ny };
    }
    if (o.kind === 'cloud') {
      // clouds stay in a believable white/grey family
      var cloudPool = ['#ffffff', '#e6ebf5', '#cfd6ec', '#d8dde8'].filter(function(c){ return c !== o.color; });
      o.color = rPick(cloudPool);
      return { nx: nx, ny: ny };
    }
    if (o.kind === 'bird') {
      var birdPool = ['#5a5a6a', '#3a3a48', '#6a5236', '#444452'].filter(function(c){ return c !== o.color; });
      o.color = rPick(birdPool);
      return { nx: nx, ny: ny };
    }
    var pool = theme.accents.filter(function(c){ return c !== o.color; });
    var nc = pool.length ? rPick(pool) : shadeHex(o.color || '#cccccc', rng() < 0.5 ? -50 : 50);
    if (o.kind === 'house') { o.color = nc; o.roofColor = shadeHex(nc, -34); }
    else { o.color = nc; }
    return { nx: nx, ny: ny };
  }
  if (type === 'remove') { o._removed = true; return { nx: nx, ny: ny }; }
  if (type === 'add') {
    var ex = Math.max(8, Math.min(92, o.x + rRange(-8, 8)));
    // ground props sit low; a bird can be in the sky
    var skyAdd = rng() < 0.35;
    var k = skyAdd ? 'bird' : rPick(['bush','barrel','crate','planter','tree']);
    var ey = skyAdd ? rRange(14, 32) : rRange(82, 90);
    var extra = { kind:k, x:ex, y:ey, size: (k === 'tree' ? rRange(5, 8) : rRange(3, 5)),
      color: k === 'tree' ? (theme.snow ? '#dfeee0' : (theme.id==='autumn' ? '#d97b2b' : '#3a8c4f')) : rPick(theme.accents),
      variant: rInt(0,1), id: modelB.objs.length, _added:true, flip: rng()<0.5?-1:1,
      glow:'#ffdf80', on:false, trunk:'#7a5236', lit:false };
    modelB.objs.push(extra);
    modelB.objs.sort(function(a,b){
      var sa=(a.kind==='sun_moon'||a.kind==='cloud'||a.kind==='bird')?-1000+a.y:a.y;
      var sb=(b.kind==='sun_moon'||b.kind==='cloud'||b.kind==='bird')?-1000+b.y:b.y;
      return sa-sb;
    });
    return { nx: ex, ny: ey };
  }
  if (type === 'move') {
    var mdx = (rng() < 0.5 ? -1 : 1) * rRange(6, 11);
    var nxp = Math.max(6, Math.min(94, o.x + mdx));
    o.x = nxp;
    return { nx: nxp, ny: ny };
  }
  if (type === 'resize') {
    o.size = o.size * (rng() < 0.5 ? rRange(0.62, 0.78) : rRange(1.28, 1.5));
    if (o.h) o.h = o.h * (rng() < 0.5 ? 0.78 : 1.28);
    return { nx: nx, ny: ny };
  }
  if (type === 'flip') {
    o.flip = (o.flip || 1) * -1;
    o._flipped = true;
    return { nx: nx, ny: ny };
  }
  return null;
}

// ── BUILD A FRESH SCENE ─────────────────────────────────────────────────────
function newScene() {
  var theme = THEMES[themeIndex % THEMES.length];
  var seed = (dailyMode ? dailySeed() : (seedCounter * 2654435761)) >>> 0;
  rng = mulberry32((seed ^ (level * 40503)) >>> 0);
  sceneA = genScene((seed ^ 0x9e3779b9) >>> 0, theme);
  var n = dailyMode ? 6 : DIFFS_BY_LEVEL[Math.min(level - 1, DIFFS_BY_LEVEL.length - 1)];
  if (n > MAX_DIFFS) n = MAX_DIFFS;
  var mut = mutateScene(sceneA, n, level);
  sceneB = mut.modelB;
  diffs = mut.diffs;
  diffCount = diffs.length;
  found = 0;
  sceneTime = 0;
  clearAnim = 0;
  if (!dailyMode) seedCounter++;
}

function dailySeed() {
  var d = new Date();
  var key = d.getUTCFullYear() * 10000 + (d.getUTCMonth() + 1) * 100 + d.getUTCDate();
  return (key ^ 0x5bd1e995) >>> 0;
}
function dailyKeyToday() {
  var d = new Date();
  return '' + (d.getUTCFullYear() * 10000 + (d.getUTCMonth() + 1) * 100 + d.getUTCDate());
}

// ── GAME LIFECYCLE ─────────────────────────────────────────────────────────
function startGame() {
  level = 1; score = 0; misses = 0; clears = 0;
  themeIndex = 0; seedCounter = 1; dailyMode = false;
  gs = 'PLAYING';
  newScene();
  GF.gameStarted();
  saveRun();
}

function startDaily() {
  dailyMode = true;
  level = 1; misses = 0;
  themeIndex = (dailySeed() % THEMES.length);
  gs = 'PLAYING'; prevGs = 'PLAYING';
  newScene();
  GF.gameStarted();
  saveRun();
}

function gameOver() {
  var newBest = score > best;
  if (newBest) { best = score; try { localStorage.setItem('twin_town_best', best); } catch (e) {} }
  gs = 'GAMEOVER';
  GF.sfx('lose');
  GF.juice.shake(8, 360);
  GF.gameEnded();
  GF.ads.interstitial();
  if (GF.funnel) GF.funnel.mark('first_death');
  saveRun();
}

function onFind(d, sceneIsB, hx, hy) {
  d.found = true; d.popT = 1;
  found++;
  var gain = COIN_PER_FIND;
  if (CFG.events.double_coins) gain *= 2;
  coins += gain;
  score += 50 + Math.max(0, 40 - Math.floor(sceneTime));
  GF.sfx('pickup');
  GF.juice.particles.burst(hx, hy, { count: 16, colors:['#ffe08a','#7CFC9A','#ffffff'], speed: 200, gravity: 260, size: 5, life: 0.6 });
  GF.juice.floatText(hx, hy - 18 * GF.S, '+' + gain, { color:'#ffe08a', size: 18, rise: 40 });
  if (coachActive && coachStep < 1) { coachStep = 1; }
  else if (coachActive && coachStep === 1) { coachStep = 2; }
  saveRun();
  if (found >= diffCount) onSceneClear();
}

function onMiss(hx, hy) {
  if (coachActive) return;   // no-fail during the coach
  misses++;
  score = Math.max(0, score - 8);
  GF.sfx('error');
  GF.juice.shake(6, 260);
  GF.juice.flash('#ff5a5a', 140, 0.22);
  GF.juice.particles.burst(hx, hy, { count: 8, color:'#ff7a7a', speed: 120, gravity: 120, size: 4, life: 0.4 });
  saveRun();
  if (misses >= MAX_MISSES) gameOver();
}

function onSceneClear() {
  clearAnim = 1.6;
  clears++;
  var bonus = COIN_PER_CLEAR;
  if (CFG.events.double_coins) bonus *= 2;
  coins += bonus;
  var st = 1;
  if (misses === 0) st++;
  if (sceneTime <= STAR_TIME_FAST) st++;
  totalStars += st;
  score += 120 + st * 40;
  GF.sfx('win');
  GF.juice.flash('#fff6cf', 220, 0.3);
  for (var i = 0; i < 3; i++) {
    GF.juice.particles.burst(GF.cx + (i-1)*60*GF.S, GF.cy, { count: 22, colors:['#ffd24a','#ff5d8f','#5ce1a0','#3ad6e0'], speed: 260, gravity: 220, size: 6, life: 0.9 });
  }
  if (!dailyMode && clears % SCENES_PER_POSTCARD === 0 && unlocked < THEMES.length) {
    unlocked++;
    GF.sfx('unlock');
    if (GF.funnel) GF.funnel.mark('first_upgrade');
  }
  if (dailyMode) dailyKey = dailyKeyToday();
  saveRun();
  setTimeout(function() {
    if (gs !== 'PLAYING') return;
    if (dailyMode) {
      dailyMode = false;
      gs = 'ALBUM'; prevGs = 'PLAYING';
      buildAlbumLayout();
    } else {
      level++;
      themeIndex = Math.min(unlocked - 1, THEMES.length - 1);
      if (unlocked > 1) themeIndex = (clears) % unlocked;
      newScene();
    }
    saveRun();
  }, 1100);
}

function useHint() {
  if (gs !== 'PLAYING') return;
  var remaining = diffs.filter(function(d){ return !d.found; });
  if (!remaining.length) return;
  if (coins >= HINT_COST) {
    coins -= HINT_COST;
    var d = remaining[Math.floor(rng() * remaining.length)];
    d.hintLit = HINT_OUTLINE_SEC;
    GF.sfx('reward');
    if (coachActive && coachStep === 1) coachStep = 2;
    saveRun();
  } else {
    GF.ads.rewarded({
      onReward: function() {
        var d = remaining[Math.floor(rng() * remaining.length)];
        if (d) d.hintLit = HINT_OUTLINE_SEC;
        GF.sfx('reward');
        if (coachActive && coachStep === 1) coachStep = 2;
        saveRun();
      },
      onClose: function() {}
    });
  }
}

function saveRun() { GF.saveRun(); }

// ── SCREENSHOT / TEST HOOK ─────────────────────────────────────────────────
window._jumpLevel = function(n) { _setupForScreenshot(n); };
window._setupForScreenshot = function(n) {
  level = (n && n > 0) ? n : 5;
  coins = 40; totalStars = 12; clears = 6; unlocked = 3; misses = 1; score = 1840;
  themeIndex = ((n || 5) % THEMES.length);
  dailyMode = false; gs = 'PLAYING';
  coachActive = false;
  if (GF.tutorial) GF.tutorial.active = false;
  try { localStorage.setItem('twin_town_tut_v1', '1'); } catch (e) {}
  newScene();
  var k = Math.max(1, Math.floor(diffs.length * 0.55));
  found = 0;
  for (var i = 0; i < k; i++) { diffs[i].found = true; diffs[i].popT = 0.4; found++; }
  for (var i = 0; i < diffs.length; i++) { if (!diffs[i].found) { diffs[i].hintLit = HINT_OUTLINE_SEC; break; } }
};

// ── INPUT ──────────────────────────────────────────────────────────────────
function onPress(x, y) {
  if (GF.tutorial && GF.tutorial.active && GF.tutorial.handleClick(x, y)) {
    // handleClick swallows; but our coach keeps the world live, so fall through
    // ONLY when the tap was the skip pill (which deactivates the tutorial).
    if (!GF.tutorial.active) { coachActive = false; }
    // continue to process the tap as a real game tap below (coach is non-modal)
  }

  if (gs === 'ALBUM') { onAlbumPress(x, y); return; }
  if (gs === 'GAMEOVER') { onGameOverPress(x, y); return; }
  if (gs !== 'PLAYING') return;

  if (hit(L.muteBtn, x, y)) { var m = GF.toggleMute(); GF.setMusicMuted(m); GF.sfx('click'); return; }
  if (hit(L.helpBtn, x, y)) { GF.tutorial.reopen(); coachActive = true; coachStep = 0; GF.sfx('click'); return; }
  if (hit(L.hintBtn, x, y)) { useHint(); return; }
  if (hit(L.albumBtn, x, y)) { openAlbum(); GF.sfx('click'); return; }

  // scene taps
  var inTop = (y >= L.topY && y < L.topY + L.topH && x >= L.sceneX && x <= L.sceneX + L.sceneW);
  var inBot;
  if (L.landscape) {
    inBot = (y >= L.botY && y < L.botY + L.botH && x >= L.sceneX2 && x <= L.sceneX2 + L.sceneW);
  } else {
    inBot = (y >= L.botY && y < L.botY + L.botH && x >= L.sceneX && x <= L.sceneX + L.sceneW);
  }
  if (!inTop && !inBot) return;

  var rectX = inTop ? L.sceneX : (L.landscape ? L.sceneX2 : L.sceneX);
  var rectY = inTop ? L.topY : L.botY;
  var rectH = inTop ? L.topH : L.botH;
  var nx = ((x - rectX) / L.sceneW) * 100;
  var ny = ((y - rectY) / rectH) * 100;

  var tolN = (TAP_RADIUS / L.sceneW) * 100;
  var tolNy = (TAP_RADIUS / rectH) * 100;
  var hitD = null, hitDist = 1e9;
  for (var i = 0; i < diffs.length; i++) {
    var d = diffs[i];
    if (d.found) continue;
    var ddx = (d.nx - nx) / tolN, ddy = (d.ny - ny) / tolNy;
    var dd = ddx*ddx + ddy*ddy;
    if (dd <= 1 && dd < hitDist) { hitDist = dd; hitD = d; }
  }
  if (hitD) onFind(hitD, !inTop, x, y);
  else onMiss(x, y);
}

function hit(r, x, y) { return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

GF.canvas.addEventListener('pointerdown', function(e) {
  var r = GF.canvas.getBoundingClientRect();
  var sx = GF.canvas.width / r.width, sy = GF.canvas.height / r.height;
  onPress((e.clientX - r.left) * sx, (e.clientY - r.top) * sy);
});

GF.canvas.addEventListener('wheel', function(e) {
  if (gs === 'ALBUM' && albumScroll) {
    e.preventDefault();
    albumScroll.handleWheel(e.deltaMode === 1 ? e.deltaY * 18 : e.deltaMode === 2 ? e.deltaY * GF.H : e.deltaY);
  }
}, { passive: false });
GF.canvas.addEventListener('touchstart', function(e) {
  if (gs === 'ALBUM' && albumScroll) {
    var t0 = e.changedTouches[0], r = GF.canvas.getBoundingClientRect();
    var sx = GF.canvas.width / r.width, sy = GF.canvas.height / r.height;
    var xx = (t0.clientX - r.left) * sx, yy = (t0.clientY - r.top) * sy;
    if (albumScroll.contains(xx, yy)) albumScroll.dragStart(yy);
  }
}, { passive: true });
GF.canvas.addEventListener('touchmove', function(e) {
  if (gs === 'ALBUM' && albumScroll && albumScroll.isDragging()) {
    var t0 = e.changedTouches[0], r = GF.canvas.getBoundingClientRect();
    albumScroll.dragMove((t0.clientY - r.top) * (GF.canvas.height / r.height));
  }
}, { passive: true });
GF.canvas.addEventListener('touchend', function() { if (albumScroll) albumScroll.dragEnd(); }, { passive: true });

// ── ALBUM HUB ──────────────────────────────────────────────────────────────
function openAlbum() { prevGs = 'PLAYING'; gs = 'ALBUM'; buildAlbumLayout(); }
function onAlbumPress(x, y) {
  if (hit(albumBackBtn, x, y)) { gs = 'PLAYING'; GF.sfx('click'); saveRun(); return; }
  if (hit(albumDailyBtn, x, y) && dailyKey !== dailyKeyToday()) { startDaily(); GF.sfx('click'); return; }
  for (var i = 0; i < albumRects.length; i++) {
    var c = albumRects[i];
    var sy = albumScroll ? albumScroll.contentToScreenY(c.y) : c.y;
    if (x >= c.x && x <= c.x + c.w && y >= sy && y <= sy + c.h) {
      GF.sfx(i < unlocked ? 'pickup' : 'click');
      return;
    }
  }
}

// ── UPDATE ─────────────────────────────────────────────────────────────────
function update(dt) {
  GF.juice.update(dt);
  if (GF.tutorial) GF.tutorial.update(dt);
  // sync coach logical step into GF.tutorial
  if (GF.tutorial && GF.tutorial.active) {
    coachActive = true;
    while (GF.tutorial.step < coachStep && GF.tutorial.active) GF.tutorial.next();
    if (!GF.tutorial.active) { coachActive = false; if (GF.funnel) GF.funnel.mark('tutorial_done'); }
  } else if (coachActive) {
    coachActive = false;
    if (GF.funnel) GF.funnel.mark('tutorial_done');
  }

  if (gs === 'PLAYING') {
    if (!coachActive && clearAnim <= 0) sceneTime += dt;
    if (clearAnim > 0) clearAnim -= dt;
    for (var i = 0; i < diffs.length; i++) {
      var d = diffs[i];
      if (d.hintLit > 0) d.hintLit -= dt;
      if (d.popT > 0) d.popT -= dt * 1.6;
    }
  } else if (gs === 'ALBUM') {
    if (albumScroll) albumScroll.update();
  }
}

// ── DRAW ───────────────────────────────────────────────────────────────────
function draw(ctx) {
  ctx.fillStyle = '#11141f';
  ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'ALBUM') { drawAlbum(ctx); drawFlashLast(ctx); return; }

  layoutPlaying();
  drawScene(ctx, sceneA, L.sceneX, L.topY, L.sceneW, L.topH, 'A');
  drawScene(ctx, sceneB, L.landscape ? L.sceneX2 : L.sceneX, L.botY, L.sceneW, L.botH, 'B');
  drawFoundMarks(ctx);
  drawDivider(ctx);
  drawHUD(ctx);
  drawBottomBar(ctx);
  if (clearAnim > 0) drawClearBanner(ctx);

  if (GF.tutorial && GF.tutorial.active) GF.tutorial.draw(ctx);

  if (gs === 'GAMEOVER') drawGameOver(ctx);
  drawFlashLast(ctx);
}
function drawFlashLast(ctx) { GF.juice.drawFlash(ctx); GF.juice.particles.draw(ctx); GF.juice.texts.draw(ctx); }

// ── LAYOUT ───────────────────────────────────────────────────────────────────
function layoutPlaying() {
  var W = GF.W, H = GF.H, S = GF.S;
  var topBarH = Math.max(58 * S, H * 0.085);
  var botBarH = Math.max(74 * S, H * 0.105);
  var dividerH = Math.max(24 * S, H * 0.032);
  var availH = H - topBarH - botBarH - dividerH;
  var landscape = W / H > 1.2;

  if (landscape) {
    var pad = 14 * S;
    var sw = (W - pad * 3) / 2;
    L.sceneX = pad; L.sceneW = sw;
    L.sceneX2 = pad * 2 + sw;
    L.topY = topBarH; L.topH = availH + dividerH;
    L.botY = topBarH; L.botH = availH + dividerH;
    L.landscape = true;
  } else {
    var padX = 10 * S;
    L.sceneX = padX; L.sceneW = W - padX * 2;
    L.sceneX2 = padX;
    L.topY = topBarH;
    L.topH = availH / 2;
    L.botY = topBarH + availH / 2 + dividerH;
    L.botH = availH / 2;
    L.landscape = false;
  }
  L.topBarH = topBarH; L.botBarH = botBarH;

  var by = H - botBarH + (botBarH - 52 * S) / 2;
  var bh = 52 * S;
  var gap = 10 * S;
  var pad2 = padX2();
  var hintW = Math.min(170 * S, (W - pad2 * 2 - gap) * 0.5);
  L.hintBtn = { x: pad2, y: by, w: hintW, h: bh };
  L.albumBtn = { x: pad2 + hintW + gap, y: by, w: hintW, h: bh };
  var sm = 30 * S;
  L.muteBtn = { x: W - pad2 - sm, y: 12 * S, w: sm, h: sm };
  L.helpBtn = { x: W - pad2 - sm * 2 - 8 * S, y: 12 * S, w: sm, h: sm };
}
function padX2() { return Math.max(10 * GF.S, 12); }

// ── SCENE RENDER ───────────────────────────────────────────────────────────
function drawScene(ctx, model, rx, ry, rw, rh, which) {
  if (!model) return;
  var theme = model.theme;
  ctx.save();
  var rad = 16 * GF.S;
  GF.rr(ctx, rx, ry, rw, rh, rad);
  ctx.save();
  ctx.clip();

  var sg = ctx.createLinearGradient(0, ry, 0, ry + rh);
  sg.addColorStop(0, theme.sky[0]); sg.addColorStop(0.55, theme.sky[1]); sg.addColorStop(1, theme.sky[2]);
  ctx.fillStyle = sg; ctx.fillRect(rx, ry, rw, rh);

  var horizon = ry + rh * 0.66;
  ctx.fillStyle = theme.night ? withA(theme.groundLo, 0.7) : shadeHex(theme.ground, 24);
  ctx.beginPath();
  ctx.moveTo(rx, horizon);
  var hills = 5;
  for (var i = 0; i <= hills; i++) {
    var hx = rx + (rw / hills) * i;
    var hy = horizon - (Math.sin(i * 1.3) * 0.5 + 0.5) * rh * 0.07 - rh * 0.02;
    ctx.lineTo(hx, hy);
  }
  ctx.lineTo(rx + rw, ry + rh); ctx.lineTo(rx, ry + rh); ctx.closePath(); ctx.fill();

  if (theme.water) {
    var wg = ctx.createLinearGradient(0, horizon, 0, ry + rh);
    wg.addColorStop(0, '#7fc4e0'); wg.addColorStop(1, '#4a93b8');
    ctx.fillStyle = wg; ctx.fillRect(rx, horizon, rw, ry + rh - horizon);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1.4 * GF.S;
    for (var r = 0; r < 4; r++) {
      var ly = horizon + (rh - (horizon - ry)) * (0.2 + r * 0.2);
      ctx.beginPath();
      for (var sx = rx; sx < rx + rw; sx += 10 * GF.S) ctx.lineTo(sx, ly + Math.sin(sx * 0.06 + r) * 2);
      ctx.stroke();
    }
  } else {
    var gg = ctx.createLinearGradient(0, horizon, 0, ry + rh);
    gg.addColorStop(0, theme.ground); gg.addColorStop(1, theme.groundLo);
    ctx.fillStyle = gg; ctx.fillRect(rx, horizon, rw, ry + rh - horizon);
    ctx.fillStyle = withA(theme.road, 0.9);
    var roadY = ry + rh * 0.86;
    ctx.fillRect(rx, roadY, rw, ry + rh - roadY);
  }

  if (theme.snow) {
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    var sr = mulberry32(7);
    for (var i = 0; i < 40; i++) {
      ctx.beginPath(); ctx.arc(rx + sr() * rw, ry + sr() * rh, (0.6 + sr() * 1.4) * GF.S, 0, 6.283); ctx.fill();
    }
  }

  var scaleX = rw / 100, scaleY = rh / 100;
  for (var i = 0; i < model.objs.length; i++) {
    var o = model.objs[i];
    if (o._removed) continue;
    drawObject(ctx, o, rx, ry, scaleX, scaleY);
  }

  ctx.restore();   // un-clip
  ctx.lineWidth = 3 * GF.S;
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  GF.rr(ctx, rx, ry, rw, rh, rad); ctx.stroke();
  ctx.lineWidth = 1.5 * GF.S;
  ctx.strokeStyle = 'rgba(20,24,36,0.35)';
  GF.rr(ctx, rx + 1.5 * GF.S, ry + 1.5 * GF.S, rw - 3 * GF.S, rh - 3 * GF.S, rad - 2 * GF.S); ctx.stroke();
  ctx.restore();
}

function softShadow(ctx, blur, oy) { ctx.shadowColor = 'rgba(20,22,30,0.28)'; ctx.shadowBlur = blur; ctx.shadowOffsetY = oy; }
function noShadow(ctx) { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0; }

function drawObject(ctx, o, rx, ry, sX, sY) {
  var x = rx + o.x * sX, y = ry + o.y * sY;
  var s = o.size * sX;
  var k = o.kind;
  ctx.save();
  if (k === 'house') drawHouse(ctx, o, x, y, s, sY);
  else if (k === 'tree') drawTree(ctx, o, x, y, s);
  else if (k === 'cloud') drawCloud(ctx, o, x, y, s);
  else if (k === 'sun_moon') drawSunMoon(ctx, o, x, y, s);
  else if (k === 'lamp') drawLamp(ctx, o, x, y, s, sY);
  else if (k === 'awning') drawAwning(ctx, o, x, y, s);
  else if (k === 'window') drawWindow(ctx, o, x, y, s);
  else if (k === 'door') drawDoor(ctx, o, x, y, s);
  else if (k === 'flag') drawFlag(ctx, o, x, y, s);
  else if (k === 'barrel') drawBarrel(ctx, o, x, y, s);
  else if (k === 'crate') drawCrate(ctx, o, x, y, s);
  else if (k === 'bush') drawBush(ctx, o, x, y, s);
  else if (k === 'bird') drawBird(ctx, o, x, y, s);
  else if (k === 'sign') drawSign(ctx, o, x, y, s);
  else if (k === 'planter') drawPlanter(ctx, o, x, y, s);
  ctx.restore();
}

function drawHouse(ctx, o, x, y, s, sY) {
  var w = s, h = (o.h || 20) * sY;
  var bx = x - w/2, by = y - h;
  softShadow(ctx, 8, 4);
  var bg = ctx.createLinearGradient(bx, by, bx + w, by);
  bg.addColorStop(0, o.color); bg.addColorStop(1, shadeHex(o.color, -18));
  ctx.fillStyle = bg; ctx.fillRect(bx, by, w, h);
  noShadow(ctx);
  ctx.fillStyle = o.roofColor || shadeHex(o.color, -34);
  ctx.beginPath();
  if (o.roofType === 0) {
    ctx.moveTo(bx - w*0.08, by); ctx.lineTo(x, by - h*0.42); ctx.lineTo(bx + w*1.08, by);
  } else {
    ctx.moveTo(bx - w*0.06, by); ctx.lineTo(bx + w*0.2, by - h*0.34);
    ctx.lineTo(bx + w*0.8, by - h*0.34); ctx.lineTo(bx + w*1.06, by);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = shadeHex(o.color, -50);
  ctx.fillRect(x - w*0.12, by + h*0.55, w*0.24, h*0.45);
  ctx.fillStyle = o.variant === 1 ? '#ffe89a' : '#cfeaf6';
  ctx.fillRect(bx + w*0.16, by + h*0.18, w*0.2, h*0.22);
  ctx.fillRect(bx + w*0.64, by + h*0.18, w*0.2, h*0.22);
}
function drawTree(ctx, o, x, y, s) {
  softShadow(ctx, 6, 3);
  ctx.fillStyle = o.trunk || '#7a5236';
  ctx.fillRect(x - s*0.08, y - s*0.5, s*0.16, s*0.6);
  noShadow(ctx);
  var g = ctx.createRadialGradient(x - s*0.2, y - s*0.9, s*0.1, x, y - s*0.8, s*0.9);
  g.addColorStop(0, shadeHex(o.color, 22)); g.addColorStop(1, o.color);
  ctx.fillStyle = g;
  if (o.variant === 0) {
    ctx.beginPath(); ctx.arc(x, y - s*0.8, s*0.62, 0, 6.283); ctx.fill();
  } else if (o.variant === 1) {
    for (var i = 0; i < 3; i++) {
      ctx.beginPath();
      var ly = y - s*0.3 - i * s*0.32;
      ctx.moveTo(x - s*(0.5 - i*0.1), ly); ctx.lineTo(x, ly - s*0.5); ctx.lineTo(x + s*(0.5 - i*0.1), ly);
      ctx.closePath(); ctx.fill();
    }
  } else {
    ctx.beginPath();
    ctx.arc(x - s*0.28, y - s*0.7, s*0.42, 0, 6.283);
    ctx.arc(x + s*0.28, y - s*0.7, s*0.42, 0, 6.283);
    ctx.arc(x, y - s, s*0.5, 0, 6.283); ctx.fill();
  }
}
function drawCloud(ctx, o, x, y, s) {
  ctx.globalAlpha = 0.95; ctx.fillStyle = o.color;
  var f = o.flip || 1;
  ctx.beginPath();
  ctx.arc(x, y, s*0.5, 0, 6.283);
  ctx.arc(x + f*s*0.45, y + s*0.08, s*0.38, 0, 6.283);
  ctx.arc(x - f*s*0.4, y + s*0.1, s*0.34, 0, 6.283);
  ctx.arc(x + f*s*0.1, y - s*0.18, s*0.36, 0, 6.283);
  ctx.fill(); ctx.globalAlpha = 1;
}
function drawSunMoon(ctx, o, x, y, s) {
  ctx.save();
  ctx.shadowColor = o.variant === 1 ? 'rgba(255,255,210,0.7)' : 'rgba(255,220,120,0.8)';
  ctx.shadowBlur = 22 * GF.S; ctx.fillStyle = o.color;
  ctx.beginPath(); ctx.arc(x, y, s*0.7, 0, 6.283); ctx.fill();
  ctx.restore();
  if (o.variant === 1) {
    ctx.fillStyle = 'rgba(210,210,180,0.5)';
    ctx.beginPath(); ctx.arc(x + s*0.2, y - s*0.15, s*0.12, 0, 6.283);
    ctx.arc(x - s*0.15, y + s*0.18, s*0.08, 0, 6.283); ctx.fill();
  }
}
function drawLamp(ctx, o, x, y, s) {
  ctx.strokeStyle = o.color; ctx.lineWidth = Math.max(1.5, s*0.1);
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y - s); ctx.stroke();
  ctx.fillStyle = o.color;
  ctx.beginPath(); ctx.arc(x, y - s, s*0.16, 0, 6.283); ctx.fill();
  var lampY = y - s - s*0.12;
  if (o.on) {
    ctx.save(); ctx.shadowColor = o.glow; ctx.shadowBlur = 16 * GF.S; ctx.fillStyle = o.glow;
    ctx.beginPath(); ctx.arc(x, lampY, s*0.18, 0, 6.283); ctx.fill(); ctx.restore();
  } else {
    ctx.fillStyle = '#cfd6dd';
    ctx.beginPath(); ctx.arc(x, lampY, s*0.16, 0, 6.283); ctx.fill();
  }
}
function drawAwning(ctx, o, x, y, s) {
  var w = s, h = s*0.4;
  softShadow(ctx, 5, 2);
  ctx.fillStyle = shadeHex(o.color, -10);
  ctx.beginPath();
  ctx.moveTo(x - w/2, y - h); ctx.lineTo(x + w/2, y - h); ctx.lineTo(x + w/2, y);

  noShadow(ctx);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';

  ctx.fillRect(x - w/2, y - h/2, w, h);

  ctx.beginPath(); ctx.moveTo(x, y - h/2); ctx.lineTo(x, y + h/2);
  ctx.moveTo(x - w/2, y); ctx.lineTo(x + w/2, y); ctx.stroke();
}
function drawDoor(ctx, o, x, y, s) {
  var w = s*1.1, h = s*1.7;
  softShadow(ctx, 4, 2);
  ctx.fillStyle = o.color;
  GF.rr(ctx, x - w/2, y - h, w, h, w*0.4); ctx.fill();
  noShadow(ctx);
  ctx.fillStyle = shadeHex(o.color, -40);
  if (o.variant === 0) { GF.rr(ctx, x - w*0.32, y - h*0.85, w*0.64, h*0.7, w*0.3); ctx.fill(); }
  ctx.fillStyle = '#ffd24a';

}
function drawFlag(ctx, o, x, y, s) {

  ctx.fillStyle = o.color;
  ctx.beginPath();
  ctx.moveTo(x, y - s);

  ctx.quadraticCurveTo(x + f*s*0.45, y - s*0.7, x, y - s*0.62);
  ctx.closePath(); ctx.fill();
}
function drawBarrel(ctx, o, x, y, s) {
  softShadow(ctx, 4, 2);
  var w = s*1.0, h = s*1.3;
  var g = ctx.createLinearGradient(x - w/2, 0, x + w/2, 0);
  g.addColorStop(0, shadeHex(o.color, -20)); g.addColorStop(0.5, shadeHex(o.color, 14)); g.addColorStop(1, shadeHex(o.color, -20));
  ctx.fillStyle = g;
  GF.rr(ctx, x - w/2, y - h, w, h, w*0.18); ctx.fill();
  noShadow(ctx);
  ctx.strokeStyle = 'rgba(40,30,20,0.5)'; ctx.lineWidth = Math.max(1, s*0.1);
  ctx.beginPath(); ctx.moveTo(x - w/2, y - h*0.7); ctx.lineTo(x + w/2, y - h*0.7);
  ctx.moveTo(x - w/2, y - h*0.32); ctx.lineTo(x + w/2, y - h*0.32); ctx.stroke();
}
function drawCrate(ctx, o, x, y, s) {
  softShadow(ctx, 4, 2);
  var w = s*1.2, h = s*1.2;
  ctx.fillStyle = o.color; ctx.fillRect(x - w/2, y - h, w, h);
  noShadow(ctx);
  ctx.strokeStyle = shadeHex(o.color, -40); ctx.lineWidth = Math.max(1, s*0.12);
  ctx.strokeRect(x - w/2, y - h, w, h);
  ctx.beginPath(); ctx.moveTo(x - w/2, y - h); ctx.lineTo(x + w/2, y);
  ctx.moveTo(x + w/2, y - h); ctx.lineTo(x - w/2, y); ctx.stroke();
}
function drawBush(ctx, o, x, y, s) {
  var g = ctx.createRadialGradient(x - s*0.2, y - s*0.4, s*0.1, x, y - s*0.2, s*0.7);
  g.addColorStop(0, shadeHex(o.color, 20)); g.addColorStop(1, o.color);
  ctx.fillStyle = g;
  ctx.beginPath();

  ctx.arc(x + s*0.35, y - s*0.2, s*0.4, 0, 6.283);
  ctx.arc(x, y - s*0.45, s*0.46, 0, 6.283); ctx.fill();
}
function drawBird(ctx, o, x, y, s) {

  ctx.beginPath();
  ctx.moveTo(x - s*1.4, y); ctx.quadraticCurveTo(x, y - s*1.2, x, y);
  ctx.quadraticCurveTo(x, y - s*1.2, x + s*1.4, y);

}
function drawSign(ctx, o, x, y, s) {
  ctx.strokeStyle = '#7a6a55'; ctx.lineWidth = Math.max(1.5, s*0.12);
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y - s*1.2); ctx.stroke();

  noShadow(ctx);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (var i = 0; i < 2; i++) ctx.fillRect(x - w*0.32, y - s*1.2 - h + h*0.3 + i*h*0.28, w*0.64, h*0.12);
}
function drawPlanter(ctx, o, x, y, s) {
  ctx.fillStyle = '#9a6a3a';
  GF.rr(ctx, x - s*0.6, y - s*0.5, s*1.2, s*0.5, s*0.1); ctx.fill();
  ctx.fillStyle = o.color;
  ctx.beginPath();
  ctx.arc(x - s*0.3, y - s*0.6, s*0.28, 0, 6.283);
  ctx.arc(x + s*0.3, y - s*0.6, s*0.28, 0, 6.283);
  ctx.arc(x, y - s*0.78, s*0.3, 0, 6.283); ctx.fill();
}

// ── FOUND / HINT MARKS ──────────────────────────────────────────────────────
function drawFoundMarks(ctx) {
  for (var i = 0; i < diffs.length; i++) {
    var d = diffs[i];
    if (d.hintLit > 0) {
      drawRingAt(ctx, d, 'A', '#ffd24a', 0.9, true);
      drawRingAt(ctx, d, 'B', '#ffd24a', 0.9, true);
    }
    if (d.found) {
      var pop = d.popT > 0 ? (1 + d.popT * 0.6) : 1;
      drawRingAt(ctx, d, 'A', '#5ce17a', pop, false);
      drawRingAt(ctx, d, 'B', '#5ce17a', pop, false);
    }
  }
}
function drawRingAt(ctx, d, which, color, scale, dashed) {
  var rx = which === 'A' ? L.sceneX : (L.landscape ? L.sceneX2 : L.sceneX);
  var rw = L.sceneW;
  var ry = which === 'A' ? L.topY : L.botY;
  var rh = which === 'A' ? L.topH : L.botH;
  var cx = rx + (d.nx / 100) * rw;
  var cy = ry + (d.ny / 100) * rh;
  var rad = (TAP_RADIUS * 0.62) * GF.S * (scale || 1);
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 3 * GF.S;
  if (dashed) {
    var p = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000;
    ctx.setLineDash([6 * GF.S, 6 * GF.S]); ctx.lineDashOffset = -p * 30;
    ctx.globalAlpha = 0.55 + 0.35 * Math.sin(p * 5);
    ctx.shadowColor = color; ctx.shadowBlur = 10 * GF.S;
  } else {
    ctx.shadowColor = color; ctx.shadowBlur = 8 * GF.S;
  }
  ctx.beginPath(); ctx.arc(cx, cy, rad, 0, 6.283); ctx.stroke();
  if (!dashed) {
    ctx.lineWidth = 3 * GF.S; ctx.lineCap = 'round'; ctx.globalAlpha = Math.min(1, scale);
    ctx.beginPath();
    ctx.moveTo(cx - rad*0.35, cy + rad*0.02);
    ctx.lineTo(cx - rad*0.05, cy + rad*0.34);
    ctx.lineTo(cx + rad*0.42, cy - rad*0.34);
    ctx.stroke();
  }
  ctx.restore();
}

// ── DIVIDER ──────────────────────────────────────────────────────────────────
function drawDivider(ctx) {
  if (L.landscape) return;
  var y = (L.topY + L.topH + L.botY) / 2;
  var fs = GF.clamp(13 * GF.S, 11, 17);
  ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var txt = GF.t('find_label');
  var w = ctx.measureText(txt).width;
  ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 2 * GF.S;
  ctx.beginPath();
  ctx.moveTo(GF.cx - w/2 - 18 * GF.S, y); ctx.lineTo(GF.cx - w/2 - 60 * GF.S, y);
  ctx.moveTo(GF.cx + w/2 + 18 * GF.S, y); ctx.lineTo(GF.cx + w/2 + 60 * GF.S, y);
  ctx.stroke();
  ctx.fillStyle = '#cdd6e8'; ctx.fillText(txt, GF.cx, y);
  ctx.textBaseline = 'alphabetic';
}

// ── TOP HUD ──────────────────────────────────────────────────────────────────
function drawHUD(ctx) {
  var W = GF.W, S = GF.S, h = L.topBarH;
  ctx.fillStyle = 'rgba(16,20,32,0.86)';
  ctx.fillRect(0, 0, W, h);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(0, h - 2 * S, W, 2 * S);

  var fs = GF.clamp(15 * S, 12, 20);
  ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
  ctx.fillText(GF.t('level') + ' ' + level, padX2(), h * 0.30);
  ctx.textAlign = 'right'; ctx.fillStyle = '#ffe08a';
  ctx.fillText(GF.t('score') + ' ' + score, W - padX2() - 80 * S, h * 0.30);

  drawCoinIcon(ctx, padX2() + 8 * S, h * 0.72, 7 * S);
  ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'left';
  ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px Inter, system-ui, sans-serif';
  ctx.fillText('' + coins, padX2() + 20 * S, h * 0.72);

  L.hearts = [];
  var hx = W * 0.40, hy = h * 0.72, hr = 7 * S, hgap = 19 * S;
  for (var i = 0; i < MAX_MISSES; i++) {
    var lost = i < misses;
    drawLensIcon(ctx, hx + i * hgap, hy, hr, lost);
    L.hearts.push({ x: hx + i * hgap, y: hy });
  }

  L.pips = [];
  var pn = diffCount, pw = Math.min(15 * S, (W * 0.32) / Math.max(pn,1));
  var totW = pn * pw;
  var px = W - padX2() - totW - 2 * S, py = h * 0.72;
  for (var i = 0; i < pn; i++) {
    var filled = i < found;
    if (filled) {
      ctx.save(); ctx.shadowColor = '#5ce17a'; ctx.shadowBlur = 6 * S;
      ctx.fillStyle = '#5ce17a';
      ctx.beginPath(); ctx.arc(px + i * pw + pw/2, py, pw * 0.3, 0, 6.283); ctx.fill(); ctx.restore();
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.22)';

  drawHelpIcon(ctx, L.helpBtn.x + L.helpBtn.w/2, L.helpBtn.y + L.helpBtn.h/2, L.helpBtn.w*0.42);

function drawCoinIcon(ctx, x, y, r) {

  ctx.fillStyle = '#f2b937'; ctx.beginPath(); ctx.arc(x, y, r, 0, 6.283); ctx.fill();
  ctx.fillStyle = '#ffd866'; ctx.beginPath(); ctx.arc(x, y, r * 0.7, 0, 6.283); ctx.fill();

  ctx.fillText('$', x, y + r * 0.08);

}

  ctx.fillStyle = lost ? 'rgba(120,125,140,0.3)' : 'rgba(255,111,145,0.28)';
  ctx.lineWidth = Math.max(1.6, r * 0.32);

// ── BOTTOM BAR ────────────────────────────────────────────────────────────────
function drawBottomBar(ctx) {

function drawBigButton(ctx, r, color, label, badge, badgeKind) {
  if (!r) return;
  ctx.save();
  if (badgeKind === 'glow') { ctx.shadowColor = '#ffd24a'; ctx.shadowBlur = 16 * GF.S; }
  var g = ctx.createLinearGradient(r.x, r.y, r.x, r.y + r.h);
  g.addColorStop(0, shadeHex(color, 18)); g.addColorStop(1, shadeHex(color, -16));
  ctx.fillStyle = g;
  GF.rr(ctx, r.x, r.y, r.w, r.h, r.h * 0.32); ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#fff';
  var fs = GF.clamp(16 * GF.S, 13, 22);
  ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (badgeKind === 'coin') {
    // wide button: label centered, coin+cost pinned to the right edge
    var wide = r.w > 130 * GF.S;
    if (wide) {
      ctx.fillText(label, r.x + r.w/2 - 6 * GF.S, r.y + r.h/2);
      drawCoinIcon(ctx, r.x + r.w - 36 * GF.S, r.y + r.h/2, 7 * GF.S);
      ctx.fillStyle = '#ffe08a';
      ctx.font = 'bold ' + GF.clamp(13 * GF.S, 11, 18) + 'px Inter, system-ui, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(badge, r.x + r.w - 24 * GF.S, r.y + r.h/2);
      ctx.textAlign = 'center';
    } else {
      ctx.fillText(label, r.x + r.w/2 - 16 * GF.S, r.y + r.h/2);
      drawCoinIcon(ctx, r.x + r.w/2 + 14 * GF.S, r.y + r.h/2, 7 * GF.S);
      ctx.fillStyle = '#ffe08a';
      ctx.font = 'bold ' + GF.clamp(13 * GF.S, 11, 18) + 'px Inter, system-ui, sans-serif';
      ctx.fillText(badge, r.x + r.w/2 + 28 * GF.S, r.y + r.h/2);
    }
  } else if (badgeKind === 'ad') {
    // label centered; AD glyph pinned to the right edge so it never overlaps text
    ctx.fillText(label, r.x + r.w/2, r.y + r.h/2);
    drawAdGlyph(ctx, r.x + r.w - 22 * GF.S, r.y + r.h/2, 9 * GF.S);
  } else {
    ctx.fillText(label, r.x + r.w/2, r.y + r.h/2);
    if (badge === '•' && badgeKind === 'glow') {
      ctx.fillStyle = '#ffd24a';
      ctx.beginPath(); ctx.arc(r.x + r.w - 12 * GF.S, r.y + 12 * GF.S, 5 * GF.S, 0, 6.283); ctx.fill();

  ctx.textBaseline = 'alphabetic';
}
function drawAdGlyph(ctx, x, y, r) {
  ctx.save();
  ctx.fillStyle = '#ffe08a';
  GF.rr(ctx, x - r, y - r*0.7, r*2, r*1.4, r*0.3); ctx.fill();
  ctx.fillStyle = '#2f9e8f'; ctx.font = 'bold ' + (r*0.9) + 'px Inter, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('AD', x, y + r*0.05);
  ctx.restore();
}

// ── CLEAR BANNER ──────────────────────────────────────────────────────────────
function drawClearBanner(ctx) {
  var a = Math.min(1, clearAnim / 0.4);
  ctx.save();
  ctx.globalAlpha = a;
  var fs = GF.clamp(32 * GF.S, 22, 52);
  ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 12 * GF.S;
  ctx.fillStyle = '#fff6cf';
  var txt = misses === 0 ? GF.t('perfect') : GF.t('found_all');
  ctx.fillText(txt, GF.cx, GF.cy);
  var st = 1; if (misses === 0) st++; if (sceneTime <= STAR_TIME_FAST) st++;
  for (var i = 0; i < 3; i++) drawStar(ctx, GF.cx + (i - 1) * 44 * GF.S, GF.cy + fs * 0.9, 14 * GF.S, i < st);
  ctx.restore();
}
function drawStar(ctx, x, y, r, filled) {
  ctx.save();
  ctx.beginPath();
  for (var i = 0; i < 5; i++) {
    var a = -Math.PI/2 + i * (Math.PI * 2 / 5);
    var a2 = a + Math.PI / 5;
    ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
    ctx.lineTo(x + Math.cos(a2) * r * 0.45, y + Math.sin(a2) * r * 0.45);
  }
  ctx.closePath();
  if (filled) { ctx.fillStyle = '#ffd24a'; ctx.shadowColor = '#ffd24a'; ctx.shadowBlur = 8 * GF.S; ctx.fill(); }
  else { ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2 * GF.S; ctx.stroke(); }
  ctx.restore();
}

// ── GAME OVER ─────────────────────────────────────────────────────────────────
function drawGameOver(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(10,12,20,0.92)';
  ctx.fillRect(0, 0, W, H);
  var cx = GF.cx, cy = GF.cy;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + GF.clamp(28 * S, 20, 44) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('gameover'), cx, cy - 96 * S);
  ctx.font = GF.clamp(16 * S, 13, 22) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t('score') + ': ' + score, cx, cy - 62 * S);
  ctx.fillStyle = '#ffd24a';
  ctx.fillText(GF.t('best') + ': ' + best, cx, cy - 38 * S);

  var bw = GF.clamp(248 * S, 180, 360), bh = GF.clamp(54 * S, 44, 70);
  gameoverBtns.restore = { x: cx - bw/2, y: cy - 12 * S, w: bw, h: bh };
  drawBigButton(ctx, gameoverBtns.restore, '#2f9e8f', GF.t('restore'), '', 'ad');
  gameoverBtns.retry = { x: cx - bw/2, y: cy + 52 * S, w: bw, h: bh };
  drawBigButton(ctx, gameoverBtns.retry, '#3a86c0', GF.t('retry'), '', '');
  gameoverBtns.album = { x: cx - bw/2, y: cy + 116 * S, w: bw, h: bh };
  drawBigButton(ctx, gameoverBtns.album, '#7c4fb0', GF.t('album'), '', '');
}
function onGameOverPress(x, y) {
  if (hit(gameoverBtns.restore, x, y)) {
    GF.ads.rewarded({
      onReward: function() { misses = Math.max(0, misses - 2); gs = 'PLAYING'; GF.sfx('reward'); saveRun(); },
      onClose: function() {}
    });
    return;
  }
  if (hit(gameoverBtns.retry, x, y)) { startGame(); GF.sfx('click'); return; }
  if (hit(gameoverBtns.album, x, y)) { prevGs = 'GAMEOVER'; gs = 'ALBUM'; buildAlbumLayout(); GF.sfx('click'); return; }
}

// ── ALBUM RENDER + LAYOUT ──────────────────────────────────────────────────
function buildAlbumLayout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var headH = Math.max(64 * S, H * 0.09);
  var footH = Math.max(64 * S, H * 0.095);
  var vpY = headH, vpH = H - headH - footH;
  if (!albumScroll) albumScroll = GF.makeScroll('album', { x: 0, y: vpY, w: W, h: vpH });
  else albumScroll.setViewport({ x: 0, y: vpY, w: W, h: vpH });

  albumRects = [];
  var cols = W / H > 1.2 ? 3 : 2;
  var padX = 16 * S, gap = 12 * S;
  var cw = (W - padX * 2 - gap * (cols - 1)) / cols;
  var ch = cw * 0.72;
  var labelH = 22 * S;
  var rows = Math.ceil(THEMES.length / cols);
  for (var i = 0; i < THEMES.length; i++) {
    var r = Math.floor(i / cols), c = i % cols;
    albumRects.push({ x: padX + c * (cw + gap), y: gap + r * (ch + gap + labelH), w: cw, h: ch, theme: THEMES[i], idx: i });
  }
  var contentH = gap + rows * (ch + gap + labelH) + 8 * S;
  albumScroll.setContentHeight(contentH);

  var bw = GF.clamp(W * 0.62, 200, 420), bh = footH * 0.6;
  albumDailyBtn = { x: (W - bw) / 2, y: H - footH + (footH - bh) / 2, w: bw, h: bh };
  albumBackBtn = { x: padX, y: (headH - 40 * S) / 2, w: 80 * S, h: 40 * S };
  L.muteBtn = { x: W - padX - 30 * S, y: (headH - 30 * S) / 2, w: 30 * S, h: 30 * S };
}
function drawAlbum(ctx) {
  buildAlbumLayout();
  var W = GF.W, H = GF.H, S = GF.S;
  var bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1b2138'); bg.addColorStop(1, '#11141f');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  var headH = Math.max(64 * S, H * 0.09);
  ctx.fillStyle = 'rgba(16,20,32,0.9)'; ctx.fillRect(0, 0, W, headH);
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(19 * S, 15, 26) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('album_title'), W / 2, headH * 0.42);
  ctx.font = GF.clamp(12 * S, 10, 16) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#9ab';
  ctx.fillText(Math.min(unlocked, THEMES.length) + '/' + THEMES.length + ' ' + GF.t('collected'), W / 2, headH * 0.78);
  drawBigButton(ctx, albumBackBtn, '#3a4760', GF.t('back'), '', '');
  GF.drawMuteIcon(ctx, L.muteBtn.x + L.muteBtn.w/2, L.muteBtn.y + L.muteBtn.h/2, L.muteBtn.w*0.42, GF.muted);

  albumScroll.begin(ctx);
  for (var i = 0; i < albumRects.length; i++) {
    var c = albumRects[i];
    var isUnlocked = i < unlocked;
    GF.rr(ctx, c.x, c.y, c.w, c.h, 12 * S);
    ctx.save(); ctx.clip();
    if (isUnlocked) {
      var th = c.theme;
      var sg = ctx.createLinearGradient(0, c.y, 0, c.y + c.h);
      sg.addColorStop(0, th.sky[0]); sg.addColorStop(0.6, th.sky[1]); sg.addColorStop(1, th.sky[2]);
      ctx.fillStyle = sg; ctx.fillRect(c.x, c.y, c.w, c.h);
      var mini = genScene((i + 1) * 99173, th);
      var sX = c.w / 100, sY = c.h / 100;
      for (var j = 0; j < mini.objs.length; j++) {
        var o = mini.objs[j];
        if (['house','tree','lamp','cloud','sun_moon','bush'].indexOf(o.kind) < 0) continue;
        drawObject(ctx, o, c.x, c.y, sX, sY);
      }
    } else {
      ctx.fillStyle = '#262d44'; ctx.fillRect(c.x, c.y, c.w, c.h);
      ctx.strokeStyle = '#5a627e'; ctx.lineWidth = 3 * S; ctx.fillStyle = '#5a627e';
      var lx = c.x + c.w/2, ly = c.y + c.h/2;
      GF.rr(ctx, lx - 14 * S, ly, 28 * S, 22 * S, 4 * S); ctx.fill();
      ctx.beginPath(); ctx.arc(lx, ly, 10 * S, Math.PI, 0); ctx.stroke();
    }
    ctx.restore();
    ctx.strokeStyle = isUnlocked ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2.5 * S; GF.rr(ctx, c.x, c.y, c.w, c.h, 12 * S); ctx.stroke();
    ctx.fillStyle = isUnlocked ? '#fff' : '#79809a';
    ctx.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    var nm = GF.lang === 'ru' ? c.theme.name_ru : c.theme.name_en;
    ctx.fillText(isUnlocked ? nm : GF.t('locked'), c.x + c.w/2, c.y + c.h + 5 * S);
  }
  albumScroll.end(ctx);
  albumScroll.draw(ctx);

  var footH = Math.max(64 * S, H * 0.095);
  ctx.fillStyle = 'rgba(16,20,32,0.92)'; ctx.fillRect(0, H - footH, W, footH);
  var dailyReady = (dailyKey !== dailyKeyToday());
  drawBigButton(ctx, albumDailyBtn, dailyReady ? '#2f9e8f' : '#3a4760',
    dailyReady ? GF.t('daily_ready') : GF.t('daily_done'), '', dailyReady ? 'glow' : '');
  ctx.textBaseline = 'alphabetic';
}

// ── REACHABILITY + STATE HOOKS ─────────────────────────────────────────────
GF.exposeState(function() {
  return { gs: gs, score: score, level: level, misses: misses, found: found,
           diffCount: diffCount, coins: coins, clears: clears, unlocked: unlocked };
});

// Locale-audit hooks (Step 5.75) — safe to ship; Yandex/CG don't reject test seams.
window._setLang = function(l) { GF.lang = (l === 'ru' ? 'ru' : 'en'); };
window._setState = function(s) {
  if (s === 'PLAYING' || s === 1) { gs = 'PLAYING'; if (GF.tutorial) GF.tutorial.active = false; coachActive = false; if (!sceneA) newScene(); }
  else if (s === 'GAMEOVER' || s === 2) { coins = 12; misses = MAX_MISSES; gs = 'GAMEOVER'; }
  else if (s === 'ALBUM' || s === 3) { unlocked = 4; gs = 'ALBUM'; buildAlbumLayout(); }
};
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'Inter, system-ui, sans-serif'; };
// Current visible button + icon rects for the locale-overflow audit.
window.__ttRects = function() {
  var buttons = [], icons = [];
  function btn(r, id, pad) { if (r) buttons.push({ id:id, x:r.x, y:r.y, w:r.w, h:r.h, pad: pad || 12 }); }
  if (gs === 'PLAYING') {
    layoutPlaying();
    btn(L.hintBtn, 'hint', 14); btn(L.albumBtn, 'album', 14);
    if (L.muteBtn) icons.push({ id:'mute', x:L.muteBtn.x, y:L.muteBtn.y, w:L.muteBtn.w, h:L.muteBtn.h });
    if (L.helpBtn) icons.push({ id:'help', x:L.helpBtn.x, y:L.helpBtn.y, w:L.helpBtn.w, h:L.helpBtn.h });
  } else if (gs === 'GAMEOVER') {
    btn(gameoverBtns.restore, 'restore', 14); btn(gameoverBtns.retry, 'retry', 14); btn(gameoverBtns.album, 'album', 14);
  } else if (gs === 'ALBUM') {
    buildAlbumLayout();
    btn(albumBackBtn, 'back', 12); btn(albumDailyBtn, 'daily', 14);
    if (L.muteBtn) icons.push({ id:'mute', x:L.muteBtn.x, y:L.muteBtn.y, w:L.muteBtn.w, h:L.muteBtn.h });
  }
  return { buttons: buttons, icons: icons };
};
GF.exposeReach(function() {
  if (gs === 'ALBUM') {
    if (!albumBackBtn) buildAlbumLayout();
    var items = [{ id:'back', x:albumBackBtn.x, y:albumBackBtn.y, w:albumBackBtn.w, h:albumBackBtn.h, pinned:true },
                 { id:'daily', x:albumDailyBtn.x, y:albumDailyBtn.y, w:albumDailyBtn.w, h:albumDailyBtn.h, pinned:true }];
    for (var i = 0; i < albumRects.length; i++) {
      var c = albumRects[i];
      items.push({ id:'town_' + i, x:c.x, y:c.y, w:c.w, h:c.h + 22 * GF.S });
    }
    return { screen:'album', items: items, scrollId:'album',
             viewportH: albumScroll ? albumScroll.vp.h : GF.H, screenH: GF.H };
  }
  layoutPlaying();
  var items = [
    { id:'hint', x:L.hintBtn.x, y:L.hintBtn.y, w:L.hintBtn.w, h:L.hintBtn.h },
    { id:'album', x:L.albumBtn.x, y:L.albumBtn.y, w:L.albumBtn.w, h:L.albumBtn.h },
    { id:'mute', x:L.muteBtn.x, y:L.muteBtn.y, w:L.muteBtn.w, h:L.muteBtn.h },
    { id:'help', x:L.helpBtn.x, y:L.helpBtn.y, w:L.helpBtn.w, h:L.helpBtn.h },
  ];
  return { screen: gs.toLowerCase(), items: items, viewportH: GF.H, screenH: GF.H, scrollMaxY: 0 };
});
GF.exposeTour([
  { name:'playing', go: function() { gs = 'PLAYING'; if (!sceneA) newScene(); } },
  { name:'album', go: function() { prevGs = 'PLAYING'; gs = 'ALBUM'; buildAlbumLayout(); } },
]);
GF.exposeBot(function() {
  return gs === 'PLAYING' ? ['find'] : (gs === 'GAMEOVER' ? ['retry'] : ['back']);
}, function(a) {
  if (a === 'find') {
    var d = diffs.filter(function(x){ return !x.found; })[0];
    if (d) onFind(d, false, GF.cx, GF.cy);
  } else if (a === 'retry') startGame();
  else if (a === 'back') gs = 'PLAYING';
});

// ── COACH TUTORIAL ───────────────────────────────────────────────────────────
function startCoach() {
  var target1 = function() {
    var d = diffs.filter(function(x){ return !x.found; })[0];
    if (!d) return { x: GF.cx, y: GF.cy, r: TAP_RADIUS * GF.S };
    return { x: (L.landscape ? L.sceneX2 : L.sceneX) + (d.nx / 100) * L.sceneW,
             y: L.botY + (d.ny / 100) * L.botH, r: TAP_RADIUS * 0.8 * GF.S };
  };
  var targetHint = function() {
    if (!L.hintBtn) layoutPlaying();
    return { x: L.hintBtn.x + L.hintBtn.w/2, y: L.hintBtn.y + L.hintBtn.h/2, r: L.hintBtn.h * 0.6 };
  };
  var started = GF.tutorial.start([
    { text: GF.t('coach_find'), target: target1, gesture: 'tap', advance: 'manual' },
    { text: GF.t('coach_hint'), target: targetHint, gesture: 'tap', advance: 'manual' },
    { text: GF.t('coach_clear'), target: target1, gesture: 'tap', advance: 'auto', after: 2600 },
  ], { storageKey: 'twin_town_tut_v1' });
  coachActive = started;
  coachStep = 0;
  if (!started && GF.funnel) GF.funnel.mark('tutorial_done');
}

// ── BOOT ───────────────────────────────────────────────────────────────────
GF.init({
  designW: 393,
  designH: 852,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'twin_town',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('twin_town_best') || '0') || 0; } catch (e) {}

    GF.persist('twin_town_run_v1',
      function() {
        return { level: level, score: score, coins: coins, misses: misses, clears: clears,
                 unlocked: unlocked, totalStars: totalStars, themeIndex: themeIndex,
                 seedCounter: seedCounter, dailyKey: dailyKey, best: best, gs: (gs === 'GAMEOVER' ? 'PLAYING' : gs) };
      },
      function(s) {
        if (!s) return;
        level = s.level || 1; score = s.score || 0; coins = s.coins || 0;
        misses = Math.min(s.misses || 0, MAX_MISSES - 1);
        clears = s.clears || 0; unlocked = Math.max(1, s.unlocked || 1);
        totalStars = s.totalStars || 0; themeIndex = s.themeIndex || 0;
        seedCounter = s.seedCounter || 1; dailyKey = s.dailyKey || '';
        if (s.best) best = Math.max(best, s.best);
      }
    );

    dailyMode = false;
    if (gs !== 'ALBUM') gs = 'PLAYING';
    newScene();

    GF.bgMusic({ file: 'audio/bg_track.mp3', preset: 'cozy', muted: GF.muted });

    GF.remoteConfig('twin_town', CFG, {
      clamps: { 'tuning.coin_per_find': [1, 6], 'tuning.hint_cost': [1, 8] },
      onUpdate: function(c) { CFG = c; if (c.tuning) { COIN_PER_FIND = c.tuning.coin_per_find || COIN_PER_FIND; HINT_COST = c.tuning.hint_cost || HINT_COST; } },
    }).then(function(c) { CFG = c; if (c.tuning) { COIN_PER_FIND = c.tuning.coin_per_find || COIN_PER_FIND; HINT_COST = c.tuning.hint_cost || HINT_COST; } });

    GF.ads.configure({ minGapMs: 90000, startupGraceMs: 45000 });

    startCoach();

    if (window.__GF_AUTOSTART && !window._silent) {
      gs = 'PLAYING';
      if (!sceneA) newScene();
      GF.gameStarted();
    }
  },
  onUpdate: update,
  onDraw: draw,
});

})();
</script>
