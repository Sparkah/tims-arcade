<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tire Escape</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── GAME-SPECIFIC CONFIG ─────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Tire Escape',
    sub:   'Tap or SPACE to kick up. Bounce off cars, dodge the cops behind.',
    play: 'PLAY', retry: 'RETRY',
    score: 'SCORE', best: 'BEST',
    gameover: 'CAUGHT!',
    distance: 'DIST',
    bounce: 'BOUNCE',
    newbest: 'NEW BEST!',
    leaderboard: "TODAY'S TOP",
    rank: 'RANK',
    you: 'you',
    namePrompt: 'Name for the global leaderboard:',
    skin_classic: 'CLASSIC',
    skin_chrome:  'CHROME',
    skin_neon:    'NEON',
    skin_gold:    'GOLD',
    skinsLabel:   'TIRE',
    skinLockedAt: 'BEST',
    skinUnlocked: 'SKIN UNLOCKED!',
    coins: 'COINS',
  },
  ru: {
    title: 'Побег Шины',
    sub:   'Тап или ПРОБЕЛ — толчок вверх. Отскакивай от машин, копы сзади.',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ',
    score: 'ОЧКИ', best: 'РЕКОРД',
    gameover: 'ПОЙМАЛИ!',
    distance: 'ДИСТ',
    bounce: 'ОТСКОК',
    newbest: 'НОВЫЙ РЕКОРД!',
    leaderboard: 'ТОП ДНЯ',
    rank: 'МЕСТО',
    you: 'ты',
    namePrompt: 'Имя для глобального лидерборда:',
    skin_classic: 'КЛАССИКА',
    skin_chrome:  'ХРОМ',
    skin_neon:    'НЕОН',
    skin_gold:    'ЗОЛОТО',
    skinsLabel:   'ШИНА',
    skinLockedAt: 'РЕКОРД',
    skinUnlocked: 'НОВАЯ ШИНА!',
    coins: 'МОНЕТ',
  },
};

var SPRITE_NAMES = ['tire', 'cop_car', 'parked_car', 'street_sign', 'brick_wall', 'dust_particle'];

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | PLAYING | GAMEOVER
var bonusScore = 0, best = 0;
var distance = 0;           // metres (pixels / 10 in design space)
var combo = 0, comboTimer = 0;
var cameraX = 0;            // world scroll (px in design space)
var scrollSpeed = 0;        // current world scroll px/sec
var BASE_SPEED = 280;       // design-space px/sec
var GRAVITY = 1500;         // design-space px/sec^2

// Player tire — position is in world coords
var tire = {
  x: 0, y: 0,
  vy: 0,
  r: 28,
  rot: 0,
  rotSpeed: 0,
  onGround: false,
  groundCooldown: 0,
};

// Obstacles in world. {x, y, w, h, type, hit, bounciness}
var obstacles = [];
var spawnX = 600;

// Cops chase from the left. Lose when copX > tire.x.
var copX = -300;
// Tuned 2026-05-09 iter#3 — recurring "cant win/lose / flies forever" complaints
// (2 negative comments after iter#2 leaderboard ship). Playtest confirmed: at a
// ~500-700ms kick cadence, COP_PUSHBACK_PER_BOUNCE (65) outpaced the net cop
// gain (1% scroll speed) → infinite survival. Three changes to guarantee a
// terminal state within ~60s for any input pattern:
//   1. Cop base ratio ramps 0.99 → 1.12 with distance (escalating closure)
//   2. Pushback per bounce decays 65 → 22 with distance (diminishing returns —
//      stops the rhythmic bouncer from out-running the chase forever)
//   3. After 50s elapsed, +60 px/s permanent cop accel kicks in (hard failsafe)
// Sprint bonus stays — penalises pure idling.
var COP_BASE_RATIO_START = 0.99;
var COP_BASE_RATIO_MAX   = 1.12;
var COP_SPRINT_BONUS     = 90;          // applied when comboTimer < 0.5
var COP_PUSHBACK_START   = 65;
var COP_PUSHBACK_FLOOR   = 22;
var COP_FAILSAFE_AT_SEC  = 50;          // after this elapsed, +failsafe accel
var COP_FAILSAFE_BONUS   = 60;          // px/s added permanently after failsafe
var elapsedSec = 0;                     // run timer, drives failsafe + ramps
var copPanic = 0;

// Background props
var bgFar = [];
var bgNear = [];

// Ground line in design space
var GROUND_Y = 460;

var bounceFlash = 0;

// Iter#1 (ladder1): persistent best — flag flips true when a run beats stored best
// so game-over overlay can show "NEW BEST!". Reset at startGame().
var wasNewBest = false;
// Pulse timer for live BEST HUD pip when current score crosses old best mid-run.
var bestBeatPulse = 0;
var bestBeatLatched = false;

// Iter#2 (ladder2): shared daily leaderboard — gives a concrete external goal
// beyond personal best. Player comments said "can't win/lose" — a top-10 board
// + projected daily rank converts the endless run into a competitive target.
// Pattern lifted from Games/21_dodge_run/.
var playerName = '';
var leaderboard = [];        // top-5 shown on game-over: [{name, score, ts}]
var liveBoard = [];          // top-50 cached for live-rank computation during PLAYING
var liveRank = null;         // projected daily rank vs liveBoard (recomputed ~4×/sec)
var liveRankCheckTimer = 0;
var myRank = null;           // your final rank after submit (shown on overlay)
var lbFetched = false;       // suppress empty board flicker on first paint

// Iter#4 (ladder3 — cosmetic unlocks): tire skin variants tied to BEST score
// thresholds. Pure visual layer — applied in drawTire() as a hue/overlay pass
// over the existing sprite. Zero impact on physics, collision, cop AI, pacing.
// Picked over ladder4 daily-seed because seed work could shadow yesterday's
// distance-driven cop ramp and risk regressing the no-lose-state fix.
// Why come back tomorrow: chase the next skin tier even after you've topped
// the leaderboard once.
var SKINS = [
  { id: 'classic', unlockBest: 0,    nameKey: 'skin_classic', tint: null,                glow: null },
  { id: 'chrome',  unlockBest: 200,  nameKey: 'skin_chrome',  tint: 'rgba(220,235,255,0.55)', glow: 'rgba(180,210,255,0.55)' },
  { id: 'neon',    unlockBest: 800,  nameKey: 'skin_neon',    tint: 'rgba(120,255,200,0.45)', glow: 'rgba(80,255,180,0.85)' },
  { id: 'gold',    unlockBest: 2000, nameKey: 'skin_gold',    tint: 'rgba(255,210,90,0.50)',  glow: 'rgba(255,180,40,0.90)' },
];
var selectedSkin = 'classic';
var lastUnlockedSkinId = null;   // remembers what was unlocked at last persisted-best save
var skinUnlockToast = 0;         // seconds remaining for the on-screen "NEW SKIN UNLOCKED" badge
var skinUnlockToastId = null;    // which skin we're celebrating in the toast

// Iter#5 (free-choice): mid-air coin pickups. Adds in-run tactical depth — player
// chooses when to kick to line up the arc through a coin. Pure additive layer:
// pickups don't block movement, don't affect cops, don't change ground physics.
// Spawn at varied heights in front of player; despawn behind. Pickup awards
// score + extends combo timer so they synergise with the existing bounce chain.
var coins = [];                  // {x, y, r, taken, spinPhase}
var coinSpawnX = 700;            // next world-x to consider a coin spawn
var coinsCollectedRun = 0;       // visible on HUD as a separate counter from score
var COIN_RADIUS = 14;            // design-space px
var COIN_VALUE = 50;             // score added per pickup
var COIN_COMBO_EXTEND = 0.5;     // seconds added to comboTimer on pickup (keeps chain alive)

// ── HELPERS ──────────────────────────────────────────────────────────────
function rand(a, b) { return a + Math.random() * (b - a); }
function randi(a, b) { return Math.floor(rand(a, b)); }

function spawnObstacle(x) {
  var roll = Math.random();
  var ob;
  if (roll < 0.45) {
    var w = rand(110, 160);
    ob = { x: x, y: GROUND_Y - 56, w: w, h: 56, type: 'car', hit: false, bounciness: 0.78 };
  } else if (roll < 0.75) {
    ob = { x: x, y: GROUND_Y - 90, w: 14, h: 90, type: 'sign', hit: false, bounciness: 0.65 };
  } else if (roll < 0.92) {
    var ww = rand(50, 80);
    var wh = rand(70, 110);
    ob = { x: x, y: GROUND_Y - wh, w: ww, h: wh, type: 'wall', hit: false, bounciness: 0.55 };
  } else {
    ob = { x: x, y: GROUND_Y - 140, w: 60, h: 140, type: 'wall', hit: false, bounciness: 0.55 };
  }
  obstacles.push(ob);
  return ob;
}

// Iter#5: spawn a coin at world-x with random height. Heights cluster mid-air so
// the player has to time the kick to grab them — not just trivially scooped at
// ground level. Coins are world entities (move with cameraX in draw, not actually
// translated). Some spawn in arcs (3-coin chains) to reward planned big jumps.
function spawnCoin(x, isChain) {
  // Height bands: low (just above tire when on ground), mid (peak-of-single-kick),
  // high (only reachable mid-bounce off a car). Bias to mid so most are pickable.
  var yBand = Math.random();
  var y;
  if (yBand < 0.35) y = GROUND_Y - 70;        // low — easy after a kick
  else if (yBand < 0.85) y = GROUND_Y - 140;  // mid — single-kick apex
  else y = GROUND_Y - 220;                    // high — needs a bounce-chain
  coins.push({ x: x, y: y, r: COIN_RADIUS, taken: false, spinPhase: Math.random() * Math.PI * 2 });
  if (isChain) {
    // Spawn 2 more coins forming a low arc — reward for committing to a jump.
    coins.push({ x: x + 60, y: y - 40, r: COIN_RADIUS, taken: false, spinPhase: Math.random() * Math.PI * 2 });
    coins.push({ x: x + 120, y: y, r: COIN_RADIUS, taken: false, spinPhase: Math.random() * Math.PI * 2 });
  }
}

function buildBg() {
  bgFar = [];
  bgNear = [];
  for (var i = 0; i < 60; i++) {
    bgFar.push({
      x: i * 140 + rand(-30, 30),
      w: rand(80, 130),
      h: rand(160, 260),
      hue: randi(220, 280),
    });
  }
  for (var j = 0; j < 80; j++) {
    bgNear.push({
      x: j * 90 + rand(-15, 15),
      type: Math.random() < 0.6 ? 'lamp' : 'curb',
    });
  }
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  bonusScore = 0;
  distance = 0;
  combo = 0;
  comboTimer = 0;
  cameraX = 0;
  scrollSpeed = BASE_SPEED;
  tire.x = 200;
  tire.y = GROUND_Y - tire.r;
  tire.vy = 0;
  tire.rot = 0;
  tire.rotSpeed = 6;
  tire.onGround = true;
  tire.groundCooldown = 0;
  obstacles = [];
  spawnX = 700;
  // Iter#5: reset coin state for new run.
  coins = [];
  coinSpawnX = 600;
  coinsCollectedRun = 0;
  copX = -260;
  copPanic = 0;
  elapsedSec = 0;
  bounceFlash = 0;
  wasNewBest = false;
  bestBeatPulse = 0;
  bestBeatLatched = false;
  // Iter#2: clear last-run rank state, keep cached liveBoard so live-rank works
  // immediately on the new run rather than waiting for a refetch.
  myRank = null;
  liveRank = null;
  liveRankCheckTimer = 0;
  buildBg();
  for (var i = 0; i < 8; i++) {
    spawnObstacle(spawnX);
    spawnX += rand(180, 320);
  }
  gs = 'PLAYING';
}

function gameOver() {
  var total = getDisplayScore();
  // Only celebrate "NEW BEST!" if there was an existing best to beat (best > 0).
  // First-ever run shouldn't pop the celebration overlay — it'd feel hollow.
  if (total > best && best > 0) {
    wasNewBest = true;
  }
  if (total > best) {
    best = total;
    try { localStorage.setItem('tire_escape_best', best); } catch (e) {}
  }
  // Iter#4: after best is updated, check if a new skin tier just unlocked.
  // Toast is rendered on top of the GAMEOVER overlay (below leaderboard).
  checkSkinUnlock();
  gs = 'GAMEOVER';
  // Iter#2: submit score + refresh leaderboard so the gameover overlay shows
  // top-5 (and your rank if you placed). Fire-and-forget — UI tolerates offline.
  try { submitAndFetchLeaderboard(); } catch (e) {}
  try { GF.gameEnded(); } catch (e) {}
}

// ── LEADERBOARD (iter#2 ladder2) ─────────────────────────────────────────
// Daily top-N via shared /api/scores endpoint. Same pattern as Daily Dodge.
// Date key = today UTC (so all players share one board per UTC day).
function getDayKey() {
  var d = new Date();
  var y = d.getUTCFullYear();
  var m = String(d.getUTCMonth() + 1).padStart(2, '0');
  var day = String(d.getUTCDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function ensurePlayerName() {
  if (playerName) return playerName;
  try { playerName = localStorage.getItem('tire_escape_name') || ''; } catch (e) {}
  if (!playerName) {
    // Skip prompt() in automated/headless environments — webapp_gate's
    // _jumpLevel(99) triggers an immediate gameOver and a synchronous prompt
    // hangs puppeteer. Real players still see the prompt.
    if (navigator.webdriver || window.__playwright || window.__puppeteer) return '';
    try {
      var entered = (window.prompt(GF.t('namePrompt'), 'Player') || '').trim().slice(0, 16);
      if (entered) {
        playerName = entered;
        try { localStorage.setItem('tire_escape_name', playerName); } catch (e) {}
      }
    } catch (e) {}
  }
  return playerName;
}

function fetchLeaderboard() {
  var date = getDayKey();
  return fetch('/api/scores?slug=tire_escape&date=' + date, { cache: 'no-store' })
    .then(function(r) { return r.ok ? r.json() : { entries: [] }; })
    .then(function(data) {
      var all = (data && data.entries) || [];
      leaderboard = all.slice(0, 5);
      // sort desc for the live-rank computation in case the API returns unsorted
      liveBoard = all.slice(0, 50).sort(function(a, b) { return b.score - a.score; });
      lbFetched = true;
    })
    .catch(function() { /* offline-tolerant — overlay just hides the section */ });
}

function submitAndFetchLeaderboard() {
  var name = ensurePlayerName();
  var date = getDayKey();
  var score = getDisplayScore();
  if (!name || score <= 0) { fetchLeaderboard(); return; }
  fetch('/api/scores', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ slug: 'tire_escape', date: date, name: name, score: score }),
    keepalive: true,
  })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
      if (data && data.rank) myRank = data.rank;
      return fetchLeaderboard();
    })
    .catch(function() { fetchLeaderboard(); });
}

// ── SKINS (iter#4 ladder3) helpers ───────────────────────────────────────
function getSkinById(id) {
  for (var i = 0; i < SKINS.length; i++) if (SKINS[i].id === id) return SKINS[i];
  return SKINS[0];
}
function isSkinUnlocked(skin) { return best >= (skin.unlockBest || 0); }
function highestUnlockedSkinId() {
  var top = SKINS[0].id;
  for (var i = 0; i < SKINS.length; i++) if (isSkinUnlocked(SKINS[i])) top = SKINS[i].id;
  return top;
}
function trySelectSkin(id) {
  var s = getSkinById(id);
  if (!isSkinUnlocked(s)) return;
  selectedSkin = id;
  try { localStorage.setItem('tire_escape_skin', id); } catch (e) {}
}
// Called after best is updated on game-over. If a new skin tier was crossed,
// fire the "NEW SKIN UNLOCKED" toast on the gameover screen.
function checkSkinUnlock() {
  var newTop = highestUnlockedSkinId();
  if (newTop !== lastUnlockedSkinId && newTop !== 'classic') {
    skinUnlockToast = 4.0;
    skinUnlockToastId = newTop;
  }
  lastUnlockedSkinId = newTop;
  try { localStorage.setItem('tire_escape_unlocked_top', lastUnlockedSkinId); } catch (e) {}
}

// Compute projected daily rank against cached liveBoard. Returns null if board empty.
function computeLiveRank(myScore) {
  if (!liveBoard || liveBoard.length === 0) return null;
  if (myScore <= 0) return null;
  var ahead = 0;
  for (var i = 0; i < liveBoard.length; i++) {
    if (liveBoard[i].score > myScore) ahead++; else break;
  }
  return ahead + 1;
}

window._jumpLevel = function(n) {
  startGame();
  var jumps = (n && n > 0) ? n : 5;
  distance = jumps * 600;
  bonusScore = jumps * 800;
  combo = 4 + (jumps % 4);
  comboTimer = 1.0;
  scrollSpeed = BASE_SPEED + jumps * 30;
  tire.y = GROUND_Y - tire.r - 80;
  tire.vy = -120;
  tire.rotSpeed = 18;
  // Position cops near tire so test gate can verify terminal-state reachability
  // quickly (high jumps imply "late game" — cops should be close).
  copX = tire.x - (jumps >= 50 ? 30 : 320);
  if (jumps >= 50) elapsedSec = COP_FAILSAFE_AT_SEC + 5;  // skip past failsafe
  for (var i = 0; i < 12; i++) {
    spawnObstacle(spawnX);
    spawnX += rand(140, 240);
  }
};

// ── INPUT (one-button kick) ──────────────────────────────────────────────
var kickQueued = false;
var lastKick = 0;
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    if (gs === 'PLAYING') kickQueued = true;
    e.preventDefault();
  }
});
document.addEventListener('touchstart', function(e) {
  if (gs !== 'PLAYING') return;
  kickQueued = true;
}, { passive: true });
document.addEventListener('mousedown', function(e) {
  if (gs !== 'PLAYING') return;
  kickQueued = true;
});

function applyKick() {
  var now = performance.now();
  if (now - lastKick < 90) return;
  lastKick = now;
  if (tire.onGround || tire.groundCooldown > 0) {
    tire.vy = -620;
    tire.onGround = false;
    tire.groundCooldown = 0;
    spawnDust(tire.x, GROUND_Y, 10);
  } else {
    if (tire.vy > 0) {
      tire.vy = -360;
      spawnDust(tire.x, tire.y + tire.r * 0.6, 6);
    }
  }
  tire.rotSpeed += 8;
}

function spawnDust(wx_, wy_, n) {
  var sx = (wx_ - cameraX) * GF.S;
  var sy = wy_ * GF.S;
  GF.spawnParticles(sx, sy, '#9a8a70', n);
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  // Iter#4: tick the unlock-toast timer in MENU + GAMEOVER too so the badge
  // fades on its own without needing the player to start a run.
  if (gs !== 'PLAYING') {
    if (skinUnlockToast > 0) skinUnlockToast = Math.max(0, skinUnlockToast - (dt || 0.016));
    kickQueued = false;
    return;
  }
  if (dt > 0.05) dt = 0.05;

  if (kickQueued) { applyKick(); kickQueued = false; }

  // Difficulty ramp
  var targetSpeed = BASE_SPEED + Math.min(220, distance * 0.04);
  scrollSpeed += (targetSpeed - scrollSpeed) * 0.02;

  cameraX += scrollSpeed * dt;
  tire.x = cameraX + 200;

  // Physics
  tire.vy += GRAVITY * dt;
  tire.y += tire.vy * dt;

  // Ground collision
  var groundTop = GROUND_Y - tire.r;
  if (tire.y >= groundTop) {
    if (!tire.onGround && tire.vy > 60) spawnDust(tire.x, GROUND_Y, 5);
    tire.y = groundTop;
    tire.vy *= -0.18;
    if (Math.abs(tire.vy) < 40) tire.vy = 0;
    tire.onGround = true;
    tire.groundCooldown = 0.08;
  } else {
    tire.onGround = false;
    if (tire.groundCooldown > 0) tire.groundCooldown -= dt;
  }

  if (tire.onGround) tire.rotSpeed = scrollSpeed / 60;
  else tire.rotSpeed *= (1 - dt * 0.4);
  tire.rot += tire.rotSpeed * dt;

  // Spawn ahead
  while (spawnX < cameraX + 1400) {
    spawnObstacle(spawnX);
    var minGap = Math.max(140, 260 - distance * 0.005);
    spawnX += rand(minGap, minGap + 180);
  }

  // Cull behind
  for (var i = obstacles.length - 1; i >= 0; i--) {
    if (obstacles[i].x + obstacles[i].w < cameraX - 100) obstacles.splice(i, 1);
  }

  // Iter#5: spawn coins ahead of player. ~30% chance per spawn slot, with 20%
  // of those becoming 3-coin arc chains. Spacing grows with distance so they
  // don't carpet the screen at high speed.
  while (coinSpawnX < cameraX + 1400) {
    if (Math.random() < 0.30) {
      spawnCoin(coinSpawnX, Math.random() < 0.20);
    }
    coinSpawnX += rand(180, 360);
  }
  // Cull coins that passed behind the camera
  for (var ci = coins.length - 1; ci >= 0; ci--) {
    if (coins[ci].x < cameraX - 100) coins.splice(ci, 1);
  }

  // Tire vs coins (circle vs circle, mid-air pickup). Don't block movement.
  for (var ck = 0; ck < coins.length; ck++) {
    var coin = coins[ck];
    if (coin.taken) continue;
    if (coin.x - tire.x > 200) break;
    var cdx = tire.x - coin.x, cdy = tire.y - coin.y;
    var rsum = tire.r + coin.r;
    if (cdx * cdx + cdy * cdy < rsum * rsum) {
      coin.taken = true;
      bonusScore += COIN_VALUE;
      coinsCollectedRun += 1;
      // Coins keep your bounce combo alive without inflating the multiplier —
      // they're a chain-saver, not a chain-spammer.
      if (combo > 0 && comboTimer > 0) comboTimer = Math.min(1.5, comboTimer + COIN_COMBO_EXTEND);
      var csxw = (coin.x - cameraX) * GF.S;
      var csyw = coin.y * GF.S;
      GF.spawnParticles(csxw, csyw, '#ffd84a', 10);
      GF.spawnFloat(csxw, csyw - 18 * GF.S, '+' + COIN_VALUE, '#ffd84a');
    }
  }

  // Tire vs obstacle (circle vs AABB)
  for (var j = 0; j < obstacles.length; j++) {
    var ob = obstacles[j];
    if (ob.x - tire.x > 200) break;
    if (ob.x + ob.w < tire.x - 200) continue;
    var nx = Math.max(ob.x, Math.min(tire.x, ob.x + ob.w));
    var ny = Math.max(ob.y, Math.min(tire.y, ob.y + ob.h));
    var dx = tire.x - nx, dy = tire.y - ny;
    var d2 = dx*dx + dy*dy;
    if (d2 < tire.r * tire.r) {
      var d = Math.sqrt(d2) || 0.0001;
      var pushX = dx / d, pushY = dy / d;
      var pen = tire.r - d;
      tire.x += pushX * pen;
      tire.y += pushY * pen;
      var dot = (-scrollSpeed) * pushX + tire.vy * pushY;
      var bounciness = ob.bounciness || 0.7;
      tire.vy = (tire.vy - 2 * dot * pushY) * bounciness;
      if (Math.abs(pushY) < 0.3) {
        tire.vy = Math.min(tire.vy, -260 * bounciness);
      }
      if (tire.vy < -900) tire.vy = -900;
      if (tire.vy > 900)  tire.vy = 900;

      if (!ob.hit) {
        ob.hit = true;
        combo += 1;
        comboTimer = 1.5;
        bounceFlash = 0.4;
        // Decaying pushback: 65 at start → 22 by ~3000m. Stops rhythmic-bouncer
        // infinite-run exploit; rewards still scale via combo points.
        var pushDecay = GF.clamp(distance / 3000, 0, 1);
        copX -= COP_PUSHBACK_START + (COP_PUSHBACK_FLOOR - COP_PUSHBACK_START) * pushDecay;
        var pts = 25 + combo * 10;
        bonusScore += pts;
        tire.rotSpeed += 6;
        var sxw = (tire.x - cameraX) * GF.S;
        var syw = tire.y * GF.S;
        GF.spawnParticles(sxw, syw, '#ffcf60', 14);
        var col = combo >= 3 ? '#ffcf60' : '#fff';
        GF.spawnFloat(sxw, syw - 30 * GF.S, '+' + pts + (combo > 1 ? ' x' + combo : ''), col);
        if (combo >= 5) GF.setShake(0.5);
      }
    }
  }

  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { combo = 0; comboTimer = 0; }
  }

  // Cops — base ratio escalates with distance (closure pressure builds even
  // for the skilled bouncer); failsafe accel after COP_FAILSAFE_AT_SEC kicks
  // in to guarantee terminal state.
  elapsedSec += dt;
  var ratioRamp = GF.clamp(distance / 2500, 0, 1);
  var copRatio = COP_BASE_RATIO_START + (COP_BASE_RATIO_MAX - COP_BASE_RATIO_START) * ratioRamp;
  var copSpeed = scrollSpeed * copRatio;
  if (comboTimer < 0.5) copSpeed += COP_SPRINT_BONUS;
  if (elapsedSec > COP_FAILSAFE_AT_SEC) {
    copSpeed += COP_FAILSAFE_BONUS * GF.clamp((elapsedSec - COP_FAILSAFE_AT_SEC) / 10, 0, 1);
  }
  copX += copSpeed * dt;

  distance += scrollSpeed * dt * 0.1;

  var copDist = tire.x - copX;
  copPanic = GF.clamp(1 - copDist / 320, 0, 1);

  // Escalating screen-shake as cops close in — you FEEL them coming
  // before they hit. Without this the threat was invisible to players.
  if (copPanic > 0.7) {
    GF.setShake(0.15 + (copPanic - 0.7) * 1.5);
  }

  if (copX > tire.x - tire.r - 6) {
    GF.setShake(1.6);
    gameOver();
  }

  // Iter#1: detect crossing the previous best mid-run for instant feedback.
  // Latch so we don't re-fire every frame; pulse decays in HUD.
  if (!bestBeatLatched && best > 0 && getDisplayScore() > best) {
    bestBeatLatched = true;
    bestBeatPulse = 1.4;
    var sxw = (tire.x - cameraX) * GF.S;
    var syw = tire.y * GF.S;
    GF.spawnFloat(sxw, syw - 60 * GF.S, GF.t('newbest'), '#ffcf60');
    GF.spawnParticles(sxw, syw, '#ffcf60', 24);
    GF.setShake(0.6);
  }
  if (bestBeatPulse > 0) bestBeatPulse = Math.max(0, bestBeatPulse - dt);

  // Iter#2: recompute live daily rank ~4×/sec — cheap (just compares numbers
  // against a pre-sorted in-memory cache). Gives the player instant "you'd be
  // #N right now" feedback during the run.
  liveRankCheckTimer -= dt;
  if (liveRankCheckTimer <= 0) {
    liveRankCheckTimer = 0.25;
    liveRank = computeLiveRank(getDisplayScore());
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  var skyGrad = ctx.createLinearGradient(0, 0, 0, GF.H);
  skyGrad.addColorStop(0, '#1a0a2a');
  skyGrad.addColorStop(0.6, '#2a1040');
  skyGrad.addColorStop(1, '#3a1a30');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawBgFar();
    drawBgNear();
    drawGround();
    drawObstacles();
    drawCoins();
    drawCops();
    drawTire();
    drawHUD();
    if (gs === 'PLAYING') drawCopPanicVignette();
  }

  if (gs === 'MENU') {
    drawBgFar();
    drawBgNear();
    drawGround();
    GF.drawOverlay({
      title: GF.t('title'),
      sub: GF.t('sub'),
      btnText: GF.t('play'),
      btnFn: startGame,
      bestText: best > 0 ? GF.t('best') + ': ' + best : null,
    });
    // Iter#4 (ladder3): skin selector strip below the PLAY button.
    drawSkinSelector();
  }
  if (gs === 'GAMEOVER') {
    GF.drawOverlay({
      title: wasNewBest ? GF.t('newbest') : GF.t('gameover'),
      sub: GF.t('score') + ': ' + getDisplayScore() + '   ' + GF.t('distance') + ': ' + Math.floor(distance) + 'm',
      sub2: wasNewBest ? (GF.t('gameover')) : null,
      btnText: GF.t('retry'),
      btnFn: startGame,
      bestText: GF.t('best') + ': ' + best,
    });
    // Iter#2: top-5 daily leaderboard underneath the RETRY button. The overlay
    // function doesn't know about the board, so we render it on top of the
    // already-painted overlay. Skipped if board hasn't loaded or is empty.
    if (lbFetched && leaderboard.length > 0) {
      drawLeaderboardOverlay();
    }
    // Iter#4 (ladder3): "NEW SKIN UNLOCKED!" badge over GAMEOVER when player
    // crossed a tier this run. Auto-fades via skinUnlockToast timer.
    if (skinUnlockToast > 0 && skinUnlockToastId) {
      drawSkinUnlockToast();
    }
  }
}

// Iter#2 (ladder2): paints top-5 + your rank below the GAMEOVER overlay button.
// Position math mirrors gf-lib drawOverlay() so rows sit just below `bestText`.
function drawLeaderboardOverlay() {
  var c = GF.ctx;
  var W = GF.W, H = GF.H, S = GF.S, cx = W / 2, cy = H / 2;
  var btnH = GF.clamp(52 * S, 40, 66);
  var btnY = cy + 20 * S;
  var lbY = btnY + btnH + 60 * S;          // below bestText (which is at btnY+btnH+28*S)
  var lbFs = GF.clamp(14 * S, 11, 18);
  var rowFs = GF.clamp(13 * S, 10, 16);
  var rowH = GF.clamp(20 * S, 16, 24);

  c.font = 'bold ' + lbFs + 'px sans-serif';
  c.fillStyle = '#48c9b0';
  c.textAlign = 'center';
  c.textBaseline = 'alphabetic';
  c.fillText(GF.t('leaderboard') + (myRank ? ' — ' + GF.t('rank') + ': #' + myRank : ''), cx, lbY);

  c.font = rowFs + 'px sans-serif';
  for (var i = 0; i < leaderboard.length; i++) {
    var entry = leaderboard[i];
    var rowY = lbY + (i + 1) * rowH + 6 * S;
    var isMe = entry.name === playerName;
    c.fillStyle = isMe ? '#ffcf60' : '#aab';
    c.textAlign = 'right';
    c.fillText((i + 1) + '.', cx - 80 * S, rowY);
    c.textAlign = 'left';
    var displayName = (entry.name || '?').slice(0, 16) + (isMe ? ' (' + GF.t('you') + ')' : '');
    c.fillText(displayName, cx - 70 * S, rowY);
    c.textAlign = 'right';
    c.fillStyle = isMe ? '#ffcf60' : '#9bf';
    c.fillText(entry.score, cx + 110 * S, rowY);
  }
  c.textAlign = 'center';
}

// ── Iter#4 (ladder3): skin selector + unlock toast ───────────────────────
// Slot rects in CSS pixels (canvas client coords) so the canvas click handler
// below can hit-test against raw clientX/Y events.
var skinSlotRects = [];

function drawSkinSelector() {
  var c = GF.ctx;
  var W = GF.W, H = GF.H, S = GF.S, cx = W / 2, cy = H / 2;
  var btnH = GF.clamp(52 * S, 40, 66);
  var btnY = cy + 20 * S;
  var bestLineY = btnY + btnH + 28 * S;
  // Sit just below the BEST line. Strip of 4 circular slots.
  var stripY = bestLineY + 18 * S;
  var slotR = GF.clamp(22 * S, 16, 30);
  var gap = slotR * 0.8;
  var totalW = SKINS.length * (slotR * 2) + (SKINS.length - 1) * gap;
  var startX = cx - totalW / 2 + slotR;

  // Section label
  c.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px sans-serif';
  c.fillStyle = '#778';
  c.textAlign = 'center';
  c.textBaseline = 'alphabetic';
  c.fillText(GF.t('skinsLabel'), cx, stripY - slotR - 8 * S);

  skinSlotRects = [];
  for (var i = 0; i < SKINS.length; i++) {
    var s = SKINS[i];
    var sx = startX + i * (slotR * 2 + gap);
    var sy = stripY;
    var unlocked = isSkinUnlocked(s);
    var selected = (s.id === selectedSkin);

    // Background disc
    c.fillStyle = selected ? 'rgba(72,201,176,0.22)' : 'rgba(255,255,255,0.06)';
    c.beginPath();
    c.arc(sx, sy, slotR, 0, Math.PI * 2);
    c.fill();

    // Tire icon (mini-tire) or padlock silhouette
    if (unlocked) {
      // mini tire body
      c.fillStyle = '#1a1a1a';
      c.beginPath();
      c.arc(sx, sy, slotR * 0.7, 0, Math.PI * 2);
      c.fill();
      // hub
      c.fillStyle = '#888';
      c.beginPath();
      c.arc(sx, sy, slotR * 0.28, 0, Math.PI * 2);
      c.fill();
      // skin tint overlay
      if (s.tint) {
        c.save();
        c.globalCompositeOperation = 'source-atop';
        c.fillStyle = s.tint;
        c.beginPath();
        c.arc(sx, sy, slotR * 0.7, 0, Math.PI * 2);
        c.fill();
        c.restore();
      }
      if (s.glow) {
        c.save();
        c.globalCompositeOperation = 'lighter';
        var gg = c.createRadialGradient(sx, sy, slotR * 0.4, sx, sy, slotR * 1.05);
        gg.addColorStop(0, s.glow);
        gg.addColorStop(1, 'rgba(0,0,0,0)');
        c.fillStyle = gg;
        c.beginPath();
        c.arc(sx, sy, slotR * 1.05, 0, Math.PI * 2);
        c.fill();
        c.restore();
      }
    } else {
      // locked: dim disc + padlock glyph + threshold
      c.fillStyle = '#222';
      c.beginPath();
      c.arc(sx, sy, slotR * 0.7, 0, Math.PI * 2);
      c.fill();
      c.fillStyle = '#556';
      c.font = 'bold ' + (slotR * 0.7) + 'px sans-serif';
      c.textAlign = 'center';
      c.textBaseline = 'middle';
      c.fillText('\u{1F512}', sx, sy + 1);
      c.textBaseline = 'alphabetic';
    }

    // Selected ring
    if (selected) {
      c.strokeStyle = '#48c9b0';
      c.lineWidth = 3 * S;
      c.beginPath();
      c.arc(sx, sy, slotR + 3 * S, 0, Math.PI * 2);
      c.stroke();
    }

    // Label below: name (unlocked) or "BEST 200" (locked)
    var labelFs = GF.clamp(10 * S, 8, 13);
    c.font = 'bold ' + labelFs + 'px sans-serif';
    c.textAlign = 'center';
    c.fillStyle = unlocked ? (selected ? '#48c9b0' : '#9ab') : '#667';
    var txt = unlocked
      ? GF.t(s.nameKey)
      : (GF.t('skinLockedAt') + ' ' + s.unlockBest);
    c.fillText(txt, sx, sy + slotR + labelFs + 4 * S);

    // Hit-test rect — design-space → CSS px via canvas bounding rect.
    var rect = GF.canvas.getBoundingClientRect();
    var scaleX = rect.width / GF.canvas.width;
    var scaleY = rect.height / GF.canvas.height;
    skinSlotRects.push({
      cx: rect.left + sx * scaleX,
      cy: rect.top + sy * scaleY,
      r: (slotR + 6 * S) * Math.max(scaleX, scaleY),
      id: s.id,
    });
  }
}

function drawSkinUnlockToast() {
  if (!skinUnlockToastId) return;
  var c = GF.ctx;
  var W = GF.W, S = GF.S;
  var sk = getSkinById(skinUnlockToastId);
  var fs = GF.clamp(20 * S, 14, 28);
  c.font = 'bold ' + fs + 'px sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'alphabetic';
  // Fade tail in last 1s
  var alpha = GF.clamp(skinUnlockToast / 1.0, 0, 1);
  c.fillStyle = 'rgba(255,207,96,' + alpha + ')';
  c.fillText('✨ ' + GF.t(sk.nameKey) + ' ' + GF.t('skinUnlocked'),
             W / 2, GF.clamp(48 * S, 32, 70));
}

// Canvas click for skin slots (separate from gf-lib's button system, which is
// reserved for the PLAY/RETRY action). Order matters: PLAY button click is
// inside the overlay rect; skin slots sit BELOW the bestText so no overlap.
(function attachSkinClicks() {
  function handler(ev) {
    if (gs !== 'MENU') return;
    var px, py;
    if (ev.changedTouches && ev.changedTouches.length) {
      px = ev.changedTouches[0].clientX;
      py = ev.changedTouches[0].clientY;
    } else {
      px = ev.clientX; py = ev.clientY;
    }
    if (px == null || py == null) return;
    for (var i = 0; i < skinSlotRects.length; i++) {
      var r = skinSlotRects[i];
      var dx = px - r.cx, dy = py - r.cy;
      if (dx * dx + dy * dy <= r.r * r.r) {
        trySelectSkin(r.id);
        return;
      }
    }
  }
  // Defer until canvas exists (GF.init sets GF.canvas).
  function attach() {
    if (!GF.canvas) { setTimeout(attach, 50); return; }
    GF.canvas.addEventListener('click', handler);
    GF.canvas.addEventListener('touchend', handler, { passive: true });
  }
  attach();
})();

function getDisplayScore() {
  return Math.floor(distance) + bonusScore;
}

function wxs(x) { return (x - cameraX) * GF.S; }
function wys(y) { return y * GF.S; }

function drawBgFar() {
  var c = GF.ctx;
  var par = cameraX * 0.2;
  for (var i = 0; i < bgFar.length; i++) {
    var b = bgFar[i];
    var x = (b.x - par) * GF.S;
    if (x + b.w * GF.S < 0 || x > GF.W) continue;
    var y = (GROUND_Y - b.h) * GF.S;
    var w = b.w * GF.S;
    var h = b.h * GF.S;
    c.fillStyle = 'hsl(' + b.hue + ', 38%, 22%)';
    c.fillRect(x, y, w, h);
    c.fillStyle = 'hsl(' + b.hue + ', 70%, 60%)';
    var winW = 6 * GF.S, winH = 8 * GF.S;
    for (var wxp = x + 8 * GF.S; wxp < x + w - 8 * GF.S; wxp += 14 * GF.S) {
      for (var wyp = y + 14 * GF.S; wyp < y + h - 10 * GF.S; wyp += 18 * GF.S) {
        if (((wxp + wyp) | 0) % 3 === 0) c.fillRect(wxp, wyp, winW, winH);
      }
    }
  }
}

function drawBgNear() {
  var c = GF.ctx;
  var par = cameraX * 0.55;
  for (var i = 0; i < bgNear.length; i++) {
    var b = bgNear[i];
    var x = (b.x - par) * GF.S;
    if (x < -50 || x > GF.W + 50) continue;
    if (b.type === 'lamp') {
      var px = x;
      var groundY = GROUND_Y * GF.S;
      c.fillStyle = '#3a3a4a';
      c.fillRect(px, groundY - 90 * GF.S, 3 * GF.S, 90 * GF.S);
      c.fillStyle = 'rgba(255,210,120,0.8)';
      c.beginPath();
      c.arc(px + 1.5 * GF.S, groundY - 90 * GF.S, 8 * GF.S, 0, Math.PI * 2);
      c.fill();
      c.fillStyle = 'rgba(255,210,120,0.18)';
      c.beginPath();
      c.arc(px + 1.5 * GF.S, groundY - 90 * GF.S, 28 * GF.S, 0, Math.PI * 2);
      c.fill();
    } else {
      c.fillStyle = '#1a1018';
      c.fillRect(x, GROUND_Y * GF.S, 20 * GF.S, 4 * GF.S);
    }
  }
}

function drawGround() {
  var c = GF.ctx;
  var groundY = GROUND_Y * GF.S;
  var grad = c.createLinearGradient(0, groundY, 0, GF.H);
  grad.addColorStop(0, '#1c1c24');
  grad.addColorStop(1, '#0a0a14');
  c.fillStyle = grad;
  c.fillRect(0, groundY, GF.W, GF.H - groundY);
  c.strokeStyle = '#ffcf60';
  c.lineWidth = 2 * GF.S;
  c.beginPath();
  c.moveTo(0, groundY);
  c.lineTo(GF.W, groundY);
  c.stroke();
  c.strokeStyle = 'rgba(255,255,255,0.18)';
  c.lineWidth = 3 * GF.S;
  c.setLineDash([20 * GF.S, 30 * GF.S]);
  var dashOff = (cameraX * GF.S) % (50 * GF.S);
  c.beginPath();
  c.moveTo(0 - dashOff, groundY + 28 * GF.S);
  c.lineTo(GF.W, groundY + 28 * GF.S);
  c.stroke();
  c.setLineDash([]);
}

function drawObstacles() {
  var c = GF.ctx;
  for (var i = 0; i < obstacles.length; i++) {
    var ob = obstacles[i];
    var x = wxs(ob.x);
    var y = wys(ob.y);
    var w = ob.w * GF.S;
    var h = ob.h * GF.S;
    if (x + w < -20 || x > GF.W + 20) continue;

    if (ob.type === 'car')      drawParkedCar(c, x, y, w, h, ob.hit);
    else if (ob.type === 'sign') drawStreetSign(c, x, y, w, h, ob.hit);
    else                          drawBrickWall(c, x, y, w, h, ob.hit);
  }
}

function drawParkedCar(c, x, y, w, h, hit) {
  if (GF.sprites && GF.sprites.parked_car) {
    c.save();
    if (hit) c.globalAlpha = 0.85;
    c.drawImage(GF.sprites.parked_car, x, y - h * 0.2, w, h * 1.2);
    c.restore();
    return;
  }
  c.fillStyle = hit ? '#5a3a3a' : '#c83838';
  GF.rr(c, x, y + h * 0.4, w, h * 0.6, 6 * GF.S); c.fill();
  c.fillStyle = hit ? '#3a2a3a' : '#882020';
  GF.rr(c, x + w * 0.18, y, w * 0.64, h * 0.5, 5 * GF.S); c.fill();
  c.fillStyle = '#4a90c0';
  c.fillRect(x + w * 0.22, y + h * 0.08, w * 0.25, h * 0.32);
  c.fillRect(x + w * 0.55, y + h * 0.08, w * 0.25, h * 0.32);
  c.fillStyle = '#000';
  c.beginPath(); c.arc(x + w * 0.22, y + h, h * 0.16, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(x + w * 0.78, y + h, h * 0.16, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#666';
  c.beginPath(); c.arc(x + w * 0.22, y + h, h * 0.08, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(x + w * 0.78, y + h, h * 0.08, 0, Math.PI * 2); c.fill();
}

function drawStreetSign(c, x, y, w, h, hit) {
  if (GF.sprites && GF.sprites.street_sign) {
    c.save();
    if (hit) c.globalAlpha = 0.85;
    c.drawImage(GF.sprites.street_sign, x - w * 1.2, y, w * 3.4, h);
    c.restore();
    return;
  }
  c.fillStyle = hit ? '#5a5a6a' : '#888';
  c.fillRect(x + w * 0.4, y + h * 0.25, w * 0.2, h * 0.75);
  var sw = w * 4, sh = h * 0.28;
  var sx = x - w * 1.5, sy = y;
  c.fillStyle = hit ? '#5a3030' : '#cc2020';
  GF.rr(c, sx, sy, sw, sh, 4 * GF.S); c.fill();
  c.strokeStyle = '#fff';
  c.lineWidth = 2 * GF.S;
  GF.rr(c, sx + 3 * GF.S, sy + 3 * GF.S, sw - 6 * GF.S, sh - 6 * GF.S, 2 * GF.S);
  c.stroke();
  c.fillStyle = '#fff';
  c.font = 'bold ' + (sh * 0.55) + 'px sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText('STOP', sx + sw / 2, sy + sh / 2 + 2);
}

function drawBrickWall(c, x, y, w, h, hit) {
  if (GF.sprites && GF.sprites.brick_wall) {
    c.save();
    if (hit) c.globalAlpha = 0.85;
    c.drawImage(GF.sprites.brick_wall, x, y, w, h);
    c.restore();
    return;
  }
  c.fillStyle = hit ? '#4a2a2a' : '#883820';
  c.fillRect(x, y, w, h);
  c.strokeStyle = 'rgba(0,0,0,0.5)';
  c.lineWidth = 1.5 * GF.S;
  var bh = 12 * GF.S;
  var bw = 22 * GF.S;
  for (var by = y; by < y + h; by += bh) {
    c.beginPath(); c.moveTo(x, by); c.lineTo(x + w, by); c.stroke();
    var off = ((by - y) / bh) % 2 === 0 ? 0 : bw / 2;
    for (var bxp = x + off; bxp < x + w; bxp += bw) {
      c.beginPath(); c.moveTo(bxp, by); c.lineTo(bxp, by + bh); c.stroke();
    }
  }
  c.fillStyle = '#3a1a10';
  c.fillRect(x, y, w, 4 * GF.S);
}

// Iter#5: coin draw — spinning gold disc with a rotating highlight band so the
// shape reads at any size. World-space x via wxs() to scroll with the camera.
function drawCoins() {
  var c = GF.ctx;
  var now = performance.now() / 1000;
  for (var i = 0; i < coins.length; i++) {
    var coin = coins[i];
    if (coin.taken) continue;
    var x = (coin.x - cameraX) * GF.S;
    var y = coin.y * GF.S;
    if (x < -40 || x > GF.W + 40) continue;
    var r = coin.r * GF.S;
    // Pseudo-3D spin: scale x by cos(spin) for a disc-on-edge look.
    var spin = now * 4 + coin.spinPhase;
    var xw = Math.max(0.18, Math.abs(Math.cos(spin)));
    // soft outer glow
    var gg = c.createRadialGradient(x, y, r * 0.3, x, y, r * 2.2);
    gg.addColorStop(0, 'rgba(255,220,90,0.55)');
    gg.addColorStop(1, 'rgba(255,180,40,0)');
    c.save();
    c.globalCompositeOperation = 'lighter';
    c.fillStyle = gg;
    c.beginPath();
    c.arc(x, y, r * 2.2, 0, Math.PI * 2);
    c.fill();
    c.restore();
    // body
    c.fillStyle = '#ffcf3a';
    c.beginPath();
    c.ellipse(x, y, r * xw, r, 0, 0, Math.PI * 2);
    c.fill();
    // rim
    c.strokeStyle = '#8a5a0a';
    c.lineWidth = 1.5 * GF.S;
    c.stroke();
    // inner shine band
    c.fillStyle = 'rgba(255,255,210,0.6)';
    c.beginPath();
    c.ellipse(x, y, r * xw * 0.55, r * 0.55, 0, 0, Math.PI * 2);
    c.fill();
    // tiny $ glyph when face-on
    if (xw > 0.7) {
      c.fillStyle = '#7a4a06';
      c.font = 'bold ' + (r * 1.1) + 'px sans-serif';
      c.textAlign = 'center';
      c.textBaseline = 'middle';
      c.fillText('★', x, y + 1);
    }
  }
}

function drawCops() {
  var c = GF.ctx;
  var x = (copX - cameraX) * GF.S;
  var groundY = GROUND_Y * GF.S;
  var w = 80 * GF.S;
  var h = 44 * GF.S;
  if (x < -w * 1.2) return;

  if (GF.sprites && GF.sprites.cop_car) {
    c.drawImage(GF.sprites.cop_car, x - w / 2, groundY - h, w, h);
  } else {
    c.fillStyle = '#1a1a2a';
    GF.rr(c, x - w / 2, groundY - h * 0.55, w, h * 0.55, 5 * GF.S); c.fill();
    c.fillStyle = '#0a0a1a';
    GF.rr(c, x - w * 0.4, groundY - h, w * 0.8, h * 0.5, 4 * GF.S); c.fill();
    c.fillStyle = '#3a6a8a';
    c.fillRect(x - w * 0.32, groundY - h * 0.92, w * 0.6, h * 0.32);
    c.fillStyle = '#000';
    c.beginPath(); c.arc(x - w * 0.3, groundY, h * 0.18, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(x + w * 0.3, groundY, h * 0.18, 0, Math.PI * 2); c.fill();
    var t = performance.now() / 130;
    var blueOn = Math.sin(t) > 0;
    c.fillStyle = blueOn ? '#4080ff' : '#ff4040';
    c.fillRect(x - w * 0.18, groundY - h * 1.05, w * 0.16, h * 0.12);
    c.fillStyle = blueOn ? '#ff4040' : '#4080ff';
    c.fillRect(x + w * 0.02, groundY - h * 1.05, w * 0.16, h * 0.12);
  }

  var pulse = (Math.sin(performance.now() / 100) + 1) / 2;
  c.globalAlpha = 0.4 + pulse * 0.4;
  var grad = c.createRadialGradient(x, groundY - h * 0.7, 4 * GF.S, x, groundY - h * 0.7, 90 * GF.S);
  grad.addColorStop(0, 'rgba(255,80,80,0.6)');
  grad.addColorStop(1, 'rgba(255,80,80,0)');
  c.fillStyle = grad;
  c.beginPath();
  c.arc(x, groundY - h * 0.7, 90 * GF.S, 0, Math.PI * 2);
  c.fill();
  c.globalAlpha = 1;
}

function drawTire() {
  var c = GF.ctx;
  var x = (tire.x - cameraX) * GF.S;
  var y = tire.y * GF.S;
  var r = tire.r * GF.S;

  c.fillStyle = 'rgba(0,0,0,0.45)';
  c.beginPath();
  c.ellipse(x, GROUND_Y * GF.S + 4 * GF.S, r * 0.9, r * 0.25, 0, 0, Math.PI * 2);
  c.fill();

  // Iter#4: outer glow ring for non-classic skins. Drawn before save/rotate so
  // it stays axis-aligned (no spinning glow halo).
  var skin = getSkinById(selectedSkin);
  if (skin && skin.glow) {
    var glowGrad = c.createRadialGradient(x, y, r * 0.6, x, y, r * 1.7);
    glowGrad.addColorStop(0, skin.glow);
    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    c.save();
    c.globalCompositeOperation = 'lighter';
    c.fillStyle = glowGrad;
    c.beginPath();
    c.arc(x, y, r * 1.7, 0, Math.PI * 2);
    c.fill();
    c.restore();
  }

  c.save();
  c.translate(x, y);
  c.rotate(tire.rot);

  if (GF.sprites && GF.sprites.tire) {
    c.drawImage(GF.sprites.tire, -r, -r, r * 2, r * 2);
    // Iter#4: tint overlay on the rotated sprite. 'source-atop' clips to the
    // already-drawn tire pixels so we don't tint the surrounding transparent
    // square. No-op for classic (tint=null).
    if (skin && skin.tint) {
      c.save();
      c.globalCompositeOperation = 'source-atop';
      c.fillStyle = skin.tint;
      c.beginPath();
      c.arc(0, 0, r, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }
  } else {
    c.fillStyle = '#1a1a1a';
    c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.fill();
    c.strokeStyle = '#3a3a3a';
    c.lineWidth = 3 * GF.S;
    c.beginPath(); c.arc(0, 0, r * 0.88, 0, Math.PI * 2); c.stroke();
    for (var k = 0; k < 12; k++) {
      var ang = (k / 12) * Math.PI * 2;
      c.beginPath();
      c.moveTo(Math.cos(ang) * r * 0.78, Math.sin(ang) * r * 0.78);
      c.lineTo(Math.cos(ang) * r * 0.92, Math.sin(ang) * r * 0.92);
      c.stroke();
    }
    c.fillStyle = '#888';
    c.beginPath(); c.arc(0, 0, r * 0.4, 0, Math.PI * 2); c.fill();
    c.fillStyle = '#444';
    c.beginPath(); c.arc(0, 0, r * 0.18, 0, Math.PI * 2); c.fill();
    c.strokeStyle = '#aaa';
    c.lineWidth = 2 * GF.S;
    for (var s = 0; s < 5; s++) {
      var sa = (s / 5) * Math.PI * 2;
      c.beginPath();
      c.moveTo(Math.cos(sa) * r * 0.18, Math.sin(sa) * r * 0.18);
      c.lineTo(Math.cos(sa) * r * 0.4, Math.sin(sa) * r * 0.4);
      c.stroke();
    }
    // Iter#4: tint over geometry fallback.
    if (skin && skin.tint) {
      c.save();
      c.globalCompositeOperation = 'source-atop';
      c.fillStyle = skin.tint;
      c.beginPath();
      c.arc(0, 0, r, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }
  }
  c.restore();

  if (bounceFlash > 0) {
    c.strokeStyle = 'rgba(255,207,96,' + bounceFlash + ')';
    c.lineWidth = 4 * GF.S;
    c.beginPath();
    c.arc(x, y, r + 6 * GF.S * (1 - bounceFlash), 0, Math.PI * 2);
    c.stroke();
    bounceFlash = Math.max(0, bounceFlash - 0.04);
  }
}

function drawHUD() {
  var c = GF.ctx;
  var fs = GF.clamp(18 * GF.S, 14, 26);
  c.font = 'bold ' + fs + 'px sans-serif';
  c.textBaseline = 'top';

  c.textAlign = 'left';
  c.fillStyle = '#fff';
  c.fillText(GF.t('distance') + ': ' + Math.floor(distance) + 'm', 14 * GF.S, 14 * GF.S);

  c.textAlign = 'right';
  c.fillStyle = '#ffcf60';
  c.fillText(GF.t('score') + ': ' + getDisplayScore(), GF.W - 14 * GF.S, 14 * GF.S);

  // Iter#1 (ladder1): live BEST under SCORE so the player has a target to chase.
  // Pulses gold for ~1.4s after they overtake it (bestBeatPulse > 0).
  if (best > 0) {
    var bestFs = fs * 0.78;
    c.font = 'bold ' + bestFs + 'px sans-serif';
    var beat = bestBeatPulse > 0;
    c.fillStyle = beat ? '#ffe080' : '#9ab';
    var label = GF.t('best') + ': ' + best;
    if (getDisplayScore() > best) label = '★ ' + label;
    c.fillText(label, GF.W - 14 * GF.S, 14 * GF.S + fs * 1.15);
  }

  // Iter#2 (ladder2): live projected daily rank pill — sits below BEST so the
  // player can see "you'd be #3 right now" in real time. Only renders once we
  // have a board cached and player has a positive score.
  if (liveRank && getDisplayScore() > 0) {
    var rankFs = fs * 0.72;
    c.font = 'bold ' + rankFs + 'px sans-serif';
    c.textAlign = 'right';
    // top-3 glow so the chase moment lands
    var top3 = liveRank <= 3;
    c.fillStyle = top3 ? '#48c9b0' : '#7a8aa0';
    var rankY = 14 * GF.S + fs * 1.15 + (best > 0 ? rankFs * 1.4 : 0);
    var rankLabel = (top3 ? '★ ' : '') + '#' + liveRank + ' ' + GF.t('leaderboard');
    c.fillText(rankLabel, GF.W - 14 * GF.S, rankY);
  }

  // Iter#5: coin counter on the LEFT under DIST. Small, gold, only shows once
  // the player has grabbed at least one in this run (avoids HUD noise on a
  // first-second tutorial moment).
  if (coinsCollectedRun > 0) {
    var coinFs = fs * 0.78;
    c.font = 'bold ' + coinFs + 'px sans-serif';
    c.textAlign = 'left';
    c.fillStyle = '#ffd84a';
    c.fillText('★ ' + coinsCollectedRun + ' ' + GF.t('coins'),
               14 * GF.S, 14 * GF.S + fs * 1.15);
  }

  if (combo > 0) {
    c.textAlign = 'center';
    var t = comboTimer / 1.5;
    var pulse = 1 + (1 - t) * 0.2;
    c.font = 'bold ' + (fs * 1.4 * pulse) + 'px sans-serif';
    c.fillStyle = combo >= 5 ? '#ff4080' : combo >= 3 ? '#ffcf60' : '#fff';
    c.fillText('x' + combo + ' ' + GF.t('bounce'), GF.W / 2, 14 * GF.S);
    var barW = 140 * GF.S;
    var barH = 6 * GF.S;
    var bx = GF.W / 2 - barW / 2;
    var by = 14 * GF.S + fs * 1.5;
    c.fillStyle = 'rgba(255,255,255,0.15)';
    c.fillRect(bx, by, barW, barH);
    c.fillStyle = combo >= 5 ? '#ff4080' : '#ffcf60';
    c.fillRect(bx, by, barW * t, barH);
  }
}

function drawCopPanicVignette() {
  if (copPanic <= 0) return;
  var c = GF.ctx;
  // Stronger vignette — was 0.45 max, now 0.75 with tighter inner radius.
  // Player needs to FEEL the wall closing in.
  var pulse = (0.6 + 0.4 * Math.sin(performance.now() / 80));
  var alpha = copPanic * 0.75 * pulse;
  var grad = c.createRadialGradient(GF.W / 2, GF.H / 2, GF.W * 0.18, GF.W / 2, GF.H / 2, GF.W * 0.65);
  grad.addColorStop(0, 'rgba(255,30,30,0)');
  grad.addColorStop(1, 'rgba(255,30,30,' + alpha + ')');
  c.fillStyle = grad;
  c.fillRect(0, 0, GF.W, GF.H);

  // Flashing DANGER label when cops are getting close — gives player a
  // clear "do something" signal before they actually die. Localised.
  if (copPanic > 0.5) {
    var flash = (Math.sin(performance.now() / 120) + 1) * 0.5;  // 0..1
    var fs = GF.clamp(36 * GF.S, 28, 56) * (1 + (copPanic - 0.5) * 0.3);
    c.font = 'bold ' + fs + 'px sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillStyle = 'rgba(255,' + Math.floor(60 + flash * 60) + ',60,' + (0.6 + 0.4 * flash) * copPanic + ')';
    c.fillText(GF.lang === 'ru' ? 'СТОП!' : 'DANGER!', GF.W / 2, GF.H * 0.18);
  }
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'tire_escape',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('tire_escape_best') || '0') || 0; } catch (e) {}
    try { playerName = localStorage.getItem('tire_escape_name') || ''; } catch (e) {}
    // Iter#4: restore saved skin selection + last-known top unlock so we only
    // fire the unlock toast when a NEW tier crosses, not on every reload.
    try {
      var savedSkin = localStorage.getItem('tire_escape_skin');
      if (savedSkin && getSkinById(savedSkin) && isSkinUnlocked(getSkinById(savedSkin))) selectedSkin = savedSkin;
    } catch (e) {}
    try {
      lastUnlockedSkinId = localStorage.getItem('tire_escape_unlocked_top') || highestUnlockedSkinId();
    } catch (e) { lastUnlockedSkinId = highestUnlockedSkinId(); }
    buildBg();
    gs = 'MENU';
    // Iter#2: prime the leaderboard so first-paint of game-over already has
    // top-5 ready, and live-rank pill works on the very first run.
    try { fetchLeaderboard(); } catch (e) {}
  },
  onUpdate: update,
  onDraw: draw,
});


// Expose game state for post-build-tester gate (deep_playtest.js)
if (window.GF && GF.exposeState) GF.exposeState(function() {
  return {
    gs:            typeof gs            !== 'undefined' ? gs            : null,
    score:         typeof score         !== 'undefined' ? score         : null,
    round:         typeof round         !== 'undefined' ? round         : null,
    roundNum:      typeof roundNum      !== 'undefined' ? roundNum      : null,
    level:         typeof level         !== 'undefined' ? level         : null,
    lives:         typeof lives         !== 'undefined' ? lives         : null,
    distance:      typeof distance      !== 'undefined' ? distance      : null,
    combo:         typeof combo         !== 'undefined' ? combo         : null,
    movesLeft:     typeof movesLeft     !== 'undefined' ? movesLeft     : null,
    crumbsCleaned: typeof crumbsCleaned !== 'undefined' ? crumbsCleaned : null,
    streak:        typeof streak        !== 'undefined' ? streak        : null,
    heightCount:   typeof heightCount   !== 'undefined' ? heightCount   : null,
    strikes:       typeof strikes       !== 'undefined' ? strikes       : null,
    best:          typeof best          !== 'undefined' ? best          : null,
    wasNewBest:    typeof wasNewBest    !== 'undefined' ? wasNewBest    : null,
    bestBeatLatched: typeof bestBeatLatched !== 'undefined' ? bestBeatLatched : null,
    liveRank:      typeof liveRank      !== 'undefined' ? liveRank      : null,
    myRank:        typeof myRank        !== 'undefined' ? myRank        : null,
    lbFetched:     typeof lbFetched     !== 'undefined' ? lbFetched     : null,
    selectedSkin:  typeof selectedSkin  !== 'undefined' ? selectedSkin  : null,
    skinUnlockToastId: typeof skinUnlockToastId !== 'undefined' ? skinUnlockToastId : null,
    coinsCollectedRun: typeof coinsCollectedRun !== 'undefined' ? coinsCollectedRun : null,
    coinsActive:   typeof coins !== 'undefined' && coins ? coins.length : null
  };
});
})();
