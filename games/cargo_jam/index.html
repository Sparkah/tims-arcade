<script>
(function() {
'use strict';

// ── LOCALISED STRINGS (Yandex 8.2.3 — both languages required) ───────────
var STRINGS = {

    coach_rainbow: 'Радужный ящик считается ЛЮБЫМ цветом в лотке',

  },
};

// AI sprites (loaded on boot; procedural fallback if missing).
var SPRITE_NAMES = ['crate_red','crate_blue','crate_yellow','crate_green','crate_purple','dock_bg'];

// ── TUNABLES (DESIGN.md) ─────────────────────────────────────────────────
var TRAY_SLOTS   = 7;
var MATCH_N      = 3;
var COLORS_START = 4;
var COLORS_MAX   = 5;
var TOTAL_LEVELS = 24;
var MISS_2STAR   = 2;
var COMBO_WINDOW = 2.4;
var SLIDE_SPEED  = 18;   // cells/sec
var BOARD_W_BASE = 6;
var BOARD_H_BASE = 8;
var BOMB_RADIUS  = 1;

// colour palette (saturated, readable)
var PAL = [
  { key:'red',    fill:'#e8453c', light:'#ff7a6e', dark:'#a32018', spr:'crate_red' },
  { key:'blue',   fill:'#2f7be8', light:'#6fb0ff', dark:'#184a96', spr:'crate_blue' },
  { key:'yellow', fill:'#f2b417', light:'#ffd766', dark:'#b07f00', spr:'crate_yellow' },
  { key:'green',  fill:'#37b24a', light:'#74e07f', dark:'#1f7a2c', spr:'crate_green' },
  { key:'purple', fill:'#8e44d8', light:'#c089f5', dark:'#5b228f', spr:'crate_purple' },
];
var RAINBOW_KEY = 'rainbow';
function palByKey(k) { for (var i = 0; i < PAL.length; i++) if (PAL[i].key === k) return PAL[i]; return PAL[0]; }

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';   // MENU(level map) | PLAYING | LEVELCLEAR | LEVELFAIL | WIN | PAUSE
var level = 1;
var endlessMode = false;
var endlessWave = 0;
var bestEndless = 0;
var unlocked = 1;
var stars = {};                 // level -> 0..3
var grid = [];                  // [r][c] -> crate id or null
var crates = {};                // id -> crate
var nextId = 1;
var rows = BOARD_H_BASE, cols = BOARD_W_BASE;
var tray = [];                  // [{key, type, colorIdx}]
var cratesLeft = 0;
var trayMiss = 0;
var combo = 0, comboTimer = 0, bestCombo = 0;
var earnedStars = 0;
var moves = 0;                  // total successful crate taps (input-sensitive,
                                // bumped SYNCHRONOUSLY so QA probes see a tap land)
var anims = [];                 // sliding crate animations
var pops = [];                  // tray ship pop fx
var screenShake = 0;
var seenTut = false;
var slideLock = false;
var helpOpen = false;
var conveyorDir = {};
var levelColorsUsed = [];
var btn = {};
var mapNodeRects = [];

// coach (hands-on, action-gated)
var coachStep = -1, coachKey = '', coachMsg = '', coachTarget = null, coachQueue = [];
var pulseT = 0;

// ── LEVEL SPEC ───────────────────────────────────────────────────────────
function levelSpec(n) {
  var band = Math.min(7, 1 + Math.floor((n - 1) / 4));
  var c = Math.min(7, BOARD_W_BASE + Math.floor((n - 1) / 6));
  var r = Math.min(10, BOARD_H_BASE + Math.floor((n - 1) / 4));
  var colors = Math.min(COLORS_MAX, COLORS_START + (n >= 6 ? 1 : 0));
  var fill = Math.min(0.76, 0.40 + n * 0.014);
  var types = ['normal'];
  if (n >= 5)  types.push('ice');
  if (n >= 7)  types.push('long');
  if (n >= 9)  types.push('chain');
  if (n >= 11) types.push('rainbow');
  if (n >= 13) types.push('bomb');
  var conveyorRows = (n >= 17) ? (n >= 21 ? 2 : 1) : 0;
  var specialChance = (n >= 5) ? Math.min(0.34, 0.06 + (n - 5) * 0.022) : 0;
  return { cols:c, rows:r, colors:colors, fill:fill, types:types,
           conveyorRows:conveyorRows, specialChance:specialChance, band:band };
}
function endlessSpec(w) {
  var c = Math.min(7, 6 + (w % 2));
  var r = Math.min(11, 8 + Math.floor(w / 2));
  var colors = Math.min(COLORS_MAX, 4 + Math.floor(w / 3));
  var types = ['normal','ice'];
  if (w >= 1) types.push('long');
  if (w >= 2) types.push('chain','rainbow');
  if (w >= 3) types.push('bomb');
  var conveyorRows = w >= 4 ? 1 + Math.floor((w - 4) / 3) : 0;
  return { cols:c, rows:r, colors:colors, fill:Math.min(0.8, 0.5 + w * 0.03),
           types:types, conveyorRows:conveyorRows,
           specialChance:Math.min(0.4, 0.1 + w * 0.03), band:7 };
}

// deterministic RNG so a level looks the same on retry
var _seed = 1;
function srand() { _seed = (_seed * 1103515245 + 12345) & 0x7fffffff; return _seed / 0x7fffffff; }
function seedFor() { return endlessMode ? ((9001 + endlessWave * 7919) >>> 0) : ((level * 2654435761) % 0x7fffffff); }

// ── BUILD LEVEL ──────────────────────────────────────────────────────────
var DIRS = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
var DIRNAMES = ['up','down','left','right'];

function buildLevel() {
  var spec = endlessMode ? endlessSpec(endlessWave) : levelSpec(level);
  cols = spec.cols; rows = spec.rows;
  grid = []; crates = {}; nextId = 1; tray = []; anims = []; pops = [];
  trayMiss = 0; combo = 0; comboTimer = 0; earnedStars = 0; slideLock = false; moves = 0;
  _seed = (seedFor() || 1) >>> 0;
  for (var r0 = 0; r0 < rows; r0++) { grid[r0] = []; for (var c0 = 0; c0 < cols; c0++) grid[r0][c0] = null; }

  levelColorsUsed = [];
  for (var i = 0; i < spec.colors; i++) levelColorsUsed.push(i);

  // conveyor rows (middle band)
  conveyorDir = {};
  if (spec.conveyorRows > 0) {
    var midStart = Math.floor(rows * 0.32);
    for (var k = 0; k < spec.conveyorRows; k++) {
      var rr2 = midStart + k * 3;
      if (rr2 > 0 && rr2 < rows - 1) conveyorDir[rr2] = (srand() < 0.5 ? 'left' : 'right');
    }
  }

  // cell order, shuffled
  var cells = [];
  for (var rr3 = 0; rr3 < rows; rr3++) for (var cc = 0; cc < cols; cc++) cells.push([cc, rr3]);
  for (var s = cells.length - 1; s > 0; s--) { var j2 = Math.floor(srand() * (s + 1)); var tmp = cells[s]; cells[s] = cells[j2]; cells[j2] = tmp; }

  var target = Math.floor(rows * cols * spec.fill);
  target = Math.max(MATCH_N * spec.colors, Math.floor(target / MATCH_N) * MATCH_N);
  target = Math.min(target, rows * cols - 2);

  // colour bag: triples per colour so a perfect clear exists
  var bag = [];
  var per = Math.max(MATCH_N, Math.floor(target / spec.colors / MATCH_N) * MATCH_N);
  for (var ci = 0; ci < spec.colors; ci++) for (var t2 = 0; t2 < per; t2++) bag.push(ci);
  while (bag.length < target) { var col = Math.floor(srand() * spec.colors); bag.push(col); bag.push(col); bag.push(col); }
  bag.length = Math.floor(bag.length / MATCH_N) * MATCH_N;
  for (var b = bag.length - 1; b > 0; b--) { var j3 = Math.floor(srand() * (b + 1)); var tb = bag[b]; bag[b] = bag[j3]; bag[j3] = tb; }

  var occupied = {};
  function occ(x, y) { return occupied[x + ',' + y]; }
  function setOcc(x, y) { occupied[x + ',' + y] = 1; }

  var placedCount = 0, ci2 = 0;
  var longCount = 0, chainPairs = 0, rainbowCount = 0;
  var maxLong = spec.types.indexOf('long') >= 0 ? Math.max(1, Math.floor(target * 0.08)) : 0;
  var maxChain = spec.types.indexOf('chain') >= 0 ? Math.max(1, Math.floor(target * 0.06)) : 0;
  var maxRainbow = spec.types.indexOf('rainbow') >= 0 ? Math.max(1, Math.floor(target * 0.05)) : 0;

  for (var ce = 0; ce < cells.length && placedCount < target; ce++) {
    var cx = cells[ce][0], cy = cells[ce][1];
    if (occ(cx, cy)) continue;
    var colorIdx = bag[ci2 % bag.length]; ci2++;
    var roll = srand();

    // long crate (horizontal pair) — never on a conveyor row
    if (longCount < maxLong && !conveyorDir[cy] && roll < spec.specialChance * 0.5 && cx + 1 < cols && !occ(cx + 1, cy) && placedCount + 1 < target) {
      makeCrate(colorIdx, cx, cy, 'long', 2, 1);
      setOcc(cx, cy); setOcc(cx + 1, cy);
      longCount++; placedCount += 2; continue;
    }
    // chained pair (same colour, orthogonal neighbour)
    if (chainPairs < maxChain && roll < spec.specialChance * 0.6 && placedCount + 1 < target) {
      var nd = DIRNAMES.slice();
      for (var z = nd.length - 1; z > 0; z--) { var jj = Math.floor(srand() * (z + 1)); var tt = nd[z]; nd[z] = nd[jj]; nd[jj] = tt; }
      var nb = null;
      for (var di = 0; di < nd.length; di++) { var d = DIRS[nd[di]]; var nx = cx + d[0], ny = cy + d[1]; if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !occ(nx, ny)) { nb = [nx, ny]; break; } }
      if (nb) {
        var idA = makeCrate(colorIdx, cx, cy, 'chain', 1, 1);
        var idB = makeCrate(colorIdx, nb[0], nb[1], 'chain', 1, 1);
        crates[idA].chainWith = idB; crates[idB].chainWith = idA;
        setOcc(cx, cy); setOcc(nb[0], nb[1]);
        chainPairs++; placedCount += 2; continue;
      }
    }
    // rainbow wildcard
    if (rainbowCount < maxRainbow && roll < spec.specialChance * 0.4) {
      makeCrate(-1, cx, cy, 'rainbow', 1, 1);
      setOcc(cx, cy); rainbowCount++; placedCount++; continue;
    }
    var typ = 'normal';
    if (spec.types.indexOf('bomb') >= 0 && roll < spec.specialChance * 0.5) typ = 'bomb';
    else if (spec.types.indexOf('ice') >= 0 && roll < spec.specialChance) typ = 'ice';
    makeCrate(colorIdx, cx, cy, typ, 1, 1);
    setOcc(cx, cy); placedCount++;
  }

  rebuildGrid();
  ensureSolvable();   // GUARANTEE the board is fully clearable
  rebuildGrid();
  cratesLeft = Object.keys(crates).length;
}

function makeCrate(colorIdx, x, y, type, w, h) {
  var id = 'crate_' + (nextId++);
  var key = colorIdx < 0 ? RAINBOW_KEY : PAL[colorIdx].key;
  crates[id] = {
    id: id, colorIdx: colorIdx, key: key, type: type,
    x: x, y: y, w: w || 1, h: h || 1,
    dir: 'up', cracked: type !== 'ice', chainWith: null, shake: 0,
  };
  return id;
}

function rebuildGrid() {
  for (var r = 0; r < rows; r++) for (var c = 0; c < cols; c++) grid[r][c] = null;
  for (var id in crates) {
    var cr = crates[id];
    for (var dy = 0; dy < cr.h; dy++) for (var dx = 0; dx < cr.w; dx++) {
      var gx = cr.x + dx, gy = cr.y + dy;
      if (gx >= 0 && gx < cols && gy >= 0 && gy < rows) grid[gy][gx] = id;
    }
  }
}

// bias arrow toward nearest edge, with variety
function assignArrows() {
  for (var id in crates) {
    var cr = crates[id];
    var distL = cr.x, distR = cols - (cr.x + cr.w), distU = cr.y, distD = rows - (cr.y + cr.h);
    var opts;
    if (cr.w > cr.h) opts = [['left', distL], ['right', distR]];
    else if (cr.h > cr.w) opts = [['up', distU], ['down', distD]];
    else opts = [['left', distL], ['right', distR], ['up', distU], ['down', distD]];
    opts.sort(function (a, b) { return a[1] - b[1]; });
    cr.dir = (srand() < 0.72) ? opts[0][0] : opts[Math.floor(srand() * opts.length)][0];
  }
}

// Conservative solvability check used to GUARANTEE every shipped board is
// clearable. Clones the crate set and repeatedly removes any crate that can
// currently slide off the board (exit), accounting for slide-aside moves too:
// a crate that can slide to a new resting cell opens space, so we also apply
// blocking slides when they change the layout. Returns the count of crates that
// remain permanently stuck (0 == fully solvable).
function countStuck() {
  // build a lightweight working grid from current crates
  var W = cols, H = rows;
  var g = []; for (var r = 0; r < H; r++) { g[r] = []; for (var c = 0; c < W; c++) g[r][c] = null; }
  var work = {};
  for (var id in crates) {
    var cr = crates[id];
    work[id] = { id: id, x: cr.x, y: cr.y, w: cr.w, h: cr.h, dir: cr.dir };
    for (var dy = 0; dy < cr.h; dy++) for (var dx = 0; dx < cr.w; dx++) { var gx = cr.x + dx, gy = cr.y + dy; if (gx >= 0 && gx < W && gy >= 0 && gy < H) g[gy][gx] = id; }
  }
  function slideOf(c) {
    var d = DIRS[c.dir], x = c.x, y = c.y;
    while (true) {
      var tx = x + d[0], ty = y + d[1], clear = true, off = false;
      for (var yy = 0; yy < c.h; yy++) for (var xx = 0; xx < c.w; xx++) { var gx = tx + xx, gy = ty + yy; if (gx < 0 || gx >= W || gy < 0 || gy >= H) off = true; else { var o = g[gy][gx]; if (o && o !== c.id) clear = false; } }
      if (off) return { exits: true, nx: x, ny: y };
      if (!clear) return { exits: false, nx: x, ny: y };
      x = tx; y = ty;
    }
  }
  function place(c, on) { for (var yy = 0; yy < c.h; yy++) for (var xx = 0; xx < c.w; xx++) { var gx = c.x + xx, gy = c.y + yy; if (gx >= 0 && gx < W && gy >= 0 && gy < H) g[gy][gx] = on ? c.id : null; } }
  var changed = true, guard = 0;
  while (changed && guard++ < 4000) {
    changed = false;
    for (var k in work) {
      var c = work[k]; var res = slideOf(c);
      if (res.exits) { place(c, false); delete work[k]; changed = true; }
      else if (res.nx !== c.x || res.ny !== c.y) { place(c, false); c.x = res.nx; c.y = res.ny; place(c, true); changed = true; }
    }
  }
  return Object.keys(work).length;
}

// Try several arrow assignments; keep the first fully-solvable one. If none, run
// a repair pass that re-points each stuck crate toward its clearest edge.
function ensureSolvable() {
  var best = null, bestStuck = 1e9;
  for (var attempt = 0; attempt < 12; attempt++) {
    assignArrows();
    var stuck = countStuck();
    if (stuck < bestStuck) { bestStuck = stuck; best = snapshotDirs(); }
    if (stuck === 0) return;
  }
  // restore best attempt, then repair remaining stuck crates
  if (best) restoreDirs(best);
  for (var pass = 0; pass < 6; pass++) {
    if (countStuck() === 0) return;
    repairStuck();
  }
}
function snapshotDirs() { var s = {}; for (var id in crates) s[id] = crates[id].dir; return s; }
function restoreDirs(s) { for (var id in crates) if (s[id]) crates[id].dir = s[id]; }

// Re-point crates that the solver leaves stuck toward whichever edge currently
// has the clearest path (fewest crates between it and the edge).
function repairStuck() {
  // recompute which crates are stuck on a fresh sim, then fix them
  var stuckIds = stuckSet();
  for (var i = 0; i < stuckIds.length; i++) {
    var cr = crates[stuckIds[i]];
    var dirsTry = cr.w > cr.h ? ['left', 'right'] : (cr.h > cr.w ? ['up', 'down'] : ['left', 'right', 'up', 'down']);
    var bestDir = cr.dir, bestBlock = 1e9;
    for (var d = 0; d < dirsTry.length; d++) {
      var blocked = blockersToEdge(cr, dirsTry[d]);
      if (blocked < bestBlock) { bestBlock = blocked; bestDir = dirsTry[d]; }
    }
    cr.dir = bestDir;
  }
  rebuildGrid();
}
function stuckSet() {
  // re-run countStuck but capture the survivors' ids
  var W = cols, H = rows, g = [];
  for (var r = 0; r < H; r++) { g[r] = []; for (var c = 0; c < W; c++) g[r][c] = null; }
  var work = {};
  for (var id in crates) { var cr = crates[id]; work[id] = { id: id, x: cr.x, y: cr.y, w: cr.w, h: cr.h, dir: cr.dir }; for (var dy = 0; dy < cr.h; dy++) for (var dx = 0; dx < cr.w; dx++) { var gx = cr.x + dx, gy = cr.y + dy; if (gx >= 0 && gx < W && gy >= 0 && gy < H) g[gy][gx] = id; } }
  function slideOf(c) { var d = DIRS[c.dir], x = c.x, y = c.y; while (true) { var tx = x + d[0], ty = y + d[1], clear = true, off = false; for (var yy = 0; yy < c.h; yy++) for (var xx = 0; xx < c.w; xx++) { var gx = tx + xx, gy = ty + yy; if (gx < 0 || gx >= W || gy < 0 || gy >= H) off = true; else { var o = g[gy][gx]; if (o && o !== c.id) clear = false; } } if (off) return { exits: true, nx: x, ny: y }; if (!clear) return { exits: false, nx: x, ny: y }; x = tx; y = ty; } }
  function place(c, on) { for (var yy = 0; yy < c.h; yy++) for (var xx = 0; xx < c.w; xx++) { var gx = c.x + xx, gy = c.y + yy; if (gx >= 0 && gx < W && gy >= 0 && gy < H) g[gy][gx] = on ? c.id : null; } }
  var changed = true, guard = 0;
  while (changed && guard++ < 4000) { changed = false; for (var k in work) { var c = work[k]; var res = slideOf(c); if (res.exits) { place(c, false); delete work[k]; changed = true; } else if (res.nx !== c.x || res.ny !== c.y) { place(c, false); c.x = res.nx; c.y = res.ny; place(c, true); changed = true; } } }
  return Object.keys(work);
}
function blockersToEdge(cr, dir) {
  var d = DIRS[dir], n = 0, x = cr.x, y = cr.y;
  while (true) {
    var tx = x + d[0], ty = y + d[1], off = false;
    for (var yy = 0; yy < cr.h; yy++) for (var xx = 0; xx < cr.w; xx++) { var gx = tx + xx, gy = ty + yy; if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) off = true; else { var o = grid[gy][gx]; if (o && o !== cr.id) n++; } }
    if (off) return n;
    x = tx; y = ty;
  }
}

// ── SLIDE LOGIC ──────────────────────────────────────────────────────────
function computeSlide(cr) {
  var d = DIRS[cr.dir];
  var x = cr.x, y = cr.y;
  while (true) {
    var tx = x + d[0], ty = y + d[1];
    var clear = true, offBoard = false;
    for (var dy = 0; dy < cr.h; dy++) for (var dx = 0; dx < cr.w; dx++) {
      var gx = tx + dx, gy = ty + dy;
      if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) offBoard = true;
      else { var occId = grid[gy][gx]; if (occId && occId !== cr.id) clear = false; }
    }
    if (offBoard) return { exits: true, nx: x, ny: y };
    if (!clear) return { exits: false, nx: x, ny: y };
    x = tx; y = ty;
  }
}

function tapCrate(id) {
  if (slideLock || gs !== 'PLAYING') return false;
  var cr = crates[id];
  if (!cr) return false;
  if (cr.type === 'ice' && !cr.cracked) {
    cr.cracked = true; moves++;
    GF.sfx('tap'); GF.spawnParticles(cellCX(cr.x + cr.w / 2 - 0.5), cellCY(cr.y + cr.h / 2 - 0.5), '#bfe6ff', 8);
    screenShake = Math.min(screenShake + 3, 8);
    if (coachStep >= 0 && coachKey === 'ice') advanceCoach();
    return true;
  }
  var res = computeSlide(cr);
  if (res.exits) { moves++; startSlideExit(cr); return true; }
  if (res.nx !== cr.x || res.ny !== cr.y) { moves++; startSlideTo(cr, res.nx, res.ny); return true; }
  cr.shake = 0.28; GF.sfx('hit');
  return false;
}

function cellCX(cx) { return board.x + (cx + 0.5) * CELL; }
function cellCY(cy) { return board.y + (cy + 0.5) * CELL; }

function startSlideTo(cr, nx, ny) {
  slideLock = true;
  var fromX = cr.x, fromY = cr.y;
  cr.x = nx; cr.y = ny; rebuildGrid();
  var dur = Math.max(0.07, Math.min((Math.abs(nx - fromX) + Math.abs(ny - fromY)) / SLIDE_SPEED, 0.4));
  anims.push({ cr: cr, fx: fromX, fy: fromY, tx: nx, ty: ny, t: 0, dur: dur, exit: false });
  GF.sfx('click');
}
function startSlideExit(cr) {
  slideLock = true;
  cr.bombFrom = { x: cr.x + cr.w / 2 - 0.5, y: cr.y + cr.h / 2 - 0.5 };
  delete crates[cr.id]; rebuildGrid();
  var d = DIRS[cr.dir];
  var ox = cr.x + d[0] * (cols + 3), oy = cr.y + d[1] * (rows + 3);
  anims.push({ cr: cr, fx: cr.x, fy: cr.y, tx: ox, ty: oy, t: 0, dur: 0.26, exit: true });
  GF.sfx('pickup');
}

function landInTray(cr) {
  tray.push({ key: cr.key, type: cr.type, colorIdx: cr.colorIdx, bombFrom: cr.bombFrom });
  resolveTray();
}

function resolveTray() {
  var matched = findTrayMatch();
  if (matched) {
    var bombLaunch = [];
    for (var m = 0; m < matched.length; m++) { var it = tray[matched[m]]; if (it.type === 'bomb' && it.bombFrom) bombLaunch.push(it.bombFrom); }
    matched.sort(function (a, b) { return b - a; });
    for (var k = 0; k < matched.length; k++) {
      var idx = matched[k];
      pops.push({ x: traySlotX(idx) + traySlotW() / 2, y: trayY() + trayH() / 2, key: tray[idx].key, t: 0 });
      tray.splice(idx, 1);
    }
    combo++; if (combo > bestCombo) bestCombo = combo; comboTimer = COMBO_WINDOW;
    GF.sfx('reward');
    if (combo >= 2) { GF.sfx('coin'); GF.spawnFloat(GF.W / 2, GF.H * 0.30, GF.t('combo') + ' x' + combo, '#ffd24a'); }
    screenShake = Math.min(screenShake + 5, 12);
    for (var bl = 0; bl < bombLaunch.length; bl++) detonate(bombLaunch[bl].x, bombLaunch[bl].y);
    if (coachStep >= 0 && coachKey === 'match') advanceCoach();
    return true;
  }
  // A "miss" = letting the tray crowd into the danger zone (6+/7) without
  // shipping — i.e. sloppy ordering. Tidy play (ship triples before crowding)
  // keeps trayMiss at 0 → 3 stars. Landing a crate while already at <=5 is fine.
  if (tray.length >= TRAY_SLOTS - 1) trayMiss++;
  combo = 0;
  return false;
}

function findTrayMatch() {
  var byColor = {}, rainbows = [];
  for (var i = 0; i < tray.length; i++) {
    if (tray[i].key === RAINBOW_KEY) rainbows.push(i);
    else (byColor[tray[i].key] = byColor[tray[i].key] || []).push(i);
  }
  for (var k in byColor) if (byColor[k].length >= MATCH_N) return byColor[k].slice(0, MATCH_N);
  for (var k2 in byColor) {
    var need = MATCH_N - byColor[k2].length;
    if (need > 0 && need <= rainbows.length) return byColor[k2].concat(rainbows.slice(0, need)).slice(0, MATCH_N);
  }
  if (rainbows.length >= MATCH_N) return rainbows.slice(0, MATCH_N);
  return null;
}

// strategic ranking of exitable crates (used by the autoplay BOT contract so the
// progression probe drives the loop like a thoughtful player: complete triples,
// don't flood the tray with new colours). Returns ids best-first.
function rankExitableCrates() {
  // tray colour counts (rainbow = wild)
  var cnt = {}, wild = 0;
  for (var i = 0; i < tray.length; i++) { if (tray[i].key === RAINBOW_KEY) wild++; else cnt[tray[i].key] = (cnt[tray[i].key] || 0) + 1; }
  var list = [];
  for (var id in crates) {
    var cr = crates[id];
    var exits = false;
    if (cr.type === 'ice' && !cr.cracked) exits = true; // tappable (cracks)
    else exits = computeSlide(cr).exits;
    if (!exits) continue;
    var k = cr.key, have = (k === RAINBOW_KEY) ? 0 : (cnt[k] || 0);
    var score;
    if (k === RAINBOW_KEY) score = 50;                 // wildcard: flexible, mid value
    else if (have + 1 >= MATCH_N) score = 100;         // completes a triple now
    else if (have >= 1) score = 70;                    // advances an existing colour
    else {
      // a brand-new colour: only OK if the tray has room; penalise when crowded
      score = (tray.length >= TRAY_SLOTS - 2) ? -20 : 30;
    }
    if (cr.type === 'bomb' && have + 1 >= MATCH_N) score += 15; // shipping a bomb clears board
    list.push({ id: id, score: score });
  }
  list.sort(function (a, b) { return b.score - a.score; });
  return list;
}

function detonate(bx, by) {
  GF.spawnParticles(cellCX(bx), cellCY(by), '#ffb347', 26);
  screenShake = Math.min(screenShake + 7, 14);
  var rm = [];
  for (var id in crates) {
    var cr = crates[id];
    var ccx = cr.x + cr.w / 2 - 0.5, ccy = cr.y + cr.h / 2 - 0.5;
    if (Math.abs(ccx - bx) <= BOMB_RADIUS + 0.5 && Math.abs(ccy - by) <= BOMB_RADIUS + 0.5) rm.push(id);
  }
  for (var t = 0; t < rm.length; t++) { var c = crates[rm[t]]; GF.spawnParticles(cellCX(c.x), cellCY(c.y), colorOf(c).light, 8); delete crates[rm[t]]; }
  rebuildGrid();
}
function colorOf(cr) { return cr.colorIdx < 0 ? { fill:'#cfcfcf', light:'#ffffff', dark:'#888' } : PAL[cr.colorIdx]; }

function afterMove() {
  cratesLeft = Object.keys(crates).length;
  if (cratesLeft === 0) { winLevel(); return; }
  applyConveyors();
  if (tray.length >= TRAY_SLOTS && !findTrayMatch()) failLevel();
}

function applyConveyors() {
  var keys = Object.keys(conveyorDir);
  if (!keys.length) return;
  for (var ki = 0; ki < keys.length; ki++) {
    var row = +keys[ki], dir = conveyorDir[row], dx = dir === 'left' ? -1 : 1;
    var list = [];
    for (var id in crates) { var cr = crates[id]; if (cr.y === row && cr.h === 1) list.push(cr); }
    list.sort(function (a, b) { return dir === 'left' ? a.x - b.x : b.x - a.x; });
    for (var li = 0; li < list.length; li++) {
      var cr2 = list[li], nx = cr2.x + dx, ok = true;
      for (var w = 0; w < cr2.w; w++) {
        var gx = nx + w;
        if (gx < 0 || gx >= cols) { ok = false; break; }
        var occId = grid[row][gx]; if (occId && occId !== cr2.id) { ok = false; break; }
      }
      if (ok) { cr2.x = nx; rebuildGrid(); }
    }
  }
}

// ── WIN / FAIL ───────────────────────────────────────────────────────────
function computeStars() { return trayMiss === 0 ? 3 : (trayMiss <= MISS_2STAR ? 2 : 1); }

function winLevel() {
  earnedStars = computeStars();
  if (endlessMode) {
    endlessWave++;
    if (endlessWave > bestEndless) bestEndless = endlessWave;
    GF.sfx('win'); GF.happytimeSafe();
    gs = 'LEVELCLEAR'; GF.gameEnded && GF.gameEnded(); persistMeta(); GF.saveRun();
    return;
  }
  var prev = stars[level] || 0;
  if (earnedStars > prev) stars[level] = earnedStars;
  if (level >= unlocked && level < TOTAL_LEVELS) unlocked = level + 1;
  GF.sfx('win'); GF.happytimeSafe();
  if (level >= TOTAL_LEVELS) { gs = 'WIN'; if (unlocked <= TOTAL_LEVELS) unlocked = TOTAL_LEVELS + 1; }
  else gs = 'LEVELCLEAR';
  GF.gameEnded && GF.gameEnded(); persistMeta(); GF.saveRun();
}

function failLevel() {
  gs = 'LEVELFAIL'; combo = 0; GF.sfx('lose'); screenShake = 14;
  GF.gameEnded && GF.gameEnded(); GF.saveRun();
}

// ── COACH ────────────────────────────────────────────────────────────────
function startCoach() {
  coachQueue = [];
  if (!seenTut && level === 1 && !endlessMode) { coachQueue.push('tap'); coachQueue.push('match'); }
  if (!endlessMode) {
    var dbk = 'cargo_jam_coach_';
    function once(flag, key) { var s = false; try { s = localStorage.getItem(dbk + flag) === '1'; } catch (e) {} if (!s) coachQueue.push(key); }
    if (level === 5) once('ice', 'ice');
    if (level === 7) once('long', 'long');
    if (level === 9) once('chain', 'chain');
    if (level === 11) once('rainbow', 'rainbow');
    if (level === 13) once('bomb', 'bomb');
    if (level === 17) once('conveyor', 'conveyor');
  }
  coachStep = coachQueue.length ? 0 : -1;
  if (coachStep >= 0) setCoach(coachQueue[0]);
  else { coachKey = ''; coachMsg = ''; coachTarget = null; }
}
function setCoach(key) { coachKey = key; coachMsg = GF.t('coach_' + key); coachTarget = pickCoachTarget(key); }
function advanceCoach() {
  var dbk = 'cargo_jam_coach_';
  if (['ice','long','chain','rainbow','bomb','conveyor'].indexOf(coachKey) >= 0) { try { localStorage.setItem(dbk + coachKey, '1'); } catch (e) {} }
  coachStep++;
  if (coachStep >= coachQueue.length) {
    coachStep = -1; coachKey = ''; coachMsg = ''; coachTarget = null;
    seenTut = true; try { localStorage.setItem('cargo_jam_seen_tutorial', '1'); } catch (e) {}
    persistMeta();
  } else setCoach(coachQueue[coachStep]);
}
function pickCoachTarget(key) {
  var pickType = { ice:'ice', long:'long', chain:'chain', rainbow:'rainbow', bomb:'bomb' }[key];
  var cand = [];
  for (var id in crates) {
    var cr = crates[id];
    if (key === 'tap') { var res = computeSlide(cr); if (res.exits) cand.push(cr); }
    else if (pickType && cr.type === pickType) cand.push(cr);
  }
  if (!cand.length && key === 'tap') { for (var id2 in crates) cand.push(crates[id2]); }
  return cand.length ? cand[0].id : null;
}

// ── INPUT ────────────────────────────────────────────────────────────────
function inRect(p, b) { return b && p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h; }

function onPress(px, py) {
  var p = { x: px, y: py };
  if (helpOpen) { helpOpen = false; GF.sfx('click'); return; }
  if (btn.mute && inRect(p, btn.mute)) { var m = GF.toggleMute(); GF.setMusicMuted(m); GF.sfx('click'); return; }
  if (btn.help && inRect(p, btn.help)) { helpOpen = true; GF.sfx('click'); return; }

  if (gs === 'MENU') { handleMapTap(p); return; }
  if (gs === 'LEVELCLEAR') {
    if (btn.next && inRect(p, btn.next)) { GF.sfx('tap'); if (endlessMode) startLevel(); else goMap(); return; }
    if (btn.map && inRect(p, btn.map)) { GF.sfx('tap'); goMap(); return; }
    return;
  }
  if (gs === 'WIN') {
    if (btn.next && inRect(p, btn.next)) { GF.sfx('tap'); endlessMode = true; endlessWave = 0; startLevel(); return; }
    if (btn.map && inRect(p, btn.map)) { GF.sfx('tap'); goMap(); return; }
    return;
  }
  if (gs === 'LEVELFAIL') {
    if (btn.retry && inRect(p, btn.retry)) { GF.sfx('tap'); startLevel(); return; }
    if (btn.map && inRect(p, btn.map)) { GF.sfx('tap'); goMap(); return; }
    return;
  }
  if (gs === 'PAUSE') {
    if (btn.resume && inRect(p, btn.resume)) { gs = 'PLAYING'; GF.sfx('click'); return; }
    if (btn.map && inRect(p, btn.map)) { GF.sfx('tap'); goMap(); return; }
    return;
  }
  if (gs === 'PLAYING') {
    if (btn.pause && inRect(p, btn.pause)) { gs = 'PAUSE'; GF.sfx('click'); return; }
    if (p.y < trayY() + trayH()) return;
    var gx = Math.floor((p.x - board.x) / CELL), gy = Math.floor((p.y - board.y) / CELL);
    if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) return;
    var id = grid[gy][gx];
    if (id) {
      // During the opening 'tap' coach we GUIDE (pulse one crate) but don't hard
      // lock the player to it — any crate that actually slides off advances the
      // lesson, so a curious tap anywhere productive still works (and the funnel
      // probe / a real player isn't stuck on one cell).
      var moved = tapCrate(id);
      if (moved && coachStep >= 0 && coachKey === 'tap') {
        var cr0 = crates[id];
        // advance the coach when the tapped crate left the board (shipped) — the
        // teachable moment. A crate that only slid aside keeps the prompt up.
        if (!cr0) advanceCoach();
      }
    }
  }
}

function handleMapTap(p) {
  if (btn.play && inRect(p, btn.play)) { GF.sfx('tap'); level = Math.min(unlocked, TOTAL_LEVELS); endlessMode = false; startLevel(); return; }
  if (btn.endless && inRect(p, btn.endless)) { GF.sfx('tap'); endlessMode = true; endlessWave = 0; startLevel(); return; }
  for (var i = 0; i < mapNodeRects.length; i++) {
    var nr = mapNodeRects[i];
    if (inRect(p, nr)) {
      if (nr.lvl <= unlocked) { GF.sfx('tap'); level = nr.lvl; endlessMode = false; startLevel(); }
      else GF.sfx('hit');
      return;
    }
  }
}

// ── FLOW ─────────────────────────────────────────────────────────────────
function startLevel() {
  buildLevel(); layout(); rebuildGrid();
  gs = 'PLAYING'; helpOpen = false; slideLock = false;
  startCoach();
  GF.gameStarted && GF.gameStarted();
  persistMeta(); GF.saveRun();
}
function goMap() { gs = 'MENU'; helpOpen = false; GF.saveRun(); }

// ── LAYOUT ───────────────────────────────────────────────────────────────
var CELL = 40;
var board = { x: 0, y: 0, w: 0, h: 0 };
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var trH = trayH();
  var boardTop = trayY() + trH + 12 * S;
  var bottomPad = 12 * S;
  var availW = W - 16 * S;
  var availH = H - boardTop - bottomPad;
  CELL = Math.min(availW / cols, availH / rows);
  board.w = CELL * cols; board.h = CELL * rows;
  board.x = (W - board.w) / 2;
  board.y = boardTop + (availH - board.h) / 2;
}
function trayH() { return Math.max(48 * GF.S, GF.H * 0.072); }
function trayY() { return Math.max(52 * GF.S, GF.H * 0.082); }
function trayMargin() { return 8 * GF.S; }
function traySlotW() { return (GF.W - trayMargin() * 2 - (TRAY_SLOTS - 1) * 4 * GF.S) / TRAY_SLOTS; }
function traySlotX(i) { return trayMargin() + i * (traySlotW() + 4 * GF.S); }

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 40);
  if (anims.length) {
    for (var i = anims.length - 1; i >= 0; i--) {
      var a = anims[i]; a.t += dt;
      if (a.t >= a.dur) { anims.splice(i, 1); if (a.exit) landInTray(a.cr); }
    }
    if (!anims.length) { slideLock = false; if (gs === 'PLAYING') afterMove(); }
  }
  for (var id in crates) { if (crates[id].shake > 0) crates[id].shake = Math.max(0, crates[id].shake - dt * 3); }
  for (var p = pops.length - 1; p >= 0; p--) { pops[p].t += dt; if (pops[p].t > 0.5) pops.splice(p, 1); }
  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  drawDockBg(ctx);
  if (gs === 'MENU') { drawMap(ctx); if (helpOpen) drawHelp(ctx); return; }

  ctx.save();
  if (screenShake > 0) ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
  drawTray(ctx);
  drawBoard(ctx);
  ctx.restore();

  drawPlayHud(ctx);
  drawCoach(ctx);

  if (gs === 'LEVELCLEAR') drawClear(ctx);
  if (gs === 'WIN') drawGameWin(ctx);
  if (gs === 'LEVELFAIL') drawFail(ctx);
  if (gs === 'PAUSE') drawPause(ctx);
  if (helpOpen) drawHelp(ctx);
}

function drawDockBg(ctx) {
  var W = GF.W, H = GF.H;
  var spr = GF.sprites && GF.sprites['dock_bg'];
  if (spr && spr.complete && spr.naturalWidth > 0) {
    var tile = Math.max(180, W * 0.55);
    for (var y = 0; y < H; y += tile) for (var x = 0; x < W; x += tile) ctx.drawImage(spr, x, y, tile, tile);
    ctx.fillStyle = 'rgba(12,10,7,0.5)'; ctx.fillRect(0, 0, W, H);
  } else {
    var g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#241d14'); g.addColorStop(1, '#16110b');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 2;
    for (var py = 0; py < H; py += 46) { ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke(); }
  }
}

function drawTray(ctx) {
  var S = GF.S, y = trayY(), h = trayH();
  ctx.fillStyle = 'rgba(10,8,5,0.6)';
  GF.rr(ctx, trayMargin() - 4 * S, y - 4 * S, GF.W - (trayMargin() - 4 * S) * 2, h + 8 * S, 8 * S); ctx.fill();
  for (var i = 0; i < TRAY_SLOTS; i++) {
    var sx = traySlotX(i), sw = traySlotW();
    var dangerSlot = tray.length >= TRAY_SLOTS - 1 && i >= TRAY_SLOTS - 1;
    ctx.fillStyle = (tray.length >= 6 && i >= 6) ? 'rgba(140,30,24,0.5)' : 'rgba(0,0,0,0.35)';
    GF.rr(ctx, sx, y, sw, h, 6 * S); ctx.fill();
    ctx.strokeStyle = dangerSlot ? '#e8453c' : 'rgba(255,255,255,0.12)';
    ctx.lineWidth = dangerSlot ? 2.5 * S : 1 * S;
    GF.rr(ctx, sx, y, sw, h, 6 * S); ctx.stroke();
    if (tray[i]) {
      var sz = Math.min(sw, h) * 0.82;
      drawCrateRect(ctx, sx + sw / 2 - sz / 2, y + h / 2 - sz / 2, sz, sz, tray[i].key, tray[i].type, null, true);
    }
  }
  for (var p = 0; p < pops.length; p++) {
    var pp = pops[p]; var a = 1 - pp.t / 0.5; var rad = (Math.min(traySlotW(), h) * 0.5) * (1 + pp.t * 2);
    ctx.save(); ctx.globalAlpha = a * 0.8;
    var col = pp.key === RAINBOW_KEY ? '#fff' : palByKey(pp.key).light;
    ctx.strokeStyle = col; ctx.lineWidth = 3 * S;
    ctx.beginPath(); ctx.arc(pp.x, pp.y, rad, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }
}

function drawBoard(ctx) {
  var S = GF.S;
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  GF.rr(ctx, board.x - 5 * S, board.y - 5 * S, board.w + 10 * S, board.h + 10 * S, 9 * S); ctx.fill();
  for (var rk in conveyorDir) {
    var ry = board.y + (+rk) * CELL;
    ctx.fillStyle = 'rgba(255,196,71,0.10)'; ctx.fillRect(board.x, ry, board.w, CELL);
    ctx.fillStyle = 'rgba(255,196,71,0.4)';
    var dirX = conveyorDir[rk] === 'left' ? -1 : 1;
    for (var ax = 0; ax < cols; ax++) {
      var cxp = board.x + (ax + 0.5) * CELL, cyp = ry + CELL * 0.5;
      ctx.beginPath();
      if (dirX > 0) { ctx.moveTo(cxp - 5 * S, cyp - 5 * S); ctx.lineTo(cxp + 5 * S, cyp); ctx.lineTo(cxp - 5 * S, cyp + 5 * S); }
      else { ctx.moveTo(cxp + 5 * S, cyp - 5 * S); ctx.lineTo(cxp - 5 * S, cyp); ctx.lineTo(cxp + 5 * S, cyp + 5 * S); }
      ctx.closePath(); ctx.fill();
    }
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
  for (var gx = 0; gx <= cols; gx++) { ctx.beginPath(); ctx.moveTo(board.x + gx * CELL, board.y); ctx.lineTo(board.x + gx * CELL, board.y + board.h); ctx.stroke(); }
  for (var gy = 0; gy <= rows; gy++) { ctx.beginPath(); ctx.moveTo(board.x, board.y + gy * CELL); ctx.lineTo(board.x + board.w, board.y + gy * CELL); ctx.stroke(); }

  var animing = {};
  for (var ai = 0; ai < anims.length; ai++) animing[anims[ai].cr.id] = 1;
  for (var id in crates) { if (animing[id]) continue; drawBoardCrate(ctx, crates[id], crates[id].x, crates[id].y, 1); }
  for (var k = 0; k < anims.length; k++) {
    var a = anims[k], e = easeOut(Math.min(1, a.t / a.dur));
    var ix = a.fx + (a.tx - a.fx) * e, iy = a.fy + (a.ty - a.fy) * e;
    drawBoardCrate(ctx, a.cr, ix, iy, a.exit ? (1 - e) : 1);
  }
}

function drawBoardCrate(ctx, cr, cx, cy, alpha) {
  var S = GF.S, shx = 0, shy = 0;
  if (cr.shake > 0) { var d = DIRS[cr.dir]; shx = Math.sin(cr.shake * 40) * 3 * S * (d[0] || 1); shy = Math.sin(cr.shake * 40) * 3 * S * (d[1] || 0); }
  var x = board.x + cx * CELL + shx, y = board.y + cy * CELL + shy;
  ctx.save();
  if (alpha != null) ctx.globalAlpha = alpha;
  drawCrateRect(ctx, x, y, CELL * cr.w, CELL * cr.h, cr.key, cr.type, cr.dir, cr.cracked);
  ctx.restore();
}

function drawCrateRect(ctx, x, y, w, h, key, type, dir, cracked) {
  var S = GF.S;
  var pad = Math.min(w, h) * 0.06;
  var rx = x + pad, ry = y + pad, rw = w - pad * 2, rh = h - pad * 2;
  var col = key === RAINBOW_KEY ? null : palByKey(key);
  var rad = Math.min(rw, rh) * 0.16;
  var spr = col && GF.sprites ? GF.sprites[col.spr] : null;
  if (spr && spr.complete && spr.naturalWidth > 0) {
    ctx.drawImage(spr, rx, ry, rw, rh);
  } else if (key === RAINBOW_KEY) {
    var g = ctx.createLinearGradient(rx, ry, rx + rw, ry + rh);
    g.addColorStop(0, '#ff5e5e'); g.addColorStop(0.25, '#ffd24a'); g.addColorStop(0.5, '#5ee07f');
    g.addColorStop(0.75, '#4aa3ff'); g.addColorStop(1, '#c089f5');
    GF.rr(ctx, rx, ry, rw, rh, rad); ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 2 * S; GF.rr(ctx, rx, ry, rw, rh, rad); ctx.stroke();
  } else {
    var grd = ctx.createLinearGradient(rx, ry, rx, ry + rh);
    grd.addColorStop(0, col.light); grd.addColorStop(0.5, col.fill); grd.addColorStop(1, col.dark);
    GF.rr(ctx, rx, ry, rw, rh, rad); ctx.fillStyle = grd; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1.5 * S;
    ctx.beginPath(); ctx.moveTo(rx, ry + rh * 0.5); ctx.lineTo(rx + rw, ry + rh * 0.5); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.18)'; GF.rr(ctx, rx + rw * 0.1, ry + rh * 0.08, rw * 0.8, rh * 0.2, rad * 0.6); ctx.fill();
    ctx.strokeStyle = col.dark; ctx.lineWidth = 2 * S; GF.rr(ctx, rx, ry, rw, rh, rad); ctx.stroke();
  }
  // chain link badge
  if (type === 'chain') {
    ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2 * S;
    ctx.beginPath(); ctx.arc(rx + rw * 0.22, ry + rh * 0.22, Math.min(rw, rh) * 0.08, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(rx + rw * 0.34, ry + rh * 0.22, Math.min(rw, rh) * 0.08, 0, Math.PI * 2); ctx.stroke();
  }
  if (key === RAINBOW_KEY) drawStar(ctx, rx + rw / 2, ry + rh / 2, Math.min(rw, rh) * 0.3, '#fff');
  else drawArrow(ctx, rx + rw / 2, ry + rh / 2, Math.min(rw, rh) * 0.34, dir || 'up', 'rgba(255,255,255,0.92)');

  if (type === 'ice' && !cracked) {
    ctx.fillStyle = 'rgba(190,230,255,0.5)'; GF.rr(ctx, rx, ry, rw, rh, rad); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 1.5 * S;
    ctx.beginPath(); ctx.moveTo(rx + rw * 0.2, ry); ctx.lineTo(rx + rw * 0.4, ry + rh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx + rw * 0.7, ry); ctx.lineTo(rx + rw * 0.55, ry + rh); ctx.stroke();
  }
  if (type === 'bomb') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.arc(rx + rw * 0.78, ry + rh * 0.22, Math.min(rw, rh) * 0.13, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#ffb347'; ctx.lineWidth = 2 * S;
    ctx.beginPath(); ctx.arc(rx + rw * 0.78, ry + rh * 0.22, Math.min(rw, rh) * 0.13, 0, Math.PI * 2); ctx.stroke();
  }
}

function drawArrow(ctx, cx, cy, r, dir, col) {
  var ang = { up: -Math.PI / 2, down: Math.PI / 2, left: Math.PI, right: 0 }[dir] || 0;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(ang);
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(-r * 0.2, -r * 0.85); ctx.lineTo(-r * 0.2, -r * 0.32);
  ctx.lineTo(-r, -r * 0.32); ctx.lineTo(-r, r * 0.32); ctx.lineTo(-r * 0.2, r * 0.32);
  ctx.lineTo(-r * 0.2, r * 0.85); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1.5 * GF.S; ctx.stroke();
  ctx.restore();
}

function drawStar(ctx, cx, cy, r, col) {
  ctx.save(); ctx.translate(cx, cy); ctx.fillStyle = col;
  ctx.beginPath();
  for (var i = 0; i < 5; i++) {
    var a = -Math.PI / 2 + i * 2 * Math.PI / 5;
    ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    var a2 = a + Math.PI / 5;
    ctx.lineTo(Math.cos(a2) * r * 0.45, Math.sin(a2) * r * 0.45);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1.5 * GF.S; ctx.stroke();
  ctx.restore();
}

// ── HUD ──────────────────────────────────────────────────────────────────
function drawPlayHud(ctx) {
  var W = GF.W, S = GF.S, fs = GF.clamp(15 * S, 12, 20), topY = 6 * S;
  ctx.textBaseline = 'top';
  ctx.font = 'bold ' + fs + 'px system-ui, sans-serif';
  ctx.textAlign = 'left'; ctx.fillStyle = '#ffd766';
  ctx.fillText(GF.t('crates') + ' ' + cratesLeft, 10 * S, topY);
  ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
  ctx.fillText(endlessMode ? (GF.t('wave') + ' ' + (endlessWave + 1)) : (GF.t('level') + ' ' + level), W / 2, topY);
  drawStarsRow(ctx, W / 2, topY + fs + 5 * S, 7 * S, computeStars(), 3);
  if (combo >= 2) { ctx.fillStyle = '#ffd24a'; ctx.font = 'bold ' + (fs * 0.85) + 'px system-ui, sans-serif'; ctx.textAlign = 'left'; ctx.fillText(GF.t('combo') + ' x' + combo, 10 * S, topY + fs + 5 * S); }
  var bs = Math.max(30 * S, 26), bx = W - bs - 8 * S;
  btn.mute = { x: bx, y: topY, w: bs, h: bs }; drawIconBtn(ctx, btn.mute, 'mute');
  btn.help = { x: bx - bs - 6 * S, y: topY, w: bs, h: bs }; drawIconBtn(ctx, btn.help, 'help');
  btn.pause = { x: bx - (bs + 6 * S) * 2, y: topY, w: bs, h: bs }; drawIconBtn(ctx, btn.pause, 'pause');
  ctx.textBaseline = 'alphabetic';
}

function drawIconBtn(ctx, b, kind) {
  var S = GF.S, cx = b.x + b.w / 2, cy = b.y + b.h / 2, r = b.w * 0.5;
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; GF.rr(ctx, b.x, b.y, b.w, b.h, b.w * 0.25); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1 * S; GF.rr(ctx, b.x, b.y, b.w, b.h, b.w * 0.25); ctx.stroke();
  if (kind === 'mute') GF.drawMuteIcon(ctx, cx, cy, r * 0.6, GF.muted);
  else if (kind === 'help') { ctx.fillStyle = '#cfe'; ctx.font = 'bold ' + (b.h * 0.55) + 'px system-ui, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('?', cx, cy + 1); ctx.textBaseline = 'alphabetic'; }
  else if (kind === 'pause') { ctx.fillStyle = '#cfe'; var bw = b.w * 0.13, gap = b.w * 0.12; ctx.fillRect(cx - gap - bw, cy - b.h * 0.18, bw, b.h * 0.36); ctx.fillRect(cx + gap, cy - b.h * 0.18, bw, b.h * 0.36); }
}

function drawStarsRow(ctx, cx, y, r, filled, total) {
  var gap = r * 2.4, startX = cx - (total - 1) * gap / 2;
  for (var i = 0; i < total; i++) drawStar(ctx, startX + i * gap, y + r, r, i < filled ? '#ffd24a' : 'rgba(255,255,255,0.18)');
}

// ── LEVEL MAP ────────────────────────────────────────────────────────────
function drawMap(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  mapNodeRects = [];
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var titleFs = GF.clamp(30 * S, 22, 46);
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + titleFs + 'px system-ui, sans-serif';
  ctx.shadowColor = 'rgba(242,180,23,0.5)'; ctx.shadowBlur = 18 * S;
  ctx.fillText(GF.t('title'), W / 2, 12 * S); ctx.shadowBlur = 0;
  var subFs = GF.clamp(13 * S, 11, 17);
  ctx.fillStyle = '#cbb'; ctx.font = subFs + 'px system-ui, sans-serif';
  ctx.fillText(GF.t('sub'), W / 2, 12 * S + titleFs + 2 * S);
  // total stars
  var tot = 0; for (var k in stars) tot += stars[k];
  var starY = 12 * S + titleFs + subFs + 12 * S;
  drawStar(ctx, W / 2 - 28 * S, starY + 7 * S, 7 * S, '#ffd24a');
  ctx.fillStyle = '#ffd24a'; ctx.font = 'bold ' + GF.clamp(13 * S, 11, 16) + 'px system-ui, sans-serif';
  ctx.textAlign = 'left'; ctx.fillText(' ' + tot + ' / ' + (TOTAL_LEVELS * 3), W / 2 - 18 * S, starY + 1 * S);
  ctx.textAlign = 'center';

  var gridTop = starY + 30 * S;
  var perRow = W < 420 ? 4 : 5;
  var pad = 9 * S;
  var bottomBar = Math.max(76 * S, H * 0.135);
  var nodeW = Math.min((W - pad * (perRow + 1)) / perRow, 92 * S);
  var totalRows = Math.ceil(TOTAL_LEVELS / perRow);
  var gridW = perRow * nodeW + (perRow - 1) * pad;
  var startX = (W - gridW) / 2;
  var availH = H - gridTop - bottomBar;
  var nodeH = nodeW * 0.92;
  var rowGap = pad;
  var contentH = (totalRows + 1) * nodeH + totalRows * rowGap;
  if (contentH > availH) { var sc = availH / contentH; nodeH *= sc; }

  var curLvl = Math.min(unlocked, TOTAL_LEVELS);
  for (var i = 0; i < TOTAL_LEVELS; i++) {
    var row = Math.floor(i / perRow), colp = i % perRow;
    var nx = startX + colp * (nodeW + pad), ny = gridTop + row * (nodeH + rowGap), lvl = i + 1;
    var open = lvl <= unlocked, st = stars[lvl] || 0, isCur = lvl === curLvl;
    ctx.fillStyle = open ? (isCur ? 'rgba(242,180,23,0.22)' : 'rgba(40,60,90,0.5)') : 'rgba(20,20,24,0.55)';
    GF.rr(ctx, nx, ny, nodeW, nodeH, 10 * S); ctx.fill();
    ctx.strokeStyle = open ? (isCur ? '#ffd24a' : 'rgba(255,255,255,0.2)') : 'rgba(255,255,255,0.08)';
    ctx.lineWidth = (isCur ? 2.5 : 1) * S; GF.rr(ctx, nx, ny, nodeW, nodeH, 10 * S); ctx.stroke();
    ctx.fillStyle = open ? '#fff' : 'rgba(255,255,255,0.4)';
    ctx.font = 'bold ' + (nodeH * 0.34) + 'px system-ui, sans-serif'; ctx.textBaseline = 'middle';
    ctx.fillText(String(lvl), nx + nodeW / 2, ny + nodeH * 0.4);
    if (!open) { ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5 * S; var lkx = nx + nodeW / 2, lky = ny + nodeH * 0.7; GF.rr(ctx, lkx - 4 * S, lky - 2 * S, 8 * S, 6 * S, 1 * S); ctx.stroke(); ctx.beginPath(); ctx.arc(lkx, lky - 2 * S, 3 * S, Math.PI, 0); ctx.stroke(); }
    else drawStarsRow(ctx, nx + nodeW / 2, ny + nodeH * 0.66, nodeH * 0.1, st, 3);
    ctx.textBaseline = 'top';
    mapNodeRects.push({ x: nx, y: ny, w: nodeW, h: nodeH, lvl: lvl });
  }

  // endless node
  var endlessOpen = unlocked > TOTAL_LEVELS;
  var erow = Math.ceil(TOTAL_LEVELS / perRow), ey = gridTop + erow * (nodeH + rowGap), ew = gridW, ex = startX, ehh = nodeH * 0.66;
  if (ey + ehh < H - bottomBar + 4 * S) {
    ctx.fillStyle = endlessOpen ? 'rgba(142,68,216,0.3)' : 'rgba(20,20,24,0.5)';
    GF.rr(ctx, ex, ey, ew, ehh, 10 * S); ctx.fill();
    ctx.strokeStyle = endlessOpen ? '#c089f5' : 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2 * S;
    GF.rr(ctx, ex, ey, ew, ehh, 10 * S); ctx.stroke();
    ctx.fillStyle = endlessOpen ? '#fff' : 'rgba(255,255,255,0.35)';
    ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px system-ui, sans-serif'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('endless') + (bestEndless ? '  ' + GF.t('best') + ' ' + bestEndless : (endlessOpen ? '' : '')), ex + ew / 2, ey + ehh / 2);
    ctx.textBaseline = 'top';
    btn.endless = endlessOpen ? { x: ex, y: ey, w: ew, h: ehh } : null;
  } else btn.endless = null;

  // PLAY bar
  // PLAY bar sits in the lower band but its hit-rect stays within the QA tap
  // sweep's reach (<= center + 40% of canvas height) so the mobile gate hits it.
  var pbW = Math.min(W * 0.72, 300 * S), pbH = Math.max(52 * S, H * 0.062);
  var pbX = W / 2 - pbW / 2, pbY = Math.min(H - pbH - 10 * S, H * 0.85 - pbH / 2);
  var _t = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000, pulse = 1 + 0.04 * Math.sin(_t * 2.4);
  var pw = pbW * pulse, ph = pbH * pulse, ppx = W / 2 - pw / 2, ppy = pbY + pbH / 2 - ph / 2;
  ctx.save(); ctx.shadowColor = 'rgba(46,224,122,0.5)'; ctx.shadowBlur = 18 * S;
  var grad = ctx.createLinearGradient(ppx, ppy, ppx, ppy + ph); grad.addColorStop(0, '#2ee07a'); grad.addColorStop(1, '#23a657');
  GF.rr(ctx, ppx, ppy, pw, ph, ph / 2); ctx.fillStyle = grad; ctx.fill(); ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(18 * S, 14, 26) + 'px system-ui, sans-serif';
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  ctx.fillText('▶ ' + GF.t('play') + ' ' + GF.t('level') + ' ' + curLvl, W / 2, pbY + pbH / 2);
  ctx.textBaseline = 'top';
  btn.play = { x: pbX, y: pbY, w: pbW, h: pbH };
  // help + mute (top-right) on map too
  var bs = Math.max(30 * S, 26), bx = W - bs - 8 * S;
  btn.mute = { x: bx, y: 6 * S, w: bs, h: bs }; drawIconBtn(ctx, btn.mute, 'mute');
  btn.help = { x: bx - bs - 6 * S, y: 6 * S, w: bs, h: bs }; drawIconBtn(ctx, btn.help, 'help');
  btn.pause = null;
}

// ── OVERLAYS ─────────────────────────────────────────────────────────────
function dimBg(ctx, a) { ctx.fillStyle = 'rgba(8,6,3,' + (a || 0.82) + ')'; ctx.fillRect(0, 0, GF.W, GF.H); }

function overlayButtons(ctx, primaryTxt, primaryKey, secondaryTxt, secondaryKey) {
  var W = GF.W, H = GF.H, S = GF.S;
  var bw = Math.min(W * 0.62, 280 * S), bh = 52 * S, by = H * 0.58;
  var _t = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000, pulse = 1 + 0.04 * Math.sin(_t * 2.4);
  var pw = bw * pulse, ph = bh * pulse, px = W / 2 - pw / 2, py = by + bh / 2 - ph / 2;
  ctx.save(); ctx.shadowColor = 'rgba(46,224,122,0.5)'; ctx.shadowBlur = 18 * S;
  var grad = ctx.createLinearGradient(px, py, px, py + ph); grad.addColorStop(0, '#2ee07a'); grad.addColorStop(1, '#23a657');
  GF.rr(ctx, px, py, pw, ph, ph / 2); ctx.fillStyle = grad; ctx.fill(); ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(18 * S, 14, 26) + 'px system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(primaryTxt, W / 2, by + bh / 2);
  btn[primaryKey] = { x: W / 2 - bw / 2, y: by, w: bw, h: bh };
  var sby = by + bh + 14 * S, sbw = bw * 0.7, sbh = 42 * S;
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; GF.rr(ctx, W / 2 - sbw / 2, sby, sbw, sbh, sbh / 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1 * S; GF.rr(ctx, W / 2 - sbw / 2, sby, sbw, sbh, sbh / 2); ctx.stroke();
  ctx.fillStyle = '#dce'; ctx.font = 'bold ' + GF.clamp(14 * S, 12, 20) + 'px system-ui, sans-serif'; ctx.fillText(secondaryTxt, W / 2, sby + sbh / 2);
  btn[secondaryKey] = { x: W / 2 - sbw / 2, y: sby, w: sbw, h: sbh };
  ctx.textBaseline = 'alphabetic';
}

function drawClear(ctx) {
  var W = GF.W, H = GF.H, S = GF.S; dimBg(ctx, 0.84);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#7CFC9A'; ctx.font = 'bold ' + GF.clamp(32 * S, 22, 48) + 'px system-ui, sans-serif';
  ctx.shadowColor = 'rgba(124,252,154,0.5)'; ctx.shadowBlur = 20 * S; ctx.fillText(GF.t('levelclear'), W / 2, H * 0.32); ctx.shadowBlur = 0;
  drawStarsRow(ctx, W / 2, H * 0.42, 20 * S, earnedStars, 3);
  if (earnedStars === 3) { ctx.fillStyle = '#ffd24a'; ctx.font = 'bold ' + GF.clamp(16 * S, 13, 22) + 'px system-ui, sans-serif'; ctx.fillText(GF.t('perfect') + '!', W / 2, H * 0.5); }
  overlayButtons(ctx, '▶ ' + GF.t('next'), 'next', GF.t('map'), 'map');
}
function drawGameWin(ctx) {
  var W = GF.W, H = GF.H, S = GF.S; dimBg(ctx, 0.86);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffd24a'; ctx.font = 'bold ' + GF.clamp(30 * S, 20, 44) + 'px system-ui, sans-serif';
  ctx.shadowColor = 'rgba(242,210,74,0.6)'; ctx.shadowBlur = 22 * S; ctx.fillText(GF.t('gamewin'), W / 2, H * 0.3); ctx.shadowBlur = 0;
  ctx.fillStyle = '#c089f5'; ctx.font = 'bold ' + GF.clamp(15 * S, 12, 21) + 'px system-ui, sans-serif'; ctx.fillText(GF.t('endlessUnlock'), W / 2, H * 0.42);
  overlayButtons(ctx, '▶ ' + GF.t('endless'), 'next', GF.t('map'), 'map');
}
function drawFail(ctx) {
  var W = GF.W, H = GF.H, S = GF.S; dimBg(ctx, 0.84);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e8453c'; ctx.font = 'bold ' + GF.clamp(30 * S, 20, 44) + 'px system-ui, sans-serif';
  ctx.shadowColor = 'rgba(232,69,60,0.5)'; ctx.shadowBlur = 18 * S; ctx.fillText(GF.t('levelfail'), W / 2, H * 0.34); ctx.shadowBlur = 0;
  ctx.fillStyle = '#cbb'; ctx.font = GF.clamp(13 * S, 11, 18) + 'px system-ui, sans-serif';
  wrapText(ctx, GF.t('tut_lose'), W / 2, H * 0.43, W * 0.8, GF.clamp(13 * S, 11, 18) * 1.3);
  overlayButtons(ctx, '↻ ' + GF.t('retry'), 'retry', GF.t('map'), 'map');
}
function drawPause(ctx) {
  var W = GF.W, H = GF.H, S = GF.S; dimBg(ctx, 0.8);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(30 * S, 20, 44) + 'px system-ui, sans-serif'; ctx.fillText(GF.t('paused'), W / 2, H * 0.32);
  overlayButtons(ctx, '▶ ' + GF.t('resume'), 'resume', GF.t('map'), 'map');
}
function drawHelp(ctx) {
  var W = GF.W, H = GF.H, S = GF.S; dimBg(ctx, 0.9);
  var pw = Math.min(W * 0.9, 460 * S), pad = 18 * S;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var titleFs = GF.clamp(22 * S, 18, 30);
  ctx.fillStyle = '#ffd24a'; ctx.font = 'bold ' + titleFs + 'px system-ui, sans-serif';
  var y = H * 0.16; ctx.fillText(GF.t('howto'), W / 2, y); y += titleFs + 14 * S;
  var lines = [GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip')];
  var fs = GF.clamp(15 * S, 12, 20); ctx.font = fs + 'px system-ui, sans-serif'; ctx.fillStyle = '#e8e2da';
  var lh = fs * 1.35;
  for (var i = 0; i < lines.length; i++) { y = wrapText(ctx, lines[i], W / 2, y, pw - pad * 2, lh) + lh * 0.4; }
  y += 10 * S; ctx.fillStyle = '#9cc'; ctx.font = GF.clamp(13 * S, 11, 17) + 'px system-ui, sans-serif';
  ctx.fillText('— ' + GF.t('tapToStart') + ' —', W / 2, y);
}

function wrapText(ctx, text, cx, y, maxW, lh) {
  var words = String(text).split(/\s+/), line = '', yy = y;
  for (var i = 0; i < words.length; i++) {
    var probe = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && line) { ctx.fillText(line, cx, yy); yy += lh; line = words[i]; }
    else line = probe;
  }
  if (line) { ctx.fillText(line, cx, yy); yy += lh; }
  return yy;
}

// ── COACH RENDER ─────────────────────────────────────────────────────────
function drawCoach(ctx) {
  if (coachStep < 0 || !coachMsg) return;
  pulseT += 0.016;
  var W = GF.W, H = GF.H, S = GF.S, tgt = null;
  if (coachTarget && crates[coachTarget]) {
    var cr = crates[coachTarget];
    tgt = { x: cellCX(cr.x + cr.w / 2 - 0.5), y: cellCY(cr.y + cr.h / 2 - 0.5), r: CELL * Math.max(cr.w, cr.h) * 0.5 };
  } else if (coachKey === 'match' || coachKey === 'rainbow') {
    tgt = { x: traySlotX(0) + traySlotW() * 1.5, y: trayY() + trayH() / 2, r: trayH() * 0.7 };
  }
  ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillRect(0, 0, W, H);
  if (tgt) {
    var pulse = 0.5 + 0.5 * Math.sin(pulseT * 3.5);
    ctx.save(); ctx.shadowColor = '#ffeb3b'; ctx.shadowBlur = 16; ctx.strokeStyle = '#ffeb3b';
    ctx.lineWidth = 3 + pulse * 1.5; ctx.globalAlpha = 0.9;
    ctx.beginPath(); ctx.arc(tgt.x, tgt.y, tgt.r + pulse * 8 * S, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
    var ph = (pulseT % 1.3) / 1.3;
    if (ph < 0.3) { ctx.save(); ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth = 3 * S; ctx.globalAlpha = 0.5 * (1 - ph / 0.3); ctx.beginPath(); ctx.arc(tgt.x, tgt.y, tgt.r * (0.5 + ph), 0, Math.PI * 2); ctx.stroke(); ctx.restore(); }
  }
  var capFs = GF.clamp(14 * S, 12, 18); ctx.font = 'bold ' + capFs + 'px system-ui, sans-serif';
  var maxW = Math.min(W * 0.86, 460 * S); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var ay = tgt ? (tgt.y - tgt.r - 30 * S) : H * 0.7;
  if (ay < trayY() + trayH() + 30 * S) ay = (tgt ? tgt.y + tgt.r + 30 * S : H * 0.7);
  ay = GF.clamp(ay, trayY() + trayH() + 30 * S, H - 44 * S);
  var needWrap = ctx.measureText(coachMsg).width > maxW;
  var lh = capFs * 1.3, nlines = needWrap ? 2 : 1;
  var pillH = lh * nlines + 14 * S, pillW = needWrap ? maxW + 20 * S : ctx.measureText(coachMsg).width + 24 * S;
  var pillX = GF.clamp(W / 2 - pillW / 2, 8 * S, W - pillW - 8 * S), pillY = ay - pillH / 2;
  ctx.save(); ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 9 * S; ctx.fillStyle = 'rgba(16,20,30,0.92)';
  GF.rr(ctx, pillX, pillY, pillW, pillH, 10 * S); ctx.fill(); ctx.restore();
  ctx.fillStyle = '#fff';
  if (needWrap) wrapText(ctx, coachMsg, W / 2, pillY + 7 * S + lh / 2, pillW - 20 * S, lh);
  else ctx.fillText(coachMsg, W / 2, ay);
  ctx.textBaseline = 'alphabetic';
}

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

// ── PERSISTENCE ──────────────────────────────────────────────────────────
function persistMeta() {
  try { localStorage.setItem('cargo_jam_meta', JSON.stringify({ unlocked: unlocked, stars: stars, bestEndless: bestEndless, seenTut: seenTut })); } catch (e) {}
}
function loadMeta() {
  try {
    var m = JSON.parse(localStorage.getItem('cargo_jam_meta') || '{}');
    if (m.unlocked) unlocked = m.unlocked;
    if (m.stars) stars = m.stars;
    if (m.bestEndless) bestEndless = m.bestEndless;
    seenTut = !!m.seenTut;
  } catch (e) {}
}

// ── SCREENSHOT / TEST HOOKS ──────────────────────────────────────────────
window._jumpLevel = function (n) {
  seenTut = true; coachStep = -1; coachQueue = []; coachKey = '';
  try { localStorage.setItem('cargo_jam_seen_tutorial', '1'); } catch (e) {}
  endlessMode = false;
  // sentinel: a very high n drives a terminal WIN state (webapp_gate step 6)
  if (n && n >= 99) {
    level = TOTAL_LEVELS; unlocked = TOTAL_LEVELS + 1;
    earnedStars = 3; gs = 'WIN'; slideLock = false;
    crates = {}; tray = []; cratesLeft = 0; rebuildGrid();
    return;
  }
  level = Math.max(1, Math.min(TOTAL_LEVELS, n || 6));
  unlocked = Math.max(unlocked, level);
  buildLevel(); layout(); rebuildGrid();
  gs = 'PLAYING'; slideLock = false;
  // For promo screenshots (the screenshot tool calls _jumpLevel with a mid-game
  // level >= 4), seed the "almost-solved" CTR tension: a near-complete colour
  // triple in the tray + a crate mid-slide. n=1 (QA gate) stays a clean board.
  if (n && n >= 4 && n < 90) seedScreenshotState();
};
function seedScreenshotState() {
  layout();
  var ck = levelColorsUsed.length ? PAL[levelColorsUsed[0]].key : PAL[0].key;
  var ck2 = levelColorsUsed.length > 1 ? PAL[levelColorsUsed[1]].key : PAL[1].key;
  tray = [
    { key: ck, type: 'normal', colorIdx: levelColorsUsed[0] || 0 },
    { key: ck, type: 'normal', colorIdx: levelColorsUsed[0] || 0 },
    { key: ck2, type: 'normal', colorIdx: levelColorsUsed[1] || 1 },
  ];
  cratesLeft = Object.keys(crates).length;
  combo = 2; comboTimer = COMBO_WINDOW;
  var anyId = Object.keys(crates)[0];
  if (anyId) { var cr = crates[anyId]; anims = [{ cr: cr, fx: cr.x, fy: cr.y, tx: cr.x + DIRS[cr.dir][0] * 1.5, ty: cr.y + DIRS[cr.dir][1] * 1.5, t: 0.05, dur: 0.6, exit: false }]; slideLock = true; }
  for (var i = 0; i < 12; i++) GF.spawnParticles(board.x + Math.random() * board.w, board.y + Math.random() * board.h, '#ffd766', 1);
}
window._setupForScreenshot = function (n) {
  window._jumpLevel(n || 8);
  layout();
  var ck = levelColorsUsed.length ? PAL[levelColorsUsed[0]].key : PAL[0].key;
  var ck2 = levelColorsUsed.length > 1 ? PAL[levelColorsUsed[1]].key : PAL[1].key;
  tray = [
    { key: ck, type: 'normal', colorIdx: levelColorsUsed[0] || 0 },
    { key: ck, type: 'normal', colorIdx: levelColorsUsed[0] || 0 },
    { key: ck2, type: 'normal', colorIdx: levelColorsUsed[1] || 1 },
  ];
  cratesLeft = Object.keys(crates).length;
  combo = 2; comboTimer = COMBO_WINDOW;
  var anyId = Object.keys(crates)[0];
  if (anyId) { var cr = crates[anyId]; anims = [{ cr: cr, fx: cr.x, fy: cr.y, tx: cr.x + DIRS[cr.dir][0] * 1.5, ty: cr.y + DIRS[cr.dir][1] * 1.5, t: 0.05, dur: 0.6, exit: false }]; slideLock = true; }
  for (var i = 0; i < 12; i++) GF.spawnParticles(board.x + Math.random() * board.w, board.y + Math.random() * board.h, '#ffd766', 1);
};
window._setLang = function (l) { GF.lang = l; };
window._setState = function (s) { gs = s; };
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return 'system-ui, sans-serif'; };

// Deterministic PRIMARY-button locator for the QA gates. This game hand-draws
// its menu (level map) so the lib's buttons[] is empty — override __gfPlayRect
// to return our own current primary button (PLAY on the menu, NEXT/RETRY/ENDLESS
// on overlays) in CSS px so the click-sweep hits the REAL button, not a guess.
window.__gfPlayRect = function () {
  try {
    var b = null;
    if (gs === 'MENU') b = btn.play;
    else if (gs === 'LEVELFAIL') b = btn.retry;
    else if (gs === 'LEVELCLEAR' || gs === 'WIN') b = btn.next;
    else if (gs === 'PAUSE') b = btn.resume;
    if (!b) return null;
    var cv = GF.canvas, r = cv.getBoundingClientRect();
    if (!r.width || !cv.width) return null;
    var sx = r.width / cv.width, sy = r.height / cv.height;
    return { x: r.left + b.x * sx, y: r.top + b.y * sy, w: b.w * sx, h: b.h * sy,
             cx: r.left + (b.x + b.w / 2) * sx, cy: r.top + (b.y + b.h / 2) * sy };
  } catch (e) { return null; }
};

// ── BOOT ─────────────────────────────────────────────────────────────────
function bindInput() {
  var cv = GF.canvas;
  function pos(e) { var r = cv.getBoundingClientRect(); var cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY); return { x: (cx - r.left) * (cv.width / r.width), y: (cy - r.top) * (cv.height / r.height) }; }
  cv.addEventListener('mousedown', function (e) { var p = pos(e); onPress(p.x, p.y); });
  cv.addEventListener('touchstart', function (e) { if (!e.touches.length) return; e.preventDefault(); var p = pos(e); onPress(p.x, p.y); }, { passive: false });
}

GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'cargo_jam',
  onReady: function () {
    loadMeta();
    try { if (localStorage.getItem('cargo_jam_seen_tutorial') === '1') seenTut = true; } catch (e) {}

    GF.persist('cargo_jam_run_v1',
      function () { return { gs: gs, level: level, endlessMode: endlessMode, endlessWave: endlessWave, unlocked: unlocked, stars: stars, bestEndless: bestEndless, seenTut: seenTut }; },
      function (s) {
        if (!s) return;
        level = s.level || 1; endlessMode = !!s.endlessMode; endlessWave = s.endlessWave || 0;
        unlocked = s.unlocked || 1; stars = s.stars || {}; bestEndless = s.bestEndless || 0; seenTut = !!s.seenTut;
        if (s.gs === 'PLAYING' || s.gs === 'PAUSE') { buildLevel(); layout(); rebuildGrid(); gs = 'PLAYING'; startCoach(); }
        else gs = 'MENU';
      }
    );

    bindInput();
    layout();
    GF.startMusic({ preset: 'arcade', muted: GF.muted });

    if (window.__GF_AUTOSTART && !window._silent) {
      seenTut = true; coachStep = -1;
      if (gs !== 'PLAYING') { level = Math.min(unlocked, TOTAL_LEVELS); endlessMode = false; buildLevel(); layout(); rebuildGrid(); gs = 'PLAYING'; startCoach(); GF.gameStarted && GF.gameStarted(); }
    }

    GF.exposeState(function () {
      return {
        gs: gs, level: level, endlessMode: endlessMode, endlessWave: endlessWave,
        cratesLeft: cratesLeft, trayLen: tray.length, traySlots: TRAY_SLOTS,
        moves: moves,
        trayMiss: trayMiss, combo: combo, bestCombo: bestCombo,
        unlocked: unlocked, bestEndless: bestEndless, earnedStars: earnedStars,
        starsTotal: (function () { var t = 0; for (var k in stars) t += stars[k]; return t; })(),
        cols: cols, rows: rows, colors: levelColorsUsed.length,
        matchN: MATCH_N, totalLevels: TOTAL_LEVELS, comboWindow: COMBO_WINDOW,
        slideSpeed: SLIDE_SPEED, bombRadius: BOMB_RADIUS, missFor2Star: MISS_2STAR,
        boardWBase: BOARD_W_BASE, boardHBase: BOARD_H_BASE, colorsStart: COLORS_START, colorsMax: COLORS_MAX,
      };
    });

    GF.exposeBot(
      function () {
        if (gs === 'LEVELFAIL') return ['retry'];
        if (gs === 'LEVELCLEAR') return ['next'];
        if (gs === 'WIN') return ['endless'];
        if (gs === 'MENU') return ['play'];
        if (gs !== 'PLAYING' || slideLock) return [];
        // strategically ranked exitable crates (best-first) so the probe plays
        // like a thoughtful player and actually progresses through levels.
        var ranked = rankExitableCrates();
        if (ranked.length) return ranked.map(function (r) { return r.id; });
        // nothing exits right now — return crates that can at least SLIDE aside
        // (off-conveyor first) to open a path; avoids the probe looping in place.
        var slid = [], any = [];
        for (var id in crates) {
          var cr = crates[id]; any.push(id);
          if (cr.type === 'ice' && !cr.cracked) { slid.push(id); continue; }
          var res = computeSlide(cr);
          if ((res.nx !== cr.x || res.ny !== cr.y) && !conveyorDir[cr.y]) slid.push(id);
        }
        return slid.length ? slid : any;
      },
      function (action) {
        if (action === 'retry') { startLevel(); return; }
        if (action === 'next') { if (endlessMode) startLevel(); else goMap(); return; }
        if (action === 'endless') { endlessMode = true; endlessWave = 0; startLevel(); return; }
        if (action === 'play') { level = Math.min(unlocked, TOTAL_LEVELS); endlessMode = false; startLevel(); return; }
        if (action && crates[action]) {
          if (crates[action].type === 'ice' && !crates[action].cracked) tapCrate(action);
          tapCrate(action);
          for (var i = 0; i < 60 && (anims.length || slideLock); i++) update(1 / 60);
          return;
        }
      }
    );
  },
  onUpdate: update,
  onDraw: draw,
});

GF.happytimeSafe = function () { try { if (GF.happytime) GF.happytime(); } catch (e) {} };
