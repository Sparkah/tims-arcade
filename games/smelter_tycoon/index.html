// ── M1: THE PERMANENT FOUNDRY (owned meta — survives every meltdown) ───────
// On meltdown the run is salvaged into SLAG (a persistent currency). Slag levels
// up four owned WINGS of a permanent Foundry; every wing level grants a global
// bonus the player carries into EVERY future run. This is the cross-session
// reason-to-return: runs compound instead of resetting to zero, and the MENU
// shows the Foundry the player OWNS (their levels), not a first-timer's blank.
var FOUNDRY_KEY = 'smelter_tycoon_foundry_v1';
// wing defs: id, perk magnitude per level. forge→tap, bellows→smelters,
// crucible→all income, vault→starting coins each run.
var WINGS = [
  { id: 'forge',    perPct: 0.12 },  // +12% tap power per level
  { id: 'bellows',  perPct: 0.10 },  // +10% auto-smelter output per level
  { id: 'crucible', perPct: 0.06 },  // +6% ALL income per level (the global mult)
  { id: 'vault',    perCoins: 20 },  // +20 base starting coins per level (×tier scaling)
];
// persistent meta state
var slag = 0;                  // banked persistent currency
var foundryLvl = { forge: 0, bellows: 0, crucible: 0, vault: 0 };
var lifetimeSlag = 0;          // total slag ever salvaged (stat)
var lastSalvage = 0;           // slag gained on the most recent meltdown (GAMEOVER card)
var foundryRects = [];         // hit-rects for the four wings on MENU/GAMEOVER
var foundryPulse = { forge: 0, bellows: 0, crucible: 0, vault: 0 }; // upgrade flash

function foundryLoad() {
  try {
    var raw = localStorage.getItem(FOUNDRY_KEY);
    if (!raw) return;
    var s = JSON.parse(raw);
    slag = Math.max(0, s.slag || 0);
    lifetimeSlag = Math.max(0, s.lifetimeSlag || 0);
    maxTierEver = GF.clamp(s.maxTierEver | 0, 0, MAX_TIER);  // M2: lifetime tier (scales contracts)
    var fl = s.lvl || {};
    foundryLvl.forge = Math.max(0, fl.forge | 0);
    foundryLvl.bellows = Math.max(0, fl.bellows | 0);
    foundryLvl.crucible = Math.max(0, fl.crucible | 0);
    foundryLvl.vault = Math.max(0, fl.vault | 0);
  } catch (e) {}
}
function foundrySave() {
  try {
    localStorage.setItem(FOUNDRY_KEY, JSON.stringify({
      slag: slag, lifetimeSlag: lifetimeSlag, maxTierEver: maxTierEver, lvl: foundryLvl,
    }));
  } catch (e) {}
}
// cost to take a wing from its current level to the next (geometric in Slag)
function wingCost(id) {
  var lv = foundryLvl[id] || 0;
  return Math.ceil(8 * Math.pow(1.85, lv));
}
// permanent global income multiplier from the Crucible wing (folds into coreMult chain)
function foundryMult() { return 1 + (foundryLvl.crucible || 0) * 0.06; }
// permanent perks the run starts with, from the owned Foundry
function forgeBonus()   { return 1 + (foundryLvl.forge || 0) * 0.12; }   // ×tap power
function bellowsBonus() { return 1 + (foundryLvl.bellows || 0) * 0.10; } // ×smelter output
function vaultStartCoins() { return (foundryLvl.vault || 0) * 20; }      // base starting coins
// convert a finished run's score into salvageable Slag (gentle log curve so deep
// runs give more but early runs still feel rewarded; floor of 1 once you've earned coins)
function salvageFromScore(sc) {
  if (sc < 10) return 0;
  return Math.max(1, Math.floor(Math.pow(sc, 0.34)));
}
function upgradeWing(id) {
  var c = wingCost(id);
  if (slag < c) return false;
  slag -= c;
  foundryLvl[id] = (foundryLvl[id] || 0) + 1;
  foundryPulse[id] = 1;
  foundrySave();
  GF.sfx('levelup');
  return true;
}

// ── M2: THE ORDER LEDGER (reason-to-return — grown from the smelting fabric) ──
// Three SMELTING CONTRACTS roll each calendar day. They are goals in the game's
// own verbs (smelt coins, tap the furnace, reach a metal, run smelters) that pay
// SLAG into the owned Foundry when filled in a run. One contract is pre-stamped
// ~70% complete each day (momentum transfer) so a returning player finishes &
// CLAIMS within ~60s. The Foundry's Crucible also forges Slag OVERNIGHT (capped
// 10h, scaled by a daily-login STREAK). So each new day a returning player SEES
// fresh orders + banked idle Slag + a longer streak, and DOES new short-term
// goals — all in the foundry/smelting fabric, not a bolt-on reward popup.
var LEDGER_KEY = 'smelter_tycoon_ledger_v1';
var IDLE_SLAG_PER_HR = 1.4;    // base Slag/hour the Crucible forges idle (× crucibleLvl × streak)
var IDLE_CAP_HOURS   = 10;     // overnight accrual cap (uncapped kills retention)
// contract templates — type, the run-stat it watches, and Slag reward.
// {base, span} → goal = base + rng*span (scaled by the player's foundry depth so
// goals stay achievable as the foundry grows). reward in Slag.
var CONTRACT_DEFS = [
  { type: 'earn',     reward: 14, base: 8000,  span: 22000 },  // total coins this run
  { type: 'taps',     reward: 9,  base: 60,    span: 90 },     // furnace taps this run
  { type: 'smelters', reward: 11, base: 6,     span: 8 },      // auto-smelters owned (peak)
  { type: 'tier',     reward: 16, base: 2,     span: 3 },      // reach metal tier (index)
  { type: 'reforge',  reward: 22, base: 1,     span: 0 },      // reforge the core once
];
// persistent ledger state
var contracts = [];            // [{type, goal, reward, prog, claimed}]
var ledgerDay = 0;             // day-stamp (floor(now/DAY)) the current contracts belong to
var loginStreak = 0;          // consecutive-day login streak
var bestStreak = 0;           // highest streak ever (stat)
var lastSeenMs = 0;           // ms timestamp of last session end (for idle accrual)
var idleSlagPending = 0;       // Slag forged overnight, shown in the welcome banner
var showWelcome = 0;           // welcome-back banner timer (seconds)
var ledgerRects = [];          // hit-rects for claimable contracts on MENU/GAMEOVER
var ledgerPulse = [];          // per-contract claim flash
// run-peak trackers the contracts read (smelters can be reset by reforge, so peak)
var peakSmelters = 0;

var DAY_MS = 86400000;
function dayStamp(ms) { return Math.floor((ms || Date.now()) / DAY_MS); }
// streak multiplier on idle accrual: +15% per streak-day, capped at 7 days (×2.05)
function streakMult() { return 1 + 0.15 * Math.min(loginStreak, 7); }
// Slag the Crucible forges per real hour while away (0 until the Crucible is built)
function idleSlagPerHour() { return IDLE_SLAG_PER_HR * (foundryLvl.crucible || 0) * streakMult(); }

function ledgerLoad() {
  try {
    var raw = localStorage.getItem(LEDGER_KEY);
    if (!raw) return;
    var s = JSON.parse(raw);
    loginStreak = Math.max(0, s.streak | 0);
    bestStreak = Math.max(0, s.bestStreak | 0);
    lastSeenMs = Math.max(0, s.lastSeen || 0);
    ledgerDay = Math.max(0, s.day | 0);
    if (Array.isArray(s.contracts)) {
      contracts = s.contracts.map(function (c) {
        return { type: c.type, goal: c.goal, reward: c.reward,
          prog: Math.max(0, c.prog || 0), claimed: !!c.claimed };
      });
    }
  } catch (e) {}
}
function ledgerSave() {
  try {
    localStorage.setItem(LEDGER_KEY, JSON.stringify({
      streak: loginStreak, bestStreak: bestStreak, lastSeen: lastSeenMs,
      day: ledgerDay, contracts: contracts,
    }));
  } catch (e) {}
}
// deterministic per-day RNG so the same day's roll is stable across reloads
function dayRng(day, salt) {
  var x = Math.sin(day * 9301 + salt * 49297 + 233280) * 43758.5453;
  return x - Math.floor(x);
}
// pick 3 distinct contract types for `day` and build goals scaled to foundry depth
function rollContracts(day) {
  var idx = [0, 1, 2, 3, 4];
  // Fisher-Yates with the deterministic day RNG
  for (var i = idx.length - 1; i > 0; i--) {
    var j = Math.floor(dayRng(day, i * 3 + 1) * (i + 1));
    var t = idx[i]; idx[i] = idx[j]; idx[j] = t;
  }
  var depth = (foundryLvl.crucible || 0) + (foundryLvl.bellows || 0) + maxTierEver;
  var growth = 1 + depth * 0.18;  // goals scale gently as the foundry grows
  var picked = idx.slice(0, 3);
  var out = [];
  for (var k = 0; k < picked.length; k++) {
    var d = CONTRACT_DEFS[picked[k]];
    var r = dayRng(day, picked[k] * 7 + 11);
    var goal;
    if (d.type === 'earn')        goal = Math.round((d.base + r * d.span) * growth / 1000) * 1000;
    else if (d.type === 'taps')   goal = Math.round((d.base + r * d.span) * Math.min(growth, 2.2));
    else if (d.type === 'smelters') goal = Math.round(d.base + r * d.span + depth * 0.4);
    else if (d.type === 'tier')   goal = GF.clamp(Math.round(d.base + r * d.span + maxTierEver * 0.4), 1, MAX_TIER);
    else goal = 1; // reforge
    out.push({ type: d.type, goal: Math.max(1, goal), reward: d.reward, prog: 0, claimed: false });
  }
  // MOMENTUM TRANSFER: pre-stamp the FIRST contract ~70% complete so a returning
  // player can finish & claim it within the first ~60s of the run.
  if (out.length) out[0].prog = Math.floor(out[0].goal * 0.7);
  return out;
}
// called once on boot — handle the daily roll-over, streak, and overnight idle
function ledgerOnBoot() {
  var nowMs = Date.now();
  var today = dayStamp(nowMs);
  var firstEver = (lastSeenMs === 0 && contracts.length === 0 && ledgerDay === 0);
  // overnight idle accrual (only if we've been away and own a Crucible)
  if (lastSeenMs > 0) {
    var awayHrs = Math.min(IDLE_CAP_HOURS, Math.max(0, (nowMs - lastSeenMs) / 3600000));
    var gained = Math.floor(awayHrs * idleSlagPerHour());
    if (gained > 0) {
      slag += gained; lifetimeSlag += gained; idleSlagPending = gained; foundrySave();
    }
  }
  // daily roll-over: new calendar day → streak + fresh contracts
  if (today !== ledgerDay || contracts.length === 0) {
    if (lastSeenMs > 0) {
      var lastDay = dayStamp(lastSeenMs);
      if (today === lastDay + 1) loginStreak += 1;           // consecutive day
      else if (today > lastDay) loginStreak = 1;             // skipped ≥1 day → reset to 1
      // (same calendar day with contracts already rolled won't reach here)
    } else {
      loginStreak = Math.max(1, loginStreak);
    }
    if (loginStreak > bestStreak) bestStreak = loginStreak;
    contracts = rollContracts(today);
    ledgerDay = today;
    if (!firstEver) showWelcome = 4.5;  // banner: new orders + (maybe) idle slag + streak
  } else if (idleSlagPending > 0) {
    showWelcome = 4.5;  // same-day reopen but earned idle slag → still greet
  }
  lastSeenMs = nowMs;
  ledgerSave();
}
// live progress for a contract from the current run state (peak-aware)
function contractCurrent(c) {
  if (c.type === 'earn')     return score;
  if (c.type === 'taps')     return totalTaps;
  if (c.type === 'smelters') return peakSmelters;
  if (c.type === 'tier')     return maxTierReached;
  if (c.type === 'reforge')  return reforgeCount;
  return 0;
}
// refresh each contract's stored progress from the live run (called in update).
// IMPORTANT: progress changes nearly every frame during active play, so the
// localStorage write is THROTTLED (hard rule: no per-frame localStorage). The
// in-memory prog updates every frame (so the UI/claim is always live); the disk
// write happens at most every ledgerSaveEvery seconds, plus on leave/meltdown.
var ledgerSaveAcc = 0, ledgerDirty = false, ledgerSaveEvery = 2.5;
function ledgerTrack(dt) {
  if (!contracts.length) return;
  for (var i = 0; i < contracts.length; i++) {
    var c = contracts[i];
    if (c.claimed) continue;
    var cur = contractCurrent(c);
    // keep the pre-stamped head-start: never let live progress LOWER stored prog
    if (cur > c.prog) { c.prog = cur; ledgerDirty = true; }
  }
  ledgerSaveAcc += (dt || 0);
  if (ledgerDirty && ledgerSaveAcc >= ledgerSaveEvery) {
    ledgerSaveAcc = 0; ledgerDirty = false; ledgerSave();
  }
}
function contractDone(c) { return c.prog >= c.goal; }
// claim a finished contract's Slag reward into the owned Foundry
function claimContract(i) {
  var c = contracts[i];
  if (!c || c.claimed || !contractDone(c)) return false;
  c.claimed = true;
  slag += c.reward; lifetimeSlag += c.reward;
  ledgerPulse[i] = 1;
  foundrySave(); ledgerSave();
  GF.sfx('reward');
  return true;
}
function claimableCount() {
  var n = 0;
  for (var i = 0; i < contracts.length; i++) if (!contracts[i].claimed && contractDone(contracts[i])) n++;
  return n;
}

var critTimer = 0;             // seconds heat has been at/over max
var tickAcc = 0;               // accumulator for the smelter production tick
var newTierFlash = 0;          // full-screen flourish timer on tier unlock
var reforgeFlash = 0;          // flash timer on reforge
var furnacePulse = 0;          // furnace tap squash animation 0..1
var coinsPerSecDisp = 0;       // smoothed coins/sec readout

// layout (recomputed each draw)
var L = { topH:0, heatY:0, heatH:0, furnaceX:0, furnaceY:0, furnaceR:0, listY:0, rowH:0, rowGap:0 };
var helpBtn = { x:0, y:0, w:0, h:0 };
var muteBtn = { x:0, y:0, w:0, h:0 };
var upgradeRects = [];         // {kind, x,y,w,h, cost, enabled, maxed}
var playBtnRect = null;

// ── ECONOMY HELPERS ──────────────────────────────────────────────────────
function tierValue(t) { return Math.pow(metalMul, t); }       // raw value of a tier-t smelt
// global output multiplier — in-run Core Shards × the PERMANENT Foundry (Crucible wing)
function coreMult() { return (1 + coreShards * coreShardMult) * foundryMult(); }
function valueMult() { return Math.pow(1.5, coinValueLvl); }   // Coin Value upgrade multiplier
// tap income also carries the permanent Forge wing bonus; smelters carry Bellows
function tapGain() { return tapBase * tapPower * forgeBonus() * tierValue(metalTier) * valueMult() * coreMult(); }
function smelterPerSec() { return smelters * bellowsBonus() * tierValue(metalTier) * valueMult() * coreMult(); }
function coinsPerSec() { return smelterPerSec(); }

// upgrade costs (geometric scaling)
function smelterCost() { return Math.ceil(smelterBaseCost * Math.pow(costMul, smelters)); }
function tapPowerCost() { return Math.ceil(tapPowerCost0 * Math.pow(costMul * 1.25, tapPower - 1)); }
function coinValueCost() { return Math.ceil(coinValueBaseCost * Math.pow(costMul * 1.6, coinValueLvl)); }
function coolantCost() { return Math.ceil(coolantBaseCost * Math.pow(costMul * 1.4, coolantLvl)); }
function tierUnlockCost(t) {
  // unlocking tier t (the next one). Scales hard with tier so it gates pacing.
  return Math.ceil(50 * Math.pow(9, t));
}
function curHeatMax() { return coolHeatMaxBase + coolantLvl * 20; }
function curCoolRate() { return coolBaseRate + coolantLvl * 3; }

// ── NUMBER FORMAT (idle games show big numbers compactly) ─────────────────
function fmt(n) {
  if (n < 1000) return (n % 1 === 0 ? n.toString() : n.toFixed(1));
  var units = ['', 'K', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc', 'No', 'Dc'];
  var u = 0;
  while (n >= 1000 && u < units.length - 1) { n /= 1000; u++; }
  return (n >= 100 ? n.toFixed(0) : n.toFixed(2)) + units[u];
}

// ── ACTIONS ──────────────────────────────────────────────────────────────
function tapFurnace() {
  if (gs !== 'PLAYING') return;
  var gain = tapGain();
  coins += gain; score += gain;
  heat = Math.min(curHeatMax() + meltdownMargin + 5, heat + heatPerTap);
  totalTaps++;
  if (!firstTap) firstTap = true;
  furnacePulse = 1;
  GF.sfx('tap');
  // coin fling toward the vault counter (top-left)
  flingCoin();
  GF.spawnParticles(L.furnaceX, L.furnaceY, '#ffd700', 7);
  GF.spawnFloat(L.furnaceX, L.furnaceY - L.furnaceR * 0.7, '+' + fmt(gain), '#ffe27a');
  GF.setShake(0.12);
  checkMeltdown();
  GF.saveRun();
}

// flying coins from furnace → vault (pure VFX, no state)
var flyCoins = [];
function flingCoin() {
  flyCoins.push({ x: L.furnaceX + (Math.random() - 0.5) * L.furnaceR, y: L.furnaceY,
    tx: GF.clamp(40 * GF.S, 24, 60), ty: GF.clamp(26 * GF.S, 18, 44), t: 0,
    r: GF.clamp(8 * GF.S, 5, 12) });
}
function updateFlyCoins(dt) {
  for (var i = flyCoins.length - 1; i >= 0; i--) {
    var f = flyCoins[i];
    f.t += dt * 2.6;
    if (f.t >= 1) flyCoins.splice(i, 1);
  }
}
function drawFlyCoins(ctx) {
  for (var i = 0; i < flyCoins.length; i++) {
    var f = flyCoins[i];
    var e = f.t * f.t * (3 - 2 * f.t); // smoothstep
    var x = GF.lerp(f.x, f.tx, e), y = GF.lerp(f.y, f.ty, e) - Math.sin(f.t * Math.PI) * 40 * GF.S;
    drawCoinSprite(ctx, x, y, f.r * (1 - f.t * 0.3));
  }
}

function buySmelter() {
  var c = smelterCost();
  if (coins < c) return;
  coins -= c; smelters++;
  if (smelters > peakSmelters) peakSmelters = smelters;  // M2: contract reads the run peak
  GF.sfx('unlock');
  GF.spawnFloat(GF.cx, L.listY - 10 * GF.S, '+1 ' + GF.t('u_smelter'), '#ff9a3c');
  GF.spawnParticles(GF.cx, L.furnaceY + L.furnaceR, '#ff9a3c', 10);
  GF.setShake(0.12);
  GF.saveRun();
}
function buyTapPower() {
  var c = tapPowerCost();
  if (coins < c) return;
  coins -= c; tapPower++;
  GF.sfx('levelup');
  GF.spawnFloat(GF.cx, L.listY - 10 * GF.S, GF.t('u_tap') + ' ' + GF.t('lvl') + tapPower, '#ffd166');
  GF.saveRun();
}
function buyCoinValue() {
  var c = coinValueCost();
  if (coins < c) return;
  coins -= c; coinValueLvl++;
  GF.sfx('levelup');
  GF.spawnFloat(GF.cx, L.listY - 10 * GF.S, GF.t('u_value') + ' ' + GF.t('lvl') + coinValueLvl, '#ffe27a');
  GF.saveRun();
}
function buyCoolant() {
  var c = coolantCost();
  if (coins < c) return;
  coins -= c; coolantLvl++;
  // immediate relief
  heat = Math.max(0, heat - 15);
  GF.sfx('levelup');
  GF.spawnFloat(GF.cx, L.heatY + L.heatH + 14 * GF.S, GF.t('u_cool') + ' ' + GF.t('lvl') + coolantLvl, '#6fd0ff');
  GF.spawnParticles(GF.cx, L.heatY + L.heatH / 2, '#6fd0ff', 12);
  GF.saveRun();
}
function unlockNextTier() {
  if (metalTier >= MAX_TIER) return;
  var c = tierUnlockCost(metalTier + 1);
  if (coins < c) return;
  coins -= c; metalTier++;
  if (metalTier > maxTierReached) maxTierReached = metalTier;
  if (metalTier > maxTierEver) { maxTierEver = metalTier; foundrySave(); }  // M2: lifetime tier scales contracts
  newTierFlash = 1.4;
  GF.sfx('evolve');
  GF.setShake(0.5);
  GF.spawnParticles(L.furnaceX, L.furnaceY, METAL_COL[metalTier].a, 26);
  GF.spawnFloat(L.furnaceX, L.furnaceY - L.furnaceR, GF.t('newtier') + ' ' + metalName(metalTier), METAL_COL[metalTier].a);
  GF.saveRun();
}
function reforge() {
  if (!canReforge()) return;
  // grant shards scaled to how far past the unlock threshold you got
  var gain = Math.max(1, Math.floor(Math.pow(score / coreUnlockCoins, 0.5) * 3));
  coreShards += gain;
  reforgeCount++;  // M2: the "Reforge the Core" contract reads this
  // reset the run economy (NOT score/best — score is the chase; shards persist this run)
  coins = 0; smelters = 0; tapPower = 1; coinValueLvl = 0; coolantLvl = 0;
  metalTier = 0; heat = 0; critTimer = 0;
  reforgeFlash = 1.4;
  GF.sfx('reward');
  GF.setShake(0.7);
  GF.spawnParticles(GF.cx, GF.cy, '#9af4ec', 40);
  GF.spawnFloat(GF.cx, GF.cy - 30 * GF.S, '+' + gain + ' ' + GF.t('shards'), '#9af4ec');
  GF.saveRun();
}
function canReforge() {
  return gs === 'PLAYING' && coreUnlocked && score >= coreUnlockCoins;
}

// ── MELTDOWN (lose condition) ─────────────────────────────────────────────
function checkMeltdown() {
  if (gs !== 'PLAYING') return;
  if (heat >= curHeatMax() + meltdownMargin) { meltdown(); return; }
}
function meltdown() {
  if (gs === 'GAMEOVER') return;
  var newBest = score > best;
  if (newBest) { best = score; try { localStorage.setItem('smelter_tycoon_best', Math.floor(best)); } catch (e) {} }
  // M1 SESSION-END HOOK: salvage the wreckage into permanent Slag for the Foundry.
  // The run is gone, but it PERMANENTLY advanced something you own → reason to return.
  lastSalvage = salvageFromScore(score);
  if (lastSalvage > 0) { slag += lastSalvage; lifetimeSlag += lastSalvage; foundrySave(); }
  // M2: flush final contract progress so a run that FILLED a contract leaves it
  // claimable on the GAMEOVER/MENU board (the throttled in-run save may lag).
  ledgerTrack(0); ledgerSave();
  gs = 'GAMEOVER';
  GF.sfx('lose');
  GF.setShake(1.2);
  GF.spawnParticles(L.furnaceX, L.furnaceY, '#ff5b3b', 60);
  GF.spawnParticles(L.furnaceX, L.furnaceY, '#ffb03b', 40);
  GF.gameEnded();
  GF.saveRun();
  if (newBest && best > 0) GF.happytime();
}

// ── GAME LIFECYCLE ─────────────────────────────────────────────────────────
function startGame() {
  // M1: the owned Foundry's Vault wing seeds every new run with starting coins —
  // a returning player with a built Foundry starts richer than a first-timer.
  coins = vaultStartCoins(); score = 0; smelters = 0;
  lastSalvage = 0;
  tapPower = 1; coinValueLvl = 0; coolantLvl = 0;
  metalTier = 0; maxTierReached = 0;
  heat = 0; critTimer = 0; tickAcc = 0;
  coreShards = 0; coreUnlocked = false;
  totalTaps = 0; firstTap = false;
  reforgeCount = 0; peakSmelters = 0;  // M2: per-run contract trackers
  newTierFlash = 0; reforgeFlash = 0; furnacePulse = 0; coinsPerSecDisp = 0;
  flyCoins = [];
  gs = 'PLAYING';
  startTutorial();
  GF.gameStarted();
  GF.saveRun();
}

// ── TUTORIAL (progressive disclosure: point at the furnace first) ─────────
function startTutorial() {
  var seen = false;
  try { seen = !!localStorage.getItem('smelter_tycoon_seen_tutorial'); } catch (e) {}
  var steps = [
    { text: (GF.lang === 'ru' ? 'Жми раскалённую ПЕЧЬ, чтобы плавить монеты!' : 'Tap the glowing FURNACE to smelt coins!'),
      target: function () { return { x: L.furnaceX, y: L.furnaceY, r: L.furnaceR }; }, advance: 'click_target' },
    { text: (GF.lang === 'ru' ? 'Накопи монеты и купи Автоплавильню внизу - она работает сама!' : 'Save coins and buy an Auto-Smelter below - it earns on its own!'),
      target: function () { return upgradeTarget('smelter'); }, advance: 'click_any' },
  ];
  // Always register the steps (force:true) so the HUD ? button can reopen the
  // panel for returning players too (HARD REQ #3). If the player has already
  // seen it, immediately dismiss the auto-show — the ? button still reopens it.
  GF.tutorial.start(steps, { storageKey: 'smelter_tycoon_seen_tutorial', force: true });
  if (seen) GF.tutorial.active = false;
  try { localStorage.setItem('smelter_tycoon_seen_tutorial', '1'); } catch (e) {}
}
function upgradeTarget(kind) {
  for (var i = 0; i < upgradeRects.length; i++) {
    if (upgradeRects[i].kind === kind) {
      var r = upgradeRects[i];
      return { x: r.x + r.w / 2, y: r.y + r.h / 2, r: Math.max(r.w, r.h) / 2 };
    }
  }
  return { x: GF.cx, y: GF.H * 0.8, r: 40 * GF.S };
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (newTierFlash > 0) newTierFlash = Math.max(0, newTierFlash - dt);
  if (reforgeFlash > 0) reforgeFlash = Math.max(0, reforgeFlash - dt);
  if (furnacePulse > 0) furnacePulse = Math.max(0, furnacePulse - dt * 4);
  // M1: decay wing upgrade flashes (these tick on MENU/GAMEOVER too)
  for (var wk in foundryPulse) { if (foundryPulse[wk] > 0) foundryPulse[wk] = Math.max(0, foundryPulse[wk] - dt * 2.2); }
  // M2: decay welcome-back banner + contract claim flashes (MENU/GAMEOVER too)
  if (showWelcome > 0) showWelcome = Math.max(0, showWelcome - dt);
  for (var pi = 0; pi < ledgerPulse.length; pi++) { if (ledgerPulse[pi] > 0) ledgerPulse[pi] = Math.max(0, ledgerPulse[pi] - dt * 2.2); }

  GF.tutorial.update(dt);
  if (gs !== 'PLAYING') return;

  // auto-smelter production on a tick (heat + coins)
  tickAcc += dt;
  while (tickAcc >= TICK) {
    tickAcc -= TICK;
    if (smelters > 0) {
      var gain = smelterPerSec() * TICK;
      coins += gain; score += gain;
      heat = Math.min(curHeatMax() + meltdownMargin + 5, heat + smelters * heatPerSmelterSec * TICK);
    }
  }

  // heat drains when NOT actively overshooting (gives the player a recovery lever)
  if (heat > 0) heat = Math.max(0, heat - curCoolRate() * dt);

  // CRITICAL grace: if pinned at/over max, count up; meltdown past the grace
  if (heat >= curHeatMax()) {
    critTimer += dt;
    if (critTimer >= critGrace) { meltdown(); return; }
  } else {
    critTimer = Math.max(0, critTimer - dt * 1.5);
  }
  // instant overshoot meltdown (e.g. tap-spam burst)
  checkMeltdown();

  // late-game ascension unlock
  if (!coreUnlocked && score >= coreUnlockCoins) coreUnlocked = true;

  // smoothed coins/sec readout
  coinsPerSecDisp = GF.lerp(coinsPerSecDisp, coinsPerSec(), Math.min(1, dt * 5));

  // M2: keep the daily contracts' progress in sync with the live run
  ledgerTrack(dt);
}

// ── INPUT ────────────────────────────────────────────────────────────────
function onDown(x, y) {
  // mute button is always accessible on every screen
  if (x >= muteBtn.x && x <= muteBtn.x + muteBtn.w && y >= muteBtn.y && y <= muteBtn.y + muteBtn.h) {
    var m = GF.toggleMute();
    GF.setMusicMuted(m);
    return;
  }
  if (gs !== 'PLAYING') return;
  // tutorial swallows taps first (but a furnace tap during step 1 is hands-on)
  if (GF.tutorial.active) {
    if (GF.tutorial.step === 0 && hitFurnace(x, y)) { tapFurnace(); GF.tutorial.next(); return; }
    GF.tutorial.handleClick(x, y); return;
  }
  // help button
  if (x >= helpBtn.x && x <= helpBtn.x + helpBtn.w && y >= helpBtn.y && y <= helpBtn.y + helpBtn.h) {
    GF.tutorial.reopen(); return;
  }
  // upgrade buttons
  for (var i = 0; i < upgradeRects.length; i++) {
    var b = upgradeRects[i];
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
      doUpgrade(b.kind); return;
    }
  }
  // furnace tap
  if (hitFurnace(x, y)) { tapFurnace(); return; }
}
function hitFurnace(x, y) {
  var dx = x - L.furnaceX, dy = y - L.furnaceY;
  return dx * dx + dy * dy <= L.furnaceR * L.furnaceR * 1.18;
}
function doUpgrade(kind) {
  if (kind === 'smelter') buySmelter();
  else if (kind === 'tap') buyTapPower();
  else if (kind === 'value') buyCoinValue();
  else if (kind === 'cool') buyCoolant();
  else if (kind === 'tier') unlockNextTier();
  else if (kind === 'reforge') reforge();
}

// ── LAYOUT ───────────────────────────────────────────────────────────────
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  L.topH = GF.clamp(54 * S, 44, 76);
  L.heatY = L.topH;
  L.heatH = GF.clamp(26 * S, 20, 36);
  var pad = GF.clamp(10 * S, 6, 16);

  // how many upgrade rows? smelter, tap, value, cool, tier, (reforge late)
  var nRows = coreUnlocked ? 6 : 5;
  L.rowGap = GF.clamp(7 * S, 4, 11);
  // size rows so the whole stack fits the bottom portion without overflow
  var stackTopMin = L.heatY + L.heatH + pad;
  var maxStackH = H - stackTopMin - pad;
  // cap each row, but ensure the furnace area keeps >= ~32% of the height
  var furnaceBandMin = (H - L.topH - L.heatH) * 0.30;
  var stackBudget = Math.min(maxStackH - furnaceBandMin, H * 0.52);
  L.rowH = GF.clamp((stackBudget - (nRows - 1) * L.rowGap) / nRows, 40, 74);
  var stackH = nRows * L.rowH + (nRows - 1) * L.rowGap;
  L.listY = H - pad - stackH;

  // furnace fills the band between heat bar and the upgrade stack
  var bandTop = L.heatY + L.heatH + pad;
  var bandBot = L.listY - pad;
  var bandH = bandBot - bandTop;
  L.furnaceX = W / 2;
  L.furnaceY = bandTop + bandH * 0.5;
  L.furnaceR = GF.clamp(Math.min(W * 0.30, bandH * 0.40), 56, 200);

  var hb = GF.clamp(34 * S, 28, 44);
  helpBtn = { x: W - hb - pad, y: pad * 0.7, w: hb, h: hb };
  muteBtn = { x: W - hb * 2 - pad * 2.2, y: pad * 0.7, w: hb, h: hb };
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  layout();

  // foundry background — dark iron → ember, hotter as heat rises
  var hf = gs === 'PLAYING' ? GF.clamp(heat / curHeatMax(), 0, 1) : 0.15;
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a1410');
  g.addColorStop(0.55, '#241a12');
  g.addColorStop(1, '#3a1f12');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // ember glow at the bottom (furnace heat) — intensifies with heat
  var eg = ctx.createRadialGradient(W / 2, H, 0, W / 2, H, H * 0.7);
  eg.addColorStop(0, 'rgba(255,' + (90 + hf * 60 | 0) + ',30,' + (0.10 + hf * 0.22).toFixed(2) + ')');
  eg.addColorStop(1, 'rgba(255,90,30,0)');
  ctx.fillStyle = eg; ctx.fillRect(0, 0, W, H);

  // CRITICAL pulse overlay (lose-condition telegraph)
  if (gs === 'PLAYING' && heat >= curHeatMax()) {
    var p = 0.18 + 0.18 * Math.sin(Date.now() / 90);
    ctx.fillStyle = 'rgba(255,40,20,' + p.toFixed(3) + ')';
    ctx.fillRect(0, 0, W, H);
  }

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawTopStrip(ctx);
    drawHeatBar(ctx);
    drawFurnace(ctx);
    drawSmelterShelf(ctx);
    drawUpgrades(ctx);
    drawHelpButton(ctx);
    drawMuteButton(ctx);
    drawFlyCoins(ctx);
    // tier-unlock flourish
    if (newTierFlash > 0) {
      ctx.globalAlpha = newTierFlash / 1.4 * 0.5;
      ctx.fillStyle = METAL_COL[metalTier].a; ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }
    if (reforgeFlash > 0) {
      ctx.globalAlpha = reforgeFlash / 1.4 * 0.55;
      ctx.fillStyle = '#9af4ec'; ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }
  }

  if (gs === 'MENU') { drawMenu(ctx); drawMuteButton(ctx); }
  else if (gs === 'GAMEOVER') drawGameOver(ctx);

  // tutorial overlay LAST (on top)
  GF.tutorial.draw(ctx);
}

function drawTopStrip(ctx) {
  var W = GF.W, S = GF.S;
  // panel
  ctx.fillStyle = 'rgba(10,8,6,0.78)'; ctx.fillRect(0, 0, W, L.topH);
  ctx.fillStyle = 'rgba(255,160,60,0.25)'; ctx.fillRect(0, L.topH - 2, W, 2);
  var pad = GF.clamp(12 * S, 8, 18);
  // coins (left, big) + coins/sec
  var cFs = GF.clamp(24 * S, 17, 32);
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  // little coin icon
  drawCoinSprite(ctx, pad + cFs * 0.45, L.topH * 0.42, cFs * 0.5);
  ctx.font = 'bold ' + cFs + 'px sans-serif'; ctx.fillStyle = '#ffe27a';
  ctx.fillText(fmt(coins), pad + cFs * 0.95, L.topH * 0.42);
  var pFs = GF.clamp(12 * S, 9, 16);
  ctx.font = pFs + 'px sans-serif'; ctx.fillStyle = '#c9a86a';
  ctx.fillText('+' + fmt(coinsPerSecDisp) + ' ' + GF.t('coins').toLowerCase() + GF.t('persec'), pad, L.topH * 0.78);
  // right: metal tier name + earned/score + core chip
  // Anchor LEFT of the mute/help buttons so the text never collides with the
  // top-right control cluster (reserved-zone rule — was drawing at W-pad, the
  // exact corner where the buttons sit). muteBtn.x is the leftmost button edge.
  ctx.textAlign = 'right';
  var rEdge = muteBtn.x - GF.clamp(8 * S, 5, 12);
  var tFs = GF.clamp(15 * S, 11, 20);
  ctx.font = 'bold ' + tFs + 'px sans-serif'; ctx.fillStyle = METAL_COL[metalTier].a;
  ctx.fillText(GF.t('tier') + ': ' + metalName(metalTier), rEdge, L.topH * 0.34);
  ctx.font = pFs + 'px sans-serif'; ctx.fillStyle = '#9fb0c0';
  ctx.fillText(GF.t('score') + ' ' + fmt(score), rEdge, L.topH * 0.64);
  if (coreShards > 0) {
    ctx.fillStyle = '#9af4ec'; ctx.font = 'bold ' + pFs + 'px sans-serif';
    ctx.fillText('* ' + coreShards + '  x' + coreMult().toFixed(1), rEdge, L.topH * 0.88);
  }
  ctx.textBaseline = 'alphabetic';
}

function drawHeatBar(ctx) {
  var W = GF.W, S = GF.S;
  var pad = GF.clamp(12 * S, 8, 18);
  var x = pad, y = L.heatY + GF.clamp(3 * S, 2, 5), w = W - pad * 2, h = L.heatH - GF.clamp(6 * S, 4, 10);
  var hm = curHeatMax();
  var frac = GF.clamp(heat / hm, 0, 1);
  // track
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fill();
  // fill — green→amber→red
  var crit = heat >= hm;
  var fg = ctx.createLinearGradient(x, 0, x + w, 0);
  if (crit) { fg.addColorStop(0, '#ff4b2b'); fg.addColorStop(1, '#ff2b2b'); }
  else if (frac > 0.7) { fg.addColorStop(0, '#ffb03b'); fg.addColorStop(1, '#ff6b3b'); }
  else { fg.addColorStop(0, '#3bd17a'); fg.addColorStop(1, '#8fd14b'); }
  if (frac > 0.02) {
    GF.rr(ctx, x, y, Math.max(h, w * frac), h, h / 2); ctx.fillStyle = fg; ctx.fill();
  }
  // label
  ctx.font = 'bold ' + GF.clamp(12 * S, 9, 16) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  var lbl = (crit ? GF.t('critical') : (GF.t('heat') + '  ' + Math.floor(heat) + '/' + Math.floor(hm)));
  // outline for legibility on bright fill
  ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.strokeText(lbl, x + 10 * S, y + h / 2);
  ctx.fillText(lbl, x + 10 * S, y + h / 2);
  ctx.textBaseline = 'alphabetic';
}

function drawFurnace(ctx) {
  var S = GF.S;
  var x = L.furnaceX, y = L.furnaceY, r = L.furnaceR * (1 - furnacePulse * 0.06);
  var col = METAL_COL[metalTier];
  var crit = gs === 'PLAYING' && heat >= curHeatMax();
  var glowCol = crit ? '#ff3b2b' : col.a;
  var hf = gs === 'PLAYING' ? GF.clamp(heat / curHeatMax(), 0, 1) : 0.3;
  var hasSprite = GF.sprites['furnace'];
  if (hasSprite) {
    // soft glow halo behind the sprite (pulses with heat / tap)
    ctx.save();
    var hg = ctx.createRadialGradient(x, y, r * 0.2, x, y, r * 1.15);
    hg.addColorStop(0, (crit ? 'rgba(255,70,40,' : 'rgba(255,150,60,') + (0.28 + hf * 0.3 + furnacePulse * 0.25).toFixed(2) + ')');
    hg.addColorStop(1, 'rgba(255,120,40,0)');
    ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(x, y, r * 1.15, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    // the furnace sprite
    GF.drawSprite('furnace', x, y, r * 1.95);
    // ingot of the current metal in the sprite's molten mouth
    drawIngot(ctx, x, y - r * 0.02, r * 0.5, metalTier);
    // CRITICAL red glow ring over the sprite (telegraphs meltdown)
    if (crit) {
      ctx.save();
      ctx.globalAlpha = 0.4 + 0.25 * Math.sin(Date.now() / 90);
      ctx.lineWidth = GF.clamp(6 * S, 3, 10); ctx.strokeStyle = '#ff2b18';
      ctx.shadowColor = '#ff2b18'; ctx.shadowBlur = 24 * S;
      ctx.beginPath(); ctx.arc(x, y, r * 0.92, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
  } else {
    // procedural hearth: glowing box + rim + molten mouth + ingot
    ctx.save();
    ctx.shadowColor = glowCol; ctx.shadowBlur = (24 + hf * 36 + furnacePulse * 30) * S;
    var bg = ctx.createRadialGradient(x, y - r * 0.2, r * 0.2, x, y, r);
    bg.addColorStop(0, crit ? '#ff7a4b' : '#4a3422');
    bg.addColorStop(0.6, '#2e1f15');
    bg.addColorStop(1, '#1a120c');
    GF.rr(ctx, x - r, y - r, r * 2, r * 2, r * 0.32); ctx.fillStyle = bg; ctx.fill();
    ctx.restore();
    ctx.lineWidth = GF.clamp(4 * S, 2, 7); ctx.strokeStyle = crit ? '#ff5b3b' : '#6a4a2e';
    GF.rr(ctx, x - r, y - r, r * 2, r * 2, r * 0.32); ctx.stroke();
    var mg = ctx.createRadialGradient(x, y + r * 0.1, r * 0.1, x, y + r * 0.1, r * 0.7);
    mg.addColorStop(0, '#fff3b0'); mg.addColorStop(0.4, '#ff9a2b'); mg.addColorStop(1, '#b53a10');
    ctx.beginPath(); ctx.arc(x, y + r * 0.08, r * 0.62, 0, Math.PI * 2); ctx.fillStyle = mg; ctx.fill();
    drawIngot(ctx, x, y + r * 0.05, r * 0.62, metalTier);
  }

  // "TAP" hint arrow until first tap (HARD REQ #1: obvious tappable furnace)
  if (gs === 'PLAYING' && !firstTap && !GF.tutorial.active) {
    var bob = Math.sin(Date.now() / 250) * 8 * S;
    var ty = y - r - 22 * S - bob;
    ctx.fillStyle = '#ffe27a';
    ctx.font = 'bold ' + GF.clamp(20 * S, 14, 28) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(GF.t('tap_hint') + ' ▼', x, ty);
    ctx.textBaseline = 'alphabetic';
  }
}

// auto-smelter shelf: little machines arrayed around the furnace base so
// "machines making money" reads at a glance.
function drawSmelterShelf(ctx) {
  if (smelters <= 0) return;
  var S = GF.S;
  var shown = Math.min(smelters, 12);
  var r = L.furnaceR;
  var baseY = L.furnaceY + r * 0.78;
  var msz = GF.clamp(r * 0.30, 16, 46);
  var spread = Math.min(GF.W - 30 * S, r * 2.4);
  for (var i = 0; i < shown; i++) {
    var t = shown === 1 ? 0.5 : i / (shown - 1);
    var mx = L.furnaceX - spread / 2 + spread * t;
    var my = baseY + (i % 2) * msz * 0.5;
    var pulse = 0.5 + 0.5 * Math.sin(Date.now() / 320 + i * 1.3);
    drawSmelterMachine(ctx, mx, my, msz, pulse);
  }
  if (smelters > shown) {
    ctx.fillStyle = '#ffce8a'; ctx.font = 'bold ' + GF.clamp(13 * S, 10, 18) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('+' + (smelters - shown), L.furnaceX + spread / 2 + msz * 0.7, baseY);
    ctx.textBaseline = 'alphabetic';
  }
}
function drawSmelterMachine(ctx, x, y, sz, pulse) {
  if (GF.sprites['smelter']) { GF.drawSprite('smelter', x, y, sz * 1.4); return; }
  // procedural little smelter: dark box + glowing vent
  ctx.fillStyle = '#3a2a1c';
  GF.rr(ctx, x - sz / 2, y - sz / 2, sz, sz, sz * 0.18); ctx.fill();
  ctx.fillStyle = 'rgba(255,150,40,' + (0.4 + pulse * 0.6).toFixed(2) + ')';
  ctx.beginPath(); ctx.arc(x, y + sz * 0.05, sz * 0.22, 0, Math.PI * 2); ctx.fill();
  // chimney puff
  ctx.fillStyle = 'rgba(255,180,90,' + (0.15 + pulse * 0.25).toFixed(2) + ')';
  ctx.beginPath(); ctx.arc(x + sz * 0.28, y - sz * 0.5 - pulse * sz * 0.3, sz * 0.16, 0, Math.PI * 2); ctx.fill();
}

function drawCoinSprite(ctx, x, y, r) {
  if (GF.sprites['coin']) { GF.drawSprite('coin', x, y, r * 2.2); return; }
  var g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
  g.addColorStop(0, '#fff3b0'); g.addColorStop(0.6, '#ffd23b'); g.addColorStop(1, '#c9920a');
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
  ctx.lineWidth = Math.max(1, r * 0.12); ctx.strokeStyle = '#a8780a'; ctx.stroke();
}
function drawIngot(ctx, x, y, w, tier) {
  if (GF.sprites['ingot' + tier]) { GF.drawSprite('ingot' + tier, x, y, w * 1.7); return; }
  var col = METAL_COL[tier];
  var h = w * 0.5;
  var topW = w * 0.7;
  ctx.save();
  ctx.shadowColor = col.a; ctx.shadowBlur = w * 0.4;
  ctx.beginPath();
  ctx.moveTo(x - w / 2, y + h / 2);
  ctx.lineTo(x + w / 2, y + h / 2);
  ctx.lineTo(x + topW / 2, y - h / 2);
  ctx.lineTo(x - topW / 2, y - h / 2);
  ctx.closePath();
  var g = ctx.createLinearGradient(x, y - h / 2, x, y + h / 2);
  g.addColorStop(0, col.a); g.addColorStop(0.5, col.b); g.addColorStop(1, col.d);
  ctx.fillStyle = g; ctx.fill();
  ctx.restore();
  // top highlight
  ctx.beginPath(); ctx.moveTo(x - topW / 2, y - h / 2); ctx.lineTo(x + topW / 2, y - h / 2);
  ctx.lineWidth = Math.max(1, w * 0.05); ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.stroke();
}

// ── UPGRADE BUTTONS (thumb-reachable bottom stack) ────────────────────────
function buildUpgradeList() {
  var list = [];
  list.push({ kind: 'smelter', label: GF.t('u_smelter'), desc: GF.t('u_smelter_d'),
    cost: smelterCost(), own: smelters, icon: 'smelter', col: '#ff9a3c', maxed: false });
  list.push({ kind: 'tap', label: GF.t('u_tap'), desc: GF.t('u_tap_d'),
    cost: tapPowerCost(), own: null, lvl: tapPower, icon: 'tap', col: '#ffd166', maxed: false });
  list.push({ kind: 'value', label: GF.t('u_value'), desc: GF.t('u_value_d'),
    cost: coinValueCost(), own: null, lvl: coinValueLvl, icon: 'value', col: '#ffe27a', maxed: false });
  list.push({ kind: 'cool', label: GF.t('u_cool'), desc: GF.t('u_cool_d'),
    cost: coolantCost(), own: null, lvl: coolantLvl, icon: 'cool', col: '#6fd0ff', maxed: false });
  if (metalTier < MAX_TIER) {
    list.push({ kind: 'tier', label: GF.t('u_tier') + ' ' + metalName(metalTier + 1),
      desc: GF.t('u_tier_d'), cost: tierUnlockCost(metalTier + 1), own: null,
      icon: 'tier', col: METAL_COL[metalTier + 1].a, maxed: false });
  } else {
    list.push({ kind: 'tier', label: metalName(MAX_TIER), desc: GF.t('u_tier_d'),
      cost: 0, own: null, icon: 'tier', col: METAL_COL[MAX_TIER].a, maxed: true });
  }
  if (coreUnlocked) {
    list.push({ kind: 'reforge', label: GF.t('u_reforge'), desc: GF.t('u_reforge_d'),
      cost: 0, own: null, icon: 'core', col: '#9af4ec', maxed: false, reforge: true });
  }
  return list;
}
function drawUpgrades(ctx) {
  var W = GF.W, S = GF.S;
  var pad = GF.clamp(12 * S, 8, 18);
  var list = buildUpgradeList();
  upgradeRects = [];
  var x = pad, w = W - pad * 2;
  for (var i = 0; i < list.length; i++) {
    var u = list[i];
    var y = L.listY + i * (L.rowH + L.rowGap);
    var affordable = !u.maxed && (u.reforge ? canReforge() : coins >= u.cost);
    drawUpgradeRow(ctx, u, x, y, w, L.rowH, affordable);
    upgradeRects.push({ kind: u.kind, x: x, y: y, w: w, h: L.rowH, cost: u.cost, enabled: affordable, maxed: u.maxed });
  }
}
function drawUpgradeRow(ctx, u, x, y, w, h, affordable) {
  var S = GF.S;
  // background bar
  var bg = ctx.createLinearGradient(x, y, x, y + h);
  if (u.reforge) {
    bg.addColorStop(0, affordable ? 'rgba(30,70,68,0.96)' : 'rgba(22,34,33,0.9)');
    bg.addColorStop(1, affordable ? 'rgba(18,50,48,0.96)' : 'rgba(16,26,25,0.9)');
  } else {
    bg.addColorStop(0, affordable ? 'rgba(48,34,22,0.96)' : 'rgba(26,21,16,0.9)');
    bg.addColorStop(1, affordable ? 'rgba(36,25,16,0.96)' : 'rgba(20,16,12,0.9)');
  }
  GF.rr(ctx, x, y, w, h, GF.clamp(10 * S, 7, 14)); ctx.fillStyle = bg; ctx.fill();
  // accent edge when affordable (legible "next goal" brightening)
  if (affordable) {
    ctx.lineWidth = GF.clamp(2 * S, 1.5, 3); ctx.strokeStyle = u.col;
    GF.rr(ctx, x, y, w, h, GF.clamp(10 * S, 7, 14)); ctx.stroke();
  }
  var ix = x + h * 0.55;
  drawUpgradeIcon(ctx, u.icon, ix, y + h / 2, h * 0.5, u.col, affordable);
  // label + desc
  var lx = x + h * 1.05;
  var lFs = GF.clamp(15 * S, 12, 20);
  var dFs = GF.clamp(11 * S, 9, 15);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold ' + lFs + 'px sans-serif';
  ctx.fillStyle = affordable ? '#fff' : '#9a8a78';
  var labelTxt = u.label;
  if (u.own !== null && u.own !== undefined) labelTxt += '  (' + u.own + ' ' + GF.t('own') + ')';
  else if (u.lvl !== undefined && u.lvl > 0) labelTxt += '  (' + GF.t('lvl') + u.lvl + ')';
  ctx.fillText(labelTxt, lx, y + h * 0.42);
  ctx.font = dFs + 'px sans-serif'; ctx.fillStyle = affordable ? '#d8c2a4' : '#7a6a58';
  ctx.fillText(u.desc, lx, y + h * 0.74);
  // cost / state (right)
  ctx.textAlign = 'right';
  if (u.maxed) {
    ctx.fillStyle = '#c9a86a'; ctx.font = 'bold ' + GF.clamp(13 * S, 11, 18) + 'px sans-serif';
    ctx.fillText(GF.t('maxed'), x + w - h * 0.5, y + h / 2 + GF.clamp(5 * S, 3, 7));
  } else if (u.reforge) {
    ctx.fillStyle = affordable ? '#9af4ec' : '#5a7a78';
    ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px sans-serif';
    var rtxt = affordable ? '>> FORGE' : (GF.t('reforge_at') + ' ' + fmt(coreUnlockCoins));
    ctx.fillText(rtxt, x + w - h * 0.5, y + h / 2 + GF.clamp(5 * S, 3, 7));
  } else {
    // coin icon + cost
    var cFs = GF.clamp(15 * S, 12, 20);
    ctx.fillStyle = affordable ? '#ffe27a' : '#8a7a58';
    ctx.font = 'bold ' + cFs + 'px sans-serif';
    var costStr = fmt(u.cost);
    ctx.fillText(costStr, x + w - h * 0.42, y + h / 2 + GF.clamp(5 * S, 3, 7));
    var tw = ctx.measureText(costStr).width;
    drawCoinSprite(ctx, x + w - h * 0.42 - tw - cFs * 0.55, y + h / 2, cFs * 0.42);
  }
}
function drawUpgradeIcon(ctx, icon, x, y, r, col, on) {
  ctx.save();
  if (on) { ctx.shadowColor = col; ctx.shadowBlur = r * 0.7; }
  if (icon === 'smelter') { drawSmelterMachine(ctx, x, y, r * 1.6, 0.8); ctx.restore(); return; }
  if (icon === 'core') {
    if (GF.sprites['core']) { GF.drawSprite('core', x, y, r * 2.1); ctx.restore(); return; }
    // diamond shard
    ctx.beginPath(); ctx.moveTo(x, y - r); ctx.lineTo(x + r * 0.7, y); ctx.lineTo(x, y + r); ctx.lineTo(x - r * 0.7, y); ctx.closePath();
    var g = ctx.createLinearGradient(x, y - r, x, y + r); g.addColorStop(0, '#cffcf8'); g.addColorStop(1, '#46c9c0');
    ctx.fillStyle = g; ctx.fill(); ctx.restore(); return;
  }
  if (icon === 'cool') {
    if (GF.sprites['heat']) { GF.drawSprite('heat', x, y, r * 2.1); ctx.restore(); return; }
    // snowflake-ish droplet
    ctx.beginPath(); ctx.arc(x, y, r * 0.7, 0, Math.PI * 2); ctx.fillStyle = col; ctx.fill();
    ctx.restore(); return;
  }
  if (icon === 'tier') { drawIngot(ctx, x, y, r * 1.5, GF.clamp(metalTier + 1, 0, MAX_TIER)); ctx.restore(); return; }
  if (icon === 'value') { drawCoinSprite(ctx, x, y, r * 0.8); ctx.restore(); return; }
  // 'tap' — a finger/spark
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(x, y, r * 0.55, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (r * 1.1).toFixed(0) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('T', x, y + r * 0.05);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

function drawHelpButton(ctx) {
  var b = helpBtn, S = GF.S;
  GF.rr(ctx, b.x, b.y, b.w, b.h, b.w * 0.28); ctx.fillStyle = 'rgba(20,15,10,0.7)'; ctx.fill();
  ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(255,180,90,0.5)';
  GF.rr(ctx, b.x, b.y, b.w, b.h, b.w * 0.28); ctx.stroke();

// ── TUTORIAL BLOCK (wrapped, measured layout) ─────────────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}
function drawTutorialBlock(ctx, topY, maxW) {
  var S = GF.S;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var fs = GF.clamp(13 * S, 10, 16);
  var lineH = fs * 1.3;
  ctx.font = fs + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  var y = topY;
  for (var k = 0; k < keys.length; k++) {
    var lines = wrapLines(ctx, GF.t(keys[k]), maxW);
    ctx.fillStyle = (k === 3) ? '#ff9a7a' : (k === 4 ? '#ffd166' : '#e6d3bb');
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], GF.cx - maxW / 2, y); y += lineH; }
    y += lineH * 0.3;
  }
  ctx.textBaseline = 'alphabetic';
  return y - topY;
}

// ── M1: THE OWNED FOUNDRY (rendered on MENU + GAMEOVER) ────────────────────
// A returning player SEES this: four named wings at the levels they built, the
// permanent Foundry bonus, and a Slag balance to spend — none of which a
// first-timer has. This is the world-visible cross-session change.
var WING_COL = { forge:'#ff9a3c', bellows:'#9fd0ff', crucible:'#ffe27a', vault:'#9af4ec' };
function drawWingIcon(ctx, id, x, y, sz) {
  // simple vector glyphs (never emoji — tofu on headless/Android, hygiene rule)
  ctx.save();
  ctx.strokeStyle = WING_COL[id]; ctx.fillStyle = WING_COL[id];
  ctx.lineWidth = Math.max(1.6, sz * 0.10); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  var h = sz * 0.5;
  if (id === 'forge') { // anvil
    ctx.beginPath(); ctx.moveTo(x - h, y - h * 0.1); ctx.lineTo(x + h, y - h * 0.1);
    ctx.lineTo(x + h * 0.55, y + h * 0.35); ctx.lineTo(x - h * 0.55, y + h * 0.35); ctx.closePath(); ctx.fill();
    ctx.fillRect(x - h * 0.18, y + h * 0.35, h * 0.36, h * 0.5);
    ctx.beginPath(); ctx.moveTo(x - h, y - h * 0.1); ctx.quadraticCurveTo(x - h * 1.3, y - h * 0.4, x - h * 0.6, y - h * 0.45); ctx.stroke();
  } else if (id === 'bellows') { // gear
    var n = 8, ro = h * 0.85, ri = h * 0.5;
    ctx.beginPath();
    for (var i = 0; i < n * 2; i++) { var rr = (i % 2 === 0) ? ro : ri; var a = i / (n * 2) * Math.PI * 2; var px = x + Math.cos(a) * rr, py = y + Math.sin(a) * rr; if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#241a12'; ctx.beginPath(); ctx.arc(x, y, h * 0.28, 0, Math.PI * 2); ctx.fill();
  } else if (id === 'crucible') { // crucible pot
    ctx.beginPath(); ctx.moveTo(x - h * 0.7, y - h * 0.5); ctx.lineTo(x + h * 0.7, y - h * 0.5);
    ctx.lineTo(x + h * 0.45, y + h * 0.6); ctx.lineTo(x - h * 0.45, y + h * 0.6); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#fff6c0'; ctx.beginPath(); ctx.moveTo(x - h * 0.5, y - h * 0.5); ctx.lineTo(x + h * 0.5, y - h * 0.5); ctx.stroke();
  } else { // vault — coin stack
    for (var j = 0; j < 3; j++) {
      ctx.beginPath(); ctx.ellipse(x, y + h * 0.45 - j * h * 0.42, h * 0.7, h * 0.26, 0, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.restore();
}
// Draws the foundry panel from top Y `topY`, returns the bottom Y consumed.
function drawFoundry(ctx, topY, maxW) {
  var S = GF.S, W = GF.W;
  foundryRects = [];
  var x0 = GF.cx - maxW / 2;
  // header: title + Slag balance + live bonus
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px sans-serif'; ctx.fillStyle = '#ffce8a';
  ctx.fillText(GF.t('foundry'), x0, topY);
  ctx.textAlign = 'right'; ctx.fillStyle = '#9fe0ff';
  ctx.fillText(GF.t('slag') + ': ' + fmt(slag), x0 + maxW, topY);
  // bonus line
  var bonusY = topY + GF.clamp(16 * S, 12, 22);
  ctx.textAlign = 'left'; ctx.font = GF.clamp(10.5 * S, 8, 14) + 'px sans-serif'; ctx.fillStyle = '#9fb0c0';
  ctx.fillText(GF.t('foundry_mult') + ': x' + foundryMult().toFixed(2), x0, bonusY);
  // four wing cards in a row
  var rowY = bonusY + GF.clamp(10 * S, 6, 14);
  var gap = GF.clamp(7 * S, 4, 11);
  var cw = (maxW - gap * 3) / 4;
  var ch = GF.clamp(74 * S, 58, 96);
  for (var i = 0; i < WINGS.length; i++) {
    var id = WINGS[i].id;
    var cx = x0 + i * (cw + gap);
    var lv = foundryLvl[id] || 0;
    var cost = wingCost(id);
    var afford = slag >= cost;
    var pulse = foundryPulse[id] || 0;
    // card bg — brighten when affordable
    var bg = afford ? 'rgba(40,52,66,0.95)' : 'rgba(26,22,18,0.92)';
    GF.rr(ctx, cx, rowY, cw, ch, GF.clamp(8 * S, 5, 12)); ctx.fillStyle = bg; ctx.fill();
    if (pulse > 0) { ctx.save(); ctx.globalAlpha = pulse * 0.6; GF.rr(ctx, cx, rowY, cw, ch, GF.clamp(8 * S, 5, 12)); ctx.fillStyle = WING_COL[id]; ctx.fill(); ctx.restore(); }
    ctx.lineWidth = 1.5; ctx.strokeStyle = afford ? WING_COL[id] : 'rgba(255,255,255,0.10)';
    GF.rr(ctx, cx, rowY, cw, ch, GF.clamp(8 * S, 5, 12)); ctx.stroke();
    // icon
    var icy = rowY + ch * 0.26;
    drawWingIcon(ctx, id, cx + cw / 2, icy, Math.min(cw * 0.5, ch * 0.34));
    // level badge (top-right corner)
    ctx.textAlign = 'right'; ctx.textBaseline = 'top';
    ctx.font = 'bold ' + GF.clamp(10 * S, 8, 13) + 'px sans-serif'; ctx.fillStyle = '#fff';
    ctx.fillText(GF.t('lvl') + lv, cx + cw - 5 * S, rowY + 4 * S);
    // name
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(11 * S, 8.5, 14) + 'px sans-serif'; ctx.fillStyle = afford ? '#fff' : '#b8aa98';
    ctx.fillText(GF.t('w_' + id), cx + cw / 2, rowY + ch * 0.62);
    // cost (slag) at the bottom
    ctx.font = GF.clamp(10 * S, 8, 13) + 'px sans-serif'; ctx.fillStyle = afford ? '#9fe0ff' : '#7a6f60';
    ctx.fillText(fmt(cost) + ' ' + GF.t('slag'), cx + cw / 2, rowY + ch * 0.85);
    foundryRects.push({ id: id, x: cx, y: rowY, w: cw, h: ch });
  }
  ctx.textBaseline = 'alphabetic';
  var bot = rowY + ch;
  // hint line under the cards
  ctx.textAlign = 'center'; ctx.font = GF.clamp(9.5 * S, 7.5, 13) + 'px sans-serif'; ctx.fillStyle = '#8a7f70';
  ctx.fillText(GF.t('foundry_hint'), GF.cx, bot + GF.clamp(11 * S, 8, 15));
  return bot + GF.clamp(20 * S, 14, 28);
}

// ── M2: human-readable contract title (fills {m}/{tier} placeholders) ──────
function contractTitle(c) {
  var s = GF.t('o_' + c.type) || c.type;
  s = s.replace('{m}', fmt(c.goal));
  if (c.type === 'tier') s = s.replace('{tier}', metalName(c.goal));
  return s;
}
// ── M2: THE ORDER LEDGER panel — daily contracts + streak pips. Compact rows
// (name + mini progress bar + state). Tappable CLAIM pills bank Slag into the
// Foundry. Drawn on MENU + GAMEOVER above the play button. Returns bottom Y. ──
function drawLedger(ctx, topY, maxW) {
  var S = GF.S;
  ledgerRects = [];
  var x0 = GF.cx - maxW / 2;
  // header row: "TODAY'S ORDERS" left, streak pips right
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(12.5 * S, 10, 16) + 'px sans-serif'; ctx.fillStyle = '#ffce8a';
  ctx.fillText(GF.t('orders'), x0, topY);
  // streak pips (7-day) on the right
  var pipR = GF.clamp(3.6 * S, 2.6, 5.2);
  var pipGap = GF.clamp(9 * S, 6.5, 12);
  var pipsW = 7 * pipGap;
  var px = x0 + maxW - pipsW + pipGap * 0.5;
  ctx.font = GF.clamp(9.5 * S, 7.5, 12) + 'px sans-serif'; ctx.fillStyle = '#9fb0c0'; ctx.textAlign = 'right';
  ctx.fillText(GF.t('streak') + ' ' + loginStreak, px - pipGap * 0.5 - 4 * S, topY);
  for (var p = 0; p < 7; p++) {
    var on = p < Math.min(loginStreak, 7);
    ctx.beginPath(); ctx.arc(px + p * pipGap, topY, pipR, 0, Math.PI * 2);
    ctx.fillStyle = on ? '#ffb84b' : 'rgba(255,255,255,0.16)'; ctx.fill();
  }
  // three contract rows
  var rowY = topY + GF.clamp(15 * S, 11, 21);
  var rh = GF.clamp(30 * S, 24, 40);
  var rgap = GF.clamp(6 * S, 4, 9);
  for (var i = 0; i < contracts.length; i++) {
    var c = contracts[i];
    var ry = rowY + i * (rh + rgap);
    var done = contractDone(c);
    var claimable = done && !c.claimed;
    var pulse = ledgerPulse[i] || 0;
    // row bg — claimable rows glow gold; claimed rows dim
    var bg = claimable ? 'rgba(48,40,18,0.95)' : (c.claimed ? 'rgba(20,17,14,0.85)' : 'rgba(30,26,22,0.92)');
    GF.rr(ctx, x0, ry, maxW, rh, GF.clamp(7 * S, 5, 10)); ctx.fillStyle = bg; ctx.fill();
    if (pulse > 0) { ctx.save(); ctx.globalAlpha = pulse * 0.55; GF.rr(ctx, x0, ry, maxW, rh, GF.clamp(7 * S, 5, 10)); ctx.fillStyle = '#ffd166'; ctx.fill(); ctx.restore(); }
    ctx.lineWidth = 1.4; ctx.strokeStyle = claimable ? '#ffce5a' : 'rgba(255,255,255,0.09)';
    GF.rr(ctx, x0, ry, maxW, rh, GF.clamp(7 * S, 5, 10)); ctx.stroke();
    var pad = GF.clamp(9 * S, 6, 13);
    // right-side state widget reserves width FIRST (so text never overlaps it)
    var stW = GF.clamp(62 * S, 48, 84);
    var stX = x0 + maxW - pad - stW;
    // contract title (clipped to the space left of the state widget)
    ctx.save();
    ctx.beginPath(); ctx.rect(x0 + pad, ry, stX - x0 - pad - 6 * S, rh); ctx.clip();
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px sans-serif';
    ctx.fillStyle = c.claimed ? '#8a8074' : '#f2e6d2';
    ctx.fillText(contractTitle(c), x0 + pad, ry + rh * 0.34);
    ctx.restore();
    // mini progress bar under the title
    var barY = ry + rh * 0.70, barH = GF.clamp(4 * S, 3, 6);
    var barW = stX - x0 - pad * 2;
    GF.rr(ctx, x0 + pad, barY, barW, barH, barH / 2); ctx.fillStyle = 'rgba(255,255,255,0.10)'; ctx.fill();
    var frac = GF.clamp(c.prog / c.goal, 0, 1);
    if (frac > 0) {
      GF.rr(ctx, x0 + pad, barY, Math.max(barH, barW * frac), barH, barH / 2);
      ctx.fillStyle = c.claimed ? '#6a6258' : (done ? '#7fe07f' : '#ffb84b'); ctx.fill();
    }
    // progress fraction text (small, left of bar end) — for in-progress rows
    if (!done) {
      ctx.textAlign = 'left'; ctx.font = GF.clamp(8.5 * S, 7, 11) + 'px sans-serif'; ctx.fillStyle = '#9a8f80';
      ctx.fillText(fmt(Math.min(c.prog, c.goal)) + ' / ' + fmt(c.goal), x0 + pad, ry + rh * 0.34 + GF.clamp(11 * S, 9, 14));
    }
    // state widget: CLAIM pill (tappable) / DONE / reward chip
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (claimable) {
      GF.rr(ctx, stX, ry + rh * 0.18, stW, rh * 0.64, GF.clamp(6 * S, 4, 9));
      ctx.fillStyle = '#ffce5a'; ctx.fill();
      ctx.fillStyle = '#3a2408'; ctx.font = 'bold ' + GF.clamp(10.5 * S, 8.5, 13) + 'px sans-serif';
      ctx.fillText('+' + c.reward + ' ' + GF.t('order_claim'), stX + stW / 2, ry + rh / 2);
      ledgerRects.push({ i: i, x: stX, y: ry, w: stW + pad, h: rh });  // generous hit area
    } else if (c.claimed) {
      ctx.fillStyle = '#7fe07f'; ctx.font = 'bold ' + GF.clamp(10 * S, 8, 13) + 'px sans-serif';
      ctx.fillText('✓ ' + GF.t('order_done'), stX + stW / 2, ry + rh / 2);
    } else {
      // reward chip (what you'll earn)
      ctx.fillStyle = '#9fe0ff'; ctx.font = GF.clamp(10 * S, 8, 13) + 'px sans-serif';
      ctx.fillText('+' + c.reward + ' ' + GF.t('slag'), stX + stW / 2, ry + rh / 2);
    }
  }
  ctx.textBaseline = 'alphabetic';
  return rowY + contracts.length * (rh + rgap) - rgap + GF.clamp(8 * S, 5, 12);
}
// ── M2: WELCOME-BACK banner (overnight idle Slag + new orders) ─────────────
function drawWelcomeBanner(ctx) {
  if (showWelcome <= 0) return;
  var S = GF.S, W = GF.W, H = GF.H;
  var a = Math.min(1, showWelcome / 0.6) * Math.min(1, showWelcome > 4 ? (4.5 - showWelcome) / 0.5 + 1 : 1);
  a = GF.clamp(a, 0, 1);
  var bw = Math.min(W - 28 * S, 440 * S);
  var bh = GF.clamp((idleSlagPending > 0 ? 76 : 58) * S, 48, 110);
  var bx = GF.cx - bw / 2, by = GF.clamp(H * 0.10, 30 * S, H * 0.16);
  ctx.save(); ctx.globalAlpha = a;
  GF.rr(ctx, bx, by, bw, bh, GF.clamp(12 * S, 8, 16));
  var bg = ctx.createLinearGradient(bx, by, bx, by + bh);
  bg.addColorStop(0, 'rgba(38,30,20,0.97)'); bg.addColorStop(1, 'rgba(28,22,16,0.97)');
  ctx.fillStyle = bg; ctx.fill();
  ctx.lineWidth = 1.6; ctx.strokeStyle = 'rgba(255,200,100,0.5)';
  GF.rr(ctx, bx, by, bw, bh, GF.clamp(12 * S, 8, 16)); ctx.stroke();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif'; ctx.fillStyle = '#ffce8a';
  ctx.fillText(GF.t('welcome_back'), GF.cx, by + bh * (idleSlagPending > 0 ? 0.26 : 0.36));
  if (idleSlagPending > 0) {
    ctx.font = 'bold ' + GF.clamp(14 * S, 11, 18) + 'px sans-serif'; ctx.fillStyle = '#9fe0ff';
    ctx.fillText('+' + fmt(idleSlagPending) + ' ' + GF.t('slag') + ' ' + GF.t('overnight'), GF.cx, by + bh * 0.55);
    ctx.font = GF.clamp(10.5 * S, 8.5, 14) + 'px sans-serif'; ctx.fillStyle = '#b8a890';
    ctx.fillText(GF.t('new_orders'), GF.cx, by + bh * 0.80);
  } else {
    ctx.font = GF.clamp(11.5 * S, 9, 15) + 'px sans-serif'; ctx.fillStyle = '#b8a890';
    ctx.fillText(GF.t('new_orders'), GF.cx, by + bh * 0.68);
  }
  ctx.restore();
  ctx.textBaseline = 'alphabetic';
}

function drawMenu(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  ctx.fillStyle = '#0e0a07'; ctx.fillRect(0, 0, W, H);  // fully opaque (hard rule)
  var titleFs = GF.clamp(34 * S, 22, 50);
  ctx.shadowColor = 'rgba(255,150,60,0.55)'; ctx.shadowBlur = 26 * S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  var titleY = GF.clamp(H * 0.12, 46 * S, H * 0.19);
  ctx.fillText(GF.t('title'), GF.cx, titleY);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = GF.clamp(13 * S, 10, 18) + 'px sans-serif'; ctx.fillStyle = '#ffb04b';
  ctx.fillText(GF.t('sub'), GF.cx, titleY + 26 * S);
  // little furnace + coin illustration
  var iz = GF.clamp(46 * S, 30, 66);
  var iy = titleY + 62 * S;
  // mini furnace glow
  ctx.save(); ctx.shadowColor = '#ff8a3b'; ctx.shadowBlur = 24 * S;
  var mg = ctx.createRadialGradient(GF.cx - iz, iy, iz * 0.1, GF.cx - iz, iy, iz * 0.7);
  mg.addColorStop(0, '#fff3b0'); mg.addColorStop(0.5, '#ff9a2b'); mg.addColorStop(1, '#7a3010');
  ctx.beginPath(); ctx.arc(GF.cx - iz, iy, iz * 0.6, 0, Math.PI * 2); ctx.fillStyle = mg; ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + iz * 0.5 + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('→', GF.cx, iy);
  drawCoinSprite(ctx, GF.cx + iz, iy, iz * 0.42);
  ctx.textBaseline = 'alphabetic';
  var maxW = Math.min(W - 36 * S, 470 * S);
  // RETURNING PLAYER (owns a Foundry): show the owned Foundry where the tutorial
  // block was — it IS the reason-to-return, visible the moment the menu opens.
  // First-timers (no Slag ever) keep the clean tutorial block; the ? button always
  // reopens how-to-play in-run, so nothing is lost.
  var hasFoundry = lifetimeSlag > 0;
  var blockY = iy + iz * 0.85;
  var blockH;
  if (hasFoundry) {
    // M1 Foundry (own + upgrade) THEN M2 Order Ledger (today's contracts + streak)
    var fBot = drawFoundry(ctx, blockY + 6 * S, maxW);
    var lBot = drawLedger(ctx, fBot + GF.clamp(4 * S, 2, 7), maxW);
    blockH = lBot - blockY;
  } else {
    foundryRects = []; ledgerRects = [];
    blockH = drawTutorialBlock(ctx, blockY, maxW);
  }
  // PLAY button — wider + animated on desktop wide viewports
  var _wide = W / H > 1.15;
  var btnW = GF.clamp((_wide ? 308 : 220) * S, 150, _wide ? 420 : 300);
  var btnH = GF.clamp((_wide ? 73 : 52) * S, 42, _wide ? 96 : 64);
  var _baseY = Math.min(blockY + blockH + 14 * S, H - btnH - 16 * S);
  var btnY = _wide ? Math.min(_baseY, H * 0.60 - btnH / 2) : _baseY;
  if (_wide) {
    var _t = performance.now() / 1000;
    var _p = 1 + 0.05 * Math.sin(_t * 2.2);
    var _k = 0.5 + 0.5 * Math.sin(_t * 2.2);
    var _dw = btnW * _p, _dh = btnH * _p;
    var _dx = GF.cx - _dw / 2, _dy = btnY + btnH / 2 - _dh / 2;
    var _grad = ctx.createLinearGradient(_dx, _dy, _dx, _dy + _dh);
    _grad.addColorStop(0, '#ffb04b'); _grad.addColorStop(1, '#f4842a');
    ctx.save();
    ctx.shadowColor = 'rgba(255,140,40,' + (0.5 + 0.3 * _k).toFixed(3) + ')';
    ctx.shadowBlur = (18 + 12 * _k) * S;
    GF.rr(ctx, _dx, _dy, _dw, _dh, _dh / 2); ctx.fillStyle = _grad; ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#2a1408'; ctx.font = 'bold ' + GF.clamp(26 * S, 18, 34) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('▶ ' + GF.t('play'), GF.cx, btnY + btnH / 2);
    ctx.textBaseline = 'alphabetic';
    playBtnRect = { x: GF.cx - btnW / 2, y: btnY, w: btnW, h: btnH };
  } else {
    drawPlayButton(ctx, btnW, btnH, btnY, GF.t('play'));
  }
  if (best > 0) {
    ctx.fillStyle = '#caa'; ctx.font = GF.clamp(12 * S, 10, 16) + 'px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(GF.t('best') + ': ' + fmt(best), GF.cx, btnY + btnH + 22 * S);
  }
  // M2: welcome-back banner (overnight idle Slag + new orders) — drawn last, on top
  drawWelcomeBanner(ctx);
}

function drawGameOver(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  ctx.fillStyle = '#1e0806'; ctx.fillRect(0, 0, W, H);  // fully opaque (hard rule — no PLAYING bleed-through)
  var titleFs = GF.clamp(38 * S, 24, 56);
  ctx.shadowColor = 'rgba(255,70,40,0.55)'; ctx.shadowBlur = 28 * S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif'; ctx.fillStyle = '#ff6b4b'; ctx.textAlign = 'center';
  var ty = H * 0.26;
  ctx.fillText(GF.t('gameover'), GF.cx, ty);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.fillStyle = '#e6b0a0'; ctx.font = GF.clamp(14 * S, 11, 19) + 'px sans-serif';
  ctx.fillText(GF.t('meltdown_sub'), GF.cx, ty + 30 * S);
  // stats
  var sy = ty + 70 * S;
  ctx.fillStyle = '#ffe27a'; ctx.font = 'bold ' + GF.clamp(24 * S, 16, 34) + 'px sans-serif';
  ctx.fillText(GF.t('score') + ': ' + fmt(score), GF.cx, sy);
  ctx.fillStyle = '#caa'; ctx.font = GF.clamp(14 * S, 11, 19) + 'px sans-serif';
  ctx.fillText(GF.t('best') + ': ' + fmt(best), GF.cx, sy + 28 * S);
  ctx.fillStyle = METAL_COL[maxTierReached].a; ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  ctx.fillText(GF.t('reached') + ': ' + metalName(maxTierReached), GF.cx, sy + 54 * S);
  var afterStats = sy + 54 * S;
  if (coreShards > 0) {
    ctx.fillStyle = '#9af4ec'; ctx.font = 'bold ' + GF.clamp(14 * S, 11, 19) + 'px sans-serif';
    ctx.fillText('* ' + coreShards + ' ' + GF.t('shards'), GF.cx, sy + 78 * S);
    afterStats = sy + 78 * S;
  }
  // M1 SESSION-END HOOK — the salvage banner: the run is gone but it PERMANENTLY
  // fed your Foundry. "+N Slag salvaged" then the owned Foundry to spend it on,
  // right here, before PLAY AGAIN → the loop that pulls the player back tomorrow.
  var salvY = afterStats + GF.clamp(30 * S, 22, 40);
  ctx.fillStyle = '#9fe0ff'; ctx.font = 'bold ' + GF.clamp(17 * S, 13, 23) + 'px sans-serif';
  ctx.fillText('+' + fmt(lastSalvage) + ' ' + GF.t('slag') + ' ' + GF.t('salvaged'), GF.cx, salvY);
  var maxW = Math.min(W - 30 * S, 470 * S);
  // M2: a contract you FILLED this run is claimable here — a single CLAIM ALL pill
  // (the full per-contract board lives on the MENU). Only drawn when something is
  // claimable, so the GAMEOVER card never overflows on mobile.
  ledgerRects = [];
  var claimY = salvY + GF.clamp(24 * S, 18, 32);
  var nClaim = claimableCount();
  var goBlockTop = claimY;
  if (nClaim > 0) {
    var totReward = 0;
    for (var ci = 0; ci < contracts.length; ci++) if (!contracts[ci].claimed && contractDone(contracts[ci])) totReward += contracts[ci].reward;
    var pw = Math.min(W - 60 * S, 300 * S), ph = GF.clamp(38 * S, 30, 50);
    var pxr = GF.cx - pw / 2;
    GF.rr(ctx, pxr, claimY, pw, ph, GF.clamp(9 * S, 6, 13)); ctx.fillStyle = '#ffce5a'; ctx.fill();
    ctx.fillStyle = '#3a2408'; ctx.font = 'bold ' + GF.clamp(13.5 * S, 11, 17) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('claim_all') + '  +' + totReward + ' ' + GF.t('slag') + ' (' + nClaim + ')', GF.cx, claimY + ph / 2);
    ctx.textBaseline = 'alphabetic';
    ledgerRects.push({ claimAll: true, x: pxr, y: claimY, w: pw, h: ph });
    goBlockTop = claimY + ph + GF.clamp(10 * S, 6, 14);
  }
  // the owned Foundry — tappable to spend the slag you just earned
  var foundryBot = drawFoundry(ctx, goBlockTop + GF.clamp(4 * S, 2, 8), maxW);
  // PLAY AGAIN below the foundry
  var btnW = GF.clamp(220 * S, 150, 300), btnH = GF.clamp(52 * S, 42, 64);
  var btnY = Math.min(foundryBot + 8 * S, H - btnH - 16 * S);
  drawPlayButton(ctx, btnW, btnH, btnY, GF.t('retry'));
}

function drawPlayButton(ctx, w, h, y, label) {
  var x = GF.cx - w / 2;
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, '#ffb04b'); grad.addColorStop(1, '#f4842a');
  ctx.save(); ctx.shadowColor = 'rgba(255,140,40,0.5)'; ctx.shadowBlur = 18 * GF.S;
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fillStyle = grad; ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#2a1408'; ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, GF.cx, y + h / 2);
  ctx.textBaseline = 'alphabetic';
  playBtnRect = { x: x, y: y, w: w, h: h };
}

// ── UNIFIED POINTER (mouse + touch) ───────────────────────────────────────
function evtXY(e) {
  if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}
function overlayDown(x, y) {
  if (gs === 'MENU' || gs === 'GAMEOVER') {
    // mute button stays reachable on overlays
    if (x >= muteBtn.x && x <= muteBtn.x + muteBtn.w && y >= muteBtn.y && y <= muteBtn.y + muteBtn.h) {
      var m = GF.toggleMute(); GF.setMusicMuted(m); return true;
    }
    // M2: tap a CLAIM pill (MENU per-contract) or CLAIM ALL pill (GAMEOVER) to
    // bank the contract's Slag reward into the owned Foundry.
    for (var li = 0; li < ledgerRects.length; li++) {
      var lr = ledgerRects[li];
      if (x >= lr.x && x <= lr.x + lr.w && y >= lr.y && y <= lr.y + lr.h) {
        if (lr.claimAll) {
          var any = false;
          for (var ci = 0; ci < contracts.length; ci++) { if (claimContract(ci)) any = true; }
          if (any) { GF.spawnParticles(GF.cx, lr.y + lr.h / 2, '#ffce5a', 16); GF.happytime(); }
        } else {
          if (claimContract(lr.i)) {
            GF.spawnParticles(lr.x + lr.w / 2, lr.y + lr.h / 2, '#ffce5a', 14);
            GF.spawnFloat(lr.x + lr.w / 2, lr.y, '+' + contracts[lr.i].reward + ' ' + GF.t('slag'), '#ffce5a');
          }
        }
        return true;
      }
    }
    // M1: tap a Foundry wing to spend Slag on a permanent upgrade (no need to play first)
    for (var i = 0; i < foundryRects.length; i++) {
      var r = foundryRects[i];
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        if (upgradeWing(r.id)) {
          GF.spawnParticles(r.x + r.w / 2, r.y + r.h / 2, '#9fe0ff', 12);
          GF.spawnFloat(r.x + r.w / 2, r.y, '+1 ' + GF.t('w_' + r.id), '#9fe0ff');
        }
        return true;
      }
    }
    if (playBtnRect && x >= playBtnRect.x && x <= playBtnRect.x + playBtnRect.w && y >= playBtnRect.y && y <= playBtnRect.y + playBtnRect.h) {
      showWelcome = 0; idleSlagPending = 0;  // M2: dismiss the welcome banner on PLAY
      startGame(); return true;
    }
  }
  return false;
}
var cv = document.getElementById('c');
cv.addEventListener('mousedown', function (e) { var p = evtXY(e); if (!overlayDown(p.x, p.y)) onDown(p.x, p.y); });
cv.addEventListener('touchstart', function (e) { e.preventDefault(); var p = evtXY(e); if (!overlayDown(p.x, p.y)) onDown(p.x, p.y); }, { passive: false });
cv.addEventListener('touchend', function (e) { e.preventDefault(); }, { passive: false });
// desktop nicety: Space taps the furnace
document.addEventListener('keydown', function (e) {
  if (gs === 'PLAYING' && e.code === 'Space') { e.preventDefault(); if (!GF.tutorial.active) tapFurnace(); }
});
// M2: stamp "last seen now" whenever the player leaves, so the NEXT boot measures
// real away-time for the overnight idle-Slag accrual (not the whole prior session).
function ledgerMark() { lastSeenMs = Date.now(); ledgerSave(); }
document.addEventListener('visibilitychange', function () { if (document.hidden) ledgerMark(); });
window.addEventListener('pagehide', ledgerMark);
window.addEventListener('beforeunload', ledgerMark);

// ── SCREENSHOT HATCH (Yandex 5.1.1 — populated mid-run, ≥70% gameplay) ────
window._setupForScreenshot = function (level) {
  startGame();
  GF.tutorial.active = false; firstTap = true;
  try { localStorage.setItem('smelter_tycoon_seen_tutorial', '1'); } catch (e) {}
  // a healthy mid-run foundry: several smelters, mid tier, big coin pile, heat partly filled
  smelters = 9; tapPower = 4; coinValueLvl = 3; coolantLvl = 2;
  metalTier = 3; maxTierReached = 3;
  coins = 84000; score = 142000;
  heat = curHeatMax() * 0.58;
  coinsPerSecDisp = coinsPerSec();
  // some flying coins for life
  flyCoins = []; for (var i = 0; i < 4; i++) flingCoin();
  if (level === 2) {
    // a deeper foundry: more smelters, higher tier, heat near critical, Core Shards present
    smelters = 22; tapPower = 7; coinValueLvl = 6; coolantLvl = 5;
    metalTier = 5; maxTierReached = 5;
    coins = 4200000; score = 9800000;
    coreUnlocked = true; coreShards = 4;
    heat = curHeatMax() * 0.82;
    coinsPerSecDisp = coinsPerSec();
    for (var j = 0; j < 6; j++) flingCoin();
  }
  gs = 'PLAYING';
};
// Test seam (same category as _setupForScreenshot/_jumpLevel): returns the
// live upgrade-button rects + furnace center so an automated harness can
// compute exact tap coords. No console output; does not mutate state.
window._btnInfo = function () {
  return {
    gs: gs, furnace: { x: L.furnaceX, y: L.furnaceY, r: L.furnaceR },
    help: { x: helpBtn.x, y: helpBtn.y, w: helpBtn.w, h: helpBtn.h },
    rows: upgradeRects.map(function (r) {
      return { kind: r.kind, x: r.x, y: r.y, w: r.w, h: r.h, enabled: r.enabled, cx: r.x + r.w / 2, cy: r.y + r.h / 2 };
    }),
  };
};
// take_screenshots.js calls _jumpLevel; webapp_gate calls _jumpLevel(1)/(99)
window._jumpLevel = function (n) {
  if (n >= 99) { startGame(); heat = curHeatMax() + meltdownMargin + 1; meltdown(); return; }
  window._setupForScreenshot(n || 1);
};
// M1 test seam (returning-player probe / harness): grant slag, force a wing
// upgrade, or read the owned-foundry state. No console output; deterministic.
window._foundryInfo = function () {
  return { slag: slag, lifetimeSlag: lifetimeSlag, lastSalvage: lastSalvage,
    lvl: { forge: foundryLvl.forge, bellows: foundryLvl.bellows, crucible: foundryLvl.crucible, vault: foundryLvl.vault },
    mult: foundryMult(), rects: foundryRects.map(function (r) { return { id: r.id, x: r.x, y: r.y, w: r.w, h: r.h, cx: r.x + r.w / 2, cy: r.y + r.h / 2 }; }) };
};
window._grantSlag = function (n) { slag += (n || 100); lifetimeSlag += (n || 100); foundrySave(); };
window._upgradeWing = function (id) { return upgradeWing(id); };
// M2 test seams (Order Ledger). Deterministic; no console output.
window._ledgerInfo = function () {
  return { streak: loginStreak, bestStreak: bestStreak, day: ledgerDay, maxTierEver: maxTierEver,
    idlePending: idleSlagPending, idlePerHr: idleSlagPerHour(), claimable: claimableCount(),
    contracts: contracts.map(function (c) { return { type: c.type, goal: c.goal, prog: c.prog, reward: c.reward, claimed: c.claimed, done: contractDone(c) }; }),
    rects: ledgerRects.map(function (r) { return { i: r.i, claimAll: !!r.claimAll, x: r.x, y: r.y, w: r.w, h: r.h, cx: r.x + r.w / 2, cy: r.y + r.h / 2 }; }) };
};
// Simulate the player having last been seen `hoursAgo` hours ago, then re-run the
// boot accrual/roll-over (lets a probe verify idle Slag + a fresh daily roll).
window._simReturn = function (hoursAgo) {
  lastSeenMs = Date.now() - (hoursAgo || 18) * 3600000;
  ledgerDay = dayStamp(lastSeenMs);
  idleSlagPending = 0; showWelcome = 0;
  ledgerSave();
  ledgerOnBoot();
  return window._ledgerInfo();
};
window._claimAll = function () { var n = 0; for (var i = 0; i < contracts.length; i++) if (claimContract(i)) n++; return n; };
// locale_overflow_check hooks
window._setState = function (s) { gs = (s === 'PLAYING' || s === 'GAMEOVER' || s === 'MENU') ? s : gs; };
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return 'sans-serif'; };

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 420,
  designH: 760,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'smelter_tycoon',
  onReady: function () {
    try { best = parseInt(localStorage.getItem('smelter_tycoon_best') || '0') || 0; } catch (e) {}
    foundryLoad();  // M1: restore the permanent owned Foundry (slag + wing levels)
    ledgerLoad();   // M2: restore the Order Ledger (daily contracts + streak + last-seen)
    ledgerOnBoot(); // M2: daily roll-over, login streak, overnight idle-Slag accrual
    // Yandex 1.9 — persist run across reload (in-run only; no cross-session prestige)
    GF.persist('smelter_tycoon_run_v1',
      function () {
        if (gs !== 'PLAYING') return { gs: gs };
        return {
          gs: gs, coins: coins, score: score, smelters: smelters,
          tapPower: tapPower, coinValueLvl: coinValueLvl, coolantLvl: coolantLvl,
          metalTier: metalTier, maxTierReached: maxTierReached, heat: heat,
          coreShards: coreShards, coreUnlocked: coreUnlocked, totalTaps: totalTaps, firstTap: firstTap,
        };
      },
      function (s) {
        if (!s || s.gs !== 'PLAYING') { gs = 'MENU'; return; }
        coins = s.coins || 0; score = s.score || 0; smelters = s.smelters || 0;
        tapPower = s.tapPower || 1; coinValueLvl = s.coinValueLvl || 0; coolantLvl = s.coolantLvl || 0;
        metalTier = s.metalTier || 0; maxTierReached = s.maxTierReached || 0; heat = s.heat || 0;
        coreShards = s.coreShards || 0; coreUnlocked = !!s.coreUnlocked;
        totalTaps = s.totalTaps || 0; firstTap = !!s.firstTap;
        coinsPerSecDisp = coinsPerSec();
        gs = 'PLAYING';
      }
    );
    if (gs !== 'PLAYING') {
      // Platform builds (Yandex/CrazyGames/etc.) drop STRAIGHT into gameplay —
      // no menu/title landing (CLAUDE.md #9). build_platforms.sh injects
      // window.__GF_AUTOSTART next to the SDK tag; the gallery build never gets
      // it (it keeps the menu). startGame() boots to PLAYING and runs the
      // interactive demo-hand tutorial for first-timers (the "interactive menu").
      if (window.__GF_AUTOSTART && !window._silent) startGame();
      else gs = 'MENU';
    }
    GF.startMusic({ preset: 'synth' });
  },
  onUpdate: function (dt) { updateFlyCoins(dt); update(dt); },
  onDraw: draw,
});

// ── EXPOSE STATE (post-build-tester cross-checks vs DESIGN.md) ────────────
GF.exposeState(function () {
  return {
    gs: gs, coins: coins, score: score, best: best,
    coinsPerSec: coinsPerSec(), tapPower: tapPower, smelters: smelters,
    metalTier: metalTier, metalName: metalName(metalTier),
    heat: heat, heatMax: curHeatMax(), coreShards: coreShards, coreUnlocked: coreUnlocked,
    maxTierReached: maxTierReached, coinValueLvl: coinValueLvl, coolantLvl: coolantLvl,
    critTimer: critTimer,
    // M1: permanent owned-Foundry meta (cross-session)
    slag: slag, lifetimeSlag: lifetimeSlag, lastSalvage: lastSalvage,
    foundryLvl: { forge: foundryLvl.forge, bellows: foundryLvl.bellows, crucible: foundryLvl.crucible, vault: foundryLvl.vault },
    foundryMult: foundryMult(),
    // M2: the Order Ledger (daily contracts + streak + overnight idle accrual)
    loginStreak: loginStreak, bestStreak: bestStreak, ledgerDay: ledgerDay,
    maxTierEver: maxTierEver, idleSlagPending: idleSlagPending,
    idleSlagPerHour: idleSlagPerHour(), streakMult: streakMult(),
    claimable: claimableCount(),
    contracts: contracts.map(function (c) { return { type: c.type, goal: c.goal, prog: c.prog, reward: c.reward, claimed: c.claimed, done: contractDone(c) }; }),
    // tunables (DESIGN.md §Tunables)
    tapBase: tapBase, heatPerTap: heatPerTap, heatPerSmelterSec: heatPerSmelterSec,
    coolRate: curCoolRate(), critGrace: critGrace, meltdownMargin: meltdownMargin,
    smelterBaseCost: smelterBaseCost, costMul: costMul, metalMul: metalMul,
    coreUnlockCoins: coreUnlockCoins, coreShardMult: coreShardMult, MAX_TIER: MAX_TIER,
  };
});

// Reachability hook (Yandex 1.10.1/1.10.3 — every control on-screen, not under
// platform chrome). Reports the live interactive hit-rects for the current screen.
GF.exposeReach(function () {
  var items = [];
  if (muteBtn.w) items.push({ id: 'mute', x: muteBtn.x, y: muteBtn.y, w: muteBtn.w, h: muteBtn.h });
  if (gs === 'PLAYING') {
    if (L.furnaceR) items.push({ id: 'furnace', x: L.furnaceX - L.furnaceR, y: L.furnaceY - L.furnaceR, w: L.furnaceR * 2, h: L.furnaceR * 2 });
    if (helpBtn.w) items.push({ id: 'help', x: helpBtn.x, y: helpBtn.y, w: helpBtn.w, h: helpBtn.h });
    for (var i = 0; i < upgradeRects.length; i++) {
      var b = upgradeRects[i];
      items.push({ id: 'upg_' + b.kind, x: b.x, y: b.y, w: b.w, h: b.h });
    }
  } else { // MENU / GAMEOVER — foundry wings + claimable contracts + the play button
    for (var j = 0; j < foundryRects.length; j++) {
      var r = foundryRects[j];
      items.push({ id: 'wing_' + r.id, x: r.x, y: r.y, w: r.w, h: r.h });
    }
    for (var k = 0; k < ledgerRects.length; k++) {
      var lr = ledgerRects[k];
      items.push({ id: lr.claimAll ? 'claim_all' : ('claim_' + lr.i), x: lr.x, y: lr.y, w: lr.w, h: lr.h });
    }
    if (playBtnRect) items.push({ id: 'play', x: playBtnRect.x, y: playBtnRect.y, w: playBtnRect.w, h: playBtnRect.h });
  }
  return { screen: gs, items: items };
});

// Bot contract for the progression probe (#276). Idle/incremental policy: tap the
// furnace ONLY while heat is safe (< 70% of max — re-checked each drain step, so
// it self-limits before overheating), and greedily buy every upgrade + coolant
// (the buy fns no-op when unaffordable; coolant keeps the heat balance for the
// growing smelter count). (old gf-lib lacks GF.exposeBot, so set __gfBot direct.)
window.__gfBot = {
  actions: function () {
    if (gs !== 'PLAYING') return [];
    var a = [];
    if (heat < curHeatMax() * 0.7) a.push('tap');
    a.push('smelter', 'power', 'value', 'cool', 'tier', 'reforge');
    return a;
  },
  act: function (x) {
    if (gs !== 'PLAYING') return;
    if (x === 'tap') tapFurnace();
    else if (x === 'smelter') buySmelter();
    else if (x === 'power') buyTapPower();
    else if (x === 'value') buyCoinValue();
    else if (x === 'cool') buyCoolant();
    else if (x === 'tier') unlockNextTier();
    else if (x === 'reforge') reforge();
  }
};

})();
</script>
