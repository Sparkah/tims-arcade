<script>
(function() {
'use strict';

// ── LOCALISATION ─────────────────────────────────────────────────────────
var STRINGS = {

    tut_tip: 'СОВЕТ: распределяй проекты по всем кварталам - забить Q4 опасно, утечки и уходы экзеков накапливаются.',

    proj_open_world: 'Опен-Ворлд',
    proj_sequel: 'Сиквел',
    proj_live_service: 'Лайв-Сервис',
    proj_indie_pickup: 'Инди-Подбор',
    proj_remake: 'Ремейк',
    ev_engine_bug: 'Баг движка угрожает',
    ev_leak: 'Трейлер слили раньше срока',
    ev_exec_leaves: 'Топ-менеджер уволился',
    ev_demo_buzz: 'Хайп вокруг демо',
    ev_crunch_burnout: 'Кранч выжигает команду',
    ev_no_target: 'Под угрозой никого',
    delta_patience: 'терпение',
    delta_budget: 'бюджет',
    free_continue: 'ДАЛЕЕ (бесплатно)',
  },
};

var SPRITE_NAMES = [];

// ── TUNABLES ─────────────────────────────────────────────────────────────
var PROJECT_COUNT        = 5;
var QUARTERS             = 4;
var EVENTS_PER_QUARTER   = 3;
var PATIENCE_START       = 100;
var PATIENCE_DECAY       = 1;
var DELAY_PATIENCE_COST  = 4;
var MISS_PATIENCE_COST   = 8;
var MARKETING_START      = 60;
var MARKETING_CAP        = 80;
var MARKETING_REFILL     = 12;
var MARKETING_HOLD_COST  = 20;

var CARD_W = 150, CARD_H = 70;
var LANE_H = 110;
var BUTTON_W = 220, BUTTON_H = 56;

var PROJECTS_DEF = [
  { id: 0, key: 'proj_open_world',   color: '#e74c3c', glyph: '🌍' },
  { id: 1, key: 'proj_sequel',       color: '#3498db', glyph: '⚔️' },
  { id: 2, key: 'proj_live_service', color: '#f1c40f', glyph: '🛰️' },
  { id: 3, key: 'proj_indie_pickup', color: '#9b59b6', glyph: '🎲' },
  { id: 4, key: 'proj_remake',       color: '#1abc9c', glyph: '🗝️' },
];

var EVENT_POOL = ['engine_bug', 'leak', 'exec_leaves', 'demo_buzz', 'crunch_burnout'];
var EVENT_GLYPHS = {
  engine_bug: '⚠️', leak: '📣', exec_leaves: '💼', demo_buzz: '✨', crunch_burnout: '☕',
};

// ── STATE ────────────────────────────────────────────────────────────────
var gs = 'MENU';               // MENU | PLAYING | EVENT | GAMEOVER | WIN
var projects = [];             // {id,key,color,glyph,x,y,pinnedQuarter,shippedOnTime,slipped}
var dragging = null;
var dragOffset = { x: 0, y: 0 };
var currentQuarter = 1;        // 1..QUARTERS
var quarterEventIdx = 0;       // 0..EVENTS_PER_QUARTER-1
var patience = PATIENCE_START;
var budget = MARKETING_START;
var shippedOnTime = 0;
var best = 0;
var activeEvent = null;        // { type, target_project_index, label }
var hudButtons = [];
var showTutorial = false;
var seenTutorial = false;
var quarterReady = false;      // becomes true after all pinning done for the quarter; press RESOLVE

// ── HELPERS ──────────────────────────────────────────────────────────────
function rng(n) { return Math.floor(Math.random() * n); }

function projectsInQuarter(q) {
  var r = [];
  for (var i = 0; i < projects.length; i++) {
    if (projects[i].pinnedQuarter === q && !projects[i].resolved) r.push(projects[i]);
  }
  return r;
}

function allProjectsPinned() {
  for (var i = 0; i < projects.length; i++) {
    if (projects[i].pinnedQuarter === null) return false;
  }
  return true;
}

function laneRect(q) {
  var W = GF.W, H = GF.H, S = GF.S;
  var topPad = 70 * S;
  var bottomPad = 170 * S;
  var avH = H - topPad - bottomPad;
  var lh = avH / QUARTERS;
  var laneW = Math.min(W * 0.62, 760 * S);
  var laneX = (W - laneW) / 2;
  return { x: laneX, y: topPad + (q - 1) * lh, w: laneW, h: lh, q: q };
}

function trayRect() {
  var W = GF.W, H = GF.H, S = GF.S;
  return { x: 12 * S, y: H - 150 * S, w: W - 24 * S, h: 140 * S };
}

function trayCardSlot(idx) {
  var t = trayRect();
  var S = GF.S;
  var cardW = CARD_W * S, cardH = CARD_H * S;
  var gap = 12 * S;
  var totalW = projects.length * cardW + (projects.length - 1) * gap;
  var startX = t.x + (t.w - totalW) / 2;
  return { x: startX + idx * (cardW + gap), y: t.y + (t.h - cardH) / 2, w: cardW, h: cardH };
}

// ── LIFECYCLE ────────────────────────────────────────────────────────────
function buildProjects() {
  projects = [];
  for (var i = 0; i < PROJECTS_DEF.length; i++) {
    var p = PROJECTS_DEF[i];
    projects.push({
      id: p.id, key: p.key, color: p.color, glyph: p.glyph,
      x: 0, y: 0, w: CARD_W, h: CARD_H,
      pinnedQuarter: null, resolved: false, shippedOnTime: false, slipped: false,
    });
  }
}

function startGame() {
  buildProjects();
  currentQuarter = 1;
  quarterEventIdx = 0;
  patience = PATIENCE_START;
  budget = MARKETING_START;
  shippedOnTime = 0;
  activeEvent = null;
  dragging = null;
  quarterReady = false;
  gs = 'PLAYING';
  showTutorial = false;
  seenTutorial = true;
  try { localStorage.setItem('wishlist_wheel_seen_tutorial', '1'); } catch (_) {}
  try { GF.gameStarted(); } catch (_) {}
  try { GF.saveRun(); } catch (_) {}
}

function gameOver() {
  if (shippedOnTime > best) {
    best = shippedOnTime;
    try { localStorage.setItem('wishlist_wheel_best', best); } catch (_) {}
  }
  gs = 'GAMEOVER';
  try { GF.gameEnded(); } catch (_) {}
  try { GF.saveRun(); } catch (_) {}
}

function winGame() {
  if (shippedOnTime > best) {
    best = shippedOnTime;
    try { localStorage.setItem('wishlist_wheel_best', best); } catch (_) {}
  }
  gs = 'WIN';
  try { GF.gameEnded(); } catch (_) {}
  try { GF.saveRun(); } catch (_) {}
}

// ── QUARTER RESOLUTION ───────────────────────────────────────────────────
function resolveQuarter() {
  if (gs !== 'PLAYING') return;
  if (!allProjectsPinned()) return;
  quarterReady = true;
  quarterEventIdx = 0;
  nextEvent();
}

function nextEvent() {
  if (gs !== 'PLAYING') return;
  if (quarterEventIdx >= EVENTS_PER_QUARTER) {
    // ship all projects pinned to this quarter that survived
    var here = projectsInQuarter(currentQuarter);
    for (var i = 0; i < here.length; i++) {
      here[i].resolved = true;
      if (!here[i].slipped) {
        here[i].shippedOnTime = true;
        shippedOnTime++;
        GF.spawnFloat(here[i].x + here[i].w/2, here[i].y, '+1 ' + GF.t('hud_shipped'), '#2ecc71');
      }
    }
    // patience decay per quarter
    patience -= PATIENCE_DECAY;
    // marketing refill
    budget = Math.min(MARKETING_CAP, budget + MARKETING_REFILL);
    GF.spawnFloat(GF.W * 0.18, 60 * GF.S, '+' + MARKETING_REFILL + ' ' + GF.t('delta_budget'), '#48c9b0');
    if (patience <= 0) { gameOver(); return; }
    currentQuarter++;
    quarterReady = false;
    if (currentQuarter > QUARTERS) { winGame(); return; }
    try { GF.saveRun(); } catch (_) {}
    return;
  }

  // pick event type
  var type = EVENT_POOL[rng(EVENT_POOL.length)];
  // for engine_bug + crunch_burnout, target a pinned-not-resolved project in this or later quarter
  var candidates = [];
  for (var i = 0; i < projects.length; i++) {
    if (projects[i].pinnedQuarter !== null && !projects[i].resolved && !projects[i].slipped) {
      candidates.push(i);
    }
  }
  var targetIdx = candidates.length ? candidates[rng(candidates.length)] : -1;

  activeEvent = { type: type, targetIdx: targetIdx };
  gs = 'EVENT';
  quarterEventIdx++;
}

function applyEventAuto(ev) {
  // events that don't need a choice
  if (ev.type === 'leak') {
    var spend = 10;
    budget = Math.max(0, budget - spend);
    GF.spawnFloat(GF.W * 0.18, 60 * GF.S, '-' + spend + ' ' + GF.t('delta_budget'), '#f1c40f');
    return;
  }
  if (ev.type === 'exec_leaves') {
    patience = Math.max(0, patience - 8);
    GF.spawnFloat(GF.W * 0.82, 60 * GF.S, '-8 ' + GF.t('delta_patience'), '#e74c3c');
    return;
  }
  if (ev.type === 'demo_buzz') {
    patience = Math.min(PATIENCE_START, patience + 8);
    GF.spawnFloat(GF.W * 0.82, 60 * GF.S, '+8 ' + GF.t('delta_patience'), '#2ecc71');
    return;
  }
}

function handleEventChoice(spend) {
  if (!activeEvent) return;
  var ev = activeEvent;
  if (ev.type === 'engine_bug' || ev.type === 'crunch_burnout') {
    // these have spend/accept choices
    if (spend) {
      if (budget < MARKETING_HOLD_COST) return; // can't afford
      budget -= MARKETING_HOLD_COST;
      GF.spawnFloat(GF.W * 0.18, 60 * GF.S, '-' + MARKETING_HOLD_COST + ' ' + GF.t('delta_budget'), '#f1c40f');
      // held — nothing else happens
    } else {
      // accept delay — patience cost, mark target project as slipped
      patience = Math.max(0, patience - DELAY_PATIENCE_COST);
      GF.spawnFloat(GF.W * 0.82, 60 * GF.S, '-' + DELAY_PATIENCE_COST + ' ' + GF.t('delta_patience'), '#e74c3c');
      if (ev.targetIdx >= 0) {
        var p = projects[ev.targetIdx];
        p.slipped = true;
        // missed-date penalty if the slipped project was pinned to the current quarter
        if (p.pinnedQuarter === currentQuarter) {
          patience = Math.max(0, patience - MISS_PATIENCE_COST);
          GF.spawnFloat(p.x + p.w/2, p.y, '-' + MISS_PATIENCE_COST + ' ' + GF.t('delta_patience'), '#e74c3c');
          p.resolved = true; // missed
        }
      }
    }
  } else {
    applyEventAuto(ev);
  }
  activeEvent = null;
  if (patience <= 0) { gameOver(); return; }
  gs = 'PLAYING';
  // continue next event
  setTimeout(nextEvent, 50);
}

// ── INPUT ────────────────────────────────────────────────────────────────
function getPointerXY(e) {
  if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches[0]) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function pointInRect(px, py, r) {
  return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

function onPointerDown(e) {
  var p = getPointerXY(e);
  // hud buttons first
  for (var i = 0; i < hudButtons.length; i++) {
    var b = hudButtons[i];
    if (pointInRect(p.x, p.y, b)) {
      b.fn();
      if (e.preventDefault) e.preventDefault();
      return;
    }
  }
  if (gs === 'MENU') return; // menu PLAY button is in hudButtons
  if (showTutorial) {
    showTutorial = false;
    if (e.preventDefault) e.preventDefault();
    return;
  }
  if (gs !== 'PLAYING') return;
  // try to grab an unpinned card or one in a lane
  for (var j = 0; j < projects.length; j++) {
    var pj = projects[j];
    if (pj.resolved) continue;
    if (pointInRect(p.x, p.y, { x: pj.x, y: pj.y, w: pj.w * GF.S, h: pj.h * GF.S })) {
      dragging = pj;
      dragOffset.x = p.x - pj.x;
      dragOffset.y = p.y - pj.y;
      if (e.preventDefault) e.preventDefault();
      return;
    }
  }
}

function onPointerMove(e) {
  if (!dragging) return;
  var p = getPointerXY(e);
  dragging.x = p.x - dragOffset.x;
  dragging.y = p.y - dragOffset.y;
  if (e.preventDefault) e.preventDefault();
}

function onPointerUp(e) {
  if (!dragging) return;
  var p = getPointerXY(e);
  // drop check — find quarter lane under center of card
  var cx = dragging.x + dragging.w * GF.S / 2;
  var cy = dragging.y + dragging.h * GF.S / 2;
  var droppedOn = null;
  for (var q = 1; q <= QUARTERS; q++) {
    var r = laneRect(q);
    if (cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
      droppedOn = q; break;
    }
  }
  if (droppedOn !== null && droppedOn >= currentQuarter) {
    dragging.pinnedQuarter = droppedOn;
    GF.spawnParticles(cx, cy, dragging.color, 10);
  } else {
    // snap back if not pinned to a current/future quarter, or unpin
    dragging.pinnedQuarter = null;
  }
  dragging = null;
  try { GF.saveRun(); } catch (_) {}
  if (e.preventDefault) e.preventDefault();
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (gs !== 'PLAYING' && gs !== 'EVENT') return;
  // for unpinned cards, snap to tray slot
  var unpinnedIdx = 0;
  for (var i = 0; i < projects.length; i++) {
    var p = projects[i];
    if (p.resolved) continue;
    if (p === dragging) continue;
    if (p.pinnedQuarter === null) {
      var slot = trayCardSlot(unpinnedIdx);
      unpinnedIdx++;
      p.x += (slot.x - p.x) * Math.min(1, dt * 8);
      p.y += (slot.y - p.y) * Math.min(1, dt * 8);
    } else {
      // place inside its lane
      var lane = laneRect(p.pinnedQuarter);
      var qProjects = projectsInQuarter(p.pinnedQuarter);
      var idx = qProjects.indexOf(p);
      var card_w = p.w * GF.S, card_h = p.h * GF.S;
      var gap = 8 * GF.S;
      var totalW = qProjects.length * card_w + (qProjects.length - 1) * gap;
      var startX = lane.x + (lane.w - totalW) / 2;
      var tx = startX + idx * (card_w + gap);
      var ty = lane.y + (lane.h - card_h) / 2;
      p.x += (tx - p.x) * Math.min(1, dt * 8);
      p.y += (ty - p.y) * Math.min(1, dt * 8);
    }
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function drawBg() {
  var c = GF.ctx, W = GF.W, H = GF.H;
  var g = c.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0c1020');
  g.addColorStop(1, '#1a1d3a');
  c.fillStyle = g; c.fillRect(0, 0, W, H);
  // subtle grid
  c.strokeStyle = 'rgba(255,255,255,0.04)'; c.lineWidth = 1;
  var step = 40 * GF.S;
  for (var x = 0; x < W; x += step) { c.beginPath(); c.moveTo(x, 0); c.lineTo(x, H); c.stroke(); }
  for (var y = 0; y < H; y += step) { c.beginPath(); c.moveTo(0, y); c.lineTo(W, y); c.stroke(); }
}

function drawLanes() {
  var c = GF.ctx, S = GF.S;
  for (var q = 1; q <= QUARTERS; q++) {
    var r = laneRect(q);
    var isCurrent = (q === currentQuarter);
    var isPast = (q < currentQuarter);
    c.fillStyle = isCurrent ? 'rgba(46,204,113,0.10)' : (isPast ? 'rgba(80,80,90,0.18)' : 'rgba(255,255,255,0.04)');
    GF.rr(c, r.x, r.y, r.w, r.h, 10 * S); c.fill();
    c.strokeStyle = isCurrent ? 'rgba(46,204,113,0.65)' : 'rgba(255,255,255,0.12)';
    c.lineWidth = isCurrent ? 2 : 1;
    GF.rr(c, r.x, r.y, r.w, r.h, 10 * S); c.stroke();

    // label
    c.fillStyle = isCurrent ? '#2ecc71' : '#88a';
    c.font = 'bold ' + GF.clamp(18 * S, 14, 24) + 'px sans-serif';
    c.textAlign = 'left'; c.textBaseline = 'middle';
    c.fillText('Q' + q, r.x + 12 * S, r.y + r.h / 2);
  }
}

function drawCard(p) {
  var c = GF.ctx, S = GF.S;
  var cardW = p.w * S, cardH = p.h * S;
  // shadow
  c.fillStyle = 'rgba(0,0,0,0.35)';
  GF.rr(c, p.x + 3 * S, p.y + 4 * S, cardW, cardH, 10 * S); c.fill();
  // body
  var grad = c.createLinearGradient(p.x, p.y, p.x, p.y + cardH);
  grad.addColorStop(0, p.color);
  grad.addColorStop(1, shade(p.color, -0.35));
  c.fillStyle = grad;
  GF.rr(c, p.x, p.y, cardW, cardH, 10 * S); c.fill();
  // slip overlay
  if (p.slipped) {
    c.fillStyle = 'rgba(231,76,60,0.55)';
    GF.rr(c, p.x, p.y, cardW, cardH, 10 * S); c.fill();
  }
  // glyph
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(22 * S, 16, 30) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(p.glyph, p.x + 22 * S, p.y + cardH / 2);
  // name
  c.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px sans-serif';
  c.textAlign = 'left'; c.textBaseline = 'middle';
  c.fillStyle = '#fff';
  c.fillText(GF.t(p.key), p.x + 42 * S, p.y + cardH / 2);
}

function shade(hex, amt) {
  var c = hex.replace('#', '');
  var r = parseInt(c.substring(0,2),16), g = parseInt(c.substring(2,4),16), b = parseInt(c.substring(4,6),16);
  r = Math.max(0, Math.min(255, Math.round(r + r * amt)));
  g = Math.max(0, Math.min(255, Math.round(g + g * amt)));
  b = Math.max(0, Math.min(255, Math.round(b + b * amt)));
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function drawProjects() {
  // draw non-dragging first, dragging on top
  for (var i = 0; i < projects.length; i++) {
    if (projects[i].resolved) continue;
    if (projects[i] === dragging) continue;
    drawCard(projects[i]);
  }
  if (dragging) drawCard(dragging);
}

function drawTray() {
  var c = GF.ctx, S = GF.S;
  var t = trayRect();
  c.fillStyle = 'rgba(8,12,28,0.7)';
  GF.rr(c, t.x, t.y, t.w, t.h, 10 * S); c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.08)';
  GF.rr(c, t.x, t.y, t.w, t.h, 10 * S); c.stroke();
  // label
  var unpinnedCount = 0;
  for (var i = 0; i < projects.length; i++) {
    if (!projects[i].resolved && projects[i].pinnedQuarter === null) unpinnedCount++;
  }
  c.fillStyle = '#88a';
  c.font = GF.clamp(11 * S, 9, 14) + 'px sans-serif';
  c.textAlign = 'left'; c.textBaseline = 'top';
  c.fillText(GF.t('tray') + ' · ' + unpinnedCount, t.x + 8 * S, t.y + 6 * S);
  if (unpinnedCount > 0) {
    c.textAlign = 'right';
    c.fillStyle = '#5a6';
    c.fillText(GF.t('pin_hint'), t.x + t.w - 8 * S, t.y + 6 * S);
  }
}

function drawBar(x, y, w, h, frac, colorA, colorB, label, val, valMax) {
  var c = GF.ctx, S = GF.S;
  // bg
  c.fillStyle = 'rgba(0,0,0,0.35)';
  GF.rr(c, x, y, w, h, h/2); c.fill();
  // fill
  var fw = Math.max(0, Math.min(1, frac)) * w;
  if (fw > 0) {
    var g = c.createLinearGradient(x, y, x + w, y);
    g.addColorStop(0, colorA); g.addColorStop(1, colorB);
    c.fillStyle = g;
    GF.rr(c, x, y, fw, h, h/2); c.fill();
  }
  // border
  c.strokeStyle = 'rgba(255,255,255,0.18)';
  GF.rr(c, x, y, w, h, h/2); c.stroke();
  // label
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px sans-serif';
  c.textAlign = 'left'; c.textBaseline = 'middle';
  c.fillText(label + ': ' + val + '/' + valMax, x + 8 * S, y + h / 2);
}

function drawHUD() {
  var c = GF.ctx, W = GF.W, S = GF.S;
  hudButtons = [];
  var barW = GF.clamp(220 * S, 160, 280);
  var barH = 26 * S;
  // budget left
  drawBar(12 * S, 12 * S, barW, barH, budget / MARKETING_CAP, '#f1c40f', '#e67e22',
          GF.t('hud_budget'), budget | 0, MARKETING_CAP);
  // patience right
  drawBar(W - barW - 12 * S, 12 * S, barW, barH, patience / PATIENCE_START, '#2ecc71', '#e74c3c',
          GF.t('hud_patience'), patience | 0, PATIENCE_START);

  // center quarter / event indicator
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(14 * S, 12, 18) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'top';
  var qStr = GF.t('hud_quarter') + ': Q' + Math.min(currentQuarter, QUARTERS) + '/' + QUARTERS;
  if (gs === 'EVENT' || quarterReady) {
    qStr += '  ·  ' + GF.t('hud_event') + ' ' + Math.min(quarterEventIdx, EVENTS_PER_QUARTER) + '/' + EVENTS_PER_QUARTER;
  }
  c.fillText(qStr, W / 2, 16 * S);
  c.font = GF.clamp(11 * S, 9, 14) + 'px sans-serif';
  c.fillStyle = '#9ab';
  c.fillText(GF.t('hud_shipped') + ': ' + shippedOnTime + '/' + PROJECT_COUNT, W / 2, 16 * S + GF.clamp(14 * S, 12, 18) + 4 * S);

  // help button bottom-right (above tray)
  var btnSize = 36 * S;
  var qx = W - btnSize - 12 * S;
  var qy = 50 * S;
  c.fillStyle = '#3a4256';
  GF.rr(c, qx, qy, btnSize, btnSize, 8 * S); c.fill();
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(20 * S, 16, 26) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText('?', qx + btnSize / 2, qy + btnSize / 2);
  hudButtons.push({ x: qx, y: qy, w: btnSize, h: btnSize, fn: function () { showTutorial = true; } });

  // resolve quarter button (only when all pinned and not currently in EVENT)
  if (gs === 'PLAYING' && !activeEvent && allProjectsPinned() && currentQuarter <= QUARTERS) {
    var rW = GF.clamp(220 * S, 160, 260);
    var rH = 44 * S;
    var rX = (W - rW) / 2;
    var rY = 50 * S;
    var grad = c.createLinearGradient(rX, rY, rX, rY + rH);
    grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
    c.fillStyle = grad;
    GF.rr(c, rX, rY, rW, rH, rH / 2); c.fill();
    c.fillStyle = '#fff';
    c.font = 'bold ' + GF.clamp(14 * S, 12, 18) + 'px sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(GF.t('resolve'), rX + rW / 2, rY + rH / 2);
    hudButtons.push({ x: rX, y: rY, w: rW, h: rH, fn: resolveQuarter });
  }
}

function drawEventPanel() {
  if (!activeEvent) return;
  var c = GF.ctx, W = GF.W, H = GF.H, S = GF.S;
  var t = trayRect();
  // dim the tray area
  c.fillStyle = 'rgba(8,10,24,0.92)';
  GF.rr(c, t.x, t.y, t.w, t.h, 10 * S); c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.16)';
  GF.rr(c, t.x, t.y, t.w, t.h, 10 * S); c.stroke();

  // icon + label
  var ev = activeEvent;
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(22 * S, 18, 30) + 'px sans-serif';
  c.textAlign = 'left'; c.textBaseline = 'middle';
  c.fillText(EVENT_GLYPHS[ev.type] || '⚠️', t.x + 18 * S, t.y + 30 * S);
  c.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  c.fillStyle = '#ffd166';
  c.fillText(GF.t('ev_' + ev.type), t.x + 50 * S, t.y + 30 * S);

  // target subtext
  c.font = GF.clamp(12 * S, 10, 16) + 'px sans-serif';
  c.fillStyle = '#9bd9ff';
  var targetTxt = ev.targetIdx >= 0 ? GF.t(projects[ev.targetIdx].key) : GF.t('ev_no_target');
  c.fillText('→ ' + targetTxt, t.x + 50 * S, t.y + 30 * S + GF.clamp(15 * S, 12, 20) + 4 * S);

  // buttons
  var needsChoice = (ev.type === 'engine_bug' || ev.type === 'crunch_burnout');
  var bW = GF.clamp(BUTTON_W * S, 140, 260);
  var bH = GF.clamp(BUTTON_H * S * 0.7, 36, 52);
  var bGap = 14 * S;
  var bYy = t.y + t.h - bH - 14 * S;
  if (needsChoice) {
    var totW = bW * 2 + bGap;
    var bXa = t.x + (t.w - totW) / 2;
    var bXb = bXa + bW + bGap;
    // spend
    var canAfford = budget >= MARKETING_HOLD_COST;
    var ga = c.createLinearGradient(bXa, bYy, bXa, bYy + bH);
    if (canAfford) { ga.addColorStop(0, '#f1c40f'); ga.addColorStop(1, '#d68910'); }
    else { ga.addColorStop(0, '#555'); ga.addColorStop(1, '#333'); }
    c.fillStyle = ga;
    GF.rr(c, bXa, bYy, bW, bH, bH / 2); c.fill();
    c.fillStyle = '#fff';
    c.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(GF.t('spend') + ' (-' + MARKETING_HOLD_COST + ')', bXa + bW / 2, bYy + bH / 2);
    if (canAfford) hudButtons.push({ x: bXa, y: bYy, w: bW, h: bH, fn: function () { handleEventChoice(true); } });
    // accept
    var gb = c.createLinearGradient(bXb, bYy, bXb, bYy + bH);
    gb.addColorStop(0, '#e74c3c'); gb.addColorStop(1, '#c0392b');
    c.fillStyle = gb;
    GF.rr(c, bXb, bYy, bW, bH, bH / 2); c.fill();
    c.fillStyle = '#fff';
    c.fillText(GF.t('accept') + ' (-' + DELAY_PATIENCE_COST + ')', bXb + bW / 2, bYy + bH / 2);
    hudButtons.push({ x: bXb, y: bYy, w: bW, h: bH, fn: function () { handleEventChoice(false); } });
  } else {
    // single continue button — auto-resolved events
    var bXc = t.x + (t.w - bW) / 2;
    var gc = c.createLinearGradient(bXc, bYy, bXc, bYy + bH);
    gc.addColorStop(0, '#3498db'); gc.addColorStop(1, '#2471a3');
    c.fillStyle = gc;
    GF.rr(c, bXc, bYy, bW, bH, bH / 2); c.fill();
    c.fillStyle = '#fff';
    c.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(GF.t('free_continue'), bXc + bW / 2, bYy + bH / 2);
    hudButtons.push({ x: bXc, y: bYy, w: bW, h: bH, fn: function () { applyEventAuto(activeEvent); activeEvent = null; if (patience <= 0) { gameOver(); return; } gs = 'PLAYING'; setTimeout(nextEvent, 50); } });
  }
}

// ── MENU OVERLAY (with wrapped tutorial copy) ───────────────────────────
function wrapTextLines(c, text, maxW) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else { cur = probe; }
  }
  if (cur) lines.push(cur);
  return lines;
}

function drawMenuOverlay() {
  var c = GF.ctx, W = GF.W, H = GF.H, S = GF.S;
  hudButtons = [];
  c.fillStyle = 'rgba(8,10,24,0.94)';
  c.fillRect(0, 0, W, H);

  var titleFs = GF.clamp(32 * S, 22, 50);
  var subFs   = GF.clamp(14 * S, 11, 19);
  var maxW = Math.min(W - 32 * S, 560 * S);
  var leftX = (W - maxW) / 2;

  c.shadowColor = 'rgba(46,204,113,0.45)'; c.shadowBlur = 24 * S;
  c.fillStyle = '#fff';
  c.font = 'bold ' + titleFs + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.fillText(GF.t('title'), W / 2, H * 0.14);
  c.shadowColor = 'transparent'; c.shadowBlur = 0;

  c.font = subFs + 'px sans-serif';
  c.fillStyle = '#9bd9ff';
  c.textAlign = 'center';
  c.fillText(GF.t('sub'), W / 2, H * 0.14 + subFs + 8 * S);

  // tutorial wrapped block
  var blockY = H * 0.14 + subFs * 2 + 18 * S;
  var lineH = subFs * 1.35;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  c.font = subFs + 'px sans-serif';
  c.fillStyle = '#cde';
  c.textAlign = 'left';
  c.textBaseline = 'top';
  var cursorY = blockY;
  for (var k = 0; k < keys.length; k++) {
    var lines = wrapTextLines(c, GF.t(keys[k]), maxW);
    for (var ln = 0; ln < lines.length; ln++) {
      c.fillText(lines[ln], leftX, cursorY);
      cursorY += lineH;
    }
    cursorY += 4 * S;
  }

  var _wide = W / H > 1.15;
  var _bwBase = GF.clamp(240 * S, 160, 320), _bhBase = GF.clamp(52 * S, 40, 66);
  var btnW = _wide ? GF.clamp(_bwBase * 1.4, 220, 450) : _bwBase;
  var btnH = _wide ? GF.clamp(_bhBase * 1.35, 54, 90) : _bhBase;
  var btnX = W / 2 - btnW / 2;
  var btnY = Math.min(cursorY + 14 * S, H - btnH - 24 * S);
  var _t = performance.now() / 1000;
  var _p = _wide ? (1 + 0.05 * Math.sin(_t * 2.2)) : 1;
  var _pw = btnW * _p, _ph = btnH * _p, _pxw = W / 2 - _pw / 2, _pyw = btnY + btnH / 2 - _ph / 2;
  c.save();
  if (_wide) { c.shadowColor = 'rgba(46,204,113,0.55)'; c.shadowBlur = (8 + 6 * Math.sin(_t * 2.2)) * S; }
  var g = c.createLinearGradient(_pxw, _pyw, _pxw, _pyw + _ph);
  g.addColorStop(0, '#2ecc71'); g.addColorStop(1, '#27ae60');
  GF.rr(c, _pxw, _pyw, _pw, _ph, _ph / 2);
  c.fillStyle = g; c.fill();
  c.restore();
  c.font = 'bold ' + GF.clamp((_wide ? 22 : (subFs | 0)) * GF.S, 13, 28) + 'px sans-serif';
  c.fillStyle = '#fff';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText((_wide ? '▶ ' : '') + GF.t('play'), W / 2, btnY + btnH / 2);
  c.textBaseline = 'alphabetic';
  // hit-rect: stable base size
  hudButtons.push({ x: W / 2 - _bwBase / 2, y: btnY + (btnH - _bhBase) / 2, w: _bwBase, h: _bhBase, fn: startGame });

  if (best > 0) {
    c.font = GF.clamp(13 * S, 10, 17) + 'px sans-serif';
    c.fillStyle = '#557';
    c.textAlign = 'center';
    c.fillText(GF.t('best') + ': ' + best, W / 2, btnY + btnH + 24 * S);
  }
}

function drawTutorialPanel() {
  // re-use the menu draw for in-game help, but as a dismiss overlay
  var c = GF.ctx, W = GF.W, H = GF.H, S = GF.S;
  c.fillStyle = 'rgba(8,10,24,0.94)';
  c.fillRect(0, 0, W, H);
  var titleFs = GF.clamp(26 * S, 18, 40);
  var subFs = GF.clamp(14 * S, 11, 19);
  c.fillStyle = '#fff';
  c.font = 'bold ' + titleFs + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.fillText(GF.t('title'), W / 2, H * 0.16);
  var maxW = Math.min(W - 32 * S, 560 * S);
  var leftX = (W - maxW) / 2;
  var blockY = H * 0.20;
  var lineH = subFs * 1.35;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  c.font = subFs + 'px sans-serif';
  c.fillStyle = '#cde';
  c.textAlign = 'left';
  c.textBaseline = 'top';
  var cursorY = blockY;
  for (var k = 0; k < keys.length; k++) {
    var lines = wrapTextLines(c, GF.t(keys[k]), maxW);
    for (var ln = 0; ln < lines.length; ln++) {
      c.fillText(lines[ln], leftX, cursorY);
      cursorY += lineH;
    }
    cursorY += 4 * S;
  }
  c.fillStyle = '#9ab';
  c.font = (subFs * 0.9) + 'px sans-serif';
  c.textAlign = 'center';
  c.fillText(GF.t('dismiss'), W / 2, H * 0.92);
}

function draw(ctx) {
  drawBg();

  if (gs === 'PLAYING' || gs === 'EVENT') {
    drawLanes();
    drawTray();
    drawProjects();
    if (gs === 'EVENT') drawEventPanel();
    drawHUD();
    if (showTutorial) drawTutorialPanel();
  }

  if (gs === 'MENU') drawMenuOverlay();

  if (gs === 'GAMEOVER') {
    hudButtons = [];
    GF.drawOverlay({
      title: GF.t('gameover'),
      sub: GF.t('hud_shipped') + ': ' + shippedOnTime + '/' + PROJECT_COUNT,
      btnText: GF.t('retry'),
      btnFn: startGame,
      bestText: best > 0 ? GF.t('best') + ': ' + best : null,
    });
  }
  if (gs === 'WIN') {
    hudButtons = [];
    GF.drawOverlay({
      title: GF.t('win'),
      sub: GF.t('hud_shipped') + ': ' + shippedOnTime + '/' + PROJECT_COUNT,
      btnText: GF.t('retry'),
      btnFn: startGame,
      bestText: best > 0 ? GF.t('best') + ': ' + best : null,
    });
  }
}

// ── SCREENSHOT HELPER ────────────────────────────────────────────────────
window._setupForScreenshot = function (lvl) {
  startGame();
  // auto-pin all five projects spread across quarters
  for (var i = 0; i < projects.length; i++) {
    projects[i].pinnedQuarter = (i % QUARTERS) + 1;
  }
  // optionally advance one project as slipped for visual energy
  if (lvl >= 2 && projects.length >= 3) {
    projects[2].slipped = true;
  }
  // sim some patience/budget tension
  patience = lvl >= 3 ? 35 : 62;
  budget = lvl >= 3 ? 18 : 40;
  shippedOnTime = lvl >= 2 ? 1 : 0;
  currentQuarter = Math.min(QUARTERS, 1 + Math.floor((lvl - 1) / 1));
  if (currentQuarter < 1) currentQuarter = 1;
};
window._jumpLevel = function (lvl) {
  // gate uses _jumpLevel(99) to drive terminal state
  if (lvl >= 99) {
    startGame();
    patience = 0;
    gameOver();
    return;
  }
  window._setupForScreenshot(lvl);
};

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 1280,
  designH: 720,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'wishlist_wheel',
  onReady: function () {
    try { best = parseInt(localStorage.getItem('wishlist_wheel_best') || '0') || 0; } catch (_) {}
    try { seenTutorial = !!localStorage.getItem('wishlist_wheel_seen_tutorial'); } catch (_) {}
    GF.persist('wishlist_wheel_run_v1',
      function () {
        return {
          gs: gs, currentQuarter: currentQuarter, patience: patience, budget: budget,
          shippedOnTime: shippedOnTime,
          projects: projects.map(function (p) {
            return { id: p.id, pinnedQuarter: p.pinnedQuarter, resolved: p.resolved, slipped: p.slipped, shippedOnTime: p.shippedOnTime };
          }),
        };
      },
      function (s) {
        if (!s) return;
        // safe restore to MENU — game state survives soft refresh but always lands on a fresh start screen
        gs = 'MENU';
        shippedOnTime = s.shippedOnTime || 0;
      }
    );
    if (gs === 'PLAYING' || gs === 'EVENT') gs = 'MENU';
    buildProjects();
  },
  onUpdate: update,
  onDraw: draw,
});

GF.exposeState(function () {
  return {
    gs: gs,
    currentQuarter: currentQuarter,
    quarterEventIdx: quarterEventIdx,
    patience: patience,
    budget: budget,
    shippedOnTime: shippedOnTime,
    PROJECT_COUNT: PROJECT_COUNT,
    QUARTERS: QUARTERS,
    EVENTS_PER_QUARTER: EVENTS_PER_QUARTER,
    PATIENCE_START: PATIENCE_START,
    PATIENCE_DECAY: PATIENCE_DECAY,
    DELAY_PATIENCE_COST: DELAY_PATIENCE_COST,
    MISS_PATIENCE_COST: MISS_PATIENCE_COST,
    MARKETING_START: MARKETING_START,
    MARKETING_CAP: MARKETING_CAP,
    MARKETING_REFILL: MARKETING_REFILL,
    MARKETING_HOLD_COST: MARKETING_HOLD_COST,
  };
});

var canvas = document.getElementById('c');
canvas.addEventListener('mousedown', onPointerDown);
window.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('touchstart', function (e) { onPointerDown(e); }, { passive: false });
canvas.addEventListener('touchmove', function (e) { onPointerMove(e); }, { passive: false });
canvas.addEventListener('touchend', function (e) { onPointerUp(e); }, { passive: false });

window._setLang = function (l) { GF.lang = l; };
window._setState = function (s) { gs = s; };
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return 'sans-serif'; };

})();
</script>
