function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function currentCase() { return CASES[clamp(caseIndex, 0, CASES.length - 1)]; }
function causeDef(id) {
  for (var i = 0; i < CAUSES.length; i++) if (CAUSES[i].id === id) return CAUSES[i];
  return CAUSES[0];
}
function sfx(name, gapMs) {
  var now = Date.now();
  var gap = gapMs || 70;
  if (lastSfx[name] && now - lastSfx[name] < gap) return;
  lastSfx[name] = now;
  GF.sfx(name);
}
function saveGame() {
  if (!screenshotMode) GF.saveRun();
}
function fieldActionsForCase(idx) {
  return Math.max(MIN_ACTIONS, START_ACTIONS - Math.floor(idx / ACTION_DROP_EVERY_CASE));
}
function ptrPos(e) {
  var r = GF.canvas.getBoundingClientRect();
  var sx = GF.W / Math.max(1, r.width);
  var sy = GF.H / Math.max(1, r.height);
  return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
}
function hitRect(p, r) {
  return r && p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
}
function hitCircle(p, c) {
  var dx = p.x - c.x;
  var dy = p.y - c.y;
  return dx * dx + dy * dy <= c.r * c.r;
}
function roundRect(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}
function fs(base) {
  var boost = Math.min(GF.W, GF.H) < 420 ? 1.05 : 1;
  return Math.max(10, Math.round(base * ui.s * boost));
}
function fitText(c, text, x, y, maxW, size, color, align, weight) {
  var s = size;
  c.textAlign = align || 'left';
  c.textBaseline = 'middle';
  c.fillStyle = color || '#ffffff';
  while (s > 9) {
    c.font = (weight || '700') + ' ' + Math.round(s) + 'px sans-serif';
    if (c.measureText(text).width <= maxW) break;
    s -= 1;
  }
  c.fillText(text, x, y);
}
function wrapLines(c, text, maxW, size, maxLines) {
  c.font = '600 ' + Math.round(size) + 'px sans-serif';
  var words = String(text).split(/\s+/);
  var lines = [];
  var line = '';
  for (var i = 0; i < words.length; i++) {
    var next = line ? line + ' ' + words[i] : words[i];
    if (c.measureText(next).width <= maxW || !line) {
      line = next;
    } else {
      lines.push(line);
      line = words[i];
      if (maxLines && lines.length >= maxLines) break;
    }
  }
  if ((!maxLines || lines.length < maxLines) && line) lines.push(line);
  if (maxLines && lines.length > maxLines) lines.length = maxLines;
  return lines;
}
function drawWrapped(c, text, x, y, maxW, size, lineH, color, weight, maxLines) {
  var lines = wrapLines(c, text, maxW, size, maxLines);
  c.fillStyle = color || '#ffffff';
  c.textAlign = 'left';
  c.textBaseline = 'top';
  c.font = (weight || '600') + ' ' + Math.round(size) + 'px sans-serif';
  for (var i = 0; i < lines.length; i++) c.fillText(lines[i], x, y + i * lineH);
  return lines.length * lineH;
}
function worldToScreen(x, y) {
  return { x: ui.scene.x + x * ui.scene.w, y: ui.scene.y + y * ui.scene.h };
}

function layout() {
  ui.s = clamp(Math.min(GF.W / 440, GF.H / 760), 0.72, 1.55);
  ui.top = Math.round(58 * ui.s);
  var stacked = GF.W < 560;
  ui.bottom = stacked ? Math.min(Math.round(355 * ui.s), Math.round(GF.H * 0.52)) : Math.min(Math.round(235 * ui.s), Math.round(GF.H * 0.36));
  if (GF.H - ui.top - ui.bottom < 230 * ui.s) ui.bottom = Math.max(190 * ui.s, GF.H - ui.top - 230 * ui.s);
  var pad = 12 * ui.s;
  ui.scene = { x: pad, y: ui.top + 5 * ui.s, w: GF.W - pad * 2, h: Math.max(170 * ui.s, GF.H - ui.top - ui.bottom - 12 * ui.s) };
  var by = GF.H - ui.bottom + 8 * ui.s;
  var bh = ui.bottom - 14 * ui.s;
  if (stacked) {
    var evH = Math.min(92 * ui.s, Math.max(70 * ui.s, bh * 0.28));
    ui.evidence = { x: pad, y: by, w: GF.W - pad * 2, h: evH };
    ui.report = { x: pad, y: ui.evidence.y + ui.evidence.h + 8 * ui.s, w: GF.W - pad * 2, h: bh - ui.evidence.h - 8 * ui.s };
  } else {
    ui.evidence = { x: pad, y: by, w: GF.W * 0.43 - pad * 1.5, h: bh };
    ui.report = { x: ui.evidence.x + ui.evidence.w + 10 * ui.s, y: by, w: GF.W - ui.evidence.x - ui.evidence.w - 22 * ui.s, h: bh };
  }
  ui.help = { x: GF.W - 28 * ui.s, y: 29 * ui.s, r: HELP_BUTTON_RADIUS * ui.s };
  ui.mute = { x: GF.W - 72 * ui.s, y: 29 * ui.s, r: MUTE_BUTTON_RADIUS * ui.s };
  ui.retry = { x: GF.cx - 78 * ui.s, y: GF.cy + 78 * ui.s, w: 156 * ui.s, h: 44 * ui.s };
  ui.helpClose = { x: GF.cx - 72 * ui.s, y: GF.cy + 150 * ui.s, w: 144 * ui.s, h: 40 * ui.s };
  buildHitRects();
}

function buildHitRects() {
  clueRects = [];
  causeButtons = [];
  culpritButtons = [];
  var data = currentCase();
  for (var i = 0; i < data.clues.length; i++) {
    var p = worldToScreen(data.clues[i].x, data.clues[i].y);
    clueRects.push({ x: p.x, y: p.y, r: CLUE_RADIUS * ui.s, index: i });
  }
  var rr = ui.report;
  var pad = 8 * ui.s;
  var top = rr.y + 34 * ui.s;
  var bw = (rr.w - pad * 3) / 2;
  var bh = 30 * ui.s;
  for (var c = 0; c < CAUSES.length; c++) {
    causeButtons.push({
      id: CAUSES[c].id,
      x: rr.x + pad + (c % 2) * (bw + pad),
      y: top + Math.floor(c / 2) * (bh + 6 * ui.s),
      w: bw,
      h: bh
    });
  }
  var cy = top + 2 * (bh + 6 * ui.s) + 12 * ui.s;
  for (var s = 0; s < data.suspects.length; s++) {
    culpritButtons.push({
      id: data.suspects[s],
      x: rr.x + pad + (s % 2) * (bw + pad),
      y: cy + Math.floor(s / 2) * (bh + 6 * ui.s),
      w: bw,
      h: bh
    });
  }
  ui.submit = {
    x: rr.x + pad,
    y: rr.y + rr.h - 38 * ui.s,
    w: rr.w - pad * 2,
    h: 32 * ui.s
  };
}

function resetForCase(idx) {
  caseIndex = clamp(idx, 0, CASES.length - 1);
  actionsLeft = fieldActionsForCase(caseIndex);
  selectedCause = '';
  selectedCulprit = '';
  evidence = [];
  inspected = {};
  caseSolved = false;
  clearTimer = 0;
  hintKey = '';
  hintTimer = 0;
  reasonKey = '';
  sceneClock = 0;
}

function startGame() {
  gs = 'PLAYING';
  score = 0;
  wrongReports = 0;
  helpOpen = false;
  screenshotMode = false;
  coachStep = tutorialSeen ? 99 : 0;
  resetForCase(0);
  started = true;
  GF.gameStarted();
  saveGame();
}

function gameOver(reason) {
  gs = 'GAMEOVER';
  reasonKey = reason || 'reason_actions';
  if (score > best) {
    best = score;
    GF.happytime();
  }
  bestSolved = Math.max(bestSolved, caseIndex);
  sfx('lose', 180);
  GF.juice.shake(10 * ui.s, 360);
  GF.juice.flash('#61232a', 260, 0.24);
  GF.gameEnded();
  saveGame();
}

function winGame() {
  gs = 'WON';
  reasonKey = '';
  bestSolved = CASE_COUNT;
  if (score > best) {
    best = score;
    GF.happytime();
  }
  sfx('win', 220);
  GF.juice.flash('#fff0a6', 420, 0.36);
  GF.juice.particles.burst(GF.cx, GF.cy - 38 * ui.s, { count: 48, colors: ['#ffe27a', '#ffffff', '#84e0a2', '#79b7ff'], speed: 280, gravity: 260, life: 0.9, size: 5 });
  GF.gameEnded();
  saveGame();
}

function inspectClue(index) {
  if (gs !== 'PLAYING' || caseSolved || helpOpen) return;
  if (inspected[index]) return;
  var data = currentCase();
  var clue = data.clues[index];
  inspected[index] = true;
  evidence.unshift({ index: index, title: clue.title, note: clue.note, cause: clue.cause });
  if (evidence.length > 4) evidence.length = 4;
  actionsLeft--;
  score += CLUE_SCORE + caseIndex * 8;
  var p = worldToScreen(clue.x, clue.y);
  sfx('unlock', 90);
  GF.juice.particles.burst(p.x, p.y, { count: 18, colors: [causeDef(clue.cause).color, '#ffffff', '#d7f7c8'], speed: 160, gravity: 160, life: 0.52, size: 4 });
  GF.juice.floatText(p.x, p.y - 22 * ui.s, GF.t('evidence'), { color: '#ffffff', size: fs(16), life: 0.8 });
  if (!tutorialSeen && coachStep === 0) coachStep = 1;
  if (actionsLeft <= 0 && !caseSolved) {
    gameOver('reason_actions');
  } else {
    saveGame();
  }
}

function chooseCause(id) {
  if (gs !== 'PLAYING' || caseSolved || helpOpen) return;
  selectedCause = id;
  sfx('click', 70);
  if (!tutorialSeen && coachStep === 1) coachStep = 2;
  saveGame();
}

function chooseCulprit(id) {
  if (gs !== 'PLAYING' || caseSolved || helpOpen) return;
  selectedCulprit = id;
  sfx('click', 70);
  if (!tutorialSeen && coachStep === 2) coachStep = 3;
  saveGame();
}

function submitReport() {
  if (gs !== 'PLAYING' || caseSolved || helpOpen) return;
  var data = currentCase();
  if (!selectedCause || !selectedCulprit) {
    hintKey = 'no_report';
    hintTimer = REPORT_HINT_FLASH_SEC;
    sfx('hit', 120);
    GF.juice.shake(4 * ui.s, 180);
    return;
  }
  var causeOK = selectedCause === data.cause;
  var culpritOK = selectedCulprit === data.culprit;
  if (causeOK && culpritOK) {
    solveCase();
    if (!tutorialSeen && coachStep === 3) {
      coachStep = 4;
      tutorialSeen = true;
    }
  } else {
    wrongReports++;
    score = Math.max(0, score - 120);
    hintKey = !causeOK && !culpritOK ? 'hint_both' : (!causeOK ? 'hint_cause' : 'hint_culprit');
    hintTimer = REPORT_HINT_FLASH_SEC;
    selectedCause = causeOK ? selectedCause : '';
    selectedCulprit = culpritOK ? selectedCulprit : '';
    sfx('hit', 130);
    GF.juice.shake(8 * ui.s, 300);
    GF.juice.flash('#ff6d73', 180, 0.2);
    if (wrongReports >= MAX_WRONG_REPORTS) gameOver('reason_wrongs');
    else saveGame();
  }
}

function solveCase() {
  caseSolved = true;
  var gain = CORRECT_REPORT_SCORE + actionsLeft * ACTION_BONUS_SCORE + caseIndex * 140;
  score += gain;
  bestSolved = Math.max(bestSolved, caseIndex + 1);
  sfx(caseIndex === CASES.length - 1 ? 'win' : 'levelup', 180);
  GF.juice.flash('#dfffd2', 260, 0.24);
  GF.juice.particles.burst(GF.cx, ui.scene.y + ui.scene.h * 0.36, { count: 36, colors: ['#dfffd2', '#ffffff', '#ffe27a'], speed: 240, gravity: 220, life: 0.75, size: 5 });
  GF.juice.floatText(GF.cx, ui.scene.y + ui.scene.h * 0.30, '+' + gain, { color: '#ffe27a', size: fs(23), life: 1.0 });
  if (caseIndex >= CASES.length - 1) {
    clearTimer = 0.65;
  } else {
    clearTimer = 1.05;
  }
  saveGame();
}

function update(dt) {
  GF.juice.update(dt);
  var gdt = dt * GF.juice.timeScale;
  sceneClock += gdt;
  if (hintTimer > 0) hintTimer = Math.max(0, hintTimer - gdt);
  if (gs === 'PLAYING' && caseSolved && clearTimer > 0) {
    clearTimer -= gdt;
    if (clearTimer <= 0) {
      if (caseIndex >= CASES.length - 1) winGame();
      else {
        resetForCase(caseIndex + 1);
        saveGame();
      }
    }
  }
}

function draw(ctx) {
  layout();
  ctx.clearRect(0, 0, GF.W, GF.H);
  ctx.save();
  ctx.translate(GF.juice.offsetX, GF.juice.offsetY);
  drawBackground(ctx);
  drawHabitat(ctx);
  drawHUD(ctx);
  drawEvidencePanel(ctx);
  drawReportPanel(ctx);
  drawCoach(ctx);
  GF.juice.particles.draw(ctx);
  GF.juice.texts.draw(ctx);
  ctx.restore();
  drawHelp(ctx);
  drawTerminal(ctx);
  GF.juice.drawFlash(ctx);
}

function drawBackground(c) {
  var data = currentCase();
  var p = data.palette;
  var g = c.createLinearGradient(0, 0, 0, GF.H);
  g.addColorStop(0, p[0]);
  g.addColorStop(0.58, p[1]);
  g.addColorStop(1, '#141812');
  c.fillStyle = g;
  c.fillRect(0, 0, GF.W, GF.H);
  for (var i = 0; i < 22; i++) {
    var x = ((i * 97 + caseIndex * 41) % Math.max(1, GF.W));
    var y = ui.top + ((i * 53 + caseIndex * 29) % Math.max(1, GF.H - ui.top));
    var a = 0.05 + ((i % 5) * 0.012);
    c.fillStyle = 'rgba(255,255,255,' + a + ')';
    c.beginPath();
    c.arc(x + Math.sin(sceneClock * 0.5 + i) * 5 * ui.s, y, (1 + i % 3) * ui.s, 0, Math.PI * 2);
    c.fill();
  }
}

function drawHabitat(c) {
  var r = ui.scene;
  var data = currentCase();
  c.save();
  roundRect(c, r.x, r.y, r.w, r.h, 12 * ui.s);
  c.clip();
  var g = c.createLinearGradient(r.x, r.y, r.x, r.y + r.h);
  g.addColorStop(0, data.palette[1]);
  g.addColorStop(0.65, data.palette[2]);
  g.addColorStop(1, data.palette[3]);
  c.fillStyle = g;
  c.fillRect(r.x, r.y, r.w, r.h);
  drawTerrain(c, r, data);
  drawAnimalMarker(c, r, data);
  drawClues(c, data);
  c.restore();
  c.strokeStyle = 'rgba(255,255,255,0.20)';
  c.lineWidth = 2 * ui.s;
  roundRect(c, r.x, r.y, r.w, r.h, 12 * ui.s);
  c.stroke();
  fitText(c, GF.t(data.habitat), r.x + 12 * ui.s, r.y + 18 * ui.s, r.w * 0.52, fs(17), '#f2f4d0', 'left', '850');
  fitText(c, GF.t(data.animal), r.x + r.w - 12 * ui.s, r.y + 18 * ui.s, r.w * 0.36, fs(14), '#eef4e8', 'right', '700');
}

function drawTerrain(c, r, data) {
  var waterY = r.y + r.h * (caseIndex === 1 || caseIndex === 5 ? 0.58 : 0.76);
  c.fillStyle = caseIndex === 1 || caseIndex === 5 ? 'rgba(87,150,153,0.48)' : 'rgba(78,113,82,0.26)';
  c.beginPath();
  c.ellipse(r.x + r.w * 0.52, waterY, r.w * 0.52, r.h * 0.18, Math.sin(sceneClock * 0.2) * 0.04, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = 'rgba(42,47,31,0.30)';
  c.lineWidth = 16 * ui.s;
  c.lineCap = 'round';
  c.beginPath();
  c.moveTo(r.x + r.w * 0.02, r.y + r.h * 0.66);
  c.bezierCurveTo(r.x + r.w * 0.25, r.y + r.h * 0.52, r.x + r.w * 0.48, r.y + r.h * 0.49, r.x + r.w * 0.98, r.y + r.h * 0.34);
  c.stroke();
  c.lineWidth = 6 * ui.s;
  c.strokeStyle = 'rgba(236,213,144,0.25)';
  c.stroke();
  for (var i = 0; i < 10; i++) {
    var x = r.x + ((i * 0.17 + caseIndex * 0.07) % 1) * r.w;
    var y = r.y + (0.18 + ((i * 0.29) % 0.72)) * r.h;
    drawGrass(c, x, y, data.palette[0], (0.7 + (i % 4) * 0.15) * ui.s);
  }
  if (caseIndex === 3) {
    c.fillStyle = 'rgba(94,86,74,0.62)';
    c.beginPath();
    c.moveTo(r.x + r.w * 0.55, r.y + r.h * 0.14);
    c.lineTo(r.x + r.w * 0.95, r.y + r.h * 0.42);
    c.lineTo(r.x + r.w * 0.68, r.y + r.h * 0.84);
    c.closePath();
    c.fill();
  }
  if (caseIndex === 4) {
    for (var t = 0; t < 5; t++) drawTree(c, r.x + r.w * (0.18 + t * 0.17), r.y + r.h * (0.20 + (t % 2) * 0.13), ui.s);
  }
}

function drawGrass(c, x, y, color, scale) {
  c.strokeStyle = color;
  c.lineWidth = 2 * scale;
  c.lineCap = 'round';
  for (var i = 0; i < 4; i++) {
    c.beginPath();
    c.moveTo(x, y);
    c.quadraticCurveTo(x + (i - 1.5) * 5 * scale, y - 10 * scale, x + (i - 1.5) * 8 * scale, y - 18 * scale);
    c.stroke();
  }
}

function drawTree(c, x, y, s) {
  c.fillStyle = '#4b3324';
  roundRect(c, x - 5 * s, y + 10 * s, 10 * s, 38 * s, 4 * s);
  c.fill();
  c.fillStyle = '#183f28';
  c.beginPath();
  c.moveTo(x, y - 32 * s);
  c.lineTo(x - 28 * s, y + 26 * s);
  c.lineTo(x + 28 * s, y + 26 * s);
  c.closePath();
  c.fill();
}

function drawAnimalMarker(c, r, data) {
  var x = r.x + r.w * 0.50;
  var y = r.y + r.h * 0.52;
  c.save();
  c.globalAlpha = 0.85;
  c.fillStyle = 'rgba(245,241,218,0.22)';
  c.beginPath();
  c.ellipse(x, y, 36 * ui.s, 20 * ui.s, -0.12, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.36)';
  c.lineWidth = 2 * ui.s;
  c.stroke();
  c.fillStyle = 'rgba(255,255,255,0.42)';
  c.beginPath();
  c.arc(x + 26 * ui.s, y - 6 * ui.s, 9 * ui.s, 0, Math.PI * 2);
  c.fill();
  c.restore();
  fitText(c, GF.t(data.animal), x, y + 34 * ui.s, 112 * ui.s, fs(12), '#ffffff', 'center', '700');
}

function drawClues(c, data) {
  for (var i = 0; i < data.clues.length; i++) {
    var clue = data.clues[i];
    var p = worldToScreen(clue.x, clue.y);
    var seen = !!inspected[i];
    var pulse = 1 + Math.sin(sceneClock * 4 + i) * (seen ? 0.02 : 0.09);
    var rad = CLUE_RADIUS * ui.s * pulse;
    c.fillStyle = seen ? 'rgba(235,247,219,0.34)' : 'rgba(255,237,142,0.24)';
    c.beginPath();
    c.arc(p.x, p.y, rad, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = seen ? 'rgba(255,255,255,0.40)' : 'rgba(255,239,151,0.92)';
    c.lineWidth = seen ? 1.5 * ui.s : 2.5 * ui.s;
    c.stroke();
    drawClueIcon(c, clue.icon, p.x, p.y, seen ? '#dfead0' : causeDef(clue.cause).color, ui.s);
    if (!seen && !tutorialSeen && coachStep === 0 && i === 0) {
      c.strokeStyle = 'rgba(255,255,255,0.75)';
      c.lineWidth = 3 * ui.s;
      c.beginPath();
      c.arc(p.x, p.y, rad + 8 * ui.s + Math.sin(sceneClock * 6) * 2 * ui.s, 0, Math.PI * 2);
      c.stroke();
    }
  }
}

function drawClueIcon(c, type, x, y, color, s) {
  c.save();
  c.strokeStyle = color;
  c.fillStyle = color;
  c.lineWidth = 3 * s;
  c.lineCap = 'round';
  if (type === 'tracks') {
    for (var i = 0; i < 3; i++) {
      c.beginPath();
      c.ellipse(x - 8 * s + i * 8 * s, y - 3 * s + (i % 2) * 7 * s, 4 * s, 7 * s, 0.4, 0, Math.PI * 2);
      c.fill();
    }
  } else if (type === 'water' || type === 'fish') {
    c.beginPath();
    c.moveTo(x - 13 * s, y + 4 * s);
    c.quadraticCurveTo(x, y - 14 * s, x + 13 * s, y + 4 * s);
    c.quadraticCurveTo(x, y + 15 * s, x - 13 * s, y + 4 * s);
    c.fill();
    if (type === 'fish') {
      c.fillStyle = '#d9f4f2';
      c.beginPath();
      c.ellipse(x, y + 2 * s, 10 * s, 5 * s, 0, 0, Math.PI * 2);
      c.fill();
    }
  } else if (type === 'feather') {
    c.beginPath();
    c.moveTo(x - 12 * s, y + 12 * s);
    c.quadraticCurveTo(x + 8 * s, y - 18 * s, x + 15 * s, y - 7 * s);
    c.quadraticCurveTo(x + 5 * s, y + 3 * s, x - 12 * s, y + 12 * s);
    c.fill();
  } else if (type === 'branch' || type === 'reed') {
    c.beginPath();
    c.moveTo(x - 14 * s, y + 10 * s);
    c.lineTo(x + 14 * s, y - 12 * s);
    c.moveTo(x - 2 * s, y - 1 * s);
    c.lineTo(x - 12 * s, y - 8 * s);
    c.moveTo(x + 5 * s, y - 5 * s);
    c.lineTo(x + 10 * s, y + 6 * s);
    c.stroke();
  } else if (type === 'leaf' || type === 'berry') {
    c.beginPath();
    c.ellipse(x - 5 * s, y, 8 * s, 13 * s, -0.7, 0, Math.PI * 2);
    c.ellipse(x + 7 * s, y + 2 * s, 8 * s, 13 * s, 0.7, 0, Math.PI * 2);
    c.fill();
    if (type === 'berry') {
      c.fillStyle = '#d45873';
      c.beginPath(); c.arc(x + 2 * s, y - 8 * s, 5 * s, 0, Math.PI * 2); c.fill();
    }
  } else if (type === 'pellet' || type === 'crystal') {
    for (var p = 0; p < 5; p++) {
      c.beginPath();
      c.arc(x + (p - 2) * 6 * s, y + ((p % 2) - 0.5) * 8 * s, (type === 'crystal' ? 3.5 : 4.5) * s, 0, Math.PI * 2);
      c.fill();
    }
  } else if (type === 'rock' || type === 'scrape') {
    c.beginPath();
    c.moveTo(x - 15 * s, y + 9 * s);
    c.lineTo(x - 5 * s, y - 14 * s);
    c.lineTo(x + 16 * s, y - 2 * s);
    c.lineTo(x + 8 * s, y + 12 * s);
    c.closePath();
    c.fill();
    if (type === 'scrape') {
      c.strokeStyle = '#fff7cc';
      c.beginPath();
      c.moveTo(x - 14 * s, y + 14 * s);
      c.lineTo(x + 14 * s, y - 12 * s);
      c.stroke();
    }
  } else if (type === 'fence' || type === 'tire') {
    c.beginPath();
    if (type === 'fence') {
      c.moveTo(x - 16 * s, y + 8 * s); c.lineTo(x + 16 * s, y - 8 * s);
      c.moveTo(x - 10 * s, y - 13 * s); c.lineTo(x - 10 * s, y + 13 * s);
      c.moveTo(x + 8 * s, y - 13 * s); c.lineTo(x + 8 * s, y + 13 * s);
    } else {
      c.ellipse(x, y, 14 * s, 8 * s, 0.3, 0, Math.PI * 2);
      c.moveTo(x - 10 * s, y - 2 * s); c.lineTo(x + 10 * s, y + 2 * s);
    }
    c.stroke();
  } else {
    c.beginPath();
    c.arc(x, y, 12 * s, 0, Math.PI * 2);
    c.fill();
  }
  c.restore();
}

function drawHUD(c) {

  c.fillRect(0, 0, GF.W, ui.top);

  drawCircleButton(c, ui.mute.x, ui.mute.y, ui.mute.r, '#26382f');

}

function drawCircleButton(c, x, y, r, color) {
  c.fillStyle = color;
  c.beginPath();
  c.arc(x, y, r, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.22)';

  c.stroke();
}

function drawStamps(c) {
  var s = ui.s;
  var x0 = GF.cx - 48 * s;
  var y = ui.top - 10 * s;
  for (var i = 0; i < CASE_COUNT; i++) {
    var x = x0 + i * 19 * s;
    c.fillStyle = i < bestSolved || (gs === 'PLAYING' && i < caseIndex) ? '#ffe27a' : 'rgba(255,255,255,0.20)';
    c.beginPath();
    c.arc(x, y, 6 * s, 0, Math.PI * 2);
    c.fill();
  }
}

function evidenceCount() {
  var n = 0;
  for (var k in inspected) if (inspected[k]) n++;
  return n;
}

function drawEvidencePanel(c) {
  var r = ui.evidence;
  c.fillStyle = 'rgba(10,16,14,0.78)';
  roundRect(c, r.x, r.y, r.w, r.h, 8 * ui.s);
  c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.14)';
  c.stroke();
  fitText(c, GF.t('evidence'), r.x + 10 * ui.s, r.y + 17 * ui.s, r.w - 20 * ui.s, fs(14), '#fff1a8', 'left', '850');
  if (!evidence.length) {
    drawWrapped(c, GF.t('coach_clue'), r.x + 10 * ui.s, r.y + 34 * ui.s, r.w - 20 * ui.s, fs(12), fs(15), '#dbe7cf', '600', 3);
    return;
  }
  var startY = r.y + 34 * ui.s;
  var cardH = ui.evidence.h < 100 * ui.s ? 34 * ui.s : 45 * ui.s;
  for (var i = 0; i < evidence.length && i < 3; i++) {
    var ev = evidence[i];
    var y = startY + i * (cardH + 5 * ui.s);
    if (y + cardH > r.y + r.h - 6 * ui.s) break;
    c.fillStyle = 'rgba(255,255,255,0.08)';
    roundRect(c, r.x + 8 * ui.s, y, r.w - 16 * ui.s, cardH, 6 * ui.s);
    c.fill();
    c.fillStyle = causeDef(ev.cause).color;
    c.fillRect(r.x + 8 * ui.s, y, 4 * ui.s, cardH);
    fitText(c, GF.t(ev.title), r.x + 18 * ui.s, y + 12 * ui.s, r.w - 30 * ui.s, fs(12), '#ffffff', 'left', '800');
    drawWrapped(c, GF.t(ev.note), r.x + 18 * ui.s, y + 23 * ui.s, r.w - 30 * ui.s, fs(10), fs(12), '#d8e4d0', '600', 2);
  }
}

function drawReportPanel(c) {

    drawButton(c, b, GF.t(causeDef(b.id).key), selectedCause === b.id, causeDef(b.id).color);
  }

function drawButton(c, b, label, selected, color) {

  roundRect(c, b.x, b.y, b.w, b.h, 6 * ui.s);

}

function drawCoach(c) {
  if (tutorialSeen || coachStep >= 99 || gs !== 'PLAYING' || helpOpen) return;

  c.fill();
  c.strokeStyle = 'rgba(255,241,168,0.45)';

}

  var h = Math.min(GF.H - 40 * ui.s, 360 * ui.s);

  ];

function drawTerminal(c) {

  c.fillRect(0, 0, GF.W, GF.H);

  var y = GF.cy - h / 2;
  c.fillStyle = 'rgba(19,30,25,0.96)';

  var detail = gs === 'WON' ? GF.t('final') + ' ' + GF.t('score') + ' ' + score : GF.t(reasonKey || 'reason_actions');
  drawWrapped(c, detail, x + 22 * ui.s, y + 62 * ui.s, w - 44 * ui.s, fs(14), fs(18), '#e8f0dd', '650', 3);
  fitText(c, GF.t('best') + ' ' + String(best), x + 22 * ui.s, y + 126 * ui.s, w - 44 * ui.s, fs(14), '#d9f5ce', 'left', '800');
  fitText(c, GF.t('best_case') + ' ' + String(bestSolved) + '/' + CASE_COUNT, x + 22 * ui.s, y + 150 * ui.s, w - 44 * ui.s, fs(13), '#fff1a8', 'left', '750');
  drawButton(c, ui.retry, GF.t('retry'), true, '#9ee27f');
}

function onPointerDown(e) {
  e.preventDefault();
  layout();
  var p = ptrPos(e);
  if (hitCircle(p, ui.mute)) {
    GF.toggleMute();
    sfx('click', 80);
    return;
  }
  if (hitCircle(p, ui.help)) {
    helpOpen = true;
    sfx('click', 80);
    return;
  }
  if (helpOpen) {
    if (hitRect(p, ui.helpClose)) {
      helpOpen = false;
      sfx('click', 80);
    }
    return;
  }
  if (gs === 'GAMEOVER' || gs === 'WON') {
    if (hitRect(p, ui.retry)) startGame();
    return;
  }
  for (var i = 0; i < clueRects.length; i++) {
    if (hitCircle(p, clueRects[i])) {
      inspectClue(clueRects[i].index);
      return;
    }
  }
  for (var c = 0; c < causeButtons.length; c++) {
    if (hitRect(p, causeButtons[c])) {
      chooseCause(causeButtons[c].id);
      return;
    }
  }
  for (var u = 0; u < culpritButtons.length; u++) {
    if (hitRect(p, culpritButtons[u])) {
      chooseCulprit(culpritButtons[u].id);
      return;
    }
  }
  if (hitRect(p, ui.submit)) submitReport();
}

function onKeyDown(e) {
  if (e.code === 'Enter') {
    submitReport();
    e.preventDefault();
    return;
  }
  if (e.code === 'KeyH') {
    helpOpen = !helpOpen;
    e.preventDefault();
    return;
  }
  var n = 0;
  if (e.code.indexOf('Digit') === 0) n = Number(e.code.slice(5));
  if (e.code.indexOf('Numpad') === 0) n = Number(e.code.slice(6));
  if (n >= 1 && n <= 4) {
    if (!selectedCause) chooseCause(CAUSES[n - 1].id);
    else chooseCulprit(currentCase().suspects[n - 1]);
    e.preventDefault();
  }
}

function getSave() {
  var ids = [];
  for (var k in inspected) if (inspected[k]) ids.push(Number(k));
  return {
    gs: gs,
    score: score,
    best: best,
    bestSolved: bestSolved,
    caseIndex: caseIndex,
    actionsLeft: actionsLeft,
    wrongReports: wrongReports,
    selectedCause: selectedCause,
    selectedCulprit: selectedCulprit,
    inspected: ids,
    reasonKey: reasonKey,
    tutorialSeen: tutorialSeen
  };
}

function applySave(s) {
  if (!s || typeof s !== 'object') return;
  best = Math.max(0, Number(s.best) || 0);
  bestSolved = clamp(Number(s.bestSolved) || 0, 0, CASE_COUNT);
  tutorialSeen = !!s.tutorialSeen;
  if (s.gs === 'PLAYING' || s.gs === 'GAMEOVER' || s.gs === 'WON') {
    gs = s.gs;
    score = Math.max(0, Number(s.score) || 0);
    caseIndex = clamp(Number(s.caseIndex) || 0, 0, CASES.length - 1);
    actionsLeft = clamp(Number(s.actionsLeft) || fieldActionsForCase(caseIndex), 0, START_ACTIONS);
    wrongReports = clamp(Number(s.wrongReports) || 0, 0, MAX_WRONG_REPORTS);
    selectedCause = typeof s.selectedCause === 'string' ? s.selectedCause : '';
    selectedCulprit = typeof s.selectedCulprit === 'string' ? s.selectedCulprit : '';
    reasonKey = typeof s.reasonKey === 'string' ? s.reasonKey : '';
    evidence = [];
    inspected = {};
    var arr = Array.isArray(s.inspected) ? s.inspected : [];
    for (var i = 0; i < arr.length; i++) {
      var idx = clamp(Number(arr[i]) || 0, 0, currentCase().clues.length - 1);
      inspected[idx] = true;
      var clue = currentCase().clues[idx];
      evidence.unshift({ index: idx, title: clue.title, note: clue.note, cause: clue.cause });
    }
    if (evidence.length > 4) evidence.length = 4;
    coachStep = tutorialSeen ? 99 : 0;
    restored = true;
  }
}

function stateObject() {
  return {
    gs: gs,
    score: score,
    best: best,
    bestSolved: bestSolved,
    caseIndex: caseIndex + 1,
    actionsLeft: actionsLeft,
    wrongReports: wrongReports,
    evidenceFound: evidenceCount(),
    selectedCause: selectedCause,
    selectedCulprit: selectedCulprit,
    caseSolved: caseSolved,
    correctCause: currentCase().cause,
    correctCulprit: currentCase().culprit,
    helpOpen: helpOpen,
    tutorialSeen: tutorialSeen
  };
}

function renderText() {
  var data = currentCase();
  var payload = {
    coordinateSystem: 'canvas pixels, origin top-left, x right, y down',
    state: stateObject(),
    visibleCase: {
      habitat: GF.t(data.habitat),
      animal: GF.t(data.animal),
      actionsLeft: actionsLeft,
      clueSites: data.clues.map(function(clue, i) {
        var p = worldToScreen(clue.x, clue.y);
        return { index: i, x: Math.round(p.x), y: Math.round(p.y), inspected: !!inspected[i], title: GF.t(clue.title) };
      }),
      evidence: evidence.map(function(ev) { return { title: GF.t(ev.title), note: GF.t(ev.note), supports: ev.cause }; }),
      causes: CAUSES.map(function(c) { return c.id; }),
      culprits: data.suspects.slice()
    }
  };
  return JSON.stringify(payload);
}

function botActions() {
  if (gs === 'GAMEOVER' || gs === 'WON') return ['retry'];
  var actions = ['wait', 'inspect_best', 'inspect_any', 'choose_cause', 'choose_culprit', 'submit_correct', 'submit_current', 'jump_late'];
  if (caseIndex < CASES.length - 1) actions.push('next_case');
  return actions;
}

function botAct(action) {
  var data = currentCase();
  if (action === 'retry') { startGame(); return true; }
  if (action === 'wait') { window.advanceTime(900); return true; }
  if (action === 'inspect_best') {
    for (var i = 0; i < data.clues.length; i++) {
      if (!inspected[i] && data.clues[i].cause === data.cause) { inspectClue(i); return true; }
    }
    return false;
  }
  if (action === 'inspect_any') {
    for (var j = 0; j < data.clues.length; j++) if (!inspected[j]) { inspectClue(j); return true; }
    return false;
  }
  if (action === 'choose_cause') { chooseCause(data.cause); return true; }
  if (action === 'choose_culprit') { chooseCulprit(data.culprit); return true; }
  if (action === 'submit_correct') { selectedCause = data.cause; selectedCulprit = data.culprit; submitReport(); return true; }
  if (action === 'submit_current') { submitReport(); return true; }
  if (action === 'jump_late') { setupForScreenshot(6); return true; }
  if (action === 'next_case') { resetForCase(Math.min(CASES.length - 1, caseIndex + 1)); return true; }
  return false;
}

function setupForScreenshot(level) {
  screenshotMode = true;
  gs = 'PLAYING';
  score = 1200 + (level || 5) * 250;
  wrongReports = Math.min(2, Math.floor((level || 5) / 3));
  tutorialSeen = true;
  coachStep = 99;
  helpOpen = false;
  resetForCase(clamp((Number(level) || 5) - 1, 0, CASES.length - 1));
  actionsLeft = Math.max(2, actionsLeft - 2);
  var data = currentCase();
  for (var i = 0; i < data.clues.length && i < 4; i++) {
    inspected[i] = true;
    var clue = data.clues[i];
    evidence.unshift({ index: i, title: clue.title, note: clue.note, cause: clue.cause });
  }
  selectedCause = data.cause;
  selectedCulprit = data.culprit;
}

window._jumpLevel = function(n) { setupForScreenshot(Number(n) || 5); };
window._setupForScreenshot = function(level) { setupForScreenshot(Number(level) || 5); };
window.advanceTime = function(ms) {
  var total = Math.max(0, Number(ms) || 0);
  var step = 1 / 30;
  var count = Math.max(1, Math.ceil(total / 1000 / step));
  for (var i = 0; i < count; i++) update(step);
  draw(GF.ctx);
  return stateObject();
};
window.render_game_to_text = renderText;
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'sans-serif'; };
window._setState = function(s) {
  if (s === 'help') helpOpen = true;
  if (s === 'gameover') gameOver('reason_actions');
  if (s === 'won') winGame();
  if (s === 'play') { gs = 'PLAYING'; helpOpen = false; }
};

GF.canvas.addEventListener('pointerdown', onPointerDown, { passive: false });
document.addEventListener('keydown', onKeyDown);

GF.exposeState(stateObject);
GF.exposeBot(botActions, botAct);
GF.exposeReach(function() {
  layout();
  var items = [
    { id: 'help', x: ui.help.x - ui.help.r, y: ui.help.y - ui.help.r, w: ui.help.r * 2, h: ui.help.r * 2, pinned: true },
    { id: 'mute', x: ui.mute.x - ui.mute.r, y: ui.mute.y - ui.mute.r, w: ui.mute.r * 2, h: ui.mute.r * 2, pinned: true }
  ];
  for (var i = 0; i < clueRects.length; i++) {
    items.push({ id: 'clue_' + i, x: clueRects[i].x - clueRects[i].r, y: clueRects[i].y - clueRects[i].r, w: clueRects[i].r * 2, h: clueRects[i].r * 2 });
  }
  for (var c = 0; c < causeButtons.length; c++) items.push({ id: 'cause_' + c, x: causeButtons[c].x, y: causeButtons[c].y, w: causeButtons[c].w, h: causeButtons[c].h });
  for (var u = 0; u < culpritButtons.length; u++) items.push({ id: 'culprit_' + u, x: culpritButtons[u].x, y: culpritButtons[u].y, w: culpritButtons[u].w, h: culpritButtons[u].h });
  items.push({ id: 'submit', x: ui.submit.x, y: ui.submit.y, w: ui.submit.w, h: ui.submit.h, pinned: true });
  if (helpOpen) items.push({ id: 'help_close', x: ui.helpClose.x, y: ui.helpClose.y, w: ui.helpClose.w, h: ui.helpClose.h, pinned: true });
  if (gs === 'GAMEOVER' || gs === 'WON') items.push({ id: 'retry', x: ui.retry.x, y: ui.retry.y, w: ui.retry.w, h: ui.retry.h, pinned: true });
  return { screen: helpOpen ? 'help' : gs, viewportW: GF.W, viewportH: GF.H, screenH: GF.H, scrollMaxY: 0, items: items };
});
GF.exposeTour([
  { name: 'play', go: function() { if (gs !== 'PLAYING') startGame(); helpOpen = false; } },
  { name: 'help', go: function() { if (gs !== 'PLAYING') startGame(); helpOpen = true; } },
  { name: 'gameover', go: function() { gameOver('reason_actions'); helpOpen = false; } },
  { name: 'won', go: function() { setupForScreenshot(6); winGame(); helpOpen = false; } }
]);

GF.init({
  designW: 440,
  designH: 760,
  strings: STRINGS,
  saveKey: 'wildlife_whodunit',
  onReady: function() {
    GF.persist('wildlife_whodunit_run_v1', getSave, applySave);
    GF.bgMusic({ file: 'audio/bg_track.mp3', preset: 'tense', muted: GF.muted });
    if (!restored || (window.__GF_AUTOSTART && !window._silent)) startGame();
    else {
      started = true;
      GF.gameStarted();
    }
  },
  onUpdate: update,
  onDraw: draw
});

})();
</script>
</body>
</html>
