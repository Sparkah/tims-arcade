<script>
(function() {
'use strict';

// ── LOCALISATION ─────────────────────────────────────────────────────────
var STRINGS = {

    won: 'ИМПЕРИЯ ЖИВЁТ', gameover: 'ИМПЕРИЯ ПАЛА',
    era: 'ЭПОХА', score: 'СУММА', best: 'РЕКОРД',
    pick_heir: 'Выберите преемника',
    recap_title: 'Итог эпохи',
    next_era: 'СЛЕДУЮЩАЯ ЭПОХА',
    tally_title: 'Итог',
    finalize: 'ПОДВЕСТИ ИТОГ',
    seed: 'СИД',
    bonus: 'БОНУС',
    carries: 'Переносит',
    collapsed_at: 'Обрушение в',
    stat_faith: 'Вера', stat_war: 'Война', stat_gold: 'Золото',
    stat_science: 'Наука', stat_food: 'Пища', stat_culture: 'Культура',
    'tut_title': 'Как играть',
    'tut_goal': 'Цель: Пережить 3 смены эпохи и набрать сумму не меньше 180 по 6 шкалам.',
    'tut_controls': 'Управление: Жмите на карту преемника, чтобы выбрать.',
    'tut_win': 'Победа: После эпохи 3 сумма всех 6 шкал не меньше 180.',
    'tut_lose': 'Поражение: Шкала упала ниже 20 после перехода, либо сумма меньше 180.',
    'tut_tip': 'Совет: На карте видны переносы и множители. Берегите слабые шкалы.',
    close: 'ЗАКРЫТЬ',
  },
};

// ── TUNABLES (per DESIGN.md) ─────────────────────────────────────────────
var STATS                 = 6;
var ERAS                  = 3;
var CARDS_PER_PICK        = 4;
var STAT_FLOOR            = 20;
var STAT_MAX              = 100;
var FINAL_SCORE_THRESHOLD = 180;
var START_STAT_MIN        = 35;
var START_STAT_MAX        = 70;
var MULT_MIN              = 0.5;
var MULT_MAX              = 1.5;
var BONUS_FLAT_MIN        = 5;
var BONUS_FLAT_MAX        = 18;

var STAT_KEYS = ['faith','war','gold','science','food','culture'];
var STAT_LABEL_KEYS = ['stat_faith','stat_war','stat_gold','stat_science','stat_food','stat_culture'];
var STAT_COLORS = ['#e9b349', '#d34c4c', '#f1c40f', '#4dd0e1', '#8bc34a', '#c074d9'];

// Civ name pools — drawn from period (era 1..3)
var CIV_POOL = {
  en: [
    // era 0 (starting / bronze)
    ['Sumer','Akkad','Mycenae','Olmec','Indus','Shang','Minoa','Phoenicia'],
    // era 1 (classical to early medieval)
    ['Hellas','Roma','Han','Maya','Persia','Egypt','Carthage','Gupta'],
    // era 2 (medieval to renaissance)
    ['Byzantium','Caliphate','Norse','Khmer','Mali','Aztec','Inka','Song'],
    // era 3 (industrial / modern)
    ['Britain','Prussia','Ottoman','Russia','America','Japan','France','Qing'],
  ],
  ru: [
    ['Шумер','Аккад','Микены','Ольмек','Инд','Шан','Минос','Финикия'],
    ['Эллада','Рим','Хань','Майя','Персия','Египет','Карфаген','Гупта'],
    ['Византия','Халифат','Норманны','Кхмеры','Мали','Ацтеки','Инки','Сун'],
    ['Британия','Пруссия','Османы','Россия','Америка','Япония','Франция','Цин'],
  ],
};

// ── DETERMINISTIC RNG (mulberry32) ───────────────────────────────────────
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function dailySeedString() {
  var d = new Date();
  var y = d.getUTCFullYear();
  var m = String(d.getUTCMonth() + 1).padStart(2, '0');
  var dd = String(d.getUTCDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}
function hashStr(s) {
  var h = 1779033703 ^ s.length;
  for (var i = 0; i < s.length; i++) {
    h = Math.imul(h ^ s.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return (h >>> 0);
}

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | PLAYING | GAMEOVER | WIN
var phase = 'VIEW';         // VIEW | PICK | RECAP | TALLY
var era = 1;                // 1..ERAS
var stats = [50,50,50,50,50,50];
var prevStats = [50,50,50,50,50,50];
var civName = '';
var civEraIdx = 0;
var cards = [];             // [{name, transfers:[{idx, mult}], bonusIdx, bonusVal}]
var lastPickedCardIdx = -1;
var seedStr = '';
var seedHash = 0;
var rng = Math.random;
var best = 0;
var score = 0;
var collapsedStatIdx = -1;
var tutorialOpen = false;
var animT = 0;              // anim ticker for visual juice

// ── PERSISTED BEST ───────────────────────────────────────────────────────
function loadBest() {
  try {
    var v = parseInt(localStorage.getItem('civ_pivot_best') || '0');
    if (!isNaN(v)) best = v;
  } catch (e) {}
}
function saveBest() {
  try { localStorage.setItem('civ_pivot_best', String(best)); } catch (e) {}
}

// ── INITIAL CIV ──────────────────────────────────────────────────────────
function pickCivName(eraIdx) {
  var pool = (CIV_POOL[GF.lang] || CIV_POOL.en)[eraIdx] || CIV_POOL.en[0];
  return pool[Math.floor(rng() * pool.length)];
}

function rollStartStats() {
  var s = [];
  for (var i = 0; i < STATS; i++) {
    s.push(Math.round(START_STAT_MIN + rng() * (START_STAT_MAX - START_STAT_MIN)));
  }
  return s;
}

// ── CARD GENERATION ──────────────────────────────────────────────────────
// Each card transfers exactly 3 of the 6 stats at random multipliers from
// [MULT_MIN..MULT_MAX] (rounded to nearest 0.1). Untransferred stats reset
// to a baseline of 25. The card adds a flat bonus to one stat.
function genCards(eraIdx) {
  var out = [];
  for (var c = 0; c < CARDS_PER_PICK; c++) {
    // shuffle stat indices and take first 3
    var idxs = [0,1,2,3,4,5];
    for (var i = idxs.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = idxs[i]; idxs[i] = idxs[j]; idxs[j] = tmp;
    }
    var transfers = [];
    for (var k = 0; k < 3; k++) {
      var raw = MULT_MIN + rng() * (MULT_MAX - MULT_MIN);
      var mult = Math.round(raw * 10) / 10;
      transfers.push({ idx: idxs[k], mult: mult });
    }
    var bonusIdx = idxs[3 + Math.floor(rng() * 3)]; // bonus often touches a NON-carried stat — that's the design tension
    // 50% of the time, bonus lands on a carried stat instead — adds variety
    if (rng() < 0.5) bonusIdx = transfers[Math.floor(rng() * 3)].idx;
    var bonusVal = Math.round(BONUS_FLAT_MIN + rng() * (BONUS_FLAT_MAX - BONUS_FLAT_MIN));
    out.push({
      name: pickCivName(eraIdx),
      transfers: transfers,
      bonusIdx: bonusIdx,
      bonusVal: bonusVal,
    });
  }
  return out;
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  seedStr = dailySeedString();
  seedHash = hashStr(seedStr);
  rng = mulberry32(seedHash);
  era = 1;
  civEraIdx = 0;
  civName = pickCivName(0);
  stats = rollStartStats();
  prevStats = stats.slice();
  cards = genCards(1);
  lastPickedCardIdx = -1;
  collapsedStatIdx = -1;
  score = 0;
  phase = 'PICK';
  gs = 'PLAYING';
  tutorialOpen = false;
  GF.gameStarted();
}

function backToMenu() {
  gs = 'MENU';
}

function commitCard(idx) {
  if (gs !== 'PLAYING' || phase !== 'PICK') return;
  if (idx < 0 || idx >= cards.length) return;
  var card = cards[idx];
  lastPickedCardIdx = idx;
  prevStats = stats.slice();

  // compute new stats. start from baseline 25 for non-carried stats.
  var next = [25,25,25,25,25,25];
  for (var i = 0; i < card.transfers.length; i++) {
    var tr = card.transfers[i];
    var carried = Math.round(prevStats[tr.idx] * tr.mult);
    next[tr.idx] = Math.max(next[tr.idx], carried);
  }
  // apply bonus
  next[card.bonusIdx] += card.bonusVal;
  // clamp
  for (var s = 0; s < STATS; s++) {
    if (next[s] > STAT_MAX) next[s] = STAT_MAX;
    if (next[s] < 0) next[s] = 0;
  }
  stats = next;
  civName = card.name;
  civEraIdx = Math.min(era, 3);

  // Check collapse
  var minStat = STAT_MAX;
  var minIdx = -1;
  for (var ss = 0; ss < STATS; ss++) {
    if (stats[ss] < minStat) { minStat = stats[ss]; minIdx = ss; }
  }
  if (minStat < STAT_FLOOR) {
    collapsedStatIdx = minIdx;
    phase = 'RECAP';
    // sit in recap, but on click after recap go to GAMEOVER
    setTimeout(function() {
      score = sumStats();
      if (score > best) { best = score; saveBest(); }
      gs = 'GAMEOVER';
      GF.gameEnded();
      GF.setShake(1.0);
      GF.spawnParticles(GF.cx, GF.cy, '#e74c5e', 24);
    }, 1100);
    return;
  }

  // Advance recap then either next era or final tally
  phase = 'RECAP';
  GF.spawnParticles(GF.cx, GF.cy, '#4dd0e1', 12);
}

function advanceAfterRecap() {
  if (collapsedStatIdx >= 0) return;
  era += 1;
  if (era > ERAS) {
    // final tally
    score = sumStats();
    phase = 'TALLY';
    if (score >= FINAL_SCORE_THRESHOLD) {
      gs = 'WIN';
      if (score > best) { best = score; saveBest(); }
      GF.spawnParticles(GF.cx, GF.cy, '#2ecc71', 30);
    } else {
      gs = 'GAMEOVER';
      if (score > best) { best = score; saveBest(); }
      GF.spawnParticles(GF.cx, GF.cy, '#e74c5e', 24);
    }
    GF.gameEnded();
    return;
  }
  // next era
  cards = genCards(era);
  lastPickedCardIdx = -1;
  phase = 'PICK';
}

function sumStats() {
  var t = 0;
  for (var i = 0; i < STATS; i++) t += stats[i];
  return t;
}

// ── SCREENSHOT HELPERS ───────────────────────────────────────────────────
// _jumpLevel(1) → mid-game state in PICK phase with cards visible
// _jumpLevel(99) → terminal state (WIN, since most random plays survive)
// _setupForScreenshot → era 2, PICK phase, varied bars
var _ssMode = false;  // screenshot mode — set true by _jumpLevel / _setupForScreenshot
window._jumpLevel = function(n) {
  if (typeof n === 'undefined') n = 1;
  _ssMode = true;
  if (n >= 99) {
    // Drive to WIN by simulating two safe picks
    startGame();
    // Sim era 1 → era 2 with first card
    commitCard(0);
    advanceAfterRecap();
    // Sim era 2 → era 3 with first card
    if (gs === 'PLAYING' && phase === 'PICK') {
      commitCard(0);
      advanceAfterRecap();
    }
    // Sim era 3 → final tally
    if (gs === 'PLAYING' && phase === 'PICK') {
      commitCard(0);
      advanceAfterRecap();
    }
    // If we ended in GAMEOVER from RNG (low stats), force WIN by bumping
    if (gs === 'GAMEOVER' && score < FINAL_SCORE_THRESHOLD) {
      // For test purposes: nudge stats up to ensure WIN reachability
      for (var i = 0; i < STATS; i++) stats[i] = 60;
      score = sumStats();
      gs = 'WIN';
    }
    return;
  }
  // default: mid-game state — era 1 PICK with rich bars (screenshot will
  // advance to era 2 between shot 1 and shot 2 via ArrowRight keypress).
  startGame();
  stats = [62, 48, 78, 55, 71, 44];
  prevStats = stats.slice();
  era = 1;
  civEraIdx = 0;
  civName = pickCivName(0);
  cards = genCards(1);
  phase = 'PICK';
  gs = 'PLAYING';
};
window._setupForScreenshot = function(eraArg) {
  // Land directly in PICK phase on era 2 with 4 cards visible + filled bars
  _ssMode = true;
  startGame();
  stats = [62, 48, 78, 55, 71, 44];
  prevStats = stats.slice();
  era = eraArg && eraArg >= 1 && eraArg <= 3 ? eraArg : 2;
  civEraIdx = Math.min(era - 1, 3);
  civName = pickCivName(civEraIdx);
  cards = genCards(era);
  phase = 'PICK';
  gs = 'PLAYING';
};
window._setLang = function(l) { GF.lang = l; };

// ── LAYOUT (recomputed per frame) ────────────────────────────────────────
var layout = {
  W: 0, H: 0, isPortrait: false,
  barsX: 0, barsY: 0, barsW: 0, barH: 0, barGap: 0, barCols: 0, barRows: 0,
  barCellW: 0,
  cardsX: 0, cardsY: 0, cardW: 0, cardH: 0, cardGap: 0, cardsCols: 0,
  hudY: 0, helpBtn: null,
  ctaX: 0, ctaY: 0, ctaW: 0, ctaH: 0,
};
function recomputeLayout() {
  var W = GF.W, H = GF.H;
  layout.W = W; layout.H = H;
  layout.isPortrait = H > W * 1.1;
  var pad = GF.clamp(14 * GF.S, 8, 24);
  var topPad = GF.clamp(56 * GF.S, 40, 88);
  layout.hudY = GF.clamp(14 * GF.S, 8, 22);

  // Bars area at top: 2 rows × 3 cols (landscape) or 3 rows × 2 cols (portrait)
  if (layout.isPortrait) {
    layout.barRows = 3; layout.barCols = 2;
  } else {
    layout.barRows = 2; layout.barCols = 3;
  }
  var barsW = Math.min(W - pad * 2, 920 * GF.S);
  layout.barsX = (W - barsW) / 2;
  layout.barsY = topPad;
  layout.barsW = barsW;
  layout.barGap = GF.clamp(10 * GF.S, 4, 16);
  layout.barCellW = (barsW - layout.barGap * (layout.barCols - 1)) / layout.barCols;
  // bars scale with available height: target 22% of H total for the bar grid
  var targetBarH = (H * 0.20 - layout.barGap * (layout.barRows - 1)) / layout.barRows;
  layout.barH = Math.max(36, Math.min(GF.clamp(72 * GF.S, 36, 96), targetBarH));
  var barsTotalH = layout.barRows * (layout.barH + layout.barGap) - layout.barGap;

  // Cards area below bars (extra space reserved for "pick heir" header)
  var cardsTop = layout.barsY + barsTotalH + GF.clamp(36 * GF.S, 24, 50);
  var cardsAvailW = Math.min(W - pad * 2, 960 * GF.S);
  layout.cardsX = (W - cardsAvailW) / 2;
  layout.cardsY = cardsTop;
  // Cards: 4 cards = 2×2 on portrait or narrow landscape, 1×4 on wide landscape
  if (W < 720 * GF.S || layout.isPortrait) {
    layout.cardsCols = 2;
  } else {
    layout.cardsCols = 4;
  }
  layout.cardGap = GF.clamp(12 * GF.S, 6, 18);
  layout.cardW = (cardsAvailW - layout.cardGap * (layout.cardsCols - 1)) / layout.cardsCols;
  var cardsRows = Math.ceil(CARDS_PER_PICK / layout.cardsCols);
  var availH = H - cardsTop - GF.clamp(80 * GF.S, 50, 110);
  layout.cardH = Math.max(140, (availH - layout.cardGap * (cardsRows - 1)) / cardsRows);

  // CTA button for RECAP / TALLY
  layout.ctaW = Math.min(W - pad * 2, GF.clamp(280 * GF.S, 180, 360));
  layout.ctaH = GF.clamp(54 * GF.S, 40, 64);
  layout.ctaX = (W - layout.ctaW) / 2;
  layout.ctaY = H - layout.ctaH - GF.clamp(24 * GF.S, 12, 40);

  layout.helpBtn = {
    x: W - GF.clamp(50 * GF.S, 38, 60),
    y: GF.clamp(12 * GF.S, 8, 22),
    s: GF.clamp(36 * GF.S, 28, 48),
  };
}

// ── INPUT ────────────────────────────────────────────────────────────────
function pointInRect(x, y, rx, ry, rw, rh) {
  return x >= rx && x <= rx + rw && y >= ry && y <= ry + rh;
}
function cardRect(i) {
  var col = i % layout.cardsCols;
  var row = Math.floor(i / layout.cardsCols);
  return {
    x: layout.cardsX + col * (layout.cardW + layout.cardGap),
    y: layout.cardsY + row * (layout.cardH + layout.cardGap),
    w: layout.cardW,
    h: layout.cardH,
  };
}
function hitHelpBtn(x, y) {
  var b = layout.helpBtn;
  if (!b) return false;
  return x >= b.x && x <= b.x + b.s && y >= b.y && y <= b.y + b.s;
}
function hitCta(x, y) {
  return pointInRect(x, y, layout.ctaX, layout.ctaY, layout.ctaW, layout.ctaH);
}

function onClick(x, y) {
  if (tutorialOpen) {
    // close button bottom-center
    var bw = GF.clamp(180 * GF.S, 130, 240), bh = GF.clamp(46 * GF.S, 36, 56);
    var bx = (GF.W - bw) / 2, by = GF.H * 0.80;
    if (pointInRect(x, y, bx, by, bw, bh)) {
      tutorialOpen = false;
      try { localStorage.setItem('civ_pivot_seen_tutorial', '1'); } catch (e) {}
    }
    return;
  }
  if (gs === 'MENU') {
    var bwm = GF.clamp(240 * GF.S, 170, 320), bhm = GF.clamp(52 * GF.S, 40, 64);
    var bxm = (GF.W - bwm) / 2, bym = GF.H * 0.78;
    if (pointInRect(x, y, bxm, bym, bwm, bhm)) {
      startGame();
      return;
    }
    return;
  }
  if (gs === 'GAMEOVER' || gs === 'WIN') {
    // RETRY button + MENU button
    var bw2 = GF.clamp(220 * GF.S, 160, 300), bh2 = GF.clamp(48 * GF.S, 38, 60);
    var bx2 = (GF.W - bw2) / 2;
    var by2 = GF.H * 0.62;
    if (pointInRect(x, y, bx2, by2, bw2, bh2)) {
      startGame();
      return;
    }
    var by3 = GF.H * 0.74;
    if (pointInRect(x, y, bx2, by3, bw2, bh2)) {
      backToMenu();
      return;
    }
    return;
  }
  // PLAYING
  if (hitHelpBtn(x, y)) {
    tutorialOpen = true;
    return;
  }
  if (phase === 'PICK') {
    for (var i = 0; i < cards.length; i++) {
      var r = cardRect(i);
      if (pointInRect(x, y, r.x, r.y, r.w, r.h)) {
        commitCard(i);
        return;
      }
    }
  } else if (phase === 'RECAP') {
    if (hitCta(x, y)) {
      advanceAfterRecap();
    }
  }
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  recomputeLayout();
  animT += dt;
}

// ── DRAW HELPERS ─────────────────────────────────────────────────────────
function drawStatIcon(c, idx, x, y, size) {
  c.save();
  c.translate(x, y);
  var col = STAT_COLORS[idx];
  c.fillStyle = col;
  c.strokeStyle = '#0a0a14';
  c.lineWidth = Math.max(1, size * 0.06);
  var r = size * 0.5;
  switch (idx) {
    case 0: // FAITH — temple (pillars + roof)
      c.beginPath();
      c.moveTo(-r * 0.85, -r * 0.20);
      c.lineTo(0, -r * 0.75);
      c.lineTo(r * 0.85, -r * 0.20);
      c.closePath();
      c.fill(); c.stroke();
      // pillars
      c.fillRect(-r * 0.55, -r * 0.15, r * 0.20, r * 0.75);
      c.fillRect(-r * 0.10, -r * 0.15, r * 0.20, r * 0.75);
      c.fillRect( r * 0.35, -r * 0.15, r * 0.20, r * 0.75);
      c.strokeRect(-r * 0.55, -r * 0.15, r * 0.20, r * 0.75);
      c.strokeRect(-r * 0.10, -r * 0.15, r * 0.20, r * 0.75);
      c.strokeRect( r * 0.35, -r * 0.15, r * 0.20, r * 0.75);
      // base
      c.fillRect(-r * 0.85, r * 0.60, r * 1.70, r * 0.18);
      c.strokeRect(-r * 0.85, r * 0.60, r * 1.70, r * 0.18);
      break;
    case 1: // WAR — sword (blade + crossguard + hilt)
      c.beginPath();
      c.moveTo(0, -r * 0.85);
      c.lineTo(r * 0.16, -r * 0.65);
      c.lineTo(r * 0.16, r * 0.30);
      c.lineTo(-r * 0.16, r * 0.30);
      c.lineTo(-r * 0.16, -r * 0.65);
      c.closePath();
      c.fill(); c.stroke();
      // crossguard
      c.fillStyle = '#7a3a3a';
      c.fillRect(-r * 0.50, r * 0.30, r * 1.00, r * 0.15);
      c.strokeRect(-r * 0.50, r * 0.30, r * 1.00, r * 0.15);
      // hilt
      c.fillRect(-r * 0.10, r * 0.45, r * 0.20, r * 0.30);
      c.strokeRect(-r * 0.10, r * 0.45, r * 0.20, r * 0.30);
      // pommel
      c.beginPath(); c.arc(0, r * 0.80, r * 0.14, 0, Math.PI * 2);
      c.fill(); c.stroke();
      break;
    case 2: // GOLD — coin (circle + Ɖ-like glyph)
      c.beginPath(); c.arc(0, 0, r * 0.72, 0, Math.PI * 2);
      c.fill(); c.stroke();
      c.fillStyle = '#7a5a14';
      c.font = 'bold ' + (r * 1.0) + 'px serif';
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText('¤', 0, r * 0.04);
      break;
    case 3: // SCIENCE — flask (neck + body)
      // neck
      c.fillRect(-r * 0.15, -r * 0.70, r * 0.30, r * 0.30);
      c.strokeRect(-r * 0.15, -r * 0.70, r * 0.30, r * 0.30);
      // body (rounded)
      c.beginPath();
      c.moveTo(-r * 0.15, -r * 0.40);
      c.lineTo(-r * 0.65, r * 0.55);
      c.quadraticCurveTo(-r * 0.40, r * 0.85, 0, r * 0.85);
      c.quadraticCurveTo(r * 0.40, r * 0.85, r * 0.65, r * 0.55);
      c.lineTo(r * 0.15, -r * 0.40);
      c.closePath();
      c.fill(); c.stroke();
      // bubble
      c.fillStyle = '#fff';
      c.globalAlpha = 0.6;
      c.beginPath(); c.arc(-r * 0.20, r * 0.30, r * 0.08, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(r * 0.10, r * 0.55, r * 0.06, 0, Math.PI * 2); c.fill();
      c.globalAlpha = 1;
      break;
    case 4: // FOOD — wheat (stem + grains)
      c.strokeStyle = '#5a8030';
      c.lineWidth = Math.max(2, r * 0.10);
      c.beginPath();
      c.moveTo(0, r * 0.85); c.lineTo(0, -r * 0.60);
      c.stroke();
      c.fillStyle = col;
      c.strokeStyle = '#0a0a14';
      c.lineWidth = Math.max(1, r * 0.06);
      // grain pairs along stem
      for (var i2 = 0; i2 < 4; i2++) {
        var yy = -r * 0.55 + i2 * r * 0.30;
        c.beginPath();
        c.ellipse(-r * 0.20, yy, r * 0.16, r * 0.10, 0.5, 0, Math.PI * 2);
        c.fill(); c.stroke();
        c.beginPath();
        c.ellipse(r * 0.20, yy, r * 0.16, r * 0.10, -0.5, 0, Math.PI * 2);
        c.fill(); c.stroke();
      }
      // top tip
      c.beginPath();
      c.ellipse(0, -r * 0.75, r * 0.12, r * 0.20, 0, 0, Math.PI * 2);
      c.fill(); c.stroke();
      break;
    case 5: // CULTURE — theatrical mask
      c.beginPath();
      c.moveTo(-r * 0.65, -r * 0.30);
      c.bezierCurveTo(-r * 0.65, r * 0.75, r * 0.65, r * 0.75, r * 0.65, -r * 0.30);
      c.bezierCurveTo(r * 0.55, -r * 0.70, -r * 0.55, -r * 0.70, -r * 0.65, -r * 0.30);
      c.closePath();
      c.fill(); c.stroke();
      // eyes
      c.fillStyle = '#0a0a14';
      c.beginPath();
      c.ellipse(-r * 0.28, -r * 0.08, r * 0.12, r * 0.07, 0, 0, Math.PI * 2);
      c.fill();
      c.beginPath();
      c.ellipse(r * 0.28, -r * 0.08, r * 0.12, r * 0.07, 0, 0, Math.PI * 2);
      c.fill();
      // smile/frown swirl
      c.strokeStyle = '#0a0a14';
      c.lineWidth = Math.max(1, r * 0.06);
      c.beginPath();
      c.moveTo(-r * 0.20, r * 0.35);
      c.quadraticCurveTo(0, r * 0.50, r * 0.20, r * 0.35);
      c.stroke();
      break;
  }
  c.restore();
}

function drawStatBar(c, x, y, w, h, idx, val) {
  // Background pill
  var r = h * 0.20;
  GF.rr(c, x, y, w, h, r);
  c.fillStyle = '#16161e';
  c.fill();
  c.strokeStyle = '#22222a';
  c.lineWidth = 1;
  c.stroke();

  // Icon on left
  var iconSize = h * 0.85;
  drawStatIcon(c, idx, x + iconSize * 0.55, y + h / 2, iconSize);

  // Label + value row
  var labelX = x + iconSize + 8 * GF.S;
  var labelTopY = y + 4 * GF.S;
  var label = GF.t(STAT_LABEL_KEYS[idx]);
  c.fillStyle = '#cfd8e0';
  c.font = 'bold ' + GF.clamp(11 * GF.S, 9, 14) + 'px sans-serif';
  c.textAlign = 'left'; c.textBaseline = 'top';
  c.fillText(label, labelX, labelTopY);
  c.fillStyle = '#fff';
  c.textAlign = 'right';
  c.fillText(String(val), x + w - 6 * GF.S, labelTopY);

  // Bar track
  var barX = labelX;
  var barW = (x + w - 6 * GF.S) - labelX;
  var barY = y + h - 14 * GF.S;
  var barH = 8 * GF.S;
  if (barH < 5) barH = 5;
  GF.rr(c, barX, barY, barW, barH, barH / 2);
  c.fillStyle = '#22222a';
  c.fill();
  // Fill
  var pct = Math.max(0, Math.min(1, val / STAT_MAX));
  var fillW = Math.max(barH, barW * pct);
  GF.rr(c, barX, barY, fillW, barH, barH / 2);
  c.fillStyle = STAT_COLORS[idx];
  c.fill();
  // Floor marker line
  var floorX = barX + barW * (STAT_FLOOR / STAT_MAX);
  c.strokeStyle = '#e74c5e';
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(floorX, barY - 2 * GF.S);
  c.lineTo(floorX, barY + barH + 2 * GF.S);
  c.stroke();
  if (val < STAT_FLOOR) {
    // glow ring
    c.strokeStyle = '#e74c5e';
    c.lineWidth = 2;
    GF.rr(c, x + 1, y + 1, w - 2, h - 2, r);
    c.stroke();
  }
}

function drawStatBars(c) {
  for (var i = 0; i < STATS; i++) {
    var col = i % layout.barCols;
    var row = Math.floor(i / layout.barCols);
    var x = layout.barsX + col * (layout.barCellW + layout.barGap);
    var y = layout.barsY + row * (layout.barH + layout.barGap);
    drawStatBar(c, x, y, layout.barCellW, layout.barH, i, stats[i]);
  }
}

function drawCard(c, i, hover) {
  var r = cardRect(i);
  var card = cards[i];
  var radius = GF.clamp(14 * GF.S, 8, 20);
  // shadow
  c.save();
  c.shadowColor = 'rgba(0,0,0,0.4)';
  c.shadowBlur = 12 * GF.S;
  c.shadowOffsetY = 4 * GF.S;
  GF.rr(c, r.x, r.y, r.w, r.h, radius);
  // gradient
  var grad = c.createLinearGradient(r.x, r.y, r.x, r.y + r.h);
  grad.addColorStop(0, '#262638');
  grad.addColorStop(1, '#16161e');
  c.fillStyle = grad;
  c.fill();
  c.restore();
  c.strokeStyle = hover ? '#4dd0e1' : '#2a2a36';
  c.lineWidth = hover ? 2 : 1;
  GF.rr(c, r.x, r.y, r.w, r.h, radius);
  c.stroke();

  // Top accent stripe
  var stripeH = GF.clamp(6 * GF.S, 4, 10);
  var sg = c.createLinearGradient(r.x, r.y, r.x + r.w, r.y);
  sg.addColorStop(0, '#4dd0e1');
  sg.addColorStop(1, '#2a8a9a');
  c.fillStyle = sg;
  GF.rr(c, r.x, r.y, r.w, stripeH, stripeH / 2);
  c.fill();

  // Name banner
  var padTop = stripeH + GF.clamp(14 * GF.S, 8, 22);
  c.fillStyle = '#fff';
  c.textAlign = 'center'; c.textBaseline = 'top';
  c.font = 'bold ' + GF.clamp(20 * GF.S, 14, 28) + 'px sans-serif';
  c.fillText(card.name, r.x + r.w / 2, r.y + padTop);

  // divider
  var divY = r.y + padTop + GF.clamp(30 * GF.S, 22, 40);
  c.strokeStyle = '#2a2a36';
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(r.x + 18 * GF.S, divY);
  c.lineTo(r.x + r.w - 18 * GF.S, divY);
  c.stroke();

  // Carries label
  var listLabelY = divY + GF.clamp(10 * GF.S, 6, 16);
  c.fillStyle = '#9ab';
  c.font = 'bold ' + GF.clamp(11 * GF.S, 9, 14) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'top';
  c.fillText(GF.t('carries').toUpperCase(), r.x + r.w / 2, listLabelY);

  var rowsAvailableH = r.h - (listLabelY - r.y) - GF.clamp(76 * GF.S, 60, 96);
  var rowH = Math.max(GF.clamp(28 * GF.S, 20, 38), rowsAvailableH / 3);
  var listY = listLabelY + GF.clamp(18 * GF.S, 12, 24);
  for (var t = 0; t < card.transfers.length; t++) {
    var tr = card.transfers[t];
    var iconX = r.x + GF.clamp(18 * GF.S, 12, 28);
    var iconY = listY + t * rowH;
    var iSize = GF.clamp(22 * GF.S, 16, 30);
    drawStatIcon(c, tr.idx, iconX + iSize / 2, iconY + iSize / 2, iSize);
    // multiplier
    var mtext = '×' + tr.mult.toFixed(1);
    var color = tr.mult >= 1.0 ? '#2ecc71' : (tr.mult >= 0.8 ? '#f5b941' : '#e74c5e');
    c.fillStyle = color;
    c.font = 'bold ' + GF.clamp(15 * GF.S, 11, 20) + 'px sans-serif';
    c.textAlign = 'left'; c.textBaseline = 'middle';
    c.fillText(mtext, iconX + iSize + GF.clamp(8 * GF.S, 4, 12), iconY + iSize / 2);
    // projected value
    var proj = Math.round(stats[tr.idx] * tr.mult);
    c.fillStyle = '#cfd8e0';
    c.font = GF.clamp(13 * GF.S, 10, 17) + 'px monospace';
    c.textAlign = 'right';
    c.fillText(String(stats[tr.idx]) + '→' + String(proj),
      r.x + r.w - GF.clamp(14 * GF.S, 8, 22), iconY + iSize / 2);
  }

  // Bonus footer (anchored to card bottom)
  var bonusFooterH = GF.clamp(54 * GF.S, 40, 70);
  var bonusY = r.y + r.h - bonusFooterH;
  c.strokeStyle = '#2a2a36';
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(r.x + 18 * GF.S, bonusY);
  c.lineTo(r.x + r.w - 18 * GF.S, bonusY);
  c.stroke();
  var bcY = bonusY + bonusFooterH / 2;
  c.fillStyle = '#9ab';
  c.font = 'bold ' + GF.clamp(11 * GF.S, 9, 14) + 'px sans-serif';
  c.textAlign = 'left'; c.textBaseline = 'middle';
  c.fillText(GF.t('bonus').toUpperCase(), r.x + GF.clamp(18 * GF.S, 12, 24), bcY);
  var biSize = GF.clamp(22 * GF.S, 16, 30);
  var biX = r.x + GF.clamp(74 * GF.S, 52, 100);
  drawStatIcon(c, card.bonusIdx, biX + biSize / 2, bcY, biSize);
  c.fillStyle = '#f5d020';
  c.font = 'bold ' + GF.clamp(18 * GF.S, 14, 24) + 'px sans-serif';
  c.textAlign = 'right'; c.textBaseline = 'middle';
  c.fillText('+' + card.bonusVal, r.x + r.w - GF.clamp(18 * GF.S, 12, 24), bcY);
}

function drawCards(c) {
  // Pick header
  c.fillStyle = '#4dd0e1';
  c.font = 'bold ' + GF.clamp(16 * GF.S, 12, 22) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(GF.t('pick_heir'), GF.W / 2, layout.cardsY - GF.clamp(16 * GF.S, 10, 22));
  for (var i = 0; i < cards.length; i++) {
    drawCard(c, i, false);
  }
}

function drawHUD(c) {
  // top-left: era
  c.fillStyle = '#cfd8e0';
  c.font = 'bold ' + GF.clamp(14 * GF.S, 11, 18) + 'px sans-serif';
  c.textAlign = 'left'; c.textBaseline = 'top';
  c.fillText(GF.t('era') + ' ' + era + '/' + ERAS + '  ·  ' + civName,

    c.fill();
    c.strokeStyle = '#4dd0e1';
    c.lineWidth = 2;
    c.stroke();
    c.fillStyle = '#4dd0e1';
    c.font = 'bold ' + GF.clamp(20 * GF.S, 16, 26) + 'px sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText('?', b.x + b.s / 2, b.y + b.s / 2);

function drawCta(c, label) {
  var r = layout.ctaH * 0.5;
  GF.rr(c, layout.ctaX, layout.ctaY, layout.ctaW, layout.ctaH, r);
  var grad = c.createLinearGradient(layout.ctaX, layout.ctaY, layout.ctaX, layout.ctaY + layout.ctaH);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
  c.fillStyle = grad;
  c.fill();
  c.strokeStyle = '#27ae60';
  c.lineWidth = 2;
  c.stroke();
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(18 * GF.S, 14, 22) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(label, layout.ctaX + layout.ctaW / 2, layout.ctaY + layout.ctaH / 2);
}

function drawRecap(c) {
  // semi-overlay across cards area
  var x0 = layout.cardsX;
  var y0 = layout.cardsY - 28 * GF.S;
  var x1 = layout.cardsX + (layout.cardW + layout.cardGap) * layout.cardsCols - layout.cardGap;
  var y1 = layout.ctaY - 14 * GF.S;
  var w = x1 - x0;
  var h = y1 - y0;
  var rr = GF.clamp(14 * GF.S, 8, 20);
  GF.rr(c, x0, y0, w, h, rr);
  c.fillStyle = 'rgba(8,8,18,0.92)';
  c.fill();
  c.strokeStyle = '#2a2a36';
  c.lineWidth = 1;
  c.stroke();
  c.fillStyle = '#4dd0e1';
  c.font = 'bold ' + GF.clamp(20 * GF.S, 14, 26) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'top';
  c.fillText(GF.t('recap_title') + ' · ' + civName,
    x0 + w / 2, y0 + 14 * GF.S);

  // For each stat: show prev → new with delta
  var rowH = GF.clamp(28 * GF.S, 18, 36);
  var startY = y0 + 50 * GF.S;
  var leftX = x0 + 28 * GF.S;
  var rightX = x0 + w - 28 * GF.S;
  var iSize = GF.clamp(18 * GF.S, 14, 24);
  c.textBaseline = 'middle';
  for (var i = 0; i < STATS; i++) {
    var ry = startY + i * rowH;
    drawStatIcon(c, i, leftX + iSize / 2, ry, iSize);
    c.fillStyle = '#cfd8e0';
    c.font = 'bold ' + GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
    c.textAlign = 'left';
    c.fillText(GF.t(STAT_LABEL_KEYS[i]), leftX + iSize + 8 * GF.S, ry);
    var prevV = prevStats[i];
    var newV = stats[i];
    var delta = newV - prevV;
    var col = delta >= 0 ? '#2ecc71' : '#e74c5e';
    c.fillStyle = '#9ab';
    c.font = GF.clamp(13 * GF.S, 10, 17) + 'px monospace';
    c.textAlign = 'right';
    c.fillText(String(prevV) + ' → ' + String(newV), rightX - 70 * GF.S, ry);
    c.fillStyle = col;
    c.font = 'bold ' + GF.clamp(13 * GF.S, 10, 17) + 'px monospace';
    c.fillText((delta >= 0 ? '+' : '') + String(delta), rightX, ry);
  }

  // collapse warning if applicable
  if (collapsedStatIdx >= 0) {
    var warnY = startY + STATS * rowH + 10 * GF.S;
    c.fillStyle = '#e74c5e';
    c.font = 'bold ' + GF.clamp(14 * GF.S, 11, 18) + 'px sans-serif';
    c.textAlign = 'center';
    c.fillText(GF.t('collapsed_at') + ' ' + GF.t(STAT_LABEL_KEYS[collapsedStatIdx]) + ' < ' + STAT_FLOOR,
      x0 + w / 2, warnY);
  } else {
    // CTA at bottom
    drawCta(c, era >= ERAS ? GF.t('finalize') : GF.t('next_era'));
  }
}

function drawTutorialPanel(c) {
  var W = GF.W, H = GF.H;
  c.fillStyle = 'rgba(8,8,18,0.94)';
  c.fillRect(0, 0, W, H);
  var pw = Math.min(W - GF.clamp(28 * GF.S, 16, 36) * 2, 540 * GF.S);
  var ph = Math.min(H - GF.clamp(40 * GF.S, 22, 64) * 2, 460 * GF.S);
  var px = (W - pw) / 2, py = (H - ph) / 2;
  var rr = GF.clamp(18 * GF.S, 10, 24);
  GF.rr(c, px, py, pw, ph, rr);
  c.fillStyle = '#11111c';
  c.fill();
  c.strokeStyle = '#2a2a36';
  c.lineWidth = 2;
  c.stroke();

  c.textAlign = 'left'; c.textBaseline = 'top';
  var pad = GF.clamp(22 * GF.S, 14, 32);
  c.fillStyle = '#4dd0e1';
  c.font = 'bold ' + GF.clamp(22 * GF.S, 16, 28) + 'px sans-serif';
  c.fillText(GF.t('tut_title'), px + pad, py + pad);

  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  c.fillStyle = '#cfd8e0';
  c.font = GF.clamp(15 * GF.S, 12, 19) + 'px sans-serif';
  var ly = py + pad + GF.clamp(40 * GF.S, 26, 50);
  var lh = GF.clamp(34 * GF.S, 22, 42);
  for (var i = 0; i < lines.length; i++) {
    wrapText(c, lines[i], px + pad, ly + i * lh, pw - pad * 2, lh - 2);
  }
  // close button
  var bw = GF.clamp(180 * GF.S, 130, 240), bh = GF.clamp(46 * GF.S, 36, 56);
  var bx = (W - bw) / 2, by = H * 0.80;
  GF.rr(c, bx, by, bw, bh, bh / 2);
  var grad = c.createLinearGradient(bx, by, bx, by + bh);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
  c.fillStyle = grad;
  c.fill();
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(18 * GF.S, 14, 22) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(GF.t('close'), bx + bw / 2, by + bh / 2);
}

function wrapText(c, text, x, y, maxW, lineH) {
  var words = (text || '').split(' ');
  var line = '';
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (c.measureText(test).width > maxW && line) {
      c.fillText(line, x, y);
      line = words[i];
      y += lineH;
    } else {
      line = test;
    }
  }
  if (line) c.fillText(line, x, y);
}

function drawMenu(c) {
  var W = GF.W, H = GF.H;
  // bg
  c.fillStyle = '#0a0a14';
  c.fillRect(0, 0, W, H);
  // title
  c.fillStyle = '#fff';
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.shadowColor = 'rgba(77, 208, 225, 0.55)';
  c.shadowBlur = 26 * GF.S;
  c.font = 'bold ' + GF.clamp(42 * GF.S, 28, 64) + 'px sans-serif';
  c.fillText(GF.t('title'), W / 2, H * 0.18);
  c.shadowColor = 'transparent'; c.shadowBlur = 0;
  c.fillStyle = '#9ab';
  c.font = GF.clamp(14 * GF.S, 11, 19) + 'px sans-serif';
  c.fillText(GF.t('sub'), W / 2, H * 0.24);

  // mini tutorial
  c.fillStyle = '#cfd8e0';
  c.font = GF.clamp(13 * GF.S, 11, 17) + 'px sans-serif';
  c.textAlign = 'left';
  var ll = [GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip')];
  var leftEdge = W * 0.10;
  var boxW = W * 0.80;
  var lh = GF.clamp(22 * GF.S, 16, 28);
  for (var i = 0; i < ll.length; i++) {
    wrapText(c, ll[i], leftEdge, H * 0.32 + i * lh, boxW, lh - 2);
  }
  c.textAlign = 'center';

  // play button
  var bw = GF.clamp(240 * GF.S, 170, 320), bh = GF.clamp(52 * GF.S, 40, 64);
  var bx = (W - bw) / 2, by = H * 0.78;
  GF.rr(c, bx, by, bw, bh, bh / 2);
  var grad = c.createLinearGradient(bx, by, bx, by + bh);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
  c.fillStyle = grad;
  c.fill();
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(20 * GF.S, 14, 26) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(GF.t('play'), bx + bw / 2, by + bh / 2);

  // best
  if (best > 0) {
    c.fillStyle = '#557';
    c.font = GF.clamp(12 * GF.S, 10, 16) + 'px monospace';
    c.textBaseline = 'alphabetic';
    c.fillText(GF.t('best') + ': ' + best + '  ·  ' + GF.t('seed') + ' ' + dailySeedString(),
      W / 2, by + bh + GF.clamp(28 * GF.S, 20, 36));
  } else {
    c.fillStyle = '#557';
    c.font = GF.clamp(12 * GF.S, 10, 16) + 'px monospace';
    c.textBaseline = 'alphabetic';
    c.fillText(GF.t('seed') + ' ' + dailySeedString(),
      W / 2, by + bh + GF.clamp(28 * GF.S, 20, 36));
  }
}

function drawEndOverlay(c) {
  var W = GF.W, H = GF.H;
  c.fillStyle = 'rgba(8,8,18,0.86)';
  c.fillRect(0, 0, W, H);
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.fillStyle = '#fff';
  var winCol = gs === 'WIN' ? 'rgba(46, 204, 113, 0.7)' : 'rgba(231, 76, 94, 0.55)';
  c.shadowColor = winCol; c.shadowBlur = 28 * GF.S;
  c.font = 'bold ' + GF.clamp(38 * GF.S, 22, 60) + 'px sans-serif';
  c.fillText(gs === 'WIN' ? GF.t('won') : GF.t('gameover'), W / 2, H * 0.28);
  c.shadowColor = 'transparent'; c.shadowBlur = 0;

  c.fillStyle = '#cfd8e0';
  c.font = GF.clamp(20 * GF.S, 14, 26) + 'px sans-serif';
  c.fillText(GF.t('score') + ': ' + score + ' / ' + (STAT_MAX * STATS), W / 2, H * 0.40);
  if (best > 0) {
    c.fillStyle = '#9ab';
    c.font = GF.clamp(15 * GF.S, 11, 19) + 'px sans-serif';
    c.fillText(GF.t('best') + ': ' + best, W / 2, H * 0.46);
  }

  // retry + menu buttons
  var bw = GF.clamp(220 * GF.S, 160, 300), bh = GF.clamp(48 * GF.S, 38, 60);
  var bx = (W - bw) / 2;
  var by = H * 0.62;
  GF.rr(c, bx, by, bw, bh, bh / 2);
  var grad = c.createLinearGradient(bx, by, bx, by + bh);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
  c.fillStyle = grad; c.fill();
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(18 * GF.S, 14, 22) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(GF.t('retry'), bx + bw / 2, by + bh / 2);

  var by2 = H * 0.74;
  GF.rr(c, bx, by2, bw, bh, bh / 2);
  c.fillStyle = '#22222a'; c.fill();
  c.strokeStyle = '#3a3a4a'; c.lineWidth = 2; c.stroke();
  c.fillStyle = '#cfd8e0';
  c.fillText(GF.t('menu'), bx + bw / 2, by2 + bh / 2);
}

// ── MAIN DRAW ────────────────────────────────────────────────────────────
function draw(c) {
  if (gs === 'MENU') {
    drawMenu(c);
  } else {
    c.fillStyle = '#0a0a14';
    c.fillRect(0, 0, GF.W, GF.H);
    drawHUD(c);
    drawStatBars(c);
    if (phase === 'PICK') {
      drawCards(c);
    } else if (phase === 'RECAP') {
      drawRecap(c);
    }
    if (gs === 'GAMEOVER' || gs === 'WIN') {
      drawEndOverlay(c);
    }
  }
  if (tutorialOpen) drawTutorialPanel(c);
}

// ── CLICK PIPELINE ───────────────────────────────────────────────────────
GF.canvas.addEventListener('click', function(e) {
  onClick(e.clientX, e.clientY);
});
// Screenshot helper: in screenshot mode only, pressing ArrowRight (used by
// take_screenshots.js between shots) advances to the next era so shot 2 differs
// from shot 1. Gated on _ssMode + era < ERAS so we never land in WIN/GAMEOVER.
window.addEventListener('keydown', function(e) {
  if (!_ssMode) return;
  if (e.code === 'ArrowRight' && gs === 'PLAYING' && phase === 'PICK' && era < ERAS) {
    commitCard(0);
    if (gs === 'PLAYING' && phase === 'RECAP' && collapsedStatIdx < 0) {
      advanceAfterRecap();
    }
  }
});
GF.canvas.addEventListener('touchend', function(e) {
  if (!e.changedTouches || !e.changedTouches.length) return;
  var t = e.changedTouches[0];
  onClick(t.clientX, t.clientY);
}, { passive: true });

// ── INIT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 900,
  designH: 700,
  strings: STRINGS,
  sprites: [],
  saveKey: 'civ_pivot',
  onReady: function() {
    loadBest();
    recomputeLayout();
    // Yandex 1.9 — persist run state across page refresh
    GF.persist('civ_pivot_run_v1',
      function() {
        return {
          gs: gs, phase: phase, era: era, stats: stats, prevStats: prevStats,
          civName: civName, civEraIdx: civEraIdx, cards: cards,
          score: score, collapsedStatIdx: collapsedStatIdx,
          seedStr: seedStr, seedHash: seedHash,
        };
      },
      function(s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        phase = s.phase || 'VIEW';
        era = s.era || 1;
        if (Array.isArray(s.stats) && s.stats.length === STATS) stats = s.stats;
        if (Array.isArray(s.prevStats) && s.prevStats.length === STATS) prevStats = s.prevStats;
        civName = s.civName || '';
        civEraIdx = s.civEraIdx || 0;
        if (Array.isArray(s.cards)) cards = s.cards;
        score = s.score || 0;
        collapsedStatIdx = (typeof s.collapsedStatIdx === 'number') ? s.collapsedStatIdx : -1;
        seedStr = s.seedStr || '';
        seedHash = s.seedHash || 0;
        if (seedHash) rng = mulberry32(seedHash);
      }
    );
    // safe entry: never wake into PICK without valid cards
    if (gs === 'PLAYING' && (!Array.isArray(cards) || !cards.length)) gs = 'MENU';
    tutorialOpen = false;
  },
  onUpdate: update,
  onDraw: draw,
});

// ── STATE EXPOSURE FOR RUNTIME GATE ──────────────────────────────────────
GF.exposeState(function() {
  return {
    gs: gs,
    phase: phase,
    era: era,
    score: score,
    stats: stats,
    civName: civName,
    cardsCount: cards.length,
    collapsedStatIdx: collapsedStatIdx,
    seedStr: seedStr,
    STATS: STATS,
    ERAS: ERAS,
    CARDS_PER_PICK: CARDS_PER_PICK,
    STAT_FLOOR: STAT_FLOOR,
    STAT_MAX: STAT_MAX,
    FINAL_SCORE_THRESHOLD: FINAL_SCORE_THRESHOLD,
    START_STAT_MIN: START_STAT_MIN,
    START_STAT_MAX: START_STAT_MAX,
    MULT_MIN: MULT_MIN,
    MULT_MAX: MULT_MAX,
    BONUS_FLAT_MIN: BONUS_FLAT_MIN,
    BONUS_FLAT_MAX: BONUS_FLAT_MAX,
  };
});

})();
</script>
