<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bumper Ball</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0d18; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── STRINGS (en + ru) ────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Bumper Ball',
    sub: 'Flick the puck. Sink the ball.',
    play: 'PLAY', retry: 'RETRY', next: 'NEXT', menu: 'MENU', again: 'PLAY AGAIN',
    level: 'LEVEL', shots: 'SHOTS', total: 'TOTAL', best: 'BEST',
    goal_hit: 'GOAL!', out: 'OUT OF SHOTS', cleared: 'ARENA CLEARED!',
    used: 'Shots used', no_shots: 'No shots left!',
    tut_goal: 'Goal: Knock the silver ball into the glowing goal ring.',
    tut_controls: 'Controls: Drag back anywhere to aim and set power, then release to fire the puck like a pool cue.',
    tut_win: 'Win: Settle the ball inside the goal. Clear all 6 arenas to win the run.',
    tut_lose: 'Lose: Run out of shots before the ball reaches the goal.',
    tut_tip: 'Tip: Bank off the springy bumpers for angles — and keep the ball clear of the dark pits, which reset it.',
    close: '(tap anywhere to close)',
  },
  ru: {
    title: 'Шайбол',
    sub: 'Щёлкни шайбу. Загони шар.',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', next: 'ДАЛЕЕ', menu: 'МЕНЮ', again: 'СНОВА',
    level: 'УРОВЕНЬ', shots: 'УДАРЫ', total: 'ВСЕГО', best: 'РЕКОРД',
    goal_hit: 'ГОЛ!', out: 'УДАРЫ КОНЧИЛИСЬ', cleared: 'АРЕНА ПРОЙДЕНА!',
    used: 'Ударов', no_shots: 'Удары кончились!',
    tut_goal: 'Цель: загони серебряный шар в светящееся кольцо ворот.',
    tut_controls: 'Управление: тяни назад в любом месте, чтобы прицелиться и задать силу, затем отпусти — шайба летит как от кия.',
    tut_win: 'Победа: останови шар внутри ворот. Пройди все 6 арен, чтобы выиграть.',
    tut_lose: 'Поражение: закончились удары, а шар не в воротах.',
    tut_tip: 'Совет: отскакивай от пружинистых бамперов под углом — и держи шар подальше от тёмных ям, они его сбрасывают.',
    close: '(нажмите, чтобы закрыть)',
  },
};

var SPRITE_NAMES = ['puck', 'ball', 'goal', 'bumper', 'pit'];

// ── TUNABLES ─────────────────────────────────────────────────────────────
var SHOT_BUDGET   = 5;
var MAX_POWER     = 920;
var DRAG_FULL_PX  = 150;
var FRICTION      = 1.6;
var REST_SPEED    = 14;
var WALL_BOUNCE   = 0.78;
var BUMPER_BOUNCE = 1.04;
var PUCK_RADIUS   = 26;
var BALL_RADIUS   = 20;
var GOAL_RADIUS   = 38;
var BUMPER_RADIUS = 28;
var PIT_RADIUS    = 34;
var WALL_INSET    = 18;

var WORLD_W = 720, WORLD_H = 1100;

// ── LEVELS (hand-built layouts) ──────────────────────────────────────────
// Coords in world units. puck/ball/goal = {x,y}; bumpers/pits = [{x,y}...]
var LEVELS = [
  { // 1 — gentle intro, straight shot
    puck: { x: 360, y: 900 }, ball: { x: 360, y: 620 }, goal: { x: 360, y: 230 },
    bumpers: [], pits: [],
  },
  { // 2 — one central bumper to go around
    puck: { x: 360, y: 920 }, ball: { x: 360, y: 660 }, goal: { x: 360, y: 200 },
    bumpers: [{ x: 360, y: 430 }], pits: [],
  },
  { // 3 — bank shot, goal in a corner
    puck: { x: 200, y: 900 }, ball: { x: 360, y: 640 }, goal: { x: 560, y: 220 },
    bumpers: [{ x: 250, y: 420 }, { x: 470, y: 520 }], pits: [],
  },
  { // 4 — pit hazard guarding the lane
    puck: { x: 360, y: 940 }, ball: { x: 360, y: 700 }, goal: { x: 360, y: 200 },
    bumpers: [{ x: 200, y: 460 }, { x: 520, y: 460 }], pits: [{ x: 360, y: 470 }],
  },
  { // 5 — bumper cluster, goal offset
    puck: { x: 180, y: 920 }, ball: { x: 360, y: 700 }, goal: { x: 540, y: 200 },
    bumpers: [{ x: 360, y: 540 }, { x: 230, y: 380 }, { x: 500, y: 400 }],
    pits: [{ x: 360, y: 760 }],
  },
  { // 6 — gauntlet finale
    puck: { x: 360, y: 960 }, ball: { x: 360, y: 720 }, goal: { x: 360, y: 170 },
    bumpers: [{ x: 230, y: 560 }, { x: 490, y: 560 }, { x: 360, y: 380 }],
    pits: [{ x: 200, y: 360 }, { x: 520, y: 360 }],
  },
];

// ── STATE ────────────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | PLAYING | LEVELCLEAR | GAMEOVER | WON
var levelIdx = 0;
var shotsLeft = SHOT_BUDGET;
var levelShots = 0;         // shots used on the current level
var totalShots = 0;         // shots used this run
var best = 0;               // fewest total shots to clear all levels (0 = none)

var puck = { x: 0, y: 0, vx: 0, vy: 0 };
var ball = { x: 0, y: 0, vx: 0, vy: 0, spawn: { x: 0, y: 0 } };
var goal = { x: 0, y: 0 };
var bumpers = [];           // [{x,y}]
var pits = [];              // [{x,y}]

var dragging = false;
var dragStartX = 0, dragStartY = 0;   // screen-space anchor (first touch)
var dragX = 0, dragY = 0;             // current screen-space pointer
var moving = false;                   // bodies are in motion (input locked)

var showTut = false;
var pulseT = 0;
var _menuBtn = null;

// ── COORD TRANSFORM (world ↔ screen, letterbox) ──────────────────────────
function viewScale() { return Math.min(GF.W / WORLD_W, GF.H / WORLD_H); }
function viewOff() {
  var sc = viewScale();
  return { x: (GF.W - WORLD_W * sc) / 2, y: (GF.H - WORLD_H * sc) / 2, sc: sc };
}
function w2s(x, y) { var o = viewOff(); return { x: o.x + x * o.sc, y: o.y + y * o.sc }; }
function s2w(x, y) { var o = viewOff(); return { x: (x - o.x) / o.sc, y: (y - o.y) / o.sc }; }

// ── LEVEL SETUP ──────────────────────────────────────────────────────────
function loadLevel(idx) {
  var L = LEVELS[idx];
  puck.x = L.puck.x; puck.y = L.puck.y; puck.vx = 0; puck.vy = 0;
  ball.x = L.ball.x; ball.y = L.ball.y; ball.vx = 0; ball.vy = 0;
  ball.spawn.x = L.ball.x; ball.spawn.y = L.ball.y;
  goal.x = L.goal.x; goal.y = L.goal.y;
  bumpers = L.bumpers.map(function(b) { return { x: b.x, y: b.y }; });
  pits = L.pits.map(function(p) { return { x: p.x, y: p.y }; });
  shotsLeft = SHOT_BUDGET;
  levelShots = 0;
  moving = false; dragging = false;
}

// ── LIFECYCLE ────────────────────────────────────────────────────────────
function startRun() {
  levelIdx = 0; totalShots = 0;
  loadLevel(0);
  gs = 'PLAYING'; showTut = false;
  GF.gameStarted(); GF.saveRun();
}
function retryLevel() {
  totalShots -= levelShots;            // give back this level's shots
  if (totalShots < 0) totalShots = 0;
  loadLevel(levelIdx);
  gs = 'PLAYING'; showTut = false;
  GF.gameStarted(); GF.saveRun();
}
function nextLevel() {
  levelIdx++;
  if (levelIdx >= LEVELS.length) { onWon(); return; }
  loadLevel(levelIdx);
  gs = 'PLAYING'; showTut = false;
  GF.gameStarted(); GF.saveRun();
}
function backToMenu() {
  gs = 'MENU'; showTut = false; dragging = false;
  GF.gameEnded(); GF.saveRun();
}

function onLevelClear() {
  gs = 'LEVELCLEAR';
  GF.gameEnded();
  var sp = w2s(goal.x, goal.y);
  GF.spawnFloat(sp.x, sp.y - 40 * GF.S, GF.t('goal_hit'), '#ffd166');
  GF.spawnParticles(sp.x, sp.y, '#ffd166', 26);
  GF.setShake(0.8);
  GF.saveRun();
}
function onGameOver() {
  gs = 'GAMEOVER';
  GF.gameEnded();
  GF.spawnFloat(GF.cx, GF.cy - 40 * GF.S, GF.t('out'), '#e07a5f');
  GF.saveRun();
}
function onWon() {
  gs = 'WON';
  GF.gameEnded();
  if (best === 0 || totalShots < best) {
    best = totalShots;
    try { localStorage.setItem('bumper_ball_best', best); } catch (e) {}
  }
  GF.spawnFloat(GF.cx, GF.cy - 60 * GF.S, GF.t('cleared'), '#ffd166');
  GF.happytime();
  GF.saveRun();
}

// ── FIRE ─────────────────────────────────────────────────────────────────
function fire(dirX, dirY, power) {
  puck.vx = dirX * power;
  puck.vy = dirY * power;
  moving = true;
  shotsLeft--;
  levelShots++;
  totalShots++;
  var sp = w2s(puck.x, puck.y);
  GF.spawnParticles(sp.x, sp.y, '#7fd4ff', 10);
  GF.setShake(0.3);
  GF.saveRun();
}

// ── INPUT ────────────────────────────────────────────────────────────────
function onPressStart(sx, sy) {
  if (gs === 'MENU') { if (_menuBtn && inRect(sx, sy, _menuBtn)) startRun(); return; }
  if (gs === 'LEVELCLEAR' || gs === 'GAMEOVER' || gs === 'WON') { handleOverlayPress(sx, sy); return; }
  if (gs !== 'PLAYING') return;

  if (showTut) { showTut = false; return; }

  // HUD icons (top-right)
  var hb = hudButtons();
  for (var i = 0; i < hb.length; i++) { if (inRect(sx, sy, hb[i])) { hb[i].fn(); return; } }

  if (moving) return;               // can't aim while bodies move

  dragging = true;
  dragStartX = sx; dragStartY = sy;
  dragX = sx; dragY = sy;
}
function onPressMove(sx, sy) {
  if (!dragging) return;
  dragX = sx; dragY = sy;
}
function onPressEnd() {
  if (!dragging) return;
  dragging = false;
  // pull vector = from current pointer back to anchor; fire opposite (toward anchor-from-pointer)
  var pullX = dragStartX - dragX;
  var pullY = dragStartY - dragY;
  var d = Math.sqrt(pullX * pullX + pullY * pullY);
  if (d < 10) return;               // tap, not a flick — ignore
  var nx = pullX / d, ny = pullY / d;
  var power = Math.min(d / DRAG_FULL_PX, 1) * MAX_POWER;
  fire(nx, ny, power);
}

function inRect(x, y, r) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

var _cv = GF.canvas;
_cv.addEventListener('mousedown', function(e) { onPressStart(e.clientX, e.clientY); });
_cv.addEventListener('mousemove', function(e) { onPressMove(e.clientX, e.clientY); });
_cv.addEventListener('mouseup', function() { onPressEnd(); });
_cv.addEventListener('mouseleave', function() { onPressEnd(); });
_cv.addEventListener('touchstart', function(e) {
  if (e.changedTouches && e.changedTouches.length) { var t0 = e.changedTouches[0]; onPressStart(t0.clientX, t0.clientY); }
}, { passive: false });
_cv.addEventListener('touchmove', function(e) {
  if (e.changedTouches && e.changedTouches.length) { var t0 = e.changedTouches[0]; onPressMove(t0.clientX, t0.clientY); }
}, { passive: false });
_cv.addEventListener('touchend', function() { onPressEnd(); }, { passive: false });

// HUD icon row: help ?, retry ↻, back ✕
function hudButtons() {
  var s = GF.S;
  var sz = GF.clamp(38 * s, 30, 48);
  var gap = GF.clamp(8 * s, 6, 12);
  var pad = GF.clamp(10 * s, 8, 16);
  var y = pad;
  var x3 = GF.W - pad - sz;
  var x2 = x3 - gap - sz;
  var x1 = x2 - gap - sz;
  return [
    { x: x1, y: y, w: sz, h: sz, kind: 'help',  fn: function() { showTut = true; } },
    { x: x2, y: y, w: sz, h: sz, kind: 'retry', fn: retryLevel },
    { x: x3, y: y, w: sz, h: sz, kind: 'back',  fn: backToMenu },
  ];
}

// ── OVERLAY BUTTONS ──────────────────────────────────────────────────────
function overlayRects() {
  var s = GF.S;
  var btnW = GF.clamp(240 * s, 160, 320), btnH = GF.clamp(52 * s, 40, 66);
  var btnX = GF.cx - btnW / 2;
  var btn1Y = GF.cy + 24 * s;
  var btn2H = GF.clamp(46 * s, 38, 58);
  var btn2Y = btn1Y + btnH + 12 * s;
  var sz = GF.clamp(38 * s, 30, 48), pad = GF.clamp(10 * s, 8, 16);
  return {
    primary: { x: btnX, y: btn1Y, w: btnW, h: btnH },
    secondary: { x: btnX, y: btn2Y, w: btnW, h: btn2H },
    back: { x: GF.W - pad - sz, y: pad, w: sz, h: sz },
  };
}
function handleOverlayPress(x, y) {
  var r = overlayRects();
  if (inRect(x, y, r.back)) { backToMenu(); return; }
  if (inRect(x, y, r.primary)) {
    if (gs === 'LEVELCLEAR') nextLevel();
    else if (gs === 'GAMEOVER') retryLevel();
    else if (gs === 'WON') startRun();
    return;
  }
  if (inRect(x, y, r.secondary)) { backToMenu(); return; }
}

// ── PHYSICS ──────────────────────────────────────────────────────────────
function speed(b) { return Math.sqrt(b.vx * b.vx + b.vy * b.vy); }

function stepBody(b, dt) {
  b.x += b.vx * dt;
  b.y += b.vy * dt;
  // friction
  var damp = Math.max(0, 1 - FRICTION * dt);
  b.vx *= damp; b.vy *= damp;
  if (speed(b) < REST_SPEED) { b.vx = 0; b.vy = 0; }
}

function collideWalls(b, r) {
  var lo = WALL_INSET + r, hiX = WORLD_W - WALL_INSET - r, hiY = WORLD_H - WALL_INSET - r;
  var hit = 0;
  if (b.x < lo) { b.x = lo; b.vx = -b.vx * WALL_BOUNCE; hit = Math.abs(b.vx); }
  else if (b.x > hiX) { b.x = hiX; b.vx = -b.vx * WALL_BOUNCE; hit = Math.abs(b.vx); }
  if (b.y < lo) { b.y = lo; b.vy = -b.vy * WALL_BOUNCE; hit = Math.max(hit, Math.abs(b.vy)); }
  else if (b.y > hiY) { b.y = hiY; b.vy = -b.vy * WALL_BOUNCE; hit = Math.max(hit, Math.abs(b.vy)); }
  return hit;
}

function collideCircle(b, r, cx, cy, cr, rest) {
  var dx = b.x - cx, dy = b.y - cy;
  var d = Math.sqrt(dx * dx + dy * dy);
  var min = r + cr;
  if (d >= min || d === 0) return 0;
  var nx = dx / d, ny = dy / d;
  // push out
  b.x = cx + nx * min;
  b.y = cy + ny * min;
  // reflect velocity along normal
  var vn = b.vx * nx + b.vy * ny;
  if (vn < 0) {
    b.vx -= (1 + rest) * vn * nx;
    b.vy -= (1 + rest) * vn * ny;
  }
  return Math.abs(vn);
}

// elastic-ish collision between puck and ball (ball a touch lighter so it pops away)
function collidePuckBall() {
  var dx = ball.x - puck.x, dy = ball.y - puck.y;
  var d = Math.sqrt(dx * dx + dy * dy);
  var min = PUCK_RADIUS + BALL_RADIUS;
  if (d >= min || d === 0) return 0;
  var nx = dx / d, ny = dy / d;
  var overlap = min - d;
  // separate
  puck.x -= nx * overlap * 0.5; puck.y -= ny * overlap * 0.5;
  ball.x += nx * overlap * 0.5; ball.y += ny * overlap * 0.5;
  // relative velocity along normal
  var rvx = puck.vx - ball.vx, rvy = puck.vy - ball.vy;
  var vn = rvx * nx + rvy * ny;
  if (vn <= 0) return 0;
  var imp = vn * 1.0;
  // ball lighter → gets more impulse, puck retains some
  puck.vx -= imp * nx * 0.55; puck.vy -= imp * ny * 0.55;
  ball.vx += imp * nx * 1.15; ball.vy += imp * ny * 1.15;
  return Math.abs(vn);
}

function ballInPit() {
  for (var i = 0; i < pits.length; i++) {
    var dx = ball.x - pits[i].x, dy = ball.y - pits[i].y;
    if (Math.sqrt(dx * dx + dy * dy) < PIT_RADIUS) return i;
  }
  return -1;
}

function ballInGoal() {
  var dx = ball.x - goal.x, dy = ball.y - goal.y;
  return Math.sqrt(dx * dx + dy * dy) < GOAL_RADIUS;
}

function allAtRest() {
  return puck.vx === 0 && puck.vy === 0 && ball.vx === 0 && ball.vy === 0;
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  pulseT += dt;
  if (gs !== 'PLAYING') return;
  if (!moving) return;

  // substep for stable collisions
  var steps = 4;
  var sdt = dt / steps;
  for (var s = 0; s < steps; s++) {
    stepBody(puck, sdt);
    stepBody(ball, sdt);

    var imp = 0;
    imp = Math.max(imp, collideWalls(puck, PUCK_RADIUS));
    imp = Math.max(imp, collideWalls(ball, BALL_RADIUS));
    for (var bi = 0; bi < bumpers.length; bi++) {
      var bp = bumpers[bi];
      var i1 = collideCircle(puck, PUCK_RADIUS, bp.x, bp.y, BUMPER_RADIUS, BUMPER_BOUNCE);
      var i2 = collideCircle(ball, BALL_RADIUS, bp.x, bp.y, BUMPER_RADIUS, BUMPER_BOUNCE);
      if (i1 > 80 || i2 > 80) { var sp = w2s(bp.x, bp.y); GF.spawnParticles(sp.x, sp.y, '#ff6fae', 6); }
      imp = Math.max(imp, i1, i2);
    }
    var pbi = collidePuckBall();
    imp = Math.max(imp, pbi);
    if (pbi > 120) {
      var spp = w2s(ball.x, ball.y);
      GF.spawnParticles(spp.x, spp.y, '#ffffff', 12);
      GF.setShake(Math.min(1.2, pbi / 300));
    }
    if (imp > 400) GF.setShake(Math.min(1.0, imp / 700));

    // ball falls in pit → reset to spawn
    if (ballInPit() >= 0) {
      var sp2 = w2s(ball.x, ball.y);
      GF.spawnParticles(sp2.x, sp2.y, '#5566aa', 14);
      ball.x = ball.spawn.x; ball.y = ball.spawn.y; ball.vx = 0; ball.vy = 0;
      GF.setShake(0.4);
    }
  }

  // resolve when everything settles
  if (allAtRest()) {
    moving = false;
    GF.saveRun();
    if (ballInGoal()) { onLevelClear(); return; }
    if (shotsLeft <= 0) { onGameOver(); return; }
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  // floor
  var g = ctx.createRadialGradient(GF.cx, GF.cy, 60 * GF.S, GF.cx, GF.cy, Math.max(GF.W, GF.H));
  g.addColorStop(0, '#1a2745'); g.addColorStop(1, '#080b16');
  ctx.fillStyle = g; ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'PLAYING' || gs === 'LEVELCLEAR' || gs === 'GAMEOVER') {
    drawArena(ctx);
    if (gs === 'PLAYING') {
      drawHUD(ctx);
      if (dragging) drawAim(ctx);
      if (showTut) drawTutPanel(ctx);
    }
  }
  if (gs === 'WON') drawArena(ctx); // show last board faintly behind

  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'LEVELCLEAR') drawEndOverlay(ctx, GF.t('goal_hit'), GF.t('used') + ': ' + levelShots,
      GF.t('next'), GF.t('menu'));
  if (gs === 'GAMEOVER') drawEndOverlay(ctx, GF.t('out'), GF.t('used') + ': ' + levelShots,
      GF.t('retry'), GF.t('menu'));
  if (gs === 'WON') drawEndOverlay(ctx, GF.t('cleared'),
      GF.t('total') + ': ' + totalShots + (best > 0 ? '   ' + GF.t('best') + ': ' + best : ''),
      GF.t('again'), GF.t('menu'));
}

function drawArena(ctx) {
  var o = viewOff();
  // arena floor panel
  var ax = o.x + WALL_INSET * o.sc, ay = o.y + WALL_INSET * o.sc;
  var aw = (WORLD_W - WALL_INSET * 2) * o.sc, ah = (WORLD_H - WALL_INSET * 2) * o.sc;
  GF.rr(ctx, ax, ay, aw, ah, 18 * o.sc);
  var fg = ctx.createLinearGradient(ax, ay, ax, ay + ah);
  fg.addColorStop(0, '#243a63'); fg.addColorStop(1, '#16223d');
  ctx.fillStyle = fg; ctx.fill();
  // arena rim
  ctx.strokeStyle = '#3e5d96'; ctx.lineWidth = 5 * o.sc; ctx.stroke();

  // pits (draw under everything)
  for (var pi = 0; pi < pits.length; pi++) drawPit(ctx, pits[pi]);
  // goal
  drawGoal(ctx);
  // bumpers
  for (var bi = 0; bi < bumpers.length; bi++) drawBumper(ctx, bumpers[bi]);
  // ball + puck
  drawBall(ctx);
  drawPuck(ctx);
}

function drawGoal(ctx) {
  var c = w2s(goal.x, goal.y), r = GOAL_RADIUS * viewScale();
  var pulse = 0.5 + 0.5 * Math.sin(pulseT * 4);
  var img = GF.sprites && GF.sprites['goal'];
  if (img && img.complete && img.naturalWidth > 0) {
    var sz = r * 2.6;
    ctx.globalAlpha = 0.95;
    ctx.drawImage(img, c.x - sz / 2, c.y - sz / 2, sz, sz);
    ctx.globalAlpha = 1;
    return;
  }
  var rg = ctx.createRadialGradient(c.x, c.y, 2, c.x, c.y, r * 1.3);
  rg.addColorStop(0, 'rgba(255,209,102,' + (0.5 + 0.3 * pulse) + ')');
  rg.addColorStop(1, 'rgba(255,209,102,0)');
  ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(c.x, c.y, r * 1.3, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#ffd166'; ctx.lineWidth = (3 + pulse * 2) * viewScale();
  ctx.shadowColor = '#ffd166'; ctx.shadowBlur = 16 * viewScale();
  ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI * 2); ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawPit(ctx, p) {
  var c = w2s(p.x, p.y), r = PIT_RADIUS * viewScale();
  var img = GF.sprites && GF.sprites['pit'];
  if (img && img.complete && img.naturalWidth > 0) {
    var sz = r * 2.2; ctx.drawImage(img, c.x - sz / 2, c.y - sz / 2, sz, sz); return;
  }
  var rg = ctx.createRadialGradient(c.x, c.y - r * 0.2, 2, c.x, c.y, r);
  rg.addColorStop(0, '#000814'); rg.addColorStop(0.7, '#0a1124'); rg.addColorStop(1, '#1a2440');
  ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(120,140,200,0.4)'; ctx.lineWidth = 2 * viewScale(); ctx.stroke();
}

function drawBumper(ctx, b) {
  var c = w2s(b.x, b.y), r = BUMPER_RADIUS * viewScale();
  GF.drawSprite('bumper', c.x, c.y, r * 2.2, function(cc, x, y, s) {
    var rr2 = s / 2;
    var grad = cc.createRadialGradient(x - rr2 * 0.3, y - rr2 * 0.3, rr2 * 0.1, x, y, rr2);
    grad.addColorStop(0, '#ff9ed1'); grad.addColorStop(0.6, '#ff5fa6'); grad.addColorStop(1, '#c62f74');
    cc.beginPath(); cc.arc(x, y, rr2 * 0.82, 0, Math.PI * 2); cc.fillStyle = grad; cc.fill();
    cc.strokeStyle = 'rgba(255,255,255,0.5)'; cc.lineWidth = 2 * viewScale(); cc.stroke();
  });
}

function drawBall(ctx) {
  var c = w2s(ball.x, ball.y), r = BALL_RADIUS * viewScale();
  GF.drawSprite('ball', c.x, c.y, r * 2.4, function(cc, x, y, s) {
    var rr2 = s / 2;
    var grad = cc.createRadialGradient(x - rr2 * 0.4, y - rr2 * 0.4, rr2 * 0.1, x, y, rr2);
    grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.5, '#cdd9e8'); grad.addColorStop(1, '#7d8da3');
    cc.beginPath(); cc.arc(x, y, rr2 * 0.84, 0, Math.PI * 2); cc.fillStyle = grad; cc.fill();
    cc.beginPath(); cc.arc(x - rr2 * 0.32, y - rr2 * 0.34, rr2 * 0.24, 0, Math.PI * 2);
    cc.fillStyle = 'rgba(255,255,255,0.85)'; cc.fill();
  });
}

function drawPuck(ctx) {
  var c = w2s(puck.x, puck.y), r = PUCK_RADIUS * viewScale();
  GF.drawSprite('puck', c.x, c.y, r * 2.3, function(cc, x, y, s) {
    var rr2 = s / 2;
    cc.beginPath(); cc.arc(x, y + rr2 * 0.1, rr2 * 0.9, 0, Math.PI * 2);
    cc.fillStyle = 'rgba(0,0,0,0.3)'; cc.fill();
    var grad = cc.createRadialGradient(x - rr2 * 0.3, y - rr2 * 0.35, rr2 * 0.1, x, y, rr2);
    grad.addColorStop(0, '#7fe0ff'); grad.addColorStop(0.55, '#2aa6e0'); grad.addColorStop(1, '#15608f');
    cc.beginPath(); cc.arc(x, y, rr2 * 0.86, 0, Math.PI * 2); cc.fillStyle = grad; cc.fill();
    cc.strokeStyle = '#0c3a5c'; cc.lineWidth = 3 * viewScale(); cc.stroke();
    // hub
    cc.beginPath(); cc.arc(x, y, rr2 * 0.3, 0, Math.PI * 2);
    cc.fillStyle = '#0c3a5c'; cc.fill();
    cc.beginPath(); cc.arc(x - rr2 * 0.28, y - rr2 * 0.3, rr2 * 0.18, 0, Math.PI * 2);
    cc.fillStyle = 'rgba(255,255,255,0.6)'; cc.fill();
  });
}

// aim line + power gauge while dragging
function drawAim(ctx) {
  var pullX = dragStartX - dragX, pullY = dragStartY - dragY;
  var d = Math.sqrt(pullX * pullX + pullY * pullY);
  if (d < 8) return;
  var nx = pullX / d, ny = pullY / d;
  var frac = Math.min(d / DRAG_FULL_PX, 1);
  var ps = w2s(puck.x, puck.y);
  var len = (60 + frac * 220) * GF.S;
  var ex = ps.x + nx * len, ey = ps.y + ny * len;

  // dashed aim line
  ctx.save();
  ctx.setLineDash([10 * GF.S, 8 * GF.S]);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 3 * GF.S;
  ctx.beginPath(); ctx.moveTo(ps.x, ps.y); ctx.lineTo(ex, ey); ctx.stroke();
  ctx.setLineDash([]);
  // arrowhead
  var ah = 12 * GF.S, aa = Math.atan2(ny, nx);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - Math.cos(aa - 0.4) * ah, ey - Math.sin(aa - 0.4) * ah);
  ctx.lineTo(ex - Math.cos(aa + 0.4) * ah, ey - Math.sin(aa + 0.4) * ah);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // power gauge — bar under the puck
  var gw = 90 * GF.S, gh = 10 * GF.S;
  var gx = ps.x - gw / 2, gy = ps.y + PUCK_RADIUS * viewScale() + 14 * GF.S;
  GF.rr(ctx, gx, gy, gw, gh, gh / 2);
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fill();
  var col = frac < 0.5 ? '#5fd35f' : frac < 0.85 ? '#ffd166' : '#ff5b5b';
  GF.rr(ctx, gx, gy, gw * frac, gh, gh / 2);
  ctx.fillStyle = col; ctx.fill();
}

// ── HUD ──────────────────────────────────────────────────────────────────
function drawHUD(ctx) {
  var s = GF.S;
  var pad = GF.clamp(12 * s, 8, 18);
  var fs = GF.clamp(17 * s, 13, 22);
  ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif';
  ctx.textBaseline = 'top';

  // top-left: level
  ctx.textAlign = 'left'; ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('level') + ' ' + (levelIdx + 1) + '/' + LEVELS.length, pad, pad + 6 * s);

  // top-center: shot pips + numeric
  var pipR = GF.clamp(6 * s, 4, 9);
  var pipGap = GF.clamp(8 * s, 5, 12);
  var totalW = SHOT_BUDGET * (pipR * 2) + (SHOT_BUDGET - 1) * pipGap;
  var startX = GF.cx - totalW / 2 + pipR;
  var py = pad + 14 * s;
  for (var i = 0; i < SHOT_BUDGET; i++) {
    var px = startX + i * (pipR * 2 + pipGap);
    ctx.beginPath(); ctx.arc(px, py, pipR, 0, Math.PI * 2);
    if (i < shotsLeft) { ctx.fillStyle = '#ffd166'; ctx.shadowColor = '#ffd166'; ctx.shadowBlur = 8 * s; }
    else { ctx.fillStyle = 'rgba(255,255,255,0.18)'; ctx.shadowBlur = 0; }
    ctx.fill(); ctx.shadowBlur = 0;
  }
  ctx.textAlign = 'center'; ctx.fillStyle = '#cfe2ff';
  ctx.font = 'bold ' + GF.clamp(13 * s, 10, 17) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('shots') + ': ' + shotsLeft, GF.cx, py + pipR + 6 * s);

  // HUD icons
  var hb = hudButtons();
  for (var k = 0; k < hb.length; k++) drawHudIcon(ctx, hb[k]);

  // bottom-center: total shots
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = GF.clamp(13 * s, 10, 17) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('total') + ': ' + totalShots, GF.cx, GF.H - 14 * s);
  ctx.textBaseline = 'alphabetic';
}

function drawHudIcon(ctx, b) {
  var s = GF.S;
  GF.rr(ctx, b.x, b.y, b.w, b.h, 8 * s);
  ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.2 * s; ctx.stroke();
  ctx.save();
  ctx.strokeStyle = '#e6efe9'; ctx.fillStyle = '#e6efe9';
  ctx.lineWidth = 2.2 * s; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  var cxp = b.x + b.w / 2, cyp = b.y + b.h / 2, r = b.w * 0.26;
  if (b.kind === 'back') {
    ctx.beginPath();
    ctx.moveTo(cxp - r, cyp - r); ctx.lineTo(cxp + r, cyp + r);
    ctx.moveTo(cxp + r, cyp - r); ctx.lineTo(cxp - r, cyp + r);
    ctx.stroke();
  } else if (b.kind === 'help') {
    ctx.font = 'bold ' + (b.h * 0.5) + 'px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', cxp, cyp + 1 * s);
    ctx.textBaseline = 'alphabetic';
  } else if (b.kind === 'retry') {
    ctx.beginPath();
    ctx.arc(cxp, cyp, r, Math.PI * 0.35, Math.PI * 2.1);
    ctx.stroke();
    var ex = cxp + Math.cos(Math.PI * 0.35) * r, ey = cyp + Math.sin(Math.PI * 0.35) * r;
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - r * 0.5, ey - r * 0.15);
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex + r * 0.1, ey - r * 0.55);
    ctx.stroke();
  }
  ctx.restore();
}

// ── TEXT WRAP ────────────────────────────────────────────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}
function tutItems() {
  return [GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip')];
}

// ── MENU ─────────────────────────────────────────────────────────────────
function drawMenu(ctx) {
  var s = GF.S;
  ctx.fillStyle = 'rgba(8,11,22,0.92)'; ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(40 * s, 26, 56);
  ctx.shadowColor = 'rgba(127,224,255,0.4)'; ctx.shadowBlur = 26 * s;
  ctx.font = 'bold ' + titleFs + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  var titleY = GF.clamp(GF.H * 0.14, 60, 160);
  ctx.fillText(GF.t('title'), GF.cx, titleY);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  ctx.font = GF.clamp(15 * s, 12, 20) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#7fb4d6';
  ctx.fillText(GF.t('sub'), GF.cx, titleY + 26 * s);

  var maxW = Math.min(GF.W - 48 * s, 520 * s);
  var bodyFs = GF.clamp(13.5 * s, 11, 17);
  var lineH = bodyFs + 5 * s;
  ctx.font = bodyFs + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'left'; ctx.fillStyle = '#d8e4f0';
  var items = tutItems();
  var y = titleY + 52 * s;
  for (var i = 0; i < items.length; i++) {
    var lines = wrapLines(ctx, items[i], maxW);
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], GF.cx - maxW / 2, y); y += lineH; }
    y += 5 * s;
  }

  var btnW = GF.clamp(240 * s, 160, 320), btnH = GF.clamp(54 * s, 42, 66);
  var btnX = GF.cx - btnW / 2;
  var btnY = Math.min(y + 14 * s, GF.H - btnH - 24 * s);
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#2aa6e0'); grad.addColorStop(1, '#15608f');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + GF.clamp(18 * s, 14, 24) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), GF.cx, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  _menuBtn = { x: btnX, y: btnY, w: btnW, h: btnH };

  if (best > 0) {
    ctx.font = GF.clamp(13 * s, 10, 17) + 'px Inter, system-ui, sans-serif';
    ctx.fillStyle = '#789';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, Math.min(btnY + btnH + 22 * s, GF.H - 8 * s));
  }
}

// ── END OVERLAY ──────────────────────────────────────────────────────────
function drawEndOverlay(ctx, title, sub, primaryLabel, secondaryLabel) {
  var s = GF.S;
  ctx.fillStyle = 'rgba(8,11,22,0.9)'; ctx.fillRect(0, 0, GF.W, GF.H);

  var win = (gs === 'LEVELCLEAR' || gs === 'WON');
  var titleFs = GF.clamp(42 * s, 26, 58);
  ctx.shadowColor = win ? 'rgba(255,209,102,0.5)' : 'rgba(224,122,95,0.4)';
  ctx.shadowBlur = 30 * s;
  ctx.font = 'bold ' + titleFs + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(title, GF.cx, GF.cy - 50 * s);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  ctx.font = GF.clamp(17 * s, 13, 22) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#bcd';
  ctx.fillText(sub, GF.cx, GF.cy - 14 * s);

  var r = overlayRects();
  var grad = ctx.createLinearGradient(r.primary.x, r.primary.y, r.primary.x, r.primary.y + r.primary.h);
  grad.addColorStop(0, '#2aa6e0'); grad.addColorStop(1, '#15608f');
  GF.rr(ctx, r.primary.x, r.primary.y, r.primary.w, r.primary.h, r.primary.h / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + GF.clamp(16 * s, 13, 22) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#fff'; ctx.textBaseline = 'middle';
  ctx.fillText(primaryLabel, GF.cx, r.primary.y + r.primary.h / 2);

  GF.rr(ctx, r.secondary.x, r.secondary.y, r.secondary.w, r.secondary.h, r.secondary.h / 2);
  ctx.fillStyle = 'rgba(255,255,255,0.10)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5 * s; ctx.stroke();
  ctx.fillStyle = '#dfe7f2';
  ctx.font = 'bold ' + GF.clamp(15 * s, 12, 20) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(secondaryLabel, GF.cx, r.secondary.y + r.secondary.h / 2);
  ctx.textBaseline = 'alphabetic';

  drawHudIcon(ctx, { x: r.back.x, y: r.back.y, w: r.back.w, h: r.back.h, kind: 'back' });
}

// ── TUTORIAL PANEL (? during play) ───────────────────────────────────────
function drawTutPanel(ctx) {
  var s = GF.S;
  ctx.fillStyle = 'rgba(6,9,18,0.93)'; ctx.fillRect(0, 0, GF.W, GF.H);
  var maxW = Math.min(GF.W - 48 * s, 520 * s);
  var fs = GF.clamp(15 * s, 12, 19);
  var lineH = fs + 6 * s;
  ctx.font = 'bold ' + GF.clamp(24 * s, 18, 32) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  var y = GF.clamp(GF.H * 0.16, 64, 180);
  ctx.fillText(GF.t('title'), GF.cx, y);
  y += 36 * s;
  ctx.font = fs + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'left'; ctx.fillStyle = '#d8e4f0';
  var items = tutItems();
  for (var i = 0; i < items.length; i++) {
    var lines = wrapLines(ctx, items[i], maxW);
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], GF.cx - maxW / 2, y); y += lineH; }
    y += 6 * s;
  }
  ctx.textAlign = 'center'; ctx.fillStyle = '#7fb4d6';
  ctx.font = GF.clamp(13 * s, 11, 16) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('close'), GF.cx, Math.min(y + 16 * s, GF.H - 24 * s));
}

// ── SCREENSHOT / TEST HELPERS ────────────────────────────────────────────
// Land on a static, populated PLAYING board (puck + ball + bumpers/pit in
// play, shots partially used) with the aim line + power gauge showing — a
// pure-gameplay frame that will NOT auto-resolve during the shot window.
function setupMidGame(idx) {
  if (typeof idx !== 'number') idx = 4;          // level 5: bumpers + a pit
  levelIdx = GF.clamp(idx, 0, LEVELS.length - 1);
  loadLevel(levelIdx);
  gs = 'PLAYING'; showTut = false;
  totalShots = 4 + levelIdx;
  shotsLeft = SHOT_BUDGET - 2;                    // mid-run pressure visible
  moving = false;                                 // at rest → stays in PLAYING
  // nudge bodies off their spawn so the board reads as in-progress
  puck.x = ball.x - 130; puck.y = ball.y + 150;
  // simulate an active aim drag so the aim line + power gauge render
  var ps = w2s(puck.x, puck.y);
  dragStartX = ps.x; dragStartY = ps.y;
  // pull down-left → fires up-right toward the ball/goal lane
  dragX = ps.x - 96 * GF.S; dragY = ps.y + 104 * GF.S;
  dragging = true;
}
window._setupForScreenshot = function(level) { setupMidGame(typeof level === 'number' ? level : 2); };
// Test hook: drive the game toward a terminal state. Large n burns the shot
// budget so the post-build-tester can verify GAMEOVER is reachable; small n
// loads that level mid-flight.
window._jumpLevel = function(n) {
  if (typeof n === 'number' && n >= LEVELS.length) {
    // Force an out-of-shots loss: drop the puck/ball at rest, no shots left,
    // ball NOT in goal, then let one update() settle into GAMEOVER.
    levelIdx = 0; loadLevel(0);
    gs = 'PLAYING'; showTut = false;
    shotsLeft = 0; levelShots = SHOT_BUDGET; totalShots = SHOT_BUDGET;
    // nudge so the settle check + terminal resolution fire next frame
    puck.vx = REST_SPEED * 0.5; puck.vy = 0;
    ball.vx = 0; ball.vy = 0;
    moving = true;
    return;
  }
  setupMidGame(typeof n === 'number' ? n : 2);
};
window._setState = function(st) {
  if (st === 1 || st === 'PLAYING') { if (gs !== 'PLAYING') setupMidGame(2); }
  else if (st === 2 || st === 'LEVELCLEAR') { gs = 'LEVELCLEAR'; }
  else if (st === 3 || st === 'GAMEOVER') { gs = 'GAMEOVER'; }
  else if (st === 4 || st === 'WON') { gs = 'WON'; }
  else if (st === 0 || st === 'MENU') { gs = 'MENU'; }
};
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'Inter, system-ui, sans-serif'; };
window._setLang = function(l) { GF.lang = (l === 'ru' ? 'ru' : 'en'); };
// Test hook: start a clean run at a given level (default 0), at rest, ready to
// flick. Used by the headless playtest to verify flick physics & progression.
window._startCleanLevel = function(idx) {
  levelIdx = GF.clamp(typeof idx === 'number' ? idx : 0, 0, LEVELS.length - 1);
  totalShots = 0;
  loadLevel(levelIdx);
  gs = 'PLAYING'; showTut = false;
};

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: WORLD_W,
  designH: WORLD_H,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'bumper_ball',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('bumper_ball_best') || '0') || 0; } catch (e) {}
    loadLevel(0);
    // Yandex 1.9 — persist run across reload
    GF.persist('bumper_ball_run_v1',
      function() {
        return { gs: gs, levelIdx: levelIdx, shotsLeft: shotsLeft, levelShots: levelShots,
                 totalShots: totalShots, puck: { x: puck.x, y: puck.y },
                 ball: { x: ball.x, y: ball.y } };
      },
      function(st) {
        if (!st) return;
        if (typeof st.levelIdx === 'number' && st.levelIdx >= 0 && st.levelIdx < LEVELS.length) {
          levelIdx = st.levelIdx;
          loadLevel(levelIdx);
          shotsLeft = (typeof st.shotsLeft === 'number') ? st.shotsLeft : shotsLeft;
          levelShots = st.levelShots || 0;
          totalShots = st.totalShots || 0;
          if (st.puck) { puck.x = st.puck.x; puck.y = st.puck.y; }
          if (st.ball) { ball.x = st.ball.x; ball.y = st.ball.y; }
          puck.vx = 0; puck.vy = 0; ball.vx = 0; ball.vy = 0; moving = false;
          gs = (st.gs === 'PLAYING') ? 'PLAYING' : 'MENU';
        }
      }
    );
    if (gs !== 'PLAYING') gs = 'MENU';
    // tutorial-seen flag
    try {
      if (!localStorage.getItem('bumper_ball_seen_tutorial')) {
        localStorage.setItem('bumper_ball_seen_tutorial', '1');
      }
    } catch (e) {}
    GF.exposeState(function() {
      return {
        gs: gs, levelIdx: levelIdx, level: levelIdx + 1, levels: LEVELS.length,
        shotsLeft: shotsLeft, levelShots: levelShots, totalShots: totalShots,
        score: totalShots, best: best, ballInGoal: ballInGoal(), moving: moving,
        SHOT_BUDGET: SHOT_BUDGET, MAX_POWER: MAX_POWER, FRICTION: FRICTION,
        REST_SPEED: REST_SPEED, WALL_BOUNCE: WALL_BOUNCE, BUMPER_BOUNCE: BUMPER_BOUNCE,
        PUCK_RADIUS: PUCK_RADIUS, BALL_RADIUS: BALL_RADIUS, GOAL_RADIUS: GOAL_RADIUS,
        DRAG_FULL_PX: DRAG_FULL_PX,
      };
    });
  },
  onUpdate: update,
  onDraw: draw,
});

// ── YANDEX MUST-HAVES (verified) ─────────────────────────────────────────
// 1. All UI text via GF.t()/STRINGS (en+ru).  2. GF.persist() saves run +
//    restores on boot.  3. fullscreen-exit resize handled in gf-lib.  4. No
//    auto-firing ads — this build makes no ad calls.

})();
</script>
