<script>
(function() {
'use strict';

    maxed: 'МАКС', cost: 'цена',

    tut_win: 'Победа: Достигни нужного % чистоты, пока не кончилась энергия чистки.',
    tut_lose: 'Поражение: Энергия чистки падает до нуля, а ты всё ещё ниже цели.',

    tapToScrub: 'Води, чтобы тереть!',
  },
};
function t(k) { return (STRINGS[GF.lang] || STRINGS.en)[k] || k; }

var SPRITE_NAMES = ['brush', 'sparkle'];

// ── TUNABLES (see DESIGN.md) ─────────────────────────────────────────────
var SCRUB_ENERGY_MAX  = 100;
var ENERGY_PER_STROKE = 0.045;
var REVEAL_REFILL     = 0.9;
var CLEAN_QUOTA       = 0.80;
var GRIME_LAYERS      = 1;
var BRUSH_RADIUS      = 34;
var BRUSH_STEP        = 8;
var TANK_STEP         = 20;
var COMBO_WINDOW_SEC  = 0.6;
var POLISH_BONUS      = 1.6;
var POLISH_STEP       = 0.9;
var COINS_PER_REVEAL  = 1;
var MASK_CELLS        = 64;          // mask resolution (cells across object box)

// ── LEVEL TABLE ──────────────────────────────────────────────────────────
// shape: which procedural hero to draw. layers: grime layer count (1-3).
// quota: cleanliness fraction to win. energy: scrub-energy tank for the level.
var LEVELS = [
  { shape:'mug',     layers:1, quota:0.80, energy:100, nameEn:'Muddy Mug',        nameRu:'Грязная кружка' },
  { shape:'plate',   layers:1, quota:0.85, energy:95,  nameEn:'Dusty Plate',      nameRu:'Пыльная тарелка' },
  { shape:'pan',     layers:2, quota:0.88, energy:110, nameEn:'Greasy Pan',       nameRu:'Жирная сковорода' },
  { shape:'key',     layers:2, quota:0.90, energy:105, nameEn:'Rusty Key',        nameRu:'Ржавый ключ' },
  { shape:'window',  layers:2, quota:0.90, energy:100, nameEn:'Grimy Window',     nameRu:'Грязное окно' },
  { shape:'spoon',   layers:2, quota:0.92, energy:95,  nameEn:'Tarnished Spoon',  nameRu:'Тусклая ложка' },
  { shape:'statue',  layers:3, quota:0.92, energy:120, nameEn:'Mossy Statue',     nameRu:'Мшистая статуя' },
  { shape:'coin',    layers:3, quota:0.94, energy:110, nameEn:'Corroded Coin',    nameRu:'Ржавая монета' },
  { shape:'lantern', layers:3, quota:0.95, energy:105, nameEn:'Sooty Lantern',    nameRu:'Закопчённый фонарь' },
  { shape:'trophy',  layers:3, quota:0.95, energy:100, nameEn:'Ancient Trophy',   nameRu:'Древний кубок' },
];

// Grime palettes per layer index (top layer first while scrubbing reveals next).
var GRIME = [
  { base:'#6b4a2a', spots:'#4f3315', name:'mud' },     // layer 0 (outermost)
  { base:'#9c5a26', spots:'#5e3010', name:'rust' },    // layer 1
  { base:'#6f7378', spots:'#494d52', name:'tarnish' }, // layer 2 (innermost)
];

// ── STATE ────────────────────────────────────────────────────────────────
var gs = 'MENU';                 // MENU | PLAYING | LEVELEND | SHOP | GAMEOVER | WIN
var level = 1;                   // 1-indexed
var bestLevel = 1;
var coins = 0;
var coinsThisLevel = 0;
var cleanPct = 0;                // 0..1 cleaned fraction of innermost layer
var quota = CLEAN_QUOTA;
var scrubEnergy = SCRUB_ENERGY_MAX;
var scrubEnergyMax = SCRUB_ENERGY_MAX;
var brushUpgradeLvl = 0;
var tankUpgradeLvl = 0;
var polishUpgradeLvl = 0;
var brushRadius = BRUSH_RADIUS;
var polishBonus = POLISH_BONUS;
var combo = 0, bestCombo = 0;
var comboTimer = 0;
var shineSweep = 0;              // 0..1 animated wipe on LEVELEND
var seenTutorial = false;
var showHelp = false;            // "?" panel open during PLAYING

// upgrade costs (scale with bought level)
var UP_BASE = { brush: 30, tank: 25, polish: 35 };
var UP_MAXLVL = 4;
function upCost(kind, lvl) { return UP_BASE[kind] + lvl * Math.round(UP_BASE[kind] * 0.8); }

// ── OFFSCREEN GRIME MASKS ────────────────────────────────────────────────
// Each grime layer is an offscreen canvas the size of the object box. We
// erase into it with destination-out where the brush strokes. cleanPct is
// the cleared-pixel ratio of the INNERMOST layer's coarse cell grid.
var objBox = { x:0, y:0, size:0 };          // on-screen placement of hero
var baseCanvas = null, baseCtx = null;       // the clean restored object
var layerCanvas = [];                        // grime layers (index 0 outer)
var layerCtx = [];
var MASK_PX = 256;                           // offscreen mask resolution (square)
var cellGrid = null;                         // Uint8 per cell: 1 dirty, 2 cleaned
var objMask = null;                          // Uint8 per cell: 1 = object silhouette
var cellCols = MASK_CELLS, cellRows = MASK_CELLS;
var totalOpaqueCells = 0, cleanedCells = 0;
var maskInit = false;

function makeCanvas(px) {
  var cv2 = document.createElement('canvas');
  cv2.width = px; cv2.height = px;
  return cv2;
}

// Build the clean base + grime layers for the current level.
function buildObject() {
  var lv = LEVELS[level - 1];
  GRIME_LAYERS = lv.layers;
  baseCanvas = makeCanvas(MASK_PX);
  baseCtx = baseCanvas.getContext('2d');
  drawHero(baseCtx, MASK_PX, lv.shape);
  layerCanvas = []; layerCtx = [];
  for (var i = 0; i < GRIME_LAYERS; i++) {
    var cvL = makeCanvas(MASK_PX);
    var cxL = cvL.getContext('2d');
    paintGrime(cxL, MASK_PX, GRIME[i], i, baseCanvas);
    layerCanvas.push(cvL); layerCtx.push(cxL);
  }
  // cell grid bound to the innermost layer's opacity (1=dirty, 2=cleaned).
  // objMask = object silhouette at cell res (sampled from base) for cheap
  // on-object hit tests in scrubSegment (so flailing off-object is free).
  cellGrid = new Uint8Array(cellCols * cellRows);
  objMask = new Uint8Array(cellCols * cellRows);
  totalOpaqueCells = 0; cleanedCells = 0;
  var idata = layerCtx[GRIME_LAYERS - 1].getImageData(0, 0, MASK_PX, MASK_PX).data;
  var bdata = baseCtx.getImageData(0, 0, MASK_PX, MASK_PX).data;
  var cw = MASK_PX / cellCols, ch = MASK_PX / cellRows;
  for (var r = 0; r < cellRows; r++) {
    for (var cph = 0; cph < cellCols; cph++) {
      var sx = Math.floor((cph + 0.5) * cw);
      var sy = Math.floor((r + 0.5) * ch);
      var pi = (sy * MASK_PX + sx) * 4 + 3;
      if (idata[pi] > 30) { cellGrid[r * cellCols + cph] = 1; totalOpaqueCells++; }
      if (bdata[pi] > 20) objMask[r * cellCols + cph] = 1;
    }
  }
  if (totalOpaqueCells === 0) totalOpaqueCells = 1;
  cleanPct = 0;
  maskInit = true;
}

// cheap object-silhouette hit test at mask coords (cell-grid lookup)
function onObjectAt(mx, my) {
  if (!objMask) return false;
  var cw = MASK_PX / cellCols, ch = MASK_PX / cellRows;
  var cc = Math.floor(mx / cw), r = Math.floor(my / ch);
  if (cc < 0 || cc >= cellCols || r < 0 || r >= cellRows) return false;
  return objMask[r * cellCols + cc] === 1;
}

// paint a grime layer clipped to the base object's silhouette
function paintGrime(c, px, pal, layerIdx, baseCv) {
  c.clearRect(0, 0, px, px);
  c.save();
  c.drawImage(baseCv, 0, 0);
  c.globalCompositeOperation = 'source-in';
  c.fillStyle = pal.base;
  c.fillRect(0, 0, px, px);
  var seed = 9281 + layerIdx * 7331;
  function rnd() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }
  c.globalCompositeOperation = 'source-atop';
  for (var i = 0; i < 520; i++) {
    var x = rnd() * px, y = rnd() * px, rad = 4 + rnd() * 16;
    c.globalAlpha = 0.18 + rnd() * 0.35;
    c.fillStyle = rnd() > 0.5 ? pal.spots : pal.base;
    c.beginPath(); c.arc(x, y, rad, 0, Math.PI * 2); c.fill();
  }
  for (var s = 0; s < 60; s++) {
    c.globalAlpha = 0.12 + rnd() * 0.22;
    c.fillStyle = pal.spots;
    var sx = rnd() * px, sy = rnd() * px, w = 10 + rnd() * 40, h = 4 + rnd() * 10;
    c.save(); c.translate(sx, sy); c.rotate(rnd() * Math.PI); c.fillRect(-w/2, -h/2, w, h); c.restore();
  }
  c.globalAlpha = 1;
  c.restore();
}

// ── PROCEDURAL HERO OBJECTS (the clean restored item) ────────────────────
function drawHero(c, px, shape) {
  c.clearRect(0, 0, px, px);
  var cx2 = px / 2, cy2 = px / 2;
  function metal(a, b, cc, x0, y0, x1, y1) {
    var g = c.createLinearGradient(x0, y0, x1, y1);
    g.addColorStop(0, a); g.addColorStop(0.5, b); g.addColorStop(1, cc);
    return g;
  }
  c.lineJoin = 'round';
  if (shape === 'mug') {
    c.fillStyle = metal('#fff', '#dfe9f2', '#9fb3c4', 0, 60, 0, px);
    c.beginPath(); c.moveTo(px*0.30, px*0.30);
    c.lineTo(px*0.70, px*0.30); c.lineTo(px*0.66, px*0.80);
    c.lineTo(px*0.34, px*0.80); c.closePath(); c.fill();
    c.lineWidth = px*0.05; c.strokeStyle = '#cfdbe6';
    c.beginPath(); c.arc(px*0.74, px*0.50, px*0.10, -1.2, 1.2); c.stroke();
    c.fillStyle = 'rgba(255,255,255,0.55)'; c.fillRect(px*0.36, px*0.34, px*0.05, px*0.4);
  } else if (shape === 'plate') {
    c.fillStyle = metal('#ffffff', '#e6eef5', '#aebfce', 60, 0, px, px);
    c.beginPath(); c.arc(cx2, cy2, px*0.32, 0, Math.PI*2); c.fill();
    c.strokeStyle = '#c4d2de'; c.lineWidth = px*0.02;
    c.beginPath(); c.arc(cx2, cy2, px*0.22, 0, Math.PI*2); c.stroke();
    c.fillStyle = 'rgba(255,255,255,0.5)'; c.beginPath(); c.arc(cx2-px*0.1, cy2-px*0.1, px*0.05, 0, Math.PI*2); c.fill();
  } else if (shape === 'pan') {
    c.fillStyle = metal('#d9dde2', '#b7bfc7', '#7c858e', 0, 60, 0, px);
    c.beginPath(); c.arc(cx2, cy2, px*0.30, 0, Math.PI*2); c.fill();
    c.fillStyle = '#3a3f45'; c.fillRect(px*0.78, cy2-px*0.04, px*0.20, px*0.08);
    c.strokeStyle = '#9aa3ac'; c.lineWidth = px*0.02; c.beginPath(); c.arc(cx2, cy2, px*0.22, 0, Math.PI*2); c.stroke();
  } else if (shape === 'key') {
    c.fillStyle = metal('#ffe9a8', '#e8c25c', '#b8902f', 0, 0, px, px);
    c.beginPath(); c.arc(px*0.34, cy2, px*0.14, 0, Math.PI*2); c.fill();
    c.fillRect(px*0.44, cy2-px*0.04, px*0.34, px*0.08);
    c.fillRect(px*0.66, cy2, px*0.05, px*0.12);
    c.fillRect(px*0.74, cy2, px*0.05, px*0.10);
    c.fillStyle = '#11202b'; c.beginPath(); c.arc(px*0.34, cy2, px*0.05, 0, Math.PI*2); c.fill();
  } else if (shape === 'window') {
    c.fillStyle = metal('#cfeefb', '#a9def0', '#7fc4dc', 0, 60, 0, px);
    c.fillRect(px*0.26, px*0.22, px*0.48, px*0.56);
    c.strokeStyle = '#5a4632'; c.lineWidth = px*0.05;
    c.strokeRect(px*0.26, px*0.22, px*0.48, px*0.56);
    c.beginPath(); c.moveTo(cx2, px*0.22); c.lineTo(cx2, px*0.78);
    c.moveTo(px*0.26, cy2); c.lineTo(px*0.74, cy2); c.stroke();
    c.fillStyle = 'rgba(255,255,255,0.55)'; c.fillRect(px*0.30, px*0.26, px*0.06, px*0.20);
  } else if (shape === 'spoon') {
    c.fillStyle = metal('#f2f6fa', '#cfd8e1', '#9aa6b2', 0, 0, px, px);
    c.beginPath(); c.ellipse(cx2, px*0.34, px*0.12, px*0.17, 0, 0, Math.PI*2); c.fill();
    c.fillRect(cx2-px*0.025, px*0.46, px*0.05, px*0.30);
    c.fillStyle = 'rgba(255,255,255,0.5)'; c.beginPath(); c.ellipse(cx2-px*0.03, px*0.30, px*0.03, px*0.06, 0, 0, Math.PI*2); c.fill();
  } else if (shape === 'statue') {
    c.fillStyle = metal('#e7d9bf', '#c9b48f', '#9c8560', 0, 60, 0, px);
    c.beginPath(); c.arc(cx2, px*0.34, px*0.13, 0, Math.PI*2); c.fill();
    c.beginPath(); c.moveTo(px*0.40, px*0.46); c.lineTo(px*0.60, px*0.46);
    c.lineTo(px*0.66, px*0.78); c.lineTo(px*0.34, px*0.78); c.closePath(); c.fill();
    c.fillStyle = 'rgba(255,255,255,0.4)'; c.fillRect(px*0.42, px*0.48, px*0.04, px*0.28);
  } else if (shape === 'coin') {
    c.fillStyle = metal('#ffe9a8', '#e8c25c', '#a8801f', 0, 0, px, px);
    c.beginPath(); c.arc(cx2, cy2, px*0.30, 0, Math.PI*2); c.fill();
    c.strokeStyle = '#c79a2f'; c.lineWidth = px*0.03; c.beginPath(); c.arc(cx2, cy2, px*0.24, 0, Math.PI*2); c.stroke();
    c.fillStyle = '#c79a2f'; c.font = 'bold ' + (px*0.24) + 'px sans-serif'; c.textAlign='center'; c.textBaseline='middle';
    c.fillText('★', cx2, cy2 + px*0.01);
  } else if (shape === 'lantern') {
    c.fillStyle = metal('#ffd98a', '#e0a93f', '#8f6b1f', 0, 60, 0, px);
    c.fillRect(px*0.36, px*0.30, px*0.28, px*0.40);
    c.fillStyle = '#fff6cf'; c.fillRect(px*0.40, px*0.34, px*0.20, px*0.32);
    c.fillStyle = metal('#ffd98a', '#e0a93f', '#8f6b1f', 0, 60, 0, px);
    c.fillRect(px*0.34, px*0.26, px*0.32, px*0.05);
    c.fillRect(px*0.46, px*0.18, px*0.08, px*0.08);
  } else if (shape === 'trophy') {
    c.fillStyle = metal('#ffe9a8', '#f0c84e', '#b8902f', 0, 0, px, px);
    c.beginPath(); c.moveTo(px*0.34, px*0.28); c.lineTo(px*0.66, px*0.28);
    c.lineTo(px*0.60, px*0.52); c.lineTo(px*0.40, px*0.52); c.closePath(); c.fill();
    c.beginPath(); c.arc(px*0.30, px*0.34, px*0.07, 0.4, 2.6); c.lineWidth=px*0.03; c.strokeStyle='#f0c84e'; c.stroke();
    c.beginPath(); c.arc(px*0.70, px*0.34, px*0.07, -2.6+Math.PI, 0.4+Math.PI); c.stroke();
    c.fillRect(cx2-px*0.03, px*0.52, px*0.06, px*0.12);
    c.fillRect(px*0.40, px*0.64, px*0.20, px*0.05);
    c.fillRect(px*0.36, px*0.69, px*0.28, px*0.06);
  } else {
    c.fillStyle = '#dfe9f2'; c.beginPath(); c.arc(cx2, cy2, px*0.3, 0, Math.PI*2); c.fill();
  }
}

// place object box on screen for current viewport (portrait-first). The hero
// should DOMINATE the screen (satisfying scrubber + Yandex 70%-gameplay rule),
// so size is the larger of a width-fraction and a height-fraction, capped to
// leave room for the top cleanliness meter + bottom energy bar.
function layoutObject() {
  var byW = GF.W * 0.94;
  var byH = GF.H * 0.62;          // leave HUD bands top + bottom
  var size = Math.min(byW, byH);
  size = Math.max(size, Math.min(GF.W, GF.H) * 0.62);  // never tiny
  objBox.size = size;
  objBox.x = GF.cx - size / 2;
  objBox.y = GF.cy - size / 2 + GF.H * 0.015;
}

// ── SCRUBBING ────────────────────────────────────────────────────────────
var lastPt = null;               // last pointer in canvas space during a stroke
var scrubbing = false;

// erase along the segment from a→b on the topmost remaining grime layer.
// Energy ONLY drains for the portion of the stroke that is actually OVER the
// object silhouette — flailing in empty space around the object is free (so a
// new player can't lose by scrubbing the background; the energy budget only
// punishes wasted strokes over already-clean *object* areas).
function scrubSegment(ax, ay, bx, by) {
  if (gs !== 'PLAYING' || !maskInit) return;
  var s = objBox.size / MASK_PX;
  var mAx = (ax - objBox.x) / s, mAy = (ay - objBox.y) / s;
  var mBx = (bx - objBox.x) / s, mBy = (by - objBox.y) / s;
  var dx = bx - ax, dy = by - ay;
  var distPx = Math.sqrt(dx*dx + dy*dy);

  var br = brushRadius / s;       // brush radius in mask px
  var steps = Math.max(1, Math.ceil(Math.sqrt((mBx-mAx)*(mBx-mAx)+(mBy-mAy)*(mBy-mAy)) / (br * 0.5)));
  var freshThisSeg = 0, onObjDabs = 0;
  for (var st = 0; st <= steps; st++) {
    var tt = st / steps;
    var mx = mAx + (mBx - mAx) * tt;
    var my = mAy + (mBy - mAy) * tt;
    if (onObjectAt(mx, my)) onObjDabs++;       // count dabs that touch the object
    freshThisSeg += eraseAt(mx, my, br);
  }
  // drain proportional to the on-object fraction of this stroke
  var onObjFrac = steps > 0 ? onObjDabs / (steps + 1) : (onObjectAt(mAx, mAy) ? 1 : 0);
  var drain = ENERGY_PER_STROKE * (distPx / GF.S) * onObjFrac;
  scrubEnergy = Math.max(0, scrubEnergy - drain);

  if (freshThisSeg > 0) {
    scrubEnergy = Math.min(scrubEnergyMax, scrubEnergy + REVEAL_REFILL * freshThisSeg);
    coins += COINS_PER_REVEAL * freshThisSeg;
    coinsThisLevel += COINS_PER_REVEAL * freshThisSeg;
    combo++;
    if (combo > bestCombo) bestCombo = combo;
    comboTimer = COMBO_WINDOW_SEC;
    if (combo >= 3) scrubEnergy = Math.min(scrubEnergyMax, scrubEnergy + polishBonus);
    if (Math.random() < 0.85) GF.spawnParticles(bx, by, Math.random() > 0.5 ? '#fff7d6' : '#bfe9ff', 4 + (combo > 4 ? 3 : 0));
    sfxScrub();
    cleanPct = cleanedCells / totalOpaqueCells;
    if (combo === 5 || combo === 12 || combo === 24) GF.spawnFloat(bx, by - 20*GF.S, t('perfect'), '#ffe06b');
    checkWin();
  }
  GF.saveRun();
}

// erase a circular brush footprint at mask coords; returns # fresh innermost cells cleaned
function eraseAt(mx, my, br) {
  var li = topLayerAt(mx, my);
  if (li < 0) return 0;
  var lc = layerCtx[li];
  lc.save();
  lc.globalCompositeOperation = 'destination-out';
  var g = lc.createRadialGradient(mx, my, br * 0.2, mx, my, br);
  g.addColorStop(0, 'rgba(0,0,0,1)');
  g.addColorStop(0.7, 'rgba(0,0,0,1)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  lc.fillStyle = g;
  lc.beginPath(); lc.arc(mx, my, br, 0, Math.PI * 2); lc.fill();
  lc.restore();
  if (li !== GRIME_LAYERS - 1) return 0;     // only innermost counts toward cleanPct
  return markCells(mx, my, br);
}

// detect topmost layer that still has opacity at this point
function topLayerAt(mx, my) {
  var ix = Math.max(0, Math.min(MASK_PX - 1, mx | 0));
  var iy = Math.max(0, Math.min(MASK_PX - 1, my | 0));
  for (var i = 0; i < GRIME_LAYERS; i++) {
    var a = layerCtx[i].getImageData(ix, iy, 1, 1).data[3];
    if (a > 40) return i;
  }
  return -1;
}

// mark innermost cells under the brush as cleaned; returns # newly cleaned
function markCells(mx, my, br) {
  var cw = MASK_PX / cellCols, ch = MASK_PX / cellRows;
  var c0 = Math.max(0, Math.floor((mx - br) / cw));
  var c1 = Math.min(cellCols - 1, Math.floor((mx + br) / cw));
  var r0 = Math.max(0, Math.floor((my - br) / ch));
  var r1 = Math.min(cellRows - 1, Math.floor((my + br) / ch));
  var fresh = 0, br2 = br * br;
  for (var r = r0; r <= r1; r++) {
    for (var cc = c0; cc <= c1; cc++) {
      var idx = r * cellCols + cc;
      if (cellGrid[idx] !== 1) continue;
      var px = (cc + 0.5) * cw, py = (r + 0.5) * ch;
      var ddx = px - mx, ddy = py - my;
      if (ddx*ddx + ddy*ddy <= br2) { cellGrid[idx] = 2; cleanedCells++; fresh++; }
    }
  }
  return fresh;
}

function checkWin() {
  if (cleanPct >= quota && gs === 'PLAYING') {
    bestLevel = Math.max(bestLevel, level);
    shineSweep = 0;
    gs = 'LEVELEND';
    sfxWin();
    GF.gameEnded();
    GF.saveRun();
  }
}

// ── LIFECYCLE ────────────────────────────────────────────────────────────
function startLevel(n) {
  level = Math.max(1, Math.min(LEVELS.length, n));
  var lv = LEVELS[level - 1];
  quota = lv.quota;
  scrubEnergyMax = lv.energy + tankUpgradeLvl * TANK_STEP;
  scrubEnergy = scrubEnergyMax;
  brushRadius = BRUSH_RADIUS + brushUpgradeLvl * BRUSH_STEP;
  polishBonus = POLISH_BONUS + polishUpgradeLvl * POLISH_STEP;
  combo = 0; comboTimer = 0;
  coinsThisLevel = 0;
  cleanPct = 0;
  layoutObject();
  buildObject();
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function retryLevel() { startLevel(level); }

function nextLevel() {
  if (level >= LEVELS.length) { gs = 'WIN'; GF.saveRun(); GF.happytime(); return; }
  startLevel(level + 1);
}

function loseGame() {
  gs = 'GAMEOVER';
  GF.gameEnded();
  GF.saveRun();
}

function update(dt) {
  if (gs !== 'PLAYING') return;
  if (combo > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }
  if (scrubEnergy <= 0 && cleanPct < quota) loseGame();
}

// ── INPUT (pointer drag = scrub; works for mouse + touch) ────────────────
function pointerDown(x, y) {
  ensureAudio();
  if (gs === 'PLAYING') {
    if (inHelpBtn(x, y)) { showHelp = !showHelp; return; }
    if (showHelp) { showHelp = false; return; }
    scrubbing = true; lastPt = { x: x, y: y };
    scrubSegment(x, y, x + 0.01, y + 0.01);
    return;
  }
}

function pointerMove(x, y) {
  if (gs !== 'PLAYING' || !scrubbing || !lastPt) return;
  scrubSegment(lastPt.x, lastPt.y, x, y);
  lastPt = { x: x, y: y };
}

function pointerUp() { scrubbing = false; lastPt = null; }

var cv = GF.canvas;
cv.addEventListener('mousedown', function(e){ pointerDown(e.clientX, e.clientY); });
window.addEventListener('mousemove', function(e){ pointerMove(e.clientX, e.clientY); });
window.addEventListener('mouseup', function(){ pointerUp(); });
cv.addEventListener('touchstart', function(e){ if(gs==='PLAYING' && e.touches[0]){ e.preventDefault(); pointerDown(e.touches[0].clientX, e.touches[0].clientY); } }, { passive:false });
cv.addEventListener('touchmove', function(e){ if(gs==='PLAYING' && e.touches[0]){ e.preventDefault(); pointerMove(e.touches[0].clientX, e.touches[0].clientY); } }, { passive:false });
cv.addEventListener('touchend', function(){ pointerUp(); }, { passive:false });

// ── PROCEDURAL AUDIO (ASMR-ish scrub + chimes, zero asset files) ─────────
var _ac = null, _scrubNode = null, _scrubGain = null, _scrubFilt = null;
function ensureAudio() {
  if (_ac) return;
  try {
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    _ac = new AC();
    var buf = _ac.createBuffer(1, _ac.sampleRate * 2, _ac.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    _scrubNode = _ac.createBufferSource(); _scrubNode.buffer = buf; _scrubNode.loop = true;
    _scrubFilt = _ac.createBiquadFilter(); _scrubFilt.type = 'bandpass'; _scrubFilt.frequency.value = 1800; _scrubFilt.Q.value = 0.7;
    _scrubGain = _ac.createGain(); _scrubGain.gain.value = 0;
    _scrubNode.connect(_scrubFilt); _scrubFilt.connect(_scrubGain); _scrubGain.connect(_ac.destination);
    _scrubNode.start();
  } catch (e) { _ac = null; }
}
function sfxScrub() {
  if (!_ac) return;
  var now = _ac.currentTime;
  try {
    _scrubGain.gain.cancelScheduledValues(now);
    _scrubGain.gain.setValueAtTime(Math.min(0.18, 0.05 + combo * 0.01), now);
    _scrubGain.gain.linearRampToValueAtTime(0.0001, now + 0.18);
    _scrubFilt.frequency.setValueAtTime(1400 + combo * 60, now);
  } catch (e) {}
}
function sfxWin() {
  if (!_ac) return;
  var now = _ac.currentTime;
  [523, 659, 784, 1047].forEach(function(f, i){
    try {
      var o = _ac.createOscillator(), g = _ac.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, now + i*0.08);
      g.gain.exponentialRampToValueAtTime(0.16, now + i*0.08 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now + i*0.08 + 0.4);
      o.connect(g); g.connect(_ac.destination);
      o.start(now + i*0.08); o.stop(now + i*0.08 + 0.42);
    } catch (e) {}
  });
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  var bg = ctx.createLinearGradient(0, 0, 0, GF.H);
  bg.addColorStop(0, '#1b3344'); bg.addColorStop(1, '#0e1b24');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, GF.W, GF.H);
  drawTileLines(ctx);

  if (gs === 'PLAYING' || gs === 'LEVELEND') {
    drawObject(ctx);
    if (gs === 'PLAYING') { drawHUD(ctx); drawBrushCursor(ctx); }
    if (gs === 'LEVELEND') drawShineSweep(ctx);
  }

  if (gs === 'MENU')     drawMenu(ctx);
  if (gs === 'LEVELEND') drawLevelEnd(ctx);
  if (gs === 'SHOP')     drawShop(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
  if (gs === 'WIN')      drawWin(ctx);
  if (gs === 'PLAYING' && showHelp) drawHelpPanel(ctx);
}

function drawTileLines(ctx) {
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
  var step = 56 * GF.S;
  for (var x = 0; x < GF.W; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GF.H); ctx.stroke(); }
  for (var y = 0; y < GF.H; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GF.W, y); ctx.stroke(); }
}

function drawObject(ctx) {
  if (!maskInit) return;
  var b = objBox;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 30 * GF.S; ctx.shadowOffsetY = 8 * GF.S;
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  GF.rr(ctx, b.x - 10*GF.S, b.y - 10*GF.S, b.size + 20*GF.S, b.size + 20*GF.S, 24*GF.S);
  ctx.fill();
  ctx.restore();
  ctx.drawImage(baseCanvas, b.x, b.y, b.size, b.size);
  for (var i = 0; i < GRIME_LAYERS; i++) ctx.drawImage(layerCanvas[i], b.x, b.y, b.size, b.size);
}

function drawBrushCursor(ctx) {
  if (!lastPt) return;
  var ringR = brushRadius * GF.S;
  ctx.beginPath(); ctx.arc(lastPt.x, lastPt.y, ringR, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.28)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.save();
  ctx.globalAlpha = 0.9;
  GF.drawSprite('brush', lastPt.x, lastPt.y - ringR*0.6, ringR * 2.0, function(c, x, y, s) {
    c.fillStyle = '#ffe08a';
    GF.rr(c, x - s*0.30, y - s*0.20, s*0.60, s*0.26, s*0.07); c.fill();
    c.fillStyle = '#9ad0ff';
    c.fillRect(x - s*0.26, y + s*0.04, s*0.52, s*0.14);
  });

function drawHUD(ctx) {
  var lv = LEVELS[level - 1];
  var pad = 12 * GF.S;
  var barW = Math.min(GF.W * 0.84, 460 * GF.S);
  var barX = GF.cx - barW / 2, barY = pad + 44 * GF.S, barH = 26 * GF.S;
  ctx.fillStyle = '#cfe6f2'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold ' + GF.clamp(15*GF.S, 12, 20) + 'px sans-serif';
  ctx.fillText(t('cleanliness') + '  ' + Math.round(cleanPct * 100) + '%', GF.cx, barY - 8*GF.S);
  GF.rr(ctx, barX, barY, barW, barH, barH/2); ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();
  var fillW = Math.max(0, Math.min(1, cleanPct)) * barW;
  var fg = ctx.createLinearGradient(barX, 0, barX + barW, 0);
  fg.addColorStop(0, '#34d3a6'); fg.addColorStop(1, '#7bf0c8');
  if (fillW > barH) { GF.rr(ctx, barX, barY, fillW, barH, barH/2); ctx.fillStyle = fg; ctx.fill(); }
  else if (fillW > 0) { ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(barX + barH/2, barY + barH/2, barH/2, 0, Math.PI*2); ctx.fill(); }
  var qx = barX + quota * barW;
  ctx.strokeStyle = '#ffe06b'; ctx.lineWidth = 3 * GF.S;
  ctx.beginPath(); ctx.moveTo(qx, barY - 4*GF.S); ctx.lineTo(qx, barY + barH + 4*GF.S); ctx.stroke();
  ctx.fillStyle = '#ffe06b'; ctx.font = 'bold ' + GF.clamp(11*GF.S,9,15) + 'px sans-serif';
  ctx.fillText(t('goal') + ' ' + Math.round(quota*100) + '%', qx, barY + barH + 16*GF.S);

  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#9fb8c6'; ctx.font = 'bold ' + GF.clamp(13*GF.S,11,18) + 'px sans-serif';
  ctx.fillText(t('level') + ' ' + level + '/' + LEVELS.length, pad, pad);
  ctx.fillStyle = '#e8f2f8'; ctx.font = 'bold ' + GF.clamp(15*GF.S,12,20) + 'px sans-serif';
  ctx.fillText(GF.lang === 'ru' ? lv.nameRu : lv.nameEn, pad, pad + 18*GF.S);

  ctx.textAlign = 'right';

  ctx.fillText('★ ' + coins, GF.W - pad - 50*GF.S, pad + 6*GF.S);

  drawHelpBtn(ctx);

  var ebW = Math.min(GF.W * 0.84, 460 * GF.S);
  var ebX = GF.cx - ebW / 2, ebH = 22 * GF.S, ebY = GF.H - ebH - 24 * GF.S;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#cfe6f2'; ctx.font = 'bold ' + GF.clamp(13*GF.S,11,18) + 'px sans-serif';
  ctx.fillText(t('energy'), GF.cx, ebY - 7*GF.S);
  GF.rr(ctx, ebX, ebY, ebW, ebH, ebH/2); ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();
  var ef = scrubEnergy / scrubEnergyMax;
  var ecol = ef > 0.5 ? '#46d36a' : ef > 0.22 ? '#f0c042' : '#ef5a5a';
  var efW = Math.max(0, ef) * ebW;
  if (efW > ebH) { GF.rr(ctx, ebX, ebY, efW, ebH, ebH/2); ctx.fillStyle = ecol; ctx.fill(); }
  else if (efW > 0) { ctx.fillStyle = ecol; ctx.beginPath(); ctx.arc(ebX + ebH/2, ebY + ebH/2, ebH/2, 0, Math.PI*2); ctx.fill(); }

  if (combo >= 2 && lastPt) {
    ctx.fillStyle = '#ffe06b'; ctx.font = 'bold ' + GF.clamp(17*GF.S,13,24) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('x' + combo + ' ' + t('combo'), lastPt.x, lastPt.y - brushRadius*GF.S - 16*GF.S);
  }

  if (cleanPct < 0.02 && !showHelp) {
    ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = 'bold ' + GF.clamp(18*GF.S,14,26) + 'px sans-serif';
    ctx.textAlign = 'center';

}

function wrapTextLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

  }
  var nbW = GF.clamp(260*GF.S,180,340), nbH = GF.clamp(58*GF.S,46,72);
  drawBigButton(ctx, GF.cx - nbW/2, GF.H * 0.80, nbW, nbH, t('next'), function(){ nextLevel(); });
}

function dotsLvl(lvl) {
  var s = '';
  for (var i = 0; i < UP_MAXLVL; i++) s += (i < lvl ? '●' : '○');
  return s;
}

function buyUpgrade(kind) {
  var lvl = kind === 'brush' ? brushUpgradeLvl : kind === 'tank' ? tankUpgradeLvl : polishUpgradeLvl;
  if (lvl >= UP_MAXLVL) return;
  var cost = upCost(kind, lvl);
  if (coins < cost) return;
  coins -= cost;
  if (kind === 'brush') brushUpgradeLvl++;
  else if (kind === 'tank') tankUpgradeLvl++;
  else polishUpgradeLvl++;
  GF.spawnParticles(GF.cx, GF.H * 0.4, '#ffe06b', 14);
  sfxWin();
  GF.saveRun();
}

function drawGameOver(ctx) {
  GFbuttonsReset();
  ctx.fillStyle = 'rgba(20,8,8,0.86)'; ctx.fillRect(0, 0, GF.W, GF.H);
  ctx.fillStyle = '#ff8a8a'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold ' + GF.clamp(38*GF.S,24,54) + 'px sans-serif';
  ctx.fillText(t('outofenergy'), GF.cx, GF.H * 0.34);
  ctx.fillStyle = '#e8f2f8'; ctx.font = GF.clamp(17*GF.S,13,23) + 'px sans-serif';
  ctx.fillText(t('reached') + ' ' + Math.round(cleanPct*100) + '%  ·  ' + t('needed') + ' ' + Math.round(quota*100) + '%', GF.cx, GF.H * 0.34 + 40*GF.S);
  ctx.fillStyle = '#ffd86b'; ctx.font = 'bold ' + GF.clamp(15*GF.S,12,20) + 'px sans-serif';
  ctx.fillText('★ ' + coins, GF.cx, GF.H * 0.34 + 68*GF.S);
  var btnW = GF.clamp(260*GF.S,180,340), btnH = GF.clamp(58*GF.S,46,72);
  drawBigButton(ctx, GF.cx - btnW/2, GF.H * 0.60, btnW, btnH, t('retry'), function(){ retryLevel(); });
}

function drawWin(ctx) {
  GFbuttonsReset();
  ctx.fillStyle = 'rgba(8,14,20,0.9)'; ctx.fillRect(0, 0, GF.W, GF.H);
  ctx.fillStyle = '#8ff0c4'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = 'rgba(52,211,166,0.5)'; ctx.shadowBlur = 30*GF.S;
  ctx.font = 'bold ' + GF.clamp(34*GF.S,22,50) + 'px sans-serif';
  ctx.fillText(t('winTitle'), GF.cx, GF.H * 0.34);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.fillStyle = '#cfe6f2'; ctx.font = GF.clamp(16*GF.S,12,22) + 'px sans-serif';
  ctx.fillText(t('winSub'), GF.cx, GF.H * 0.34 + 38*GF.S);
  ctx.fillStyle = '#ffd86b'; ctx.font = 'bold ' + GF.clamp(16*GF.S,12,22) + 'px sans-serif';
  ctx.fillText('★ ' + coins, GF.cx, GF.H * 0.34 + 68*GF.S);
  var btnW = GF.clamp(260*GF.S,180,340), btnH = GF.clamp(58*GF.S,46,72);
  drawBigButton(ctx, GF.cx - btnW/2, GF.H * 0.60, btnW, btnH, t('again'), function(){ startLevel(1); });
}

function drawShineSweep(ctx) {
  shineSweep = Math.min(1, shineSweep + 0.02);
  var b = objBox;
  var sx = b.x - b.size * 0.4 + shineSweep * b.size * 1.8;
  ctx.save();
  ctx.beginPath(); ctx.rect(b.x, b.y, b.size, b.size); ctx.clip();
  var g = ctx.createLinearGradient(sx - 40*GF.S, 0, sx + 40*GF.S, 0);
  g.addColorStop(0, 'rgba(255,255,255,0)'); g.addColorStop(0.5, 'rgba(255,255,255,0.65)'); g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(b.x, b.y, b.size, b.size);
  ctx.restore();
}

function drawBigButton(ctx, x, y, w, h, label, fn) {
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, '#34d3a6'); grad.addColorStop(1, '#1f9c79');
  GF.rr(ctx, x, y, w, h, h/2); ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = '#06241b'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(20*GF.S,15,26) + 'px sans-serif';
  ctx.fillText(label, x + w/2, y + h/2 + 1);
  ctx.textBaseline = 'alphabetic';
  GFbuttonPush(x, y, w, h, fn);
}

var langBtns = [];
function drawLangToggle(ctx, y) {
  langBtns = [];
  var opts = ['EN', 'RU'];
  var bw = 56*GF.S, bh = 34*GF.S, gap = 10*GF.S;
  var totalW = bw * 2 + gap;
  var x0 = GF.cx - totalW / 2;
  for (var i = 0; i < 2; i++) {
    var bx = x0 + i * (bw + gap);
    var active = (GF.lang === (i === 0 ? 'en' : 'ru'));
    GF.rr(ctx, bx, y, bw, bh, 10*GF.S);
    ctx.fillStyle = active ? 'rgba(52,211,166,0.9)' : 'rgba(255,255,255,0.12)'; ctx.fill();
    ctx.fillStyle = active ? '#06241b' : '#cfe6f2';
    ctx.font = 'bold ' + GF.clamp(14*GF.S,11,18) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(opts[i], bx + bw/2, y + bh/2 + 1);
    ctx.textBaseline = 'alphabetic';
    (function(lng){ GFbuttonPush(bx, y, bw, bh, function(){ GF.lang = lng; }); })(i === 0 ? 'en' : 'ru');
  }
}

// ── overlay button registration (custom layouts; GF.drawOverlay unused) ──
var _btns = [];
function GFbuttonsReset() { _btns = []; }
function GFbuttonPush(x, y, w, h, fn) { _btns.push({ x:x, y:y, w:w, h:h, fn:fn }); }
function hitButtons(x, y) {
  for (var i = _btns.length - 1; i >= 0; i--) {
    var b = _btns[i];
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { b.fn(); return true; }
  }
  return false;
}
cv.addEventListener('click', function(e){ if (gs !== 'PLAYING') { ensureAudio(); hitButtons(e.clientX, e.clientY); } });
cv.addEventListener('touchstart', function(e){
  if (gs !== 'PLAYING' && e.changedTouches[0]) { ensureAudio(); hitButtons(e.changedTouches[0].clientX, e.changedTouches[0].clientY); }
}, { passive:false });

// ── PERSISTENCE FLAGS ────────────────────────────────────────────────────
function loadSeen() { try { seenTutorial = localStorage.getItem('scrub_master_seen_tutorial') === '1'; } catch(e) {} }
function saveSeen() { try { localStorage.setItem('scrub_master_seen_tutorial', '1'); } catch(e) {} }

// ── SCREENSHOT / TEST HOOKS ──────────────────────────────────────────────
window._setLang = function(l) { GF.lang = (l === 'ru' ? 'ru' : 'en'); };
window._jumpLevel = function(n) {
  if (n === 99) {                        // harness: force GAMEOVER
    if (!maskInit) startLevel(level);
    scrubEnergy = 0; cleanPct = Math.min(cleanPct, quota - 0.01);
    loseGame();
    return;
  }
  if (n === 98) {                        // harness: force LEVELEND
    if (!maskInit) startLevel(level);
    cleanPct = quota; gs = 'LEVELEND'; shineSweep = 0;
    return;
  }
  startLevel(n);
};
// Land mid-scrub for screenshots: a DRAMATIC left-clean / right-grimy split
// (matches the satisfying_cleanup before/after CTR archetype) + live sparkles
// + an active combo. Clears roughly the LEFT ~55% so the dirty half stays
// clearly visible for max contrast.
window._setupForScreenshot = function(lv) {
  startLevel(lv && lv > 0 ? lv : 5);
  var b = objBox;
  var rows = 14, cols = 16;
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      if (c / cols > 0.55) continue;     // clean the LEFT ~55% of the object
      var x = b.x + (c + 0.5) / cols * b.size;
      var y = b.y + (r + 0.5) / rows * b.size;
      scrubSegment(x, y, x + 1, y + 1);
    }
  }
  // a fresh stroke at the dirty boundary to leave live sparkles + combo + cursor
  for (var i = 0; i < 12; i++) {
    var x1 = b.x + b.size * (0.42 + (i % 2) * 0.04);
    var y1 = b.y + b.size * (0.22 + i * 0.045);
    scrubSegment(x1, y1, x1 + b.size * 0.05, y1 + b.size * 0.01);
  }
  lastPt = { x: b.x + b.size * 0.50, y: b.y + b.size * 0.46 };
  scrubbing = true;
  gs = 'PLAYING';
};

// ── EXPOSE STATE (post-build-tester / DESIGN.md cross-check) ─────────────
// Every named tunable + progression var in DESIGN.md is surfaced here.
GF.exposeState(function() {
  return {
    gs: gs,
    level: level,
    bestLevel: bestLevel,
    coins: coins,
    cleanPct: cleanPct,
    quota: quota,
    scrubEnergy: scrubEnergy,
    scrubEnergyMax: scrubEnergyMax,
    brushRadius: brushRadius,
    polishBonus: polishBonus,
    combo: combo,
    bestCombo: bestCombo,
    brushUpgradeLvl: brushUpgradeLvl,
    tankUpgradeLvl: tankUpgradeLvl,
    polishUpgradeLvl: polishUpgradeLvl,
    GRIME_LAYERS: GRIME_LAYERS,
    BRUSH_RADIUS: BRUSH_RADIUS,
    SCRUB_ENERGY_MAX: SCRUB_ENERGY_MAX,
    ENERGY_PER_STROKE: ENERGY_PER_STROKE,
    REVEAL_REFILL: REVEAL_REFILL,
    CLEAN_QUOTA: CLEAN_QUOTA,
    COMBO_WINDOW_SEC: COMBO_WINDOW_SEC,
    POLISH_BONUS: POLISH_BONUS,
    COINS_PER_REVEAL: COINS_PER_REVEAL,
    levels: LEVELS.length,
  };
});

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'scrub_master',
  onReady: function() {
    loadSeen();
    GF.persist('scrub_master_run_v1',
      function() {
        return { gs: gs, level: level, bestLevel: bestLevel, coins: coins,
                 brushUpgradeLvl: brushUpgradeLvl, tankUpgradeLvl: tankUpgradeLvl,
                 polishUpgradeLvl: polishUpgradeLvl };
      },
      function(s) {
        if (!s) return;
        level = s.level || 1;
        bestLevel = s.bestLevel || 1;
        coins = s.coins || 0;
        brushUpgradeLvl = s.brushUpgradeLvl || 0;
        tankUpgradeLvl = s.tankUpgradeLvl || 0;
        polishUpgradeLvl = s.polishUpgradeLvl || 0;
        // never resume into live PLAYING (mask isn't rebuilt) — bounce to a
        // safe screen so a refresh can't strand the player mid-scrub.
        gs = (s.gs === 'SHOP') ? 'SHOP' : 'MENU';
      }
    );
    layoutObject();
    window.addEventListener('resize', layoutObject);
    window.addEventListener('orientationchange', function(){ setTimeout(layoutObject, 80); });
  },
  onUpdate: update,
  onDraw: draw,
});

// ── YANDEX MUST-HAVES (kept from template) ───────────────────────────────
// 1. All UI text via GF.t()/STRINGS (en+ru). 2. Run state persisted via
// GF.persist + GF.saveRun. 3. Fullscreen-exit resize handled by gf-lib.
// 4. No ads auto-fire — this v1 ships with no ad calls; any future ad must
//    fire only inside a user button-click handler (CONTINUE/RETRY/NEXT).

})();
</script>
