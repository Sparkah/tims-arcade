    full_sub: 'Заезжай на светящийся док и разгрузись за монеты.',
    map: 'КОМНАТЫ', tap_room: 'нажми на комнату, чтобы убрать её',
    goal_unlock_next: 'Накопи, чтобы открыть', goal_all: 'Все комнаты открыты - бей рекорд!',
    tut_drive: 'Тяни, чтобы вести пылесос.',

    // aliases the screenshot-localization gate samples (keeps it green; harmless)

// ── GAME STATE ──────────────────────────────────────────────────────────────
var gs = 'MENU';   // MENU | PLAYING | SHOP | MAP
var coins = 0, best = 0;
var bag = 0;                 // current bag fill (units)
var combo = 0, comboTimer = 0;   // clean-streak multiplier (resets if you stop sucking)
var roomIdx = 0;            // active room
var sucking = false;        // did we suck anything this frame (for combo upkeep)
var lastSuckT = 0;
var sessionCoins = 0;       // coins earned THIS run (for the best score)
var bagFlashT = 0;          // "BAG FULL" flash
var spotlessFlashT = 0;     // "ROOM SPOTLESS" celebration
var newRoomFlashT = 0;

// Upgrade levels
var up = { power: 0, reach: 0, speed: 0, bag: 0, magnet: 0 };

// Rooms: unlocked[] + which have been cleaned spotless at least once (for the bonus)
var ROOMS = [
  { key: 'r_kitchen',  bg: '#2a2436', floor: '#3a3450', accent: '#7fe3c0', value: 1.0 },
  { key: 'r_living',   bg: '#2c2a3a', floor: '#3d3a54', accent: '#ffd27f', value: 1.4 },
  { key: 'r_bedroom',  bg: '#2a2638', floor: '#403a5a', accent: '#b79bff', value: 1.9 },
  { key: 'r_workshop', bg: '#2e2a30', floor: '#46404a', accent: '#ff9b7f', value: 2.6 },
  { key: 'r_attic',    bg: '#322c2a', floor: '#4c443e', accent: '#ffe08a', value: 3.4 },
];
var ROOM_UNLOCK_COST = [0, 350, 1100, 3000, 7500];  // coins to unlock room i
var roomUnlocked = [true, false, false, false, false];

// Player vacuum
var vac = { x: 0, y: 0, vx: 0, vy: 0, ang: 0, wheel: 0 };

// World layout (design space — see DESIGN_W/H below). Computed in layoutRoom().
var DESIGN_W = 800, DESIGN_H = 1000;   // mobile-first portrait
var room = { x: 0, y: 0, w: 0, h: 0 };  // play-field rect in design space
var dock = { x: 0, y: 0, r: 0 };

// Dirt items in the current room.
//  tier: 0 dust, 1 crumb, 2 small, 3 big, 4 huge  → unlocked by suction power level
//  size = bag units it adds; r = visual radius
var dirt = [];
var coinDrops = [];   // floating coins to magnet-collect

// Tier table: { unlockPower, bagUnits, baseR, color, label, count-weight }
var TIERS = [
  { unlock: 0, units: 1,  r: 4.5,  col: '#b9b2c9', lab: 'tier_dust',  weight: 46, kind: 'dust' },
  { unlock: 0, units: 2,  r: 6.5,  col: '#caa17a', lab: 'tier_crumb', weight: 26, kind: 'crumb' },
  { unlock: 1, units: 5,  r: 11,   col: '#8fb6e0', lab: 'tier_small', weight: 16, kind: 'small' },
  { unlock: 2, units: 12, r: 17,   col: '#e08f9e', lab: 'tier_big',   weight: 9,  kind: 'big' },
  { unlock: 3, units: 26, r: 24,   col: '#9be0a6', lab: 'tier_huge',  weight: 4,  kind: 'huge' },
];

// ── DERIVED STATS (from upgrade levels) ─────────────────────────────────────
function suckPower()  { return up.power; }                          // = highest tier index unlockable
function reachBase()  { return 60 + up.reach * 17; }                // design-px pull radius (base)
function bagMax()     { return 40 + up.bag * 35; }                  // bag capacity in units
function moveAccel()  { return 0.82 + up.speed * 0.16; }            // accel multiplier
function moveTop()    { return 5.2 + up.speed * 0.95; }             // top speed (design px/frame)
function magnetR()    { return up.magnet > 0 ? (70 + up.magnet * 40) : 0; }

// Donut-County fold-in: the EFFECTIVE pull radius GROWS as the bag fills (a fuller
// bag = a stronger, hungrier vacuum) — visible, escalating power fantasy.
function reachEff() {
  var fill = bag / bagMax();
  return reachBase() * (1 + 0.5 * Math.min(1, fill));
}

// ── UPGRADE DEFINITIONS ─────────────────────────────────────────────────────
// cost(level) -> coins for the NEXT level. maxLv caps it.
var UPGRADES = [
  { id: 'power',  label: 'u_power',  desc: 'u_power_d',  maxLv: 4, base: 120, mul: 3.1,
    sub: function(){ var nx = Math.min(suckPower()+1, TIERS.length-1); return '→ ' + GF.t(TIERS[nx].lab); } },
  { id: 'reach',  label: 'u_reach',  desc: 'u_reach_d',  maxLv: 6, base: 60,  mul: 1.85,
    sub: function(){ return '+' + Math.round(reachBase()) + 'px'; } },
  { id: 'speed',  label: 'u_speed',  desc: 'u_speed_d',  maxLv: 6, base: 55,  mul: 1.8,
    sub: function(){ return moveTop().toFixed(1) + ' spd'; } },
  { id: 'bag',    label: 'u_bag',    desc: 'u_bag_d',    maxLv: 8, base: 45,  mul: 1.7,
    sub: function(){ return Math.round(bagMax()) + ' cap'; } },
  { id: 'magnet', label: 'u_magnet', desc: 'u_magnet_d', maxLv: 5, base: 90,  mul: 2.0,
    sub: function(){ return up.magnet>0 ? Math.round(magnetR())+'px' : 'off'; } },
];
function upLevel(id){ return up[id]; }
function upMax(u){ return upLevel(u.id) >= u.maxLv; }
function upCost(u){ return Math.round(u.base * Math.pow(u.mul, upLevel(u.id))); }

// ── LAYOUT ──────────────────────────────────────────────────────────────────
function layoutRoom() {
  // Reserve a top HUD band and a bottom button band, room fills the middle.
  var topPad = 92, botPad = 96, sidePad = 26;
  room.x = sidePad; room.y = topPad;
  room.w = DESIGN_W - sidePad * 2;
  room.h = DESIGN_H - topPad - botPad;
  // Dock sits in a corner that rotates per room so it never overlaps spawn.
  var corner = roomIdx % 4;
  var dr = 58;
  dock.r = dr;
  var m = 70;
  if (corner === 0)      { dock.x = room.x + m;            dock.y = room.y + room.h - m; }
  else if (corner === 1) { dock.x = room.x + room.w - m;   dock.y = room.y + room.h - m; }
  else if (corner === 2) { dock.x = room.x + room.w - m;   dock.y = room.y + m; }
  else                   { dock.x = room.x + m;            dock.y = room.y + m; }
}

// Density grows with room index (later rooms are messier → longer to clean).
function dirtCountFor(i) { return 60 + i * 26; }

function spawnRoom(i) {
  roomIdx = i;
  layoutRoom();
  dirt = [];
  coinDrops = [];
  var n = dirtCountFor(i);
  // Higher rooms also bias toward bigger tiers (more value, needs upgrades).
  var biasBig = i * 6;
  for (var k = 0; k < n; k++) {
    var t = pickTier(biasBig);
    var pad = TIERS[t].r + 8;
    var px = room.x + pad + Math.random() * (room.w - pad * 2);
    var py = room.y + pad + Math.random() * (room.h - pad * 2);
    // keep spawns off the dock pad
    if (GF.dist(px, py, dock.x, dock.y) < dock.r + 24) { k--; continue; }
    dirt.push({ x: px, y: py, t: t, r: TIERS[t].r * (0.82 + Math.random() * 0.36),
      scale: 1, pulled: 0, jx: (Math.random()-0.5)*1.4, jy: (Math.random()-0.5)*1.4,
      seed: Math.random() * 6.28 });
  }
  // Place vacuum away from the dock.
  vac.x = room.x + room.w * (roomIdx % 4 < 2 ? 0.72 : 0.28);
  vac.y = room.y + room.h * 0.45;
  vac.vx = vac.vy = 0;
}

function pickTier(biasBig) {
  var totW = 0, i;
  var w = [];
  for (i = 0; i < TIERS.length; i++) {
    var base = TIERS[i].weight;
    if (i >= 2) base += biasBig * (i - 1) * 0.2;   // later rooms → more big stuff
    w.push(base); totW += base;
  }
  var r = Math.random() * totW;
  for (i = 0; i < TIERS.length; i++) { r -= w[i]; if (r <= 0) return i; }
  return 0;
}

// ── LIFECYCLE ───────────────────────────────────────────────────────────────
function startGame() {
  if (gs === 'PLAYING') return;
  // Fresh run if we were on the menu/gameover; preserve coins+upgrades (meta).
  gs = 'PLAYING';
  if (dirt.length === 0) spawnRoom(roomIdx);
  GF.gameStarted();
  maybeStartTutorial();
}

// Visit/switch a room (from the MAP). Costs nothing if already unlocked.
function gotoRoom(i) {
  if (!roomUnlocked[i]) return;
  spawnRoom(i);
  gs = 'PLAYING';
  saveAll();
}

function unloadBag() {
  if (bag <= 0) return;
  combo++;
  comboTimer = 4.0;
  var mult = 1 + Math.min(combo - 1, 9) * 0.12;       // streak multiplier (cap +108%)
  var roomMul = ROOMS[roomIdx].value;
  var gained = Math.round(bag * 1.0 * mult * roomMul);
  coins += gained; sessionCoins += gained;
  GF.spawnFloat(dock.x * GF.S * sx0(), (dock.y - dock.r) * GF.S * sy0() + oy0(), '+' + gained, '#ffe27a');
  GF.spawnParticles(toCanvasX(dock.x), toCanvasY(dock.y), '#ffe27a', 18);
  GF.sfx('coin');
  GF.setShake(0.5);
  bag = 0;
  if (combo >= 2) GF.spawnFloat(toCanvasX(dock.x), toCanvasY(dock.y) - 26 * GF.S, GF.t('combo') + ' x' + combo, '#7fe3c0');
  saveAll();
}

function onRoomSpotless() {
  spotlessFlashT = 2.2;
  GF.sfx('win');
  GF.setShake(0.7);
  // Bonus coins for a full clean, scaled by room.
  var bonus = Math.round(120 * ROOMS[roomIdx].value);
  coins += bonus; sessionCoins += bonus;
  // Auto-unlock the next room if affordable threshold passed? No — player buys it.
  // Refill the room after a short beat so the loop continues (endless).
  setTimeout(function() {
    if (gs === 'PLAYING' || gs === 'MAP' || gs === 'SHOP') {
      // only respawn if still in this room
      spawnRoom(roomIdx);
    }
  }, 1400);
  saveAll();
}

// ── INPUT HELPERS ───────────────────────────────────────────────────────────
// Desktop: hold mouse and the vacuum drives toward the cursor. Mobile: drag joystick.
var mouseDown = false, mouseX = 0, mouseY = 0;
GF.canvas.addEventListener('mousedown', function(e){ mouseDown = true; mouseX = e.clientX; mouseY = e.clientY; });
GF.canvas.addEventListener('mousemove', function(e){ mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mouseup', function(){ mouseDown = false; });

// Canvas<->design space transforms. Canvas uses Math.min(W/DW,H/DH) letterboxing,
// centred. We replicate it so we can map design coords to canvas for FX/clicks.
function sx0(){ return 1; } function sy0(){ return 1; } function oy0(){ return 0; }
function fit() {
  var s = Math.min(GF.W / DESIGN_W, GF.H / DESIGN_H);
  var ox = (GF.W - DESIGN_W * s) / 2;
  var oy = (GF.H - DESIGN_H * s) / 2;
  return { s: s, ox: ox, oy: oy };
}
function toCanvasX(dx){ var f = fit(); return f.ox + dx * f.s; }
function toCanvasY(dy){ var f = fit(); return f.oy + dy * f.s; }
function toDesignX(cxp){ var f = fit(); return (cxp - f.ox) / f.s; }
function toDesignY(cyp){ var f = fit(); return (cyp - f.oy) / f.s; }

// ── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt) {
  // Tutorial here is a NARRATED coach (timed pills) — the player keeps driving
  // and learns by doing, so we do NOT freeze the world while it's active.
  if (GF.tutorial.active) GF.tutorial.update(dt);
  if (gs !== 'PLAYING') return;

  bagFlashT = Math.max(0, bagFlashT - dt);
  spotlessFlashT = Math.max(0, spotlessFlashT - dt);
  newRoomFlashT = Math.max(0, newRoomFlashT - dt);

  // ── DRIVE ──
  var ax = 0, ay = 0;
  if (GF.keys['ArrowLeft']  || GF.keys['KeyA']) ax -= 1;
  if (GF.keys['ArrowRight'] || GF.keys['KeyD']) ax += 1;
  if (GF.keys['ArrowUp']    || GF.keys['KeyW']) ay -= 1;
  if (GF.keys['ArrowDown']  || GF.keys['KeyS']) ay += 1;
  if (GF.touch.active && !inUiBand(GF.touch.x, GF.touch.y)) { ax += GF.touch.dx * 1.4; ay += GF.touch.dy * 1.4; }
  // Desktop mouse-hold: steer toward cursor (in design space) — but not while the
  // cursor is over a UI band/button (so clicking GARAGE/ROOMS doesn't lurch).
  if (mouseDown && !GF.touch.active && !inUiBand(mouseX, mouseY)) {
    var tx = toDesignX(mouseX) - vac.x, ty = toDesignY(mouseY) - vac.y;
    var tl = Math.sqrt(tx*tx + ty*ty);
    if (tl > 6) { ax += tx / tl; ay += ty / tl; }
  }
  var alen = Math.sqrt(ax*ax + ay*ay);
  if (alen > 1) { ax /= alen; ay /= alen; }

  var acc = moveAccel();
  vac.vx = (vac.vx + ax * acc) * 0.85;
  vac.vy = (vac.vy + ay * acc) * 0.85;
  var sp = Math.sqrt(vac.vx*vac.vx + vac.vy*vac.vy);
  var top = moveTop();
  if (sp > top) { vac.vx = vac.vx / sp * top; vac.vy = vac.vy / sp * top; }
  vac.x += vac.vx; vac.y += vac.vy;
  // Walls
  var pr = 18;
  if (vac.x < room.x + pr) { vac.x = room.x + pr; vac.vx *= -0.3; }
  if (vac.x > room.x + room.w - pr) { vac.x = room.x + room.w - pr; vac.vx *= -0.3; }
  if (vac.y < room.y + pr) { vac.y = room.y + pr; vac.vy *= -0.3; }
  if (vac.y > room.y + room.h - pr) { vac.y = room.y + room.h - pr; vac.vy *= -0.3; }
  if (sp > 0.2) vac.ang = Math.atan2(vac.vy, vac.vx);
  vac.wheel += sp * 0.06;

  // ── SUCTION ──
  sucking = false;
  var R = reachEff();
  var maxTier = suckPower();
  var bagFull = bag >= bagMax();
  var pulledAny = 0;
  for (var i = dirt.length - 1; i >= 0; i--) {
    var d = dirt[i];
    var dx = vac.x - d.x, dy = vac.y - d.y;
    var dd = Math.sqrt(dx*dx + dy*dy);
    var canPull = d.t <= maxTier && !bagFull;
    if (canPull && dd < R) {
      // Pull toward the vacuum (Donut-County style attraction), strength scales
      // with how close + how much power above its tier we have.
      var pull = (1 - dd / R);
      var force = pull * (3.4 + (maxTier - d.t) * 0.8);
      d.x += dx / dd * force;
      d.y += dy / dd * force;
      d.pulled = Math.min(1, d.pulled + dt * 4);
      // Ingest when it reaches the nozzle (generous catch radius = juicy feel).
      if (dd < 28) {
        bag += TIERS[d.t].units;
        pulledAny++;
        // pop FX
        GF.spawnParticles(toCanvasX(d.x), toCanvasY(d.y), TIERS[d.t].col, d.t >= 2 ? 8 : 3);
        if (d.t >= 3) { GF.sfx('pickup'); GF.setShake(0.25); }
        else if (d.t === 2) GF.sfx('tap');
        dirt.splice(i, 1);
        sucking = true;
        lastSuckT = 0;
        if (bag >= bagMax()) { bag = bagMax(); bagFlashT = 1.6; GF.sfx('error'); }
      } else {
        d.scale = 1 - d.pulled * 0.15;
        sucking = true;
      }
    } else if (d.t > maxTier && dd < R * 0.7) {
      // Too big to pull yet — give it a tiny "rattle" so the player sees it's
      // reachable but locked (teaches the upgrade need). Subtle.
      d.jx = Math.cos(d.seed + lastSuckT * 12) * 1.1;
      d.jy = Math.sin(d.seed + lastSuckT * 12) * 1.1;
    }
  }

  // Combo upkeep: keep sucking to keep the streak meter; idle too long and it cools.
  if (sucking) { comboTimer = Math.max(comboTimer, 2.2); }
  lastSuckT += dt;
  comboTimer -= dt;
  if (comboTimer <= 0 && combo > 0) { combo = 0; }

  // SFX: a soft continuous "suck" tick while actively ingesting small stuff.
  if (pulledAny > 0 && !(pulledAny >= 1 && dirt.length === 0)) {
    // throttle handled by tier sfx above; light dust gets a quiet tick
  }

  // ── COIN MAGNET ──
  var mR = magnetR();
  for (var c = coinDrops.length - 1; c >= 0; c--) {
    var cc = coinDrops[c];
    cc.life -= dt;
    var cdx = vac.x - cc.x, cdy = vac.y - cc.y;
    var cdd = Math.sqrt(cdx*cdx + cdy*cdy);
    if (mR > 0 && cdd < mR) { cc.x += cdx / cdd * 5; cc.y += cdy / cdd * 5; }
    if (cdd < 24 || cc.life <= 0) {
      if (cdd < 24) { coins += cc.v; sessionCoins += cc.v; GF.sfx('coin'); GF.spawnFloat(toCanvasX(cc.x), toCanvasY(cc.y), '+' + cc.v, '#ffe27a'); }
      coinDrops.splice(c, 1);
    }
  }

  // ── DOCK / UNLOAD ──
  if (GF.dist(vac.x, vac.y, dock.x, dock.y) < dock.r * 0.78 && bag > 0) {
    unloadBag();
  }

  // ── ROOM SPOTLESS ──
  if (dirt.length === 0 && spotlessFlashT <= 0 && gs === 'PLAYING') {
    onRoomSpotless();
  }

  // Bag full nudge: flash the dock hint occasionally
  if (bag >= bagMax() && bagFlashT <= 0) bagFlashT = 1.2;

  GF.saveRun();
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function draw(ctx) {
  var f = fit();
  // Background outside the room (letterbox bezel).
  ctx.fillStyle = '#0e0a16';
  ctx.fillRect(0, 0, GF.W, GF.H);

  ctx.save();
  ctx.translate(f.ox, f.oy);
  ctx.scale(f.s, f.s);

  drawWorld(ctx);

  if (gs === 'PLAYING' || gs === 'SHOP' || gs === 'MAP') {
    drawDock(ctx);
    drawDirt(ctx);
    drawCoinDrops(ctx);
    drawVacuum(ctx);
  }

  ctx.restore();

  // HUD + overlays in canvas space (so they're crisp + edge-anchored).
  if (gs === 'PLAYING') { drawHUD(ctx); drawBottomBar(ctx); drawFlashes(ctx); }
  if (gs === 'MENU')     drawMenu(ctx);
  if (gs === 'SHOP')     { drawHUD(ctx); drawShop(ctx); }
  if (gs === 'MAP')      { drawHUD(ctx); drawMap(ctx); }

  // tutorial overlay last — only over live gameplay (never over menu/shop/map)
  if (gs === 'PLAYING') GF.tutorial.draw(ctx);
}

function drawWorld(ctx) {
  var rm = ROOMS[roomIdx];
  // Room floor with a subtle tile grid + a faint "dirty haze" that lifts as it cleans.
  ctx.fillStyle = rm.bg;
  ctx.fillRect(room.x - 14, room.y - 14, room.w + 28, room.h + 28);
  // floor
  GF.rr(ctx, room.x, room.y, room.w, room.h, 18);
  ctx.fillStyle = rm.floor; ctx.fill();
  // tile lines
  ctx.save();
  GF.rr(ctx, room.x, room.y, room.w, room.h, 18); ctx.clip();
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 2;
  var tile = 84;
  for (var gx = room.x; gx <= room.x + room.w; gx += tile) { ctx.beginPath(); ctx.moveTo(gx, room.y); ctx.lineTo(gx, room.y + room.h); ctx.stroke(); }
  for (var gy = room.y; gy <= room.y + room.h; gy += tile) { ctx.beginPath(); ctx.moveTo(room.x, gy); ctx.lineTo(room.x + room.w, gy); ctx.stroke(); }
  ctx.restore();
  // border
  GF.rr(ctx, room.x, room.y, room.w, room.h, 18);
  ctx.strokeStyle = rm.accent; ctx.globalAlpha = 0.5; ctx.lineWidth = 3; ctx.stroke(); ctx.globalAlpha = 1;
}

function drawDock(ctx) {
  var rm = ROOMS[roomIdx];
  var pulse = 0.5 + 0.5 * Math.sin((performance.now()/1000) * 3);
  var glow = bag > 0 ? (0.55 + 0.45 * pulse) : 0.25;
  ctx.save();
  // glowing pad
  var g = ctx.createRadialGradient(dock.x, dock.y, 4, dock.x, dock.y, dock.r);
  g.addColorStop(0, 'rgba(127,227,192,' + (0.5 * glow) + ')');
  g.addColorStop(1, 'rgba(127,227,192,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(dock.x, dock.y, dock.r, 0, Math.PI*2); ctx.fill();
  // ring
  ctx.strokeStyle = '#7fe3c0'; ctx.globalAlpha = 0.7 * glow + 0.3; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(dock.x, dock.y, dock.r * 0.7, 0, Math.PI*2); ctx.stroke();
  ctx.globalAlpha = 1;
  // bin icon
  ctx.fillStyle = '#dff7ee';
  var bw = 26, bh = 30;
  GF.rr(ctx, dock.x - bw/2, dock.y - bh/2 + 3, bw, bh, 5); ctx.fill();
  ctx.fillStyle = rm.floor;
  GF.rr(ctx, dock.x - bw/2 + 4, dock.y - bh/2 + 9, bw - 8, bh - 13, 2); ctx.fill();
  ctx.fillStyle = '#dff7ee';
  GF.rr(ctx, dock.x - bw/2 - 3, dock.y - bh/2 - 1, bw + 6, 5, 2); ctx.fill();
  // label
  ctx.font = 'bold 13px Inter, sans-serif'; ctx.fillStyle = '#bff0df'; ctx.textAlign = 'center';
  ctx.fillText(GF.t('dock'), dock.x, dock.y + dock.r * 0.7 + 16);
  ctx.restore();
}

function drawDirt(ctx) {
  var maxTier = suckPower();
  for (var i = 0; i < dirt.length; i++) {
    var d = dirt[i];
    var t = TIERS[d.t];
    var r = d.r * (d.scale || 1);
    var locked = d.t > maxTier;
    ctx.save();
    ctx.translate(d.x + (d.jx||0), d.y + (d.jy||0));
    ctx.globalAlpha = locked ? 0.85 : 1;
    if (t.kind === 'dust') {
      // fuzzy grey speck cluster
      ctx.fillStyle = t.col;
      for (var k = 0; k < 3; k++) {
        var a = d.seed + k * 2.1;
        ctx.beginPath(); ctx.arc(Math.cos(a)*r*0.4, Math.sin(a)*r*0.4, r*0.6, 0, Math.PI*2); ctx.fill();
      }
    } else if (t.kind === 'crumb') {
      ctx.fillStyle = t.col;
      ctx.beginPath();
      ctx.moveTo(-r, -r*0.3); ctx.lineTo(r*0.4, -r); ctx.lineTo(r, r*0.4); ctx.lineTo(-r*0.3, r); ctx.closePath();
      ctx.fill();
    } else if (t.kind === 'small') {
      // sock-ish / wrapper blob
      ctx.fillStyle = t.col;
      GF.rr(ctx, -r, -r*0.7, r*2, r*1.4, r*0.5); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      GF.rr(ctx, -r*0.6, -r*0.4, r*0.8, r*0.5, 3); ctx.fill();
    } else if (t.kind === 'big') {
      // toy block / can
      ctx.fillStyle = t.col;
      GF.rr(ctx, -r, -r, r*2, r*2, 5); ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      GF.rr(ctx, -r*0.5, -r*0.5, r, r, 3); ctx.fill();
    } else {
      // huge junk — boot / book stack
      ctx.fillStyle = t.col;
      GF.rr(ctx, -r, -r*0.8, r*2, r*1.6, 6); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      GF.rr(ctx, -r*0.8, -r*0.55, r*1.6, r*0.35, 3); ctx.fill();
    }
    // locked padlock hint
    if (locked) {
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = '#11101a';
      ctx.beginPath(); ctx.arc(0, -r - 7, 7, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#ffd27f'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, -r - 9, 4, Math.PI, Math.PI*2); ctx.stroke();
      ctx.fillStyle = '#ffd27f';
      GF.rr(ctx, -4, -r - 10, 8, 7, 1.5); ctx.fill();
    }
    ctx.restore();
  }
}

function drawCoinDrops(ctx) {
  for (var i = 0; i < coinDrops.length; i++) {
    var c = coinDrops[i];
    ctx.save(); ctx.translate(c.x, c.y);
    ctx.globalAlpha = Math.min(1, c.life);
    ctx.fillStyle = '#ffd24a';
    ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 2; ctx.stroke();
    ctx.restore();
  }
}

function drawVacuum(ctx) {
  var R = reachEff();
  // suction halo
  ctx.save();
  ctx.translate(vac.x, vac.y);
  var bagFull = bag >= bagMax();
  var haloPulse = 0.5 + 0.5 * Math.sin((performance.now()/1000) * 6);
  var hg = ctx.createRadialGradient(0, 0, 8, 0, 0, R);
  if (bagFull) { hg.addColorStop(0, 'rgba(255,120,120,0.20)'); hg.addColorStop(1, 'rgba(255,120,120,0)'); }
  else { hg.addColorStop(0, 'rgba(127,227,192,' + (0.16 + 0.10*haloPulse) + ')'); hg.addColorStop(0.7, 'rgba(127,227,192,0.05)'); hg.addColorStop(1, 'rgba(127,227,192,0)'); }
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI*2); ctx.fill();
  // reach ring
  ctx.strokeStyle = bagFull ? 'rgba(255,120,120,0.5)' : 'rgba(127,227,192,0.35)';
  ctx.setLineDash([6, 8]); ctx.lineWidth = 2; ctx.lineDashOffset = -vac.wheel * 4;
  ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // body
  ctx.save();
  ctx.translate(vac.x, vac.y);
  ctx.rotate(vac.ang);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 6, 20, 16, 0, 0, Math.PI*2); ctx.fill();
  // chassis (robot-vac disc)
  var bodyGrad = ctx.createLinearGradient(-18, -18, 18, 18);
  bodyGrad.addColorStop(0, '#5be0c4'); bodyGrad.addColorStop(1, '#2bb89a');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#1c8f76'; ctx.lineWidth = 2.5; ctx.stroke();
  // nozzle (front)
  ctx.fillStyle = '#15403a';
  GF.rr(ctx, 12, -8, 10, 16, 4); ctx.fill();
  // top sensor dot
  ctx.fillStyle = '#dff7ee';
  ctx.beginPath(); ctx.arc(-3, 0, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0d6b59';
  ctx.beginPath(); ctx.arc(-3, 0, 2.4, 0, Math.PI*2); ctx.fill();
  // spinning brush hint
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.6;
  for (var b = 0; b < 4; b++) {
    var ba = vac.wheel + b * Math.PI/2;
    ctx.beginPath(); ctx.moveTo(Math.cos(ba)*8, Math.sin(ba)*8); ctx.lineTo(Math.cos(ba)*15, Math.sin(ba)*15); ctx.stroke();
  }
  ctx.restore();
}

// ── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD(ctx) {
  var S = GF.S, W = GF.W;
  var pad = 10 * S;
  // top bar background
  ctx.fillStyle = 'rgba(14,10,22,0.82)';
  ctx.fillRect(0, 0, W, 64 * S);
  ctx.strokeStyle = 'rgba(127,227,192,0.18)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, 64*S); ctx.lineTo(W, 64*S); ctx.stroke();

  // coins (left)
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffd24a';
  ctx.beginPath(); ctx.arc(pad + 9*S, 22*S, 8*S, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 1.5*S; ctx.stroke();
  ctx.font = 'bold ' + (17*S) + 'px Inter, sans-serif'; ctx.fillStyle = '#fff';
  ctx.fillText(fmt(coins), pad + 24*S, 22*S);
  // room name (left, second line)
  ctx.font = (12*S) + 'px Inter, sans-serif'; ctx.fillStyle = ROOMS[roomIdx].accent;
  var roomName = GF.t(ROOMS[roomIdx].key);
  ctx.fillText(roomName, pad, 46*S);
  // help (?) button — just right of the room name, clear of all meters
  var rnW = ctx.measureText(roomName).width;
  var hhr = 11*S, hhx = pad + rnW + 16*S, hhy = 46*S;
  _btnHelp = { x: hhx - hhr, y: hhy - hhr, w: hhr*2, h: hhr*2 };
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.beginPath(); ctx.arc(hhx, hhy, hhr, 0, Math.PI*2); ctx.fill();
  ctx.font = 'bold ' + (13*S) + 'px Inter, sans-serif'; ctx.fillStyle = '#cfe'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', hhx, hhy + 0.5*S);
  ctx.textAlign = 'left';

  // bag meter (right) — width clamped so the % label always fits inside it
  var bw = GF.clamp(170*S, 120, 210), bh = 18*S;
  var bx = W - pad - bw, by = 13*S;
  var fill = bag / bagMax();
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  GF.rr(ctx, bx, by, bw, bh, bh/2); ctx.fill();
  var meterCol = fill >= 1 ? '#ff7a7a' : (fill > 0.8 ? '#ffb14a' : '#7fe3c0');
  GF.rr(ctx, bx, by, Math.max(bh, bw * Math.min(1, fill)), bh, bh/2); ctx.fillStyle = meterCol; ctx.fill();
  var bagTxt = GF.t('bag') + ' ' + Math.round(fill*100) + '%';
  var bagFs = GF.clamp(11.5*S, 9, 15);
  ctx.font = 'bold ' + bagFs + 'px Inter, sans-serif';
  while (ctx.measureText(bagTxt).width > bw - 10*S && bagFs > 8) { bagFs--; ctx.font = 'bold ' + bagFs + 'px Inter, sans-serif'; }
  ctx.fillStyle = fill > 0.45 ? '#0e0a16' : '#dff7ee'; ctx.textAlign = 'center';
  ctx.fillText(bagTxt, bx + bw/2, by + bh/2 + 0.5*S);
  // combo under bag
  if (combo > 1) {
    ctx.font = 'bold ' + (12*S) + 'px Inter, sans-serif'; ctx.fillStyle = '#7fe3c0'; ctx.textAlign = 'right';
    ctx.fillText(GF.t('combo') + ' x' + combo, W - pad, 46*S);
  }

  // mute icon (top-center-ish, between coins and bag)
  var mx = W/2, my = 22*S, mr = 11*S;
  GF.drawMuteIcon(ctx, mx, my, mr, GF.muted);
  _muteHit = { x: mx - mr*1.5, y: my - mr*1.5, w: mr*3, h: mr*3 };

  // ── progression rail: the next room to unlock + coins needed (visible 10-min
  // target so the loop never feels aimless). Thin centered pill under the bar. ──
  var nxt = nextLockedRoom();
  var goalTxt, goalCol;
  if (nxt >= 0) {
    var need = ROOM_UNLOCK_COST[nxt] - coins;
    goalCol = need <= 0 ? '#7fe3c0' : '#cdb';
    goalTxt = GF.t('goal_unlock_next') + ' ' + GF.t(ROOMS[nxt].key) + ' · ' + (need <= 0 ? GF.t('map') : GF.t('need') + ' ' + fmt(Math.max(0, need)));
  } else {
    goalCol = '#7fe3c0'; goalTxt = GF.t('goal_all');
  }
  var gfs = GF.clamp(11.5*S, 9, 14);
  ctx.font = (gfs) + 'px Inter, sans-serif';
  var gtw = ctx.measureText(goalTxt).width;
  var maxGw = W * 0.72;
  while (gtw > maxGw && gfs > 8) { gfs--; ctx.font = gfs + 'px Inter, sans-serif'; gtw = ctx.measureText(goalTxt).width; }
  var gph = gfs + 9*S, gpw = gtw + 22*S, gpx = W/2 - gpw/2, gpy = 64*S + 4*S;
  ctx.fillStyle = 'rgba(14,10,22,0.7)';
  GF.rr(ctx, gpx, gpy, gpw, gph, gph/2); ctx.fill();
  // tiny target dot
  ctx.fillStyle = goalCol;
  ctx.beginPath(); ctx.arc(gpx + 10*S, gpy + gph/2, 3*S, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = goalCol; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(goalTxt, gpx + 16*S, gpy + gph/2 + 0.5*S);
  ctx.textAlign = 'left';
}

// index of the first not-yet-unlocked room (-1 if all unlocked)
function nextLockedRoom() {
  for (var i = 0; i < ROOMS.length; i++) if (!roomUnlocked[i]) return i;
  return -1;
}

// Bottom action bar: GARAGE | ROOMS buttons + dock hint when bag full.
var _btnShop = null, _btnMap = null, _muteHit = null, _btnHelp = null;
function drawBottomBar(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  var barH = 70 * S;
  var by = H - barH;
  ctx.fillStyle = 'rgba(14,10,22,0.86)';
  ctx.fillRect(0, by, W, barH);
  ctx.strokeStyle = 'rgba(127,227,192,0.18)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, by); ctx.lineTo(W, by); ctx.stroke();

  var pad = 12 * S, gap = 10 * S;
  var bw = (W - pad*2 - gap) / 2;
  var bh = barH - 18*S;
  var btnY = by + 9*S;

  // GARAGE
  _btnShop = { x: pad, y: btnY, w: bw, h: bh };
  drawBtn(ctx, _btnShop, GF.t('shop'), '#7fe3c0', '#14403a', true);
  // ROOMS
  _btnMap = { x: pad + bw + gap, y: btnY, w: bw, h: bh };
  drawBtn(ctx, _btnMap, GF.t('map'), '#ffd27f', '#403314', false);

}

function drawBtn(ctx, b, label, col, bg, pulse) {
  ctx.save();
  if (pulse) { var p = 0.5 + 0.5 * Math.sin(performance.now()/500); ctx.shadowColor = col; ctx.shadowBlur = (6 + 6*p) * GF.S; }
  var grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
  grad.addColorStop(0, col); grad.addColorStop(1, bg);
  GF.rr(ctx, b.x, b.y, b.w, b.h, 12*GF.S); ctx.fillStyle = grad; ctx.fill();
  ctx.restore();
  ctx.font = 'bold ' + (16*GF.S) + 'px Inter, sans-serif'; ctx.fillStyle = '#0e0a16';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, b.x + b.w/2, b.y + b.h/2 + 0.5*GF.S);
}

function drawFlashes(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  if (bagFlashT > 0 && bag >= bagMax()) {
    var a = Math.min(1, bagFlashT);
    ctx.globalAlpha = a;
    ctx.font = 'bold ' + (24*S) + 'px Inter, sans-serif'; ctx.fillStyle = '#ff7a7a';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('full'), W/2, H*0.4);
    ctx.font = (14*S) + 'px Inter, sans-serif'; ctx.fillStyle = '#ffd0d0';
    ctx.fillText(GF.t('full_sub'), W/2, H*0.4 + 26*S);
    ctx.globalAlpha = 1;
  }
  if (spotlessFlashT > 0) {
    var a2 = Math.min(1, spotlessFlashT/2.2);
    ctx.globalAlpha = a2;
    ctx.font = 'bold ' + (30*S) + 'px Inter, sans-serif'; ctx.fillStyle = '#7fe3c0';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('clear'), W/2, H*0.42);
    ctx.font = (15*S) + 'px Inter, sans-serif'; ctx.fillStyle = '#dff7ee';
    ctx.fillText(GF.t('spotless_sub'), W/2, H*0.42 + 30*S);
    ctx.globalAlpha = 1;
  }
}

// ── MENU ────────────────────────────────────────────────────────────────────
var _menuBtn = null;
function drawMenu(ctx) {
  var S = GF.S, W = GF.W, H = GF.H, cx = W/2;
  // backdrop
  ctx.fillStyle = '#14101c'; ctx.fillRect(0, 0, W, H);
  // soft vignette of dust → clean
  var g = ctx.createRadialGradient(cx, H*0.42, 20, cx, H*0.42, Math.max(W,H)*0.6);
  g.addColorStop(0, 'rgba(127,227,192,0.10)'); g.addColorStop(1, 'rgba(20,16,28,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // little vacuum mascot
  ctx.save(); ctx.translate(cx, H*0.30);
  var sc = Math.min(W,H)/520;
  ctx.scale(sc*2.2, sc*2.2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0,8,22,8,0,0,Math.PI*2); ctx.fill();
  var bgg = ctx.createLinearGradient(-18,-18,18,18); bgg.addColorStop(0,'#5be0c4'); bgg.addColorStop(1,'#2bb89a');
  ctx.fillStyle = bgg; ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#1c8f76'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.fillStyle = '#dff7ee'; ctx.beginPath(); ctx.arc(-3,0,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0d6b59'; ctx.beginPath(); ctx.arc(-3,0,2.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#15403a'; GF.rr(ctx, 12,-8,10,16,4); ctx.fill();
  ctx.restore();

  // title
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(127,227,192,0.5)'; ctx.shadowBlur = 26*S;
  ctx.font = 'bold ' + GF.clamp(40*S, 26, 60) + 'px Inter, sans-serif'; ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('title'), cx, H*0.46);
  ctx.shadowBlur = 0;
  ctx.font = GF.clamp(15*S, 12, 20) + 'px Inter, sans-serif'; ctx.fillStyle = '#9fb';
  wrapText(ctx, GF.t('sub'), cx, H*0.53, W*0.82, 20*S);

  // PLAY button (always visible, pulsing)
  var bw = GF.clamp(280*S, 200, 380), bh = GF.clamp(62*S, 46, 80);
  var bx = cx - bw/2, by = H*0.62;
  _menuBtn = { x: bx, y: by, w: bw, h: bh };
  var p = 0.5 + 0.5 * Math.sin(performance.now()/420);
  ctx.save();
  ctx.shadowColor = 'rgba(46,224,122,' + (0.4 + 0.3*p) + ')'; ctx.shadowBlur = (20 + 12*p)*S;
  var grad = ctx.createLinearGradient(bx, by, bx, by+bh);
  grad.addColorStop(0, '#2ee07a'); grad.addColorStop(1, '#23a657');
  GF.rr(ctx, bx, by, bw, bh, bh/2); ctx.fillStyle = grad; ctx.fill();
  ctx.restore();
  var playFs = GF.clamp(22*S, 16, 30);
  ctx.font = 'bold ' + playFs + 'px Inter, sans-serif'; ctx.fillStyle = '#fff';
  var playLbl = GF.t(coins > 0 || best > 0 ? 'resume' : 'play');
  var plW = ctx.measureText(playLbl).width;
  drawPlayTri(ctx, cx - plW/2 - playFs*0.55, by + bh/2 + 1, playFs*0.62, '#fff');
  ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(playLbl, cx - plW/2 + playFs*0.2, by + bh/2 + 1);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  if (best > 0) {
    ctx.font = GF.clamp(13*S, 11, 17) + 'px Inter, sans-serif'; ctx.fillStyle = '#778';
    ctx.fillText(GF.t('best') + ': ' + fmt(best), cx, by + bh + 28*S);
  }
}

// ── SHOP / GARAGE ───────────────────────────────────────────────────────────
var _shopRows = [], _shopClose = null;
function drawShop(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  ctx.fillStyle = 'rgba(8,8,18,0.90)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(26*S, 20, 34) + 'px Inter, sans-serif'; ctx.fillStyle = '#7fe3c0';
  ctx.fillText(GF.t('shop'), W/2, 84*S);
  // coins
  drawCoinNum(ctx, fmt(coins) + ' ' + GF.t('coins'), W/2, 116*S, 16*S, '#ffd24a');

  _shopRows = [];
  var top = 142*S;
  var rowH = GF.clamp(74*S, 58, 92);
  var gap = 9*S;
  var rw = Math.min(W - 28*S, 520*S);
  var rx = (W - rw)/2;
  for (var i = 0; i < UPGRADES.length; i++) {
    var u = UPGRADES[i];
    var ry = top + i * (rowH + gap);
    var r = { x: rx, y: ry, w: rw, h: rowH, u: u };
    _shopRows.push(r);
    drawShopRow(ctx, r);
  }
  // close button
  var cbw = Math.min(W - 28*S, 360*S), cbh = GF.clamp(54*S, 44, 70);
  var cbx = (W - cbw)/2, cby = top + UPGRADES.length * (rowH + gap) + 8*S;
  // clamp into view
  if (cby + cbh > H - 12*S) cby = H - 12*S - cbh;
  _shopClose = { x: cbx, y: cby, w: cbw, h: cbh };
  var grad = ctx.createLinearGradient(cbx, cby, cbx, cby+cbh);
  grad.addColorStop(0, '#4a4a60'); grad.addColorStop(1, '#33333f');
  GF.rr(ctx, cbx, cby, cbw, cbh, cbh/2); ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + (18*S) + 'px Inter, sans-serif'; ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('close'), W/2, cby + cbh/2 + 1);
}

function drawShopRow(ctx, r) {
  var S = GF.S, u = r.u;
  var maxed = upMax(u);
  var cost = upCost(u);
  var afford = coins >= cost && !maxed;
  // panel
  GF.rr(ctx, r.x, r.y, r.w, r.h, 12*S);
  ctx.fillStyle = afford ? 'rgba(127,227,192,0.10)' : 'rgba(255,255,255,0.05)'; ctx.fill();
  ctx.strokeStyle = afford ? 'rgba(127,227,192,0.4)' : 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1.5; ctx.stroke();
  var pad = 12*S;
  // name + level
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + GF.clamp(15*S, 12, 19) + 'px Inter, sans-serif'; ctx.fillStyle = '#fff';
  ctx.fillText(GF.t(u.label) + '  ' + (maxed ? GF.t('maxed') : GF.t('own') + ' ' + upLevel(u.id)), r.x + pad, r.y + 9*S);
  ctx.font = GF.clamp(12*S, 10, 15) + 'px Inter, sans-serif'; ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t(u.desc), r.x + pad, r.y + 30*S);
  // sub stat
  ctx.fillStyle = '#7fe3c0'; ctx.font = (11*S) + 'px Inter, sans-serif';
  try { ctx.fillText(u.sub(), r.x + pad, r.y + r.h - 18*S); } catch(e){}
  // buy chip (right)
  var chipW = GF.clamp(96*S, 78, 130), chipH = GF.clamp(42*S, 34, 54);
  var chipX = r.x + r.w - chipW - 10*S, chipY = r.y + (r.h - chipH)/2;
  r.buy = { x: chipX, y: chipY, w: chipW, h: chipH };
  var cg = ctx.createLinearGradient(chipX, chipY, chipX, chipY+chipH);
  if (maxed) { cg.addColorStop(0, '#3a3a48'); cg.addColorStop(1, '#2a2a34'); }
  else if (afford) { cg.addColorStop(0, '#2ee07a'); cg.addColorStop(1, '#23a657'); }
  else { cg.addColorStop(0, '#5a4a4a'); cg.addColorStop(1, '#3a2e2e'); }
  GF.rr(ctx, chipX, chipY, chipW, chipH, 10*S); ctx.fillStyle = cg; ctx.fill();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (maxed) {
    ctx.font = 'bold ' + (13*S) + 'px Inter, sans-serif'; ctx.fillStyle = '#889';
    ctx.fillText(GF.t('maxed'), chipX + chipW/2, chipY + chipH/2);
  } else {
    drawCoinNum(ctx, fmt(cost), chipX + chipW/2, chipY + chipH/2, 13*S, afford ? '#0e0a16' : '#caa');
  }
}

// ── MAP / ROOMS ─────────────────────────────────────────────────────────────
var _mapRooms = [], _mapClose = null;
function drawMap(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  ctx.fillStyle = 'rgba(8,8,18,0.90)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(26*S, 20, 34) + 'px Inter, sans-serif'; ctx.fillStyle = '#ffd27f';
  ctx.fillText(GF.t('map'), W/2, 84*S);
  ctx.font = (13*S) + 'px Inter, sans-serif'; ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t('tap_room'), W/2, 112*S);
  drawCoinNum(ctx, fmt(coins), W/2, 136*S, 15*S, '#ffd24a');

  _mapRooms = [];
  var top = 162*S;
  var rowH = GF.clamp(72*S, 56, 90), gap = 10*S;
  var rw = Math.min(W - 28*S, 520*S), rx = (W - rw)/2;
  for (var i = 0; i < ROOMS.length; i++) {
    var ry = top + i * (rowH + gap);
    var r = { x: rx, y: ry, w: rw, h: rowH, i: i };
    _mapRooms.push(r);
    drawMapRow(ctx, r);
  }
  var cbw = Math.min(W - 28*S, 360*S), cbh = GF.clamp(54*S, 44, 70);
  var cbx = (W - cbw)/2, cby = top + ROOMS.length * (rowH + gap) + 8*S;
  if (cby + cbh > H - 12*S) cby = H - 12*S - cbh;
  _mapClose = { x: cbx, y: cby, w: cbw, h: cbh };
  var grad = ctx.createLinearGradient(cbx, cby, cbx, cby+cbh);
  grad.addColorStop(0, '#4a4a60'); grad.addColorStop(1, '#33333f');
  GF.rr(ctx, cbx, cby, cbw, cbh, cbh/2); ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + (18*S) + 'px Inter, sans-serif'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('close'), W/2, cby + cbh/2 + 1);
}

function drawMapRow(ctx, r) {
  var S = GF.S, i = r.i, rm = ROOMS[i];
  var unlocked = roomUnlocked[i];
  var cost = ROOM_UNLOCK_COST[i];
  var afford = coins >= cost;
  var active = i === roomIdx;
  GF.rr(ctx, r.x, r.y, r.w, r.h, 12*S);
  ctx.fillStyle = active ? 'rgba(255,210,127,0.14)' : (unlocked ? 'rgba(127,227,192,0.08)' : 'rgba(255,255,255,0.04)'); ctx.fill();
  ctx.strokeStyle = active ? '#ffd27f' : (unlocked ? 'rgba(127,227,192,0.3)' : 'rgba(255,255,255,0.08)'); ctx.lineWidth = active ? 2.5 : 1.5; ctx.stroke();
  var pad = 14*S;
  // swatch
  ctx.fillStyle = rm.floor; GF.rr(ctx, r.x + pad, r.y + r.h/2 - 16*S, 32*S, 32*S, 6*S); ctx.fill();
  ctx.strokeStyle = rm.accent; ctx.lineWidth = 2; ctx.stroke();
  // name
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(17*S, 13, 22) + 'px Inter, sans-serif'; ctx.fillStyle = unlocked ? '#fff' : '#aab';
  ctx.fillText(GF.t(rm.key), r.x + pad + 44*S, r.y + r.h/2 - 9*S);
  ctx.font = (12*S) + 'px Inter, sans-serif'; ctx.fillStyle = rm.accent;
  ctx.fillText('×' + rm.value.toFixed(1) + ' ' + GF.t('coins').toLowerCase(), r.x + pad + 44*S, r.y + r.h/2 + 11*S);
  // right chip
  var chipW = GF.clamp(120*S, 96, 160), chipH = GF.clamp(44*S, 36, 56);
  var chipX = r.x + r.w - chipW - 10*S, chipY = r.y + (r.h - chipH)/2;
  r.chip = { x: chipX, y: chipY, w: chipW, h: chipH };
  if (unlocked) {
    var cg = ctx.createLinearGradient(chipX, chipY, chipX, chipY+chipH);
    if (active) { cg.addColorStop(0,'#3a3a48'); cg.addColorStop(1,'#2a2a34'); }
    else { cg.addColorStop(0,'#2ee07a'); cg.addColorStop(1,'#23a657'); }
    GF.rr(ctx, chipX, chipY, chipW, chipH, 10*S); ctx.fillStyle = cg; ctx.fill();
    if (active) {
      // filled dot + label (no ● glyph)
      ctx.font = 'bold ' + (14*S) + 'px Inter, sans-serif';
      var albl = GF.t('own').toUpperCase();
      var awd = ctx.measureText(albl).width;
      ctx.save(); ctx.fillStyle = '#889';
      ctx.beginPath(); ctx.arc(chipX + chipW/2 - awd/2 - 8*S, chipY + chipH/2 + 0.5*S, 4*S, 0, Math.PI*2); ctx.fill(); ctx.restore();
      ctx.fillStyle = '#889'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(albl, chipX + chipW/2 - awd/2 + 2*S, chipY + chipH/2 + 0.5*S);
      ctx.textAlign = 'center';
    } else {
      drawPlayTri(ctx, chipX + chipW/2, chipY + chipH/2 + 0.5*S, 14*S*0.7, '#0e0a16');
    }
  } else {
    var cg2 = ctx.createLinearGradient(chipX, chipY, chipX, chipY+chipH);
    if (afford) { cg2.addColorStop(0,'#2ee07a'); cg2.addColorStop(1,'#23a657'); }
    else { cg2.addColorStop(0,'#5a4a4a'); cg2.addColorStop(1,'#3a2e2e'); }
    GF.rr(ctx, chipX, chipY, chipW, chipH, 10*S); ctx.fillStyle = cg2; ctx.fill();
    drawCoinNum(ctx, fmt(cost), chipX + chipW/2, chipY + chipH/2 + 0.5*S, 13*S, afford ? '#0e0a16' : '#caa');
  }
}

// ── CLICK ROUTING ───────────────────────────────────────────────────────────
function hit(b, x, y){ return b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }

function onPress(x, y) {
  // tutorial first
  if (GF.tutorial.active) { if (GF.tutorial.handleClick(x, y)) return; }

  if (gs === 'MENU') {
    if (hit(_menuBtn, x, y)) { GF.sfx('click'); startGame(); }
    return;
  }
  if (gs === 'PLAYING') {
    if (hit(_muteHit, x, y)) { GF.toggleMute(); GF.setMusicMuted(GF.muted); return; }
    if (hit(_btnHelp, x, y)) { GF.tutorial.reopen(); return; }
    if (hit(_btnShop, x, y)) { GF.sfx('click'); gs = 'SHOP'; return; }
    if (hit(_btnMap, x, y))  { GF.sfx('click'); gs = 'MAP'; return; }
    return;
  }
  if (gs === 'SHOP') {
    if (hit(_shopClose, x, y)) { GF.sfx('click'); gs = 'PLAYING'; return; }
    for (var i = 0; i < _shopRows.length; i++) {
      var r = _shopRows[i];
      if (hit(r.buy, x, y)) { tryBuy(r.u); return; }
    }
    return;
  }
  if (gs === 'MAP') {
    if (hit(_mapClose, x, y)) { GF.sfx('click'); gs = 'PLAYING'; return; }
    for (var j = 0; j < _mapRooms.length; j++) {
      var mr = _mapRooms[j];
      if (hit(mr.chip, x, y)) { tryRoom(mr.i); return; }
    }
    return;
  }
}

function tryBuy(u) {
  if (upMax(u)) { GF.sfx('error'); return; }
  var cost = upCost(u);
  if (coins < cost) { GF.sfx('error'); return; }
  coins -= cost; up[u.id]++;
  GF.sfx('levelup'); GF.setShake(0.3);
  saveAll();
}

function tryRoom(i) {
  if (roomUnlocked[i]) {
    if (i === roomIdx) { gs = 'PLAYING'; return; }
    GF.sfx('unlock'); gotoRoom(i);
  } else {
    var cost = ROOM_UNLOCK_COST[i];
    if (coins < cost) { GF.sfx('error'); return; }
    coins -= cost; roomUnlocked[i] = true;
    GF.sfx('reward'); newRoomFlashT = 2.0; GF.setShake(0.5);
    saveAll();
    gotoRoom(i);
  }
}

// True when (x,y) is in a UI band/overlay where a tap must NOT drive the vacuum.
// Play-field is the middle; HUD (top) + action bar (bottom) are reserved bands,
// and SHOP/MAP/MENU are full-screen overlays (the whole screen is UI then).
function inUiBand(x, y) {
  if (gs !== 'PLAYING') return true;                 // overlays: never drive
  var S = GF.S, H = GF.H;
  if (y < 64 * S) return true;                        // top HUD band
  if (y > H - 70 * S) return true;                    // bottom action bar
  return false;
}
// wire press from both canvas click and touchstart (gf-lib's buttons[] is unused here)
GF.canvas.addEventListener('click', function(e){ onPress(e.clientX, e.clientY); });
GF.canvas.addEventListener('touchstart', function(e){
  if (e.changedTouches && e.changedTouches.length) {
    var t0 = e.changedTouches[0];
    onPress(t0.clientX, t0.clientY);
    // If the tap landed on a UI band/button, kill gf-lib's joystick for this
    // touch so the vacuum doesn't lurch when you tap GARAGE / ROOMS / mute / ?.
    if (inUiBand(t0.clientX, t0.clientY)) { GF.touch.active = false; GF.touch.dx = 0; GF.touch.dy = 0; }
  }
}, { passive: true });

// ── TUTORIAL ────────────────────────────────────────────────────────────────
function maybeStartTutorial() {
  // Demo-hand tutorial: drive → suck → dock → shop. Skippable, shows once.
  var center = { get x(){ return toCanvasX(vac.x); }, get y(){ return toCanvasY(vac.y); }, r: 34 };
  var nearDirt = function(){
    // point at the nearest dirt to the vacuum
    var best = null, bd = 1e9;
    for (var i = 0; i < dirt.length; i++) { var dd = GF.dist(vac.x, vac.y, dirt[i].x, dirt[i].y); if (dd < bd) { bd = dd; best = dirt[i]; } }
    if (!best) return { x: toCanvasX(vac.x + 80), y: toCanvasY(vac.y), r: 30 };
    return { x: toCanvasX(best.x), y: toCanvasY(best.y), r: 30 };
  };
  var dockTgt = { get x(){ return toCanvasX(dock.x); }, get y(){ return toCanvasY(dock.y); }, r: 40 };
  GF.tutorial.start([
    { text: GF.t('tut_drive'), target: center, target2: nearDirt, gesture: 'drag', advance: 'auto', after: 3000 },
    { text: GF.t('tut_suck'),  target: nearDirt, advance: 'auto', after: 2600 },
    { text: GF.t('tut_dock'),  target: dockTgt, advance: 'auto', after: 3000 },
  ], { storageKey: 'vacuum_rush_tutorial_v1' });
}

// ── PERSIST + UTILS ─────────────────────────────────────────────────────────
function saveAll() {
  if (sessionCoins > best) { best = sessionCoins; try { localStorage.setItem('vacuum_rush_best', best); } catch(e){} }
  GF.saveRun();
}
function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e6) return (n/1e6).toFixed(n>=1e7?0:1) + 'M';
  if (n >= 1e4) return (n/1e3).toFixed(n>=1e5?0:1) + 'k';
  return '' + n;
}
// Vector glyphs - NEVER use star / play-triangle / bullet glyphs in fillText
// (they render as tofu boxes on the Yandex/Android font stacks; Build Hygiene #1).
// Draw a coin disc then the number, centred together around cxp.
function drawCoinNum(ctx, txt, cxp, cyp, fontPx, col) {
  ctx.font = 'bold ' + fontPx + 'px Inter, sans-serif';
  var tw = ctx.measureText(txt).width;
  var cr = fontPx * 0.55, gap = cr * 0.6;
  var total = cr * 2 + gap + tw;
  var startX = cxp - total / 2;
  var coinX = startX + cr;
  ctx.save();
  ctx.fillStyle = '#ffd24a';
  ctx.beginPath(); ctx.arc(coinX, cyp, cr, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#b8860b'; ctx.lineWidth = Math.max(1, cr*0.18); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = col || '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(txt, startX + cr*2 + gap, cyp + 0.5);
  ctx.textAlign = 'center';
}
function drawPlayTri(ctx, cxp, cyp, sz, col) {
  ctx.save(); ctx.fillStyle = col || '#fff';
  ctx.beginPath();
  ctx.moveTo(cxp - sz*0.45, cyp - sz*0.6);
  ctx.lineTo(cxp + sz*0.7, cyp);
  ctx.lineTo(cxp - sz*0.45, cyp + sz*0.6);
  ctx.closePath(); ctx.fill(); ctx.restore();
}
function wrapText(ctx, text, x, y, maxW, lineH) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  var sy = y - ((lines.length - 1) * lineH) / 2;
  for (var j = 0; j < lines.length; j++) ctx.fillText(lines[j], x, sy + j * lineH);
}

// ── BOOT ────────────────────────────────────────────────────────────────────
GF.init({
  designW: DESIGN_W,
  designH: DESIGN_H,
  strings: STRINGS,
  saveKey: 'vacuum_rush',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('vacuum_rush_best') || '0') || 0; } catch (e) {}

    // Yandex 1.9 — persist run across reload (coins, upgrades, rooms, room idx).
    GF.persist('vacuum_rush_run_v1',
      function() {
        return { gs: (gs==='PLAYING'?'PLAYING':'MENU'), coins: coins, bag: 0,
          up: up, roomUnlocked: roomUnlocked, roomIdx: roomIdx,
          sessionCoins: sessionCoins, best: best };
      },
      function(s) {
        if (!s) return;
        coins = s.coins || 0;
        if (s.up) { up.power=s.up.power||0; up.reach=s.up.reach||0; up.speed=s.up.speed||0; up.bag=s.up.bag||0; up.magnet=s.up.magnet||0; }
        if (s.roomUnlocked && s.roomUnlocked.length === roomUnlocked.length) roomUnlocked = s.roomUnlocked.slice();
        roomIdx = s.roomIdx || 0;
        sessionCoins = s.sessionCoins || 0;
        if (s.best) best = Math.max(best, s.best);
      }
    );
    // always (re)build the active room layout + dirt for a clean entry
    spawnRoom(roomIdx);
    gs = 'MENU';

    // MUSIC (hard rule 8) — cozy bed fits a relaxing cleaning game.
    GF.startMusic({ preset: 'cozy', muted: GF.muted });

    // Expose state for the QA progression gate.
    GF.exposeState(function(){
      return { gs: gs, coins: coins, score: sessionCoins, best: best,
        bag: Math.round(bag), bagMax: Math.round(bagMax()), combo: combo,
        roomIdx: roomIdx, power: up.power, reach: up.reach, speed: up.speed,
        bagLv: up.bag, magnet: up.magnet, dirtLeft: dirt.length,
        roomsUnlocked: roomUnlocked.filter(Boolean).length };
    });

    // Bot contract for the autonomous progression probe (#276): drive toward the
    // nearest dirt, or to the dock when the bag is full, and buy the cheapest
    // affordable upgrade — so the probe can build a 10-15 min progression curve.
    GF.exposeBot(
      function() {
        var acts = [];
        if (gs === 'PLAYING') {
          if (bag >= bagMax()) acts.push('dock'); else acts.push('suck');
          // buy if anything affordable
          for (var i=0;i<UPGRADES.length;i++){ if(!upMax(UPGRADES[i]) && coins>=upCost(UPGRADES[i])){ acts.push('buy'); break; } }
        } else if (gs === 'MENU') acts.push('start');
        else if (gs === 'SHOP' || gs === 'MAP') acts.push('resume');
        return acts;
      },
      function(a) {
        if (a === 'start') { startGame(); return; }
        if (a === 'resume') { gs = 'PLAYING'; return; }
        if (a === 'buy') {
          for (var i=0;i<UPGRADES.length;i++){ if(!upMax(UPGRADES[i]) && coins>=upCost(UPGRADES[i])){ tryBuy(UPGRADES[i]); return; } }
          // else unlock a room if affordable
          for (var j=0;j<ROOMS.length;j++){ if(!roomUnlocked[j] && coins>=ROOM_UNLOCK_COST[j]){ tryRoom(j); return; } }
          return;
        }
        // movement actions: nudge the vacuum toward target by injecting velocity
        var tx, ty;
        if (a === 'dock') { tx = dock.x; ty = dock.y; }
        else { // suck: nearest dirt
          var best=null, bd=1e9; for (var k=0;k<dirt.length;k++){ var dd=GF.dist(vac.x,vac.y,dirt[k].x,dirt[k].y); if(dd<bd){bd=dd;best=dirt[k];} }
          if (best) { tx = best.x; ty = best.y; } else { tx = dock.x; ty = dock.y; }
        }
        var dx = tx - vac.x, dy = ty - vac.y, dl = Math.sqrt(dx*dx+dy*dy) || 1;
        vac.vx += dx/dl * moveTop(); vac.vy += dy/dl * moveTop();
        var sp = Math.sqrt(vac.vx*vac.vx+vac.vy*vac.vy), tp = moveTop();
        if (sp > tp) { vac.vx = vac.vx/sp*tp; vac.vy = vac.vy/sp*tp; }
        vac.x += vac.vx; vac.y += vac.vy;
        // run one suction pass so the bot actually ingests
        update(1/60);
      }
    );

    // Reachability gate hooks — report interactive controls per screen.
    GF.exposeReach(function() {
      var S = GF.S, items = [];
      if (gs === 'PLAYING') {
        if (_btnShop) items.push({ id:'shop', x:_btnShop.x, y:_btnShop.y, w:_btnShop.w, h:_btnShop.h });
        if (_btnMap)  items.push({ id:'map',  x:_btnMap.x,  y:_btnMap.y,  w:_btnMap.w,  h:_btnMap.h });
        if (_btnHelp) items.push({ id:'help', x:_btnHelp.x, y:_btnHelp.y, w:_btnHelp.w, h:_btnHelp.h });
      } else if (gs === 'MENU') {
        if (_menuBtn) items.push({ id:'play', x:_menuBtn.x, y:_menuBtn.y, w:_menuBtn.w, h:_menuBtn.h });
      } else if (gs === 'SHOP') {
        for (var i=0;i<_shopRows.length;i++){ var r=_shopRows[i]; if(r.buy) items.push({ id:'buy'+i, x:r.buy.x, y:r.buy.y, w:r.buy.w, h:r.buy.h }); }
        if (_shopClose) items.push({ id:'close', x:_shopClose.x, y:_shopClose.y, w:_shopClose.w, h:_shopClose.h });
      } else if (gs === 'MAP') {
        for (var j=0;j<_mapRooms.length;j++){ var m=_mapRooms[j]; if(m.chip) items.push({ id:'room'+j, x:m.chip.x, y:m.chip.y, w:m.chip.w, h:m.chip.h }); }
        if (_mapClose) items.push({ id:'close', x:_mapClose.x, y:_mapClose.y, w:_mapClose.w, h:_mapClose.h });
      }
      return { screen: gs, items: items, viewportH: GF.H, scrollMaxY: 0 };
    });
    GF.exposeTour([
      { name: 'menu', go: function(){ gs='MENU'; } },
      { name: 'play', go: function(){ gs='PLAYING'; if(dirt.length===0) spawnRoom(roomIdx); } },
      { name: 'shop', go: function(){ gs='SHOP'; } },
      { name: 'map',  go: function(){ gs='MAP'; } },
    ]);

    // PLATFORM AUTOSTART (hard rule 9) — drop straight into play on platform builds.
    if (window.__GF_AUTOSTART && !window._silent) { startGame(); }
  },
  onUpdate: update,
  onDraw: draw,
});

// screenshot / gate helper — jump into a busy mid-game state.
window._jumpLevel = function(n) {
  // give some upgrades + coins + a partially-cleaned later room for a rich shot
  up.power = 2; up.reach = 3; up.speed = 3; up.bag = 3; up.magnet = 1;
  coins = 1850; sessionCoins = 1850; best = Math.max(best, 2400);
  roomUnlocked = [true, true, true, false, false];
  spawnRoom(typeof n === 'number' && n >= 0 && n < ROOMS.length ? n : 1);
  // remove ~40% of dirt so the room looks actively-cleaned, and fill the bag a bit
  var keep = Math.floor(dirt.length * 0.6);
  dirt = dirt.slice(0, keep);
  bag = Math.round(bagMax() * 0.45);
  combo = 3; comboTimer = 3;
  gs = 'PLAYING';
};
window._setupForScreenshot = window._jumpLevel;

})();
</script>
