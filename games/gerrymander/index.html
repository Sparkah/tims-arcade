<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gerrymander</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── GAME-SPECIFIC CONFIG ─────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Gerrymander',
    sub:   'Carve up the voter map. Win 6 of 10 districts.',
    play: 'PLAY', retry: 'TRY AGAIN', next: 'NEXT MAP', cont: 'CONTINUE',
    score: 'HALLS', best: 'BEST',
    gameover: 'YOU LOST', won: 'PARLIAMENT SEIZED',
    round: 'MAP', halls: 'HALLS', won_label: 'WON', target: 'NEED',
    undo: 'UNDO', help: '?',
    roundend_pass: 'MAP CLEARED',
    roundend_fail: 'MAP FAILED',
    won_districts: 'districts',
    tut_goal: 'Goal: Win 6 of 10 districts by carving up the voter map.',
    tut_controls: 'Controls: Tap empty cells to plant city halls.',
    tut_win: 'Win: Plant 10 halls and end with 6+ red districts.',
    tut_lose: 'Lose: Spend all 10 halls with fewer than 6 districts.',
    tut_tip: 'Tip: Cluster halls in red strongholds, split rival turf.',
  },
  ru: {
    title: 'Округа',
    sub:   'Перекройте карту избирателей. Возьмите 6 из 10 округов.',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', next: 'СЛЕДУЮЩАЯ КАРТА', cont: 'ДАЛЕЕ',
    score: 'РАТУШИ', best: 'РЕКОРД',
    gameover: 'ПОРАЖЕНИЕ', won: 'ПАРЛАМЕНТ ВЗЯТ',
    round: 'КАРТА', halls: 'РАТУШИ', won_label: 'ВЗЯТО', target: 'НУЖНО',
    undo: 'НАЗАД', help: '?',
    roundend_pass: 'КАРТА ПРОЙДЕНА',
    roundend_fail: 'КАРТА ПРОВАЛЕНА',
    won_districts: 'округов',
    tut_goal: 'Цель: Возьмите 6 из 10 округов, перекроив карту.',
    tut_controls: 'Управление: Нажмите на клетку — там вырастет ратуша.',
    tut_win: 'Победа: 10 ратуш, и в итоге 6+ красных округов.',
    tut_lose: 'Проигрыш: 10 ратуш, и меньше 6 округов выиграно.',
    tut_tip: 'Совет: Кучкуйте ратуши в своих, размывайте чужих.',
  },
};

var SPRITE_NAMES = [];

// ── TUNABLES (must match DESIGN.md) ──────────────────────────────────────
var GRID_W = 20;
var GRID_H = 14;
var MAX_HALLS = 10;
var WIN_TARGET = 6;
var MAX_ROUNDS = 5;
var PARTY_COUNT = 3;
var PLAYER_PARTY = 0;
var ROUND_MIX_SHIFT = 0.07;
var UNDO_LIMIT = 99;
var HALL_RADIUS_PX = 18;

// Party colors
var PARTY_COLORS = ['#e74c3c', '#3498db', '#f1c40f']; // red, blue, yellow
var PARTY_COLORS_DIM = ['#7c2620', '#1a4a6b', '#7a630a'];
var PARTY_COLORS_LIGHT = ['#ff6b5e', '#5dade2', '#f4d03f'];

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';
var round = 1;
var halls = []; // array of {gx, gy, party}
var grid = []; // 2D: grid[y][x] = party index
var owner = []; // 2D: owner[y][x] = hall index (nearest)
var districtsWon = 0;
var districtParties = []; // length = halls.length, value = winning party for that district
var roundEndAt = 0; // timestamp when roundend started
var roundEndPassed = false;
var helpOpen = false;
var seenTutorial = false;
var bestRound = 1; // furthest round reached

// Layout cache
var boardX = 0, boardY = 0, cellSize = 1, boardW = 0, boardH = 0;
var hudBtns = []; // {label, x,y,w,h, fn, key}
var menuButtons = []; // menu PLAY button rect

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function newRound() {
  halls = [];
  districtsWon = 0;
  districtParties = [];
  // generate grid with round-difficulty shift
  var oppShare = 0.5 + ROUND_MIX_SHIFT * (round - 1); // 0.5, 0.57, 0.64, 0.71, 0.78
  oppShare = Math.min(0.82, oppShare);
  var playerShare = 1 - oppShare;
  grid = [];
  for (var y = 0; y < GRID_H; y++) {
    var row = [];
    for (var x = 0; x < GRID_W; x++) {
      var r = Math.random();
      if (r < playerShare) {
        row.push(PLAYER_PARTY);
      } else {
        // remaining is split between blue and yellow
        // give blue slightly more (the "main opposition")
        var op = Math.random();
        row.push(op < 0.6 ? 1 : 2);
      }
    }
    grid.push(row);
  }
  owner = [];
  for (var oy = 0; oy < GRID_H; oy++) {
    var orow = [];
    for (var ox = 0; ox < GRID_W; ox++) orow.push(-1);
    owner.push(orow);
  }
}

function startGame() {
  round = 1;
  newRound();
  gs = 'PLAYING';
  helpOpen = false;
  GF.saveRun();
  try { GF.gameStarted(); } catch (e) {}
  // tutorial seen marker
  if (!seenTutorial) {
    try { localStorage.setItem('gerrymander_seen_tutorial', '1'); seenTutorial = true; } catch (e) {}
  }
}

function placeHall(gx, gy) {
  if (gs !== 'PLAYING') return;
  if (halls.length >= MAX_HALLS) return;
  // can't place on existing hall cell
  for (var i = 0; i < halls.length; i++) {
    if (halls[i].gx === gx && halls[i].gy === gy) return;
  }
  halls.push({ gx: gx, gy: gy, party: PLAYER_PARTY });
  recomputeOwnership();
  GF.spawnParticles(boardX + gx * cellSize + cellSize/2, boardY + gy * cellSize + cellSize/2, '#fff', 16);
  GF.setShake(0.35);
  if (halls.length >= MAX_HALLS) {
    finalizeRound();
  }
  GF.saveRun();
}

function undoHall() {
  if (gs !== 'PLAYING') return;
  if (halls.length === 0) return;
  halls.pop();
  recomputeOwnership();
  GF.saveRun();
}

function recomputeOwnership() {
  // brute-force nearest hall per cell
  districtParties = [];
  if (halls.length === 0) {
    for (var y = 0; y < GRID_H; y++) {
      for (var x = 0; x < GRID_W; x++) {
        owner[y][x] = -1;
      }
    }
    return;
  }
  // count votes per (hall, party)
  var votes = [];
  for (var h = 0; h < halls.length; h++) {
    votes.push([0, 0, 0]);
  }
  for (var yy = 0; yy < GRID_H; yy++) {
    for (var xx = 0; xx < GRID_W; xx++) {
      var bestIdx = 0;
      var bestD = Infinity;
      for (var hi = 0; hi < halls.length; hi++) {
        var dx = halls[hi].gx - xx;
        var dy = halls[hi].gy - yy;
        var d = dx*dx + dy*dy;
        if (d < bestD) { bestD = d; bestIdx = hi; }
      }
      owner[yy][xx] = bestIdx;
      votes[bestIdx][grid[yy][xx]]++;
    }
  }
  // determine winning party per district
  districtsWon = 0;
  for (var k = 0; k < halls.length; k++) {
    var v = votes[k];
    // find max
    var maxV = -1, winnerParty = -1, tie = false;
    for (var p = 0; p < PARTY_COUNT; p++) {
      if (v[p] > maxV) { maxV = v[p]; winnerParty = p; tie = false; }
      else if (v[p] === maxV && winnerParty !== p) { tie = true; }
    }
    // ties broken AGAINST player — if player is in tie, opponent wins
    if (tie && winnerParty === PLAYER_PARTY) {
      // pick highest opposition
      var altMax = -1, altParty = 1;
      for (var pp = 0; pp < PARTY_COUNT; pp++) {
        if (pp === PLAYER_PARTY) continue;
        if (v[pp] > altMax) { altMax = v[pp]; altParty = pp; }
      }
      winnerParty = altParty;
    }
    districtParties.push(winnerParty);
    if (winnerParty === PLAYER_PARTY) districtsWon++;
  }
}

function finalizeRound() {
  roundEndPassed = districtsWon >= WIN_TARGET;
  if (roundEndPassed && round > bestRound) {
    bestRound = round;
    try { localStorage.setItem('gerrymander_best', String(bestRound)); } catch (e) {}
  }
  gs = 'ROUNDEND';
  roundEndAt = performance.now();
  GF.saveRun();
}

function continueAfterRound() {
  if (!roundEndPassed) {
    gs = 'GAMEOVER';
    try { GF.gameEnded(); } catch (e) {}
    GF.saveRun();
    return;
  }
  if (round >= MAX_ROUNDS) {
    gs = 'WON';
    try { GF.gameEnded(); } catch (e) {}
    GF.saveRun();
    return;
  }
  round++;
  newRound();
  gs = 'PLAYING';
  GF.saveRun();
}

window._jumpLevel = function(n) {
  // screenshot helper — set up an in-play mid-round state
  startGame();
  // _jumpLevel(99) is the runtime-gate's terminal-state probe: drop all
  // 10 halls instantly so the round finalises into GAMEOVER (or WON).
  if (n && n >= 99) {
    // Runtime-gate terminal probe. Force a deterministic GAMEOVER by
    // jumping to the last round, placing all 10 halls clustered into a
    // single corner (so most districts go to opponents), then resolving.
    round = MAX_ROUNDS;
    newRound();
    var cluster = [
      [1, 1], [2, 1], [3, 1], [1, 2], [2, 2],
      [3, 2], [1, 3], [2, 3], [3, 3], [4, 1],
    ];
    for (var k = 0; k < cluster.length; k++) {
      placeHall(cluster[k][0], cluster[k][1]);
    }
    // Drive past ROUNDEND straight into terminal state (GAMEOVER or WON).
    if (gs === 'ROUNDEND') {
      // If we somehow still won 6+ from the cluster, force loss instead so
      // the gate has a stable GAMEOVER probe.
      if (districtsWon >= WIN_TARGET) {
        districtsWon = WIN_TARGET - 1;
        roundEndPassed = false;
      }
      continueAfterRound();
    }
    return;
  }
  if (n && n > 1) {
    round = Math.min(MAX_ROUNDS, n);
    newRound();
  }
  // drop ~6 halls in a pleasant spread for a mid-game look
  var spread = [
    [3, 3], [10, 4], [16, 3],
    [3, 10], [10, 11], [16, 10],
  ];
  for (var i = 0; i < spread.length; i++) {
    halls.push({ gx: spread[i][0], gy: spread[i][1], party: PLAYER_PARTY });
  }
  recomputeOwnership();
  gs = 'PLAYING';
};

window._setupForScreenshot = function(level) {
  window._jumpLevel(level || 1);
};

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (gs === 'ROUNDEND') {
    // auto-advance after 1.8s
    if (performance.now() - roundEndAt > 1800) {
      continueAfterRound();
    }
  }
  // keyboard: Z = undo
  if (gs === 'PLAYING' && (GF.keys['KeyZ'] && !window._zHeld)) {
    window._zHeld = true;
    undoHall();
  }
  if (!GF.keys['KeyZ']) window._zHeld = false;
}

// ── LAYOUT ───────────────────────────────────────────────────────────────
function computeLayout() {
  var W = GF.W, H = GF.H;
  var landscape = W >= H;
  var padTop = Math.max(64, H * 0.10);
  var padBottom = Math.max(72, H * 0.12);
  var padSide = Math.max(16, W * 0.03);
  var availW = W - 2 * padSide;
  var availH = H - padTop - padBottom;
  // grid aspect 20:14
  var sByW = availW / GRID_W;
  var sByH = availH / GRID_H;
  cellSize = Math.floor(Math.min(sByW, sByH));
  if (cellSize < 4) cellSize = 4;
  boardW = cellSize * GRID_W;
  boardH = cellSize * GRID_H;
  boardX = Math.floor((W - boardW) / 2);
  boardY = Math.floor(padTop + (availH - boardH) / 2);
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  computeLayout();
  // background
  var grad = ctx.createLinearGradient(0, 0, 0, GF.H);
  grad.addColorStop(0, '#10131e');
  grad.addColorStop(1, '#1a1023');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'PLAYING' || gs === 'ROUNDEND' || gs === 'WON' || gs === 'GAMEOVER') {
    drawBoard(ctx);
    drawHUD(ctx);
  }

  if (gs === 'MENU')      drawMenu(ctx);
  if (gs === 'ROUNDEND')  drawRoundEnd(ctx);
  if (gs === 'GAMEOVER')  drawGameOver(ctx);
  if (gs === 'WON')       drawWon(ctx);

  if (helpOpen && gs === 'PLAYING') drawHelpPanel(ctx);
}

function drawBoard(ctx) {
  // outer frame
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(boardX - 6, boardY - 6, boardW + 12, boardH + 12);
  // voter cells
  for (var y = 0; y < GRID_H; y++) {
    for (var x = 0; x < GRID_W; x++) {
      var p = grid[y][x];
      var cx = boardX + x * cellSize;
      var cy = boardY + y * cellSize;
      // base color is party color, but tinted by district owner
      var ownerIdx = owner[y][x];
      var districtParty = (ownerIdx >= 0 && ownerIdx < districtParties.length) ? districtParties[ownerIdx] : -1;
      // background = district shade (semi-transparent), voter dot = party color
      if (districtParty >= 0) {
        // district background
        var dCol = PARTY_COLORS_DIM[districtParty];
        ctx.fillStyle = dCol;
        ctx.fillRect(cx, cy, cellSize, cellSize);
      } else {
        ctx.fillStyle = '#1a1a26';
        ctx.fillRect(cx, cy, cellSize, cellSize);
      }
      // grid line
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx + 0.5, cy + 0.5, cellSize - 1, cellSize - 1);
      // voter dot
      var dotR = Math.max(2, cellSize * 0.28);
      ctx.fillStyle = PARTY_COLORS[p];
      ctx.beginPath();
      ctx.arc(cx + cellSize/2, cy + cellSize/2, dotR, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // district borders (between cells with different owners)
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = Math.max(1.5, cellSize * 0.08);
  for (var yy = 0; yy < GRID_H; yy++) {
    for (var xx = 0; xx < GRID_W; xx++) {
      var oh = owner[yy][xx];
      if (oh < 0) continue;
      // right edge
      if (xx + 1 < GRID_W && owner[yy][xx+1] !== oh) {
        var ex = boardX + (xx+1) * cellSize;
        ctx.beginPath();
        ctx.moveTo(ex, boardY + yy * cellSize);
        ctx.lineTo(ex, boardY + (yy+1) * cellSize);
        ctx.stroke();
      }
      // bottom edge
      if (yy + 1 < GRID_H && owner[yy+1][xx] !== oh) {
        var by = boardY + (yy+1) * cellSize;
        ctx.beginPath();
        ctx.moveTo(boardX + xx * cellSize, by);
        ctx.lineTo(boardX + (xx+1) * cellSize, by);
        ctx.stroke();
      }
    }
  }
  // halls (city hall stamps)
  for (var i = 0; i < halls.length; i++) {
    var h = halls[i];
    var hx = boardX + h.gx * cellSize + cellSize/2;
    var hy = boardY + h.gy * cellSize + cellSize/2;
    drawHall(ctx, hx, hy, cellSize);
  }
}

function drawHall(ctx, x, y, size) {
  var r = Math.max(7, size * 0.55);
  // outer glow
  ctx.save();
  ctx.shadowColor = '#ff3b2e';
  ctx.shadowBlur = 12;
  // base building shape — pentagon-ish hall
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  // dome
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(x, y - r * 0.15, r * 0.55, Math.PI, 0);
  ctx.closePath();
  ctx.fill();
  // body
  ctx.fillStyle = '#c0392b';
  ctx.fillRect(x - r * 0.62, y - r * 0.15, r * 1.24, r * 0.7);
  // door
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - r * 0.12, y + r * 0.2, r * 0.24, r * 0.35);
  // outline
  ctx.strokeStyle = '#000';
  ctx.lineWidth = Math.max(1, r * 0.08);
  ctx.strokeRect(x - r * 0.62, y - r * 0.15, r * 1.24, r * 0.7);
  ctx.beginPath();
  ctx.arc(x, y - r * 0.15, r * 0.55, Math.PI, 0);
  ctx.stroke();
}

function drawHUD(ctx) {
  hudBtns = [];
  var W = GF.W, S = GF.S;
  var topY = Math.max(10, GF.H * 0.015);
  var fs = GF.clamp(15 * S, 11, 20);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  // top-left: round + halls placed
  ctx.fillStyle = '#fff';
  var leftPad = Math.max(14, W * 0.025);
  var line1 = GF.t('round') + ' ' + round + ' / ' + MAX_ROUNDS;
  var line2 = GF.t('halls') + ': ' + halls.length + ' / ' + MAX_HALLS;
  ctx.fillText(line1, leftPad, topY);
  ctx.fillText(line2, leftPad, topY + fs + 4);

  // top-center: won counter
  ctx.textAlign = 'center';
  var centerY = topY;
  var label = GF.t('won_label');
  ctx.fillStyle = '#9ab';
  ctx.fillText(label, GF.W / 2, centerY);
  ctx.font = 'bold ' + Math.floor(fs * 1.7) + 'px sans-serif';
  // color the count by progress
  var col = '#fff';
  if (halls.length >= MAX_HALLS) {
    col = districtsWon >= WIN_TARGET ? '#2ecc71' : '#e74c3c';
  } else {
    col = districtsWon >= WIN_TARGET ? '#2ecc71' : '#FFD700';
  }
  ctx.fillStyle = col;
  ctx.fillText(districtsWon + ' / ' + WIN_TARGET, GF.W / 2, centerY + fs + 4);

  // top-right: ? help + UNDO buttons
  var btnSize = Math.max(36, 44 * S);
  var btnGap = 8 * S;
  var rightX = GF.W - leftPad - btnSize;
  // help button
  drawHudButton(ctx, rightX, topY, btnSize, btnSize, '?', '#3498db', function() { helpOpen = !helpOpen; });
  hudBtns.push({ x: rightX, y: topY, w: btnSize, h: btnSize, fn: function() { helpOpen = !helpOpen; } });
  // undo button
  var undoX = rightX - btnSize - btnGap;
  drawHudButton(ctx, undoX, topY, btnSize, btnSize, '↶', halls.length > 0 ? '#9b59b6' : '#555', halls.length > 0 ? undoHall : function() {});
  hudBtns.push({ x: undoX, y: topY, w: btnSize, h: btnSize, fn: halls.length > 0 ? undoHall : function() {} });

  // bottom legend
  drawLegend(ctx);
}

function drawHudButton(ctx, x, y, w, h, label, col, fn) {
  ctx.fillStyle = col;
  GF.rr(ctx, x, y, w, h, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  GF.rr(ctx, x, y, w, h, 8);
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + Math.floor(h * 0.55) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w/2, y + h/2);
}

function drawLegend(ctx) {
  var S = GF.S;
  var fs = GF.clamp(12 * S, 10, 16);
  var pad = Math.max(14, GF.W * 0.025);
  var bottomY = GF.H - Math.max(22, GF.H * 0.04);
  ctx.font = fs + 'px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  var labels = [GF.t('score'), 'BLUE', 'YELLOW'];
  if (GF.lang === 'ru') labels = ['КРАСНЫЕ', 'СИНИЕ', 'ЖЁЛТЫЕ'];
  var x = pad;
  for (var i = 0; i < 3; i++) {
    ctx.fillStyle = PARTY_COLORS[i];
    ctx.beginPath();
    ctx.arc(x + 8, bottomY, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ccd';
    ctx.fillText(labels[i], x + 22, bottomY);
    x += ctx.measureText(labels[i]).width + 60;
  }
}

function drawMenu(ctx) {
  menuButtons = [];
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var S = GF.S;
  var titleFs = GF.clamp(42 * S, 26, 64);
  var subFs = GF.clamp(15 * S, 12, 20);
  ctx.shadowColor = 'rgba(231,76,60,0.5)';
  ctx.shadowBlur = 30 * S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  var titleY = GF.cy - GF.H * 0.22;
  ctx.fillText(GF.t('title'), GF.cx, titleY);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  ctx.font = subFs + 'px sans-serif';
  ctx.fillStyle = '#b9bccf';
  ctx.fillText(GF.t('sub'), GF.cx, titleY + titleFs * 0.7);

  // tutorial block
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  var lineFs = GF.clamp(14 * S, 11, 19);
  ctx.font = lineFs + 'px sans-serif';
  ctx.fillStyle = '#dde2f0';
  var startY = titleY + titleFs * 0.7 + subFs + 16 * S;
  var lineH = lineFs + 8 * S;
  ctx.textBaseline = 'top';
  var y = startY;
  for (var i = 0; i < lines.length; i++) {
    y = wrapText(ctx, lines[i], GF.cx, y, GF.W - 40 * S, lineH) + 4 * S;
  }
  ctx.textBaseline = 'alphabetic';

  // PLAY button
  var btnW = GF.clamp(280 * S, 200, 380);
  var btnH = GF.clamp(58 * S, 46, 76);
  var btnX = GF.cx - btnW/2;
  var btnY = y + 18 * S;
  if (btnY + btnH > GF.H - 30) btnY = GF.H - 30 - btnH;
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#e74c3c'); grad.addColorStop(1, '#c0392b');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH/2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.font = 'bold ' + Math.floor(btnH * 0.4) + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), GF.cx, btnY + btnH/2);
  ctx.textBaseline = 'alphabetic';
  menuButtons.push({ x: btnX, y: btnY, w: btnW, h: btnH, fn: startGame });

  // best
  if (bestRound > 1) {
    ctx.font = (lineFs - 2) + 'px sans-serif';
    ctx.fillStyle = '#7a809c';
    ctx.fillText(GF.t('best') + ': ' + GF.t('round') + ' ' + bestRound, GF.cx, btnY + btnH + 26 * S);
  }
}

function drawRoundEnd(ctx) {
  // semi-transparent banner
  ctx.fillStyle = 'rgba(10,10,20,0.7)';
  ctx.fillRect(0, GF.cy - 80, GF.W, 160);
  var S = GF.S;
  ctx.font = 'bold ' + GF.clamp(32 * S, 22, 48) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = roundEndPassed ? '#2ecc71' : '#e74c3c';
  ctx.fillText(roundEndPassed ? GF.t('roundend_pass') : GF.t('roundend_fail'), GF.cx, GF.cy - 16);
  ctx.fillStyle = '#fff';
  ctx.font = GF.clamp(18 * S, 13, 24) + 'px sans-serif';
  ctx.fillText(districtsWon + ' / ' + halls.length + ' ' + GF.t('won_districts'), GF.cx, GF.cy + 24);
}

function drawGameOver(ctx) {
  menuButtons = [];
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var S = GF.S;
  ctx.font = 'bold ' + GF.clamp(40 * S, 24, 60) + 'px sans-serif';
  ctx.fillStyle = '#e74c3c';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('gameover'), GF.cx, GF.cy - 70 * S);
  ctx.font = GF.clamp(18 * S, 13, 24) + 'px sans-serif';
  ctx.fillStyle = '#dde';
  ctx.fillText(GF.t('round') + ' ' + round + ': ' + districtsWon + ' / ' + WIN_TARGET, GF.cx, GF.cy - 20 * S);

  // retry button
  var btnW = GF.clamp(260 * S, 200, 360);
  var btnH = GF.clamp(54 * S, 42, 70);
  var btnX = GF.cx - btnW/2;
  var btnY = GF.cy + 20 * S;
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#3498db'); grad.addColorStop(1, '#2980b9');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH/2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + Math.floor(btnH * 0.4) + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('retry'), GF.cx, btnY + btnH/2);
  menuButtons.push({ x: btnX, y: btnY, w: btnW, h: btnH, fn: startGame });
}

function drawWon(ctx) {
  menuButtons = [];
  ctx.fillStyle = 'rgba(8,8,18,0.95)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var S = GF.S;
  ctx.shadowColor = 'rgba(46,204,113,0.6)';
  ctx.shadowBlur = 30 * S;
  ctx.font = 'bold ' + GF.clamp(42 * S, 26, 64) + 'px sans-serif';
  ctx.fillStyle = '#2ecc71';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('won'), GF.cx, GF.cy - 60 * S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = GF.clamp(18 * S, 13, 24) + 'px sans-serif';
  ctx.fillStyle = '#dde';
  ctx.fillText(MAX_ROUNDS + ' / ' + MAX_ROUNDS, GF.cx, GF.cy - 16 * S);

  var btnW = GF.clamp(260 * S, 200, 360);
  var btnH = GF.clamp(54 * S, 42, 70);
  var btnX = GF.cx - btnW/2;
  var btnY = GF.cy + 30 * S;
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH/2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + Math.floor(btnH * 0.4) + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('play'), GF.cx, btnY + btnH/2);
  menuButtons.push({ x: btnX, y: btnY, w: btnW, h: btnH, fn: startGame });
}

function drawHelpPanel(ctx) {
  // dim
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var S = GF.S;
  var panelW = GF.clamp(420 * S, 280, 520);
  var panelH = GF.clamp(280 * S, 220, 360);
  var px = GF.cx - panelW/2;
  var py = GF.cy - panelH/2;
  ctx.fillStyle = '#1a1a26';
  GF.rr(ctx, px, py, panelW, panelH, 16);
  ctx.fill();
  ctx.strokeStyle = '#3498db';
  ctx.lineWidth = 2;
  GF.rr(ctx, px, py, panelW, panelH, 16);
  ctx.stroke();

  var titleFs = GF.clamp(22 * S, 16, 28);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(GF.t('title'), GF.cx, py + 16);

  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  var lineFs = GF.clamp(13 * S, 11, 17);
  ctx.font = lineFs + 'px sans-serif';
  ctx.fillStyle = '#dde2f0';
  ctx.textAlign = 'left';
  var yLine = py + 16 + titleFs + 16;
  var lineH = lineFs + 10;
  var y = yLine;
  for (var i = 0; i < lines.length; i++) {
    y = wrapText(ctx, lines[i], px + 18, y, panelW - 36, lineH) + 4 * S;
  }

  // close hint
  ctx.font = lineFs + 'px sans-serif';
  ctx.fillStyle = '#9ab';
  ctx.textAlign = 'center';
  var hint = GF.lang === 'ru' ? 'нажмите где угодно — закрыть' : 'tap anywhere to close';
  ctx.fillText(hint, GF.cx, py + panelH - 22);
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  var words = String(text).split(/\s+/);
  var line = '';
  var cy = y;
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy);
      line = words[i];
      cy += lineH;
    } else {
      line = test;
    }
  }
  if (line) {
    ctx.fillText(line, x, cy);
    cy += lineH;
  }
  return cy;
}

// ── INPUT HANDLER ────────────────────────────────────────────────────────
// Custom click handler — gf-lib already has its own button system but we
// need grid-cell + HUD button routing.
function onPress(x, y) {
  if (helpOpen && gs === 'PLAYING') {
    helpOpen = false;
    return;
  }
  // menu / gameover / won buttons
  if (gs === 'MENU' || gs === 'GAMEOVER' || gs === 'WON') {
    for (var i = 0; i < menuButtons.length; i++) {
      var b = menuButtons[i];
      if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { b.fn(); return; }
    }
    return;
  }
  if (gs === 'ROUNDEND') {
    // skip readout on tap
    continueAfterRound();
    return;
  }
  if (gs !== 'PLAYING') return;
  // HUD buttons first
  for (var hi = 0; hi < hudBtns.length; hi++) {
    var hb = hudBtns[hi];
    if (x >= hb.x && x <= hb.x + hb.w && y >= hb.y && y <= hb.y + hb.h) { hb.fn(); return; }
  }
  // grid cell?
  if (x >= boardX && x < boardX + boardW && y >= boardY && y < boardY + boardH) {
    var gx = Math.floor((x - boardX) / cellSize);
    var gy = Math.floor((y - boardY) / cellSize);
    if (gx >= 0 && gx < GRID_W && gy >= 0 && gy < GRID_H) {
      placeHall(gx, gy);
    }
  }
}

// Wire onPress to canvas events directly (gf-lib's button system is for its
// own overlays — we need custom routing). Use capturing-style listeners.
var _canvas = document.getElementById('c');
_canvas.addEventListener('mousedown', function(e) {
  onPress(e.clientX, e.clientY);
});
_canvas.addEventListener('touchstart', function(e) {
  if (e.changedTouches && e.changedTouches[0]) {
    var t = e.changedTouches[0];
    onPress(t.clientX, t.clientY);
  }
});

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'gerrymander',
  onReady: function() {
    try { bestRound = parseInt(localStorage.getItem('gerrymander_best') || '1') || 1; } catch (e) {}
    try { seenTutorial = !!localStorage.getItem('gerrymander_seen_tutorial'); } catch (e) {}
    GF.persist('gerrymander_run_v1',
      function() { return { gs: gs, round: round, halls: halls, districtsWon: districtsWon, grid: grid }; },
      function(s) {
        if (!s) return;
        if (s.gs === 'PLAYING' || s.gs === 'ROUNDEND') {
          gs = s.gs === 'ROUNDEND' ? 'PLAYING' : s.gs;
          round = s.round || 1;
          if (s.grid && s.grid.length === GRID_H) {
            grid = s.grid;
            owner = [];
            for (var oy = 0; oy < GRID_H; oy++) {
              var orow = [];
              for (var ox = 0; ox < GRID_W; ox++) orow.push(-1);
              owner.push(orow);
            }
            halls = s.halls || [];
            recomputeOwnership();
          } else {
            newRound();
          }
        }
      }
    );
    if (gs !== 'PLAYING') gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// Expose state IMMEDIATELY (outside onReady) so the runtime gate's
// __gfState() probe lands on a real object even before boot completes.
GF.exposeState(function() {
  return {
    gs: gs,
    round: round,
    halls_placed: halls.length,
    districts_won: districtsWon,
    MAX_HALLS: MAX_HALLS,
    WIN_TARGET: WIN_TARGET,
    MAX_ROUNDS: MAX_ROUNDS,
    GRID_W: GRID_W,
    GRID_H: GRID_H,
  };
});

})();
</script>
