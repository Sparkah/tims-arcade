var GRID_ROWS_START   = 4;

var MAX_TIER          = 6;
var HIVE_HP_BASE      = 100;
var BOSS_EVERY        = 5;
var FORGE_BASE_SEC    = 12;     // free spore every N seconds (D0: generous)
var BIOMASS_PER_KILL  = 3;      // base ephemeral harvest per basic kill

var SHOP_SPORE_GROWTH = 6;      // +per spore currently on board

var WAVE_HP_PER_WAVE  = 0.25;
var WAVE_SPD_PER_WAVE = 0.07;
var REVIVE_HP_FRAC    = 0.5;

// Genome / organ permanent-meta tunables — PORTED VERBATIM from step-1 Spore

var GENE_SLOT_COSTS   = [120, 320, 700, 1400]; // biomass to unlock slots 2..5

// baseCost / costMultiplier / effectPerLevel / displayMode / counters.
var ORGANS = [
  { id:'carapace', nameKey:'o_carapace', descKey:'o_carapace_d', color:'#38bdf8', maxLevel:8, baseCost:40, costMultiplier:1.55, effectPerLevel:25,   displayMode:'flat',    counters:'OVERWHELMED' },
  { id:'toxin',    nameKey:'o_toxin',    descKey:'o_toxin_d',    color:'#a3e635', maxLevel:8, baseCost:50, costMultiplier:1.6,  effectPerLevel:0.08, displayMode:'percent', counters:'TANK' },
  { id:'cilia',    nameKey:'o_cilia',    descKey:'o_cilia_d',    color:'#f472b6', maxLevel:6, baseCost:60, costMultiplier:1.7,  effectPerLevel:0.06, displayMode:'percent', counters:'FAST' },
  { id:'regrowth', nameKey:'o_regrowth', descKey:'o_regrowth_d', color:'#34d399', maxLevel:6, baseCost:70, costMultiplier:1.7,  effectPerLevel:0.4,  displayMode:'flat',    counters:'BOSS' },
  { id:'husk',     nameKey:'o_husk',     descKey:'o_husk_d',     color:'#fbbf24', maxLevel:6, baseCost:55, costMultiplier:1.65, effectPerLevel:0.15, displayMode:'percent', counters:'BASIC' },

var ORGAN_BY_ID = {}; for (var _i = 0; _i < ORGANS.length; _i++) ORGAN_BY_ID[ORGANS[_i].id] = ORGANS[_i];

var gs = 'MENU';                  // MENU | PLAYING | GAMEOVER | ORGANS

// ── DERIVED STATS (organ bonuses — composed exactly like genomeService) ─────
function organLevel(id) { return genome.organs[id] || 0; }
function organCost(id, lvl) { var d = ORGAN_BY_ID[id]; return d ? Math.floor(d.baseCost * Math.pow(d.costMultiplier, lvl)) : Infinity; }
function organMaxed(id) { var d = ORGAN_BY_ID[id]; return d ? organLevel(id) >= d.maxLevel : false; }
function grownOrganCount() { var n = 0; for (var i = 0; i < ORGANS.length; i++) if (organLevel(ORGANS[i].id) > 0) n++; return n; }
function needsSlotToGrow(id) { if (organLevel(id) > 0) return false; return grownOrganCount() >= genome.geneSlots; }
function canBuyOrgan(id) {
  if (organMaxed(id)) return { ok:false, reason:'maxed', cost:organCost(id, organLevel(id)) };
  if (needsSlotToGrow(id)) return { ok:false, reason:'noSlot', cost:organCost(id, organLevel(id)) };
  var cost = organCost(id, organLevel(id));
  if (genome.biomassBank < cost) return { ok:false, reason:'noBiomass', cost:cost };
  return { ok:true, cost:cost };
}
function nextSlotCost() {
  if (genome.geneSlots >= GENE_SLOT_COUNT) return null;
  return GENE_SLOT_COSTS[genome.geneSlots - 1] != null ? GENE_SLOT_COSTS[genome.geneSlots - 1] : null;
}
// gameplay multipliers (read live during a run)
function bonusHiveHp()     { return organLevel('carapace') * ORGAN_BY_ID['carapace'].effectPerLevel; }
function dmgMult()         { return 1 + organLevel('toxin') * ORGAN_BY_ID['toxin'].effectPerLevel; }
function fireRateMult()    { return Math.max(0.4, 1 - organLevel('cilia') * ORGAN_BY_ID['cilia'].effectPerLevel); } // <1 = faster
function hiveRegen()       { return organLevel('regrowth') * ORGAN_BY_ID['regrowth'].effectPerLevel; }
function biomassMult()     { return 1 + organLevel('husk') * ORGAN_BY_ID['husk'].effectPerLevel; }
function maxHiveHp()       { return HIVE_HP_BASE + bonusHiveHp(); }

// ── BOARD / GRID HELPERS ───────────────────────────────────────────────────
function cellCount() { return GRID_COLS * rows; }
function emptyCells() { var e = []; for (var i = 0; i < cellCount(); i++) if (grid[i] === 0) e.push(i); return e; }
function placeSpore(tier) { var e = emptyCells(); if (!e.length) return false; grid[e[(Math.random() * e.length) | 0]] = tier; return true; }
function spunCount() { var n = 0; for (var i = 0; i < cellCount(); i++) if (grid[i] > 0) n++; return n; }
function shopCost() { return SHOP_SPORE_BASE + spunCount() * SHOP_SPORE_GROWTH; }
// spore firepower: T1 weak -> Tmax strong, scaled by toxin organ.
function sporeDps(tier) { return 5 * Math.pow(tier, 1.65) * dmgMult(); }
function totalDps() { var d = 0; for (var i = 0; i < cellCount(); i++) if (grid[i] > 0) d += sporeDps(grid[i]); return d; }

// ── LAYOUT (recompute on resize) ───────────────────────────────────────────
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  // top HUD ~ 8% ; forge strip ~5% ; bottom buttons ~ 9% ; arena fills middle.
  var hudH = Math.max(46 * S, H * 0.075);
  var btnH = Math.max(56 * S, H * 0.085);
  var arenaTop = hudH + Math.max(26 * S, H * 0.05);
  var arenaBot = H - btnH - 8 * S;
  var arenaH = arenaBot - arenaTop;
  // grid occupies the LOWER ~58% of the arena; swarm path is the upper part.
  var gridH = arenaH * 0.56;
  var cell = Math.min((W - 24 * S) / GRID_COLS, gridH / rows);
  board.cell = cell;
  board.w = cell * GRID_COLS;
  board.h = cell * rows;
  board.x = (W - board.w) / 2;
  board.y = arenaBot - board.h - 6 * S;
  board.top = arenaTop;          // top of swarm path
  board.line = board.y - 8 * S;  // hive membrane line

  // bottom button row: WAVE | FORGE | GROW | GENOME
  var bw = (W - 10 * S * 5) / 4;
  var by = H - btnH - 4 * S;
  waveBtn   = { x: 8 * S,                     y: by, w: bw, h: btnH };
  forgeBtn  = { x: 8 * S + (bw + 8 * S),      y: by, w: bw, h: btnH };
  shopBtn   = { x: 8 * S + (bw + 8 * S) * 2,  y: by, w: bw, h: btnH };
  organsBtn = { x: 8 * S + (bw + 8 * S) * 3,  y: by, w: bw, h: btnH };

  // small HUD corner buttons. x is the LEFT edge; full 2r width must stay on-screen,
  // so the rightmost (mute) sits at W - 2r - margin (reachability gate checks x+w<=W).
  var r = Math.max(15 * S, hudH * 0.34);
  var mMute = 8 * S;
  muteBtn = { x: W - r * 2 - mMute, y: hudH / 2 - r, w: r * 2, h: r * 2, cx: W - r * 2 - mMute + r, cy: hudH / 2, r: r };
  helpBtn = { x: W - r * 4 - mMute - 8 * S, y: hudH / 2 - r, w: r * 2, h: r * 2, cx: W - r * 4 - mMute - 8 * S + r, cy: hudH / 2, r: r };

  // menu / overlay buttons
  var pw = Math.min(300 * S, W * 0.74), ph = Math.max(58 * S, H * 0.07);
  menuPlayBtn = { x: (W - pw) / 2, y: H * 0.60, w: pw, h: ph };
  retryBtn    = { x: (W - pw) / 2, y: H * 0.66, w: pw, h: ph };
  reviveBtn   = { x: (W - pw) / 2, y: H * 0.66 + ph + 12 * S, w: pw, h: Math.max(46 * S, H * 0.056) };

  // GENOME panel close button + slot-buy button
  organCloseBtn = { x: 12 * S, y: 12 * S, w: Math.max(74 * S, W * 0.18), h: Math.max(38 * S, H * 0.05) };
  slotBuyBtn    = { x: (W - pw) / 2, y: H * 0.30, w: pw, h: Math.max(40 * S, H * 0.05) };
}

// isometric tilt: squash the board vertically + skew rows for a 2.5D read.
var ISO_SQUASH = 0.82;          // vertical compression of board cells
function cellRect(i) {
  var c = i % GRID_COLS, r = (i / GRID_COLS) | 0;
  var cw = board.cell, ch = board.cell * ISO_SQUASH;
  var gap = cw * 0.06;
  var x = board.x + c * cw + gap / 2;
  // pack squashed rows from the membrane line down
  var y = board.line + 6 * GF.S + r * ch + gap / 2;
  return { x: x, y: y, w: cw - gap, h: ch - gap, cx: x + (cw - gap) / 2, cy: y + (ch - gap) / 2 };
}
function cellAt(px, py) {
  for (var i = 0; i < cellCount(); i++) {
    var rc = cellRect(i);
    if (px >= rc.x && px <= rc.x + rc.w && py >= rc.y && py <= rc.y + rc.h) return i;
  }
  return -1;
}

// ── GAME FLOW ──────────────────────────────────────────────────────────────
function startGame() {
  window._screenshotFreeze = false;
  rows = GRID_ROWS_START;
  grid = []; for (var i = 0; i < cellCount(); i++) grid.push(0);
  // pre-place two T1 spores so the merge is teachable from frame 1
  grid[cellCount() - GRID_COLS] = 1;
  grid[cellCount() - GRID_COLS + 1] = 1;
  biomass = 0;
  hiveMax = maxHiveHp(); hiveHp = hiveMax;
  wave = 0; attacking = 0; isBoss = false; inWave = false;
  enemies = []; bullets = []; waveEnemies = 0; spawnLeft = 0;
  forgeT = FORGE_BASE_SEC * Math.max(0.4, fireRateMult()); forgeReady = false;
  sel = -1; drag = null; reviveUsed = false;
  reward = null; toast = null; tierFx = null;
  layout();
  gs = 'PLAYING';
  GF.gameStarted();
  saveRun();
}

function startWave() {
  if (inWave || gs !== 'PLAYING') return;
  attacking = wave + 1;
  isBoss = (attacking % BOSS_EVERY === 0);
  inWave = true;
  waveEnemies = isBoss ? 1 : (WAVE_COUNT_BASE + attacking * 2);
  spawnLeft = waveEnemies; spawnT = 0;
  GF.sfx('unlock');
}

// roster mix per wave (ported from Spore Guard escalation)
function pickEnemyType() {
  var w = attacking;
  if (isBoss) return 'BOSS';
  var roll = Math.random();
  if (w <= 2) return 'BASIC';
  if (w <= 4) return roll < 0.7 ? 'BASIC' : 'FAST';
  if (w <= 6) return roll < 0.5 ? 'BASIC' : (roll < 0.8 ? 'TANK' : 'FAST');
  if (w <= 8) return roll < 0.4 ? 'TANK' : (roll < 0.7 ? 'FAST' : (roll < 0.9 ? 'SLIME' : 'BASIC'));
  return roll < 0.35 ? 'TANK' : (roll < 0.6 ? 'FAST' : (roll < 0.85 ? 'SLIME' : 'BASIC'));
}
function hpScale() { return 1 + (attacking - 1) * WAVE_HP_PER_WAVE; }
function spdScale() { return 1 + (attacking - 1) * WAVE_SPD_PER_WAVE; }
function spawnEnemy(type, x) {
  var d = EN[type];
  var W = GF.W, S = GF.S;
  var hp = d.hp * hpScale() * (d.boss ? (1 + Math.floor(attacking / BOSS_EVERY) * 0.8) : 1);
  var col = (x == null) ? (board.x + 12 * S + Math.random() * (board.w - 24 * S)) : x;
  enemies.push({
    type: type, def: d, x: col, y: board.top + (Math.random() - 0.5) * 14 * S,
    hp: hp, max: hp, spd: d.spd * spdScale() * S, r: d.r * S,
    boss: !!d.boss, splits: !!d.splits, hitFlash: 0, wob: Math.random() * 6,
  });
}

// per-type damage tally for the death diagnosis (exactly like step-1 diagnoseDeath)
var damageByType = {};
function hiveTakeDamage(type, amt) {
  hiveHp -= amt;
  damageByType[type] = (damageByType[type] || 0) + amt;
  GF.setShake(0.3);
  if (hiveHp <= 0) { hiveHp = 0; die(); }
}

function diagnoseDeath() {
  var entries = []; for (var k in damageByType) if (damageByType[k] > 0) entries.push([k, damageByType[k]]);
  if (!entries.length) return 'OVERWHELMED';
  var total = 0; for (var i = 0; i < entries.length; i++) total += entries[i][1];
  entries.sort(function (a, b) { return b[1] - a[1]; });
  if (entries[0][1] / total < 0.45) return 'OVERWHELMED';
  return entries[0][0];
}
function recommendOrgan(cause) {
  var primary = COUNTER_ORGAN[cause] || 'carapace';
  if (!organMaxed(primary)) return primary;
  // primary maxed -> cheapest non-maxed organ
  var best = null, bc = Infinity;
  for (var i = 0; i < ORGANS.length; i++) {
    var id = ORGANS[i].id; if (organMaxed(id)) continue;
    var c = organCost(id, organLevel(id)); if (c < bc) { bc = c; best = id; }
  }
  return best || primary;
}

// DEATH: bank the run's ephemeral biomass into the permanent bank (EVERY death).
function die() {
  if (gs !== 'PLAYING') return;
  if (wave > bestWave) bestWave = wave;
  var cause = diagnoseDeath();
  genome.lastDeathCause = cause;
  // bank EVERY death (the validated rule). lastBanked drives the end-screen line.
  var toBank = Math.floor(biomass);
  genome.lastBanked = toBank;
  genome.biomassBank += toBank;
  genome.totalBiomassBanked += toBank;
  // Zero the ephemeral run currency now that it is banked, so a rewarded REVIVE
  // (which carries the run forward) cannot bank the same biomass a second time on
  // the next death. (Codex review 2026-06-09.)
  biomass = 0;
  suggestOrgan = recommendOrgan(cause);
  gs = 'GAMEOVER';
  enemies = []; bullets = []; inWave = false;
  GF.sfx('lose'); GF.setShake(1.0);
  // save BEFORE the ad — an ad callback can suspend/navigate the page.
  saveRun();
  GF.gameEnded();
  GF.ads && GF.ads.interstitial && GF.ads.interstitial();
}

function reviveRun() {
  // rewarded revive: restore half hive, clear the field, keep the BOARD. Run
  // biomass was already banked + zeroed in die(), so revive carries no ephemeral
  // currency forward (it re-accumulates from the next kills) — no double-bank.
  hiveHp = Math.max(1, Math.round(maxHiveHp() * REVIVE_HP_FRAC));
  enemies = []; bullets = []; inWave = false; attacking = wave;
  reviveUsed = true;
  gs = 'PLAYING';
  GF.sfx('reward'); GF.gameStarted();
  saveRun();
}

function showToast(msg, col) { toast = { t: 1.6, msg: msg, col: col || '#cfe' }; }

// ── ECONOMY ACTIONS ────────────────────────────────────────────────────────
function tapForge() {
  if (!forgeReady) return;
  if (!emptyCells().length) { showToast(GF.t('board_full'), '#ff9a6a'); GF.sfx('error'); return; }
  placeSpore(1); forgeReady = false; forgeT = FORGE_BASE_SEC * Math.max(0.4, fireRateMult());
  GF.sfx('spawn'); saveRun();
}
function buyShopSpore() {
  var c = shopCost();
  if (biomass < c) { showToast(GF.t('need_biomass').replace('%n', c), '#ff7a6a'); GF.sfx('error'); return; }
  if (!emptyCells().length) { showToast(GF.t('board_full'), '#ff9a6a'); GF.sfx('error'); return; }
  biomass -= c; placeSpore(1); GF.sfx('coin'); saveRun();
}
function buyOrgan(id) {
  var chk = canBuyOrgan(id);
  if (!chk.ok) {
    if (chk.reason === 'noBiomass') { showToast(GF.t('need_biomass').replace('%n', chk.cost), '#ff7a6a'); GF.sfx('error'); }
    else GF.sfx('error');
    return;
  }
  genome.biomassBank -= chk.cost;
  genome.organs[id] = organLevel(id) + 1;
  GF.sfx('evolve'); GF.setShake(0.3);
  if (suggestOrgan === id && organMaxed(id)) suggestOrgan = null;
  saveRun();
}
function buyGeneSlot() {
  var c = nextSlotCost();
  if (c == null || genome.biomassBank < c) { GF.sfx('error'); return; }
  genome.biomassBank -= c; genome.geneSlots++;
  GF.sfx('reward'); GF.setShake(0.4); saveRun();
}

// ── INPUT (per-click scale math; drag = move/merge, tap = buttons) ──────────
var pointerDown = false;
function evtPos(e) {
  var rect = GF.canvas.getBoundingClientRect();
  var sx = GF.canvas.width / rect.width, sy = GF.canvas.height / rect.height;
  // touchend carries an empty `touches` list but a populated `changedTouches`,
  // so prefer whichever TouchList actually has a point; fall back to mouse coords.
  var t = (e.touches && e.touches.length) ? e.touches[0]
        : (e.changedTouches && e.changedTouches.length) ? e.changedTouches[0]
        : null;
  var cx = t ? t.clientX : e.clientX, cy = t ? t.clientY : e.clientY;
  if (cx == null || cy == null) return { x: -1, y: -1 };
  return { x: (cx - rect.left) * sx, y: (cy - rect.top) * sy };
}
function hit(r, x, y) { return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

function onDown(x, y) {
  // mute is always live
  if (hit(muteBtn, x, y)) { var m = GF.toggleMute(); GF.setMusicMuted(m); GF.sfx('click'); return; }

  // tutorial routing first
  if (GF.tutorial.active) {
    var stp = GF.tutorial.steps[GF.tutorial.step];
    var sb = GF.tutorial._skipBtn;
    if (sb && x >= sb.x && x <= sb.x + sb.w && y >= sb.y && y <= sb.y + sb.h) { GF.tutorial.handleClick(x, y); coachActive = false; markTut(); return; }
    if (stp && stp.advance !== 'manual') { GF.tutorial.handleClick(x, y); return; }
    // manual steps (merge / forge / wave) fall through to the real action
  }

  if (gs === 'MENU') { if (hit(menuPlayBtn, x, y)) { startGame(); maybeStartTutorial(); } return; }
  if (gs === 'GAMEOVER') {
    if (hit(retryBtn, x, y)) { startGame(); return; }
    if (!reviveUsed && hit(reviveBtn, x, y)) { doRevive(); return; }
    return;
  }
  if (gs === 'ORGANS') {
    if (hit(organCloseBtn, x, y)) { gs = 'PLAYING'; GF.sfx('click'); saveRun(); return; }
    if (nextSlotCost() != null && hit(slotBuyBtn, x, y)) { buyGeneSlot(); return; }
    for (var oc = 0; oc < organCards.length; oc++) { if (hit(organCards[oc], x, y)) { buyOrgan(organCards[oc].id); return; } }
    return;
  }

  // ── PLAYING ──
  if (hit(helpBtn, x, y) && !GF.tutorial.active) { reopenTut(); return; }
  if (hit(waveBtn, x, y) && !inWave) {
    if (GF.tutorial.active) { var sw = GF.tutorial.steps[GF.tutorial.step]; if (sw && sw._isWave) { GF.tutorial.next(); coachActive = GF.tutorial.active; markTut(); } }
    startWave(); return;
  }
  if (hit(forgeBtn, x, y)) {
    if (GF.tutorial.active) { var sf = GF.tutorial.steps[GF.tutorial.step]; if (sf && sf._isForge) { GF.tutorial.next(); coachActive = GF.tutorial.active; markTut(); } }
    tapForge(); return;
  }
  if (hit(shopBtn, x, y)) { buyShopSpore(); return; }
  if (hit(organsBtn, x, y)) { openOrgans(); return; }

  // grid: pick up a spore to drag (merge/move)
  var ci = cellAt(x, y);
  if (ci >= 0 && grid[ci] > 0) {
    drag = { tier: grid[ci], from: ci, x: x, y: y };
    grid[ci] = 0; sel = ci; GF.sfx('tap');
  }
}
function onMove(x, y) { if (drag) { drag.x = x; drag.y = y; } }
function onUp(x, y) {
  if (!drag) return;
  var d = drag; drag = null; sel = -1;
  var ci = cellAt(x, y);
  if (ci < 0) { grid[d.from] = d.tier; saveRun(); return; }            // dropped off-grid -> return
  if (ci === d.from) { grid[d.from] = d.tier; return; }                // back on itself
  if (grid[ci] === 0) { grid[ci] = d.tier; GF.sfx('tap'); saveRun(); } // move
  else if (grid[ci] === d.tier && d.tier < MAX_TIER) {                 // MERGE
    grid[ci] = d.tier + 1;
    var rc = cellRect(ci);
    GF.spawnParticles(rc.cx, rc.cy, TIER_COL[d.tier + 1], 10);
    GF.sfx('merge'); GF.setShake(0.2);
    if (d.tier + 1 === MAX_TIER) { tierFx = { t: 1.6 }; GF.sfx('levelup'); }
    // tutorial merge step advances on a real merge
    if (GF.tutorial.active) { var sm = GF.tutorial.steps[GF.tutorial.step]; if (sm && sm._isMerge) { GF.tutorial.next(); coachActive = GF.tutorial.active; markTut(); } }
    saveRun();
  } else {                                                             // swap
    var tmp = grid[ci]; grid[ci] = d.tier; grid[d.from] = tmp; GF.sfx('tap'); saveRun();
  }
}

GF.canvas.addEventListener('mousedown', function (e) { e.preventDefault(); var p = evtPos(e); pointerDown = true; onDown(p.x, p.y); });
window.addEventListener('mousemove', function (e) { if (!pointerDown) return; var p = evtPos(e); onMove(p.x, p.y); });
window.addEventListener('mouseup', function (e) { if (!pointerDown) return; pointerDown = false; var p = evtPos(e); onUp(p.x, p.y); });
GF.canvas.addEventListener('touchstart', function (e) { e.preventDefault(); var p = evtPos(e); pointerDown = true; onDown(p.x, p.y); }, { passive: false });
GF.canvas.addEventListener('touchmove', function (e) { e.preventDefault(); if (!pointerDown) return; var p = evtPos(e); onMove(p.x, p.y); }, { passive: false });
GF.canvas.addEventListener('touchend', function (e) { e.preventDefault(); if (!pointerDown) return; pointerDown = false; var p = evtPos(e); onUp(p.x, p.y); }, { passive: false });
GF.canvas.addEventListener('wheel', function (e) { if (gs === 'ORGANS' && organScroll) organScroll.handleWheel(e.deltaY); }, { passive: true });

// rewarded revive with the gf-lib no-fill watchdog baked in (GF.rewardedAd).
function doRevive() {
  GF.rewardedAd(function () { reviveRun(); }, function () { /* no fill: stay on game-over */ });
}

function openOrgans() {
  gs = 'ORGANS'; GF.sfx('click');
  if (GF.tutorial && GF.tutorial.active) GF.tutorial.active = false;
  saveRun();
}

// ── UPDATE ─────────────────────────────────────────────────────────────────
function update(dt) {
  GF.tutorial.update(dt);
  if (toast) { toast.t -= dt; if (toast.t <= 0) toast = null; }
  if (reward) { reward.t -= dt; if (reward.t <= 0) reward = null; }
  if (tierFx) { tierFx.t -= dt; if (tierFx.t <= 0) tierFx = null; }
  if (gs !== 'PLAYING') return;
  if (GF.tutorial.active) return;  // freeze the world between tutorial steps

  // forge timer
  if (!forgeReady) { forgeT -= dt; if (forgeT <= 0) { forgeReady = true; GF.sfx('pickup'); } }

  // hive regen (regrowth organ)
  var rg = hiveRegen(); if (rg > 0 && hiveHp < maxHiveHp()) hiveHp = Math.min(maxHiveHp(), hiveHp + rg * dt);

  stepWave(dt);
}

function stepWave(dt) {
  // spawn
  if (inWave) {
    if (isBoss) { if (spawnLeft > 0 && enemies.length === 0) { spawnEnemy('BOSS', GF.W / 2); spawnLeft = 0; GF.sfx('boss'); GF.setShake(0.6); } }
    else { spawnT -= dt; if (spawnLeft > 0 && spawnT <= 0) { spawnEnemy(pickEnemyType()); spawnLeft--; spawnT = Math.max(0.32, 1.3 - attacking * 0.04); } }
  }

  // move enemies toward the membrane line
  for (var e = 0; e < enemies.length; e++) { enemies[e].y += enemies[e].spd * dt; if (enemies[e].hitFlash > 0) enemies[e].hitFlash -= dt; }

  // spores auto-fire at the FRONT (closest to the membrane) enemy
  var tdps = totalDps();
  if (enemies.length && tdps > 0 && inWave) {
    var front = enemies[0]; for (var q = 1; q < enemies.length; q++) if (enemies[q].y > front.y) front = enemies[q];
    front.hp -= tdps * dt; front.hitFlash = 0.08;
    // occasional tracer from a random live spore for the firing read
    if (Math.random() < 0.30) {
      var gi = []; for (var gg = 0; gg < cellCount(); gg++) if (grid[gg] > 0) gi.push(gg);
      if (gi.length) { var rc = cellRect(gi[(Math.random() * gi.length) | 0]); bullets.push({ x: rc.cx, y: rc.cy, tx: front.x, ty: front.y, life: 0.12, col: TIER_COL[grid[gi[0]]] || '#3dffa0' }); GF.sfx('hit'); }
    }
    // collect dead
    var dead = [];
    for (var d2 = 0; d2 < enemies.length; d2++) if (enemies[d2].hp <= 0) dead.push(enemies[d2]);
    for (var dd = 0; dd < dead.length; dd++) {
      var en = dead[dd];
      var gain = Math.max(1, Math.round(BIOMASS_PER_KILL * (en.boss ? 14 : (en.type === 'TANK' ? 3 : 1)) * biomassMult()));
      biomass += gain;
      GF.spawnParticles(en.x, en.y, en.def.col, en.boss ? 16 : 6);
      GF.spawnFloat(en.x, en.y - en.r, '+' + gain, '#9effc8');
      if (en.boss) { GF.sfx('reward'); GF.setShake(0.7); } else GF.sfx('hit');
      // SLIME splits into two weak BASICs on death (ported behaviour)
      if (en.splits && attacking >= 7) {
        for (var sp = 0; sp < 2; sp++) { var nx = en.x + (sp ? 18 : -18) * GF.S; spawnEnemy('BASIC', nx); var ne = enemies[enemies.length - 1]; ne.y = en.y; ne.hp = ne.max = EN.BASIC.hp * 0.6 * hpScale(); }
      }
    }
    if (dead.length) enemies = enemies.filter(function (x) { return dead.indexOf(x) < 0; });
  }

  // breaches: enemy crosses the membrane line -> hive takes damage, enemy removed
  if (inWave) {
    var breached = enemies.filter(function (x) { return x.y >= board.line; });
    for (var b = 0; b < breached.length; b++) hiveTakeDamage(breached[b].type, breached[b].def.dmg * (1 + (attacking - 1) * 0.12));
    if (breached.length) { enemies = enemies.filter(function (x) { return x.y < board.line; }); GF.spawnParticles(GF.W / 2, board.line, '#ff5d6c', 8); }
  }

  // bullets
  for (var bl = 0; bl < bullets.length; bl++) bullets[bl].life -= dt;
  bullets = bullets.filter(function (x) { return x.life > 0; });

  // wave clear
  if (inWave && spawnLeft === 0 && enemies.length === 0) winWave();
}

function winWave() {
  inWave = false;
  wave = attacking;
  if (wave > bestWave) bestWave = wave;
  var bonus = Math.round((8 + attacking * 4) * (isBoss ? 2 : 1) * biomassMult());
  biomass += bonus;
  reward = { t: 2.0, biomass: bonus, wave: wave, boss: isBoss };
  GF.sfx('win'); GF.setShake(0.5);
  enemies = []; bullets = [];
  saveRun();
}

// ── DRAW ───────────────────────────────────────────────────────────────────
function draw(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  // deep-space radial arena floor (2.5D depth: darker at edges, glow at centre)
  var bg = ctx.createRadialGradient(W / 2, board.top + (board.line - board.top) * 0.5, 10, W / 2, board.top, Math.max(W, H));
  bg.addColorStop(0, '#0a1426'); bg.addColorStop(0.6, '#070d1a'); bg.addColorStop(1, '#03050c');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  if (gs === 'PLAYING' || gs === 'ORGANS' || gs === 'GAMEOVER') {
    drawArena(ctx);
    drawBoard(ctx);
    drawEnemies(ctx);
    drawBullets(ctx);
    drawHud(ctx);
    drawButtons(ctx);
    if (drag) drawDragSpore(ctx);
    drawReward(ctx);
  }

  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
  if (gs === 'ORGANS') drawOrgansPanel(ctx);

  if (toast) drawToast(ctx);
  if (tierFx) drawTierFx(ctx);
  if (gs === 'PLAYING') { drawCornerBtns(ctx); }

  GF.tutorial.draw(ctx);
}

function drawArena(ctx) {
  var W = GF.W, S = GF.S;
  // swarm-path lane gridlines converging toward the membrane (perspective read)
  ctx.save();
  ctx.strokeStyle = 'rgba(80,140,200,0.07)'; ctx.lineWidth = 1;
  for (var c = 1; c < GRID_COLS; c++) {
    var x = board.x + c * board.w / GRID_COLS;
    ctx.beginPath(); ctx.moveTo(x, board.top); ctx.lineTo(x, board.line); ctx.stroke();
  }
  // depth bands
  for (var r = 0; r < 4; r++) {
    var y = board.top + (board.line - board.top) * (r / 4);
    ctx.globalAlpha = 0.05 + r * 0.012; ctx.strokeStyle = '#3a6ea5';
    ctx.beginPath(); ctx.moveTo(board.x, y); ctx.lineTo(board.x + board.w, y); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // hive membrane line (danger pulse when low)
  var danger = hiveHp <= maxHiveHp() * 0.3;
  var pulse = 0.5 + 0.5 * Math.sin(performance.now() / 200);
  var grd = ctx.createLinearGradient(0, board.line - 16 * S, 0, board.line);
  grd.addColorStop(0, 'rgba(0,0,0,0)'); grd.addColorStop(1, danger ? 'rgba(255,70,90,' + (0.18 + 0.18 * pulse) + ')' : 'rgba(61,255,160,0.14)');
  ctx.fillStyle = grd; ctx.fillRect(board.x, board.line - 16 * S, board.w, 16 * S);
  ctx.strokeStyle = danger ? '#ff5d6c' : '#3dffa0'; ctx.lineWidth = 2.5 * S;
  ctx.setLineDash([10 * S, 7 * S]); ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.moveTo(board.x, board.line); ctx.lineTo(board.x + board.w, board.line); ctx.stroke();
  ctx.shadowBlur = 0; ctx.setLineDash([]);
  ctx.restore();
}

function drawBoard(ctx) {
  var S = GF.S, firing = enemies.length > 0;
  for (var i = 0; i < cellCount(); i++) {
    var rc = cellRect(i), tt = grid[i], on = (i === sel);
    // cell platform (rounded, gradient, drop shadow = 2.5D)
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    GF.rr(ctx, rc.x + 2 * S, rc.y + rc.h * 0.62, rc.w, rc.h * 0.5, 8 * S); ctx.fill();
    var pg = ctx.createLinearGradient(0, rc.y, 0, rc.y + rc.h);
    pg.addColorStop(0, on ? '#1b3358' : '#10192b'); pg.addColorStop(1, on ? '#11223f' : '#0a1019');
    ctx.fillStyle = pg; GF.rr(ctx, rc.x, rc.y, rc.w, rc.h, 9 * S); ctx.fill();
    ctx.lineWidth = on ? 2.5 : 1; ctx.strokeStyle = on ? '#ffd86b' : '#243247'; GF.rr(ctx, rc.x, rc.y, rc.w, rc.h, 9 * S); ctx.stroke();
    ctx.restore();
    if (tt > 0) drawSpore(ctx, rc.cx, rc.cy - rc.h * 0.06, Math.min(rc.w, rc.h) * 0.5, tt, firing);
    else { ctx.strokeStyle = 'rgba(120,160,200,0.12)'; ctx.lineWidth = 1; ctx.setLineDash([3 * S, 4 * S]); ctx.beginPath(); ctx.arc(rc.cx, rc.cy, rc.w * 0.22, 0, 7); ctx.stroke(); ctx.setLineDash([]); }
  }
}

// spore organism: glowing nucleus + tier-count flagella + depth shadow.
function drawSpore(ctx, x, y, R, tier, firing) {
  var col = TIER_COL[tier] || '#3dffa0';
  var tm = performance.now() / 1000;
  var pulse = 1 + Math.sin(tm * 2 + tier) * 0.05;
  R *= pulse;
  ctx.save(); ctx.translate(x, y);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0, R * 0.78, R * 1.0, R * 0.42, 0, 0, 7); ctx.fill();
  // glow aura
  var ga = ctx.createRadialGradient(0, 0, R * 0.2, 0, 0, R * 1.9);
  ga.addColorStop(0, hexA(col, Math.min(0.5, 0.14 + tier * 0.05))); ga.addColorStop(1, hexA(col, 0));
  ctx.fillStyle = ga; ctx.beginPath(); ctx.arc(0, 0, R * 1.9, 0, 7); ctx.fill();
  // flagella (one per tier, wobbling)
  var fl = Math.min(MAX_TIER, tier);
  ctx.strokeStyle = hexA(col, 0.8); ctx.lineWidth = Math.max(1.5, R * 0.12); ctx.lineCap = 'round';
  for (var k = 0; k < fl; k++) {
    var a = (k / fl) * Math.PI * 2 + tm * 0.5;
    var len = R * (1.05 + 0.18 * Math.sin(tm * 3 + k));
    ctx.beginPath(); ctx.moveTo(Math.cos(a) * R * 0.7, Math.sin(a) * R * 0.7);
    ctx.quadraticCurveTo(Math.cos(a) * len * 1.2, Math.sin(a) * len * 1.2, Math.cos(a + 0.2) * len, Math.sin(a + 0.2) * len);
    ctx.stroke();
  }
  // body
  var bd = ctx.createRadialGradient(-R * 0.3, -R * 0.4, R * 0.2, 0, 0, R);
  bd.addColorStop(0, light(col, 0.5)); bd.addColorStop(1, dark(col, 0.45));
  ctx.fillStyle = bd; ctx.beginPath(); ctx.arc(0, 0, R, 0, 7); ctx.fill();
  ctx.lineWidth = 1.5; ctx.strokeStyle = dark(col, 0.5); ctx.beginPath(); ctx.arc(0, 0, R, 0, 7); ctx.stroke();
  // nucleus + highlight
  ctx.fillStyle = hexA('#04221a', 0.85); ctx.beginPath(); ctx.arc(0, 0, R * 0.42, 0, 7); ctx.fill();
  ctx.fillStyle = light(col, 0.7); ctx.beginPath(); ctx.arc(0, 0, R * 0.24, 0, 7); ctx.fill();
  if (firing) { var fp = 0.5 + 0.5 * Math.sin(performance.now() / 80 + tier); ctx.fillStyle = hexA('#ffffff', 0.4 * fp); ctx.beginPath(); ctx.arc(0, -R * 0.55, R * 0.2, 0, 7); ctx.fill(); }
  ctx.restore();
  // tier badge
  ctx.fillStyle = 'rgba(6,10,16,0.8)'; GF.rr(ctx, x - 11 * GF.S, y + R - 2 * GF.S, 22 * GF.S, 13 * GF.S, 6 * GF.S); ctx.fill();
  ctx.fillStyle = col; ctx.font = 'bold ' + (9 * GF.S | 0) + 'px Inter, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

// depth-scaled swarm silhouettes (scale up as they approach the membrane = 2.5D).
function drawEnemies(ctx) {
  for (var i = 0; i < enemies.length; i++) {
    var en = enemies[i], d = en.def;
    var depth = GF.clamp((en.y - board.top) / Math.max(1, board.line - board.top), 0, 1);
    var R = en.r * (0.78 + depth * 0.34);
    ctx.save(); ctx.translate(en.x, en.y);
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.32)'; ctx.beginPath(); ctx.ellipse(0, R * 0.7, R * 0.95, R * 0.4, 0, 0, 7); ctx.fill();
    var c1 = en.hitFlash > 0 ? '#ffffff' : light(d.col, 0.35), c2 = dark(d.col, 0.4);
    var bd = ctx.createRadialGradient(-R * 0.3, -R * 0.4, R * 0.2, 0, 0, R * 1.05);
    bd.addColorStop(0, c1); bd.addColorStop(1, c2);
    ctx.fillStyle = bd;
    var tm = performance.now() / 1000;
    if (d.key === 'BASIC') { // circle + spikes
      var wob = Math.sin(tm * 6 + en.wob) * 0.1;
      ctx.beginPath(); ctx.ellipse(0, 0, R * (1 + wob), R * (1 - wob), 0, 0, 7); ctx.fill();
      ctx.strokeStyle = c2; ctx.lineWidth = 2;
      for (var s = 0; s < 4; s++) { var a = s / 4 * Math.PI * 2 + tm; ctx.beginPath(); ctx.moveTo(Math.cos(a) * R, Math.sin(a) * R); ctx.lineTo(Math.cos(a) * R * 1.5, Math.sin(a) * R * 1.5); ctx.stroke(); }
    } else if (d.key === 'FAST') { // teardrop
      ctx.beginPath(); ctx.moveTo(0, -R * 1.4); ctx.quadraticCurveTo(R, -R * 0.2, 0, R); ctx.quadraticCurveTo(-R, -R * 0.2, 0, -R * 1.4); ctx.fill();
    } else if (d.key === 'TANK') { // heavy ring
      ctx.beginPath(); ctx.arc(0, 0, R, 0, 7); ctx.fill();
      ctx.strokeStyle = c2; ctx.lineWidth = R * 0.28; ctx.beginPath(); ctx.arc(0, 0, R * 0.82, 0, 7); ctx.stroke();
    } else if (d.key === 'SLIME') { // wobbly blob (sine control points)
      ctx.beginPath();
      for (var ang = 0; ang <= 6.3; ang += 0.4) { var rr = R * (1 + 0.12 * Math.sin(ang * 3 + tm * 4)); var px = Math.cos(ang) * rr, py = Math.sin(ang) * rr; if (ang === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }
      ctx.closePath(); ctx.fill();
    } else if (d.key === 'BOSS') { // big + rotating arms + crown
      ctx.beginPath(); ctx.arc(0, 0, R, 0, 7); ctx.fill();
      ctx.strokeStyle = c2; ctx.lineWidth = R * 0.18;
      for (var b = 0; b < 8; b++) { var aa = b / 8 * Math.PI * 2 + tm * 0.8; ctx.beginPath(); ctx.moveTo(Math.cos(aa) * R, Math.sin(aa) * R); ctx.lineTo(Math.cos(aa) * R * 1.5, Math.sin(aa) * R * 1.5); ctx.stroke(); }
    }
    // eyes
    if (d.key !== 'TANK') { ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-R * 0.3, -R * 0.1, R * 0.18, 0, 7); ctx.arc(R * 0.3, -R * 0.1, R * 0.18, 0, 7); ctx.fill(); ctx.fillStyle = '#0a0a12'; ctx.beginPath(); ctx.arc(-R * 0.3, -R * 0.1, R * 0.09, 0, 7); ctx.arc(R * 0.3, -R * 0.1, R * 0.09, 0, 7); ctx.fill(); }
    ctx.restore();
    // hp bar
    var bw = (en.boss ? R * 2.2 : R * 1.8);
    ctx.fillStyle = '#000'; ctx.fillRect(en.x - bw / 2, en.y - R - 8 * GF.S, bw, en.boss ? 5 : 3.5);
    ctx.fillStyle = (en.hp / en.max) > 0.4 ? '#6fd08a' : '#ffcf5c'; ctx.fillRect(en.x - bw / 2, en.y - R - 8 * GF.S, bw * Math.max(0, en.hp / en.max), en.boss ? 5 : 3.5);
  }
}

function drawBullets(ctx) {
  for (var i = 0; i < bullets.length; i++) {
    var b = bullets[i], a = Math.max(0, b.life / 0.12);
    ctx.save(); ctx.globalAlpha = a; ctx.strokeStyle = b.col; ctx.lineWidth = 2.5 * GF.S; ctx.shadowColor = b.col; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.tx, b.ty); ctx.stroke();
    ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.tx, b.ty, 2.6 * GF.S, 0, 7); ctx.fill(); ctx.restore();

}

// ── HUD ────────────────────────────────────────────────────────────────────
function drawHud(ctx) {

function drawGameOver(ctx) {

  }

// ── GENOME PANEL (slot-gated organ upgrades + evolving creature) ───────────
function drawOrgansPanel(ctx) {

  ctx.fillStyle = '#9effc8'; ctx.font = 'bold ' + (clampFs(13, S)) + 'px Inter, sans-serif'; ctx.textAlign = 'right';

  drawOrganCards(ctx);
}

function drawOrganCards(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  var listTop = (nextSlotCost() != null ? slotBuyBtn.y + slotBuyBtn.h : H * 0.30) + 12 * S;
  var listH = H - listTop - 10 * S;
  var cardH = 70 * S, gap = 8 * S;
  if (!organScroll) organScroll = GF.makeScroll('genome_list', { x: 10 * S, y: listTop, w: W - 20 * S, h: listH });
  organScroll.setViewport({ x: 10 * S, y: listTop, w: W - 20 * S, h: listH });
  organScroll.setContentHeight(ORGANS.length * (cardH + gap));
  organScroll.update();
  organCards = [];
  organScroll.begin(ctx);
  for (var i = 0; i < ORGANS.length; i++) {
    var def = ORGANS[i];
    // CONTENT space: begin() already translates by (vp.y - offset), so content-y 0
    // renders at the viewport top (listTop). Draw at i*(cardH+gap); the SCREEN-space
    // hit rect is listTop + cy - offset.
    var cy = i * (cardH + gap);
    var screenY = listTop + cy - organScroll.offset;

function organDisplayVal(def) { return def.displayMode === 'percent' ? Math.round(def.effectPerLevel * 100) : def.effectPerLevel; }

// the creature: emerald core + one wobbling limb per GROWN organ (its colour).
function drawCreature(ctx, cx, cy, R) {
  var tm = performance.now() / 1000;
  var grownList = []; for (var i = 0; i < ORGANS.length; i++) if (organLevel(ORGANS[i].id) > 0) grownList.push(ORGANS[i]);
  ctx.save(); ctx.translate(cx, cy);
  // backdrop glow
  var bg = ctx.createRadialGradient(0, 0, 0, 0, 0, R * 2.4);
  bg.addColorStop(0, 'rgba(16,185,129,0.12)'); bg.addColorStop(1, 'rgba(2,6,23,0)');
  ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(0, 0, R * 2.4, 0, 7); ctx.fill();
  // limbs
  for (var g = 0; g < grownList.length; g++) {
    var organ = grownList[g], lvl = organLevel(organ.id);
    var baseA = (g / Math.max(1, grownList.length)) * Math.PI * 2 - Math.PI / 2;
    var tendrils = Math.min(5, 1 + Math.floor(lvl / 2));
    var len = R + 8 + lvl * 4;
    ctx.strokeStyle = organ.color; ctx.lineWidth = 3; ctx.lineCap = 'round';
    for (var k = 0; k < tendrils; k++) {
      var spread = (k - (tendrils - 1) / 2) * 0.28;
      var a = baseA + spread + Math.sin(tm + g + k) * 0.06;
      var ex = Math.cos(a) * len, ey = Math.sin(a) * len;
      var mx = Math.cos(a) * len * 0.55 + Math.cos(a + 1.6) * 6 * Math.sin(tm + k);
      var my = Math.sin(a) * len * 0.55 + Math.sin(a + 1.6) * 6 * Math.sin(tm + k);
      ctx.globalAlpha = 0.85; ctx.beginPath(); ctx.moveTo(Math.cos(a) * R, Math.sin(a) * R); ctx.quadraticCurveTo(mx, my, ex, ey); ctx.stroke();
      ctx.globalAlpha = 1; ctx.fillStyle = organ.color; ctx.beginPath(); ctx.arc(ex, ey, 3.5, 0, 7); ctx.fill();
    }
  }
  // core
  var pulse = 1 + Math.sin(tm * 1.5) * 0.04;
  var grad = ctx.createRadialGradient(-6, -6, 2, 0, 0, R * pulse);
  grad.addColorStop(0, '#6ee7b7'); grad.addColorStop(0.6, '#10b981'); grad.addColorStop(1, '#047857');
  ctx.beginPath(); ctx.arc(0, 0, R * pulse, 0, 7); ctx.fillStyle = grad; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(110,231,183,0.7)'; ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, R * 0.27, 0, 7); ctx.fillStyle = 'rgba(2,44,34,0.85)'; ctx.fill();
  ctx.restore();
}

// ── BIG BUTTON (PLAY / GO AGAIN with breathing pulse) ──────────────────────
function drawBigBtn(ctx, r, label, pulse) {
  var S = GF.S;
  var k = pulse ? Math.sin(performance.now() / 1000 * 2.2) : 0, p = 1 + 0.045 * k;
  var w = r.w * p, h = r.h * p, x = r.x + r.w / 2 - w / 2, y = r.y + r.h / 2 - h / 2;
  var grad = ctx.createLinearGradient(x, y, x, y + h); grad.addColorStop(0, '#3dffa0'); grad.addColorStop(1, '#1fae67');
  ctx.save(); ctx.shadowColor = 'rgba(61,255,160,' + (0.4 + 0.25 * k).toFixed(2) + ')'; ctx.shadowBlur = (20 + 10 * k) * S;
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fillStyle = grad; ctx.fill(); ctx.restore();
  ctx.fillStyle = '#04210f'; ctx.font = 'bold ' + (clampFs(20, S)) + 'px Inter, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, r.x + r.w / 2, r.y + r.h / 2 + 1); ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
}

// ── small DNA pip glyph (vector, never emoji) ──────────────────────────────
function drawDnaPip(ctx, x, y, r, col) {
  ctx.save(); ctx.strokeStyle = col; ctx.lineWidth = Math.max(1, r * 0.3); ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x - r, y - r); ctx.quadraticCurveTo(x + r, y, x - r, y + r); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + r, y - r); ctx.quadraticCurveTo(x - r, y, x + r, y + r); ctx.stroke();
  ctx.lineWidth = Math.max(0.8, r * 0.22);
  ctx.beginPath(); ctx.moveTo(x - r * 0.6, y - r * 0.5); ctx.lineTo(x + r * 0.6, y - r * 0.5); ctx.moveTo(x - r * 0.6, y + r * 0.5); ctx.lineTo(x + r * 0.6, y + r * 0.5); ctx.stroke();
  ctx.restore();

// ── UTILS ──────────────────────────────────────────────────────────────────
function clampFs(base, S) { return (GF.clamp(base * S, base * 0.7, base * 1.5)) | 0; }
function wrapText(ctx, text, x, y, maxW, lineH) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; } else cur = probe;
  }
  if (cur) lines.push(cur);
  for (var j = 0; j < lines.length; j++) ctx.fillText(lines[j], x, y + j * lineH);
}
function fmtNum(n) { n = Math.floor(n); if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M'; if (n >= 1e4) return (n / 1e3).toFixed(1) + 'k'; return '' + n; }
function fmtTime(s) { s = Math.max(0, Math.ceil(s)); var m = (s / 60) | 0, ss = s % 60; return m > 0 ? (m + ':' + (ss < 10 ? '0' : '') + ss) : (ss + 's'); }
function hx(c) { c = c.replace('#', ''); if (c.length === 3) c = c.split('').map(function (x) { return x + x; }).join(''); return [parseInt(c.slice(0, 2), 16), parseInt(c.slice(2, 4), 16), parseInt(c.slice(4, 6), 16)]; }
function hexA(c, a) { var p = hx(c); return 'rgba(' + p[0] + ',' + p[1] + ',' + p[2] + ',' + a + ')'; }
function light(c, f) { var p = hx(c); f = (f == null) ? 0.45 : f; return 'rgb(' + Math.round(GF.lerp(p[0], 255, f)) + ',' + Math.round(GF.lerp(p[1], 255, f)) + ',' + Math.round(GF.lerp(p[2], 255, f)) + ')'; }
function dark(c, f) { var p = hx(c); f = (f == null) ? 0.45 : f; return 'rgb(' + Math.round(GF.lerp(p[0], 0, f)) + ',' + Math.round(GF.lerp(p[1], 0, f)) + ',' + Math.round(GF.lerp(p[2], 0, f)) + ')'; }

// ── DAILY / IDLE come-back hooks ───────────────────────────────────────────
function applyDaily() {
  var today = new Date().toISOString().slice(0, 10);
  if (lastDaily === today) return;
  var yest = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
  streak = (lastDaily === yest) ? streak + 1 : 1;
  lastDaily = today;
  var add = 15 * Math.min(7, streak);
  genome.biomassBank += add;
  showToast(GF.t('daily').replace('%n', add).replace('%d', streak + 'd'), '#ffd86b');
  GF.sfx('reward');
  saveRun();
}
function applyOffline() {
  // light idle: bank a trickle for time away (cap 4h), keyed off totalDps proxy.
  if (!lastVisit) return 0;
  var hrs = Math.min(4, (Date.now() - lastVisit) / 3.6e6);
  if (hrs < 0.05) return 0;
  var rate = 6 + bestWave * 2;                 // biomass/hour proxy
  var earned = Math.round(rate * hrs * 0.2);   // 20% idle yield
  if (earned > 0) { genome.biomassBank += earned; showToast(GF.t('away').replace('%n', earned), '#9effc8'); }
  return earned;
}

GF.init({
  designW: DESIGN_W,
  designH: DESIGN_H,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: SAVE_KEY,
  onReady: function () {

        };
      },
      function (s) {
        if (!s) return;
        rows = s.rows || GRID_ROWS_START;
        grid = Array.isArray(s.grid) ? s.grid : [];
        biomass = (typeof s.biomass === 'number') ? s.biomass : 0;
        wave = s.wave || 0; bestWave = s.bestWave || 0;
        if (s.genome) {

          // clamp slots + organ levels to their caps (defends against corrupt/old saves)
          genome.geneSlots = Math.max(1, Math.min(GENE_SLOT_COUNT, s.genome.geneSlots || 1));
          genome.organs = {};
          for (var oi = 0; oi < ORGANS.length; oi++) {
            var oid = ORGANS[oi].id;
            var lv = (s.genome.organs && s.genome.organs[oid]) || 0;
            genome.organs[oid] = Math.max(0, Math.min(ORGANS[oi].maxLevel, lv));
          }
          genome.lastDeathCause = s.genome.lastDeathCause || 'NONE';
          genome.lastBanked = Math.max(0, s.genome.lastBanked || 0);
          genome.totalBiomassBanked = Math.max(0, s.genome.totalBiomassBanked || 0);
        }
        lastDaily = s.lastDaily || ''; streak = s.streak || 0; lastVisit = s.lastVisit || 0;
        // safe resume: never drop straight into an active wave; rebuild a clean PLAYING board.
        hiveMax = maxHiveHp();
        hiveHp = (typeof s.hiveHp === 'number' && s.hiveHp > 0) ? Math.min(s.hiveHp, hiveMax) : hiveMax;
        gs = (s.gs === 'PLAYING') ? 'PLAYING' : 'MENU';
        if (!grid.length || grid.length !== cellCount()) { grid = []; for (var i = 0; i < cellCount(); i++) grid.push(0); }
        inWave = false; enemies = []; bullets = []; attacking = 0;
        forgeT = FORGE_BASE_SEC; forgeReady = false;
      }
    );
    layout();
    // come-back hooks (idle trickle + daily streak) before the player sees the screen
    applyOffline();
    applyDaily();
    lastVisit = Date.now();

    GF.startMusic({ preset: 'synth', muted: GF.muted });

    // ── STATE EXPOSURE for the test gate / progression probe ──
    GF.exposeState(function () {
      return {
        gs: gs, rawGs: gs,
        wave: wave, bestWave: bestWave, biomass: Math.round(biomass),
        biomassBank: genome.biomassBank, geneSlots: genome.geneSlots, grownOrgans: grownOrganCount(),
        hiveHp: Math.round(hiveHp), hiveMax: Math.round(maxHiveHp()),

        forgeReady: forgeReady, totalBanked: genome.totalBiomassBanked,

        MAX_TIER: MAX_TIER, HIVE_HP_BASE: HIVE_HP_BASE, BOSS_EVERY: BOSS_EVERY,

      if (gs === 'ORGANS') {

      }

    });

      { name: 'gameover', go: function () { window._silent = true; if (gs === 'MENU') startGame(); window._silent = false; if (GF.tutorial) GF.tutorial.active = false; suggestOrgan = recommendOrgan('BASIC'); genome.lastDeathCause = 'BASIC'; gs = 'GAMEOVER'; } },
    ]);

// ── BOT (progression probe) ────────────────────────────────────────────────
function botActions() {
  var a = [];
  if (gs === 'MENU') a.push('start');
  else if (gs === 'GAMEOVER') a.push('retry');
  else if (gs === 'PLAYING') {
    if (forgeReady && emptyCells().length) a.push('forge');
    if (mergeablePair() >= 0) a.push('merge');
    if (biomass >= shopCost() && emptyCells().length) a.push('grow');
    if (genome.biomassBank > 0 && buyableOrgan()) a.push('organ');
    if (!inWave) a.push('wave');
  }
  return a;
}
function mergeablePair() {
  for (var tt = 1; tt < MAX_TIER; tt++) {
    var idx = []; for (var i = 0; i < cellCount(); i++) { if (grid[i] === tt) idx.push(i); if (idx.length === 2) return idx[0]; }
  }
  return -1;
}
function buyableOrgan() { for (var i = 0; i < ORGANS.length; i++) if (canBuyOrgan(ORGANS[i].id).ok) return ORGANS[i].id; return null; }
function botAct(action) {
  if (action === 'start') { window._silent = true; startGame(); window._silent = false; if (GF.tutorial) GF.tutorial.active = false; return; }
  if (action === 'retry') { window._silent = true; startGame(); window._silent = false; return; }
  if (action === 'forge') { forgeReady = true; tapForge(); return; }
  if (action === 'grow') { buyShopSpore(); return; }
  if (action === 'organ') { var o = buyableOrgan(); if (o) buyOrgan(o); return; }
  if (action === 'merge') {
    for (var tt = 1; tt < MAX_TIER; tt++) {
      var idx = []; for (var i = 0; i < cellCount(); i++) { if (grid[i] === tt) idx.push(i); if (idx.length === 2) break; }
      if (idx.length === 2) { grid[idx[1]] = tt + 1; grid[idx[0]] = 0; return; }
    }
    return;
  }
  if (action === 'wave') {
    if (GF.tutorial) GF.tutorial.active = false;
    startWave();
    // fast-forward the wave to resolution so the probe sees wave progression
    var guard = 0;
    while (inWave && gs === 'PLAYING' && guard < 6000) { stepWave(1 / 30); guard++; }
    return;
  }
}

// ── TEST / SCREENSHOT SEAMS ────────────────────────────────────────────────
window._jumpLevel = function (n) {
  if ((n | 0) >= 99) {
    if (gs === 'MENU' || gs === 'GAMEOVER') { window._silent = true; startGame(); window._silent = false; }
    if (GF.tutorial) GF.tutorial.active = false;
    // force a swarm breach for a real death (so the diagnosis CTA is populated)
    damageByType = { BASIC: 50 };
    hiveHp = 0; die();
  } else {
    window._setupForScreenshot((n | 0) > 0 ? (n | 0) : 4);
  }
};

// land mid-wave with a strong board + a live swarm crawling (>=70% gameplay).
window._setupForScreenshot = function (level) {
  window._silent = true; startGame(); window._silent = false;
  if (GF.tutorial) GF.tutorial.active = false; coachActive = false;
  var lv = (typeof level === 'number' && level > 0) ? level : 4;
  // grow a couple organs so the creature/HUD reads as a progressed save
  genome.organs = { toxin: 2, carapace: 1, husk: 1 }; genome.geneSlots = 3; genome.biomassBank = 240;
  hiveMax = maxHiveHp(); hiveHp = hiveMax * 0.8;
  rows = GRID_ROWS_START; grid = [];
  for (var i = 0; i < cellCount(); i++) grid.push(0);
  // a varied, merged board
  var fill = [4, 3, 3, 2, 2, 2, 1, 5, 1, 2, 3, 1];
  for (var f = 0; f < cellCount() && f < fill.length; f++) grid[f] = fill[f];
  wave = lv - 1; biomass = 180;
  startWave();
  // spawn a mid-wave swarm spread along the path
  var types = ['BASIC', 'FAST', 'TANK', 'SLIME', 'BASIC', 'FAST'];
  for (var t = 0; t < types.length; t++) { spawnEnemy(types[t]); var e = enemies[enemies.length - 1]; e.y = board.top + (board.line - board.top) * (0.2 + t * 0.11); }
  spawnLeft = 4;
  // step a little so bullets fly + depth scaling shows
  for (var s = 0; s < 18; s++) stepWave(1 / 30);
  window._screenshotFreeze = true;
};

window._smInfo = function () { try { return window.__gfState(); } catch (e) { return null; } };

})();
