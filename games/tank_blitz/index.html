    tut_win: 'Уничтожь все танки волны - откроется магазин, дальше волна сложнее.',

    tut_tip: 'Красные мигающие танки роняют бонусы: звезда качает пушку, лопата делает стену стальной.',
    ok: 'Понятно',
    p_STAR: 'Пушка мощнее!', p_SHIELD: 'Щит!', p_FREEZE: 'Заморозка!',
    p_SHOVEL: 'Стальная стена!', p_BOMB: 'Бум!', p_REPAIR: 'База починена',

    enemies_left: 'Враги', lives_lbl: 'Танки',

// AI sprites (chroma-keyed PNGs; every draw site keeps a vector fallback).
var SPRITE_NAMES = ['player_tank', 'scout_tank', 'brute_tank', 'boss_tank', 'base_star', 'crate'];

// ── TUNABLES (exposed via GF.exposeState for the gate / DESIGN cross-check) ─
var GRID_COLS = 9, GRID_ROWS = 14;
var MAX_LIVES = 3;
var BASE_HP_MAX = 3;
var PLAYER_SPEED = 3.3;          // cells/sec
var RELOAD_BASE = 0.62;          // sec between auto-shots
var SHELL_SPEED = 7.5;           // player shells, cells/sec
var ENEMY_SHELL_SPEED = 5.0;
var ENEMY_CAP = 4;               // on-screen cap (5 from wave 12)
var SPAWN_GAP = 2.1;             // sec between spawns
var BOSS_EVERY = 5;
var RED_DROP_CHANCE = 0.22;
var SALVAGE_PER_KILL = 6;        // scout baseline
var BASE_C = 4, BASE_R = 13;     // star bunker cell
var T_EMPTY = 0, T_BRICK = 1, T_STEEL = 2, T_WATER = 3, T_BUSH = 4;
var RING = [[3,12],[4,12],[5,12],[3,13],[5,13]];
var SPAWN_COLS = [0, 4, 8];
var SAVE_KEY = 'tank_blitz';
var FONT_BODY = 'system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif';

// ── STATE ────────────────────────────────────────────────────────────────
var gs = 'PLAYING';              // PLAYING | SHOP | PAUSED | GARAGE | GAMEOVER
var helpOpen = false;
var pausedFrom = 'PLAYING';      // where RESUME returns to (PLAYING|SHOP)
var garageFrom = 'PAUSED';       // PAUSED | GAMEOVER
var wave = 0, bestWave = 0;
var salvage = 0, runEarned = 0, doubledUsed = false;
var baseHp = BASE_HP_MAX, baseMax = BASE_HP_MAX, lives = MAX_LIVES;
var armorT = 0, reloadT = 0, cannonT = 1;          // run upgrades
var garage = { rbase: 0, crew: 0, scav: 0 };       // permanent
var lastDaily = '', streak = 0;
var grid = [];                   // GRID_COLS*GRID_ROWS terrain
var ringMat = [1,1,1,1,1];       // per RING cell: 0 gone | 1 brick | 2 steel
var player = { x: 2.5, y: 13.5, a: -Math.PI/2, half: 0.39, hp: 1, reload: 0, manualCd: 0, shieldT: 0, invulnT: 0, moving: false, trackT: 0, dead: false, respawnT: 0 };
var enemies = [], shells = [], pups = [], telegraphs = [];
var spawnQ = [], spawnT = 0;
var frozenT = 0, shovelT = 0, baseGraceT = 0;
var debris = [], rings = [], flashes = [], tracks = [], sparks = [];
var toasts = [];
var bannerT = 0, bannerTxt = '';
var alarmT = 0;
var gameoverReason = 'base';
var _pendingAd = false;
var _resume = null;
var lastW = 0, lastH = 0;
var L = {};                      // layout (computed per size change)
var tutCrate = null;             // practice target during the coach
var tutStepT = 0;
var lastFireSfx = 0, lastHitSfx = 0;
var elapsed = 0;
var botMove = null, botMoveT = 0;

function T(k) { return GF.t(k); }
function TN(k, n) { return String(T(k)).replace('%n', n).replace('%d', n); }
function rnd(a, b) { return a + Math.random() * (b - a); }
function ri(a, b) { return Math.floor(rnd(a, b + 1)); }
function gi(c, r) { return r * GRID_COLS + c; }
function inGrid(c, r) { return c >= 0 && c < GRID_COLS && r >= 0 && r < GRID_ROWS; }
function cellAt(c, r) { return inGrid(c, r) ? grid[gi(c, r)] : -1; }
function tutOn() { return GF.tutorial && GF.tutorial.active; }

// ── LAYOUT ───────────────────────────────────────────────────────────────
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  lastW = W; lastH = H;
  var topH = GF.clamp(52 * S, 44, 66);
  var botH = GF.clamp(58 * S, 48, 74);
  var pad = 4;
  var cs = Math.min((W - pad * 2) / GRID_COLS, (H - topH - botH - pad * 2) / GRID_ROWS);
  var aw = cs * GRID_COLS, ah = cs * GRID_ROWS;
  var ax = (W - aw) / 2;
  var ay = topH + pad + Math.max(0, (H - topH - botH - pad * 2 - ah) / 2);
  var br = GF.clamp(20 * S, 17, 26);             // bottom round-button radius
  L = { topH: topH, botH: botH, cs: cs, ax: ax, ay: ay, aw: aw, ah: ah,
    btnPause: { x: W - br * 2 - 10, y: H - botH / 2 - br, w: br * 2, h: br * 2, r: br },
    btnMute:  { x: W - br * 4 - 24, y: H - botH / 2 - br, w: br * 2, h: br * 2, r: br },
    btnHelp:  { x: W - br * 6 - 38, y: H - botH / 2 - br, w: br * 2, h: br * 2, r: br },
  };
}
function ensureLayout() { if (GF.W !== lastW || GF.H !== lastH) layout(); }
function px(x) { return L.ax + x * L.cs; }
function py(y) { return L.ay + y * L.cs; }

// ── TERRAIN ──────────────────────────────────────────────────────────────
function ringIdx(c, r) { for (var i = 0; i < RING.length; i++) if (RING[i][0] === c && RING[i][1] === r) return i; return -1; }
function setCell(c, r, v) {
  if (!inGrid(c, r)) return;
  grid[gi(c, r)] = v;
  var ri2 = ringIdx(c, r);
  if (ri2 >= 0) ringMat[ri2] = (v === T_STEEL ? 2 : (v === T_BRICK ? 1 : 0));
}
function genTerrain() {
  grid = [];
  for (var i = 0; i < GRID_COLS * GRID_ROWS; i++) grid.push(T_EMPTY);
  // brick clusters in the mid-field (rows 2..10)
  var clusters = 8 + Math.min(4, Math.floor(wave / 3));
  for (var k = 0; k < clusters; k++) {
    var cc = ri(0, GRID_COLS - 2), rr2 = ri(2, 9);
    var w2 = ri(1, 2), h2 = ri(1, 3);
    for (var dc = 0; dc < w2; dc++) for (var dr = 0; dr < h2; dr++) {
      var c2 = cc + dc, r2 = rr2 + dr;
      if (inGrid(c2, r2) && r2 <= 10) grid[gi(c2, r2)] = T_BRICK;
    }
  }
  // steel singles
  var steels = 2 + Math.min(3, Math.floor(wave / 4));
  for (k = 0; k < steels; k++) grid[gi(ri(1, GRID_COLS - 2), ri(3, 9))] = T_STEEL;
  // water pools (1-2, two cells wide)
  var pools = ri(1, 2);
  for (k = 0; k < pools; k++) { var wc = ri(1, GRID_COLS - 3), wr = ri(4, 8); grid[gi(wc, wr)] = T_WATER; grid[gi(wc + 1, wr)] = T_WATER; }
  // bush patches
  for (k = 0; k < 3; k++) { var bc = ri(0, GRID_COLS - 2), br2 = ri(2, 10); grid[gi(bc, br2)] = T_BUSH; if (Math.random() < 0.7) grid[gi(bc + 1, br2)] = T_BUSH; }
  // keep spawn rows + player/base rows workable
  for (var c3 = 0; c3 < GRID_COLS; c3++) { grid[gi(c3, 0)] = T_EMPTY; grid[gi(c3, 1)] = T_EMPTY; grid[gi(c3, 11)] = (grid[gi(c3, 11)] === T_WATER ? T_EMPTY : grid[gi(c3, 11)]); grid[gi(c3, 12)] = T_EMPTY; grid[gi(c3, 13)] = T_EMPTY; }
  // carve a guaranteed corridor from each spawn toward the base rows
  for (var s = 0; s < SPAWN_COLS.length; s++) {
    var cc2 = SPAWN_COLS[s];
    for (var r3 = 2; r3 <= 11; r3++) {
      if (grid[gi(cc2, r3)] !== T_EMPTY && grid[gi(cc2, r3)] !== T_BUSH) grid[gi(cc2, r3)] = T_EMPTY;
      if (Math.random() < 0.4) cc2 += (cc2 < BASE_C ? 1 : (cc2 > BASE_C ? -1 : 0));
      cc2 = GF.clamp(cc2, 0, GRID_COLS - 1);
    }
  }
  // base ring from persistent ring state (shovel may overwrite to steel later)
  for (var g2 = 0; g2 < RING.length; g2++) {
    grid[gi(RING[g2][0], RING[g2][1])] = (ringMat[g2] === 2 ? T_STEEL : (ringMat[g2] === 1 ? T_BRICK : T_EMPTY));
  }
  grid[gi(BASE_C, BASE_R)] = T_EMPTY;            // star drawn separately
}

// ── WAVE COMPOSITION (the enemy ladder = the 10-minute catch) ────────────
var TYPES = {
  SCOUT:   { hp: 1,  sp: 2.55, fire: 3.0, sz: 0.78, salv: 6,  col: '#e8b13f' },
  BRUTE:   { hp: 3,  sp: 1.15, fire: 2.4, sz: 0.86, salv: 10, col: '#c25b40' },
  SHOOTER: { hp: 2,  sp: 1.7,  fire: 1.4, sz: 0.78, salv: 12, col: '#8d77ef' },
  DRILLER: { hp: 2,  sp: 1.9,  fire: 0,   sz: 0.78, salv: 12, col: '#46c8ad' },
  BOSS:    { hp: 12, sp: 0.75, fire: 1.6, sz: 1.6,  salv: 60, col: '#d8486e' },
};
function waveComp(n) {
  var q = [];
  function add(t, k) { for (var i = 0; i < k; i++) q.push(t); }
  if (n === 1) add('SCOUT', 4);
  else if (n === 2) add('SCOUT', 6);
  else if (n === 3) { add('SCOUT', 4); add('BRUTE', 2); }
  else if (n === 4) { add('SCOUT', 5); add('BRUTE', 3); }
  else if (n === 6) { add('SCOUT', 3); add('BRUTE', 2); add('SHOOTER', 2); }
  else if (n === 7) { add('SCOUT', 4); add('BRUTE', 2); add('SHOOTER', 3); }
  else if (n === 8) { add('SCOUT', 3); add('BRUTE', 2); add('SHOOTER', 2); add('DRILLER', 2); }
  else if (n === 9) { add('SCOUT', 4); add('BRUTE', 3); add('SHOOTER', 2); add('DRILLER', 2); }
  else if (n % BOSS_EVERY === 0) { add('BOSS', 1); add('SCOUT', Math.min(6, 2 + (n / 5) | 0)); if (n >= 10) { add('SHOOTER', 2); add('DRILLER', 1); } }
  else { // n >= 11 procedural mix
    var budget = 8 + Math.floor(n * 0.9);
    var pool = ['SCOUT', 'SCOUT', 'BRUTE', 'SHOOTER', 'DRILLER'];
    while (budget > 0) {
      var t = pool[ri(0, pool.length - 1)];
      var cost = (t === 'SCOUT' ? 1 : 2);
      if (cost > budget) t = 'SCOUT';
      q.push(t); budget -= (t === 'SCOUT' ? 1 : 2);
    }
  }
  // shuffle (bosses first so they get on screen)
  q.sort(function (a, b) { return (b === 'BOSS' ? 1 : 0) - (a === 'BOSS' ? 1 : 0) || Math.random() - 0.5; });
  return q;
}
function enemiesLeft() { return spawnQ.length + telegraphs.length + enemies.length; }
function enemyCap() { return wave >= 12 ? 5 : ENEMY_CAP; }

// ── RUN / WAVE LIFECYCLE ─────────────────────────────────────────────────
function resetPlayer() {
  player.x = 2.5; player.y = 13.5; player.a = -Math.PI / 2;
  player.hp = 1 + armorT; player.reload = 0.3; player.manualCd = 0;
  player.invulnT = 2.5; player.dead = false; player.respawnT = 0;
}
function startRun() {
  lives = MAX_LIVES;
  baseMax = BASE_HP_MAX + (garage.rbase ? 1 : 0);
  baseHp = baseMax;
  armorT = 0; reloadT = 0; cannonT = garage.crew ? 2 : 1;
  runEarned = 0; doubledUsed = false;
  ringMat = [1, 1, 1, 1, 1];
  frozenT = 0; shovelT = 0;
  enemies = []; shells = []; pups = []; telegraphs = []; spawnQ = [];
  debris = []; rings = []; flashes = []; sparks = [];
  player.shieldT = 0;
  if (!tutDone()) { wave = 0; genTerrain(); resetPlayer(); gs = 'PLAYING'; beginCoach(); }
  else startWave(1);
  GF.gameStarted();
  GF.saveRun();
}
function startWave(n) {
  wave = n;
  genTerrain();
  resetPlayer();
  enemies = []; shells = []; pups = []; telegraphs = [];
  frozenT = 0; baseGraceT = 0;
  spawnQ = waveComp(n);
  spawnT = (n === 1 ? 0.6 : 1.2);
  bannerTxt = TN('wave_n', n); bannerT = 2.0;
  gs = 'PLAYING';
  GF.arp([392, 392, 523], 120, 0.18, 'square', 0.1);   // klaxon
  GF.gameStarted();
  GF.saveRun();
}
function waveClear() {
  addSalvage(10 + 2 * wave, px(BASE_C + 0.5), py(BASE_R - 1));
  GF.sfx('win');
  if (wave % 3 === 0) _pendingAd = true;
  if (wave + 1 > 3 && wave % 4 === 0) GF.happytime();
  gs = 'SHOP';
  GF.gameEnded();
  GF.saveRun();
}
function gameOver(reason) {
  gameoverReason = reason;
  if (wave > bestWave) bestWave = wave;
  gs = 'GAMEOVER';
  _pendingAd = true;
  GF.sfx('lose');
  GF.setShake(1.6);
  GF.gameEnded();
  GF.saveRun();
}
function maybeAd(fn) {
  if (_pendingAd) { _pendingAd = false; GF.ads.interstitial().then(function () { fn(); }); }
  else fn();
}
function scavMul() { return garage.scav ? 1.25 : 1; }
function addSalvage(n, fx, fy) {
  var v = Math.round(n * scavMul());
  salvage += v; runEarned += v;
  if (fx != null) GF.spawnFloat(fx, fy, '+' + v, '#ffd95e');
  GF.saveRun();
}

// ── PURCHASES ────────────────────────────────────────────────────────────
function armorCost()  { return 40 + 45 * armorT; }
function reloadCost() { return 30 + 28 * reloadT; }
function cannonCost() { return 60 + 65 * (cannonT - 1); }
function repairCost() { return 30; }
function repairNeeded() { if (baseHp < baseMax) return true; for (var i = 0; i < ringMat.length; i++) if (ringMat[i] === 0) return true; return false; }
function buyArmor()  { if (armorT >= 2 || salvage < armorCost()) { GF.sfx('error'); return false; } salvage -= armorCost() - 0; armorT++; player.hp = Math.min(1 + armorT, player.hp + 1); GF.sfx('unlock'); GF.saveRun(); return true; }
function buyReload() { if (reloadT >= 4 || salvage < reloadCost()) { GF.sfx('error'); return false; } salvage -= reloadCost() + 0; reloadT++; GF.sfx('unlock'); GF.saveRun(); return true; }
function buyCannon() { if (cannonT >= 4 || salvage < cannonCost()) { GF.sfx('error'); return false; } salvage -= cannonCost(); cannonT++; GF.sfx('levelup'); GF.saveRun(); return true; }
function buyRepair() {
  if (!repairNeeded() || salvage < repairCost()) { GF.sfx('error'); return false; }
  salvage -= repairCost();
  baseHp = Math.min(baseMax, baseHp + 1);
  for (var i = 0; i < RING.length; i++) if (ringMat[i] === 0) setCell(RING[i][0], RING[i][1], T_BRICK);
  GF.sfx('unlock'); GF.saveRun(); return true;
}
var GARAGE_ITEMS = [
  { id: 'rbase', cost: 150, name: 'g_rbase', desc: 'g_rbase_d' },
  { id: 'crew',  cost: 250, name: 'g_crew',  desc: 'g_crew_d' },
  { id: 'scav',  cost: 400, name: 'g_scav',  desc: 'g_scav_d' },
];
function buyGarage(id) {
  var it = null;
  for (var i = 0; i < GARAGE_ITEMS.length; i++) if (GARAGE_ITEMS[i].id === id) it = GARAGE_ITEMS[i];
  if (!it || garage[id] || salvage < it.cost) { GF.sfx('error'); return false; }
  salvage -= it.cost; garage[id] = 1;
  if (id === 'rbase') { baseMax = BASE_HP_MAX + 1; }
  GF.sfx('levelup'); GF.saveRun(); return true;
}

// ── DAILY LOGIN BONUS ────────────────────────────────────────────────────
function applyDaily() {
  var d = new Date();
  var key = d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
  if (lastDaily === key) return;
  var y = new Date(Date.now() - 864e5);
  var yKey = y.getFullYear() + '-' + (y.getMonth() + 1) + '-' + y.getDate();

  if (joy.active && (joy.dx || joy.dy)) { ax += joy.dx; ay += joy.dy; }
  if (botMoveT > 0 && botMove) { ax += botMove.x; ay += botMove.y; }

}
function updatePlayer(dt) {
  if (player.dead) {

    return;
  }
  if (player.shieldT > 0) player.shieldT -= dt;
  if (player.invulnT > 0) player.invulnT -= dt;
  if (player.manualCd > 0) player.manualCd -= dt;
  var inp = playerInput();
  player.moving = false;
  if (inp) {
    player.a = snap8(Math.atan2(inp.y, inp.x));
    var vx = Math.cos(player.a), vy = Math.sin(player.a);
    if (moveTank(player, vx, vy, PLAYER_SPEED * dt, false)) {
      player.moving = true;
      player.trackT -= dt;
      if (player.trackT <= 0) { player.trackT = 0.13; tracks.push({ x: player.x, y: player.y, a: player.a, life: 1, w: 0.78 }); if (tracks.length > 240) tracks.shift(); }
      // coach step 1 advances on real steering
      if (tutOn()) {
        var st = GF.tutorial.steps[GF.tutorial.step];
        if (st && st._k === 'drive') {
          coachDriven += PLAYER_SPEED * dt;
          if (coachDriven > 1.1) { GF.tutorial.next(); tutStepT = 0; }
        }
      }
    }
  }

  // practice crate isn't sniped before "tap to shoot")
  var canAuto = true;
  if (tutOn()) {
    var stA = GF.tutorial.steps[GF.tutorial.step];
    canAuto = !(stA && stA._k === 'drive');
  }

}

  if (gs !== 'PLAYING' || player.dead) return;
  if (player.manualCd > 0) return;
  player.manualCd = 0.3;

// ── FX UPDATE (own arrays — frozen during screenshots so frames stay rich) ─
function updateFx(dt) {
  for (var i = debris.length - 1; i >= 0; i--) {
    var d = debris[i];
    d.x += d.vx * dt; d.y += d.vy * dt; d.vx *= 0.92; d.vy *= 0.92; d.rot += d.vr * dt;
    d.life -= dt * 1.4;
    if (d.life <= 0) debris.splice(i, 1);
  }
  for (i = rings.length - 1; i >= 0; i--) {
    var r = rings[i];
    r.t += dt * 2.6; r.r = r.max * Math.min(1, r.t);
    if (r.t >= 1) rings.splice(i, 1);
  }
  for (i = flashes.length - 1; i >= 0; i--) { flashes[i].t -= dt; if (flashes[i].t <= 0) flashes.splice(i, 1); }
  for (i = sparks.length - 1; i >= 0; i--) { sparks[i].t -= dt; if (sparks[i].t <= 0) sparks.splice(i, 1); }
  for (i = tracks.length - 1; i >= 0; i--) { tracks[i].life -= dt * 0.25; if (tracks[i].life <= 0) tracks.splice(i, 1); }
  for (i = toasts.length - 1; i >= 0; i--) { toasts[i].t -= dt; if (toasts[i].t <= 0) toasts.splice(i, 1); }
  if (bannerT > 0) bannerT -= dt;
  if (alarmT > 0) alarmT -= dt;
}

// ── MAIN UPDATE ──────────────────────────────────────────────────────────
function update(dt) {
  ensureLayout();
  elapsed += dt;
  if (tutOn()) coachWasOn = true;
  GF.tutorial.update(dt);
  if (window._screenshotFreeze) return;
  updateFx(dt);
  if (botMoveT > 0) botMoveT -= dt;
  if (gs !== 'PLAYING') return;
  if (frozenT > 0) frozenT -= dt;
  if (baseGraceT > 0) baseGraceT -= dt;
  if (shovelT > 0) {
    shovelT -= dt;
    if (shovelT <= 0) { for (var i = 0; i < RING.length; i++) setCell(RING[i][0], RING[i][1], T_BRICK); }
  }
  // coach safety valve: every step auto-advances after 6s so a stuck player
  // (or a headless tester) is never blocked; steps remain action-gated first.
  if (tutOn()) {
    tutStepT += dt;
    if (tutStepT > 6) { GF.tutorial.next(); tutStepT = 0; }
  }
  // coach step 2 housekeeping: driving over the crate breaks it too, and a
  // dead crate can never wedge the step
  if (tutOn()) {
    var stC = GF.tutorial.steps[GF.tutorial.step];
    if (stC && stC._k === 'shoot') {
      if (tutCrate && tutCrate.alive && Math.abs(player.x - tutCrate.x) < 0.62 && Math.abs(player.y - tutCrate.y) < 0.62) {
        tutCrate.alive = false;
        fxDebris(tutCrate.x, tutCrate.y, '#c98e4a', 14, 2.6);
        boomSfx(false);
        GF.tutorial.next(); tutStepT = 0;
      } else if (!tutCrate || !tutCrate.alive) { GF.tutorial.next(); tutStepT = 0; }
    }
  }
  // the coach can deactivate from ANY path (lib auto-step, skip pill, action
  // advance, bot skip) — detect the edge HERE so wave 1 always starts.
  if (coachWasOn && !tutOn()) { coachWasOn = false; coachFinished(); }
  updatePlayer(dt);
  spawnTick(dt);
  updateEnemies(dt);
  updateShells(dt);
  updatePups(dt);
}

// ── COACH (interactive tutorial over live, safe gameplay) ────────────────

  c.fillStyle = barrel;

  c.globalAlpha = 1;
  for (i = 0; i < rings.length; i++) {
    var r = rings[i];
    c.save();
    c.globalAlpha = Math.max(0, 1 - r.t) * 0.9;
    c.strokeStyle = r.col; c.lineWidth = Math.max(2, L.cs * 0.12 * (1 - r.t));
    c.beginPath(); c.arc(px(r.x), py(r.y), r.r * L.cs, 0, Math.PI * 2); c.stroke();
    c.restore();
  }
  for (i = 0; i < flashes.length; i++) {
    var f = flashes[i];
    c.save();
    c.translate(px(f.x), py(f.y));
    c.rotate(f.a);
    c.globalAlpha = Math.max(0, f.t / 0.09);
    c.fillStyle = '#ffe9a0';
    var fs = L.cs * 0.46;
    c.beginPath();
    c.moveTo(0, -fs * 0.22); c.lineTo(fs, 0); c.lineTo(0, fs * 0.22); c.lineTo(fs * 0.3, 0);
    c.closePath(); c.fill();
    c.restore();
  }
  for (i = 0; i < sparks.length; i++) {
    var sp = sparks[i];
    c.save();
    c.globalAlpha = Math.max(0, sp.t / 0.18);
    c.fillStyle = '#fff';
    var ss = L.cs * 0.16 * (1 + (1 - sp.t / 0.18));
    c.translate(px(sp.x), py(sp.y));
    c.fillRect(-ss / 2, -1, ss, 2); c.fillRect(-1, -ss / 2, 2, ss);
    c.restore();
  }
  c.globalAlpha = 1;
}
function drawTelegraphs(c) {
  for (var i = 0; i < telegraphs.length; i++) {
    var t = telegraphs[i];
    var x = px(t.c + 0.5), y = py(0.5);
    var blink = Math.floor(t.t * 8) % 2 === 0;
    c.save();
    c.globalAlpha = blink ? 0.85 : 0.35;
    c.strokeStyle = '#ff8a6a'; c.lineWidth = 2;
    var s = L.cs * (0.5 + (0.9 - t.t) * 0.2);
    c.translate(x, y); c.rotate(Math.PI / 4);
    c.strokeRect(-s / 2, -s / 2, s, s);
    c.restore();
  }
  c.globalAlpha = 1;
}
function drawEnemies(c) {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    var ang = e.dir * Math.PI / 2 - Math.PI / 2;
    var sprite = e.type === 'SCOUT' ? 'scout_tank' : (e.type === 'BRUTE' ? 'brute_tank' : (e.type === 'BOSS' ? 'boss_tank' : null));
    var dark = 'rgba(0,0,0,0.35)';
    var bodyCol = e.col, barrel = '#3c3c46';
    if (e.hurtT > 0) bodyCol = '#fff';
    var p2 = drawTankAt(c, sprite, e.x, e.y, ang, e.sz, bodyCol, dark, barrel, { red: e.red });
    if (frozenT > 0) { c.save(); c.globalAlpha = 0.5; drawSnow(c, p2.x, p2.y, e.sz * L.cs * 0.3); c.restore(); }
    // shield pips
    if (e.shield > 0) {
      c.save();

    }
    // boss hp bar
    if (e.type === 'BOSS') {
      var bw = e.sz * L.cs * 1.2, bh = Math.max(4, L.cs * 0.12);
      var bx = p2.x - bw / 2, by = p2.y - e.sz * L.cs * 0.78 - bh;
      c.fillStyle = 'rgba(0,0,0,0.5)'; GF.rr(c, bx, by, bw, bh, bh / 2); c.fill();
      c.fillStyle = '#ff5d6e'; GF.rr(c, bx, by, bw * Math.max(0, e.hp / e.maxHp), bh, bh / 2); c.fill();
    } else if (e.hp < e.maxHp && e.maxHp > 1) {

      c.fillStyle = 'rgba(0,0,0,0.5)'; c.fillRect(p2.x - bw2 / 2, p2.y - e.sz * L.cs * 0.7, bw2, bh2);
      c.fillStyle = '#9ce06a'; c.fillRect(p2.x - bw2 / 2, p2.y - e.sz * L.cs * 0.7, bw2 * e.hp / e.maxHp, bh2);
    }

}
function drawPlayer(c) {

function drawTutCrate(c) {

// ── DRAW: HUD ────────────────────────────────────────────────────────────
function fitFont(c, txt, basePx, maxW, bold) {
  var fs = basePx;
  c.font = (bold ? 'bold ' : '') + fs + 'px ' + FONT_BODY;
  while (c.measureText(txt).width > maxW && fs > 9) { fs--; c.font = (bold ? 'bold ' : '') + fs + 'px ' + FONT_BODY; }
  return fs;
}
function drawHUD(c) {
  var W = GF.W, S = GF.S;
  // top bar
  c.fillStyle = 'rgba(10,12,8,0.78)';
  c.fillRect(0, 0, W, L.topH);
  var fs = GF.clamp(16 * S, 13, 21);
  c.textBaseline = 'middle';
  // wave (left)
  c.font = 'bold ' + fs + 'px ' + FONT_BODY;
  c.fillStyle = '#dfe8c8'; c.textAlign = 'left';
  c.fillText(T('wave') + ' ' + Math.max(1, wave), 12, L.topH / 2);
  // salvage (right) — icon placed from measured text so they never collide
  var sTxt = String(salvage);
  c.font = 'bold ' + fs + 'px ' + FONT_BODY;
  var tw = c.measureText(sTxt).width;
  c.fillStyle = '#ffd95e'; c.textAlign = 'right';
  c.fillText(sTxt, W - 12, L.topH / 2);
  drawCoin(c, W - 12 - tw - 12, L.topH / 2, GF.clamp(8 * S, 7, 11));
  // center: base hearts row + lives row
  var hr = GF.clamp(9 * S, 7.5, 12);
  var n = baseMax, gap = hr * 2.4;
  var cx0 = W / 2 - (n - 1) * gap / 2;
  for (var i = 0; i < n; i++) drawHeart(c, cx0 + i * gap, L.topH * 0.34, hr * 1.9, i < baseHp);
  var ts = GF.clamp(11 * S, 9, 14);
  var lx0 = W / 2 - (MAX_LIVES - 1) * (ts * 1.7) / 2;
  for (i = 0; i < MAX_LIVES; i++) drawTankIcon(c, lx0 + i * ts * 1.7, L.topH * 0.74, ts, i < lives ? '#9ce06a' : 'rgba(255,255,255,0.14)');
  // cannon tier chip (left, under wave — only when upgraded)
  if (cannonT > 1) {
    c.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px ' + FONT_BODY;
    c.fillStyle = '#9adcff'; c.textAlign = 'left';
    c.fillText('T' + cannonT, 12, L.topH + 12 * S);
  }
  // bottom strip
  c.fillStyle = 'rgba(10,12,8,0.78)';
  c.fillRect(0, GF.H - L.botH, W, L.botH);
  // enemies-remaining pips
  var left = enemiesLeft();
  var pr = GF.clamp(5 * S, 4, 7), pgap = pr * 2.7;
  var maxPips = Math.min(left, 12);
  for (i = 0; i < maxPips; i++) {
    c.beginPath(); c.arc(14 + pr + i * pgap, GF.H - L.botH / 2, pr, 0, Math.PI * 2);
    c.fillStyle = i < enemies.length ? '#ff8a6a' : 'rgba(255,255,255,0.35)';
    c.fill();
  }
  // round buttons: help / mute / pause
  drawRoundBtn(c, L.btnHelp, function (cc, x, y, r) {
    cc.font = 'bold ' + Math.round(r * 1.2) + 'px ' + FONT_BODY;
    cc.fillStyle = '#dfe8c8'; cc.textAlign = 'center'; cc.textBaseline = 'middle';
    cc.fillText('?', x, y + 1);
  });
  drawRoundBtn(c, L.btnMute, function (cc, x, y, r) { GF.drawMuteIcon(cc, x, y, r * 0.62, GF.muted); });
  drawRoundBtn(c, L.btnPause, function (cc, x, y, r) {
    cc.fillStyle = '#dfe8c8';
    cc.fillRect(x - r * 0.32, y - r * 0.36, r * 0.22, r * 0.72);
    cc.fillRect(x + r * 0.1, y - r * 0.36, r * 0.22, r * 0.72);
  });
  c.textBaseline = 'alphabetic';
}
function drawRoundBtn(c, b, iconFn) {
  var x = b.x + b.r, y = b.y + b.r;
  c.save();
  c.fillStyle = 'rgba(255,255,255,0.08)';
  c.beginPath(); c.arc(x, y, b.r, 0, Math.PI * 2); c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.22)'; c.lineWidth = 1.5;
  c.beginPath(); c.arc(x, y, b.r, 0, Math.PI * 2); c.stroke();

}
function drawBanner(c) {

function drawVignette(c) {

  var g = c.createRadialGradient(GF.W / 2, GF.H / 2, Math.min(GF.W, GF.H) * 0.3, GF.W / 2, GF.H / 2, Math.max(GF.W, GF.H) * 0.72);
  g.addColorStop(0, 'rgba(255,40,30,0)');

}
function drawToasts(c) {
  var y = L.topH + GF.clamp(26 * GF.S, 20, 34);
  for (var i = 0; i < toasts.length; i++) {
    var t = toasts[i];
    var a = Math.min(1, t.t / 0.5);
    c.save();

    c.font = 'bold ' + fs + 'px ' + FONT_BODY;
    var w = c.measureText(t.txt).width + 28;
    c.fillStyle = 'rgba(16,20,12,0.92)';

    c.fillStyle = '#ffd95e'; c.textAlign = 'center'; c.textBaseline = 'middle';

  }
}

// ── UI BUTTON REGISTRY (per-frame; hit-tested in onDown) ─────────────────
var uiBtns = [];   // { id, x, y, w, h, fn, key }
function btn(id, x, y, w, h, label, fn, opts) {
  opts = opts || {};
  var c = GF.ctx;
  c.save();
  var grad = c.createLinearGradient(x, y, x, y + h);
  if (opts.primary) { grad.addColorStop(0, '#7ec850'); grad.addColorStop(1, '#4e9a2e'); }
  else if (opts.gold) { grad.addColorStop(0, '#f3c14c'); grad.addColorStop(1, '#cf9420'); }
  else if (opts.danger) { grad.addColorStop(0, '#e06a5a'); grad.addColorStop(1, '#b54234'); }
  else { grad.addColorStop(0, 'rgba(255,255,255,0.14)'); grad.addColorStop(1, 'rgba(255,255,255,0.07)'); }
  c.fillStyle = grad;
  GF.rr(c, x, y, w, h, Math.min(14, h / 2)); c.fill();
  c.strokeStyle = opts.primary ? 'rgba(190,255,150,0.5)' : 'rgba(255,255,255,0.25)';
  c.lineWidth = 1.5;
  GF.rr(c, x, y, w, h, Math.min(14, h / 2)); c.stroke();
  if (opts.disabled) { c.globalAlpha = 1; c.fillStyle = 'rgba(10,10,10,0.45)'; GF.rr(c, x, y, w, h, Math.min(14, h / 2)); c.fill(); }
  var base = opts.fs || GF.clamp(17 * GF.S, 14, 22);
  var fs = fitFont(c, label, base, w - 24, true);
  c.fillStyle = opts.disabled ? 'rgba(255,255,255,0.55)' : '#fff';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(label, x + w / 2, y + h / 2 + 1);
  c.restore();
  uiBtns.push({ id: id, x: x, y: y, w: w, h: h, fn: opts.disabled ? null : fn, key: opts.key || null, fs: base });
  return { x: x, y: y, w: w, h: h };
}
function panel(c, x, y, w, h) {
  c.save();
  c.fillStyle = 'rgba(8,10,6,0.6)';
  c.fillRect(0, 0, GF.W, GF.H);                       // full scrim (popup hygiene)
  c.shadowColor = 'rgba(0,0,0,0.5)'; c.shadowBlur = 26; c.shadowOffsetY = 6;
  c.fillStyle = '#1d2415';
  GF.rr(c, x, y, w, h, 18); c.fill();
  c.shadowColor = 'transparent';
  c.strokeStyle = 'rgba(190,210,150,0.3)'; c.lineWidth = 1.5;
  GF.rr(c, x, y, w, h, 18); c.stroke();
  c.restore();
}
function wrapText(c, text, x, y, maxW, lineH, align) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  c.textAlign = align || 'left';
  for (var j = 0; j < lines.length; j++) c.fillText(lines[j], x, y + j * lineH);
  return lines.length * lineH;
}

// ── SHOP (wave-clear upgrade screen) ─────────────────────────────────────
function shopRows() {
  return [
    { id: 'armor',  name: 'shop_armor',  desc: 'shop_armor_d',  lvl: armorT,      max: 2, cost: armorCost(),  buy: buyArmor,  icon: function (c, x, y, r) { drawShieldIcon(c, x, y, r, '#9ce06a'); } },
    { id: 'reload', name: 'shop_reload', desc: 'shop_reload_d', lvl: reloadT,     max: 4, cost: reloadCost(), buy: buyReload, icon: function (c, x, y, r) { c.save(); c.strokeStyle = '#ffd95e'; c.lineWidth = Math.max(2, r * 0.3); c.beginPath(); c.arc(x, y, r * 0.7, -0.6, 4.2); c.stroke(); c.beginPath(); c.moveTo(x + r * 0.55, y - r * 0.75); c.lineTo(x + r * 0.85, y - r * 0.35); c.lineTo(x + r * 0.35, y - r * 0.3); c.closePath(); c.fillStyle = '#ffd95e'; c.fill(); c.restore(); } },
    { id: 'cannon', name: 'shop_cannon', desc: 'shop_cannon_d', lvl: cannonT - 1, max: 3, cost: cannonCost(), buy: buyCannon, icon: function (c, x, y, r) { drawStarIcon(c, x, y, r, '#9adcff'); } },
    { id: 'repair', name: 'shop_repair', desc: 'shop_repair_d', lvl: repairNeeded() ? 0 : 1, max: 1, cost: repairCost(), buy: buyRepair, icon: function (c, x, y, r) { drawWrench(c, x, y, r, '#e8b13f'); }, repair: true },
  ];
}
function drawShop(c) {
  var W = GF.W, H = GF.H, S = GF.S;
  var pw = Math.min(W * 0.94, 440), x = W / 2 - pw / 2;
  var rowH = GF.clamp(60 * S, 54, 74), gap = GF.clamp(10 * S, 8, 14);
  var titleH = GF.clamp(78 * S, 66, 96), contH = GF.clamp(60 * S, 52, 74);
  var ph = titleH + 4 * (rowH + gap) + contH + 26;
  // Short screens (landscape phones): SHRINK rows so the continue button always
  // fits on-screen (Yandex 1.10.3 reachability) — fit content, never clip controls.
  var yTop = Math.max(L.topH + 6, 8);
  var availH = H - yTop - 8;
  if (ph > availH) {
    var k = Math.max(0.45, (availH - 26) / (ph - 26));
    rowH *= k; gap *= k; titleH *= k; contH *= k;
    ph = titleH + 4 * (rowH + gap) + contH + 26;
  }
  var y = Math.max(yTop, H / 2 - ph / 2);
  panel(c, x, y, pw, ph);
  var fs = GF.clamp(21 * S, 17, 27);
  c.font = 'bold ' + fs + 'px ' + FONT_BODY;
  c.fillStyle = '#ffeba0'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(TN('wave_cleared', wave), W / 2, y + titleH * 0.34);
  // balance + next wave
  var bTxt = String(salvage);
  c.font = 'bold ' + GF.clamp(15 * S, 12, 19) + 'px ' + FONT_BODY;
  var bw = c.measureText(bTxt).width;
  drawCoin(c, W / 2 - bw / 2 - 13, y + titleH * 0.7, GF.clamp(7 * S, 6, 9));
  c.fillStyle = '#ffd95e';
  c.fillText(bTxt, W / 2 + 2, y + titleH * 0.7);
  c.fillStyle = '#9aa78a'; c.font = GF.clamp(12 * S, 10, 15) + 'px ' + FONT_BODY;
  c.fillText(TN('next_wave', wave + 1), W / 2, y + titleH * 0.94);
  var rows = shopRows();
  var ry = y + titleH + 8;
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    c.fillStyle = 'rgba(255,255,255,0.06)';
    GF.rr(c, x + 12, ry, pw - 24, rowH, 12); c.fill();
    r.icon(c, x + 12 + rowH / 2, ry + rowH / 2, rowH * 0.26);
    var nameFs = GF.clamp(15 * S, 12, 18);
    var maxed = r.repair ? !repairNeeded() : r.lvl >= r.max;
    var nameMaxW = pw - 24 - rowH - GF.clamp(92 * S, 84, 116) - 18;
    fitFont(c, T(r.name), nameFs, nameMaxW, true);
    c.fillStyle = '#eef3e0'; c.textAlign = 'left';
    c.fillText(T(r.name), x + 12 + rowH, ry + rowH * 0.3);
    c.font = GF.clamp(11 * S, 9.5, 13.5) + 'px ' + FONT_BODY;
    c.fillStyle = '#9aa78a';
    var descFs = fitFont(c, T(r.desc), GF.clamp(11 * S, 9.5, 13.5), nameMaxW, false);
    c.fillText(T(r.desc), x + 12 + rowH, ry + rowH * 0.6);
    // tier pips
    if (!r.repair) {
      for (var p = 0; p < r.max; p++) {
        c.fillStyle = p < r.lvl ? '#9ce06a' : 'rgba(255,255,255,0.18)';
        c.beginPath(); c.arc(x + 12 + rowH + p * 12, ry + rowH * 0.82, 3.5, 0, Math.PI * 2); c.fill();
      }
    }
    // buy button: price + coin (language-free) or MAX
    var bbW = GF.clamp(86 * S, 78, 108), bbH = rowH * 0.62;
    var bbX = x + pw - 12 - bbW - 6, bbY = ry + (rowH - bbH) / 2;
    if (maxed) {
      btn('shop_' + r.id, bbX, bbY, bbW, bbH, T('max'), null, { disabled: true, key: 'max', fs: GF.clamp(14 * S, 12, 17) });
    } else {
      var afford = salvage >= r.cost;
      (function (rr3) {
        btn('shop_' + rr3.id, bbX, bbY, bbW, bbH, '', function () { rr3.buy(); }, { primary: afford, disabled: !afford });
      })(r);
      var pTxt = String(r.cost);
      c.font = 'bold ' + GF.clamp(14 * S, 12, 17) + 'px ' + FONT_BODY;
      var ptw = c.measureText(pTxt).width;
      c.fillStyle = afford ? '#fff' : 'rgba(255,255,255,0.55)';
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText(pTxt, bbX + bbW / 2 + 7, bbY + bbH / 2 + 1);
      drawCoin(c, bbX + bbW / 2 - ptw / 2 - 4, bbY + bbH / 2, GF.clamp(6.5 * S, 6, 8.5));
    }
    ry += rowH + gap;
  }
  btn('continue', x + pw * 0.12, ry + 4, pw * 0.76, contH - 12, T('continue_btn'), onContinue, { primary: true, key: 'continue_btn' });
}

}

// ── PAUSED HUB (BIG full-width meta buttons) ─────────────────────────────
function drawPaused(c) {
  var W = GF.W, H = GF.H, S = GF.S;
  var bw = Math.min(W * 0.84, 420), bh = GF.clamp(56 * S, 48, 68), gap = GF.clamp(14 * S, 11, 18);
  var ph = bh * 4 + gap * 3 + GF.clamp(120 * S, 104, 150);

// ── INPUT (unified mouse+touch: drag joystick, quick tap = manual shot) ──
var joy = { active: false, sx: 0, sy: 0, dx: 0, dy: 0, moved: false, t: 0 };
function evtPos(e) {
  var r = GF.canvas.getBoundingClientRect();
  var sx = GF.canvas.width / r.width, sy = GF.canvas.height / r.height;
  var t0 = (e.changedTouches && e.changedTouches[0]) || e;
  return { x: (t0.clientX - r.left) * sx, y: (t0.clientY - r.top) * sy };
}
function hitBtn(x, y) {
  for (var i = uiBtns.length - 1; i >= 0; i--) {
    var b = uiBtns[i];
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
      if (b.fn) { b.fn(); } else { GF.sfx('error'); }
      return true;
    }
  }
  return false;
}
function inCircle(b, x, y) { var cx = b.x + b.r, cy = b.y + b.r; return GF.dist(x, y, cx, cy) <= b.r * 1.35; }
function sysBtnsActive() { return gs === 'PLAYING' || gs === 'SHOP'; }
function onDown(x, y) {
  // help overlay consumes everything
  if (helpOpen) { hitBtn(x, y); return; }
  // coach: only its skip pill consumes input — drags must pass through to steering
  if (tutOn()) {
    var sb = GF.tutorial._skipBtn;
    if (sb && x >= sb.x && x <= sb.x + sb.w && y >= sb.y && y <= sb.y + sb.h) {
      GF.tutorial.handleClick(x, y);
      if (!tutOn()) coachFinished();
      return;
    }
  }
  // system round buttons (visible in PLAYING + SHOP)
  if (sysBtnsActive()) {
    if (inCircle(L.btnPause, x, y)) { GF.sfx('click'); pausedFrom = gs; gs = 'PAUSED'; return; }
    if (inCircle(L.btnMute, x, y)) { var m = GF.toggleMute(); GF.setMusicMuted(m); GF.sfx('click'); return; }
    if (inCircle(L.btnHelp, x, y)) { GF.sfx('click'); helpOpen = true; return; }
  }
  if (gs !== 'PLAYING') { hitBtn(x, y); return; }
  // gameplay: anchor the virtual joystick
  joy.active = true; joy.sx = x; joy.sy = y; joy.dx = 0; joy.dy = 0; joy.moved = false; joy.t = performance.now();
}
function onMove(x, y) {
  if (!joy.active) return;
  var dx = x - joy.sx, dy = y - joy.sy;
  var d = Math.sqrt(dx * dx + dy * dy);
  if (d > 10) {
    joy.moved = true;
    joy.dx = dx / d; joy.dy = dy / d;
    // re-anchor on long drags so direction flips feel instant
    if (d > 80) { joy.sx = x - joy.dx * 80; joy.sy = y - joy.dy * 80; }
  }
}
function onUp(x, y) {
  if (!joy.active) return;
  var quick = performance.now() - joy.t < 280;
  if (!joy.moved && quick && gs === 'PLAYING') manualFire();
  joy.active = false; joy.dx = 0; joy.dy = 0;
}
GF.canvas.addEventListener('mousedown', function (e) { e.preventDefault(); var p = evtPos(e); onDown(p.x, p.y); });
window.addEventListener('mousemove', function (e) { if (joy.active) { var p = evtPos(e); onMove(p.x, p.y); } });
window.addEventListener('mouseup', function (e) { var p = evtPos(e); onUp(p.x, p.y); });
GF.canvas.addEventListener('touchstart', function (e) { e.preventDefault(); var p = evtPos(e); onDown(p.x, p.y); }, { passive: false });
GF.canvas.addEventListener('touchmove', function (e) { e.preventDefault(); var p = evtPos(e); onMove(p.x, p.y); }, { passive: false });
GF.canvas.addEventListener('touchend', function (e) { e.preventDefault(); var p = evtPos(e); onUp(p.x, p.y); }, { passive: false });
document.addEventListener('keydown', function (e) {
  if (e.code === 'Space') { e.preventDefault(); manualFire(); }
  if (e.code === 'KeyP') {                       // pause (never Escape — CG reserves it)
    if (gs === 'PLAYING' || gs === 'SHOP') { pausedFrom = gs; gs = 'PAUSED'; }
    else if (gs === 'PAUSED') gs = pausedFrom;
  }
});
// coach step 1 also advances from keyboard steering
(function () {

    if (!tutOn()) return;
    var st = GF.tutorial.steps[GF.tutorial.step];
    if (st && st._k === 'drive' && (GF.keys['KeyW'] || GF.keys['KeyA'] || GF.keys['KeyS'] || GF.keys['KeyD'] || GF.keys['ArrowUp'] || GF.keys['ArrowDown'] || GF.keys['ArrowLeft'] || GF.keys['ArrowRight'])) {

function nearestEnemy() {
  var best = null, bd = 1e9;
  for (var i = 0; i < enemies.length; i++) {
    var d = GF.dist(enemies[i].x, enemies[i].y, player.x, player.y);
    if (d < bd) { bd = d; best = enemies[i]; }
  }
  return best;
}
function botActions() {
  if (helpOpen) return ['close_help'];
  if (tutOn()) return ['skip_tutorial'];
  if (gs === 'PLAYING') {
    var a = ['seek'];
    if (enemies.length) a.push('fire');
    return a;
  }
  if (gs === 'SHOP') {
    var s = ['continue'];
    if (armorT < 2 && salvage >= armorCost()) s.push('buy_armor');
    if (reloadT < 4 && salvage >= reloadCost()) s.push('buy_reload');
    if (cannonT < 4 && salvage >= cannonCost()) s.push('buy_cannon');
    if (repairNeeded() && salvage >= repairCost()) s.push('buy_repair');
    return s;
  }
  if (gs === 'PAUSED') return ['resume'];
  if (gs === 'GARAGE') {
    var g = ['back'];
    for (var i = 0; i < GARAGE_ITEMS.length; i++) if (!garage[GARAGE_ITEMS[i].id] && salvage >= GARAGE_ITEMS[i].cost) g.push('buy_' + GARAGE_ITEMS[i].id);
    return g;
  }
  if (gs === 'GAMEOVER') return ['retry'];
  return [];
}
function botAct(a) {
  if (a === 'close_help') { helpOpen = false; return; }
  if (a === 'skip_tutorial') {
    GF.tutorial.active = false;
    try { localStorage.setItem('tank_blitz_tut_v1', '1'); } catch (e) {}
    coachFinished();
    return;
  }
  if (a === 'fire') {
    var e = nearestEnemy();
    if (e) { player.a = snap8(Math.atan2(e.y - player.y, e.x - player.x)); fireShell(true, player.x, player.y, player.a); }
    return;
  }
  if (a === 'seek') {
    var t = nearestEnemy();
    var tx = t ? t.x : 4.5, ty = t ? t.y : 6;
    var dx = tx - player.x, dy = ty - player.y, d = Math.sqrt(dx * dx + dy * dy) || 1;
    botMove = { x: dx / d, y: dy / d }; botMoveT = 0.6;
    return;
  }
  if (a === 'buy_armor') { buyArmor(); return; }
  if (a === 'buy_reload') { buyReload(); return; }
  if (a === 'buy_cannon') { buyCannon(); return; }
  if (a === 'buy_repair') { buyRepair(); return; }
  if (a === 'continue') { startWave(wave + 1); return; }
  if (a === 'resume') { gs = pausedFrom; return; }
  if (a === 'back') { gs = (garageFrom === 'GAMEOVER' ? 'GAMEOVER' : 'PAUSED'); return; }
  if (a === 'buy_rbase') { buyGarage('rbase'); return; }
  if (a === 'buy_crew') { buyGarage('crew'); return; }
  if (a === 'buy_scav') { buyGarage('scav'); return; }
  if (a === 'retry') { window._silent = true; startRun(); window._silent = false; return; }
}

// ── TEST / SCREENSHOT / AUDIT SEAMS ─────────────────────────────────────────
function silentEnsureRun() {
  window._silent = true;
  if (GF.tutorial) GF.tutorial.active = false;
  try { localStorage.setItem('tank_blitz_tut_v1', '1'); } catch (e) {}
  tutCrate = null;
  if (wave < 1) startWave(1);
  window._silent = false;
}
window._setState = function (s) {
  var name = s;
  if (typeof s === 'number') name = ['', 'PLAYING', 'SHOP', 'PAUSED', 'GARAGE', 'GAMEOVER', 'HELP'][s] || 'PLAYING';
  name = String(name).toUpperCase();
  if (name === 'PLAY') name = 'PLAYING';
  helpOpen = false;
  if (name === 'PLAYING') { silentEnsureRun(); gs = 'PLAYING'; }
  else if (name === 'SHOP') { silentEnsureRun(); gs = 'SHOP'; }
  else if (name === 'PAUSED') { silentEnsureRun(); pausedFrom = 'PLAYING'; gs = 'PAUSED'; }
  else if (name === 'GARAGE') { silentEnsureRun(); garageFrom = 'PAUSED'; gs = 'GARAGE'; }
  else if (name === 'GAMEOVER') { silentEnsureRun(); if (!runEarned) runEarned = 42; gameoverReason = 'base'; gs = 'GAMEOVER'; }
  else if (name === 'HELP') { silentEnsureRun(); gs = 'PLAYING'; helpOpen = true; }
};
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return FONT_BODY; };
// live UI rects for the locale-overflow audit (buttons carry their i18n key)
window._getUIRects = function () {
  var btns = [];
  for (var i = 0; i < uiBtns.length; i++) {
    var b = uiBtns[i];
    if (b.key) btns.push({ key: b.key, x: b.x, y: b.y, w: b.w, h: b.h, fs: b.fs, pad: 12 });
  }
  return { state: helpOpen ? 'HELP' : gs, buttons: btns };
};
window._jumpLevel = function (n) {
  if ((n | 0) >= 99) {
    silentEnsureRun();
    baseHp = 1;
    gameOver('base');
  } else {
    window._setupForScreenshot((n | 0) > 0 ? (n | 0) : 5);
  }
};
// land on a dense mid-wave battle (>=70% gameplay): 4+ enemies, tracers,
// debris, half-broken walls, a power-up — then freeze for stable frames.
window._setupForScreenshot = function (level) {
  window._silent = true;
  try { localStorage.setItem('tank_blitz_tut_v1', '1'); } catch (e) {}
  if (GF.tutorial) GF.tutorial.active = false;
  tutCrate = null; helpOpen = false;
  var lv = (typeof level === 'number' && level > 0) ? level : 6;
  wave = lv;
  salvage = 140; runEarned = 86;
  cannonT = 3; armorT = 1; reloadT = 2;
  lives = 2; baseMax = BASE_HP_MAX; baseHp = 2;
  ringMat = [1, 0, 1, 1, 1];                       // one ring brick already lost
  genTerrain();
  resetPlayer();
  player.x = 2.5; player.y = 12.5; player.a = -Math.PI / 2; player.invulnT = 0;
  enemies = []; shells = []; pups = []; telegraphs = []; spawnQ = ['SCOUT', 'BRUTE'];
  debris = []; rings = []; flashes = []; sparks = [];
  // carve extra "battle damage" into the maze
  var holes = 0;
  for (var c2 = 0; c2 < GRID_COLS && holes < 7; c2++) for (var r2 = 2; r2 <= 10 && holes < 7; r2++) {
    if (grid[gi(c2, r2)] === T_BRICK && Math.random() < 0.3) { grid[gi(c2, r2)] = T_EMPTY; fxDebris(c2 + 0.5, r2 + 0.5, '#b3502e', 5, 1.2); holes++; }
  }
  function put(type, x, y, dir, extra) {
    spawnEnemy(type, 4);
    var e = enemies[enemies.length - 1];
    e.x = x; e.y = y; e.dir = dir;
    if (extra) for (var k in extra) e[k] = extra[k];
  }
  put('SCOUT', 1.5, 3.6, 2, { red: true });
  put('BRUTE', 6.5, 4.5, 2);
  put('SCOUT', 7.5, 7.2, 3);
  if (lv >= 8) put('DRILLER', 3.5, 5.2, 2); else put('SCOUT', 3.5, 5.2, 2);
  if (lv >= 5) { put('BOSS', 4.5, 1.9, 2); var bo = enemies[enemies.length - 1]; bo.hp = Math.round(bo.maxHp * 0.65); }
  if (lv >= 10) { var el = enemies[1]; el.shield = 2; }
  rings.length = 0;   // clear the stacked spawn rings left at the put() origin
  // shells in flight + muzzle flash + explosions mid-frame
  shells.push({ x: player.x, y: player.y - 1.4, vx: 0, vy: -SHELL_SPEED, p: true, pierce: false });
  shells.push({ x: player.x + 0.16, y: player.y - 2.3, vx: 0, vy: -SHELL_SPEED, p: true, pierce: false });
  shells.push({ x: 6.5, y: 5.8, vx: 0, vy: ENEMY_SHELL_SPEED, p: false });
  shells.push({ x: 1.5, y: 5.0, vx: 0, vy: ENEMY_SHELL_SPEED, p: false });
  fxFlash(player.x, player.y - 0.55, -Math.PI / 2);
  fxRing(5.5, 6.5, 1.2, '#ffba4a');
  fxDebris(5.5, 6.5, '#e8b13f', 14, 2.2);
  fxSpark(4.5, 8.5);
  pups.push({ x: 6.5, y: 8.5, kind: 'STAR', age: 1 });
  GF.spawnFloat(px(5.5), py(6.2), '+12', '#ffd95e');
  bannerT = 0; alarmT = 0.5;
  gs = 'PLAYING';
  window._screenshotFreeze = true;
  window._silent = false;
};
window._smInfo = function () { try { return window.__gfState(); } catch (e) { return null; } };

})();
