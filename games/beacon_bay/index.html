// ── GAME STATE ───────────────────────────────────────────────────────────────
var gs = 'PLAYING';

var board = [];

var renoDone = [], unlockedArea = 1, maxLevelReached = 0;

var cellPx = 40, boardX = 0, boardY = 0, boardPx = 0, topBarH = 0;
var sel = null, dragFrom = null;
var resolving = false;
var swapAnim = null;
var clearing = [];
var fallOffset = {};      // "r,c" -> negative px (above target), eases to 0
var toastT = 0, toastTxt = '';
var shuffleFlash = 0, storyBeat = '', storyBeatT = 0;
var gameWon = false, preHelp = 'PLAYING';
var pendingAd = false, firstDeathMarked = false, firstUpgradeMarked = false;
var _restoredBoard = false, _restoredMap = false;

var SAVE = 'beacon_bay';

// ── PERSIST HELPERS ──────────────────────────────────────────────────────────
function dayKey() { var d = new Date(); return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate(); }
function loadBest() { try { best = parseInt(localStorage.getItem(SAVE + '_best') || '0') || 0; } catch (e) {} }
function saveBest() { try { localStorage.setItem(SAVE + '_best', best); } catch (e) {} }

// ── LIVES / ENERGY ───────────────────────────────────────────────────────────
function regenLives() {
  if (lives >= MAX_LIVES) { lastLifeTs = Date.now(); return; }
  var now = Date.now();
  if (!lastLifeTs) lastLifeTs = now;
  var gained = Math.floor((now - lastLifeTs) / LIFE_REGEN_MS);
  if (gained > 0) {
    lives = Math.min(MAX_LIVES, lives + gained);
    lastLifeTs = lives >= MAX_LIVES ? now : lastLifeTs + gained * LIFE_REGEN_MS;
    GF.saveRun();
  }
}
function msToNextLife() {
  if (lives >= MAX_LIVES) return 0;
  if (!lastLifeTs) lastLifeTs = Date.now();
  return Math.max(0, LIFE_REGEN_MS - ((Date.now() - lastLifeTs) % LIFE_REGEN_MS));
}
function fmtMMSS(ms) { var s = Math.ceil(ms / 1000); var m = Math.floor(s / 60); s %= 60; return m + ':' + (s < 10 ? '0' : '') + s; }

// ── BOARD MODEL ──────────────────────────────────────────────────────────────
function idx(r, c) { return r * GRID + c; }
function inb(r, c) { return r >= 0 && r < GRID && c >= 0 && c < GRID; }
function cell(r, c) { return board[idx(r, c)]; }
function randColor() { return Math.floor(Math.random() * (lvl ? lvl.colors : MAX_COLORS)); }

function buildBoard() {
  board = new Array(GRID * GRID);
  for (var r = 0; r < GRID; r++) for (var c = 0; c < GRID; c++) {
    var g, guard = 0;
    do { g = randColor(); guard++; } while (guard < 40 && (
      (c >= 2 && board[idx(r, c - 1)].g === g && board[idx(r, c - 2)].g === g) ||
      (r >= 2 && board[idx(r - 1, c)].g === g && board[idx(r - 2, c)].g === g)
    ));
    board[idx(r, c)] = { g: g, sp: SP_NONE, barn: false, buoy: false, cleared: false };
  }
  if (lvl.barnacle) {
    var placed = 0, tries = 0;
    while (placed < lvl.barnacle && tries < 600) {
      tries++;
      var rr = Math.floor(Math.random() * GRID), cc = Math.floor(Math.random() * GRID);
      var cl = cell(rr, cc);
      if (!cl.barn && !cl.buoy) { cl.barn = true; placed++; }
    }
  }
  if (!anyValidMove()) reshuffleBoard();
  fallOffset = {};
}

function buoysOnBoard() { var n = 0; for (var i = 0; i < board.length; i++) if (board[i] && board[i].buoy) n++; return n; }
function maybeSpawnBuoy() {
  if (!lvl.buoy) return;
  var needLeft = lvl.buoy - objProgress;
  if (needLeft <= 0) return;
  if (buoysOnBoard() >= Math.min(2, Math.max(1, needLeft))) return;
  var cands = [];
  for (var c = 0; c < GRID; c++) { var cl = cell(0, c); if (cl && !cl.buoy) cands.push(c); }
  if (!cands.length) return;
  var col = cands[Math.floor(Math.random() * cands.length)];
  var t = cell(0, col);
  t.buoy = true; t.sp = SP_NONE; t.barn = false;
  fallOffset['0,' + col] = -cellPx;
}

// ── MATCH DETECTION ──────────────────────────────────────────────────────────
function findMatches() {
  var groups = [];
  for (var r = 0; r < GRID; r++) {
    var run = 1;
    for (var c = 1; c <= GRID; c++) {
      var same = c < GRID && !cell(r, c).buoy && !cell(r, c - 1).buoy && cell(r, c).g === cell(r, c - 1).g && cell(r, c).g >= 0;
      if (same) run++;
      else { if (run >= 3) { var g = { cells: [], len: run, dir: 'h' }; for (var k = 0; k < run; k++) g.cells.push({ r: r, c: c - 1 - k }); groups.push(g); } run = 1; }
    }
  }
  for (var c2 = 0; c2 < GRID; c2++) {
    var run2 = 1;
    for (var r2 = 1; r2 <= GRID; r2++) {
      var same2 = r2 < GRID && !cell(r2, c2).buoy && !cell(r2 - 1, c2).buoy && cell(r2, c2).g === cell(r2 - 1, c2).g && cell(r2, c2).g >= 0;
      if (same2) run2++;
      else { if (run2 >= 3) { var g2 = { cells: [], len: run2, dir: 'v' }; for (var k2 = 0; k2 < run2; k2++) g2.cells.push({ r: r2 - 1 - k2, c: c2 }); groups.push(g2); } run2 = 1; }
    }
  }
  return { groups: groups };
}
function cellInMatch(r, c) {
  var g = cell(r, c).g;
  if (g < 0) return false;
  var cnt = 1, i;
  for (i = c - 1; i >= 0 && !cell(r, i).buoy && cell(r, i).g === g; i--) cnt++;
  for (i = c + 1; i < GRID && !cell(r, i).buoy && cell(r, i).g === g; i++) cnt++;
  if (cnt >= 3) return true;
  cnt = 1;
  for (i = r - 1; i >= 0 && !cell(i, c).buoy && cell(i, c).g === g; i--) cnt++;
  for (i = r + 1; i < GRID && !cell(i, c).buoy && cell(i, c).g === g; i++) cnt++;
  return cnt >= 3;
}
function anyValidMove() {
  for (var r = 0; r < GRID; r++) for (var c = 0; c < GRID; c++) {
    if (c + 1 < GRID && trySwapMakesMatch(r, c, r, c + 1)) return true;
    if (r + 1 < GRID && trySwapMakesMatch(r, c, r + 1, c)) return true;
  }
  return false;
}
function trySwapMakesMatch(r1, c1, r2, c2) {
  var a = cell(r1, c1), b = cell(r2, c2);
  if (a.buoy || b.buoy) return false;
  if (a.sp === SP_COLOR || b.sp === SP_COLOR) return true; // color bomb always usable
  var ta = a.g; a.g = b.g; b.g = ta;
  var hit = cellInMatch(r1, c1) || cellInMatch(r2, c2);
  ta = a.g; a.g = b.g; b.g = ta;
  return hit;
}
function hasImmediateMatch() { for (var r = 0; r < GRID; r++) for (var c = 0; c < GRID; c++) if (!cell(r, c).buoy && cellInMatch(r, c)) return true; return false; }
function reshuffleBoard() {
  var attempt = 0;
  do {
    var colors = [];
    for (var i = 0; i < board.length; i++) if (!board[i].buoy) colors.push(board[i].g < 0 ? randColor() : board[i].g);
    for (var j = colors.length - 1; j > 0; j--) { var k = Math.floor(Math.random() * (j + 1)); var t = colors[j]; colors[j] = colors[k]; colors[k] = t; }
    var p = 0;
    for (var m = 0; m < board.length; m++) if (!board[m].buoy) board[m].g = colors[p++];
    attempt++;
  } while (attempt < 40 && (hasImmediateMatch() || !anyValidMove()));
  if (hasImmediateMatch()) {
    for (var r = 0; r < GRID; r++) for (var c = 0; c < GRID; c++)
      if (!cell(r, c).buoy && cellInMatch(r, c)) cell(r, c).g = (cell(r, c).g + 1) % lvl.colors;
  }
}

// ── SWAP + RESOLVE PIPELINE ──────────────────────────────────────────────────
function adjacent(a, b) { return (Math.abs(a.r - b.r) + Math.abs(a.c - b.c)) === 1; }

function attemptSwap(a, b) {
  if (gs !== 'PLAYING' || resolving || swapAnim) return;
  if (!adjacent(a, b)) { sel = null; return; }
  var ca = cell(a.r, a.c), cb = cell(b.r, b.c);
  if (ca.buoy || cb.buoy) { sel = null; toast(GF.t('swapfail')); GF.sfx('error'); return; }

  var specialSwap = (ca.sp === SP_COLOR || cb.sp === SP_COLOR);

  swapAnim = { a: { r: a.r, c: a.c }, b: { r: b.r, c: b.c }, t: 0, dur: 0.16, revert: false, after: null };
  GF.sfx('tap');
  swapCells(a, b);

  var makes = specialSwap || (findMatches().groups.length > 0);
  if (!makes) {
    swapAnim.revert = true;
    swapAnim.after = function () { swapCells(a, b); sel = null; };
    GF.sfx('error');
    toast(GF.t('swapfail'));
    return;
  }

  movesLeft--;
  sel = null;
  GF.saveRun();
  swapAnim.after = function () {
    if (specialSwap) detonateColorSwap(a, b);
    beginResolve();
  };
}
function swapCells(a, b) { var i1 = idx(a.r, a.c), i2 = idx(b.r, b.c); var t = board[i1]; board[i1] = board[i2]; board[i2] = t; }

function detonateColorSwap(a, b) {
  var ca = cell(a.r, a.c), cb = cell(b.r, b.c);
  var bombCell = (ca.sp === SP_COLOR) ? ca : cb;
  var bombPos = (ca.sp === SP_COLOR) ? a : b;
  var targetCell = (ca.sp === SP_COLOR) ? cb : ca;
  var targetG = (targetCell.sp === SP_COLOR || targetCell.buoy) ? randColor() : targetCell.g;
  var clearMap = {};
  for (var r = 0; r < GRID; r++) for (var c = 0; c < GRID; c++)
    if (cell(r, c).g === targetG && !cell(r, c).buoy) clearMap[r + ',' + c] = true;
  clearMap[bombPos.r + ',' + bombPos.c] = true;
  bombCell.sp = SP_NONE;
  GF.juice.shake(9, 340);
  GF.juice.flash('#fff7d6', 200, 0.25);
  applyClears(clearMap, [], 1);
}

function beginResolve() { gs = 'RESOLVING'; resolving = true; resolveStep(0); }

function resolveStep(depth) {
  var fm = findMatches();
  if (fm.groups.length === 0) { settleAfterResolve(); return; }

  var specialsToPlace = [];
  var clearMap = {};
  for (var gi = 0; gi < fm.groups.length; gi++) {
    var grp = fm.groups[gi];
    for (var ci = 0; ci < grp.cells.length; ci++) clearMap[grp.cells[ci].r + ',' + grp.cells[ci].c] = true;
    var anchor = grp.cells[Math.floor(grp.cells.length / 2)];
    if (grp.len >= 5) specialsToPlace.push({ r: anchor.r, c: anchor.c, kind: SP_COLOR });
    else if (grp.len === 4) specialsToPlace.push({ r: anchor.r, c: anchor.c, kind: grp.dir === 'h' ? SP_LINEV : SP_LINEH });
  }
  detectShapeBombs(fm.groups, specialsToPlace);

  var extra = collectSpecialDetonations(clearMap);
  for (var e in extra) clearMap[e] = true;

  for (var si = 0; si < specialsToPlace.length; si++)
    delete clearMap[specialsToPlace[si].r + ',' + specialsToPlace[si].c];

  applyClears(clearMap, specialsToPlace, depth + 1);
}

function detectShapeBombs(groups, specialsToPlace) {
  var hCells = {}, vCells = {};
  for (var i = 0; i < groups.length; i++) {
    var g = groups[i];
    for (var j = 0; j < g.cells.length; j++) {
      var k = g.cells[j].r + ',' + g.cells[j].c;
      if (g.dir === 'h') hCells[k] = true; else vCells[k] = true;
    }
  }
  for (var key in hCells) if (vCells[key]) {
    var parts = key.split(','), pr = parseInt(parts[0]), pc = parseInt(parts[1]);
    var dup = false;
    for (var s = 0; s < specialsToPlace.length; s++) if (specialsToPlace[s].r === pr && specialsToPlace[s].c === pc) { specialsToPlace[s].kind = SP_AREA; dup = true; }
    if (!dup) specialsToPlace.push({ r: pr, c: pc, kind: SP_AREA });
  }
}

function collectSpecialDetonations(clearMap) {
  var out = {};
  var keys = Object.keys(clearMap);
  for (var i = 0; i < keys.length; i++) {
    var p = keys[i].split(','), r = +p[0], c = +p[1];
    var cl = cell(r, c);
    if (!cl || cl.sp === SP_NONE) continue;
    if (cl.sp === SP_LINEH) { for (var cc = 0; cc < GRID; cc++) out[r + ',' + cc] = true; GF.juice.shake(6, 260); }
    else if (cl.sp === SP_LINEV) { for (var rr = 0; rr < GRID; rr++) out[rr + ',' + c] = true; GF.juice.shake(6, 260); }
    else if (cl.sp === SP_AREA) { for (var dr = -1; dr <= 1; dr++) for (var dc = -1; dc <= 1; dc++) if (inb(r + dr, c + dc)) out[(r + dr) + ',' + (c + dc)] = true; GF.juice.shake(9, 300); }
    else if (cl.sp === SP_COLOR) { var tg = cl.g; for (var r2 = 0; r2 < GRID; r2++) for (var c2 = 0; c2 < GRID; c2++) if (cell(r2, c2).g === tg && !cell(r2, c2).buoy) out[r2 + ',' + c2] = true; GF.juice.shake(8, 320); }
  }
  return out;
}

function applyClears(clearMap, specialsToPlace, depth) {
  var keys = Object.keys(clearMap);
  var cleared = 0;
  var barnAround = {};
  for (var i = 0; i < keys.length; i++) {
    var p = keys[i].split(','), r = +p[0], c = +p[1];
    var cl = cell(r, c);
    if (!cl || cl.buoy || cl.g < 0 || cl.cleared) continue;
    if (lvl.obj.kind === 'collect' && cl.g === lvl.obj.color) objProgress++;
    var px = boardX + c * cellPx + cellPx / 2, py = boardY + r * cellPx + cellPx / 2;
    var gem = GEMS[cl.g];
    clearing.push({ x: px, y: py, col: gem.c1, t: 0, dur: 0.26 });
    GF.juice.particles.burst(px, py, { count: 7, colors: [gem.c1, gem.edge], speed: 130, gravity: 360, size: 4, life: 0.5 });
    cleared++;
    for (var d = 0; d < 4; d++) {
      var nr = r + [0, 0, 1, -1][d], nc = c + [1, -1, 0, 0][d];
      if (inb(nr, nc) && cell(nr, nc).barn) barnAround[nr + ',' + nc] = true;
    }
    cl.g = -1; cl.sp = SP_NONE; cl.cleared = true;
  }
  for (var bk in barnAround) {
    var bp = bk.split(','), br = +bp[0], bc = +bp[1];
    var bcl = cell(br, bc);
    if (bcl.barn) {
      bcl.barn = false;
      if (lvl.obj.kind === 'barnacle') objProgress++;
      var bx = boardX + bc * cellPx + cellPx / 2, by = boardY + br * cellPx + cellPx / 2;
      GF.juice.particles.burst(bx, by, { count: 6, color: '#cfe0cf', speed: 110, gravity: 300, size: 3, life: 0.45 });
      GF.juice.floatText(bx, by, '+1', { color: '#cfe8d0', size: 13 });
    }
  }
  if (specialsToPlace) for (var s = 0; s < specialsToPlace.length; s++) {
    var sp = specialsToPlace[s];
    var sc = cell(sp.r, sp.c);
    if (sc && !sc.buoy) {
      sc.cleared = false;
      if (sc.g < 0) sc.g = randColor();
      sc.sp = sp.kind;
      var spx = boardX + sp.c * cellPx + cellPx / 2, spy = boardY + sp.r * cellPx + cellPx / 2;
      GF.juice.particles.burst(spx, spy, { count: 14, colors: ['#fff7d6', '#ffd36b', '#5ec8ff'], speed: 200, gravity: 120, size: 5, life: 0.6 });
      GF.sfx('unlock');
    }
  }

  if (cleared > 0) {
    var gain = cleared * 5 + depth * CASCADE_BONUS;
    score += gain;
    if (depth > 1) GF.juice.floatText(boardX + boardPx / 2, boardY + 30 * GF.S, 'x' + depth + '  +' + gain, { color: '#ffd36b', size: 18 });
    GF.sfx(depth > 1 ? 'merge' : 'pickup');
    if (depth > 2) GF.sfx('coin');
  }
  GF.saveRun();

  setTimeout(function () { collapseAndRefill(); resolveStep(depth); }, 150);
}

// Gravity per column: surviving cells fall into gaps; new gems spawn from above
// the board. Every cell that moves (survivor OR fresh) gets a negative fall
// offset = the px distance from where it WAS to where it now sits, so it visibly
// drops to rest. fallOffset eases back to 0 in update().
function collapseAndRefill() {
  for (var c = 0; c < GRID; c++) {
    // survivors with their OLD row, top-to-bottom
    var survivors = [];
    for (var r = 0; r < GRID; r++) { var cl = cell(r, c); if (cl && cl.g >= 0 && !cl.cleared) survivors.push({ cell: cl, oldR: r }); }
    var newCol = new Array(GRID);
    var write = GRID - 1;
    for (var i = survivors.length - 1; i >= 0; i--) { newCol[write] = survivors[i]; write--; }
    var topEmpty = write + 1; // rows 0..write get fresh gems
    for (var e = write; e >= 0; e--) newCol[e] = { cell: { g: randColor(), sp: SP_NONE, barn: false, buoy: false, cleared: false }, oldR: e - topEmpty - 1 };
    // commit + animate
    for (var rr = 0; rr < GRID; rr++) {
      var entry = newCol[rr];
      board[idx(rr, c)] = entry.cell;
      var dropRows = rr - entry.oldR;     // how many rows it fell (always >= 1 when moved)
      if (dropRows > 0) fallOffset[rr + ',' + c] = -dropRows * cellPx;
      else delete fallOffset[rr + ',' + c];
    }
  }
  // buoy landing: any buoy on the bottom row counts + clears
  for (var bc = 0; bc < GRID; bc++) {
    var bcl = cell(GRID - 1, bc);
    if (bcl && bcl.buoy) {
      if (lvl.obj.kind === 'buoy') objProgress++;
      var bx = boardX + bc * cellPx + cellPx / 2, by = boardY + (GRID - 1) * cellPx + cellPx / 2;
      GF.juice.particles.burst(bx, by, { count: 16, colors: ['#ffd36b', '#5ec8ff', '#fff'], speed: 210, gravity: 200, size: 5, life: 0.7 });
      GF.juice.floatText(bx, by, GF.lang === 'ru' ? 'Буй!' : 'Buoy!', { color: '#ffd36b', size: 16 });
      GF.sfx('reward');
      GF.juice.shake(7, 280);
      bcl.buoy = false; bcl.g = randColor(); bcl.cleared = false; bcl.sp = SP_NONE;
    }
  }
}

function settleAfterResolve() {
  for (var i = 0; i < board.length; i++) if (board[i]) board[i].cleared = false;

  maybeSpawnBuoy();

  var fm = findMatches();
  if (fm.groups.length > 0) { resolveStep(99); return; }

  if (!anyValidMove()) { shuffleFlash = 1.2; toast(GF.t('shuffle')); reshuffleBoard(); fallOffset = {}; }

  resolving = false;

  if (objectiveMet()) { winLevel(); return; }
  if (movesLeft <= 0) { loseLevel(); return; }
  gs = 'PLAYING';
}

function objectiveTarget() { return lvl.obj.count; }
function objectiveMet() { return objProgress >= objectiveTarget(); }

// ── WIN / LOSE ───────────────────────────────────────────────────────────────
function winLevel() {
  gs = 'WIN';
  GF.tutorial.active = false;   // dismiss any first-run coach behind the overlay
  var s3 = (CFG.tuning && CFG.tuning.star3_moves) || 5;
  winStars = movesLeft >= s3 ? 3 : movesLeft >= 1 ? 2 : 1;
  stars += winStars;
  coins += 10 + winStars * 5;
  score += movesLeft * 20;
  if (score > best) { best = score; saveBest(); }
  maxLevelReached = Math.max(maxLevelReached, level + 1);
  GF.gameEnded();
  GF.sfx('win');
  GF.juice.flash('#ffe9a8', 220, 0.32);
  if (best === score && score > 0) GF.happytime();
  pendingAd = true;
  GF.saveRun();
}
function loseLevel() {
  gs = 'LOSE';
  GF.tutorial.active = false;
  lives = Math.max(0, lives - 1);
  if (lives === MAX_LIVES - 1) lastLifeTs = Date.now();
  if (!firstDeathMarked) { firstDeathMarked = true; }
  GF.gameEnded();
  GF.sfx('lose');
  GF.juice.shake(10, 360);
  pendingAd = true;
  GF.saveRun();
}
function maybeFireAd(then) {
  if (pendingAd) { pendingAd = false; GF.ads.interstitial({ onClose: function () { if (then) then(); } }); }
  else if (then) then();
}

// ── LEVEL LIFECYCLE ─────────────────────────────────────────────────────────
function startLevel(n) {
  // gate: need a life to play
  regenLives();
  if (lives <= 0) { gs = 'ENERGY'; return; }
  level = GF.clamp(n, 0, LEVELS.length - 1);
  lvl = LEVELS[level];
  movesLeft = lvl.moves;
  objProgress = 0;
  score = 0;
  sel = null; dragFrom = null; swapAnim = null; clearing = []; resolving = false;
  buildBoard();
  if (lvl.buoy) maybeSpawnBuoy();
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

// ── INPUT ────────────────────────────────────────────────────────────────────
function cellAt(px, py) {
  var c = Math.floor((px - boardX) / cellPx), r = Math.floor((py - boardY) / cellPx);
  if (!inb(r, c)) return null;
  return { r: r, c: c };
}
function onPress(px, py) {
  if (gs === 'WIN') { onWinTap(px, py); return; }
  if (gs === 'LOSE') { onLoseTap(px, py); return; }
  if (gs === 'MAP') { onMapPress(px, py); return; }
  if (gs === 'ENERGY') { onEnergyTap(px, py); return; }
  if (gs === 'HELP') { gs = preHelp === 'HELP' ? 'PLAYING' : preHelp; return; }

  if (GF.tutorial.active) { if (GF.tutorial.handleClick(px, py)) return; }

  if (hitMute(px, py)) { GF.toggleMute(); GF.setMusicMuted(GF.muted); return; }
  if (hitHelp(px, py)) { preHelp = gs; gs = 'HELP'; return; }
  if (hitMapBtn(px, py)) { openMap(); return; }

  if (gs !== 'PLAYING' || resolving || swapAnim) return;

  var cc = cellAt(px, py);
  if (!cc) { sel = null; return; }
  dragFrom = { r: cc.r, c: cc.c };

  if (sel) {
    if (sel.r === cc.r && sel.c === cc.c) { sel = null; return; }
    if (adjacent(sel, cc)) { var a = sel; sel = null; attemptSwap(a, cc); }
    else { sel = { r: cc.r, c: cc.c }; GF.sfx('click'); }
  } else { sel = { r: cc.r, c: cc.c }; GF.sfx('click'); }
}
function onRelease(px, py) {
  if (gs !== 'PLAYING' || resolving || swapAnim || !dragFrom) { dragFrom = null; return; }
  var cc = cellAt(px, py);
  if (cc && adjacent(dragFrom, cc) && !(cc.r === dragFrom.r && cc.c === dragFrom.c)) {
    var a = dragFrom; dragFrom = null; attemptSwap(a, cc); sel = null;
  }
  dragFrom = null;
}

function toast(txt) { toastTxt = txt; toastT = 1.6; }

// ── MAP / RENOVATION ─────────────────────────────────────────────────────────
var mapScroll = null, mapBtns = [], mapTaskBtns = [], mapPointerDown = null;
function openMap() { GF.tutorial.active = false; gs = 'MAP'; GF.gameEnded(); GF.saveRun(); }
function nextPlayableLevel() {
  for (var i = 0; i < LEVELS.length; i++) if (i >= maxLevelReached && LEVELS[i].area <= unlockedArea) return i;
  return Math.min(maxLevelReached, LEVELS.length - 1);
}
function canFundAny() {
  for (var i = 0; i < RENO.length; i++) {
    if (renoDone[i]) continue;
    var ok = true; for (var j = 0; j < i; j++) if (!renoDone[j]) ok = false;
    return ok && stars >= RENO[i].cost;
  }
  return false;
}
function fundTask(ti) {
  if (renoDone[ti]) return;
  for (var i = 0; i < ti; i++) if (!renoDone[i]) return;
  var task = RENO[ti];
  if (stars < task.cost) { toast(GF.t('needstars')); GF.sfx('error'); return; }
  stars -= task.cost;
  renoDone[ti] = true;
  if (!firstUpgradeMarked) { firstUpgradeMarked = true; }
  unlockedArea = Math.max(unlockedArea, task.area + 1);
  GF.sfx('levelup');
  GF.juice.flash('#bfe9ff', 240, 0.3);
  storyBeat = (GF.lang === 'ru' ? task.ru_beat : task.beat); storyBeatT = 4.5;
  GF.saveRun();
  if (renoDone.every(function (x) { return x; }) && maxLevelReached >= LEVELS.length) gameWon = true;
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
GF.init({
  designW: 720, designH: 1280,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: SAVE,
  onReady: function () {
    loadBest();

    GF.persist(SAVE + '_run_v2',
      function () {
        return {
          gs: gs, level: level, movesLeft: movesLeft, objProgress: objProgress,
          stars: stars, coins: coins, lives: lives, lastLifeTs: lastLifeTs,
          lastDaily: lastDaily, renoDone: renoDone, unlockedArea: unlockedArea,
          maxLevelReached: maxLevelReached, best: best, board: serializeBoard(),
        };
      },
      function (s) {
        if (!s) return;
        level = s.level || 0;
        stars = s.stars || 0; coins = s.coins || 0;
        lives = (typeof s.lives === 'number') ? s.lives : MAX_LIVES;
        lastLifeTs = s.lastLifeTs || 0;
        lastDaily = s.lastDaily || '';
        renoDone = Array.isArray(s.renoDone) ? s.renoDone : [];
        unlockedArea = s.unlockedArea || 1;
        maxLevelReached = s.maxLevelReached || 0;
        best = s.best || best;
        if ((s.gs === 'PLAYING' || s.gs === 'RESOLVING') && s.board && s.board.length === GRID * GRID) {
          lvl = LEVELS[GF.clamp(level, 0, LEVELS.length - 1)];
          movesLeft = s.movesLeft || lvl.moves;
          objProgress = s.objProgress || 0;
          deserializeBoard(s.board);
          gs = 'PLAYING'; _restoredBoard = true;
        } else if (s.gs === 'MAP' || s.gs === 'ENERGY' || s.gs === 'WIN' || s.gs === 'LOSE') {
          _restoredMap = true;
        }
      }
    );
    while (renoDone.length < RENO.length) renoDone.push(false);

    regenLives();
    GF.bgMusic({ file: 'audio/bg_track.mp3', preset: 'cozy', muted: GF.muted });
    GF.remoteConfig(SAVE, CFG, {
      clamps: { 'tuning.life_regen_min': [1, 60], 'tuning.star3_moves': [1, 12] },
      onUpdate: function (c) { CFG = c; applyRemote(); },
    }).then(function (c) { CFG = c; applyRemote(); });

    exposeHooks();
    if (window.__gfSimMode || window._silent) defineEconHook();

    if (_restoredBoard) { if (gs === 'RESOLVING') gs = 'PLAYING'; resolving = false; }
    else if (_restoredMap) { gs = 'MAP'; }
    else { startLevel(maxLevelReached < LEVELS.length ? maxLevelReached : 0); }

    if (!_restoredBoard && !_restoredMap && level === 0 && gs === 'PLAYING') startTutorial();

    if (window.__GF_AUTOSTART && !window._silent) { if (gs !== 'PLAYING') startLevel(0); }
  },
  onUpdate: update,
  onDraw: draw,
});

function applyRemote() { if (CFG.tuning && CFG.tuning.life_regen_min) LIFE_REGEN_MS = CFG.tuning.life_regen_min * 60 * 1000; }

function serializeBoard() {
  if (!board.length) return null;
  var a = new Array(board.length);
  for (var i = 0; i < board.length; i++) {
    var c = board[i]; if (!c) { a[i] = 0; continue; }
    var g = c.g < 0 ? 7 : c.g;
    a[i] = g | (c.sp << 3) | ((c.barn ? 1 : 0) << 6) | ((c.buoy ? 1 : 0) << 7);
  }
  return a;
}
function deserializeBoard(a) {
  board = new Array(a.length);
  for (var i = 0; i < a.length; i++) {
    var v = a[i], g = v & 7; if (g === 7) g = randColor();
    board[i] = { g: g, sp: (v >> 3) & 3, barn: !!((v >> 6) & 1), buoy: !!((v >> 7) & 1), cleared: false };
  }
  fallOffset = {};
}

// ── TUTORIAL ─────────────────────────────────────────────────────────────────
function findHintSwap() {
  for (var r = 0; r < GRID; r++) for (var c = 0; c < GRID; c++) {
    if (c + 1 < GRID && trySwapMakesMatch(r, c, r, c + 1)) return { a: { r: r, c: c }, b: { r: r, c: c + 1 } };
    if (r + 1 < GRID && trySwapMakesMatch(r, c, r + 1, c)) return { a: { r: r, c: c }, b: { r: r + 1, c: c } };
  }
  return null;
}
function startTutorial() {
  var hint = findHintSwap();
  if (!hint) return;
  var aC = function () { return { x: boardX + hint.a.c * cellPx + cellPx / 2, y: boardY + hint.a.r * cellPx + cellPx / 2, r: cellPx * 0.5 }; };
  var bC = function () { return { x: boardX + hint.b.c * cellPx + cellPx / 2, y: boardY + hint.b.r * cellPx + cellPx / 2, r: cellPx * 0.5 }; };
  GF.tutorial.start([
    { text: GF.t('tut1'), target: aC, target2: bC, gesture: 'drag', advance: 'click_target',
      onAdvance: function () { } },
    { text: GF.t('tutdone'), advance: 'auto', after: 2400 },
  ], { storageKey: SAVE + '_tut_v2' });
}

// ── UPDATE ───────────────────────────────────────────────────────────────────
function update(dt) {
  GF.juice.update(dt);
  GF.tutorial.update(dt);
  layout();

  if (toastT > 0) toastT -= dt;
  if (shuffleFlash > 0) shuffleFlash -= dt;
  if (storyBeatT > 0) storyBeatT -= dt;
  if ((gs === 'ENERGY' || gs === 'MAP') && lives < MAX_LIVES) regenLives();

  if (swapAnim) {
    swapAnim.t += dt;
    if (swapAnim.t >= swapAnim.dur) { var after = swapAnim.after; swapAnim = null; if (after) after(); }
  }

  for (var k in fallOffset) {
    var v = fallOffset[k];
    if (v < 0) { v += (cellPx * 11 + 60) * dt; if (v > 0) v = 0; fallOffset[k] = v; }
  }

  for (var i = clearing.length - 1; i >= 0; i--) { clearing[i].t += dt; if (clearing[i].t >= clearing[i].dur) clearing.splice(i, 1); }

  if (mapScroll) mapScroll.update();
}

// ── LAYOUT ───────────────────────────────────────────────────────────────────
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  topBarH = GF.clamp(96 * S, 64, 150);
  var movesBarH = GF.clamp(44 * S, 32, 64);
  var bottomH = GF.clamp(60 * S, 44, 84);
  var availTop = topBarH + movesBarH + 8 * S;
  var availH = H - availTop - bottomH - 8 * S;
  var availW = W - 16 * S;
  boardPx = Math.min(availW, availH, 600 * S);
  cellPx = Math.floor(boardPx / GRID);
  boardPx = cellPx * GRID;
  boardX = (W - boardPx) / 2;
  boardY = availTop + (availH - boardPx) / 2;
}

// ── DRAW ─────────────────────────────────────────────────────────────────────
function draw(ctx) {
  drawBackdrop(ctx);

  if (gs === 'MAP') { drawMap(ctx); drawFloatingFX(ctx); return; }
  if (gs === 'ENERGY') { drawTopBar(ctx); drawEnergy(ctx); drawFloatingFX(ctx); return; }

  drawTopBar(ctx);
  drawMovesBar(ctx);
  drawBoardFrame(ctx);

  ctx.save();
  ctx.translate(GF.juice.offsetX, GF.juice.offsetY);
  drawBoard(ctx);
  drawClearingFX(ctx);
  ctx.restore();

  drawBottomBar(ctx);

  GF.juice.particles.draw(ctx);
  GF.juice.texts.draw(ctx);

  GF.tutorial.draw(ctx);

  if (gs === 'WIN') drawWin(ctx);
  if (gs === 'LOSE') drawLose(ctx);
  if (gs === 'HELP') drawHelp(ctx);

  drawToast(ctx);
  GF.juice.drawFlash(ctx);
}
function drawFloatingFX(ctx) { GF.juice.particles.draw(ctx); GF.juice.texts.draw(ctx); drawToast(ctx); GF.juice.drawFlash(ctx); }

function drawBackdrop(ctx) {
  var W = GF.W, H = GF.H;
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#12283f'); g.addColorStop(0.5, '#0d1c30'); g.addColorStop(1, '#0a1726');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  for (var i = 0; i < 28; i++) { var sx = ((i * 97) % 100) / 100 * W, sy = ((i * 53) % 100) / 100 * H * 0.4; ctx.fillRect(sx, sy, 1.5, 1.5); }
}

function drawTopBar(ctx) {
  var W = GF.W, S = GF.S, h = topBarH;
  ctx.fillStyle = 'rgba(8,18,30,0.82)'; ctx.fillRect(0, 0, W, h);
  ctx.fillStyle = 'rgba(120,180,240,0.18)'; ctx.fillRect(0, h - 2 * S, W, 2 * S);
  var pad = 14 * S, cy = h * 0.5;
  var hr = GF.clamp(10 * S, 7, 15);
  for (var i = 0; i < MAX_LIVES; i++) drawHeart(ctx, pad + i * (hr * 2 + 4 * S) + hr, cy - 6 * S, hr, i < lives);
  if (lives < MAX_LIVES) {
    ctx.fillStyle = '#9fc0e0'; ctx.font = 'bold ' + GF.clamp(11 * S, 9, 15) + 'px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(fmtMMSS(msToNextLife()), pad, cy + 16 * S);
  }
  var stx = W * 0.5;
  drawStar(ctx, stx - 28 * S, cy, GF.clamp(12 * S, 8, 17), '#ffd36b');
  ctx.fillStyle = '#fff4d6'; ctx.font = 'bold ' + GF.clamp(22 * S, 16, 30) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('' + stars, stx - 12 * S, cy + 1 * S);
  drawObjectiveChip(ctx, W - pad, cy);
}
function drawObjectiveChip(ctx, rightX, cy) {
  if (!lvl) return;
  var S = GF.S;
  var remaining = Math.max(0, objectiveTarget() - objProgress);
  ctx.font = 'bold ' + GF.clamp(20 * S, 14, 28) + 'px sans-serif';
  var numTxt = '' + remaining, numW = ctx.measureText(numTxt).width;

  ctx.strokeStyle = 'rgba(150,200,250,0.25)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  var icx = chipX + iconR + 8 * S;

  else drawBuoy(ctx, icx, cy, iconR * 2);
  ctx.fillStyle = remaining === 0 ? '#7be0a3' : '#fff';

  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(numTxt, icx + iconR + 6 * S, cy + 1 * S);
}
function drawMovesBar(ctx) {
  var W = GF.W, S = GF.S;
  var y = topBarH + 2 * S, h = GF.clamp(40 * S, 30, 60);

  var x = W * 0.09, y = H * 0.2, lh = GF.clamp(24 * S, 18, 32), maxW = W * 0.82;

function wrapText(ctx, text, x, y, maxW, lh) {

// ── MAP SCREEN ───────────────────────────────────────────────────────────────
function drawMap(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#f6c98a'); g.addColorStop(0.34, '#e9a07a'); g.addColorStop(0.5, '#3a6b8c'); g.addColorStop(1, '#13384f');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  var scH = H * 0.44;
  drawHarbor(ctx, 0, 0, W, scH);
  var topH = GF.clamp(56 * S, 44, 78);
  ctx.fillStyle = 'rgba(8,20,30,0.5)'; ctx.fillRect(0, 0, W, topH);
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(22 * S, 16, 30) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('map'), 16 * S, topH / 2);
  drawStar(ctx, W - 72 * S, topH / 2, GF.clamp(13 * S, 9, 18), '#ffd36b');
  ctx.fillStyle = '#fff4d6'; ctx.font = 'bold ' + GF.clamp(20 * S, 15, 28) + 'px sans-serif';

  var pbh = GF.clamp(56 * S, 44, 74);

  mapBtns = [];
  var pbw = GF.clamp(320 * S, 210, 440);
  var pbx = W / 2 - pbw / 2, pby = H - pbh - GF.clamp(12 * S, 9, 20);
  var ni = nextPlayableLevel();
  drawBigBtn(ctx, pbx, pby, pbw, pbh, GF.t('playlevel') + ' ' + (ni + 1), '#2fa867', '#1f7d4c');
  mapBtns.push({ x: pbx, y: pby, w: pbw, h: pbh, fn: function () { startLevel(ni); } });
  // mute toggle top-right corner of map
  GF.drawMuteIcon(ctx, W - 26 * S, topH + 8 * S, GF.clamp(13 * S, 10, 18), GF.muted);
  mapBtns.push({ x: W - 26 * S - 20 * S, y: topH - 6 * S, w: 40 * S, h: 40 * S, fn: function () { GF.toggleMute(); GF.setMusicMuted(GF.muted); } });

  if (storyBeatT > 0 && storyBeat) {
    var alpha = Math.min(1, storyBeatT / 1);
    ctx.save(); ctx.globalAlpha = alpha;
    var sbw = W * 0.86, sbx = W / 2 - sbw / 2, sbh = GF.clamp(52 * S, 40, 70), sby = scH - sbh - 10 * S;
    ctx.fillStyle = 'rgba(10,24,36,0.9)'; GF.rr(ctx, sbx, sby, sbw, sbh, 12 * S); ctx.fill();
    ctx.fillStyle = '#ffe9a8'; ctx.font = 'italic ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    wrapTextCentered(ctx, storyBeat, W / 2, sby + sbh / 2, sbw - 24 * S, GF.clamp(19 * S, 15, 25));
    ctx.restore();

}
function wrapTextCentered(ctx, text, cx, cy, maxW, lh) {
  var words = String(text).split(/\s+/), lines = [], line = '';
  for (var i = 0; i < words.length; i++) { var test = line ? line + ' ' + words[i] : words[i]; if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = words[i]; } else line = test; }
  if (line) lines.push(line);
  var sy = cy - (lines.length - 1) * lh / 2;
  for (var j = 0; j < lines.length; j++) ctx.fillText(lines[j], cx, sy + j * lh);
}

function drawHarbor(ctx, x, y, w, h) {

  ctx.fillStyle = 'rgba(20,70,100,0.5)'; ctx.fillRect(x, y + h * 0.62, w, h * 0.38);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1.4 * S;
  for (var i = 0; i < 5; i++) { var yy = y + h * (0.66 + i * 0.06); ctx.beginPath(); ctx.moveTo(x + 20, yy); for (var xx = 20; xx < w; xx += 26 * S) ctx.lineTo(x + xx, yy + Math.sin(xx / (18 * S)) * 2 * S); ctx.stroke(); }

  }

  ctx.fillStyle = '#e9e4dc';
  ctx.beginPath(); ctx.moveTo(lx0, lbot); ctx.lineTo(lx0 + lw * 0.18, ltop); ctx.lineTo(lx0 + lw * 0.82, ltop); ctx.lineTo(lx0 + lw, lbot); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#d6425a';
  for (var sIdx = 0; sIdx < 3; sIdx++) { var sy0 = ltop + (lbot - ltop) * (0.18 + sIdx * 0.28); ctx.fillRect(lx0 + lw * 0.1, sy0, lw * 0.8, (lbot - ltop) * 0.1); }

  var lampY = ltop - 16 * S;

  if (lit('lamp')) {

    ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(lx0 + lw * 0.5, lampY + 8 * S, w * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,238,170,0.22)';
    ctx.beginPath(); ctx.moveTo(lx0 + lw * 0.5, lampY + 8 * S); ctx.lineTo(x + w * 0.05, y + h * 0.1); ctx.lineTo(x + w * 0.05, y + h * 0.36); ctx.closePath(); ctx.fill();
    ctx.restore();
  } else { ctx.fillStyle = 'rgba(80,90,100,0.6)'; ctx.fillRect(lx0 + lw * 0.28, lampY + 4 * S, lw * 0.44, 8 * S); }

    ctx.fillStyle = painted ? '#8a4a3a' : 'rgba(70,70,70,0.6)';
    ctx.beginPath(); ctx.moveTo(cx0 - 2 * S, cy0); ctx.lineTo(cx0 + cw / 2, cy0 - ch * 0.4); ctx.lineTo(cx0 + cw + 2 * S, cy0); ctx.closePath(); ctx.fill();
    if (painted) { ctx.fillStyle = '#ffe6a8'; ctx.fillRect(cx0 + cw * 0.35, cy0 + ch * 0.3, cw * 0.3, ch * 0.3); }
  }
  if (lit('dock')) {
    ctx.fillStyle = '#c9a14a'; ctx.fillRect(x + w * 0.1, y + h * 0.66, w * 0.26, 5 * S);
    for (var di = 0; di < 4; di++) ctx.fillRect(x + w * (0.12 + di * 0.07), y + h * 0.66, 3 * S, h * 0.08);
    if (lit('sails')) {
      var bx0 = x + w * 0.18, by0 = y + h * 0.7;
      ctx.fillStyle = '#5a4636'; ctx.beginPath(); ctx.moveTo(bx0, by0); ctx.lineTo(bx0 + 26 * S, by0); ctx.lineTo(bx0 + 20 * S, by0 + 8 * S); ctx.lineTo(bx0 + 6 * S, by0 + 8 * S); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#f0ede4'; ctx.beginPath(); ctx.moveTo(bx0 + 13 * S, by0); ctx.lineTo(bx0 + 13 * S, by0 - 20 * S); ctx.lineTo(bx0 + 24 * S, by0 - 4 * S); ctx.closePath(); ctx.fill();

  }

    for (var fi = 0; fi < 10; fi++) { var fx = x + w * (0.05 + fi * 0.095), fy = y + h * 0.18 + Math.sin(fi) * 6 * S; ctx.fillStyle = cols2[fi % cols2.length]; ctx.shadowColor = cols2[fi % cols2.length]; ctx.shadowBlur = 8; ctx.beginPath(); ctx.arc(fx, fy, 4 * S, 0, Math.PI * 2); ctx.fill(); }

}

function drawTaskList(ctx, panelY, panelH) {
  var W = GF.W, S = GF.S;
  ctx.fillStyle = 'rgba(8,22,34,0.72)'; GF.rr(ctx, 8 * S, panelY, W - 16 * S, panelH, 12 * S); ctx.fill();
  if (!mapScroll) mapScroll = GF.makeScroll('reno', { x: 8 * S, y: panelY, w: W - 16 * S, h: panelH });
  mapScroll.setViewport({ x: 8 * S, y: panelY, w: W - 16 * S, h: panelH });
  var cardH = GF.clamp(72 * S, 56, 96), gap = 8 * S;
  mapScroll.setContentHeight(RENO.length * (cardH + gap) + gap);
  var taskBtns = [];
  mapScroll.begin(ctx);
  for (var i = 0; i < RENO.length; i++) drawTaskCard(ctx, 16 * S, gap + i * (cardH + gap), W - 32 * S, cardH, i, taskBtns, panelY);
  mapScroll.end(ctx);
  mapScroll.draw(ctx);
  mapTaskBtns = taskBtns;
}
function drawTaskCard(ctx, x, cy, w, h, ti, btnList, panelY) {
  var S = GF.S, task = RENO[ti], done = renoDone[ti], locked = false;
  for (var j = 0; j < ti; j++) if (!renoDone[j]) locked = true;
  ctx.fillStyle = done ? 'rgba(40,90,60,0.6)' : locked ? 'rgba(30,40,52,0.55)' : 'rgba(28,52,76,0.82)';
  GF.rr(ctx, x, cy, w, h, 10 * S); ctx.fill();
  if (!done && !locked) { ctx.strokeStyle = 'rgba(150,200,250,0.25)'; ctx.lineWidth = 1.5 * S; GF.rr(ctx, x, cy, w, h, 10 * S); ctx.stroke(); }
  var bd = GF.clamp(34 * S, 26, 48);
  ctx.fillStyle = done ? '#2fa867' : locked ? 'rgba(80,90,110,0.6)' : '#3a7fc0';
  ctx.beginPath(); ctx.arc(x + 14 * S + bd / 2, cy + h / 2, bd / 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(15 * S, 11, 20) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('' + task.area, x + 14 * S + bd / 2, cy + h / 2 + 1 * S);
  ctx.fillStyle = locked ? '#7a8aa0' : '#fff'; ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  var tx = x + 14 * S + bd + 12 * S;
  ctx.fillText(GF.lang === 'ru' ? task.ru : task.en, tx, cy + h * 0.34);
  drawStar(ctx, tx + 7 * S, cy + h * 0.66, GF.clamp(9 * S, 7, 13), done ? '#7be0a3' : '#ffd36b');
  ctx.fillStyle = done ? '#9fe0b3' : (stars >= task.cost ? '#fff4d6' : '#d98a8a');
  ctx.font = 'bold ' + GF.clamp(14 * S, 11, 19) + 'px sans-serif';
  ctx.fillText(done ? GF.t('funded') : '' + task.cost, tx + 18 * S, cy + h * 0.66 + 1 * S);
  if (!done && !locked) {
    var fbw = GF.clamp(104 * S, 84, 134), fbh = GF.clamp(40 * S, 30, 54);
    var fbx = x + w - fbw - 12 * S, fby = cy + h / 2 - fbh / 2;
    var afford = stars >= task.cost;
    var grad = ctx.createLinearGradient(fbx, fby, fbx, fby + fbh);
    if (afford) { grad.addColorStop(0, '#ffd36b'); grad.addColorStop(1, '#e0a52f'); } else { grad.addColorStop(0, 'rgba(70,80,96,0.7)'); grad.addColorStop(1, 'rgba(50,58,72,0.7)'); }
    ctx.fillStyle = grad; GF.rr(ctx, fbx, fby, fbw, fbh, fbh / 2); ctx.fill();
    ctx.fillStyle = afford ? '#3a2a08' : '#9aa6b8'; ctx.font = 'bold ' + GF.clamp(14 * S, 11, 19) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('fund'), fbx + fbw / 2, fby + fbh / 2 + 1 * S);
    btnList.push({ x: fbx, y: mapScroll.contentToScreenY(fby), w: fbw, h: fbh, ti: ti, panelY: panelY, vph: mapScroll.vp.h });
  } else if (done) {
    ctx.strokeStyle = '#7be0a3'; ctx.lineWidth = 3 * S; ctx.lineCap = 'round';
    var ckx = x + w - 40 * S, cky = cy + h / 2;
    ctx.beginPath(); ctx.moveTo(ckx - 8 * S, cky); ctx.lineTo(ckx - 2 * S, cky + 7 * S); ctx.lineTo(ckx + 9 * S, cky - 8 * S); ctx.stroke();
  }
}
function onMapPress(px, py) {
  if (mapScroll && mapScroll.contains(px, py)) { mapPointerDown = { x: px, y: py }; mapScroll.dragStart(py); }
  for (var i = 0; i < mapBtns.length; i++) { var b = mapBtns[i]; if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) { b.fn(); return; } }
}
function onMapRelease(px, py) {
  if (mapScroll) {
    var moved = mapPointerDown ? Math.abs(py - mapPointerDown.y) : 0;
    mapScroll.dragEnd(); mapPointerDown = null;
    if (moved < 8 * GF.S) {
      for (var i = 0; i < mapTaskBtns.length; i++) {
        var b = mapTaskBtns[i];
        if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h && py >= b.panelY && py <= b.panelY + b.vph) { fundTask(b.ti); return; }
      }
    }
  }
}
function drawEpilogue(ctx) {

  ctx.fillStyle = 'rgba(8,16,28,0.9)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffe9a8'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(28 * S, 18, 40) + 'px sans-serif';
  ctx.fillText(GF.t('alldone'), W / 2, H * 0.4);
  ctx.fillStyle = '#cfe2f6'; ctx.font = 'italic ' + GF.clamp(16 * S, 12, 22) + 'px sans-serif';

// ── ENERGY SCREEN ────────────────────────────────────────────────────────────
var energyBtns = [];
function drawEnergy(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(8,16,28,0.9)'; ctx.fillRect(0, topBarH, W, H - topBarH);
  var cx = W / 2, cy = H * 0.34;
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(28 * S, 18, 40) + 'px sans-serif';
  ctx.fillText(GF.t('energyttl'), cx, cy - 40 * S);
  ctx.fillStyle = '#a9c6e4'; ctx.font = GF.clamp(15 * S, 11, 20) + 'px sans-serif';
  ctx.fillText(GF.t('energysub'), cx, cy);
  if (lives < MAX_LIVES) {
    ctx.fillStyle = '#ffd36b'; ctx.font = 'bold ' + GF.clamp(30 * S, 20, 44) + 'px sans-serif';
    ctx.fillText(GF.t('wait') + '  ' + fmtMMSS(msToNextLife()), cx, cy + 44 * S);
  } else { ctx.fillStyle = '#7be0a3'; ctx.font = 'bold ' + GF.clamp(22 * S, 16, 30) + 'px sans-serif'; ctx.fillText(GF.t('full'), cx, cy + 44 * S); }
  energyBtns = [];
  var bw = GF.clamp(280 * S, 200, 400), bh = GF.clamp(54 * S, 42, 72);
  var bx = cx - bw / 2, by = cy + 90 * S;
  var canDaily = lastDaily !== dayKey();
  drawBigBtn(ctx, bx, by, bw, bh, canDaily ? GF.t('daily') : GF.t('claimed'), canDaily ? '#c9772f' : 'rgba(70,80,96,0.7)', canDaily ? '#9d5a1f' : 'rgba(50,58,72,0.7)');
  energyBtns.push({ x: bx, y: by, w: bw, h: bh, fn: function () { claimDaily(); } });
  var by2 = by + bh + 12 * S;
  drawBigBtn(ctx, bx, by2, bw, bh, GF.t('refillad'), '#3a7fc0', '#2a5d92');
  energyBtns.push({ x: bx, y: by2, w: bw, h: bh, fn: function () { GF.ads.rewarded({ onReward: function () { lives = MAX_LIVES; lastLifeTs = Date.now(); GF.saveRun(); }, onClose: function () { if (lives > 0) startLevel(level); } }); } });
  var by3 = by2 + bh + 12 * S;
  drawBigBtn(ctx, bx, by3, bw, bh, GF.t('tomap'), '#46506a', '#363f55');
  energyBtns.push({ x: bx, y: by3, w: bw, h: bh, fn: function () { gs = 'MAP'; } });
  if (lives > 0) {
    var by4 = by3 + bh + 12 * S;
    drawBigBtn(ctx, bx, by4, bw, bh, GF.t('play'), '#2fa867', '#1f7d4c');
    energyBtns.push({ x: bx, y: by4, w: bw, h: bh, fn: function () { startLevel(level); } });
  }
}
function claimDaily() {
  if (lastDaily === dayKey()) { toast(GF.t('claimed')); GF.sfx('error'); return; }
  lastDaily = dayKey();
  coins += DAILY_COINS * (CFG.events && CFG.events.double_daily ? 2 : 1);
  lives = Math.min(MAX_LIVES, lives + 1);
  if (lives === 1) lastLifeTs = Date.now();
  GF.sfx('reward'); GF.juice.flash('#ffd36b', 240, 0.3);
  toast('+' + DAILY_COINS + ' ' + GF.t('coins'));
  GF.saveRun();
}
function onEnergyTap(px, py) { for (var i = 0; i < energyBtns.length; i++) { var b = energyBtns[i]; if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) { b.fn(); return; } } }

// ── TOAST ────────────────────────────────────────────────────────────────────
function drawToast(ctx) {
  if (toastT <= 0) return;
  var W = GF.W, S = GF.S, a = Math.min(1, toastT / 0.4);
  ctx.save(); ctx.globalAlpha = a;
  ctx.font = 'bold ' + GF.clamp(16 * S, 12, 22) + 'px sans-serif';
  var tw = ctx.measureText(toastTxt).width, pw = tw + 36 * S, ph = GF.clamp(40 * S, 30, 56);
  var px = W / 2 - pw / 2, py = GF.H * 0.74;
  ctx.fillStyle = 'rgba(10,22,36,0.92)'; GF.rr(ctx, px, py, pw, ph, ph / 2); ctx.fill();
  ctx.fillStyle = '#ffe9a8'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(toastTxt, W / 2, py + ph / 2 + 1 * S);
  ctx.restore();
}

// ── INPUT BINDINGS ───────────────────────────────────────────────────────────
function canvasXY(e) { var r = GF.canvas.getBoundingClientRect(); var sx = GF.canvas.width / r.width, sy = GF.canvas.height / r.height; return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy }; }
GF.canvas.addEventListener('pointerdown', function (e) { var p = canvasXY(e); onPress(p.x, p.y); }, { passive: true });
GF.canvas.addEventListener('pointermove', function (e) { if (gs === 'MAP' && mapScroll && mapScroll.isDragging()) { var p = canvasXY(e); mapScroll.dragMove(p.y); } }, { passive: true });
GF.canvas.addEventListener('pointerup', function (e) { var p = canvasXY(e); if (gs === 'MAP') onMapRelease(p.x, p.y); else onRelease(p.x, p.y); }, { passive: true });
GF.canvas.addEventListener('wheel', function (e) { if (gs === 'MAP' && mapScroll) mapScroll.handleWheel(e.deltaY); }, { passive: true });
document.addEventListener('keydown', function (e) {
  if (e.code === 'KeyM' && gs === 'PLAYING') openMap();
  else if (e.code === 'Space' || e.code === 'Enter') {
    if (gs === 'WIN' && winBtns.length) winBtns[0].fn();
    else if (gs === 'LOSE' && loseBtns.length) loseBtns[0].fn();
    else if (gs === 'HELP') gs = preHelp === 'HELP' ? 'PLAYING' : preHelp;
  }
});

// ── ECON SIM HOOK ────────────────────────────────────────────────────────────
function defineEconHook() {
  window.__gfEcon = {
    genre: 'idle',
    params: { RENO_COSTS: RENO.map(function (t) { return t.cost; }), LEVELS: LEVELS.length },
    initialState: function () { return { stars: 0, lvl: 0, reno: 0 }; },
    actions: function (s) {
      var acts = [];
      if (s.reno < RENO.length) acts.push({ id: 'fund' + s.reno, cost: RENO[s.reno].cost, ready: s.stars >= RENO[s.reno].cost });
      return acts;
    },
    step: function (s, a) {
      if (a.id === 'wait') {
        // The player isn't idle between fundings — they play levels back-to-back.
        // A level takes ~80s of play and yields ~2 stars (1-3, avg ~2). So stars
        // flow at ~2/80s = 1.5/min of active play; that is the "earn rate from
        // play" the gate models as wait-income for this non-passive economy.
        // Tuned so no inter-task gap exceeds ~3 min and the 24-star meta arc
        // spans ~16 min of play before content is exhausted.
        var perSec = 2 / 80;
        s.stars += a.dt * perSec;
        s.lvl = Math.min(LEVELS.length, s.lvl + a.dt / 80);
        return s;
      }
      var ti = parseInt(a.id.replace('fund', ''));
      if (ti === s.reno && s.stars >= RENO[ti].cost) { s.stars -= RENO[ti].cost; s.reno++; }
      return s;
    },
    metrics: function (s) { return { currency: s.stars, progress: s.reno * 100 + Math.floor(s.lvl) * 10 }; },
  };
}

// ── SCREENSHOT / TEST HOOKS ──────────────────────────────────────────────────
function exposeHooks() {
  GF.exposeState(function () {
    return { gs: gs, score: score, level: level + 1, area: lvl ? lvl.area : 1, moves: movesLeft, stars: stars, lives: lives, obj: objProgress, objTarget: lvl ? objectiveTarget() : 0 };
  });
  GF.exposeReach(function () {
    var W = GF.W, H = GF.H, S = GF.S;
    if (gs === 'MAP') {
      var pbw = GF.clamp(320 * S, 210, 440), pbh = GF.clamp(56 * S, 44, 74);
      return { screen: 'map', screenH: H, viewportH: H, items: [{ id: 'play_next', x: W / 2 - pbw / 2, y: H - pbh - GF.clamp(12 * S, 9, 20), w: pbw, h: pbh, pinned: true }] };
    }
    var m = bottomMetrics();
    var items = [ { id: 'board', x: boardX, y: boardY, w: boardPx, h: boardPx }, { id: 'harbor', x: m.hbx, y: m.hby, w: m.hbw, h: m.hbh } ];
    return { screen: 'playing', screenH: H, viewportH: H, items: items };
  });
  GF.exposeTour([
    { name: 'playing', go: function () { window._silent = true; if (gs !== 'PLAYING') startLevel(level); } },
    { name: 'map', go: function () { gs = 'MAP'; } },
    { name: 'energy', go: function () { gs = 'ENERGY'; } },
  ]);
  GF.exposeBot(function () { return (gs === 'PLAYING' && !resolving) ? ['swap'] : ['swap']; }, function (a) {
    if (a === 'swap') { var h = findHintSwap(); if (h) attemptSwap({ r: h.a.r, c: h.a.c }, { r: h.b.r, c: h.b.c }); }
  });
  window._setState = function (s) {
    if (s === 'PLAYING' || s === 'RESOLVING') { if (gs !== 'PLAYING') startLevel(level); }
    else if (s === 'MAP') gs = 'MAP';
    else if (s === 'ENERGY') gs = 'ENERGY';
    else if (s === 'WIN') { winStars = 3; gs = 'WIN'; }
    else if (s === 'LOSE') gs = 'LOSE';
    else if (s === 'HELP') { preHelp = 'PLAYING'; gs = 'HELP'; }
  };
  window._getI18N = function () { return STRINGS; };
  window._getFontBody = function () { return 'sans-serif'; };
  window._setupForScreenshot = function (n) {
    window._silent = true;
    GF.tutorial.active = false;   // suppress the first-run hand for a clean capture
    var L = (typeof n === 'number') ? ((n % LEVELS.length + LEVELS.length) % LEVELS.length) : 4;
    startLevel(L);
    objProgress = Math.floor(objectiveTarget() * 0.45);
    movesLeft = Math.max(6, lvl.moves - 7);
    score = 1200 + L * 340;
    stars = 9 + L;
    var placed = 0;
    for (var r = 0; r < GRID && placed < 3; r++) for (var c = 0; c < GRID && placed < 3; c++) {
      if ((r + c) % 5 === 0 && !cell(r, c).buoy) { cell(r, c).sp = [SP_LINEH, SP_LINEV, SP_AREA][placed % 3]; placed++; }
    }
    if (lvl.buoy) maybeSpawnBuoy();
    for (var i = 0; i < 4; i++) {
      var rr = 2 + i, cc = 2 + i;
      var px = boardX + cc * cellPx + cellPx / 2, py = boardY + rr * cellPx + cellPx / 2;
      GF.juice.particles.burst(px, py, { count: 9, colors: [GEMS[i].c1, GEMS[i].edge], speed: 150, gravity: 200, size: 5, life: 1.4 });
    }
    GF.juice.floatText(boardX + boardPx / 2, boardY + 36 * GF.S, 'x3  +60', { color: '#ffd36b', size: 18, life: 1.6 });
    gs = 'PLAYING';
  };
  window._jumpLevel = function (n) { window._setupForScreenshot(n); };
}

})();
