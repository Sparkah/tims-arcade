function genMaze(seed) {
  var rng = makeRng(seed);
  var cells = Math.min(12, MAZE_CELLS_BASE + Math.floor((tapeN - 1) * 0.55));
  MW = cells * 2 + 1; MH = cells * 2 + 1;
  MAP = [];
  for (var y = 0; y < MH; y++) { MAP[y] = []; for (var x = 0; x < MW; x++) MAP[y][x] = 1; }
  var stack = [[1, 1]], dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]];
  MAP[1][1] = 0;
  while (stack.length) {
    var cur = stack[stack.length - 1], opts = [];
    for (var d = 0; d < 4; d++) {
      var nx = cur[0] + dirs[d][0], ny = cur[1] + dirs[d][1];
      if (nx > 0 && nx < MW - 1 && ny > 0 && ny < MH - 1 && MAP[ny][nx] === 1) opts.push(d);
    }
    if (!opts.length) { stack.pop(); continue; }
    var pick = dirs[opts[(rng() * opts.length) | 0]];
    MAP[cur[1] + pick[1] / 2][cur[0] + pick[0] / 2] = 0;
    MAP[cur[1] + pick[1]][cur[0] + pick[0]] = 0;
    stack.push([cur[0] + pick[0], cur[1] + pick[1]]);
  }
  for (var oy = 1; oy < MH - 1; oy++) {
    for (var ox = 1; ox < MW - 1; ox++) {
      if (MAP[oy][ox] === 1 && rng() < 0.17) MAP[oy][ox] = 0;
    }
  }
  var far = bfsFarthest(1, 1);
  exitCell = { x: far.x, y: far.y };
  px = 1.5; py = 1.5;
  var bestA = 0, bestLen = -1;
  for (var k = 0; k < 8; k++) {
    var ang = k / 8 * 6.283185, len = rayClear(px, py, Math.cos(ang), Math.sin(ang));
    if (len > bestLen) { bestLen = len; bestA = ang; }
  }
  pa = bestA;
  placeTapeObjects(rng);
}

function bfsFarthest(sx, sy) {
  var dist = [], q = [[sx, sy]], best = { x: sx, y: sy, d: 0 }, nb = [[0, 1], [0, -1], [1, 0], [-1, 0]];
  for (var y = 0; y < MH; y++) { dist[y] = []; for (var x = 0; x < MW; x++) dist[y][x] = -1; }
  dist[sy][sx] = 0;
  for (var head = 0; head < q.length; head++) {
    var cur = q[head], cd = dist[cur[1]][cur[0]];
    if (cd > best.d) best = { x: cur[0], y: cur[1], d: cd };
    for (var i = 0; i < 4; i++) {
      var nx = cur[0] + nb[i][0], ny = cur[1] + nb[i][1];
      if (nx >= 0 && nx < MW && ny >= 0 && ny < MH && MAP[ny][nx] === 0 && dist[ny][nx] < 0) {
        dist[ny][nx] = cd + 1; q.push([nx, ny]);
      }
    }
  }
  return best;
}

function allFloorCells() {
  var a = [];
  for (var y = 1; y < MH - 1; y++) for (var x = 1; x < MW - 1; x++) {
    if (MAP[y][x] === 0 && !(x === 1 && y === 1) && !(x === exitCell.x && y === exitCell.y)) a.push({ x: x, y: y, d: Math.abs(x - 1) + Math.abs(y - 1) });
  }
  a.sort(function (p, q) { return p.d - q.d; });
  return a;
}

function placeTapeObjects(rng) {
  items = []; letters = []; foundMask = 0;
  var cells = allFloorCells();
  var used = {};
  function takeCell(minD, preferNear) {
    var pool = [];
    for (var i = 0; i < cells.length; i++) {
      var c = cells[i], key = c.x + ':' + c.y;
      if (used[key] || c.d < minD) continue;
      pool.push(c);
    }
    if (!pool.length) return null;
    var idx;
    if (preferNear) idx = Math.min(pool.length - 1, (rng() * Math.min(pool.length, 6)) | 0);
    else idx = (rng() * pool.length) | 0;
    var p = pool[idx]; used[p.x + ':' + p.y] = true; return p;
  }
  var chars = phraseChars();
  for (var li = 0; li < chars.length; li++) {
    var cell = null;
    if (li === 0) {
      for (var fd = 1.25; fd <= 2.2 && !cell; fd += 0.2) {
        var lx0 = px + Math.cos(pa) * fd, ly0 = py + Math.sin(pa) * fd;
        var fx = lx0 | 0, fy = ly0 | 0;
        if (fx > 0 && fy > 0 && fx < MW - 1 && fy < MH - 1 && MAP[fy][fx] === 0 && !(fx === exitCell.x && fy === exitCell.y)) {
          cell = { x: lx0 - 0.5, y: ly0 - 0.5, d: Math.abs(fx - 1) + Math.abs(fy - 1), exact: true };
          used[fx + ':' + fy] = true;
        }
      }
    }
    if (!cell) cell = takeCell(li === 0 ? 2 : 4, li === 0);
    if (!cell) cell = { x: 1, y: 2 };
    letters.push({ x: cell.x + 0.5, y: cell.y + 0.5, idx: li, bob: rng() * 6.28, got: false });
  }
  var packs = 3 + Math.min(5, Math.floor(tapeN * 0.45));
  for (var b = 0; b < packs; b++) {
    var bc = takeCell(3, false);
    if (bc) items.push({ x: bc.x + 0.5, y: bc.y + 0.5, type: 'battery', bob: rng() * 6.28, got: false });
  }
}

function isWall(x, y) {
  var mx = x | 0, my = y | 0;
  if (mx < 0 || my < 0 || mx >= MW || my >= MH) return true;
  return MAP[my][mx] === 1;
}
function canStand(x, y) {
  var r = PLAYER_RADIUS;
  return !isWall(x - r, y - r) && !isWall(x + r, y - r) && !isWall(x - r, y + r) && !isWall(x + r, y + r);
}
function rayClear(ox, oy, rx, ry) {
  var t = 0;
  while (t < 30) { t += 0.1; if (isWall(ox + rx * t, oy + ry * t)) return t; }
  return 30;
}
function hasLOS(ax, ay, bx, by) {
  var dx = bx - ax, dy = by - ay, d = Math.hypot(dx, dy);
  if (d < 0.01) return true;
  var steps = Math.ceil(d / 0.14);
  for (var i = 1; i < steps; i++) {
    var t = i / steps;
    if (isWall(ax + dx * t, ay + dy * t)) return false;
  }
  return true;
}

function startTape(opts) {
  opts = opts || {};
  if (!opts.keepMeta) {
    score = 0;
    tapeN = Math.max(1, meta.tapesRecovered + 1);
  }
  if (opts.replaySeed) {
    tapeSeed = opts.replaySeed | 0;
    replaySeed = tapeSeed;
  } else if (opts.daily) {
    tapeSeed = dailySeed();
    replaySeed = 0;
    dailyActive = true;
  } else {
    tapeSeed = 174000 + tapeN * 811 + ((Date.now() / 1000) | 0) % 100000;
    replaySeed = 0;
    dailyActive = false;
  }
  battery = BATTERY_MAX; staticAmt = 0; stamina = staminaMax();
  gs = 'PLAYING'; pauseMode = null; panel = null; runTime = 0; closeDone = false; shotMode = false;
  didMove = false; didLook = false; didLetter = false; coachPromptT = 0;
  genMaze(tapeSeed);
  scheduleMonster();
  GF.gameStarted();
  GF.sfx('spawn');
  persistSave();
}

function resumeTape(s) {
  if (!s || !s.seed) { startTape({ keepMeta: false }); return; }
  tapeN = s.tapeN || tapeN; tapeSeed = s.seed | 0; score = s.score | 0;
  battery = typeof s.battery === 'number' ? s.battery : BATTERY_MAX;
  staticAmt = s.staticAmt || 0; stamina = s.stamina || staminaMax();
  dailyActive = !!s.dailyActive; replaySeed = s.replaySeed | 0;
  genMaze(tapeSeed);
  foundMask = s.foundMask | 0;
  for (var i = 0; i < letters.length; i++) letters[i].got = !!(foundMask & (1 << letters[i].idx));
  if (typeof s.px === 'number' && canStand(s.px, s.py)) { px = s.px; py = s.py; }
  if (typeof s.pa === 'number') pa = s.pa;
  gs = s.gs === 'GAMEOVER' ? 'PLAYING' : 'PLAYING';
  pauseMode = null; panel = null; runTime = s.runTime || 0; closeDone = !!s.closeDone;
  scheduleMonster();
  GF.gameStarted();
}

function collectLetter(l) {
  if (l.got) return;
  l.got = true;
  foundMask |= (1 << l.idx);
  didLetter = true;
  score += 35 + tapeN * 4;
  battery = Math.min(BATTERY_MAX, battery + 5);
  showToast(T('found'), phraseChars()[l.idx], '#8ee8df');
  GF.sfx('pickup');
  GF.juice.particles.burst(GF.W * 0.5, GF.H * 0.42, { color: '#8ee8df', count: 28, speed: 150, life: 0.7 });
  GF.juice.floatText(GF.W * 0.5, GF.H * 0.34, '+' + (35 + tapeN * 4), { color: '#dffffc' });
  if (phraseComplete()) GF.sfx('unlock');
  persistSave();
}

function collectBattery(it) {
  if (it.got) return;
  it.got = true;
  var val = batteryRestore();
  battery = Math.min(BATTERY_MAX, battery + val);
  score += 15;
  showToast(T('battery'), '+' + val, '#80d28a');
  GF.sfx('coin');
  GF.juice.particles.burst(GF.W * 0.5, GF.H * 0.52, { color: '#80d28a', count: 18, speed: 120, life: 0.55 });
  persistSave();
}

function completeTape() {
  gs = 'TAPE_COMPLETE';
  var gain = 2 + Math.floor(foundCount() / 2) + (dailyActive ? (CFG.events.double_daily ? 4 : 2) : 0);
  score += TAPE_SCORE + tapeN * 20;
  meta.shards += Math.max(1, Math.round(gain * CFG.tuning.shard_mult));
  meta.tapesRecovered++;
  if (dailyActive) meta.dailyDay = todayDay();
  if (score > meta.bestScore) meta.bestScore = score;
  meta.shelf.unshift({ n: meta.tapesRecovered, seed: tapeSeed, score: score, day: todayDay(), daily: dailyActive });
  if (meta.shelf.length > 16) meta.shelf.length = 16;
  saveMeta();
  showToast(T('tape_complete'), '+' + gain + ' ' + T('shards'), '#2ddf9a');
  GF.sfx('win');
  GF.juice.flash('#9fffe1', 500, 0.45);
  GF.happytime && GF.happytime();
  persistSave();
  window.setTimeout(function () { startTape({ keepMeta: false }); }, 950);
}

function gameOver(reason) {
  if (gs === 'GAMEOVER') return;
  gs = 'GAMEOVER'; lastReason = reason || 'battery';
  var gain = Math.max(1, Math.floor(foundCount() / 3));
  meta.shards += gain;
  if (score > meta.bestScore) meta.bestScore = score;
  saveMeta();
  GF.sfx('lose');
  GF.juice.shake(14, 520);
  GF.juice.flash('#ffffff', 150, 0.65);
  glitchT = Math.max(glitchT, 1.2);
  GF.gameEnded();
  if (!firstDeathMarked) { firstDeathMarked = true; GF.funnel.mark('first_death'); }
  persistSave();
}

function scheduleMonster() {
  monster.mode = 'hidden';
  monster.t = 0; monster.centerT = 0; monster.closeDamaged = false;
  if (DEBUG_MONSTER) monster.nextT = 2.4;
  else monster.nextT = RARE_GLIMPSE_MIN_SEC + Math.random() * (RARE_GLIMPSE_MAX_SEC - RARE_GLIMPSE_MIN_SEC);
}

function spawnMonster(kind) {
  var dist = kind === 'close' ? 2.1 : (5.5 + Math.random() * 2.8);
  var side = kind === 'glimpse' ? (Math.random() < 0.5 ? -1 : 1) * (0.55 + Math.random() * 0.35) : 0;
  if (DEBUG_MONSTER && kind === 'glimpse') {
    side = 0.12;
    dist = Math.max(1.7, Math.min(3.0, rayClear(px, py, Math.cos(pa + side), Math.sin(pa + side)) - 0.7));
  }
  var ang = pa + side;
  var tx = px + Math.cos(ang) * dist, ty = py + Math.sin(ang) * dist;
  if (isWall(tx, ty) || !hasLOS(px, py, tx, ty)) {
    var cells = allFloorCells();
    for (var i = cells.length - 1; i >= 0; i--) {
      var c = cells[i], cx = c.x + 0.5, cy = c.y + 0.5;
      if (Math.hypot(cx - px, cy - py) > 4 && hasLOS(px, py, cx, cy)) { tx = cx; ty = cy; break; }
    }
  }
  monster.mode = kind;
  monster.x = tx; monster.y = ty; monster.t = kind === 'close' ? 1.3 : 2.1;
  monster.centerT = 0; monster.closeDamaged = false;
  glitchT = Math.max(glitchT, kind === 'close' ? 0.9 : 0.35);
  GF.sfx(kind === 'close' ? 'hurt' : 'hit');
  if (DEBUG_MONSTER) showToast(T('debug'), T('static'), '#a9a0ff');
}

function updateMonster(dt) {
  if (shotMode || (GF.tutorial.active && !DEBUG_MONSTER)) return;
  if (monster.mode === 'hidden') {
    if (DEBUG_MONSTER) {
      monster.nextT -= dt;
      if (monster.nextT <= 0) { spawnMonster('glimpse'); monster.nextT = 3.5; }
    } else {
      monster.nextT -= dt;
      if (monster.nextT <= 0) spawnMonster('glimpse');
      if (!closeDone && runTime >= SCRIPTED_CLOSE_SEC) { closeDone = true; spawnMonster('close'); }
    }
    return;
  }
  monster.t -= dt;
  if (monster.mode === 'close' && !monster.closeDamaged && monster.t < 1.05) {
    monster.closeDamaged = true;
    staticAmt = Math.min(STATIC_MAX, staticAmt + STATIC_DAMAGE_CLOSE * shieldMul());
    battery = Math.max(0, battery - 13 * shieldMul());
    glitchT = Math.max(glitchT, 1.15);
    GF.juice.shake(11, 420);
    GF.juice.flash('#dffffc', 140, 0.45);
  }
  if (monster.mode === 'glimpse' && !DEBUG_MONSTER) {
    var screen = projectPoint(monster.x, monster.y);
    if (screen && Math.abs(screen.x - GF.W * 0.5) < GF.W * 0.12) monster.centerT += dt * 1000;
    if (monster.centerT >= GLIMPSE_CENTER_MS) monster.t = 0;
  }
  if (monster.t <= 0) {
    monster.mode = 'hidden';
    monster.nextT = DEBUG_MONSTER ? 3.2 : (RARE_GLIMPSE_MIN_SEC + Math.random() * (RARE_GLIMPSE_MAX_SEC - RARE_GLIMPSE_MIN_SEC));
  }
}

function showToast(head, body, col) {
  toast.t = 2.5; toast.head = head; toast.body = body; toast.col = col || '#8ee8df';
}

function grantFreeGear(idx) {
  if (meta.freeGranted[idx]) return;
  meta.freeGranted[idx] = true;
  var best = GEAR[0], low = 99;
  for (var i = 0; i < GEAR.length; i++) {
    var u = upgrade(GEAR[i].id);
    if (u < low && u < 5) { low = u; best = GEAR[i]; }
  }
  if (!gearMaxed(best)) meta.upgrades[best.id] = upgrade(best.id) + 1;
  saveMeta();
  showToast(T('free_gear'), T(best.name), best.col);
  GF.sfx('reward');
  GF.juice.particles.burst(GF.W * 0.5, GF.H * 0.5, { color: best.col, count: 38, speed: 190, life: 0.8 });
  if (!firstUpgradeMarked) { firstUpgradeMarked = true; GF.funnel.mark('first_upgrade'); }
}

function buyGear(g) {
  if (gearMaxed(g)) { GF.sfx('click'); return; }
  var cost = gearCost(g);
  if (meta.shards < cost) { showToast(T('not_enough'), cost + ' ' + T('shards'), '#d48787'); GF.sfx('error'); return; }
  meta.shards -= cost;
  meta.upgrades[g.id] = upgrade(g.id) + 1;
  saveMeta();
  showToast(T('granted'), T(g.name), g.col);
  GF.sfx('reward');
  GF.juice.particles.burst(GF.W * 0.5, GF.H * 0.5, { color: g.col, count: 42, speed: 190, life: 0.85 });
  if (!firstUpgradeMarked) { firstUpgradeMarked = true; GF.funnel.mark('first_upgrade'); }
}

function saveMeta() {
  try { localStorage.setItem('pool_tape_meta_v1', JSON.stringify(meta)); } catch (e) {}
}
function loadMeta() {
  try {
    var raw = localStorage.getItem('pool_tape_meta_v1');
    if (!raw) return;
    var o = JSON.parse(raw);
    if (!o) return;
    meta.shards = o.shards | 0; meta.tapesRecovered = o.tapesRecovered | 0; meta.bestScore = o.bestScore | 0;
    meta.totalPlayMs = o.totalPlayMs || 0;
    meta.freeGranted = Array.isArray(o.freeGranted) ? o.freeGranted : [false, false, false];
    meta.upgrades = o.upgrades || meta.upgrades;
    meta.shelf = Array.isArray(o.shelf) ? o.shelf.slice(0, 16) : [];
    meta.dailyDay = o.dailyDay | 0;
  } catch (e) {}
}
function persistSave() { try { GF.saveRun(); } catch (e) {} }

function update(dt) {
  GF.juice.update(dt);
  var gdt = dt * GF.juice.timeScale;
  if (toast.t > 0) toast.t -= dt;
  if (glitchT > 0) glitchT -= dt;
  GF.tutorial.update(dt);
  if (GF.tutorial.active) {
    var stp = GF.tutorial.step;
    if (stp === 0 && didMove) GF.tutorial.next();
    else if (stp === 1 && didLook) GF.tutorial.next();
    else if (stp === 2 && didLetter) GF.tutorial.next();
    else if (stp === 3) { coachPromptT += dt; if (coachPromptT > 2.4) GF.tutorial.next(); }
  } else if (!tutorialDoneMarked) {
    tutorialDoneMarked = true;
    GF.funnel.mark('tutorial_done');
  }
  if (gs === 'TAPE_COMPLETE') return;
  if (gs !== 'PLAYING' || pauseMode || panel) { moving = false; return; }

  var turn = 0, mf = 0, st = 0;
  if (GF.keys['ArrowLeft'] || GF.keys['KeyQ']) turn -= 1;
  if (GF.keys['ArrowRight'] || GF.keys['KeyE']) turn += 1;
  if (GF.keys['KeyW'] || GF.keys['ArrowUp']) mf += 1;
  if (GF.keys['KeyS'] || GF.keys['ArrowDown']) mf -= 1;
  if (GF.keys['KeyA']) st -= 1;
  if (GF.keys['KeyD']) st += 1;
  if (tMove.id !== null) { mf += -tMove.dy; st += tMove.dx; }
  if (tLook.id !== null) { pa += tLook.turn; tLook.turn = 0; }
  pa += turn * TURN_SPEED * gdt;
  if (pa < 0) pa += 6.283185;
  if (pa > 6.283185) pa -= 6.283185;

  var ml = Math.hypot(mf, st);
  if (ml > 1) { mf /= ml; st /= ml; ml = 1; }
  var sprintish = ml > 0.82;
  var spd = MOVE_SPEED * (sprintish && stamina > 2 ? SPRINT_MULT : 1);
  var cos = Math.cos(pa), sin = Math.sin(pa);
  var vx = (cos * mf - sin * st) * spd * gdt;
  var vy = (sin * mf + cos * st) * spd * gdt;
  if (canStand(px + vx, py)) px += vx;
  if (canStand(px, py + vy)) py += vy;
  moving = ml > 0.05;
  if (moving) {
    didMove = true; walkPhase += gdt * 8.5; bob = Math.sin(walkPhase) * 2.7;
    if (sprintish) stamina = Math.max(0, stamina - 18 * gdt);
  } else {
    bob *= 0.88; stamina = Math.min(staminaMax(), stamina + 16 * gdt);
  }
  if (turn !== 0 || Math.abs(tLook.turn) > 0 || tLook.id !== null) didLook = true;

  runTime += gdt;
  if (!shotMode) {
    meta.totalPlayMs += gdt * 1000;
    for (var fg = 0; fg < FREE_GEAR_MS.length; fg++) if (!meta.freeGranted[fg] && meta.totalPlayMs >= FREE_GEAR_MS[fg]) grantFreeGear(fg);
  }

  staticAmt = Math.max(0, staticAmt - STATIC_DECAY * gdt);
  if (!shotMode && runTime > 12) {
    var drain = BATTERY_DRAIN_WALK + BATTERY_DRAIN_LAMP * (1 + tapeN * 0.025) * CFG.tuning.battery_mult;
    if (moving && sprintish) drain += BATTERY_DRAIN_SPRINT * Math.max(0.38, 1 - upgrade('stamina') * 0.08);
    battery = Math.max(0, battery - drain * gdt);
    if (battery <= 0) { gameOver('battery'); return; }
  }

  for (var i = 0; i < letters.length; i++) {
    var l = letters[i]; if (l.got) continue;
    l.bob += gdt * 2.7;
    if (Math.hypot(l.x - px, l.y - py) < 0.68) collectLetter(l);
  }
  for (var j = 0; j < items.length; j++) {
    var it = items[j]; if (it.got) continue;
    it.bob += gdt * 2.3;
    if (Math.hypot(it.x - px, it.y - py) < 0.58) collectBattery(it);
  }
  if (phraseComplete() && (px | 0) === exitCell.x && (py | 0) === exitCell.y) { completeTape(); return; }

  updateMonster(gdt);
  ambientCueT -= gdt;
  if ((monster.mode !== 'hidden' || staticAmt > 55) && ambientCueT <= 0) {
    ambientCueT = monster.mode === 'hidden' ? 1.1 : 0.34;
    GF.tone(monster.mode === 'close' ? 90 : 140, 0.12, 'sawtooth', 0.045, 55);
  }
}

function renderWorld(ctx, W, H) {
  dirX = Math.cos(pa); dirY = Math.sin(pa);
  planeScale = Math.tan(FOV_DEG * Math.PI / 360);
  planeX = -dirY * planeScale; planeY = dirX * planeScale;
  var horizon = H * 0.51 + bob;
  var ceil = ctx.createLinearGradient(0, 0, 0, horizon);
  ceil.addColorStop(0, '#102429'); ceil.addColorStop(0.6, '#173a40'); ceil.addColorStop(1, '#2a6268');
  ctx.fillStyle = ceil; ctx.fillRect(0, 0, W, horizon);
  var floor = ctx.createLinearGradient(0, horizon, 0, H);
  floor.addColorStop(0, '#123237'); floor.addColorStop(1, '#071416');
  ctx.fillStyle = floor; ctx.fillRect(0, horizon, W, H - horizon);
  ctx.fillStyle = 'rgba(180,255,245,0.06)';
  for (var stripe = 1; stripe < 7; stripe++) {
    var yy = horizon + (H - horizon) * stripe / 7;
    ctx.fillRect(0, yy, W, Math.max(1, H * 0.002));
  }
  ctx.fillStyle = 'rgba(230,255,255,0.08)';
  for (var lz = 1; lz <= 4; lz++) {
    var ly = horizon - horizon * (lz / 5);
    ctx.fillRect(W * 0.18, ly, W * 0.64, Math.max(2, H * 0.008));
  }

  COL = W > 1100 ? 3 : 2;
  var nCols = Math.ceil(W / COL);
  if (!zbuf || zbuf.length < nCols + 2) zbuf = new Float32Array(nCols + 2);
  var projDist = H * WALL_H;
  for (var s = 0, ci = 0; s < W; s += COL, ci++) {
    var cameraX = 2 * (s + COL * 0.5) / W - 1;
    var rdx = dirX + planeX * cameraX, rdy = dirY + planeY * cameraX;
    var mapX = px | 0, mapY = py | 0;
    var ddx = rdx === 0 ? 1e30 : Math.abs(1 / rdx);
    var ddy = rdy === 0 ? 1e30 : Math.abs(1 / rdy);
    var stepX, stepY, sdx, sdy;
    if (rdx < 0) { stepX = -1; sdx = (px - mapX) * ddx; } else { stepX = 1; sdx = (mapX + 1 - px) * ddx; }
    if (rdy < 0) { stepY = -1; sdy = (py - mapY) * ddy; } else { stepY = 1; sdy = (mapY + 1 - py) * ddy; }
    var hit = 0, side = 0, guard = 0;
    while (!hit && guard++ < 220) {
      if (sdx < sdy) { sdx += ddx; mapX += stepX; side = 0; } else { sdy += ddy; mapY += stepY; side = 1; }
      if (mapX < 0 || mapY < 0 || mapX >= MW || mapY >= MH || MAP[mapY][mapX] === 1) hit = 1;
    }
    var perp = side === 0 ? (sdx - ddx) : (sdy - ddy);
    if (perp < 0.02) perp = 0.02;
    zbuf[ci] = perp;
    var lineH = projDist / perp;
    var drawStart = horizon - lineH * 0.5, drawEnd = horizon + lineH * 0.5;
    var wallX = side === 0 ? (py + perp * rdy) : (px + perp * rdx);
    wallX -= Math.floor(wallX);
    var texX = (wallX * TEXW) | 0;
    if ((side === 0 && rdx > 0) || (side === 1 && rdy < 0)) texX = TEXW - 1 - texX;
    ctx.drawImage(texWall, texX, 0, 1, TEXH, s, drawStart, COL, drawEnd - drawStart);
    var sh = GF.clamp(perp / 9, 0, 0.82);
    if (side === 1) sh = Math.min(0.9, sh + 0.13);
    ctx.fillStyle = 'rgba(0,18,20,' + sh.toFixed(3) + ')';
    ctx.fillRect(s, drawStart, COL, drawEnd - drawStart);
  }

  var sprites = [{ kind: 'exit', x: exitCell.x + 0.5, y: exitCell.y + 0.5 }];
  for (var i = 0; i < items.length; i++) if (!items[i].got) sprites.push({ kind: 'battery', x: items[i].x, y: items[i].y, bob: items[i].bob });
  for (var j = 0; j < letters.length; j++) if (!letters[j].got) sprites.push({ kind: 'letter', x: letters[j].x, y: letters[j].y, bob: letters[j].bob, idx: letters[j].idx });
  if (monster.mode !== 'hidden') sprites.push({ kind: 'monster', x: monster.x, y: monster.y, close: monster.mode === 'close' });
  for (var sp = 0; sp < sprites.length; sp++) sprites[sp].dist = (sprites[sp].x - px) * (sprites[sp].x - px) + (sprites[sp].y - py) * (sprites[sp].y - py);
  sprites.sort(function (a, b) { return b.dist - a.dist; });
  for (var q = 0; q < sprites.length; q++) drawBillboard(ctx, sprites[q], W, H, horizon, projDist);

  var beamR = Math.min(W, H) * (lampRadius() + (battery / BATTERY_MAX) * 0.06);
  var bx = W * 0.5, by = horizon + Math.min(W, H) * 0.05;
  var vg = ctx.createRadialGradient(bx, by, beamR * 0.18, bx, by, beamR);
  var edge = GF.clamp(0.94 - battery / 1000, 0.74, 0.97);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(0.58, 'rgba(0,0,0,' + (edge * 0.42).toFixed(3) + ')');
  vg.addColorStop(1, 'rgba(0,0,0,' + edge.toFixed(3) + ')');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  var sg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.22, W / 2, H / 2, Math.max(W, H) * 0.64);
  var sa = (staticAmt / STATIC_MAX) * 0.42;
  sg.addColorStop(0, 'rgba(0,0,0,0)');
  sg.addColorStop(1, 'rgba(180,245,245,' + sa.toFixed(3) + ')');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);
}

function projectPoint(x, y) {
  var dx = x - px, dy = y - py;
  var invDet = 1.0 / (planeX * dirY - dirX * planeY);
  var tx = invDet * (dirY * dx - dirX * dy), tz = invDet * (-planeY * dx + planeX * dy);
  if (tz <= 0.1) return null;
  return { x: (GF.W * 0.5) * (1 + tx / tz), z: tz };
}

function drawBillboard(ctx, sp, W, H, horizon, projDist) {
  var dx = sp.x - px, dy = sp.y - py;
  var invDet = 1.0 / (planeX * dirY - dirX * planeY);
  var tx = invDet * (dirY * dx - dirX * dy), tz = invDet * (-planeY * dx + planeX * dy);
  if (tz <= 0.1) return;
  var screenX = (W * 0.5) * (1 + tx / tz), vh = projDist / tz;
  var ci = Math.max(0, Math.min((screenX / COL) | 0, zbuf.length - 1));
  if (tz >= zbuf[ci]) return;

  if (sp.kind === 'letter') {
    var chs = phraseChars(), ch = chs[sp.idx] || '?';
    var bobY = Math.sin(sp.bob || 0) * vh * 0.05;
    var fs = GF.clamp(vh * 0.46, 18, 96), cy = horizon + vh * 0.04 + bobY;
    var glow = ctx.createRadialGradient(screenX, cy, 1, screenX, cy, fs * 1.2);
    glow.addColorStop(0, 'rgba(120,255,235,0.45)'); glow.addColorStop(1, 'rgba(120,255,235,0)');
    ctx.fillStyle = glow; ctx.fillRect(screenX - fs * 1.3, cy - fs * 1.3, fs * 2.6, fs * 2.6);
    ctx.fillStyle = '#dffffc'; ctx.strokeStyle = '#10565c'; ctx.lineWidth = Math.max(2, fs * 0.05);
    ctx.font = 'bold ' + (fs | 0) + 'px ' + FONT_MONO; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeText(ch, screenX, cy);
    ctx.fillText(ch, screenX, cy);
    return;
  }

  var img, scale = 1.0, yoff = 0;
  if (sp.kind === 'battery') { img = sprBattery; scale = 0.58; yoff = Math.sin(sp.bob || 0) * vh * 0.04; }
  else if (sp.kind === 'monster') { img = sprMonster; scale = sp.close ? 2.0 : 1.55; }
  else { img = sprExit; scale = 1.52; }
  var sh = vh * scale, sw = sh * (img.width / img.height);
  var floorY = horizon + vh * 0.5, topY = floorY - sh + yoff, startX = screenX - sw / 2;
  var ci0 = Math.max(0, Math.floor(startX / COL)), ci1 = Math.min(Math.ceil((startX + sw) / COL), zbuf.length - 1);
  var any = false;
  for (var col = ci0; col <= ci1; col++) {
    var sx = col * COL;
    if (tz >= zbuf[col]) continue;
    any = true;
    var texX = (sx - startX) / sw;
    if (texX < 0) texX = 0; if (texX > 1) texX = 1;
    ctx.drawImage(img, (texX * img.width) | 0, 0, 1, img.height, sx, topY, COL, sh);
  }
  if (!any) return;
  if (sp.kind === 'exit') {
    var open = phraseComplete(), prev = ctx.globalCompositeOperation;
    ctx.globalCompositeOperation = 'lighter';
    var g = ctx.createRadialGradient(screenX, topY + sh * 0.45, 2, screenX, topY + sh * 0.45, sw * 1.15);
    g.addColorStop(0, open ? 'rgba(70,255,170,0.55)' : 'rgba(80,120,120,0.22)');
    g.addColorStop(1, 'rgba(70,255,170,0)');
    ctx.fillStyle = g; ctx.fillRect(screenX - sw, topY, sw * 2, sh);
    ctx.globalCompositeOperation = prev;
  } else if (sp.kind === 'monster') {
    var pm = ctx.globalCompositeOperation;
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = 'rgba(210,255,245,0.13)';
    ctx.fillRect(screenX - sw * 0.62, topY + sh * 0.05, sw * 1.24, sh * 0.36);
    ctx.globalCompositeOperation = pm;
  }
}

function draw(ctx, dt) {
  var W = GF.W, H = GF.H;
  ctx.save();
  ctx.translate(GF.juice.offsetX, GF.juice.offsetY);
  renderWorld(ctx, W, H);
  drawHUD(ctx, W, H);
  if (pauseMode === 'pause') drawPause(ctx, W, H);
  if (panel === 'shop') drawShop(ctx, W, H);
  if (panel === 'shelf') drawShelf(ctx, W, H);
  if (pauseMode === 'help') drawHelp(ctx, W, H);
  if (gs === 'GAMEOVER') drawGameOver(ctx, W, H);
  if (gs === 'TAPE_COMPLETE') drawComplete(ctx, W, H);
  drawToast(ctx, W, H);
  GF.juice.particles.draw(ctx);

function drawPhrase(ctx, cx, y) {
  var chars = phraseChars(), S = GF.S;

function wrapDraw(ctx, text, x, y, maxW, lh) {
  var words = String(text).split(/\s+/), line = '';
  for (var i = 0; i < words.length; i++) {
    var p = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(p).width > maxW && line) { ctx.fillText(line, x, y); y += lh; line = words[i]; }
    else line = p;
  }
  if (line) { ctx.fillText(line, x, y); y += lh; }
  return y;
}

  ctx.fillStyle = '#eafffb'; ctx.font = (GF.clamp(16 * S, 13, 21) | 0) + 'px ' + FONT_UI; ctx.fillText(toast.body, W / 2, by + bh * 0.68);

function drawVHS(ctx, W, H) {
  var t = Date.now() * 0.001;
  ctx.save();
  ctx.globalAlpha = 0.17;
  ctx.fillStyle = '#001516';
  for (var y = ((t * 19) | 0) % 4; y < H; y += 4) ctx.fillRect(0, y, W, 1);
  ctx.globalAlpha = 0.08 + staticAmt / 900;
  var count = W < 500 ? 34 : 70;
  var seed = ((t * 1000) | 0) + glitchSeed;
  for (var i = 0; i < count; i++) {
    seed = (seed * 1664525 + 1013904223) | 0;
    var x = ((seed >>> 8) % Math.max(1, W)) | 0;
    seed = (seed * 1664525 + 1013904223) | 0;
    var yy = ((seed >>> 8) % Math.max(1, H)) | 0;
    ctx.fillStyle = (i & 1) ? '#dffffc' : '#071013';
    ctx.fillRect(x, yy, 1 + ((seed >>> 2) & 2), 1);
  }
  if (glitchT > 0 || monster.mode !== 'hidden') {
    var bars = glitchT > 0.4 ? 7 : 3;
    ctx.globalAlpha = Math.min(0.42, 0.12 + glitchT * 0.28);
    for (var g = 0; g < bars; g++) {
      var gy = ((Math.sin(t * 15 + g * 3.1) * 0.5 + 0.5) * H) | 0;
      var gh = 4 + ((g * 7) % 18);
      var off = Math.sin(t * 22 + g) * 18;
      ctx.fillStyle = g & 1 ? 'rgba(200,255,255,0.55)' : 'rgba(255,80,90,0.35)';
      ctx.fillRect(off, gy, W, gh);
    }
  }
  var wob = Math.sin(t * 5.7) * 1.2;
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#ff4860'; ctx.strokeRect(1 + wob, 1, W - 2, H - 2);
  ctx.strokeStyle = '#5af3ff'; ctx.strokeRect(1 - wob, 1, W - 2, H - 2);
  ctx.restore();
}

var tMove = { id: null, sx: 0, sy: 0, dx: 0, dy: 0 };
var tLook = { id: null, lx: 0, turn: 0 };
var mouseDown = false;

function toCanvas(e) {
  var r = GF.canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) * GF.W / r.width, y: (e.clientY - r.top) * GF.H / r.height };
}
function hit(b, x, y) { return b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }

function onUI(x, y) {
  if (hit(ui.mute, x, y)) { GF.toggleMute(); GF.sfx('click'); return true; }
  if (panel === 'shop') {
    if (hit(ui.back, x, y)) { panel = null; GF.sfx('click'); return true; }
    for (var i = 0; i < GEAR.length; i++) if (hit(ui['buy_' + GEAR[i].id], x, y)) { buyGear(GEAR[i]); return true; }
    return true;
  }
  if (panel === 'shelf') {
    if (hit(ui.back, x, y)) { panel = null; GF.sfx('click'); return true; }
    for (var s = 0; s < shelfRects.length; s++) if (hit(shelfRects[s].rect, x, y)) { dailyActive = false; startTape({ replaySeed: shelfRects[s].seed, keepMeta: true }); return true; }
    return true;
  }
  if (pauseMode === 'help') {
    if (hit(ui.resume, x, y)) { pauseMode = null; GF.sfx('click'); return true; }
    return true;
  }
  if (pauseMode === 'pause') {
    if (hit(ui.resume, x, y)) { pauseMode = null; GF.sfx('click'); return true; }
    if (hit(ui.shop, x, y)) { panel = 'shop'; GF.sfx('click'); return true; }
    if (hit(ui.shelf, x, y)) { panel = 'shelf'; GF.sfx('click'); return true; }
    if (hit(ui.daily, x, y)) { if (dailyAvailable()) startTape({ daily: true, keepMeta: true }); else showToast(T('daily_done'), T('daily'), '#f4d17a'); return true; }
    if (hit(ui.restart, x, y)) { startTape({ keepMeta: true }); return true; }
    return true;
  }
  if (gs === 'GAMEOVER') {
    if (hit(ui.retry, x, y) || true) { startTape({ keepMeta: true }); return true; }
  }
  if (hit(ui.pause, x, y)) { pauseMode = 'pause'; saveMeta(); persistSave(); GF.sfx('click'); return true; }
  if (hit(ui.help, x, y)) { pauseMode = 'help'; GF.sfx('click'); return true; }
  return false;
}

function pointerDown(id, x, y) {
  if (onUI(x, y)) return;
  if (gs !== 'PLAYING' || pauseMode || panel) return;
  if (x < GF.W * 0.5) {
    if (tMove.id === null) tMove = { id: id, sx: x, sy: y, dx: 0, dy: 0 };
  } else {
    if (tLook.id === null) tLook = { id: id, lx: x, turn: 0 };
  }
}
function pointerMove(id, x, y) {
  if (tMove.id === id) {
    var dx = x - tMove.sx, dy = y - tMove.sy, mx = 58 * GF.S;
    tMove.dx = GF.clamp(dx / mx, -1, 1); tMove.dy = GF.clamp(dy / mx, -1, 1);
  } else if (tLook.id === id) {
    tLook.turn += (x - tLook.lx) * LOOK_SENS; tLook.lx = x; didLook = true;
  }
}
function pointerUp(id) {
  if (tMove.id === id) tMove = { id: null, sx: 0, sy: 0, dx: 0, dy: 0 };
  if (tLook.id === id) tLook = { id: null, lx: 0, turn: 0 };
}

function attachInput() {
  var cv = GF.canvas;
  cv.addEventListener('touchstart', function (e) { e.preventDefault(); for (var i = 0; i < e.changedTouches.length; i++) { var p = toCanvas(e.changedTouches[i]); pointerDown(e.changedTouches[i].identifier, p.x, p.y); } }, { passive: false });
  cv.addEventListener('touchmove', function (e) { e.preventDefault(); for (var i = 0; i < e.changedTouches.length; i++) { var p = toCanvas(e.changedTouches[i]); pointerMove(e.changedTouches[i].identifier, p.x, p.y); } }, { passive: false });
  cv.addEventListener('touchend', function (e) { e.preventDefault(); for (var i = 0; i < e.changedTouches.length; i++) pointerUp(e.changedTouches[i].identifier); }, { passive: false });
  cv.addEventListener('touchcancel', function (e) { e.preventDefault(); for (var i = 0; i < e.changedTouches.length; i++) pointerUp(e.changedTouches[i].identifier); }, { passive: false });
  cv.addEventListener('mousedown', function (e) { mouseDown = true; var p = toCanvas(e); pointerDown('m', p.x, p.y); });
  cv.addEventListener('mousemove', function (e) { if (!mouseDown) return; var p = toCanvas(e); pointerMove('m', p.x, p.y); });
  window.addEventListener('mouseup', function () { mouseDown = false; pointerUp('m'); });
  document.addEventListener('keydown', function (e) {
    if (e.code === 'Escape' || e.code === 'KeyP') {
      if (panel) panel = null;
      else if (pauseMode) pauseMode = null;
      else pauseMode = 'pause';
    }
    if (e.code === 'KeyH') pauseMode = pauseMode === 'help' ? null : 'help';
    if (e.code === 'KeyM') GF.toggleMute();
    if (gs === 'GAMEOVER' && (e.code === 'Enter' || e.code === 'Space')) startTape({ keepMeta: true });
  });
  document.addEventListener('visibilitychange', function () { if (document.hidden) { if (gs === 'PLAYING' && !pauseMode) pauseMode = 'pause'; saveMeta(); persistSave(); } });
  window.addEventListener('pagehide', function () { saveMeta(); persistSave(); });
}

function setupTutorial(force) {
  coachPromptT = 0;
  GF.tutorial.start([
    {
      text: T('coach_move'),
      target: function () { return { x: GF.W * 0.25, y: GF.H * 0.62, r: GF.clamp(48 * GF.S, 36, 64) }; },
      target2: function () { return { x: GF.W * 0.30, y: GF.H * 0.52, r: GF.clamp(42 * GF.S, 32, 58) }; },
      gesture: 'drag',
      advance: 'manual',
    },
    {
      text: T('coach_look'),
      target: function () { return { x: GF.W * 0.72, y: GF.H * 0.62, r: GF.clamp(48 * GF.S, 36, 64) }; },
      target2: function () { return { x: GF.W * 0.82, y: GF.H * 0.62, r: GF.clamp(42 * GF.S, 32, 58) }; },
      gesture: 'drag',
      advance: 'manual',
    },
    {
      text: T('coach_letter'),
      target: function () { return { x: GF.W * 0.5, y: GF.H * 0.42, r: GF.clamp(52 * GF.S, 38, 68) }; },
      advance: 'manual',
    },
    {
      text: T('coach_hub'),
      target: function () { return { x: ui.pause ? ui.pause.x + ui.pause.w / 2 : GF.W * 0.1, y: ui.pause ? ui.pause.y + ui.pause.h / 2 : GF.H * 0.9, r: GF.clamp(42 * GF.S, 32, 58) }; },
      advance: 'manual',
    },
  ], { storageKey: 'pool_tape_tutorial_v1', force: !!force });
}

function reachState() {
  var itemsOut = [], H = GF.H;
  function push(id, r, pinned) { if (r) itemsOut.push({ id: id, x: r.x, y: r.y, w: r.w, h: r.h, pinned: !!pinned }); }
  var screen = 'playing';
  if (panel === 'shop') {
    screen = 'shop';
    for (var i = 0; i < GEAR.length; i++) push('buy_' + GEAR[i].id, ui['buy_' + GEAR[i].id]);
    push('back', ui.back);
  } else if (panel === 'shelf') {
    screen = 'shelf';
    for (var s = 0; s < shelfRects.length; s++) push('replay_' + s, shelfRects[s].rect);
    push('back', ui.back);
  } else if (pauseMode === 'pause') {
    screen = 'pause';
    push('resume', ui.resume); push('shop', ui.shop); push('shelf', ui.shelf); push('daily', ui.daily); push('restart', ui.restart);
  } else if (pauseMode === 'help') {
    screen = 'help'; push('resume', ui.resume);
  } else if (gs === 'GAMEOVER') {
    screen = 'gameover'; push('retry', ui.retry);
  } else {
    push('pause', ui.pause); push('help', ui.help); push('mute', ui.mute);
  }
  return { screen: screen, items: itemsOut, screenH: H, viewportH: H };
}

var REACH_TOUR = [
  { name: 'playing', go: function () { panel = null; pauseMode = null; if (gs !== 'PLAYING') startTape({ keepMeta: true }); } },
  { name: 'pause', go: function () { panel = null; if (gs !== 'PLAYING') startTape({ keepMeta: true }); pauseMode = 'pause'; } },
  { name: 'shop', go: function () { if (gs !== 'PLAYING') startTape({ keepMeta: true }); pauseMode = 'pause'; panel = 'shop'; } },
  { name: 'shelf', go: function () { if (!meta.shelf.length) meta.shelf.push({ n: 1, seed: tapeSeed, score: 100, day: todayDay(), daily: false }); if (gs !== 'PLAYING') startTape({ keepMeta: true }); pauseMode = 'pause'; panel = 'shelf'; } },
  { name: 'help', go: function () { if (gs !== 'PLAYING') startTape({ keepMeta: true }); panel = null; pauseMode = 'help'; } },
  { name: 'gameover', go: function () { if (gs !== 'PLAYING') startTape({ keepMeta: true }); panel = null; pauseMode = null; gs = 'GAMEOVER'; } },
];

function setupPhotogenic(level) {
  tapeN = Math.max(1, level | 0 || 3);
  tapeSeed = 174000 + tapeN * 811;
  score = 180 + tapeN * 20; battery = 72; staticAmt = 18; stamina = staminaMax(); runTime = 35;
  genMaze(tapeSeed);
  foundMask = 0;
  for (var i = 0; i < letters.length; i++) {
    letters[i].got = i < Math.min(phraseLen() - 2, Math.max(3, level | 0));
    if (letters[i].got) foundMask |= (1 << letters[i].idx);
  }
  var bestA = pa, bestLen = -1;
  for (var k = 0; k < 16; k++) {
    var a = k / 16 * 6.283185, len = rayClear(px, py, Math.cos(a), Math.sin(a));
    if (len > bestLen) { bestLen = len; bestA = a; }
  }
  pa = bestA;
  GF.tutorial.active = false;
  tutorialDoneMarked = true;
  var reach = Math.max(1.5, Math.min(3.0, bestLen - 0.8));
  var frontX = px + Math.cos(pa) * reach, frontY = py + Math.sin(pa) * reach;
  var liveIdx = Math.min(phraseLen() - 1, Math.max(0, foundCount()));
  if (letters[liveIdx]) {
    letters[liveIdx].x = frontX;
    letters[liveIdx].y = frontY;
    letters[liveIdx].got = false;
    foundMask &= ~(1 << letters[liveIdx].idx);
  }
  monster.mode = 'glimpse';
  monster.x = px + Math.cos(pa + 0.36) * Math.max(2.6, Math.min(4.6, bestLen - 0.7));
  monster.y = py + Math.sin(pa + 0.36) * Math.max(2.6, Math.min(4.6, bestLen - 0.7));
  monster.t = 5; monster.centerT = 0;
  shotMode = true; gs = 'PLAYING'; pauseMode = null; panel = null;
}

function statePayload() {
  return {
    gs: gs,
    tape: tapeN,
    score: score,
    bestScore: meta.bestScore,
    battery: Math.round(battery),
    static: Math.round(staticAmt),
    found: foundCount(),
    phraseLen: phraseLen(),
    shards: meta.shards,
    tapesRecovered: meta.tapesRecovered,
    monster: monster.mode,
    daily: dailyActive,
    x: Math.round(px * 100) / 100,
    y: Math.round(py * 100) / 100,
    angle: Math.round(pa * 100) / 100,
    playMin: Math.floor(meta.totalPlayMs / 60000),
    upgrades: upgrade('lamp') + upgrade('stamina') + upgrade('battery') + upgrade('shield'),
  };
}

GF.init({
  designW: 420,
  designH: 760,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'pool_tape',
  onReady: function () {
    buildTextures();
    attachInput();
    loadMeta();
    bestScore = meta.bestScore || 0;
    GF.persist('pool_tape_run_v1',
      function () {
        return {
          gs: gs,
          tapeN: tapeN,
          seed: tapeSeed,
          replaySeed: replaySeed,
          dailyActive: dailyActive,
          score: score,
          battery: battery,
          staticAmt: staticAmt,
          stamina: stamina,
          foundMask: foundMask,
          px: px,
          py: py,
          pa: pa,
          runTime: runTime,
          closeDone: closeDone,
        };
      },
      function (s) { if (s && s.seed && s.gs === 'PLAYING') _resume = s; }
    );
    GF.exposeState(statePayload);
    GF.exposeReach(reachState);
    GF.exposeTour(REACH_TOUR);
    GF.bgMusic({ file: 'audio/bg_track.mp3', preset: 'tense', muted: GF.muted });
    if (_resume) resumeTape(_resume);
    else startTape({ keepMeta: false });
    if (window.__GF_AUTOSTART && !window._silent) {
      pauseMode = null;
      panel = null;
    }
    setupTutorial(false);
  },
  onUpdate: update,
  onDraw: draw,
});

window._jumpLevel = function (n) { setupPhotogenic(n || 4); };
window._setupForScreenshot = function (n) { setupPhotogenic(n || 4); };
window._setState = function (s) {
  if (s === 'GAMEOVER') { if (gs !== 'PLAYING') startTape({ keepMeta: true }); gs = 'GAMEOVER'; }
  else if (s === 'PAUSE') { if (gs !== 'PLAYING') startTape({ keepMeta: true }); pauseMode = 'pause'; panel = null; }
  else { if (gs !== 'PLAYING') startTape({ keepMeta: true }); pauseMode = null; panel = null; }
};
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return FONT_UI; };
window._forceMonster = function () { spawnMonster('glimpse'); return statePayload(); };
window._completePhrase = function () { foundMask = (1 << phraseLen()) - 1; for (var i = 0; i < letters.length; i++) letters[i].got = true; return statePayload(); };
window.render_game_to_text = function () {
  var nearLetters = [];
  for (var i = 0; i < letters.length; i++) if (!letters[i].got) nearLetters.push({ x: Math.round(letters[i].x * 10) / 10, y: Math.round(letters[i].y * 10) / 10, idx: letters[i].idx });
  return JSON.stringify({
    note: '2D tile coords, origin top-left, x right, y down',
    state: statePayload(),
    exit: exitCell,
    letters: nearLetters.slice(0, 4),
    batteries: items.filter(function (it) { return !it.got; }).slice(0, 3).map(function (it) { return { x: Math.round(it.x * 10) / 10, y: Math.round(it.y * 10) / 10 }; }),
  });
};
window.advanceTime = function (ms) {
  var steps = Math.max(1, Math.round(ms / (1000 / 60)));
  for (var i = 0; i < steps; i++) update(1 / 60);
  draw(GF.ctx, 1 / 60);
};

})();
</script>
