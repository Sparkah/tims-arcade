// ─── LEVEL LAYOUTS ──────────────────────────────────────────────────────────
// Each niche: kind (type id it requires), x,y (0..1 of web area), prey(idx),
// pred(idx), prey2(idx for apex). Indices reference other niches.
// The TRAY holds exactly the type ids the player must place. Some niches start
// pre-filled (locked=true) as anchors so the puzzle is solvable & teaches.
function buildLevel(n) {
  // n is 1-based. Returns { biome, niches:[{type,x,y,prey,pred,prey2,locked}], tray:[typeids] }
  var lv = [];
  // helper niche
  function N(type, x, y, prey, pred, opt) { var o = {type:type, x:x, y:y, prey:(prey==null?-1:prey), pred:(pred==null?-1:pred), prey2:-1, locked:false}; if(opt){ for(var k in opt) o[k]=opt[k]; } return o; }

  if (n === 1) {
    // 3-niche pond: algae -> snail -> otter(top, keystone = 1 prey, no predator).
    // Simplest possible chain so the player learns "1 food + 1 predator".
    lv = [
      N('algae', 0.5, 0.82, -1, 1, {locked:true}),
      N('snail', 0.5, 0.52, 0, 2),
      N('otter', 0.5, 0.22, 1, -1),
    ];
    return { niches: lv, tray:['snail','otter'] };
  }
  if (n === 2) {
    // 4-niche: two plants -> two herbivores -> one apex that eats BOTH herbivores.
    lv = [
      N('fern',   0.30, 0.84, -1, 2, {locked:true}),
      N('coral',  0.70, 0.84, -1, 3),
      N('rabbit', 0.30, 0.52, 0, 4),
      N('snail',  0.70, 0.52, 1, 4),
      N('heron',  0.50, 0.20, 2, -1),
    ];
    lv[4].prey2 = 3; // heron apex eats rabbit + snail (both herbivores have a predator)
    return { niches: lv, tray:['coral','rabbit','snail','heron'] };
  }
  if (n === 3) {
    // 5-niche meadow: a small branching web
    lv = [
      N('algae',  0.50, 0.86, -1, 1, {locked:true}),
      N('fish',   0.50, 0.60, 0, 2),
      N('frog',   0.30, 0.34, 1, 4),
      N('crab',   0.70, 0.34, 1, 4),
      N('hawk',   0.50, 0.12, 2, -1),
    ];
    lv[4].prey2 = 3; // hawk apex eats frog + crab
    lv[4].type = 'heron';
    return { niches: lv, tray:['fish','frog','crab','heron'] };
  }
  if (n === 4) {
    // apex predator introduced explicitly: needs two prey
    lv = [
      N('fern',   0.28, 0.86, -1, 2, {locked:true}),
      N('coral',  0.72, 0.86, -1, 3),
      N('rabbit', 0.28, 0.58, 0, 4),
      N('snail',  0.72, 0.58, 1, 5),
      N('fox',    0.28, 0.30, 2, 6),
      N('crab',   0.72, 0.30, 3, 6),
      N('hawk',   0.50, 0.10, 4, -1),
    ];
    lv[6].prey2 = 5;
    return { niches: lv, tray:['coral','rabbit','snail','fox','crab','hawk'] };
  }
  if (n === 5) {
    // decomposer introduced
    lv = [
      N('algae',   0.50, 0.88, -1, 1, {locked:true}),
      N('fish',    0.50, 0.64, 0, 2),
      N('frog',    0.30, 0.40, 1, 4),
      N('crab',    0.70, 0.40, 1, 4),
      N('heron',   0.50, 0.16, 2, -1),
      N('mushroom',0.16, 0.66, 1, -1),
    ];
    lv[4].prey2 = 3;
    return { niches: lv, tray:['fish','frog','crab','heron','mushroom'] };
  }
  if (n === 6) {
    // omnivore introduced: bear eats a herbivore; apex hawk eats rabbit + bear.
    lv = [
      N('fern',   0.26, 0.88, -1, 2, {locked:true}),
      N('coral',  0.74, 0.88, -1, 3),
      N('rabbit', 0.26, 0.62, 0, 5),
      N('snail',  0.74, 0.62, 1, 4),
      N('bear',   0.74, 0.36, 3, 5),
      N('hawk',   0.42, 0.14, 2, -1),
    ];
    lv[5].prey2 = 4; // hawk apex eats rabbit(2) + bear(4)
    return { niches: lv, tray:['coral','rabbit','snail','bear','hawk'] };
  }
  if (n === 7) {
    // 6 niches + decomposer: plant -> herbivore -> two carnivores -> apex; worm recycles.
    lv = [
      N('algae',   0.50, 0.90, -1, 1, {locked:true}),
      N('fish',    0.50, 0.70, 0, 2),
      N('frog',    0.30, 0.48, 1, 4),
      N('crab',    0.72, 0.48, 1, 4),
      N('shark',   0.50, 0.22, 2, -1),
      N('worm',    0.84, 0.72, 1, -1),
    ];
    lv[4].prey2 = 3; // shark apex eats frog(2) + crab(3); fish(1) eaten by frog(2)
    lv[1].pred = 2;  // fish eaten by frog(2)
    return { niches: lv, tray:['fish','frog','crab','shark','worm'] };
  }
  if (n === 8) {
    // keystone introduced: otter is the top (1 prey, no predator), plus apex branch.
    lv = [
      N('fern',   0.24, 0.90, -1, 2, {locked:true}),
      N('coral',  0.76, 0.90, -1, 3),
      N('rabbit', 0.24, 0.64, 0, 4),
      N('snail',  0.76, 0.64, 1, 6),
      N('otter',  0.24, 0.36, 2, -1),
      N('fish',   0.76, 0.40, 1, 6, {altPrey:true}),
      N('hawk',   0.52, 0.16, 3, -1),
    ];
    lv[6].prey2 = 5; // hawk apex eats snail(3) + fish(5)
    return { niches: lv, tray:['coral','rabbit','snail','otter','fish','hawk'] };
  }
  if (n === 9) {
    // 7-niche reef, multiple specials: two herbivores -> two carnivores -> apex; decomposer.
    lv = [
      N('coral',  0.50, 0.92, -1, 1, {locked:true}),
      N('fish',   0.50, 0.72, 0, 3),
      N('snail',  0.16, 0.72, 0, 4, {altPrey:true}),
      N('crab',   0.34, 0.50, 1, 5),
      N('frog',   0.70, 0.50, 2, 5),
      N('shark',  0.50, 0.24, 3, -1),
      N('mushroom',0.86, 0.72, 1, -1),
    ];
    lv[5].prey2 = 4; // shark apex eats crab(3) + frog(4)
    return { niches: lv, tray:['fish','snail','crab','frog','shark','mushroom'] };
  }
  // n >= 10: full wetland, hardest — keystone top + apex + decomposer, 8 niches.
  // algae(0,locked) -> fish(1) -> frog(3) -> heron(6,apex eats frog+snail)
  // algae(0)        -> snail(2) -> heron(6)
  // fish(1)         -> crab(4)  -> wolf(5,keystone top)
  // worm(7) recycles fish(1).
  lv = [
    N('algae', 0.50, 0.92, -1, 1, {locked:true}),
    N('fish',  0.50, 0.74,  0, 3),
    N('snail', 0.16, 0.74,  0, 6),
    N('frog',  0.30, 0.52,  1, 6),
    N('crab',  0.72, 0.52,  1, 5),
    N('wolf',  0.74, 0.28,  4, -1),
    N('heron', 0.40, 0.26,  3, -1),
    N('worm',  0.86, 0.74,  1, -1),
  ];
  lv[6].prey2 = 2; // heron apex eats frog(3) + snail(2)
  return { niches: lv, tray:['fish','snail','frog','crab','wolf','heron','worm'] };
}

// ─── LIFECYCLE ──────────────────────────────────────────────────────────────
function startLevel(n, silent) {
  level = n;
  var def = buildLevel(n);
  niches = def.niches.map(function(d) {
    var t = TYPES[d.type];
    var filled = d.locked ? d.type : null;
    return {
      type: d.type, x: 0, y: 0, nx: d.x, ny: d.y,
      prey: d.prey, pred: d.pred, prey2: (d.prey2==null?-1:d.prey2),
      locked: !!d.locked, filled: filled,
      pop: filled ? 55 : 0, alive: !!filled,
      critters: [], broken: false, needFood:false, needPred:false, flashT:0,
      dead:false, invasiveWrong:false,
    };
  });
  // build tray from def.tray
  var counts = {};
  def.tray.forEach(function(tid){ counts[tid] = (counts[tid]||0)+1; });
  tray = Object.keys(counts).map(function(tid){ return { type: tid, count: counts[tid] }; });
  // seed critters for pre-filled
  niches.forEach(function(nc){ if (nc.alive) seedCritters(nc); });
  stability = 100; extinctCount = 0; stableTicks = 0;
  eventTimer = 0; eventMsg=''; eventMsgT=0; eventCount=0;
  collapseFX = 0; winFX = 0; loseCause=''; drag=null;
  selectedType = null; pressStart = null;
  firstActionDone = false;
  layout();
  gs = 'PLAYING';
  if (!silent) {
    GF.gameStarted();
    GF.sfx('spawn');
  }
  // arm coach on the very first level only
  if (level === 1 && !seenTut && !silent) {
    startCoach();
  }
}

function seedCritters(nc) {
  var n = Math.max(1, Math.round(nc.pop / 16));
  nc.critters = [];
  for (var i=0;i<n;i++) nc.critters.push(newCritter());
}
function newCritter() {
  return { ang: Math.random()*Math.PI*2, rad: (4+Math.random()*16), spd: 0.6+Math.random()*1.2, ph: Math.random()*Math.PI*2, vx:0, vy:0 };
}

function startGame() { startLevel(1); }

function gameOver(cause) {
  loseCause = cause || GF.t('cause_stab');
  gs = 'GAMEOVER';
  collapseFX = 1;
  pendingAd = true;
  GF.gameEnded();
  GF.sfx('lose');
  GF.setShake(0.9);
}

function winLevel() {
  if (level > best) { best = level; try { localStorage.setItem('niche_keeper_best', best); } catch(e){} }
  if (level >= TOTAL_LEVELS) allCleared = true;
  gs = 'WON';
  winFX = 1;
  GF.gameEnded();
  GF.sfx('win');
  GF.happytime();
}

function nextLevel() {
  var nx = level + 1;
  if (nx > TOTAL_LEVELS) nx = 1; // loop with all-clear flag set
  startLevel(nx);
}

// ─── COACH (interactive tutorial over live, no-fail play) ───────────────────
function startCoach() { coachActive = true; coachStep = 0; }
function coachNext() {
  coachStep++;
  if (coachStep >= 3) { coachActive = false; seenTut = true; try { localStorage.setItem('niche_keeper_seen_tutorial','1'); } catch(e){} }
}
function reopenTutorial() {
  // re-run coach over live play without resetting the board
  coachActive = true; coachStep = 0;
}

// ─── LAYOUT ─────────────────────────────────────────────────────────────────
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var topH = 76 * S;
  var trayH = (CARD_H + 26) * S;
  webArea.x = 12 * S;
  webArea.y = topH;
  webArea.w = W - 24 * S;
  webArea.h = H - topH - trayH;
  // place niches in px
  niches.forEach(function(nc) {
    nc.x = webArea.x + nc.nx * webArea.w;
    nc.y = webArea.y + nc.ny * webArea.h;
  });
  // HUD buttons
  var bs = 30 * S;
  muteBtn = { x: W - bs - 10*S, y: 10*S, w: bs, h: bs };
  helpBtn = { x: W - bs*2 - 18*S, y: 10*S, w: bs, h: bs };
  L.trayY = H - trayH + 14*S;
  L.trayH = trayH;
}

// ─── NICHE LOGIC ────────────────────────────────────────────────────────────
function liveAt(idx) { return idx >= 0 && idx < niches.length && niches[idx].alive && !niches[idx].dead; }

// recompute broken/needFood/needPred flags for all niches
function evaluateWeb() {
  niches.forEach(function(nc, i) {
    nc.needFood = false; nc.needPred = false; nc.broken = false;
    if (!nc.alive) { nc.broken = true; return; } // empty niche = broken slot
    if (nc.invasiveWrong) { nc.broken = true; nc.needFood = true; return; }
    var t = TYPES[nc.filled] || TYPES[nc.type];
    // food check
    if (t.needsPrey > 0) {
      var fed = liveAt(nc.prey);
      if (t.special === 'apex') { // needs BOTH prey
        var fed2 = liveAt(nc.prey2);
        if (!(fed && fed2)) { nc.needFood = true; }
      } else if (t.special === 'omni') {
        // omnivore satisfied by prey OR prey2 (either plant or herb)
        var fedO = liveAt(nc.prey) || liveAt(nc.prey2);
        if (!fedO) nc.needFood = true;
      } else if (t.special === 'decomp') {
        // decomposer feeds on a DEAD niche; satisfied if its prey niche exists at all
        if (!(nc.prey>=0 && niches[nc.prey])) nc.needFood = true;
      } else {
        if (!fed) nc.needFood = true;
      }
    }
    // predator check
    if (t.needsPred) {
      if (!liveAt(nc.pred)) nc.needPred = true;
    }
    if (nc.needFood || nc.needPred) nc.broken = true;
  });
}

function brokenCount() {
  var c = 0;
  niches.forEach(function(nc){ if (nc.broken) c++; });
  return c;
}

function allStable() {
  // every niche alive (no empty slots) and none broken and pops in band
  for (var i=0;i<niches.length;i++) {
    var nc = niches[i];
    if (!nc.alive || nc.dead) return false;
    if (nc.broken) return false;
    if (nc.pop < 18 || nc.pop > POP_CAP * 0.96) return false;
  }
  return true;
}

// ─── PLACEMENT ──────────────────────────────────────────────────────────────
function trayHas(type) {
  for (var i=0;i<tray.length;i++) if (tray[i].type===type && tray[i].count>0) return true;
  return false;
}
function takeFromTray(type) {
  for (var i=0;i<tray.length;i++) if (tray[i].type===type && tray[i].count>0) { tray[i].count--; return true; }
  return false;
}
function returnToTray(type) {
  for (var i=0;i<tray.length;i++) if (tray[i].type===type) { tray[i].count++; return; }
  tray.push({ type:type, count:1 });
}

function nicheAcceptsType(nc, type) {
  // a niche slot has a designed required type; allow placing the matching type,
  // OR a type with the same trophic role for flexibility on omnivore/decomp.
  if (nc.alive || nc.locked) return false;
  return nc.type === type;
}

function placeAt(nicheIdx, type) {
  var nc = niches[nicheIdx];
  if (!nc || nc.alive || nc.locked) return false;
  if (!nicheAcceptsType(nc, type)) { GF.sfx('error'); nc.flashT = 0.4; return false; }
  if (!takeFromTray(type)) return false;
  nc.filled = type; nc.alive = true; nc.dead = false; nc.invasiveWrong = false;
  nc.pop = 42; seedCritters(nc);
  nc.flashT = 0.6;
  GF.sfx('spawn');
  GF.spawnParticles(nc.x, nc.y, TYPES[type].accent, 14);
  GF.spawnFloat(nc.x, nc.y - NICHE_R*GF.S - 6*GF.S, '+1', '#bff5c8');
  firstActionDone = true;
  GF.sfx('merge');
  if (coachActive && coachStep === 0) coachNext();
  return true;
}

function removeAt(nicheIdx) {
  var nc = niches[nicheIdx];
  if (!nc || !nc.alive || nc.locked) return false;
  if (nc.invasiveWrong) {
    // evicting an invasive species: free the slot
    nc.alive=false; nc.dead=false; nc.invasiveWrong=false; nc.filled=null; nc.pop=0; nc.critters=[];
    GF.sfx('pickup'); GF.spawnParticles(nc.x, nc.y, '#ff7a5c', 12);
    return true;
  }
  returnToTray(nc.filled);
  nc.alive=false; nc.dead=false; nc.filled=null; nc.pop=0; nc.critters=[];
  GF.sfx('pickup');
  GF.spawnParticles(nc.x, nc.y, '#8899aa', 10);
  return true;
}

function extinct(nc, isKeystone) {
  nc.alive = false; nc.dead = true; nc.pop = 0;
  GF.spawnParticles(nc.x, nc.y, '#ff5566', 22);
  GF.spawnFloat(nc.x, nc.y - 8*GF.S, GF.t('extinct'), '#ff6677');
  GF.sfx('hurt'); GF.setShake(0.5);
  extinctCount++;
  // keystone amplified cascade: also crash up to two neighbours
  var t = TYPES[nc.filled] || TYPES[nc.type];
  if (t && t.special === 'key') {
    var hit = 0;
    for (var i=0;i<niches.length && hit<2;i++) {
      var o = niches[i];
      if (o!==nc && o.alive && (o.prey===indexOf(nc) || o.pred===indexOf(nc))) {
        o.pop = Math.max(0, o.pop * 0.4);
        o.flashT = 0.6; hit++;
      }
    }
  }
  if (extinctCount >= MAX_EXTINCTIONS) { gameOver(GF.t('cause_ext')); }
}
function indexOf(nc){ return niches.indexOf(nc); }

// ─── EVENTS ─────────────────────────────────────────────────────────────────
// Each ecosystem must be WEATHERED, not just filled once: the win is gated on
// surviving requiredEvents(level) ecosystem events (see win check). Events keep
// firing, breaking the web, so the player re-balances — the living juggling loop.
function requiredEvents(n) {
  if (n <= 1) return 0;        // tutorial pond: no events
  if (n <= 4) return 1;        // weather one event
  if (n <= 7) return 2;
  return 3;                    // late biomes: survive a storm of events
}
function firstEventDelay() { return Math.max(5, 9 - level*0.4); }       // ~7s early on
function eventInterval()   { return Math.max(7, EVENT_INTERVAL_SEC - level*1.1); }
function maybeEvent() {
  if (requiredEvents(level) <= 0) return; // no events on the tutorial level
  if (coachActive) return;
  eventTimer += 1/60;
  var due = (eventCount === 0) ? firstEventDelay() : eventInterval();
  if (eventTimer < due) return;
  eventTimer = 0;
  fireEvent();
}
function fireEvent() {
  var roll = Math.floor(Math.random()*4);
  // pick an applicable target
  var alive = niches.filter(function(nc){ return nc.alive && !nc.locked; });
  if (roll === 0) {
    // drought: kill a plant (or any alive non-locked)
    var plants = niches.filter(function(nc){ return nc.alive && TYPES[nc.filled] && TYPES[nc.filled].trophic===0 && !nc.locked; });
    var tgt = plants.length ? plants[Math.floor(Math.random()*plants.length)] : (alive[0]||null);
    if (tgt) { returnToTray(tgt.filled); tgt.alive=false; tgt.filled=null; tgt.pop=0; tgt.critters=[]; setEvent('ev_drought'); }
  } else if (roll === 1 && level >= 3) {
    // invasive: force-fill an empty niche with a wrong creature to evict
    var empties = niches.filter(function(nc){ return !nc.alive && !nc.locked; });
    if (empties.length) {
      var e = empties[Math.floor(Math.random()*empties.length)];
      e.alive=true; e.dead=false; e.invasiveWrong=true; e.filled='beetleP'; e.pop=70; seedCritters(e);
      setEvent('ev_invasive');
    } else { fireDisease(alive); }
  } else if (roll === 2) {
    fireDisease(alive);
  } else {
    // climate shift: open a new niche (reactivate a dead one as empty)
    var dead = niches.filter(function(nc){ return nc.dead; });
    if (dead.length) { var d = dead[0]; d.dead=false; d.alive=false; d.filled=null; d.pop=0; setEvent('ev_climate'); }
    else { fireDisease(alive); }
  }
  GF.sfx('error');
  GF.setShake(0.4);
  eventCount++;
}
function fireDisease(alive) {
  if (!alive || !alive.length) return;
  var tgt = alive[Math.floor(Math.random()*alive.length)];
  tgt.pop = Math.max(4, tgt.pop * 0.45);
  tgt.flashT = 0.6;
  GF.spawnParticles(tgt.x, tgt.y, '#cc66ff', 14);
  setEvent('ev_disease');
}
function setEvent(key) { eventMsg = GF.t(key); eventMsgT = 3.2; }

// ─── UPDATE ─────────────────────────────────────────────────────────────────
function update(dt) {
  // animate FX timers regardless of state
  if (eventMsgT > 0) eventMsgT -= dt;
  if (collapseFX > 0) collapseFX = Math.max(0, collapseFX - dt*0.7);
  if (winFX > 0) winFX = Math.max(0, winFX - dt*0.5);

  if (gs !== 'PLAYING') { animateCritters(dt); return; }

  evaluateWeb();

  // coach freezes the simulation (no-fail) but lets placement happen
  if (coachActive) {
    animateCritters(dt);
    // auto-advance coach step 1 -> 2 once first placement done; step 2->3 when web has no empty slots
    if (coachStep === 1) {
      var anyEmpty = niches.some(function(nc){ return !nc.alive && !nc.locked; });
      if (!anyEmpty) coachNext();
    } else if (coachStep === 2) {
      // advance after a moment; player has seen the message
    }
    return;
  }

  // ── population dynamics ──
  // Model: a niche whose links are all satisfied (not broken) drifts toward a
  // healthy equilibrium band (~HEALTHY_POP) — the web SETTLES. A broken niche
  // collapses: no food -> starves to extinction; no predator -> overpopulates
  // and crashes. So correct webs stabilize; gaps cascade.
  var HEALTHY_POP = 62;
  niches.forEach(function(nc, i) {
    if (nc.flashT > 0) nc.flashT -= dt;
    if (!nc.alive || nc.dead) return;
    var t = TYPES[nc.filled] || TYPES[nc.type];

    if (!nc.broken) {
      // satisfied: ease toward the healthy band (predator + prey in balance)
      nc.pop += (HEALTHY_POP - nc.pop) * Math.min(1, 1.4 * dt);
    } else if (nc.needFood) {
      // starving — no live prey: shrink toward extinction
      nc.pop -= STARVE_RATE * 24 * dt;
    } else if (nc.needPred) {
      // unchecked — no predator: breed past the cap toward an overpop crash
      nc.pop += BREED_RATE * 26 * dt;
    } else {
      nc.pop += (HEALTHY_POP - nc.pop) * Math.min(1, 1.0 * dt);
    }

    nc.pop = GF.clamp(nc.pop, 0, POP_CAP*1.5);
    // overpopulation crash (only the unchecked path can reach here)
    if (nc.pop > POP_CAP * OVERPOP_CRASH) {
      nc.pop = POP_CAP * 0.22;
      nc.flashT = 0.5;
      GF.spawnParticles(nc.x, nc.y, '#ffaa44', 14);
      GF.spawnFloat(nc.x, nc.y - 8*GF.S, '!', '#ffcc55');
      GF.sfx('hit');
    }
    // extinction
    if (nc.pop <= 0.5) {
      extinct(nc, t.special==='key');
    }
    // sync critter count to pop
    syncCritters(nc);
  });

  // ── stability ──
  var bc = brokenCount();
  // decomposer present & satisfied slows decay
  var decompBonus = niches.some(function(nc){ return nc.alive && TYPES[nc.filled] && TYPES[nc.filled].special==='decomp' && !nc.broken; }) ? 0.6 : 1.0;
  if (bc > 0) {
    stability -= STAB_DECAY * bc * decompBonus * dt;
  } else {
    stability += STAB_REGEN * dt;
  }
  stability = GF.clamp(stability, 0, 100);

  if (stability <= 0 && gs === 'PLAYING') { gameOver(GF.t('cause_stab')); return; }

  // ── win check ── must hold the web stable AND have weathered this biome's events
  if (allStable() && eventCount >= requiredEvents(level)) {
    stableTicks += 1; // ~1 per frame
    if (stableTicks >= STABLE_TICKS_TO_WIN) { winLevel(); return; }
  } else {
    stableTicks = Math.max(0, stableTicks - 2);
  }

  maybeEvent();
  animateCritters(dt);
}

function isFed(nc, t) {
  if (t.needsPrey === 0) return true; // producer eats sun
  if (t.special === 'apex') return liveAt(nc.prey) && liveAt(nc.prey2);
  if (t.special === 'omni') return liveAt(nc.prey) || liveAt(nc.prey2);
  if (t.special === 'decomp') return nc.prey>=0 && !!niches[nc.prey];
  return liveAt(nc.prey);
}

function syncCritters(nc) {
  var target = Math.max(1, Math.round(nc.pop / 16));
  target = Math.min(target, 9);
  while (nc.critters.length < target) nc.critters.push(newCritter());
  while (nc.critters.length > target) nc.critters.pop();
}
function animateCritters(dt) {
  niches.forEach(function(nc) {
    if (!nc.alive) return;
    nc.critters.forEach(function(cr) {
      cr.ph += dt * cr.spd * 2.2;
      cr.ang += dt * cr.spd * 0.8;
    });
  });
}

// ─── DRAW ───────────────────────────────────────────────────────────────────
function draw(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  drawBackground(ctx);

  if (gs === 'PLAYING' || gs === 'GAMEOVER' || gs === 'WON') {
    drawLinks(ctx);
    drawNiches(ctx);
    drawTray(ctx);
    drawHUD(ctx);
    if (drag) drawDragGhost(ctx);
    if (eventMsgT > 0 && eventMsg) drawEventBanner(ctx);
    if (coachActive) drawCoach(ctx);
  }

  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
  if (gs === 'WON') drawWon(ctx);
}

function biome() { return BIOMES[(level-1) % BIOMES.length]; }

function drawBackground(ctx) {
  var W = GF.W, H = GF.H;
  var b = biome();
  var g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, b.top); g.addColorStop(1, b.bot);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  // subtle ambient dots
  ctx.save();
  ctx.globalAlpha = 0.12;
  var t = (typeof performance!=='undefined'?performance.now():0)/3000;
  for (var i=0;i<26;i++) {
    var x = (i*97 % W);
    var y = ((i*53 % H) + Math.sin(t+i)*14*GF.S);
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(x, y, 2*GF.S, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawLinks(ctx) {
  var S = GF.S;
  niches.forEach(function(nc, i) {
    drawLinkPair(ctx, nc, nc.prey, i);
    if (nc.prey2 >= 0) drawLinkPair(ctx, nc, nc.prey2, i);
  });
}
function drawLinkPair(ctx, predNc, preyIdx, predIdx) {
  if (preyIdx < 0 || preyIdx >= niches.length) return;
  var prey = niches[preyIdx];
  // arrow prey -> predator (energy flows up)
  var live = predNc.alive && !predNc.dead && prey.alive && !prey.dead;
  var ax = prey.x, ay = prey.y, bx = predNc.x, by = predNc.y;
  var dx = bx-ax, dy = by-ay, len = Math.sqrt(dx*dx+dy*dy)||1;
  var ux = dx/len, uy = dy/len;
  var r = NICHE_R*GF.S;
  ax += ux*r; ay += uy*r; bx -= ux*r; by -= uy*r;
  ctx.save();
  ctx.lineWidth = LINK_W*GF.S;
  ctx.lineCap = 'round';
  if (live) {
    ctx.strokeStyle = 'rgba(120,230,150,0.7)';
    ctx.shadowColor = 'rgba(120,230,150,0.5)'; ctx.shadowBlur = 8*GF.S;
  } else {
    ctx.strokeStyle = 'rgba(255,90,100,0.45)';
    ctx.setLineDash([6*GF.S, 6*GF.S]);
  }
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
  ctx.setLineDash([]);
  // arrowhead at predator
  var ah = 9*GF.S;
  ctx.fillStyle = live ? 'rgba(120,230,150,0.85)' : 'rgba(255,90,100,0.5)';
  ctx.beginPath();
  ctx.moveTo(bx, by);
  ctx.lineTo(bx - ux*ah - uy*ah*0.6, by - uy*ah + ux*ah*0.6);
  ctx.lineTo(bx - ux*ah + uy*ah*0.6, by - uy*ah - ux*ah*0.6);
  ctx.closePath(); ctx.fill();
  // flowing energy pip when live
  if (live) {
    var t = ((typeof performance!=='undefined'?performance.now():0)/700 + predIdx*0.3) % 1;
    var px = ax + (bx-ax)*t, py = ay + (by-ay)*t;
    ctx.fillStyle = '#dfffce0';
    ctx.beginPath(); ctx.arc(px, py, 3*GF.S, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawNiches(ctx) {
  var S = GF.S;
  var pulse = 0.5 + 0.5*Math.sin((typeof performance!=='undefined'?performance.now():0)/300);
  niches.forEach(function(nc, i) {
    var r = NICHE_R*S;
    ctx.save();
    if (!nc.alive) {
      // empty / dead slot: dashed ring, red pulse if needed
      ctx.lineWidth = 3*S;
      if (nc.dead) {
        ctx.strokeStyle = 'rgba(120,90,90,0.6)';
        ctx.setLineDash([4*S,5*S]);
      } else {
        // empty slot needing a species: red attention pulse
        var a = 0.45 + 0.4*pulse;
        ctx.strokeStyle = 'rgba(255,90,100,'+a.toFixed(2)+')';
        ctx.shadowColor = 'rgba(255,80,90,0.6)'; ctx.shadowBlur = (8+8*pulse)*S;
        ctx.setLineDash([7*S,6*S]);
      }
      ctx.beginPath(); ctx.arc(nc.x, nc.y, r, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowBlur = 0;
      // hint glyph of required type
      ctx.globalAlpha = nc.dead ? 0.25 : 0.5;
      drawCreatureGlyph(ctx, nc.x, nc.y, r*0.7, TYPES[nc.type], true);
      ctx.globalAlpha = 1;
      ctx.restore();
      return;
    }
    // alive niche
    var t = TYPES[nc.filled] || TYPES[nc.type];
    // ring color = satisfied(green) / broken(red) / invasive(orange)
    var ringCol, glow;
    if (nc.invasiveWrong) { ringCol = '#ff7a3c'; glow='rgba(255,120,60,0.6)'; }
    else if (nc.broken) { ringCol = '#ff5a64'; glow='rgba(255,80,90,0.55)'; }
    else { ringCol = '#5fe08a'; glow='rgba(95,224,138,0.55)'; }
    // flash on placement / event
    var fl = nc.flashT>0 ? nc.flashT : 0;
    ctx.lineWidth = (3.5 + fl*4)*S;
    ctx.strokeStyle = ringCol;
    ctx.shadowColor = glow; ctx.shadowBlur = (10 + fl*16 + (nc.broken?6*pulse:0))*S;
    ctx.beginPath(); ctx.arc(nc.x, nc.y, r, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;
    // inner disc
    ctx.fillStyle = 'rgba(10,20,16,0.55)';
    ctx.beginPath(); ctx.arc(nc.x, nc.y, r-2*S, 0, Math.PI*2); ctx.fill();
    // moving critters
    drawCritters(ctx, nc, t, r);
    // population bar under niche
    drawPopBar(ctx, nc, r);
    // need badges
    if (nc.needFood || nc.needPred) drawNeedBadge(ctx, nc, r, pulse);
    ctx.restore();
  });
}

function drawCritters(ctx, nc, t, r) {
  var S = GF.S;
  nc.critters.forEach(function(cr) {
    var rad = cr.rad*S * (0.6 + 0.4*(nc.pop/POP_CAP));
    rad = Math.min(rad, r-CREATURE_R*S-2*S);
    var x = nc.x + Math.cos(cr.ang)*rad + Math.cos(cr.ph)*3*S;
    var y = nc.y + Math.sin(cr.ang)*rad + Math.sin(cr.ph*1.3)*3*S;
    drawCreatureGlyph(ctx, x, y, CREATURE_R*S, t, false);
  });
}

// draw a creature PORTRAIT (tray cards / menu): AI sprite if loaded, else the
// procedural glyph. `size` is the bounding box width in px.
function drawCreatureArt(ctx, x, y, size, t) {
  var sprName = SPRITE_FOR[t.id];
  var img = sprName && GF.sprites && GF.sprites[sprName];
  if (img && img.complete && img.naturalWidth) {
    var s = size;
    ctx.drawImage(img, x - s/2, y - s/2, s, s);
  } else {
    drawCreatureGlyph(ctx, x, y, size*0.42, t, false);
  }
}

// draw a single small creature glyph (vector, per shape)
function drawCreatureGlyph(ctx, x, y, s, t, ghost) {
  ctx.save();
  ctx.translate(x, y);
  var col = t.color, ac = t.accent;
  if (ghost) { ctx.globalAlpha *= 1; }
  ctx.lineJoin='round'; ctx.lineCap='round';
  if (t.shape === 'plant') {
    // stem + leaves
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(1.5, s*0.22);
    ctx.beginPath(); ctx.moveTo(0, s*0.9); ctx.lineTo(0,-s*0.2); ctx.stroke();
    ctx.fillStyle = col;
    leaf(ctx, 0, -s*0.2, s*0.9, -0.5);
    leaf(ctx, 0, s*0.15, s*0.8, 0.6);
    ctx.fillStyle = ac;
    ctx.beginPath(); ctx.arc(0, -s*0.4, s*0.32, 0, Math.PI*2); ctx.fill();
  } else if (t.shape === 'decomp') {
    // mushroom cap
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.ellipse(0,-s*0.1, s*0.85, s*0.55, 0, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#f3e6d0';
    ctx.fillRect(-s*0.28, -s*0.1, s*0.56, s*0.8);
    ctx.fillStyle = ac;
    dot(ctx, -s*0.3,-s*0.28, s*0.14); dot(ctx, s*0.25,-s*0.34, s*0.12); dot(ctx, 0,-s*0.5, s*0.13);
  } else {
    // animal blob with ears/fins per trophic
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.ellipse(0,0, s*0.95, s*0.8, 0,0,Math.PI*2); ctx.fill();
    // shape cue
    if (t.shape === 'apex' || t.shape === 'key') {
      // wings / sharp ears (triangles up)
      ctx.beginPath(); ctx.moveTo(-s*0.5,-s*0.5); ctx.lineTo(-s*0.95,-s*1.2); ctx.lineTo(-s*0.1,-s*0.7); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(s*0.5,-s*0.5); ctx.lineTo(s*0.95,-s*1.2); ctx.lineTo(s*0.1,-s*0.7); ctx.closePath(); ctx.fill();
    } else if (t.shape === 'herb') {
      // round ears
      dot(ctx, -s*0.55,-s*0.6, s*0.32); dot(ctx, s*0.55,-s*0.6, s*0.32);
      ctx.fillStyle = col;
    } else if (t.shape === 'carn') {
      // pointed ears
      ctx.beginPath(); ctx.moveTo(-s*0.6,-s*0.4); ctx.lineTo(-s*0.4,-s*1.05); ctx.lineTo(-s*0.15,-s*0.5); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(s*0.6,-s*0.4); ctx.lineTo(s*0.4,-s*1.05); ctx.lineTo(s*0.15,-s*0.5); ctx.closePath(); ctx.fill();
    } else if (t.shape === 'omni') {
      // round head + snout
      dot(ctx, -s*0.5,-s*0.6, s*0.28); dot(ctx, s*0.5,-s*0.6, s*0.28);
      ctx.fillStyle = ac; dot(ctx, 0, s*0.25, s*0.3); ctx.fillStyle = col;
    }
    // eyes
    ctx.fillStyle = '#10140f';
    dot(ctx, -s*0.28,-s*0.05, s*0.14); dot(ctx, s*0.28,-s*0.05, s*0.14);
    ctx.fillStyle = '#fff';
    dot(ctx, -s*0.24,-s*0.09, s*0.05); dot(ctx, s*0.32,-s*0.09, s*0.05);
  }
  ctx.restore();
}
function leaf(ctx, x, y, s, rot) { ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.beginPath(); ctx.ellipse(s*0.4,0, s*0.5, s*0.22, 0,0,Math.PI*2); ctx.fill(); ctx.restore(); }
function dot(ctx,x,y,r){ ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); }

function drawPopBar(ctx, nc, r) {
  var S = GF.S;
  var bw = r*1.8, bh = 5*S;
  var bx = nc.x - bw/2, by = nc.y + r + 6*S;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  GF.rr(ctx, bx, by, bw, bh, bh/2); ctx.fill();
  var frac = GF.clamp(nc.pop/POP_CAP, 0, 1);
  var col = frac < 0.2 ? '#ff6a4a' : (frac > 0.92 ? '#ffb84a' : '#6fe0a0');
  ctx.fillStyle = col;
  GF.rr(ctx, bx, by, bw*frac, bh, bh/2); ctx.fill();
}

function drawNeedBadge(ctx, nc, r, pulse) {
  var S = GF.S;
  var lab = nc.invasiveWrong ? 'X' : (nc.needFood ? GF.t('needfood') : GF.t('needpred'));
  var fs = GF.clamp(10*S, 8, 14);
  ctx.font = 'bold '+fs+'px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  var tw = ctx.measureText(lab).width + 10*S;
  var bx = nc.x - tw/2, by = nc.y - r - 16*S;
  ctx.fillStyle = 'rgba(40,10,12,'+(0.7+0.2*pulse).toFixed(2)+')';
  GF.rr(ctx, bx, by, tw, 16*S, 5*S); ctx.fill();
  ctx.fillStyle = '#ff8a90';
  ctx.fillText(lab, nc.x, by+8*S);
}

function drawTray(ctx) {
  var W = GF.W, S = GF.S;
  var cw = CARD_W*S, ch = CARD_H*S;
  var gap = 8*S;
  var visible = tray.filter(function(tr){ return tr.count>0; });
  var totalW = visible.length*cw + (visible.length-1)*gap;
  var startX = (W - totalW)/2;
  var y = L.trayY;
  // tray bg
  ctx.fillStyle = 'rgba(6,14,10,0.85)';
  ctx.fillRect(0, y-10*S, W, L.trayH);
  ctx.strokeStyle = 'rgba(120,200,150,0.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0, y-10*S); ctx.lineTo(W, y-10*S); ctx.stroke();
  L.cards = [];
  visible.forEach(function(tr, i) {
    var x = startX + i*(cw+gap);
    var t = TYPES[tr.type];
    var dragging = drag && drag.type===tr.type && drag.fromTray;
    L.cards.push({ x:x, y:y, w:cw, h:ch, type:tr.type });
    var isSel = (selectedType===tr.type);
    ctx.save();
    if (dragging && tr.count<=0) { ctx.globalAlpha = 0.4; }
    // card bg
    var g = ctx.createLinearGradient(x,y,x,y+ch);
    if (isSel) { g.addColorStop(0,'rgba(60,90,60,0.98)'); g.addColorStop(1,'rgba(30,52,34,0.98)'); }
    else { g.addColorStop(0,'rgba(30,46,36,0.95)'); g.addColorStop(1,'rgba(16,28,20,0.95)'); }
    ctx.fillStyle = g;
    GF.rr(ctx, x, y, cw, ch, 10*S); ctx.fill();
    ctx.strokeStyle = isSel ? '#bff5c8' : t.color; ctx.lineWidth=(isSel?3:2)*S;
    if (isSel) { ctx.shadowColor='rgba(150,245,180,0.7)'; ctx.shadowBlur=12*S; }
    GF.rr(ctx, x, y, cw, ch, 10*S); ctx.stroke();
    ctx.shadowBlur=0;
    // creature portrait (AI sprite if loaded, else procedural glyph)
    drawCreatureArt(ctx, x+cw/2, y+ch*0.42, cw*0.62, t);
    // count badge
    if (tr.count > 1) {
      ctx.fillStyle = '#1a2a20';
      dot(ctx, x+cw-10*S, y+12*S, 9*S);
      ctx.fillStyle = '#bff5c8'; ctx.font='bold '+(11*S)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('x'+tr.count, x+cw-10*S, y+12*S);
    }
    // role label (diet glyph)
    drawDietGlyph(ctx, x+cw/2, y+ch-14*S, cw*0.16, t);
    ctx.restore();
  });
}

function drawDietGlyph(ctx, x, y, s, t) {
  // small icon hinting what it eats: sun(plant), leaf(herb eats plant), paw(carn), star(apex), recycle(decomp)
  ctx.save(); ctx.translate(x,y);
  ctx.strokeStyle = '#cfe8d4'; ctx.fillStyle='#cfe8d4'; ctx.lineWidth=Math.max(1.2,s*0.18);
  if (t.trophic === 0 && t.special!=='decomp') {
    // sun
    ctx.beginPath(); ctx.arc(0,0,s*0.5,0,Math.PI*2); ctx.fill();
    for (var i=0;i<8;i++){ var a=i/8*Math.PI*2; ctx.beginPath(); ctx.moveTo(Math.cos(a)*s*0.7,Math.sin(a)*s*0.7); ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s); ctx.stroke(); }
  } else if (t.special === 'decomp') {
    // recycle arrows (simple triangle loop)
    ctx.beginPath(); ctx.arc(0,0,s*0.7,0.4,Math.PI*1.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s*0.7,s*0.3); ctx.lineTo(-s*0.4,s*0.7); ctx.lineTo(-s*0.9,s*0.7); ctx.closePath(); ctx.fill();
  } else if (t.special === 'apex') {
    // star
    star5(ctx, 0,0, s, s*0.45);
  } else if (t.trophic === 1) {
    // leaf (eats plants)
    ctx.beginPath(); ctx.ellipse(0,0,s*0.8,s*0.4,0.6,0,Math.PI*2); ctx.fill();
  } else {
    // paw (carn/omni eats animals)
    dot(ctx,0,s*0.2,s*0.5);
    dot(ctx,-s*0.5,-s*0.3,s*0.22); dot(ctx,0,-s*0.5,s*0.22); dot(ctx,s*0.5,-s*0.3,s*0.22);
  }
  ctx.restore();
}
function star5(ctx,cx,cy,R,r){ ctx.beginPath(); for(var i=0;i<10;i++){ var a=Math.PI/5*i - Math.PI/2; var rr=(i%2===0)?R:r; ctx.lineTo(cx+Math.cos(a)*rr, cy+Math.sin(a)*rr);} ctx.closePath(); ctx.fill(); }

function drawDragGhost(ctx) {
  var S = GF.S;
  var t = TYPES[drag.type];
  ctx.save(); ctx.globalAlpha = 0.92;
  // highlight nearest droppable niche
  var tgt = nearestEmptyNiche(drag.x, drag.y);
  if (tgt && tgt.nc) {
    var nc = tgt.nc;
    var ok = nicheAcceptsType(nc, drag.type);
    ctx.strokeStyle = ok ? '#6fe0a0' : '#ff6a5a';
    ctx.lineWidth = 4*S; ctx.shadowColor = ok?'rgba(110,224,160,0.7)':'rgba(255,100,90,0.6)'; ctx.shadowBlur=14*S;
    ctx.beginPath(); ctx.arc(nc.x, nc.y, NICHE_R*S+5*S, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
  }
  drawCreatureGlyph(ctx, drag.x, drag.y, 18*S, t, false);
  ctx.restore();
}

function drawHUD(ctx) {
  var W = GF.W, S = GF.S;
  // stability meter (top-left)
  var mx = 12*S, my = 12*S, mw = Math.min(150*S, W*0.42), mh = 14*S;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; GF.rr(ctx, mx, my, mw, mh, mh/2); ctx.fill();
  var sf = stability/100;
  var sc = sf>0.5 ? '#5fe08a' : (sf>0.22 ? '#ffc24a' : '#ff5a4a');
  ctx.fillStyle = sc; GF.rr(ctx, mx, my, mw*sf, mh, mh/2); ctx.fill();
  ctx.fillStyle='#dfeee2'; ctx.font='bold '+(9*S)+'px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(GF.t('stab'), mx+6*S, my+mh/2);
  // STABLE win gauge (right under stability)
  if (stableTicks > 0) {
    var gw = mw, gy = my+mh+4*S, gh=6*S;
    ctx.fillStyle='rgba(0,0,0,0.4)'; GF.rr(ctx,mx,gy,gw,gh,gh/2); ctx.fill();
    ctx.fillStyle='#7cf0ff'; GF.rr(ctx,mx,gy,gw*(stableTicks/STABLE_TICKS_TO_WIN),gh,gh/2); ctx.fill();
  }
  // events-weathered pips (small storm dots under the stability bar)
  var reqEv = requiredEvents(level);
  if (reqEv > 0) {
    var ex = mx + 2*S, ey = my+mh+ (stableTicks>0?16*S:8*S);
    for (var ei=0; ei<reqEv; ei++) {
      var done = eventCount > ei;
      ctx.beginPath(); ctx.arc(ex+ei*13*S+4*S, ey, 4*S, 0, Math.PI*2);
      ctx.fillStyle = done ? '#ffb84a' : 'rgba(255,200,120,0.22)'; ctx.fill();
    }
    ctx.fillStyle='#caa06a'; ctx.font=(8.5*S)+'px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(GF.t('weathered'), ex+reqEv*13*S+8*S, ey);
  }
  // extinction pips (top-right, left of buttons)
  var px = helpBtn.x - 10*S, py = 24*S;
  for (var i=MAX_EXTINCTIONS-1;i>=0;i--) {
    px -= 18*S;
    var filled = (MAX_EXTINCTIONS - i) <= extinctCount;
    ctx.beginPath(); ctx.arc(px, py, 7*S, 0, Math.PI*2);
    ctx.fillStyle = filled ? '#ff4d5e' : 'rgba(255,255,255,0.18)'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,120,120,0.6)'; ctx.lineWidth=1.5*S; ctx.stroke();
  }
  // objective + biome + level (top-center)
  var b = biome();
  var bn = (GF.lang==='ru' ? b.nameRu : b.name);
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillStyle='#eafff0'; ctx.font='bold '+GF.clamp(13*S,11,16)+'px sans-serif';
  ctx.fillText(bn + '  ·  ' + GF.t('level')+' '+level+'/'+TOTAL_LEVELS, W/2, 8*S);
  ctx.fillStyle='#9fd9b0'; ctx.font=GF.clamp(11*S,9,13)+'px sans-serif';
  ctx.fillText(GF.t('objective'), W/2, 26*S);
  // mute + help buttons
  GF.drawMuteIcon(ctx, muteBtn.x+muteBtn.w/2, muteBtn.y+muteBtn.h/2, muteBtn.w*0.5, GF.muted);
  ctx.fillStyle='rgba(255,255,255,0.12)';
  GF.rr(ctx, helpBtn.x, helpBtn.y, helpBtn.w, helpBtn.h, 6*S); ctx.fill();
  ctx.fillStyle='#dfeee2'; ctx.font='bold '+(16*S)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('?', helpBtn.x+helpBtn.w/2, helpBtn.y+helpBtn.h/2+1*S);
}

function drawEventBanner(ctx) {
  var W = GF.W, S = GF.S;
  var a = Math.min(1, eventMsgT/0.5);
  ctx.save(); ctx.globalAlpha = a;
  var bw = Math.min(W*0.9, 340*S), bh = 34*S;
  var bx = (W-bw)/2, by = webArea.y + 6*S;
  ctx.fillStyle = 'rgba(60,20,10,0.9)';
  GF.rr(ctx, bx, by, bw, bh, 8*S); ctx.fill();
  ctx.strokeStyle = '#ff9a5c'; ctx.lineWidth=2*S; GF.rr(ctx, bx, by, bw, bh, 8*S); ctx.stroke();
  ctx.fillStyle = '#ffd0a8'; ctx.font='bold '+GF.clamp(13*S,11,16)+'px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(eventMsg, W/2, by+bh/2);
  ctx.restore();
}

// ─── COACH OVERLAY ──────────────────────────────────────────────────────────
function drawCoach(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  // light scrim
  ctx.fillStyle = 'rgba(6,12,9,0.45)'; ctx.fillRect(0,0,W,H);
  var msg = GF.t(coachStep===0?'coach1':(coachStep===1?'coach2':'coach3'));
  // pulse the target empty niche on step 0
  if (coachStep === 0) {
    var tgt = niches.filter(function(nc){ return !nc.alive && !nc.locked; })[0];
    if (tgt) {
      var pulse = 0.5+0.5*Math.sin((typeof performance!=='undefined'?performance.now():0)/250);
      ctx.strokeStyle = 'rgba(255,230,120,'+(0.6+0.4*pulse)+')';
      ctx.lineWidth=4*S; ctx.shadowColor='rgba(255,220,100,0.7)'; ctx.shadowBlur=18*S;
      ctx.beginPath(); ctx.arc(tgt.x, tgt.y, NICHE_R*S+8*S, 0, Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0;
      // hand pointing from tray to target handled by demo; draw arrow from tray card
      if (L.cards && L.cards.length) {
        var c0 = L.cards[0];
        ctx.strokeStyle='rgba(255,230,140,0.8)'; ctx.lineWidth=3*S; ctx.setLineDash([6*S,6*S]);
        ctx.beginPath(); ctx.moveTo(c0.x+c0.w/2, c0.y); ctx.lineTo(tgt.x, tgt.y+NICHE_R*S+14*S); ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }
  // message card
  var bw = Math.min(W*0.86, 360*S);
  ctx.font = 'bold '+GF.clamp(15*S,13,19)+'px sans-serif';
  var lines = wrapLines(ctx, msg, bw-28*S);
  var lh = GF.clamp(20*S,16,26);
  var bh = lines.length*lh + 30*S + (coachStep<2?0:30*S);
  var by = H*0.34 - bh/2;
  var bx = (W-bw)/2;
  ctx.fillStyle='rgba(12,24,18,0.95)'; GF.rr(ctx,bx,by,bw,bh,12*S); ctx.fill();
  ctx.strokeStyle='#5fe08a'; ctx.lineWidth=2*S; GF.rr(ctx,bx,by,bw,bh,12*S); ctx.stroke();
  ctx.fillStyle='#eafff0'; ctx.textAlign='center'; ctx.textBaseline='top';
  for (var i=0;i<lines.length;i++) ctx.fillText(lines[i], W/2, by+16*S+i*lh);
  // continue hint / button for step 2
  if (coachStep >= 2) {
    var btnW=140*S, btnH=34*S, btnX=W/2-btnW/2, btnY=by+bh-btnH-8*S;
    var g=ctx.createLinearGradient(btnX,btnY,btnX,btnY+btnH); g.addColorStop(0,'#2ee07a'); g.addColorStop(1,'#23a657');
    ctx.fillStyle=g; GF.rr(ctx,btnX,btnY,btnW,btnH,btnH/2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold '+(14*S)+'px sans-serif'; ctx.textBaseline='middle';
    ctx.fillText(GF.t('cont'), W/2, btnY+btnH/2);
    L.coachBtn = {x:btnX,y:btnY,w:btnW,h:btnH};
  } else {
    L.coachBtn = null;
    // small downward triangle (vector, not a glyph) hinting "drag down there"
    if (coachStep===0) {
      var ty = by+bh+10*S;
      ctx.fillStyle='#9fd9b0';
      ctx.beginPath(); ctx.moveTo(W/2-6*S, ty); ctx.lineTo(W/2+6*S, ty); ctx.lineTo(W/2, ty+8*S); ctx.closePath(); ctx.fill();
    }
  }
}

function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/), lines=[], cur='';
  for (var i=0;i<words.length;i++) {
    var probe = cur?cur+' '+words[i]:words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur=words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

// ─── MENU / OVERLAYS ────────────────────────────────────────────────────────
function drawMenu(ctx) {
  var W=GF.W, H=GF.H, S=GF.S;
  ctx.fillStyle='rgba(6,16,11,0.9)'; ctx.fillRect(0,0,W,H);
  // mini living web decoration
  drawMenuWeb(ctx);
  ctx.textAlign='center';
  ctx.shadowColor='rgba(95,224,138,0.5)'; ctx.shadowBlur=24*S;
  ctx.fillStyle='#eafff0'; ctx.font='bold '+GF.clamp(34*S,24,46)+'px sans-serif'; ctx.textBaseline='alphabetic';
  ctx.fillText(GF.t('title'), W/2, H*0.20);
  ctx.shadowBlur=0;
  ctx.fillStyle='#9fd9b0'; ctx.font=GF.clamp(14*S,12,18)+'px sans-serif';
  ctx.fillText(GF.t('sub'), W/2, H*0.20+26*S);

  // how-to-play block (under title, above PLAY)
  var bw = Math.min(W*0.9, 380*S);
  var bx = (W-bw)/2, by = H*0.30;
  ctx.font='bold '+GF.clamp(13*S,11,15)+'px sans-serif';
  ctx.fillStyle='#bff5c8'; ctx.textAlign='center';
  ctx.fillText(GF.t('howto'), W/2, by);
  var lines = [];
  ['tut_goal','tut_controls','tut_win','tut_lose','tut_tip'].forEach(function(k){
    lines.push(GF.t(k));
  });
  ctx.font=GF.clamp(11.5*S,10,14)+'px sans-serif';
  ctx.textAlign='left';
  var lh = GF.clamp(15*S,13,18);
  var yy = by + 20*S;
  ctx.fillStyle='#cfe8d4';
  for (var i=0;i<lines.length;i++) {
    var wl = wrapLines(ctx, lines[i], bw);
    for (var j=0;j<wl.length;j++) { ctx.fillText(wl[j], bx, yy); yy += lh; }
    yy += 3*S;
  }
  // PLAY button
  var pbw=GF.clamp(240*S,180,360), pbh=GF.clamp(56*S,46,72);
  var pbx=W/2-pbw/2, pby=Math.max(yy+14*S, H*0.80);
  var t=(typeof performance!=='undefined'?performance.now():0)/1000, k=Math.sin(t*2.2), p=1+0.04*k;
  var _w=pbw*p,_h=pbh*p,_x=W/2-_w/2,_y=pby+pbh/2-_h/2;
  var g=ctx.createLinearGradient(_x,_y,_x,_y+_h); g.addColorStop(0,'#2ee07a'); g.addColorStop(1,'#23a657');
  ctx.save(); ctx.shadowColor='rgba(46,224,122,'+(0.4+0.28*k).toFixed(2)+')'; ctx.shadowBlur=(22+10*k)*S;
  GF.rr(ctx,_x,_y,_w,_h,_h/2); ctx.fillStyle=g; ctx.fill(); ctx.restore();
  ctx.fillStyle='#fff'; ctx.font='bold '+GF.clamp(20*S,16,28)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('▶ '+GF.t('play'), W/2, pby+pbh/2);
  ctx.textBaseline='alphabetic';
  L.menuPlay = {x:pbx,y:pby,w:pbw,h:pbh};
  if (best>0) { ctx.fillStyle='#557'; ctx.font=GF.clamp(12*S,10,15)+'px sans-serif'; ctx.fillText(GF.t('best')+': '+GF.t('level')+' '+best, W/2, pby+pbh+22*S); }
  // mute on menu too
  GF.drawMuteIcon(ctx, W-26*S, 22*S, 13*S, GF.muted);
  L.menuMute = {x:W-40*S,y:8*S,w:32*S,h:32*S};
}

function drawMenuWeb(ctx) {
  var W=GF.W,H=GF.H,S=GF.S;
  ctx.save(); ctx.globalAlpha=0.16;
  var cx=W/2, cy=H*0.55;
  var pts=[[cx,cy+90*S,'fern'],[cx-70*S,cy,'rabbit'],[cx+70*S,cy,'snail'],[cx,cy-90*S,'fox']];
  ctx.strokeStyle='#5fe08a'; ctx.lineWidth=3*S;
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]); ctx.lineTo(pts[1][0],pts[1][1]); ctx.moveTo(pts[0][0],pts[0][1]); ctx.lineTo(pts[2][0],pts[2][1]); ctx.moveTo(pts[1][0],pts[1][1]); ctx.lineTo(pts[3][0],pts[3][1]); ctx.stroke();
  pts.forEach(function(p){ drawCreatureGlyph(ctx,p[0],p[1],20*S,TYPES[p[2]],false); });
  ctx.restore();
}

function drawGameOver(ctx) {
  var W=GF.W,H=GF.H,S=GF.S;
  ctx.fillStyle='rgba(20,6,8,0.9)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ff8a90'; ctx.font='bold '+GF.clamp(32*S,22,44)+'px sans-serif';
  ctx.fillText(GF.t('collapse'), W/2, H*0.40);
  ctx.fillStyle='#d8b8bc'; ctx.font=GF.clamp(15*S,12,19)+'px sans-serif';
  ctx.fillText(loseCause, W/2, H*0.40+30*S);
  ctx.fillStyle='#9fd9b0'; ctx.font=GF.clamp(13*S,11,16)+'px sans-serif';
  ctx.fillText(biomeName()+'  ·  '+GF.t('level')+' '+level, W/2, H*0.40+54*S);
  drawBigBtn(ctx, 'retryBtn', GF.t('retry'), '#2ee07a','#23a657', H*0.62);
}

function drawWon(ctx) {
  var W=GF.W,H=GF.H,S=GF.S;
  ctx.fillStyle='rgba(6,22,12,0.92)'; ctx.fillRect(0,0,W,H);
  // celebratory particles via FX already; draw web small
  ctx.textAlign='center';
  ctx.shadowColor='rgba(95,224,138,0.6)'; ctx.shadowBlur=26*S;
  ctx.fillStyle='#bff5c8'; ctx.font='bold '+GF.clamp(28*S,20,40)+'px sans-serif';
  ctx.fillText(allCleared?GF.t('allclear'):GF.t('ecoStable'), W/2, H*0.40);
  ctx.shadowBlur=0;
  ctx.fillStyle='#eafff0'; ctx.font=GF.clamp(15*S,12,19)+'px sans-serif';
  ctx.fillText(biomeName()+'  ·  '+GF.t('level')+' '+level+'/'+TOTAL_LEVELS, W/2, H*0.40+30*S);
  drawBigBtn(ctx, 'nextBtn', allCleared?GF.t('cont'):GF.t('next'), '#37a8ff','#1e7fd0', H*0.62);
}

function biomeName(){ var b=biome(); return GF.lang==='ru'?b.nameRu:b.name; }

function drawBigBtn(ctx, id, label, c1, c2, yCenter) {
  var W=GF.W,S=GF.S;
  var bw=GF.clamp(240*S,180,360), bh=GF.clamp(56*S,46,72);
  var bx=W/2-bw/2, by=yCenter-bh/2;
  var t=(typeof performance!=='undefined'?performance.now():0)/1000, k=Math.sin(t*2.2);
  var g=ctx.createLinearGradient(bx,by,bx,by+bh); g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.save(); ctx.shadowColor=c1; ctx.shadowBlur=(18+8*k)*S; GF.rr(ctx,bx,by,bw,bh,bh/2); ctx.fillStyle=g; ctx.fill(); ctx.restore();
  ctx.fillStyle='#fff'; ctx.font='bold '+GF.clamp(20*S,16,28)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label, W/2, by+bh/2); ctx.textBaseline='alphabetic';
  L[id] = {x:bx,y:by,w:bw,h:bh};
}

// ─── INPUT ──────────────────────────────────────────────────────────────────
function evtPos(e) {
  var rect = GF.canvas.getBoundingClientRect();
  var sx = GF.canvas.width/rect.width, sy = GF.canvas.height/rect.height;
  var cx = e.touches ? e.touches[0].clientX : e.clientX;
  var cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x:(cx-rect.left)*sx, y:(cy-rect.top)*sy };
}
function inRect(r,x,y){ return r && x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h; }
function nearestEmptyNiche(x,y) {
  var best=null, bd=1e9, S=GF.S;
  niches.forEach(function(nc,i){
    if (nc.alive || nc.locked) return;
    var d=GF.dist(x,y,nc.x,nc.y);
    if (d<bd){ bd=d; best={nc:nc, idx:i, d:d}; }
  });
  if (best && best.d < (NICHE_R*S+34*S)) return best;
  return null;
}
function nicheAt(x,y) {
  var S=GF.S;
  for (var i=0;i<niches.length;i++){ var nc=niches[i]; if (GF.dist(x,y,nc.x,nc.y) <= NICHE_R*S+4*S) return {nc:nc,idx:i}; }
  return null;
}
function cardAt(x,y) {
  if (!L.cards) return null;
  for (var i=0;i<L.cards.length;i++){ if (inRect(L.cards[i],x,y)) return L.cards[i]; }
  return null;
}

function onDown(x,y) {
  // overlays first
  if (gs==='MENU') {
    if (inRect(L.menuMute,x,y)) { var m=GF.toggleMute(); GF.setMusicMuted(m); GF.sfx('tap'); return; }
    if (inRect(L.menuPlay,x,y)) { GF.sfx('tap'); startGame(); return; }
    return;
  }
  if (gs==='GAMEOVER') {
    if (inRect(L.retryBtn,x,y)) { GF.sfx('tap'); maybeShowAd(function(){ startLevel(level); }); return; }
    return;
  }
  if (gs==='WON') {
    if (inRect(L.nextBtn,x,y)) { GF.sfx('tap'); maybeShowAd(function(){ nextLevel(); }); return; }
    return;
  }
  // PLAYING
  // HUD buttons
  if (inRect(muteBtn,x,y)) { var mm=GF.toggleMute(); GF.setMusicMuted(mm); GF.sfx('tap'); return; }
  if (inRect(helpBtn,x,y)) { if (!coachActive) reopenTutorial(); GF.sfx('tap'); return; }
  // coach handling
  if (coachActive) {
    if (coachStep>=2 && L.coachBtn && inRect(L.coachBtn,x,y)) { coachNext(); GF.sfx('tap'); return; }
    // during step 0/1 allow placement via drag/tap; the touch falls through below
  }
  pressStart = { x:x, y:y };
  // start a drag from a tray card (also selects it for tap-to-place)
  var card = cardAt(x,y);
  if (card) {
    drag = { type: card.type, x:x, y:y, fromTray:true };
    selectedType = card.type;
    GF.sfx('tap');
    return;
  }
  // tapping a placed creature removes it
  var hit = nicheAt(x,y);
  if (hit && hit.nc.alive && !hit.nc.locked) { removeAt(hit.idx); evaluateWeb(); return; }
  // tapping ON or NEAR an empty ring fills it (generous radius for fat-finger taps)
  var near = nearestEmptyNiche(x,y);
  if (near) {
    // place the creature that belongs in that ring (if available),
    // else the selected type at its own matching slot.
    if (selectedType && nicheAcceptsType(near.nc, selectedType)) { tryPlaceSelected(near.idx); return; }
    if (trayHas(near.nc.type)) { placeAt(near.idx, near.nc.type); evaluateWeb(); afterPlaceSelection(); return; }
    if (selectedType) { tryPlaceSelectedAnywhere(); return; }
  }
  // tapped empty space with a selection: drop into the matching empty niche
  if (selectedType && !drag) { tryPlaceSelectedAnywhere(); }
}

function tryPlaceSelected(nicheIdx) {
  var nc = niches[nicheIdx];
  if (nc && !nc.alive && !nc.locked && nicheAcceptsType(nc, selectedType)) {
    if (placeAt(nicheIdx, selectedType)) { evaluateWeb(); afterPlaceSelection(); return true; }
  }
  return false;
}
function tryPlaceSelectedAnywhere() {
  // auto-snap: find the (single) empty niche that wants the selected type
  for (var i=0;i<niches.length;i++){
    if (!niches[i].alive && !niches[i].locked && niches[i].type===selectedType) {
      if (placeAt(i, selectedType)) { evaluateWeb(); afterPlaceSelection(); return true; }
    }
  }
  return false;
}
function afterPlaceSelection() {
  // keep selection if more of that type remain in tray, else clear
  if (!trayHas(selectedType)) selectedType = null;
}

function onMove(x,y) {
  if (drag) {
    drag.x=x; drag.y=y;
    if (pressStart && GF.dist(x,y,pressStart.x,pressStart.y) > 6*GF.S) drag.moved = true;
  }
}

function onUp(x,y) {
  if (drag) {
    if (drag.moved) {
      // a real drag: drop on nearest empty niche; if missed, snap to matching slot
      var tgt = nearestEmptyNiche(x,y);
      if (tgt && nicheAcceptsType(tgt.nc, drag.type)) { placeAt(tgt.idx, drag.type); evaluateWeb(); afterPlaceSelection(); }
      else if (!tryPlaceSelectedAnywhere()) { GF.sfx('error'); }
      selectedType = null;
    }
    // if not moved, it was a tap on a card -> selectedType stays set for tap-to-place
    drag = null;
  }
  pressStart = null;
}

function maybeShowAd(cb) {
  if (pendingAd && GF.ads && GF.ads.canShowInterstitial && GF.ads.canShowInterstitial()) {
    pendingAd = false;
    GF.ads.interstitial({ onClose: cb, onError: cb });
    // safety: if ad doesn't fire callback quickly, still continue
    setTimeout(function(){ if (gs==='GAMEOVER'||gs==='WON') {} }, 50);
    cb && setTimeout(function(){}, 0);
  } else {
    pendingAd = false;
    cb && cb();
  }
}

// pointer wiring
(function wireInput(){
  var canvas = GF.canvas;
  var pointerDown=false;
  canvas.addEventListener('mousedown', function(e){ e.preventDefault(); var p=evtPos(e); pointerDown=true; onDown(p.x,p.y); });
  window.addEventListener('mousemove', function(e){ if(!pointerDown) return; var p=evtPos(e); onMove(p.x,p.y); });
  window.addEventListener('mouseup', function(e){ if(!pointerDown) return; pointerDown=false; var p=evtPos(e); onUp(p.x,p.y); });
  canvas.addEventListener('touchstart', function(e){ e.preventDefault(); var p=evtPos(e); pointerDown=true; onDown(p.x,p.y); }, {passive:false});
  canvas.addEventListener('touchmove', function(e){ e.preventDefault(); if(!pointerDown) return; var p=evtPos(e); onMove(p.x,p.y); }, {passive:false});
  canvas.addEventListener('touchend', function(e){ e.preventDefault(); if(!pointerDown) return; pointerDown=false; var t=e.changedTouches[0]; var rect=canvas.getBoundingClientRect(); var sx=canvas.width/rect.width, sy=canvas.height/rect.height; onUp((t.clientX-rect.left)*sx,(t.clientY-rect.top)*sy); }, {passive:false});
})();

window.addEventListener('resize', function(){ if (niches.length) layout(); });

// ─── BOOT ───────────────────────────────────────────────────────────────────
GF.init({
  designW: 393, designH: 852,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'niche_keeper',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('niche_keeper_best')||'0')||0; } catch(e){}
    try { seenTut = !!localStorage.getItem('niche_keeper_seen_tutorial'); } catch(e){}
    GF.startMusic({ preset:'cozy', muted: GF.muted });

    // persist run state across reload (Yandex 1.9)
    GF.persist('niche_keeper_run_v1',
      function(){ return { gs: (gs==='PLAYING'?'PLAYING':'MENU'), level: level, best: best, extinctCount: extinctCount, stability: stability,
        niches: niches.map(function(n){ return { f:n.filled, a:n.alive, d:n.dead, p:Math.round(n.pop), iw:n.invasiveWrong }; }),
        tray: tray.map(function(t){ return {type:t.type,count:t.count}; }) }; },
      function(s){ if(!s) return;
        best = s.best||best;
        if (s.gs==='PLAYING' && s.niches && s.niches.length) {
          startLevel(s.level||1, true);
          // restore niche fill states
          s.niches.forEach(function(sn, i){ if (!niches[i]) return; var nc=niches[i];
            nc.filled=sn.f; nc.alive=!!sn.a; nc.dead=!!sn.d; nc.pop=sn.p||0; nc.invasiveWrong=!!sn.iw;
            if (nc.alive) seedCritters(nc); else nc.critters=[];
          });
          if (s.tray) tray = s.tray.map(function(t){return {type:t.type,count:t.count};});
          stability = (typeof s.stability==='number')?s.stability:100;
          extinctCount = s.extinctCount||0;
          coachActive=false; seenTut=true;
          gs='PLAYING';
        } else { gs='MENU'; }
      }
    );
    if (gs==='PLAYING' && !niches.length) gs='MENU';

    // expose state for the post-build tester gate (every DESIGN var is real)
    GF.exposeState(function(){
      var filled = niches.filter(function(n){return n.alive;}).length;
      return {
        gs: gs, level: level, best: best,
        stability: Math.round(stability),
        extinctCount: extinctCount,
        maxExtinctions: MAX_EXTINCTIONS,
        nichesTotal: niches.length,
        nichesFilled: filled,
        brokenNiches: brokenCount(),
        stableTicks: stableTicks,
        stableTicksToWin: STABLE_TICKS_TO_WIN,
        totalLevels: TOTAL_LEVELS,
        eventCount: eventCount,
        requiredEvents: requiredEvents(level),
        allCleared: allCleared,
        traySpecies: tray.reduce(function(a,t){return a+t.count;},0),
      };
    });

    // expose bot contract for the progression probe
    GF.exposeBot(
      function(){ // actions available now
        var acts = [];
        if (gs==='MENU') return ['start'];
        if (gs==='GAMEOVER') return ['retry'];
        if (gs==='WON') return ['next'];
        // PLAYING: place each tray species into each empty matching niche; remove wrong fills
        tray.forEach(function(tr){ if (tr.count<=0) return;
          niches.forEach(function(nc,i){ if (!nc.alive && !nc.locked && nc.type===tr.type) acts.push('place:'+tr.type+'@'+i); });
        });
        niches.forEach(function(nc,i){ if (nc.invasiveWrong) acts.push('evict:'+i); });
        if (!acts.length) acts.push('wait');
        return acts;
      },
      function(a){ // perform one
        if (a==='start') { startGame(); return; }
        if (a==='retry') { startLevel(level); return; }
        if (a==='next') { nextLevel(); return; }
        if (a==='wait') { return; }
        if (a.indexOf('place:')===0) {
          var rest=a.slice(6); var parts=rest.split('@'); var type=parts[0]; var idx=parseInt(parts[1],10);
          // dismiss coach if active so the bot can play freely
          if (coachActive) { coachActive=false; seenTut=true; }
          placeAt(idx, type); evaluateWeb(); return;
        }
        if (a.indexOf('evict:')===0) { removeAt(parseInt(a.slice(6),10)); evaluateWeb(); return; }
      }
    );

    // platform autostart: drop straight into PLAYING, suppress tutorial
    if (window.__GF_AUTOSTART && !window._silent) {
      seenTut = true;
      startLevel(1, true);
      coachActive = false;
      gs = 'PLAYING';
      GF.gameStarted();
    }
  },
  onUpdate: update,
  onDraw: draw,
});

// ─── TEST / SCREENSHOT SEAMS ────────────────────────────────────────────────
// jump straight into gameplay (n>=99 forces a near-collapse for gameover shots)
window._jumpLevel = function(n){
  window._silent = true;
  if ((n|0) >= 99) {
    startLevel(Math.min(level,TOTAL_LEVELS), true);
    coachActive=false; seenTut=true;
    // break the web hard
    extinctCount = MAX_EXTINCTIONS-1; stability = 6;
    niches.forEach(function(nc){ if(nc.alive&&!nc.locked){ nc.pop=3; } });
    gs='PLAYING';
  } else {
    // normal level: land on a POPULATED living web (good for promo + the gate's
    // PLAYING check), leaving the apex ring open so the goal is also visible.
    window._silent = false;
    window._setupForScreenshot(GF.clamp(n||1,1,TOTAL_LEVELS), true);
    return;
  }
  window._silent = false;
};

// test seam: start a FRESH empty level (for balance/solve probing from scratch)
window._freshLevel = function(n){ startLevel(GF.clamp(n||1,1,TOTAL_LEVELS), true); coachActive=false; seenTut=true; gs='PLAYING'; };

// land on a populated, living mid-game web for promo screenshots (Yandex 5.1.1)
window._setupForScreenshot = function(lv, leaveGap){
  window._silent = true;
  var n = GF.clamp(lv||4, 1, TOTAL_LEVELS);
  startLevel(n, true);
  coachActive = false; seenTut = true;
  // fill EVERY niche correctly with healthy populations -> a thriving, all-green
  // living web (the "keeping a little world alive" beauty shot, 100% gameplay).
  niches.forEach(function(nc, i){
    if (nc.alive) return;
    if (trayHas(nc.type)) { takeFromTray(nc.type); }
    nc.filled = nc.type; nc.alive = true; nc.dead=false; nc.pop = 52 + (i*9)%26;
    seedCritters(nc);
  });
  // optionally leave the apex (a leaf with no dependents) empty to also show the goal ring
  if (leaveGap) {
    for (var k=niches.length-1;k>=0;k--){ var n=niches[k]; if (n.pred<0 && !n.locked){ returnToTray(n.filled); n.alive=false; n.filled=null; n.pop=0; n.critters=[]; break; } }
  }
  stability = 88; extinctCount = 0; stableTicks = 90; eventCount = 1;
  evaluateWeb();
  gs = 'PLAYING';
  window._silent = false;
};

// dev info seam
window._nicheInfo = function(){ try { return window.__gfState(); } catch(e){ return null; } };

})();
</script>
