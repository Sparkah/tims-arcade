<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Beast Bazaar</title>
  <script src="/sdk.js"></script>
  <!-- build_platforms.sh substitutes the line above with the SDK <script>
       for the chosen platform. Recognised platforms today:
         yandex            → <script src="/sdk.js"></script>
         crazygames        → <script src="https://sdk.crazygames.com/...">
         gamedistribution  → <script src="https://html5.api.gamedistribution.com/...">
         gamepush          → <script async src="https://gamepush.com/sdk/game-score.js
                                                    ?projectId=...
                                                    &publicToken=...
                                                    &callback=onGPInit"></script> -->
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #2a1a12; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── LOCALISED STRINGS (Yandex 8.2.3 — both languages) ────────────────────
var STRINGS = {
  en: {
    title: 'Beast Bazaar',
    sub: 'Merge critters · fill orders · grow your bazaar',
    play: 'PLAY', retry: 'PLAY AGAIN',
    score: 'SCORE', best: 'BEST', coins: 'COINS', free: 'free',
    gameover: 'GRIDLOCK!',
    order: 'ORDERS', want: 'wants', tap_nest: 'TAP TO SPAWN', nest: 'NEST',
    shop: 'SHOP', buyNest: '+NEST', buyRow: '+ROW', buyRech: 'FASTER',
    combo: 'COMBO', deliver: 'DELIVERED', newbeast: 'NEW BEAST!',
    howto: 'HOW TO PLAY',
    tut_goal: 'Goal: Tap the nest to spawn critters, fuse two of a kind into a bigger beast, and fill customer orders for coins.',
    tut_controls: 'Controls: Tap the nest to spawn. Drag a critter onto a matching one to merge — or tap it, then tap where to send it. Drop one on an order to deliver.',
    tut_win: 'Win: Endless — chase your best coin score and evolve the rarest beast, the Bazaar King!',
    tut_lose: 'Lose: GRIDLOCK — the board fills with no merge left and no order you can fill.',
    tut_tip: 'Tip: Deliver orders to free cells; chain quick merges for a combo bonus. Spend coins in the shop.',
  },
  ru: {
    title: 'Звериный Базар',
    sub: 'Сливай зверят · выполняй заказы · расти базар',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ',
    score: 'ОЧКИ', best: 'РЕКОРД', coins: 'МОНЕТЫ', free: 'мест',
    gameover: 'ТУПИК!',
    order: 'ЗАКАЗЫ', want: 'нужно', tap_nest: 'НАЖМИ — ПОЯВИТСЯ', nest: 'ГНЕЗДО',
    shop: 'ЛАВКА', buyNest: '+ГНЕЗДО', buyRow: '+РЯД', buyRech: 'БЫСТРЕЕ',
    combo: 'КОМБО', deliver: 'ГОТОВО', newbeast: 'НОВЫЙ ЗВЕРЬ!',
    howto: 'КАК ИГРАТЬ',
    tut_goal: 'Цель: Жми гнездо, чтобы появлялись зверята, сливай двух одинаковых в зверя покрупнее и выполняй заказы за монеты.',
    tut_controls: 'Управление: Жми гнездо для появления. Тащи зверя на такого же, чтобы слить — или нажми на него, затем на клетку. Брось зверя на заказ, чтобы сдать.',
    tut_win: 'Победа: Бесконечно — бей рекорд монет и выведи самого редкого зверя — Короля Базара!',
    tut_lose: 'Поражение: ТУПИК — поле заполнено, слить нечего и ни один заказ не выполнить.',
    tut_tip: 'Совет: Сдавай заказы, чтобы освобождать клетки; быстрые слияния подряд дают комбо-бонус. Трать монеты в лавке.',
  },
};

// Species names per tier — revealed as the player climbs the ladder.
var SPECIES = {
  en: ['Slimelet','Dustbun','Mossback','Pebblop','Tuskling','Snoutl','Grumbeast','Hornox','Cragjaw','Titanbeast','Bazaar King'],
  ru: ['Слизнячок','Пыляш','Мохоспин','Камешок','Клычок','Рыльце','Ворчун','Рогач','Скалозуб','Титанзверь','Король Базара'],
};
function speciesName(t) {
  var arr = SPECIES[GF.lang] || SPECIES.en;
  return arr[GF.clamp(t, 0, arr.length - 1)] || ('Tier ' + t);
}

// AI sprites — one per tier + nest + coin + wildcard. Falls back to procedural.
var SPRITE_NAMES = ['beast0','beast1','beast2','beast3','beast4','beast5','beast6','beast7','beast8','beast9','beast10','nest','coin','wild'];

// Per-tier palette for procedural fallback + accent tinting.
var TIER_COL = [
  '#7ed957','#ffd166','#5fb98f','#9d8189','#e8985e',
  '#6aa9e0','#c77dff','#ff7b6b','#8d99ae','#b08968','#ffd700'
];

// ── TUNABLES (DESIGN.md §Tunables) ───────────────────────────────────────
var boardCols          = 5;
var boardRows          = 6;
var genCharge          = 1;
var genRechargeMs      = 650;
var maxTier            = 10;
var baseOrderTier      = 1;
var orderTierRampEvery = 4;
var coinPerDelivery    = 10;
var genCost            = 30;
var rowCost            = 45;
var comboWindowMs      = 1500;
var wildcardChance     = 0.05;
var SHOP_FAMILY_COIN   = 40;   // coins to unlock the shop
var rechargeCost       = 60;   // shop: faster recharge
var MAX_ROWS           = 8;    // ceiling for +ROW purchases
var MAX_ORDERS         = 3;    // visible orders
var TIER0_SPAWN        = true; // nest always spawns tier 0

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | PLAYING | GAMEOVER
var score = 0, best = 0, coins = 0;
var merges = 0, deliveries = 0;
var combo = 0, bestCombo = 0, comboTimer = 0;
var maxTierReached = 0;     // highest tier produced this run (progression)
var shopUnlocked = false;
var wildcardSeen = false;
var revealedTier = {};      // tier -> true once revealed (for new-beast flourish)
var revealQueue = [];       // pending new-beast flourishes {tier, t}

var rows = boardRows;       // current board height (grows with +ROW)
var nests = 1;              // number of generators (grows with +NEST)
var board = [];             // flat array of cells: null | {tier, wild, x,y, sx,sy, born}
var charge = [];            // per-nest recharge accumulator (ms)
var nestCharges = [];       // per-nest available charges

var orders = [];            // {tier, need, have, id}
var orderSeq = 1;
var firstMergeDone = false; // progressive disclosure: orders appear after 1st merge
var firstDeliveryDone = false; // coins/shop messaging after 1st delivery

// selection / drag
var sel = -1;               // selected source cell index (tap-tap), -1 = none
var drag = null;            // {idx, x, y, moved}
var pressStart = null;      // {x, y, idx, t}

// layout (recomputed each draw)
var L = { boardX:0, boardY:0, boardW:0, cell:0, trayY:0, trayH:0, nestY:0, nestH:0 };
var helpBtn = { x:0, y:0, w:0, h:0 };
var shopBtns = [];          // {kind, x,y,w,h, cost, enabled}
var orderRects = [];        // {x,y,w,h, order}
var nestRects = [];         // {x,y,w,h, idx}
var newBeastFlash = 0;      // full-screen flourish timer

// ── HELPERS ──────────────────────────────────────────────────────────────
function cellCount() { return boardCols * rows; }
function freeCells() {
  var n = 0;
  for (var i = 0; i < board.length; i++) if (!board[i]) n++;
  return n;
}
function firstFree() {
  for (var i = 0; i < board.length; i++) if (!board[i]) return i;
  return -1;
}
function randFree() {
  var fr = [];
  for (var i = 0; i < board.length; i++) if (!board[i]) fr.push(i);
  if (!fr.length) return -1;
  return fr[(Math.random() * fr.length) | 0];
}
// Two same-tier critters anywhere mergeable, or a wildcard present with any
// other critter (wildcard merges with anything).
function hasMergePair() {
  var seen = {}, wild = false, any = false;
  for (var i = 0; i < board.length; i++) {
    var c = board[i];
    if (!c) continue;
    any = true;
    if (c.wild) { wild = true; continue; }
    if (seen[c.tier]) return true;
    seen[c.tier] = true;
  }
  if (wild && any) {
    // wildcard + at least one non-wild critter = mergeable
    for (var j = 0; j < board.length; j++) if (board[j] && !board[j].wild) return true;
  }
  return false;
}
// Could any current order be fulfilled from critters already on the board?
function hasDeliverableOrder() {
  for (var o = 0; o < orders.length; o++) {
    var need = orders[o].tier, cnt = 0;
    for (var i = 0; i < board.length; i++) {
      var c = board[i];
      if (c && (c.wild || c.tier === need)) cnt++;
    }
    if (cnt >= (orders[o].need - orders[o].have)) return true;
  }
  return false;
}
function canMakeProgress() {
  // GRIDLOCK (lose) = the board is FULL (freeCells()===0). This is deliberate,
  // not a simplification: merges here are FREE-MOVE (drag any critter onto any
  // same-tier cell, not just a neighbour), and the board has 30 cells but only
  // 11 tiers — so by pigeonhole a *full* board ALWAYS contains a same-tier pair.
  // A "full && no-merge-possible" rule would therefore be UNREACHABLE (the game
  // could never end), so board-full itself is the terminal pressure: you must
  // merge/deliver to keep space open BEFORE the last cell fills. hasMergePair()
  // and hasDeliverableOrder() remain for __gfState() + the loop-depth check.
  return freeCells() > 0;
}

// ── ORDERS ───────────────────────────────────────────────────────────────
function orderTierCeiling() {
  // ramps up with deliveries
  return GF.clamp(baseOrderTier + Math.floor(deliveries / orderTierRampEvery), baseOrderTier, maxTier - 1);
}
function makeOrder() {
  var ceil = orderTierCeiling();
  // bias toward tiers the player can plausibly reach (<= maxTierReached+1)
  var hi = GF.clamp(Math.min(ceil, maxTierReached + 1), baseOrderTier, maxTier - 1);
  var lo = GF.clamp(hi - 2, baseOrderTier, hi);
  var tier = lo + ((Math.random() * (hi - lo + 1)) | 0);
  tier = GF.clamp(tier, baseOrderTier, maxTier - 1);
  // need 1-3 of that species; higher tiers usually need fewer
  var need = tier >= 5 ? 1 : (1 + ((Math.random() * 2) | 0));
  return { tier: tier, need: need, have: 0, id: orderSeq++ };
}
function refillOrders() {
  if (!firstMergeDone) return;               // progressive disclosure
  while (orders.length < MAX_ORDERS) orders.push(makeOrder());
}

// ── NEST / SPAWN ───────────────────────────────────────────────────────────
function spawnFromNest() {
  if (gs !== 'PLAYING') return false;
  // find a nest with a charge
  var ni = -1;
  for (var k = 0; k < nests; k++) { if (nestCharges[k] >= 1) { ni = k; break; } }
  if (ni < 0) return false;
  var idx = randFree();
  if (idx < 0) return false;                 // board full — can't spawn
  nestCharges[ni] -= 1;
  var wild = Math.random() < wildcardChance && firstMergeDone;
  if (wild) wildcardSeen = true;
  placeCritter(idx, 0, wild, true);
  GF.spawnParticles(board[idx].sx, board[idx].sy, wild ? '#ffd700' : TIER_COL[0], 8);
  GF.saveRun();
  return true;
}
function placeCritter(idx, tier, wild, animate) {
  var p = cellCenter(idx);
  board[idx] = { tier: tier, wild: !!wild, sx: p.x, sy: p.y, pop: animate ? 1 : 0 };
  if (!wild && tier > maxTierReached) { maxTierReached = tier; queueReveal(tier); }
}
function queueReveal(tier) {
  if (revealedTier[tier]) return;
  revealedTier[tier] = true;
  if (tier >= 2) { revealQueue.push({ tier: tier }); newBeastFlash = 1.4; GF.setShake(0.5); }
}

// ── MERGE / MOVE / DELIVER ───────────────────────────────────────────────
function tryActOn(srcIdx, dstKind, dstRef) {
  // dstKind: 'cell' (dstRef=idx) | 'order' (dstRef=order)
  if (srcIdx < 0 || !board[srcIdx]) return false;
  var src = board[srcIdx];

  if (dstKind === 'order') {
    return deliverTo(srcIdx, dstRef);
  }
  // cell
  var dst = dstRef;
  if (dst === srcIdx) return false;
  var tgt = board[dst];
  if (!tgt) {
    // move into empty cell
    var p = cellCenter(dst);
    board[dst] = src; board[dst].sx = p.x; board[dst].sy = p.y; board[dst].pop = 0.4;
    board[srcIdx] = null;
    GF.saveRun();
    return true;
  }
  // occupied — merge if same tier or wildcard involved
  var canMerge = (src.wild || tgt.wild || src.tier === tgt.tier);
  if (!canMerge) {
    // swap so the player can re-plan (forgiving, no penalty)
    var ps = cellCenter(srcIdx), pd = cellCenter(dst);
    board[srcIdx] = tgt; board[srcIdx].sx = ps.x; board[srcIdx].sy = ps.y;
    board[dst] = src; board[dst].sx = pd.x; board[dst].sy = pd.y;
    GF.saveRun();
    return true;
  }
  // MERGE → tier+1 at dst
  var baseTier = src.wild ? tgt.tier : (tgt.wild ? src.tier : src.tier);
  var resultTier = GF.clamp(baseTier + 1, 0, maxTier);
  // top tier can't go higher — bounce instead of consuming
  if (baseTier >= maxTier) { return false; }
  board[srcIdx] = null;
  var p2 = cellCenter(dst);
  board[dst] = { tier: resultTier, wild: false, sx: p2.x, sy: p2.y, pop: 1 };
  if (resultTier > maxTierReached) { maxTierReached = resultTier; queueReveal(resultTier); }
  merges++;
  // combo
  combo = (comboTimer > 0) ? combo + 1 : 1;
  comboTimer = comboWindowMs;
  if (combo > bestCombo) bestCombo = combo;
  // first merge → unlock orders (progressive disclosure)
  if (!firstMergeDone) { firstMergeDone = true; refillOrders(); }
  // VFX
  GF.spawnParticles(p2.x, p2.y, TIER_COL[resultTier] || '#fff', 14 + combo * 2);
  GF.spawnFloat(p2.x, p2.y - L.cell * 0.3, '+' + speciesName(resultTier), TIER_COL[resultTier] || '#fff');
  if (combo >= 2) GF.spawnFloat(p2.x, p2.y - L.cell * 0.7, GF.t('combo') + ' x' + combo, '#ffd700');
  GF.setShake(0.25 + combo * 0.08);
  GF.saveRun();
  return true;
}

function deliverTo(srcIdx, order) {
  var src = board[srcIdx];
  if (!src) return false;
  if (!(src.wild || src.tier === order.tier)) return false;   // wrong species
  // consume the critter, advance the order
  board[srcIdx] = null;
  order.have += 1;
  GF.spawnParticles(L.boardX + L.boardW / 2, order._cy || L.trayY, '#ffd700', 12);
  if (order.have >= order.need) {
    // order complete → coins
    var gain = coinPerDelivery * Math.max(1, order.tier) * (combo >= 2 ? combo : 1);
    coins += gain; score += gain;
    deliveries++;
    if (!firstDeliveryDone) { firstDeliveryDone = true; }
    GF.spawnFloat(order._cx || (L.boardX + L.boardW / 2), (order._cy || L.trayY) + 6, '+' + gain, '#ffd700');
    GF.setShake(0.4);
    // replace this order
    var i = orders.indexOf(order);
    if (i >= 0) orders.splice(i, 1);
    refillOrders();
    if (coins >= SHOP_FAMILY_COIN) shopUnlocked = true;
  } else {
    GF.spawnFloat(order._cx || (L.boardX + L.boardW / 2), (order._cy || L.trayY) + 6, order.have + '/' + order.need, '#fff');
  }
  GF.saveRun();
  checkGameOver();
  return true;
}

// ── SHOP ─────────────────────────────────────────────────────────────────
function buyNest() {
  if (coins < genCost || nests >= 2) return;
  coins -= genCost; nests += 1;
  nestCharges[nests - 1] = genCharge; charge[nests - 1] = 0;
  GF.spawnFloat(GF.cx, GF.cy, '+' + GF.t('nest'), '#7ed957');
  GF.saveRun();
}
function buyRow() {
  if (coins < rowCost || rows >= MAX_ROWS) return;
  coins -= rowCost; rows += 1;
  // append a new empty row of cells
  for (var i = 0; i < boardCols; i++) board.push(null);
  GF.spawnFloat(GF.cx, GF.cy, '+' + GF.t('buyRow'), '#6aa9e0');
  GF.saveRun();
}
function buyRecharge() {
  if (coins < rechargeCost || genRechargeMs <= 250) return;
  coins -= rechargeCost;
  genRechargeMs = Math.max(250, Math.round(genRechargeMs * 0.7));
  GF.spawnFloat(GF.cx, GF.cy, GF.t('buyRech'), '#ffd166');
  GF.saveRun();
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  score = 0; coins = 0; merges = 0; deliveries = 0;
  combo = 0; bestCombo = 0; comboTimer = 0;
  maxTierReached = 0; shopUnlocked = false; wildcardSeen = false;
  revealedTier = {}; revealQueue = []; newBeastFlash = 0;
  rows = boardRows; nests = 1;
  genRechargeMs = 650;
  board = []; for (var i = 0; i < cellCount(); i++) board.push(null);
  charge = [0]; nestCharges = [genCharge];
  orders = []; orderSeq = 1;
  firstMergeDone = false; firstDeliveryDone = false;
  sel = -1; drag = null; pressStart = null;
  // seed a couple of critters so the very first merge is reachable in seconds
  var a = randFree(); placeCritter(a, 0, false, false);
  var b = randFree(); placeCritter(b, 0, false, false);
  gs = 'PLAYING';
  startTutorial();
  GF.gameStarted();
  GF.saveRun();
}

function gameOver() {
  if (gs === 'GAMEOVER') return;
  var newBest = score > best;
  if (newBest) {
    best = score;
    try { localStorage.setItem('beast_bazaar_best', best); } catch (e) {}
  }
  gs = 'GAMEOVER';
  GF.gameEnded();
  GF.saveRun();
  if (newBest && best > 0) GF.happytime();
}

function checkGameOver() {
  if (gs !== 'PLAYING') return;
  if (freeCells() === 0 && !canMakeProgress()) gameOver();
}

// ── TUTORIAL (progressive disclosure) ────────────────────────────────────
function startTutorial() {
  // Step 1: point at the nest. Step 2: point at the two mergeable critters.
  var seen = false;
  try { seen = !!localStorage.getItem('beast_bazaar_seen_tutorial'); } catch (e) {}
  var steps = [
    { text: GF.t('tap_nest'), target: function () { return nestTarget(); }, advance: 'click_any' },
    { text: (GF.lang === 'ru' ? 'Тащи одного зверя на другого, чтобы слить!' : 'Drag one critter onto the other to merge!'),
      target: function () { return mergeHintTarget(); }, advance: 'click_any' },
  ];
  GF.tutorial.start(steps, { storageKey: 'beast_bazaar_seen_tutorial', force: !seen ? true : false });
  try { localStorage.setItem('beast_bazaar_seen_tutorial', '1'); } catch (e) {}
}
function nestTarget() {
  if (!nestRects.length) return { x: GF.cx, y: GF.H * 0.85, r: 40 * GF.S };
  var n = nestRects[0];
  return { x: n.x + n.w / 2, y: n.y + n.h / 2, r: Math.max(n.w, n.h) / 2 };
}
function mergeHintTarget() {
  // point between the first two same-tier critters
  var idxs = [];
  for (var i = 0; i < board.length && idxs.length < 2; i++) if (board[i] && !board[i].wild) idxs.push(i);
  if (idxs.length < 2) return null;
  var a = cellCenter(idxs[0]), b = cellCenter(idxs[1]);
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2, r: L.cell * 0.7 };
}

// ── COORD MAPPING ─────────────────────────────────────────────────────────
function cellCenter(idx) {
  var col = idx % boardCols, row = (idx / boardCols) | 0;
  return { x: L.boardX + col * L.cell + L.cell / 2, y: L.boardY + row * L.cell + L.cell / 2 };
}
function cellAt(x, y) {
  if (x < L.boardX || x > L.boardX + L.boardW) return -1;
  if (y < L.boardY || y > L.boardY + L.cell * rows) return -1;
  var col = ((x - L.boardX) / L.cell) | 0;
  var row = ((y - L.boardY) / L.cell) | 0;
  if (col < 0 || col >= boardCols || row < 0 || row >= rows) return -1;
  return row * boardCols + col;
}
function orderAt(x, y) {
  for (var i = 0; i < orderRects.length; i++) {
    var r = orderRects[i];
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return r.order;
  }
  return null;
}
function nestHit(x, y) {
  for (var i = 0; i < nestRects.length; i++) {
    var r = nestRects[i];
    if (x >= r.x - r.w * 0.15 && x <= r.x + r.w * 1.15 && y >= r.y - r.h * 0.15 && y <= r.y + r.h * 1.15) return true;
  }
  return false;
}
function shopHit(x, y) {
  for (var i = 0; i < shopBtns.length; i++) {
    var b = shopBtns[i];
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) return b;
  }
  return null;
}

// ── INPUT ────────────────────────────────────────────────────────────────
function onDown(x, y) {
  if (gs !== 'PLAYING') return;
  // tutorial swallows taps first
  if (GF.tutorial.active) {
    // still spawn from nest during step 1 so the lesson is hands-on
    if (GF.tutorial.step === 0 && nestHit(x, y)) { spawnFromNest(); GF.tutorial.next(); return; }
    GF.tutorial.handleClick(x, y); return;
  }
  // help button
  if (x >= helpBtn.x && x <= helpBtn.x + helpBtn.w && y >= helpBtn.y && y <= helpBtn.y + helpBtn.h) {
    GF.tutorial.reopen(); return;
  }
  // shop
  var sb = shopHit(x, y);
  if (sb) { if (sb.kind === 'nest') buyNest(); else if (sb.kind === 'row') buyRow(); else if (sb.kind === 'rech') buyRecharge(); checkGameOver(); return; }
  // nest tap → spawn
  if (nestHit(x, y)) { spawnFromNest(); checkGameOver(); sel = -1; return; }
  // order tap (with a selected critter → deliver)
  var ord = orderAt(x, y);
  if (ord) {
    if (sel >= 0 && board[sel]) { tryActOn(sel, 'order', ord); sel = -1; checkGameOver(); }
    return;
  }
  // board cell
  var idx = cellAt(x, y);
  if (idx < 0) { sel = -1; return; }
  if (sel >= 0) {
    // tap-tap destination
    if (idx === sel) { sel = -1; return; }
    tryActOn(sel, 'cell', idx);
    sel = -1; checkGameOver();
    return;
  }
  // begin a press — may become a drag or a tap-select
  if (board[idx]) {
    pressStart = { x: x, y: y, idx: idx, t: Date.now() };
    drag = { idx: idx, x: x, y: y, moved: false };
  } else {
    sel = -1;
  }
}
function onMove(x, y) {
  if (gs !== 'PLAYING' || !drag) return;
  drag.x = x; drag.y = y;
  if (!drag.moved && Math.abs(x - pressStart.x) + Math.abs(y - pressStart.y) > 10 * GF.S) drag.moved = true;
}
function onUp(x, y) {
  if (gs !== 'PLAYING') { drag = null; pressStart = null; return; }
  if (!drag) return;
  if (drag.moved) {
    // DRAG release → act on whatever is under the pointer
    var ord = orderAt(x, y);
    if (ord) { tryActOn(drag.idx, 'order', ord); }
    else {
      var idx = cellAt(x, y);
      if (idx >= 0) tryActOn(drag.idx, 'cell', idx);
    }
    sel = -1; checkGameOver();
  } else {
    // it was a TAP, not a drag → select source for tap-tap
    sel = drag.idx;
  }
  drag = null; pressStart = null;
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (newBeastFlash > 0) newBeastFlash = Math.max(0, newBeastFlash - dt);
  if (gs !== 'PLAYING') { GF.tutorial.update(dt); return; }
  GF.tutorial.update(dt);

  // pop animations
  for (var i = 0; i < board.length; i++) {
    var c = board[i];
    if (c && c.pop > 0) c.pop = Math.max(0, c.pop - dt * 3.5);
  }
  // combo decay
  if (comboTimer > 0) { comboTimer -= dt * 1000; if (comboTimer <= 0) { combo = 0; } }

  // nest recharge
  for (var k = 0; k < nests; k++) {
    if (nestCharges[k] < genCharge) {
      charge[k] = (charge[k] || 0) + dt * 1000;
      if (charge[k] >= genRechargeMs) { charge[k] = 0; nestCharges[k] = Math.min(genCharge, (nestCharges[k] || 0) + 1); }
    }
  }
  // keep orders topped up
  refillOrders();
  // continuous gridlock check
  checkGameOver();
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  // reserve top strip + order tray + bottom nest/shop strip; board fills middle
  var topH = GF.clamp(46 * S, 38, 64);
  var trayH = GF.clamp(64 * S, 52, 88);
  var bottomH = GF.clamp(108 * S, 88, 150);
  var pad = GF.clamp(10 * S, 6, 16);
  L.trayY = topH;
  L.trayH = trayH;
  var availTop = topH + trayH + pad;
  var availBot = H - bottomH - pad;
  var availH = availBot - availTop;
  // board sized to fit cols within width AND rows within availH
  var maxBoardW = W - pad * 2;
  var cellByW = maxBoardW / boardCols;
  var cellByH = availH / rows;
  L.cell = Math.floor(Math.min(cellByW, cellByH));
  L.boardW = L.cell * boardCols;
  L.boardX = (W - L.boardW) / 2;
  var boardH = L.cell * rows;
  L.boardY = availTop + (availH - boardH) / 2;
  L.nestY = H - bottomH;
  L.nestH = bottomH;
  // help button top-right
  var hb = GF.clamp(34 * S, 28, 44);
  helpBtn = { x: W - hb - pad, y: pad * 0.6, w: hb, h: hb };
}

function draw(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  layout();
  // background — cozy market gradient
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#3a2418'); g.addColorStop(0.5, '#4a2e1c'); g.addColorStop(1, '#2a1a12');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawTray(ctx);
    drawBoard(ctx);
    drawBottom(ctx);
    drawTopHUD(ctx);
    drawHelpBtn(ctx);
    drawDrag(ctx);
    if (newBeastFlash > 0) drawNewBeast(ctx);
    if (gs === 'PLAYING') GF.tutorial.draw(ctx);
  }

  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
}

function drawTopHUD(ctx) {
  var S = GF.S, W = GF.W;
  var fs = GF.clamp(15 * S, 11, 20);
  ctx.textBaseline = 'middle';
  // score (left)
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
  ctx.fillText(GF.t('score') + ' ' + score, 10 * S, 18 * S);
  // best species chip under score
  ctx.font = GF.clamp(11 * S, 9, 15) + 'px sans-serif';
  ctx.fillStyle = '#ffd166';
  ctx.fillText(GF.t('best') + ': ' + speciesName(maxTierReached), 10 * S, 34 * S);
  // coins + free (right)
  ctx.textAlign = 'right';
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.fillStyle = '#ffd700';
  ctx.fillText('🪙 ' + coins, W - 10 * S, 18 * S);
  var fc = freeCells();
  var fcol = fc <= 2 ? '#ff5b5b' : fc <= 5 ? '#ffb347' : '#9ab';
  ctx.font = GF.clamp(11 * S, 9, 15) + 'px sans-serif';
  ctx.fillStyle = fcol;
  ctx.fillText(GF.t('free') + ': ' + fc, W - 10 * S, 34 * S);
  ctx.textBaseline = 'alphabetic';
}

function drawTray(ctx) {
  var S = GF.S;
  orderRects = [];
  if (!orders.length) {
    if (!firstMergeDone && gs === 'PLAYING') {
      ctx.fillStyle = '#cdb';
      ctx.font = GF.clamp(13 * S, 10, 18) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(GF.lang === 'ru' ? 'Слей двух зверят, чтобы открыть заказы' : 'Merge two critters to unlock orders',
        GF.cx, L.trayY + L.trayH / 2);
      ctx.textBaseline = 'alphabetic';
    }
    return;
  }
  var n = orders.length;
  var gap = 8 * S;
  var tileW = Math.min((GF.W - 20 * S - gap * (n - 1)) / n, L.trayH * 1.9);
  var totalW = tileW * n + gap * (n - 1);
  var startX = (GF.W - totalW) / 2;
  var ty = L.trayY + 4 * S, th = L.trayH - 8 * S;
  // label
  ctx.fillStyle = '#cdb'; ctx.font = GF.clamp(10 * S, 8, 13) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('order'), startX, L.trayY - 2 * S);
  for (var i = 0; i < n; i++) {
    var o = orders[i];
    var x = startX + i * (tileW + gap);
    o._cx = x + tileW / 2; o._cy = ty + th / 2;
    // tile bg
    GF.rr(ctx, x, ty, tileW, th, 10 * S);
    ctx.fillStyle = 'rgba(255,250,235,0.10)'; ctx.fill();
    ctx.lineWidth = 2 * S; ctx.strokeStyle = TIER_COL[o.tier] || '#fff'; ctx.stroke();
    // wanted species icon
    var iconS = th * 0.74;
    drawBeast(ctx, x + iconS * 0.62, ty + th / 2, o.tier, false, iconS, 0);
    // count needed
    ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(15 * S, 11, 22) + 'px sans-serif';
    ctx.fillText('×' + (o.need - o.have), x + iconS * 1.18, ty + th * 0.42);
    ctx.font = GF.clamp(9 * S, 8, 12) + 'px sans-serif';
    ctx.fillStyle = '#cdb';
    ctx.fillText(speciesName(o.tier), x + iconS * 1.18, ty + th * 0.74);
    orderRects.push({ x: x, y: ty, w: tileW, h: th, order: o });
  }
  ctx.textBaseline = 'alphabetic';
}

function drawBoard(ctx) {
  var S = GF.S;
  // stall panel behind board
  var pad = 8 * S;
  GF.rr(ctx, L.boardX - pad, L.boardY - pad, L.boardW + pad * 2, L.cell * rows + pad * 2, 14 * S);
  ctx.fillStyle = 'rgba(20,12,8,0.55)'; ctx.fill();
  // cells
  for (var idx = 0; idx < board.length; idx++) {
    var col = idx % boardCols, row = (idx / boardCols) | 0;
    var cx = L.boardX + col * L.cell, cy = L.boardY + row * L.cell;
    var inset = 3 * S;
    GF.rr(ctx, cx + inset, cy + inset, L.cell - inset * 2, L.cell - inset * 2, 9 * S);
    var isSel = (idx === sel);
    ctx.fillStyle = isSel ? 'rgba(255,215,0,0.18)' : 'rgba(255,250,235,0.05)';
    ctx.fill();
    if (isSel) { ctx.lineWidth = 3 * S; ctx.strokeStyle = '#ffd700'; ctx.stroke(); }
    var c = board[idx];
    if (c && !(drag && drag.moved && drag.idx === idx)) {
      var sz = L.cell * 0.82 * (1 + (c.pop || 0) * 0.18);
      drawBeast(ctx, c.sx, c.sy, c.tier, c.wild, sz, c.pop || 0);
    }
  }
  // drop-target highlight under a moving drag
  if (drag && drag.moved) {
    var di = cellAt(drag.x, drag.y);
    if (di >= 0) {
      var dc = di % boardCols, dr = (di / boardCols) | 0;
      GF.rr(ctx, L.boardX + dc * L.cell + 3 * S, L.boardY + dr * L.cell + 3 * S, L.cell - 6 * S, L.cell - 6 * S, 9 * S);
      ctx.lineWidth = 3 * S; ctx.strokeStyle = '#7ed957'; ctx.stroke();
    }
  }
}

function drawBeast(ctx, x, y, tier, wild, size, pop) {
  var name = wild ? 'wild' : ('beast' + GF.clamp(tier, 0, maxTier));
  GF.drawSprite(name, x, y, size, function (c, px, py, s) {
    // procedural fallback: rounded blob with eyes, palette by tier
    var col = wild ? '#ffd700' : (TIER_COL[GF.clamp(tier, 0, TIER_COL.length - 1)] || '#7ed957');
    c.save();
    // body
    c.fillStyle = col;
    c.beginPath();
    var r = s * 0.42;
    c.moveTo(px, py - r);
    c.bezierCurveTo(px + r, py - r, px + r, py + r, px, py + r);
    c.bezierCurveTo(px - r, py + r, px - r, py - r, px, py - r);
    c.fill();
    // belly highlight
    c.fillStyle = 'rgba(255,255,255,0.25)';
    c.beginPath(); c.ellipse(px - r * 0.25, py - r * 0.15, r * 0.45, r * 0.55, 0, 0, Math.PI * 2); c.fill();
    // eyes (googly)
    var eo = r * 0.32, er = r * 0.20 + Math.min(tier, 6) * s * 0.004;
    c.fillStyle = '#fff';
    c.beginPath(); c.arc(px - eo, py - r * 0.1, er, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(px + eo, py - r * 0.1, er, 0, Math.PI * 2); c.fill();
    c.fillStyle = '#1a1a1a';
    c.beginPath(); c.arc(px - eo + er * 0.2, py - r * 0.05, er * 0.5, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(px + eo + er * 0.2, py - r * 0.05, er * 0.5, 0, Math.PI * 2); c.fill();
    // smile
    c.strokeStyle = 'rgba(0,0,0,0.5)'; c.lineWidth = Math.max(1, s * 0.025);
    c.beginPath(); c.arc(px, py + r * 0.18, r * 0.3, 0.15 * Math.PI, 0.85 * Math.PI); c.stroke();
    // little tier pips for higher beasts (horns)
    if (tier >= 4 && !wild) {
      c.fillStyle = 'rgba(0,0,0,0.35)';
      c.beginPath(); c.moveTo(px - r * 0.5, py - r * 0.6); c.lineTo(px - r * 0.3, py - r); c.lineTo(px - r * 0.1, py - r * 0.65); c.fill();
      c.beginPath(); c.moveTo(px + r * 0.1, py - r * 0.65); c.lineTo(px + r * 0.3, py - r); c.lineTo(px + r * 0.5, py - r * 0.6); c.fill();
    }
    if (wild) {
      c.fillStyle = '#fff'; c.font = 'bold ' + (s * 0.4) + 'px sans-serif';
      c.textAlign = 'center'; c.textBaseline = 'middle'; c.fillText('★', px, py + r * 0.55);
    }
    c.restore();
  });
  // tier badge number
  if (!wild) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    var bs = size * 0.22;
    ctx.beginPath(); ctx.arc(x + size * 0.32, y - size * 0.32, bs * 0.7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (bs * 0.95) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('' + (tier + 1), x + size * 0.32, y - size * 0.32);
    ctx.textBaseline = 'alphabetic';
  }
}

function drawBottom(ctx) {
  var S = GF.S, W = GF.W;
  nestRects = []; shopBtns = [];
  var y = L.nestY, h = L.nestH;
  var pad = 10 * S;
  // NEST tile(s) on the left
  var nestW = GF.clamp((W * 0.42), 110, 220);
  var perW = nests > 1 ? (nestW - 6 * S) / nests : nestW;
  for (var k = 0; k < nests; k++) {
    var nx = pad + k * (perW + 6 * S), ny = y + pad, nh = h - pad * 2;
    GF.rr(ctx, nx, ny, perW, nh, 14 * S);
    var ready = nestCharges[k] >= 1;
    ctx.fillStyle = ready ? '#3d6b34' : '#2c3a28'; ctx.fill();
    ctx.lineWidth = 3 * S; ctx.strokeStyle = ready ? '#7ed957' : '#56603f'; ctx.stroke();
    // recharge fill bar
    if (!ready) {
      var frac = GF.clamp((charge[k] || 0) / genRechargeMs, 0, 1);
      GF.rr(ctx, nx, ny + nh * (1 - frac), perW, nh * frac, 14 * S);
      ctx.fillStyle = 'rgba(126,217,87,0.20)'; ctx.fill();
    }
    // nest icon
    drawNestIcon(ctx, nx + perW / 2, ny + nh * 0.42, Math.min(perW, nh) * 0.6);
    ctx.fillStyle = ready ? '#dfffd0' : '#9ab';
    ctx.font = 'bold ' + GF.clamp(11 * S, 9, 15) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(ready ? GF.t('tap_nest') : GF.t('nest'), nx + perW / 2, ny + nh - 5 * S);
    nestRects.push({ x: nx, y: ny, w: perW, h: nh, idx: k });
  }
  // SHOP buttons on the right (once unlocked)
  var shopX = pad + nestW + 12 * S;
  var shopW = W - shopX - pad;
  if (shopUnlocked) {
    var defs = [
      { kind: 'nest', label: GF.t('buyNest'), cost: genCost, ok: coins >= genCost && nests < 2, col: '#7ed957' },
      { kind: 'row',  label: GF.t('buyRow'),  cost: rowCost, ok: coins >= rowCost && rows < MAX_ROWS, col: '#6aa9e0' },
      { kind: 'rech', label: GF.t('buyRech'), cost: rechargeCost, ok: coins >= rechargeCost && genRechargeMs > 250, col: '#ffd166' },
    ];
    var bh = (h - pad * 2 - 12 * S) / 3;
    for (var i = 0; i < defs.length; i++) {
      var d = defs[i];
      var bx = shopX, by = y + pad + i * (bh + 6 * S);
      GF.rr(ctx, bx, by, shopW, bh, 10 * S);
      ctx.fillStyle = d.ok ? 'rgba(255,250,235,0.14)' : 'rgba(255,250,235,0.05)'; ctx.fill();
      ctx.lineWidth = 2 * S; ctx.strokeStyle = d.ok ? d.col : 'rgba(150,150,150,0.4)'; ctx.stroke();
      ctx.fillStyle = d.ok ? '#fff' : '#888'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px sans-serif';
      ctx.fillText(d.label, bx + 10 * S, by + bh / 2);
      ctx.textAlign = 'right'; ctx.fillStyle = d.ok ? '#ffd700' : '#888';
      ctx.font = GF.clamp(11 * S, 9, 15) + 'px sans-serif';
      ctx.fillText('🪙' + d.cost, bx + shopW - 10 * S, by + bh / 2);
      shopBtns.push({ kind: d.kind, x: bx, y: by, w: shopW, h: bh });
    }
  } else {
    ctx.fillStyle = '#8a7'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = GF.clamp(11 * S, 9, 14) + 'px sans-serif';
    var msg = GF.lang === 'ru' ? ('Лавка с ' + SHOP_FAMILY_COIN + ' 🪙') : ('Shop at ' + SHOP_FAMILY_COIN + ' 🪙');
    ctx.fillText(msg, shopX + shopW / 2, y + h / 2);
  }
  ctx.textBaseline = 'alphabetic';
}

function drawNestIcon(ctx, x, y, s) {
  ctx.save();
  // nest = a little woven bowl with eggs
  ctx.fillStyle = '#8a5a2b';
  ctx.beginPath(); ctx.ellipse(x, y + s * 0.18, s * 0.5, s * 0.28, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#6b421f';
  ctx.beginPath(); ctx.ellipse(x, y + s * 0.05, s * 0.42, s * 0.22, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff6e0';
  ctx.beginPath(); ctx.ellipse(x - s * 0.14, y, s * 0.13, s * 0.16, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + s * 0.12, y - s * 0.02, s * 0.12, s * 0.15, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawDrag(ctx) {
  if (!drag || !drag.moved || gs !== 'PLAYING') return;
  var c = board[drag.idx];
  if (!c) return;
  var sz = L.cell * 0.9;
  drawBeast(ctx, drag.x, drag.y - L.cell * 0.2, c.tier, c.wild, sz, 0.2);
}

function drawHelpBtn(ctx) {
  var S = GF.S;
  GF.rr(ctx, helpBtn.x, helpBtn.y, helpBtn.w, helpBtn.h, helpBtn.w / 2);
  ctx.fillStyle = 'rgba(255,250,235,0.15)'; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(18 * S, 14, 26) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', helpBtn.x + helpBtn.w / 2, helpBtn.y + helpBtn.h / 2 + S);
  ctx.textBaseline = 'alphabetic';
}

function drawNewBeast(ctx) {
  var S = GF.S, a = Math.min(1, newBeastFlash / 1.4);
  ctx.save();
  ctx.globalAlpha = a * 0.85;
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0, 0, GF.W, GF.H);
  ctx.globalAlpha = a;
  var sz = GF.clamp(120 * S, 80, 200);
  drawBeast(ctx, GF.cx, GF.cy - sz * 0.2, maxTierReached, false, sz, 1 - a);
  ctx.fillStyle = '#ffd700'; ctx.font = 'bold ' + GF.clamp(24 * S, 16, 36) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(GF.t('newbeast'), GF.cx, GF.cy + sz * 0.6);
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(18 * S, 13, 28) + 'px sans-serif';
  ctx.fillText(speciesName(maxTierReached), GF.cx, GF.cy + sz * 0.6 + 30 * S);
  ctx.restore();
}

// ── OVERLAYS (tutorial block on MENU) ────────────────────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}
function drawTutorialBlock(ctx, topY, maxW) {
  var S = GF.S;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var fs = GF.clamp(13 * S, 10, 17);
  var lineH = fs * 1.32;
  ctx.font = fs + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  var y = topY;
  for (var k = 0; k < keys.length; k++) {
    var lines = wrapLines(ctx, GF.t(keys[k]), maxW);
    ctx.fillStyle = (k === 4) ? '#ffd166' : '#dfe6ee';
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], GF.cx - maxW / 2, y); y += lineH; }
    y += lineH * 0.28;
  }
  ctx.textBaseline = 'alphabetic';
  return y - topY;
}

function drawMenu(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  ctx.fillStyle = 'rgba(20,12,8,0.92)'; ctx.fillRect(0, 0, W, H);
  // title
  var titleFs = GF.clamp(34 * S, 22, 50);
  ctx.shadowColor = 'rgba(255,209,102,0.5)'; ctx.shadowBlur = 26 * S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  var titleY = GF.clamp(H * 0.13, 50 * S, H * 0.2);
  ctx.fillText(GF.t('title'), GF.cx, titleY);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  // sub
  ctx.font = GF.clamp(13 * S, 10, 18) + 'px sans-serif';
  ctx.fillStyle = '#ffd166';
  ctx.fillText(GF.t('sub'), GF.cx, titleY + 26 * S);
  // little merge illustration
  var iz = GF.clamp(40 * S, 28, 58);
  var iy = titleY + 64 * S;
  drawBeast(ctx, GF.cx - iz * 1.1, iy, 0, false, iz, 0);
  drawBeast(ctx, GF.cx, iy, 0, false, iz, 0);
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + iz * 0.5 + 'px sans-serif'; ctx.textAlign = 'center';
  ctx.textBaseline = 'middle'; ctx.fillText('→', GF.cx + iz * 0.75, iy);
  drawBeast(ctx, GF.cx + iz * 1.7, iy, 1, false, iz * 1.25, 0);
  ctx.textBaseline = 'alphabetic';
  // tutorial block
  var maxW = Math.min(W - 36 * S, 460 * S);
  var blockY = iy + iz * 1.0;
  var blockH = drawTutorialBlock(ctx, blockY, maxW);
  // PLAY button below the block
  var btnW = GF.clamp(220 * S, 150, 300), btnH = GF.clamp(52 * S, 42, 64);
  var btnY = Math.min(blockY + blockH + 14 * S, H - btnH - 16 * S);
  drawPlayButton(ctx, btnW, btnH, btnY, GF.t('play'));
  // best
  if (best > 0) {
    ctx.fillStyle = '#8a7'; ctx.font = GF.clamp(12 * S, 10, 16) + 'px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, btnY + btnH + 22 * S);
  }
}

function drawGameOver(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  ctx.fillStyle = 'rgba(20,12,8,0.92)'; ctx.fillRect(0, 0, W, H);
  var titleFs = GF.clamp(36 * S, 24, 54);
  ctx.shadowColor = 'rgba(255,91,91,0.45)'; ctx.shadowBlur = 26 * S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText(GF.t('gameover'), GF.cx, H * 0.3);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  // best beast evolved
  var sz = GF.clamp(64 * S, 44, 96);
  drawBeast(ctx, GF.cx, H * 0.3 + 50 * S + sz * 0.4, maxTierReached, false, sz, 0);
  ctx.fillStyle = '#ffd166'; ctx.font = 'bold ' + GF.clamp(16 * S, 12, 22) + 'px sans-serif';
  ctx.fillText(speciesName(maxTierReached), GF.cx, H * 0.3 + 50 * S + sz + 20 * S);
  // score
  ctx.fillStyle = '#fff'; ctx.font = GF.clamp(18 * S, 13, 26) + 'px sans-serif';
  ctx.fillText(GF.t('score') + ': ' + score, GF.cx, H * 0.3 + 50 * S + sz + 50 * S);
  ctx.fillStyle = '#8a7'; ctx.font = GF.clamp(13 * S, 10, 18) + 'px sans-serif';
  ctx.fillText(GF.t('best') + ': ' + best, GF.cx, H * 0.3 + 50 * S + sz + 74 * S);
  // PLAY AGAIN
  var btnW = GF.clamp(220 * S, 150, 300), btnH = GF.clamp(52 * S, 42, 64);
  var btnY = Math.min(H * 0.3 + 50 * S + sz + 100 * S, H - btnH - 20 * S);
  drawPlayButton(ctx, btnW, btnH, btnY, GF.t('retry'));
}

// Local play button (we manage our own click via onDown so tap + touch both work)
var playBtnRect = null;
function drawPlayButton(ctx, w, h, y, label) {
  var x = GF.cx - w / 2;
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, '#ffd166'); grad.addColorStop(1, '#f4a23a');
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = '#2a1a12'; ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, GF.cx, y + h / 2);
  ctx.textBaseline = 'alphabetic';
  playBtnRect = { x: x, y: y, w: w, h: h };
}

// ── UNIFIED POINTER (mouse + touch) so tap-tap AND drag both work ─────────
function evtXY(e) {
  if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}
function overlayDown(x, y) {
  // handle PLAY / PLAY AGAIN button on overlays
  if ((gs === 'MENU' || gs === 'GAMEOVER') && playBtnRect) {
    if (x >= playBtnRect.x && x <= playBtnRect.x + playBtnRect.w && y >= playBtnRect.y && y <= playBtnRect.y + playBtnRect.h) {
      startGame(); return true;
    }
  }
  return false;
}
var cv = document.getElementById('c');
cv.addEventListener('mousedown', function (e) { var p = evtXY(e); if (!overlayDown(p.x, p.y)) onDown(p.x, p.y); });
cv.addEventListener('mousemove', function (e) { var p = evtXY(e); onMove(p.x, p.y); });
window.addEventListener('mouseup', function (e) { var p = evtXY(e); onUp(p.x, p.y); });
cv.addEventListener('touchstart', function (e) { e.preventDefault(); var p = evtXY(e); if (!overlayDown(p.x, p.y)) onDown(p.x, p.y); }, { passive: false });
cv.addEventListener('touchmove', function (e) { e.preventDefault(); var p = evtXY(e); onMove(p.x, p.y); }, { passive: false });
cv.addEventListener('touchend', function (e) { e.preventDefault(); var p = evtXY(e); onUp(p.x, p.y); }, { passive: false });
// desktop nicety: Space spawns from nest
document.addEventListener('keydown', function (e) {
  if (gs === 'PLAYING' && (e.code === 'Space')) { e.preventDefault(); if (!GF.tutorial.active) { spawnFromNest(); checkGameOver(); } }
});

// ── SCREENSHOT HATCH ───────────────────────────────────────────────────────
// Lands on a populated mid-game board: several critters, an active order,
// coins > 0 (Yandex 5.1.1 — ≥70% gameplay, never a menu/overlay frame).
window._setupForScreenshot = function (level) {
  startGame();
  GF.tutorial.active = false;
  try { localStorage.setItem('beast_bazaar_seen_tutorial', '1'); } catch (e) {}
  firstMergeDone = true; firstDeliveryDone = true; shopUnlocked = true;
  coins = 120; score = 240; deliveries = 6; merges = 18;
  maxTierReached = 5; for (var t = 0; t <= 5; t++) revealedTier[t] = true;
  // populate ~70% of the board with a spread of tiers
  board = []; for (var i = 0; i < cellCount(); i++) board.push(null);
  var fill = [0,0,1,2,1,3,0,2,4,1,0,3,2,0,1,5,0,2,1,4,0];
  for (var f = 0; f < fill.length && f < board.length; f++) {
    var p = cellCenter(f); board[f] = { tier: fill[f], wild: false, sx: p.x, sy: p.y, pop: 0 };
  }
  // one wildcard for late-game flavour
  if (board[7]) board[7] = (function(){ var p=cellCenter(7); return { tier:0, wild:true, sx:p.x, sy:p.y, pop:0 }; })();
  wildcardSeen = true; bestCombo = 3; combo = 2; comboTimer = comboWindowMs;
  // active orders
  orders = [ { tier: 1, need: 2, have: 0, id: orderSeq++ },
             { tier: 3, need: 1, have: 0, id: orderSeq++ },
             { tier: 4, need: 1, have: 0, id: orderSeq++ } ];
  nestCharges = [1]; charge = [0];
  // variant 2 = a deeper board (higher tiers, a 2nd nest, an extra row) for a
  // visually distinct second screenshot
  if (level === 2) {
    if (rows < 7) { rows = 7; for (var rr2 = 0; rr2 < boardCols; rr2++) board.push(null); }
    nests = 2; nestCharges = [1, 0]; charge = [0, 300];
    coins = 220; score = 480; deliveries = 11; merges = 34;
    maxTierReached = 7; for (var t2 = 0; t2 <= 7; t2++) revealedTier[t2] = true;
    // leave the last row mostly empty so the board is busy but NOT gridlocked
    var fill2 = [2,3,1,4,2, 5,1,6,2,3, 0,2,4,1,7, 3,1,2,5,0, 1,4,2,3,1, 0,2,1,-1,-1, -1,-1,-1,-1,-1];
    for (var f2 = 0; f2 < board.length; f2++) {
      var p2c = cellCenter(f2);
      var fv = (f2 < fill2.length) ? fill2[f2] : -1;
      board[f2] = (fv >= 0) ? { tier: fv, wild: false, sx: p2c.x, sy: p2c.y, pop: 0 } : null;
    }
    if (board[12]) board[12] = (function () { var p = cellCenter(12); return { tier: 0, wild: true, sx: p.x, sy: p.y, pop: 0 }; })();
    combo = 3; bestCombo = 4; comboTimer = comboWindowMs;
    orders = [ { tier: 2, need: 2, have: 1, id: orderSeq++ },
               { tier: 5, need: 1, have: 0, id: orderSeq++ },
               { tier: 6, need: 1, have: 0, id: orderSeq++ } ];
  }
  gs = 'PLAYING';
};
// Test seam (same category as _setupForScreenshot/_jumpLevel): returns live
// layout + board geometry so an automated harness can compute exact tap/drop
// pixel coords. No console output; does not mutate state.
window._bbInfo = function () {
  return {
    gs: gs, cell: L.cell, boardX: L.boardX, boardY: L.boardY, boardW: L.boardW, rows: rows, cols: boardCols,
    nestRects: nestRects.map(function (r) { return { x: r.x, y: r.y, w: r.w, h: r.h }; }),
    orderRects: orderRects.map(function (r) { return { x: r.x, y: r.y, w: r.w, h: r.h, tier: r.order.tier }; }),
    board: board.map(function (c) { return c ? { tier: c.tier, wild: !!c.wild } : null; }),
    centers: board.map(function (c, i) { var p = cellCenter(i); return { x: p.x, y: p.y }; }),
  };
};
// take_screenshots.js calls _jumpLevel; webapp_gate calls _jumpLevel(1)/(99)
window._jumpLevel = function (n) {
  if (n >= 99) { startGame(); gs = 'GAMEOVER'; return; }
  window._setupForScreenshot(n || 1);
};

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 480,
  designH: 800,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'beast_bazaar',
  onReady: function () {
    try { best = parseInt(localStorage.getItem('beast_bazaar_best') || '0') || 0; } catch (e) {}
    // Yandex 1.9 — persist run across reload
    GF.persist('beast_bazaar_run_v1',
      function () {
        if (gs !== 'PLAYING') return { gs: gs };
        return {
          gs: gs, score: score, coins: coins, merges: merges, deliveries: deliveries,
          maxTierReached: maxTierReached, shopUnlocked: shopUnlocked, wildcardSeen: wildcardSeen,
          bestCombo: bestCombo, rows: rows, nests: nests, genRechargeMs: genRechargeMs,
          board: board.map(function (c) { return c ? { t: c.tier, w: c.wild ? 1 : 0 } : 0; }),
          orders: orders.map(function (o) { return { t: o.tier, n: o.need, h: o.have, id: o.id }; }),
          nestCharges: nestCharges, firstMergeDone: firstMergeDone, firstDeliveryDone: firstDeliveryDone,
          revealedTier: revealedTier, orderSeq: orderSeq,
        };
      },
      function (s) {
        if (!s) return;
        if (s.gs !== 'PLAYING') { gs = 'MENU'; return; }
        score = s.score || 0; coins = s.coins || 0; merges = s.merges || 0; deliveries = s.deliveries || 0;
        maxTierReached = s.maxTierReached || 0; shopUnlocked = !!s.shopUnlocked; wildcardSeen = !!s.wildcardSeen;
        bestCombo = s.bestCombo || 0; rows = s.rows || boardRows; nests = s.nests || 1;
        genRechargeMs = s.genRechargeMs || 650;
        firstMergeDone = !!s.firstMergeDone; firstDeliveryDone = !!s.firstDeliveryDone;
        revealedTier = s.revealedTier || {}; orderSeq = s.orderSeq || 1;
        board = (s.board || []).map(function (c) { return c ? { tier: c.t, wild: !!c.w, sx: 0, sy: 0, pop: 0 } : null; });
        while (board.length < boardCols * rows) board.push(null);
        // recompute sprite positions on first layout (sx/sy filled lazily in draw via cellCenter)
        for (var i = 0; i < board.length; i++) { if (board[i]) { var p = cellCenter(i); board[i].sx = p.x; board[i].sy = p.y; } }
        orders = (s.orders || []).map(function (o) { return { tier: o.t, need: o.n, have: o.h, id: o.id }; });
        nestCharges = s.nestCharges || [genCharge]; charge = []; for (var k = 0; k < nests; k++) charge[k] = 0;
        gs = 'PLAYING';
      }
    );
    if (gs === 'PLAYING') { /* resumed run */ }
    else gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// ── EXPOSE STATE (post-build-tester cross-checks vs DESIGN.md) ────────────
GF.exposeState(function () {
  return {
    gs: gs, score: score, best: best, coins: coins,
    maxTier: maxTier, maxTierReached: maxTierReached,
    merges: merges, deliveries: deliveries, combo: combo, bestCombo: bestCombo,
    freeCells: freeCells(), shopUnlocked: shopUnlocked, wildcardSeen: wildcardSeen,
    // tunables (DESIGN.md §Tunables)
    boardCols: boardCols, boardRows: boardRows, genCharge: genCharge, genRechargeMs: genRechargeMs,
    baseOrderTier: baseOrderTier, orderTierRampEvery: orderTierRampEvery, coinPerDelivery: coinPerDelivery,
    genCost: genCost, rowCost: rowCost, comboWindowMs: comboWindowMs, wildcardChance: wildcardChance,
    rows: rows, nests: nests, orders: orders.length,
  };
});

})();
</script>
