var CHARM_MAX_LVL = 5;

for (var _ci = 0; _ci < CHARM_DEFS.length; _ci++) CHARM_BY_ID[CHARM_DEFS[_ci].id] = CHARM_DEFS[_ci];
// human-readable bonus for a charm at a given level (value = per × level)
function charmBonusText(def, lvl) {
  var v = def.per * lvl;
  if (def.stat === 'sell' || def.stat === 'wild' || def.stat === 'idle') v = Math.round(v * 100) + '%';
  else v = '' + v;
  var ru = (GF.lang === 'ru');
  switch (def.stat) {
    case 'sell':  return '+' + v + (ru ? ' к продаже' : ' sell value');

function charmName(def) { return (GF.lang === 'ru' ? def.ru : def.en) || def.en; }
// summed bonus across EQUIPPED charms whose stat matches (per × level)
function charmVal(stat) {
  if (!meta) return 0;
  var v = 0;
  for (var i = 0; i < meta.equipped.length; i++) {
    var id = meta.equipped[i]; if (!id) continue;
    var def = CHARM_BY_ID[id], c = meta.charms[id];
    if (def && c && def.stat === stat) v += def.per * c.lvl;
  }
  return v;
}
// live cumulative playtime (persisted + the in-progress run) in seconds / minutes
function totalPlaySec() { return (meta ? meta.totalPlaySec : 0) + runPlaySec; }
function totalPlayMin() { return totalPlaySec() / 60; }
// the next not-yet-owned charm on the ladder (the visible goal), or null if all owned
function nextCharm() {
  if (!meta) return null;
  for (var i = 0; i < CHARM_DEFS.length; i++) {
    if (!meta.charms[CHARM_DEFS[i].id]) return CHARM_DEFS[i];
  }
  return null;
}
// grant any charm whose playtime milestone has been crossed; returns newly-granted defs
function checkCharmUnlocks() {
  if (!meta) return [];
  var mins = totalPlayMin(), granted = [];
  for (var i = 0; i < CHARM_DEFS.length; i++) {
    var d = CHARM_DEFS[i];
    if (mins >= d.min && !meta.charms[d.id]) {
      meta.charms[d.id] = { lvl: 1 };
      // auto-equip into a free slot so the first charms are felt immediately
      for (var s = 0; s < meta.equipped.length; s++) { if (!meta.equipped[s]) { meta.equipped[s] = d.id; break; } }
      granted.push(d);
    }
  }
  if (granted.length) saveMeta();
  return granted;
}
// gold cost to upgrade a charm to its next level (Infinity if maxed / unowned)
function charmUpCost(id) {
  var c = meta && meta.charms[id]; if (!c) return Infinity;
  if (c.lvl >= CHARM_MAX_LVL) return Infinity;
  var def = CHARM_BY_ID[id];
  return Math.round((40 + def.min * 0.6) * Math.pow(1.6, c.lvl - 1));
}
function buyCharmUpgrade(id) {
  var cost = charmUpCost(id);

  meta.bank -= cost; meta.charms[id].lvl += 1; saveMeta();
  return true;
}
// equip toggle: equipped → unequip; else drop into first free slot (no-op if full)
function toggleEquip(id) {
  if (!meta || !meta.charms[id]) return false;
  var at = meta.equipped.indexOf(id);
  if (at >= 0) { meta.equipped[at] = null; saveMeta(); return true; }
  for (var s = 0; s < meta.equipped.length; s++) { if (!meta.equipped[s]) { meta.equipped[s] = id; saveMeta(); return true; } }
  return false; // slots full — player unequips one first
}

  if (!meta || !meta.equipped[slot]) return false;

}

var QUEST_DEFS = [

var QUEST_BY_KIND = {};
for (var _qi = 0; _qi < QUEST_DEFS.length; _qi++) QUEST_BY_KIND[QUEST_DEFS[_qi].kind] = QUEST_DEFS[_qi];
function questLabel(q) {

// roll 3 fresh quests if the stored set is from a previous day (or missing)
function maybeRollQuests() {
  if (!meta) return;
  var today = utcDayStr(0);
  if (meta.questDay === today && Array.isArray(meta.quests) && meta.quests.length) return;
  meta.questDay = today;
  var pool = QUEST_DEFS.slice(), picked = [];
  for (var n = 0; n < 3 && pool.length; n++) {
    var idx = Math.floor(Math.random() * pool.length);
    var d = pool.splice(idx, 1)[0];
    var tier = Math.floor(Math.random() * d.goals.length);
    picked.push({ kind: d.kind, goal: d.goals[tier], prog: 0, done: false, claimed: false, reward: d.reward[tier] });
  }
  meta.quests = picked;
  saveMeta();
}
// advance any active quest of this kind ('tier' tracks a max, others accumulate)
function questProgress(kind, amount) {
  if (!meta || !Array.isArray(meta.quests)) return;
  var changed = false;
  for (var i = 0; i < meta.quests.length; i++) {
    var q = meta.quests[i];
    if (q.kind !== kind || q.done) continue;
    if (kind === 'tier') q.prog = Math.max(q.prog, amount); else q.prog += amount;
    if (q.prog >= q.goal) { q.prog = q.goal; q.done = true; questToast = { q: q, t: 3.4 }; if (GF.happytime) GF.happytime(); }
    changed = true;
  }
  if (changed) saveMeta();
}
function claimQuest(i) {
  var q = meta && meta.quests && meta.quests[i];
  if (!q || !q.done || q.claimed) return false;
  q.claimed = true; meta.bank += q.reward; saveMeta(); return true;
}
function claimableQuests() {
  if (!meta || !Array.isArray(meta.quests)) return 0;
  var n = 0; for (var i = 0; i < meta.quests.length; i++) if (meta.quests[i].done && !meta.quests[i].claimed) n++;
  return n;
}
// hours until the daily quest reset (UTC midnight) — shown in the Quests tab
function hoursToReset() {
  var d = new Date(); return 24 - (d.getUTCHours() + d.getUTCMinutes() / 60);
}

  return {
    bank: 0,                 // banked gold (permanent currency)

    codex: {},               // tier -> 1 once EVER discovered (owned collection)
    bazaarLevel: 1,          // grows with deliveries across runs; drives idle income
    totalDeliveries: 0,      // lifetime deliveries (feeds bazaarLevel)
    runs: 0,

function loadMeta() {

  try {
    var raw = localStorage.getItem(META_KEY);

        if (s.up) { m.up.slots = +s.up.slots || 0; m.up.sell = +s.up.sell || 0; m.up.luck = +s.up.luck || 0; }

// ── HELPERS ──────────────────────────────────────────────────────────────
function cellCount() { return boardCols * rows; }
function freeCells() {

  return n;
}
function firstFree() {
  for (var i = 0; i < board.length; i++) if (!board[i]) return i;
  return -1;
}
function randFree() {
  var fr = [];

  if (!fr.length) return -1;
  return fr[(Math.random() * fr.length) | 0];
}
// Two same-tier critters anywhere mergeable, or a wildcard present with any

function hasMergePair() {

    var c = board[i];
    if (!c) continue;
    any = true;
    if (c.wild) { wild = true; continue; }
    if (seen[c.tier]) return true;
    seen[c.tier] = true;
  }
  if (wild && any) {
    // wildcard + at least one non-wild critter = mergeable
    for (var j = 0; j < board.length; j++) if (board[j] && !board[j].wild) return true;
  }
  return false;
}
// Could any current order be fulfilled from critters already on the board?
function hasDeliverableOrder() {
  for (var o = 0; o < orders.length; o++) {
    var need = orders[o].tier, cnt = 0;
    for (var i = 0; i < board.length; i++) {
      var c = board[i];
      if (c && (c.wild || c.tier === need)) cnt++;
    }
    if (cnt >= (orders[o].need - orders[o].have)) return true;
  }
  return false;
}
function canMakeProgress() {
  // GRIDLOCK (lose) = the board is FULL (freeCells()===0). This is deliberate,
  // not a simplification: merges here are FREE-MOVE (drag any critter onto any
  // same-tier cell, not just a neighbour), and the board has 30 cells but only
  // 11 tiers — so by pigeonhole a *full* board ALWAYS contains a same-tier pair.
  // A "full && no-merge-possible" rule would therefore be UNREACHABLE (the game
  // could never end), so board-full itself is the terminal pressure: you must
  // merge/deliver to keep space open BEFORE the last cell fills. hasMergePair()

  return freeCells() > 0;

// ── ORDERS ───────────────────────────────────────────────────────────────
function orderTierCeiling() {

}

  // bias toward tiers the player can plausibly reach (<= maxTierReached+1)
  var hi = GF.clamp(Math.min(ceil, maxTierReached + 1), baseOrderTier, maxTier - 1);
  var lo = GF.clamp(hi - 2, baseOrderTier, hi);
  var tier = lo + ((Math.random() * (hi - lo + 1)) | 0);
  tier = GF.clamp(tier, baseOrderTier, maxTier - 1);
  // need 1-3 of that species; higher tiers usually need fewer

// ── NEST / SPAWN ───────────────────────────────────────────────────────────
function spawnFromNest() {

  if (ni < 0) return false;
  var idx = randFree();
  if (idx < 0) return false;                 // board full — can't spawn
  nestCharges[ni] -= 1;
  var wild = Math.random() < permWildChance() && firstMergeDone;

// ── MERGE / MOVE / DELIVER ───────────────────────────────────────────────
function tryActOn(srcIdx, dstKind, dstRef) {
  // dstKind: 'cell' (dstRef=idx) | 'order' (dstRef=order)

  var src = board[srcIdx];

  if (dstKind === 'order') {
    return deliverTo(srcIdx, dstRef);
  }
  // cell
  var dst = dstRef;
  if (dst === srcIdx) return false;
  var tgt = board[dst];
  if (!tgt) {
    // move into empty cell
    var p = cellCenter(dst);

    board[srcIdx] = null;

    return true;
  }
  // occupied — merge if same tier or wildcard involved
  var canMerge = (src.wild || tgt.wild || src.tier === tgt.tier);
  if (!canMerge) {
    // swap so the player can re-plan (forgiving, no penalty)
    var ps = cellCenter(srcIdx), pd = cellCenter(dst);
    board[srcIdx] = tgt; board[srcIdx].sx = ps.x; board[srcIdx].sy = ps.y;
    board[dst] = src; board[dst].sx = pd.x; board[dst].sy = pd.y;
    GF.saveRun();
    return true;
  }
  // MERGE → tier+1 at dst
  var baseTier = src.wild ? tgt.tier : (tgt.wild ? src.tier : src.tier);
  var resultTier = GF.clamp(baseTier + 1, 0, maxTier);

  if (baseTier >= maxTier) { return false; }
  board[srcIdx] = null;
  var p2 = cellCenter(dst);
  board[dst] = { tier: resultTier, wild: false, sx: p2.x, sy: p2.y, pop: 1 };
  recordCodex(resultTier);

  questProgress('tier', resultTier);

  var mg = permMergeGold();
  if (mg > 0) { coins += mg; score += mg; GF.spawnFloat(p2.x, p2.y - L.cell * 0.55, '+' + mg, '#ffd700'); }

// ── SHOP ─────────────────────────────────────────────────────────────────

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {

  revealedTier = {}; revealQueue = []; newBeastFlash = 0;
  rows = boardRows; nests = 1;
  genRechargeMs = 650;

function gameOver() {

// ── COORD MAPPING ─────────────────────────────────────────────────────────
function cellCenter(idx) {

}

    var r = orderRects[i];
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return r.order;
  }

}

    var r = nestRects[i];
    if (x >= r.x - r.w * 0.15 && x <= r.x + r.w * 1.15 && y >= r.y - r.h * 0.15 && y <= r.y + r.h * 1.15) return true;
  }

  }

// ── INPUT ────────────────────────────────────────────────────────────────
function onDown(x, y) {
  if (gs !== 'PLAYING') return;
  // Vault overlay open: handle tabs + buys + equip + RESUME, swallow everything else
  if (paused) {
    var hit = function (r) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; };
    if (resumeBtn.w && hit(resumeBtn)) { paused = false; return; }
    for (var ti = 0; ti < vaultTabRects.length; ti++) { if (hit(vaultTabRects[ti])) { vaultTab = vaultTabRects[ti].tab; return; } }
    if (vaultTab === 'charms') {
      for (var ci = 0; ci < charmUpRects.length; ci++) { if (hit(charmUpRects[ci])) { if (charmUpRects[ci].afford && buyCharmUpgrade(charmUpRects[ci].id) && GF.happytime) GF.happytime(); return; } }
      for (var cj = 0; cj < charmTileRects.length; cj++) { if (hit(charmTileRects[cj])) { toggleEquip(charmTileRects[cj].id); return; } }
      for (var ck = 0; ck < equipSlotRects.length; ck++) { if (hit(equipSlotRects[ck])) { unequipSlot(equipSlotRects[ck].slot); return; } }
      return;
    }
    if (vaultTab === 'quests') {
      for (var qi = 0; qi < questClaimRects.length; qi++) { if (hit(questClaimRects[qi])) { if (questClaimRects[qi].can && claimQuest(questClaimRects[qi].i) && GF.happytime) GF.happytime(); return; } }
      return;
    }
    for (var mi = 0; mi < metaUpRects.length; mi++) {
      var rr = metaUpRects[mi];
      if (hit(rr)) { if (rr.afford && buyMetaUpgrade(rr.key) && GF.happytime) GF.happytime(); return; }
    }
    return;
  }
  // Vault button → open the meta (pause the run)
  if (vaultBtn.w && x >= vaultBtn.x && x <= vaultBtn.x + vaultBtn.w && y >= vaultBtn.y && y <= vaultBtn.y + vaultBtn.h) { paused = true; return; }
  // tutorial swallows taps first
  if (GF.tutorial.active) {
    // still spawn from nest during step 1 so the lesson is hands-on
    if (GF.tutorial.step === 0 && nestHit(x, y)) { spawnFromNest(); GF.tutorial.next(); return; }
    GF.tutorial.handleClick(x, y); return;
  }
  // help button
  if (x >= helpBtn.x && x <= helpBtn.x + helpBtn.w && y >= helpBtn.y && y <= helpBtn.y + helpBtn.h) {
    GF.tutorial.reopen(); return;
  }
  // shop
  var sb = shopHit(x, y);
  if (sb) { if (sb.kind === 'nest') buyNest(); else if (sb.kind === 'row') buyRow(); else if (sb.kind === 'rech') buyRecharge(); checkGameOver(); return; }
  // nest tap → spawn
  if (nestHit(x, y)) { spawnFromNest(); checkGameOver(); sel = -1; return; }
  // order tap (with a selected critter → deliver)
  var ord = orderAt(x, y);
  if (ord) {
    if (sel >= 0 && board[sel]) { tryActOn(sel, 'order', ord); sel = -1; checkGameOver(); }
    return;
  }
  // board cell
  var idx = cellAt(x, y);
  if (idx < 0) { sel = -1; return; }
  if (sel >= 0) {
    // tap-tap destination
    if (idx === sel) { sel = -1; return; }
    tryActOn(sel, 'cell', idx);
    sel = -1; checkGameOver();
    return;
  }
  // begin a press — may become a drag or a tap-select
  if (board[idx]) {
    pressStart = { x: x, y: y, idx: idx, t: Date.now() };
    drag = { idx: idx, x: x, y: y, moved: false };
  } else {
    sel = -1;
  }
}
function onMove(x, y) {
  if (gs !== 'PLAYING' || !drag) return;
  drag.x = x; drag.y = y;
  if (!drag.moved && Math.abs(x - pressStart.x) + Math.abs(y - pressStart.y) > 10 * GF.S) drag.moved = true;
}
function onUp(x, y) {
  if (gs !== 'PLAYING') { drag = null; pressStart = null; return; }
  if (!drag) return;
  if (drag.moved) {
    // DRAG release → act on whatever is under the pointer
    var ord = orderAt(x, y);
    if (ord) { tryActOn(drag.idx, 'order', ord); }
    else {
      var idx = cellAt(x, y);
      if (idx >= 0) tryActOn(drag.idx, 'cell', idx);
    }
    sel = -1; checkGameOver();
  } else {
    // it was a TAP, not a drag → select source for tap-tap
    sel = drag.idx;
  }
  drag = null; pressStart = null;
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (charmToast) { charmToast.t -= dt; if (charmToast.t <= 0) charmToast = null; }
  if (questToast) { questToast.t -= dt; if (questToast.t <= 0) questToast = null; }
  if (bootBannerT > 0) bootBannerT = Math.max(0, bootBannerT - dt);
  if (paused) return;   // Vault overlay open — freeze the run (no losing required to reach the meta)
  if (newBeastFlash > 0) newBeastFlash = Math.max(0, newBeastFlash - dt);
  if (gs !== 'PLAYING') { GF.tutorial.update(dt); return; }
  GF.tutorial.update(dt);

  // accrue playtime → unlock Charms on the cumulative-time ladder (the multi-day pull)
  runPlaySec += dt;
  var fresh = checkCharmUnlocks();
  if (fresh.length) { charmToast = { def: fresh[fresh.length - 1], t: 3.4 }; GF.happytime && GF.happytime(); }

  // pop animations
  for (var i = 0; i < board.length; i++) {
    var c = board[i];
    if (c && c.pop > 0) c.pop = Math.max(0, c.pop - dt * 3.5);
  }
  // combo decay
  if (comboTimer > 0) { comboTimer -= dt * 1000; if (comboTimer <= 0) { combo = 0; } }

  // nest recharge
  for (var k = 0; k < nests; k++) {
    if (nestCharges[k] < genCharge) {
      charge[k] = (charge[k] || 0) + dt * 1000;
      if (charge[k] >= genRechargeMs) { charge[k] = 0; nestCharges[k] = Math.min(genCharge, (nestCharges[k] || 0) + 1); }
    }
  }
  // keep orders topped up
  refillOrders();
  // continuous gridlock check
  checkGameOver();
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var pad = GF.clamp(10 * S, 6, 16);
  // Centered portrait PLAY COLUMN. On phones colW ≈ full width; on desktop it caps to
  // a phone-like column so the board / nest / HUD don't fling to the screen edges
  // (fixes the broken desktop layout: stranded bottom-left nest + spread-out shop).
  var colW = Math.min(W - pad * 2, Math.round(H * 0.62));
  var colX = Math.round((W - colW) / 2);
  L.colX = colX; L.colW = colW;
  // top strip holds two clean rows (score / coins on the left, vault+help / free on the right)
  var topH = GF.clamp(58 * S, 48, 74);
  var trayH = GF.clamp(64 * S, 52, 88);
  var bottomH = GF.clamp(108 * S, 88, 150);
  L.trayY = topH;
  L.trayH = trayH;
  var availTop = topH + trayH + pad;
  var availBot = H - bottomH - pad;
  var availH = availBot - availTop;
  var maxBoardW = colW - pad * 2;
  var cellByW = maxBoardW / boardCols;
  var cellByH = availH / rows;
  L.cell = Math.floor(Math.min(cellByW, cellByH));
  L.boardW = L.cell * boardCols;
  L.boardX = colX + Math.round((colW - L.boardW) / 2);
  var boardH = L.cell * rows;
  L.boardY = availTop + (availH - boardH) / 2;
  L.nestY = H - bottomH;
  L.nestH = bottomH;
  // help button at the column's top-right (row A)
  var hb = GF.clamp(30 * S, 26, 38);
  helpBtn = { x: colX + colW - hb - pad, y: 6 * S, w: hb, h: hb };
  // vault button (banked-gold pill) to the LEFT of help — opens the meta any time
  var vw = GF.clamp(104 * S, 84, 150);
  vaultBtn = { x: helpBtn.x - vw - pad * 0.6, y: 6 * S, w: vw, h: hb };
}

function draw(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  layout();
  // background — cozy market gradient
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#3a2418'); g.addColorStop(0.5, '#4a2e1c'); g.addColorStop(1, '#2a1a12');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawTray(ctx);
    drawBoard(ctx);
    drawBottom(ctx);
    drawTopHUD(ctx);
    drawHelpBtn(ctx);
    if (gs === 'PLAYING') drawVaultBtn(ctx);
    drawDrag(ctx);
    if (newBeastFlash > 0) drawNewBeast(ctx);
    if (gs === 'PLAYING') GF.tutorial.draw(ctx);
  }
  if (paused) drawPauseOverlay(ctx);

  if (gs === 'GAMEOVER') drawGameOver(ctx);
  if (continueBannerUntil && nowMs() < continueBannerUntil && gs === 'PLAYING') drawContinueBanner(ctx);
  if (charmToast && !paused) drawCharmToast(ctx);
  else if (questToast && !paused) drawQuestToast(ctx);   // charm toast wins if both fire same frame
  if (bootBannerT > 0 && !paused && gs !== 'GAMEOVER') drawBootBanner(ctx);
}

// Vector coin (gold disc + ring) — used wherever the in-run coin currency appears.
// NEVER an emoji: 🪙 renders as a tofu box / "moon" glyph in the game font (Tim's
// "? over the moon currency" bug). Same reason Charm icons are vector-drawn below.
function drawCoinIcon(ctx, x, y, r) {
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = '#ffd700'; ctx.fill();
  ctx.lineWidth = Math.max(1, r * 0.18); ctx.strokeStyle = '#b9870c'; ctx.stroke();
  ctx.beginPath(); ctx.arc(x, y, r * 0.52, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = Math.max(1, r * 0.13); ctx.stroke();
  ctx.restore();
}
// Vector Charm icon — shape varies by the boost it grants (no fonts, no emoji).
function drawCharmIcon(ctx, def, x, y, r) {
  ctx.save();
  ctx.fillStyle = def.col;
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = Math.max(1, r * 0.12);
  var i, ang, rr, px, py;
  switch (def.stat) {
    case 'sell':  // coin
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(x, y, r * 0.5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.stroke();
      break;
    case 'start': // egg
      ctx.beginPath(); ctx.ellipse(x, y, r * 0.78, r, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      break;
    case 'merge': // diamond
      ctx.beginPath(); ctx.moveTo(x, y - r); ctx.lineTo(x + r * 0.82, y);
      ctx.lineTo(x, y + r); ctx.lineTo(x - r * 0.82, y); ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'wild':  // 4-point sparkle
      ctx.beginPath();
      for (i = 0; i < 8; i++) { ang = i * Math.PI / 4 - Math.PI / 2; rr = (i % 2 === 0) ? r : r * 0.4; px = x + Math.cos(ang) * rr; py = y + Math.sin(ang) * rr; if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'idle':  // vault box + keyhole
      GF.rr(ctx, x - r * 0.85, y - r * 0.72, r * 1.7, r * 1.44, r * 0.25); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(x, y - r * 0.05, r * 0.28, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fill();
      break;
    default:
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}
// "NEW CHARM!" flourish when a playtime milestone unlocks (mid-run, non-blocking).
function drawCharmToast(ctx) {
  var S = GF.S, def = charmToast.def, ru = (GF.lang === 'ru');
  var w = GF.clamp(258 * S, 200, 320), h = GF.clamp(54 * S, 46, 66);
  var x = GF.cx - w / 2, y = GF.clamp(GF.H * 0.16, 60, 150);
  var a = GF.clamp(charmToast.t / 0.4, 0, 1);   // fade out in the last 0.4s
  ctx.save(); ctx.globalAlpha = a;
  GF.rr(ctx, x, y, w, h, 12 * S); ctx.fillStyle = 'rgba(30,20,12,0.96)'; ctx.fill();
  ctx.strokeStyle = def.col; ctx.lineWidth = 2 * S; ctx.stroke();
  drawCharmIcon(ctx, def, x + h * 0.5, y + h / 2, h * 0.3);
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = def.col; ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px sans-serif';
  ctx.fillText((ru ? 'НОВЫЙ ТАЛИСМАН' : 'NEW CHARM') + '  ·  ' + charmName(def), x + h, y + h * 0.36);
  ctx.fillStyle = '#cdb'; ctx.font = GF.clamp(10.5 * S, 9, 13.5) + 'px sans-serif';
  ctx.fillText(charmBonusText(def, 1) + (ru ? '  — в Казне' : '  — in the Vault'), x + h, y + h * 0.68);
  ctx.restore(); ctx.textBaseline = 'alphabetic';
}
// "QUEST DONE" flourish when a daily quest completes mid-run (non-blocking).
function drawQuestToast(ctx) {
  var S = GF.S, q = questToast.q, ru = (GF.lang === 'ru');
  var w = GF.clamp(258 * S, 200, 320), h = GF.clamp(50 * S, 44, 62);
  var x = GF.cx - w / 2, y = GF.clamp(GF.H * 0.16, 60, 150);
  var a = GF.clamp(questToast.t / 0.4, 0, 1);
  ctx.save(); ctx.globalAlpha = a;
  GF.rr(ctx, x, y, w, h, 12 * S); ctx.fillStyle = 'rgba(20,30,14,0.96)'; ctx.fill();
  ctx.strokeStyle = '#7ed957'; ctx.lineWidth = 2 * S; ctx.stroke();
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#7ed957'; ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px sans-serif';
  ctx.fillText((ru ? 'ЗАДАНИЕ ВЫПОЛНЕНО' : 'QUEST DONE') + '  ·  +' + q.reward + ' ' + GF.t('goldUnit'), x + 14 * S, y + h * 0.36);
  ctx.fillStyle = '#cdb'; ctx.font = GF.clamp(10.5 * S, 9, 13.5) + 'px sans-serif';
  ctx.fillText(questLabel(q) + (ru ? '  — забери в Казне' : '  — claim in the Vault'), x + 14 * S, y + h * 0.68);
  ctx.restore(); ctx.textBaseline = 'alphabetic';
}
// "Welcome back" banner at boot: overnight idle income + daily streak bonus (the reason
// to return), shown briefly so the daily reward is FELT even though there's no menu now.
function drawBootBanner(ctx) {
  var S = GF.S, ru = (GF.lang === 'ru');
  var parts = [];
  if (idleClaim > 0) parts.push('+' + fmtGold(idleClaim) + ' ' + GF.t('awayEarned'));
  if (dailyClaim > 0) parts.push(GF.t('streakDay') + ' ' + meta.streak + ': +' + dailyClaim + ' ' + GF.t('streakBonus'));
  if (!parts.length) return;
  var txt = parts.join('   •   ');
  ctx.font = GF.clamp(11.5 * S, 9, 15) + 'px sans-serif';
  var w = Math.min(GF.W - 24 * S, ctx.measureText(txt).width + 28 * S), h = GF.clamp(34 * S, 28, 44);
  var x = GF.cx - w / 2, y = GF.clamp(GF.H * 0.5, 120, GF.H - 120);
  var a = GF.clamp(bootBannerT / 0.6, 0, 1);
  ctx.save(); ctx.globalAlpha = a;
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fillStyle = 'rgba(20,14,8,0.95)'; ctx.fill();
  ctx.strokeStyle = 'rgba(126,217,87,0.6)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  ctx.fillStyle = '#7ed957'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(txt, GF.cx, y + h / 2);
  ctx.restore(); ctx.textBaseline = 'alphabetic';
}

function drawTopHUD(ctx) {
  var S = GF.S, pad = GF.clamp(10 * S, 6, 16);
  var lx = L.colX + pad, rx = L.colX + L.colW - pad;
  var rowA = 18 * S, rowB = 46 * S;
  ctx.textBaseline = 'middle';
  // SCORE (top-left, row A)
  ctx.font = 'bold ' + GF.clamp(15 * S, 11, 20) + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
  ctx.fillText(GF.t('score') + ' ' + score, lx, rowA);
  // COINS (left, row B) — vector coin + amount
  var cr = GF.clamp(7 * S, 6, 10);
  drawCoinIcon(ctx, lx + cr, rowB, cr);
  ctx.font = 'bold ' + GF.clamp(15 * S, 11, 20) + 'px sans-serif';
  ctx.fillStyle = '#ffd700'; ctx.textAlign = 'left';
  ctx.fillText('' + coins, lx + cr * 2 + 5 * S, rowB);
  // FREE cells (right, row B — sits below the vault/help row)
  var fc = freeCells();
  ctx.font = GF.clamp(11.5 * S, 9, 15) + 'px sans-serif';
  ctx.fillStyle = fc <= 2 ? '#ff5b5b' : fc <= 5 ? '#ffb347' : '#9ab';
  ctx.textAlign = 'right';
  ctx.fillText(GF.t('free') + ': ' + fc, rx, rowB);
  // NEXT CHARM countdown (top-center, row B) — keeps the playtime-reward goal VISIBLE
  // outside the Vault so "play X more minutes for an item" is always felt (Codex note).
  var nc = nextCharm();
  if (nc) {
    var left = Math.max(0, Math.ceil(nc.min - totalPlayMin()));
    var icx = GF.cx - 30 * S;
    drawCharmIcon(ctx, nc, icx, rowB, GF.clamp(7 * S, 6, 10));
    ctx.textAlign = 'left'; ctx.fillStyle = '#caa86a'; ctx.font = GF.clamp(10.5 * S, 9, 14) + 'px sans-serif';
    ctx.fillText((GF.lang === 'ru' ? 'через ' : 'in ') + left + (GF.lang === 'ru' ? ' мин' : 'm'), icx + 12 * S, rowB);
  }
  ctx.textBaseline = 'alphabetic';
}

function drawTray(ctx) {
  var S = GF.S;
  orderRects = [];
  if (!orders.length) {
    if (!firstMergeDone && gs === 'PLAYING') {
      ctx.fillStyle = '#cdb';
      ctx.font = GF.clamp(13 * S, 10, 18) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(GF.lang === 'ru' ? 'Слей двух зверят, чтобы открыть заказы' : 'Merge two critters to unlock orders',
        GF.cx, L.trayY + L.trayH / 2);
      ctx.textBaseline = 'alphabetic';
    }
    return;
  }
  var n = orders.length;
  var gap = 8 * S;
  var tileW = Math.min((GF.W - 20 * S - gap * (n - 1)) / n, L.trayH * 1.9);
  var totalW = tileW * n + gap * (n - 1);
  var startX = (GF.W - totalW) / 2;
  var ty = L.trayY + 4 * S, th = L.trayH - 8 * S;
  // label
  ctx.fillStyle = '#cdb'; ctx.font = GF.clamp(10 * S, 8, 13) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('order'), startX, L.trayY - 2 * S);
  for (var i = 0; i < n; i++) {
    var o = orders[i];
    var x = startX + i * (tileW + gap);
    o._cx = x + tileW / 2; o._cy = ty + th / 2;
    // tile bg
    GF.rr(ctx, x, ty, tileW, th, 10 * S);
    ctx.fillStyle = 'rgba(255,250,235,0.10)'; ctx.fill();
    ctx.lineWidth = 2 * S; ctx.strokeStyle = TIER_COL[o.tier] || '#fff'; ctx.stroke();
    // wanted species icon
    var iconS = th * 0.74;
    drawBeast(ctx, x + iconS * 0.62, ty + th / 2, o.tier, false, iconS, 0);
    // count needed
    ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(15 * S, 11, 22) + 'px sans-serif';
    ctx.fillText('×' + (o.need - o.have), x + iconS * 1.18, ty + th * 0.42);
    ctx.font = GF.clamp(9 * S, 8, 12) + 'px sans-serif';
    ctx.fillStyle = '#cdb';
    ctx.fillText(speciesName(o.tier), x + iconS * 1.18, ty + th * 0.74);
    orderRects.push({ x: x, y: ty, w: tileW, h: th, order: o });
  }
  ctx.textBaseline = 'alphabetic';
}

function drawBoard(ctx) {
  var S = GF.S;
  // stall panel behind board
  var pad = 8 * S;
  GF.rr(ctx, L.boardX - pad, L.boardY - pad, L.boardW + pad * 2, L.cell * rows + pad * 2, 14 * S);
  ctx.fillStyle = 'rgba(20,12,8,0.55)'; ctx.fill();
  // cells
  for (var idx = 0; idx < board.length; idx++) {
    var col = idx % boardCols, row = (idx / boardCols) | 0;
    var cx = L.boardX + col * L.cell, cy = L.boardY + row * L.cell;
    var inset = 3 * S;
    GF.rr(ctx, cx + inset, cy + inset, L.cell - inset * 2, L.cell - inset * 2, 9 * S);
    var isSel = (idx === sel);
    ctx.fillStyle = isSel ? 'rgba(255,215,0,0.18)' : 'rgba(255,250,235,0.05)';
    ctx.fill();
    if (isSel) { ctx.lineWidth = 3 * S; ctx.strokeStyle = '#ffd700'; ctx.stroke(); }
    var c = board[idx];
    // settle the sprite to its cell center every frame (position is never animated, only
    // the `pop` scale is). Fixes seeded critters stuck at 0,0 when startGame runs before
    // the first layout(), and any stale offset after +ROW / resume.
    if (c) { c.sx = cx + L.cell / 2; c.sy = cy + L.cell / 2; }
    if (c && !(drag && drag.moved && drag.idx === idx)) {
      var sz = L.cell * 0.82 * (1 + (c.pop || 0) * 0.18);
      drawBeast(ctx, c.sx, c.sy, c.tier, c.wild, sz, c.pop || 0);
    }
  }
  // drop-target highlight under a moving drag
  if (drag && drag.moved) {
    var di = cellAt(drag.x, drag.y);
    if (di >= 0) {
      var dc = di % boardCols, dr = (di / boardCols) | 0;
      GF.rr(ctx, L.boardX + dc * L.cell + 3 * S, L.boardY + dr * L.cell + 3 * S, L.cell - 6 * S, L.cell - 6 * S, 9 * S);
      ctx.lineWidth = 3 * S; ctx.strokeStyle = '#7ed957'; ctx.stroke();
    }
  }
}

function drawBeast(ctx, x, y, tier, wild, size, pop) {
  var name = wild ? 'wild' : ('beast' + GF.clamp(tier, 0, maxTier));
  GF.drawSprite(name, x, y, size, function (c, px, py, s) {
    // procedural fallback: rounded blob with eyes, palette by tier
    var col = wild ? '#ffd700' : (TIER_COL[GF.clamp(tier, 0, TIER_COL.length - 1)] || '#7ed957');
    c.save();
    // body
    c.fillStyle = col;
    c.beginPath();
    var r = s * 0.42;
    c.moveTo(px, py - r);
    c.bezierCurveTo(px + r, py - r, px + r, py + r, px, py + r);
    c.bezierCurveTo(px - r, py + r, px - r, py - r, px, py - r);
    c.fill();
    // belly highlight
    c.fillStyle = 'rgba(255,255,255,0.25)';
    c.beginPath(); c.ellipse(px - r * 0.25, py - r * 0.15, r * 0.45, r * 0.55, 0, 0, Math.PI * 2); c.fill();
    // eyes (googly)
    var eo = r * 0.32, er = r * 0.20 + Math.min(tier, 6) * s * 0.004;
    c.fillStyle = '#fff';
    c.beginPath(); c.arc(px - eo, py - r * 0.1, er, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(px + eo, py - r * 0.1, er, 0, Math.PI * 2); c.fill();
    c.fillStyle = '#1a1a1a';
    c.beginPath(); c.arc(px - eo + er * 0.2, py - r * 0.05, er * 0.5, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(px + eo + er * 0.2, py - r * 0.05, er * 0.5, 0, Math.PI * 2); c.fill();
    // smile
    c.strokeStyle = 'rgba(0,0,0,0.5)'; c.lineWidth = Math.max(1, s * 0.025);
    c.beginPath(); c.arc(px, py + r * 0.18, r * 0.3, 0.15 * Math.PI, 0.85 * Math.PI); c.stroke();
    // little tier pips for higher beasts (horns)
    if (tier >= 4 && !wild) {
      c.fillStyle = 'rgba(0,0,0,0.35)';
      c.beginPath(); c.moveTo(px - r * 0.5, py - r * 0.6); c.lineTo(px - r * 0.3, py - r); c.lineTo(px - r * 0.1, py - r * 0.65); c.fill();
      c.beginPath(); c.moveTo(px + r * 0.1, py - r * 0.65); c.lineTo(px + r * 0.3, py - r); c.lineTo(px + r * 0.5, py - r * 0.6); c.fill();
    }
    if (wild) {
      c.fillStyle = '#fff'; c.font = 'bold ' + (s * 0.4) + 'px sans-serif';
      c.textAlign = 'center'; c.textBaseline = 'middle'; c.fillText('★', px, py + r * 0.55);
    }
    c.restore();
  });
  // tier badge number
  if (!wild) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    var bs = size * 0.22;
    ctx.beginPath(); ctx.arc(x + size * 0.32, y - size * 0.32, bs * 0.7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (bs * 0.95) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('' + (tier + 1), x + size * 0.32, y - size * 0.32);
    ctx.textBaseline = 'alphabetic';
  }
}

function drawBottom(ctx) {
  var S = GF.S;
  nestRects = []; shopBtns = [];
  var y = L.nestY, h = L.nestH;
  var pad = 10 * S;
  // everything lives inside the centered play column (not the full screen width)
  var bx0 = L.colX + pad, bw0 = L.colW - pad * 2;
  // NEST tile(s) on the left
  var nestW = GF.clamp(bw0 * 0.42, 96, 220);
  var perW = nests > 1 ? (nestW - 6 * S) / nests : nestW;
  for (var k = 0; k < nests; k++) {
    var nx = bx0 + k * (perW + 6 * S), ny = y + pad, nh = h - pad * 2;
    GF.rr(ctx, nx, ny, perW, nh, 14 * S);
    var ready = nestCharges[k] >= 1;
    ctx.fillStyle = ready ? '#3d6b34' : '#2c3a28'; ctx.fill();
    ctx.lineWidth = 3 * S; ctx.strokeStyle = ready ? '#7ed957' : '#56603f'; ctx.stroke();
    // recharge fill bar
    if (!ready) {
      var frac = GF.clamp((charge[k] || 0) / genRechargeMs, 0, 1);
      GF.rr(ctx, nx, ny + nh * (1 - frac), perW, nh * frac, 14 * S);
      ctx.fillStyle = 'rgba(126,217,87,0.20)'; ctx.fill();
    }
    // nest icon
    drawNestIcon(ctx, nx + perW / 2, ny + nh * 0.42, Math.min(perW, nh) * 0.6);
    ctx.fillStyle = ready ? '#dfffd0' : '#9ab';
    ctx.font = 'bold ' + GF.clamp(11 * S, 9, 15) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(ready ? GF.t('tap_nest') : GF.t('nest'), nx + perW / 2, ny + nh - 5 * S);
    nestRects.push({ x: nx, y: ny, w: perW, h: nh, idx: k });
  }
  // SHOP buttons on the right (once unlocked) — bounded by the column, not the screen
  var shopX = bx0 + nestW + 12 * S;
  var shopW = (L.colX + L.colW - pad) - shopX;
  if (shopUnlocked) {
    var defs = [
      { kind: 'nest', label: GF.t('buyNest'), cost: genCost, ok: coins >= genCost && nests < 2, col: '#7ed957' },
      { kind: 'row',  label: GF.t('buyRow'),  cost: rowCost, ok: coins >= rowCost && rows < MAX_ROWS, col: '#6aa9e0' },
      { kind: 'rech', label: GF.t('buyRech'), cost: rechargeCost, ok: coins >= rechargeCost && genRechargeMs > 250, col: '#ffd166' },
    ];
    var bh = (h - pad * 2 - 12 * S) / 3;
    for (var i = 0; i < defs.length; i++) {
      var d = defs[i];
      var bx = shopX, by = y + pad + i * (bh + 6 * S);
      GF.rr(ctx, bx, by, shopW, bh, 10 * S);
      ctx.fillStyle = d.ok ? 'rgba(255,250,235,0.14)' : 'rgba(255,250,235,0.05)'; ctx.fill();
      ctx.lineWidth = 2 * S; ctx.strokeStyle = d.ok ? d.col : 'rgba(150,150,150,0.4)'; ctx.stroke();
      ctx.fillStyle = d.ok ? '#fff' : '#888'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px sans-serif';
      ctx.fillText(d.label, bx + 10 * S, by + bh / 2);
      // cost: vector coin + number, right-aligned as a group (no emoji)
      ctx.font = GF.clamp(11 * S, 9, 15) + 'px sans-serif';
      var costStr = '' + d.cost, ccr = GF.clamp(6 * S, 5, 8);
      var grpW = ccr * 2 + 3 * S + ctx.measureText(costStr).width;
      var gx = bx + shopW - 10 * S - grpW;
      drawCoinIcon(ctx, gx + ccr, by + bh / 2, ccr);
      ctx.textAlign = 'left'; ctx.fillStyle = d.ok ? '#ffd700' : '#888';
      ctx.fillText(costStr, gx + ccr * 2 + 3 * S, by + bh / 2);
      shopBtns.push({ kind: d.kind, x: bx, y: by, w: shopW, h: bh });
    }
  } else {
    ctx.fillStyle = '#8a7'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = GF.clamp(11 * S, 9, 14) + 'px sans-serif';
    var msg = GF.lang === 'ru' ? ('Лавка при ' + SHOP_FAMILY_COIN + ' монетах') : ('Shop opens at ' + SHOP_FAMILY_COIN + ' coins');
    ctx.fillText(msg, shopX + shopW / 2, y + h / 2);
  }
  ctx.textBaseline = 'alphabetic';
}

function drawNestIcon(ctx, x, y, s) {
  ctx.save();
  // nest = a little woven bowl with eggs
  ctx.fillStyle = '#8a5a2b';
  ctx.beginPath(); ctx.ellipse(x, y + s * 0.18, s * 0.5, s * 0.28, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#6b421f';
  ctx.beginPath(); ctx.ellipse(x, y + s * 0.05, s * 0.42, s * 0.22, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff6e0';
  ctx.beginPath(); ctx.ellipse(x - s * 0.14, y, s * 0.13, s * 0.16, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + s * 0.12, y - s * 0.02, s * 0.12, s * 0.15, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawDrag(ctx) {
  if (!drag || !drag.moved || gs !== 'PLAYING') return;
  var c = board[drag.idx];
  if (!c) return;
  var sz = L.cell * 0.9;

function drawHelpBtn(ctx) {

  GF.rr(ctx, helpBtn.x, helpBtn.y, helpBtn.w, helpBtn.h, helpBtn.w / 2);

function drawNewBeast(ctx) {

  ctx.restore();
}

// ── OVERLAYS (tutorial block on MENU) ────────────────────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}
function drawTutorialBlock(ctx, topY, maxW) {
  var S = GF.S;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var fs = GF.clamp(13 * S, 10, 17);
  var lineH = fs * 1.32;
  ctx.font = fs + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  var y = topY;
  for (var k = 0; k < keys.length; k++) {
    var lines = wrapLines(ctx, GF.t(keys[k]), maxW);
    ctx.fillStyle = (k === 4) ? '#ffd166' : '#dfe6ee';
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], GF.cx - maxW / 2, y); y += lineH; }
    y += lineH * 0.28;
  }
  ctx.textBaseline = 'alphabetic';
  return y - topY;
}

// In-run "Vault" button: shows banked gold + opens the meta any time (so you never
// have to LOSE to reach it — the fix for "couldn't find the meta").
function drawVaultBtn(ctx) {
  var S = GF.S, b = vaultBtn; if (!b.w) return;
  GF.rr(ctx, b.x, b.y, b.w, b.h, b.h / 2);
  ctx.fillStyle = 'rgba(255,209,102,0.18)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,209,102,0.65)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  ctx.fillStyle = '#ffd700'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(12.5 * S, 10, 16) + 'px sans-serif';
  ctx.fillText('▸ ' + fmtGold(meta ? meta.bank : 0) + ' ' + GF.t('goldUnit'), b.x + b.w / 2, b.y + b.h / 2 + 1);
  ctx.textBaseline = 'alphabetic';
  // red badge with claimable-quest count → nudge the player to open the Vault
  var cq = claimableQuests();
  if (cq > 0) {
    var br = GF.clamp(8 * S, 7, 11), bxx = b.x + b.w - br * 0.4, byy = b.y + br * 0.2;
    ctx.beginPath(); ctx.arc(bxx, byy, br, 0, Math.PI * 2); ctx.fillStyle = '#ff5b5b'; ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(9 * S, 8, 12) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('' + cq, bxx, byy + 0.5 * S);
    ctx.textBaseline = 'alphabetic';
  }
}
// Pause overlay = the Vault (meta) reachable mid-run, freezing the game. Two tabs:
// UPGRADES (permanent stat shop) and COLLECTION (playtime-unlocked equippable Charms).
function drawPauseOverlay(ctx) {
  var S = GF.S, W = GF.W, H = GF.H, ru = (GF.lang === 'ru');
  ctx.fillStyle = 'rgba(10,6,4,0.92)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffd166'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold ' + GF.clamp(21 * S, 16, 28) + 'px sans-serif';
  var ty = GF.clamp(H * 0.085, 38, 84);
  ctx.fillText(ru ? 'КАЗНА БАЗАРА' : 'BAZAAR VAULT', GF.cx, ty);
  var maxW = Math.min(W - 24 * S, 440 * S);
  // tab row (3 tabs) — a "!" badge on QUESTS when a reward is claimable
  vaultTabRects = [];
  var tabH = GF.clamp(34 * S, 28, 42), tabGap = 6 * S, tabW = (maxW - tabGap * 2) / 3;
  var tabX = GF.cx - maxW / 2, tabY = ty + 12 * S;
  var claimable = claimableQuests();
  var tabs = [
    { id: 'up', label: ru ? 'УЛУЧШ.' : 'UPGRADES' },
    { id: 'charms', label: ru ? 'ТАЛИСМ.' : 'CHARMS' },
    { id: 'quests', label: ru ? 'ЗАДАНИЯ' : 'QUESTS', badge: claimable },
  ];
  for (var t = 0; t < tabs.length; t++) {
    var on = (vaultTab === tabs[t].id), bx = tabX + t * (tabW + tabGap);
    GF.rr(ctx, bx, tabY, tabW, tabH, 9 * S);
    ctx.fillStyle = on ? 'rgba(255,209,102,0.22)' : 'rgba(255,255,255,0.05)'; ctx.fill();
    ctx.strokeStyle = on ? '#ffd166' : 'rgba(255,255,255,0.16)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
    ctx.fillStyle = on ? '#ffd700' : '#9a8c7a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(11.5 * S, 9, 15) + 'px sans-serif';
    ctx.fillText(tabs[t].label, bx + tabW / 2, tabY + tabH / 2);
    if (tabs[t].badge) {
      var br = GF.clamp(8 * S, 7, 11);
      ctx.beginPath(); ctx.arc(bx + tabW - br - 2 * S, tabY + br + 2 * S, br, 0, Math.PI * 2);
      ctx.fillStyle = '#ff5b5b'; ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(9 * S, 8, 12) + 'px sans-serif';
      ctx.fillText('' + tabs[t].badge, bx + tabW - br - 2 * S, tabY + br + 3 * S);
    }
    vaultTabRects.push({ tab: tabs[t].id, x: bx, y: tabY, w: tabW, h: tabH });
  }
  ctx.textBaseline = 'alphabetic';
  var contentY = tabY + tabH + 14 * S;
  var pb = (vaultTab === 'charms') ? drawCharmPanel(ctx, contentY, maxW)
        : (vaultTab === 'quests') ? drawQuestPanel(ctx, contentY, maxW)
        : drawMetaPanel(ctx, contentY, maxW);
  // RESUME button
  var bw = GF.clamp(220 * S, 150, 300), bh = GF.clamp(48 * S, 42, 60);
  var by = Math.min(pb + 16 * S, H - bh - 18 * S);
  resumeBtn = { x: GF.cx - bw / 2, y: by, w: bw, h: bh };
  var gr = ctx.createLinearGradient(0, by, 0, by + bh); gr.addColorStop(0, '#7ed957'); gr.addColorStop(1, '#4faf3a');
  GF.rr(ctx, resumeBtn.x, by, bw, bh, bh / 2); ctx.fillStyle = gr; ctx.fill();
  ctx.fillStyle = '#08240f'; ctx.font = 'bold ' + GF.clamp(18 * S, 14, 24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(ru ? 'ПРОДОЛЖИТЬ' : 'RESUME', GF.cx, by + bh / 2);
  ctx.textBaseline = 'alphabetic';
}

// THE COLLECTION tab — playtime header + next-charm progress + 3 equip slots + the
// charm grid (locked = silhouette + "play Xm"; owned = vector icon + Lv + upgrade).
function drawCharmPanel(ctx, topY, maxW) {
  var S = GF.S, ru = (GF.lang === 'ru'), x = GF.cx - maxW / 2, pad = 12 * S;
  charmTileRects = []; charmUpRects = []; equipSlotRects = [];
  var slotR = GF.clamp(24 * S, 20, 30);
  var tileH = GF.clamp(62 * S, 52, 76);
  var cols = 4, gap = 7 * S, tileW = (maxW - pad * 2 - gap * (cols - 1)) / cols;
  var gridRows = Math.ceil(CHARM_DEFS.length / cols);
  var headH = 40 * S, slotsH = slotR * 2 + 22 * S;
  var panelH = pad + headH + slotsH + (tileH * gridRows + gap * (gridRows - 1)) + pad;
  GF.rr(ctx, x, topY, maxW, panelH, 14 * S); ctx.fillStyle = 'rgba(40,25,16,0.94)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,209,102,0.28)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  var cy = topY + pad;
  // header: vault gold (charm upgrades spend it) + cumulative playtime
  var tm = Math.floor(totalPlayMin());
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif'; ctx.fillStyle = '#ffd700';
  ctx.fillText(fmtGold(meta ? meta.bank : 0) + ' ' + GF.t('goldUnit'), x + pad, cy);
  ctx.textAlign = 'right'; ctx.fillStyle = '#caa86a'; ctx.font = GF.clamp(11 * S, 9, 14) + 'px sans-serif';
  ctx.fillText((ru ? 'Сыграно: ' : 'Played: ') + (tm >= 60 ? Math.floor(tm / 60) + 'h ' + (tm % 60) + 'm' : tm + 'm'), x + maxW - pad, cy + 3 * S);
  cy += 20 * S;
  // next-charm progress (the visible pull)
  var nc = nextCharm();
  if (nc) {
    var prevMin = 0;
    for (var pi = 0; pi < CHARM_DEFS.length; pi++) { if (CHARM_DEFS[pi].id === nc.id) break; prevMin = CHARM_DEFS[pi].min; }
    var frac = GF.clamp((totalPlayMin() - prevMin) / (nc.min - prevMin), 0, 1);
    var left = Math.max(0, Math.ceil(nc.min - totalPlayMin()));
    ctx.textAlign = 'left'; ctx.fillStyle = '#cdb'; ctx.font = GF.clamp(10.5 * S, 9, 13.5) + 'px sans-serif';
    ctx.fillText((ru ? 'Следующий талисман через ' : 'Next charm in ') + left + (ru ? ' мин' : ' min'), x + pad, cy);
    var barW = maxW - pad * 2, barH = 6 * S, barY = cy + 14 * S;
    GF.rr(ctx, x + pad, barY, barW, barH, barH / 2); ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fill();
    GF.rr(ctx, x + pad, barY, Math.max(barH, barW * frac), barH, barH / 2); ctx.fillStyle = nc.col; ctx.fill();
  } else {
    ctx.textAlign = 'left'; ctx.fillStyle = '#7ed957'; ctx.font = GF.clamp(10.5 * S, 9, 13.5) + 'px sans-serif';
    ctx.fillText(ru ? 'Все талисманы собраны!' : 'All charms collected!', x + pad, cy);
  }
  cy += headH - 20 * S + 12 * S;
  // equip slots row
  ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillStyle = '#9a8c7a';
  ctx.font = GF.clamp(10 * S, 8.5, 13) + 'px sans-serif';
  ctx.fillText(ru ? 'ЭКИПИРОВКА' : 'EQUIPPED', x + pad, cy);
  var slotsY = cy + 14 * S, slotGap = GF.clamp(16 * S, 10, 26);
  var totalSlotsW = CHARM_SLOTS * (slotR * 2) + (CHARM_SLOTS - 1) * slotGap;
  var slotStartX = GF.cx - totalSlotsW / 2;
  for (var s = 0; s < CHARM_SLOTS; s++) {
    var scx = slotStartX + slotR + s * (slotR * 2 + slotGap), scy = slotsY + slotR;
    var eid = meta ? meta.equipped[s] : null;
    ctx.beginPath(); ctx.arc(scx, scy, slotR, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
    ctx.strokeStyle = eid ? CHARM_BY_ID[eid].col : 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2 * S;
    ctx.setLineDash(eid ? [] : [4 * S, 4 * S]); ctx.stroke(); ctx.setLineDash([]);
    if (eid) drawCharmIcon(ctx, CHARM_BY_ID[eid], scx, scy, slotR * 0.62);
    equipSlotRects.push({ slot: s, x: scx - slotR, y: scy - slotR, w: slotR * 2, h: slotR * 2 });
  }
  cy = slotsY + slotR * 2 + 14 * S;
  // charm grid
  for (var i = 0; i < CHARM_DEFS.length; i++) {
    var def = CHARM_DEFS[i], col = i % cols, row = Math.floor(i / cols);
    var bx = x + pad + col * (tileW + gap), byy = cy + row * (tileH + gap);
    var owned = !!(meta && meta.charms[def.id]);
    var equipped = !!(meta && meta.equipped.indexOf(def.id) >= 0);
    GF.rr(ctx, bx, byy, tileW, tileH, 9 * S);
    ctx.fillStyle = owned ? (equipped ? 'rgba(126,217,87,0.14)' : 'rgba(255,255,255,0.06)') : 'rgba(255,255,255,0.03)'; ctx.fill();
    ctx.strokeStyle = equipped ? '#7ed957' : (owned ? 'rgba(255,209,102,0.5)' : 'rgba(255,255,255,0.12)'); ctx.lineWidth = 1.5 * S; ctx.stroke();
    var icx = bx + tileW / 2, icy = byy + tileH * 0.34, ir = GF.clamp(14 * S, 11, 18);
    if (owned) {
      drawCharmIcon(ctx, def, icx, icy, ir);
      ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillStyle = '#cdb';
      ctx.font = 'bold ' + GF.clamp(8.5 * S, 7.5, 11) + 'px sans-serif';
      ctx.fillText('Lv ' + meta.charms[def.id].lvl, icx, byy + tileH * 0.56);
      // upgrade chip (bottom of tile) — tap to spend gold
      var cost = charmUpCost(def.id), maxed = !isFinite(cost);
      var afford = !!(meta && !maxed && meta.bank >= cost);
      var chW = tileW - 8 * S, chH = GF.clamp(15 * S, 12, 19), chX = bx + 4 * S, chY = byy + tileH - chH - 4 * S;
      GF.rr(ctx, chX, chY, chW, chH, 5 * S);
      ctx.fillStyle = maxed ? 'rgba(126,217,87,0.18)' : (afford ? 'rgba(255,215,0,0.18)' : 'rgba(255,255,255,0.05)'); ctx.fill();
      ctx.fillStyle = maxed ? '#7ed957' : (afford ? '#ffd700' : '#7a6f5f'); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + GF.clamp(8.5 * S, 7, 11) + 'px sans-serif';
      ctx.fillText(maxed ? GF.t('upMax') : (fmtGold(cost) + ' ' + GF.t('goldUnit')), chX + chW / 2, chY + chH / 2);
      charmTileRects.push({ id: def.id, x: bx, y: byy, w: tileW, h: tileH - chH - 4 * S });
      charmUpRects.push({ id: def.id, x: chX, y: chY, w: chW, h: chH, afford: afford });
    } else {
      // locked: dim silhouette + "play Xm"
      ctx.globalAlpha = 0.4; drawCharmIcon(ctx, def, icx, icy, ir); ctx.globalAlpha = 1;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillStyle = '#8a7d6d';
      ctx.font = GF.clamp(8.5 * S, 7.5, 11) + 'px sans-serif';
      ctx.fillText((ru ? 'играй ' : 'play ') + def.min + (ru ? 'м' : 'm'), icx, byy + tileH * 0.58);
    }
  }
  ctx.textBaseline = 'alphabetic';
  return topY + panelH;
}

// DAILY QUESTS tab — 3 quests, each a progress bar + a CLAIM button (reward gold).
// "Resets in Xh" makes the daily cadence explicit (the come-back-tomorrow hook).
function drawQuestPanel(ctx, topY, maxW) {
  var S = GF.S, ru = (GF.lang === 'ru'), x = GF.cx - maxW / 2, pad = 12 * S;
  questClaimRects = [];
  var rowH = GF.clamp(54 * S, 46, 66), rowGap = 8 * S;
  var quests = (meta && meta.quests) ? meta.quests : [];
  var headH = 26 * S;
  var panelH = pad + headH + (rowH * 3 + rowGap * 2) + pad;
  GF.rr(ctx, x, topY, maxW, panelH, 14 * S); ctx.fillStyle = 'rgba(40,25,16,0.94)'; ctx.fill();

// ── ADS (Yandex) — user-initiated rewarded "clear space" + throttled interstitial ──
// Hardened pattern: 4.5s no-fill watchdog, reward granted ONLY on onRewarded and
// shown visibly (board frees up + banner), one continue per run. Mirrors the
// approved devourling / daily_dodge wiring. SDK loaded via the PLATFORM_SDK swap.
var continueUsed = false, continueLoading = false, continueBtnRect = null;
var continueBannerUntil = 0;
var lastInterstitialMs = -999999, INTERSTITIAL_GAP_MS = 90000;
function nowMs() { return (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now(); }
function showInterstitial(onDone) {
  var now = nowMs();
  if (now - lastInterstitialMs < INTERSTITIAL_GAP_MS) { if (onDone) onDone(); return; }
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showFullscreenAdv) { if (onDone) onDone(); return; }
  lastInterstitialMs = now;
  var done = false, opened = false;
  var finish = function() { if (done) return; done = true; if (onDone) onDone(); };
  var watchdog = setTimeout(function() { if (!opened) finish(); }, 4500);
  try {
    window.ysdk.adv.showFullscreenAdv({ callbacks: {
      onOpen: function() { opened = true; },
      onClose: function() { clearTimeout(watchdog); finish(); },
      onError: function() { clearTimeout(watchdog); finish(); },
    }});
  } catch (e) { clearTimeout(watchdog); finish(); }
}
function showRewardedContinue() {
  if (continueUsed || continueLoading) return;
  continueLoading = true;
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showRewardedVideo) { continueLoading = false; doContinue(); return; }
  var rewarded = false, opened = false, done = false;
  var finish = function() { if (done) return; done = true; continueLoading = false; if (rewarded) doContinue(); };
  var watchdog = setTimeout(function() { if (!opened) finish(); }, 4500);
  try {
    window.ysdk.adv.showRewardedVideo({ callbacks: {
      onOpen: function() { opened = true; },
      onRewarded: function() { rewarded = true; },
      onClose: function() { clearTimeout(watchdog); finish(); },
      onError: function() { clearTimeout(watchdog); finish(); },
    }});
  } catch (e) { clearTimeout(watchdog); finish(); }
}
function doContinue() {
  continueUsed = true;
  // break the gridlock: free the lowest-tier critters so the run can resume
  var idxs = [];
  for (var i = 0; i < board.length; i++) if (board[i]) idxs.push(i);
  idxs.sort(function(a, b) { return (board[a].tier | 0) - (board[b].tier | 0); });
  var clear = Math.min(7, idxs.length);
  for (var k = 0; k < clear; k++) board[idxs[k]] = null;
  continueBannerUntil = nowMs() + 2200;
  gs = 'PLAYING';
  if (GF.saveRun) GF.saveRun();
}

// ── UNIFIED POINTER (mouse + touch) so tap-tap AND drag both work ─────────
function evtXY(e) {
  if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}
function overlayDown(x, y) {
  // GAMEOVER: rewarded "clear space" continue (user-initiated, one per run)
  if (gs === 'GAMEOVER' && !continueUsed && continueBtnRect &&
      x >= continueBtnRect.x && x <= continueBtnRect.x + continueBtnRect.w &&
      y >= continueBtnRect.y && y <= continueBtnRect.y + continueBtnRect.h) {
    showRewardedContinue(); return true;
  }
  // MENU: tap a permanent-upgrade button to spend vault gold
  if (gs === 'MENU' && metaUpRects.length) {
    for (var mi = 0; mi < metaUpRects.length; mi++) {
      var r = metaUpRects[mi];
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        if (r.afford && buyMetaUpgrade(r.key) && GF.happytime) GF.happytime();
        return true;
      }
    }
  }
  // handle PLAY / PLAY AGAIN button on overlays
  if ((gs === 'MENU' || gs === 'GAMEOVER') && playBtnRect) {
    if (x >= playBtnRect.x && x <= playBtnRect.x + playBtnRect.w && y >= playBtnRect.y && y <= playBtnRect.y + playBtnRect.h) {
      if (gs === 'GAMEOVER') showInterstitial(startGame); else startGame();
      return true;
    }
  }
  return false;
}

window.addEventListener('mouseup', function (e) { var p = evtXY(e); onUp(p.x, p.y); });
cv.addEventListener('touchstart', function (e) { e.preventDefault(); var p = evtXY(e); if (!overlayDown(p.x, p.y)) onDown(p.x, p.y); }, { passive: false });

    coins = 220; score = 480; deliveries = 11; merges = 34;
    maxTierReached = 7; for (var t2 = 0; t2 <= 7; t2++) revealedTier[t2] = true;
    // leave the last row mostly empty so the board is busy but NOT gridlocked
    var fill2 = [2,3,1,4,2, 5,1,6,2,3, 0,2,4,1,7, 3,1,2,5,0, 1,4,2,3,1, 0,2,1,-1,-1, -1,-1,-1,-1,-1];
    for (var f2 = 0; f2 < board.length; f2++) {
      var p2c = cellCenter(f2);
      var fv = (f2 < fill2.length) ? fill2[f2] : -1;
      board[f2] = (fv >= 0) ? { tier: fv, wild: false, sx: p2c.x, sy: p2c.y, pop: 0 } : null;
    }
    if (board[12]) board[12] = (function () { var p = cellCenter(12); return { tier: 0, wild: true, sx: p.x, sy: p.y, pop: 0 }; })();
    combo = 3; bestCombo = 4; comboTimer = comboWindowMs;
    orders = [ { tier: 2, need: 2, have: 1, id: orderSeq++ },
               { tier: 5, need: 1, have: 0, id: orderSeq++ },
               { tier: 6, need: 1, have: 0, id: orderSeq++ } ];
  }
  gs = 'PLAYING';
};
// Test seam (same category as _setupForScreenshot/_jumpLevel): returns live
// layout + board geometry so an automated harness can compute exact tap/drop
// pixel coords. No console output; does not mutate state.
window._bbInfo = function () {
  return {
    gs: gs, cell: L.cell, boardX: L.boardX, boardY: L.boardY, boardW: L.boardW, rows: rows, cols: boardCols,
    nestRects: nestRects.map(function (r) { return { x: r.x, y: r.y, w: r.w, h: r.h }; }),
    orderRects: orderRects.map(function (r) { return { x: r.x, y: r.y, w: r.w, h: r.h, tier: r.order.tier }; }),
    board: board.map(function (c) { return c ? { tier: c.tier, wild: !!c.wild } : null; }),
    centers: board.map(function (c, i) { var p = cellCenter(i); return { x: p.x, y: p.y }; }),
    playBtn: playBtnRect, upgrades: metaUpRects,
    bank: meta ? meta.bank : 0, bazaarLevel: meta ? meta.bazaarLevel : 1, streak: meta ? meta.streak : 0,
    idleClaim: idleClaim, dailyClaim: dailyClaim,
    paused: paused, vaultBtn: vaultBtn, resumeBtn: resumeBtn, coins: coins, rowCost: rowCost,
    sprites: board.map(function (c, i) { var p = cellCenter(i); return c ? { dx: Math.round(c.sx - p.x), dy: Math.round(c.sy - p.y) } : null; }),
    // M3 Collection state — tabs, charms, equip slots (drive equip/upgrade in tests)
    vaultTab: vaultTab, tabRects: vaultTabRects, charmTiles: charmTileRects, charmUps: charmUpRects, equipSlots: equipSlotRects,
    equipped: meta ? meta.equipped.slice() : [], charms: meta ? meta.charms : {},
    totalPlayMin: Math.floor(totalPlayMin()), nextCharm: (function () { var n = nextCharm(); return n ? { id: n.id, min: n.min } : null; }()),
    quests: (meta && meta.quests) ? meta.quests.map(function (q) { return { kind: q.kind, goal: q.goal, prog: q.prog, done: q.done, claimed: q.claimed, reward: q.reward }; }) : [],
    questClaims: questClaimRects, claimableQuests: claimableQuests(),
  };
};
// Test seam: force-complete daily quest i (exercise the CLAIM path without grinding).
window._bbWinQuest = function (i) {
  var q = meta && meta.quests && meta.quests[i]; if (!q) return;
  q.prog = q.goal; q.done = true; q.claimed = false; saveMeta();
};
// Test seam: force cumulative playtime (minutes) so the Charm ladder can be exercised
// without real wall-clock waiting. Grants any newly-eligible charms. No console output.
window._bbSetPlay = function (mins) {
  if (!meta) return;
  meta.totalPlaySec = Math.max(0, (+mins || 0) * 60); runPlaySec = 0;
  checkCharmUnlocks(); saveMeta();
};
// Test seam: grant vault gold (exercise upgrade-buy paths without grinding). No console output.
window._bbGrant = function (g) { if (meta) { meta.bank += (+g || 0); saveMeta(); } };
// take_screenshots.js calls _jumpLevel; webapp_gate calls _jumpLevel(1)/(99)
window._jumpLevel = function (n) {
  if (n >= 99) { startGame(); gs = 'GAMEOVER'; return; }
  window._setupForScreenshot(n || 1);
};

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 480,
  designH: 800,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'beast_bazaar',
  onReady: function () {
    try { best = parseInt(localStorage.getItem('beast_bazaar_best') || '0') || 0; } catch (e) {}
    meta = loadMeta();   // owned cross-session progression (bank/upgrades/codex/idle/daily)
    claimOnOpen();       // award overnight idle income + daily login streak bonus
    // Yandex 1.9 — persist run across reload
    GF.persist('beast_bazaar_run_v1',
      function () {
        if (gs !== 'PLAYING') return { gs: gs };
        return {
          gs: gs, score: score, coins: coins, merges: merges, deliveries: deliveries,
          maxTierReached: maxTierReached, shopUnlocked: shopUnlocked, wildcardSeen: wildcardSeen,
          bestCombo: bestCombo, rows: rows, nests: nests, genRechargeMs: genRechargeMs,
          board: board.map(function (c) { return c ? { t: c.tier, w: c.wild ? 1 : 0 } : 0; }),
          orders: orders.map(function (o) { return { t: o.tier, n: o.need, h: o.have, id: o.id }; }),
          nestCharges: nestCharges, firstMergeDone: firstMergeDone, firstDeliveryDone: firstDeliveryDone,
          revealedTier: revealedTier, orderSeq: orderSeq,
        };
      },
      function (s) {
        if (!s) return;
        if (s.gs !== 'PLAYING') return;   // not mid-run → onReady will startGame() (no menu)
        score = s.score || 0; coins = s.coins || 0; merges = s.merges || 0; deliveries = s.deliveries || 0;
        maxTierReached = s.maxTierReached || 0; shopUnlocked = !!s.shopUnlocked; wildcardSeen = !!s.wildcardSeen;
        bestCombo = s.bestCombo || 0; rows = s.rows || boardRows; nests = s.nests || 1;
        genRechargeMs = s.genRechargeMs || 650;
        firstMergeDone = !!s.firstMergeDone; firstDeliveryDone = !!s.firstDeliveryDone;
        revealedTier = s.revealedTier || {}; orderSeq = s.orderSeq || 1;
        board = (s.board || []).map(function (c) { return c ? { tier: c.t, wild: !!c.w, sx: 0, sy: 0, pop: 0 } : null; });
        while (board.length < boardCols * rows) board.push(null);
        // recompute sprite positions on first layout (sx/sy filled lazily in draw via cellCenter)
        for (var i = 0; i < board.length; i++) { if (board[i]) { var p = cellCenter(i); board[i].sx = p.x; board[i].sy = p.y; } }
        orders = (s.orders || []).map(function (o) { return { tier: o.t, need: o.n, have: o.h, id: o.id }; });
        nestCharges = s.nestCharges || [genCharge]; charge = []; for (var k = 0; k < nests; k++) charge[k] = 0;
        gs = 'PLAYING';
      }
    );
    // No menu screen — the game is impossible to "lose-gate" the meta behind, so we boot
    // straight into play. A resumed mid-run keeps its state; anything else starts fresh.
    if (gs !== 'PLAYING') startGame();
    // surface the overnight idle income + daily streak bonus as a brief boot banner
    if (idleClaim > 0 || dailyClaim > 0) bootBannerT = 4.0;
  },
  onUpdate: update,
  onDraw: draw,
});

// ── EXPOSE STATE (post-build-tester cross-checks vs DESIGN.md) ────────────
GF.exposeState(function () {
  return {
    gs: gs, score: score, best: best, coins: coins,
    maxTier: maxTier, maxTierReached: maxTierReached,
    merges: merges, deliveries: deliveries, combo: combo, bestCombo: bestCombo,
    freeCells: freeCells(), shopUnlocked: shopUnlocked, wildcardSeen: wildcardSeen,
    // tunables (DESIGN.md §Tunables)
    boardCols: boardCols, boardRows: boardRows, genCharge: genCharge, genRechargeMs: genRechargeMs,
    baseOrderTier: baseOrderTier, orderTierRampEvery: orderTierRampEvery, coinPerDelivery: coinPerDelivery,
    genCost: genCost, rowCost: rowCost, comboWindowMs: comboWindowMs, wildcardChance: wildcardChance,
    rows: rows, nests: nests, orders: orders.length,
  };
});

})();
</script>
