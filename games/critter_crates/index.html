var SPRITE_NAMES = []; // critters are 100% procedural vector art

// Remote-config defaults (live-ops DATA channel; offline = these defaults)
var CFG = {
  tuning: { price_mult: 1, coin_mult: 1 },
  events: { double_coins: false },
  daily:  { seed: 0 },
  motd:   { en: '', ru: '' },
  version: 0,
};

// ── TUNABLES (DESIGN.md) ──────────────────────────────────────────────────
var REEL_TILE_W = 96, REEL_TILES = 44, REEL_SPIN_MS = 3200;
var TICK_MIN_GAP_MS = 28, PITY_OPENS = 12;
var CRATE_COST_BASE = 100, FREE_COOLDOWN_S = 90;
var STAR_DUPES = 5, XP_PER_OPEN = 10;
// ── M1 CORE META: Critter Bonds + Collection Power + Daily Crate ────────────
var BOND_MAX = 5;            // a critter's bond caps at level 5
var BOND_DUPES_PER_LV = 2;   // duplicates needed to raise a critter's bond one level
var POWER_PER_BOND = 0.6;    // each total bond level adds +0.6% coins on every open
var DAILY_CRATE_THEME = 'meadow'; // daily uses the active theme but is always grantable
var SELL_BASE = { common:12, uncommon:40, rare:160, epic:600, legendary:2400 };
var ODDS = { common:0.80, uncommon:0.16, rare:0.032, epic:0.0064, legendary:0.0026 };
var RARITY_ORDER = ['common','uncommon','rare','epic','legendary'];
var RARITY_VAL = { common:1, uncommon:4, rare:16, epic:64, legendary:256 }; // battle scoring
var RARITY_COL = { common:'#9fb2c9', uncommon:'#5fd36a', rare:'#4aa3ff', epic:'#b06cf0', legendary:'#ffb43c' };
var RARITY_GLOW = { common:'#c7d4e6', uncommon:'#8af09a', rare:'#7cc4ff', epic:'#d49bff', legendary:'#ffd87a' };

// ── CRATE THEMES (each: id, name, tint, unlock level, costMul, critter count) ─
var THEMES = [
  { id:'meadow', en:'Meadow Crate',  ru:'Луговой сундук',  tint:'#5fd36a', bg1:'#13351f', bg2:'#0c1f15', unlock:1, costMul:1,    critters:12 },
  { id:'reef',   en:'Reef Crate',    ru:'Риф-сундук',      tint:'#4aa3ff', bg1:'#0e2a44', bg2:'#0a1830', unlock:3, costMul:2.2,  critters:12 },
  { id:'cosmos', en:'Cosmos Crate',  ru:'Космо-сундук',    tint:'#b06cf0', bg1:'#241038', bg2:'#140a26', unlock:6, costMul:4.8,  critters:14 },
];

// ── SEEDED RNG (deterministic critter look from id) ────────────────────────
function hashStr(s){ var h=2166136261; for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return (h>>>0); }
function seededRand(seed){ var t=seed>>>0; return function(){ t+=0x6D2B79F5; var x=Math.imul(t^(t>>>15),1|t); x^=x+Math.imul(x^(x>>>7),61|x); return ((x^(x>>>14))>>>0)/4294967296; }; }

// ── CRITTER CATALOGUE (theme x index -> deterministic look + rarity) ───────
var CATALOG = [];      // all critters across all themes
var CAT_BY_THEME = {}; // themeId -> [critter,...]
function buildCatalog(){
  CATALOG = []; CAT_BY_THEME = {};
  THEMES.forEach(function(th){
    var arr=[]; var n=th.critters;
    for(var i=0;i<n;i++){
      var r;
      if(i===n-1) r='legendary';
      else if(i>=n-3) r='epic';
      else if(i>=n-6) r='rare';
      else if(i>=n-9) r='uncommon';
      else r='common';
      arr.push(makeCritter(th.id+'_'+i, th.id, r));
    }
    CAT_BY_THEME[th.id]=arr;
    CATALOG=CATALOG.concat(arr);
  });
}
function makeCritter(id, theme, rarity){
  var seed = hashStr(id), rnd = seededRand(seed);
  return {
    id:id, theme:theme, rarity:rarity, seed:seed,
    bodyShape:Math.floor(rnd()*6), hue:Math.floor(rnd()*360), hue2:(Math.floor(rnd()*360)),
    sat:55+Math.floor(rnd()*30), lit:52+Math.floor(rnd()*16),
    pattern:Math.floor(rnd()*5), eyes:Math.floor(rnd()*4),
    accessory:Math.floor(rnd()*6), earType:Math.floor(rnd()*3), mouth:Math.floor(rnd()*4),
  };
}

// ── GAME STATE ────────────────────────────────────────────────────────────
var gs = 'PLAYING';      // PLAYING | OPENING | REVEAL | ALBUM | SHOP | BATTLE | BUST
var coins = 300;
var xp = 0, playerLevel = 1;
var activeTheme = 'meadow';
var inv = {};            // critterId -> count
var starred = {};        // critterId -> true
var bonds = {};          // critterId -> bond level (1..BOND_MAX) — duplicates raise it; OWNED, persisted
var openCount = 0;
var opensSinceRare = 0;  // pity counter
var dailyStreak = 0;
var lastFreeTs = 0;      // ms timestamp of last free crate (90s session-pacing source)
var lastDailyDay = 0;    // calendar day the FREE/session crate last bumped the streak
var lastDailyCrateDay = 0; // calendar day the DAILY (24h) crate was last claimed — the return hook
var welcomeBack = null;  // transient welcome-back toast {power, dailyReady, t}
var welcomeShown = false;// session flag so the toast fires once per load
var tutorialDone = false;
var coachStep = 0;       // 0..3 (3 = done)
var coachActive = false;

var reel = null;         // open reel transient
var reveal = null;       // won critter card transient
var battle = null;       // battle transient

// ── HELPERS ────────────────────────────────────────────────────────────────
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function themeObj(id){ for(var i=0;i<THEMES.length;i++) if(THEMES[i].id===id) return THEMES[i]; return THEMES[0]; }
function themeName(th){ return GF.lang==='ru'? th.ru : th.en; }
function crateCost(themeId){ var th=themeObj(themeId); return Math.round(CRATE_COST_BASE * th.costMul * (CFG.tuning.price_mult||1)); }
function rarityName(r){ return GF.t(r); }
function ownedCount(themeId){ var arr=CAT_BY_THEME[themeId]||[], n=0; for(var i=0;i<arr.length;i++) if(inv[arr[i].id]) n++; return n; }
function totalOwned(){ var n=0; for(var i=0;i<CATALOG.length;i++) if(inv[CATALOG[i].id]) n++; return n; }
function collectionPctTheme(themeId){ var arr=CAT_BY_THEME[themeId]||[]; if(!arr.length) return 0; return Math.round(ownedCount(themeId)/arr.length*100); }
function themeUnlocked(th){ return playerLevel >= th.unlock; }
function critterById(id){ for(var i=0;i<CATALOG.length;i++) if(CATALOG[i].id===id) return CATALOG[i]; return null; }
function dupesSellValue(){ var total=0; for(var id in inv){ if(!inv.hasOwnProperty(id)) continue; var d=inv[id]-1; if(d>0){ var c=critterById(id); if(c) total+=d*SELL_BASE[c.rarity]; } } return total; }
function xpForLevel(lv){ return 40 + lv*30; }
function cheapestCrateCost(){ var min=Infinity; THEMES.forEach(function(th){ if(themeUnlocked(th)) min=Math.min(min, crateCost(th.id)); }); return isFinite(min)?min:CRATE_COST_BASE; }
function freeReady(){ return (Date.now()-lastFreeTs) >= FREE_COOLDOWN_S*1000; }
function freeWaitSec(){ return Math.max(0, Math.ceil((FREE_COOLDOWN_S*1000-(Date.now()-lastFreeTs))/1000)); }
function dayIndex(){ return Math.floor(Date.now()/86400000); }
function canAfford(themeId){ return coins >= crateCost(themeId); }

// ── M1: CRITTER BONDS (duplicates -> owned upgrades) ───────────────────────
// A duplicate is no longer dead weight: BOND_DUPES_PER_LV extra copies raise a
// critter's bond one level (cap BOND_MAX). Bond level is OWNED + persisted and
// sums into Collection Power below. STAR/sell remain untouched (additive).
function bondLevel(id){ return bonds[id]|0; }
function bondProgress(id){ // {lv, into, need} for the album pip + ring
  var lv = bondLevel(id), have = inv[id]||0;
  var spent = lv*BOND_DUPES_PER_LV;            // dupes already consumed by past levels
  var dupes = Math.max(0, have - 1);           // copies beyond the first are "dupes"
  var into = Math.max(0, dupes - spent);       // progress toward the NEXT level
  return { lv:lv, into:Math.min(into,BOND_DUPES_PER_LV), need:BOND_DUPES_PER_LV, maxed:lv>=BOND_MAX };
}
// Auto-raise bond whenever this critter has enough un-spent dupes. Returns the
// number of levels gained this call (0 = none). Called on every acquisition.
function bumpBond(id){
  if(bondLevel(id) >= BOND_MAX) return 0;
  var have=inv[id]||0, dupes=Math.max(0, have-1);
  var target = Math.min(BOND_MAX, Math.floor(dupes / BOND_DUPES_PER_LV));
  var gained = target - bondLevel(id);
  if(gained>0) bonds[id]=target;
  return gained>0? gained : 0;
}
function totalBondLevels(){ var n=0; for(var id in bonds){ if(bonds.hasOwnProperty(id)) n+=bonds[id]|0; } return n; }
// Collection Power: the OWNED, growing reason to exist across sessions. Sum of
// all bond levels -> a permanent +% coins on EVERY open. "My collection makes me
// stronger." Returns the percent (e.g. 18 == +18%).
function collectionPowerPct(){ return Math.round(totalBondLevels()*POWER_PER_BOND*10)/10; }
function collectionPowerMult(){ return 1 + totalBondLevels()*POWER_PER_BOND/100; }

// ── M1: DAILY CRATE (24h reset = the genuine return hook) ──────────────────
// Distinct from the 90s FREE button (session pacing). Resets each CALENDAR day,
// guaranteed Rare+, and is the thing WAITING when a player returns tomorrow.
function dailyCrateReady(){ return dayIndex() !== lastDailyCrateDay; }
function dailyHoursLeft(){ var ms=(lastDailyCrateDay+1)*86400000 - Date.now(); return Math.max(0, Math.ceil(ms/3600000)); }

// ── WEIGHTED DRAW (compute winner FIRST, then animate) ─────────────────────
var ODDS_TOTAL = (function(){ var t=0; RARITY_ORDER.forEach(function(n){ t+=ODDS[n]; }); return t; })(); // normalize so the stated tail prob is exact
function drawRarity(forcePity){
  var r = Math.random()*ODDS_TOTAL, acc=0, picked='common';   // roll over the real total weight
  for(var i=0;i<RARITY_ORDER.length;i++){ var name=RARITY_ORDER[i]; acc+=ODDS[name]; if(r<=acc){ picked=name; break; } picked=name; }
  if(forcePity){
    var idx=RARITY_ORDER.indexOf(picked);
    if(idx < 2){
      var sub=RARITY_ORDER.slice(2), tot=0; sub.forEach(function(n){ tot+=ODDS[n]; });
      var rr2=Math.random()*tot, a2=0, p2=sub[0];
      for(var j=0;j<sub.length;j++){ a2+=ODDS[sub[j]]; if(rr2<=a2){ p2=sub[j]; break; } p2=sub[j]; }
      picked=p2;
    }
  }
  return picked;
}
function drawCritter(themeId, noPity, forceRarePlus){
  // noPity: skip the pity floor (used for battle/bot draws so they neither
  // consume nor benefit from the player's main-loop pity counter).
  // forceRarePlus: the daily crate guarantees Rare-or-better regardless of pity.
  var pity = forceRarePlus || (!noPity && opensSinceRare >= (PITY_OPENS-1));
  var rarity = drawRarity(pity);
  var arr = CAT_BY_THEME[themeId]||[];
  var pool = arr.filter(function(c){ return c.rarity===rarity; });
  if(!pool.length){ for(var i=RARITY_ORDER.indexOf(rarity); i>=0 && !pool.length; i--){ pool=arr.filter(function(c){ return c.rarity===RARITY_ORDER[i]; }); } }
  if(!pool.length) pool=arr.slice();
  return pool[Math.floor(Math.random()*pool.length)];
}

// ── OPENING A CRATE (the catch) ────────────────────────────────────────────
// mode: 'paid' (default, spends coins) | 'free' (the daily FREE crate, sets the
// cooldown + bumps streak) | 'bonus' (rewarded bonus, no coin cost, does NOT
// touch the free cooldown or streak). Back-compat: startOpen(true)==='free'.
function startOpen(mode){
  if(mode===true) mode='free'; if(mode===false||mode==null) mode='paid';
  if(gs==='OPENING') return;
  var themeId = activeTheme;
  var forceRarePlus = false;
  if(mode==='paid'){
    if(!canAfford(themeId)){ maybeBust(); return; }
    coins -= crateCost(themeId);
  } else if(mode==='free'){
    lastFreeTs = Date.now();
    var d=dayIndex();
    if(d !== lastDailyDay){ dailyStreak = (lastDailyDay===0 || d===lastDailyDay+1)? dailyStreak+1 : 1; lastDailyDay=d; }
  } else if(mode==='daily'){
    // The 24h DAILY crate: guaranteed Rare+, advances the streak, sets the 24h
    // gate. This is the return hook (kept separate from the 90s free cooldown).
    var dd=dayIndex();
    if(dd !== lastDailyCrateDay){ dailyStreak = (lastDailyCrateDay===0 || dd===lastDailyCrateDay+1)? dailyStreak+1 : 1; }
    lastDailyCrateDay = dd; lastDailyDay = dd;
    forceRarePlus = true;
  } // 'bonus' costs nothing and leaves cooldown/streak untouched
  GF.sfx('click');
  var won = drawCritter(themeId, false, forceRarePlus);   // 1) winner FIRST (daily forces Rare+)
  if(RARITY_ORDER.indexOf(won.rarity) >= 2) opensSinceRare=0; else opensSinceRare++;
  openCount++;
  var coinGain = Math.round((6 + Math.random()*10) * themeObj(themeId).costMul * (CFG.tuning.coin_mult||1) * collectionPowerMult());
  reel = buildReel(themeId, won, coinGain, mode!=='paid');   // 2) reel lands on it
  gs = 'OPENING';
  GF.gameStarted();
  saveAll();
  if(coachActive && coachStep===0) nextCoach();
}
function buildReel(themeId, won, coinGain, free){
  var arr = CAT_BY_THEME[themeId]||[];
  function filler(){
    var r=Math.random();
    var want = r<0.7?'common': r<0.92?'uncommon': r<0.985?'rare': r<0.997?'epic':'legendary';
    var pool=arr.filter(function(c){ return c.rarity===want; });
    if(!pool.length) pool=arr;
    return pool[Math.floor(Math.random()*pool.length)];
  }
  var WIN_INDEX = REEL_TILES - 6;
  var tiles=[];
  for(var i=0;i<REEL_TILES;i++) tiles.push(i===WIN_INDEX ? won : filler());
  return { tiles:tiles, won:won, winIndex:WIN_INDEX, theme:themeId,
    offset:0, targetOffset:0, t:0, dur:REEL_SPIN_MS/1000,
    lastTickTile:-1, lastTickMs:0, coinGain:coinGain, free:!!free,
    started:false, fast:false, settleDone:false };
}
function easeOutQuint(t){ return 1 - Math.pow(1-t, 5); }
function computeReelTarget(){
  var tileW = REEL_TILE_W*GF.S;
  reel.targetOffset = (reel.winIndex)*tileW; // land PRECISELY centered on the won tile
}
function updateOpen(dt){
  if(!reel) return;
  if(!reel.started){ reel.started=true; computeReelTarget(); }
  var spd = reel.fast? 3.4 : 1;
  reel.t += dt*spd;
  var prog = clamp(reel.t/reel.dur, 0, 1);
  reel.offset = easeOutQuint(prog) * reel.targetOffset;
  var tileW=REEL_TILE_W*GF.S;
  var curTile = Math.floor(reel.offset / tileW);
  var nowMs=(typeof performance!=='undefined'?performance.now():Date.now());
  if(curTile !== reel.lastTickTile && nowMs-reel.lastTickMs >= TICK_MIN_GAP_MS && prog<0.999){
    reel.lastTickTile=curTile; reel.lastTickMs=nowMs;
    if(!GF.muted) GF.tone(640 + (curTile%5)*40, 0.03, 'square', 0.05);
  }
  if(prog>=1 && !reel.settleDone){ reel.settleDone=true; finishOpen(); }
}
function finishOpen(){
  var won=reel.won, coinGain=reel.coinGain;
  var isNew = !inv[won.id];
  inv[won.id]=(inv[won.id]||0)+1;
  var bondGain = bumpBond(won.id);   // a dupe now strengthens the bond instead of being dead weight
  coins += coinGain;
  xp += XP_PER_OPEN; var leveled=false;
  while(xp >= xpForLevel(playerLevel)){ xp -= xpForLevel(playerLevel); playerLevel++; leveled=true; }
  reveal = { critter:won, isNew:isNew, coinGain:coinGain, leveled:leveled, bondGain:bondGain, bondLv:bondLevel(won.id) };
  gs='REVEAL';
  var rcol=RARITY_GLOW[won.rarity], ri=RARITY_ORDER.indexOf(won.rarity);
  GF.juice.flash(rcol, 220+ri*90, 0.25+ri*0.12);
  GF.juice.shake(4+ri*5, 240+ri*60);
  GF.juice.particles.burst(GF.cx, GF.cy-20*GF.S, { count:18+ri*16, colors:[rcol, RARITY_COL[won.rarity], '#fff'], speed:160+ri*70, gravity:300, life:0.7+ri*0.15, size:5+ri });
  if(ri>=2){ GF.sfx(ri>=3?'win':'reward'); GF.funnel.mark('first_upgrade'); } else GF.sfx('pickup');
  if(coinGain>0) GF.juice.floatText(GF.cx+70*GF.S, GF.cy+60*GF.S, '+'+coinGain, { color:'#ffd34d', size:18 });
  if(bondGain>0){ setTimeout(function(){ if(!GF.muted) GF.sfx('evolve'); }, 200); GF.juice.particles.burst(GF.cx, GF.cy+10*GF.S, { count:18, colors:['#7cf0c4','#4ad3a0','#fff'], speed:150, gravity:200, life:0.7, size:4 }); }
  if(leveled) setTimeout(function(){ if(!GF.muted) GF.sfx('levelup'); }, 260);
  GF.gameEnded();
  saveAll();
}
function dismissReveal(){ reveal=null; gs='PLAYING'; GF.sfx('tap'); saveAll(); }
function sellRevealNow(){
  if(!reveal) return;
  var c=reveal.critter;
  if((inv[c.id]||0) > 1){
    inv[c.id]--; if(inv[c.id]<=0) delete inv[c.id];
    var v=SELL_BASE[c.rarity]; coins+=v;
    GF.sfx('coin'); GF.juice.floatText(GF.cx, GF.cy, '+'+v, { color:'#ffd34d', size:20 });
  }
  dismissReveal();
}

// ── SELL / STAR ─────────────────────────────────────────────────────────────
function sellDupe(id){
  var c=critterById(id); if(!c) return false;
  if((inv[id]||0) <= 1) return false;
  inv[id]--; var v=SELL_BASE[c.rarity]; coins+=v;
  GF.sfx('coin'); coinHud.pop=6;
  GF.juice.floatText(GF.cx, GF.H*0.32, GF.t('sold')+' +'+v, { color:'#ffd34d', size:18 });
  saveAll();
  if(coachActive && coachStep===1) nextCoach();
  return true;
}
function sellAllDupes(){
  var got=0, any=false;
  for(var id in inv){ if(!inv.hasOwnProperty(id)) continue; while((inv[id]||0)>1){ var c=critterById(id); if(!c) break; inv[id]--; got+=SELL_BASE[c.rarity]; any=true; } }
  if(any){ coins+=got; GF.sfx('coin'); coinHud.pop=8; GF.juice.floatText(GF.cx, GF.H*0.3, '+'+got, { color:'#ffd34d', size:22 }); saveAll(); if(coachActive && coachStep===1) nextCoach(); }
  return any;
}
function starCritter(id){
  if(starred[id]) return false;
  if((inv[id]||0) >= STAR_DUPES+1){
    inv[id] -= STAR_DUPES; starred[id]=true;   // prestige; NOT a trade-up (no new item)
    GF.sfx('unlock'); GF.juice.flash('#ffd87a',300,0.4);
    GF.juice.particles.burst(GF.cx, GF.H*0.4, { count:40, colors:['#ffd87a','#ffb43c','#fff'], speed:220, life:0.9, size:6 });
    saveAll(); return true;
  }
  GF.sfx('error'); return false;
}

// ── SHOP (crate select) ──────────────────────────────────────────────────
function selectTheme(themeId){
  var th=themeObj(themeId);
  if(!themeUnlocked(th)){ GF.sfx('error'); return; }
  activeTheme=themeId; GF.sfx('tap'); closeOverlay();
  if(coachActive && coachStep===2) nextCoach();
  saveAll();
}

// ── BUST (dead broke recovery) ─────────────────────────────────────────────
function maybeBust(){
  if(coins < cheapestCrateCost() && dupesSellValue() <= 0){ gs='BUST'; }
  else if(coins < cheapestCrateCost()){ GF.sfx('error'); GF.juice.floatText(GF.cx, GF.H*0.7, GF.t('sellall'), { color:'#ffd34d', size:16 }); }
  else GF.sfx('error');
}
// BUST recovery honors the same 90s free cooldown as the main FREE button - it
// does NOT zero lastFreeTs (that allowed repeatable farming while broke). If the
// free crate isn't ready yet, the button is inert and the countdown shows; the
// rewarded bonus is the always-available escape (a confirmed-reward flow).
function claimFreeFromBust(){ if(!freeReady()){ GF.sfx('error'); return; } gs='PLAYING'; startOpen(true); }
// Rewarded bonus crate: a SEPARATE grant that opens a free crate WITHOUT touching
// the daily-free cooldown (it's gated by a confirmed rewarded-video on platforms;
// on the gallery/local there is no ad so it grants directly).
function grantBonusCrate(){ gs='PLAYING'; startOpen('bonus'); }

// ── SHOWDOWN MODE (NON-WAGERED: free entry, winner earns a coin BONUS, no stake
// is ever risked or lost; you keep every critter you open) ───────────────────
// Bots are tagged by a short neutral label (not an English word) so RU reads clean.
var BOT_TAGS = ['B1','B2','B3'];
var battleRivals = 2;
var BATTLE_BONUS_BASE = 120;   // coin bonus the WINNER earns (free-entry prize, scales with rivals)
function startBattle(rivals){
  rivals = clamp(rivals|0, 1, 3);
  // FREE entry - nothing is spent, nothing can be lost.
  var prize = BATTLE_BONUS_BASE * rivals;
  battle = { rivals:rivals, prize:prize, done:false, playerWon:false, results:[], reels:[], t:0, dur:2.4, phase:'spin', isNew:false };
  // Player draw counts toward the MAIN loop's pity (it's a real open); bots use
  // a no-pity draw so they neither consume nor benefit from the player's pity.
  var playerWon = drawCritter(activeTheme);
  if(RARITY_ORDER.indexOf(playerWon.rarity) >= 2) opensSinceRare=0; else opensSinceRare++;
  openCount++;
  battle.results.push({ name:GF.t('you'), critter:playerWon, total:RARITY_VAL[playerWon.rarity], isPlayer:true });
  battle.reels.push(buildReel(activeTheme, playerWon, 0, true));
  for(var e=1;e<=rivals;e++){
    var won=drawCritter(activeTheme, true);   // noPity bot draw
    battle.results.push({ name:BOT_TAGS[(e-1)%BOT_TAGS.length], critter:won, total:RARITY_VAL[won.rarity], isPlayer:false });
    battle.reels.push(buildReel(activeTheme, won, 0, true));
  }
  gs='BATTLE'; GF.sfx('click'); saveAll();
}
function resolveBattle(){
  var best=-1, wi=0;
  for(var i=0;i<battle.results.length;i++){ if(battle.results[i].total>best){ best=battle.results[i].total; wi=i; } }
  battle.playerWon = battle.results[wi].isPlayer;
  var pc=battle.results[0].critter;
  battle.isNew = !inv[pc.id];
  inv[pc.id]=(inv[pc.id]||0)+1;   // you ALWAYS keep your critter
  bumpBond(pc.id);                // and it can strengthen the bond
  xp += XP_PER_OPEN; while(xp>=xpForLevel(playerLevel)){ xp-=xpForLevel(playerLevel); playerLevel++; }
  if(battle.playerWon){ coins+=battle.prize; GF.sfx('win'); GF.juice.flash('#ffd87a',300,0.4); GF.juice.particles.burst(GF.cx,GF.cy,{count:46,colors:['#ffd87a','#ffb43c','#fff'],speed:240,life:1,size:6}); GF.happytime(); }
  else GF.sfx('lose');   // no penalty on a loss - just no bonus
  battle.done=true; battle.phase='result'; saveAll();
}

// ── COACH (interactive tutorial, action-gated) ─────────────────────────────
function startCoach(){ if(tutorialDone){ coachActive=false; return; } coachActive=true; coachStep=0; }
function nextCoach(){
  coachStep++;
  if(coachStep>=3){ coachActive=false; tutorialDone=true; GF.funnel.mark('tutorial_done'); try{ localStorage.setItem('cc_tut_v1','1'); }catch(e){} saveAll(); }
  else GF.sfx('tap');
}
function reopenCoach(){ tutorialDone=false; coachActive=true; coachStep=0; }
function coachText(){ return coachActive? GF.t('coach'+(coachStep+1)) : null; }

// ── PERSISTENCE ─────────────────────────────────────────────────────────────
function saveAll(){ GF.saveRun(); }
function snapshot(){
  return { v:2, coins:coins, xp:xp, lvl:playerLevel, theme:activeTheme, inv:inv, star:starred, bonds:bonds,
    oc:openCount, osr:opensSinceRare, streak:dailyStreak, lastFree:lastFreeTs, lastDay:lastDailyDay,
    lastDaily:lastDailyCrateDay, tut:tutorialDone };
}
function restore(s){
  if(!s) return;
  coins=(typeof s.coins==='number')?s.coins:300;
  xp=s.xp|0; playerLevel=Math.max(1, s.lvl|0||1);
  activeTheme=s.theme||'meadow';
  inv=(s.inv&&typeof s.inv==='object')?s.inv:{};
  starred=(s.star&&typeof s.star==='object')?s.star:{};
  bonds=(s.bonds&&typeof s.bonds==='object')?s.bonds:{};
  openCount=s.oc|0; opensSinceRare=s.osr|0;
  dailyStreak=s.streak|0; lastFreeTs=s.lastFree|0; lastDailyDay=s.lastDay|0;
  lastDailyCrateDay=s.lastDaily|0;
  tutorialDone=!!s.tut;
  for(var id in inv){ if(inv.hasOwnProperty(id)){ inv[id]=Math.max(0, inv[id]|0); if(!inv[id]||!critterById(id)) delete inv[id]; } }
  for(var bid in bonds){ if(bonds.hasOwnProperty(bid)){ bonds[bid]=clamp(bonds[bid]|0,0,BOND_MAX); if(!bonds[bid]||!critterById(bid)) delete bonds[bid]; } }
}

// ── LAYOUT (rects recomputed each frame) ────────────────────────────────────
var L = {};
var coinHud = { pop:0 };
function layout(){
  var W=GF.W, H=GF.H, S=GF.S, cx=GF.cx;
  L.W=W; L.H=H; L.S=S;
  var barH = clamp(150*S, 110, 200);
  L.barY = H - barH;
  var ow = clamp(300*S, 200, Math.min(440, W-40*S)), oh = clamp(80*S, 56, 100);
  L.open = { x: cx-ow/2, y: L.barY + 8*S, w: ow, h: oh };
  var tabY = L.open.y + oh + 12*S, tabH = clamp(48*S, 38, 64), pad = 8*S;
  var totalW = Math.min(W - 24*S, 480*S), startX = cx - totalW/2, tw = (totalW - pad*3)/4;
  L.tabs = {
    album: { x:startX, y:tabY, w:tw, h:tabH },
    shop:  { x:startX+(tw+pad), y:tabY, w:tw, h:tabH },
    battle:{ x:startX+(tw+pad)*2, y:tabY, w:tw, h:tabH },
    free:  { x:startX+(tw+pad)*3, y:tabY, w:tw, h:tabH },
  };
  L.coin = { x:14*S, y:14*S, w:clamp(150*S,110,200), h:clamp(34*S,26,44) };
  L.xpbar = { x:14*S, y:L.coin.y+L.coin.h+6*S, w:clamp(170*S,120,230), h:clamp(12*S,8,18) };
  L.mute = { x:W-30*S, y:24*S, r:clamp(15*S,12,20) };
  L.help = { x:W-66*S, y:24*S, r:clamp(15*S,12,20) };
  L.crate = { cx:cx, cy:clamp(H*0.40, 180, L.barY-150*S), r:clamp(110*S,70,150) };
  L.reel = { cx:cx, cy:clamp(H*0.42, 170, L.barY-140*S), w:Math.min(W-20*S, 560*S), h:clamp(150*S,110,180) };
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx){
  layout();
  var W=GF.W, H=GF.H;
  var th=themeObj(activeTheme);
  var g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,th.bg1); g.addColorStop(1,th.bg2);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  drawBokeh(ctx);

  if(gs==='OPENING'){ drawRoom(ctx, true); drawReel(ctx); }
  else if(gs==='REVEAL'){ drawRoom(ctx, true); drawReveal(ctx); }
  else if(gs==='BATTLE'){ drawBattle(ctx); }
  else { drawRoom(ctx, false); }

  if(gs==='ALBUM') drawAlbum(ctx);
  if(gs==='SHOP') drawShop(ctx);
  if(gs==='BUST') drawBust(ctx);

  drawCoach(ctx);
  if(welcomeBack) drawWelcomeBack(ctx);

  GF.juice.particles.draw(ctx);
  GF.juice.texts.draw(ctx);
  GF.juice.drawFlash(ctx);
}
// M1: the returning-player surface — fades in/out on boot when the player has
// progress, naming what's grown (Collection Power) and what's WAITING (daily).
function drawWelcomeBack(ctx){
  var W=GF.W,H=GF.H,S=GF.S, wb=welcomeBack;
  var fade = wb.t<0.3? wb.t/0.3 : (wb.t>3.8? Math.max(0,(4.4-wb.t)/0.6) : 1);
  var w=clamp(300*S,230,360), lines=wb.dailyReady?3:2, h=clamp((68+lines*22)*S, 92, 168);
  var x=W/2-w/2, y=H*0.30-h/2;
  ctx.save(); ctx.globalAlpha=fade;
  ctx.shadowColor='rgba(124,240,196,0.5)'; ctx.shadowBlur=18*S;
  rr(ctx,x,y,w,h,16*S);
  var g=ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0,'#1b2f44'); g.addColorStop(1,'#101a2a');
  ctx.fillStyle=g; ctx.fill();
  ctx.shadowBlur=0; ctx.lineWidth=1.5*S; ctx.strokeStyle='rgba(124,240,196,0.45)'; ctx.stroke();
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#fff'; ctx.font='bold '+clamp(20*S,16,26)+'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('wb_title'), W/2, y+clamp(34*S,26,42));
  ctx.fillStyle='#cfffe9'; ctx.font='bold '+clamp(14*S,11,18)+'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('wb_power')+': +'+wb.power+'% '+GF.t('coin_bonus'), W/2, y+clamp(62*S,50,78));
  if(wb.dailyReady){
    ctx.fillStyle='#ffd76a'; ctx.font='bold '+clamp(14*S,11,18)+'px Inter, system-ui, sans-serif';
    ctx.fillText('★ '+GF.t('wb_daily'), W/2, y+clamp(86*S,72,108));
  }
  ctx.restore();
}

function drawBokeh(ctx){
  var W=GF.W,H=GF.H,S=GF.S;
  var t=(typeof performance!=='undefined'?performance.now():Date.now())/1000;
  ctx.save();
  for(var i=0;i<10;i++){
    var bx=((i*97.3)%100)/100*W;
    var by=((Math.sin(t*0.2+i)*0.5+0.5))*H;
    var br=(18+(i%4)*12)*S;
    ctx.globalAlpha=0.05; ctx.fillStyle= i%2? themeObj(activeTheme).tint : '#ffffff';
    ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawRoom(ctx, busy){
  var S=GF.S;
  drawHUD(ctx);
  if(!busy){
    drawCrate(ctx, L.crate.cx, L.crate.cy, L.crate.r, themeObj(activeTheme));
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillStyle='#fff'; ctx.font='bold '+clamp(22*S,16,30)+'px Inter, system-ui, sans-serif';
    ctx.fillText(themeName(themeObj(activeTheme)), L.crate.cx, L.crate.cy - L.crate.r - 18*S);
    drawCollectionBar(ctx, L.crate.cx, L.crate.cy + L.crate.r + 24*S);
    if(dailyStreak>0){
      ctx.fillStyle='#9fb2c9'; ctx.font='bold '+clamp(12*S,10,15)+'px Inter, system-ui, sans-serif';
      ctx.fillText(GF.t('streak')+': '+dailyStreak, L.crate.cx, L.crate.cy + L.crate.r + 50*S);
    }
    drawDailyCrate(ctx);
  } else { L._dailyBtn=null; }
  drawBottomBar(ctx);
}
// M1: the DAILY (24h) crate — the genuine return hook. A glowing tappable pill
// above the crate when ready (what a returning player SEES is waiting); a quiet
// "Daily next in Nh" when on cooldown.
function drawDailyCrate(ctx){
  var S=GF.S, cx=L.crate.cx, y=L.crate.cy - L.crate.r - clamp(58*S,42,76);
  if(dailyCrateReady()){
    var w=clamp(208*S,160,260), h=clamp(40*S,32,52), x=cx-w/2;
    var t=(typeof performance!=='undefined'?performance.now():Date.now())/1000;
    var pulse=0.5+0.5*Math.sin(t*3);
    L._dailyBtn={ x:x, y:y, w:w, h:h };
    ctx.save();
    ctx.shadowColor='rgba(255,196,80,'+(0.4+pulse*0.45)+')'; ctx.shadowBlur=(14+pulse*16)*S;
    rr(ctx,x,y,w,h,h/2);
    var g=ctx.createLinearGradient(x,y,x,y+h); g.addColorStop(0,'#ffd76a'); g.addColorStop(1,'#ff9f2e');
    ctx.fillStyle=g; ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#5a3500'; drawGiftIcon(ctx, x+h*0.6, y+h/2, h*0.26);
    ctx.fillStyle='#3a2200'; ctx.font='bold '+clamp(15*S,12,20)+'px Inter, system-ui, sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(GF.t('daily')+' • '+GF.t('free'), x+h*1.0, y+h/2+0.5);
    ctx.restore();
  } else {
    L._dailyBtn=null;
    ctx.save();
    ctx.fillStyle='rgba(159,178,201,0.85)'; ctx.font='bold '+clamp(11*S,9,14)+'px Inter, system-ui, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(GF.t('daily_done')+' • '+GF.t('next_in')+' '+dailyHoursLeft()+GF.t('hr'), cx, y+clamp(20*S,16,26));
    ctx.restore();
  }
}

function drawHUD(ctx){
  var S=GF.S, cb=L.coin, pop=coinHud.pop||0;
  ctx.save();
  rr(ctx, cb.x, cb.y - pop, cb.w, cb.h + pop*0.5, cb.h/2);

  GF.drawMuteIcon(ctx, L.mute.x, L.mute.y, L.mute.r, GF.muted);

}
// M1: the OWNED, growing stat — "my collection makes me stronger". Always
// visible in the HUD so the meta is legible outside the album.
function drawPowerChip(ctx){
  var S=GF.S, pct=collectionPowerPct();
  var w=clamp(112*S,84,150), h=clamp(30*S,24,40), x=L.coin.x, y=L.xpbar.y+L.xpbar.h+8*S;
  L.power={ x:x, y:y, w:w, h:h };
  ctx.save();
  rr(ctx,x,y,w,h,h/2);
  ctx.fillStyle= pct>0? 'rgba(18,40,32,0.78)':'rgba(8,10,22,0.6)'; ctx.fill();
  if(pct>0){ ctx.lineWidth=1.5*S; ctx.strokeStyle='rgba(124,240,196,0.55)'; ctx.stroke(); }
  // little bonded-heart mark
  var hx=x+h*0.55, hy=y+h/2, hr=h*0.2;
  ctx.fillStyle= pct>0? '#7cf0c4':'#5b6578';
  ctx.beginPath();
  ctx.moveTo(hx,hy+hr*0.9);
  ctx.bezierCurveTo(hx-hr*1.4,hy-hr*0.4, hx-hr*0.5,hy-hr*1.3, hx,hy-hr*0.4);
  ctx.bezierCurveTo(hx+hr*0.5,hy-hr*1.3, hx+hr*1.4,hy-hr*0.4, hx,hy+hr*0.9);
  ctx.fill();
  ctx.fillStyle= pct>0? '#cfffe9':'#9fb2c9'; ctx.font='bold '+clamp(13*S,11,17)+'px Inter, system-ui, sans-serif';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(GF.t('power')+' +'+pct+'%', x+h*0.95, y+h/2+0.5);
  ctx.restore();
}

function drawCollectionBar(ctx, cx, y){
  var S=GF.S, th=themeObj(activeTheme);
  var owned=ownedCount(activeTheme), total=(CAT_BY_THEME[activeTheme]||[]).length;
  var w=clamp(240*S,170,320), h=clamp(20*S,15,26), x=cx-w/2;
  ctx.fillStyle='rgba(8,10,22,0.6)'; rr(ctx,x,y,w,h,h/2); ctx.fill();
  var frac=total?owned/total:0;
  var grad=ctx.createLinearGradient(x,0,x+w,0); grad.addColorStop(0,th.tint); grad.addColorStop(1,'#ffffff');
  ctx.fillStyle=grad; rr(ctx,x,y,Math.max(h,w*frac),h,h/2); ctx.fill();
  ctx.fillStyle='#0b1020'; ctx.font='bold '+clamp(12*S,10,15)+'px Inter, system-ui, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(owned+' / '+total+' '+GF.t('owned'), cx, y+h/2+1);
}

function drawBottomBar(ctx){
  var canOpen=canAfford(activeTheme);

function drawBigButton(ctx, r, label, c1, c2, pulse, txtCol, cost){
  var S=GF.S;
  var t=(typeof performance!=='undefined'?performance.now():Date.now())/1000;
  var k= pulse? (1+0.03*Math.sin(t*2.4)) : 1;
  var w=r.w*k, h=r.h*k, x=r.x+(r.w-w)/2, y=r.y+(r.h-h)/2;
  ctx.save();
  if(pulse){ ctx.shadowColor='rgba(46,224,122,0.5)'; ctx.shadowBlur=20*S; }
  var grad=ctx.createLinearGradient(x,y,x,y+h); grad.addColorStop(0,c1); grad.addColorStop(1,c2);
  rr(ctx,x,y,w,h,h*0.32); ctx.fillStyle=grad; ctx.fill();
  ctx.restore();
  ctx.fillStyle=txtCol||'#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  if(cost!=null){
    ctx.font='bold '+clamp(24*S,16,32)+'px Inter, system-ui, sans-serif';
    ctx.fillText(label, r.x+r.w/2, r.y+r.h/2 - 9*S);
    ctx.font='bold '+clamp(14*S,11,18)+'px Inter, system-ui, sans-serif';
    var costStr=formatNum(cost), cw=ctx.measureText(costStr).width, icx=r.x+r.w/2 - cw/2 - 10*S;
    drawCoinIcon(ctx, icx, r.y+r.h/2+13*S, 7*S);
    ctx.fillStyle='#fff7d0'; ctx.textAlign='left';
    ctx.fillText(costStr, icx+10*S, r.y+r.h/2+14*S);
  } else {
    ctx.font='bold '+clamp(22*S,15,30)+'px Inter, system-ui, sans-serif';
    ctx.fillText(label, r.x+r.w/2, r.y+r.h/2+1);
  }
}

function drawTab(ctx, r, label, kind, glow){
  var S=GF.S;
  ctx.save();
  if(glow){ var t=(typeof performance!=='undefined'?performance.now():Date.now())/1000; ctx.shadowColor='rgba(255,200,60,'+(0.4+0.3*Math.sin(t*4))+')'; ctx.shadowBlur=16*S; }
  rr(ctx, r.x, r.y, r.w, r.h, r.h*0.3);
  ctx.fillStyle= glow? 'rgba(70,50,12,0.9)' : 'rgba(20,26,42,0.85)';
  ctx.fill();
  ctx.restore();
  var iy=r.y+r.h*0.34;
  ctx.fillStyle= glow? '#ffd34d':'#bcd'; ctx.strokeStyle=ctx.fillStyle;
  if(kind==='album') drawAlbumIcon(ctx, r.x+r.w/2, iy, r.h*0.2);
  else if(kind==='shop') drawCrateMini(ctx, r.x+r.w/2, iy, r.h*0.22);
  else if(kind==='battle') drawBattleIcon(ctx, r.x+r.w/2, iy, r.h*0.2);
  else if(kind==='free') drawGiftIcon(ctx, r.x+r.w/2, iy, r.h*0.2);
  ctx.fillStyle= glow? '#ffe9a8':'#cdd6ea'; ctx.font='bold '+clamp(11*S,9,14)+'px Inter, system-ui, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label, r.x+r.w/2, r.y+r.h*0.74);
}

// ── REEL DRAW (the catch) ───────────────────────────────────────────────────
function drawReel(ctx){
  var S=GF.S, rv=L.reel;
  var x0=rv.cx-rv.w/2, y0=rv.cy-rv.h/2;
  ctx.save();
  rr(ctx, x0, y0, rv.w, rv.h, 14*S);
  ctx.fillStyle='rgba(6,8,18,0.92)'; ctx.fill();
  ctx.clip();
  var tileW=REEL_TILE_W*S;
  var originX = rv.cx - reel.offset - tileW/2;
  for(var i=0;i<reel.tiles.length;i++){
    var tx=originX + i*tileW;
    if(tx+tileW < x0 || tx > x0+rv.w) continue;
    drawReelTile(ctx, tx+tileW/2, rv.cy, tileW, rv.h, reel.tiles[i]);
  }
  ctx.restore();
  ctx.save();
  ctx.strokeStyle='#ffd34d'; ctx.lineWidth=3*S; ctx.shadowColor='#ffd34d'; ctx.shadowBlur=10*S;
  ctx.beginPath(); ctx.moveTo(rv.cx, y0-4*S); ctx.lineTo(rv.cx, y0+rv.h+4*S); ctx.stroke();
  ctx.fillStyle='#ffd34d';
  ctx.beginPath(); ctx.moveTo(rv.cx-8*S, y0-4*S); ctx.lineTo(rv.cx+8*S, y0-4*S); ctx.lineTo(rv.cx, y0+8*S); ctx.fill();
  ctx.beginPath(); ctx.moveTo(rv.cx-8*S, y0+rv.h+4*S); ctx.lineTo(rv.cx+8*S, y0+rv.h+4*S); ctx.lineTo(rv.cx, y0+rv.h-8*S); ctx.fill();
  ctx.restore();
  ctx.fillStyle='rgba(220,230,255,0.7)'; ctx.font=clamp(13*S,11,16)+'px Inter, system-ui, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText(GF.t('skip'), rv.cx, y0+rv.h+30*S);
  ctx.fillStyle='#fff'; ctx.font='bold '+clamp(18*S,14,24)+'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('spin'), rv.cx, y0-18*S);
}
function drawReelTile(ctx, cx, cy, tileW, tileH, critter){
  var S=GF.S, rcol=RARITY_COL[critter.rarity], pad=6*S;
  ctx.save();
  rr(ctx, cx-tileW/2+pad, cy-tileH/2+pad, tileW-pad*2, tileH-pad*2, 10*S);
  var g=ctx.createLinearGradient(0, cy-tileH/2, 0, cy+tileH/2);
  g.addColorStop(0, shade(rcol,-0.45)); g.addColorStop(1, shade(rcol,-0.7));
  ctx.fillStyle=g; ctx.fill();
  ctx.lineWidth=2*S; ctx.strokeStyle=rcol; ctx.stroke();
  ctx.restore();
  drawCritterArt(ctx, cx, cy-4*S, Math.min(tileW,tileH)*0.6, critter);
}

// ── REVEAL DRAW ─────────────────────────────────────────────────────────────
function drawReveal(ctx){
  var W=GF.W,H=GF.H,S=GF.S;
  ctx.fillStyle='rgba(6,7,16,0.82)'; ctx.fillRect(0,0,W,H);
  var c=reveal.critter, rcol=RARITY_COL[c.rarity], rglow=RARITY_GLOW[c.rarity], ri=RARITY_ORDER.indexOf(c.rarity);
  var cw=clamp(260*S,200,340), ch=clamp(320*S,260,420), cx=W/2, cy=H*0.45, x=cx-cw/2, y=cy-ch/2;
  if(ri>=2){
    ctx.save(); ctx.translate(cx, cy-20*S);
    var t=(typeof performance!=='undefined'?performance.now():Date.now())/1000; ctx.rotate(t*0.4); ctx.globalAlpha=0.16;
    for(var k=0;k<12;k++){ ctx.rotate(Math.PI*2/12); ctx.fillStyle=rglow; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-12*S, -ch*0.7); ctx.lineTo(12*S, -ch*0.7); ctx.fill(); }
    ctx.restore();
  }
  ctx.save();
  ctx.shadowColor=rglow; ctx.shadowBlur=(20+ri*12)*S;
  rr(ctx,x,y,cw,ch,18*S);
  var g=ctx.createLinearGradient(0,y,0,y+ch); g.addColorStop(0, shade(rcol,-0.35)); g.addColorStop(1, shade(rcol,-0.66));
  ctx.fillStyle=g; ctx.fill();
  ctx.lineWidth=3*S; ctx.strokeStyle=rcol; ctx.stroke();
  ctx.restore();
  drawCritterArt(ctx, cx, cy-30*S, cw*0.5, c);
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillStyle=rglow; ctx.font='bold '+clamp(20*S,15,28)+'px Inter, system-ui, sans-serif';
  ctx.fillText(rarityName(c.rarity), cx, cy+cw*0.34);
  if(reveal.isNew){
    ctx.save(); ctx.shadowColor=rglow; ctx.shadowBlur=12*S; ctx.fillStyle='#fff'; ctx.font='bold '+clamp(16*S,12,22)+'px Inter, system-ui, sans-serif';
    ctx.fillText(GF.t('newcr'), cx, y+26*S); ctx.restore();
  } else {
    ctx.fillStyle='#cdd6ea'; ctx.font='bold '+clamp(14*S,11,18)+'px Inter, system-ui, sans-serif';
    ctx.fillText('x'+inv[c.id]+' '+GF.t('dupe'), cx, y+26*S);
  }
  ctx.fillStyle='#ffd34d'; ctx.font='bold '+clamp(15*S,12,20)+'px Inter, system-ui, sans-serif';
  ctx.fillText('+'+reveal.coinGain+' '+GF.t('coinsfrom'), cx, cy+ch/2-40*S);
  if(reveal.bondGain>0){
    ctx.save(); ctx.shadowColor='#7cf0c4'; ctx.shadowBlur=10*S;
    ctx.fillStyle='#7cf0c4'; ctx.font='bold '+clamp(14*S,11,18)+'px Inter, system-ui, sans-serif';
    ctx.fillText((reveal.bondLv>=BOND_MAX?GF.t('maxbond'):GF.t('bond_up'))+' • '+GF.t('bondlv')+' '+reveal.bondLv, cx, cy+ch/2-18*S);
    ctx.restore();
  }
  var bw=clamp(180*S,140,240), bh=clamp(54*S,44,68);
  L._revealAdd={ x:cx-bw/2, y:cy+ch/2+18*S, w:bw, h:bh };
  drawBigButton(ctx, L._revealAdd, GF.t('add'), '#2ee07a','#23a657', true);
  if(!reveal.isNew){
    var sw=clamp(160*S,120,210);
    L._revealSell={ x:cx-sw/2, y:L._revealAdd.y+bh+10*S, w:sw, h:clamp(44*S,36,56) };
    drawBigButton(ctx, L._revealSell, GF.t('sellnow')+' +'+SELL_BASE[c.rarity], '#3a4a55','#2a3640', false);
  } else L._revealSell=null;
}

// ── ALBUM (scrollable grid) ──────────────────────────────────────────────────
var albumScroll=null, albumViewTheme='meadow';
function ensureAlbumScroll(){ if(!albumScroll) albumScroll=GF.makeScroll('album', {x:0,y:0,w:10,h:10}); return albumScroll; }
function drawAlbum(ctx){
  var W=GF.W,H=GF.H,S=GF.S;
  ctx.fillStyle='#0b0c18'; ctx.fillRect(0,0,W,H);
  var hy=clamp(20*S,14,34);
  ctx.fillStyle='#fff'; ctx.font='bold '+clamp(22*S,16,30)+'px Inter, system-ui, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(GF.t('album'), W/2, hy);
  ctx.fillStyle='#9fb2c9'; ctx.font='bold '+clamp(13*S,11,17)+'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('total')+': '+totalOwned()+' / '+CATALOG.length+' ('+Math.round(totalOwned()/CATALOG.length*100)+'% '+GF.t('complete')+')', W/2, hy+clamp(28*S,22,38));
  var tabsY=hy+clamp(54*S,44,70), tabH=clamp(34*S,28,44);
  L._albumThemeTabs=[];
  var tw=Math.min(W-30*S, 420*S)/THEMES.length, sx=W/2 - (tw*THEMES.length)/2;
  for(var ti=0;ti<THEMES.length;ti++){
    var th=THEMES[ti], rx=sx+ti*tw, sel=(albumViewTheme===th.id);
    rr(ctx, rx+3*S, tabsY, tw-6*S, tabH, tabH*0.3);
    ctx.fillStyle= sel? th.tint : 'rgba(30,36,54,0.9)'; ctx.fill();
    ctx.fillStyle= sel? '#0b1020':'#cdd6ea'; ctx.font='bold '+clamp(12*S,10,15)+'px Inter, system-ui, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    var lbl = themeUnlocked(th)? (collectionPctTheme(th.id)+'%') : GF.t('locked');
    ctx.fillText(themeName(th).split(' ')[0]+' '+lbl, rx+tw/2, tabsY+tabH/2);
    L._albumThemeTabs.push({ x:rx, y:tabsY, w:tw, h:tabH, theme:th.id, unlocked:themeUnlocked(th) });
  }
  var gridTop=tabsY+tabH+12*S, backH=clamp(58*S,48,72), gridBottom=H-backH-10*S;
  var vp={ x:12*S, y:gridTop, w:W-24*S, h:gridBottom-gridTop };
  var sc=ensureAlbumScroll(); sc.setViewport(vp);
  var arr=CAT_BY_THEME[albumViewTheme]||[];
  var cols = W<480? 3 : (W<760? 4 : 6);
  var gap=10*S, cardW=(vp.w - gap*(cols-1))/cols, cardH=cardW*1.18;
  var rows=Math.ceil(arr.length/cols), contentH=rows*(cardH+gap)+10*S;
  sc.setContentHeight(contentH);
  L._albumCards=[];
  sc.begin(ctx);
  for(var i=0;i<arr.length;i++){
    var col=i%cols, row=Math.floor(i/cols);
    var cxp=vp.x + col*(cardW+gap), cyp=row*(cardH+gap)+4*S;
    drawAlbumCard(ctx, cxp, cyp, cardW, cardH, arr[i]);
    L._albumCards.push({ x:cxp, y:cyp, w:cardW, h:cardH, id:arr[i].id });
  }
  sc.end(ctx);
  sc.draw(ctx);
  var halfW=(Math.min(W-30*S,420*S)-10*S)/2, bx=W/2-(halfW*2+10*S)/2;
  L._albumSellAll={ x:bx, y:H-backH-2*S, w:halfW, h:backH-8*S };
  L._albumBack={ x:bx+halfW+10*S, y:H-backH-2*S, w:halfW, h:backH-8*S };
  drawBigButton(ctx, L._albumSellAll, GF.t('sellall'), '#caa23a','#a07c1a', false);
  drawBigButton(ctx, L._albumBack, GF.t('back'), '#3a4a55','#2a3640', false);
}
function drawAlbumCard(ctx, x, y, w, h, c){
  var S=GF.S, have=inv[c.id]||0, rcol=RARITY_COL[c.rarity];
  rr(ctx, x, y, w, h, 10*S);
  if(have){
    var g=ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0, shade(rcol,-0.45)); g.addColorStop(1, shade(rcol,-0.72));
    ctx.fillStyle=g; ctx.fill();
    ctx.lineWidth=2*S; ctx.strokeStyle=rcol; ctx.stroke();
    drawCritterArt(ctx, x+w/2, y+h*0.40, w*0.60, c);
    if(starred[c.id]) drawStarIcon(ctx, x+w-12*S, y+12*S, 7*S, '#ffd34d', true);
    if(have>1){
      ctx.fillStyle='rgba(8,10,22,0.85)'; rr(ctx, x+4*S, y+h-20*S, 30*S, 16*S, 8*S); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold '+clamp(10*S,8,13)+'px Inter, system-ui, sans-serif';
      ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText('x'+have, x+8*S, y+h-12*S);
    }
    // M1: bond pips — duplicates fill these; a maxed bond glows. Visible proof the
    // collection is something you GROW, not just complete.
    var bp=bondProgress(c.id), pr=clamp(3*S,2.2,4.2), gap=clamp(7*S,5,9);
    var py=y+h-12*S, totalW=(BOND_MAX-1)*gap, px=x+w-8*S-totalW;
    for(var bi=0;bi<BOND_MAX;bi++){
      var on=bi<bp.lv;
      ctx.beginPath(); ctx.arc(px+bi*gap, py, pr, 0, Math.PI*2);
      ctx.fillStyle= on? (bp.maxed?'#7cf0c4':'#5fd3b0') : 'rgba(255,255,255,0.22)';
      ctx.fill();
    }
  } else {
    ctx.fillStyle='rgba(20,24,40,0.9)'; ctx.fill();
    ctx.lineWidth=1.5*S; ctx.strokeStyle='rgba(120,130,160,0.4)'; ctx.stroke();
    ctx.save(); ctx.globalAlpha=0.16; drawCritterArt(ctx, x+w/2, y+h*0.42, w*0.6, c, true); ctx.restore();
    ctx.fillStyle='rgba(150,160,190,0.5)'; ctx.font='bold '+clamp(22*S,16,30)+'px Inter, system-ui, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('?', x+w/2, y+h*0.42);
  }
  ctx.fillStyle=rcol; rr(ctx, x+w*0.2, y+h-7*S, w*0.6, 4*S, 2*S); ctx.fill();
}

// ── SHOP (crate select, scrollable) ──────────────────────────────────────────
var shopScroll=null;
function ensureShopScroll(){ if(!shopScroll) shopScroll=GF.makeScroll('shop', {x:0,y:0,w:10,h:10}); return shopScroll; }
function drawShop(ctx){
  var W=GF.W,H=GF.H,S=GF.S;
  ctx.fillStyle='#0b0c18'; ctx.fillRect(0,0,W,H);
  var hy=clamp(20*S,14,34);
  ctx.fillStyle='#fff'; ctx.font='bold '+clamp(22*S,16,30)+'px Inter, system-ui, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='top'; ctx.fillText(GF.t('pick_crate'), W/2, hy);
  var listTop=hy+clamp(44*S,34,58), backH=clamp(58*S,48,72);
  var vp={ x:14*S, y:listTop, w:W-28*S, h:H-backH-listTop-12*S };
  var sc=ensureShopScroll(); sc.setViewport(vp);
  var rowH=clamp(120*S,90,150), gap=12*S, contentH=THEMES.length*(rowH+gap)+6*S;
  sc.setContentHeight(contentH);
  L._shopRows=[];
  sc.begin(ctx);
  for(var i=0;i<THEMES.length;i++){
    var th=THEMES[i], ry=i*(rowH+gap)+4*S;
    drawShopRow(ctx, vp.x, ry, vp.w, rowH, th);
    L._shopRows.push({ x:vp.x, y:ry, w:vp.w, h:rowH, theme:th.id, unlocked:themeUnlocked(th) });
  }
  sc.end(ctx);
  sc.draw(ctx);
  var bw=clamp(220*S,160,300);
  L._shopBack={ x:W/2-bw/2, y:H-backH-2*S, w:bw, h:backH-8*S };
  drawBigButton(ctx, L._shopBack, GF.t('back'), '#3a4a55','#2a3640', false);
}
function drawShopRow(ctx, x, y, w, h, th){
  var S=GF.S, unlocked=themeUnlocked(th), sel=(activeTheme===th.id);
  rr(ctx, x, y, w, h, 14*S);
  var g=ctx.createLinearGradient(x,y,x,y+h); g.addColorStop(0, th.bg1); g.addColorStop(1, th.bg2);
  ctx.fillStyle=g; ctx.fill();
  ctx.lineWidth= sel?3*S:2*S; ctx.strokeStyle= sel? th.tint : 'rgba(120,130,160,0.35)'; ctx.stroke();
  drawCrate(ctx, x+h*0.55, y+h/2, h*0.32, th);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#fff'; ctx.font='bold '+clamp(18*S,14,24)+'px Inter, system-ui, sans-serif';
  ctx.fillText(themeName(th), x+h*1.05, y+h*0.34);
  ctx.fillStyle='#9fb2c9'; ctx.font='bold '+clamp(12*S,10,16)+'px Inter, system-ui, sans-serif';
  ctx.fillText(collectionPctTheme(th.id)+'% '+GF.t('complete'), x+h*1.05, y+h*0.54);
  if(unlocked){
    var cstr=formatNum(crateCost(th.id));
    ctx.font='bold '+clamp(15*S,12,20)+'px Inter, system-ui, sans-serif';
    drawCoinIcon(ctx, x+h*1.05+8*S, y+h*0.74, 8*S);
    ctx.fillStyle='#ffd34d'; ctx.fillText(cstr, x+h*1.05+20*S, y+h*0.78);
    if(sel){ drawCheckIcon(ctx, x+w-22*S, y+h*0.5, 9*S, th.tint); }
  } else {
    drawLockIcon(ctx, x+w-40*S, y+h/2, 14*S);
    ctx.fillStyle='#9fb2c9'; ctx.font='bold '+clamp(12*S,10,15)+'px Inter, system-ui, sans-serif';
    ctx.textAlign='right'; ctx.fillText(GF.t('unlock_lvl')+' '+th.unlock, x+w-14*S, y+h*0.78); ctx.textAlign='left';
  }
}

// ── BATTLE DRAW ──────────────────────────────────────────────────────────────
function drawBattle(ctx){
  var W=GF.W,H=GF.H,S=GF.S, th=themeObj(activeTheme);
  var g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,th.bg1); g.addColorStop(1,th.bg2);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  drawHUD(ctx);
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillStyle='#fff'; ctx.font='bold '+clamp(22*S,16,30)+'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('battle_title'), W/2, clamp(66*S,58,84));
  if(!battle){ drawBattleSetup(ctx); return; }
  ctx.fillStyle='#ffd34d'; ctx.font='bold '+clamp(16*S,13,21)+'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('prize')+': '+formatNum(battle.prize), W/2, clamp(86*S,72,108));
  var n=battle.results.length, top=clamp(118*S,100,150);
  var rowH=Math.min(clamp(78*S,56,96), (H-top-100*S)/n);
  for(var i=0;i<n;i++){ drawBattleRow(ctx, 14*S, top+i*(rowH+8*S), W-28*S, rowH, i); }
  if(battle.phase==='result'){
    ctx.fillStyle= battle.playerWon? '#9af0a0':'#ff9a9a'; ctx.font='bold '+clamp(20*S,15,28)+'px Inter, system-ui, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(battle.playerWon? GF.t('you_win'):GF.t('you_lose'), W/2, H-80*S);
    var bw=clamp(200*S,150,280);
    L._battleAgain={ x:W/2-bw/2, y:H-66*S, w:bw, h:clamp(52*S,42,64) };
    drawBigButton(ctx, L._battleAgain, GF.t('battle_again'), '#2ee07a','#23a657', true);
  } else {
    ctx.fillStyle='rgba(220,230,255,0.7)'; ctx.font=clamp(13*S,11,16)+'px Inter, system-ui, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillText(GF.t('skip'), W/2, H-30*S);
  }
}
function drawBattleSetup(ctx){
  var W=GF.W,H=GF.H,S=GF.S;
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  // free-entry badge
  ctx.fillStyle='#9af0a0'; ctx.font='bold '+clamp(14*S,11,18)+'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('battle_free'), W/2, clamp(100*S,92,124));
  ctx.fillStyle='#cdd6ea'; ctx.font=clamp(13*S,11,17)+'px Inter, system-ui, sans-serif';
  wrapText(ctx, GF.t('battle_hint'), W/2, clamp(126*S,116,150), W*0.84, clamp(19*S,15,24));
  // rivals stepper — label ABOVE the buttons so wide RU text never collides
  var rivals=clamp(battleRivals,1,3);
  ctx.fillStyle='#fff'; ctx.font='bold '+clamp(15*S,12,20)+'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('opponents'), W/2, H*0.40);
  var sbw=clamp(48*S,38,60), stY=H*0.40+10*S;
  L._rivalMinus={ x:W/2-66*S, y:stY, w:sbw, h:sbw };
  L._rivalPlus={ x:W/2+66*S-sbw, y:stY, w:sbw, h:sbw };

function drawStepBtn(ctx, r, sym){

function drawBattleRow(ctx, x, y, w, h, i){
  var S=GF.S, res=battle.results[i], rl=battle.reels[i], isP=res.isPlayer;

  var tileW=rvH*0.85, originX=rvCx - rl.offset - tileW/2;

  else if(coachStep===1 && gs==='PLAYING') tgt={ x:L.tabs.album.x+L.tabs.album.w/2, y:L.tabs.album.y+L.tabs.album.h/2, r:L.tabs.album.w/2 };
  else if(coachStep===2 && gs==='PLAYING') tgt={ x:L.tabs.shop.x+L.tabs.shop.w/2, y:L.tabs.shop.y+L.tabs.shop.h/2, r:L.tabs.shop.w/2 };
  var t=(typeof performance!=='undefined'?performance.now():Date.now())/1000;

// ── VECTOR ART ───────────────────────────────────────────────────────────────
function rr(ctx,x,y,w,h,r){ GF.rr(ctx,x,y,w,h,r); }
function shade(hex, amt){
  var c=hex.replace('#',''); var r=parseInt(c.substr(0,2),16), g=parseInt(c.substr(2,2),16), b=parseInt(c.substr(4,2),16);
  function f(v){ return Math.round(clamp(amt<0? v*(1+amt) : v+(255-v)*amt, 0, 255)); }
  return 'rgb('+f(r)+','+f(g)+','+f(b)+')';
}
function formatNum(n){ n=Math.round(n); if(n>=1000000) return (n/1000000).toFixed(1)+'M'; if(n>=10000) return (n/1000).toFixed(1)+'k'; return ''+n; }

// CRITTER renderer — seed-derived cute creature, fully vector (no emoji)
function drawCritterArt(ctx, cx, cy, size, c, silhouette){
  var r=size*0.5;
  var bodyCol = silhouette? '#2a2f44' : 'hsl('+c.hue+','+c.sat+'%,'+c.lit+'%)';
  var bodyCol2 = silhouette? '#222637' : 'hsl('+c.hue+','+c.sat+'%,'+(c.lit-14)+'%)';
  var accentCol = silhouette? '#2a2f44' : 'hsl('+c.hue2+','+c.sat+'%,'+(c.lit+6)+'%)';
  ctx.save(); ctx.translate(cx, cy);
  drawAccessoryBack(ctx, c, r, bodyCol2, accentCol);
  var grad=ctx.createLinearGradient(0,-r,0,r); grad.addColorStop(0, bodyCol); grad.addColorStop(1, bodyCol2);
  ctx.fillStyle=grad; ctx.strokeStyle= silhouette? 'rgba(0,0,0,0)' : shade(bodyCol2,-0.4); ctx.lineWidth=Math.max(1.5, r*0.05);
  drawBodyShape(ctx, c.bodyShape, r);
  ctx.fill(); if(!silhouette) ctx.stroke();
  if(!silhouette) drawPattern(ctx, c, r, accentCol);
  drawAccessoryFront(ctx, c, r, accentCol, silhouette);
  if(!silhouette) drawFace(ctx, c, r);
  ctx.restore();
}
function drawBodyShape(ctx, shape, r){
  ctx.beginPath();
  if(shape===0){ ctx.arc(0, 0, r*0.92, 0, Math.PI*2); }
  else if(shape===1){ ctx.ellipse(0, r*0.05, r*0.78, r*0.95, 0, 0, Math.PI*2); }
  else if(shape===2){ ctx.ellipse(0, r*0.1, r*0.98, r*0.74, 0, 0, Math.PI*2); }
  else if(shape===3){ ctx.moveTo(0, -r*0.95); ctx.bezierCurveTo(r*0.9, -r*0.6, r*0.9, r*0.7, 0, r*0.92); ctx.bezierCurveTo(-r*0.9, r*0.7, -r*0.9, -r*0.6, 0, -r*0.95); }
  else if(shape===4){ var s=r*0.85; GF.rr(ctx, -s, -s, s*2, s*2, r*0.4); }
  else { ctx.arc(0, -r*0.05, r*0.88, Math.PI*1.05, Math.PI*-0.05, false); ctx.bezierCurveTo(r*0.9, r*0.4, r*0.5, r*0.95, 0, r*0.85); ctx.bezierCurveTo(-r*0.5, r*0.95, -r*0.9, r*0.4, -r*0.86, 0); ctx.closePath(); }
}
function drawPattern(ctx, c, r, accent){
  ctx.save();
  ctx.beginPath(); drawBodyShape(ctx, c.bodyShape, r); ctx.clip();
  if(c.pattern===1){ var rnd=seededRand(c.seed^0x9e3779b9); ctx.fillStyle=accent;
    for(var i=0;i<6;i++){ var a=rnd()*Math.PI*2, d=rnd()*r*0.7; ctx.globalAlpha=0.55; ctx.beginPath(); ctx.arc(Math.cos(a)*d, Math.sin(a)*d, r*(0.1+rnd()*0.12), 0, Math.PI*2); ctx.fill(); } }
  else if(c.pattern===2){ ctx.strokeStyle=accent; ctx.globalAlpha=0.4; ctx.lineWidth=r*0.14;
    for(var s=-3;s<=3;s++){ ctx.beginPath(); ctx.moveTo(-r, s*r*0.3-r*0.1); ctx.lineTo(r, s*r*0.3+r*0.3); ctx.stroke(); } }
  else if(c.pattern===3){ ctx.fillStyle=accent; ctx.globalAlpha=0.5; ctx.beginPath(); ctx.ellipse(0, r*0.3, r*0.5, r*0.55, 0, 0, Math.PI*2); ctx.fill(); }
  else if(c.pattern===4){ var g=ctx.createLinearGradient(0,-r,0,0); g.addColorStop(0,'rgba(255,255,255,0.35)'); g.addColorStop(1,'rgba(255,255,255,0)'); ctx.fillStyle=g; ctx.fillRect(-r,-r,r*2,r); }
  ctx.restore();
}
function drawAccessoryBack(ctx, c, r, bodyCol2, accent){
  if(c.accessory===2){ ctx.fillStyle=bodyCol2;
    if(c.earType===0){ ctx.beginPath(); ctx.arc(-r*0.6,-r*0.7, r*0.3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(r*0.6,-r*0.7, r*0.3,0,Math.PI*2); ctx.fill(); }
    else if(c.earType===1){ ctx.beginPath(); ctx.moveTo(-r*0.7,-r*0.4); ctx.lineTo(-r*0.85,-r*1.1); ctx.lineTo(-r*0.35,-r*0.6); ctx.closePath(); ctx.fill(); ctx.beginPath(); ctx.moveTo(r*0.7,-r*0.4); ctx.lineTo(r*0.85,-r*1.1); ctx.lineTo(r*0.35,-r*0.6); ctx.closePath(); ctx.fill(); }
    else { ctx.beginPath(); ctx.ellipse(-r*0.7,-r*0.5, r*0.18, r*0.5, 0.3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(r*0.7,-r*0.5, r*0.18, r*0.5, -0.3, 0, Math.PI*2); ctx.fill(); } }
  else if(c.accessory===4){ ctx.fillStyle=accent; ctx.beginPath(); ctx.moveTo(0,-r*0.9); ctx.lineTo(r*0.4,-r*1.3); ctx.lineTo(-r*0.1,-r*0.85); ctx.closePath(); ctx.fill(); }
}
function drawAccessoryFront(ctx, c, r, accent, sil){
  ctx.fillStyle= sil? '#2a2f44' : accent; ctx.strokeStyle= sil? 'rgba(0,0,0,0)' : shade(accent,-0.3); ctx.lineWidth=Math.max(1.2,r*0.04);
  if(c.accessory===1){ ctx.beginPath(); ctx.moveTo(0,-r*0.85); ctx.lineTo(r*0.1,-r*1.3); ctx.stroke(); ctx.beginPath(); ctx.arc(r*0.12,-r*1.35, r*0.14,0,Math.PI*2); ctx.fill(); }
  else if(c.accessory===3){ ctx.beginPath(); ctx.moveTo(-r*0.18,-r*0.8); ctx.lineTo(0,-r*1.35); ctx.lineTo(r*0.18,-r*0.8); ctx.closePath(); ctx.fill(); if(!sil) ctx.stroke(); }
  else if(c.accessory===5){ ctx.beginPath(); ctx.moveTo(-r*0.45,-r*0.75); ctx.lineTo(-r*0.45,-r*1.05); ctx.lineTo(-r*0.22,-r*0.85); ctx.lineTo(0,-r*1.15); ctx.lineTo(r*0.22,-r*0.85); ctx.lineTo(r*0.45,-r*1.05); ctx.lineTo(r*0.45,-r*0.75); ctx.closePath(); ctx.fillStyle= sil? '#2a2f44':'#ffd34d'; ctx.fill(); if(!sil){ ctx.strokeStyle='#caa23a'; ctx.stroke(); } }
}
function drawFace(ctx, c, r){
  var ex=r*0.34, ey=-r*0.08, es=r*0.18;
  ctx.fillStyle='#1a1d2b';
  if(c.eyes===0){ ctx.beginPath(); ctx.arc(-ex,ey,es,0,Math.PI*2); ctx.arc(ex,ey,es,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-ex+es*0.3,ey-es*0.3,es*0.35,0,Math.PI*2); ctx.arc(ex+es*0.3,ey-es*0.3,es*0.35,0,Math.PI*2); ctx.fill(); }
  else if(c.eyes===1){ ctx.strokeStyle='#1a1d2b'; ctx.lineWidth=r*0.06; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-ex-es,ey); ctx.quadraticCurveTo(-ex,ey-es,-ex+es,ey); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex-es,ey); ctx.quadraticCurveTo(ex,ey-es,ex+es,ey); ctx.stroke(); }
  else if(c.eyes===2){ ctx.beginPath(); ctx.ellipse(-ex,ey,es*0.8,es*1.2,0,0,Math.PI*2); ctx.ellipse(ex,ey,es*0.8,es*1.2,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-ex+es*0.2,ey-es*0.4,es*0.3,0,Math.PI*2); ctx.arc(ex+es*0.2,ey-es*0.4,es*0.3,0,Math.PI*2); ctx.fill(); }
  else { ex=r*0.42; es=r*0.13; ctx.beginPath(); ctx.arc(-ex,ey,es,0,Math.PI*2); ctx.arc(ex,ey,es,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-ex+es*0.3,ey-es*0.3,es*0.4,0,Math.PI*2); ctx.arc(ex+es*0.3,ey-es*0.3,es*0.4,0,Math.PI*2); ctx.fill(); }
  ctx.fillStyle='rgba(255,140,150,0.4)';
  ctx.beginPath(); ctx.arc(-r*0.5, r*0.18, r*0.12,0,Math.PI*2); ctx.arc(r*0.5, r*0.18, r*0.12,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#1a1d2b'; ctx.lineWidth=r*0.05; ctx.lineCap='round'; ctx.fillStyle='#1a1d2b';
  var my=r*0.28;
  if(c.mouth===0){ ctx.beginPath(); ctx.arc(0,my,r*0.16,0.1*Math.PI,0.9*Math.PI); ctx.stroke(); }
  else if(c.mouth===1){ ctx.beginPath(); ctx.ellipse(0,my,r*0.1,r*0.13,0,0,Math.PI*2); ctx.fill(); }
  else if(c.mouth===2){ ctx.beginPath(); ctx.moveTo(-r*0.12,my); ctx.lineTo(0,my+r*0.1); ctx.lineTo(r*0.12,my); ctx.stroke(); }
  else { ctx.beginPath(); ctx.moveTo(-r*0.14,my); ctx.quadraticCurveTo(0,my+r*0.18,r*0.14,my); ctx.stroke(); }
}

// CRATE renderer
function drawCrate(ctx, cx, cy, r, th){
  var S=GF.S;
  var t=(typeof performance!=='undefined'?performance.now():Date.now())/1000;
  var bob=Math.sin(t*1.6)*r*0.04;
  ctx.save(); ctx.translate(cx, cy+bob);
  ctx.save(); ctx.globalAlpha=0.3+0.1*Math.sin(t*2); ctx.shadowColor=th.tint; ctx.shadowBlur=30*S;
  ctx.fillStyle=th.tint; ctx.beginPath(); ctx.arc(0,0,r*0.9,0,Math.PI*2); ctx.fill(); ctx.restore();
  var w=r*1.5, h=r*1.2;
  var g=ctx.createLinearGradient(0,-h/2,0,h/2); g.addColorStop(0, shade(th.tint,-0.2)); g.addColorStop(1, shade(th.tint,-0.55));
  ctx.fillStyle=g; GF.rr(ctx, -w/2, -h*0.2, w, h*0.7, r*0.12); ctx.fill();
  ctx.lineWidth=3*S; ctx.strokeStyle=shade(th.tint,0.2); ctx.stroke();
  ctx.fillStyle=shade(th.tint,-0.1); GF.rr(ctx, -w*0.56, -h*0.42, w*1.12, h*0.32, r*0.1); ctx.fill(); ctx.stroke();
  ctx.fillStyle=shade(th.tint,0.35); GF.rr(ctx, -w*0.1, -h*0.42, w*0.2, h*0.9, r*0.04); ctx.fill();
  ctx.fillStyle='#ffd34d'; ctx.beginPath(); ctx.arc(0,-h*0.05, r*0.13,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#caa23a'; ctx.lineWidth=2*S; ctx.beginPath(); ctx.arc(0,-h*0.05,r*0.13,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#fff';
  for(var i=0;i<4;i++){ var a=t*0.8+i*Math.PI/2, d=r*0.85, sx=Math.cos(a)*d, sy=Math.sin(a)*d*0.6 - h*0.1; ctx.globalAlpha=0.4+0.4*Math.sin(t*3+i); drawSparkle(ctx, sx, sy, r*0.08); }
  ctx.globalAlpha=1; ctx.restore();
}
function drawCrateMini(ctx, cx, cy, r){ ctx.save(); ctx.translate(cx,cy); GF.rr(ctx, -r, -r*0.4, r*2, r*1.3, r*0.2); ctx.fill(); ctx.restore(); }
function drawSparkle(ctx, x, y, s){
  ctx.save(); ctx.translate(x,y); ctx.beginPath();
  ctx.moveTo(0,-s); ctx.lineTo(s*0.25,-s*0.25); ctx.lineTo(s,0); ctx.lineTo(s*0.25,s*0.25); ctx.lineTo(0,s); ctx.lineTo(-s*0.25,s*0.25); ctx.lineTo(-s,0); ctx.lineTo(-s*0.25,-s*0.25); ctx.closePath(); ctx.fill(); ctx.restore();
}

// ICONS (vector, never emoji)
function drawCoinIcon(ctx, x, y, r){
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='#ffd34d'; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e0a92a'; ctx.beginPath(); ctx.arc(0,0,r*0.7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff3c0'; ctx.font='bold '+(r*1.1)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('C', 0, r*0.08);
  ctx.restore();
}
function drawStarIcon(ctx, x, y, r, col, filled){
  ctx.save(); ctx.translate(x,y); ctx.beginPath();
  for(var i=0;i<5;i++){ var a=-Math.PI/2+i*2*Math.PI/5, a2=a+Math.PI/5; ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); ctx.lineTo(Math.cos(a2)*r*0.45, Math.sin(a2)*r*0.45); }
  ctx.closePath(); ctx.fillStyle=col||'#ffd34d'; if(filled!==false) ctx.fill(); else { ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke(); }
  ctx.restore();
}
function drawLockIcon(ctx, x, y, r){
  ctx.save(); ctx.translate(x,y);
  ctx.strokeStyle='#9fb2c9'; ctx.lineWidth=Math.max(1.5,r*0.16); ctx.fillStyle='#9fb2c9';
  ctx.beginPath(); ctx.arc(0,-r*0.1, r*0.5, Math.PI, 0); ctx.stroke();
  GF.rr(ctx, -r*0.6, -r*0.1, r*1.2, r*0.9, r*0.2); ctx.fill();
  ctx.restore();
}
function drawAlbumIcon(ctx, x, y, r){
  ctx.save(); ctx.translate(x,y);
  GF.rr(ctx, -r, -r*1.1, r*2, r*2.2, r*0.3); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.4)'; GF.rr(ctx, -r*0.5, -r*0.6, r, r, r*0.2); ctx.fill();
  ctx.restore();
}
function drawBattleIcon(ctx, x, y, r){
  ctx.save(); ctx.translate(x,y);
  ctx.strokeStyle=ctx.fillStyle; ctx.lineWidth=Math.max(1.5,r*0.3); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-r,-r); ctx.lineTo(r,r); ctx.moveTo(r,-r); ctx.lineTo(-r,r); ctx.stroke();
  ctx.restore();
}
function drawGiftIcon(ctx, x, y, r){
  ctx.save(); ctx.translate(x,y);
  GF.rr(ctx, -r, -r*0.3, r*2, r*1.3, r*0.15); ctx.fill();
  ctx.fillRect(-r*0.15, -r*0.3, r*0.3, r*1.3);
  GF.rr(ctx, -r, -r*0.55, r*2, r*0.35, r*0.1); ctx.fill();
  ctx.restore();
}
function drawHelpIcon(ctx, x, y, r){
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='rgba(20,26,42,0.8)'; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#bcd'; ctx.font='bold '+(r*1.3)+'px Inter, system-ui, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('?', 0, r*0.08);
  ctx.restore();
}
function drawCheckIcon(ctx, x, y, r, col){
  ctx.save(); ctx.translate(x,y); ctx.strokeStyle=col||'#5fd36a'; ctx.lineWidth=Math.max(2,r*0.3); ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(-r*0.7, 0); ctx.lineTo(-r*0.15, r*0.6); ctx.lineTo(r*0.8, -r*0.6); ctx.stroke();
  ctx.restore();
}
function wrapText(ctx, text, cx, y, maxW, lineH){
  var words=String(text).split(/\s+/), lines=[], cur='';
  for(var i=0;i<words.length;i++){ var p=cur?cur+' '+words[i]:words[i]; if(ctx.measureText(p).width>maxW&&cur){ lines.push(cur); cur=words[i]; } else cur=p; }
  if(cur) lines.push(cur);
  for(var j=0;j<lines.length;j++) ctx.fillText(lines[j], cx, y+j*lineH);
  return lines.length*lineH;
}

// ── UPDATE ─────────────────────────────────────────────────────────────────
function update(dt){
  GF.juice.update(dt);
  var gdt=dt*GF.juice.timeScale;
  if(coinHud.pop>0) coinHud.pop=Math.max(0,coinHud.pop-dt*30);
  if(welcomeBack){ welcomeBack.t+=dt; if(welcomeBack.t>4.4) welcomeBack=null; }
  if(gs==='OPENING') updateOpen(gdt);
  if(gs==='BATTLE' && battle && battle.phase==='spin') updateBattleSpin(gdt);
}
function updateBattleSpin(dt){
  battle.t += dt;
  var prog=clamp(battle.t/battle.dur,0,1), k=easeOutQuint(prog);
  var rowH=Math.min(clamp(78*GF.S,56,96), (GF.H-clamp(118*GF.S,100,150)-100*GF.S)/battle.results.length);
  var tileW=(rowH-16*GF.S)*0.85;
  for(var i=0;i<battle.reels.length;i++){
    var rl=battle.reels[i];
    rl.targetOffset=(rl.winIndex)*tileW;
    rl.offset=k*rl.targetOffset;
  }
  var nowMs=(typeof performance!=='undefined'?performance.now():Date.now());
  if(nowMs-(battle._lastTick||0)>=60 && prog<0.99){ battle._lastTick=nowMs; if(!GF.muted) GF.tone(620,0.025,'square',0.04); }
  if(prog>=1 && !battle.done) resolveBattle();
}

// ── INPUT ─────────────────────────────────────────────────────────────────
function onPress(x, y){
  if(within(x,y,L.mute.x-L.mute.r,L.mute.y-L.mute.r,L.mute.r*2,L.mute.r*2)){ GF.toggleMute(); if(GF.setMusicMuted) GF.setMusicMuted(GF.muted); GF.sfx('tap'); return; }
  if(gs==='PLAYING' && within(x,y,L.help.x-L.help.r,L.help.y-L.help.r,L.help.r*2,L.help.r*2)){ reopenCoach(); return; }

  if(gs==='OPENING'){ if(!reel.fast){ reel.fast=true; GF.sfx('tap'); } return; }
  if(gs==='REVEAL'){
    if(L._revealSell && hit(x,y,L._revealSell)){ sellRevealNow(); return; }
    if(L._revealAdd && hit(x,y,L._revealAdd)){ dismissReveal(); return; }
    dismissReveal(); return;
  }
  if(gs==='BUST'){
    if(L._bustFree && hit(x,y,L._bustFree)){ claimFreeFromBust(); return; }
    if(L._bustBonus && hit(x,y,L._bustBonus)){
      if(GF.platform==='local'){ grantBonusCrate(); }   // no ad on gallery -> grant directly
      else GF.ads.rewarded({ onReward:function(){ grantBonusCrate(); }, onClose:function(){} });
      return;
    }
    return;
  }
  if(gs==='ALBUM'){ onPressAlbum(x,y); return; }
  if(gs==='SHOP'){ onPressShop(x,y); return; }
  if(gs==='BATTLE'){ onPressBattle(x,y); return; }

  if(L._dailyBtn && hit(x,y,L._dailyBtn)){ if(dailyCrateReady()) startOpen('daily'); else GF.sfx('error'); return; }
  if(hit(x,y,L.open)){ startOpen(false); return; }
  if(hit(x,y,L.tabs.album)){ openAlbum(); return; }
  if(hit(x,y,L.tabs.shop)){ openShop(); return; }
  if(hit(x,y,L.tabs.battle)){ openBattle(); return; }
  if(hit(x,y,L.tabs.free)){ if(freeReady()) startOpen(true); else GF.sfx('error'); return; }
}
function openAlbum(){ albumViewTheme=activeTheme; gs='ALBUM'; GF.sfx('tap'); ensureAlbumScroll().scrollTo(0); }
function openShop(){ gs='SHOP'; GF.sfx('tap'); ensureShopScroll().scrollTo(0); }
function openBattle(){ battle=null; gs='BATTLE'; GF.sfx('tap'); }
function closeOverlay(){ gs='PLAYING'; }

function onPressAlbum(x,y){
  if(L._albumBack && hit(x,y,L._albumBack)){ closeOverlay(); GF.sfx('tap'); return; }
  if(L._albumSellAll && hit(x,y,L._albumSellAll)){ sellAllDupes(); return; }
  if(L._albumThemeTabs){ for(var i=0;i<L._albumThemeTabs.length;i++){ var t=L._albumThemeTabs[i]; if(hit(x,y,t)){ if(t.unlocked){ albumViewTheme=t.theme; GF.sfx('tap'); ensureAlbumScroll().scrollTo(0); } else GF.sfx('error'); return; } } }
  var sc=ensureAlbumScroll();
  if(sc.contains(x,y) && L._albumCards){
    var cyContent=sc.screenToContentY(y);
    for(var c=0;c<L._albumCards.length;c++){ var card=L._albumCards[c];
      if(x>=card.x && x<=card.x+card.w && cyContent>=card.y && cyContent<=card.y+card.h){
        var have=inv[card.id]||0;
        if(have>=STAR_DUPES+1 && !starred[card.id]) starCritter(card.id);
        else if(have>1) sellDupe(card.id);
        else GF.sfx('tap');
        return;
      }
    }
  }
}
function onPressShop(x,y){
  if(L._shopBack && hit(x,y,L._shopBack)){ closeOverlay(); GF.sfx('tap'); return; }
  var sc=ensureShopScroll();
  if(sc.contains(x,y) && L._shopRows){
    var cyContent=sc.screenToContentY(y);
    for(var i=0;i<L._shopRows.length;i++){ var row=L._shopRows[i]; if(x>=row.x&&x<=row.x+row.w&&cyContent>=row.y&&cyContent<=row.y+row.h){ selectTheme(row.theme); return; } }
  }
}
function onPressBattle(x,y){
  if(!battle){
    if(L._battleBack && hit(x,y,L._battleBack)){ closeOverlay(); GF.sfx('tap'); return; }
    if(L._rivalMinus && hit(x,y,L._rivalMinus)){ battleRivals=Math.max(1,battleRivals-1); GF.sfx('tap'); return; }
    if(L._rivalPlus && hit(x,y,L._rivalPlus)){ battleRivals=Math.min(3,battleRivals+1); GF.sfx('tap'); return; }
    if(L._battleStart && hit(x,y,L._battleStart)){ startBattle(battleRivals); return; }   // FREE entry
    return;
  }
  if(battle.phase==='spin'){ battle.t=battle.dur; return; }
  if(battle.phase==='result'){
    if(L._battleAgain && hit(x,y,L._battleAgain)){ battle=null; GF.sfx('tap'); return; }
    battle=null; return;
  }
}

var dragId=null;
function onDown(x,y){
  if(gs==='ALBUM'){ var sc=ensureAlbumScroll(); if(sc.contains(x,y)){ sc.dragStart(y); dragId='album'; } }
  else if(gs==='SHOP'){ var s2=ensureShopScroll(); if(s2.contains(x,y)){ s2.dragStart(y); dragId='shop'; } }
}
function onMove(x,y){ if(dragId==='album') ensureAlbumScroll().dragMove(y); else if(dragId==='shop') ensureShopScroll().dragMove(y); }
function onUp(){ if(dragId==='album') ensureAlbumScroll().dragEnd(); else if(dragId==='shop') ensureShopScroll().dragEnd(); dragId=null; }
function postUpdate(){ if(albumScroll) albumScroll.update(); if(shopScroll) shopScroll.update(); }

function within(x,y,rx,ry,rw,rh){ return x>=rx&&x<=rx+rw&&y>=ry&&y<=ry+rh; }
function hit(x,y,r){ return r && x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h; }

// ── BOOT ─────────────────────────────────────────────────────────────────
buildCatalog();

GF.init({
  designW: 440, designH: 820,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'cc',
  onReady: function() {
    GF.persist('cc_run_v1', snapshot, restore);
    try { tutorialDone = (localStorage.getItem('cc_tut_v1')==='1'); } catch(e){}
    gs='PLAYING';
    GF.bgMusic({ file:'audio/bg_track.mp3', preset:'arcade', muted: GF.muted });
    GF.remoteConfig('cc', CFG, {
      clamps: { 'tuning.price_mult':[0.5,2], 'tuning.coin_mult':[0.5,3] },
      onUpdate: function(c){ CFG=c; },
    }).then(function(c){ CFG=c; });
    GF.exposeState(function(){ return { gs:gs, score:coins, coins:coins, level:playerLevel, xp:xp, owned:totalOwned(), opens:openCount, theme:activeTheme, power:collectionPowerPct(), bonds:totalBondLevels(), dailyReady:dailyCrateReady() }; });
    GF.exposeBot(function(){
      var acts=[];
      if(gs==='PLAYING'){ acts.push('open'); if(dailyCrateReady()) acts.push('daily'); if(freeReady()) acts.push('free'); if(dupesSellValue()>0) acts.push('sellall'); }
      if(gs==='REVEAL') acts.push('continue');
      return acts;
    }, function(a){
      if(a==='open'){ if(canAfford(activeTheme)) startOpen(false); else if(dailyCrateReady()) startOpen('daily'); else if(freeReady()) startOpen(true); }
      else if(a==='daily'){ if(dailyCrateReady()) startOpen('daily'); }
      else if(a==='free'){ if(freeReady()) startOpen(true); }
      else if(a==='sellall'){ openAlbum(); sellAllDupes(); closeOverlay(); }
      else if(a==='continue'){ dismissReveal(); }
    });
    GF.exposeReach(function(){
      if(gs==='ALBUM'){
        var sc=ensureAlbumScroll();
        var items=(L._albumCards||[]).map(function(c){ return { id:'card_'+c.id, x:c.x, y:c.y, w:c.w, h:c.h }; });
        (L._albumThemeTabs||[]).forEach(function(t){ items.push({ id:'theme_'+t.theme, x:t.x, y:t.y, w:t.w, h:t.h, pinned:true }); });
        if(L._albumSellAll) items.push({ id:'sellall', x:L._albumSellAll.x, y:L._albumSellAll.y, w:L._albumSellAll.w, h:L._albumSellAll.h, pinned:true });
        if(L._albumBack) items.push({ id:'back', x:L._albumBack.x, y:L._albumBack.y, w:L._albumBack.w, h:L._albumBack.h, pinned:true });
        return { screen:'album', items:items, scrollId:'album', viewportH:sc.vp.h, screenH:GF.H };
      }
      if(gs==='SHOP'){
        var s2=ensureShopScroll();
        var items2=(L._shopRows||[]).map(function(r){ return { id:'crate_'+r.theme, x:r.x, y:r.y, w:r.w, h:r.h }; });
        if(L._shopBack) items2.push({ id:'back', x:L._shopBack.x, y:L._shopBack.y, w:L._shopBack.w, h:L._shopBack.h, pinned:true });
        return { screen:'shop', items:items2, scrollId:'shop', viewportH:s2.vp.h, screenH:GF.H };
      }
      var it=[];
      if(gs==='PLAYING'){
        it.push({ id:'open', x:L.open.x, y:L.open.y, w:L.open.w, h:L.open.h });
        if(L._dailyBtn) it.push({ id:'daily', x:L._dailyBtn.x, y:L._dailyBtn.y, w:L._dailyBtn.w, h:L._dailyBtn.h });
        ['album','shop','battle','free'].forEach(function(k){ var t=L.tabs[k]; it.push({ id:k, x:t.x, y:t.y, w:t.w, h:t.h }); });
      }
      return { screen:gs.toLowerCase(), items:it, viewportH:GF.H, screenH:GF.H };
    });
    GF.exposeTour([
      { name:'room', go:function(){ gs='PLAYING'; battle=null; reveal=null; } },
      { name:'album', go:function(){ albumViewTheme=activeTheme; gs='ALBUM'; } },
      { name:'shop', go:function(){ gs='SHOP'; } },
      { name:'battle', go:function(){ battle=null; gs='BATTLE'; } },
    ]);
    startCoach();
    // ── M1: WELCOME BACK — a returning player with progress sees their growing
    // Collection Power + the daily crate that's waiting, the moment they boot. ──
    if(!welcomeShown && totalOwned()>0){
      welcomeShown=true;
      welcomeBack={ power:collectionPowerPct(), dailyReady:dailyCrateReady(), t:0 };
      if(dailyCrateReady()) setTimeout(function(){ if(!GF.muted) GF.sfx('reward'); }, 400);
    }
    if(window.__GF_AUTOSTART && !window._silent){ gs='PLAYING'; }
  },
  onUpdate: function(dt){ update(dt); postUpdate(); },
  onDraw: draw,
});

// ── pointer wiring (tap = onPress; drag = scroll) ──────────────────────────
var _downX=0,_downY=0,_moved=false,_downT=0;
function evtXY(e){ var t=e.touches&&e.touches[0]?e.touches[0]:(e.changedTouches&&e.changedTouches[0]?e.changedTouches[0]:e); return { x:t.clientX, y:t.clientY }; }
GF.canvas.addEventListener('pointerdown', function(e){ var p=evtXY(e); _downX=p.x;_downY=p.y;_moved=false;_downT=Date.now(); onDown(p.x,p.y); });
GF.canvas.addEventListener('pointermove', function(e){ var p=evtXY(e); if(Math.abs(p.x-_downX)>6||Math.abs(p.y-_downY)>6) _moved=true; onMove(p.x,p.y); });
GF.canvas.addEventListener('pointerup', function(e){ var p=evtXY(e); onUp(); if(!_moved || (Date.now()-_downT<250 && Math.abs(p.x-_downX)<10 && Math.abs(p.y-_downY)<10)) onPress(p.x,p.y); });
GF.canvas.addEventListener('pointercancel', function(){ onUp(); });
GF.canvas.addEventListener('wheel', function(e){ e.preventDefault();
  var dy = e.deltaMode===1? e.deltaY*18 : e.deltaMode===2? e.deltaY*GF.H : e.deltaY;
  if(gs==='ALBUM') ensureAlbumScroll().handleWheel(dy);
  else if(gs==='SHOP') ensureShopScroll().handleWheel(dy);
}, { passive:false });

// ── SCREENSHOT / TEST HOOKS ────────────────────────────────────────────────
window._setLang = function(l){ GF.lang = (l==='ru'?'ru':'en'); };
window._setState = function(s){ if(typeof s==='string') gs=s.toUpperCase(); };
window._getI18N = function(){ return STRINGS[GF.lang]||STRINGS.en; };
window._getFontBody = function(){ return 'Inter, system-ui, sans-serif'; };
window._jumpLevel = function(n){
  coins=5200; playerLevel=7; xp=20;
  inv={}; starred={}; bonds={};
  var meadow=CAT_BY_THEME['meadow']||[]; for(var i=0;i<meadow.length;i++){ if(i<9) inv[meadow[i].id]=(i%3===0?3:1); }
  var reef=CAT_BY_THEME['reef']||[]; for(var j=0;j<reef.length;j++){ if(j<5) inv[reef[j].id]=(j===0?6:1); }
  if(meadow[0]){ inv[meadow[0].id]=6; }
  // seed bonds so the meta (pips + Collection Power) is visible in screenshots
  for(var b=0;b<meadow.length;b++){ if(inv[meadow[b].id]){ bumpBond(meadow[b].id); } }
  if(meadow[1]){ bonds[meadow[1].id]=BOND_MAX; } if(meadow[3]){ bonds[meadow[3].id]=3; }
  lastDailyCrateDay=dayIndex(); lastDailyDay=dayIndex(); dailyStreak=4;   // daily already claimed today
  activeTheme='meadow'; albumViewTheme='meadow'; tutorialDone=true; coachActive=false; welcomeBack=null; welcomeShown=true; gs='PLAYING';
};
// Test-only verifier: confirm the reel's centered tile == the pre-computed won
// critter once the spin has settled. Returns null when no reel is active.
window.__ccReelInfo = function(){
  if(!reel) return null;
  layout();
  var tileW=REEL_TILE_W*GF.S;
  // tile index whose center is nearest the viewport center, given current offset
  // originX (tile 0 left) = reelCx - offset - tileW/2 ; tile i center = originX + i*tileW + tileW/2
  // center-most tile: i = round(offset / tileW)
  var ci = Math.round(reel.offset / tileW);
  ci = Math.max(0, Math.min(reel.tiles.length-1, ci));
  var centerCritter = reel.tiles[ci];
  return { wonId: reel.won.id, winIndex: reel.winIndex, centeredIndex: ci, centeredId: centerCritter? centerCritter.id : null, settled: reel.settleDone===true, prog: clamp(reel.t/reel.dur,0,1) };
};
// Test-only: land on a populated BATTLE result (all reels settled, totals shown)
window.__ccSetupBattle = function(){
  window._jumpLevel();
  battleRivals=3; startBattle(3);   // FREE entry, 3 rivals
  // settle all reels + resolve
  if(battle){ battle.t=battle.dur; for(var i=0;i<60;i++){ updateBattleSpin(1/60); if(battle.phase==='result') break; } }
};
// Test-only: force the DAILY-READY + welcome-back surface a returning player sees.
window._ccPreviewReturn = function(){
  window._jumpLevel();
  lastDailyCrateDay = dayIndex()-1;   // daily is now READY again (the return hook)
  welcomeShown=false;
  welcomeBack={ power:collectionPowerPct(), dailyReady:true, t:0.6 };
  gs='PLAYING';
};
window._setupForScreenshot = function(level){
  window._jumpLevel();
  var mode = (level==null)? 0 : (level|0);
  if(mode % 3 === 1){
    var arr=CAT_BY_THEME['meadow']||[], won=null;
    for(var i=0;i<arr.length;i++){ if(arr[i].rarity==='epic'){ won=arr[i]; break; } } if(!won) won=arr[arr.length-1];
    reel=buildReel('meadow', won, 14, false); reel.started=true; computeReelTarget();
    reel.t=reel.dur*0.62; reel.offset=easeOutQuint(0.62)*reel.targetOffset;
    gs='OPENING';
  } else if(mode % 3 === 2){
    var arr2=CAT_BY_THEME['meadow']||[], leg=arr2[arr2.length-1];
    reveal={ critter:leg, isNew:true, coinGain:42, leveled:false }; gs='REVEAL';
  } else {
    albumViewTheme='meadow'; gs='ALBUM';
  }
};

})();
</script>
