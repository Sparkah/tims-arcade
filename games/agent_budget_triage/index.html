// ── TUNABLES ─────────────────────────────────────────────────────────────
var STARTING_BUDGET    = 5.00;
var TASK_COUNT         = 20;
var HAIKU_COST         = 0.05;
var SONNET_COST        = 0.18;
var OPUS_COST          = 0.40;
var RETRY_COST_MULT    = 2.0;
var TRIVIAL_RATIO      = 0.35;
var HARD_RATIO         = 0.25;
var MILESTONE_BONUS_CAP = 1.50;

var TASK_TYPES = [
  'task_refactor','task_fix_bug','task_lint','task_migrate','task_test',
  'task_doc','task_review','task_rename','task_typo','task_format',
  'task_optimize','task_security','task_deploy','task_logging','task_index',
  'task_api','task_cron','task_modal','task_regex','task_schema'
];

// Per-model success rates per difficulty (trivial=0, standard=1, hard=2)
var MODEL_SUCCESS = {
  haiku:  [1.00, 0.60, 0.20],
  sonnet: [1.00, 0.95, 0.70],
  opus:   [1.00, 1.00, 1.00]
};
var MODEL_COSTS = { haiku: HAIKU_COST, sonnet: SONNET_COST, opus: OPUS_COST };
var MODEL_NAMES = ['haiku','sonnet','opus'];
var MODEL_COLORS = {
  haiku:  { base: '#4dd0e1', glow: 'rgba(77,208,225,0.4)' },
  sonnet: { base: '#a47dff', glow: 'rgba(164,125,255,0.45)' },
  opus:   { base: '#ffc857', glow: 'rgba(255,200,87,0.45)' }
};

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';
var budget = STARTING_BUDGET;
var milestone = 1;
var queue = [];
var selectedTaskId = null;
var bestMilestones = 0;
var bestScore = 0;
var score = 0;
var laneDone = { haiku: 0, sonnet: 0, opus: 0 };
var lanePulse = { haiku: 0, sonnet: 0, opus: 0 };
var scrollY = 0;
var scrollMomentum = 0;
var dragStart = null;
var dragMoved = false;
var lastDragY = 0;
var lastDragT = 0;
var milestoneFlashT = 0;
var milestoneFlashText = '';
var helpOpen = false;
var dailySeed = 0;
var rngState = 1;
var _menuBtnRect = null;

// ── SEEDED RNG (mulberry32) ──────────────────────────────────────────────
function seedRng(seed) {
  rngState = (seed >>> 0) || 1;
}
function rand() {
  var t = rngState += 0x6D2B79F5;
  t = Math.imul(t ^ (t >>> 15), t | 1);
  t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}
function todaySeed() {
  var d = new Date();
  return d.getUTCFullYear() * 10000 + (d.getUTCMonth() + 1) * 100 + d.getUTCDate();
}

// ── QUEUE GEN ────────────────────────────────────────────────────────────
function genQueue(seed) {
  seedRng(seed);
  var arr = [];
  for (var i = 0; i < TASK_COUNT; i++) {
    var r = rand();
    var diff;
    if (r < TRIVIAL_RATIO) diff = 0;
    else if (r < 1 - HARD_RATIO) diff = 1;
    else diff = 2;
    var typeKey = TASK_TYPES[Math.floor(rand() * TASK_TYPES.length)];
    var revealed = rand() < 0.30;
    arr.push({
      id: i + '_' + Math.floor(rand() * 1e6),
      typeKey: typeKey,
      difficulty: diff,
      revealed: revealed
    });
  }
  return arr;
}

// ── LIFECYCLE ────────────────────────────────────────────────────────────
function startGame() {
  dailySeed = todaySeed();
  budget = STARTING_BUDGET;
  milestone = 1;
  score = 0;
  queue = genQueue(dailySeed + milestone * 1009);
  selectedTaskId = null;
  laneDone = { haiku: 0, sonnet: 0, opus: 0 };
  scrollY = 0;
  scrollMomentum = 0;
  milestoneFlashT = 0;
  helpOpen = false;
  gs = 'PLAYING';
  GF.saveRun();
  GF.gameStarted();
}

function gameOver() {
  if (milestone - 1 > bestMilestones) {
    bestMilestones = milestone - 1;
    try { localStorage.setItem('agent_budget_triage_best_milestones', String(bestMilestones)); } catch(e) {}
  }
  if (score > bestScore) {
    bestScore = score;
    try { localStorage.setItem('agent_budget_triage_best_score', String(bestScore)); } catch(e) {}
  }
  gs = 'GAMEOVER';
  GF.saveRun();
  GF.gameEnded();
}

function nextMilestone() {
  var bonus = Math.min(budget, MILESTONE_BONUS_CAP);
  score += 10 + Math.floor(budget * 100);
  budget = STARTING_BUDGET + bonus;
  if (budget > STARTING_BUDGET + MILESTONE_BONUS_CAP) budget = STARTING_BUDGET + MILESTONE_BONUS_CAP;
  milestone++;
  queue = genQueue(dailySeed + milestone * 1009);
  selectedTaskId = null;
  laneDone = { haiku: 0, sonnet: 0, opus: 0 };
  scrollY = 0;
  milestoneFlashT = 1.6;
  milestoneFlashText = GF.t('milestone_clear') + ' +1';
  GF.spawnParticles(GF.cx, GF.cy, '#ffc857', 40);
  GF.setShake(0.3);
  GF.saveRun();
}

function assignTask(taskId, model) {
  if (gs !== 'PLAYING') return;
  var idx = -1;
  for (var i = 0; i < queue.length; i++) if (queue[i].id === taskId) { idx = i; break; }
  if (idx < 0) return;
  var task = queue[idx];
  var baseCost = MODEL_COSTS[model];
  var successRate = MODEL_SUCCESS[model][task.difficulty];
  var roll = Math.random();
  var success = roll < successRate;
  var cost = success ? baseCost : baseCost * (1 + RETRY_COST_MULT);
  budget -= cost;
  if (budget < 0) budget = 0;
  laneDone[model]++;
  lanePulse[model] = 1.0;

  var laneY = laneCenterY(model);
  var col = success ? '#52d27a' : '#ff5a5a';
  var currency = GF.lang === 'ru' ? '₽' : '$';
  var label = '-' + currency + cost.toFixed(2) + ' ' + (success ? GF.t('ok_label') : GF.t('fail_label'));
  GF.spawnFloat(GF.cx, laneY, label, col);
  GF.spawnParticles(GF.cx, laneY, col, success ? 8 : 16);

  if (success) {
    queue.splice(idx, 1);
    selectedTaskId = null;
  } else {
    task.revealed = true;
    selectedTaskId = null;
  }

  if (queue.length === 0) {
    nextMilestone();
  } else if (budget <= 0) {
    gameOver();
  }
  GF.saveRun();
}

// ── LAYOUT ───────────────────────────────────────────────────────────────
function topBarH() { return Math.max(60 * GF.S, 50); }
function laneAreaH() { return Math.max(GF.H * 0.32, 240 * GF.S); }
function queueAreaH() { return GF.H - topBarH() - laneAreaH(); }
function queueAreaY() { return topBarH(); }
function laneAreaY() { return GF.H - laneAreaH(); }
function laneH() { return (laneAreaH() - 24 * GF.S) / 3; }
function laneCenterY(model) {
  var idx = MODEL_NAMES.indexOf(model);
  return laneAreaY() + 12 * GF.S + idx * laneH() + laneH() / 2;
}
function cardHeight() { return Math.max(64 * GF.S, 56); }

// ── INPUT ────────────────────────────────────────────────────────────────
function inRect(x, y, r) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

function handlePress(x, y) {
  if (gs === 'MENU' || gs === 'GAMEOVER') {
    if (_menuBtnRect && inRect(x, y, _menuBtnRect)) startGame();
    return;
  }
  if (helpOpen) {
    helpOpen = false;
    return;
  }
  var hb = helpButtonRect();
  if (inRect(x, y, hb)) { helpOpen = true; return; }

  for (var i = 0; i < MODEL_NAMES.length; i++) {
    var m = MODEL_NAMES[i];
    var lr = laneRect(m);
    if (inRect(x, y, lr)) {
      var tid = selectedTaskId;
      if (!tid && queue.length) tid = queue[0].id;
      if (tid) assignTask(tid, m);
      return;
    }
  }
  dragStart = { x: x, y: y, t: Date.now() };
  lastDragY = y;
  lastDragT = Date.now();
  dragMoved = false;
}

function handleMove(x, y) {
  if (!dragStart) return;
  var dy = y - lastDragY;
  if (Math.abs(y - dragStart.y) > 8 * GF.S) dragMoved = true;
  if (dragMoved && y >= queueAreaY() && y <= queueAreaY() + queueAreaH()) {
    scrollY -= dy;
    var now = Date.now();
    var dt = Math.max(1, now - lastDragT);
    scrollMomentum = -dy * 16 / dt;
    lastDragY = y;
    lastDragT = now;
    clampScroll();
  }
}

function handleRelease(x, y) {
  if (!dragStart) return;
  if (!dragMoved && gs === 'PLAYING' && !helpOpen) {
    var tid = pickCardAt(x, y);
    if (tid) selectedTaskId = (selectedTaskId === tid) ? null : tid;
  }
  dragStart = null;
  dragMoved = false;
}

function pickCardAt(x, y) {
  if (y < queueAreaY() || y > queueAreaY() + queueAreaH()) return null;
  var localY = y - queueAreaY() + scrollY;
  var idx = Math.floor(localY / cardHeight());
  if (idx < 0 || idx >= queue.length) return null;
  return queue[idx].id;
}

function clampScroll() {
  var total = queue.length * cardHeight();
  var view = queueAreaH();
  var maxScroll = Math.max(0, total - view);
  if (scrollY < 0) scrollY = 0;
  if (scrollY > maxScroll) scrollY = maxScroll;
}

// Input wiring — use canvas events so we don't fight gf-lib's joystick
var cv = document.getElementById('c');
cv.addEventListener('mousedown', function(e) { handlePress(e.clientX, e.clientY); });
cv.addEventListener('mousemove', function(e) { if (e.buttons) handleMove(e.clientX, e.clientY); });
cv.addEventListener('mouseup',   function(e) { handleRelease(e.clientX, e.clientY); });
cv.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t0 = e.changedTouches[0];
  handlePress(t0.clientX, t0.clientY);
}, { passive: false });
cv.addEventListener('touchmove', function(e) {
  e.preventDefault();
  var t0 = e.changedTouches[0];
  handleMove(t0.clientX, t0.clientY);
}, { passive: false });
cv.addEventListener('touchend', function(e) {
  e.preventDefault();
  var t0 = e.changedTouches[0];
  handleRelease(t0.clientX, t0.clientY);
}, { passive: false });

// ── RECTS ────────────────────────────────────────────────────────────────
function helpButtonRect() {
  var s = Math.max(36 * GF.S, 32);
  return { x: GF.W - s - 8 * GF.S, y: 8 * GF.S, w: s, h: s };
}
function laneRect(model) {
  var idx = MODEL_NAMES.indexOf(model);
  var margin = 12 * GF.S;
  return {
    x: margin,
    y: laneAreaY() + 12 * GF.S + idx * laneH(),
    w: GF.W - margin * 2,
    h: laneH() - 6 * GF.S
  };
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (gs !== 'PLAYING') return;

  if (!dragStart && Math.abs(scrollMomentum) > 0.1) {
    scrollY += scrollMomentum;
    scrollMomentum *= 0.92;
    clampScroll();
  }

  lanePulse.haiku  = Math.max(0, lanePulse.haiku  - dt * 2.5);
  lanePulse.sonnet = Math.max(0, lanePulse.sonnet - dt * 2.5);
  lanePulse.opus   = Math.max(0, lanePulse.opus   - dt * 2.5);

  if (milestoneFlashT > 0) milestoneFlashT = Math.max(0, milestoneFlashT - dt);
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  drawBackground(ctx);

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawQueue(ctx);
    drawLanes(ctx);
    drawTopBar(ctx);
    if (milestoneFlashT > 0) drawMilestoneFlash(ctx);
    if (helpOpen) drawHelpOverlay(ctx);
  }

  if (gs === 'MENU')     drawMenu(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
}

function drawBackground(ctx) {
  var g = ctx.createLinearGradient(0, 0, 0, GF.H);
  g.addColorStop(0, '#0a0a14');
  g.addColorStop(1, '#13182a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, GF.W, GF.H);
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  var step = 40 * GF.S;
  for (var x = 0; x <= GF.W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GF.H); ctx.stroke();
  }
  for (var y = 0; y <= GF.H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GF.W, y); ctx.stroke();
  }
}

function drawTopBar(ctx) {
  var h = topBarH();
  ctx.fillStyle = 'rgba(8,10,20,0.85)';
  ctx.fillRect(0, 0, GF.W, h);
  ctx.fillStyle = 'rgba(77,208,225,0.5)';
  ctx.fillRect(0, h - 2, GF.W, 2);

  var fsLabel = Math.max(11 * GF.S, 10);
  var fsValue = Math.max(18 * GF.S, 14);

  var meterX = 12 * GF.S;
  var meterY = 10 * GF.S;
  var meterW = GF.W * 0.55;
  var meterH = Math.max(14 * GF.S, 12);

  ctx.fillStyle = '#9aa3b2';
  ctx.font = fsLabel + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(GF.t('budget_label'), meterX, meterY);

  GF.rr(ctx, meterX, meterY + fsLabel + 6, meterW, meterH, meterH / 2);
  ctx.fillStyle = '#1d2438';
  ctx.fill();

  var pct = Math.max(0, Math.min(1, budget / STARTING_BUDGET));
  var fillW = meterW * pct;
  var fillColor = pct > 0.5 ? '#52d27a' : (pct > 0.2 ? '#ffc857' : '#ff5a5a');
  if (fillW > 0) {
    GF.rr(ctx, meterX, meterY + fsLabel + 6, Math.max(fillW, meterH), meterH, meterH / 2);
    ctx.fillStyle = fillColor;
    ctx.fill();
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + fsValue + 'px Inter, system-ui, sans-serif';
  ctx.textBaseline = 'middle';
  var topCurrency = GF.lang === 'ru' ? '₽' : '$';
  ctx.fillText(topCurrency + budget.toFixed(2), meterX + meterW + 10 * GF.S, meterY + fsLabel + 6 + meterH / 2);

  var hb = helpButtonRect();
  ctx.fillStyle = '#9aa3b2';
  ctx.font = fsLabel + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText(GF.t('milestone_label') + ' ' + milestone, hb.x - 8 * GF.S, meterY);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + fsValue + 'px Inter, system-ui, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(milestone), hb.x - 8 * GF.S, meterY + fsLabel + 6 + meterH / 2);

  ctx.fillStyle = 'rgba(77,208,225,0.18)';
  GF.rr(ctx, hb.x, hb.y, hb.w, hb.h, hb.h / 2);
  ctx.fill();
  ctx.strokeStyle = '#4dd0e1';
  ctx.lineWidth = 1.5;
  GF.rr(ctx, hb.x, hb.y, hb.w, hb.h, hb.h / 2);
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + Math.max(18 * GF.S, 14) + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', hb.x + hb.w / 2, hb.y + hb.h / 2 + 1);
}

function drawQueue(ctx) {
  var qy = queueAreaY();
  var qh = queueAreaH();
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, qy, GF.W, qh);
  ctx.clip();

  var ch = cardHeight();
  var margin = 12 * GF.S;
  for (var i = 0; i < queue.length; i++) {
    var task = queue[i];
    var y = qy + i * ch - scrollY;
    if (y + ch < qy || y > qy + qh) continue;
    drawCard(ctx, task, margin, y + 4 * GF.S, GF.W - margin * 2, ch - 8 * GF.S, i === 0);
  }
  ctx.restore();

  var grad = ctx.createLinearGradient(0, qy, 0, qy + 18 * GF.S);
  grad.addColorStop(0, 'rgba(10,10,20,0.9)'); grad.addColorStop(1, 'rgba(10,10,20,0)');
  ctx.fillStyle = grad; ctx.fillRect(0, qy, GF.W, 18 * GF.S);
  var grad2 = ctx.createLinearGradient(0, qy + qh - 18 * GF.S, 0, qy + qh);
  grad2.addColorStop(0, 'rgba(10,10,20,0)'); grad2.addColorStop(1, 'rgba(10,10,20,0.9)');
  ctx.fillStyle = grad2; ctx.fillRect(0, qy + qh - 18 * GF.S, GF.W, 18 * GF.S);
}

function drawCard(ctx, task, x, y, w, h, isFront) {
  var sel = task.id === selectedTaskId;
  GF.rr(ctx, x, y, w, h, 10);
  ctx.fillStyle = sel ? '#1f2c46' : (isFront ? '#181f33' : '#10162a');
  ctx.fill();
  ctx.strokeStyle = sel ? '#ffc857' : (isFront ? 'rgba(77,208,225,0.45)' : 'rgba(255,255,255,0.06)');
  ctx.lineWidth = sel ? 2.5 : 1;
  GF.rr(ctx, x, y, w, h, 10);
  ctx.stroke();

  var fs = Math.max(15 * GF.S, 13);
  ctx.fillStyle = '#e6ecf5';
  ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t(task.typeKey), x + 14 * GF.S, y + h / 2);

  var badgeKey, badgeColor;
  if (task.revealed) {
    if (task.difficulty === 0) { badgeKey = 'diff_easy';  badgeColor = '#52d27a'; }
    else if (task.difficulty === 1) { badgeKey = 'diff_mid';   badgeColor = '#4dd0e1'; }
    else { badgeKey = 'diff_hard'; badgeColor = '#ff5a5a'; }
  } else {
    badgeKey = 'diff_unknown';
    badgeColor = '#9aa3b2';
  }
  var badgeText = GF.t(badgeKey);
  var bfs = Math.max(12 * GF.S, 10);
  ctx.font = 'bold ' + bfs + 'px Inter, system-ui, sans-serif';
  var bw = ctx.measureText(badgeText).width + 16 * GF.S;
  var bh = bfs + 8 * GF.S;
  var bx = x + w - bw - 12 * GF.S;
  var by = y + h / 2 - bh / 2;
  GF.rr(ctx, bx, by, bw, bh, bh / 2);
  ctx.fillStyle = badgeColor + '33';
  ctx.fill();
  ctx.strokeStyle = badgeColor;
  ctx.lineWidth = 1;
  GF.rr(ctx, bx, by, bw, bh, bh / 2);
  ctx.stroke();
  ctx.fillStyle = badgeColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(badgeText, bx + bw / 2, by + bh / 2 + 1);
}

function drawLanes(ctx) {
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, laneAreaY());
  ctx.lineTo(GF.W, laneAreaY());
  ctx.stroke();

  for (var i = 0; i < MODEL_NAMES.length; i++) {
    drawLane(ctx, MODEL_NAMES[i]);
  }
}

function drawLane(ctx, model) {
  var r = laneRect(model);
  var col = MODEL_COLORS[model];
  var pulse = lanePulse[model];

  GF.rr(ctx, r.x, r.y, r.w, r.h, 14);
  var bgGrad = ctx.createLinearGradient(r.x, r.y, r.x + r.w, r.y);
  bgGrad.addColorStop(0, '#10162a');
  bgGrad.addColorStop(1, '#161e36');
  ctx.fillStyle = bgGrad;
  ctx.fill();

  ctx.strokeStyle = col.base;
  ctx.globalAlpha = 0.55 + pulse * 0.45;
  ctx.lineWidth = 1.5 + pulse * 2;
  GF.rr(ctx, r.x, r.y, r.w, r.h, 14);
  ctx.stroke();
  ctx.globalAlpha = 1;

  var cy = r.y + r.h / 2;
  var br = Math.max(22 * GF.S, 18);
  var bx = r.x + 14 * GF.S + br;
  ctx.shadowColor = col.glow;
  ctx.shadowBlur = 12 + pulse * 18;
  ctx.beginPath();
  ctx.arc(bx, cy, br, 0, Math.PI * 2);
  ctx.fillStyle = col.base;
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#0a0a14';
  ctx.font = 'bold ' + Math.max(20 * GF.S, 16) + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var letter = model === 'haiku' ? 'H' : (model === 'sonnet' ? 'S' : 'O');
  ctx.fillText(letter, bx, cy + 1);

  var nameFs = Math.max(16 * GF.S, 14);
  var subFs = Math.max(11 * GF.S, 10);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + nameFs + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t(model + '_name'), bx + br + 12 * GF.S, cy - 4 * GF.S);
  ctx.fillStyle = '#9aa3b2';
  ctx.font = subFs + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t(model + '_tag'), bx + br + 12 * GF.S, cy + 13 * GF.S);

  var costFs = Math.max(20 * GF.S, 16);
  ctx.fillStyle = col.base;
  ctx.font = 'bold ' + costFs + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'alphabetic';
  var laneCurrency = GF.lang === 'ru' ? '₽' : '$';
  ctx.fillText(laneCurrency + MODEL_COSTS[model].toFixed(2), r.x + r.w - 14 * GF.S, cy - 2 * GF.S);
  ctx.fillStyle = '#9aa3b2';
  ctx.font = subFs + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('done_label') + ': ' + laneDone[model], r.x + r.w - 14 * GF.S, cy + 14 * GF.S);
}

function drawMilestoneFlash(ctx) {
  var a = Math.min(1, milestoneFlashT / 0.5);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.fillStyle = 'rgba(255,200,87,0.10)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  ctx.fillStyle = '#ffc857';
  ctx.font = 'bold ' + Math.max(40 * GF.S, 28) + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(255,200,87,0.6)';
  ctx.shadowBlur = 24;
  ctx.fillText(milestoneFlashText, GF.cx, GF.cy);
  ctx.restore();
}

function drawHelpOverlay(ctx) {
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var fs = Math.max(15 * GF.S, 13);
  var lineH = fs + 10;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + Math.max(24 * GF.S, 18) + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  var y = Math.max(60 * GF.S, 40);
  ctx.fillText(GF.t('title'), GF.cx, y);
  y += Math.max(36 * GF.S, 28);
  ctx.font = fs + 'px Inter, system-ui, sans-serif';
  var lines = [GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip')];
  var colors = ['#4dd0e1','#fff','#52d27a','#ff5a5a','#ffc857'];
  for (var i = 0; i < lines.length; i++) {
    ctx.fillStyle = colors[i];
    var consumed = wrapText(ctx, lines[i], GF.cx, y, GF.W - 40 * GF.S, lineH);
    y += consumed + 8;
  }
  ctx.fillStyle = '#9aa3b2';
  ctx.font = Math.max(13 * GF.S, 11) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.lang === 'ru' ? 'нажмите чтобы закрыть' : 'tap to close', GF.cx, GF.H - 40 * GF.S);
}

function drawMenu(ctx) {
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(36 * GF.S, 24, 56);
  var subFs   = GF.clamp(15 * GF.S, 12, 19);
  var btnW    = GF.clamp(240 * GF.S, 160, 320);
  var btnH    = GF.clamp(52 * GF.S, 40, 66);

  var topY = Math.max(54 * GF.S, 40);
  ctx.shadowColor = 'rgba(77,208,225,0.4)';
  ctx.shadowBlur = 30 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(GF.t('title'), GF.cx, topY);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  ctx.font = subFs + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#9aa3b2';
  ctx.fillText(GF.t('sub'), GF.cx, topY + titleFs + 6);

  var ty = topY + titleFs + subFs + 28 * GF.S;
  var tfs = Math.max(14 * GF.S, 12);
  var lh = tfs + 9;
  var tlines = [GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip')];
  var tcolors = ['#4dd0e1','#fff','#52d27a','#ff5a5a','#ffc857'];
  ctx.font = tfs + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  var maxW = GF.W - 32 * GF.S;
  for (var i = 0; i < tlines.length; i++) {
    ctx.fillStyle = tcolors[i];
    var consumed = wrapText(ctx, tlines[i], GF.cx, ty, maxW, lh);
    ty += consumed + 6;
  }

  // PLAY button — wide-viewport: enlarged + animated + lifted into empty space
  var isWide = GF.W / GF.H > 1.15;
  var baseBtnW = btnW, baseBtnH = btnH;
  var drawBtnW = isWide ? baseBtnW * 1.4 : baseBtnW, drawBtnH = isWide ? baseBtnH * 1.4 : baseBtnH;
  // on wide: lift into empty space above H-60*S floor; Math.max keeps it below text
  var clearMargin = drawBtnH / 2 + 16;
  var wideFloor = GF.H * 0.58;
  var btnY = isWide
    ? Math.max(ty + clearMargin, wideFloor)
    : Math.min(GF.H - btnH - 60 * GF.S, ty + 28 * GF.S);
  var btnX = GF.cx - baseBtnW / 2;
  var pulse = isWide ? (1 + 0.05 * Math.sin(performance.now() / 1000 * 2.2)) : 1;
  var drawW = drawBtnW * pulse, drawH = drawBtnH * pulse;
  var drawX = GF.cx - drawW / 2, drawY = btnY + (drawBtnH - drawH) / 2;
  ctx.save();
  if (isWide) { ctx.shadowColor = 'rgba(77,208,225,0.55)'; ctx.shadowBlur = 18 + 10 * Math.sin(performance.now() / 1000 * 2.2); }
  var grad = ctx.createLinearGradient(drawX, drawY, drawX, drawY + drawH);
  grad.addColorStop(0, '#4dd0e1'); grad.addColorStop(1, '#2a9fb3');
  GF.rr(ctx, drawX, drawY, drawW, drawH, drawH / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = 'bold ' + (isWide ? Math.max(18 * GF.S * 1.3, 18) : Math.max(18 * GF.S, 14)) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#0a0a14';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), GF.cx, btnY + drawBtnH / 2 + 1);
  ctx.restore();

  if (bestMilestones > 0) {
    ctx.font = Math.max(13 * GF.S, 11) + 'px Inter, system-ui, sans-serif';
    ctx.fillStyle = '#9aa3b2';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(GF.t('best') + ': ' + GF.t('waves_label') + ' ' + bestMilestones + ' / ' + GF.t('score_label') + ' ' + bestScore, GF.cx, btnY + drawBtnH + 22 * GF.S);
  }

  _menuBtnRect = { x: GF.cx - drawBtnW / 2, y: btnY, w: drawBtnW, h: drawBtnH };   // hit-rect matches the enlarged drawn button (wide-screen dead-zone fix)
}

function drawGameOver(ctx) {
  ctx.fillStyle = 'rgba(8,8,18,0.94)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(40 * GF.S, 26, 60);
  var subFs   = GF.clamp(17 * GF.S, 13, 22);
  ctx.shadowColor = 'rgba(255,90,90,0.5)';
  ctx.shadowBlur = 30 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#ff5a5a';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('gameover'), GF.cx, GF.cy - 60 * GF.S);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = subFs + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('waves_label') + ': ' + (milestone - 1), GF.cx, GF.cy - 16 * GF.S);
  ctx.fillText(GF.t('score_label') + ': ' + score, GF.cx, GF.cy + 12 * GF.S);

  var btnW = GF.clamp(240 * GF.S, 160, 320);
  var btnH = GF.clamp(52 * GF.S, 40, 66);
  var btnX = GF.cx - btnW / 2;
  var btnY = GF.cy + 50 * GF.S;
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#4dd0e1'); grad.addColorStop(1, '#2a9fb3');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + Math.max(18 * GF.S, 14) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#0a0a14';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('retry'), GF.cx, btnY + btnH / 2 + 1);

  if (bestMilestones > 0) {
    ctx.font = Math.max(13 * GF.S, 11) + 'px Inter, system-ui, sans-serif';
    ctx.fillStyle = '#9aa3b2';
    ctx.fillText(GF.t('best') + ': ' + GF.t('waves_label') + ' ' + bestMilestones + ' / ' + GF.t('score_label') + ' ' + bestScore, GF.cx, btnY + btnH + 22 * GF.S);
  }

  _menuBtnRect = { x: btnX, y: btnY, w: btnW, h: btnH };
}

function wrapText(ctx, text, cx, y, maxW, lineH) {
  var words = String(text).split(' ');
  var lines = [];
  var cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) {
      lines.push(cur);
      cur = words[i];
    } else cur = probe;
  }
  if (cur) lines.push(cur);
  for (var j = 0; j < lines.length; j++) {
    ctx.fillText(lines[j], cx, y + j * lineH);
  }
  return lines.length * lineH;
}

// ── SCREENSHOT HELPERS ───────────────────────────────────────────────────
window._jumpLevel = function(n) {
  startGame();
  // High n = force terminal state (used by runtime gate to verify GAMEOVER reachable)
  if (n && n >= 99) {
    budget = 0;
    // tasks still in queue → triggers GAMEOVER
    gameOver();
    return;
  }
  // Default: pre-populate to a dense mid-game state for screenshots
  for (var i = 0; i < 8 && queue.length > 0; i++) {
    var fakeBudget = 0.20 + Math.random() * 0.20;
    budget -= fakeBudget;
    queue.shift();
    var mIdx = Math.floor(Math.random() * 3);
    laneDone[MODEL_NAMES[mIdx]]++;
  }
  if (queue.length > 0) selectedTaskId = queue[0].id;
};
window._setupForScreenshot = function(n) {
  startGame();
  for (var i = 0; i < 8 && queue.length > 0; i++) {
    var fakeBudget = 0.20 + Math.random() * 0.20;
    budget -= fakeBudget;
    queue.shift();
    var mIdx = Math.floor(Math.random() * 3);
    laneDone[MODEL_NAMES[mIdx]]++;
  }
  if (queue.length > 0) selectedTaskId = queue[0].id;
};

// Yandex-testing-style state exposure
GF.exposeState(function() {
  return {
    gs: gs,
    milestone: milestone,
    budget: Math.round(budget * 100) / 100,
    tasks_remaining: queue.length,
    score: score,
    haiku_done: laneDone.haiku,
    sonnet_done: laneDone.sonnet,
    opus_done: laneDone.opus
  };
});

// Bot contract for the progression probe (#276). Cost-conscious triage: assign
// the head task to the CHEAPEST model with >=70% success for its difficulty
// (haiku->sonnet->opus, cheap->expensive), falling back to the most capable.
// (old gf-lib lacks GF.exposeBot, so set the __gfBot contract directly.)
window.__gfBot = {
  actions: function () { return (gs === 'PLAYING' && queue.length) ? ['assign'] : []; },
  act: function (a) {
    if (a !== 'assign' || gs !== 'PLAYING' || !queue.length) return;
    var d = queue[0].difficulty, best = null;
    for (var i = 0; i < MODEL_NAMES.length; i++) { if (MODEL_SUCCESS[MODEL_NAMES[i]][d] >= 0.7) { best = MODEL_NAMES[i]; break; } }
    if (!best) { var bs = -1; for (var j = 0; j < MODEL_NAMES.length; j++) { var s = MODEL_SUCCESS[MODEL_NAMES[j]][d]; if (s > bs) { bs = s; best = MODEL_NAMES[j]; } } }
    assignTask(queue[0].id, best);
  }
};

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 1200,
  strings: STRINGS,
  sprites: [],
  saveKey: 'agent_budget_triage',
  onReady: function() {
    try {
      bestMilestones = parseInt(localStorage.getItem('agent_budget_triage_best_milestones') || '0') || 0;
      bestScore = parseInt(localStorage.getItem('agent_budget_triage_best_score') || '0') || 0;
    } catch (e) {}

    GF.persist('agent_budget_triage_run_v1',
      function() {
        return {
          gs: gs,
          budget: budget,
          milestone: milestone,
          score: score,
          queue: queue,
          selectedTaskId: selectedTaskId,
          laneDone: laneDone,
          dailySeed: dailySeed
        };
      },
      function(s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        budget = (typeof s.budget === 'number') ? s.budget : STARTING_BUDGET;
        milestone = s.milestone || 1;
        score = s.score || 0;
        queue = s.queue || [];
        selectedTaskId = s.selectedTaskId || null;
        laneDone = s.laneDone || { haiku: 0, sonnet: 0, opus: 0 };
        dailySeed = s.dailySeed || todaySeed();
      }
    );
    if (gs === 'PLAYING' && (!queue.length || budget <= 0)) gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// ── YANDEX MUST-HAVES ────────────────────────────────────────────────────
// 1. All UI text routed through GF.t() / STRINGS — done.
// 2. Persist run state — GF.persist + GF.saveRun on every state transition.
// 3. Fullscreen-exit resize — handled by gf-lib.
// 4. Ads on user-click only — no ads in v0.1.

})();
</script>
