var SPRITE_NAMES = [];

// TUNABLES
var LEVEL_TOTAL = 6;
var MAX_STRIKES = 3;
var CARD_COUNT = 8;
var PERFECT_TOLERANCE = 4;
var GOOD_TOLERANCE = 10;

// Card IDs: 0=chroma 1=bloom 2=dither 3=scan 4=vign 5=dust 6=shake 7=grade
var CARD_IDS = ['chroma','bloom','dither','scan','vign','dust','shake','grade'];
var CARD_FEEL_BASE  = [12, 9, 7, 6, 14, 4, 11, 8];
var CARD_FRAME_COST = [3.5, 7.5, 1.5, 2.5, 2.0, 4.5, 5.5, 6.0];
var CARD_COLORS = ['#ef476f','#ffd166','#a78bfa','#06d6a0','#118ab2','#fb8500','#f72585','#4cc9f0'];

// Per-clip feel modifiers — same card behaves differently per genre
// rows = clip index (0..5), cols = card index (0..7)
var CLIP_FEEL_MOD = [
  // platformer: chroma bloom dither scan vign dust shake grade
  [  2,  3,  0,  4, -2,  3,  5,  1 ],
  // dodge
  [  4,  1, -1, -2,  2,  5,  6,  0 ],
  // breakout
  [  5,  4,  2,  1, -1,  1,  3,  2 ],
  // runner
  [  1,  2,  3,  5,  1,  6,  4, -1 ],
  // puzzle
  [ -2,  0,  4, -3,  6,  1, -2,  5 ],
  // jumper
  [  3,  5,  1,  0,  3,  2,  4,  2 ],
];

var LEVEL_FEEL_TARGETS  = [20, 24, 28, 30, 34, 38];
var LEVEL_FRAME_BUDGETS = [12, 14, 13, 12, 14, 13];
var CLIP_NAMES = ['clip_platformer','clip_dodge','clip_breakout','clip_runner','clip_puzzle','clip_jumper'];

// GAME STATE
var gs = 'MENU';
var score = 0, best = 0;
var levelIdx = 0;
var strikes = 0;
var activeCards = [];
var lastOutcome = null;
var outcomeT = 0;
var clipT = 0;

var drag = { active: false, cardIdx: -1, x: 0, y: 0, fromActive: false };
var pointerDown = false;
var tutorialOverlay = false;

function getLayout() {
  var W = GF.W, H = GF.H;
  var S = GF.S;
  var paletteFrac = 0.38;
  if (W < 520) paletteFrac = 0.44;
  var hudH = Math.max(56, Math.floor(64 * S));
  var pad = Math.max(8, Math.floor(12 * S));
  var paletteW = Math.floor(W * paletteFrac);
  var previewW = W - paletteW;
  var preview = {
    x: pad, y: hudH + pad,
    w: previewW - pad * 2,
    h: H - hudH - pad * 2,
  };
  var palette = {
    x: previewW, y: hudH,
    w: paletteW, h: H - hudH,
  };
  var cols = 2, rows = 4;
  var commitH = Math.max(56, Math.floor(72 * S));
  var availH = palette.h - commitH - pad * 3;
  var tilePad = Math.max(6, Math.floor(8 * S));
  var tileW = Math.floor((palette.w - pad * 2 - tilePad * (cols - 1)) / cols);
  var tileH = Math.floor((availH - tilePad * (rows - 1)) / rows);
  if (tileH < 56) tileH = 56;
  var tiles = [];
  for (var i = 0; i < CARD_COUNT; i++) {
    var col = i % cols, row = Math.floor(i / cols);
    tiles.push({
      x: palette.x + pad + col * (tileW + tilePad),
      y: palette.y + pad + row * (tileH + tilePad),
      w: tileW, h: tileH,
      idx: i,
    });
  }
  var commitBtn = {
    x: palette.x + pad,
    y: palette.y + palette.h - commitH - pad,
    w: palette.w - pad * 2,
    h: commitH,
  };
  var helpBtn = { x: W - hudH + 8, y: 8, w: hudH - 16, h: hudH - 16 };
  return {
    hudH: hudH, preview: preview, palette: palette,
    tiles: tiles, commitBtn: commitBtn, helpBtn: helpBtn, pad: pad,
  };
}

function calcFeel() {
  var f = 0;
  var mods = CLIP_FEEL_MOD[levelIdx % CLIP_FEEL_MOD.length];
  for (var i = 0; i < CARD_COUNT; i++) {
    if (activeCards[i]) f += CARD_FEEL_BASE[i] + mods[i];
  }
  return Math.max(0, f);
}
function calcFrame() {
  var c = 0;
  for (var i = 0; i < CARD_COUNT; i++) if (activeCards[i]) c += CARD_FRAME_COST[i];
  return c;
}
function activeCount() {
  var n = 0;
  for (var i = 0; i < CARD_COUNT; i++) if (activeCards[i]) n++;
  return n;
}

function startGame() {
  score = 0;
  levelIdx = 0;
  strikes = 0;
  activeCards = new Array(CARD_COUNT);
  for (var i = 0; i < CARD_COUNT; i++) activeCards[i] = false;
  lastOutcome = null; outcomeT = 0;
  gs = 'PLAYING';
  drag.active = false;
  GF.gameStarted();
  GF.saveRun();
}

function commitBuild() {
  if (gs !== 'PLAYING') return;
  var feel = calcFeel();
  var frame = calcFrame();
  var target = LEVEL_FEEL_TARGETS[levelIdx];
  var budget = LEVEL_FRAME_BUDGETS[levelIdx];
  var L = getLayout();
  var cx = L.preview.x + L.preview.w / 2;
  var cy = L.preview.y + L.preview.h / 2;
  if (frame > budget) {
    lastOutcome = 'bust_frame';
    outcomeT = 1.5;
    GF.spawnFloat(cx, cy, GF.t('bust_frame'), '#ef476f');
    GF.setShake(0.7);
    gs = 'GAMEOVER';
    if (score > best) { best = score; try { localStorage.setItem('shader_sell_job_best', best); } catch(e){} }
    GF.gameEnded();
    GF.saveRun();
    return;
  }
  if (feel < target) {
    lastOutcome = 'bust_feel';
    outcomeT = 1.5;
    strikes++;
    GF.spawnFloat(cx, cy, GF.t('bust_feel'), '#ef476f');
    GF.spawnFloat(cx, cy + 32 * GF.S, GF.t('strikes') + ' ' + strikes + '/' + MAX_STRIKES, '#fb8500');
    GF.setShake(0.4);
    if (strikes >= MAX_STRIKES) {
      gs = 'GAMEOVER';
      if (score > best) { best = score; try { localStorage.setItem('shader_sell_job_best', best); } catch(e){} }
      GF.gameEnded();
      GF.saveRun();
    } else {
      for (var i = 0; i < CARD_COUNT; i++) activeCards[i] = false;
      GF.saveRun();
    }
    return;
  }
  var over = feel - target;
  if (over <= PERFECT_TOLERANCE) {
    lastOutcome = 'perfect';
    GF.spawnFloat(cx, cy, GF.t('perfect'), '#ffeb3b');
    GF.setShake(0.6);
    score += 200;
  } else if (over <= GOOD_TOLERANCE) {
    lastOutcome = 'good';
    GF.spawnFloat(cx, cy, GF.t('good'), '#06d6a0');
    GF.setShake(0.3);
    score += 100;
  } else {
    lastOutcome = 'good';
    GF.spawnFloat(cx, cy, GF.t('good'), '#06d6a0');
    score += 50;
  }
  score += Math.max(0, Math.round((budget - frame) * 5));
  outcomeT = 1.5;
  for (var j = 0; j < CARD_COUNT; j++) activeCards[j] = false;
  levelIdx++;
  if (levelIdx >= LEVEL_TOTAL) {
    gs = 'WIN';
    score += 500;
    if (score > best) { best = score; try { localStorage.setItem('shader_sell_job_best', best); } catch(e){} }
    GF.gameEnded();
    GF.saveRun();
    return;
  }
  GF.saveRun();
}

window._jumpLevel = function(n) {
  startGame();
  var target = (typeof n === 'number' ? n : 2);
  // n >= LEVEL_TOTAL: force terminal WON state for runtime-gate reachability
  if (target >= LEVEL_TOTAL) {
    gs = 'WIN';
    levelIdx = LEVEL_TOTAL;
    score = 1000;
    GF.gameEnded();
    GF.saveRun();
    return;
  }
  levelIdx = Math.max(0, target);
  activeCards = [true, false, false, true, true, false, false, true];
  GF.saveRun();
};

window._setupForScreenshot = function(n) {
  startGame();
  var target = (typeof n === 'number' ? Math.max(0, n - 1) : 2);
  if (target >= LEVEL_TOTAL) target = LEVEL_TOTAL - 1;
  levelIdx = target;
  for (var i = 0; i < CARD_COUNT; i++) activeCards[i] = false;
  activeCards[0] = true; // chroma
  activeCards[3] = true; // scanline
  activeCards[4] = true; // vignette
  strikes = 0;
  try { localStorage.setItem('shader_sell_job_seen_tutorial', '1'); } catch (e) {}
  tutorialOverlay = false;
  GF.saveRun();
};

// CLIPS
function drawClip(c, rect, clipIdx, t) {
  var x = rect.x, y = rect.y, w = rect.w, h = rect.h;
  var bgGrad = c.createLinearGradient(x, y, x, y + h);
  bgGrad.addColorStop(0, '#1a1a2e');
  bgGrad.addColorStop(1, '#0f0f1a');
  c.fillStyle = bgGrad;
  c.fillRect(x, y, w, h);
  switch (clipIdx) {
    case 0: drawPlatformerClip(c, x, y, w, h, t); break;
    case 1: drawDodgeClip(c, x, y, w, h, t); break;
    case 2: drawBreakoutClip(c, x, y, w, h, t); break;
    case 3: drawRunnerClip(c, x, y, w, h, t); break;
    case 4: drawPuzzleClip(c, x, y, w, h, t); break;
    case 5: drawJumperClip(c, x, y, w, h, t); break;
  }
}

function drawPlatformerClip(c, x, y, w, h, t) {
  var ground = y + h - 18 * GF.S;
  c.fillStyle = '#4a3527';
  c.fillRect(x, ground, w, 18 * GF.S);
  for (var i = 0; i < 4; i++) {
    var px = x + ((t * 35 + i * 130) % (w + 100)) - 50;
    var ph = 14 * GF.S;
    var py = ground - 50 * GF.S - (i % 2) * 30 * GF.S;
    c.fillStyle = '#6a4a32';
    c.fillRect(px, py, 70 * GF.S, ph);
  }
  var hop = Math.abs(Math.sin(t * 3)) * 38 * GF.S;
  var sx = x + w * 0.30;
  var sy = ground - 28 * GF.S - hop;
  c.fillStyle = '#4cd964';
  c.fillRect(sx, sy, 28 * GF.S, 28 * GF.S);
  c.fillStyle = '#fff';
  c.fillRect(sx + 5 * GF.S, sy + 8 * GF.S, 5 * GF.S, 5 * GF.S);
  c.fillRect(sx + 17 * GF.S, sy + 8 * GF.S, 5 * GF.S, 5 * GF.S);
}

function drawDodgeClip(c, x, y, w, h, t) {
  c.fillStyle = '#0a0f1f';
  c.fillRect(x, y, w, h);
  for (var i = 0; i < 18; i++) {
    var sx = x + ((i * 71 + t * 60) % w);
    var sy = y + ((i * 53 + t * 90) % h);
    c.fillStyle = 'rgba(255,255,255,' + (0.3 + 0.5 * (i % 3) / 3) + ')';
    c.fillRect(sx, sy, 2, 2);
  }
  for (var j = 0; j < 5; j++) {
    var bx = x + ((j * 73 + 31) % w);
    var by = y + ((t * 180 + j * 100) % h);
    c.fillStyle = '#ffeb3b';
    c.fillRect(bx, by, 4 * GF.S, 12 * GF.S);
  }
  var px = x + w / 2 + Math.sin(t * 2) * 60 * GF.S;
  var py = y + h - 50 * GF.S;
  c.fillStyle = '#4dd0e1';
  c.beginPath();
  c.moveTo(px, py - 18 * GF.S);
  c.lineTo(px - 16 * GF.S, py + 10 * GF.S);
  c.lineTo(px + 16 * GF.S, py + 10 * GF.S);
  c.closePath();
  c.fill();
}

function drawBreakoutClip(c, x, y, w, h, t) {
  var rows = 4, cols = 8;
  var brickW = w / cols;
  var brickH = 16 * GF.S;
  for (var r = 0; r < rows; r++) {
    for (var col = 0; col < cols; col++) {
      var hue = (r * 45 + col * 20) % 360;
      c.fillStyle = 'hsl(' + hue + ',60%,55%)';
      c.fillRect(x + col * brickW + 1, y + 12 + r * brickH, brickW - 2, brickH - 2);
    }
  }
  var paddleX = x + w / 2 - 50 * GF.S + Math.sin(t * 1.5) * 80 * GF.S;
  var paddleY = y + h - 24 * GF.S;
  c.fillStyle = '#fff';
  c.fillRect(paddleX, paddleY, 100 * GF.S, 12 * GF.S);
  var bx = x + w / 2 + Math.cos(t * 2.3) * w * 0.35;
  var by = y + h / 2 + Math.sin(t * 2.7) * h * 0.25;
  c.fillStyle = '#ffeb3b';
  c.beginPath(); c.arc(bx, by, 7 * GF.S, 0, Math.PI * 2); c.fill();
}

function drawRunnerClip(c, x, y, w, h, t) {
  c.fillStyle = '#2c2c4a';
  for (var i = 0; i < 5; i++) {
    var mx = x + ((i * 220 - t * 25) % (w + 300)) - 150;
    var my = y + h * 0.4;
    c.beginPath();
    c.moveTo(mx, y + h - 30);
    c.lineTo(mx + 90 * GF.S, my);
    c.lineTo(mx + 180 * GF.S, y + h - 30);
    c.closePath();
    c.fill();
  }
  c.fillStyle = '#3a2a1a';
  c.fillRect(x, y + h - 30, w, 30);
  var rx = x + w * 0.3;
  var ry = y + h - 30 - 36 * GF.S;
  var leg = (t * 8) % 1;
  c.fillStyle = '#ef476f';
  c.fillRect(rx, ry, 22 * GF.S, 30 * GF.S);
  c.fillRect(rx + 4 * GF.S, ry + 30 * GF.S, 6 * GF.S, 8 * GF.S + leg * 4);
  c.fillRect(rx + 12 * GF.S, ry + 30 * GF.S, 6 * GF.S, 12 * GF.S - leg * 4);
}

function drawPuzzleClip(c, x, y, w, h, t) {
  var cells = 6;
  var cellW = Math.min(w, h) / cells;
  var ox = x + (w - cellW * cells) / 2;
  var oy = y + (h - cellW * cells) / 2;
  for (var r = 0; r < cells; r++) {
    for (var col = 0; col < cells; col++) {
      var hue = ((r * 37 + col * 53) * 7) % 360;
      c.fillStyle = 'hsl(' + hue + ',40%,28%)';
      c.fillRect(ox + col * cellW + 2, oy + r * cellW + 2, cellW - 4, cellW - 4);
    }
  }
  var sel = Math.floor(t * 1.3) % (cells * cells);
  var sr = Math.floor(sel / cells), sc = sel % cells;
  var pulse = 0.5 + 0.5 * Math.sin(t * 5);
  c.strokeStyle = 'rgba(255,235,59,' + (0.4 + pulse * 0.5) + ')';
  c.lineWidth = 3;
  c.strokeRect(ox + sc * cellW + 2, oy + sr * cellW + 2, cellW - 4, cellW - 4);
}

function drawJumperClip(c, x, y, w, h, t) {
  var platforms = 5;
  for (var i = 0; i < platforms; i++) {
    var py = y + h - ((t * 40 + i * 70) % (h + 60)) + 30;
    var px = x + w * (0.2 + 0.6 * ((i * 7) % 10) / 10);
    c.fillStyle = '#06d6a0';
    c.fillRect(px, py, 60 * GF.S, 10 * GF.S);
  }
  var cx = x + w / 2 + Math.sin(t * 1.8) * 60 * GF.S;
  var cy = y + h * 0.4 + Math.abs(Math.sin(t * 4)) * 30 * GF.S;
  c.fillStyle = '#ffd166';
  c.beginPath(); c.arc(cx, cy, 14 * GF.S, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#000';
  c.beginPath(); c.arc(cx - 4 * GF.S, cy - 2 * GF.S, 2, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(cx + 4 * GF.S, cy - 2 * GF.S, 2, 0, Math.PI * 2); c.fill();
}

// VFX OVERLAYS
function applyVFX(c, rect) {
  var x = rect.x, y = rect.y, w = rect.w, h = rect.h;
  if (activeCards[0]) {
    c.globalCompositeOperation = 'screen';
    c.fillStyle = 'rgba(255,0,80,0.15)';
    c.fillRect(x - 4, y, w, h);
    c.fillStyle = 'rgba(0,200,255,0.15)';
    c.fillRect(x + 4, y, w, h);
    c.globalCompositeOperation = 'source-over';
  }
  if (activeCards[1]) {
    var bg = c.createRadialGradient(x + w / 2, y + h / 2, 0, x + w / 2, y + h / 2, Math.max(w, h) * 0.7);
    bg.addColorStop(0, 'rgba(255,240,180,0.30)');
    bg.addColorStop(1, 'rgba(255,240,180,0)');
    c.globalCompositeOperation = 'screen';
    c.fillStyle = bg; c.fillRect(x, y, w, h);
    c.globalCompositeOperation = 'source-over';
  }
  if (activeCards[2]) {
    c.save();
    c.beginPath(); c.rect(x, y, w, h); c.clip();
    var cell = 3;
    c.globalAlpha = 0.18;
    c.fillStyle = '#fff';
    for (var dy = 0; dy < h; dy += cell * 2) {
      for (var dx = 0; dx < w; dx += cell * 2) {
        c.fillRect(x + dx, y + dy, cell, cell);
        c.fillRect(x + dx + cell, y + dy + cell, cell, cell);
      }
    }
    c.globalAlpha = 1;
    c.restore();
  }
  if (activeCards[3]) {
    c.save();
    c.beginPath(); c.rect(x, y, w, h); c.clip();
    c.globalAlpha = 0.22;
    c.fillStyle = '#000';
    for (var sy = 0; sy < h; sy += 4) c.fillRect(x, y + sy, w, 2);
    c.globalAlpha = 1;
    c.restore();
  }
  if (activeCards[4]) {
    var vg = c.createRadialGradient(x + w / 2, y + h / 2, Math.min(w, h) * 0.25, x + w / 2, y + h / 2, Math.max(w, h) * 0.65);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.65)');
    c.fillStyle = vg; c.fillRect(x, y, w, h);
  }
  if (activeCards[5]) {
    c.save();
    c.beginPath(); c.rect(x, y, w, h); c.clip();
    for (var i = 0; i < 22; i++) {
      var dustX = x + ((i * 71 + clipT * 50) % w);
      var dustY = y + ((i * 53 + clipT * 20) % h);
      c.globalAlpha = 0.25 + 0.35 * ((i % 3) / 3);
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(dustX, dustY, 1.5 + (i % 3), 0, Math.PI * 2); c.fill();
    }
    c.globalAlpha = 1;
    c.restore();
  }
  if (activeCards[6]) {
    var k = (Math.sin(clipT * 30) > 0) ? 0.20 : 0.10;
    c.strokeStyle = 'rgba(255,80,80,' + k + ')';
    c.lineWidth = Math.max(4, 6 * GF.S);
    c.strokeRect(x + 2, y + 2, w - 4, h - 4);
  }
  if (activeCards[7]) {
    c.globalCompositeOperation = 'overlay';
    var gg = c.createLinearGradient(x, y, x + w, y + h);
    gg.addColorStop(0, 'rgba(20,80,120,0.45)');
    gg.addColorStop(1, 'rgba(220,140,40,0.45)');
    c.fillStyle = gg; c.fillRect(x, y, w, h);
    c.globalCompositeOperation = 'source-over';
  }
}

// HUD
function drawHUD(L) {
  var c = GF.ctx;
  var fs = GF.clamp(15 * GF.S, 11, 19) | 0;
  c.fillStyle = 'rgba(15,15,25,0.92)';
  c.fillRect(0, 0, GF.W, L.hudH);
  c.fillStyle = '#3a3a55';
  c.fillRect(0, L.hudH - 2, GF.W, 2);
  c.font = 'bold ' + fs + 'px sans-serif';
  c.textBaseline = 'middle';
  c.textAlign = 'left';

  var x = 12 * GF.S;
  var y = L.hudH / 2;
  c.fillStyle = '#9aa3b2';
  var lev = GF.t('level') + ': ';
  c.fillText(lev, x, y);
  var w1 = c.measureText(lev).width;
  c.fillStyle = '#fff';
  var lvText = (levelIdx + 1) + '/' + LEVEL_TOTAL;
  c.fillText(lvText, x + w1, y);
  x += w1 + c.measureText(lvText).width + 18 * GF.S;
  c.fillStyle = '#4dd0e1';
  var clipName = GF.t(CLIP_NAMES[levelIdx]);
  c.fillText(clipName, x, y);
  x += c.measureText(clipName).width + 20 * GF.S;

  c.fillStyle = '#9aa3b2';
  var strk = GF.t('strikes') + ': ';
  c.fillText(strk, x, y);
  var w2 = c.measureText(strk).width;
  c.fillStyle = (strikes > 0 ? '#ef476f' : '#fff');
  c.fillText(strikes + '/' + MAX_STRIKES, x + w2, y);

  // SCORE right side
  var rightX = GF.W - L.helpBtn.w - 16 * GF.S;
  var scoreText = '' + score;
  var scoreLabel = GF.t('score') + ': ';
  c.fillStyle = '#ffd166';
  c.textAlign = 'right';
  c.fillText(scoreText, rightX, y);
  c.fillStyle = '#9aa3b2';
  c.fillText(scoreLabel, rightX - c.measureText(scoreText).width - 4, y);

  var b = L.helpBtn;
  c.fillStyle = '#2a2a3e';
  GF.rr(c, b.x, b.y, b.w, b.h, 6);
  c.fill();
  c.strokeStyle = '#4a4a66';
  c.lineWidth = 1;
  c.stroke();
  c.fillStyle = '#fff';
  c.textAlign = 'center';
  c.font = 'bold ' + (b.h * 0.55) + 'px sans-serif';
  c.fillText('?', b.x + b.w / 2, b.y + b.h / 2 + 2);

  c.textBaseline = 'alphabetic';
}

function drawBars(L) {
  var c = GF.ctx;
  var feel = calcFeel();
  var frame = calcFrame();
  var target = LEVEL_FEEL_TARGETS[levelIdx];
  var budget = LEVEL_FRAME_BUDGETS[levelIdx];
  var p = L.preview;
  var barH = Math.max(20, 26 * GF.S) | 0;
  var labelH = Math.max(14, 16 * GF.S) | 0;
  var barW = p.w;
  var by1 = p.y + p.h - barH * 2 - labelH * 2 - 6;
  var by2 = by1 + barH + labelH + 4;
  drawMeter(c, p.x, by1, barW, barH, labelH, GF.t('feel') + ' / ' + GF.t('target'), feel, target, '#4cd964', '#ef476f', false);
  drawMeter(c, p.x, by2, barW, barH, labelH, GF.t('budget') + ' / ' + GF.t('cap'), frame, budget, '#4dd0e1', '#ef476f', true);
}

function drawMeter(c, x, y, w, h, labelH, label, value, target, goodColor, badColor, isFrame) {
  var fs = GF.clamp(11 * GF.S, 10, 14) | 0;
  c.font = 'bold ' + fs + 'px sans-serif';
  c.fillStyle = '#9aa3b2';
  c.textBaseline = 'alphabetic';
  c.textAlign = 'left';
  c.fillText(label, x, y - 4);
  c.textAlign = 'right';
  c.fillStyle = '#fff';
  var valStr = isFrame ? value.toFixed(1) + ' / ' + target.toFixed(1) + ' ms' : value + ' / ' + target;
  c.fillText(valStr, x + w, y - 4);
  c.fillStyle = '#1a1a2e';
  GF.rr(c, x, y, w, h, h / 2); c.fill();
  var pct;
  if (isFrame) pct = Math.max(0, Math.min(1.2, value / Math.max(target, 1)));
  else pct = Math.max(0, Math.min(1.2, value / Math.max(target, 1)));
  var fillW = Math.min(w, w * pct);
  var ok;
  if (isFrame) ok = value <= target;
  else ok = value >= target;
  c.fillStyle = ok ? goodColor : badColor;
  if (fillW > 4) { GF.rr(c, x, y, fillW, h, h / 2); c.fill(); }
  // tick marker at 100% of target
  var tx = x + w; // the bar width IS the target = 100%; but we want a visual marker shy of the right edge for "target" — use 100% line
  c.strokeStyle = '#fff';
  c.lineWidth = 2;
  c.beginPath(); c.moveTo(tx - 1, y); c.lineTo(tx - 1, y + h); c.stroke();
}

function drawPalette(L) {
  var c = GF.ctx;
  for (var i = 0; i < L.tiles.length; i++) {
    var t = L.tiles[i];
    var card = i;
    if (drag.active && drag.cardIdx === card && !drag.fromActive) continue;
    drawCardAt(c, t.x, t.y, t.w, t.h, card, activeCards[card]);
  }
  var b = L.commitBtn;
  var feel = calcFeel();
  var frame = calcFrame();
  var target = LEVEL_FEEL_TARGETS[levelIdx];
  var budget = LEVEL_FRAME_BUDGETS[levelIdx];
  var ok = (feel >= target && frame <= budget);
  var grad = c.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
  if (ok) { grad.addColorStop(0, '#4cd964'); grad.addColorStop(1, '#2eaa4f'); }
  else    { grad.addColorStop(0, '#3a3a55'); grad.addColorStop(1, '#22223a'); }
  GF.rr(c, b.x, b.y, b.w, b.h, 12); c.fillStyle = grad; c.fill();
  c.strokeStyle = ok ? '#fff' : '#666';
  c.lineWidth = 2;
  c.stroke();
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(18 * GF.S, 14, 22) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(GF.t('commit'), b.x + b.w / 2, b.y + b.h / 2);
  c.textBaseline = 'alphabetic';
}

function drawCardAt(c, x, y, w, h, card, isActive) {
  var col = CARD_COLORS[card];
  c.fillStyle = isActive ? '#3a3a55' : '#1a1a2e';
  GF.rr(c, x, y, w, h, 8); c.fill();
  c.strokeStyle = col;
  c.lineWidth = isActive ? 3 : 1;
  c.stroke();
  c.fillStyle = col;
  var fs = GF.clamp(12 * GF.S, 10, 14) | 0;
  c.font = 'bold ' + fs + 'px sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'top';
  c.fillText(GF.t('card_' + CARD_IDS[card]), x + w / 2, y + 6);
  var fs2 = GF.clamp(10 * GF.S, 9, 13) | 0;
  c.font = fs2 + 'px sans-serif';
  c.fillStyle = '#9aa3b2';
  c.textAlign = 'left';
  c.fillText('+' + CARD_FEEL_BASE[card] + ' F', x + 4, y + h - fs2 - 14);
  c.textAlign = 'right';
  c.fillStyle = '#fb8500';
  c.fillText(CARD_FRAME_COST[card].toFixed(1) + 'ms', x + w - 4, y + h - fs2 - 14);
  if (isActive) {
    c.fillStyle = '#4cd964';
    c.font = 'bold ' + fs2 + 'px sans-serif';
    c.textAlign = 'center';
    c.fillText(GF.t('shipped'), x + w / 2, y + h - fs2 - 2);
  } else {
    c.fillStyle = '#777';
    c.font = fs2 + 'px sans-serif';
    c.textAlign = 'center';
    c.fillText(GF.t('drag_hint'), x + w / 2, y + h - fs2 - 2);
  }
  c.textBaseline = 'alphabetic';
}

// INPUT
function pointAt(x, y) {
  var L = getLayout();
  if (x >= L.helpBtn.x && x <= L.helpBtn.x + L.helpBtn.w &&
      y >= L.helpBtn.y && y <= L.helpBtn.y + L.helpBtn.h) return { type: 'help' };
  var b = L.commitBtn;
  if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) return { type: 'commit' };
  for (var i = 0; i < L.tiles.length; i++) {
    var t = L.tiles[i];
    if (x >= t.x && x <= t.x + t.w && y >= t.y && y <= t.y + t.h) return { type: 'tile', idx: i };
  }
  var p = L.preview;
  if (x >= p.x && x <= p.x + p.w && y >= p.y && y <= p.y + p.h) return { type: 'preview' };
  return { type: 'none' };
}

function onPointerDown(x, y) {
  if (gs !== 'PLAYING') return;
  if (tutorialOverlay) { tutorialOverlay = false; return; }
  var hit = pointAt(x, y);
  if (hit.type === 'help') { tutorialOverlay = true; return; }
  if (hit.type === 'commit') {
    commitBuild();
    return;
  }
  if (hit.type === 'tile') {
    drag.active = true;
    drag.cardIdx = hit.idx;
    drag.x = x; drag.y = y;
    drag.fromActive = false;
    return;
  }
  if (hit.type === 'preview' && activeCount() > 0) {
    for (var i = CARD_COUNT - 1; i >= 0; i--) {
      if (activeCards[i]) {
        drag.active = true;
        drag.cardIdx = i;
        drag.x = x; drag.y = y;
        drag.fromActive = true;
        activeCards[i] = false;
        return;
      }
    }
  }
}
function onPointerMove(x, y) {
  if (drag.active) { drag.x = x; drag.y = y; }
}
function onPointerUp(x, y) {
  if (!drag.active) return;
  var L = getLayout();
  var p = L.preview;
  var insidePreview = (x >= p.x && x <= p.x + p.w && y >= p.y && y <= p.y + p.h);
  if (insidePreview) {
    if (!activeCards[drag.cardIdx]) activeCards[drag.cardIdx] = true;
    GF.saveRun();
  } else if (drag.fromActive) {
    GF.saveRun();
  }
  drag.active = false;
}

var canvas = document.getElementById('c');
canvas.addEventListener('mousedown', function(e) { pointerDown = true; onPointerDown(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', function(e) { if (pointerDown) onPointerMove(e.clientX, e.clientY); });
canvas.addEventListener('mouseup',   function(e) { pointerDown = false; onPointerUp(e.clientX, e.clientY); });
canvas.addEventListener('touchstart', function(e) {
  if (e.touches && e.touches[0]) { pointerDown = true; onPointerDown(e.touches[0].clientX, e.touches[0].clientY); }
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  if (e.touches && e.touches[0]) onPointerMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
  var t = (e.changedTouches && e.changedTouches[0]);
  if (t) onPointerUp(t.clientX, t.clientY);
  pointerDown = false;
}, { passive: false });

// TUTORIAL PANEL
function drawTutorialPanel(forMenu) {
  var c = GF.ctx;
  var W = GF.W, H = GF.H;
  c.fillStyle = 'rgba(8,10,20,0.92)';
  c.fillRect(0, 0, W, H);
  var pw = Math.min(W - 40, 560 * GF.S);
  var ph = Math.min(H - 60, 460 * GF.S);
  var px = (W - pw) / 2;
  var py = (H - ph) / 2;
  c.fillStyle = '#13131f';
  GF.rr(c, px, py, pw, ph, 14); c.fill();
  c.strokeStyle = '#4dd0e1';
  c.lineWidth = 2; c.stroke();

  var fsTitle = GF.clamp(22 * GF.S, 16, 28) | 0;
  c.fillStyle = '#fff';
  c.font = 'bold ' + fsTitle + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'top';
  c.fillText(GF.t('title'), W / 2, py + 16);

  var fs = GF.clamp(13 * GF.S, 11, 16) | 0;
  c.font = fs + 'px sans-serif';
  c.fillStyle = '#cdd';
  c.textAlign = 'left';
  var lineH = fs + 6;
  var tx = px + 18;
  var ty = py + 16 + fsTitle + 16;
  var maxW = pw - 36;
  var keys = ['tut_goal','tut_controls','tut_win','tut_lose','tut_tip'];
  for (var i = 0; i < keys.length; i++) {
    ty = wrapText(c, GF.t(keys[i]), tx, ty, maxW, lineH) + 8;
  }
  c.textAlign = 'center';
  c.fillStyle = '#9aa3b2';
  var hint = forMenu ? (GF.lang === 'ru' ? 'Нажми ИГРАТЬ' : 'Tap PLAY') : (GF.lang === 'ru' ? 'Нажми чтобы закрыть' : 'Tap to close');
  c.fillText(hint, W / 2, py + ph - 22);
  c.textBaseline = 'alphabetic';
}

function wrapText(c, text, x, y, maxW, lineH) {
  var words = String(text).split(/\s+/);
  var cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && cur) {
      c.fillText(cur, x, y);
      y += lineH;
      cur = words[i];
    } else {
      cur = probe;
    }
  }
  if (cur) { c.fillText(cur, x, y); y += lineH; }
  return y;
}

function drawDragGhost() {
  if (!drag.active) return;
  var c = GF.ctx;
  var w = 120 * GF.S, h = 80 * GF.S;
  drawCardAt(c, drag.x - w / 2, drag.y - h / 2, w, h, drag.cardIdx, true);
}

function update(dt) {
  clipT += dt;
  if (outcomeT > 0) outcomeT -= dt;
}

function draw(c) {
  c.fillStyle = '#0a0a14';
  c.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'MENU') {
    var L0 = getLayout();
    drawClip(c, L0.preview, 0, clipT);
    applyVFX(c, L0.preview);
    drawTutorialPanel(true);
    GF.drawOverlay({
      title: '',
      sub: '',
      btnText: GF.t('play'),
      btnFn: function() {
        try { localStorage.setItem('shader_sell_job_seen_tutorial', '1'); } catch (e) {}
        startGame();
      },
      bestText: best > 0 ? GF.t('best') + ': ' + best : null,
    });
    return;
  }

  if (gs === 'PLAYING') {
    var L = getLayout();
    drawHUD(L);
    drawClip(c, L.preview, levelIdx, clipT);
    applyVFX(c, L.preview);
    drawBars(L);
    drawPalette(L);
    if (tutorialOverlay) drawTutorialPanel(false);
    drawDragGhost();
    return;
  }

  if (gs === 'GAMEOVER') {
    var subKey = (lastOutcome === 'bust_frame') ? 'bust_frame' : 'bust_feel';
    GF.drawOverlay({
      title: GF.t('gameover'),
      sub: GF.t(subKey),
      sub2: GF.t('score') + ': ' + score + '   ' + (best > 0 ? GF.t('best') + ': ' + best : ''),
      btnText: GF.t('retry'),
      btnFn: function() { startGame(); },
    });
    return;
  }
  if (gs === 'WIN') {
    GF.drawOverlay({
      title: GF.t('won'),
      sub: GF.t('score') + ': ' + score,
      sub2: best > 0 ? GF.t('best') + ': ' + best : '',
      btnText: GF.t('retry'),
      btnFn: function() { startGame(); },
    });
    return;
  }
}

GF.init({
  designW: 900,
  designH: 600,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'shader_sell_job',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('shader_sell_job_best') || '0') || 0; } catch (e) {}
    GF.persist('shader_sell_job_run_v1',
      function() {
        return {
          gs: gs, score: score, levelIdx: levelIdx, strikes: strikes,
          activeCards: activeCards.slice(),
        };
      },
      function(s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        score = s.score || 0;
        levelIdx = Math.max(0, Math.min(LEVEL_TOTAL - 1, s.levelIdx || 0));
        strikes = s.strikes || 0;
        if (Array.isArray(s.activeCards) && s.activeCards.length === CARD_COUNT) {
          activeCards = s.activeCards.slice();
        }
      }
    );
    if (gs === 'PLAYING') gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// STATE EXPOSURE FOR RUNTIME GATE (must be SYNC, not inside onReady)
GF.exposeState(function() {
  return {
    gs: gs, score: score, levelIdx: levelIdx, strikes: strikes,
    feel: calcFeel(), frame: calcFrame(),
    feelTarget: LEVEL_FEEL_TARGETS[levelIdx],
    frameBudget: LEVEL_FRAME_BUDGETS[levelIdx],
    activeCount: activeCount(),
  };
});

// YANDEX MUST-HAVES — see template for full rationale
// 1. All UI text routed through GF.t() / STRINGS — done in this file
// 2. Save run state via GF.persist + GF.saveRun() — done above
// 3. Fullscreen-exit resize — handled by gf-lib
// 4. Ads on user-click only — no auto-fire ads in this game

})();
</script>
