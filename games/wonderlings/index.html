function buildLookups() {
  SPECIES_BY_KEY = {}; FRIEND_OF = {};

var gs = 'HAVEN';                  // HAVEN | UNWRAP | MEET | SETS | HELP

// ── SEEDED RNG for cosmetic look (per-creature, stable) ──────────────────────
function hashStr(str) {
  var h = 2166136261;
  for (var i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = (h * 16777619) >>> 0; }
  return h >>> 0;
}
function seededRand(seed) {
  // mulberry32
  var a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    var t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function weightedPick(weights, r) {
  var total = 0, k;
  for (k in weights) total += weights[k];
  var x = r * total;
  for (k in weights) { x -= weights[k]; if (x <= 0) return k; }
  for (k in weights) return k; // fallback
}

// ── GIFT / DRAW A CREATURE ───────────────────────────────────────────────────
function unownedSetSpecies() {
  var set = SETS[roomIndex];
  var owned = setOwnedKeys[set.id] || {};
  var out = [];
  for (var i = 0; i < set.species.length; i++) {
    if (!owned[set.species[i].key]) out.push(set.species[i]);
  }
  return out;
}
function drawGiftSpecies() {
  // COMPLETION_BIAS toward unowned set species so completion is guaranteed by play.
  var set = SETS[roomIndex];
  var unowned = unownedSetSpecies();
  var pickSp;
  if (unowned.length && Math.random() < T.COMPLETION_BIAS) {
    pickSp = unowned[(Math.random() * unowned.length) | 0];
  } else {
    pickSp = set.species[(Math.random() * set.species.length) | 0];
  }
  return pickSp;
}
function makeCreature() {
  var sp = drawGiftSpecies();
  giftSerialCounter++;
  var serial = giftSerialCounter;
  var seed = hashStr(sp.key + '#' + serial);
  var r = seededRand(seed);
  var pattern = weightedPick(PATTERN_W, r());
  var backdrop = weightedPick(BACKDROP_W, r());
  return {
    key: sp.key, species: sp.key,
    biome: sp.biome, social: sp.social, trait2: sp.trait2,
    shape: sp.shape, hue: sp.hue, sprite: sp.sprite,
    pattern: pattern, backdrop: backdrop,
    serial: serial,
    seed: seed,
    cell: -1, inReserve: false,
    // transient draw props (juice)
    sc: 1, bob: r() * Math.PI * 2,
  };
}

// ── WONDER SCORING (exact DESIGN.md formula) ─────────────────────────────────
function gridCols() { return SETS[roomIndex].cols; }
function gridRows() { return SETS[roomIndex].rows; }
function cellAt(col, row) {
  if (col < 0 || row < 0 || col >= gridCols() || row >= gridRows()) return null;
  return grid[row * gridCols() + col];
}
function orthoNeighbors(idx) {
  var cols = gridCols(), col = idx % cols, row = (idx / cols) | 0;
  var res = [];
  var c1 = cellAt(col - 1, row); if (c1) res.push(c1);
  var c2 = cellAt(col + 1, row); if (c2) res.push(c2);
  var c3 = cellAt(col, row - 1); if (c3) res.push(c3);
  var c4 = cellAt(col, row + 1); if (c4) res.push(c4);
  return res;
}
function hasAdjacentWaterCell(idx) {
  var cols = gridCols(), col = idx % cols, row = (idx / cols) | 0;
  var terr = SETS[roomIndex].terrain;
  var dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (var d = 0; d < dirs.length; d++) {
    var nc = col + dirs[d][0], nr = row + dirs[d][1];
    if (nc < 0 || nr < 0 || nc >= cols || nr >= gridRows()) continue;
    if (terr[nr * cols + nc] === 'water') return true;
  }
  return false;
}
function distinctSetPresence() {
  var seen = {};
  for (var i = 0; i < grid.length; i++) { if (grid[i]) seen[grid[i].key] = true; }
  var n = 0; for (var k in seen) n++;
  return n;
}
// Per-creature wonder contribution at its current cell.
function creatureWonder(cr, idx) {
  if (!cr) return 0;
  var w = 0;
  var terr = SETS[roomIndex].terrain;
  var neighbors = orthoNeighbors(idx);
  // terrain
  if (terr[idx] === cr.biome) w += T.W_TERRAIN;
  // social
  if (cr.social === 'playful') { if (neighbors.length >= 2) w += T.W_SOCIAL; }
  else if (cr.social === 'shy') { if (neighbors.length <= 1) w += T.W_SOCIAL; }
  else if (cr.social === 'balanced') { w += T.W_SOCIAL; }
  // solitary handled purely by penalty (no social bonus)
  // trait2
  if (cr.trait2 === 'needs-water') { if (hasAdjacentWaterCell(idx)) w += T.W_TRAIT; }
  else if (cr.trait2 === 'loves-friend') {
    for (var i = 0; i < neighbors.length; i++) { if (FRIEND_OF[cr.key] && FRIEND_OF[cr.key][neighbors[i].key]) { w += T.W_TRAIT; break; } }
  } else if (cr.trait2 === 'matching-coat') {
    for (var j = 0; j < neighbors.length; j++) { if (neighbors[j].pattern === cr.pattern) { w += T.W_TRAIT; break; } }
  } else if (cr.trait2 === 'likes-radiant') {
    for (var m = 0; m < neighbors.length; m++) { if (neighbors[m].backdrop === 'radiant') { w += T.W_TRAIT; break; } }
  }
  // friend adjacency (per adjacent friend-pair)
  for (var f = 0; f < neighbors.length; f++) {
    if (FRIEND_OF[cr.key] && FRIEND_OF[cr.key][neighbors[f].key]) w += T.W_FRIEND;
  }
  // solitary penalty
  if (cr.social === 'solitary') w -= T.W_SOLITARY_PEN * neighbors.length;
  return w;
}
function computeWonder() {
  var total = 0;
  for (var i = 0; i < grid.length; i++) {
    if (grid[i]) total += creatureWonder(grid[i], i);
  }
  // set-presence: per distinct theme-species displayed
  total += T.W_SETPRESENCE * distinctSetPresence();
  if (total < 0) total = 0;
  return total;
}

// Recompute wonder after any board change; feed Joy (anti-stall) + renown.
function refreshAfterPlacement(placedCount) {
  var prev = wonder;
  wonder = computeWonder();
  var gain = Math.max(0, wonder - prev);
  // banked renown rises with positive wonder gain (never decreases for moves)
  if (gain > 0) renownBank += gain;
  // Joy: positive wonder gain since last gift + flat per-place floor (anti-stall)
  if (gain > 0 || placedCount > 0) {
    joy += gain + (placedCount > 0 ? T.JOY_PER_PLACE * placedCount : 0);
  }
  while (joy >= joyTarget) {
    joy -= joyTarget;
    deliverGift();
  }
  GF.saveRun();
}

function deliverGift() {
  if (giftReady) giftQueue++;     // already one waiting -> bank it, never lose a gift
  else giftReady = true;
  joyTarget += T.JOY_TARGET_GROWTH;
  roomLevel[roomIndex] = (roomLevel[roomIndex] || 0) + 1;
  lastGiftWonder = wonder;
  GF.sfx('reward');
  GF.juice.particles.burst(L.giftX || GF.cx, L.giftY || GF.H * 0.86, { count: 18, colors: ['#ffd34d', '#ff9ad1', '#7CFC9A'], speed: 150, gravity: 200, life: 0.8 });
  toast.txt = GF.t('giftReady'); toast.life = 2.2;
}

// ── PLACE / MOVE / SWAP ──────────────────────────────────────────────────────
function placeCreature(cr, idx) {
  // idx in grid; if occupied, swap occupant into reserve (or back where cr came from)
  var occupant = grid[idx];
  // detach cr from wherever it was
  removeFromBoardOrReserve(cr);
  if (occupant && occupant !== cr) {
    // bump occupant: if cr came from a cell, swap into that cell; else to reserve
    grid[idx] = null;
    if (drag && drag.fromCell >= 0 && grid[drag.fromCell] === null) {
      occupant.cell = drag.fromCell; occupant.inReserve = false; grid[drag.fromCell] = occupant;
    } else {
      sendToReserve(occupant);
    }
  }
  grid[idx] = cr; cr.cell = idx; cr.inReserve = false;
  cr.sc = 1.0;
  GF.juice.punch(cr, 'sc', 0.35, 320);
  markOwned(cr);
  GF.sfx('merge');
  return true;
}
function removeFromBoardOrReserve(cr) {
  if (cr.cell >= 0 && grid[cr.cell] === cr) grid[cr.cell] = null;
  cr.cell = -1;
  var ri = reserve.indexOf(cr);
  if (ri >= 0) reserve.splice(ri, 1);
  cr.inReserve = false;
}

// ── GIFT OPENING FLOW ────────────────────────────────────────────────────────

  pending = makeCreature();

  gs = 'MEET';

  var cr = pending; pending = null;

// ── PERSISTENCE ──────────────────────────────────────────────────────────────

    reserve: reserve.map(function (c) { return c.serial; }),

// ── LAYOUT (recomputed each frame, portrait-first) ───────────────────────────

// ── COLORS ───────────────────────────────────────────────────────────────────

// ── DRAW: CREATURE (procedural vector, seeded) ───────────────────────────────

  c.save();
  c.beginPath(); c.arc(x, y, r, 0, Math.PI * 2); c.clip();
  var rnd = seededRand(cr.seed ^ 0x9e37);
  if (cr.pattern === 'dappled') {
    c.fillStyle = 'rgba(255,255,255,0.32)';
    for (var i = 0; i < 7; i++) {
      var dx = x + (rnd() - 0.5) * r * 1.6, dy = y + (rnd() - 0.5) * r * 1.6;
      c.beginPath(); c.arc(dx, dy, r * (0.13 + rnd() * 0.12), 0, Math.PI * 2); c.fill();
    }

  } else if (cr.pattern === 'aurora') {
    for (var s = 0; s < 4; s++) {
      var hue = (animClock * 30 + s * 70) % 360;
      c.fillStyle = 'hsla(' + hue + ',85%,72%,0.30)';
      var yy = y - r + (s + 0.5) * (r * 2 / 4) + Math.sin(animClock * 1.5 + s) * r * 0.12;

  var eo = r * 0.26;
  c.beginPath(); c.arc(-eo, -r * 0.1, r * 0.10, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(eo, -r * 0.1, r * 0.10, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#fff';
  c.beginPath(); c.arc(-eo + r * 0.03, -r * 0.13, r * 0.035, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(eo + r * 0.03, -r * 0.13, r * 0.035, 0, Math.PI * 2); c.fill();

    c.shadowColor = 'hsl(' + hueA + ',90%,72%)'; c.shadowBlur = r * 0.5;

    var n = cr.pattern === 'aurora' ? 4 : 3;

      var ang = rnd() * Math.PI * 2 + animClock * (cr.pattern === 'aurora' ? 0.6 : 0);

    c.closePath(); c.fill(); c.stroke();

}

// backdrop panel (MEET card) — simple/bright/rare/radiant

}

// ── TEXT WRAP (by measured physical lines) ───────────────────────────────────
function wrapLines(c, text, maxW) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

// ── COACH (action-gated tutorial; advance:'manual' from real actions) ────────
var seenCoach = false;
var coach = { active: false, step: 0, key: 'wonderlings_seen_tutorial' };
var COACH_STEPS = ['coach1', 'coach2', 'coach3', 'coach4'];
function startCoachIfNeeded() {
  if (window.__GF_AUTOSTART || window._silent) { seenCoach = true; return; }
  var done = false;
  try { done = !!localStorage.getItem(coach.key); } catch (e) {}
  if (done || seenCoach) return;
  coach.active = true; coach.step = 0;
}
function coachAdvance(trigger) {
  if (!coach.active) return;
  var cur = COACH_STEPS[coach.step];
  var ok = (cur === 'coach1' && trigger === 'unwrap') ||
           (cur === 'coach2' && trigger === 'place') ||
           (cur === 'coach3' && trigger === 'wondermove');
  if (!ok) return;
  coach.step++;
  if (coach.step >= COACH_STEPS.length) { /* show coach4 then dismiss on tap */ }
}
function coachDismiss() {
  coach.active = false; seenCoach = true;
  try { localStorage.setItem(coach.key, '1'); } catch (e) {}
  GF.saveRun();
}
function drawCoach(c) {
  if (!coach.active) return;
  var W = GF.W, H = GF.H, S = GF.S;
  var step = COACH_STEPS[coach.step] || 'coach4';
  // anchor target + optional hand gesture
  var anchorX = W / 2, anchorY = H / 2, showHand = true, drag2 = null, cellHi = null;
  var pulse = 0.5 + 0.5 * Math.sin(animClock * 3.4);
  if (coach.step === 0) { // unwrap: point hand at the glowing gift button
    if (giftReady && L.giftBtn) { anchorX = L.giftBtn.x + L.giftBtn.w / 2; anchorY = L.giftBtn.y + L.giftBtn.h / 2; }
    else { anchorX = W / 2; anchorY = H * 0.86; }
  } else if (coach.step === 1) { // place: point hand at the MEET "Place" button
    if (L.meetPlaceBtn) { anchorX = L.meetPlaceBtn.x + L.meetPlaceBtn.w / 2; anchorY = L.meetPlaceBtn.y + L.meetPlaceBtn.h / 2; }
    else { anchorX = W / 2; anchorY = H * 0.6; }
  } else if (coach.step === 2) { // wondermove: drag a placed friend onto a GLOWING good cell
    var srcIdx = -1, tgtIdx = -1;
    // prefer an empty cell whose terrain matches a placed creature's biome
    var terr = SETS[roomIndex].terrain;
    for (var gi = 0; gi < grid.length && tgtIdx < 0; gi++) {
      if (grid[gi]) continue;
      for (var gj = 0; gj < grid.length; gj++) {
        if (grid[gj] && terr[gi] === grid[gj].biome) { tgtIdx = gi; srcIdx = gj; break; }
      }
    }
    if (tgtIdx < 0) { // fallback: any placed creature -> any empty cell
      tgtIdx = firstEmptyCell();
      for (var gk = 0; gk < grid.length; gk++) { if (grid[gk]) { srcIdx = gk; break; } }
    }
    if (tgtIdx >= 0) {
      var tgt2 = cellRect(tgtIdx); cellHi = tgt2;
      drag2 = { x: tgt2.cxp, y: tgt2.cyp, r: L.cell * 0.42 };
      if (srcIdx >= 0) { var srcR = cellRect(srcIdx); anchorX = srcR.cxp; anchorY = srcR.cyp; }
      else { anchorX = L.gridX + L.gridW / 2; anchorY = L.gridY - 14 * S; if (anchorY < L.topH + 24 * S) anchorY = L.topH + 24 * S; }
    } else { // board edge case: nothing to demo, just gesture over the board
      anchorX = L.gridX + L.gridW / 2; anchorY = L.gridY + L.gridH / 2;
    }
  } else { // coach4 loop-closer: point at the Joy meter
    anchorX = L.joyX + L.joyW / 2; anchorY = L.joyY + L.joyH / 2;
    showHand = false;
  }
  // light scrim (skip over MEET - its card already supplies a backdrop)
  if (gs !== 'MEET') { c.fillStyle = 'rgba(0,0,0,0.22)'; c.fillRect(0, 0, W, H); }
  // step 2: pulse the exact target empty cell so "drop here" is unmistakable
  if (cellHi) {
    c.save();
    var inset = 3 * S, gx = cellHi.x + inset, gy = cellHi.y + inset, gw = cellHi.w - inset * 2, gh = cellHi.h - inset * 2;
    c.strokeStyle = '#7CFC9A'; c.shadowColor = '#7CFC9A'; c.shadowBlur = (10 + pulse * 10) * S;
    c.lineWidth = (3 + pulse * 2) * S; c.globalAlpha = 0.9;
    GF.rr(c, gx, gy, gw, gh, 12 * S); c.stroke();
    c.globalAlpha = 0.12 + pulse * 0.12; c.fillStyle = '#7CFC9A';
    GF.rr(c, gx, gy, gw, gh, 12 * S); c.fill();
    c.restore();
  }
  // pulse ring at anchor (skip on step 2 - the cell highlight is the focus)
  var br = Math.max(28 * S, L.cell ? L.cell * 0.42 : 40 * S);
  if (!cellHi) {
    c.save(); c.strokeStyle = '#ffeb3b'; c.shadowColor = '#ffeb3b'; c.shadowBlur = 14; c.lineWidth = 3 + pulse * 1.6; c.globalAlpha = 0.85;
    c.beginPath(); c.arc(anchorX, anchorY, br + pulse * 10 * S, 0, Math.PI * 2); c.stroke(); c.restore();
  }
  if (drag2) {
    c.save();
    c.setLineDash([7 * S, 7 * S]); c.lineDashOffset = -animClock * 36; c.globalAlpha = 0.6;
    c.strokeStyle = '#7CFC9A'; c.shadowColor = '#7CFC9A'; c.shadowBlur = 12; c.lineWidth = 3;
    c.beginPath(); c.moveTo(anchorX, anchorY); c.lineTo(drag2.x, drag2.y); c.stroke(); c.restore();
  }
  // hand gesture
  if (showHand) {
    var hx = anchorX, hy = anchorY, press = true;
    if (drag2) {
      var cyc = 2.6, tt = (animClock % cyc) / cyc;
      if (tt < 0.16) { hx = anchorX; hy = anchorY; press = true; }
      else if (tt < 0.62) { var kk = (tt - 0.16) / 0.46; hx = GF.lerp(anchorX, drag2.x, kk); hy = GF.lerp(anchorY, drag2.y, kk); press = true; }
      else if (tt < 0.74) { hx = drag2.x; hy = drag2.y; press = true; }
      else { hx = drag2.x; hy = drag2.y; press = false; }
    } else {
      var ph = (animClock % 1.3) / 1.3; press = ph < 0.25;
    }
    drawHandIcon(c, hx, hy + (press ? 0 : 8 * S), press);
  }
  // caption pill
  var capFs = GF.clamp(15 * S, 12, 19) | 0;
  c.font = 'bold ' + capFs + 'px Inter, system-ui, sans-serif';
  var txt = GF.t(step);
  var maxW = Math.min(W * 0.9, 540 * S);
  var lines = wrapLines(c, txt, maxW - 28 * S);
  var lineH = capFs * 1.28;
  var pillW = 0;
  for (var i = 0; i < lines.length; i++) pillW = Math.max(pillW, c.measureText(lines[i]).width);
  pillW += 28 * S;
  var extra = (coach.step >= 3) ? 1 : 0; // coach4 gets a tap-to-finish hint line
  var pillH = lineH * lines.length + 18 * S + (extra ? lineH : 0);
  var pillX = GF.clamp(anchorX - pillW / 2, 8 * S, W - pillW - 8 * S);
  // top-safe zone sits BELOW the bar + Skip chip so the pill never covers either.
  var topSafe = L.topH + 44 * S;
  var pillY;
  if (gs === 'MEET' && L.meetCard) {
    // sit in the dark band above the MEET card so it never covers the reveal.
    pillY = GF.clamp(L.meetCard.y - pillH - 12 * S, topSafe, H - pillH - 10 * S);
  } else {
  pillY = anchorY - br - pillH - 16 * S;       // prefer above the anchor
  if (pillY < topSafe) {
    // not enough room above. For a board-top anchor (step 2) park it in the
    // top-safe strip rather than flipping DOWN onto the cells it points at.
    var below = anchorY + br + 16 * S;
    if (cellHi || anchorY < H * 0.5) pillY = topSafe;     // keep clear of the board cells
    else pillY = below;                                    // bottom anchors flip up-front fine
  }
  pillY = GF.clamp(pillY, topSafe, H - pillH - 10 * S);
  }
  c.save();
  c.shadowColor = 'rgba(0,0,0,0.4)'; c.shadowBlur = 10 * S; c.shadowOffsetY = 3 * S;
  c.fillStyle = 'rgba(20,16,38,0.94)';
  GF.rr(c, pillX, pillY, pillW, pillH, 14 * S); c.fill();
  c.restore();
  c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'bold ' + capFs + 'px Inter, system-ui, sans-serif';
  for (var j = 0; j < lines.length; j++) c.fillText(lines[j], pillX + pillW / 2, pillY + 12 * S + lineH * (j + 0.5));
  if (extra) {
    c.fillStyle = '#9cc'; c.font = (capFs - 1) + 'px Inter, system-ui, sans-serif';
    c.fillText(GF.t('coachTapMore'), pillX + pillW / 2, pillY + 12 * S + lineH * (lines.length + 0.5));
  }
  c.textBaseline = 'alphabetic';
  // Skip chip (always available; top-right under the bar so it never covers the
  // pointed element). Stored for hit-testing in onUp.
  drawCoachSkip(c);
}
function drawCoachSkip(c) {

// ── DRAW: MAIN ───────────────────────────────────────────────────────────────
function draw(c) {
  var W = GF.W, H = GF.H, S = GF.S;
  // bg
  var bg = c.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#2a2350'); bg.addColorStop(0.55, '#241d44'); bg.addColorStop(1, '#1a1530');
  c.fillStyle = bg; c.fillRect(0, 0, W, H);
  // soft floating motes
  for (var m = 0; m < 18; m++) {
    var mx = ((m * 73.3 + animClock * 8) % (W + 40)) - 20;
    var my = (m * 47.7 % H) + Math.sin(animClock * 0.6 + m) * 8 * S;
    c.fillStyle = 'rgba(255,255,255,' + (0.04 + (m % 3) * 0.02) + ')';
    c.beginPath(); c.arc(mx, my, (1 + (m % 3)) * S, 0, Math.PI * 2); c.fill();
  }

  drawBoard(c);
  drawReserve(c);
  drawTopBar(c);
  drawBottom(c);

  // dragged creature follows pointer (above board)
  if (drag && drag.creature) {
    var r = L.cell * 0.42;
    drawCreature(c, drag.x, drag.y, r, drag.creature, false);
  }

  if (gs === 'UNWRAP') drawUnwrap(c);
  if (gs === 'MEET') drawMeet(c);
  if (gs === 'SETS') drawSets(c);
  if (gs === 'HELP') drawHelp(c);

  // celebrate banner (room unlock / wonder complete)
  if (celebrate > 0) drawCelebrate(c);

  // toast
  if (toast.life > 0) {
    c.globalAlpha = Math.min(1, toast.life);
    var tf = GF.clamp(14 * S, 11, 18);
    c.font = 'bold ' + tf + 'px Inter, system-ui, sans-serif';
    var tw = c.measureText(toast.txt).width + 26 * S;
    var tx = (W - tw) / 2, ty = L.reserveY - 34 * S;
    c.fillStyle = 'rgba(20,16,38,0.92)'; GF.rr(c, tx, ty, tw, 26 * S, 13 * S); c.fill();
    c.fillStyle = '#ffd9a0'; c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(toast.txt, W / 2, ty + 13 * S);
    c.textBaseline = 'alphabetic'; c.globalAlpha = 1;
  }

  // coach overlay last (but under juice flash). Step 1 (Place) renders over the
  // MEET card to point at its Place button; all other steps render in HAVEN.
  if (coach.active && (gs === 'HAVEN' || (gs === 'MEET' && coach.step === 1))) drawCoach(c);

// Subtle reef dressing (Reef room only): faint seaweed at the lower corners and a

function drawReefAmbiance(c) {
  if (SETS[roomIndex].id !== 'reef') return;
  if (!GF.sprites.seaweed_green && !GF.sprites.seaweed_pink && !GF.sprites.rock) return;

  c.save();
  c.globalAlpha = 0.32;
  GF.drawSprite('seaweed_green', L.gridX + sw * 0.5 + sway, baseY - sw * 0.35, sw, function () {});
  GF.drawSprite('seaweed_pink', L.gridX + L.gridW - sw * 0.5 - sway, baseY - sw * 0.35, sw * 0.92, function () {});
  c.globalAlpha = 0.38;
  GF.drawSprite('rock', L.gridX + L.gridW * 0.5, baseY - sw * 0.18, sw * 0.7, function () {});
  c.restore();
}
function drawBoard(c) {

  c.restore();
  drawReefAmbiance(c);
  var terr = SETS[roomIndex].terrain;
  var hoverIdx = -1;
  if (drag && drag.creature) hoverIdx = cellIndexAt(drag.x, drag.y);
  for (var i = 0; i < grid.length; i++) {
    var rct = cellRect(i);
    var inset = 3 * S;
    var x = rct.x + inset, y = rct.y + inset, w = rct.w - inset * 2, h = rct.h - inset * 2;
    // terrain fill
    var g = c.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, terrainColor(terr[i], true)); g.addColorStop(1, terrainColor(terr[i], false));
    GF.rr(c, x, y, w, h, 12 * S); c.fillStyle = g; c.fill();
    // empty slot outline + terrain motif
    if (!grid[i]) {

      c.setLineDash([5 * S, 5 * S]); GF.rr(c, x + 4 * S, y + 4 * S, w - 8 * S, h - 8 * S, 9 * S); c.stroke(); c.setLineDash([]);
    }

    if (drag && drag.creature === cr) continue;
    var rc = cellRect(j);
    drawCreature(c, rc.cxp, rc.cyp, L.cell * 0.40, cr, true);

  }
}

function drawBigButton(c, b, label, col, glow, kind) {
  var S = GF.S;

function shade(hex, amt) {
  // accept #rrggbb
  var h = hex.replace('#', '');
  if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
  var r = parseInt(h.substr(0, 2), 16), g = parseInt(h.substr(2, 2), 16), b = parseInt(h.substr(4, 2), 16);
  r = GF.clamp(r + amt, 0, 255) | 0; g = GF.clamp(g + amt, 0, 255) | 0; b = GF.clamp(b + amt, 0, 255) | 0;
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

// ── UNWRAP overlay (ribbon drag) ─────────────────────────────────────────────
function drawUnwrap(c) {
  var W = GF.W, H = GF.H, S = GF.S;
  c.fillStyle = 'rgba(12,9,28,0.85)'; c.fillRect(0, 0, W, H);
  var cx = W / 2, cy = H * 0.46;
  var box = Math.min(W * 0.46, 200 * S);
  var lid = box * (0.3 - ribbon.pull * 0.3);
  // box base
  c.save();
  c.shadowColor = 'rgba(0,0,0,0.4)'; c.shadowBlur = 20 * S; c.shadowOffsetY = 8 * S;
  var g = c.createLinearGradient(cx - box / 2, cy, cx - box / 2, cy + box);
  g.addColorStop(0, '#ff8fc0'); g.addColorStop(1, '#d85a98');
  GF.rr(c, cx - box / 2, cy - box * 0.1, box, box, 16 * S); c.fillStyle = g; c.fill();
  c.restore();
  // vertical ribbon on box
  c.fillStyle = '#ffd34d';
  c.fillRect(cx - box * 0.09, cy - box * 0.1, box * 0.18, box);
  // lid (lifts up with pull)
  var lidY = cy - box * 0.12 - ribbon.pull * box * 0.7;
  var lidRot = ribbon.pull * 0.3;
  c.save(); c.translate(cx, lidY); c.rotate(-lidRot);
  c.fillStyle = '#ffa9d0';
  GF.rr(c, -box * 0.56, -box * 0.16, box * 1.12, box * 0.3, 12 * S); c.fill();
  // bow on lid
  c.fillStyle = '#ffe07a';
  c.beginPath(); c.arc(-box * 0.14, -box * 0.05, box * 0.13, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(box * 0.14, -box * 0.05, box * 0.13, 0, Math.PI * 2); c.fill();
  c.restore();
  // peeking creature as lid rises
  if (ribbon.pull > 0.25) {
    c.save();
    c.beginPath(); GF.rr(c, cx - box / 2, lidY, box, cy + box - lidY, 14 * S); c.clip();
    // a soft glow + hint (actual creature shown on MEET)
    var gh = c.createRadialGradient(cx, cy + box * 0.2, 4, cx, cy + box * 0.2, box * 0.7);
    gh.addColorStop(0, 'rgba(255,255,200,0.8)'); gh.addColorStop(1, 'rgba(255,255,200,0)');
    c.fillStyle = gh; c.fillRect(cx - box, cy - box, box * 2, box * 2.4);
    c.restore();
  }
  // ribbon pull handle + dashed track (drag DOWN to pull)
  var handleY = cy + box * 0.95 + 14 * S;
  var pulse = 0.5 + 0.5 * Math.sin(animClock * 4);
  c.strokeStyle = 'rgba(255,255,255,0.4)'; c.lineWidth = 2 * S; c.setLineDash([6 * S, 6 * S]);
  c.beginPath(); c.moveTo(cx, cy + box * 0.4); c.lineTo(cx, handleY + 30 * S); c.stroke(); c.setLineDash([]);
  c.save(); c.shadowColor = 'rgba(255,211,77,0.8)'; c.shadowBlur = (10 + pulse * 8) * S;
  c.fillStyle = '#ffd34d';
  c.beginPath(); c.arc(cx, handleY + ribbon.pull * box * 0.5, 16 * S, 0, Math.PI * 2); c.fill(); c.restore();
  // hand hint
  drawHandIcon(c, cx, handleY + ribbon.pull * box * 0.5 + 6 * S, true);
  // caption
  c.fillStyle = '#fff'; c.textAlign = 'center'; c.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('unwrapHint'), cx, H * 0.16);
  c.textAlign = 'left';
}

// ── MEET overlay (creature reveal) ───────────────────────────────────────────
function drawMeet(c) {
  if (!pending) return;

  c.fillStyle = 'rgba(12,9,28,0.9)'; c.fillRect(0, 0, W, H);

  // card bg

  c.restore();
  // title

  c.fillText(GF.t('meetTitle'), W / 2, cardY + 30 * S);
  // backdrop panel + creature
  var panW = cardW - 40 * S, panH = cardH * 0.42;

  // name

  c.font = GF.clamp(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';

  var tx = W / 2 - totalW / 2;
  for (var k = 0; k < traits.length; k++) {

    c.fillStyle = '#cfe6ff'; c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(traits[k], tx + widths[k] / 2, chipY + 11 * S + S);

  c.textAlign = 'center';
  c.fillText(GF.t('serial') + ' ' + pending.serial, W / 2, chipY + 42 * S);
  // buttons: Place (primary) + Keep in burrow (rects precomputed in layout())
  var bw = L.meetPlaceBtn.w, bh = L.meetPlaceBtn.h, bx = L.meetPlaceBtn.x, by = L.meetPlaceBtn.y;
  // place btn
  var g = c.createLinearGradient(bx, by, bx, by + bh);

  GF.rr(c, bx, by, bw, bh, bh / 2); c.fillStyle = g; c.fill();
  c.fillStyle = '#10331f'; c.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(GF.t('place'), W / 2, by + bh / 2 + S);
  // keep btn
  GF.rr(c, L.meetKeepBtn.x, L.meetKeepBtn.y, L.meetKeepBtn.w, L.meetKeepBtn.h, L.meetKeepBtn.h / 2);
  c.fillStyle = 'rgba(255,255,255,0.10)'; c.fill();
  c.fillStyle = '#cfe6ff'; c.font = GF.clamp(13 * S, 11, 17) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('keep'), W / 2, L.meetKeepBtn.y + L.meetKeepBtn.h / 2 + S);
  c.textAlign = 'left'; c.textBaseline = 'alphabetic';
}

// ── SETS overlay (collection book) ───────────────────────────────────────────
function ensureSetsScroll() {
  if (!setsScroll) setsScroll = GF.makeScroll('sets_book', { x: 0, y: 0, w: 10, h: 10 });
  return setsScroll;
}
function drawSets(c) {
  var W = GF.W, H = GF.H, S = GF.S;
  c.fillStyle = 'rgba(12,9,28,0.94)'; c.fillRect(0, 0, W, H);
  // header
  c.fillStyle = '#fff'; c.textAlign = 'center'; c.font = 'bold ' + GF.clamp(18 * S, 14, 24) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('sets'), W / 2, L.topH * 0.5 + 6 * S);
  // back button (top-left; rect precomputed in layout())
  drawBackChip(c, L.setsBackBtn);
  // scroll region
  var top = L.topH + 6 * S, bot = H - 10 * S;
  var sc = ensureSetsScroll();
  sc.setViewport({ x: 0, y: top, w: W, h: bot - top });
  // compute content
  var pad = 16 * S;
  var thumb = Math.min((W - pad * 2 - 6 * (3 * S)) / 4, 78 * S); // 4 per row
  var perRow = Math.max(2, Math.floor((W - pad * 2) / (thumb + 10 * S)));
  var rowGap = 14 * S, colGap = (W - pad * 2 - perRow * thumb) / Math.max(1, perRow - 1);
  var y = 8 * S;
  // build layout positions (content space)
  var hitItems = [];
  for (var s = 0; s < SETS.length; s++) {
    var set = SETS[s];
    // section header
    y += 22 * S;
    var ownedN = ownedCountForSet(set.id);
    // row of species
    var col = 0, rowY = y;
    for (var i = 0; i < set.species.length; i++) {
      var sp = set.species[i];
      var hx = pad + col * (thumb + colGap), hy = rowY;
      hitItems.push({ id: set.id + '_' + sp.key, x: hx, y: hy, w: thumb, h: thumb });
      col++;
      if (col >= perRow) { col = 0; rowY += thumb + rowGap; }
    }
    if (col !== 0) rowY += thumb + rowGap;
    y = rowY + 8 * S;
  }
  sc.setContentHeight(y + 10 * S);
  sc.update();
  sc.begin(c);
  // draw content
  var cy = 8 * S;
  for (var ss = 0; ss < SETS.length; ss++) {
    var st = SETS[ss];
    var on = ownedCountForSet(st.id);
    c.fillStyle = '#ffe9a8'; c.textAlign = 'left'; c.font = 'bold ' + GF.clamp(14 * S, 12, 19) + 'px Inter, system-ui, sans-serif';
    c.fillText(GF.t(st.nameKey) + '  ' + on + '/' + T.SET_SIZE + ' ' + GF.t('found'), pad, cy + 16 * S);
    cy += 22 * S;
    var col2 = 0, ry = cy;
    for (var j = 0; j < st.species.length; j++) {
      var spc = st.species[j];
      var owned = !!(setOwnedKeys[st.id] && setOwnedKeys[st.id][spc.key]);
      var x = pad + col2 * (thumb + colGap), yy = ry;
      // tile
      c.fillStyle = owned ? 'rgba(255,255,255,0.09)' : 'rgba(255,255,255,0.035)';
      GF.rr(c, x, yy, thumb, thumb, 12 * S); c.fill();
      if (owned) {
        // find a representative owned creature for this species (first in collection)
        var rep = null;
        for (var ci = 0; ci < collection.length; ci++) { if (collection[ci].key === spc.key) { rep = collection[ci]; break; } }
        if (rep) drawCreature(c, x + thumb / 2, yy + thumb * 0.42, thumb * 0.30, rep, false);
        var nm = GF.lang === 'ru' ? spc.nameRu : spc.nameEn;
        c.fillStyle = '#dfe7ff'; c.textAlign = 'center'; c.font = GF.clamp(9 * S, 8, 12) + 'px Inter, system-ui, sans-serif';
        c.fillText(nm, x + thumb / 2, yy + thumb - 7 * S);
      } else {
        // silhouette + ?
        c.fillStyle = 'rgba(255,255,255,0.16)';
        c.beginPath(); c.arc(x + thumb / 2, yy + thumb * 0.42, thumb * 0.24, 0, Math.PI * 2); c.fill();
        c.fillStyle = 'rgba(220,225,255,0.55)'; c.textAlign = 'center'; c.font = 'bold ' + GF.clamp(18 * S, 14, 24) + 'px Inter, system-ui, sans-serif';
        c.fillText('?', x + thumb / 2, yy + thumb * 0.42 + 6 * S);
      }
      col2++;
      if (col2 >= perRow) { col2 = 0; ry += thumb + rowGap; }
    }
    if (col2 !== 0) ry += thumb + rowGap;
    cy = ry + 8 * S;
  }
  c.textAlign = 'left';
  sc.end(c);
  sc.draw(c);
}
function drawBackChip(c, b) {
  var S = GF.S;

  var ax = b.x + b.h * 0.5, ay = b.y + b.h / 2;
  c.beginPath(); c.moveTo(ax + 4 * S, ay - 6 * S); c.lineTo(ax - 4 * S, ay); c.lineTo(ax + 4 * S, ay + 6 * S); c.stroke();
  c.fillStyle = '#dfe7ff'; c.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px Inter, system-ui, sans-serif';
  c.textAlign = 'left'; c.textBaseline = 'middle';
  c.fillText(GF.t('backHaven').split(' ')[0], b.x + b.h * 0.8, b.y + b.h / 2 + S);

// ── CELEBRATE banner ─────────────────────────────────────────────────────────
function drawCelebrate(c) {
  var W = GF.W, H = GF.H, S = GF.S;
  var a = Math.min(1, celebrate);
  c.globalAlpha = a;
  var bw = Math.min(W * 0.84, 360 * S), bh = 96 * S;
  var bx = (W - bw) / 2, by = H * 0.32;
  c.save();
  c.shadowColor = 'rgba(255,211,77,0.6)'; c.shadowBlur = 26 * S;
  var g = c.createLinearGradient(bx, by, bx + bw, by + bh);
  g.addColorStop(0, '#ff9ad1'); g.addColorStop(1, '#ffd34d');
  GF.rr(c, bx, by, bw, bh, 18 * S); c.fillStyle = g; c.fill();
  c.restore();
  c.fillStyle = '#3a1f4a'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'bold ' + GF.clamp(18 * S, 14, 24) + 'px Inter, system-ui, sans-serif';

  var lh = GF.clamp(20 * S, 16, 26);
  for (var i = 0; i < lines.length; i++) c.fillText(lines[i], W / 2, by + bh / 2 + (i - (lines.length - 1) / 2) * lh);

// ── INPUT (unified pointer for drag + tap) ───────────────────────────────────
function canvasPoint(e) {
  var r = GF.canvas.getBoundingClientRect();
  var sx = GF.canvas.width / r.width, sy = GF.canvas.height / r.height;
  var cx = (e.clientX != null) ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
  var cy = (e.clientY != null) ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
  return { x: (cx - r.left) * sx, y: (cy - r.top) * sy };
}
var pointerDown = false, downPt = null, ribbonStartY = 0, dragMoved = false, downCreature = null;

function onDown(p) {
  pointerDown = true; downPt = p; dragMoved = false;
  // overlays first
  if (gs === 'UNWRAP') { ribbonStartY = p.y; return; }
  if (gs === 'MEET') return; // handled on up (buttons)
  if (gs === 'SETS' || gs === 'HELP') return; // handled on up

  // coach4 (loop-closer) waiting for a tap to dismiss
  if (coach.active && coach.step >= COACH_STEPS.length - 1 && coach.step >= 3) {
    // tap anywhere finishes (but still allow interacting); we dismiss on up
  }

  // HAVEN: pick up a creature from a cell or reserve to start a drag
  if (gs === 'HAVEN') {
    var idx = cellIndexAt(p.x, p.y);
    if (idx >= 0 && grid[idx]) { downCreature = grid[idx]; return; }
    // reserve chips
    for (var i = 0; i < reserve.length; i++) {
      var rc = reserveChipRect(i);
      if (p.x >= rc.x && p.x <= rc.x + rc.w && p.y >= rc.y && p.y <= rc.y + rc.h) { downCreature = reserve[i]; return; }
    }
    downCreature = null;
  }
}
function onMove(p) {
  if (!pointerDown) return;
  if (downPt) {
    var d = Math.hypot(p.x - downPt.x, p.y - downPt.y);
    if (d > 6 * GF.S) dragMoved = true;
  }
  if (gs === 'UNWRAP') {
    var box = Math.min(GF.W * 0.46, 200 * GF.S);
    var pulled = (p.y - ribbonStartY) / (box * 0.8);
    ribbon.pull = GF.clamp(pulled, 0, 1);
    if (ribbon.pull >= 1) { completeUnwrap(); }
    return;
  }
  if (gs === 'HAVEN' && downCreature && dragMoved && !drag) {
    // begin drag
    drag = { creature: downCreature, fromCell: downCreature.cell, fromReserve: downCreature.inReserve, x: p.x, y: p.y };
  }
  if (drag) { drag.x = p.x; drag.y = p.y; }
}
function onUp(p) {
  pointerDown = false;
  if (gs === 'UNWRAP') {
    // if not pulled enough, snap back; a strong tap also opens
    if (ribbon.pull >= 0.55) { completeUnwrap(); }
    else { ribbon.pull = 0; }
    return;
  }
  if (gs === 'MEET') {
    if (coach.active && L.coachSkipBtn && hit(L.coachSkipBtn, p)) { coachDismiss(); GF.sfx('click'); return; }
    if (hit(L.meetPlaceBtn, p)) { meetPlace(); }
    else if (hit(L.meetKeepBtn, p)) { meetKeep(); }
    return;
  }
  if (gs === 'SETS') {
    if (hit(L.setsBackBtn, p)) { gs = 'HAVEN'; lastReachScreen = 'haven'; GF.sfx('click'); }
    return;
  }
  if (gs === 'HELP') {
    if (hit(L.helpBackBtn, p)) { gs = 'HAVEN'; lastReachScreen = 'haven'; GF.sfx('click'); }
    return;
  }

  // HAVEN
  if (gs === 'HAVEN') {
    // Skip the tutorial from any step via the Skip chip.
    if (coach.active && !dragMoved && L.coachSkipBtn && hit(L.coachSkipBtn, p)) { coachDismiss(); GF.sfx('click'); return; }
    // coach4 dismiss on tap (when on the final step and not dragging)
    if (coach.active && coach.step >= 3 && !drag && !dragMoved) { coachDismiss(); return; }

    if (drag && drag.creature) {
      var cr = drag.creature;
      var idx = cellIndexAt(p.x, p.y);
      var prevWonder = wonder;
      if (idx >= 0) {
        placeCreature(cr, idx);
        if (!firstPlaceMarked) { firstPlaceMarked = true; }
        var newW = computeWonder();
        // float the wonder delta
        var rc2 = cellRect(idx);
        var dW = newW - prevWonder;
        GF.juice.floatText(rc2.cxp, rc2.cyp - L.cell * 0.4, (dW >= 0 ? '+' : '') + dW + ' ' + GF.t('wonder'), { color: dW >= 0 ? '#7CFC9A' : '#ff9a9a', size: 15 });
        GF.juice.particles.burst(rc2.cxp, rc2.cyp, { count: 10, colors: ['#ffd34d', '#fff', '#7CFC9A'], speed: 120, gravity: 260, life: 0.5 });
        if (dW > 0) coachAdvance('wondermove');
        // A creature entering a DISPLAY cell from the burrow counts as a
        // placement for the Joy floor (anti-stall: keeps gifts flowing even
        // when the board is already solved). A pure on-board move does not.
        refreshAfterPlacement(drag.fromReserve ? 1 : 0);
      } else if (p.y >= L.reserveY && p.y <= L.reserveY + L.reserveH) {
        // dropped on reserve tray
        if (reserve.length < T.RESERVE_CAP || cr.inReserve) {
          sendToReserve(cr);
          GF.sfx('tap');
          refreshAfterPlacement(0);
        } else {
          toast.txt = GF.t('burrowFull'); toast.life = 2;
          // snap back: re-place where it came from
          restoreDrag(cr);
        }
      } else {
        // dropped nowhere -> snap back to origin
        restoreDrag(cr);
      }
      drag = null; downCreature = null; dragMoved = false;
      return;
    }

    // taps (no drag)
    if (!dragMoved) {
      // top bar icons
      if (hitCircle(L.muteBtn, p)) { GF.toggleMute(); GF.sfx('click'); return; }
      if (hitCircle(L.helpBtn, p)) { gs = 'HELP'; lastReachScreen = 'help'; GF.sfx('click'); return; }
      // gift button
      if (L.giftBtn && hit(L.giftBtn, p) && giftReady) { startUnwrap(); GF.sfx('tap'); return; }
      // sets button
      if (hit(L.setsBtn, p)) { gs = 'SETS'; lastReachScreen = 'sets'; ensureSetsScroll(); GF.sfx('click'); return; }
      // tap a placed creature with no move -> small wiggle (feedback)
      var ci = cellIndexAt(p.x, p.y);
      if (ci >= 0 && grid[ci]) { GF.juice.punch(grid[ci], 'sc', 0.18, 260); GF.sfx('pickup'); }
    }
    downCreature = null;
  }
}
function restoreDrag(cr) {
  if (drag && drag.fromCell >= 0 && !grid[drag.fromCell]) { grid[drag.fromCell] = cr; cr.cell = drag.fromCell; cr.inReserve = false; }
  else if (drag && drag.fromReserve) { sendToReserve(cr); }
  else if (drag && drag.fromCell >= 0) { sendToReserve(cr); } // its old cell got taken
  wonder = computeWonder();
}
function hit(b, p) { return b && p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h; }
function hitCircle(b, p) { if (!b) return false; var dx = p.x - b.cx, dy = p.y - b.cy; var r = (b.r || 20) + 12 * GF.S; return dx * dx + dy * dy <= r * r; }

// SETS scroll drag forwarding
function bindInput() {
  var cv = GF.canvas;
  function pd(e) {
    var p = canvasPoint(e);
    if (gs === 'SETS') { var sc = ensureSetsScroll(); if (sc.contains(p.x, p.y)) sc.dragStart(p.y); }
    onDown(p);
  }
  function pm(e) {
    var p = canvasPoint(e);
    if (gs === 'SETS' && setsScroll && setsScroll.isDragging()) { setsScroll.dragMove(p.y); }
    onMove(p);
  }
  function pu(e) {
    var p = canvasPoint(e);
    if (gs === 'SETS' && setsScroll && setsScroll.isDragging()) { setsScroll.dragEnd(); /* treat as scroll, swallow tap */ onUp(p); return; }
    onUp(p);
  }
  // pointer events unify mouse + touch; fall back to mouse/touch if needed
  if (window.PointerEvent) {
    cv.addEventListener('pointerdown', function (e) { pd(e); }, { passive: false });
    cv.addEventListener('pointermove', function (e) { pm(e); }, { passive: false });
    window.addEventListener('pointerup', function (e) { pu(e); }, { passive: false });
    cv.addEventListener('pointercancel', function (e) { pu(e); });
  } else {
    cv.addEventListener('mousedown', function (e) { pd(e); });
    window.addEventListener('mousemove', function (e) { if (pointerDown) pm(e); });
    window.addEventListener('mouseup', function (e) { pu(e); });
    cv.addEventListener('touchstart', function (e) { e.preventDefault(); pd(e.changedTouches[0]); }, { passive: false });
    cv.addEventListener('touchmove', function (e) { e.preventDefault(); pm(e.changedTouches[0]); }, { passive: false });
    cv.addEventListener('touchend', function (e) { e.preventDefault(); pu(e.changedTouches[0]); }, { passive: false });
  }
  // wheel for sets scroll
  cv.addEventListener('wheel', function (e) { if (gs === 'SETS' && setsScroll) setsScroll.handleWheel(e.deltaY); }, { passive: true });
  // keyboard convenience (desktop)
  document.addEventListener('keydown', function (e) {
    if (e.code === 'Escape') { if (gs === 'SETS' || gs === 'HELP' || gs === 'MEET' || gs === 'UNWRAP') { if (gs === 'MEET') { meetKeep(); } else { gs = 'HAVEN'; ribbon.pull = 0; } } }
    if (e.code === 'Space' && gs === 'HAVEN' && giftReady) { startUnwrap(); }
  });
}

GF.exposeBot(
  function () {
    var acts = [];

    if (giftReady && gs === 'HAVEN') acts.push('unwrap');
    // 'place' is always available in HAVEN: an empty cell OR a reserve->display
    // swap (anti-stall — a reserve creature entering display keeps Joy flowing).
    if (gs === 'HAVEN' && (firstEmptyCell() >= 0 || reserve.length > 0)) acts.push('place');
    if (gs === 'HAVEN') acts.push('swap');
    if (gs === 'HAVEN') acts.push('openSets');
    if (acts.length === 0) acts.push('unwrap');
    return acts;
  },
  function (a) {
    if (a === 'unwrap') {
      if (gs === 'MEET') { meetPlace(); return; }
      if (giftReady) { startUnwrap(); completeUnwrap(); meetPlace(); return; }
      botPlaceFromReserve();           // no gift -> keep progressing via placement
      return;
    }
    if (a === 'place') {
      if (gs === 'MEET') { meetPlace(); return; }
      botPlaceFromReserve();
      return;
    }
    if (a === 'swap') { botSwap(); return; }
    if (a === 'openSets') { gs = (gs === 'SETS') ? 'HAVEN' : 'SETS'; return; }
  }
);
// Place a reserve creature into display: onto an empty cell, or (board full)
// swap it onto an occupied cell so the displaced one returns to the burrow.
// Either way a creature ENTERS display -> counts as a placement (Joy floor).
function botPlaceFromReserve() {
  if (reserve.length === 0) {
    // nothing in burrow to place: if a gift is ready, take it; else perturb board
    if (giftReady) { startUnwrap(); completeUnwrap(); meetPlace(); }
    else botSwap();
    return;
  }
  var cr = reserve[0];
  var idx = firstEmptyCell();
  if (idx < 0) idx = (Math.random() * grid.length) | 0;   // board full -> swap in
  drag = { creature: cr, fromCell: -1, fromReserve: true };
  placeCreature(cr, idx);
  drag = null;
  refreshAfterPlacement(1);            // a creature entered display
}
function botSwap() {
  // Relocate a board creature to an empty cell to perturb wonder (a pure move,
  // no Joy floor). Falls back to a reserve placement or a gift.
  var empty = firstEmptyCell();
  if (empty < 0) { botPlaceFromReserve(); return; }
  if (reserve.length > 0) { botPlaceFromReserve(); return; }
  for (var i = 0; i < grid.length; i++) {
    if (grid[i]) {
      drag = { creature: grid[i], fromCell: i, fromReserve: false };
      placeCreature(grid[i], empty);
      drag = null;
      refreshAfterPlacement(0);
      return;
    }
  }
  if (giftReady) { startUnwrap(); completeUnwrap(); meetPlace(); }
}

    var cr2 = {
      key: sp2.key, species: sp2.key, biome: sp2.biome, social: sp2.social, trait2: sp2.trait2,
      shape: sp2.shape, hue: sp2.hue, sprite: sp2.sprite, pattern: 'prismatic', backdrop: 'rare',
      serial: giftSerialCounter, seed: seed2, cell: -1, inReserve: true, sc: 1, bob: rnd2() * Math.PI * 2,
    };
    reserve.push(cr2); collection.push(cr2);
  }
  // high wonder + mid-fill joy + ready gift glowing
  wonder = computeWonder();
  joy = Math.round(joyTarget * 0.55);
  lastGiftWonder = wonder;
  renownBank = 120 + targetRoom * 80;
  roomLevel = [6, targetRoom === 1 ? 3 : 0];
  giftReady = true;
};
window._jumpLevel = function (n) {
  // advance depth: n>=4 -> Reef room; reuse the populated setup
  window._setupForScreenshot(n || 5);
};

})();
</script>
