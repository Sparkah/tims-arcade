<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tiny Model Dodger</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #060814; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── STRINGS ──────────────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Tiny Model Dodger',
    sub:   'A tiny AI in the corner learns your dodge pattern',
    play: 'PLAY', retry: 'RETRY',
    score: 'SCORE', best: 'BEST',
    gameover: 'GAME OVER',
    lives: 'LIVES', ticks: 'TICKS',
    model_label: 'MODEL',
    target_label: 'AIM',
    'tut_goal':     'Goal: Survive falling hazards as long as possible.',
    'tut_controls': 'Controls: Arrows or A/D to steer. Drag on mobile.',
    'tut_win':      'Win: Endless — beat your best survived-ticks score.',
    'tut_lose':     'Lose: 3 hearts depleted by hazard collisions.',
    'tut_tip':      'Tip: The model resamples every 8 ticks. Move around!',
    daily_seed: 'DAILY SEED',
    learning: 'LEARNING',
    resume_hint: 'Tap to resume',
  },
  ru: {
    title: 'Доджер на Микромодели',
    sub:   'Маленькая модель в углу учит твой стиль уклонения',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ',
    score: 'ОЧКИ', best: 'РЕКОРД',
    gameover: 'ИГРА ОКОНЧЕНА',
    lives: 'ЖИЗНИ', ticks: 'ТИКИ',
    model_label: 'МОДЕЛЬ',
    target_label: 'ПРИЦЕЛ',
    'tut_goal':     'Цель: Выживай среди падающих угроз.',
    'tut_controls': 'Управление: Стрелки или A/D. Свайп на телефоне.',
    'tut_win':      'Победа: Бесконечно — побей свой рекорд.',
    'tut_lose':     'Поражение: 3 сердца истрачены столкновениями.',
    'tut_tip':      'Совет: Модель пересчитывает прицел каждые 8 тиков.',
    daily_seed: 'СИД ДНЯ',
    learning: 'УЧУСЬ',
    resume_hint: 'Нажмите, чтобы продолжить',
  },
};

var SPRITE_NAMES = []; // procedural-only — keep zip tiny, lean into the "ML cartridge" aesthetic

// ── TUNABLES (mirror DESIGN.md) ──────────────────────────────────────────
var LANES = 7;
var MAX_LIVES = 3;
var BASE_SPAWN_INTERVAL = 38;
var MIN_SPAWN_INTERVAL = 14;
var SPAWN_RAMP_PER_100T = 1.5;
var HAZARD_FALL_SPEED = 4.2;
var PLAYER_SPEED = 5.0;
var MARKOV_HISTORY = 8;
var MARKOV_RESAMPLE_EVERY = 8;
var MARKOV_BIAS_STRENGTH = 0.65;
var INVULN_FRAMES = 45;

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';
var score = 0, best = 0;
var lives = MAX_LIVES;
var ticks = 0;
var invuln = 0;
var spawnCountdown = BASE_SPAWN_INTERVAL;
var hazards = [];               // { lane, x, y, r, hue, vy }
var player = { lane: 3, x: 0, y: 0, vx: 0 };
var historyBins = [];           // last MARKOV_HISTORY lane indices
var transition = null;          // 7x7 float matrix — flattened row-major
var aimDistribution = null;     // 7-vector — current sampling distribution
var policyPulse = 0;            // 0..1, decays — flashes the matrix on resample
var ticksSinceResample = 0;
var lastLane = 3;
var dailySeed = 0;
var _showHelp = false;
var _menuButton = null;
var _helpBtnBounds = null;

// ── DAILY SEED + INITIAL MATRIX ──────────────────────────────────────────
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = a;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function initTransitionTable() {
  dailySeed = Math.floor(Date.now() / 86400000);
  var rng = mulberry32(dailySeed ^ 0xA17F100E);
  transition = new Float32Array(LANES * LANES);
  for (var i = 0; i < LANES; i++) {
    var row = 0;
    for (var j = 0; j < LANES; j++) {
      var d = Math.abs(i - j);
      var w = (1.0 + rng() * 0.3) * Math.exp(-d * 0.35);
      transition[i * LANES + j] = w;
      row += w;
    }
    for (var k = 0; k < LANES; k++) transition[i * LANES + k] /= row;
  }
  aimDistribution = uniformDist();
}

function uniformDist() {
  var d = new Float32Array(LANES);
  for (var i = 0; i < LANES; i++) d[i] = 1.0 / LANES;
  return d;
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  score = 0;
  ticks = 0;
  lives = MAX_LIVES;
  invuln = 0;
  hazards = [];
  historyBins = [];
  player.lane = 3;
  player.x = GF.cx;
  player.vx = 0;
  spawnCountdown = BASE_SPAWN_INTERVAL;
  ticksSinceResample = 0;
  lastLane = 3;
  initTransitionTable();
  policyPulse = 0;
  _showHelp = false;
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function gameOver() {
  if (score > best) {
    best = score;
    try { localStorage.setItem('tiny_model_dodger_best', best); } catch (e) {}
  }
  gs = 'GAMEOVER';
  GF.gameEnded();
  GF.setShake(0.8);
  GF.saveRun();
}

// Screenshot escape hatch — land directly on a populated mid-game state.
window._jumpLevel = function(level) {
  startGame();
  level = level || 5;
  // Pre-populate hazards across the field so the screenshot is dense
  var n = 7 + Math.min(level, 8);
  for (var i = 0; i < n; i++) {
    var lane = Math.floor(Math.random() * LANES);
    hazards.push({
      lane: lane,
      x: laneX(lane),
      y: (i / n) * GF.H * 0.78 + 40,
      r: hazardRadius(),
      hue: 340 - lane * 6 + Math.random() * 10,
      vy: HAZARD_FALL_SPEED,
    });
  }
  // Bake some history so the model has visible weights
  historyBins = [3, 3, 4, 4, 3, 2, 3, 3];
  ticks = 240 + level * 30;
  score = ticks;
  // Drift player off-centre so screenshots show motion
  player.lane = level >= 99 ? 3 : (level % LANES);
  player.x = laneX(player.lane);
  // Recompute aim dist so HUD is populated
  aimDistribution = computeAimDistribution();
  policyPulse = 0.85;
  // For level=99 — drive to terminal for the runtime gate
  if (level >= 99) {
    lives = 0;
    gameOver();
  }
};

window._setupForScreenshot = window._jumpLevel;

// ── INPUT HELPERS ────────────────────────────────────────────────────────
function laneX(lane) {
  var margin = Math.min(GF.W * 0.05, 40 * GF.S);
  var inner = GF.W - margin * 2;
  return margin + (lane + 0.5) * (inner / LANES);
}
function hazardRadius() {
  return GF.clamp(18 * GF.S, 12, 30);
}
function playerY() {
  return GF.H - GF.clamp(80 * GF.S, 60, 120);
}
function laneFromX(x) {
  var margin = Math.min(GF.W * 0.05, 40 * GF.S);
  var inner = GF.W - margin * 2;
  var step = inner / LANES;
  var l = Math.floor((x - margin) / step);
  return GF.clamp(l, 0, LANES - 1);
}

// ── MARKOV LOGIC ─────────────────────────────────────────────────────────
function recordHistory(lane) {
  if (lane !== lastLane) {
    var row = lastLane * LANES;
    transition[row + lane] += 0.45;
    var sum = 0;
    for (var k = 0; k < LANES; k++) sum += transition[row + k];
    for (var k2 = 0; k2 < LANES; k2++) transition[row + k2] /= sum;
    lastLane = lane;
  }
  historyBins.push(lane);
  if (historyBins.length > MARKOV_HISTORY) historyBins.shift();
}

function computeAimDistribution() {
  if (historyBins.length === 0) return uniformDist();
  var counts = new Float32Array(LANES);
  for (var i = 0; i < historyBins.length; i++) counts[historyBins[i]]++;
  var mode = 0, maxC = -1;
  for (var b = 0; b < LANES; b++) {
    if (counts[b] > maxC) { maxC = counts[b]; mode = b; }
  }
  var row = new Float32Array(LANES);
  var rowStart = mode * LANES;
  var rowSum = 0;
  for (var j = 0; j < LANES; j++) {
    var visitW = 0.6 + 0.4 * (counts[j] / historyBins.length);
    row[j] = transition[rowStart + j] * visitW;
    rowSum += row[j];
  }
  for (var k = 0; k < LANES; k++) row[k] /= rowSum;
  var out = new Float32Array(LANES);
  var u = 1.0 / LANES;
  for (var n = 0; n < LANES; n++) {
    out[n] = MARKOV_BIAS_STRENGTH * row[n] + (1 - MARKOV_BIAS_STRENGTH) * u;
  }
  return out;
}

function sampleLane(dist) {
  var r = Math.random();
  var acc = 0;
  for (var i = 0; i < dist.length; i++) {
    acc += dist[i];
    if (r <= acc) return i;
  }
  return dist.length - 1;
}

// ── HAZARD SPAWN ─────────────────────────────────────────────────────────
function spawnHazard() {
  var lane = sampleLane(aimDistribution || uniformDist());
  hazards.push({
    lane: lane,
    x: laneX(lane),
    y: -hazardRadius() * 2,
    r: hazardRadius(),
    hue: 340 - lane * 6 + Math.random() * 10,
    vy: HAZARD_FALL_SPEED * (1 + Math.min(score / 1200, 0.8)),
  });
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (gs !== 'PLAYING' || _showHelp) return;

  ticks++;
  score = ticks;

  // ── Steer ──
  var ax = 0;
  if (GF.keys['ArrowLeft']  || GF.keys['KeyA']) ax -= 1;
  if (GF.keys['ArrowRight'] || GF.keys['KeyD']) ax += 1;
  if (GF.touch.active) ax += GF.touch.dx * 1.6;
  ax = GF.clamp(ax, -1.4, 1.4);

  player.vx = (player.vx + ax * PLAYER_SPEED * GF.S * 0.18) * 0.78;
  player.x += player.vx;
  var margin = Math.min(GF.W * 0.05, 40 * GF.S);
  if (player.x < margin) { player.x = margin; player.vx *= -0.2; }
  if (player.x > GF.W - margin) { player.x = GF.W - margin; player.vx *= -0.2; }
  player.y = playerY();
  var lane = laneFromX(player.x);
  player.lane = lane;
  recordHistory(lane);

  // ── Resample policy every N ticks ──
  ticksSinceResample++;
  if (ticksSinceResample >= MARKOV_RESAMPLE_EVERY) {
    aimDistribution = computeAimDistribution();
    ticksSinceResample = 0;
    policyPulse = 1.0;
  }
  if (policyPulse > 0) policyPulse = Math.max(0, policyPulse - dt * 1.6);

  // ── Spawn hazards ──
  spawnCountdown--;
  if (spawnCountdown <= 0) {
    spawnHazard();
    var interval = BASE_SPAWN_INTERVAL - (ticks / 100) * SPAWN_RAMP_PER_100T;
    interval = Math.max(MIN_SPAWN_INTERVAL, interval);
    spawnCountdown = interval | 0;
  }

  // ── Move hazards + collide ──
  if (invuln > 0) invuln--;
  for (var i = hazards.length - 1; i >= 0; i--) {
    var h = hazards[i];
    h.y += h.vy * GF.S;
    if (h.y - h.r > GF.H + 30) { hazards.splice(i, 1); continue; }
    if (invuln <= 0) {
      var dx = h.x - player.x;
      var dy = h.y - player.y;
      var pr = 18 * GF.S;
      var rr = h.r + pr * 0.7;
      if (dx*dx + dy*dy < rr*rr) {
        lives--;
        invuln = INVULN_FRAMES;
        GF.spawnParticles(player.x, player.y, '#ff4f6d', 22);
        GF.setShake(0.6);
        GF.spawnFloat(player.x, player.y - 30, '-1', '#ff4f6d');
        hazards.splice(i, 1);
        GF.saveRun();
        if (lives <= 0) { gameOver(); return; }
      }
    }
  }

  if ((ticks & 31) === 0) GF.saveRun();
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  ctx.fillStyle = '#060814';
  ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawField(ctx);
    drawHazards(ctx);
    drawPlayer(ctx);
    drawHUD(ctx);
    drawModelOverlay(ctx);
  }

  if (gs === 'MENU') {
    drawMenu(ctx);
  }
  if (gs === 'GAMEOVER') {
    drawGameOver(ctx);
  }
  if (_showHelp && gs === 'PLAYING') {
    drawHelpOverlay(ctx);
  }
}

function drawField(ctx) {
  var margin = Math.min(GF.W * 0.05, 40 * GF.S);
  var inner = GF.W - margin * 2;
  var step = inner / LANES;
  for (var i = 0; i < LANES; i++) {
    var x = margin + i * step;
    var weight = aimDistribution ? aimDistribution[i] : 1 / LANES;
    var heat = GF.clamp((weight - 1/LANES) * LANES * 2, 0, 1);
    ctx.fillStyle = 'rgba(255, ' + Math.floor(80 - heat * 60) + ', ' + Math.floor(120 - heat * 100) + ',' + (0.05 + heat * 0.18) + ')';
    ctx.fillRect(x, 0, step, GF.H);
  }
  var railY = playerY() + 30 * GF.S;
  var grad = ctx.createLinearGradient(0, railY - 20, 0, railY + 6);
  grad.addColorStop(0, 'rgba(77, 208, 225, 0)');
  grad.addColorStop(1, 'rgba(77, 208, 225, 0.35)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, railY - 20, GF.W, 26);
  ctx.strokeStyle = 'rgba(77, 208, 225, 0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, railY);
  ctx.lineTo(GF.W, railY);
  ctx.stroke();
}

function drawHazards(ctx) {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    var gradH = ctx.createRadialGradient(h.x, h.y, 1, h.x, h.y, h.r);
    gradH.addColorStop(0, 'hsl(' + h.hue + ',95%,72%)');
    gradH.addColorStop(0.6, 'hsl(' + h.hue + ',85%,52%)');
    gradH.addColorStop(1, 'hsl(' + h.hue + ',80%,32%)');
    ctx.fillStyle = gradH;
    ctx.beginPath();
    ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'hsla(' + h.hue + ',95%,72%,0.18)';
    ctx.beginPath();
    ctx.arc(h.x, h.y - h.r * 0.9, h.r * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlayer(ctx) {
  var x = player.x, y = player.y;
  var s = 18 * GF.S;
  var alpha = 1;
  if (invuln > 0 && (invuln & 4)) alpha = 0.35;
  ctx.globalAlpha = alpha;
  var grad = ctx.createLinearGradient(x, y - s, x, y + s);
  grad.addColorStop(0, '#7cf6ff');
  grad.addColorStop(1, '#1e88a0');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(x, y - s);
  ctx.lineTo(x + s * 0.85, y + s * 0.6);
  ctx.lineTo(x, y + s * 0.25);
  ctx.lineTo(x - s * 0.85, y + s * 0.6);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x, y - s * 0.15, s * 0.22, 0, Math.PI * 2);
  ctx.fill();
  var th = ctx.createRadialGradient(x, y + s * 0.9, 1, x, y + s * 0.9, s * 1.4);
  th.addColorStop(0, 'rgba(255, 230, 120, 0.7)');
  th.addColorStop(1, 'rgba(255, 230, 120, 0)');
  ctx.fillStyle = th;
  ctx.beginPath();
  ctx.arc(x, y + s * 0.9, s * 1.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ── HUD ──────────────────────────────────────────────────────────────────
function drawHUD(ctx) {
  var fs = GF.clamp(16 * GF.S, 12, 22);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('score') + ': ' + score, 12 * GF.S, 12 * GF.S);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t('best') + ': ' + best, GF.W - 12 * GF.S, 12 * GF.S);
  ctx.textAlign = 'center';
  var heartSize = GF.clamp(20 * GF.S, 14, 30);
  var totalW = MAX_LIVES * (heartSize + 4 * GF.S);
  var hx = GF.cx - totalW / 2;
  for (var i = 0; i < MAX_LIVES; i++) {
    var filled = i < lives;
    drawHeart(ctx, hx + i * (heartSize + 4 * GF.S) + heartSize / 2, 18 * GF.S + heartSize / 2, heartSize / 2, filled);
  }
  drawHelpButton(ctx);
}

function drawHeart(ctx, x, y, r, filled) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(r / 10, r / 10);
  ctx.beginPath();
  ctx.moveTo(0, 3);
  ctx.bezierCurveTo(0, -2, -5, -5, -8, -2);
  ctx.bezierCurveTo(-11, 2, -6, 6, 0, 11);
  ctx.bezierCurveTo(6, 6, 11, 2, 8, -2);
  ctx.bezierCurveTo(5, -5, 0, -2, 0, 3);
  ctx.closePath();
  if (filled) {
    var grad = ctx.createLinearGradient(0, -6, 0, 10);
    grad.addColorStop(0, '#ff7a8a');
    grad.addColorStop(1, '#ff2a52');
    ctx.fillStyle = grad;
    ctx.fill();
  } else {
    ctx.strokeStyle = 'rgba(255, 122, 138, 0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
  ctx.restore();
}

function drawHelpButton(ctx) {
  var size = GF.clamp(28 * GF.S, 22, 38);
  var x = GF.W - 12 * GF.S - size;
  var y = 50 * GF.S;
  _helpBtnBounds = { x: x, y: y, w: size, h: size };
  ctx.fillStyle = 'rgba(40, 50, 80, 0.7)';
  ctx.beginPath();
  ctx.arc(x + size / 2, y + size / 2, size / 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(180, 200, 255, 0.4)';
  ctx.stroke();
  ctx.fillStyle = '#cfd6ff';
  ctx.font = 'bold ' + (size * 0.6) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', x + size / 2, y + size / 2 + size * 0.04);
}

// ── MODEL OVERLAY (the visible "ML cartridge") ──────────────────────────
function drawModelOverlay(ctx) {
  var size = GF.clamp(140 * GF.S, 100, 200);
  var pad = 12 * GF.S;
  var x = pad;
  var y = GF.H - size - pad;
  ctx.fillStyle = 'rgba(12, 16, 28, 0.85)';
  GF.rr(ctx, x, y, size, size, 8 * GF.S);
  ctx.fill();
  ctx.strokeStyle = policyPulse > 0.05 ? 'rgba(255, 235, 100, ' + policyPulse + ')' : 'rgba(120, 140, 200, 0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  var fs = GF.clamp(11 * GF.S, 9, 14);
  ctx.fillStyle = '#cfd6ff';
  ctx.font = 'bold ' + fs + 'px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(GF.t('model_label'), x + 8, y + 6);
  if (policyPulse > 0.1) {
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255, 235, 100, ' + policyPulse + ')';
    ctx.fillText(GF.t('learning'), x + size - 8, y + 6);
  }

  var gridY = y + fs + 14;
  var gridH = size - (fs + 22);
  var cell = Math.min((size - 16) / LANES, gridH / LANES);
  var gridStartX = x + (size - cell * LANES) / 2;
  var gridStartY = gridY;
  for (var r = 0; r < LANES; r++) {
    for (var c = 0; c < LANES; c++) {
      var w = transition ? transition[r * LANES + c] : 1 / LANES;
      var heat = GF.clamp(w * LANES, 0, 1.6);
      var alpha = 0.15 + heat * 0.55;
      ctx.fillStyle = 'rgba(' + Math.floor(180 + heat * 75) + ',' + Math.floor(80 - heat * 40) + ',' + Math.floor(110 - heat * 60) + ',' + alpha + ')';
      ctx.fillRect(gridStartX + c * cell + 1, gridStartY + r * cell + 1, cell - 2, cell - 2);
    }
  }

  var aimY = gridStartY + cell * LANES + 4;
  var aimH = Math.max(6, gridH * 0.08);
  if (aimY + aimH < y + size - 4) {
    for (var i = 0; i < LANES; i++) {
      var w2 = aimDistribution ? aimDistribution[i] : 1 / LANES;
      var h2 = GF.clamp(w2 * LANES, 0, 2);
      ctx.fillStyle = 'rgba(255, ' + Math.floor(220 - h2 * 80) + ', ' + Math.floor(120 - h2 * 70) + ', ' + (0.5 + h2 * 0.3) + ')';
      ctx.fillRect(gridStartX + i * cell + 1, aimY, cell - 2, aimH);
    }
  }

  if (gs === 'PLAYING') {
    ctx.strokeStyle = 'rgba(125, 246, 255, 0.95)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(gridStartX + player.lane * cell + 1, aimY - 1, cell - 2, aimH + 2);
  }
}

// ── MENU OVERLAY (with tutorial copy) ───────────────────────────────────
function drawMenu(ctx) {
  drawMatrixBackdrop(ctx, 0.18);

  ctx.fillStyle = 'rgba(8,8,18,0.78)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(34 * GF.S, 22, 52);
  var tutFs = GF.clamp(15 * GF.S, 11, 19);

  ctx.shadowColor = 'rgba(255, 100, 130, 0.45)';
  ctx.shadowBlur = 30 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t('title'), GF.cx, GF.cy - 170 * GF.S);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  ctx.font = tutFs + 'px sans-serif';
  ctx.fillStyle = '#cfd6ff';
  ctx.fillText(GF.t('sub'), GF.cx, GF.cy - 138 * GF.S);

  var tutLines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  var startY = GF.cy - 95 * GF.S;
  ctx.font = tutFs + 'px sans-serif';
  ctx.fillStyle = '#dbe2f7';
  for (var i = 0; i < tutLines.length; i++) {
    ctx.fillText(tutLines[i], GF.cx, startY + i * (tutFs * 1.55));
  }

  var btnW = GF.clamp(220 * GF.S, 160, 320);
  var btnH = GF.clamp(54 * GF.S, 40, 66);
  var btnX = GF.cx - btnW / 2;
  var btnY = GF.cy + 55 * GF.S;
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#ff4f6d');
  grad.addColorStop(1, '#c81e44');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.font = 'bold ' + tutFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), GF.cx, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  _menuButton = { x: btnX, y: btnY, w: btnW, h: btnH };

  if (best > 0) {
    ctx.font = GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
    ctx.fillStyle = '#9ab';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, btnY + btnH + 28 * GF.S);
  }

  ctx.font = GF.clamp(10 * GF.S, 8, 14) + 'px monospace';
  ctx.fillStyle = '#557';
  ctx.fillText(GF.t('daily_seed') + ' #' + (dailySeed || Math.floor(Date.now() / 86400000)), GF.cx, GF.H - 18 * GF.S);
}

function drawGameOver(ctx) {
  ctx.fillStyle = 'rgba(8,8,18,0.86)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(40 * GF.S, 24, 60);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#ff4f6d';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = 'rgba(255, 79, 109, 0.6)';
  ctx.shadowBlur = 30 * GF.S;
  ctx.fillText(GF.t('gameover'), GF.cx, GF.cy - 80 * GF.S);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  var fs = GF.clamp(18 * GF.S, 13, 24);
  ctx.font = fs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('score') + ': ' + score, GF.cx, GF.cy - 30 * GF.S);
  ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t('best') + ': ' + best, GF.cx, GF.cy + 0 * GF.S);

  var btnW = GF.clamp(220 * GF.S, 160, 320);
  var btnH = GF.clamp(54 * GF.S, 40, 66);
  var btnX = GF.cx - btnW / 2;
  var btnY = GF.cy + 50 * GF.S;
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#4dd0e1');
  grad.addColorStop(1, '#26a0b4');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.fillStyle = '#0a1018';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('retry'), GF.cx, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  _menuButton = { x: btnX, y: btnY, w: btnW, h: btnH };
}

function drawMatrixBackdrop(ctx, alphaScale) {
  var size = Math.min(GF.W, GF.H) * 0.7;
  var x = GF.cx - size / 2;
  var y = GF.cy - size / 2;
  var cell = size / LANES;
  for (var r = 0; r < LANES; r++) {
    for (var c = 0; c < LANES; c++) {
      var w = transition ? transition[r * LANES + c] : 1 / LANES;
      var heat = GF.clamp(w * LANES, 0, 1.6);
      ctx.fillStyle = 'rgba(' + Math.floor(180 + heat * 75) + ',' + Math.floor(80 - heat * 40) + ',' + Math.floor(110 - heat * 60) + ',' + (heat * alphaScale) + ')';
      ctx.fillRect(x + c * cell + 2, y + r * cell + 2, cell - 4, cell - 4);
    }
  }
}

// ── HELP OVERLAY ─────────────────────────────────────────────────────────
function drawHelpOverlay(ctx) {
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var fs = GF.clamp(16 * GF.S, 12, 22);
  var titleFs = GF.clamp(28 * GF.S, 18, 40);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillText(GF.t('title'), GF.cx, GF.cy - 130 * GF.S);
  ctx.font = fs + 'px sans-serif';
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
    '',
    GF.t('resume_hint'),
  ];
  ctx.fillStyle = '#dbe2f7';
  for (var i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], GF.cx, GF.cy - 80 * GF.S + i * (fs * 1.6));
  }
}

// ── BUTTON HIT TEST ──────────────────────────────────────────────────────
function inBounds(b, x, y) { return b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }

function onPress(x, y) {
  if (gs === 'PLAYING' && !_showHelp && _helpBtnBounds && inBounds(_helpBtnBounds, x, y)) {
    _showHelp = true;
    return true;
  }
  if (_showHelp) {
    _showHelp = false;
    return true;
  }
  if ((gs === 'MENU' || gs === 'GAMEOVER') && _menuButton && inBounds(_menuButton, x, y)) {
    startGame();
    return true;
  }
  return false;
}

var canvasEl = document.getElementById('c');
canvasEl.addEventListener('click', function(e) {
  onPress(e.clientX, e.clientY);
});
canvasEl.addEventListener('touchstart', function(e) {
  if (e.changedTouches && e.changedTouches[0]) {
    onPress(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
}, { passive: true });

// ── BOOT ─────────────────────────────────────────────────────────────────
initTransitionTable();

GF.init({
  designW: 720,
  designH: 1280,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'tiny_model_dodger',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('tiny_model_dodger_best') || '0') || 0; } catch (e) {}
    GF.persist('tiny_model_dodger_run_v1',
      function() { return { gs: gs, score: score, lives: lives, ticks: ticks, playerLane: player.lane }; },
      function(s) {
        if (!s) return;
        // Safe-entry: never resume mid-PLAYING — bounce to MENU.
        gs = 'MENU';
      }
    );
    if (gs === 'PLAYING' || gs === 'MENU') gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// Expose state for the runtime gate
GF.exposeState(function() {
  return {
    gs: gs,
    score: score,
    best: best,
    lives: lives,
    ticks: ticks,
    hazards: hazards.length,
    playerLane: player.lane,
    historyLen: historyBins.length,
    tunables: {
      LANES: LANES,
      MAX_LIVES: MAX_LIVES,
      MARKOV_HISTORY: MARKOV_HISTORY,
      MARKOV_RESAMPLE_EVERY: MARKOV_RESAMPLE_EVERY,
      MARKOV_BIAS_STRENGTH: MARKOV_BIAS_STRENGTH,
    },
  };
});

// ── YANDEX MUST-HAVES — DON'T REMOVE WITHOUT READING ─────────────────────
// 1. All UI text via GF.t() / STRINGS — both EN+RU populated above.
// 2. GF.persist() above + GF.saveRun() called on every state mutation.
// 3. Resize handled by gf-lib's fullscreenchange/orientationchange listeners.
// 4. No ads in this build — no auto-fire issues to worry about.
// ─────────────────────────────────────────────────────────────────────────

})();
</script>
