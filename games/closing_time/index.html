// ── RARE-MONSTER PRESENCE MODEL ───────────────────────────────────────────
// The product IS the rarity. The Restocker is NOT a constant chaser like 128's
// hunter; it is a presence that mostly haunts the periphery. It exists in one of
// three modes:
//   'gone'   - off the floor entirely (most of the time)
//   'lurk'   - present but spawned far / behind you; drifts, only aggros on a
//              very close hearing/LOS trigger; despawns ~700ms after it enters
//              the player's CENTER view (the "you only ever catch a glimpse")
//   'hunt'   - the one scripted close encounter per tape: a real chase that
//              the player must break (door, flash, cloak) or it catches you.
// Sighting cadence: ~1 glimpse per 5-10 min in normal play (DEBUG_MONSTER makes
// it near-constant for QA). The scripted hunt fires at most once per tape, gated
// by floor + a cooldown so it never spams.
var presence = 'gone';            // 'gone' | 'lurk' | 'hunt'
var presenceT = 0;                // seconds remaining in the current mode
var nextLurkT = 0;                // seconds until the next lurk window opens
var huntFiredThisTape = false;    // the scripted close encounter fires once per tape

var sawThisFloor = false;         // a glimpse happened on this floor (caps repeats)
var lastSightingFx = 0;           // static-swell fx timer when a glimpse registers

// theme derived from floor (escalation: new retail zone + rule deeper down)
function theme() {
  var f = floorN;
  var t = {
    ambient: GF.clamp(1 - (f - 1) * 0.07, 0.45, 1),
    flashR: GF.clamp(0.60 - (f - 1) * 0.03, 0.32, 0.60),
    battDrain: BATTERY_DRAIN * (1 + (f - 1) * 0.06),
    flicker: f >= 5,
    tint: 'rgba(120,130,150,0)', tintA: 0,
    ceilTop: '#dfe6ea', ceilHor: '#5a6470', floorHor: '#2c333a', floorBot: '#8b97a2',
    accent: '#cfe4ef',
  };
  if (f >= 3 && f < 6)  { t.ceilTop = '#cfd6dc'; t.floorBot = '#7a858f'; }   // back-of-house grey
  if (f >= 6 && f < 9)  { // Freezer aisles - cold blue
    t.ceilTop = '#cfe8f2'; t.ceilHor = '#2c5560'; t.floorHor = '#16323a'; t.floorBot = '#5aa3b2';
    t.tint = 'rgba(50,130,160,1)'; t.tintA = 0.15; t.accent = '#a8e6f2';
  } else if (f >= 9) {   // Loading dock / sodium - amber
    t.ceilTop = '#e0c28a'; t.ceilHor = '#4a3418'; t.floorHor = '#2a1e10'; t.floorBot = '#9a7840';
    t.tint = 'rgba(170,120,40,1)'; t.tintA = 0.16; t.accent = '#f0c870';
  }
  if (RIT && RIT.id === 'dark') { t.ambient = GF.clamp(t.ambient - 0.18, 0.3, 1); t.flashR = GF.clamp(t.flashR - 0.06, 0.3, 0.60); t.battDrain *= 1.15; }
  return t;
}
var TH = theme();

function floorName() {

  if (f >= 6) return L ? 'Морозильник' : 'Freezer Aisles';
  if (f >= 3) return L ? 'Склад' : 'Back of House';
  return L ? 'Торговый зал' : 'Sales Floor';
}

// ── PROCEDURAL TEXTURES / SPRITES (built once at boot) ────────────────────
var texWall = null, sprStalker = null, sprDrink = null, sprBattery = null, sprExit = null, sprCard = null;
function buildTextures() {
  // SHELVING wall: pale steel uprights + horizontal shelf rails + faint product
  // colour blocks. Reads as a retail gondola, not 128's wallpaper.
  texWall = document.createElement('canvas'); texWall.width = TEXW; texWall.height = TEXH;
  var c = texWall.getContext('2d');
  c.fillStyle = '#aeb6bd'; c.fillRect(0, 0, TEXW, TEXH);
  // vertical brushed-steel gradient banding
  for (var x = 0; x < TEXW; x++) {
    var s = 0.5 + 0.5 * Math.sin(x / TEXW * Math.PI * 8);
    c.fillStyle = 'rgba(255,255,255,' + (0.04 + s * 0.05).toFixed(3) + ')';
    c.fillRect(x, 0, 1, TEXH);
  }
  // shelf rails (horizontal) every 16px with a product-colour strip under each
  var prodCols = ['#7fae57', '#d06a4a', '#4a78c0', '#e0b34a', '#9a5ec0'];
  for (var ry = 8; ry < TEXH; ry += 16) {
    c.fillStyle = 'rgba(70,78,86,0.85)'; c.fillRect(0, ry, TEXW, 2);             // metal rail
    c.fillStyle = 'rgba(255,255,255,0.25)'; c.fillRect(0, ry - 1, TEXW, 1);      // rail highlight
    // product colour blocks sitting on the rail
    for (var pb = 0; pb < TEXW; pb += 8) {
      c.fillStyle = prodCols[((pb / 8) + (ry / 16)) % prodCols.length];
      c.globalAlpha = 0.55; c.fillRect(pb + 1, ry - 7, 6, 5); c.globalAlpha = 1;
      c.fillStyle = 'rgba(0,0,0,0.18)'; c.fillRect(pb + 1, ry - 3, 6, 1);        // box shadow line
    }
  }
  // steel uprights (verticals) at the gondola ends
  c.fillStyle = 'rgba(90,98,106,0.7)'; c.fillRect(0, 0, 2, TEXH); c.fillRect(TEXW - 2, 0, 2, TEXH);
  // subtle scuffs
  for (var i = 0; i < 6; i++) {
    var rx = (i * 263 % 61) / 61 * TEXW, sy = (i * 405 % 59) / 59 * TEXH;
    var g = c.createRadialGradient(rx, sy, 0, rx, sy, 6 + (i % 3) * 3);
    g.addColorStop(0, 'rgba(60,66,72,0.30)'); g.addColorStop(1, 'rgba(60,66,72,0)');
    c.fillStyle = g; c.fillRect(rx - 12, sy - 12, 24, 24);
  }

  // ── THE RESTOCKER ── original monster: a too-tall thing of bent shopping-cart
  // wire, a sloping mannequin torso, a single glowing price-scanner eye. Absurd,
  // screenshot-able, NO recognizable meme silhouette.
  sprStalker = document.createElement('canvas'); sprStalker.width = 104; sprStalker.height = 188;
  var e = sprStalker.getContext('2d');
  // pale mannequin torso (smooth, faceless, slightly wrong proportions)
  var body = e.createLinearGradient(0, 0, 0, 188);
  body.addColorStop(0, 'rgba(196,200,205,0)'); body.addColorStop(0.10, 'rgba(176,182,190,0.95)'); body.addColorStop(1, 'rgba(120,126,134,0.96)');
  e.fillStyle = body;
  e.beginPath();
  e.moveTo(52, 8); e.bezierCurveTo(78, 18, 70, 52, 60, 84);
  e.bezierCurveTo(74, 124, 70, 168, 58, 184); e.lineTo(46, 184);
  e.bezierCurveTo(34, 168, 30, 124, 44, 84); e.bezierCurveTo(34, 52, 26, 18, 52, 8); e.closePath(); e.fill();
  // bent shopping-cart WIRE limbs (the meme-energy tell): thin criss-cross lattice
  e.strokeStyle = 'rgba(150,156,164,0.92)'; e.lineWidth = 2.4; e.lineCap = 'round';
  for (var w = 0; w < 4; w++) {
    e.beginPath(); e.moveTo(44 - w * 2, 56); e.lineTo(14 + w * 3, 150 - w * 6); e.stroke();   // left arm wires
    e.beginPath(); e.moveTo(60 + w * 2, 56); e.lineTo(90 - w * 3, 150 - w * 6); e.stroke();   // right arm wires
  }
  // cart-grid cross-hatch on the torso (a few wire squares)
  e.strokeStyle = 'rgba(140,148,156,0.5)'; e.lineWidth = 1;
  for (var gx = 40; gx <= 64; gx += 6) { e.beginPath(); e.moveTo(gx, 70); e.lineTo(gx, 150); e.stroke(); }
  for (var gy = 70; gy <= 150; gy += 8) { e.beginPath(); e.moveTo(40, gy); e.lineTo(64, gy); e.stroke(); }
  // head: smooth blank dome, no features EXCEPT one glowing red scanner eye
  var head = e.createRadialGradient(52, 30, 2, 52, 30, 20);
  head.addColorStop(0, 'rgba(206,210,216,0.98)'); head.addColorStop(1, 'rgba(120,126,134,0)');
  e.fillStyle = head; e.fillRect(30, 8, 44, 46);
  // the scanner eye - a single horizontal red bar with a bloom (drawn additively at render)
  e.fillStyle = 'rgba(255,60,40,0.95)'; e.fillRect(40, 30, 24, 3);
  e.fillStyle = 'rgba(255,160,150,0.9)'; e.fillRect(40, 31, 24, 1);

  // ENERGY DRINK (nerve restore) - a tall can, not 128's almond-water carton
  sprDrink = document.createElement('canvas'); sprDrink.width = 36; sprDrink.height = 54;
  var a = sprDrink.getContext('2d');
  a.fillStyle = '#d8dde2'; a.fillRect(11, 6, 14, 44);
  a.fillStyle = '#36c06a'; a.fillRect(11, 18, 14, 18);                 // green band
  a.fillStyle = '#1a1f24'; a.fillRect(11, 6, 14, 4); a.fillRect(11, 46, 14, 4);
  a.fillStyle = '#eef2f5'; a.fillRect(14, 24, 8, 2); a.fillRect(14, 28, 8, 2);
  a.fillStyle = 'rgba(255,255,255,0.5)'; a.fillRect(12, 6, 2, 44);     // can highlight

  // SPARE BATTERY
  sprBattery = document.createElement('canvas'); sprBattery.width = 32; sprBattery.height = 52;
  var b = sprBattery.getContext('2d');
  b.fillStyle = '#27557a'; b.fillRect(8, 10, 16, 38);
  b.fillStyle = '#cfe4ef'; b.fillRect(8, 10, 16, 8);
  b.fillStyle = '#1a2a36'; b.fillRect(13, 5, 6, 5);
  b.fillStyle = '#eef'; b.font = 'bold 12px ' + FONT_MONO; b.textAlign = 'center'; b.fillText('+', 16, 38);

  // PUNCH-CARD (objective collectible) - a small yellow time-card with a notch
  sprCard = document.createElement('canvas'); sprCard.width = 46; sprCard.height = 34;
  var k = sprCard.getContext('2d');
  k.fillStyle = '#f2d65a'; GF.rr(k, 4, 4, 38, 26, 3); k.fill();
  k.fillStyle = '#c9a82e'; k.beginPath(); k.moveTo(4, 4); k.lineTo(12, 4); k.lineTo(4, 12); k.closePath(); k.fill();   // corner notch
  k.fillStyle = 'rgba(80,60,10,0.7)'; for (var lr = 0; lr < 3; lr++) k.fillRect(9, 11 + lr * 5, 28, 2);   // punch lines

  // STAFF DOOR (exit) - a lit steel door with a green EXIT glow strip
  sprExit = document.createElement('canvas'); sprExit.width = 86; sprExit.height = 156;
  var x2 = sprExit.getContext('2d');

//  RENDER

function draw(ctx, dt) {

  if (gs === 'PLAYING' || gs === 'GAMEOVER' || pauseMode) { renderWorld(ctx, W, H); }
  // VHS post-pass sits on the WORLD only (not over solid menu panels) so HUD/text stay crisp.
  if (gs === 'PLAYING' || gs === 'GAMEOVER' || pauseMode) applyVHS(ctx, W, H);
  if (gs === 'PLAYING' || gs === 'GAMEOVER' || pauseMode) drawHUD(ctx, W, H);
  if (gs === 'PLAYING' && !pauseMode && !panel) drawMetaHUD(ctx, W, H);
  if (gs === 'MENU') drawMenu(ctx, W, H);
  if (pauseMode === 'help') drawHelpPanel(ctx, W, H);
  else if (pauseMode === 'pause') drawPausePanel(ctx, W, H);
  if (panel === 'daily') drawDailyPanel(ctx, W, H);
  else if (panel === 'ranks') drawRanksPanel(ctx, W, H);
  else if (panel === 'shop') drawShopPanel(ctx, W, H);
  else if (panel === 'shelf') drawShelfPanel(ctx, W, H);
  if (gs === 'GAMEOVER') drawGameOver(ctx, W, H);
  if (jump > 0) { ctx.fillStyle = 'rgba(120,10,10,' + (jump * 0.6).toFixed(3) + ')'; ctx.fillRect(0, 0, W, H); }

}

function renderWorld(ctx, W, H) {
  dirX = Math.cos(pa); dirY = Math.sin(pa);

  cg.addColorStop(0, TH.ceilTop); cg.addColorStop(1, TH.ceilHor); ctx.fillStyle = cg; ctx.fillRect(0, 0, W, horizon);
  var fg = ctx.createLinearGradient(0, horizon, 0, H);
  fg.addColorStop(0, TH.floorHor); fg.addColorStop(1, TH.floorBot); ctx.fillStyle = fg; ctx.fillRect(0, horizon, W, H - horizon);
  // ceiling fluorescent strips receding toward the horizon (a retail tell)

  var projDist = H * WALL_H;

    var cameraX = 2 * (s + COL * 0.5) / W - 1;
    var rdx = dirX + planeX * cameraX, rdy = dirY + planeY * cameraX;
    var mapX = px | 0, mapY = py | 0;

    var stepX, stepY, sdx, sdy;
    if (rdx < 0) { stepX = -1; sdx = (px - mapX) * ddx; } else { stepX = 1; sdx = (mapX + 1 - px) * ddx; }
    if (rdy < 0) { stepY = -1; sdy = (py - mapY) * ddy; } else { stepY = 1; sdy = (mapY + 1 - py) * ddy; }
    var hit = 0, side = 0, guard = 0;
    while (!hit && guard++ < 200) {
      if (sdx < sdy) { sdx += ddx; mapX += stepX; side = 0; } else { sdy += ddy; mapY += stepY; side = 1; }
      if (mapX < 0 || mapY < 0 || mapX >= MW || mapY >= MH || MAP[mapY][mapX] === 1) hit = 1;

    var wallX = side === 0 ? (py + perp * rdy) : (px + perp * rdx); wallX -= Math.floor(wallX);
    var texX = (wallX * TEXW) | 0;

    ctx.drawImage(texWall, texX, 0, 1, TEXH, s, drawStart, COL, drawEnd - drawStart);
    var sh = GF.clamp(perp / (9 * TH.ambient), 0, 0.86); if (side === 1) sh = Math.min(0.9, sh + 0.14);
    sh = sh * TH.ambient + (1 - TH.ambient) * 0.55;
    if (sh > 0.01) { ctx.fillStyle = 'rgba(0,0,0,' + sh.toFixed(3) + ')'; ctx.fillRect(s, drawStart, COL, drawEnd - drawStart); }
  }

  // sprites (sorted far->near): door, supplies, cards, the entity
  var sprites = [{ kind: 'exit', x: exitCell.x + 0.5, y: exitCell.y + 0.5 }];
  for (var i = 0; i < items.length; i++) if (!items[i].got) sprites.push({ kind: items[i].type, x: items[i].x, y: items[i].y, bob: items[i].bob });
  for (var c4 = 0; c4 < cards.length; c4++) if (!cards[c4].got) sprites.push({ kind: 'card', x: cards[c4].x, y: cards[c4].y, bob: cards[c4].bob });
  if (stalker) sprites.push({ kind: 'ent', x: stalker.x, y: stalker.y });
  for (var sp = 0; sp < sprites.length; sp++) { var dd = sprites[sp]; dd.dist = (dd.x - px) * (dd.x - px) + (dd.y - py) * (dd.y - py); }

  for (var q = 0; q < sprites.length; q++) drawBillboard(ctx, sprites[q], W, H, horizon, projDist);

  if (TH.tintA > 0) { ctx.fillStyle = TH.tint.replace('1)', TH.tintA + ')'); ctx.fillRect(0, 0, W, H); }

  // camcorder lamp vignette
  var lit = lightOn && battery > 0 && flickerDark < 0.5;

  var bx = W * 0.5, by = horizon + Math.min(H, W) * 0.04;

  lg.addColorStop(0, 'rgba(0,0,0,0)'); lg.addColorStop(0.62, 'rgba(0,0,0,' + (edge * 0.45).toFixed(3) + ')'); lg.addColorStop(1, 'rgba(0,0,0,' + edge.toFixed(3) + ')');
  ctx.fillStyle = lg; ctx.fillRect(0, 0, W, H);
  if (lit) { var wa = shotMode ? 0.05 : 0.10, wg = ctx.createRadialGradient(bx, by, 0, bx, by, beamR * 0.7); wg.addColorStop(0, 'rgba(220,235,255,' + wa + ')'); wg.addColorStop(1, 'rgba(220,235,255,0)'); ctx.fillStyle = wg; ctx.fillRect(0, 0, W, H); }

  if (sfrac > 0.25) {
    var pulse = 0.5 + 0.5 * Math.sin(performanceNow() * 0.006);
    var av = (sfrac - 0.25) * 0.9 * (0.6 + pulse * 0.4);
    var vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.2, W / 2, H / 2, Math.max(W, H) * 0.62);
    var col = sfrac > 0.7 ? '90,0,0' : '20,30,50';
    vg.addColorStop(0, 'rgba(' + col + ',0)'); vg.addColorStop(1, 'rgba(' + col + ',' + av.toFixed(3) + ')'); ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  }
}
function drawBillboard(ctx, sp, W, H, horizon, projDist) {

// ── VHS POST-PASS (cheap per-frame; profiled for 60fps) ───────────────────
function applyVHS(ctx, W, H) {

  if (vhsTrack > 0.08) {

      var by = (Math.random() * H) | 0, bh = 2 + (Math.random() * 10) | 0, off = (Math.random() - 0.5) * vhsTrack * 36;
      try { ctx.drawImage(GF.canvas, 0, by, W, bh, off, by, W, bh); } catch (e) {}
      ctx.fillStyle = 'rgba(255,255,255,' + (0.04 + Math.random() * 0.05).toFixed(3) + ')'; ctx.fillRect(0, by, W, 1);
    }
  }
  // 3. animated grain (cycled prebaked tiles)
  vhsGrainIdx = (vhsGrainIdx + 1) % vhsGrainTiles.length;
  ctx.save(); ctx.globalAlpha = 0.5 + vhsTrack * 0.4; ctx.fillStyle = vhsGrainTiles[vhsGrainIdx]; ctx.fillRect(0, 0, W, H); ctx.restore();

  var rb = ((vhsT * 60) % (H + 60)) - 30;

  rg.addColorStop(0, 'rgba(255,255,255,0)'); rg.addColorStop(0.5, 'rgba(255,255,255,0.05)'); rg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = rg; ctx.fillRect(0, rb - 30, W, 60);

  eg.addColorStop(0, 'rgba(0,0,0,0)'); eg.addColorStop(1, 'rgba(0,0,0,0.30)'); ctx.fillStyle = eg; ctx.fillRect(0, 0, W, H);
}

// ── REC HUD (corner camcorder overlay: REC dot, timestamp, CAM id, battery%) ─

// ── GAMEPLAY HUD (bars, buttons, objective) ───────────────────────────────
var ui = {};

//  INPUT (left=move, right=look; + buttons)

  if (panel === 'daily') { if (hitBtn(ui.claim, x, y)) claimDaily(); else if (hitBtn(ui.back, x, y)) panel = null; return true; }
  if (panel === 'ranks') { if (hitBtn(ui.back, x, y)) panel = null; return true; }
  if (panel === 'shelf') { if (hitBtn(ui.back, x, y)) panel = null; return true; }
  if (panel === 'shop') { if (hitBtn(ui.back, x, y)) panel = null; return true; }
  if (gs === 'MENU') {
    if (menuView === 'daily') { if (hitBtn(ui.claim, x, y)) claimDaily(); else if (hitBtn(ui.back, x, y)) menuView = 'main'; return true; }
    if (menuView === 'ranks') { if (hitBtn(ui.back, x, y)) menuView = 'main'; return true; }
    if (menuView === 'shelf') { if (hitBtn(ui.back, x, y)) menuView = 'main'; return true; }
    if (menuView === 'shop') { if (hitBtn(ui.back, x, y)) menuView = 'main'; return true; }
    if (hitBtn(ui.daily, x, y)) { menuView = 'daily'; return true; }
    if (hitBtn(ui.shop, x, y)) { menuView = 'shop'; return true; }
    if (hitBtn(ui.shelf, x, y)) { menuView = 'shelf'; return true; }
    if (hitBtn(ui.ranks, x, y)) { menuView = 'ranks'; fetchRanks(); return true; }
    startRun(); return true;
  }

    if (reviveAvail()) { if (hitBtn(ui.revive, x, y)) doRevive(); else if (hitBtn(ui.retry, x, y)) startRun(); return true; }
