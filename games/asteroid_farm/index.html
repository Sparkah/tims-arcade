<script>
(function() {
'use strict';

// ── STRINGS (EN + RU - Yandex 8.2.3) ─────────────────────────────────────
var STRINGS = {

    spoiled: 'Гниль', nextAt: 'до волны', combo: 'Комбо',
    cleanse: 'Очистка', freeze: 'Заморозка', frozen: 'ЗАМОРОЗКА', comet: 'КОМЕТА!',
    close: 'Понятно',

    htp_title: 'Как играть',

    tut_controls: 'Управление: Нажмите на спелый камень, чтобы собрать. Нажмите инструмент (Очистка / Заморозка), затем на клетку.',
    tut_win: 'Победа: Бесконечно - набирайте больше урожая за нарастающие волны.',
    tut_lose: 'Поражение: Если на поле 5 гнилых астероидов сразу - ферма гибнет.',
    tut_tip: 'Совет: Гниль ползёт к соседям каждый тик - очищайте рано, Заморозка спасает.',
    coach_harvest: 'Нажмите на светящийся ЗОЛОТОЙ астероид, чтобы собрать',
    coach_rot: 'Фиолетовые камни ГНИЛЫЕ - они расползаются! Держите меньше 5',
    coach_tools: 'Очистка убирает гниль · Заморозка ставит поле на паузу',
    coach_go: 'Вперёд! Собирайте урожай',
  },
};

var SPRITE_NAMES = ['ripe', 'spoiled', 'crystal', 'seedling'];

// ── TUNABLES (exposed via GF.exposeState) ────────────────────────────────
var GRID_START      = 5;
var GRID_MAX        = 7;
var SPOIL_LIMIT     = 5;
var TICK            = 0.9;
var TICK_MIN        = 0.55;
var SPOIL_AFTER     = 4.5;
var SPOIL_AFTER_MIN = 2.2;
var GROW_TIME       = 2.2;
var YIELD_RIPE      = 5;
var YIELD_GOLD      = 9;
var YIELD_CRYSTAL   = 14;
var COMBO_WINDOW    = 1.4;
var COMBO_MAX       = 5;
var CLEANSE_EVERY   = 6;
var FREEZE_EVERY    = 14;
var FREEZE_SECONDS  = 3.5;
var COMET_WAVE      = 4;

var WAVE_TARGETS = [0, 12, 28, 50, 80, 120, 170, 230, 300];

// Cell stages
var SEED = 0, GROW = 1, RIPE = 2, SPOILED = 3, EMPTY = 4;
// Species
var SP_NORMAL = 0, SP_GOLD = 1, SP_CRYSTAL = 2, SP_VOLATILE = 3;

// ── STATE ────────────────────────────────────────────────────────────────
var gs = 'MENU';                 // MENU | PLAYING | GAMEOVER
var best = 0;
var grid = [];                   // flat array of cell objects
var gridN = GRID_START;
var yield_ = 0, wave = 1, harvests = 0, spoiledCount = 0;
var cleanseCharges = 0, freezeCharges = 0;
var armed = null;                // null | 'cleanse'
var frozen = 0;                  // seconds of freeze remaining
var tickAcc = 0;
var combo = 0, comboT = 0;
var spoilAfter = SPOIL_AFTER, tickLen = TICK;
var seenTut = false;
var nowT = 0;

// comet hazard
var cometWarn = 0;               // seconds until comet strikes (0 = none)
var cometKind = 'row', cometIdx = 0;
var cometCool = 0;               // seconds until next comet allowed

// fx
var floats = [], rings = [], puffs = [];
var bannerText = '', bannerT = 0;

// coach tutorial
var coachStep = -1;              // -1 inactive
var coachT = 0;

// layout cache
var board = { x: 0, y: 0, w: 0, h: 0, cell: 0 };
var toolBtns = [];               // {id,x,y,w,h}
var helpOpen = false;
var starfield = [];

// ── CELL HELPERS ─────────────────────────────────────────────────────────
function mkCell() {
  return { stage: EMPTY, sp: SP_NORMAL, t: 0, ripeT: 0, crack: 0, seedDelay: 0, pop: 0, born: 0 };
}
function idx(r, c) { return r * gridN + c; }

function speciesAllowed() {
  var pool = [SP_NORMAL];
  if (wave >= 2) pool.push(SP_GOLD);
  if (wave >= 3) pool.push(SP_CRYSTAL);
  if (wave >= 5) pool.push(SP_VOLATILE);
  return pool;
}
function rollSpecies() {
  var pool = speciesAllowed();
  var bag = [];
  for (var i = 0; i < pool.length; i++) {
    var s = pool[i];
    var n = s === SP_NORMAL ? 6 : (s === SP_GOLD ? 3 : (s === SP_CRYSTAL ? 2 : 1));
    for (var k = 0; k < n; k++) bag.push(s);
  }
  return bag[(Math.random() * bag.length) | 0];
}

function plant(cell, immediate) {
  cell.stage = SEED;
  cell.sp = rollSpecies();
  cell.t = 0; cell.ripeT = 0; cell.crack = 0; cell.pop = 0;
  cell.born = nowT + Math.random() * 9;   // seed used only for drawing variety
  cell.seedDelay = immediate ? 0 : (Math.random() * GROW_TIME * 0.7);
}

function ripeWindow(cell) {
  var w = spoilAfter;
  if (cell.sp === SP_GOLD) w *= 0.6;          // gold rots 40% faster
  if (cell.sp === SP_CRYSTAL) w *= 1.25;      // crystal a touch more forgiving
  return w;
}

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) { var j = (Math.random() * (i + 1)) | 0; var t = a[i]; a[i] = a[j]; a[j] = t; }
  return a;
}

// ── RUN LIFECYCLE ────────────────────────────────────────────────────────
function newGrid(n) {
  gridN = n; grid = [];
  for (var i = 0; i < n * n; i++) grid.push(mkCell());
}

function startGame(seedRipe) {
  window.__shotFreeze = false;
  yield_ = 0; wave = 1; harvests = 0; spoiledCount = 0;
  cleanseCharges = 0; freezeCharges = 0; armed = null; frozen = 0;
  combo = 0; comboT = 0; tickAcc = 0;
  spoilAfter = SPOIL_AFTER; tickLen = TICK;
  cometWarn = 0; cometCool = 10;
  floats = []; rings = []; puffs = [];
  bannerText = ''; bannerT = 0;
  newGrid(GRID_START);
  for (var i = 0; i < grid.length; i++) plant(grid[i], false);
  if (seedRipe !== false) {
    // Seed a dense ripe field CLUSTERED AT CENTER for instant time-to-first-fun:
    // the first tap (which players aim center) lands on a glowing ripe rock.
    var mid = (GRID_START - 1) / 2;
    var order = []; for (var j = 0; j < grid.length; j++) order.push(j);
    order.sort(function (a, b) {
      var da = Math.abs((a % gridN) - mid) + Math.abs(((a / gridN) | 0) - mid);
      var db = Math.abs((b % gridN) - mid) + Math.abs(((b / gridN) | 0) - mid);
      return (da + Math.random() * 0.9) - (db + Math.random() * 0.9);   // center-first, lightly jittered
    });
    var n = Math.min(9, Math.max(7, Math.floor(grid.length * 0.36)));
    for (var q = 0; q < n; q++) {
      var ce = grid[order[q]];
      ce.stage = RIPE; ce.ripeT = 0; ce.t = 0; ce.sp = SP_NORMAL; ce.pop = 0.4;
    }
    // guarantee the dead-center cell is ripe so a center tap always harvests
    var cmid = grid[idx(Math.round(mid), Math.round(mid))];
    cmid.stage = RIPE; cmid.ripeT = 0; cmid.t = 0; cmid.sp = SP_NORMAL; cmid.pop = 0.4;
    // a few already mid-grown so more keep ripening immediately after
    for (var g2 = n; g2 < Math.min(n + 5, grid.length); g2++) {
      var cg = grid[order[g2]]; cg.stage = GROW; cg.t = GROW_TIME * 0.7; cg.seedDelay = 0;
    }
  }
  gs = 'PLAYING';
  layout();
  GF.gameStarted();
  GF.saveRun();
}

function gameOver() {
  if (yield_ > best) { best = yield_; try { localStorage.setItem('asteroid_farm_best', best); } catch (e) {} }
  gs = 'GAMEOVER'; armed = null;
  GF.setShake(16); GF.sfx('lose');
  GF.gameEnded(); GF.saveRun();
}

// ── WAVE / ESCALATION ────────────────────────────────────────────────────
function waveTarget(w) {
  if (w < WAVE_TARGETS.length) return WAVE_TARGETS[w];
  return WAVE_TARGETS[WAVE_TARGETS.length - 1] + (w - (WAVE_TARGETS.length - 1)) * 90;
}

function checkWave() {
  var need = waveTarget(wave);
  if (yield_ >= need) { wave++; onWaveUp(); }
}

function onWaveUp() {
  GF.sfx('levelup');
  spawnRing(board.x + board.w / 2, board.y + board.h / 2, '#ffd75e');
  spoilAfter = Math.max(SPOIL_AFTER_MIN, SPOIL_AFTER - (wave - 1) * 0.28);
  tickLen = Math.max(TICK_MIN, TICK - (wave - 1) * 0.045);
  if (wave === 2) { banner(GF.t('new_gold')); cleanseCharges += 1; }
  else if (wave === 3) { banner(GF.t('new_crystal')); freezeCharges += 1; growGrid(6); }
  else if (wave === 4) banner(GF.t('new_comet'));
  else if (wave === 5) { banner(GF.t('new_volatile')); growGrid(7); }
  else banner(GF.t('wave') + ' ' + wave);
  GF.saveRun();
}

function growGrid(n) {
  if (gridN >= n || n > GRID_MAX) return;
  var old = grid, oldN = gridN;
  newGrid(n);
  var off = ((n - oldN) / 2) | 0;
  for (var r = 0; r < oldN; r++) for (var c = 0; c < oldN; c++) {
    grid[idx(r + off, c + off)] = old[r * oldN + c];
  }
  for (var i = 0; i < grid.length; i++) {
    if (grid[i].stage === EMPTY && grid[i].t === 0 && grid[i].born === 0) plant(grid[i], false);
  }
  layout();
  banner(GF.t('grid_grow'));
}

// ── TICK: spoilage cascade ───────────────────────────────────────────────
function neighbours(r, c) {
  var out = [];
  if (r > 0) out.push(idx(r - 1, c));
  if (r < gridN - 1) out.push(idx(r + 1, c));
  if (c > 0) out.push(idx(r, c - 1));
  if (c < gridN - 1) out.push(idx(r, c + 1));
  return out;
}

function doTick() {
  if (gs !== 'PLAYING') return;
  var spoiledIdx = [];
  for (var i = 0; i < grid.length; i++) if (grid[i].stage === SPOILED) spoiledIdx.push(i);
  var anyInfected = false;
  for (var s = 0; s < spoiledIdx.length; s++) {
    var ix = spoiledIdx[s];
    var r = (ix / gridN) | 0, c = ix % gridN;
    var nb = neighbours(r, c);
    var targets = [];
    for (var k = 0; k < nb.length; k++) {
      var ce = grid[nb[k]];
      if (ce.stage === GROW || ce.stage === RIPE || ce.stage === SEED) targets.push(nb[k]);
    }
    if (targets.length) { spoilCell(targets[(Math.random() * targets.length) | 0], false); anyInfected = true; }
  }
  recomputeSpoiled();
  if (anyInfected) { GF.sfx('hit'); if (spoiledCount >= 3) GF.setShake(6); }
  if (spoiledCount >= SPOIL_LIMIT) { gameOver(); return; }
  for (var e = 0; e < grid.length; e++) {
    if (grid[e].stage === EMPTY) { if (Math.random() < 0.55) plant(grid[e], false); }
  }
}

function spoilCell(i, fromComet) {
  var ce = grid[i];
  if (ce.stage === SPOILED) return;
  var wasVolatile = ce.sp === SP_VOLATILE && (ce.stage === RIPE || ce.stage === GROW);
  ce.stage = SPOILED; ce.t = 0; ce.pop = 0.6;
  spawnPuff(cellCX(i), cellCY(i), '#9b59ff');
  if (wasVolatile) {
    GF.setShake(10); GF.sfx('hurt');
    var r = (i / gridN) | 0, c = i % gridN;
    var nb = neighbours(r, c);
    for (var k = 0; k < nb.length; k++) {
      var ne = grid[nb[k]];
      if (ne.stage !== SPOILED) { ne.stage = SPOILED; ne.t = 0; ne.pop = 0.6; spawnPuff(cellCX(nb[k]), cellCY(nb[k]), '#ff4d8d'); }
    }
  }
}

function recomputeSpoiled() {
  var n = 0;
  for (var i = 0; i < grid.length; i++) if (grid[i].stage === SPOILED) n++;
  spoiledCount = n;
}

// ── COMET HAZARD ─────────────────────────────────────────────────────────
function maybeComet(dt) {
  if (wave < COMET_WAVE) return;
  if (cometWarn > 0) { cometWarn -= dt; if (cometWarn <= 0) strikeComet(); return; }
  cometCool -= dt;
  if (cometCool <= 0) {
    cometKind = Math.random() < 0.5 ? 'row' : 'col';
    cometIdx = (Math.random() * gridN) | 0;
    cometWarn = 2.0;
    GF.sfx('spawn'); banner(GF.t('comet'));
    cometCool = Math.max(7, 16 - (wave - COMET_WAVE) * 1.6);
  }
}
function strikeComet() {
  GF.setShake(14); GF.sfx('hurt');
  for (var k = 0; k < gridN; k++) {
    var i = cometKind === 'row' ? idx(cometIdx, k) : idx(k, cometIdx);
    var ce = grid[i];
    if (ce.stage === RIPE || ce.stage === GROW || ce.stage === SEED) spoilCell(i, true);
    spawnPuff(cellCX(i), cellCY(i), '#7ad0ff');
  }
  recomputeSpoiled();
  if (spoiledCount >= SPOIL_LIMIT) gameOver();
}

// ── HARVEST / CLEANSE / FREEZE ───────────────────────────────────────────
function comboMult() { return 1 + Math.min(COMBO_MAX - 1, combo); }

function harvest(i) {
  var ce = grid[i];
  if (ce.sp === SP_CRYSTAL && ce.crack < 1) {
    ce.crack = 1; ce.pop = 0.4; GF.sfx('click');
    spawnPuff(cellCX(i), cellCY(i), '#7ad0ff');
    return;
  }
  var base = ce.sp === SP_GOLD ? YIELD_GOLD : (ce.sp === SP_CRYSTAL ? YIELD_CRYSTAL : YIELD_RIPE);
  comboT = COMBO_WINDOW; combo = Math.min(COMBO_MAX - 1, combo + 1);
  var gain = Math.round(base * comboMult());
  yield_ += gain; harvests++;
  spawnFloat(cellCX(i), cellCY(i) - board.cell * 0.2, '+' + gain, ce.sp === SP_GOLD ? '#ffd75e' : (ce.sp === SP_CRYSTAL ? '#88e0ff' : '#aef5b0'));
  GF.spawnParticles(cellCX(i), cellCY(i), ce.sp === SP_GOLD ? '#ffd75e' : (ce.sp === SP_CRYSTAL ? '#88e0ff' : '#9af2a0'), 12);
  GF.sfx(ce.sp === SP_CRYSTAL ? 'merge' : 'coin');
  ce.stage = EMPTY; ce.t = 0; ce.born = 0; ce.crack = 0; ce.pop = 0.5; ce.ripeT = 0;
  if (harvests % CLEANSE_EVERY === 0) { cleanseCharges++; spawnFloat(toolBtns[0] ? toolBtns[0].x + toolBtns[0].w / 2 : cellCX(i), board.y + board.h + 6 * GF.S, '+1', '#7ad0ff'); }
  if (wave >= 3 && harvests % FREEZE_EVERY === 0) { freezeCharges++; spawnFloat(toolBtns[1] ? toolBtns[1].x + toolBtns[1].w / 2 : cellCX(i), board.y + board.h + 6 * GF.S, '+1', '#9ad8ff'); }
  checkWave();
  GF.saveRun();
  if (coachStep === 0) { coachStep = 1; coachT = 0; }
}

function cleanseAt(i) {
  var ce = grid[i];
  if (ce.stage !== SPOILED || cleanseCharges <= 0) return false;
  cleanseCharges--;
  ce.stage = SEED; ce.t = 0; ce.born = nowT; ce.sp = rollSpecies(); ce.pop = 0.6; ce.seedDelay = 0;
  GF.spawnParticles(cellCX(i), cellCY(i), '#7ad0ff', 14); GF.sfx('levelup');
  recomputeSpoiled();
  if (armed === 'cleanse' && cleanseCharges <= 0) armed = null;
  GF.saveRun();
  return true;
}

function doFreeze() {
  if (freezeCharges <= 0 || frozen > 0) return;
  freezeCharges--; frozen = FREEZE_SECONDS; GF.sfx('win');
  spawnRing(board.x + board.w / 2, board.y + board.h / 2, '#88e0ff');
  GF.saveRun();
}

// ── CELL GEOMETRY ────────────────────────────────────────────────────────
function cellCX(i) { return board.x + (i % gridN) * board.cell + board.cell / 2; }
function cellCY(i) { return board.y + ((i / gridN) | 0) * board.cell + board.cell / 2; }

// ── INPUT ────────────────────────────────────────────────────────────────
function onPress(px, py) {
  if (helpOpen) { helpOpen = false; return; }
  if (gs !== 'PLAYING') return;
  for (var b = 0; b < toolBtns.length; b++) {
    var t = toolBtns[b];
    if (px >= t.x && px <= t.x + t.w && py >= t.y && py <= t.y + t.h) { handleToolBtn(t.id); return; }
  }
  if (px >= board.x && px < board.x + board.w && py >= board.y && py < board.y + board.h) {
    var c = ((px - board.x) / board.cell) | 0;
    var r = ((py - board.y) / board.cell) | 0;
    if (c < 0 || c >= gridN || r < 0 || r >= gridN) return;
    var i = idx(r, c), ce = grid[i];
    if (armed === 'cleanse') {
      if (ce.stage === SPOILED) cleanseAt(i);
      if (cleanseCharges <= 0) armed = null;
      return;
    }
    if (ce.stage === RIPE) harvest(i);
    else if (ce.stage === SPOILED) { GF.sfx('click'); if (coachStep === 1) { coachStep = 2; coachT = 0; } }
  }
}

function handleToolBtn(id) {
  if (id === 'cleanse') { if (cleanseCharges > 0) { armed = (armed === 'cleanse') ? null : 'cleanse'; GF.sfx('click'); } }
  else if (id === 'freeze') doFreeze();
  else if (id === 'help') { helpOpen = true; armed = null; }
  else if (id === 'mute') GF.toggleMute();
  if (coachStep === 2) { coachStep = 3; coachT = 0; }
}

document.addEventListener('keydown', function (e) {
  if (gs !== 'PLAYING') return;
  if (e.code === 'Digit1' && cleanseCharges > 0) armed = (armed === 'cleanse') ? null : 'cleanse';
  if (e.code === 'Digit2') doFreeze();
  if (e.code === 'KeyM') GF.toggleMute();
});

GF.canvas.addEventListener('pointerdown', function (e) {
  if (gs === 'PLAYING' || helpOpen) onPress(e.clientX, e.clientY);
}, { passive: true });

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  nowT += dt;
  updFx(dt);
  if (gs !== 'PLAYING') return;
  // Screenshot freeze: hold the populated mid-wave state so the capture can't
  // cascade to GAMEOVER before the shot fires (FX above still animate).
  if (window.__shotFreeze) return;

  if (coachStep >= 0) { coachT += dt; if (coachStep >= 3 && coachT > 2.2) coachStep = -1; }
  var coachFreeze = coachStep === 0;     // before first harvest, hold spoilage

  if (frozen > 0) { frozen -= dt; if (frozen < 0) frozen = 0; }
  var growing = frozen <= 0 && !coachFreeze;

  if (comboT > 0) { comboT -= dt; if (comboT <= 0) combo = 0; }

  if (growing) {
    for (var i = 0; i < grid.length; i++) {
      var ce = grid[i];
      if (ce.pop > 0) ce.pop = Math.max(0, ce.pop - dt * 3);
      if (ce.stage === SEED) {
        if (ce.seedDelay > 0) { ce.seedDelay -= dt; continue; }
        ce.t += dt; if (ce.t >= GROW_TIME) { ce.stage = GROW; ce.t = 0; ce.pop = 0.3; }
      } else if (ce.stage === GROW) {
        ce.t += dt; if (ce.t >= GROW_TIME) { ce.stage = RIPE; ce.t = 0; ce.ripeT = 0; ce.pop = 0.5; }
      } else if (ce.stage === RIPE) {
        ce.ripeT += dt;
        if (ce.ripeT >= ripeWindow(ce)) { spoilCell(i, false); recomputeSpoiled(); if (spoiledCount >= SPOIL_LIMIT) { gameOver(); return; } }
      }
    }
    tickAcc += dt;
    while (tickAcc >= tickLen) { tickAcc -= tickLen; doTick(); if (gs !== 'PLAYING') return; }
    maybeComet(dt);
  } else {
    for (var p = 0; p < grid.length; p++) { var cp = grid[p]; if (cp.pop > 0) cp.pop = Math.max(0, cp.pop - dt * 3); }
  }
  if (bannerT > 0) bannerT -= dt;
}

function updFx(dt) {
  for (var i = floats.length - 1; i >= 0; i--) { var f = floats[i]; f.y -= 34 * dt; f.life -= dt; if (f.life <= 0) floats.splice(i, 1); }
  for (var r = rings.length - 1; r >= 0; r--) { var rg = rings[r]; rg.t += dt; if (rg.t >= rg.max) rings.splice(r, 1); }
  for (var p = puffs.length - 1; p >= 0; p--) { var pf = puffs[p]; pf.t += dt; pf.r += 60 * dt; if (pf.t >= pf.max) puffs.splice(p, 1); }
}

function spawnFloat(x, y, txt, col) { floats.push({ x: x, y: y, txt: txt, col: col || '#fff', life: 0.9 }); }
function spawnRing(x, y, col) { rings.push({ x: x, y: y, t: 0, max: 0.7, col: col || '#fff' }); }
function spawnPuff(x, y, col) { puffs.push({ x: x, y: y, t: 0, max: 0.5, r: 6, col: col || '#9b59ff' }); }
function banner(txt) { bannerText = txt; bannerT = 2.4; }

// ── LAYOUT ───────────────────────────────────────────────────────────────
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var topH = 96 * S;
  var toolH = Math.max(70 * S, 70);
  var pad = 14 * S;
  var availW = W - pad * 2;
  var availH = H - topH - toolH - pad * 2;
  var side = Math.min(availW, availH);
  side = Math.min(side, 560 * S);
  board.cell = Math.floor(side / gridN);
  board.w = board.cell * gridN; board.h = board.w;
  board.x = (W - board.w) / 2;
  board.y = topH + (availH - board.h) / 2 + pad * 0.5;
  if (board.y < topH) board.y = topH;

  var btnH = Math.max(58 * S, 58);
  var by = board.y + board.h + 12 * S;
  if (by + btnH > H) by = H - btnH - 8 * S;
  var smallW = btnH;
  var bigW = Math.max(118 * S, 118);
  var gap = 10 * S;
  var totalW = bigW * 2 + smallW * 2 + gap * 3;
  if (totalW > W - pad * 2) bigW = (W - pad * 2 - smallW * 2 - gap * 3) / 2;
  var startX = (W - (bigW * 2 + smallW * 2 + gap * 3)) / 2;
  toolBtns = [
    { id: 'cleanse', x: startX, y: by, w: bigW, h: btnH },
    { id: 'freeze', x: startX + bigW + gap, y: by, w: bigW, h: btnH },
    { id: 'help', x: startX + bigW * 2 + gap * 2, y: by, w: smallW, h: btnH },
    { id: 'mute', x: startX + bigW * 2 + smallW + gap * 3, y: by, w: smallW, h: btnH },
  ];
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function ensureStars() {
  if (starfield.length) return;
  for (var i = 0; i < 90; i++) starfield.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.6 + 0.3, tw: Math.random() * 6.28 });
}

function draw(ctx) {
  var W = GF.W, H = GF.H;
  ensureStars();
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0b0a1f'); g.addColorStop(0.55, '#0a0a18'); g.addColorStop(1, '#05040d');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  var ng = ctx.createRadialGradient(W * 0.7, H * 0.25, 10, W * 0.7, H * 0.25, W * 0.7);
  ng.addColorStop(0, 'rgba(90,40,140,0.22)'); ng.addColorStop(1, 'rgba(90,40,140,0)');
  ctx.fillStyle = ng; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  for (var i = 0; i < starfield.length; i++) {
    var st = starfield[i];
    ctx.globalAlpha = (0.4 + 0.5 * Math.abs(Math.sin(nowT * 1.3 + st.tw))) * 0.7;
    ctx.beginPath(); ctx.arc(st.x * W, st.y * H, st.r, 0, 6.28); ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawBoard(ctx); drawFx(ctx); drawHUD(ctx); drawTools(ctx);
    if (gs === 'PLAYING') {
      drawComet(ctx); drawBanner(ctx); drawCoach(ctx);
      if (frozen > 0) drawFreezeOverlay(ctx);
    }
  }
  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'GAMEOVER') {
    GF.drawOverlay({
      title: GF.t('gameover'),
      sub: GF.t('score') + ': ' + yield_ + '   ·   ' + GF.t('wave') + ' ' + wave,
      sub2: GF.t('best') + ': ' + Math.max(best, yield_),
      btnText: GF.t('retry'), btnFn: function () { startGame(true); },
    });
  }
  if (helpOpen) drawHelp(ctx);
}

function speciesColors(sp, stage) {
  if (stage === SPOILED) return { body: '#5a3a6e', hi: '#8b4fb0', dark: '#2c1838' };
  if (sp === SP_GOLD) return { body: '#caa23e', hi: '#ffe27a', dark: '#7a5e1c' };
  if (sp === SP_CRYSTAL) return { body: '#4a7fd0', hi: '#a8d8ff', dark: '#1e3a66' };
  if (sp === SP_VOLATILE) return { body: '#b0414f', hi: '#ff8aa0', dark: '#5e1c28' };
  return { body: '#8a8270', hi: '#c8bfa6', dark: '#4a4538' };
}

function drawBoard(ctx) {
  var S = GF.S;
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  roundRect(ctx, board.x - 6 * S, board.y - 6 * S, board.w + 12 * S, board.h + 12 * S, 12 * S); ctx.fill();
  ctx.strokeStyle = 'rgba(120,140,200,0.10)'; ctx.lineWidth = 1;
  for (var k = 0; k <= gridN; k++) {
    ctx.beginPath(); ctx.moveTo(board.x + k * board.cell, board.y); ctx.lineTo(board.x + k * board.cell, board.y + board.h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(board.x, board.y + k * board.cell); ctx.lineTo(board.x + board.w, board.y + k * board.cell); ctx.stroke();
  }
  for (var i = 0; i < grid.length; i++) drawCell(ctx, i);
  if (armed === 'cleanse') {
    for (var j = 0; j < grid.length; j++) {
      if (grid[j].stage === SPOILED) {
        ctx.strokeStyle = 'rgba(122,208,255,' + (0.5 + 0.4 * Math.sin(nowT * 6)) + ')';
        ctx.lineWidth = 3 * S;
        roundRect(ctx, board.x + (j % gridN) * board.cell + 3 * S, board.y + ((j / gridN) | 0) * board.cell + 3 * S, board.cell - 6 * S, board.cell - 6 * S, 8 * S);
        ctx.stroke();
      }
    }
  }
}

function drawCell(ctx, i) {
  var ce = grid[i];
  if (ce.stage === EMPTY) {
    var ex = cellCX(i), ey = cellCY(i);
    ctx.fillStyle = 'rgba(120,140,200,0.05)';
    ctx.beginPath(); ctx.arc(ex, ey, board.cell * 0.10, 0, 6.28); ctx.fill();
    return;
  }
  var S = GF.S, cx = cellCX(i), cy = cellCY(i);
  var R = board.cell * 0.40;
  var pop = 1 + ce.pop * 0.18;
  var stage = ce.stage;
  var ripePulse = stage === RIPE ? 0.5 + 0.5 * Math.sin(nowT * 5 + i) : 0;
  var col = speciesColors(ce.sp, stage);
  var grow = stage === SEED ? 0.42 + 0.18 * (ce.t / GROW_TIME) : (stage === GROW ? 0.66 + 0.2 * (ce.t / GROW_TIME) : 1);
  var rr = R * grow * pop;

  if (stage === RIPE) {
    var gc = ce.sp === SP_GOLD ? '255,210,90' : (ce.sp === SP_CRYSTAL ? '140,210,255' : (ce.sp === SP_VOLATILE ? '255,110,140' : '160,240,150'));
    var gl = ctx.createRadialGradient(cx, cy, rr * 0.4, cx, cy, rr * 2.0);
    gl.addColorStop(0, 'rgba(' + gc + ',' + (0.30 + ripePulse * 0.22) + ')');
    gl.addColorStop(1, 'rgba(' + gc + ',0)');
    ctx.fillStyle = gl; ctx.beginPath(); ctx.arc(cx, cy, rr * 2.0, 0, 6.28); ctx.fill();
  } else if (stage === SPOILED) {
    var sg = ctx.createRadialGradient(cx, cy, rr * 0.3, cx, cy, rr * 1.8);
    sg.addColorStop(0, 'rgba(155,89,255,0.28)'); sg.addColorStop(1, 'rgba(155,89,255,0)');
    ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(cx, cy, rr * 1.8, 0, 6.28); ctx.fill();
  }

  // AI sprite where its colour matches the species (gold ripe / crystal ripe /
  // any spoiled); procedural tinted rock otherwise so SP_NORMAL & SP_VOLATILE
  // keep their distinct species colour (readability HARD requirement). The
  // procedural rock is ALWAYS the fallback so a slow/404 sprite never blanks a cell.
  var spriteName = null;
  if (stage === SPOILED) spriteName = 'spoiled';
  else if (stage === RIPE && ce.sp === SP_GOLD) spriteName = 'ripe';
  else if (stage === RIPE && ce.sp === SP_CRYSTAL) spriteName = 'crystal';
  if (spriteName) {
    var ss = rr * 2.4;
    // drawSprite draws centred at (cx,cy); fallback paints the procedural rock
    // (absolute coords) so a slow/404 sprite never blanks a cell.
    GF.drawSprite(spriteName, cx, cy, ss, function () { drawRock(ctx, cx, cy, rr, col, ce, stage, ripePulse); });
    if (stage === SPOILED) {
      ctx.strokeStyle = 'rgba(255,140,255,0.85)'; ctx.lineWidth = 2.2 * S;
      ctx.beginPath(); ctx.moveTo(cx - rr * 0.38, cy - rr * 0.38); ctx.lineTo(cx + rr * 0.38, cy + rr * 0.38);
      ctx.moveTo(cx + rr * 0.38, cy - rr * 0.38); ctx.lineTo(cx - rr * 0.38, cy + rr * 0.38); ctx.stroke();
    }
  } else {
    drawRock(ctx, cx, cy, rr, col, ce, stage, ripePulse);
  }

  if (ce.sp === SP_CRYSTAL && stage === RIPE && ce.crack < 1) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(cx + rr * 0.55, cy - rr * 0.55, 2.2 * S, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + rr * 0.55 + 6 * S, cy - rr * 0.55, 2.2 * S, 0, 6.28); ctx.fill();
  }
  if (ce.sp === SP_VOLATILE && (stage === RIPE || stage === GROW)) {
    ctx.strokeStyle = 'rgba(255,93,122,' + (0.4 + 0.4 * Math.sin(nowT * 7 + i)) + ')';
    ctx.lineWidth = 2 * S;
    ctx.beginPath(); ctx.arc(cx, cy, rr * 1.18, 0, 6.28); ctx.stroke();
  }
}

function drawRock(ctx, cx, cy, rr, col, ce, stage, ripePulse) {
  var S = GF.S;
  ctx.save(); ctx.translate(cx, cy);
  var seed = (ce.born * 13.0 + cx * 0.7) % 6.28;
  ctx.rotate(seed * 0.3 + (stage === SPOILED ? Math.sin(nowT * 1.5) * 0.04 : 0));
  var bumps = 9;
  ctx.beginPath();
  for (var a = 0; a <= bumps; a++) {
    var ang = (a / bumps) * 6.28;
    var noise = 0.82 + 0.18 * Math.sin(ang * 3 + seed) + 0.08 * Math.cos(ang * 5 + seed * 2);
    var rad = rr * noise;
    var x = Math.cos(ang) * rad, y = Math.sin(ang) * rad;
    if (a === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  var bg = ctx.createRadialGradient(-rr * 0.3, -rr * 0.35, rr * 0.2, 0, 0, rr * 1.1);
  bg.addColorStop(0, col.hi); bg.addColorStop(0.6, col.body); bg.addColorStop(1, col.dark);
  ctx.fillStyle = bg; ctx.fill();
  ctx.lineWidth = 1.5 * S; ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.stroke();
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  for (var k = 0; k < 3; k++) {
    var ca = seed * 1.7 + k * 2.1;
    ctx.beginPath(); ctx.arc(Math.cos(ca) * rr * 0.4, Math.sin(ca) * rr * 0.35, rr * (0.12 + 0.05 * k), 0, 6.28); ctx.fill();
  }
  if (stage === SPOILED) {
    ctx.fillStyle = 'rgba(176,107,255,0.85)';
    for (var o = 0; o < 4; o++) { var oa = seed + o * 1.6; ctx.beginPath(); ctx.arc(Math.cos(oa) * rr * 0.5, Math.sin(oa) * rr * 0.5, rr * 0.16, 0, 6.28); ctx.fill(); }
    ctx.strokeStyle = 'rgba(255,140,255,0.9)'; ctx.lineWidth = 2.4 * S;
    ctx.beginPath(); ctx.moveTo(-rr * 0.4, -rr * 0.4); ctx.lineTo(rr * 0.4, rr * 0.4); ctx.moveTo(rr * 0.4, -rr * 0.4); ctx.lineTo(-rr * 0.4, rr * 0.4); ctx.stroke();
  } else if (stage === RIPE) {
    ctx.fillStyle = 'rgba(255,255,255,' + (0.45 + ripePulse * 0.4) + ')';
    ctx.beginPath(); ctx.arc(-rr * 0.32, -rr * 0.34, rr * 0.22, 0, 6.28); ctx.fill();
    if (ce.sp !== SP_CRYSTAL) {
      ctx.strokeStyle = ce.sp === SP_GOLD ? 'rgba(255,240,180,0.9)' : 'rgba(190,255,190,0.85)';
      ctx.lineWidth = 1.6 * S;
      ctx.beginPath(); ctx.moveTo(-rr * 0.2, -rr * 0.5); ctx.lineTo(0, 0); ctx.lineTo(rr * 0.18, rr * 0.5); ctx.stroke();
    } else {
      // crystal facets
      ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.2 * S;
      ctx.beginPath(); ctx.moveTo(0, -rr * 0.6); ctx.lineTo(rr * 0.5, 0); ctx.lineTo(0, rr * 0.6); ctx.lineTo(-rr * 0.5, 0); ctx.closePath(); ctx.stroke();
    }
  } else if (stage === SEED || stage === GROW) {
    ctx.fillStyle = 'rgba(120,200,140,0.35)';
    ctx.beginPath(); ctx.arc(0, -rr * 0.2, rr * 0.18, 0, 6.28); ctx.fill();
  }
  ctx.restore();
}

function drawFx(ctx) {
  var S = GF.S;
  for (var p = 0; p < puffs.length; p++) {
    var pf = puffs[p], a = 1 - pf.t / pf.max;
    ctx.strokeStyle = pf.col; ctx.globalAlpha = a * 0.7; ctx.lineWidth = 2 * S;
    ctx.beginPath(); ctx.arc(pf.x, pf.y, pf.r, 0, 6.28); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  for (var r = 0; r < rings.length; r++) {
    var rg = rings[r], rt = rg.t / rg.max, rad = 20 * S + rt * 120 * S;
    ctx.strokeStyle = rg.col; ctx.globalAlpha = (1 - rt) * 0.8; ctx.lineWidth = 4 * S;
    ctx.beginPath(); ctx.arc(rg.x, rg.y, rad, 0, 6.28); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (var f = 0; f < floats.length; f++) {
    var fl = floats[f]; ctx.globalAlpha = Math.min(1, fl.life * 1.6);
    ctx.font = 'bold ' + (20 * S) + 'px Inter, system-ui, sans-serif';
    ctx.fillStyle = '#000'; ctx.fillText(fl.txt, fl.x + 1, fl.y + 1);
    ctx.fillStyle = fl.col; ctx.fillText(fl.txt, fl.x, fl.y);
  }
  ctx.globalAlpha = 1;
}

function drawComet(ctx) {
  if (cometWarn <= 0) return;
  var S = GF.S;
  var blink = 0.35 + 0.4 * Math.abs(Math.sin(nowT * 9));
  ctx.fillStyle = 'rgba(122,208,255,' + (blink * 0.35) + ')';
  if (cometKind === 'row') ctx.fillRect(board.x, board.y + cometIdx * board.cell, board.w, board.cell);
  else ctx.fillRect(board.x + cometIdx * board.cell, board.y, board.cell, board.h);
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + (22 * S) + 'px Inter, system-ui, sans-serif';
  ctx.globalAlpha = blink + 0.3;
  if (cometKind === 'row') ctx.fillText('!', board.x - 2 * S, board.y + cometIdx * board.cell + board.cell / 2);
  else ctx.fillText('!', board.x + cometIdx * board.cell + board.cell / 2, board.y - 14 * S);
  ctx.globalAlpha = 1;
}

function drawFreezeOverlay(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  ctx.fillStyle = 'rgba(120,200,255,0.10)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#8fdfff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + (16 * S) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('frozen') + ' ' + frozen.toFixed(1) + 's', GF.W / 2, board.y - 26 * S);
}

// ── HUD ──────────────────────────────────────────────────────────────────
function drawHUD(ctx) {
  var W = GF.W, S = GF.S, pad = 14 * S;
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.font = 'bold ' + (22 * S) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#aef5b0';
  ctx.fillText(GF.t('score') + ': ' + yield_, pad, 12 * S);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffd75e';
  ctx.fillText(GF.t('wave') + ' ' + wave, W - pad, 12 * S);
  ctx.font = 'bold ' + (13 * S) + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#9aa6c8';
  ctx.fillText(GF.t('best') + ': ' + Math.max(best, yield_), W - pad, 38 * S);

  var dm = spoiledCount / SPOIL_LIMIT;
  var mw = Math.min(190 * S, W * 0.42), mh = 14 * S;
  var mx = (W - mw) / 2, my = 16 * S;
  ctx.textAlign = 'center';
  var danger = spoiledCount >= 3;
  ctx.fillStyle = danger ? ('rgba(255,80,110,' + (0.7 + 0.3 * Math.sin(nowT * 8)) + ')') : '#c98bff';
  ctx.font = 'bold ' + (13 * S) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('spoiled') + ' ' + spoiledCount + ' / ' + SPOIL_LIMIT, W / 2, my - 2 * S);
  my += 16 * S;
  ctx.fillStyle = 'rgba(255,255,255,0.10)'; roundRect(ctx, mx, my, mw, mh, mh / 2); ctx.fill();
  var fillCol = dm > 0.6 ? '#ff506e' : (dm > 0.35 ? '#ff9f43' : '#9b59ff');
  ctx.fillStyle = fillCol; roundRect(ctx, mx, my, Math.max(mh, mw * dm), mh, mh / 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1;
  for (var t = 1; t < SPOIL_LIMIT; t++) { var tx = mx + mw * (t / SPOIL_LIMIT); ctx.beginPath(); ctx.moveTo(tx, my); ctx.lineTo(tx, my + mh); ctx.stroke(); }

  var need = waveTarget(wave), prev = waveTarget(wave - 1);
  var prog = need > prev ? (yield_ - prev) / (need - prev) : 0;
  prog = GF.clamp(prog, 0, 1);
  var pw = Math.min(260 * S, W - pad * 2), ph = 7 * S;
  var pxx = (W - pw) / 2, pyy = my + mh + 10 * S;
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; roundRect(ctx, pxx, pyy, pw, ph, ph / 2); ctx.fill();
  ctx.fillStyle = '#5ad0a0'; roundRect(ctx, pxx, pyy, Math.max(ph, pw * prog), ph, ph / 2); ctx.fill();
  ctx.fillStyle = '#7f8aa8'; ctx.font = (11 * S) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('nextAt') + ' ' + need, W / 2, pyy + ph + 3 * S);

  if (combo >= 1 && comboT > 0) {
    ctx.fillStyle = 'rgba(255,215,94,' + Math.min(1, comboT / COMBO_WINDOW) + ')';
    ctx.font = 'bold ' + (15 * S) + 'px Inter, system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('x' + comboMult() + ' ' + GF.t('combo'), pad, 40 * S);
  }
}

function drawTools(ctx) {
  var S = GF.S;
  for (var b = 0; b < toolBtns.length; b++) {
    var t = toolBtns[b];
    var label = '', count = -1, enabled = true, col = '#1c2f4a', icon = null;
    if (t.id === 'cleanse') { label = GF.t('cleanse'); count = cleanseCharges; enabled = cleanseCharges > 0; col = armed === 'cleanse' ? '#1f6fa0' : '#1c2f4a'; icon = 'cleanse'; }
    else if (t.id === 'freeze') { label = GF.t('freeze'); count = freezeCharges; enabled = freezeCharges > 0 && frozen <= 0; col = frozen > 0 ? '#16465e' : '#1c2f4a'; icon = 'freeze'; }
    else if (t.id === 'help') { icon = 'help'; col = '#222a44'; }
    else if (t.id === 'mute') { icon = 'mute'; col = '#222a44'; }

    ctx.globalAlpha = (enabled || t.id === 'help' || t.id === 'mute') ? 1 : 0.45;
    ctx.fillStyle = col;
    roundRect(ctx, t.x, t.y, t.w, t.h, 10 * S); ctx.fill();
    ctx.strokeStyle = (t.id === 'cleanse' && armed === 'cleanse') ? '#7ad0ff' : 'rgba(255,255,255,0.10)';
    ctx.lineWidth = (t.id === 'cleanse' && armed === 'cleanse') ? 2.5 * S : 1;
    roundRect(ctx, t.x, t.y, t.w, t.h, 10 * S); ctx.stroke();

    var icx = t.x + (label ? 20 * S : t.w / 2), icy = t.y + t.h / 2;
    drawToolIcon(ctx, icon, icx, icy, 12 * S, t.id === 'mute' ? GF.muted : false);

    if (label) {
      ctx.fillStyle = '#dfe6f5'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + (15 * S) + 'px Inter, system-ui, sans-serif';
      ctx.fillText(label, t.x + 38 * S, t.y + t.h / 2 - 1 * S);
      if (count >= 0) {
        ctx.fillStyle = count > 0 ? '#ffd75e' : '#6a7390';
        ctx.textAlign = 'right'; ctx.font = 'bold ' + (16 * S) + 'px Inter, system-ui, sans-serif';
        ctx.fillText('x' + count, t.x + t.w - 10 * S, t.y + t.h / 2 - 1 * S);
      }
    }
    ctx.globalAlpha = 1;
  }
}

function drawToolIcon(ctx, kind, x, y, r, muted) {
  var S = GF.S;
  ctx.save(); ctx.translate(x, y);
  if (kind === 'cleanse') {
    ctx.fillStyle = '#7ad0ff';
    ctx.beginPath();
    for (var i = 0; i < 8; i++) { var ang = i / 8 * 6.28; var rad = i % 2 === 0 ? r : r * 0.4; ctx.lineTo(Math.cos(ang) * rad, Math.sin(ang) * rad); }
    ctx.closePath(); ctx.fill();
  } else if (kind === 'freeze') {
    ctx.strokeStyle = '#9ad8ff'; ctx.lineWidth = 2 * S;
    for (var a = 0; a < 3; a++) { var an = a / 3 * Math.PI; ctx.beginPath(); ctx.moveTo(-Math.cos(an) * r, -Math.sin(an) * r); ctx.lineTo(Math.cos(an) * r, Math.sin(an) * r); ctx.stroke(); }
  } else if (kind === 'help') {
    ctx.fillStyle = '#cfe'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + (20 * S) + 'px Inter, system-ui, sans-serif';
    ctx.fillText('?', 0, 1 * S);
  } else if (kind === 'mute') {
    GF.drawMuteIcon(ctx, 0, 0, r, muted);
  }
  ctx.restore();
}

function drawBanner(ctx) {
  if (bannerT <= 0) return;
  var S = GF.S, W = GF.W;
  var a = Math.min(1, bannerT / 0.5);
  var y = board.y + board.h * 0.5;
  ctx.globalAlpha = a;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + (22 * S) + 'px Inter, system-ui, sans-serif';
  var tw = ctx.measureText(bannerText).width + 36 * S;
  ctx.fillStyle = 'rgba(8,8,20,0.86)'; roundRect(ctx, W / 2 - tw / 2, y - 24 * S, tw, 48 * S, 12 * S); ctx.fill();
  ctx.strokeStyle = 'rgba(255,215,94,0.5)'; ctx.lineWidth = 1.5 * S; roundRect(ctx, W / 2 - tw / 2, y - 24 * S, tw, 48 * S, 12 * S); ctx.stroke();
  ctx.fillStyle = '#ffe27a'; ctx.fillText(bannerText, W / 2, y);
  ctx.globalAlpha = 1;
}

// ── COACH (interactive tutorial over live play) ──────────────────────────
function drawCoach(ctx) {
  if (coachStep < 0) return;
  var S = GF.S, W = GF.W;
  var msg = coachStep === 0 ? GF.t('coach_harvest')
    : coachStep === 1 ? GF.t('coach_rot')
    : coachStep === 2 ? GF.t('coach_tools')
    : GF.t('coach_go');
  var by = toolBtns.length ? toolBtns[0].y - 16 * S : GF.H - 100 * S;
  var lines = wrapText(ctx, msg, W - 60 * S, 'bold ' + (15 * S) + 'px Inter, system-ui, sans-serif');
  var bh = lines.length * 19 * S + 18 * S;
  var ty = by - bh;
  ctx.fillStyle = 'rgba(10,12,26,0.92)';
  roundRect(ctx, 18 * S, ty, W - 36 * S, bh, 12 * S); ctx.fill();
  ctx.strokeStyle = 'rgba(122,208,255,0.5)'; ctx.lineWidth = 1.5 * S;
  roundRect(ctx, 18 * S, ty, W - 36 * S, bh, 12 * S); ctx.stroke();
  ctx.fillStyle = '#cfe6ff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + (15 * S) + 'px Inter, system-ui, sans-serif';
  for (var i = 0; i < lines.length; i++) ctx.fillText(lines[i], W / 2, ty + 9 * S + i * 19 * S);

  if (coachStep === 0) {
    for (var j = 0; j < grid.length; j++) {
      if (grid[j].stage === RIPE) {
        var px = cellCX(j), py = cellCY(j);
        ctx.strokeStyle = 'rgba(255,215,94,' + (0.5 + 0.4 * Math.sin(nowT * 6)) + ')';
        ctx.lineWidth = 3 * S;
        ctx.beginPath(); ctx.arc(px, py, board.cell * 0.5, 0, 6.28); ctx.stroke();
        break;
      }
    }
  }
}

// ── MENU ─────────────────────────────────────────────────────────────────
function drawMenu(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (Math.min(40 * S, W * 0.09)) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('title'), W / 2, H * 0.13);
  ctx.fillStyle = '#9ab'; ctx.font = (15 * S) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('sub'), W / 2, H * 0.13 + 30 * S);

  var tutY = H * 0.25;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var maxW = Math.min(W - 48 * S, 460 * S);
  var bx = (W - maxW) / 2;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd75e'; ctx.font = 'bold ' + (16 * S) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('htp_title'), W / 2, tutY);
  var yy = tutY + 24 * S;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  for (var k = 0; k < keys.length; k++) {
    var wl = wrapText(ctx, GF.t(keys[k]), maxW, (13 * S) + 'px Inter, system-ui, sans-serif');
    ctx.fillStyle = k === 4 ? '#9ad8ff' : '#c5cee0';
    for (var w = 0; w < wl.length; w++) { ctx.fillText(wl[w], bx, yy); yy += 17 * S; }
    yy += 5 * S;
  }
  GF.drawOverlay({ title: '', btnText: GF.t('play'), btnFn: onPlay, bestText: best > 0 ? GF.t('best') + ': ' + best : null });
}

function onPlay() {
  var first = !seenTut;
  startGame(true);
  if (first) { coachStep = 0; coachT = 0; }
  commitSeenTut();
}

function commitSeenTut() {
  if (!seenTut) { seenTut = true; try { localStorage.setItem('asteroid_farm_seen_tutorial', '1'); } catch (e) {} }
}

// ── HELP PANEL (? button) ────────────────────────────────────────────────
function drawHelp(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  ctx.fillStyle = 'rgba(4,4,12,0.88)'; ctx.fillRect(0, 0, W, H);
  var maxW = Math.min(W - 48 * S, 460 * S);
  var bx = (W - maxW) / 2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#ffd75e'; ctx.font = 'bold ' + (22 * S) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('htp_title'), W / 2, H * 0.18);
  var yy = H * 0.18 + 38 * S;
  ctx.textAlign = 'left';
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  for (var k = 0; k < keys.length; k++) {
    var wl = wrapText(ctx, GF.t(keys[k]), maxW, (15 * S) + 'px Inter, system-ui, sans-serif');
    ctx.fillStyle = k === 4 ? '#9ad8ff' : '#dfe6f5';
    ctx.font = (15 * S) + 'px Inter, system-ui, sans-serif';
    for (var w = 0; w < wl.length; w++) { ctx.fillText(wl[w], bx, yy); yy += 21 * S; }
    yy += 8 * S;
  }
  ctx.textAlign = 'center'; ctx.fillStyle = '#7ad0ff';
  ctx.font = 'bold ' + (16 * S) + 'px Inter, system-ui, sans-serif';
  ctx.fillText('- ' + GF.t('close') + ' -', W / 2, yy + 10 * S);
}

// ── UTIL ─────────────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}
function wrapText(ctx, text, maxW, font) {
  if (font) ctx.font = font;
  var words = text.split(' '), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var test = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = test;
  }
  if (cur) lines.push(cur);
  return lines;
}

// ── SCREENSHOT / TEST HOOKS ──────────────────────────────────────────────
window._setupForScreenshot = function (level) {
  window._silent = true; seenTut = true; helpOpen = false; coachStep = -1;
  var lv = level || 4;
  startGame(false);
  wave = Math.min(7, 2 + lv);
  spoilAfter = Math.max(SPOIL_AFTER_MIN, SPOIL_AFTER - (wave - 1) * 0.28);
  tickLen = Math.max(TICK_MIN, TICK - (wave - 1) * 0.045);
  if (wave >= 5) { newGrid(7); }
  else if (wave >= 3) { newGrid(6); }
  for (var z = 0; z < grid.length; z++) plant(grid[z], false);
  layout();
  yield_ = 60 + lv * 25; harvests = 14; cleanseCharges = 2; freezeCharges = 1;
  combo = 3; comboT = COMBO_WINDOW; spoiledCount = 0;
  var order = []; for (var i = 0; i < grid.length; i++) order.push(i); shuffle(order);
  var pi = 0;
  function setCell(stage, sp) { var ce = grid[order[pi++]]; ce.stage = stage; ce.sp = sp; ce.ripeT = stage === RIPE ? ripeWindow(ce) * 0.4 : 0; ce.t = 0; ce.crack = (sp === SP_CRYSTAL && Math.random() < 0.5) ? 1 : 0; ce.born = nowT + Math.random() * 6; return ce; }
  setCell(RIPE, SP_GOLD); setCell(RIPE, SP_GOLD);
  setCell(RIPE, SP_NORMAL); setCell(RIPE, SP_NORMAL); setCell(RIPE, SP_NORMAL);
  setCell(RIPE, SP_CRYSTAL); setCell(RIPE, SP_CRYSTAL);
  if (wave >= 5) setCell(RIPE, SP_VOLATILE);
  setCell(SPOILED, SP_NORMAL); setCell(SPOILED, SP_NORMAL); setCell(SPOILED, SP_NORMAL);
  while (pi < grid.length) { var ce = grid[order[pi]]; if (ce.stage === EMPTY) { ce.stage = GROW; ce.sp = rollSpecies(); ce.t = GROW_TIME * 0.6; ce.born = nowT + 1; } pi++; }
  recomputeSpoiled();
  for (var f = 0; f < 5; f++) { var ri = order[f]; GF.spawnParticles(cellCX(ri), cellCY(ri), '#ffd75e', 8); }
  spawnFloat(cellCX(order[0]), cellCY(order[0]) - board.cell * 0.3, '+18', '#ffd75e');
  spawnFloat(cellCX(order[2]), cellCY(order[2]) - board.cell * 0.3, '+5', '#aef5b0');
  spawnRing(board.x + board.w / 2, board.y + board.h / 2, '#ffd75e');
  if (wave >= COMET_WAVE) { cometKind = 'col'; cometIdx = (gridN / 2) | 0; cometWarn = 1.6; }
  gs = 'PLAYING';
  GF.setShake(4);
  window.__shotFreeze = true;     // hold this populated frame for the capture
};
window._jumpLevel = function (n) {
  helpOpen = false; window.__shotFreeze = false;
  if (n === 99) { if (gs !== 'PLAYING') startGame(true); spoiledCount = 5; gameOver(); return; }
  window._setupForScreenshot(n || 4);
};
window._setLang = function (l) { GF.lang = (l === 'ru' ? 'ru' : 'en'); };
window._setState = function (s) { if (s) gs = s; };
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return 'Inter, system-ui, sans-serif'; };
window.__openTut = function () { helpOpen = true; };
window.__closeTut = function () { helpOpen = false; };

// ── BOOT ─────────────────────────────────────────────────────────────────
try { best = parseInt(localStorage.getItem('asteroid_farm_best') || '0') || 0; } catch (e) {}
try { seenTut = (localStorage.getItem('asteroid_farm_seen_tutorial') === '1'); } catch (e) {}

GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'asteroid_farm',
  onReady: function () {
    layout();
    GF.persist('asteroid_farm_run_v1',
      function () {
        if (gs !== 'PLAYING') return { gs: gs, best: best };
        return {
          gs: gs, best: best, yield_: yield_, wave: wave, harvests: harvests,
          gridN: gridN, cleanseCharges: cleanseCharges, freezeCharges: freezeCharges,
          spoilAfter: spoilAfter, tickLen: tickLen,
          grid: grid.map(function (c) { return [c.stage, c.sp, +c.t.toFixed(2), +c.ripeT.toFixed(2), c.crack]; }),
        };
      },
      function (s) {
        if (!s) return;
        best = s.best || best;
        if (s.gs === 'PLAYING' && s.grid && s.grid.length) {
          yield_ = s.yield_ || 0; wave = s.wave || 1; harvests = s.harvests || 0;
          cleanseCharges = s.cleanseCharges || 0; freezeCharges = s.freezeCharges || 0;
          spoilAfter = s.spoilAfter || SPOIL_AFTER; tickLen = s.tickLen || TICK;
          gridN = s.gridN || GRID_START;
          grid = s.grid.map(function (a) { var c = mkCell(); c.stage = a[0]; c.sp = a[1]; c.t = a[2]; c.ripeT = a[3]; c.crack = a[4]; c.born = nowT + Math.random() * 6; return c; });
          recomputeSpoiled();
          gs = 'PLAYING'; layout();
        }
      }
    );
    if (gs !== 'PLAYING') gs = 'MENU';

    GF.bgMusic({ file: 'audio/bg_track.mp3', preset: 'synth', muted: GF.muted });

    if (window.__GF_AUTOSTART && !window._silent && gs !== 'PLAYING') {
      var first = !seenTut;
      startGame(true);
      if (first) { coachStep = 0; coachT = 0; }
      commitSeenTut();
    }

    GF.exposeState(function () {
      return {
        gs: gs, score: yield_, yield: yield_, best: Math.max(best, yield_),
        wave: wave, harvests: harvests, spoiledCount: spoiledCount,
        cleanseCharges: cleanseCharges, freezeCharges: freezeCharges,
        armed: armed, frozen: +frozen.toFixed(2), combo: combo, comboMult: comboMult(),
        gridN: gridN, cells: grid.length,
        ripe: grid.filter(function (c) { return c.stage === RIPE; }).length,
        growing: grid.filter(function (c) { return c.stage === GROW || c.stage === SEED; }).length,
        spoiled: spoiledCount, empty: grid.filter(function (c) { return c.stage === EMPTY; }).length,
        cometWarn: +cometWarn.toFixed(2), cometActive: cometWarn > 0,
        seenTut: seenTut, coachStep: coachStep,
        spoilAfter: +spoilAfter.toFixed(2), tickLen: +tickLen.toFixed(2),
        nextWaveAt: waveTarget(wave),
        GRID_START: GRID_START, GRID_MAX: GRID_MAX, SPOIL_LIMIT: SPOIL_LIMIT,
        TICK: TICK, TICK_MIN: TICK_MIN, SPOIL_AFTER: SPOIL_AFTER, SPOIL_AFTER_MIN: SPOIL_AFTER_MIN,
        GROW_TIME: GROW_TIME, YIELD_RIPE: YIELD_RIPE, YIELD_GOLD: YIELD_GOLD, YIELD_CRYSTAL: YIELD_CRYSTAL,
        COMBO_WINDOW: COMBO_WINDOW, COMBO_MAX: COMBO_MAX, CLEANSE_EVERY: CLEANSE_EVERY,
        FREEZE_EVERY: FREEZE_EVERY, FREEZE_SECONDS: FREEZE_SECONDS, COMET_WAVE: COMET_WAVE,
      };
    });

    GF.exposeBot(
      function () {
        if (gs === 'MENU' || gs === 'GAMEOVER') return ['start'];
        var acts = [];
        for (var i = 0; i < grid.length; i++) {
          if (grid[i].stage === RIPE) acts.push('harvest:' + ((i / gridN) | 0) + ',' + (i % gridN));
        }
        if (cleanseCharges > 0) {
          for (var j = 0; j < grid.length; j++) {
            if (grid[j].stage === SPOILED) acts.push('cleanse:' + ((j / gridN) | 0) + ',' + (j % gridN));
          }
        }
        if (freezeCharges > 0 && frozen <= 0) acts.push('freeze');
        if (!acts.length) acts.push('wait');
        return acts;
      },
      function (a) {
        if (a === 'start') { startGame(true); return; }
        if (a === 'wait') return;
        if (a === 'freeze') { doFreeze(); return; }
        var parts = a.split(':');
        var rc = (parts[1] || '0,0').split(',');
        var r = parseInt(rc[0], 10) || 0, c = parseInt(rc[1], 10) || 0;
        var i = idx(r, c);
        if (i < 0 || i >= grid.length) return;
        if (parts[0] === 'harvest') {
          if (grid[i].stage === RIPE) { harvest(i); if (grid[i].stage === RIPE && grid[i].sp === SP_CRYSTAL) harvest(i); }
        } else if (parts[0] === 'cleanse') {
          cleanseAt(i);
        }
      }
    );
  },
  onUpdate: update,
  onDraw: draw,
});

// ── YANDEX MUST-HAVES - kept (see template comment block) ─────────────────
// 1. UI text via GF.t()/STRINGS (both en+ru). 2. GF.persist save above.
// 3. Fullscreen-exit resize handled in gf-lib. 4. No auto-ads (none fired).

})();
</script>
