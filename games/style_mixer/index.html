<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── LOCALISED STRINGS ────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Style Mixer',
    sub:   'Spot the same scene in a different visual style.',
    play: 'PLAY', retry: 'TRY AGAIN', next: 'NEXT RUN',
    score: 'MATCHES', best: 'BEST',
    won: 'CHAIN COMPLETE', gameover: 'OUT OF TOKENS',
    tokens_label: 'TOKENS',
    matches_label: 'MATCHES',
    target_label: 'TARGET',
    style_label_target: 'style A',
    style_label_grid: 'style B',
    tut_goal: 'Goal: find the tile showing the same scene as the target above.',
    tut_controls: 'Controls: tap a tile in the 3 x 3 grid.',
    tut_win: 'Win: reach 20 correct matches.',
    tut_lose: 'Lose: run out of guess tokens (start with 7).',
    tut_tip: 'Tip: ignore color first — compare shapes and their positions.',
    help_btn: '?',
    close_hint: '(tap ? to close)',
  },
  ru: {
    title: 'Микшер Стилей',
    sub:   'Найдите ту же сцену в другом визуальном стиле.',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', next: 'НОВЫЙ ЗАБЕГ',
    score: 'СОВПАДЕНИЯ', best: 'РЕКОРД',
    won: 'ЦЕПЬ СОБРАНА', gameover: 'ЖЕТОНЫ КОНЧИЛИСЬ',
    tokens_label: 'ЖЕТОНЫ',
    matches_label: 'СОВП.',
    target_label: 'ЭТАЛОН',
    style_label_target: 'стиль А',
    style_label_grid: 'стиль Б',
    tut_goal: 'Цель: найдите плитку с той же сценой, что и эталон сверху.',
    tut_controls: 'Управление: нажмите плитку в сетке 3 x 3.',
    tut_win: 'Победа: наберите 20 правильных совпадений.',
    tut_lose: 'Поражение: закончились жетоны догадок (стартует 7).',
    tut_tip: 'Совет: не смотрите на цвет — сравните формы и их позиции.',
    help_btn: '?',
    close_hint: '(нажмите ? чтобы закрыть)',
  },
};

// No external sprites — everything is procedurally drawn.
var SPRITE_NAMES = [];

// ── TUNABLES (DESIGN.md commitments) ─────────────────────────────────────
var START_TOKENS       = 7;
var TARGET_MATCHES     = 20;
var TOKEN_REWARD_EVERY = 5;
var GRID_COLS          = 3;
var GRID_ROWS          = 3;
var NUM_STYLES         = 6;
var SCENE_PRIMITIVES   = 4;
var PALETTES_COUNT     = 8;
var FEEDBACK_FLASH_MS  = 420;

// ── PALETTES & STYLES ────────────────────────────────────────────────────
var PALETTES = [
  ['#ff6b9d', '#4dd0e1', '#ffd166', '#06d6a0'],
  ['#f72585', '#7209b7', '#3a0ca3', '#4cc9f0'],
  ['#ff9f1c', '#ffbf69', '#cbf3f0', '#2ec4b6'],
  ['#e63946', '#f1faee', '#a8dadc', '#457b9d'],
  ['#2a9d8f', '#e9c46a', '#f4a261', '#e76f51'],
  ['#9b5de5', '#f15bb5', '#fee440', '#00bbf9'],
  ['#dad7cd', '#a3b18a', '#588157', '#3a5a40'],
  ['#ffafcc', '#bde0fe', '#a2d2ff', '#cdb4db'],
];
var STYLES = ['pixel', 'neon', 'flat', 'sketch', 'watercolor', 'iso'];

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU'; // MENU | PLAYING | GAMEOVER | WON
var matches = 0;
var tokens = START_TOKENS;
var best = 0;
var targetScene = null;
var candidates = [];     // 9 scenes
var matchIndex = 0;      // index in candidates that matches the target
var targetStyle = 0;
var gridStyle = 0;
var roundSeed = 0;
var flash = { until: 0, ok: false, idx: -1 };
var showTutorial = false;
var helpBtn = null;
var tileRects = [];

// ── SEEDED RNG ───────────────────────────────────────────────────────────
function mulberry32(s) {
  return function() {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    var t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ── SCENE GENERATION ─────────────────────────────────────────────────────
// A "scene" is an array of N primitives with normalised coords (0..1).
function makeScene(rng, paletteIdx) {
  var palette = PALETTES[paletteIdx % PALETTES.length];
  var prims = [];
  var kinds = ['rect', 'circle', 'triangle', 'line'];
  for (var i = 0; i < SCENE_PRIMITIVES; i++) {
    var k = kinds[Math.floor(rng() * kinds.length)];
    var col = palette[i % palette.length];
    var x = 0.15 + rng() * 0.70;
    var y = 0.15 + rng() * 0.70;
    var sz = 0.18 + rng() * 0.26;
    var rot = rng() * Math.PI;
    prims.push({ kind: k, x: x, y: y, sz: sz, rot: rot, color: col });
  }
  return { prims: prims, paletteIdx: paletteIdx };
}

// Decoy: same primitive count but DIFFERENT shapes/positions OR
// different palette. Should NOT be identical to target under any rotation.
function makeDecoy(rng, paletteIdx, targetScene) {
  // Roll a fresh scene — by virtue of independent RNG draws it diverges.
  var s = makeScene(rng, paletteIdx);
  // Cheap sanity: if too similar, perturb one primitive.
  if (sceneSig(s) === sceneSig(targetScene)) {
    s.prims[0].x = (s.prims[0].x + 0.31) % 0.85 + 0.10;
  }
  return s;
}

function sceneSig(s) {
  // Lightweight signature ignoring color: kinds + rough positions.
  var sig = '';
  for (var i = 0; i < s.prims.length; i++) {
    var p = s.prims[i];
    sig += p.kind + (p.x*10|0) + (p.y*10|0) + (p.sz*10|0) + ';';
  }
  return sig;
}

function pickTwoDifferentStyles(rng) {
  var a = Math.floor(rng() * NUM_STYLES);
  var b = Math.floor(rng() * (NUM_STYLES - 1));
  if (b >= a) b++;
  return [a, b];
}

function newRound() {
  roundSeed = (roundSeed + 1) | 0;
  // Use matches+1 as a varying seed so rounds shuffle.
  var seed = (Date.now() & 0xffff) ^ (matches * 9973) ^ (roundSeed * 1117);
  var rng = mulberry32(seed);
  var styles = pickTwoDifferentStyles(rng);
  targetStyle = styles[0];
  gridStyle   = styles[1];
  var palIdx  = Math.floor(rng() * PALETTES_COUNT);
  targetScene = makeScene(rng, palIdx);
  candidates = [];
  matchIndex = Math.floor(rng() * (GRID_COLS * GRID_ROWS));
  for (var i = 0; i < GRID_COLS * GRID_ROWS; i++) {
    if (i === matchIndex) {
      // Same scene rendered later in gridStyle — push the target itself.
      candidates.push({ prims: targetScene.prims, paletteIdx: targetScene.paletteIdx });
    } else {
      // Independent decoy with possibly different palette.
      var dPal = Math.floor(rng() * PALETTES_COUNT);
      candidates.push(makeDecoy(rng, dPal, targetScene));
    }
  }
  flash.until = 0;
  flash.idx = -1;
  GF.saveRun();
}

// ── STYLE RENDERERS ──────────────────────────────────────────────────────
// Each renderer draws ONE scene into a rectangle (x, y, w, h).
// They use the same primitive data, only the rendering style changes.
function clipRect(c, x, y, w, h, r) {
  c.save();
  GF.rr(c, x, y, w, h, r || 8);
  c.clip();
}

function drawScene(c, scene, style, x, y, w, h) {
  clipRect(c, x, y, w, h, Math.min(w, h) * 0.08);
  // Background per style
  paintBackground(c, style, x, y, w, h);
  // Per-style hooks transform how primitives are drawn
  for (var i = 0; i < scene.prims.length; i++) {
    var p = scene.prims[i];
    var px = x + p.x * w;
    var py = y + p.y * h;
    var psz = p.sz * Math.min(w, h);
    drawPrimStyled(c, p, style, px, py, psz);
  }
  c.restore();
  // Border
  c.strokeStyle = 'rgba(255,255,255,0.10)';
  c.lineWidth = 1;
  GF.rr(c, x + 0.5, y + 0.5, w - 1, h - 1, Math.min(w, h) * 0.08);
  c.stroke();
}

function paintBackground(c, style, x, y, w, h) {
  var name = STYLES[style];
  switch (name) {
    case 'pixel':
      c.fillStyle = '#1a1f2e'; c.fillRect(x, y, w, h);
      break;
    case 'neon':
      var g = c.createRadialGradient(x+w/2, y+h/2, 0, x+w/2, y+h/2, Math.max(w, h));
      g.addColorStop(0, '#1b0a3a'); g.addColorStop(1, '#06010f');
      c.fillStyle = g; c.fillRect(x, y, w, h);
      break;
    case 'flat':
      c.fillStyle = '#f6f5f1'; c.fillRect(x, y, w, h);
      break;
    case 'sketch':
      c.fillStyle = '#f5efe6'; c.fillRect(x, y, w, h);
      // Pencil hatching
      c.strokeStyle = 'rgba(0,0,0,0.04)';
      c.lineWidth = 1;
      for (var k = -h; k < w; k += 6) {
        c.beginPath(); c.moveTo(x + k, y); c.lineTo(x + k + h, y + h); c.stroke();
      }
      break;
    case 'watercolor':
      var wg = c.createLinearGradient(x, y, x + w, y + h);
      wg.addColorStop(0, '#fff7e3'); wg.addColorStop(1, '#cde7e0');
      c.fillStyle = wg; c.fillRect(x, y, w, h);
      break;
    case 'iso':
      c.fillStyle = '#2b3046'; c.fillRect(x, y, w, h);
      c.strokeStyle = 'rgba(255,255,255,0.06)';
      c.lineWidth = 1;
      for (var ix = -h; ix < w + h; ix += 14) {
        c.beginPath(); c.moveTo(x + ix, y); c.lineTo(x + ix + h, y + h); c.stroke();
      }
      break;
    default:
      c.fillStyle = '#222'; c.fillRect(x, y, w, h);
  }
}

function drawPrimStyled(c, prim, style, px, py, psz) {
  var name = STYLES[style];
  c.save();
  c.translate(px, py);
  c.rotate(prim.rot);
  var col = prim.color;
  switch (name) {
    case 'pixel':
      pixelPaint(c, prim.kind, psz, col);
      break;
    case 'neon':
      neonPaint(c, prim.kind, psz, col);
      break;
    case 'flat':
      flatPaint(c, prim.kind, psz, col);
      break;
    case 'sketch':
      sketchPaint(c, prim.kind, psz, col);
      break;
    case 'watercolor':
      waterPaint(c, prim.kind, psz, col);
      break;
    case 'iso':
      isoPaint(c, prim.kind, psz, col);
      break;
  }
  c.restore();
}

function rawShapePath(c, kind, s) {
  c.beginPath();
  switch (kind) {
    case 'rect':
      c.rect(-s/2, -s/2, s, s); break;
    case 'circle':
      c.arc(0, 0, s/2, 0, Math.PI*2); break;
    case 'triangle':
      c.moveTo(0, -s/2);
      c.lineTo(s/2, s/2);
      c.lineTo(-s/2, s/2);
      c.closePath();
      break;
    case 'line':
      // Thick capsule: rect with rounded ends approximated by two arcs
      c.moveTo(-s/2, 0);
      c.lineTo(s/2, 0);
      break;
  }
}

function pixelPaint(c, kind, s, col) {
  // Quantise via step grid
  var step = Math.max(3, s / 8) | 0;
  c.fillStyle = col;
  // For non-line primitives, draw as small blocks inside the path
  if (kind === 'line') {
    c.strokeStyle = col;
    c.lineWidth = Math.max(2, step);
    c.lineCap = 'butt';
    c.beginPath(); c.moveTo(-s/2, 0); c.lineTo(s/2, 0); c.stroke();
    return;
  }
  for (var yy = -s/2; yy < s/2; yy += step) {
    for (var xx = -s/2; xx < s/2; xx += step) {
      // Inclusion test by shape
      var cx = xx + step/2, cy = yy + step/2;
      var inside = false;
      if (kind === 'rect') inside = true;
      else if (kind === 'circle') inside = (cx*cx + cy*cy) <= (s*s/4);
      else if (kind === 'triangle') {
        // Same triangle as path
        var ty = -s/2, by = s/2;
        if (cy >= ty && cy <= by) {
          var t = (cy - ty) / (by - ty);
          var halfW = (s/2) * t;
          inside = Math.abs(cx) <= halfW;
        }
      }
      if (inside) c.fillRect(xx, yy, step - 1, step - 1);
    }
  }
}

function neonPaint(c, kind, s, col) {
  c.shadowColor = col;
  c.shadowBlur = Math.max(8, s * 0.35);
  c.strokeStyle = col;
  c.lineWidth = Math.max(2, s * 0.08);
  c.lineJoin = 'round';
  if (kind === 'line') {
    c.beginPath(); c.moveTo(-s/2, 0); c.lineTo(s/2, 0); c.stroke();
  } else {
    rawShapePath(c, kind, s);
    c.stroke();
  }
  c.shadowBlur = 0;
}

function flatPaint(c, kind, s, col) {
  c.fillStyle = col;
  c.strokeStyle = '#222';
  c.lineWidth = Math.max(1, s * 0.05);
  if (kind === 'line') {
    c.strokeStyle = col; c.lineWidth = Math.max(2, s * 0.16); c.lineCap = 'round';
    c.beginPath(); c.moveTo(-s/2, 0); c.lineTo(s/2, 0); c.stroke();
    return;
  }
  rawShapePath(c, kind, s);
  c.fill();
  c.stroke();
}

function sketchPaint(c, kind, s, col) {
  c.strokeStyle = col;
  c.lineWidth = Math.max(1, s * 0.04);
  c.lineCap = 'round';
  // Multi-pass jittered strokes
  for (var p = 0; p < 3; p++) {
    c.save();
    c.translate((p - 1) * 0.6, (p - 1) * 0.6);
    if (kind === 'line') {
      c.beginPath(); c.moveTo(-s/2, 0); c.lineTo(s/2, 0); c.stroke();
    } else {
      rawShapePath(c, kind, s);
      c.stroke();
    }
    c.restore();
  }
  // Light hatching fill inside
  if (kind !== 'line') {
    c.save();
    rawShapePath(c, kind, s);
    c.clip();
    c.strokeStyle = col;
    c.globalAlpha = 0.35;
    c.lineWidth = 1;
    for (var hh = -s; hh < s; hh += 3) {
      c.beginPath(); c.moveTo(-s, hh); c.lineTo(s, hh + s); c.stroke();
    }
    c.restore();
  }
}

function waterPaint(c, kind, s, col) {
  c.globalAlpha = 0.55;
  c.fillStyle = col;
  if (kind === 'line') {
    c.strokeStyle = col; c.lineWidth = Math.max(3, s * 0.20); c.lineCap = 'round';
    c.beginPath(); c.moveTo(-s/2, 0); c.lineTo(s/2, 0); c.stroke();
    c.globalAlpha = 1; return;
  }
  // Soft outer wash
  c.shadowColor = col; c.shadowBlur = Math.max(4, s * 0.3);
  rawShapePath(c, kind, s); c.fill();
  c.shadowBlur = 0;
  // Inner darker center
  c.globalAlpha = 0.45;
  c.save();
  c.scale(0.7, 0.7);
  rawShapePath(c, kind, s); c.fill();
  c.restore();
  c.globalAlpha = 1;
}

function isoPaint(c, kind, s, col) {
  // Squash vertically, draw 3D-ish bevel
  c.save();
  c.scale(1, 0.55);
  c.fillStyle = col;
  if (kind === 'line') {
    c.strokeStyle = col; c.lineWidth = Math.max(2, s * 0.20); c.lineCap = 'round';
    c.beginPath(); c.moveTo(-s/2, 0); c.lineTo(s/2, 0); c.stroke();
    c.restore(); return;
  }
  // Top face
  rawShapePath(c, kind, s);
  c.fill();
  c.restore();
  // Side wall (darker, shifted)
  c.save();
  c.translate(0, s * 0.10);
  c.scale(1, 0.55);
  c.globalAlpha = 0.5;
  c.fillStyle = '#000';
  rawShapePath(c, kind, s);
  c.fill();
  c.restore();
  // Outline
  c.save();
  c.scale(1, 0.55);
  c.strokeStyle = 'rgba(255,255,255,0.55)';
  c.lineWidth = Math.max(1, s * 0.03);
  rawShapePath(c, kind, s);
  c.stroke();
  c.restore();
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  showTutorial = false;
  try { localStorage.setItem('style_mixer_seen_tutorial', '1'); } catch (e) {}
  matches = 0;
  tokens = START_TOKENS;
  gs = 'PLAYING';
  newRound();
  GF.gameStarted();
  GF.saveRun();
}
function gameWon() {
  if (matches > best) {
    best = matches;
    try { localStorage.setItem('style_mixer_best', best); } catch (e) {}
  }
  gs = 'WON';
  GF.spawnParticles(GF.cx, GF.cy, '#06d6a0', 30);
  GF.setShake(0.35);
  GF.gameEnded();
  GF.saveRun();
}
function gameOver() {
  if (matches > best) {
    best = matches;
    try { localStorage.setItem('style_mixer_best', best); } catch (e) {}
  }
  gs = 'GAMEOVER';
  GF.spawnParticles(GF.cx, GF.cy, '#e74c3c', 24);
  GF.setShake(0.4);
  GF.gameEnded();
  GF.saveRun();
}

function onPick(idx) {
  if (gs !== 'PLAYING') return;
  if (flash.until > performance.now()) return; // mid-feedback
  if (idx === matchIndex) {
    matches++;
    if (matches > 0 && matches % TOKEN_REWARD_EVERY === 0 && tokens < START_TOKENS) {
      tokens++;
      GF.spawnFloat(GF.cx, GF.cy + 30 * GF.S, '+1 ' + GF.t('tokens_label'), '#06d6a0');
    }
    flash.until = performance.now() + FEEDBACK_FLASH_MS;
    flash.ok = true; flash.idx = idx;
    var rect = tileRects[idx];
    if (rect) GF.spawnParticles(rect.x + rect.w/2, rect.y + rect.h/2, '#06d6a0', 14);
    if (matches >= TARGET_MATCHES) {
      setTimeout(gameWon, FEEDBACK_FLASH_MS);
    } else {
      setTimeout(function() { if (gs === 'PLAYING') newRound(); }, FEEDBACK_FLASH_MS);
    }
  } else {
    tokens--;
    flash.until = performance.now() + FEEDBACK_FLASH_MS;
    flash.ok = false; flash.idx = idx;
    var rect2 = tileRects[idx];
    if (rect2) GF.spawnParticles(rect2.x + rect2.w/2, rect2.y + rect2.h/2, '#e74c3c', 14);
    GF.setShake(0.25);
    if (tokens <= 0) {
      setTimeout(gameOver, FEEDBACK_FLASH_MS);
    }
  }
  GF.saveRun();
}

// Screenshot escape hatches
window._setupForScreenshot = function(level) {
  startGame();
  // Pre-roll a few matches to populate HUD with non-zero numbers.
  var preroll = 3 + ((level || 0) % 5);
  for (var i = 0; i < preroll; i++) {
    matches++;
    newRound();
  }
  flash.until = 0;
  gs = 'PLAYING';
};
window._jumpLevel = function(n) {
  n = n || 1;
  if (n >= 50) {
    // Force terminal state for runtime gate
    startGame();
    tokens = 0;
    gameOver();
    return;
  }
  window._setupForScreenshot(n);
};

// ── INPUT ────────────────────────────────────────────────────────────────
function handleTap(x, y) {
  // Help button always wins
  if (helpBtn && x >= helpBtn.x && x <= helpBtn.x + helpBtn.w &&
      y >= helpBtn.y && y <= helpBtn.y + helpBtn.h) {
    showTutorial = !showTutorial;
    return;
  }
  if (showTutorial) { showTutorial = false; return; }
  if (gs === 'MENU') {
    var b = GF._menuBtn;
    if (b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
      startGame();
    }
    return;
  }
  if (gs === 'PLAYING') {
    for (var i = 0; i < tileRects.length; i++) {
      var r = tileRects[i];
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        onPick(i);
        return;
      }
    }
  }
}

GF.canvas.addEventListener('click', function(e) {
  handleTap(e.clientX, e.clientY);
});

// Touch — stationary tap only (no swipe needed)
var touchStart = { x: 0, y: 0, moved: false };
GF.canvas.addEventListener('touchstart', function(e) {
  var t = e.changedTouches[0];
  touchStart.x = t.clientX; touchStart.y = t.clientY; touchStart.moved = false;
}, { passive: true });
GF.canvas.addEventListener('touchmove', function(e) {
  var t = e.changedTouches[0];
  if (Math.abs(t.clientX - touchStart.x) > 16 || Math.abs(t.clientY - touchStart.y) > 16) {
    touchStart.moved = true;
  }
}, { passive: true });
GF.canvas.addEventListener('touchend', function(e) {
  if (touchStart.moved) return;
  var t = e.changedTouches[0];
  if (t) handleTap(t.clientX, t.clientY);
});

document.addEventListener('keydown', function(e) {
  if (gs === 'MENU' && (e.code === 'Space' || e.code === 'Enter')) startGame();
  else if (gs !== 'PLAYING' && (e.code === 'Space' || e.code === 'Enter')) startGame();
  if (e.code === 'Slash' || e.code === 'KeyH') showTutorial = !showTutorial;
  // Screenshot-tool friendly: arrow keys in PLAYING advance to a new round
  // (no scoring side-effect) so screenshots between shots look different.
  if (gs === 'PLAYING' && (
      e.code === 'ArrowLeft' || e.code === 'ArrowRight' ||
      e.code === 'ArrowUp'   || e.code === 'ArrowDown')) {
    flash.until = 0; flash.idx = -1;
    newRound();
  }
});

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  // No per-frame world updates — turn-based.
}

// ── LAYOUT ───────────────────────────────────────────────────────────────
function computeLayout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var pad = Math.max(10, 14 * S);
  var hudH = Math.max(54, 64 * S);
  var availH = H - hudH - pad;
  // Target panel takes ~28% of available height, grid takes the rest.
  var targetH = Math.max(110, availH * 0.32);
  var targetY = hudH + pad / 2;
  var targetW = Math.min(W - 2 * pad, targetH * 1.4);
  var targetX = (W - targetW) / 2;
  var gridTopY = targetY + targetH + pad * 1.2;
  var gridBottomPad = pad;
  var gridAvailH = H - gridTopY - gridBottomPad;
  var gridSize = Math.min(W - 2 * pad, gridAvailH);
  var gridX = (W - gridSize) / 2;
  var gridY = gridTopY + (gridAvailH - gridSize) / 2;
  var cellGap = Math.max(6, 10 * S);
  var cellW = (gridSize - cellGap * (GRID_COLS - 1)) / GRID_COLS;
  var cellH = (gridSize - cellGap * (GRID_ROWS - 1)) / GRID_ROWS;
  return {
    targetX: targetX, targetY: targetY, targetW: targetW, targetH: targetH,
    gridX: gridX, gridY: gridY, gridSize: gridSize, cellW: cellW, cellH: cellH,
    cellGap: cellGap, hudH: hudH, pad: pad,
  };
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function drawBackground(ctx) {
  var grad = ctx.createLinearGradient(0, 0, 0, GF.H);
  grad.addColorStop(0, '#0e1224');
  grad.addColorStop(1, '#070912');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GF.W, GF.H);
}

function drawHUD(ctx) {
  var fs = GF.clamp(16 * GF.S, 12, 22);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = (tokens <= 2) ? '#e74c3c' : '#fff';
  ctx.fillText(GF.t('tokens_label') + ': ' + tokens + '/' + START_TOKENS, 12 * GF.S, 12 * GF.S);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('matches_label') + ': ' + matches + '/' + TARGET_MATCHES, GF.cx, 12 * GF.S);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#9bb';
  ctx.fillText(GF.t('best') + ': ' + best, GF.W - 12 * GF.S, 12 * GF.S);

  // Token pips (visual)
  var pipR = Math.max(3, 5 * GF.S);
  var py = 12 * GF.S + fs + 8 * GF.S;
  for (var i = 0; i < START_TOKENS; i++) {
    var px = 14 * GF.S + i * (pipR * 2 + 4 * GF.S);
    ctx.beginPath();
    ctx.arc(px, py, pipR, 0, Math.PI * 2);
    ctx.fillStyle = (i < tokens) ? '#ffd166' : 'rgba(255,255,255,0.10)';
    ctx.fill();
  }

  // Help button
  var btnS = GF.clamp(34 * GF.S, 28, 44);
  helpBtn = { x: GF.W - btnS - 10 * GF.S, y: GF.H - btnS - 10 * GF.S, w: btnS, h: btnS };
  ctx.fillStyle = 'rgba(40,50,80,0.85)';
  GF.rr(ctx, helpBtn.x, helpBtn.y, btnS, btnS, btnS / 2);
  ctx.fill();
  ctx.strokeStyle = '#4dd0e1'; ctx.lineWidth = 2;
  GF.rr(ctx, helpBtn.x, helpBtn.y, btnS, btnS, btnS / 2);
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (btnS * 0.55) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('help_btn'), helpBtn.x + btnS / 2, helpBtn.y + btnS / 2);
}

function drawPlayfield(ctx) {
  var L = computeLayout();
  // Target label
  ctx.fillStyle = '#7787a6';
  ctx.font = 'bold ' + GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText(GF.t('target_label') + ' — ' + GF.t('style_label_target'),
               L.targetX + L.targetW / 2, L.targetY - 4 * GF.S);
  // Target scene
  drawScene(ctx, targetScene, targetStyle, L.targetX, L.targetY, L.targetW, L.targetH);
  // Grid label
  ctx.fillStyle = '#7787a6';
  ctx.font = 'bold ' + GF.clamp(11 * GF.S, 9, 14) + 'px sans-serif';
  ctx.fillText(GF.t('style_label_grid'),
               GF.cx, L.gridY - 4 * GF.S);
  // 3x3 candidates
  tileRects = [];
  for (var r = 0; r < GRID_ROWS; r++) {
    for (var col = 0; col < GRID_COLS; col++) {
      var i = r * GRID_COLS + col;
      var x = L.gridX + col * (L.cellW + L.cellGap);
      var y = L.gridY + r * (L.cellH + L.cellGap);
      tileRects.push({ x: x, y: y, w: L.cellW, h: L.cellH });
      drawScene(ctx, candidates[i], gridStyle, x, y, L.cellW, L.cellH);
      // Feedback flash on picked tile
      if (flash.until > performance.now() && flash.idx === i) {
        ctx.save();
        var aMs = flash.until - performance.now();
        var a = GF.clamp(aMs / FEEDBACK_FLASH_MS, 0, 1);
        ctx.globalAlpha = a * 0.55;
        ctx.fillStyle = flash.ok ? '#06d6a0' : '#e74c3c';
        GF.rr(ctx, x, y, L.cellW, L.cellH, Math.min(L.cellW, L.cellH) * 0.08);
        ctx.fill();
        ctx.restore();
        // Strong border too
        ctx.save();
        ctx.globalAlpha = a;
        ctx.strokeStyle = flash.ok ? '#06d6a0' : '#e74c3c';
        ctx.lineWidth = 3;
        GF.rr(ctx, x + 1.5, y + 1.5, L.cellW - 3, L.cellH - 3, Math.min(L.cellW, L.cellH) * 0.08);
        ctx.stroke();
        ctx.restore();
      }
    }
  }
}

function wrapTextLines(c, text, maxW) {
  var words = String(text).split(/\s+/);
  var line = '', lines = [];
  for (var i = 0; i < words.length; i++) {
    var probe = line ? line + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && line) { lines.push(line); line = words[i]; }
    else line = probe;
  }
  if (line) lines.push(line);
  return lines;
}

function drawTutorialPanel(ctx) {
  ctx.fillStyle = 'rgba(8,10,20,0.94)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var fs = GF.clamp(15 * GF.S, 12, 19);
  var lineH = fs * 1.45;
  var maxW = GF.W - 40 * GF.S;
  var items = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  ctx.font = fs + 'px sans-serif';
  var allLines = [];
  for (var i = 0; i < items.length; i++) {
    var wrapped = wrapTextLines(ctx, items[i], maxW);
    for (var j = 0; j < wrapped.length; j++) allLines.push(wrapped[j]);
    allLines.push('');
  }
  var titleFs = GF.clamp(24 * GF.S, 18, 32);
  var totalH = lineH * allLines.length + titleFs + 24 * GF.S;
  var startY = GF.cy - totalH / 2;
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillText(GF.t('title'), GF.cx, startY);
  ctx.font = fs + 'px sans-serif';
  ctx.fillStyle = '#cdd';
  for (var k = 0; k < allLines.length; k++) {
    ctx.fillText(allLines[k], GF.cx, startY + titleFs + 24 * GF.S + k * lineH);
  }
  ctx.fillStyle = '#9ab';
  ctx.font = GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
  ctx.fillText(GF.t('close_hint'), GF.cx, startY + totalH + 6 * GF.S);
}

function drawMenu(ctx) {
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(34 * GF.S, 22, 52);
  var fs = GF.clamp(14 * GF.S, 11, 18);
  var lineH = fs * 1.5;
  var btnW = GF.clamp(240 * GF.S, 160, 320), btnH = GF.clamp(52 * GF.S, 40, 66);
  var btnY = GF.cy + 110 * GF.S;
  var btnX = GF.cx - btnW / 2;
  // Title with glow
  ctx.shadowColor = 'rgba(155,93,229,0.5)'; ctx.shadowBlur = 30 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t('title'), GF.cx, GF.cy - 130 * GF.S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  // Sub
  ctx.font = GF.clamp(15 * GF.S, 11, 19) + 'px sans-serif';
  ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t('sub'), GF.cx, GF.cy - 100 * GF.S);
  // Tutorial lines
  ctx.font = fs + 'px sans-serif';
  ctx.fillStyle = '#cdd';
  var maxW = GF.W - 40 * GF.S;
  var items = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  var yPos = GF.cy - 60 * GF.S;
  for (var i = 0; i < items.length; i++) {
    var lines = wrapTextLines(ctx, items[i], maxW);
    for (var j = 0; j < lines.length; j++) {
      ctx.fillText(lines[j], GF.cx, yPos);
      yPos += lineH;
    }
    yPos += 4 * GF.S;
  }
  // PLAY button — wide: bigger + animated + lifted above empty gap
  var wide = GF.W / GF.H > 1.15;
  var drawW = wide ? GF.clamp(320 * GF.S, 170, 420) : btnW;
  var drawH = wide ? GF.clamp(68 * GF.S, 44, 88) : btnH;
  // tutorial ends at yPos (updated by loop above); compute safe lifted position
  var textBlockBottom = yPos;
  var clearMargin = drawH / 2 + 16;
  var wideFloor = GF.H * 0.58;
  var drawY = wide ? Math.max(textBlockBottom + clearMargin, wideFloor) : btnY;
  var drawX = GF.cx - drawW / 2;
  // stable hit-rect at base size
  GF._menuBtn = { x: GF.cx - btnW / 2, y: drawY + (drawH - btnH) / 2, w: btnW, h: btnH };
  if (wide) {
    var _t = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000;
    var _k = Math.sin(_t * 2.2);
    var _p = 1 + 0.05 * _k;
    var pw = drawW * _p, ph = drawH * _p;
    var px = GF.cx - pw / 2, py2 = drawY + (drawH - ph) / 2;
    ctx.save();
    ctx.shadowColor = 'rgba(46,204,113,' + (0.4 + 0.28 * _k).toFixed(3) + ')';
    ctx.shadowBlur = (22 + 10 * _k) * GF.S;
    var grad = ctx.createLinearGradient(px, py2, px, py2 + ph);
    grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
    GF.rr(ctx, px, py2, pw, ph, ph / 2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.restore();
    ctx.font = 'bold ' + GF.clamp(22 * GF.S, 16, 28) + 'px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textBaseline = 'middle';
    ctx.fillText('▶ ' + GF.t('play'), GF.cx, drawY + drawH / 2);
    ctx.textBaseline = 'alphabetic';
  } else {
    var grad = ctx.createLinearGradient(drawX, drawY, drawX, drawY + drawH);
    grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
    GF.rr(ctx, drawX, drawY, drawW, drawH, drawH / 2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 24) + 'px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('play'), GF.cx, drawY + drawH / 2);
    ctx.textBaseline = 'alphabetic';
  }
  if (best > 0) {
    ctx.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
    ctx.fillStyle = '#667';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, drawY + drawH + 30 * GF.S);
  }
}

function draw(ctx) {
  drawBackground(ctx);
  if (gs === 'PLAYING' || gs === 'WON' || gs === 'GAMEOVER') {
    drawHUD(ctx);
    drawPlayfield(ctx);
    if (showTutorial) drawTutorialPanel(ctx);
  }
  if (gs === 'MENU') {
    drawMenu(ctx);
  } else if (gs === 'WON') {
    GF.drawOverlay({
      title: GF.t('won'),
      sub: GF.t('matches_label') + ': ' + matches + '/' + TARGET_MATCHES,
      sub2: GF.t('best') + ': ' + best,
      btnText: GF.t('next'),
      btnFn: startGame,
      bestText: null,
    });
  } else if (gs === 'GAMEOVER') {
    GF.drawOverlay({
      title: GF.t('gameover'),
      sub: GF.t('matches_label') + ': ' + matches,
      sub2: GF.t('best') + ': ' + best,
      btnText: GF.t('retry'),
      btnFn: startGame,
      bestText: null,
    });
  }
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'style_mixer',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('style_mixer_best') || '0') || 0; } catch (e) {}
    // Seed a round so MENU has something behind it on first paint.
    newRound();
    GF.persist('style_mixer_run_v1',
      function() {
        return { gs: gs, matches: matches, tokens: tokens, best: best };
      },
      function(s) {
        if (!s) return;
        best    = s.best    || best;
        matches = s.matches || 0;
        tokens  = (typeof s.tokens === 'number') ? s.tokens : START_TOKENS;
        // Always re-enter at MENU so a refreshed run prompts the player.
        gs = 'MENU';
      }
    );
    if (gs === 'PLAYING') gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// Expose state for runtime gate
GF.exposeState(function() {
  return {
    gs: gs,
    score: matches,
    matches: matches,
    tokens: tokens,
    best: best,
    START_TOKENS: START_TOKENS,
    TARGET_MATCHES: TARGET_MATCHES,
    TOKEN_REWARD_EVERY: TOKEN_REWARD_EVERY,
    GRID_COLS: GRID_COLS,
    GRID_ROWS: GRID_ROWS,
    NUM_STYLES: NUM_STYLES,
    SCENE_PRIMITIVES: SCENE_PRIMITIVES,
    PALETTES: PALETTES_COUNT,
    FEEDBACK_FLASH_MS: FEEDBACK_FLASH_MS,
    targetStyle: targetStyle,
    gridStyle: gridStyle,
    matchIndex: matchIndex,
  };
});

})();
</script>
