<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Merge Diner</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }

    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── LOCALISED STRINGS (Yandex 8.2.3 — both languages) ────────────────────
var STRINGS = {
  en: {
    title: 'Merge Diner',
    sub: 'Merge ingredients · serve orders · run your diner',
    play: 'PLAY', retry: 'PLAY AGAIN',
    score: 'SCORE', best: 'BEST', coins: 'COINS', free: 'free',
    order: 'ORDERS', level: 'Lv', want: 'serve', crate: 'CRATE',
    tap_crate: 'TAP', combo: 'COMBO', served: 'SERVED!', newchain: 'NEW CUISINE!',
    levelup: 'LEVEL UP!', jam: 'COUNTER JAMMED!',
    mergeUnlock: 'Merge two ingredients to take an order',
    adContinue: 'Watch Ad: Clear Counter', continued: 'Counter cleared!',
    goalLine: 'Goal: merge up to finished dishes & serve orders',
    chainsLbl: 'Cuisines', topDish: 'Best dish',
    howto: 'HOW TO PLAY',
    tut_goal: 'Goal: Merge two identical ingredients to build them into finished dishes, then serve the dish each customer order asks for to earn coins.',
    tut_controls: 'Controls: Tap a crate to drop an ingredient. Drag an item onto a matching one to merge — or tap it, then tap where to send it. Serve a finished dish onto a matching order.',
    tut_win: 'Win: Endless — chase your best coin score. Every few orders unlocks a NEW cuisine: pizza, burgers, sushi, desserts, drinks.',
    tut_lose: 'Lose: JAM — the counter fills up completely and stays full, with no room left to drop or merge.',
    tut_tip: 'Tip: Serve orders back-to-back for a Feast Combo (bigger coins) and to free up counter space before it jams.',
  },
  ru: {
    title: 'Мердж Кафе',
    sub: 'Сливай продукты · подавай заказы · веди кафе',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ',
    score: 'ОЧКИ', best: 'РЕКОРД', coins: 'МОНЕТЫ', free: 'мест',
    order: 'ЗАКАЗЫ', level: 'Ур', want: 'подай', crate: 'ЯЩИК',
    tap_crate: 'ЖМИ', combo: 'КОМБО', served: 'ГОТОВО!', newchain: 'НОВАЯ КУХНЯ!',
    levelup: 'НОВЫЙ УРОВЕНЬ!', jam: 'ПРИЛАВОК ЗАБИТ!',
    mergeUnlock: 'Слей два продукта, чтобы взять заказ',
    adContinue: 'Реклама: освободить прилавок', continued: 'Прилавок очищен!',
    goalLine: 'Цель: собирай блюда и подавай заказы',
    chainsLbl: 'Кухни', topDish: 'Лучшее блюдо',
    howto: 'КАК ИГРАТЬ',
    tut_goal: 'Цель: Сливай два одинаковых продукта, чтобы собрать готовые блюда, затем подавай блюдо по каждому заказу клиента и получай монеты.',
    tut_controls: 'Управление: Жми ящик, чтобы выпал продукт. Тащи продукт на такой же, чтобы слить — или нажми на него, затем на нужную клетку. Подай готовое блюдо на подходящий заказ.',
    tut_win: 'Победа: Бесконечно — бей рекорд монет. Каждые несколько заказов открывают НОВУЮ кухню: пицца, бургеры, суши, десерты, напитки.',
    tut_lose: 'Поражение: ЗАТОР — прилавок полностью забит и остаётся забитым, класть и сливать негде.',
    tut_tip: 'Совет: Подавай заказы подряд ради Комбо Пира (больше монет) и чтобы освободить место на прилавке до затора.',
  },
};

// ── CUISINE CHAINS — themed merge ladders (tier 0 raw → tier 5 finished dish) ──
// Each chain: id, accent colour, and per-tier names EN/RU. New chains unlock as
// the diner levels up. Names are revealed on the order ticket + merge floats.
var CHAINS = [
  { id: 'pizza',   col: '#e8563f',
    en: ['Tomato','Sauce','Dough','Topping','Slice','Pizza'],
    ru: ['Томат','Соус','Тесто','Начинка','Кусок','Пицца'] },
  { id: 'burger',  col: '#d98a3a',
    en: ['Beef','Patty','Bun','Cheese Stack','Loaded','Burger'],
    ru: ['Мясо','Котлета','Булка','Сыр-стэк','С начинкой','Бургер'] },
  { id: 'sushi',   col: '#6fb98f',
    en: ['Rice','Fish','Roll','Nigiri','Combo','Platter'],
    ru: ['Рис','Рыба','Ролл','Нигири','Сет','Тарелка'] },
  { id: 'dessert', col: '#d56fa8',
    en: ['Berry','Cream','Batter','Cupcake','Layer','Cake'],
    ru: ['Ягода','Крем','Тесто','Кекс','Слой','Торт'] },
  { id: 'drink',   col: '#5a9bd4',
    en: ['Bean','Brew','Pour','Latte','Topped','Shake'],
    ru: ['Зерно','Заварка','Налив','Латте','С верхом','Шейк'] },
];

// AI sprites — crate/coin/golden + per-chain per-tier food tiles. Procedural fallback.
var SPRITE_NAMES = ['crate','coin','golden'];
(function () {
  for (var ci = 0; ci < CHAINS.length; ci++) for (var t = 0; t <= 5; t++) SPRITE_NAMES.push(CHAINS[ci].id + '_' + t);
})();

// Per-tier brightness ramp applied on top of each chain's accent colour.
var TIER_LIGHT = [0.55, 0.68, 0.80, 0.92, 1.05, 1.18];

// ── TUNABLES (DESIGN.md §Tunables) ───────────────────────────────────────
var GRID_W          = 6;     // board columns
var GRID_H          = 7;     // board rows (42 cells)
var CRATE_COOLDOWN  = 0.65;  // seconds between dispenses per crate (anti-mash, NOT energy)
var ORDER_SLOTS     = 3;     // max simultaneous order tickets
var COMBO_WINDOW    = 2.2;   // seconds to chain a serve into the Feast Combo
var COINS_PER_TIER  = 6;     // base coins per served-dish tier
var LEVELUP_ORDERS  = 4;     // served orders per level (× level) to advance + unlock a chain
var NUM_CHAINS      = 5;     // total cuisine chains
var JAM_GRACE_MS    = 700;   // ms board may stay full before GAMEOVER (jam)
var GOLDEN_CHANCE   = 0.05;  // chance a dispensed ingredient is a golden wildcard
var MAX_TIER        = 5;     // tiers per chain (0..5)
var MAX_CRATES      = 2;     // crate generators cap

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';             // MENU | PLAYING | GAMEOVER
var score = 0, best = 0, coins = 0;
var merges = 0, ordersServed = 0;
var combo = 0, bestCombo = 0, comboTimer = 0;
var level = 1;
var chainsUnlocked = 1;      // how many CHAINS are active (grows on level-up)
var topTier = 0;             // highest dish tier produced this run (progression)
var goldenSeen = false;
var jamTimer = 0;            // ms the board has been continuously full (→ JAM at JAM_GRACE_MS)

var board = [];              // flat GRID_W*GRID_H: null | {chain, tier, golden, sx, sy, pop}
var crates = 1;              // active crate count (grows with level, cap MAX_CRATES)
var crateCharge = [];        // per-crate recharge accumulator (seconds elapsed)
var crateReady = [];         // per-crate: true once recharged

var orders = [];             // {chain, tier, id, _cx, _cy}
var orderSeq = 1;
var firstMergeDone = false;  // progressive disclosure: orders appear after 1st merge

// selection / drag
var sel = -1;                // selected source cell index (tap-tap), -1 = none
var drag = null;             // {idx, x, y, moved}
var pressStart = null;       // {x, y, idx, t}

// flourishes
var newChainFlash = 0;       // full-screen "NEW CUISINE" timer
var levelFlash = 0;          // "LEVEL UP" timer
var flashChainId = null;     // which chain to show on the new-cuisine flourish
var cascadeTimer = 0;        // active combo auto-merge cascade ticker

// layout (recomputed each draw)
var L = { boardX:0, boardY:0, boardW:0, cell:0, railY:0, railH:0, crateY:0, crateH:0, meterY:0 };
var helpBtn = { x:0, y:0, w:0, h:0 };
var muteBtn = { x:0, y:0, w:0, h:0 };
var orderRects = [];         // {x,y,w,h, order}
var crateRects = [];         // {x,y,w,h, idx}
var playBtnRect = null;

// ── HELPERS ──────────────────────────────────────────────────────────────
function cellCount() { return GRID_W * GRID_H; }
function freeCells() {
  var n = 0;
  for (var i = 0; i < board.length; i++) if (!board[i]) n++;
  return n;
}
function randFree() {
  var fr = [];
  for (var i = 0; i < board.length; i++) if (!board[i]) fr.push(i);
  if (!fr.length) return -1;
  return fr[(Math.random() * fr.length) | 0];
}
function chainDef(id) { for (var i = 0; i < CHAINS.length; i++) if (CHAINS[i].id === id) return CHAINS[i]; return CHAINS[0]; }
function chainIndex(id) { for (var i = 0; i < CHAINS.length; i++) if (CHAINS[i].id === id) return i; return 0; }
function activeChains() { return CHAINS.slice(0, GF.clamp(chainsUnlocked, 1, NUM_CHAINS)); }
function randActiveChain() { var a = activeChains(); return a[(Math.random() * a.length) | 0]; }
function itemName(chain, tier) {
  var d = chainDef(chain), arr = (GF.lang === 'ru' ? d.ru : d.en) || d.en;
  return arr[GF.clamp(tier, 0, MAX_TIER)] || ('Tier ' + tier);
}
// lighten/darken a hex colour by a factor (>1 lighter, <1 darker)
function shade(hex, f) {
  var r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  r = GF.clamp(Math.round(r * f), 0, 255); g = GF.clamp(Math.round(g * f), 0, 255); b = GF.clamp(Math.round(b * f), 0, 255);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}
function itemColor(chain, tier) { return shade(chainDef(chain).col, TIER_LIGHT[GF.clamp(tier, 0, MAX_TIER)] || 1); }

// Two same chain+tier items anywhere mergeable, or a golden present with any item.
function hasMergePair() {
  var seen = {}, golden = false, any = false;
  for (var i = 0; i < board.length; i++) {
    var c = board[i]; if (!c) continue;
    any = true;
    if (c.golden) { golden = true; continue; }
    var k = c.chain + ':' + c.tier;
    if (seen[k]) return true;
    seen[k] = true;
  }
  if (golden && any) { for (var j = 0; j < board.length; j++) if (board[j] && !board[j].golden) return true; }
  return false;
}
// Could any current order be served from items already on the board?
function hasDeliverableOrder() {
  for (var o = 0; o < orders.length; o++) {
    for (var i = 0; i < board.length; i++) {
      var c = board[i];
      if (c && (c.golden || (c.chain === orders[o].chain && c.tier === orders[o].tier))) return true;
    }
  }
  return false;
}

// ── ORDERS ───────────────────────────────────────────────────────────────
function orderTierCeiling() {
  // ramps up with level: lvl1 → t2, climbs to MAX_TIER as the diner grows
  return GF.clamp(2 + Math.floor(level / 2), 2, MAX_TIER);
}
function makeOrder() {
  var ch = randActiveChain();
  var hi = GF.clamp(Math.min(orderTierCeiling(), topTier + 1), 2, MAX_TIER);
  var lo = GF.clamp(hi - 1, 2, hi);
  var tier = lo + ((Math.random() * (hi - lo + 1)) | 0);
  tier = GF.clamp(tier, 2, MAX_TIER);
  return { chain: ch.id, tier: tier, id: orderSeq++ };
}
function refillOrders() {
  if (!firstMergeDone) return;                // progressive disclosure
  while (orders.length < ORDER_SLOTS) orders.push(makeOrder());
}

// ── CRATE / DISPENSE ───────────────────────────────────────────────────────
function dispenseFromCrate(ci) {
  if (gs !== 'PLAYING') return false;
  if (ci < 0 || ci >= crates) {
    // pick any ready crate
    ci = -1; for (var k = 0; k < crates; k++) { if (crateReady[k]) { ci = k; break; } }
    if (ci < 0) return false;
  }
  if (!crateReady[ci]) return false;
  var idx = randFree();
  if (idx < 0) return false;                  // board full — can't dispense
  crateReady[ci] = false; crateCharge[ci] = 0;
  var golden = (Math.random() < GOLDEN_CHANCE) && firstMergeDone;
  if (golden) goldenSeen = true;
  placeItem(idx, randActiveChain().id, 0, golden, true);
  GF.sfx('spawn');
  GF.spawnParticles(board[idx].sx, board[idx].sy, golden ? '#ffd700' : itemColor(board[idx].chain, 0), 8);
  GF.saveRun();
  return true;
}
function placeItem(idx, chain, tier, golden, animate) {
  var p = cellCenter(idx);
  board[idx] = { chain: chain, tier: tier, golden: !!golden, sx: p.x, sy: p.y, pop: animate ? 1 : 0 };
  if (!golden && tier > topTier) topTier = tier;
}

// ── MERGE / MOVE / SERVE ───────────────────────────────────────────────────
function tryActOn(srcIdx, dstKind, dstRef) {
  if (srcIdx < 0 || !board[srcIdx]) return false;
  var src = board[srcIdx];
  if (dstKind === 'order') return serveTo(srcIdx, dstRef);

  var dst = dstRef;
  if (dst === srcIdx) return false;
  var tgt = board[dst];
  if (!tgt) {
    // move into empty cell
    var p = cellCenter(dst);
    board[dst] = src; board[dst].sx = p.x; board[dst].sy = p.y; board[dst].pop = 0.4;
    board[srcIdx] = null;
    GF.saveRun();
    return true;
  }
  // occupied — merge if same chain+tier or a golden is involved
  var canMerge = src.golden || tgt.golden || (src.chain === tgt.chain && src.tier === tgt.tier);
  if (!canMerge) {
    // swap so the player can re-plan (forgiving, no penalty)
    var ps = cellCenter(srcIdx), pd = cellCenter(dst);
    board[srcIdx] = tgt; board[srcIdx].sx = ps.x; board[srcIdx].sy = ps.y;
    board[dst] = src; board[dst].sx = pd.x; board[dst].sy = pd.y;
    GF.saveRun();
    return true;
  }
  doMerge(srcIdx, dst);
  return true;
}

function doMerge(srcIdx, dst) {
  var src = board[srcIdx], tgt = board[dst];
  // resolved chain/tier: golden inherits the other's identity
  var baseChain = src.golden ? tgt.chain : src.chain;
  var baseTier  = src.golden ? tgt.tier : (tgt.golden ? src.tier : src.tier);
  if (src.golden && tgt.golden) { baseChain = randActiveChain().id; baseTier = 0; } // two goldens → fresh tier-1 raw
  if (baseTier >= MAX_TIER) { return; }       // top dish can't go higher — bounce (no consume)
  var resultTier = baseTier + 1;
  board[srcIdx] = null;
  var p2 = cellCenter(dst);
  board[dst] = { chain: baseChain, tier: resultTier, golden: false, sx: p2.x, sy: p2.y, pop: 1 };
  if (resultTier > topTier) topTier = resultTier;
  merges++;
  GF.sfx('merge');
  // combo timer extends on merges too (keeps a serve-merge-serve flow rewarding)
  // first merge → unlock orders (progressive disclosure)
  if (!firstMergeDone) { firstMergeDone = true; refillOrders(); }
  // tutorial step 2 (merge) → guarantee a matching order for step 3, then advance
  if (GF.tutorial.active && GF.tutorial.step === 1) {
    var to = { chain: baseChain, tier: resultTier, id: orderSeq++ };
    if (orders.length) orders[0] = to; else orders.push(to);
    GF.tutorial.next();
  }
  // VFX
  GF.spawnParticles(p2.x, p2.y, itemColor(baseChain, resultTier), 14);
  GF.spawnFloat(p2.x, p2.y - L.cell * 0.3, itemName(baseChain, resultTier), itemColor(baseChain, resultTier));
  GF.setShake(0.22);
  GF.saveRun();
}

function serveTo(srcIdx, order) {
  var src = board[srcIdx];
  if (!src) return false;
  var match = src.golden || (src.chain === order.chain && src.tier === order.tier);
  if (!match) return false;                   // wrong dish — rejected, item stays
  board[srcIdx] = null;
  // combo: serving within COMBO_WINDOW raises the multiplier
  combo = (comboTimer > 0) ? combo + 1 : 1;
  comboTimer = COMBO_WINDOW * 1000;
  if (combo > bestCombo) bestCombo = combo;
  var mult = combo >= 2 ? combo : 1;
  var gain = Math.round(COINS_PER_TIER * order.tier * mult);
  coins += gain; score += gain;
  ordersServed++;
  GF.sfx('coin');
  GF.spawnParticles(order._cx || (L.boardX + L.boardW / 2), order._cy || L.railY, '#ffd700', 14);
  GF.spawnFloat(order._cx || (L.boardX + L.boardW / 2), (order._cy || L.railY) + 4, '+' + gain, '#ffd700');
  if (combo >= 2) GF.spawnFloat(order._cx || (L.boardX + L.boardW / 2), (order._cy || L.railY) - 18, GF.t('combo') + ' x' + combo, '#ffd166');
  GF.setShake(0.35);
  if (GF.tutorial.active && GF.tutorial.step === 2) GF.tutorial.next();  // a real serve completes step 3
  // replace this order
  var i = orders.indexOf(order);
  if (i >= 0) orders.splice(i, 1);
  refillOrders();
  // combo cascade: a high combo fires a brief auto-merge on the board (juice + relief)
  if (combo >= 3) triggerCascade();
  checkLevelUp();
  GF.saveRun();
  checkGameOver();
  return true;
}

// ── COMBO CASCADE — high combo auto-merges one pair per board scan (relief) ──
function triggerCascade() {
  cascadeTimer = 0.5;
  // find one mergeable same chain+tier pair and fuse it
  var seen = {};
  for (var i = 0; i < board.length; i++) {
    var c = board[i]; if (!c || c.golden) continue;
    var k = c.chain + ':' + c.tier;
    if (seen[k] != null && c.tier < MAX_TIER) { doMerge(i, seen[k]); GF.spawnParticles(board[seen[k]].sx, board[seen[k]].sy, '#ffd700', 10); return; }
    seen[k] = i;
  }
}

// ── LEVEL-UP — unlock a new cuisine chain + add a crate + raise order tiers ──
function checkLevelUp() {
  // advance when served orders reach the cumulative threshold for the next level
  var needed = LEVELUP_ORDERS * level;
  if (ordersServed >= needed) {
    level++;
    levelFlash = 1.3;
    GF.sfx('levelup');
    GF.setShake(0.5);
    // unlock a new cuisine chain (if any left)
    if (chainsUnlocked < NUM_CHAINS) {
      flashChainId = CHAINS[chainsUnlocked].id;   // the chain about to unlock
      chainsUnlocked++;
      newChainFlash = 1.6;
      if (GF.happytime) GF.happytime();
    }
    // add a crate (cap MAX_CRATES)
    if (crates < MAX_CRATES) { crates++; crateReady[crates - 1] = true; crateCharge[crates - 1] = 0; }
    GF.spawnFloat(GF.cx, GF.cy - L.cell, GF.t('levelup'), '#ffd700');
    GF.saveRun();
  }
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  score = 0; coins = 0; merges = 0; ordersServed = 0;
  combo = 0; bestCombo = 0; comboTimer = 0;
  level = 1; chainsUnlocked = 1; topTier = 0; goldenSeen = false; jamTimer = 0;
  continueUsed = false;
  newChainFlash = 0; levelFlash = 0; flashChainId = null; cascadeTimer = 0;
  crates = 1; crateCharge = [0]; crateReady = [true];
  board = []; for (var i = 0; i < cellCount(); i++) board.push(null);
  orders = []; orderSeq = 1; firstMergeDone = false;
  sel = -1; drag = null; pressStart = null;
  // seed: TWO matching tier-0 ingredients of the first chain → instant first merge
  var seedChain = CHAINS[0].id;
  var a = randFree(); if (a >= 0) placeItem(a, seedChain, 0, false, false);
  var b = randFree(); if (b >= 0) placeItem(b, seedChain, 0, false, false);
  // a third ingredient of the same chain so the player can reach the tier-2 demo order
  var cc = randFree(); if (cc >= 0) placeItem(cc, seedChain, 0, false, false);
  var dd = randFree(); if (dd >= 0) placeItem(dd, seedChain, 1, false, false);   // a pre-merged tier-1 to pair toward tier-2
  gs = 'PLAYING';
  startTutorial();
  GF.gameStarted();
  GF.saveRun();
}

function gameOver() {
  if (gs === 'GAMEOVER') return;
  var newBest = score > best;
  if (newBest) { best = score; try { localStorage.setItem('merge_diner_best', best); } catch (e) {} }
  gs = 'GAMEOVER'; GF.sfx('lose');
  GF.gameEnded();
  GF.saveRun();
  if (newBest && best > 0 && GF.happytime) GF.happytime();
}

function checkGameOver() {
  // handled continuously in update() via the jam grace timer; kept for callers
  if (gs !== 'PLAYING') return;
  if (freeCells() > 0) jamTimer = 0;
}

// ── TUTORIAL (hands-on, action-GATED) ──────────────────────────────────────
function startTutorial() {
  var seen = false;
  try { seen = !!localStorage.getItem('merge_diner_seen_tutorial'); } catch (e) {}
  var ru = (GF.lang === 'ru');
  var steps = [
    { text: ru ? 'Нажми ЯЩИК, чтобы выпал продукт' : 'Tap the CRATE to drop an ingredient',
      target: function () { return crateTarget(); }, advance: 'manual',
      onAdvance: function () { try { ensureMergePair(); } catch (e) {} } },
    { text: ru ? 'Перетащи продукт на такой же — получится блюдо покрупнее!' : 'Drag an ingredient onto a matching one to MERGE!',
      target: function () { return mergeFromTarget(); }, target2: function () { return mergeToTarget(); }, gesture: 'drag', advance: 'manual' },
    { text: ru ? 'Перетащи блюдо на ЗАКАЗ сверху — подай за монеты!' : 'Drag the dish onto the glowing ORDER to serve it!',
      target: function () { return serveFromTarget(); }, target2: function () { return orderTarget(); }, gesture: 'drag', advance: 'manual' },
    { text: ru ? 'Снова нажми ЯЩИК — продолжай готовить!' : 'Tap the CRATE again — keep cooking!',
      target: function () { return crateTarget(); }, advance: 'manual' },
  ];
  GF.tutorial.start(steps, { storageKey: 'merge_diner_seen_tutorial', force: !seen ? true : false });
  try { localStorage.setItem('merge_diner_seen_tutorial', '1'); } catch (e) {}
}
function crateTarget() {
  if (!crateRects.length) return { x: GF.cx, y: GF.H * 0.85, r: 40 * GF.S };
  var n = crateRects[0];
  return { x: n.x + n.w / 2, y: n.y + n.h / 2, r: Math.max(n.w, n.h) / 2 };
}
function mergeIdxs() {
  // first two items sharing chain+tier (the pair to demo)
  var map = {};
  for (var i = 0; i < board.length; i++) {
    var c = board[i]; if (!c || c.golden) continue;
    var k = c.chain + ':' + c.tier;
    if (map[k] != null) return [map[k], i];

// ── COORD MAPPING ─────────────────────────────────────────────────────────

// ── INPUT ────────────────────────────────────────────────────────────────
function onDown(x, y) {
  if (gs !== 'PLAYING') return;
  // mute toggle
  if (muteBtn.w && x >= muteBtn.x && x <= muteBtn.x + muteBtn.w && y >= muteBtn.y && y <= muteBtn.y + muteBtn.h) { GF.toggleMute(); GF.setMusicMuted(GF.muted); GF.sfx('tap'); return; }

    var _sb = GF.tutorial._skipBtn;
    if (_sb && x >= _sb.x && x <= _sb.x + _sb.w && y >= _sb.y && y <= _sb.y + _sb.h) { GF.tutorial.handleClick(x, y); return; }

      if (hc >= 0) { if (!crateReady[hc]) { crateReady[hc] = true; crateCharge[hc] = 0; } dispenseFromCrate(hc); GF.tutorial.next(); }

    if (x >= helpBtn.x && x <= helpBtn.x + helpBtn.w && y >= helpBtn.y && y <= helpBtn.y + helpBtn.h) { GF.tutorial.reopen(); return; }
  }

  var ord = orderAt(x, y);

    return;
  }
  // board cell
  var idx = cellAt(x, y);
  if (idx < 0) { sel = -1; return; }
  if (sel >= 0) {
    if (idx === sel) { sel = -1; return; }
    tryActOn(sel, 'cell', idx);
    sel = -1;
    return;
  }
  if (board[idx]) {
    pressStart = { x: x, y: y, idx: idx, t: Date.now() };

function onMove(x, y) {

}

  }

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (newChainFlash > 0) newChainFlash = Math.max(0, newChainFlash - dt);
  if (levelFlash > 0) levelFlash = Math.max(0, levelFlash - dt);
  if (cascadeTimer > 0) cascadeTimer = Math.max(0, cascadeTimer - dt);
  if (gs !== 'PLAYING') { GF.tutorial.update(dt); return; }
  GF.tutorial.update(dt);

  // pop animations
  for (var i = 0; i < board.length; i++) { var c = board[i]; if (c && c.pop > 0) c.pop = Math.max(0, c.pop - dt * 3.5); }
  // combo decay
  if (comboTimer > 0) { comboTimer -= dt * 1000; if (comboTimer <= 0) combo = 0; }
  // crate recharge
  for (var k = 0; k < crates; k++) {
    if (!crateReady[k]) {
      crateCharge[k] = (crateCharge[k] || 0) + dt;
      if (crateCharge[k] >= CRATE_COOLDOWN) { crateCharge[k] = 0; crateReady[k] = true; }
    }
  }
  // keep orders topped up
  refillOrders();
  // JAM PRESSURE: board full past the grace window → GAMEOVER
  if (freeCells() === 0) {
    jamTimer += dt * 1000;
    if (jamTimer >= JAM_GRACE_MS) gameOver();
  } else {
    jamTimer = 0;
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var pad = GF.clamp(10 * S, 6, 16);
  var colW = Math.min(W - pad * 2, Math.round(H * 0.64));
  var colX = Math.round((W - colW) / 2);
  L.colX = colX; L.colW = colW;
  var topH = GF.clamp(46 * S, 38, 60);          // coins / score / level row
  var railH = GF.clamp(72 * S, 58, 96);          // order tickets
  var meterH = GF.clamp(16 * S, 12, 22);         // jam meter
  var crateH = GF.clamp(96 * S, 78, 130);        // crate bar
  L.railY = topH;
  L.railH = railH;

  L.crateH = crateH;
  var hb = GF.clamp(30 * S, 26, 38);
  helpBtn = { x: colX + colW - hb - pad, y: 6 * S, w: hb, h: hb };
  muteBtn = { x: helpBtn.x - hb - pad * 0.6, y: 6 * S, w: hb, h: hb };
}

function draw(ctx) {
  var W = GF.W, H = GF.H;
  layout();
  // background — cozy diner gradient
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#3a2416'); g.addColorStop(0.5, '#46301d'); g.addColorStop(1, '#2a1810');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawOrderRail(ctx);
    drawJamMeter(ctx);
    drawBoard(ctx);
    drawCrateBar(ctx);
    drawTopHUD(ctx);
    drawHelpBtn(ctx);
    drawDrag(ctx);
    if (levelFlash > 0) drawLevelUp(ctx);
    if (newChainFlash > 0) drawNewChain(ctx);
    if (gs === 'PLAYING') GF.tutorial.draw(ctx);
  }
  if (gs === 'MENU') drawMenu(ctx);

// Vector coin (gold disc + ring) — never an emoji (tofu-box bug in game font).

  ctx.lineWidth = Math.max(1, r * 0.18); ctx.strokeStyle = '#b9870c'; ctx.stroke();
  ctx.beginPath(); ctx.arc(x, y, r * 0.52, 0, Math.PI * 2);

}

function drawBoard(ctx) {
  var S = GF.S;
  var pad = 8 * S;
  // counter panel behind board; red edge pulse when nearly jammed
  GF.rr(ctx, L.boardX - pad, L.boardY - pad, L.boardW + pad * 2, L.cell * GRID_H + pad * 2, 14 * S);
  ctx.fillStyle = 'rgba(18,11,6,0.55)'; ctx.fill();

// Draw a food tile: AI sprite by name (chain_tier / 'golden') with a procedural

function drawFood(ctx, x, y, chain, tier, golden, size, pop) {

  GF.drawSprite(name, x, y, size, function (c, px, py, s) {
    var col = golden ? '#ffd700' : itemColor(chain, tier);
    c.save();
    var r = s * 0.40;
    // soft shadow
    c.fillStyle = 'rgba(0,0,0,0.18)';
    c.beginPath(); c.ellipse(px, py + r * 0.85, r * 0.85, r * 0.32, 0, 0, Math.PI * 2); c.fill();
    // body (rounded squircle for a tactile tile feel)
    c.fillStyle = col;
    roundedBlob(c, px, py, r);
    c.fill();
    // glossy top highlight
    var grd = c.createLinearGradient(px, py - r, px, py + r);
    grd.addColorStop(0, 'rgba(255,255,255,0.38)'); grd.addColorStop(0.5, 'rgba(255,255,255,0.0)');
    c.fillStyle = grd; roundedBlob(c, px, py, r); c.fill();
    // rim
    c.lineWidth = Math.max(1, s * 0.03); c.strokeStyle = 'rgba(0,0,0,0.25)';
    roundedBlob(c, px, py, r); c.stroke();

    var pips = GF.clamp(tier, 0, MAX_TIER);
    if (!golden && pips > 0) {
      c.fillStyle = 'rgba(255,255,255,0.8)';
      for (var i = 0; i < pips; i++) {
        var ang = -Math.PI / 2 + (i - (pips - 1) / 2) * 0.5;
        var dx = Math.cos(ang) * r * 0.5, dy = Math.sin(ang) * r * 0.5 + r * 0.18;
        c.beginPath(); c.arc(px + dx, py + dy, s * 0.035, 0, Math.PI * 2); c.fill();
      }
    }
    if (golden) {
      c.fillStyle = '#fff';
      // 4-point sparkle
      c.beginPath();
      for (var k = 0; k < 8; k++) { var a2 = k * Math.PI / 4 - Math.PI / 2; var rr2 = (k % 2 === 0) ? r * 0.55 : r * 0.22; var sx = px + Math.cos(a2) * rr2, sy = py + Math.sin(a2) * rr2; if (k === 0) c.moveTo(sx, sy); else c.lineTo(sx, sy); }
      c.closePath(); c.fill();
    }
    c.restore();
  });
  // tier badge number (top-right)
  if (!golden) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    var bs = size * 0.2;
    ctx.beginPath(); ctx.arc(x + size * 0.33, y - size * 0.33, bs * 0.72, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (bs * 0.95) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('' + (tier + 1), x + size * 0.33, y - size * 0.33);

}
function roundedBlob(c, px, py, r) {
  var k = r * 0.62;
  c.beginPath();
  c.moveTo(px - r, py);
  c.bezierCurveTo(px - r, py - k, px - k, py - r, px, py - r);
  c.bezierCurveTo(px + k, py - r, px + r, py - k, px + r, py);
  c.bezierCurveTo(px + r, py + k, px + k, py + r, px, py + r);
  c.bezierCurveTo(px - k, py + r, px - r, py + k, px - r, py);
  c.closePath();
}

function drawCrateBar(ctx) {
  var S = GF.S;
  crateRects = [];
  var y = L.crateY, h = L.crateH, pad = 10 * S;
  var bx0 = L.colX + pad, bw0 = L.colW - pad * 2;
  var gap = 10 * S;

  var totalW = perW * crates + gap * (crates - 1);

    var nx = startX + k * (perW + gap), ny = y + pad, nh = h - pad * 2;
    GF.rr(ctx, nx, ny, perW, nh, 14 * S);

function wrapLines(ctx, text, maxW) {

    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }

  return lines;
}

// ── ADS (Yandex) — user-initiated rewarded "clear counter" + throttled interstitial ──
var continueUsed = false, continueLoading = false, continueBtnRect = null;
var lastInterstitialMs = -999999, INTERSTITIAL_GAP_MS = 90000;
function nowMs() { return (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now(); }
function showInterstitial(onDone) {
  var now = nowMs();
  if (now - lastInterstitialMs < INTERSTITIAL_GAP_MS) { if (onDone) onDone(); return; }
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showFullscreenAdv) { if (onDone) onDone(); return; }
  lastInterstitialMs = now;
  var done = false, opened = false;
  var finish = function () { if (done) return; done = true; if (onDone) onDone(); };
  var watchdog = setTimeout(function () { if (!opened) finish(); }, 4500);
  try {
    window.ysdk.adv.showFullscreenAdv({ callbacks: {
      onOpen: function () { opened = true; },
      onClose: function () { clearTimeout(watchdog); finish(); },
      onError: function () { clearTimeout(watchdog); finish(); },
    }});
  } catch (e) { clearTimeout(watchdog); finish(); }
}
function showRewardedContinue() {
  if (continueUsed || continueLoading) return;
  continueLoading = true;
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showRewardedVideo) { continueLoading = false; doContinue(); return; }
  var rewarded = false, opened = false, done = false;
  var finish = function () { if (done) return; done = true; continueLoading = false; if (rewarded) doContinue(); };
  var watchdog = setTimeout(function () { if (!opened) finish(); }, 4500);
  try {
    window.ysdk.adv.showRewardedVideo({ callbacks: {
      onOpen: function () { opened = true; },
      onRewarded: function () { rewarded = true; },
      onClose: function () { clearTimeout(watchdog); finish(); },
      onError: function () { clearTimeout(watchdog); finish(); },
    }});
  } catch (e) { clearTimeout(watchdog); finish(); }
}
function doContinue() {
  continueUsed = true;
  // break the jam: clear the lowest-tier items so the run can resume
  var idxs = [];
  for (var i = 0; i < board.length; i++) if (board[i]) idxs.push(i);
  idxs.sort(function (a, b) { return (board[a].tier | 0) - (board[b].tier | 0); });
  var clear = Math.min(8, idxs.length);
  for (var k = 0; k < clear; k++) board[idxs[k]] = null;
  jamTimer = 0;

}

function evtXY(e) {
  if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}
function overlayDown(x, y) {
  if (gs === 'GAMEOVER' && !continueUsed && continueBtnRect &&
      x >= continueBtnRect.x && x <= continueBtnRect.x + continueBtnRect.w &&
      y >= continueBtnRect.y && y <= continueBtnRect.y + continueBtnRect.h) {

}

        if (gs !== 'PLAYING') return { gs: gs };
        return {
          gs: gs, score: score, coins: coins, merges: merges, ordersServed: ordersServed,
          level: level, chainsUnlocked: chainsUnlocked, topTier: topTier, goldenSeen: goldenSeen,
          bestCombo: bestCombo, crates: crates,
          board: board.map(function (c) { return c ? { c: c.chain, t: c.tier, g: c.golden ? 1 : 0 } : 0; }),
          orders: orders.map(function (o) { return { c: o.chain, t: o.tier, id: o.id }; }),
          firstMergeDone: firstMergeDone, orderSeq: orderSeq,
        };
      },
      function (s) {
        if (!s || s.gs !== 'PLAYING') return;
        score = s.score || 0; coins = s.coins || 0; merges = s.merges || 0; ordersServed = s.ordersServed || 0;
        level = s.level || 1; chainsUnlocked = s.chainsUnlocked || 1; topTier = s.topTier || 0; goldenSeen = !!s.goldenSeen;
        bestCombo = s.bestCombo || 0; crates = GF.clamp(s.crates || 1, 1, MAX_CRATES);
        firstMergeDone = !!s.firstMergeDone; orderSeq = s.orderSeq || 1;
        board = (s.board || []).map(function (c) { return c ? { chain: c.c, tier: c.t, golden: !!c.g, sx: 0, sy: 0, pop: 0 } : null; });
        while (board.length < cellCount()) board.push(null);
        for (var i = 0; i < board.length; i++) { if (board[i]) { var p = cellCenter(i); board[i].sx = p.x; board[i].sy = p.y; } }
        orders = (s.orders || []).map(function (o) { return { chain: o.c, tier: o.t, id: o.id }; });
        crateReady = []; crateCharge = []; for (var k = 0; k < crates; k++) { crateReady[k] = true; crateCharge[k] = 0; }
        gs = 'PLAYING';
      }
    );
    // AUTOSTART (rule #9): platform builds drop straight into gameplay (no menu).
    if (window.__GF_AUTOSTART && !window._silent) {
      try { localStorage.setItem('merge_diner_seen_tutorial', '1'); } catch (e) {}
      if (gs !== 'PLAYING') startGame();
      GF.tutorial.active = false;   // suppress tutorial on platform autostart
    } else if (gs === 'PLAYING') {
      // resumed mid-run on the gallery — keep playing
    }
    // gallery build: gs stays MENU (first screen) unless a mid-run was resumed.
  },
  onUpdate: update,
  onDraw: draw,
});

// ── EXPOSE STATE (post-build-tester cross-checks vs DESIGN.md) ────────────
GF.exposeState(function () {
  return {
    gs: gs, score: score, best: best, coins: coins,
    level: level, chainsUnlocked: chainsUnlocked, ordersServed: ordersServed,
    merges: merges, combo: combo, bestCombo: bestCombo, topTier: topTier,
    freeCells: freeCells(), goldenSeen: goldenSeen, crates: crates,
    hasMergePair: hasMergePair(), hasDeliverableOrder: hasDeliverableOrder(), orders: orders.length,
    // tunables (DESIGN.md §Tunables)
    GRID_W: GRID_W, GRID_H: GRID_H, CRATE_COOLDOWN: CRATE_COOLDOWN, ORDER_SLOTS: ORDER_SLOTS,
    COMBO_WINDOW: COMBO_WINDOW, COINS_PER_TIER: COINS_PER_TIER, LEVELUP_ORDERS: LEVELUP_ORDERS,
    NUM_CHAINS: NUM_CHAINS, JAM_GRACE_MS: JAM_GRACE_MS, GOLDEN_CHANCE: GOLDEN_CHANCE,
    MAX_TIER: MAX_TIER, MAX_CRATES: MAX_CRATES,
  };
});

})();
</script>
