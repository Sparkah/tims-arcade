function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function lerp(a, b, t) { return a + (b - a) * t; }
function roundRect(c, x, y, w, h, r) { GF.rr(c, x, y, w, h, r); }
function fs(n) { return Math.round(clamp(n * scene.ui, n * 0.68, n * 1.35)); }
function cellIndex(x, y) { return y * GRID_COLS + x; }
function plotXY(i) { return { x: i % GRID_COLS, y: Math.floor(i / GRID_COLS) }; }
function isCropAction(id) { return id === 'tomato' || id === 'bean' || id === 'marigold'; }
function targetForSeason(s) { return BASE_TARGET_HARVEST + Math.max(0, s - 1) * 7; }

function drawText(c, txt, x, y, size, color, align, weight) {
  c.font = (weight || '700') + ' ' + Math.max(8, Math.round(size)) + 'px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif';
  c.textAlign = align || 'left';
  c.textBaseline = 'middle';
  c.fillStyle = color || '#fff';
  c.fillText(String(txt), x, y);
}

function fitText(c, txt, x, y, maxW, size, color, align, weight) {
  var s = size;
  var min = Math.max(8, size * 0.62);
  c.font = (weight || '700') + ' ' + Math.round(s) + 'px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif';
  while (s > min && c.measureText(String(txt)).width > maxW) {
    s -= 1;
    c.font = (weight || '700') + ' ' + Math.round(s) + 'px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif';
  }
  drawText(c, txt, x, y, s, color, align, weight);
}

function wrapLines(c, txt, maxW, size, weight) {
  var words = String(txt).split(/\s+/);
  var lines = [];
  var line = '';
  c.font = (weight || '650') + ' ' + Math.round(size) + 'px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif';
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (line && c.measureText(test).width > maxW) {
      lines.push(line);
      line = words[i];
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function makePlot(seedCrop, grow) {
  return {
    crop: seedCrop || null,
    growth: grow || 0,
    moisture: 0.48 + Math.random() * 0.14,
    soil: 0.56 + Math.random() * 0.12,
    pests: seedCrop ? 0.10 : 0.03,
    health: 1,
    flash: 0,
    scale: 1,
    drought: false
  };
}

function initBoard(forSeason) {
  plots = [];
  for (var i = 0; i < GRID_COLS * GRID_ROWS; i++) {
    plots.push(makePlot(null, 0));
  }
  var starters = [
    { i: cellIndex(1, 1), crop: 'tomato', g: 0.42 },
    { i: cellIndex(2, 1), crop: 'bean', g: 0.34 },
    { i: cellIndex(3, 1), crop: 'marigold', g: 0.38 },
    { i: cellIndex(2, 2), crop: 'tomato', g: 0.18 }
  ];
  for (var s = 0; s < starters.length; s++) {
    var item = starters[s];
    plots[item.i] = makePlot(item.crop, item.g);
  }
  if (forSeason >= 6) {
    plots[cellIndex(0, 0)].drought = true;
    plots[cellIndex(4, 3)].drought = true;
  }
}

function startGame(opts) {
  opts = opts || {};
  gs = 'PLAYING';
  score = 0;
  season = 1;
  seasonDay = 1;
  harvest = 0;
  totalHarvest = 0;
  targetHarvest = targetForSeason(season);
  movesLeft = DAILY_MOVES;
  water = START_WATER;
  compost = START_COMPOST;
  bugs = START_BUGS;
  failStrikes = 0;
  selectedAction = 'tomato';
  selectedPlot = cellIndex(1, 1);
  helpOpen = false;
  seasonCompleteTimer = 0;
  pendingSeasonAdvance = false;
  gameOverReason = 'reason_strikes';
  if (opts.suppressTutorial) {
    tutorialDone = true;
    coachStep = 99;
  } else if (!tutorialDone) {
    coachStep = 0;
  }
  initBoard(1);
  message = { key: tutorialDone ? 'coach_done' : 'coach_pick', t: 4, color: '#f4e3a0' };
  GF.gameStarted();
  scheduleSave();
}

function stateForSave() {
  return {
    v: 1,
    gs: gs,
    score: score,
    best: best,
    bestSeason: bestSeason,
    season: season,
    seasonDay: seasonDay,
    harvest: harvest,
    totalHarvest: totalHarvest,
    targetHarvest: targetHarvest,
    movesLeft: movesLeft,
    water: water,
    compost: compost,
    bugs: bugs,
    failStrikes: failStrikes,
    selectedAction: selectedAction,
    selectedPlot: selectedPlot,
    tutorialDone: tutorialDone,
    coachStep: coachStep,
    plots: plots.map(function(p) {
      return {
        crop: p.crop,
        growth: p.growth,
        moisture: p.moisture,
        soil: p.soil,
        pests: p.pests,
        health: p.health,
        drought: !!p.drought
      };
    })
  };
}

function applySave(s) {
  if (!s || s.v !== 1) return;
  best = Number(s.best) || 0;
  bestSeason = Number(s.bestSeason) || 1;
  tutorialDone = !!s.tutorialDone;
  coachStep = typeof s.coachStep === 'number' ? s.coachStep : (tutorialDone ? 99 : 0);
  if (s.gs !== 'PLAYING' || !Array.isArray(s.plots) || s.plots.length !== GRID_COLS * GRID_ROWS) return;
  gs = 'PLAYING';
  score = Number(s.score) || 0;
  season = Math.max(1, Number(s.season) || 1);
  seasonDay = Math.max(1, Number(s.seasonDay) || 1);
  harvest = Math.max(0, Number(s.harvest) || 0);
  totalHarvest = Math.max(0, Number(s.totalHarvest) || 0);
  targetHarvest = Math.max(1, Number(s.targetHarvest) || targetForSeason(season));
  movesLeft = Math.max(0, Number(s.movesLeft) || 0);
  water = Math.max(0, Number(s.water) || 0);
  compost = Math.max(0, Number(s.compost) || 0);
  bugs = Math.max(0, Number(s.bugs) || 0);
  failStrikes = clamp(Number(s.failStrikes) || 0, 0, MAX_FAIL_STRIKES);
  selectedAction = s.selectedAction || 'tomato';
  selectedPlot = clamp(Number(s.selectedPlot) || 0, 0, GRID_COLS * GRID_ROWS - 1);
  plots = s.plots.map(function(p) {
    return {
      crop: p.crop || null,
      growth: clamp(Number(p.growth) || 0, 0, 1.25),
      moisture: clamp(Number(p.moisture) || 0.5, 0, 1),
      soil: clamp(Number(p.soil) || 0.5, 0, 1),
      pests: clamp(Number(p.pests) || 0, 0, 1),
      health: clamp(Number(p.health) || 1, 0, 1),
      flash: 0,
      scale: 1,
      drought: !!p.drought
    };
  });
}

function scheduleSave() {
  autoSaveDelay = 0.18;
}

function saveNow() {
  autoSaveDelay = 0;
  GF.saveRun();
}

function updateBest() {
  if (score > best) best = score;
  if (season > bestSeason) bestSeason = season;
}

function layout() {
  var W = GF.W, H = GF.H;
  var ui = clamp(Math.min(W / 440, H / 760), 0.72, 1.38);
  scene.ui = ui;
  var topH = clamp(90 * ui, 76, 118);
  var bottomH = W > 720 ? clamp(78 * ui, 64, 100) : clamp(132 * ui, 112, 162);
  var gap = 10 * ui;
  var availH = Math.max(160, H - topH - bottomH - gap * 2);
  var bw = Math.min(W - 22 * ui, availH * GRID_COLS / GRID_ROWS);
  var bh = bw * GRID_ROWS / GRID_COLS;
  if (bh > availH) {
    bh = availH;
    bw = bh * GRID_COLS / GRID_ROWS;
  }
  scene.topH = topH;
  scene.board.x = (W - bw) / 2;
  scene.board.y = topH + gap;
  scene.board.w = bw;
  scene.board.h = bh;
  scene.board.cw = bw / GRID_COLS;
  scene.board.ch = bh / GRID_ROWS;
  scene.help = { x: W - 92 * ui, y: 11 * ui, w: 34 * ui, h: 34 * ui };
  scene.mute = { x: W - 50 * ui, y: 11 * ui, w: 34 * ui, h: 34 * ui };
  var cardY = topH + gap + bh + gap;
  if (W <= 720) cardY = Math.max(cardY, H - bottomH + 8 * ui);
  layoutCards(cardY, bottomH);
  scene.retry = { x: GF.cx - 86 * ui, y: GF.cy + 72 * ui, w: 172 * ui, h: 46 * ui };
}

function layoutCards(startY, bottomH) {
  var ui = scene.ui;
  var W = GF.W;
  scene.cards = [];
  var cols = W > 720 ? ACTIONS.length : 4;
  var rows = Math.ceil(ACTIONS.length / cols);
  var margin = 10 * ui;
  var gap = 7 * ui;
  var cardW = (W - margin * 2 - gap * (cols - 1)) / cols;
  var cardH = Math.min(50 * ui, (bottomH - gap * (rows - 1) - 8 * ui) / rows);
  for (var i = 0; i < ACTIONS.length; i++) {
    var row = Math.floor(i / cols);
    var col = i % cols;
    scene.cards.push({
      id: ACTIONS[i].id,
      x: margin + col * (cardW + gap),
      y: startY + row * (cardH + gap),
      w: cardW,
      h: cardH
    });
  }
}

function plotRect(i) {
  var p = plotXY(i);
  return {
    x: scene.board.x + p.x * scene.board.cw,
    y: scene.board.y + p.y * scene.board.ch,
    w: scene.board.cw,
    h: scene.board.ch
  };
}

function plotCenter(i) {
  var r = plotRect(i);
  return { x: r.x + r.w / 2, y: r.y + r.h / 2 };
}

function plotAt(x, y) {
  var b = scene.board;
  if (x < b.x || y < b.y || x > b.x + b.w || y > b.y + b.h) return -1;
  var cx = Math.floor((x - b.x) / b.cw);
  var cy = Math.floor((y - b.y) / b.ch);
  if (cx < 0 || cy < 0 || cx >= GRID_COLS || cy >= GRID_ROWS) return -1;
  return cellIndex(cx, cy);
}

function neighbors(i) {
  var p = plotXY(i);
  var out = [];
  if (p.x > 0) out.push(cellIndex(p.x - 1, p.y));
  if (p.x < GRID_COLS - 1) out.push(cellIndex(p.x + 1, p.y));
  if (p.y > 0) out.push(cellIndex(p.x, p.y - 1));
  if (p.y < GRID_ROWS - 1) out.push(cellIndex(p.x, p.y + 1));
  return out;
}

function companionScore(i) {
  var p = plots[i];
  if (!p.crop) return 0;
  var ns = neighbors(i);
  var bean = 0, marigold = 0, same = 0, unique = {};
  for (var n = 0; n < ns.length; n++) {
    var cp = plots[ns[n]].crop;
    if (!cp) continue;
    unique[cp] = true;
    if (cp === 'bean') bean++;
    if (cp === 'marigold') marigold++;
    if (cp === p.crop) same++;
  }
  var diversity = Object.keys(unique).length;
  var scoreValue = bean * 0.18 + marigold * 0.22 + diversity * 0.08 - same * 0.09;
  if (p.crop === 'tomato') scoreValue += bean * 0.10 + marigold * 0.12;
  if (p.crop === 'bean') scoreValue += marigold * 0.08;
  return clamp(scoreValue, -0.22, 0.75);
}

function spendMove() {
  if (movesLeft <= 0) {
    showMessage('msg_no_moves', '#f6a7a0');
    GF.sfx('error');
    return false;
  }
  movesLeft--;
  return true;
}

function showMessage(key, color) {
  message.key = key;
  message.t = 2.1;
  message.color = color || '#f4e3a0';
}

function actionFeedback(i, color, textKey) {
  var p = plots[i];
  var center = plotCenter(i);
  p.flash = 1;
  GF.juice.punch(p, 'scale', 0.18, 260);
  GF.juice.particles.burst(center.x, center.y, { count: 14, colors: [color, '#fff6b0', '#78c66f'], speed: 130, gravity: 170, size: 4, life: 0.55 });
  if (textKey) GF.juice.floatText(center.x, center.y - 10 * scene.ui, GF.t(textKey), { color: color, size: 12, life: 0.75, rise: 26 });
}

function maybeAdvanceCoach(trigger) {
  if (tutorialDone) return;
  if (coachStep === 0 && trigger === 'select_seed') coachStep = 1;
  else if (coachStep === 1 && trigger === 'plant') coachStep = 2;
  else if (coachStep === 2 && trigger === 'water') coachStep = 3;
  else if (coachStep === 3 && (trigger === 'compost' || trigger === 'bugs')) coachStep = 4;
  else if (coachStep === 4 && trigger === 'end_day') {
    coachStep = 99;
    tutorialDone = true;
  }
  if (tutorialDone) showMessage('coach_done', '#e8f5a4');
  else showMessage(coachKey(), '#f4e3a0');
}

function coachKey() {
  if (coachStep === 0) return 'coach_pick';
  if (coachStep === 1) return 'coach_plant';
  if (coachStep === 2) return 'coach_water';
  if (coachStep === 3) return 'coach_compost';
  if (coachStep === 4) return 'coach_end';
  return 'coach_done';
}

function selectAction(id) {
  selectedAction = id;
  GF.sfx('click');
  if (isCropAction(id)) maybeAdvanceCoach('select_seed');
  scheduleSave();
}

function applyActionToPlot(i) {
  if (gs !== 'PLAYING' || pendingSeasonAdvance || i < 0 || i >= plots.length) return false;
  var p = plots[i];
  selectedPlot = i;
  if (selectedAction === 'end_day') {
    endDay();
    return true;
  }
  if (isCropAction(selectedAction)) {
    if (p.crop) {
      showMessage('msg_bad_plot', '#f6a7a0');
      GF.sfx('error');
      return false;
    }
    if (!spendMove()) return false;
    p.crop = selectedAction;
    p.growth = 0.10;
    p.moisture = clamp(p.moisture - 0.03, 0, 1);
    p.soil = clamp(p.soil - 0.02, 0, 1);
    p.pests = clamp(p.pests + 0.02, 0, 1);
    p.health = 1;
    actionFeedback(i, CROPS[selectedAction].color, 'msg_planted');
    GF.sfx('spawn');
    maybeAdvanceCoach('plant');
    scheduleSave();
    return true;
  }
  if (selectedAction === 'water') {
    if (water <= 0) {
      showMessage('msg_no_resource', '#f6a7a0');
      GF.sfx('error');
      return false;
    }
    if (!spendMove()) return false;
    water--;
    p.moisture = clamp(p.moisture + 0.34, 0, 1);
    p.health = clamp(p.health + 0.04, 0, 1);
    actionFeedback(i, '#6ec6e8', 'msg_watered');
    GF.sfx('tap');
    maybeAdvanceCoach('water');
    scheduleSave();
    return true;
  }
  if (selectedAction === 'compost') {
    if (compost <= 0) {
      showMessage('msg_no_resource', '#f6a7a0');
      GF.sfx('error');
      return false;
    }
    if (!spendMove()) return false;
    compost--;
    p.soil = clamp(p.soil + 0.28, 0, 1);
    p.health = clamp(p.health + 0.12, 0, 1);
    p.pests = clamp(p.pests - 0.04, 0, 1);
    actionFeedback(i, '#b98345', 'msg_compost');
    GF.sfx('merge');
    maybeAdvanceCoach('compost');
    scheduleSave();
    return true;
  }
  if (selectedAction === 'bugs') {
    if (bugs <= 0) {
      showMessage('msg_no_resource', '#f6a7a0');
      GF.sfx('error');
      return false;
    }
    if (!p.crop && p.pests < 0.15) {
      showMessage('msg_bad_plot', '#f6a7a0');
      GF.sfx('error');
      return false;
    }
    if (!spendMove()) return false;
    bugs--;
    p.pests = clamp(p.pests - 0.48, 0, 1);
    p.health = clamp(p.health + 0.08, 0, 1);
    actionFeedback(i, '#79d76e', 'msg_bugs');
    GF.sfx('pickup');
    maybeAdvanceCoach('bugs');
    scheduleSave();
    return true;
  }
  if (selectedAction === 'harvest') {
    if (!p.crop || p.growth < 1 || p.health <= 0.15) {
      showMessage('msg_not_ready', '#f6a7a0');
      GF.sfx('error');
      return false;
    }
    if (!spendMove()) return false;
    var comp = companionScore(i);
    var base = CROPS[p.crop].yield;
    var value = Math.max(1, Math.round(base + comp * 4 + p.health * 2 - p.pests * 2));
    harvest += value;
    totalHarvest += value;
    score += value * 10 + season * 4;
    if (p.crop === 'bean') compost = Math.min(10, compost + 1);
    if (p.crop === 'marigold') bugs = Math.min(7, bugs + 1);
    p.crop = null;
    p.growth = 0;
    p.health = 1;
    p.soil = clamp(p.soil + 0.05, 0, 1);
    p.pests = clamp(p.pests - 0.08, 0, 1);
    actionFeedback(i, '#f5d66f', 'msg_harvest');
    GF.juice.floatText(plotCenter(i).x, plotCenter(i).y - 28 * scene.ui, '+' + String(value), { color: '#fff0a2', size: 18, life: 0.9, rise: 42 });
    GF.sfx('reward');
    if (harvest >= targetHarvest) completeSeason();
    scheduleSave();
    return true;
  }
  return false;
}

function refillDailyResources() {
  movesLeft = Math.max(3, DAILY_MOVES - Math.floor(Math.max(0, season - 1) / 4));
  var marigolds = 0, beans = 0;
  for (var i = 0; i < plots.length; i++) {
    if (plots[i].crop === 'marigold') marigolds++;
    if (plots[i].crop === 'bean') beans++;
  }
  water = Math.min(11, water + Math.max(2, 5 - Math.floor(season / 3)));
  compost = Math.min(10, compost + 1 + (beans >= 2 ? 1 : 0));
  bugs = Math.min(7, bugs + (marigolds >= 2 ? 2 : 1));
}

function endDay() {
  if (gs !== 'PLAYING' || pendingSeasonAdvance) return;
  simulateDay();
  maybeAdvanceCoach('end_day');
  if (gs !== 'PLAYING') {
    scheduleSave();
    return;
  }
  if (harvest >= targetHarvest) {
    completeSeason();
    scheduleSave();
    return;
  }
  seasonDay++;
  if (seasonDay > SEASON_DAYS && harvest < targetHarvest) {
    gameOver('reason_target');
  } else {
    refillDailyResources();
    showMessage('coach_done', '#e8f5a4');
  }
  GF.sfx('click');
  scheduleSave();
}

function simulateDay() {
  var stress = 0;
  var cropCount = 0;
  var avgHealth = 0;
  var avgSoil = 0;
  var pestSnapshot = plots.map(function(p) { return p.pests; });
  for (var i = 0; i < plots.length; i++) {
    var p = plots[i];
    p.flash = Math.max(p.flash, 0.28);
    if (!p.crop) {
      p.moisture = clamp(p.moisture - 0.10 - (p.drought ? 0.06 : 0), 0, 1);
      p.soil = clamp(p.soil + 0.015, 0, 1);
      p.pests = clamp(p.pests - 0.04, 0, 1);
      continue;
    }
    cropCount++;
    var crop = CROPS[p.crop];
    var comp = companionScore(i);
    var droughtPenalty = p.drought ? 0.08 : 0;
    p.moisture = clamp(p.moisture - 0.15 - droughtPenalty - season * 0.006, 0, 1);
    p.soil = clamp(p.soil - crop.soilUse + comp * 0.08, 0, 1);
    var moistureStress = p.moisture < 0.24 ? (0.24 - p.moisture) * 1.35 : p.moisture > 0.82 ? (p.moisture - 0.82) * 1.2 : 0;
    var soilStress = p.soil < 0.28 ? (0.28 - p.soil) * 1.1 : 0;
    var neighborPests = 0;
    var ns = neighbors(i);
    for (var n = 0; n < ns.length; n++) neighborPests += pestSnapshot[ns[n]] * 0.22;
    var seasonPressure = PEST_SPREAD_BASE + season * 0.018;
    var pestRise = seasonPressure + crop.pestRisk + neighborPests - comp * 0.34;
    if (season >= 3 && p.moisture > 0.80) pestRise += 0.13;
    if (season >= 5 && p.moisture > 0.72 && p.soil < 0.38) pestRise += 0.16;
    if (i % GRID_COLS === 0 || i % GRID_COLS === GRID_COLS - 1) pestRise += 0.05;
    p.pests = clamp(p.pests + pestRise * 0.28, 0, 1);
    var pestStress = Math.max(0, p.pests - 0.34) * 0.32;
    p.health = clamp(p.health + comp * 0.10 + p.soil * 0.035 - moistureStress - soilStress - pestStress, 0, 1);
    if (p.health > 0.18) {
      p.growth = clamp(p.growth + crop.grow * (0.55 + p.health * 0.65 + p.soil * 0.20) * (1 + comp * 0.24), 0, 1.18);
    }
    if (p.health < 0.28 || p.pests > 0.76 || p.soil < 0.12) stress++;
    avgHealth += p.health;
    avgSoil += p.soil;
  }
  if (cropCount > 0) {
    avgHealth /= cropCount;
    avgSoil /= cropCount;
  }
  var badDay = false;
  if (cropCount === 0) badDay = true;
  if (stress >= Math.max(3, Math.ceil(cropCount * 0.45))) badDay = true;
  if (cropCount > 0 && (avgHealth < 0.35 || avgSoil < 0.22)) badDay = true;
  if (badDay) addStrike();
  else if (failStrikes > 0 && avgHealth > 0.72 && avgSoil > 0.48) failStrikes--;
}

function addStrike() {
  if (!tutorialDone && !screenshotMode) return;
  failStrikes++;
  GF.juice.shake(11, 260);
  GF.juice.flash('#d05b45', 140, 0.20);
  GF.sfx('hurt');
  showMessage('strikes', '#f6a7a0');
  if (failStrikes >= MAX_FAIL_STRIKES) gameOver('reason_strikes');
}

function completeSeason() {
  if (pendingSeasonAdvance || gs !== 'PLAYING') return;
  pendingSeasonAdvance = true;
  seasonCompleteTimer = 1.7;
  score += 90 + season * 35 + Math.max(0, SEASON_DAYS - seasonDay) * 12;
  updateBest();
  GF.juice.particles.burst(GF.cx, scene.board.y + scene.board.h * 0.28, { count: 52, colors: ['#f5d66f', '#72c66d', '#f09e45', '#ffffff'], speed: 230, gravity: 150, size: 5, life: 0.9 });
  GF.juice.floatText(GF.cx, scene.board.y + scene.board.h * 0.22, GF.t('msg_season'), { color: '#fff0a2', size: 22, life: 1.2, rise: 46 });
  GF.sfx('levelup');
  scheduleSave();
}

function advanceSeason() {
  season++;
  bestSeason = Math.max(bestSeason, season);
  seasonDay = 1;
  harvest = 0;
  targetHarvest = targetForSeason(season);
  failStrikes = Math.max(0, failStrikes - 1);
  movesLeft = Math.max(3, DAILY_MOVES - Math.floor(Math.max(0, season - 1) / 4));
  water = START_WATER + Math.max(0, 3 - Math.floor(season / 3));
  compost = START_COMPOST + Math.floor(season / 2);
  bugs = START_BUGS + Math.floor(season / 3);
  selectedAction = 'tomato';
  selectedPlot = cellIndex(2, 1);
  pendingSeasonAdvance = false;
  seasonCompleteTimer = 0;
  initBoard(season);
  showMessage('msg_season', '#fff0a2');
  scheduleSave();
}

function gameOver(reason) {
  gs = 'GAMEOVER';
  gameOverReason = reason || 'reason_strikes';
  updateBest();
  GF.juice.shake(16, 380);
  GF.juice.flash('#7c2f26', 260, 0.34);
  GF.sfx('lose');
  GF.gameEnded();
  scheduleSave();
}

function update(dt) {
  GF.juice.update(dt);
  if (document.hidden) return;
  var gdt = dt * GF.juice.timeScale;
  if (message.t > 0) message.t -= dt;
  for (var i = 0; i < plots.length; i++) {
    plots[i].flash = Math.max(0, plots[i].flash - gdt * 2.5);
  }
  if (pendingSeasonAdvance) {
    seasonCompleteTimer -= dt;
    if (seasonCompleteTimer <= 0) advanceSeason();
  }
  if (autoSaveDelay > 0) {
    autoSaveDelay -= dt;
    if (autoSaveDelay <= 0) saveNow();
  }
}

function drawBackground(c) {
  var W = GF.W, H = GF.H;
  var grad = c.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1d331b');
  grad.addColorStop(0.48, '#263f1e');
  grad.addColorStop(1, '#1b2415');
  c.fillStyle = grad;
  c.fillRect(0, 0, W, H);
  var ui = scene.ui;
  c.fillStyle = 'rgba(236,208,122,0.08)';
  for (var i = 0; i < 15; i++) {
    var x = (i * 97 % Math.max(1, W)) + Math.sin(i + season) * 12 * ui;
    var y = (i * 53 % Math.max(1, H));
    c.beginPath();
    c.ellipse(x, y, 28 * ui, 7 * ui, (i % 4) * 0.7, 0, Math.PI * 2);
    c.fill();
  }
  c.fillStyle = 'rgba(74,44,22,0.55)';
  roundRect(c, scene.board.x - 12 * ui, scene.board.y - 12 * ui, scene.board.w + 24 * ui, scene.board.h + 24 * ui, 18 * ui);
  c.fill();
  c.fillStyle = 'rgba(34,77,43,0.42)';
  roundRect(c, 8 * ui, scene.topH - 6 * ui, W - 16 * ui, H - scene.topH + 2 * ui, 20 * ui);
  c.fill();
}

function drawHUD(c) {
  var ui = scene.ui;
  var W = GF.W;
  c.fillStyle = 'rgba(12,22,12,0.80)';
  c.fillRect(0, 0, W, scene.topH);
  c.strokeStyle = 'rgba(255,255,255,0.10)';
  c.beginPath();
  c.moveTo(0, scene.topH);
  c.lineTo(W, scene.topH);
  c.stroke();
  fitText(c, GF.t('title'), 12 * ui, 18 * ui, Math.max(92 * ui, W * 0.42), fs(15), '#f4e9c2', 'left', '850');
  drawText(c, GF.t('season') + ' ' + String(season) + '  ' + GF.t('day') + ' ' + String(seasonDay) + '/' + String(SEASON_DAYS), 12 * ui, 43 * ui, fs(12), '#b8dca2', 'left', '750');
  drawText(c, GF.t('score') + ' ' + String(score) + '  ' + GF.t('best') + ' ' + String(best), 12 * ui, 64 * ui, fs(11), '#abc7a1', 'left', '650');

  var barX = Math.max(136 * ui, W * 0.34);
  var barW = Math.max(86 * ui, W - barX - 106 * ui);
  var barY = 28 * ui;

  roundRect(c, barX, barY, barW, 15 * ui, 8 * ui);

  c.fillStyle = '#f0c95a';
  roundRect(c, barX, barY, barW * clamp(harvest / Math.max(1, targetHarvest), 0, 1), 15 * ui, 8 * ui);
  c.fill();
  fitText(c, GF.t('harvest') + ' ' + String(harvest) + '/' + String(targetHarvest), barX + barW / 2, barY + 8 * ui, barW - 6 * ui, fs(10), '#162113', 'center', '850');
  fitText(c, GF.t('moves') + ' ' + String(movesLeft) + '  ' + GF.t('strikes') + ' ' + String(failStrikes) + '/' + String(MAX_FAIL_STRIKES), barX + barW / 2, barY + 30 * ui, barW, fs(11), '#e7f0c9', 'center', '750');

  var r = scene.help;
  c.fillStyle = 'rgba(244,227,160,0.16)';
  roundRect(c, r.x, r.y, r.w, r.h, 9 * ui);
  c.fill();
  drawText(c, '?', r.x + r.w / 2, r.y + r.h / 2 + 1 * ui, fs(18), '#fff0a2', 'center', '900');
  r = scene.mute;
  c.fillStyle = 'rgba(244,227,160,0.12)';
  roundRect(c, r.x, r.y, r.w, r.h, 9 * ui);
  c.fill();
  drawMuteGlyph(c, r.x + r.w / 2, r.y + r.h / 2, r.w * 0.58);

  var resY = 78 * ui;
  var res = GF.t('water') + ' ' + String(water) + '  ' + GF.t('compost') + ' ' + String(compost) + '  ' + GF.t('bugs') + ' ' + String(bugs);
  fitText(c, res, W / 2, resY, W - 22 * ui, fs(11), '#dceec5', 'center', '700');
}

function drawMuteGlyph(c, x, y, s) {
  c.save();
  c.strokeStyle = GF.muted ? '#ef9f89' : '#dceec5';
  c.fillStyle = GF.muted ? '#ef9f89' : '#dceec5';
  c.lineWidth = Math.max(1.5, s * 0.10);
  c.beginPath();
  c.moveTo(x - s * 0.40, y - s * 0.16);
  c.lineTo(x - s * 0.20, y - s * 0.16);
  c.lineTo(x + s * 0.06, y - s * 0.36);
  c.lineTo(x + s * 0.06, y + s * 0.36);
  c.lineTo(x - s * 0.20, y + s * 0.16);
  c.lineTo(x - s * 0.40, y + s * 0.16);
  c.closePath();
  c.fill();
  if (GF.muted) {
    c.beginPath();
    c.moveTo(x + s * 0.22, y - s * 0.26);
    c.lineTo(x + s * 0.48, y + s * 0.26);
    c.moveTo(x + s * 0.48, y - s * 0.26);
    c.lineTo(x + s * 0.22, y + s * 0.26);
    c.stroke();
  } else {
    c.beginPath();
    c.arc(x + s * 0.13, y, s * 0.25, -0.7, 0.7);
    c.stroke();
    c.beginPath();
    c.arc(x + s * 0.18, y, s * 0.43, -0.65, 0.65);
    c.stroke();
  }
  c.restore();
}

function drawBoard(c) {
  var ui = scene.ui;
  for (var i = 0; i < plots.length; i++) {
    drawPlot(c, i);
  }
  c.strokeStyle = 'rgba(255,255,255,0.22)';
  c.lineWidth = Math.max(1, 1.5 * ui);
  roundRect(c, scene.board.x, scene.board.y, scene.board.w, scene.board.h, 12 * ui);
  c.stroke();
}

function drawPlot(c, i) {
  var ui = scene.ui;
  var p = plots[i];
  var r = plotRect(i);
  var pad = 3 * ui;
  c.save();
  var sc = p.scale || 1;
  c.translate(r.x + r.w / 2, r.y + r.h / 2);
  c.scale(sc, sc);
  c.translate(-(r.x + r.w / 2), -(r.y + r.h / 2));
  var soilHue = Math.round(46 + p.soil * 22);
  c.fillStyle = 'hsl(' + soilHue + ', 42%, ' + Math.round(22 + p.soil * 18) + '%)';
  roundRect(c, r.x + pad, r.y + pad, r.w - pad * 2, r.h - pad * 2, 9 * ui);
  c.fill();
  if (p.drought) {
    c.strokeStyle = 'rgba(240,205,115,0.28)';
    c.lineWidth = 1 * ui;
    for (var d = 0; d < 3; d++) {
      c.beginPath();
      c.moveTo(r.x + (14 + d * 16) * ui, r.y + 12 * ui);
      c.lineTo(r.x + (24 + d * 17) * ui, r.y + r.h - 12 * ui);
      c.stroke();
    }
  }
  c.fillStyle = 'rgba(255,255,255,' + String(0.10 + p.flash * 0.18) + ')';
  roundRect(c, r.x + pad, r.y + pad, r.w - pad * 2, r.h - pad * 2, 9 * ui);
  c.fill();
  drawCrop(c, p, r);
  drawPlotBars(c, p, r);
  drawPests(c, p, r);
  if (i === selectedPlot) {
    c.strokeStyle = '#fff0a2';
    c.lineWidth = 2.5 * ui;
    roundRect(c, r.x + 3 * ui, r.y + 3 * ui, r.w - 6 * ui, r.h - 6 * ui, 10 * ui);
    c.stroke();
  }
  c.restore();
}

function drawCrop(c, p, r) {
  var ui = scene.ui;
  var x = r.x + r.w / 2;
  var y = r.y + r.h * 0.46;
  var s = Math.min(r.w, r.h) * (0.30 + clamp(p.growth, 0, 1) * 0.17);
  if (!p.crop) {
    c.fillStyle = 'rgba(255,255,255,0.08)';
    c.beginPath();
    c.ellipse(x, y + 5 * ui, s * 0.45, s * 0.18, 0, 0, Math.PI * 2);
    c.fill();
    return;
  }
  c.save();
  c.globalAlpha = 0.45 + p.health * 0.55;
  if (p.crop === 'tomato') drawTomatoPlant(c, x, y, s);
  if (p.crop === 'bean') drawBeanPlant(c, x, y, s);
  if (p.crop === 'marigold') drawMarigold(c, x, y, s);
  if (p.growth >= 1) {
    c.strokeStyle = 'rgba(255,245,160,0.78)';
    c.lineWidth = Math.max(1, 1.8 * ui);
    c.beginPath();
    c.arc(x, y, s * 0.74, 0, Math.PI * 2);
    c.stroke();
  }
  c.restore();
}

function drawLeaf(c, x, y, w, h, a, color) {
  c.save();
  c.translate(x, y);
  c.rotate(a);
  c.fillStyle = color;
  c.beginPath();
  c.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
  c.fill();
  c.restore();
}

function drawTomatoPlant(c, x, y, s) {
  c.strokeStyle = '#3d873e';
  c.lineWidth = Math.max(2, s * 0.08);
  c.beginPath();
  c.moveTo(x, y + s * 0.52);
  c.lineTo(x, y - s * 0.35);
  c.stroke();
  drawLeaf(c, x - s * 0.20, y - s * 0.06, s * 0.23, s * 0.11, -0.55, '#4fa34d');
  drawLeaf(c, x + s * 0.22, y - s * 0.18, s * 0.24, s * 0.12, 0.48, '#5bb75c');
  c.fillStyle = '#d9493d';
  for (var i = 0; i < 3; i++) {
    c.beginPath();
    c.arc(x + (i - 1) * s * 0.19, y + s * (0.05 + i * 0.03), s * 0.13, 0, Math.PI * 2);
    c.fill();
  }
}

function drawBeanPlant(c, x, y, s) {
  c.strokeStyle = '#3d8d4e';
  c.lineWidth = Math.max(2, s * 0.07);
  c.beginPath();
  c.moveTo(x - s * 0.24, y + s * 0.50);
  c.bezierCurveTo(x + s * 0.16, y + s * 0.24, x - s * 0.05, y - s * 0.08, x + s * 0.20, y - s * 0.42);
  c.stroke();
  drawLeaf(c, x - s * 0.12, y + s * 0.02, s * 0.21, s * 0.11, -0.35, '#61b96e');
  drawLeaf(c, x + s * 0.13, y - s * 0.18, s * 0.20, s * 0.10, 0.35, '#73c97d');
  c.fillStyle = '#7fd06e';
  c.beginPath();
  c.ellipse(x + s * 0.16, y + s * 0.10, s * 0.08, s * 0.24, -0.32, 0, Math.PI * 2);
  c.fill();
}

function drawMarigold(c, x, y, s) {
  c.strokeStyle = '#3f8a45';
  c.lineWidth = Math.max(2, s * 0.06);
  c.beginPath();
  c.moveTo(x, y + s * 0.50);
  c.lineTo(x, y - s * 0.12);
  c.stroke();
  for (var i = 0; i < 8; i++) {
    var a = i / 8 * Math.PI * 2;
    c.fillStyle = i % 2 ? '#f5b148' : '#e88534';
    c.beginPath();
    c.ellipse(x + Math.cos(a) * s * 0.19, y - s * 0.18 + Math.sin(a) * s * 0.19, s * 0.12, s * 0.20, a, 0, Math.PI * 2);
    c.fill();
  }
  c.fillStyle = '#7b4d20';
  c.beginPath();
  c.arc(x, y - s * 0.18, s * 0.15, 0, Math.PI * 2);
  c.fill();
}

function drawPlotBars(c, p, r) {
  var ui = scene.ui;
  var x = r.x + 8 * ui;
  var y = r.y + r.h - 18 * ui;
  var w = r.w - 16 * ui;
  drawMiniBar(c, x, y, w, 4.5 * ui, p.moisture, '#55bde5');
  drawMiniBar(c, x, y + 6 * ui, w, 4.5 * ui, p.soil, '#84c66b');
  drawMiniBar(c, x, y + 12 * ui, w, 4.5 * ui, p.health, '#f4e9c2');
}

function drawMiniBar(c, x, y, w, h, value, color) {
  c.fillStyle = 'rgba(0,0,0,0.22)';
  roundRect(c, x, y, w, h, h / 2);
  c.fill();
  c.fillStyle = color;
  roundRect(c, x, y, w * clamp(value, 0, 1), h, h / 2);
  c.fill();
}

function drawPests(c, p, r) {
  if (p.pests <= 0.12) return;
  var ui = scene.ui;
  var count = Math.min(6, Math.ceil(p.pests * 6));
  var label = season >= 5 && p.moisture > 0.70 && p.soil < 0.42 ? 'rot' : season >= 3 && p.moisture > 0.80 ? 'slugs' : 'aphids';
  for (var i = 0; i < count; i++) {
    var x = r.x + r.w * (0.18 + ((i * 37) % 62) / 100);
    var y = r.y + r.h * (0.20 + ((i * 29) % 48) / 100);
    if (label === 'aphids') {
      c.fillStyle = '#30251d';
      c.beginPath();

function drawCards(c) {
  var ui = scene.ui;
  for (var i = 0; i < scene.cards.length; i++) {
    var card = scene.cards[i];
    var action = ACTIONS[i];
    var active = selectedAction === action.id;

    if (action.id === 'water') disabled = water <= 0;
    if (action.id === 'compost') disabled = compost <= 0;
    if (action.id === 'bugs') disabled = bugs <= 0;
    c.fillStyle = action.id === 'end_day' ? '#e2bc5a' : active ? '#f1df9a' : 'rgba(244,233,194,0.14)';

    c.lineWidth = active ? 2 * ui : 1 * ui;
    c.stroke();

      c.fillStyle = 'rgba(20,20,20,0.42)';
      roundRect(c, card.x, card.y, card.w, card.h, 9 * ui);
      c.fill();

    drawActionIcon(c, action.id, card.x + 18 * ui, card.y + card.h / 2, Math.min(card.h * 0.48, 22 * ui));

  } else if (id === 'compost') {
    c.fillStyle = '#8d6138';

    c.fillStyle = '#78b861';

  } else if (id === 'bugs') {

    c.beginPath(); c.arc(x, y, s * 0.48, 0, Math.PI * 2); c.fill();

    c.beginPath(); c.moveTo(x, y - s * 0.46); c.lineTo(x, y + s * 0.46); c.stroke();
    c.fillStyle = '#241b18';

  } else if (id === 'harvest') {

    c.fillStyle = '#d69545'; roundRect(c, x - s * 0.52, y, s * 1.04, s * 0.44, s * 0.16); c.fill();
  } else if (id === 'end_day') {
    c.fillStyle = '#20190d';

    c.beginPath(); c.moveTo(x - s * 0.12, y - s * 0.28); c.lineTo(x + s * 0.30, y); c.lineTo(x - s * 0.12, y + s * 0.28); c.closePath(); c.fill();

function hitRect(r, x, y) {
  return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}

function handleTap(x, y) {
  layout();
  if (helpOpen) {
    if (hitRect(scene.helpClose, x, y)) {
      helpOpen = false;
      GF.sfx('click');
      scheduleSave();
      return true;
    }
    return true;
  }
  if (gs === 'GAMEOVER') {
    if (hitRect(scene.retry, x, y)) {
      tutorialDone = true;
      startGame({ suppressTutorial: true });
      GF.sfx('click');
      return true;
    }
    return true;
  }
  if (hitRect(scene.help, x, y)) {
    helpOpen = true;
    GF.sfx('click');
    return true;
  }
  if (hitRect(scene.mute, x, y)) {
    GF.toggleMute();
    GF.sfx('click');
    return true;
  }
  for (var i = 0; i < scene.cards.length; i++) {
    if (hitRect(scene.cards[i], x, y)) {
      var id = scene.cards[i].id;
      if (id === 'end_day') endDay();
      else selectAction(id);
      return true;
    }
  }
  var pi = plotAt(x, y);
  if (pi >= 0) {
    var ok = applyActionToPlot(pi);
    if (ok && selectedAction === 'water') {
      pointerWatering = true;
      pointerVisited[pi] = true;
    }
    return true;
  }
  return false;
}

function onPointerDown(e) {
  e.preventDefault();
  pointerWatering = false;
  pointerVisited = {};
  handleTap(e.clientX, e.clientY);
}

function onPointerMove(e) {
  if (!pointerWatering || selectedAction !== 'water') return;
  e.preventDefault();
  var pi = plotAt(e.clientX, e.clientY);
  if (pi >= 0 && !pointerVisited[pi]) {
    pointerVisited[pi] = true;
    applyActionToPlot(pi);
  }
}

function onPointerUp(e) {
  e.preventDefault();
  pointerWatering = false;
}

function onKeyDown(e) {
  if (e.code === 'KeyF') {
    if (!document.fullscreenElement && GF.canvas.requestFullscreen) GF.canvas.requestFullscreen();
    else if (document.exitFullscreen) document.exitFullscreen();
    return;
  }
  if (gs === 'GAMEOVER') {
    if (e.code === 'Space' || e.code === 'Enter') startGame({ suppressTutorial: true });
    return;
  }
  var n = parseInt(e.key, 10);
  if (n >= 1 && n <= ACTIONS.length) {
    var id = ACTIONS[n - 1].id;
    if (id === 'end_day') endDay();
    else selectAction(id);
    return;
  }
  var p = plotXY(selectedPlot);
  if (e.code === 'ArrowLeft') p.x = Math.max(0, p.x - 1);
  else if (e.code === 'ArrowRight') p.x = Math.min(GRID_COLS - 1, p.x + 1);
  else if (e.code === 'ArrowUp') p.y = Math.max(0, p.y - 1);
  else if (e.code === 'ArrowDown') p.y = Math.min(GRID_ROWS - 1, p.y + 1);
  else if (e.code === 'Space') applyActionToPlot(selectedPlot);
  else if (e.code === 'Enter') endDay();
  selectedPlot = cellIndex(p.x, p.y);
}

function botFindEmpty(prefer) {
  for (var i = 0; i < plots.length; i++) if (!plots[i].crop && (!prefer || prefer(i))) return i;
  for (var j = 0; j < plots.length; j++) if (!plots[j].crop) return j;
  return 0;
}

function botFindNeed(kind) {
  var bestI = 0, bestV = -99;
  for (var i = 0; i < plots.length; i++) {
    var p = plots[i];
    var v = -99;
    if (kind === 'water') v = p.crop ? 1 - p.moisture : -1;
    if (kind === 'compost') v = p.crop ? 1 - p.soil : -1;
    if (kind === 'bugs') v = p.pests;
    if (kind === 'harvest') v = p.crop && p.growth >= 1 ? p.growth + p.health : -1;
    if (v > bestV) { bestV = v; bestI = i; }
  }
  return bestI;
}

function botActions() {
  if (gs === 'GAMEOVER') return ['retry'];
  if (pendingSeasonAdvance) return ['wait'];
  var a = ['plant_tomato', 'plant_bean', 'plant_marigold', 'water_dry', 'compost_low', 'bugs_pest', 'harvest_ready', 'end_day', 'wait'];
  if (season < 5) a.push('jump_late');
  return a;
}

function botAct(action) {
  if (action === 'retry') { startGame({ suppressTutorial: true }); return true; }
  if (action === 'wait') { window.advanceTime(900); return true; }
  if (action === 'jump_late') { setupForScreenshot(5); return true; }
  if (action === 'end_day') { endDay(); return true; }
  if (action === 'plant_tomato') { selectedAction = 'tomato'; return applyActionToPlot(botFindEmpty()); }
  if (action === 'plant_bean') { selectedAction = 'bean'; return applyActionToPlot(botFindEmpty()); }
  if (action === 'plant_marigold') { selectedAction = 'marigold'; return applyActionToPlot(botFindEmpty()); }
  if (action === 'water_dry') { selectedAction = 'water'; return applyActionToPlot(botFindNeed('water')); }
  if (action === 'compost_low') { selectedAction = 'compost'; return applyActionToPlot(botFindNeed('compost')); }
  if (action === 'bugs_pest') { selectedAction = 'bugs'; return applyActionToPlot(botFindNeed('bugs')); }
  if (action === 'harvest_ready') { selectedAction = 'harvest'; return applyActionToPlot(botFindNeed('harvest')); }
  return false;
}

function stateObject() {
  return {
    gs: gs,
    score: score,
    best: best,
    bestSeason: bestSeason,
    season: season,
    seasonDay: seasonDay,
    harvest: harvest,
    totalHarvest: totalHarvest,
    targetHarvest: targetHarvest,
    movesLeft: movesLeft,
    water: water,
    compost: compost,
    bugs: bugs,
    failStrikes: failStrikes,
    selectedAction: selectedAction,
    selectedPlot: selectedPlot,
    pendingSeasonAdvance: pendingSeasonAdvance,
    cropCount: plots.filter(function(p) { return !!p.crop; }).length,
    matureCount: plots.filter(function(p) { return p.crop && p.growth >= 1; }).length,
    pestAverage: Math.round(plots.reduce(function(s, p) { return s + p.pests; }, 0) / plots.length * 100) / 100,
    soilAverage: Math.round(plots.reduce(function(s, p) { return s + p.soil; }, 0) / plots.length * 100) / 100
  };
}

function renderText() {
  var visible = plots.map(function(p, i) {
    if (!p.crop && p.pests < 0.2) return null;
    var xy = plotXY(i);
    return {
      plot: [xy.x, xy.y],
      crop: p.crop || 'empty',
      growth: Math.round(p.growth * 100),
      moisture: Math.round(p.moisture * 100),
      soil: Math.round(p.soil * 100),
      pests: Math.round(p.pests * 100),
      health: Math.round(p.health * 100)
    };
  }).filter(Boolean);
  return JSON.stringify({
    title: GF.t('title'),
    coordinateSystem: 'plot coordinates use [col,row], origin top-left, x right, y down',
    state: stateObject(),
    visiblePlots: visible,
    actions: ACTIONS.map(function(a) { return a.id; })
  });
}

function setupForScreenshot(level) {
  screenshotMode = true;
  tutorialDone = true;
  coachStep = 99;
  helpOpen = false;
  gs = 'PLAYING';
  season = Math.max(1, Number(level) || 5);
  seasonDay = Math.min(SEASON_DAYS, 3 + Math.floor(season / 2));
  targetHarvest = targetForSeason(season);
  harvest = Math.max(4, Math.floor(targetHarvest * 0.62));
  totalHarvest = harvest + season * 6;
  score = 480 + season * 160;
  movesLeft = DAILY_MOVES;
  water = 6;
  compost = 5;
  bugs = 3;
  failStrikes = 1;
  selectedAction = 'harvest';
  selectedPlot = cellIndex(2, 1);
  pendingSeasonAdvance = false;
  seasonCompleteTimer = 0;
  initBoard(season);
  var crops = ['tomato', 'bean', 'marigold', 'tomato', 'bean', 'marigold', 'tomato', 'bean'];
  for (var i = 0; i < crops.length; i++) {
    plots[i + 3].crop = crops[i];
    plots[i + 3].growth = i % 3 === 0 ? 1.04 : 0.62 + i * 0.04;
    plots[i + 3].soil = 0.35 + (i % 4) * 0.12;
    plots[i + 3].moisture = 0.30 + (i % 5) * 0.12;
    plots[i + 3].pests = i % 4 === 0 ? 0.72 : 0.18 + (i % 3) * 0.11;
    plots[i + 3].health = 0.52 + (i % 4) * 0.11;
  }
  showMessage('coach_done', '#e8f5a4');
}

  onReady: function() {
    var loaded = GF.persist(SAVE_KEY, stateForSave, applySave);
    GF.bgMusic({ file: 'audio/bg_track.mp3', preset: 'calm', muted: GF.muted });
    if (!started) {
      started = true;
      if (!loaded || gs !== 'PLAYING' || !plots.length) startGame({ suppressTutorial: !!(window.__GF_AUTOSTART && !window._silent) });
      else GF.gameStarted();
    }
  },
  onUpdate: update,
  onDraw: draw
});

})();
</script>
</body>
