<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bandlings</title>
  <link rel="icon" href="data:,">
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0c0716; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    #liveChatLayer {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
      background: rgba(8, 5, 16, 0.64);
      z-index: 5;
      pointer-events: auto;
      touch-action: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
    }
    #liveChatLayer.open { display: flex; }
    #liveChatPanel {
      width: min(460px, calc(100vw - 24px));
      max-height: min(76vh, 620px);
      display: grid;
      grid-template-rows: auto auto minmax(140px, 1fr) auto;
      gap: 10px;
      border: 1px solid rgba(255, 211, 77, 0.42);
      border-radius: 8px;
      background: #141027;
      box-shadow: 0 20px 46px rgba(0,0,0,0.48);
      padding: 12px;
      pointer-events: auto;
      touch-action: auto;
    }
    #liveChatHead { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    #liveChatTitle { font-size: 18px; font-weight: 800; line-height: 1.1; }
    #liveChatClose, #liveChatSend {
      border: 0;
      border-radius: 8px;
      background: #2ee07a;
      color: #062014;
      font-weight: 800;
      min-height: 42px;
      padding: 0 14px;
      cursor: pointer;
      touch-action: manipulation;
    }
    #liveChatClose { width: 42px; min-width: 42px; padding: 0; background: #473579; color: #fff; }
    #liveChatStatus { min-height: 18px; color: #a89fd6; font-size: 12px; line-height: 1.35; }
    #liveChatMessages {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      user-select: text;
      -webkit-user-select: text;
      touch-action: pan-y;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      padding: 10px;
    }
    .live-chat-msg { margin: 0 0 9px; font-size: 14px; line-height: 1.32; word-break: break-word; }
    .live-chat-name { color: #ffd34d; font-weight: 800; margin-right: 6px; }
    .live-chat-meta { color: #8d86b8; font-size: 11px; margin-left: 6px; white-space: nowrap; }
    #liveChatForm { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    #liveChatInput {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      background: #0c0716;
      color: #fff;
      font: 700 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 0 12px;
      outline: none;
      user-select: text;
      -webkit-user-select: text;
      touch-action: manipulation;
    }
    #liveChatInput:focus { border-color: #ffd34d; }
    @media (min-height: 720px) {
      #liveChatLayer { align-items: center; }
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="liveChatLayer" aria-hidden="true">
  <section id="liveChatPanel" role="dialog" aria-modal="true" aria-labelledby="liveChatTitle">
    <div id="liveChatHead">
      <div id="liveChatTitle">Live Chat</div>
      <button id="liveChatClose" type="button" aria-label="Close">X</button>
    </div>
    <div id="liveChatStatus"></div>
    <div id="liveChatMessages" aria-live="polite"></div>
    <form id="liveChatForm" autocomplete="off">
      <input id="liveChatInput" type="text" maxlength="80" inputmode="text">
      <button id="liveChatSend" type="submit">SEND</button>
    </form>
  </section>
</div>

  var evs = ['pointerdown', 'pointerup', 'touchstart', 'touchend', 'mousedown', 'click', 'keydown'];
  var fire = function () {
    bandBegin();
    if (band.ctx && band.ctx.state === 'running') {
      evs.forEach(function (ev) { document.removeEventListener(ev, fire, true); });
    }
  };
  evs.forEach(function (ev) { document.addEventListener(ev, fire, true); });
})();

// ── ECONOMY ──────────────────────────────────────────────────────────────

// unified cell addressing: 0..19 = stage, 100..103 = bench slots
function isBenchIdx(i) { return i >= 100; }
function getCell(i) { return isBenchIdx(i) ? bench[i - 100] : board[i]; }
function setCell(i, m) { if (isBenchIdx(i)) bench[i - 100] = m; else board[i] = m; }
function freeCells() { var n = 0; for (var i = 0; i < board.length; i++) if (!board[i]) n++; return n; }

function benchFree() { var n = 0; for (var i = 0; i < BENCH_SLOTS; i++) if (!bench[i]) n++; return n; }
function canMerge() {

  // a stage one, or TWO BENCH TWINS (one swap with any stage monster lines
  // them up - the stage is full whenever this gates gameOver, so a swap
  // target always exists). Counting, not flagging, catches the bench pair.
  var stageSeen = {}, benchSeen = {};
  for (var i = 0; i < board.length; i++) {
    var m = board[i]; if (!m) continue;
    if (m.egg) return true;
    stageSeen[m.sp + '_' + m.tier] = (stageSeen[m.sp + '_' + m.tier] || 0) + 1;
  }
  for (var b = 0; b < BENCH_SLOTS; b++) {
    var bm = bench[b]; if (!bm) continue;
    benchSeen[bm.sp + '_' + bm.tier] = (benchSeen[bm.sp + '_' + bm.tier] || 0) + 1;
  }
  for (var k in stageSeen) if (stageSeen[k] >= 2 || benchSeen[k]) return true;
  for (var k2 in benchSeen) if (benchSeen[k2] >= 2) return true;

}

function rollEggSpecies(rngShift) {
  // weighted toward the newest unlocked REGULAR species; daily seed shifts it
  var opts = [];
  for (var s = 0; s < REG_SPECIES; s++) if (meta.unlocked & (1 << s)) opts.push(s);
  if (opts.length === 1) return opts[0];
  var rng = mulberry((meta.seed ^ (uidSeq * 7349) ^ ((rngShift || 0) * 131071)) >>> 0);
  var r = rng();

// ── GACHA (remote-tunable odds, pity counter, rarity reveal) ─────────────

}

// Board name in Yandex Console: "score" (numeric, descending, default).

function yandexLeaderboards() {
  try {

    if (window.ysdk.getLeaderboards) return window.ysdk.getLeaderboards();
  } catch (e) {}

  var score = leaderboardScore();

  try {
    var boards = yandexLeaderboards();

      boards.then(function (lb) {
        return lb.setLeaderboardScore('score', score);
      }).catch(function () {});
    }
  } catch (e) {}
}
function fetchLeaderboard(force) {
  if (lbCache.state === 'loading') return;
  var now = Date.now();
  if (!force && lbCache.state === 'ready' && now - lbCache.t < 60000) return;
  var localRows = leaderboardScore() > 0 ? [{ rank: 1, name: t('lb_you'), score: leaderboardScore(), you: true }] : [];
  try {
    var boards = yandexLeaderboards();
    if (boards) {
      lbCache.state = 'loading';
      boards.then(function (lb) {
        return lb.getLeaderboardEntries('score', { quantityTop: 10, includeUser: true, quantityAround: 1 });
      }).then(function (res) {
        var rows = [];
        (res.entries || []).forEach(function (e) {
          rows.push({
            rank: e.rank,
            name: (e.player && e.player.publicName) || t('lb_you'),
            score: e.score || 0,
            you: !!(res.userRank && e.rank === res.userRank),
          });
        });
        lbCache = { state: 'ready', entries: rows.slice(0, 10), you: res.userRank || null, t: Date.now() };
      }).catch(function () {
        lbCache = { state: localRows.length ? 'local' : 'empty', entries: localRows, you: null, t: Date.now() };

// ── BAND CODES (structured share - zero UGC text, zero moderation surface) ──
// Format spec "B1": 'B1' + <seed base36> + '-' + monster triplets, each
// triplet = pos(base36 0..j) + species(base36 0..z) + tier(1..5). Stage
// monsters only (no eggs, no bench). Example: B1k3v9x-0a1453...
// Opens game-factory.tech/p/bandlings?band=<code> as a VIEW-ONLY concert.
function bandCode() {
  var parts = [];
  for (var i = 0; i < board.length; i++) {
    var m = board[i];
    if (!m || m.egg) continue;
    parts.push(i.toString(36) + m.sp.toString(36) + String(m.tier));
  }
  if (!parts.length) return null;
  return 'B1' + (meta.seed >>> 0).toString(36) + '-' + parts.join('');
}
function parseBandCode(code) {

  var trip = m[2];
  if (trip.length % 3 !== 0 || trip.length > 60) return null;
  var monsters = [];

    if (isNaN(pos) || isNaN(sp) || isNaN(tier)) return null;
    if (pos < 0 || pos >= CELLS || sp < 0 || sp >= SPECIES.length || tier < 1 || tier > 5) return null;
    monsters.push({ pos: pos, sp: sp, tier: tier });

  if (!monsters.length) return null;

}

// ── AUDIO EXPORT - "save my song" (OfflineAudioContext -> 16-bit wav) ─────
function exportSong() {
  if (exporting) return;
  var hasBand = false;
  for (var i = 0; i < board.length; i++) if (board[i] && !board[i].egg) { hasBand = true; break; }
  if (!hasBand) { toast(t('empty_band')); GF.sfx('error'); return; }
  var OAC = window.OfflineAudioContext || window.webkitOfflineAudioContext;
  if (!OAC) { toast(t('song_fail')); GF.sfx('error'); return; }
  toast(t('rendering'));
  exporting = true;
  var saved = { ctx: band.ctx, master: band.master };
  try {
    var sr = 44100;
    var total = barDur() * 8 + 1.2;
    var oc = new OAC(1, Math.ceil(sr * total), sr);
    var og = oc.createGain(); og.gain.value = 0.8; og.connect(oc.destination);
    // point the band voices at the offline graph, schedule one full 8-bar
    // loop synchronously, then restore the live graph (single-threaded JS:
    // the live scheduler interval cannot interleave with this block)
    band.ctx = oc; band.master = og; band._render = true;
    for (var bar = 0; bar < 8; bar++) {
      for (var step = 0; step < 16; step++) {
        scheduleStep(0.05 + bar * barDur() + step * stepDur(), step, bar);
      }
    }
    band.ctx = saved.ctx; band.master = saved.master; band._render = false;
    oc.startRendering().then(function (buf) {
      exporting = false;
      try { downloadWav(buf); toast(t('song_saved')); GF.sfx('reward'); }
      catch (e) { toast(t('song_fail')); GF.sfx('error'); }
    }, function () { exporting = false; toast(t('song_fail')); GF.sfx('error'); });
  } catch (e) {
    band.ctx = saved.ctx; band.master = saved.master; band._render = false;
    exporting = false;
    toast(t('song_fail')); GF.sfx('error');
  }
}
function downloadWav(buf) {
  var ch = buf.getChannelData(0), n = ch.length, sr = buf.sampleRate;
  var bytes = 44 + n * 2;
  var ab = new ArrayBuffer(bytes), dv = new DataView(ab);
  function wstr(off, s) { for (var i = 0; i < s.length; i++) dv.setUint8(off + i, s.charCodeAt(i)); }
  wstr(0, 'RIFF'); dv.setUint32(4, bytes - 8, true); wstr(8, 'WAVE');
  wstr(12, 'fmt '); dv.setUint32(16, 16, true); dv.setUint16(20, 1, true); dv.setUint16(22, 1, true);
  dv.setUint32(24, sr, true); dv.setUint32(28, sr * 2, true); dv.setUint16(32, 2, true); dv.setUint16(34, 16, true);
  wstr(36, 'data'); dv.setUint32(40, n * 2, true);
  for (var i = 0; i < n; i++) {
    var v = Math.max(-1, Math.min(1, ch[i]));
    dv.setInt16(44 + i * 2, v < 0 ? v * 0x8000 : v * 0x7FFF, true);
  }
  var blob = new Blob([ab], { type: 'audio/wav' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'bandlings-song.wav';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function () { try { URL.revokeObjectURL(url); } catch (e) {} }, 4000);
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  GF.tutorial.update(dt);
  // keep the band's mute synced with EVERY mute path (our button, CG platform
  // mute listener, persisted gf_muted) - GF.muted is the single source of truth.
  if (band._lastMuted !== GF.muted) { band._lastMuted = GF.muted; bandSetMuted(GF.muted); }
  if (gs !== 'PLAYING') return;
  var pulseSrc = preview ? pvBoard : board;
  // preview: band visuals run, the economy does NOT
  if (preview && preview.phase === 'play') {
    preview.t -= dt;
    if (preview.t <= 0) endPreview();
  }
  if (!preview && !viewOnly) {
    // concert income ticks on a dt accumulator (audio-clock independent, so a
    // muted / pre-gesture session still earns; hidden tab stops RAF = no accrual)
    barAcc += dt;
    var bd = barDur();
    if (barAcc >= bd) { barAcc -= bd; barPayout(); }
    if (payoutFlash > 0) payoutFlash = Math.max(0, payoutFlash - dt * 1.6);
    // playtime free-egg generator: every X minutes (remote knob) an egg banks
    // (capped at egg_cap); the player must watch a rewarded ad in the hub to
    // claim each banked egg (Yandex 4.4: ad on user-click only, never auto).
    if (!GF.tutorial.active) {
      if ((meta.starEggBank | 0) > 0 && freeCells() > 0) tryPlaceBankedStarEggs();
      var spanS = Math.max(30, (CFG.timer && CFG.timer.egg_minutes != null ? CFG.timer.egg_minutes : 5) * 60);
      var cap = Math.max(1, Math.round(CFG.timer && CFG.timer.egg_cap != null ? CFG.timer.egg_cap : 2));
      eggTimerAcc += dt;
      if (eggTimerAcc >= spanS) {
        if (eggBank < cap) { eggTimerAcc -= spanS; eggBank++; save(); }
        else eggTimerAcc = spanS;   // bank full: hold until claimed
      }
      // banked eggs no longer auto-spawn; player claims via adFreeEgg() in hub
      rareEggTimerAcc += dt;
      if (rareEggTimerAcc >= RARE_EGG_TIMER_S) {
        if (rareEggBank < 1) { rareEggTimerAcc = RARE_EGG_TIMER_S; rareEggBank = 1; toast(t('rare_egg_ready')); save(); }
        else rareEggTimerAcc = RARE_EGG_TIMER_S;
      }
    }
    // eggs auto-hatch (not during the tutorial - step 3 teaches the tap);
    // rare+ eggs route through the crack animation
    for (var i = 0; i < board.length; i++) {
      var m = board[i];
      if (!m || !m.egg) continue;
      if (m.crackT > 0) { m.crackT -= dt; if (m.crackT <= 0) { m.crackT = 0; finishHatch(i); } continue; }
      if (!GF.tutorial.active && Date.now() - m.hatchT > EGG_HATCH_MS) hatch(i);
    }
  }
  // pop-in animation decay (stage + bench)
  for (var j = 0; j < pulseSrc.length; j++) { var mm = pulseSrc[j]; if (mm && mm.pop > 0) mm.pop = Math.max(0, mm.pop - dt * 3); }
  for (var bj = 0; bj < BENCH_SLOTS; bj++) { var bmm = bench[bj]; if (bmm && bmm.pop > 0) bmm.pop = Math.max(0, bmm.pop - dt * 3); }
  // consume scheduled audio pulses -> visual bounce + eq
  if (band.ctx && band.on) {
    var now = band.ctx.currentTime;
    while (band.pulses.length && band.pulses[0].t <= now) {
      var p = band.pulses.shift();
      band.eqLevel[p.lane] = Math.max(band.eqLevel[p.lane], p.power);
      for (var k = 0; k < pulseSrc.length; k++) { var bm = pulseSrc[k]; if (bm && bm.uid === p.uid) { bm.pulse = 1; break; } }
    }
  }
  for (var e = 0; e < 5; e++) band.eqLevel[e] = Math.max(0, band.eqLevel[e] - dt * 2.2);
  for (var q = 0; q < pulseSrc.length; q++) { var pm = pulseSrc[q]; if (pm && pm.pulse > 0) pm.pulse = Math.max(0, pm.pulse - dt * 4); }
  for (var ti = toasts.length - 1; ti >= 0; ti--) { toasts[ti].life -= dt; if (toasts[ti].life <= 0) toasts.splice(ti, 1); }
  if (bookScroll) bookScroll.update();
}
function spawnTimerEgg() {
  var idx = firstFreeCell(); if (idx < 0) return;
  var m = gachaSpawn(rollRarity(), idx);
  if (m) {
    var c = cellCenter(idx);
    toast(t('crowd_egg')); GF.sfx('spawn');
    GF.spawnParticles(c.x, c.y, '#ffd34d', 10);
  }
  save();
}

      c.strokeStyle = '#1a1228'; c.lineWidth = Math.max(1, s * 0.03);
      for (i = 0; i < 3; i++) { c.beginPath(); c.moveTo(-s * 0.1, s * 0.0 + i * s * 0.045); c.lineTo(s * 0.1, s * 0.0 + i * s * 0.045); c.stroke(); }
    } else if (sp === 10) {    // STICKOLINI - singing wooden baton (special)

      GF.rr(c, -s * 0.13, -s * 0.52, s * 0.26, s * 0.94, s * 0.12); c.fill(); c.stroke();
      c.strokeStyle = spec.dark; c.lineWidth = Math.max(1, s * 0.035);
      for (i = 0; i < 4; i++) {
        c.beginPath(); c.moveTo(-s * 0.1, -s * 0.34 + i * s * 0.18); c.quadraticCurveTo(0, -s * 0.29 + i * s * 0.18, s * 0.1, -s * 0.34 + i * s * 0.18); c.stroke();
      }
      // little tapping feet
      c.fillStyle = spec.dark;
      c.beginPath(); c.ellipse(-s * 0.08, s * 0.48, s * 0.13, s * 0.045, -0.2, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.ellipse(s * 0.1, s * 0.48, s * 0.13, s * 0.045, 0.2, 0, Math.PI * 2); c.fill();
      drawFace(c, s * 0.85, 0, -s * 0.08);

      c.fillStyle = spec.glow;

      }

      c.beginPath(); c.ellipse(-s * 0.08, -s * 0.5, s * 0.11, s * 0.055, -0.6, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.ellipse(s * 0.08, -s * 0.5, s * 0.11, s * 0.055, 0.6, 0, Math.PI * 2); c.fill();

      c.beginPath(); c.moveTo(s * 0.03, -s * 0.22); c.lineTo(s * 0.12, -s * 0.48); c.lineTo(s * 0.23, -s * 0.2); c.closePath(); c.fill(); c.stroke();
      c.fillStyle = '#fff'; c.beginPath(); c.ellipse(s * 0.12, s * 0.06, s * 0.22, s * 0.08, -0.05, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#1a1228'; c.beginPath(); c.arc(s * 0.18, -s * 0.1, s * 0.035, 0, Math.PI * 2); c.fill();
      // oversized shoes
      c.fillStyle = '#ffffff'; c.strokeStyle = spec.dark;
      GF.rr(c, -s * 0.28, s * 0.27, s * 0.28, s * 0.14, s * 0.07); c.fill(); c.stroke();

      GF.rr(c, -s * 0.3, -s * 0.22, s * 0.6, s * 0.55, s * 0.11); c.fill(); c.stroke();
      c.strokeStyle = spec.dark; c.lineWidth = Math.max(1.5, s * 0.045);
      c.beginPath(); c.arc(s * 0.34, s * 0.02, s * 0.14, -Math.PI / 2, Math.PI / 2); c.stroke();

      c.beginPath(); c.arc(-s * 0.12, -s * 0.25, s * 0.13, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(s * 0.04, -s * 0.3, s * 0.16, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(s * 0.2, -s * 0.22, s * 0.11, 0, Math.PI * 2); c.fill();

      c.beginPath(); c.moveTo(-s * 0.16, -s * 0.36); c.quadraticCurveTo(-s * 0.3, -s * 0.52, -s * 0.14, -s * 0.55); c.stroke();
      c.beginPath(); c.moveTo(s * 0.16, -s * 0.36); c.quadraticCurveTo(s * 0.32, -s * 0.52, s * 0.16, -s * 0.55); c.stroke();
      drawFace(c, s * 0.8, 0, -s * 0.05);
      c.fillStyle = '#5a3318'; c.beginPath(); c.ellipse(0, s * 0.18, s * 0.18, s * 0.07, 0, 0, Math.PI * 2); c.fill();
    }
    c.restore();
  };
}

// ── DRAW ─────────────────────────────────────────────────────────────────
var bobT = 0;
function draw(ctx, dt) {
  bobT += (dt || 0.016);
  layout();
  drawStageBg(ctx);
  if (viewOnly) { drawGridAndMonsters(ctx); drawEq(ctx); drawViewChrome(ctx); drawToasts(ctx); return; }
  if (gs === 'MENU') { drawMenu(ctx); return; }
  if (gs === 'PLAYING' && preview) { drawGridAndMonsters(ctx); drawEq(ctx); drawPreviewBanner(ctx); return; }
  drawGridAndMonsters(ctx);
  drawEq(ctx);
  drawHUD(ctx);
  drawBottomBar(ctx);
  drawToasts(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
  if (bookOpen) drawBook(ctx);
  else if (lbOpen) drawLeaderboard(ctx);
  else if (chatOpen) drawChat(ctx);
  else if (hubOpen) drawHub(ctx);
  if (gs === 'PLAYING' && !hubOpen && !bookOpen && !lbOpen && !chatOpen && !liveChatOpen) GF.tutorial.draw(ctx);
}
function drawPreviewBanner(c) {
  c.save();
  var waiting = preview.phase === 'wait';
  var fs = GF.clamp(20 * GF.S, 15, 28);
  var ty = L.gridY - Math.max(26 * GF.S, 22);
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.shadowColor = 'rgba(180,140,255,0.6)'; c.shadowBlur = 16 * GF.S;
  c.font = 'bold ' + fs + 'px sans-serif'; c.fillStyle = '#fff';
  c.fillText(t('preview_title'), GF.cx, ty);
  c.shadowColor = 'transparent'; c.shadowBlur = 0;
  c.font = GF.clamp(13 * GF.S, 11, 17) + 'px sans-serif';
  c.fillStyle = '#ffd34d'; c.globalAlpha = 0.7 + 0.3 * Math.sin(bobT * 4);
  var hint = waiting ? t('preview_tap') : t('preview_skip');
  c.fillText(hint, GF.cx, L.benchY + L.benchSlot * 0.6);
  c.restore(); c.textBaseline = 'alphabetic';
}
function drawViewChrome(c) {
  viewBtns = [];

  drawBigBtn(c, r, t('build_own'), { primary: true });

  c.restore(); c.textBaseline = 'alphabetic';

function drawStageBg(c) {
  var W = GF.W, H = GF.H;
  var g = c.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a0d2e'); g.addColorStop(0.55, '#120a20'); g.addColorStop(1, '#0c0716');
  c.fillStyle = g; c.fillRect(0, 0, W, H);
  // spotlight cones
  c.save(); c.globalAlpha = 0.1 + 0.04 * Math.sin(bobT * 1.4);
  var cgx = L.gridX + L.gridW / 2;
  var spot = c.createRadialGradient(cgx, L.gridY + L.gridH * 0.4, 10, cgx, L.gridY + L.gridH * 0.4, L.gridW * 0.9);
  spot.addColorStop(0, '#b48cff'); spot.addColorStop(1, 'rgba(180,140,255,0)');
  c.fillStyle = spot; c.fillRect(0, 0, W, H);
  c.restore();
  // audience dots (bottom strip behind buttons)
  c.save(); c.globalAlpha = 0.35;
  var ay = H - Math.max(86 * GF.S, 70);
  for (var r = 0; r < 2; r++) {
    for (var i = 0; i < 14; i++) {
      var axp = (i + 0.5 + r * 0.5) * (W / 14.5);
      var bob = Math.sin(bobT * 2 + i * 1.7 + r) * 2 * GF.S;
      c.fillStyle = r === 0 ? '#241638' : '#1b1029';
      c.beginPath(); c.arc(axp, ay + r * 9 * GF.S + bob, (7 - r * 2) * GF.S, 0, Math.PI * 2); c.fill();
    }
  }
  c.restore();
  // side speakers on wide layouts so desktop frame looks intentional
  if (L.wide) {
    c.save(); c.globalAlpha = 0.85;
    var spW = Math.min((W - L.gridW) / 2 * 0.5, 130), spH = L.gridH * 0.7;
    var spY = L.gridY + L.gridH * 0.15;
    [{ x: L.gridX - spW - 24 }, { x: L.gridX + L.gridW + 24 }].forEach(function (sd) {
      c.fillStyle = '#171028'; GF.rr(c, sd.x, spY, spW, spH, 10); c.fill();
      c.strokeStyle = '#2c1f4a'; c.lineWidth = 2; GF.rr(c, sd.x, spY, spW, spH, 10); c.stroke();
      for (var k = 0; k < 2; k++) {
        var cyy = spY + spH * (0.3 + k * 0.42), rr0 = spW * 0.3;
        var amp = band.eqLevel[k === 0 ? 1 : 0] || 0;
        c.fillStyle = '#0d0818'; c.beginPath(); c.arc(sd.x + spW / 2, cyy, rr0, 0, Math.PI * 2); c.fill();
        c.strokeStyle = '#3a2a60'; c.beginPath(); c.arc(sd.x + spW / 2, cyy, rr0 * (0.55 + amp * 0.2), 0, Math.PI * 2); c.stroke();
      }

    c.restore();
  }
}
function drawGridAndMonsters(c) {
  // stage platform
  c.save();
  c.fillStyle = 'rgba(34,22,58,0.55)';
  GF.rr(c, L.gridX - 8 * GF.S, L.gridY - 8 * GF.S, L.gridW + 16 * GF.S, L.gridH + 16 * GF.S, 14 * GF.S); c.fill();
  c.strokeStyle = 'rgba(124,90,200,0.35)'; c.lineWidth = 2;
  GF.rr(c, L.gridX - 8 * GF.S, L.gridY - 8 * GF.S, L.gridW + 16 * GF.S, L.gridH + 16 * GF.S, 14 * GF.S); c.stroke();
  // cells
  for (var i = 0; i < CELLS; i++) {
    var col = i % COLS, row = (i / COLS) | 0;
    var x = L.gridX + col * L.cell, y = L.gridY + row * L.cell;
    c.fillStyle = (col + row) % 2 === 0 ? 'rgba(255,255,255,0.035)' : 'rgba(255,255,255,0.015)';
    GF.rr(c, x + 2, y + 2, L.cell - 4, L.cell - 4, 8 * GF.S); c.fill();
  }
  c.restore();
  // monsters + eggs (drawn at geometric cell centers)
  var src = preview ? pvBoard : board;
  for (var j = 0; j < CELLS; j++) {
    var m = src[j]; if (!m) continue;
    if (drag && drag.idx === j && drag.moved) continue;     // ghost drawn later
    var cc = cellCenter(j);
    drawMonsterAt(c, m, cc.x, cc.y, j === sel);
  }
  if (!preview && !viewOnly) drawBench(c);
  // drag ghost
  if (drag && drag.moved && getCell(drag.idx)) {
    c.save(); c.globalAlpha = 0.85;
    drawMonsterAt(c, getCell(drag.idx), drag.x, drag.y, true);
    c.restore();
  }
}
function drawBench(c) {

  var lfs = GF.clamp(10 * GF.S, 9, 13);
  c.font = 'bold ' + lfs + 'px sans-serif'; c.fillStyle = '#5b5480'; c.textAlign = 'right'; c.textBaseline = 'middle';
  if (benchRects.length) {
    var lw = c.measureText(t('bench')).width;
    if (benchRects[0].x - 10 - lw >= 4) c.fillText(t('bench'), benchRects[0].x - 10, benchRects[0].y + benchRects[0].h / 2);
  }
  c.textAlign = 'left'; c.textBaseline = 'alphabetic';
  for (var i = 0; i < BENCH_SLOTS; i++) {
    var r = benchRects[i];
    c.fillStyle = 'rgba(255,255,255,0.04)';
    GF.rr(c, r.x, r.y, r.w, r.h, 9 * GF.S); c.fill();
    c.strokeStyle = (100 + i) === sel ? '#ffeb3b' : 'rgba(124,90,200,0.4)'; c.lineWidth = (100 + i) === sel ? 2.5 : 1.5;

    GF.drawSprite(SPRITE_NAMES[m.sp], r.x + r.w / 2, r.y + r.h / 2, r.w * 0.72, drawSpeciesFallback(m.sp));
    c.restore();
    // tier pips (compact)
    c.fillStyle = TIER_COLORS[m.tier];
    var pw = 5 * GF.S, px = r.x + r.w / 2 - ((m.tier - 1) * pw) / 2;
    for (var p = 0; p < m.tier; p++) { c.beginPath(); c.arc(px + p * pw, r.y + r.h - 5 * GF.S, pw * 0.32, 0, Math.PI * 2); c.fill(); }

}
function drawMonsterAt(c, m, x, y, highlighted) {
  var base = L.cell * (0.52 + m.tier * 0.06);
  var bounce = m.pulse > 0 ? 1 + m.pulse * 0.13 : 1;
  var popIn = m.pop > 0 ? 1 - m.pop * 0.4 : 1;
  var s = base * bounce * popIn;
  var bob = Math.sin(bobT * 2.4 + m.uid * 1.31) * 2 * GF.S;
  if (m.egg) {
    // rarity aura ring + crack-shake anticipation
    var rar = m.rar | 0;
    if (rar > 0) {
      c.save();
      c.globalAlpha = 0.45 + 0.25 * Math.sin(bobT * 5 + m.uid);
      c.strokeStyle = RAR_COLORS[rar]; c.lineWidth = Math.max(2, 3 * GF.S);
      c.beginPath(); c.arc(x, y + bob, L.cell * 0.4, 0, Math.PI * 2); c.stroke();
      c.restore();
    }
    var wobble = bobT + m.uid + (m.crackT > 0 ? bobT * 14 : 0);   // cracking shakes hard
    drawEggShape(c, x, y + bob, L.cell * 0.62, m.sp, wobble);
    return;
  }
  // tier aura
  c.save();
  c.globalAlpha = 0.35 + m.pulse * 0.4;
  c.strokeStyle = TIER_COLORS[m.tier]; c.lineWidth = Math.max(2, 3 * GF.S);
  c.beginPath(); c.arc(x, y + bob, s * 0.56, 0, Math.PI * 2); c.stroke();
  c.restore();
  if (highlighted) {
    c.save(); c.strokeStyle = '#ffeb3b'; c.lineWidth = 3; c.globalAlpha = 0.8;
    c.beginPath(); c.arc(x, y + bob, s * 0.62, 0, Math.PI * 2); c.stroke(); c.restore();
  }
  GF.drawSprite(SPRITE_NAMES[m.sp], x, y + bob, s, drawSpeciesFallback(m.sp));
  // tier pips (vector diamonds)
  c.save();
  var pipW = 7 * GF.S, py = y + bob + s * 0.52;
  var px0 = x - ((m.tier - 1) * pipW) / 2;
  for (var p = 0; p < m.tier; p++) {
    c.fillStyle = TIER_COLORS[m.tier];
    c.beginPath();
    c.moveTo(px0 + p * pipW, py - pipW * 0.45); c.lineTo(px0 + p * pipW + pipW * 0.35, py);
    c.lineTo(px0 + p * pipW, py + pipW * 0.45); c.lineTo(px0 + p * pipW - pipW * 0.35, py);
    c.closePath(); c.fill();
  }
  c.restore();
}
function drawEq(c) {
