<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rail Tycoon</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1f1a; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function() {
'use strict';

// ── CANVAS / RESIZE ─────────────────────────────────────────────────────────
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H, cx, cy, S;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  S = Math.min(W / 800, H / 600);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);
resize();

// ── LOCALISATION ────────────────────────────────────────────────────────────
var lang = 'en';
var STRINGS = {
  en: {
    title: 'RAIL TYCOON',
    sub:   'Drag from station to station to build rails',
    sub2:  'Hit profit goal — 5 missed deliveries = bankrupt',
    play: 'PLAY', next: 'NEXT', retry: 'RETRY',
    level: 'LEVEL', score: 'SCORE', best: 'BEST',
    profit: 'PROFIT', strikes: 'MISSED',
    complete: 'PROFITABLE!', gameover: 'BANKRUPT!',
    tut1:  'DRAG between stations to lay rails',
    tut2:  'Cargo travels to its matching-color station',
    tut3:  'Tap a rail to remove it',
    rule:  'Match cargo color to station color',
    missed: 'MISSED!',
  },
  ru: {
    title: 'ЖЕЛЕЗНЫЙ МАГНАТ',
    sub:   'Тяни от станции к станции — строй рельсы',
    sub2:  'Набери прибыль — 5 упущенных грузов = банкротство',
    play: 'ИГРАТЬ', next: 'ДАЛЬШЕ', retry: 'ЕЩЁ РАЗ',
    level: 'УРОВЕНЬ', score: 'ОЧКИ', best: 'РЕКОРД',
    profit: 'ПРИБЫЛЬ', strikes: 'УПУЩЕНО',
    complete: 'УСПЕХ!', gameover: 'БАНКРОТСТВО!',
    tut1:  'ТЯНИ от станции к станции — строй рельсы',
    tut2:  'Груз едет на станцию своего цвета',
    tut3:  'Нажми на рельс, чтобы удалить',
    rule:  'Цвет груза = цвет станции назначения',
    missed: 'УПУЩЕНО!',
  },
};
function t(k) { return (STRINGS[lang] || STRINGS.en)[k] || k; }
window._setLang = function(l) { lang = (l === 'ru' ? 'ru' : 'en'); };

// ── UTILS ───────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function dist(ax, ay, bx, by) { var dx=ax-bx, dy=ay-by; return Math.sqrt(dx*dx+dy*dy); }

// ── COLORS ──────────────────────────────────────────────────────────────────
var COLORS = [
  { id:'red',    main:'#e74c3c', dark:'#c0392b', light:'#ff7361', name_en:'RED',    name_ru:'КРАСНЫЙ' },
  { id:'blue',   main:'#3498db', dark:'#2874a6', light:'#5dade2', name_en:'BLUE',   name_ru:'СИНИЙ' },
  { id:'yellow', main:'#f1c40f', dark:'#b7950b', light:'#f7dc6f', name_en:'YELLOW', name_ru:'ЖЁЛТЫЙ' },
  { id:'green',  main:'#2ecc71', dark:'#1e8449', light:'#58d68d', name_en:'GREEN',  name_ru:'ЗЕЛЁНЫЙ' },
  { id:'purple', main:'#9b59b6', dark:'#6c3483', light:'#bb8fce', name_en:'PURPLE', name_ru:'ФИОЛЕТ.' },
];

// ── STATE ───────────────────────────────────────────────────────────────────
var HUD_H = 56;
var gs = 'MENU';
var level = 1, score = 0, best = 0, profit = 0, target = 0;
var strikes = 0, MAX_STRIKES = 5;
var stations = []; // { x, y, color, demand, supply, queue }
var rails = [];    // { a:idx, b:idx }
var cargo = [];    // { x, y, color, fromIdx, toIdx, t, speed, alive }
var spawnTimer = 0;
var levelTimer = 0; // total time elapsed
var particles = [];
var floats = [];
var buttons = [];
var dragFrom = -1, dragX = 0, dragY = 0;
var tutorialT = 0;     // tutorial overlay countdown (level 1 only)
var redFlash = 0;      // red screen flash on strike

// ── INPUT ───────────────────────────────────────────────────────────────────
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('wheel',     function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

function pointerStart(x, y) {
  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    if (x >= b.x && x <= b.x+b.w && y >= b.y && y <= b.y+b.h) { b.fn(); return; }
  }
  if (gs !== 'PLAYING') return;
  var idx = stationAt(x, y);
  if (idx >= 0) {
    dragFrom = idx; dragX = x; dragY = y;
  } else {
    // tap on a rail to delete
    var ri = railAt(x, y);
    if (ri >= 0) {
      rails.splice(ri, 1);
      // also kill any cargo on it
      for (var k = cargo.length - 1; k >= 0; k--) {
        var ca = cargo[k];
        if ((ca.fromIdx === rails[ri]?.a && ca.toIdx === rails[ri]?.b) ||
            (ca.fromIdx === rails[ri]?.b && ca.toIdx === rails[ri]?.a)) {
          cargo.splice(k, 1);
        }
      }
    }
  }
}
function pointerMove(x, y) {
  if (dragFrom < 0) return;
  dragX = x; dragY = y;
}
function pointerEnd(x, y) {
  if (dragFrom < 0) return;
  var idx = stationAt(x, y);
  if (idx >= 0 && idx !== dragFrom) {
    // create rail if not already exists
    var exists = rails.some(function(r) {
      return (r.a === dragFrom && r.b === idx) || (r.a === idx && r.b === dragFrom);
    });
    if (!exists) rails.push({ a: dragFrom, b: idx });
  }
  dragFrom = -1;
}

canvas.addEventListener('mousedown', function(e) { pointerStart(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', function(e) { pointerMove(e.clientX, e.clientY); });
canvas.addEventListener('mouseup',   function(e) { pointerEnd(e.clientX, e.clientY); });
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault(); var t0 = e.changedTouches[0];
  pointerStart(t0.clientX, t0.clientY);
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault(); var t0 = e.changedTouches[0];
  pointerMove(t0.clientX, t0.clientY);
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
  e.preventDefault(); var t0 = e.changedTouches[0];
  pointerEnd(t0.clientX, t0.clientY);
}, { passive: false });

// ── STATION / RAIL HELPERS ──────────────────────────────────────────────────
function STATION_R() { return clamp(36*S, 22, 50); }

function stationAt(x, y) {
  var r = STATION_R() * 1.2;
  for (var i = 0; i < stations.length; i++) {
    if (dist(x, y, stations[i].x, stations[i].y) < r) return i;
  }
  return -1;
}

function railAt(x, y) {
  // approximate: closest distance to line segment
  for (var i = 0; i < rails.length; i++) {
    var r = rails[i];
    var a = stations[r.a], b = stations[r.b];
    var dx = b.x - a.x, dy = b.y - a.y;
    var L = Math.sqrt(dx*dx + dy*dy);
    if (L < 1) continue;
    var t = ((x - a.x) * dx + (y - a.y) * dy) / (L*L);
    if (t < 0 || t > 1) continue;
    var px = a.x + dx*t, py = a.y + dy*t;
    if (dist(x, y, px, py) < 14*S) return i;
  }
  return -1;
}

function isConnected(fromIdx, toIdx) {
  // BFS via rails
  if (fromIdx === toIdx) return true;
  var visited = {}, queue = [fromIdx];
  visited[fromIdx] = true;
  while (queue.length) {
    var n = queue.shift();
    for (var i = 0; i < rails.length; i++) {
      var r = rails[i];
      var nb = (r.a === n) ? r.b : (r.b === n) ? r.a : -1;
      if (nb === -1 || visited[nb]) continue;
      if (nb === toIdx) return true;
      visited[nb] = true; queue.push(nb);
    }
  }
  return false;
}

// returns next-hop station index along path from→to, or -1 if none
function nextHop(fromIdx, toIdx) {
  if (fromIdx === toIdx) return fromIdx;
  var visited = {}, parent = {};
  visited[fromIdx] = true;
  var queue = [fromIdx];
  while (queue.length) {
    var n = queue.shift();
    if (n === toIdx) break;
    for (var i = 0; i < rails.length; i++) {
      var r = rails[i];
      var nb = (r.a === n) ? r.b : (r.b === n) ? r.a : -1;
      if (nb === -1 || visited[nb]) continue;
      visited[nb] = true; parent[nb] = n;
      queue.push(nb);
    }
  }
  if (!(toIdx in parent) && toIdx !== fromIdx) return -1;
  // walk back from toIdx until parent is fromIdx
  var cur = toIdx;
  while (parent[cur] !== fromIdx && parent[cur] !== undefined) cur = parent[cur];
  return cur;
}

// ── LEVEL SETUP ─────────────────────────────────────────────────────────────
function startLevel(lvl) {
  level = lvl;
  rails = []; cargo = []; particles = []; floats = []; buttons = [];
  spawnTimer = 0; levelTimer = 0; strikes = 0; profit = 0;
  target = 12 + (lvl - 1) * 6;
  tutorialT = (lvl === 1) ? 9 : 0; // 9 second tutorial on level 1
  redFlash = 0;

  // station count and color count grow with level — start gentle
  var nStations = Math.min(7, 3 + Math.floor(lvl/2));
  var nColors   = Math.min(5, 2 + Math.floor((lvl-1)/2));

  // place stations in a roughly circular arrangement, scaled to viewport
  stations = [];
  var pad = HUD_H * S + 60*S;
  var aw = W - 80*S, ah = H - pad - 60*S;
  var cxp = W/2, cyp = pad + ah/2;
  var rx = aw * 0.42, ry = ah * 0.42;
  for (var i = 0; i < nStations; i++) {
    var a = (i / nStations) * Math.PI * 2 - Math.PI/2;
    var color = COLORS[i % nColors];
    stations.push({
      x: cxp + Math.cos(a) * rx,
      y: cyp + Math.sin(a) * ry,
      color: color,
      colorIdx: i % nColors,
      delivered: 0,
      pulse: 0,
    });
  }

  gs = 'PLAYING';
}
window._jumpLevel = function(n) { score = 0; startLevel(n); };

// ── CARGO ───────────────────────────────────────────────────────────────────
function spawnCargo() {
  if (stations.length < 2) return;
  // pick a random source station, generate cargo of a random color (target color)
  var fromIdx = Math.floor(Math.random() * stations.length);
  var nColors = Math.min(5, 3 + Math.floor((level-1)/3));
  var targetColorIdx = Math.floor(Math.random() * nColors);
  // make sure cargo color differs from source station color so player needs to route it
  if (targetColorIdx === stations[fromIdx].colorIdx && stations.length > 1) {
    targetColorIdx = (targetColorIdx + 1) % nColors;
  }

  // find any station with that color as the destination
  var destCandidates = [];
  for (var i = 0; i < stations.length; i++) {
    if (stations[i].colorIdx === targetColorIdx && i !== fromIdx) destCandidates.push(i);
  }
  if (!destCandidates.length) return;
  var toIdx = destCandidates[Math.floor(Math.random() * destCandidates.length)];

  cargo.push({
    sourceIdx: fromIdx,
    color: COLORS[targetColorIdx],
    colorIdx: targetColorIdx,
    targetIdx: toIdx,
    // current segment progress
    fromIdx: fromIdx,
    toIdx: -1,
    t: 0,
    speed: 0.4 + level * 0.04,
    waitAt: fromIdx,
    spawnTime: levelTimer,
  });
  stations[fromIdx].pulse = 0.6;
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
var lastTs = 0;
function update(dt) {
  if (gs !== 'PLAYING') return;
  levelTimer += dt;

  // tutorial countdown
  if (tutorialT > 0) tutorialT = Math.max(0, tutorialT - dt);
  if (redFlash > 0)  redFlash  = Math.max(0, redFlash - dt * 1.6);

  // spawn cargo over time. Pause spawning while tutorial is up so player has time to read+build.
  // Cap concurrent cargo at level-based limit to prevent overwhelm.
  spawnTimer -= dt;
  var maxConcurrent = level === 1 ? 2 : Math.min(8, 2 + level);
  var spawnRate = clamp(2.6 - level * 0.15, 1.0, 2.6);
  if (spawnTimer <= 0 && tutorialT <= 0 && cargo.length < maxConcurrent) {
    spawnCargo();
    spawnTimer = spawnRate;
  }

  for (var i = 0; i < stations.length; i++) {
    var s = stations[i];
    if (s.pulse > 0) s.pulse = Math.max(0, s.pulse - dt * 1.5);
  }

  // advance cargo
  for (var i = cargo.length - 1; i >= 0; i--) {
    var ca = cargo[i];

    // if waiting at a station, decide next hop
    if (ca.toIdx === -1) {
      var nh = nextHop(ca.fromIdx, ca.targetIdx);
      if (nh < 0) {
        // not connected — wait. If too long, cargo gives up (strike).
        // Be more forgiving on level 1 (15s patience) so beginners learn.
        ca.t -= dt;
        var patience = level === 1 ? 15 : 10;
        if (ca.t < -patience) {
          strikes++;
          redFlash = 1.0;
          var src = stations[ca.fromIdx];
          spawnFloat(src.x, src.y - 36*S, t('missed'), '#e74c3c');
          spawnParticles(src.x, src.y, '#e74c3c', 14);
          cargo.splice(i, 1);
          if (strikes >= MAX_STRIKES) gs = 'GAMEOVER';
        }
        continue;
      }
      ca.toIdx = nh; ca.t = 0;
    }

    // travel
    ca.t += ca.speed * dt;
    if (ca.t >= 1) {
      // reached toIdx
      var arrived = ca.toIdx;
      ca.fromIdx = arrived; ca.toIdx = -1; ca.t = 0;
      // arrived at target?
      if (arrived === ca.targetIdx) {
        var pts = 10 + Math.floor(level * 1.2);
        score += pts; profit += pts;
        var st = stations[arrived];
        st.pulse = 1.0;
        st.delivered = (st.delivered || 0) + 1;
        spawnParticles(st.x, st.y, ca.color.main, 14);
        spawnFloat(st.x, st.y - 28*S, '+'+pts, '#FFD700');
        cargo.splice(i, 1);

        if (profit >= target) {
          gs = 'LEVELEND';
        }
      }
    }
  }

  // particles
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05*S;
    p.life -= dt * 1.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (var i = floats.length - 1; i >= 0; i--) {
    var f = floats[i];
    f.y += f.vy; f.life -= dt * 0.9;
    if (f.life <= 0) floats.splice(i, 1);
  }
}

function spawnParticles(x, y, color, n) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = (1.5 + Math.random() * 3.5) * S;
    particles.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      r:(2 + Math.random()*4)*S, color:color, life:1 });
  }
}
function spawnFloat(x, y, txt, col) {
  floats.push({ x:x, y:y, txt:txt, col:col||'#fff', life:1.4, vy:-2*S });
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function drawArenaBg() {
  // soft grass
  ctx.fillStyle = '#0d1f1a';
  ctx.fillRect(0, HUD_H * S, W, H);

  // subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  var g = 50 * S;
  for (var x = 0; x < W; x += g) {
    ctx.beginPath(); ctx.moveTo(x, HUD_H*S); ctx.lineTo(x, H); ctx.stroke();
  }
  for (var y = HUD_H*S; y < H; y += g) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawRail(a, b, dragging) {
  // sleepers
  var dx = b.x - a.x, dy = b.y - a.y;
  var L = Math.sqrt(dx*dx + dy*dy);
  var ang = Math.atan2(dy, dx);
  ctx.save();
  ctx.translate(a.x, a.y); ctx.rotate(ang);

  // ground tint
  ctx.strokeStyle = 'rgba(60,40,20,0.5)';
  ctx.lineWidth = 18 * S;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(L, 0); ctx.stroke();

  // sleepers
  ctx.strokeStyle = '#5a3a20';
  ctx.lineWidth = 3 * S;
  var step = 18 * S;
  for (var i = step*0.5; i < L; i += step) {
    ctx.beginPath();
    ctx.moveTo(i, -7*S);
    ctx.lineTo(i, 7*S);
    ctx.stroke();
  }

  // rails (two parallel lines)
  ctx.strokeStyle = dragging ? '#ffe66d' : '#cbd5d0';
  ctx.lineWidth = 2.4 * S;
  ctx.beginPath(); ctx.moveTo(0, -5*S); ctx.lineTo(L, -5*S); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,  5*S); ctx.lineTo(L,  5*S); ctx.stroke();

  ctx.restore();
}

function drawStation(s, isDragSource, idx) {
  var r = STATION_R();
  var p = s.pulse;

  // pulse halo
  if (p > 0) {
    ctx.fillStyle = 'rgba(255,255,255,'+(p*0.18)+')';
    ctx.beginPath(); ctx.arc(s.x, s.y, r * (1.2 + p*0.6), 0, Math.PI*2); ctx.fill();
  }

  // highlight as target if any cargo has this as its destination
  var isTarget = false, sourceColor = null;
  for (var k = 0; k < cargo.length; k++) {
    if (cargo[k].targetIdx === idx) { isTarget = true; sourceColor = cargo[k].color; break; }
  }
  if (isTarget) {
    var pulse = 0.5 + 0.5 * Math.sin(performance.now() / 250);
    ctx.strokeStyle = s.color.light;
    ctx.lineWidth = (3 + pulse * 4) * S;
    ctx.globalAlpha = 0.5 + pulse * 0.4;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r * (1.15 + pulse * 0.18), 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // shadow
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur = 10*S;
  ctx.shadowOffsetY = 4*S;

  // base
  ctx.fillStyle = s.color.dark;
  ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI*2); ctx.fill();
  ctx.shadowColor = 'transparent';

  // body
  ctx.fillStyle = s.color.main;
  ctx.beginPath(); ctx.arc(s.x, s.y, r * 0.85, 0, Math.PI*2); ctx.fill();

  // highlight
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.arc(s.x - r*0.3, s.y - r*0.3, r*0.4, 0, Math.PI*2); ctx.fill();

  // ring
  ctx.strokeStyle = isDragSource ? '#fff' : s.color.light;
  ctx.lineWidth = isDragSource ? 4*S : 2.5*S;
  ctx.beginPath(); ctx.arc(s.x, s.y, r * 0.95, 0, Math.PI*2); ctx.stroke();

  // depot icon (rectangle warehouse)
  ctx.fillStyle = '#fff';
  rr(ctx, s.x - r*0.36, s.y - r*0.18, r*0.72, r*0.42, r*0.05);
  ctx.fill();
  ctx.fillStyle = s.color.dark;
  rr(ctx, s.x - r*0.28, s.y, r*0.16, r*0.22, r*0.03);
  ctx.fill();
}

function drawCargo(ca) {
  var src = stations[ca.fromIdx];
  var x = src.x, y = src.y;
  if (ca.toIdx >= 0) {
    var dst = stations[ca.toIdx];
    x = src.x + (dst.x - src.x) * ca.t;
    y = src.y + (dst.y - src.y) * ca.t;
  }

  // dotted hint line from cargo to its FINAL destination — makes routing intent obvious
  var target = stations[ca.targetIdx];
  if (target) {
    ctx.save();
    ctx.setLineDash([6*S, 8*S]);
    ctx.strokeStyle = ca.color.main;
    ctx.globalAlpha = 0.35;
    ctx.lineWidth = 1.5*S;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(target.x, target.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  var sz = clamp(12*S, 8, 16);
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur = 6*S;
  ctx.fillStyle = ca.color.main;
  rr(ctx, x - sz, y - sz, sz*2, sz*2, sz*0.3);
  ctx.fill();
  ctx.shadowColor = 'transparent';

  // highlight stripe
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  rr(ctx, x - sz, y - sz, sz*2, sz*0.6, sz*0.3);
  ctx.fill();
  // outline
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2*S;
  rr(ctx, x - sz, y - sz, sz*2, sz*2, sz*0.3);
  ctx.stroke();
}

function drawHUD() {
  var bh = HUD_H * S;
  ctx.fillStyle = 'rgba(8,18,16,0.92)';
  ctx.fillRect(0, 0, W, bh);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, bh); ctx.lineTo(W, bh); ctx.stroke();

  var pad = 14*S, fs = clamp(13*S, 11, 17), fy = bh*0.78;
  var bigFs = clamp(18*S, 14, 24);
  ctx.textBaseline = 'alphabetic';

  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(t('level'), pad, bh*0.42);
  ctx.fillStyle = '#fff'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(level, pad, fy);

  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(t('score'), W-pad, bh*0.42);
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(score, W-pad, fy);

  // profit / target
  var pct = clamp(profit / target, 0, 1);
  var mw = clamp(W*0.32, 110, 240), mh = 10*S;
  var mx = cx - mw/2, my = bh*0.58;
  ctx.fillStyle = '#666'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(t('profit')+' '+profit+' / '+target, cx, bh*0.36);
  rr(ctx, mx, my, mw, mh, mh/2); ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();
  if (pct > 0) {
    var fg = ctx.createLinearGradient(mx, 0, mx+mw, 0);
    fg.addColorStop(0, '#27ae60'); fg.addColorStop(1, '#2ecc71');
    rr(ctx, mx, my, mw*pct, mh, mh/2); ctx.fillStyle = fg; ctx.fill();
  }

  // strikes
  var sx = W*0.78;
  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(t('strikes'), sx, bh*0.42);
  ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillStyle = strikes >= MAX_STRIKES - 1 ? '#e74c3c' : strikes >= 3 ? '#f39c12' : '#aaa';
  ctx.fillText(strikes + '/' + MAX_STRIKES, sx, fy);
}

function drawOverlay(title, sub, btnText, btnFn, sub2) {
  buttons = [];
  ctx.fillStyle = 'rgba(8,18,16,0.88)';
  ctx.fillRect(0, 0, W, H);

  var titleFs = clamp(38*S, 22, 56);
  var subFs   = clamp(16*S, 12, 22);
  var btnW    = clamp(240*S, 160, 320), btnH = clamp(52*S, 40, 66);
  var btnX    = cx - btnW/2, btnY = cy + 20*S;

  ctx.shadowColor = 'rgba(46,204,113,0.45)'; ctx.shadowBlur = 30*S;
  ctx.font = 'bold '+titleFs+'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(title, cx, cy - 50*S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  if (sub) {
    ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#9ab';
    ctx.fillText(sub, cx, cy - 16*S);
  }
  if (sub2) {
    ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#bcd';
    ctx.fillText(sub2, cx, cy + 2*S);
  }

  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY+btnH);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#1e8449');
  rr(ctx, btnX, btnY, btnW, btnH, btnH/2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold '+subFs+'px sans-serif'; ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(btnText, cx, btnY + btnH/2);
  ctx.textBaseline = 'alphabetic';

  buttons.push({ x:btnX, y:btnY, w:btnW, h:btnH, fn:btnFn });

  if (best > 0) {
    ctx.font = clamp(13*S,10,17)+'px sans-serif'; ctx.fillStyle = '#557';
    ctx.fillText(t('best')+': '+best, cx, btnY+btnH+28*S);
  }
}

// ── MAIN LOOP ───────────────────────────────────────────────────────────────
function frame(ts) {
  var dt = Math.min((ts - lastTs) / 1000, 0.08);
  lastTs = ts;

  update(dt);

  ctx.fillStyle = '#0d1f1a';
  ctx.fillRect(0, 0, W, H);

  if (gs === 'PLAYING' || gs === 'LEVELEND') {
    drawArenaBg();

    // drawing rail (drag preview)
    if (dragFrom >= 0) {
      var s = stations[dragFrom];
      ctx.strokeStyle = 'rgba(255,230,109,0.4)';
      ctx.lineWidth = 14 * S;
      ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(dragX, dragY); ctx.stroke();
      ctx.strokeStyle = '#ffe66d';
      ctx.lineWidth = 2 * S;
      ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(dragX, dragY); ctx.stroke();
    }

    // rails
    for (var i = 0; i < rails.length; i++) {
      drawRail(stations[rails[i].a], stations[rails[i].b], false);
    }

    // cargo
    for (var i = 0; i < cargo.length; i++) drawCargo(cargo[i]);

    // particles
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
    }
    ctx.globalAlpha = 1;

    // stations
    for (var i = 0; i < stations.length; i++) drawStation(stations[i], i === dragFrom, i);

    // floats
    for (var i = 0; i < floats.length; i++) {
      var f = floats[i];
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.font = 'bold '+clamp(15*S,11,22)+'px sans-serif';
      ctx.fillStyle = f.col; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(f.txt, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    drawHUD();

    // persistent rule banner just under HUD
    var bh = HUD_H * S;
    ctx.font = clamp(13*S, 11, 17) + 'px sans-serif';
    ctx.fillStyle = 'rgba(180,200,210,0.55)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(t('rule'), cx, bh + 6*S);
    ctx.textBaseline = 'alphabetic';

    // tutorial overlay (level 1, first 9 seconds)
    if (tutorialT > 0) {
      var alpha = tutorialT > 1 ? 1 : tutorialT;
      ctx.globalAlpha = alpha;
      var ph = clamp(W*0.55, 280, 560);
      var pw = ph;
      ctx.fillStyle = 'rgba(8,18,16,0.85)';
      var bx = cx - pw/2, by = cy - 90*S;
      rr(ctx, bx, by, pw, 110*S, 14*S);
      ctx.fill();
      ctx.strokeStyle = 'rgba(46,204,113,0.5)';
      ctx.lineWidth = 2*S;
      rr(ctx, bx, by, pw, 110*S, 14*S);
      ctx.stroke();

      ctx.font = 'bold ' + clamp(15*S, 12, 20) + 'px sans-serif';
      ctx.fillStyle = '#2ecc71';
      ctx.textAlign = 'center';
      ctx.fillText('▼ ' + t('tut1') + ' ▼', cx, by + 28*S);
      ctx.font = clamp(13*S, 11, 17) + 'px sans-serif';
      ctx.fillStyle = '#cfd';
      ctx.fillText(t('tut2'), cx, by + 56*S);
      ctx.fillStyle = '#9ab';
      ctx.fillText(t('tut3'), cx, by + 80*S);
      ctx.globalAlpha = 1;
    }

    // red strike flash
    if (redFlash > 0) {
      ctx.fillStyle = 'rgba(231, 76, 60,' + (redFlash * 0.45) + ')';
      ctx.fillRect(0, 0, W, H);
      // big "MISSED!" text
      ctx.font = 'bold ' + clamp(48*S, 28, 72) + 'px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,' + redFlash + ')';
      ctx.textAlign = 'center';
      ctx.fillText(t('missed'), cx, cy);
    }
  }

  if (gs === 'MENU') {
    ctx.fillStyle = '#0d1f1a'; ctx.fillRect(0,0,W,H);
    drawOverlay(t('title'), t('sub'), t('play'), function() { score=0; startLevel(1); }, t('sub2'));
  }
  if (gs === 'LEVELEND') {
    drawOverlay(t('complete'), t('score')+': '+score, t('next'),
      function() { startLevel(level+1); });
  }
  if (gs === 'GAMEOVER') {
    if (score > best) {
      best = score;
      try { localStorage.setItem('rail_best', best); } catch(e) {}
    }
    drawOverlay(t('gameover'), t('score')+': '+score, t('retry'),
      function() { score=0; startLevel(level); });
  }

  requestAnimationFrame(frame);
}

// ── BOOT ────────────────────────────────────────────────────────────────────
var booted = false;
function boot() {
  if (booted) return;
  booted = true;
  try { best = parseInt(localStorage.getItem('rail_best')||'0')||0; } catch(e) {}
  if (window.ysdk && window.ysdk.features && window.ysdk.features.LoadingAPI) {
    window.ysdk.features.LoadingAPI.ready();
  }
  gs = 'MENU';
  lastTs = performance.now();
  requestAnimationFrame(frame);
}

(function() {
  if (typeof YaGames === 'undefined') { setTimeout(boot, 3000); return; }
  YaGames.init().then(function(ysdk) {
    window.ysdk = ysdk;
    try {
      var l = ysdk.environment && ysdk.environment.i18n && ysdk.environment.i18n.lang;
      if (l) lang = l.startsWith('ru') ? 'ru' : 'en';
    } catch(e) {}
    boot();
  }).catch(function() { boot(); });
  setTimeout(boot, 3000);
})();

})();
</script>
