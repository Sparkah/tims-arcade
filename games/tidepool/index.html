<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tidepool</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #05202a; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── GAME-SPECIFIC CONFIG ─────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Tidepool',
    sub:   'Eat to grow. Fit the gate.',
    play: 'PLAY', retry: 'RETRY', again: 'PLAY AGAIN',
    level: 'LEVEL', best: 'BEST', size: 'SIZE',
    gameover: 'GAME OVER', won: 'YOU FILLED THE POOL!',
    dash: 'DASH',
    too_big: "TOO BIG!", too_small: "TOO SMALL!",
    fits: 'FITS!',
    reached: 'Reached level',
    tut_goal:     'Goal: Grow to the exact size the exit gate wants, then swim through it.',
    tut_controls: 'Controls: Drag (or WASD / arrows) to swim toward your finger. Tap DASH for a burst.',
    tut_win:      'Win: Fit through the exit gate on all 8 levels.',
    tut_lose:     'Lose: Lose all 3 lives - a predator swallows you when you are too small.',
    tut_tip:      'Tip: Too big to fit? Brush a bigger predator on purpose - it nips you and shrinks you back down.',
  },
  ru: {
    title: 'Tidepool',
    sub:   'Ешь и расти. Влезь в ворота.',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', again: 'СНОВА',
    level: 'УРОВЕНЬ', best: 'РЕКОРД', size: 'РАЗМЕР',
    gameover: 'ИГРА ОКОНЧЕНА', won: 'ВЕСЬ ПРУД ТВОЙ!',
    dash: 'РЫВОК',
    too_big: 'СЛИШКОМ БОЛЬШОЙ!', too_small: 'СЛИШКОМ МАЛ!',
    fits: 'ВЛЕЗ!',
    reached: 'Уровень',
    tut_goal:     'Цель: Дорасти точно до размера, который требуют ворота, и проплыть сквозь них.',
    tut_controls: 'Управление: Тяни (или WASD / стрелки), чтобы плыть к пальцу. Жми РЫВОК для ускорения.',
    tut_win:      'Победа: Пройди ворота на всех 8 уровнях.',
    tut_lose:     'Поражение: Потеряй все 3 жизни - хищник глотает тебя, когда ты мал.',
    tut_tip:      'Совет: Слишком большой? Специально задень хищника покрупнее - он куснёт и уменьшит тебя.',
  },
};

var SPRITE_NAMES = ['player', 'predator', 'bit']; // AI sprites; procedural fallback always present

// ── TUNABLES (mirrored to __gfState) ─────────────────────────────────────
var MAX_LIVES      = 3;
var TOTAL_LEVELS   = 8;
var START_SIZE     = 18;
var GROW_PER_EAT   = 2.2;
var GATE_TOLERANCE = 6.0;
var NIP_SHRINK     = 5.0;
var SWIM_ACCEL     = 0.9;
var DASH_SPEED     = 7.5;
var DASH_COOLDOWN  = 1.4;
var PREDATOR_SPEED = 70;
var EAT_RATIO      = 0.82;
var STRAND_LIMIT   = 9;

var MIN_SIZE = 10;        // floor so a nip can never drive size negative
var DRAG     = 0.86;      // velocity damping per frame
// A predator SWALLOWS you only when you are much smaller than it (genuinely
// bite-sized). Otherwise it merely NIPS you — that's the deliberate shrink
// tool. SWALLOW_RATIO is the fraction of the predator's radius below which
// you're swallowable; above it, brushing the predator is safe and shrinks you.
var SWALLOW_RATIO = 0.5;

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';           // MENU | PLAYING | GAMEOVER | WON
var level = 1, best = 0;
var lives = MAX_LIVES;
var player = { x: 0, y: 0, vx: 0, vy: 0, size: START_SIZE, hurt: 0 };
var bits = [];
var predators = [];
var gates = [];            // ordered; player must clear gates[gateIdx] next
var gateIdx = 0;
var bitsRemaining = 0;
var dashCd = 0;
var strandTimer = 0;
var steerX = null, steerY = null;  // current steer target (null = idle)
var tutorialOpen = false;
var pulseT = 0;
var flashMsg = '', flashT = 0;
var _ssMode = false;

function curStrings() { return STRINGS[GF.lang] || STRINGS.en; }

// ── PERSISTENCE HELPERS ────────────────────────────────────────────────────
function loadTutorialSeen() {
  try { return localStorage.getItem('tidepool_seen_tutorial') === '1'; } catch (e) { return false; }
}
function saveTutorialSeen() {
  try { localStorage.setItem('tidepool_seen_tutorial', '1'); } catch (e) {}
}

// ── LEVEL GENERATION ───────────────────────────────────────────────────────
// Deterministic-ish per level: gate count, target sizes, tolerance, predators.
function buildLevel(n) {
  bits.length = 0; predators.length = 0; gates.length = 0;
  gateIdx = 0; strandTimer = 0;
  player.size = START_SIZE;
  player.x = GF.cx; player.y = GF.H * 0.78;
  player.vx = 0; player.vy = 0; player.hurt = 0;
  steerX = null; steerY = null;

  // Tolerance tightens with level (level 1 generous, level 8 tight).
  var tol = Math.max(2.2, GATE_TOLERANCE - (n - 1) * 0.5);
  // Number of gates in sequence: 1 for early levels, up to 3 later.
  var gateCount = n <= 2 ? 1 : (n <= 5 ? 2 : 3);

  // Build gate sequence. Each gate has a target size; sequence forces re-sizing.
  // Targets alternate: first usually requires growth, next may require shrink.
  var targets = [];
  for (var i = 0; i < gateCount; i++) {
    var base;
    if (i === 0) base = START_SIZE + 8 + n * 1.5;           // first gate: grow into it
    else if (i % 2 === 1) base = START_SIZE + 2 + (n % 3);  // next gate: smaller → must shrink (predator)
    else base = START_SIZE + 16 + n * 2;                     // then bigger again
    targets.push(base);
  }

  // Place gates along the top, spread horizontally; cleared in order.
  for (var g = 0; g < gateCount; g++) {
    var gx = GF.W * ((g + 1) / (gateCount + 1));
    gates.push({
      x: gx, y: GF.H * 0.12,
      target: targets[g], tol: tol,
      cleared: false,
    });
  }

  // Edible bits — a budget that comfortably exceeds the max single-gate target
  // but is bounded (so over-eating is a real risk). More bits on bigger targets.
  var maxTarget = Math.max.apply(null, targets);
  var needGrow = Math.max(0, maxTarget - START_SIZE);
  var bitBudget = Math.ceil(needGrow / GROW_PER_EAT) + 4 + n; // a few spare
  bitsRemaining = bitBudget;
  for (var b = 0; b < bitBudget; b++) {
    spawnBit();
  }

  // Predators: levels 1+ always have at least one (it's the shrink tool AND
  // the lose threat). Count scales gently with level.
  var predCount = 1 + Math.floor((n - 1) / 3);
  for (var p = 0; p < predCount; p++) {
    var pr = 26 + Math.random() * 14;
    predators.push({
      x: GF.W * (0.25 + 0.5 * Math.random()),
      y: GF.H * (0.32 + 0.3 * Math.random()),
      vx: 0, vy: 0,
      r: pr,
      dir: Math.random() * Math.PI * 2,
      retarget: 0,
      nipCd: 0,
      spin: Math.random() * Math.PI * 2,
    });
  }
}

function spawnBit() {
  var r = 4 + Math.random() * 8;
  bits.push({
    x: GF.W * (0.1 + 0.8 * Math.random()),
    y: GF.H * (0.28 + 0.55 * Math.random()),
    r: r,
    eaten: false,
    bob: Math.random() * Math.PI * 2,
  });
}

// ── GAME LIFECYCLE ─────────────────────────────────────────────────────────
function startGame() {
  level = 1; lives = MAX_LIVES;
  gs = 'PLAYING';
  _ssMode = false;
  tutorialOpen = false;
  buildLevel(level);
  GF.gameStarted();
  GF.saveRun();
}

function nextLevel() {
  level += 1;
  if (level > TOTAL_LEVELS) { win(); return; }
  buildLevel(level);
  GF.saveRun();
}

function loseLife(respawn) {
  lives -= 1;
  player.hurt = 1;
  GF.spawnParticles(player.x, player.y, '#ff5566', 22);
  GF.setShake(0.55);
  GF.saveRun();
  if (lives <= 0) { gameOver(); return; }
  if (respawn) {
    // respawn at the start size near the bottom; keep level layout
    player.size = START_SIZE;
    player.x = GF.cx; player.y = GF.H * 0.78;
    player.vx = 0; player.vy = 0;
    strandTimer = 0;
  }
}

function gameOver() {
  recordBest();
  gs = 'GAMEOVER';
  GF.gameEnded();
  GF.saveRun();
}

function win() {
  recordBest();
  gs = 'WON';
  GF.gameEnded();
  GF.saveRun();
  GF.happytime();
}

function recordBest() {
  var reached = level;
  if (reached > best) {
    best = reached;
    try { localStorage.setItem('tidepool_best', best); } catch (e) {}
  }
}

// ── SCREENSHOT HELPER — populated mid-swim state ────────────────────────────
window._setupForScreenshot = function(lvl) {
  level = GF.clamp(lvl || 4, 1, TOTAL_LEVELS);
  lives = 3;
  gs = 'PLAYING';
  _ssMode = true;
  tutorialOpen = false;
  buildLevel(level);
  // Grow the player a bit and place it mid-gulp toward a bit, near a gate.
  player.size = START_SIZE + 12;
  player.x = GF.cx; player.y = GF.cy + GF.H * 0.06;
  // Cluster a couple of bits right in front for the "mid-gulp" framing.
  if (bits.length >= 2) {
    bits[0].x = player.x + 26 * GF.S; bits[0].y = player.y - 8 * GF.S; bits[0].r = 7;
    bits[1].x = player.x - 22 * GF.S; bits[1].y = player.y + 10 * GF.S; bits[1].r = 9;
  }
  // Put a predator nearby (the shrink/threat) but not overlapping.
  if (predators.length) {
    predators[0].x = player.x + GF.W * 0.22;
    predators[0].y = player.y - GF.H * 0.04;
  }
  steerX = player.x + 30 * GF.S; steerY = player.y - 10 * GF.S;
  flashMsg = ''; flashT = 0;
};

window._jumpLevel = function(n) {
  // The runtime gate calls _jumpLevel(99) expecting a terminal state shortly
  // after. Drive a fast, real death so terminal reachability is observable.
  if (n >= 99) {
    startGame();
    _ssMode = false;
    lives = 1;
    player.size = START_SIZE; // small → predator can swallow
    predators.length = 0;
    var pr = 38;
    predators.push({
      x: player.x + 4, y: player.y, vx: 0, vy: 0, r: pr,
      dir: 0, retarget: 0, nipCd: 0, spin: 0,
    });
    GF.saveRun();
    return;
  }
  window._setupForScreenshot(n || 4);
};

// ── INPUT ──────────────────────────────────────────────────────────────────
var helpBtn = null, dashBtn = null, menuPlayBtn = null, overlayBtn = null;

function doDash() {
  if (gs !== 'PLAYING' || tutorialOpen || dashCd > 0) return;
  // Dash in current heading (toward steer point if any, else current velocity).
  var dx, dy;
  if (steerX !== null) { dx = steerX - player.x; dy = steerY - player.y; }
  else { dx = player.vx; dy = player.vy; }
  var d = Math.sqrt(dx * dx + dy * dy);
  if (d < 0.001) { dx = 0; dy = -1; d = 1; }
  player.vx += (dx / d) * DASH_SPEED * GF.S;
  player.vy += (dy / d) * DASH_SPEED * GF.S;
  dashCd = DASH_COOLDOWN;
  GF.spawnParticles(player.x, player.y, '#7fe3ff', 8);
}

function onPress(px, py) {
  pulseT = 0;
  if (gs === 'MENU') {
    if (tutorialOpen) { tutorialOpen = false; return; }
    if (menuPlayBtn && hit(menuPlayBtn, px, py)) { saveTutorialSeen(); startGame(); }
    return;
  }
  if (gs === 'GAMEOVER' || gs === 'WON') {
    if (overlayBtn && hit(overlayBtn, px, py)) { startGame(); }
    return;
  }
  if (gs === 'PLAYING') {
    if (tutorialOpen) { tutorialOpen = false; return; }
    if (helpBtn && hit(helpBtn, px, py)) { tutorialOpen = true; return; }
    if (dashBtn && hit(dashBtn, px, py)) { doDash(); return; }
    // Otherwise this press sets a swim steer target (and begins a drag).
    steerX = px; steerY = py; _dragging = true;
  }
}
var _dragging = false;
function hit(b, x, y) { return b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }

function onMove(px, py) {
  if (gs === 'PLAYING' && !tutorialOpen && _dragging) {
    // dragging continues to steer (skip if the drag started on a button)
    if (dashBtn && hit(dashBtn, px, py)) return;
    if (helpBtn && hit(helpBtn, px, py)) return;
    steerX = px; steerY = py;
  }
}

function onRelease() {
  // Keep the last steer point so the creature glides to it and stops (the
  // swim logic clamps when close). This makes both tap-to-move (desktop) and
  // drag-to-steer (mobile) feel responsive — the creature heads where you
  // last pointed instead of stopping the instant you lift your finger.
  _dragging = false;
}

// pointer/click pipeline with synthetic-click de-dupe
var _lastPressTs = 0, _lastPressX = -999, _lastPressY = -999;
function pressGuarded(x, y) {
  var now = Date.now();
  if (now - _lastPressTs < 350 && Math.abs(x - _lastPressX) < 14 && Math.abs(y - _lastPressY) < 14) return;
  _lastPressTs = now; _lastPressX = x; _lastPressY = y;
  onPress(x, y);
}
var _canvas = document.getElementById('c');
_canvas.addEventListener('pointerdown', function(e) { pressGuarded(e.clientX, e.clientY); }, { passive: true });
_canvas.addEventListener('pointermove', function(e) { if (e.buttons || GF.touch.active) onMove(e.clientX, e.clientY); }, { passive: true });
_canvas.addEventListener('pointerup',   function() { onRelease(); }, { passive: true });
_canvas.addEventListener('click', function(e) { pressGuarded(e.clientX, e.clientY); });
// touch follow for steering (gf-lib handles preventDefault)
_canvas.addEventListener('touchmove', function(e) {
  var t = e.changedTouches[0]; if (t) onMove(t.clientX, t.clientY);
}, { passive: true });
_canvas.addEventListener('touchend', function() { onRelease(); }, { passive: true });

// keyboard
var keySpaceWas = false;
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') { if (!keySpaceWas) { keySpaceWas = true; doDash(); } e.preventDefault(); }
});
document.addEventListener('keyup', function(e) { if (e.code === 'Space') keySpaceWas = false; });

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  pulseT += dt;
  if (flashT > 0) flashT -= dt;
  if (player.hurt > 0) player.hurt = Math.max(0, player.hurt - dt * 2.2);
  if (gs !== 'PLAYING') return;
  if (tutorialOpen) return;
  if (_ssMode) return; // freeze the framed state during screenshot capture

  if (dashCd > 0) dashCd = Math.max(0, dashCd - dt);

  // ── Swim toward steer point (touch/pointer) + keyboard ──
  var ax = 0, ay = 0;
  if (GF.keys['ArrowLeft']  || GF.keys['KeyA']) ax -= 1;
  if (GF.keys['ArrowRight'] || GF.keys['KeyD']) ax += 1;
  if (GF.keys['ArrowUp']    || GF.keys['KeyW']) ay -= 1;
  if (GF.keys['ArrowDown']  || GF.keys['KeyS']) ay += 1;
  if (steerX !== null) {
    var dx = steerX - player.x, dy = steerY - player.y;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d > 6 * GF.S) { ax += dx / d; ay += dy / d; }
    else if (!_dragging) { steerX = null; steerY = null; } // arrived → coast to stop
  }
  var al = Math.sqrt(ax * ax + ay * ay);
  if (al > 0) { ax /= al; ay /= al; }
  // Bigger creatures are slightly slower (heft), but never sluggish.
  var heft = GF.clamp(START_SIZE / player.size, 0.55, 1);
  player.vx = (player.vx + ax * SWIM_ACCEL * GF.S * heft) * DRAG;
  player.vy = (player.vy + ay * SWIM_ACCEL * GF.S * heft) * DRAG;
  player.x += player.vx;
  player.y += player.vy;

  // walls
  var pr = player.size * GF.S;
  player.x = GF.clamp(player.x, pr, GF.W - pr);
  player.y = GF.clamp(player.y, pr, GF.H - pr);

  // ── Eat bits ──
  for (var i = bits.length - 1; i >= 0; i--) {
    var bit = bits[i];
    bit.bob += dt * 3;
    if (bit.r >= player.size * EAT_RATIO) continue; // too big to swallow yet
    var dd = GF.dist(player.x, player.y, bit.x, bit.y);
    if (dd <= (player.size + bit.r) * GF.S) {
      bits.splice(i, 1);
      bitsRemaining = Math.max(0, bitsRemaining - 1);
      player.size += GROW_PER_EAT;
      GF.spawnParticles(bit.x, bit.y, '#ffd76a', 7);
      GF.spawnFloat(bit.x, bit.y - 8 * GF.S, '+' + GROW_PER_EAT.toFixed(1), '#ffd76a');
      strandTimer = 0;
      GF.saveRun();
    }
  }

  // ── Predators ──
  for (var p = 0; p < predators.length; p++) {
    var pd = predators[p];
    pd.spin += dt * 2;
    if (pd.nipCd > 0) pd.nipCd -= dt;
    pd.retarget -= dt;
    // Chase the player when close, otherwise patrol.
    var toX = player.x - pd.x, toY = player.y - pd.y;
    var pdist = Math.sqrt(toX * toX + toY * toY);
    var chasing = pdist < GF.W * 0.3;
    if (chasing && pdist > 0.001) {
      pd.dir = Math.atan2(toY, toX);
    } else if (pd.retarget <= 0) {
      pd.dir += (Math.random() - 0.5) * 1.4;
      pd.retarget = 1.2 + Math.random() * 1.6;
    }
    var spd = PREDATOR_SPEED * GF.S * (chasing ? 1.15 : 0.8);
    pd.x += Math.cos(pd.dir) * spd * dt;
    pd.y += Math.sin(pd.dir) * spd * dt;
    // bounce off walls
    var rr2 = pd.r * GF.S;
    if (pd.x < rr2) { pd.x = rr2; pd.dir = Math.PI - pd.dir; }
    if (pd.x > GF.W - rr2) { pd.x = GF.W - rr2; pd.dir = Math.PI - pd.dir; }
    if (pd.y < rr2) { pd.y = rr2; pd.dir = -pd.dir; }
    if (pd.y > GF.H - rr2) { pd.y = GF.H - rr2; pd.dir = -pd.dir; }

    // collision with player
    var cd = GF.dist(player.x, player.y, pd.x, pd.y);
    if (cd <= (player.size + pd.r) * GF.S) {
      var canSwallow = player.size < pd.r * SWALLOW_RATIO; // you're bite-sized to it
      if (canSwallow) {
        // they eat you → lose a life, respawn small
        loseLife(true);
        if (gs !== 'PLAYING') return;
      } else if (pd.nipCd <= 0) {
        // you're too big to be swallowed → it just NIPS you (the shrink tool).
        // Never let a single nip drop you INTO this predator's swallow range —
        // otherwise repeatedly brushing to shrink could accidentally get you
        // eaten. The floor keeps the shrink tool safe to use deliberately.
        var nipFloor = Math.max(MIN_SIZE, pd.r * SWALLOW_RATIO + 1.5);
        player.size = Math.max(nipFloor, player.size - NIP_SHRINK);
        player.hurt = 0.7;
        pd.nipCd = 0.9;
        GF.spawnParticles(player.x, player.y, '#ff9a5a', 12);
        GF.spawnFloat(player.x, player.y - player.size * GF.S - 6, '-' + NIP_SHRINK.toFixed(0), '#ff9a5a');
        GF.setShake(0.3);
        // bounce player away so it doesn't get chewed repeatedly
        var bdx = player.x - pd.x, bdy = player.y - pd.y;
        var bl = Math.sqrt(bdx * bdx + bdy * bdy) || 1;
        player.vx += (bdx / bl) * 4 * GF.S;
        player.vy += (bdy / bl) * 4 * GF.S;
        strandTimer = 0;
        GF.saveRun();
      }
    }
  }

  // ── Gate check (must clear gates in order) ──
  var gate = gates[gateIdx];
  if (gate && !gate.cleared) {
    var gd = GF.dist(player.x, player.y, gate.x, gate.y);
    if (gd <= (gate.target + player.size * 0.2) * GF.S) {
      var diff = player.size - gate.target;
      if (Math.abs(diff) <= gate.tol) {
        // FITS — clear it
        gate.cleared = true;
        GF.spawnParticles(gate.x, gate.y, '#5effa6', 26);
        flash(curStrings().fits, '#5effa6');
        GF.setShake(0.25);
        gateIdx += 1;
        strandTimer = 0;
        if (gateIdx >= gates.length) {
          // all gates cleared → next level
          nextLevel();
          return;
        }
        GF.saveRun();
      } else {
        // doesn't fit → bounce back + message
        flash(diff > 0 ? curStrings().too_big : curStrings().too_small, '#ff8a5a');
        var pdx = player.x - gate.x, pdy = player.y - gate.y + 1;
        var pl = Math.sqrt(pdx * pdx + pdy * pdy) || 1;
        player.vx += (pdx / pl) * 5 * GF.S;
        player.vy += (pdy / pl) * 5 * GF.S;
        GF.setShake(0.18);
      }
    }
  }

  // ── Strand guard (anti soft-lock; not the main pressure) ──
  var fit = gate ? Math.abs(player.size - gate.target) <= gate.tol : false;
  var edibleLeft = false;
  for (var e = 0; e < bits.length; e++) { if (bits[e].r < player.size * EAT_RATIO) { edibleLeft = true; break; } }
  var canShrink = predators.length > 0 && player.size > MIN_SIZE + NIP_SHRINK;
  if (!fit && !edibleLeft && !canShrink) {
    strandTimer += dt;
    if (strandTimer >= STRAND_LIMIT) {
      flash(curStrings().too_small, '#ff8a5a');
      strandTimer = 0;
      loseLife(false);
      if (gs !== 'PLAYING') return;
      buildLevel(level); // reset the layout so a path exists again
    }
  } else {
    strandTimer = Math.max(0, strandTimer - dt);
  }
}

function flash(msg, col) { flashMsg = msg; flashColor = col || '#fff'; flashT = 1.1; }
var flashColor = '#fff';

// ── DRAW ───────────────────────────────────────────────────────────────────
function draw(ctx) {
  drawBackground(ctx);

  if (gs === 'PLAYING' || gs === 'GAMEOVER' || gs === 'WON') {
    drawGates(ctx);
    drawBits(ctx);
    drawPredators(ctx);
    drawPlayer(ctx);
  }

  if (gs === 'PLAYING') {
    drawHUD(ctx);
    if (flashT > 0) drawFlash(ctx);
    if (tutorialOpen) drawTutorialPanel(ctx);
  }

  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'GAMEOVER') {
    overlayBtn = drawEndOverlay(ctx, GF.t('gameover'), GF.t('reached') + ' ' + level, GF.t('retry'));
  }
  if (gs === 'WON') {
    overlayBtn = drawEndOverlay(ctx, GF.t('won'), GF.t('best') + ': ' + best, GF.t('again'));
  }
}

function drawBackground(ctx) {
  var g = ctx.createRadialGradient(GF.cx, GF.cy, 0, GF.cx, GF.cy, Math.max(GF.W, GF.H) * 0.72);
  g.addColorStop(0, '#0e5a6e');
  g.addColorStop(0.55, '#0a3d52');
  g.addColorStop(1, '#05202a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, GF.W, GF.H);
  // faint caustic bubbles
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#bdf6ff';
  for (var i = 0; i < 18; i++) {
    var bx = ((i * 97 + pulseT * 8) % (GF.W + 60)) - 30;
    var by = (GF.H - ((pulseT * 14 + i * 53) % (GF.H + 80)));
    ctx.beginPath(); ctx.arc(bx, by, (3 + (i % 4) * 2) * GF.S, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawGates(ctx) {
  for (var i = 0; i < gates.length; i++) {
    var gt = gates[i];
    var active = (i === gateIdx) && !gt.cleared;
    var rad = gt.target * GF.S;
    ctx.save();
    if (gt.cleared) {
      ctx.globalAlpha = 0.28;
      ctx.strokeStyle = '#5effa6';
    } else if (active) {
      // pulse to draw attention
      var pulse = 0.5 + 0.5 * Math.sin(pulseT * 3);
      ctx.globalAlpha = 0.85;
      ctx.strokeStyle = '#7fe3ff';
      ctx.shadowColor = '#7fe3ff'; ctx.shadowBlur = (10 + pulse * 10) * GF.S;
    } else {
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#9fd6e6';
    }
    // gate ring = the silhouette the player must match
    ctx.lineWidth = 5 * GF.S;
    ctx.beginPath(); ctx.arc(gt.x, gt.y, rad, 0, Math.PI * 2); ctx.stroke();
    // inner aperture glow
    ctx.shadowBlur = 0;
    ctx.globalAlpha = (active ? 0.20 : 0.10);
    var ig = ctx.createRadialGradient(gt.x, gt.y, 0, gt.x, gt.y, rad);
    ig.addColorStop(0, active ? 'rgba(127,227,255,0.6)' : 'rgba(159,214,230,0.3)');
    ig.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ig;
    ctx.beginPath(); ctx.arc(gt.x, gt.y, rad, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    // tolerance band (subtle dashed ring showing the window)
    if (active) {
      ctx.save();
      ctx.globalAlpha = 0.4;
      ctx.strokeStyle = 'rgba(127,227,255,0.5)';
      ctx.lineWidth = 1.5 * GF.S;
      ctx.setLineDash([5 * GF.S, 6 * GF.S]);
      ctx.beginPath(); ctx.arc(gt.x, gt.y, (gt.target + gt.tol) * GF.S, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(gt.x, gt.y, Math.max(2, (gt.target - gt.tol)) * GF.S, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    // gate marker icon
    if (gt.cleared) {
      ctx.fillStyle = '#5effa6';
      ctx.font = 'bold ' + (rad * 0.9) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('✓', gt.x, gt.y + 1);
    }
  }
}

function drawBits(ctx) {
  for (var i = 0; i < bits.length; i++) {
    var b = bits[i];
    var edible = b.r < player.size * EAT_RATIO;
    var rr2 = (b.r + Math.sin(b.bob) * 0.6) * GF.S;
    if (edible) {
      // edible → bright golden sprite (or golden procedural fallback)
      GF.drawSprite('bit', b.x, b.y, rr2 * 2, function(c, x, y, s) {
        var g = c.createRadialGradient(x - s * 0.15, y - s * 0.15, 0, x, y, s / 2);
        g.addColorStop(0, '#fff1b8'); g.addColorStop(1, '#ffb84d');
        c.fillStyle = g;
        c.beginPath(); c.arc(x, y, s / 2, 0, Math.PI * 2); c.fill();
      });
    } else {
      // too big to eat yet → dim grey procedural so the player can tell apart
      var c = ctx;
      var g2 = c.createRadialGradient(b.x - rr2 * 0.3, b.y - rr2 * 0.3, 0, b.x, b.y, rr2);
      g2.addColorStop(0, '#9fb0b8'); g2.addColorStop(1, '#5d6f77');
      c.fillStyle = g2; c.globalAlpha = 0.8;
      c.beginPath(); c.arc(b.x, b.y, rr2, 0, Math.PI * 2); c.fill();
      c.globalAlpha = 1;
    }
  }
}

function drawCreatureBlob(ctx, x, y, r, bodyA, bodyB, hurt, facing) {
  ctx.save();
  ctx.translate(x, y);
  // body
  var g = ctx.createRadialGradient(-r * 0.25, -r * 0.3, r * 0.1, 0, 0, r);
  g.addColorStop(0, hurt > 0 ? '#ffd0d0' : bodyA);
  g.addColorStop(1, hurt > 0 ? '#ff6a6a' : bodyB);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  // belly highlight
  ctx.globalAlpha = 0.25; ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.ellipse(-r * 0.2, -r * 0.25, r * 0.4, r * 0.3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  // eyes (face the swim/facing direction)
  var ex = (facing >= 0 ? 1 : -1) * r * 0.32;
  var eyeR = Math.max(2, r * 0.18);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ex, -r * 0.18, eyeR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex + (facing >= 0 ? 1 : -1) * r * 0.02, r * 0.18, eyeR * 0.85, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#173';
  ctx.beginPath(); ctx.arc(ex + (facing >= 0 ? 1 : -1) * eyeR * 0.3, -r * 0.18, eyeR * 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawPlayer(ctx) {
  var r = player.size * GF.S;
  var facing = player.vx >= 0 ? 1 : -1;
  GF.drawSprite('player', player.x, player.y, r * 2, function() {
    drawCreatureBlob(ctx, player.x, player.y, r, '#9be8ff', '#3aa6d8', player.hurt, facing);
  });
}

function drawPredators(ctx) {
  for (var i = 0; i < predators.length; i++) {
    var pd = predators[i];
    var r = pd.r * GF.S;
    var facing = Math.cos(pd.dir) >= 0 ? 1 : -1;
    GF.drawSprite('predator', pd.x, pd.y, r * 2, function() {
      drawCreatureBlob(ctx, pd.x, pd.y, r, '#ff9adb', '#c0397a', 0, facing);
    });
    // teeth hint so it reads as dangerous
    ctx.save();
    ctx.translate(pd.x, pd.y);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    var mx = facing * r * 0.55;
    for (var t = 0; t < 3; t++) {
      ctx.beginPath();
      var tx = mx + facing * t * r * 0.16 - facing * r * 0.16;
      ctx.moveTo(tx, r * 0.2);
      ctx.lineTo(tx + facing * r * 0.08, r * 0.42);
      ctx.lineTo(tx + facing * r * 0.16, r * 0.2);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }
}

// ── HUD ──────────────────────────────────────────────────────────────────
function drawHUD(ctx) {
  var fs = GF.clamp(16 * GF.S, 13, 22);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('level') + ' ' + level + '/' + TOTAL_LEVELS, 14 * GF.S, 14 * GF.S);

  // lives pips + help button (top-right)
  var pad = 14 * GF.S;
  var helpSz = GF.clamp(30 * GF.S, 24, 40);
  helpBtn = { x: GF.W - pad - helpSz, y: 12 * GF.S, w: helpSz, h: helpSz };
  var pipR = GF.clamp(7 * GF.S, 5, 11);
  var gap = pipR * 2.6;
  for (var i = 0; i < MAX_LIVES; i++) {
    var px = GF.W - pad - helpSz - 14 * GF.S - i * gap - pipR;
    var py = 14 * GF.S + pipR;
    ctx.beginPath(); ctx.arc(px, py, pipR, 0, Math.PI * 2);
    ctx.fillStyle = i < lives ? '#ff5566' : 'rgba(255,85,102,0.22)';
    ctx.fill();
  }
  GF.rr(ctx, helpBtn.x, helpBtn.y, helpBtn.w, helpBtn.h, 7 * GF.S);
  ctx.fillStyle = 'rgba(20,60,72,0.85)'; ctx.fill();
  ctx.strokeStyle = 'rgba(160,220,235,0.55)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#cfe'; ctx.font = 'bold ' + (helpSz * 0.55) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', helpBtn.x + helpSz / 2, helpBtn.y + helpSz / 2 + 1);
  ctx.textBaseline = 'top';

  drawSizeMeter(ctx);
  drawDashButton(ctx);
}

// Size meter (top-center): current size + target gate window band.
function drawSizeMeter(ctx) {
  var gate = gates[gateIdx];
  var barW = Math.min(GF.W * 0.5, 280 * GF.S);
  var barH = GF.clamp(16 * GF.S, 12, 22);
  var bx = GF.cx - barW / 2;
  var by = 16 * GF.S;
  // scale: 0 .. maxScale
  var maxScale = START_SIZE + 38;
  function sx(v) { return bx + GF.clamp(v / maxScale, 0, 1) * barW; }

  // track
  GF.rr(ctx, bx, by, barW, barH, barH / 2);
  ctx.fillStyle = 'rgba(10,40,52,0.85)'; ctx.fill();
  ctx.strokeStyle = 'rgba(160,220,235,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();

  // target window band
  var overshot = false;
  if (gate) {
    var loX = sx(gate.target - gate.tol), hiX = sx(gate.target + gate.tol);
    ctx.save();
    GF.rr(ctx, loX, by, Math.max(3 * GF.S, hiX - loX), barH, 3 * GF.S);
    ctx.fillStyle = 'rgba(94,255,166,0.55)'; ctx.fill();
    ctx.restore();
    // target tick
    var tX = sx(gate.target);
    ctx.strokeStyle = '#5effa6'; ctx.lineWidth = 2 * GF.S;
    ctx.beginPath(); ctx.moveTo(tX, by - 4 * GF.S); ctx.lineTo(tX, by + barH + 4 * GF.S); ctx.stroke();
    overshot = player.size > gate.target + gate.tol;
  }

  // current-size fill marker
  var cX = sx(player.size);
  var fitNow = gate && Math.abs(player.size - gate.target) <= gate.tol;
  ctx.fillStyle = fitNow ? '#5effa6' : (overshot ? '#ff6a6a' : '#ffd76a');
  ctx.beginPath(); ctx.arc(cX, by + barH / 2, barH * 0.66, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#053'; ctx.lineWidth = 1.5; ctx.stroke();

  // label
  ctx.fillStyle = '#cfe';
  ctx.font = GF.clamp(11 * GF.S, 9, 15) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('size'), GF.cx, by + barH + 4 * GF.S);
}

function drawDashButton(ctx) {
  var sz = GF.clamp(66 * GF.S, 52, 92);
  var pad = 18 * GF.S;
  dashBtn = { x: GF.W - pad - sz, y: GF.H - pad - sz, w: sz, h: sz };
  var ready = dashCd <= 0;
  ctx.save();
  ctx.beginPath(); ctx.arc(dashBtn.x + sz / 2, dashBtn.y + sz / 2, sz / 2, 0, Math.PI * 2);
  ctx.fillStyle = ready ? 'rgba(60,166,216,0.85)' : 'rgba(40,80,95,0.7)';
  ctx.fill();
  ctx.strokeStyle = ready ? '#9be8ff' : 'rgba(150,200,215,0.5)';
  ctx.lineWidth = 2.5 * GF.S; ctx.stroke();
  // cooldown arc
  if (!ready) {
    ctx.beginPath();
    ctx.arc(dashBtn.x + sz / 2, dashBtn.y + sz / 2, sz / 2 - 3 * GF.S,
      -Math.PI / 2, -Math.PI / 2 + (1 - dashCd / DASH_COOLDOWN) * Math.PI * 2);
    ctx.strokeStyle = '#7fe3ff'; ctx.lineWidth = 3 * GF.S; ctx.stroke();
  }
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + GF.clamp(14 * GF.S, 11, 19) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('dash'), dashBtn.x + sz / 2, dashBtn.y + sz / 2);
  ctx.restore();
}

function drawFlash(ctx) {
  ctx.save();
  ctx.globalAlpha = GF.clamp(flashT, 0, 1);
  ctx.font = 'bold ' + GF.clamp(26 * GF.S, 18, 40) + 'px sans-serif';
  ctx.fillStyle = flashColor;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 8 * GF.S;
  ctx.fillText(flashMsg, GF.cx, GF.cy);
  ctx.restore();
}

// ── MENU + TUTORIAL ────────────────────────────────────────────────────────
function _wrapTextLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var test = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width <= maxW || !cur) cur = test;
    else { lines.push(cur); cur = words[i]; }
  }
  if (cur) lines.push(cur);
  return lines;
}

function drawTutorialBlock(ctx, topY, titleFs) {
  var bodyFs = GF.clamp(13 * GF.S, 11, 16);
  ctx.font = bodyFs + 'px sans-serif';
  var maxW = Math.min(GF.W * 0.86, 470 * GF.S);
  var lineH = bodyFs * 1.32;
  var blockGap = bodyFs * 0.55;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var y = topY;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (var k = 0; k < keys.length; k++) {
    var lines = _wrapTextLines(ctx, GF.t(keys[k]), maxW);
    ctx.fillStyle = (k === keys.length - 1) ? '#ffd76a' : '#d6eef5';
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], GF.cx, y); y += lineH; }
    y += blockGap;
  }
  return y;
}

function drawMenu(ctx) {
  ctx.fillStyle = 'rgba(5,32,42,0.9)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(42 * GF.S, 28, 60);
  ctx.shadowColor = 'rgba(127,227,255,0.5)'; ctx.shadowBlur = 28 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  var topY = GF.clamp(GF.H * 0.13, 52, 150);
  ctx.fillText(GF.t('title'), GF.cx, topY);
  ctx.shadowBlur = 0;
  ctx.font = GF.clamp(15 * GF.S, 12, 20) + 'px sans-serif';
  ctx.fillStyle = '#8fe';
  ctx.fillText(GF.t('sub'), GF.cx, topY + titleFs * 0.6);

  var blockTop = topY + titleFs * 0.6 + GF.clamp(26 * GF.S, 16, 38);
  var y = drawTutorialBlock(ctx, blockTop, titleFs);

  var btnW = GF.clamp(220 * GF.S, 150, 300), btnH = GF.clamp(50 * GF.S, 40, 62);
  var btnX = GF.cx - btnW / 2, btnY = Math.min(y + 12 * GF.S, GF.H - btnH - 26 * GF.S);
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#37c8a0'); grad.addColorStop(1, '#1e9e88');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 24) + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), GF.cx, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  menuPlayBtn = { x: btnX, y: btnY, w: btnW, h: btnH };

  if (best > 0) {
    ctx.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
    ctx.fillStyle = '#7ab'; ctx.textBaseline = 'top';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, btnY + btnH + 12 * GF.S);
  }
}

function drawTutorialPanel(ctx) {
  ctx.fillStyle = 'rgba(5,32,42,0.93)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(26 * GF.S, 18, 36);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var topY = GF.clamp(GF.H * 0.15, 48, 150);
  ctx.fillText(GF.t('title'), GF.cx, topY);
  var y = drawTutorialBlock(ctx, topY + titleFs * 1.5, titleFs);
  ctx.fillStyle = '#9cd';
  ctx.font = GF.clamp(13 * GF.S, 11, 17) + 'px sans-serif';
  ctx.fillText(GF.lang === 'ru' ? '(нажмите, чтобы закрыть)' : '(tap anywhere to close)',
    GF.cx, Math.min(y + 8 * GF.S, GF.H - 28 * GF.S));
}

function drawEndOverlay(ctx, title, sub, btnText) {
  return GF.drawOverlay({ title: title, sub: sub, btnText: btnText, btnFn: startGame,
    bestText: GF.t('best') + ': ' + best }) || { x: GF.cx - 120, y: GF.cy + 20, w: 240, h: 52 };
}

// ── BOOT ───────────────────────────────────────────────────────────────────
GF.init({
  designW: 540,
  designH: 720,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'tidepool',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('tidepool_best') || '0') || 0; } catch (e) {}
    GF.persist('tidepool_run_v1',
      function() {
        return { gs: gs, level: level, lives: lives, size: player.size };
      },
      function(s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        level = s.level || 1;
        lives = (typeof s.lives === 'number') ? s.lives : MAX_LIVES;
      }
    );
    // Resume to a safe screen rather than live play (Yandex 1.9 best practice):
    // keep level/lives, re-enter via MENU and rebuild a fresh layout.
    if (gs === 'PLAYING') gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// Expose state for post-build-tester (DESIGN.md cross-check).
GF.exposeState(function() {
  var gate = gates[gateIdx];
  return {
    gs: gs, level: level, lives: lives,
    size: player.size, bitsRemaining: bitsRemaining,
    bitCount: bits.length, predatorCount: predators.length,
    gateIdx: gateIdx, gateCount: gates.length,
    gateTarget: gate ? gate.target : null, gateTol: gate ? gate.tol : null,
    strandTimer: strandTimer, dashCd: dashCd, tutorialOpen: tutorialOpen,
    // tunables
    MAX_LIVES: MAX_LIVES, TOTAL_LEVELS: TOTAL_LEVELS, START_SIZE: START_SIZE,
    GROW_PER_EAT: GROW_PER_EAT, GATE_TOLERANCE: GATE_TOLERANCE, NIP_SHRINK: NIP_SHRINK,
    SWIM_ACCEL: SWIM_ACCEL, DASH_SPEED: DASH_SPEED, DASH_COOLDOWN: DASH_COOLDOWN,
    PREDATOR_SPEED: PREDATOR_SPEED, EAT_RATIO: EAT_RATIO,
    SWALLOW_RATIO: SWALLOW_RATIO, STRAND_LIMIT: STRAND_LIMIT,
  };
});

// Test/automation hooks (safe to ship — platforms don't reject these).
window._setLang = function(l) { GF.lang = l; };
window._setState = function(s) { gs = s; };
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'sans-serif'; };
// Debug/automation: read live entity positions (safe to ship — platforms
// don't reject inert test hooks; used by the headless playtest harness).
window._debugWorld = function() {
  return {
    player: { x: player.x, y: player.y, size: player.size },
    bits: bits.map(function(b){ return { x:b.x, y:b.y, r:b.r }; }),
    predators: predators.map(function(p){ return { x:p.x, y:p.y, r:p.r }; }),
    gate: gates[gateIdx] ? { x:gates[gateIdx].x, y:gates[gateIdx].y, target:gates[gateIdx].target, tol:gates[gateIdx].tol } : null,
  };
};

})();
</script>
