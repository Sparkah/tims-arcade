    coins = Math.max(0, +s.coins || 0);

  } catch (e) {}
}

// ── DAILY-SEEDED ENDLESS GENERATOR ──────────────────────────────────────────
// After the 14 authored levels, generate increasingly tight spots. Seeded by
// today's date + the endless index so the "same day" gives the same ladder
// (a comeback hook) but each step is tighter.
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function daySeed() {
  var d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}
function genEndlessLevel(idx) {
  var rng = mulberry32(daySeed() * 131 + idx * 7919);
  // tightness grows with idx: bay width shrinks toward the car width.
  var tight = Math.min(0.85, idx * 0.06);
  var bw = Math.round(CAR_W + 26 - tight * 18); // 52 → ~34
  var sideways = rng() < 0.4;
  var bayX = 90 + Math.round(rng() * 180);
  var L = { start: { x: 180, y: 580, h: 0 },
            bay: { x: bayX, y: 110 + Math.round(rng()*30),
                   w: bw, l: sideways ? 88 : 100, heading: sideways ? PI/2 : 0 },
            walls: [], obstacles: [], cones: [] };
  // flanking cars on most spots
  if (rng() < 0.8) {
    if (sideways) {
      L.obstacles.push(carBox(bayX, L.bay.y - 75, PI/2));
      L.obstacles.push(carBox(bayX, L.bay.y + 75, PI/2));
    } else {
      L.obstacles.push(carBox(bayX - 66, L.bay.y, 0));
      L.obstacles.push(carBox(bayX + 66, L.bay.y, 0));
    }
  }
  // a partition wall sometimes
  if (rng() < 0.5) {
    var wx = 110 + Math.round(rng() * 140);
    L.walls.push({ x1: wx, y1: 620, x2: wx, y2: 300 + Math.round(rng()*60) });
  }
  // cones narrowing the approach
  var nc = Math.round(rng() * 3);
  for (var i = 0; i < nc; i++) {
    L.cones.push({ x: 90 + Math.round(rng() * 180), y: 250 + Math.round(rng() * 200) });
  }
  return L;
}

function levelData(n) {
  if (n <= AUTHORED_LEVELS) return LEVELS[n - 1];
  return genEndlessLevel(n - AUTHORED_LEVELS);
}

// ── LEVEL LOADING ───────────────────────────────────────────────────────────
function loadLevel(n) {
  var d = levelData(n);
  // outer border walls
  walls = [
    { x1: 0, y1: 0, x2: FIELD_W, y2: 0 },
    { x1: FIELD_W, y1: 0, x2: FIELD_W, y2: FIELD_H },
    { x1: FIELD_W, y1: FIELD_H, x2: 0, y2: FIELD_H },
    { x1: 0, y1: FIELD_H, x2: 0, y2: 0 },
  ];
  for (var i = 0; i < d.walls.length; i++) walls.push(d.walls[i]);
  obstacles = [];
  for (var j = 0; j < d.obstacles.length; j++) {
    var o = d.obstacles[j];
    obstacles.push({ x: o.x, y: o.y, w: o.w, l: o.l, heading: o.heading });
  }
  cones = [];
  for (var k = 0; k < (d.cones || []).length; k++) cones.push({ x: d.cones[k].x, y: d.cones[k].y });
  bay = { x: d.bay.x, y: d.bay.y, w: d.bay.w, l: d.bay.l, heading: d.bay.heading };
  resetCar(d.start);
  straightLen = Math.max(1, GF.dist(d.start.x, d.start.y, bay.x, bay.y));
}

function resetCar(start) {
  car = { x: start.x, y: start.y, heading: start.h, speed: 0 };
  settleT = 0;
  pathLen = 0;
  steerHintFade = (lvl === 1 && !endless) ? 1 : 0;
  tyreMarks = [];
}

// Start a fresh attempt of `lvl` (first entry - resets crash/star bookkeeping).
function startLevel(n) {
  lvl = n;
  endless = n > AUTHORED_LEVELS;
  crashes = 0;
  stars = 3;
  attemptTimer = 0;
  garageOpen = false; // entering gameplay always closes the garage overlay
  loadLevel(n);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

// ── GEOMETRY HELPERS ────────────────────────────────────────────────────────
// Corners of an oriented rect (field-local). heading 0 = long axis along -y.
function rectCorners(rx, ry, rw, rl, rh) {
  var hw = rw / 2, hl = rl / 2;
  var c = Math.cos(rh), s = Math.sin(rh);
  // local corners: x across width, y along length (negative y = nose forward)
  var pts = [ [-hw, -hl], [hw, -hl], [hw, hl], [-hw, hl] ];
  var out = [];
  for (var i = 0; i < 4; i++) {
    var lx = pts[i][0], ly = pts[i][1];
    out.push({ x: rx + lx * c - ly * s, y: ry + lx * s + ly * c });
  }
  return out;
}
function carCorners() { return rectCorners(car.x, car.y, CAR_W, CAR_L, car.heading); }

// Separating-axis test between two convex polygons (arrays of {x,y}).
function polysOverlap(a, b) {
  var polys = [a, b];
  for (var p = 0; p < 2; p++) {
    var poly = polys[p];
    for (var i = 0; i < poly.length; i++) {
      var j = (i + 1) % poly.length;
      var nx = -(poly[j].y - poly[i].y), ny = (poly[j].x - poly[i].x);
      var minA = Infinity, maxA = -Infinity, minB = Infinity, maxB = -Infinity;
      for (var k = 0; k < a.length; k++) { var d = a[k].x * nx + a[k].y * ny; if (d < minA) minA = d; if (d > maxA) maxA = d; }
      for (var m = 0; m < b.length; m++) { var e = b[m].x * nx + b[m].y * ny; if (e < minB) minB = e; if (e > maxB) maxB = e; }
      if (maxA < minB || maxB < minA) return false;
    }
  }
  return true;
}

// Distance from point P to segment AB.
function ptSegDist(px, py, ax, ay, bx, by) {
  var dx = bx - ax, dy = by - ay;
  var len2 = dx * dx + dy * dy;
  var t = len2 > 0 ? ((px - ax) * dx + (py - ay) * dy) / len2 : 0;
  t = t < 0 ? 0 : t > 1 ? 1 : t;
  var cxp = ax + t * dx, cyp = ay + t * dy;
  return GF.dist(px, py, cxp, cyp);
}

// Does the car's oriented rect collide with any wall / obstacle / cone?
function collide() {
  var corners = carCorners();
  // walls: treat as thick capsules - any car corner within WALL_THICK of the
  // segment, OR the car edge crossing the wall. Corner-distance test catches
  // the common scrape; also test the wall endpoints against the car polygon.
  for (var w = 0; w < walls.length; w++) {
    var wl = walls[w];
    for (var c = 0; c < 4; c++) {
      if (ptSegDist(corners[c].x, corners[c].y, wl.x1, wl.y1, wl.x2, wl.y2) <= WALL_THICK) return true;
    }
    // also: car center crossing very close (covers thin slivers)
    if (ptSegDist(car.x, car.y, wl.x1, wl.y1, wl.x2, wl.y2) <= WALL_THICK + 2) {
      // confirm with edge sampling along the wall for robustness
      var steps = 6;
      for (var sI = 0; sI <= steps; sI++) {
        var tt = sI / steps;
        var sx = wl.x1 + (wl.x2 - wl.x1) * tt, sy = wl.y1 + (wl.y2 - wl.y1) * tt;
        if (pointInPoly(sx, sy, corners)) return true;
      }
    }
  }
  for (var o = 0; o < obstacles.length; o++) {
    var ob = obstacles[o];
    var oc = rectCorners(ob.x, ob.y, ob.w, ob.l, ob.heading);
    if (polysOverlap(corners, oc)) return true;
  }
  for (var k = 0; k < cones.length; k++) {
    if (polyCircleHit(corners, cones[k].x, cones[k].y, CONE_R)) return true;
  }
  return false;
}

function pointInPoly(px, py, poly) {
  var inside = false;
  for (var i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    var xi = poly[i].x, yi = poly[i].y, xj = poly[j].x, yj = poly[j].y;
    if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}
function polyCircleHit(poly, cxp, cyp, r) {
  if (pointInPoly(cxp, cyp, poly)) return true;
  for (var i = 0; i < poly.length; i++) {
    var j = (i + 1) % poly.length;
    if (ptSegDist(cxp, cyp, poly[i].x, poly[i].y, poly[j].x, poly[j].y) <= r) return true;
  }
  return false;
}

// Is the car settled inside the bay within tolerance?
function parkedInBay() {
  if (!bay) return false;
  var corners = carCorners();
  var bc = rectCorners(bay.x, bay.y, bay.w, bay.l, bay.heading);
  // all four car corners inside bay polygon
  for (var i = 0; i < 4; i++) if (!pointInPoly(corners[i].x, corners[i].y, bc)) return false;
  // active-car forgiveness perk widens the heading/position tolerances (M1 garage)
  var pc = curCar();
  // heading aligned (mod PI so either nose direction along the bay axis is OK)
  var dh = Math.abs(angDiff(car.heading, bay.heading));
  if (dh > PI / 2) dh = PI - dh;
  if (dh > ANGLE_TOL * pc.ang) return false;
  // center close to bay center
  if (GF.dist(car.x, car.y, bay.x, bay.y) > POS_TOL * pc.pos) return false;
  return true;
}
function angDiff(a, b) {
  var d = (a - b) % (2 * PI);
  if (d > PI) d -= 2 * PI;
  if (d < -PI) d += 2 * PI;
  return d;
}

// ── INPUT ───────────────────────────────────────────────────────────────────
var steerLeft = false, steerRight = false;
var helpBtn = null, menuBtn = null, garageBtn = null, muteBtn = null;
var uiButtons = [];
var uiLockUntil = 0;
// pointer id → 'L' | 'R' so multitouch steer halves track independently
var activePointers = {};

function uiHit(px, py) {
  for (var i = 0; i < uiButtons.length; i++) {
    var b = uiButtons[i];
    if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
      uiLockUntil = Date.now() + 450;
      b.fn();
      return true;
    }
  }
  return false;
}

function pressDown(id, px, py) {
  pulseT = 0;
  // GARAGE overlay swallows all input while open (reachable from MENU + mid-run).
  if (garageOpen) { garageHit(px, py); return; }
  // mute button is live on every screen (bottom-right), checked before anything else.
  if (muteBtn && hitBtn(muteBtn, px, py)) { if (GF.toggleMute) GF.toggleMute(); return; }
  if (Date.now() < uiLockUntil && (gs === 'MENU' || gs === 'LEVELCLEAR' || gs === 'WIN')) return;
  if (gs === 'MENU') {
    if (tutorialOpen) { tutorialOpen = false; saveTutorialSeen(); return; }
    uiHit(px, py); return;
  }
  if (gs === 'LEVELCLEAR' || gs === 'WIN') { uiHit(px, py); return; }
  if (gs === 'CRASH') {
    // only the back-to-menu button is live during the crash freeze
    if (menuBtn && hitBtn(menuBtn, px, py)) { goMenu(); }
    return;
  }
  if (gs === 'PLAYING') {
    if (tutorialOpen) { tutorialOpen = false; return; }
    if (helpBtn && hitBtn(helpBtn, px, py)) { tutorialOpen = true; return; }
    if (garageBtn && hitBtn(garageBtn, px, py)) { openGarage(); return; }
    if (menuBtn && hitBtn(menuBtn, px, py)) { goMenu(); return; }
    // steer half
    if (px < GF.W / 2) { activePointers[id] = 'L'; steerLeft = true; }
    else { activePointers[id] = 'R'; steerRight = true; }
    steerHintFade = 0;
  }
}
function pressUp(id) {
  var side = activePointers[id];
  delete activePointers[id];
  // recompute held sides from remaining pointers
  steerLeft = false; steerRight = false;
  for (var k in activePointers) {
    if (activePointers[k] === 'L') steerLeft = true;
    if (activePointers[k] === 'R') steerRight = true;
  }
  // keyboard may still hold - handled separately
  if (keyL) steerLeft = true;
  if (keyR) steerRight = true;
}
function hitBtn(b, px, py) { return px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h; }

function goMenu() {
  gs = 'MENU';
  garageOpen = false;
  steerLeft = steerRight = false;
  activePointers = {};
  GF.gameEnded();
  GF.saveRun();
}

var _canvas = document.getElementById('c');
_canvas.addEventListener('pointerdown', function(e) { pressDown(e.pointerId, e.clientX, e.clientY); }, { passive: true });
_canvas.addEventListener('pointerup',   function(e) { pressUp(e.pointerId); }, { passive: true });
_canvas.addEventListener('pointercancel', function(e) { pressUp(e.pointerId); }, { passive: true });
// click is used for the overlay UI buttons on platforms that synthesize it;
// pointerdown already covers it but keep a guarded fallback for menu taps.
_canvas.addEventListener('click', function(e) {
  if (garageOpen) return; // pointerdown already routes garage taps
  if (gs === 'MENU' || gs === 'LEVELCLEAR' || gs === 'WIN') {
    if (Date.now() < uiLockUntil) return;
    if (gs === 'MENU' && tutorialOpen) return;
    if (muteBtn && hitBtn(muteBtn, e.clientX, e.clientY)) return; // handled on pointerdown
    uiHit(e.clientX, e.clientY);
  }
});

// keyboard steer
var keyL = false, keyR = false;
document.addEventListener('keydown', function(e) {
  var c = e.code;
  if (c === 'Escape') return; // reserved
  if (gs === 'PLAYING' && tutorialOpen) { return; }
  if ((c === 'ArrowLeft' || c === 'KeyA')) { keyL = true; if (gs === 'PLAYING') { steerLeft = true; steerHintFade = 0; } }
  if ((c === 'ArrowRight' || c === 'KeyD')) { keyR = true; if (gs === 'PLAYING') { steerRight = true; steerHintFade = 0; } }
  if (c === 'Space' || c === 'Enter') {
    if (gs === 'MENU') startLevel(maxLevel);
    else if (gs === 'LEVELCLEAR') advance();
    else if (gs === 'WIN') startEndless();
    e.preventDefault();
  }
});
document.addEventListener('keyup', function(e) {
  var c = e.code;
  if (c === 'ArrowLeft' || c === 'KeyA') { keyL = false; if (!heldSide('L')) steerLeft = false; }
  if (c === 'ArrowRight' || c === 'KeyD') { keyR = false; if (!heldSide('R')) steerRight = false; }
});
function heldSide(s) { for (var k in activePointers) if (activePointers[k] === s) return true; return false; }

// ── PROGRESSION ───────────────────────────────────────────────────────────
function onCrash() {
  if (gs !== 'PLAYING') return;
  crashes += 1;
  if (stars > 1) stars -= 1; // every reset costs the ceiling, min 1
  car.speed = 0;
  GF.setShake(0.5);
  GF.spawnParticles(fx(car.x), fy(car.y), '#ff5252', 20);
  GF.spawnParticles(fx(car.x), fy(car.y), '#ffd24a', 12);
  gs = 'CRASH';
  crashT = CRASH_RESET_SEC;
  GF.saveRun();
}

function onParked() {
  if (gs !== 'PLAYING') return;
  // path-length penalty: wandering line loses a star (independent of crashes)
  var ratio = pathLen / straightLen;
  if (ratio > PATH_PAR && stars > 1) stars -= 1;
  earnedStars = Math.max(1, stars);
  lastParkPerfect = (crashes === 0 && ratio <= PATH_PAR);
  GF.spawnParticles(fx(car.x), fy(car.y), '#39d98a', 26);
  GF.spawnFloat(fx(car.x), fy(car.y) - 24 * GF.S, curStrings()[lastParkPerfect ? 'perfect' : 'parked'], '#39d98a');
  if (GF.sfx) GF.sfx(lastParkPerfect ? 'win' : 'levelup');
  // ── M1: bank permanent COINS (the meta currency) ──────────────────────────
  var firstClear = !clearedOnce[lvl];
  lastEarned = earnedStars * COIN_PER_STAR + (firstClear ? COIN_FIRST_CLR : 0);
  coins += lastEarned;
  clearedOnce[lvl] = true;
  GF.spawnFloat(fx(car.x), fy(car.y) - 44 * GF.S, '+' + lastEarned + curStrings().coins_short, '#ffd24a');
  if (GF.sfx) GF.sfx('coin');
  checkCarUnlock();
  // persist best
  if (!endless) {
    if (earnedStars > (bestStars[lvl] || 0)) bestStars[lvl] = earnedStars;
    if (lvl + 1 > maxLevel) maxLevel = Math.min(AUTHORED_LEVELS + 1, lvl + 1);
  }
  if (!endless && lvl >= AUTHORED_LEVELS) {
    gs = 'WIN';
    GF.happytime();
  } else {
    gs = 'LEVELCLEAR';
    if (lastParkPerfect) GF.happytime();
  }
  steerLeft = steerRight = false;
  saveMeta();
  GF.gameEnded();
  GF.saveRun();
}

// ── M1 GARAGE actions ───────────────────────────────────────────────────────
// Auto-grant any car whose cost is now affordable? No — unlock is a deliberate
// player choice (spend coins) so the garage stays a destination. But fire a
// "you can afford a new car" toast the moment one becomes affordable, so the
// pull is felt OUTSIDE the menu.
var _afforded = {}; // id -> true once we've toasted affordability (avoid spam)
function checkCarUnlock() {
  var nl = nextLockedCar();
  if (nl && canAfford(nl) && !_afforded[nl.id]) {
    _afforded[nl.id] = true;
    carToast = { car: nl, t: 3.2, kind: 'afford' };
  }
}
function buyCar(id) {
  var c = carById(id);
  if (ownedCars[id] || !canAfford(c)) return false;
  coins -= c.cost;
  ownedCars[id] = true;
  activeCar = id; // auto-drive the new car so the perk is felt immediately
  carToast = { car: c, t: 3.0, kind: 'unlock' };
  if (GF.sfx) GF.sfx('unlock');
  saveMeta();
  return true;
}
function driveCar(id) {
  if (!ownedCars[id]) return false;
  activeCar = id;
  if (GF.sfx) GF.sfx('tap');
  saveMeta();
  return true;
}

function advance() { // from LEVELCLEAR → next level
  startLevel(lvl + 1);
}
function startEndless() { // from WIN → first endless level
  startLevel(AUTHORED_LEVELS + 1);
}

// ── ADS (Yandex) - user-click only, throttled. No auto-fire. ────────────────
function showInterstitial(onDone) {
  var now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  if (now - lastInterstitialMs < INTERSTITIAL_GAP_MS) { if (onDone) onDone(); return; }
  lastInterstitialMs = now;
  GF.showAd('midgame').then(function() { if (onDone) onDone(); });
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt) {
  pulseT += dt;
  layoutField();
  if (carToast) { carToast.t -= dt; if (carToast.t <= 0) carToast = null; }
  if (gs === 'CRASH') {
    crashT -= dt;
    if (crashT <= 0) {
      // forgiving instant retry of the same level
      var d = levelData(lvl);
      resetCar(d.start);
      gs = 'PLAYING';
      GF.gameStarted();
      GF.saveRun();
    }
    return;
  }
  if (gs !== 'PLAYING') return;
  if (tutorialOpen) return;
  if (_ssMode) return;

  attemptTimer += dt;
  if (steerHintFade > 0) steerHintFade = Math.max(0, steerHintFade - dt * 0.6);

  // active-car perks fold into handling here (M1 garage)
  var pc = curCar();
  // steering
  var steer = (steerRight ? 1 : 0) - (steerLeft ? 1 : 0);
  if (steer !== 0) car.heading += steer * (TURN_RATE * pc.turn) * dt;

  // forward auto-creep; coast/settle friction when no input near the bay
  var targetSpeed = CREEP_SPEED * pc.creep;
  car.speed = targetSpeed; // constant creep - the held breath
  // integrate
  var vx = Math.sin(car.heading) * car.speed * dt;   // heading 0 = -y (up)
  var vy = -Math.cos(car.heading) * car.speed * dt;
  var nx = car.x + vx, ny = car.y + vy;
  var moved = GF.dist(car.x, car.y, nx, ny);
  car.x = nx; car.y = ny;
  pathLen += moved;

  // tyre trail (cosmetic)
  if (tyreMarks.length === 0 || GF.dist(car.x, car.y, tyreMarks[tyreMarks.length-1].x, tyreMarks[tyreMarks.length-1].y) > 7) {
    tyreMarks.push({ x: car.x, y: car.y });
    if (tyreMarks.length > 90) tyreMarks.shift();
  }

  // collision → instant retry
  if (collide()) { onCrash(); return; }

  // win check - must be inside the bay AND aligned. Since the car always
  // creeps, "settle" is satisfied by dwelling aligned-in-bay for SETTLE_SEC;
  // we treat being parked-in-bay as the settle accumulator.
  if (parkedInBay()) {
    settleT += dt;
    if (settleT >= SETTLE_SEC) { onParked(); return; }
  } else {
    settleT = Math.max(0, settleT - dt * 2);
  }
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function draw(ctx) {
  layoutField();
  // backdrop
  ctx.fillStyle = '#14171d';
  ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'PLAYING' || gs === 'CRASH' || gs === 'LEVELCLEAR' || gs === 'WIN') {
    drawField(ctx);
    drawBay(ctx);
    drawTrail(ctx);
    drawObstacles(ctx);
    drawCones(ctx);
    drawWalls(ctx);
    drawCar(ctx);
  }

  if (gs === 'PLAYING') {
    if (steerHintFade > 0.02) drawSteerHints(ctx);
    drawHUD(ctx);
    if (tutorialOpen) drawTutorialPanel(ctx);
  }
  if (gs === 'CRASH') {
    drawHUD(ctx);
    var a = GF.clamp(crashT / CRASH_RESET_SEC, 0, 1);
    ctx.fillStyle = 'rgba(255,60,60,' + (0.28 * a) + ')';
    ctx.fillRect(0, 0, GF.W, GF.H);
  }

  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'LEVELCLEAR') drawLevelClear(ctx);
  if (gs === 'WIN') drawWin(ctx);

  // GARAGE overlay can ride on top of MENU (and is reachable mid-run via HUD).
  if (garageOpen) drawGarage(ctx);
  // mute button + NEW CAR toast float above everything
  drawMuteBtn(ctx);
  if (carToast) drawCarToast(ctx);
}

// On desktop/wide windows the portrait field is a centered strip; fill the dead
// side margins with a darker garage-wall gradient + a faint steer-half divider so
// it never reads as a "broken" thin column (player comment: "fix desktop").
function drawSideMargins(ctx) {
  var leftW = fx(0), rightX = fx(FIELD_W), rightW = GF.W - rightX;
  if (leftW < 2 && rightW < 2) return; // no margin (portrait) — nothing to do
  var g = ctx.createLinearGradient(0, 0, 0, GF.H);
  g.addColorStop(0, '#0e1016'); g.addColorStop(0.5, '#12151c'); g.addColorStop(1, '#0b0d12');
  ctx.fillStyle = g;
  if (leftW > 0) ctx.fillRect(0, 0, leftW, GF.H);
  if (rightW > 0) ctx.fillRect(rightX, 0, rightW, GF.H);
  // subtle vertical "bay stripes" on the walls so the margin has texture
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  var step = 46 * GF.S;
  for (var x = step; x < leftW; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GF.H); ctx.stroke(); }
  for (var x2 = rightX + step; x2 < GF.W; x2 += step) { ctx.beginPath(); ctx.moveTo(x2, 0); ctx.lineTo(x2, GF.H); ctx.stroke(); }
  // a faint LEFT|RIGHT steer-half divider down the screen center (desktop affordance)
  if (gs === 'PLAYING' && !tutorialOpen) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.setLineDash([6 * GF.S, 8 * GF.S]);
    ctx.strokeStyle = 'rgba(120,150,200,0.20)';
    ctx.lineWidth = 1.5 * GF.S;
    ctx.beginPath(); ctx.moveTo(GF.cx, 0); ctx.lineTo(GF.cx, GF.H); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

function drawField(ctx) {
  drawSideMargins(ctx);
  // asphalt panel
  ctx.fillStyle = '#1d2129';
  ctx.fillRect(fx(0), fy(0), FIELD_W * GF.S, FIELD_H * GF.S);
  // subtle painted lane lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (var gx = 60; gx < FIELD_W; gx += 60) {
    ctx.beginPath(); ctx.moveTo(fx(gx), fy(0)); ctx.lineTo(fx(gx), fy(FIELD_H)); ctx.stroke();
  }
  // vignette
  var g = ctx.createRadialGradient(GF.cx, GF.cy, FIELD_H * GF.S * 0.2, GF.cx, GF.cy, FIELD_H * GF.S * 0.75);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = g;
  ctx.fillRect(fx(0), fy(0), FIELD_W * GF.S, FIELD_H * GF.S);
}

function drawBay(ctx) {
  if (!bay) return;
  var corners = rectCorners(bay.x, bay.y, bay.w, bay.l, bay.heading);
  var pulse = 0.55 + 0.45 * Math.sin(pulseT * 3);
  // glow fill
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(fx(corners[0].x), fy(corners[0].y));
  for (var i = 1; i < 4; i++) ctx.lineTo(fx(corners[i].x), fy(corners[i].y));
  ctx.closePath();
  ctx.fillStyle = 'rgba(57,217,138,' + (0.10 + 0.06 * pulse) + ')';
  ctx.fill();
  ctx.strokeStyle = '#39d98a';
  ctx.lineWidth = 3 * GF.S;
  ctx.shadowColor = '#39d98a';
  ctx.shadowBlur = (10 + 8 * pulse) * GF.S;
  ctx.stroke();
  ctx.restore();
  // ghost car silhouette at parked pose
  var gc = rectCorners(bay.x, bay.y, CAR_W, CAR_L, bay.heading);
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(fx(gc[0].x), fy(gc[0].y));
  for (var j = 1; j < 4; j++) ctx.lineTo(fx(gc[j].x), fy(gc[j].y));
  ctx.closePath();
  ctx.fillStyle = 'rgba(57,217,138,0.10)';
  ctx.fill();
  ctx.setLineDash([5 * GF.S, 5 * GF.S]);
  ctx.strokeStyle = 'rgba(57,217,138,0.45)';
  ctx.lineWidth = 1.5 * GF.S;
  ctx.stroke();
  ctx.setLineDash([]);
  // a little arrow showing the parked facing
  var nx2 = bay.x + Math.sin(bay.heading) * 0, ny2 = bay.y - Math.cos(bay.heading) * (bay.l/2 - 8);
  ctx.fillStyle = 'rgba(57,217,138,0.6)';
  ctx.beginPath();
  ctx.arc(fx(nx2), fy(ny2), 4 * GF.S, 0, PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawTrail(ctx) {
  if (tyreMarks.length < 2) return;
  ctx.strokeStyle = 'rgba(0,0,0,0.28)';
  ctx.lineWidth = CAR_W * 0.32 * GF.S;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(fx(tyreMarks[0].x), fy(tyreMarks[0].y));
  for (var i = 1; i < tyreMarks.length; i++) ctx.lineTo(fx(tyreMarks[i].x), fy(tyreMarks[i].y));
  ctx.stroke();
}

function drawCarBody(ctx, rx, ry, rh, w, l, body, roof) {
  ctx.save();
  ctx.translate(fx(rx), fy(ry));
  ctx.rotate(rh);
  var sw = w * GF.S, sl = l * GF.S;
  // body
  GF.rr(ctx, -sw/2, -sl/2, sw, sl, 6 * GF.S);
  ctx.fillStyle = body;
  ctx.fill();
  // windshield (nose is -y)
  ctx.fillStyle = roof;
  GF.rr(ctx, -sw*0.34, -sl*0.34, sw*0.68, sl*0.26, 3 * GF.S);
  ctx.fill();
  // rear window
  GF.rr(ctx, -sw*0.34, sl*0.12, sw*0.68, sl*0.20, 3 * GF.S);
  ctx.fill();
  // headlights at nose
  ctx.fillStyle = 'rgba(255,255,200,0.9)';
  ctx.beginPath(); ctx.arc(-sw*0.28, -sl*0.46, 2.4 * GF.S, 0, PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sw*0.28, -sl*0.46, 2.4 * GF.S, 0, PI*2); ctx.fill();
  ctx.restore();
}

function drawCar(ctx) {
  var hot = (gs === 'CRASH');
  var pc = curCar();
  drawCarBody(ctx, car.x, car.y, car.heading, CAR_W, CAR_L, hot ? '#ff6b5e' : pc.body, hot ? '#ffd6d0' : pc.roof);
}
function drawObstacles(ctx) {
  for (var i = 0; i < obstacles.length; i++) {
    var o = obstacles[i];
    drawCarBody(ctx, o.x, o.y, o.heading, o.w, o.l, '#7b8696', '#aab4c2');
  }
}
function drawCones(ctx) {
  for (var i = 0; i < cones.length; i++) {
    var cn = cones[i];
    var r = CONE_R * GF.S;
    ctx.save();
    ctx.translate(fx(cn.x), fy(cn.y));
    ctx.beginPath(); ctx.arc(0, 0, r, 0, PI*2);
    ctx.fillStyle = '#ff8a2b'; ctx.fill();
    ctx.beginPath(); ctx.arc(0, 0, r * 0.55, 0, PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(0, 0, r * 0.28, 0, PI*2);
    ctx.fillStyle = '#ff8a2b'; ctx.fill();
    ctx.restore();
  }
}
function drawWalls(ctx) {
  ctx.strokeStyle = '#3a4150';
  ctx.lineWidth = WALL_THICK * 2 * GF.S;
  ctx.lineCap = 'round';
  for (var i = 0; i < walls.length; i++) {
    var w = walls[i];
    ctx.beginPath();
    ctx.moveTo(fx(w.x1), fy(w.y1));
    ctx.lineTo(fx(w.x2), fy(w.y2));
    ctx.stroke();
  }
  // top highlight on border
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 2 * GF.S;
  for (var j = 0; j < walls.length; j++) {
    var wl = walls[j];
    ctx.beginPath();
    ctx.moveTo(fx(wl.x1), fy(wl.y1));
    ctx.lineTo(fx(wl.x2), fy(wl.y2));
    ctx.stroke();
  }
}

function drawSteerHints(ctx) {
  ctx.save();
  ctx.globalAlpha = steerHintFade * 0.5;
  var midY = GF.H * 0.78;
  var fs = GF.clamp(15 * GF.S, 12, 22);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.fillStyle = '#cfe';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // left chevron
  drawChevron(ctx, GF.W * 0.22, midY, -1);
  ctx.fillText(curStrings().hold_left, GF.W * 0.22, midY + 30 * GF.S);
  // right chevron
  drawChevron(ctx, GF.W * 0.78, midY, 1);
  ctx.fillText(curStrings().hold_right, GF.W * 0.78, midY + 30 * GF.S);
  ctx.restore();
}
function drawChevron(ctx, x, y, dir) {
  var s = 16 * GF.S;
  ctx.strokeStyle = '#cfe';
  ctx.lineWidth = 3 * GF.S;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(x + dir * s, y - s);
  ctx.lineTo(x - dir * s, y);
  ctx.lineTo(x + dir * s, y + s);
  ctx.stroke();
}

function drawStars(ctx, n, x, y, size) {
  for (var i = 0; i < 3; i++) {
    drawStar(ctx, x + i * size * 1.25, y, size / 2, i < n ? '#ffd24a' : 'rgba(255,255,255,0.18)');
  }
}
// vector coin (never emoji) — a gold disc with a rim + a small "c"
function drawCoin(ctx, cxp, cyp, r) {
  ctx.save();
  ctx.translate(cxp, cyp);
  ctx.beginPath(); ctx.arc(0, 0, r, 0, PI * 2);
  ctx.fillStyle = '#ffd24a'; ctx.fill();
  ctx.lineWidth = Math.max(1, r * 0.16); ctx.strokeStyle = '#caa023'; ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, r * 0.62, 0, PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = Math.max(1, r * 0.12); ctx.stroke();
  ctx.restore();
}
// a little garage/car silhouette glyph for the GARAGE button (vector, not emoji)
function drawCarGlyph(ctx, cxp, cyp, w, col) {
  ctx.save();
  ctx.translate(cxp, cyp);
  var h = w * 0.5;
  GF.rr(ctx, -w/2, -h*0.18, w, h*0.55, h * 0.22);
  ctx.fillStyle = col || '#cfe'; ctx.fill();
  // cabin
  GF.rr(ctx, -w*0.22, -h*0.5, w*0.44, h*0.4, h * 0.14);
  ctx.fill();
  // wheels
  ctx.fillStyle = '#1a1d25';
  ctx.beginPath(); ctx.arc(-w*0.26, h*0.4, h*0.2, 0, PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(w*0.26, h*0.4, h*0.2, 0, PI*2); ctx.fill();
  ctx.restore();
}
function drawStar(ctx, cxp, cyp, r, col) {
  ctx.save();
  ctx.translate(cxp, cyp);
  ctx.beginPath();
  for (var i = 0; i < 5; i++) {
    var a = -PI/2 + i * (2*PI/5);
    ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    var a2 = a + PI/5;
    ctx.lineTo(Math.cos(a2) * r * 0.45, Math.sin(a2) * r * 0.45);
  }
  ctx.closePath();
  ctx.fillStyle = col;
  ctx.fill();
  ctx.restore();
}

function drawHUD(ctx) {
  var fs = GF.clamp(17 * GF.S, 13, 24);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  var label = endless ? (curStrings().daily + ' ' + (lvl - AUTHORED_LEVELS)) : (curStrings().lvl + ' ' + lvl);
  ctx.fillText(label, 14 * GF.S, 14 * GF.S);

  // ── M1: permanent COIN readout (top-left, under LVL) ──────────────────────
  var coinR = GF.clamp(8 * GF.S, 6, 12);
  var coinY = 14 * GF.S + fs + 12 * GF.S;
  drawCoin(ctx, 14 * GF.S + coinR, coinY + coinR, coinR);
  ctx.font = 'bold ' + GF.clamp(15 * GF.S, 12, 21) + 'px sans-serif';
  ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(String(Math.round(coins)), 14 * GF.S + coinR * 2 + 6 * GF.S, coinY + coinR + 1);
  // "next car: N away" hint OUTSIDE the menu (the pull to keep playing)
  var nl = nextLockedCar();
  if (nl) {
    var need = Math.max(0, nl.cost - Math.round(coins));
    ctx.font = GF.clamp(11 * GF.S, 9, 15) + 'px sans-serif';
    ctx.fillStyle = need === 0 ? '#39d98a' : '#9fb0c4';
    ctx.textBaseline = 'top';
    var hint = need === 0
      ? (curStrings().garage + ': ' + carName(nl) + ' ' + curStrings().unlock + '!')
      : (curStrings().next_car + ': ' + carName(nl) + ' (' + need + curStrings().coins_short + ' ' + curStrings().away + ')');
    ctx.fillText(hint, 14 * GF.S, coinY + coinR * 2 + 6 * GF.S);
  }
  ctx.textBaseline = 'top'; ctx.textAlign = 'left';

  // live star ceiling - top center
  var starSz = GF.clamp(16 * GF.S, 12, 22);
  drawStars(ctx, stars, GF.cx - starSz * 1.6, 14 * GF.S + starSz/2, starSz);

  // help (?) + garage + menu buttons top-right
  var btn = GF.clamp(32 * GF.S, 26, 42);
  var pad = 12 * GF.S, gap = 8 * GF.S;
  helpBtn   = { x: GF.W - pad - btn,                 y: 12 * GF.S, w: btn, h: btn };
  garageBtn = { x: GF.W - pad - btn * 2 - gap,       y: 12 * GF.S, w: btn, h: btn };
  menuBtn   = { x: GF.W - pad - btn * 3 - gap * 2,   y: 12 * GF.S, w: btn, h: btn };
  drawIconBtn(ctx, helpBtn, '?');
  drawGarageBtn(ctx, garageBtn);
  drawIconBtn(ctx, menuBtn, '≡');

  // crash dots (risk signal) under the buttons
  if (crashes > 0) {
    var dotR = GF.clamp(4 * GF.S, 3, 6);
    for (var i = 0; i < Math.min(crashes, 6); i++) {
      ctx.beginPath();
      ctx.arc(GF.W - pad - i * dotR * 2.6 - dotR, 12 * GF.S + btn + 12 * GF.S, dotR, 0, PI * 2);
      ctx.fillStyle = '#ff6b5e';
      ctx.fill();
    }
  }
}
// garage icon button (car silhouette) — pulses gold when a car is affordable
function drawGarageBtn(ctx, b) {
  var nl = nextLockedCar();
  var hot = nl && canAfford(nl);
  GF.rr(ctx, b.x, b.y, b.w, b.h, 7 * GF.S);
  ctx.fillStyle = hot ? 'rgba(60,80,52,0.92)' : 'rgba(40,48,64,0.85)'; ctx.fill();
  ctx.strokeStyle = hot ? 'rgba(57,217,138,0.9)' : 'rgba(160,180,210,0.5)';
  ctx.lineWidth = hot ? 2 : 1.5; ctx.stroke();
  drawCarGlyph(ctx, b.x + b.w / 2, b.y + b.h / 2, b.w * 0.62, hot ? '#9af0c4' : '#cfe');
  if (hot) {
    // little gold dot badge
    ctx.beginPath(); ctx.arc(b.x + b.w - 5 * GF.S, b.y + 5 * GF.S, 4 * GF.S, 0, PI * 2);
    ctx.fillStyle = '#ffd24a'; ctx.fill();
  }
}
function drawIconBtn(ctx, b, glyph) {
  GF.rr(ctx, b.x, b.y, b.w, b.h, 7 * GF.S);
  ctx.fillStyle = 'rgba(40,48,64,0.85)'; ctx.fill();
  ctx.strokeStyle = 'rgba(160,180,210,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#cfe';
  ctx.font = 'bold ' + (b.h * 0.55) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(glyph, b.x + b.w / 2, b.y + b.h / 2 + 1);
  ctx.textBaseline = 'top';
}

// ── TEXT WRAP (measured block layout for the tutorial) ──────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

// Returns the y after drawing - so the next block starts after this one.
function drawTutorialBlock(ctx, items, topY, maxW, lineH, gap) {
  var y = topY;
  for (var i = 0; i < items.length; i++) {
    var lines = wrapLines(ctx, items[i], maxW);
    for (var j = 0; j < lines.length; j++) {
      ctx.fillText(lines[j], GF.cx, y);
      y += lineH;
    }
    y += gap;
  }
  return y;
}

function tutorialItems() {
  var s = curStrings();
  return [s.tut_goal, s.tut_controls, s.tut_win, s.tut_lose, s.tut_tip];
}

// ── MENU ─────────────────────────────────────────────────────────────────────
function drawMenu(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(12,14,20,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(40 * GF.S, 26, 60);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = 'rgba(74,163,255,0.5)'; ctx.shadowBlur = 24 * GF.S;
  var titleY = GF.H * 0.16;
  ctx.fillText(curStrings().title, GF.cx, titleY);
  ctx.shadowBlur = 0;
  var subFs = GF.clamp(15 * GF.S, 12, 20);
  ctx.font = subFs + 'px sans-serif';
  ctx.fillStyle = '#8aa';
  ctx.fillText(curStrings().sub, GF.cx, titleY + subFs + 10 * GF.S);

  // tutorial block (measured, wrapped)
  var bodyFs = GF.clamp(14 * GF.S, 11, 18);
  ctx.font = bodyFs + 'px sans-serif';
  ctx.fillStyle = '#cdd6e3';
  ctx.textBaseline = 'top';
  var maxW = Math.min(GF.W * 0.86, 460 * GF.S);
  var topY = titleY + subFs + 40 * GF.S;
  var endY = drawTutorialBlock(ctx, tutorialItems(), topY, maxW, bodyFs + 5 * GF.S, 9 * GF.S);

  // PLAY button below the tutorial block — wide: bigger + animated
  var wide = GF.W / GF.H > 1.15;
  var btnW = GF.clamp(220 * GF.S, 150, 300), btnH = GF.clamp(54 * GF.S, 42, 66);
  var drawW = wide ? GF.clamp(300 * GF.S, 160, 400) : btnW;
  var drawH = wide ? GF.clamp(70 * GF.S, 48, 90) : btnH;
  var textBlockBottom = endY;
  var clearMargin = drawH / 2 + 16;
  var wideFloor = GF.H * 0.56;
  var wideCap = GF.H - drawH - 20 * GF.S;
  var drawY = wide ? Math.min(Math.max(textBlockBottom + clearMargin, wideFloor), wideCap)
                   : Math.min(endY + 14 * GF.S, GF.H - btnH - 30 * GF.S);
  // stable hit-rect at base size, centered on drawY
  var hitX = GF.cx - btnW / 2, hitY = drawY + (drawH - btnH) / 2;
  uiButtons.push({ x: hitX, y: hitY, w: btnW, h: btnH, fn: function() { startLevel(maxLevel); } });
  if (wide) {
    var _t = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000;
    var _k = Math.sin(_t * 2.2);
    var _p = 1 + 0.05 * _k;
    var pw = drawW * _p, ph = drawH * _p;
    var px = GF.cx - pw / 2, py2 = drawY + (drawH - ph) / 2;
    ctx.save();
    ctx.shadowColor = 'rgba(57,217,138,' + (0.4 + 0.28 * _k).toFixed(3) + ')';
    ctx.shadowBlur = (22 + 10 * _k) * GF.S;
    drawPrimaryBtn(ctx, px, py2, pw, ph, '▶ ' + curStrings().play);
    ctx.restore();
  } else {
    drawPrimaryBtn(ctx, GF.cx - drawW / 2, drawY, drawW, drawH, curStrings().play);
  }

  // ── M1: GARAGE button + coin balance on the menu ──────────────────────────
  var gBtnW = GF.clamp(220 * GF.S, 150, 300), gBtnH = GF.clamp(46 * GF.S, 38, 58);
  var gY = drawY + drawH + 16 * GF.S;
  // keep it on-screen on short portraits
  gY = Math.min(gY, GF.H - gBtnH - 44 * GF.S);
  var gX = GF.cx - gBtnW / 2;
  drawSecondaryBtn(ctx, gX, gY, gBtnW, gBtnH, curStrings().garage);
  // a coin pip + balance on the right end of the garage button
  var nl = nextLockedCar();
  var badge = nl && canAfford(nl);
  if (badge) {
    ctx.beginPath(); ctx.arc(gX + gBtnW - 14 * GF.S, gY + 12 * GF.S, 5 * GF.S, 0, PI * 2);
    ctx.fillStyle = '#ffd24a'; ctx.fill();
  }
  uiButtons.push({ x: gX, y: gY, w: gBtnW, h: gBtnH, fn: openGarage });

  // coin balance line
  ctx.textBaseline = 'alphabetic';
  var cbR = GF.clamp(7 * GF.S, 5, 10);
  var cbY = gY + gBtnH + 20 * GF.S;
  ctx.font = 'bold ' + GF.clamp(13 * GF.S, 11, 18) + 'px sans-serif';
  var cbTxt = String(Math.round(coins));
  var cbW = ctx.measureText(cbTxt).width;
  var cbGroup = cbR * 2 + 6 * GF.S + cbW;
  drawCoin(ctx, GF.cx - cbGroup / 2 + cbR, cbY - cbR + 1, cbR);
  ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(cbTxt, GF.cx - cbGroup / 2 + cbR * 2 + 6 * GF.S, cbY - cbR + 2);

  // best progress line
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.font = GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
  ctx.fillStyle = '#667';
  var prog = endlessUnlocked() ? curStrings().campaign_done
    : (curStrings().lvl + ' ' + maxLevel + ' / ' + AUTHORED_LEVELS);
  ctx.fillText(prog, GF.cx, cbY + 22 * GF.S);
}
function endlessUnlocked() { return maxLevel > AUTHORED_LEVELS; }

function drawPrimaryBtn(ctx, x, y, w, h, label) {
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, '#39d98a'); grad.addColorStop(1, '#23b06b');
  GF.rr(ctx, x, y, w, h, h / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 24) + 'px sans-serif';
  ctx.fillStyle = '#06140d';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2);
  ctx.textBaseline = 'alphabetic';
}
function drawSecondaryBtn(ctx, x, y, w, h, label) {
  GF.rr(ctx, x, y, w, h, h / 2);
  ctx.fillStyle = 'rgba(50,58,76,0.95)'; ctx.fill();
  ctx.strokeStyle = 'rgba(160,180,210,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.font = 'bold ' + GF.clamp(16 * GF.S, 13, 22) + 'px sans-serif';
  ctx.fillStyle = '#cfe';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2);
  ctx.textBaseline = 'alphabetic';
}

// ── M1 GARAGE OVERLAY (the owned collection — reachable from MENU + mid-run) ──
// Lays the 6-car ladder as a vertical list of rows. Each row: a colored car
// swatch + name + perk + a status pill (DRIVE / DRIVING / UNLOCK <cost> / locked).
// Populates uiButtons with the per-row actions + a CLOSE button.
var garageBtns = []; // {x,y,w,h,fn}
function drawGarage(ctx) {
  garageBtns = [];
  // fully opaque backdrop (gallery hygiene: no underlying screen bleed-through)
  ctx.fillStyle = '#0b0d12';
  ctx.fillRect(0, 0, GF.W, GF.H);

  // header: GARAGE + coin balance
  var titleFs = GF.clamp(26 * GF.S, 19, 38);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var topY = GF.H * 0.06;
  ctx.fillText(curStrings().garage, GF.cx, topY);
  // coin balance pill
  var cr = GF.clamp(9 * GF.S, 7, 13);
  var balY = topY + titleFs + 10 * GF.S;
  ctx.font = 'bold ' + GF.clamp(16 * GF.S, 13, 22) + 'px sans-serif';
  var balTxt = String(Math.round(coins));
  var balW = ctx.measureText(balTxt).width;
  var groupW = cr * 2 + 7 * GF.S + balW;
  drawCoin(ctx, GF.cx - groupW / 2 + cr, balY + cr, cr);
  ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(balTxt, GF.cx - groupW / 2 + cr * 2 + 7 * GF.S, balY + cr + 1);

  // rows
  var listW = Math.min(GF.W * 0.92, 460 * GF.S);
  var listX = GF.cx - listW / 2;
  var rowH = GF.clamp(74 * GF.S, 56, 92);
  var rowGap = 8 * GF.S;
  var y = balY + cr * 2 + 14 * GF.S;
  // CLOSE button sits at the bottom; cap the list so it never overlaps it
  var closeH = GF.clamp(46 * GF.S, 38, 58);
  var closeY = GF.H - closeH - 16 * GF.S;
  var nameFs = GF.clamp(15 * GF.S, 12, 20);
  var perkFs = GF.clamp(11 * GF.S, 9, 15);

  for (var i = 0; i < CARS.length; i++) {
    var c = CARS[i];
    if (y + rowH > closeY - 4 * GF.S) break; // guard (6 rows fit 852; cap on tiny screens)
    var owned = !!ownedCars[c.id];
    var active = (activeCar === c.id);
    // row card
    GF.rr(ctx, listX, y, listW, rowH, 12 * GF.S);
    ctx.fillStyle = active ? 'rgba(40,64,52,0.92)' : 'rgba(28,34,46,0.92)'; ctx.fill();
    ctx.strokeStyle = active ? 'rgba(57,217,138,0.9)' : 'rgba(120,140,170,0.28)';
    ctx.lineWidth = active ? 2 : 1; ctx.stroke();
    // car swatch (mini top-down body in the car's colors; dimmed if locked)
    ctx.save();
    if (!owned) ctx.globalAlpha = 0.4;
    drawCarGlyph(ctx, listX + rowH * 0.46, y + rowH / 2, rowH * 0.5, c.body);
    ctx.restore();
    // name + perk
    ctx.textAlign = 'left';
    ctx.font = 'bold ' + nameFs + 'px sans-serif';
    ctx.fillStyle = owned ? '#fff' : '#9fb0c4'; ctx.textBaseline = 'top';
    var tx = listX + rowH * 0.86;
    ctx.fillText(carName(c), tx, y + rowH * 0.18);
    ctx.font = perkFs + 'px sans-serif';
    ctx.fillStyle = '#9fb0c4';
    var perkLines = wrapLines(ctx, carPerk(c), listW - (tx - listX) - GF.clamp(96 * GF.S, 72, 120));
    for (var pl = 0; pl < Math.min(2, perkLines.length); pl++) {
      ctx.fillText(perkLines[pl], tx, y + rowH * 0.46 + pl * (perkFs + 2 * GF.S));
    }
    // status pill (right side)
    var pillW = GF.clamp(92 * GF.S, 70, 116), pillH = GF.clamp(34 * GF.S, 28, 44);
    var pillX = listX + listW - pillW - 10 * GF.S, pillY = y + (rowH - pillH) / 2;
    (function(car, ownd, act, px, py, pw, ph) {
      if (act) {
        GF.rr(ctx, px, py, pw, ph, ph / 2); ctx.fillStyle = 'rgba(57,217,138,0.25)'; ctx.fill();
        ctx.strokeStyle = '#39d98a'; ctx.lineWidth = 1.5; ctx.stroke();
        pillLabel(ctx, curStrings().driving, '#9af0c4', px, py, pw, ph);
      } else if (ownd) {
        GF.rr(ctx, px, py, pw, ph, ph / 2); ctx.fillStyle = 'rgba(50,58,76,0.95)'; ctx.fill();
        ctx.strokeStyle = 'rgba(160,180,210,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
        pillLabel(ctx, curStrings().drive, '#cfe', px, py, pw, ph);
        garageBtns.push({ x: px, y: py, w: pw, h: ph, fn: function(){ driveCar(car.id); } });
      } else {
        var afford = canAfford(car);
        var grad = ctx.createLinearGradient(px, py, px, py + ph);
        if (afford) { grad.addColorStop(0, '#39d98a'); grad.addColorStop(1, '#23b06b'); }
        else { grad.addColorStop(0, 'rgba(50,58,76,0.95)'); grad.addColorStop(1, 'rgba(40,48,64,0.95)'); }
        GF.rr(ctx, px, py, pw, ph, ph / 2); ctx.fillStyle = grad; ctx.fill();
        if (!afford) { ctx.strokeStyle = 'rgba(160,180,210,0.4)'; ctx.lineWidth = 1; ctx.stroke(); }
        // coin + cost inside the pill
        var icr = ph * 0.26;
        ctx.font = 'bold ' + GF.clamp(13 * GF.S, 11, 18) + 'px sans-serif';
        var costTxt = String(car.cost);
        var cw = ctx.measureText(costTxt).width;
        var gx = px + pw / 2 - (icr * 2 + 4 * GF.S + cw) / 2;
        drawCoin(ctx, gx + icr, py + ph / 2, icr);
        ctx.fillStyle = afford ? '#06140d' : '#ffd24a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(costTxt, gx + icr * 2 + 4 * GF.S, py + ph / 2 + 1);
        if (afford) garageBtns.push({ x: px, y: py, w: pw, h: ph, fn: function(){ buyCar(car.id); } });
      }
    })(c, owned, active, pillX, pillY, pillW, pillH);
    y += rowH + rowGap;
  }

  // CLOSE button
  var closeW = GF.clamp(200 * GF.S, 150, 280);
  drawSecondaryBtn(ctx, GF.cx - closeW / 2, closeY, closeW, closeH, curStrings().close);
  garageBtns.push({ x: GF.cx - closeW / 2, y: closeY, w: closeW, h: closeH, fn: closeGarage });
}
function pillLabel(ctx, txt, col, px, py, pw, ph) {
  ctx.font = 'bold ' + GF.clamp(13 * GF.S, 11, 18) + 'px sans-serif';
  ctx.fillStyle = col; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(txt, px + pw / 2, py + ph / 2 + 1);
}
function openGarage() { garageOpen = true; if (GF.sfx) GF.sfx('tap'); }
function closeGarage() { garageOpen = false; if (GF.sfx) GF.sfx('tap'); saveMeta(); }
function garageHit(px, py) {
  for (var i = 0; i < garageBtns.length; i++) {
    var b = garageBtns[i];
    if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) { b.fn(); return true; }
  }
  return false;
}

// ── MUTE BUTTON (on-screen, hygiene — was M-key only) ───────────────────────
function drawMuteBtn(ctx) {
  if (garageOpen) return; // keep the garage overlay clean
  var r = GF.clamp(15 * GF.S, 12, 20);
  var x = GF.W - r - 14 * GF.S;
  // sit it at the bottom-right corner, clear of the HUD top buttons
  var yb = GF.H - r - 14 * GF.S;
  muteBtn = { x: x - r, y: yb - r, w: r * 2, h: r * 2 };
  ctx.save();
  ctx.beginPath(); ctx.arc(x, yb, r, 0, PI * 2);
  ctx.fillStyle = 'rgba(20,24,34,0.7)'; ctx.fill();
  ctx.restore();
  if (GF.drawMuteIcon) GF.drawMuteIcon(ctx, x, yb, r * 0.7, !!GF.muted);
}

// ── NEW-CAR / AFFORD TOAST (felt outside the menu) ──────────────────────────
function drawCarToast(ctx) {
  // toast is the IN-PLAYING pull; overlay screens carry their own garage messaging
  // (earnings strip / menu button) so suppress it there to avoid title overlap.
  if (!carToast || garageOpen || gs === 'LEVELCLEAR' || gs === 'WIN' || gs === 'MENU') return;
  var a = GF.clamp(carToast.t / 0.5, 0, 1); // fade out in the last 0.5s
  var c = carToast.car;
  var unlock = carToast.kind === 'unlock';
  var w = Math.min(GF.W * 0.82, 360 * GF.S), h = GF.clamp(58 * GF.S, 46, 74);
  var x = GF.cx - w / 2, y = GF.H * 0.16;
  ctx.save();
  ctx.globalAlpha = a;
  GF.rr(ctx, x, y, w, h, 12 * GF.S);
  ctx.fillStyle = unlock ? 'rgba(34,176,107,0.96)' : 'rgba(34,42,58,0.96)';
  ctx.fill();
  ctx.strokeStyle = unlock ? '#9af0c4' : 'rgba(57,217,138,0.8)'; ctx.lineWidth = 2; ctx.stroke();
  drawCarGlyph(ctx, x + h * 0.55, y + h / 2, h * 0.6, c.body);
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(15 * GF.S, 12, 20) + 'px sans-serif';
  ctx.fillStyle = unlock ? '#06140d' : '#fff';
  ctx.fillText(unlock ? curStrings().new_car : (curStrings().garage + '!'), x + h * 0.95, y + h * 0.34);
  ctx.font = GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
  ctx.fillStyle = unlock ? 'rgba(6,20,13,0.85)' : '#9fb0c4';
  ctx.fillText(carName(c) + (unlock ? '' : ' — ' + curStrings().unlock + '!'), x + h * 0.95, y + h * 0.66);
  ctx.restore();
}

// ── M1 session-end earnings strip (the "what you earned / come back" moment) ─
// Drawn centered at `cy`. Shows "+N earned" and the next-car progress bar +
// "M coins away" so leaving plants the reason to return. Returns nothing.
function drawEarningsStrip(ctx, cy) {
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // +N earned (coin + amount)
  var cr = GF.clamp(9 * GF.S, 7, 13);
  ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 26) + 'px sans-serif';
  var eTxt = '+' + lastEarned;
  var eW = ctx.measureText(eTxt).width;
  var grp = cr * 2 + 7 * GF.S + eW;
  drawCoin(ctx, GF.cx - grp / 2 + cr, cy, cr);
  ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'left';
  ctx.fillText(eTxt, GF.cx - grp / 2 + cr * 2 + 7 * GF.S, cy + 1);
  ctx.textAlign = 'center';
  // EARNED caption above
  ctx.font = GF.clamp(11 * GF.S, 9, 15) + 'px sans-serif';
  ctx.fillStyle = '#8aa';
  ctx.fillText(curStrings().earned, GF.cx, cy - cr - 12 * GF.S);

  // next-car progress (the come-back hook)
  var nl = nextLockedCar();
  if (nl) {
    var barW = Math.min(GF.W * 0.62, 300 * GF.S), barH = GF.clamp(8 * GF.S, 6, 12);
    var barX = GF.cx - barW / 2, barY = cy + cr + 20 * GF.S;
    var frac = GF.clamp(Math.round(coins) / nl.cost, 0, 1);
    GF.rr(ctx, barX, barY, barW, barH, barH / 2); ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fill();
    if (frac > 0) { GF.rr(ctx, barX, barY, Math.max(barH, barW * frac), barH, barH / 2); ctx.fillStyle = '#39d98a'; ctx.fill(); }
    var need = Math.max(0, nl.cost - Math.round(coins));
    ctx.font = GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
    ctx.fillStyle = need === 0 ? '#39d98a' : '#9fb0c4';
    var label = need === 0
      ? (curStrings().garage + ': ' + carName(nl) + ' ' + curStrings().unlock + '!')
      : (curStrings().next_car + ': ' + carName(nl) + ' — ' + need + curStrings().coins_short + ' ' + curStrings().away);
    ctx.fillText(label, GF.cx, barY + barH + 14 * GF.S);
  }
  ctx.restore();
}

// ── LEVEL CLEAR ───────────────────────────────────────────────────────────
function drawLevelClear(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(10,14,18,0.82)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(34 * GF.S, 22, 52);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#39d98a';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(curStrings()[lastParkPerfect ? 'perfect' : 'clear'], GF.cx, GF.H * 0.26);

  var starSz = GF.clamp(32 * GF.S, 22, 48);
  drawStars(ctx, earnedStars, GF.cx - starSz * 1.6, GF.H * 0.26 + starSz * 1.3, starSz);

  // session-end earnings + next-car progress
  drawEarningsStrip(ctx, GF.H * 0.49);

  var btnW = GF.clamp(220 * GF.S, 150, 300), btnH = GF.clamp(54 * GF.S, 42, 66);
  var btnX = GF.cx - btnW / 2;
  var nextY = GF.H * 0.66;
  drawPrimaryBtn(ctx, btnX, nextY, btnW, btnH, curStrings().next);
  uiButtons.push({ x: btnX, y: nextY, w: btnW, h: btnH, fn: advance });
  var menuY = nextY + btnH + 14 * GF.S;
  drawSecondaryBtn(ctx, btnX, menuY, btnW, btnH * 0.85, curStrings().menu);
  uiButtons.push({ x: btnX, y: menuY, w: btnW, h: btnH * 0.85, fn: goMenu });
}

// ── WIN ───────────────────────────────────────────────────────────────────
function drawWin(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(10,14,18,0.86)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(30 * GF.S, 20, 46);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#ffd24a';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = 'rgba(255,210,74,0.5)'; ctx.shadowBlur = 22 * GF.S;
  ctx.fillText(curStrings().campaign_done, GF.cx, GF.H * 0.26);
  ctx.shadowBlur = 0;

  // session-end earnings + next-car progress
  drawEarningsStrip(ctx, GF.H * 0.44);

  var btnW = GF.clamp(240 * GF.S, 160, 320), btnH = GF.clamp(52 * GF.S, 42, 64);
  var btnX = GF.cx - btnW / 2;
  var y1 = GF.H * 0.60;
  drawPrimaryBtn(ctx, btnX, y1, btnW, btnH, curStrings().endless);
  uiButtons.push({ x: btnX, y: y1, w: btnW, h: btnH, fn: startEndless });
  var y2 = y1 + btnH + 12 * GF.S;
  drawSecondaryBtn(ctx, btnX, y2, btnW, btnH * 0.82, curStrings().garage);
  uiButtons.push({ x: btnX, y: y2, w: btnW, h: btnH * 0.82, fn: openGarage });
  var y3 = y2 + btnH * 0.82 + 12 * GF.S;
  drawSecondaryBtn(ctx, btnX, y3, btnW, btnH * 0.82, curStrings().menu);
  uiButtons.push({ x: btnX, y: y3, w: btnW, h: btnH * 0.82, fn: goMenu });
}

// ── TUTORIAL PANEL (in-game, via ? button) ──────────────────────────────────
function drawTutorialPanel(ctx) {
  ctx.fillStyle = 'rgba(8,10,16,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(24 * GF.S, 18, 34);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var topY = GF.H * 0.13;
  ctx.fillText(curStrings().title, GF.cx, topY);

  var bodyFs = GF.clamp(15 * GF.S, 12, 19);
  ctx.font = bodyFs + 'px sans-serif';
  ctx.fillStyle = '#cdd6e3';
  var maxW = Math.min(GF.W * 0.86, 460 * GF.S);
  var endY = drawTutorialBlock(ctx, tutorialItems(), topY + titleFs + 18 * GF.S, maxW, bodyFs + 6 * GF.S, 10 * GF.S);

  ctx.fillStyle = '#88a';
  ctx.font = GF.clamp(13 * GF.S, 11, 17) + 'px sans-serif';
  ctx.fillText(curStrings().tap_close, GF.cx, Math.min(endY + 8 * GF.S, GF.H - 28 * GF.S));
}

// ── SCREENSHOT / GATE HOOKS ──────────────────────────────────────────────────
// Land in a populated mid-level PLAYING state for Yandex 5.1.1 screenshots.
window._setupForScreenshot = function(level) {
  var n = Math.max(2, Math.min(AUTHORED_LEVELS, level || 9));
  startLevel(n);
  _ssMode = true;
  // pose the car mid-approach, nosing toward the bay, slightly angled for drama
  var d = levelData(n);
  // place it ~55% of the way from start to bay
  car.x = d.start.x + (bay.x - d.start.x) * 0.5;
  car.y = d.start.y + (bay.y - d.start.y) * 0.55;
  car.heading = Math.atan2(bay.x - car.x, -(bay.y - car.y)) + 0.12;
  car.speed = CREEP_SPEED;
  crashes = 0; stars = 3;
  // a little tyre trail behind it
  tyreMarks = [];
  for (var i = 0; i < 10; i++) {
    tyreMarks.push({ x: d.start.x + (car.x - d.start.x) * (i/10), y: d.start.y + (car.y - d.start.y) * (i/10) });
  }
};
window._jumpLevel = function(n) {
  if (n >= 99) {
    // drive into the campaign-complete terminal (WIN): park on the LAST
    // authored level so onParked() flips gs='WIN'. The gate treats WIN as a
    // terminal state and then sweeps the WIN overlay buttons.
    startLevel(AUTHORED_LEVELS);
    car.x = bay.x; car.y = bay.y; car.heading = bay.heading; car.speed = 0;
    settleT = SETTLE_SEC + 1;
    onParked();
    return;
  }
  window._setupForScreenshot(n || 9);
};

// ── BOOT ────────────────────────────────────────────────────────────────────
GF.init({
  designW: 393,
  designH: 852,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'tight_spot',
  onReady: function() {
    // load persisted progression
    try {
      maxLevel = parseInt(localStorage.getItem('tight_spot_maxlvl') || '1') || 1;
    } catch (e) { maxLevel = 1; }
    try {
      bestStars = JSON.parse(localStorage.getItem('tight_spot_stars') || '[]') || [];
    } catch (e) { bestStars = []; }
    // M1: load the persistent garage meta (coins / owned cars / active car)
    loadMeta();
    GF.persist('tight_spot_run_v1',
      function() {
        return { gs: (gs === 'PLAYING' || gs === 'CRASH') ? 'PLAYING' : gs,
                 lvl: lvl, endless: endless, maxLevel: maxLevel,
                 bestStars: bestStars, crashes: crashes, stars: stars };
      },
      function(s) {
        if (!s) return;
        lvl = s.lvl || 1;
        endless = !!s.endless;
        maxLevel = s.maxLevel || maxLevel || 1;
        if (Array.isArray(s.bestStars)) bestStars = s.bestStars;
        crashes = s.crashes || 0;
        stars = s.stars || 3;
        gs = s.gs || 'MENU';
      }
    );
    // persist the standalone progression keys too
    try {
      localStorage.setItem('tight_spot_maxlvl', String(maxLevel));
      localStorage.setItem('tight_spot_stars', JSON.stringify(bestStars));
    } catch (e) {}
    // never resume into live play (Yandex 1.9 best practice) - show MENU
    if (gs === 'PLAYING' || gs === 'CRASH' || gs === 'LEVELCLEAR' || gs === 'WIN') gs = 'MENU';
    tutorialOpen = false;
    layoutField();
    // preload level geometry so MENU has something behind it if ever drawn
    loadLevel(Math.min(maxLevel, AUTHORED_LEVELS));
    // ▶ PLATFORM AUTOSTART (CLAUDE.md #9): Yandex/CrazyGames inject __GF_AUTOSTART
    // so the player drops STRAIGHT into gameplay (no menu landing). The gallery
    // build never gets the flag, so it keeps its menu. Menu stays reachable in-run
    // via the ≡ button. Suppress the first-session tutorial auto-open on platforms.
    if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU') {
      saveTutorialSeen();
      tutorialOpen = false;
      startLevel(maxLevel);
    }
  },
  onUpdate: update,
  onDraw: draw,
});

// Save the progression keys whenever they change via a light wrapper.
var _origSaveRun = GF.saveRun;
GF.saveRun = function() {
  try {
    localStorage.setItem('tight_spot_maxlvl', String(maxLevel));
    localStorage.setItem('tight_spot_stars', JSON.stringify(bestStars));
  } catch (e) {}
  _origSaveRun();
};

// Expose state for the post-build-tester (DESIGN.md cross-check).
GF.exposeState(function() {
  return {
    gs: gs, lvl: lvl, endless: endless, maxLevel: maxLevel,
    crashes: crashes, stars: stars, earnedStars: earnedStars,
    settleT: settleT, pathLen: Math.round(pathLen), straightLen: Math.round(straightLen),
    attemptTimer: Math.round(attemptTimer * 10) / 10,
    parked: gs === 'PLAYING' ? parkedInBay() : false,
    obstacleCount: obstacles.length, coneCount: cones.length, wallCount: walls.length,
    tutorialOpen: tutorialOpen,
    // M1 garage meta
    coins: Math.round(coins), activeCar: activeCar,
    ownedCount: Object.keys(ownedCars).length, lastEarned: lastEarned,
    garageOpen: garageOpen, nextCarCost: (nextLockedCar() ? nextLockedCar().cost : 0),
    CREEP_SPEED: CREEP_SPEED, TURN_RATE: TURN_RATE, FRICTION: FRICTION,
    CAR_W: CAR_W, CAR_L: CAR_L, CONE_R: CONE_R,
    ANGLE_TOL: ANGLE_TOL, POS_TOL: POS_TOL, SETTLE_SEC: SETTLE_SEC,
    CRASH_RESET_SEC: CRASH_RESET_SEC, AUTHORED_LEVELS: AUTHORED_LEVELS,
    WALL_THICK: WALL_THICK, PATH_PAR: PATH_PAR,
  };
});

// ── PROGRESSION-PROBE BOT (balance-curve fast-forward) ──────────────────────
// getActions() lists what the bot can do right now; doAction(a) performs one.
// The bot drives the FULL meta loop: clear a level (teleport-park), buy the next
// affordable car, then advance — so the probe can measure coin cadence + unlocks.
GF.exposeBot(
  function getActions() {
    var acts = [];
    if (gs === 'MENU' || gs === 'WIN') acts.push('play');
    else if (gs === 'LEVELCLEAR') acts.push('next');
    else if (gs === 'CRASH') acts.push('recover');   // never let the bot stall in the crash freeze
    else if (gs === 'PLAYING' && !tutorialOpen) acts.push('park');
    var nl = nextLockedCar();
    if (nl && canAfford(nl) && (gs === 'PLAYING' || gs === 'LEVELCLEAR' || gs === 'WIN' || gs === 'MENU')) acts.push('buycar');
    return acts;
  },
  function doAction(a) {
    if (a === 'play') { startLevel(gs === 'WIN' ? AUTHORED_LEVELS + 1 : maxLevel); return; }
    if (a === 'next') { advance(); return; }
    if (a === 'buycar') { var nl = nextLockedCar(); if (nl) buyCar(nl.id); return; }
    if (a === 'recover') { // skip the crash freeze straight back to PLAYING
      var d = levelData(lvl); resetCar(d.start); gs = 'PLAYING'; return;
    }
    if (a === 'park') {
      // teleport the car into the bay and force the settle so onParked() fires
      if (gs !== 'PLAYING') return;
      car.x = bay.x; car.y = bay.y; car.heading = bay.heading; car.speed = 0;
      settleT = SETTLE_SEC + 1;
      onParked(); // perks only widen tolerances, so a bay-center teleport always parks
      return;
    }
  }
);

// Test/automation hooks (safe to ship - platforms don't reject these).
window._setLang = function(l) { GF.lang = l; };
window._setState = function(s) { gs = s; };
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'sans-serif'; };
window._steer = function(side, on) {
  if (side === 'L') steerLeft = !!on; else if (side === 'R') steerRight = !!on;
  if (on) steerHintFade = 0;
};
window._startLevel = function(n) { startLevel(n || 1); };
// M1 garage test seams (safe to ship)
window._grant = function(n) { coins += (n || 100); saveMeta(); };
window._buyCar = function(id) { return buyCar(id || 1); };
window._driveCar = function(id) { return driveCar(id || 0); };
window._openGarage = function() { openGarage(); };
window._tightSpotInfo = function() {
  return { coins: Math.round(coins), activeCar: activeCar, owned: Object.keys(ownedCars).map(Number),
           garageOpen: garageOpen, nextCar: (nextLockedCar() ? nextLockedCar().id : -1),
           nextCost: (nextLockedCar() ? nextLockedCar().cost : 0), gs: gs };
};

})();
</script>
<script>
/* bespoke synth_track.py soundtrack: start on first gesture (autoplay policy).
   On-screen mute button lives in the HUD/menu (GF.drawMuteIcon + GF.toggleMute,
   bottom-right); the M key is a desktop shortcut for the same toggle. */
(function(){
  if(!window.GF||!GF.music) return;
  var go=function(){ GF.music('audio/bg_track.mp3', 0.6);
    ['pointerdown','keydown','touchstart','mousedown'].forEach(function(ev){document.removeEventListener(ev,go,true);}); };
  ['pointerdown','keydown','touchstart','mousedown'].forEach(function(ev){document.addEventListener(ev,go,true);});
  document.addEventListener('keydown',function(e){ if(e.code==='KeyM'&&GF.toggleMute){ GF.toggleMute(); } });
})();
</script>
