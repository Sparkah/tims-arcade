// ════════════════════════════════════════════════════════════════════════════
// ── M2 REASON-TO-RETURN (iteration #2) ───────────────────────────────────────
// Grown from THIS game's fabric (precision parking + an OWNED garage + coins),
// NOT a bolt-on login/quest kit. Three mechanics, one loop:
//   1. THE DAILY SPOT — a daily-seeded "tightest spot of the day", a never-before-
//      driven parking puzzle that's different every day, 3 attempts, banks a
//      persistent MEDAL (gold/silver/bronze by crashes) onto a garage shelf.
//      => a returning player opens to a NEW bay to thread (world-visible, in the
//         game's own verb), not a popup.
//   2. VALET PILE — the cars idling in your garage earn coins while you're away
//      (rate scales with how many cars you OWN — ownership IS the fabric), capped
//      at VALET_CAP_H hours (the cap is the return trigger). Shown as a COLLECT
//      pile sitting among the cars you built, claimed with one tap.
//   3. STREAK -> TROPHIES — a daily-login streak that, at 3 and 7 days, drops a
//      permanent TROPHY onto the garage shelf (world-visible ownership) + a
//      streak coin gift. Surfaced as trophies you own, never a bare number.
var VALET_CAP_H   = 8;     // idle accrual caps at 8h (cap = the return trigger)
var VALET_PER_H   = 9;     // coins/hour PER owned car (so the garage you built works)
var DAILY_TRIES   = 3;     // attempts at today's Daily Spot
var STREAK_GIFT   = 6;     // coins/day of streak granted on a new login day
// M2 runtime state (persisted in the same META_KEY)
var dailyKey = 0;          // daySeed() of the Daily Spot last engaged
var dailyTriesLeft = DAILY_TRIES;
var dailyBestMedal = 0;    // 0 none, 1 bronze, 2 silver, 3 gold — TODAY's best
var medalShelf = { gold: 0, silver: 0, bronze: 0 }; // lifetime medals (the shelf)
var lastLoginDay = 0;      // daySeed() of last login (for streak + valet timing)
var lastValetMs = 0;       // wall-clock ms of last valet settle (idle accrual base)
var streak = 0;            // consecutive-day login streak
var trophies = {};         // id -> true (3==regular, 7==veteran) — the shelf
var valetPending = 0;      // coins accrued while away, waiting to COLLECT
var dailyMode = false;     // true while PLAYING the Daily Spot (vs campaign/endless)
var welcomeBack = null;    // { t } welcome-back ribbon timer on first return-boot
var streakToast = null;    // { kind:'trophy'|'gift', id, t } flourish

// ════════════════════════════════════════════════════════════════════════════
// ── M3 DEPTH: CAR TUNE / MASTERY (iteration #3) ──────────────────────────────
// The structural layer that keeps the garage alive once all 6 cars are OWNED.
// Each car you DRIVE earns TUNE XP on every clean park; XP banks PER CAR and
// levels that specific car L1→L5. A tune level is not a number — it visibly
// upgrades the car (tune pips on its garage glyph + a brighter body, then a
// CHROME finish at L5) AND scales the car's REAL handling perk: the turn /
// creep / forgiveness multipliers (which already fold into the physics each
// frame) interpolate from their base value toward a tuned ceiling. So the car
// you drive most becomes measurably better and looks different — a per-car
// progression CURVE woven into the existing handling fabric, not a bolt-on.
// CHROME (L5) cars are counted on the shelf: a long-tail collection-completion
// meta (chrome the whole garage). MONETIZATION: a player-initiated, rewarded
// TUNE BOOST button on any not-yet-maxed car — WATCH AD → +TUNE XP, a pure
// accelerator that NEVER gates play and no-ops on the gallery.
var TUNE_MAX     = 5;                      // L1 (base, owned) .. L5 (chrome)
var TUNE_XP_REQ  = [0, 6, 16, 32, 56];     // cumulative XP to reach L1..L5
var TUNE_BOOST_XP = 8;                     // XP granted by one rewarded TUNE BOOST
// per-car perk CEILING deltas at full tune (L5); base is the car's own value.
// turn/pos/ang INCREASE (better), creep DECREASES (slower = more time). The
// effective multiplier at level L is base + delta * (L-1)/(TUNE_MAX-1).
var TUNE_DELTA = { turn: 0.12, creep: -0.07, pos: 0.20, ang: 0.20 };
var tuneXp = {};           // car id -> banked tune XP (persisted in META_KEY)
var tuneToast = null;      // { id, level, chrome, t } flourish on a tune level-up
// XP banked on the most recent clean park (for the LEVELCLEAR / earnings strip)
var lastTuneGain = 0;
var lastTuneLevelUp = 0;   // the new tune level if the last park leveled the car, else 0

// current tune LEVEL of a car id (1..TUNE_MAX) from its banked XP.
function tuneLevel(id) {
  var xp = tuneXp[id] || 0, lv = 1;
  for (var i = 1; i < TUNE_XP_REQ.length; i++) { if (xp >= TUNE_XP_REQ[i]) lv = i + 1; }
  return lv;
}
function isChrome(id) { return tuneLevel(id) >= TUNE_MAX; }
// XP into the CURRENT level and XP span to the NEXT (for the progress bar).
function tuneProgress(id) {
  var xp = tuneXp[id] || 0, lv = tuneLevel(id);
  if (lv >= TUNE_MAX) return { lv: lv, cur: 1, span: 1, max: true };
  var lo = TUNE_XP_REQ[lv - 1], hi = TUNE_XP_REQ[lv];
  return { lv: lv, cur: Math.max(0, xp - lo), span: Math.max(1, hi - lo), max: false };
}
// how many cars are fully tuned (CHROME) — the collection-completion counter.
function chromeCount() { var n = 0; for (var i = 0; i < CARS.length; i++) if (ownedCars[CARS[i].id] && isChrome(CARS[i].id)) n++; return n; }
// the active car's TUNE-SCALED perk multipliers (base interpolated toward ceiling).
function tunedPerk(c) {
  var lv = tuneLevel(c.id);
  var f = (TUNE_MAX > 1) ? (lv - 1) / (TUNE_MAX - 1) : 0; // 0 at L1 .. 1 at L5
  return {
    turn:  c.turn  + TUNE_DELTA.turn  * f,
    creep: c.creep + TUNE_DELTA.creep * f,
    pos:   c.pos   + TUNE_DELTA.pos   * f,
    ang:   c.ang   + TUNE_DELTA.ang   * f,
  };
}
// brighten a car body hex toward white by the tune fraction (visible upgrade).
function tuneBodyColor(c) {
  var lv = tuneLevel(c.id);
  if (lv >= TUNE_MAX) return '#eef4ff'; // CHROME: near-white sheen
  var f = (TUNE_MAX > 1) ? (lv - 1) / (TUNE_MAX - 1) * 0.55 : 0;
  var h = c.body.replace('#', '');
  var r = parseInt(h.substr(0, 2), 16), g = parseInt(h.substr(2, 2), 16), b = parseInt(h.substr(4, 2), 16);
  r = Math.round(r + (255 - r) * f); g = Math.round(g + (255 - g) * f); b = Math.round(b + (255 - b) * f);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}
// bank tune XP onto the DRIVEN car for a clean park; flags a level-up for the FX.
function gainTuneXp(amt) {
  var id = activeCar;
  if (isChrome(id)) { lastTuneGain = 0; lastTuneLevelUp = 0; return; } // maxed: no more XP
  var before = tuneLevel(id);
  tuneXp[id] = (tuneXp[id] || 0) + amt;
  lastTuneGain = amt;
  var after = tuneLevel(id);
  lastTuneLevelUp = (after > before) ? after : 0;
  if (after > before) {
    tuneToast = { id: id, level: after, chrome: after >= TUNE_MAX, t: 3.4 };
    if (GF.sfx) GF.sfx(after >= TUNE_MAX ? 'unlock' : 'levelup');
  }
}

function dayDiff(a, b) { // whole-day gap between two daySeed() ints (approx, calendar)
  if (!a || !b) return 999;
  var pa = new Date(Math.floor(a/10000), Math.floor(a/100)%100 - 1, a%100);
  var pb = new Date(Math.floor(b/10000), Math.floor(b/100)%100 - 1, b%100);
  return Math.round((pb - pa) / 86400000);
}

// ── M1 meta persistence (separate key from the run-state save) ───────────────
var META_KEY = 'tight_spot_meta_v1';
function saveMeta() {
  try {
    localStorage.setItem(META_KEY, JSON.stringify({
      coins: Math.round(coins), ownedCars: ownedCars, activeCar: activeCar,
      clearedOnce: clearedOnce,
      // M2
      dailyKey: dailyKey, dailyTriesLeft: dailyTriesLeft, dailyBestMedal: dailyBestMedal,
      medalShelf: medalShelf, lastLoginDay: lastLoginDay, lastValetMs: lastValetMs,
      streak: streak, trophies: trophies,
      // M3 car tune / mastery
      tuneXp: tuneXp,
    }));
  } catch (e) {}
}
function loadMeta() {
  try {
    var raw = localStorage.getItem(META_KEY);
    if (!raw) return;
    var s = JSON.parse(raw);
    if (!s || typeof s !== 'object') return;
    coins = Math.max(0, +s.coins || 0);
    ownedCars = { 0: true };
    if (s.ownedCars && typeof s.ownedCars === 'object') {
      for (var k in s.ownedCars) { if (s.ownedCars[k] && carById(+k).id === +k) ownedCars[+k] = true; }
    }
    activeCar = (s.activeCar != null && ownedCars[+s.activeCar]) ? +s.activeCar : 0;

// ── M2: roll the day over (called once at boot, after loadMeta) ──────────────
// Computes the valet pile from idle time, advances/resets the streak, resets the
// Daily Spot if it's a new calendar day, and grants streak trophies/gifts. This
// is what makes the FIRST 60s of a return visibly different from yesterday.
function rolloverDay() {
  var today = daySeed();
  var nowMs = Date.now();
  // 1. VALET: accrue idle coins since the last settle (scaled by owned-car count),
  //    capped at VALET_CAP_H. First-ever session seeds the clock, no pile.
  if (lastValetMs > 0) {
    var hrs = Math.max(0, (nowMs - lastValetMs) / 3600000);
    hrs = Math.min(hrs, VALET_CAP_H);
    var ownedN = Object.keys(ownedCars).length;
    var pile = Math.floor(hrs * VALET_PER_H * ownedN);
    if (pile > 0) valetPending += pile;
  }
  lastValetMs = nowMs;
  // 2. STREAK + daily reset (calendar-day based)
  if (lastLoginDay === 0) {
    streak = 1; // first ever login
  } else {
    var gap = dayDiff(lastLoginDay, today);
    if (gap === 0) { /* same day, streak unchanged */ }
    else if (gap === 1) { streak = streak + 1; }   // consecutive day
    else { streak = 1; }                            // missed >=1 day, reset
  }
  var isNewDay = (lastLoginDay !== today);
  lastLoginDay = today;
  // 3. DAILY SPOT reset on a new calendar day (fresh puzzle + fresh tries)
  if (dailyKey !== today) {
    dailyKey = today;
    dailyTriesLeft = DAILY_TRIES;
    dailyBestMedal = 0;
  }
  // 4. STREAK gift + trophies (only when the day actually advanced)
  if (isNewDay && streak > 1) {
    var gift = STREAK_GIFT * Math.min(streak, 7);
    coins += gift;
    streakToast = { kind: 'gift', amt: gift, t: 3.4 };
    if (streak >= 7 && !trophies[7]) { trophies[7] = true; streakToast = { kind: 'trophy', id: 7, t: 4.0 }; }
    else if (streak >= 3 && !trophies[3]) { trophies[3] = true; streakToast = { kind: 'trophy', id: 3, t: 4.0 }; }
  }
  // welcome-back ribbon if there's anything to come back FOR (pile or returning day)
  if (valetPending > 0 || (isNewDay && lastLoginDay)) welcomeBack = { t: 3.2 };
  saveMeta();
}

  if (valetPending <= 0) return;
  coins += valetPending;

  valetPending = 0;

}

// ── DAILY-SEEDED ENDLESS GENERATOR ──────────────────────────────────────────
// After the 14 authored levels, generate increasingly tight spots. Seeded by
// today's date + the endless index so the "same day" gives the same ladder
// (a comeback hook) but each step is tighter.
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function daySeed() {
  var d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}
function genEndlessLevel(idx) {
  var rng = mulberry32(daySeed() * 131 + idx * 7919);
  // tightness grows with idx: bay width shrinks toward the car width.
  var tight = Math.min(0.85, idx * 0.06);
  var bw = Math.round(CAR_W + 26 - tight * 18); // 52 → ~34
  var sideways = rng() < 0.4;
  var bayX = 90 + Math.round(rng() * 180);
  var L = { start: { x: 180, y: 580, h: 0 },
            bay: { x: bayX, y: 110 + Math.round(rng()*30),
                   w: bw, l: sideways ? 88 : 100, heading: sideways ? PI/2 : 0 },
            walls: [], obstacles: [], cones: [] };
  // flanking cars on most spots
  if (rng() < 0.8) {
    if (sideways) {
      L.obstacles.push(carBox(bayX, L.bay.y - 75, PI/2));
      L.obstacles.push(carBox(bayX, L.bay.y + 75, PI/2));
    } else {
      L.obstacles.push(carBox(bayX - 66, L.bay.y, 0));
      L.obstacles.push(carBox(bayX + 66, L.bay.y, 0));
    }
  }
  // a partition wall sometimes
  if (rng() < 0.5) {
    var wx = 110 + Math.round(rng() * 140);
    L.walls.push({ x1: wx, y1: 620, x2: wx, y2: 300 + Math.round(rng()*60) });
  }
  // cones narrowing the approach
  var nc = Math.round(rng() * 3);
  for (var i = 0; i < nc; i++) {
    L.cones.push({ x: 90 + Math.round(rng() * 180), y: 250 + Math.round(rng() * 200) });
  }
  return L;
}

// Reuses the daySeed RNG but biases hard: a narrow bay, both flank cars, a

// "tightest spot of the day" a returning player opens to.
var DAILY_LVL = -1; // sentinel level index for the Daily Spot
function genDailySpot() {
  var rng = mulberry32(daySeed() * 977 + 401);
  var sideways = rng() < 0.45;
  var bw = Math.round(CAR_W + 12 - rng() * 4); // tight: ~34-38
  var bayX = 110 + Math.round(rng() * 140);
  var L = { start: { x: 150 + Math.round(rng()*60), y: 585, h: 0 },
            bay: { x: bayX, y: 120 + Math.round(rng()*24),

  // always both flank cars (the classic squeeze)
  if (sideways) {
    L.obstacles.push(carBox(bayX, L.bay.y - 74, PI/2));
    L.obstacles.push(carBox(bayX, L.bay.y + 74, PI/2));
  } else {
    L.obstacles.push(carBox(bayX - 64, L.bay.y, 0));

  // a dog-leg partition
  var wx = 100 + Math.round(rng() * 160);
  L.walls.push({ x1: wx, y1: 600, x2: wx, y2: 320 + Math.round(rng()*50) });
  // a cone chicane (2-3 cones)

function levelData(n) {
  if (n === DAILY_LVL) return genDailySpot();
  if (n <= AUTHORED_LEVELS) return LEVELS[n - 1];
  return genEndlessLevel(n - AUTHORED_LEVELS);
}

// ── GEOMETRY HELPERS ────────────────────────────────────────────────────────
// Corners of an oriented rect (field-local). heading 0 = long axis along -y.
function rectCorners(rx, ry, rw, rl, rh) {
  var hw = rw / 2, hl = rl / 2;
  var c = Math.cos(rh), s = Math.sin(rh);
  // local corners: x across width, y along length (negative y = nose forward)
  var pts = [ [-hw, -hl], [hw, -hl], [hw, hl], [-hw, hl] ];
  var out = [];
  for (var i = 0; i < 4; i++) {
    var lx = pts[i][0], ly = pts[i][1];
    out.push({ x: rx + lx * c - ly * s, y: ry + lx * s + ly * c });
  }
  return out;
}
function carCorners() { return rectCorners(car.x, car.y, CAR_W, CAR_L, car.heading); }

// Separating-axis test between two convex polygons (arrays of {x,y}).
function polysOverlap(a, b) {
  var polys = [a, b];
  for (var p = 0; p < 2; p++) {
    var poly = polys[p];
    for (var i = 0; i < poly.length; i++) {
      var j = (i + 1) % poly.length;
      var nx = -(poly[j].y - poly[i].y), ny = (poly[j].x - poly[i].x);
      var minA = Infinity, maxA = -Infinity, minB = Infinity, maxB = -Infinity;
      for (var k = 0; k < a.length; k++) { var d = a[k].x * nx + a[k].y * ny; if (d < minA) minA = d; if (d > maxA) maxA = d; }
      for (var m = 0; m < b.length; m++) { var e = b[m].x * nx + b[m].y * ny; if (e < minB) minB = e; if (e > maxB) maxB = e; }
      if (maxA < minB || maxB < minA) return false;
    }
  }
  return true;
}

// Distance from point P to segment AB.
function ptSegDist(px, py, ax, ay, bx, by) {
  var dx = bx - ax, dy = by - ay;
  var len2 = dx * dx + dy * dy;
  var t = len2 > 0 ? ((px - ax) * dx + (py - ay) * dy) / len2 : 0;
  t = t < 0 ? 0 : t > 1 ? 1 : t;
  var cxp = ax + t * dx, cyp = ay + t * dy;
  return GF.dist(px, py, cxp, cyp);
}

// Does the car's oriented rect collide with any wall / obstacle / cone?
function collide() {
  var corners = carCorners();
  // walls: treat as thick capsules - any car corner within WALL_THICK of the
  // segment, OR the car edge crossing the wall. Corner-distance test catches
  // the common scrape; also test the wall endpoints against the car polygon.
  for (var w = 0; w < walls.length; w++) {
    var wl = walls[w];
    for (var c = 0; c < 4; c++) {
      if (ptSegDist(corners[c].x, corners[c].y, wl.x1, wl.y1, wl.x2, wl.y2) <= WALL_THICK) return true;
    }
    // also: car center crossing very close (covers thin slivers)
    if (ptSegDist(car.x, car.y, wl.x1, wl.y1, wl.x2, wl.y2) <= WALL_THICK + 2) {
      // confirm with edge sampling along the wall for robustness
      var steps = 6;
      for (var sI = 0; sI <= steps; sI++) {
        var tt = sI / steps;
        var sx = wl.x1 + (wl.x2 - wl.x1) * tt, sy = wl.y1 + (wl.y2 - wl.y1) * tt;
        if (pointInPoly(sx, sy, corners)) return true;
      }
    }
  }
  for (var o = 0; o < obstacles.length; o++) {
    var ob = obstacles[o];
    var oc = rectCorners(ob.x, ob.y, ob.w, ob.l, ob.heading);
    if (polysOverlap(corners, oc)) return true;
  }
  for (var k = 0; k < cones.length; k++) {
    if (polyCircleHit(corners, cones[k].x, cones[k].y, CONE_R)) return true;
  }
  return false;
}

  for (var i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    var xi = poly[i].x, yi = poly[i].y, xj = poly[j].x, yj = poly[j].y;

  for (var i = 0; i < poly.length; i++) {

    if (ptSegDist(cxp, cyp, poly[i].x, poly[i].y, poly[j].x, poly[j].y) <= r) return true;
  }
  return false;
}

// Is the car settled inside the bay within tolerance?
function parkedInBay() {
  if (!bay) return false;
  var corners = carCorners();
  var bc = rectCorners(bay.x, bay.y, bay.w, bay.l, bay.heading);
  // all four car corners inside bay polygon
  for (var i = 0; i < 4; i++) if (!pointInPoly(corners[i].x, corners[i].y, bc)) return false;

  if (d < -PI) d += 2 * PI;

    uiHit(px, py); return;
  }
  if (gs === 'LEVELCLEAR' || gs === 'WIN') { uiHit(px, py); return; }
  if (gs === 'CRASH') {
    // only the back-to-menu button is live during the crash freeze
    if (menuBtn && hitBtn(menuBtn, px, py)) { goMenu(); }
    return;
  }
  if (gs === 'PLAYING') {
    if (tutorialOpen) { tutorialOpen = false; return; }
    if (helpBtn && hitBtn(helpBtn, px, py)) { tutorialOpen = true; return; }
    if (garageBtn && hitBtn(garageBtn, px, py)) { openGarage(); return; }
    if (menuBtn && hitBtn(menuBtn, px, py)) { goMenu(); return; }
    // steer half
    if (px < GF.W / 2) { activePointers[id] = 'L'; steerLeft = true; }
    else { activePointers[id] = 'R'; steerRight = true; }
    steerHintFade = 0;
  }
}
function pressUp(id) {
  var side = activePointers[id];
  delete activePointers[id];
  // recompute held sides from remaining pointers
  steerLeft = false; steerRight = false;
  for (var k in activePointers) {
    if (activePointers[k] === 'L') steerLeft = true;
    if (activePointers[k] === 'R') steerRight = true;
  }
  // keyboard may still hold - handled separately
  if (keyL) steerLeft = true;
  if (keyR) steerRight = true;
}
function hitBtn(b, px, py) { return px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h; }

function goMenu() {
  gs = 'MENU';
  garageOpen = false;
  steerLeft = steerRight = false;
  activePointers = {};
  GF.gameEnded();
  GF.saveRun();
}

var _canvas = document.getElementById('c');
_canvas.addEventListener('pointerdown', function(e) { pressDown(e.pointerId, e.clientX, e.clientY); }, { passive: true });
_canvas.addEventListener('pointerup',   function(e) { pressUp(e.pointerId); }, { passive: true });
_canvas.addEventListener('pointercancel', function(e) { pressUp(e.pointerId); }, { passive: true });
// click is used for the overlay UI buttons on platforms that synthesize it;
// pointerdown already covers it but keep a guarded fallback for menu taps.
_canvas.addEventListener('click', function(e) {
  if (garageOpen) return; // pointerdown already routes garage taps
  if (gs === 'MENU' || gs === 'LEVELCLEAR' || gs === 'WIN') {
    if (Date.now() < uiLockUntil) return;
    if (gs === 'MENU' && tutorialOpen) return;
    if (muteBtn && hitBtn(muteBtn, e.clientX, e.clientY)) return; // handled on pointerdown
    uiHit(e.clientX, e.clientY);
  }
});

// keyboard steer
var keyL = false, keyR = false;
document.addEventListener('keydown', function(e) {
  var c = e.code;
  if (c === 'Escape') return; // reserved
  if (gs === 'PLAYING' && tutorialOpen) { return; }
  if ((c === 'ArrowLeft' || c === 'KeyA')) { keyL = true; if (gs === 'PLAYING') { steerLeft = true; steerHintFade = 0; } }
  if ((c === 'ArrowRight' || c === 'KeyD')) { keyR = true; if (gs === 'PLAYING') { steerRight = true; steerHintFade = 0; } }
  if (c === 'Space' || c === 'Enter') {
    if (gs === 'MENU') startLevel(maxLevel);
    else if (gs === 'LEVELCLEAR') advance();
    else if (gs === 'WIN') startEndless();
    e.preventDefault();
  }
});
document.addEventListener('keyup', function(e) {
  var c = e.code;
  if (c === 'ArrowLeft' || c === 'KeyA') { keyL = false; if (!heldSide('L')) steerLeft = false; }
  if (c === 'ArrowRight' || c === 'KeyD') { keyR = false; if (!heldSide('R')) steerRight = false; }
});
function heldSide(s) { for (var k in activePointers) if (activePointers[k] === s) return true; return false; }

// ── PROGRESSION ───────────────────────────────────────────────────────────
function onCrash() {
  if (gs !== 'PLAYING') return;
  crashes += 1;
  if (stars > 1) stars -= 1; // every reset costs the ceiling, min 1
  car.speed = 0;
  GF.setShake(0.5);
  GF.spawnParticles(fx(car.x), fy(car.y), '#ff5252', 20);
  GF.spawnParticles(fx(car.x), fy(car.y), '#ffd24a', 12);
  gs = 'CRASH';
  crashT = CRASH_RESET_SEC;
  if (dailyMode) { // each scrape in the Daily Spot costs a try (it's a challenge, not free retry)
    dailyTriesLeft = Math.max(0, dailyTriesLeft - 1);
    saveMeta();
  }
  GF.saveRun();
}

function onParked() {
  if (gs !== 'PLAYING') return;
  // path-length penalty: wandering line loses a star (independent of crashes)
  var ratio = pathLen / straightLen;
  if (ratio > PATH_PAR && stars > 1) stars -= 1;
  earnedStars = Math.max(1, stars);
  lastParkPerfect = (crashes === 0 && ratio <= PATH_PAR);
  GF.spawnParticles(fx(car.x), fy(car.y), '#39d98a', 26);
  GF.spawnFloat(fx(car.x), fy(car.y) - 24 * GF.S, curStrings()[lastParkPerfect ? 'perfect' : 'parked'], '#39d98a');
  if (GF.sfx) GF.sfx(lastParkPerfect ? 'win' : 'levelup');
  // ── M1: bank permanent COINS (the meta currency) ──────────────────────────
  var firstClear = !clearedOnce[lvl];
  lastEarned = earnedStars * COIN_PER_STAR + (firstClear ? COIN_FIRST_CLR : 0);
  coins += lastEarned;
  clearedOnce[lvl] = true;
  GF.spawnFloat(fx(car.x), fy(car.y) - 44 * GF.S, '+' + lastEarned + curStrings().coins_short, '#ffd24a');
  if (GF.sfx) GF.sfx('coin');
  checkCarUnlock();
  // ── M3: bank TUNE XP onto the DRIVEN car (the per-car mastery curve) ────────
  // A clean park tunes the car you're driving: +1 base + the stars you earned
  // (so a sharper park tunes faster). The Daily Spot adds a bonus below. A
  // level-up brightens the car + may CHROME it — felt next drive (gainTuneXp FX).
  var tuneGain = 1 + earnedStars + (dailyMode ? 2 : 0);
  gainTuneXp(tuneGain);
  if (lastTuneGain > 0) {
    var tlbl = lastTuneLevelUp ? (lastTuneLevelUp >= TUNE_MAX ? curStrings().chromed : curStrings().tune_up)
                               : ('+' + lastTuneGain + ' ' + curStrings().tune);
    GF.spawnFloat(fx(car.x), fy(car.y) - 84 * GF.S, tlbl,
                  lastTuneLevelUp >= TUNE_MAX ? '#eef4ff' : '#7fd0ff');
  }
  // ── M2: DAILY SPOT clean park → bank a MEDAL onto the shelf ────────────────
  if (dailyMode) {
    var m = medalForCrashes(crashes); // 3 gold / 2 silver / 1 bronze
    // upgrade the day's best; the shelf banks the BEST tier earned today (once)
    if (m > dailyBestMedal) {
      // remove a previously-banked lower medal for today, add the new tier
      if (dailyBestMedal === 1) medalShelf.bronze = Math.max(0, medalShelf.bronze - 1);
      else if (dailyBestMedal === 2) medalShelf.silver = Math.max(0, medalShelf.silver - 1);
      if (m === 3) medalShelf.gold += 1; else if (m === 2) medalShelf.silver += 1; else medalShelf.bronze += 1;
      dailyBestMedal = m;
    }
    dailyTriesLeft = 0; // a clean park ends the day's challenge
    earnedStars = m;    // reuse the stars row to show the medal tier on the result
    GF.spawnFloat(fx(car.x), fy(car.y) - 64 * GF.S, medalName(m), medalColor(m));
    GF.happytime();
    gs = 'LEVELCLEAR';
    steerLeft = steerRight = false;
    saveMeta();
    GF.gameEnded();
    GF.saveRun();
    return;
  }
  // persist best
  if (!endless) {
    if (earnedStars > (bestStars[lvl] || 0)) bestStars[lvl] = earnedStars;
    if (lvl + 1 > maxLevel) maxLevel = Math.min(AUTHORED_LEVELS + 1, lvl + 1);
  }
  if (!endless && lvl >= AUTHORED_LEVELS) {
    gs = 'WIN';
    GF.happytime();
  } else {
    gs = 'LEVELCLEAR';
    if (lastParkPerfect) GF.happytime();
  }
  steerLeft = steerRight = false;
  saveMeta();
  GF.gameEnded();
  GF.saveRun();
}

// ── M1 GARAGE actions ───────────────────────────────────────────────────────
// Auto-grant any car whose cost is now affordable? No — unlock is a deliberate
// player choice (spend coins) so the garage stays a destination. But fire a
// "you can afford a new car" toast the moment one becomes affordable, so the
// pull is felt OUTSIDE the menu.
var _afforded = {}; // id -> true once we've toasted affordability (avoid spam)
function checkCarUnlock() {
  var nl = nextLockedCar();
  if (nl && canAfford(nl) && !_afforded[nl.id]) {
    _afforded[nl.id] = true;
    carToast = { car: nl, t: 3.2, kind: 'afford' };
  }
}
function buyCar(id) {
  var c = carById(id);
  if (ownedCars[id] || !canAfford(c)) return false;
  coins -= c.cost;
  ownedCars[id] = true;
  activeCar = id; // auto-drive the new car so the perk is felt immediately
  carToast = { car: c, t: 3.0, kind: 'unlock' };
  if (GF.sfx) GF.sfx('unlock');
  saveMeta();
  return true;
}
function driveCar(id) {
  if (!ownedCars[id]) return false;
  activeCar = id;
  if (GF.sfx) GF.sfx('tap');
  saveMeta();
  return true;
}
// ── M3: rewarded TUNE BOOST — player-initiated, +XP, never gates play ────────
// Uses GF.rewardedAd: onReward fires ONLY on a confirmed reward (Yandex / CG /
// GamePush). On the gallery / local / no-fill it resolves shown:false → onReward
// never fires, so nothing bad happens (the button just does nothing). Guards
// against double-fire while an ad is open.
var _boostInFlight = false;
function tuneBoostAd(id) {
  if (_boostInFlight) return;
  if (!ownedCars[id] || isChrome(id)) return;
  if (GF.sfx) GF.sfx('tap');
  if (!GF.rewardedAd) return; // no ad layer at all → safe no-op
  _boostInFlight = true;
  GF.rewardedAd(function onReward() {
    var prevActive = activeCar;
    activeCar = id;                  // grant onto THIS car
    gainTuneXp(TUNE_BOOST_XP);       // banks XP, may level-up + CHROME (with FX)
    activeCar = prevActive;          // don't change the driven car as a side effect
    if (GF.spawnFloat) GF.spawnFloat(GF.cx, GF.H * 0.30,
      curStrings().boost_reward.replace('%n', String(TUNE_BOOST_XP)), '#7fd0ff');
    saveMeta();
    _boostInFlight = false;
  }, function onSkip() { _boostInFlight = false; });
}

function advance() { // from LEVELCLEAR → next level
  if (dailyMode) { dailyMode = false; goMenu(); return; } // Daily Spot has no "next"
  startLevel(lvl + 1);
}
function startEndless() { // from WIN → first endless level
  dailyMode = false;
  startLevel(AUTHORED_LEVELS + 1);
}
// ── M2: enter THE DAILY SPOT (the never-driven puzzle of the day) ────────────
function startDailySpot() {
  // stamp today so completing the daily LOCKS today (a reload won't offer it fresh)
  if (dailyKey !== daySeed()) { dailyKey = daySeed(); dailyTriesLeft = DAILY_TRIES; dailyBestMedal = 0; }
  if (dailyTriesLeft <= 0) return; // out of tries today
  dailyMode = true;
  endless = false;
  lvl = DAILY_LVL;
  crashes = 0;
  stars = 3;
  attemptTimer = 0;
  garageOpen = false;
  welcomeBack = null;
  loadLevel(DAILY_LVL);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

// ── ADS (Yandex) - user-click only, throttled. No auto-fire. ────────────────
function showInterstitial(onDone) {
  var now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  if (now - lastInterstitialMs < INTERSTITIAL_GAP_MS) { if (onDone) onDone(); return; }
  lastInterstitialMs = now;
  GF.showAd('midgame').then(function() { if (onDone) onDone(); });
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt) {
  pulseT += dt;
  layoutField();
  if (carToast) { carToast.t -= dt; if (carToast.t <= 0) carToast = null; }
  if (welcomeBack) { welcomeBack.t -= dt; if (welcomeBack.t <= 0) welcomeBack = null; }
  if (streakToast) { streakToast.t -= dt; if (streakToast.t <= 0) streakToast = null; }
  if (tuneToast) { tuneToast.t -= dt; if (tuneToast.t <= 0) tuneToast = null; }
  if (gs === 'CRASH') {
    crashT -= dt;
    if (crashT <= 0) {
      // Daily Spot: a scrape spends a try; out of tries ends the run (no medal).
      if (dailyMode && dailyTriesLeft <= 0) {
        earnedStars = 0; lastParkPerfect = false; lastEarned = 0;
        gs = 'LEVELCLEAR';
        steerLeft = steerRight = false;
        GF.gameEnded();
        GF.saveRun();
        return;
      }
      // forgiving instant retry of the same level
      var d = levelData(lvl);
      resetCar(d.start);
      gs = 'PLAYING';
      GF.gameStarted();
      GF.saveRun();
    }
    return;
  }
  if (gs !== 'PLAYING') return;
  if (tutorialOpen) return;
  if (_ssMode) return;

  attemptTimer += dt;
  if (steerHintFade > 0) steerHintFade = Math.max(0, steerHintFade - dt * 0.6);

  // active-car perks fold into handling here (M1 garage + M3 tune-scaled)
  var pc = curPerk();
  // steering
  var steer = (steerRight ? 1 : 0) - (steerLeft ? 1 : 0);
  if (steer !== 0) car.heading += steer * (TURN_RATE * pc.turn) * dt;

  // forward auto-creep; coast/settle friction when no input near the bay
  var targetSpeed = CREEP_SPEED * pc.creep;
  car.speed = targetSpeed; // constant creep - the held breath
  // integrate
  var vx = Math.sin(car.heading) * car.speed * dt;   // heading 0 = -y (up)
  var vy = -Math.cos(car.heading) * car.speed * dt;
  var nx = car.x + vx, ny = car.y + vy;
  var moved = GF.dist(car.x, car.y, nx, ny);
  car.x = nx; car.y = ny;
  pathLen += moved;

  // tyre trail (cosmetic)
  if (tyreMarks.length === 0 || GF.dist(car.x, car.y, tyreMarks[tyreMarks.length-1].x, tyreMarks[tyreMarks.length-1].y) > 7) {
    tyreMarks.push({ x: car.x, y: car.y });
    if (tyreMarks.length > 90) tyreMarks.shift();
  }

  // collision → instant retry
  if (collide()) { onCrash(); return; }

  // win check - must be inside the bay AND aligned. Since the car always
  // creeps, "settle" is satisfied by dwelling aligned-in-bay for SETTLE_SEC;
  // we treat being parked-in-bay as the settle accumulator.
  if (parkedInBay()) {
    settleT += dt;
    if (settleT >= SETTLE_SEC) { onParked(); return; }
  } else {
    settleT = Math.max(0, settleT - dt * 2);
  }
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function draw(ctx) {
  layoutField();
  // backdrop
  ctx.fillStyle = '#14171d';
  ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'PLAYING' || gs === 'CRASH' || gs === 'LEVELCLEAR' || gs === 'WIN') {
    drawField(ctx);
    drawBay(ctx);
    drawTrail(ctx);
    drawObstacles(ctx);
    drawCones(ctx);
    drawWalls(ctx);
    drawCar(ctx);
  }

  if (gs === 'PLAYING') {
    if (steerHintFade > 0.02) drawSteerHints(ctx);
    drawHUD(ctx);
    if (tutorialOpen) drawTutorialPanel(ctx);
  }
  if (gs === 'CRASH') {
    drawHUD(ctx);
    var a = GF.clamp(crashT / CRASH_RESET_SEC, 0, 1);
    ctx.fillStyle = 'rgba(255,60,60,' + (0.28 * a) + ')';
    ctx.fillRect(0, 0, GF.W, GF.H);
  }

  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'LEVELCLEAR') drawLevelClear(ctx);
  if (gs === 'WIN') drawWin(ctx);

  // GARAGE overlay can ride on top of MENU (and is reachable mid-run via HUD).
  if (garageOpen) drawGarage(ctx);
  // mute button + NEW CAR toast float above everything
  drawMuteBtn(ctx);
  if (carToast) drawCarToast(ctx);
  // M2: welcome-back ribbon + streak/trophy flourish (top, over everything)
  drawReturnToasts(ctx);
}

// ── M2: returning-player flourishes (welcome-back + streak gift/trophy) ──────
function drawReturnToasts(ctx) {
  var s = curStrings();
  // welcome-back ribbon — only on MENU/garage, points the player at the pile/daily
  if (welcomeBack && (gs === 'MENU')) {
    var a = GF.clamp(welcomeBack.t / 0.4, 0, 1);
    ctx.save(); ctx.globalAlpha = a;
    var rw = Math.min(GF.W * 0.8, 340 * GF.S), rh = GF.clamp(34 * GF.S, 28, 44);
    var rx = GF.cx - rw / 2, ry = GF.H * 0.045;
    GF.rr(ctx, rx, ry, rw, rh, rh / 2);
    ctx.fillStyle = 'rgba(57,217,138,0.92)'; ctx.fill();
    ctx.font = 'bold ' + GF.clamp(14 * GF.S, 11, 19) + 'px sans-serif';
    ctx.fillStyle = '#06140d'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(s.welcome_back, GF.cx, ry + rh / 2 + 1);
    ctx.restore();
  }
  // streak gift / trophy toast — center banner, over MENU and garage
  if (streakToast) {
    var a2 = GF.clamp(streakToast.t / 0.5, 0, 1);
    ctx.save(); ctx.globalAlpha = Math.min(1, a2);
    var bw = Math.min(GF.W * 0.84, 380 * GF.S), bh = GF.clamp(70 * GF.S, 56, 92);
    var bx = GF.cx - bw / 2, by = GF.H * 0.40;
    GF.rr(ctx, bx, by, bw, bh, 14 * GF.S);
    ctx.fillStyle = 'rgba(20,24,34,0.96)'; ctx.fill();
    ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 2; ctx.stroke();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (streakToast.kind === 'trophy') {
      drawTrophy(ctx, bx + bh * 0.5, by + bh / 2, bh * 0.3, true);
      ctx.font = 'bold ' + GF.clamp(15 * GF.S, 12, 21) + 'px sans-serif';
      ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'left';
      ctx.fillText(s.new_trophy, bx + bh * 0.9, by + bh * 0.36);
      ctx.font = GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
      ctx.fillStyle = '#cdd6e3';
      ctx.fillText(streakToast.id >= 7 ? s.trophy7 : s.trophy3, bx + bh * 0.9, by + bh * 0.64);
    } else {
      ctx.font = 'bold ' + GF.clamp(15 * GF.S, 12, 21) + 'px sans-serif';
      ctx.fillStyle = '#ffd24a';
      ctx.fillText(s.day_streak.replace('%n', String(streak)), GF.cx, by + bh * 0.34);
      var icr = GF.clamp(8 * GF.S, 6, 12);
      var gt = '+' + streakToast.amt;
      ctx.font = 'bold ' + GF.clamp(16 * GF.S, 13, 22) + 'px sans-serif';
      var gtW = ctx.measureText(gt).width;
      var grp = icr * 2 + 5 * GF.S + gtW;
      drawCoin(ctx, GF.cx - grp / 2 + icr, by + bh * 0.66, icr);
      ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'left';
      ctx.fillText(gt, GF.cx - grp / 2 + icr * 2 + 5 * GF.S, by + bh * 0.66 + 1);
    }
    ctx.restore();
  }
  // ── M3: TUNE level-up / CHROME flourish (over MENU, LEVELCLEAR, garage) ────
  if (tuneToast && (gs === 'MENU' || gs === 'LEVELCLEAR' || gs === 'WIN')) {
    var a3 = GF.clamp(tuneToast.t / 0.5, 0, 1);
    var chrome = tuneToast.chrome;
    ctx.save(); ctx.globalAlpha = Math.min(1, a3);
    var tbw = Math.min(GF.W * 0.82, 360 * GF.S), tbh = GF.clamp(62 * GF.S, 50, 82);
    var tbx = GF.cx - tbw / 2, tby = GF.H * 0.30;
    GF.rr(ctx, tbx, tby, tbw, tbh, 14 * GF.S);
    ctx.fillStyle = 'rgba(16,22,32,0.96)'; ctx.fill();
    ctx.strokeStyle = chrome ? '#eef4ff' : '#7fd0ff'; ctx.lineWidth = 2; ctx.stroke();
    // a tuned-car glyph on the left
    var gc = carById(tuneToast.id);
    drawCarGlyph(ctx, tbx + tbh * 0.5, tby + tbh / 2, tbh * 0.46, chrome ? '#eef4ff' : tuneBodyColor(gc));
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(16 * GF.S, 12, 22) + 'px sans-serif';
    ctx.fillStyle = chrome ? '#eef4ff' : '#7fd0ff';
    ctx.fillText(chrome ? s.chromed : s.tune_up, tbx + tbh * 0.9, tby + tbh * 0.36);
    ctx.font = GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
    ctx.fillStyle = '#cdd6e3';
    var sub = carName(gc) + ' — ' + (chrome ? s.tune_max : s.tune_lv.replace('%n', String(tuneToast.level)));
    ctx.fillText(sub, tbx + tbh * 0.9, tby + tbh * 0.64);
    ctx.restore();
  }
}

// On desktop/wide windows the portrait field is a centered strip; fill the dead
// side margins with a darker garage-wall gradient + a faint steer-half divider so
// it never reads as a "broken" thin column (player comment: "fix desktop").
function drawSideMargins(ctx) {
  var leftW = fx(0), rightX = fx(FIELD_W), rightW = GF.W - rightX;
  if (leftW < 2 && rightW < 2) return; // no margin (portrait) — nothing to do
  var g = ctx.createLinearGradient(0, 0, 0, GF.H);
  g.addColorStop(0, '#0e1016'); g.addColorStop(0.5, '#12151c'); g.addColorStop(1, '#0b0d12');
  ctx.fillStyle = g;
  if (leftW > 0) ctx.fillRect(0, 0, leftW, GF.H);
  if (rightW > 0) ctx.fillRect(rightX, 0, rightW, GF.H);
  // subtle vertical "bay stripes" on the walls so the margin has texture
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  var step = 46 * GF.S;
  for (var x = step; x < leftW; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GF.H); ctx.stroke(); }
  for (var x2 = rightX + step; x2 < GF.W; x2 += step) { ctx.beginPath(); ctx.moveTo(x2, 0); ctx.lineTo(x2, GF.H); ctx.stroke(); }
  // a faint LEFT|RIGHT steer-half divider down the screen center (desktop affordance)
  if (gs === 'PLAYING' && !tutorialOpen) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.setLineDash([6 * GF.S, 8 * GF.S]);
    ctx.strokeStyle = 'rgba(120,150,200,0.20)';
    ctx.lineWidth = 1.5 * GF.S;
    ctx.beginPath(); ctx.moveTo(GF.cx, 0); ctx.lineTo(GF.cx, GF.H); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

function drawField(ctx) {
  drawSideMargins(ctx);
  // asphalt panel
  ctx.fillStyle = '#1d2129';
  ctx.fillRect(fx(0), fy(0), FIELD_W * GF.S, FIELD_H * GF.S);
  // subtle painted lane lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (var gx = 60; gx < FIELD_W; gx += 60) {
    ctx.beginPath(); ctx.moveTo(fx(gx), fy(0)); ctx.lineTo(fx(gx), fy(FIELD_H)); ctx.stroke();
  }
  // vignette
  var g = ctx.createRadialGradient(GF.cx, GF.cy, FIELD_H * GF.S * 0.2, GF.cx, GF.cy, FIELD_H * GF.S * 0.75);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = g;
  ctx.fillRect(fx(0), fy(0), FIELD_W * GF.S, FIELD_H * GF.S);
}

function drawBay(ctx) {
  if (!bay) return;
  var corners = rectCorners(bay.x, bay.y, bay.w, bay.l, bay.heading);
  var pulse = 0.55 + 0.45 * Math.sin(pulseT * 3);
  // glow fill
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(fx(corners[0].x), fy(corners[0].y));
  for (var i = 1; i < 4; i++) ctx.lineTo(fx(corners[i].x), fy(corners[i].y));
  ctx.closePath();
  ctx.fillStyle = 'rgba(57,217,138,' + (0.10 + 0.06 * pulse) + ')';
  ctx.fill();
  ctx.strokeStyle = '#39d98a';
  ctx.lineWidth = 3 * GF.S;
  ctx.shadowColor = '#39d98a';
  ctx.shadowBlur = (10 + 8 * pulse) * GF.S;
  ctx.stroke();
  ctx.restore();
  // ghost car silhouette at parked pose
  var gc = rectCorners(bay.x, bay.y, CAR_W, CAR_L, bay.heading);
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(fx(gc[0].x), fy(gc[0].y));
  for (var j = 1; j < 4; j++) ctx.lineTo(fx(gc[j].x), fy(gc[j].y));
  ctx.closePath();
  ctx.fillStyle = 'rgba(57,217,138,0.10)';
  ctx.fill();
  ctx.setLineDash([5 * GF.S, 5 * GF.S]);
  ctx.strokeStyle = 'rgba(57,217,138,0.45)';
  ctx.lineWidth = 1.5 * GF.S;
  ctx.stroke();
  ctx.setLineDash([]);
  // a little arrow showing the parked facing
  var nx2 = bay.x + Math.sin(bay.heading) * 0, ny2 = bay.y - Math.cos(bay.heading) * (bay.l/2 - 8);
  ctx.fillStyle = 'rgba(57,217,138,0.6)';
  ctx.beginPath();
  ctx.arc(fx(nx2), fy(ny2), 4 * GF.S, 0, PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawTrail(ctx) {
  if (tyreMarks.length < 2) return;
  ctx.strokeStyle = 'rgba(0,0,0,0.28)';
  ctx.lineWidth = CAR_W * 0.32 * GF.S;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(fx(tyreMarks[0].x), fy(tyreMarks[0].y));
  for (var i = 1; i < tyreMarks.length; i++) ctx.lineTo(fx(tyreMarks[i].x), fy(tyreMarks[i].y));
  ctx.stroke();
}

function drawCarBody(ctx, rx, ry, rh, w, l, body, roof) {
  ctx.save();
  ctx.translate(fx(rx), fy(ry));
  ctx.rotate(rh);
  var sw = w * GF.S, sl = l * GF.S;
  // body
  GF.rr(ctx, -sw/2, -sl/2, sw, sl, 6 * GF.S);
  ctx.fillStyle = body;
  ctx.fill();
  // windshield (nose is -y)
  ctx.fillStyle = roof;
  GF.rr(ctx, -sw*0.34, -sl*0.34, sw*0.68, sl*0.26, 3 * GF.S);
  ctx.fill();
  // rear window
  GF.rr(ctx, -sw*0.34, sl*0.12, sw*0.68, sl*0.20, 3 * GF.S);
  ctx.fill();
  // headlights at nose
  ctx.fillStyle = 'rgba(255,255,200,0.9)';
  ctx.beginPath(); ctx.arc(-sw*0.28, -sl*0.46, 2.4 * GF.S, 0, PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sw*0.28, -sl*0.46, 2.4 * GF.S, 0, PI*2); ctx.fill();
  ctx.restore();
}

function drawCar(ctx) {
  var hot = (gs === 'CRASH');
  var pc = curCar();
  drawCarBody(ctx, car.x, car.y, car.heading, CAR_W, CAR_L, hot ? '#ff6b5e' : pc.body, hot ? '#ffd6d0' : pc.roof);
}
function drawObstacles(ctx) {
  for (var i = 0; i < obstacles.length; i++) {
    var o = obstacles[i];
    drawCarBody(ctx, o.x, o.y, o.heading, o.w, o.l, '#7b8696', '#aab4c2');
  }
}
function drawCones(ctx) {
  for (var i = 0; i < cones.length; i++) {
    var cn = cones[i];
    var r = CONE_R * GF.S;
    ctx.save();
    ctx.translate(fx(cn.x), fy(cn.y));
    ctx.beginPath(); ctx.arc(0, 0, r, 0, PI*2);
    ctx.fillStyle = '#ff8a2b'; ctx.fill();
    ctx.beginPath(); ctx.arc(0, 0, r * 0.55, 0, PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(0, 0, r * 0.28, 0, PI*2);
    ctx.fillStyle = '#ff8a2b'; ctx.fill();
    ctx.restore();
  }
}
function drawWalls(ctx) {
  ctx.strokeStyle = '#3a4150';
  ctx.lineWidth = WALL_THICK * 2 * GF.S;
  ctx.lineCap = 'round';
  for (var i = 0; i < walls.length; i++) {
    var w = walls[i];
    ctx.beginPath();
    ctx.moveTo(fx(w.x1), fy(w.y1));
    ctx.lineTo(fx(w.x2), fy(w.y2));
    ctx.stroke();
  }
  // top highlight on border
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 2 * GF.S;
  for (var j = 0; j < walls.length; j++) {
    var wl = walls[j];
    ctx.beginPath();
    ctx.moveTo(fx(wl.x1), fy(wl.y1));
    ctx.lineTo(fx(wl.x2), fy(wl.y2));
    ctx.stroke();
  }
}

function drawSteerHints(ctx) {
  ctx.save();
  ctx.globalAlpha = steerHintFade * 0.5;
  var midY = GF.H * 0.78;
  var fs = GF.clamp(15 * GF.S, 12, 22);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.fillStyle = '#cfe';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // left chevron
  drawChevron(ctx, GF.W * 0.22, midY, -1);
  ctx.fillText(curStrings().hold_left, GF.W * 0.22, midY + 30 * GF.S);
  // right chevron
  drawChevron(ctx, GF.W * 0.78, midY, 1);
  ctx.fillText(curStrings().hold_right, GF.W * 0.78, midY + 30 * GF.S);
  ctx.restore();
}
function drawChevron(ctx, x, y, dir) {
  var s = 16 * GF.S;
  ctx.strokeStyle = '#cfe';
  ctx.lineWidth = 3 * GF.S;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(x + dir * s, y - s);
  ctx.lineTo(x - dir * s, y);
  ctx.lineTo(x + dir * s, y + s);
  ctx.stroke();
}

function drawStars(ctx, n, x, y, size) {
  for (var i = 0; i < 3; i++) {
    drawStar(ctx, x + i * size * 1.25, y, size / 2, i < n ? '#ffd24a' : 'rgba(255,255,255,0.18)');
  }
}
// vector coin (never emoji) — a gold disc with a rim + a small "c"
function drawCoin(ctx, cxp, cyp, r) {
  ctx.save();
  ctx.translate(cxp, cyp);
  ctx.beginPath(); ctx.arc(0, 0, r, 0, PI * 2);
  ctx.fillStyle = '#ffd24a'; ctx.fill();
  ctx.lineWidth = Math.max(1, r * 0.16); ctx.strokeStyle = '#caa023'; ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, r * 0.62, 0, PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = Math.max(1, r * 0.12); ctx.stroke();
  ctx.restore();
}
// a little garage/car silhouette glyph for the GARAGE button (vector, not emoji)
function drawCarGlyph(ctx, cxp, cyp, w, col) {
  ctx.save();
  ctx.translate(cxp, cyp);
  var h = w * 0.5;
  GF.rr(ctx, -w/2, -h*0.18, w, h*0.55, h * 0.22);
  ctx.fillStyle = col || '#cfe'; ctx.fill();
  // cabin
  GF.rr(ctx, -w*0.22, -h*0.5, w*0.44, h*0.4, h * 0.14);
  ctx.fill();
  // wheels
  ctx.fillStyle = '#1a1d25';
  ctx.beginPath(); ctx.arc(-w*0.26, h*0.4, h*0.2, 0, PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(w*0.26, h*0.4, h*0.2, 0, PI*2); ctx.fill();
  ctx.restore();
}
function drawStar(ctx, cxp, cyp, r, col) {
  ctx.save();
  ctx.translate(cxp, cyp);
  ctx.beginPath();
  for (var i = 0; i < 5; i++) {
    var a = -PI/2 + i * (2*PI/5);
    ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    var a2 = a + PI/5;
    ctx.lineTo(Math.cos(a2) * r * 0.45, Math.sin(a2) * r * 0.45);
  }
  ctx.closePath();
  ctx.fillStyle = col;
  ctx.fill();
  ctx.restore();
}

function drawHUD(ctx) {
  var fs = GF.clamp(17 * GF.S, 13, 24);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillStyle = dailyMode ? '#ffd24a' : '#fff';
  var label = dailyMode ? curStrings().daily_spot_short
            : endless ? (curStrings().daily + ' ' + (lvl - AUTHORED_LEVELS))
            : (curStrings().lvl + ' ' + lvl);
  ctx.fillText(label, 14 * GF.S, 14 * GF.S);
  // ── M2: Daily Spot tries-left dots (right of the DAILY label) ─────────────
  if (dailyMode) {
    var lblW = ctx.measureText(label).width;
    var tdr = GF.clamp(4 * GF.S, 3, 6);
    for (var ti = 0; ti < DAILY_TRIES; ti++) {
      ctx.beginPath();
      ctx.arc(14 * GF.S + lblW + 14 * GF.S + ti * tdr * 2.8, 14 * GF.S + fs * 0.5, tdr, 0, PI * 2);
      ctx.fillStyle = ti < dailyTriesLeft ? '#ffd24a' : 'rgba(160,180,210,0.3)'; ctx.fill();
    }
  }

  // ── M1: permanent COIN readout (top-left, under LVL) ──────────────────────
  var coinR = GF.clamp(8 * GF.S, 6, 12);
  var coinY = 14 * GF.S + fs + 12 * GF.S;
  drawCoin(ctx, 14 * GF.S + coinR, coinY + coinR, coinR);
  ctx.font = 'bold ' + GF.clamp(15 * GF.S, 12, 21) + 'px sans-serif';
  ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  var coinTxt = String(Math.round(coins));
  ctx.fillText(coinTxt, 14 * GF.S + coinR * 2 + 6 * GF.S, coinY + coinR + 1);
  // ── M3: active-car TUNE badge (so the in-RUN world reflects the car's tune) ─
  // A returning player who tuned/chromed their car SEES it here mid-run, not just
  // in the menu. Cyan "TUNE n", near-white "CHROME" at max.
  (function() {
    var lv = tuneLevel(activeCar), maxed = isChrome(activeCar);
    var bx = 14 * GF.S + coinR * 2 + 6 * GF.S + ctx.measureText(coinTxt).width + 12 * GF.S;
    var bh = GF.clamp(18 * GF.S, 15, 26), by = coinY + coinR + 1 - bh / 2;
    ctx.font = 'bold ' + GF.clamp(11 * GF.S, 9, 15) + 'px sans-serif';
    var tlab = maxed ? curStrings().tune_max : (curStrings().tune + ' ' + lv);
    var bw = ctx.measureText(tlab).width + 14 * GF.S;
    GF.rr(ctx, bx, by, bw, bh, bh / 2);
    ctx.fillStyle = maxed ? 'rgba(220,232,255,0.18)' : 'rgba(56,96,140,0.45)'; ctx.fill();
    ctx.strokeStyle = maxed ? '#eef4ff' : 'rgba(127,208,255,0.8)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = maxed ? '#eef4ff' : '#bfe6ff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(tlab, bx + 7 * GF.S, by + bh / 2 + 1);
  })();
  // "next car: N away" hint OUTSIDE the menu (the pull to keep playing)
  var nl = nextLockedCar();
  if (nl) {
    var need = Math.max(0, nl.cost - Math.round(coins));
    ctx.font = GF.clamp(11 * GF.S, 9, 15) + 'px sans-serif';
    ctx.fillStyle = need === 0 ? '#39d98a' : '#9fb0c4';
    ctx.textBaseline = 'top';
    var hint = need === 0
      ? (curStrings().garage + ': ' + carName(nl) + ' ' + curStrings().unlock + '!')
      : (curStrings().next_car + ': ' + carName(nl) + ' (' + need + curStrings().coins_short + ' ' + curStrings().away + ')');
    ctx.fillText(hint, 14 * GF.S, coinY + coinR * 2 + 6 * GF.S);
  }
  ctx.textBaseline = 'top'; ctx.textAlign = 'left';

  // live star ceiling - top center
  var starSz = GF.clamp(16 * GF.S, 12, 22);
  drawStars(ctx, stars, GF.cx - starSz * 1.6, 14 * GF.S + starSz/2, starSz);

  // help (?) + garage + menu buttons top-right
  var btn = GF.clamp(32 * GF.S, 26, 42);
  var pad = 12 * GF.S, gap = 8 * GF.S;
  helpBtn   = { x: GF.W - pad - btn,                 y: 12 * GF.S, w: btn, h: btn };
  garageBtn = { x: GF.W - pad - btn * 2 - gap,       y: 12 * GF.S, w: btn, h: btn };
  menuBtn   = { x: GF.W - pad - btn * 3 - gap * 2,   y: 12 * GF.S, w: btn, h: btn };
  drawIconBtn(ctx, helpBtn, '?');
  drawGarageBtn(ctx, garageBtn);
  drawIconBtn(ctx, menuBtn, '≡');

  // crash dots (risk signal) under the buttons
  if (crashes > 0) {
    var dotR = GF.clamp(4 * GF.S, 3, 6);
    for (var i = 0; i < Math.min(crashes, 6); i++) {
      ctx.beginPath();
      ctx.arc(GF.W - pad - i * dotR * 2.6 - dotR, 12 * GF.S + btn + 12 * GF.S, dotR, 0, PI * 2);
      ctx.fillStyle = '#ff6b5e';
      ctx.fill();
    }
  }
}
// garage icon button (car silhouette) — pulses gold when a car is affordable
function drawGarageBtn(ctx, b) {
  var nl = nextLockedCar();
  var hot = nl && canAfford(nl);
  GF.rr(ctx, b.x, b.y, b.w, b.h, 7 * GF.S);
  ctx.fillStyle = hot ? 'rgba(60,80,52,0.92)' : 'rgba(40,48,64,0.85)'; ctx.fill();
  ctx.strokeStyle = hot ? 'rgba(57,217,138,0.9)' : 'rgba(160,180,210,0.5)';
  ctx.lineWidth = hot ? 2 : 1.5; ctx.stroke();
  drawCarGlyph(ctx, b.x + b.w / 2, b.y + b.h / 2, b.w * 0.62, hot ? '#9af0c4' : '#cfe');
  if (hot) {
    // little gold dot badge
    ctx.beginPath(); ctx.arc(b.x + b.w - 5 * GF.S, b.y + 5 * GF.S, 4 * GF.S, 0, PI * 2);
    ctx.fillStyle = '#ffd24a'; ctx.fill();
  }
}
function drawIconBtn(ctx, b, glyph) {
  GF.rr(ctx, b.x, b.y, b.w, b.h, 7 * GF.S);
  ctx.fillStyle = 'rgba(40,48,64,0.85)'; ctx.fill();
  ctx.strokeStyle = 'rgba(160,180,210,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#cfe';
  ctx.font = 'bold ' + (b.h * 0.55) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(glyph, b.x + b.w / 2, b.y + b.h / 2 + 1);
  ctx.textBaseline = 'top';
}

// ── TEXT WRAP (measured block layout for the tutorial) ──────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

// Returns the y after drawing - so the next block starts after this one.
function drawTutorialBlock(ctx, items, topY, maxW, lineH, gap) {
  var y = topY;
  for (var i = 0; i < items.length; i++) {
    var lines = wrapLines(ctx, items[i], maxW);
    for (var j = 0; j < lines.length; j++) {
      ctx.fillText(lines[j], GF.cx, y);
      y += lineH;
    }
    y += gap;
  }
  return y;
}

function tutorialItems() {
  var s = curStrings();
  return [s.tut_goal, s.tut_controls, s.tut_win, s.tut_lose, s.tut_tip];
}

// ── MENU ─────────────────────────────────────────────────────────────────────
function drawMenu(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(12,14,20,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(40 * GF.S, 26, 60);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = 'rgba(74,163,255,0.5)'; ctx.shadowBlur = 24 * GF.S;
  var titleY = GF.H * 0.16;
  ctx.fillText(curStrings().title, GF.cx, titleY);
  ctx.shadowBlur = 0;
  var subFs = GF.clamp(15 * GF.S, 12, 20);
  ctx.font = subFs + 'px sans-serif';
  ctx.fillStyle = '#8aa';
  ctx.fillText(curStrings().sub, GF.cx, titleY + subFs + 10 * GF.S);

  // tutorial block (measured, wrapped)
  var bodyFs = GF.clamp(14 * GF.S, 11, 18);
  ctx.font = bodyFs + 'px sans-serif';
  ctx.fillStyle = '#cdd6e3';
  ctx.textBaseline = 'top';
  var maxW = Math.min(GF.W * 0.86, 460 * GF.S);
  var topY = titleY + subFs + 40 * GF.S;
  var endY = drawTutorialBlock(ctx, tutorialItems(), topY, maxW, bodyFs + 5 * GF.S, 9 * GF.S);

  // PLAY button below the tutorial block — wide: bigger + animated
  var wide = GF.W / GF.H > 1.15;
  var btnW = GF.clamp(220 * GF.S, 150, 300), btnH = GF.clamp(54 * GF.S, 42, 66);
  var drawW = wide ? GF.clamp(300 * GF.S, 160, 400) : btnW;
  var drawH = wide ? GF.clamp(70 * GF.S, 48, 90) : btnH;
  var textBlockBottom = endY;
  var clearMargin = drawH / 2 + 16;
  var wideFloor = GF.H * 0.56;
  var wideCap = GF.H - drawH - 20 * GF.S;
  var drawY = wide ? Math.min(Math.max(textBlockBottom + clearMargin, wideFloor), wideCap)
                   : Math.min(endY + 14 * GF.S, GF.H - btnH - 30 * GF.S);
  // stable hit-rect at base size, centered on drawY
  var hitX = GF.cx - btnW / 2, hitY = drawY + (drawH - btnH) / 2;
  uiButtons.push({ x: hitX, y: hitY, w: btnW, h: btnH, fn: function() { startLevel(maxLevel); } });
  if (wide) {
    var _t = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000;
    var _k = Math.sin(_t * 2.2);
    var _p = 1 + 0.05 * _k;
    var pw = drawW * _p, ph = drawH * _p;
    var px = GF.cx - pw / 2, py2 = drawY + (drawH - ph) / 2;
    ctx.save();
    ctx.shadowColor = 'rgba(57,217,138,' + (0.4 + 0.28 * _k).toFixed(3) + ')';
    ctx.shadowBlur = (22 + 10 * _k) * GF.S;
    drawPrimaryBtn(ctx, px, py2, pw, ph, '▶ ' + curStrings().play);
    ctx.restore();
  } else {
    drawPrimaryBtn(ctx, GF.cx - drawW / 2, drawY, drawW, drawH, curStrings().play);
  }

  // ── M1+M2: DAILY SPOT + GARAGE buttons (two-up row) + coin balance ─────────
  var rowW = GF.clamp(224 * GF.S, 154, 304), gBtnH = GF.clamp(46 * GF.S, 38, 58);
  var gY = drawY + drawH + 16 * GF.S;
  // keep the row on-screen on short portraits
  gY = Math.min(gY, GF.H - gBtnH - 44 * GF.S);
  var halfGap = 8 * GF.S, halfW = (rowW - halfGap) / 2;
  var dX = GF.cx - rowW / 2, gX = dX + halfW + halfGap;
  // DAILY SPOT (left) — gold when today's spot is unplayed, checked when done
  var dailyAvail = (dailyKey !== daySeed() || dailyTriesLeft > 0) && dailyBestMedal === 0;
  drawDailyBtn(ctx, dX, gY, halfW, gBtnH, dailyAvail);
  uiButtons.push({ x: dX, y: gY, w: halfW, h: gBtnH, fn: function(){ openGarage(); } });
  // GARAGE (right)
  drawSecondaryBtn(ctx, gX, gY, halfW, gBtnH, curStrings().garage);
  var nl = nextLockedCar();
  var badge = (nl && canAfford(nl)) || valetPending > 0;
  if (badge) {
    ctx.beginPath(); ctx.arc(gX + halfW - 13 * GF.S, gY + 12 * GF.S, 5 * GF.S, 0, PI * 2);
    ctx.fillStyle = '#ffd24a'; ctx.fill();
  }
  uiButtons.push({ x: gX, y: gY, w: halfW, h: gBtnH, fn: openGarage });

  // coin balance line
  ctx.textBaseline = 'alphabetic';
  var cbR = GF.clamp(7 * GF.S, 5, 10);
  var cbY = gY + gBtnH + 20 * GF.S;
  ctx.font = 'bold ' + GF.clamp(13 * GF.S, 11, 18) + 'px sans-serif';
  var cbTxt = String(Math.round(coins));
  var cbW = ctx.measureText(cbTxt).width;
  var cbGroup = cbR * 2 + 6 * GF.S + cbW;
  drawCoin(ctx, GF.cx - cbGroup / 2 + cbR, cbY - cbR + 1, cbR);
  ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(cbTxt, GF.cx - cbGroup / 2 + cbR * 2 + 6 * GF.S, cbY - cbR + 2);

  // best progress line
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.font = GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
  ctx.fillStyle = '#667';
  var prog = endlessUnlocked() ? curStrings().campaign_done
    : (curStrings().lvl + ' ' + maxLevel + ' / ' + AUTHORED_LEVELS);
  ctx.fillText(prog, GF.cx, cbY + 22 * GF.S);
}
function endlessUnlocked() { return maxLevel > AUTHORED_LEVELS; }

function drawPrimaryBtn(ctx, x, y, w, h, label) {
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, '#39d98a'); grad.addColorStop(1, '#23b06b');
  GF.rr(ctx, x, y, w, h, h / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 24) + 'px sans-serif';
  ctx.fillStyle = '#06140d';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2);
  ctx.textBaseline = 'alphabetic';
}
function drawSecondaryBtn(ctx, x, y, w, h, label) {
  GF.rr(ctx, x, y, w, h, h / 2);
  ctx.fillStyle = 'rgba(50,58,76,0.95)'; ctx.fill();
  ctx.strokeStyle = 'rgba(160,180,210,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.font = 'bold ' + GF.clamp(16 * GF.S, 13, 22) + 'px sans-serif';
  ctx.fillStyle = '#cfe';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2);
  ctx.textBaseline = 'alphabetic';
}
// ── M2: DAILY SPOT menu button (gold = unplayed today, dimmed+check = done) ──
function drawDailyBtn(ctx, x, y, w, h, avail) {
  GF.rr(ctx, x, y, w, h, h / 2);
  if (avail) {
    var g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, '#ffd24a'); g.addColorStop(1, '#e0a83a');
    ctx.fillStyle = g; ctx.fill();
    ctx.fillStyle = '#1a1406';
  } else {
    ctx.fillStyle = 'rgba(50,58,76,0.95)'; ctx.fill();
    ctx.strokeStyle = 'rgba(160,180,210,0.45)'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.fillStyle = '#9fb0c4';
  }
  ctx.font = 'bold ' + GF.clamp(15 * GF.S, 12, 20) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(curStrings().daily_spot_short, x + w / 2, y + h / 2);
  ctx.textBaseline = 'alphabetic';
  if (avail) { // pulsing dot to draw the eye to the fresh puzzle
    var t = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000;
    var a = 0.5 + 0.5 * Math.sin(t * 3.2);
    ctx.beginPath(); ctx.arc(x + w - 13 * GF.S, y + 12 * GF.S, 4.5 * GF.S, 0, PI * 2);
    ctx.fillStyle = 'rgba(255,80,80,' + (0.55 + 0.45 * a).toFixed(2) + ')'; ctx.fill();
  } else if (dailyBestMedal > 0) { // a tiny medal dot showing today's best
    ctx.beginPath(); ctx.arc(x + w - 13 * GF.S, y + 12 * GF.S, 4.5 * GF.S, 0, PI * 2);
    ctx.fillStyle = medalColor(dailyBestMedal); ctx.fill();
  }
}

// ── M1 GARAGE OVERLAY (the owned collection — reachable from MENU + mid-run) ──
// Lays the 6-car ladder as a vertical list of rows. Each row: a colored car
// swatch + name + perk + a status pill (DRIVE / DRIVING / UNLOCK <cost> / locked).
// Populates uiButtons with the per-row actions + a CLOSE button.
var garageBtns = []; // {x,y,w,h,fn}
function drawGarage(ctx) {
  garageBtns = [];
  // fully opaque backdrop (gallery hygiene: no underlying screen bleed-through)
  ctx.fillStyle = '#0b0d12';
  ctx.fillRect(0, 0, GF.W, GF.H);

  // header: GARAGE + coin balance
  var titleFs = GF.clamp(26 * GF.S, 19, 38);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var topY = GF.H * 0.06;
  ctx.fillText(curStrings().garage, GF.cx, topY);
  // coin balance pill
  var cr = GF.clamp(9 * GF.S, 7, 13);
  var balY = topY + titleFs + 10 * GF.S;
  ctx.font = 'bold ' + GF.clamp(16 * GF.S, 13, 22) + 'px sans-serif';
  var balTxt = String(Math.round(coins));
  var balW = ctx.measureText(balTxt).width;
  var groupW = cr * 2 + 7 * GF.S + balW;
  drawCoin(ctx, GF.cx - groupW / 2 + cr, balY + cr, cr);
  ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(balTxt, GF.cx - groupW / 2 + cr * 2 + 7 * GF.S, balY + cr + 1);

  // rows
  var listW = Math.min(GF.W * 0.92, 460 * GF.S);
  var listX = GF.cx - listW / 2;
  // CLOSE button sits at the bottom; cap the list so it never overlaps it
  var closeH = GF.clamp(46 * GF.S, 38, 58);
  var closeY = GF.H - closeH - 16 * GF.S;
  var nameFs = GF.clamp(14 * GF.S, 12, 19);
  var perkFs = GF.clamp(11 * GF.S, 9, 15);

  // ── M2 HEADER BAND: Daily Spot + Valet pile + the Shelf (world-visible) ────
  var y = drawGarageM2Header(ctx, listX, listW, balY + cr * 2 + 12 * GF.S, closeY);

  // car rows: shrink a touch so all 6 fit under the M2 band on a 852 portrait
  var rowH = GF.clamp(66 * GF.S, 52, 84);
  var rowGap = 7 * GF.S;

  for (var i = 0; i < CARS.length; i++) {
    var c = CARS[i];
    if (y + rowH > closeY - 4 * GF.S) break; // guard (6 rows fit 852; cap on tiny screens)
    var owned = !!ownedCars[c.id];
    var active = (activeCar === c.id);
    // row card
    GF.rr(ctx, listX, y, listW, rowH, 12 * GF.S);
    ctx.fillStyle = active ? 'rgba(40,64,52,0.92)' : 'rgba(28,34,46,0.92)'; ctx.fill();
    ctx.strokeStyle = active ? 'rgba(57,217,138,0.9)' : 'rgba(120,140,170,0.28)';
    ctx.lineWidth = active ? 2 : 1; ctx.stroke();
    // car swatch (mini top-down body; M3 tune brightens it, chrome = near-white)
    ctx.save();
    if (!owned) ctx.globalAlpha = 0.4;
    drawCarGlyph(ctx, listX + rowH * 0.46, y + rowH / 2, rowH * 0.5, owned ? tuneBodyColor(c) : c.body);
    // M3: CHROME ring around a fully-tuned car's glyph (collection-completion)
    if (owned && isChrome(c.id)) {
      ctx.beginPath(); ctx.arc(listX + rowH * 0.46, y + rowH / 2, rowH * 0.34, 0, PI * 2);
      ctx.strokeStyle = '#eef4ff'; ctx.lineWidth = 2; ctx.stroke();
    }
    ctx.restore();
    // name + perk
    ctx.textAlign = 'left';
    ctx.font = 'bold ' + nameFs + 'px sans-serif';
    ctx.fillStyle = owned ? '#fff' : '#9fb0c4'; ctx.textBaseline = 'top';
    var tx = listX + rowH * 0.86;
    ctx.fillText(carName(c), tx, y + rowH * 0.16);
    ctx.font = perkFs + 'px sans-serif';
    ctx.fillStyle = '#9fb0c4';
    // M3: leave the bottom strip of the row for the tune bar, so cap the perk to
    // ONE line here (the full perk is felt in handling, not the menu).
    var perkLines = wrapLines(ctx, carPerk(c), listW - (tx - listX) - GF.clamp(150 * GF.S, 120, 200));
    ctx.fillText(perkLines[0] || '', tx, y + rowH * 0.40);
    // status pill geometry (right side) — computed BEFORE the tune bar so the bar
    // can be clamped to never run under the right-side controls (pill / BOOST).
    var pillW = GF.clamp(92 * GF.S, 70, 116), pillH = GF.clamp(34 * GF.S, 28, 44);
    var pillX = listX + listW - pillW - 10 * GF.S, pillY = y + (rowH - pillH) / 2;
    var bbW = GF.clamp(62 * GF.S, 50, 82), bbH = GF.clamp(30 * GF.S, 26, 40);
    var bbX = pillX - bbW - 8 * GF.S, bbY = y + (rowH - bbH) / 2;
    // the left edge of the right-side control cluster (BOOST shows only for an
    // owned, not-yet-maxed car; otherwise the pill is the leftmost right control).
    var rightCtrlX = (owned && !isChrome(c.id)) ? bbX : pillX;
    // ── M3: TUNE bar + level (owned cars only) ────────────────────────────────
    if (owned) {
      var tp = tuneProgress(c.id);
      var barX = tx, barY = y + rowH * 0.72, barH = GF.clamp(6 * GF.S, 5, 9);
      // label: "TUNE 3" or "CHROME"
      ctx.font = 'bold ' + GF.clamp(10 * GF.S, 9, 14) + 'px sans-serif';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = tp.max ? '#eef4ff' : '#7fd0ff';
      var tlab = tp.max ? curStrings().tune_max : curStrings().tune_lv.replace('%n', String(tp.lv));
      ctx.fillText(tlab, barX, barY + barH / 2);
      var tlabW = ctx.measureText(tlab).width + 8 * GF.S;
      // bar width: fill the space up to the right-side controls, clamped to a sane
      // range so it never overlaps the BOOST/pill (mobile-portrait-safe).
      var barW = GF.clamp((rightCtrlX - 10 * GF.S) - (barX + tlabW), 48 * GF.S, 168 * GF.S);
      // bar track
      GF.rr(ctx, barX + tlabW, barY, barW, barH, barH / 2);
      ctx.fillStyle = 'rgba(120,140,170,0.25)'; ctx.fill();
      var frac = tp.max ? 1 : GF.clamp(tp.cur / tp.span, 0, 1);
      if (frac > 0.02) {
        GF.rr(ctx, barX + tlabW, barY, barW * frac, barH, barH / 2);
        ctx.fillStyle = tp.max ? '#eef4ff' : '#39d98a'; ctx.fill();
      }
    }
    // ── M3: rewarded TUNE BOOST button (owned, not-yet-maxed) ─────────────────
    // Player-INITIATED, rewarded-only: WATCH AD → +TUNE_BOOST_XP. Never gates
    // play; no-ops on the gallery (GF.rewardedAd resolves shown:false). Sits just
    // left of the status pill, vertically centered.
    if (owned && !isChrome(c.id)) {
      GF.rr(ctx, bbX, bbY, bbW, bbH, bbH / 2);
      ctx.fillStyle = 'rgba(38,56,82,0.95)'; ctx.fill();
      ctx.strokeStyle = 'rgba(127,208,255,0.7)'; ctx.lineWidth = 1.4; ctx.stroke();
      // a tiny play-triangle + BOOST label (ad affordance)
      ctx.beginPath();
      var ptx = bbX + 11 * GF.S, pty = bbY + bbH / 2, ps = 5 * GF.S;
      ctx.moveTo(ptx - ps * 0.5, pty - ps); ctx.lineTo(ptx + ps, pty); ctx.lineTo(ptx - ps * 0.5, pty + ps);
      ctx.closePath(); ctx.fillStyle = '#7fd0ff'; ctx.fill();
      ctx.font = 'bold ' + GF.clamp(11 * GF.S, 9, 15) + 'px sans-serif';
      ctx.fillStyle = '#bfe6ff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(curStrings().tune_boost, bbX + 20 * GF.S, bbY + bbH / 2 + 1);
      garageBtns.push({ x: bbX, y: bbY, w: bbW, h: bbH, fn: (function(cid){ return function(){ tuneBoostAd(cid); }; })(c.id) });
    }
    (function(car, ownd, act, px, py, pw, ph) {
      if (act) {
        GF.rr(ctx, px, py, pw, ph, ph / 2); ctx.fillStyle = 'rgba(57,217,138,0.25)'; ctx.fill();
        ctx.strokeStyle = '#39d98a'; ctx.lineWidth = 1.5; ctx.stroke();
        pillLabel(ctx, curStrings().driving, '#9af0c4', px, py, pw, ph);
      } else if (ownd) {
        GF.rr(ctx, px, py, pw, ph, ph / 2); ctx.fillStyle = 'rgba(50,58,76,0.95)'; ctx.fill();
        ctx.strokeStyle = 'rgba(160,180,210,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
        pillLabel(ctx, curStrings().drive, '#cfe', px, py, pw, ph);
        garageBtns.push({ x: px, y: py, w: pw, h: ph, fn: function(){ driveCar(car.id); } });
      } else {
        var afford = canAfford(car);
        var grad = ctx.createLinearGradient(px, py, px, py + ph);
        if (afford) { grad.addColorStop(0, '#39d98a'); grad.addColorStop(1, '#23b06b'); }
        else { grad.addColorStop(0, 'rgba(50,58,76,0.95)'); grad.addColorStop(1, 'rgba(40,48,64,0.95)'); }
        GF.rr(ctx, px, py, pw, ph, ph / 2); ctx.fillStyle = grad; ctx.fill();
        if (!afford) { ctx.strokeStyle = 'rgba(160,180,210,0.4)'; ctx.lineWidth = 1; ctx.stroke(); }
        // coin + cost inside the pill
        var icr = ph * 0.26;
        ctx.font = 'bold ' + GF.clamp(13 * GF.S, 11, 18) + 'px sans-serif';
        var costTxt = String(car.cost);
        var cw = ctx.measureText(costTxt).width;
        var gx = px + pw / 2 - (icr * 2 + 4 * GF.S + cw) / 2;
        drawCoin(ctx, gx + icr, py + ph / 2, icr);
        ctx.fillStyle = afford ? '#06140d' : '#ffd24a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(costTxt, gx + icr * 2 + 4 * GF.S, py + ph / 2 + 1);
        if (afford) garageBtns.push({ x: px, y: py, w: pw, h: ph, fn: function(){ buyCar(car.id); } });
      }
    })(c, owned, active, pillX, pillY, pillW, pillH);
    y += rowH + rowGap;
  }

  // CLOSE button
  var closeW = GF.clamp(200 * GF.S, 150, 280);
  drawSecondaryBtn(ctx, GF.cx - closeW / 2, closeY, closeW, closeH, curStrings().close);
  garageBtns.push({ x: GF.cx - closeW / 2, y: closeY, w: closeW, h: closeH, fn: closeGarage });
}
function pillLabel(ctx, txt, col, px, py, pw, ph) {
  ctx.font = 'bold ' + GF.clamp(13 * GF.S, 11, 18) + 'px sans-serif';
  ctx.fillStyle = col; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(txt, px + pw / 2, py + ph / 2 + 1);
}

// ── M2: a vector MEDAL disc (ribbon + star) ─────────────────────────────────
function drawMedal(ctx, x, y, r, tier) {
  var col = medalColor(tier);
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r, 0, PI * 2);
  ctx.fillStyle = col; ctx.fill();
  ctx.lineWidth = Math.max(1, r * 0.14); ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.stroke();
  // inner star
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  drawStar(ctx, x, y, r * 0.55);
  ctx.restore();
}
// ── M2: a vector TROPHY cup ─────────────────────────────────────────────────
function drawTrophy(ctx, x, y, r, on) {
  ctx.save();
  ctx.fillStyle = on ? '#ffd24a' : 'rgba(120,140,170,0.35)';
  ctx.strokeStyle = on ? 'rgba(0,0,0,0.3)' : 'rgba(120,140,170,0.5)';
  ctx.lineWidth = Math.max(1, r * 0.12);
  // cup bowl
  ctx.beginPath();
  ctx.moveTo(x - r * 0.6, y - r * 0.7);
  ctx.lineTo(x + r * 0.6, y - r * 0.7);
  ctx.lineTo(x + r * 0.42, y + r * 0.15);
  ctx.lineTo(x - r * 0.42, y + r * 0.15);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // handles
  ctx.beginPath(); ctx.arc(x - r * 0.6, y - r * 0.4, r * 0.28, PI * 0.5, PI * 1.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(x + r * 0.6, y - r * 0.4, r * 0.28, -PI * 0.5, PI * 0.5); ctx.stroke();
  // stem + base
  ctx.fillRect(x - r * 0.1, y + r * 0.15, r * 0.2, r * 0.35);
  ctx.fillRect(x - r * 0.4, y + r * 0.5, r * 0.8, r * 0.2);
  ctx.restore();
}

// ── M2 GARAGE HEADER: the reason-to-return surfaces, in the owned garage ─────
// Returns the Y at which the car list should start. Draws (and registers hit-
// rects for): the DAILY SPOT card (play it / tries / today's medal), the VALET
// pile with COLLECT, and the SHELF (lifetime medals + streak trophies).
function drawGarageM2Header(ctx, listX, listW, topY, closeY) {
  var s = curStrings();
  var gap = 8 * GF.S;
  var cardH = GF.clamp(64 * GF.S, 50, 80);
  var leftW = listW * 0.56, rightW = listW - leftW - gap;
  var rx = listX, ry = topY;
  // ── DAILY SPOT card (left) ──────────────────────────────────────────────
  var fresh = (dailyKey !== daySeed()); // never engaged today
  var triesLeft = fresh ? DAILY_TRIES : dailyTriesLeft;
  var done = (!fresh && triesLeft <= 0) || dailyBestMedal > 0;
  GF.rr(ctx, rx, ry, leftW, cardH, 11 * GF.S);
  ctx.fillStyle = done ? 'rgba(28,34,46,0.92)' : 'rgba(46,40,18,0.92)'; ctx.fill();
  ctx.strokeStyle = done ? 'rgba(120,140,170,0.3)' : 'rgba(255,210,74,0.7)';
  ctx.lineWidth = done ? 1 : 1.6; ctx.stroke();
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
  ctx.fillStyle = done ? '#9fb0c4' : '#ffd24a';
  ctx.fillText(s.daily_spot, rx + 12 * GF.S, ry + 9 * GF.S);
  if (done) {
    // show today's result + come-back line
    ctx.textBaseline = 'middle';
    if (dailyBestMedal > 0) {
      drawMedal(ctx, rx + 22 * GF.S, ry + cardH * 0.66, 11 * GF.S, dailyBestMedal);
      ctx.font = 'bold ' + GF.clamp(13 * GF.S, 11, 18) + 'px sans-serif';
      ctx.fillStyle = medalColor(dailyBestMedal); ctx.textAlign = 'left';
      ctx.fillText(medalName(dailyBestMedal), rx + 38 * GF.S, ry + cardH * 0.66 + 1);
    } else {
      ctx.font = GF.clamp(11 * GF.S, 9, 15) + 'px sans-serif';
      ctx.fillStyle = '#8aa'; ctx.textAlign = 'left';
      ctx.fillText(s.no_tries, rx + 12 * GF.S, ry + cardH * 0.66 + 1);
    }
  } else {
    // PLAY button + tries dots
    var pbW = GF.clamp(76 * GF.S, 60, 100), pbH = GF.clamp(28 * GF.S, 24, 36);
    var pbX = rx + leftW - pbW - 10 * GF.S, pbY = ry + (cardH - pbH) / 2;
    var pg = ctx.createLinearGradient(pbX, pbY, pbX, pbY + pbH);
    pg.addColorStop(0, '#ffd24a'); pg.addColorStop(1, '#e0a83a');
    GF.rr(ctx, pbX, pbY, pbW, pbH, pbH / 2); ctx.fillStyle = pg; ctx.fill();
    ctx.font = 'bold ' + GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
    ctx.fillStyle = '#1a1406'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(s.play, pbX + pbW / 2, pbY + pbH / 2 + 1);
    garageBtns.push({ x: pbX, y: pbY, w: pbW, h: pbH, fn: function(){ startDailySpot(); } });
    // tries dots (bottom-left)
    var dr = 4 * GF.S, dy = ry + cardH - 13 * GF.S;
    for (var t = 0; t < DAILY_TRIES; t++) {
      ctx.beginPath(); ctx.arc(rx + 14 * GF.S + t * dr * 2.8, dy, dr, 0, PI * 2);
      ctx.fillStyle = t < triesLeft ? '#ffd24a' : 'rgba(160,180,210,0.28)'; ctx.fill();
    }
    ctx.font = GF.clamp(10 * GF.S, 9, 14) + 'px sans-serif';
    ctx.fillStyle = '#8aa'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(s.daily_try, rx + 14 * GF.S + DAILY_TRIES * dr * 2.8 + 4 * GF.S, dy);
  }
  // ── VALET pile card (right) ─────────────────────────────────────────────
  var vx = rx + leftW + gap, vy = ry;
  var hasPile = valetPending > 0;
  GF.rr(ctx, vx, vy, rightW, cardH, 11 * GF.S);
  ctx.fillStyle = hasPile ? 'rgba(40,56,40,0.92)' : 'rgba(28,34,46,0.92)'; ctx.fill();
  ctx.strokeStyle = hasPile ? 'rgba(57,217,138,0.7)' : 'rgba(120,140,170,0.3)';
  ctx.lineWidth = hasPile ? 1.6 : 1; ctx.stroke();
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + GF.clamp(11 * GF.S, 9, 15) + 'px sans-serif';
  ctx.fillStyle = hasPile ? '#9af0c4' : '#8aa';
  ctx.fillText(s.valet, vx + 11 * GF.S, vy + 9 * GF.S);
  if (hasPile) {
    // pile amount + COLLECT button
    var icr = 7 * GF.S;
    ctx.textBaseline = 'middle';
    drawCoin(ctx, vx + 11 * GF.S + icr, vy + cardH * 0.62, icr);
    ctx.font = 'bold ' + GF.clamp(15 * GF.S, 12, 21) + 'px sans-serif';
    ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'left';
    ctx.fillText('+' + valetPending, vx + 11 * GF.S + icr * 2 + 5 * GF.S, vy + cardH * 0.62 + 1);
    var cbW2 = GF.clamp(78 * GF.S, 60, 104), cbH2 = GF.clamp(26 * GF.S, 22, 34);
    var cbX2 = vx + rightW - cbW2 - 9 * GF.S, cbY2 = vy + (cardH - cbH2) / 2;
    var cg = ctx.createLinearGradient(cbX2, cbY2, cbX2, cbY2 + cbH2);
    cg.addColorStop(0, '#39d98a'); cg.addColorStop(1, '#23b06b');
    GF.rr(ctx, cbX2, cbY2, cbW2, cbH2, cbH2 / 2); ctx.fillStyle = cg; ctx.fill();
    ctx.font = 'bold ' + GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
    ctx.fillStyle = '#06140d'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(s.collect, cbX2 + cbW2 / 2, cbY2 + cbH2 / 2 + 1);
    garageBtns.push({ x: cbX2, y: cbY2, w: cbW2, h: cbH2, fn: function(){ collectValet(); } });
  } else {
    ctx.font = GF.clamp(10 * GF.S, 9, 13) + 'px sans-serif';
    ctx.fillStyle = '#667'; ctx.textBaseline = 'top';
    var vh = wrapLines(ctx, s.valet_hint, rightW - 22 * GF.S);
    for (var vl = 0; vl < Math.min(2, vh.length); vl++) {
      ctx.fillText(vh[vl], vx + 11 * GF.S, vy + cardH * 0.42 + vl * (11 * GF.S));
    }
  }
  // ── SHELF strip: lifetime medals + streak trophies (the owned record) ───
  var shY = ry + cardH + gap;
  var shH = GF.clamp(34 * GF.S, 28, 44);
  GF.rr(ctx, listX, shY, listW, shH, 9 * GF.S);
  ctx.fillStyle = 'rgba(24,28,38,0.9)'; ctx.fill();
  ctx.strokeStyle = 'rgba(120,140,170,0.22)'; ctx.lineWidth = 1; ctx.stroke();
  var sx = listX + 12 * GF.S, scy = shY + shH / 2;
  ctx.font = 'bold ' + GF.clamp(10 * GF.S, 9, 14) + 'px sans-serif';
  ctx.fillStyle = '#8aa'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(s.shelf, sx, scy); sx += ctx.measureText(s.shelf).width + 12 * GF.S;
  // medal counts (gold/silver/bronze) — only show tiers earned
  var mr = 8 * GF.S;
  var tiers = [ [3, medalShelf.gold], [2, medalShelf.silver], [1, medalShelf.bronze] ];
  for (var mi = 0; mi < tiers.length; mi++) {
    var tier = tiers[mi][0], cnt = tiers[mi][1];
    drawMedal(ctx, sx + mr, scy, mr, tier);
    ctx.font = 'bold ' + GF.clamp(12 * GF.S, 10, 17) + 'px sans-serif';
    ctx.fillStyle = cnt > 0 ? medalColor(tier) : 'rgba(120,140,170,0.4)';
    ctx.fillText(String(cnt), sx + mr * 2 + 3 * GF.S, scy + 1);
    sx += mr * 2 + 3 * GF.S + ctx.measureText(String(cnt)).width + 12 * GF.S;
  }
  // ── M3: CHROME count (cars fully tuned) — the collection-completion meta ──
  var chN = chromeCount();
  if (chN > 0) {
    // a small chrome diamond + "n" (only once at least one car is chromed)
    ctx.save();
    ctx.translate(sx + mr, scy); ctx.rotate(PI / 4);
    GF.rr(ctx, -mr * 0.72, -mr * 0.72, mr * 1.44, mr * 1.44, mr * 0.3);
    ctx.fillStyle = '#eef4ff'; ctx.fill();
    ctx.restore();
    ctx.font = 'bold ' + GF.clamp(12 * GF.S, 10, 17) + 'px sans-serif';
    ctx.fillStyle = '#eef4ff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(String(chN), sx + mr * 2 + 3 * GF.S, scy + 1);
  }
  // streak + trophies on the right end of the shelf
  var tx2 = listX + listW - 12 * GF.S;
  var tr = 9 * GF.S;
  drawTrophy(ctx, tx2 - tr, scy, tr, !!trophies[7]); tx2 -= tr * 2 + 6 * GF.S;
  drawTrophy(ctx, tx2 - tr, scy, tr, !!trophies[3]); tx2 -= tr * 2 + 10 * GF.S;
  if (streak > 0) {
    ctx.font = 'bold ' + GF.clamp(11 * GF.S, 9, 15) + 'px sans-serif';
    ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    var stTxt = s.day_streak.replace('%n', String(streak));
    ctx.fillText(stTxt, tx2, scy);
  }
  return shY + shH + GF.clamp(10 * GF.S, 7, 14);
}

function openGarage() { garageOpen = true; if (GF.sfx) GF.sfx('tap'); }
function closeGarage() { garageOpen = false; if (GF.sfx) GF.sfx('tap'); saveMeta(); }
function garageHit(px, py) {
  for (var i = 0; i < garageBtns.length; i++) {
    var b = garageBtns[i];
    if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) { b.fn(); return true; }
  }
  return false;
}

// ── NEW-CAR / AFFORD TOAST (felt outside the menu) ──────────────────────────
function drawCarToast(ctx) {
  // toast is the IN-PLAYING pull; overlay screens carry their own garage messaging

  if (!carToast || garageOpen || gs === 'LEVELCLEAR' || gs === 'WIN' || gs === 'MENU') return;

  GF.rr(ctx, x, y, w, h, 12 * GF.S);
  ctx.fillStyle = unlock ? 'rgba(34,176,107,0.96)' : 'rgba(34,42,58,0.96)';
  ctx.fill();
  ctx.strokeStyle = unlock ? '#9af0c4' : 'rgba(57,217,138,0.8)'; ctx.lineWidth = 2; ctx.stroke();
  drawCarGlyph(ctx, x + h * 0.55, y + h / 2, h * 0.6, c.body);
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(15 * GF.S, 12, 20) + 'px sans-serif';

  ctx.font = GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';

  ctx.restore();
}

// ── M1 session-end earnings strip (the "what you earned / come back" moment) ─
// Drawn centered at `cy`. Shows "+N earned" and the next-car progress bar +
// "M coins away" so leaving plants the reason to return. Returns nothing.
function drawEarningsStrip(ctx, cy) {
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // +N earned (coin + amount)
  var cr = GF.clamp(9 * GF.S, 7, 13);
  ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 26) + 'px sans-serif';
  var eTxt = '+' + lastEarned;
  var eW = ctx.measureText(eTxt).width;
  var grp = cr * 2 + 7 * GF.S + eW;
  drawCoin(ctx, GF.cx - grp / 2 + cr, cy, cr);
  ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'left';
  ctx.fillText(eTxt, GF.cx - grp / 2 + cr * 2 + 7 * GF.S, cy + 1);
  ctx.textAlign = 'center';
  // EARNED caption above
  ctx.font = GF.clamp(11 * GF.S, 9, 15) + 'px sans-serif';
  ctx.fillStyle = '#8aa';
  ctx.fillText(curStrings().earned, GF.cx, cy - cr - 12 * GF.S);

  // next-car progress (the come-back hook)
  var nl = nextLockedCar();
  if (nl) {
    var barW = Math.min(GF.W * 0.62, 300 * GF.S), barH = GF.clamp(8 * GF.S, 6, 12);
    var barX = GF.cx - barW / 2, barY = cy + cr + 20 * GF.S;
    var frac = GF.clamp(Math.round(coins) / nl.cost, 0, 1);
    GF.rr(ctx, barX, barY, barW, barH, barH / 2); ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fill();
    if (frac > 0) { GF.rr(ctx, barX, barY, Math.max(barH, barW * frac), barH, barH / 2); ctx.fillStyle = '#39d98a'; ctx.fill(); }
    var need = Math.max(0, nl.cost - Math.round(coins));
    ctx.font = GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
    ctx.fillStyle = need === 0 ? '#39d98a' : '#9fb0c4';
    var label = need === 0
      ? (curStrings().garage + ': ' + carName(nl) + ' ' + curStrings().unlock + '!')
      : (curStrings().next_car + ': ' + carName(nl) + ' — ' + need + curStrings().coins_short + ' ' + curStrings().away);
    ctx.fillText(label, GF.cx, barY + barH + 14 * GF.S);
  }
  ctx.restore();
}
