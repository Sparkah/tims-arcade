// ── MAZE GENERATION ──────────────────────────────────────────────────────
function genMaze() {
  var cells = MAZE_CELLS_BASE + Math.floor((floorN - 1) * 0.7); cells = Math.min(cells, 13);
  MW = cells * 2 + 1; MH = cells * 2 + 1;
  MAP = [];
  for (var y = 0; y < MH; y++) { MAP[y] = []; for (var x = 0; x < MW; x++) MAP[y][x] = 1; }
  var stack = [[1, 1]]; MAP[1][1] = 0;
  var dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]];
  while (stack.length) {
    var cur = stack[stack.length - 1], cxc = cur[0], cyc = cur[1], opts = [];
    for (var d = 0; d < 4; d++) {
      var nx = cxc + dirs[d][0], ny = cyc + dirs[d][1];
      if (nx > 0 && nx < MW - 1 && ny > 0 && ny < MH - 1 && MAP[ny][nx] === 1) opts.push(d);
    }
    if (!opts.length) { stack.pop(); continue; }
    var dd = dirs[opts[(Math.random() * opts.length) | 0]];
    MAP[cyc + dd[1] / 2][cxc + dd[0] / 2] = 0; MAP[cyc + dd[1]][cxc + dd[0]] = 0;
    stack.push([cxc + dd[0], cyc + dd[1]]);

// ── M3: RELIC effects (read by startRun / per-floor / economy) ────────────
// Relic tiers tune the run; all additive buffs, never gates.
function applyRelics() {

  battery = batteryCap();
  // Iron Will: start with the full (raised) sanity ceiling.
  sanity = sanityCap();
  t = 0;
  // Survivor Kit: roll bonus starting items (1 per tier).
  t = relicTier('survivor'); for (var i = 0; i < t; i++) grantRandomItem();
  if (t > 0) { lastDropId = null; dropFlash = 0; }   // silent grant (no toast spam at boot)
  // Cartographer: floor-start compass ping.
  if (relicTier('cartog') > 0) compassT = 4 + relicTier('cartog') * 2;
  // M3 milestone#3 - Lantern tier4 (Arc): begin every run with a free revive in the stash.
  if (lanternStartRevives() > 0 && (inv['revive'] | 0) < 1) { inv['revive'] = (inv['revive'] | 0) + lanternStartRevives(); }
}
function relBattMul() { return 1 - relicTier('battery') * 0.12; }            // slower light drain
function relSanityDarkMul() { return 1 - relicTier('mind') * 0.16; }         // slower dark drain
function sanityCap() { return SANITY_MAX + Math.min(relicTier('will') * 12, 40); }   // Iron Will raises the ceiling

  var diver = 1 + relicTier('diver') * 0.18 * Math.max(0, floorN - 1) / 4;
  return diver * ritualToday().mult;
}

  var fragScore = Math.max(0, score - sanctBonusScore - sigilBonusScore);   // exclude in-run sanctuary + sigil bonuses (keeps them run-scoped)
  var base = floorN * 5 + Math.floor(fragScore / 20);
  var got = Math.max(1, Math.round(base * fragMult()));
  meta.frags += got; lastFragGain = got; saveMeta(); return got;
}

  var cost = relicNextCost(id); if (cost == null || meta.frags < cost) { sfx('click'); return false; }
  meta.frags -= cost; meta.relics[id] = relicTier(id) + 1; saveMeta(); sfx('pickup');
  var d = relicDef(id); floatTxt(L(d.en, d.ru) + ' ' + (GF.lang === 'ru' ? 'ур.' : 'Lv') + relicTier(id), d.col); GF.happytime && (relicTier(id) >= 3) && GF.happytime();
  return true;
}

// ── M3 MILESTONE#3: REWARDED-ONLY MONETIZATION (player-initiated, 1.15-safe) ─

  }, function () { adBusy = false; floatTxt(GF.t('no_ad'), '#a89a68'); });
}

  GF.rewardedAd(function () {

}

// ════════════════════════════════════════════════════════════════════════
//  REACHABILITY GATE (window.__gfReach / __gfTour) - every screen's hit-rects
// ════════════════════════════════════════════════════════════════════════
// Proves every interactive item on every screen can be brought fully on-screen.
// ui.* rects are populated by draw() each frame, so __gfReach is read AFTER a
// frame. The relics list reports cards in the scroll region's CONTENT space
// (scrollId='relics' so the gate reads scrollMaxY); BACK is pinned.

  // an in-run overlay (panel). Resolve the effective screen.
  var view = (panel ? panel : (gs === 'MENU' ? menuView : null));
  if (view === 'relics') {
    res.screen = 'relics'; res.scrollId = 'relics';
    res.viewportH = relicScroll ? relicScroll.vp.h : H;
    for (var i = 0; i < _relicRects.length; i++) push(_rr2('relic_' + _relicRects[i].id, _relicRects[i].card));   // CONTENT space
    push(_rr2('fragad', ui.fragad, true)); push(_rr2('back', ui.back, true));   // pinned
    return res;
  }
  if (view === 'lantern') {
    res.screen = 'lantern';
    push(_rr2('kindle', ui.kindle)); push(_rr2('kindlead', ui.kindlead)); push(_rr2('back', ui.back));
    return res;
  }
  if (view === 'daily') { res.screen = 'daily'; push(_rr2('claim', ui.claim)); push(_rr2('back', ui.back)); return res; }
  if (view === 'ranks') { res.screen = 'ranks'; push(_rr2('back', ui.back)); return res; }
  if (gs === 'MENU') {
    res.screen = 'menu';
    push(_rr2('daily', ui.daily)); push(_rr2('relics', ui.relics)); push(_rr2('lantern', ui.lantern)); push(_rr2('ranks', ui.ranks)); push(_rr2('play', ui.play));
    return res;
  }
  if (gs === 'GAMEOVER') {
    res.screen = 'gameover'; push(_rr2('revive', ui.revive)); push(_rr2('retry', ui.retry)); push(_rr2('adx2', ui.adx2)); return res;
  }
  // PLAYING (+ pause/help overlays)
  if (pauseMode === 'pause') {
    res.screen = 'pause';
    push(_rr2('resume', ui.resume)); push(_rr2('pthresh', ui.pthresh)); push(_rr2('plant', ui.plant)); push(_rr2('pdaily', ui.pdaily)); push(_rr2('pranks', ui.pranks)); push(_rr2('restart', ui.restart));
    return res;
  }
  if (pauseMode === 'help' || pauseMode === 'intro') { res.screen = 'help'; push(_rr2('resume', ui.resume)); return res; }
  res.screen = 'playing';
  push(_rr2('pause', ui.pause)); push(_rr2('torch', ui.torch)); push(_rr2('help', ui.help));
  var owned = ownedIds();
  for (var k = 0; k < owned.length; k++) push(_rr2('item_' + owned[k], ui['item_' + owned[k]]));
  return res;
}
// Tour: each step puts the game in a screen so the gate can read its rects.
var REACH_TOUR = [
  { name: 'menu',     go: function () { panel = null; pauseMode = null; if (gs !== 'MENU') { gs = 'MENU'; } menuView = 'main'; } },
  { name: 'relics',   go: function () { gs = 'MENU'; pauseMode = null; panel = null; menuView = 'relics'; if (relicScroll) relicScroll.scrollTo(0); } },
  { name: 'lantern',  go: function () { gs = 'MENU'; pauseMode = null; panel = null; menuView = 'lantern'; } },
  { name: 'daily',    go: function () { gs = 'MENU'; pauseMode = null; panel = null; menuView = 'daily'; } },
  { name: 'ranks',    go: function () { gs = 'MENU'; pauseMode = null; panel = null; menuView = 'ranks'; } },
  { name: 'playing',  go: function () { menuView = 'main'; panel = null; window._silent = true; if (gs !== 'PLAYING') startRun(1); pauseMode = null; coachActive = false; window._silent = false; } },
  { name: 'pause',    go: function () { if (gs !== 'PLAYING') { window._silent = true; startRun(1); window._silent = false; } panel = null; pauseMode = 'pause'; } },
  { name: 'gameover', go: function () { if (gs !== 'PLAYING') { window._silent = true; startRun(1); window._silent = false; } pauseMode = null; panel = null; lastReason = 'caught'; gs = 'GAMEOVER'; } },
];

// ════════════════════════════════════════════════════════════════════════
//  PERSIST + BOOT
// ════════════════════════════════════════════════════════════════════════
function persistSave() { try { GF.saveRun(); } catch (e) {} }

GF.init({
  designW: 420, designH: 760,
  strings: STRINGS, sprites: SPRITE_NAMES, saveKey: 'backrooms',
  onReady: function () {
    try { best = parseInt(localStorage.getItem('backrooms_best') || '1') || 1; if (best < 1) best = 1; } catch (e) {}
    try { bestScore = parseInt(localStorage.getItem('backrooms_bestscore') || '0') || 0; } catch (e) {}
    buildTextures(); attachInput(); loadMeta();
    // Yandex 1.9  -  persist run across refresh; resume keeps depth, bounces to MENU.
    GF.persist('backrooms_run_v1',
      function () { return { floorN: floorN, score: score, best: best, sanct: sanctReached, sanctBonus: sanctBonusScore, sigils: sigilsTraced, sigilBonus: sigilBonusScore, attune: attuneTier, gs: (gs === 'PLAYING' ? 'PLAYING' : gs) }; },
      function (s) { if (!s) return; best = Math.max(best, s.best || 1); if (s.gs === 'PLAYING' && s.floorN) _resume = s; }
    );
    GF.exposeState(function () { return { gs: gs, floor: floorN, score: score, best: best, sanity: Math.round(sanity), battery: Math.round(battery), hunters: hunters.length, paused: !!pauseMode, items: invTotal(), streak: meta.streak, playMin: Math.floor(meta.playMs / 60000), frags: meta.frags, sanct: sanctReached, nextSanct: nextSanctIn(), sigils: sigilsTraced, attune: attuneTier, sigilHere: !!(sigil && !sigil.got), relicTiers: (function () { var n = 0; for (var k in meta.relics) n += meta.relics[k] | 0; return n; })(), lantern: lanternKindled(), lanternEarned: lanternEarned(), deepest: (meta.deepest | 0) }; });
    // Reachability gate: prove all UI on all screens is reachable (no clipped buttons).
    GF.exposeReach(reachState); GF.exposeTour(REACH_TOUR);
    // Platform builds (build_platforms.sh injects window.__GF_AUTOSTART=1) drop
    // STRAIGHT into gameplay - Yandex/CrazyGames reject a title-screen-on-load
    // (CLAUDE.md #9). A resume (refresh mid-run) also re-enters the live run. The
    // GALLERY (no flag, no resume) is the ONE place this opens on its MENU - and the
    // menu renders over a live maze backdrop, not a black screen.
    var autostart = !!window.__GF_AUTOSTART, resuming = !!(_resume && _resume.floorN);
    startRun(resuming ? _resume.floorN : 1);   // build the world (also the menu backdrop)
    if (_resume && _resume.score) { score = _resume.score; persistSave(); }   // re-save so resumed score survives a 2nd reload
    if (_resume) { sanctReached = _resume.sanct | 0; sanctBonusScore = _resume.sanctBonus | 0; }   // keep the in-run sanctuary count across a refresh
    if (_resume) { sigilsTraced = _resume.sigils | 0; sigilBonusScore = _resume.sigilBonus | 0; attuneTier = _resume.attune | 0; }   // keep the in-run sigil/attunement progress across a refresh
    if (!autostart && !resuming) { gs = 'MENU'; pauseMode = null; menuView = 'main'; }   // gallery: rest on the menu (over the live world)
    else {
      var seenIntro = false; try { seenIntro = !!localStorage.getItem('backrooms_seen_v1'); } catch (e) {}
      if (!seenIntro) { coachActive = true; coachStep = 0; coachT = 0; didMove = false; didLook = false; }   // first-run INTERACTIVE in-game coach (no menu / no text card)
    }
  },
  onUpdate: update, onDraw: draw,
});

// ── SCREENSHOT + LOCALE HOOKS (external tooling) ─────────────────────────
window._jumpLevel = function (n) { setupPhotogenic(n || 3); };
window._setupForScreenshot = function (n) { setupPhotogenic(n || 3); };
window._setState = function (s) {
  if (s === 'PLAYING') { if (gs !== 'PLAYING') startRun(); pauseMode = null; }
  else if (s === 'GAMEOVER') { if (gs !== 'PLAYING') startRun(); lastReason = 'caught'; gs = 'GAMEOVER'; }
  else { gs = 'MENU'; pauseMode = null; }
};
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return FONT_UI; };
// test seam: run the real descend() once (used by the headless sanctuary check).
window._descend = function () { if (gs === 'PLAYING') descend(); };
// test seam: trace the current floor's sigil once (used by the headless sigil-hunt
// check). Returns the run-scoped trace state so the test can assert it.
window._traceSigil = function () { if (gs === 'PLAYING' && sigil && !sigil.got) traceSigil(); return { sigilsTraced: sigilsTraced, attuneTier: attuneTier, score: score, sigilBonus: sigilBonusScore }; };
window._sigilInfo = function () { return { present: !!(sigil && !sigil.got), sigilsTraced: sigilsTraced, attuneTier: attuneTier, sigilBonus: sigilBonusScore, from: SIGIL_FROM, x: sigil ? sigil.x : null, y: sigil ? sigil.y : null }; };
// test/visual seam: stand the player ~2 tiles from the sigil, facing it (for the
// headless billboard capture). Snaps to the nearest standable cell short of it.
window._faceSigil = function () {
  if (gs !== 'PLAYING' || !sigil) return false;
  var ang = Math.atan2(sigil.y - py, sigil.x - px);
  for (var back = 2.4; back >= 0.8; back -= 0.2) {
    var tx = sigil.x - Math.cos(ang) * back, ty = sigil.y - Math.sin(ang) * back;
    if (canStand(tx, ty)) { px = tx; py = ty; pa = Math.atan2(sigil.y - py, sigil.x - px); return true; }
  }
  pa = ang; return true;
};
// test seam: preview the run-end fragment bank (proves the sanctuary + sigil bonuses
// are excluded from the fragment economy — fragScore = score - sanctBonus - sigilBonus).
window._fragPreview = function () { var ex = sanctBonusScore + sigilBonusScore; return { score: score, sanctBonus: sanctBonusScore, sigilBonus: sigilBonusScore, fragScore: Math.max(0, score - ex), banked: (function () { var fs = Math.max(0, score - ex); return Math.max(1, Math.round((floorN * 5 + Math.floor(fs / 20)) * fragMult())); })() }; };
// M3 milestone#3 test seams: drive the Lantern tier system + read its state.
window._lanternInfo = function () { return { kindled: lanternKindled(), earned: lanternEarned(), deepest: (meta.deepest | 0), canKindle: lanternCanKindle(), next: lanternNext() ? lanternNext().tier : null, warm: lanternWarm(), wide: lanternBeamWide(), startRevives: lanternStartRevives(), sanctGrace: lanternSanctGrace(), pingsSigils: lanternPingsSigils() }; };
window._setDeepest = function (d) { meta.deepest = Math.max(meta.deepest | 0, d | 0); saveMeta(); return meta.deepest; };   // simulate having reached floor d (unlock gate)
window._kindle = function () { var ok = lanternCanKindle() && kindleLantern(); return { ok: ok, kindled: lanternKindled() }; };   // claim the next earned tier
window._lanternReset = function () { meta.lantern = 0; meta.deepest = 1; saveMeta(); return _lanternInfo(); };
// test seam: trigger the REAL gameOver() path (banks fragments) so the headless
// GAMEOVER visual check can exercise the rewarded "×2 fragments" offer, which only
// renders when lastFragGain > 0. (_setState('GAMEOVER') deliberately bypasses banking.)
window._forceGameOver = function () { if (gs === 'PLAYING') gameOver('caught'); return { gs: gs, lastFragGain: lastFragGain }; };
// _setLang provided by gf-lib.

// ── YANDEX MUST-HAVES (load-bearing) ─────────────────────────────────────
// 1. All UI text via GF.t()/STRINGS (en+ru).  2. GF.persist() save above.
// 3. Fullscreen-exit resize handled by gf-lib.  4. Ads: v0.1 ships no
//    auto-fired ads; any future interstitial must fire only inside a button
//    handler (RETRY)  -  never inside gameOver()/descend().

})();
</script>
