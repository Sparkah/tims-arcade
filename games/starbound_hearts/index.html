// ════════════════════════════════════════════════════════════════════════
//  PERSISTENT META (collection / bond / currency / daily)
// ════════════════════════════════════════════════════════════════════════
var META_KEY = 'stellar_hearts_meta_v1';
var meta = null;
function defaultMeta() {
  return {
    v: 1,
    stardust: 40,        // earned currency for summons
    tickets: 1,          // free-call tickets (daily + ad)
    owned: { coffee: 1, music: 1, starmap: 1 },  // starter hand (3 commons), value = level
    bond: { orion: 0, kai: 0, soren: 0 },        // bond LEVEL per suitor (0..maxBondLv)
    dateIdx: { orion: 0, kai: 0, soren: 0 },     // next date index to play per suitor
    memories: {},        // suitorId+dateIdx -> 1 (unlocked vignette for gallery)
    lastDaily: 0,        // day-number of last daily claim
    seenTut: 0,
  };
}
function loadMeta() {
  var m;
  try {
    var raw = localStorage.getItem(META_KEY);
    m = raw ? JSON.parse(raw) : null;
  } catch (e) { m = null; }
  if (!m || typeof m !== 'object') m = defaultMeta();
  var d = defaultMeta();
  // coerce defensively (corrupt/old save must not black-screen)
  m.v = 1;
  m.stardust = Math.max(0, m.stardust | 0);
  m.tickets = Math.max(0, m.tickets | 0);
  m.owned = (m.owned && typeof m.owned === 'object') ? m.owned : d.owned;
  // sanitise owned: only real card ids, levels clamped to 1..8 (reject tamper/corrupt)
  var clean = {};
  for (var oid in m.owned) {
    if (!m.owned.hasOwnProperty(oid)) continue;
    if (!cardById(oid)) continue;
    var lv = m.owned[oid] | 0;
    if (lv >= 1) clean[oid] = GF.clamp(lv, 1, 8);
  }
  m.owned = clean;
  // re-seed the starter hand if a corrupt save left NO playable cards (else
  // an autostart date would deal an empty hand = unwinnable).
  var any = false; for (var kk in m.owned) { if (m.owned[kk] > 0) { any = true; break; } }
  if (!any) m.owned = { coffee: 1, music: 1, starmap: 1 };
  m.bond = (m.bond && typeof m.bond === 'object') ? m.bond : d.bond;
  m.dateIdx = (m.dateIdx && typeof m.dateIdx === 'object') ? m.dateIdx : d.dateIdx;
  m.memories = (m.memories && typeof m.memories === 'object') ? m.memories : {};
  for (var i = 0; i < SUITORS.length; i++) {
    var sid = SUITORS[i].id;
    if (typeof m.bond[sid] !== 'number') m.bond[sid] = 0;
    if (typeof m.dateIdx[sid] !== 'number') m.dateIdx[sid] = 0;
    m.bond[sid] = GF.clamp(m.bond[sid] | 0, 0, SUITORS[i].dates.length);
    m.dateIdx[sid] = GF.clamp(m.dateIdx[sid] | 0, 0, SUITORS[i].dates.length);
  }
  m.lastDaily = m.lastDaily | 0;
  m.seenTut = m.seenTut | 0;
  return m;
}
function saveMeta() {
  try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch (e) {}
}
function totalBond() {
  var t = 0;
  for (var i = 0; i < SUITORS.length; i++) t += meta.bond[SUITORS[i].id] | 0;
  return t;
}
function dayNumber() { return Math.floor(Date.now() / 86400000); }
function suitorUnlocked(s) { return totalBond() >= s.unlockBond; }

// ── DECK BUILD (from owned cards; each owned card = one deck entry, leveled) ─
// The HAND for a date is drawn from this deck. More/upgraded cards = stronger.
function buildDeck() {
  var deck = [];
  for (var id in meta.owned) {
    if (!meta.owned.hasOwnProperty(id)) continue;
    var c = cardById(id);
    if (!c) continue;
    var lvl = meta.owned[id] | 0;
    if (lvl < 1) continue;
    deck.push({ id: id, lvl: lvl });
  }
  return deck;
}
function cardChem(id, lvl) {
  var c = cardById(id); if (!c) return 0;
  // each level above 1 adds +25% of base
  return Math.round(c.chem * (1 + 0.25 * (lvl - 1)));
}

// ════════════════════════════════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════════════════════════════════
var gs = 'DATE';   // DATE | RESULT | SUITORS | COLLECTION | SUMMON
var prevScreen = 'DATE';
var sx = { hand: [], drawPile: [], moment: 0, moodNow: 'playful', bond: 0, combo: 0,
           best: 0, suitor: null, dateRef: null, lineSeed: 0, lastJudge: '', lastJudgeT: 0,
           playing: false, momentScored: false, anim: 0 };

// summon / reveal animation state
var reveal = { active: false, t: 0, card: null, dupe: false, lvl: 1 };
// bond-up celebration
var celebrate = { active: false, t: 0, line: '', suitor: null };
// daily banner
var banner = { t: 0, text: '' };

// ── START A DATE for a given suitor ───────────────────────────────────────
function startDate(suitor) {
  sx.suitor = suitor;
  var di = GF.clamp(meta.dateIdx[suitor.id] | 0, 0, suitor.dates.length - 1);
  // if all dates done, replay the last for grinding bond/stardust
  if ((meta.dateIdx[suitor.id] | 0) >= suitor.dates.length) di = suitor.dates.length - 1;
  sx.dateRef = suitor.dates[di];
  sx.curDateIdx = di;
  sx.moment = 0;
  sx.moodNow = sx.dateRef.script[0];
  sx.bond = 0;
  sx.combo = 0;
  sx.lineSeed = (Date.now() / 7 | 0);
  sx.lastJudge = '';
  sx.momentScored = false;
  sx.playing = true;
  sx.anim = 0;
  // build + shuffle draw pile from deck, deal a hand of up to 4
  var deck = buildDeck();
  shuffle(deck);
  sx.drawPile = deck.slice();
  sx.hand = [];
  for (var i = 0; i < 4 && sx.drawPile.length; i++) sx.hand.push(sx.drawPile.shift());
  gs = 'DATE';
  GF.gameStarted();
}
function shuffle(a) { for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } }

function drawOne() {
  if (!sx.drawPile.length) {
    // reshuffle the deck back in if exhausted (so hand never starves)
    var deck = buildDeck(); shuffle(deck); sx.drawPile = deck;
  }
  if (sx.drawPile.length) return sx.drawPile.shift();
  return null;
}

// ── PLAY A CARD at the current moment ─────────────────────────────────────
function playCard(handIdx) {
  if (gs !== 'DATE' || !sx.playing || sx.momentScored) return;
  if (handIdx < 0 || handIdx >= sx.hand.length) return;
  var entry = sx.hand[handIdx];
  var c = cardById(entry.id);
  if (!c) return;
  var mood = sx.moodNow;
  var base = cardChem(entry.id, entry.lvl);
  var judge, gained, col;
  if (c.p === mood) { judge = 'perfect'; gained = base * 2; col = '#ff5fa2'; }
  else if (c.s === mood) { judge = 'good'; gained = Math.round(base * 1.1); col = '#ffb3d1'; }
  else { judge = 'weak'; gained = Math.round(base * 0.25); col = '#8aa0c0'; }

  // combo: perfect/good extend it, weak resets
  if (judge === 'weak') { sx.combo = 0; }
  else { sx.combo++; }
  var mult = comboMult(sx.combo);
  gained = Math.round(gained * mult);
  sx.bond += gained;
  sx.lastJudge = judge;
  sx.lastJudgeT = 0.0;
  sx.momentScored = true;

  // juice
  if (judge === 'perfect') { GF.sfx('reward'); GF.setShake(0.6); sparkBurst(col, 26); blush(); }
  else if (judge === 'good') { GF.sfx('coin'); sparkBurst(col, 14); }
  else { GF.sfx('error'); }
  GF.spawnFloat(GF.cx, GF.H * 0.46, '+' + gained, col);
  if (sx.combo >= 2 && judge !== 'weak') GF.spawnFloat(GF.cx, GF.H * 0.40, 'x' + mult.toFixed(1) + ' ' + GF.t('combo'), '#ffd76b');

  // remove the played card, draw a replacement
  sx.hand.splice(handIdx, 1);
  var nc = drawOne(); if (nc) sx.hand.push(nc);

  // advance after a short beat
  sx.advanceT = 0.0;
}
function comboMult(combo) {
  if (combo <= 1) return 1;
  return 1 + (combo - 1) * 0.5;  // x1, x1.5, x2, x2.5 ...
}

function advanceMoment() {
  sx.moment++;
  sx.momentScored = false;
  sx.lineSeed = (sx.lineSeed + 17) % 9973;
  if (sx.moment >= sx.dateRef.script.length) {
    endDate();
    return;
  }
  sx.moodNow = sx.dateRef.script[sx.moment];
  sx.anim = 0;
}

function endDate() {
  sx.playing = false;
  var won = sx.bond >= sx.dateRef.need;
  sx.dateWon = won;
  gs = 'RESULT';
  GF.gameEnded();
  if (won) {
    GF.sfx('win');
    // bond level up + unlock vignette + advance to next date if this was the current
    var s = sx.suitor;
    var wasIdx = meta.dateIdx[s.id] | 0;
    if (sx.curDateIdx === wasIdx && wasIdx < s.dates.length) {
      meta.bond[s.id] = Math.min(s.dates.length, (meta.bond[s.id] | 0) + 1);
      meta.dateIdx[s.id] = Math.min(s.dates.length, wasIdx + 1);
      meta.memories[s.id + ':' + sx.curDateIdx] = 1;
    }
    // reward: stardust + chance of a ticket
    var reward = 14 + sx.curDateIdx * 4;
    meta.stardust += reward;
    sx.rewardDust = reward;
    sx.rewardTicket = 0;
    if (Math.random() < 0.5) { meta.tickets += 1; sx.rewardTicket = 1; }
    if (sx.bond > sx.best) sx.best = sx.bond;
    saveMeta();
    // celebration
    celebrate.active = true; celebrate.t = 0; celebrate.suitor = s;
    celebrate.line = (GF.lang === 'ru' ? sx.dateRef.ru : sx.dateRef.en);
  } else {
    GF.sfx('lose');
    sx.rewardDust = 6; sx.rewardTicket = 0;
    meta.stardust += 6;  // small consolation so a loss isn't a dead end
    saveMeta();
  }
}

// ── SUMMON (gacha) — adds a card to the collection AND the deck ────────────
var PULL_COST = 30;
function rollRarity() {
  var r = Math.random();
  if (r < 0.08) return 3;      // epic 8%
  if (r < 0.35) return 2;      // rare 27%
  return 1;                    // common 65%
}
function pickCardOfRarity(rar) {
  var pool = CARDS.filter(function (c) { return c.rar === rar; });
  if (!pool.length) pool = CARDS;
  return pool[Math.floor(Math.random() * pool.length)];
}
function doSummon(payWith) {
  if (payWith === 'dust') {
    if (meta.stardust < PULL_COST) return false;
    meta.stardust -= PULL_COST;
  } else if (payWith === 'ticket') {
    if (meta.tickets < 1) return false;
    meta.tickets -= 1;
  }
  // payWith === 'free' debits nothing (daily bonus pull)
  var rar = rollRarity();
  var c = pickCardOfRarity(rar);
  var dupe = !!meta.owned[c.id];
  if (dupe) meta.owned[c.id] = Math.min(8, (meta.owned[c.id] | 0) + 1);
  else meta.owned[c.id] = 1;
  saveMeta();
  reveal.active = true; reveal.t = 0; reveal.card = c; reveal.dupe = dupe; reveal.lvl = meta.owned[c.id];
  GF.sfx(rar >= 3 ? 'evolve' : (rar >= 2 ? 'unlock' : 'levelup'));
  sparkBurst(RAR_COL[rar], rar >= 3 ? 40 : 22);
  return true;
}

// ── DAILY CALL ────────────────────────────────────────────────────────────
function dailyReady() { return meta.lastDaily !== dayNumber(); }
function claimDaily() {
  if (!dailyReady()) return false;
  meta.lastDaily = dayNumber();
  meta.tickets += 1;       // net +1 Call (the bonus summon below does NOT debit it)
  meta.stardust += 20;
  saveMeta();
  banner.t = 4.0; banner.text = GF.t('dailyGot');
  GF.sfx('reward');
  // free bonus summon (debits nothing — the +1 Call ticket is kept)
  doSummon('free');
  return true;
}

// ── rewarded-ad -> +1 Call (free bonus currency, never gates progression) ──
var _adBusy = false;
function watchAdForTicket() {
  if (_adBusy) return;
  _adBusy = true;
  GF.showAd('rewarded').then(function (res) {
    _adBusy = false;
    // grant on any shown ad: this is a free bonus, and Yandex fullscreen ads
    // report rewarded:false even when watched, so we credit on `shown`.
    if (res && (res.rewarded || res.shown)) {
      meta.tickets += 1; saveMeta();
      banner.t = 3.5; GF.sfx('reward');
    }
  }).catch(function () { _adBusy = false; });
}

// ════════════════════════════════════════════════════════════════════════
//  JUICE helpers
// ════════════════════════════════════════════════════════════════════════
var hearts = [];   // floating hearts on bond-up
function blush() {
  for (var i = 0; i < 8; i++) hearts.push({ x: GF.cx + (Math.random() - 0.5) * GF.W * 0.5,
    y: GF.H * 0.55 + Math.random() * 40, vy: -(0.6 + Math.random() * 1.4) * GF.S,
    s: (8 + Math.random() * 10) * GF.S, life: 1, rot: Math.random() * 6 });
}
function updateHearts(dt) {
  for (var i = hearts.length - 1; i >= 0; i--) { var h = hearts[i]; h.y += h.vy; h.life -= dt * 0.7; if (h.life <= 0) hearts.splice(i, 1); }
}
function drawHeart(c, x, y, s, col, a) {
  c.save(); c.globalAlpha = a; c.fillStyle = col; c.translate(x, y); c.scale(s / 16, s / 16);
  c.beginPath();
  c.moveTo(0, 5);
  c.bezierCurveTo(-9, -6, -16, 4, 0, 14);

}
function sparkBurst(col, n) {
  for (var i = 0; i < n; i++) GF.spawnParticles(GF.cx + (Math.random() - 0.5) * GF.W * 0.4, GF.H * 0.42 + (Math.random() - 0.5) * 60, col, 1);
}

// ════════════════════════════════════════════════════════════════════════
//  ASSETS (runtime-loaded WebP from ./assets; graceful canvas fallback)
// ════════════════════════════════════════════════════════════════════════
var IMG = {};
var IMG_KEYS = ['suitor_orion', 'suitor_kai', 'suitor_soren', 'bg_deck', 'bg_promenade', 'bg_garden', 'bg_cockpit',
  'card_coffee', 'card_music', 'card_starmap', 'card_plush', 'card_telescope', 'card_flowers', 'card_gift', 'card_rose'];
function loadAssets(done) {
  var n = IMG_KEYS.length, loaded = 0;
  if (!n) { done(); return; }
  IMG_KEYS.forEach(function (k) {
    var im = new Image();
    im.onload = function () { IMG[k] = im; if (++loaded >= n) done(); };
    im.onerror = function () { IMG[k] = null; if (++loaded >= n) done(); };
    im.src = './assets/' + k + '.webp';
  });
}
function hasImg(k) { var i = IMG[k]; return i && i.complete && i.naturalWidth > 0; }

// draw an image cover-fit into a rect (crop to fill)
function drawCover(c, k, x, y, w, h, fallback) {
  var im = IMG[k];
  if (im && im.complete && im.naturalWidth > 0) {
    var ir = im.naturalWidth / im.naturalHeight, rr2 = w / h, sw, sh, sxx, syy;
    if (ir > rr2) { sh = im.naturalHeight; sw = sh * rr2; sxx = (im.naturalWidth - sw) / 2; syy = 0; }
    else { sw = im.naturalWidth; sh = sw / rr2; sxx = 0; syy = (im.naturalHeight - sh) / 2; }
    c.drawImage(im, sxx, syy, sw, sh, x, y, w, h);
    return true;
  }
  if (fallback) fallback(c, x, y, w, h);
  return false;
}
var missingArt = [];   // flagged at boot

// ════════════════════════════════════════════════════════════════════════
//  RENDER — main draw dispatch
// ════════════════════════════════════════════════════════════════════════
var clickRects = [];   // {x,y,w,h,fn} rebuilt each frame for hit-testing
var T = 0;             // global time

function draw(c, dt) {
  T += dt;
  var W = GF.W, H = GF.H;
  clickRects = [];
  // base space gradient
  var g = c.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#140a26'); g.addColorStop(0.5, '#0d0a1e'); g.addColorStop(1, '#0a0716');
  c.fillStyle = g; c.fillRect(0, 0, W, H);
  drawStars(c, W, H);

  if (gs === 'DATE') drawDateScreen(c, dt);
  else if (gs === 'RESULT') drawResult(c, dt);
  else if (gs === 'SUITORS') drawSuitors(c, dt);
  else if (gs === 'COLLECTION') drawCollection(c, dt);
  else if (gs === 'SUMMON') drawSummon(c, dt);

  // floating hearts above everything except overlays
  updateHearts(dt);
  for (var i = 0; i < hearts.length; i++) drawHeart(c, hearts[i].x, hearts[i].y, hearts[i].s, '#ff7aa8', Math.max(0, hearts[i].life));

  // summon reveal overlay (on top of any screen)
  if (reveal.active) drawReveal(c, dt);
  // bond celebration overlay
  if (celebrate.active) drawCelebrate(c, dt);

  // daily banner
  if (banner.t > 0) { banner.t -= dt; drawBanner(c); }

  // mute button (top-right) on every screen
  drawMute(c);

  // tutorial overlay LAST
  GF.tutorial.update(dt);
  GF.tutorial.draw(c);
}

// starfield
var STARS = null;
function drawStars(c, W, H) {
  if (!STARS) { STARS = []; for (var i = 0; i < 70; i++) STARS.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.6 + 0.3, p: Math.random() * 6 }); }
  for (var j = 0; j < STARS.length; j++) {
    var s = STARS[j], a = 0.3 + 0.5 * (0.5 + 0.5 * Math.sin(T * 1.5 + s.p));
    c.globalAlpha = a; c.fillStyle = '#cdd6ff';
    c.beginPath(); c.arc(s.x * W, s.y * H, s.r * GF.S, 0, Math.PI * 2); c.fill();
  }
  c.globalAlpha = 1;
}

function pushRect(x, y, w, h, fn) { clickRects.push({ x: x, y: y, w: w, h: h, fn: fn }); }

// ════════════════════════════════════════════════════════════════════════
//  DATE SCREEN — the core card-match loop
// ════════════════════════════════════════════════════════════════════════
function drawDateScreen(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  var su = sx.suitor; if (!su) { return; }
  sx.anim += dt;

  // backdrop
  drawCover(c, su.bg, 0, 0, W, H, function (cc, x, y, w, h) {
    var gg = cc.createLinearGradient(0, 0, 0, h); gg.addColorStop(0, '#241640'); gg.addColorStop(1, '#0d0a1e');
    cc.fillStyle = gg; cc.fillRect(x, y, w, h);
  });
  // darken for readability
  c.fillStyle = 'rgba(8,6,18,0.34)'; c.fillRect(0, 0, W, H);

  // ── SUITOR PORTRAIT (prominent, fills upper-mid) ──
  var portTop = H * 0.085, portH = H * 0.46, portW = Math.min(W * 0.92, portH * 0.82);
  var portX = (W - portW) / 2;
  // soft glow halo

  var hg = c.createRadialGradient(W / 2, portTop + portH * 0.45, portW * 0.2, W / 2, portTop + portH * 0.45, portW * 0.7);
  hg.addColorStop(0, su.accent + '44'); hg.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = hg; c.fillRect(portX - 40 * S, portTop - 20 * S, portW + 80 * S, portH + 40 * S);
  c.restore();
  // portrait in a rounded frame

  c.restore();
  c.lineWidth = 2.5 * S; c.strokeStyle = su.accent + 'aa';
  GF.rr(c, portX, portTop, portW, portH, 22 * S); c.stroke();

  // name tag
  c.font = 'bold ' + (clampF(20 * S, 15, 26)) + 'px Inter, system-ui, sans-serif';
  c.textAlign = 'left'; c.textBaseline = 'alphabetic';
  c.fillStyle = '#fff';
  var nm = suitorName(su);
  c.fillText(nm, portX + 14 * S, portTop + portH - 14 * S);

  // ── MOOD TELEGRAPH + dialogue bubble (above the hand) ──
  var mood = sx.moodNow;
  var bubY = portTop + portH + 8 * S;
  var bubH = H * 0.135;
  var bubX = W * 0.05, bubW = W * 0.90;
  c.save();
  c.fillStyle = 'rgba(20,16,38,0.92)';
  c.shadowColor = MOOD_COL[mood] + '88'; c.shadowBlur = 18 * S;
  GF.rr(c, bubX, bubY, bubW, bubH, 16 * S); c.fill();
  c.restore();
  c.lineWidth = 2 * S; c.strokeStyle = MOOD_COL[mood] + 'cc';
  GF.rr(c, bubX, bubY, bubW, bubH, 16 * S); c.stroke();

  // mood chip (icon + label) on the left

  var chipCx = bubX + chipR + 14 * S, chipCy = bubY + chipR + 12 * S;
  drawMoodIcon(c, mood, chipCx, chipCy, chipR, true);
  c.font = 'bold ' + clampF(12 * S, 10, 16) + 'px Inter, system-ui, sans-serif';
  c.textAlign = 'left'; c.fillStyle = MOOD_COL[mood];
  c.fillText(GF.t('he_feels') + ': ' + moodName(mood).toUpperCase(), chipCx + chipR + 12 * S, chipCy + 5 * S);

  // dialogue line (wrapped, beneath the chip)
  c.fillStyle = '#e7ecff';
  c.font = clampF(14 * S, 11, 18) + 'px Inter, system-ui, sans-serif';
  wrapText(c, '"' + moodLine(mood, sx.lineSeed) + '"', bubX + 16 * S, chipCy + chipR + 16 * S, bubW - 30 * S, clampF(18 * S, 14, 22));

  // judge flash — floats up over the portrait center, scales+fades (clear of name tag)
  if (sx.lastJudge && sx.advanceT != null) {
    sx.lastJudgeT += dt;
    var jt = GF.t(sx.lastJudge === 'perfect' ? 'perfect' : sx.lastJudge === 'good' ? 'good' : 'weak');
    var jc = sx.lastJudge === 'perfect' ? '#ff5fa2' : sx.lastJudge === 'good' ? '#ffb3d1' : '#8aa0c0';
    var pa = Math.max(0, 1 - sx.lastJudgeT * 1.1);
    var pop = 1 + Math.max(0, 0.35 - sx.lastJudgeT) * 1.5;
    var jy = portTop + portH * 0.46 - sx.lastJudgeT * 30 * S;
    c.save(); c.globalAlpha = pa; c.textAlign = 'center';
    c.translate(W / 2, jy); c.scale(pop, pop);
    c.font = 'bold ' + clampF(38 * S, 24, 52) + 'px Inter, system-ui, sans-serif';
    c.lineWidth = 4 * S; c.strokeStyle = 'rgba(8,6,18,0.85)'; c.strokeText(jt + '!', 0, 0);
    c.fillStyle = jc; c.shadowColor = jc; c.shadowBlur = 22 * S;

  }

  if (sx.momentScored && sx.advanceT != null) {

    if (sx.advanceT > 0.85) { sx.advanceT = null; advanceMoment(); }
  }
}

function drawDateHud(c) {
  var W = GF.W, H = GF.H, S = GF.S;
  var su = sx.suitor;
  var pad = 12 * S, top = 10 * S;
  var barX = pad, barW = W - pad * 2, barH = 18 * S, barY = top;
  // bond progress vs need
  var frac = GF.clamp(sx.bond / sx.dateRef.need, 0, 1);
  c.fillStyle = 'rgba(10,8,22,0.8)'; GF.rr(c, barX, barY, barW, barH, barH / 2); c.fill();
  var bg = c.createLinearGradient(barX, 0, barX + barW, 0);
  bg.addColorStop(0, '#ff7aa8'); bg.addColorStop(1, '#ff4f8b');
  c.fillStyle = bg; GF.rr(c, barX, barY, barW * frac, barH, barH / 2); c.fill();
  // threshold tick at 100%

  c.textAlign = 'left'; c.fillStyle = '#fff'; c.textBaseline = 'middle';

  c.textAlign = 'right';

    c.save(); c.shadowColor = '#ffd76b'; c.shadowBlur = 12 * S;
    c.fillText(GF.t('combo') + ' ' + cb, W / 2, barY + barH + 18 * S); c.restore();
  }
}

// the player's hand of cards along the bottom
function drawHand(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  var n = sx.hand.length;
  var bottomPad = 14 * S;
  var cardH = H * 0.20, cardW = cardH * 0.70;
  var gap = 8 * S;
  var totalW = n * cardW + (n - 1) * gap;
  // if too wide, shrink
  if (totalW > W - 16 * S) { var sc = (W - 16 * S) / totalW; cardW *= sc; cardH *= sc; totalW = n * cardW + (n - 1) * gap; }
  var startX = (W - totalW) / 2;
  var y = H - cardH - bottomPad;
  // prompt above hand
  c.textAlign = 'center'; c.fillStyle = 'rgba(231,236,255,0.7)';
  c.font = clampF(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('play_a_card'), W / 2, y - 8 * S);

  for (var i = 0; i < n; i++) {
    var e = sx.hand[i];
    var card = cardById(e.id);
    var x = startX + i * (cardW + gap);
    var hover = (sx._hoverIdx === i);
    var yy = y - (hover ? 8 * S : 0);
    drawCardFace(c, card, e.lvl, x, yy, cardW, cardH, sx.moodNow);
    if (sx.playing && !sx.momentScored) {
      (function (idx) { pushRect(x, yy, cardW, cardH, function () { sx._hoverIdx = idx; playCard(idx); }); })(i);
    }
  }
}

// draw a single card (art + tags + level + rarity frame)
function drawCardFace(c, card, lvl, x, y, w, h, moodNow) {
  var S = GF.S;
  if (!card) return;
  var rcol = RAR_COL[card.rar];
  // does this card match the current mood? (hint glow)
  var match = moodNow && (card.p === moodNow ? 2 : card.s === moodNow ? 1 : 0);
  c.save();
  if (match === 2) { c.shadowColor = '#ff5fa2'; c.shadowBlur = 16 * S; }
  else if (match === 1) { c.shadowColor = '#ffb3d1'; c.shadowBlur = 9 * S; }
  c.fillStyle = '#161228';
  GF.rr(c, x, y, w, h, 10 * S); c.fill();
  c.restore();
  // art area
  var artH = h * 0.60;
  c.save();
  GF.rr(c, x + 4 * S, y + 4 * S, w - 8 * S, artH, 7 * S); c.clip();
  drawCover(c, card.art, x + 4 * S, y + 4 * S, w - 8 * S, artH, function (cc, ax, ay, aw, ah) {
    var gg = cc.createLinearGradient(ax, ay, ax, ay + ah); gg.addColorStop(0, rcol + '66'); gg.addColorStop(1, '#0d0a1e');
    cc.fillStyle = gg; cc.fillRect(ax, ay, aw, ah);
    // small generic icon
    drawCardGlyph(cc, card.id, ax + aw / 2, ay + ah / 2, Math.min(aw, ah) * 0.3);
  });
  c.restore();
  // name
  c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  var fz = clampF(10 * S, 8, 13);
  c.font = 'bold ' + fz + 'px Inter, system-ui, sans-serif';
  var nm = cardName(card);
  // shrink name to fit
  while (c.measureText(nm).width > w - 8 * S && fz > 7) { fz--; c.font = 'bold ' + fz + 'px Inter, system-ui, sans-serif'; }
  c.fillText(nm, x + w / 2, y + artH + 16 * S);
  // tag chips (primary + secondary)
  var tagY = y + artH + 22 * S;
  drawTagChip(c, card.p, x + w * 0.27, tagY, true);
  drawTagChip(c, card.s, x + w * 0.73, tagY, false);
  // rarity + level corner
  c.fillStyle = rcol; c.textAlign = 'left';
  c.font = 'bold ' + clampF(9 * S, 7, 12) + 'px Inter, system-ui, sans-serif';
  if (lvl > 1) { c.textAlign = 'right'; c.fillStyle = '#ffd76b'; c.fillText(GF.t('lv') + lvl, x + w - 6 * S, y + h - 6 * S); }
  // rarity frame
  c.lineWidth = 2 * S; c.strokeStyle = rcol;
  GF.rr(c, x, y, w, h, 10 * S); c.stroke();
}

function drawTagChip(c, mood, cx, cy, primary) {
  var S = GF.S, r = 6 * S;
  c.save();
  drawMoodIcon(c, mood, cx, cy, r, false);
  c.restore();
}

// mood icon — vector glyph per mood (NO emoji)
function drawMoodIcon(c, mood, cx, cy, r, filled) {
  var col = MOOD_COL[mood];
  c.save(); c.translate(cx, cy);
  c.lineWidth = Math.max(1.4, r * 0.22); c.lineJoin = 'round'; c.lineCap = 'round';
  c.strokeStyle = col; c.fillStyle = col;
  if (filled) { c.globalAlpha = 0.18; c.beginPath(); c.arc(0, 0, r * 1.45, 0, Math.PI * 2); c.fill(); c.globalAlpha = 1; }
  if (mood === 'playful') {
    // wink + grin
    c.beginPath(); c.arc(-r * 0.4, -r * 0.2, r * 0.16, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.moveTo(r * 0.18, -r * 0.35); c.lineTo(r * 0.6, -r * 0.2); c.stroke();
    c.beginPath(); c.arc(0, r * 0.05, r * 0.55, 0.15 * Math.PI, 0.85 * Math.PI); c.stroke();
  } else if (mood === 'tender') {
    drawHeart(c, 0, -r * 0.2, r * 1.5, col, 1);
  } else if (mood === 'adventurous') {
    // upward arrow / spark
    c.beginPath(); c.moveTo(0, r * 0.7); c.lineTo(0, -r * 0.7); c.moveTo(-r * 0.4, -r * 0.25); c.lineTo(0, -r * 0.7); c.lineTo(r * 0.4, -r * 0.25); c.stroke();
  } else if (mood === 'curious') {
    // question-ish swirl
    c.beginPath(); c.arc(0, -r * 0.15, r * 0.45, -0.4 * Math.PI, 1.1 * Math.PI); c.stroke();
    c.beginPath(); c.arc(0, r * 0.62, r * 0.12, 0, Math.PI * 2); c.fill();
  } else if (mood === 'shy') {
    // small blush dots + downward gentle curve
    c.beginPath(); c.arc(-r * 0.45, r * 0.1, r * 0.14, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(r * 0.45, r * 0.1, r * 0.14, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(0, r * 0.05, r * 0.5, 1.15 * Math.PI, 1.85 * Math.PI); c.stroke();
  }
  c.restore();
}

// generic card glyph fallback (when no art) — drawn per card id
function drawCardGlyph(c, id, cx, cy, r) {
  c.save(); c.translate(cx, cy); c.strokeStyle = '#fff'; c.fillStyle = '#fff'; c.lineWidth = 2; c.globalAlpha = 0.85;
  c.lineJoin = 'round'; c.lineCap = 'round';
  if (id === 'coffee') { c.strokeRect(-r * 0.6, -r * 0.4, r * 1.0, r * 0.9); c.beginPath(); c.arc(r * 0.55, 0, r * 0.3, -1.2, 1.2); c.stroke(); }
  else if (id === 'music') { c.beginPath(); c.arc(-r * 0.3, r * 0.4, r * 0.3, 0, 6.3); c.stroke(); c.beginPath(); c.moveTo(0, r * 0.4); c.lineTo(0, -r * 0.6); c.lineTo(r * 0.5, -r * 0.4); c.stroke(); }
  else if (id === 'starmap' || id === 'telescope') { for (var i = 0; i < 5; i++) { var a = i / 5 * 6.28; c.beginPath(); c.arc(Math.cos(a) * r * 0.5, Math.sin(a) * r * 0.5, r * 0.08, 0, 6.3); c.fill(); } }
  else if (id === 'plush') { c.beginPath(); c.arc(0, 0, r * 0.6, 0, 6.3); c.stroke(); c.beginPath(); c.arc(-r * 0.25, -r * 0.1, r * 0.08, 0, 6.3); c.fill(); c.beginPath(); c.arc(r * 0.25, -r * 0.1, r * 0.08, 0, 6.3); c.fill(); }
  else if (id === 'flowers' || id === 'rose') { drawHeart(c, 0, 0, r * 1.6, '#fff', 0.85); }
  else { c.strokeRect(-r * 0.5, -r * 0.5, r, r); }
  c.restore();
}

// ── fallback suitor portrait (stylized silhouette) when art missing ──
function drawSuitorFallback(c, x, y, w, h, su) {
  var gg = c.createLinearGradient(x, y, x, y + h);
  gg.addColorStop(0, su.accent + '88'); gg.addColorStop(1, '#1a1230');
  c.fillStyle = gg; c.fillRect(x, y, w, h);
  // head + shoulders silhouette
  c.fillStyle = 'rgba(10,8,22,0.55)';
  c.beginPath(); c.arc(x + w / 2, y + h * 0.34, w * 0.20, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.moveTo(x + w * 0.18, y + h); c.quadraticCurveTo(x + w / 2, y + h * 0.5, x + w * 0.82, y + h); c.closePath(); c.fill();
  c.fillStyle = '#fff'; c.globalAlpha = 0.6; c.textAlign = 'center';
  c.font = 'bold ' + (16 * GF.S) + 'px Inter, sans-serif';
  c.fillText('?', x + w / 2, y + h * 0.36); c.globalAlpha = 1;
}

// ════════════════════════════════════════════════════════════════════════
//  RESULT SCREEN
// ════════════════════════════════════════════════════════════════════════
function drawResult(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  // dim the date behind
  c.fillStyle = 'rgba(8,6,18,0.86)'; c.fillRect(0, 0, W, H);
  var won = sx.dateWon;
  var su = sx.suitor;
  var cy = H * 0.30;
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.save();
  c.shadowColor = won ? '#ff5fa2' : '#5a6a8a'; c.shadowBlur = 26 * S;
  c.font = 'bold ' + clampF(34 * S, 24, 50) + 'px Inter, system-ui, sans-serif';
  c.fillStyle = won ? '#ff7aa8' : '#aeb6d0';
  c.fillText(GF.t(won ? 'win_title' : 'lose_title'), W / 2, cy);
  c.restore();

  // suitor portrait small
  var pw = W * 0.34, ph = pw * 1.2, px = (W - pw) / 2, py = cy + 24 * S;
  c.save(); GF.rr(c, px, py, pw, ph, 16 * S); c.clip();
  drawCover(c, su.art, px, py, pw, ph, function (cc, ax, ay, aw, ah) { drawSuitorFallback(cc, ax, ay, aw, ah, su); });
  c.restore();
  c.lineWidth = 2 * S; c.strokeStyle = su.accent + 'aa'; GF.rr(c, px, py, pw, ph, 16 * S); c.stroke();

  var yy = py + ph + 30 * S;
  c.fillStyle = '#e7ecff'; c.font = clampF(15 * S, 12, 19) + 'px Inter, system-ui, sans-serif';
  var msg = won ? GF.t('winBond') : GF.t('loseTryAgain');
  wrapText(c, msg, W / 2, yy, W * 0.84, clampF(20 * S, 15, 24), true);
  yy += clampF(46 * S, 36, 56);

  // chemistry total + bond level row
  c.fillStyle = '#ff9ec0'; c.font = 'bold ' + clampF(18 * S, 14, 24) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('chem') + ': ' + Math.round(sx.bond), W / 2, yy); yy += clampF(28 * S, 22, 34);
  if (won) {
    c.fillStyle = '#ffd76b'; c.font = 'bold ' + clampF(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
    var rline = '+' + sx.rewardDust + ' ' + GF.t('stardust');
    if (sx.rewardTicket) rline += '   +1 ' + GF.t('tickets');
    c.fillText(rline, W / 2, yy); yy += clampF(26 * S, 20, 32);
    c.fillStyle = '#ff7aa8'; c.font = 'bold ' + clampF(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
    c.fillText(GF.t('bondLv') + ' ' + (meta.bond[su.id] | 0) + ' / ' + su.dates.length, W / 2, yy); yy += clampF(26 * S, 20, 32);
  } else {
    c.fillStyle = '#9fb0d0'; c.font = clampF(13 * S, 11, 17) + 'px Inter, system-ui, sans-serif';
    c.fillText('+' + sx.rewardDust + ' ' + GF.t('stardust'), W / 2, yy); yy += clampF(26 * S, 20, 32);
  }

  // buttons: play next moment / retry, then back to hub
  var bw = Math.min(W * 0.7, 320 * S), bh = clampF(54 * S, 44, 66);
  var bx = (W - bw) / 2, by = H - bh * 2.4 - 16 * S;
  bigButton(c, bx, by, bw, bh, won ? GF.t('cont') : GF.t('retry'), su.accent, function () {
    if (won) { gs = 'SUITORS'; prevScreen = 'SUITORS'; }
    else { startDate(su); }
  });
  var by2 = by + bh + 14 * S;
  smallButton(c, bx, by2, bw, bh * 0.82, GF.t('collection'), function () { openScreen('COLLECTION'); });
}

// ════════════════════════════════════════════════════════════════════════
//  SUITORS (hub) — choose who to date + see bond + open meta
// ════════════════════════════════════════════════════════════════════════
function drawSuitors(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  c.fillStyle = 'rgba(8,6,18,0.5)'; c.fillRect(0, 0, W, H);
  // header
  c.textAlign = 'center'; c.fillStyle = '#fff';
  c.save(); c.shadowColor = '#ff5fa2'; c.shadowBlur = 18 * S;
  c.font = 'bold ' + clampF(24 * S, 18, 32) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('title'), W / 2, H * 0.075); c.restore();
  c.fillStyle = '#b9a6d0'; c.font = clampF(12 * S, 10, 15) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('chooseSuitor'), W / 2, H * 0.075 + 22 * S);

  // currency strip
  drawCurrencyStrip(c, H * 0.12);

  // suitor cards (vertical list)
  var topY = H * 0.18, listH = H * 0.56;
  var rowH = listH / SUITORS.length - 10 * S;
  for (var i = 0; i < SUITORS.length; i++) {
    var su = SUITORS[i];
    var y = topY + i * (rowH + 12 * S);
    var x = W * 0.06, w = W * 0.88;
    var unlocked = suitorUnlocked(su);
    c.save();
    c.fillStyle = unlocked ? 'rgba(26,20,46,0.95)' : 'rgba(18,16,30,0.9)';
    c.shadowColor = unlocked ? su.accent + '55' : 'rgba(0,0,0,0)'; c.shadowBlur = 14 * S;
    GF.rr(c, x, y, w, rowH, 16 * S); c.fill();
    c.restore();
    c.lineWidth = 2 * S; c.strokeStyle = unlocked ? su.accent + 'aa' : '#33304a';
    GF.rr(c, x, y, w, rowH, 16 * S); c.stroke();

    // portrait thumb
    var ps = rowH - 16 * S, ppx = x + 8 * S, ppy = y + 8 * S;
    c.save(); GF.rr(c, ppx, ppy, ps * 0.82, ps, 10 * S); c.clip();
    drawCover(c, su.art, ppx, ppy, ps * 0.82, ps, function (cc, ax, ay, aw, ah) { drawSuitorFallback(cc, ax, ay, aw, ah, su); });
    if (!unlocked) { c.fillStyle = 'rgba(8,6,18,0.7)'; c.fillRect(ppx, ppy, ps * 0.82, ps); }
    c.restore();

    var tx = ppx + ps * 0.82 + 14 * S;
    if (unlocked) {
      c.textAlign = 'left'; c.fillStyle = '#fff';
      c.font = 'bold ' + clampF(18 * S, 14, 24) + 'px Inter, system-ui, sans-serif';
      c.fillText(suitorName(su), tx, y + 26 * S);
      c.fillStyle = '#b9a6d0'; c.font = clampF(12 * S, 10, 15) + 'px Inter, system-ui, sans-serif';
      c.fillText(suitorRole(su), tx, y + 44 * S);
      // bond hearts
      var maxB = su.dates.length, b = meta.bond[su.id] | 0;
      for (var k = 0; k < maxB; k++) {
        drawHeart(c, tx + 8 * S + k * 18 * S, y + rowH - 18 * S, 13 * S, k < b ? '#ff5fa2' : '#3a3454', 1);
      }
      // date status
      c.fillStyle = '#9fb0d0'; c.textAlign = 'right'; c.font = clampF(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';
      var done = (meta.dateIdx[su.id] | 0) >= su.dates.length;
      c.fillText(done ? GF.t('bondMax') : (GF.t('date') + ' ' + ((meta.dateIdx[su.id] | 0) + 1)), x + w - 14 * S, y + 26 * S);
      // tap-to-date cue
      c.fillStyle = su.accent; c.fillText(GF.t('tapToDate') + ' >', x + w - 14 * S, y + rowH - 16 * S);
      (function (s) { pushRect(x, y, w, rowH, function () { startDate(s); }); })(su);
    } else {
      c.textAlign = 'left'; c.fillStyle = '#6a6488';
      c.font = 'bold ' + clampF(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
      c.fillText(GF.t('locked'), tx, y + rowH / 2 - 4 * S);
      c.font = clampF(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif'; c.fillStyle = '#8a82a8';
      c.fillText(GF.t('unlockAt') + ' ' + su.unlockBond + ' (' + totalBond() + ')', tx, y + rowH / 2 + 16 * S);
    }
  }

  // bottom nav: Summon, Daily, Collection
  drawHubNav(c);
}

function drawCurrencyStrip(c, y) {
  var W = GF.W, S = GF.S;
  c.textAlign = 'center'; c.textBaseline = 'middle';
  var cw = W * 0.44;
  // stardust
  var sx0 = W / 2 - cw - 6 * S;
  c.fillStyle = 'rgba(20,16,38,0.9)'; GF.rr(c, sx0, y, cw, 30 * S, 15 * S); c.fill();
  drawStardustIcon(c, sx0 + 18 * S, y + 15 * S, 8 * S);
  c.fillStyle = '#ffd76b'; c.font = 'bold ' + clampF(13 * S, 11, 16) + 'px Inter, system-ui, sans-serif';
  c.textAlign = 'left';
  c.fillText(' ' + meta.stardust, sx0 + 30 * S, y + 15 * S + 1);
  // tickets
  var tx0 = W / 2 + 6 * S;
  c.fillStyle = 'rgba(20,16,38,0.9)'; GF.rr(c, tx0, y, cw, 30 * S, 15 * S); c.fill();
  drawTicketIcon(c, tx0 + 18 * S, y + 15 * S, 8 * S);
  c.fillStyle = '#9fe6ff'; c.textAlign = 'left';
  c.fillText(' ' + meta.tickets + ' ' + GF.t('tickets'), tx0 + 30 * S, y + 15 * S + 1);
  c.textBaseline = 'alphabetic';
}

function drawStardustIcon(c, x, y, r) {
  c.save(); c.translate(x, y); c.fillStyle = '#ffd76b'; c.shadowColor = '#ffd76b'; c.shadowBlur = 6;
  c.beginPath();
  for (var i = 0; i < 4; i++) { var a = i / 4 * Math.PI * 2 - Math.PI / 2; c.lineTo(Math.cos(a) * r, Math.sin(a) * r); var a2 = a + Math.PI / 4; c.lineTo(Math.cos(a2) * r * 0.4, Math.sin(a2) * r * 0.4); }
  c.closePath(); c.fill(); c.restore();
}
function drawTicketIcon(c, x, y, r) {
  c.save(); c.translate(x, y); c.fillStyle = '#9fe6ff';
  GF.rr(c, -r, -r * 0.6, r * 2, r * 1.2, r * 0.3); c.fill();
  c.fillStyle = '#0d0a1e'; c.beginPath(); c.arc(0, 0, r * 0.3, 0, Math.PI * 2); c.fill(); c.restore();
}

function drawHubNav(c) {
  var W = GF.W, H = GF.H, S = GF.S;
  var by = H - clampF(64 * S, 52, 80) - 10 * S, bh = clampF(56 * S, 46, 72);
  var gap = 8 * S, bw = (W - 12 * S * 2 - gap * 2) / 3;
  var x0 = 12 * S;
  // Summon
  navButton(c, x0, by, bw, bh, GF.t('summon'), '#ff8fc7', dailyReady() ? false : false, function () { openScreen('SUMMON'); });
  // Daily (highlight if ready)
  navButton(c, x0 + bw + gap, by, bw, bh, GF.t('daily'), '#ffd76b', dailyReady(), function () { openScreen('SUMMON'); if (dailyReady()) claimDaily(); });
  // Collection
  navButton(c, x0 + (bw + gap) * 2, by, bw, bh, GF.t('collection'), '#5fd0e6', false, function () { openScreen('COLLECTION'); });
}
function navButton(c, x, y, w, h, label, col, pulse, fn) {
  var S = GF.S;
  c.save();
  if (pulse) { var p = 0.5 + 0.5 * Math.sin(T * 4); c.shadowColor = col; c.shadowBlur = (10 + p * 14) * S; }
  c.fillStyle = 'rgba(24,18,42,0.95)'; GF.rr(c, x, y, w, h, 14 * S); c.fill();
  c.restore();
  c.lineWidth = 2 * S; c.strokeStyle = col + (pulse ? 'ff' : '99'); GF.rr(c, x, y, w, h, 14 * S); c.stroke();
  c.fillStyle = col; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'bold ' + clampF(13 * S, 10, 17) + 'px Inter, system-ui, sans-serif';
  c.fillText(label, x + w / 2, y + h / 2 + 1);
  if (pulse) { c.fillStyle = '#ff5a5a'; c.beginPath(); c.arc(x + w - 9 * S, y + 9 * S, 5 * S, 0, Math.PI * 2); c.fill(); }
  c.textBaseline = 'alphabetic';
  pushRect(x, y, w, h, fn);
}

// ════════════════════════════════════════════════════════════════════════
//  COLLECTION (memory gallery)
// ════════════════════════════════════════════════════════════════════════
var collScroll = 0;
function drawCollection(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  c.fillStyle = 'rgba(8,6,18,0.92)'; c.fillRect(0, 0, W, H);
  c.textAlign = 'center'; c.fillStyle = '#fff';
  c.save(); c.shadowColor = '#5fd0e6'; c.shadowBlur = 16 * S;
  c.font = 'bold ' + clampF(22 * S, 17, 30) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('collection'), W / 2, H * 0.08); c.restore();

  var owned = Object.keys(meta.owned).filter(function (id) { return (meta.owned[id] | 0) > 0; });
  if (!owned.length) {
    c.fillStyle = '#9fb0d0'; c.font = clampF(14 * S, 11, 18) + 'px Inter, system-ui, sans-serif';
    c.fillText(GF.t('empty'), W / 2, H * 0.4);
  } else {
    // grid of owned cards (3 per row)
    var cols = 3, pad = W * 0.05, gap = 10 * S;
    var cw = (W - pad * 2 - gap * (cols - 1)) / cols;
    var ch = cw * 1.42;
    var topY = H * 0.13;
    for (var i = 0; i < CARDS.length; i++) {
      var card = CARDS[i];
      var lvl = meta.owned[card.id] | 0;
      var col = i % cols, row = (i / cols) | 0;
      var x = pad + col * (cw + gap), y = topY + row * (ch + gap);
      if (lvl > 0) {
        drawCardFace(c, card, lvl, x, y, cw, ch, null);
      } else {
        // locked silhouette
        c.fillStyle = 'rgba(18,16,30,0.9)'; GF.rr(c, x, y, cw, ch, 10 * S); c.fill();
        c.lineWidth = 1.5 * S; c.strokeStyle = '#33304a'; GF.rr(c, x, y, cw, ch, 10 * S); c.stroke();
        c.fillStyle = '#4a4568'; c.textAlign = 'center'; c.font = 'bold ' + clampF(18 * S, 14, 24) + 'px Inter, sans-serif';
        c.fillText('?', x + cw / 2, y + ch / 2);
      }
    }
  }

  // back button + summon shortcut
  var bw = Math.min(W * 0.42, 220 * S), bh = clampF(50 * S, 42, 62);
  smallButton(c, W / 2 - bw - 6 * S, H - bh - 16 * S, bw, bh, GF.t('backMenu'), function () { openScreen('SUITORS'); });
  bigButton(c, W / 2 + 6 * S, H - bh - 16 * S, bw, bh, GF.t('summon'), '#ff8fc7', function () { openScreen('SUMMON'); });
}

// ════════════════════════════════════════════════════════════════════════
//  SUMMON screen
// ════════════════════════════════════════════════════════════════════════
function drawSummon(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  c.fillStyle = 'rgba(8,6,18,0.92)'; c.fillRect(0, 0, W, H);
  // header
  c.textAlign = 'center'; c.fillStyle = '#fff';
  c.save(); c.shadowColor = '#ff8fc7'; c.shadowBlur = 18 * S;
  c.font = 'bold ' + clampF(24 * S, 18, 32) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('summon'), W / 2, H * 0.10); c.restore();
  c.fillStyle = '#b9a6d0'; c.font = clampF(12 * S, 10, 15) + 'px Inter, system-ui, sans-serif';
  wrapText(c, GF.t('summonHint'), W / 2, H * 0.10 + 24 * S, W * 0.8, clampF(16 * S, 13, 20), true);

  drawCurrencyStrip(c, H * 0.20);

  // central crystal / portal art
  var cy = H * 0.42, cr = Math.min(W, H) * 0.16;
  c.save();
  var pulse = 0.5 + 0.5 * Math.sin(T * 2);
  var rg = c.createRadialGradient(W / 2, cy, cr * 0.2, W / 2, cy, cr * (1.4 + pulse * 0.2));
  rg.addColorStop(0, '#ff9ec0'); rg.addColorStop(0.5, '#a05fd6'); rg.addColorStop(1, 'rgba(20,10,40,0)');
  c.fillStyle = rg; c.beginPath(); c.arc(W / 2, cy, cr * 1.5, 0, Math.PI * 2); c.fill();
  c.restore();
  // diamond
  c.save(); c.translate(W / 2, cy); c.fillStyle = '#ffd9ef'; c.shadowColor = '#ff8fc7'; c.shadowBlur = 24 * S;
  c.beginPath(); c.moveTo(0, -cr); c.lineTo(cr * 0.7, 0); c.lineTo(0, cr); c.lineTo(-cr * 0.7, 0); c.closePath(); c.fill();
  c.restore();

  // rates note
  c.fillStyle = '#9fb0d0'; c.textAlign = 'center'; c.font = clampF(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('rarityE') + ' 8%  /  ' + GF.t('rarityR') + ' 27%  /  ' + GF.t('rarityC') + ' 65%', W / 2, cy + cr * 1.7);

  // buttons: summon w/ stardust, summon w/ free call, watch ad for call
  var bw = Math.min(W * 0.84, 380 * S), bh = clampF(54 * S, 44, 66);
  var bx = (W - bw) / 2, by = H * 0.62;
  var canDust = meta.stardust >= PULL_COST;
  bigButton(c, bx, by, bw, bh, GF.t('pull1') + '  -' + PULL_COST, canDust ? '#ff8fc7' : '#555', function () {
    if (doSummon('dust')) {}
  }, !canDust);
  var by2 = by + bh + 12 * S;
  var canTicket = meta.tickets >= 1;
  bigButton(c, bx, by2, bw, bh, GF.t('pullTicket') + (canTicket ? '  (' + meta.tickets + ')' : ''), canTicket ? '#5fd0e6' : '#555', function () {
    if (doSummon('ticket')) {}
  }, !canTicket);
  var by3 = by2 + bh + 12 * S;
  smallButton(c, bx, by3, bw, bh * 0.86, GF.t('ad_more'), function () {
    watchAdForTicket();
  });

  // daily call cue
  if (dailyReady()) {
    var dy = H * 0.55;
    c.fillStyle = '#ffd76b'; c.textAlign = 'center'; c.font = 'bold ' + clampF(13 * S, 11, 17) + 'px Inter, system-ui, sans-serif';
    c.save(); c.shadowColor = '#ffd76b'; c.shadowBlur = 10 * S;
    c.fillText(GF.t('dailyReady'), W / 2, dy); c.restore();
    var dbw = Math.min(W * 0.6, 280 * S);
    bigButton(c, W / 2 - dbw / 2, dy + 8 * S, dbw, clampF(44 * S, 38, 56), GF.t('daily'), '#ffd76b', function () { claimDaily(); });
  }

  // back
  var bbw = Math.min(W * 0.5, 240 * S), bbh = clampF(46 * S, 40, 58);
  smallButton(c, W / 2 - bbw / 2, H - bbh - 12 * S, bbw, bbh, GF.t('backMenu'), function () { openScreen('SUITORS'); });
}

// ════════════════════════════════════════════════════════════════════════
//  REVEAL overlay (pull result)
// ════════════════════════════════════════════════════════════════════════
function drawReveal(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  reveal.t += dt;
  // fully OPAQUE backdrop (overlay over the summon screen — rule #12)
  var rg0 = c.createLinearGradient(0, 0, 0, H);
  rg0.addColorStop(0, '#120a22'); rg0.addColorStop(1, '#06040f');
  c.fillStyle = rg0; c.fillRect(0, 0, W, H);
  drawStars(c, W, H);
  var card = reveal.card; if (!card) { reveal.active = false; return; }
  // block all taps from reaching the screen behind this overlay (rule: overlays consume clicks)
  pushRect(0, 0, W, H, function () {});
  var rcol = RAR_COL[card.rar];
  var cardCy = H * 0.40;
  // burst rays
  var k = Math.min(1, reveal.t * 1.6);
  c.save(); c.translate(W / 2, cardCy);
  c.globalAlpha = 0.45 * k;
  for (var i = 0; i < 12; i++) { c.rotate(Math.PI / 6 + T * 0.3); c.fillStyle = rcol; c.beginPath(); c.moveTo(0, 0); c.lineTo(W * 0.5 * k, 16 * S); c.lineTo(W * 0.5 * k, -16 * S); c.closePath(); c.fill(); }
  c.restore();
  // card grows in
  var cw = Math.min(W * 0.46, 220 * S) * Math.min(1, reveal.t * 2), ch = cw * 1.42;
  var cx = (W - cw) / 2, cyy = cardCy - ch / 2;
  if (cw > 8) drawCardFace(c, card, reveal.lvl, cx, cyy, cw, ch, null);
  // label
  var labY = cardCy + ch / 2 + 36 * S;
  c.textAlign = 'center'; c.fillStyle = rcol;
  c.save(); c.shadowColor = rcol; c.shadowBlur = 18 * S;
  c.font = 'bold ' + clampF(26 * S, 18, 36) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t(reveal.dupe ? 'dupe' : 'newcard'), W / 2, labY);
  c.restore();
  c.fillStyle = '#fff'; c.font = clampF(14 * S, 11, 18) + 'px Inter, system-ui, sans-serif';
  c.fillText(cardName(card) + (reveal.lvl > 1 ? '  ' + GF.t('lv') + reveal.lvl : ''), W / 2, labY + 26 * S);
  var rlab = card.rar === 3 ? GF.t('rarityE') : card.rar === 2 ? GF.t('rarityR') : GF.t('rarityC');
  c.fillStyle = rcol; c.font = clampF(12 * S, 10, 15) + 'px Inter, system-ui, sans-serif';
  c.fillText(rlab, W / 2, labY + 46 * S);
  // tap-to-continue button
  if (reveal.t > 0.5) {
    var bw = Math.min(W * 0.6, 280 * S), bh = clampF(48 * S, 40, 60);
    bigButton(c, W / 2 - bw / 2, H - bh - 28 * S, bw, bh, GF.t('cont'), rcol, function () { reveal.active = false; });
  }
}

// ════════════════════════════════════════════════════════════════════════
//  CELEBRATE overlay (bond up + vignette)
// ════════════════════════════════════════════════════════════════════════
function drawCelebrate(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  celebrate.t += dt;
  c.fillStyle = 'rgba(8,4,18,0.92)'; c.fillRect(0, 0, W, H);
  // block taps from reaching the screen behind this overlay
  pushRect(0, 0, W, H, function () {});
  var su = celebrate.suitor;
  // spawn hearts continuously for the first bit
  if (celebrate.t < 1.5 && Math.random() < 0.3) blush();
  // backdrop
  drawCover(c, su.bg, 0, 0, W, H, function () {});
  c.fillStyle = 'rgba(8,4,18,0.55)'; c.fillRect(0, 0, W, H);
  // portrait
  var pw = W * 0.5, ph = pw * 1.2, px = (W - pw) / 2, py = H * 0.14;
  c.save(); GF.rr(c, px, py, pw, ph, 18 * S); c.clip();
  drawCover(c, su.art, px, py, pw, ph, function (cc, ax, ay, aw, ah) { drawSuitorFallback(cc, ax, ay, aw, ah, su); });
  c.restore();
  c.lineWidth = 3 * S; c.strokeStyle = '#ff7aa8'; GF.rr(c, px, py, pw, ph, 18 * S); c.stroke();

  c.textAlign = 'center';
  c.save(); c.shadowColor = '#ff5fa2'; c.shadowBlur = 24 * S;
  c.font = 'bold ' + clampF(28 * S, 20, 40) + 'px Inter, system-ui, sans-serif'; c.fillStyle = '#ff7aa8';
  c.fillText(GF.t('bondup') + '!', W / 2, py + ph + 44 * S); c.restore();
  // vignette line
  c.fillStyle = '#ffe3ee'; c.font = 'italic ' + clampF(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
  wrapText(c, '"' + celebrate.line + '"', W / 2, py + ph + 78 * S, W * 0.82, clampF(22 * S, 16, 26), true);

  if (celebrate.t > 0.8) {
    var bw = Math.min(W * 0.6, 280 * S), bh = clampF(50 * S, 42, 62);
    bigButton(c, W / 2 - bw / 2, H - bh - 20 * S, bw, bh, GF.t('cont'), '#ff7aa8', function () { celebrate.active = false; });
  }
}

function drawBanner(c) {
  var W = GF.W, S = GF.S;
  var a = Math.min(1, banner.t) * Math.min(1, (4 - banner.t) * 2 + 0.4);
  c.save(); c.globalAlpha = Math.min(1, a);
  var bw = Math.min(W * 0.8, 360 * S), bh = 40 * S, bx = (W - bw) / 2, by = GF.H * 0.16;
  c.fillStyle = 'rgba(20,16,38,0.96)'; c.shadowColor = '#ffd76b'; c.shadowBlur = 14 * S;
  GF.rr(c, bx, by, bw, bh, bh / 2); c.fill();
  c.fillStyle = '#ffd76b'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'bold ' + clampF(13 * S, 11, 17) + 'px Inter, system-ui, sans-serif';
  c.fillText('+1 ' + GF.t('tickets') + '  +20 ' + GF.t('stardust'), W / 2, by + bh / 2 + 1);
  c.textBaseline = 'alphabetic'; c.restore();
}

// ════════════════════════════════════════════════════════════════════════
//  Shared UI widgets
// ════════════════════════════════════════════════════════════════════════
function bigButton(c, x, y, w, h, label, col, fn, disabled) {
  var S = GF.S;
  c.save();
  if (!disabled) { var p = 0.5 + 0.5 * Math.sin(T * 2.4); c.shadowColor = col; c.shadowBlur = (10 + p * 8) * S; }
  var g = c.createLinearGradient(x, y, x, y + h);
  if (disabled) { g.addColorStop(0, '#3a3650'); g.addColorStop(1, '#2a2740'); }
  else { g.addColorStop(0, lighten(col, 18)); g.addColorStop(1, col); }
  c.fillStyle = g; GF.rr(c, x, y, w, h, h / 2); c.fill();
  c.restore();
  c.fillStyle = disabled ? '#8a86a0' : '#1a0f20'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'bold ' + clampF(16 * S, 13, 22) + 'px Inter, system-ui, sans-serif';
  c.fillText(label, x + w / 2, y + h / 2 + 1);
  c.textBaseline = 'alphabetic';
  if (!disabled) pushRect(x, y, w, h, fn);
}
function smallButton(c, x, y, w, h, label, fn) {
  var S = GF.S;
  c.fillStyle = 'rgba(30,24,52,0.95)'; GF.rr(c, x, y, w, h, h / 2); c.fill();
  c.lineWidth = 1.5 * S; c.strokeStyle = '#5a5478'; GF.rr(c, x, y, w, h, h / 2); c.stroke();
  c.fillStyle = '#cdd6ff'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'bold ' + clampF(14 * S, 11, 19) + 'px Inter, system-ui, sans-serif';
  c.fillText(label, x + w / 2, y + h / 2 + 1);
  c.textBaseline = 'alphabetic';
  pushRect(x, y, w, h, fn);
}
function drawBackBtn(c) {
  var S = GF.S, W = GF.W;
  var x = 10 * S, y = 34 * S, w = 64 * S, h = 28 * S;
  c.fillStyle = 'rgba(20,16,38,0.85)'; GF.rr(c, x, y, w, h, h / 2); c.fill();
  c.fillStyle = '#cdd6ff'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'bold ' + clampF(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';
  c.fillText('< ' + GF.t('backMenu'), x + w / 2, y + h / 2 + 1);
  c.textBaseline = 'alphabetic';
  pushRect(x, y, w, h, function () { GF.gameEnded(); gs = 'SUITORS'; prevScreen = 'SUITORS'; });
}
// mute button top-right
var muteRect = null;
function drawMute(c) {
  var S = GF.S, W = GF.W;
  var r = 13 * S, x = W - r - 12 * S, y = 34 * S + r;
  c.fillStyle = 'rgba(20,16,38,0.7)'; c.beginPath(); c.arc(x, y, r + 4 * S, 0, Math.PI * 2); c.fill();
  GF.drawMuteIcon(c, x, y, r, GF.muted);
  muteRect = { x: x - r - 6 * S, y: y - r - 6 * S, w: (r + 6 * S) * 2, h: (r + 6 * S) * 2 };
  pushRect(muteRect.x, muteRect.y, muteRect.w, muteRect.h, function () { var m = GF.toggleMute(); GF.setMusicMuted(m); });
}

function openScreen(s) { prevScreen = gs; gs = s; }

// ════════════════════════════════════════════════════════════════════════
//  text helpers
// ════════════════════════════════════════════════════════════════════════
function clampF(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function wrapText(c, text, x, y, maxW, lineH, center) {
  if (center !== false) c.textAlign = center ? 'center' : c.textAlign;
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  for (var j = 0; j < lines.length; j++) c.fillText(lines[j], x, y + j * lineH);
  return lines.length;
}
function lighten(hex, amt) {
  var h = hex.replace('#', '');
  if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  var r = Math.min(255, parseInt(h.substr(0, 2), 16) + amt);
  var g = Math.min(255, parseInt(h.substr(2, 2), 16) + amt);
  var b = Math.min(255, parseInt(h.substr(4, 2), 16) + amt);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

// ════════════════════════════════════════════════════════════════════════
//  INPUT — single press handler, rect-based hit-test with live scale
// ════════════════════════════════════════════════════════════════════════
function handlePress(clientX, clientY) {
  // map client coords to canvas coords (canvas == viewport here, but be safe)
  var rect = GF.canvas.getBoundingClientRect();
  var scaleX = GF.canvas.width / rect.width, scaleY = GF.canvas.height / rect.height;
  var x = (clientX - rect.left) * scaleX, y = (clientY - rect.top) * scaleY;
  // tutorial first
  if (GF.tutorial.handleClick(x, y)) return;
  // overlays consume clicks via their own pushRect entries; iterate top-most last
  for (var i = clickRects.length - 1; i >= 0; i--) {
    var r = clickRects[i];
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) { r.fn(); return; }
  }
}
GF.canvas.addEventListener('pointerdown', function (e) { handlePress(e.clientX, e.clientY); });
// touchstart fallback (some webviews delay pointer events)
GF.canvas.addEventListener('touchstart', function (e) {
  if (e.changedTouches && e.changedTouches.length) {
    var t0 = e.changedTouches[0];
    // avoid double-fire with pointerdown: only handle if pointer events absent
    if (!window.PointerEvent) handlePress(t0.clientX, t0.clientY);
  }
}, { passive: true });

// ════════════════════════════════════════════════════════════════════════
//  TUTORIAL (hands-on, action-gated) — first ever date only
// ════════════════════════════════════════════════════════════════════════
function maybeTutorial() {
  if (meta.seenTut) return;
  // find a card in hand that matches the first mood, point the hand at it
  GF.tutorial.start([
    {
      text: GF.t('tut_tapcard'),
      target: function () {
        // point at the first matching card in hand (or first card)
        var rect = tutorialCardRect();
        return rect;
      },
      gesture: 'tap',
      advance: 'click_target',
      onAdvance: function () { meta.seenTut = 1; saveMeta(); },
    },
  ], { storageKey: 'stellar_hearts_tut_v1' });
}
// compute the on-screen rect of the best tutorial card (recomputed live)
function tutorialCardRect() {
  var W = GF.W, H = GF.H, S = GF.S;
  var n = sx.hand.length; if (!n) return { x: W / 2, y: H * 0.8, r: 30 * S };
  var bottomPad = 14 * S, cardH = H * 0.20, cardW = cardH * 0.70, gap = 8 * S;
  var totalW = n * cardW + (n - 1) * gap;
  if (totalW > W - 16 * S) { var sc = (W - 16 * S) / totalW; cardW *= sc; cardH *= sc; totalW = n * cardW + (n - 1) * gap; }
  var startX = (W - totalW) / 2, y = H - cardH - bottomPad;
  // find matching card index
  var idx = 0;
  for (var i = 0; i < n; i++) { var card = cardById(sx.hand[i].id); if (card && (card.p === sx.moodNow || card.s === sx.moodNow)) { idx = i; break; } }
  var cx = startX + idx * (cardW + gap) + cardW / 2;
  return { x: cx, y: y + cardH / 2, r: cardW * 0.55 };
}

// ════════════════════════════════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════════════════════════════════
function update(dt) {
  // (most state advances inside draw via timers; keep update light)
}

// ════════════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════════════
GF.init({
  designW: 393,
  designH: 852,
  strings: STRINGS,
  saveKey: 'stellar_hearts',
  onReady: function () {
    // language fallback off-platform (gf-lib only sets ru on Yandex/CG;
    // honor the browser for local + general builds)
    try {
      if (GF.platform === 'local' && /^ru/i.test(navigator.language || '')) GF.lang = 'ru';
    } catch (e) {}
    meta = loadMeta();
    loadAssets(function () {
      // flag any missing art
      missingArt = IMG_KEYS.filter(function (k) { return !hasImg(k); });
      // procedural music bed (calm/romantic)
      GF.startMusic({ preset: 'calm', muted: GF.muted });
      // daily banner if a daily is ready (gentle nudge, not auto-claim)
      // pick the first unlocked suitor for the autostart date
      var first = SUITORS[0];
      for (var i = 0; i < SUITORS.length; i++) { if (suitorUnlocked(SUITORS[i])) { first = SUITORS[i]; break; } }
      // AUTOSTART: platform builds drop STRAIGHT into a date (rule #9).
      // Gallery build shows the hub first so meta is visible.
      if (window.__GF_AUTOSTART) {
        startDate(first);
        maybeTutorial();
      } else {
        gs = 'SUITORS';
        prevScreen = 'SUITORS';
      }
    });
  },
  onUpdate: update,
  onDraw: draw,
});

// also run the tutorial when the player taps into their first date from the hub
var _origStartDate = startDate;
startDate = function (s) { _origStartDate(s); if (!meta.seenTut) maybeTutorial(); };

// NOTE: no GF.persist for mid-date run state — a date is a 60-120s session and
// the meaningful progression (bond / cards / currency) is saved to localStorage
// (stellar_hearts_meta_v1) on every event. Re-entering simply starts a fresh date.

// ── EXPOSE STATE for the post-build / yandex-testing gate ────────────────
GF.exposeState(function () {
  return {
    gs: gs,
    bond: Math.round(sx.bond || 0),
    need: sx.dateRef ? sx.dateRef.need : 0,
    moment: sx.moment || 0,
    moments: sx.dateRef ? sx.dateRef.script.length : 0,
    combo: sx.combo || 0,
    handSize: sx.hand ? sx.hand.length : 0,
    suitor: sx.suitor ? sx.suitor.id : null,
    stardust: meta ? meta.stardust : 0,
    tickets: meta ? meta.tickets : 0,
    owned: meta ? Object.keys(meta.owned).filter(function (k) { return meta.owned[k] > 0; }).length : 0,
    totalBond: meta ? totalBond() : 0,
    dateWon: sx.dateWon,
    missingArt: missingArt.length,
  };
});

// ── DEV SEAMS for the headless playtest (drive real flow deterministically) ──
// Gated behind ?test=1 (or window.__SH_TEST) so they are ABSENT in the shipped
// gallery/platform build and cannot be abused to grant currency/cards.
var _SH_TEST = false;
try { _SH_TEST = /[?&]test=1/.test(location.search) || !!window.__SH_TEST; } catch (e) {}
if (_SH_TEST) {
window._shInfo = function () {
  return {
    gs: gs, bond: sx.bond, need: sx.dateRef ? sx.dateRef.need : 0, moment: sx.moment,
    moments: sx.dateRef ? sx.dateRef.script.length : 0, mood: sx.moodNow, combo: sx.combo,
    hand: sx.hand.map(function (e) { var card = cardById(e.id); return { id: e.id, lvl: e.lvl, p: card.p, s: card.s }; }),
    rects: clickRects.map(function (r) { return { x: r.x, y: r.y, w: r.w, h: r.h }; }),
    suitor: sx.suitor ? sx.suitor.id : null, dateWon: sx.dateWon,
    stardust: meta.stardust, tickets: meta.tickets,
    owned: Object.keys(meta.owned).filter(function (k) { return meta.owned[k] > 0; }),
    bondMap: meta.bond, totalBond: totalBond(), reveal: reveal.active, celebrate: celebrate.active,
    missingArt: missingArt,
  };
};
// click at canvas coords (for the playtest harness)
window._shTap = function (x, y) { handlePress(x, y); };
// find the best-matching card's hand index for the current mood
window._shBestCardIdx = function () {
  var best = -1, bestScore = -1;
  for (var i = 0; i < sx.hand.length; i++) {
    var card = cardById(sx.hand[i].id);
    var sc = card.p === sx.moodNow ? 2 : card.s === sx.moodNow ? 1 : 0;
    if (sc > bestScore) { bestScore = sc; best = i; }
  }
  return best;
};
// directly play the best card (drives the loop in tests; mirrors a real tap)
window._shPlayBest = function () { var i = window._shBestCardIdx(); if (i >= 0) playCard(i); return i; };
window._shStartDate = function (id) { var s = suitorById(id) || SUITORS[0]; startDate(s); };
window._shSummon = function (how) { return doSummon(how || 'dust'); };
window._shGrant = function (dust, tix) { meta.stardust += (dust | 0); meta.tickets += (tix | 0); saveMeta(); };
window._shDaily = function () { meta.lastDaily = 0; return claimDaily(); };
window._shDismiss = function () { reveal.active = false; celebrate.active = false; };
window._shOpen = function (s) { openScreen(s); };
}  // end _SH_TEST gate

// screenshot helper — gf-lib calls _setLang; expose a jump for promo shots
window._jumpLevel = function () { /* no level model; ensure a date is active */ if (!sx.suitor) startDate(SUITORS[0]); gs = 'DATE'; };

})();
</script>
