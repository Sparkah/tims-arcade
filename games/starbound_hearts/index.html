//  PERSISTENT META (collection / bond / currency / daily)
// ════════════════════════════════════════════════════════════════════════
var META_KEY = 'stellar_hearts_meta_v1';
var meta = null;
function defaultMeta() {
  return {
    v: 1,
    stardust: 40,        // earned currency for summons
    tickets: 1,          // free-call tickets (daily + ad)
    owned: { coffee: 1, music: 1, starmap: 1 },  // starter hand (3 commons), value = level
    bond: { orion: 0, kai: 0, soren: 0 },        // bond LEVEL per suitor (0..maxBondLv)
    dateIdx: { orion: 0, kai: 0, soren: 0 },     // next date index to play per suitor
    memories: {},        // suitorId+dateIdx -> 1 (unlocked vignette for gallery)
    lastDaily: 0,        // day-number of last daily claim
    seenTut: 0,
  };
}
function loadMeta() {
  var m;
  try {
    var raw = localStorage.getItem(META_KEY);
    m = raw ? JSON.parse(raw) : null;
  } catch (e) { m = null; }
  if (!m || typeof m !== 'object') m = defaultMeta();
  var d = defaultMeta();
  // coerce defensively (corrupt/old save must not black-screen)
  m.v = 1;
  m.stardust = Math.max(0, m.stardust | 0);
  m.tickets = Math.max(0, m.tickets | 0);
  m.owned = (m.owned && typeof m.owned === 'object') ? m.owned : d.owned;
  // sanitise owned: only real card ids, levels clamped to 1..8 (reject tamper/corrupt)
  var clean = {};
  for (var oid in m.owned) {
    if (!m.owned.hasOwnProperty(oid)) continue;
    if (!cardById(oid)) continue;
    var lv = m.owned[oid] | 0;
    if (lv >= 1) clean[oid] = GF.clamp(lv, 1, 8);
  }
  m.owned = clean;
  // re-seed the starter hand if a corrupt save left NO playable cards (else
  // an autostart date would deal an empty hand = unwinnable).
  var any = false; for (var kk in m.owned) { if (m.owned[kk] > 0) { any = true; break; } }
  if (!any) m.owned = { coffee: 1, music: 1, starmap: 1 };
  m.bond = (m.bond && typeof m.bond === 'object') ? m.bond : d.bond;
  m.dateIdx = (m.dateIdx && typeof m.dateIdx === 'object') ? m.dateIdx : d.dateIdx;
  m.memories = (m.memories && typeof m.memories === 'object') ? m.memories : {};
  for (var i = 0; i < SUITORS.length; i++) {
    var sid = SUITORS[i].id;
    if (typeof m.bond[sid] !== 'number') m.bond[sid] = 0;
    if (typeof m.dateIdx[sid] !== 'number') m.dateIdx[sid] = 0;
    m.bond[sid] = GF.clamp(m.bond[sid] | 0, 0, SUITORS[i].dates.length);
    m.dateIdx[sid] = GF.clamp(m.dateIdx[sid] | 0, 0, SUITORS[i].dates.length);
  }
  m.lastDaily = m.lastDaily | 0;
  m.seenTut = m.seenTut | 0;
  return m;
}
function saveMeta() {
  try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch (e) {}
}
function totalBond() {
  var t = 0;
  for (var i = 0; i < SUITORS.length; i++) t += meta.bond[SUITORS[i].id] | 0;
  return t;
}
function dayNumber() { return Math.floor(Date.now() / 86400000); }
function suitorUnlocked(s) { return totalBond() >= s.unlockBond; }

// ── DECK BUILD (from owned cards; each owned card = one deck entry, leveled) ─
// The HAND for a date is drawn from this deck. More/upgraded cards = stronger.
function buildDeck() {
  var deck = [];
  for (var id in meta.owned) {
    if (!meta.owned.hasOwnProperty(id)) continue;
    var c = cardById(id);
    if (!c) continue;
    var lvl = meta.owned[id] | 0;
    if (lvl < 1) continue;
    deck.push({ id: id, lvl: lvl });
  }
  return deck;
}
function cardChem(id, lvl) {
  var c = cardById(id); if (!c) return 0;
  // each level above 1 adds +25% of base
  return Math.round(c.chem * (1 + 0.25 * (lvl - 1)));
}

// ════════════════════════════════════════════════════════════════════════
//  LAYOUT — a centred "content column" so the portrait-first UI never
//  stretches edge-to-edge on a wide desktop. Everything draws inside
//  [LZ.x .. LZ.x+LZ.w]; on a phone that is the full width, on desktop it is
//  a capped, centred band that reads like a phone screen.
// ════════════════════════════════════════════════════════════════════════
var LZ = { x: 0, w: 0, scale: 1 };
function layout() {
  var W = GF.W, H = GF.H;
  // cap the content column to a phone-ish aspect; never wider than the viewport.
  // ABSOLUTE px cap (not * GF.S) so a 4K display still gets a phone-width band.
  var maxW = Math.min(W, H * 0.62, 560);
  // floor so very small viewports still use full width
  maxW = Math.max(maxW, Math.min(W, 320));
  LZ.w = Math.min(W, maxW);
  LZ.x = (W - LZ.w) / 2;
  LZ.scale = LZ.w / 393;   // 1 unit == 1px at the 393 design width
}
// shorthand: a unit scaled to the content column (use for paddings/sizes that
// should track the column, not the full viewport).
function U(v) { return v * LZ.scale; }
// horizontal helpers inside the content column
function LX(frac) { return LZ.x + LZ.w * frac; }      // fraction of column -> x
function LCX() { return LZ.x + LZ.w / 2; }            // column centre x

// ════════════════════════════════════════════════════════════════════════
//  SCROLL VIEW — smooth, clamped vertical scrolling for any screen whose
//  content can exceed the viewport (the Memories gallery). Touch-drag +
//  mouse-wheel, momentum, hard clamp to [0..max], a fade at the top/bottom
//  edges and a slim scrollbar so the player knows there is more.
// ════════════════════════════════════════════════════════════════════════
var scroll = {
  key: null,        // which screen owns the current scroll
  y: 0,             // current offset (>=0, scrolls content UP)
  max: 0,           // max offset (contentH - viewH), >=0
  vel: 0,           // momentum velocity (px/s)
  dragging: false,  // a pointer drag is in progress
  startY: 0,        // pointer start (client px)
  startOff: 0,      // scroll.y at drag start
  lastY: 0,         // last pointer y (for velocity)
  lastT: 0,         // last move time
  moved: 0,         // total |dy| during this gesture (for tap-vs-drag)
};
// (re)bind the scroll context for a screen. Resets offset when switching screens.
function scrollBegin(key, viewTop, viewH, contentH) {
  if (scroll.key !== key) { scroll.key = key; scroll.y = 0; scroll.vel = 0; scroll.dragging = false; }
  scroll.viewTop = viewTop; scroll.viewH = viewH;
  scroll.max = Math.max(0, contentH - viewH);
  scroll.y = GF.clamp(scroll.y, 0, scroll.max);
  return scroll.y;
}
function scrollUpdate(dt) {
  if (scroll.dragging) return;
  if (Math.abs(scroll.vel) > 1) {
    scroll.y += scroll.vel * dt;
    scroll.vel *= Math.pow(0.0025, dt);   // friction
    if (scroll.y < 0) { scroll.y = 0; scroll.vel = 0; }
    else if (scroll.y > scroll.max) { scroll.y = scroll.max; scroll.vel = 0; }
  } else scroll.vel = 0;
}
// draw a slim scrollbar + top/bottom fade so "there is more" is obvious.

// ── START A DATE for a given suitor ───────────────────────────────────────
function startDate(suitor) {
  sx.suitor = suitor;
  var di = GF.clamp(meta.dateIdx[suitor.id] | 0, 0, suitor.dates.length - 1);
  // if all dates done, replay the last for grinding bond/stardust
  if ((meta.dateIdx[suitor.id] | 0) >= suitor.dates.length) di = suitor.dates.length - 1;
  sx.dateRef = suitor.dates[di];
  sx.curDateIdx = di;
  sx.moment = 0;
  sx.moodNow = sx.dateRef.script[0];
  sx.bond = 0;
  sx.combo = 0;
  sx.lineSeed = (Date.now() / 7 | 0);
  sx.lastJudge = '';
  sx.momentScored = false;
  sx.playing = true;
  sx.anim = 0;
  // build + shuffle draw pile from deck, deal a hand of up to 4
  var deck = buildDeck();
  shuffle(deck);
  sx.drawPile = deck.slice();
  sx.hand = [];
  for (var i = 0; i < 4 && sx.drawPile.length; i++) sx.hand.push(sx.drawPile.shift());
  gs = 'DATE';
  GF.gameStarted();
}
function shuffle(a) { for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } }

function drawOne() {
  if (!sx.drawPile.length) {
    // reshuffle the deck back in if exhausted (so hand never starves)
    var deck = buildDeck(); shuffle(deck); sx.drawPile = deck;
  }
  if (sx.drawPile.length) return sx.drawPile.shift();
  return null;
}

// ── PLAY A CARD at the current moment ─────────────────────────────────────
function playCard(handIdx) {
  if (gs !== 'DATE' || !sx.playing || sx.momentScored) return;
  if (handIdx < 0 || handIdx >= sx.hand.length) return;
  var entry = sx.hand[handIdx];
  var c = cardById(entry.id);
  if (!c) return;
  var mood = sx.moodNow;
  var base = cardChem(entry.id, entry.lvl);
  var judge, gained, col;
  if (c.p === mood) { judge = 'perfect'; gained = base * 2; col = '#ff5fa2'; }
  else if (c.s === mood) { judge = 'good'; gained = Math.round(base * 1.1); col = '#ffb3d1'; }
  else { judge = 'weak'; gained = Math.round(base * 0.25); col = '#8aa0c0'; }

  // combo: perfect/good extend it, weak resets
  if (judge === 'weak') { sx.combo = 0; }
  else { sx.combo++; }
  var mult = comboMult(sx.combo);
  gained = Math.round(gained * mult);
  sx.bond += gained;
  sx.lastJudge = judge;
  sx.lastJudgeT = 0.0;
  sx.momentScored = true;

  // juice
  if (judge === 'perfect') { GF.sfx('reward'); GF.setShake(0.6); sparkBurst(col, 26); blush(); }
  else if (judge === 'good') { GF.sfx('coin'); sparkBurst(col, 14); }
  else { GF.sfx('error'); }
  GF.spawnFloat(GF.cx, GF.H * 0.46, '+' + gained, col);
  if (sx.combo >= 2 && judge !== 'weak') GF.spawnFloat(GF.cx, GF.H * 0.40, 'x' + mult.toFixed(1) + ' ' + GF.t('combo'), '#ffd76b');

  // remove the played card, draw a replacement
  sx.hand.splice(handIdx, 1);
  var nc = drawOne(); if (nc) sx.hand.push(nc);

  // advance after a short beat
  sx.advanceT = 0.0;
}
function comboMult(combo) {
  if (combo <= 1) return 1;
  return 1 + (combo - 1) * 0.5;  // x1, x1.5, x2, x2.5 ...
}

function advanceMoment() {
  sx.moment++;
  sx.momentScored = false;
  sx.lineSeed = (sx.lineSeed + 17) % 9973;
  if (sx.moment >= sx.dateRef.script.length) {
    endDate();
    return;
  }
  sx.moodNow = sx.dateRef.script[sx.moment];
  sx.anim = 0;
}

function endDate() {
  sx.playing = false;
  var won = sx.bond >= sx.dateRef.need;
  sx.dateWon = won;
  gs = 'RESULT';
  GF.gameEnded();
  if (won) {
    GF.sfx('win');
    // bond level up + unlock vignette + advance to next date if this was the current
    var s = sx.suitor;
    var wasIdx = meta.dateIdx[s.id] | 0;
    if (sx.curDateIdx === wasIdx && wasIdx < s.dates.length) {
      meta.bond[s.id] = Math.min(s.dates.length, (meta.bond[s.id] | 0) + 1);
      meta.dateIdx[s.id] = Math.min(s.dates.length, wasIdx + 1);
      meta.memories[s.id + ':' + sx.curDateIdx] = 1;
    }
    // reward: stardust + chance of a ticket
    var reward = 14 + sx.curDateIdx * 4;
    meta.stardust += reward;
    sx.rewardDust = reward;
    sx.rewardTicket = 0;
    if (Math.random() < 0.5) { meta.tickets += 1; sx.rewardTicket = 1; }
    if (sx.bond > sx.best) sx.best = sx.bond;
    saveMeta();
    // celebration
    celebrate.active = true; celebrate.t = 0; celebrate.suitor = s;
    celebrate.line = (GF.lang === 'ru' ? sx.dateRef.ru : sx.dateRef.en);
  } else {
    GF.sfx('lose');
    sx.rewardDust = 6; sx.rewardTicket = 0;
    meta.stardust += 6;  // small consolation so a loss isn't a dead end
    saveMeta();
  }
}

// ── SUMMON (gacha) — adds a card to the collection AND the deck ────────────
var PULL_COST = 30;
function rollRarity() {
  var r = Math.random();
  if (r < 0.08) return 3;      // epic 8%
  if (r < 0.35) return 2;      // rare 27%
  return 1;                    // common 65%
}
function pickCardOfRarity(rar) {
  var pool = CARDS.filter(function (c) { return c.rar === rar; });
  if (!pool.length) pool = CARDS;
  return pool[Math.floor(Math.random() * pool.length)];
}
function doSummon(payWith) {
  if (payWith === 'dust') {
    if (meta.stardust < PULL_COST) return false;
    meta.stardust -= PULL_COST;
  } else if (payWith === 'ticket') {
    if (meta.tickets < 1) return false;
    meta.tickets -= 1;
  }
  // payWith === 'free' debits nothing (daily bonus pull)
  var rar = rollRarity();
  var c = pickCardOfRarity(rar);
  var dupe = !!meta.owned[c.id];
  if (dupe) meta.owned[c.id] = Math.min(8, (meta.owned[c.id] | 0) + 1);
  else meta.owned[c.id] = 1;
  saveMeta();
  reveal.active = true; reveal.t = 0; reveal.card = c; reveal.dupe = dupe; reveal.lvl = meta.owned[c.id];
  GF.sfx(rar >= 3 ? 'evolve' : (rar >= 2 ? 'unlock' : 'levelup'));
  sparkBurst(RAR_COL[rar], rar >= 3 ? 40 : 22);
  return true;
}

// ── DAILY CALL ────────────────────────────────────────────────────────────
function dailyReady() { return meta.lastDaily !== dayNumber(); }
function claimDaily() {
  if (!dailyReady()) return false;
  meta.lastDaily = dayNumber();
  meta.tickets += 1;       // net +1 Call (the bonus summon below does NOT debit it)
  meta.stardust += 20;
  saveMeta();
  banner.t = 4.0; banner.text = GF.t('dailyGot');
  GF.sfx('reward');
  // free bonus summon (debits nothing — the +1 Call ticket is kept)
  doSummon('free');
  return true;
}

// ── rewarded-ad -> +1 Call (free bonus currency, never gates progression) ──
var _adBusy = false;
function watchAdForTicket() {
  if (_adBusy) return;
  _adBusy = true;
  GF.showAd('rewarded').then(function (res) {
    _adBusy = false;
    // grant on any shown ad: this is a free bonus, and Yandex fullscreen ads
    // report rewarded:false even when watched, so we credit on `shown`.
    if (res && (res.rewarded || res.shown)) {
      meta.tickets += 1; saveMeta();
      banner.t = 3.5; GF.sfx('reward');
    }
  }).catch(function () { _adBusy = false; });
}

// ════════════════════════════════════════════════════════════════════════
//  JUICE helpers

var hearts = [];   // floating hearts on bond-up
function blush() {
  for (var i = 0; i < 8; i++) hearts.push({ x: GF.cx + (Math.random() - 0.5) * GF.W * 0.5,
    y: GF.H * 0.55 + Math.random() * 40, vy: -(0.6 + Math.random() * 1.4) * GF.S,
    s: (8 + Math.random() * 10) * GF.S, life: 1, rot: Math.random() * 6 });

//  ASSETS (runtime-loaded WebP from ./assets; graceful canvas fallback)
// ════════════════════════════════════════════════════════════════════════
var IMG = {};
var IMG_KEYS = ['suitor_orion', 'suitor_kai', 'suitor_soren', 'bg_deck', 'bg_promenade', 'bg_garden', 'bg_cockpit',
  'card_coffee', 'card_music', 'card_starmap', 'card_plush', 'card_telescope', 'card_flowers', 'card_gift', 'card_rose'];
function loadAssets(done) {
  var n = IMG_KEYS.length, loaded = 0;
  if (!n) { done(); return; }
  IMG_KEYS.forEach(function (k) {
    var im = new Image();
    im.onload = function () { IMG[k] = im; if (++loaded >= n) done(); };
    im.onerror = function () { IMG[k] = null; if (++loaded >= n) done(); };
    im.src = './assets/' + k + '.webp';
  });
}
function hasImg(k) { var i = IMG[k]; return i && i.complete && i.naturalWidth > 0; }

// draw an image cover-fit into a rect (crop to fill)
function drawCover(c, k, x, y, w, h, fallback) {

    var ir = im.naturalWidth / im.naturalHeight, rr2 = w / h, sw, sh, sxx, syy;
    if (ir > rr2) { sh = im.naturalHeight; sw = sh * rr2; sxx = (im.naturalWidth - sw) / 2; syy = 0; }
    else { sw = im.naturalWidth; sh = sw / rr2; sxx = 0; syy = (im.naturalHeight - sh) / 2; }
    c.drawImage(im, sxx, syy, sw, sh, x, y, w, h);

}
var missingArt = [];   // flagged at boot

// ════════════════════════════════════════════════════════════════════════
//  RENDER — main draw dispatch
// ════════════════════════════════════════════════════════════════════════
var clickRects = [];   // {x,y,w,h,fn} rebuilt each frame for hit-testing
var T = 0;             // global time

function draw(c, dt) {
  T += dt;
  layout();
  // If the active screen does not own the scroll context, force max=0 so a stale
  // value from a previous screen can't swallow taps. A scrolling screen claims it
  // by calling scrollBegin(gs, ...) which sets scroll.key === gs.
  if (scroll.key !== gs) scroll.max = 0;
  scrollUpdate(dt);
  var W = GF.W, H = GF.H;
  clickRects = [];
  // base space gradient
  var g = c.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#140a26'); g.addColorStop(0.5, '#0d0a1e'); g.addColorStop(1, '#0a0716');
  c.fillStyle = g; c.fillRect(0, 0, W, H);
  drawStars(c, W, H);

  if (gs === 'DATE') drawDateScreen(c, dt);
  else if (gs === 'RESULT') drawResult(c, dt);
  else if (gs === 'SUITORS') drawSuitors(c, dt);
  else if (gs === 'COLLECTION') drawCollection(c, dt);
  else if (gs === 'SUMMON') drawSummon(c, dt);

  // floating hearts above everything except overlays
  updateHearts(dt);
  for (var i = 0; i < hearts.length; i++) drawHeart(c, hearts[i].x, hearts[i].y, hearts[i].s, '#ff7aa8', Math.max(0, hearts[i].life));

  // summon reveal overlay (on top of any screen)
  if (reveal.active) drawReveal(c, dt);
  // bond celebration overlay
  if (celebrate.active) drawCelebrate(c, dt);

  // daily banner
  if (banner.t > 0) { banner.t -= dt; drawBanner(c); }

  // mute button (top-right) on every screen

}

// starfield

  for (var j = 0; j < STARS.length; j++) {

  var top = U(12), barH = U(18), barY = top;
  var barX = LZ.x + U(72), barW = LZ.w - U(72) - U(40);
  // bond progress vs need
  var frac = GF.clamp(sx.bond / sx.dateRef.need, 0, 1);
  c.fillStyle = 'rgba(10,8,22,0.85)'; GF.rr(c, barX, barY, barW, barH, barH / 2); c.fill();
  var bg = c.createLinearGradient(barX, 0, barX + barW, 0);
  bg.addColorStop(0, '#ff7aa8'); bg.addColorStop(1, '#ff4f8b');
  c.fillStyle = bg; GF.rr(c, barX, barY, barW * frac, barH, barH / 2); c.fill();
  // label
  c.font = 'bold ' + clampF(U(11), 9, 14) + 'px Inter, system-ui, sans-serif';
  c.textAlign = 'left'; c.fillStyle = '#fff'; c.textBaseline = 'middle';
  c.fillText(GF.t('bond') + '  ' + Math.round(sx.bond) + ' / ' + sx.dateRef.need, barX + U(12), barY + barH / 2 + 1);
  c.textAlign = 'right';
  // moments pip
  c.fillText((sx.moment + (sx.momentScored ? 1 : 0)) + ' / ' + sx.dateRef.script.length, barX + barW - U(12), barY + barH / 2 + 1);
  c.textBaseline = 'alphabetic';
  // combo badge
  if (sx.combo >= 2) {
    var cb = 'x' + comboMult(sx.combo).toFixed(1);
    c.font = 'bold ' + clampF(U(15), 12, 20) + 'px Inter, system-ui, sans-serif';
    c.textAlign = 'center'; c.fillStyle = '#ffd76b';
    c.save(); c.shadowColor = '#ffd76b'; c.shadowBlur = 12 * S;
    c.fillText(GF.t('combo') + ' ' + cb, LCX(), barY + barH + U(18)); c.restore();
  }
}

// the player's hand of cards along the bottom
function drawHand(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  var n = sx.hand.length;
  var bottomPad = U(14);
  var cardH = H * 0.20, cardW = cardH * 0.70;
  var gap = U(8);
  var totalW = n * cardW + (n - 1) * gap;
  // fit within the content column (so cards don't sprawl on desktop)
  var avail = LZ.w - U(16);
  if (totalW > avail) { var sc = avail / totalW; cardW *= sc; cardH *= sc; totalW = n * cardW + (n - 1) * gap; }
  var startX = LCX() - totalW / 2;
  var y = H - cardH - bottomPad;
  // prompt above hand
  c.textAlign = 'center'; c.fillStyle = 'rgba(231,236,255,0.7)';
  c.font = clampF(U(11), 9, 14) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('play_a_card'), LCX(), y - U(8));

  for (var i = 0; i < n; i++) {
    var e = sx.hand[i];
    var card = cardById(e.id);
    var x = startX + i * (cardW + gap);
    var hover = (sx._hoverIdx === i);
    var yy = y - (hover ? U(8) : 0);
    drawCardFace(c, card, e.lvl, x, yy, cardW, cardH, sx.moodNow);
    if (sx.playing && !sx.momentScored) {
      (function (idx) { pushRect(x, yy, cardW, cardH, function () { sx._hoverIdx = idx; playCard(idx); }); })(i);
    }
  }
}

// draw a single card (art + tags + level + rarity frame).
// Internals scale with the CARD WIDTH (cs) so text reads well at any card size
// (date hand vs collection grid vs reveal), independent of the viewport (Codex review).
function drawCardFace(c, card, lvl, x, y, w, h, moodNow) {
  var S = GF.S;
  if (!card) return;
  var cs = w / 78;   // card-local scale (78px ~= the date-hand reference width)
  var rcol = RAR_COL[card.rar];
  // does this card match the current mood? (hint glow)
  var match = moodNow && (card.p === moodNow ? 2 : card.s === moodNow ? 1 : 0);
  c.save();
  if (match === 2) { c.shadowColor = '#ff5fa2'; c.shadowBlur = 16 * S; }
  else if (match === 1) { c.shadowColor = '#ffb3d1'; c.shadowBlur = 9 * S; }
  c.fillStyle = '#161228';
  GF.rr(c, x, y, w, h, 10 * cs); c.fill();
  c.restore();
  // art area
  var artH = h * 0.60;
  c.save();
  GF.rr(c, x + 4 * cs, y + 4 * cs, w - 8 * cs, artH, 7 * cs); c.clip();
  drawCover(c, card.art, x + 4 * cs, y + 4 * cs, w - 8 * cs, artH, function (cc, ax, ay, aw, ah) {
    var gg = cc.createLinearGradient(ax, ay, ax, ay + ah); gg.addColorStop(0, rcol + '66'); gg.addColorStop(1, '#0d0a1e');
    cc.fillStyle = gg; cc.fillRect(ax, ay, aw, ah);
    // small generic icon
    drawCardGlyph(cc, card.id, ax + aw / 2, ay + ah / 2, Math.min(aw, ah) * 0.3);
  });
  c.restore();
  // name
  c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  var fz = clampF(11 * cs, 8, 15);
  c.font = 'bold ' + fz + 'px Inter, system-ui, sans-serif';
  var nm = cardName(card);
  // shrink name to fit
  while (c.measureText(nm).width > w - 8 * cs && fz > 7) { fz--; c.font = 'bold ' + fz + 'px Inter, system-ui, sans-serif'; }
  c.fillText(nm, x + w / 2, y + artH + 16 * cs);
  // tag chips (primary + secondary)
  var tagY = y + artH + 24 * cs;
  drawTagChip(c, card.p, x + w * 0.27, tagY, true, cs);
  drawTagChip(c, card.s, x + w * 0.73, tagY, false, cs);
  // rarity + level corner
  c.fillStyle = rcol; c.textAlign = 'left';
  c.font = 'bold ' + clampF(10 * cs, 7, 13) + 'px Inter, system-ui, sans-serif';
  if (lvl > 1) { c.textAlign = 'right'; c.fillStyle = '#ffd76b'; c.fillText(GF.t('lv') + lvl, x + w - 6 * cs, y + h - 6 * cs); }
  // rarity frame
  c.lineWidth = Math.max(1.5, 2 * cs); c.strokeStyle = rcol;
  GF.rr(c, x, y, w, h, 10 * cs); c.stroke();
}

function drawTagChip(c, mood, cx, cy, primary, cs) {
  var S = GF.S, r = 7 * (cs || 1);
  c.save();
  drawMoodIcon(c, mood, cx, cy, r, false);
  c.restore();
}

// mood icon — vector glyph per mood (NO emoji)
function drawMoodIcon(c, mood, cx, cy, r, filled) {
  var col = MOOD_COL[mood];
  c.save(); c.translate(cx, cy);
  c.lineWidth = Math.max(1.4, r * 0.22); c.lineJoin = 'round'; c.lineCap = 'round';
  c.strokeStyle = col; c.fillStyle = col;
  if (filled) { c.globalAlpha = 0.18; c.beginPath(); c.arc(0, 0, r * 1.45, 0, Math.PI * 2); c.fill(); c.globalAlpha = 1; }
  if (mood === 'playful') {
    // wink + grin
    c.beginPath(); c.arc(-r * 0.4, -r * 0.2, r * 0.16, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.moveTo(r * 0.18, -r * 0.35); c.lineTo(r * 0.6, -r * 0.2); c.stroke();
    c.beginPath(); c.arc(0, r * 0.05, r * 0.55, 0.15 * Math.PI, 0.85 * Math.PI); c.stroke();
  } else if (mood === 'tender') {
    drawHeart(c, 0, -r * 0.2, r * 1.5, col, 1);
  } else if (mood === 'adventurous') {
    // upward arrow / spark
    c.beginPath(); c.moveTo(0, r * 0.7); c.lineTo(0, -r * 0.7); c.moveTo(-r * 0.4, -r * 0.25); c.lineTo(0, -r * 0.7); c.lineTo(r * 0.4, -r * 0.25); c.stroke();
  } else if (mood === 'curious') {
    // question-ish swirl
    c.beginPath(); c.arc(0, -r * 0.15, r * 0.45, -0.4 * Math.PI, 1.1 * Math.PI); c.stroke();
    c.beginPath(); c.arc(0, r * 0.62, r * 0.12, 0, Math.PI * 2); c.fill();
  } else if (mood === 'shy') {
    // small blush dots + downward gentle curve
    c.beginPath(); c.arc(-r * 0.45, r * 0.1, r * 0.14, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(r * 0.45, r * 0.1, r * 0.14, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(0, r * 0.05, r * 0.5, 1.15 * Math.PI, 1.85 * Math.PI); c.stroke();
  }
  c.restore();
}

// generic card glyph fallback (when no art) — drawn per card id
function drawCardGlyph(c, id, cx, cy, r) {
  c.save(); c.translate(cx, cy); c.strokeStyle = '#fff'; c.fillStyle = '#fff'; c.lineWidth = 2; c.globalAlpha = 0.85;
  c.lineJoin = 'round'; c.lineCap = 'round';
  if (id === 'coffee') { c.strokeRect(-r * 0.6, -r * 0.4, r * 1.0, r * 0.9); c.beginPath(); c.arc(r * 0.55, 0, r * 0.3, -1.2, 1.2); c.stroke(); }
  else if (id === 'music') { c.beginPath(); c.arc(-r * 0.3, r * 0.4, r * 0.3, 0, 6.3); c.stroke(); c.beginPath(); c.moveTo(0, r * 0.4); c.lineTo(0, -r * 0.6); c.lineTo(r * 0.5, -r * 0.4); c.stroke(); }
  else if (id === 'starmap' || id === 'telescope') { for (var i = 0; i < 5; i++) { var a = i / 5 * 6.28; c.beginPath(); c.arc(Math.cos(a) * r * 0.5, Math.sin(a) * r * 0.5, r * 0.08, 0, 6.3); c.fill(); } }
  else if (id === 'plush') { c.beginPath(); c.arc(0, 0, r * 0.6, 0, 6.3); c.stroke(); c.beginPath(); c.arc(-r * 0.25, -r * 0.1, r * 0.08, 0, 6.3); c.fill(); c.beginPath(); c.arc(r * 0.25, -r * 0.1, r * 0.08, 0, 6.3); c.fill(); }
  else if (id === 'flowers' || id === 'rose') { drawHeart(c, 0, 0, r * 1.6, '#fff', 0.85); }
  else { c.strokeRect(-r * 0.5, -r * 0.5, r, r); }
  c.restore();
}

// ── fallback suitor portrait (stylized silhouette) when art missing ──
function drawSuitorFallback(c, x, y, w, h, su) {
  var gg = c.createLinearGradient(x, y, x, y + h);
  gg.addColorStop(0, su.accent + '88'); gg.addColorStop(1, '#1a1230');
  c.fillStyle = gg; c.fillRect(x, y, w, h);
  // head + shoulders silhouette
  c.fillStyle = 'rgba(10,8,22,0.55)';
  c.beginPath(); c.arc(x + w / 2, y + h * 0.34, w * 0.20, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.moveTo(x + w * 0.18, y + h); c.quadraticCurveTo(x + w / 2, y + h * 0.5, x + w * 0.82, y + h); c.closePath(); c.fill();
  c.fillStyle = '#fff'; c.globalAlpha = 0.6; c.textAlign = 'center';
  c.font = 'bold ' + (16 * GF.S) + 'px Inter, sans-serif';
  c.fillText('?', x + w / 2, y + h * 0.36); c.globalAlpha = 1;
}

// ════════════════════════════════════════════════════════════════════════
//  RESULT SCREEN
// ════════════════════════════════════════════════════════════════════════
function drawResult(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  // dim the date behind
  c.fillStyle = 'rgba(8,6,18,0.86)'; c.fillRect(0, 0, W, H);
  var won = sx.dateWon;
  var su = sx.suitor;
  var cy = H * 0.30;
  var ccx = LCX();
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.save();
  c.shadowColor = won ? '#ff5fa2' : '#5a6a8a'; c.shadowBlur = 26 * S;
  c.font = 'bold ' + clampF(U(34), 24, 50) + 'px Inter, system-ui, sans-serif';
  c.fillStyle = won ? '#ff7aa8' : '#aeb6d0';
  c.fillText(GF.t(won ? 'win_title' : 'lose_title'), ccx, cy);
  c.restore();

  // suitor portrait small
  var pw = Math.min(LZ.w * 0.34, U(150)), ph = pw * 1.2, px = ccx - pw / 2, py = cy + U(24);
  c.save(); GF.rr(c, px, py, pw, ph, U(16)); c.clip();
  drawCover(c, su.art, px, py, pw, ph, function (cc, ax, ay, aw, ah) { drawSuitorFallback(cc, ax, ay, aw, ah, su); });
  c.restore();
  c.lineWidth = 2 * S; c.strokeStyle = su.accent + 'aa'; GF.rr(c, px, py, pw, ph, U(16)); c.stroke();

  var yy = py + ph + U(30);
  c.fillStyle = '#e7ecff'; c.font = clampF(U(15), 12, 19) + 'px Inter, system-ui, sans-serif';
  var msg = won ? GF.t('winBond') : GF.t('loseTryAgain');
  wrapText(c, msg, ccx, yy, LZ.w * 0.84, clampF(U(20), 15, 24), true);
  yy += clampF(U(46), 36, 56);

  // chemistry total + bond level row
  c.fillStyle = '#ff9ec0'; c.font = 'bold ' + clampF(U(18), 14, 24) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('chem') + ': ' + Math.round(sx.bond), ccx, yy); yy += clampF(U(28), 22, 34);
  if (won) {
    c.fillStyle = '#ffd76b'; c.font = 'bold ' + clampF(U(15), 12, 20) + 'px Inter, system-ui, sans-serif';
    var rline = '+' + sx.rewardDust + ' ' + GF.t('stardust');
    if (sx.rewardTicket) rline += '   +1 ' + GF.t('tickets');
    c.fillText(rline, ccx, yy); yy += clampF(U(26), 20, 32);
    c.fillStyle = '#ff7aa8'; c.font = 'bold ' + clampF(U(15), 12, 20) + 'px Inter, system-ui, sans-serif';
    c.fillText(GF.t('bondLv') + ' ' + (meta.bond[su.id] | 0) + ' / ' + su.dates.length, ccx, yy); yy += clampF(U(26), 20, 32);
  } else {
    c.fillStyle = '#9fb0d0'; c.font = clampF(U(13), 11, 17) + 'px Inter, system-ui, sans-serif';
    c.fillText('+' + sx.rewardDust + ' ' + GF.t('stardust'), ccx, yy); yy += clampF(U(26), 20, 32);
  }

  // buttons: play next moment / retry, then back to hub
  var bw = LZ.w - U(32), bh = clampF(U(54), 44, 66);
  var bx = ccx - bw / 2, by = H - bh * 2.4 - U(16);
  bigButton(c, bx, by, bw, bh, won ? GF.t('cont') : GF.t('retry'), su.accent, function () {
    if (won) { gs = 'SUITORS'; prevScreen = 'SUITORS'; }
    else { startDate(su); }
  });
  var by2 = by + bh + 14 * S;
  smallButton(c, bx, by2, bw, bh * 0.82, GF.t('collection'), function () { openScreen('COLLECTION'); });
}

// ════════════════════════════════════════════════════════════════════════
//  SUITORS (hub) — choose who to date + see bond + open meta
// ════════════════════════════════════════════════════════════════════════
function drawSuitors(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  c.fillStyle = 'rgba(8,6,18,0.5)'; c.fillRect(0, 0, W, H);
  // header (title + subtitle), divider
  var top = clampF(U(16), 12, 26);
  c.textAlign = 'center'; c.fillStyle = '#fff';
  c.save(); c.shadowColor = '#ff5fa2'; c.shadowBlur = 18 * S;
  var tfz = clampF(U(24), 18, 32);
  c.font = 'bold ' + tfz + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('title'), LCX(), top + tfz); c.restore();
  c.fillStyle = '#b9a6d0'; c.font = clampF(U(12), 10, 15) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('chooseSuitor'), LCX(), top + tfz + U(20));

  // currency strip
  var curY = top + tfz + U(32);
  drawCurrencyStrip(c, curY);

  // hub nav fixed at the bottom; suitor list fills the space between.
  var nav = hubNavMetrics();
  var listTop = curY + U(40);
  var listBot = nav.y - U(10);
  var pad = U(16);
  var rowGap = U(12);
  var rowH = GF.clamp((listBot - listTop - rowGap * (SUITORS.length - 1)) / SUITORS.length, U(78), U(120));
  // vertically centre the list if there's slack (looks intentional on tall screens)
  var listH = rowH * SUITORS.length + rowGap * (SUITORS.length - 1);
  var y0 = listTop + Math.max(0, (listBot - listTop - listH) / 2);

  for (var i = 0; i < SUITORS.length; i++) {
    var su = SUITORS[i];
    var y = y0 + i * (rowH + rowGap);
    var x = LZ.x + pad, w = LZ.w - pad * 2;
    var unlocked = suitorUnlocked(su);
    c.save();
    c.fillStyle = unlocked ? 'rgba(26,20,46,0.95)' : 'rgba(18,16,30,0.9)';
    c.shadowColor = unlocked ? su.accent + '55' : 'rgba(0,0,0,0)'; c.shadowBlur = 14 * S;
    GF.rr(c, x, y, w, rowH, U(16)); c.fill();
    c.restore();
    c.lineWidth = 2 * S; c.strokeStyle = unlocked ? su.accent + 'aa' : '#33304a';
    GF.rr(c, x, y, w, rowH, U(16)); c.stroke();

    // portrait thumb
    var ps = rowH - U(16), ppx = x + U(8), ppy = y + U(8);
    c.save(); GF.rr(c, ppx, ppy, ps * 0.82, ps, U(10)); c.clip();
    drawCover(c, su.art, ppx, ppy, ps * 0.82, ps, function (cc, ax, ay, aw, ah) { drawSuitorFallback(cc, ax, ay, aw, ah, su); });
    if (!unlocked) { c.fillStyle = 'rgba(8,6,18,0.7)'; c.fillRect(ppx, ppy, ps * 0.82, ps); }
    c.restore();

    var tx = ppx + ps * 0.82 + U(14);
    if (unlocked) {
      c.textAlign = 'left'; c.fillStyle = '#fff';
      c.font = 'bold ' + clampF(U(18), 14, 24) + 'px Inter, system-ui, sans-serif';
      c.fillText(suitorName(su), tx, y + U(26));
      c.fillStyle = '#b9a6d0'; c.font = clampF(U(12), 10, 15) + 'px Inter, system-ui, sans-serif';
      c.fillText(suitorRole(su), tx, y + U(44));
      // bond hearts
      var maxB = su.dates.length, b = meta.bond[su.id] | 0;
      for (var k = 0; k < maxB; k++) {
        drawHeart(c, tx + U(8) + k * U(18), y + rowH - U(18), U(13), k < b ? '#ff5fa2' : '#3a3454', 1);
      }
      // date status (right)
      c.fillStyle = '#9fb0d0'; c.textAlign = 'right'; c.font = clampF(U(11), 9, 14) + 'px Inter, system-ui, sans-serif';
      var done = (meta.dateIdx[su.id] | 0) >= su.dates.length;
      c.fillText(done ? GF.t('bondMax') : (GF.t('date') + ' ' + ((meta.dateIdx[su.id] | 0) + 1)), x + w - U(14), y + U(26));
      // tap-to-date cue (a pill, so the touch affordance reads clearly)
      c.fillStyle = su.accent; c.textAlign = 'right'; c.font = 'bold ' + clampF(U(12), 10, 15) + 'px Inter, system-ui, sans-serif';
      c.fillText(GF.t('tapToDate') + '  >', x + w - U(14), y + rowH - U(16));
      (function (s) { pushRect(x, y, w, rowH, function () { startDate(s); }); })(su);
    } else {
      c.textAlign = 'left'; c.fillStyle = '#6a6488';
      c.font = 'bold ' + clampF(U(15), 12, 20) + 'px Inter, system-ui, sans-serif';
      c.fillText(GF.t('locked'), tx, y + rowH / 2 - U(4));
      c.font = clampF(U(11), 9, 14) + 'px Inter, system-ui, sans-serif'; c.fillStyle = '#8a82a8';
      c.fillText(GF.t('unlockAt') + ' ' + su.unlockBond + ' (' + totalBond() + ')', tx, y + rowH / 2 + U(16));
    }
  }

  // bottom nav: Summon, Daily, Collection
  drawHubNav(c);
}

// two compact currency chips, sized to their content and centred as a pair.
function drawCurrencyStrip(c, y) {
  var S = GF.S;
  var chipH = U(30), iconR = U(8), padL = U(14), padR = U(14), iconGap = U(8);
  c.textBaseline = 'middle';
  var fz = clampF(U(13), 11, 16);
  c.font = 'bold ' + fz + 'px Inter, system-ui, sans-serif';
  var dustTxt = String(meta.stardust);
  var tixTxt = meta.tickets + ' ' + GF.t('tickets');
  var dustW = padL + iconR * 2 + iconGap + c.measureText(dustTxt).width + padR;
  var tixW = padL + iconR * 2 + iconGap + c.measureText(tixTxt).width + padR;
  var gap = U(10);
  var totalW = dustW + tixW + gap;
  var x0 = LCX() - totalW / 2;
  // stardust chip
  c.fillStyle = 'rgba(20,16,38,0.92)'; GF.rr(c, x0, y, dustW, chipH, chipH / 2); c.fill();
  c.lineWidth = 1.2 * S; c.strokeStyle = 'rgba(255,215,107,0.35)'; GF.rr(c, x0, y, dustW, chipH, chipH / 2); c.stroke();
  drawStardustIcon(c, x0 + padL + iconR, y + chipH / 2, iconR);
  c.fillStyle = '#ffd76b'; c.textAlign = 'left'; c.font = 'bold ' + fz + 'px Inter, system-ui, sans-serif';
  c.fillText(dustTxt, x0 + padL + iconR * 2 + iconGap, y + chipH / 2 + 1);
  // tickets chip
  var tx0 = x0 + dustW + gap;
  c.fillStyle = 'rgba(20,16,38,0.92)'; GF.rr(c, tx0, y, tixW, chipH, chipH / 2); c.fill();
  c.strokeStyle = 'rgba(159,230,255,0.35)'; GF.rr(c, tx0, y, tixW, chipH, chipH / 2); c.stroke();
  drawTicketIcon(c, tx0 + padL + iconR, y + chipH / 2, iconR);
  c.fillStyle = '#9fe6ff'; c.fillText(tixTxt, tx0 + padL + iconR * 2 + iconGap, y + chipH / 2 + 1);
  c.textBaseline = 'alphabetic';
}

function drawStardustIcon(c, x, y, r) {
  c.save(); c.translate(x, y); c.fillStyle = '#ffd76b'; c.shadowColor = '#ffd76b'; c.shadowBlur = 6;
  c.beginPath();
  for (var i = 0; i < 4; i++) { var a = i / 4 * Math.PI * 2 - Math.PI / 2; c.lineTo(Math.cos(a) * r, Math.sin(a) * r); var a2 = a + Math.PI / 4; c.lineTo(Math.cos(a2) * r * 0.4, Math.sin(a2) * r * 0.4); }
  c.closePath(); c.fill(); c.restore();
}
function drawTicketIcon(c, x, y, r) {
  c.save(); c.translate(x, y); c.fillStyle = '#9fe6ff';
  GF.rr(c, -r, -r * 0.6, r * 2, r * 1.2, r * 0.3); c.fill();
  c.fillStyle = '#0d0a1e'; c.beginPath(); c.arc(0, 0, r * 0.3, 0, Math.PI * 2); c.fill(); c.restore();
}

// compute the hub-nav rect (so the suitor list knows where to stop)
function hubNavMetrics() {
  var H = GF.H;
  var bh = clampF(U(56), 46, 70);
  var by = H - bh - clampF(U(14), 10, 22);
  return { y: by, h: bh };
}
function drawHubNav(c) {
  var nav = hubNavMetrics();
  var pad = U(16), gap = U(8);
  var bw = (LZ.w - pad * 2 - gap * 2) / 3;
  var x0 = LZ.x + pad, by = nav.y, bh = nav.h;
  navButton(c, x0, by, bw, bh, GF.t('summon'), '#ff8fc7', false, function () { openScreen('SUMMON'); });
  navButton(c, x0 + bw + gap, by, bw, bh, GF.t('daily'), '#ffd76b', dailyReady(), function () { openScreen('SUMMON'); if (dailyReady()) claimDaily(); });
  navButton(c, x0 + (bw + gap) * 2, by, bw, bh, GF.t('collection'), '#5fd0e6', false, function () { openScreen('COLLECTION'); });
}
function navButton(c, x, y, w, h, label, col, pulse, fn) {
  var S = GF.S;
  c.save();
  if (pulse) { var p = 0.5 + 0.5 * Math.sin(T * 4); c.shadowColor = col; c.shadowBlur = (10 + p * 14) * S; }
  c.fillStyle = 'rgba(24,18,42,0.95)'; GF.rr(c, x, y, w, h, U(14)); c.fill();
  c.restore();
  c.lineWidth = 2 * S; c.strokeStyle = col + (pulse ? 'ff' : '99'); GF.rr(c, x, y, w, h, U(14)); c.stroke();
  c.fillStyle = col; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'bold ' + clampF(U(13), 10, 17) + 'px Inter, system-ui, sans-serif';
  c.fillText(label, x + w / 2, y + h / 2 + 1);
  if (pulse) { c.fillStyle = '#ff5a5a'; c.beginPath(); c.arc(x + w - U(9), y + U(9), U(5), 0, Math.PI * 2); c.fill(); }
  c.textBaseline = 'alphabetic';
  pushRect(x, y, w, h, fn);
}

// ════════════════════════════════════════════════════════════════════════
//  COLLECTION (memory gallery)
// ════════════════════════════════════════════════════════════════════════
// ── unlocked date "moment" entries (suitorId + date index) for the gallery ──
function unlockedMemories() {
  var out = [];
  for (var i = 0; i < SUITORS.length; i++) {
    var su = SUITORS[i];
    for (var d = 0; d < su.dates.length; d++) {
      if (meta.memories[su.id + ':' + d]) out.push({ su: su, idx: d });
    }
  }
  return out;
}
function drawCollection(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  c.fillStyle = 'rgba(8,6,18,0.94)'; c.fillRect(0, 0, W, H);

  // ── fixed header bar ──
  var headerH = drawScreenHeader(c, GF.t('collection'), '#5fd0e6');
  // ── fixed bottom action bar ──
  var bottomBar = drawBottomBar(c, GF.t('backMenu'), function () { openScreen('SUITORS'); },
                                   GF.t('summon'), '#ff8fc7', function () { openScreen('SUMMON'); });

  // ── scroll viewport between header and bottom bar ──
  var vT = headerH, vH = bottomBar.y - headerH;
  var pad = U(16), colGap = U(10), sectGap = U(10);

  // ---- measure content height first (so scroll clamps correctly) ----
  // Memories row metrics
  var mems = unlockedMemories();
  var memCols = 2, memCW = (LZ.w - pad * 2 - colGap * (memCols - 1)) / memCols, memCH = memCW * 0.62;
  var memRows = mems.length ? Math.ceil(mems.length / memCols) : 1;
  var memBlockH = U(28) /*section title*/ + (mems.length ? memRows * (memCH + colGap) : U(54));
  // Cards grid metrics (3 per row, sized to the column so they stay phone-sized)
  var cardCols = 3, cardCW = (LZ.w - pad * 2 - colGap * (cardCols - 1)) / cardCols, cardCH = cardCW * 1.42;
  var cardRows = Math.ceil(CARDS.length / cardCols);
  var cardBlockH = U(28) + cardRows * (cardCH + colGap);
  var contentH = U(10) + memBlockH + sectGap + cardBlockH + U(16);

  scrollBegin('COLLECTION', vT, vH, contentH);

  // ---- draw, clipped to the viewport, translated by -scroll.y ----
  c.save();
  c.beginPath(); c.rect(LZ.x, vT, LZ.w, vH); c.clip();
  var oy = vT - scroll.y + U(10);

  // SECTION: Moments shared
  c.textAlign = 'left'; c.fillStyle = '#cfe8ff';
  c.font = 'bold ' + clampF(U(14), 12, 19) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('sec_memories'), LZ.x + pad, oy + U(16));
  // count pill on the right
  c.textAlign = 'right'; c.fillStyle = '#7f93b8'; c.font = clampF(U(11), 9, 14) + 'px Inter, system-ui, sans-serif';
  c.fillText(mems.length + ' / ' + totalDates(), LZ.x + LZ.w - pad, oy + U(16));
  oy += U(28);
  if (!mems.length) {
    c.textAlign = 'center'; c.fillStyle = '#7f93b8'; c.font = clampF(U(12), 10, 16) + 'px Inter, system-ui, sans-serif';
    wrapText(c, GF.t('no_memories'), LCX(), oy + U(22), LZ.w - pad * 2, clampF(U(16), 13, 20), true);
    oy += U(54);
  } else {
    for (var mi = 0; mi < mems.length; mi++) {
      var col = mi % memCols, row = (mi / memCols) | 0;
      var mx = LZ.x + pad + col * (memCW + colGap), my = oy + row * (memCH + colGap);
      drawMemoryCard(c, mems[mi].su, mems[mi].idx, mx, my, memCW, memCH);
    }
    oy += memRows * (memCH + colGap);
  }
  oy += sectGap;

  // SECTION: Your cards
  c.textAlign = 'left'; c.fillStyle = '#ffd9ef';
  c.font = 'bold ' + clampF(U(14), 12, 19) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('sec_cards'), LZ.x + pad, oy + U(16));
  var ownedN = Object.keys(meta.owned).filter(function (id) { return (meta.owned[id] | 0) > 0; }).length;
  c.textAlign = 'right'; c.fillStyle = '#7f93b8'; c.font = clampF(U(11), 9, 14) + 'px Inter, system-ui, sans-serif';
  c.fillText(ownedN + ' / ' + CARDS.length, LZ.x + LZ.w - pad, oy + U(16));
  oy += U(28);
  for (var i = 0; i < CARDS.length; i++) {
    var card = CARDS[i];
    var lvl = meta.owned[card.id] | 0;
    var cc = i % cardCols, cr = (i / cardCols) | 0;
    var x = LZ.x + pad + cc * (cardCW + colGap), y = oy + cr * (cardCH + colGap);
    if (lvl > 0) {
      drawCardFace(c, card, lvl, x, y, cardCW, cardCH, null);
    } else {
      // locked silhouette — tasteful, with a hint
      c.fillStyle = 'rgba(18,16,30,0.92)'; GF.rr(c, x, y, cardCW, cardCH, U(10)); c.fill();
      c.lineWidth = 1.5 * S; c.setLineDash([U(4), U(4)]); c.strokeStyle = '#3a3560';
      GF.rr(c, x, y, cardCW, cardCH, U(10)); c.stroke(); c.setLineDash([]);
      drawLockGlyph(c, x + cardCW / 2, y + cardCH * 0.40, U(13));
      c.fillStyle = '#5a5478'; c.textAlign = 'center';
      c.font = clampF(U(9), 8, 12) + 'px Inter, system-ui, sans-serif';
      wrapText(c, GF.t('locked_card'), x + cardCW / 2, y + cardCH * 0.62, cardCW - U(8), clampF(U(11), 9, 13), true);
    }
  }
  c.restore();

  // scroll decor (scrollbar + fades) sits above the clipped content
  scrollDecor(c);
}
function totalDates() { var n = 0; for (var i = 0; i < SUITORS.length; i++) n += SUITORS[i].dates.length; return n; }

// a single unlocked "moment" card: suitor thumb + vignette line + bond pip
function drawMemoryCard(c, su, idx, x, y, w, h) {
  var S = GF.S;
  c.save();
  c.fillStyle = 'rgba(24,18,44,0.95)'; c.shadowColor = su.accent + '44'; c.shadowBlur = U(10);
  GF.rr(c, x, y, w, h, U(12)); c.fill(); c.restore();
  c.lineWidth = 1.5 * S; c.strokeStyle = su.accent + '99'; GF.rr(c, x, y, w, h, U(12)); c.stroke();
  // thumb
  var ts = h - U(16), tx = x + U(8), ty = y + U(8);
  c.save(); GF.rr(c, tx, ty, ts * 0.82, ts, U(8)); c.clip();
  drawCover(c, su.art, tx, ty, ts * 0.82, ts, function (cc, ax, ay, aw, ah) { drawSuitorFallback(cc, ax, ay, aw, ah, su); });
  c.restore();
  // text
  var txx = tx + ts * 0.82 + U(10), txw = x + w - U(10) - txx;
  c.textAlign = 'left'; c.fillStyle = '#fff';
  c.font = 'bold ' + clampF(U(12), 10, 16) + 'px Inter, system-ui, sans-serif';
  c.fillText(suitorName(su), txx, y + U(18));
  c.fillStyle = '#d8c0ea'; c.font = 'italic ' + clampF(U(10), 9, 13) + 'px Inter, system-ui, sans-serif';
  var line = (GF.lang === 'ru' ? su.dates[idx].ru : su.dates[idx].en);
  wrapText(c, line, txx, y + U(34), txw, clampF(U(13), 11, 16), false);
}

// small vector padlock (no emoji)
function drawLockGlyph(c, cx, cy, r) {
  c.save(); c.translate(cx, cy); c.strokeStyle = '#5a5478'; c.fillStyle = '#5a5478';
  c.lineWidth = Math.max(1.4, r * 0.2); c.lineJoin = 'round';
  GF.rr(c, -r * 0.7, -r * 0.1, r * 1.4, r * 1.1, r * 0.2); c.fill();
  c.beginPath(); c.arc(0, -r * 0.1, r * 0.45, Math.PI, 0); c.stroke();
  c.restore();
}

// ════════════════════════════════════════════════════════════════════════
//  SUMMON screen
// ════════════════════════════════════════════════════════════════════════
function drawSummon(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  c.fillStyle = 'rgba(8,6,18,0.94)'; c.fillRect(0, 0, W, H);

  // ── fixed header + currency, then a single non-overlapping vertical stack ──
  var headerH = drawScreenHeader(c, GF.t('summon'), '#ff8fc7');
  var pad = U(16), bw = LZ.w - pad * 2;

  // sub-hint under the header
  c.fillStyle = '#b9a6d0'; c.textAlign = 'center';
  c.font = clampF(U(12), 10, 15) + 'px Inter, system-ui, sans-serif';
  var hintLines = wrapText(c, GF.t('summonHint'), LCX(), headerH + U(14), bw, clampF(U(16), 13, 20), true);
  var y = headerH + U(14) + hintLines * clampF(U(16), 13, 20) + U(6);

  // currency strip (centred pair of compact chips)
  drawCurrencyStrip(c, y);
  y += U(40);

  // ── bottom-anchored button stack (back, ad, ticket, dust, [daily]) ──
  // Compute from the bottom up so nothing can collide.
  var bh = clampF(U(54), 44, 64), gap = U(11);
  var backH = clampF(U(46), 40, 56), adH = clampF(U(46), 40, 56);
  var stackBottom = H - clampF(U(16), 12, 22);
  var canDaily = dailyReady();
  // order bottom->top: BACK, watch-ad, USE CALL, SUMMON(dust), [DAILY]
  var yBack = stackBottom - backH;
  var yAd = yBack - gap - adH;
  var yTicket = yAd - gap - bh;
  var yDust = yTicket - gap - bh;
  var yDaily = canDaily ? (yDust - gap - bh) : yDust;
  var stackTop = (canDaily ? yDaily : yDust);

  // ── portal art fills the gap between the currency strip and the stack ──
  var artTop = y + U(6), artBot = stackTop - U(34) /*room for the rates line*/;
  var cy = (artTop + artBot) / 2, cr = Math.min(LZ.w * 0.20, (artBot - artTop) * 0.42);
  cr = Math.max(cr, U(34));
  c.save();
  var pulse = 0.5 + 0.5 * Math.sin(T * 2);
  var rg = c.createRadialGradient(LCX(), cy, cr * 0.2, LCX(), cy, cr * (1.4 + pulse * 0.2));
  rg.addColorStop(0, '#ff9ec0'); rg.addColorStop(0.5, '#a05fd6'); rg.addColorStop(1, 'rgba(20,10,40,0)');
  c.fillStyle = rg; c.beginPath(); c.arc(LCX(), cy, cr * 1.5, 0, Math.PI * 2); c.fill();
  c.restore();
  c.save(); c.translate(LCX(), cy); c.fillStyle = '#ffd9ef'; c.shadowColor = '#ff8fc7'; c.shadowBlur = 24 * S;
  c.beginPath(); c.moveTo(0, -cr); c.lineTo(cr * 0.7, 0); c.lineTo(0, cr); c.lineTo(-cr * 0.7, 0); c.closePath(); c.fill();
  c.restore();
  // rates note — its OWN line just above the stack, never under a button
  c.fillStyle = '#9fb0d0'; c.textAlign = 'center'; c.font = clampF(U(11), 9, 14) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('rarityE') + ' 8%   ' + GF.t('rarityR') + ' 27%   ' + GF.t('rarityC') + ' 65%', LCX(), stackTop - U(14));

  // ── the buttons ──
  if (canDaily) {
    // a glowing daily-call button at the top of the stack
    bigButton(c, LZ.x + pad, yDaily, bw, bh, GF.t('daily') + '  +1', '#ffd76b', function () { claimDaily(); });
    // a small "ready" ribbon on its right edge
    c.fillStyle = '#1a0f20'; c.textAlign = 'right'; c.textBaseline = 'middle';
    c.font = 'bold ' + clampF(U(10), 8, 13) + 'px Inter, system-ui, sans-serif';
    c.textBaseline = 'alphabetic';
  }
  var canDust = meta.stardust >= PULL_COST;
  bigButton(c, LZ.x + pad, yDust, bw, bh, GF.t('pull1') + '   -' + PULL_COST, canDust ? '#ff8fc7' : '#555',
    function () { doSummon('dust'); }, !canDust);
  var canTicket = meta.tickets >= 1;
  bigButton(c, LZ.x + pad, yTicket, bw, bh, GF.t('pullTicket') + (canTicket ? '   (' + meta.tickets + ')' : ''), canTicket ? '#5fd0e6' : '#555',
    function () { doSummon('ticket'); }, !canTicket);
  smallButton(c, LZ.x + pad, yAd, bw, adH, GF.t('ad_more'), function () { watchAdForTicket(); });
  smallButton(c, LZ.x + pad, yBack, bw, backH, GF.t('backMenu'), function () { openScreen('SUITORS'); });
}

// ════════════════════════════════════════════════════════════════════════
//  REVEAL overlay (pull result)
// ════════════════════════════════════════════════════════════════════════
function drawReveal(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  reveal.t += dt;
  // fully OPAQUE backdrop (overlay over the summon screen — rule #12)
  var rg0 = c.createLinearGradient(0, 0, 0, H);
  rg0.addColorStop(0, '#120a22'); rg0.addColorStop(1, '#06040f');
  c.fillStyle = rg0; c.fillRect(0, 0, W, H);
  drawStars(c, W, H);
  var card = reveal.card; if (!card) { reveal.active = false; return; }
  // block all taps from reaching the screen behind this overlay (rule: overlays consume clicks)
  pushRect(0, 0, W, H, function () {});
  var rcol = RAR_COL[card.rar];
  var ccx = LCX();
  var cardCy = H * 0.40;
  // burst rays
  var k = Math.min(1, reveal.t * 1.6);
  c.save(); c.translate(ccx, cardCy);
  c.globalAlpha = 0.45 * k;
  var rayLen = LZ.w * 0.55 * k;
  for (var i = 0; i < 12; i++) { c.rotate(Math.PI / 6 + T * 0.3); c.fillStyle = rcol; c.beginPath(); c.moveTo(0, 0); c.lineTo(rayLen, U(16)); c.lineTo(rayLen, -U(16)); c.closePath(); c.fill(); }
  c.restore();
  // card grows in
  var cw = Math.min(LZ.w * 0.5, U(220)) * Math.min(1, reveal.t * 2), ch = cw * 1.42;
  var cx = ccx - cw / 2, cyy = cardCy - ch / 2;
  if (cw > 8) drawCardFace(c, card, reveal.lvl, cx, cyy, cw, ch, null);
  // label
  var labY = cardCy + ch / 2 + U(36);
  c.textAlign = 'center'; c.fillStyle = rcol;
  c.save(); c.shadowColor = rcol; c.shadowBlur = 18 * S;
  c.font = 'bold ' + clampF(U(26), 18, 36) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t(reveal.dupe ? 'dupe' : 'newcard'), ccx, labY);
  c.restore();
  c.fillStyle = '#fff'; c.font = clampF(U(14), 11, 18) + 'px Inter, system-ui, sans-serif';
  c.fillText(cardName(card) + (reveal.lvl > 1 ? '  ' + GF.t('lv') + reveal.lvl : ''), ccx, labY + U(26));
  var rlab = card.rar === 3 ? GF.t('rarityE') : card.rar === 2 ? GF.t('rarityR') : GF.t('rarityC');
  c.fillStyle = rcol; c.font = clampF(U(12), 10, 15) + 'px Inter, system-ui, sans-serif';
  c.fillText(rlab, ccx, labY + U(46));
  // tap-to-continue button
  if (reveal.t > 0.5) {
    var bw = LZ.w - U(32), bh = clampF(U(48), 40, 60);
    bigButton(c, ccx - bw / 2, H - bh - U(28), bw, bh, GF.t('cont'), rcol, function () { reveal.active = false; });
  }
}

// ════════════════════════════════════════════════════════════════════════
//  CELEBRATE overlay (bond up + vignette)
// ════════════════════════════════════════════════════════════════════════
function drawCelebrate(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  celebrate.t += dt;
  c.fillStyle = 'rgba(8,4,18,0.92)'; c.fillRect(0, 0, W, H);
  // block taps from reaching the screen behind this overlay
  pushRect(0, 0, W, H, function () {});
  var su = celebrate.suitor;
  // spawn hearts continuously for the first bit
  if (celebrate.t < 1.5 && Math.random() < 0.3) blush();
  // backdrop
  drawCover(c, su.bg, 0, 0, W, H, function () {});
  c.fillStyle = 'rgba(8,4,18,0.55)'; c.fillRect(0, 0, W, H);
  var ccx = LCX();
  // portrait
  var pw = Math.min(LZ.w * 0.5, U(220)), ph = pw * 1.2, px = ccx - pw / 2, py = H * 0.14;
  c.save(); GF.rr(c, px, py, pw, ph, U(18)); c.clip();
  drawCover(c, su.art, px, py, pw, ph, function (cc, ax, ay, aw, ah) { drawSuitorFallback(cc, ax, ay, aw, ah, su); });
  c.restore();
  c.lineWidth = 3 * S; c.strokeStyle = '#ff7aa8'; GF.rr(c, px, py, pw, ph, U(18)); c.stroke();

  c.textAlign = 'center';
  c.save(); c.shadowColor = '#ff5fa2'; c.shadowBlur = 24 * S;
  c.font = 'bold ' + clampF(U(28), 20, 40) + 'px Inter, system-ui, sans-serif'; c.fillStyle = '#ff7aa8';
  c.fillText(GF.t('bondup') + '!', ccx, py + ph + U(44)); c.restore();
  // vignette line
  c.fillStyle = '#ffe3ee'; c.font = 'italic ' + clampF(U(15), 12, 20) + 'px Inter, system-ui, sans-serif';
  wrapText(c, '"' + celebrate.line + '"', ccx, py + ph + U(78), LZ.w * 0.82, clampF(U(22), 16, 26), true);

  if (celebrate.t > 0.8) {
    var bw = LZ.w - U(32), bh = clampF(U(50), 42, 62);
    bigButton(c, ccx - bw / 2, H - bh - U(20), bw, bh, GF.t('cont'), '#ff7aa8', function () { celebrate.active = false; });
  }
}

function drawBanner(c) {
  var W = GF.W, S = GF.S;
  var a = Math.min(1, banner.t) * Math.min(1, (4 - banner.t) * 2 + 0.4);
  c.save(); c.globalAlpha = Math.min(1, a);
  var bw = Math.min(LZ.w * 0.8, U(360)), bh = U(40), bx = LCX() - bw / 2, by = GF.H * 0.16;
  c.fillStyle = 'rgba(20,16,38,0.96)'; c.shadowColor = '#ffd76b'; c.shadowBlur = 14 * S;
  GF.rr(c, bx, by, bw, bh, bh / 2); c.fill();
  c.fillStyle = '#ffd76b'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'bold ' + clampF(U(13), 11, 17) + 'px Inter, system-ui, sans-serif';
  c.fillText('+1 ' + GF.t('tickets') + '  +20 ' + GF.t('stardust'), LCX(), by + bh / 2 + 1);
  c.textBaseline = 'alphabetic'; c.restore();
}

// ════════════════════════════════════════════════════════════════════════
//  Shared UI widgets
// ════════════════════════════════════════════════════════════════════════
// fixed screen header: a centred title with a thin divider. Returns bottom Y.
function drawScreenHeader(c, title, col) {
  var S = GF.S, W = GF.W, H = GF.H;
  var top = clampF(U(18), 14, 30);
  var fz = clampF(U(22), 17, 30);
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.save(); c.shadowColor = col + 'cc'; c.shadowBlur = 16 * S;
  c.font = 'bold ' + fz + 'px Inter, system-ui, sans-serif'; c.fillStyle = '#fff';
  c.fillText(title, LCX(), top + fz); c.restore();
  var hb = top + fz + U(12);
  // thin divider inside the column
  var dg = c.createLinearGradient(LZ.x, 0, LZ.x + LZ.w, 0);
  dg.addColorStop(0, 'rgba(255,255,255,0)'); dg.addColorStop(0.5, col + '66'); dg.addColorStop(1, 'rgba(255,255,255,0)');
  c.fillStyle = dg; c.fillRect(LZ.x + U(16), hb, LZ.w - U(32), Math.max(1, 1.5 * S));
  return hb + U(10);
}
// fixed bottom bar with a back (left) + accent (right) button. Returns {y}=top.
function drawBottomBar(c, leftLbl, leftFn, rightLbl, rightCol, rightFn) {
  var S = GF.S, H = GF.H;
  var bh = clampF(U(52), 44, 64), pad = U(16), gap = U(10);
  var by = H - bh - clampF(U(16), 12, 24);
  var bw = (LZ.w - pad * 2 - gap) / 2;
  smallButton(c, LZ.x + pad, by, bw, bh, leftLbl, leftFn);
  bigButton(c, LZ.x + pad + bw + gap, by, bw, bh, rightLbl, rightCol, rightFn);
  return { y: by - U(10) };
}

}

// mute button top-right
var muteRect = null;

function openScreen(s) {
  prevScreen = gs; gs = s;
  // reset scroll on every screen change (the draw-time guard is the safety net,
  // this clears momentum/position immediately so a new screen starts at the top).
  scroll.key = null; scroll.y = 0; scroll.vel = 0; scroll.dragging = false; scroll.max = 0;
}

// ════════════════════════════════════════════════════════════════════════
//  text helpers
// ════════════════════════════════════════════════════════════════════════
function clampF(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function wrapText(c, text, x, y, maxW, lineH, center) {
  if (center !== false) c.textAlign = center ? 'center' : c.textAlign;
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  for (var j = 0; j < lines.length; j++) c.fillText(lines[j], x, y + j * lineH);
  return lines.length;
}
function lighten(hex, amt) {
  var h = hex.replace('#', '');
  if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  var r = Math.min(255, parseInt(h.substr(0, 2), 16) + amt);
  var g = Math.min(255, parseInt(h.substr(2, 2), 16) + amt);
  var b = Math.min(255, parseInt(h.substr(4, 2), 16) + amt);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

// ════════════════════════════════════════════════════════════════════════
//  INPUT — single press handler, rect-based hit-test with live scale
// ════════════════════════════════════════════════════════════════════════
// map client px -> canvas px (canvas == viewport*dpr; getBoundingClientRect for safety)
function toCanvas(clientX, clientY) {
  var rect = GF.canvas.getBoundingClientRect();
  var scaleX = GF.canvas.width / rect.width, scaleY = GF.canvas.height / rect.height;

}
function handlePress(clientX, clientY) {
  var p = toCanvas(clientX, clientY);
  var x = p.x, y = p.y;
  // tutorial first
  if (GF.tutorial.handleClick(x, y)) return;
  // overlays consume clicks via their own pushRect entries; iterate top-most last
  for (var i = clickRects.length - 1; i >= 0; i--) {
    var r = clickRects[i];
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) { r.fn(); return; }
  }
}
// ── unified pointer/touch input with drag-to-scroll vs tap discrimination ──
var _ptr = { down: false, sx: 0, sy: 0, moved: 0, scrolling: false };
function inputDown(clientX, clientY) {
  _ptr.down = true; _ptr.sx = clientX; _ptr.sy = clientY; _ptr.moved = 0;
  // start a scroll gesture only if the current screen scrolls AND the press is
  // inside the scroll viewport + content column
  _ptr.scrolling = scrollPointerDown(clientX, clientY);
}
function inputMove(clientX, clientY) {
  if (!_ptr.down) return;
  _ptr.moved += Math.abs(clientX - _ptr.sx) + Math.abs(clientY - _ptr.sy);
  if (_ptr.scrolling) scrollPointerMove(clientY);
}
function inputUp(clientX, clientY) {
  if (!_ptr.down) return;
  _ptr.down = false;
  var wasScroll = _ptr.scrolling;
  scrollPointerUp();
  _ptr.scrolling = false;
  // treat as a TAP unless the pointer moved far enough to be a deliberate drag.
  // Euclidean slop ~18 CSS px is forgiving for a shaky finger (Codex review).
  var dx = clientX - _ptr.sx, dy = clientY - _ptr.sy;
  var dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 18) handlePress(clientX, clientY);
}
GF.canvas.addEventListener('pointerdown', function (e) { inputDown(e.clientX, e.clientY); });
GF.canvas.addEventListener('pointermove', function (e) { inputMove(e.clientX, e.clientY); });
GF.canvas.addEventListener('pointerup',   function (e) { inputUp(e.clientX, e.clientY); });
GF.canvas.addEventListener('pointercancel', function () { _ptr.down = false; _ptr.scrolling = false; scrollPointerUp(); });
// touch fallback (only when PointerEvent is absent — avoids double-fire)
if (!window.PointerEvent) {
  GF.canvas.addEventListener('touchstart', function (e) {
    if (e.changedTouches && e.changedTouches.length) { var t0 = e.changedTouches[0]; inputDown(t0.clientX, t0.clientY); }
  }, { passive: true });
  GF.canvas.addEventListener('touchmove', function (e) {
    if (e.changedTouches && e.changedTouches.length) { var t0 = e.changedTouches[0]; inputMove(t0.clientX, t0.clientY); }
  }, { passive: true });
  GF.canvas.addEventListener('touchend', function (e) {
    if (e.changedTouches && e.changedTouches.length) { var t0 = e.changedTouches[0]; inputUp(t0.clientX, t0.clientY); }
  }, { passive: true });
}
// mouse-wheel scrolling on desktop (gf-lib already preventDefaults page wheel)
GF.canvas.addEventListener('wheel', function (e) {
  if (scroll.max > 0) { scroll.dragging = false; scroll.vel = 0; scroll.y = GF.clamp(scroll.y + e.deltaY, 0, scroll.max); }
}, { passive: true });

// ════════════════════════════════════════════════════════════════════════
//  TUTORIAL (hands-on, action-gated) — first ever date only
// ════════════════════════════════════════════════════════════════════════
// the hand index whose card best matches the current mood (perfect > good > first)
function bestMatchIdx() {
  var best = 0, bestScore = -1;
  for (var i = 0; i < sx.hand.length; i++) {
    var card = cardById(sx.hand[i].id); if (!card) continue;
    var sc = card.p === sx.moodNow ? 2 : card.s === sx.moodNow ? 1 : 0;
    if (sc > bestScore) { bestScore = sc; best = i; }
  }
  return best;
}
function maybeTutorial() {
  if (meta.seenTut) return;
  // find a card in hand that matches the first mood, point the hand at it
  GF.tutorial.start([
    {
      text: GF.t('tut_tap_card'),
      target: function () {
        // point at the first matching card in hand (or first card)
        var rect = tutorialCardRect();
        return rect;
      },
      gesture: 'tap',
      advance: 'click_target',
      // the tutorial consumes the tap that dismisses it, so PLAY the highlighted
      // card here — otherwise the player's first tap would do nothing (Codex review).
      onAdvance: function () {
        meta.seenTut = 1; saveMeta();
        if (gs === 'DATE' && sx.playing && !sx.momentScored) playCard(bestMatchIdx());
      },
    },

}
// compute the on-screen rect of the best tutorial card (recomputed live).
// MUST mirror drawHand's column-based layout so the hand points correctly.
function tutorialCardRect() {
  var W = GF.W, H = GF.H, S = GF.S;
  var n = sx.hand.length; if (!n) return { x: LCX(), y: H * 0.8, r: 30 * S };
  var bottomPad = U(14), cardH = H * 0.20, cardW = cardH * 0.70, gap = U(8);
  var totalW = n * cardW + (n - 1) * gap;
  var avail = LZ.w - U(16);
  if (totalW > avail) { var sc = avail / totalW; cardW *= sc; cardH *= sc; totalW = n * cardW + (n - 1) * gap; }

  // highlight the SAME card the tutorial onAdvance will play
  var idx = bestMatchIdx();
  var cx = startX + idx * (cardW + gap) + cardW / 2;
  return { x: cx, y: y + cardH / 2, r: cardW * 0.55 };
}

// ════════════════════════════════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════════════════════════════════
function update(dt) {
  // (most state advances inside draw via timers; keep update light)
}

// ════════════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════════════
GF.init({
  designW: 393,
  designH: 852,
  strings: STRINGS,
  saveKey: 'stellar_hearts',
  onReady: function () {
    // language fallback off-platform (gf-lib only sets ru on Yandex/CG;
    // honor the browser for local + general builds)
    try {
      if (GF.platform === 'local' && /^ru/i.test(navigator.language || '')) GF.lang = 'ru';
    } catch (e) {}
    meta = loadMeta();
    loadAssets(function () {
      // flag any missing art
      missingArt = IMG_KEYS.filter(function (k) { return !hasImg(k); });
      // procedural music bed (calm/romantic)
      GF.startMusic({ preset: 'calm', muted: GF.muted });
      // daily banner if a daily is ready (gentle nudge, not auto-claim)
      // pick the first unlocked suitor for the autostart date
      var first = SUITORS[0];
      for (var i = 0; i < SUITORS.length; i++) { if (suitorUnlocked(SUITORS[i])) { first = SUITORS[i]; break; } }
      // AUTOSTART: platform builds drop STRAIGHT into a date (rule #9).
      // Gallery build shows the hub first so meta is visible.
      if (window.__GF_AUTOSTART) {
        startDate(first);
        maybeTutorial();
      } else {
        gs = 'SUITORS';
        prevScreen = 'SUITORS';
      }
    });
  },
  onUpdate: update,
  onDraw: draw,
});

// also run the tutorial when the player taps into their first date from the hub
var _origStartDate = startDate;
startDate = function (s) { _origStartDate(s); if (!meta.seenTut) maybeTutorial(); };

// NOTE: no GF.persist for mid-date run state — a date is a 60-120s session and
// the meaningful progression (bond / cards / currency) is saved to localStorage
// (stellar_hearts_meta_v1) on every event. Re-entering simply starts a fresh date.

// ── EXPOSE STATE for the post-build / yandex-testing gate ────────────────
GF.exposeState(function () {
  return {
    gs: gs,
    bond: Math.round(sx.bond || 0),
    need: sx.dateRef ? sx.dateRef.need : 0,
    moment: sx.moment || 0,
    moments: sx.dateRef ? sx.dateRef.script.length : 0,
    combo: sx.combo || 0,
    handSize: sx.hand ? sx.hand.length : 0,
    suitor: sx.suitor ? sx.suitor.id : null,
    stardust: meta ? meta.stardust : 0,
    tickets: meta ? meta.tickets : 0,
    owned: meta ? Object.keys(meta.owned).filter(function (k) { return meta.owned[k] > 0; }).length : 0,
    totalBond: meta ? totalBond() : 0,
    dateWon: sx.dateWon,
    missingArt: missingArt.length,
  };
});

// ── DEV SEAMS for the headless playtest (drive real flow deterministically) ──
// Gated behind ?test=1 (or window.__SH_TEST) so they are ABSENT in the shipped
// gallery/platform build and cannot be abused to grant currency/cards.
var _SH_TEST = false;
try { _SH_TEST = /[?&]test=1/.test(location.search) || !!window.__SH_TEST; } catch (e) {}
if (_SH_TEST) {
window._shInfo = function () {
  return {
    gs: gs, bond: sx.bond, need: sx.dateRef ? sx.dateRef.need : 0, moment: sx.moment,
    moments: sx.dateRef ? sx.dateRef.script.length : 0, mood: sx.moodNow, combo: sx.combo,
    hand: sx.hand.map(function (e) { var card = cardById(e.id); return { id: e.id, lvl: e.lvl, p: card.p, s: card.s }; }),
    rects: clickRects.map(function (r) { return { x: r.x, y: r.y, w: r.w, h: r.h }; }),
    suitor: sx.suitor ? sx.suitor.id : null, dateWon: sx.dateWon,
    stardust: meta.stardust, tickets: meta.tickets,
    owned: Object.keys(meta.owned).filter(function (k) { return meta.owned[k] > 0; }),
    bondMap: meta.bond, totalBond: totalBond(), reveal: reveal.active, celebrate: celebrate.active,

  };
};
// click at canvas coords (for the playtest harness)
window._shTap = function (x, y) { handlePress(x, y); };
// find the best-matching card's hand index for the current mood
window._shBestCardIdx = function () {
  var best = -1, bestScore = -1;
  for (var i = 0; i < sx.hand.length; i++) {
    var card = cardById(sx.hand[i].id);
    var sc = card.p === sx.moodNow ? 2 : card.s === sx.moodNow ? 1 : 0;
    if (sc > bestScore) { bestScore = sc; best = i; }
  }
  return best;
};
// directly play the best card (drives the loop in tests; mirrors a real tap)
window._shPlayBest = function () { var i = window._shBestCardIdx(); if (i >= 0) playCard(i); return i; };
window._shStartDate = function (id) { var s = suitorById(id) || SUITORS[0]; startDate(s); };
window._shSummon = function (how) { return doSummon(how || 'dust'); };
window._shGrant = function (dust, tix) { meta.stardust += (dust | 0); meta.tickets += (tix | 0); saveMeta(); };
window._shDaily = function () { meta.lastDaily = 0; return claimDaily(); };
window._shDismiss = function () { reveal.active = false; celebrate.active = false; };
window._shOpen = function (s) { openScreen(s); };
window._shScroll = function () { return { key: scroll.key, y: Math.round(scroll.y), max: Math.round(scroll.max), viewTop: Math.round(scroll.viewTop || 0), viewH: Math.round(scroll.viewH || 0) }; };
window._shScrollTo = function (y) { scroll.y = GF.clamp(y, 0, scroll.max); scroll.vel = 0; };
window._shMems = function () { return unlockedMemories().map(function (m) { return m.su.id + ':' + m.idx; }); };
// test-only: unlock every date vignette + own every card (drives worst-case layout)
window._shUnlockAll = function () {
  for (var i = 0; i < SUITORS.length; i++) { var su = SUITORS[i]; for (var d = 0; d < su.dates.length; d++) meta.memories[su.id + ':' + d] = 1; }
  for (var j = 0; j < CARDS.length; j++) meta.owned[CARDS[j].id] = Math.max(meta.owned[CARDS[j].id] | 0, 1);
  saveMeta();
};
window._shMaxDeck = function () { for (var j = 0; j < CARDS.length; j++) meta.owned[CARDS[j].id] = 8; saveMeta(); };
window._shLZ = function () { return { w: Math.round(LZ.w), x: Math.round(LZ.x), scale: +LZ.scale.toFixed(3), W: GF.W, H: GF.H }; };
}  // end _SH_TEST gate

// screenshot helper — gf-lib calls _setLang; expose a jump for promo shots
window._jumpLevel = function () { /* no level model; ensure a date is active */ if (!sx.suitor) startDate(SUITORS[0]); gs = 'DATE'; };

})();
