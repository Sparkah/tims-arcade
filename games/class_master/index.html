    localizeQ();

    var band = bandFor(meta.grade);

  }
  if (phase === 'ask') {
    writeT += dt; cardsInT += dt;
    var frozen = helpOpen || coachActive() || window._screenshotFreeze;
    if (!frozen && cardsInT > 0.5) {

      if (patLeft <= 0) { patLeft = 0; timeoutAnswer(); }
    }
    return;
  }
  if (phase === 'feedback') {
    if (phaseT >= (riotPending ? 1.35 : FEEDBACK_DUR) && !window._screenshotFreeze) finishFeedback();

}

// ============================================================================
//  INPUT
// ============================================================================
function inRect(x, y, r) { return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
function inCircle(x, y, c) { var dx = x - c.x, dy = y - c.y; return dx * dx + dy * dy <= c.r * c.r * 1.45; }

function primaryAction() {
  if (helpOpen) { helpOpen = false; return; }
  if (gs === 'REPORT') reportNext();
  else if (gs === 'FAILED') retryLesson();
  else if (gs === 'DAYDONE' || gs === 'GRADEUP') ceremonyNext();
  else if (gs === 'HUB') closeHub();
}

function handleTap(x, y) {
  // help overlay swallows everything (close btn or anywhere)
  if (helpOpen) { helpOpen = false; if (!window._silent) GF.sfx('click'); return; }
  // tutorial: only the skip pill is consumed; game taps pass through so the
  // coached question is answered by the REAL action (advance:'manual')
  if (coachActive()) {
    var sb = GF.tutorial._skipBtn;
    if (sb && x >= sb.x && x <= sb.x + sb.w && y >= sb.y && y <= sb.y + sb.h) {
      GF.tutorial.handleClick(x, y);
      return;
    }
  }
  if (gs === 'PLAYING') {
    var c = L.corner;
    if (inCircle(x, y, c.mute)) { GF.toggleMute(); GF.setMusicMuted(GF.muted); return; }
    if (inCircle(x, y, c.help)) { helpOpen = true; GF.sfx('click'); return; }
    if (inCircle(x, y, c.home)) { openHub(); return; }
    if (phase === 'ask') {
      if (inRect(x, y, L.eraser)) { useEraser(); return; }
      if (inRect(x, y, L.hint)) { useHint(); return; }
      if (cardsInT > 0.18) {
        for (var i = 0; i < 4; i++) if (inRect(x, y, L.cards[i])) { answer(i); return; }
      }
    }
    return;
  }
  var b = panelBtns();
  if (gs === 'REPORT') { if (inRect(x, y, b.next)) reportNext(); return; }
  if (gs === 'FAILED') {
    if (b.calm && inRect(x, y, b.calm)) { calmClass(); return; }
    if (inRect(x, y, b.retry)) { retryLesson(); return; }
    return;
  }
  if (gs === 'DAYDONE' || gs === 'GRADEUP') { if (inRect(x, y, b.next)) ceremonyNext(); return; }
  if (gs === 'HUB') {
    if (inRect(x, y, b.daily)) { claimDaily(); return; }
    if (inRect(x, y, b.cont)) { closeHub(); return; }
    if (decoScroll.contains(x, y)) {
      var cy2 = decoScroll.screenToContentY(y);
      for (var d = 0; d < DECOS.length; d++) {
        var rr2 = hubRowRectContent(d);
        if (x >= rr2.x && x <= rr2.x + rr2.w && cy2 >= rr2.y && cy2 <= rr2.y + rr2.h) { buyDeco(DECOS[d].id); return; }
      }
    }
    return;
  }
}

// Pointer wiring: HUB clicks resolve on pointerup (drag-vs-tap), everything

// but never trust stored sizes - recompute every event).

function evtXY(e) {
  var r = GF.canvas.getBoundingClientRect();
  var sx = GF.canvas.width / Math.max(1, r.width);
  var sy = GF.canvas.height / Math.max(1, r.height);
  return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
}
GF.canvas.addEventListener('pointerdown', function (e) {
  e.preventDefault();
  var p = evtXY(e);
  ptr.down = true; ptr.sx = p.x; ptr.sy = p.y; ptr.moved = false; ptr.hubDrag = false;
  if (gs === 'HUB' && decoScroll.contains(p.x, p.y) && decoScroll.scrollable()) {
    ptr.hubDrag = true;

    return;
  }

}, { passive: false });

  if (!ptr.down) return;
  var p = evtXY(e);
  if (Math.abs(p.x - ptr.sx) + Math.abs(p.y - ptr.sy) > 8) ptr.moved = true;
  if (ptr.hubDrag) decoScroll.dragMove(p.y);
}, { passive: true });
GF.canvas.addEventListener('pointerup', function (e) {
  var p = evtXY(e);

  ptr.down = false; ptr.hubDrag = false;
}, { passive: true });

}, { passive: true });

  if (code === 'Enter' || code === 'Space') { primaryAction(); return; }
  if (gs === 'PLAYING' && phase === 'ask') {
    var map = { Digit1: 0, Digit2: 1, Digit3: 2, Digit4: 3, Numpad1: 0, Numpad2: 1, Numpad3: 2, Numpad4: 3 };
    if (code in map) { answer(map[code]); return; }
    if (code === 'KeyE') { useEraser(); return; }
    if (code === 'KeyH') { useHint(); return; }
  }
});

// ============================================================================
//  TEXT UTILS - measured wrap + shrink-to-fit (RU runs 25-40% wider than EN)
// ============================================================================
function wrapText(c, text, maxW) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}
function fitLines(c, text, maxW, maxH, baseFs, minFs, weight, family) {
  var fs = baseFs, lines, lineH;
  for (;;) {
    c.font = (weight || 'bold') + ' ' + Math.round(fs) + 'px ' + (family || FONT_UI);
    lines = wrapText(c, text, maxW);
    lineH = fs * 1.22;
    if (lines.length * lineH <= maxH || fs <= minFs) break;
    fs -= 1;
  }
  return { fs: Math.round(fs), lines: lines, lineH: lineH };
}

  c.font = 'bold ' + Math.round(20 * S + 2) + 'px ' + FONT_UI;
  c.fillText(GF.t('help_title'), px + pw / 2, py + 28 * S);
  // measured-line wrap, block after block (never fixed slots - mobile safety)
  var keys = ['howto_goal', 'howto_controls', 'howto_win', 'howto_lose', 'howto_tip'];
  var btnH = Math.max(44, 50 * S);
  var areaTop = py + 52 * S, areaBot = py + ph - btnH - 26 * S;
  var fs = 14 * S + 1, fits = false, blocks = [];
  while (!fits && fs > 8) {
    blocks = []; var total = 0;
    for (var i = 0; i < keys.length; i++) {
      c.font = fs + 'px ' + FONT_UI;
      var lines = wrapText(c, GF.t(keys[i]), pw - 44 * S);
      var bh2 = lines.length * fs * 1.3 + 8 * S;
      blocks.push({ lines: lines, h: bh2 });
      total += bh2;
    }
    if (total <= areaBot - areaTop) fits = true; else fs -= 1;
  }
  var yy = areaTop;
  c.textAlign = 'left';
  for (var bI = 0; bI < blocks.length; bI++) {
    c.fillStyle = bI % 2 ? '#6c5436' : '#4a3528';
    c.font = fs + 'px ' + FONT_UI;
    for (var li = 0; li < blocks[bI].lines.length; li++) {
      c.fillText(blocks[bI].lines[li], px + 22 * S, yy + fs * 0.65 + li * fs * 1.3);
    }
    yy += blocks[bI].h;
  }
  drawBigBtn(c, { x: px + 16 * S, y: py + ph - btnH - 14 * S, w: pw - 32 * S, h: btnH }, GF.t('btn_close'), '#58b368');
  c.textBaseline = 'alphabetic';
}

// ============================================================================
//  MASTER DRAW
// ============================================================================
function draw(c, dt) {
  sceneT += (dt || 1 / 60);
  if (!L.board) layout();
  UI_REC = {};
  drawClassroom(c);
  drawBoard(c);
  drawPatience(c);
  if (gs === 'PLAYING' && (phase === 'ask' || phase === 'feedback')) {
    drawHelperBtn(c, L.eraser, 'eraser');
    drawHelperBtn(c, L.hint, 'hint');
  }
  drawCards(c);
  drawHUD(c);
  if (gs === 'PLAYING') drawCornerBtns(c);
  if (gs === 'REPORT') drawReport(c);
  else if (gs === 'FAILED') drawFailed(c);
  else if (gs === 'DAYDONE' || gs === 'GRADEUP') drawCeremony(c);
  else if (gs === 'HUB') drawHub(c);
  if (helpOpen) drawHelp(c);
  GF.tutorial.draw(c);
}

// ============================================================================
//  TEST / BOT / REACHABILITY SEAMS
// ============================================================================
function silently(fn) {
  var w = window._silent;
  window._silent = true;
  try { fn(); } finally { window._silent = w; }
}
function forcePlayingAsk() {
  GF.tutorial.active = false;
  helpOpen = false;
  firstSessionCoach = false;
  if (gs !== 'PLAYING' || !curQ || phase !== 'ask' || answered >= 0) {
    startLesson(true);
    enterAsk();
  }
  gs = 'PLAYING';
}
function botActions() {
  if (gs === 'PLAYING') {
    if (phase === 'ask' && curQ && answered < 0) {
      var a = ['answer_correct', 'answer_wrong'];
      if (!inspector && !coachActive()) {
        if (meta.erasers > 0) a.push('eraser');
        if (meta.hints > 0 && hintIdx < 0) a.push('hint');
      }
      return a;
    }
    return ['wait'];
  }
  if (gs === 'REPORT' || gs === 'DAYDONE' || gs === 'GRADEUP') return ['next'];
  if (gs === 'FAILED') return ['retry'];
  if (gs === 'HUB') {
    var acts = ['continue'];
    for (var i = 0; i < DECOS.length; i++) if (!meta.decos[DECOS[i].id] && meta.coins >= DECOS[i].cost) { acts.push('buy'); break; }
    if (dailyReady()) acts.push('daily');
    return acts;
  }
  return [];
}
function botAct(a) {
  silently(function () {
    if (a === 'wait') { phaseT += 0.6; return; }
    if (a === 'answer_correct') { if (curQ) answer(curQ.ci); return; }
    if (a === 'answer_wrong') {
      if (!curQ) return;
      for (var i = 0; i < 4; i++) if (i !== curQ.ci && !removed[i]) { answer(i); return; }
      return;
    }
    if (a === 'eraser') { useEraser(); return; }
    if (a === 'hint') { useHint(); return; }
    if (a === 'next') { if (gs === 'REPORT') reportNext(); else ceremonyNext(); return; }
    if (a === 'retry') { retryLesson(); return; }
    if (a === 'continue') { closeHub(); return; }
    if (a === 'daily') { claimDaily(); return; }
    if (a === 'buy') {
      for (var d = 0; d < DECOS.length; d++) if (!meta.decos[DECOS[d].id] && meta.coins >= DECOS[d].cost) { buyDeco(DECOS[d].id); return; }
    }
  });
}

// ============================================================================
//  BOOT
// ============================================================================
GF.init({
  designW: 430,
  designH: 900,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: GAME_KEY,
  onReady: function () {
    // Locale fallback for non-platform (gallery/local) play: gf-lib only sets
    // lang from the platform SDK; pick up the browser language otherwise.
    try {
      var plat = GF.platform || '';
      if (GF.lang !== 'ru' && plat !== 'yandex' && plat !== 'crazygames' && plat !== 'gamepush' &&
          String(navigator.language || '').toLowerCase().slice(0, 2) === 'ru') GF.lang = 'ru';
    } catch (e) {}

    // Yandex 1.9 - run progress persists across reload. Mid-lesson refresh
    // bounces to the START of the current lesson (safe screen), with all meta
    // (grade/day/lesson, coins, helpers, decorations, trophies) restored.
    GF.persist(GAME_KEY + '_run_v1',
      function () {
        return {
          v: 1, grade: meta.grade, day: meta.day, lesson: meta.lesson,
          coins: meta.coins, erasers: meta.erasers, hints: meta.hints,
          decos: meta.decos, trophies: meta.trophies, bestStreak: meta.bestStreak,
          totalCorrect: meta.totalCorrect, lastDaily: meta.lastDaily, toy: meta.toy,
        };
      },
      function (s) {
        if (!s) return;
        meta.grade = GF.clamp(parseInt(s.grade, 10) || 1, 1, MAX_GRADE);
        meta.day = GF.clamp(parseInt(s.day, 10) || 0, 0, DAYS_PER_GRADE - 1);
        meta.lesson = GF.clamp(parseInt(s.lesson, 10) || 0, 0, LESSONS_PER_DAY - 1);
        meta.coins = Math.max(0, parseInt(s.coins, 10) || 0);
        meta.erasers = s.erasers == null ? ERASER_START : Math.max(0, parseInt(s.erasers, 10) || 0);
        meta.hints = s.hints == null ? HINT_START : Math.max(0, parseInt(s.hints, 10) || 0);
        meta.decos = (s.decos && typeof s.decos === 'object') ? s.decos : {};
        meta.trophies = Math.max(0, parseInt(s.trophies, 10) || 0);
        meta.bestStreak = Math.max(0, parseInt(s.bestStreak, 10) || 0);
        meta.totalCorrect = Math.max(0, parseInt(s.totalCorrect, 10) || 0);
        meta.lastDaily = typeof s.lastDaily === 'string' ? s.lastDaily : '';
        meta.toy = !!s.toy;
      }
    );

    try { firstSessionCoach = !localStorage.getItem(TUT_KEY); } catch (e) { firstSessionCoach = false; }
    layout();

    // HARD RULE 8: SFX + background music in every game. Cozy procedural bed;
    // mute button mirrors GF.setMusicMuted.
    GF.startMusic({ preset: 'cozy', muted: GF.muted });

    // -- STATE EXPOSURE (post-build-tester gate / DESIGN cross-check) --
    GF.exposeState(function () {
      var decoCount = 0;
      for (var k in meta.decos) if (meta.decos[k]) decoCount++;
      return {
        gs: gs, phase: phase,
        grade: meta.grade, day: meta.day, lesson: meta.lesson,
        qIndex: qIndex, correctCount: correctCount, chaos: chaos,
        coins: meta.coins, streak: streak, bestStreak: meta.bestStreak,
        erasers: meta.erasers, hints: meta.hints, trophies: meta.trophies,
        decoCount: decoCount, fever: fever, subject: subject, inspector: inspector,
        toy: meta.toy, totalCorrect: meta.totalCorrect,
        // tunables (DESIGN.md cross-check)
        QUESTIONS_PER_LESSON: QUESTIONS_PER_LESSON, LESSONS_PER_DAY: LESSONS_PER_DAY,
        DAYS_PER_GRADE: DAYS_PER_GRADE, MAX_GRADE: MAX_GRADE, CHAOS_MAX: CHAOS_MAX,
        PATIENCE_BASE: PATIENCE_BASE, PATIENCE_MIN: PATIENCE_MIN,
        FEVER_STREAK: FEVER_STREAK, COIN_CORRECT: COIN_CORRECT, STAR_BONUS: STAR_BONUS,
        ERASER_COST: ERASER_COST, HINT_COST: HINT_COST, HINT_ACCURACY: HINT_ACCURACY,
        DAILY_BONUS: DAILY_BONUS, INSPECTOR_PATIENCE: INSPECTOR_PATIENCE,
      };
    });

    // -- BOT CONTRACT (progression probe drives full lessons) --
    GF.exposeBot(botActions, botAct);

    // -- REACHABILITY (4-viewport gate incl. short landscape) --
    GF.exposeReach(function () {
      var H = GF.H, items = [];
      function add(id, r) { if (r) items.push({ id: id, x: r.x, y: r.y, w: r.w, h: r.h, pinned: true }); }
      function addC(id, cc) { if (cc) items.push({ id: id, x: cc.x - cc.r, y: cc.y - cc.r, w: cc.r * 2, h: cc.r * 2, pinned: true }); }
      if (gs === 'PLAYING') {
        if (phase === 'ask' || phase === 'feedback') {
          for (var i = 0; i < 4; i++) add('card' + i, L.cards[i]);
          add('eraser', L.eraser); add('hint', L.hint);
        }
        addC('home', L.corner.home); addC('help', L.corner.help); addC('mute', L.corner.mute);
        return { screen: 'PLAYING', items: items, viewportH: H, scrollMaxY: 0, screenH: H };
      }
      var b = panelBtns();
      if (gs === 'REPORT') { add('next', b.next); return { screen: 'REPORT', items: items, viewportH: H, scrollMaxY: 0, screenH: H }; }
      if (gs === 'FAILED') { if (b.calm) add('calm', b.calm); add('retry', b.retry); return { screen: 'FAILED', items: items, viewportH: H, scrollMaxY: 0, screenH: H }; }
      if (gs === 'DAYDONE' || gs === 'GRADEUP') { add('next', b.next); return { screen: gs, items: items, viewportH: H, scrollMaxY: 0, screenH: H }; }
      if (gs === 'HUB') {
        syncHubScroll();
        add('daily', b.daily); add('continue', b.cont);
        for (var d = 0; d < DECOS.length; d++) {
          var rr4 = hubRowRectContent(d);
          items.push({ id: 'deco_' + DECOS[d].id, x: rr4.x, y: rr4.y, w: rr4.w, h: rr4.h });
        }
        return { screen: 'HUB', items: items, scrollId: 'decos', viewportH: b.vp.h, screenH: H };
      }
      return { screen: gs, items: items, viewportH: H, scrollMaxY: 0, screenH: H };
    });
    GF.exposeTour([
      { name: 'playing', go: function () { silently(forcePlayingAsk); } },
      { name: 'report', go: function () { window._setState('REPORT'); } },
      { name: 'failed', go: function () { window._setState('FAILED'); } },
      { name: 'daydone', go: function () { window._setState('DAYDONE'); } },
      { name: 'gradeup', go: function () { window._setState('GRADEUP'); } },
      { name: 'hub', go: function () { window._setState('HUB'); } },
    ]);

    // -- PLATFORM AUTOSTART (HARD RULE 9). This game has NO menu state at all:
    // it boots straight into the first question on every platform AND the
    // gallery, so __GF_AUTOSTART needs no extra action - the check stays for
    // the template contract.
    if (window.__GF_AUTOSTART && !window._silent) { /* already boots into gameplay */ }

    // Boot STRAIGHT into gameplay: lesson intro -> first question (~2s).
    startLesson(false);
  },
  onUpdate: function (dt) { update(dt); },
  onDraw: function (ctx, dt) { draw(ctx, dt); },
});

// persist on leave (daily/coins/grade survive)
window.addEventListener('beforeunload', function () { try { GF.saveRun(); } catch (e) {} });
window.addEventListener('pagehide', function () { try { GF.saveRun(); } catch (e) {} });

// ============================================================================
//  SCREENSHOT / TOOLING HOOKS
// ============================================================================
// _setLang must also re-localize the live question (math re-renders the same
// numbers; trivia re-picks natively in the new language bank).
window._setLang = function (l) {
  GF.lang = (l === 'ru' ? 'ru' : 'en');
  if (curQ) localizeQ();
};
// Live button rects + their i18n keys for the locale audit (per state).
window._getBtnRects = function () {
  var out = {};
  if (gs === 'PLAYING') {
    out.eraser = { key: 'eraser', x: L.eraser.x, y: L.eraser.y, w: L.eraser.w, h: L.eraser.h, reservedLeft: L.eraser.h * 1.4, padRight: 8 };
    out.hint = { key: 'hint', x: L.hint.x, y: L.hint.y, w: L.hint.w, h: L.hint.h, reservedLeft: L.hint.h * 1.4, padRight: 8 };
    return out;
  }
  var b = panelBtns();
  function reg(name, key, r) { if (r) out[name] = { key: key, x: r.x, y: r.y, w: r.w, h: r.h, padLR: 24 }; }
  if (gs === 'REPORT') reg('next', 'btn_next', b.next);
  if (gs === 'FAILED') { reg('calm', 'btn_calm', b.calm); reg('retry', 'btn_retry', b.retry); }
  if (gs === 'DAYDONE' || gs === 'GRADEUP') reg('next', 'btn_next', b.next);
  if (gs === 'HUB') { reg('daily', 'daily_btn', b.daily); reg('cont', 'btn_continue', b.cont); }
  return out;
};
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return FONT_UI; };
window._setState = function (s) {
  silently(function () {
    GF.tutorial.active = false;
    helpOpen = false;
    if (s === 'PLAYING') { forcePlayingAsk(); }
    else if (s === 'REPORT') { forcePlayingAsk(); lessonStars = 2; lessonCoins = 45; correctCount = 8; pendingAd = false; gs = 'REPORT'; }
    else if (s === 'FAILED') { forcePlayingAsk(); chaos = CHAOS_MAX; gs = 'FAILED'; }
    else if (s === 'DAYDONE') { forcePlayingAsk(); gs = 'DAYDONE'; }
    else if (s === 'GRADEUP') { forcePlayingAsk(); gradePending = true; gs = 'GRADEUP'; }
    else if (s === 'HUB') { forcePlayingAsk(); openHub(); }
  });
};
// Land mid-lesson, populated and lively: question on the board, 4 cards in,
// streak fever burning, one apple bitten, a paper plane mid-flight, classroom
// decorated. >= 70% gameplay (this IS the gameplay screen).
window._setupForScreenshot = function (level) {
  silently(function () {
    try { localStorage.setItem(TUT_KEY, '1'); } catch (e) {}
    firstSessionCoach = false;
    GF.tutorial.active = false;
    helpOpen = false;
    var lv = GF.clamp((level | 0) || 3, 1, MAX_GRADE);
    meta.grade = lv; meta.day = 0; meta.lesson = 1;   // day-1 lesson-2 = Geography
    meta.coins = 230; meta.trophies = 3;
    meta.erasers = 2; meta.hints = 1;
    meta.decos = { poster: 1, plant: 1, globe: 1, aquarium: 1, shelf: 1, desks: 1 };
    startLesson(true);
    enterAsk();
    qIndex = 3; correctCount = 3; streak = 5; fever = true; chaos = 1;
    writeT = 99; cardsInT = 99;
    patLeft = patMax * 0.62;
    spawnPlane();
    var pl = planes[planes.length - 1];
    pl.x = GF.W * 0.32; pl.y = GF.H * 0.56; pl.vx = 90 * GF.S; pl.vy = -30 * GF.S;
    moods[handStudent] = { m: 'happy', t: 99 };
    window._screenshotFreeze = true;
  });
};
window._jumpLevel = function (n) {
  if ((n | 0) >= 99) {
    silently(function () {
      forcePlayingAsk();
      chaos = CHAOS_MAX;
      riotPending = false;
      gs = 'FAILED';
    });
  } else {
    window._setupForScreenshot((n | 0) > 0 ? (n | 0) : 3);
  }
};

})();
</script>
