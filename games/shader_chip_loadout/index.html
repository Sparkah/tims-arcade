<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shader Chip Loadout</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── STRINGS ──────────────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Shader Chip Loadout',
    sub:   'Match the hidden juice target',
    play: 'PLAY', retry: 'RETRY', again: 'PLAY AGAIN',
    score: 'SCORE', best: 'BEST',
    gameover: 'BUDGET BLOWN',
    won: 'DAILY CLEAR!',
    juice: 'JUICE', swaps: 'SWAPS', round: 'R',
    target: 'TARGET', next_round: 'NEXT ROUND',
    tut_goal: 'Goal: Match the publisher’s hidden juice target.',
    tut_controls: 'Controls: Tap a chip, tap a zone. Tap placed chip to remove.',
    tut_win: 'Win: Juice meter crosses target before 6 swaps burn.',
    tut_lose: 'Lose: All 6 swaps used and juice still below target.',
    tut_tip: 'Tip: Each zone reacts differently — sky loves bloom.',
  },
  ru: {
    title: 'Чипы Шейдеров',
    sub:   'Попади в цель сочности',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', again: 'СНОВА',
    score: 'ОЧКИ', best: 'РЕКОРД',
    gameover: 'БЮДЖЕТ СГОРЕЛ',
    won: 'ДНЕВНАЯ ЧИСТКА!',
    juice: 'СОЧНОСТЬ', swaps: 'СВОПЫ', round: 'Р',
    target: 'ЦЕЛЬ', next_round: 'ДАЛЬШЕ',
    tut_goal: 'Цель: попасть в скрытую цель «сочности» издателя.',
    tut_controls: 'Управление: коснись чипа, затем зоны. Коснись в зоне — снять.',
    tut_win: 'Победа: счётчик сочности перешёл цель до 6 свопов.',
    tut_lose: 'Поражение: все 6 свопов потрачены, а сочности мало.',
    tut_tip: 'Совет: каждая зона реагирует по-разному.',
  },
};

var SPRITE_NAMES = [];

// ── TUNABLES ─────────────────────────────────────────────────────────────
var SWAP_BUDGET        = 6;
var ZONE_COUNT         = 8;
var CHIP_COUNT         = 12;
var CHIPS_PER_SCENE    = 5;
var TARGET_VECTOR_MAG  = 100;
var JUICE_MATCH_THRESH = 70;
var MAX_ROUNDS         = 5;
var HINT_REVEAL_LEVEL  = 0.3;
var ZONE_RADIUS        = 56;
var CHIP_WIDTH         = 84;
var CHIP_HEIGHT        = 64;
var TRAY_HEIGHT        = 96;

// ── CHIP CATALOG ─────────────────────────────────────────────────────────
// Each chip: name + 5-dim vector [brightness, saturation, contrast, sharpness, chaos] + color + glyph
var CHIPS = [
  { id: 0,  name: 'BLOOM',     vec: [ 25,  15,   5,  -5,   0], color: '#ffd24d', glyph: '*' },
  { id: 1,  name: 'VIGNETTE',  vec: [-10,   0,  20,   0,   5], color: '#5a3a8a', glyph: 'O' },
  { id: 2,  name: 'CHROMA',    vec: [  5,  20,   0,   0,  25], color: '#e74c3c', glyph: 'C' },
  { id: 3,  name: 'GRAIN',     vec: [  0,  -5,   5,   0,  20], color: '#888899', glyph: '#' },
  { id: 4,  name: 'CONTRAST',  vec: [  0,   5,  30,   5,   0], color: '#34495e', glyph: '+' },
  { id: 5,  name: 'SATURATE',  vec: [  5,  35,   5,   0,   0], color: '#2ecc71', glyph: 'S' },
  { id: 6,  name: 'WARM',      vec: [ 15,  10,   0,   0,  -5], color: '#e67e22', glyph: 'W' },
  { id: 7,  name: 'COOL',      vec: [-10,   5,   5,   0,  -5], color: '#3498db', glyph: 'L' },
  { id: 8,  name: 'BLUR',      vec: [  5,   0, -15, -25,   0], color: '#9b59b6', glyph: '~' },
  { id: 9,  name: 'SHARPEN',   vec: [  0,   5,  10,  30,   5], color: '#1abc9c', glyph: '>' },
  { id: 10, name: 'SCAN',      vec: [-5,    0,  10,   5,  15], color: '#16a085', glyph: '=' },
  { id: 11, name: 'POSTER',    vec: [  0,  20,  25,  10,  10], color: '#d35400', glyph: 'P' },
];

// ── ZONE LAYOUT (relative coords 0..1) ───────────────────────────────────
var ZONE_DEFS = [
  { name: 'SKY',     rx: 0.20, ry: 0.20 },
  { name: 'CLOUDS',  rx: 0.78, ry: 0.18 },
  { name: 'HERO',    rx: 0.50, ry: 0.50 },
  { name: 'L_ACC',   rx: 0.18, ry: 0.55 },
  { name: 'R_ACC',   rx: 0.82, ry: 0.55 },
  { name: 'GROUND',  rx: 0.50, ry: 0.82 },
  { name: 'FG_L',    rx: 0.25, ry: 0.78 },
  { name: 'FG_R',    rx: 0.75, ry: 0.78 },
];

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';
var round = 1;
var swaps_used = 0;
var juice_score = 0;
var target_score = 0;
var target_vec = [0, 0, 0, 0, 0];
var best = 0;
var seed = 0;
var rng = null;
var placements = []; // [chipId or null] per zone
var selected_chip = -1; // chip index in CHIPS
var chip_used = []; // bool per chip in CHIPS catalog
var zone_xy = []; // computed each frame
var tray_xy = []; // computed each frame
var help_btn = null;
var won_banner_t = 0;
var pulse_t = 0;

// ── SEEDED RNG ───────────────────────────────────────────────────────────
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function dailySeed() {
  var d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}

// ── ROUND SETUP ──────────────────────────────────────────────────────────
function makeTargetVec(rnd) {
  // Pick 3-4 chips' vectors and sum them as the hidden target
  var picks = [];
  var pool = CHIPS.slice();
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(rnd() * (i + 1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  var n = 3 + Math.floor(rnd() * 2);
  var v = [0, 0, 0, 0, 0];
  for (var k = 0; k < n; k++) {
    var c = pool[k];
    for (var d = 0; d < 5; d++) v[d] += c.vec[d];
  }
  return v;
}

function startGame() {
  round = 1;
  seed = dailySeed();
  rng = mulberry32(seed);
  setupRound();
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function setupRound() {
  swaps_used = 0;
  juice_score = 0;
  placements = new Array(ZONE_COUNT).fill(null);
  chip_used = new Array(CHIP_COUNT).fill(false);
  selected_chip = -1;
  // Advance the RNG per round so different rounds get different targets
  for (var i = 0; i < round * 7; i++) rng();
  target_vec = makeTargetVec(rng);
  target_score = JUICE_MATCH_THRESH; // threshold-based scoring
  computeJuiceScore();
}

function gameOver() {
  if (round > best) {
    best = round;
    try { localStorage.setItem('shader_chip_loadout_best', String(best)); } catch (e) {}
  }
  gs = 'GAMEOVER';
  GF.setShake(0.4);
  GF.gameEnded();
  GF.saveRun();
}

function wonRun() {
  if (round > best) {
    best = round;
    try { localStorage.setItem('shader_chip_loadout_best', String(best)); } catch (e) {}
  }
  gs = 'WON_RUN';
  GF.gameEnded();
  GF.saveRun();
}

// ── JUICE SCORING ────────────────────────────────────────────────────────
function computeJuiceScore() {
  var sum = [0, 0, 0, 0, 0];
  for (var i = 0; i < ZONE_COUNT; i++) {
    var cid = placements[i];
    if (cid == null) continue;
    var v = CHIPS[cid].vec;
    for (var d = 0; d < 5; d++) sum[d] += v[d];
  }
  // Cosine similarity * 100, clamped
  var dot = 0, ma = 0, mb = 0;
  for (var d2 = 0; d2 < 5; d2++) {
    dot += sum[d2] * target_vec[d2];
    ma += sum[d2] * sum[d2];
    mb += target_vec[d2] * target_vec[d2];
  }
  if (ma <= 0 || mb <= 0) { juice_score = 0; return; }
  var cs = dot / (Math.sqrt(ma) * Math.sqrt(mb));
  juice_score = Math.max(0, Math.min(100, Math.round(cs * 100)));
}

// ── PLACEMENT LOGIC ──────────────────────────────────────────────────────
function placeChip(chipIdx, zoneIdx) {
  if (chipIdx < 0 || chipIdx >= CHIP_COUNT) return;
  if (zoneIdx < 0 || zoneIdx >= ZONE_COUNT) return;
  if (chip_used[chipIdx]) return;
  if (placements[zoneIdx] !== null) return;
  // Count placed chips to enforce CHIPS_PER_SCENE max
  var placed_cnt = 0;
  for (var i = 0; i < ZONE_COUNT; i++) if (placements[i] !== null) placed_cnt++;
  if (placed_cnt >= CHIPS_PER_SCENE) return;
  placements[zoneIdx] = chipIdx;
  chip_used[chipIdx] = true;
  selected_chip = -1;
  swaps_used++;
  computeJuiceScore();
  if (zone_xy[zoneIdx]) {
    GF.spawnParticles(zone_xy[zoneIdx].x, zone_xy[zoneIdx].y, CHIPS[chipIdx].color, 16);
    GF.spawnFloat(zone_xy[zoneIdx].x, zone_xy[zoneIdx].y - 30 * GF.S, '+JUICE', '#ffd24d');
  }
  checkEndOfRound();
  GF.saveRun();
}

function removeChip(zoneIdx) {
  if (zoneIdx < 0 || zoneIdx >= ZONE_COUNT) return;
  var cid = placements[zoneIdx];
  if (cid === null) return;
  placements[zoneIdx] = null;
  chip_used[cid] = false;
  swaps_used++;
  computeJuiceScore();
  if (zone_xy[zoneIdx]) {
    GF.spawnParticles(zone_xy[zoneIdx].x, zone_xy[zoneIdx].y, '#888', 8);
  }
  checkEndOfRound();
  GF.saveRun();
}

function checkEndOfRound() {
  if (juice_score >= target_score) {
    if (round >= MAX_ROUNDS) { wonRun(); return; }
    gs = 'WON_ROUND';
    won_banner_t = 1.4;
    GF.setShake(0.25);
    GF.saveRun();
    return;
  }
  if (swaps_used >= SWAP_BUDGET) {
    gameOver();
  }
}

function nextRound() {
  round++;
  setupRound();
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

// ── INPUT HANDLING ───────────────────────────────────────────────────────
function handleTap(x, y) {
  if (gs !== 'PLAYING') return;
  // ? help button
  if (help_btn && x >= help_btn.x && x <= help_btn.x + help_btn.w &&
      y >= help_btn.y && y <= help_btn.y + help_btn.h) {
    gs = 'HELP';
    return;
  }
  // Tap a placed chip in a zone → remove
  for (var i = 0; i < ZONE_COUNT; i++) {
    var z = zone_xy[i];
    if (!z) continue;
    var dx = x - z.x, dy = y - z.y;
    var r = ZONE_RADIUS * GF.S;
    if (dx * dx + dy * dy <= r * r) {
      if (placements[i] !== null) {
        removeChip(i);
      } else if (selected_chip >= 0) {
        placeChip(selected_chip, i);
      }
      return;
    }
  }
  // Tap a chip in the tray
  for (var k = 0; k < CHIP_COUNT; k++) {
    var t = tray_xy[k];
    if (!t) continue;
    if (x >= t.x && x <= t.x + t.w && y >= t.y && y <= t.y + t.h) {
      if (chip_used[k]) return;
      selected_chip = (selected_chip === k) ? -1 : k;
      return;
    }
  }
}

document.addEventListener('click', function(e) {
  handleTap(e.clientX, e.clientY);
});
document.addEventListener('touchstart', function(e) {
  if (e.changedTouches && e.changedTouches.length) {
    var t = e.changedTouches[0];
    handleTap(t.clientX, t.clientY);
  }
}, { passive: false });

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  pulse_t += dt;
  if (gs === 'WON_ROUND') {
    won_banner_t -= dt;
    if (won_banner_t <= 0) {
      nextRound();
    }
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'PLAYING' || gs === 'WON_ROUND' || gs === 'HELP' || gs === 'GAMEOVER' || gs === 'WON_RUN') {
    drawScene(ctx);
    drawZones(ctx);
    drawTray(ctx);
    drawHUD(ctx);
  }

  if (gs === 'WON_ROUND') {
    drawWonRoundBanner(ctx);
  }
  if (gs === 'HELP') {
    drawHelpOverlay(ctx);
  }
  if (gs === 'MENU') {
    drawMenu(ctx);
  }
  if (gs === 'GAMEOVER') {
    drawGameOver(ctx);
  }
  if (gs === 'WON_RUN') {
    drawWonRun(ctx);
  }
}

function getSceneRect() {
  // Scene fills middle area between top HUD (10%) and tray (28%)
  var top = 70 * GF.S;
  var bottom = GF.H - (TRAY_HEIGHT + 12) * GF.S;
  return { x: 0, y: top, w: GF.W, h: bottom - top };
}

function drawScene(ctx) {
  var r = getSceneRect();
  // Compute juice intensity for visual feedback (0..1)
  var ji = Math.min(1, juice_score / 100);

  // Sky gradient (dull-ish base + boosted with juice)
  var skyGrad = ctx.createLinearGradient(0, r.y, 0, r.y + r.h * 0.6);
  var skyTop = lerpColor([60, 70, 90], [120, 80, 180], ji);
  var skyBot = lerpColor([100, 110, 130], [240, 160, 100], ji);
  skyGrad.addColorStop(0, rgb(skyTop));
  skyGrad.addColorStop(1, rgb(skyBot));
  ctx.fillStyle = skyGrad;
  ctx.fillRect(r.x, r.y, r.w, r.h);

  // Ground band
  var groundY = r.y + r.h * 0.72;
  var groundGrad = ctx.createLinearGradient(0, groundY, 0, r.y + r.h);
  groundGrad.addColorStop(0, rgb(lerpColor([55, 50, 45], [110, 50, 30], ji)));
  groundGrad.addColorStop(1, rgb(lerpColor([30, 28, 25], [60, 25, 15], ji)));
  ctx.fillStyle = groundGrad;
  ctx.fillRect(r.x, groundY, r.w, r.y + r.h - groundY);

  // Sun/moon (top-right)
  var sunR = 38 * GF.S;
  ctx.fillStyle = rgb(lerpColor([180, 180, 180], [255, 230, 140], ji));
  ctx.globalAlpha = 0.75;
  ctx.beginPath();
  ctx.arc(r.x + r.w * 0.78, r.y + r.h * 0.22, sunR, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Mountain silhouettes
  ctx.fillStyle = rgb(lerpColor([45, 50, 65], [25, 30, 50], ji * 0.5));
  ctx.beginPath();
  ctx.moveTo(r.x, groundY);
  ctx.lineTo(r.x + r.w * 0.15, groundY - 60 * GF.S);
  ctx.lineTo(r.x + r.w * 0.30, groundY - 30 * GF.S);
  ctx.lineTo(r.x + r.w * 0.45, groundY - 80 * GF.S);
  ctx.lineTo(r.x + r.w * 0.65, groundY - 40 * GF.S);
  ctx.lineTo(r.x + r.w * 0.85, groundY - 65 * GF.S);
  ctx.lineTo(r.x + r.w, groundY - 20 * GF.S);
  ctx.lineTo(r.x + r.w, groundY);
  ctx.closePath();
  ctx.fill();

  // Hero silhouette (center)
  var hx = r.x + r.w * 0.5;
  var hy = groundY - 4 * GF.S;
  var heroH = 90 * GF.S;
  ctx.fillStyle = rgb(lerpColor([20, 22, 30], [80, 30, 30], ji));
  // body
  GF.rr(ctx, hx - 18 * GF.S, hy - heroH, 36 * GF.S, heroH * 0.65, 6 * GF.S);
  ctx.fill();
  // head
  ctx.beginPath();
  ctx.arc(hx, hy - heroH - 4 * GF.S, 18 * GF.S, 0, Math.PI * 2);
  ctx.fill();
  // legs
  ctx.fillRect(hx - 16 * GF.S, hy - heroH * 0.35, 12 * GF.S, heroH * 0.35);
  ctx.fillRect(hx + 4 * GF.S, hy - heroH * 0.35, 12 * GF.S, heroH * 0.35);

  // Vignette overlay (always-on subtle, boost with chip applied)
  var vignetteApplied = isChipPlaced(1); // VIGNETTE
  var vAlpha = vignetteApplied ? 0.55 : 0.18;
  var vGrad = ctx.createRadialGradient(GF.cx, r.y + r.h * 0.5, r.w * 0.2, GF.cx, r.y + r.h * 0.5, r.w * 0.75);
  vGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vGrad.addColorStop(1, 'rgba(0,0,0,' + vAlpha + ')');
  ctx.fillStyle = vGrad;
  ctx.fillRect(r.x, r.y, r.w, r.h);

  // Grain overlay
  if (isChipPlaced(3)) {
    ctx.globalAlpha = 0.12;
    for (var g = 0; g < 240; g++) {
      ctx.fillStyle = (g & 1) ? '#fff' : '#000';
      ctx.fillRect(r.x + Math.random() * r.w, r.y + Math.random() * r.h, 2, 2);
    }
    ctx.globalAlpha = 1;
  }

  // Scanlines
  if (isChipPlaced(10)) {
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#000';
    for (var s = r.y; s < r.y + r.h; s += 4 * GF.S) {
      ctx.fillRect(r.x, s, r.w, 1 * GF.S);
    }
    ctx.globalAlpha = 1;
  }

  // Bloom overlay
  if (isChipPlaced(0)) {
    ctx.globalAlpha = 0.35;
    var bg = ctx.createRadialGradient(GF.cx, r.y + r.h * 0.35, 20 * GF.S, GF.cx, r.y + r.h * 0.35, r.w * 0.45);
    bg.addColorStop(0, 'rgba(255,220,140,1)');
    bg.addColorStop(1, 'rgba(255,220,140,0)');
    ctx.fillStyle = bg;
    ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.globalAlpha = 1;
  }

  // Chromatic aberration on hero
  if (isChipPlaced(2)) {
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#ff003c';
    ctx.fillRect(hx - 21 * GF.S, hy - heroH, 4 * GF.S, heroH * 0.65);
    ctx.fillStyle = '#00d4ff';
    ctx.fillRect(hx + 17 * GF.S, hy - heroH, 4 * GF.S, heroH * 0.65);
    ctx.globalAlpha = 1;
  }
}

function isChipPlaced(chipIdx) {
  for (var i = 0; i < ZONE_COUNT; i++) if (placements[i] === chipIdx) return true;
  return false;
}

function lerpColor(a, b, t) {
  return [
    Math.round(a[0] + (b[0] - a[0]) * t),
    Math.round(a[1] + (b[1] - a[1]) * t),
    Math.round(a[2] + (b[2] - a[2]) * t),
  ];
}
function rgb(c) { return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')'; }

function drawZones(ctx) {
  zone_xy = [];
  var r = getSceneRect();
  var rad = ZONE_RADIUS * GF.S;
  for (var i = 0; i < ZONE_COUNT; i++) {
    var def = ZONE_DEFS[i];
    var x = r.x + def.rx * r.w;
    var y = r.y + def.ry * r.h;
    zone_xy.push({ x: x, y: y });

    var cid = placements[i];
    var pulse = 0.5 + 0.5 * Math.sin(pulse_t * 2.4 + i);
    var col = cid !== null ? CHIPS[cid].color : '#ffffff';
    ctx.save();
    ctx.globalAlpha = cid !== null ? 0.85 : 0.4 + 0.2 * pulse;
    ctx.strokeStyle = col;
    ctx.lineWidth = (cid !== null ? 3 : 2) * GF.S;
    ctx.setLineDash(cid !== null ? [] : [6 * GF.S, 4 * GF.S]);
    ctx.beginPath();
    ctx.arc(x, y, rad, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    if (cid !== null) {
      // Draw placed chip in zone
      ctx.fillStyle = CHIPS[cid].color;
      ctx.globalAlpha = 0.92;
      GF.rr(ctx, x - 28 * GF.S, y - 18 * GF.S, 56 * GF.S, 36 * GF.S, 8 * GF.S);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#0a0a14';
      ctx.font = 'bold ' + GF.clamp(11 * GF.S, 9, 16) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(CHIPS[cid].name, x, y);
    } else {
      // Zone label
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.6;
      ctx.font = 'bold ' + GF.clamp(10 * GF.S, 8, 14) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(ZONE_DEFS[i].name, x, y);
      ctx.globalAlpha = 1;
    }

    // Selection halo if selected_chip would fit here
    if (selected_chip >= 0 && cid === null) {
      ctx.save();
      ctx.globalAlpha = 0.4 + 0.3 * pulse;
      ctx.fillStyle = CHIPS[selected_chip].color;
      ctx.beginPath();
      ctx.arc(x, y, rad * 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
}

function drawTray(ctx) {
  tray_xy = [];
  var trayY = GF.H - TRAY_HEIGHT * GF.S;
  ctx.fillStyle = 'rgba(15, 18, 30, 0.92)';
  ctx.fillRect(0, trayY, GF.W, TRAY_HEIGHT * GF.S);
  ctx.fillStyle = '#4dd0e1';
  ctx.fillRect(0, trayY, GF.W, 2 * GF.S);

  var slotW = CHIP_WIDTH * GF.S;
  var slotH = CHIP_HEIGHT * GF.S;
  var pad = 6 * GF.S;
  var totalW = CHIP_COUNT * (slotW + pad) - pad;
  var scale = totalW > GF.W - 16 * GF.S ? (GF.W - 16 * GF.S) / totalW : 1;
  slotW *= scale;
  slotH *= scale;
  var startX = (GF.W - (CHIP_COUNT * (slotW + pad) - pad)) / 2;
  var slotY = trayY + (TRAY_HEIGHT * GF.S - slotH) / 2;

  for (var i = 0; i < CHIP_COUNT; i++) {
    var x = startX + i * (slotW + pad);
    var c = CHIPS[i];
    var used = chip_used[i];
    var selected = (i === selected_chip);

    tray_xy.push({ x: x, y: slotY, w: slotW, h: slotH });

    ctx.globalAlpha = used ? 0.25 : 1;
    GF.rr(ctx, x, slotY, slotW, slotH, 10 * GF.S);
    ctx.fillStyle = c.color;
    ctx.fill();

    if (selected) {
      ctx.strokeStyle = '#ffeb3b';
      ctx.lineWidth = 3 * GF.S;
      GF.rr(ctx, x - 2, slotY - 2, slotW + 4, slotH + 4, 12 * GF.S);
      ctx.stroke();
    }

    ctx.fillStyle = '#0a0a14';
    ctx.font = 'bold ' + GF.clamp(11 * GF.S * scale, 8, 14) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.name, x + slotW / 2, slotY + slotH / 2);
    ctx.globalAlpha = 1;
  }
}

function drawHUD(ctx) {
  // Top bar
  var barH = 56 * GF.S;
  ctx.fillStyle = 'rgba(10, 14, 24, 0.88)';
  ctx.fillRect(0, 0, GF.W, barH);

  var fs = GF.clamp(13 * GF.S, 10, 18);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';

  // Juice meter
  var meterX = 12 * GF.S;
  var meterY = barH / 2 - 8 * GF.S;
  var meterW = GF.W * 0.55;
  var meterH = 16 * GF.S;
  ctx.fillStyle = '#222';
  GF.rr(ctx, meterX, meterY, meterW, meterH, 4 * GF.S);
  ctx.fill();
  var fillW = (juice_score / 100) * meterW;
  var meterCol = juice_score >= target_score ? '#2ecc71' : '#ffd24d';
  ctx.fillStyle = meterCol;
  GF.rr(ctx, meterX, meterY, fillW, meterH, 4 * GF.S);
  ctx.fill();
  // Target threshold marker
  var targetX = meterX + (target_score / 100) * meterW;
  ctx.fillStyle = '#fff';
  ctx.fillRect(targetX - 1, meterY - 4 * GF.S, 2, meterH + 8 * GF.S);
  // Labels
  ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('juice') + ': ' + juice_score, meterX, meterY - 14 * GF.S);
  ctx.fillStyle = '#bcd';
  ctx.font = GF.clamp(10 * GF.S, 8, 13) + 'px sans-serif';
  ctx.fillText(GF.t('target') + ': ' + target_score, targetX + 4, meterY - 14 * GF.S);

  // Swap counter right
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillStyle = swaps_used >= SWAP_BUDGET - 1 ? '#e74c3c' : '#fff';
  ctx.fillText(GF.t('swaps') + ': ' + swaps_used + '/' + SWAP_BUDGET, GF.W - 60 * GF.S, barH / 2);

  // Round indicator
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('round') + ' ' + round + '/' + MAX_ROUNDS, GF.cx, 14 * GF.S);

  // ? button
  var hbS = 36 * GF.S;
  help_btn = { x: GF.W - hbS - 8 * GF.S, y: 8 * GF.S, w: hbS, h: hbS };
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  GF.rr(ctx, help_btn.x, help_btn.y, help_btn.w, help_btn.h, 8 * GF.S);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 24) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', help_btn.x + help_btn.w / 2, help_btn.y + help_btn.h / 2);
}

function drawTutorialPanel(ctx, cx, top) {
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  var fs = GF.clamp(13 * GF.S, 10, 17);
  ctx.font = fs + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#cde';
  var y = top;
  var maxW = Math.max(220 * GF.S, GF.W - 42 * GF.S);
  var lineH = fs + 5 * GF.S;
  for (var i = 0; i < lines.length; i++) {
    y = drawWrappedTextCentered(ctx, lines[i], cx, y, maxW, lineH) + 4 * GF.S;
  }
  return y;
}

function drawWrappedTextCentered(ctx, text, cx, y, maxW, lineH) {
  var words = String(text).split(/\s+/);
  var line = '';
  var cy = y;
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, cx, cy);
      line = words[i];
      cy += lineH;
    } else {
      line = test;
    }
  }
  if (line) {
    ctx.fillText(line, cx, cy);
    cy += lineH;
  }
  return cy;
}

function drawMenu(ctx) {
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(34 * GF.S, 22, 50);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = '#ffd24d';
  ctx.shadowBlur = 30 * GF.S;
  ctx.fillText(GF.t('title'), GF.cx, GF.cy - 140 * GF.S);
  ctx.shadowBlur = 0;
  ctx.font = GF.clamp(14 * GF.S, 11, 18) + 'px sans-serif';
  ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t('sub'), GF.cx, GF.cy - 110 * GF.S);

  // Tutorial panel
  var tutEnd = drawTutorialPanel(ctx, GF.cx, GF.cy - 80 * GF.S);

  // Play button
  var wide = GF.W / GF.H > 1.15;
  var btnW = GF.clamp((wide ? 330 : 240) * GF.S, 160, 420);
  var btnH = GF.clamp((wide ? 70 : 52) * GF.S, 40, 86);
  var btnX = GF.cx - btnW / 2;
  var _wideFloor = GF.H * 0.58;
  var btnY = wide
    ? Math.max(tutEnd + btnH / 2 + 16, _wideFloor)
    : Math.min(Math.max(tutEnd + 16 * GF.S, GF.cy + 90 * GF.S), GF.H - btnH - 24 * GF.S);
  // Pulse animation on wide
  var _t = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000;
  var _k = Math.sin(_t * 2.2);
  var _p = wide ? (1 + 0.05 * _k) : 1;
  var _pw = btnW * _p, _ph = btnH * _p, _px = GF.cx - _pw / 2, _py = btnY + btnH / 2 - _ph / 2;
  ctx.save();
  if (wide) { ctx.shadowColor = 'rgba(255,210,77,' + (0.4 + 0.28 * _k).toFixed(3) + ')'; ctx.shadowBlur = (22 + 10 * _k) * GF.S; }
  var grad = ctx.createLinearGradient(_px, _py, _px, _py + _ph);
  grad.addColorStop(0, '#ffd24d');
  grad.addColorStop(1, '#e67e22');
  GF.rr(ctx, _px, _py, _pw, _ph, _ph / 2);
  ctx.fillStyle = grad;
  ctx.fill(); ctx.restore();
  ctx.fillStyle = '#0a0a14';
  ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 24) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('▶ ' + GF.t('play'), GF.cx, btnY + btnH / 2);

  if (best > 0) {
    ctx.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
    ctx.fillStyle = '#778';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, btnY + btnH + 28 * GF.S);
  }

  // Register PLAY button
  _menuBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
}

var _menuBtn = null;

function drawGameOver(ctx) {
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(38 * GF.S, 22, 56);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#e74c3c';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('gameover'), GF.cx, GF.cy - 60 * GF.S);

  ctx.font = GF.clamp(16 * GF.S, 12, 22) + 'px sans-serif';
  ctx.fillStyle = '#bcd';
  ctx.fillText(GF.t('juice') + ' ' + juice_score + ' / ' + target_score, GF.cx, GF.cy - 20 * GF.S);

  var btnW = GF.clamp(240 * GF.S, 160, 320);
  var btnH = GF.clamp(52 * GF.S, 40, 66);
  var btnX = GF.cx - btnW / 2;
  var btnY = GF.cy + 30 * GF.S;
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#2ecc71');
  grad.addColorStop(1, '#27ae60');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 24) + 'px sans-serif';
  ctx.fillText(GF.t('retry'), GF.cx, btnY + btnH / 2);

  ctx.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
  ctx.fillStyle = '#778';
  ctx.fillText(GF.t('best') + ': ' + best, GF.cx, btnY + btnH + 28 * GF.S);

  _menuBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
}

function drawWonRoundBanner(ctx) {
  var alpha = Math.max(0, Math.min(1, won_banner_t));
  ctx.fillStyle = 'rgba(46, 204, 113, ' + (alpha * 0.55) + ')';
  ctx.fillRect(0, GF.cy - 60 * GF.S, GF.W, 120 * GF.S);
  ctx.font = 'bold ' + GF.clamp(34 * GF.S, 22, 52) + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = alpha;
  ctx.fillText(GF.t('next_round'), GF.cx, GF.cy);
  ctx.globalAlpha = 1;
}

function drawWonRun(ctx) {
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  ctx.font = 'bold ' + GF.clamp(42 * GF.S, 24, 60) + 'px sans-serif';
  ctx.fillStyle = '#ffd24d';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('won'), GF.cx, GF.cy - 50 * GF.S);

  ctx.font = GF.clamp(16 * GF.S, 12, 22) + 'px sans-serif';
  ctx.fillStyle = '#bcd';
  ctx.fillText(GF.t('score') + ': ' + round, GF.cx, GF.cy - 10 * GF.S);

  var btnW = GF.clamp(240 * GF.S, 160, 320);
  var btnH = GF.clamp(52 * GF.S, 40, 66);
  var btnX = GF.cx - btnW / 2;
  var btnY = GF.cy + 30 * GF.S;
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#2ecc71');
  grad.addColorStop(1, '#27ae60');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 24) + 'px sans-serif';
  ctx.fillText(GF.t('again'), GF.cx, btnY + btnH / 2);

  _menuBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
}

function drawHelpOverlay(ctx) {
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  ctx.font = 'bold ' + GF.clamp(26 * GF.S, 18, 38) + 'px sans-serif';
  ctx.fillStyle = '#ffd24d';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('title'), GF.cx, GF.cy - 130 * GF.S);
  var tutEnd = drawTutorialPanel(ctx, GF.cx, GF.cy - 90 * GF.S);

  var btnW = GF.clamp(200 * GF.S, 140, 280);
  var btnH = GF.clamp(46 * GF.S, 38, 60);
  var btnX = GF.cx - btnW / 2;
  var btnY = Math.min(Math.max(tutEnd + 18 * GF.S, GF.cy + 70 * GF.S), GF.H - btnH - 24 * GF.S);
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = '#4dd0e1';
  ctx.fill();
  ctx.fillStyle = '#0a0a14';
  ctx.font = 'bold ' + GF.clamp(16 * GF.S, 12, 22) + 'px sans-serif';
  ctx.fillText('OK', GF.cx, btnY + btnH / 2);

  _menuBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
}

// Menu / GameOver / WonRun / Help button handler
function _handleMenuPress(x, y) {
  if (!_menuBtn) return false;
  if (x >= _menuBtn.x && x <= _menuBtn.x + _menuBtn.w &&
      y >= _menuBtn.y && y <= _menuBtn.y + _menuBtn.h) {
    if (gs === 'MENU') {
      try { localStorage.setItem('shader_chip_loadout_seen_tutorial', '1'); } catch (e) {}
      startGame();
      return true;
    } else if (gs === 'GAMEOVER' || gs === 'WON_RUN') {
      startGame();
      return true;
    } else if (gs === 'HELP') {
      gs = 'PLAYING';
      return true;
    }
  }
  return false;
}
document.addEventListener('click', function(e) { _handleMenuPress(e.clientX, e.clientY); });
document.addEventListener('touchstart', function(e) {
  if (e.changedTouches && e.changedTouches.length) {
    var t = e.changedTouches[0];
    _handleMenuPress(t.clientX, t.clientY);
  }
}, { passive: false });

// Screenshot helper — land in mid-puzzle PLAYING state
window._setupForScreenshot = function(level) {
  startGame();
  // Place 3 chips into 3 zones so screenshots show a populated puzzle
  placeChip(0, 0); // BLOOM -> SKY
  placeChip(4, 2); // CONTRAST -> HERO
  placeChip(5, 5); // SATURATE -> GROUND
  gs = 'PLAYING';
};
// _jumpLevel — used by runtime gate. level=99 forces terminal state.
window._jumpLevel = function(level) {
  if (level >= 99) {
    // Force GAMEOVER by burning all swaps without hitting target
    startGame();
    // Pick chips that mismatch target by using zero-vector placements
    swaps_used = SWAP_BUDGET;
    juice_score = 0;
    gameOver();
    return;
  }
  window._setupForScreenshot(level);
};

// ── EXPOSE STATE EARLY (so runtime gate's 800ms-after-load probe finds it) ─
GF.exposeState(function() {
  return { gs: gs, round: round, swaps_used: swaps_used, juice_score: juice_score, target_score: target_score };
});

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'shader_chip_loadout',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('shader_chip_loadout_best') || '0') || 0; } catch (e) {}
    GF.persist('shader_chip_loadout_run_v1',
      function() { return { gs: gs, round: round, swaps_used: swaps_used, juice_score: juice_score, target_score: target_score, target_vec: target_vec, placements: placements, chip_used: chip_used, seed: seed, best: best }; },
      function(s) {
        if (!s) return;
        gs    = s.gs    || 'MENU';
        round = s.round || 1;
        swaps_used = s.swaps_used || 0;
        juice_score = s.juice_score || 0;
        target_score = s.target_score || JUICE_MATCH_THRESH;
        target_vec = s.target_vec || [0,0,0,0,0];
        placements = s.placements || new Array(ZONE_COUNT).fill(null);
        chip_used = s.chip_used || new Array(CHIP_COUNT).fill(false);
        seed = s.seed || 0;
        best = s.best || best;
      }
    );
    if (gs === 'PLAYING') {
      // continue from saved state
    } else {
      gs = 'MENU';
    }
    GF.exposeState(function() {
      return { gs: gs, round: round, swaps_used: swaps_used, juice_score: juice_score, target_score: target_score };
    });
  },
  onUpdate: update,
  onDraw: draw,
});

})();
</script>
