function seededRandom() {
  rngSeed = (rngSeed * 1664525 + 1013904223) >>> 0;
  return rngSeed / 4294967296;
}

function rand(a, b) {
  return a + (b - a) * seededRandom();
}

function clamp(v, lo, hi) {
  return v < lo ? lo : v > hi ? hi : v;
}

function layout() {
  var minSide = Math.max(1, Math.min(GF.W, GF.H));
  var raw = Math.min(GF.W / 900, GF.H / 650);
  var ui = clamp(raw, 0.72, 1.28);
  if (minSide < 430) ui = clamp(minSide / 430, 0.66, 0.98);
  var top = GF.W < 520 ? 106 * ui : 78 * ui;
  var bottom = GF.W < 520 ? 122 * ui : 88 * ui;
  scene.ui = ui;
  scene.top = top;
  scene.bottom = bottom;
  scene.x = 0;
  scene.y = top;
  scene.w = GF.W;
  scene.h = Math.max(160, GF.H - top - bottom);
  uiRects.help = { x: GF.W - 44 * ui, y: 9 * ui, w: 32 * ui, h: 32 * ui };
  uiRects.mute = { x: GF.W - 82 * ui, y: 9 * ui, w: 32 * ui, h: 32 * ui };
  uiRects.retry = { x: GF.cx - 82 * ui, y: GF.cy + 88 * ui, w: 164 * ui, h: 44 * ui };
  uiRects.helpClose = { x: GF.cx - 76 * ui, y: GF.cy + 148 * ui, w: 152 * ui, h: 38 * ui };
  buildCardRects();
  if (!target.x || !target.y) {
    target.x = scene.x + scene.w * 0.45;
    target.y = scene.y + scene.h * 0.55;
  }
  target.x = clamp(target.x, scene.x + 20 * ui, scene.x + scene.w - 20 * ui);
  target.y = clamp(target.y, scene.y + 20 * ui, scene.y + scene.h - 20 * ui);
}

function buildCardRects() {
  var ui = scene.ui || 1;
  var areaW = Math.min(GF.W - 28 * ui, 760 * ui);
  var cardH = GF.W < 560 ? 94 * ui : 150 * ui;
  var gap = 12 * ui;
  var cardW = GF.W < 560 ? areaW : (areaW - gap * 2) / 3;
  var startX = (GF.W - areaW) / 2;
  var startY = GF.W < 560 ? GF.cy - 104 * ui : GF.cy - 38 * ui;
  uiRects.cards = [];
  for (var i = 0; i < 3; i++) {
    var x = GF.W < 560 ? startX : startX + i * (cardW + gap);
    var y = GF.W < 560 ? startY + i * (cardH + 9 * ui) : startY;
    uiRects.cards.push({ x: x, y: y, w: cardW, h: cardH });
  }
}

function pressureForGeneration(g) {
  if (g <= 1) return PRESSURES[0];
  if (g <= 2) return PRESSURES[1];
  if (g <= 3) return PRESSURES[2];
  if (g <= 4) return PRESSURES[3];
  if (g <= 5) return PRESSURES[4];
  return PRESSURES[5 + ((g - 6) % 3)];
}

function resetTraits() {
  trait = {
    heat: 0.20,
    cold: 0.20,
    toxin: 0.18,
    armor: 0.14,
    speed: 0.20,
    forage: 0.18
  };
}

function traitValue(k) {
  return clamp(trait[k] || 0, 0, 1.6);
}

function pressureResistance(p) {
  var sum = 0;
  for (var i = 0; i < p.traits.length; i++) sum += traitValue(p.traits[i]);
  return sum / Math.max(1, p.traits.length);
}

function habitatBonusAt(x, y) {
  for (var i = 0; i < habitats.length; i++) {
    var h = habitats[i];
    if (GF.dist(x, y, h.x, h.y) <= h.r) return 0.34;
  }
  return 0;
}

function pressureName(p) {
  return GF.t(p && p.key ? p.key : 'pressure_heat');
}

function traitName(k) {
  return GF.t(k);
}

function setTarget(x, y) {
  layout();
  target.x = clamp(x, scene.x + TARGET_RADIUS * scene.ui, scene.x + scene.w - TARGET_RADIUS * scene.ui);
  target.y = clamp(y, scene.y + TARGET_RADIUS * scene.ui, scene.y + scene.h - TARGET_RADIUS * scene.ui);
  target.pulse = 1.24;
  pointer.moved = true;
  if (!tutorialDone && coachStep === 0 && GF.dist(target.x, target.y, pointer.sx, pointer.sy) > 38 * scene.ui) {
    coachStep = 1;
    coachTimer = 0;
  }
}

function startNewRun() {
  layout();
  gs = 'PLAYING';
  score = 0;
  generation = 1;
  population = START_POPULATION;
  dna = START_DNA;
  totalDNA = 0;
  mutationHistory = [];
  resetTraits();
  target.x = scene.x + scene.w * 0.45;
  target.y = scene.y + scene.h * 0.56;
  coachStep = tutorialDone ? 3 : 0;
  coachTimer = 0;
  screenshotMode = false;
  startWave(true);
  GF.gameStarted();
  saveRun();
}

function startWave(resetPositions) {
  layout();
  gs = 'PLAYING';
  currentPressure = pressureForGeneration(generation);
  nextPressure = pressureForGeneration(generation + 1);
  waveTime = 0;
  hunger = 100;
  foodTimer = 0.8;
  hazardTimer = 0.9;
  predatorTimer = currentPressure.predator || generation >= 4 ? 2.3 : 999;
  damageCooldown = 0;
  foods = [];
  hazards = [];
  predators = [];
  habitats = [];
  cards = [];
  createHabitats();
  spawnFood();
  spawnFood();
  spawnHazard();
  if (currentPressure.predator || generation >= 4) spawnPredator();
  if (resetPositions || creatures.length === 0) seedCreatures();
  syncCreatureCount();
}

function seedCreatures() {
  creatures = [];
  for (var i = 0; i < population; i++) addCreature(target.x + rand(-26, 26) * scene.ui, target.y + rand(-26, 26) * scene.ui);
}

function addCreature(x, y) {
  var a = rand(0, Math.PI * 2);
  creatures.push({
    x: x,
    y: y,
    vx: 0,
    vy: 0,
    ox: Math.cos(a) * rand(8, 42),
    oy: Math.sin(a) * rand(8, 34),
    phase: rand(0, Math.PI * 2),
    scale: rand(0.88, 1.15),
    blink: rand(0, 1)
  });
}

function syncCreatureCount() {
  population = clamp(Math.round(population), 0, MAX_POPULATION);
  while (creatures.length > population) creatures.pop();
  while (creatures.length < population) addCreature(target.x + rand(-18, 18) * scene.ui, target.y + rand(-18, 18) * scene.ui);
}

function createHabitats() {
  var count = currentPressure.traits.length;
  for (var i = 0; i < count; i++) {
    var x = scene.x + scene.w * (0.25 + 0.5 * seededRandom());
    var y = scene.y + scene.h * (0.25 + 0.52 * seededRandom());
    habitats.push({ x: x, y: y, r: HABITAT_RADIUS * scene.ui, trait: currentPressure.traits[i], pulse: rand(0, 1) });
  }
}

function spawnFood() {
  layout();
  var margin = 48 * scene.ui;
  foods.push({
    x: rand(scene.x + margin, scene.x + scene.w - margin),
    y: rand(scene.y + margin, scene.y + scene.h - margin),
    r: FOOD_RADIUS * scene.ui,
    life: 16 + traitValue('forage') * 6,
    pulse: rand(0, 1)
  });
}

function spawnHazard() {
  layout();
  var pressureTraits = currentPressure.traits;
  var k = pressureTraits[Math.floor(seededRandom() * pressureTraits.length)] || 'heat';
  var margin = 42 * scene.ui;
  hazards.push({
    x: rand(scene.x + margin, scene.x + scene.w - margin),
    y: rand(scene.y + margin, scene.y + scene.h - margin),
    r: HAZARD_RADIUS * scene.ui * rand(0.88, 1.18),
    trait: k,
    life: 5.6 + generation * 0.25,
    pulse: rand(0, 1),
    tick: 0
  });
}

function spawnPredator() {
  layout();
  var side = Math.floor(seededRandom() * 4);
  var x = side === 0 ? scene.x - 28 * scene.ui : side === 1 ? scene.x + scene.w + 28 * scene.ui : rand(scene.x, scene.x + scene.w);
  var y = side === 2 ? scene.y - 28 * scene.ui : side === 3 ? scene.y + scene.h + 28 * scene.ui : rand(scene.y, scene.y + scene.h);
  predators.push({ x: x, y: y, vx: 0, vy: 0, bite: 0, pulse: rand(0, 1) });
}

function collectFood(idx) {
  var f = foods[idx];
  foods.splice(idx, 1);
  var gain = FOOD_VALUE + Math.floor(traitValue('forage') * 2);
  var dnaGain = FOOD_DNA + Math.floor(traitValue('forage') * 5);
  population = Math.min(MAX_POPULATION, population + gain);
  dna += dnaGain;
  totalDNA += dnaGain;
  score += 35 + dnaGain * 2 + generation * 4;
  hunger = Math.min(100, hunger + 34 + traitValue('forage') * 18);
  syncCreatureCount();
  GF.sfx('pickup');
  GF.juice.particles.burst(f.x, f.y, { count: 22, colors: ['#73e889', '#f5db5d', '#62d0a8'], speed: 210, gravity: -90, size: 5, life: 0.7 });
  GF.juice.floatText(f.x, f.y - 10 * scene.ui, GF.t('dna_gain') + ' +' + String(dnaGain), { color: '#f5db5d', size: 15 });
  saveRun();
}

function applyPopulationLoss(amount, x, y, color) {
  if (gs !== 'PLAYING') return;
  if (!tutorialDone && waveTime < tutorialSafeUntil) {
    GF.juice.floatText(x || target.x, y || target.y, GF.t('resisted'), { color: '#a6f1ff', size: 13 });
    return;
  }
  var loss = Math.max(1, Math.round(amount));
  if (screenshotMode && population - loss <= 4) {
    loss = Math.max(0, population - 5);
    if (loss <= 0) {
      GF.juice.floatText(x || target.x, y || target.y, GF.t('resisted'), { color: '#a6f1ff', size: 13 });
      return;
    }
  }
  population = Math.max(0, population - loss);
  for (var i = 0; i < loss && creatures.length > 0; i++) {
    var idx = Math.floor(seededRandom() * creatures.length);
    var c = creatures[idx];
    GF.juice.particles.burst(c.x, c.y, { count: 8, colors: [color || '#ff6b6b', '#f5db5d'], speed: 130, gravity: 40, size: 4, life: 0.45 });
    creatures.splice(idx, 1);
  }
  GF.sfx('hurt');
  GF.juice.shake(8, 260);
  GF.juice.flash('rgba(255,80,80,1)', 140, 0.22);
  GF.juice.floatText(x || target.x, y || target.y, GF.t('damage') + ' -' + String(loss), { color: '#ff9b83', size: 15 });
  if (population <= 0) gameOver();
  else saveRun();
}

function updateKeyboard(dt) {
  if (helpOpen) return;
  var dx = 0, dy = 0;
  if (GF.keys.ArrowLeft || GF.keys.KeyA) dx -= 1;
  if (GF.keys.ArrowRight || GF.keys.KeyD) dx += 1;
  if (GF.keys.ArrowUp || GF.keys.KeyW) dy -= 1;
  if (GF.keys.ArrowDown || GF.keys.KeyS) dy += 1;
  if (dx || dy) {
    var d = Math.sqrt(dx * dx + dy * dy) || 1;
    setTarget(target.x + dx / d * BROOD_SPEED * 1.45 * scene.ui * dt, target.y + dy / d * BROOD_SPEED * 1.45 * scene.ui * dt);
  }
  if (gs === 'MUTATE') {
    if (GF.keys.Digit1) { GF.keys.Digit1 = false; chooseMutation(0); }
    if (GF.keys.Digit2) { GF.keys.Digit2 = false; chooseMutation(1); }
    if (GF.keys.Digit3) { GF.keys.Digit3 = false; chooseMutation(2); }
  }
  if ((GF.keys.Space || GF.keys.Enter) && gs === 'GAMEOVER') {
    GF.keys.Space = false;
    GF.keys.Enter = false;
    startNewRun();
  }
}

function updateCreatures(dt) {
  var speed = (BROOD_SPEED * (0.70 + traitValue('speed') * 0.70)) * scene.ui;
  for (var i = 0; i < creatures.length; i++) {
    var c = creatures[i];
    c.phase += dt * (1.4 + traitValue('speed'));
    var ox = c.ox * scene.ui + Math.cos(c.phase) * 6 * scene.ui;
    var oy = c.oy * scene.ui + Math.sin(c.phase * 1.3) * 5 * scene.ui;
    var tx = target.x + ox;
    var ty = target.y + oy;
    var ax = 0, ay = 0;
    for (var h = 0; h < hazards.length; h++) {
      var hz = hazards[h];
      var hd = GF.dist(c.x, c.y, hz.x, hz.y);
      if (hd < hz.r + 30 * scene.ui) {
        ax += (c.x - hz.x) / Math.max(24, hd) * 80 * scene.ui;
        ay += (c.y - hz.y) / Math.max(24, hd) * 80 * scene.ui;
      }
    }
    for (var p = 0; p < predators.length; p++) {
      var pr = predators[p];
      var pd = GF.dist(c.x, c.y, pr.x, pr.y);
      if (pd < 76 * scene.ui) {
        ax += (c.x - pr.x) / Math.max(24, pd) * 120 * scene.ui;
        ay += (c.y - pr.y) / Math.max(24, pd) * 120 * scene.ui;
      }
    }
    tx += ax * dt;
    ty += ay * dt;
    var dx = tx - c.x;
    var dy = ty - c.y;
    var dist = Math.sqrt(dx * dx + dy * dy) || 1;
    var step = Math.min(dist, speed * dt * (0.75 + seededRandom() * 0.10));
    c.x += dx / dist * step;
    c.y += dy / dist * step;
    c.x = clamp(c.x, scene.x + 8 * scene.ui, scene.x + scene.w - 8 * scene.ui);
    c.y = clamp(c.y, scene.y + 8 * scene.ui, scene.y + scene.h - 8 * scene.ui);
  }
}

function updateFoods(dt) {
  for (var i = foods.length - 1; i >= 0; i--) {
    var f = foods[i];
    f.life -= dt * (0.62 - Math.min(0.26, traitValue('forage') * 0.08));
    f.pulse += dt;
    var hit = GF.dist(target.x, target.y, f.x, f.y) < TARGET_RADIUS * scene.ui + f.r;
    if (!hit) {
      for (var c = 0; c < creatures.length; c++) {
        if (GF.dist(creatures[c].x, creatures[c].y, f.x, f.y) < f.r + CREATURE_RADIUS * scene.ui * 1.8) {
          hit = true;
          break;
        }
      }
    }
    if (hit) collectFood(i);
    else if (f.life <= 0) foods.splice(i, 1);
  }
}

function updateHazards(dt) {
  for (var i = hazards.length - 1; i >= 0; i--) {
    var h = hazards[i];
    h.life -= dt;
    h.pulse += dt * 2.4;
    if (h.life <= 0) {
      hazards.splice(i, 1);
      continue;
    }
    var inside = 0;
    for (var c = 0; c < creatures.length; c++) {
      if (GF.dist(creatures[c].x, creatures[c].y, h.x, h.y) < h.r + CREATURE_RADIUS * scene.ui) inside++;
    }
    if (inside > 0) {
      var resist = traitValue(h.trait) + habitatBonusAt(target.x, target.y);
      var mismatch = clamp(1.05 - resist * 0.72, 0.14, 1.16);
      h.tick += dt * mismatch * (0.65 + inside / Math.max(8, population));
      if (h.tick > 0.78) {
        h.tick = 0;
        var loss = Math.max(1, Math.round(HAZARD_DAMAGE_BASE * mismatch * (inside / Math.max(5, population))));
        applyPopulationLoss(loss, h.x, h.y, TRAIT_COLORS[h.trait] || currentPressure.color);
      }
    }
  }
}

function updatePredators(dt) {
  for (var i = predators.length - 1; i >= 0; i--) {
    var p = predators[i];
    p.pulse += dt;
    p.bite = Math.max(0, p.bite - dt);
    var tx = target.x;
    var ty = target.y;
    var bestD = 999999;
    for (var c = 0; c < creatures.length; c++) {
      var d = GF.dist(p.x, p.y, creatures[c].x, creatures[c].y);
      if (d < bestD) {
        bestD = d;
        tx = creatures[c].x;
        ty = creatures[c].y;
      }
    }
    var dx = tx - p.x;
    var dy = ty - p.y;
    var dist = Math.sqrt(dx * dx + dy * dy) || 1;
    var speed = (68 + generation * 4) * scene.ui;
    p.x += dx / dist * speed * dt;
    p.y += dy / dist * speed * dt;
    if (dist < (PREDATOR_RADIUS + 12) * scene.ui && p.bite <= 0) {
      p.bite = 1.2;
      var loss = Math.max(1, Math.round(PREDATOR_DAMAGE * clamp(1.12 - traitValue('armor') * 0.52, 0.35, 1.2)));
      applyPopulationLoss(loss, p.x, p.y, '#ff5b6e');
      p.x -= dx / dist * 42 * scene.ui;
      p.y -= dy / dist * 42 * scene.ui;
    }
    if (p.x < scene.x - 90 * scene.ui || p.x > scene.x + scene.w + 90 * scene.ui || p.y < scene.y - 90 * scene.ui || p.y > scene.y + scene.h + 90 * scene.ui) {
      predators.splice(i, 1);
    }
  }
}

function updatePressure(dt) {
  foodTimer -= dt;
  hazardTimer -= dt;
  predatorTimer -= dt;
  var foodGap = clamp(5.5 - traitValue('forage') * 1.3 + generation * 0.08, 3.2, 7.4);
  if (foodTimer <= 0) {
    foodTimer = foodGap;
    if (foods.length < 4) spawnFood();
  }
  var hazardGap = clamp(4.6 - generation * 0.23, 1.75, 4.8);
  if (hazardTimer <= 0) {
    hazardTimer = hazardGap;
    spawnHazard();
    if (generation >= 6 && hazards.length < 5) spawnHazard();
  }
  if (predatorTimer <= 0) {
    predatorTimer = clamp(6.8 - generation * 0.18, 3.7, 7.2);
    if (predators.length < 1 + Math.floor(generation / 7)) spawnPredator();
  }
  hunger -= dt * clamp(5.2 - traitValue('forage') * 1.45 + generation * 0.10, 2.7, 7.2);
  if (hunger <= 0) {
    hunger = 26;
    applyPopulationLoss(STARVE_DAMAGE, target.x, target.y, '#f5db5d');
  }
}

function updateCoach(dt) {
  if (tutorialDone || helpOpen) return;
  coachTimer += dt;
  if (coachStep === 1 && habitatBonusAt(target.x, target.y) > 0 && waveTime > 4) {
    coachStep = 2;
    coachTimer = 0;
  }
}

function enterMutate() {
  if (gs !== 'PLAYING') return;
  gs = 'MUTATE';
  score += 140 + generation * 20 + population * 2;
  dna += 10 + Math.floor(population / 4);
  totalDNA += 10 + Math.floor(population / 4);
  if (generation > bestGeneration) bestGeneration = generation;
  if (totalDNA > bestDNA) bestDNA = totalDNA;
  buildMutationCardsForNext();
  GF.sfx('levelup');
  GF.juice.particles.burst(GF.cx, scene.y + scene.h * 0.40, { count: 44, colors: ['#8edcff', '#f5db5d', '#ff8a48', '#62d0a8'], speed: 260, gravity: -120, size: 5, life: 0.9 });
  GF.juice.floatText(GF.cx, scene.y + scene.h * 0.42, GF.t('survived'), { color: '#f5db5d', size: 18 });
  saveRun();
}

function buildMutationCardsForNext() {
  var options = [];
  function addTrait(k, priority) {
    for (var i = 0; i < options.length; i++) if (options[i] === k) return;
    if (priority) options.unshift(k);
    else options.push(k);
  }
  var nt = nextPressure.traits;
  for (var i = 0; i < nt.length; i++) addTrait(nt[i], true);
  var low = TRAITS.slice().sort(function(a, b) { return traitValue(a) - traitValue(b); });
  for (var l = 0; l < low.length && options.length < 3; l++) addTrait(low[l], false);
  while (options.length < 3) addTrait(TRAITS[Math.floor(seededRandom() * TRAITS.length)], false);
  cards = [];
  for (var c = 0; c < 3; c++) {
    var k = options[c];
    cards.push({ trait: k, titleKey: 'card_' + k + '_title', descKey: 'card_' + k + '_desc' });
  }
  buildCardRects();
}

function chooseMutation(idx) {
  if (gs !== 'MUTATE' || !cards[idx]) return false;
  var card = cards[idx];
  var extra = nextPressure.traits.indexOf(card.trait) >= 0 ? 0.04 : 0;
  trait[card.trait] = clamp(traitValue(card.trait) + MUTATION_AMOUNT + extra, 0, 1.6);
  mutationHistory.push(card.trait);
  if (mutationHistory.length > 12) mutationHistory.shift();
  GF.sfx('evolve');
  GF.juice.particles.burst(uiRects.cards[idx].x + uiRects.cards[idx].w / 2, uiRects.cards[idx].y + uiRects.cards[idx].h / 2, {
    count: 34,
    colors: [TRAIT_COLORS[card.trait], '#ffffff', '#f5db5d'],
    speed: 240,
    gravity: -80,
    size: 5,
    life: 0.85
  });
  GF.juice.floatText(GF.cx, GF.cy - 76 * scene.ui, GF.t('mutation') + ' +' + GF.t(card.trait), { color: TRAIT_COLORS[card.trait], size: 17 });
  if (!tutorialDone && coachStep >= 2) {
    tutorialDone = true;
    coachStep = 3;
    try { localStorage.setItem('evolution_cool_tutorial_v1', '1'); } catch (e) {}
  }
  generation += 1;
  population = Math.min(MAX_POPULATION, Math.max(6, population + 2));
  startWave(true);
  saveRun();
  return true;
}

function gameOver() {
  if (gs === 'GAMEOVER') return;
  gs = 'GAMEOVER';
  if (generation > bestGeneration) bestGeneration = generation;
  if (totalDNA > bestDNA) bestDNA = totalDNA;
  GF.sfx('lose');
  GF.juice.shake(16, 520);
  GF.juice.flash('rgba(255,60,70,1)', 380, 0.30);
  GF.gameEnded();
  saveRun();
}

function saveRun() {
  if (generation > bestGeneration) bestGeneration = generation;
  if (totalDNA > bestDNA) bestDNA = totalDNA;
  GF.saveRun();
}

function getPersist() {
  return {
    gs: gs,
    score: score,
    generation: generation,
    population: population,
    dna: dna,
    totalDNA: totalDNA,
    bestGeneration: bestGeneration,
    bestDNA: bestDNA,
    hunger: hunger,
    waveTime: waveTime,
    trait: trait,
    mutationHistory: mutationHistory,
    tutorialDone: tutorialDone
  };
}

function applyPersist(s) {
  if (!s || typeof s !== 'object') return;
  bootRestored = true;
  score = Number(s.score) || 0;
  generation = Math.max(1, Number(s.generation) || 1);
  population = clamp(Number(s.population) || START_POPULATION, 1, MAX_POPULATION);
  dna = Number(s.dna) || START_DNA;
  totalDNA = Number(s.totalDNA) || dna;
  bestGeneration = Math.max(1, Number(s.bestGeneration) || generation);
  bestDNA = Math.max(0, Number(s.bestDNA) || totalDNA);
  hunger = clamp(Number(s.hunger) || 100, 0, 100);
  resetTraits();
  if (s.trait && typeof s.trait === 'object') {
    for (var i = 0; i < TRAITS.length; i++) {
      var k = TRAITS[i];
      if (typeof s.trait[k] === 'number') trait[k] = clamp(s.trait[k], 0, 1.6);
    }
  }
  mutationHistory = Array.isArray(s.mutationHistory) ? s.mutationHistory.slice(0, 12) : [];
  tutorialDone = !!s.tutorialDone;
  coachStep = tutorialDone ? 3 : 0;
  currentPressure = pressureForGeneration(generation);
  nextPressure = pressureForGeneration(generation + 1);
  target.x = scene.x + scene.w * 0.45;
  target.y = scene.y + scene.h * 0.56;
  startWave(true);
  waveTime = clamp(Number(s.waveTime) || 0, 0, WAVE_DURATION);
  if (s.gs === 'MUTATE') {
    gs = 'MUTATE';
    buildMutationCardsForNext();
  } else if (s.gs === 'GAMEOVER') {
    gs = 'GAMEOVER';
  } else {
    gs = 'PLAYING';
  }
}

function pointerPos(e) {
  var r = GF.canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) * GF.W / Math.max(1, r.width),
    y: (e.clientY - r.top) * GF.H / Math.max(1, r.height)
  };
}

function hitRect(p, r) {
  return r && p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
}

function onPointerDown(e) {
  if (e && e.preventDefault) e.preventDefault();
  layout();
  var p = pointerPos(e);
  pointer.down = true;
  pointer.sx = p.x;
  pointer.sy = p.y;
  if (hitRect(p, uiRects.mute)) {
    GF.toggleMute();
    GF.sfx('click');
    return;
  }
  if (hitRect(p, uiRects.help)) {
    helpOpen = !helpOpen;
    GF.sfx('click');
    return;
  }
  if (helpOpen) {
    if (hitRect(p, uiRects.helpClose)) {
      helpOpen = false;
      GF.sfx('click');
    }
    return;
  }
  if (gs === 'GAMEOVER') {
    if (hitRect(p, uiRects.retry)) {
      GF.sfx('click');
      startNewRun();
    }
    return;
  }
  if (gs === 'MUTATE') {
    for (var i = 0; i < uiRects.cards.length; i++) {
      if (hitRect(p, uiRects.cards[i])) {
        chooseMutation(i);
        return;
      }
    }
    return;
  }
  setTarget(p.x, p.y);
  GF.sfx('tap');
  GF.juice.particles.burst(target.x, target.y, { count: 12, color: currentPressure.color, speed: 120, gravity: -40, size: 3.5, life: 0.38 });
}

function onPointerMove(e) {
  if (!pointer.down || gs !== 'PLAYING' || helpOpen) return;
  if (e && e.preventDefault) e.preventDefault();
  var p = pointerPos(e);
  setTarget(p.x, p.y);
}

function onPointerUp(e) {
  if (e && e.preventDefault) e.preventDefault();
  pointer.down = false;
}

function update(dt) {
  layout();
  GF.juice.update(dt);
  var gdt = dt * GF.juice.timeScale;
  updateKeyboard(gdt);
  target.pulse = GF.lerp(target.pulse, 1, Math.min(1, dt * 7));
  if (gs !== 'PLAYING' || helpOpen) return;
  waveTime += gdt;
  updateCoach(gdt);
  updatePressure(gdt);
  updateCreatures(gdt);
  updateFoods(gdt);
  updateHazards(gdt);
  updatePredators(gdt);
  if (population <= 0) {
    gameOver();
    return;
  }
  if (waveTime >= WAVE_DURATION) enterMutate();
}

function roundRect(c, x, y, w, h, r) {
  GF.rr(c, x, y, w, h, r);
}

function fs(n) {
  return Math.round(clamp(n * scene.ui, n * 0.72, n * 1.35));
}

function drawText(c, text, x, y, size, color, align, weight) {
  c.font = (weight ? weight + ' ' : '') + String(size) + 'px system-ui, -apple-system, sans-serif';
  c.fillStyle = color;
  c.textAlign = align || 'left';
  c.textBaseline = 'middle';
  c.fillText(text, x, y);
}

function fitText(c, text, x, y, maxW, size, color, align, weight) {
  var s = size;
  c.font = (weight ? weight + ' ' : '') + String(s) + 'px system-ui, -apple-system, sans-serif';
  while (s > 9 && c.measureText(text).width > maxW) {
    s -= 1;
    c.font = (weight ? weight + ' ' : '') + String(s) + 'px system-ui, -apple-system, sans-serif';
  }
  c.fillStyle = color;
  c.textAlign = align || 'left';
  c.textBaseline = 'middle';
  c.fillText(text, x, y);
}

function wrapLines(c, text, maxW, size, weight) {
  c.font = (weight ? weight + ' ' : '') + String(size) + 'px system-ui, -apple-system, sans-serif';
  var words = String(text).split(/\s+/);
  var lines = [];
  var line = '';
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (line && c.measureText(test).width > maxW) {
      lines.push(line);
      line = words[i];
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function drawWrapped(c, text, x, y, maxW, size, color, align, weight, lineGap) {
  var lines = wrapLines(c, text, maxW, size, weight);
  c.fillStyle = color;
  c.textAlign = align || 'left';
  c.textBaseline = 'top';
  c.font = (weight ? weight + ' ' : '') + String(size) + 'px system-ui, -apple-system, sans-serif';
  var lh = size * (lineGap || 1.22);
  for (var i = 0; i < lines.length; i++) c.fillText(lines[i], x, y + i * lh);
  return lines.length * lh;
}

function draw(ctx) {
  layout();
  var c = ctx;
  c.clearRect(0, 0, GF.W, GF.H);
  c.save();
  c.translate(GF.juice.offsetX, GF.juice.offsetY);
  drawBackground(c);
  drawWorld(c);
  drawHUD(c);
  if (!tutorialDone && gs === 'PLAYING') drawCoach(c);
  if (gs === 'MUTATE') drawMutationOverlay(c);
  if (gs === 'GAMEOVER') drawGameOver(c);
  if (helpOpen) drawHelp(c);
  GF.juice.particles.draw(c);
  GF.juice.texts.draw(c);
  c.restore();
  GF.juice.drawFlash(c);
}

function drawBackground(c) {
  var g = c.createLinearGradient(0, 0, GF.W, GF.H);
  g.addColorStop(0, '#102022');
  g.addColorStop(0.42, '#111b20');
  g.addColorStop(1, '#17151c');
  c.fillStyle = g;
  c.fillRect(0, 0, GF.W, GF.H);
  c.fillStyle = 'rgba(255,255,255,0.035)';
  for (var i = 0; i < 22; i++) {
    var x = ((i * 193 + generation * 17) % 1000) / 1000 * GF.W;
    var y = ((i * 113 + generation * 29) % 1000) / 1000 * GF.H;
    c.beginPath();
    c.arc(x, y, (1.5 + (i % 4)) * scene.ui, 0, Math.PI * 2);
    c.fill();
  }
  c.fillStyle = 'rgba(0,0,0,0.30)';
  c.fillRect(0, 0, GF.W, scene.top);
  c.fillRect(0, scene.y + scene.h, GF.W, scene.bottom);
}

function drawWorld(c) {
  c.save();
  c.beginPath();
  c.rect(scene.x, scene.y, scene.w, scene.h);
  c.clip();
  var t = waveTime / Math.max(1, WAVE_DURATION);
  var glow = c.createRadialGradient(target.x, target.y, 10 * scene.ui, target.x, target.y, Math.max(scene.w, scene.h) * 0.8);
  glow.addColorStop(0, currentPressure.color + '2c');
  glow.addColorStop(0.55, 'rgba(24,38,38,0.28)');
  glow.addColorStop(1, 'rgba(7,10,14,0.18)');
  c.fillStyle = glow;
  c.fillRect(scene.x, scene.y, scene.w, scene.h);
  drawTerrainVeins(c, t);
  for (var h = 0; h < habitats.length; h++) drawHabitat(c, habitats[h]);
  for (var f = 0; f < foods.length; f++) drawFood(c, foods[f]);
  for (var z = 0; z < hazards.length; z++) drawHazard(c, hazards[z]);
  for (var p = 0; p < predators.length; p++) drawPredator(c, predators[p]);
  drawTarget(c);
  for (var i = 0; i < creatures.length; i++) drawCreature(c, creatures[i], i);
  c.restore();
}

function drawTerrainVeins(c, t) {
  c.save();
  c.lineCap = 'round';
  for (var i = 0; i < 8; i++) {
    var y = scene.y + scene.h * (0.14 + i * 0.105);
    c.strokeStyle = i % 2 ? 'rgba(98,208,168,0.10)' : currentPressure.color + '1f';
    c.lineWidth = (1.5 + (i % 3)) * scene.ui;
    c.beginPath();
    for (var x = scene.x - 20 * scene.ui; x <= scene.x + scene.w + 20 * scene.ui; x += 42 * scene.ui) {
      var yy = y + Math.sin(x * 0.012 + i * 1.7 + t * 4) * 12 * scene.ui;
      if (x === scene.x - 20 * scene.ui) c.moveTo(x, yy);
      else c.lineTo(x, yy);
    }
    c.stroke();
  }
  c.restore();
}

function drawHabitat(c, h) {
  var pulse = 0.82 + Math.sin((waveTime + h.pulse) * 2.4) * 0.10;
  c.save();
  c.globalAlpha = 0.28;
  c.fillStyle = currentPressure.habitat;
  c.beginPath();
  c.arc(h.x, h.y, h.r * pulse, 0, Math.PI * 2);
  c.fill();
  c.globalAlpha = 0.52;
  c.strokeStyle = currentPressure.habitat;
  c.lineWidth = 2 * scene.ui;
  c.beginPath();
  c.arc(h.x, h.y, h.r, 0, Math.PI * 2);
  c.stroke();
  c.restore();
}

function drawFood(c, f) {
  var p = 1 + Math.sin((waveTime + f.pulse) * 5) * 0.12;
  c.save();
  c.fillStyle = '#1a563f';
  c.beginPath();
  c.arc(f.x, f.y, f.r * 1.9, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = '#6ee887';
  for (var i = 0; i < 5; i++) {
    var a = i / 5 * Math.PI * 2 + waveTime * 0.45;
    c.beginPath();
    c.ellipse(f.x + Math.cos(a) * f.r * 0.55, f.y + Math.sin(a) * f.r * 0.55, f.r * 0.58 * p, f.r * 0.24, a, 0, Math.PI * 2);
    c.fill();
  }
  c.fillStyle = '#f5db5d';
  c.beginPath();
  c.arc(f.x, f.y, f.r * 0.35, 0, Math.PI * 2);
  c.fill();
  c.restore();
}

function drawHazard(c, h) {
  var col = TRAIT_COLORS[h.trait] || currentPressure.color;
  var k = 0.86 + Math.sin(h.pulse) * 0.14;
  c.save();
  c.globalAlpha = 0.30;
  c.fillStyle = col;
  c.beginPath();
  c.arc(h.x, h.y, h.r * k, 0, Math.PI * 2);
  c.fill();
  c.globalAlpha = 0.78;
  c.strokeStyle = col;
  c.lineWidth = 2.5 * scene.ui;
  c.beginPath();
  c.arc(h.x, h.y, h.r, 0, Math.PI * 2);
  c.stroke();
  c.globalAlpha = 1;
  c.strokeStyle = 'rgba(255,255,255,0.34)';
  c.lineWidth = 1.3 * scene.ui;
  for (var i = 0; i < 3; i++) {
    var a = h.pulse + i * Math.PI * 2 / 3;
    c.beginPath();
    c.moveTo(h.x, h.y);
    c.lineTo(h.x + Math.cos(a) * h.r * 0.75, h.y + Math.sin(a) * h.r * 0.75);
    c.stroke();
  }
  c.restore();
}

function drawPredator(c, p) {
  var a = Math.atan2(target.y - p.y, target.x - p.x);
  c.save();
  c.translate(p.x, p.y);
  c.rotate(a);
  c.fillStyle = '#3a1319';
  c.beginPath();
  c.ellipse(0, 0, 26 * scene.ui, 13 * scene.ui, 0, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = '#ff5b6e';
  c.beginPath();
  c.moveTo(17 * scene.ui, 0);
  c.lineTo(-8 * scene.ui, -11 * scene.ui);
  c.lineTo(-4 * scene.ui, 0);
  c.lineTo(-8 * scene.ui, 11 * scene.ui);
  c.closePath();
  c.fill();
  c.fillStyle = '#ffd6d9';
  c.beginPath();
  c.arc(8 * scene.ui, -4 * scene.ui, 2.4 * scene.ui, 0, Math.PI * 2);
  c.arc(8 * scene.ui, 4 * scene.ui, 2.4 * scene.ui, 0, Math.PI * 2);
  c.fill();
  c.restore();
}

function drawTarget(c) {
  var r = TARGET_RADIUS * scene.ui * target.pulse;
  c.save();
  c.strokeStyle = currentPressure.color;
  c.lineWidth = 2.5 * scene.ui;
  c.globalAlpha = 0.85;
  c.beginPath();
  c.arc(target.x, target.y, r, 0, Math.PI * 2);
  c.stroke();
  c.globalAlpha = 0.28;
  c.fillStyle = currentPressure.color;
  c.beginPath();
  c.arc(target.x, target.y, r * 0.62, 0, Math.PI * 2);
  c.fill();
  c.globalAlpha = 1;
  c.strokeStyle = '#ffffff';
  c.lineWidth = 1.3 * scene.ui;
  c.beginPath();
  c.moveTo(target.x - 8 * scene.ui, target.y);
  c.lineTo(target.x + 8 * scene.ui, target.y);
  c.moveTo(target.x, target.y - 8 * scene.ui);
  c.lineTo(target.x, target.y + 8 * scene.ui);
  c.stroke();
  c.restore();
}

function drawCreature(c, cr, idx) {
  var body = 6.2 * scene.ui * cr.scale;
  var heat = traitValue('heat');
  var cold = traitValue('cold');
  var armor = traitValue('armor');
  var speed = traitValue('speed');
  var tox = traitValue('toxin');
  var forage = traitValue('forage');
  var col = heat > cold ? '#ff9964' : cold > heat ? '#9bdef5' : '#78d7bb';
  if (tox > 0.55) col = '#94df72';
  c.save();
  c.translate(cr.x, cr.y);
  c.rotate(Math.sin(cr.phase) * 0.25);
  c.fillStyle = 'rgba(0,0,0,0.22)';
  c.beginPath();
  c.ellipse(1 * scene.ui, body * 1.3, body * 1.1, body * 0.42, 0, 0, Math.PI * 2);
  c.fill();
  if (speed > 0.36) {
    c.strokeStyle = '#f5db5d';
    c.lineWidth = 1.8 * scene.ui;
    for (var l = -1; l <= 1; l += 2) {
      c.beginPath();
      c.moveTo(-body * 0.35, body * 0.4 * l);
      c.lineTo(-body * (1.4 + speed * 0.4), body * (0.95 * l));
      c.stroke();
    }
  }
  if (heat > 0.32) {
    c.fillStyle = '#ff7a45';
    c.beginPath();
    c.moveTo(-body * 0.2, -body * 0.9);
    c.lineTo(body * (0.5 + heat * 0.28), -body * (1.45 + heat * 0.2));
    c.lineTo(body * 0.2, -body * 0.15);
    c.closePath();
    c.fill();
  }
  if (cold > 0.32) {
    c.fillStyle = '#d4f6ff';
    for (var f = 0; f < 4; f++) {
      var a = f / 4 * Math.PI * 2 + cr.phase;
      c.beginPath();
      c.arc(Math.cos(a) * body * 0.85, Math.sin(a) * body * 0.78, body * 0.34, 0, Math.PI * 2);
      c.fill();
    }
  }
  c.fillStyle = col;
  c.beginPath();
  c.ellipse(0, 0, body * (1.16 + forage * 0.08), body * (0.92 + armor * 0.06), 0, 0, Math.PI * 2);
  c.fill();
  if (armor > 0.24) {
    c.strokeStyle = '#d8c089';
    c.lineWidth = (1.2 + armor * 1.6) * scene.ui;
    c.beginPath();
    c.arc(0, 0, body * 1.08, Math.PI * 0.10, Math.PI * 1.90);
    c.stroke();
  }
  if (tox > 0.38) {
    c.fillStyle = '#214a2d';
    c.beginPath();
    c.arc(body * 0.28, -body * 0.18, body * 0.22, 0, Math.PI * 2);
    c.arc(-body * 0.22, body * 0.18, body * 0.18, 0, Math.PI * 2);
    c.fill();
  }
  if (forage > 0.35) {
    c.strokeStyle = '#62d0a8';
    c.lineWidth = 1.4 * scene.ui;
    c.beginPath();
    c.moveTo(body * 0.7, 0);
    c.quadraticCurveTo(body * (1.25 + forage * 0.25), -body * 0.25, body * (1.35 + forage * 0.35), body * 0.22);
    c.stroke();
  }
  c.fillStyle = '#061111';
  c.beginPath();
  c.arc(body * 0.42, -body * 0.20, body * 0.16, 0, Math.PI * 2);
  c.fill();
  c.restore();
}

function mutationSummary() {
  if (!mutationHistory.length) return GF.t('empty');
  var counts = {};
  for (var i = 0; i < mutationHistory.length; i++) counts[mutationHistory[i]] = (counts[mutationHistory[i]] || 0) + 1;
  var parts = [];
  for (var k in counts) {
    if (Object.prototype.hasOwnProperty.call(counts, k)) parts.push(GF.t(k) + ' ' + String(counts[k]));
  }
  return parts.join(', ');
}

function stateObject() {
  return {
    gs: gs,
    score: Math.round(score),
    generation: generation,
    population: population,
    dna: Math.round(totalDNA),
    pressure: currentPressure.id,
    nextPressure: nextPressure.id,
    waveTime: Math.round(waveTime * 10) / 10,
    waveRemaining: Math.max(0, Math.round((WAVE_DURATION - waveTime) * 10) / 10),
    hunger: Math.round(hunger),
    traits: {
      heat: Math.round(traitValue('heat') * 100) / 100,
      cold: Math.round(traitValue('cold') * 100) / 100,
      toxin: Math.round(traitValue('toxin') * 100) / 100,
      armor: Math.round(traitValue('armor') * 100) / 100,
      speed: Math.round(traitValue('speed') * 100) / 100,
      forage: Math.round(traitValue('forage') * 100) / 100
    },
    target: { x: Math.round(target.x), y: Math.round(target.y) },
    visible: {
      creatures: creatures.length,
      foods: foods.slice(0, 4).map(function(f) { return { x: Math.round(f.x), y: Math.round(f.y), r: Math.round(f.r) }; }),
      hazards: hazards.slice(0, 5).map(function(h) { return { trait: h.trait, x: Math.round(h.x), y: Math.round(h.y), r: Math.round(h.r) }; }),
      predators: predators.slice(0, 3).map(function(p) { return { x: Math.round(p.x), y: Math.round(p.y) }; })
    },
    cards: cards.map(function(card) { return card.trait; }),
    helpOpen: helpOpen
  };
}

function renderText() {
  var s = stateObject();
  s.coordinateSystem = 'origin top-left, x right, y down, pixels in current canvas viewport';
  return JSON.stringify(s);
}

function botActions() {
  if (gs === 'GAMEOVER') return ['restart'];
  if (gs === 'MUTATE') return ['choose_0', 'choose_1', 'choose_2'];
  var out = ['wait', 'move_food', 'move_habitat', 'avoid_hazard'];
  if (waveTime > WAVE_DURATION - 2) out.push('force_mutate');
  return out;
}

function botAct(action) {
  if (action === 'restart') {
    startNewRun();
    return true;
  }
  if (gs === 'MUTATE') {
    if (action === 'choose_0') return chooseMutation(0);
    if (action === 'choose_1') return chooseMutation(1);
    if (action === 'choose_2') return chooseMutation(2);
    return false;
  }
  if (action === 'move_food') {
    if (foods.length) setTarget(foods[0].x, foods[0].y);
    return true;
  }
  if (action === 'move_habitat') {
    if (habitats.length) setTarget(habitats[0].x, habitats[0].y);
    return true;
  }
  if (action === 'avoid_hazard') {
    var x = scene.x + scene.w * 0.5;
    var y = scene.y + scene.h * 0.5;
    if (hazards.length) {
      var h = hazards[0];
      x = clamp(target.x + (target.x - h.x), scene.x + 40 * scene.ui, scene.x + scene.w - 40 * scene.ui);
      y = clamp(target.y + (target.y - h.y), scene.y + 40 * scene.ui, scene.y + scene.h - 40 * scene.ui);
    }
    setTarget(x, y);
    return true;
  }
  if (action === 'force_mutate') {
    waveTime = WAVE_DURATION + 0.1;
    update(1 / 60);
    return true;
  }
  if (action === 'wait') {
    window.advanceTime(1200);
    return true;
  }
  return false;
}

function setupForScreenshot(level) {
  screenshotMode = true;
  resetTraits();
  generation = Math.max(1, Math.round(level || 5));
  trait.heat = clamp(0.52 + generation * 0.060, 0, 1.35);
  trait.cold = clamp(0.50 + generation * 0.055, 0, 1.30);
  trait.toxin = clamp(0.48 + generation * 0.058, 0, 1.30);
  trait.armor = clamp(0.46 + generation * 0.052, 0, 1.25);
  trait.speed = clamp(0.52 + generation * 0.058, 0, 1.35);
  trait.forage = clamp(0.50 + generation * 0.054, 0, 1.30);
  population = Math.min(MAX_POPULATION, 30 + generation * 2);
  totalDNA = 60 + generation * 18;
  dna = totalDNA;
  score = generation * 240;
  target.x = scene.x + scene.w * 0.44;
  target.y = scene.y + scene.h * 0.55;
  tutorialDone = true;
  helpOpen = false;
  startWave(true);
  waveTime = Math.min(WAVE_DURATION - 8, 9 + generation);
  spawnHazard();
  spawnHazard();
  spawnFood();
  if (generation >= 4) spawnPredator();
  gs = 'PLAYING';
}

function exposeHelpers() {
  GF.exposeState(stateObject);
  GF.exposeBot(botActions, botAct);
  GF.exposeReach(function() {
    var items = [
      { id: 'help', x: uiRects.help.x, y: uiRects.help.y, w: uiRects.help.w, h: uiRects.help.h, pinned: true },
      { id: 'mute', x: uiRects.mute.x, y: uiRects.mute.y, w: uiRects.mute.w, h: uiRects.mute.h, pinned: true }
    ];
    if (gs === 'MUTATE') {
      for (var i = 0; i < uiRects.cards.length; i++) {
        items.push({ id: 'card_' + String(i), x: uiRects.cards[i].x, y: uiRects.cards[i].y, w: uiRects.cards[i].w, h: uiRects.cards[i].h, pinned: true });
      }
    }
    if (gs === 'GAMEOVER') items.push({ id: 'retry', x: uiRects.retry.x, y: uiRects.retry.y, w: uiRects.retry.w, h: uiRects.retry.h, pinned: true });
    if (helpOpen) items.push({ id: 'help_close', x: uiRects.helpClose.x, y: uiRects.helpClose.y, w: uiRects.helpClose.w, h: uiRects.helpClose.h, pinned: true });
    return { screen: helpOpen ? 'help' : gs, viewportW: GF.W, viewportH: GF.H, screenH: GF.H, scrollMaxY: 0, items: items };
  });
  GF.exposeTour([
    { name: 'play', go: function() { helpOpen = false; if (gs !== 'PLAYING') startNewRun(); } },
    { name: 'mutate', go: function() { helpOpen = false; if (gs !== 'MUTATE') enterMutate(); } },
    { name: 'help', go: function() { helpOpen = true; } },
    { name: 'gameover', go: function() { helpOpen = false; population = 0; gameOver(); } }
  ]);
}

window._setLang = function(lang) {
  GF.lang = lang === 'ru' ? 'ru' : 'en';
};
window._setState = function(state) {
  if (state === 'MUTATE') {
    if (gs !== 'MUTATE') enterMutate();
  } else if (state === 'GAMEOVER') {
    population = 0;
    gameOver();
  } else {
    if (gs !== 'PLAYING') startNewRun();
    gs = 'PLAYING';
  }
};
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif'; };
window._jumpLevel = function(level) { setupForScreenshot(Number(level) || 5); };
window._setupForScreenshot = function(level) { setupForScreenshot(Number(level) || 5); };
window.advanceTime = function(ms) {
  try { window.dispatchEvent(new Event('resize')); } catch (e) {}
  var steps = Math.max(1, Math.round((Number(ms) || 0) / (1000 / 60)));
  for (var i = 0; i < steps; i++) update(1 / 60);
  draw(GF.ctx);
};
window.__gfStep = window.advanceTime;
window.render_game_to_text = renderText;

GF.canvas.addEventListener('pointerdown', onPointerDown, { passive: false });
GF.canvas.addEventListener('pointermove', onPointerMove, { passive: false });
GF.canvas.addEventListener('pointerup', onPointerUp, { passive: false });
GF.canvas.addEventListener('pointercancel', onPointerUp, { passive: false });

GF.init({
  designW: 900,
  designH: 650,
  strings: STRINGS,
  sprites: [],
  saveKey: 'evolution_cool',
  onReady: function() {
    layout();
    try { tutorialDone = localStorage.getItem('evolution_cool_tutorial_v1') === '1'; } catch (e) {}
    resetTraits();
    GF.persist('evolution_cool_run_v1', getPersist, applyPersist);
    GF.bgMusic({ file: 'audio/bg_track.mp3', preset: 'synth', muted: GF.muted });
    exposeHelpers();
    if (!bootRestored || gs === 'GAMEOVER') startNewRun();
    else GF.gameStarted();
  },
  onUpdate: update,
  onDraw: draw
});

})();
</script>
