<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shadow Cast</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── LOCALISED STRINGS ────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Shadow Cast',
    sub:   'Sculpt light into the target shape',
    play: 'PLAY', retry: 'RETRY', menu: 'MENU', next: 'NEXT LEVEL', again: 'PLAY AGAIN',
    check: 'CHECK', match: 'MATCH', level: 'LVL',
    won_lvl: 'MATCHED!', won_all: 'ALL SHADOWS CAST!', lost: 'SHADOW MISMATCH',
    blocks: 'BLOCKS', drag_here: 'tap a placed block to resize',
    tut_goal: 'Goal: Make the shadow on the wall match the target silhouette.',
    tut_controls: 'Controls: Drag a block onto a rail to place it; tap a placed block to change its size. Closer to the lamp means a bigger shadow.',
    tut_win: 'Win: Cover at least 90% of the target shape with little spill outside.',
    tut_lose: 'Lose: Run out of blocks while the shadow still does not match.',
    tut_tip: 'Tip: A block near the lamp casts a huge shadow; near the wall it stays small.',
    excess: 'SPILL',
  },
  ru: {
    title: 'Тень в цель',
    sub:   'Лепите фигуру из света',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', menu: 'МЕНЮ', next: 'ДАЛЕЕ', again: 'ИГРАТЬ СНОВА',
    check: 'ГОТОВО', match: 'СОВПАД', level: 'УР',
    won_lvl: 'СОВПАЛО!', won_all: 'ВСЕ ТЕНИ СОЗДАНЫ!', lost: 'ТЕНЬ НЕ СОВПАЛА',
    blocks: 'БЛОКИ', drag_here: 'коснитесь блока, чтобы изменить размер',
    tut_goal: 'Цель: Сделайте так, чтобы тень на стене совпала с целью.',
    tut_controls: 'Управление: Перетащите блок на рельс, чтобы поставить; коснитесь блока, чтобы сменить размер. Ближе к лампе — больше тень.',
    tut_win: 'Победа: Закройте не менее 90% целевой фигуры без лишнего.',
    tut_lose: 'Поражение: Блоки кончились, а тень всё ещё не совпала.',
    tut_tip: 'Совет: Блок у лампы даёт огромную тень, у стены — маленькую.',
    excess: 'ЛИШНЕЕ',
  },
};

var SPRITE_NAMES = [];

// ── TUNABLES ───────────────────────────────────────────────────────────────
var TOTAL_LEVELS = 6;
var WIN_OVERLAP  = 86;     // % of target dark cells that must be covered to win
var MAX_EXCESS   = 22;     // max % of grid cells lit dark OUTSIDE the target
var GRID_COLS    = 16;
var GRID_ROWS    = 24;
var LAMP_X_FRAC  = 0.10;
var WALL_X_FRAC  = 0.90;
var BLOCK_SIZES  = [38, 60, 86]; // S / M / L physical block heights (design px)
var RAIL_COUNT   = 4;
var SNAP_PAD     = 14;

// Design space — portrait. All world math is in design coords, then scaled.
var DW = 420, DH = 760;

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';          // MENU | PLAYING | GAMEOVER | WON
var level = 1;
var matchScore = 0;       // % overlap with target
var excessScore = 0;      // % of shadow cells outside target
var blockBudget = 3;
var blocksLeft = 3;
var committed = false;    // last commit evaluated this frame
var wonAll = false;       // cleared final level

// Placed blocks: { railIdx, y (screen px), sizeIdx }
var blocks = [];
var drag = null;          // { kind:'tray'|'placed', idx, sizeIdx, x, y }
var pressMoved = false;
var pressStart = { x: 0, y: 0 };
var checkPulse = 0;
var helpOpen = false;

// Per-level target silhouette as a grid mask [row][col] bool.
var targetMask = null;
var targetCells = 0;

// ── WORLD GEOMETRY (recomputed each frame from current viewport) ──────────
function geom() {
  var S = GF.S;
  var pw = DW * S, ph = DH * S;
  var ox = (GF.W - pw) / 2, oy = (GF.H - ph) / 2;
  var lampX = ox + DW * LAMP_X_FRAC * S;
  var wallX = ox + DW * WALL_X_FRAC * S;
  var lampY = oy + ph * 0.42;
  var wallTop = oy + ph * 0.14;
  var wallBot = oy + ph * 0.86;
  var wallLeft = ox + DW * 0.16 * S;
  return { S:S, ox:ox, oy:oy, pw:pw, ph:ph, lampX:lampX, wallX:wallX,
           lampY:lampY, wallTop:wallTop, wallBot:wallBot, wallLeft:wallLeft };
}
function railX(idx, g) {
  var t = (idx + 1) / (RAIL_COUNT + 1);
  return g.lampX + (g.wallX - g.lampX) * t;
}

// ── LEVEL SETUP ─────────────────────────────────────────────────────────
function genTarget(lvl) {
  var mask = [];
  for (var r = 0; r < GRID_ROWS; r++) { mask[r] = []; for (var cc = 0; cc < GRID_COLS; cc++) mask[r][cc] = false; }
  function band(r0, r1, c0, c1) {
    for (var r = r0; r < r1; r++) for (var c = c0; c < c1; c++)
      if (r>=0 && r<GRID_ROWS && c>=0 && c<GRID_COLS) mask[r][c] = true;
  }
  // Targets are CENTERED horizontal bands (symmetric about the middle column).
  // Each band's vertical position is matched by a block's drag height; its
  // width is matched by the block's size x projection scale (rail depth).
  // This keeps every level solvable with the given budget. cband(r0,r1,halfW)
  // paints a band from row r0..r1 spanning halfW columns either side of center.
  var MID = GRID_COLS / 2;
  function cband(r0, r1, halfW) { band(r0, r1, Math.round(MID - halfW), Math.round(MID + halfW)); }
  var budget;
  if (lvl === 1) { cband(9, 15, 5); budget = 3; }                          // one wide bar
  else if (lvl === 2) { cband(4, 9, 5); cband(15, 20, 5); budget = 4; }    // two bars
  else if (lvl === 3) { cband(3, 8, 3); cband(10, 14, 6); cband(16, 21, 3); budget = 4; } // hourglass-ish
  else if (lvl === 4) { cband(3, 8, 6); cband(10, 14, 4); cband(16, 21, 6); budget = 5; }  // wide-narrow-wide
  else if (lvl === 5) { cband(3, 8, 3); cband(10, 14, 5); cband(16, 21, 7); budget = 5; } // funnel
  else { cband(2, 7, 7); cband(9, 13, 5); cband(15, 19, 4); cband(21, 23, 6); budget = 5; } // mixed tower
  var cnt = 0;
  for (var r2 = 0; r2 < GRID_ROWS; r2++) for (var c2 = 0; c2 < GRID_COLS; c2++) if (mask[r2][c2]) cnt++;
  targetMask = mask; targetCells = cnt;
  blockBudget = budget; blocksLeft = budget;
}

function startLevel(lvl) {
  level = lvl;
  blocks = [];
  drag = null;
  matchScore = 0; excessScore = 0; committed = false; wonAll = false; helpOpen = false;
  genTarget(lvl);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function startGame() { startLevel(1); }

function gameOver() {
  gs = 'GAMEOVER';
  GF.setShake(0.6);
  GF.gameEnded();
  GF.saveRun();
}

function levelWon() {
  GF.spawnParticles(GF.cx, GF.cy, '#ffd166', 40);
  if (level >= TOTAL_LEVELS) { wonAll = true; gs = 'WON'; GF.happytime(); }
  else { gs = 'WON'; }
  GF.gameEnded();
  GF.saveRun();
}

// ── SHADOW PROJECTION ─────────────────────────────────────────────────────
// Project a block onto the wall plane through the point light. Returns the
// shadow's vertical span on the wall (screen px) plus the scale factor k.
// Monotonic: a block closer to the lamp (smaller distBlock) yields larger k.
function blockShadowSpan(b, g) {
  var bx = railX(b.railIdx, g);
  var half = BLOCK_SIZES[b.sizeIdx] * g.S / 2;
  var top = b.y - half, bot = b.y + half;
  var distBlock = bx - g.lampX; if (distBlock <= 1) distBlock = 1;
  var distWall  = g.wallX - g.lampX;
  var k = distWall / distBlock;
  return { top: g.lampY + (top - g.lampY) * k, bot: g.lampY + (bot - g.lampY) * k, k: k };
}

// Compute the union of cast shadows on the grid and compare to the target.
function evaluate(g) {
  var rows = GRID_ROWS, cols = GRID_COLS;
  var shadow = [];
  for (var r = 0; r < rows; r++) { shadow[r] = []; for (var c = 0; c < cols; c++) shadow[r][c] = false; }
  var wallH = g.wallBot - g.wallTop;
  var bandW = g.wallX - g.wallLeft;
  var cellH = wallH / rows, cellW = bandW / cols;
  for (var bi = 0; bi < blocks.length; bi++) {
    var b = blocks[bi];
    var sp = blockShadowSpan(b, g);
    var halfH = BLOCK_SIZES[b.sizeIdx] * g.S / 2;
    var hHalf = halfH * sp.k;
    var hcenter = g.wallLeft + bandW * 0.5;
    var sLeft = hcenter - hHalf, sRight = hcenter + hHalf;
    for (var r2 = 0; r2 < rows; r2++) {
      var cyScreen = g.wallTop + (r2 + 0.5) * cellH;
      if (cyScreen < sp.top || cyScreen > sp.bot) continue;
      for (var c2 = 0; c2 < cols; c2++) {
        var cxScreen = g.wallLeft + (c2 + 0.5) * cellW;
        if (cxScreen >= sLeft && cxScreen <= sRight) shadow[r2][c2] = true;
      }
    }
  }
  var hit = 0, excess = 0, totalCells = rows * cols;
  for (var r3 = 0; r3 < rows; r3++) for (var c3 = 0; c3 < cols; c3++) {
    if (shadow[r3][c3] && targetMask[r3][c3]) hit++;
    else if (shadow[r3][c3] && !targetMask[r3][c3]) excess++;
  }
  matchScore = targetCells > 0 ? Math.round(hit / targetCells * 100) : 0;
  excessScore = Math.round(excess / totalCells * 100);
  return shadow;
}

function commit() {
  var g = geom();
  evaluate(g);
  committed = true;
  if (matchScore >= WIN_OVERLAP && excessScore <= MAX_EXCESS) {
    levelWon();
  } else if (blocksLeft === 0) {
    gameOver();
  } else {
    GF.spawnFloat(GF.cx, g.wallTop + (g.wallBot - g.wallTop) / 2, matchScore + '%',
      matchScore >= WIN_OVERLAP ? '#7ee787' : '#ffd166');
    GF.setShake(0.15);
  }
}

// ── INPUT ────────────────────────────────────────────────────────────────
function canvasScale() {
  var rect = GF.canvas.getBoundingClientRect();
  return { sx: GF.canvas.width / rect.width, sy: GF.canvas.height / rect.height, left: rect.left, top: rect.top };
}
function toCanvas(clientX, clientY) {
  var cs = canvasScale();
  return { x: (clientX - cs.left) * cs.sx, y: (clientY - cs.top) * cs.sy };
}
function hit(r, p) { return r && p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h; }

// HUD/overlay button rects (set during draw, read by hit-tests)
var btnHelp = null, btnBack = null, btnCheck = null, trayRect = null;
var btnMenuOver = null, menuPlay = null, ovPrimary = null;

function nearestRail(x, g) {
  var best = 0, bestD = 1e9;
  for (var i = 0; i < RAIL_COUNT; i++) { var d = Math.abs(x - railX(i, g)); if (d < bestD) { bestD = d; best = i; } }
  return best;
}
function placedAt(x, y, g) {
  for (var i = blocks.length - 1; i >= 0; i--) {
    var b = blocks[i], rx = railX(b.railIdx, g), half = BLOCK_SIZES[b.sizeIdx] * g.S / 2;
    if (x >= rx - half && x <= rx + half && y >= b.y - half && y <= b.y + half) return i;
  }
  return -1;
}

function onDown(clientX, clientY) {
  var p = toCanvas(clientX, clientY);
  pressStart = { x: p.x, y: p.y }; pressMoved = false;

  if (gs === 'MENU') { if (hit(menuPlay, p)) startGame(); return; }
  if (gs === 'GAMEOVER') {
    if (hit(ovPrimary, p)) { startLevel(level); return; }
    if (hit(btnMenuOver, p)) { gs = 'MENU'; GF.saveRun(); return; }
    return;
  }
  if (gs === 'WON') {
    if (hit(ovPrimary, p)) { wonAll ? startLevel(1) : startLevel(level + 1); return; }
    return;
  }
  // PLAYING
  if (helpOpen) { helpOpen = false; return; }
  if (hit(btnHelp, p)) { helpOpen = true; return; }
  if (hit(btnBack, p)) { gs = 'MENU'; GF.gameEnded(); GF.saveRun(); return; }
  if (hit(btnCheck, p)) { commit(); return; }

  var g = geom();
  var pi = placedAt(p.x, p.y, g);
  if (pi >= 0) { drag = { kind: 'placed', idx: pi, x: p.x, y: p.y }; return; }
  if (hit(trayRect, p) && blocksLeft > 0) { drag = { kind: 'tray', idx: -1, sizeIdx: 1, x: p.x, y: p.y }; return; }
}

function onMove(clientX, clientY) {
  if (!drag) return;
  var p = toCanvas(clientX, clientY);
  if (Math.abs(p.x - pressStart.x) > 6 || Math.abs(p.y - pressStart.y) > 6) pressMoved = true;
  drag.x = p.x; drag.y = p.y;
}

function onUp(clientX, clientY) {
  if (!drag) return;
  var p = toCanvas(clientX, clientY);
  var g = geom();
  committed = false;
  var yLo = g.lampY - g.ph * 0.34, yHi = g.lampY + g.ph * 0.34;

  if (drag.kind === 'placed') {
    var b = blocks[drag.idx];
    if (!pressMoved) {
      b.sizeIdx = (b.sizeIdx + 1) % BLOCK_SIZES.length;
      GF.spawnFloat(railX(b.railIdx, g), b.y, ['S', 'M', 'L'][b.sizeIdx], '#9ecbff');
    } else {
      b.railIdx = nearestRail(p.x, g);
      b.y = GF.clamp(p.y, yLo, yHi);
    }
  } else if (drag.kind === 'tray') {
    if (trayRect && p.y < trayRect.y - 4 && blocksLeft > 0) {
      var ri = nearestRail(p.x, g), ny = GF.clamp(p.y, yLo, yHi);
      blocks.push({ railIdx: ri, y: ny, sizeIdx: 1 });
      blocksLeft--;
      GF.spawnParticles(railX(ri, g), ny, '#4dd0e1', 10);
    }
  }
  drag = null;
  GF.saveRun();
}

GF.canvas.addEventListener('mousedown', function(e){ onDown(e.clientX, e.clientY); });
window.addEventListener('mousemove', function(e){ onMove(e.clientX, e.clientY); });
window.addEventListener('mouseup',   function(e){ onUp(e.clientX, e.clientY); });
GF.canvas.addEventListener('touchstart', function(e){ e.preventDefault(); var t=e.changedTouches[0]; onDown(t.clientX, t.clientY); }, {passive:false});
GF.canvas.addEventListener('touchmove',  function(e){ e.preventDefault(); var t=e.changedTouches[0]; onMove(t.clientX, t.clientY); }, {passive:false});
GF.canvas.addEventListener('touchend',   function(e){ e.preventDefault(); var t=e.changedTouches[0]; onUp(t.clientX, t.clientY); }, {passive:false});

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  checkPulse += dt;
  if (gs !== 'PLAYING') return;
  evaluate(geom()); // live readout while dragging
}

// ── DRAW ───────────────────────────────────────────────────────────────
function draw(ctx) {
  var g = geom();
  var bg = ctx.createLinearGradient(0, 0, GF.W, 0);
  bg.addColorStop(0, '#241405'); bg.addColorStop(0.35, '#171019'); bg.addColorStop(1, '#0a0e16');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'PLAYING' || gs === 'WON' || gs === 'GAMEOVER') {
    drawScene(ctx, g);
    if (gs === 'PLAYING') drawHUD(ctx, g);
  }
  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'GAMEOVER') drawEndOverlay(ctx, GF.t('lost'), GF.t('match') + ': ' + matchScore + '%', GF.t('retry'), true);
  if (gs === 'WON') {
    if (wonAll) drawEndOverlay(ctx, GF.t('won_all'), GF.t('level') + ' ' + TOTAL_LEVELS + '/' + TOTAL_LEVELS, GF.t('again'), false);
    else drawEndOverlay(ctx, GF.t('won_lvl'), GF.t('match') + ': ' + matchScore + '%', GF.t('next'), false);
  }
  if (helpOpen && gs === 'PLAYING') drawHelp(ctx);
}

function drawScene(ctx, g) {
  var bandW = g.wallX - g.wallLeft, wallH = g.wallBot - g.wallTop;
  var cellH = wallH / GRID_ROWS, cellW = bandW / GRID_COLS;

  ctx.fillStyle = '#1b2330'; ctx.fillRect(g.wallLeft, g.wallTop, bandW, wallH);
  ctx.strokeStyle = '#2e3a4d'; ctx.lineWidth = Math.max(2, 3 * g.S);
  ctx.strokeRect(g.wallLeft, g.wallTop, bandW, wallH);

  // faint target fill
  for (var r = 0; r < GRID_ROWS; r++) for (var c = 0; c < GRID_COLS; c++) {
    if (targetMask && targetMask[r][c]) {
      ctx.fillStyle = 'rgba(90,150,210,0.18)';
      ctx.fillRect(g.wallLeft + c * cellW, g.wallTop + r * cellH, cellW + 0.5, cellH + 0.5);
    }
  }
  // target outline
  ctx.strokeStyle = 'rgba(120,180,255,0.55)'; ctx.lineWidth = Math.max(1.5, 2 * g.S);
  for (var r2 = 0; r2 < GRID_ROWS; r2++) for (var c2 = 0; c2 < GRID_COLS; c2++) {
    if (!targetMask[r2][c2]) continue;
    var x0 = g.wallLeft + c2 * cellW, y0 = g.wallTop + r2 * cellH;
    if (r2 === 0 || !targetMask[r2-1][c2]) line(ctx, x0, y0, x0 + cellW, y0);
    if (r2 === GRID_ROWS-1 || !targetMask[r2+1][c2]) line(ctx, x0, y0 + cellH, x0 + cellW, y0 + cellH);
    if (c2 === 0 || !targetMask[r2][c2-1]) line(ctx, x0, y0, x0, y0 + cellH);
    if (c2 === GRID_COLS-1 || !targetMask[r2][c2+1]) line(ctx, x0 + cellW, y0, x0 + cellW, y0 + cellH);
  }

  // cast shadow union
  var shadow = evaluate(g);
  ctx.fillStyle = 'rgba(8,10,16,0.9)';
  for (var rr = 0; rr < GRID_ROWS; rr++) for (var cc = 0; cc < GRID_COLS; cc++) {
    if (shadow[rr][cc]) ctx.fillRect(g.wallLeft + cc * cellW, g.wallTop + rr * cellH, cellW + 0.5, cellH + 0.5);
  }

  // light cone
  ctx.save();
  var cone = ctx.createLinearGradient(g.lampX, g.lampY, g.wallX, g.lampY);
  cone.addColorStop(0, 'rgba(255,210,120,0.30)'); cone.addColorStop(1, 'rgba(255,210,120,0)');
  ctx.fillStyle = cone;
  ctx.beginPath(); ctx.moveTo(g.lampX, g.lampY); ctx.lineTo(g.wallX, g.wallTop); ctx.lineTo(g.wallX, g.wallBot); ctx.closePath(); ctx.fill();
  ctx.restore();

  // rails
  for (var i = 0; i < RAIL_COUNT; i++) {
    var rx = railX(i, g);
    ctx.strokeStyle = 'rgba(160,180,210,0.18)'; ctx.lineWidth = Math.max(1.5, 2 * g.S);
    line(ctx, rx, g.lampY - g.ph * 0.34, rx, g.lampY + g.ph * 0.34);
  }

  // placed blocks
  for (var bi = 0; bi < blocks.length; bi++) {
    var b = blocks[bi];
    drawBlock(ctx, railX(b.railIdx, g), b.y, BLOCK_SIZES[b.sizeIdx] * g.S, false);
  }
  if (drag && drag.kind === 'tray') drawBlock(ctx, drag.x, drag.y, BLOCK_SIZES[drag.sizeIdx] * g.S, true);

  drawLamp(ctx, g);
}

function drawBlock(ctx, x, y, sz, ghost) {
  ctx.save();
  if (ghost) ctx.globalAlpha = 0.6;
  var grad = ctx.createLinearGradient(x - sz/2, y - sz/2, x + sz/2, y + sz/2);
  grad.addColorStop(0, '#3a4a63'); grad.addColorStop(1, '#222d3e');
  GF.rr(ctx, x - sz/2, y - sz/2, sz, sz, Math.max(3, sz * 0.12));
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#5b7196'; ctx.lineWidth = Math.max(1.5, GF.S * 2); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,220,150,0.55)'; ctx.lineWidth = Math.max(1.5, GF.S * 2.5);
  ctx.beginPath(); ctx.moveTo(x - sz/2, y - sz/2); ctx.lineTo(x - sz/2, y + sz/2); ctx.stroke();
  ctx.restore();
}

function drawLamp(ctx, g) {
  var r = 16 * g.S;
  var glow = ctx.createRadialGradient(g.lampX, g.lampY, 2 * g.S, g.lampX, g.lampY, 110 * g.S);
  glow.addColorStop(0, 'rgba(255,225,150,0.9)'); glow.addColorStop(0.3, 'rgba(255,200,90,0.35)'); glow.addColorStop(1, 'rgba(255,200,90,0)');
  ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(g.lampX, g.lampY, 110 * g.S, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff3c4'; ctx.beginPath(); ctx.arc(g.lampX, g.lampY, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#3a3320'; GF.rr(ctx, g.lampX - 6 * g.S, g.lampY + r, 12 * g.S, 12 * g.S, 2 * g.S); ctx.fill();
}

function line(ctx, x0, y0, x1, y1) { ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke(); }

// Draw text centred in a button, shrinking the font until it fits the width.
// Guarantees no label ever overflows its rect in any language.
function fitLabel(ctx, txt, cx, cy, maxW, basePx, weight) {
  var px = basePx;
  ctx.font = (weight || 'bold ') + px + 'px sans-serif';
  while (ctx.measureText(txt).width > maxW && px > 8) { px -= 1; ctx.font = (weight || 'bold ') + px + 'px sans-serif'; }
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(txt, cx, cy);
}

function drawHUD(ctx, g) {
  var S = GF.S, fs = GF.clamp(15 * S, 12, 22);
  ctx.textBaseline = 'top';
  ctx.font = 'bold ' + fs + 'px sans-serif'; ctx.fillStyle = '#dfe7f2'; ctx.textAlign = 'left';
  ctx.fillText(GF.t('level') + ' ' + level + '/' + TOTAL_LEVELS, 12 * S, 12 * S);

  ctx.textAlign = 'center';
  ctx.fillStyle = matchScore >= WIN_OVERLAP ? '#7ee787' : '#ffd166';
  ctx.fillText(GF.t('match') + ' ' + matchScore + '%', GF.cx, 12 * S);
  if (excessScore > MAX_EXCESS) {
    ctx.fillStyle = '#ff8a8a'; ctx.font = GF.clamp(12 * S, 10, 18) + 'px sans-serif';
    ctx.fillText(GF.t('excess') + ' ' + excessScore + '%', GF.cx, 12 * S + fs + 4 * S);
  }

  var bs = GF.clamp(34 * S, 28, 46);
  btnHelp = { x: GF.W - bs * 2 - 16 * S, y: 10 * S, w: bs, h: bs };
  btnBack = { x: GF.W - bs - 10 * S, y: 10 * S, w: bs, h: bs };
  drawIconBtn(ctx, btnHelp, '?');
  drawIconBtn(ctx, btnBack, '←');

  var trayH = GF.clamp(86 * S, 70, 120), trayY = GF.H - trayH;
  trayRect = { x: 0, y: trayY, w: GF.W, h: trayH };
  ctx.fillStyle = 'rgba(14,18,28,0.92)'; ctx.fillRect(0, trayY, GF.W, trayH);
  ctx.fillStyle = '#3a4a63'; ctx.fillRect(0, trayY, GF.W, Math.max(2, 2 * S));

  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#9aa6b8'; ctx.font = GF.clamp(12 * S, 10, 16) + 'px sans-serif';
  ctx.fillText(GF.t('blocks') + ': ' + blocksLeft, 14 * S, trayY + 16 * S);
  var tbSize = GF.clamp(40 * S, 30, 56);
  for (var i = 0; i < blocksLeft; i++) {
    drawBlock(ctx, 24 * S + i * (tbSize + 10 * S) + tbSize / 2, trayY + trayH * 0.62, tbSize, false);
  }
  if (blocksLeft === 0) {
    ctx.fillStyle = '#7d8aa0'; ctx.font = GF.clamp(11 * S, 9, 15) + 'px sans-serif';
    ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
    ctx.fillText(GF.t('drag_here'), 24 * S, trayY + trayH * 0.62);
  }

  var cw = GF.clamp(132 * S, 116, 180), ch = GF.clamp(46 * S, 38, 60);
  var cxb = GF.W - cw - 14 * S, cyb = trayY + (trayH - ch) / 2;
  btnCheck = { x: cxb, y: cyb, w: cw, h: ch };
  var risky = blocksLeft === 0;
  var pulse = risky ? (0.5 + 0.5 * Math.sin(checkPulse * 6)) : 0;
  GF.rr(ctx, cxb, cyb, cw, ch, ch / 2);
  if (risky) ctx.fillStyle = 'rgba(220,70,70,' + (0.7 + 0.3 * pulse) + ')';
  else { var gd = ctx.createLinearGradient(cxb, cyb, cxb, cyb + ch); gd.addColorStop(0, '#2ecc71'); gd.addColorStop(1, '#27ae60'); ctx.fillStyle = gd; }
  ctx.fill();
  ctx.fillStyle = '#fff';
  fitLabel(ctx, GF.t('check'), cxb + cw / 2, cyb + ch / 2, cw - 18 * S, GF.clamp(16 * S, 13, 22) | 0);
}

function drawIconBtn(ctx, r, label) {
  GF.rr(ctx, r.x, r.y, r.w, r.h, 8 * GF.S);
  ctx.fillStyle = 'rgba(40,52,72,0.92)'; ctx.fill();
  ctx.strokeStyle = '#5b7196'; ctx.lineWidth = Math.max(1.5, GF.S * 1.5); ctx.stroke();
  ctx.fillStyle = '#dfe7f2'; ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 26) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, r.x + r.w / 2, r.y + r.h / 2 + 1);
}

// returns the y after the last drawn physical line
function wrapText(ctx, text, x, y, maxW, lh) {
  var words = String(text).split(/\s+/), cur = '', curY = y;
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { ctx.fillText(cur, x, curY); curY += lh; cur = words[i]; }
    else cur = probe;
  }
  if (cur) { ctx.fillText(cur, x, curY); curY += lh; }
  return curY;
}

function drawMenu(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  ctx.fillStyle = 'rgba(8,8,18,0.93)'; ctx.fillRect(0, 0, W, H);

  var vy = H * 0.13;
  ctx.save(); ctx.globalAlpha = 0.55;
  var lx = W * 0.3, ly = vy + 34 * S;
  var glow = ctx.createRadialGradient(lx, ly, 2, lx, ly, 70 * S);
  glow.addColorStop(0, 'rgba(255,220,140,0.8)'); glow.addColorStop(1, 'rgba(255,220,140,0)');
  ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(lx, ly, 70 * S, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  var titleFs = GF.clamp(40 * S, 26, 58);
  ctx.shadowColor = 'rgba(255,200,90,0.5)'; ctx.shadowBlur = 26 * S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif'; ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t('title'), W / 2, vy + 30 * S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  ctx.font = GF.clamp(14 * S, 12, 19) + 'px sans-serif'; ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t('sub'), W / 2, vy + 30 * S + titleFs * 0.7);

  var lines = [GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip')];
  var tfs = GF.clamp(13 * S, 11, 16);
  ctx.font = tfs + 'px sans-serif'; ctx.fillStyle = '#c6d2e2'; ctx.textAlign = 'left';
  var maxW = Math.min(W - 44 * S, 520 * S), startX = (W - maxW) / 2;
  var y = vy + 30 * S + titleFs * 0.7 + 30 * S, lh = tfs * 1.34;
  for (var i = 0; i < lines.length; i++) y = wrapText(ctx, lines[i], startX, y, maxW, lh) + lh * 0.5;

  var btnW = GF.clamp(220 * S, 160, 300), btnH = GF.clamp(52 * S, 42, 64);
  var btnX = W / 2 - btnW / 2, btnY = Math.min(y + 12 * S, H - btnH - 22 * S);
  var gd = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  gd.addColorStop(0, '#ffd166'); gd.addColorStop(1, '#f0a500');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2); ctx.fillStyle = gd; ctx.fill();
  ctx.fillStyle = '#1a1206';
  fitLabel(ctx, GF.t('play'), W / 2, btnY + btnH / 2, btnW - 32 * S, GF.clamp(18 * S, 14, 24) | 0);
  menuPlay = { x: btnX, y: btnY, w: btnW, h: btnH };
}

function drawEndOverlay(ctx, title, sub, btnLabel, showMenu) {
  var S = GF.S, W = GF.W, H = GF.H;
  ctx.fillStyle = 'rgba(8,8,18,0.9)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(255,200,90,0.4)'; ctx.shadowBlur = 24 * S;
  ctx.font = 'bold ' + GF.clamp(34 * S, 22, 52) + 'px sans-serif'; ctx.fillStyle = '#fff'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(title, W / 2, H * 0.4);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = GF.clamp(16 * S, 12, 22) + 'px sans-serif'; ctx.fillStyle = '#9ab';
  ctx.fillText(sub, W / 2, H * 0.4 + 30 * S);

  var btnW = GF.clamp(220 * S, 160, 300), btnH = GF.clamp(52 * S, 42, 64);
  var btnX = W / 2 - btnW / 2, btnY = H * 0.5;
  var gd = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  gd.addColorStop(0, '#2ecc71'); gd.addColorStop(1, '#27ae60');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2); ctx.fillStyle = gd; ctx.fill();
  ctx.fillStyle = '#fff';
  fitLabel(ctx, btnLabel, W / 2, btnY + btnH / 2, btnW - 32 * S, GF.clamp(17 * S, 13, 23) | 0);
  ovPrimary = { x: btnX, y: btnY, w: btnW, h: btnH };

  if (showMenu) {
    var mw = GF.clamp(150 * S, 110, 200), mh = GF.clamp(40 * S, 34, 52);
    var mx = W / 2 - mw / 2, my = btnY + btnH + 16 * S;
    GF.rr(ctx, mx, my, mw, mh, mh / 2);
    ctx.fillStyle = 'rgba(50,62,82,0.95)'; ctx.fill();
    ctx.strokeStyle = '#5b7196'; ctx.lineWidth = Math.max(1.5, S * 1.5); ctx.stroke();
    ctx.fillStyle = '#dfe7f2';
    fitLabel(ctx, GF.t('menu'), W / 2, my + mh / 2, mw - 28 * S, GF.clamp(15 * S, 12, 20) | 0);
    btnMenuOver = { x: mx, y: my, w: mw, h: mh };
  } else { btnMenuOver = null; }
}

function drawHelp(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  ctx.fillStyle = 'rgba(8,8,18,0.93)'; ctx.fillRect(0, 0, W, H);
  ctx.font = 'bold ' + GF.clamp(24 * S, 18, 34) + 'px sans-serif'; ctx.fillStyle = '#ffd166';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t('title'), W / 2, H * 0.16);
  var lines = [GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip')];
  var tfs = GF.clamp(14 * S, 12, 18);
  ctx.font = tfs + 'px sans-serif'; ctx.fillStyle = '#dfe7f2'; ctx.textAlign = 'left';
  var maxW = Math.min(W - 44 * S, 540 * S), startX = (W - maxW) / 2, y = H * 0.16 + 38 * S, lh = tfs * 1.4;
  for (var i = 0; i < lines.length; i++) y = wrapText(ctx, lines[i], startX, y, maxW, lh) + lh * 0.5;
  ctx.textAlign = 'center'; ctx.fillStyle = '#9ab'; ctx.font = GF.clamp(13 * S, 11, 17) + 'px sans-serif';
  ctx.fillText(GF.lang === 'ru' ? 'нажмите, чтобы продолжить' : 'tap to continue', W / 2, Math.min(y + 20 * S, H - 30 * S));
}

// ── SCREENSHOT / TEST HOOKS ───────────────────────────────────────────────
window._jumpLevel = function(n) {
  // High n (used by the runtime gate) drives a terminal state so the gate can
  // verify state-machine reachability. Normal n loads that level for play.
  if (n && n >= 90) { startLevel(1); blocks = []; blocksLeft = 0; commit(); return; }
  startLevel(n || 3);
};
window._setupForScreenshot = function(lvl) {
  startLevel(lvl || 3);
  var g = geom();
  blocks = []; blocksLeft = blockBudget;
  var cy = g.lampY;
  blocks.push({ railIdx: 1, y: cy - g.ph * 0.05, sizeIdx: 2 }); blocksLeft--;
  blocks.push({ railIdx: 2, y: cy + g.ph * 0.02, sizeIdx: 1 }); blocksLeft--;
  evaluate(g);
};
window._setLang = function(l){ GF.lang = l; };
window._setState = function(s){ gs = s; };
window._getI18N = function(){ return STRINGS; };
window._getFontBody = function(){ return 'sans-serif'; };

// ── EXPOSE STATE for the post-build-tester gate ──────────────────────────
GF.exposeState(function(){
  return { gs: gs, level: level, matchScore: matchScore, excessScore: excessScore,
    blocksLeft: blocksLeft, blockBudget: blockBudget,
    WIN_OVERLAP: WIN_OVERLAP, MAX_EXCESS: MAX_EXCESS, TOTAL_LEVELS: TOTAL_LEVELS };
});

// ── BOOT ──────────────────────────────────────────────────────────────
GF.init({
  designW: DW, designH: DH, strings: STRINGS, sprites: SPRITE_NAMES, saveKey: 'shadow_cast',
  onReady: function() {
    GF.persist('shadow_cast_run_v1',
      function(){ return { gs: gs, level: level, blocks: blocks, blocksLeft: blocksLeft, blockBudget: blockBudget }; },
      function(s){
        if (!s) return;
        level = s.level || 1;
        if (s.gs === 'PLAYING') {
          genTarget(level);
          blocks = Array.isArray(s.blocks) ? s.blocks : [];
          blockBudget = s.blockBudget || blockBudget;
          blocksLeft = (typeof s.blocksLeft === 'number') ? s.blocksLeft : blockBudget;
          gs = 'PLAYING';
        } else { gs = 'MENU'; }
      }
    );
    try { localStorage.setItem('shadow_cast_seen_tutorial', '1'); } catch(e){}
    if (gs !== 'PLAYING') gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

})();
</script>
