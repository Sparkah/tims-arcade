<html lang="en">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wishlist Climb</title>
  <script src="/sdk.js"></script>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── STRINGS ──────────────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Wishlist Climb',
    sub:   'From 0 to 20k wishlists in 180 days',
    play: 'PLAY', retry: 'TRY AGAIN',
    score: 'WISHLISTS', best: 'BEST',
    won: 'YOU SHIPPED!', lost: 'RUNWAY EMPTY',
    day: 'DAY', morale: 'MORALE', target: 'TARGET',
    devlog: 'Devlog', trailer: 'Trailer', festival: 'Festival',
    meme: 'Meme', press: 'Press', rest: 'Rest',
    devlog_d: 'Steady drip. Weekly readers.',
    trailer_d: 'Big push. 2-week cooldown.',
    festival_d: 'Huge spike. Monthly cooldown.',
    meme_d: 'Cheap shot. Maybe viral.',
    press_d: 'Pitch journos. May ghost.',
    rest_d: 'Sleep, walk, refill morale.',
    cooldown: 'cooldown',
    burnout: 'BURNOUT — payouts halved',
    'tut_goal': 'Goal: 20,000 wishlists in 180 days.',
    'tut_controls': 'Controls: tap one of 6 cards per day.',
    'tut_win': 'Win: hit 20k before runway burns out.',
    'tut_lose': 'Lose: day 180 with under 20k wishlists.',
    'tut_tip': 'Tip: low morale halves payouts. Rest before crunch.',
    viral: 'VIRAL!', ghosted: 'GHOSTED', burned: 'BURNED OUT',
    won_sub: 'Released with {n} days to spare.',
    lost_sub: 'You shipped to {n} wishlists. Try again.',
    close: 'OK',
    summary: 'Final: {n} wishlists',
  },
  ru: {
    title: 'Wishlist Climb',
    sub:   'От 0 до 20 000 вишлистов за 180 дней',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ',
    score: 'ВИШЛИСТЫ', best: 'РЕКОРД',
    won: 'РЕЛИЗ СОСТОЯЛСЯ!', lost: 'РАНВЕЙ КОНЧИЛСЯ',
    day: 'ДЕНЬ', morale: 'МОРАЛЬ', target: 'ЦЕЛЬ',
    devlog: 'Девлог', trailer: 'Трейлер', festival: 'Фестиваль',
    meme: 'Мем', press: 'Пресса', rest: 'Отдых',
    devlog_d: 'Регулярные читатели.',
    trailer_d: 'Крупный пуш. 2 нед. кулдаун.',
    festival_d: 'Большой прирост. 30 дн. кулдаун.',
    meme_d: 'Дёшево. Может стрельнёт.',
    press_d: 'Питч журналистам. Могут проигнорить.',
    rest_d: 'Сон, прогулка, восстановление.',
    cooldown: 'кулдаун',
    burnout: 'ВЫГОРАНИЕ — х0.5 ко всему',
    'tut_goal': 'Цель: 20 000 вишлистов за 180 дней.',
    'tut_controls': 'Управление: жми одну из 6 карточек в день.',
    'tut_win': 'Победа: 20 000 раньше, чем кончится ранвей.',
    'tut_lose': 'Поражение: день 180, вишлистов меньше 20 000.',
    'tut_tip': 'Совет: низкая мораль х0.5 от всего. Отдыхай перед кранчем.',
    viral: 'ВИРУСНО!', ghosted: 'ИГНОР', burned: 'ВЫГОРЕЛ',
    won_sub: 'Релиз с запасом в {n} дн.',
    lost_sub: 'Финиш на {n} вишлистах. Попробуй снова.',
    close: 'ОК',
    summary: 'Итог: {n} вишлистов',
  },
};

// ── TUNABLES (from DESIGN.md) ────────────────────────────────────────────
var RUNWAY_DAYS         = 180;
var WIN_TARGET          = 20000;
var MORALE_MAX          = 100;
var MORALE_START        = 80;
var MORALE_BURNOUT      = 30;
var DEVLOG_MEAN         = 35;
var DEVLOG_MORALE       = -8;
var TRAILER_MEAN        = 180;
var TRAILER_MORALE      = -18;
var TRAILER_COOLDOWN    = 14;
var FESTIVAL_MEAN       = 600;
var FESTIVAL_MORALE     = -25;
var FESTIVAL_COOLDOWN   = 30;
var MEME_MEAN           = 60;
var MEME_VIRAL_CHANCE   = 0.08;
var MEME_VIRAL_BONUS    = 1500;
var MEME_MORALE         = -3;
var PRESS_MEAN          = 90;
var PRESS_MORALE        = -10;
var PRESS_FAIL_CHANCE   = 0.35;
var REST_WISHLISTS      = 5;
var REST_MORALE         = 25;
var DAILY_SEED_MULT_MIN = 0.6;
var DAILY_SEED_MULT_MAX = 1.4;

// ── STATE ────────────────────────────────────────────────────────────────
var gs = 'MENU';                  // MENU | PLAYING | GAMEOVER | WON
var day = 1;
var wishlists = 0;
var morale = MORALE_START;
var best = 0;
var trailerCooldown = 0;
var festivalCooldown = 0;
var dailySeed = 0;
var dailyMult = 1;
var lastFlash = '';
var lastFlashT = 0;
var history = [];
var helpOpen = false;
var endPanelOpen = false;

var CARDS = [
  { id: 'devlog',   color: '#4dd0e1', accent: '#26c6da' },
  { id: 'trailer',  color: '#ab47bc', accent: '#8e24aa' },
  { id: 'festival', color: '#ffb74d', accent: '#fb8c00' },
  { id: 'meme',     color: '#ec407a', accent: '#d81b60' },
  { id: 'press',    color: '#66bb6a', accent: '#388e3c' },
  { id: 'rest',     color: '#90a4ae', accent: '#607d8b' },
];

var cardHits = [];
var helpHit = null;
var endHit = null;
var menuPlayHit = null;

// ── RNG ──────────────────────────────────────────────────────────────────
function seedFor(d) {
  var x = (d * 2654435761) ^ 0x9e3779b9;
  x = (x ^ (x >>> 16)) >>> 0;
  return x;
}
function rng01(seed) {
  var t = seed + 0x6d2b79f5;
  t = Math.imul(t ^ (t >>> 15), t | 1);
  t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}
var sessionSalt = (Math.random() * 0xffffffff) >>> 0;

function rollDay() {
  dailySeed = (seedFor(day) ^ sessionSalt) >>> 0;
  dailyMult = DAILY_SEED_MULT_MIN + rng01(dailySeed) * (DAILY_SEED_MULT_MAX - DAILY_SEED_MULT_MIN);
}

// ── LIFECYCLE ────────────────────────────────────────────────────────────
function startGame() {
  gs = 'PLAYING';
  day = 1;
  wishlists = 0;
  morale = MORALE_START;
  trailerCooldown = 0;
  festivalCooldown = 0;
  lastFlash = '';
  lastFlashT = 0;
  history = [{ day: 0, wishlists: 0 }];
  endPanelOpen = false;
  rollDay();
  GF.gameStarted();
}

function endRun(won) {
  if (wishlists > best) {
    best = wishlists;
    try { localStorage.setItem('wishlist_climb_best', String(best)); } catch (e) {}
  }
  gs = won ? 'WON' : 'GAMEOVER';
  endPanelOpen = true;
  GF.gameEnded();
}

function advanceDay() {
  history.push({ day: day, wishlists: wishlists });
  if (history.length > 220) history.shift();
  day++;
  if (trailerCooldown > 0) trailerCooldown--;
  if (festivalCooldown > 0) festivalCooldown--;
  rollDay();
  if (wishlists >= WIN_TARGET) { endRun(true); return; }
  if (day > RUNWAY_DAYS)        { endRun(false); return; }
}

// ── ACTIONS ──────────────────────────────────────────────────────────────
function moraleMod(base) {
  var m = (morale < MORALE_BURNOUT) ? 0.5 : 1.0;
  return base * dailyMult * m;
}

function gain(amount, flash) {
  amount = Math.max(0, Math.round(amount));
  wishlists += amount;
  if (flash) { lastFlash = flash; lastFlashT = 1.0; }
  if (amount > 0) {
    GF.spawnParticles(GF.W * 0.5, GF.H * 0.18, '#FFD700', Math.min(40, 6 + Math.floor(amount / 25)));
    GF.spawnFloat(GF.W * 0.5, GF.H * 0.22, '+' + amount, '#FFD700');
  }
  if (wishlists >= WIN_TARGET) GF.setShake(0.6);
}

function spendMorale(d) {
  morale = GF.clamp(morale + d, 0, MORALE_MAX);
}

function actDevlog() {
  if (gs !== 'PLAYING') return;
  var roll = DEVLOG_MEAN * (0.7 + rng01(dailySeed ^ 0xa1) * 0.6);
  spendMorale(DEVLOG_MORALE);
  gain(moraleMod(roll), morale < MORALE_BURNOUT ? 'burned' : '');
  advanceDay();
}
function actTrailer() {
  if (gs !== 'PLAYING') return;
  if (trailerCooldown > 0) return;
  var roll = TRAILER_MEAN * (0.7 + rng01(dailySeed ^ 0xb2) * 0.6);
  spendMorale(TRAILER_MORALE);
  trailerCooldown = TRAILER_COOLDOWN;
  gain(moraleMod(roll), morale < MORALE_BURNOUT ? 'burned' : '');
  GF.setShake(0.25);
  advanceDay();
}
function actFestival() {
  if (gs !== 'PLAYING') return;
  if (festivalCooldown > 0) return;
  var roll = FESTIVAL_MEAN * (0.6 + rng01(dailySeed ^ 0xc3) * 0.8);
  spendMorale(FESTIVAL_MORALE);
  festivalCooldown = FESTIVAL_COOLDOWN;
  gain(moraleMod(roll), morale < MORALE_BURNOUT ? 'burned' : '');
  GF.setShake(0.45);
  advanceDay();
}
function actMeme() {
  if (gs !== 'PLAYING') return;
  var viral = rng01(dailySeed ^ 0xd4) < MEME_VIRAL_CHANCE;
  var roll = MEME_MEAN * (0.5 + rng01(dailySeed ^ 0xe5) * 1.0);
  var amt = moraleMod(roll);
  spendMorale(MEME_MORALE);
  if (viral) { amt += MEME_VIRAL_BONUS; gain(amt, 'viral'); GF.setShake(0.7); }
  else       { gain(amt, morale < MORALE_BURNOUT ? 'burned' : ''); }
  advanceDay();
}
function actPress() {
  if (gs !== 'PLAYING') return;
  var ghosted = rng01(dailySeed ^ 0xf6) < PRESS_FAIL_CHANCE;
  spendMorale(PRESS_MORALE);
  if (ghosted) {
    lastFlash = 'ghosted'; lastFlashT = 1.0;
    GF.spawnFloat(GF.W * 0.5, GF.H * 0.22, '+0', '#888');
    advanceDay();
    return;
  }
  var roll = PRESS_MEAN * (0.7 + rng01(dailySeed ^ 0x17) * 0.6);
  gain(moraleMod(roll), morale < MORALE_BURNOUT ? 'burned' : '');
  advanceDay();
}
function actRest() {
  if (gs !== 'PLAYING') return;
  spendMorale(REST_MORALE);
  gain(REST_WISHLISTS, '');
  advanceDay();
}

var ACTION_FNS = [actDevlog, actTrailer, actFestival, actMeme, actPress, actRest];

// ── INPUT ────────────────────────────────────────────────────────────────
function hit(x, y, r) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

function onTap(x, y) {
  if (gs === 'MENU') {
    if (menuPlayHit && hit(x, y, menuPlayHit)) startGame();
    return;
  }
  if (gs === 'GAMEOVER' || gs === 'WON') {
    if (endHit && hit(x, y, endHit)) startGame();
    return;
  }
  if (gs !== 'PLAYING') return;
  if (helpOpen) { helpOpen = false; return; }
  if (helpHit && hit(x, y, helpHit)) { helpOpen = true; return; }
  for (var i = 0; i < cardHits.length; i++) {
    if (hit(x, y, cardHits[i])) {
      var id = CARDS[i].id;
      if (id === 'trailer'  && trailerCooldown > 0)  return;
      if (id === 'festival' && festivalCooldown > 0) return;
      ACTION_FNS[i]();
      return;
    }
  }
}

GF.canvas.addEventListener('click', function(e) { onTap(e.clientX, e.clientY); });
GF.canvas.addEventListener('touchend', function(e) {
  if (e.changedTouches && e.changedTouches.length) {
    var t = e.changedTouches[0];
    onTap(t.clientX, t.clientY);
  }
}, { passive: false });

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  var grad = ctx.createLinearGradient(0, 0, 0, GF.H);
  grad.addColorStop(0, '#10131f'); grad.addColorStop(1, '#06070d');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, GF.W, GF.H);

  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  var gstep = 40 * GF.S;
  for (var gx = 0; gx < GF.W; gx += gstep) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, GF.H); ctx.stroke(); }
  for (var gy = 0; gy < GF.H; gy += gstep) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(GF.W, gy); ctx.stroke(); }

  if (gs === 'PLAYING' || gs === 'WON' || gs === 'GAMEOVER') {
    drawDashboard();
    drawCards();
    drawHelpButton();
  }

  if (lastFlashT > 0) lastFlashT -= 0.016;

  if (gs === 'MENU') drawMenuOverlay();
  if (helpOpen) drawHelpOverlay();
  if ((gs === 'GAMEOVER' || gs === 'WON') && endPanelOpen) drawEndPanel();
}

function drawDashboard() {
  var c = GF.ctx;
  var W = GF.W, H = GF.H, S = GF.S;
  var pad = 14 * S;
  var headerH = Math.min(160 * S, H * 0.32);
  var headerW = W - pad * 2;
  GF.rr(c, pad, pad, headerW, headerH, 12 * S);
  c.fillStyle = '#161a2a'; c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.08)'; c.lineWidth = 1; c.stroke();

  var bigFs = GF.clamp(54 * S, 28, 72);
  c.font = 'bold ' + bigFs + 'px sans-serif';
  c.textAlign = 'left'; c.textBaseline = 'top';
  c.fillStyle = '#FFD700';
  c.shadowColor = 'rgba(255,215,0,0.4)'; c.shadowBlur = 16 * S;
  c.fillText(wishlists.toLocaleString('en-US'), pad + 18 * S, pad + 18 * S);
  c.shadowBlur = 0;

  c.font = (12 * S | 0) + 'px sans-serif';
  c.fillStyle = '#9ab';
  c.fillText(GF.t('score') + '  /  ' + GF.t('target') + ' ' + WIN_TARGET.toLocaleString('en-US'),
    pad + 20 * S, pad + 18 * S + bigFs + 6 * S);

  // progress bar
  var barX = pad + 18 * S;
  var barY = pad + headerH - 36 * S;
  var barW = headerW - 36 * S;
  var barH = 12 * S;
  GF.rr(c, barX, barY, barW, barH, barH / 2);
  c.fillStyle = '#252a3d'; c.fill();
  var prog = GF.clamp(wishlists / WIN_TARGET, 0, 1);
  GF.rr(c, barX, barY, barW * prog, barH, barH / 2);
  var pg = c.createLinearGradient(barX, barY, barX + barW, barY);
  pg.addColorStop(0, '#26c6da'); pg.addColorStop(1, '#FFD700');
  c.fillStyle = pg; c.fill();

  // right-side stats
  var statX = pad + headerW - 200 * S;
  c.textAlign = 'left';
  c.font = 'bold ' + (14 * S | 0) + 'px sans-serif';
  c.fillStyle = '#cbd';
  c.fillText(GF.t('day') + ' ' + Math.min(day, RUNWAY_DAYS) + ' / ' + RUNWAY_DAYS, statX, pad + 18 * S);

  var mY = pad + 42 * S;
  c.font = (12 * S | 0) + 'px sans-serif';
  c.fillStyle = '#9ab';
  c.fillText(GF.t('morale'), statX, mY);
  var mBarX = statX, mBarY = mY + 16 * S, mBarW = 160 * S, mBarH = 10 * S;
  GF.rr(c, mBarX, mBarY, mBarW, mBarH, mBarH / 2);
  c.fillStyle = '#252a3d'; c.fill();
  var mp = GF.clamp(morale / MORALE_MAX, 0, 1);
  var mc = morale < MORALE_BURNOUT ? '#e74c3c' : (morale < 60 ? '#f39c12' : '#2ecc71');
  GF.rr(c, mBarX, mBarY, mBarW * mp, mBarH, mBarH / 2);
  c.fillStyle = mc; c.fill();

  if (morale < MORALE_BURNOUT && gs === 'PLAYING') {
    c.font = 'bold ' + (10 * S | 0) + 'px sans-serif';
    c.fillStyle = '#e74c3c';
    c.fillText(GF.t('burnout'), statX, mBarY + mBarH + 8 * S);
  }

  drawSparkline(barX, pad + headerH - 86 * S, statX - barX - 24 * S, 36 * S);

  if (lastFlashT > 0 && lastFlash) {
    c.globalAlpha = Math.min(1, lastFlashT);
    c.font = 'bold ' + (18 * S | 0) + 'px sans-serif';
    c.textAlign = 'center';
    var fcol = lastFlash === 'viral' ? '#ec407a' : (lastFlash === 'ghosted' ? '#9aa' : '#e74c3c');
    c.fillStyle = fcol;
    c.fillText(GF.t(lastFlash), GF.W / 2, pad + headerH + 22 * S);
    c.globalAlpha = 1;
  }
}

function drawSparkline(x, y, w, h) {
  var c = GF.ctx;
  c.strokeStyle = 'rgba(255,255,255,0.08)';
  c.lineWidth = 1;
  c.beginPath(); c.moveTo(x, y + h); c.lineTo(x + w, y + h); c.stroke();
  if (history.length < 2) return;
  var maxW = Math.max(WIN_TARGET, 1);
  c.beginPath();
  for (var i = 0; i < history.length; i++) {
    var px = x + (i / (history.length - 1)) * w;
    var py = y + h - (Math.min(history[i].wishlists, maxW) / maxW) * h;
    if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
  }
  c.strokeStyle = '#26c6da'; c.lineWidth = 2; c.stroke();
  c.lineTo(x + w, y + h); c.lineTo(x, y + h); c.closePath();
  c.fillStyle = 'rgba(38,198,218,0.12)'; c.fill();
}

function drawCards() {
  var W = GF.W, H = GF.H, S = GF.S;
  var pad = 14 * S;
  var topUsed = Math.min(160 * S, H * 0.32) + pad * 2;
  var available = H - topUsed - pad;
  var cols, rows;
  if (W >= H) { cols = 3; rows = 2; } else { cols = 2; rows = 3; }
  var gridX = pad, gridY = topUsed;
  var gridW = W - pad * 2, gridH = available;
  var cw = (gridW - (cols - 1) * pad) / cols;
  var ch = (gridH - (rows - 1) * pad) / rows;

  cardHits = [];
  for (var i = 0; i < CARDS.length; i++) {
    var col = i % cols, row = Math.floor(i / cols);
    var x = gridX + col * (cw + pad);
    var y = gridY + row * (ch + pad);
    cardHits.push({ x: x, y: y, w: cw, h: ch });
    drawCard(CARDS[i], x, y, cw, ch);
  }
}

function drawCard(card, x, y, w, h) {
  var c = GF.ctx;
  var S = GF.S;
  var disabled = false, cdLeft = 0;
  if (card.id === 'trailer'  && trailerCooldown > 0)  { disabled = true; cdLeft = trailerCooldown; }
  if (card.id === 'festival' && festivalCooldown > 0) { disabled = true; cdLeft = festivalCooldown; }

  GF.rr(c, x, y + 4 * S, w, h, 14 * S);
  c.fillStyle = 'rgba(0,0,0,0.35)'; c.fill();

  GF.rr(c, x, y, w, h, 14 * S);
  var bg = c.createLinearGradient(x, y, x, y + h);
  bg.addColorStop(0, disabled ? '#1d2030' : card.color);
  bg.addColorStop(1, disabled ? '#11131c' : card.accent);
  c.fillStyle = bg;
  c.globalAlpha = disabled ? 0.55 : 1.0; c.fill(); c.globalAlpha = 1.0;
  c.strokeStyle = 'rgba(0,0,0,0.35)'; c.lineWidth = 1; c.stroke();

  GF.rr(c, x, y, w, 6 * S, 6 * S);
  c.fillStyle = 'rgba(255,255,255,0.18)'; c.fill();

  c.textAlign = 'left'; c.textBaseline = 'top';
  c.fillStyle = '#fff';
  var titleFs = GF.clamp(20 * S, 14, 26);
  c.font = 'bold ' + titleFs + 'px sans-serif';
  c.fillText(GF.t(card.id), x + 14 * S, y + 14 * S);

  drawCardIcon(card.id, x + w - 36 * S, y + 14 * S, 22 * S);

  c.font = (12 * S | 0) + 'px sans-serif';
  c.fillStyle = 'rgba(255,255,255,0.85)';
  wrapText(c, GF.t(card.id + '_d'), x + 14 * S, y + 14 * S + titleFs + 8 * S, w - 28 * S, 14 * S, 3);

  c.font = 'bold ' + (12 * S | 0) + 'px sans-serif';
  c.fillStyle = 'rgba(255,255,255,0.95)';
  c.textAlign = 'left'; c.textBaseline = 'bottom';
  c.fillText(evLabel(card.id), x + 14 * S, y + h - 14 * S);

  if (disabled) {
    c.textAlign = 'right'; c.textBaseline = 'bottom';
    c.font = 'bold ' + (13 * S | 0) + 'px sans-serif';
    c.fillStyle = '#fff';
    c.fillText(GF.t('cooldown') + ': ' + cdLeft + 'd', x + w - 14 * S, y + h - 14 * S);
  }
}

function drawCardIcon(id, x, y, s) {
  var c = GF.ctx;
  c.save();
  c.translate(x, y);
  c.fillStyle = 'rgba(255,255,255,0.9)';
  c.strokeStyle = 'rgba(255,255,255,0.9)';
  c.lineWidth = 2;
  if (id === 'devlog') {
    c.fillRect(0, 0, s, s * 1.2);
    c.fillStyle = 'rgba(0,0,0,0.5)';
    for (var i = 0; i < 3; i++) c.fillRect(s * 0.15, s * 0.25 + i * s * 0.25, s * 0.7, s * 0.08);
  } else if (id === 'trailer') {
    c.beginPath(); c.moveTo(0, 0); c.lineTo(s, s/2); c.lineTo(0, s); c.closePath(); c.fill();
  } else if (id === 'festival') {
    c.beginPath(); c.moveTo(s/2, 0); c.lineTo(s, s); c.lineTo(0, s); c.closePath(); c.fill();
  } else if (id === 'meme') {
    c.beginPath(); c.arc(s/2, s/2, s/2, 0, Math.PI * 2); c.fill();
    c.fillStyle = 'rgba(0,0,0,0.7)';
    c.beginPath(); c.arc(s*0.35, s*0.4, s*0.06, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(s*0.65, s*0.4, s*0.06, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(s/2, s*0.6, s*0.2, 0, Math.PI); c.stroke();
  } else if (id === 'press') {
    c.fillRect(0, 0, s, s);
    c.fillStyle = 'rgba(0,0,0,0.5)';
    c.fillRect(s*0.1, s*0.15, s*0.5, s*0.1);
    c.fillRect(s*0.1, s*0.35, s*0.8, s*0.05);
    c.fillRect(s*0.1, s*0.5, s*0.8, s*0.05);
    c.fillRect(s*0.1, s*0.65, s*0.8, s*0.05);
  } else if (id === 'rest') {
    c.beginPath(); c.arc(s/2, s/2, s/2, 0, Math.PI * 2); c.fill();
    c.fillStyle = 'rgba(20,20,40,0.95)';
    c.beginPath(); c.arc(s*0.65, s*0.45, s*0.45, 0, Math.PI*2); c.fill();
  }
  c.restore();
}

function evLabel(id) {
  switch (id) {
    case 'devlog':   return '~' + DEVLOG_MEAN;
    case 'trailer':  return '~' + TRAILER_MEAN;
    case 'festival': return '~' + FESTIVAL_MEAN;
    case 'meme':     return '~' + MEME_MEAN + ' (8% +1.5k)';
    case 'press':    return '~' + PRESS_MEAN + ' (35% miss)';
    case 'rest':     return '+25 morale';
  }
  return '';
}

function wrapText(c, str, x, y, maxW, lineH, maxLines) {
  var words = (str || '').split(' ');
  var line = '', lines = 0;
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (c.measureText(test).width > maxW && line) {
      c.fillText(line, x, y); y += lineH; lines++;
      if (lines >= maxLines) return;
      line = words[i];
    } else { line = test; }
  }
  if (line && lines < maxLines) c.fillText(line, x, y);
}

function drawHelpButton() {
  var c = GF.ctx;
  var S = GF.S;
  var size = GF.clamp(36 * S, 30, 44);
  var x = GF.W - size - 12 * S, y = 12 * S;
  helpHit = { x: x, y: y, w: size, h: size };
  c.beginPath(); c.arc(x + size/2, y + size/2, size/2, 0, Math.PI * 2);
  c.fillStyle = 'rgba(255,255,255,0.15)'; c.fill();
  c.font = 'bold ' + (size * 0.55 | 0) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = '#fff';
  c.fillText('?', x + size/2, y + size/2 + 1);
}

function drawMenuOverlay() {
  var c = GF.ctx;
  var W = GF.W, H = GF.H, S = GF.S;
  c.fillStyle = 'rgba(8,8,18,0.94)';
  c.fillRect(0, 0, W, H);

  var titleFs = GF.clamp(40 * S, 24, 60);
  c.font = 'bold ' + titleFs + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'top';
  c.fillStyle = '#FFD700';
  c.shadowColor = 'rgba(255,215,0,0.45)'; c.shadowBlur = 24 * S;
  c.fillText(GF.t('title'), W / 2, H * 0.10);
  c.shadowBlur = 0;

  c.font = (16 * S | 0) + 'px sans-serif';
  c.fillStyle = '#9ab';
  c.fillText(GF.t('sub'), W / 2, H * 0.10 + titleFs + 8 * S);

  var lines = [GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip')];
  var lh = GF.clamp(20 * S, 16, 26);
  var startY = H * 0.34;
  c.font = (14 * S | 0) + 'px sans-serif';
  c.fillStyle = '#cbd';
  for (var i = 0; i < lines.length; i++) c.fillText(lines[i], W / 2, startY + i * lh);

  var btnW = GF.clamp(240 * S, 160, 320), btnH = GF.clamp(54 * S, 40, 66);
  var btnX = W / 2 - btnW / 2, btnY = startY + lines.length * lh + 24 * S;
  GF.rr(c, btnX, btnY, btnW, btnH, btnH / 2);
  var grad = c.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
  c.fillStyle = grad; c.fill();
  c.font = 'bold ' + (16 * S | 0) + 'px sans-serif';
  c.fillStyle = '#fff'; c.textBaseline = 'middle';
  c.fillText(GF.t('play'), W / 2, btnY + btnH / 2);

  menuPlayHit = { x: btnX, y: btnY, w: btnW, h: btnH };

  if (best > 0) {
    c.font = (12 * S | 0) + 'px sans-serif';
    c.fillStyle = '#557'; c.textBaseline = 'top';
    c.fillText(GF.t('best') + ': ' + best.toLocaleString('en-US'), W / 2, btnY + btnH + 18 * S);
  }
}

function drawHelpOverlay() {
  var c = GF.ctx;
  var W = GF.W, H = GF.H, S = GF.S;
  c.fillStyle = 'rgba(8,8,18,0.92)';
  c.fillRect(0, 0, W, H);

  var titleFs = GF.clamp(28 * S, 20, 40);
  c.font = 'bold ' + titleFs + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'top';
  c.fillStyle = '#FFD700';
  c.fillText(GF.t('title'), W / 2, H * 0.14);

  var lines = [GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip')];
  var lh = GF.clamp(22 * S, 16, 28);
  var startY = H * 0.32;
  c.font = (15 * S | 0) + 'px sans-serif';
  c.fillStyle = '#cbd';
  for (var i = 0; i < lines.length; i++) c.fillText(lines[i], W / 2, startY + i * lh);

  var btnW = GF.clamp(200 * S, 140, 280), btnH = GF.clamp(48 * S, 36, 60);
  var btnX = W / 2 - btnW / 2, btnY = startY + lines.length * lh + 26 * S;
  GF.rr(c, btnX, btnY, btnW, btnH, btnH / 2);
  c.fillStyle = '#26c6da'; c.fill();
  c.font = 'bold ' + (16 * S | 0) + 'px sans-serif';
  c.fillStyle = '#06222a'; c.textBaseline = 'middle';
  c.fillText(GF.t('close'), W / 2, btnY + btnH / 2);
}

function drawEndPanel() {
  var c = GF.ctx;
  var W = GF.W, H = GF.H, S = GF.S;
  c.fillStyle = 'rgba(8,8,18,0.92)';
  c.fillRect(0, 0, W, H);

  var titleFs = GF.clamp(40 * S, 24, 60);
  c.font = 'bold ' + titleFs + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'top';
  var win = (gs === 'WON');
  c.fillStyle = win ? '#2ecc71' : '#e74c3c';
  c.shadowColor = win ? 'rgba(46,204,113,0.45)' : 'rgba(231,76,60,0.45)';
  c.shadowBlur = 24 * S;
  c.fillText(win ? GF.t('won') : GF.t('lost'), W / 2, H * 0.16);
  c.shadowBlur = 0;

  c.font = (18 * S | 0) + 'px sans-serif';
  c.fillStyle = '#cbd';
  var sub = win
    ? GF.t('won_sub').replace('{n}', String(Math.max(0, RUNWAY_DAYS - day + 1)))
    : GF.t('lost_sub').replace('{n}', wishlists.toLocaleString('en-US'));
  c.fillText(sub, W / 2, H * 0.16 + titleFs + 12 * S);

  c.font = 'bold ' + (22 * S | 0) + 'px sans-serif';
  c.fillStyle = '#FFD700';
  c.fillText(GF.t('summary').replace('{n}', wishlists.toLocaleString('en-US')), W / 2, H * 0.42);

  var btnW = GF.clamp(240 * S, 160, 320), btnH = GF.clamp(54 * S, 40, 66);
  var btnX = W / 2 - btnW / 2, btnY = H * 0.55;
  GF.rr(c, btnX, btnY, btnW, btnH, btnH / 2);
  var grad = c.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
  c.fillStyle = grad; c.fill();
  c.font = 'bold ' + (16 * S | 0) + 'px sans-serif';
  c.fillStyle = '#fff'; c.textBaseline = 'middle';
  c.fillText(GF.t('retry'), W / 2, btnY + btnH / 2);

  endHit = { x: btnX, y: btnY, w: btnW, h: btnH };
}

// ── UPDATE (turn-based, no per-tick logic) ──────────────────────────────
function update(dt) { /* no per-frame physics */ }

// ── SCREENSHOT HOOK ──────────────────────────────────────────────────────
window._jumpLevel = function(n) {
  n = n || 1;
  startGame();
  var seq = [actDevlog, actMeme, actDevlog, actPress, actDevlog, actRest,
             actTrailer, actDevlog, actMeme, actDevlog, actPress, actRest,
             actDevlog, actDevlog, actMeme, actDevlog];
  if (n >= 99) {
    // exhaust the runway → reach GAMEOVER (or WON if lucky) for the runtime
    // gate's terminal-state check
    for (var k = 0; k < RUNWAY_DAYS + 5 && gs === 'PLAYING'; k++) {
      // mostly rest so we lose for sure (and don't hit win)
      actRest();
    }
    return;
  }
  // mid-game state for screenshots
  for (var i = 0; i < 70 && gs === 'PLAYING'; i++) seq[i % seq.length]();
  if (wishlists >= WIN_TARGET) {
    startGame();
    for (var j = 0; j < 40 && gs === 'PLAYING'; j++) seq[j % seq.length]();
  }
  lastFlash = 'viral'; lastFlashT = 1.0;
  GF.spawnParticles(GF.W * 0.5, GF.H * 0.18, '#FFD700', 30);
  GF.spawnFloat(GF.W * 0.5, GF.H * 0.22, '+1500', '#FFD700');
};

window._setupForScreenshot = function(level) { window._jumpLevel(level || 1); };

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: [],
  saveKey: 'wishlist_climb',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('wishlist_climb_best') || '0') || 0; } catch (e) {}
    gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

GF.exposeState(function() {
  return { gs: gs, score: wishlists, day: day, morale: morale, target: WIN_TARGET, runway: RUNWAY_DAYS };
});

})();
</script>
