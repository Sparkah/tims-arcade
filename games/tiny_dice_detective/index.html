// ── SCENE TEMPLATES — vignette + 2 check options ─────────────────────────
// Each option: { label, stat, dc_offset }
var SCENES = [
  { v: 'v0',  opts: [ { label: 'c_decode',  stat: 'mind',  dc_off: 0 }, { label: 'c_press',  stat: 'charm', dc_off: 1 } ] },
  { v: 'v1',  opts: [ { label: 'c_pick',    stat: 'mind',  dc_off: 1 }, { label: 'c_shoulder',stat: 'brawn', dc_off: 0 } ] },
  { v: 'v2',  opts: [ { label: 'c_observe', stat: 'mind',  dc_off: 1 }, { label: 'c_press',  stat: 'charm', dc_off: 0 } ] },
  { v: 'v3',  opts: [ { label: 'c_search',  stat: 'mind',  dc_off: 0 }, { label: 'c_intimid',stat: 'brawn', dc_off: 1 } ] },
  { v: 'v4',  opts: [ { label: 'c_chat',    stat: 'charm', dc_off: 0 }, { label: 'c_charm_alt',stat: 'charm', dc_off: 1 } ] },
  { v: 'v5',  opts: [ { label: 'c_study',   stat: 'mind',  dc_off: 0 }, { label: 'c_press',  stat: 'charm', dc_off: 2 } ] },
  { v: 'v6',  opts: [ { label: 'c_intimid', stat: 'brawn', dc_off: 0 }, { label: 'c_charm_alt',stat: 'charm', dc_off: 1 } ] },
  { v: 'v7',  opts: [ { label: 'c_trace',   stat: 'mind',  dc_off: 1 }, { label: 'c_chat',   stat: 'charm', dc_off: 0 } ] },
  { v: 'v8',  opts: [ { label: 'c_read',    stat: 'mind',  dc_off: 0 }, { label: 'c_press',  stat: 'charm', dc_off: 2 } ] },
  { v: 'v9',  opts: [ { label: 'c_crack',   stat: 'mind',  dc_off: 1 }, { label: 'c_punch',  stat: 'brawn', dc_off: 2 } ] },
  { v: 'v10', opts: [ { label: 'c_climb',   stat: 'brawn', dc_off: 0 }, { label: 'c_observe',stat: 'mind',  dc_off: 1 } ] },
  { v: 'v11', opts: [ { label: 'c_listen',  stat: 'mind',  dc_off: 1 }, { label: 'c_decode', stat: 'mind',  dc_off: 0 } ] },
];

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';        // MENU | PLAYING | ROLLING | RESULT | ALLOC | GAMEOVER | WON
var currentScene = 0;
var fails = 0;
var clues = 0;
var stats = { mind: STAT_START, charm: STAT_START, brawn: STAT_START };
var caseSeed = 0;        // daily seed-derived
var sceneList = [];      // 6 scene indexes for this case
var lastRoll = { d1: 0, d2: 0, total: 0, stat: '', stat_val: 0, dc: 0, pass: false, optIdx: -1 };
var pickedOption = -1;
var rollAnimT = 0;       // 0..1
var resultMsg = '';
var resultMsgRu = '';
var allocLeft = 0;
var best = 99;           // lowest fails on win; 99 = no win yet
var tutOpen = false;
var tutSeen = false;

// Click target rects (refreshed each draw)
var cardRects = [];      // [{x,y,w,h,idx}] for scene-check cards
var statRects = [];      // [{x,y,w,h,key}] for ALLOC stat buttons
var continueRect = null;
var helpRect = null;

// ── SEED + RNG ───────────────────────────────────────────────────────────
function daySeed() {
  var d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}
// Mulberry32 — small deterministic PRNG
function rngFor(seed) {
  var s = seed >>> 0;
  return function() {
    s |= 0; s = (s + 0x6D2B79F5) | 0;
    var t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Pick 6 distinct scene indices deterministically from seed
function buildCase(seed) {
  var r = rngFor(seed);
  var pool = SCENES.map(function(_, i) { return i; });
  // Fisher-Yates with seeded RNG
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(r() * (i + 1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  return pool.slice(0, MAX_SCENES);
}

// ── LIFECYCLE ────────────────────────────────────────────────────────────
function startGame() {
  caseSeed = daySeed();
  sceneList = buildCase(caseSeed);
  currentScene = 0;
  fails = 0;
  clues = 0;
  stats = { mind: STAT_START, charm: STAT_START, brawn: STAT_START };
  pickedOption = -1;
  rollAnimT = 0;
  resultMsg = '';
  resultMsgRu = '';
  gs = 'PLAYING';
  tutOpen = false;
  if (typeof GF.saveRun === 'function') GF.saveRun();
  if (typeof GF.gameStarted === 'function') GF.gameStarted();
}

function gameOver() {
  gs = 'GAMEOVER';
  if (typeof GF.saveRun === 'function') GF.saveRun();
  if (typeof GF.gameEnded === 'function') GF.gameEnded();
}

function gameWon() {
  if (fails < best) {
    best = fails;
    try { localStorage.setItem('tiny_dice_detective_best', best); } catch (e) {}
  }
  gs = 'WON';
  if (typeof GF.saveRun === 'function') GF.saveRun();
  if (typeof GF.gameEnded === 'function') GF.gameEnded();
}

// ── DICE / CHECK RESOLUTION ──────────────────────────────────────────────
function rollDice() {
  return 1 + Math.floor(Math.random() * 6);
}
function sceneDC(sceneIdx) {
  // DC ramps with scene number (currentScene 0..5) plus per-option offset
  return DC_BASE + Math.min(currentScene, DC_RANGE);
}
function pickCheck(optIdx) {
  if (gs !== 'PLAYING') return;
  var sceneTpl = SCENES[sceneList[currentScene]];
  if (!sceneTpl) return;
  var opt = sceneTpl.opts[optIdx];
  if (!opt) return;
  pickedOption = optIdx;
  rollAnimT = 0;
  lastRoll.dc = sceneDC(currentScene) + opt.dc_off;
  lastRoll.stat = opt.stat;
  lastRoll.stat_val = stats[opt.stat];
  lastRoll.optIdx = optIdx;
  gs = 'ROLLING';
}
function finishRoll() {
  var d1 = rollDice();
  var d2 = rollDice();
  lastRoll.d1 = d1;
  lastRoll.d2 = d2;
  lastRoll.total = d1 + d2 + lastRoll.stat_val;
  lastRoll.pass = lastRoll.total >= lastRoll.dc;
  if (lastRoll.pass) {
    clues += CLUE_REWARD;
    resultMsg = 'CLUE FOUND';
    resultMsgRu = 'УЛИКА';
    GF.spawnFloat(GF.cx, GF.cy - 80 * GF.S, '+1 ' + GF.t('clues_label'), '#9be58e');
  } else {
    fails += 1;
    resultMsg = 'DEAD END';
    resultMsgRu = 'ТУПИК';
    GF.setShake(0.6);
    GF.spawnFloat(GF.cx, GF.cy - 80 * GF.S, GF.t('fail_msg'), '#ef6f6f');
  }
  gs = 'RESULT';
  if (typeof GF.saveRun === 'function') GF.saveRun();
}
function advanceFromResult() {
  if (fails >= MAX_FAILS) { gameOver(); return; }
  currentScene += 1;
  if (currentScene >= MAX_SCENES) { gameWon(); return; }
  // Open ALLOC phase
  allocLeft = POINTS_PER_SCENE;
  gs = 'ALLOC';
  if (typeof GF.saveRun === 'function') GF.saveRun();
}
function allocPoint(key) {
  if (gs !== 'ALLOC' || allocLeft <= 0) return;
  if (stats[key] >= STAT_MAX) return;
  stats[key] += 1;
  allocLeft -= 1;
  if (allocLeft <= 0) {
    gs = 'PLAYING';
    pickedOption = -1;
    if (typeof GF.saveRun === 'function') GF.saveRun();
  }
}

// ── SCREENSHOT / GATE HELPERS ────────────────────────────────────────────
// Drive into mid-PLAYING state. For screenshots, set scene 3 and pre-populate
// some clues / one fail for visual richness.
window._setupForScreenshot = function() {
  caseSeed = daySeed();
  sceneList = buildCase(caseSeed);
  currentScene = 2;     // scene 3 of 6
  fails = 1;
  clues = 2;
  stats = { mind: 3, charm: 2, brawn: 2 };
  pickedOption = -1;
  rollAnimT = 0;
  gs = 'PLAYING';
};
// Gate uses _jumpLevel(1) for PLAYING and _jumpLevel(99) for terminal.
window._jumpLevel = function(n) {
  if (n == null || n === 1) {
    startGame();
    return;
  }
  if (n >= 99) {
    // Drive to GAMEOVER deterministically for the gate
    caseSeed = daySeed();
    sceneList = buildCase(caseSeed);
    currentScene = 4;
    fails = 3;
    clues = 1;
    gameOver();
    return;
  }
  startGame();
  currentScene = Math.min(n - 1, MAX_SCENES - 1);
};

// ── INPUT ────────────────────────────────────────────────────────────────
function hit(rect, x, y) {
  return rect && x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
}
function onPress(x, y) {
  // Tutorial overlay first
  if (tutOpen) { tutOpen = false; return; }
  // Help (?) button always wins
  if (hit(helpRect, x, y)) { tutOpen = true; return; }
  if (gs === 'PLAYING') {
    for (var i = 0; i < cardRects.length; i++) {
      if (hit(cardRects[i], x, y)) { pickCheck(cardRects[i].idx); return; }
    }
    return;
  }
  if (gs === 'RESULT') {
    if (hit(continueRect, x, y)) { advanceFromResult(); return; }
    // Also tap-anywhere advances
    advanceFromResult();
    return;
  }
  if (gs === 'ALLOC') {
    for (var j = 0; j < statRects.length; j++) {
      if (hit(statRects[j], x, y)) { allocPoint(statRects[j].key); return; }
    }
    return;
  }
}
// Wire DOM click directly — the gf-lib button buttons[] are used by drawOverlay
// for MENU/GAMEOVER; we add a second listener for PLAYING/ALLOC/RESULT regions.
document.addEventListener('click', function(e) {
  // GF.canvas click already fires; this captures the same event safely.
  onPress(e.clientX, e.clientY);
});
document.addEventListener('touchstart', function(e) {
  if (!e.changedTouches || !e.changedTouches.length) return;
  var t = e.changedTouches[0];
  onPress(t.clientX, t.clientY);
}, { passive: true });

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (gs === 'ROLLING') {
    rollAnimT += dt * 1000;
    if (rollAnimT >= ROLL_ANIM_MS) finishRoll();
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx, cy = GF.cy;

  // Noir background — desaturated film-grain feel
  var bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0e1019');
  bg.addColorStop(1, '#070811');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  // Subtle vignette
  var grd = ctx.createRadialGradient(cx, cy, Math.min(W, H) * 0.3, cx, cy, Math.max(W, H) * 0.75);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  if (gs === 'PLAYING' || gs === 'ROLLING' || gs === 'RESULT' || gs === 'ALLOC') {
    drawHUD(ctx);
    drawScene(ctx);
    if (gs === 'PLAYING') drawCards(ctx);
    if (gs === 'ROLLING') drawRolling(ctx);
    if (gs === 'RESULT')  drawResult(ctx);
    if (gs === 'ALLOC')   drawAlloc(ctx);
    drawHelpButton(ctx);
  }

  if (gs === 'MENU') {
    drawMenu(ctx);
  }
  if (gs === 'GAMEOVER') {
    var sub = GF.t('clues_label') + ': ' + clues + '   ' + GF.t('scene_label') + ' ' + (currentScene + 1) + '/' + MAX_SCENES;
    GF.drawOverlay({
      title: GF.t('gameover'),
      sub: sub,
      btnText: GF.t('retry'),
      btnFn: startGame,
      bestText: best < 99 ? GF.t('best') + ': ' + best + ' ' + GF.t('fails_label').toLowerCase() : null,
    });
  }
  if (gs === 'WON') {
    var subw = GF.t('clues_label') + ': ' + clues + '   ' + GF.t('fails_label') + ': ' + fails + '/' + MAX_FAILS;
    GF.drawOverlay({
      title: GF.t('won'),
      sub: subw,
      btnText: GF.t('retry'),
      btnFn: startGame,
      bestText: best < 99 ? GF.t('best') + ': ' + best + ' ' + GF.t('fails_label').toLowerCase() : null,
    });
  }

  if (tutOpen && gs !== 'MENU') drawTutorialOverlay(ctx);
}

function drawMenu(ctx) {
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx, cy = GF.cy;
  // Background already drawn
  // Title
  var titleFs = GF.clamp(40 * S, 24, 60);
  ctx.shadowColor = 'rgba(255, 196, 80, 0.35)';
  ctx.shadowBlur = 30 * S;
  ctx.fillStyle = '#f5e6c8';
  ctx.font = 'bold ' + titleFs + 'px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t('title'), cx, cy - 180 * S);
  ctx.shadowBlur = 0;

  // Sub
  var subFs = GF.clamp(16 * S, 12, 22);
  ctx.fillStyle = '#a8a8b8';
  ctx.font = 'italic ' + subFs + 'px Georgia, serif';
  ctx.fillText(GF.t('sub'), cx, cy - 145 * S);

  // Tutorial copy block
  var tFs = GF.clamp(14 * S, 11, 18);
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  ctx.font = tFs + 'px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#cfd2dc';
  var lineH = tFs + 6 * S;
  var startY = cy - 100 * S;
  for (var i = 0; i < lines.length; i++) {
    var txt = lines[i];
    // wrap if too long
    wrapText(ctx, txt, cx, startY + i * (lineH + 4), W * 0.86, lineH);
  }

  // PLAY button — uses GF.drawOverlay's button infra by re-using helper
  var wide = W / H > 1.15;
  var btnW = GF.clamp(280 * S, 200, 360), btnH = GF.clamp(58 * S, 44, 70);
  if (wide) { btnW = btnW * 1.4; btnH = btnH * 1.35; }
  var btnX = cx - btnW / 2;
  // Tutorial ends at: startY + 5 * (lineH + 4) where startY = cy - 100*S
  var _tutBlockEnd = (cy - 100 * S) + 5 * ((GF.clamp(14 * S, 11, 18) + 6 * S) + 4);
  var btnY = wide
    ? Math.max(_tutBlockEnd + btnH / 2 + 16 * S, H * 0.58)
    : cy + 130 * S;
  // Hit-rect at stable (unpulsed) position
  _menuPlayRect = { x: btnX, y: btnY, w: btnW, h: btnH };
  var t_td = performance.now() / 1000;
  var pulse = wide ? (1 + 0.05 * Math.sin(t_td * 2.2)) : 1;
  var dW = btnW * pulse, dH = btnH * pulse;
  var dX = cx - dW / 2, dY = btnY - (dH - btnH) / 2;
  var g = ctx.createLinearGradient(dX, dY, dX, dY + dH);
  g.addColorStop(0, '#c79e5a'); g.addColorStop(1, '#8a6a32');
  if (wide) { ctx.shadowColor = 'rgba(199,158,90,0.55)'; ctx.shadowBlur = 16 + 10 * Math.sin(t_td * 2.2); }
  GF.rr(ctx, dX, dY, dW, dH, dH / 2);
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2 * S; ctx.stroke();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = 'bold ' + GF.clamp(wide ? 24 * S : 18 * S, wide ? 18 : 14, wide ? 32 : 22) + 'px Inter, sans-serif';
  ctx.fillStyle = '#fffaf0';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), cx, dY + dH / 2);
  ctx.textBaseline = 'alphabetic';

  if (best < 99) {
    ctx.font = GF.clamp(13 * S, 10, 16) + 'px Inter, sans-serif';
    ctx.fillStyle = '#6f7080';
    ctx.fillText(GF.t('best') + ': ' + best + ' ' + GF.t('fails_label').toLowerCase(), cx, btnY + btnH + 28 * S);
  }
}
var _menuPlayRect = null;

function wrapText(ctx, text, x, y, maxW, lineH) {
  if (!text) return;
  var words = String(text).split(/\s+/);
  var line = '';
  var yy = y;
  for (var i = 0; i < words.length; i++) {
    var probe = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && line) {
      ctx.fillText(line, x, yy);
      line = words[i];
      yy += lineH;
    } else {
      line = probe;
    }
  }
  if (line) ctx.fillText(line, x, yy);
}

function drawHUD(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  var pad = 14 * S;
  var fs = GF.clamp(15 * S, 11, 19);
  ctx.font = 'bold ' + fs + 'px Inter, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  // Scene counter
  ctx.fillStyle = '#cfd2dc';
  ctx.fillText(GF.t('scene_label') + ' ' + (currentScene + 1) + '/' + MAX_SCENES, pad, pad);
  // Clues
  ctx.fillStyle = '#9be58e';
  ctx.fillText(GF.t('clues_label') + ': ' + clues, pad, pad + fs + 6 * S);

  // Fails on right
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ef6f6f';
  ctx.fillText(GF.t('fails_label') + ': ' + fails + '/' + MAX_FAILS, W - pad, pad);

  // Stats below fails
  var sx = W - pad;
  var sy = pad + fs + 6 * S;
  ctx.font = fs + 'px Inter, sans-serif';
  ctx.fillStyle = '#cfd2dc';
  for (var i = 0; i < STATS.length; i++) {
    var k = STATS[i];
    var line = GF.t(k) + ' ' + stats[k];
    ctx.fillText(line, sx, sy + i * (fs + 4 * S));
  }
}

function drawHelpButton(ctx) {
  var S = GF.S;
  var size = GF.clamp(32 * S, 26, 42);
  var x = GF.W - size - 12 * S;
  var y = GF.H - size - 12 * S;
  ctx.fillStyle = 'rgba(40, 40, 60, 0.6)';
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.lineWidth = 1.5 * S;
  GF.rr(ctx, x, y, size, size, size * 0.25);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#cfd2dc';
  ctx.font = 'bold ' + (size * 0.55) + 'px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', x + size / 2, y + size / 2 + 1 * S);
  ctx.textBaseline = 'alphabetic';
  helpRect = { x: x, y: y, w: size, h: size };
}

function drawScene(ctx) {
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx;
  var sceneTpl = SCENES[sceneList[currentScene]] || SCENES[0];
  // Vignette panel
  var panelY = GF.clamp(86 * S, 70, 110);
  var panelH = GF.clamp(110 * S, 90, 150);
  var panelX = W * 0.06;
  var panelW = W * 0.88;
  ctx.fillStyle = 'rgba(20, 22, 32, 0.85)';
  ctx.strokeStyle = 'rgba(199, 158, 90, 0.5)';
  ctx.lineWidth = 1.5 * S;
  GF.rr(ctx, panelX, panelY, panelW, panelH, 10 * S);
  ctx.fill(); ctx.stroke();
  // Vignette text
  var fs = GF.clamp(19 * S, 13, 26);
  ctx.font = 'italic ' + fs + 'px Georgia, serif';
  ctx.fillStyle = '#f5e6c8';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  wrapTextCentered(ctx, GF.t(sceneTpl.v), cx, panelY + panelH / 2, panelW - 30 * S, fs + 8 * S);
  ctx.textBaseline = 'alphabetic';
}

function wrapTextCentered(ctx, text, cx, cy, maxW, lineH) {
  if (!text) return;
  var words = String(text).split(/\s+/);
  var lines = [];
  var line = '';
  for (var i = 0; i < words.length; i++) {
    var probe = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && line) {
      lines.push(line); line = words[i];
    } else { line = probe; }
  }
  if (line) lines.push(line);
  var startY = cy - ((lines.length - 1) * lineH) / 2;
  for (var j = 0; j < lines.length; j++) ctx.fillText(lines[j], cx, startY + j * lineH);
}

function drawCards(ctx) {
  cardRects = [];
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx;
  var sceneTpl = SCENES[sceneList[currentScene]] || SCENES[0];
  var dcBase = sceneDC(currentScene);
  // Two cards stacked vertically on narrow screens, side-by-side on wide
  var stacked = W < 720 * (S < 1 ? 1 : S);
  // Always side-by-side if width allows
  stacked = W < 640;
  var cardW, cardH, gap;
  if (stacked) {
    cardW = W * 0.82;
    cardH = GF.clamp(110 * S, 95, 150);
    gap = 16 * S;
  } else {
    cardW = GF.clamp(280 * S, 220, 360);
    cardH = GF.clamp(180 * S, 150, 220);
    gap = 28 * S;
  }
  var totalW = stacked ? cardW : (cardW * 2 + gap);
  var startX = (W - totalW) / 2;
  var startY = H * 0.5 + 10 * S;
  if (stacked) startY = H * 0.42;

  for (var i = 0; i < sceneTpl.opts.length; i++) {
    var opt = sceneTpl.opts[i];
    var dc = dcBase + opt.dc_off;
    var x, y;
    if (stacked) {
      x = startX;
      y = startY + i * (cardH + gap);
    } else {
      x = startX + i * (cardW + gap);
      y = startY;
    }
    drawCheckCard(ctx, x, y, cardW, cardH, opt, dc);
    cardRects.push({ x: x, y: y, w: cardW, h: cardH, idx: i });
  }
}

function drawCheckCard(ctx, x, y, w, h, opt, dc) {
  var S = GF.S;
  var g = ctx.createLinearGradient(x, y, x, y + h);
  g.addColorStop(0, '#1d2030');
  g.addColorStop(1, '#10121b');
  ctx.fillStyle = g;
  ctx.strokeStyle = 'rgba(199, 158, 90, 0.55)';
  ctx.lineWidth = 2 * S;
  GF.rr(ctx, x, y, w, h, 12 * S);
  ctx.fill(); ctx.stroke();

  // Label
  var fs = GF.clamp(17 * S, 12, 22);
  ctx.font = 'bold ' + fs + 'px Inter, sans-serif';
  ctx.fillStyle = '#f5e6c8';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  wrapTextTop(ctx, GF.t(opt.label), x + w / 2, y + 14 * S, w - 20 * S, fs + 6 * S);

  // Stat + DC
  var sfs = GF.clamp(14 * S, 11, 18);
  ctx.font = sfs + 'px Inter, sans-serif';
  ctx.fillStyle = '#9bb2c8';
  var statTxt = GF.t(opt.stat) + ' (' + stats[opt.stat] + ')';
  ctx.fillText(statTxt, x + w / 2, y + h - 50 * S);
  ctx.fillStyle = '#c79e5a';
  ctx.font = 'bold ' + sfs + 'px Inter, sans-serif';
  ctx.fillText('2d6 +' + stats[opt.stat] + '  vs  ' + GF.t('dc_label') + ' ' + dc, x + w / 2, y + h - 26 * S);
  ctx.textBaseline = 'alphabetic';
}

function wrapTextTop(ctx, text, x, y, maxW, lineH) {
  if (!text) return;
  var words = String(text).split(/\s+/);
  var line = '';
  var yy = y;
  for (var i = 0; i < words.length; i++) {
    var probe = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && line) {
      ctx.fillText(line, x, yy);
      line = words[i];
      yy += lineH;
    } else { line = probe; }
  }
  if (line) ctx.fillText(line, x, yy);
}

function drawRolling(ctx) {
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx, cy = GF.cy;
  // Spinning dice — render two cubes with random faces during animation
  var dieSize = GF.clamp(72 * S, 50, 100);
  var gap = 30 * S;
  var totalW = dieSize * 2 + gap;
  var startX = cx - totalW / 2;
  var yy = cy + 10 * S;
  // Anim flicker face every 90ms
  var phase = Math.floor(rollAnimT / 90);
  var f1 = 1 + (phase % 6);
  var f2 = 1 + ((phase + 3) % 6);
  drawDie(ctx, startX, yy, dieSize, f1);
  drawDie(ctx, startX + dieSize + gap, yy, dieSize, f2);

  var fs = GF.clamp(18 * S, 12, 24);
  ctx.font = 'bold ' + fs + 'px Inter, sans-serif';
  ctx.fillStyle = '#c79e5a';
  ctx.textAlign = 'center';
  ctx.fillText(GF.t('roll_label') + '…  +' + lastRoll.stat_val + ' (' + GF.t(lastRoll.stat) + ')  ' + GF.t('dc_label') + ' ' + lastRoll.dc,
               cx, yy + dieSize + 30 * S);
}

function drawDie(ctx, x, y, size, face) {
  var S = GF.S;
  // body
  ctx.fillStyle = '#f5e6c8';
  ctx.strokeStyle = '#3a2f1c';
  ctx.lineWidth = 2 * S;
  GF.rr(ctx, x, y, size, size, size * 0.18);
  ctx.fill(); ctx.stroke();
  // pips
  ctx.fillStyle = '#1a1208';
  var r = size * 0.08;
  var pad = size * 0.24;
  var positions = {
    1: [[0.5, 0.5]],
    2: [[0.25, 0.25], [0.75, 0.75]],
    3: [[0.25, 0.25], [0.5, 0.5], [0.75, 0.75]],
    4: [[0.25, 0.25], [0.75, 0.25], [0.25, 0.75], [0.75, 0.75]],
    5: [[0.25, 0.25], [0.75, 0.25], [0.5, 0.5], [0.25, 0.75], [0.75, 0.75]],
    6: [[0.25, 0.25], [0.75, 0.25], [0.25, 0.5], [0.75, 0.5], [0.25, 0.75], [0.75, 0.75]],
  };
  var pips = positions[face] || positions[1];
  for (var i = 0; i < pips.length; i++) {
    var p = pips[i];
    ctx.beginPath();
    ctx.arc(x + p[0] * size, y + p[1] * size, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawResult(ctx) {
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx, cy = GF.cy;
  // Show dice with actual roll
  var dieSize = GF.clamp(72 * S, 50, 100);
  var gap = 30 * S;
  var totalW = dieSize * 2 + gap;
  var startX = cx - totalW / 2;
  var yy = cy + 10 * S;
  drawDie(ctx, startX, yy, dieSize, lastRoll.d1);
  drawDie(ctx, startX + dieSize + gap, yy, dieSize, lastRoll.d2);

  var fs = GF.clamp(20 * S, 13, 26);
  ctx.font = 'bold ' + fs + 'px Inter, sans-serif';
  ctx.fillStyle = lastRoll.pass ? '#9be58e' : '#ef6f6f';
  ctx.textAlign = 'center';
  ctx.fillText((lastRoll.d1 + lastRoll.d2) + ' + ' + lastRoll.stat_val + ' = ' + lastRoll.total +
               '  vs  ' + GF.t('dc_label') + ' ' + lastRoll.dc,
               cx, yy + dieSize + 30 * S);
  var msgFs = GF.clamp(28 * S, 18, 38);
  ctx.font = 'bold ' + msgFs + 'px Georgia, serif';
  ctx.fillStyle = lastRoll.pass ? '#9be58e' : '#ef6f6f';
  ctx.fillText(lastRoll.pass ? GF.t('pass_msg') : GF.t('fail_msg'), cx, yy + dieSize + 80 * S);

  // Continue button
  var btnW = GF.clamp(220 * S, 160, 280);
  var btnH = GF.clamp(48 * S, 36, 58);
  var bx = cx - btnW / 2;
  var by = yy + dieSize + 110 * S;
  var g = ctx.createLinearGradient(bx, by, bx, by + btnH);
  g.addColorStop(0, '#c79e5a'); g.addColorStop(1, '#8a6a32');
  GF.rr(ctx, bx, by, btnW, btnH, btnH / 2);
  ctx.fillStyle = g; ctx.fill();
  ctx.font = 'bold ' + GF.clamp(16 * S, 12, 20) + 'px Inter, sans-serif';
  ctx.fillStyle = '#fffaf0';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('continue_btn'), cx, by + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  continueRect = { x: bx, y: by, w: btnW, h: btnH };
}

function drawAlloc(ctx) {
  statRects = [];
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx, cy = GF.cy;
  // Title
  var titleFs = GF.clamp(22 * S, 14, 30);
  ctx.font = 'bold ' + titleFs + 'px Georgia, serif';
  ctx.fillStyle = '#f5e6c8';
  ctx.textAlign = 'center';
  ctx.fillText(GF.t('alloc_heading'), cx, cy - 60 * S);
  var subFs = GF.clamp(14 * S, 11, 18);
  ctx.font = subFs + 'px Inter, sans-serif';
  ctx.fillStyle = '#cfd2dc';
  var subTpl = GF.t('alloc_sub').replace('{n}', allocLeft);
  ctx.fillText(subTpl, cx, cy - 28 * S);

  // 3 stat buttons in a row
  var btnW = GF.clamp(150 * S, 100, 200);
  var btnH = GF.clamp(90 * S, 70, 120);
  var gap = 14 * S;
  var totalW = btnW * 3 + gap * 2;
  var startX = cx - totalW / 2;
  var yy = cy + 10 * S;
  for (var i = 0; i < STATS.length; i++) {
    var k = STATS[i];
    var x = startX + i * (btnW + gap);
    var capped = stats[k] >= STAT_MAX;
    var g = ctx.createLinearGradient(x, yy, x, yy + btnH);
    if (capped) { g.addColorStop(0, '#2a2a35'); g.addColorStop(1, '#1a1a22'); }
    else { g.addColorStop(0, '#2d3a52'); g.addColorStop(1, '#1a2235'); }
    ctx.fillStyle = g;
    ctx.strokeStyle = capped ? 'rgba(100,100,110,0.5)' : 'rgba(199, 158, 90, 0.7)';
    ctx.lineWidth = 2 * S;
    GF.rr(ctx, x, yy, btnW, btnH, 10 * S);
    ctx.fill(); ctx.stroke();
    var fs = GF.clamp(16 * S, 12, 20);
    ctx.font = 'bold ' + fs + 'px Inter, sans-serif';
    ctx.fillStyle = capped ? '#666' : '#f5e6c8';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(GF.t(k), x + btnW / 2, yy + btnH * 0.35);
    var bfs = GF.clamp(28 * S, 18, 38);
    ctx.font = 'bold ' + bfs + 'px Georgia, serif';
    ctx.fillStyle = capped ? '#666' : '#c79e5a';
    ctx.fillText(stats[k] + (capped ? '' : '  +'), x + btnW / 2, yy + btnH * 0.72);
    ctx.textBaseline = 'alphabetic';
    statRects.push({ x: x, y: yy, w: btnW, h: btnH, key: k });
  }
}

function drawTutorialOverlay(ctx) {
  var W = GF.W, H = GF.H, S = GF.S, cx = GF.cx, cy = GF.cy;
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);
  var fs = GF.clamp(15 * S, 11, 19);
  ctx.font = fs + 'px Inter, sans-serif';
  ctx.fillStyle = '#f5e6c8';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  var lineH = fs + 8 * S;
  var startY = cy - (lines.length * lineH) / 2;
  for (var i = 0; i < lines.length; i++) {
    wrapTextCentered(ctx, lines[i], cx, startY + i * (lineH + 6), W * 0.86, lineH);
  }
  ctx.font = GF.clamp(13 * S, 10, 16) + 'px Inter, sans-serif';
  ctx.fillStyle = '#9aa0b0';
  ctx.fillText('— ' + GF.t('close') + ' —', cx, startY + lines.length * (lineH + 6) + 12 * S);
  ctx.textBaseline = 'alphabetic';
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: [],
  saveKey: 'tiny_dice_detective',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('tiny_dice_detective_best') || '99') || 99; } catch (e) {}
    try { tutSeen = !!localStorage.getItem('tiny_dice_detective_seen_tutorial'); } catch (e) {}
    GF.persist('tiny_dice_detective_run_v1',
      function() {
        return {
          gs: gs,
          currentScene: currentScene,
          fails: fails,
          clues: clues,
          stats: stats,
          caseSeed: caseSeed,
          sceneList: sceneList,
          allocLeft: allocLeft,
          lastRoll: lastRoll,
          pickedOption: pickedOption,
        };
      },
      function(s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        currentScene = s.currentScene || 0;
        fails = s.fails || 0;
        clues = s.clues || 0;
        if (s.stats) stats = s.stats;
        caseSeed = s.caseSeed || 0;
        if (Array.isArray(s.sceneList) && s.sceneList.length) sceneList = s.sceneList;
        allocLeft = s.allocLeft || 0;
        if (s.lastRoll) lastRoll = s.lastRoll;
        pickedOption = (typeof s.pickedOption === 'number') ? s.pickedOption : -1;
        // ROLLING is mid-anim, snap to PLAYING
        if (gs === 'ROLLING') gs = 'PLAYING';
      }
    );
    // Hook MENU click — clicking on PLAY button or anywhere on the canvas
    // (after a short cooldown so the boot-time click doesn't dismiss the
    // menu instantly) starts the game.
    var _menuArmedAt = Date.now() + 200;
    function _tryMenuStart(x, y) {
      if (gs !== 'MENU') return;
      if (Date.now() < _menuArmedAt) return;
      // Exact PLAY rect always works
      if (_menuPlayRect &&
          x >= _menuPlayRect.x && x <= _menuPlayRect.x + _menuPlayRect.w &&
          y >= _menuPlayRect.y && y <= _menuPlayRect.y + _menuPlayRect.h) {
        startGame();
        return;
      }
      // Outside PLAY rect: tap-anywhere on the lower 60% of the canvas
      // starts the game (covers the take_screenshots.js click at canvas
      // center even when PLAY is rendered lower).
      if (y >= GF.cy - GF.H * 0.05) {
        startGame();
      }
    }
    GF.canvas.addEventListener('click', function(e) { _tryMenuStart(e.clientX, e.clientY); });
    GF.canvas.addEventListener('touchstart', function(e) {
      if (!e.changedTouches || !e.changedTouches.length) return;
      var t = e.changedTouches[0];
      _tryMenuStart(t.clientX, t.clientY);
    }, { passive: true });
  },
  onUpdate: update,
  onDraw: draw,
});

// Expose state for the runtime gate
GF.exposeState(function() {
  return {
    gs: gs,
    currentScene: currentScene,
    fails: fails,
    clues: clues,
    mind: stats.mind,
    charm: stats.charm,
    brawn: stats.brawn,
    allocLeft: allocLeft,
  };
});

})();
</script>
