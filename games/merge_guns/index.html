function offerResurrect() {
    // Called when hp hits 0 — offer one rewarded ad to continue
    tel('wall_breached', { wave: wave });
    if (resurrectOffered || _adInProgress) { _finishRun(); return; }
    resurrectOffered = true;
    STATE = 'resurrect'; // special overlay state
}

function _finishRun() {
    sfxGameOver();
    yadGameplayStop();
    computeResults();
    STATE = 'results';
    showInterstitialAd(null);
}

function acceptResurrect() {
    showRewardedAd(
        () => { // onRewarded
            hp = 1;
            // Bonus: add best_tier - 1 gun if space available
            const cell = emptyCell();
            if (cell && guns.length > 0) {
                const bestTier = Math.max(...guns.map(g => g.tier));
                const bonusTier = Math.max(0, bestTier - 1);
                guns.push({ col: cell.col, row: cell.row, tier: bonusTier, cd: 0 });
                spawnMergeParticles(cellRect(cell.col, cell.row).x + CW/2, cellRect(cell.col, cell.row).y + CH/2, TIERS[bonusTier].glow);
                spawnFloat(cellRect(cell.col, cell.row).x + CW/2, cellRect(cell.col, cell.row).y - 10, '⚡ ' + tierName(bonusTier) + '!', '#ffd700');
            }
            spawnFloat(W/2, H/2, t('resurrected'), '#ffd700');
            sfxWaveClear();
            STATE = 'play';
            yadGameplayStart();
        },
        (rewarded) => {
            if (!rewarded) _finishRun(); // ad skipped / no reward
        }
    );
}

// ── Particles / floats ────────────────────────────────────────────────────────
// Every particle spawn routes through addParticle so the global cap is enforced in
// ONE place — old helpers and new effects alike can never flood the array. Optional
// cosmetic fields a particle may carry: kind ('ring'|'spark'|'shard'|'smoke', else
// a plain dot), g (gravity), shrink (fade radius with life), glow (shadow colour),
// len/ang (streak geometry), growth (ring expansion). Combat never reads particles.
function addParticle(p) {
    if (particles.length >= PARTICLE_CAP) particles.shift(); // drop oldest, keep the fresher effect
    particles.push(p);
}
function spawnMergeParticles(x, y, color) {
    for (let i = 0; i < 18; i++) {
        const a = Math.random() * Math.PI * 2, s = 1.5 + Math.random() * 3;
        addParticle({ x, y, dx: Math.cos(a)*s, dy: Math.sin(a)*s, life: 35, maxLife: 35, color, r: 2 + Math.random()*2 });
    }
}
function spawnHitParticles(x, y, color) {
    for (let i = 0; i < 5; i++) {
        const a = Math.random() * Math.PI * 2;
        addParticle({ x, y, dx: Math.cos(a)*(1+Math.random()*2), dy: Math.sin(a)*(1+Math.random()*2), life: 18, maxLife: 18, color, r: 1.5 });
    }
}
function spawnFloat(x, y, text, color) { floats.push({ x, y, vy: -0.8, text, life: 60, color }); }

// Muzzle: a bright additive spark streak + a tiny smoke puff at the barrel tip,
// aimed along the shot. Allocation-light; the CALLER throttles how many per frame.
function spawnMuzzle(x, y, ang, tier, color) {
    addParticle({ x, y, dx: Math.cos(ang)*4.2, dy: Math.sin(ang)*4.2, life: 7, maxLife: 7,
                  color: '#fff7d0', r: 2 + tier*0.12, kind: 'spark', len: 9, ang, glow: color, shrink: 1 });
    const a2 = ang + (Math.random()-0.5)*0.8;
    addParticle({ x, y, dx: Math.cos(a2)*(1.4+Math.random()*1.6), dy: Math.sin(a2)*(1.4+Math.random()*1.6),
                  life: 10, maxLife: 10, color, r: 1.4, kind: 'smoke', shrink: 1 });
}
// Death burst: an expanding ring + colour-coded shards, scaled to the enemy. Shared
// by updateBullets AND fireUlt so Airstrike kills feel identical to gunfire kills.
function spawnDeathBurst(en) {
    const big = !!en.isBoss, n = big ? 30 : 9;
    addParticle({ x: en.x, y: en.y, dx: 0, dy: 0, life: big ? 26 : 16, maxLife: big ? 26 : 16,
                  color: en.glow, r: en.r, kind: 'ring', glow: en.glow, growth: big ? 3.4 : 2.6 });
    for (let k = 0; k < n; k++) {
        const a = Math.random()*Math.PI*2, s = 1.5 + Math.random()*(big ? 5 : 3);
        addParticle({ x: en.x, y: en.y, dx: Math.cos(a)*s, dy: Math.sin(a)*s - 0.5,
                      life: 18 + Math.random()*16, maxLife: 34, color: Math.random()<0.5 ? en.glow : en.color,
                      r: 1.5 + Math.random()*2, kind: 'shard', g: 0.12, shrink: 1 });
    }
}
// Merge shockwave: a single tier-coloured expanding ring at the merged cell.
function spawnMergeShock(x, y, color) {
    addParticle({ x, y, dx: 0, dy: 0, life: 18, maxLife: 18, color, r: 10, kind: 'ring', glow: color, growth: 2.6 });
}

// ── Input ─────────────────────────────────────────────────────────────────────
function getCanvasPos(e) {
    const r = canvas.getBoundingClientRect();
    const scaleX = W / r.width, scaleY = H / r.height;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (cx - r.left) * scaleX, y: (cy - r.top) * scaleY };
}

function handleClick(px, py) {
    if (_adInProgress) return;
    if (_gamePaused) {
        _gamePaused = false;
        _muted = _prePauseMuted;
        if (STATE === 'play' && waveActive) { try { yadGameplayStart(); } catch (e) {} }
        return;
    }
    if (STATE === 'menu') {
        // Daily Ops hub (top-left) — opens the habit hub (login claim + quests + idle).
        // Pass 2: was an inline login-claim; now the gateway to the whole daily loop.
        if (px >= DAILY_BTN.x && px <= DAILY_BTN.x + DAILY_BTN.w && py >= DAILY_BTN.y && py <= DAILY_BTN.y + DAILY_BTN.h) {
            try { ensureDailyQuests(); questProgressTick(); } catch (e) {} _dailyReturn = 'menu'; STATE = 'daily'; return;
        }
        // IAP buttons (Yandex only) — checked first so a top-row tap doesn't
        // fall through to the "any other click starts a game" handler.
        if (iapReady() && !ownsVIP) {
            const a = IAP_NOADS_BTN, b = IAP_VIP_BTN;
            if (!ownsNoAds && iapBuyable(PRODUCT_NOADS) && px >= a.x && px <= a.x + a.w && py >= a.y && py <= a.y + a.h) { buyIAP(PRODUCT_NOADS); return; }
            if (iapBuyable(PRODUCT_VIP) && px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) { buyIAP(PRODUCT_VIP); return; }
        }
        // Blueprint Lab button (top-right) — checked before the start-game fallthrough.
        if (px >= BP_BTN.x && px <= BP_BTN.x + BP_BTN.w && py >= BP_BTN.y && py <= BP_BTN.y + BP_BTN.h) {
            STATE = 'blueprints'; return;
        }
        // Arsenal button (top-left, below daily) — checked before the fallthrough.
        if (px >= MENU_ARS_BTN.x && px <= MENU_ARS_BTN.x + MENU_ARS_BTN.w && py >= MENU_ARS_BTN.y && py <= MENU_ARS_BTN.y + MENU_ARS_BTN.h) {
            openArsenalFrom('menu'); return;
        }
        // Fast-start button (only when unlocked; H/2+168..204)
        if (saveData.stats.maxWave >= FAST_START_WAVE &&
            px >= W/2 - 120 && px <= W/2 + 120 && py >= H/2 + 168 && py <= H/2 + 204) {
            showInterstitialAd(() => { initGameFastStart(); STATE = 'play'; });
            return;
        }
        // Crate button (position shifts based on fast-start unlock)
        const crateY = saveData.stats.maxWave >= FAST_START_WAVE ? H/2 + 212 : H/2 + 172;
        if (px >= W/2 - 130 && px <= W/2 + 130 && py >= crateY && py <= crateY + 36) {
            openMenuCrate(); return;
        }
        // A paused run RESUMES on any menu tap (no fresh initGame — Codex follow-up:
        // pausing to spend Salvage / check daily must not cost the run).
        if (_runPaused) { _runPaused = false; try { yadGameplayStart(); } catch (e) {} STATE = 'play'; return; }
        // Any other click = start normal game (show interstitial first)
        showInterstitialAd(() => { initGame(); STATE = 'play'; });
        return;
    }
    if (STATE === 'results')  { handleResultsClick(px, py); return; }
    if (STATE === 'upgrades') { handleUpgradesClick(px, py); return; }
    if (STATE === 'store')    { handleStoreClick(px, py); return; }
    if (STATE === 'blueprints') { handleBlueprintsClick(px, py); return; }
    if (STATE === 'arsenal')  { handleArsenalClick(px, py); return; }
    if (STATE === 'command')  { handleCommandClick(px, py); return; }
    if (STATE === 'daily')    { handleDailyClick(px, py); return; }
    if (STATE === 'resurrect') {
        // Buttons are drawn centered — watch ad or skip
        const bcy = H/2 + 80;
        if (px >= W/2 - 180 && px <= W/2 - 10 && py >= bcy && py <= bcy + 44) { acceptResurrect(); return; }
        if (px >= W/2 + 10  && px <= W/2 + 180 && py >= bcy && py <= bcy + 44) { _finishRun(); return; }
        return;
    }

    // Arsenal HUD pill — open the owned meta mid-run (combat freezes while the
    // 'arsenal' STATE is active). Only during real play (not mid-tutorial, so the
    // first-run player can't wander off the action-gated steps).
    if (STATE === 'play') {
        const ab = ARS_HUD_BTN;
        if (px >= ab.x && px <= ab.x + ab.w && py >= ab.y && py <= ab.y + ab.h) {
            openArsenalFrom('play'); return;
        }
        // MENU pill — PAUSE to the menu (freezes the run; daily/blueprints/IAP/Arsenal
        // reachable). The run is kept so the menu PLAY button RESUMES it.
        const pb = MENU_HUD_BTN;
        if (px >= pb.x && px <= pb.x + pb.w && py >= pb.y && py <= pb.y + pb.h) {
            try { yadGameplayStop(); } catch (e) {} _runPaused = true; STATE = 'menu'; return;
        }
    }

    // Mute button (W-38, 58, 28, 18)
    if (px >= W - 38 && px <= W - 10 && py >= 58 && py <= 76) { _muted = !_muted; return; }

    // Buy button
    const bx = GRID_X, by = 88, bw = COLS*(CW+4)-4, bh = 28;
    if (px >= bx && px <= bx+bw && py >= by && py <= by+bh) { buyGun(); return; }

    // Airstrike ultimate button (below the grid)
    if (px >= ULT_BTN.x && px <= ULT_BTN.x + ULT_BTN.w && py >= ULT_BTN.y && py <= ULT_BTN.y + ULT_BTN.h) {
        fireUlt(); return;
    }

    // Supply crate click
    if (crate && Math.hypot(px - crate.x, py - crate.y) < 26) { openCrate(); return; }

    // Start wave button
    if (!waveActive) {
        const wx2 = DIVIDER_X + 10, wy = H - 56, ww = LANE_W - 10, wh = 42;
        if (px >= wx2 && px <= wx2+ww && py >= wy && py <= wy+wh) {
            if (STATE === 'tutorial' && tutStep < 3) return;
            startWave(); return;
        }
    }

    // Grid click
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
            const r = cellRect(col, row);
            if (px >= r.x && px <= r.x+r.w && py >= r.y && py <= r.y+r.h) {
                if (selected) { tryMerge(col, row); }
                else if (gunAt(col, row)) { selected = { col, row }; }
                return;
            }
        }
    }
    selected = null;
}

canvas.addEventListener('click',     e => { const p = getCanvasPos(e); handleClick(p.x, p.y); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); const p = getCanvasPos(e); handleClick(p.x, p.y); }, { passive: false });

// Desktop hover (tooltips). Tracked in logical coords; ignored on touch.
let _hover = null;
canvas.addEventListener('mousemove', e => { const p = getCanvasPos(e); _hover = { x: p.x, y: p.y }; });
canvas.addEventListener('mouseleave', () => { _hover = null; });

// Pass 2: anchor the idle baseline when the player leaves (so a real away period
// accrues from here, and a future/back clock is corrected). Idempotent — pagehide
// and visibilitychange may both fire. Also flushes in-memory quest progress.
window.addEventListener('pagehide', function () { try { questProgressTick(); } catch (e) {} noteSeen(); });
document.addEventListener('visibilitychange', function () { if (document.hidden) { try { questProgressTick(); } catch (e) {} noteSeen(); } });

// ── Keyboard shortcuts (desktop-first — 96% of players) ──────────────────────
// Mirrors EXISTING button actions only — no new interaction model (merge stays
// pointer-driven). Ignored while an ad is in progress or the game is paused.
document.addEventListener('keydown', e => {
    if (_adInProgress || _gamePaused) return;
    const k = e.key;
    // Esc — universal "back / close overlay / to menu".
    if (k === 'Escape') {
        if (STATE === 'arsenal') { closeArsenal(); e.preventDefault(); return; }
        if (STATE === 'command') { STATE = 'arsenal'; e.preventDefault(); return; }
        if (STATE === 'daily') { STATE = (_dailyReturn === 'play') ? 'play' : 'menu'; e.preventDefault(); return; }
        if (STATE === 'store') { STATE = 'upgrades'; e.preventDefault(); return; }
        if (STATE === 'upgrades') { STATE = (_upgradesReturn === 'results' && runResults) ? 'results' : 'menu'; e.preventDefault(); return; }
        if (STATE === 'blueprints') { crateAnim = null; STATE = 'menu'; e.preventDefault(); return; }
        // From an active run, Esc is the in-run route to the MENU — essential for
        // autostart/platform builds (which skip the menu) so daily/IAP/blueprints
        // stay reachable (CLAUDE.md #9 / Build Hygiene #13). Combat freezes in menu.
        if (STATE === 'play') { yadGameplayStop(); _runPaused = true; STATE = 'menu'; e.preventDefault(); return; }
        return;
    }
    // M — mute toggle (works everywhere).
    if (k === 'm' || k === 'M') { _muted = !_muted; e.preventDefault(); return; }
    // A — open/close the Arsenal (the owned meta).
    if (k === 'a' || k === 'A') {
        if (STATE === 'play') { openArsenalFrom('play'); e.preventDefault(); return; }
        if (STATE === 'menu') { openArsenalFrom('menu'); e.preventDefault(); return; }
        if (STATE === 'arsenal') { closeArsenal(); e.preventDefault(); return; }
        if (STATE === 'command') { STATE = 'arsenal'; e.preventDefault(); return; }
        return;
    }
    // U — upgrades (cores tree), from menu or results.
    if (k === 'u' || k === 'U') {
        if (STATE === 'results') { _upgradesReturn = 'results'; STATE = 'upgrades'; e.preventDefault(); return; }
        if (STATE === 'menu') { _upgradesReturn = 'menu'; STATE = 'upgrades'; e.preventDefault(); return; }
        if (STATE === 'upgrades') { STATE = (_upgradesReturn === 'results' && runResults) ? 'results' : 'menu'; e.preventDefault(); return; }
        return;
    }
    // D — Daily Ops hub (login + quests + idle), from menu.
    if (k === 'd' || k === 'D') {
        if (STATE === 'menu') { try { ensureDailyQuests(); questProgressTick(); } catch (e2) {} _dailyReturn = 'menu'; STATE = 'daily'; e.preventDefault(); return; }
        if (STATE === 'daily') { STATE = (_dailyReturn === 'play') ? 'play' : 'menu'; e.preventDefault(); return; }
        return;
    }
    // Space / Enter — context action: start the next wave in play; start a run
    // from the menu / results (same as a click on PLAY / PLAY AGAIN).
    if (k === ' ' || k === 'Enter' || k === 'Spacebar') {
        if (STATE === 'play' && !waveActive) { startWave(); e.preventDefault(); return; }
        if (STATE === 'menu') { showInterstitialAd(() => { initGame(); STATE = 'play'; }); e.preventDefault(); return; }
        if (STATE === 'results') { initGame(); STATE = 'play'; e.preventDefault(); return; }
        if (STATE === 'resurrect') { _finishRun(); e.preventDefault(); return; } // skip = the non-RV recovery
        return;
    }
    // B — buy a gun (play only).
    if (k === 'b' || k === 'B') {
        if (STATE === 'play') { buyGun(); e.preventDefault(); return; }
        return;
    }
});

// Hover tooltip on the Arsenal screen — shows the full effect + cost for the
// track under the cursor (desktop affordance; mobile relies on the row text).
function drawArsenalHover() {
    if (!_hover) return;
    for (let i = 0; i < BASE_TIERS.length; i++) {
        const rr = arsenalRowRect(i);
        if (_hover.x < rr.x || _hover.x > rr.x + rr.w || _hover.y < rr.y || _hover.y > rr.y + rr.h) continue;
        const lv = arsLevel(i), maxed = lv >= ARS_MAX;
        const isEarly = i <= 1;
        const lines = [];
        lines.push(tierName(i) + '  ' + t('ars_level', lv, ARS_MAX));
        if (isEarly) lines.push(maxed ? t('ars_gold', lv) : t('ars_gold_next', lv + 1));
        else lines.push(maxed ? t('ars_dmg', lv * 2) : t('ars_dmg_next', (lv + 1) * 2));
        if (!maxed) lines.push(t('ars_cost', arsCost(i, lv)));
        // Tooltip box near the cursor, clamped to canvas
        ctx.font = '10px monospace';
        let tw = 0; lines.forEach(l => { tw = Math.max(tw, ctx.measureText(l).width); });
        const pad = 8, boxW = tw + pad * 2, boxH = lines.length * 14 + pad * 2;
        let bx = Math.min(W - boxW - 4, _hover.x + 12), by = Math.min(H - boxH - 4, _hover.y + 12);
        bx = Math.max(4, bx); by = Math.max(4, by);
        drawRR(bx, by, boxW, boxH, 6, '#06060c', '#e0a85a', 1.5);
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        lines.forEach((l, k) => {
            ctx.fillStyle = k === 0 ? '#f0c070' : '#bfc9d6';
            ctx.fillText(l, bx + pad, by + pad + k * 14);
        });
        return;
    }
}

const BRANCH_COLORS = { FIREPOWER:'#e74c3c', DEFENSE:'#3498db', ECONOMY:'#f1c40f' };

function handleUpgradesClick(px, py) {
    // BACK button — return to wherever Upgrades was opened from. Guards the
    // menu->U->Upgrades->Back path against a null-runResults results screen (Codex).
    if (px >= 12 && px <= 120 && py >= 12 && py <= 42) {

    }

// ── Gun firing ────────────────────────────────────────────────────────────────
function closestEnemy(gx, gy, range) {
    let best = null, bestDist = range;
    for (const en of enemies) {
        const d = Math.hypot(en.x - gx, en.y - gy);
        if (d < bestDist) { bestDist = d; best = en; }
    }
    return best;
}

function updateGuns() {
    const rateBoost = lastStandActive ? 0.5 : 1.0;
    for (const g of guns) {
        // Cosmetic recoil/flash/pop decay — MUST run before the cooldown
        // early-continue, otherwise guns on cooldown (most guns, most frames)
        // would freeze their kick mid-animation. Draw-only fields.
        if (g.recoil) { g.recoil *= 0.78; if (g.recoil < 0.02) g.recoil = 0; }
        if (g.flash) g.flash--;
        if (g.pop) { g.pop *= 0.82; if (g.pop < 0.02) g.pop = 0; }
        if (g.cd > 0) { g.cd -= (lastStandActive ? 2 : 1); continue; }
        const t = TIERS[g.tier];
        const r = cellRect(g.col, g.row);
        const gx = r.x + CW, gy = r.y + CH / 2;
        const target = closestEnemy(gx, gy, t.range);
        if (!target) continue;
        const dx = target.x - gx, dy = target.y - gy;
        const dist = Math.hypot(dx, dy) || 1;
        const isCrit = Math.random() < getCritChance();
        // Arsenal mastery: small, capped per-tier damage bonus (T0/T1 excluded —
        // they get a gold-on-kill perk instead, applied at the kill site).
        const dmg = (isCrit ? t.damage * 2 : t.damage) * arsDmgMult(g.tier);
        bullets.push({
            x: gx, y: gy,
            dx: (dx / dist) * t.bspeed, dy: (dy / dist) * t.bspeed,
            dmg, ftier: g.tier, color: isCrit ? '#fff' : t.glow, r: isCrit ? 5 : 3 + g.tier * 0.4,
        });
        g.cd = Math.round(t.rate * rateBoost);
        // Cosmetic only: persist aim (read by drawGun for barrel tracking + recoil
        // axis), kick the recoil, pulse the muzzle flash. Draw-only fields — they
        // never feed damage/cooldown/collision. Set for EVERY firing gun (free) so a
        // full board all visibly fire; only the heavier muzzle PARTICLES are throttled.
        g.aim = Math.atan2(dy, dx);
        g.recoil = 1;
        g.flash = isCrit ? 5 : 4;
        _sfxShootThisFrame++;
        if (_sfxShootThisFrame <= 3) sfxShoot(g.tier);
        if (_sfxShootThisFrame <= 6) spawnMuzzle(gx, gy, g.aim, g.tier, isCrit ? '#ffffff' : t.glow);
    }
}

function updateBullets() {
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.dx; b.y += b.dy;
        if (b.x > W + 20 || b.x < 0 || b.y < 0 || b.y > H) { bullets.splice(i, 1); continue; }
        let hit = false;
        for (let j = enemies.length - 1; j >= 0; j--) {
            const en = enemies[j];
            if (Math.hypot(b.x - en.x, b.y - en.y) < en.r + b.r) {
                let dmg = b.dmg;
                if (en.shield > 0) {
                    const absorbed = Math.min(en.shield, dmg);
                    en.shield -= absorbed; dmg -= absorbed;
                    spawnHitParticles(b.x, b.y, '#5dd5ff');
                }
                if (dmg > 0) en.hp -= dmg;
                en.hitFlash = 4;                                  // cosmetic white pop (decays in updateEnemies)
                en.knock = Math.min((en.knock || 0) + 0.6, 1.4);  // cosmetic render recoil — en.x is NEVER moved
                spawnHitParticles(b.x, b.y, b.color);
                bullets.splice(i, 1);
                if (en.hp <= 0) {
                    // Arsenal: T0/T1 mastery adds a tiny flat gold-on-kill perk
                    // (the early tiers get economy, not damage — pacing safety).
                    const arsGold = arsGoldPerKill(b.ftier | 0);
                    const reward = Math.round(en.reward * getGoldMult()) + arsGold;
                    gold += reward; score += reward; runKills++;
                    saveData.stats.totalKills++;
                    ultCharge = Math.min(ULT_MAX, ultCharge + (en.isBoss ? 25 : 4));
                    spawnFloat(en.x, en.y - en.r, '+' + reward + 'g', '#f1c40f');
                    spawnHitParticles(en.x, en.y, en.glow);
                    for (let k = 0; k < 8; k++) spawnHitParticles(en.x, en.y, en.color);
                    spawnDeathBurst(en);   // cosmetic ring + shards
                    if (en.isBoss) {
                        // Bosses bank persistent cores immediately so reaching one
                        // always pays off, even if the run ends soon after.
                        const coreReward = 3 + Math.floor(wave / 5);
                        saveData.cores += coreReward; writeSave();
                        spawnFloat(W/2, H/2 - 40, t('boss_down', coreReward), '#ffd700');
                        sfxAchievement();
                        for (let k = 0; k < 24; k++) spawnHitParticles(en.x, en.y, en.glow);
                        triggerShake(5, 16);   // cosmetic boss-death kick
                    }
                    enemies.splice(j, 1);
                    checkAchievementsLive();
                }
                hit = true; break;
            }
        }
        if (hit) continue;
    }
}

function spawnWallExplosion(x, y, color, glow) {
    for (let k = 0; k < 22; k++) {
        const a = Math.random() * Math.PI * 2;
        const s = 1.5 + Math.random() * 4;
        addParticle({
            x, y,
            dx: Math.cos(a) * s, dy: Math.sin(a) * s,
            life: 28 + Math.random() * 22, maxLife: 50,
            color: Math.random() > 0.45 ? glow : color,
            r: 1.5 + Math.random() * 3,
        });
    }
    // Debris sparks toward base
    for (let k = 0; k < 8; k++) {
        addParticle({
            x, y,
            dx: -(1 + Math.random() * 3), dy: (Math.random() - 0.5) * 4,
            life: 20, maxLife: 20, color: '#f39c12', r: 1.5,
        });
    }
}

function updateEnemies() {
    for (let i = enemies.length - 1; i >= 0; i--) {
        const en = enemies[i];
        // Cosmetic hit-reaction decay (draw-only fields; movement is untouched).
        if (en.hitFlash) en.hitFlash--;
        if (en.knock) { en.knock *= 0.74; if (en.knock < 0.02) en.knock = 0; }
        // Boss enrages once below 30% HP: a one-time speed surge that forces
        // the player to finish it before it reaches the line.
        if (en.isBoss && !en.enraged && en.hp < en.maxHp * 0.30) {
            en.enraged = true; en.spd *= 1.8;
            spawnFloat(en.x, en.y - en.r - 12, t('boss_enrage'), '#ff3b30');
        }
        en.x -= en.spd;
        if (en.x < DIVIDER_X - en.r) {
            let dmg = en.isBoss ? 5 : 1;
            if (saveData.upgrades.armor >= 1 && !armorUsedThisWave) { dmg = 0; armorUsedThisWave = true; }
            spawnWallExplosion(DIVIDER_X - 4, en.y, en.color, en.glow);
            sfxWallHit();
            triggerShake(en.isBoss ? 5 : 2.5, 10);   // cosmetic wall-impact kick
            hp -= dmg;
            if (dmg > 0) spawnFloat(DIVIDER_X - 40, en.y - 18, '-' + dmg + ' HP', '#e74c3c');
            enemies.splice(i, 1);
            if (hp <= 1 && saveData.upgrades.last_stand >= 1 && !lastStandActive) {
                lastStandActive = true; lastStandTimer = 600;
                spawnFloat(W/2, H/2 - 40, t('last_stand_float'), '#f1c40f');
            }
            if (hp <= 0) { hp = 0; endRun(); }
        }
    }
}

function endRun() {
    offerResurrect();
}

// Airstrike ultimate: ready at full charge, hits every enemy on the field
// (ignores shields) — clears chaff and chunks bosses. A clutch tool for
// boss waves that keeps the player engaged moment-to-moment.
function fireUlt() {
    if (ultCharge < ULT_MAX || STATE !== 'play' || enemies.length === 0) return;
    ultCharge = 0;
    ultFlashTimer = 18;
    triggerShake(4, 14);   // cosmetic airstrike kick
    sfxWaveClear();
    const dmg = 12 + wave * 6;
    for (let j = enemies.length - 1; j >= 0; j--) {
        const en = enemies[j];
        en.shield = 0;
        en.hp -= dmg;
        for (let k = 0; k < 6; k++) spawnHitParticles(en.x, en.y, en.glow);
        if (en.hp <= 0) {
            const reward = Math.round(en.reward * getGoldMult());
            gold += reward; score += reward; runKills++;
            saveData.stats.totalKills++;
            spawnFloat(en.x, en.y - en.r, '+' + reward + 'g', '#f1c40f');
            if (en.isBoss) {
                const coreReward = 3 + Math.floor(wave / 5);
                saveData.cores += coreReward; writeSave();
                spawnFloat(W / 2, H / 2 - 40, t('boss_down', coreReward), '#ffd700');
            }
            spawnDeathBurst(en);   // cosmetic ring + shards (parity with gunfire kills)
            enemies.splice(j, 1);
        }
    }
    checkAchievementsLive();
}

// ── Update ────────────────────────────────────────────────────────────────────
let _sfxShootThisFrame = 0;
function update() {
    if (_gamePaused) return;
    if (STATE !== 'play' && STATE !== 'resurrect' && STATE !== 'tutorial') return;
    if (STATE === 'resurrect') return;
    _sfxShootThisFrame = 0;
    updateGuns();
    updateBullets();
    updateEnemies();

    if (lastStandActive) {
        lastStandTimer--;
        if (lastStandTimer <= 0) lastStandActive = false;
    }

    if (bossBannerTimer > 0) bossBannerTimer--;
    if (ultFlashTimer > 0) ultFlashTimer--;

    if (waveActive && waveEnemiesLeft > 0) {
        spawnTimer++;
        if (spawnTimer >= spawnInterval) {
            spawnEnemy(wave); waveEnemiesLeft--; spawnTimer = 0;
            // Boss arrives once the add stream is spent; it keeps the wave
            // open (enemies.length > 0) until killed.
            if (waveEnemiesLeft === 0 && bossWave && !bossSpawned) { spawnBoss(wave); bossSpawned = true; }
        }
    }

    if (waveActive && waveEnemiesLeft === 0 && enemies.length === 0) {
        waveEndTimer++;
        if (waveEndTimer > 60) {
            // Check flawless
            if (hp === runWaveHpBefore) {
                runFlawlessWaves++;
                saveData.stats.flawlessWaves++;
                spawnFloat(W/2, 120, t('flawless'), '#f1c40f');
            }
            // HP regen
            const regen = saveData.upgrades.hp_regen * 2;
            if (regen > 0) { hp = Math.min(maxHp, hp + regen); spawnFloat(DIVIDER_X - 40, 160, t('plus_hp', regen), '#2ecc71'); }
            waveActive = false;
            yadGameplayStop();
            const bonus = getWaveBonus(wave);
            gold += bonus; score += bonus;
            // Accrue a Blueprint key per wave cleared (in MEMORY only; committed
            // once at run end in computeResults — never written mid-run to avoid
            // per-frame localStorage churn and double-grants).
            runKeysEarned += 1;
            // Arsenal Salvage: +2 per wave cleared, capped per run (in memory).
            if (runSalvWave < ARS_CAP_WAVE) runSalvWave = Math.min(ARS_CAP_WAVE, runSalvWave + ARS_SALV_PER_WAVE);
            runWavesCleared++;          // daily-quest progress (in memory)
            gaProgress(GA_PROGRESSION_COMPLETE, 'wave', 'wave_' + wave, '', score);
            gaEvent('wave:complete', wave);
            questProgressTick();        // refresh quest prog from the live counters (no save)
            sfxWaveClear();
            spawnFloat(W/2, H/2 - 20, t('wave_clear', wave, bonus), '#f1c40f');
            checkAchievementsLive();
        }
    }

    // Supply crate spawning
    if (waveActive) crateSpawnTimer++;
    const _crateThreshold = crateFirstSpawned ? CRATE_REPEAT_INTERVAL : CRATE_FIRST_INTERVAL;
    if (crateSpawnTimer >= _crateThreshold && !crate && guns.length > 0 && emptyCell()) {
        const bestTier = Math.max(...guns.map(g => g.tier));
        crate = {
            x: LANE_X + 50 + Math.random() * (LANE_W - 120),
            y: GRID_Y + 20 + Math.random() * (ROWS * (CH + 4) - 50),
            life: CRATE_LIFETIME, maxLife: CRATE_LIFETIME,
            tier: Math.max(0, Math.ceil(bestTier / 2)),
        };
        crateSpawnTimer = 0;
        crateFirstSpawned = true;
    }
    if (crate) { crate.life--; if (crate.life <= 0) crate = null; }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.dx; p.y += p.dy;
        if (p.g) p.dy += p.g;                 // shards fall (gravity)
        else { p.dx *= 0.93; p.dy *= 0.93; }  // default dots/sparks keep the original friction
        if (p.kind === 'ring') p.r += (p.growth || 2.4);
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = floats.length - 1; i >= 0; i--) {
        const f = floats[i]; f.y += f.vy; f.life--;
        if (f.life <= 0) floats.splice(i, 1);
    }
    for (let i = achToasts.length - 1; i >= 0; i--) {
        achToasts[i].life--;
        if (achToasts[i].life <= 0) achToasts.splice(i, 1);
    }
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function drawRR(x, y, w, h, r, fill, stroke, lw) {
    ctx.beginPath();
    ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
    ctx.arcTo(x+w, y, x+w, y+r, r); ctx.lineTo(x+w, y+h-r);
    ctx.arcTo(x+w, y+h, x+w-r, y+h, r); ctx.lineTo(x+r, y+h);
    ctx.arcTo(x, y+h, x, y+h-r, r); ctx.lineTo(x, y+r);
    ctx.arcTo(x, y, x+r, y, r); ctx.closePath();
    if (fill)  { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke){ ctx.strokeStyle = stroke; ctx.lineWidth = lw||1; ctx.stroke(); }
}

function drawGun(x, y, w, h, tier, g) {
    const t = TIERS[tier];
    const cx = x + w/2, cy = y + h/2;
    const sid = GUN_SPRITES[tier];
    // Cosmetic skin (highest-rarity owned for this tier), or null. Visual only.
    const skin = equippedSkinForTier(tier);
    const auraGlow = skin ? skin.glow : t.glow;
    const auraFill = (skin ? skin.tint : t.color) + '22';
    ctx.save();
    // Cell tint background — static socket, never transformed.
    ctx.shadowColor = auraGlow; ctx.shadowBlur = 14;
    drawRR(x+3, y+3, w-6, h-6, 8, auraFill, auraGlow + '99', 1.5);
    ctx.shadowBlur = 0;

    // Cosmetic sprite rig: recoil kick + aim tracking + merge-pop + idle breathing.
    // Pure transforms on the existing static sprite (the "Spine-style" feel with zero
    // new assets). All inputs are optional — a previewed gun (no g) sits perfectly still.
    const recoil = g && g.recoil ? g.recoil : 0;
    const pop    = g && g.pop ? g.pop : 0;
    let aim = g && typeof g.aim === 'number' ? g.aim : 0;
    if (aim > 0.4) aim = 0.4; else if (aim < -0.4) aim = -0.4; // subtle tracking, never a flip
    const breath = g ? 1 + Math.sin((_frame + (g.col*7 + g.row*13)) * 0.11) * 0.02 : 1;
    const scale  = breath + pop * 0.5;
    const kick   = recoil * 4;
    ctx.save();
    ctx.translate(cx - Math.cos(aim)*kick, cy - Math.sin(aim)*kick);
    ctx.rotate(aim * 0.6);
    ctx.scale(scale, scale);
    ctx.translate(-cx, -cy);
    if (imgReady(sid)) {
        // Per-tier padding: pistol smaller, rest snug but not cramped
        const PAD = [16, 9, 9, 8, 9, 9, 8, 8];
        const pad = PAD[tier] || 9;
        const sz = w - pad * 2;
        const ox = x + pad, oy = y + (h - sz) / 2; // vertically centred
        ctx.shadowColor = auraGlow; ctx.shadowBlur = 8 + (g && g.flash ? 10 : 0);
        ctx.drawImage(IMGS[sid], ox, oy, sz, sz);
    } else {
        // Canvas fallback
        ctx.fillStyle = t.color;
        ctx.fillRect(cx + 8, cy - 3, 18, 6);
        ctx.shadowColor = t.glow; ctx.shadowBlur = 8;
        ctx.fillStyle = t.color;
        ctx.beginPath(); ctx.arc(cx, cy, 12 + tier, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = t.glow; ctx.lineWidth = 2; ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('T' + (tier+1), cx, cy);
    }
    ctx.restore(); // end sprite rig

    // Muzzle-flash bloom at the barrel tip (additive, brief after a shot).
    if (g && g.flash) {
        const ft = g.flash / 5;
        // Ride the recoil kick (sprite was translated back by `kick`) so the flash
        // stays pinned to the kicked barrel tip instead of detaching for a few frames.
        const mx = cx + Math.cos(aim) * (w*0.42 - kick), my = cy + Math.sin(aim) * (w*0.42 - kick);
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = 0.7 * ft;
        ctx.fillStyle = '#fff6cf'; ctx.shadowColor = t.glow; ctx.shadowBlur = 12;
        ctx.beginPath(); ctx.arc(mx, my, 4 + tier*0.5, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    // Rarity gem (top-right of the cell) when a cosmetic skin is equipped —
    // a cheap, no-bleed visual marker that the player customised this tier.
    if (skin) {
        const rc = RARITY[skin.rarity];
        ctx.shadowColor = rc.glow; ctx.shadowBlur = 6;
        ctx.fillStyle = rc.glow;
        ctx.beginPath(); ctx.arc(x + w - 11, y + 11, 4.5, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#0a0a0f'; ctx.lineWidth = 1; ctx.stroke();
    }
    ctx.restore();
}

function drawGunName(x, y, w, tier) {
    ctx.fillStyle = TIERS[tier].glow; ctx.font = '9px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(tierName(tier), x + w/2, y + 4);
}

function drawEnemy(en) {
    const sid = ENEMY_SPRITES[Math.min(en.type, ENEMY_SPRITES.length - 1)];
    const sr  = en.r * 2.6; // sprite draw size
    // Cosmetic render transform. en.x/en.y are NEVER moved (collision + movement stay
    // identical) — these are draw-local coords: knock pushes the sprite back toward the
    // lane on hit, a phase-seeded bob + squash/stretch gives a "walking" feel. Used for
    // EVERY sub-draw below (sprite, shield arc, boss ring, HP bar) so nothing detaches.
    const knockPx = (en.knock || 0) * 5;
    const ph  = en.phase || 0;
    const sq  = 1 + Math.sin(_frame * 0.18 + ph) * 0.06;       // vertical squash/stretch
    const bob = Math.sin(_frame * 0.18 + ph) * (en.isBoss ? 1.5 : 2.2);
    const rx  = en.x + knockPx;
    const ry  = en.y + bob;
    const flash = en.hitFlash ? en.hitFlash / 4 : 0;
    ctx.save();
    if (imgReady(sid)) {
        const ww = sr / Math.sqrt(sq), hh = sr * sq; // squash preserves apparent area
        ctx.shadowColor = en.glow; ctx.shadowBlur = en.isBoss ? 26 : 14;
        ctx.drawImage(IMGS[sid], rx - ww/2, ry - hh/2, ww, hh);
        if (flash > 0) {
            // Additive self-overdraw = a brief brighten on hit. Decays over 4 frames
            // (no strobe). Capped alpha keeps it epilepsy-safe.
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.globalAlpha = 0.6 * flash;
            ctx.drawImage(IMGS[sid], rx - ww/2, ry - hh/2, ww, hh);
            ctx.restore();
        }
    } else {
        ctx.shadowColor = en.glow; ctx.shadowBlur = en.isBoss ? 22 : 12;
        ctx.fillStyle = flash > 0 ? '#ffffff' : en.color;
        ctx.beginPath(); ctx.arc(rx, ry, en.r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = en.glow; ctx.lineWidth = 2; ctx.stroke();
    }
    ctx.shadowBlur = 0;
    // Shield arc on the side facing incoming fire (left hemisphere).
    if (en.shield > 0) {
        ctx.strokeStyle = 'rgba(93,213,255,0.9)'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(rx, ry, en.r + 4, Math.PI*0.55, Math.PI*1.45); ctx.stroke();
    }
    // Boss ring (gold, turns red on enrage).
    if (en.isBoss) {
        ctx.strokeStyle = en.enraged ? '#ff3b30' : '#ffd700'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(rx, ry, en.r + 6, 0, Math.PI*2); ctx.stroke();
    }
    // Per-enemy HP bar (boss uses the full-width screen bar instead).
    if (!en.isBoss) {
        const bw = sr, bh = 4, bx = rx - sr/2, by = ry - sr/2 - 7;
        ctx.fillStyle = '#1a1a1a'; ctx.fillRect(bx, by, bw, bh);
        ctx.fillStyle = en.color;  ctx.fillRect(bx, by, bw * (en.hp / en.maxHp), bh);
    }
    ctx.restore();
}

// ── Draw HUD ──────────────────────────────────────────────────────────────────
function drawHUD() {
    drawRR(0, 0, W, 82, 0, '#0d0d18', null, 0);
    ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('⬡ ' + gold, 12, 24);

    // Cores
    ctx.fillStyle = '#a78bfa'; ctx.font = 'bold 15px monospace';
    ctx.fillText('◈ ' + saveData.cores, 12, 48);

    // Arsenal pill — opens the owned meta mid-run (freezes combat). Shows the
    // Salvage balance with the vector icon. Glows when a level is affordable.
    const ab = ARS_HUD_BTN;
    const _affordable = _arsAnyAffordable();
    ctx.save();
    if (_affordable) { ctx.shadowColor = '#e0a85a'; ctx.shadowBlur = 8 * (0.6 + 0.4 * Math.sin(Date.now() / 220)); }
    drawRR(ab.x, ab.y, ab.w, ab.h, 5, '#1c1608', _affordable ? '#e0a85a' : '#5a4a2a', _affordable ? 1.5 : 1);
    ctx.restore();
    drawSalvageIcon(ab.x + 12, ab.y + ab.h / 2, 6, '#e0a85a');
    ctx.fillStyle = '#f0c070'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(t('arsenal_btn') + '  ' + arsSalvage(), ab.x + 24, ab.y + ab.h / 2);

    const hpW = 170, hpH = 18, hpX = W/2 - hpW/2, hpY = 10;
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(hpX, hpY, hpW, hpH);
    const hpFrac = hp / maxHp;
    ctx.fillStyle = hpFrac > 0.5 ? '#2ecc71' : hpFrac > 0.25 ? '#f39c12' : '#e74c3c';
    if (lastStandActive) ctx.fillStyle = '#f1c40f';
    ctx.fillRect(hpX, hpY, hpW * hpFrac, hpH);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.strokeRect(hpX, hpY, hpW, hpH);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('HP ' + hp + '/' + maxHp, W/2, hpY + hpH/2);

    ctx.fillStyle = '#aaa'; ctx.font = '14px monospace'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(t('wave_hud', wave), W - 12, 24);
    ctx.fillStyle = '#666'; ctx.font = '11px monospace';
    ctx.fillText(t('score_label', score), W - 12, 44);

    if (lastStandActive) {
        ctx.save(); ctx.shadowColor = '#f1c40f'; ctx.shadowBlur = 12;
        ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'right';
        ctx.fillText(t('last_stand_hud', Math.ceil(lastStandTimer / 60)), W - 12, 62);
        ctx.restore();
    }

    // Mute button (top-right corner)
    const mx = W - 38, my = 58, mw = 28, mh = 18;
    drawRR(mx, my, mw, mh, 4, '#1a1a2e', '#444', 1);
    ctx.fillStyle = _muted ? '#888' : '#aaa'; ctx.font = '12px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(_muted ? '🔇' : '🔊', mx + mw/2, my + mh/2);

    // MENU pill (left of mute) — the in-run route to the menu (daily / blueprints /
    // IAP live there). Essential for autostart/platform builds that skip the menu
    // (CLAUDE.md #9 "keep the menu reachable in-run"; Build Hygiene #13). 'play' only.
    if (STATE === 'play') {
        const pb = MENU_HUD_BTN;
        const claim = habitClaimable(); // something to claim in Daily Ops (menu)
        ctx.save();
        if (claim) { ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 7 * (0.6 + 0.4 * Math.sin(Date.now() / 240)); }
        drawRR(pb.x, pb.y, pb.w, pb.h, 4, '#1a1a2e', claim ? '#ffd700' : '#556', 1);
        ctx.restore();
        ctx.fillStyle = claim ? '#ffd700' : '#99a'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(t('menu_btn'), pb.x + pb.w / 2, pb.y + pb.h / 2);
        // small red claimable dot
        if (claim) { ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(pb.x + pb.w - 3, pb.y + 2, 4, 0, Math.PI * 2); ctx.fill(); }
    }

    const cost = Math.round(getBuyCostBase() * Math.pow(BUY_COST_SCALE, buyCount));
    const canBuy = gold >= cost && emptyCell();
    drawRR(GRID_X, 88, COLS*(CW+4)-4, 28, 6, canBuy ? '#1a3a1a' : '#1a1a1a', canBuy ? '#2ecc71' : '#444', 1.5);
    ctx.fillStyle = canBuy ? '#2ecc71' : '#666';
    ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t('buy_gun', cost), GRID_X + (COLS*(CW+4)-4)/2, 88 + 14);
}

// Telemetry de-dupe for goal_shown (reset per run in initGame).
let _goalTelKey = null;
// Always-visible NEXT GOAL card under the board (legible progression). Drawn on
// the play + tutorial screens. Fires goal_shown ONCE per distinct goal.
function drawNextGoal() {
    const g = nextGoal();
    if (!g) return;
    if (g.key !== _goalTelKey) { _goalTelKey = g.key; tel('goal_shown', { goal: g.key }); }
    // Card geometry: BELOW the Airstrike button in the left column (the grid ends
    // at ~y=418, the grid-hint sits at ~424, the ult button at 442-488 — so the
    // card anchors under the ult button to avoid overlapping any of them).
    const cardW = COLS * (CW + 4) - 4;
    const cardX = GRID_X;
    const cardH = 44;
    const cardY = Math.min(H - cardH - 8, ULT_BTN.y + ULT_BTN.h + 8);
    ctx.save();
    drawRR(cardX, cardY, cardW, cardH, 8, '#0c1410', '#2e7d52', 1.5);
    // Label + title on one row, sub on the next (compact, fits 44px height).
    ctx.fillStyle = '#3fae6e'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(t('goal_label'), cardX + 12, cardY + 6);
    ctx.fillStyle = '#eaf6ee'; ctx.font = 'bold 12px monospace';
    ctx.fillText(g.title, cardX + 12, cardY + 17);
    ctx.fillStyle = '#7fae90'; ctx.font = '10px monospace';
    ctx.fillText(g.sub, cardX + 12, cardY + 31);
    ctx.restore();
}

// ── Draw grid ─────────────────────────────────────────────────────────────────
function drawGrid() {
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
            const r = cellRect(col, row);
            const g = gunAt(col, row);
            const isSel = selected && selected.col === col && selected.row === row;
            const selGun = selected ? gunAt(selected.col, selected.row) : null;
            const canMerge = selGun && g && !isSel && g.tier === selGun.tier;
            const isEmpty = !g && selected;
            const border = isSel ? '#f1c40f' : canMerge ? '#2ecc71' : isEmpty ? '#4488ff' : g ? TIERS[g.tier].glow + '66' : '#1e1e2e';
            drawRR(r.x, r.y, r.w, r.h, 8, '#111122', border, isSel || canMerge || isEmpty ? 2 : 1);
            if (g) { drawGun(r.x, r.y, r.w, r.h, g.tier, g); drawGunName(r.x, r.y, r.w, g.tier); }
        }
    }
    if (selected) {
        const sg = gunAt(selected.col, selected.row);
        if (sg) {
            ctx.fillStyle = '#f1c40f88'; ctx.font = '10px monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            ctx.fillText(t('grid_hint'), GRID_X + COLS*(CW+4)/2, GRID_Y + ROWS*(CH+4) + 6);
        }
    }
}

// ── Draw wall ─────────────────────────────────────────────────────────────────
function drawWall() {
    const wx = DIVIDER_X - 10, ww = 14;
    // Wall body
    ctx.fillStyle = '#1c2a38'; ctx.fillRect(wx, 0, ww, H);
    // Segment bricks
    const segH = 48;
    for (let y = 0; y < H; y += segH) {
        // Battlement cap
        ctx.fillStyle = '#253545';
        ctx.fillRect(wx - 5, y, ww + 10, 26);
        // Mortar line
        ctx.fillStyle = '#111e28';
        ctx.fillRect(wx, y + 26, ww, 2);
        // Highlight edge
        ctx.fillStyle = '#2e4a60';
        ctx.fillRect(wx - 5, y, 2, 26);
        // Shadow edge
        ctx.fillStyle = '#0e1820';
        ctx.fillRect(wx + ww + 3, y, 2, 26);
    }
    // Friendly glow on base side
    const grad = ctx.createLinearGradient(wx - 28, 0, wx, 0);
    grad.addColorStop(0, 'rgba(46,204,113,0)');
    grad.addColorStop(1, 'rgba(46,204,113,0.12)');
    ctx.fillStyle = grad; ctx.fillRect(wx - 28, 0, 28, H);
    // Danger glow on enemy side
    const grad2 = ctx.createLinearGradient(wx + ww, 0, wx + ww + 24, 0);
    grad2.addColorStop(0, 'rgba(231,76,60,0.14)');
    grad2.addColorStop(1, 'rgba(231,76,60,0)');
    ctx.fillStyle = grad2; ctx.fillRect(wx + ww, 0, 24, H);
}

// ── Draw lane ─────────────────────────────────────────────────────────────────
function drawLane() {
    ctx.fillStyle = '#0d0d1a'; ctx.fillRect(LANE_X, 0, LANE_W, H);
    ctx.strokeStyle = '#111133'; ctx.lineWidth = 1;
    for (let y = 0; y < H; y += 40) {
        ctx.beginPath(); ctx.moveTo(LANE_X, y); ctx.lineTo(W, y); ctx.stroke();
    }
    drawWall();
    enemies.forEach(drawEnemy);
    for (const b of bullets) {
        ctx.save(); ctx.shadowColor = b.color; ctx.shadowBlur = 8;
        ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
    // Supply crate
    if (crate) {
        const pulse = 0.75 + 0.25 * Math.sin(Date.now() / 180);
        const cx = crate.x, cy = crate.y, sz = 40;
        const fadeAlpha = Math.min(1, crate.life / 60);
        ctx.save();
        ctx.globalAlpha = fadeAlpha;
        ctx.shadowColor = '#f39c12'; ctx.shadowBlur = 18 * pulse;
        drawRR(cx - sz/2, cy - sz/2, sz, sz, 6, '#3a1f05', '#f39c12', 2.5);
        // X-straps
        ctx.strokeStyle = '#c07830'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx - sz/2 + 6, cy - sz/2 + 6); ctx.lineTo(cx + sz/2 - 6, cy + sz/2 - 6); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + sz/2 - 6, cy - sz/2 + 6); ctx.lineTo(cx - sz/2 + 6, cy + sz/2 - 6); ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffd700'; ctx.font = 'bold 18px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('?', cx, cy);
        ctx.fillStyle = '#ffd700'; ctx.font = 'bold 8px monospace';
        ctx.fillText(t('crate_open'), cx, cy + sz/2 + 11);
        // Tier badge
        ctx.fillStyle = TIERS[crate.tier].glow; ctx.font = 'bold 8px monospace';
        ctx.fillText('T' + (crate.tier + 1), cx, cy - sz/2 - 7);
        ctx.restore();
    }

    if (!waveActive) {
        const wx = DIVIDER_X + 10, wy = H - 56, ww = LANE_W - 10, wh = 42;
        drawRR(wx, wy, ww, wh, 8, '#0a1a0a', '#2ecc71', 2);
        ctx.fillStyle = '#2ecc71'; ctx.font = 'bold 16px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(wave === 0 ? t('start_wave_1') : t('next_wave', wave+1), wx + ww/2, wy + wh/2);
    } else {
        const cfg = waveConfig(wave);
        const total = cfg.count, done = total - waveEnemiesLeft;
        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(DIVIDER_X + 10, H - 22, LANE_W - 10, 12);
        ctx.fillStyle = '#2980b9'; ctx.fillRect(DIVIDER_X + 10, H - 22, (LANE_W - 10) * (done / total), 12);
        ctx.fillStyle = '#aaa'; ctx.font = '9px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(t('wave_progress', wave, done, total), DIVIDER_X + 10 + (LANE_W-10)/2, H - 16);
        ctx.fillStyle = '#555'; ctx.font = '11px monospace'; ctx.textAlign = 'right';
        ctx.fillText(t('active_enemies', enemies.length), W - 8, H - 30);
    }
}

// ── Draw particles / floats ───────────────────────────────────────────────────
function drawParticles() {
    for (const p of particles) {
        const lifeT = Math.max(0, p.life / p.maxLife);
        ctx.save();
        if (p.kind === 'ring') {
            ctx.globalAlpha = lifeT * 0.7;
            if (p.glow) { ctx.shadowColor = p.glow; ctx.shadowBlur = 8; }
            ctx.strokeStyle = p.color; ctx.lineWidth = 2 + 2 * lifeT;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke();
        } else if (p.kind === 'spark') {
            ctx.globalCompositeOperation = 'lighter';
            ctx.globalAlpha = lifeT;
            if (p.glow) { ctx.shadowColor = p.glow; ctx.shadowBlur = 8; }
            const len = p.len || 8, a = p.ang || 0;
            ctx.strokeStyle = p.color; ctx.lineCap = 'round';
            ctx.lineWidth = (p.r || 2) * (p.shrink ? lifeT : 1) + 0.5;
            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - Math.cos(a)*len, p.y - Math.sin(a)*len); ctx.stroke();
        } else {
            // Default dot (plus the optional 'shard'/'smoke' puffs) — byte-identical to
            // the original render when a particle carries no shrink/glow fields.
            ctx.globalAlpha = lifeT;
            const r = (p.r || 1.5) * (p.shrink ? Math.max(0.2, lifeT) : 1);
            if (p.glow) { ctx.shadowColor = p.glow; ctx.shadowBlur = 6; }
            ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }
}

function drawFloats() {
    for (const f of floats) {
        ctx.save(); ctx.globalAlpha = Math.min(1, f.life / 20);
        ctx.shadowColor = f.color; ctx.shadowBlur = 6;

        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(f.text, f.x, f.y); ctx.restore();

}

// ── Tutorial (interactive spotlight) ─────────────────────────────────────────
function drawTutorial() {
    if (tutStep >= 4) return;
    const pad     = 8;
    const pulse   = 0.5 + 0.5 * Math.sin(Date.now() / 300);
    const bounce  = Math.sin(Date.now() / 400) * 5;

    // Target rects for each step (canvas coords)
    const buyTr  = { x: GRID_X, y: 88, w: COLS*(CW+4)-4, h: 28 };
    const gridTr = { x: GRID_X, y: GRID_Y, w: COLS*(CW+4)-4, h: ROWS*(CH+4)-4 };
    const waveTr = { x: DIVIDER_X+10, y: H-56, w: LANE_W-10, h: 42 };
    const trs    = [buyTr, buyTr, gridTr, waveTr];
    const hints  = [t('tut_buy_first'), t('tut_buy_second'), t('tut_merge'), t('tut_start_wave')];

    const tr   = trs[tutStep];
    const hint = hints[tutStep];

    // Expanded clear zone (target + padding)
    let ex = tr.x - pad, ew = tr.w + pad*2;
    let ey = tr.y - pad, eh = tr.h + pad*2;

    // Hint pill placement: below for steps 0-2 (targets in upper area), above for step 3 (wave btn near bottom)
    const hintBelow = tutStep < 3;
    ctx.font = 'bold 13px monospace';
    const hintPW = Math.ceil(ctx.measureText(hint).width) + 28;
    const hintPH = 28;
    let hintPY, arrowY, arrowGlyph;

    if (hintBelow) {
        arrowGlyph = '↑';
        arrowY     = ey + eh + 8 + bounce;
        hintPY     = ey + eh + 32;
        eh         = hintPY + hintPH + 6 - ey;
    } else {
        arrowGlyph = '↓';
        arrowY     = ey - 10 + bounce;
        hintPY     = ey - 44;
        const newEy = hintPY - 6;
        eh = ey + eh - newEy;
        ey = newEy;
    }

    // Dark overlay — 4 rects leaving [ex,ey,ew,eh] clear
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    if (ey > 0)        ctx.fillRect(0,     0,     W,           ey);
    if (ey+eh < H)     ctx.fillRect(0,     ey+eh, W,           H - ey - eh);
    if (ex > 0)        ctx.fillRect(0,     ey,    ex,          eh);
    if (ex+ew < W)     ctx.fillRect(ex+ew, ey,    W - ex - ew, eh);

    // Pulsing gold border on actual target
    const tx = tr.x - pad, ty = tr.y - pad, tw2 = tr.w + pad*2, th2 = tr.h + pad*2;
    ctx.save();
    ctx.shadowColor = '#f1c40f'; ctx.shadowBlur = 18 * pulse;
    drawRR(tx, ty, tw2, th2, 10, null, 'rgba(241,196,15,' + (0.55 + 0.45*pulse) + ')', 2.5);
    ctx.restore();

    // Bouncing arrow
    ctx.save();
    ctx.shadowColor = '#f1c40f'; ctx.shadowBlur = 6;
    ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(arrowGlyph, ex + ew/2, arrowY);
    ctx.restore();

    // Hint pill
    const hintX = Math.max(hintPW/2 + 4, Math.min(W - hintPW/2 - 4, ex + ew/2));
    drawRR(hintX - hintPW/2, hintPY, hintPW, hintPH, 7, 'rgba(0,0,0,0.90)', '#f1c40f', 1.5);
    ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(hint, hintX, hintPY + hintPH/2);

    // Progress dots at very bottom
    for (let i = 0; i < 4; i++) {
        ctx.fillStyle = i < tutStep ? '#2ecc71' : i === tutStep ? '#f1c40f' : '#333';
        ctx.beginPath(); ctx.arc(W/2 - 30 + i*20, H - 10, 4, 0, Math.PI*2); ctx.fill();
    }
}

// ── Draw Upgrades ─────────────────────────────────────────────────────────────
function drawUpgrades() {
    ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0, 0, W, H);

    drawRR(12, 12, 108, 30, 6, '#1a1a2e', '#555', 1);
    ctx.fillStyle = '#aaa'; ctx.font = 'bold 13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';

    ctx.fillText(t('upgrades_title', saveData.cores), W/2, 30);

    if (storeItems().length) {
        drawRR(W - 120, 12, 108, 30, 6, '#2a200a', '#ffd700', 1.5);
        ctx.fillStyle = '#ffd700'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    const colW = (W - 24) / 3;
    BRANCH_ORDER.forEach((branch, bi) => {
        const bx = 12 + bi * colW;
        const bc = BRANCH_COLORS[branch];

        ctx.fillStyle = bc; ctx.font = 'bold 13px monospace'; ctx.textAlign='center';
        ctx.fillText(t('br_' + branch), bx + colW/2, 54);

        const upgInBranch = Object.entries(UPGRADE_DEFS).filter(([,d]) => d.branch === branch);
        upgInBranch.forEach(([id, def], ui) => {
            const ux = bx + 8, uy = 62 + ui * 115;
            const uw = colW - 16, uh = 108;
            const curLv = saveData.upgrades[id];
            const maxed = curLv >= def.maxLv;

            const canAfford = !maxed && saveData.cores >= cost;

            drawRR(ux, uy, uw, uh, 8,
                canAfford ? '#0d1a0d' : '#0d0d18',
                maxed ? '#f1c40f' : canAfford ? bc : '#333', 1.5);

            ctx.fillStyle = maxed ? '#f1c40f' : '#fff';
            ctx.font = 'bold 12px monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
            ctx.fillText(upgName(id), ux + uw/2, uy + 8);

            ctx.fillStyle = '#888'; ctx.font = '10px monospace';
            ctx.fillText(upgDesc(id), ux + uw/2, uy + 26);

            // Level dots
            const dotSpacing = Math.min(14, (uw - 16) / def.maxLv);

            let dx = ux + uw/2 - dotsW/2;
            for (let lv = 0; lv < def.maxLv; lv++) {
                ctx.fillStyle = lv < curLv ? bc : '#333';

                ctx.fillText(t('maxed'), ux + uw/2, uy + uh - 17);

    // Achievements strip at bottom
    ctx.fillStyle = '#a78bfa'; ctx.font = 'bold 11px monospace'; ctx.textAlign='left';
    ctx.fillText(t('achievements_title', saveData.achievements.length), 16, H - 52);
    ACH_DEFS.forEach((a, i) => {
        const unlocked = saveData.achievements.includes(a.id);

        drawRR(ax, ay, 58, 28, 4, unlocked ? '#1a1a0a' : '#0d0d0d', unlocked ? '#f1c40f' : '#222', 1);

// Vector Salvage icon — a hex nut / cog (NEVER an emoji). cx,cy center, R radius.
function drawSalvageIcon(cx, cy, R, color) {
    ctx.save();
    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = Math.max(1.5, R * 0.18);
    // Outer hex nut
    ctx.beginPath();
    for (let k = 0; k < 6; k++) {
        const a = Math.PI / 6 + k * Math.PI / 3;
        const x = cx + Math.cos(a) * R, y = cy + Math.sin(a) * R;
        if (k === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.stroke();
    // Inner bolt hole
    ctx.beginPath(); ctx.arc(cx, cy, R * 0.42, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
}

    ctx.fillStyle = '#9a8a6a'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t('ars_total', arsTotalLevels()), W / 2, 64);

    // 8 weapon mastery tracks
    for (let i = 0; i < BASE_TIERS.length; i++) {
        const rr = arsenalRowRect(i);
        const lv = arsLevel(i);
        const maxed = lv >= ARS_MAX;
        const cost = arsCost(i, lv);
        const tierDef = BASE_TIERS[i];
        // A track is "reachable" once the player has ever reached that tier in a run.
        const reached = arsTierReached(i);
        const canBuy = !maxed && salv >= cost;

        drawRR(rr.x, rr.y, rr.w, rr.h, 8,
            maxed ? '#16140a' : '#0d0d16',
            maxed ? '#e0a85a' : canBuy ? '#3a6a3a' : '#2a2a3a', 1.5);

        // Gun sprite (vector fallback circle)
        const sid = GUN_SPRITES[i];
        const icx = rr.x + 30, icy = rr.y + 30;
        ctx.save(); ctx.shadowColor = tierDef.glow; ctx.shadowBlur = 8;
        if (imgReady(sid)) {
            ctx.drawImage(IMGS[sid], icx - 18, icy - 18, 36, 36);
        } else {
            ctx.fillStyle = tierDef.color; ctx.beginPath(); ctx.arc(icx, icy, 15, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();

        // Name + level
        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(tierName(i), rr.x + 56, rr.y + 18);
        ctx.fillStyle = maxed ? '#e0a85a' : '#9a9ab0'; ctx.font = '10px monospace';
        ctx.fillText(t('ars_level', lv, ARS_MAX), rr.x + 56, rr.y + 34);

        // Level dots (row 3, under the level text)
        let dx = rr.x + 56;
        for (let k = 0; k < ARS_MAX; k++) {
            ctx.fillStyle = k < lv ? tierDef.glow : '#33334a';
            ctx.beginPath(); ctx.arc(dx + 5, rr.y + 50, 4, 0, Math.PI * 2); ctx.fill();
            dx += 14;
        }

        // Current/next effect line (bottom-left, beside the buy button — no overlap).
        // Locked tiers show the unlock hint here (the wide left area fits it).
        const isEarly = i <= 1;
        let effLine;
        if (!reached) { effLine = t('ars_locked'); ctx.fillStyle = '#55556a'; }
        else if (isEarly) { effLine = maxed ? t('ars_gold', lv) : t('ars_gold_next', lv + 1); ctx.fillStyle = '#8a9a7a'; }
        else { effLine = maxed ? t('ars_dmg', lv * 2) : t('ars_dmg_next', (lv + 1) * 2); ctx.fillStyle = '#8a9a7a'; }
        ctx.font = '10px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(effLine, rr.x + 12, rr.y + rr.h - 21);

        // Buy button (or MASTERED / locked)
        const bb = arsenalBuyRect(i);
        if (maxed) {
            drawRR(bb.x, bb.y, bb.w, bb.h, 5, '#1a1608', '#e0a85a', 1);
            ctx.fillStyle = '#e0a85a'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(t('ars_maxed'), bb.x + bb.w / 2, bb.y + bb.h / 2);
        } else if (!reached) {
            drawRR(bb.x, bb.y, bb.w, bb.h, 5, '#141420', '#33334a', 1);
            ctx.fillStyle = '#55556a'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(t('ars_locked_short'), bb.x + bb.w / 2, bb.y + bb.h / 2);
        } else {
            drawRR(bb.x, bb.y, bb.w, bb.h, 5, canBuy ? '#0a2a0a' : '#1a1a1a', canBuy ? '#2ecc71' : '#444', 1.5);
            ctx.fillStyle = canBuy ? '#2ecc71' : '#666'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            drawSalvageIcon(bb.x + 14, bb.y + bb.h / 2, 6, canBuy ? '#2ecc71' : '#666');
            ctx.fillText(String(cost), bb.x + bb.w / 2 + 6, bb.y + bb.h / 2);
        }
    }

    // Footer hint
    const cb = CMD_OPEN_BTN;
    const cmdHot = cmdUnspentStars() > 0 || ascensionGain() > 0;
    ctx.save();
    if (cmdHot) { ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 9 * (0.6 + 0.4 * Math.sin(Date.now() / 220)); }
    drawRR(cb.x, cb.y, cb.w, cb.h, 7, '#1a1324', cmdHot ? '#ffd700' : '#6d5a8a', cmdHot ? 2 : 1.3);
    ctx.restore();
    ctx.fillStyle = cmdHot ? '#ffd700' : '#c7b8e8'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t('command_btn') + '  ·  ' + t('cmd_stars', cmdStars()), cb.x + cb.w / 2, cb.y + cb.h / 2);

    ctx.fillStyle = '#55556a'; ctx.font = '10px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t('ars_earn_hint'), W / 2, H - 16);

    // Level-up celebration — UI-local + _frame-driven (particles/floats/world-shake
    // never tick in the arsenal state, so this draws itself).
    if (_arsLevelFx) {
        if (_frame >= _arsLevelFx.endFrame) {
            _arsLevelFx = null;
        } else {
            const rr = arsenalRowRect(_arsLevelFx.tier);
            const k = 1 - (_arsLevelFx.endFrame - _frame) / 42; // 0 -> 1 over the effect
            const glow = BASE_TIERS[_arsLevelFx.tier].glow;
            ctx.save();
            ctx.globalAlpha = (1 - k) * 0.9;
            ctx.shadowColor = glow; ctx.shadowBlur = 16;
            drawRR(rr.x - 2, rr.y - 2, rr.w + 4, rr.h + 4, 9, null, glow, 2.5);
            ctx.globalAlpha = (1 - k);
            ctx.fillStyle = '#fff7d0';
            for (let s = 0; s < 6; s++) {
                const sx = rr.x + 24 + (s * 53) % (rr.w - 40);
                const sy = rr.y + rr.h - k * (30 + s * 6);
                ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }
    }

    // Hover tooltip (desktop)
    drawArsenalHover();
}

function handleArsenalClick(px, py) {
    const bk = ARS_BACK_BTN;
    if (px >= bk.x && px <= bk.x + bk.w && py >= bk.y && py <= bk.y + bk.h) {
        closeArsenal();
        return;
    }
    const cb = CMD_OPEN_BTN;
    if (px >= cb.x && px <= cb.x + cb.w && py >= cb.y && py <= cb.y + cb.h) {
        STATE = 'command';
        return;
    }
    for (let i = 0; i < BASE_TIERS.length; i++) {
        const reached = arsTierReached(i);
        if (!reached) continue;
        const bb = arsenalBuyRect(i);
        if (px >= bb.x && px <= bb.x + bb.w && py >= bb.y && py <= bb.y + bb.h) {
            arsBuyLevel(i); return;
        }
    }
}

// ── COMMAND deck (Pass 3 — branching long-term depth) ───────────────────────
const CMD_BACK_BTN = { x: 12, y: 12, w: 108, h: 30 };
const CMD_ASC_BTN = { x: W / 2 - 128, y: 504, w: 256, h: 36 };

function cmdBranchRect(i) {
    const gap = 14, w = (W - 80 - gap * 2) / 3;
    return { x: 40 + i * (w + gap), y: 104, w: w, h: 186 };
}
function cmdBuyRect(i) {
    const r = cmdBranchRect(i);
    return { x: r.x + 18, y: r.y + r.h - 42, w: r.w - 36, h: 28 };
}
function cmdEffectText(id, lv) {
    if (id === 'overclock') return '+' + Math.round(lv * 3) + '% ' + (lang === 'ru' ? 'урон' : 'damage');
    if (id === 'logistics') return '+' + Math.round(lv * 3) + '% ' + (lang === 'ru' ? 'золото' : 'gold') + ' / +' + Math.round(lv * 2) + '% ' + t('ars_salvage_unit');
    if (id === 'bulwark') return '+' + (lv * 4) + ' HP';
    return '';
}
function drawCommand() {
    ctx.fillStyle = '#090911'; ctx.fillRect(0, 0, W, H);

    const bk = CMD_BACK_BTN;
    drawRR(bk.x, bk.y, bk.w, bk.h, 6, '#1a1a2e', '#555', 1);
    ctx.fillStyle = '#aaa'; ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t('back_btn'), bk.x + bk.w / 2, bk.y + bk.h / 2);

    ctx.fillStyle = '#ffd700'; ctx.font = 'bold 20px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t('command_title'), W / 2, 26);
    ctx.fillStyle = '#8e86a8'; ctx.font = '11px monospace';
    ctx.fillText(t('command_sub'), W / 2, 48);

    const balX = W - 150, balY = 12, balW = 138, balH = 30;
    drawRR(balX, balY, balW, balH, 6, '#221909', '#ffd700', 1.5);
    ctx.fillStyle = '#ffe680'; ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';
    ctx.fillText(t('cmd_stars', cmdStars()), balX + balW / 2, balY + balH / 2);

    ctx.fillStyle = '#6f6688'; ctx.font = 'bold 11px monospace';
    ctx.fillText((lang === 'ru' ? 'Цикл ' : 'Cycle ') + _safeCount(saveData.command && saveData.command.cycle, 1e5) + '  ·  ' + t('ars_total', arsTotalLevels()), W / 2, 70);

    CMD_BRANCHES.forEach(function (b, i) {
        const r = cmdBranchRect(i);
        const lv = cmdLevel(b.id);
        const maxed = lv >= CMD_MAX;
        const cost = cmdCost(b.id);
        const canBuy = !maxed && cmdStars() >= cost;
        drawRR(r.x, r.y, r.w, r.h, 10, maxed ? '#1d1708' : '#10101a', canBuy ? '#2ecc71' : b.color, canBuy ? 2 : 1.5);

        ctx.fillStyle = b.color; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(t(b.nameKey), r.x + r.w / 2, r.y + 24);

        // Level dots
        const dotGap = 11, dotsW = CMD_MAX * dotGap;
        let dx = r.x + r.w / 2 - dotsW / 2;
        for (let k = 0; k < CMD_MAX; k++) {
            ctx.fillStyle = k < lv ? b.color : '#303040';

        ctx.fillText(lv > 0 ? cmdEffectText(b.id, lv) : cmdEffectText(b.id, 1), r.x + r.w / 2, r.y + 120);

        const bb = cmdBuyRect(i);
        if (maxed) {
            drawRR(bb.x, bb.y, bb.w, bb.h, 6, '#1a1608', '#ffd700', 1.5);
            ctx.fillStyle = '#ffd700'; ctx.font = 'bold 11px monospace';

            drawRR(bb.x, bb.y, bb.w, bb.h, 6, '#151520', '#33334a', 1);
            ctx.fillStyle = '#66667a'; ctx.font = 'bold 10px monospace';
            ctx.fillText(t('cmd_locked'), bb.x + bb.w / 2, bb.y + bb.h / 2);

            ctx.fillStyle = canBuy ? '#2ecc71' : '#666'; ctx.font = 'bold 11px monospace';
            ctx.fillText(t('cmd_spend') + '  ' + t('cmd_cost', cost), bb.x + bb.w / 2, bb.y + bb.h / 2);

    });

    // Ascension panel
    const panel = { x: 62, y: 326, w: W - 124, h: 150 };
    const gain = ascensionGain();
    const ready = gain > 0;
    drawRR(panel.x, panel.y, panel.w, panel.h, 12, ready ? '#211908' : '#101018', ready ? '#ffd700' : '#3a3450', ready ? 2 : 1.5);
    ctx.fillStyle = ready ? '#ffd700' : '#a78bfa'; ctx.font = 'bold 15px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t('asc_title'), W / 2, panel.y + 24);
    ctx.fillStyle = '#c8c1d8'; ctx.font = '12px monospace';

    ctx.fillStyle = '#7f7892'; ctx.font = '10px monospace';
    ctx.fillText(t('asc_keep'), W / 2, panel.y + 78);
    ctx.fillStyle = '#6f6688';
    ctx.fillText(t('ars_total', arsTotalLevels()) + '  ·  ' + t('wave_label', saveData.stats ? (saveData.stats.maxWave | 0) : 0), W / 2, panel.y + 102);

    const ab = CMD_ASC_BTN;
    drawRR(ab.x, ab.y, ab.w, ab.h, 8, ready ? '#2a200a' : '#151520', ready ? '#ffd700' : '#33334a', ready ? 2.2 : 1.2);
    ctx.fillStyle = ready ? '#ffd700' : '#55556a'; ctx.font = 'bold 13px monospace';
    ctx.fillText(ready ? t('asc_do') + '  +' + gain : t('asc_do'), ab.x + ab.w / 2, ab.y + ab.h / 2);
}
function handleCommandClick(px, py) {
    const bk = CMD_BACK_BTN;
    if (px >= bk.x && px <= bk.x + bk.w && py >= bk.y && py <= bk.y + bk.h) { STATE = 'arsenal'; return; }
    for (let i = 0; i < CMD_BRANCHES.length; i++) {
        const bb = cmdBuyRect(i);
        if (px >= bb.x && px <= bb.x + bb.w && py >= bb.y && py <= bb.y + bb.h) {
            cmdSpend(CMD_BRANCHES[i].id); return;
        }
    }
    const ab = CMD_ASC_BTN;
    if (px >= ab.x && px <= ab.x + ab.w && py >= ab.y && py <= ab.y + ab.h) { ascendArsenal(); return; }
}

// ── DAILY OPS hub (Pass 2 — login + quests + idle, MENU-only per Codex) ──────

function drawDaily() {

    ctx.fillText(t('dh_login'), colX, y + 8);
    const avail = dailyAvailable();

    // ── Section 3: IDLE SALVAGE ──

    ctx.fillText(t('dh_idle'), colX, y + 6);
    ctx.fillStyle = '#7a7a90'; ctx.font = '10px monospace'; ctx.textAlign = 'right';

// ── Main draw ─────────────────────────────────────────────────────────────────
function draw() {
    ctx.clearRect(0, 0, W, H);
    if (STATE === 'menu')      { drawMenu(); drawAchToasts(); return; }
    if (STATE === 'upgrades')  { drawUpgrades(); return; }
    if (STATE === 'store')     { drawStore(); return; }
    if (STATE === 'blueprints'){ drawBlueprints(); return; }
    if (STATE === 'arsenal')   { drawArsenal(); drawAchToasts(); return; }
    if (STATE === 'command')   { drawCommand(); drawAchToasts(); return; }
    if (STATE === 'daily')     { drawDaily(); drawAchToasts(); return; }

    ctx.fillStyle = '#0d0d18'; ctx.fillRect(0, 0, W, H);
    // World screen-shake: the whole battlefield (lane + grid + impact particles) is
    // shaken by ONE shared offset so nothing detaches (merge FX stay glued to their
    // cells, impact FX to their enemies). The HUD/overlays stay rock-steady. Offsets
    // are small (<=5px) and brief, and only fire at non-precise-interaction moments,
    // so taps still land — verified by the 4-viewport click + state-cycle gate.
    let _sx = 0, _sy = 0;
    if (shakeMag > 0.1) { _sx = (Math.random()*2-1)*shakeMag; _sy = (Math.random()*2-1)*shakeMag; }
    ctx.save(); ctx.translate(_sx, _sy);
    drawLane();
    drawGrid();
    drawParticles();
    ctx.restore();
    drawHUD();
    if (STATE === 'play' || STATE === 'tutorial') drawNextGoal();
    drawBossUI();
    drawUltButton();
    drawAchToasts();
    drawFloats();

    // Airstrike screen flash (dimmed under reduce-motion).
    if (ultFlashTimer > 0) {
        ctx.save();
        ctx.globalAlpha = (ultFlashTimer / 18) * 0.5 * _flashScale;
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
        ctx.restore();
    }

    if (STATE === 'tutorial')   drawTutorial();
    if (STATE === 'results')    drawResults();
    if (STATE === 'resurrect')  drawResurrect();
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop() {
    _frame++;   // advances every frame (even on menus/pause) — drives UI + sprite motion
    // Decay the world shake here (NOT in update) so a lethal wall-hit shake settles
    // even in resurrect/results/pause, where update() early-returns but draw() still
    // renders the battlefield behind the overlay.
    if (shakeT > 0) { shakeT--; shakeMag *= 0.85; if (shakeT === 0) shakeMag = 0; }
    try { update(); } catch(e) { _showGameError('update: ' + (e.message || e)); }
    try { draw();   } catch(e) { _showGameError('draw: '   + (e.message || e)); }
    requestAnimationFrame(loop);
}

        // loop). On platform builds that's fine — the tutorial IS gameplay.
        initGame();

        // player away from the meta (Build Hygiene #13).

    // see the no-ops. Without this the wall-breached modal appears late in the
    // 18s capture and overlays gameplay frames.
    maxHp = 20; hp = 20;
    endRun = function () { hp = 20; };
    offerResurrect = function () { hp = 20; };
    var _hpPin = setInterval(function () { hp = 20; }, 16);
    setTimeout(function () { clearInterval(_hpPin); }, 18000);
    if (typeof startWave === 'function') startWave();
    // Timeline of merge / buy / wave actions. Each tries to pick the
    // first two adjacent guns of the named tier; if none exist, no-op.
    var T0 = performance.now();
    function findPair(tier) {
        var a = null;
        for (var i = 0; i < guns.length; i++) {
            if (guns[i].tier === tier) {
                if (!a) { a = guns[i]; }
                else { return [a, guns[i]]; }
            }
        }
        return null;
    }
    function doMerge(tier) {
        var pair = findPair(tier);
        if (!pair) return;
        selected = { col: pair[0].col, row: pair[0].row };
        try { tryMerge(pair[1].col, pair[1].row); } catch (e) {}
    }
    var TIMELINE = [
        [1500, function () { doMerge(0); }],
        [3000, function () { doMerge(0); }],
        [4500, function () { doMerge(1); }],
        [6000, function () { if (typeof buyGun === 'function') { gold = 9999; buyGun(); } }],
        [7500, function () { doMerge(2); }],
        [9000, function () { doMerge(0); }],
        [10500, function () { doMerge(3); }],
        [12000, function () { if (typeof buyGun === 'function') { gold = 9999; buyGun(); } }],
        [13500, function () { doMerge(1); }],
        [15000, function () { doMerge(4); }],
        [16500, function () { doMerge(2); }],
    ];
    TIMELINE.forEach(function (entry) {
        setTimeout(entry[1], entry[0]);
    });
    loop();
}
window._setupForPromo = setupPromoClimax;
try {
    var _promoQ = new URLSearchParams(location.search);
    if (_promoQ.get('promo') === 'climax') {
        setTimeout(setupPromoClimax, 50);
    }
} catch (_) {}

const _sdkTimeout = setTimeout(_startGameLoop, 3000);
try {
    const pg = window.bridge || window.playgamaBridge;
    if (pg && typeof pg.initialize === 'function') {
        clearTimeout(_sdkTimeout);
        const pgTimeout = setTimeout(_startGameLoop, 8000);
        pg.initialize({ configFilePath: 'playgama-bridge-config.json' }).then(function () {
            clearTimeout(pgTimeout);
            playgamaBridge = pg;
            window.playgamaBridge = pg;
            detectLang();
            _pgRegisterRuntimeEvents();
            loadPlaygamaSaveThenStart(_startGameLoop);
        }).catch(function () {
            clearTimeout(pgTimeout);
            _startGameLoop();
        });
    } else if (typeof YaGames !== 'undefined' && YaGames.init) {
        YaGames.init().then(function(sdk) {
            clearTimeout(_sdkTimeout);
            ysdk = sdk; window.ysdk = sdk;
            detectLang(); // override navigator guess with SDK language
            initPayments(); // restore ad-free / VIP ownership
            try {
                sdk.on('game_api_pause', function() {
                    _gamePaused = true;
                    _prePauseMuted = _muted; _muted = true;
                });
                sdk.on('game_api_resume', function() {
                    _gamePaused = false;
                    _muted = _prePauseMuted;
                });
            } catch(e) {}
            _startGameLoop();
        }).catch(function() {
            clearTimeout(_sdkTimeout);
            _startGameLoop();
        });
    } else if (window.CrazyGames && window.CrazyGames.SDK && typeof window.CrazyGames.SDK.init === 'function') {
        // CrazyGames branch (parallel to Yandex, no shim). CG SDK v3: init() MUST
        // resolve before any game.* call. Order: init() -> loadingStart() -> start
        // the loop -> loadingStop() (game is interactive).
        window.CrazyGames.SDK.init().then(function () {
            clearTimeout(_sdkTimeout);
            crazygamesSDK = window.CrazyGames.SDK;
            try { crazygamesSDK.game.loadingStart(); } catch (e) {}
            try {
                var info = crazygamesSDK.user && crazygamesSDK.user.systemInfo;
                if (info && info.countryCode) {
                    var cc = String(info.countryCode).toUpperCase();
                    if (cc === 'RU' || cc === 'BY' || cc === 'KZ') lang = 'ru';
                }
            } catch (e) {}
            _startGameLoop();
            try { crazygamesSDK.game.loadingStop(); } catch (e) {}
        }).catch(function () {
            clearTimeout(_sdkTimeout);
            _startGameLoop();
        });
    } else {
        clearTimeout(_sdkTimeout);
        _startGameLoop();
    }
} catch(e) {
    clearTimeout(_sdkTimeout);
    _startGameLoop();
}
