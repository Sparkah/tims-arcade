// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
// Fixed 800x600 world (gameplay geometry stays exactly as designed/approved on
// Yandex). On CrazyGames the build is orientation-locked to landscape, so portrait
// phones get a rotate prompt and landscape fills the height; the dark page bg
// (#0a0a0f) matches the canvas so any ultrawide pillarbox blends in, not a void.
const W = 800, H = 600;

function resize() {
    const s = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.width  = W; canvas.height = H;
    canvas.style.width  = (W * s) + 'px';
    canvas.style.height = (H * s) + 'px';
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);

// Prevent pull-to-refresh, swipe nav, and context menu (Yandex rules 1.6.2.7, 1.10.2)
document.addEventListener('touchmove',   e => e.preventDefault(), { passive: false });
document.addEventListener('wheel',       e => e.preventDefault(), { passive: false });
document.addEventListener('contextmenu', e => e.preventDefault());

// Game loop error overlay — visible to user, never to DevTools (rule 1.14)
let _errShown = false;
function _showGameError(msg) {
    if (_errShown) return; _errShown = true;
    const d = document.createElement('div');
    d.style.cssText = 'position:fixed;top:0;left:0;background:rgba(200,0,0,0.88);color:#fff;padding:8px;font-size:12px;z-index:9999;max-width:100%';
    d.textContent = msg;
    document.body.appendChild(d);
    setTimeout(() => { d.remove(); _errShown = false; }, 8000);
}

// ── Asset loader ──────────────────────────────────────────────────────────────
const IMGS = {};
const GUN_SPRITES   = ['gun_t1_pistol','gun_t2_rifle','gun_t3_smg','gun_t4_sniper',
                        'gun_t5_minigun','gun_t6_cannon','gun_t7_laser','gun_t8_plasma'];
const ENEMY_SPRITES = ['enemy_t1_crawler','enemy_t2_walker','enemy_t3_mech','enemy_t4_boss'];

[...GUN_SPRITES, ...ENEMY_SPRITES].forEach(id => {
    const img = new Image();
    img.src = 'assets/' + id + '.png';
    IMGS[id] = img;
});

function imgReady(id) {
    const img = IMGS[id];
    return img && img.complete && img.naturalWidth > 0;
}

// ── Audio engine (Web Audio API — no files) ───────────────────────────────────
let _ac = null;
let _muted = false;

function ac() {
    if (!_ac) { try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
    if (_ac && _ac.state === 'suspended') _ac.resume();
    return _ac;
}

function _play(fn) {
    if (_muted) return;
    const ctx2 = ac();
    if (!ctx2) return;
    try { fn(ctx2); } catch(e) {}
}

function sfxShoot(tier) { _play(ctx2 => {
    const g = ctx2.createGain();
    g.gain.setValueAtTime(0.18 - tier * 0.01, ctx2.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + 0.12);
    g.connect(ctx2.destination);
    const o = ctx2.createOscillator();
    const freqs = [520, 460, 400, 340, 600, 280, 800, 240];
    o.type = tier >= 6 ? 'sawtooth' : 'square';
    o.frequency.setValueAtTime(freqs[tier] || 400, ctx2.currentTime);
    o.frequency.exponentialRampToValueAtTime((freqs[tier] || 400) * 0.4, ctx2.currentTime + 0.1);
    o.connect(g); o.start(); o.stop(ctx2.currentTime + 0.12);
}); }

function sfxMerge() { _play(ctx2 => {
    for (let i = 0; i < 3; i++) {
        const g = ctx2.createGain();
        const t = ctx2.currentTime + i * 0.07;
        g.gain.setValueAtTime(0.22, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
        g.connect(ctx2.destination);
        const o = ctx2.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(440 + i * 220, t);
        o.connect(g); o.start(t); o.stop(t + 0.18);
    }
}); }

function sfxBuy() { _play(ctx2 => {
    const g = ctx2.createGain();
    g.gain.setValueAtTime(0.2, ctx2.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + 0.15);
    g.connect(ctx2.destination);
    const o = ctx2.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(660, ctx2.currentTime);
    o.frequency.exponentialRampToValueAtTime(880, ctx2.currentTime + 0.12);
    o.connect(g); o.start(); o.stop(ctx2.currentTime + 0.15);
}); }

function sfxWallHit() { _play(ctx2 => {
    const buf = ctx2.createBuffer(1, ctx2.sampleRate * 0.25, ctx2.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
    const src = ctx2.createBufferSource();
    src.buffer = buf;
    const g = ctx2.createGain();
    g.gain.setValueAtTime(0.35, ctx2.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + 0.25);
    const filt = ctx2.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 180; filt.Q.value = 0.8;
    src.connect(filt); filt.connect(g); g.connect(ctx2.destination);
    src.start(); src.stop(ctx2.currentTime + 0.25);
}); }

function sfxWaveClear() { _play(ctx2 => {
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
        const t = ctx2.currentTime + i * 0.12;
        const g = ctx2.createGain();
        g.gain.setValueAtTime(0.2, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        g.connect(ctx2.destination);
        const o = ctx2.createOscillator();
        o.type = 'sine'; o.frequency.value = freq;
        o.connect(g); o.start(t); o.stop(t + 0.3);
    });
}); }

function sfxGameOver() { _play(ctx2 => {
    const notes = [392, 330, 294, 220];
    notes.forEach((freq, i) => {
        const t = ctx2.currentTime + i * 0.18;
        const g = ctx2.createGain();
        g.gain.setValueAtTime(0.22, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        g.connect(ctx2.destination);
        const o = ctx2.createOscillator();
        o.type = 'sawtooth'; o.frequency.value = freq;
        o.connect(g); o.start(t); o.stop(t + 0.35);
    });
}); }

function sfxAchievement() { _play(ctx2 => {
    const notes = [523, 659, 784, 659, 1047];
    notes.forEach((freq, i) => {
        const t = ctx2.currentTime + i * 0.09;
        const g = ctx2.createGain();
        g.gain.setValueAtTime(0.18, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
        g.connect(ctx2.destination);
        const o = ctx2.createOscillator();
        o.type = 'sine'; o.frequency.value = freq;
        o.connect(g); o.start(t); o.stop(t + 0.22);
    });
}); }

// Background music (procedural loop, no files). Mutes with the game via _muted.
let _musGain = null, _musOn = false, _musStep = 0, _musNext = 0, _musTimer = null;
const _MUS = { bpm: 104, roots: [220.00, 196.00, 246.94, 174.61] }; // Am-G-B-Fmaj cycle
function _musNote(type, freq, t, dur, vol) {
    const c = _ac; if (!c || !_musGain) return;
    const g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    g.connect(_musGain);
    const o = c.createOscillator();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    o.connect(g); o.start(t); o.stop(t + dur + 0.02);
}
function _musTick() {
    const c = ac(); if (!c || !_musGain) return;
    _musGain.gain.value = _muted ? 0 : 0.45;   // tracks mute button / ad-mute / tab-hide live
    const spb = 60 / _MUS.bpm, stepDur = spb / 2;
    const contour = [0, 7, 12, 7, 3, 10, 7, 3];
    while (_musNext < c.currentTime + 0.25) {
        const t = Math.max(_musNext, c.currentTime + 0.02);
        const bar = Math.floor(_musStep / 8) % _MUS.roots.length;
        const root = _MUS.roots[bar], inBar = _musStep % 8;
        if (inBar === 0) {
            _musNote('triangle', root, t, spb * 3.6, 0.05);
            _musNote('triangle', root * Math.pow(2, 7 / 12), t, spb * 3.6, 0.038);
        }
        if (inBar === 0 || inBar === 4) _musNote('sine', root / 2, t, spb * 0.9, 0.09);
        _musNote('square', root * Math.pow(2, contour[inBar] / 12), t, stepDur * 0.9, 0.022);
        _musStep++; _musNext += stepDur;
    }
}
// startMusic: looping background music bed, begins on first gesture, mutes with the game.
function startMusic() {
    const c = ac(); if (!c) return;
    if (!_musGain) { _musGain = c.createGain(); _musGain.gain.value = _muted ? 0 : 0.45; _musGain.connect(c.destination); }
    if (_musOn) return;
    _musOn = true; _musNext = c.currentTime + 0.12; _musTick();
    _musTimer = setInterval(_musTick, 90);
}

// Unlock audio on first user interaction (required by browsers)
let _audioUnlocked = false;
canvas.addEventListener('pointerdown', () => {
    if (_audioUnlocked) return;
    _audioUnlocked = true;
    ac();
    startMusic();
}, { once: false });

function t(key, ...args) {
    const s = STRINGS[lang] || STRINGS.en;
    const val = (s[key] !== undefined) ? s[key] : (STRINGS.en[key] || key);
    return typeof val === 'function' ? val(...args) : val;
}
function tierName(tier) { return t('gun' + tier); }
function upgName(id)    { return t('u_' + id + '_n'); }
function upgDesc(id)    { return t('u_' + id + '_d'); }
function achName(id)    { return t('a_' + id + '_n'); }
function achDesc(id)    { return t('a_' + id + '_d'); }
function rarityName(r)  { const rr = RARITY[r]; return rr ? (lang === 'ru' ? rr.ru : rr.name) : r; }
function skinName(s)    { return s ? (lang === 'ru' ? s.ru : s.name) : ''; }

function detectLang() {
    if (ysdk && ysdk.environment && ysdk.environment.i18n && ysdk.environment.i18n.lang) {
        const sl = ysdk.environment.i18n.lang;
        lang = ['ru','be','kk','uk','uz'].includes(sl) ? 'ru' : 'en';
        return; // must not fall through to navigator
    }
    if (playgamaBridge && playgamaBridge.platform && playgamaBridge.platform.language) {
        const sl = String(playgamaBridge.platform.language).toLowerCase();
        lang = ['ru','be','kk','uk','uz'].includes(sl) ? 'ru' : 'en';
        return;
    }
    const nl = (navigator.language || '').toLowerCase();
    lang = (nl.startsWith('ru')||nl.startsWith('be')||nl.startsWith('kk')||nl.startsWith('uk')||nl.startsWith('uz')) ? 'ru' : 'en';
}
detectLang(); // initial guess from navigator; overridden after SDK init

// ── GameAnalytics ────────────────────────────────────────────────────────────
const GA_PROGRESSION_START = 1;
const GA_PROGRESSION_COMPLETE = 2;
const GA_PROGRESSION_FAIL = 3;
let _gaReady = false;
let _gaInitTried = false;
let _gaPlatform = 'local';

function gaPlatform() {
    if (playgamaBridge || window.__MG_PLAYGAMA || window.__GAME_PLATFORM__ === 'playgama') return 'playgama';
    if (ysdk || typeof YaGames !== 'undefined') return 'yandex';
    if (crazygamesSDK || (window.CrazyGames && window.CrazyGames.SDK)) return 'crazygames';
    if (window.gp || window.__gpKey) return 'gamepush';
    return 'local';
}
function gaDeviceClass() {
    const sw = Math.min(screen.width || 0, screen.height || 0);
    if (sw && sw < 600) return 'mobile';
    if (sw && sw < 1000 && navigator.maxTouchPoints > 0) return 'tablet';
    if (navigator.maxTouchPoints > 0 && window.innerWidth < 900) return 'mobile';
    return 'desktop';
}
function initGameAnalytics() {
    if (_gaInitTried) return;
    _gaInitTried = true;
    const cfg = window.__GAME_ANALYTICS_CONFIG || {};
    const key = String(cfg.gameKey || '').trim();
    const secret = String(cfg.gameSecret || '').trim();
    if (!cfg.enabled || !/^[A-Za-z0-9]{32}$/.test(key) || !/^[A-Za-z0-9]{40}$/.test(secret)) return;
    if (typeof window.GameAnalytics !== 'function') return;
    _gaPlatform = gaPlatform();
    const gaLang = (lang === 'ru') ? 'ru' : 'en';
    const gaDevice = gaDeviceClass();
    try {
        GameAnalytics('configureBuild', cfg.build || 'merge-guns');
        GameAnalytics('configureAvailableCustomDimensions01', cfg.customDimensions01 || ['local', 'playgama', 'yandex', 'crazygames', 'gamepush', 'other']);
        GameAnalytics('configureAvailableCustomDimensions02', cfg.customDimensions02 || ['en', 'ru', 'other']);
        GameAnalytics('configureAvailableCustomDimensions03', cfg.customDimensions03 || ['desktop', 'mobile', 'tablet', 'other']);
        GameAnalytics('setCustomDimension01', _gaPlatform);
        GameAnalytics('setCustomDimension02', gaLang);
        GameAnalytics('setCustomDimension03', gaDevice);
        GameAnalytics('initialize', key, secret);
        _gaReady = true;
        gaEvent('boot:ready');
    } catch (e) { _gaReady = false; }
}
function gaEvent(id, value) {
    if (!_gaReady || typeof window.GameAnalytics !== 'function') return;
    try {
        if (typeof value === 'number' && isFinite(value)) GameAnalytics('addDesignEvent', id, value);
        else GameAnalytics('addDesignEvent', id);
    } catch (e) {}
}
function gaProgress(status, p1, p2, p3, score) {
    if (!_gaReady || typeof window.GameAnalytics !== 'function') return;
    try {
        if (typeof score === 'number' && isFinite(score)) GameAnalytics('addProgressionEvent', status, p1, p2 || '', p3 || '', score);
        else GameAnalytics('addProgressionEvent', status, p1, p2 || '', p3 || '');
    } catch (e) {}
}
function gaFromTelemetry(type, data) {
    data = data || {};
    if (type === 'run_start') {
        gaProgress(GA_PROGRESSION_START, 'run', data.fast ? 'fast_start' : 'standard');
        gaEvent('run:start');
        return;
    }
    if (type === 'run_end') {
        gaProgress(GA_PROGRESSION_FAIL, 'run', 'wave_' + (data.wave || 0), '', data.score || 0);
        gaEvent('run:end:wave', data.wave || 0);
        return;
    }
    if (type === 'daily_claim') gaEvent('daily:claim', data.streak || 0);
    else if (type === 'streak_day') gaEvent('daily:streak', data.n || 0);
    else if (type === 'quest_complete') gaEvent('daily:quest_complete');
    else if (type === 'goal_shown') gaEvent('meta:goal_shown');
    else if (type === 'arsenal_level_up') gaEvent('meta:arsenal_level', data.level || 0);
    else if (type === 'command_level_up') gaEvent('meta:command_level', data.level || 0);
    else if (type === 'ascend') gaEvent('meta:ascend', data.stars || 0);
    else if (type === 'wall_breached') gaEvent('run:wall_breached', data.wave || 0);
    else gaEvent('event:' + String(type).replace(/[^A-Za-z0-9_\-.]/g, '_').slice(0, 40));
}

// ── Platform SDKs (Yandex / CrazyGames / Playgama Bridge) ─────────────────────
function _yadCall(fn) { try { if (ysdk) fn(ysdk); } catch(e) {} }
function _pgCall(fn) { try { if (playgamaBridge) fn(playgamaBridge); } catch(e) {} }
function _pgEventName(key, fallback) {
    return (playgamaBridge && playgamaBridge.EVENT_NAME && playgamaBridge.EVENT_NAME[key]) || fallback;
}
function _pgSendMessage(name, payload) {
    _pgCall(function (b) {
        if (!b.platform || typeof b.platform.sendMessage !== 'function') return;
        const r = payload ? b.platform.sendMessage(name, payload) : b.platform.sendMessage(name);
        if (r && typeof r.catch === 'function') r.catch(function () {});
    });
}
function _pgSetPaused(isPaused) {
    isPaused = !!isPaused;
    if (isPaused && !_gamePaused) {

// ── Arsenal (v2 — persistent OWNED weapon mastery) ───────────────────────────
// Salvage is an EARNED-ONLY currency (never buyable, never IAP — monetization
// stays on the cores track). Spent to level per-tier "mastery" tracks 0..ARS_MAX.
// Each level grants a SMALL, CAPPED passive to that gun tier ONLY. Tuned
// intentionally UNDERPOWERED + verified against a fixed-seed baseline so waves
// 1-19 stay within tolerance of the live build (Codex review 2026-06-14); it is
// easy to buff in Pass 3 once telemetry proves the economy.
const ARS_MAX = 5;
// Salvage cost per level (index = level being PURCHASED, 1..5). Late tiers cost
// more via a per-tier multiplier so high-tier mastery is aspirational.
const ARS_COST = [0, 25, 60, 140, 320, 700]; // [_, L1, L2, L3, L4, L5]
function arsTierMult(tier) {
    // bucketed: early 1.0x, mid 1.4x, late 2.0x
    if (tier <= 2) return 1.0;
    if (tier <= 4) return 1.4;
    return 2.0;
}
function arsCost(tier, curLv) {
    if (curLv >= ARS_MAX) return 0;
    return Math.round(ARS_COST[curLv + 1] * arsTierMult(tier));
}
// Per-run Salvage caps (anti-runaway — a strong player can't farm it; Codex).
const ARS_SALV_PER_MERGE = 1, ARS_CAP_MERGE = 25;
const ARS_SALV_PER_WAVE  = 2, ARS_CAP_WAVE  = 40;
const ARS_CAP_ENDBONUS   = 8; // run-end bonus = min(bestTier, 8)

// ── Pass 2 — the daily habit engine (Salvage faucets into the Arsenal) ───────
// Faucets are deliberately modest (Codex: total ~one cheap mastery level/day early;
// mastery EFFECT is hard-capped at +10% on T2+ regardless of Salvage, so a bigger
// faucet only buys levels a little faster, never breaks the wave 1-19 ceiling).
// IDLE: flat rate, capped at a 10h window AND capped per-UTC-day so re-collecting
// the same day cannot exceed the window (anti clock-abuse).
const IDLE_RATE_PER_HOUR = 6;
const IDLE_CAP_HOURS = 10;
const IDLE_CAP_MS = IDLE_CAP_HOURS * 3600 * 1000;
const IDLE_SALV_CAP_PER_DAY = IDLE_RATE_PER_HOUR * IDLE_CAP_HOURS; // 60/day max
// DAILY LOGIN Salvage bonus (added to the existing cores+keys claim; piggybacks
// claimDaily authority). Scales gently with streak, capped; day-7 milestone bonus.
function dailySalvageFor(streak) {
    const base = 12 + Math.min(6, Math.max(0, streak - 1)) * 2; // 12..24
    const milestone = (streak > 0 && streak % 7 === 0) ? 24 : 0; // weekly bonus
    return base + milestone;
}
// DAILY QUESTS: 3/day, UTC reset, each pays Salvage. Verbs from the core loop.
// `level_mastery` is deliberately EXCLUDED (self-referential / impossible when maxed;
// would make Salvage spend-to-earn — Codex). Targets are small so a quest completes
// in roughly one short run; reward is modest.

    wave_n:  { reward: 12, targets: [6, 8, 10],   ctr: function () { return wave; },             label: function (n) { return t('q_wave', n); } },

// ── Pass 3 — Command / Ascension structural layer ────────────────────────────
// This is the 10h+ loop: finish a meaningful Arsenal cycle, optionally ASCEND,
// reset Arsenal mastery/salvage, and spend earned Stars into one of three
// permanent doctrines. Fresh saves have 0 stars/levels, so wave 1-19 pacing is
// byte-stable until the player deliberately enters this late-game loop.
const CMD_MAX = 10;
const CMD_BRANCHES = [
    { id: 'overclock', color: '#e74c3c', nameKey: 'cmd_overclock_n', descKey: 'cmd_overclock_d' },
    { id: 'logistics', color: '#f1c40f', nameKey: 'cmd_logistics_n', descKey: 'cmd_logistics_d' },
    { id: 'bulwark',   color: '#3498db', nameKey: 'cmd_bulwark_n',   descKey: 'cmd_bulwark_d' },
];
const CMD_COST = [0, 1, 1, 2, 3, 4, 6, 8, 11, 15, 20]; // cost to buy Lv N
const ASC_REQ_MASTERY = 18;
const ASC_REQ_WAVE = 20;

function defaultCommand() {
    const tree = {};
    CMD_BRANCHES.forEach(function (b) { tree[b.id] = 0; });
    return { stars: 0, spent: 0, cycle: 0, bestWave: 0, lastGain: 0, tree: tree };
}
function sanitizeCommand() {
    const c = (saveData.command && typeof saveData.command === 'object') ? saveData.command : {};
    const srcTree = (c.tree && typeof c.tree === 'object') ? c.tree : {};
    const tree = {};
    CMD_BRANCHES.forEach(function (b) { tree[b.id] = Math.min(CMD_MAX, _safeCount(srcTree[b.id], CMD_MAX)); });
    saveData.command = {
        stars: _safeCount(c.stars, 1e6),
        spent: _safeCount(c.spent, 1e6),
        cycle: _safeCount(c.cycle, 1e5),
        bestWave: _safeCount(c.bestWave, 1e5),
        lastGain: _safeCount(c.lastGain, 1e6),
        tree: tree,
    };
}
function cmdLevel(id) {
    const c = saveData.command;
    return c && c.tree ? Math.min(CMD_MAX, _safeCount(c.tree[id], CMD_MAX)) : 0;
}
function cmdStars() {
    const c = saveData.command;
    return c ? _safeCount(c.stars, 1e6) : 0;
}
function cmdCost(id) {
    const lv = cmdLevel(id);
    if (lv >= CMD_MAX) return 0;
    return CMD_COST[lv + 1] || CMD_COST[CMD_COST.length - 1];
}
function cmdUnspentStars() { return cmdStars(); }
function cmdTotalLevels() {
    let n = 0;
    CMD_BRANCHES.forEach(function (b) { n += cmdLevel(b.id); });
    return n;
}
function cmdSpend(id) {
    const lv = cmdLevel(id);
    if (lv >= CMD_MAX) return false;
    const cost = cmdCost(id);
    if (cmdStars() < cost) return false;
    saveData.command.stars = _safeCount(saveData.command.stars - cost, 1e6);
    saveData.command.spent = _safeCount(saveData.command.spent + cost, 1e6);
    saveData.command.tree[id] = lv + 1;
    tel('command_level_up', { branch: id, level: lv + 1 });
    writeSave();
    try { sfxAchievement(); } catch (e) {}
    return true;
}
function cmdDamageMult() { return 1 + cmdLevel('overclock') * 0.03; }
function cmdGoldMult() { return 1 + cmdLevel('logistics') * 0.03; }
function cmdSalvageMult() { return 1 + cmdLevel('logistics') * 0.02; }
function cmdHpBonus() { return cmdLevel('bulwark') * 4; }

function ascensionGain() {
    const mastery = arsTotalLevels();
    const bestWave = saveData.stats ? (saveData.stats.maxWave | 0) : 0;
    const earned = saveData.arsenal ? _safeCount(saveData.arsenal.totalEarned, 1e9) : 0;
    if (mastery < ASC_REQ_MASTERY || bestWave < ASC_REQ_WAVE) return 0;
    const fromMastery = Math.floor(mastery / 6);
    const fromWave = Math.floor(bestWave / 10);
    const fromEarned = Math.floor(earned / 1400);
    return Math.max(1, Math.min(18, fromMastery + fromWave + fromEarned));
}
function canAscend() { return ascensionGain() > 0; }
function ascendArsenal() {
    const gain = ascensionGain();
    if (gain <= 0) return false;
    if (!saveData.command) saveData.command = defaultCommand();
    saveData.command.stars = _safeCount(saveData.command.stars + gain, 1e6);
    saveData.command.cycle = _safeCount(saveData.command.cycle + 1, 1e5);
    saveData.command.bestWave = Math.max(_safeCount(saveData.command.bestWave, 1e5), saveData.stats ? (saveData.stats.maxWave | 0) : 0);
    saveData.command.lastGain = gain;
    // Reset only the Arsenal cycle. Core upgrades, purchases, skins, quests,
    // achievements, maxTierEver and best-wave history remain owned.
    saveData.arsenal = defaultArsenal();
    tel('ascend', { stars: gain, cycle: saveData.command.cycle });
    writeSave();
    try { sfxAchievement(); } catch (e) {}
    spawnFloat(W / 2, H / 2 - 44, t('asc_done', gain), '#ffd700');
    return true;
}
// The passive bonus per mastery level. T0/T1 are EXCLUDED from the damage bonus
// (to keep the early curve safe) and instead get a tiny gold-on-kill perk.
const ARS_DMG_PER_LV = 0.02;  // +2% damage per level, max +10% at L5
function arsDmgMult(tier) {
    if (tier <= 1) return 1; // early tiers: no damage bonus (pacing safety)
    const lv = arsLevel(tier);
    return 1 + ARS_DMG_PER_LV * lv;
}
function arsGoldPerKill(tier) {
    // T0/T1 mastery gives +1 gold per kill per level instead of damage.
    if (tier > 1) return 0;
    return arsLevel(tier); // up to +5g/kill at L5
}
function arsLevel(tier) {
    const a = saveData.arsenal;
    if (!a || !a.mastery) return 0;
    const v = a.mastery['t' + tier];
    return (typeof v === 'number' && v > 0) ? Math.min(ARS_MAX, v | 0) : 0;
}
// A mastery track is reachable once the player has EVER reached that tier (uses
// the PERSISTENT maxTierEver, never relocked by a weak run). Tier 0 (Pistol) is
// always reachable. Centralized so every screen + the goal logic agree.
function arsTierReached(tier) {
    if (tier <= 0) return true;
    const mte = saveData.stats ? (saveData.stats.maxTierEver | 0) : 0;
    return mte >= tier;
}
function arsSalvage() {
    const a = saveData.arsenal;
    return a ? _safeCount(a.salvage, 1e7) : 0;
}
// Total mastery levels across all tracks (for the menu "Arsenal Lv N" badge).
function arsTotalLevels() {
    let n = 0;
    for (let i = 0; i < BASE_TIERS.length; i++) n += arsLevel(i);
    return n;
}

// Spend Salvage to level a mastery track. Returns true on success. Persists on
// this event (a real spend) — never per-frame. Cosmetic + tiny-power; cannot
// touch cores/IAP. Guarded so a double-tap can't over-spend.
let _arsBuying = false;
function arsBuyLevel(tier) {
    if (_arsBuying) return false;
    if (tier < 0 || tier >= BASE_TIERS.length) return false;
    const cur = arsLevel(tier);
    if (cur >= ARS_MAX) return false;
    const cost = arsCost(tier, cur);
    if (arsSalvage() < cost) return false;
    _arsBuying = true;
    saveData.arsenal.salvage = _safeCount(saveData.arsenal.salvage - cost, 1e7);
    saveData.arsenal.mastery['t' + tier] = cur + 1;
    tel('arsenal_level_up', { tier: tier, level: cur + 1 }); // record BEFORE the save so the event persists with it
    writeSave();
    try { sfxAchievement(); } catch (e) {}
    _arsLevelFx = { tier: tier, endFrame: _frame + 42 };   // UI-local level-up celebration (drawArsenal)
    _arsBuying = false;
    return true;
}

// ── NEXT GOAL (legible progression — fixes "progression unclear") ────────────
// Returns the single nearest ACTIONABLE objective as { key, title, sub }. `key`
// de-dupes the goal_shown telemetry. Priority: a near/affordable mastery first
// (the owned-meta pull), then an achievement wave, then the next tier to merge,
// then the first-run primer.
function nextGoal() {
    const salv = arsSalvage();
    // Is the player past the very first moments? A brand-new player (never earned
    // Salvage, never finished a run, no guns yet) should be taught the LOOP first,
    // not pointed at the Arsenal — otherwise the goal card reintroduces exactly the
    // progression confusion this pass fixes (Codex). Once they have Salvage / a run
    // / guns on the board, the owned-meta goal leads.
    const gamesPlayed = (saveData.stats && saveData.stats.gamesPlayed | 0) || 0;
    const hasGuns = !!(guns && guns.length);
    const engaged = salv > 0 || gamesPlayed > 0;

    // Late-game goals outrank another mastery click: once an Arsenal cycle can
    // convert into Stars, show the structural next step. If Stars are waiting,
    // point the player to Command choices instead of letting them hoard blindly.
    if (cmdUnspentStars() > 0) {
        return {
            key: 'command_spend_' + cmdUnspentStars(),
            title: t('goal_cmd_spend', cmdUnspentStars()),
            sub: t('goal_cmd_sub'),
        };
    }
    const ascGain = ascensionGain();
    if (ascGain > 0) {
        return {
            key: 'ascend_' + ascGain,
            title: t('goal_ascend', ascGain),
            sub: t('goal_ascend_sub'),
        };
    }

    // 1) Nearest reachable, non-maxed mastery track (cheapest next level wins) —
    //    only once engaged.
    if (engaged) {
        let bestTier = -1, bestCost = Infinity;
        for (let i = 0; i < BASE_TIERS.length; i++) {
            const lv = arsLevel(i);
            if (lv >= ARS_MAX) continue;
            if (!arsTierReached(i)) continue;
            const cost = arsCost(i, lv);
            if (cost < bestCost) { bestCost = cost; bestTier = i; }
        }
        if (bestTier >= 0) {
            const need = Math.max(0, bestCost - salv);
            return {
                key: 'master_' + bestTier + '_' + arsLevel(bestTier),
                title: t('goal_master', tierName(bestTier)),
                sub: need <= 0 ? t('goal_master_close') : t('goal_master_sub', need),
            };
        }
    }
    // 1b) A TRUE fresh player (never engaged, no guns on the board yet, wave 0) is
    // taught the loop FIRST — before any wave goal, so wave=0 doesn't surface
    // "reach wave 5" to someone who hasn't bought a gun (Codex Pass-1 follow-up).
    if (!engaged && !hasGuns && (wave | 0) === 0) {
        return { key: 'first', title: t('goal_first'), sub: t('goal_first_sub') };
    }
    // 2) Next achievement wave (5 / 10 / 20).
    const waveGoals = [
        { w: 5,  id: 'wave_5' }, { w: 10, id: 'wave_10' }, { w: 20, id: 'wave_20' },
    ];
    for (const g of waveGoals) {
        if (wave < g.w && !saveData.achievements.includes(g.id)) {
            return { key: 'wave_' + g.w, title: t('goal_wave', g.w), sub: t('goal_wave_sub', achName(g.id)) };
        }
    }
    // 3) The next tier to unlock by merging (if the top gun isn't max tier).
    if (hasGuns) {
        const top = Math.max.apply(null, guns.map(g => g.tier));
        if (top < BASE_TIERS.length - 1) {
            return { key: 'tier_' + (top + 1), title: t('goal_tier', tierName(top + 1)), sub: t('goal_tier_sub') };
        }
    }
    // 4) First-run primer (the default for a brand-new player with no guns yet).
    return { key: 'first', title: t('goal_first'), sub: t('goal_first_sub') };
}

// Session-end hook string: the cheapest non-maxed reachable mastery and how much
// Salvage remains to its next level. Conservative — states the gap, promises nothing.
function sessionEndHook() {
    const waitingStars = cmdUnspentStars();
    if (waitingStars > 0) return t('res_hook_cmd', waitingStars);
    const ascGain = ascensionGain();
    if (ascGain > 0) return t('res_hook_ascend', ascGain);
    const salv = arsSalvage();
    let bestTier = -1, bestCost = Infinity;
    for (let i = 0; i < BASE_TIERS.length; i++) {
        const lv = arsLevel(i);
        if (lv >= ARS_MAX) continue;
        const reached = arsTierReached(i);
        if (!reached) continue;
        const cost = arsCost(i, lv);
        if (cost < bestCost) { bestCost = cost; bestTier = i; }
    }
    if (bestTier < 0) return null;
    const need = Math.max(0, bestCost - salv);
    if (need <= 0) return t('res_hook_close', tierName(bestTier), 0); // affordable now → still a nudge
    return t('res_hook_close', tierName(bestTier), need);
}

// ── Local telemetry (D1/D7 API is dark) ──────────────────────────────────────
// Append a small event to a capped ring buffer persisted in the save. NO network,
// NO PII — local-only proxy signals readable via the __mergeGunsTest seam. Cheap
// and idempotent; safe to call from event handlers (never per-frame).
const TEL_MAX = 50;
function tel(type, data) {
    try {
        if (!Array.isArray(saveData.tel)) saveData.tel = [];
        saveData.tel.push({ t: type, d: data || {}, ts: Date.now() });
        if (saveData.tel.length > TEL_MAX) saveData.tel.splice(0, saveData.tel.length - TEL_MAX);
        gaFromTelemetry(type, data);
    } catch (e) {}
}

// ── Pass 2 — daily habit engine logic ────────────────────────────────────────
// One shared clock-abuse guard for ALL reset buckets (daily / quests / idle): the
// UTC "today" used for resets only ever moves FORWARD. If the device clock is rolled
// back to a past day, effectiveDay() returns the furthest day already seen, so a
// player cannot re-trigger daily login / fresh quests / idle by winding the clock
// back (Codex). Forward jumps are bounded separately (idle is capped per day + by the
// 10h window; daily login is naturally once-per-day).
function effectiveUtcDay() {
    const today = _utcDate(0);
    const h = saveData.habit || (saveData.habit = defaultHabit());
    const seen = h.maxUtcDaySeen;
    // Advance the high-water mark only forward.
    if (!seen || today > seen) { h.maxUtcDaySeen = today; return today; }
    // today <= seen: clock at or behind the furthest day seen → use the high-water day.
    return seen;
}

// Grant SALVAGE into the Arsenal (the single faucet sink). Persists by caller.
function grantSalvage(n) {
    n = _safeCount(n, 1e6);
    if (n <= 0) return 0;
    if (!saveData.arsenal) saveData.arsenal = defaultArsenal();
    saveData.arsenal.salvage = _safeCount(saveData.arsenal.salvage + n, 1e7);
    saveData.arsenal.totalEarned = _safeCount((saveData.arsenal.totalEarned | 0) + n, 1e9);
    return n;
}

// Generate the day's 3 quests if the UTC day rolled over. Seeded by date so the set
// is stable within a day. The FIRST-EVER Pass-2 day seeds partial progress (momentum
// transfer) but never to a claimable level; later days start at 0 with small targets
// that complete in roughly one short run.
function _questRng(seedStr) {
    // tiny deterministic string-seeded PRNG (mulberry32 over a hashed seed)
    let hh = 1779033703 ^ seedStr.length;
    for (let i = 0; i < seedStr.length; i++) { hh = Math.imul(hh ^ seedStr.charCodeAt(i), 3432918353); hh = (hh << 13) | (hh >>> 19); }
    let a = hh >>> 0;
    return function () { a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
}
function ensureDailyQuests() {
    const h = saveData.habit || (saveData.habit = defaultHabit());
    const day = effectiveUtcDay();
    if (h.quests.day === day && h.quests.list.length) return; // already generated for today
    const rng = _questRng('mgq:' + day);
    // pick 3 distinct quest types
    const pool = QUEST_TYPE_ORDER.slice();
    const picked = [];
    while (picked.length < 3 && pool.length) { picked.push(pool.splice((rng() * pool.length) | 0, 1)[0]); }
    const firstEver = !h.quests.firstDayDone;
    h.quests.list = picked.map(function (type) {
        const def = QUEST_DEFS[type];
        const target = def.targets[(rng() * def.targets.length) | 0];
        // First-ever day: seed 40-70% but strictly below claimable (target-1 max).
        let prog = 0;
        if (firstEver) prog = Math.min(target - 1, Math.floor(target * (0.40 + rng() * 0.30)));
        return { id: type + '_' + target, type: type, target: target, prog: prog, claimed: false };
    });
    h.quests.day = day;
    h.quests.firstDayDone = true;
}

// Quest progress is cumulative across runs. The quest counters (runMerges/runKills/
// runWavesCleared/wave) reset to 0 each run, so we snapshot each unclaimed quest's
// stored prog as a BASE at run start, then prog = base + liveCounter. Called at
// wave-end and when the hub opens — NEVER per-frame (Codex: no per-kill save).
let _questRunBase = null;
function questRunStart() {
    const h = saveData.habit; if (!h || !h.quests) return;
    _questRunBase = {};
    h.quests.list.forEach(function (q) { _questRunBase[q.id] = q.prog; });
}
function questProgressTick() {
    const h = saveData.habit; if (!h || !h.quests || !h.quests.list.length) return false;
    if (!_questRunBase) _questRunBase = {};
    let changed = false;
    h.quests.list.forEach(function (q) {
        if (q.claimed) return;
        const def = QUEST_DEFS[q.type]; if (!def) return;
        const base = _questRunBase[q.id] | 0;
        const live = _safeCount(def.ctr(), 1e7);
        const np = Math.min(q.target, base + live);
        if (np > q.prog) { q.prog = np; changed = true; }
    });
    return changed;
}

function questClaimable(q) { return q && !q.claimed && q.prog >= q.target; }
function dailyQuestsClaimableCount() {
    const h = saveData.habit; if (!h || !h.quests) return 0;
    return h.quests.list.filter(questClaimable).length;
}
function claimQuest(idx) {
    const h = saveData.habit; if (!h || !h.quests) return false;
    const q = h.quests.list[idx];
    if (!questClaimable(q)) return false;
    q.claimed = true;
    const def = QUEST_DEFS[q.type];
    const r = grantSalvage(def ? def.reward : 0);
    tel('quest_complete', { id: q.id });
    writeSave();
    try { sfxAchievement(); } catch (e) {}
    spawnFloat(W / 2, H / 2 - 40, t('daily_salvage', r), '#e0a85a');
    return true;
}

// ── Idle accrual (capped, clock-abuse-guarded) ───────────────────────────────
// Pending Salvage WITHOUT mutating state (display-safe). Returns { salv, hours, ms }.
function idleSalvagePending() {
    const h = saveData.habit; if (!h) return { salv: 0, hours: 0, ms: 0 };
    const now = Date.now();
    let last = Number(h.lastSeenMs);
    if (!isFinite(last) || last <= 0 || last > now) return { salv: 0, hours: 0, ms: 0 }; // missing/future → 0
    let ms = now - last;
    if (ms < 0) ms = 0;
    if (ms > IDLE_CAP_MS) ms = IDLE_CAP_MS;            // window cap (10h)
    // Per-UTC-day credited cap: never pay more than IDLE_SALV_CAP_PER_DAY of idle today.
    const day = effectiveUtcDay();
    const creditedMs = (h.idleCreditedDay === day) ? _safeCount(h.idleCreditedMs, IDLE_CAP_MS) : 0;
    const remainingMsToday = Math.max(0, IDLE_CAP_MS - creditedMs);
    if (ms > remainingMsToday) ms = remainingMsToday;
    const salv = Math.floor((ms / 3600000) * IDLE_RATE_PER_HOUR);
    return { salv: salv, hours: ms / 3600000, ms: ms };
}
// Collect the pending idle Salvage (deliberate button press). Mutates + saves.
function collectIdle() {
    const p = idleSalvagePending();
    const now = Date.now();
    const h = saveData.habit;
    // Always re-anchor lastSeenMs to now on collect (even if 0 paid) so a future/back
    // clock is corrected and cannot accumulate a phantom payout.
    h.lastSeenMs = now;
    if (p.salv > 0) {
        const day = effectiveUtcDay();
        if (h.idleCreditedDay !== day) { h.idleCreditedDay = day; h.idleCreditedMs = 0; }
        h.idleCreditedMs = Math.min(IDLE_CAP_MS, (h.idleCreditedMs | 0) + p.ms);
        const r = grantSalvage(p.salv);
        tel('idle_claim', { amount: r, hours: Math.round(p.hours * 10) / 10 });
        writeSave();
        try { sfxAchievement(); } catch (e) {}
        spawnFloat(W / 2, H / 2 - 40, t('daily_salvage', r), '#e0a85a');
        return r;
    }
    writeSave();
    return 0;
}
// Re-anchor lastSeenMs to now (idempotent). Called on pagehide / tab-hide so a
// mid-session away period doesn't pay idle for time the player wasn't really gone,
// and so the NEXT real away period accrues from the right baseline.
let _seenNotedAt = 0;
function noteSeen() {
    const h = saveData.habit; if (!h) return;
    const now = Date.now();
    if (now - _seenNotedAt < 500) return; // idempotent against double pagehide+visibility
    _seenNotedAt = now;
    h.lastSeenMs = now;
    try { writeSave(); } catch (e) {}
}
// Anything claimable across the whole habit hub (drives the in-run badge + menu glow).
function habitClaimable() {
    return dailyAvailable() || dailyQuestsClaimableCount() > 0 || idleSalvagePending().salv > 0;
}

// ── Save / load ───────────────────────────────────────────────────────────────
const SAVE_KEY = 'mergeGuns_save';
let saveData; // { cores, upgrades:{id:level}, achievements:[id,...], stats:{...} }

// Current save schema version. v1 = the live (pre-2026-06-14) shape with NO `v`
// field. v2 added Arsenal, v3 added Daily Ops, v4 adds Command/Ascension. The
// loader ACCEPTS older shapes and normalizes in memory; it only writes after a
// real event, so returning live players are never written-over on load.
const SAVE_VERSION = 4; // v4 = Pass 3 (Command Stars + Ascension doctrines)

function defaultArsenal() {
    // mastery: per gun-tier level 0..ARS_MAX, keyed by tier index 0..7.
    return {
        salvage: 0,
        mastery: Object.fromEntries(BASE_TIERS.map((_, i) => ['t' + i, 0])),
        totalEarned: 0, // lifetime Salvage earned (stat / session-end framing)
    };
}

// Pass 2 — the daily habit block. All Salvage faucets (login/streak/quests/idle)
// feed the Pass-1 Arsenal. Clock-abuse guards live in the idle + reset logic.
//   lastSeenMs       : wall-clock ms of last idle settlement (seeded to now on migrate).
//   idleCreditedDay  : UTC date the idle daily-cap counter applies to.
//   idleCreditedMs   : idle ms already PAID toward today's cap (resets each UTC day).
//   maxUtcDaySeen    : the furthest-forward UTC day ever seen (rollback guard — a day
//                      older than this does NOT reset daily/quests/idle = no date-farming).
//   dailySalvageDay  : UTC date the streak-Salvage bonus was last granted (piggybacks
//                      claimDaily authority; here only to render "already taken today").
//   quests           : { day:null|'<utc>', list:[{id,type,target,prog,claimed}], seeded:bool }
function defaultHabit() {
    return {
        lastSeenMs: 0,
        idleCreditedDay: null,
        idleCreditedMs: 0,
        maxUtcDaySeen: null,
        quests: { day: null, list: [], firstDayDone: false },
    };
}

function defaultSave() {
    return {
        v: SAVE_VERSION,
        cores: 0,
        upgrades: Object.fromEntries(Object.keys(UPGRADE_DEFS).map(k => [k, 0])),
        achievements: [],
        tutorialDone: false,
        iap: { noads: false, vip: false, starterGranted: false }, // cache; Yandex getPurchases() is source of truth
        daily: { lastClaim: null, streak: 0 }, // daily login reward (UTC date string)
        // Blueprint collection (additive cosmetic meta — NEVER touches cores/IAP/combat).
        //   keys  : earned-only soft currency (from play + daily); cannot be bought.
        //   owned : { skinId: true } unlocked cosmetic weapon skins.
        //   pity  : opens since the last Epic+; guarantees a pity drop at COLL_PITY.
        //   opened: lifetime crate count (for the social-proof ticker + stats).
        coll: { keys: 0, owned: {}, pity: 0, opened: 0 },
        // Arsenal (v2 — persistent OWNED weapon mastery). Salvage is earned-only,
        // NEVER buyable / NEVER from IAP (monetization stays on the cores track).
        arsenal: defaultArsenal(),
        // Habit engine (v3 — daily quests + login Salvage + capped idle accrual).
        habit: defaultHabit(),
        // Command deck (v4 — optional late-game ascension + branching doctrines).
        command: defaultCommand(),
        // Local telemetry ring buffer (D1/D7 API is dark). No network, no PII.
        tel: [],
        stats: {
            totalKills: 0, totalMerges: 0, maxWave: 0, gamesPlayed: 0,
            totalKillsRun: 0, maxWaveRun: 0, highestTierRun: 0,
            maxTierEver: 0, // PERSISTENT best tier ever reached (NOT overwritten per run)
            flawlessWaves: 0, fullGridAchieved: false,

    };
}

const SAVE_KEY_V1_BACKUP = 'mergeGuns_save_v1_backup';

function loadSave() {
    let wasLegacy = false; // a v1 (no version field) save → back it up before any v2 write
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (raw) {
            saveData = JSON.parse(raw);
            if (!saveData || typeof saveData !== 'object') { saveData = defaultSave(); return; }
            // v1 detection: the live shape has no `v`. Preserve the raw blob ONCE
            // for player-level rollback (this is the live earner), then upgrade
            // IN MEMORY only — never written on load, only on a real event.
            if (typeof saveData.v !== 'number') {
                wasLegacy = true;
                try {
                    if (!localStorage.getItem(SAVE_KEY_V1_BACKUP)) localStorage.setItem(SAVE_KEY_V1_BACKUP, raw);
                } catch (_) {}
            }
            // v2->v3 (Pass 2): back up the raw v2 blob ONCE before the first v3 write,
            // same non-mandatory pattern. (A v1 save skips this — its v1 backup covers it.)
            if (saveData.v === 2) {
                try {
                    if (!localStorage.getItem(SAVE_KEY_V2_BACKUP)) localStorage.setItem(SAVE_KEY_V2_BACKUP, raw);
                } catch (_) {}
            }
            // Ensure all upgrade keys exist
            if (!saveData.upgrades || typeof saveData.upgrades !== 'object') saveData.upgrades = defaultSave().upgrades;
            Object.keys(UPGRADE_DEFS).forEach(k => { if (!(k in saveData.upgrades)) saveData.upgrades[k] = 0; });
            if (!saveData.stats) saveData.stats = defaultSave().stats;
            if (!Array.isArray(saveData.achievements)) saveData.achievements = [];
            if (!('tutorialDone' in saveData)) saveData.tutorialDone = false;
            if (!saveData.iap) saveData.iap = { noads: false, vip: false };
            if (!saveData.daily) saveData.daily = { lastClaim: null, streak: 0 };
            sanitizeColl();     // hardened migration for the Blueprint collection block
            sanitizeArsenal();  // v2 Arsenal block (additive; safe on a v1 save)
            sanitizeHabit();    // v3 habit block (seeds lastSeenMs=now so migrants get 0 idle)
            sanitizeCommand();  // v4 Command/Ascension block (0 stars on existing saves)
            if (!Array.isArray(saveData.tel)) saveData.tel = [];
            // Seed the PERSISTENT maxTierEver for v1 players: best of any prior
            // highestTierRun + their tier achievements, so a returning veteran's
            // high mastery tracks are not relocked by a weak last run.
            if (typeof saveData.stats.maxTierEver !== 'number') {
                let mte = _safeCount(saveData.stats.highestTierRun, 7);
                const ach = saveData.achievements || [];
                if (ach.includes('gun_t8')) mte = Math.max(mte, 7);
                else if (ach.includes('gun_t6')) mte = Math.max(mte, 5);
                else if (ach.includes('gun_t4')) mte = Math.max(mte, 3);
                saveData.stats.maxTierEver = Math.min(7, mte);
            }
            saveData.v = SAVE_VERSION; // normalize in memory; flushed on the next event
        } else {
            saveData = defaultSave();
        }
    } catch(e) { saveData = defaultSave(); }
}

// Hardened migration/repair for the Arsenal block. A v1 save has no `arsenal`
// key at all → seed the default. Any present block is coerced field-by-field so
// a corrupt/oversized save can never desync permanent state or crash boot.
// Unknown mastery keys are ignored (only the real tier keys t0..t7 are kept).
function sanitizeArsenal() {
    const a = (saveData.arsenal && typeof saveData.arsenal === 'object') ? saveData.arsenal : {};
    const salvage = _safeCount(a.salvage, 1e7);
    const totalEarned = _safeCount(a.totalEarned, 1e9);
    const srcM = (a.mastery && typeof a.mastery === 'object') ? a.mastery : {};
    const mastery = {};
    for (let i = 0; i < BASE_TIERS.length; i++) {
        const k = 't' + i;
        mastery[k] = Math.min(ARS_MAX, _safeCount(srcM[k], ARS_MAX));
    }
    saveData.arsenal = { salvage: salvage, mastery: mastery, totalEarned: Math.max(totalEarned, salvage) };
}

// Hardened migration/repair for the v3 habit block. A v1/v2 save has no `habit` →
// seed defaults, but CRITICALLY seed lastSeenMs to NOW so a migrated player does not
// get the full 10h idle cap on their first menu open (Codex). Coerce every field;
// drop malformed quests. Clock-abuse guards (clamp, day-rollback) live in the runtime
// idle/reset logic, not here.
function sanitizeHabit() {
    const h = (saveData.habit && typeof saveData.habit === 'object') ? saveData.habit : {};
    const now = Date.now();
    // lastSeenMs: a finite, non-future ms. Missing/invalid/future → seed to now (pay 0).
    let lastSeen = Number(h.lastSeenMs);
    if (!isFinite(lastSeen) || lastSeen <= 0 || lastSeen > now) lastSeen = now;
    const q = (h.quests && typeof h.quests === 'object') ? h.quests : {};
    let list = Array.isArray(q.list) ? q.list : [];
    list = list.slice(0, 3).map(function (it) {
        it = (it && typeof it === 'object') ? it : {};
        return {
            id: String(it.id || ''),
            type: String(it.type || ''),
            target: Math.max(1, _safeCount(it.target, 1e6)),
            prog: _safeCount(it.prog, 1e7),
            claimed: !!it.claimed,
        };
    }).filter(function (it) { return it.type && QUEST_DEFS[it.type]; });
    saveData.habit = {
        lastSeenMs: lastSeen,
        idleCreditedDay: (typeof h.idleCreditedDay === 'string') ? h.idleCreditedDay : null,
        idleCreditedMs: _safeCount(h.idleCreditedMs, IDLE_CAP_MS),
        maxUtcDaySeen: (typeof h.maxUtcDaySeen === 'string') ? h.maxUtcDaySeen : null,
        quests: {
            day: (typeof q.day === 'string') ? q.day : null,
            list: list,
            firstDayDone: !!q.firstDayDone,
        },
    };
}

const SAVE_KEY_V2_BACKUP = 'mergeGuns_save_v2_backup';

function playgamaWriteSave(raw) {
    if (!_playgamaStorageReady || !playgamaBridge || !playgamaBridge.storage || typeof playgamaBridge.storage.set !== 'function') return;
    try {
        const r = playgamaBridge.storage.set(SAVE_KEY, raw);
        if (r && typeof r.catch === 'function') r.catch(function () {});
    } catch(e) {}
}

function loadPlaygamaSaveThenStart(done) {
    if (!playgamaBridge || !playgamaBridge.storage || typeof playgamaBridge.storage.get !== 'function') { done(); return; }
    _playgamaStorageReady = true;
    let finished = false;
    function finish() {
        if (finished) return;
        finished = true;
        done();
    }
    try {
        const r = playgamaBridge.storage.get(SAVE_KEY);
        if (!r || typeof r.then !== 'function') { finish(); return; }
        const timer = setTimeout(finish, 2500);
        r.then(function (raw) {
            if (typeof raw === 'string' && raw.trim()) {
                try {
                    localStorage.setItem(SAVE_KEY, raw);
                    loadSave();
                } catch (e) {}
            }
        }).catch(function () {}).finally(function () {
            clearTimeout(timer);
            finish();
        });
    } catch(e) { finish(); }
}

function writeSave() {
    const raw = JSON.stringify(saveData);
    try { localStorage.setItem(SAVE_KEY, raw); } catch(e) {}
    playgamaWriteSave(raw);
}

// Hardened migration/repair for the Blueprint collection block. Guards against
// missing/malformed/negative/NaN fields from older saves or corrupted storage,
// so a bad `coll` can never crash the live game or desync permanent state.
function _safeCount(v, max) {
    // Coerce a persisted counter to a clamped non-negative integer. Avoids the
    // `| 0` bitwise cast (which wraps values > 2^31 negative on corrupted saves).
    const n = Number(v);
    if (!isFinite(n) || n < 0) return 0;
    return Math.min(Math.floor(n), max);
}
function sanitizeColl() {
    const c = (saveData.coll && typeof saveData.coll === 'object') ? saveData.coll : {};
    const keys = _safeCount(c.keys, 1e6);
    const pity = _safeCount(c.pity, COLL_PITY);   // pity can never exceed the cap
    const opened = _safeCount(c.opened, 1e9);
    const ownedSrc = (c.owned && typeof c.owned === 'object') ? c.owned : {};
    const owned = {};
    // Keep only OWN keys that map to a real skin in the current catalog.
    // hasOwnProperty guards against prototype pollution marking a skin owned.
    Object.keys(ownedSrc).forEach(function (id) {
        if (Object.prototype.hasOwnProperty.call(ownedSrc, id) && ownedSrc[id] && SKIN_BY_ID[id]) owned[id] = true;
    });
    saveData.coll = { keys: keys, owned: owned, pity: pity, opened: opened };
}

loadSave();

// ── Apply upgrades → compute TIERS ───────────────────────────────────────────
function recomputeTiers() {
    const u = saveData.upgrades;
    TIERS = BASE_TIERS.map(t => {
        const dmg = t.damage * Math.pow(1.15, u.dmg_boost) * cmdDamageMult();
        const rate = t.rate   * Math.pow(0.90, u.fire_rate);
        const bspd = t.bspeed * Math.pow(1.15, u.bullet_spd);
        return { ...t, damage: dmg, rate: Math.max(8, rate), bspeed: bspd };
    });
}

function getStartGold() {
    return 60 + saveData.upgrades.start_gold * 30;
}

function getBuyCostBase() {
    return BUY_COST_BASE * Math.pow(0.85, saveData.upgrades.buy_discount);
}

function getWaveBonus(w) {
    return Math.round(w * 10 * Math.pow(1.30, saveData.upgrades.wave_bonus));
}

function getGoldMult() {
    return Math.pow(1.20, saveData.upgrades.gold_mult) * cmdGoldMult();
}

function getMaxHp() {
    return 20 + saveData.upgrades.max_hp * 10 + cmdHpBonus();
}

function getCritChance() {
    return saveData.upgrades.crit_chance * 0.08;
}

function getFastStartGold(startWaveNum) {
    // Simulate waves 1..(startWaveNum-1) gold: base + all wave bonuses + kills estimate
    let g = getStartGold();
    for (let w = 1; w < startWaveNum; w++) {
        g += getWaveBonus(w);
        // Estimate kill gold: ~half of enemies * average reward
        const cfg = waveConfig(w);
        g += Math.round(cfg.count * 0.65 * cfg.reward * getGoldMult());
    }
    return Math.round(g);
}

const _shakeScale = _reduceMotion ? 0 : 1;     // screen-shake amplitude (off under reduce-motion)
const _flashScale = _reduceMotion ? 0.35 : 1;  // full-screen flash alpha (dimmed under reduce-motion)
function triggerShake(mag, frames) {           // world shake — no-op under reduce-motion
    if (_shakeScale <= 0) return;
    mag *= _shakeScale;
    if (mag > shakeMag) shakeMag = mag;
    if (frames > shakeT) shakeT = frames;
}

// Per-run tracking for achievements
let runKills = 0, runMerges = 0, runHighestTier = 0, runWaveHpBefore = 0;
let runFlawlessWaves = 0;
let runWavesCleared = 0; // waves cleared THIS run (for daily-quest progress)
let lastStandActive = false, lastStandTimer = 0;
let armorUsedThisWave = false;
let runResults = null;  // { wave, score, coresEarned, newAchievements }

// Achievement toasts
let achToasts = []; // { text, life }

// Gameplay supply crate (rewarded ad drop)
let crate = null;          // { x, y, life, maxLife, tier }
let crateSpawnTimer = 0;
let crateFirstSpawned = false;
const CRATE_FIRST_INTERVAL  = 1800; // first crate after 30 s
const CRATE_REPEAT_INTERVAL = 3600; // subsequent crates every 60 s
const CRATE_LIFETIME = 720; // disappears after 12 s if not clicked

    runKills = 0; runMerges = 0; runHighestTier = 0; runFlawlessWaves = 0; runWavesCleared = 0;

    _runPaused = false; // a fresh run is not a paused-to-menu run
    _goalTelKey = null; // reset the "goal_shown" telemetry de-dupe for the new run
    try { ensureDailyQuests(); questRunStart(); } catch (e) {} // snapshot quest bases (counters reset above)

const FAST_START_WAVE = 10;

function initGameFastStart() {
    initGame();
    tel('run_start', { fast: true });
    wave = FAST_START_WAVE - 1; // so next wave button starts wave 10
    gold = getFastStartGold(FAST_START_WAVE);
    // Pre-place a starter set of guns scaled to wave 10 strength
    // Give 6 guns: mix of T2–T4 spread across the right columns
    const starterTiers = [3, 2, 3, 2, 1, 2]; // T4,T3,T4,T3,T2,T3

// ── Results / achievements ────────────────────────────────────────────────────
// Idempotency guard (Codex): a re-entrant computeResults must NOT re-grant cores /
// stats / Salvage end-bonus. The per-source Salvage accumulators already zero, but
// the end-bonus + cores + stats would double. Reset in initGame() each new run.
let _runSettled = false;
function computeResults() {
    if (_runSettled) return; // already banked this run — no double grant
    _runSettled = true;
    const coresEarned = Math.max(1, Math.floor(wave * 3 + score / 80));
    saveData.cores += coresEarned;
    saveData.stats.gamesPlayed++;
    saveData.stats.totalKills += runKills;
    saveData.stats.totalMerges += runMerges;
    if (wave > saveData.stats.maxWave) saveData.stats.maxWave = wave;
    saveData.stats.maxWaveRun = wave;
    saveData.stats.highestTierRun = runHighestTier;
    saveData.stats.flawlessWaves += runFlawlessWaves;
    if (guns.length >= COLS * ROWS) saveData.stats.fullGridAchieved = true;

    const newAch = [];
    ACH_DEFS.forEach(def => {
        if (!saveData.achievements.includes(def.id) && def.check(saveData.stats)) {
            saveData.achievements.push(def.id);
            saveData.cores += def.coreReward;
            newAch.push(def);
        }
    });

    // Commit Blueprint keys ONCE. Bonus derives from waves CLEARED THIS RUN
    // (runKeysEarned == 1/wave), NOT the absolute wave number — otherwise a
    // fast-start (begin at wave 10) + instant death would bank free bonus keys.
    // Zero runKeysEarned immediately so a re-entrant computeResults grants 0
    // (idempotent: keys can never be double-committed for the same run).
    const keysEarned = runKeysEarned + Math.floor(runKeysEarned / 3);
    runKeysEarned = 0;
    saveData.coll.keys += keysEarned;

    // Commit Arsenal Salvage ONCE (idempotent: zero the accumulators immediately
    // so a re-entrant computeResults grants 0). Run-end bonus scales with the best
    // tier reached this run, capped — a named, owned gain every single session.
    const endBonus = Math.min(ARS_CAP_ENDBONUS, runHighestTier);
    const salvageBase = runSalvMerge + runSalvWave + endBonus;
    const salvageEarned = Math.max(0, Math.floor(salvageBase * cmdSalvageMult()));
    runSalvMerge = 0; runSalvWave = 0;
    if (!saveData.arsenal) saveData.arsenal = defaultArsenal();
    saveData.arsenal.salvage = _safeCount(saveData.arsenal.salvage + salvageEarned, 1e7);
    saveData.arsenal.totalEarned = _safeCount((saveData.arsenal.totalEarned | 0) + salvageEarned, 1e9);

    tel('run_end', { wave: wave, score: score, salvage: salvageEarned });

    writeSave();
    runResults = { wave, score, coresEarned, keysEarned, salvageEarned, newAchievements: newAch };
}

function checkAchievementsLive() {
    ACH_DEFS.forEach(def => {
        if (!saveData.achievements.includes(def.id) && def.check(saveData.stats)) {
            saveData.achievements.push(def.id);
            saveData.cores += def.coreReward;
            achToasts.push({ text: t('ach_toast', achName(def.id), def.coreReward), life: 180 });
            sfxAchievement();
            writeSave();
        }
    });
}

// ── Wave config ───────────────────────────────────────────────────────────────
function waveConfig(w) {
    const count  = 8  + w * 3;
    const tier   = Math.min(3, Math.floor(w / 4));
    const hpMult = 1  + w * 0.25;
    const spd    = 0.55 + w * 0.04;
    const reward = 4  + w * 2;
    const interval = Math.max(40, 100 - w * 4);
    return { count, tier, hpMult, spd, reward, interval };
}

function isBossWave(w) { return w >= 5 && w % 5 === 0; }

const ENEMY_BASE = [
    { color:'#e74c3c', glow:'#ff6b6b', baseHp:8  },
    { color:'#e67e22', glow:'#f39c12', baseHp:18 },
    { color:'#8e44ad', glow:'#a55eea', baseHp:35 },
    { color:'#2c3e50', glow:'#546e7a', baseHp:70 },
];

// Pick a behaviour for a regular enemy. Variants unlock with wave so early
// players learn the base loop before threats diversify.
function pickVariant(w) {
    if (bossWave) return 'normal';   // boss-wave adds stay simple
    const r = Math.random();
    if (w >= 7 && r < 0.20) return 'shield'; // frontal armour, slow
    if (w >= 3 && r < 0.50) return 'swarm';  // fast & fragile
    return 'normal';
}

function spawnEnemy(w) {
    const cfg = waveConfig(w);
    const type = Math.min(cfg.tier, 3);
    const et = ENEMY_BASE[type];
    let ehp    = Math.round(et.baseHp * cfg.hpMult);
    let spd    = cfg.spd + Math.random() * 0.15;
    let r      = 14 + type * 3;
    let reward = cfg.reward;
    let shield = 0;
    const variant = pickVariant(w);
    if (variant === 'swarm') {
        ehp    = Math.max(2, Math.round(ehp * 0.45));
        spd   *= 1.65;
        r     *= 0.72;
        reward = Math.max(2, Math.round(reward * 0.6));
    } else if (variant === 'shield') {
        shield = Math.round(ehp * 0.6);
        spd   *= 0.85;
        reward = Math.round(reward * 1.4);
    }
    const y = GRID_Y + 10 + Math.random() * (ROWS * (CH + 4) - 20);
    enemies.push({
        x: W + 30, y,
        hp: ehp, maxHp: ehp,
        shield, maxShield: shield,
        spd, reward, type, variant,
        color: et.color, glow: et.glow, r,
        phase: Math.random() * Math.PI * 2,   // cosmetic walk-cycle seed (drawEnemy)
    });
}

function spawnBoss(w) {
    const cfg = waveConfig(w);
    const et  = ENEMY_BASE[3];
    // Tuned so a realistic per-wave loadout can down the boss before it crosses
    // the lane (~18s), with the Airstrike ultimate as the clutch closer.
    const ehp = Math.round(et.baseHp * cfg.hpMult * (1.8 + w * 0.12));
    const y   = GRID_Y + (ROWS * (CH + 4)) / 2;
    enemies.push({
        x: W + 50, y,
        hp: ehp, maxHp: ehp,
        shield: 0, maxShield: 0,
        spd: Math.max(0.40, cfg.spd * 0.55),
        reward: cfg.reward * 8,
        type: 3, variant: 'boss', isBoss: true, enraged: false,
        color: '#c0392b', glow: '#ff5e3a', r: 40,
        phase: Math.random() * Math.PI * 2,   // cosmetic walk-cycle seed (drawEnemy)
    });
}

function _doStartWave() {
    wave++;
    if (wave === 1) tel('run_start', { fast: false }); // run truly begins at wave 1
    gaProgress(GA_PROGRESSION_START, 'wave', 'wave_' + wave);
    gaEvent('wave:start', wave);
    waveActive = true;
    yadGameplayStart();
    const cfg = waveConfig(wave);
    bossWave = isBossWave(wave);
    bossSpawned = false;
    // Boss waves run a lighter add stream so the boss is the focus.
    waveEnemiesLeft = bossWave ? Math.max(4, Math.floor(cfg.count * 0.40)) : cfg.count;
    spawnInterval = cfg.interval;
    spawnTimer = 0; waveEndTimer = 0;
    runWaveHpBefore = hp;
    armorUsedThisWave = false;
    if (bossWave) {
        bossBannerTimer = 150;
        sfxAchievement();
        spawnFloat(W/2, H/2 - 60, t('boss_incoming'), '#ff5e3a');
    }
}

function startWave() {
    if (STATE === 'tutorial') {
        saveData.tutorialDone = true;
        writeSave();
        STATE = 'play';
        showInterstitialAd(() => { _doStartWave(); });
        return;
    }
    _doStartWave();
}

// ── Grid ──────────────────────────────────────────────────────────────────────
function cellRect(col, row) {
    return { x: GRID_X + col * (CW + 4), y: GRID_Y + row * (CH + 4), w: CW, h: CH };
}
function gunAt(col, row) { return guns.find(g => g.col === col && g.row === row) || null; }
function emptyCell() {
    for (let c = COLS - 1; c >= 0; c--)
        for (let r = 0; r < ROWS; r++)
            if (!gunAt(c, r)) return { col: c, row: r };
    return null;
}

function buyGun() {
    const cell = emptyCell();
    if (!cell) { spawnFloat(GRID_X + COLS*(CW+4)/2, GRID_Y - 18, t('grid_full'), '#e74c3c'); return; }
    const cost = Math.round(getBuyCostBase() * Math.pow(BUY_COST_SCALE, buyCount));
    if (gold < cost) { spawnFloat(GRID_X + COLS*(CW+4)/2, GRID_Y - 18, t('need_gold', cost), '#e74c3c'); return; }
    gold -= cost; buyCount++;
    sfxBuy();
    guns.push({ col: cell.col, row: cell.row, tier: 0, cd: 0 });
    spawnFloat(cellRect(cell.col, cell.row).x + CW/2, cellRect(cell.col, cell.row).y, t('plus_gun'), '#2ecc71');
    if (STATE === 'tutorial') { if (tutStep === 0) tutStep = 1; else if (tutStep === 1) tutStep = 2; }
    if (guns.length >= COLS * ROWS) { saveData.stats.fullGridAchieved = true; checkAchievementsLive(); }
}

function tryMerge(col, row) {
    if (!selected) return false;
    if (selected.col === col && selected.row === row) { selected = null; return true; }
    const a = gunAt(selected.col, selected.row);
    const b = gunAt(col, row);
    if (!a) { selected = null; return false; }
    if (!b) {
        a.col = col; a.row = row; selected = null; return true;
    }
    if (a.tier !== b.tier) {
        const tc = b.col, tr = b.row;
        b.col = a.col; b.row = a.row;
        a.col = tc; a.row = tr;
        selected = null; return true;
    }
    if (a.tier >= TIERS.length - 1) {
        spawnFloat(cellRect(col, row).x + CW/2, cellRect(col, row).y, t('max_tier'), '#ffd700');
        selected = null; return true;
    }
    guns = guns.filter(g => !(g.col === selected.col && g.row === selected.row));
    b.tier = a.tier + 1; b.cd = 0;
    if (b.tier > runHighestTier) {
        runHighestTier = b.tier; saveData.stats.highestTierRun = runHighestTier;
        // Persist the all-time best tier so mastery tracks never relock (Codex). Saved at run end.
        if (b.tier > (saveData.stats.maxTierEver | 0)) saveData.stats.maxTierEver = b.tier;
    }
    spawnMergeParticles(cellRect(col, row).x + CW/2, cellRect(col, row).y + CH/2, TIERS[b.tier].glow);
    spawnMergeShock(cellRect(col, row).x + CW/2, cellRect(col, row).y + CH/2, TIERS[b.tier].glow);
    b.pop = 1;                                          // cosmetic scale-punch on the merged gun (drawGun)
    triggerShake(Math.min(2 + b.tier * 0.4, 4), 8);     // cosmetic; a touch bigger for higher tiers
    spawnFloat(cellRect(col, row).x + CW/2, cellRect(col, row).y - 10, '▲ ' + tierName(b.tier), TIERS[b.tier].glow);
    runMerges++; saveData.stats.totalMerges++;
    // Arsenal Salvage: +1 per merge, capped per run (in MEMORY; committed at run end).
    if (runSalvMerge < ARS_CAP_MERGE) runSalvMerge = Math.min(ARS_CAP_MERGE, runSalvMerge + ARS_SALV_PER_MERGE);
    sfxMerge();
    if (STATE === 'tutorial' && tutStep === 2) tutStep = 3;
    checkAchievementsLive();
    selected = null; return true;
}

// ── Crate rewards ─────────────────────────────────────────────────────────────
function openCrate() {
    if (!crate || _adInProgress) return;
    const c = crate;
    crate = null;
    showRewardedAd(
        () => { // onRewarded
            const cell = emptyCell();
            if (!cell) { achToasts.push({ text: t('crate_full'), life: 160 }); return; }
            guns.push({ col: cell.col, row: cell.row, tier: c.tier, cd: 0 });
            if (c.tier > runHighestTier) { runHighestTier = c.tier; saveData.stats.highestTierRun = runHighestTier; }
            spawnMergeParticles(cellRect(cell.col, cell.row).x + CW/2, cellRect(cell.col, cell.row).y + CH/2, TIERS[c.tier].glow);
            spawnFloat(cellRect(cell.col, cell.row).x + CW/2, cellRect(cell.col, cell.row).y - 10, '🎁 ' + tierName(c.tier) + '!', TIERS[c.tier].glow);
            sfxMerge();
            checkAchievementsLive();
        },
        null
    );
}

function openMenuCrate() {
    if (_adInProgress) return;
    showRewardedAd(
        () => {
            saveData.cores += 10;
            writeSave();
            achToasts.push({ text: t('crate_reward'), life: 240 });
