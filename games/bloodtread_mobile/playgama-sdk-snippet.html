<script>window.__GAME_PLATFORM__="playgama";</script>
<script src="https://bridge.playgama.com/v1/stable/playgama-bridge.js"></script>
<script>
// Playgama Bridge: initialize, then signal game_ready once bloodtread has booted. main.js sets
// window.__BT_BOOTED=1 after resetGame + startLoop (assets/meta/analytics loaded, render loop running);
// game_ready MUST fire AFTER boot. The bare hosted URL still drops straight into play (index.html sets
// window.__BT_PUBLIC=1 before the module). Storage stays on localStorage (works inside the Bridge frame).
// Rewarded ads route through input.js requestRewardedAd -> playgamaBridge.advertisement at call time.
(function(){
  function whenBooted(cb){var n=0;(function p(){if(window.__BT_BOOTED){cb();return;}if(++n>200)return;setTimeout(p,50);})();}
  function ready(){try{var b=window.playgamaBridge;if(b&&b.platform&&b.platform.sendMessage)b.platform.sendMessage("game_ready");}catch(e){}}
  var pg=window.bridge||window.playgamaBridge;
  if(pg&&typeof pg.initialize==="function"){
    pg.initialize({configFilePath:"playgama-bridge-config.json"}).then(function(){window.playgamaBridge=pg;whenBooted(ready);}).catch(function(){whenBooted(ready);});
  }else{whenBooted(ready);}
})();
</script>
