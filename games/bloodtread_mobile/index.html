<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Bloodtread ECS Rebuild</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      background: #070605;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #070605;
      touch-action: none;
      user-select: none;
    }

    #gl,
    #hud {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #hud {
      pointer-events: none;
    }

    #fallback {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      color: #ffd9c5;
      background: #080605;
      text-align: center;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <canvas id="gl"></canvas>
  <canvas id="hud"></canvas>
  <div id="fallback">WebGL2 is required for this performance rebuild.</div>
  <script src="game.js" defer></script>
</body>
</html>
