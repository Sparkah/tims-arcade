<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Bloodtread</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <!-- Open Graph / Telegram + social link-preview card -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Bloodtread">
  <meta property="og:description" content="Drive a blood-fuelled war machine through endless biomech hordes. Crush, upgrade, survive.">
  <meta property="og:image" content="https://game-factory.tech/games/bloodtread_mobile/og_cover.png">
  <meta property="og:url" content="https://game-factory.tech/games/bloodtread_mobile/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Bloodtread">
  <meta name="twitter:description" content="Drive a blood-fuelled war machine through endless biomech hordes. Crush, upgrade, survive.">
  <meta name="twitter:image" content="https://game-factory.tech/games/bloodtread_mobile/og_cover.png">
  <style>
    :root {
      color-scheme: dark;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      background: #070605;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #070605;
      touch-action: none;
      user-select: none;
    }

    #gl,
    #hud {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #hud {
      pointer-events: none;
    }

    #fallback {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      color: #ffd9c5;
      background: #080605;
      text-align: center;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <!-- Animated menu/vault background (Veo clip); drawn onto the HUD canvas per frame by drawMenu/vaultBackdrop. Off-screen so it decodes but never shows directly. -->
  <video id="bt_menu_vid" src="art_refs/menu_loop.mp4" muted loop playsinline autoplay preload="auto" style="position:fixed;left:-9999px;top:0;width:320px;height:180px;opacity:0;pointer-events:none"></video>
  <canvas id="gl"></canvas>
  <canvas id="hud"></canvas>
  <div id="fallback">WebGL2 is required for this performance rebuild.</div>
  <!-- HOSTED build marker: bare URL shows art + drops into play (flags.js PUBLIC_BUILD). Must run BEFORE the module. -->
  <script>window.__BT_PUBLIC = 1;</script>
  <script src="/sdk.js"></script>
  <script src="vendor/GameAnalytics.min.js" defer></script>
  <script type="module" src="main.js?v=bm4"></script>
</body>
</html>
