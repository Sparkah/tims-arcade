  vigor:    { max: 5, costs: [40, 90, 170, 300, 500],  val: function(r){ return r * 20; } },        // +max HP

// Icons are VECTOR-DRAWN (drawRelicIcon) — never emoji (emoji = tofu boxes in the
// game font). Effects fold into the run at resetRun via relicVal(stat).
var RELIC_MAX_LVL = 5;
var RELIC_SLOTS = 3;

  { id:'void',    min:300, col:'#b388ff', stat:'range',   per:0.50, stat2:'xp',    per2:0.10, en:'Black Hole Gut', ru:'Чёрная утроба' },
];
var RELIC_BY_ID = {};
for (var _ri = 0; _ri < RELIC_DEFS.length; _ri++) RELIC_BY_ID[RELIC_DEFS[_ri].id] = RELIC_DEFS[_ri];
var runPlaySec = 0;          // survival seconds in the CURRENT run (folded into totalPlaySec at game-over)

// summed bonus across EQUIPPED relics for a stat (per × level), incl. secondary stat
function relicVal(stat) {
  var v = 0;
  for (var i = 0; i < meta.equipped.length; i++) {
    var id = meta.equipped[i]; if (!id) continue;
    var d = RELIC_BY_ID[id], c = meta.relics[id]; if (!d || !c) continue;
    if (d.stat === stat) v += d.per * c.lvl;
    if (d.stat2 === stat) v += d.per2 * c.lvl;
  }
  return v;
}
function totalPlaySec() { return (meta.totalPlaySec || 0) + runPlaySec; }
function totalPlayMin() { return totalPlaySec() / 60; }
function relicName(d) { return (GF.lang === 'ru' ? d.ru : d.en) || d.en; }
function relicBonusText(d, lvl) {
  function fmt(stat, per) {
    var v = per * lvl, ru = (GF.lang === 'ru');
    switch (stat) {
      case 'hp':      return '+' + Math.round(v) + (ru ? ' макс. ОЗ' : ' max HP');
      case 'hppct':   return '+' + Math.round(v*100) + (ru ? '% макс. ОЗ' : '% max HP');
      case 'dmg':     return '+' + Math.round(v*100) + (ru ? '% урон' : '% damage');
      case 'range':   return '+' + Math.round(v*100) + (ru ? '% радиус сбора' : '% pickup range');
      case 'speed':   return '+' + Math.round(v*100) + (ru ? '% скорость' : '% move speed');
      case 'revive':  return '+' + Math.round(v) + (ru ? ' оживление' : ' revive');
      case 'essence': return '+' + Math.round(v*100) + (ru ? '% эссенции' : '% essence');
      case 'poison':  return ru ? 'яд: урон со временем' : 'poison damage over time';
      case 'thorns':  return '+' + Math.round(v*100) + (ru ? '% отражение' : '% reflect');
      case 'regen':   return '+' + (v).toFixed(0) + (ru ? ' ОЗ/сек' : ' HP/sec');
      case 'xp':      return '+' + Math.round(v*100) + (ru ? '% опыт' : '% XP');
    }
    return '';
  }
  var t = fmt(d.stat, d.per);
  if (d.stat2) t += '  +  ' + fmt(d.stat2, d.per2);
  return t;
}
function nextRelic() {
  for (var i = 0; i < RELIC_DEFS.length; i++) if (!meta.relics[RELIC_DEFS[i].id]) return RELIC_DEFS[i];
  return null;
}
// grant any relic whose playtime milestone is crossed; auto-equip into a free slot
function checkRelicUnlocks() {
  var mins = totalPlayMin(), granted = [];
  for (var i = 0; i < RELIC_DEFS.length; i++) {
    var d = RELIC_DEFS[i];
    if (mins >= d.min && !meta.relics[d.id]) {
      meta.relics[d.id] = { lvl: 1 };
      for (var s = 0; s < meta.equipped.length; s++) { if (!meta.equipped[s]) { meta.equipped[s] = d.id; break; } }
      granted.push(d);
    }
  }
  if (granted.length) saveMeta();
  return granted;
}
function relicUpCost(id) {
  var c = meta.relics[id]; if (!c) return null;
  if (c.lvl >= RELIC_MAX_LVL) return null;
  var d = RELIC_BY_ID[id];
  return Math.round((30 + d.min * 0.5) * Math.pow(1.6, c.lvl - 1));
}
function relicBuyUpgrade(id) {
  var cost = relicUpCost(id);
  if (cost == null || meta.essence < cost) return false;
  meta.essence -= cost; meta.relics[id].lvl += 1; saveMeta(); return true;
}
function relicToggleEquip(id) {
  if (!meta.relics[id]) return false;
  var at = meta.equipped.indexOf(id);
  if (at >= 0) { meta.equipped[at] = null; saveMeta(); return true; }
  for (var s = 0; s < meta.equipped.length; s++) { if (!meta.equipped[s]) { meta.equipped[s] = id; saveMeta(); return true; } }
  return false;
}
function relicUnequipSlot(slot) {
  if (!meta.equipped[slot]) return false;
  meta.equipped[slot] = null; saveMeta(); return true;
}
var meta = {
  essence: 0,
  up: { vigor: 0, predator: 0, greed: 0, hunger: 0, survivor: 0 },
  // M2 fields (daily/streak/idle) — declared here, used by M2 logic below.
  lastPlayedDay: 0,     // UTC day index of last session start
  streak: 0,            // consecutive-day login streak
  lastSeenMs: 0,        // wall-clock of last save (for idle accrual)
  dailyDay: 0,          // UTC day the current quest set belongs to
  quests: null,         // [{id,type,target,prog,claimed}]
  loginClaimedDay: 0,   // UTC day the login bonus was last granted
  // M3 THE HOARD — playtime-unlocked, equippable Relics (the multi-day pull)
  totalPlaySec: 0,      // cumulative survival time across all runs (drives Relic unlocks)
  relics: {},           // relicId -> { lvl:1..5 }  (owned + upgrade level)
  equipped: [null, null, null],  // relicId per equip slot (bonuses fold into the run)
};
function metaRank(k) { return (meta.up && meta.up[k]) | 0; }
function metaVal(k) { var d = META_DEFS[k]; return d ? d.val(metaRank(k)) : 0; }
function metaCost(k) { var d = META_DEFS[k], r = metaRank(k); return (r >= d.max) ? null : d.costs[r]; }
function metaIsMax(k) { return metaRank(k) >= META_DEFS[k].max; }
function metaBuy(k) {
  var c = metaCost(k);
  if (c == null || meta.essence < c) return false;
  meta.essence -= c; meta.up[k] = metaRank(k) + 1;
  saveMeta();
  return true;
}
// Meta persists on its OWN localStorage key. GF.persist tracks a single key
// (the run snapshot) so we write the meta directly rather than re-registering.
function saveMeta() {
  try {
    meta.lastSeenMs = Date.now();
    localStorage.setItem(META_KEY, JSON.stringify({
      essence: meta.essence, up: meta.up,
      lastPlayedDay: meta.lastPlayedDay, streak: meta.streak, lastSeenMs: meta.lastSeenMs,
      dailyDay: meta.dailyDay, quests: meta.quests, loginClaimedDay: meta.loginClaimedDay,
      totalPlaySec: meta.totalPlaySec, relics: meta.relics, equipped: meta.equipped,
    }));
  } catch (e) {}
}
function loadMeta() {
  try {
    var raw = localStorage.getItem(META_KEY);
    if (!raw) return;
    var s = JSON.parse(raw);
    if (s && typeof s === 'object') {
      meta.essence = Math.max(0, s.essence | 0);
      if (s.up) for (var i = 0; i < META_ORDER.length; i++) {
        var k = META_ORDER[i];
        meta.up[k] = GF.clamp((s.up[k] | 0), 0, META_DEFS[k].max);
      }
      meta.lastPlayedDay = s.lastPlayedDay | 0;
      meta.streak = Math.max(0, s.streak | 0);
      meta.lastSeenMs = s.lastSeenMs || 0;
      meta.dailyDay = s.dailyDay | 0;
      meta.quests = Array.isArray(s.quests) ? s.quests : null;
      meta.loginClaimedDay = s.loginClaimedDay | 0;
      meta.totalPlaySec = Math.max(0, +s.totalPlaySec || 0);
      meta.relics = {};
      if (s.relics && typeof s.relics === 'object') {
        for (var rk in s.relics) {
          if (s.relics.hasOwnProperty(rk) && RELIC_BY_ID[rk]) {
            meta.relics[rk] = { lvl: GF.clamp((s.relics[rk] && s.relics[rk].lvl) | 0 || 1, 1, RELIC_MAX_LVL) };
          }
        }
      }
      meta.equipped = [null, null, null];
      if (Array.isArray(s.equipped)) for (var ei = 0; ei < 3; ei++) { var id = s.equipped[ei]; meta.equipped[ei] = (id && meta.relics[id]) ? id : null; }
    }
  } catch (e) {}
}
function utcDayIdx() { return Math.floor(Date.now() / 86400000); }
// Called when the MENU is (re)entered: award idle Essence (the devourling kept
// feeding while away) + the daily login bonus that grows with the streak. THIS
// is the reason-to-return loop. Sets pendingIdleEssence + lastStreakBonus for
// the menu banners.
function claimOnOpen() {
  pendingIdleEssence = 0; lastStreakBonus = 0;
  var now = Date.now();
  if (meta.lastSeenMs > 0) {
    var hrs = Math.min(8, (now - meta.lastSeenMs) / 3600000);
    if (hrs >= 0.05) {
      pendingIdleEssence = Math.round(hrs * 5 * (1 + metaVal('greed') / 100));
      if (pendingIdleEssence > 0) meta.essence += pendingIdleEssence;
    }
  }
  var today = utcDayIdx();
  if (meta.loginClaimedDay !== today) {
    if (meta.lastPlayedDay === today - 1) meta.streak = (meta.streak || 0) + 1;
    else meta.streak = 1;
    meta.loginClaimedDay = today; meta.lastPlayedDay = today;
    lastStreakBonus = 15 + meta.streak * 10;
    meta.essence += lastStreakBonus;
  } else { meta.lastPlayedDay = today; }
  meta.lastSeenMs = now;
  saveMeta();
}

// ── DIFFICULTY SCALING ─────────────────────────────────────────────────────
function enemyHpScale() { return 1 + survivalSec / 75; }          // grows ~+1x/75s
function eliteChance()  { return survivalSec > 420 ? 0.28 : (survivalSec > 300 ? 0.14 : 0); }

// ── SPAWNING ───────────────────────────────────────────────────────────────
function spawnPos() {
  var m = 40 * GF.S, side = (Math.random() * 4) | 0, x, y;
  if (side === 0) { x = Math.random() * GF.W; y = -m; }
  else if (side === 1) { x = GF.W + m; y = Math.random() * GF.H; }
  else if (side === 2) { x = Math.random() * GF.W; y = GF.H + m; }
  else { x = -m; y = Math.random() * GF.H; }
  return { x: x, y: y };
}

function pickEnemyType() {
  var t = survivalSec, r = Math.random();
  var canDarter = t >= 55, canBrute = t >= 115, canSpitter = t >= 235, canSwarm = t >= 350;
  if (canSwarm && r < 0.16) return 'swarmling';
  if (canSpitter && r < 0.34) return 'spitter';
  if (canBrute && r < 0.52) return 'brute';
  if (canDarter && r < 0.78) return 'darter';
  return 'grunt';
}

function makeEnemy(type, pos) {
  pos = pos || spawnPos();
  var elite = (type !== 'swarmling') && Math.random() < eliteChance();
  var hpScale = enemyHpScale() * (elite ? 1.8 : 1);
  var base = {
    grunt:     { hp: ENEMY_HP_BASE,        r: R.grunt,     spd: 52,  dmg: CONTACT_DMG, col: '#ff6e6e' },
    darter:    { hp: ENEMY_HP_BASE * 0.55,  r: R.darter,    spd: 118, dmg: 5,           col: '#ffd166' },
    brute:     { hp: ENEMY_HP_BASE * 4.5,   r: R.brute,     spd: 33,  dmg: 16,          col: '#b388ff' },
    spitter:   { hp: ENEMY_HP_BASE * 1.6,   r: R.spitter,   spd: 40,  dmg: 8,           col: '#4dd0e1' },
    swarmling: { hp: ENEMY_HP_BASE * 0.35,  r: R.swarmling, spd: 92,  dmg: 6,           col: '#7CFC9A' },
  }[type];
  return {
    type: type, x: pos.x, y: pos.y,
    hp: base.hp * hpScale, maxHp: base.hp * hpScale,
    r: base.r * GF.S, spd: base.spd, dmg: base.dmg, col: base.col,
    elite: elite, hitT: 0, contactCd: 0,
    fireCd: 1.4 + Math.random(), wob: Math.random() * 6.28, kb: 0, kbx: 0, kby: 0,
  };
}

function spawnWave() {
  var type = pickEnemyType();
  if (type === 'swarmling') {
    var pos = spawnPos(), n = 5 + ((Math.random() * 4) | 0);
    for (var i = 0; i < n; i++) {
      var p = { x: pos.x + (Math.random() - 0.5) * 70 * GF.S, y: pos.y + (Math.random() - 0.5) * 70 * GF.S };
      enemies.push(makeEnemy('swarmling', p));
    }
  } else {
    enemies.push(makeEnemy(type));
    if (survivalSec > 150 && Math.random() < 0.4) enemies.push(makeEnemy(pickEnemyType()));
  }
  enemyTypesSeen[type] = true;
}

// ── MINI-BOSS + BOSS ───────────────────────────────────────────────────────
function spawnMiniboss() {
  var pos = spawnPos();
  miniboss = {
    x: pos.x, y: pos.y, r: R.miniboss * GF.S,
    hp: 260 + survivalSec * 1.3, maxHp: 0,
    spd: 38, dmg: 18, col: '#ff5fa2', spitCd: 3.2, wob: 0, hitT: 0, contactCd: 0,
  };
  miniboss.maxHp = miniboss.hp;
  bannerTxt = curStrings().miniboss_in; bannerT = 2.2;
  enemyTypesSeen['miniboss'] = true;
  GF.setShake(0.5);
}

function spawnBoss() {
  boss = {
    x: GF.cx, y: -R.boss * GF.S, ty: GF.H * 0.26,
    r: R.boss * GF.S, hp: 6000 + survivalSec * 8, maxHp: 0,
    spd: 26, dmg: 22, col: '#ff3b6b', phase: 0,
    ringCd: 3.0, summonCd: 5.5, chargeCd: 7.0, charging: 0, chargeVX: 0, chargeVY: 0,
    wob: 0, hitT: 0, contactCd: 0,
  };
  boss.maxHp = boss.hp;
  bannerTxt = curStrings().boss_in; bannerT = 2.6;
  enemyTypesSeen['boss'] = true;
  GF.setShake(0.8);
}

// ── WEAPONS ──────────────────────────────────────────────────────────────
function weaponLevel(k) { return weapons[k] | 0; }
function ownsWeapon(k) { return (weapons[k] | 0) > 0; }
function weaponDamage(base) { return base * dmgMul; }

function nearestEnemy(fromX, fromY, maxD) {
  var bestE = null, bd = (maxD || 1e9);
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i]; var d = GF.dist(fromX, fromY, e.x, e.y);
    if (d < bd) { bd = d; bestE = e; }
  }
  if (miniboss) { var dm = GF.dist(fromX, fromY, miniboss.x, miniboss.y); if (dm < bd) { bd = dm; bestE = miniboss; } }
  if (boss) { var db = GF.dist(fromX, fromY, boss.x, boss.y); if (db < bd) { bd = db; bestE = boss; } }
  return bestE;
}

function damageEnemy(e, dmg, isBite) {
  e.hp -= dmg; e.hitT = 0.12;
  // Venom Sac relic: a hero hit applies a stacking poison DoT (scaled by relic level)
  if (isBite) { var pz = relicVal('poison'); if (pz > 0) { e.psn = (e.psn || 0) + 1.5 * pz; e.psnSrc = true; } }
  if (e === miniboss || e === boss) GF.spawnParticles(e.x + (Math.random()-0.5)*e.r, e.y + (Math.random()-0.5)*e.r, '#fff', 2);
  if (e.hp <= 0) killEnemy(e, isBite);
}
// poison tick — call from the per-enemy update with dt; deals e.psn dmg/sec while it lasts
function tickPoison(e, dt) {
  if (!e.psn || e.psn <= 0) return;
  var dps = 6 * relicVal('poison');           // damage per second at current loadout
  if (dps <= 0) { e.psn = 0; return; }
  e.hp -= dps * dt; e.psn -= dt;
  if ((Math.random() < dt * 4)) GF.spawnParticles(e.x, e.y, '#9d7bff', 1);
  if (e.hp <= 0) killEnemy(e, true);
}

function killEnemy(e, isBite) {
  if (e === boss) { onBossDown(); return; }
  if (e === miniboss) { onMinibossDown(); return; }
  var idx = enemies.indexOf(e);
  if (idx < 0) return;
  enemies.splice(idx, 1);
  kills++;
  GF.spawnParticles(e.x, e.y, e.col, e.elite ? 16 : 8);
  dropMote(e.x, e.y, e.elite ? 'big' : (Math.random() < 0.04 ? 'gold' : (Math.random() < 0.03 ? 'heal' : 'normal')));
  if (e.elite) dropMote(e.x + 8 * GF.S, e.y, 'normal');
  if (isBite && devourHeal > 0) healHero(devourHeal);
  if (!firstKillDone) firstKillDone = true;
}

function onMinibossDown() {
  GF.spawnParticles(miniboss.x, miniboss.y, '#ff5fa2', 40);
  GF.setShake(0.7); kills += 10;
  for (var i = 0; i < 8; i++) dropMote(miniboss.x + (Math.random()-0.5)*60*GF.S, miniboss.y + (Math.random()-0.5)*60*GF.S, 'big');
  dropMote(miniboss.x, miniboss.y, 'heal');
  miniboss = null;
  GF.happytime();
}

function onBossDown() {
  GF.spawnParticles(boss.x, boss.y, '#ff3b6b', 70);
  GF.setShake(1.0); kills += 50;
  for (var i = 0; i < 16; i++) dropMote(boss.x + (Math.random()-0.5)*120*GF.S, boss.y + (Math.random()-0.5)*120*GF.S, 'big');
  boss = null;
  GF.happytime();
}

function dropMote(x, y, kind) {
  var val = kind === 'gold' ? 5 : kind === 'big' ? 3 : kind === 'heal' ? 0 : MOTE_VALUE;
  motes.push({ x: x, y: y, vx: (Math.random()-0.5)*40*GF.S, vy: (Math.random()-0.5)*40*GF.S,
    kind: kind, val: val, life: 8.5, r: (kind === 'heal' ? 8 : kind === 'gold' ? 8 : R.mote) * GF.S, wob: Math.random()*6.28 });
}

// Apply damage to every live target with a callback.
function eachTarget(fn) {
  for (var i = enemies.length - 1; i >= 0; i--) { if (enemies[i]) fn(enemies[i]); }
  if (miniboss) fn(miniboss);
  if (boss) fn(boss);
}
function novaDamage(x, y, rad, dmg) { eachTarget(function(e) { if (GF.dist(x, y, e.x, e.y) <= rad + e.r) damageEnemy(e, dmg, false); }); }
function lineDamage(x, y, ang, len, halfW, dmg) {
  var dx = Math.cos(ang), dy = Math.sin(ang);
  eachTarget(function(e) {
    var rx = e.x - x, ry = e.y - y, proj = rx*dx + ry*dy;
    if (proj < 0 || proj > len) return;
    if (Math.abs(rx*(-dy) + ry*dx) <= halfW + e.r) damageEnemy(e, dmg, false);
  });
}
function coneDamage(x, y, ang, len, halfAngle, dmg) {
  eachTarget(function(e) {
    var d = GF.dist(x, y, e.x, e.y); if (d > len + e.r) return;
    var a = Math.atan2(e.y - y, e.x - x);
    if (Math.abs(((a - ang + Math.PI*3) % (Math.PI*2)) - Math.PI) <= halfAngle) damageEnemy(e, dmg, false);
  });
}
function chainSpark(lvl) {
  var jumps = 3 + lvl, dmg = weaponDamage(8 + lvl*4);
  var fromX = hero.x, fromY = hero.y, hitList = [];
  for (var j = 0; j < jumps; j++) {
    var t = null, bd = (220 + lvl*20) * GF.S;
    eachTarget(function(e) { if (hitList.indexOf(e) >= 0) return; var d = GF.dist(fromX, fromY, e.x, e.y); if (d < bd) { bd = d; t = e; } });
    if (!t) break;
    slashes.push({ kind:'spark', x1: fromX, y1: fromY, x2: t.x, y2: t.y, t:0.18, max:0.18 });
    damageEnemy(t, dmg, false);
    hitList.push(t); fromX = t.x; fromY = t.y;
  }
}

// Fire all owned weapons (each has its own cooldown).
function fireWeapons(dt) {
  if (ownsWeapon('bite')) {
    weaponTimers.bite = (weaponTimers.bite || 0) - dt;
    if (weaponTimers.bite <= 0) {
      var lvl = weaponLevel('bite'), range = (120 + lvl * 14) * GF.S;
      var tgt = nearestEnemy(hero.x, hero.y, range);
      if (tgt) {
        damageEnemy(tgt, weaponDamage(BASE_WEAPON_DMG + lvl * 3), true);
        slashes.push({ kind:'bite', x: tgt.x, y: tgt.y, t: 0.18, max:0.18, r: tgt.r + 12*GF.S });
        weaponTimers.bite = BASE_FIRE_RATE / rateMul;
      } else { weaponTimers.bite = 0.15; }
    }
  }
  if (ownsWeapon('orbit')) orbitAngle += dt * (2.4 * (weapons.orbitEvo ? 1.6 : 1));
  if (ownsWeapon('spore')) {
    weaponTimers.spore = (weaponTimers.spore || 0) - dt;
    if (weaponTimers.spore <= 0) {
      var slv = weaponLevel('spore');
      var rad = weapons.sporeEvo ? Math.max(GF.W, GF.H) : (70 + slv * 18) * GF.S;
      var sdmg = weaponDamage((10 + slv * 5) * (weapons.sporeEvo ? 1.6 : 1));
      novaDamage(hero.x, hero.y, rad, sdmg);
      slashes.push({ kind:'spore', x: hero.x, y: hero.y, t: 0.35, max:0.35, r: rad });
      weaponTimers.spore = (weapons.sporeEvo ? 2.4 : 3.0) / rateMul;
    }
  }
  if (ownsWeapon('spit')) {
    weaponTimers.spit = (weaponTimers.spit || 0) - dt;
    if (weaponTimers.spit <= 0) {
      var plv = weaponLevel('spit'), tg = nearestEnemy(hero.x, hero.y, 1e9);
      if (tg) {
        var ang = Math.atan2(tg.y - hero.y, tg.x - hero.x);
        bullets.push({ friendly:true, x: hero.x, y: hero.y, vx: Math.cos(ang)*320*GF.S, vy: Math.sin(ang)*320*GF.S,
          r: 7*GF.S, dmg: weaponDamage(8 + plv*4), homing:true, life: 2.2, col:'#9cff57' });
        weaponTimers.spit = (1.1 - plv*0.08) / rateMul;
      } else { weaponTimers.spit = 0.2; }
    }
  }
  if (ownsWeapon('lash')) {
    weaponTimers.lash = (weaponTimers.lash || 0) - dt;
    if (weaponTimers.lash <= 0) {
      var llv = weaponLevel('lash'), tgl = nearestEnemy(hero.x, hero.y, 1e9);
      if (tgl) {
        var la = Math.atan2(tgl.y - hero.y, tgl.x - hero.x), len = (180 + llv*30) * GF.S;
        lineDamage(hero.x, hero.y, la, len, (20*GF.S), weaponDamage(10 + llv*6));
        slashes.push({ kind:'lash', x: hero.x, y: hero.y, ang: la, len: len, t:0.16, max:0.16 });
        weaponTimers.lash = (1.3 - llv*0.08) / rateMul;
      } else { weaponTimers.lash = 0.2; }
    }
  }
  if (ownsWeapon('spark')) {
    weaponTimers.spark = (weaponTimers.spark || 0) - dt;
    if (weaponTimers.spark <= 0) { chainSpark(weaponLevel('spark')); weaponTimers.spark = (1.5 - weaponLevel('spark')*0.1) / rateMul; }
  }
  if (ownsWeapon('tail')) {
    weaponTimers.tail = (weaponTimers.tail || 0) - dt;
    if (weaponTimers.tail <= 0) {
      var tlv = weaponLevel('tail'), ang2 = Math.atan2(-hero.faceY, -hero.faceX);
      coneDamage(hero.x, hero.y, ang2, (110 + tlv*16)*GF.S, 1.1, weaponDamage(14 + tlv*7));
      slashes.push({ kind:'tail', x: hero.x, y: hero.y, ang: ang2, len:(110 + tlv*16)*GF.S, t:0.2, max:0.2 });
      weaponTimers.tail = (1.4 - tlv*0.08) / rateMul;
    }
  }
}

// ── HERO HP ─────────────────────────────────────────────────────────────────
function healHero(n) { hp = Math.min(maxHp, hp + n); }
function hurtHero(n) {
  if (_ssMode) return;
  hp -= n; hero.hitFlash = 0.18; GF.setShake(0.25);
  if (hp <= 0) { hp = 0; gameOver(); }
}

// ── XP / LEVEL-UP ──────────────────────────────────────────────────────────
function xpForLevel(lv) { return Math.round(XP_BASE * Math.pow(XP_GROWTH, lv - 1)); }
function gainXp(n) { xp += n * (1 + relicVal('xp')); while (xp >= xpNeed) { xp -= xpNeed; doLevelUp(); } }
function doLevelUp() {
  level++;
  xpNeed = xpForLevel(level);
  spareUpgrades++;
  // burst only (no floating text — the LEVELUP overlay announces it, and a
  // lingering float would draw over the upgrade cards / scrim).
  GF.spawnParticles(hero.x, hero.y, '#ffe082', 14);
  maybeEvolve();
  if (gs === 'PLAYING' && !_ssMode) openLevelUp();
}
function maybeEvolve() {
  var newForm = form;
  for (var i = FORM_LEVELS.length - 1; i >= 0; i--) { if (level >= FORM_LEVELS[i]) { newForm = i; break; } }
  if (newForm > form) {
    form = newForm; HERO_RADIUS = FORM_RADIUS[form];
    evoFlash = 0.9; GF.setShake(0.5); justEvolved = true;
    GF.spawnParticles(hero.x, hero.y, '#7CFC9A', 28);
    healHero(maxHp * 0.25);
  }
}

function rollChoices() {
  var pool = [];
  var ownedCount = 0; for (var w = 0; w < WEAPON_KEYS.length; w++) if (ownsWeapon(WEAPON_KEYS[w])) ownedCount++;
  for (var i = 0; i < WEAPON_KEYS.length; i++) {
    var k = WEAPON_KEYS[i], lv = weaponLevel(k);
    if (lv > 0 && lv < 5) pool.push({ type:'weapon', key:k, to: lv + 1 });
    else if (lv === 0 && ownedCount < 6) pool.push({ type:'weapon', key:k, to: 1, isNew:true });
  }
  ['speed','dmg','rate','vit','magnet'].forEach(function(s) { pool.push({ type:'stat', key:s }); });
  if (weaponLevel('orbit') >= 5 && !weapons.orbitEvo && speedMul > 1) pool.push({ type:'evo', key:'maelstrom' });
  if (weaponLevel('spore') >= 5 && !weapons.sporeEvo) pool.push({ type:'evo', key:'nova' });
  if (level >= 9 && regenPerSec === 0) pool.push({ type:'evo', key:'regen' });
  if (weaponLevel('bite') >= 4 && devourHeal === 0) pool.push({ type:'evo', key:'devour' });

  for (var j = pool.length - 1; j > 0; j--) { var r = (Math.random() * (j + 1)) | 0; var tmp = pool[j]; pool[j] = pool[r]; pool[r] = tmp; }
  pool.sort(function(a, b) { return (b.type === 'evo' ? 1 : 0) - (a.type === 'evo' ? 1 : 0); });
  var out = pool.slice(0, 3);
  if (out.length === 0) out.push({ type:'stat', key:'vit' });
  return out;
}
function openLevelUp() { levelChoices = rollChoices(); gs = 'LEVELUP'; GF.saveRun(); }

function applyChoice(ch) {
  if (ch.type === 'weapon') {
    weapons[ch.key] = (weapons[ch.key] | 0) + 1; weaponTimers[ch.key] = 0.1;
    GF.spawnFloat(hero.x, hero.y - 24*GF.S, GF.t('w_' + ch.key + '_n'), '#cfe');
  } else if (ch.type === 'stat') {
    if (ch.key === 'speed') speedMul *= 1.15;
    else if (ch.key === 'dmg') dmgMul *= 1.20;
    else if (ch.key === 'rate') rateMul *= 1.15;
    else if (ch.key === 'vit') { maxHp += 25; healHero(25); }
    else if (ch.key === 'magnet') magnetMul *= 1.40;
  } else if (ch.type === 'evo') {
    if (ch.key === 'maelstrom') weapons.orbitEvo = true;
    else if (ch.key === 'nova') weapons.sporeEvo = true;
    else if (ch.key === 'regen') regenPerSec = 1.6;
    else if (ch.key === 'devour') devourHeal = 2;
    evoFlash = 0.9; GF.setShake(0.4);
  }
  spareUpgrades--;
  justEvolved = false;
  if (spareUpgrades > 0 && !_ssMode) { levelChoices = rollChoices(); }
  else { gs = 'PLAYING'; GF.gameStarted(); }
  GF.saveRun();
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function resetRun() {
  survivalSec = 0; kills = 0; score = 0;
  maxHp = Math.round((MAX_HP + metaVal('vigor') + relicVal('hp')) * (1 + relicVal('hppct'))); hp = maxHp; level = 1; xp = 0; xpNeed = XP_BASE; form = 0;  // vigor (Den) + Gorged Sac/Crown (Relics) = permanent +HP
  HERO_RADIUS = FORM_RADIUS[0];
  hero.x = GF.cx; hero.y = GF.cy; hero.vx = 0; hero.vy = 0; hero.hitFlash = 0; hero.faceX = 1; hero.faceY = 0;
  enemies.length = 0; motes.length = 0; bullets.length = 0; slashes.length = 0;
  spawnTimer = 0; spawnInterval = SPAWN_BASE;
  miniboss = null; boss = null;
  minibossSpawned = false; bossSpawned = false; secondMiniSpawned = false;
  bannerT = 0; enemyTypesSeen = {}; firstKillDone = false;
  dmgMul = 1 + metaVal('predator') / 100 + relicVal('dmg'); rateMul = 1; speedMul = 1 + relicVal('speed'); magnetMul = 1 + metaVal('hunger') / 100 + relicVal('range'); regenPerSec = relicVal('regen'); devourHeal = 0;  // Den perks + equipped Relics (dmg/speed/range/regen)
  relicRevives = Math.round(relicVal('revive'));  // Second Stomach: extra free revives this run
  weapons = { bite: 1 }; weaponTimers = {}; orbitAngle = 0;
  spareUpgrades = 0; levelChoices = [];
  reviveUsed = false; reviveLoading = false; evoFlash = 0; justEvolved = false;
  tutorialOpen = false; _ssMode = false;
}
function startGame() {
  resetRun(); gs = 'PLAYING';
  // Seed a few grunts close-but-not-touching so the auto-attack has targets in
  // the first ~3s (DESIGN: first kills by ~3s, first level-up ~15-20s).
  for (var i = 0; i < 4; i++) {
    var a = (Math.PI * 2 / 4) * i + Math.random() * 0.6;
    var dd = (110 + Math.random() * 60) * GF.S;
    enemies.push(makeEnemy('grunt', { x: hero.x + Math.cos(a) * dd, y: hero.y + Math.sin(a) * dd }));
  }
  spawnTimer = 0.4;
  GF.gameStarted(); GF.saveRun();
}
function gameOver() {
  // Second Stomach relic: spend a free (no-ad) revive instead of dying
  if (relicRevives > 0 && gs === 'PLAYING') {
    relicRevives -= 1; hp = Math.max(hp, Math.round(maxHp * 0.6));
    for (var ri = enemies.length - 1; ri >= 0; ri--) { if (GF.dist(hero.x, hero.y, enemies[ri].x, enemies[ri].y) < 180 * GF.S) enemies.splice(ri, 1); }
    hero.hitFlash = 0.3; GF.setShake(0.5); bannerT = 1.6;
    return;
  }
  score = Math.floor(survivalSec) * 2 + kills * 5;
  var newBest = score > best;
  if (newBest) { best = score; try { localStorage.setItem('devourling_best', best); } catch (e) {} }
  gs = 'GAMEOVER';
  // bank Essence from this run (greed upgrade boosts it) — the permanent payoff
  essenceEarned = Math.max(1, Math.floor((kills / 3 + survivalSec / 6 + level * 2) * (1 + metaVal('greed') / 100 + relicVal('essence'))));
  lastGameOverEssence = essenceEarned;
  meta.essence += essenceEarned;
  saveMeta();
  GF.gameEnded(); GF.saveRun();
  if (newBest && best > 0) GF.happytime();
}

// ── ADS (Yandex) — user-initiated rewarded revive + throttled interstitial ──
function showInterstitial(onDone) {
  var now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  if (now - lastInterstitialMs < INTERSTITIAL_GAP_MS) { if (onDone) onDone(); return; }
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showFullscreenAdv) { if (onDone) onDone(); return; }
  lastInterstitialMs = now;
  var done = false, opened = false;
  var finish = function() { if (done) return; done = true; if (onDone) onDone(); };
  var watchdog = setTimeout(function() { if (!opened) finish(); }, 4500);
  try {
    window.ysdk.adv.showFullscreenAdv({ callbacks: {
      onOpen: function() { opened = true; },

}

  var rewarded = false, opened = false, done = false;

}

  for (var i = enemies.length - 1; i >= 0; i--) { if (GF.dist(hero.x, hero.y, enemies[i].x, enemies[i].y) < 180 * GF.S) enemies.splice(i, 1); }
  bullets.length = 0;
  GF.spawnParticles(hero.x, hero.y, '#7CFC9A', 30);
  gs = 'PLAYING'; GF.gameStarted(); GF.saveRun();
}

// ── INPUT ────────────────────────────────────────────────────────────────
var helpBtn = null;
var uiButtons = [];

var _lastPressTs = 0, _lastPressX = -999, _lastPressY = -999;

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  pulseT += dt;
  if (bannerT > 0) bannerT = Math.max(0, bannerT - dt);
  if (evoFlash > 0) evoFlash = Math.max(0, evoFlash - dt);
  if (hero.hitFlash > 0) hero.hitFlash = Math.max(0, hero.hitFlash - dt);
  for (var si = slashes.length - 1; si >= 0; si--) { slashes[si].t -= dt; if (slashes[si].t <= 0) slashes.splice(si, 1); }

  if (gs !== 'PLAYING') return;
  if (tutorialOpen) return;
  if (_ssMode) { orbitAngle += dt * 2.4; return; }

  survivalSec += dt;
  score = Math.floor(survivalSec) * 2 + kills * 5;
  if (regenPerSec > 0) healHero(regenPerSec * dt);

  // movement input
  var ax = 0, ay = 0;
  if (GF.keys['ArrowLeft'] || GF.keys['KeyA']) ax -= 1;
  if (GF.keys['ArrowRight'] || GF.keys['KeyD']) ax += 1;
  if (GF.keys['ArrowUp'] || GF.keys['KeyW']) ay -= 1;
  if (GF.keys['ArrowDown'] || GF.keys['KeyS']) ay += 1;
  if (GF.touch.active) { ax += GF.touch.dx; ay += GF.touch.dy; }
  var alen = Math.sqrt(ax*ax + ay*ay);
  if (alen > 0) { ax /= alen; ay /= alen; hero.faceX = ax; hero.faceY = ay; }
  var spd = HERO_SPEED * speedMul * GF.S;
  hero.vx = GF.lerp(hero.vx, ax * spd, 0.22);
  hero.vy = GF.lerp(hero.vy, ay * spd, 0.22);
  hero.x += hero.vx * dt; hero.y += hero.vy * dt;
  var hr = HERO_RADIUS * GF.S;
  hero.x = GF.clamp(hero.x, hr, GF.W - hr);
  hero.y = GF.clamp(hero.y, hr, GF.H - hr);

  // spawns
  spawnInterval = Math.max(SPAWN_MIN, SPAWN_BASE - survivalSec * 0.0019);
  spawnTimer -= dt;
  if (spawnTimer <= 0 && enemies.length < 240) { spawnWave(); spawnTimer = spawnInterval * (0.8 + Math.random() * 0.4); }

  if (!minibossSpawned && survivalSec >= MINIBOSS_TIME) { minibossSpawned = true; spawnMiniboss(); }
  if (!secondMiniSpawned && survivalSec >= 480 && !boss) { secondMiniSpawned = true; if (!miniboss) spawnMiniboss(); }
  if (!bossSpawned && survivalSec >= BOSS_TIME) { bossSpawned = true; spawnBoss(); }

  fireWeapons(dt);

  // orbit fangs contact damage
  if (ownsWeapon('orbit')) {
    var olv = weaponLevel('orbit'), count = 2 + olv + (weapons.orbitEvo ? 3 : 0), orad = (46 + olv * 5) * GF.S;
    var odmg = weaponDamage((5 + olv * 3) * (weapons.orbitEvo ? 1.6 : 1)) * dt * 6;
    for (var oi = 0; oi < count; oi++) {
      var oa = orbitAngle + (Math.PI * 2 / count) * oi;
      var ox = hero.x + Math.cos(oa) * orad, oy = hero.y + Math.sin(oa) * orad;
      eachTarget(function(e) { if (GF.dist(ox, oy, e.x, e.y) <= 12 * GF.S + e.r) damageEnemy(e, odmg, false); });
    }
  }
  // thorn aura
  if (ownsWeapon('thorn')) {
    var tlv = weaponLevel('thorn'), trad = (40 + tlv * 14) * GF.S, tdmg = weaponDamage(6 + tlv * 3) * dt;
    eachTarget(function(e) { if (GF.dist(hero.x, hero.y, e.x, e.y) <= trad + e.r) damageEnemy(e, tdmg, false); });
  }

  // enemies update
  var heroR = HERO_RADIUS * GF.S;
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    if (!e) continue;
    if (e.hitT > 0) e.hitT -= dt;
    if (e.contactCd > 0) e.contactCd -= dt;
    tickPoison(e, dt); if (e.hp <= 0) continue;   // Venom Sac DoT (may kill the enemy)
    var ang = Math.atan2(hero.y - e.y, hero.x - e.x), sp = e.spd * GF.S;
    if (e.type === 'darter') { e.wob += dt * 6; ang += Math.sin(e.wob) * 0.5; }
    if (e.type === 'spitter') {
      var dToHero = GF.dist(hero.x, hero.y, e.x, e.y), pref = 220 * GF.S;
      if (dToHero < pref - 20*GF.S) ang += Math.PI;
      else if (dToHero < pref + 20*GF.S) sp *= 0.15;
      e.fireCd -= dt;
      if (e.fireCd <= 0 && dToHero < 420 * GF.S) {
        var ba = Math.atan2(hero.y - e.y, hero.x - e.x);
        bullets.push({ friendly:false, x: e.x, y: e.y, vx: Math.cos(ba)*150*GF.S, vy: Math.sin(ba)*150*GF.S, r: R.bullet*GF.S, dmg: 10, life: 4, col:'#4dd0e1' });
        e.fireCd = 2.4 + Math.random();
      }
    }
    if (e.kb > 0) { e.x += e.kbx * e.kb * dt; e.y += e.kby * e.kb * dt; e.kb = Math.max(0, e.kb - dt * 4); }
    e.x += Math.cos(ang) * sp * dt;
    e.y += Math.sin(ang) * sp * dt;
    if (GF.dist(hero.x, hero.y, e.x, e.y) <= heroR + e.r && e.contactCd <= 0) {
      hurtHero(e.dmg); e.contactCd = CONTACT_COOLDOWN;
      var th = relicVal('thorns'); if (th > 0) { damageEnemy(e, e.dmg * th, false); GF.spawnParticles(e.x, e.y, '#e8985e', 3); }  // Thorn Hide: reflect contact damage
      if (e.type === 'brute') { var ka = Math.atan2(e.y - hero.y, e.x - hero.x); e.kb = 1.0; e.kbx = Math.cos(ka)*120*GF.S; e.kby = Math.sin(ka)*120*GF.S; }
      if (gs !== 'PLAYING') return;
    }
  }

  // miniboss update
  if (miniboss) {
    var mb = miniboss; if (mb.hitT > 0) mb.hitT -= dt; if (mb.contactCd > 0) mb.contactCd -= dt;
    mb.wob += dt;
    var ma = Math.atan2(hero.y - mb.y, hero.x - mb.x);
    mb.x += Math.cos(ma) * mb.spd * GF.S * dt; mb.y += Math.sin(ma) * mb.spd * GF.S * dt;
    mb.spitCd -= dt;
    if (mb.spitCd <= 0) { for (var k = 0; k < 3; k++) enemies.push(makeEnemy('swarmling', { x: mb.x + (Math.random()-0.5)*40*GF.S, y: mb.y + (Math.random()-0.5)*40*GF.S })); mb.spitCd = 3.4; GF.setShake(0.2); }
    if (GF.dist(hero.x, hero.y, mb.x, mb.y) <= heroR + mb.r && mb.contactCd <= 0) { hurtHero(mb.dmg); mb.contactCd = CONTACT_COOLDOWN; if (gs !== 'PLAYING') return; }
  }

  // boss update
  if (boss) {
    var bo = boss; if (bo.hitT > 0) bo.hitT -= dt; if (bo.contactCd > 0) bo.contactCd -= dt;
    bo.wob += dt;
    if (bo.y < bo.ty) { bo.y += 60 * GF.S * dt; }
    else {
      bo.phase = bo.hp < bo.maxHp * 0.5 ? 1 : 0;
      if (bo.charging > 0) {
        bo.charging -= dt; bo.x += bo.chargeVX * dt; bo.y += bo.chargeVY * dt;
        bo.x = GF.clamp(bo.x, bo.r, GF.W - bo.r); bo.y = GF.clamp(bo.y, bo.r, GF.H - bo.r);
      } else {
        var ba2 = Math.atan2(hero.y - bo.y, hero.x - bo.x);
        bo.x += Math.cos(ba2) * bo.spd * GF.S * dt; bo.y += Math.sin(ba2) * bo.spd * GF.S * dt;
      }
      bo.ringCd -= dt;
      if (bo.ringCd <= 0) {
        var n = bo.phase ? 20 : 14;
        for (var ri = 0; ri < n; ri++) { var aa = (Math.PI*2/n)*ri + bo.wob; bullets.push({ friendly:false, x: bo.x, y: bo.y, vx: Math.cos(aa)*130*GF.S, vy: Math.sin(aa)*130*GF.S, r: R.bullet*GF.S, dmg: 12, life: 5, col:'#ff3b6b' }); }
        bo.ringCd = bo.phase ? 2.2 : 3.0; GF.setShake(0.2);
      }
      bo.summonCd -= dt;
      if (bo.summonCd <= 0) { for (var sm = 0; sm < 3; sm++) enemies.push(makeEnemy(Math.random()<0.5?'darter':'grunt')); bo.summonCd = 5.5; }
      bo.chargeCd -= dt;
      if (bo.chargeCd <= 0) { var ca = Math.atan2(hero.y - bo.y, hero.x - bo.x); bo.chargeVX = Math.cos(ca)*260*GF.S; bo.chargeVY = Math.sin(ca)*260*GF.S; bo.charging = 0.7; bo.chargeCd = 7.0; GF.setShake(0.4); }
    }
    if (GF.dist(hero.x, hero.y, bo.x, bo.y) <= heroR + bo.r && bo.contactCd <= 0) { hurtHero(bo.dmg); bo.contactCd = CONTACT_COOLDOWN; if (gs !== 'PLAYING') return; }
  }

  // bullets
  for (var bi = bullets.length - 1; bi >= 0; bi--) {
    var b = bullets[bi];
    b.life -= dt; if (b.life <= 0) { bullets.splice(bi, 1); continue; }
    if (b.friendly && b.homing) {
      var tg = nearestEnemy(b.x, b.y, 1e9);
      if (tg) { var ha = Math.atan2(tg.y - b.y, tg.x - b.x), cur = Math.atan2(b.vy, b.vx);
        var na = cur + Math.max(-0.12, Math.min(0.12, ((ha - cur + Math.PI*3) % (Math.PI*2)) - Math.PI));
        var sp2 = Math.sqrt(b.vx*b.vx + b.vy*b.vy); b.vx = Math.cos(na)*sp2; b.vy = Math.sin(na)*sp2; }
    }
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.x < -40 || b.x > GF.W + 40 || b.y < -40 || b.y > GF.H + 40) { bullets.splice(bi, 1); continue; }
    if (b.friendly) {
      var hitE = null;
      eachTarget(function(e) { if (!hitE && GF.dist(b.x, b.y, e.x, e.y) <= b.r + e.r) hitE = e; });
      if (hitE) { damageEnemy(hitE, b.dmg, false); GF.spawnParticles(b.x, b.y, b.col, 5); bullets.splice(bi, 1); }
    } else {
      if (GF.dist(b.x, b.y, hero.x, hero.y) <= b.r + heroR) { hurtHero(b.dmg); GF.spawnParticles(b.x, b.y, b.col, 6); bullets.splice(bi, 1); if (gs !== 'PLAYING') return; }
    }
  }

  // motes (magnet + collect)
  var magR = MAGNET_RADIUS * magnetMul * GF.S;
  for (var mi = motes.length - 1; mi >= 0; mi--) {
    var mo = motes[mi];
    mo.life -= dt; if (mo.life <= 0) { motes.splice(mi, 1); continue; }
    mo.wob += dt * 4;
    var d = GF.dist(hero.x, hero.y, mo.x, mo.y);
    if (d < magR) {
      var pull = GF.lerp(120, 520, 1 - d / magR) * GF.S, ma2 = Math.atan2(hero.y - mo.y, hero.x - mo.x);
      mo.x += Math.cos(ma2) * pull * dt; mo.y += Math.sin(ma2) * pull * dt;
    } else { mo.x += mo.vx * dt; mo.y += mo.vy * dt; mo.vx *= 0.94; mo.vy *= 0.94; }
    if (d <= heroR + mo.r + 4 * GF.S) {
      if (mo.kind === 'heal') { healHero(12); GF.spawnFloat(hero.x, hero.y - 18*GF.S, '+12', '#ff8a8a'); }
      else gainXp(mo.val);
      GF.spawnParticles(mo.x, mo.y, mo.kind === 'gold' ? '#ffd54f' : mo.kind === 'heal' ? '#ff6e6e' : '#8be9fd', 4);
      motes.splice(mi, 1);
    }
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  var g = ctx.createRadialGradient(GF.cx, GF.cy, 0, GF.cx, GF.cy, Math.max(GF.W, GF.H) * 0.75);
  g.addColorStop(0, '#0c0c22'); g.addColorStop(1, '#02020a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, GF.W, GF.H);
  drawGrid(ctx);

  if (gs === 'PLAYING' || gs === 'LEVELUP' || gs === 'GAMEOVER') {
    drawMotes(ctx);
    drawSlashes(ctx);
    drawEnemies(ctx);
    drawBullets(ctx);
    if (miniboss) drawBigEnemy(ctx, miniboss, '#ff5fa2', false);
    if (boss) drawBigEnemy(ctx, boss, '#ff3b6b', true);
    drawHero(ctx);
  }

  if (evoFlash > 0) { ctx.fillStyle = 'rgba(124,252,154,' + (evoFlash * 0.35) + ')'; ctx.fillRect(0, 0, GF.W, GF.H); }

  if (gs === 'PLAYING') {
    drawHUD(ctx);
    if (bannerT > 0) drawBanner(ctx);
    if (!firstKillDone) drawStartHint(ctx);
    if (tutorialOpen) drawTutorialPanel(ctx);
  }
  if (gs === 'LEVELUP') drawLevelUp(ctx);
  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
}

function drawGrid(ctx) {
  ctx.strokeStyle = 'rgba(90,110,200,0.06)'; ctx.lineWidth = 1;
  var step = 56 * GF.S;
  for (var x = (GF.cx % step); x < GF.W; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GF.H); ctx.stroke(); }
  for (var y = (GF.cy % step); y < GF.H; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GF.W, y); ctx.stroke(); }
}

function drawHero(ctx) {
  var r = HERO_RADIUS * GF.S;
  // aura glow
  var glow = ctx.createRadialGradient(hero.x, hero.y, 0, hero.x, hero.y, r * 2.6);
  var auraCol = ['rgba(77,208,225,0.45)','rgba(124,252,154,0.5)','rgba(255,209,102,0.5)','rgba(255,95,162,0.55)'][form];
  glow.addColorStop(0, auraCol); glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(hero.x, hero.y, r * 2.6, 0, Math.PI*2); ctx.fill();

  // orbit fangs
  if (ownsWeapon('orbit')) {
    var olv = weaponLevel('orbit'), count = 2 + olv + (weapons.orbitEvo ? 3 : 0), orad = (46 + olv * 5) * GF.S;
    for (var oi = 0; oi < count; oi++) {
      var oa = orbitAngle + (Math.PI * 2 / count) * oi, ox = hero.x + Math.cos(oa) * orad, oy = hero.y + Math.sin(oa) * orad;
      ctx.save(); ctx.translate(ox, oy); ctx.rotate(oa + Math.PI/2);
      ctx.fillStyle = weapons.orbitEvo ? '#ff5fa2' : '#e0f7ff'; ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 10*GF.S;
      ctx.beginPath(); ctx.moveTo(0, -9*GF.S); ctx.lineTo(5*GF.S, 6*GF.S); ctx.lineTo(-5*GF.S, 6*GF.S); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    ctx.shadowBlur = 0;
  }
  // thorn aura ring
  if (ownsWeapon('thorn')) {
    var tlv = weaponLevel('thorn'), trad = (40 + tlv * 14) * GF.S;
    ctx.strokeStyle = 'rgba(124,252,154,' + (0.18 + 0.12*Math.sin(pulseT*4)) + ')'; ctx.lineWidth = 3 * GF.S;
    ctx.beginPath(); ctx.arc(hero.x, hero.y, trad, 0, Math.PI*2); ctx.stroke();
  }

  GF.drawSprite('hero' + form, hero.x, hero.y, r * 2.4, function(c, x, y, sz) {
    var rad = sz / 2, baseCols = ['#4dd0e1','#7CFC9A','#ffd166','#ff5fa2'];
    c.save(); c.translate(x, y); c.rotate(Math.atan2(hero.faceY, hero.faceX) + Math.PI/2);
    c.fillStyle = hero.hitFlash > 0 ? '#fff' : baseCols[form];
    c.shadowColor = baseCols[form]; c.shadowBlur = 12 * GF.S;
    var spikes = 3 + form * 2;
    c.beginPath();
    for (var k = 0; k < spikes * 2; k++) {
      var a = (Math.PI / spikes) * k - Math.PI/2, rr = (k % 2 ? rad * 0.55 : rad);
      var px = Math.cos(a) * rr, py = Math.sin(a) * rr;
      if (k === 0) c.moveTo(px, py); else c.lineTo(px, py);
    }
    c.closePath(); c.fill(); c.shadowBlur = 0;
    c.fillStyle = '#0a0a14';
    c.beginPath(); c.arc(-rad*0.28, -rad*0.1, rad*0.16, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(rad*0.28, -rad*0.1, rad*0.16, 0, Math.PI*2); c.fill();
    c.restore();
  });
}

function drawEnemies(ctx) {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    var col = e.hitT > 0 ? '#fff' : e.col, rad = e.r;
    if (e.elite) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 14 * GF.S; }
    GF.drawSprite(e.type, e.x, e.y, e.r * 2.2, function(c, x, y, sz) {
      c.save(); c.fillStyle = col; c.shadowColor = e.elite ? '#fff' : e.col; c.shadowBlur = (e.elite ? 14 : 8) * GF.S;
      if (e.type === 'darter') {
        var ang = Math.atan2(hero.y - y, hero.x - x);
        c.translate(x, y); c.rotate(ang);
        c.beginPath(); c.moveTo(rad,0); c.lineTo(-rad, rad*0.8); c.lineTo(-rad,-rad*0.8); c.closePath(); c.fill();
      } else if (e.type === 'brute') {
        c.translate(x, y);
        c.beginPath(); for (var h=0; h<6; h++){ var a=(Math.PI/3)*h + e.wob*0.2; var px=Math.cos(a)*rad, py=Math.sin(a)*rad; if(h===0)c.moveTo(px,py);else c.lineTo(px,py);} c.closePath(); c.fill();
        c.shadowBlur = 0; c.fillStyle = 'rgba(0,0,0,0.3)'; c.beginPath(); c.arc(0,0,rad*0.4,0,Math.PI*2); c.fill();
      } else if (e.type === 'spitter') {
        c.beginPath(); c.arc(x,y,rad,0,Math.PI*2); c.fill();
        c.shadowBlur = 0; c.fillStyle='#0a2a2e'; c.beginPath(); c.arc(x,y,rad*0.42,0,Math.PI*2); c.fill();
      } else if (e.type === 'swarmling') {
        c.beginPath(); c.arc(x,y,rad,0,Math.PI*2); c.fill();
      } else { // grunt
        c.beginPath(); c.arc(x,y,rad,0,Math.PI*2); c.fill();
        c.shadowBlur = 0; c.fillStyle='#3a0a0a';
        c.beginPath(); c.arc(x-rad*0.32,y-rad*0.12,rad*0.18,0,Math.PI*2); c.arc(x+rad*0.32,y-rad*0.12,rad*0.18,0,Math.PI*2); c.fill();
      }
      c.restore();
    });
  }
  ctx.shadowBlur = 0;
}

function drawBigEnemy(ctx, e, col, isBoss) {
  var frac = GF.clamp(e.hp / e.maxHp, 0, 1);
  var bw = Math.min(GF.W * 0.74, 460 * GF.S), bh = 12 * GF.S, bx = GF.cx - bw/2, by = (isBoss ? 18 : 46) * GF.S;
  ctx.fillStyle = 'rgba(0,0,0,0.45)'; GF.rr(ctx, bx, by, bw, bh, bh/2); ctx.fill();
  ctx.fillStyle = col; GF.rr(ctx, bx, by, bw * frac, bh, bh/2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(12*GF.S,10,16) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText(isBoss ? GF.t('boss_in') : GF.t('miniboss_in'), GF.cx, by - 2*GF.S);
  ctx.textBaseline = 'alphabetic';

  GF.drawSprite(isBoss ? 'boss' : '__none__', e.x, e.y, e.r * 2.2, function(c, x, y, sz) {
    var rad = e.r;
    c.fillStyle = e.hitT > 0 ? '#fff' : col; c.shadowColor = col; c.shadowBlur = 24 * GF.S;
    c.beginPath();
    var spikes = isBoss ? 11 : 8;
    for (var h = 0; h < spikes * 2; h++) { var a = (Math.PI/spikes)*h + e.wob*0.3; var r2 = (h%2?rad*0.72:rad); var px=x+Math.cos(a)*r2, py=y+Math.sin(a)*r2; if(h===0)c.moveTo(px,py);else c.lineTo(px,py);}
    c.closePath(); c.fill(); c.shadowBlur = 0;
  });
  // eyes (absolute, drawn over sprite or fallback)
  ctx.fillStyle = '#1a0008';
  ctx.beginPath(); ctx.arc(e.x - e.r*0.32, e.y - e.r*0.12, e.r*0.13, 0, Math.PI*2); ctx.arc(e.x + e.r*0.32, e.y - e.r*0.12, e.r*0.13, 0, Math.PI*2); ctx.fill();
  // charge telegraph
  if (isBoss && e.charging > 0) { ctx.strokeStyle = 'rgba(255,59,107,0.6)'; ctx.lineWidth = 3*GF.S; ctx.beginPath(); ctx.arc(e.x, e.y, e.r * 1.3, 0, Math.PI*2); ctx.stroke(); }
}

function drawBullets(ctx) {
  for (var i = 0; i < bullets.length; i++) {
    var b = bullets[i];
    ctx.fillStyle = b.col; ctx.shadowColor = b.col; ctx.shadowBlur = 8 * GF.S;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function drawMotes(ctx) {
  for (var i = 0; i < motes.length; i++) {
    var m = motes[i];
    var col = m.kind === 'gold' ? '#ffd54f' : m.kind === 'heal' ? '#ff6e6e' : m.kind === 'big' ? '#b388ff' : '#8be9fd';
    var fade = m.life < 1.5 ? (0.4 + 0.6 * Math.abs(Math.sin(m.wob * 2))) : 1;
    ctx.globalAlpha = fade; ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 10 * GF.S;
    var rr = m.r * (1 + 0.15 * Math.sin(m.wob));
    if (m.kind === 'heal') { ctx.fillRect(m.x - rr*0.35, m.y - rr, rr*0.7, rr*2); ctx.fillRect(m.x - rr, m.y - rr*0.35, rr*2, rr*0.7); }
    else { ctx.beginPath(); ctx.arc(m.x, m.y, rr, 0, Math.PI*2); ctx.fill(); }
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function drawSlashes(ctx) {
  for (var i = 0; i < slashes.length; i++) {
    var s = slashes[i], a = s.t / s.max;
    ctx.globalAlpha = a;
    if (s.kind === 'bite') { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3*GF.S; ctx.beginPath(); ctx.arc(s.x, s.y, s.r * (1.2 - a*0.4), 0, Math.PI*1.6); ctx.stroke(); }
    else if (s.kind === 'spore') { ctx.strokeStyle = '#7CFC9A'; ctx.lineWidth = 4*GF.S; ctx.beginPath(); ctx.arc(s.x, s.y, s.r * (1 - a), 0, Math.PI*2); ctx.stroke(); }
    else if (s.kind === 'lash') { ctx.strokeStyle = '#ff9c57'; ctx.lineWidth = 5*GF.S; ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x + Math.cos(s.ang)*s.len, s.y + Math.sin(s.ang)*s.len); ctx.stroke(); }
    else if (s.kind === 'tail') { ctx.fillStyle = 'rgba(180,136,255,0.5)'; ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.arc(s.x, s.y, s.len, s.ang - 1.0, s.ang + 1.0); ctx.closePath(); ctx.fill(); }
    else if (s.kind === 'spark') { ctx.strokeStyle = '#a0e9ff'; ctx.lineWidth = 3*GF.S; ctx.shadowColor='#a0e9ff'; ctx.shadowBlur=8*GF.S; ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke(); ctx.shadowBlur=0; }
  }
  ctx.globalAlpha = 1;
}

// ── HUD ──────────────────────────────────────────────────────────────────
function fmtTime(t) { var m = Math.floor(t / 60), s = Math.floor(t % 60); return (m<10?'0':'')+m+':'+(s<10?'0':'')+s; }

function drawHUD(ctx) {
  var fs = GF.clamp(17 * GF.S, 13, 24);
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + fs + 'px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(fmtTime(survivalSec), 14 * GF.S, 14 * GF.S);
  ctx.textAlign = 'center'; ctx.fillStyle = '#ffe082';
  ctx.fillText(GF.t('lvl') + ' ' + level + '  ·  ' + GF.t('form' + form), GF.cx, 14 * GF.S);
  ctx.font = GF.clamp(12*GF.S,10,16) + 'px sans-serif'; ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t('kills') + ': ' + kills, GF.cx, 14 * GF.S + fs + 2*GF.S);

  var helpSz = GF.clamp(30 * GF.S, 24, 40), rightPad = 14 * GF.S;
  helpBtn = { x: GF.W - rightPad - helpSz, y: 12 * GF.S, w: helpSz, h: helpSz };
  var hpW = GF.clamp(120 * GF.S, 80, 170), hpH = GF.clamp(14*GF.S, 11, 18);
  var hpX = helpBtn.x - 10*GF.S - hpW, hpY = 14 * GF.S;
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; GF.rr(ctx, hpX, hpY, hpW, hpH, hpH/2); ctx.fill();
  var hpFrac = GF.clamp(hp / maxHp, 0, 1), hpCol = hpFrac > 0.5 ? '#4caf50' : hpFrac > 0.25 ? '#ffb300' : '#f44336';
  ctx.fillStyle = hpCol; GF.rr(ctx, hpX, hpY, hpW * hpFrac, hpH, hpH/2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(10*GF.S,9,13) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(Math.ceil(hp) + ' / ' + maxHp, hpX + hpW/2, hpY + hpH/2 + 0.5);
  ctx.textBaseline = 'top';
  GF.rr(ctx, helpBtn.x, helpBtn.y, helpBtn.w, helpBtn.h, 7 * GF.S);
  ctx.fillStyle = 'rgba(40,48,80,0.85)'; ctx.fill();
  ctx.strokeStyle = 'rgba(160,180,230,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#cfe'; ctx.font = 'bold ' + (helpSz * 0.55) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', helpBtn.x + helpSz/2, helpBtn.y + helpSz/2 + 1);
  ctx.textBaseline = 'top';

  var barH = GF.clamp(16 * GF.S, 12, 22), barY = GF.H - barH - 12 * GF.S, barX = 14 * GF.S, barW = GF.W - 28 * GF.S;
  var owned = []; for (var w = 0; w < WEAPON_KEYS.length; w++) if (ownsWeapon(WEAPON_KEYS[w])) owned.push(WEAPON_KEYS[w]);
  var pipSz = GF.clamp(22*GF.S, 16, 30), pipGap = pipSz + 6*GF.S, pipY = barY - pipSz - 8*GF.S;
  for (var p = 0; p < owned.length; p++) drawWeaponIcon(ctx, owned[p], barX + p * pipGap, pipY, pipSz, weaponLevel(owned[p]));
  ctx.fillStyle = 'rgba(0,0,0,0.45)'; GF.rr(ctx, barX, barY, barW, barH, barH/2); ctx.fill();
  var xpFrac = GF.clamp(xp / xpNeed, 0, 1);
  var grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
  grad.addColorStop(0, '#8be9fd'); grad.addColorStop(1, '#50fa7b');
  ctx.fillStyle = grad; GF.rr(ctx, barX, barY, barW * xpFrac, barH, barH/2); ctx.fill();
}

function drawWeaponIcon(ctx, key, x, y, sz, lv) {
  var cols = { bite:'#ff6e6e', orbit:'#e0f7ff', spore:'#7CFC9A', spit:'#9cff57', lash:'#ff9c57', thorn:'#7CFC9A', spark:'#a0e9ff', tail:'#b388ff' };
  GF.rr(ctx, x, y, sz, sz, 5*GF.S); ctx.fillStyle = 'rgba(20,24,40,0.85)'; ctx.fill();
  ctx.strokeStyle = cols[key] || '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = cols[key] || '#fff';
  ctx.beginPath(); ctx.arc(x + sz/2, y + sz/2, sz*0.26, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffe082'; ctx.font = 'bold ' + (sz*0.34) + 'px sans-serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
  ctx.fillText(lv, x + sz - 2*GF.S, y + sz - 1*GF.S);
  ctx.textBaseline = 'top';
}

function drawBanner(ctx) {
  var a = Math.min(1, bannerT);
  ctx.save(); ctx.globalAlpha = a;
  ctx.font = 'bold ' + GF.clamp(30 * GF.S, 22, 46) + 'px sans-serif';
  ctx.fillStyle = '#ff5fa2'; ctx.shadowColor = '#ff1744'; ctx.shadowBlur = 22 * GF.S;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(bannerTxt, GF.cx, GF.H * 0.32);
  ctx.restore(); ctx.shadowBlur = 0;
}

function drawStartHint(ctx) {
  var pulse = 0.6 + 0.4 * Math.sin(pulseT * 4);
  ctx.font = 'bold ' + GF.clamp(15 * GF.S, 12, 21) + 'px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,' + (0.55 + 0.45 * pulse) + ')';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('drag_hint'), GF.cx, GF.H - 70 * GF.S);
}

// ── BUTTON HELPER ─────────────────────────────────────────────────────────
function drawButton(ctx, x, y, w, h, label, fn, opts) {
  opts = opts || {};
  var enabled = opts.enabled !== false;
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  if (!enabled) { grad.addColorStop(0, '#3a3f52'); grad.addColorStop(1, '#2b2f3e'); }
  else if (opts.accent === 'gold') { grad.addColorStop(0, '#ffca28'); grad.addColorStop(1, '#ffa000'); }
  else if (opts.accent === 'ghost') { grad.addColorStop(0, 'rgba(60,70,100,0.6)'); grad.addColorStop(1, 'rgba(40,48,72,0.6)'); }
  else { grad.addColorStop(0, '#9b4dff'); grad.addColorStop(1, '#6a1bd1'); }
  GF.rr(ctx, x, y, w, h, Math.min(h / 2, 16 * GF.S));
  ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = enabled ? (opts.accent === 'gold' ? '#3a2a00' : '#fff') : '#7a8096';
  ctx.font = 'bold ' + GF.clamp((opts.fs || 18) * GF.S, 13, 24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1);
  ctx.textBaseline = 'alphabetic';
  if (enabled && fn) uiButtons.push({ x: x, y: y, w: w, h: h, fn: fn });
}

function _wrapTextLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var test = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width <= maxW || !cur) cur = test;
    else { lines.push(cur); cur = words[i]; }
  }
  if (cur) lines.push(cur);
  return lines;
}

// ── MENU ───────────────────────────────────────────────────────────────────
// THE DEN — owned progression panel on the menu: banked Essence, the
// reason-to-return payoff (idle + daily streak), a clear goal, and 4 buyable
// permanent upgrades. Registers tap targets in uiButtons. Returns bottom Y.
function drawDenPanel(ctx, topY, maxW) {
  var S = GF.S, ru = (GF.lang === 'ru');
  var x = GF.cx - maxW / 2, pad = 12 * S;
  var btnH = GF.clamp(50 * S, 42, 60), gap = 8 * S, rowH = btnH + gap;
  var hasBanner = (pendingIdleEssence > 0 || lastStreakBonus > 0);
  var panelH = pad + 26 * S + (hasBanner ? 18 * S : 0) + 16 * S + rowH * 2 - gap + pad;
  GF.rr(ctx, x, topY, maxW, panelH, 14 * S); ctx.fillStyle = 'rgba(18,10,30,0.95)'; ctx.fill();
  ctx.strokeStyle = 'rgba(155,77,255,0.32)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  var cy = topY + pad;
  // banked Essence (the owned currency)
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + GF.clamp(21 * S, 16, 27) + 'px sans-serif'; ctx.fillStyle = '#ffca28';
  ctx.fillText((meta.essence | 0) + ' ' + GF.t('essence'), x + pad, cy);
  ctx.font = GF.clamp(10.5 * S, 9, 14) + 'px sans-serif'; ctx.fillStyle = '#b39ddb'; ctx.textAlign = 'right';
  ctx.fillText(GF.t('den'), x + maxW - pad, cy + 6 * S);
  cy += 26 * S;
  // return-to-play payoff banner (idle + daily streak)
  if (hasBanner) {
    var parts = [];
    if (pendingIdleEssence > 0) parts.push('+' + pendingIdleEssence + ' ' + (ru ? 'пока вас не было' : 'fed while away'));
    if (lastStreakBonus > 0) parts.push((ru ? 'День' : 'Day') + ' ' + meta.streak + ': +' + lastStreakBonus);
    ctx.textAlign = 'left'; ctx.fillStyle = '#7CFC9A'; ctx.font = GF.clamp(10.5 * S, 8.5, 13.5) + 'px sans-serif';
    ctx.fillText(parts.join('   •   '), x + pad, cy); cy += 18 * S;
  }
  // goal line
  ctx.textAlign = 'center'; ctx.fillStyle = '#8a7fb0'; ctx.font = GF.clamp(10.5 * S, 9, 13.5) + 'px sans-serif';
  ctx.fillText(ru ? 'Трать Эссенцию на постоянные улучшения рода' : 'Spend Essence on permanent bloodline upgrades', GF.cx, cy);
  cy += 16 * S;
  // 4 permanent-upgrade buttons (2x2)
  var keys = ['vigor', 'predator', 'greed', 'hunger'];
  var labels = ru ? { vigor: 'Мощь +ОЗ', predator: 'Хищник +урон', greed: 'Жадность +эсс', hunger: 'Голод +магнит' }
                  : { vigor: 'Vigor +HP', predator: 'Predator +dmg', greed: 'Greed +essence', hunger: 'Hunger +magnet' };
  var bw = (maxW - pad * 2 - gap) / 2;
  for (var i = 0; i < keys.length; i++) {
    var key = keys[i], col = i % 2, row = (i / 2) | 0;
    var bx = x + pad + col * (bw + gap), by = cy + row * rowH;
    var lv = metaRank(key), maxed = metaIsMax(key), cost = metaCost(key);
    var afford = !maxed && meta.essence >= cost;
    GF.rr(ctx, bx, by, bw, btnH, 9 * S);
    ctx.fillStyle = maxed ? 'rgba(124,252,154,0.16)' : (afford ? 'rgba(255,202,40,0.16)' : 'rgba(255,255,255,0.05)'); ctx.fill();
    ctx.strokeStyle = afford ? '#ffca28' : 'rgba(255,255,255,0.14)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillStyle = (afford || maxed) ? '#fff' : '#8a8098'; ctx.font = 'bold ' + GF.clamp(10.5 * S, 8.5, 13) + 'px sans-serif';
    ctx.fillText(labels[key], bx + bw / 2, by + 6 * S);
    ctx.font = GF.clamp(9 * S, 7.5, 11.5) + 'px sans-serif'; ctx.fillStyle = '#b39ddb';
    ctx.fillText('Lv ' + lv + '/' + META_DEFS[key].max, bx + bw / 2, by + btnH * 0.44);
    ctx.fillStyle = maxed ? '#7CFC9A' : (afford ? '#ffca28' : '#8a8098'); ctx.font = 'bold ' + GF.clamp(10 * S, 8, 12.5) + 'px sans-serif';
    ctx.fillText(maxed ? (ru ? 'МАКС' : 'MAX') : ('' + cost), bx + bw / 2, by + btnH - 14 * S);
    if (afford) (function (k) { uiButtons.push({ x: bx, y: by, w: bw, h: btnH, fn: function () { if (metaBuy(k) && GF.happytime) GF.happytime(); } }); })(key);
    ctx.textBaseline = 'alphabetic';
  }
  return topY + panelH;
}

function drawMenu(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(4,4,14,0.9)'; ctx.fillRect(0, 0, GF.W, GF.H);
  var wide = GF.W / GF.H > 1.15;

  var titleFs = GF.clamp(42 * GF.S, 28, 62);
  ctx.shadowColor = 'rgba(155,77,255,0.6)'; ctx.shadowBlur = 30 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  var topY = GF.clamp(GF.H * 0.12, 50, 140);
  ctx.fillText(GF.t('title'), GF.cx, topY);
  ctx.shadowBlur = 0;
  ctx.font = GF.clamp(15 * GF.S, 12, 20) + 'px sans-serif'; ctx.fillStyle = '#b39ddb';
  ctx.fillText(GF.t('sub'), GF.cx, topY + titleFs * 0.6);

  // one-line control hint
  ctx.font = GF.clamp(11.5 * GF.S, 9.5, 15) + 'px sans-serif'; ctx.fillStyle = '#8a7fb0';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.lang === 'ru' ? 'Веди пальцем, челюсти бьют сами; ешь искры и расти'
                                : 'Drag to move, jaws auto-attack; eat motes to evolve',
               GF.cx, topY + titleFs * 0.6 + GF.clamp(20 * GF.S, 14, 30));
  // THE DEN meta panel
  var maxW = Math.min(GF.W * 0.9, 460 * GF.S);
  var panelBottom = drawDenPanel(ctx, topY + titleFs * 0.6 + GF.clamp(40 * GF.S, 30, 56), maxW);
  var btnW = GF.clamp((wide ? 300 : 230) * GF.S, 170, 380), btnH = GF.clamp((wide ? 64 : 54) * GF.S, 48, 82);
  var btnX = GF.cx - btnW / 2;
  var wideFloor = GF.H * 0.58;
  var btnY = wide
    ? Math.max(panelBottom + 14 * GF.S, wideFloor)
    : Math.min(panelBottom + 14 * GF.S, GF.H - btnH - 30 * GF.S);
  if (wide) {
    var _t = performance.now() / 1000, _k = Math.sin(_t * 2.2), _p = 1 + 0.05 * _k;
    var _w = btnW * _p, _h = btnH * _p, _x = GF.cx - _w / 2, _y = btnY + btnH / 2 - _h / 2;
    var grad = ctx.createLinearGradient(_x, _y, _x, _y + _h);
    grad.addColorStop(0, '#9b4dff'); grad.addColorStop(1, '#6a1ed6');
    ctx.save();
    ctx.shadowColor = 'rgba(155,77,255,' + (0.4 + 0.28 * _k).toFixed(3) + ')';
    ctx.shadowBlur = (22 + 10 * _k) * GF.S;
    GF.rr(ctx, _x, _y, _w, _h, _h / 2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.restore();
    ctx.font = 'bold ' + GF.clamp(22 * GF.S, 14, 28) + 'px sans-serif';
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('▶ ' + GF.t('play'), GF.cx, btnY + btnH / 2);
    ctx.textBaseline = 'alphabetic';
    uiButtons.push({ x: btnX, y: btnY, w: btnW, h: btnH, fn: function() { saveTutorialSeen(); startGame(); } });
  } else {
    drawButton(ctx, btnX, btnY, btnW, btnH, GF.t('play'), function() { saveTutorialSeen(); startGame(); });
  }
  if (best > 0) {
    ctx.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif'; ctx.fillStyle = '#8a7fb0'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, btnY + btnH + 24 * GF.S);
  }
}

// ── LEVEL-UP CHOOSER ───────────────────────────────────────────────────────
function cardLabel(ch) {
  if (ch.type === 'weapon') return { name: GF.t('w_' + ch.key + '_n'), desc: GF.t('w_' + ch.key + '_d'),
    tag: ch.isNew ? GF.t('new_weapon') : (GF.t('lvl_to') + ' ' + ch.to), col: '#9b4dff' };
  if (ch.type === 'stat') return { name: GF.t('s_' + ch.key + '_n'), desc: GF.t('s_' + ch.key + '_d'), tag: '', col: '#42a5f5' };
  return { name: GF.t('e_' + ch.key + '_n'), desc: GF.t('e_' + ch.key + '_d'), tag: '★', col: '#ffca28' };
}
function drawLevelUp(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(4,4,14,0.92)'; ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(30 * GF.S, 22, 44);
  ctx.shadowColor = 'rgba(124,252,154,0.6)'; ctx.shadowBlur = 24 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif'; ctx.fillStyle = '#7CFC9A'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var topY = GF.clamp(GF.H * 0.07, 24, 80);
  ctx.fillText(GF.t('levelup') + '  ' + level, GF.cx, topY);
  ctx.shadowBlur = 0;
  if (justEvolved) {
    ctx.font = 'bold ' + GF.clamp(15*GF.S,12,20) + 'px sans-serif'; ctx.fillStyle = '#7CFC9A';
    ctx.fillText(GF.t('evolved') + '  ' + GF.t('form' + form), GF.cx, topY + titleFs + 4*GF.S);
  } else {
    ctx.font = GF.clamp(14*GF.S,11,18) + 'px sans-serif'; ctx.fillStyle = '#9ab';
    ctx.fillText(GF.t('choose'), GF.cx, topY + titleFs + 6*GF.S);
  }

  var n = levelChoices.length;
  var cardW = Math.min(GF.W * 0.9, 440 * GF.S);
  var topCards = topY + titleFs + 32 * GF.S;
  var avail = GF.H - topCards - 24 * GF.S, gap = 12 * GF.S;
  var cardH = GF.clamp((avail - (n-1)*gap) / n, 70, 124);
  var cardX = GF.cx - cardW / 2;
  for (var i = 0; i < n; i++) {
    var ch = levelChoices[i], info = cardLabel(ch), cy = topCards + i * (cardH + gap);
    (function(choice, yy, info) {
      GF.rr(ctx, cardX, yy, cardW, cardH, 14 * GF.S);
      var grad = ctx.createLinearGradient(cardX, yy, cardX, yy + cardH);
      grad.addColorStop(0, 'rgba(34,38,62,0.96)'); grad.addColorStop(1, 'rgba(22,24,42,0.96)');
      ctx.fillStyle = grad; ctx.fill();
      ctx.strokeStyle = info.col; ctx.lineWidth = 2; ctx.stroke();
      var iconR = cardH * 0.3, ix = cardX + iconR + 16*GF.S, iy = yy + cardH/2;
      ctx.fillStyle = info.col; ctx.shadowColor = info.col; ctx.shadowBlur = 12*GF.S;
      ctx.beginPath(); ctx.arc(ix, iy, iconR, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
      ctx.fillStyle = '#0a0a14'; ctx.beginPath(); ctx.arc(ix, iy, iconR*0.5, 0, Math.PI*2); ctx.fill();
      var tx = ix + iconR + 16*GF.S;
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(17*GF.S,13,22) + 'px sans-serif';
      ctx.fillText(info.name, tx, yy + cardH*0.2);
      ctx.fillStyle = '#9fb4d8'; ctx.font = GF.clamp(12.5*GF.S,10,16) + 'px sans-serif';
      var dlines = _wrapTextLines(ctx, info.desc, cardW - (tx - cardX) - 16*GF.S);
      var dy = yy + cardH*0.5;
      for (var d = 0; d < Math.min(dlines.length, 2); d++) { ctx.fillText(dlines[d], tx, dy); dy += GF.clamp(14*GF.S,11,17); }
      if (info.tag) { ctx.textAlign = 'right'; ctx.fillStyle = info.col; ctx.font = 'bold ' + GF.clamp(13*GF.S,10,17) + 'px sans-serif'; ctx.fillText(info.tag, cardX + cardW - 14*GF.S, yy + 10*GF.S); }
      uiButtons.push({ x: cardX, y: yy, w: cardW, h: cardH, fn: function() { applyChoice(choice); } });
    })(ch, cy, info);
  }
}

// ── GAME OVER ──────────────────────────────────────────────────────────────
function drawGameOver(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(6,4,12,0.9)'; ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(38 * GF.S, 24, 58);
  ctx.shadowColor = 'rgba(255,59,107,0.5)'; ctx.shadowBlur = 26 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var topY = GF.H * 0.23;
  ctx.fillText(GF.t('gameover'), GF.cx, topY);
  ctx.shadowBlur = 0;

  var subFs = GF.clamp(16 * GF.S, 13, 22);
  ctx.font = subFs + 'px sans-serif'; ctx.fillStyle = '#bcd';
  ctx.fillText(GF.t('time') + ' ' + fmtTime(survivalSec) + '   ·   ' + GF.t('lvl') + ' ' + level + '   ·   ' + GF.t('kills') + ' ' + kills, GF.cx, topY + titleFs * 0.8);
  ctx.fillStyle = '#ffe082';
  ctx.fillText(GF.t('form' + form) + '   ·   ' + GF.t('score') + ' ' + score, GF.cx, topY + titleFs * 0.8 + subFs * 1.5);
  // Session-end reward hook: show the essence banked this run (the reason to
  // return to the Den). lastGameOverEssence is set in gameOver(); without this
  // line the M1 meta-loop earns silently and the payoff is invisible.
  if (lastGameOverEssence > 0) {
    ctx.fillStyle = '#ffca28'; ctx.font = 'bold ' + GF.clamp(19 * GF.S, 15, 25) + 'px sans-serif';
    ctx.fillText(GF.t('essence_earned').replace('%n', lastGameOverEssence), GF.cx, topY + titleFs * 0.8 + subFs * 2.7);
  }
  if (score >= best && best > 0) {
    ctx.fillStyle = '#7CFC9A'; ctx.font = 'bold ' + subFs + 'px sans-serif';
    ctx.fillText(GF.t('newbest'), GF.cx, topY + titleFs * 0.8 + subFs * 3.9);
  }

  var btnW = GF.clamp(230 * GF.S, 170, 300), btnH = GF.clamp(54 * GF.S, 50, 64), gapY = 11 * GF.S;
  var items = [];
  if (!reviveUsed) items.push({ l: GF.t('revive'), f: showRewardedRevive, o: { accent: 'gold', enabled: !reviveLoading } });
  items.push({ l: GF.t('retry'), f: function() { showInterstitial(startGame); } });
  items.push({ l: GF.t('menu'), f: function() { gs = 'MENU'; }, o: { accent: 'ghost' } });

  var n = items.length, stackH = n * btnH + (n - 1) * gapY, btnX = GF.cx - btnW / 2;
  var minY = topY + titleFs * 0.8 + subFs * 5.0;
  var btnY = GF.clamp(GF.cy - 6 * GF.S, minY, GF.H - stackH - 28 * GF.S);
  for (var i = 0; i < n; i++) drawButton(ctx, btnX, btnY + i * (btnH + gapY), btnW, btnH, items[i].l, items[i].f, items[i].o || {});

  if (best > 0) {
    ctx.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif'; ctx.fillStyle = '#778'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, btnY + stackH + 20 * GF.S);
  }
}

// ── TUTORIAL PANEL (reopened via ? button) ──────────────────────────────────
function drawTutorialPanel(ctx) {
  ctx.fillStyle = 'rgba(4,4,14,0.93)'; ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(24 * GF.S, 18, 34);
  ctx.font = 'bold ' + titleFs + 'px sans-serif'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var topY = GF.clamp(GF.H * 0.1, 36, 120);
  ctx.fillText(GF.t('title'), GF.cx, topY);

  var bodyFs = GF.clamp(13 * GF.S, 11, 17);
  ctx.font = bodyFs + 'px sans-serif';
  var maxW = Math.min(GF.W * 0.88, 480 * GF.S), lineH = bodyFs * 1.34, blockGap = bodyFs * 0.55;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var y = topY + titleFs * 1.5;
  for (var k = 0; k < keys.length; k++) {
    var lines = _wrapTextLines(ctx, GF.t(keys[k]), maxW);
    ctx.fillStyle = (keys[k] === 'tut_tip') ? '#ffd54f' : '#cdd6ea';
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], GF.cx, y); y += lineH; }
    y += blockGap;
  }
  ctx.fillStyle = '#9ab'; ctx.font = bodyFs + 'px sans-serif';
  ctx.fillText(GF.t('close_hint'), GF.cx, Math.min(y + 8 * GF.S, GF.H - 26 * GF.S));
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 540,
  designH: 720,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'devourling',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('devourling_best') || '0') || 0; } catch (e) {}
    loadMeta();      // owned cross-session progression (Essence + Den upgrades)
    claimOnOpen();   // idle "kept feeding" Essence + daily login streak bonus
    GF.persist('devourling_run_v1',
      function() {
        return { gs: gs, survivalSec: survivalSec, kills: kills, score: score,
                 hp: hp, maxHp: maxHp, level: level, xp: xp, xpNeed: xpNeed, form: form,
                 weapons: weapons, dmgMul: dmgMul, rateMul: rateMul, speedMul: speedMul,
                 magnetMul: magnetMul, regenPerSec: regenPerSec, devourHeal: devourHeal,
                 minibossSpawned: minibossSpawned, bossSpawned: bossSpawned };
      },
      function(s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        survivalSec = s.survivalSec || 0; kills = s.kills || 0; score = s.score || 0;
        maxHp = s.maxHp || MAX_HP; hp = (typeof s.hp === 'number') ? s.hp : maxHp;
        level = s.level || 1; xp = s.xp || 0; xpNeed = s.xpNeed || XP_BASE; form = s.form || 0;
        HERO_RADIUS = FORM_RADIUS[form] || FORM_RADIUS[0];
        weapons = s.weapons || { bite: 1 };
        dmgMul = s.dmgMul || 1; rateMul = s.rateMul || 1; speedMul = s.speedMul || 1; magnetMul = s.magnetMul || 1;
        regenPerSec = s.regenPerSec || 0; devourHeal = s.devourHeal || 0;
        minibossSpawned = !!s.minibossSpawned; bossSpawned = !!s.bossSpawned;
      }
    );
    // Resume to a safe screen instead of live combat (Yandex 1.9 best practice).
    if (gs === 'PLAYING' || gs === 'LEVELUP') { enemies.length = 0; motes.length = 0; bullets.length = 0; miniboss = null; boss = null; gs = 'MENU'; }
  },
  onUpdate: update,
  onDraw: draw,
});

// Expose state for post-build-tester (DESIGN.md cross-check).
GF.exposeState(function() {
  var typesSeen = Object.keys(enemyTypesSeen).length;
  var weaponCount = 0; for (var w = 0; w < WEAPON_KEYS.length; w++) if (ownsWeapon(WEAPON_KEYS[w])) weaponCount++;
  return {
    gs: gs, survivalSec: survivalSec, score: score, kills: kills,
    hp: hp, maxHp: maxHp, level: level, xp: xp, xpNeed: xpNeed, form: form,
    enemyCount: enemies.length, moteCount: motes.length, bulletCount: bullets.length,
    enemyTypesSeen: typesSeen, weaponCount: weaponCount, weapons: weapons,
    minibossActive: !!miniboss, bossActive: !!boss,
    minibossSpawned: minibossSpawned, bossSpawned: bossSpawned,
    dmgMul: dmgMul, rateMul: rateMul, speedMul: speedMul, magnetMul: magnetMul,
    spareUpgrades: spareUpgrades, tutorialOpen: tutorialOpen,
    MAX_HP: MAX_HP, HERO_SPEED: HERO_SPEED, HERO_RADIUS: HERO_RADIUS,
    CONTACT_DMG: CONTACT_DMG, ENEMY_HP_BASE: ENEMY_HP_BASE,
    SPAWN_BASE: SPAWN_BASE, SPAWN_MIN: SPAWN_MIN, XP_BASE: XP_BASE, XP_GROWTH: XP_GROWTH,
    MOTE_VALUE: MOTE_VALUE, BASE_WEAPON_DMG: BASE_WEAPON_DMG, BASE_FIRE_RATE: BASE_FIRE_RATE,
    MAGNET_RADIUS: MAGNET_RADIUS, BOSS_TIME: BOSS_TIME, MINIBOSS_TIME: MINIBOSS_TIME,
  };
});

// Test/automation hooks (safe to ship — platforms don't reject these).
window._setLang = function(l) { GF.lang = l; };
window._setState = function(s) { gs = s; };
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'sans-serif'; };
window._start = function() { startGame(); };
window._uiButtons = function() { return uiButtons.map(function(b){ return { x:b.x, y:b.y, w:b.w, h:b.h }; }); };
window._hurt = function(n) { hurtHero(n || 10); };
window._forceLevelUp = function() { if (gs === 'PLAYING') { xp = xpNeed; gainXp(0); } };
window._forceMiniboss = function() { if (gs === 'PLAYING' && !miniboss) spawnMiniboss(); };
window._forceBoss = function() { if (gs === 'PLAYING' && !boss) spawnBoss(); };
window._setTime = function(sec) { survivalSec = sec; };           // test: fast-forward the survival clock
window._sampleTypes = function(n) {                                // test: distribution of spawn types at current time
  var out = {}; for (var i = 0; i < (n || 200); i++) { var t = pickEnemyType(); out[t] = (out[t] || 0) + 1; } return out;
};

})();
</script>
