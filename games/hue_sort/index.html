<script>
(function() {
'use strict';

// ── STRINGS ──────────────────────────────────────────────────────────────
var STRINGS = {

    level: 'УР', pours: 'ЛИВЫ', best: 'РЕКОРД УР',
    gameover: 'ЛИВЫ КОНЧИЛИСЬ', win: 'ВСЁ ЧИСТО!',
    levelsolved: 'УРОВЕНЬ', solved: 'ПРОЙДЕН',

    daily: 'ДЕНЬ', daily_done_btn: 'НА СЕГОДНЯ ВСЁ',
    daily_solved: 'ЗАДАЧА ДНЯ РЕШЕНА!', daily_tag: 'ЗАДАЧА ДНЯ',
    streak: 'СЕРИЯ', day: 'день', days: 'дн.',
    come_back: 'Возвращайся завтра за новой задачей!',
    best_streak: 'Лучшая серия',
    // Daily bonus (session-end hook)
    bonus_claim: 'ЗАБРАТЬ БОНУС', bonus_ready: 'Бонус дня готов!',
    bonus_tubes: 'чистых пробирок',
    bonus_tease_ready: 'В меню ждёт бонус дня — нажми МЕНЮ, чтобы забрать.',
    bonus_tease_next: 'Бонус дня забран — возвращайся завтра за',
    bonus_tomorrow: 'Завтра', bonus_today: 'Сегодня',
    bonus_banked: 'Зачислено в твой ранг',
    bonus_streak_boost: 'Бонус за серию',
  },
};

var SPRITE_NAMES = [];

// ── TUNABLES ─────────────────────────────────────────────────────────────
var POUR_BUDGET   = 12;    // base pours on level 1 (+2 per level)
var TUBE_CAP      = 4;     // colour-layer slots per tube
var START_TUBES   = 5;     // total tubes level 1 (colours + 2 empties)
var WIN_LEVELS    = 6;     // clear level 6 to win
var UNDO_MAX      = 3;     // undo charges per level
var BLEND_PENALTY = 1;     // extra mixed layers a blend can create
var POUR_ANIM_SEC = 0.34;  // pour animation duration
var SEL_LIFT_PX   = 14;    // px the selected top run lifts

// ── COLOURS ──────────────────────────────────────────────────────────────
// primaries 1=red 2=yellow 3=blue ; mixes 4=orange 5=green 6=purple ; 0=empty
var PRIMARIES = [1, 2, 3];
var COL_HEX = {
  1: '#e8413a', 2: '#f6c531', 3: '#3a78e8',
  4: '#ef8b27', 5: '#3fb86a', 6: '#9b53c9',
};
var COL_HEX_DK = {
  1: '#b32820', 2: '#caa017', 3: '#2152ad',
  4: '#c46410', 5: '#2a8a4c', 6: '#6f3597',
};
// subtractive blend table
function blend(a, b) {
  if (a === b) return a;
  var lo = Math.min(a, b), hi = Math.max(a, b);
  if (lo === 1 && hi === 2) return 4; // red+yellow=orange
  if (lo === 2 && hi === 3) return 5; // yellow+blue=green
  if (lo === 1 && hi === 3) return 6; // red+blue=purple
  return 0;
}
function isPrimary(c) { return c === 1 || c === 2 || c === 3; }
function isMix(c) { return c === 4 || c === 5 || c === 6; }

// ── PERSISTENT META (Lab Rank) ─────────────────────────────────────────────
// The owned, cross-session progression: every PURE tube you ever complete adds
// to a lifetime counter that climbs a named "Lab Rank" ladder. This is the meta
// the player builds and keeps — it persists forever (hue_sort_purified), shows
// on the menu with a progress bar to the next rank, and gives a long-horizon
// goal on top of the 6 campaign levels (the "why come back tomorrow").
var tubesPurified = 0;     // lifetime count of pure tubes completed (persisted)
var RANKS = [
  { at: 0,   name: 'Intern',        nameRu: 'Стажёр' },
  { at: 10,  name: 'Lab Assistant', nameRu: 'Лаборант' },
  { at: 25,  name: 'Chemist',       nameRu: 'Химик' },
  { at: 50,  name: 'Colourist',     nameRu: 'Колорист' },
  { at: 90,  name: 'Hue Master',    nameRu: 'Мастер цвета' },
  { at: 150, name: 'Spectrum Sage', nameRu: 'Мудрец спектра' },
  { at: 240, name: 'Prism Legend',  nameRu: 'Легенда призмы' },
];
function rankIndexFor(n) {
  var idx = 0;
  for (var i = 0; i < RANKS.length; i++) if (n >= RANKS[i].at) idx = i;
  return idx;
}
// Robustly detect the active language without assuming a GF.lang field exists:
// the PLAY string is 'ИГРАТЬ' in RU and 'PLAY' in EN.
function isRu() { try { return GF.t('play') === STRINGS.ru.play; } catch (e) { return false; } }
function rankName(i) {
  var r = RANKS[i] || RANKS[0];
  return isRu() ? r.nameRu : r.name;
}
// Progress {cur,need,frac,maxed} toward the NEXT rank from a lifetime count.
function rankProgress(n) {
  var i = rankIndexFor(n);
  if (i >= RANKS.length - 1) return { cur: n - RANKS[i].at, need: 0, frac: 1, maxed: true };
  var base = RANKS[i].at, next = RANKS[i + 1].at;
  return { cur: n - base, need: next - base, frac: (n - base) / (next - base), maxed: false };
}
// Award purified tubes; persist; celebrate a rank-up. Returns true on rank-up.
function awardPurified(count) {
  if (!count) return false;
  var before = rankIndexFor(tubesPurified);
  tubesPurified += count;
  try { localStorage.setItem('hue_sort_purified', String(tubesPurified)); } catch (e) {}
  var after = rankIndexFor(tubesPurified);
  if (after > before) {
    var c = { x: GF.W / 2, y: GF.H * 0.30 };
    GF.spawnFloat(c.x, c.y, 'RANK UP!', '#ffe27a');
    GF.spawnParticles(c.x, c.y, '#ffe27a', 26);
    GF.happytime();
    return true;
  }
  return false;
}
// Count how many tubes are currently full & pure (used at level-clear).
function countPureTubes() {
  var n = 0;
  for (var i = 0; i < tubes.length; i++) {
    var a = tubes[i];
    if (a.length === TUBE_CAP && isPrimary(a[0])) {
      var pure = true;
      for (var k = 1; k < a.length; k++) if (a[k] !== a[0]) { pure = false; break; }
      if (pure) n++;
    }
  }
  return n;
}

// ── DAILY CHALLENGE + STREAK (retention mechanic, 2026-05-31) ──────────────
// A single deterministic puzzle per calendar day (same for everyone, seeded by
// the UTC date) plus a day-streak counter that rewards returning each day. The
// habit scaffold that pulls the player back daily; it banks its pure tubes into
// the same lifetime Lab-Rank meta, and gives infinite fresh content on top of
// the finite 6-level campaign (directly serving the "build more levels" ask).
var dailyStreak = 0;       // consecutive days the daily was solved (persisted)
var dailyBest = 0;         // longest streak ever (persisted)
var dailyLastDay = '';     // YYYYMMDD of the last day the daily was SOLVED
var dailyDoneToday = false;// solved today's daily already? (derived on load)
var DAILY_LEVEL = 5;       // daily uses a fixed mid-hard difficulty (3 colours)

// UTC day key 'YYYYMMDD' — UTC so the puzzle flips at a single global instant.
function todayKey() {
  var d = new Date();
  var y = d.getUTCFullYear();
  var m = ('0' + (d.getUTCMonth() + 1)).slice(-2);
  var da = ('0' + d.getUTCDate()).slice(-2);
  return '' + y + m + da;
}
// Yesterday's key, for "was the streak consecutive?" checks.
function yesterdayKey() {
  var d = new Date(Date.now() - 86400000);
  var y = d.getUTCFullYear();
  var m = ('0' + (d.getUTCMonth() + 1)).slice(-2);
  var da = ('0' + d.getUTCDate()).slice(-2);
  return '' + y + m + da;
}
function dailySeed() {
  var k = todayKey(), h = 1779033703 ^ k.length;
  for (var i = 0; i < k.length; i++) {
    h = Math.imul(h ^ k.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return (h >>> 0);
}
// mulberry32 — small, fast, deterministic PRNG so the daily board is identical
// for every player on a given day (no Math.random in the daily scramble).
function makeRng(seed) {
  var a = seed >>> 0;
  return function() {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    var t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function loadDaily() {
  try {
    var raw = localStorage.getItem('hue_sort_daily');
    if (raw) {
      var o = JSON.parse(raw);
      dailyStreak = o.streak || 0;
      dailyBest = o.best || 0;
      dailyLastDay = o.lastDay || '';
    }
  } catch (e) {}
  // If the last solved day was neither today nor yesterday, the chain is broken:
  // surface streak 0 until they solve again today (don't mutate stored 'best').
  if (dailyLastDay && dailyLastDay !== todayKey() && dailyLastDay !== yesterdayKey()) {
    dailyStreak = 0;
  }
  dailyDoneToday = (dailyLastDay === todayKey());
}
function saveDaily() {
  try {
    localStorage.setItem('hue_sort_daily', JSON.stringify(
      { streak: dailyStreak, best: dailyBest, lastDay: dailyLastDay }));
  } catch (e) {}
}
// Called once when today's daily is solved: extend or restart the streak.
function recordDailyWin() {
  if (dailyDoneToday) return; // already counted today
  var tk = todayKey();
  dailyStreak = (dailyLastDay === yesterdayKey()) ? (dailyStreak + 1) : 1;
  if (dailyStreak > dailyBest) dailyBest = dailyStreak;
  dailyLastDay = tk;
  dailyDoneToday = true;
  saveDaily();
}

// ── DAILY BONUS — SESSION-END HOOK (retention mechanic #4, 2026-05-31) ──────
// A claimable login bonus that banks PURE TUBES straight into the lifetime
// Lab-Rank meta once per UTC day. The hook is two-sided:
//   • the SESSION-END screens (GAMEOVER / WIN / DAILYDONE) tease it — "a bonus is
//     waiting on the menu" if unclaimed, or PREVIEW TOMORROW'S (bigger) bonus once
//     claimed — so leaving plants a concrete, dated reason to return;
//   • the MENU shows a claimable chest button when a bonus is available; claiming
//     it pours a streak-scaled pile of pure tubes into tubesPurified (compounding
//     with both Lab Rank AND the day-streak the player already grows).
// The reward SCALES with the day-streak (longer streak → bigger daily payout), so
// the streak becomes materially rewarding, not just a number — and the "tomorrow"
// preview is the carrot that arms the next session.
var bonusLastClaim = '';     // YYYYMMDD of the last day the bonus was claimed
var bonusClaimedToday = false; // derived on load — already claimed today?
var BONUS_BASE = 3;          // base pure tubes from the daily bonus
var BONUS_PER_STREAK = 1;    // +1 tube per day of current streak
var BONUS_STREAK_CAP = 12;   // streak contribution caps here (the value, not days)

// Bonus value for a GIVEN streak length (used for both today and the tomorrow
// preview). Streak 0 → base; each streak-day adds 1, capped so it can't blow up.
function bonusValueFor(streak) {
  var boost = Math.min(BONUS_PER_STREAK * Math.max(streak, 0), BONUS_STREAK_CAP);
  return BONUS_BASE + boost;
}
// Today's claimable bonus = scaled by the CURRENT surfaced streak.
function bonusValueToday() { return bonusValueFor(dailyStreak); }
// Tomorrow's preview = assume the streak is +1 (the carrot for returning). If the
// chain would break (no daily solved yet today) the preview is honest: base only,
// but framed as "keep your streak alive".
function bonusValueTomorrow() {
  // If they already solved today's daily, tomorrow can extend the streak by 1;
  // otherwise the streak might reset, so preview the conservative streak+1 value
  // they'd get by keeping the chain — this is the motivating number either way.
  return bonusValueFor(dailyStreak + 1);
}
function loadBonus() {
  try {
    var raw = localStorage.getItem('hue_sort_bonus');
    if (raw) { var o = JSON.parse(raw); bonusLastClaim = o.lastClaim || ''; }
  } catch (e) {}
  bonusClaimedToday = (bonusLastClaim === todayKey());
}
function saveBonus() {
  try { localStorage.setItem('hue_sort_bonus', JSON.stringify({ lastClaim: bonusLastClaim })); } catch (e) {}
}
function bonusAvailable() { return !bonusClaimedToday; }
// Claim today's bonus: pour the streak-scaled pile into the Lab-Rank meta, mark
// the day done, and celebrate. Idempotent per UTC day.
function claimBonus() {
  if (bonusClaimedToday) return false;
  var amt = bonusValueToday();
  bonusLastClaim = todayKey();
  bonusClaimedToday = true;
  saveBonus();
  // Bank into the SAME lifetime counter Lab Rank + the daily already feed (this
  // can itself trigger a RANK UP! via awardPurified's tier check).
  awardPurified(amt);
  var c = { x: GF.W / 2, y: GF.H * 0.30 };
  GF.spawnFloat(c.x, c.y, '+' + amt, '#ffe27a');
  GF.spawnParticles(c.x, c.y, '#ffe27a', 24);
  GF.happytime();
  return true;
}

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';           // MENU | PLAYING | LEVELEND | GAMEOVER | WIN | DAILYDONE
var mode = 'campaign';     // 'campaign' | 'daily' — which loop the player is in
var level = 1;
var bestLevel = 0;
var tubes = [];            // array of arrays (bottom->top), each <= TUBE_CAP
var pours = POUR_BUDGET;
var undoLeft = UNDO_MAX;
var stuck = false;
var sel = -1;              // selected source tube index, -1 = none
var history = [];          // undo snapshots
var anim = null;           // active pour animation
var tubeRects = [];        // computed layout per frame

// ── LEVEL GENERATION ───────────────────────────────────────────────────────
function poursForLevel(lvl) { return POUR_BUDGET + (lvl - 1) * 2; }

function buildLevel(lvl) {
  var nColors = 2 + (lvl >= 3 ? 1 : 0); // 2 colours L1-2, 3 from L3 on
  if (nColors > 3) nColors = 3;
  var t = [];
  for (var ci = 0; ci < nColors; ci++) {
    var col = PRIMARIES[ci];
    t.push([col, col, col, col].slice(0, TUBE_CAP));
  }
  for (var e = 0; e < 2; e++) t.push([]);
  var moves = 6 + lvl * 3;
  for (var m = 0; m < moves; m++) scrambleMove(t);
  if (solvedState(t)) { scrambleMove(t); scrambleMove(t); }
  tubes = t;
  pours = poursForLevel(lvl);
  undoLeft = UNDO_MAX;
  stuck = false;
  sel = -1;
  history = [];
  anim = null;
}

function topColor(arr) { return arr.length ? arr[arr.length - 1] : 0; }
function topRunLen(arr) {
  if (!arr.length) return 0;
  var c = arr[arr.length - 1], n = 1;
  for (var i = arr.length - 2; i >= 0; i--) { if (arr[i] === c) n++; else break; }
  return n;
}

// scramble with single-unit moves so the start state is all-primary & solvable.
// Optional `rng` (returns 0..1) makes the scramble deterministic for the daily
// challenge; campaign callers pass nothing and fall back to Math.random.
function scrambleMove(t, rng) {
  var rnd = rng || Math.random;
  var srcs = [];
  for (var i = 0; i < t.length; i++) if (t[i].length > 1) srcs.push(i);
  if (!srcs.length) return;
  var s = srcs[(rnd() * srcs.length) | 0];
  var dsts = [];
  for (var j = 0; j < t.length; j++) if (j !== s && t[j].length < TUBE_CAP) dsts.push(j);
  if (!dsts.length) return;
  var d = dsts[(rnd() * dsts.length) | 0];
  t[d].push(t[s].pop());
}

// Build today's DAILY puzzle: same geometry as a level-5 board (3 colours), but
// scrambled with a date-seeded RNG so every player gets the identical board.
function buildDailyLevel() {
  var lvl = DAILY_LEVEL;
  var rng = makeRng(dailySeed());
  var nColors = 3; // daily is always the full 3-colour board
  var t = [];
  for (var ci = 0; ci < nColors; ci++) {
    var col = PRIMARIES[ci];
    t.push([col, col, col, col].slice(0, TUBE_CAP));
  }
  for (var e = 0; e < 2; e++) t.push([]);
  var moves = 6 + lvl * 3;
  for (var m = 0; m < moves; m++) scrambleMove(t, rng);
  if (solvedState(t)) { scrambleMove(t, rng); scrambleMove(t, rng); }
  tubes = t;
  pours = poursForLevel(lvl);
  undoLeft = UNDO_MAX;
  stuck = false;
  sel = -1;
  history = [];
  anim = null;
}

function solvedState(t) {
  for (var i = 0; i < t.length; i++) {
    var a = t[i];
    if (!a.length) continue;
    var c = a[0];
    if (!isPrimary(c)) return false;
    for (var k = 1; k < a.length; k++) if (a[k] !== c) return false;
  }
  return true;
}
function isSolved() { return solvedState(tubes); }
function boardImpure() { return !isSolved(); }

function canPour(s, d) {
  if (s === d || s < 0 || d < 0) return false;
  if (!tubes[s] || !tubes[d]) return false;
  if (!tubes[s].length) return false;
  if (tubes[d].length >= TUBE_CAP) return false;
  return true;
}

function detectStuck() {
  if (isSolved()) return false;
  for (var s = 0; s < tubes.length; s++)
    for (var d = 0; d < tubes.length; d++)
      if (canPour(s, d)) return false;
  return true;
}

// ── POUR LOGIC ───────────────────────────────────────────────────────────
function snapshot() {
  return { tubes: tubes.map(function(a){ return a.slice(); }), pours: pours };
}
function pushHistory() {
  history.push(snapshot());
  if (history.length > 40) history.shift();
}

function doUndo() {
  if (anim) return;
  if (undoLeft <= 0 || !history.length) { GF.setShake(0.2); return; }
  var snap = history.pop();
  tubes = snap.tubes.map(function(a){ return a.slice(); });
  pours = snap.pours;
  undoLeft--;
  sel = -1;
  stuck = false;
  GF.saveRun();
}

function pour(s, d) {
  if (!canPour(s, d) || anim) return false;
  pushHistory();
  pours--;

  var srcTop = topColor(tubes[s]);
  var dstTop = topColor(tubes[d]);
  var space = TUBE_CAP - tubes[d].length;
  var runLen = topRunLen(tubes[s]);
  var moveN = Math.min(runLen, space);

  var resultColor, blended = false;
  if (tubes[d].length === 0 || dstTop === srcTop) {
    resultColor = srcTop;
  } else if (isPrimary(srcTop) && isPrimary(dstTop)) {
    resultColor = blend(srcTop, dstTop);
    blended = true;
    moveN = 1;
  } else {
    resultColor = srcTop;
  }

  anim = {
    from: s, to: d, color: blended ? resultColor : srcTop,
    t: 0, moveN: moveN, blended: blended, resultColor: resultColor, dstTop: dstTop,
  };
  return true;
}

function applyPour() {
  var a = anim; if (!a) return;
  var s = a.from, d = a.to;
  if (a.blended) {
    tubes[s].pop();
    tubes[d][tubes[d].length - 1] = a.resultColor;
    var cc = tubeRectCenter(d);
    GF.spawnFloat(cc.x, cc.y - 60 * GF.S, '+MIX', COL_HEX[a.resultColor]);
    GF.setShake(0.35);
    GF.spawnParticles(cc.x, cc.y, COL_HEX[a.resultColor], 18);
  } else {
    for (var i = 0; i < a.moveN; i++) tubes[d].push(tubes[s].pop());
    var cc2 = tubeRectCenter(d);
    GF.spawnParticles(cc2.x, cc2.y - 40 * GF.S, COL_HEX[a.color], 10);
    if (tubes[d].length === TUBE_CAP && topRunLen(tubes[d]) === TUBE_CAP && isPrimary(topColor(tubes[d]))) {
      GF.spawnFloat(cc2.x, cc2.y - 60 * GF.S, 'PURE!', COL_HEX[topColor(tubes[d])]);
    }
  }
  anim = null;
  sel = -1;
  GF.saveRun();
  evaluate();
}

function evaluate() {
  if (isSolved()) {
    // Persistent meta: bank every pure tube from this solved board into the
    // lifetime Lab-Rank counter (the owned, cross-session progression).
    awardPurified(countPureTubes());
    if (mode === 'daily') {
      // Daily challenge solved → extend the day-streak and show the daily-done
      // screen (don't touch campaign bestLevel / WIN flow).
      recordDailyWin();
      gs = 'DAILYDONE';
      GF.gameEnded();
      GF.happytime();
      GF.saveRun();
      return;
    }
    if (level > bestLevel) { bestLevel = level; try { localStorage.setItem('hue_sort_best', bestLevel); } catch (e) {} }
    if (level >= WIN_LEVELS) { gs = 'WIN'; GF.gameEnded(); GF.happytime(); }
    else { gs = 'LEVELEND'; }
    GF.saveRun();
    return;
  }
  stuck = detectStuck();
  if (pours <= 0 || stuck) {
    gs = 'GAMEOVER';
    GF.gameEnded();
    GF.saveRun();
  }
}

// ── LIFECYCLE ──────────────────────────────────────────────────────────────
function startGame() {
  mode = 'campaign';
  level = 1;
  buildLevel(level);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}
function startDaily() {
  mode = 'daily';
  level = DAILY_LEVEL;       // for the LVL/budget HUD only; daily board is seeded
  buildDailyLevel();
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}
function nextLevel() {
  level++;
  if (level > WIN_LEVELS) { gs = 'WIN'; GF.gameEnded(); return; }
  buildLevel(level);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}
function retryLevel() {
  // Re-deal the SAME board the player just lost: daily re-seeds today's puzzle,
  // campaign re-scrambles its level. (Daily streak is only banked on a win.)
  if (mode === 'daily') buildDailyLevel();
  else buildLevel(level);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}
function toMenu() { gs = 'MENU'; mode = 'campaign'; GF.saveRun(); }

window._jumpLevel = function(n) {
  GF.tutorial.active = false; // don't let the tutorial overlay cover screenshots
  if (n >= 90) {              // gate sentinel: _jumpLevel(99) must reach a terminal screen
    level = WIN_LEVELS;
    buildLevel(level);
    gs = 'WIN';
    GF.gameEnded();
    return;
  }
  level = GF.clamp(n || 3, 1, WIN_LEVELS);
  buildLevel(level);
  gs = 'PLAYING';
};
window._setupForScreenshot = function(lvl) {
  try { localStorage.setItem('hue_sort_seen_tutorial', '1'); } catch (e) {}
  GF.tutorial.active = false;
  level = GF.clamp(lvl || 4, 1, WIN_LEVELS);
  buildLevel(level);
  gs = 'PLAYING';
  computeLayout();
  // inject one mix layer on top of a primary to show the blend mechanic mid-play
  for (var i = 0; i < tubes.length; i++) {
    if (tubes[i].length && tubes[i].length < TUBE_CAP && isPrimary(topColor(tubes[i]))) {
      tubes[i].push(5); break;
    }
  }
  sel = 0;
};

// ── LAYOUT ─────────────────────────────────────────────────────────────────
function computeLayout() {
  tubeRects = [];
  var n = tubes.length;
  if (!n) return;
  var W = GF.W, H = GF.H;
  var topPad = H * 0.155;
  var botPad = H * 0.07;
  var avail = H - topPad - botPad;

  // Lay the rack out as a compact grid. Keep at most 4 tubes per row so they
  // stay finger-sized in portrait; 5-7 tubes wrap to two rows. This gives a
  // "rack" shape instead of an over-wide single row that clips at the edges.
  var pr;
  if (n <= 4) pr = n;
  else if (n <= 6) pr = Math.ceil(n / 2);
  else pr = Math.ceil(n / 2);
  pr = Math.min(pr, 4);
  var rows = Math.ceil(n / pr);
  var rowGap = avail * 0.08;
  var hLimited = (avail - (rows - 1) * rowGap) / rows;
  // width-limited: pr*tubeW + (pr-1)*0.55*tubeW <= 0.92W
  var maxTubeW = (W * 0.92) / (pr + 0.55 * (pr - 1));
  var wLimitedH = maxTubeW / 0.30;
  var tubeH = GF.clamp(Math.min(hLimited, wLimitedH), 90, 320);
  var tubeW = tubeH * 0.30;
  var gapX = tubeW * 0.55;
  var totalRowsH = rows * tubeH + (rows - 1) * rowGap;
  var startY = topPad + (avail - totalRowsH) / 2;
  if (startY < topPad) startY = topPad;

  for (var r = 0; r < rows; r++) {
    var inRow = Math.min(pr, n - r * pr);
    var totalW = inRow * tubeW + (inRow - 1) * gapX;
    var startX = (W - totalW) / 2;
    for (var k = 0; k < inRow; k++) {
      var idx = r * pr + k;
      var x = startX + k * (tubeW + gapX);
      var y = startY + r * (tubeH + rowGap);
      tubeRects[idx] = { x: x, y: y, w: tubeW, h: tubeH };
    }
  }
}
function tubeRectCenter(i) {
  var t = tubeRects[i] || { x: GF.cx, y: GF.cy, w: 40, h: 100 };
  return { x: t.x + t.w / 2, y: t.y + t.h / 2 };
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt) {
  GF.tutorial.update(dt);
  if (gs === 'PLAYING' || gs === 'LEVELEND' || gs === 'GAMEOVER' || gs === 'WIN' || gs === 'DAILYDONE') computeLayout();
  if (anim) {
    anim.t += dt / POUR_ANIM_SEC;
    if (anim.t >= 1) applyPour();
  }
}

// ── DRAW ──────────────────────────────────────────────────────────────────
var _playBtn = null, _retryBtn = null, _againBtn = null, _dailyBtn = null;
var _hudMenuBtn = null, _hudHelpBtn = null, _undoBtn = null, _gmMenuBtn = null, _winMenuBtn = null;
var _dailyMenuBtn = null, _bonusBtn = null;
var _bonusPulse = 0; // cosmetic pulse phase for the claimable chest

function draw(ctx) {
  drawBg(ctx);
  if (gs === 'PLAYING' || gs === 'LEVELEND' || gs === 'GAMEOVER' || gs === 'WIN' || gs === 'DAILYDONE') {
    if (!tubeRects.length) computeLayout();
    drawBoard(ctx);
    drawHUD(ctx);
  }
  if (gs === 'MENU')      drawMenu(ctx);
  if (gs === 'LEVELEND')  drawLevelEnd(ctx);
  if (gs === 'GAMEOVER')  drawGameOver(ctx);
  if (gs === 'WIN')       drawWin(ctx);
  if (gs === 'DAILYDONE') drawDailyDone(ctx);
  GF.tutorial.draw(ctx);
}

function drawBg(ctx) {
  var g = ctx.createLinearGradient(0, 0, 0, GF.H);
  g.addColorStop(0, '#10162a');
  g.addColorStop(0.55, '#0c1120');
  g.addColorStop(1, '#070a14');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, GF.W, GF.H);
  ctx.strokeStyle = 'rgba(120,150,200,0.08)';
  ctx.lineWidth = 2;
  var by = GF.H * 0.88;
  ctx.beginPath(); ctx.moveTo(0, by); ctx.lineTo(GF.W, by); ctx.stroke();
}

function drawBoard(ctx) {
  var S = GF.S;
  for (var i = 0; i < tubes.length; i++) {
    var t = tubeRects[i];
    if (!t) continue;
    var lifted = (i === sel) ? SEL_LIFT_PX * S : 0;
    drawTube(ctx, i, t.x, t.y - lifted, t.w, t.h, i === sel);
  }
  if (anim) drawPourStream(ctx);
}

function drawTube(ctx, idx, x, y, w, h, selected) {
  var S = GF.S;
  var arr = tubes[idx];
  var r = w * 0.5;
  ctx.save();
  GF.rr(ctx, x, y, w, h, r);
  ctx.fillStyle = 'rgba(200,225,255,0.06)';
  ctx.fill();
  ctx.save();
  GF.rr(ctx, x + 2, y + 2, w - 4, h - 4, r);
  ctx.clip();
  var layerH = (h - 4) / TUBE_CAP;
  for (var li = 0; li < arr.length; li++) {
    var col = arr[li];
    var ly = y + h - 2 - (li + 1) * layerH;
    var lh = layerH + 1;
    var grad = ctx.createLinearGradient(x, ly, x, ly + lh);
    grad.addColorStop(0, COL_HEX[col]);
    grad.addColorStop(1, COL_HEX_DK[col]);
    ctx.fillStyle = grad;
    ctx.fillRect(x + 2, ly, w - 4, lh);
    if (li === arr.length - 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(x + 2, ly, w - 4, Math.max(3 * S, 3));
    }
  }
  ctx.restore();
  GF.rr(ctx, x, y, w, h, r);
  ctx.lineWidth = Math.max(2.5 * S, 2);
  ctx.strokeStyle = selected ? '#ffe27a' : 'rgba(190,215,255,0.45)';
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.fillRect(x + w * 0.18, y + h * 0.08, w * 0.12, h * 0.8);
  ctx.restore();
}

function drawPourStream(ctx) {
  var a = anim;
  var sr = tubeRects[a.from], dr = tubeRects[a.to];
  if (!sr || !dr) return;
  var sx = sr.x + sr.w / 2, sy = sr.y;
  var dx = dr.x + dr.w / 2, dy = dr.y;
  var p = a.t;
  var col = COL_HEX[a.color];
  ctx.save();
  ctx.globalAlpha = 0.9;
  for (var k = 0; k < 6; k++) {
    var tt = GF.clamp(p * 1.4 - k * 0.08, 0, 1);
    var px = GF.lerp(sx, dx, tt);
    var py = GF.lerp(sy, dy, tt) - Math.sin(tt * Math.PI) * (40 * GF.S);
    var rad = (3 + (5 - k)) * GF.S * (1 - tt * 0.3);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(px, py, Math.max(rad, 2), 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawHUD(ctx) {
  var S = GF.S, W = GF.W;
  var pad = GF.clamp(12 * S, 8, 20);
  var fs = GF.clamp(17 * S, 13, 24);
  ctx.textBaseline = 'top';
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'left';
  if (mode === 'daily') {
    // Daily mode: show the DAILY tag (+ current streak) instead of LVL n/6.
    ctx.fillStyle = '#ffb454';
    var tag = GF.t('daily_tag');
    if (dailyStreak > 0) tag += '  🔥' + dailyStreak;
    ctx.fillText(tag, pad, pad);
  } else {
    ctx.fillStyle = '#cfe0ff';
    ctx.fillText(GF.t('level') + ' ' + level + '/' + WIN_LEVELS, pad, pad);
  }

  var maxP = poursForLevel(level);
  var pipR = GF.clamp(5 * S, 4, 8);
  var pipGap = pipR * 2.6;
  var shown = Math.min(maxP, 14);
  var totalW = shown * pipGap;
  var px0 = W / 2 - totalW / 2 + pipGap / 2;
  var py = pad + fs * 0.4;
  for (var i = 0; i < shown; i++) {
    ctx.beginPath();
    ctx.arc(px0 + i * pipGap, py, pipR, 0, Math.PI * 2);
    ctx.fillStyle = (i < pours) ? '#5fd0ff' : 'rgba(120,140,170,0.3)';
    ctx.fill();
  }
  ctx.font = 'bold ' + GF.clamp(13 * S, 10, 18) + 'px sans-serif';
  ctx.fillStyle = pours <= 2 ? '#ff7a6c' : '#9fb6d8';
  ctx.textAlign = 'center';
  ctx.fillText(GF.t('pours') + ': ' + pours, W / 2, py + pipR + 6 * S);

  var btn = GF.clamp(40 * S, 36, 52);
  var gap = GF.clamp(8 * S, 6, 12);
  var rx = W - pad - btn;
  _hudMenuBtn = drawIconBtn(ctx, rx, pad, btn, 'menu');
  rx -= (btn + gap);
  _hudHelpBtn = drawIconBtn(ctx, rx, pad, btn, 'help');
  rx -= (btn + gap);
  _undoBtn = drawIconBtn(ctx, rx, pad, btn, 'undo');
  ctx.font = 'bold ' + GF.clamp(11 * S, 9, 15) + 'px sans-serif';
  ctx.fillStyle = undoLeft > 0 ? '#ffe27a' : '#667';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('' + undoLeft, _undoBtn.x + btn / 2, _undoBtn.y + btn + 2 * S);
}

function drawIconBtn(ctx, x, y, sz, kind) {
  var S = GF.S;
  GF.rr(ctx, x, y, sz, sz, sz * 0.24);
  ctx.fillStyle = 'rgba(40,55,85,0.85)';
  ctx.fill();
  ctx.lineWidth = Math.max(1.5 * S, 1.2);
  ctx.strokeStyle = 'rgba(150,180,230,0.4)';
  ctx.stroke();
  var cx = x + sz / 2, cy = y + sz / 2;
  ctx.strokeStyle = '#cfe0ff';
  ctx.fillStyle = '#cfe0ff';
  ctx.lineWidth = Math.max(2.2 * S, 1.8);
  if (kind === 'menu') {
    var lw = sz * 0.42;
    for (var i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(cx - lw / 2, cy + i * (sz * 0.18));
      ctx.lineTo(cx + lw / 2, cy + i * (sz * 0.18));
      ctx.stroke();
    }
  } else if (kind === 'help') {
    ctx.font = 'bold ' + (sz * 0.55) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', cx, cy + sz * 0.02);
  } else if (kind === 'undo') {
    ctx.beginPath();
    ctx.arc(cx, cy, sz * 0.22, Math.PI * 0.4, Math.PI * 1.9);
    ctx.stroke();
    var ax = cx + Math.cos(Math.PI * 0.4) * sz * 0.22;
    var ay = cy + Math.sin(Math.PI * 0.4) * sz * 0.22;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - sz * 0.12, ay - sz * 0.02);
    ctx.lineTo(ax + sz * 0.02, ay + sz * 0.12);
    ctx.closePath();
    ctx.fill();
  }
  ctx.textBaseline = 'top';
  return { x: x, y: y, w: sz, h: sz };
}

// ── OVERLAYS ─────────────────────────────────────────────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

function drawScrim(ctx, alpha) {
  ctx.fillStyle = 'rgba(6,9,18,' + (alpha || 0.9) + ')';
  ctx.fillRect(0, 0, GF.W, GF.H);
}

function drawButton(ctx, label, cx, y, accent) {
  var S = GF.S;
  var bw = GF.clamp(250 * S, 170, 330), bh = GF.clamp(56 * S, 44, 70);
  var bx = cx - bw / 2;
  var g = ctx.createLinearGradient(bx, y, bx, y + bh);
  g.addColorStop(0, accent || '#3fb86a');
  g.addColorStop(1, accent ? '#9a5212' : '#2a8a4c');
  if (accent === '#e88a3a') { g = ctx.createLinearGradient(bx, y, bx, y + bh); g.addColorStop(0, '#ef9b3a'); g.addColorStop(1, '#c46410'); }
  GF.rr(ctx, bx, y, bw, bh, bh / 2);
  ctx.fillStyle = g; ctx.fill();
  ctx.font = 'bold ' + GF.clamp(19 * S, 15, 24) + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, y + bh / 2);
  ctx.textBaseline = 'top';
  return { x: bx, y: y, w: bw, h: bh };
}

function drawSmallButton(ctx, label, cx, y) {
  var S = GF.S;
  var bw = GF.clamp(180 * S, 130, 240), bh = GF.clamp(46 * S, 38, 58);
  var bx = cx - bw / 2;
  GF.rr(ctx, bx, y, bw, bh, bh / 2);
  ctx.fillStyle = 'rgba(60,80,120,0.9)'; ctx.fill();
  ctx.lineWidth = Math.max(1.5 * S, 1.2);
  ctx.strokeStyle = 'rgba(150,180,230,0.5)'; ctx.stroke();
  ctx.font = 'bold ' + GF.clamp(16 * S, 13, 20) + 'px sans-serif';
  ctx.fillStyle = '#dce8ff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, y + bh / 2);
  ctx.textBaseline = 'top';
  return { x: bx, y: y, w: bw, h: bh };
}

// A pill button sized to fit half a row (used for the PLAY | DAILY menu pair so
// the daily entry adds NO vertical height vs. the old single-PLAY layout).
function drawPairButton(ctx, label, bx, y, bw, bh, accent, dim) {
  var S = GF.S;
  var g = ctx.createLinearGradient(bx, y, bx, y + bh);
  if (dim) { g.addColorStop(0, '#37506e'); g.addColorStop(1, '#26384e'); }
  else if (accent === 'play') { g.addColorStop(0, '#3fb86a'); g.addColorStop(1, '#2a8a4c'); }
  else { g.addColorStop(0, '#ef9b3a'); g.addColorStop(1, '#c46410'); } // daily = warm
  GF.rr(ctx, bx, y, bw, bh, bh / 2);
  ctx.fillStyle = g; ctx.fill();
  if (dim) { ctx.lineWidth = Math.max(1.5 * S, 1.2); ctx.strokeStyle = 'rgba(150,180,230,0.4)'; ctx.stroke(); }
  ctx.font = 'bold ' + GF.clamp(17 * S, 13, 22) + 'px sans-serif';
  ctx.fillStyle = dim ? '#bcd' : '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, bx + bw / 2, y + bh / 2);
  ctx.textBaseline = 'top';
  return { x: bx, y: y, w: bw, h: bh };
}

function drawMenu(ctx) {
  drawScrim(ctx, 0.92);
  var S = GF.S, W = GF.W, H = GF.H, cx = W / 2;
  var maxW = Math.min(W * 0.86, 460);
  ctx.shadowColor = 'rgba(63,184,106,0.5)'; ctx.shadowBlur = 28 * S;
  ctx.font = 'bold ' + GF.clamp(40 * S, 26, 56) + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var titleY = H * 0.075;
  ctx.fillText(GF.t('title'), cx, titleY);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  var tubeBlockY = titleY + GF.clamp(52 * S, 38, 68);
  drawTitleTubes(ctx, cx, tubeBlockY);

  // ── Lab Rank meta panel (persistent, owned progression) ──
  var rankBlockY = tubeBlockY + GF.clamp(108 * S, 80, 152);
  var rankBlockH = drawRankPanel(ctx, cx, rankBlockY, maxW);

  var y = rankBlockY + rankBlockH + GF.clamp(14 * S, 8, 22);
  var fs = GF.clamp(15 * S, 12, 19);
  var lineH = fs * 1.28;
  ctx.font = fs + 'px sans-serif';
  ctx.textAlign = 'left';
  var lx = cx - maxW / 2;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var cols = ['#9fe8b5', '#cfe0ff', '#cfe0ff', '#ff9c8e', '#ffe27a'];
  for (var ki = 0; ki < keys.length; ki++) {
    var lines = wrapLines(ctx, GF.t(keys[ki]), maxW);
    ctx.fillStyle = cols[ki];
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], lx, y); y += lineH; }
    y += lineH * 0.28;
  }
  // PLAY (campaign) | DAILY pair — same row, so the new daily entry costs no
  // extra menu height (keeps the portrait menu inside the viewport).
  var btnY = Math.min(y + GF.clamp(14 * S, 8, 22), H - GF.clamp(96 * S, 72, 128));
  var bh = GF.clamp(56 * S, 44, 70);
  var rowW = Math.min(W * 0.92, GF.clamp(360 * S, 280, 440));
  var midGap = GF.clamp(12 * S, 8, 18);
  var bw = (rowW - midGap) / 2;
  var leftX = cx - rowW / 2;
  _playBtn = drawPairButton(ctx, GF.t('play'), leftX, btnY, bw, bh, 'play', false);
  // Daily: dim when today's puzzle is already solved (still tappable to replay,
  // but visually signals "done" — the FOMO is in the streak, not a hard lock).
  _dailyBtn = drawPairButton(ctx,
    dailyDoneToday ? GF.t('daily_done_btn') : GF.t('daily'),
    leftX + bw + midGap, btnY, bw, bh, 'daily', dailyDoneToday);

  // Claimable daily-bonus chest (session-end hook): only when a bonus is waiting.
  // Sits in the caption gap under the PLAY|DAILY row so it costs no fixed extra
  // height — when there's nothing to claim the area collapses back to captions.
  _bonusBtn = null;
  var capY = btnY + bh + GF.clamp(12 * S, 8, 18);
  if (bonusAvailable()) {
    _bonusBtn = drawBonusButton(ctx, cx, capY, rowW);
    capY = _bonusBtn.y + _bonusBtn.h + GF.clamp(10 * S, 7, 16);
  }

  // Streak + best-level caption line under the buttons / chest.
  ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  if (dailyStreak > 0) {
    ctx.fillStyle = '#ffb454';
    var unit = dailyStreak === 1 ? GF.t('day') : GF.t('days');
    ctx.fillText('🔥 ' + dailyStreak + ' ' + unit + ' ' + GF.t('streak'), cx, capY);
    capY += GF.clamp(18 * S, 13, 24);
  }
  if (bestLevel > 0) {
    ctx.font = GF.clamp(12 * S, 9, 15) + 'px sans-serif';
    ctx.fillStyle = '#7f93b5';
    ctx.fillText(GF.t('best') + ': ' + bestLevel + '/' + WIN_LEVELS, cx, capY);
  }
}

// The claimable daily-bonus chest button on the MENU. A warm gold pill with a
// gift glyph, a gentle pulse, and the streak-scaled reward amount baked into the
// label so the player sees exactly what claiming gives.
function drawBonusButton(ctx, cx, y, rowW) {
  var S = GF.S;
  _bonusPulse += 0.05;
  var pulse = 0.5 + 0.5 * Math.sin(_bonusPulse);
  var bw = Math.min(rowW, GF.clamp(300 * S, 220, 380));
  var bh = GF.clamp(46 * S, 38, 58);
  var bx = cx - bw / 2;
  ctx.save();
  ctx.shadowColor = 'rgba(255,210,90,' + (0.35 + 0.35 * pulse) + ')';
  ctx.shadowBlur = (14 + 10 * pulse) * S;
  var g = ctx.createLinearGradient(bx, y, bx, y + bh);
  g.addColorStop(0, '#ffd24a');
  g.addColorStop(1, '#e8932a');
  GF.rr(ctx, bx, y, bw, bh, bh / 2);
  ctx.fillStyle = g; ctx.fill();
  ctx.restore();
  ctx.lineWidth = Math.max(1.6 * S, 1.2);
  ctx.strokeStyle = 'rgba(255,245,210,0.6)'; ctx.stroke();
  ctx.font = 'bold ' + GF.clamp(16 * S, 13, 21) + 'px sans-serif';
  ctx.fillStyle = '#3a230a';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🎁 ' + GF.t('bonus_claim') + ' +' + bonusValueToday(), cx, y + bh / 2);
  ctx.textBaseline = 'top';
  return { x: bx, y: y, w: bw, h: bh };
}

function drawTitleTubes(ctx, cx, y) {
  var S = GF.S;
  var w = GF.clamp(26 * S, 18, 38), h = GF.clamp(96 * S, 70, 140);
  var gap = w * 1.5;
  var sets = [[1, 5, 2], [3, 2], [6, 1, 3]];
  for (var i = -1; i <= 1; i++) {
    var x = cx + i * (w + gap) - w / 2;
    var arr = sets[i + 1];
    var r = w * 0.5;
    GF.rr(ctx, x, y, w, h, r);
    ctx.fillStyle = 'rgba(200,225,255,0.06)'; ctx.fill();
    ctx.save();
    GF.rr(ctx, x + 2, y + 2, w - 4, h - 4, r); ctx.clip();
    var layerH = (h - 4) / TUBE_CAP;
    for (var li = 0; li < arr.length; li++) {
      var ly = y + h - 2 - (li + 1) * layerH;
      ctx.fillStyle = COL_HEX[arr[li]];
      ctx.fillRect(x + 2, ly, w - 4, layerH + 1);
    }
    ctx.restore();
    GF.rr(ctx, x, y, w, h, r);
    ctx.lineWidth = Math.max(2 * S, 1.6);
    ctx.strokeStyle = 'rgba(190,215,255,0.45)'; ctx.stroke();
  }
}

// Lab Rank panel: rank name + lifetime tubes-purified + progress bar to next
// rank. Returns the block height so the caller can flow the tutorial below it.
function drawRankPanel(ctx, cx, y, maxW) {
  var S = GF.S;
  var w = Math.min(maxW, GF.W * 0.78);
  var x = cx - w / 2;
  var ri = rankIndexFor(tubesPurified);
  var prog = rankProgress(tubesPurified);

  var labelFs = GF.clamp(12 * S, 10, 16);
  var nameFs = GF.clamp(19 * S, 15, 26);
  var barH = GF.clamp(9 * S, 7, 13);
  var pad = GF.clamp(6 * S, 4, 10);
  var blockH = labelFs + nameFs + barH + GF.clamp(20 * S, 14, 30);

  // small "LAB RANK" caption
  ctx.font = 'bold ' + labelFs + 'px sans-serif';
  ctx.fillStyle = '#7f93b5';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(isRu() ? 'РАНГ' : 'LAB RANK', cx, y);

  // rank name (glows gold)
  ctx.shadowColor = 'rgba(255,226,122,0.45)';
  ctx.shadowBlur = 14 * S;
  ctx.font = 'bold ' + nameFs + 'px sans-serif';
  ctx.fillStyle = '#ffe27a';
  ctx.fillText(rankName(ri), cx, y + labelFs + 2 * S);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  // progress bar to next rank
  var barY = y + labelFs + nameFs + GF.clamp(8 * S, 5, 13);
  GF.rr(ctx, x, barY, w, barH, barH / 2);
  ctx.fillStyle = 'rgba(120,140,170,0.22)';
  ctx.fill();
  var fillW = Math.max(barH, w * GF.clamp(prog.frac, 0, 1));
  if (prog.frac > 0) {
    GF.rr(ctx, x, barY, fillW, barH, barH / 2);
    var g = ctx.createLinearGradient(x, barY, x + fillW, barY);
    g.addColorStop(0, '#3fb86a');
    g.addColorStop(1, '#5fd0ff');
    ctx.fillStyle = g;
    ctx.fill();
  }

  // count caption to the right / centered under the bar
  ctx.font = GF.clamp(11 * S, 9, 15) + 'px sans-serif';
  ctx.fillStyle = '#9fb6d8';
  ctx.textAlign = 'center';
  var caption = prog.maxed
    ? (isRu() ? ('Чистых пробирок: ' + tubesPurified) : (tubesPurified + ' tubes purified — MAX'))
    : (isRu()
        ? ((prog.need - prog.cur) + ' до повышения')
        : ((prog.need - prog.cur) + ' tubes to next rank'));
  ctx.fillText(caption, cx, barY + barH + pad);

  return blockH;
}

function drawLevelEnd(ctx) {
  drawScrim(ctx, 0.7);
  var S = GF.S, H = GF.H, cx = GF.W / 2;
  ctx.font = 'bold ' + GF.clamp(34 * S, 22, 48) + 'px sans-serif';
  ctx.fillStyle = '#9fe8b5'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('levelsolved') + ' ' + level + ' ' + GF.t('solved'), cx, H * 0.42);
  ctx.font = GF.clamp(16 * S, 12, 20) + 'px sans-serif';
  ctx.fillStyle = '#bcd';
  ctx.fillText(GF.t('tap_next'), cx, H * 0.42 + GF.clamp(44 * S, 32, 60));
  ctx.textBaseline = 'top';
}

// Session-end hook line, drawn near the bottom of every terminal screen
// (GAMEOVER / WIN / DAILYDONE). If a daily bonus is unclaimed → tease it ("waiting
// on the menu"). If already claimed → preview TOMORROW'S (bigger) bonus, the
// concrete dated carrot that arms the next session. `botY` is the baseline Y to
// draw above the menu button; returns nothing (purely additive overlay text).
function drawSessionEndHook(ctx, botY) {
  var S = GF.S, cx = GF.W / 2;
  var maxW = Math.min(GF.W * 0.84, 400);
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px sans-serif';
  var txt, col;
  if (bonusAvailable()) {
    col = '#ffd24a';
    txt = '🎁 ' + GF.t('bonus_tease_ready');
  } else {
    col = '#9fb6d8';
    txt = GF.t('bonus_tease_next') + ' +' + bonusValueTomorrow() + ' ' + GF.t('bonus_tubes') + '.';
  }
  ctx.fillStyle = col;
  var lines = wrapLines(ctx, txt, maxW);
  var lh = GF.clamp(18 * S, 14, 24);
  var y = botY - lines.length * lh;
  for (var i = 0; i < lines.length; i++) { ctx.fillText(lines[i], cx, y); y += lh; }
}

function drawGameOver(ctx) {
  drawScrim(ctx, 0.9);
  var S = GF.S, H = GF.H, cx = GF.W / 2;
  ctx.font = 'bold ' + GF.clamp(36 * S, 24, 52) + 'px sans-serif';
  ctx.fillStyle = '#ff7a6c'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('gameover'), cx, H * 0.30);
  ctx.font = GF.clamp(16 * S, 12, 20) + 'px sans-serif';
  ctx.fillStyle = '#bcd';
  ctx.fillText(GF.t('level') + ' ' + level + '/' + WIN_LEVELS, cx, H * 0.30 + GF.clamp(50 * S, 38, 66));
  _retryBtn = drawButton(ctx, GF.t('retry'), cx, H * 0.52, '#e88a3a');
  _gmMenuBtn = drawSmallButton(ctx, GF.t('menu'), cx, H * 0.52 + _retryBtn.h + GF.clamp(18 * S, 12, 26));
  // Session-end hook: tease the claimable daily bonus / preview tomorrow's.
  drawSessionEndHook(ctx, H - GF.clamp(20 * S, 14, 28));
}

function drawWin(ctx) {
  drawScrim(ctx, 0.92);
  var S = GF.S, H = GF.H, cx = GF.W / 2;
  ctx.shadowColor = 'rgba(63,184,106,0.6)'; ctx.shadowBlur = 30 * S;
  ctx.font = 'bold ' + GF.clamp(42 * S, 28, 58) + 'px sans-serif';
  ctx.fillStyle = '#9fe8b5'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('win'), cx, H * 0.28);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = GF.clamp(16 * S, 12, 20) + 'px sans-serif';
  ctx.fillStyle = '#bcd';
  ctx.fillText(GF.t('best') + ': ' + bestLevel, cx, H * 0.28 + GF.clamp(54 * S, 40, 70));
  // Persistent Lab Rank — the owned meta surfaced at the session-end moment.
  ctx.fillStyle = '#ffe27a';
  ctx.fillText(rankName(rankIndexFor(tubesPurified)) + ' · ' + tubesPurified +
    (isRu() ? ' чистых' : ' pure'),
    cx, H * 0.28 + GF.clamp(80 * S, 60, 104));
  _againBtn = drawButton(ctx, GF.t('again'), cx, H * 0.52);
  _winMenuBtn = drawSmallButton(ctx, GF.t('menu'), cx, H * 0.52 + _againBtn.h + GF.clamp(18 * S, 12, 26));
  // Session-end hook: tease the claimable daily bonus / preview tomorrow's.
  drawSessionEndHook(ctx, H - GF.clamp(20 * S, 14, 28));
}

// Daily-challenge solved screen: the streak is the headline (the return hook),
// with the "come back tomorrow" line making the next-day pull explicit.
function drawDailyDone(ctx) {
  drawScrim(ctx, 0.92);
  var S = GF.S, H = GF.H, cx = GF.W / 2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.shadowColor = 'rgba(255,180,84,0.55)'; ctx.shadowBlur = 28 * S;
  ctx.font = 'bold ' + GF.clamp(34 * S, 22, 48) + 'px sans-serif';
  ctx.fillStyle = '#ffb454';
  ctx.fillText(GF.t('daily_solved'), cx, H * 0.20);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  // Big streak count — the headline retention payload.
  var unit = dailyStreak === 1 ? GF.t('day') : GF.t('days');
  ctx.font = 'bold ' + GF.clamp(48 * S, 32, 64) + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText('🔥 ' + dailyStreak, cx, H * 0.31);
  ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  ctx.fillStyle = '#ffb454';
  ctx.fillText(unit + ' ' + GF.t('streak'), cx, H * 0.31 + GF.clamp(56 * S, 40, 74));

  ctx.font = GF.clamp(13 * S, 10, 17) + 'px sans-serif';
  ctx.fillStyle = '#9fb6d8';
  ctx.fillText(GF.t('best_streak') + ': ' + dailyBest, cx, H * 0.31 + GF.clamp(80 * S, 58, 104));

  // Lab Rank line (same owned meta the daily feeds into).
  ctx.fillStyle = '#ffe27a';
  ctx.fillText(rankName(rankIndexFor(tubesPurified)) + ' · ' + tubesPurified +
    (isRu() ? ' чистых' : ' pure'), cx, H * 0.31 + GF.clamp(102 * S, 74, 132));

  // The explicit next-day hook.
  ctx.font = GF.clamp(14 * S, 11, 18) + 'px sans-serif';
  ctx.fillStyle = '#cfe0ff';
  var cbLines = wrapLines(ctx, GF.t('come_back'), Math.min(GF.W * 0.8, 380));
  var cbY = H * 0.55;
  for (var i = 0; i < cbLines.length; i++) { ctx.fillText(cbLines[i], cx, cbY); cbY += GF.clamp(20 * S, 15, 26); }

  // Reserve room for the session-end hook line between the come-back copy and the
  // MENU button so nothing overlaps on the (content-heavy) daily-done screen.
  var hookH = GF.clamp(40 * S, 30, 54);
  var menuY = Math.min(cbY + hookH + GF.clamp(14 * S, 10, 22), H - GF.clamp(80 * S, 60, 104));
  // Session-end hook: tease the claimable daily bonus / preview tomorrow's,
  // drawn just above the MENU button.
  drawSessionEndHook(ctx, menuY - GF.clamp(8 * S, 6, 12));
  _dailyMenuBtn = drawButton(ctx, GF.t('menu'), cx, menuY);
}

// ── INPUT ──────────────────────────────────────────────────────────────────
function hit(b, x, y) { return b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }

function tubeHit(x, y) {
  var pad = 12 * GF.S;
  for (var i = 0; i < tubeRects.length; i++) {
    var t = tubeRects[i];
    if (!t) continue;
    var lift = (i === sel) ? SEL_LIFT_PX * GF.S : 0;
    if (x >= t.x - pad && x <= t.x + t.w + pad &&
        y >= t.y - lift - pad && y <= t.y + t.h + pad) return i;
  }
  return -1;
}

function onTap(x, y) {
  if (GF.tutorial.active) { if (GF.tutorial.handleClick(x, y)) return; }

  if (gs === 'MENU') {
    if (hit(_bonusBtn, x, y)) { claimBonus(); return; }
    if (hit(_playBtn, x, y)) { startGame(); return; }
    if (hit(_dailyBtn, x, y)) { startDaily(); return; }
    return;
  }
  if (gs === 'DAILYDONE') {
    if (hit(_dailyMenuBtn, x, y)) { toMenu(); return; }
    return;
  }
  if (gs === 'LEVELEND') { nextLevel(); return; }
  if (gs === 'GAMEOVER') {
    if (hit(_retryBtn, x, y)) { retryLevel(); return; }
    if (hit(_gmMenuBtn, x, y)) { toMenu(); return; }
    return;
  }
  if (gs === 'WIN') {
    if (hit(_againBtn, x, y)) { startGame(); return; }
    if (hit(_winMenuBtn, x, y)) { toMenu(); return; }
    return;
  }
  if (gs !== 'PLAYING') return;
  if (anim) return;

  if (hit(_hudMenuBtn, x, y)) { toMenu(); return; }
  if (hit(_hudHelpBtn, x, y)) { GF.tutorial.reopen(); return; }
  if (hit(_undoBtn, x, y)) { doUndo(); return; }

  var idx = tubeHit(x, y);
  if (idx < 0) { sel = -1; return; }
  if (sel < 0) { if (tubes[idx].length) sel = idx; return; }
  if (idx === sel) { sel = -1; return; }
  if (canPour(sel, idx)) { pour(sel, idx); }
  else { GF.setShake(0.18); sel = -1; }
}

GF.canvas.addEventListener('pointerdown', function(e) {
  var rect = GF.canvas.getBoundingClientRect();
  var scaleX = GF.canvas.width / rect.width;
  var scaleY = GF.canvas.height / rect.height;
  onTap((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
});

// ── STATE EXPOSURE (runtime gate cross-checks DESIGN.md) ───────────────────
GF.exposeState(function() {
  return {
    gs: gs,
    level: level,
    pours: pours,
    undoLeft: undoLeft,
    stuck: stuck,
    tubes: tubes.length,
    solved: isSolved(),
    impure: boardImpure(),
    sel: sel,
    mode: mode,
    tubesPurified: tubesPurified,
    labRank: rankName(rankIndexFor(tubesPurified)),
    dailyStreak: dailyStreak,
    dailyBest: dailyBest,
    dailyDoneToday: dailyDoneToday,
    bonusClaimedToday: bonusClaimedToday,
    bonusAvailable: bonusAvailable(),
    bonusValueToday: bonusValueToday(),
    bonusValueTomorrow: bonusValueTomorrow(),
    POUR_BUDGET: POUR_BUDGET,
    TUBE_CAP: TUBE_CAP,
    START_TUBES: START_TUBES,
    WIN_LEVELS: WIN_LEVELS,
    UNDO_MAX: UNDO_MAX,
    BLEND_PENALTY: BLEND_PENALTY,
  };
});

window._setState = function(s) { gs = s; };
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'sans-serif'; };
// Test-only: expose tube screen-centres so headless tests can tap precisely.
window._tubeCenters = function() {
  computeLayout();
  return tubeRects.map(function(t){ return { x: t.x + t.w / 2, y: t.y + t.h / 2 }; });
};
// Test-only: read-only copy of tube contents (safe to ship; aids QA solvers).
window._tubes = function() { return tubes.map(function(a){ return a.slice(); }); };

// ── BOOT ────────────────────────────────────────────────────────────────────
GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'hue_sort',
  onReady: function() {
    try { bestLevel = parseInt(localStorage.getItem('hue_sort_best') || '0') || 0; } catch (e) {}
    try { tubesPurified = parseInt(localStorage.getItem('hue_sort_purified') || '0') || 0; } catch (e) {}
    loadDaily(); // restore day-streak + whether today's daily is already solved
    loadBonus(); // restore whether today's daily login bonus is still claimable
    GF.persist('hue_sort_run_v1',
      function() {
        return { gs: gs, mode: mode, level: level, pours: pours, undoLeft: undoLeft,
                 tubes: tubes.map(function(a){ return a.slice(); }) };
      },
      function(s) {
        if (!s) return;
        mode = (s.mode === 'daily') ? 'daily' : 'campaign';
        level = s.level || 1;
        pours = (typeof s.pours === 'number') ? s.pours : POUR_BUDGET;
        undoLeft = (typeof s.undoLeft === 'number') ? s.undoLeft : UNDO_MAX;
        if (s.tubes && s.tubes.length) tubes = s.tubes.map(function(a){ return a.slice(); });
        gs = (s.gs === 'PLAYING' && tubes.length) ? 'PLAYING' : 'MENU';
      }
    );

    GF.tutorial.start([
      { text: GF.t('tut_goal') + ' ' + GF.t('tut_controls'), advance: 'click_any' },
      { text: GF.t('tut_win') + ' ' + GF.t('tut_lose'), advance: 'click_any' },
      { text: GF.t('tut_tip'), advance: 'click_any' },
    ], { storageKey: 'hue_sort_seen_tutorial' });
  },
  onUpdate: update,
  onDraw: draw,
});

})();
</script>
