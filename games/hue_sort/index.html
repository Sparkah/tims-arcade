// ── REAGENT KIT — overlay UI (REAGENTS + QUESTS tabs) ──────────────────────
// A vector flask icon, tinted to the reagent's colour, with a small glyph hinting
// the stat. NEVER an emoji (tofu boxes in the game font). `dim` greys an unowned one.
function drawReagentIcon(ctx, def, cx, cy, sz, dim) {
  var col = dim ? 'rgba(150,170,200,0.35)' : def.col;
  ctx.save();
  // flask body
  var nw = sz * 0.16, fb = sz * 0.34, topY = cy - sz * 0.34, botY = cy + sz * 0.30;
  ctx.lineWidth = Math.max(2 * GF.S, 1.6);
  ctx.strokeStyle = dim ? 'rgba(170,190,220,0.4)' : 'rgba(230,240,255,0.85)';
  ctx.beginPath();
  ctx.moveTo(cx - nw, topY);
  ctx.lineTo(cx - nw, cy - sz * 0.06);
  ctx.lineTo(cx - fb, botY);
  ctx.lineTo(cx + fb, botY);
  ctx.lineTo(cx + nw, cy - sz * 0.06);
  ctx.lineTo(cx + nw, topY);
  ctx.closePath();
  ctx.stroke();
  // liquid fill (clip to body)
  ctx.save();
  ctx.clip();
  ctx.fillStyle = col;
  ctx.fillRect(cx - fb, cy - sz * 0.04, fb * 2, botY - (cy - sz * 0.04));
  ctx.restore();
  // neck rim
  ctx.beginPath(); ctx.moveTo(cx - nw * 1.6, topY); ctx.lineTo(cx + nw * 1.6, topY); ctx.stroke();
  ctx.restore();
}

// Floating flourishes for a new reagent unlock + a completed daily quest. Drawn
// near the top so they never collide with the buttons/board.
function drawToasts(ctx) {
  var S = GF.S, W = GF.W, cx = W / 2;
  var y = GF.H * 0.16;
  if (reagentToast && reagentToast.def) {
    var a = GF.clamp(reagentToast.t / 0.6, 0, 1);
    ctx.save(); ctx.globalAlpha = a;
    var bw = Math.min(W * 0.82, 360 * S), bh = GF.clamp(48 * S, 40, 62), bx = cx - bw / 2;
    GF.rr(ctx, bx, y, bw, bh, 12 * S);
    ctx.fillStyle = 'rgba(20,30,50,0.95)'; ctx.fill();
    ctx.strokeStyle = reagentToast.def.col; ctx.lineWidth = 2 * S; ctx.stroke();
    drawReagentIcon(ctx, reagentToast.def, bx + bh * 0.55, y + bh / 2, bh * 0.62, false);
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px sans-serif';
    ctx.fillStyle = '#ffe27a';
    ctx.fillText(GF.t('reagent_new'), bx + bh, y + bh * 0.36);
    ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(reagentName(reagentToast.def), bx + bh, y + bh * 0.66);
    ctx.restore();
    y += bh + 8 * S;
  }
  if (questToast && questToast.q) {
    var a2 = GF.clamp(questToast.t / 0.6, 0, 1);
    ctx.save(); ctx.globalAlpha = a2;
    var bw2 = Math.min(W * 0.82, 360 * S), bh2 = GF.clamp(40 * S, 34, 52), bx2 = cx - bw2 / 2;
    GF.rr(ctx, bx2, y, bw2, bh2, 11 * S);
    ctx.fillStyle = 'rgba(20,30,50,0.95)'; ctx.fill();
    ctx.strokeStyle = '#3fb86a'; ctx.lineWidth = 2 * S; ctx.stroke();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(12.5 * S, 10, 16) + 'px sans-serif';
    ctx.fillStyle = '#9fe8b5';
    ctx.fillText('+' + questToast.q.reward + ' ' + GF.t('flux') + ' - ' + questLabel(questToast.q), cx, y + bh2 / 2);
    ctx.restore();
  }
}

function openKit(tab) {
  kitOpen = true; kitTab = tab || 'reagents';
  maybeRollQuests();
  GF.sfx('tap');
}
function closeKit() { kitOpen = false; foldRunPlay(); saveKit(); GF.sfx('tap'); }

// The full-screen Lab Kit overlay. Two tabs: REAGENTS (the collection + equip slots +
// upgrades) and QUESTS (daily quests + claim). Reachable from the MENU and mid-run.
function drawKitOverlay(ctx) {
  var S = GF.S, W = GF.W, H = GF.H, cx = W / 2;
  drawScrim(ctx, 0.95);
  // header
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.shadowColor = 'rgba(95,208,255,0.5)'; ctx.shadowBlur = 22 * S;
  ctx.font = 'bold ' + GF.clamp(26 * S, 18, 34) + 'px sans-serif';
  ctx.fillStyle = '#cfeaff';
  var ty = GF.clamp(H * 0.045, 16, 50);
  ctx.fillText(GF.t('kit'), cx, ty);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  // FLUX balance line
  ctx.font = 'bold ' + GF.clamp(14 * S, 11, 19) + 'px sans-serif';
  ctx.fillStyle = '#9fe8ff';
  ctx.fillText(GF.t('flux') + ': ' + flux, cx, ty + GF.clamp(32 * S, 24, 42));

  var maxW = Math.min(W - 24 * S, 460 * S);
  // tab row
  _kitTabRects = [];
  var tabH = GF.clamp(36 * S, 30, 46), tabGap = 8 * S, tabW = (maxW - tabGap) / 2;
  var tabX = cx - maxW / 2, tabY = ty + GF.clamp(58 * S, 44, 76);
  var claimable = claimableQuests();
  var tabs = [
    { id: 'reagents', label: GF.t('kit_reagents') },
    { id: 'quests', label: GF.t('kit_quests'), badge: claimable },
  ];
  for (var t = 0; t < tabs.length; t++) {
    var on = (kitTab === tabs[t].id), bx = tabX + t * (tabW + tabGap);
    GF.rr(ctx, bx, tabY, tabW, tabH, 9 * S);
    ctx.fillStyle = on ? 'rgba(95,208,255,0.22)' : 'rgba(255,255,255,0.05)'; ctx.fill();
    ctx.strokeStyle = on ? '#5fd0ff' : 'rgba(255,255,255,0.16)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
    ctx.fillStyle = on ? '#cfeaff' : '#8294ad'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px sans-serif';
    ctx.fillText(tabs[t].label, bx + tabW / 2, tabY + tabH / 2);
    if (tabs[t].badge) {
      var br = GF.clamp(8 * S, 7, 11);
      ctx.beginPath(); ctx.arc(bx + tabW - br - 2 * S, tabY + br + 2 * S, br, 0, Math.PI * 2);
      ctx.fillStyle = '#ff5b5b'; ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(9 * S, 8, 12) + 'px sans-serif';
      ctx.fillText('' + tabs[t].badge, bx + tabW - br - 2 * S, tabY + br + 3 * S);
    }
    _kitTabRects.push({ tab: tabs[t].id, x: bx, y: tabY, w: tabW, h: tabH });
  }
  ctx.textBaseline = 'top';
  var contentY = tabY + tabH + GF.clamp(14 * S, 10, 20);
  var resumeH = GF.clamp(48 * S, 40, 60);
  var contentBot = H - resumeH - GF.clamp(22 * S, 16, 32);
  if (kitTab === 'reagents') drawReagentsTab(ctx, cx, contentY, contentBot, maxW);
  else drawQuestsTab(ctx, cx, contentY, contentBot, maxW);

  // RESUME / CLOSE button at the bottom (back to the board or the menu)
  _kitResumeBtn = drawButton(ctx, gs === 'PLAYING' ? GF.t('resume') : GF.t('menu'),
    cx, H - resumeH - GF.clamp(12 * S, 8, 18), '#3a78e8');
}

// REAGENTS tab: 3 equip slots up top, then the scrollable collection grid below.
function drawReagentsTab(ctx, cx, y0, yBot, maxW) {
  var S = GF.S;
  _reagentTiles = []; _reagentEquipBtns = []; _reagentUpBtns = [];
  // ── equip slots ──
  var slotsLabelH = GF.clamp(16 * S, 13, 22);
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + GF.clamp(11 * S, 9, 15) + 'px sans-serif';
  ctx.fillStyle = '#8fa6c8';
  var lx = cx - maxW / 2;
  var slotSz = GF.clamp(44 * S, 36, 58);
  var slotGap = GF.clamp(12 * S, 8, 18);
  var slotsW = REAGENT_SLOTS * slotSz + (REAGENT_SLOTS - 1) * slotGap;
  var slotY = y0;
  var slotX0 = cx - slotsW / 2;
  for (var s = 0; s < REAGENT_SLOTS; s++) {
    var sx = slotX0 + s * (slotSz + slotGap);
    GF.rr(ctx, sx, slotY, slotSz, slotSz, slotSz * 0.22);
    ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
    ctx.strokeStyle = 'rgba(95,208,255,0.45)'; ctx.lineWidth = 1.5 * S;
    ctx.setLineDash([4 * S, 4 * S]); ctx.stroke(); ctx.setLineDash([]);
    var eid = kit ? kit.equipped[s] : null;
    if (eid && REAGENT_BY_ID[eid]) drawReagentIcon(ctx, REAGENT_BY_ID[eid], sx + slotSz / 2, slotY + slotSz / 2, slotSz * 0.74, false);
  }
  // ── collection grid (scrollable) ──
  var gridTop = slotY + slotSz + GF.clamp(16 * S, 12, 24);
  if (!_kitScroll) _kitScroll = GF.makeScroll('reagent_grid', { x: 0, y: 0, w: 0, h: 0 });
  var cols = 2;
  var cellGap = GF.clamp(10 * S, 7, 16);
  var cellW = (maxW - (cols - 1) * cellGap) / cols;
  var cellH = GF.clamp(96 * S, 78, 120);
  var rows = Math.ceil(REAGENT_DEFS.length / cols);
  var contentH = rows * cellH + (rows - 1) * cellGap;
  var vpH = Math.max(cellH, yBot - gridTop);
  var gx0 = cx - maxW / 2;
  _kitScroll.setViewport({ x: gx0, y: gridTop, w: maxW, h: vpH });
  _kitScroll.setContentHeight(contentH);
  _kitScroll.update();
  var off = _kitScroll.offset;
  // hit-rects are stored in CONTENT space measured from the REGION TOP (gridTop), so
  // both onKitTap (screen = stored - off + gridTop... handled below) and reachState
  // read a single consistent coordinate. We register EVERY tile/button (not just the
  // visible ones) so the reachability gate can prove the off-view rows scroll into view.
  var btnH = GF.clamp(24 * S, 20, 32), bpad = GF.clamp(7 * S, 5, 11);
  var halfW = (cellW - GF.clamp(18 * S, 12, 24)) / 2;
  ctx.save();
  ctx.beginPath(); ctx.rect(gx0, gridTop, maxW, vpH); ctx.clip();
  for (var i = 0; i < REAGENT_DEFS.length; i++) {
    var def = REAGENT_DEFS[i], col = i % cols, row = Math.floor(i / cols);
    var bx = gx0 + col * (cellW + cellGap);
    var cYrel = row * (cellH + cellGap);     // content-y from region top
    var by = gridTop + cYrel - off;          // screen-y this frame
    var owned = !!(kit && kit.reagents[def.id]);
    var equipped = !!(kit && kit.equipped.indexOf(def.id) >= 0);
    var eqx = bx + GF.clamp(8 * S, 6, 12);
    var ux = eqx + halfW + GF.clamp(8 * S, 5, 12);
    var btnYrel = cYrel + cellH - btnH - bpad;
    // register hit-rects (CONTENT space from region top) — always, even when culled
    _reagentTiles.push({ id: def.id, x: bx, y: cYrel, w: cellW, h: cellH });
    if (owned) {
      _reagentEquipBtns.push({ id: def.id, x: eqx, y: btnYrel, w: halfW, h: btnH, _scroll: true });
      if (isFinite(reagentUpCost(def.id))) _reagentUpBtns.push({ id: def.id, x: ux, y: btnYrel, w: halfW, h: btnH, _scroll: true });
    }
    if (by > gridTop + vpH || by + cellH < gridTop) continue; // cull DRAWING only
    GF.rr(ctx, bx, by, cellW, cellH, 10 * S);
    ctx.fillStyle = owned ? 'rgba(30,44,68,0.92)' : 'rgba(22,30,46,0.85)'; ctx.fill();
    ctx.strokeStyle = equipped ? '#5fd0ff' : (owned ? 'rgba(150,180,230,0.35)' : 'rgba(110,130,160,0.25)');
    ctx.lineWidth = equipped ? 2 * S : 1.2 * S; ctx.stroke();
    var icx = bx + cellW * 0.24, icy = by + cellH * 0.36;
    drawReagentIcon(ctx, def, icx, icy, cellH * 0.5, !owned);
    // name + bonus
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.font = 'bold ' + GF.clamp(11.5 * S, 9, 15) + 'px sans-serif';
    ctx.fillStyle = owned ? '#e6f0ff' : '#7e90ab';
    var nameX = bx + cellW * 0.44;
    var nameMaxW = (bx + cellW) - nameX - GF.clamp(8 * S, 5, 12);
    var nmTxt = reagentName(def);
    while (nmTxt.length > 4 && ctx.measureText(nmTxt).width > nameMaxW) nmTxt = nmTxt.slice(0, -2);
    ctx.fillText(nmTxt, nameX, by + cellH * 0.12);
    ctx.font = GF.clamp(10 * S, 8, 13) + 'px sans-serif';
    ctx.fillStyle = owned ? '#9fb6d8' : '#6b7d98';
    // truncate the sub-line to the cell's right edge so a long RU label never bleeds
    var subMaxW = (bx + cellW) - nameX - GF.clamp(8 * S, 5, 12);
    var subTxt = owned
      ? (GF.t('lvl_short') + ' ' + kit.reagents[def.id].lvl + ' - ' + reagentBonusText(def, kit.reagents[def.id].lvl))
      : (GF.t('locked_at') + ' ' + def.min + GF.t('minute_short'));
    while (subTxt.length > 4 && ctx.measureText(subTxt).width > subMaxW) subTxt = subTxt.slice(0, -2);
    ctx.fillText(subTxt, nameX, by + cellH * 0.32);
    if (owned) {
      var btnY = by + cellH - btnH - bpad;
      // EQUIP / UNEQUIP
      GF.rr(ctx, eqx, btnY, halfW, btnH, btnH / 2);
      ctx.fillStyle = equipped ? 'rgba(95,208,255,0.28)' : 'rgba(95,208,255,0.14)'; ctx.fill();
      ctx.strokeStyle = '#5fd0ff'; ctx.lineWidth = 1.2 * S; ctx.stroke();
      ctx.fillStyle = '#cfeaff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + GF.clamp(9.5 * S, 8, 13) + 'px sans-serif';
      ctx.fillText(equipped ? GF.t('equipped_tag') : GF.t('equip_btn'), eqx + halfW / 2, btnY + btnH / 2);
      // UPGRADE
      var cost = reagentUpCost(def.id);
      var maxed = !isFinite(cost);
      var afford = !maxed && flux >= cost;
      GF.rr(ctx, ux, btnY, halfW, btnH, btnH / 2);
      ctx.fillStyle = maxed ? 'rgba(120,120,120,0.18)' : (afford ? 'rgba(159,232,181,0.26)' : 'rgba(159,232,181,0.10)'); ctx.fill();
      ctx.strokeStyle = maxed ? 'rgba(150,150,150,0.4)' : (afford ? '#9fe8b5' : 'rgba(159,232,181,0.4)'); ctx.lineWidth = 1.2 * S; ctx.stroke();
      ctx.fillStyle = maxed ? '#99a' : (afford ? '#dffbe8' : '#8fb39c'); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + GF.clamp(9.5 * S, 8, 13) + 'px sans-serif';
      ctx.fillText(maxed ? GF.t('maxed') : (GF.t('flux') + ' ' + cost), ux + halfW / 2, btnY + btnH / 2);
    }
  }
  ctx.restore();
  // scrollbar + top/bottom fades (so the player knows there's more below)
  _kitScroll.draw(ctx);
}

// QUESTS tab: the 3 daily quests with progress bars + claim buttons.
function drawQuestsTab(ctx, cx, y0, yBot, maxW) {
  var S = GF.S;
  _questClaimBtns = [];
  var qs = (kit && kit.quests) ? kit.quests : [];
  var lx = cx - maxW / 2;
  // reset timer caption
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = GF.clamp(11 * S, 9, 15) + 'px sans-serif';
  ctx.fillStyle = '#8fa6c8';
  ctx.fillText(GF.t('quest_resets_in') + ' ' + Math.ceil(hoursToReset()) + GF.t('hours_short'), cx, y0);
  var rowY = y0 + GF.clamp(26 * S, 20, 36);
  var rowH = GF.clamp(64 * S, 54, 80);
  var rowGap = GF.clamp(12 * S, 8, 18);
  for (var i = 0; i < qs.length; i++) {
    var q = qs[i];
    var by = rowY + i * (rowH + rowGap);
    GF.rr(ctx, lx, by, maxW, rowH, 10 * S);
    ctx.fillStyle = 'rgba(30,44,68,0.9)'; ctx.fill();
    ctx.strokeStyle = q.done ? '#9fe8b5' : 'rgba(150,180,230,0.3)'; ctx.lineWidth = 1.3 * S; ctx.stroke();
    // label
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.font = 'bold ' + GF.clamp(12.5 * S, 10, 17) + 'px sans-serif';
    ctx.fillStyle = '#e6f0ff';
    ctx.fillText(questLabel(q), lx + GF.clamp(12 * S, 8, 16), by + GF.clamp(9 * S, 6, 14));
    // reward
    ctx.textAlign = 'right'; ctx.fillStyle = '#9fe8ff';
    ctx.font = 'bold ' + GF.clamp(11 * S, 9, 15) + 'px sans-serif';
    ctx.fillText('+' + q.reward + ' ' + GF.t('flux'), lx + maxW - GF.clamp(12 * S, 8, 16), by + GF.clamp(9 * S, 6, 14));
    // progress bar
    var barX = lx + GF.clamp(12 * S, 8, 16), barW = maxW - GF.clamp(24 * S, 16, 32), barY = by + rowH - GF.clamp(22 * S, 17, 30), barH = GF.clamp(8 * S, 6, 12);
    GF.rr(ctx, barX, barY, barW, barH, barH / 2); ctx.fillStyle = 'rgba(120,140,170,0.22)'; ctx.fill();
    var frac = GF.clamp(q.prog / q.goal, 0, 1);
    if (frac > 0) { GF.rr(ctx, barX, barY, Math.max(barH, barW * frac), barH, barH / 2); ctx.fillStyle = q.done ? '#9fe8b5' : '#5fd0ff'; ctx.fill(); }
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = GF.clamp(9.5 * S, 8, 13) + 'px sans-serif'; ctx.fillStyle = '#9fb6d8';
    ctx.fillText(Math.min(q.prog, q.goal) + '/' + q.goal, barX + 2 * S, barY - GF.clamp(9 * S, 7, 13));
    // claim button (when done + unclaimed)
    if (q.done && !q.claimed) {
      var cbw = GF.clamp(74 * S, 60, 98), cbh = GF.clamp(26 * S, 22, 34);
      var cbx = lx + maxW - cbw - GF.clamp(10 * S, 7, 14), cby = by + rowH - cbh - GF.clamp(5 * S, 3, 9);
      GF.rr(ctx, cbx, cby, cbw, cbh, cbh / 2); ctx.fillStyle = '#3fb86a'; ctx.fill();
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + GF.clamp(11 * S, 9, 15) + 'px sans-serif';
      ctx.fillText(GF.t('claim_btn'), cbx + cbw / 2, cby + cbh / 2);
      _questClaimBtns.push({ i: i, x: cbx, y: cby, w: cbw, h: cbh });
    } else if (q.claimed) {
      ctx.textAlign = 'right'; ctx.textBaseline = 'bottom'; ctx.fillStyle = '#6b8d76';
      ctx.font = 'bold ' + GF.clamp(10 * S, 8, 14) + 'px sans-serif';
      ctx.fillText(GF.t('claimed_tag'), lx + maxW - GF.clamp(12 * S, 8, 16), by + rowH - GF.clamp(7 * S, 5, 11));
    }
  }
  ctx.textBaseline = 'top';
}

// Lab Kit overlay tap handler — returns true if it consumed the tap.
function onKitTap(x, y) {
  if (hit(_kitResumeBtn, x, y)) { if (gs === 'PLAYING') closeKit(); else { closeKit(); gs = 'MENU'; } return true; }
  for (var t = 0; t < _kitTabRects.length; t++) { var tb = _kitTabRects[t]; if (hit(tb, x, y)) { kitTab = tb.tab; GF.sfx('tap'); return true; } }
  if (kitTab === 'reagents') {
    var off = _kitScroll ? _kitScroll.offset : 0;
    var vp = _kitScroll ? _kitScroll.vp : null;
    if (!vp) return true;
    // A button stored in CONTENT space (y from region top) sits on screen at
    // vp.y + storedY - off; only react when the tap is inside the scroll viewport.
    var inVp = (y >= vp.y && y <= vp.y + vp.h);
    if (inVp) {
      for (var u = 0; u < _reagentUpBtns.length; u++) { var ub = _reagentUpBtns[u]; if (hit({ x: ub.x, y: vp.y + ub.y - off, w: ub.w, h: ub.h }, x, y)) { buyReagentUpgrade(ub.id); return true; } }
      for (var e = 0; e < _reagentEquipBtns.length; e++) { var eb = _reagentEquipBtns[e]; if (hit({ x: eb.x, y: vp.y + eb.y - off, w: eb.w, h: eb.h }, x, y)) { toggleEquip(eb.id); return true; } }
    }
    return true; // swallow taps inside the overlay (no pass-through to the board)
  } else {
    for (var c = 0; c < _questClaimBtns.length; c++) { var cb = _questClaimBtns[c]; if (hit(cb, x, y)) { claimQuest(cb.i); return true; } }
    return true;
  }
}

// ── INPUT ──────────────────────────────────────────────────────────────────
function hit(b, x, y) { return b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }

function tubeHit(x, y) {
  var pad = 12 * GF.S;
  for (var i = 0; i < tubeRects.length; i++) {
    var t = tubeRects[i];
    if (!t) continue;
    var lift = (i === sel) ? SEL_LIFT_PX * GF.S : 0;
    if (x >= t.x - pad && x <= t.x + t.w + pad &&
        y >= t.y - lift - pad && y <= t.y + t.h + pad) return i;
  }
  return -1;
}

function onTap(x, y) {
  if (GF.tutorial.active) { if (GF.tutorial.handleClick(x, y)) return; }

  // Lab Kit overlay eats input first (it pauses the game / floats over the menu).
  if (kitOpen) { onKitTap(x, y); return; }

  if (gs === 'MENU') {
    if (hit(_muteBtn, x, y)) { GF.setMusicMuted(GF.toggleMute()); GF.sfx('tap'); return; }
    if (hit(_bonusBtn, x, y)) { claimBonus(); return; }
    if (hit(_menuKitBtn, x, y)) { openKit('reagents'); return; }
    if (hit(_menuEndlessBtn, x, y)) { startEndless(); return; }
    if (hit(_playBtn, x, y)) { startGame(); return; }
    if (hit(_dailyBtn, x, y)) { startDaily(); return; }
    return;
  }
  if (gs === 'DAILYDONE') {
    if (hit(_dailyMenuBtn, x, y)) { toMenu(); return; }
    return;
  }
  if (gs === 'LEVELEND') { if (mode === 'endless') nextEndless(); else nextLevel(); return; }
  if (gs === 'GAMEOVER') {
    if (hit(_retryBtn, x, y)) { retryLevel(); return; }
    if (hit(_gmMenuBtn, x, y)) { toMenu(); return; }
    return;
  }
  if (gs === 'WIN') {
    if (hit(_winEndlessBtn, x, y)) { startEndless(); return; }
    if (hit(_againBtn, x, y)) { startGame(); return; }
    if (hit(_winMenuBtn, x, y)) { toMenu(); return; }
    return;
  }
  if (gs !== 'PLAYING') return;

  // HUD buttons that work even mid-animation (kit pauses, mute toggles).
  if (hit(_hudKitBtn, x, y)) { openKit(claimableQuests() > 0 ? 'quests' : 'reagents'); return; }
  if (hit(_muteBtn, x, y)) { GF.setMusicMuted(GF.toggleMute()); GF.sfx('tap'); return; }
  if (hit(_hudMenuBtn, x, y)) { toMenu(); return; }
  if (hit(_hudHelpBtn, x, y)) { GF.tutorial.reopen(); return; }

  if (anim) return;
  if (hit(_undoBtn, x, y)) { doUndo(); return; }

  var idx = tubeHit(x, y);
  if (idx < 0) { sel = -1; return; }
  if (sel < 0) { if (tubes[idx].length) sel = idx; return; }
  if (idx === sel) { sel = -1; return; }
  if (canPour(sel, idx)) { pour(sel, idx); }
  else { GF.setShake(0.18); sel = -1; }
}

function _cvXY(e) {
  var rect = GF.canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) * (GF.canvas.width / rect.width),
           y: (e.clientY - rect.top) * (GF.canvas.height / rect.height) };
}
// Fire the tap on pointerDOWN (preserves the original click timing every test
// harness + the board logic expect). The Kit reagents grid ALSO supports a
// drag-to-scroll gesture, tracked in parallel; a press that turns into a drag still
// fired its (harmless) onKitTap on the way down.
GF.canvas.addEventListener('pointerdown', function(e) {
  var p = _cvXY(e);
  if (kitOpen && kitTab === 'reagents' && _kitScroll && _kitScroll.contains(p.x, p.y) && _kitScroll.scrollable()) {
    _kitScroll.dragStart(p.y);
  }
  onTap(p.x, p.y);
});
GF.canvas.addEventListener('pointermove', function(e) {
  if (kitOpen && _kitScroll && _kitScroll.isDragging()) _kitScroll.dragMove(_cvXY(e).y);
});
GF.canvas.addEventListener('pointerup', function() {
  if (kitOpen && _kitScroll && _kitScroll.isDragging()) _kitScroll.dragEnd();
});
GF.canvas.addEventListener('pointercancel', function() {
  if (kitOpen && _kitScroll && _kitScroll.isDragging()) _kitScroll.dragEnd();
});
GF.canvas.addEventListener('wheel', function(e) {
  if (kitOpen && kitTab === 'reagents' && _kitScroll && _kitScroll.scrollable()) {
    if (_kitScroll.handleWheel(e.deltaY)) { e.preventDefault(); }
  }
}, { passive: false });

// ── STATE EXPOSURE (runtime gate cross-checks DESIGN.md) ───────────────────
GF.exposeState(function() {
  return {
    gs: gs,
    level: level,
    pours: pours,
    undoLeft: undoLeft,
    stuck: stuck,
    tubes: tubes.length,
    solved: isSolved(),
    impure: boardImpure(),
    sel: sel,
    mode: mode,
    tubesPurified: tubesPurified,
    labRank: rankName(rankIndexFor(tubesPurified)),
    dailyStreak: dailyStreak,
    dailyBest: dailyBest,
    dailyDoneToday: dailyDoneToday,
    bonusClaimedToday: bonusClaimedToday,
    bonusAvailable: bonusAvailable(),
    bonusValueToday: bonusValueToday(),
    bonusValueTomorrow: bonusValueTomorrow(),
    endlessLevel: endlessLevel,
    endlessBest: endlessBest,
    endlessUnlocked: endlessUnlocked(),
    sealedTubes: locked.filter(Boolean).length,
    anyLocked: anyLocked(),
    SEAL_FROM_LEVEL: SEAL_FROM_LEVEL,
    // Reagent Kit (M6) — the playtime-item retention pillar
    flux: flux,
    totalPlayMin: Math.floor(totalPlayMin()),
    reagentsOwned: kit ? Object.keys(kit.reagents).length : 0,
    reagentsEquipped: kit ? kit.equipped.filter(Boolean).length : 0,
    nextReagentMin: (function () { var n = nextReagent(); return n ? n.min : null; }()),
    claimableQuests: claimableQuests(),
    kitOpen: kitOpen,
    POUR_BUDGET: POUR_BUDGET,
    TUBE_CAP: TUBE_CAP,
    START_TUBES: START_TUBES,
    WIN_LEVELS: WIN_LEVELS,
    UNDO_MAX: UNDO_MAX,
    BLEND_PENALTY: BLEND_PENALTY,
  };
});

window._setState = function(s) { gs = s; };
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'sans-serif'; };
// Test-only: expose tube screen-centres so headless tests can tap precisely.
window._tubeCenters = function() {
  computeLayout();
  return tubeRects.map(function(t){ return { x: t.x + t.w / 2, y: t.y + t.h / 2 }; });
};
// Test-only: read-only copy of tube contents (safe to ship; aids QA solvers).
window._tubes = function() { return tubes.map(function(a){ return a.slice(); }); };
// Test-only: read-only copy of seal flags so a headless solver can skip sealed tubes.
window._locked = function() { return locked.slice(); };

// ── REACHABILITY GATE (window.__gfReach / __gfTour) ────────────────────────
// Reports the CURRENT screen's interactive hit-rects so reachability_check.js can
// prove every button is reachable at 393x852 + 1280x720. The KIT reagents grid is a
// scroll region (reports its cells in content space + scrollId so the gate reads
// scrollMaxY); pinned buttons (tabs, resume) are reported in screen space.
function _ri(id, b, pinned) { if (!b) return null; var o = { id: id, x: b.x, y: b.y, w: b.w, h: b.h }; if (pinned) o.pinned = true; return o; }
function _push(arr, it) { if (it) arr.push(it); }
function reachState() {
  var H = GF.H, items = [], res = { screen: kitOpen ? ('KIT_' + kitTab) : gs, items: items, screenH: H, viewportH: H };
  if (kitOpen) {
    // tabs + resume are pinned; on the reagents tab the grid cells scroll.
    for (var t = 0; t < _kitTabRects.length; t++) _push(items, _ri('tab_' + _kitTabRects[t].tab, _kitTabRects[t], true));
    _push(items, _ri('resume', _kitResumeBtn, true));
    if (kitTab === 'reagents' && _kitScroll) {
      res.scrollId = 'reagent_grid';
      res.viewportH = _kitScroll.vp.h || H;
      // grid tiles are already stored in CONTENT space (y from the region top), which
      // is exactly what the gate expects for a scrollable item.
      for (var r = 0; r < _reagentTiles.length; r++) {
        var tl = _reagentTiles[r];
        _push(items, { id: 'reagent_' + tl.id, x: tl.x, y: tl.y, w: tl.w, h: tl.h });
      }
    } else if (kitTab === 'quests') {
      for (var c = 0; c < _questClaimBtns.length; c++) _push(items, _ri('claim_' + _questClaimBtns[c].i, _questClaimBtns[c], true));
    }
    return res;
  }
  if (gs === 'MENU') {
    _push(items, _ri('kit', _menuKitBtn)); _push(items, _ri('mute', _muteBtn));
    _push(items, _ri('play', _playBtn)); _push(items, _ri('daily', _dailyBtn));
    if (_bonusBtn) _push(items, _ri('bonus', _bonusBtn));
    if (_menuEndlessBtn) _push(items, _ri('endless', _menuEndlessBtn));
  } else if (gs === 'PLAYING') {
    _push(items, _ri('menu', _hudMenuBtn)); _push(items, _ri('help', _hudHelpBtn));
    _push(items, _ri('undo', _undoBtn)); _push(items, _ri('kit', _hudKitBtn)); _push(items, _ri('mute', _muteBtn));
  } else if (gs === 'GAMEOVER') {
    _push(items, _ri('retry', _retryBtn)); _push(items, _ri('menu', _gmMenuBtn));
  } else if (gs === 'WIN') {
    _push(items, _ri('endless', _winEndlessBtn)); _push(items, _ri('again', _againBtn)); _push(items, _ri('menu', _winMenuBtn));
  } else if (gs === 'DAILYDONE') {
    _push(items, _ri('menu', _dailyMenuBtn));
  } else if (gs === 'LEVELEND') {
    // tap-anywhere advances; report a full-screen rect so the gate is satisfied.
    _push(items, { id: 'advance', x: 0, y: 0, w: GF.W, h: H });
  }
  return res;
}
// Tour: every screen the gate steps through (each `go` puts the game in that state).
function _ensurePlaying() { if (gs !== 'PLAYING') { window._silent = true; startGame(); window._silent = false; } }
var REACH_TOUR = [
  { name: 'menu',      go: function () { kitOpen = false; GF.tutorial.active = false; gs = 'MENU'; } },
  { name: 'playing',   go: function () { kitOpen = false; GF.tutorial.active = false; _ensurePlaying(); } },
  { name: 'kit_reagents', go: function () { GF.tutorial.active = false; _ensurePlaying(); openKit('reagents'); if (_kitScroll) _kitScroll.scrollTo(0); } },
  { name: 'kit_quests',   go: function () { GF.tutorial.active = false; kitOpen = true; kitTab = 'quests'; maybeRollQuests(); } },
  { name: 'levelend',  go: function () { kitOpen = false; GF.tutorial.active = false; _ensurePlaying(); gs = 'LEVELEND'; } },
  { name: 'gameover',  go: function () { kitOpen = false; GF.tutorial.active = false; _ensurePlaying(); pours = 0; gs = 'GAMEOVER'; } },
  { name: 'win',       go: function () { kitOpen = false; GF.tutorial.active = false; level = WIN_LEVELS; buildLevel(level); gs = 'WIN'; } },
  { name: 'dailydone', go: function () { kitOpen = false; GF.tutorial.active = false; mode = 'daily'; gs = 'DAILYDONE'; } },
];

// ── BALANCE-CURVE BOT (window.__gfBot via GF.exposeBot) ────────────────────
// getActions() lists what's available now; doAction(a) performs one. The bot just
// pours randomly between tubes (the real loop) so progression_trials can sample the
// difficulty/reward curve without a solver.
function botActions() {
  if (gs === 'MENU') return ['start'];
  if (gs === 'LEVELEND') return ['advance'];
  if (gs === 'GAMEOVER') return ['retry'];
  if (gs === 'WIN') return ['again'];
  if (gs !== 'PLAYING' || anim) return [];
  var acts = [];
  for (var s = 0; s < tubes.length; s++)
    for (var d = 0; d < tubes.length; d++)
      if (canPour(s, d)) acts.push('pour_' + s + '_' + d);
  return acts.length ? acts : ['stuck'];
}
function botDo(a) {
  if (a === 'start') { startGame(); return; }
  if (a === 'advance') { if (mode === 'endless') nextEndless(); else nextLevel(); return; }
  if (a === 'retry') { retryLevel(); return; }
  if (a === 'again') { startGame(); return; }
  if (a && a.indexOf('pour_') === 0) {
    var p = a.split('_'); pour(parseInt(p[1], 10), parseInt(p[2], 10));
  }
}

// ── REAGENT KIT test seams (drive equip/upgrade/quest/playtime without grinding) ──
// Force cumulative playtime (minutes) so the reagent ladder can be exercised. No console.
window._setPlay = function (mins) {
  if (!kit) return; kit.totalPlaySec = Math.max(0, (+mins || 0) * 60); runPlaySec = 0;
  checkReagentUnlocks(); saveKit();
};
window._grantFlux = function (n) { grantFlux(+n || 0); };          // grant FLUX (test upgrade paths)
window._winQuest = function (i) {                                  // force-complete daily quest i
  var q = kit && kit.quests && kit.quests[i]; if (!q) return;
  q.prog = q.goal; q.done = true; q.claimed = false; saveKit();
};
window._openKit = function (tab) { openKit(tab || 'reagents'); };  // open the overlay for screenshots
window._hueInfo = function () {
  return {
    gs: gs, mode: mode, kitOpen: kitOpen, kitTab: kitTab,
    flux: flux, totalPlayMin: Math.floor(totalPlayMin()),
    reagents: kit ? kit.reagents : {}, equipped: kit ? kit.equipped.slice() : [],
    nextReagent: (function () { var n = nextReagent(); return n ? { id: n.id, min: n.min } : null; }()),
    quests: (kit && kit.quests) ? kit.quests.map(function (q) { return { kind: q.kind, goal: q.goal, prog: q.prog, done: q.done, claimed: q.claimed, reward: q.reward }; }) : [],
    claimableQuests: claimableQuests(),
    bonusPours: Math.round(reagentVal('pours')), bonusUndo: Math.round(reagentVal('undo')),
    bonusStart: Math.round(reagentVal('start')), bonusFlux: Math.round(reagentVal('flux')), bonusRefund: reagentVal('refund'),
    tiles: _reagentTiles, equipBtns: _reagentEquipBtns, upBtns: _reagentUpBtns, questClaims: _questClaimBtns,
    kitResumeBtn: _kitResumeBtn, kitTabRects: _kitTabRects, hudKitBtn: _hudKitBtn, menuKitBtn: _menuKitBtn,
    // scroll region (so a test can map a content-space button rect to screen px:
    //   screenY = vp.y + contentY - offset). Null when the kit isn't open.
    kitScrollVp: (_kitScroll && kitOpen && kitTab === 'reagents') ? { x: _kitScroll.vp.x, y: _kitScroll.vp.y, w: _kitScroll.vp.w, h: _kitScroll.vp.h, off: _kitScroll.offset } : null,
  };
};

// ── BOOT ────────────────────────────────────────────────────────────────────
GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'hue_sort',
  onReady: function() {
    try { bestLevel = parseInt(localStorage.getItem('hue_sort_best') || '0') || 0; } catch (e) {}
    try { tubesPurified = parseInt(localStorage.getItem('hue_sort_purified') || '0') || 0; } catch (e) {}
    loadDaily();    // restore day-streak + whether today's daily is already solved
    loadBonus();    // restore whether today's daily login bonus is still claimable
    loadEndless();  // restore deepest endless level ever reached (the unlock + best)
    kit = loadKit(); flux = kit.flux;   // Reagent Kit: collection + FLUX + quests
    maybeRollQuests();                  // fresh daily quests if the set is from a past UTC day
    checkReagentUnlocks();              // grant any reagent already earned by past playtime
    // Procedural background-music bed + SFX (the game was silent before M6). 'calm'
    // suits the cozy lab-puzzle vibe; mirror the mute button to GF.setMusicMuted.
    GF.startMusic({ preset: 'calm', muted: GF.muted });
    GF.persist('hue_sort_run_v1',
      function() {
        return { gs: gs, mode: mode, level: level, endlessLevel: endlessLevel,
                 pours: pours, undoLeft: undoLeft,
                 tubes: tubes.map(function(a){ return a.slice(); }),
                 locked: locked.slice() };
      },
      function(s) {
        if (!s) return;
        mode = (s.mode === 'daily') ? 'daily' : (s.mode === 'endless') ? 'endless' : 'campaign';
        level = s.level || 1;
        endlessLevel = (typeof s.endlessLevel === 'number') ? s.endlessLevel : 0;
        pours = (typeof s.pours === 'number') ? s.pours : POUR_BUDGET;
        undoLeft = (typeof s.undoLeft === 'number') ? s.undoLeft : UNDO_MAX;
        if (s.tubes && s.tubes.length) tubes = s.tubes.map(function(a){ return a.slice(); });
        // Restore seal flags; rebuild to all-false if absent or length-mismatched so
        // `locked` is always exactly as long as `tubes` (the canPour guard reads it).
        if (s.locked && s.locked.length === tubes.length) locked = s.locked.slice();
        else clearLocks();
        gs = (s.gs === 'PLAYING' && tubes.length) ? 'PLAYING' : 'MENU';
      }
    );

    GF.tutorial.start([
      { text: GF.t('tut_goal') + ' ' + GF.t('tut_controls'), advance: 'click_any' },
      { text: GF.t('tut_win') + ' ' + GF.t('tut_lose'), advance: 'click_any' },
      { text: GF.t('tut_tip'), advance: 'click_any' },
    ], { storageKey: 'hue_sort_seen_tutorial' });

    // Reachability gate: expose every screen's interactive hit-rects + a screen tour
    // so reachability_check.js can prove all UI is reachable at 393x852 + 1280x720.
    GF.exposeReach(reachState);
    GF.exposeTour(REACH_TOUR);
    // Balance-curve bot steering wheel (progression_trials/probe).
    GF.exposeBot(botActions, botDo);

    // PLATFORM AUTOSTART (CLAUDE.md #9): on Yandex/CrazyGames the player drops STRAIGHT
    // into gameplay (the gallery keeps its menu — it never gets the flag). Suppress the
    // tutorial and start the campaign so gs becomes PLAYING.
    if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU') {
      GF.tutorial.active = false;
      try { localStorage.setItem('hue_sort_seen_tutorial', '1'); } catch (e) {}
      startGame();
    }
  },
  onUpdate: update,
  onDraw: draw,
});

})();
</script>
