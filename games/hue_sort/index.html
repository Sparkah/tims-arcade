var SPRITE_NAMES = [];

// ── TUNABLES ─────────────────────────────────────────────────────────────
var POUR_BUDGET   = 12;    // base pours on level 1 (+2 per level)
var TUBE_CAP      = 4;     // colour-layer slots per tube
var START_TUBES   = 5;     // total tubes level 1 (colours + 2 empties)
var WIN_LEVELS    = 6;     // clear level 6 to win
var UNDO_MAX      = 3;     // undo charges per level
var BLEND_PENALTY = 1;     // extra mixed layers a blend can create
var POUR_ANIM_SEC = 0.34;  // pour animation duration
var SEL_LIFT_PX   = 14;    // px the selected top run lifts

// ── COLOURS ──────────────────────────────────────────────────────────────
// primaries 1=red 2=yellow 3=blue ; mixes 4=orange 5=green 6=purple ; 0=empty
var PRIMARIES = [1, 2, 3];
var COL_HEX = {
  1: '#e8413a', 2: '#f6c531', 3: '#3a78e8',
  4: '#ef8b27', 5: '#3fb86a', 6: '#9b53c9',
};
var COL_HEX_DK = {
  1: '#b32820', 2: '#caa017', 3: '#2152ad',
  4: '#c46410', 5: '#2a8a4c', 6: '#6f3597',
};
// subtractive blend table
function blend(a, b) {
  if (a === b) return a;
  var lo = Math.min(a, b), hi = Math.max(a, b);
  if (lo === 1 && hi === 2) return 4; // red+yellow=orange
  if (lo === 2 && hi === 3) return 5; // yellow+blue=green
  if (lo === 1 && hi === 3) return 6; // red+blue=purple
  return 0;
}
function isPrimary(c) { return c === 1 || c === 2 || c === 3; }
function isMix(c) { return c === 4 || c === 5 || c === 6; }

// ── PERSISTENT META (Lab Rank) ─────────────────────────────────────────────
// The owned, cross-session progression: every PURE tube you ever complete adds
// to a lifetime counter that climbs a named "Lab Rank" ladder. This is the meta
// the player builds and keeps — it persists forever (hue_sort_purified), shows
// on the menu with a progress bar to the next rank, and gives a long-horizon
// goal on top of the 6 campaign levels (the "why come back tomorrow").
var tubesPurified = 0;     // lifetime count of pure tubes completed (persisted)
var RANKS = [
  { at: 0,   name: 'Intern',        nameRu: 'Стажёр' },
  { at: 10,  name: 'Lab Assistant', nameRu: 'Лаборант' },
  { at: 25,  name: 'Chemist',       nameRu: 'Химик' },
  { at: 50,  name: 'Colourist',     nameRu: 'Колорист' },
  { at: 90,  name: 'Hue Master',    nameRu: 'Мастер цвета' },
  { at: 150, name: 'Spectrum Sage', nameRu: 'Мудрец спектра' },
  { at: 240, name: 'Prism Legend',  nameRu: 'Легенда призмы' },
];
function rankIndexFor(n) {
  var idx = 0;
  for (var i = 0; i < RANKS.length; i++) if (n >= RANKS[i].at) idx = i;
  return idx;
}
// Robustly detect the active language without assuming a GF.lang field exists:
// the PLAY string is 'ИГРАТЬ' in RU and 'PLAY' in EN.
function isRu() { try { return GF.t('play') === STRINGS.ru.play; } catch (e) { return false; } }
function rankName(i) {
  var r = RANKS[i] || RANKS[0];
  return isRu() ? r.nameRu : r.name;
}
// Progress {cur,need,frac,maxed} toward the NEXT rank from a lifetime count.
function rankProgress(n) {
  var i = rankIndexFor(n);
  if (i >= RANKS.length - 1) return { cur: n - RANKS[i].at, need: 0, frac: 1, maxed: true };
  var base = RANKS[i].at, next = RANKS[i + 1].at;
  return { cur: n - base, need: next - base, frac: (n - base) / (next - base), maxed: false };
}
// Award purified tubes; persist; celebrate a rank-up. Returns true on rank-up.
function awardPurified(count) {
  if (!count) return false;
  var before = rankIndexFor(tubesPurified);
  tubesPurified += count;
  try { localStorage.setItem('hue_sort_purified', String(tubesPurified)); } catch (e) {}
  var after = rankIndexFor(tubesPurified);
  if (after > before) {
    var c = { x: GF.W / 2, y: GF.H * 0.30 };
    GF.spawnFloat(c.x, c.y, 'RANK UP!', '#ffe27a');
    GF.spawnParticles(c.x, c.y, '#ffe27a', 26);
    GF.happytime();
    return true;
  }
  return false;
}
// Count how many tubes are currently full & pure (used at level-clear).
function countPureTubes() {
  var n = 0;
  for (var i = 0; i < tubes.length; i++) {
    var a = tubes[i];
    if (a.length === TUBE_CAP && isPrimary(a[0])) {
      var pure = true;
      for (var k = 1; k < a.length; k++) if (a[k] !== a[0]) { pure = false; break; }
      if (pure) n++;
    }
  }
  return n;
}

// ── REAGENT KIT — playtime-milestone items + FLUX + daily quests (M6, 2026-06-06) ──
// The DEEP retention pillar (Tim's canonical "free item at 5/15/25 min -> equip ->
// upgrade with daily currency"). Three loops reinforce each other:
//   1. PLAYTIME: 8 REAGENTS unlock on a FIXED cumulative-playtime ladder
//      (5/12/22/35/50/70/95/130 min) — the always-visible "next reagent in N min" goal.
//   2. EQUIP + UPGRADE: each reagent is a passive SORT-LOOP boost; only 3 fit in the
//      equip slots (own more than you can equip = loadout choice), and each upgrades
//      1->5 with FLUX (cost scales). The daily currency feeds the upgrades.
//   3. DAILY QUESTS: 3 fresh quests every UTC day, claim for FLUX — the explicit
//      come-back-TOMORROW hook (cumulative-playtime items reward total time but don't
//      REQUIRE daily return, so they're paired with a daily reset). The daily-login
//      bonus also grants FLUX, so the daily↔playtime↔upgrade triangle is the engine.
// Icons are VECTOR-drawn (drawReagentIcon) — never emoji (tofu in the game font).
var REAGENT_MAX_LVL = 5;
var REAGENT_SLOTS = 3;
// stat: 'pours' +N pour budget | 'undo' +N undo charges | 'start' N tubes pre-poured
// pure at board build | 'refund' chance to refund a blended pour | 'flux' bonus flux
// per pure tube completed. per = value added PER LEVEL.
var REAGENT_DEFS = [
  { id: 'pipette', min: 5,   col: '#5fd0ff', stat: 'pours',  per: 1,    en: 'Spare Pipette',  ru: 'Пипетка' },
  { id: 'ledger',  min: 12,  col: '#9fe8b5', stat: 'flux',   per: 1,    en: 'Flux Ledger',    ru: 'Журнал флюкса' },
  { id: 'clamp',   min: 22,  col: '#ffd24a', stat: 'undo',   per: 1,    en: 'Reset Clamp',    ru: 'Зажим сброса' },
  { id: 'primer',  min: 35,  col: '#ff9c8e', stat: 'start',  per: 1,    en: 'Base Primer',    ru: 'Праймер' },
  { id: 'sieve',   min: 50,  col: '#c77dff', stat: 'refund', per: 0.10, en: 'Mix Sieve',      ru: 'Сито смеси' },
  { id: 'beaker',  min: 70,  col: '#7ed957', stat: 'pours',  per: 2,    en: 'Wide Beaker',    ru: 'Колба' },
  { id: 'catalyst',min: 95,  col: '#e8985e', stat: 'flux',   per: 2,    en: 'Catalyst Vial',  ru: 'Катализатор' },
  { id: 'prism',   min: 130, col: '#9d7bff', stat: 'start',  per: 2,    en: 'Master Prism',   ru: 'Мастер-призма' },
];
var REAGENT_BY_ID = {};
for (var _rdi = 0; _rdi < REAGENT_DEFS.length; _rdi++) REAGENT_BY_ID[REAGENT_DEFS[_rdi].id] = REAGENT_DEFS[_rdi];

// Reagent Kit persisted state (its OWN key so it never collides with the run save or
// the older meta keys). Loaded in onReady.
var kit = null;
var flux = 0;                 // FLUX currency (mirrored into kit.flux on save)
var runPlaySec = 0;           // seconds played in the CURRENT run (folded into kit.totalPlaySec on level-end / game-over — NOT per frame)
var reagentToast = null;      // { def, t } — NEW REAGENT flourish on a playtime unlock
var questToast = null;        // { q, t } — QUEST DONE flourish
var kitOpen = false;          // is the Lab Kit overlay showing (pauses play)?
var kitTab = 'reagents';      // 'reagents' | 'quests'

function defaultKit() {
  return {
    totalPlaySec: 0,          // cumulative playtime (drives reagent unlocks)
    flux: 0,                  // soft currency (upgrades)
    reagents: {},             // id -> { lvl }
    equipped: [null, null, null],
    questDay: '',             // UTC day the active quest set was rolled for
    quests: [],               // [{kind, goal, prog, done, claimed, reward}]
  };
}
function loadKit() {
  var k = defaultKit();
  try {
    var raw = localStorage.getItem('hue_sort_kit');
    if (raw) {
      var s = JSON.parse(raw);
      if (s && typeof s === 'object') {
        k.totalPlaySec = Math.max(0, +s.totalPlaySec || 0);
        k.flux = Math.max(0, +s.flux || 0);
        k.questDay = s.questDay || '';
        k.quests = Array.isArray(s.quests) ? s.quests : [];
        if (s.reagents && typeof s.reagents === 'object') {
          for (var rid in s.reagents) {
            if (s.reagents.hasOwnProperty(rid) && REAGENT_BY_ID[rid]) {
              var lv = +(s.reagents[rid] && s.reagents[rid].lvl) || 1;
              k.reagents[rid] = { lvl: GF.clamp(lv, 1, REAGENT_MAX_LVL) };
            }
          }
        }
        if (Array.isArray(s.equipped)) {
          for (var si = 0; si < REAGENT_SLOTS; si++) {
            var eid = s.equipped[si];
            k.equipped[si] = (eid && k.reagents[eid]) ? eid : null;
          }
        }
      }
    }
  } catch (e) {}
  return k;
}
function saveKit() {
  if (!kit) return;
  kit.flux = flux;
  try { localStorage.setItem('hue_sort_kit', JSON.stringify(kit)); } catch (e) {}
}
// Flush deferred kit state when the tab hides/closes (Build Hygiene #2 — never per frame).
window.addEventListener('pagehide', function () { try { foldRunPlay(); saveKit(); } catch (e) {} });
document.addEventListener('visibilitychange', function () { if (document.hidden) { try { foldRunPlay(); saveKit(); } catch (e) {} } });

// live cumulative playtime (persisted + the in-progress run)
function totalPlaySec() { return (kit ? kit.totalPlaySec : 0) + runPlaySec; }
function totalPlayMin() { return totalPlaySec() / 60; }
// Bank the in-progress run's playtime into the persisted total (called on level-end /
// game-over / hide). Idempotent-ish: zeroes runPlaySec after folding.
function foldRunPlay() {
  if (!kit || runPlaySec <= 0) return;
  kit.totalPlaySec += runPlaySec;
  runPlaySec = 0;
}
// summed bonus across EQUIPPED reagents whose stat matches (per × level)
function reagentVal(stat) {
  if (!kit) return 0;
  var v = 0;
  for (var i = 0; i < kit.equipped.length; i++) {
    var id = kit.equipped[i]; if (!id) continue;
    var def = REAGENT_BY_ID[id], c = kit.reagents[id];
    if (def && c && def.stat === stat) v += def.per * c.lvl;
  }
  return v;
}
function reagentName(def) { return (isRu() ? def.ru : def.en) || def.en; }
function reagentStatLabel(stat) {
  switch (stat) {
    case 'pours':  return GF.t('rg_pours');
    case 'undo':   return GF.t('rg_undo');
    case 'start':  return GF.t('rg_start');
    case 'refund': return GF.t('rg_refund');
    case 'flux':   return GF.t('rg_flux');
  }
  return '';
}
// human-readable bonus for a reagent at a given level (value = per × level)
function reagentBonusText(def, lvl) {
  var v = def.per * lvl;
  var vs = (def.stat === 'refund') ? (Math.round(v * 100) + '%') : ('+' + v);
  return vs + ' ' + reagentStatLabel(def.stat);
}
// the next not-yet-owned reagent on the ladder (the visible goal), or null if all owned
function nextReagent() {
  if (!kit) return null;
  for (var i = 0; i < REAGENT_DEFS.length; i++) {
    if (!kit.reagents[REAGENT_DEFS[i].id]) return REAGENT_DEFS[i];
  }
  return null;
}
// grant any reagent whose playtime milestone has been crossed; auto-equip the first
// few into free slots so the boost is felt immediately. Returns newly-granted defs.
function checkReagentUnlocks() {
  if (!kit) return [];
  var mins = totalPlayMin(), granted = [];
  for (var i = 0; i < REAGENT_DEFS.length; i++) {
    var d = REAGENT_DEFS[i];
    if (mins >= d.min && !kit.reagents[d.id]) {
      kit.reagents[d.id] = { lvl: 1 };
      for (var s = 0; s < kit.equipped.length; s++) { if (!kit.equipped[s]) { kit.equipped[s] = d.id; break; } }
      granted.push(d);
    }
  }
  if (granted.length) { saveKit(); reagentToast = { def: granted[granted.length - 1], t: 3.6 }; GF.sfx('unlock'); }
  return granted;
}
// FLUX cost to upgrade a reagent to its next level (Infinity if maxed / unowned)
function reagentUpCost(id) {
  var c = kit && kit.reagents[id]; if (!c) return Infinity;
  if (c.lvl >= REAGENT_MAX_LVL) return Infinity;
  var def = REAGENT_BY_ID[id];
  return Math.round((20 + def.min * 0.5) * Math.pow(1.55, c.lvl - 1));
}
function buyReagentUpgrade(id) {
  var cost = reagentUpCost(id);
  if (!kit || !isFinite(cost) || flux < cost) { GF.setShake(0.16); return false; }
  flux -= cost; kit.reagents[id].lvl += 1; saveKit(); GF.sfx('coin');
  return true;
}
// equip toggle: equipped → unequip; else drop into first free slot (no-op if full)
function toggleEquip(id) {
  if (!kit || !kit.reagents[id]) return false;
  var at = kit.equipped.indexOf(id);
  if (at >= 0) { kit.equipped[at] = null; saveKit(); GF.sfx('tap'); return true; }
  for (var s = 0; s < kit.equipped.length; s++) { if (!kit.equipped[s]) { kit.equipped[s] = id; saveKit(); GF.sfx('tap'); return true; } }
  GF.setShake(0.14); return false; // slots full — unequip one first
}
function grantFlux(n) { if (kit && n > 0) { flux += n; saveKit(); } }

// ── DAILY QUESTS — the come-back-TOMORROW hook (resets every UTC day) ───────
// kind: pure (purify tubes) | solve (clear boards) | blend (make blends) |
// play (minutes played) | daily (solve today's Daily Challenge).
var QUEST_DEFS = [
  { kind: 'pure',  goals: [8, 14, 22],  reward: [12, 20, 30], key: 'q_pure' },
  { kind: 'solve', goals: [2, 4, 6],    reward: [14, 24, 36], key: 'q_solve' },
  { kind: 'blend', goals: [4, 8, 14],   reward: [10, 18, 28], key: 'q_blend' },
  { kind: 'play',  goals: [3, 6, 10],   reward: [12, 20, 30], key: 'q_play' },
  { kind: 'daily', goals: [1, 1, 1],    reward: [18, 18, 18], key: 'q_daily' },
];
var QUEST_BY_KIND = {};
for (var _qi = 0; _qi < QUEST_DEFS.length; _qi++) QUEST_BY_KIND[QUEST_DEFS[_qi].kind] = QUEST_DEFS[_qi];
function questLabel(q) {
  var d = QUEST_BY_KIND[q.kind]; if (!d) return '';
  return GF.t(d.key).replace('{g}', q.goal);
}
// roll 3 fresh quests if the stored set is from a previous UTC day (or missing)
function maybeRollQuests() {
  if (!kit) return;
  var today = todayKey();
  if (kit.questDay === today && Array.isArray(kit.quests) && kit.quests.length) return;
  kit.questDay = today;
  var pool = QUEST_DEFS.slice(), picked = [];
  for (var n = 0; n < 3 && pool.length; n++) {
    var idx = Math.floor(Math.random() * pool.length);
    var d = pool.splice(idx, 1)[0];
    var tier = Math.floor(Math.random() * d.goals.length);
    picked.push({ kind: d.kind, goal: d.goals[tier], prog: 0, done: false, claimed: false, reward: d.reward[tier] });
  }
  kit.quests = picked;
  saveKit();
}
// advance any active quest of this kind ('play' tracks cumulative minutes; others accumulate)
function questProgress(kind, amount) {
  if (!kit || !Array.isArray(kit.quests)) return;
  var changed = false;
  for (var i = 0; i < kit.quests.length; i++) {
    var q = kit.quests[i];
    if (q.kind !== kind || q.done) continue;
    q.prog += amount;
    if (q.prog >= q.goal) { q.prog = q.goal; q.done = true; questToast = { q: q, t: 3.4 }; GF.happytime(); }
    changed = true;
  }
  if (changed) saveKit();
}
function claimQuest(i) {
  var q = kit && kit.quests && kit.quests[i];
  if (!q || !q.done || q.claimed) return false;
  q.claimed = true; grantFlux(q.reward); GF.sfx('reward'); return true;
}
function claimableQuests() {
  if (!kit || !Array.isArray(kit.quests)) return 0;
  var n = 0; for (var i = 0; i < kit.quests.length; i++) if (kit.quests[i].done && !kit.quests[i].claimed) n++;
  return n;
}
// hours until the daily quest reset (UTC midnight) — shown in the Quests tab
function hoursToReset() { var d = new Date(); return 24 - (d.getUTCHours() + d.getUTCMinutes() / 60); }

// ── REAGENT EFFECTS folded into the sort loop ──────────────────────────────
// Called by every board builder AFTER it sets `pours`/`undoLeft`/`tubes`, so the
// equipped reagents passively boost the run. Additive only — a board with no
// reagents equipped behaves exactly as before.
//   pours  → extra pour budget
//   undo   → extra undo charges
//   start  → that many random impure tubes are auto-solved at deal (a free head start)
function applyReagentBonuses() {
  if (!kit) return;
  pours += Math.round(reagentVal('pours'));
  undoLeft += Math.round(reagentVal('undo'));
  var headStart = Math.round(reagentVal('start'));
  for (var h = 0; h < headStart; h++) seedOnePureTube();
}
// Pre-solve ONE tube: pick the colour with the most layers on the board and gather a
// full pure stack of it into a single tube, pulling its layers out of the others. A
// gentle head start (the 'start' reagent) that never makes a board unsolvable (it only
// CONCENTRATES an existing colour into a pure column — the same end state a solve reaches).
function seedOnePureTube() {
  // tally how many layers of each primary exist and whether a tube is already pure-full
  var counts = { 1: 0, 2: 0, 3: 0 };
  for (var i = 0; i < tubes.length; i++)
    for (var k = 0; k < tubes[i].length; k++) { var c = tubes[i][k]; if (isPrimary(c)) counts[c]++; }
  // choose a colour that has a full TUBE_CAP worth available and isn't already pure-full
  var pick = 0;
  for (var ci = 0; ci < PRIMARIES.length; ci++) {
    var col = PRIMARIES[ci];
    if (counts[col] < TUBE_CAP) continue;
    var already = false;
    for (var t2 = 0; t2 < tubes.length; t2++) {
      if (tubes[t2].length === TUBE_CAP && tubes[t2][0] === col) {
        var pureT = true; for (var z = 1; z < TUBE_CAP; z++) if (tubes[t2][z] !== col) { pureT = false; break; }
        if (pureT) { already = true; break; }
      }
    }
    if (!already) { pick = col; break; }
  }
  if (!pick) return;
  // find a destination tube (prefer an empty one) and fill it with `pick`, removing
  // `pick` layers from the OTHER tubes (top-down) until the dest holds a pure column.
  // Never target a SEALED tube (it's corked off the board).
  var dest = -1;
  for (var e = 0; e < tubes.length; e++) if (tubes[e].length === 0 && !isLocked(e)) { dest = e; break; }
  if (dest < 0) { for (var d2 = 0; d2 < tubes.length; d2++) { if (!isLocked(d2) && tubes[d2].length && tubes[d2][tubes[d2].length - 1] === pick) { dest = d2; break; } } }
  if (dest < 0) return;
  // pull `pick` layers from other tubes into a scratch list
  var need = TUBE_CAP;
  // keep whatever pick-layers are already in dest
  for (var dk = 0; dk < tubes[dest].length; dk++) if (tubes[dest][dk] === pick) need--;
  // strip non-pick layers OFF dest first (move them to other non-full tubes), so dest can be pure
  for (var src = 0; src < tubes.length && need > 0; src++) {
    if (src === dest) continue;
    for (var p = tubes[src].length - 1; p >= 0 && need > 0; p--) {
      if (tubes[src][p] === pick) { tubes[src].splice(p, 1); need--; }
    }
  }
  // rebuild dest as a pure column of `pick` (drop any stray non-pick layers it held to the
  // first tube with room — rare; only when dest wasn't empty)
  var stray = tubes[dest].filter(function (c) { return c !== pick; });
  tubes[dest] = [];
  for (var f = 0; f < TUBE_CAP; f++) tubes[dest].push(pick);
  for (var sIdx = 0; sIdx < stray.length; sIdx++) {
    for (var rt = 0; rt < tubes.length; rt++) { if (rt !== dest && tubes[rt].length < TUBE_CAP) { tubes[rt].push(stray[sIdx]); break; } }
  }
}

// ── DAILY CHALLENGE + STREAK (retention mechanic, 2026-05-31) ──────────────
// A single deterministic puzzle per calendar day (same for everyone, seeded by
// the UTC date) plus a day-streak counter that rewards returning each day. The
// habit scaffold that pulls the player back daily; it banks its pure tubes into
// the same lifetime Lab-Rank meta, and gives infinite fresh content on top of
// the finite 6-level campaign (directly serving the "build more levels" ask).
var dailyStreak = 0;       // consecutive days the daily was solved (persisted)
var dailyBest = 0;         // longest streak ever (persisted)
var dailyLastDay = '';     // YYYYMMDD of the last day the daily was SOLVED
var dailyDoneToday = false;// solved today's daily already? (derived on load)
var DAILY_LEVEL = 5;       // daily uses a fixed mid-hard difficulty (3 colours)

// UTC day key 'YYYYMMDD' — UTC so the puzzle flips at a single global instant.
function todayKey() {
  var d = new Date();
  var y = d.getUTCFullYear();
  var m = ('0' + (d.getUTCMonth() + 1)).slice(-2);
  var da = ('0' + d.getUTCDate()).slice(-2);
  return '' + y + m + da;
}
// Yesterday's key, for "was the streak consecutive?" checks.
function yesterdayKey() {
  var d = new Date(Date.now() - 86400000);
  var y = d.getUTCFullYear();
  var m = ('0' + (d.getUTCMonth() + 1)).slice(-2);
  var da = ('0' + d.getUTCDate()).slice(-2);
  return '' + y + m + da;
}
function dailySeed() {
  var k = todayKey(), h = 1779033703 ^ k.length;
  for (var i = 0; i < k.length; i++) {
    h = Math.imul(h ^ k.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return (h >>> 0);
}
// mulberry32 — small, fast, deterministic PRNG so the daily board is identical
// for every player on a given day (no Math.random in the daily scramble).
function makeRng(seed) {
  var a = seed >>> 0;
  return function() {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    var t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function loadDaily() {
  try {
    var raw = localStorage.getItem('hue_sort_daily');
    if (raw) {
      var o = JSON.parse(raw);
      dailyStreak = o.streak || 0;
      dailyBest = o.best || 0;
      dailyLastDay = o.lastDay || '';
    }
  } catch (e) {}
  // If the last solved day was neither today nor yesterday, the chain is broken:
  // surface streak 0 until they solve again today (don't mutate stored 'best').
  if (dailyLastDay && dailyLastDay !== todayKey() && dailyLastDay !== yesterdayKey()) {
    dailyStreak = 0;
  }
  dailyDoneToday = (dailyLastDay === todayKey());
}
function saveDaily() {
  try {
    localStorage.setItem('hue_sort_daily', JSON.stringify(
      { streak: dailyStreak, best: dailyBest, lastDay: dailyLastDay }));
  } catch (e) {}
}
// Called once when today's daily is solved: extend or restart the streak.
function recordDailyWin() {
  if (dailyDoneToday) return; // already counted today
  var tk = todayKey();
  dailyStreak = (dailyLastDay === yesterdayKey()) ? (dailyStreak + 1) : 1;
  if (dailyStreak > dailyBest) dailyBest = dailyStreak;
  dailyLastDay = tk;
  dailyDoneToday = true;
  saveDaily();
}

// ── DAILY BONUS — SESSION-END HOOK (retention mechanic #4, 2026-05-31) ──────
// A claimable login bonus that banks PURE TUBES straight into the lifetime
// Lab-Rank meta once per UTC day. The hook is two-sided:
//   • the SESSION-END screens (GAMEOVER / WIN / DAILYDONE) tease it — "a bonus is
//     waiting on the menu" if unclaimed, or PREVIEW TOMORROW'S (bigger) bonus once
//     claimed — so leaving plants a concrete, dated reason to return;
//   • the MENU shows a claimable chest button when a bonus is available; claiming
//     it pours a streak-scaled pile of pure tubes into tubesPurified (compounding
//     with both Lab Rank AND the day-streak the player already grows).
// The reward SCALES with the day-streak (longer streak → bigger daily payout), so
// the streak becomes materially rewarding, not just a number — and the "tomorrow"
// preview is the carrot that arms the next session.
var bonusLastClaim = '';     // YYYYMMDD of the last day the bonus was claimed
var bonusClaimedToday = false; // derived on load — already claimed today?
var BONUS_BASE = 3;          // base pure tubes from the daily bonus
var BONUS_PER_STREAK = 1;    // +1 tube per day of current streak
var BONUS_STREAK_CAP = 12;   // streak contribution caps here (the value, not days)

// Bonus value for a GIVEN streak length (used for both today and the tomorrow
// preview). Streak 0 → base; each streak-day adds 1, capped so it can't blow up.
function bonusValueFor(streak) {
  var boost = Math.min(BONUS_PER_STREAK * Math.max(streak, 0), BONUS_STREAK_CAP);
  return BONUS_BASE + boost;
}
// Today's claimable bonus = scaled by the CURRENT surfaced streak.
function bonusValueToday() { return bonusValueFor(dailyStreak); }
// Tomorrow's preview = assume the streak is +1 (the carrot for returning). If the
// chain would break (no daily solved yet today) the preview is honest: base only,
// but framed as "keep your streak alive".
function bonusValueTomorrow() {
  // If they already solved today's daily, tomorrow can extend the streak by 1;
  // otherwise the streak might reset, so preview the conservative streak+1 value
  // they'd get by keeping the chain — this is the motivating number either way.
  return bonusValueFor(dailyStreak + 1);
}
function loadBonus() {
  try {
    var raw = localStorage.getItem('hue_sort_bonus');
    if (raw) { var o = JSON.parse(raw); bonusLastClaim = o.lastClaim || ''; }
  } catch (e) {}
  bonusClaimedToday = (bonusLastClaim === todayKey());
}
function saveBonus() {
  try { localStorage.setItem('hue_sort_bonus', JSON.stringify({ lastClaim: bonusLastClaim })); } catch (e) {}
}
function bonusAvailable() { return !bonusClaimedToday; }
// Claim today's bonus: pour the streak-scaled pile into the Lab-Rank meta, mark
// the day done, and celebrate. Idempotent per UTC day.
function claimBonus() {
  if (bonusClaimedToday) return false;
  var amt = bonusValueToday();
  bonusLastClaim = todayKey();
  bonusClaimedToday = true;
  saveBonus();
  // Bank into the SAME lifetime counter Lab Rank + the daily already feed (this
  // can itself trigger a RANK UP! via awardPurified's tier check).
  awardPurified(amt);
  // ALSO grant FLUX (the Reagent-Kit currency) so the daily login feeds reagent
  // upgrades — closing the daily↔playtime↔upgrade triangle. Streak-scaled like the
  // pure-tube payout, so a longer streak makes returning materially richer.
  var fluxAmt = 5 + Math.min(dailyStreak * 2, 24);
  grantFlux(fluxAmt);
  var c = { x: GF.W / 2, y: GF.H * 0.30 };
  GF.spawnFloat(c.x, c.y, '+' + amt + ' / +' + fluxAmt + ' ' + GF.t('flux'), '#ffe27a');
  GF.spawnParticles(c.x, c.y, '#ffe27a', 24);
  GF.happytime();
  return true;
}

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';           // MENU | PLAYING | LEVELEND | GAMEOVER | WIN | DAILYDONE
var mode = 'campaign';     // 'campaign' | 'daily' — which loop the player is in
var level = 1;
var bestLevel = 0;
var tubes = [];            // array of arrays (bottom->top), each <= TUBE_CAP
var pours = POUR_BUDGET;
var undoLeft = UNDO_MAX;
var stuck = false;
var sel = -1;              // selected source tube index, -1 = none
var history = [];          // undo snapshots
var anim = null;           // active pour animation
var tubeRects = [];        // computed layout per frame
// SEALED tube flags (Endless in-run mechanic, 2026-06-04): a parallel array, one
// bool per tube. A sealed tube is corked — you can't pour from OR into it — until
// it THAWS, which happens the moment you complete your first pure tube on the
// board (or, as a solvability failsafe, if it's the only thing blocking progress).
// Only Endless boards ever seal a tube; campaign/daily always leave this all-false.
var locked = [];

// ── ENDLESS DEPTH (retention milestone #3 — playtime depth, 2026-06-02) ─────
// The campaign caps at 6 levels (a ~2-minute session). Endless mode is the
// playtime-depth answer to the player's #1 ask ("Build more levels"): after
// clearing the campaign, the player can keep going into procedurally harder
// boards forever. Depth comes NOT from new colours (only 3 primaries exist) but
// from MORE tubes (duplicate colour stacks + extra empties) + deeper scrambles +
// a tighter relative pour budget. Every pure tube still banks into the lifetime
// Lab-Rank meta, so the longer endless run compounds the existing progression —
// the concrete reason the session keeps going past WIN toward the ~15-min target.
var endlessLevel = 0;        // current endless level (1.. ), 0 = not in endless
var endlessBest = 0;         // deepest endless level ever reached (persisted)
var ENDLESS_MAX_FILLED = 7;  // cap on filled colour-tubes so the rack stays sane
var SEAL_FROM_LEVEL = 3;     // endless level a SEALED (corked) tube first appears
// Reset every tube to unsealed (campaign/daily/endless-before-threshold). Keeps the
// `locked` array exactly the same length as `tubes` so the two never desync.
function clearLocks() { locked = tubes.map(function() { return false; }); }
// Is the tube at index i currently sealed?  (cheap, used by the pour-validity guard)
function isLocked(i) { return !!locked[i]; }
// Any sealed tube still on the board?  (drives the one-line in-run hint)
function anyLocked() { for (var i = 0; i < locked.length; i++) if (locked[i]) return true; return false; }
// THAW every sealed tube (called the instant the first pure tube is completed, and
// as a failsafe if a seal is the only thing blocking progress). One-way: once the
// board is unsealed it stays unsealed, with a little pop of feedback per tube.
function thawLocks() {
  for (var i = 0; i < locked.length; i++) {
    if (locked[i]) {
      locked[i] = false;
      var cc = tubeRectCenter(i);
      GF.spawnParticles(cc.x, cc.y, '#9fe8ff', 12);
    }
  }
}
function loadEndless() {
  try { endlessBest = parseInt(localStorage.getItem('hue_sort_endless') || '0') || 0; } catch (e) {}
}
function saveEndlessBest() {
  if (endlessLevel > endlessBest) {
    endlessBest = endlessLevel;
    try { localStorage.setItem('hue_sort_endless', String(endlessBest)); } catch (e) {}
  }
}
// How many FILLED colour-tubes an endless level has: starts at the full 3-colour
// board and adds a duplicate primary stack every 2 endless levels, capped.
function endlessFilledTubes(e) {
  return Math.min(3 + Math.floor((e - 1) / 2), ENDLESS_MAX_FILLED);
}
// Endless pour budget: scarcer than campaign relative to board size — fewer free
// pours per extra tube so deeper boards demand cleaner play (the pressure axis,
// still a moves budget, never a timer).
function poursForEndless(e) {
  var filled = endlessFilledTubes(e);
  return 14 + filled * 3 + Math.floor(e / 3) * 2;
}
// Build an endless board: `filled` full tubes drawn from the 3 primaries (cycling,
// so duplicates appear past 3), 2 empties, scrambled deep with legal inverse pours
// (guaranteed solvable). Additive — does not touch buildLevel / buildDailyLevel.
function buildEndlessLevel(e) {
  var filled = endlessFilledTubes(e);
  var t = [];
  for (var ci = 0; ci < filled; ci++) {
    var col = PRIMARIES[ci % 3];
    t.push([col, col, col, col].slice(0, TUBE_CAP));
  }
  for (var em = 0; em < 2; em++) t.push([]);
  var moves = 10 + filled * 2 + e * 2;   // deeper scramble than campaign
  for (var m = 0; m < moves; m++) scrambleMove(t);
  if (solvedState(t)) { scrambleMove(t); scrambleMove(t); }
  tubes = t;
  pours = poursForEndless(e);
  undoLeft = UNDO_MAX;
  stuck = false;
  sel = -1;
  history = [];
  anim = null;
  clearLocks();
  // From SEAL_FROM_LEVEL on, cork the LAST empty tube. It's sealed off the board
  // until the player completes their first pure tube here — extra space they have
  // to EARN, so deep boards reward purifying early. The board is still solvable
  // without it (scramble used the same 2 empties either way) and detectStuck thaws
  // it as a failsafe, so a seal can never brick a solvable board.
  if (e >= SEAL_FROM_LEVEL && t.length) {
    locked[t.length - 1] = true;   // the last tube is always one of the 2 empties
  }
  applyReagentBonuses();   // equipped reagents passively boost the run (runs after seal so the head-start skips the corked tube)
}

// ── LEVEL GENERATION ───────────────────────────────────────────────────────
function poursForLevel(lvl) { return POUR_BUDGET + (lvl - 1) * 2; }

function buildLevel(lvl) {
  var nColors = 2 + (lvl >= 3 ? 1 : 0); // 2 colours L1-2, 3 from L3 on
  if (nColors > 3) nColors = 3;
  var t = [];
  for (var ci = 0; ci < nColors; ci++) {
    var col = PRIMARIES[ci];
    t.push([col, col, col, col].slice(0, TUBE_CAP));
  }
  for (var e = 0; e < 2; e++) t.push([]);
  var moves = 6 + lvl * 3;
  for (var m = 0; m < moves; m++) scrambleMove(t);
  if (solvedState(t)) { scrambleMove(t); scrambleMove(t); }
  tubes = t;
  pours = poursForLevel(lvl);
  undoLeft = UNDO_MAX;
  stuck = false;
  sel = -1;
  history = [];
  anim = null;
  clearLocks();   // campaign never seals a tube
  applyReagentBonuses();   // equipped reagents passively boost the run (pours/undo/start)
}

function topColor(arr) { return arr.length ? arr[arr.length - 1] : 0; }
function topRunLen(arr) {
  if (!arr.length) return 0;
  var c = arr[arr.length - 1], n = 1;
  for (var i = arr.length - 2; i >= 0; i--) { if (arr[i] === c) n++; else break; }
  return n;
}

// scramble with single-unit moves so the start state is all-primary & solvable.
// Optional `rng` (returns 0..1) makes the scramble deterministic for the daily
// challenge; campaign callers pass nothing and fall back to Math.random.
function scrambleMove(t, rng) {
  var rnd = rng || Math.random;
  var srcs = [];
  for (var i = 0; i < t.length; i++) if (t[i].length > 1) srcs.push(i);
  if (!srcs.length) return;
  var s = srcs[(rnd() * srcs.length) | 0];
  var dsts = [];
  for (var j = 0; j < t.length; j++) if (j !== s && t[j].length < TUBE_CAP) dsts.push(j);
  if (!dsts.length) return;
  var d = dsts[(rnd() * dsts.length) | 0];
  t[d].push(t[s].pop());
}

// Build today's DAILY puzzle: same geometry as a level-5 board (3 colours), but
// scrambled with a date-seeded RNG so every player gets the identical board.
function buildDailyLevel() {
  var lvl = DAILY_LEVEL;
  var rng = makeRng(dailySeed());
  var nColors = 3; // daily is always the full 3-colour board
  var t = [];
  for (var ci = 0; ci < nColors; ci++) {
    var col = PRIMARIES[ci];
    t.push([col, col, col, col].slice(0, TUBE_CAP));
  }
  for (var e = 0; e < 2; e++) t.push([]);
  var moves = 6 + lvl * 3;
  for (var m = 0; m < moves; m++) scrambleMove(t, rng);
  if (solvedState(t)) { scrambleMove(t, rng); scrambleMove(t, rng); }
  tubes = t;
  pours = poursForLevel(lvl);
  undoLeft = UNDO_MAX;
  stuck = false;
  sel = -1;
  history = [];
  anim = null;
  clearLocks();   // daily never seals a tube — same board for everyone, kept simple
  applyReagentBonuses();   // equipped reagents passively boost the run (pours/undo/start)
}

function solvedState(t) {
  for (var i = 0; i < t.length; i++) {
    var a = t[i];
    if (!a.length) continue;
    var c = a[0];
    if (!isPrimary(c)) return false;
    for (var k = 1; k < a.length; k++) if (a[k] !== c) return false;
  }
  return true;
}
function isSolved() { return solvedState(tubes); }
function boardImpure() { return !isSolved(); }

function canPour(s, d) {
  if (s === d || s < 0 || d < 0) return false;
  if (!tubes[s] || !tubes[d]) return false;
  if (isLocked(s) || isLocked(d)) return false; // a sealed tube is corked both ways
  if (!tubes[s].length) return false;
  if (tubes[d].length >= TUBE_CAP) return false;
  return true;
}

// Same legality test but IGNORING seals — used only by the stuck failsafe so a
// sealed tube can never be what bricks an otherwise-solvable board.
function canPourUnsealed(s, d) {
  if (s === d || s < 0 || d < 0) return false;
  if (!tubes[s] || !tubes[d]) return false;
  if (!tubes[s].length) return false;
  if (tubes[d].length >= TUBE_CAP) return false;
  return true;
}

function detectStuck() {
  if (isSolved()) return false;
  for (var s = 0; s < tubes.length; s++)
    for (var d = 0; d < tubes.length; d++)
      if (canPour(s, d)) return false;
  // No legal pour with seals on. Before declaring GAMEOVER, FAILSAFE: if unsealing
  // would open a legal pour, the seal was the only blocker — thaw it (never let a
  // cork brick a solvable board) and report not-stuck.
  if (anyLocked()) {
    for (var s2 = 0; s2 < tubes.length; s2++)
      for (var d2 = 0; d2 < tubes.length; d2++)
        if (canPourUnsealed(s2, d2)) { thawLocks(); return false; }
  }
  return true;
}

// ── POUR LOGIC ───────────────────────────────────────────────────────────
function snapshot() {
  return { tubes: tubes.map(function(a){ return a.slice(); }), pours: pours, locked: locked.slice() };
}
function pushHistory() {
  history.push(snapshot());
  if (history.length > 40) history.shift();
}

function doUndo() {
  if (anim) return;
  if (undoLeft <= 0 || !history.length) { GF.setShake(0.2); return; }
  var snap = history.pop();
  tubes = snap.tubes.map(function(a){ return a.slice(); });
  pours = snap.pours;
  if (snap.locked && snap.locked.length === tubes.length) locked = snap.locked.slice();
  undoLeft--;
  sel = -1;
  stuck = false;
  GF.saveRun();
}

function pour(s, d) {
  if (!canPour(s, d) || anim) return false;
  pushHistory();
  pours--;

  var srcTop = topColor(tubes[s]);
  var dstTop = topColor(tubes[d]);
  var space = TUBE_CAP - tubes[d].length;
  var runLen = topRunLen(tubes[s]);
  var moveN = Math.min(runLen, space);

  var resultColor, blended = false;
  if (tubes[d].length === 0 || dstTop === srcTop) {
    resultColor = srcTop;
  } else if (isPrimary(srcTop) && isPrimary(dstTop)) {
    resultColor = blend(srcTop, dstTop);
    blended = true;
    moveN = 1;
  } else {
    resultColor = srcTop;
  }

  // Reagent 'refund': a blended pour has a chance to refund the spent pour (the Mix
  // Sieve softens the budget cost of blends). Quest: every blend advances 'blend'.
  if (blended) {
    questProgress('blend', 1);
    var refundChance = reagentVal('refund');
    if (refundChance > 0 && Math.random() < refundChance) {
      pours++;   // give the pour back
      var rc = tubeRectCenter(d);
      GF.spawnFloat(rc.x, rc.y - 78 * GF.S, '+1', '#9fe8b5');
      GF.sfx('tap');
    }
  }

  anim = {
    from: s, to: d, color: blended ? resultColor : srcTop,
    t: 0, moveN: moveN, blended: blended, resultColor: resultColor, dstTop: dstTop,
  };
  return true;
}

function applyPour() {
  var a = anim; if (!a) return;
  var s = a.from, d = a.to;
  if (a.blended) {
    tubes[s].pop();
    tubes[d][tubes[d].length - 1] = a.resultColor;
    var cc = tubeRectCenter(d);
    GF.spawnFloat(cc.x, cc.y - 60 * GF.S, '+MIX', COL_HEX[a.resultColor]);
    GF.setShake(0.35);
    GF.spawnParticles(cc.x, cc.y, COL_HEX[a.resultColor], 18);
  } else {
    for (var i = 0; i < a.moveN; i++) tubes[d].push(tubes[s].pop());
    var cc2 = tubeRectCenter(d);
    GF.spawnParticles(cc2.x, cc2.y - 40 * GF.S, COL_HEX[a.color], 10);
    GF.sfx('tap');
    if (tubes[d].length === TUBE_CAP && topRunLen(tubes[d]) === TUBE_CAP && isPrimary(topColor(tubes[d]))) {
      GF.spawnFloat(cc2.x, cc2.y - 60 * GF.S, 'PURE!', COL_HEX[topColor(tubes[d])]);
      GF.sfx('levelup');
      // Completing a pure tube grants FLUX (base 1 + the 'flux' reagent bonus) and
      // advances the 'pure' daily quest — the per-tube currency drip that feeds upgrades.
      var fluxGain = 1 + Math.round(reagentVal('flux'));
      grantFlux(fluxGain);
      GF.spawnFloat(cc2.x, cc2.y - 84 * GF.S, '+' + fluxGain + ' ' + GF.t('flux'), '#9fe8ff');
      questProgress('pure', 1);
      // Completing a pure tube THAWS any sealed tube on the board — the reward for
      // purifying early is the corked tube's extra space opening up for you.
      if (anyLocked()) thawLocks();
    }
  }
  anim = null;
  sel = -1;
  GF.saveRun();
  evaluate();
}

function evaluate() {
  if (isSolved()) {
    // Persistent meta: bank every pure tube from this solved board into the
    // lifetime Lab-Rank counter (the owned, cross-session progression).
    awardPurified(countPureTubes());
    // Reagent Kit: a solved board advances the 'solve' quest, banks the run's
    // playtime toward reagent unlocks, and checks for any newly-crossed milestone.
    questProgress('solve', 1);
    foldRunPlay();
    checkReagentUnlocks();
    if (mode === 'daily') {
      // Daily challenge solved → extend the day-streak and show the daily-done
      // screen (don't touch campaign bestLevel / WIN flow).
      recordDailyWin();
      questProgress('daily', 1);   // the 'daily' quest completes on solving today's Daily
      gs = 'DAILYDONE';
      GF.gameEnded();
      GF.happytime();
      GF.saveRun();
      return;
    }
    if (mode === 'endless') {
      // Endless board solved → bank the new depth and roll straight into the next
      // (harder) endless level via the brief LEVELEND beat. No WIN ceiling here:
      // the run continues as long as the player keeps clearing boards.
      saveEndlessBest();
      gs = 'LEVELEND';
      GF.happytime();
      GF.saveRun();
      return;
    }
    if (level > bestLevel) { bestLevel = level; try { localStorage.setItem('hue_sort_best', bestLevel); } catch (e) {} }
    if (level >= WIN_LEVELS) { gs = 'WIN'; GF.gameEnded(); GF.happytime(); }
    else { gs = 'LEVELEND'; }
    GF.saveRun();
    return;
  }
  stuck = detectStuck();
  if (pours <= 0 || stuck) {
    // Bank the run's playtime toward reagent unlocks even on a loss (playtime is
    // playtime), then check for any newly-crossed milestone.
    foldRunPlay();
    checkReagentUnlocks();
    gs = 'GAMEOVER';
    GF.gameEnded();
    GF.saveRun();
    GF.sfx('lose');
  }
}

// ── LIFECYCLE ──────────────────────────────────────────────────────────────
function startGame() {

}
function startDaily() {

}

function startEndless() {

function retryLevel() {

  if (mode === 'daily') buildDailyLevel();

window._jumpLevel = function(n) {

// Test-only: jump straight into an endless level n (drives the sealed-tube path

window._jumpEndless = function(n) {

window._setupForScreenshot = function(lvl) {

  GF.tutorial.active = false;

  // inject one mix layer on top of a primary to show the blend mechanic mid-play
  for (var i = 0; i < tubes.length; i++) {
    if (tubes[i].length && tubes[i].length < TUBE_CAP && isPrimary(topColor(tubes[i]))) {
      tubes[i].push(5); break;
    }
  }

};

// ── LAYOUT ─────────────────────────────────────────────────────────────────
function computeLayout() {
  tubeRects = [];
  var n = tubes.length;
  if (!n) return;
  var W = GF.W, H = GF.H;
  var topPad = H * 0.155;
  var botPad = H * 0.07;
  var avail = H - topPad - botPad;

  // Lay the rack out as a compact grid. Keep at most 4 tubes per row so they
  // stay finger-sized in portrait; 5-7 tubes wrap to two rows. This gives a
  // "rack" shape instead of an over-wide single row that clips at the edges.
  var pr;
  if (n <= 4) pr = n;
  else if (n <= 6) pr = Math.ceil(n / 2);
  else pr = Math.ceil(n / 2);
  pr = Math.min(pr, 4);
  var rows = Math.ceil(n / pr);
  var rowGap = avail * 0.08;
  var hLimited = (avail - (rows - 1) * rowGap) / rows;
  // width-limited: pr*tubeW + (pr-1)*0.55*tubeW <= 0.92W
  var maxTubeW = (W * 0.92) / (pr + 0.55 * (pr - 1));
  var wLimitedH = maxTubeW / 0.30;
  var tubeH = GF.clamp(Math.min(hLimited, wLimitedH), 90, 320);
  var tubeW = tubeH * 0.30;
  var gapX = tubeW * 0.55;
  var totalRowsH = rows * tubeH + (rows - 1) * rowGap;
  var startY = topPad + (avail - totalRowsH) / 2;
  if (startY < topPad) startY = topPad;

  for (var r = 0; r < rows; r++) {
    var inRow = Math.min(pr, n - r * pr);
    var totalW = inRow * tubeW + (inRow - 1) * gapX;
    var startX = (W - totalW) / 2;
    for (var k = 0; k < inRow; k++) {
      var idx = r * pr + k;
      var x = startX + k * (tubeW + gapX);
      var y = startY + r * (tubeH + rowGap);
      tubeRects[idx] = { x: x, y: y, w: tubeW, h: tubeH };
    }
  }
}
function tubeRectCenter(i) {
  var t = tubeRects[i] || { x: GF.cx, y: GF.cy, w: 40, h: 100 };
  return { x: t.x + t.w / 2, y: t.y + t.h / 2 };
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
var _playMinAcc = 0;   // fractional-minute accumulator for the 'play N minutes' quest
function update(dt) {
  GF.tutorial.update(dt);
  if (gs === 'PLAYING' || gs === 'LEVELEND' || gs === 'GAMEOVER' || gs === 'WIN' || gs === 'DAILYDONE') computeLayout();
  // Accrue cumulative playtime ONLY while actively playing and not paused on the Kit
  // overlay. Drives the reagent ladder + the 'play' daily quest. (Banked into
  // kit.totalPlaySec on level-end/game-over — never written to storage per frame.)
  if (gs === 'PLAYING' && !kitOpen && !GF.tutorial.active) {
    runPlaySec += dt;
    _playMinAcc += dt;
    while (_playMinAcc >= 60) { _playMinAcc -= 60; questProgress('play', 1); }
    // cheap live unlock check so a milestone crossed mid-run pops immediately
    if (kit) { var nx = nextReagent(); if (nx && totalPlayMin() >= nx.min) checkReagentUnlocks(); }
  }
  // decay the unlock / quest toasts
  if (reagentToast) { reagentToast.t -= dt; if (reagentToast.t <= 0) reagentToast = null; }
  if (questToast)   { questToast.t   -= dt; if (questToast.t   <= 0) questToast = null; }
  if (anim) {
    anim.t += dt / POUR_ANIM_SEC;
    if (anim.t >= 1) applyPour();
  }
}

// ── DRAW ──────────────────────────────────────────────────────────────────
var _playBtn = null, _retryBtn = null, _againBtn = null, _dailyBtn = null;
var _hudMenuBtn = null, _hudHelpBtn = null, _undoBtn = null, _gmMenuBtn = null, _winMenuBtn = null;
var _dailyMenuBtn = null, _bonusBtn = null, _winEndlessBtn = null, _menuEndlessBtn = null;
var _bonusPulse = 0; // cosmetic pulse phase for the claimable chest
// Reagent Kit UI hit-rects (recomputed each frame they draw)
var _hudKitBtn = null, _muteBtn = null, _menuKitBtn = null, _kitResumeBtn = null;
var _kitTabRects = [];      // [{tab,x,y,w,h}]
var _reagentTiles = [];     // [{id,x,y,w,h}] in the reagents grid
var _reagentEquipBtns = []; // [{id,x,y,w,h}]
var _reagentUpBtns = [];    // [{id,x,y,w,h}]
var _questClaimBtns = [];   // [{i,x,y,w,h}]
var _kitScroll = null;      // GF.makeScroll controller for the reagents grid

function draw(ctx) {
  drawBg(ctx);
  if (gs === 'PLAYING' || gs === 'LEVELEND' || gs === 'GAMEOVER' || gs === 'WIN' || gs === 'DAILYDONE') {
    if (!tubeRects.length) computeLayout();
    drawBoard(ctx);
    drawHUD(ctx);
    if (gs === 'PLAYING' && anyLocked()) drawSealedHint(ctx);
  }
  if (gs === 'MENU')      drawMenu(ctx);
  if (gs === 'LEVELEND')  drawLevelEnd(ctx);
  if (gs === 'GAMEOVER')  drawGameOver(ctx);
  if (gs === 'WIN')       drawWin(ctx);
  if (gs === 'DAILYDONE') drawDailyDone(ctx);
  // Lab Kit overlay (REAGENTS + QUESTS) sits above everything — reachable from the
  // MENU and mid-run (it pauses play). Drawn last so it covers the board/menu.
  if (kitOpen) drawKitOverlay(ctx);
  drawToasts(ctx);   // NEW REAGENT / QUEST DONE flourishes
  GF.tutorial.draw(ctx);
}

function drawBg(ctx) {
  var g = ctx.createLinearGradient(0, 0, 0, GF.H);
  g.addColorStop(0, '#10162a');
  g.addColorStop(0.55, '#0c1120');
  g.addColorStop(1, '#070a14');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, GF.W, GF.H);
  ctx.strokeStyle = 'rgba(120,150,200,0.08)';
  ctx.lineWidth = 2;
  var by = GF.H * 0.88;
  ctx.beginPath(); ctx.moveTo(0, by); ctx.lineTo(GF.W, by); ctx.stroke();
}

function drawBoard(ctx) {
  var S = GF.S;
  for (var i = 0; i < tubes.length; i++) {
    var t = tubeRects[i];
    if (!t) continue;
    var lifted = (i === sel) ? SEL_LIFT_PX * S : 0;
    drawTube(ctx, i, t.x, t.y - lifted, t.w, t.h, i === sel);
  }
  if (anim) drawPourStream(ctx);
}

function drawTube(ctx, idx, x, y, w, h, selected) {
  var S = GF.S;
  var arr = tubes[idx];
  var r = w * 0.5;
  ctx.save();
  GF.rr(ctx, x, y, w, h, r);
  ctx.fillStyle = 'rgba(200,225,255,0.06)';
  ctx.fill();
  ctx.save();
  GF.rr(ctx, x + 2, y + 2, w - 4, h - 4, r);
  ctx.clip();
  var layerH = (h - 4) / TUBE_CAP;
  for (var li = 0; li < arr.length; li++) {
    var col = arr[li];
    var ly = y + h - 2 - (li + 1) * layerH;
    var lh = layerH + 1;
    var grad = ctx.createLinearGradient(x, ly, x, ly + lh);
    grad.addColorStop(0, COL_HEX[col]);
    grad.addColorStop(1, COL_HEX_DK[col]);
    ctx.fillStyle = grad;
    ctx.fillRect(x + 2, ly, w - 4, lh);
    if (li === arr.length - 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(x + 2, ly, w - 4, Math.max(3 * S, 3));
    }
  }
  ctx.restore();
  GF.rr(ctx, x, y, w, h, r);
  ctx.lineWidth = Math.max(2.5 * S, 2);
  // A sealed tube reads as frosted ice-blue so it's obviously "not yet usable".
  ctx.strokeStyle = isLocked(idx) ? '#79c8ff' : (selected ? '#ffe27a' : 'rgba(190,215,255,0.45)');
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.fillRect(x + w * 0.18, y + h * 0.08, w * 0.12, h * 0.8);
  if (isLocked(idx)) drawSeal(ctx, x, y, w, h);
  ctx.restore();
}

// Draw the SEALED-tube indicator: a frost veil over the glass + a padlock badge at
// the mouth, so the corked tube is unmistakable at a glance (no text needed).
function drawSeal(ctx, x, y, w, h) {
  var S = GF.S, r = w * 0.5;
  // frost veil
  GF.rr(ctx, x, y, w, h, r);
  ctx.fillStyle = 'rgba(150,205,255,0.16)';
  ctx.fill();
  // padlock badge centred near the tube mouth
  var bx = x + w / 2, by = y + h * 0.30;
  var pw = Math.max(w * 0.42, 12), ph = pw * 0.78;
  // shackle
  ctx.lineWidth = Math.max(2.4 * S, 1.8);
  ctx.strokeStyle = '#cfeaff';
  ctx.beginPath();
  ctx.arc(bx, by - ph * 0.22, pw * 0.26, Math.PI, 0);
  ctx.stroke();
  // body
  GF.rr(ctx, bx - pw / 2, by, pw, ph, Math.max(3 * S, 2));
  ctx.fillStyle = '#3a78e8';
  ctx.fill();
  ctx.lineWidth = Math.max(1.4 * S, 1);
  ctx.strokeStyle = '#cfeaff';
  ctx.stroke();
  // keyhole
  ctx.fillStyle = '#cfeaff';
  ctx.beginPath();
  ctx.arc(bx, by + ph * 0.42, Math.max(pw * 0.10, 1.6), 0, Math.PI * 2);
  ctx.fill();
}

function drawPourStream(ctx) {
  var a = anim;
  var sr = tubeRects[a.from], dr = tubeRects[a.to];
  if (!sr || !dr) return;
  var sx = sr.x + sr.w / 2, sy = sr.y;
  var dx = dr.x + dr.w / 2, dy = dr.y;
  // Ease-in on the stream progress so the droplets accelerate as they fall, like
  // real liquid (the player asked to "improve animation"); cosmetic only, no logic.
  var p = a.t * a.t * (3 - 2 * a.t); // smoothstep
  var col = COL_HEX[a.color];
  ctx.save();
  ctx.globalAlpha = 0.9;
  for (var k = 0; k < 6; k++) {
    var tt = GF.clamp(p * 1.4 - k * 0.08, 0, 1);
    var px = GF.lerp(sx, dx, tt);
    var py = GF.lerp(sy, dy, tt) - Math.sin(tt * Math.PI) * (40 * GF.S);
    var rad = (3 + (5 - k)) * GF.S * (1 - tt * 0.3);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(px, py, Math.max(rad, 2), 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawHUD(ctx) {
  var S = GF.S, W = GF.W;
  var pad = GF.clamp(12 * S, 8, 20);
  var fs = GF.clamp(17 * S, 13, 24);
  ctx.textBaseline = 'top';
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'left';
  if (mode === 'daily') {
    // Daily mode: show the DAILY tag (+ current streak) instead of LVL n/6.
    ctx.fillStyle = '#ffb454';
    var tag = GF.t('daily_tag');
    if (dailyStreak > 0) tag += '  🔥' + dailyStreak;
    ctx.fillText(tag, pad, pad);
  } else if (mode === 'endless') {
    // Endless mode: show the endless-depth tag (∞ N) instead of the finite LVL n/6.
    ctx.fillStyle = '#9fe8b5';
    ctx.fillText(GF.t('endless_tag') + ' ' + endlessLevel, pad, pad);
  } else {
    ctx.fillStyle = '#cfe0ff';
    ctx.fillText(GF.t('level') + ' ' + level + '/' + WIN_LEVELS, pad, pad);
  }

  // Pour budget depends on the active loop's generator (campaign / daily / endless).
  var maxP = (mode === 'endless') ? poursForEndless(endlessLevel) : poursForLevel(level);
  var pipR = GF.clamp(5 * S, 4, 8);
  var pipGap = pipR * 2.6;
  var shown = Math.min(maxP, 14);
  var totalW = shown * pipGap;
  var px0 = W / 2 - totalW / 2 + pipGap / 2;
  var py = pad + fs * 0.4;
  for (var i = 0; i < shown; i++) {
    ctx.beginPath();
    ctx.arc(px0 + i * pipGap, py, pipR, 0, Math.PI * 2);
    ctx.fillStyle = (i < pours) ? '#5fd0ff' : 'rgba(120,140,170,0.3)';
    ctx.fill();
  }
  ctx.font = 'bold ' + GF.clamp(13 * S, 10, 18) + 'px sans-serif';
  ctx.fillStyle = pours <= 2 ? '#ff7a6c' : '#9fb6d8';
  ctx.textAlign = 'center';
  ctx.fillText(GF.t('pours') + ': ' + pours, W / 2, py + pipR + 6 * S);

  var btn = GF.clamp(40 * S, 36, 52);
  var gap = GF.clamp(8 * S, 6, 12);
  var rx = W - pad - btn;
  _hudMenuBtn = drawIconBtn(ctx, rx, pad, btn, 'menu');
  rx -= (btn + gap);
  _hudHelpBtn = drawIconBtn(ctx, rx, pad, btn, 'help');
  rx -= (btn + gap);
  _undoBtn = drawIconBtn(ctx, rx, pad, btn, 'undo');
  ctx.font = 'bold ' + GF.clamp(11 * S, 9, 15) + 'px sans-serif';
  ctx.fillStyle = undoLeft > 0 ? '#ffe27a' : '#667';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('' + undoLeft, _undoBtn.x + btn / 2, _undoBtn.y + btn + 2 * S);

  // Second HUD row (top-right): LAB KIT button (with claimable-quest badge) + MUTE.
  var row2y = pad + btn + GF.clamp(20 * S, 16, 28);
  var rx2 = W - pad - btn;
  _hudKitBtn = drawIconBtn(ctx, rx2, row2y, btn, 'kit');
  var cq = claimableQuests();
  if (cq > 0) {
    var br = GF.clamp(8 * S, 7, 11), bxx = rx2 + btn - br * 0.5, byy = row2y + br * 0.4;
    ctx.beginPath(); ctx.arc(bxx, byy, br, 0, Math.PI * 2); ctx.fillStyle = '#ff5b5b'; ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(9 * S, 8, 12) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('' + cq, bxx, byy + 0.5 * S);
    ctx.textBaseline = 'top';
  }
  rx2 -= (btn + gap);
  _muteBtn = { x: rx2, y: row2y, w: btn, h: btn };
  GF.rr(ctx, rx2, row2y, btn, btn, btn * 0.24);
  ctx.fillStyle = 'rgba(40,55,85,0.85)'; ctx.fill();
  ctx.lineWidth = Math.max(1.5 * S, 1.2); ctx.strokeStyle = 'rgba(150,180,230,0.4)'; ctx.stroke();
  GF.drawMuteIcon(ctx, rx2 + btn / 2, row2y + btn / 2, btn * 0.30, GF.muted);

  // FLUX readout + "next reagent in N min" hint, top-left under the mode tag.
  var hx = pad, hy = pad + fs + GF.clamp(10 * S, 7, 14);
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + GF.clamp(13 * S, 11, 18) + 'px sans-serif';
  ctx.fillStyle = '#9fe8ff';
  ctx.fillText(GF.t('flux') + ': ' + flux, hx, hy);
  var nx = nextReagent();
  if (nx) {
    var remain = Math.max(0, Math.ceil(nx.min - totalPlayMin()));
    ctx.font = GF.clamp(11 * S, 9, 15) + 'px sans-serif';
    ctx.fillStyle = '#8fa6c8';
    ctx.fillText(GF.t('next_reagent') + ' ' + remain + GF.t('minute_short'), hx, hy + GF.clamp(18 * S, 14, 24));
  }
}

// One-line in-context explanation for the SEALED tube, anchored at the BOTTOM of
// the play area (clear of the top-right HUD buttons in every language) and wrapped
// so even the longer RU string never collides with anything. Shown ONLY while a
// sealed tube is on the board, so the obstacle is never left unexplained.
function drawSealedHint(ctx) {
  var S = GF.S, W = GF.W, H = GF.H;
  ctx.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px sans-serif';
  ctx.fillStyle = '#9fd8ff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  var maxW = Math.min(W * 0.92, 460);
  var lines = wrapLines(ctx, GF.t('sealed_hint'), maxW);
  var lh = GF.clamp(16 * S, 13, 22);
  var baseY = H - GF.clamp(10 * S, 6, 16);
  var y = baseY - (lines.length - 1) * lh;
  for (var i = 0; i < lines.length; i++) { ctx.fillText(lines[i], W / 2, y); y += lh; }
  ctx.textBaseline = 'top';
}

function drawIconBtn(ctx, x, y, sz, kind) {
  var S = GF.S;
  GF.rr(ctx, x, y, sz, sz, sz * 0.24);
  ctx.fillStyle = 'rgba(40,55,85,0.85)';
  ctx.fill();
  ctx.lineWidth = Math.max(1.5 * S, 1.2);
  ctx.strokeStyle = 'rgba(150,180,230,0.4)';
  ctx.stroke();
  var cx = x + sz / 2, cy = y + sz / 2;
  ctx.strokeStyle = '#cfe0ff';
  ctx.fillStyle = '#cfe0ff';
  ctx.lineWidth = Math.max(2.2 * S, 1.8);
  if (kind === 'menu') {
    var lw = sz * 0.42;
    for (var i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(cx - lw / 2, cy + i * (sz * 0.18));
      ctx.lineTo(cx + lw / 2, cy + i * (sz * 0.18));
      ctx.stroke();
    }
  } else if (kind === 'help') {
    ctx.font = 'bold ' + (sz * 0.55) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', cx, cy + sz * 0.02);
  } else if (kind === 'undo') {
    ctx.beginPath();
    ctx.arc(cx, cy, sz * 0.22, Math.PI * 0.4, Math.PI * 1.9);
    ctx.stroke();
    var ax = cx + Math.cos(Math.PI * 0.4) * sz * 0.22;
    var ay = cy + Math.sin(Math.PI * 0.4) * sz * 0.22;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - sz * 0.12, ay - sz * 0.02);
    ctx.lineTo(ax + sz * 0.02, ay + sz * 0.12);
    ctx.closePath();
    ctx.fill();
  } else if (kind === 'kit') {
    // a little flask: narrow neck widening to a round base, half-filled
    var nw = sz * 0.16, fb = sz * 0.30, topY = cy - sz * 0.26, botY = cy + sz * 0.24;
    ctx.beginPath();
    ctx.moveTo(cx - nw, topY);
    ctx.lineTo(cx - nw, cy - sz * 0.04);
    ctx.lineTo(cx - fb, botY);
    ctx.lineTo(cx + fb, botY);
    ctx.lineTo(cx + nw, cy - sz * 0.04);
    ctx.lineTo(cx + nw, topY);
    ctx.closePath();
    ctx.stroke();
    ctx.moveTo(cx - nw * 1.5, topY); ctx.lineTo(cx + nw * 1.5, topY); ctx.stroke();
    // fill
    ctx.fillStyle = '#5fd0ff';
    ctx.beginPath();
    ctx.moveTo(cx - fb * 0.78, botY - sz * 0.02);
    ctx.lineTo(cx + fb * 0.78, botY - sz * 0.02);
    ctx.lineTo(cx + fb, botY);
    ctx.lineTo(cx - fb, botY);
    ctx.closePath();
    ctx.fill();
  }
  ctx.textBaseline = 'top';
  return { x: x, y: y, w: sz, h: sz };
}

// ── OVERLAYS ─────────────────────────────────────────────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

function drawScrim(ctx, alpha) {
  ctx.fillStyle = 'rgba(6,9,18,' + (alpha || 0.9) + ')';
  ctx.fillRect(0, 0, GF.W, GF.H);
}

function drawButton(ctx, label, cx, y, accent) {
  var S = GF.S;
  var bw = GF.clamp(250 * S, 170, 330), bh = GF.clamp(56 * S, 44, 70);
  var bx = cx - bw / 2;
  var g = ctx.createLinearGradient(bx, y, bx, y + bh);
  g.addColorStop(0, accent || '#3fb86a');
  g.addColorStop(1, accent ? '#9a5212' : '#2a8a4c');
  if (accent === '#e88a3a') { g = ctx.createLinearGradient(bx, y, bx, y + bh); g.addColorStop(0, '#ef9b3a'); g.addColorStop(1, '#c46410'); }
  GF.rr(ctx, bx, y, bw, bh, bh / 2);
  ctx.fillStyle = g; ctx.fill();
  ctx.font = 'bold ' + GF.clamp(19 * S, 15, 24) + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, y + bh / 2);
  ctx.textBaseline = 'top';
  return { x: bx, y: y, w: bw, h: bh };
}

function drawSmallButton(ctx, label, cx, y) {
  var S = GF.S;
  var bw = GF.clamp(180 * S, 130, 240), bh = GF.clamp(46 * S, 38, 58);
  var bx = cx - bw / 2;
  GF.rr(ctx, bx, y, bw, bh, bh / 2);
  ctx.fillStyle = 'rgba(60,80,120,0.9)'; ctx.fill();
  ctx.lineWidth = Math.max(1.5 * S, 1.2);
  ctx.strokeStyle = 'rgba(150,180,230,0.5)'; ctx.stroke();
  ctx.font = 'bold ' + GF.clamp(16 * S, 13, 20) + 'px sans-serif';
  ctx.fillStyle = '#dce8ff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, y + bh / 2);
  ctx.textBaseline = 'top';
  return { x: bx, y: y, w: bw, h: bh };
}

// A pill button sized to fit half a row (used for the PLAY | DAILY menu pair so
// the daily entry adds NO vertical height vs. the old single-PLAY layout).
function drawPairButton(ctx, label, bx, y, bw, bh, accent, dim) {
  var S = GF.S;
  var g = ctx.createLinearGradient(bx, y, bx, y + bh);
  if (dim) { g.addColorStop(0, '#37506e'); g.addColorStop(1, '#26384e'); }
  else if (accent === 'play') { g.addColorStop(0, '#3fb86a'); g.addColorStop(1, '#2a8a4c'); }
  else if (accent === 'endless_blue') { g.addColorStop(0, '#4f8bf0'); g.addColorStop(1, '#2a56b0'); } // endless = blue
  else { g.addColorStop(0, '#ef9b3a'); g.addColorStop(1, '#c46410'); } // daily = warm
  GF.rr(ctx, bx, y, bw, bh, bh / 2);
  ctx.fillStyle = g; ctx.fill();
  if (dim) { ctx.lineWidth = Math.max(1.5 * S, 1.2); ctx.strokeStyle = 'rgba(150,180,230,0.4)'; ctx.stroke(); }
  ctx.font = 'bold ' + GF.clamp(17 * S, 13, 22) + 'px sans-serif';
  ctx.fillStyle = dim ? '#bcd' : '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, bx + bw / 2, y + bh / 2);
  ctx.textBaseline = 'top';
  return { x: bx, y: y, w: bw, h: bh };
}

function drawMenu(ctx) {
  drawScrim(ctx, 0.92);
  var S = GF.S, W = GF.W, H = GF.H, cx = W / 2;
  var maxW = Math.min(W * 0.86, 460);

  // ── LAB KIT pill (top-left, always visible) + MUTE (top-right) ──
  // The meta hub button — opens the REAGENTS + QUESTS overlay. A red badge shows
  // claimable quests so the player has a concrete reason to open it. Anchored in the
  // corner so it never collides with the centered title/rank/tutorial stack.
  var kpad = GF.clamp(12 * S, 8, 18);
  var kbh = GF.clamp(38 * S, 32, 48);
  var kbw = Math.min(W * 0.46, GF.clamp(132 * S, 104, 168));
  _menuKitBtn = { x: kpad, y: kpad, w: kbw, h: kbh };
  GF.rr(ctx, kpad, kpad, kbw, kbh, kbh / 2);
  ctx.fillStyle = 'rgba(95,208,255,0.16)'; ctx.fill();
  ctx.strokeStyle = 'rgba(95,208,255,0.6)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  drawReagentIcon(ctx, { col: '#5fd0ff' }, kpad + kbh * 0.5, kpad + kbh / 2, kbh * 0.62, false);
  ctx.fillStyle = '#cfeaff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px sans-serif';
  ctx.fillText(GF.t('kit'), kpad + kbh, kpad + kbh / 2);
  ctx.textBaseline = 'top';
  var mcq = claimableQuests();
  if (mcq > 0) {
    var mbr = GF.clamp(9 * S, 7, 12), mbx = kpad + kbw - mbr * 0.5, mby = kpad + mbr * 0.2;
    ctx.beginPath(); ctx.arc(mbx, mby, mbr, 0, Math.PI * 2); ctx.fillStyle = '#ff5b5b'; ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(10 * S, 8, 13) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('' + mcq, mbx, mby + 0.5 * S);
    ctx.textBaseline = 'top';
  }
  // mute toggle (top-right corner)
  var mbtn = GF.clamp(38 * S, 32, 48);
  _muteBtn = { x: W - kpad - mbtn, y: kpad, w: mbtn, h: mbtn };
  GF.rr(ctx, _muteBtn.x, _muteBtn.y, mbtn, mbtn, mbtn * 0.24);
  ctx.fillStyle = 'rgba(40,55,85,0.85)'; ctx.fill();
  ctx.strokeStyle = 'rgba(150,180,230,0.4)'; ctx.lineWidth = 1.3 * S; ctx.stroke();
  GF.drawMuteIcon(ctx, _muteBtn.x + mbtn / 2, _muteBtn.y + mbtn / 2, mbtn * 0.30, GF.muted);

  ctx.shadowColor = 'rgba(63,184,106,0.5)'; ctx.shadowBlur = 28 * S;
  ctx.font = 'bold ' + GF.clamp(40 * S, 26, 56) + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var titleY = H * 0.075;
  ctx.fillText(GF.t('title'), cx, titleY);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  var tubeBlockY = titleY + GF.clamp(52 * S, 38, 68);
  drawTitleTubes(ctx, cx, tubeBlockY);

  // ── Lab Rank meta panel (persistent, owned progression) ──
  var rankBlockY = tubeBlockY + GF.clamp(108 * S, 80, 152);
  var rankBlockH = drawRankPanel(ctx, cx, rankBlockY, maxW);

  var y = rankBlockY + rankBlockH + GF.clamp(14 * S, 8, 22);
  var fs = GF.clamp(15 * S, 12, 19);
  var lineH = fs * 1.28;
  ctx.font = fs + 'px sans-serif';
  ctx.textAlign = 'left';
  var lx = cx - maxW / 2;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var cols = ['#9fe8b5', '#cfe0ff', '#cfe0ff', '#ff9c8e', '#ffe27a'];
  for (var ki = 0; ki < keys.length; ki++) {
    var lines = wrapLines(ctx, GF.t(keys[ki]), maxW);
    ctx.fillStyle = cols[ki];
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], lx, y); y += lineH; }
    y += lineH * 0.28;
  }
  // PLAY (campaign) | DAILY pair — same row, so the new daily entry costs no
  // extra menu height (keeps the portrait menu inside the viewport).
  var _wide = W / H > 1.15;
  var btnY = Math.min(y + GF.clamp(14 * S, 8, 22), H - GF.clamp(96 * S, 72, 128));
  if (_wide) btnY = Math.min(btnY, H * 0.57);
  var bh = GF.clamp((_wide ? 78 : 56) * S, 44, _wide ? 100 : 70);
  var rowW = Math.min(W * 0.92, GF.clamp(360 * S, 280, 440));
  var midGap = GF.clamp(12 * S, 8, 18);
  var bw = (rowW - midGap) / 2;
  // desktop: PLAY gets 60% of a wider row, DAILY gets 36%
  var _playBw = _wide ? GF.clamp(360 * S, 260, 500) : bw;
  var _dailyBw = _wide ? GF.clamp(200 * S, 140, 280) : bw;
  var _totalRowW = _wide ? _playBw + midGap + _dailyBw : rowW;
  var leftX = cx - _totalRowW / 2;
  if (_wide) {
    // Draw animated PLAY button
    var _t = performance.now() / 1000;
    var _p = 1 + 0.05 * Math.sin(_t * 2.2);
    var _k = 0.5 + 0.5 * Math.sin(_t * 2.2);
    var _dw = _playBw * _p, _dh = bh * _p;
    var _px = leftX, _py = btnY;
    var _dpx = _px + _playBw / 2 - _dw / 2, _dpy = _py + bh / 2 - _dh / 2;
    var _pg = ctx.createLinearGradient(_dpx, _dpy, _dpx, _dpy + _dh);
    _pg.addColorStop(0, '#3fb86a'); _pg.addColorStop(1, '#2a8a4c');
    ctx.save();
    ctx.shadowColor = 'rgba(63,184,106,' + (0.4 + 0.3 * _k).toFixed(3) + ')';
    ctx.shadowBlur = (22 + 10 * _k) * S;
    GF.rr(ctx, _dpx, _dpy, _dw, _dh, _dh / 2); ctx.fillStyle = _pg; ctx.fill();
    ctx.restore();
    ctx.font = 'bold ' + GF.clamp(22 * S, 15, 30) + 'px sans-serif';
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('▶ ' + GF.t('play'), _px + _playBw / 2, _py + bh / 2);
    ctx.textBaseline = 'top';
    _playBtn = { x: _px, y: _py, w: _playBw, h: bh };
  } else {
    _playBtn = drawPairButton(ctx, GF.t('play'), leftX, btnY, bw, bh, 'play', false);
  }
  // Daily: dim when today's puzzle is already solved (still tappable to replay,
  // but visually signals "done" — the FOMO is in the streak, not a hard lock).
  var _dailyX = leftX + (_wide ? _playBw : bw) + midGap;
  _dailyBtn = drawPairButton(ctx,
    dailyDoneToday ? GF.t('daily_done_btn') : GF.t('daily'),
    _dailyX, btnY, _wide ? _dailyBw : bw, bh, 'daily', dailyDoneToday);

  // Claimable daily-bonus chest (session-end hook): only when a bonus is waiting.
  // Sits in the caption gap under the PLAY|DAILY row so it costs no fixed extra
  // height — when there's nothing to claim the area collapses back to captions.
  _bonusBtn = null;
  var capY = btnY + bh + GF.clamp(12 * S, 8, 18);
  if (bonusAvailable()) {
    _bonusBtn = drawBonusButton(ctx, cx, capY, rowW);
    capY = _bonusBtn.y + _bonusBtn.h + GF.clamp(10 * S, 7, 16);
  }

  // Streak + best-level caption line under the buttons / chest.
  ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  if (dailyStreak > 0) {
    ctx.fillStyle = '#ffb454';
    var unit = dailyStreak === 1 ? GF.t('day') : GF.t('days');
    ctx.fillText('🔥 ' + dailyStreak + ' ' + unit + ' ' + GF.t('streak'), cx, capY);
    capY += GF.clamp(18 * S, 13, 24);
  }
  if (bestLevel > 0) {
    ctx.font = GF.clamp(12 * S, 9, 15) + 'px sans-serif';
    ctx.fillStyle = '#7f93b5';
    ctx.fillText(GF.t('best') + ': ' + bestLevel + '/' + WIN_LEVELS, cx, capY);
    capY += GF.clamp(18 * S, 13, 24);
  }
  // ENDLESS entry on the MENU — unlocked once the campaign has been cleared (or an
  // endless run already started). Gated so it never clutters the first-run menu;
  // when shown it sits below the captions (only after the player has the screen
  // room budget freed by having finished the tutorial-era first run).
  _menuEndlessBtn = null;
  if (endlessUnlocked()) {
    var ebh = GF.clamp(40 * S, 34, 52);
    var ebw = Math.min(W * 0.7, GF.clamp(240 * S, 180, 300));
    var eby = Math.min(capY + GF.clamp(4 * S, 2, 8), H - ebh - GF.clamp(10 * S, 8, 16));
    _menuEndlessBtn = drawPairButton(ctx, GF.t('endless') +
      (endlessBest > 0 ? ('  ∞' + endlessBest) : ''),
      cx - ebw / 2, eby, ebw, ebh, 'endless_blue', false);
  }
}
// Endless is unlocked after the player has cleared the finite campaign at least
// once (bestLevel hit the cap) or already has an endless run on record.
function endlessUnlocked() { return endlessBest > 0 || bestLevel >= WIN_LEVELS; }

// The claimable daily-bonus chest button on the MENU. A warm gold pill with a
// gift glyph, a gentle pulse, and the streak-scaled reward amount baked into the
// label so the player sees exactly what claiming gives.
function drawBonusButton(ctx, cx, y, rowW) {
  var S = GF.S;
  _bonusPulse += 0.05;
  var pulse = 0.5 + 0.5 * Math.sin(_bonusPulse);
  var bw = Math.min(rowW, GF.clamp(300 * S, 220, 380));
  var bh = GF.clamp(46 * S, 38, 58);
  var bx = cx - bw / 2;
  ctx.save();
  ctx.shadowColor = 'rgba(255,210,90,' + (0.35 + 0.35 * pulse) + ')';
  ctx.shadowBlur = (14 + 10 * pulse) * S;
  var g = ctx.createLinearGradient(bx, y, bx, y + bh);
  g.addColorStop(0, '#ffd24a');
  g.addColorStop(1, '#e8932a');
  GF.rr(ctx, bx, y, bw, bh, bh / 2);
  ctx.fillStyle = g; ctx.fill();
  ctx.restore();
  ctx.lineWidth = Math.max(1.6 * S, 1.2);
  ctx.strokeStyle = 'rgba(255,245,210,0.6)'; ctx.stroke();
  ctx.font = 'bold ' + GF.clamp(16 * S, 13, 21) + 'px sans-serif';
  ctx.fillStyle = '#3a230a';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🎁 ' + GF.t('bonus_claim') + ' +' + bonusValueToday(), cx, y + bh / 2);
  ctx.textBaseline = 'top';
  return { x: bx, y: y, w: bw, h: bh };
}

function drawTitleTubes(ctx, cx, y) {
  var S = GF.S;
  var w = GF.clamp(26 * S, 18, 38), h = GF.clamp(96 * S, 70, 140);
  var gap = w * 1.5;
  var sets = [[1, 5, 2], [3, 2], [6, 1, 3]];
  for (var i = -1; i <= 1; i++) {
    var x = cx + i * (w + gap) - w / 2;
    var arr = sets[i + 1];
    var r = w * 0.5;
    GF.rr(ctx, x, y, w, h, r);
    ctx.fillStyle = 'rgba(200,225,255,0.06)'; ctx.fill();
    ctx.save();
    GF.rr(ctx, x + 2, y + 2, w - 4, h - 4, r); ctx.clip();
    var layerH = (h - 4) / TUBE_CAP;
    for (var li = 0; li < arr.length; li++) {
      var ly = y + h - 2 - (li + 1) * layerH;
      ctx.fillStyle = COL_HEX[arr[li]];
      ctx.fillRect(x + 2, ly, w - 4, layerH + 1);
    }
    ctx.restore();
    GF.rr(ctx, x, y, w, h, r);
    ctx.lineWidth = Math.max(2 * S, 1.6);
    ctx.strokeStyle = 'rgba(190,215,255,0.45)'; ctx.stroke();
  }
}

// Lab Rank panel: rank name + lifetime tubes-purified + progress bar to next
// rank. Returns the block height so the caller can flow the tutorial below it.
function drawRankPanel(ctx, cx, y, maxW) {
  var S = GF.S;
  var w = Math.min(maxW, GF.W * 0.78);
  var x = cx - w / 2;
  var ri = rankIndexFor(tubesPurified);
  var prog = rankProgress(tubesPurified);

  var labelFs = GF.clamp(12 * S, 10, 16);
  var nameFs = GF.clamp(19 * S, 15, 26);
  var barH = GF.clamp(9 * S, 7, 13);
  var pad = GF.clamp(6 * S, 4, 10);
  var blockH = labelFs + nameFs + barH + GF.clamp(20 * S, 14, 30);

  // small "LAB RANK" caption
  ctx.font = 'bold ' + labelFs + 'px sans-serif';
  ctx.fillStyle = '#7f93b5';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(isRu() ? 'РАНГ' : 'LAB RANK', cx, y);

  // rank name (glows gold)
  ctx.shadowColor = 'rgba(255,226,122,0.45)';
  ctx.shadowBlur = 14 * S;
  ctx.font = 'bold ' + nameFs + 'px sans-serif';
  ctx.fillStyle = '#ffe27a';
  ctx.fillText(rankName(ri), cx, y + labelFs + 2 * S);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  // progress bar to next rank
  var barY = y + labelFs + nameFs + GF.clamp(8 * S, 5, 13);
  GF.rr(ctx, x, barY, w, barH, barH / 2);
  ctx.fillStyle = 'rgba(120,140,170,0.22)';
  ctx.fill();
  var fillW = Math.max(barH, w * GF.clamp(prog.frac, 0, 1));
  if (prog.frac > 0) {
    GF.rr(ctx, x, barY, fillW, barH, barH / 2);
    var g = ctx.createLinearGradient(x, barY, x + fillW, barY);
    g.addColorStop(0, '#3fb86a');
    g.addColorStop(1, '#5fd0ff');
    ctx.fillStyle = g;
    ctx.fill();
  }

  // count caption to the right / centered under the bar
  ctx.font = GF.clamp(11 * S, 9, 15) + 'px sans-serif';
  ctx.fillStyle = '#9fb6d8';
  ctx.textAlign = 'center';
  var caption = prog.maxed
    ? (isRu() ? ('Чистых пробирок: ' + tubesPurified) : (tubesPurified + ' tubes purified - MAX'))
    : (isRu()
        ? ((prog.need - prog.cur) + ' до повышения')
        : ((prog.need - prog.cur) + ' tubes to next rank'));
  ctx.fillText(caption, cx, barY + barH + pad);

  return blockH;
}

function drawLevelEnd(ctx) {
  drawScrim(ctx, 0.7);
  var S = GF.S, H = GF.H, cx = GF.W / 2;
  ctx.font = 'bold ' + GF.clamp(34 * S, 22, 48) + 'px sans-serif';
  ctx.fillStyle = '#9fe8b5'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // Endless boards have no fixed number — celebrate the depth reached + "go deeper".
  var head = (mode === 'endless')
    ? (GF.t('endless_tag') + ' ' + endlessLevel + ' ' + GF.t('solved'))
    : (GF.t('levelsolved') + ' ' + level + ' ' + GF.t('solved'));
  ctx.fillText(head, cx, H * 0.42);
  ctx.font = GF.clamp(16 * S, 12, 20) + 'px sans-serif';
  ctx.fillStyle = '#bcd';
  ctx.fillText(mode === 'endless' ? GF.t('go_deeper') : GF.t('tap_next'),
    cx, H * 0.42 + GF.clamp(44 * S, 32, 60));
  ctx.textBaseline = 'top';
}

// Session-end hook line, drawn near the bottom of every terminal screen
// (GAMEOVER / WIN / DAILYDONE). If a daily bonus is unclaimed → tease it ("waiting
// on the menu"). If already claimed → preview TOMORROW'S (bigger) bonus, the
// concrete dated carrot that arms the next session. `botY` is the baseline Y to
// draw above the menu button; returns nothing (purely additive overlay text).
function drawSessionEndHook(ctx, botY) {
  var S = GF.S, cx = GF.W / 2;
  var maxW = Math.min(GF.W * 0.84, 400);
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px sans-serif';
  var txt, col;
  if (bonusAvailable()) {
    col = '#ffd24a';
    txt = '🎁 ' + GF.t('bonus_tease_ready');
  } else {
    col = '#9fb6d8';
    txt = GF.t('bonus_tease_next') + ' +' + bonusValueTomorrow() + ' ' + GF.t('bonus_tubes') + '.';
  }
  ctx.fillStyle = col;
  var lines = wrapLines(ctx, txt, maxW);
  var lh = GF.clamp(18 * S, 14, 24);
  var y = botY - lines.length * lh;
  for (var i = 0; i < lines.length; i++) { ctx.fillText(lines[i], cx, y); y += lh; }
}

  _gmMenuBtn = drawSmallButton(ctx, GF.t('menu'), cx, H * 0.52 + _retryBtn.h + GF.clamp(18 * S, 12, 26));

  drawSessionEndHook(ctx, H - GF.clamp(20 * S, 14, 28));
}

function drawWin(ctx) {

  ctx.shadowColor = 'rgba(63,184,106,0.6)'; ctx.shadowBlur = 30 * S;

}

// Daily-challenge solved screen: the streak is the headline (the return hook),
