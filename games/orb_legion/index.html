var EL = { FIRE:0, WATER:1, WOOD:2, LIGHT:3, DARK:4, HEART:5 };
var EL_NAME = ['fire','water','wood','light','dark','heart'];
var ORB_COLS = [
  { a:'#ff5a3c', b:'#ff8a5a', glow:'#ff7a4a' }, // fire

  { a:'#ffcf3a', b:'#fff08a', glow:'#ffe05a' }, // light
  { a:'#a05cff', b:'#c89bff', glow:'#b87cff' }, // dark
  { a:'#ff6fae', b:'#ffaccd', glow:'#ff8cbe' }, // heart
];
// element advantage: attacker EL vs defender EL -> multiplier
function elMult(att, def) {
  if (att === EL.FIRE  && def === EL.WOOD)  return 2;
  if (att === EL.WOOD  && def === EL.WATER) return 2;
  if (att === EL.WATER && def === EL.FIRE)  return 2;
  if (att === EL.LIGHT && def === EL.DARK)  return 2;
  if (att === EL.DARK  && def === EL.LIGHT) return 2;
  // weakness (half)
  if (att === EL.WOOD  && def === EL.FIRE)  return 0.5;
  if (att === EL.WATER && def === EL.WOOD)  return 0.5;
  if (att === EL.FIRE  && def === EL.WATER) return 0.5;
  if (att === EL.LIGHT && def === EL.LIGHT) return 0.5;
  if (att === EL.DARK  && def === EL.DARK)  return 0.5;
  return 1;
}

  v: 1,
  owned: {},        // id -> {stars, count}
  team: [],         // up to 5 ids
  essence: 0,
  tickets: 1,       // start with one free pull
  summons: 0,       // pity counter (resets at 30 on a 5*)

};
var SAVE_KEY = 'orbchamp_v1';

function saveMeta() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(meta)); } catch (e) {}
}
function loadMeta() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      var s = JSON.parse(raw);
      if (s && typeof s === 'object') {
        meta.owned = s.owned || {};
        meta.team = Array.isArray(s.team) ? s.team.slice(0,5) : [];
        meta.essence = Math.max(0, s.essence|0);
        meta.tickets = Math.max(0, s.tickets|0);
        meta.summons = Math.max(0, s.summons|0);
        meta.stageUnlocked = GF.clamp(s.stageUnlocked|0, 0, STAGES.length-1);
        meta.lastDaily = s.lastDaily|0;
        meta.lastDailyClear = s.lastDailyClear|0;
        meta.dailyStreak = Math.max(0, s.dailyStreak|0);
        meta.seenTut = !!s.seenTut;
      }
    }
  } catch (e) {}
  // First-run grant: a 4-element starter so the player always has a playable
  // team that can attack the early stages (fire/water/wood/light coverage).
  if (Object.keys(meta.owned).length === 0) {
    grantUnit('emberpup', true); grantUnit('tidefin', true);
    grantUnit('mossback', true); grantUnit('sparkwing', true);
  }
  // Ensure a valid team (fill from owned).
  rebuildTeamIfNeeded();
}
function dayNumber(){ return Math.floor(Date.now()/86400000); }

function grantUnit(id, silent) {
  var o = meta.owned[id];
  var isNew = !o;
  if (!o) { o = meta.owned[id] = { stars: rosterById(id).rar>=5?1: (rosterById(id).rar>=4?1:1), count:0 }; }
  o.count++;
  if (!isNew) {
    // dupe -> star up (cap 5), plus a little essence
    if (o.stars < 5) o.stars++;
    meta.essence += 30;
  }
  if (!silent) {
    pullReveal = { id:id, isNew:isNew, stars:o.stars, t:0 };
  }
  return isNew;
}
function rebuildTeamIfNeeded() {
  // drop any team ids no longer owned
  meta.team = meta.team.filter(function(id){ return meta.owned[id]; });
  // auto-fill up to 5 from owned (prefer higher rarity) if team empty/short
  if (meta.team.length < 5) {
    var ids = Object.keys(meta.owned).filter(function(id){ return meta.team.indexOf(id)<0; });
    ids.sort(function(a,b){ return rosterById(b).rar - rosterById(a).rar; });
    for (var i=0; i<ids.length && meta.team.length<5; i++) meta.team.push(ids[i]);
  }
}

// ── GACHA ────────────────────────────────────────────────────────────────────
// rate-up: the banner 5* (rotates daily) has boosted odds. pity at 30.
var PITY = 30;
function bannerFeatured(){ // rotates so it feels like a real rate-up banner
  var fives = ROSTER.filter(function(u){return u.rar===5;});
  return fives[dayNumber() % fives.length].id;
}
function rollUnit(forceFive) {
  var r = Math.random();
  var rar;
  if (forceFive) rar = 5;
  else if (r < 0.04) rar = 5;       // 4%
  else if (r < 0.20) rar = 4;       // 16%
  else rar = 3;                     // 80%
  var pool = ROSTER.filter(function(u){return u.rar===rar;});
  // rate-up: on a 5*, 50% chance it's the featured one
  if (rar === 5 && Math.random() < 0.5) return bannerFeatured();
  return pool[(Math.random()*pool.length)|0].id;
}
function doSummon(n) {
  var got = [];
  for (var i=0;i<n;i++) {
    meta.summons++;
    var force = (meta.summons >= PITY);
    var id = rollUnit(force);
    if (rosterById(id).rar === 5) meta.summons = 0; // pity resets on any 5*
    got.push(id);
  }
  // apply grants (reveal only the best/last for x1; for x10 reveal a summary)
  var anyNew = false, bestRar = 0, bestId = got[0];
  for (var j=0;j<got.length;j++) {
    var isNew = grantUnit(got[j], true);
    anyNew = anyNew || isNew;
    if (rosterById(got[j]).rar > bestRar) { bestRar = rosterById(got[j]).rar; bestId = got[j]; }
  }
  rebuildTeamIfNeeded();
  saveMeta();
  return { got:got, bestId:bestId, bestRar:bestRar, anyNew:anyNew };
}

// row TUT_DRAG.row. The board is seeded so following that drag completes a
// horizontal 3-match the starter team can attack with. See buildTutorialBoard.
var tutorialActive = false;   // true while the first-battle tutorial is showing

// ── BATTLE OBJECT ─────────────────────────────────────────────────────────
function newBattle(stageIdx, dailyStage) {
  var st = dailyStage || STAGES[stageIdx];
  // deep copy waves so hp resets per battle
  var waves = st.waves.map(function(w){ return w.map(function(e){ return mkEnemy(e.el, e.hpMax, e.atk, e.turns, e.boss); }); });
  // team units with current stats + current hp
  var units = meta.team.slice(0,5).map(function(id){
    var s = unitStats(id, meta.owned[id]?meta.owned[id].stars:1);
    return { id:id, el:rosterById(id).el, atk:s.atk, hpMax:s.hp, hp:s.hp, art:rosterById(id).art, hitFlash:0, atkAnim:0 };
  });
  var teamHpMax = units.reduce(function(a,u){return a+u.hpMax;},0) || 1;
  battle = {
    stageIdx: stageIdx, st: st, daily: !!dailyStage, waves: waves, waveIdx: 0,
    enemies: waves[0], units: units,
    teamHp: teamHpMax, teamHpMax: teamHpMax,
    phase: 'INPUT',   // INPUT | RESOLVE | ENEMY | WIN | LOSE | WAVECLEAR
    moveTimer: 0, moveMax: 5.0,  // seconds to drag
    dragOrb: null,  // {r,c, origEl, x,y, fromR, fromC}
    combos: [], comboShown: 0, resolveT: 0,
    pendingAd: false, reviveUsed: false,
    bgShakeT: 0, comboFlash: 0, lastComboCount: 0,
    enemyTurnT: 0, enemyActing: -1,
    floatDmg: [], // {x,y,txt,col,t,vy}
    waveBanner: 0,
  };
  // First-battle tutorial: seed a deterministic board so the demo-hand drag is
  // guaranteed to make a match (otherwise step 1 can never advance). Only on the
  // first stage, and only until the tutorial has been seen.
  if (!dailyStage && tutorialPending(stageIdx)) {
    tutorialActive = true;
    buildTutorialBoard();   // seeded, no reshuffle (ensurePlayableBoard would scramble it)
  } else {
    tutorialActive = false;
    fillBoardFull();
    ensurePlayableBoard();
  }
}

// True if the one-time tutorial should run for a battle on `stageIdx`.
function tutorialPending(stageIdx) {
  if (stageIdx !== 0) return false;
  if (meta.seenTut) return false;
  try { if (localStorage.getItem('orbchamp_tut_v1')) return false; } catch (e) {}
  return true;
}

function startBattle(stageIdx) {
  newBattle(stageIdx);
  gs = 'BATTLE';
  GF.gameStarted();
  saveMeta();
}

// ── DAILY TRIAL (procedural; re-generated every calendar day) ────────────────
// A fresh level each day with NO server: the layout is seeded by the day number
// so it is the same hand-made-feeling stage for everyone that day, then changes
// at midnight. Clearing it the first time each day advances a login streak —
// the D1 reason to return tomorrow, with a weekly (every 7th day) jackpot = D7.
function _mulberry32(a){ return function(){ a|=0; a=(a+0x6D2B79F5)|0; var t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
function makeDailyStage(){
  var day = dayNumber();
  var rnd = _mulberry32((day*2654435761)>>>0);
  var bgs=['bg_volcano','bg_ocean','bg_forest','bg_void'];
  var bg = bgs[((day%bgs.length)+bgs.length)%bgs.length];
  var prog = GF.clamp(meta.stageUnlocked,0,STAGES.length-1);
  var tier = 1 + prog*0.16;                      // gentle scale so it is fair at any rank
  var waves=[];
  var nWaves = 2 + (rnd()<0.5?1:0);              // 2-3 normal waves
  for (var w=0; w<nWaves; w++){
    var cnt = 1 + (w>0?1:0) + (rnd()<0.4?1:0);   // 1-3 enemies, more in later waves
    var arr=[];
    for (var k=0;k<cnt;k++){
      var el = Math.floor(rnd()*5);
      var hp = Math.round((420 + w*240 + rnd()*180) * tier);
      var atk = Math.round((75 + w*22 + rnd()*22) * tier);
      arr.push(mkEnemy(el, hp, atk, 2 + (rnd()<0.35?1:0)));
    }
    waves.push(arr);
  }
  var bossEl = ((day%5)+5)%5;
  waves.push([mkEnemy(bossEl, Math.round((2400 + prog*240)), Math.round(180 + prog*16), 2, true)]);
  // stamp the generation day so streak credit is attributed to the day the run
  // was STARTED, not finished (a run begun before midnight, won after, still
  // counts for the day it belongs to).
  return { name:{en:'Daily Trial',ru:'Испытание дня'}, bg:bg, waves:waves, daily:true, bossEl:bossEl, day:day };
}
function startDaily(){
  newBattle(-1, makeDailyStage());
  gs = 'BATTLE';
  GF.gameStarted();
  saveMeta();
}
function dailyDone(){ return meta.lastDailyClear === dayNumber(); }
// streak still "alive" only if the last clear was today or yesterday; a missed
// day means the displayed streak is dead (the next clear restarts it at 1).
function activeStreak(){ var d=dayNumber(); return (meta.lastDailyClear===d || meta.lastDailyClear===d-1) ? (meta.dailyStreak|0) : 0; }

// vector flame (streak indicator — never an emoji, which tofus in canvas)
function drawFlame(x,y,r){
  ctx.save(); ctx.translate(x,y); ctx.beginPath();
  ctx.moveTo(0,-r);
  ctx.quadraticCurveTo(r*0.95,-r*0.1, r*0.5,r*0.62);
  ctx.quadraticCurveTo(r*0.22,r, 0,r);
  ctx.quadraticCurveTo(-r*0.22,r, -r*0.5,r*0.62);
  ctx.quadraticCurveTo(-r*0.95,-r*0.1, 0,-r);
  ctx.closePath();
  var g=ctx.createLinearGradient(0,-r,0,r); g.addColorStop(0,'#ffd23a'); g.addColorStop(1,'#ff5a1e');
  ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,-r*0.15); ctx.quadraticCurveTo(r*0.36,r*0.12, 0,r*0.6); ctx.quadraticCurveTo(-r*0.36,r*0.12, 0,-r*0.15); ctx.closePath();
  ctx.fillStyle='#fff2b0'; ctx.fill();
  ctx.restore();
}

// ── BOARD MECHANICS ─────────────────────────────────────────────────────────
function randEl(){ return (Math.random()*6)|0; }
function fillBoardFull() {
  board = [];
  for (var r=0;r<BR;r++){ board[r]=[]; for(var c=0;c<BC;c++) board[r][c]=randEl(); }
  // avoid pre-made 3-matches at start so the first move is the player's
  for (var pass=0; pass<8; pass++){
    var m = findMatches();
    if (!m.cells.length) break;
    for (var k=0;k<m.cells.length;k++){ var cc=m.cells[k]; board[cc.r][cc.c]=randEl(); }
  }
}
// Seed a DETERMINISTIC tutorial board: no pre-made match, but the demo-hand
// drag (carry the orb at (row,fromC) across to toC) completes a horizontal
// 3-match of TUT_EL at (row,toC..toC+2). Carry mechanics (see onMove): the
// grabbed orb ends at toC; the orbs it passed shift one cell toward fromC; the
// orbs to the RIGHT of toC stay put. So placing TUT_EL at fromC and at the two
// cells right of toC yields TUT_EL,TUT_EL,TUT_EL after the drop.
function buildTutorialBoard() {
  var row = TUT_DRAG.row, fromC = TUT_DRAG.fromC, toC = TUT_DRAG.toC;
  // non-FIRE palette for the backdrop (water/wood/light/dark/heart)
  var PAL = [EL.WATER, EL.WOOD, EL.LIGHT, EL.DARK, EL.HEART];
  // a stripe pattern with no 3-in-a-row of one colour, then we punch in the
  // FIRE setup and repair any accidental run.
  board = [];
  for (var r=0;r<BR;r++){ board[r]=[];
    for (var c=0;c<BC;c++){ board[r][c] = PAL[(c + r*2 + ((c/2)|0)) % PAL.length]; }
  }
  // FIRE trio source cells: grabbed orb + the two cells right of the landing.
  board[row][fromC] = TUT_EL;
  board[row][toC+1] = TUT_EL;
  board[row][toC+2] = TUT_EL;
  // keep the landing cell itself NON-fire so there is no pre-match before the drag
  if (board[row][toC] === TUT_EL) board[row][toC] = EL.WATER;
  // repair: recolour any cell that completes a same-colour run of 3, leaving the
  // three intended FIRE source cells untouched. A few passes converge.
  function isFireSeed(r,c){ return r===row && (c===fromC || c===toC+1 || c===toC+2); }
  for (var pass=0; pass<12; pass++){
    var m = findMatches();
    if (!m.cells.length) break;
    for (var k=0;k<m.cells.length;k++){
      var cc=m.cells[k]; if (isFireSeed(cc.r,cc.c)) continue;
      // pick a palette colour that differs from both axis-neighbours and isn't FIRE
      for (var p=0;p<PAL.length;p++){
        var cand = PAL[(cc.c + cc.r + p) % PAL.length];
        var bad = (cc.c>0 && board[cc.r][cc.c-1]===cand) || (cc.c<BC-1 && board[cc.r][cc.c+1]===cand)
               || (cc.r>0 && board[cc.r-1][cc.c]===cand) || (cc.r<BR-1 && board[cc.r+1][cc.c]===cand);
        if (!bad){ board[cc.r][cc.c]=cand; break; }
      }
    }
  }
}
// detect all horizontal/vertical runs >=3. Returns {groups:[{el,cells:[]}], cells:[]}.
function findMatches() {
  var mark = [];
  for (var r=0;r<BR;r++){ mark[r]=[]; for(var c=0;c<BC;c++) mark[r][c]=false; }
  // horizontal
  for (var r2=0;r2<BR;r2++){
    var run=1;
    for (var c2=1;c2<=BC;c2++){
      if (c2<BC && board[r2][c2]===board[r2][c2-1]) run++;
      else { if (run>=3){ for(var i=0;i<run;i++) mark[r2][c2-1-i]=true; } run=1; }
    }
  }
  // vertical
  for (var c3=0;c3<BC;c3++){
    var run2=1;
    for (var r3=1;r3<=BR;r3++){
      if (r3<BR && board[r3][c3]===board[r3-1][c3]) run2++;
      else { if (run2>=3){ for(var j=0;j<run2;j++) mark[r3-1-j][c3]=true; } run2=1; }
    }
  }
  // group marked cells into connected same-color combos (flood fill)
  var seen=[]; for(var rr=0;rr<BR;rr++){seen[rr]=[];for(var cc2=0;cc2<BC;cc2++)seen[rr][cc2]=false;}
  var groups=[], all=[];
  for (var ra=0;ra<BR;ra++) for (var ca=0;ca<BC;ca++){
    if (mark[ra][ca] && !seen[ra][ca]){
      var el=board[ra][ca], stack=[[ra,ca]], cells=[];
      seen[ra][ca]=true;
      while(stack.length){
        var p=stack.pop(); cells.push({r:p[0],c:p[1]}); all.push({r:p[0],c:p[1]});
        var nb=[[p[0]+1,p[1]],[p[0]-1,p[1]],[p[0],p[1]+1],[p[0],p[1]-1]];
        for (var n=0;n<nb.length;n++){ var nr=nb[n][0],nc=nb[n][1];
          if(nr>=0&&nr<BR&&nc>=0&&nc<BC&&!seen[nr][nc]&&mark[nr][nc]&&board[nr][nc]===el){ seen[nr][nc]=true; stack.push([nr,nc]); }
        }
      }
      groups.push({el:el, cells:cells});
    }
  }
  return { groups:groups, cells:all };
}
// collapse: remove cells, drop above, refill top
function collapseBoard(cells) {
  for (var k=0;k<cells.length;k++) board[cells[k].r][cells[k].c] = -1;
  for (var c=0;c<BC;c++){
    var write=BR-1;
    for (var r=BR-1;r>=0;r--){
      if (board[r][c]!==-1){ board[write][c]=board[r][c]; if(write!==r) board[r][c]=-1; write--; }
    }
    for (var r2=write;r2>=0;r2--) board[r2][c]=randEl();
  }
}

// ── RESOLVE A MOVE (cascade combos -> damage) ────────────────────────────────
function resolveMove() {
  battle.phase = 'RESOLVE';
  battle.combos = [];
  battle.comboShown = 0;
  battle.resolveT = 0;
  // gather cascade synchronously into a queue of combo events
  var comboCount = 0;
  var elementHits = {}; // el -> total orbs cleared this move
  while (true) {
    var m = findMatches();
    if (!m.cells.length) break;
    for (var g=0; g<m.groups.length; g++) {
      comboCount++;
      var grp = m.groups[g];
      elementHits[grp.el] = (elementHits[grp.el]||0) + grp.cells.length;
      battle.combos.push({ el:grp.el, cells:grp.cells.slice(), n:grp.cells.length, idx:comboCount });
    }
    collapseBoard(m.cells);
  }
  battle.lastComboCount = comboCount;
  // compute damage AFTER combo count known (combo multiplier).
  // combo multiplier: +25% per combo beyond first
  var comboMult = 1 + 0.25*Math.max(0, comboCount-1);
  battle._elementHits = elementHits;
  battle._comboMult = comboMult;
  battle._dmgApplied = false;
  if (comboCount === 0) {
    // During the DRAG step, a no-match move would leave the demo hand pointing
    // at a now-scrambled board. Re-seed the teachable board and stay in INPUT
    // (no enemy turn) so the taught gesture stays valid, but bounded so a
    // player who keeps making the same non-match move (or an automated solver)
    // can't get stuck in a deterministic reseed loop: after a couple of fumbles
    // we let normal play resume.
    if (tutorialActive && GF.tutorial.active && GF.tutorial.step === 0 && (battle._tutReseeds|0) < 2) {
      battle._tutReseeds = (battle._tutReseeds|0) + 1;
      buildTutorialBoard(); battle.phase='INPUT'; battle.moveTimer=0; battle.dragOrb=null; return;
    }
    battle.phase = 'ENEMY'; battle.enemyTurnT=0; battle.enemyActing=-1; return;
  }
  GF.setShake(comboCount>=4?1.0:0.4);
  battle.comboFlash = 1;
}

// apply the damage from the resolved combos to enemies (called after anim)
function applyDamage() {
  if (battle._dmgApplied) return;
  battle._dmgApplied = true;
  var hits = battle._elementHits, comboMult = battle._comboMult;
  var healOrbs = hits[EL.HEART] || 0;
  // heal team from heart orbs
  if (healOrbs > 0) {
    var heal = Math.round(healOrbs * 60 * comboMult);
    battle.teamHp = Math.min(battle.teamHpMax, battle.teamHp + heal);
    floatUp(L.teamY, '+'+heal, '#ff8cbe');
    GF.sfx('pickup');
  }
  // for each element with cleared orbs, the matching team units attack
  var anyAttack = false;
  for (var el=0; el<5; el++) {
    var orbs = hits[el] || 0;
    if (!orbs) continue;
    // base per-orb damage scaled by combo, summed across team units of that element
    var attackers = battle.units.filter(function(u){ return u.hp>0 && u.el===el; });
    if (!attackers.length) continue;
    anyAttack = true;
    // total power = sum(unit.atk) * orbsFactor * comboMult
    var orbsFactor = 1 + (orbs-3)*0.5;  // more orbs in the combo = bigger hit
    if (orbsFactor < 1) orbsFactor = 1;
    var teamPow = 0;
    for (var a=0;a<attackers.length;a++){ teamPow += attackers[a].atk; attackers[a].atkAnim = 1; }
    // distribute to a target enemy (focus weakest-to-this-element first, else first alive)
    var alive = battle.enemies.filter(function(e){return e.hp>0;});
    if (!alive.length) continue;
    // pick target: prefer one we're strong against
    var target = alive[0], bestM = 0;
    for (var t=0;t<alive.length;t++){ var mm=elMult(el, alive[t].el); if(mm>bestM){bestM=mm; target=alive[t];} }
    var mult = elMult(el, target.el);
    var dmg = Math.round(teamPow * orbsFactor * comboMult * mult);
    target.hp = Math.max(0, target.hp - dmg);
    target.hitFlash = 1;
    var label = dmg;
    var col = mult>1 ? '#ffe05a' : (mult<1 ? '#9fb6c8' : '#ffffff');
    floatUp(enemyAnchorY(target), ''+dmg, col, ORB_COLS[el].glow);
    if (mult>1) floatUp(enemyAnchorY(target)-26*GF.S, GF.t('super'), '#ffd23a');
    else if (mult<1) floatUp(enemyAnchorY(target)-26*GF.S, GF.t('weak'), '#9fb6c8');
    GF.sfx('hit');
  }
  if (anyAttack) GF.setShake(0.5);
  // check wave/battle outcome
  if (battle.enemies.every(function(e){return e.hp<=0;})) {
    advanceWaveOrWin();
  } else {
    battle.phase = 'ENEMY'; battle.enemyTurnT = 0; battle.enemyActing=-1;
  }
}

function advanceWaveOrWin() {
  battle.waveIdx++;
  if (battle.waveIdx >= battle.waves.length) {
    battle.phase = 'WIN';
    onBattleWin();
  } else {
    battle.enemies = battle.waves[battle.waveIdx];
    battle.phase = 'WAVECLEAR';
    battle.waveBanner = 1.4;
    GF.sfx('levelup');
  }
}

// enemy turn: each alive enemy ticks cooldown; when 0, attacks team
function enemyTurnStep(dt) {
  battle.enemyTurnT += dt;
  // simple: after a short telegraph, all ready enemies hit, then back to input
  if (battle.enemyTurnT < 0.45) return;
  var totalDmg = 0;
  for (var i=0;i<battle.enemies.length;i++){
    var e = battle.enemies[i];
    if (e.hp<=0) continue;
    e.cd--;
    if (e.cd<=0){ e.cd = e.turns; totalDmg += e.atk; e.atkAnim = 1; }
  }
  if (totalDmg>0) {
    battle.teamHp = Math.max(0, battle.teamHp - totalDmg);
    floatUp(L.teamY-30*GF.S, '-'+totalDmg, '#ff5a5a');
    GF.sfx('hurt'); GF.setShake(0.6);
    // flash a couple of units
    for (var u=0;u<battle.units.length;u++){ if(battle.units[u].hp>0) battle.units[u].hitFlash=1; }
  }
  if (battle.teamHp<=0) {
    battle.phase = 'LOSE';
    onBattleLose();
  } else {
    // new move
    battle.phase = 'INPUT';
    battle.moveTimer = 0;
    ensurePlayableBoard(); // guarantee a move exists (reshuffle if stuck)
  }
}
// true if SOME adjacent swap would create a >=3 match (a real playable move)
function hasValidMove(){
  function makesMatch(){ return findMatches().cells.length>0; }
  for (var r=0;r<BR;r++) for (var c=0;c<BC;c++){
    // try swap right
    if (c+1<BC){ swap(r,c,r,c+1); var ok=makesMatch(); swap(r,c,r,c+1); if(ok) return true; }
    if (r+1<BR){ swap(r,c,r+1,c); var ok2=makesMatch(); swap(r,c,r+1,c); if(ok2) return true; }
  }
  return false;
}
function swap(r1,c1,r2,c2){ var t=board[r1][c1]; board[r1][c1]=board[r2][c2]; board[r2][c2]=t; }
function ensurePlayableBoard(){
  // reshuffle until at least one move exists AND no pre-made match (clean start)
  var guard=0;
  while (guard++<30){
    if (findMatches().cells.length>0){ // clear any accidental pre-matches first
      var m=findMatches(); for(var k=0;k<m.cells.length;k++) board[m.cells[k].r][m.cells[k].c]=randEl();
      continue;
    }
    if (hasValidMove()) return;
    fillBoardFull(); // fillBoardFull already strips pre-matches
  }
}

function onBattleWin() {
  GF.sfx('win'); GF.happytime();
  if (battle.daily) { onDailyWin(); return; }
  // rewards: essence + a ticket; unlock next stage
  var reward = 60 + battle.stageIdx*40;
  meta.essence += reward;
  meta.tickets += 1;
  if (battle.stageIdx >= meta.stageUnlocked && battle.stageIdx < STAGES.length-1) {
    meta.stageUnlocked = battle.stageIdx+1;
  }
  battle._rewardEss = reward;
  saveMeta();
  GF.gameEnded();
}
function onDailyWin() {
  // attribute the clear to the day the stage was GENERATED (battle.st.day), not
  // wall-clock now — handles a run started before midnight and won just after.
  var today = (battle.st && typeof battle.st.day === 'number') ? battle.st.day : dayNumber();
  var first = (meta.lastDailyClear !== today);
  if (first) {
    // streak = +1 if yesterday's trial was cleared, else reset to 1
    meta.dailyStreak = (meta.lastDailyClear === today - 1) ? (meta.dailyStreak|0) + 1 : 1;
    meta.lastDailyClear = today;
    var streak = meta.dailyStreak;
    var ess = 80 + streak * 30;
    var tk = 1;
    var milestone = (streak % 7 === 0); // every 7th consecutive day = jackpot (D7 hook)
    if (milestone) { tk += 2; ess += 250; }
    meta.essence += ess; meta.tickets += tk;
    battle._rewardEss = ess; battle._rewardTk = tk;
    battle._streak = streak; battle._milestone = milestone; battle._dailyFirst = true;
  } else {
    // already cleared today — replayable for practice, small consolation only
    meta.essence += 40;
    battle._rewardEss = 40; battle._rewardTk = 0;
    battle._streak = meta.dailyStreak|0; battle._milestone = false; battle._dailyFirst = false;
  }
  saveMeta();
  GF.gameEnded();
}
function onBattleLose() {
  GF.sfx('lose');
  battle.pendingAd = true; // offer revive via rewarded ad
  GF.gameEnded();
}

// ── FLOATERS ──────────────────────────────────────────────────────────────
function floatUp(y, txt, col, glow) {
  battle.floatDmg.push({ x: GF.cx + (Math.random()-0.5)*60*GF.S, y:y, txt:txt, col:col, glow:glow||null, t:0, vy:-1.4*GF.S });
}
function enemyAnchorY(e){ return L.enemyY + 30*GF.S; }

// ===========================================================================
//  LAYOUT
// ===========================================================================
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  L = {};
  L.topH = H * 0.30;          // enemy zone
  L.teamH = H * 0.135;        // team strip
  // board zone fills the rest
  var pad = Math.max(6, W*0.012);
  L.boardTop = L.topH + L.teamH;
  var boardAreaH = H - L.boardTop - pad;
  var boardAreaW = W - pad*2;
  var cell = Math.min(boardAreaW/BC, boardAreaH/BR);
  L.cell = cell;
  L.boardW = cell*BC; L.boardH = cell*BR;
  L.boardX = (W - L.boardW)/2;
  L.boardY = L.boardTop + (boardAreaH - L.boardH)/2 + pad*0.5;
  L.enemyY = L.topH*0.42;
  L.teamY = L.topH + L.teamH*0.5;
  // hud
  L.hudY = 8*S;
}

function cellRect(r,c){ return { x:L.boardX + c*L.cell, y:L.boardY + r*L.cell, s:L.cell }; }
function cellCenter(r,c){ return { x:L.boardX + c*L.cell + L.cell/2, y:L.boardY + r*L.cell + L.cell/2 }; }
function cellAt(px,py){
  if (px<L.boardX||px>L.boardX+L.boardW||py<L.boardY||py>L.boardY+L.boardH) return null;
  var c = Math.floor((px-L.boardX)/L.cell), r = Math.floor((py-L.boardY)/L.cell);
  if (r<0||r>=BR||c<0||c>=BC) return null;
  return { r:r, c:c };
}

// ===========================================================================
//  INPUT (pointer events; tight drag with rect-scale recompute each event)
// ===========================================================================
function evtPos(e) {
  var rect = canvas.getBoundingClientRect();
  var sx = canvas.width / rect.width, sy = canvas.height / rect.height;
  var cx = (e.touches ? e.touches[0].clientX : e.clientX);
  var cy = (e.touches ? e.touches[0].clientY : e.clientY);
  return { x: (cx - rect.left)*sx, y: (cy - rect.top)*sy };
}
var pointerDown = false;
// scroll-press state for the hub list screens (TEAM/COLLECTION). A press inside
// a scroll region becomes a DRAG-to-scroll when it moves past TAP_SLOP; a press
// that stays within TAP_SLOP is a TAP (item select), fired on release. Pinned
// buttons (outside the scroll region) also resolve on release via the screen's
// click handler, so a drag-scroll never accidentally triggers them.
var TAP_SLOP = 8;   // px (game-space) of movement that still counts as a tap
var press = null;   // { x0, y0, scroll, moved }

// which scroll controller owns the current hub screen (null elsewhere)
function activeScroll() {
  if (gs === 'TEAM') return teamScroll;
  if (gs === 'COLLECTION') return collScroll;
  return null;
}

function onDown(x,y) {
  // mute toggle (global)
  if (muteBtn && hit(muteBtn, x, y)) { var m=GF.toggleMute(); GF.setMusicMuted(m); GF.sfx('tap'); return; }
  // hub list screens: start a press that may become a scroll-drag or a tap.
  // The drag does NOT begin here - only once movement crosses TAP_SLOP in
  // onMove - so a clean tap (sub-slop) never scrolls the list.
  var sc = activeScroll();
  if (sc) {
    press = { x0:x, y0:y, scroll: sc.contains(x,y) ? sc : null, moved:false };
    return;   // selection / button taps resolve in onUp (or as a scroll-drag)
  }
  // route to screen
  if (gs === 'MENU') return menuClick(x,y);
  if (gs === 'STAGESEL') return stageSelClick(x,y);
  if (gs === 'SUMMON') return summonClick(x,y);
  if (gs === 'BATTLE') return battleDown(x,y);
}
function onMove(x,y) {
  if (press) {
    // Only treat it as a scroll-DRAG once movement crosses TAP_SLOP; below the
    // slop it stays a tap (no scroll, so sub-slop jitter never moves the list).
    if (!press.moved && (Math.abs(x-press.x0)>TAP_SLOP || Math.abs(y-press.y0)>TAP_SLOP)) {
      press.moved = true;
      if (press.scroll) press.scroll.dragStart(press.y0);   // begin the drag from the ORIGINAL press y
    }
    if (press.moved && press.scroll) press.scroll.dragMove(y);
    return;
  }
  if (gs === 'BATTLE' && battle && battle.dragOrb && battle.phase==='INPUT') {
    var dr = battle.dragOrb;
    dr.x = x; dr.y = y;
    var cell = cellAt(x,y);
    if (cell && (cell.r!==dr.curR || cell.c!==dr.curC)) {
      // swap dragged orb with the cell it moved into (P&D style)
      var tmp = board[cell.r][cell.c];
      board[cell.r][cell.c] = board[dr.curR][dr.curC];
      board[dr.curR][dr.curC] = tmp;
      dr.curR = cell.r; dr.curC = cell.c;
      GF.sfx('tap');
    }
  }
}
function onUp(x,y) {
  if (press) {
    if (press.scroll) press.scroll.dragEnd();
    if (!press.moved) {   // a genuine tap -> route to the screen's click handler
      if (gs === 'TEAM') teamClick(x,y);
      else if (gs === 'COLLECTION') collClick(x,y);
    }
    press = null;
    return;
  }
  if (gs === 'BATTLE' && battle && battle.dragOrb) {
    battle.dragOrb = null;
    if (battle.phase==='INPUT') {
      battle.phase = 'PRERESOLVE';
      battle._preT = 0;
    }
  }
}
// mouse-wheel scrolling on desktop for the active hub list
function onWheel(dy) {
  var sc = activeScroll();
  if (sc) { sc.handleWheel(dy); }
}

canvas.addEventListener('mousedown', function(e){ e.preventDefault(); var p=evtPos(e); pointerDown=true; onDown(p.x,p.y); });
window.addEventListener('mousemove', function(e){ if(!pointerDown) return; var p=evtPos(e); onMove(p.x,p.y); });
window.addEventListener('mouseup', function(e){ if(!pointerDown) return; pointerDown=false; var p=evtPos(e); onUp(p.x,p.y); });
canvas.addEventListener('touchstart', function(e){ e.preventDefault(); var p=evtPos(e); pointerDown=true; onDown(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchmove', function(e){ e.preventDefault(); if(!pointerDown) return; var p=evtPos(e); onMove(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchend', function(e){ e.preventDefault(); if(!pointerDown) return; pointerDown=false; var t=e.changedTouches[0]; var rect=canvas.getBoundingClientRect(); var sx=canvas.width/rect.width, sy=canvas.height/rect.height; onUp((t.clientX-rect.left)*sx,(t.clientY-rect.top)*sy); }, {passive:false});
// mouse-wheel: convert client delta to game-space px (canvas px / CSS px) so
// scroll speed matches the rendered scale. gf-lib already preventDefaults wheel
// globally; this listener feeds the active hub list its delta.
canvas.addEventListener('wheel', function(e){ var rect=canvas.getBoundingClientRect(); var sy=canvas.height/rect.height; onWheel(e.deltaY*sy); }, {passive:false});

function battleDown(x,y) {
  // back-to-menu button (top-left)
  if (L.backBtn && hit(L.backBtn,x,y)) { confirmQuitToHub(); return; }
  // help (?) re-opens the tutorial (any phase), but not while it's already up
  if (L.helpBtn && hit(L.helpBtn,x,y) && !GF.tutorial.active) { reopenTutorial(); return; }
  if (battle.phase==='WIN') { return winClick(x,y); }
  if (battle.phase==='LOSE') { return loseClick(x,y); }
  if (battle.phase==='WAVECLEAR') return; // auto
  if (battle.phase!=='INPUT') return;
  // tutorial routing:
  //  - DRAG step (advance 'manual'): let the grab fall through so the player can
  //    actually perform the taught move; only the skip pill consumes the tap.
  //  - tap steps (click_any/click_target): route to handleClick so the beat
  //    advances / the tutorial closes on a tap.
  if (GF.tutorial.active) {
    var stp = GF.tutorial.steps[GF.tutorial.step];
    var sb = GF.tutorial._skipBtn;
    if (sb && x>=sb.x && x<=sb.x+sb.w && y>=sb.y && y<=sb.y+sb.h) { GF.tutorial.handleClick(x,y); tutorialActive=false; markTutorialDone(); return; }
    if (stp && (stp.advance==='click_any' || stp.advance==='click_target')) { GF.tutorial.handleClick(x,y); return; }
    // else: manual drag step — fall through to grab the orb below.
  }
  var cell = cellAt(x,y);
  if (!cell) return;
  battle.dragOrb = { fromR:cell.r, fromC:cell.c, curR:cell.r, curC:cell.c, el:board[cell.r][cell.c], x:x, y:y };
  if (battle.moveTimer<=0) battle.moveTimer = 0.0001; // start the move clock on first grab
  GF.sfx('tap');
}

function confirmQuitToHub() {
  // simply return to stage select (progress is per-stage, not mid-battle saved)
  // dismiss any active tutorial so its overlay doesn't linger on the hub
  if (GF.tutorial.active) { GF.tutorial.active = false; }
  tutorialActive = false;
  gs = 'STAGESEL'; battle = null; GF.sfx('tap');
}

function hit(r,x,y){ return r && x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h; }

// ===========================================================================
//  UPDATE
// ===========================================================================
function update(dt) {
  GF.tutorial.update(dt);
  if (dailyToast>0) dailyToast -= dt;
  if (pullReveal) { pullReveal.t += dt; }
  if (summonResult) { summonResult.t += dt; }
  if (gs !== 'BATTLE' || !battle) return;
  var b = battle;
  // animate unit/enemy flashes
  for (var i=0;i<b.units.length;i++){ if(b.units[i].hitFlash>0) b.units[i].hitFlash-=dt*3; if(b.units[i].atkAnim>0) b.units[i].atkAnim-=dt*2.2; }
  for (var j=0;j<b.enemies.length;j++){ if(b.enemies[j].hitFlash>0) b.enemies[j].hitFlash-=dt*3; if(b.enemies[j].atkAnim>0) b.enemies[j].atkAnim-=dt*2.2; }
  if (b.comboFlash>0) b.comboFlash-=dt*1.5;
  if (b.waveBanner>0) b.waveBanner-=dt;
  // floaters
  for (var f=b.floatDmg.length-1;f>=0;f--){ var fl=b.floatDmg[f]; fl.y+=fl.vy; fl.t+=dt; if(fl.t>1.1) b.floatDmg.splice(f,1); }

  if (b.phase==='INPUT') {
    if (b.dragOrb && b.moveTimer>=0.0001) {
      b.moveTimer += dt;
      if (b.moveTimer >= b.moveMax) {
        // time up — drop the orb, resolve
        b.dragOrb = null; b.phase='PRERESOLVE'; b._preT=0;
      }
    }
  } else if (b.phase==='PRERESOLVE') {
    b._preT += dt;
    if (b._preT > 0.12) resolveMove();
  } else if (b.phase==='RESOLVE') {
    b.resolveT += dt;
    // reveal combos one by one then apply damage
    var revealEvery = 0.16;
    var shouldShow = Math.min(b.combos.length, Math.floor(b.resolveT/revealEvery)+1);
    if (shouldShow > b.comboShown) {
      b.comboShown = shouldShow;
      GF.sfx('coin');
      GF.setShake(Math.min(1.2, 0.2 + b.comboShown*0.08));
    }
    if (b.comboShown >= b.combos.length && b.resolveT > b.combos.length*revealEvery + 0.18) {
      applyDamage();
      // tutorial: advance from the DRAG step (0) only when the player's first
      // move actually resolves a combo (real action gate, not a timer).
      if (GF.tutorial.active && GF.tutorial.step === 0) GF.tutorial.next();
    }
  } else if (b.phase==='ENEMY') {
    enemyTurnStep(dt);
  } else if (b.phase==='WAVECLEAR') {
    if (b.waveBanner<=0) { b.phase='INPUT'; b.moveTimer=0; ensurePlayableBoard(); }
  }
}

// ===========================================================================
//  DRAW
// ===========================================================================
function draw() {
  var W=GF.W, H=GF.H, S=GF.S;
  layout();
  ctx.fillStyle = '#0a0a14'; ctx.fillRect(0,0,W,H);
  if (gs==='BATTLE' && battle) drawBattle();
  else if (gs==='MENU') drawMenu();
  else if (gs==='STAGESEL') drawStageSel();
  else if (gs==='TEAM') drawTeam();
  else if (gs==='COLLECTION') drawCollection();
  else if (gs==='SUMMON') drawSummon();
  // global mute icon top-right
  drawMute();
  // overlays
  if (pullReveal) drawPullReveal();
  if (summonResult) drawSummonResult();
  if (dailyToast>0) drawDailyToast();
  // tutorial overlay last
  GF.tutorial.draw(ctx);
}

function drawMute() {
  var S=GF.S, r=14*S, x=GF.W-22*S, y=22*S;
  muteBtn = { x:x-r-6*S, y:y-r-6*S, w:(r+6*S)*2, h:(r+6*S)*2 };

// ── BATTLE RENDER ────────────────────────────────────────────────────────────
function drawBattle() {
  var W=GF.W, H=GF.H, S=GF.S, b=battle;
  // background art (stage bg) — fills top+team+behind board faint
  var bgImg = IMG[b.st.bg];
  if (bgImg) {
    drawCover(bgImg, 0, 0, W, L.boardTop);
    // darken
    ctx.fillStyle='rgba(8,8,20,0.30)'; ctx.fillRect(0,0,W,L.boardTop);
  } else {
    var g=ctx.createLinearGradient(0,0,0,L.boardTop); g.addColorStop(0,'#1a1330'); g.addColorStop(1,'#0e1024');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,L.boardTop);
  }
  drawEnemies();
  drawTeamStrip();
  drawBoard();
  drawBattleHUD();
  // combo flash overlay
  if (b.comboFlash>0 && b.lastComboCount>=3) {
    ctx.save(); ctx.globalAlpha = b.comboFlash*0.18; ctx.fillStyle = b.lastComboCount>=5?'#ffd23a':'#7cf0ff';
    ctx.fillRect(0,0,W,H); ctx.restore();
  }
  // big combo count during resolve
  if (b.phase==='RESOLVE' && b.comboShown>0) {
    var cc = b.comboShown;
    ctx.save();
    var sc = 1 + Math.min(0.5, cc*0.05);
    ctx.font = 'bold '+(clampF(46*S,30,72)*sc)+'px Inter, system-ui, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle = cc>=5?'#ffd23a':(cc>=3?'#7cf0ff':'#ffffff');
    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur=20*S;
    ctx.fillText(cc+' '+GF.t('combo'), GF.cx, L.boardTop - 16*S);
    ctx.restore();
  }
  // floaters
  for (var f=0;f<b.floatDmg.length;f++){ var fl=b.floatDmg[f];
    ctx.save(); ctx.globalAlpha = Math.max(0,1-fl.t/1.1);
    ctx.font='bold '+clampF(20*S,14,30)+'px Inter, system-ui, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    if (fl.glow){ ctx.shadowColor=fl.glow; ctx.shadowBlur=10*S; }
    ctx.fillStyle=fl.col; ctx.fillText(fl.txt, fl.x, fl.y); ctx.restore();
  }
  // wave-clear banner
  if (b.phase==='WAVECLEAR' && b.waveBanner>0) {
    ctx.save(); ctx.globalAlpha=Math.min(1,b.waveBanner); ctx.textAlign='center';
    ctx.font='bold '+clampF(30*S,20,44)+'px Inter, system-ui, sans-serif'; ctx.fillStyle='#7cf0ff';
    ctx.shadowColor='#7cf0ff'; ctx.shadowBlur=18*S;
    ctx.fillText(GF.t('next'), GF.cx, GF.cy); ctx.restore();
  }
  // win / lose overlays
  if (b.phase==='WIN') drawWinOverlay();
  if (b.phase==='LOSE') drawLoseOverlay();
}

    ctx.font='bold '+clampF(16*S,13,20)+'px Inter, system-ui'; ctx.fillStyle='#cdd'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('?', hx, hy+0.5*S);

// enemies row
function drawEnemies() {
  var S=GF.S, b=battle, list=b.enemies, n=list.length;
  var slotW = GF.W/(n+0.4);
  for (var i=0;i<n;i++){
    var e=list[i];
    var cx2 = slotW*(i+0.5)+GF.W*0.05;
    var cy2 = L.enemyY;
    var sz = (e.boss?Math.min(GF.W*0.5,L.topH*0.78):Math.min(GF.W*0.30,L.topH*0.55));
    // attack lunge
    var lunge = e.atkAnim>0 ? Math.sin(e.atkAnim*Math.PI)*10*S : 0;
    // portrait
    var artKey = e.boss ? 'boss_voidtitan' : enemyArtForEl(e.el);
    var img = IMG[artKey];
    ctx.save();
    if (e.hp<=0) ctx.globalAlpha=0.25;
    ctx.translate(cx2, cy2+lunge);
    if (e.hitFlash>0){ ctx.shadowColor='#fff'; ctx.shadowBlur=22*S*e.hitFlash; }
    if (img) drawImgCentered(img, 0, 0, sz, sz);
    else { ctx.fillStyle=ORB_COLS[e.el].a; GF.rr(ctx,-sz/2,-sz/2,sz,sz,12*S); ctx.fill(); }
    ctx.restore();
    // element pip
    drawElPip(cx2 - sz*0.36, cy2 - sz*0.42, e.el, 7*S);
    // hp bar
    if (e.hp>0) {
      var bw=sz*0.92, bh=7*S, bx=cx2-bw/2, by=cy2+sz*0.46;
      ctx.fillStyle='rgba(0,0,0,0.55)'; GF.rr(ctx,bx,by,bw,bh,bh/2); ctx.fill();
      var frac=e.hp/e.hpMax;
      ctx.fillStyle = e.boss?'#ff5a5a':'#ff7a4a'; GF.rr(ctx,bx,by,bw*frac,bh,bh/2); ctx.fill();
      ctx.font='bold '+clampF(10*S,8,14)+'px Inter, system-ui'; ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(e.hp+' / '+e.hpMax, cx2, by-2*S);
      // cooldown pips (turns until this enemy attacks) — vector dots, no emoji
      var pips=Math.max(0,Math.min(4,e.cd)), pr2=2.6*S, pgap=3.2*S, ptotW=pips*(pr2*2)+(pips-1)*pgap;
      for (var pk=0; pk<pips; pk++){ ctx.beginPath(); ctx.arc(cx2-ptotW/2+pr2+pk*(pr2*2+pgap), by+bh+7*S, pr2, 0, Math.PI*2); ctx.fillStyle= pips<=1?'#ff5a5a':'#ffd23a'; ctx.fill(); }
    }
  }
}
function enemyArtForEl(el){
  // reuse a non-team monster art per element so enemies have faces
  var map = { 0:'beast_magmadrake', 1:'beast_tidefin', 2:'beast_thornbeast', 3:'beast_lumenowl', 4:'beast_nightmaw', 5:'beast_sparkwing' };
  return map[el];
}

// team strip (5 portraits + team hp bar)
function drawTeamStrip() {
  var S=GF.S, b=battle, n=b.units.length;
  var y0=L.topH, h=L.teamH;
  // team hp bar across the top of the strip
  var hbW=GF.W*0.9, hbH=10*S, hbX=(GF.W-hbW)/2, hbY=y0+4*S;
  ctx.fillStyle='rgba(0,0,0,0.5)'; GF.rr(ctx,hbX,hbY,hbW,hbH,hbH/2); ctx.fill();
  var frac=b.teamHp/b.teamHpMax;
  var hpcol = frac>0.5?'#46d86a':(frac>0.25?'#ffcf3a':'#ff5a5a');
  ctx.fillStyle=hpcol; GF.rr(ctx,hbX,hbY,hbW*Math.max(0,frac),hbH,hbH/2); ctx.fill();
  ctx.font='bold '+clampF(10*S,8,13)+'px Inter, system-ui'; ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(Math.ceil(b.teamHp)+' / '+b.teamHpMax, GF.cx, hbY+hbH/2);
  // portraits row
  var pad=4*S, slotW=(GF.W-pad*2)/Math.max(1,n);
  var pSz=Math.min(slotW*0.86, (h-hbH-10*S));
  for (var i=0;i<n;i++){
    var u=b.units[i];
    var cx2=pad+slotW*(i+0.5), cy2=hbY+hbH+ (h-hbH)*0.5 - 2*S;
    var pop = u.atkAnim>0 ? 1+Math.sin(u.atkAnim*Math.PI)*0.12 : 1;
    ctx.save(); ctx.translate(cx2,cy2); ctx.scale(pop,pop);
    // ring colored by element
    ctx.beginPath(); ctx.arc(0,0,pSz/2+2*S,0,Math.PI*2);
    ctx.fillStyle = u.hp>0?ORB_COLS[u.el].a:'#333'; ctx.fill();
    // portrait clipped to circle
    ctx.save(); ctx.beginPath(); ctx.arc(0,0,pSz/2,0,Math.PI*2); ctx.clip();
    var img=IMG[u.art];
    if (u.hitFlash>0){ ctx.shadowColor='#fff'; ctx.shadowBlur=16*S*u.hitFlash; }
    if (img) drawCover(img, -pSz/2,-pSz/2,pSz,pSz);
    else { ctx.fillStyle=ORB_COLS[u.el].b; ctx.fillRect(-pSz/2,-pSz/2,pSz,pSz); }
    ctx.restore();
    ctx.restore();
  }
}

// the orb board
function drawBoard() {
  var S=GF.S, b=battle;
  // board frame
  ctx.save();
  ctx.fillStyle='rgba(6,8,18,0.85)';
  GF.rr(ctx, L.boardX-4*S, L.boardY-4*S, L.boardW+8*S, L.boardH+8*S, 12*S); ctx.fill();
  ctx.restore();
  for (var r=0;r<BR;r++) for (var c=0;c<BC;c++){
    var el=board[r][c]; if(el<0) continue;
    var cc=cellCenter(r,c);
    var isDrag = b.dragOrb && b.dragOrb.curR===r && b.dragOrb.curC===c;
    if (isDrag) continue; // draw dragged orb last at pointer
    drawOrb(cc.x, cc.y, L.cell*0.42, el);
  }
  // dragged orb follows pointer
  if (b.dragOrb) {
    var d=b.dragOrb;
    // highlight origin cell column/row faintly
    drawOrb(d.x, d.y, L.cell*0.46, d.el, true);
  }
  // move timer ring (when dragging)
  if (b.phase==='INPUT' && b.dragOrb && b.moveTimer>0) {
    var frac = 1 - b.moveTimer/b.moveMax;
    var tx=L.boardX+L.boardW-16*S, ty=L.boardY-16*S;
    ctx.save(); ctx.lineWidth=5*S; ctx.strokeStyle='rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.arc(tx,ty,12*S,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle= frac<0.3?'#ff5a5a':'#7cf0ff';
    ctx.beginPath(); ctx.arc(tx,ty,12*S,-Math.PI/2, -Math.PI/2 + Math.PI*2*frac); ctx.stroke();
    ctx.restore();
  }
}

function drawOrb(x,y,r,el,big) {
  var col=ORB_COLS[el];
  ctx.save();
  if (big){ ctx.shadowColor=col.glow; ctx.shadowBlur=18*GF.S; }
  var g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.2, x,y,r);
  g.addColorStop(0,col.b); g.addColorStop(1,col.a);
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  // rim
  ctx.lineWidth=2*GF.S; ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.stroke();
  // glossy highlight
  ctx.beginPath(); ctx.ellipse(x-r*0.32,y-r*0.36,r*0.34,r*0.2,-0.5,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.fill();
  // element glyph (canvas-drawn, no emoji)
  drawElGlyph(x,y,r*0.62,el);
  ctx.restore();
}
// distinct vector glyph per element so colorblind-friendly + readable
function drawElGlyph(x,y,s,el){
  ctx.save(); ctx.translate(x,y); ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=Math.max(1.5,s*0.16); ctx.lineJoin='round'; ctx.lineCap='round';
  if (el===EL.FIRE){ // flame
    ctx.beginPath(); ctx.moveTo(0,-s*0.7); ctx.quadraticCurveTo(s*0.6,-s*0.1,s*0.32,s*0.4); ctx.quadraticCurveTo(s*0.1,s*0.7,0,s*0.55); ctx.quadraticCurveTo(-s*0.1,s*0.7,-s*0.32,s*0.4); ctx.quadraticCurveTo(-s*0.6,-s*0.1,0,-s*0.7); ctx.fill();
  } else if (el===EL.WATER){ // droplet
    ctx.beginPath(); ctx.moveTo(0,-s*0.7); ctx.quadraticCurveTo(s*0.55,s*0.05,0,s*0.65); ctx.quadraticCurveTo(-s*0.55,s*0.05,0,-s*0.7); ctx.fill();
  } else if (el===EL.WOOD){ // leaf
    ctx.beginPath(); ctx.moveTo(-s*0.5,s*0.5); ctx.quadraticCurveTo(-s*0.1,-s*0.6,s*0.55,-s*0.5); ctx.quadraticCurveTo(s*0.1,s*0.55,-s*0.5,s*0.5); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-s*0.4,s*0.4); ctx.lineTo(s*0.35,-s*0.35); ctx.strokeStyle='rgba(70,120,70,0.6)'; ctx.stroke();
  } else if (el===EL.LIGHT){ // sun/diamond
    ctx.beginPath(); for(var i=0;i<8;i++){ var a=i/8*Math.PI*2; var rr=(i%2?s*0.35:s*0.75); ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr); } ctx.closePath(); ctx.fill();
  } else if (el===EL.DARK){ // crescent
    ctx.beginPath(); ctx.arc(0,0,s*0.62,0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='destination-out'; ctx.beginPath(); ctx.arc(s*0.28,-s*0.12,s*0.55,0,Math.PI*2); ctx.fill();
  } else { // heart
    ctx.beginPath(); ctx.moveTo(0,s*0.55); ctx.bezierCurveTo(-s*0.9,-s*0.2,-s*0.4,-s*0.75,0,-s*0.3); ctx.bezierCurveTo(s*0.4,-s*0.75,s*0.9,-s*0.2,0,s*0.55); ctx.fill();

// Scroll controllers for the two long-list hub screens. Created lazily (the
// gf-lib makeScroll registers them for the reachability gate). The grid cells
// (L.teamGridCells / L.collGridCells) are recorded in CONTENT space; hit-testing
// converts the tap to content space via the controller's offset.
var teamScroll = null, collScroll = null;
function ensureScrolls() {
  if (!teamScroll) teamScroll = GF.makeScroll('team_roster', {x:0,y:0,w:0,h:0});
  if (!collScroll) collScroll = GF.makeScroll('coll_roster', {x:0,y:0,w:0,h:0});
}
// hit-test a CONTENT-space rect against a SCREEN-space tap, via the controller.
// The tap must land inside the viewport AND map (screen->content) into the rect.
function hitScrolled(rect, x, y, sc) {
  if (!rect || !sc) return false;
  if (!sc.contains(x,y)) return false;        // tap outside the scroll viewport
  var cy = sc.screenToContentY(y);            // (y - vp.y) + offset
  return x>=rect.x && x<=rect.x+rect.w && cy>=rect.y && cy<=rect.y+rect.h;
}
function teamClick(x,y) {
  // remove from team slot (pinned, screen space)
  for (var i=0;i<L.teamSlots.length;i++){ var ts=L.teamSlots[i];
    if (hit(ts,x,y) && ts.id){ meta.team.splice(ts.idx,1); saveMeta(); GF.sfx('tap'); return; }
  }
  // bottom buttons (pinned, screen space) - check before the grid so a cell
  // scrolled under the button strip can't be tapped through it
  if (hit(L.teamAuto,x,y)) { autoTeam(); return; }
  if (hit(L.teamBack,x,y)) { gs='STAGESEL'; GF.sfx('tap'); return; }
  // add from grid (content space, clipped to the scroll viewport). Only OWNED
  // champions can go on the team - tapping an unowned (locked) cell errors. (The
  // desktop scroll fix made the locked lower-row cells tappable for the first
  // time, exposing a latent crash where an unowned id reached drawTeam's
  // meta.owned[id].stars.)
  for (var j=0;j<L.teamGridCells.length;j++){ var gc=L.teamGridCells[j];
    if (hitScrolled(gc.rect,x,y,teamScroll)){
      var idx=meta.team.indexOf(gc.id);
      if (idx>=0){ meta.team.splice(idx,1); }
      else if (!meta.owned[gc.id]){ GF.sfx('error'); return; }
      else if (meta.team.length<5){ meta.team.push(gc.id); }
      else { GF.sfx('error'); return; }
      saveMeta(); GF.sfx('tap'); return;
    }
  }
}
function autoTeam() {
  // pick top 5 by power, spread across elements
  var ids = Object.keys(meta.owned);
  ids.sort(function(a,b){ var pa=unitStats(a,meta.owned[a].stars).atk, pb=unitStats(b,meta.owned[b].stars).atk; return pb-pa; });
  meta.team = ids.slice(0,5);
  saveMeta(); GF.sfx('reward');
}

// roster grid renderer shared by team + collection. SCROLLS: the 12-cell grid
// (4 cols x 3 rows) overflows the clip region on desktop, so it's drawn inside a
// GF scroll controller (touch-drag + wheel, hard-clamped). Cell rects are stored
// in CONTENT space (y from the viewport top); the click handlers subtract the
// controller's offset when hit-testing.
function drawRosterGrid(top, bottom, sc, teamMode) {
  var S=GF.S, W=GF.W;
  if (teamMode) L.teamGridCells=[]; else L.collGridCells=[];
  var cols=4, gap=8*S, cw=(W-20*S-gap*(cols-1))/cols, ch=cw*1.18;
  var ids = ROSTER.map(function(u){return u.id;});
  var rowH=ch+gap;
  var rows=Math.ceil(ids.length/cols);
  var vpH = bottom-top;
  // content height = all rows + a little bottom padding so the last row clears
  // the fade/scrollbar comfortably
  var contentH = rows*rowH - gap + 10*S;
  sc.setViewport({x:0, y:top, w:W, h:vpH});
  sc.setContentHeight(contentH);
  sc.update();        // inertial flick settle
  // Draw cells in CONTENT space: y measured from the region's content TOP (0).
  // begin() translates by (vp.y - offset), so content-y 0 maps to screen vp.y.
  // (Cells are stored at content-y too; hit-testing + the gate use content-y.)
  sc.begin(ctx);
  for (var i=0;i<ids.length;i++){
    var id=ids[i], owned=meta.owned[id];
    var col=i%cols, row=Math.floor(i/cols);
    var x=10*S+col*(cw+gap), y=row*rowH;   // content-space y (0 = region top)
    var rect={x:x,y:y,w:cw,h:ch};
    if (teamMode) L.teamGridCells.push({rect:rect,id:id}); else L.collGridCells.push({rect:rect,id:id});
    var u=rosterById(id);
    ctx.save();
    GF.rr(ctx,x,y,cw,ch,8*S);
    var inTeam = meta.team.indexOf(id)>=0;
    ctx.fillStyle= owned?'rgba(20,22,40,0.95)':'rgba(14,14,22,0.95)'; ctx.fill();
    // portrait
    ctx.save(); GF.rr(ctx,x+4*S,y+4*S,cw-8*S,ch*0.62,6*S); ctx.clip();
    var img=IMG[u.art];
    if (img){ if(!owned) ctx.globalAlpha=0.32; drawCover(img,x+4*S,y+4*S,cw-8*S,ch*0.62); }
    else { ctx.fillStyle=ORB_COLS[u.el].a; ctx.fillRect(x+4*S,y+4*S,cw-8*S,ch*0.62); }
    ctx.restore();
    // element ring (rarity-colored border)
    GF.rr(ctx,x,y,cw,ch,8*S); ctx.lineWidth= inTeam?3*S:2*S;
    ctx.strokeStyle= inTeam?'#ffd23a':(owned? rarColor(u.rar):'#333'); ctx.stroke();
    // element pip
    drawElPip(x+12*S, y+12*S, u.el, 8*S);
    // name + stars
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold '+clampF(11*S,9,15)+'px Inter, system-ui'; ctx.fillStyle= owned?'#fff':'#777';
    var nm=(GF.lang==='ru'?u.ru:u.en);
    ctx.fillText(fitText(nm, cw-8*S, clampF(11*S,9,15)), x+cw/2, y+ch*0.72);
    if (owned) drawStars(x+cw/2, y+ch*0.88, owned.stars, 5.5*S);
    else { ctx.fillStyle='#666'; ctx.font=clampF(9*S,8,12)+'px Inter, system-ui'; ctx.fillText(GF.t('locked'), x+cw/2, y+ch*0.88); }
    if (inTeam){ ctx.fillStyle='#ffd23a'; ctx.font='bold '+clampF(9*S,8,12)+'px Inter, system-ui'; ctx.textBaseline='top'; ctx.textAlign='right'; ctx.fillText(GF.t('equip'), x+cw-6*S, y+6*S); }
    ctx.restore();
  }
  sc.end(ctx);
  // scrollbar + top/bottom fades so the player knows there's more
  sc.draw(ctx);
}
function rarColor(r){ return r>=5?'#ffd23a':(r>=4?'#b87cff':'#6fbfff'); }
function drawStars(cx,cy,n,r){
  ctx.save(); ctx.textAlign='center';
  for (var i=0;i<5;i++){ var x=cx+(i-2)*r*1.4; ctx.fillStyle= i<n?'#ffd23a':'#3a3a48'; star(x,cy,r,5); }
  ctx.restore();
}
function star(cx,cy,r,p){ ctx.beginPath(); for(var i=0;i<p*2;i++){ var a=i/(p*2)*Math.PI*2-Math.PI/2; var rr=(i%2?r*0.45:r); ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);} ctx.closePath(); ctx.fill(); }

var summonReturn = 'MENU';

  ctx.fillText(GF.t('pity')+': '+meta.summons+' / '+PITY, GF.cx, py);

  // cost: 1 ticket per single; 10 tickets per x10 (or essence)
  ctx.font=clampF(11*S,9,15)+'px Inter, system-ui'; ctx.fillStyle='#9ab';
  wrapText(GF.t('summonhint'), GF.cx, pbY+16*S, W*0.86, clampF(15*S,12,19));

  // + ad + back) always fits, including its back button (the back button used to

  // gate caught it). Stack height = bbh + gap + bbh + gap + 46 + gap + 46.
  var bw2=Math.min(W*0.8,340*S), bx2=GF.cx-bw2/2, bbh=54*S, gap2=12*S, adH=46*S, backH=46*S;
  var stackH = bbh + gap2 + bbh + gap2 + adH + gap2 + backH;

function ticketWord(){ return GF.lang==='ru'?'б.':'tkt'; }
function summonClick(x,y) {
  if (hit(L.sumOne,x,y)) { trySummon(1); return; }
  if (hit(L.sumTen,x,y)) { trySummon(10); return; }
  if (hit(L.sumAd,x,y)) { GF.showAd('rewarded').then(function(){ meta.essence+=50; saveMeta(); GF.sfx('reward'); }); return; }
  if (hit(L.sumBack,x,y)) { gs=summonReturn; GF.sfx('tap'); return; }
}
function trySummon(n) {
  var tcost=n, ecost = n===1?100:900;
  if (meta.tickets>=tcost) { meta.tickets-=tcost; }
  else if (meta.essence>=ecost) { meta.essence-=ecost; }
  else { GF.sfx('error'); return; }
  GF.sfx('unlock');
  var res=doSummon(n);
  if (n===1) { pullReveal = { id:res.bestId, isNew:res.anyNew, stars:meta.owned[res.bestId].stars, t:0 }; }
  else { summonResult = { got:res.got, t:0 }; }
}

// ── PULL REVEAL OVERLAY ──────────────────────────────────────────────────────
function drawPullReveal() {
  var S=GF.S, W=GF.W, H=GF.H, pr=pullReveal;
  var u=rosterById(pr.id);
  // backdrop
  ctx.fillStyle='rgba(4,4,12,'+Math.min(0.92,pr.t*3)+')'; ctx.fillRect(0,0,W,H);
  var appear=Math.min(1,pr.t*2.2);
  var rs=rarColor(u.rar);
  // burst rays
  ctx.save(); ctx.translate(GF.cx,H*0.42); ctx.globalAlpha=0.5*appear;
  for (var i=0;i<16;i++){ ctx.rotate(Math.PI/8 + pr.t*0.3); ctx.fillStyle=rs; ctx.globalAlpha=0.12*appear; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-14*S, -W); ctx.lineTo(14*S,-W); ctx.closePath(); ctx.fill(); }
  ctx.restore();
  // portrait
  var psz=Math.min(W*0.62,H*0.40)*appear;
  var img=IMG[u.art];
  ctx.save(); ctx.translate(GF.cx, H*0.42); ctx.shadowColor=rs; ctx.shadowBlur=40*S*appear;
  ctx.beginPath(); ctx.arc(0,0,psz/2,0,Math.PI*2); ctx.save(); ctx.clip();
  if (img) drawImgCentered(img,0,0,psz,psz); else { ctx.fillStyle=ORB_COLS[u.el].a; ctx.fillRect(-psz/2,-psz/2,psz,psz);} ctx.restore();
  ctx.lineWidth=4*S; ctx.strokeStyle=rs; ctx.beginPath(); ctx.arc(0,0,psz/2,0,Math.PI*2); ctx.stroke();
  ctx.restore();
  // name + rarity stars
  ctx.textAlign='center';
  ctx.font='bold '+clampF(26*S,18,38)+'px Inter, system-ui'; ctx.fillStyle='#fff'; ctx.globalAlpha=appear;
  ctx.fillText((GF.lang==='ru'?u.ru:u.en), GF.cx, H*0.66);
  drawStars(GF.cx, H*0.70, pr.stars, 10*S);
  ctx.globalAlpha=1;
  // NEW or STAR UP tag
  if (pr.t>0.4){
    ctx.font='bold '+clampF(18*S,13,24)+'px Inter, system-ui';
    ctx.fillStyle= pr.isNew?'#2ee07a':'#ffd23a';
    ctx.fillText(pr.isNew?GF.t('newunit'):GF.t('starup'), GF.cx, H*0.75);
  }
  // tap to dismiss
  if (pr.t>0.6){ ctx.font=clampF(13*S,11,17)+'px Inter, system-ui'; ctx.fillStyle='#9ab'; ctx.fillText(GF.lang==='ru'?'нажми чтобы продолжить':'tap to continue', GF.cx, H*0.84); }
}
// global tap to dismiss pull/summon overlays (handled before other clicks)
var _origOnDown = onDown;
onDown = function(x,y){
  if (pullReveal && pullReveal.t>0.4){ pullReveal=null; GF.sfx('tap'); return; }

function drawSummonResult() {
  var S=GF.S, W=GF.W, H=GF.H, sr=summonResult;
  ctx.fillStyle='rgba(4,4,12,0.92)'; ctx.fillRect(0,0,W,H);

  // grid of 10 results
  var cols=5, gap=8*S, cw=(W*0.9-gap*(cols-1))/cols, ch=cw*1.16;

  for (var i=0;i<sr.got.length;i++){

    GF.rr(ctx,x,y,cw,ch,6*S); ctx.fillStyle='rgba(18,20,36,0.95)'; ctx.fill();
    ctx.save(); GF.rr(ctx,x+3*S,y+3*S,cw-6*S,ch*0.66,4*S); ctx.clip(); var img=IMG[u.art]; if(img) drawCover(img,x+3*S,y+3*S,cw-6*S,ch*0.66); else {ctx.fillStyle=ORB_COLS[u.el].a; ctx.fillRect(x+3*S,y+3*S,cw-6*S,ch*0.66);} ctx.restore();
    GF.rr(ctx,x,y,cw,ch,6*S); ctx.lineWidth=2*S; ctx.strokeStyle=rarColor(u.rar); ctx.stroke();
    drawStars(x+cw/2, y+ch*0.84, u.rar, 4.5*S);
    ctx.restore();
  }
  if (sr.t>0.7){ ctx.fillStyle='#9ab'; ctx.font=clampF(13*S,11,17)+'px Inter, system-ui'; ctx.textAlign='center'; ctx.fillText(GF.lang==='ru'?'нажми чтобы продолжить':'tap to continue', GF.cx, H*0.9); }
}

function drawDailyToast() {

// ===========================================================================
//  IMAGE HELPERS
// ===========================================================================
var IMG = {};
var IMG_KEYS = [
  'beast_emberpup','beast_cinderhound','beast_magmadrake','beast_tidefin','hero_marina',
  'beast_mossback','beast_thornbeast','beast_sparkwing','beast_lumenowl','hero_solara',
  'beast_nightmaw','hero_kael','boss_voidtitan',
  'bg_volcano','bg_ocean','bg_forest','bg_void'
];
function loadImages() {
  return Promise.all(IMG_KEYS.map(function(k){
    return new Promise(function(res){
      var done=false, fin=function(){ if(done)return; done=true; res(); };
      var img=new Image();
      img.onload=function(){ IMG[k]=img; fin(); };
      img.onerror=function(){ IMG[k]=null; fin(); };
      img.src='./assets/'+k+'.webp';
      setTimeout(fin, 6000); // never let a hung/blocked request (e.g. Brave shields) stall boot
    });
  }));
}
// draw image centered, "contain" (whole image fits, may letterbox) — for portraits
function drawImgCentered(img,cx,cy,w,h){
  if (!img||!img.width) return;
  var ar=img.width/img.height, tar=w/h, dw,dh;
  if (ar>tar){ dw=w; dh=w/ar; } else { dh=h; dw=h*ar; }
  ctx.drawImage(img, cx-dw/2, cy-dh/2, dw, dh);
}
// draw image as "cover" (fills target, crops overflow) — for bg + thumbnails
function drawCover(img,x,y,w,h){
  if (!img||!img.width){ return; }
  var ar=img.width/img.height, tar=w/h, sw,sh,sx,sy;
  if (ar>tar){ sh=img.height; sw=sh*tar; sx=(img.width-sw)/2; sy=0; }
  else { sw=img.width; sh=sw/tar; sx=0; sy=(img.height-sh)/2; }
  ctx.drawImage(img, sx,sy,sw,sh, x,y,w,h);
}

// ── TEXT HELPERS ─────────────────────────────────────────────────────────────
function clampF(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function wrapText(text,cx,y,maxW,lineH){
  var words=String(text).split(/\s+/), line='', lines=[];
  for (var i=0;i<words.length;i++){ var probe=line?line+' '+words[i]:words[i];
    if (ctx.measureText(probe).width>maxW && line){ lines.push(line); line=words[i]; } else line=probe; }
  if (line) lines.push(line);
  for (var j=0;j<lines.length;j++) ctx.fillText(lines[j], cx, y+j*lineH);
}
function fitText(txt,maxW,fs){
  ctx.font='bold '+fs+'px Inter, system-ui';
  if (ctx.measureText(txt).width<=maxW) return txt;
  var t=txt; while(t.length>1 && ctx.measureText(t+'…').width>maxW) t=t.slice(0,-1);
  return t+'…';
}

function startTutorial(forceShow) {
  // Step 1 shows a HAND dragging the orb at (row,fromC) across to (row,toC).
  // The board is seeded (buildTutorialBoard) so this exact drag lines up 3 of
  // TUT_EL -> a real, winnable move. It advances when the player's first move
  // actually resolves a combo (GF.tutorial.next in the RESOLVE path, gated to
  // step 0). Step 2 is a short "matches power your champions" beat.
  var row = TUT_DRAG.row, fromC = TUT_DRAG.fromC, toC = TUT_DRAG.toC;
  GF.tutorial.start([
    { text: GF.t('tutdrag'),
      target: function(){ var cc=cellCenter(row,fromC); return { x: cc.x, y: cc.y, r: L.cell*0.5 }; },
      target2: function(){ var cc=cellCenter(row,toC); return { x: cc.x, y: cc.y, r: L.cell*0.5 }; },
      gesture:'drag', advance:'manual' },
    { text: GF.t('tutmatch'),
      target: function(){ return { x: GF.cx, y: L.enemyY, r: 60*GF.S }; },
      advance:'click_any',
      // tutorial COMPLETED: now (and only now) mark it seen + persist, so a
      // mid-tutorial quit/reload re-teaches instead of being suppressed.
      onAdvance: function(){ tutorialActive = false; markTutorialDone(); } },
  ], { storageKey:'orbchamp_tut_v1', force: forceShow || !meta.seenTut });
}
// Persist the "tutorial seen" flag. Called on COMPLETE or SKIP (not on start).
// The GF.tutorial system writes orbchamp_tut_v1 itself; this mirrors it into
// the save so tutorialPending() agrees across reloads.
function markTutorialDone() {
  if (!meta.seenTut) { meta.seenTut = true; saveMeta(); }
}

// Reopen the tutorial from the in-battle ? button. Re-seeding the deterministic
// teachable board only makes sense at the very start (stage 1, wave 1); doing
// it mid-run would reset/exploit a live board, so reopen is gated there. On any
// later stage/wave the ? is a harmless no-op.
function reopenTutorial() {
  if (gs !== 'BATTLE' || !battle) return;
  if (battle.phase !== 'INPUT') return;          // don't reseed mid-resolve/enemy turn
  if (battle.stageIdx !== 0 || battle.waveIdx !== 0) return; // only the first tutorial battle
  tutorialActive = true;
  buildTutorialBoard();
  battle.dragOrb = null;
  startTutorial(true);
  GF.sfx('tap');
}

// ===========================================================================
//  REACHABILITY GATE (window.__gfReach / __gfTour)
// ===========================================================================
// Reports the CURRENT screen's interactive hit-rects so reachability_check.js
// can prove every button + champion cell can be brought fully on-screen. The
// scroll screens (TEAM/COLLECTION) report grid cells in the scroll region's
// CONTENT space (y from the region top) + scrollId so the gate reads scrollMaxY;
// pinned buttons are reported in screen space with pinned:true. L.* rects are
// populated by draw() every frame, so __gfReach is read AFTER a frame.
function _ri(id, r, pinned){ if(!r) return null; return { id:id, x:r.x, y:r.y, w:r.w, h:r.h, pinned:!!pinned }; }
function _push(arr, it){ if(it) arr.push(it); }
function reachState(){
  var S=GF.S, H=GF.H, items=[], res={ screen:gs, items:items, screenH:H, viewportH:H };
  if (gs==='MENU'){
    _push(items,_ri('play',L.menuPlay)); _push(items,_ri('collection',L.menuColl)); _push(items,_ri('summon',L.menuSummon));
  } else if (gs==='STAGESEL'){
    if (L.dailyStage) _push(items,_ri('daily_trial',L.dailyStage));
    if (L.dailyBtn) _push(items,_ri('daily',L.dailyBtn));
    for (var i=0;i<(L.stageCards||[]).length;i++) _push(items,_ri('stage_'+i, L.stageCards[i].rect));
    _push(items,_ri('team',L.ssTeam)); _push(items,_ri('back',L.ssBack));
  } else if (gs==='TEAM'){
    res.scrollId='team_roster';
    res.viewportH = teamScroll ? teamScroll.vp.h : H;       // region viewport height
    // team slots + bottom buttons are PINNED (drawn outside the scroll region)
    for (var s=0;s<(L.teamSlots||[]).length;s++) _push(items,_ri('slot_'+s, L.teamSlots[s], true));
    _push(items,_ri('auto',L.teamAuto,true)); _push(items,_ri('back',L.teamBack,true));
    // champion cells already stored in CONTENT space (y from region top)
    for (var c=0;c<(L.teamGridCells||[]).length;c++){ var gc=L.teamGridCells[c];
      _push(items,_ri('champ_'+gc.id, gc.rect)); }
  } else if (gs==='COLLECTION'){
    res.scrollId='coll_roster';
    res.viewportH = collScroll ? collScroll.vp.h : H;
    _push(items,_ri('summon',L.collSummon,true)); _push(items,_ri('back',L.collBack,true));
    for (var k=0;k<(L.collGridCells||[]).length;k++){ var cc2=L.collGridCells[k];
      _push(items,_ri('champ_'+cc2.id, cc2.rect)); }
  } else if (gs==='SUMMON'){
    _push(items,_ri('summon1',L.sumOne)); _push(items,_ri('summon10',L.sumTen));
    _push(items,_ri('ad',L.sumAd)); _push(items,_ri('back',L.sumBack));
  } else if (gs==='BATTLE' && battle){
    if (battle.phase==='WIN'){ _push(items,_ri('win_summon',L.winSummon)); _push(items,_ri('win_next',L.winNext)); }
    else if (battle.phase==='LOSE'){ if(L.loseRevive) _push(items,_ri('lose_revive',L.loseRevive)); _push(items,_ri('lose_retry',L.loseRetry)); _push(items,_ri('lose_hub',L.loseHub)); }
    else { _push(items,_ri('back',L.backBtn)); if(L.helpBtn) _push(items,_ri('help',L.helpBtn)); }
  }
  return res;
}
// Tour: every screen the gate steps through. Each `go` puts the game in that
// state WITHOUT side effects that block the next step. The battle screens need a
// live battle; start one (silently) if absent.
function _ensureBattle(){ if(!battle){ window._silent=true; startBattle(Math.min(meta.stageUnlocked,STAGES.length-1)); window._silent=false; } }
var REACH_TOUR = [
  { name:'menu',       go:function(){ battle=null; gs='MENU'; } },
  { name:'stage_select', go:function(){ battle=null; gs='STAGESEL'; } },
  { name:'team',       go:function(){ battle=null; gs='TEAM'; if(teamScroll) teamScroll.scrollTo(0); } },
  { name:'collection', go:function(){ battle=null; gs='COLLECTION'; if(collScroll) collScroll.scrollTo(0); } },
  { name:'summon',     go:function(){ summonReturn='MENU'; gs='SUMMON'; } },
  { name:'battle',     go:function(){ _ensureBattle(); if(GF.tutorial) GF.tutorial.active=false; tutorialActive=false; battle.phase='INPUT'; gs='BATTLE'; } },
  { name:'battle_win', go:function(){ _ensureBattle(); battle.phase='WIN'; battle._rewardEss=battle._rewardEss||60; gs='BATTLE'; } },
  { name:'battle_lose',go:function(){ _ensureBattle(); battle.phase='LOSE'; battle.reviveUsed=false; gs='BATTLE'; } },
];

// ===========================================================================
//  BOOT
// ===========================================================================
GF.init({
  designW: 393, designH: 852,
  strings: STRINGS,
  saveKey: SAVE_KEY,
  onReady: function() {
    loadMeta();
    GF.startMusic({ preset:'arcade', muted:GF.muted });
    // expose state for the test gate
    // Normalize gs for the test harness:
    //   gs='BATTLE' -> 'PLAYING' (INPUT/RESOLVE/ENEMY/WAVECLEAR), 'GAMEOVER' (LOSE), 'WIN' (WIN)
    //   gs='STAGESEL'/'TEAM'/'COLLECTION'/'SUMMON' -> 'MENU' (pre-game hub screens)
    GF.exposeState(function(){
      var normGs;
      if (gs === 'BATTLE' && battle) {
        if (battle.phase === 'LOSE') normGs = 'GAMEOVER';
        else if (battle.phase === 'WIN') normGs = 'WIN';
        else normGs = 'PLAYING';
      } else if (gs === 'MENU') {
        normGs = 'MENU';
      } else {
        // STAGESEL / TEAM / COLLECTION / SUMMON are all pre-game hub screens
        normGs = 'MENU';
      }
      return {
        gs: normGs,
        rawGs: gs,
        phase: battle?battle.phase:null,
        stage: battle?battle.stageIdx:null,
        wave: battle?battle.waveIdx:null,
        teamHp: battle?Math.round(battle.teamHp):null,
        enemyHp: battle?battle.enemies.reduce(function(a,e){return a+e.hp;},0):null,
        owned: Object.keys(meta.owned).length,
        team: meta.team.length,
        essence: meta.essence, tickets: meta.tickets, summons: meta.summons,
        stageUnlocked: meta.stageUnlocked,
      };
    });
    // reachability gate: expose the per-screen hit-rects + a screen tour so
    // reachability_check.js can prove all UI is reachable (no clipped buttons).
    GF.exposeReach(reachState);
    GF.exposeTour(REACH_TOUR);
    // load images then maybe autostart
    loadImages().then(function(){
      if (window.__GF_AUTOSTART && !window._silent) {
        // platform builds: drop straight into a battle (stage 0 = first/default
        // stage). Suppress the tutorial overlay so the player lands in INPUT
        // (gs='BATTLE', phase='INPUT') which normalizes to 'PLAYING' for the
        // test harness and the Yandex autostart requirement.
        meta.seenTut = true; // suppress tutorial on autostart platforms
        startBattle(0);
        // After startBattle arms the tutorial timer, cancel it immediately
        if (GF.tutorial) GF.tutorial.active = false;
        tutorialActive = false;
        if (battle) { battle.phase = 'INPUT'; battle.moveTimer = 0; }
      }
    });
  },
  onUpdate: update,
  onDraw: draw,
});

// when a battle starts (gallery flow via PLAY), arm the tutorial on the first
// stage. newBattle has already seeded the deterministic tutorial board when
// tutorialPending() is true, so the demo-hand drag completes a real match.
var _origStart = startBattle;
startBattle = function(idx){
  var armTut = tutorialPending(idx);   // capture tutorial-pending state before the battle starts (seenTut is flipped later by markTutorialDone)
  _origStart(idx);
  if (armTut) setTimeout(startTutorial, 80);
};

// test seam: jump straight into a battle, or force a game-over (used by screenshot/gate tooling).
// n=99 (or any value >=99) = force LOSE phase so forceGameOver() triggers GAMEOVER state.
// n=anything else (or omitted) = start a battle (gs='BATTLE', phase='INPUT' = PLAYING).
window._jumpLevel = function(n){
  if ((n|0) >= 99) {
    // Force game-over: start a battle if needed, then immediately lose it
    if (gs !== 'BATTLE' || !battle) {
      window._silent = true;
      startBattle(Math.min(meta.stageUnlocked, STAGES.length-1));
      window._silent = false;
    }
    if (battle) {
      battle.teamHp = 0;
      battle.phase = 'LOSE';
      battle.pendingAd = true;
      battle.reviveUsed = false;
    }
  } else {
    // Jump into active gameplay
    if (gs !== 'BATTLE' || !battle) {
      window._silent = true;
      startBattle(Math.min(meta.stageUnlocked, STAGES.length-1));
      window._silent = false;
    }
    if (battle) {
      // Suppress the tutorial overlay so the game immediately lands in INPUT
      if (GF.tutorial) GF.tutorial.active = false;
      tutorialActive = false;
      battle.phase = 'INPUT';
      battle.moveTimer = 0;
    }
  }
};
// screenshot setup: lands directly in PLAYING with orbs and enemies visible.
// Called by take_screenshots.js before capturing Yandex promo shots.
window._setupForScreenshot = function() {
  window._silent = true;
  startBattle(0); // stage 1: Cinder Cavern, has Wood/Fire enemies -> all elements visible
  window._silent = false;
  if (GF.tutorial) GF.tutorial.active = false;
  tutorialActive = false;
  if (battle) {
    battle.phase = 'INPUT';
    battle.moveTimer = 0;
    // Seed a representative mid-game board with varied orbs already in play
    fillBoardFull();
    ensurePlayableBoard();
  }
};
// dev seams for verification (see Game Build Hygiene §8 — drive real actions in-browser)
window._orbInfo = function(){ try { return window.__gfState(); } catch(e){ return null; } };
window._orbGrant = function(id){ grantUnit(id,true); rebuildTeamIfNeeded(); saveMeta(); };
window._orbBoard = function(){ return board.map(function(r){return r.slice();}); };
window._orbSetBoard = function(b){ board=b; };
window._orbForceWin = function(){ if(battle){ battle.enemies.forEach(function(e){e.hp=0;}); } };
window._orbStartStage = function(i){ startBattle(GF.clamp(i|0,0,STAGES.length-1)); };
window._orbGoto = function(s){ gs=s; };
window._orbGeom = function(r,c){ var cc=cellCenter(r,c); return { x:cc.x, y:cc.y, cell:L.cell, BR:BR, BC:BC, boardX:L.boardX, boardY:L.boardY }; };
window._orbButtons = function(){ // current screen's primary buttons (game-space rects) for the harness to tap
  return { menuPlay:L.menuPlay, menuColl:L.menuColl, menuSummon:L.menuSummon,
    ssTeam:L.ssTeam, ssBack:L.ssBack, dailyBtn:L.dailyBtn, dailyStage:L.dailyStage, stageCards:L.stageCards,
    sumOne:L.sumOne, sumTen:L.sumTen, sumAd:L.sumAd, sumBack:L.sumBack,
    winSummon:L.winSummon, winNext:L.winNext, loseRetry:L.loseRetry, loseHub:L.loseHub, loseRevive:L.loseRevive,
    collSummon:L.collSummon, collBack:L.collBack, teamBack:L.teamBack, teamAuto:L.teamAuto }; };
window._orbDismissOverlay = function(){ if(pullReveal&&pullReveal.t>0.1){pullReveal.t=1;pullReveal=null;return 'pull';} if(summonResult&&summonResult.t>0.1){summonResult.t=1;summonResult=null;return 'summon';} return null; };
// test seams to manipulate persisted meta (it's IIFE-private) + read combo info
window._orbMeta = function(patch){ if(patch){ for(var k in patch) meta[k]=patch[k]; saveMeta(); } return { tickets:meta.tickets, essence:meta.essence, lastDaily:meta.lastDaily, lastDailyClear:meta.lastDailyClear, dailyStreak:meta.dailyStreak, team:meta.team.slice(), owned:Object.keys(meta.owned).length, stageUnlocked:meta.stageUnlocked, summons:meta.summons }; };
window._orbCombo = function(){ return battle?{count:battle.lastComboCount, flash:battle.comboFlash}:null; };
window._orbTeamEls = function(){ return battle?battle.units.map(function(u){return u.el;}):[]; };
// tutorial verification seams
window._orbTutInfo = function(){ return { tutorialActive:tutorialActive, active:GF.tutorial.active, step:GF.tutorial.step, drag:TUT_DRAG, el:TUT_EL }; };
window._orbTutDragGeom = function(){ var a=cellCenter(TUT_DRAG.row,TUT_DRAG.fromC), b=cellCenter(TUT_DRAG.row,TUT_DRAG.toC); return { from:{x:a.x,y:a.y}, to:{x:b.x,y:b.y} }; };
window._orbHelpBtn = function(){ return L.helpBtn||null; };
// scroll verification seams: read/drive the hub-list scroll + locate a champion
// cell's CURRENT on-screen rect (content rect minus the controller offset).
window._orbScroll = function(which, setTo){
  var sc = which==='coll'?collScroll:teamScroll; if(!sc) return null;
  if (typeof setTo==='number') sc.scrollTo(setTo);
  return { offset:sc.offset, maxOffset:sc.maxOffset(), vpY:sc.vp.y, vpH:sc.vp.h, contentH:sc.contentH, scrollable:sc.scrollable() };
};
window._orbChampScreenRect = function(id){
  var cells = gs==='COLLECTION'?L.collGridCells:L.teamGridCells;
  var sc = gs==='COLLECTION'?collScroll:teamScroll;
  if(!cells||!sc) return null;
  for (var i=0;i<cells.length;i++){ if(cells[i].id===id){ var r=cells[i].rect;
    // cell.rect.y is CONTENT-space (0 = region top). Screen y = vp.y + content - offset.
    var sy = sc.contentToScreenY(r.y);   // (r.y - offset) + vp.y
    return { x:r.x, y:sy, w:r.w, h:r.h, cx:r.x+r.w/2, cy:sy+r.h/2,
             visible: sy>=sc.vp.y-1 && (sy+r.h)<=sc.vp.y+sc.vp.h+1 }; } }
  return null;
};

})();
</script>
