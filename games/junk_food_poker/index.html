  <script src="/sdk.js"></script>

    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── GAME-SPECIFIC CONFIG ─────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Junk Food Poker',
    sub:   'Build the tastiest hand!',
    play: 'PLAY', retry: 'RETRY',
    score: 'SCORE', best: 'BEST',
    gameover: 'GAME OVER',
    round: 'ROUND', target: 'TARGET',
    swap: 'SWAP', score_btn: 'SCORE',
    swaps: 'SWAPS',
    next_round: 'NEXT ROUND', win: 'YOU WIN!',
    feast: 'FEAST COMPLETE!',
    select_msg: 'Tap cards to swap (max 3)',
    score_msg: 'Tap SCORE to reveal hand',
    no_swaps: 'No swaps left',

    h_pair: 'Pair',
    h_two_pair: 'Two Pair',

  },
  ru: {
    title: 'Покер Фастфуд',
    sub:   'Собери вкусную руку!',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ',
    score: 'ОЧКИ', best: 'РЕКОРД',
    gameover: 'ИГРА ОКОНЧЕНА',
    round: 'РАУНД', target: 'ЦЕЛЬ',
    swap: 'ОБМЕН', score_btn: 'СЧЁТ',
    swaps: 'ОБМЕНЫ',
    next_round: 'ДАЛЬШЕ', win: 'ПОБЕДА!',
    feast: 'ПИР ОКОНЧЕН!',
    select_msg: 'Жми на карты для обмена (макс 3)',
    score_msg: 'Жми СЧЁТ чтобы показать руку',
    no_swaps: 'Обменов больше нет',
    h_high: 'Старшая',
    h_pair: 'Пара',
    h_two_pair: 'Две Пары',
    h_triple: 'Тройной Комбо',
    h_full: 'Полный Бургер',
    h_meal: 'Комплекс',
    h_five: 'Пир из Пяти',
  },
};

var SPRITE_NAMES = [
  'card_burger','card_fries','card_taco','card_pizza',
  'card_donut','card_soda','card_hotdog','card_sushi',
  'card_back','sauce_ketchup','sauce_mustard','sauce_mayo'
];

// 8 food types; each card has a "type" (food sprite) and "rank" (1-5)
var FOODS = [
  { id:'burger',  name:'BURGER',  color:'#d2691e' },
  { id:'fries',   name:'FRIES',   color:'#f5c542' },
  { id:'taco',    name:'TACO',    color:'#e67e22' },
  { id:'pizza',   name:'PIZZA',   color:'#c0392b' },
  { id:'donut',   name:'DONUT',   color:'#ff79b0' },
  { id:'soda',    name:'SODA',    color:'#3498db' },
  { id:'hotdog',  name:'HOTDOG',  color:'#cd853f' },
  { id:'sushi',   name:'SUSHI',   color:'#16a085' },
];
// "Color theme" groups for Meal Deal (flush): warm vs cool
var WARM = { burger:1, fries:1, taco:1, pizza:1, donut:1, hotdog:1 };
var COOL = { soda:1, sushi:1 };

var SAUCES = [
  { id:'ketchup', name:'KETCHUP', color:'#e74c3c', mult:1.5, kind:'mult' },
  { id:'mustard', name:'MUSTARD', color:'#f1c40f', mult:2.0, kind:'mult' },
  { id:'mayo',    name:'MAYO',    color:'#fafad2', mult:1.0, kind:'wild' },
];

var HAND_INFO = {
  high:     { score:5,   key:'h_high'     },
  pair:     { score:20,  key:'h_pair'     },
  two_pair: { score:40,  key:'h_two_pair' },
  triple:   { score:60,  key:'h_triple'   },
  full:     { score:120, key:'h_full'     },
  meal:     { score:90,  key:'h_meal'     },
  five:     { score:250, key:'h_five'     },
};

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | SELECT | REVEAL | ROUND_END | GAMEOVER | WIN
var score = 0, best = 0;
var roundIdx = 0;            // 0..4
var roundTarget = 0;
var roundScore = 0;
var hand = [];               // 5 cards
var selected = [];           // indices selected for swap
var swapsLeft = 1;
var deck = [];
var revealHand = null;
var revealAnim = 0;
var roundTargets = [60, 110, 180, 280, 420];

// ── HELPERS ──────────────────────────────────────────────────────────────
function newDeck() {
  var d = [];
  for (var i = 0; i < FOODS.length; i++) {
    for (var r = 1; r <= 5; r++) {
      d.push({ kind:'food', food: FOODS[i].id, rank: r });
    }
  }
  for (var s = 0; s < SAUCES.length; s++) {
    d.push({ kind:'sauce', sauce: SAUCES[s].id });
    d.push({ kind:'sauce', sauce: SAUCES[s].id });
  }
  for (var k = d.length - 1; k > 0; k--) {
    var j = Math.floor(Math.random() * (k+1));
    var tmp = d[k]; d[k] = d[j]; d[j] = tmp;
  }
  return d;
}

function drawCardFromDeck() {
  if (deck.length === 0) deck = newDeck();
  return deck.pop();
}

function startRound() {
  hand = [];
  for (var i = 0; i < 5; i++) hand.push(drawCardFromDeck());
  selected = [];
  swapsLeft = 1;
  roundScore = 0;
  revealHand = null;
  revealAnim = 0;
  roundTarget = roundTargets[roundIdx];
  gs = 'SELECT';
}

function startGame() {
  score = 0;
  roundIdx = 0;
  deck = newDeck();
  startRound();
}

function gameOver() {
  if (score > best) {
    best = score;
    try { localStorage.setItem('junk_food_poker_best', best); } catch (e) {}
  }
  gs = 'GAMEOVER';
  GF.gameEnded();
}

function gameWin() {
  if (score > best) {
    best = score;
    try { localStorage.setItem('junk_food_poker_best', best); } catch (e) {}
  }
  gs = 'WIN';
  GF.gameEnded();
}

// ── HAND EVALUATION ──────────────────────────────────────────────────────
function evaluateHand(cards) {
  var foods = [];
  var mult = 1.0;
  var bestSauce = null;
  var bestSauceMult = 0;
  var wilds = 0;
  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    if (c.kind === 'sauce') {
      var sd = SAUCES.filter(function(s){return s.id===c.sauce;})[0];
      if (sd.kind === 'wild') {
        wilds++;
      } else {
        mult *= sd.mult;
      }
      if (sd.mult > bestSauceMult) {
        bestSauce = sd.id;
        bestSauceMult = sd.mult;
      }
    } else {
      foods.push(c);
    }
  }

  var counts = {};
  for (var j = 0; j < foods.length; j++) {
    var f = foods[j].food;
    counts[f] = (counts[f] || 0) + 1;
  }
  var sorted = Object.keys(counts).map(function(k){return counts[k];}).sort(function(a,b){return b-a;});
  var topCount = sorted[0] || 0;
  var secondCount = sorted[1] || 0;
  var totalEffectiveTop = topCount + wilds;

  var type = 'high';
  if (totalEffectiveTop >= 5) type = 'five';
  else if ((topCount >= 3 && secondCount >= 2) ||
           (topCount + wilds >= 3 && secondCount + Math.max(0, wilds - (3 - topCount)) >= 2 && totalEffectiveTop >= 3 && secondCount >= 2) ||
           (totalEffectiveTop >= 4 && secondCount >= 1)) {
    type = 'full';
  } else if (totalEffectiveTop >= 3) type = 'triple';
  else if (topCount >= 2 && secondCount >= 2) type = 'two_pair';
  else if (topCount >= 2 || (topCount >= 1 && wilds >= 1)) type = 'pair';

  // Meal Deal (flush): all foods + wilds in same color theme
  if (foods.length > 0 && (foods.length + wilds === 5)) {
    var allWarm = true, allCool = true;
    for (var k = 0; k < foods.length; k++) {
      var fid = foods[k].food;
      if (!WARM[fid]) allWarm = false;
      if (!COOL[fid]) allCool = false;
    }
    if (allWarm || allCool) {
      var mealScore = HAND_INFO.meal.score;
      var currentScore = HAND_INFO[type].score;
      if (mealScore > currentScore) type = 'meal';
    }
  }

  return { type: type, mult: mult, sauce: bestSauce };
}

function computeHandScore(ev) {
  return Math.round(HAND_INFO[ev.type].score * ev.mult);
}

// Pre-baked dense hands for screenshots so shots show variety + interesting combos.
var _jumpHands = [
  // Shot variant 0: full burger + sauce (high value)
  [
    { kind:'food',  food:'burger', rank:3 },
    { kind:'food',  food:'burger', rank:4 },
    { kind:'food',  food:'burger', rank:1 },
    { kind:'food',  food:'fries',  rank:5 },
    { kind:'sauce', sauce:'mustard' },
  ],
  // Shot variant 1: meal deal (flush) + ketchup
  [
    { kind:'food',  food:'donut',  rank:2 },
    { kind:'food',  food:'pizza',  rank:5 },
    { kind:'food',  food:'taco',   rank:3 },
    { kind:'food',  food:'fries',  rank:4 },
    { kind:'sauce', sauce:'ketchup' },
  ],
  // Shot variant 2: triple combo + mayo wildcard
  [
    { kind:'food',  food:'sushi',  rank:5 },
    { kind:'food',  food:'sushi',  rank:2 },
    { kind:'food',  food:'soda',   rank:4 },
    { kind:'sauce', sauce:'mayo' },
    { kind:'food',  food:'hotdog', rank:3 },
  ],
];
var _jumpIdx = 0;

window._jumpLevel = function(n) {
  var lv = (typeof n === 'number') ? Math.max(1, Math.min(5, n)) - 1 : 2;
  score = 250 + lv * 80;
  roundIdx = lv;
  deck = newDeck();
  startRound();
  // Pick a random pre-baked dense hand so shots vary across the screenshot run.
  var pick = Math.floor(Math.random() * _jumpHands.length);
  hand = _jumpHands[pick].slice();
  selected = [pick % 5];
};

// ── LAYOUT ───────────────────────────────────────────────────────────────
function getCardLayout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var cardW = Math.min(W * 0.16, 130 * S);
  if (cardW < 60) cardW = Math.min(W * 0.18, 120);
  var cardH = cardW * 1.4;
  var gap = cardW * 0.12;
  var totalW = cardW * 5 + gap * 4;
  if (totalW > W * 0.96) {
    cardW = (W * 0.96 - gap * 4) / 5;
    cardH = cardW * 1.4;
    totalW = cardW * 5 + gap * 4;
  }
  var startX = (W - totalW) / 2;
  var y = H * 0.42 - cardH / 2;
  var rects = [];
  for (var i = 0; i < 5; i++) {
    rects.push({ x: startX + i * (cardW + gap), y: y, w: cardW, h: cardH });
  }
  return { rects: rects, cardW: cardW, cardH: cardH };
}

function getButtonsLayout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var btnW = Math.min(W * 0.36, 240 * S);
  var btnH = Math.min(H * 0.09, 60 * S);
  var gap = 20 * S;
  var totalW = btnW * 2 + gap;
  var startX = (W - totalW) / 2;
  var y = H * 0.80;
  return {
    swap:  { x: startX, y: y, w: btnW, h: btnH },
    score: { x: startX + btnW + gap, y: y, w: btnW, h: btnH },
    next:  { x: (W - btnW) / 2, y: y, w: btnW, h: btnH },
  };
}

// ── INPUT ────────────────────────────────────────────────────────────────
function tapHandler(x, y) {
  if (gs === 'SELECT') {
    var lay = getCardLayout();
    for (var i = 0; i < 5; i++) {
      var r = lay.rects[i];
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        var idx = selected.indexOf(i);
        if (idx >= 0) {
          selected.splice(idx, 1);
        } else if (selected.length < 3 && swapsLeft > 0) {
          selected.push(i);
          GF.spawnParticles(r.x + r.w/2, r.y + r.h/2, '#FFD700', 10);
        }
        return;
      }
    }
    var b = getButtonsLayout();
    if (x >= b.swap.x && x <= b.swap.x + b.swap.w && y >= b.swap.y && y <= b.swap.y + b.swap.h) {
      doSwap();
      return;
    }
    if (x >= b.score.x && x <= b.score.x + b.score.w && y >= b.score.y && y <= b.score.y + b.score.h) {
      doScore();
      return;
    }
  } else if (gs === 'ROUND_END') {
    var b2 = getButtonsLayout();
    if (x >= b2.next.x && x <= b2.next.x + b2.next.w && y >= b2.next.y && y <= b2.next.y + b2.next.h) {
      nextRound();
      return;
    }
  }
}

function doSwap() {
  if (swapsLeft <= 0 || selected.length === 0) return;
  for (var i = 0; i < selected.length; i++) {
    var idx = selected[i];
    var r = getCardLayout().rects[idx];
    GF.spawnParticles(r.x + r.w/2, r.y + r.h/2, '#4dd0e1', 14);
    hand[idx] = drawCardFromDeck();
  }
  swapsLeft--;
  selected = [];
  GF.setShake(0.5);
}

function doScore() {
  var ev = evaluateHand(hand);
  var s = computeHandScore(ev);
  revealHand = { type: ev.type, mult: ev.mult, sauce: ev.sauce, total: s };
  roundScore = s;
  score += s;
  revealAnim = 0;
  gs = 'REVEAL';
  GF.spawnParticles(GF.cx, GF.cy, '#FFD700', 40);
  GF.setShake(1.0);
  GF.spawnFloat(GF.cx, GF.H * 0.30, GF.t(HAND_INFO[ev.type].key) + ' +' + s, '#FFD700');
}

function nextRound() {
  if (roundScore < roundTarget) {
    gameOver();
    return;
  }
  roundIdx++;
  if (roundIdx >= 5) {
    gameWin();
    return;
  }
  startRound();
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (gs === 'REVEAL') {
    revealAnim += dt * 0.7;
    if (revealAnim >= 1.6) {
      gs = 'ROUND_END';
    }
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  drawFeltBackground(ctx);

  if (gs === 'MENU') {
    drawTitleBackdrop(ctx);
    GF.drawOverlay({
      title: GF.t('title'),
      sub: GF.t('sub'),
      btnText: GF.t('play'),
      btnFn: startGame,
      bestText: best > 0 ? GF.t('best') + ': ' + best : null,
    });
    return;
  }

  if (gs === 'GAMEOVER') {
    drawHand(ctx);
    drawHUD(ctx);
    GF.drawOverlay({
      title: GF.t('gameover'),
      sub: GF.t('score') + ': ' + score,
      btnText: GF.t('retry'),
      btnFn: startGame,
      bestText: GF.t('best') + ': ' + best,
    });
    return;
  }

  if (gs === 'WIN') {
    drawHand(ctx);
    drawHUD(ctx);
    GF.drawOverlay({
      title: GF.t('win'),
      sub: GF.t('feast') + '  ' + GF.t('score') + ': ' + score,
      btnText: GF.t('retry'),
      btnFn: startGame,
      bestText: GF.t('best') + ': ' + best,
    });
    return;
  }

  drawHUD(ctx);
  drawHand(ctx);

  if (gs === 'SELECT') drawButtons(ctx);
  if (gs === 'ROUND_END') drawNextButton(ctx);
  if (gs === 'REVEAL') drawRevealBanner(ctx);
}

function drawFeltBackground(ctx) {
  var g = ctx.createLinearGradient(0, 0, 0, GF.H);
  g.addColorStop(0, '#0f3a1f');
  g.addColorStop(0.55, '#1a5530');
  g.addColorStop(1, '#0a2515');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, GF.W, GF.H);

  var vg = ctx.createRadialGradient(GF.cx, GF.cy, GF.W * 0.25, GF.cx, GF.cy, GF.W * 0.85);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, GF.W, GF.H);
}

function drawTitleBackdrop(ctx) {
  var t = (performance.now() % 60000) / 1000;
  for (var i = 0; i < 6; i++) {
    var fx = ((i * 137 + t * 18) % (GF.W + 200)) - 100;
    var fy = ((i * 211 + t * 12) % (GF.H + 200)) - 100;
    ctx.globalAlpha = 0.13;
    drawCardBack(ctx, fx, fy, 80 * GF.S, 110 * GF.S);
  }
  ctx.globalAlpha = 1;
}

function drawHUD(ctx) {
  var fs = GF.clamp(18 * GF.S, 13, 24);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textBaseline = 'top';

  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(GF.t('round') + ' ' + (roundIdx + 1) + '/5', 14 * GF.S, 14 * GF.S);

  ctx.textAlign = 'center';
  var tgtCol = roundScore >= roundTarget && roundScore > 0 ? '#7CFC00' : '#FFD700';
  ctx.fillStyle = tgtCol;
  ctx.fillText(GF.t('target') + ': ' + roundScore + '/' + roundTarget, GF.cx, 14 * GF.S);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('score') + ': ' + score, GF.W - 14 * GF.S, 14 * GF.S);

  ctx.font = GF.clamp(14 * GF.S, 10, 18) + 'px sans-serif';
  ctx.fillStyle = '#9ddbb1';
  ctx.textAlign = 'center';
  var subMsg = (gs === 'SELECT') ? (GF.t('swaps') + ': ' + swapsLeft + '   ' + GF.t('select_msg')) : '';
  ctx.fillText(subMsg, GF.cx, 14 * GF.S + fs + 8);
}

function drawHand(ctx) {
  var lay = getCardLayout();
  for (var i = 0; i < hand.length; i++) {
    var r = lay.rects[i];
    var sel = selected.indexOf(i) >= 0;
    var lift = sel ? -10 * GF.S : 0;
    drawSingleCard(ctx, hand[i], r.x, r.y + lift, r.w, r.h, sel);
  }
}

function drawSingleCard(ctx, card, x, y, w, h, selected_) {
  ctx.save();
  ctx.shadowColor = selected_ ? 'rgba(255,215,0,0.7)' : 'rgba(0,0,0,0.45)';
  ctx.shadowBlur  = selected_ ? 24 : 12;
  ctx.shadowOffsetY = selected_ ? 6 : 8;
  GF.rr(ctx, x, y, w, h, 12 * GF.S);
  ctx.fillStyle = '#fffaf0';
  ctx.fill();
  ctx.restore();

  ctx.lineWidth = 3 * GF.S;
  ctx.strokeStyle = selected_ ? '#FFD700' : '#5a3d2b';
  GF.rr(ctx, x, y, w, h, 12 * GF.S);
  ctx.stroke();

  var pad = 6 * GF.S;
  GF.rr(ctx, x+pad, y+pad, w-pad*2, h-pad*2, 8*GF.S);
  ctx.fillStyle = '#fff5e6';
  ctx.fill();

  if (card.kind === 'sauce') drawSauceCard(ctx, card, x, y, w, h);
  else                       drawFoodCard(ctx, card, x, y, w, h);
}

function drawFoodCard(ctx, card, x, y, w, h) {
  var foodObj = FOODS.filter(function(f){return f.id===card.food;})[0];
  var sprite = 'card_' + card.food;

  var sw = w * 0.78;
  var sx = x + w/2;
  var sy = y + h * 0.48;
  GF.drawSprite(sprite, sx, sy, sw, function(c, cx, cy, s) {
    c.fillStyle = foodObj.color;
    c.beginPath();
    c.arc(cx, cy, s * 0.42, 0, Math.PI * 2);
    c.fill();
    c.fillStyle = '#fff';
    c.font = 'bold ' + (s * 0.4) + 'px sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(foodObj.id.charAt(0).toUpperCase(), cx, cy);
  });

  var rfs = w * 0.22;
  ctx.font = 'bold ' + rfs + 'px sans-serif';
  ctx.fillStyle = foodObj.color;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(card.rank, x + w * 0.10, y + h * 0.06);

  ctx.save();
  ctx.translate(x + w * 0.90, y + h * 0.94);
  ctx.rotate(Math.PI);
  ctx.fillText(card.rank, 0, 0);
  ctx.restore();

  ctx.font = 'bold ' + (w * 0.11) + 'px sans-serif';
  ctx.fillStyle = '#5a3d2b';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(foodObj.name, x + w/2, y + h - 8 * GF.S);
}

function drawSauceCard(ctx, card, x, y, w, h) {
  var sd = SAUCES.filter(function(s){return s.id===card.sauce;})[0];
  var sprite = 'sauce_' + card.sauce;

  ctx.save();
  ctx.shadowColor = sd.color;
  ctx.shadowBlur = 18 * GF.S;
  GF.rr(ctx, x+4, y+4, w-8, h-8, 8*GF.S);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fill();
  ctx.restore();

  var sw = w * 0.76;
  var sx = x + w/2;
  var sy = y + h * 0.48;
  GF.drawSprite(sprite, sx, sy, sw, function(c, cx, cy, s) {
    c.fillStyle = sd.color;
    GF.rr(c, cx - s*0.18, cy - s*0.4, s*0.36, s*0.8, s*0.08);
    c.fill();
    c.fillStyle = '#fff';
    c.font = 'bold ' + (s * 0.22) + 'px sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText('!', cx, cy);
  });

  var rfs = w * 0.18;
  ctx.font = 'bold ' + rfs + 'px sans-serif';
  ctx.fillStyle = sd.color;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  var lbl = sd.kind === 'wild' ? '★' : ('×' + sd.mult);
  ctx.fillText(lbl, x + w * 0.10, y + h * 0.06);

  ctx.save();
  ctx.translate(x + w * 0.90, y + h * 0.94);
  ctx.rotate(Math.PI);
  ctx.fillText(lbl, 0, 0);
  ctx.restore();

  ctx.font = 'bold ' + (w * 0.11) + 'px sans-serif';
  ctx.fillStyle = sd.color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(sd.name, x + w/2, y + h - 8 * GF.S);
}

function drawCardBack(ctx, x, y, w, h) {
  GF.rr(ctx, x, y, w, h, 12 * GF.S);
  var g = ctx.createLinearGradient(x, y, x+w, y+h);
  g.addColorStop(0, '#7a1f2e');
  g.addColorStop(1, '#3d0a14');
  ctx.fillStyle = g;
  ctx.fill();
  ctx.lineWidth = 3 * GF.S;
  ctx.strokeStyle = '#FFD700';
  ctx.stroke();
}

function drawButtons(ctx) {
  var b = getButtonsLayout();
  var canSwap = swapsLeft > 0 && selected.length > 0;
  var swapLabel = GF.t('swap') + (selected.length > 0 ? ' (' + selected.length + ')' : '');
  drawButton(ctx, b.swap, swapLabel, canSwap ? '#e67e22' : '#555', canSwap ? '#fff' : '#aaa');
  drawButton(ctx, b.score, GF.t('score_btn'), '#27ae60', '#fff');
}

function drawNextButton(ctx) {
  var b = getButtonsLayout();
  var passed = roundScore >= roundTarget;
  var label = passed ? (roundIdx === 4 ? GF.t('feast') : GF.t('next_round')) : GF.t('retry');
  drawButton(ctx, b.next, label, passed ? '#27ae60' : '#c0392b', '#fff');
}

function drawButton(ctx, b, label, bg, fg) {
  var grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
  grad.addColorStop(0, bg);
  grad.addColorStop(1, shade(bg, -0.25));
  GF.rr(ctx, b.x, b.y, b.w, b.h, b.h / 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.lineWidth = 2 * GF.S;
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.stroke();
  var fs = GF.clamp(b.h * 0.42, 12, 26);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.fillStyle = fg;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, b.x + b.w/2, b.y + b.h/2);
}

function shade(hex, pct) {
  if (hex.charAt(0) !== '#') return hex;
  var h = hex.replace('#','');
  // Expand 3-char hex (#fff) to 6-char (#ffffff)
  if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  var r = parseInt(h.substr(0,2),16);
  var g = parseInt(h.substr(2,2),16);
  var bl = parseInt(h.substr(4,2),16);
  r = Math.max(0, Math.min(255, Math.round(r + r*pct)));
  g = Math.max(0, Math.min(255, Math.round(g + g*pct)));
  bl = Math.max(0, Math.min(255, Math.round(bl + bl*pct)));
  return 'rgb('+r+','+g+','+bl+')';
}

function drawRevealBanner(ctx) {
  if (!revealHand) return;
  var label = GF.t(HAND_INFO[revealHand.type].key);
  var s = revealAnim;
  var scale = Math.min(1.4, 0.6 + s * 0.9);
  var alpha = Math.min(1, s * 2);

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(GF.cx, GF.H * 0.66);
  ctx.scale(scale, scale);

  var w = 320 * GF.S, h = 70 * GF.S;
  GF.rr(ctx, -w/2, -h/2, w, h, h/2);
  var g = ctx.createLinearGradient(0, -h/2, 0, h/2);
  g.addColorStop(0, '#FFD700'); g.addColorStop(1, '#cc9900');
  ctx.fillStyle = g; ctx.fill();
  ctx.lineWidth = 2 * GF.S; ctx.strokeStyle = '#5a3d2b'; ctx.stroke();

  ctx.fillStyle = '#3a2510';
  ctx.font = 'bold ' + (24 * GF.S) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label + '  +' + revealHand.total, 0, 0);

  if (revealHand.mult > 1.0) {
    ctx.font = 'bold ' + (16 * GF.S) + 'px sans-serif';
    ctx.fillStyle = '#7a1f2e';
    ctx.fillText('x' + revealHand.mult.toFixed(1) + ' SAUCE!', 0, h/2 + 18 * GF.S);
  }
  ctx.restore();
}

// ── INPUT WIRING ─────────────────────────────────────────────────────────
GF.canvas.addEventListener('click', function(e) {
  tapHandler(e.clientX, e.clientY);
});
GF.canvas.addEventListener('touchend', function(e) {
  if (!e.changedTouches || e.changedTouches.length === 0) return;
  var t = e.changedTouches[0];
  tapHandler(t.clientX, t.clientY);
}, { passive: false });

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'junk_food_poker',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('junk_food_poker_best') || '0') || 0; } catch (e) {}
    gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});


// Expose game state for post-build-tester gate (deep_playtest.js)
if (window.GF && GF.exposeState) GF.exposeState(function() {
  return {
    gs:        typeof gs        !== 'undefined' ? gs        : null,
    score:     typeof score     !== 'undefined' ? score     : null,
    round:     typeof round     !== 'undefined' ? round     : null,
    roundNum:  typeof roundNum  !== 'undefined' ? roundNum  : null,
    handsLeft: typeof handsLeft !== 'undefined' ? handsLeft : null,
    target:    typeof target    !== 'undefined' ? target    : null
  };
});
})();
</script>
