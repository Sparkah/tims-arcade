var SAVE_KEY = 'critter_survivor';

// ── TUNABLES ─────────────────────────────────────────────────────────────
var MAX_HP = 100, HERO_SPEED = 215, HERO_RADIUS = 16;
var BASE_FIRE_CD = 0.62, BASE_BULLET_DMG = 12, BASE_BULLET_SPD = 430, BASE_BULLET_R = 6, BASE_RANGE = 360;
var XP_BASE = 5, XP_GROWTH = 1.32;
var SPAWN_CD_START = 1.15, SPAWN_CD_MIN = 0.16;
var GEM_MAGNET_R = 70, CONTACT_CD = 0.6, BOSS_EVERY = 75;

// enemy archetypes - base stats (scaled by time in spawn)
var ETYPES = {
  bite:    { r: 13, hp: 18,  spd: 74,  dmg: 6,  color: '#8ad14f', xp: 1, score: 1 },
  runner:  { r: 10, hp: 10,  spd: 128, dmg: 4,  color: '#54c9e8', xp: 1, score: 1 },
  brute:   { r: 24, hp: 70,  spd: 50,  dmg: 14, color: '#e8794f', xp: 4, score: 4 },
  spitter: { r: 14, hp: 26,  spd: 60,  dmg: 5,  color: '#c76fe8', xp: 3, score: 3, ranged: true },
  boss:    { r: 46, hp: 600, spd: 46,  dmg: 22, color: '#ff5a7a', xp: 30, score: 50, boss: true },
};

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';   // MENU | PLAYING | LEVELUP | PAUSE | GAMEOVER
var hero, crits, bullets, gems, hearts, foeShots, blades;
var runTime, spawnTimer, spawnCd, hp, level, xp, xpNext, kills, score, best = 0;
var nextBossAt, fireTimer, regenAcc, killAcc;
var camShakeReady = false;
var choices = [];          // current 3 upgrade choices (objects)
var bestEver = 0;          // for happytime detection
var dmgFlash = 0;          // red-edge pulse on hurt
var levelFlash = 0;        // xp bar flash on level
var frozen = false;        // tutorial no-fail freeze
var _ssMode = false;       // screenshot mode: suppress LEVELUP popups

// Layout rects populated each frame for hit-testing + reachability gate
var L = {};

// upgrade definitions: id, name/desc string keys, apply fn, weight, max stacks
function makeUpgrades() {
  return [
    { id:'proj',   nk:'u_proj_n',  dk:'u_proj_d',  icon:'proj',   max:6, apply:function(){ hero.fireCount++; } },
    { id:'rate',   nk:'u_rate_n',  dk:'u_rate_d',  icon:'rate',   max:8, apply:function(){ hero.fireCd *= 0.85; } },
    { id:'dmg',    nk:'u_dmg_n',   dk:'u_dmg_d',   icon:'dmg',    max:9, apply:function(){ hero.dmgMult *= 1.30; } },
    { id:'area',   nk:'u_area_n',  dk:'u_area_d',  icon:'area',   max:6, apply:function(){ hero.areaMult *= 1.25; } },
    { id:'pierce', nk:'u_pierce_n',dk:'u_pierce_d',icon:'pierce', max:4, apply:function(){ hero.pierce++; } },
    { id:'blade',  nk:'u_blade_n', dk:'u_blade_d', icon:'blade',  max:6, apply:function(){ hero.blades++; rebuildBlades(); } },
    { id:'magnet', nk:'u_magnet_n',dk:'u_magnet_d',icon:'magnet', max:5, apply:function(){ hero.magnet *= 1.60; } },
    { id:'speed',  nk:'u_speed_n', dk:'u_speed_d', icon:'speed',  max:6, apply:function(){ hero.speedMult *= 1.12; } },
    { id:'hp',     nk:'u_hp_n',    dk:'u_hp_d',    icon:'hp',     max:8, apply:function(){ hero.maxHp += 25; hp = Math.min(hero.maxHp, hp + 25); } },
    { id:'spread', nk:'u_spread_n',dk:'u_spread_d',icon:'spread', max:3, apply:function(){ hero.spread += 0.18; } },
    { id:'crit',   nk:'u_crit_n',  dk:'u_crit_d',  icon:'crit',   max:5, apply:function(){ hero.crit += 0.15; } },
    { id:'knock',  nk:'u_knock_n', dk:'u_knock_d', icon:'knock',  max:4, apply:function(){ hero.knock += 140; } },
    { id:'regen',  nk:'u_regen_n', dk:'u_regen_d', icon:'regen',  max:4, apply:function(){ hero.regen += 1.4; } },
    { id:'speedb', nk:'u_speedb_n',dk:'u_speedb_d',icon:'speedb', max:5, apply:function(){ hero.bulletSpd *= 1.25; } },
  ];
}
var UPGRADES = makeUpgrades();

// ── LIFECYCLE ────────────────────────────────────────────────────────────
function resetHero() {
  hero = {
    x: GF.W/2, y: GF.H/2, vx:0, vy:0,
    fireCount:1, fireCd:BASE_FIRE_CD, dmgMult:1, areaMult:1, pierce:0,
    blades:0, magnet:1, speedMult:1, maxHp:MAX_HP, spread:0.10, crit:0,
    knock:0, regen:0, bulletSpd:BASE_BULLET_SPD, took:{},
    bladeList:[], bladeAng:0,
  };
}
function rebuildBlades() {
  hero.bladeList = [];
  for (var i=0;i<hero.blades;i++) hero.bladeList.push({ hitCd:{} });
}

function startGame() {
  resetHero();
  crits=[]; bullets=[]; gems=[]; hearts=[]; foeShots=[];
  runTime=0; spawnTimer=0; spawnCd=SPAWN_CD_START; hp=hero.maxHp;
  level=1; xp=0; xpNext=XP_BASE; kills=0; score=0;
  nextBossAt=BOSS_EVERY; fireTimer=0; regenAcc=0; killAcc=0;
  dmgFlash=0; levelFlash=0; choices=[];
  frozen = false; _ssMode = false;
  gs='PLAYING';
  GF.gameStarted();
  GF.saveRun();
  // tutorial: only on a real player start (not silent gate starts)
  if (!window._silent) maybeStartTutorial();
}

function gameOver() {
  var survived = runTime;
  var newBest = survived > best;
  if (newBest) { best = survived; try { localStorage.setItem(SAVE_KEY+'_best', String(Math.round(best))); } catch(e){} }
  gs='GAMEOVER';
  GF.sfx('lose');
  GF.gameEnded();
  if (newBest && best > 5) GF.happytime();
  GF.saveRun();
}

window._jumpLevel = function(n) {
  // gate + screenshot convention:
  //   _jumpLevel(1)   -> fresh PLAYING            (webapp_gate playing_state)
  //   _jumpLevel(>=50)-> terminal GAMEOVER        (webapp_gate terminal_state;
  //                       a survivor can't die on command in the short window)
  //   _jumpLevel(n)   -> dense, populated PLAYING (take_screenshots dense frame)
  if (n && n >= 50) { startGame(); GF.tutorial.active=false; runTime=47; kills=30; level=5; hp=0; gameOver(); return; }
  if (n && n > 1) { window._setupForScreenshot(n); return; }
  startGame();
  GF.tutorial.active = false;
};

// fast-forward a populated late-game state for screenshots / loop-depth gate.
// Packs the swarm densely around the hero (viewport-relative) so the frame
// reads as packed action at ANY viewport, and disables the tutorial freeze.
window._setupForScreenshot = function(lvl) {
  window._silent = true;
  startGame();
  window._silent = false;
  GF.tutorial.active = false; frozen = false;
  _ssMode = true;   // suppress LEVELUP popups during the capture window (>=70% gameplay rule)
  // simulate ~3 minutes of escalation
  runTime = 185; spawnCd = 0.4; nextBossAt = 225;
  level = 9; xpNext = xpFor(level); xp = Math.round(xpNext*0.55);
  hero.fireCount = 4; hero.fireCd = BASE_FIRE_CD*0.6; hero.dmgMult = 2.2;
  hero.blades = 3; hero.areaMult = 1.6; hero.pierce = 2; hero.magnet = 2.0; hero.spread = 0.3; hero.took = {proj:3,blade:3,dmg:4,area:2,pierce:2};
  rebuildBlades();
  hp = Math.round(hero.maxHp*0.72);
  // concentrate the swarm in a band around the hero so it fills the frame
  var R = Math.min(GF.W, GF.H);
  var types = ['bite','bite','runner','runner','brute','spitter','bite','runner','bite','spitter'];
  for (var i=0;i<40;i++) {
    var a = Math.random()*Math.PI*2, d = R*0.18 + Math.random()*R*0.42;
    spawnCritAt(hero.x + Math.cos(a)*d, hero.y + Math.sin(a)*d, types[i%types.length]);
  }
  spawnCritAt(hero.x - R*0.30, hero.y - R*0.18, 'boss');
  // bullets streaming outward toward the swarm
  for (var b=0;b<14;b++) { var ba=(b/14)*Math.PI*2; bullets.push({ x:hero.x+Math.cos(ba)*40*GF.S, y:hero.y+Math.sin(ba)*40*GF.S, vx:Math.cos(ba)*520*GF.S, vy:Math.sin(ba)*520*GF.S, r:BASE_BULLET_R*1.6*GF.S, dmg:24, pierce:2, hit:[], crit:(b%4===0), knock:0 }); }
  for (var g=0;g<10;g++) { var ga=Math.random()*Math.PI*2, gd=(40+Math.random()*150)*GF.S; gems.push({ x:hero.x+Math.cos(ga)*gd, y:hero.y+Math.sin(ga)*gd, vx:0, vy:0, v:1 }); }
  // a couple of spitter blobs mid-flight for action
  for (var f=0;f<3;f++){ var fa=Math.random()*Math.PI*2; foeShots.push({ x:hero.x+Math.cos(fa)*R*0.3, y:hero.y+Math.sin(fa)*R*0.3, vx:-Math.cos(fa)*150*GF.S, vy:-Math.sin(fa)*150*GF.S, r:7*GF.S, dmg:8, life:5 }); }
  GF.setShake(0.3);
};

// ── XP / LEVEL ───────────────────────────────────────────────────────────
function xpFor(lv) { return Math.round(XP_BASE * Math.pow(XP_GROWTH, lv-1)); }
function gainXp(n) {
  xp += n;
  if (_ssMode) { if (xp > xpNext) xp = Math.round(xpNext*0.85); return; }   // screenshot: no popups
  while (xp >= xpNext) {
    xp -= xpNext; level++; xpNext = xpFor(level);
    triggerLevelUp();
  }
}
function triggerLevelUp() {
  levelFlash = 1;
  GF.sfx('levelup');
  GF.setShake(0.6);
  // draw 3 distinct upgrades, respecting max stacks
  var pool = UPGRADES.filter(function(u){ return (hero.took[u.id]||0) < u.max; });
  if (pool.length === 0) pool = UPGRADES.slice();
  choices = [];
  var avail = pool.slice();
  for (var i=0;i<3 && avail.length;i++) {
    var idx = Math.floor(Math.random()*avail.length);
    choices.push(avail.splice(idx,1)[0]);
  }
  // if pool < 3 (very late), pad by re-drawing
  while (choices.length < 3) choices.push(pool[Math.floor(Math.random()*pool.length)]);
  gs='LEVELUP';
  GF.saveRun();
}
function pickUpgrade(u) {
  if (!u) return;
  hero.took[u.id] = (hero.took[u.id]||0)+1;
  u.apply();
  GF.sfx('unlock');
  choices=[];
  gs='PLAYING';
  GF.saveRun();
}

// ── SPAWN ────────────────────────────────────────────────────────────────
function pickSpawnType() {
  var t = runTime, roll = Math.random();
  // unlock schedule
  if (t > 90 && roll < 0.18) return 'spitter';
  if (t > 60 && roll < 0.32) return 'brute';
  if (t > 30 && roll < 0.55) return 'runner';
  return 'bite';
}
function spawnCritAt(x, y, type) {
  var base = ETYPES[type];
  // time-scaled hp + speed (caps so it stays fair-ish but always rising)
  var hpScale = 1 + runTime/95;
  var spdScale = 1 + Math.min(runTime/240, 0.6);
  var c = {
    type:type, x:x, y:y, r:base.r,
    hp: base.boss ? base.hp * (1 + runTime/BOSS_EVERY*0.6) : base.hp * hpScale,
    maxHp: 0, spd: base.spd * spdScale, dmg: base.dmg, color: base.color,
    xp: base.xp, score: base.score, ranged: !!base.ranged, boss: !!base.boss,
    biteCd: 0, shotCd: 1 + Math.random()*1.5, kx:0, ky:0, wob: Math.random()*Math.PI*2,
    hurt: 0,
  };
  c.maxHp = c.hp;
  crits.push(c);
}
function spawnAtEdge(type) {
  var w = GF.W, h = GF.H, m = 40*GF.S, x, y, side = Math.floor(Math.random()*4);
  if (side===0) { x=-m; y=Math.random()*h; }
  else if (side===1) { x=w+m; y=Math.random()*h; }
  else if (side===2) { x=Math.random()*w; y=-m; }
  else { x=Math.random()*w; y=h+m; }
  spawnCritAt(x, y, type);
}

// ── FIRE ─────────────────────────────────────────────────────────────────
function nearestCrit() {
  var best=null, bd = (BASE_RANGE*GF.S)*(BASE_RANGE*GF.S);
  for (var i=0;i<crits.length;i++) {
    var c=crits[i], dx=c.x-hero.x, dy=c.y-hero.y, d=dx*dx+dy*dy;
    if (d < bd) { bd=d; best=c; }
  }
  return best;
}
function fire() {
  var target = nearestCrit();
  if (!target) return;
  var baseAng = Math.atan2(target.y-hero.y, target.x-hero.x);
  var n = hero.fireCount;
  var spread = hero.spread;
  for (var i=0;i<n;i++) {
    var off = (n===1) ? 0 : (i/(n-1) - 0.5) * spread * (n);
    var a = baseAng + off;
    var isCrit = Math.random() < hero.crit;
    var dmg = BASE_BULLET_DMG * hero.dmgMult * (isCrit?2.2:1);
    bullets.push({
      x:hero.x, y:hero.y,
      vx:Math.cos(a)*hero.bulletSpd*GF.S, vy:Math.sin(a)*hero.bulletSpd*GF.S,
      r:BASE_BULLET_R*hero.areaMult*GF.S, dmg:dmg, pierce:hero.pierce, hit:[], crit:isCrit, knock:hero.knock,
    });
  }
  GF.tone(680, 0.04, 'square', 0.04, 520);   // soft muzzle blip (rate-limited by fireCd)
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  // tutorial drives a frozen, no-fail opening
  GF.tutorial.update(dt);
  if (gs !== 'PLAYING') { if (gs==='LEVELUP'||gs==='PAUSE'||gs==='GAMEOVER'||gs==='MENU') { /* world frozen */ } return; }

  var tutActive = GF.tutorial.active;
  if (dmgFlash > 0) dmgFlash = Math.max(0, dmgFlash - dt*2);
  if (levelFlash > 0) levelFlash = Math.max(0, levelFlash - dt*2);

  // ── movement (the only player control) ──
  var ax=0, ay=0;
  if (GF.keys['ArrowLeft']||GF.keys['KeyA']) ax-=1;
  if (GF.keys['ArrowRight']||GF.keys['KeyD']) ax+=1;
  if (GF.keys['ArrowUp']||GF.keys['KeyW']) ay-=1;
  if (GF.keys['ArrowDown']||GF.keys['KeyS']) ay+=1;
  if (GF.touch.active) { ax += GF.touch.dx; ay += GF.touch.dy; }
  var al = Math.sqrt(ax*ax+ay*ay);
  if (al>0) { ax/=al; ay/=al; }
  var sp = HERO_SPEED * hero.speedMult * GF.S;
  hero.vx = ax*sp; hero.vy = ay*sp;
  hero.x = GF.clamp(hero.x + hero.vx*dt, HERO_RADIUS*GF.S, GF.W-HERO_RADIUS*GF.S);
  hero.y = GF.clamp(hero.y + hero.vy*dt, HERO_RADIUS*GF.S, GF.H-HERO_RADIUS*GF.S);

  // distance moved feeds the tutorial step-1 gate
  if (tutActive && _tutStep===0) {
    _tutMoved += Math.abs(hero.vx*dt)+Math.abs(hero.vy*dt);
    if (_tutMoved > 60*GF.S) { GF.tutorial.next(); _tutStep=1; _tutGemT=0; spawnTutGem(); }
  }
  // step-2 (collect the gem) is no-fail: it advances when the gem is grabbed
  // (handled in the gem-pickup code) OR after a grace period so the opening can
  // never permanently freeze if the player struggles to walk onto it.
  if (tutActive && _tutStep===1) {
    _tutGemT += dt;
    if (_tutGemT > 5.5) { _tutStep=2; GF.tutorial.next(); }
  }

  // during tutorial: freeze the world (no spawns, no damage, no auto-progress
  // of timers) so the opening can't kill the player.
  frozen = tutActive;

  if (!frozen) {
    runTime += dt;
    // ── spawning: density climbs over time ──
    spawnCd = Math.max(SPAWN_CD_MIN, SPAWN_CD_START - runTime*0.006);
    spawnTimer -= dt;
    while (spawnTimer <= 0) {
      spawnTimer += spawnCd;
      var burst = 1 + Math.floor(runTime/70);   // more per tick later
      for (var b=0;b<burst;b++) spawnAtEdge(pickSpawnType());
    }
    // ── mini-boss cadence ──
    if (runTime >= nextBossAt) { spawnAtEdge('boss'); nextBossAt += BOSS_EVERY; GF.setShake(0.8); GF.sfx('evolve'); }

    // ── regen ──
    if (hero.regen > 0 && hp < hero.maxHp) { regenAcc += hero.regen*dt; if (regenAcc>=1) { var add=Math.floor(regenAcc); regenAcc-=add; hp=Math.min(hero.maxHp, hp+add); } }
  }

  // ── auto-fire (works during tutorial too, harmlessly) ──
  fireTimer -= dt;
  if (fireTimer <= 0 && crits.length) { fire(); fireTimer = hero.fireCd; }
  else if (fireTimer <= 0) fireTimer = hero.fireCd*0.5;

  // ── orbiting blades ──
  hero.bladeAng += dt*2.6;
  var bladeR = (44 + hero.blades*3) * GF.S;
  for (var bi=0;bi<hero.bladeList.length;bi++) {
    var bl = hero.bladeList[bi];
    var ang = hero.bladeAng + (bi/Math.max(1,hero.bladeList.length))*Math.PI*2;
    bl.x = hero.x + Math.cos(ang)*bladeR;
    bl.y = hero.y + Math.sin(ang)*bladeR;
    for (var k in bl.hitCd) { bl.hitCd[k]-=dt; if (bl.hitCd[k]<=0) delete bl.hitCd[k]; }
  }

  // ── bullets ──
  for (var i=bullets.length-1;i>=0;i--) {
    var p=bullets[i];
    p.x += p.vx*dt; p.y += p.vy*dt;
    if (p.x<-30||p.x>GF.W+30||p.y<-30||p.y>GF.H+30) { bullets.splice(i,1); continue; }
  }

  // ── enemy projectiles (spitter blobs) ──
  for (var fi=foeShots.length-1;fi>=0;fi--) {
    var fsh=foeShots[fi];
    fsh.x += fsh.vx*dt; fsh.y += fsh.vy*dt; fsh.life -= dt;
    if (fsh.life<=0||fsh.x<-30||fsh.x>GF.W+30||fsh.y<-30||fsh.y>GF.H+30) { foeShots.splice(fi,1); continue; }
    if (!frozen) {
      var ddx=fsh.x-hero.x, ddy=fsh.y-hero.y;
      if (ddx*ddx+ddy*ddy < (HERO_RADIUS*GF.S+fsh.r)*(HERO_RADIUS*GF.S+fsh.r)) { hurt(fsh.dmg); foeShots.splice(fi,1); }
    }
  }

  // ── critters: move toward hero, wobble, contact + ranged ──
  for (var ci=crits.length-1;ci>=0;ci--) {
    var c=crits[ci];
    c.wob += dt*3;
    if (c.hurt>0) c.hurt=Math.max(0,c.hurt-dt*4);
    if (!frozen) {
      var dx=hero.x-c.x, dy=hero.y-c.y, dd=Math.sqrt(dx*dx+dy*dy)||1;
      if (c.ranged) {
        // keep mid distance, shoot
        var want = 220*GF.S;
        var dir = dd>want?1:(dd<want*0.7?-0.6:0);
        c.x += (dx/dd)*c.spd*GF.S*dir*dt;
        c.y += (dy/dd)*c.spd*GF.S*dir*dt;
        c.shotCd -= dt;
        if (c.shotCd<=0) { c.shotCd = 1.8; foeShots.push({ x:c.x, y:c.y, vx:(dx/dd)*150*GF.S, vy:(dy/dd)*150*GF.S, r:7*GF.S, dmg:8, life:5 }); }
      } else {
        c.x += (dx/dd)*c.spd*GF.S*dt;
        c.y += (dy/dd)*c.spd*GF.S*dt;
      }
      // knockback decay
      if (c.kx||c.ky) { c.x+=c.kx*dt; c.y+=c.ky*dt; c.kx*=0.86; c.ky*=0.86; if (Math.abs(c.kx)<2)c.kx=0; if (Math.abs(c.ky)<2)c.ky=0; }
      // contact damage
      c.biteCd -= dt;
      var rr2 = (HERO_RADIUS*GF.S + c.r*GF.S);
      if (dx*dx+dy*dy < rr2*rr2 && c.biteCd<=0) { hurt(c.dmg); c.biteCd = CONTACT_CD; }
    }

    // blade collisions
    for (var bj=0;bj<hero.bladeList.length;bj++) {
      var blade=hero.bladeList[bj];
      var bdx=blade.x-c.x, bdy=blade.y-c.y, brad=(13*GF.S + c.r*GF.S);
      if (bdx*bdx+bdy*bdy < brad*brad && !blade.hitCd[ci]) {
        blade.hitCd[ci] = 0.35;
        damageCrit(c, ci, BASE_BULLET_DMG*0.8*hero.dmgMult, false);
        if (!crits[ci]) break;
      }
    }
  }

  // ── bullet vs critter ──
  for (var pi=bullets.length-1;pi>=0;pi--) {
    var bp=bullets[pi]; if (!bp) continue;
    for (var cj=crits.length-1;cj>=0;cj--) {
      var cc=crits[cj]; if (!cc) continue;
      if (bp.hit.indexOf(cj)>=0) continue;
      var bdx2=bp.x-cc.x, bdy2=bp.y-cc.y, hr=(bp.r + cc.r*GF.S);
      if (bdx2*bdx2+bdy2*bdy2 < hr*hr) {
        bp.hit.push(cj);
        if (bp.knock) { var kd=Math.sqrt(bdx2*bdx2+bdy2*bdy2)||1; cc.kx += -(bdx2/kd)*bp.knock; cc.ky += -(bdy2/kd)*bp.knock; }
        damageCrit(cc, cj, bp.dmg, bp.crit);
        if (bp.pierce>0) { bp.pierce--; }
        else { bullets.splice(pi,1); break; }
      }
    }
  }

  // ── gems: magnet + pickup ──
  var magR = GEM_MAGNET_R*hero.magnet*GF.S;
  for (var gi=gems.length-1;gi>=0;gi--) {
    var g=gems[gi];
    var gdx=hero.x-g.x, gdy=hero.y-g.y, gd2=gdx*gdx+gdy*gdy;
    var thisMag = g.tut ? Math.max(magR, 260*GF.S) : magR;   // tutorial gem pulls from far
    if (gd2 < thisMag*thisMag) { var gd=Math.sqrt(gd2)||1; var pull=Math.min(520, 180+ (thisMag-gd)*2)*GF.S; g.x+=(gdx/gd)*pull*dt; g.y+=(gdy/gd)*pull*dt; }
    var pr = (HERO_RADIUS*GF.S + 9*GF.S);
    if (gd2 < pr*pr || (Math.abs(gdx)<pr&&Math.abs(gdy)<pr)) {
      gems.splice(gi,1);
      GF.tone(900, 0.05, 'sine', 0.05);
      if (GF.tutorial.active && _tutStep===1) { _tutStep=2; GF.tutorial.next(); }   // tutorial gem -> advance/finish
      gainXp(g.v);
      score += 1;
    }
  }
  // ── hearts ──
  for (var hi=hearts.length-1;hi>=0;hi--) {
    var ht=hearts[hi];
    var hdx=hero.x-ht.x, hdy=hero.y-ht.y;
    var hpr=(HERO_RADIUS*GF.S+11*GF.S);
    if (hdx*hdx+hdy*hdy < (magR*magR)) { var hd=Math.sqrt(hdx*hdx+hdy*hdy)||1; ht.x+=(hdx/hd)*300*GF.S*dt; ht.y+=(hdy/hd)*300*GF.S*dt; }
    if (hdx*hdx+hdy*hdy < hpr*hpr) { hearts.splice(hi,1); hp=Math.min(hero.maxHp, hp+20); GF.sfx('reward'); GF.spawnFloat(hero.x, hero.y-20*GF.S, '+20', '#5ef08a'); }
  }
}

function damageCrit(c, idx, dmg, isCrit) {
  c.hp -= dmg; c.hurt = 1;
  if (c.hp <= 0) killCrit(c, idx);
}
function killCrit(c, idx) {
  // drop xp gem(s)
  var n = c.boss ? 8 : (c.type==='brute'?2:1);
  for (var i=0;i<n;i++) {
    var a=Math.random()*Math.PI*2, d=(c.boss? (10+Math.random()*40):6)*GF.S;
    gems.push({ x:c.x+Math.cos(a)*d, y:c.y+Math.sin(a)*d, vx:0, vy:0, v:Math.max(1, Math.round(c.xp/n)) });
  }
  if (c.boss || Math.random()<0.02) hearts.push({ x:c.x, y:c.y });
  GF.spawnParticles(c.x, c.y, c.color, c.boss?22:7);
  if (c.boss) { GF.setShake(0.7); GF.sfx('win'); } else GF.sfx('hit');
  kills++; score += c.score;
  // remove (swap not needed; splice by idx but idx may shift - find safest)
  var ix = crits.indexOf(c);
  if (ix>=0) crits.splice(ix,1);
}

function hurt(d) {
  if (frozen || _ssMode) return;   // no-fail during tutorial + screenshot capture
  hp -= d; dmgFlash = 1;
  GF.sfx('hurt'); GF.setShake(0.3);
  if (hp <= 0) { hp = 0; gameOver(); }
}

// ── TUTORIAL (demo HAND, action-gated, EN+RU) ────────────────────────────
var _tutStep = 0, _tutMoved = 0, _tutGemT = 0;
function maybeStartTutorial() {
  _tutStep = 0; _tutMoved = 0;
  GF.tutorial.start([
    { text: GF.t('tutmove'),
      target: function(){ return { x: hero.x, y: hero.y, r: HERO_RADIUS*1.6*GF.S }; },

      gesture: 'drag', advance: 'manual' },
    { text: GF.t('tutgem'),
      target: function(){ var g = gems[0]; return g ? { x:g.x, y:g.y, r:24*GF.S } : { x:hero.x, y:hero.y, r:24*GF.S }; },
      advance: 'manual' },
  ], { storageKey: SAVE_KEY+'_tut_v1', force: false });
}
function spawnTutGem() {
  // place a single, easy gem a short hop from the hero, clamped on-screen, and
  // flag it tut:true so it magnetizes from far (player just walks toward it).
  var gx = GF.clamp(hero.x + 60*GF.S, 50*GF.S, GF.W-50*GF.S);
  var gy = GF.clamp(hero.y + 70*GF.S, 70*GF.S, GF.H-50*GF.S);
  gems.push({ x: gx, y: gy, vx:0, vy:0, v:XP_BASE, tut:true });
}
function reopenTutorial() {
  _tutStep = 0; _tutMoved = 0;
  if (gs==='PAUSE') gs='PLAYING';
  GF.tutorial.start([
    { text: GF.t('tutmove'),
      target: function(){ return { x: hero.x, y: hero.y, r: HERO_RADIUS*1.6*GF.S }; },
      target2: function(){ return { x: hero.x + 90*GF.S, y: hero.y - 60*GF.S, r: 26*GF.S }; },
      gesture: 'drag', advance: 'manual' },
    { text: GF.t('tutgem'),
      target: function(){ var g = gems[0]; return g ? { x:g.x, y:g.y, r:24*GF.S } : { x:hero.x+70*GF.S, y:hero.y+40*GF.S, r:24*GF.S }; },
      advance: 'manual' },
  ], { storageKey: SAVE_KEY+'_tut_v1', force: true });
  if (!gems.length) spawnTutGem();
  GF.sfx('tap');
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  drawField(ctx);

  if (gs==='PLAYING' || gs==='LEVELUP' || gs==='PAUSE' || gs==='GAMEOVER') {
    drawWorld(ctx);
    drawHUD(ctx);
  }

  if (dmgFlash>0 || (hp>0 && hp<25 && gs==='PLAYING')) {
    var a = Math.max(dmgFlash*0.4, (gs==='PLAYING'&&hp<25)? (0.12+0.06*Math.sin(performance.now()/120)) : 0);
    if (a>0) { ctx.save(); var grd=ctx.createRadialGradient(GF.cx,GF.cy,GF.H*0.3,GF.cx,GF.cy,GF.H*0.72); grd.addColorStop(0,'rgba(255,40,60,0)'); grd.addColorStop(1,'rgba(255,30,50,'+a.toFixed(3)+')'); ctx.fillStyle=grd; ctx.fillRect(0,0,GF.W,GF.H); ctx.restore(); }
  }

  // tutorial overlay (hand + caption) drawn LAST so it's on top
  GF.tutorial.draw(ctx);

  if (gs==='MENU') drawMenu(ctx);
  if (gs==='LEVELUP') drawLevelUp(ctx);
  if (gs==='PAUSE') drawPause(ctx);
  if (gs==='GAMEOVER') drawGameOver(ctx);
}

var _fieldOff = {x:0,y:0};
function drawField(ctx) {
  ctx.fillStyle = '#0e1322'; ctx.fillRect(0,0,GF.W,GF.H);
  // parallax dot grid
  if (hero) { _fieldOff.x = -(hero.x*0.04)%(40*GF.S); _fieldOff.y = -(hero.y*0.04)%(40*GF.S); }
  var step = 40*GF.S;
  ctx.save(); ctx.globalAlpha = 0.5;
  ctx.fillStyle = '#1a2238';
  for (var x=_fieldOff.x-step; x<GF.W+step; x+=step) for (var y=_fieldOff.y-step; y<GF.H+step; y+=step) { ctx.beginPath(); ctx.arc(x,y,1.6*GF.S,0,Math.PI*2); ctx.fill(); }
  ctx.restore();
}

function drawWorld(ctx) {
  // gems
  for (var i=0;i<gems.length;i++) { var g=gems[i]; drawGem(ctx, g.x, g.y); }
  // hearts
  for (var h2=0;h2<hearts.length;h2++) { drawHeart(ctx, hearts[h2].x, hearts[h2].y); }
  // critters
  for (var ci=0;ci<crits.length;ci++) drawCrit(ctx, crits[ci]);
  // enemy shots
  for (var fi=0;fi<foeShots.length;fi++) { var fs2=foeShots[fi]; ctx.save(); ctx.fillStyle='#c76fe8'; ctx.shadowColor='#c76fe8'; ctx.shadowBlur=8; ctx.beginPath(); ctx.arc(fs2.x,fs2.y,fs2.r,0,Math.PI*2); ctx.fill(); ctx.restore(); }
  // bullets
  for (var bi=0;bi<bullets.length;bi++) { var p=bullets[bi]; ctx.save(); ctx.fillStyle=p.crit?'#ffe14d':'#aef4ff'; ctx.shadowColor=p.crit?'#ffd23a':'#7fe9ff'; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.restore(); }
  // blades
  for (var bj=0;bj<hero.bladeList.length;bj++) { var bl=hero.bladeList[bj]; if(bl.x==null)continue; drawBlade(ctx, bl.x, bl.y, hero.bladeAng); }
  // hero
  drawHero(ctx);
}

function drawHero(ctx) {
  var x=hero.x, y=hero.y, r=HERO_RADIUS*GF.S;
  // magnet ring faint
  ctx.save();
  // aim direction toward nearest
  var tgt = nearestCrit();
  var ang = tgt ? Math.atan2(tgt.y-y, tgt.x-x) : -Math.PI/2;
  // body
  ctx.shadowColor='#37e3ff'; ctx.shadowBlur=14;
  var grd=ctx.createLinearGradient(x,y-r,x,y+r); grd.addColorStop(0,'#7af0ff'); grd.addColorStop(1,'#2aa9d8');
  ctx.fillStyle=grd;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  // gun nub
  ctx.fillStyle='#cfefff';
  ctx.save(); ctx.translate(x,y); ctx.rotate(ang);
  GF.rr(ctx, r*0.5, -r*0.28, r*0.95, r*0.56, r*0.2); ctx.fill();
  ctx.restore();
  // eyes
  ctx.fillStyle='#0a2230';
  ctx.beginPath(); ctx.arc(x-r*0.28+Math.cos(ang)*r*0.2, y-r*0.18+Math.sin(ang)*r*0.2, r*0.16, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r*0.28+Math.cos(ang)*r*0.2, y-r*0.18+Math.sin(ang)*r*0.2, r*0.16, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCrit(ctx, c) {
  var x=c.x, y=c.y, r=c.r*GF.S;
  var bob = Math.sin(c.wob)*r*0.08;
  ctx.save();
  if (c.hurt>0) { ctx.globalAlpha = 1; }
  // little feet
  ctx.fillStyle = shade(c.color,-30);
  ctx.beginPath(); ctx.ellipse(x-r*0.4, y+r*0.7+bob, r*0.28, r*0.18, 0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+r*0.4, y+r*0.7+bob, r*0.28, r*0.18, 0,0,Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle = c.hurt>0 ? '#ffffff' : c.color;
  if (c.boss) { ctx.shadowColor=c.color; ctx.shadowBlur=18; }
  ctx.beginPath(); ctx.arc(x, y+bob, r, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  // belly highlight
  if (!c.hurt) { ctx.fillStyle = shade(c.color, 40); ctx.beginPath(); ctx.arc(x-r*0.25, y+bob-r*0.2, r*0.45, 0, Math.PI*2); ctx.fill(); }
  // eyes
  ctx.fillStyle='#10121c';
  ctx.beginPath(); ctx.arc(x-r*0.32, y+bob-r*0.08, r*0.18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r*0.32, y+bob-r*0.08, r*0.18, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(x-r*0.27, y+bob-r*0.13, r*0.06, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r*0.37, y+bob-r*0.13, r*0.06, 0, Math.PI*2); ctx.fill();
  // type tells
  if (c.type==='runner') { /* spiky ears */ ctx.strokeStyle=shade(c.color,-30); ctx.lineWidth=2*GF.S; ctx.beginPath(); ctx.moveTo(x-r*0.5,y+bob-r*0.8); ctx.lineTo(x-r*0.7,y+bob-r*1.25); ctx.moveTo(x+r*0.5,y+bob-r*0.8); ctx.lineTo(x+r*0.7,y+bob-r*1.25); ctx.stroke(); }
  if (c.type==='spitter') { ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x, y+bob+r*0.45, r*0.18, 0, Math.PI*2); ctx.fill(); }
  if (c.boss) { /* horns */ ctx.fillStyle=shade(c.color,-40); ctx.beginPath(); ctx.moveTo(x-r*0.55,y+bob-r*0.7); ctx.lineTo(x-r*0.85,y+bob-r*1.15); ctx.lineTo(x-r*0.35,y+bob-r*0.95); ctx.closePath(); ctx.fill(); ctx.beginPath(); ctx.moveTo(x+r*0.55,y+bob-r*0.7); ctx.lineTo(x+r*0.85,y+bob-r*1.15); ctx.lineTo(x+r*0.35,y+bob-r*0.95); ctx.closePath(); ctx.fill(); }
  // hp bar for tanky/boss
  if ((c.boss || c.type==='brute') && c.hp < c.maxHp) {
    var bw=r*1.8, bh=4*GF.S, bx=x-bw/2, by=y+bob-r-8*GF.S;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#ff5a7a'; ctx.fillRect(bx,by,bw*Math.max(0,c.hp/c.maxHp),bh);
  }
  ctx.restore();
}

function drawBlade(ctx, x, y, ang) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(ang*2);
  ctx.shadowColor='#9fefff'; ctx.shadowBlur=8;
  ctx.fillStyle='#dffaff';
  for (var i=0;i<3;i++){ ctx.rotate(Math.PI*2/3); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(11*GF.S,-3*GF.S); ctx.lineTo(13*GF.S,0); ctx.lineTo(11*GF.S,3*GF.S); ctx.closePath(); ctx.fill(); }
  ctx.restore();
}

function drawGem(ctx, x, y) {
  var r=6*GF.S, pulse=0.6+0.4*Math.sin(performance.now()/200 + x*0.05);
  ctx.save(); ctx.translate(x,y); ctx.rotate(Math.PI/4);
  ctx.shadowColor='#4dffa0'; ctx.shadowBlur=10*pulse;
  ctx.fillStyle='#54ffb0';
  GF.rr(ctx, -r, -r, r*2, r*2, r*0.3); ctx.fill();
  ctx.fillStyle='#bfffe0'; GF.rr(ctx, -r*0.5, -r*0.5, r*0.7, r*0.7, r*0.2); ctx.fill();
  ctx.restore();
}
function drawHeart(ctx, x, y) {
  var r=11*GF.S;
  ctx.save(); ctx.translate(x,y); ctx.shadowColor='#ff5a7a'; ctx.shadowBlur=10; ctx.fillStyle='#ff5a7a';
  ctx.beginPath();
  ctx.moveTo(0, r*0.35);
  ctx.bezierCurveTo(r, -r*0.5, r*0.5, -r, 0, -r*0.35);
  ctx.bezierCurveTo(-r*0.5, -r, -r, -r*0.5, 0, r*0.35);
  ctx.fill(); ctx.restore();
}

// shade a hex color by amt (-100..100)
function shade(hex, amt) {
  var c = hex.replace('#',''); var n=parseInt(c,16);
  var r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  r=Math.max(0,Math.min(255,r+amt)); g=Math.max(0,Math.min(255,g+amt)); b=Math.max(0,Math.min(255,b+amt));
  return 'rgb('+r+','+g+','+b+')';
}

// ── HUD ──────────────────────────────────────────────────────────────────
function drawHUD(ctx) {
  var S=GF.S, W=GF.W, pad=10*S;
  // XP bar across the top
  var barH = 16*S, barY = pad;
  ctx.fillStyle='rgba(0,0,0,0.45)'; GF.rr(ctx, pad, barY, W-pad*2, barH, barH/2); ctx.fill();
  var frac = GF.clamp(xp/xpNext, 0, 1);
  var flash = levelFlash>0 ? (0.5+0.5*Math.sin(performance.now()/40)) : 0;
  var xgrd=ctx.createLinearGradient(pad,0,W-pad,0); xgrd.addColorStop(0,'#54ffb0'); xgrd.addColorStop(1,'#37c9ff');
  ctx.fillStyle = flash>0.5 ? '#ffffff' : xgrd;
  if (frac>0) { GF.rr(ctx, pad, barY, (W-pad*2)*frac, barH, barH/2); ctx.fill(); }
  // LV label
  ctx.fillStyle='#fff'; ctx.font='bold '+GF.clamp(12*S,10,16)+'px Inter, system-ui, sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(GF.t('level')+' '+level, pad+8*S, barY+barH/2);

  // HP bar
  var hpY = barY+barH+6*S, hpW=Math.min(180*S, W*0.42), hpH=13*S;
  ctx.fillStyle='rgba(0,0,0,0.45)'; GF.rr(ctx, pad, hpY, hpW, hpH, hpH/2); ctx.fill();
  var hpFrac=GF.clamp(hp/hero.maxHp,0,1);
  ctx.fillStyle = hpFrac<0.25 ? '#ff3b5b' : '#ff5a7a';
  if (hpFrac>0) { GF.rr(ctx, pad, hpY, hpW*hpFrac, hpH, hpH/2); ctx.fill(); }
  ctx.fillStyle='#fff'; ctx.font='bold '+GF.clamp(10*S,9,13)+'px Inter, system-ui, sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(Math.ceil(hp)+'/'+hero.maxHp, pad+8*S, hpY+hpH/2);

  // place HUD buttons row top-right (sets L.btnPause/Help/Mute rects)
  layoutHudButtons();

  // kills (top-right, left of buttons)
  ctx.fillStyle='#9fb3d8'; ctx.font='bold '+GF.clamp(12*S,10,15)+'px Inter, system-ui, sans-serif'; ctx.textAlign='right'; ctx.textBaseline='middle';
  var killX = L.btnPause ? L.btnPause.x - 10*S : W-pad;
  ctx.fillText(GF.t('kills')+' '+kills, killX, hpY+hpH/2);

  // survival time (primary metric) - centered on its OWN row just below the
  // bars. Was centered at GF.cx on the HP-bar row, where the wide timer
  // overlapped the kills label (the top row has no free horizontal span).

function layoutHudButtons() {

function drawHudBtn(ctx, b, kind) {

function fmtTime(t) {

function drawLevelUp(ctx) {

function layoutChoiceCards() {
  var S=GF.S, W=GF.W, H=GF.H;
  var cw = Math.min(W*0.86, 420*S);
  var top = H*0.27, bottom = H*0.93;
  var avail = bottom - top;

}
function drawChoiceCard(ctx, r, u) {
  if (!r||!u) return;
  var S=GF.S;
  ctx.save();
  var grd=ctx.createLinearGradient(r.x,r.y,r.x,r.y+r.h); grd.addColorStop(0,'#1c2742'); grd.addColorStop(1,'#141d33');
  ctx.fillStyle=grd; GF.rr(ctx, r.x, r.y, r.w, r.h, 14*S); ctx.fill();
  ctx.strokeStyle='rgba(120,200,255,0.45)'; ctx.lineWidth=2*S; GF.rr(ctx, r.x, r.y, r.w, r.h, 14*S); ctx.stroke();
  // icon disc
  var ix=r.x+r.h*0.5, iy=r.y+r.h*0.5, ir=r.h*0.32;
  ctx.fillStyle='rgba(80,160,255,0.18)'; ctx.beginPath(); ctx.arc(ix, iy, ir, 0, Math.PI*2); ctx.fill();
  drawUpgradeIcon(ctx, u.icon, ix, iy, ir*1.05);
  // count pips (current stacks)
  var have = hero.took[u.id]||0;
  if (have>0) { for (var p=0;p<Math.min(have,8);p++){ ctx.fillStyle='#54ffb0'; ctx.beginPath(); ctx.arc(r.x+r.h*0.5 - ir + p*(ir*0.32), r.y+r.h-9*S, 2.4*S, 0, Math.PI*2); ctx.fill(); } }
  // text
  var tx=r.x+r.h+6*S;
  ctx.fillStyle='#fff'; ctx.font='bold '+GF.clamp(18*S,14,24)+'px Inter, system-ui, sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(GF.t(u.nk), tx, r.y+r.h*0.38);
  ctx.fillStyle='#9fb3d8'; ctx.font=GF.clamp(13*S,11,17)+'px Inter, system-ui, sans-serif';
  wrapLine(ctx, GF.t(u.dk), tx, r.y+r.h*0.66, r.w-r.h-16*S, GF.clamp(15*S,13,19));
  ctx.restore();
}
function drawUpgradeIcon(ctx, icon, x, y, s) {
  ctx.save(); ctx.translate(x,y);
  ctx.lineWidth = Math.max(2, s*0.14); ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.strokeStyle='#aef4ff'; ctx.fillStyle='#aef4ff';
  if (icon==='proj') { for(var i=-1;i<=1;i++){ ctx.beginPath(); ctx.arc(i*s*0.4, 0, s*0.16, 0, Math.PI*2); ctx.fill(); } }
  else if (icon==='rate') { ctx.beginPath(); ctx.moveTo(-s*0.5,0); ctx.lineTo(s*0.2,0); ctx.moveTo(0,-s*0.3); ctx.lineTo(s*0.4,0); ctx.lineTo(0,s*0.3); ctx.stroke(); }
  else if (icon==='dmg') { ctx.beginPath(); ctx.moveTo(0,-s*0.5); ctx.lineTo(s*0.18,-s*0.1); ctx.lineTo(0,s*0.5); ctx.lineTo(-s*0.18,-s*0.1); ctx.closePath(); ctx.fill(); }
  else if (icon==='area') { ctx.beginPath(); ctx.arc(0,0,s*0.45,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(0,0,s*0.18,0,Math.PI*2); ctx.fill(); }
  else if (icon==='pierce') { ctx.beginPath(); ctx.moveTo(-s*0.5,0); ctx.lineTo(s*0.5,0); ctx.moveTo(s*0.5,0); ctx.lineTo(s*0.25,-s*0.15); ctx.moveTo(s*0.5,0); ctx.lineTo(s*0.25,s*0.15); ctx.stroke(); ctx.beginPath(); ctx.arc(-s*0.1,0,s*0.13,0,Math.PI*2); ctx.fill(); }
  else if (icon==='blade') { ctx.beginPath(); ctx.arc(0,0,s*0.4,0,Math.PI*2); ctx.stroke(); for(var b=0;b<3;b++){ ctx.save(); ctx.rotate(b*Math.PI*2/3); ctx.beginPath(); ctx.moveTo(s*0.4,0); ctx.lineTo(s*0.58,-s*0.1); ctx.lineTo(s*0.58,s*0.1); ctx.closePath(); ctx.fill(); ctx.restore(); } }
  else if (icon==='magnet') { ctx.lineWidth=s*0.2; ctx.beginPath(); ctx.arc(0,-s*0.05,s*0.32,Math.PI,0); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-s*0.32,-s*0.05); ctx.lineTo(-s*0.32,s*0.32); ctx.moveTo(s*0.32,-s*0.05); ctx.lineTo(s*0.32,s*0.32); ctx.stroke(); }
  else if (icon==='speed') { for(var l=0;l<3;l++){ ctx.beginPath(); ctx.moveTo(-s*0.5, -s*0.25+l*s*0.25); ctx.lineTo(s*0.35, -s*0.25+l*s*0.25); ctx.stroke(); } ctx.beginPath(); ctx.moveTo(s*0.1,-s*0.45); ctx.lineTo(s*0.5,0); ctx.lineTo(s*0.1,s*0.45); ctx.stroke(); }
  else if (icon==='hp') { ctx.fillStyle='#ff7a92'; ctx.beginPath(); ctx.moveTo(0,s*0.32); ctx.bezierCurveTo(s*0.5,-s*0.2,s*0.25,-s*0.5,0,-s*0.18); ctx.bezierCurveTo(-s*0.25,-s*0.5,-s*0.5,-s*0.2,0,s*0.32); ctx.fill(); }
  else if (icon==='spread') { for(var sp=-1;sp<=1;sp++){ ctx.save(); ctx.rotate(sp*0.4); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-s*0.5); ctx.stroke(); ctx.restore(); } }
  else if (icon==='crit') { ctx.beginPath(); var pts=5,or=s*0.5,ir=s*0.22; for(var k=0;k<pts*2;k++){ var rad=(k%2?ir:or), an=k*Math.PI/pts-Math.PI/2; ctx[k?'lineTo':'moveTo'](Math.cos(an)*rad, Math.sin(an)*rad); } ctx.closePath(); ctx.fill(); }
  else if (icon==='knock') { ctx.beginPath(); ctx.arc(-s*0.2,0,s*0.16,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(s*0.5,0); ctx.moveTo(s*0.5,0); ctx.lineTo(s*0.3,-s*0.15); ctx.moveTo(s*0.5,0); ctx.lineTo(s*0.3,s*0.15); ctx.stroke(); }
  else if (icon==='regen') { ctx.beginPath(); ctx.arc(0,0,s*0.38,-Math.PI*0.5,Math.PI*1.2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(s*0.0,-s*0.5); ctx.lineTo(s*0.18,-s*0.32); ctx.lineTo(-s*0.05,-s*0.28); ctx.closePath(); ctx.fill(); }
  else if (icon==='speedb') { ctx.beginPath(); ctx.arc(0,0,s*0.16,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.moveTo(-s*0.5,0); ctx.lineTo(-s*0.15,0); ctx.stroke(); }
  ctx.restore();
}
function wrapLine(ctx, text, x, y, maxW, lineH) {
  var words=String(text).split(/\s+/), line='', lines=[];
  for (var i=0;i<words.length;i++){ var probe=line?line+' '+words[i]:words[i]; if (ctx.measureText(probe).width>maxW && line){ lines.push(line); line=words[i]; } else line=probe; }
  if (line) lines.push(line);
  for (var j=0;j<lines.length;j++) ctx.fillText(lines[j], x, y+j*lineH);
}

function hubBtn(ctx, r, label, color, primary) {
  if (!r) return;
  var S=GF.S;
  ctx.save();
  var grd=ctx.createLinearGradient(r.x,r.y,r.x,r.y+r.h);
  grd.addColorStop(0, shade2(color, 18)); grd.addColorStop(1, color);
  ctx.fillStyle=primary?grd:'rgba(30,40,64,0.92)';
  if (primary){ ctx.shadowColor=color; ctx.shadowBlur=16*S; }
  GF.rr(ctx, r.x, r.y, r.w, r.h, r.h/2); ctx.fill();
  ctx.shadowBlur=0;
  if (!primary){ ctx.strokeStyle=color; ctx.lineWidth=2*S; GF.rr(ctx, r.x, r.y, r.w, r.h, r.h/2); ctx.stroke(); }
  ctx.fillStyle=primary?'#fff':'#dfe7ff'; ctx.font='bold '+GF.clamp(17*S,14,22)+'px Inter, system-ui, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  // strip any stray emoji from the mute label for canvas safety
  ctx.fillText(String(label).replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}]/gu,'').trim(), GF.cx, r.y+r.h/2);
  ctx.restore();
}
function shade2(rgbOrHex, amt) {
  if (rgbOrHex[0]==='#') return shade(rgbOrHex, amt);
  return rgbOrHex;
}

// ── INPUT (clicks/taps on overlays + HUD) ────────────────────────────────
function rectHit(b, x, y) { return b && x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h; }
function onPress(x, y) {
  // tutorial consumes first (its skip pill etc.)
  if (GF.tutorial.active) {
    var consumed = GF.tutorial.handleClick(x, y);
    // movement during tutorial still happens via touch drag (gf-lib touch),
    // so let drags through; handleClick swallows taps. For the gem step,
    // tapping is fine to fall through. We return only if a skip happened.
    if (consumed && !GF.tutorial.active) return; // tutorial was skipped/finished
    // else: allow gameplay drag to proceed
  }

  if (gs==='MENU') {
    if (rectHit(L.menuHelp, x, y)) { startGame(); GF.tutorial && reopenTutorial(); return; }
    return; // PLAY handled by gf-lib buttons[]
  }
  if (gs==='LEVELUP') {
    for (var i=0;i<L.cards.length;i++) if (rectHit(L.cards[i], x, y)) { pickUpgrade(choices[i]); return; }
    return;
  }
  if (gs==='PAUSE') {
    if (rectHit(L.pResume, x, y)) { gs='PLAYING'; GF.sfx('tap'); return; }
    if (rectHit(L.pHow, x, y)) { reopenTutorial(); return; }
    if (rectHit(L.pMute, x, y)) { var m=GF.toggleMute(); GF.setMusicMuted(m); return; }
    if (rectHit(L.pRestart, x, y)) { startGame(); return; }
    return;
  }
  if (gs==='GAMEOVER') {
    if (rectHit(L.goRetry, x, y)) { startGame(); return; }
    return;
  }
  if (gs==='PLAYING') {
    if (rectHit(L.btnPause, x, y)) { gs='PAUSE'; GF.sfx('tap'); return; }
    if (rectHit(L.btnHelp, x, y)) { reopenTutorial(); return; }
    if (rectHit(L.btnMute, x, y)) { var m2=GF.toggleMute(); GF.setMusicMuted(m2); return; }
  }
}
// wire pointer + touch to onPress (in addition to gf-lib's button[] handling
// for the PLAY/RETRY overlay buttons). Compute hit-scale per event.
function evtToCanvas(clientX, clientY) {
  var r = GF.canvas.getBoundingClientRect();
  var sx = r.width ? GF.canvas.width / r.width : 1;
  var sy = r.height ? GF.canvas.height / r.height : 1;
  return { x:(clientX-r.left)*sx, y:(clientY-r.top)*sy };
}
GF.canvas.addEventListener('pointerdown', function(e){ var p=evtToCanvas(e.clientX,e.clientY); onPress(p.x,p.y); });
GF.canvas.addEventListener('touchstart', function(e){ if(!e.changedTouches.length)return; var t0=e.changedTouches[0]; var p=evtToCanvas(t0.clientX,t0.clientY); onPress(p.x,p.y); }, { passive:true });
// keyboard: P toggles pause; Space/Enter dismiss levelup picks first card; Esc resume
document.addEventListener('keydown', function(e){
  if (e.code==='KeyP') { if (gs==='PLAYING'){ gs='PAUSE'; } else if (gs==='PAUSE'){ gs='PLAYING'; } }
  if (e.code==='Enter'||e.code==='Space') { if (gs==='MENU'||gs==='GAMEOVER') startGame(); else if (gs==='LEVELUP' && choices.length) pickUpgrade(choices[0]); }
});

// ── REACHABILITY GATE (window.__gfReach / __gfTour) ──────────────────────
function _ri(id, r, pinned){ if(!r) return null; return { id:id, x:Math.round(r.x), y:Math.round(r.y), w:Math.round(r.w), h:Math.round(r.h), pinned:!!pinned }; }
function _push(arr, it){ if(it) arr.push(it); }
function reachState() {
  var H=GF.H, items=[], res={ screen:gs, items:items, screenH:H, viewportH:H };
  if (gs==='MENU') {
    // PLAY rect from gf-lib overlay button; help button below it
    var pr = window.__gfPlayRect ? window.__gfPlayRect() : null;
    if (pr) { var rc=GF.canvas.getBoundingClientRect(); var sx=GF.canvas.width/(rc.width||1), sy=GF.canvas.height/(rc.height||1); _push(items, _ri('play', { x:(pr.x-rc.left)*sx, y:(pr.y-rc.top)*sy, w:pr.w*sx, h:pr.h*sy }, true)); }
    _push(items, _ri('howto', L.menuHelp, true));
  } else if (gs==='PLAYING') {
    layoutHudButtons();
    _push(items, _ri('pause', L.btnPause, true));
    _push(items, _ri('help', L.btnHelp, true));
    _push(items, _ri('mute', L.btnMute, true));
  } else if (gs==='LEVELUP') {
    layoutChoiceCards();
    for (var i=0;i<L.cards.length;i++) _push(items, _ri('upgrade_'+i, L.cards[i], true));
  } else if (gs==='PAUSE') {
    _push(items, _ri('resume', L.pResume, true));
    _push(items, _ri('howto', L.pHow, true));
    _push(items, _ri('mute', L.pMute, true));
    _push(items, _ri('restart', L.pRestart, true));
  } else if (gs==='GAMEOVER') {
    _push(items, _ri('retry', L.goRetry, true));
  }
  return res;
}
var REACH_TOUR = [
  { name:'menu',     go:function(){ gs='MENU'; } },
  { name:'playing',  go:function(){ window._silent=true; startGame(); window._silent=false; GF.tutorial.active=false; } },
  { name:'levelup',  go:function(){ if(gs!=='PLAYING'){ window._silent=true; startGame(); window._silent=false; } GF.tutorial.active=false; level=2; triggerLevelUp(); } },
  { name:'pause',    go:function(){ if(gs==='MENU'){ window._silent=true; startGame(); window._silent=false; } GF.tutorial.active=false; gs='PAUSE'; } },
  { name:'gameover', go:function(){ if(!hero){ window._silent=true; startGame(); window._silent=false; } GF.tutorial.active=false; runTime=63; kills=40; level=6; gs='GAMEOVER'; } },
];

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 393, designH: 852,
  strings: STRINGS,
  saveKey: SAVE_KEY,
  onReady: function() {
    try { best = parseInt(localStorage.getItem(SAVE_KEY+'_best')||'0')||0; } catch(e){}
    resetHero();   // so reachState/draw never hit a null hero before first start

    // Yandex 1.9 - persist run across reload. Bounce a live run to a safe state
    // (MENU on gallery / re-armed on platform) rather than resuming mid-combat.
    GF.persist(SAVE_KEY+'_run_v1',
      function(){ return { best:best, level:level, kills:kills, runTime:runTime, gs:(gs==='GAMEOVER'?'GAMEOVER':'MENU') }; },
      function(s){ if(!s) return; best = Math.max(best, s.best||0); }
    );
    if (gs==='PLAYING'||gs==='LEVELUP'||gs==='PAUSE') gs='MENU';

    // AUDIO - procedural arcade bed + sfx (HARD rule 8). Mute persists.
    GF.startMusic({ preset:'arcade', muted:GF.muted });

    // state + reachability hooks for the gates
    GF.exposeState(function(){
      return { gs:gs, hp:Math.round(hp||0), maxHp: hero?hero.maxHp:MAX_HP, level:level||1, xp:Math.round(xp||0),
               kills:kills||0, score:score||0, runTime:Math.round(runTime||0), crits:crits?crits.length:0,
               bullets:bullets?bullets.length:0, gems:gems?gems.length:0, fireCount:hero?hero.fireCount:1,
               blades:hero?hero.blades:0, heroX:hero?Math.round(hero.x):0, heroY:hero?Math.round(hero.y):0,
               best:Math.round(best||0) };
    });
    GF.exposeReach(reachState);
    GF.exposeTour(REACH_TOUR);

    // PLATFORM AUTOSTART (HARD rule 9) - drop straight into a run on platform
    // builds; gallery keeps the menu. Meta (pause hub / help) is reachable in-run.
    if (window.__GF_AUTOSTART && !window._silent) { startGame(); }
  },
  onUpdate: update,
  onDraw: draw,
});

// ── YANDEX MUST-HAVES (don't remove): GF.t() everywhere, GF.persist save,
// gf-lib fullscreen-exit resize, no auto-fire ads (this game shows no ads). ──

})();
</script>
