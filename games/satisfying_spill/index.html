(function() {

var SPRITE_NAMES = ['bucket', 'mop'];

// ── TUNABLES (match DESIGN.md) ───────────────────────────────────────────
var GRID_COLS = 12;
var GRID_ROWS = 9;
var WIN_DRY_PCT = 0.95;
var MAX_ROUNDS = 5;
var SPILLS_PER_ROUND = 1;
var SPREAD_PER_TURN = 1;
var SPREAD_PROB = 0.55;
var MOP_CAPACITY = 3;
var BUCKET_REFILL = 3;
var CAP_RADIUS = 1;

// ── PALETTE ──────────────────────────────────────────────────────────────
var COL_BG_TOP   = '#1f1a14';
var COL_BG_BOT   = '#0f0c08';
var COL_TILE_LO  = '#d6c39c';
var COL_TILE_HI  = '#bda478';
var COL_GROUT    = '#5e4d33';
var COL_WET      = '#3b8db3';
var COL_WET_EDGE = '#5fb5d8';
var COL_WET_DEEP = '#1f5a78';
var COL_SOURCE   = '#0e2a3a';
var COL_CAPPED   = '#2f6644';
var COL_BUCKET   = '#3aa9ff';
var COL_BUCKET_RIM = '#1564a6';
var COL_MOP_HANDLE = '#a07a3e';
var COL_MOP_HEAD = '#e8e1c8';
var COL_INK      = '#fff7e6';
var COL_INK_SOFT = '#a09980';
var COL_DANGER   = '#e74c3c';
var COL_HUD_BG   = 'rgba(20,16,10,0.78)';
var COL_HUD_BG_HARD = '#1c170f';

// ── BOARD GEOMETRY ───────────────────────────────────────────────────────
function getBoardLayout() {
  var hudH = GF.clamp(64 * GF.S, 56, 90);
  var avW = GF.W;
  var avH = GF.H - hudH - 12 * GF.S;
  var cell = Math.min(avW / GRID_COLS, avH / GRID_ROWS);
  var boardW = cell * GRID_COLS;
  var boardH = cell * GRID_ROWS;
  var x0 = (GF.W - boardW) / 2;
  var y0 = hudH + (avH - boardH) / 2;
  return { cell: cell, x0: x0, y0: y0, boardW: boardW, boardH: boardH, hudH: hudH };
}

function cellRect(r, c, layout) {
  return { x: layout.x0 + c * layout.cell, y: layout.y0 + r * layout.cell, w: layout.cell, h: layout.cell };
}

function pointToCell(px, py, layout) {
  var cc = Math.floor((px - layout.x0) / layout.cell);
  var rr = Math.floor((py - layout.y0) / layout.cell);
  if (cc < 0 || cc >= GRID_COLS || rr < 0 || rr >= GRID_ROWS) return null;
  return { r: rr, c: cc };
}

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';
var round = 1;
var score = 0;
var best  = 0;
var grid = [];
var spills = [];
var mopCharge = MOP_CAPACITY;
var bucket = { r: 0, c: 0 };
var dryPct = 1;
var stroke = { active: false, cells: [], lastCell: null };
var trail = [];
var leakedTile = null;
var leakFlashT = 0;
var pulseT = 0;
var roundsWon = 0;
var helpBtn = null;
var spreadAnim = 0;
var lastSpreadAdds = [];
var mopPos = null;

// ── HELPERS ──────────────────────────────────────────────────────────────
function inBounds(r, c) { return r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS; }
function isEdge(r, c) { return r === 0 || r === GRID_ROWS - 1 || c === 0 || c === GRID_COLS - 1; }
function newCell() { return { wet: false, source: false, capped: false, age: 0 }; }
function countDry() {
  var dry = 0, total = GRID_ROWS * GRID_COLS;
  for (var r = 0; r < GRID_ROWS; r++) for (var c = 0; c < GRID_COLS; c++) if (!grid[r][c].wet) dry++;
  return dry / total;
}
function neighbours(r, c) {
  return [{r:r-1,c:c},{r:r+1,c:c},{r:r,c:c-1},{r:r,c:c+1}].filter(function(p){ return inBounds(p.r, p.c); });
}

function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = seed;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
var rngSeed = 1;
var rng = Math.random;
function getDaySeed() {
  var d = new Date();
  return d.getUTCFullYear() * 10000 + (d.getUTCMonth() + 1) * 100 + d.getUTCDate();
}

// ── BOARD SETUP ──────────────────────────────────────────────────────────
function buildRound(n) {
  SPILLS_PER_ROUND = Math.min(3, 1 + Math.floor((n - 1) / 2));
  SPREAD_PER_TURN  = n >= 4 ? 2 : 1;
  rngSeed = getDaySeed() * 100 + n;
  rng = mulberry32(rngSeed);

  grid = [];
  for (var r = 0; r < GRID_ROWS; r++) {
    grid[r] = [];
    for (var c = 0; c < GRID_COLS; c++) grid[r][c] = newCell();
  }

  var bx = 1 + Math.floor(rng() * (GRID_COLS - 2));
  var by = 1 + Math.floor(rng() * (GRID_ROWS - 2));
  bucket = { r: by, c: bx };

  spills = [];
  var attempts = 0;
  while (spills.length < SPILLS_PER_ROUND && attempts < 400) {
    attempts++;
    var sc = 2 + Math.floor(rng() * (GRID_COLS - 4));
    var sr = 2 + Math.floor(rng() * (GRID_ROWS - 4));
    if (Math.abs(sc - bucket.c) + Math.abs(sr - bucket.r) < 3) continue;
    var ok = true;
    for (var i = 0; i < spills.length; i++) {
      if (Math.abs(sc - spills[i].c) + Math.abs(sr - spills[i].r) < 4) { ok = false; break; }
    }
    if (!ok) continue;
    spills.push({ r: sr, c: sc, capped: false });
    grid[sr][sc].source = true;
    grid[sr][sc].wet = true;
    grid[sr][sc].age = 5;
    var around = neighbours(sr, sc);
    for (var j = 0; j < around.length; j++) {
      if (rng() < 0.5) { grid[around[j].r][around[j].c].wet = true; grid[around[j].r][around[j].c].age = 2; }
    }
  }

  mopCharge = MOP_CAPACITY;
  stroke = { active: false, cells: [], lastCell: null };
  trail = [];
  leakedTile = null;
  leakFlashT = 0;
  dryPct = countDry();
  mopPos = null;
  spreadAnim = 0;
  lastSpreadAdds = [];
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  round = 1; score = 0; roundsWon = 0;
  buildRound(round);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function nextRound() {
  round++;
  if (round > MAX_ROUNDS) {
    gs = 'WON';
    GF.gameEnded();
    GF.saveRun();
    return;
  }
  buildRound(round);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function gameOver() {
  if (score > best) {
    best = score;
    try { localStorage.setItem('spill_best', String(best)); } catch (e) {}
  }
  gs = 'GAMEOVER';
  GF.setShake(0.45);
  GF.gameEnded();
  GF.saveRun();
}

function endRound() {
  roundsWon++;
  score += Math.round(dryPct * 100);
  if (score > best) {
    best = score;
    try { localStorage.setItem('spill_best', String(best)); } catch (e) {}
  }
  gs = 'ROUNDEND';
  GF.gameEnded();
  GF.saveRun();
}

window._jumpLevel = function(n) {
  startGame();
  if (typeof n === 'number' && n >= 99) {
    // Test path used by the runtime gate to verify terminal-state reachability.
    // Force a wet tile onto the wall edge to trigger gameOver().
    grid[0][3].wet = true;
    leakedTile = { r: 0, c: 3 };
    leakFlashT = 1;
    gameOver();
    return;
  }
  if (typeof n === 'number' && n > 0) {
    for (var i = 1; i < n && round < MAX_ROUNDS; i++) {
      round++;
      buildRound(round);
    }
    gs = 'PLAYING';
  }
};

window._setupForScreenshot = function(variant) {
  startGame();
  round = 3; buildRound(round);
  for (var k = 0; k < 3; k++) tickSpread();
  for (var r = 1; r < GRID_ROWS - 1; r++) {
    for (var c = 1; c < GRID_COLS - 1; c++) {
      if (grid[r][c].wet && !grid[r][c].source && Math.random() < 0.18) {
        grid[r][c].wet = false;
        trail.push({ r: r, c: c, life: 1 });
      }
    }
  }
  mopCharge = 2;
  mopPos = { r: Math.floor(GRID_ROWS / 2), c: Math.floor(GRID_COLS / 2) };
  gs = 'PLAYING';
  dryPct = countDry();
};

// ── INPUT (drag stroke across cells) ─────────────────────────────────────
function onPointerDown(x, y) {
  if (gs === 'PLAYING' && helpBtn) {
    if (x >= helpBtn.x && x <= helpBtn.x + helpBtn.w && y >= helpBtn.y && y <= helpBtn.y + helpBtn.h) {
      reopenTutorial();
      return;
    }
  }
  if (gs !== 'PLAYING') return;
  var layout = getBoardLayout();
  var cell = pointToCell(x, y, layout);
  if (!cell) return;
  stroke.active = true;
  stroke.cells = [];
  stroke.lastCell = null;
  visitCell(cell.r, cell.c);
}

function onPointerMove(x, y) {
  if (!stroke.active || gs !== 'PLAYING') return;
  var layout = getBoardLayout();
  var cell = pointToCell(x, y, layout);
  if (!cell) return;
  if (stroke.lastCell) {
    var path = walkLine(stroke.lastCell, cell);
    for (var i = 0; i < path.length; i++) visitCell(path[i].r, path[i].c);
  } else {
    visitCell(cell.r, cell.c);
  }
}

function onPointerUp() {
  if (!stroke.active) return;
  stroke.active = false;
  if (stroke.cells.length === 0) return;
  tickWorld();
  stroke.cells = [];
  stroke.lastCell = null;
}

function walkLine(a, b) {
  var out = [];
  var x0 = a.c, y0 = a.r, x1 = b.c, y1 = b.r;
  var dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
  var sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
  var err = dx - dy;
  var safety = 0;
  while (safety++ < 64) {
    if (x0 === x1 && y0 === y1) { out.push({ r: y0, c: x0 }); break; }
    var e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x0 += sx; out.push({ r: y0, c: x0 }); }
    if (x0 === x1 && y0 === y1) break;
    if (e2 < dx)  { err += dx; y0 += sy; out.push({ r: y0, c: x0 }); }
  }
  return out;
}

function visitCell(r, c) {
  if (!inBounds(r, c)) return;
  if (stroke.lastCell && stroke.lastCell.r === r && stroke.lastCell.c === c) return;
  stroke.cells.push({ r: r, c: c });
  stroke.lastCell = { r: r, c: c };
  mopPos = { r: r, c: c };

  var cell = grid[r][c];
  if (bucket.r === r && bucket.c === c) {
    mopCharge = MOP_CAPACITY;
    var ctr = cellCenter(r, c);
    GF.spawnParticles(ctr.x, ctr.y, COL_BUCKET, 6);
    return;
  }
  if (cell.source && !cell.capped) {
    if (mopCharge > 0) {
      cell.capped = true;
      cell.wet = false;
      for (var i = 0; i < spills.length; i++) {
        if (spills[i].r === r && spills[i].c === c) spills[i].capped = true;
      }
      mopCharge--;
      score += 10;
      var ctr2 = cellCenter(r, c);
      GF.spawnParticles(ctr2.x, ctr2.y, COL_CAPPED, 14);
      GF.spawnFloat(ctr2.x, ctr2.y - 8, GF.t('capped'), '#7be29a');
      GF.setShake(0.18);
      trail.push({ r: r, c: c, life: 1 });
      return;
    }
  }
  if (cell.wet && !cell.source && mopCharge > 0) {
    cell.wet = false;
    cell.age = 0;
    mopCharge--;
    score += 1;
    var ctr3 = cellCenter(r, c);
    GF.spawnParticles(ctr3.x, ctr3.y, COL_WET_EDGE, 4);
    trail.push({ r: r, c: c, life: 1 });
  }
}

function cellCenter(r, c) {
  var L = getBoardLayout();
  return { x: L.x0 + (c + 0.5) * L.cell, y: L.y0 + (r + 0.5) * L.cell };
}

// ── TURN ECONOMICS ───────────────────────────────────────────────────────
function tickWorld() {
  for (var k = 0; k < SPREAD_PER_TURN; k++) {
    tickSpread();
    if (gs === 'GAMEOVER') return;
  }
  dryPct = countDry();
  var allCapped = spills.length > 0 && spills.every(function(s){ return s.capped; });
  if (allCapped && dryPct >= WIN_DRY_PCT) endRound();
  GF.saveRun();
}

function tickSpread() {
  var adds = [];
  for (var r = 0; r < GRID_ROWS; r++) {
    for (var c = 0; c < GRID_COLS; c++) {
      var cell = grid[r][c];
      if (!cell.wet) continue;
      if (cell.source && cell.capped) continue;
      var ns = neighbours(r, c);
      for (var i = 0; i < ns.length; i++) {
        var n = ns[i];
        if (grid[n.r][n.c].wet) continue;
        var prob = cell.source ? Math.min(0.95, SPREAD_PROB + 0.25) : SPREAD_PROB * 0.55;
        if (rng() < prob) adds.push({ r: n.r, c: n.c });
      }
    }
  }
  var seen = {};
  for (var j = 0; j < adds.length; j++) {
    var key = adds[j].r + ',' + adds[j].c;
    if (seen[key]) continue;
    seen[key] = true;
    grid[adds[j].r][adds[j].c].wet = true;
    grid[adds[j].r][adds[j].c].age = 1;
    if (isEdge(adds[j].r, adds[j].c)) {
      leakedTile = adds[j];
      leakFlashT = 1;
      gameOver();
      return;
    }
  }
  lastSpreadAdds = adds;
  spreadAnim = 0.65;
}

// ── TUTORIAL (mid-run reopen) ────────────────────────────────────────────
var tutorialPanelOpen = false;
function reopenTutorial() { tutorialPanelOpen = true; }
function closeTutorial()  { tutorialPanelOpen = false; }

function wrapText(c, txt, x, y, maxW, lh) {
  var words = String(txt).split(/\s+/);
  var line = '', curY = y;
  for (var i = 0; i < words.length; i++) {
    var probe = line ? line + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && line) { c.fillText(line, x, curY); line = words[i]; curY += lh; }
    else { line = probe; }
  }
  if (line) c.fillText(line, x, curY);
}

function drawTutorialPanel(c) {
  c.fillStyle = 'rgba(8,5,2,0.78)';
  c.fillRect(0, 0, GF.W, GF.H);
  var pw = Math.min(GF.W - 40, 540 * GF.S);
  var ph = Math.min(GF.H - 60, 360 * GF.S);
  var px = (GF.W - pw) / 2, py = (GF.H - ph) / 2;
  GF.rr(c, px, py, pw, ph, 18 * GF.S);
  c.fillStyle = '#241c12'; c.fill();
  c.strokeStyle = '#ffeb3b'; c.lineWidth = 2 * GF.S; c.stroke();

  var lineFs = GF.clamp(14 * GF.S, 11, 18) | 0;
  var titleFs = GF.clamp(22 * GF.S, 16, 28) | 0;
  c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.font = 'bold ' + titleFs + 'px sans-serif';
  c.fillText(GF.t('title'), GF.W / 2, py + titleFs + 8 * GF.S);
  c.textAlign = 'left'; c.font = lineFs + 'px sans-serif';
  var lines = [GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip')];
  var lh = lineFs + 8 * GF.S;
  var lx = px + 22 * GF.S;
  var ly = py + titleFs + 30 * GF.S;
  for (var i = 0; i < lines.length; i++) {
    c.fillStyle = i === 4 ? '#ffeb3b' : '#e6ddc4';
    wrapText(c, lines[i], lx, ly + i * (lh + 4 * GF.S), pw - 44 * GF.S, lh);
  }
  var btnW = 140 * GF.S, btnH = 38 * GF.S;
  var btnX = (GF.W - btnW) / 2, btnY = py + ph - btnH - 12 * GF.S;
  GF.rr(c, btnX, btnY, btnW, btnH, btnH / 2); c.fillStyle = '#2ecc71'; c.fill();
  c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'bold ' + (lineFs + 1) + 'px sans-serif';
  c.fillText('OK', GF.W / 2, btnY + btnH / 2);
  c.textBaseline = 'alphabetic';
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function update(dt) {
  pulseT += dt;
  if (spreadAnim > 0) spreadAnim = Math.max(0, spreadAnim - dt);
  if (leakFlashT > 0) leakFlashT = Math.max(0, leakFlashT - dt);
  for (var i = trail.length - 1; i >= 0; i--) {
    trail[i].life -= dt * 1.3;
    if (trail[i].life <= 0) trail.splice(i, 1);
  }
}

function draw(ctx) {
  var bg = ctx.createLinearGradient(0, 0, 0, GF.H);
  bg.addColorStop(0, COL_BG_TOP); bg.addColorStop(1, COL_BG_BOT);
  ctx.fillStyle = bg; ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'MENU') { drawMenu(ctx); return; }

  drawBoard(ctx);
  drawHUD(ctx);

  if (gs === 'ROUNDEND') drawRoundEnd(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
  if (gs === 'WON')      drawWon(ctx);

  if (tutorialPanelOpen) drawTutorialPanel(ctx);
}

function drawBoard(ctx) {
  var L = getBoardLayout();
  GF.rr(ctx, L.x0 - 8 * GF.S, L.y0 - 8 * GF.S, L.boardW + 16 * GF.S, L.boardH + 16 * GF.S, 12 * GF.S);
  ctx.fillStyle = COL_HUD_BG_HARD; ctx.fill();
  ctx.strokeStyle = leakFlashT > 0 ? COL_DANGER : '#3b3122';
  ctx.lineWidth = Math.max(3, 4 * GF.S);
  ctx.strokeRect(L.x0 - 4 * GF.S, L.y0 - 4 * GF.S, L.boardW + 8 * GF.S, L.boardH + 8 * GF.S);

  for (var r = 0; r < GRID_ROWS; r++) {
    for (var c = 0; c < GRID_COLS; c++) drawTile(ctx, r, c, L);
  }
  drawBucket(ctx, bucket.r, bucket.c, L);
  if (mopPos) drawMop(ctx, mopPos.r, mopPos.c, L);
}

function drawTile(ctx, r, c, L) {
  var rect = cellRect(r, c, L);
  var cell = grid[r][c];
  var x = rect.x, y = rect.y, w = rect.w, h = rect.h;
  var baseDark = ((r + c) & 1) === 0;
  ctx.fillStyle = baseDark ? COL_TILE_HI : COL_TILE_LO;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = COL_GROUT; ctx.lineWidth = Math.max(1, 1 * GF.S);
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);

  if (cell.wet) {
    var pulse = 0.92 + 0.08 * Math.sin(pulseT * 2.2 + (r * 0.6 + c * 0.4));
    var grad = ctx.createRadialGradient(x + w/2, y + h/2, w * 0.05, x + w/2, y + h/2, w * 0.65);
    grad.addColorStop(0, COL_WET_EDGE);
    grad.addColorStop(0.6, COL_WET);
    grad.addColorStop(1, COL_WET_DEEP);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, w, h);
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.ellipse(x + w * 0.35, y + h * 0.35, w * 0.18, h * 0.08, -0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  if (cell.source) {
    var cx = x + w / 2, cy = y + h / 2;
    if (cell.capped) {
      ctx.fillStyle = COL_CAPPED;
      ctx.beginPath(); ctx.arc(cx, cy, w * 0.28, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + Math.max(10, w * 0.35) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('+', cx, cy + 1);
      ctx.textBaseline = 'alphabetic';
    } else {
      var sPulse = 0.85 + 0.15 * Math.sin(pulseT * 4.2);
      ctx.fillStyle = COL_SOURCE;
      ctx.beginPath(); ctx.arc(cx, cy, w * 0.30 * sPulse, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = COL_WET_EDGE; ctx.lineWidth = Math.max(1, 1.4 * GF.S);
      ctx.beginPath(); ctx.arc(cx, cy, w * 0.30 * sPulse, 0, Math.PI * 2); ctx.stroke();
    }
  }

  for (var t = 0; t < trail.length; t++) {
    if (trail[t].r === r && trail[t].c === c) {
      ctx.fillStyle = 'rgba(255,255,255,' + (0.30 * trail[t].life).toFixed(2) + ')';
      ctx.fillRect(x, y, w, h);
    }
  }

  if (isEdge(r, c) && cell.wet) {
    ctx.fillStyle = 'rgba(231,76,60,0.55)';
    ctx.fillRect(x, y, w, h);
  }
}

function drawBucket(ctx, r, c, L) {
  var rect = cellRect(r, c, L);
  var cx = rect.x + rect.w / 2, cy = rect.y + rect.h / 2;
  var s = rect.w * 0.34;
  var img = GF.sprites['bucket'];
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, cx - s, cy - s, s * 2, s * 2);
    return;
  }
  ctx.fillStyle = COL_BUCKET_RIM;
  ctx.beginPath(); ctx.ellipse(cx, cy + s * 0.85, s * 0.95, s * 0.25, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = COL_BUCKET;
  GF.rr(ctx, cx - s * 0.85, cy - s * 0.7, s * 1.7, s * 1.55, s * 0.18);
  ctx.fill();
  ctx.strokeStyle = COL_BUCKET_RIM; ctx.lineWidth = Math.max(1, 1.5 * GF.S); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy - s * 0.7, s * 0.85, Math.PI, 0); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillRect(cx - s * 0.55, cy - s * 0.4, s * 0.2, s * 0.9);
}

function drawMop(ctx, r, c, L) {
  var rect = cellRect(r, c, L);
  var cx = rect.x + rect.w / 2, cy = rect.y + rect.h / 2;
  var s = rect.w * 0.32;
  var img = GF.sprites['mop'];
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, cx - s, cy - s, s * 2, s * 2);
    return;
  }
  ctx.strokeStyle = COL_MOP_HANDLE; ctx.lineWidth = Math.max(2, 3 * GF.S);
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - s * 0.8, cy - s * 0.8); ctx.lineTo(cx + s * 0.4, cy + s * 0.4); ctx.stroke();
  ctx.fillStyle = COL_MOP_HEAD;
  ctx.beginPath(); ctx.arc(cx + s * 0.4, cy + s * 0.4, s * 0.55, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#7a6a4c'; ctx.lineWidth = Math.max(1, 1.2 * GF.S);
  for (var i = 0; i < 6; i++) {
    var a = i / 6 * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx + s * 0.4, cy + s * 0.4);
    ctx.lineTo(cx + s * 0.4 + Math.cos(a) * s * 0.55, cy + s * 0.4 + Math.sin(a) * s * 0.55);
    ctx.stroke();
  }
}

function drawHUD(ctx) {
  var L = getBoardLayout();
  var hudH = L.hudH;
  ctx.fillStyle = COL_HUD_BG;
  ctx.fillRect(0, 0, GF.W, hudH);
  var fs = GF.clamp(15 * GF.S, 12, 20) | 0;
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.fillStyle = COL_INK; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('round') + ' ' + round + '/' + MAX_ROUNDS, 14 * GF.S, hudH / 2 - fs * 0.6);
  ctx.fillText(GF.t('score') + ' ' + Math.round(dryPct * 100) + '%', 14 * GF.S, hudH / 2 + fs * 0.7);

  var dotR = GF.clamp(8 * GF.S, 5, 12);
  ctx.textAlign = 'right'; ctx.font = fs + 'px sans-serif'; ctx.fillStyle = COL_INK_SOFT;
  ctx.fillText(GF.t('target'), GF.cx - (MOP_CAPACITY * dotR * 1.4) - 8 * GF.S, hudH / 2);
  for (var i = 0; i < MOP_CAPACITY; i++) {
    var px = GF.cx - (MOP_CAPACITY * dotR) + i * (dotR * 2.3) + dotR;
    ctx.beginPath(); ctx.arc(px, hudH / 2, dotR, 0, Math.PI * 2);
    ctx.fillStyle = i < mopCharge ? COL_BUCKET : '#2a2418';
    ctx.fill();
    ctx.strokeStyle = COL_BUCKET_RIM; ctx.lineWidth = Math.max(1, 1.2 * GF.S);
    ctx.stroke();
  }

  ctx.textAlign = 'right'; ctx.fillStyle = COL_INK;
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.fillText(GF.t('best') + ' ' + best, GF.W - 56 * GF.S, hudH / 2);

  var hbR = GF.clamp(18 * GF.S, 14, 24);
  var hbX = GF.W - hbR - 12 * GF.S;
  var hbY = hudH / 2;
  ctx.beginPath(); ctx.arc(hbX, hbY, hbR, 0, Math.PI * 2);
  ctx.fillStyle = '#3a2f1f'; ctx.fill();
  ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth = Math.max(1, 1.5 * GF.S); ctx.stroke();
  ctx.fillStyle = '#ffeb3b'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + (fs + 2) + 'px sans-serif';
  ctx.fillText(GF.t('help'), hbX, hbY + 1);
  ctx.textBaseline = 'alphabetic';
  helpBtn = { x: hbX - hbR, y: hbY - hbR, w: hbR * 2, h: hbR * 2 };
}

function drawMenu(ctx) {
  var titleFs = GF.clamp(46 * GF.S, 28, 64);
  var subFs   = GF.clamp(18 * GF.S, 13, 24);
  var lineFs  = GF.clamp(14 * GF.S, 11, 18);

  ctx.shadowColor = 'rgba(95,181,216,0.55)'; ctx.shadowBlur = 24 * GF.S;
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillText(GF.t('title'), GF.cx, GF.cy - 150 * GF.S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  ctx.fillStyle = '#bda478'; ctx.font = subFs + 'px sans-serif';
  ctx.fillText(GF.t('sub'), GF.cx, GF.cy - 110 * GF.S);

  var tutW = Math.min(GF.W - 40, 560 * GF.S);
  var tutX = GF.cx - tutW / 2;
  var tutY = GF.cy - 80 * GF.S;
  var lh = lineFs + 7 * GF.S;
  var lines = [
    { col: '#fff',    txt: GF.t('tut_goal') },
    { col: '#cdb98e', txt: GF.t('tut_controls') },
    { col: '#a8e3c6', txt: GF.t('tut_win') },
    { col: '#e07b6c', txt: GF.t('tut_lose') },
    { col: '#ffeb3b', txt: GF.t('tut_tip') },
  ];
  ctx.font = lineFs + 'px sans-serif'; ctx.textAlign = 'left';
  for (var i = 0; i < lines.length; i++) {
    ctx.fillStyle = lines[i].col;
    wrapText(ctx, lines[i].txt, tutX, tutY + i * (lh + 4 * GF.S), tutW, lh);
  }

  var btnW = GF.clamp(240 * GF.S, 160, 320), btnH = GF.clamp(56 * GF.S, 40, 70);
  var btnX = GF.cx - btnW / 2, btnY = GF.cy + 110 * GF.S;
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#5fb5d8'); grad.addColorStop(1, '#1564a6');
  ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (subFs + 2) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), GF.cx, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  registerButton(btnX, btnY, btnW, btnH, function() { startGame(); });

  if (best > 0) {
    ctx.fillStyle = '#8a7a55'; ctx.font = lineFs + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, btnY + btnH + 28 * GF.S);
  }
}

function drawRoundEnd(ctx) {
  drawOverlayBox(ctx, GF.t('round_won'), GF.t('round') + ' ' + round + ' — ' + Math.round(dryPct * 100) + '%', GF.t('next'), nextRound);
}

function drawGameOver(ctx) {
  drawOverlayBox(ctx, GF.t('gameover'), GF.t('score') + ': ' + score, GF.t('retry'), startGame);
}

function drawWon(ctx) {
  drawOverlayBox(ctx, GF.t('won'), GF.t('score') + ': ' + score + '  *', GF.t('retry'), startGame);
}

function drawOverlayBox(ctx, title, sub, btnTxt, btnFn) {
  ctx.fillStyle = 'rgba(8,5,2,0.78)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(38 * GF.S, 22, 56);
  var subFs   = GF.clamp(18 * GF.S, 13, 24);
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = 'rgba(95,181,216,0.45)'; ctx.shadowBlur = 22 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillText(title, GF.cx, GF.cy - 30 * GF.S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.fillStyle = '#cdb98e'; ctx.font = subFs + 'px sans-serif';
  ctx.fillText(sub, GF.cx, GF.cy + 6 * GF.S);
  var btnW = GF.clamp(240 * GF.S, 160, 320), btnH = GF.clamp(54 * GF.S, 40, 66);
  var bx = GF.cx - btnW / 2, by = GF.cy + 36 * GF.S;
  GF.rr(ctx, bx, by, btnW, btnH, btnH / 2);
  var grad = ctx.createLinearGradient(bx, by, bx, by + btnH);
  grad.addColorStop(0, '#5fb5d8'); grad.addColorStop(1, '#1564a6');
  ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (subFs + 1) + 'px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText(btnTxt, GF.cx, by + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  registerButton(bx, by, btnW, btnH, btnFn);
}

// ── BUTTON registration (overlay clickables) ─────────────────────────────
var localButtons = [];
function registerButton(x, y, w, h, fn) { localButtons.push({ x: x, y: y, w: w, h: h, fn: fn }); }
function clearButtons() { localButtons = []; }
function hitLocalButton(x, y) {
  for (var i = 0; i < localButtons.length; i++) {
    var b = localButtons[i];
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { b.fn(); return true; }
  }
  return false;
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 1024,
  designH: 720,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'spill',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('spill_best') || '0', 10) || 0; } catch (e) {}
    GF.persist('spill_run_v1',
      function() {
        var grid_s = '';
        for (var r = 0; r < GRID_ROWS; r++) {
          for (var c = 0; c < GRID_COLS; c++) {
            var cell = grid[r] && grid[r][c];
            if (!cell) { grid_s += '.'; continue; }
            grid_s += cell.source ? (cell.capped ? 'C' : (cell.wet ? 'S' : 's')) : (cell.wet ? 'W' : '.');
          }
        }
        return { gs: gs, round: round, score: score, best: best,
                 mopCharge: mopCharge, bucket: bucket, spills: spills, grid_s: grid_s };
      },
      function(s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        round = s.round || 1;
        score = s.score || 0;
        best  = Math.max(best, s.best || 0);
        if (s.grid_s && s.bucket && s.grid_s.length === GRID_ROWS * GRID_COLS) {
          grid = [];
          for (var r = 0; r < GRID_ROWS; r++) {
            grid[r] = [];
            for (var c = 0; c < GRID_COLS; c++) {
              var ch = s.grid_s.charAt(r * GRID_COLS + c);
              var cell = newCell();
              if (ch === 'S') { cell.source = true; cell.wet = true; }
              else if (ch === 's') { cell.source = true; }
              else if (ch === 'C') { cell.source = true; cell.capped = true; }
              else if (ch === 'W') { cell.wet = true; }
              grid[r][c] = cell;
            }
          }
          bucket = s.bucket; spills = s.spills || []; mopCharge = s.mopCharge || MOP_CAPACITY;
          dryPct = countDry();
        }
        if (gs === 'ROUNDEND' || gs === 'GAMEOVER' || gs === 'WON') gs = 'MENU';
      }
    );
  },
  onUpdate: update,
  onDraw: function(ctx) {
    clearButtons();
    draw(ctx);
  },
});

// Expose game state for the runtime gate.
GF.exposeState(function() {
  return {
    gs: gs, round: round, score: score, best: best,
    GRID_COLS: GRID_COLS, GRID_ROWS: GRID_ROWS,
    WIN_DRY_PCT: WIN_DRY_PCT, MAX_ROUNDS: MAX_ROUNDS,
    SPILLS_PER_ROUND: SPILLS_PER_ROUND, SPREAD_PER_TURN: SPREAD_PER_TURN,
    SPREAD_PROB: SPREAD_PROB, MOP_CAPACITY: MOP_CAPACITY,
    BUCKET_REFILL: BUCKET_REFILL, CAP_RADIUS: CAP_RADIUS,
    dryPct: dryPct, mopCharge: mopCharge,
    spillCount: spills.length,
    spillsCapped: spills.filter(function(s){return s.capped;}).length,
    daySeed: getDaySeed(),
  };
});

// ── INPUT BINDINGS (mouse + touch) ───────────────────────────────────────
var canvas = GF.canvas;
canvas.addEventListener('mousedown', function(e) {
  if (tutorialPanelOpen) { closeTutorial(); return; }
  if (hitLocalButton(e.clientX, e.clientY)) return;
  onPointerDown(e.clientX, e.clientY);
});
canvas.addEventListener('mousemove', function(e) {
  if (tutorialPanelOpen) return;
  onPointerMove(e.clientX, e.clientY);
});
window.addEventListener('mouseup', function() {
  if (tutorialPanelOpen) return;
  onPointerUp();
});
canvas.addEventListener('touchstart', function(e) {
  if (tutorialPanelOpen) { closeTutorial(); return; }
  var t0 = e.changedTouches[0];
  if (hitLocalButton(t0.clientX, t0.clientY)) return;
  onPointerDown(t0.clientX, t0.clientY);
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  if (tutorialPanelOpen) return;
  var t0 = e.changedTouches[0];
  onPointerMove(t0.clientX, t0.clientY);
}, { passive: false });
canvas.addEventListener('touchend', function() {
  if (tutorialPanelOpen) return;
  onPointerUp();
}, { passive: false });

})();
</script>
