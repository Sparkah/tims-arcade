function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function lerp(a, b, t) { return a + (b - a) * t; }

window._jumpLevel = function(n) {
  // n=99 is the yandex-testing harness "drop me into GAMEOVER" signal so
  // it can exercise the retry/cycle path without burning 60s. (2026-05-15
  // adapter compatibility — without this Clean Sweep falls back to the
  // 'generic' yandex-testing adapter and skips every click test.)
  if (n === 99) {
    gs = 'GAMEOVER'; timeLeft = 0;
    // iter#11 visual-test hook: seed a plausible yesterday score so the
    // "Yesterday → Today" pill renders for screenshot harness runs that
    // otherwise have an empty dailyScores map.
    if (yesterdayScore <= 0) { yesterdayScore = 800; }
    if (todayBestScore <= 0 && score > 0) todayBestScore = score;
    // iter#14 visual-test hook: seed a plausible rolling 7-day ceiling so the
    // 7-DAY BEST pill renders for screenshot harness runs that otherwise have
    // an empty dailyScores map. Also flip weekBestIsNew if the seeded score
    // exceeds it, so harness can also capture the gold "NEW 7-DAY BEST!" path.
    if (weekBestScore <= 0) { weekBestScore = 1200; }
    if (score > 0 && score > weekBestScore) weekBestIsNew = true;
    return;
  }
  // iter#10: n=98 is the visual-test "drop me into LEVELEND with 3 stars"
  // signal so the iteration harness can verify the new star UI without
  // physically clearing the level. Harmless in production; no UI exposure.
  if (n === 98) {
    if (!levelStartTime) { startLevel(1); }
    lastLevelStars = 3;
    var priorStars = levelStars[level] || 0;
    if (lastLevelStars > priorStars) { levelStars[level] = lastLevelStars; saveLevelStars(); lastLevelStarsNewBest = true; }

    // iter#13 visual-test hook: also seed PERFECT SWEEP so harness paints the stamp
    lastLevelPerfect = true;
    gs = 'LEVELEND';
    return;
  }
  score = 0;
  startLevel(n);
};

// ── iter#7: Yandex ads (rewarded "Extra Time" + throttled interstitial) ─────
// All ad triggers are user-click only (Yandex 4.4). Interstitial throttled
// to ≥3min between fullscreen ads (Yandex 4.1). When the SDK isn't present
// (gallery preview / local dev) helpers no-op for interstitial and grant
// the revive immediately for rewarded — so the feature stays exercisable.
var INTERSTITIAL_GAP_MS = 3 * 60 * 1000;
var lastInterstitialMs = -INTERSTITIAL_GAP_MS;
var extraTimeUsed = false;     // one "+15s" revive per level
var extraTimeLoading = false;  // disables the button while the ad loads
var reviveBtnRect = null;      // hit-test rect for the EXTRA TIME button
var EXTRA_TIME_SEC = 15;

function showInterstitial(onDone) {
  var now = performance.now();
  if (now - lastInterstitialMs < INTERSTITIAL_GAP_MS) { onDone && onDone(); return; }
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showFullscreenAdv) { onDone && onDone(); return; }
  lastInterstitialMs = now;
  try {
    window.ysdk.adv.showFullscreenAdv({
      callbacks: {
        onClose: function() { onDone && onDone(); },
        onError: function() { onDone && onDone(); },
      },
    });
  } catch(e) { onDone && onDone(); }
}
function showRewardedExtraTime() {
  if (extraTimeUsed || extraTimeLoading) return;
  extraTimeLoading = true;
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showRewardedVideo) {
    extraTimeLoading = false; grantExtraTime(); return;
  }
  var rewarded = false, opened = false, settled = false, adWatchdog = null;
  function settleExtraTime(grant) {
    if (settled) return; settled = true;
    if (adWatchdog) { clearTimeout(adWatchdog); adWatchdog = null; }
    extraTimeLoading = false;
    if (grant) grantExtraTime();
  }
  // No-fill guard: if the rewarded ad never OPENS within 4.5s (no ad fill, as in
  // any draft/preview), grant so the button never sticks dead. Matches no-SDK fallback.
  adWatchdog = setTimeout(function() { if (!opened) settleExtraTime(true); }, 4500);
  try {
    window.ysdk.adv.showRewardedVideo({
      callbacks: {
        onOpen:     function() { opened = true; if (adWatchdog) { clearTimeout(adWatchdog); adWatchdog = null; } },
        onRewarded: function() { rewarded = true; },
        onClose:    function() { settleExtraTime(rewarded); },
        onError:    function() { settleExtraTime(true); },
      },
    });
  } catch(e) { settleExtraTime(true); }
}
function grantExtraTime() {
  extraTimeUsed = true;
  timeLeft = EXTRA_TIME_SEC;
  gs = 'PLAYING';
}

// ── iter#8: SFX (procedural Web Audio — zero asset files) ────────────────────
// Additive sound design pass. No <audio> tags, no files — every sound is a
// short oscillator + envelope so the build stays the same size and there's
// no Yandex risk over asset loading. Engine init is lazy on first user
// gesture (so Chrome's autoplay policy doesn't block us). Mute state
// persists in localStorage as 'clean_sweep_muted'. The mute button is a
// 36×36 speaker icon top-right above the canvas (drawn on MENU + GAMEOVER
// overlays only — never during gameplay, no HUD overlap risk).
var MUTE_KEY = 'clean_sweep_muted';
var sfxMuted = false;
var _ac = null;
var muteBtnRect = null;
function loadMute() {
  try { sfxMuted = (localStorage.getItem(MUTE_KEY) === '1'); } catch(e) {}
}
function saveMute() {
  try { localStorage.setItem(MUTE_KEY, sfxMuted ? '1' : '0'); } catch(e) {}
}
function ac() {
  if (!_ac) {
    try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (_ac && _ac.state === 'suspended') { try { _ac.resume(); } catch(e) {} }
  return _ac;
}
function _play(fn) {
  if (sfxMuted) return;
  var ctx2 = ac();
  if (!ctx2) return;
  try { fn(ctx2); } catch(e) {}
}
function _tone(ctx2, freq, dur, type, gain) {
  var g = ctx2.createGain();
  var t0 = ctx2.currentTime;
  g.gain.setValueAtTime(gain, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  g.connect(ctx2.destination);
  var o = ctx2.createOscillator();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t0);
  o.connect(g); o.start(t0); o.stop(t0 + dur + 0.02);
}
// Crumb pickup — pitch rises with combo so chaining FEELS rewarding.
function sfxCollect(c) { _play(function(ctx2){
  var base = 380 + Math.min(c, 12) * 55;
  _tone(ctx2, base, 0.09, 'triangle', 0.16);
}); }
// Big trash thump — when shake fires.
function sfxBigPickup() { _play(function(ctx2){
  _tone(ctx2, 180, 0.18, 'sawtooth', 0.18);
  _tone(ctx2, 90,  0.22, 'sine',     0.22);
}); }
// Level end fanfare — 3-note rising arpeggio.
function sfxLevelEnd() { _play(function(ctx2){
  var notes = [523, 659, 784];
  for (var i = 0; i < notes.length; i++) (function(idx, freq){
    var g = ctx2.createGain();
    var t0 = ctx2.currentTime + idx * 0.09;
    g.gain.setValueAtTime(0.22, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.28);
    g.connect(ctx2.destination);
    var o = ctx2.createOscillator();
    o.type = 'sine'; o.frequency.setValueAtTime(freq, t0);
    o.connect(g); o.start(t0); o.stop(t0 + 0.3);
  })(i, notes[i]);
}); }
// Game over — falling descent.
function sfxGameOver() { _play(function(ctx2){
  var g = ctx2.createGain();
  var t0 = ctx2.currentTime;
  g.gain.setValueAtTime(0.22, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.5);
  g.connect(ctx2.destination);
  var o = ctx2.createOscillator();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(420, t0);
  o.frequency.exponentialRampToValueAtTime(110, t0 + 0.45);
  o.connect(g); o.start(t0); o.stop(t0 + 0.5);
}); }
// Achievement / skin sparkle — short 2-note bell.
function sfxBadge() { _play(function(ctx2){
  _tone(ctx2, 880, 0.12, 'sine', 0.18);
  setTimeout(function(){ _play(function(c2){ _tone(c2, 1320, 0.18, 'sine', 0.16); }); }, 80);
}); }
function sfxSkin() { _play(function(ctx2){
  _tone(ctx2, 740, 0.1, 'triangle', 0.18);
  setTimeout(function(){ _play(function(c2){ _tone(c2, 1175, 0.14, 'triangle', 0.16); }); }, 70);
}); }
// UI button click — tiny chirp.
function sfxClick() { _play(function(ctx2){
  _tone(ctx2, 640, 0.05, 'square', 0.12);
}); }
function toggleMute() {
  sfxMuted = !sfxMuted;
  saveMute();
  // tap the engine so iOS keeps it primed when the player unmutes
  if (!sfxMuted) ac();
}

// ── iter#9: BEST CHAIN (persistent max-combo tracker) ────────────────────────
// Combo is the richest mid-run feedback loop but has no MEMORY between runs —
// players can't see how good their best chain ever was. This adds a tiny
// orthogonal mastery axis: track the highest combo reached in the current
// run (maxComboThisRun) and persist the lifetime ceiling (bestCombo) in
// localStorage. HUD shows a small 'CHAIN best Nx' pill under SCORE/BEST;
// GAMEOVER overlay gets a 'CHAIN x12 (best x15)' summary line; a gold
// 'NEW BEST CHAIN!' flash fires the frame a new lifetime best is set.
var CHAIN_KEY = 'clean_sweep_max_combo';
var bestCombo = 0;            // lifetime ceiling persisted across runs
var maxComboThisRun = 0;      // highest combo reached in the current run
var newBestCombo = false;     // true when this run beat bestCombo (drives GAMEOVER flash)
var chainPulse = 0;           // 0..1, in-run pulse when bestCombo is beaten live
function saveBestCombo() {
  try { localStorage.setItem(CHAIN_KEY, String(bestCombo)); } catch(e) {}
}
function loadBestCombo() {
  try { bestCombo = parseInt(localStorage.getItem(CHAIN_KEY)||'0') || 0; } catch(e) { bestCombo = 0; }
}

// ── iter#10: PER-LEVEL STAR RATINGS ──────────────────────────────────────────
// LEVELEND was bare — just SCORE + NEXT button. This adds a 1-3 star rating
// based on how much of the level's starting time remained when the player
// cleared all debris. 3 stars = ≥50% time left, 2 = ≥25%, 1 = cleared at all.
// Best stars per level persist via clean_sweep_stars_v1 (JSON {level:stars}),
// total shows as a small ★N/30 pill on MENU. Pure mastery axis layered on top
// of score/leaderboard/skins/seed/streak/achievements/chain — gives a tangible
// per-level chase target that's orthogonal to all existing meta loops.
var STARS_KEY = 'clean_sweep_stars_v1';
var STARS_MAX_LEVEL = 10;     // DESIGN.md MAX_LEVEL = 10 (denominator for the ★N/30 pill)
var levelStars = {};           // {1: 3, 2: 2, ...} — best stars per level
var lastLevelStars = 0;        // stars earned on the level just completed (for LEVELEND render)
var lastLevelStarsNewBest = false; // true if just-completed level beat its prior best
var levelStartTime = 0;        // cached starting timeLeft for the active level (denominator)
function loadLevelStars() {
  try {
    var raw = localStorage.getItem(STARS_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') {
        for (var k in parsed) {
          var n = parseInt(parsed[k], 10);
          if (n >= 1 && n <= 3) levelStars[k] = n;
        }
      }
    }
  } catch(e) {}
}
function saveLevelStars() {
  try { localStorage.setItem(STARS_KEY, JSON.stringify(levelStars)); } catch(e) {}
}
function computeStarsForRun(timeRemaining, startingTime) {
  if (!startingTime || startingTime <= 0) return 1;
  var pct = timeRemaining / startingTime;
  if (pct >= 0.5)  return 3;
  if (pct >= 0.25) return 2;
  return 1;
}
function totalLevelStars() {
  var n = 0;
  for (var k in levelStars) n += levelStars[k] || 0;
  return n;
}

// ── iter#11: YESTERDAY'S SCORE (daily-seed delta) ────────────────────────────
// Every player on the same UTC date faces an identical layout (iter#4), so
// today's score is DIRECTLY comparable to yesterday's. Persist the best
// score per UTC date (last 7 kept), then on GAMEOVER show a small
// "Yesterday: N → Today: M (±Δ)" pill beneath the leaderboard. Layers a
// compete-with-yesterday-you loop on top of the shared daily seed —
// orthogonal to leaderboard rank (which is vs. other players) and personal
// best (which is lifetime, not date-aware).
var DAILY_SCORE_KEY = 'clean_sweep_daily_score_v1';   // JSON {YYYY-MM-DD: bestScoreThatDay}
var dailyScores = {};                                  // hydrated from localStorage
var yesterdayScore = 0;                                // 0 = no yesterday entry (first-day player)
var todayBestScore = 0;                                // best score recorded so far today
function loadDailyScores() {
  try {
    var raw = localStorage.getItem(DAILY_SCORE_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') {
        for (var k in parsed) {
          var n = parseInt(parsed[k], 10);
          // basic YYYY-MM-DD sanity + positive score
          if (/^\d{4}-\d{2}-\d{2}$/.test(k) && n > 0) dailyScores[k] = n;
        }
      }
    }
  } catch(e) {}
  // hydrate "yesterday" + "today" snapshots for fast render lookups
  var today = getDayKey();
  todayBestScore = dailyScores[today] || 0;
  // yesterday key = today's UTC date minus 24h
  var d = new Date();
  d.setUTCDate(d.getUTCDate() - 1);
  var y = d.getUTCFullYear();
  var m = String(d.getUTCMonth() + 1).padStart(2, '0');
  var day = String(d.getUTCDate()).padStart(2, '0');
  var yesterdayKey = y + '-' + m + '-' + day;
  yesterdayScore = dailyScores[yesterdayKey] || 0;
}
function saveDailyScores() {
  try {
    // garbage-collect to last 7 days to keep the localStorage entry tiny
    var keys = Object.keys(dailyScores).sort();
    if (keys.length > 7) {
      var drop = keys.length - 7;
      for (var i = 0; i < drop; i++) delete dailyScores[keys[i]];
    }
    localStorage.setItem(DAILY_SCORE_KEY, JSON.stringify(dailyScores));
  } catch(e) {}
}
function recordDailyScore(s) {
  if (!s || s <= 0) return;
  var today = getDayKey();
  if (s > (dailyScores[today] || 0)) {
    dailyScores[today] = s;
    todayBestScore = s;
    saveDailyScores();
  }
}

// ── iter#14: ROLLING 7-DAY BEST (no new persistence — reuses iter#11 store) ──
// dailyScores already holds the last 7 UTC days of best-per-day scores (iter#11
// garbage-collects to that window). Reduce them into a single rolling 7-day
// ceiling. Render on GAMEOVER as a small purple pill beneath the
// "Yesterday → Today" delta. When the current run beats the prior 7-day ceiling
// (excluding today's own entry — we want the comparison to be against the
// previous 6 days), flag it gold + show "NEW 7-DAY BEST!" sub-line. Zero new
// localStorage keys, zero gameplay change.
var weekBestScore = 0;        // current rolling 7-day ceiling
var weekBestIsNew = false;    // true if this run beat the prior 7-day high
function recomputeWeekBest() {
  // Best across all entries in the rolling 7-day window (dailyScores is already
  // GC'd to <= 7 entries by saveDailyScores).
  var b = 0;
  for (var k in dailyScores) {
    if (!Object.prototype.hasOwnProperty.call(dailyScores, k)) continue;
    var v = dailyScores[k] | 0;
    if (v > b) b = v;
  }
  weekBestScore = b;
}
// Compute the prior 7-day high (excluding today) — used on GAMEOVER to decide
// whether this run set a new 7-day best. We can't just compare to weekBestScore
// after recording, because recordDailyScore already wrote today's score into
// the store before this is called.
function priorWeekBestExcludingToday() {
  var today = getDayKey();
  var b = 0;
  for (var k in dailyScores) {
    if (!Object.prototype.hasOwnProperty.call(dailyScores, k)) continue;
    if (k === today) continue;
    var v = dailyScores[k] | 0;
    if (v > b) b = v;
  }
  return b;
}

// ── iter#12: GOLDEN SPRINKLE PICKUPS (in-run time-bonus collectible) ─────────
// First new in-run pickup variety since launch — every prior iter layered meta
// (best, board, skins, seed, streak, badges, sound, chain, stars, yesterday).
// 2-3 rare gold sprinkles spawn per level on top of the normal debris field
// (driven by levelRng so daily seed stays fair across players). Collecting one
// grants +3s timeLeft + score x5 with combo + gold burst + chime + HUD time
// pulse. Lifetime collected count persists in clean_sweep_sprinkles_v1 and is
// exposed on __gfState for visibility.
var SPRINKLE_KEY = 'clean_sweep_sprinkles_v1';
var sprinkleList = [];         // active sprinkles in the current level
var sprinklesCollected = 0;     // lifetime collected (persisted)
var sprinkleHudPulse = 0;       // 0..1, drives the TIME HUD pulse when picked up
var sprinkleToastTimer = 0;     // 0..1, drives the in-run +3s toast life
function loadSprinkleStats() {
  try { sprinklesCollected = parseInt(localStorage.getItem(SPRINKLE_KEY)||'0') || 0; }
  catch(e) { sprinklesCollected = 0; }
}
function saveSprinkleStats() {
  try { localStorage.setItem(SPRINKLE_KEY, String(sprinklesCollected)); } catch(e) {}
}
// Sprinkle count per level — modest, scales lightly with depth so late levels
// (which are time-pressured) get a third pickup. Uses levelRng for placement
// so every player on the same UTC seed sees the same sprinkles.
function spawnSprinklesForLevel(lvl) {
  sprinkleList = [];
  var count = 2 + (lvl >= 4 ? 1 : 0); // 2 on lv1-3, 3 on lv4+
  var ar = arena();
  for (var i = 0; i < count; i++) {
    for (var att = 0; att < 60; att++) {
      var mg = 18 * S;
      var sx = ar.x + mg + levelRng() * (ar.w - mg*2);
      var sy = ar.y + mg + levelRng() * (ar.h - mg*2);
      // keep away from donut spawn
      var ddx = sx - donut.x, ddy = sy - donut.y;
      if (Math.sqrt(ddx*ddx + ddy*ddy) < 110*S) continue;
      sprinkleList.push({ x:sx, y:sy, r:9, phase: levelRng()*Math.PI*2, bob: levelRng()*Math.PI*2 });
      break;
    }
  }
}

// loop — orthogonal to all 12 prior meta layers.
var PERFECT_BONUS = 50;
var chainStartedThisLevel = false;  // armed on first collect of the level

var lastLevelPerfect = false;       // true on level clear if perfectChainAlive at clear time

var SKIN_SEEN_KEY = 'clean_sweep_skins_seen'; // CSV of skin ids the player has already been notified about

}

// ── LEADERBOARD (iter#2: shared daily top-10) ────────────────────────────────
var LB_SLUG = 'clean_sweep';
var NAME_KEY = 'clean_sweep_name';
var playerName = '';
var leaderboard = [];   // [{name, score, ts}] — top 10 cached for game-over screen
var myRank = null;
var lbSubmitted = false; // submit-once-per-run guard

function getDayKey() {
  var d = new Date();
  var y = d.getUTCFullYear();
  var m = String(d.getUTCMonth() + 1).padStart(2, '0');
  var day = String(d.getUTCDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

// ── DAILY SEED (iter#4: shared layout per day) ───────────────────────────────
// Mulberry32 — deterministic seeded PRNG. Used ONLY for level layout
// (debris placement) so that every player on the same UTC date faces the
// EXACT same starting puzzle and the daily leaderboard is a fair race.
// Visual jitter (particles, floats, screen shake) keeps Math.random() so
// every run still feels alive.
function makeRng(seed) {
  var s = seed | 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    var t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function getDaySeed() {
  var d = new Date();
  return d.getUTCFullYear() * 10000 + (d.getUTCMonth()+1) * 100 + d.getUTCDate();
}
var daySeed = 0;        // YYYYMMDD numeric — fixed for the whole calendar day
var levelRng = Math.random; // replaced per startLevel() with mulberry32(daySeed * 100 + level)

// ── DAILY STREAK (iter#5: come-back-tomorrow loop on top of daily seed) ──────
// Tracks consecutive UTC-day visits. Increments when last-played-date is
// exactly yesterday, resets to 1 when the gap is >1 day, no-ops on same-day
// re-launches. Surfaced as a small flame pill above the daily-seed badge so
// players can SEE the streak they're protecting tomorrow.
var STREAK_KEY      = 'clean_sweep_streak';      // integer count
var STREAK_DATE_KEY = 'clean_sweep_streak_date'; // YYYY-MM-DD of last visit
var STREAK_BEST_KEY = 'clean_sweep_streak_best'; // lifetime longest streak
var streak = 0, streakBest = 0;
var streakBumped = false; // true if this session is the one that incremented (drives a one-time flash)

function dayKeyToDate(key) {
  // YYYY-MM-DD -> ms epoch (UTC midnight). Safe for both '2026-05-14' and bad input.
  var parts = String(key).split('-');
  if (parts.length !== 3) return NaN;
  return Date.UTC(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
}
function loadStreak() {
  try {
    streak = parseInt(localStorage.getItem(STREAK_KEY) || '0') || 0;
    streakBest = parseInt(localStorage.getItem(STREAK_BEST_KEY) || '0') || 0;
    var lastKey = localStorage.getItem(STREAK_DATE_KEY) || '';
    var today = getDayKey();
    if (lastKey === today) {
      // same UTC day — leave as-is, no flash
      return;
    }
    var lastMs = dayKeyToDate(lastKey);
    var todayMs = dayKeyToDate(today);
    if (isNaN(lastMs) || isNaN(todayMs)) {
      // first ever launch (or corrupted key) — start a streak today
      streak = 1;
    } else {
      var gapDays = Math.round((todayMs - lastMs) / 86400000);
      if (gapDays === 1)      streak = streak + 1;   // consecutive — extend
      else if (gapDays > 1)   streak = 1;            // gap — restart at today
      else                    streak = Math.max(streak, 1); // clock skew / future date — clamp
    }
    streakBumped = true;
    if (streak > streakBest) streakBest = streak;
    localStorage.setItem(STREAK_KEY, String(streak));
    localStorage.setItem(STREAK_BEST_KEY, String(streakBest));
    localStorage.setItem(STREAK_DATE_KEY, today);
  } catch(e) {}
}

// ── ACHIEVEMENTS (iter#6: bite-sized milestone badges) ───────────────────────
// Five additive milestones that sit ORTHOGONAL to best/leaderboard/skins/seed/
// streak. Persisted via a single CSV localStorage key so a wipe of the run-state
// keys doesn't blow up the badge row. Unlock checks are non-destructive (idempotent),
// run inline at the relevant gameplay event, and surface a one-time toast on the
// frame they fire. The badge row renders on MENU + GAMEOVER under existing UI.
var ACH_KEY = 'clean_sweep_achievements'; // CSV of unlocked ids
var ACHIEVEMENTS = [

  { id:'level_3',     icon:'🎯', tKey:'badgeLevel3'     },
  { id:'level_5',     icon:'👑', tKey:'badgeLevel5'     },
];
var achUnlocked = {};                 // id -> true
var achToastQueue = [];               // [{id, life}] — pops one toast at a time
var achToastActive = null;            // {id, life} currently animating (life 0..1)

function loadAchievements() {
  try {

    csv.split(',').forEach(function(id){ if (id) achUnlocked[id] = true; });

function saveAchievements() {

    localStorage.setItem(ACH_KEY, ids.join(','));

function unlockAch(id) {

  achUnlocked[id] = true;

// Checks fired from gameplay hooks. Cheap; safe to call every collect/levelstart.
function checkAchievementsOnCollect() {

}

  if (lvl >= 3) unlockAch('level_3');
  if (lvl >= 5) unlockAch('level_5');
}
function achUnlockedCount() {
  var n = 0;
  for (var i=0;i<ACHIEVEMENTS.length;i++) if (achUnlocked[ACHIEVEMENTS[i].id]) n++;
  return n;
}

function ensurePlayerName() {
  if (playerName) return playerName;
  try { playerName = localStorage.getItem(NAME_KEY) || ''; } catch(e) {}
  if (!playerName) {
    var entered = '';
    try { entered = (window.prompt(t('namePrompt'), 'Player') || '').trim().slice(0, 16); } catch(e) {}
    if (entered) {
      playerName = entered;
      try { localStorage.setItem(NAME_KEY, playerName); } catch(e) {}
    }
  }
  return playerName;
}

function fetchLeaderboard() {
  var date = getDayKey();
  return fetch('/api/scores?slug=' + LB_SLUG + '&date=' + date, { cache: 'no-store' })
    .then(function(r) { return r.ok ? r.json() : { entries: [] }; })
    .then(function(data) {
      var all = (data && data.entries) || [];
      leaderboard = all.slice(0, 10);
    })
    .catch(function() { /* offline-tolerant */ });
}

function submitAndFetchLeaderboard() {
  if (lbSubmitted) return;
  lbSubmitted = true;
  var name = ensurePlayerName();
  var date = getDayKey();
  if (!name || score <= 0) { fetchLeaderboard(); return; }
  fetch('/api/scores', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ slug: LB_SLUG, date: date, name: name, score: score }),
    keepalive: true,
  })
  .then(function(r) { return r.ok ? r.json() : null; })
  .then(function(data) {
    if (data && data.rank) myRank = data.rank;
    return fetchLeaderboard();
  })
  .catch(function() { fetchLeaderboard(); });
}

var donut = { x:0, y:0, vx:0, vy:0, angle:0 };
var debrisList = [];
var particles  = [];
var floats     = [];
var buttons    = [];
var shake = 0;

// ── INPUT ─────────────────────────────────────────────────────────────────────
var keys = {};
document.addEventListener('keydown', function(e) { keys[e.code] = true; });
document.addEventListener('keyup',   function(e) { keys[e.code] = false; });
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('wheel',     function(e) { e.preventDefault(); }, { passive: false });

var touch = { active: false, sx: 0, sy: 0, dx: 0, dy: 0, id: null };
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t0 = e.changedTouches[0];
  touch.active = true; touch.id = t0.identifier;
  touch.sx = t0.clientX; touch.sy = t0.clientY;
  touch.dx = 0; touch.dy = 0;
  checkButtons(t0.clientX, t0.clientY);
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t0 = e.changedTouches[i];
    if (t0.identifier !== touch.id) continue;
    var dx = t0.clientX - touch.sx, dy = t0.clientY - touch.sy;
    var d = Math.sqrt(dx*dx + dy*dy);
    if (d > 8) { touch.dx = dx / Math.max(d, 45); touch.dy = dy / Math.max(d, 45); }
  }
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === touch.id) {
      touch.active = false; touch.dx = 0; touch.dy = 0;
    }
  }
}, { passive: false });
canvas.addEventListener('click', function(e) { checkButtons(e.clientX, e.clientY); });

function checkButtons(x, y) {
  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    if (x >= b.x && x <= b.x+b.w && y >= b.y && y <= b.y+b.h) b.fn();
  }
}

// ── PARTICLES & FLOATS ────────────────────────────────────────────────────────
function spawnParticles(x, y, color, n) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = (1.5 + Math.random() * 3.5) * S;
    particles.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      r:(2 + Math.random()*4)*S, color:color, life:1 });
  }
}
function spawnFloat(x, y, txt, col) {
  floats.push({ x:x, y:y, txt:txt, col:col||'#fff', life:1, vy:-2*S });
}

// ── ARENA BOUNDS ──────────────────────────────────────────────────────────────
function arena() {
  var pad = 12 * S;
  var top = (HUD_H + 6) * S;
  return { x: pad, y: top, w: W - pad*2, h: H - top - pad };
}

// ── LEVEL SETUP ───────────────────────────────────────────────────────────────
function startLevel(lvl) {
  level = lvl;
  debrisList = []; particles = []; floats = []; buttons = [];
  combo = 0; comboTimer = 0; shake = 0;
  // iter#13: per-level reset — combo-break tracker for the PERFECT SWEEP bonus
  chainStartedThisLevel = false; perfectChainAlive = true; lastLevelPerfect = false;
  // newBest is per-RUN, not per-level — only reset when starting a fresh run from level 1
  if (lvl === 1) { newBest = false; bestPulse = 0; lbSubmitted = false; myRank = null; maxComboThisRun = 0; newBestCombo = false; chainPulse = 0; lastLevelStars = 0; lastLevelStarsNewBest = false; sprinkleHudPulse = 0; sprinkleToastTimer = 0; }
  // iter#7: reset the "+15s" rewarded-ad slot each level
  extraTimeUsed = false; extraTimeLoading = false; reviveBtnRect = null;
  timeLeft = Math.max(25, 70 - (lvl - 1) * 6);
  levelStartTime = timeLeft; // iter#10: cache for star-rating denominator on level clear

  // iter#4: seed the level-layout RNG from today's date + level number so
  // every player on the same UTC date faces the EXACT same debris layout
  // for the same level. The wobble/phase decorations stay seeded too so
  // crumb animation phases match (cosmetic — keeps visuals deterministic
  // for screenshot tools, harmless if not).
  daySeed = getDaySeed();
  levelRng = makeRng(daySeed * 100 + lvl);

  var ar = arena();
  donut.x = ar.x + ar.w / 2;
  donut.y = ar.y + ar.h / 2;
  donut.vx = 0; donut.vy = 0; donut.angle = 0;

  for (var ti = 0; ti < TYPES.length; ti++) {
    var tp = TYPES[ti];
    var count = tp.base + Math.floor((lvl - 1) * tp.base * 0.5);
    for (var i = 0; i < count; i++) {
      for (var att = 0; att < 60; att++) {
        var mg = (tp.r + 4) * S;
        var dx = ar.x + mg + levelRng() * (ar.w - mg*2);
        var dy = ar.y + mg + levelRng() * (ar.h - mg*2);
        // keep away from donut start
        var ddx = dx - donut.x, ddy = dy - donut.y;
        if (Math.sqrt(ddx*ddx + ddy*ddy) < 90*S) continue;
        // no overlap
        var ok = true;
        for (var j = 0; j < debrisList.length; j++) {
          var dj = debrisList[j];
          var ex = dx-dj.x, ey = dy-dj.y;
          if (Math.sqrt(ex*ex+ey*ey) < (tp.r + dj.typeR)*S*1.4) { ok=false; break; }
        }
        if (!ok) continue;
        debrisList.push({ x:dx, y:dy, typeId:tp.id, typeR:tp.r, r:tp.r*S,
          score:tp.score, color:tp.color, shine:tp.shine,
          wobble:levelRng()*Math.PI*2, phase:levelRng()*Math.PI*2 });
        break;
      }
    }
  }
  totalDebris = debrisList.length;
  // iter#12: golden sprinkle pickups (2-3 per level, +3s + score x5 on collect)
  spawnSprinklesForLevel(lvl);
  // iter#6: badge checks tied to depth reached
  checkAchievementsOnLevel(lvl);
  gs = 'PLAYING';
  try{parent.postMessage({type:'gf:gameStarted'},'*')}catch(_){};
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
var lastTs = 0;
function update(dt) {
  if (gs !== 'PLAYING') return;

  timeLeft -= dt;
  if (timeLeft <= 0) { timeLeft = 0; sfxGameOver(); gs = 'GAMEOVER';try{parent.postMessage({type:'gf:gameEnded'},'*')}catch(_){};
    // iter#14: snapshot prior 7-day ceiling BEFORE writing today's score so we
    // can detect a fresh 7-day best on this run. recordDailyScore mutates
    // dailyScores; recomputeWeekBest then refreshes the rolling ceiling for
    // the GAMEOVER pill.
    var _priorWB = priorWeekBestExcludingToday();
    submitAndFetchLeaderboard(); recordDailyScore(score);
    recomputeWeekBest();
    weekBestIsNew = (score > 0 && score > _priorWB);
    return; }

  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) { combo = 0; if (chainStartedThisLevel) perfectChainAlive = false; } } // iter#13: combo decay also breaks the PERFECT SWEEP chain
  if (shake > 0) shake = Math.max(0, shake - dt * 8);
  if (bestPulse > 0) bestPulse = Math.max(0, bestPulse - dt * 0.6);
  if (chainPulse > 0) chainPulse = Math.max(0, chainPulse - dt * 0.6); // iter#9
  if (sprinkleHudPulse > 0) sprinkleHudPulse = Math.max(0, sprinkleHudPulse - dt * 0.7); // iter#12
  if (sprinkleToastTimer > 0) sprinkleToastTimer = Math.max(0, sprinkleToastTimer - dt * 0.35); // iter#12
  // iter#12: also wobble the sprinkle bob phases
  for (var spi = 0; spi < sprinkleList.length; spi++) { sprinkleList[spi].bob += dt * 2.2; sprinkleList[spi].phase += dt * 1.6; }
  if (skinUnlockToast > 0) skinUnlockToast = Math.max(0, skinUnlockToast - dt * 0.35);
  // iter#6: drive achievement toast queue (one at a time, ~2.5s each)
  if (!achToastActive && achToastQueue.length > 0) achToastActive = achToastQueue.shift();
  if (achToastActive) {
    achToastActive.life -= dt * 0.4;
    if (achToastActive.life <= 0) achToastActive = null;
  }

  // movement
  var ax = 0, ay = 0;
  if (keys['ArrowLeft']  || keys['KeyA']) ax -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) ax += 1;
  if (keys['ArrowUp']    || keys['KeyW']) ay -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) ay += 1;
  if (touch.active) { ax += touch.dx; ay += touch.dy; }

      sprinkleToastTimer = 1;

        best = score;
        newBest = true;

      spawnParticles(sp.x, sp.y, '#FFF8C0', 14);
      spawnFloat(sp.x, sp.y - 22*S, t('sprinkleToast'), '#FFD700');

      spawnParticles(donut.x, donut.y, '#FFD700', 18);

      try { if (typeof sfxBadge === 'function') sfxBadge(); } catch(e) {}

    ctx.shadowBlur = 18 + 10 * Math.abs(Math.sin(t_pulse * 2.2));
  }
  var grad = ctx.createLinearGradient(drawBtnX, drawBtnY, drawBtnX, drawBtnY+drawBtnH);
  grad.addColorStop(0, '#2ecc71'); grad.addColorStop(1, '#27ae60');
  rr(ctx, drawBtnX, drawBtnY, drawBtnW, drawBtnH, drawBtnH/2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = 'bold '+clamp((isWide?20:16)*S,14,26)+'px sans-serif'; ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(btnText, cx, btnY + btnH/2);
  ctx.textBaseline = 'alphabetic';

  buttons.push({ x:btnX, y:btnY, w:btnW, h:btnH, fn:function(){ sfxClick(); btnFn(); } });

  if (best > 0) {
    ctx.font = clamp(13*S,10,17)+'px sans-serif'; ctx.fillStyle = '#555';
    ctx.fillText(t('best')+': '+best, cx, btnY+btnH+28*S);
  }
}

// iter#10: Big 3-star row drawn on LEVELEND between the title and the NEXT
// button. Filled gold stars for stars earned this clear; outline stars for
// the remainder. Subtle pulse + 'NEW BEST!' label when this clear beat the
// previously-saved best for this level.
var _starPulseT = 0;
function drawLevelEndStars() {
  if (!lastLevelStars) return;
  _starPulseT += 0.05;
  var size = clamp(38*S, 22, 54);
  var gap  = clamp(14*S, 10, 22);
  var totalW = size*3 + gap*2;
  var startX = cx - totalW/2 + size/2;
  var y = cy - 8*S;
  var pulse = 1 + Math.sin(_starPulseT * 4) * (lastLevelStarsNewBest ? 0.08 : 0.02);
  for (var i = 0; i < 3; i++) {
    var filled = (i < lastLevelStars);
    var px = startX + i*(size + gap);
    ctx.save();
    ctx.translate(px, y);
    ctx.scale(filled ? pulse : 1, filled ? pulse : 1);
    ctx.font = 'bold ' + size + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (filled) {
      ctx.shadowColor = 'rgba(255,215,0,0.7)';
      ctx.shadowBlur = 18*S;
      ctx.fillStyle = '#FFD700';
      ctx.fillText('★', 0, 0);
      ctx.shadowColor = 'transparent';
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillText('★', 0, 0);
    }
    ctx.restore();
  }
  if (lastLevelStarsNewBest) {
    var fs = clamp(13*S, 10, 16);
    ctx.font = 'bold ' + fs + 'px sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(t('starsNewBest'), cx, y + size*0.7 + fs);
  }
}

// iter#13: PERFECT SWEEP stamp drawn on LEVELEND. Renders only when the player
// cleared the level without ever letting the combo timer expire after the first
// pickup. Sits BELOW the star row and ABOVE the NEXT button so it doesn't fight
// either UI. Gold pill with subtle pulse — matches the +50 score bonus already
// granted on level clear.
var _perfectPulseT = 0;
function drawPerfectSweepStamp() {
  if (!lastLevelPerfect) return;
  _perfectPulseT += 0.07;
  var size = clamp(38*S, 22, 54);
  // Y mirrors drawLevelEndStars: stars centred at cy - 8*S; this stamp goes
  // ~size*1.0 below the stars so the NEW BEST sub-line (if present) doesn't
  // get sat-on. Stays well above the NEXT button (at cy + ~30*S).
  var y = cy - 8*S + size * 1.05;
  var fs = clamp(15*S, 12, 20);
  var pulse = 1 + Math.sin(_perfectPulseT * 5) * 0.04;
  var label = t('perfectSweep') + '  ' + t('perfectBonus');
  ctx.save();
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  var tw = ctx.measureText(label).width;
  var padX = clamp(14*S, 10, 22);
  var padY = clamp(7*S, 5, 12);
  var pw = (tw + padX * 2) * pulse;
  var ph = (fs + padY * 2) * pulse;
  var px = cx - pw/2;
  var py = y - ph/2;
  rr(ctx, px, py, pw, ph, ph/2);
  ctx.shadowColor = 'rgba(255,215,0,0.5)';
  ctx.shadowBlur = 14*S;
  ctx.fillStyle = '#FFD700';
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1.3 * S;
  ctx.stroke();
  ctx.fillStyle = '#1a1a2e';
  ctx.fillText(label, cx, y);
  ctx.restore();
}

// iter#10: Tiny ★N/30 pill drawn on MENU near the top to show lifetime stars
// collected across all 10 levels (3 stars per level × 10 levels = 30 max).
// Sits in the top-left so it doesn't fight day-seed (centred-top), streak
// (above day-seed), mute (top-right), or the daily leaderboard cluster.
function drawTotalStarsPill() {
  var total = totalLevelStars();
  if (total <= 0) return;
  var max = STARS_MAX_LEVEL * 3;
  var fs = clamp(13*S, 11, 16);
  var padX = clamp(10*S, 7, 14), padY = clamp(6*S, 4, 10);
  var label = '★ ' + total + '/' + max;
  ctx.save();
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  var tw = ctx.measureText(label).width;
  var pw = tw + padX*2;
  var ph = fs + padY*2;
  var px = 14*S;
  var py = 14*S;
  rr(ctx, px, py, pw, ph, ph/2);
  ctx.fillStyle = 'rgba(40,30,8,0.7)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,215,0,0.5)';
  ctx.lineWidth = 1.2 * S;
  ctx.stroke();
  ctx.fillStyle = '#FFD700';
  ctx.fillText(label, px + padX, py + ph/2);
  ctx.restore();
}

// iter#9: Small max-chain summary line drawn on GAMEOVER only. Sits to the
// LEFT of the title row so it doesn't fight the leaderboard / NEW BEST banner
// / skin picker. Uses tiny font; only renders when player actually built a

  ctx.textBaseline = 'alphabetic';

// Yellow celebratory NEW BEST! banner — drawn over the GAMEOVER overlay when
// the player just beat their saved high score this run.
var newBestAnim = 0;
function drawNewBestBanner() {
  newBestAnim += 0.04;

// ── DRAW DAY SEED BADGE (iter#4) ─────────────────────────────────────────────

// ── DRAW STREAK PILL (iter#5) ────────────────────────────────────────────────
// Small flame-orange pill above the day-seed badge. Shows current streak count
// + "come back tomorrow" sub-line. Pulses on first frame of the visit that
// incremented the streak. No-op when streak is 0 (defensive).
var _streakAnim = 0;
function drawStreakPill() {
  if (streak <= 0) return;
  _streakAnim += 0.06;
  var pulse = streakBumped ? (1 + Math.sin(_streakAnim * 4) * 0.07) : 1;
  var fs = clamp(11*S, 9, 14) * pulse;
  ctx.save();
  ctx.font = 'bold '+fs+'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  // flame icon + count
  var label = '🔥 ' + streak + ' ' + t('streakDays');
  var padX = 12*S, padY = 5*S;
  var w = ctx.measureText(label).width + padX*2;
  var h = fs + padY*2;
  var bx = cx - w/2;
  var by = cy - 170*S; // sits above the daily-seed badge (which is at cy - 130*S)
  // pill bg — flame orange, slightly stronger when bumped
  ctx.fillStyle = streakBumped ? 'rgba(255,140,50,0.32)' : 'rgba(255,140,50,0.18)';
  rr(ctx, bx, by, w, h, h/2);
  ctx.fill();
  ctx.fillStyle = '#ff944d';
  ctx.fillText(label, cx, by + h - padY - 1*S);
  // sub-line only on first visit of the day (don't shout at returning players)
  if (streakBumped) {
    var subFs = clamp(10*S, 8, 13);
    ctx.font = subFs+'px sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText(t('comeBack'), cx, by + h + subFs + 4*S);
  }
  ctx.restore();
}

// ── DRAW ACHIEVEMENT ROW (iter#6) ────────────────────────────────────────────
// Compact 5-icon row drawn at a given vertical centre. Unlocked badges glow,
// locked ones are dimmed + monochrome. Pure display — no input wiring (badges
// are passive milestone markers, tapping them shouldn't do anything).
function drawAchievementRow(yCenter) {
  var iconFs = clamp(20*S, 14, 26);
  var labelFs = clamp(10*S, 8, 13);
  var slotW = iconFs * 2.2;
  var totalW = slotW * (ACHIEVEMENTS.length - 1);
  var startX = cx - totalW / 2;

  // header label "BADGES  3/5"
  ctx.save();
  ctx.font = 'bold '+labelFs+'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#888';
  ctx.fillText(t('badges') + '  ' + achUnlockedCount() + '/' + ACHIEVEMENTS.length,
               cx, yCenter - iconFs - 4*S);

  for (var i = 0; i < ACHIEVEMENTS.length; i++) {
    var a = ACHIEVEMENTS[i];
    var unlocked = !!achUnlocked[a.id];
    var bx = startX + i * slotW;
    ctx.font = iconFs + 'px sans-serif';
    ctx.textBaseline = 'middle';
    if (unlocked) {
      ctx.globalAlpha = 1;
      // subtle warm glow halo behind earned icon
      ctx.shadowColor = 'rgba(255,200,80,0.55)';
      ctx.shadowBlur = 12*S;
      ctx.fillStyle = '#ffd57a';
      ctx.fillText(a.icon, bx, yCenter);
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    } else {
      ctx.globalAlpha = 0.32;
      ctx.fillStyle = '#888';
      ctx.fillText(a.icon, bx, yCenter);
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();
}

// ── DRAW ACHIEVEMENT TOAST (iter#6) ──────────────────────────────────────────
// In-run popup on the frame an unlock fires. Sits high on the screen so it
// doesn't collide with the day-seed/streak pills on the menus, or the score HUD.
function drawAchievementToast() {
  if (!achToastActive) return;
  var ach = null;
  for (var i=0;i<ACHIEVEMENTS.length;i++) if (ACHIEVEMENTS[i].id === achToastActive.id) ach = ACHIEVEMENTS[i];
  if (!ach) return;
  var life = achToastActive.life;
  var alpha = life < 0.15 ? life / 0.15 : 1;
  var fs = clamp(13*S, 10, 17);
  var iconFs = clamp(20*S, 14, 26);
  var headFs = clamp(11*S, 9, 14);
  var label = t(ach.tKey);
  var heading = t('badgeUnlocked');
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = 'bold '+fs+'px sans-serif';
  var w1 = ctx.measureText(label).width;
  ctx.font = 'bold '+headFs+'px sans-serif';
  var w2 = ctx.measureText(heading).width;
  var w = Math.max(w1, w2) + iconFs + 28*S;
  var h = iconFs + fs + 22*S;
  var bx = cx - w/2, by = HUD_H * S + 10*S;
  // warm glow pill
  ctx.shadowColor = 'rgba(255,200,80,0.55)';
  ctx.shadowBlur = 20*S;
  ctx.fillStyle = 'rgba(20,16,8,0.92)';
  rr(ctx, bx, by, w, h, h/2);
  ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  // border accent
  ctx.strokeStyle = '#ffd57a';
  ctx.lineWidth = 2*S;
  rr(ctx, bx, by, w, h, h/2);
  ctx.stroke();
  // icon
  ctx.font = iconFs+'px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffd57a';
  ctx.fillText(ach.icon, bx + 14*S, by + h/2);
  // heading + label
  ctx.textAlign = 'left';
  ctx.font = 'bold '+headFs+'px sans-serif';
  ctx.fillStyle = '#ffd57a';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(heading, bx + 14*S + iconFs + 10*S, by + headFs + 4*S);
  ctx.font = 'bold '+fs+'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(label, bx + 14*S + iconFs + 10*S, by + h - 7*S);
  ctx.restore();
}

// ── DRAW SKIN SELECTOR (iter#3) ──────────────────────────────────────────────
// iter#8: Mute button — 36×36 circle in top-right corner of the canvas.
// Drawn on MENU + GAMEOVER overlays ONLY (never during PLAYING so it
// can't overlap the HUD or compete with the combo badge). Sits in the
// top-right where no existing UI ever renders. Click toggles SFX.
function drawMuteButton() {
  var sz   = clamp(36*S, 28, 48);
  var pad  = clamp(14*S, 10, 20);
  var bx   = W - pad - sz;
  var by   = pad;
  muteBtnRect = { x: bx, y: by, w: sz, h: sz };
  // background pill
  ctx.save();
  rr(ctx, bx, by, sz, sz, sz/2);
  ctx.fillStyle = sfxMuted ? 'rgba(60,20,28,0.85)' : 'rgba(20,40,60,0.85)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = 1.4 * S;
  ctx.stroke();
  // icon
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + clamp(18*S, 14, 24) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(sfxMuted ? '🔇' : '🔊', bx + sz/2, by + sz/2 + 1*S);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
  buttons.push({ x: bx, y: by, w: sz, h: sz, fn: toggleMute });
}

// Renders the cosmetic donut row on MENU + GAMEOVER. Tap to swap (only unlocked
// rows are tappable). Locked rows show "BEST 100" hint. Adds button hits to
// the existing buttons[] array so the existing checkButtons() handler picks
// them up — no input rewrite needed.
function drawSkinSelector(yCenter) {
  var skinFs = clamp(11*S, 9, 14);
  var labelFs = clamp(10*S, 8, 13);
  var swatchR = clamp(20*S, 14, 26);
  // 2026-05-15: gap was swatchR*2.6 — too tight for RU labels ("Рекорд 300")
  // which run ~80px wide. Bumped to 3.8× swatchR (with floor) so labels
  // never bleed into each other across languages.
  var gap = Math.max(swatchR * 3.8, 90 * S);
  var totalW = gap * (DONUT_SKINS.length - 1);
  var startX = cx - totalW / 2;

  ctx.font = 'bold '+skinFs+'px sans-serif';
  ctx.fillStyle = '#888';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(t('skin'), cx, yCenter - swatchR - 8*S);

  for (var i = 0; i < DONUT_SKINS.length; i++) {
    var skin = DONUT_SKINS[i];
    var sx = startX + i * gap;
    var sy = yCenter;
    var unlocked = isSkinUnlocked(skin);
    var selected = (skin.id === skinId);

    // outer ring (selection indicator)
    if (selected && unlocked) {
      ctx.beginPath(); ctx.arc(sx, sy, swatchR + 4*S, 0, Math.PI*2);
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2.5*S; ctx.stroke();
    }

    // swatch (donut shape — outer ring + hole)
    ctx.save();
    ctx.globalAlpha = unlocked ? 1 : 0.35;
    ctx.beginPath(); ctx.arc(sx, sy, swatchR, 0, Math.PI*2);
    ctx.arc(sx, sy, swatchR*0.42, 0, Math.PI*2, true);
    ctx.fillStyle = '#F5DEB3'; ctx.fill();
    ctx.beginPath(); ctx.arc(sx, sy, swatchR*0.88, 0, Math.PI*2);
    ctx.arc(sx, sy, swatchR*0.5, 0, Math.PI*2, true);
    ctx.fillStyle = skin.ring;
    ctx.fill();
    ctx.restore();

    // lock overlay
    if (!unlocked) {
      ctx.font = 'bold '+labelFs+'px sans-serif';
      ctx.fillStyle = '#999';
      ctx.fillText(t('unlockAt')+skin.unlock, sx, sy + swatchR + labelFs + 4*S);
    } else {
      ctx.font = labelFs+'px sans-serif';
      ctx.fillStyle = selected ? '#FFD700' : '#aaa';
      var dispName = (lang === 'ru' ? skin.nameRu : skin.name);
      ctx.fillText(dispName, sx, sy + swatchR + labelFs + 4*S);
    }

    // hit area — only for unlocked
    if (unlocked) {
      (function(targetId){
        buttons.push({
          x: sx - swatchR, y: sy - swatchR, w: swatchR*2, h: swatchR*2,
          fn: function() {
            if (skinId !== targetId) { skinId = targetId; saveSkin(); }
          }
        });
      })(skin.id);
    }
  }
}

function drawSkinUnlockToast() {
  if (skinUnlockToast <= 0 || !skinUnlockToastId) return;
  var skin = getSkin(skinUnlockToastId);
  var alpha = Math.min(1, skinUnlockToast * 1.2);
  var fs = clamp(15*S, 12, 20);
  var nameFs = clamp(13*S, 10, 17);
  var toastY = HUD_H * S + 30*S;
  ctx.save();
  ctx.globalAlpha = alpha;
  // pill bg
  ctx.font = 'bold '+fs+'px sans-serif';
  var label = t('unlockedToast');
  var dispName = (lang === 'ru' ? skin.nameRu : skin.name);
  var w = Math.max(ctx.measureText(label).width, ctx.measureText(dispName).width) + 32*S;
  rr(ctx, cx - w/2, toastY - fs, w, fs * 2.6, fs);
  ctx.fillStyle = 'rgba(255,215,0,0.92)';
  ctx.fill();
  // label
  ctx.fillStyle = '#3b2a00';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, toastY);
  ctx.font = 'bold '+nameFs+'px sans-serif';
  ctx.fillText(dispName, cx, toastY + fs * 1.1);
  ctx.restore();
}

// ── DRAW LEADERBOARD (iter#2) ────────────────────────────────────────────────
// Renders the cached top-N below the game-over button. Highlights current
// player's row. Skips silently when offline / list empty.
function drawLeaderboard() {
  if (!leaderboard || leaderboard.length === 0) return;

  // Show up to 5 rows on the overlay (top-10 cached, top-5 displayed for space)
  var rows = leaderboard.slice(0, 5);
  var btnH = clamp(52*S, 40, 66);
  var btnY = cy + 20*S;
  var startY = btnY + btnH + 60*S;
  var rowH = clamp(20*S, 16, 26);
  var headerFs = clamp(13*S, 11, 17);
  var rowFs = clamp(12*S, 10, 16);

  // Header
  var headerTxt = t('leaderboard');
  if (myRank) headerTxt += ' — ' + t('rank') + ': #' + myRank;
  ctx.font = 'bold '+headerFs+'px sans-serif';
  ctx.fillStyle = '#48c9b0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(headerTxt, cx, startY);

  // Rows
  ctx.font = rowFs+'px sans-serif';
  for (var i = 0; i < rows.length; i++) {
    var entry = rows[i];
    var rowY = startY + (i + 1) * rowH + 4*S;
    var isMe = entry.name && entry.name === playerName;
    ctx.fillStyle = isMe ? '#FFD700' : '#aaa';
    var rank = '#' + (i + 1);
    var name = (entry.name || '?').slice(0, 12);
    if (isMe) name += ' (' + t('you') + ')';
    var sc = entry.score;
    // simple 3-column row centered around cx
    ctx.textAlign = 'left';
    ctx.fillText(rank, cx - 110*S, rowY);
    ctx.textAlign = 'left';
    ctx.fillText(name, cx - 80*S, rowY);
    ctx.textAlign = 'right';
    ctx.fillText(String(sc), cx + 110*S, rowY);
  }
}

// iter#11: GAMEOVER "Yesterday → Today" pill — daily-seed delta loop.
// Renders below the leaderboard (or, if no leaderboard, below the retry/revive
// stack). Stays compact + single-line on mobile to avoid clipping bottom of
// viewport. Gold delta if today > yesterday, dim if today < yesterday, neutral
// if equal. If there's no yesterday entry (first-day player) we show a
// one-line "come back tomorrow" hint instead — closes the loop without
// pretending data exists.
function drawYesterdayPill() {
  // Y anchor: stack BELOW the leaderboard if it rendered, else below the
  // revive button. Same math as drawLeaderboard for the base Y.
  var btnH = clamp(52*S, 40, 66);
  var btnY = cy + 20*S;
  var lbHasRows = (leaderboard && leaderboard.length > 0);
  var rowH = clamp(20*S, 16, 26);
  var startY;
  if (lbHasRows) {
    var rows = Math.min(5, leaderboard.length);
    var lbStartY = btnY + btnH + 60*S;
    startY = lbStartY + (rows + 1) * rowH + 22*S;
  } else {
    // below revive button (if shown) or below retry
    startY = btnY + btnH + (extraTimeUsed ? 30*S : (clamp(42*S,34,54) + 30*S));
  }

  // Compose the line
  var fs = clamp(12*S, 10, 16);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';

  if (yesterdayScore <= 0) {
    // first-day player — short hint, low chroma so it doesn't fight the LB
    ctx.fillStyle = '#7a7a8a';
    ctx.font = fs + 'px sans-serif';
    ctx.fillText(t('firstDailyRun'), cx, startY);
    return;
  }

  // Use the higher of today's run vs today's saved (in case multiple runs today)
  var todayShown = Math.max(todayBestScore, score);
  var delta = todayShown - yesterdayScore;
  var deltaStr = (delta >= 0 ? '+' : '') + delta;
  var col = delta > 0 ? '#FFD700' : (delta < 0 ? '#c97070' : '#aaaaaa');

  // Single line: "Yesterday: 1240 → Today: 1320 (+80)"
  var line = t('yesterday') + ': ' + yesterdayScore + '  →  ' +
             t('today') + ': ' + todayShown + '  (' + deltaStr + ')';
  // measure to make sure it fits the canvas — if not, downsize one notch
  var widthGuess = ctx.measureText(line).width;
  if (widthGuess > W - 24*S) {
    fs = Math.max(10, fs - 2);
    ctx.font = 'bold ' + fs + 'px sans-serif';
  }
  ctx.fillStyle = col;
  ctx.fillText(line, cx, startY);
}

// ── iter#14: GAMEOVER 7-day rolling best pill ────────────────────────────────
// Sits BELOW the yesterday pill (which already sits below the leaderboard).
// Renders nothing while we have no data points (weekBestScore === 0). Purple
// because every other meta pill already claimed a colour (teal=seed,
// orange=streak, gold=newbest, grey=neutral). Gold pulse + sub-line when
// weekBestIsNew (this run beat the prior 6-day high).
var _weekPillAnim = 0;
function drawWeekBestPill() {
  if (weekBestScore <= 0) return;
  // Compute Y by stacking under the yesterday pill. The yesterday pill uses
  // the same anchor math as drawLeaderboard — replicate so we stay in sync.
  var btnH = clamp(52*S, 40, 66);
  var btnY = cy + 20*S;
  var lbHasRows = (leaderboard && leaderboard.length > 0);
  var rowH = clamp(20*S, 16, 26);
  var yesterdayY;
  if (lbHasRows) {
    var rows = Math.min(5, leaderboard.length);
    var lbStartY = btnY + btnH + 60*S;
    yesterdayY = lbStartY + (rows + 1) * rowH + 22*S;
  } else {
    yesterdayY = btnY + btnH + (extraTimeUsed ? 30*S : (clamp(42*S,34,54) + 30*S));
  }
  // Our Y: ~22*S below the yesterday line
  var startY = yesterdayY + clamp(22*S, 16, 28);
  // Pulse animation on new 7-day best
  _weekPillAnim += 0.06;
  var pulse = weekBestIsNew ? (1 + Math.sin(_weekPillAnim * 4) * 0.06) : 1;
  var fs = clamp(11*S, 9, 14) * pulse;
  ctx.save();
  ctx.font = 'bold '+fs+'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  var label = t('weekBest') + ': ' + weekBestScore;
  var padX = 12*S, padY = 5*S;
  var w = ctx.measureText(label).width + padX*2;
  var h = fs + padY*2;
  var bx = cx - w/2, by = startY - h + padY;
  // Purple pill bg, gold tint when fresh best
  if (weekBestIsNew) {
    ctx.fillStyle = 'rgba(255,215,0,0.22)';
  } else {
    ctx.fillStyle = 'rgba(155,120,210,0.18)';
  }
  rr(ctx, bx, by, w, h, h/2);
  ctx.fill();
  ctx.fillStyle = weekBestIsNew ? '#FFD700' : '#b89df0';
  ctx.fillText(label, cx, by + h - padY - 1*S);
  // Sub-line only when this run set a new ceiling
  if (weekBestIsNew) {
    var subFs = clamp(10*S, 8, 13);
    ctx.font = 'bold '+subFs+'px sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.fillText(t('weekBestNew'), cx, by + h + subFs + 4*S);
  }
  ctx.restore();
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function frame(ts) {
  var dt = Math.min((ts - lastTs) / 1000, 0.08);
  lastTs = ts;

  update(dt);

  var sx = 0, sy = 0;
  if (shake > 0) { sx=(Math.random()-0.5)*shake*12*S; sy=(Math.random()-0.5)*shake*12*S; }

  ctx.save();
  ctx.translate(sx, sy);
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(-20, -20, W+40, H+40);

  if (gs === 'PLAYING' || gs === 'LEVELEND') {
    drawArena();

    // debris
    for (var i = 0; i < debrisList.length; i++) drawDebris(debrisList[i]);
    // iter#12: golden sprinkle pickups (drawn after debris so they sit on top)
    for (var spi2 = 0; spi2 < sprinkleList.length; spi2++) drawSprinkle(sprinkleList[spi2]);

    // particles
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
    }
    ctx.globalAlpha = 1;

    // floating texts
    for (var i = 0; i < floats.length; i++) {
      var f = floats[i];
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.font = 'bold '+clamp(14*S,11,20)+'px sans-serif';
      ctx.fillStyle = f.col; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(f.txt, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    drawDonut(donut.x, donut.y);
    drawHUD();
  }

  ctx.restore();

  if (gs === 'MENU') {
    ctx.fillStyle = '#0a0a12'; ctx.fillRect(0,0,W,H);
    drawOverlay(t('title'), t('sub'), t('play'), function() { score=0; startLevel(1); });
    // iter#5: streak pill above the day-seed badge
    drawStreakPill();
    // iter#4: daily-seed badge above the title
    drawDaySeedBadge();
    // iter#3: cosmetic donut picker below the BEST: line
    drawSkinSelector(cy + 20*S + clamp(52*S, 40, 66) + 80*S);
    // iter#6: achievement badge row near the bottom of the menu
    drawAchievementRow(H - 36*S);
    // iter#10: ★N/30 lifetime stars pill in the top-left corner
    drawTotalStarsPill();
    // iter#8: mute toggle (top-right corner)
    drawMuteButton();
  }
  if (gs === 'LEVELEND') {
    drawOverlay(t('complete'), t('score')+': '+score, t('next'),
      function() { startLevel(level+1); });
    // iter#10: per-level 1-3 star rating between title and NEXT button
    drawLevelEndStars();
    // iter#13: PERFECT SWEEP stamp (sits below the star row, above the NEXT button)
    drawPerfectSweepStamp();
  }
  if (gs === 'GAMEOVER') {
    // (best is already live-tracked during play; saveBest also runs on each new high)
    // iter#7: RETRY now routes through a throttled interstitial (Yandex 4.1)
    drawOverlay(t('gameover'), t('score')+': '+score, t('retry'),
      function() { showInterstitial(function() { score=0; startLevel(1); }); });

    // iter#7: EXTRA TIME (rewarded ad). One revive per level; user-click only.
    if (!extraTimeUsed) {
      var _btnW = clamp(240*S, 160, 320), _btnH = clamp(52*S, 40, 66);
      var _btnY = cy + 26*S;
      var rW = _btnW, rH = clamp(42*S, 34, 54);
      var rX = cx - rW/2;
      var rY = _btnY + _btnH + 14*S;
      reviveBtnRect = { x: rX, y: rY, w: rW, h: rH };
      rr(ctx, rX, rY, rW, rH, rH/2);
      var gradR = ctx.createLinearGradient(rX, rY, rX, rY+rH);
      gradR.addColorStop(0, '#FFD700'); gradR.addColorStop(1, '#8a6a00');
      ctx.fillStyle = gradR; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1.4 * S;
      ctx.stroke();
      ctx.font = 'bold ' + clamp(14*S, 11, 18) + 'px sans-serif';
      ctx.fillStyle = '#1a1a2e';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('📺  ' + t('extraTime'), cx, rY + rH/2);
      ctx.textBaseline = 'alphabetic';
      buttons.push({ x: rX, y: rY, w: rW, h: rH, fn: showRewardedExtraTime });
    }

    // iter#5: streak pill above the day-seed badge
    drawStreakPill();
    // iter#4: daily-seed badge so players know their leaderboard rank is on
    // today's shared layout, not a random one
    drawDaySeedBadge();
    if (newBest) drawNewBestBanner();
    drawChainSummary(); // iter#9
    drawLeaderboard();
    drawYesterdayPill(); // iter#11
    drawWeekBestPill();  // iter#14
    // iter#3: skin picker on GAMEOVER (only on desktop — mobile portrait
    // is too tight; the picker IS still on MENU for everyone).
    // Achievement row is MENU-only — on GAMEOVER it stacked under the skin
    // labels and made visual mess (2026-05-15 layout audit).
    if (H >= 720) {
      drawSkinSelector(H - 80*S);
    }
    // iter#8: mute toggle (top-right corner)
    drawMuteButton();
  }

  // iter#3: in-run toast when a new donut tier unlocks during play
  if ((gs === 'PLAYING' || gs === 'LEVELEND') && skinUnlockToast > 0) {
    drawSkinUnlockToast();
  }
  // iter#6: in-run toast when an achievement unlocks (any state, sits high so
  // it doesn't fight the score HUD or the gameover overlay; off-by-default
  // for MENU so first-load isn't noisy)
  if (gs !== 'MENU' && achToastActive) {
    drawAchievementToast();
  }

  // mobile joystick hint (first 3 seconds of level 1)
  if (gs === 'PLAYING' && level === 1 && timeLeft > 57 && 'ontouchstart' in window) {
    ctx.globalAlpha = Math.min(1, (timeLeft-57)*3);
    ctx.font = clamp(13*S,10,16)+'px sans-serif';
    ctx.fillStyle = '#888'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('drag to move', cx, H - 18*S);
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(frame);
}

// ── SPRITES ──────────────────────────────────────────────────────────────────
// AI-generated sprites under ./sprites/. Loaded once on boot. drawSprite()
// falls back to the procedural drawing functions if a sprite isn't loaded
// (works locally during dev without sprites/, and survives any 404).
var SPRITE_NAMES = ['donut', 'crumb', 'mud', 'wrapper', 'trash'];
var sprites = {};
function loadSprites() {
  return Promise.all(SPRITE_NAMES.map(function(name) {
    return new Promise(function(resolve) {
      var img = new Image();
      img.onload  = function() { sprites[name] = img;  resolve(); };
      img.onerror = function() { sprites[name] = null; resolve(); };
      img.src = './sprites/' + name + '.png';
    });
  }));
}
function drawSpriteAt(name, x, y, size, fallbackFn) {
  var img = sprites[name];
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, x - size/2, y - size/2, size, size);
  } else if (typeof fallbackFn === 'function') {
    fallbackFn();
  }
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
var started = false;
// Expose game state for the post-build-tester / yandex-testing harness.
// Without this, __gfState() returns null and every state-aware check skips,
// degrading the suite to "generic" adapter mode (2026-05-15 audit).
window.__gfState = function () {
  try {
    return {
      gs: gs,
      level: level,
      score: score,
      best: best,
      timeLeft: timeLeft,
      combo: combo,
      achEarned: (typeof achUnlockedCount === 'number') ? achUnlockedCount : Object.keys(achUnlocked || {}).length,
      achTotal: (typeof ACHIEVEMENTS !== 'undefined') ? ACHIEVEMENTS.length : 5,
      sfxMuted: sfxMuted,
      bestCombo: bestCombo,
      maxComboThisRun: maxComboThisRun,
      lastLevelStars: lastLevelStars,
      totalLevelStars: (typeof totalLevelStars === 'function') ? totalLevelStars() : 0,
      yesterdayScore: yesterdayScore,
      todayBestScore: todayBestScore,
      sprinklesCollected: sprinklesCollected,
      sprinklesOnField: sprinkleList.length,
      lastLevelPerfect: lastLevelPerfect,
      perfectChainAlive: perfectChainAlive,
      chainStartedThisLevel: chainStartedThisLevel,
      weekBestScore: weekBestScore,
      weekBestIsNew: weekBestIsNew,
    };
  } catch (e) { return { __error: String(e) }; }
};

function boot() {
  if (started) return;
  started = true;
  try {
    best = parseInt(localStorage.getItem(BEST_KEY)||'0')||0;
    // Migrate from pre-iter#1 key 'cs_best' if present and larger
    var legacy = parseInt(localStorage.getItem('cs_best')||'0')||0;
    if (legacy > best) { best = legacy; saveBest(); }
  } catch(e) {}
  loadSkinState();      // iter#3
  loadStreak();         // iter#5
  loadAchievements();   // iter#6
  loadMute();           // iter#8
  loadBestCombo();      // iter#9
  loadLevelStars();     // iter#10
  loadDailyScores();    // iter#11
  recomputeWeekBest();  // iter#14 — seed rolling 7-day ceiling from loaded daily scores
  loadSprinkleStats();  // iter#12
  // If lifetime best already crosses higher tiers, mark them seen on first
  // boot so we don't dump multiple toasts on a returning player. checkSkinUnlocks
  // would otherwise fire all of them on the next collect.
  for (var __i=0;__i<DONUT_SKINS.length;__i++) {
    var __s = DONUT_SKINS[__i];
    if (best >= __s.unlock) skinSeen[__s.id] = true;
  }
  // Persist in case this was a brand-new install
  try {
    var __ids = Object.keys(skinSeen).filter(function(k){ return skinSeen[k]; });
    localStorage.setItem(SKIN_SEEN_KEY, __ids.join(','));
  } catch(e) {}
  // Guard: if persisted skin is locked (e.g. localStorage tampering, best was
  // reset), revert to strawberry rather than render a tinted donut the player
  // hasn't earned.
  if (!isSkinUnlocked(getSkin(skinId))) { skinId = 'strawberry'; saveSkin(); }
  loadSprites().then(function() {
    if (window.ysdk && window.ysdk.features && window.ysdk.features.LoadingAPI) {
      window.ysdk.features.LoadingAPI.ready();
    }
    gs = 'MENU';
    lastTs = performance.now();
    requestAnimationFrame(frame);
    // pre-warm today's leaderboard so it shows instantly on first game-over
    fetchLeaderboard();
  });
}

// Expose tracked state to window for the deep_playtest harness (and any
// debug overlay). Read-only snapshot via getters so internal mutation still
// drives the values.
Object.defineProperty(window, 'gs',         { get: function(){ return gs; } });
Object.defineProperty(window, 'score',      { get: function(){ return score; } });
Object.defineProperty(window, 'best',       { get: function(){ return best; } });
Object.defineProperty(window, 'level',      { get: function(){ return level; } });
Object.defineProperty(window, 'timeLeft',   { get: function(){ return timeLeft; } });
Object.defineProperty(window, 'combo',      { get: function(){ return combo; } });
Object.defineProperty(window, 'newBest',    { get: function(){ return newBest; } });
Object.defineProperty(window, 'myRank',     { get: function(){ return myRank; } });
Object.defineProperty(window, 'lbCount',    { get: function(){ return leaderboard ? leaderboard.length : 0; } });
Object.defineProperty(window, 'skinId',     { get: function(){ return skinId; } });
Object.defineProperty(window, 'skinUnlockCount', { get: function(){
  var n = 0; for (var i=0;i<DONUT_SKINS.length;i++) if (best >= DONUT_SKINS[i].unlock) n++; return n;
} });
Object.defineProperty(window, 'daySeed',    { get: function(){ return daySeed; } });
Object.defineProperty(window, 'streak',     { get: function(){ return streak; } });
Object.defineProperty(window, 'streakBest', { get: function(){ return streakBest; } });
// iter#6: badge tracker — playtest can verify unlock-on-collect / unlock-on-level
Object.defineProperty(window, 'achUnlockedCount', { get: function(){ return achUnlockedCount(); } });
Object.defineProperty(window, 'achTotal',         { get: function(){ return ACHIEVEMENTS.length; } });
// iter#8: sfx mute state — playtest can verify persisted toggle
Object.defineProperty(window, 'sfxMuted',         { get: function(){ return sfxMuted; } });
Object.defineProperty(window, 'sfxReady',         { get: function(){ return !!_ac; } });
// iter#9: persistent best-chain tracker — playtest can verify run-max + lifetime
Object.defineProperty(window, 'bestCombo',        { get: function(){ return bestCombo; } });
Object.defineProperty(window, 'maxComboThisRun',  { get: function(){ return maxComboThisRun; } });
// iter#10: per-level star ratings — playtest can verify clear→stars→persist
Object.defineProperty(window, 'lastLevelStars',   { get: function(){ return lastLevelStars; } });
Object.defineProperty(window, 'totalLevelStars',  { get: function(){ return totalLevelStars(); } });
// iter#11: yesterday-vs-today daily-seed delta — playtest can verify record+render
Object.defineProperty(window, 'yesterdayScore',   { get: function(){ return yesterdayScore; } });
Object.defineProperty(window, 'todayBestScore',   { get: function(){ return todayBestScore; } });
// iter#13: PERFECT SWEEP bonus — playtest can verify chain-break detection + bonus award
Object.defineProperty(window, 'lastLevelPerfect',     { get: function(){ return lastLevelPerfect; } });
Object.defineProperty(window, 'perfectChainAlive',    { get: function(){ return perfectChainAlive; } });
Object.defineProperty(window, 'chainStartedThisLevel',{ get: function(){ return chainStartedThisLevel; } });
// iter#14: rolling 7-day best — playtest can verify ceiling recomputes + new-best flag
Object.defineProperty(window, 'weekBestScore',        { get: function(){ return weekBestScore; } });
Object.defineProperty(window, 'weekBestIsNew',        { get: function(){ return weekBestIsNew; } });

(function() {
  if (typeof YaGames === 'undefined') { boot(); return; }
  YaGames.init().then(function(ysdk) {
    window.ysdk = ysdk;
    try {
      var l = ysdk.environment && ysdk.environment.i18n && ysdk.environment.i18n.lang;
      if (l) lang = l.startsWith('ru') ? 'ru' : 'en';
    } catch(e) {}
    boot();
  }).catch(function() { boot(); });
  setTimeout(boot, 3000);
})();

})();
</script>
