// ── TUNABLES (per DESIGN.md) ─────────────────────────────────────────────
var GRID_W = 9;
var GRID_H = 16;
var START_OXY = 100;
var OXY_DIG = 4;
var OXY_BRACE = 2;
var OXY_BLAST = 14;
var MAX_CRUSH_LIVES = 3;
var ROCK_MAX_HP = 3;
var FALL_CHANCE_BASE = 0.22;
var FALL_TICK_MS = 520;
var O2_POCKET_REFILL = 18;
var MAX_LEVEL = 5;
var SURFACE_ROW = 0;

// ── SPRITES ──────────────────────────────────────────────────────────────
// Only the diver uses an AI sprite (the brass helmet hero asset). Rock, chunk
// and air-pocket cells draw procedurally as solid tiled squares so the shaft
// reads as a dense rock face rather than sparse floating ovals.
var SPRITE_NAMES = ['diver'];

// ── AUDIO — one shared context, synth SFX + soft procedural music bed ───────
// Inline (the bundled gf-lib predates GF.startMusic). Adapted from the proven
// merge_defense pattern: a single AudioContext, an SFX bus + a quieter music
// bus, started on the first user gesture (autoplay policy). Every control action
// gets a tactile cue — the player comment was that the controls FEEL
// uncomfortable, so audio feedback is part of the control-clarity fix.
var AC = null, mGain = null, sGain = null, muGain = null;
var _mStep = 0, _mNext = 0, _lastDigT = 0;
function audioInit() {
  if (AC) return;
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  mGain = AC.createGain(); mGain.gain.value = audioMuted ? 0 : 1; mGain.connect(AC.destination);
  sGain = AC.createGain(); sGain.gain.value = 0.55; sGain.connect(mGain);
  muGain = AC.createGain(); muGain.gain.value = 0.26; muGain.connect(mGain);
  _mNext = AC.currentTime + 0.1;
}
function audioResume() { try { if (AC && AC.state === 'suspended') AC.resume(); } catch (e) {} }
function tone(freq, dur, type, vol, bus) {
  if (!AC || audioMuted) return;
  try {
    var o = AC.createOscillator(), g2 = AC.createGain();
    o.type = type || 'sine'; o.frequency.value = freq; o.connect(g2); g2.connect(bus || sGain);
    var n = AC.currentTime;
    g2.gain.setValueAtTime(0.0001, n);
    g2.gain.linearRampToValueAtTime(vol || 0.25, n + 0.012);
    g2.gain.exponentialRampToValueAtTime(0.0006, n + dur);
    o.start(n); o.stop(n + dur + 0.03);
  } catch (e) {}
}
function sfx(name) {
  if (!AC || audioMuted) return;
  if (name === 'dig') {              // rate-limited thud so rapid taps don't machine-gun
    var nn = AC.currentTime; if (nn - _lastDigT < 0.05) return; _lastDigT = nn;
    tone(150 + Math.random() * 30, 0.07, 'square', 0.10);
    tone(90, 0.06, 'sine', 0.10);
  }
  else if (name === 'brace') { tone(330, 0.10, 'triangle', 0.18); tone(495, 0.08, 'sine', 0.10); }
  else if (name === 'blast') { tone(70, 0.32, 'sawtooth', 0.30); tone(110, 0.22, 'square', 0.12); }
  else if (name === 'pocket') { tone(784, 0.12, 'sine', 0.22); tone(1175, 0.16, 'sine', 0.12); }
  else if (name === 'mode') { tone(660, 0.07, 'square', 0.16); tone(990, 0.06, 'sine', 0.09); }
  else if (name === 'crush') { tone(140, 0.18, 'sawtooth', 0.22); tone(70, 0.22, 'square', 0.16); }
  else if (name === 'win') { [523, 659, 784, 1047].forEach(function (f, i) { setTimeout(function () { tone(f, 0.22, 'triangle', 0.24); }, i * 80); }); }
  else if (name === 'lose') { [392, 311, 233].forEach(function (f, i) { setTimeout(function () { tone(f, 0.26, 'sawtooth', 0.18); }, i * 110); }); }
  else if (name === 'daily') { tone(784, 0.12, 'triangle', 0.24); tone(1175, 0.18, 'sine', 0.14); }
}
// Slow, watery arpeggio bed (Am–F–C–G) — only while diving.
var MPROG = [[220, 261.63, 329.63], [174.61, 220, 261.63], [261.63, 329.63, 392], [196, 246.94, 293.66]];
function scheduleMusic() {
  if (!AC || audioMuted || gs !== 'PLAYING') return;
  var spb = 60 / 76, sps = spb / 2;
  while (_mNext < AC.currentTime + 0.25) {
    var ch = MPROG[(_mStep >> 3) % MPROG.length], beat = _mStep % 8;
    if (beat === 0 || beat === 4) tone(ch[0] / 2, sps * 1.8, 'triangle', 0.13, muGain);
    tone(ch[beat % 3] * 2, sps * 0.85, 'sine', 0.05, muGain);
    if (beat === 0) ch.forEach(function (f) { tone(f, spb * 4 * 0.95, 'sine', 0.028, muGain); });
    _mNext += sps; _mStep++;
  }
}
function setMuted(m) {
  audioMuted = m;
  saveMeta();
  if (mGain && AC) { try { mGain.gain.setTargetAtTime(m ? 0 : 1, AC.currentTime, 0.02); } catch (e) {} }
  if (!m) audioResume();
}

var gs = 'MENU';            // MENU | PLAYING | WON | GAMEOVER

var grid = [];              // grid[r*GRID_W + c] = { hp, o2 } | null

var chunks = [];            // { col, row } falling debris

var mode = 'dig';           // dig | brace | blast
var fallTimer = 0;
var actionsThisRun = 0;     // total dig/brace/blast actions this run (progression proxy)
var hardnessBias = 0;
var fallChance = FALL_CHANCE_BASE;
var loseCause = 'oxy';
var fullWin = false;
var tutorialOpen = false;
var lastAct = null;
var hitFlashT = 0;
var firstActionDone = false;  // clarity: drives the in-board coach hint until the first dig
var modeSwitched = false;     // clarity: true once the player has changed mode at least once
var audioMuted = false;       // persisted mute flag (loaded from meta)

// ── HANDS-ON ONBOARDING (iteration #5 — kill "unclear how to play / uncomfortable
// dig-blast switching") ─────────────────────────────────────────────────────
// The prior passes layered chips + a ghost + a one-line coach, but the FIRST-RUN
// experience was still a passive wall of tutorial text on the MENU, then the
// player was dropped onto a complex board cold — exactly the "tap-through text
// tour" the build guide flags as bad. This replaces it with an ACTION-GATED,
// played-on-the-live-board onboarding (Merge-Guns / demo-hand style): each step
// advances ONLY when the player performs the REAL action, with an animated
// pointing HAND at the exact target (the cell above, or the BRACE chip) + a slim
// caption pill — NOT a frozen panel. It deliberately teaches the dig→rockfall→
// brace cause-and-effect that the whole game hinges on, so mode-switching stops
// feeling random. Runs once ever (updrift_onboarded flag); the ? panel stays as
// a text reference and reopens it.
var ONB_KEY = 'updrift_onboarded';
var onbActive = false;        // an onboarding run is in progress
var onbStep = 0;              // 0 dig · 1 rise · 2 tap-brace-chip · 3 do-brace · 4 surface · 5 done
var onbRiseStart = 0;         // diverRow when the rise step began (to detect "rose enough")
var onbBraceArmed = false;    // step 2/3: a loose chunk has been seeded above the diver
var onbDoneT = 0;             // countdown for the final "you've got it" caption
// Just-in-time BRACE danger cue (normal play): true when a falling chunk is in
// the diver's column and about to crush — makes the mode switch REACTIVE to a
// legible threat instead of a guess. Drives a pulsing BRACE chip + a "BRACE!"
// flag near the diver.
var braceDanger = false;

// ── PERSISTENT META — "Career Depth" (iteration #1, retention pass) ─────────
// The single cross-session progression the player OWNS: the deepest level ever
// surfaced from. Each new depth milestone permanently grows the starting air
// tank, so every career advance makes future runs easier. bestLevel persists
// across sessions in its own localStorage key (updrift_meta_v1), separate from
// the per-run GF.persist slot; careerO2Bonus is derived from it. The MENU +
// GAMEOVER screens show a concrete NEXT-GOAL line built from this — which also
// fixes the loudest player complaint ("very unclear what to aim for").
var bestLevel = 0;            // max level ever REACHED (cleared up to)
// O2 banked per milestone level reached: L2→+10, L3→+20, L4→+30, L5→+40.
var O2_MILESTONE = [0, 0, 10, 20, 30, 40];  // index by level (1..5)
var bestBeatenThisRun = false;  // banner latch: hit a new best this run
var lastBankedAir = 0;          // air newly banked on the level just cleared (for WON banner)

// ── ENDLESS DESCENT (playtime-deepening pass) ───────────────────────────────
// The 5-level campaign was a hard ceiling: surface Lvl 5 → "YOU SURFACED!" →
// RETRY back to Lvl 1, with nothing left for a player who has mastered the loop.
// That capped session length. Endless Descent turns surfacing Lvl 5 into the
// GATEWAY to an open-ended skill ladder: levels keep going (6, 7, 8 …) with
// hardness/fall-chance already at their ceiling, so each one is a pure
// execution test. A new OWNED cross-session record — the DEEPEST DIVE (in
// metres) — is banked across sessions, giving the skilled player a number to
// chase run after run (the lever that pushes avg session toward the ~15-min
// target). The 5-level campaign + its career-air milestones are unchanged;
// this layers an endless tail on top of the existing win.
var ENDLESS_DEPTH_PER_LV = 10;  // metres of "depth" credited per level cleared
var bestDepth = 0;              // deepest dive ever (in metres) — persists
var recordBeatenThisRun = false;// latch: beat the all-time depth record this run
// Depth (metres) for the level the diver is CURRENTLY on (1-based: clearing
// level N = N*PER_LV metres surfaced-through). Endless levels keep counting.
function depthMetres(lv) { return (lv || level) * ENDLESS_DEPTH_PER_LV; }
function isEndless() { return level > MAX_LEVEL; }

// ── M2 — REASON TO RETURN (iteration #2, the habit engine) ──────────────────
// Three mechanics designed as ONE loop, all feeding the existing AIR economy so
// no new currency confuses the player (the comment asked for *less* friction):
//   1. Daily login + streak — first dive of each calendar day grants a one-run
//      "supply air" bonus that grows with the consecutive-day streak (capped).
//   2. Overnight Air Cache — a capped idle accrual that fills while away; the cap
//      IS the return trigger (open tomorrow to a topped-up cache to collect).
//   3. Daily Quest — one seeded daily objective; completing it banks a bonus that
//      sweetens tomorrow's supply (momentum transfer).
// Unlike the M1 career bonus (a permanent stat applied every level-refill), the
// M2 air is a ONE-RUN kick applied only at run START — a true daily reason to
// come back, not a power creep.
var DAILY_BASE = 12;            // day-1 supply air
var DAILY_STEP = 6;            // +air per extra streak day
var DAILY_MAX_DAYS = 7;        // streak caps here (day 7 = max supply)
var CACHE_RATE_PER_HR = 4;     // overnight cache air accrued per hour away
var CACHE_CAP = 40;           // cache cap (the return trigger — fills in ~10h)
var QUEST_BONUS_AIR = 14;      // bonus supply banked for tomorrow on quest done

var dayStreak = 0;             // consecutive days played
var lastPlayDay = 0;          // day-index (floor(epoch/86400000)) of last claim
var dailyAvailable = false;   // a fresh daily supply is waiting to be collected
var dailyClaimedToday = false;// already collected today's supply
var overnightCache = 0;       // idle-accrued air waiting in the cache
var lastSeenMs = 0;           // wall-clock of last MENU visit (for cache accrual)
var questBankedAir = 0;       // bonus air carried into the NEXT run from a done quest
var dailyRunBonus = 0;        // one-run supply air to add at the next run start
var questId = 0;              // which daily quest is active (seeded by day)
var questTarget = 0;          // quest goal value
var questDoneToday = false;   // today's quest already completed
// per-run quest progress trackers
var runAirGained = 0;         // O2 picked up from pockets this run (for air/pocket quests)
var runPockets = 0;           // air pockets grabbed this run
var questProgressDepth = 0;   // deepest level reached this run (for depth/survive quests)
var runStartBonus = 0;        // supply air actually granted at this run's start (HUD/feedback)
var questJustDone = false;    // latch: the quest completed during the current run

var QUESTS = ['depth', 'air', 'survive', 'pockets'];
function dayIndex(ms) { return Math.floor((ms != null ? ms : Date.now()) / 86400000); }
// Deterministic daily seed so the quest is the same all day (and reproducible).
function questForDay(di) {
  var h = (di * 2654435761) % 2147483647; if (h < 0) h += 2147483647;
  var id = h % QUESTS.length;
  var kind = QUESTS[id];
  var tgt;
  if (kind === 'depth')   tgt = 2 + (h % 3);          // reach Lvl 2..4
  else if (kind === 'air') tgt = 30 + (h % 4) * 10;    // bank 30..60 air
  else if (kind === 'survive') tgt = 2 + (h % 2);      // clear 2..3 levels
  else                    tgt = 2 + (h % 3);            // grab 2..4 pockets
  return { id: id, kind: kind, target: tgt };
}
function questText() {
  var k = QUESTS[questId];
  if (k === 'depth')   return subst(GF.t('quest_depth'),   { n: questTarget });
  if (k === 'air')     return subst(GF.t('quest_air'),     { n: questTarget });
  if (k === 'survive') return subst(GF.t('quest_survive'), { n: questTarget });
  return subst(GF.t('quest_pockets'), { n: questTarget });
}
// Supply air the streak grants for `day` (1-based, capped at DAILY_MAX_DAYS).
function streakAir(day) {
  var d = Math.max(1, Math.min(DAILY_MAX_DAYS, day));
  return DAILY_BASE + (d - 1) * DAILY_STEP;
}
// Refresh daily/streak/cache/quest state for the current wall-clock. Called on
// load and whenever the MENU is shown so the cache keeps filling between visits.
function refreshDaily() {
  var now = Date.now();
  var di = dayIndex(now);
  // Overnight cache accrual since we last saw the player (capped — the cap is
  // the whole point: it stops rewarding indefinite absence, so coming back
  // *tomorrow* collects a full cache rather than a trickle).
  if (lastSeenMs > 0) {
    var hrs = (now - lastSeenMs) / 3600000;
    if (hrs > 0) overnightCache = Math.min(CACHE_CAP, overnightCache + hrs * CACHE_RATE_PER_HR);
  }
  lastSeenMs = now;
  // New calendar day → a fresh daily supply + (maybe) streak advance is waiting.
  if (di !== lastPlayDay) {
    if (lastPlayDay === di - 1) dayStreak = Math.min(DAILY_MAX_DAYS, dayStreak + 1); // consecutive
    else dayStreak = 1;                                                              // streak broke / first ever
    dailyClaimedToday = false;
    dailyAvailable = true;
    // Roll today's quest fresh.
    var q = questForDay(di);
    questId = q.id; questTarget = q.target; questDoneToday = false;
    lastPlayDay = di;
    saveMeta();
  } else {
    dailyAvailable = !dailyClaimedToday;
    // Ensure quest is populated even on same-day reloads (first-ever boot).
    if (questTarget === 0) { var q2 = questForDay(di); questId = q2.id; questTarget = q2.target; }
  }
}
// Player taps COLLECT on the MENU: hand the daily supply + cache + any banked
// quest bonus to the NEXT run as one-shot supply air, then reset the cache.
function collectDaily() {
  if (!dailyAvailable) return 0;
  var supply = streakAir(dayStreak);
  var cache = Math.round(overnightCache);
  var bonus = questBankedAir;
  dailyRunBonus = supply + cache + bonus;
  overnightCache = 0;
  questBankedAir = 0;
  dailyClaimedToday = true;
  dailyAvailable = false;
  saveMeta();
  audioInit(); audioResume(); sfx('daily');
  return dailyRunBonus;
}
// Evaluate today's quest against current run progress. Completing it banks a
// bonus that is collected with TOMORROW's daily supply (momentum transfer) and
// pops a float so the win is legible the moment it lands. Idempotent per day.
function checkQuest() {
  if (questDoneToday || questTarget === 0) return;
  var k = QUESTS[questId];
  var done = false;
  if (k === 'depth')   done = (questProgressDepth >= questTarget);
  else if (k === 'air') done = (runAirGained >= questTarget);
  else if (k === 'survive') done = (questProgressDepth >= questTarget); // levels cleared in one dive
  else if (k === 'pockets') done = (runPockets >= questTarget);
  if (done) {
    questDoneToday = true;
    questJustDone = true;
    questBankedAir += QUEST_BONUS_AIR;
    saveMeta();
    GF.spawnFloat(GF.cx, GF.H * 0.5, subst(GF.t('quest_bonus'), { air: QUEST_BONUS_AIR }), '#ffe06a');
    GF.spawnParticles(GF.cx, GF.H * 0.5, '#ffe06a', 28);
  }
}

var META_KEY = 'updrift_meta_v1';
function loadMeta() {
  try {
    var raw = localStorage.getItem(META_KEY);
    if (!raw) return;
    var m = JSON.parse(raw);
    if (m && typeof m.bestLevel === 'number') bestLevel = Math.max(0, Math.min(MAX_LEVEL, m.bestLevel | 0));
    if (typeof m.bestDepth === 'number') bestDepth = Math.max(0, m.bestDepth | 0);
    if (typeof m.dayStreak === 'number') dayStreak = Math.max(0, Math.min(DAILY_MAX_DAYS, m.dayStreak | 0));
    if (typeof m.lastPlayDay === 'number') lastPlayDay = m.lastPlayDay | 0;
    if (typeof m.dailyClaimedToday === 'boolean') dailyClaimedToday = m.dailyClaimedToday;
    if (typeof m.overnightCache === 'number') overnightCache = Math.max(0, Math.min(CACHE_CAP, m.overnightCache));
    if (typeof m.lastSeenMs === 'number') lastSeenMs = m.lastSeenMs;
    if (typeof m.questBankedAir === 'number') questBankedAir = Math.max(0, m.questBankedAir | 0);
    if (typeof m.questDoneToday === 'boolean') questDoneToday = m.questDoneToday;
    if (typeof m.audioMuted === 'boolean') audioMuted = m.audioMuted;
  } catch (e) {}
}
function saveMeta() {
  try {
    localStorage.setItem(META_KEY, JSON.stringify({
      bestLevel: bestLevel,
      bestDepth: bestDepth,
      dayStreak: dayStreak,
      lastPlayDay: lastPlayDay,
      dailyClaimedToday: dailyClaimedToday,
      overnightCache: overnightCache,
      lastSeenMs: lastSeenMs,
      questBankedAir: questBankedAir,
      questDoneToday: questDoneToday,
      audioMuted: audioMuted,
    }));
  } catch (e) {}
}
function careerO2Bonus() {
  return (bestLevel >= 1 && bestLevel <= MAX_LEVEL) ? O2_MILESTONE[bestLevel] : 0;
}
function effectiveStartOxy() { return START_OXY + careerO2Bonus(); }
// Record reaching/clearing `lv`; returns the bonus newly banked (0 if none).
function recordDepth(lv) {
  if (lv <= bestLevel) return 0;
  var before = careerO2Bonus();
  bestLevel = Math.min(lv, MAX_LEVEL);
  var gained = careerO2Bonus() - before;
  bestBeatenThisRun = true;
  saveMeta();
  return gained;
}
function subst(str, map) {
  return String(str).replace(/\{(\w+)\}/g, function (_, k) { return (k in map) ? map[k] : '{' + k + '}'; });
}
// The concrete cross-session pull, shown on MENU + GAMEOVER. Tells the player
// exactly which depth to aim for next and what air it banks (clarity + goal).
function nextGoalText() {
  // Once the campaign is mastered the goal flips to the ENDLESS chase: beat your
  // own deepest dive. This replaces the old terminal "CAREER COMPLETE" dead-end
  // so there is ALWAYS a concrete number to come back for.
  if (bestLevel >= MAX_LEVEL) {
    if (bestDepth > 0) return subst(GF.t('endless_goal_next'), { m: bestDepth });
    return GF.t('endless_goal_first');
  }
  // Aim at the next level that actually banks air (L1 grants 0), so the goal is
  // always a concrete reward and never reads "+0".
  var nextLv = bestLevel + 1;
  while (nextLv < MAX_LEVEL && O2_MILESTONE[nextLv] - careerO2Bonus() <= 0) nextLv++;
  var air = O2_MILESTONE[Math.min(nextLv, MAX_LEVEL)] - careerO2Bonus();
  return subst(GF.t('goal_next'), { lv: nextLv, air: air });
}

var MODES = ['dig', 'brace', 'blast'];

function rnd() { return Math.random(); }

// ── BUILD A LEVEL ────────────────────────────────────────────────────────
function buildLevel(lv) {
  level = lv;
  hardnessBias = Math.min(0.55, 0.10 + (lv - 1) * 0.11);
  fallChance = Math.min(0.55, FALL_CHANCE_BASE + (lv - 1) * 0.06);
  grid = new Array(GRID_W * GRID_H);
  braced = new Array(GRID_W);
  chunks = [];
  for (var c = 0; c < GRID_W; c++) braced[c] = false;

  diverCol = (GRID_W >> 1);
  diverRow = GRID_H - 1;

  for (var r = 0; r < GRID_H; r++) {
    for (var cc = 0; cc < GRID_W; cc++) {
      var idx = r * GRID_W + cc;
      if (r === SURFACE_ROW) { grid[idx] = null; continue; }
      if (r === diverRow && cc === diverCol) { grid[idx] = null; continue; }
      var openTop = (r <= 1) ? 0.6 : 0;
      if (rnd() < openTop) { grid[idx] = null; continue; }
      var hp = 1;
      var roll = rnd();
      if (roll < hardnessBias * 0.5) hp = 3;
      else if (roll < hardnessBias) hp = 2;
      var o2 = (rnd() < 0.05);
      grid[idx] = { hp: Math.min(hp, ROCK_MAX_HP), o2: o2 };
    }
  }
}

function cellAt(r, c) {
  if (r < 0 || r >= GRID_H || c < 0 || c >= GRID_W) return undefined;
  return grid[r * GRID_W + c];
}
function setCell(r, c, v) { grid[r * GRID_W + c] = v; }
function isEmpty(r, c) {
  if (r < SURFACE_ROW) return true;
  return cellAt(r, c) === null;
}

// ── LIFECYCLE ────────────────────────────────────────────────────────────
function startGame() {
  level = 1;
  // Run START gets the permanent career tank PLUS any one-run daily/cache/quest
  // supply the player collected on the MENU (M2). The supply is consumed here so
  // it applies once per dive, not on every level refill (that stays career-only).
  oxygen = effectiveStartOxy() + (dailyRunBonus || 0);
  runStartBonus = dailyRunBonus || 0;
  dailyRunBonus = 0;
  crushLives = MAX_CRUSH_LIVES;
  mode = 'dig';
  fullWin = false;
  bestBeatenThisRun = false;
  recordBeatenThisRun = false;
  lastBankedAir = 0;
  // Reset per-run quest progress trackers (M2).
  runAirGained = 0;
  runPockets = 0;
  questProgressDepth = 0;
  actionsThisRun = 0;
  firstActionDone = false;
  modeSwitched = false;
  buildLevel(1);
  gs = 'PLAYING';
  // Hands-on onboarding on the FIRST ever dive (gallery PLAY or platform
  // autostart both reach this) — played on the live board, action-gated. After
  // that one run the flag is set and normal play resumes untutored.
  if (!onbWasSeen() && !window._silent) onbStart();
  else onbActive = false;
  audioInit(); audioResume();   // first dive = a user gesture → safe to start audio
  if (runStartBonus > 0) {
    GF.spawnFloat(GF.cx, GF.H * 0.42, subst(GF.t('run_bonus'), { air: runStartBonus }), '#7af5ff');
  }
  checkQuest();
  GF.gameStarted();
  GF.saveRun();
}
function nextLevel() {
  // Endless Descent: there is no terminal "you win" any more — surfacing Lvl 5
  // opens an open-ended descent (6, 7, 8 …). CONTINUE always carves a deeper
  // level. (The Lvl-5 WIN screen still celebrates the campaign clear; it just
  // routes into the endless tail instead of dead-ending on RETRY.)
  oxygen = Math.min(effectiveStartOxy(), oxygen + 30);
  buildLevel(level + 1);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}
function loseGame(cause) {
  loseCause = cause;
  gs = 'GAMEOVER';
  GF.setShake(1.0);
  sfx(cause === 'crush' ? 'crush' : 'lose');
  GF.gameEnded();
  GF.saveRun();
}
function winLevel() {
  gs = 'WON';
  // `fullWin` now means "campaign just cleared THIS surfacing" (exactly Lvl 5) —
  // it triggers the one-time "YOU SURFACED! / ENDLESS DESCENT UNLOCKED" splash.
  // Endless levels (6+) clear with the normal per-level WON screen. The CONTINUE
  // button always dives deeper now (no terminal RETRY-only state).
  fullWin = (level === MAX_LEVEL);
  // Clearing level `level` banks the M1 career-depth milestone (capped at Lvl 5
  // inside recordDepth — endless levels add no extra start-air, by design).
  lastBankedAir = recordDepth(level);
  // ENDLESS: bank the deepest dive ever (metres). Surfacing level N = N*PER_LV
  // metres conquered. This is the new owned cross-session record to chase.
  var dm = depthMetres(level);
  if (dm > bestDepth) { bestDepth = dm; recordBeatenThisRun = true; saveMeta(); }
  // M2 quest progress: cleared levels this dive = `level` (run always starts at 1
  // and rises monotonically). Drives both the depth and survive quests.
  questProgressDepth = Math.max(questProgressDepth, level);
  checkQuest();
  // Onboarding: surfacing the very first level completes the lesson (any step
  // still pending — e.g. the player rushed straight up — resolves here). Mark it
  // seen so it never replays, but leave onbActive for one closing caption beat.
  if (onbActive) { onbStep = 5; onbDoneT = 1.6; onbFinish(); }
  GF.spawnParticles(GF.cx, GF.H * 0.3, '#ffe06a', 56);
  sfx('win');
  GF.gameEnded();
  GF.saveRun();
}

// ── CORE MECHANICS ──────────────────────────────────────────────────────
function digUp() {
  if (gs !== 'PLAYING' || oxygen <= 0) return;
  var tr = diverRow - 1, tc = diverCol;
  var cell = cellAt(tr, tc);
  if (cell === undefined) return;
  oxygen -= OXY_DIG;
  lastAct = { r: tr, c: tc, t: performance.now(), kind: 'dig' };
  if (cell !== null) {
    cell.hp -= 1;
    var px = layout.gx + (tc + 0.5) * layout.cell;
    var py = layout.gy + (tr + 0.5) * layout.cell;
    if (cell.hp <= 0) {
      if (cell.o2) {
        oxygen = Math.min(START_OXY, oxygen + O2_POCKET_REFILL);
        runAirGained += O2_POCKET_REFILL; runPockets += 1; checkQuest();
        GF.spawnParticles(px, py, '#34e1ff', 18);
        GF.spawnFloat(px, py, '+' + O2_POCKET_REFILL + ' ' + GF.t('o2'), '#34e1ff');
        sfx('pocket');
      } else {
        GF.spawnParticles(px, py, '#8a6b50', 12);
        sfx('dig');
      }
      setCell(tr, tc, null);
    } else {
      GF.spawnParticles(px, py, '#6a5440', 8);
      sfx('dig');
    }
  } else { sfx('dig'); }
  firstActionDone = true;
  afterAction();
}

function brace() {
  if (gs !== 'PLAYING' || oxygen <= 0) return;
  oxygen -= OXY_BRACE;
  braced[diverCol] = true;
  lastAct = { r: diverRow - 1, c: diverCol, t: performance.now(), kind: 'brace' };
  var px = layout.gx + (diverCol + 0.5) * layout.cell;
  var py = layout.gy + (diverRow - 0.5) * layout.cell;
  GF.spawnParticles(px, py, '#ffd24a', 8);
  sfx('brace');
  firstActionDone = true;
  onbOnBrace();
  afterAction();
}

function blast() {
  if (gs !== 'PLAYING' || oxygen <= 0) return;
  oxygen -= OXY_BLAST;
  lastAct = { r: diverRow - 1, c: diverCol, t: performance.now(), kind: 'blast' };
  var gained = 0;
  for (var k = 1; k <= 3; k++) {
    var tr = diverRow - k, tc = diverCol;
    var cell = cellAt(tr, tc);
    if (cell === undefined) break;
    var px = layout.gx + (tc + 0.5) * layout.cell;
    var py = layout.gy + (tr + 0.5) * layout.cell;
    if (cell) {
      if (cell.o2) { gained += O2_POCKET_REFILL; runPockets += 1; }
      GF.spawnParticles(px, py, '#ff7a3a', 14);
      setCell(tr, tc, null);
    }
  }
  if (gained) { oxygen = Math.min(START_OXY, oxygen + gained); runAirGained += gained; checkQuest(); sfx('pocket'); }
  GF.setShake(0.6);
  sfx('blast');
  firstActionDone = true;
  afterAction();
}

// Did the player just BRACE? Advance onboarding step 3 → 4 (the real action that
// completes the brace lesson). Hooked from brace() below.
function onbOnBrace() {
  if (onbActive && onbStep === 3) onbAdvance();
}

function act() {
  if (mode === 'dig') digUp();
  else if (mode === 'brace') brace();
  else blast();
}

function cycleMode() {
  var i = MODES.indexOf(mode);
  mode = MODES[(i + 1) % MODES.length];
  modeSwitched = true;
  sfx('mode');
}
// Clarity: direct mode selection (tappable chips + number keys) so the player
// is never blindly cycling — they pick the mode they want and can SEE it's
// active. Re-tapping the active chip is a no-op (no accidental cycle).
function selectMode(m) {
  if (MODES.indexOf(m) < 0 || mode === m) return;
  mode = m;
  modeSwitched = true;
  sfx('mode');
  // Onboarding step 2 → 3: the player tapped the BRACE chip as instructed.
  if (onbActive && onbStep === 2 && m === 'brace') onbAdvance();
}

// ── ONBOARDING CONTROLLER ───────────────────────────────────────────────────
function onbWasSeen() {
  try { return localStorage.getItem(ONB_KEY) === '1'; } catch (e) { return false; }
}
// Persist "onboarding done" WITHOUT killing the active flag — the closing caption
// (step 5) still shows for onbDoneT seconds; update() clears onbActive when the
// timer expires. Persisting here means a reload mid-celebration won't replay it.
function onbFinish() {
  try { localStorage.setItem(ONB_KEY, '1'); localStorage.setItem('updrift_seen_tutorial', '1'); } catch (e) {}
}
// Begin the hands-on onboarding on the CURRENT live run (called from startGame on
// the first ever dive). It does NOT freeze the game — the player performs the real
// actions; we just gate the caption/hand on the real action and seed a loose chunk
// at the brace step so that step is always completable.
function onbStart() {
  onbActive = true;
  onbStep = 0;
  onbRiseStart = diverRow;
  onbBraceArmed = false;
  onbDoneT = 0;
}
function onbAdvance() {
  onbStep++;
  if (onbStep === 1) { onbRiseStart = diverRow; }
  if (onbStep === 2) {
    // Force a teachable BRACE moment: drop a real falling chunk into the diver's
    // column a couple rows up so "the ceiling is raining down — brace it" is TRUE,
    // not abstract. selectMode('brace') advances 2→3; the brace action advances 3→4.
    onbSeedBraceThreat();
    onbBraceArmed = true;
    if (mode === 'brace') onbStep = 3;   // already on brace → skip the chip-tap step
  }
  if (onbStep >= 5) { onbDoneT = 2.2; onbFinish(); }   // closing caption; mark seen so a reload won't replay
}
// Seed a loose falling chunk directly above the diver (clears any rock in the way
// first so it actually falls), guaranteeing the brace lesson is reachable.
function onbSeedBraceThreat() {
  var col = diverCol;
  var sr = Math.max(SURFACE_ROW + 1, diverRow - 3);   // a few rows up
  // clear the column between the chunk and the diver so the chunk has room to drop
  for (var r = sr; r < diverRow; r++) { if (cellAt(r, col)) setCell(r, col, null); }
  if (!chunkAt(sr, col)) chunks.push({ col: col, row: sr });
}

function moveDiver(dx) {
  if (gs !== 'PLAYING') return;
  var nc = diverCol + dx;
  if (nc < 0 || nc >= GRID_W) return;
  if (isEmpty(diverRow, nc)) { diverCol = nc; }
}

function afterAction() {
  actionsThisRun++;
  tryRise();
  // Onboarding gating on the REAL dig/rise actions (kept here so it fires for
  // dig, brace, and blast uniformly):
  //  step 0 → 1: the player performed their first action (dig).
  //  step 1 → 2: they have dug/risen a couple of rows (loop understood).
  if (onbActive) {
    if (onbStep === 0) onbAdvance();
    else if (onbStep === 1 && (onbRiseStart - diverRow) >= 2) onbAdvance();
  }
  if (oxygen <= 0) { oxygen = 0; loseGame('oxy'); return; }
  if (diverRow <= SURFACE_ROW) { winLevel(); return; }
  GF.saveRun();
}

// Recompute the just-in-time BRACE danger cue: is there a falling chunk in the
// diver's column, close enough overhead that it will crush him within ~2 ticks?
// (Only meaningful while playing and not already bracing.) This is what turns
// "switch to brace" from a blind guess into a readable, reactive decision.
function updateBraceDanger() {
  braceDanger = false;
  if (gs !== 'PLAYING') return;
  for (var i = 0; i < chunks.length; i++) {
    var ch = chunks[i];
    if (ch.col === diverCol && ch.row < diverRow && (diverRow - ch.row) <= 2) {
      braceDanger = true; return;
    }
  }
}

function tryRise() {
  var safety = 0;
  while (diverRow > SURFACE_ROW && isEmpty(diverRow - 1, diverCol) && !chunkAt(diverRow - 1, diverCol) && safety < GRID_H) {
    diverRow -= 1;
    safety++;
  }
}

function chunkAt(r, c) {
  for (var i = 0; i < chunks.length; i++) {
    if (chunks[i].col === c && chunks[i].row === r) return chunks[i];
  }
  return null;
}

// ── GRAVITY TICK ───────────────────────────────────────────────────────────
function gravityTick() {
  if (gs !== 'PLAYING') return;

  for (var i = chunks.length - 1; i >= 0; i--) {
    var ch = chunks[i];
    var below = ch.row + 1;
    if (below === diverRow && ch.col === diverCol) {
      crushLives -= 1;
      hitFlashT = 0.5;
      var pxh = layout.gx + (diverCol + 0.5) * layout.cell;
      var pyh = layout.gy + (diverRow + 0.5) * layout.cell;
      GF.spawnParticles(pxh, pyh, '#ff4d5e', 22);
      GF.setShake(0.8);
      sfx('crush');
      chunks.splice(i, 1);
      if (crushLives <= 0) { loseGame('crush'); return; }
      continue;
    }
    if (below >= GRID_H || cellAt(below, ch.col)) {
      if (cellAt(ch.row, ch.col) === null && ch.row !== diverRow) {
        setCell(ch.row, ch.col, { hp: 1, o2: false });
      }
      chunks.splice(i, 1);
      continue;
    }
    ch.row = below;
  }

  for (var c = 0; c < GRID_W; c++) {
    if (braced[c]) continue;
    for (var r = GRID_H - 2; r >= SURFACE_ROW; r--) {
      var cur = cellAt(r, c);
      if (!cur) continue;
      var bel = cellAt(r + 1, c);
      var belEmpty = (bel === null) && !chunkAt(r + 1, c);
      if (!belEmpty) continue;
      if (rnd() < fallChance) {
        setCell(r, c, null);
        chunks.push({ col: c, row: r });
      }
      break;
    }
  }

  for (var b = 0; b < GRID_W; b++) braced[b] = false;

  tryRise();
  if (diverRow <= SURFACE_ROW) { winLevel(); return; }
  GF.saveRun();
}

// ── SCREENSHOT / TEST HELPERS ──────────────────────────────────────────────
window._jumpLevel = function (lv) {
  lv = lv || 3;
  // Out-of-range level (e.g. the runtime gate's _jumpLevel(99)) drives a
  // terminal state so reachability can be verified.
  if (lv > MAX_LEVEL) {
    startGame();
    oxygen = 0;       // empty tank
    loseGame('oxy');  // deterministic terminal state for the runtime gate
    return;
  }
  lv = Math.max(1, Math.min(MAX_LEVEL, lv));
  startGame();
  buildLevel(lv);
  gs = 'PLAYING';
  recomputeLayout();
  var carved = 0, maxCarve = Math.floor(GRID_H * 0.55);
  while (diverRow > Math.floor(GRID_H * 0.42) && carved < maxCarve) {
    var tr = diverRow - 1;
    var cell = cellAt(tr, diverCol);
    if (cell) setCell(tr, diverCol, null);
    diverRow -= 1;
    carved++;
    if (carved % 4 === 0) {
      var d = (rnd() < 0.5 ? -1 : 1);
      if (diverCol + d >= 0 && diverCol + d < GRID_W && isEmpty(diverRow, diverCol + d)) diverCol += d;
    }
  }
  for (var k = 0; k < 4; k++) {
    var cc = Math.floor(rnd() * GRID_W);
    var rr0 = 2 + Math.floor(rnd() * Math.max(1, diverRow - 3));
    if (rr0 < diverRow && rr0 > SURFACE_ROW && cellAt(rr0, cc) === null) {
      chunks.push({ col: cc, row: rr0 });
    }
  }
  oxygen = Math.round(START_OXY * 0.62);
  crushLives = 2;
  mode = 'brace';
  firstActionDone = true;   // mid-game jump = past the first-action coach hint
  modeSwitched = true;
  onbActive = false;        // mid-game jump is past onboarding (keep screenshots clean)
};
window._setupForScreenshot = window._jumpLevel;
// Test/screenshot-only seam: set up an arbitrary endless level (lv may exceed
// MAX_LEVEL) for visual verification of the Endless Descent UI. Optional 2nd arg
// pre-seeds bestDepth so the record-record paths can be screenshotted. Never
// reached in normal play (console/puppeteer only) — like _jumpLevel above.
window._jumpEndless = function (lv, seedBest) {
  lv = Math.max(1, lv || (MAX_LEVEL + 1));
  startGame();
  if (typeof seedBest === 'number') { bestDepth = seedBest; saveMeta(); }
  buildLevel(lv);
  level = lv;
  gs = 'PLAYING';
  recomputeLayout();
  // carve a believable shaft so the board reads mid-dive
  var carved = 0, maxCarve = Math.floor(GRID_H * 0.5);
  while (diverRow > Math.floor(GRID_H * 0.45) && carved < maxCarve) {
    var cell = cellAt(diverRow - 1, diverCol);
    if (cell) setCell(diverRow - 1, diverCol, null);
    diverRow -= 1; carved++;
  }
  oxygen = Math.round(START_OXY * 0.6);
  crushLives = 2; mode = 'dig';
  firstActionDone = true; modeSwitched = true; onbActive = false;
};
// Test/screenshot-only seam: carve straight to the surface and trigger a real
// level win (so fullWin / record / banked-air latches set authentically for the
// WON-screen screenshots). Console/puppeteer only — never reached in play.
window._winNow = function () {
  if (gs !== 'PLAYING') return;
  var safety = 0;
  while (diverRow > SURFACE_ROW && safety < GRID_H * 2) {
    var tr = diverRow - 1;
    if (cellAt(tr, diverCol)) setCell(tr, diverCol, null);
    diverRow -= 1; safety++;
  }
  winLevel();
};
window._setLang = function (l) { GF.lang = l; };
window._setState = function (s) { gs = s; };
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return 'sans-serif'; };

// ── LAYOUT ───────────────────────────────────────────────────────────────
var layout = { gx: 0, gy: 0, cell: 0, gw: 0, gh: 0, topPad: 0, botPad: 0, helpBtn: null, muteBtn: null, modeChip: null, modeChips: [], dailyBtn: null };
function recomputeLayout() {
  var W = GF.W, H = GF.H;
  layout.topPad = GF.clamp(74 * GF.S, 52, 104);
  // Taller bottom band: the three mode chips are now stacked as a labelled row,
  // so reserve a little more vertical room than the old single cycle chip.
  layout.botPad = GF.clamp(104 * GF.S, 78, 140);
  var availH = H - layout.topPad - layout.botPad;
  var availW = W - GF.clamp(16 * GF.S, 8, 28) * 2;
  var cell = Math.floor(Math.min(availW / GRID_W, availH / GRID_H));
  cell = Math.max(8, cell);
  layout.cell = cell;
  layout.gw = cell * GRID_W;
  layout.gh = cell * GRID_H;
  layout.gx = Math.floor((W - layout.gw) / 2);
  layout.gy = layout.topPad;
  var hb = GF.clamp(34 * GF.S, 26, 44);
  layout.helpBtn = { x: W - hb - GF.clamp(12 * GF.S, 8, 18), y: GF.clamp(12 * GF.S, 8, 18), s: hb };
  // Mute toggle sits to the LEFT of help (top-right corner), same size.
  layout.muteBtn = { x: layout.helpBtn.x - hb - GF.clamp(8 * GF.S, 5, 12), y: layout.helpBtn.y, s: hb };

  // CLARITY: three directly-tappable mode chips (DIG / BRACE / BLAST) in a row,
  // replacing the blind single-cycle chip. The active one is highlighted; each
  // shows its O2 cost so the trade-off is legible at a glance.
  var gap = GF.clamp(8 * GF.S, 5, 12);
  var rowW = Math.min(W - GF.clamp(16 * GF.S, 8, 24) * 2, GF.clamp(440 * GF.S, 300, 560));
  var chipW = (rowW - gap * 2) / 3;
  var chipH = GF.clamp(58 * GF.S, 46, 76);
  var rowX = (W - rowW) / 2;
  var rowY = H - layout.botPad + GF.clamp(16 * GF.S, 10, 26);
  layout.modeChips = [];
  for (var mi = 0; mi < MODES.length; mi++) {
    layout.modeChips.push({ mode: MODES[mi], x: rowX + mi * (chipW + gap), y: rowY, w: chipW, h: chipH });
  }
  // Back-compat: keep a single modeChip rect (= the whole row) so any legacy hit
  // test / exposed field still resolves; new input uses modeChips.
  layout.modeChip = { x: rowX, y: rowY, w: rowW, h: chipH };
}

// ── INPUT ────────────────────────────────────────────────────────────────
function inRect(x, y, r) { return r && x >= r.x && x <= r.x + (r.w || r.s) && y >= r.y && y <= r.y + (r.h || r.s); }

function hitTutorialClose(x, y) {
  var bw = GF.clamp(200 * GF.S, 140, 260), bh = GF.clamp(48 * GF.S, 38, 58);
  var bx = (GF.W - bw) / 2, by = GF.H * 0.74;
  return x >= bx && x <= bx + bw && y >= by && y <= by + bh;
}

function onPress(x, y) {
  if (tutorialOpen) {
    if (hitTutorialClose(x, y)) {
      tutorialOpen = false;
      try { localStorage.setItem('updrift_seen_tutorial', '1'); } catch (e) {}
    }
    return;
  }
  if (gs === 'MENU') {
    // M2: COLLECT the daily air supply (load it onto the next dive) — checked
    // before PLAY so the tap lands on the button drawn above it.
    if (inRect(x, y, layout.dailyBtn)) { collectDaily(); return; }
    if (layout.menuPlayBtn && inRect(x, y, layout.menuPlayBtn)) { startGame(); return; }
    // fallback for first frame before layout is populated
    var bw = GF.clamp(240 * GF.S, 170, 320), bh = GF.clamp(54 * GF.S, 42, 66);
    var bx = (GF.W - bw) / 2, by = GF.H * 0.80;
    if (x >= bx && x <= bx + bw && y >= by && y <= by + bh) startGame();
    return;
  }
  if (gs === 'WON') {
    var bw2 = GF.clamp(240 * GF.S, 170, 320), bh2 = GF.clamp(52 * GF.S, 40, 64);
    var bx2 = (GF.W - bw2) / 2, by2 = GF.H * 0.72;
    if (x >= bx2 && x <= bx2 + bw2 && y >= by2 && y <= by2 + bh2) {
      nextLevel();   // ENDLESS: CONTINUE always dives deeper (incl. past Lvl 5)
    }
    return;
  }
  if (gs === 'GAMEOVER') {
    var bw3 = GF.clamp(240 * GF.S, 170, 320), bh3 = GF.clamp(52 * GF.S, 40, 64);
    var bx3 = (GF.W - bw3) / 2, by3 = GF.H * 0.72;
    if (x >= bx3 && x <= bx3 + bw3 && y >= by3 && y <= by3 + bh3) startGame();
    return;
  }
  // PLAYING
  if (inRect(x, y, layout.helpBtn)) { tutorialOpen = true; return; }
  if (inRect(x, y, layout.muteBtn)) { audioInit(); setMuted(!audioMuted); return; }
  // CLARITY: direct mode selection — tap the chip you want (no blind cycle).
  for (var ci = 0; ci < layout.modeChips.length; ci++) {
    if (inRect(x, y, layout.modeChips[ci])) { selectMode(layout.modeChips[ci].mode); return; }
  }
  var lx = x - layout.gx, ly = y - layout.gy;
  if (lx >= 0 && lx <= layout.gw && ly >= 0 && ly <= layout.gh) {
    var tc = Math.floor(lx / layout.cell);
    if (tc !== diverCol) {
      moveDiver(tc > diverCol ? 1 : -1);
    } else {
      act();
    }
    return;
  }
  act();
}

var keyLatch = {};
function handleKeys() {
  if (gs !== 'PLAYING') return;
  if ((GF.keys['ArrowLeft'] || GF.keys['KeyA']) && !keyLatch.left) { moveDiver(-1); keyLatch.left = true; }
  if (!(GF.keys['ArrowLeft'] || GF.keys['KeyA'])) keyLatch.left = false;
  if ((GF.keys['ArrowRight'] || GF.keys['KeyD']) && !keyLatch.right) { moveDiver(1); keyLatch.right = true; }
  if (!(GF.keys['ArrowRight'] || GF.keys['KeyD'])) keyLatch.right = false;
  if ((GF.keys['ArrowUp'] || GF.keys['KeyW'] || GF.keys['Space']) && !keyLatch.up) { act(); keyLatch.up = true; }
  if (!(GF.keys['ArrowUp'] || GF.keys['KeyW'] || GF.keys['Space'])) keyLatch.up = false;
  if (GF.keys['KeyB'] && !keyLatch.b) { cycleMode(); keyLatch.b = true; }
  if (!GF.keys['KeyB']) keyLatch.b = false;
  // CLARITY: number keys pick a mode directly (1=dig, 2=brace, 3=blast).
  if ((GF.keys['Digit1'] || GF.keys['Numpad1']) && !keyLatch.k1) { selectMode('dig'); keyLatch.k1 = true; }
  if (!(GF.keys['Digit1'] || GF.keys['Numpad1'])) keyLatch.k1 = false;
  if ((GF.keys['Digit2'] || GF.keys['Numpad2']) && !keyLatch.k2) { selectMode('brace'); keyLatch.k2 = true; }
  if (!(GF.keys['Digit2'] || GF.keys['Numpad2'])) keyLatch.k2 = false;
  if ((GF.keys['Digit3'] || GF.keys['Numpad3']) && !keyLatch.k3) { selectMode('blast'); keyLatch.k3 = true; }
  if (!(GF.keys['Digit3'] || GF.keys['Numpad3'])) keyLatch.k3 = false;
  if (GF.keys['KeyM'] && !keyLatch.m) { audioInit(); setMuted(!audioMuted); keyLatch.m = true; }
  if (!GF.keys['KeyM']) keyLatch.m = false;
}

// ── UPDATE ───────────────────────────────────────────────────────────────
// Space/Enter starts or advances from non-playing screens (keyboard parity with
// the tap affordances). Latched so a held key fires once per press.
function handleMenuKeys() {
  var pressed = GF.keys['Space'] || GF.keys['Enter'] || GF.keys['NumpadEnter'];
  if (pressed && !keyLatch.start) {
    keyLatch.start = true;
    if (tutorialOpen) {
      tutorialOpen = false;
      try { localStorage.setItem('updrift_seen_tutorial', '1'); } catch (e) {}
    } else if (gs === 'MENU') {
      if (dailyAvailable) collectDaily();   // auto-load the waiting daily supply
      startGame();
    } else if (gs === 'WON') {
      nextLevel();   // ENDLESS: CONTINUE always dives deeper (incl. past Lvl 5)
    } else if (gs === 'GAMEOVER') {
      startGame();
    }
  }
  if (!pressed) keyLatch.start = false;
}

var dailyRefreshAccum = 0;
function update(dt) {
  recomputeLayout();
  if (hitFlashT > 0) hitFlashT = Math.max(0, hitFlashT - dt);
  // M2: while sitting on the MENU, keep the overnight cache filling and re-roll
  // the daily if the player crosses midnight with the tab open (throttled ~5s).
  if (gs === 'MENU') {
    dailyRefreshAccum += dt;
    if (dailyRefreshAccum >= 5) { dailyRefreshAccum = 0; refreshDaily(); }
  }
  if (gs !== 'PLAYING') { handleMenuKeys(); return; }
  handleKeys();
  scheduleMusic();   // soft procedural bed, only while diving
  // Close the onboarding once the final caption has been shown for its beat.
  if (onbActive && onbStep >= 5) {
    onbDoneT -= dt;
    if (onbDoneT <= 0) onbActive = false;
  }
  fallTimer += dt * 1000;
  if (fallTimer >= FALL_TICK_MS) {
    fallTimer -= FALL_TICK_MS;
    gravityTick();
  }
  updateBraceDanger();   // recompute the just-in-time BRACE danger cue each frame
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function drawBackground(c) {
  var g = c.createLinearGradient(0, 0, 0, GF.H);
  g.addColorStop(0, '#2fd8d2');
  g.addColorStop(0.18, '#0f7f9a');
  g.addColorStop(0.5, '#0a3a5c');
  g.addColorStop(1, '#04060f');
  c.fillStyle = g;
  c.fillRect(0, 0, GF.W, GF.H);
}

function rockFill(hp) {
  if (hp >= 3) return '#352a20';
  if (hp === 2) return '#4d3c2c';
  return '#6a5238';
}
function rockEdge(hp) {
  if (hp >= 3) return '#241c14';
  if (hp === 2) return '#352818';
  return '#4a3824';
}

function drawGrid(c) {
  var cell = layout.cell;
  c.save();
  var sg = c.createLinearGradient(0, layout.gy, 0, layout.gy + cell);
  sg.addColorStop(0, 'rgba(120,255,235,0.55)');
  sg.addColorStop(1, 'rgba(120,255,235,0.0)');
  c.fillStyle = sg;
  c.fillRect(layout.gx, layout.gy, layout.gw, cell);
  c.restore();

  for (var r = 0; r < GRID_H; r++) {
    for (var col = 0; col < GRID_W; col++) {
      var cellObj = grid[r * GRID_W + col];
      if (!cellObj) continue;
      var x = layout.gx + col * cell;
      var y = layout.gy + r * cell;
      var pad = Math.max(1, cell * 0.04);
      if (cellObj.o2 && cellObj.hp > 0) {
        GF.drawSprite('bubble', x + cell / 2, y + cell / 2, cell * 0.96, (function (co) {
          return function (cc, px, py, s) {
            cc.fillStyle = rockFill(co.hp);
            cc.fillRect(px - s / 2 + pad, py - s / 2 + pad, s - pad * 2, s - pad * 2);
            cc.fillStyle = '#1bd0e6';
            cc.globalAlpha = 0.55;
            cc.beginPath(); cc.arc(px, py, s * 0.20, 0, Math.PI * 2); cc.fill();
            cc.globalAlpha = 1;
          };
        })(cellObj));
      } else {
        GF.drawSprite('rock', x + cell / 2, y + cell / 2, cell * 0.99, (function (co) {
          return function (cc, px, py, s) {
            cc.fillStyle = rockFill(co.hp);
            cc.fillRect(px - s / 2 + pad, py - s / 2 + pad, s - pad * 2, s - pad * 2);
            cc.strokeStyle = rockEdge(co.hp);
            cc.lineWidth = Math.max(1, s * 0.05);
            cc.strokeRect(px - s / 2 + pad, py - s / 2 + pad, s - pad * 2, s - pad * 2);
            if (co.hp >= 2) {
              cc.strokeStyle = 'rgba(0,0,0,0.35)';
              cc.lineWidth = Math.max(1, s * 0.03);
              cc.beginPath();
              cc.moveTo(px - s * 0.2, py - s * 0.25);
              cc.lineTo(px + s * 0.05, py + s * 0.05);
              cc.lineTo(px - s * 0.1, py + s * 0.28);
              cc.stroke();
            }
          };
        })(cellObj));
      }
    }
  }

  for (var bc = 0; bc < GRID_W; bc++) {
    if (!braced[bc]) continue;
    var bx = layout.gx + bc * cell;
    c.strokeStyle = 'rgba(255,210,74,0.7)';
    c.lineWidth = Math.max(2, cell * 0.08);
    c.beginPath();
    c.moveTo(bx + cell * 0.5, layout.gy);
    c.lineTo(bx + cell * 0.5, layout.gy + diverRow * cell);
    c.stroke();
  }
}

function drawChunks(c) {
  var cell = layout.cell;
  for (var i = 0; i < chunks.length; i++) {
    var ch = chunks[i];
    var x = layout.gx + ch.col * cell;
    var y = layout.gy + ch.row * cell;
    GF.drawSprite('chunk', x + cell / 2, y + cell / 2, cell * 0.86, function (cc, px, py, s) {
      cc.fillStyle = '#8a5a3a';
      cc.beginPath();
      cc.moveTo(px - s * 0.4, py - s * 0.25);
      cc.lineTo(px + s * 0.32, py - s * 0.4);
      cc.lineTo(px + s * 0.42, py + s * 0.28);
      cc.lineTo(px - s * 0.18, py + s * 0.42);
      cc.closePath();
      cc.fill();
      cc.strokeStyle = '#5a3a22'; cc.lineWidth = Math.max(1, s * 0.06); cc.stroke();
    });
    if (ch.col === diverCol && ch.row < diverRow) {
      c.strokeStyle = 'rgba(255,77,94,' + (0.35 + 0.3 * Math.sin(performance.now() / 120)) + ')';
      c.lineWidth = Math.max(2, cell * 0.07);
      c.strokeRect(x + 2, y + 2, cell - 4, cell - 4);
    }
  }
}

// CLARITY: a translucent "ghost" over the exact cell(s) the CURRENT tap will
// hit — 1 cell for DIG/BRACE, the 3 cells above for BLAST — so the player can
// SEE what their next tap does before committing. Colour-matched to the mode.
function drawActionGhost(c) {
  var cell = layout.cell;
  var col = diverCol;
  var pulse = 0.5 + 0.5 * Math.sin(performance.now() / 260);
  var n = (mode === 'blast') ? 3 : 1;
  var color = mode === 'dig' ? '120,230,255' : (mode === 'brace' ? '255,210,74' : '255,122,58');
  for (var k = 1; k <= n; k++) {
    var tr = diverRow - k;
    if (tr < SURFACE_ROW) break;
    var gx = layout.gx + col * cell, gy = layout.gy + tr * cell;
    c.save();
    c.fillStyle = 'rgba(' + color + ',' + (0.10 + 0.10 * pulse) + ')';
    GF.rr(c, gx + cell * 0.06, gy + cell * 0.06, cell * 0.88, cell * 0.88, Math.max(2, cell * 0.12));
    c.fill();
    c.strokeStyle = 'rgba(' + color + ',' + (0.55 + 0.35 * pulse) + ')';
    c.lineWidth = Math.max(2, cell * 0.07);
    c.setLineDash([cell * 0.18, cell * 0.12]);
    c.stroke();
    c.restore();
  }
  // Mode glyph just above the diver so the active action is legible ON the board:
  // a pick (dig), a beam/brace bar (brace), or a burst (blast).
  var mgx = layout.gx + (col + 0.5) * cell;
  var mgy = layout.gy + (diverRow - 0.5) * cell;
  c.save();
  c.globalAlpha = 0.9;
  if (mode === 'dig') {
    c.strokeStyle = 'rgba(160,240,255,0.95)'; c.lineWidth = Math.max(2, cell * 0.09);
    c.beginPath(); c.moveTo(mgx, mgy + cell * 0.12); c.lineTo(mgx, mgy - cell * 0.18); c.stroke();
    c.beginPath(); c.moveTo(mgx - cell * 0.12, mgy - cell * 0.10); c.lineTo(mgx, mgy - cell * 0.20); c.lineTo(mgx + cell * 0.12, mgy - cell * 0.10); c.stroke();
  } else if (mode === 'brace') {
    c.strokeStyle = 'rgba(255,210,74,0.95)'; c.lineWidth = Math.max(2, cell * 0.10);
    c.beginPath(); c.moveTo(mgx - cell * 0.18, mgy - cell * 0.14); c.lineTo(mgx + cell * 0.18, mgy - cell * 0.14); c.stroke();
    c.beginPath(); c.moveTo(mgx, mgy - cell * 0.14); c.lineTo(mgx, mgy + cell * 0.10); c.stroke();
  } else {
    c.strokeStyle = 'rgba(255,140,80,0.95)'; c.lineWidth = Math.max(2, cell * 0.08);
    for (var a = 0; a < 6; a++) {
      var ang = a * Math.PI / 3;
      c.beginPath();
      c.moveTo(mgx + Math.cos(ang) * cell * 0.06, mgy + Math.sin(ang) * cell * 0.06);
      c.lineTo(mgx + Math.cos(ang) * cell * 0.20, mgy + Math.sin(ang) * cell * 0.20);
      c.stroke();
    }
  }
  c.restore();
}

// CLARITY: a non-blocking coach caption near the diver. On the very first run it
// tells the player the core gesture ("TAP ABOVE TO DIG UP"); it disappears the
// instant they take their first action, so it never nags an experienced player.
function drawCoach(c) {
  var msg = null;
  if (!firstActionDone) msg = GF.t('coach_dig');
  if (!msg) return;
  var cell = layout.cell;
  var cx = layout.gx + (diverCol + 0.5) * cell;
  // anchor the pill above the diver, clamped on-screen
  var py = layout.gy + (diverRow - 1.6) * cell;
  if (py < layout.gy + cell * 0.4) py = layout.gy + (diverRow + 1.4) * cell;
  c.save();
  c.font = 'bold ' + GF.clamp(14 * GF.S, 11, 19) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  var tw = c.measureText(msg).width;
  var padX = GF.clamp(14 * GF.S, 10, 20), bh = GF.clamp(30 * GF.S, 24, 40);
  var bw = tw + padX * 2;
  var bx = GF.clamp(cx - bw / 2, 6, GF.W - bw - 6);
  var a = 0.7 + 0.3 * Math.sin(performance.now() / 360);
  GF.rr(c, bx, py - bh / 2, bw, bh, bh / 2);
  c.fillStyle = 'rgba(8,28,40,0.92)'; c.fill();
  c.strokeStyle = 'rgba(122,245,255,' + a + ')'; c.lineWidth = 2; c.stroke();
  c.fillStyle = '#dffaff';
  c.fillText(msg, bx + bw / 2, py);
  // little arrow pointing up toward the rock the player should tap
  c.fillStyle = 'rgba(122,245,255,' + a + ')';
  c.beginPath();
  c.moveTo(cx, py - bh / 2 - GF.clamp(8 * GF.S, 6, 12));
  c.lineTo(cx - GF.clamp(7 * GF.S, 5, 10), py - bh / 2 + 1);
  c.lineTo(cx + GF.clamp(7 * GF.S, 5, 10), py - bh / 2 + 1);
  c.closePath(); c.fill();
  c.restore();
}

// Reactive "BRACE!" flag pinned over the diver when a chunk is about to crush him
// (and he isn't already bracing). Pairs with the flashing BRACE chip so the player
// always knows the moment to switch — the direct fix for "uncomfortable to switch
// between dig/blast". Suppressed during onboarding to avoid double-prompting.
function drawBraceWarn(c) {
  var cell = layout.cell;
  var cx = layout.gx + (diverCol + 0.5) * cell;
  var py = layout.gy + (diverRow - 1.15) * cell;
  if (py < layout.gy + cell * 0.4) py = layout.gy + (diverRow + 1.2) * cell;
  var pulse = 0.5 + 0.5 * Math.sin(performance.now() / 110);
  c.save();
  c.font = 'bold ' + GF.clamp(15 * GF.S, 12, 20) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  var msg = GF.t('brace_warn');
  var tw = c.measureText(msg).width;
  var padX = GF.clamp(12 * GF.S, 8, 18), bh = GF.clamp(28 * GF.S, 22, 38);
  var bw = tw + padX * 2;
  var bx = GF.clamp(cx - bw / 2, 6, GF.W - bw - 6);
  GF.rr(c, bx, py - bh / 2, bw, bh, bh / 2);
  c.fillStyle = 'rgba(70,20,12,0.92)'; c.fill();
  c.strokeStyle = 'rgba(255,210,80,' + (0.6 + 0.4 * pulse) + ')'; c.lineWidth = 2.5; c.stroke();
  c.fillStyle = '#ffd24a';
  c.fillText(msg, bx + bw / 2, py);
  c.restore();
}

// An animated vector demo HAND that loops a "tap" press at (x,y): the hand drifts
// in, presses (a small downward dip + a ripple ring), lifts, repeats. This is the
// "show the gesture" affordance the build guide calls the good UX — far clearer
// than a text instruction for a touch action. `pointUp` flips it to point upward
// (used when the target is a board cell above the diver) vs downward (for a chip).
function drawDemoHand(c, x, y, pointUp) {
  var t = (performance.now() / 1000) % 1.4;     // 1.4s loop
  var press = t < 0.45 ? (t / 0.45) : (t < 0.7 ? 1 - (t - 0.45) / 0.25 : 0);
  var s = GF.clamp(26 * GF.S, 20, 38);
  var dip = press * s * 0.5;
  var dir = pointUp ? -1 : 1;                    // finger points toward the target
  // ripple ring at the contact point when pressing
  if (press > 0.05) {
    c.save();
    c.strokeStyle = 'rgba(255,255,255,' + (0.5 * press) + ')';
    c.lineWidth = Math.max(2, s * 0.10);
    c.beginPath(); c.arc(x, y, s * (0.3 + (1 - press) * 0.7), 0, Math.PI * 2); c.stroke();
    c.restore();
  }
  // hand sits "below" (for up-pointing) or "above" (for down-pointing) the target,
  // offset by the press dip so it visibly taps in.
  var hx = x + s * 0.55;
  var hy = y + dir * (s * 1.15) + dir * -dip;    // dip moves it toward the target
  c.save();
  c.translate(hx, hy);
  if (pointUp) c.scale(1, -1);                   // mirror so the fingertip aims up
  // fist
  c.fillStyle = '#ffe0c0';
  c.strokeStyle = 'rgba(0,0,0,0.35)';
  c.lineWidth = Math.max(1.5, s * 0.06);
  GF.rr(c, -s * 0.42, s * 0.05, s * 0.84, s * 0.7, s * 0.22); c.fill(); c.stroke();
  // pointing finger (up in local space → toward the target after the mirror)
  GF.rr(c, -s * 0.16, -s * 0.6, s * 0.32, s * 0.72, s * 0.16); c.fill(); c.stroke();
  // cuff
  c.fillStyle = '#1f6f8c';
  GF.rr(c, -s * 0.46, s * 0.66, s * 0.92, s * 0.28, s * 0.1); c.fill();
  c.restore();
}

// Hands-on onboarding overlay: a target ring + animated hand at the cell/chip the
// current step wants, plus a slim caption pill anchored near the action and a
// light scrim so the board stays visible. Action-gated — it never blocks the real
// input (the dig/brace handlers fire through); it only POINTS.
function drawOnboarding(c) {
  if (!onbActive) return;
  var cell = layout.cell, W = GF.W, H = GF.H;
  // light scrim so the highlighted target pops without hiding the board
  c.save();
  c.fillStyle = 'rgba(4,10,18,0.26)';
  c.fillRect(0, 0, W, H);
  c.restore();

  var msg, tx, ty, pointUp = true, ring = true, capY;
  if (onbStep === 0 || onbStep === 1) {
    // point at the rock directly above the diver
    msg = GF.t(onbStep === 0 ? 'onb_dig' : 'onb_rise');
    tx = layout.gx + (diverCol + 0.5) * cell;
    ty = layout.gy + (diverRow - 0.5) * cell;
    pointUp = true;
  } else if (onbStep === 2) {
    // point at the BRACE chip in the bottom bar
    msg = GF.t('onb_brace_chip');
    var bch = null;
    for (var i = 0; i < layout.modeChips.length; i++) if (layout.modeChips[i].mode === 'brace') bch = layout.modeChips[i];
    if (bch) { tx = bch.x + bch.w / 2; ty = bch.y + bch.h / 2; }
    else { tx = W / 2; ty = H - 60; }
    pointUp = false;
  } else if (onbStep === 3) {
    // brace mode selected → now tap the ceiling above to actually brace
    msg = GF.t('onb_brace_do');
    tx = layout.gx + (diverCol + 0.5) * cell;
    ty = layout.gy + (diverRow - 0.5) * cell;
    pointUp = true;
  } else if (onbStep === 4) {
    msg = GF.t('onb_surface');
    tx = layout.gx + (diverCol + 0.5) * cell;
    ty = layout.gy + cell * 0.5;     // point up toward the surface band
    pointUp = true;
    ring = false;                    // no single-cell ring; it's a "go up" prompt
  } else {
    msg = GF.t('onb_done');
    tx = W / 2; ty = H * 0.5; ring = false;
  }

  // pulsing target ring at the cell/chip
  if (ring && tx != null) {
    var pulse = 0.5 + 0.5 * Math.sin(performance.now() / 240);
    c.save();
    c.strokeStyle = 'rgba(255,235,120,' + (0.6 + 0.35 * pulse) + ')';
    c.lineWidth = Math.max(2.5, cell * 0.07);
    GF.rr(c, tx - cell * 0.5, ty - cell * 0.5, cell, cell, Math.max(3, cell * 0.14));
    c.stroke();
    c.restore();
    drawDemoHand(c, tx, ty, pointUp);
  } else if (onbStep === 4) {
    drawDemoHand(c, tx, ty, true);
  }

  // slim caption pill, anchored above the action (clamped on-screen)
  c.save();
  c.font = 'bold ' + GF.clamp(15 * GF.S, 12, 20) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  var lines = wrapLines(c, msg, Math.min(W * 0.82, 420 * GF.S));
  var lh = GF.clamp(20 * GF.S, 16, 26);
  var padX = GF.clamp(16 * GF.S, 11, 22), padY = GF.clamp(10 * GF.S, 7, 14);
  var tw = 0;
  for (var li = 0; li < lines.length; li++) tw = Math.max(tw, c.measureText(lines[li]).width);
  var bw = tw + padX * 2, bh = lines.length * lh + padY * 2;
  // place the pill above the target for up-prompts, below for the chip prompt
  var pillY = (onbStep === 2) ? (ty - bh - cell * 0.7) : (ty - bh - cell * 0.9);
  if (pillY < 8) pillY = ty + cell * 0.7;
  pillY = GF.clamp(pillY, 8, H - bh - 8);
  var bx = GF.clamp(tx - bw / 2, 8, W - bw - 8);
  GF.rr(c, bx, pillY, bw, bh, GF.clamp(12 * GF.S, 8, 16));
  c.fillStyle = 'rgba(8,26,38,0.94)'; c.fill();
  c.strokeStyle = 'rgba(255,235,120,0.9)'; c.lineWidth = 2; c.stroke();
  c.fillStyle = '#fff7e0';
  for (var lj = 0; lj < lines.length; lj++) c.fillText(lines[lj], bx + bw / 2, pillY + padY + lh / 2 + lj * lh);
  c.restore();
}

function drawDiver(c) {
  var cell = layout.cell;
  var x = layout.gx + diverCol * cell;
  var y = layout.gy + diverRow * cell;
  var px = x + cell / 2, py = y + cell / 2;
  c.fillStyle = 'rgba(80,200,255,0.10)';
  c.fillRect(x, y, cell, cell);
  var flash = hitFlashT > 0;
  GF.drawSprite('diver', px, py, cell * 0.98, function (cc, dx, dy, s) {
    cc.fillStyle = flash ? '#ff6e7a' : '#ffce4a';
    cc.beginPath(); cc.arc(dx, dy + s * 0.06, s * 0.34, 0, Math.PI * 2); cc.fill();
    cc.fillStyle = '#0a3a5c';
    cc.beginPath(); cc.arc(dx, dy + s * 0.04, s * 0.18, 0, Math.PI * 2); cc.fill();
    cc.fillStyle = '#9ff';
    cc.beginPath(); cc.arc(dx - s * 0.06, dy - s * 0.02, s * 0.06, 0, Math.PI * 2); cc.fill();
    cc.strokeStyle = '#d8d8e0'; cc.lineWidth = Math.max(2, s * 0.07);
    cc.beginPath(); cc.moveTo(dx + s * 0.18, dy + s * 0.1); cc.lineTo(dx + s * 0.30, dy - s * 0.34); cc.stroke();
    cc.beginPath(); cc.moveTo(dx + s * 0.20, dy - s * 0.34); cc.lineTo(dx + s * 0.40, dy - s * 0.28); cc.stroke();
  });
  if (lastAct && performance.now() - lastAct.t < 220) {
    var a = 1 - (performance.now() - lastAct.t) / 220;
    var lx = layout.gx + (lastAct.c + 0.5) * cell;
    var ly = layout.gy + (lastAct.r + 0.5) * cell;
    c.globalAlpha = a * 0.8;
    c.strokeStyle = lastAct.kind === 'brace' ? '#ffd24a' : (lastAct.kind === 'blast' ? '#ff7a3a' : '#fff');
    c.lineWidth = Math.max(2, cell * 0.1);
    c.strokeRect(lx - cell * 0.45, ly - cell * 0.45, cell * 0.9, cell * 0.9);
    c.globalAlpha = 1;
  }
}

function drawHUD(c) {
  var W = GF.W;
  var pad = GF.clamp(14 * GF.S, 8, 22);
  var fs = GF.clamp(13 * GF.S, 11, 18);
  var barW = GF.clamp(150 * GF.S, 100, 220), barH = GF.clamp(16 * GF.S, 12, 22);
  var bx = pad, by = pad + fs + 4;
  c.fillStyle = '#cfe8f0';
  c.font = 'bold ' + fs + 'px sans-serif';
  c.textAlign = 'left'; c.textBaseline = 'top';
  c.fillText(GF.t('o2') + '  ' + Math.max(0, Math.ceil(oxygen)) + '/' + START_OXY, bx, pad);
  GF.rr(c, bx, by, barW, barH, barH / 2);
  c.fillStyle = 'rgba(0,0,0,0.4)'; c.fill();
  var frac = Math.max(0, oxygen / START_OXY);
  if (frac > 0) {
    GF.rr(c, bx, by, barW * frac, barH, barH / 2);
    var og = c.createLinearGradient(bx, 0, bx + barW, 0);
    if (frac > 0.4) { og.addColorStop(0, '#19c6ff'); og.addColorStop(1, '#7af5ff'); }
    else { og.addColorStop(0, '#ff5e4d'); og.addColorStop(1, '#ffa24a'); }
    c.fillStyle = og; c.fill();
  }
  c.strokeStyle = 'rgba(255,255,255,0.25)'; c.lineWidth = 1.5;
  GF.rr(c, bx, by, barW, barH, barH / 2); c.stroke();

  var hb = layout.helpBtn;
  c.textAlign = 'right'; c.textBaseline = 'top';
  c.fillStyle = '#ffd0d6';
  c.font = 'bold ' + fs + 'px sans-serif';
  var hearts = '';
  for (var i = 0; i < MAX_CRUSH_LIVES; i++) hearts += (i < crushLives ? '♥' : '♡');
  // Anchor hearts/LVL to the LEFT of the leftmost top-right button (mute), so
  // they never render under the mute or help icons (the mute btn was added this
  // pass to the left of help).
  var rightX = (layout.muteBtn ? layout.muteBtn.x - 8 : (hb ? hb.x - 8 : W - pad));
  c.fillText(hearts, rightX, pad);
  c.fillStyle = '#bcd';
  c.font = fs + 'px sans-serif';
  // In the 5-level campaign show "LVL n/5"; once endless, show metres-down so the
  // counter keeps climbing meaningfully instead of reading a broken "LVL 7/5".
  if (isEndless()) {
    c.fillStyle = '#ffe06a';
    c.fillText(GF.t('depth_m') + ' ' + depthMetres() + 'm', rightX, pad + fs + 6);
  } else {
    c.fillText(GF.t('lvl') + ' ' + level + '/' + MAX_LEVEL, rightX, pad + fs + 6);
  }

  // Top-center: a persistent OBJECTIVE banner (always on screen) + the rows-to-
  // surface count under it. The banner answers "what am I doing here" at a glance
  // — the loudest player complaint was "very unclear how to play".
  c.textAlign = 'center'; c.textBaseline = 'top';
  c.fillStyle = '#bfe8f0';
  c.font = 'bold ' + GF.clamp(11 * GF.S, 9, 14) + 'px sans-serif';
  c.fillText(GF.t('objective'), W / 2, pad);
  c.fillStyle = '#eaffff';
  c.font = 'bold ' + GF.clamp(15 * GF.S, 12, 20) + 'px sans-serif';
  var rows = Math.max(0, diverRow - SURFACE_ROW);
  c.fillText(GF.t('surface') + ': ' + rows, W / 2, pad + GF.clamp(15 * GF.S, 12, 19));

  // Mute toggle (vector speaker, never emoji — tofu on headless/Android).
  var mb = layout.muteBtn;
  if (mb) {
    GF.rr(c, mb.x, mb.y, mb.s, mb.s, mb.s / 2);
    c.fillStyle = 'rgba(10,40,60,0.7)'; c.fill();
    c.strokeStyle = '#7af5ff'; c.lineWidth = 2; c.stroke();
    drawSpeaker(c, mb.x + mb.s / 2, mb.y + mb.s / 2, mb.s * 0.42, audioMuted);
  }

  if (hb) {
    GF.rr(c, hb.x, hb.y, hb.s, hb.s, hb.s / 2);
    c.fillStyle = 'rgba(10,40,60,0.7)'; c.fill();
    c.strokeStyle = '#7af5ff'; c.lineWidth = 2; c.stroke();
    c.fillStyle = '#7af5ff';
    c.font = 'bold ' + GF.clamp(18 * GF.S, 14, 24) + 'px sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText('?', hb.x + hb.s / 2, hb.y + hb.s / 2);
  }

  // CLARITY: three directly-selectable mode chips. The ACTIVE mode is fully lit
  // (mode colour + bright border + a small ▲ marker); the others are dimmed.
  // Each chip shows its name, O2 cost, and a one-line "what it does" subtitle so
  // the player never has to guess what DIG/BRACE/BLAST mean or which is active.
  var chips = layout.modeChips;
  c.textAlign = 'center'; c.textBaseline = 'middle';
  for (var i2 = 0; i2 < chips.length; i2++) {
    var ch = chips[i2];
    var m = ch.mode;
    var on = (mode === m);
    // Just-in-time danger: when a chunk is about to crush the diver and he is NOT
    // already bracing, make the BRACE chip flash urgently so the reactive switch is
    // obvious (kills "uncomfortable / unclear when to switch dig↔brace").
    var danger = (m === 'brace' && braceDanger && mode !== 'brace');
    var pal = m === 'dig' ? ['#2c83b0', '#164a66'] : (m === 'brace' ? ['#c79a28', '#7a5e12'] : ['#c0502a', '#7a2e14']);
    GF.rr(c, ch.x, ch.y, ch.w, ch.h, GF.clamp(12 * GF.S, 8, 16));
    if (on) {
      var cg = c.createLinearGradient(ch.x, ch.y, ch.x, ch.y + ch.h);
      cg.addColorStop(0, pal[0]); cg.addColorStop(1, pal[1]);
      c.fillStyle = cg; c.fill();
      c.strokeStyle = '#ffffff'; c.lineWidth = Math.max(2.5, ch.w * 0.018); c.stroke();
    } else if (danger) {
      var dp = 0.5 + 0.5 * Math.sin(performance.now() / 130);
      var dg = c.createLinearGradient(ch.x, ch.y, ch.x, ch.y + ch.h);
      dg.addColorStop(0, '#e0a82e'); dg.addColorStop(1, '#9a6e10');
      c.fillStyle = dg; c.fill();
      c.strokeStyle = 'rgba(255,230,120,' + (0.6 + 0.4 * dp) + ')';
      c.lineWidth = Math.max(2.5, 2 + 2.5 * dp); c.stroke();
    } else {
      c.fillStyle = 'rgba(14,34,46,0.82)'; c.fill();
      c.strokeStyle = 'rgba(120,200,220,0.35)'; c.lineWidth = 1.5; c.stroke();
    }
    var label = m === 'dig' ? GF.t('mode_dig') : (m === 'brace' ? GF.t('mode_brace') : GF.t('mode_blast'));
    var cost = m === 'dig' ? OXY_DIG : (m === 'brace' ? OXY_BRACE : OXY_BLAST);
    var hint = m === 'dig' ? GF.t('mode_hint_dig') : (m === 'brace' ? GF.t('mode_hint_brace') : GF.t('mode_hint_blast'));
    var cxm = ch.x + ch.w / 2;
    // active-marker triangle
    if (on) {
      c.fillStyle = '#ffffff';
      var ty = ch.y + GF.clamp(7 * GF.S, 5, 10);
      c.beginPath();
      c.moveTo(cxm, ty); c.lineTo(cxm - GF.clamp(6 * GF.S, 4, 9), ty + GF.clamp(8 * GF.S, 6, 11)); c.lineTo(cxm + GF.clamp(6 * GF.S, 4, 9), ty + GF.clamp(8 * GF.S, 6, 11));
      c.closePath(); c.fill();
    }
    c.fillStyle = on ? '#ffffff' : 'rgba(210,235,242,0.7)';
    c.font = 'bold ' + GF.clamp(16 * GF.S, 12, 21) + 'px sans-serif';
    c.fillText(label, cxm, ch.y + ch.h * 0.34);
    c.fillStyle = on ? 'rgba(255,255,255,0.9)' : 'rgba(180,215,225,0.6)';
    c.font = 'bold ' + GF.clamp(11 * GF.S, 9, 14) + 'px sans-serif';
    c.fillText('-' + cost + ' ' + GF.t('o2'), cxm, ch.y + ch.h * 0.58);
    c.fillStyle = on ? 'rgba(255,255,255,0.72)' : 'rgba(160,195,205,0.5)';
    c.font = GF.clamp(9.5 * GF.S, 8, 12) + 'px sans-serif';
    var hl = wrapLines(c, hint, ch.w * 0.94);
    c.fillText(hl[0], cxm, ch.y + ch.h * 0.80);
  }
}

// Vector speaker icon for the mute toggle (filled = on, with an X when muted).
function drawSpeaker(c, x, y, s, muted) {
  c.save();
  c.fillStyle = muted ? 'rgba(122,245,255,0.45)' : '#7af5ff';
  c.beginPath();
  c.moveTo(x - s * 0.7, y - s * 0.3);
  c.lineTo(x - s * 0.25, y - s * 0.3);
  c.lineTo(x + s * 0.15, y - s * 0.7);
  c.lineTo(x + s * 0.15, y + s * 0.7);
  c.lineTo(x - s * 0.25, y + s * 0.3);
  c.lineTo(x - s * 0.7, y + s * 0.3);
  c.closePath(); c.fill();
  c.strokeStyle = muted ? 'rgba(122,245,255,0.45)' : '#7af5ff';
  c.lineWidth = Math.max(1.5, s * 0.16);
  c.lineCap = 'round';
  if (muted) {
    c.beginPath(); c.moveTo(x + s * 0.35, y - s * 0.4); c.lineTo(x + s * 0.85, y + s * 0.4); c.stroke();
    c.beginPath(); c.moveTo(x + s * 0.85, y - s * 0.4); c.lineTo(x + s * 0.35, y + s * 0.4); c.stroke();
  } else {
    c.beginPath(); c.arc(x + s * 0.3, y, s * 0.45, -Math.PI / 3, Math.PI / 3); c.stroke();
    c.beginPath(); c.arc(x + s * 0.3, y, s * 0.78, -Math.PI / 3.2, Math.PI / 3.2); c.stroke();
  }
  c.restore();
}

function wrapLines(c, text, maxW) {
  var words = String(text).split(' ');
  var lines = [], line = '';
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (c.measureText(test).width > maxW && line) { lines.push(line); line = words[i]; }
    else line = test;
  }
  if (line) lines.push(line);
  return lines;
}

function drawButton(c, x, y, w, h, label, primary) {
  GF.rr(c, x, y, w, h, h / 2);
  if (primary) {
    var g = c.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, '#19c6ff'); g.addColorStop(1, '#0f8fc0');
    c.fillStyle = g;
  } else { c.fillStyle = '#22323a'; }
  c.fill();
  c.strokeStyle = primary ? '#0f8fc0' : '#3a4a52'; c.lineWidth = 2; c.stroke();
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(18 * GF.S, 14, 22) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(label, x + w / 2, y + h / 2);
}

function drawTutorialBlock(c, cx, startY, maxW) {
  var lh = GF.clamp(19 * GF.S, 14, 24);
  var fs = GF.clamp(13 * GF.S, 11, 17);
  c.font = fs + 'px sans-serif';
  c.fillStyle = '#cfe8f0';
  c.textAlign = 'center'; c.textBaseline = 'top';
  var items = [GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip')];
  var y = startY;
  for (var i = 0; i < items.length; i++) {
    var lines = wrapLines(c, items[i], maxW);
    for (var j = 0; j < lines.length; j++) {
      c.fillText(lines[j], cx, y);
      y += lh;
    }
    y += GF.clamp(6 * GF.S, 3, 9);
  }
  return y;
}

function drawMenu(c) {
  drawBackground(c);
  var W = GF.W, H = GF.H;
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.fillStyle = '#eafcff';
  c.shadowColor = 'rgba(50,216,210,0.6)'; c.shadowBlur = 28 * GF.S;
  c.font = 'bold ' + GF.clamp(46 * GF.S, 30, 66) + 'px sans-serif';
  c.fillText(GF.t('title'), W / 2, H * 0.13);
  c.shadowColor = 'transparent'; c.shadowBlur = 0;
  c.fillStyle = '#bfe8f0';
  c.font = GF.clamp(14 * GF.S, 11, 19) + 'px sans-serif';
  c.textBaseline = 'top';
  var subLines = wrapLines(c, GF.t('sub'), W * 0.86);
  var sy = H * 0.17;
  for (var i = 0; i < subLines.length; i++) { c.fillText(subLines[i], W / 2, sy + i * GF.clamp(18 * GF.S, 14, 22)); }

  var seen = false;
  try { seen = localStorage.getItem('updrift_seen_tutorial') === '1'; } catch (e) {}
  var maxW = Math.min(W * 0.86, 520 * GF.S);
  // First-run MENU is now uncluttered: instead of a 5-paragraph text wall (the
  // "tap-through text tour" the build guide flags as bad), a first-timer sees only
  // the GOAL + a short "learn by doing" line — the real teaching happens in the
  // hands-on, action-gated in-game onboarding the moment they tap PLAY. The full
  // rules still live one tap away under ? (drawTutorialPanel). Returning players
  // get the same compact goal recap they had before.
  c.fillStyle = '#cfe8f0';
  c.font = GF.clamp(13 * GF.S, 11, 17) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'top';
  var tl = wrapLines(c, GF.t('tut_goal'), maxW);
  var ky = H * 0.27;
  for (var k = 0; k < tl.length; k++) { c.fillText(tl[k], W / 2, ky); ky += GF.clamp(18 * GF.S, 14, 22); }
  if (!seen) {
    ky += GF.clamp(8 * GF.S, 4, 12);
    c.fillStyle = '#7af5ff';
    c.font = 'bold ' + GF.clamp(13 * GF.S, 11, 17) + 'px sans-serif';
    var ll = wrapLines(c, GF.t('menu_learn'), maxW);
    for (var li2 = 0; li2 < ll.length; li2++) { c.fillText(ll[li2], W / 2, ky); ky += GF.clamp(18 * GF.S, 14, 22); }
    c.fillStyle = '#8fb6c2';
    c.font = GF.clamp(11.5 * GF.S, 10, 15) + 'px sans-serif';
    c.fillText(GF.t('menu_help_hint'), W / 2, ky);
  }

  // M2 daily panel — shown only to returning players (tutorial already seen) so
  // a first-time player gets the uncluttered learn-to-play MENU (the comment asked
  // for *less* friction), while returners get the come-back-tomorrow hook.
  layout.dailyBtn = null;
  if (seen) drawDailyPanel(c, W / 2, H * 0.40, maxW);

  // Persistent meta: BEST DEPTH + NEXT GOAL — the cross-session pull, anchored
  // just above PLAY so it never collides with the variable-height tutorial block.
  var _metaBottom = drawMetaBlock(c, W / 2, H * 0.665, maxW);

  var isWide = W / H > 1.15;
  var bw = GF.clamp(240 * GF.S, 170, 320), bh = GF.clamp(54 * GF.S, 42, 66);
  if (isWide) { bw = Math.round(bw * 1.4); bh = Math.round(bh * 1.35); }
  var textBlockBottom = _metaBottom || (H * 0.665 + bh);
  var clearMargin = bh / 2 + 16;
  var wideFloor = H * 0.58;
  var byBase = isWide ? Math.max(textBlockBottom + clearMargin, wideFloor) : H * 0.80;
  // store hit rect at stable base size for input
  layout.menuPlayBtn = { x: (W - bw) / 2, y: byBase, w: bw, h: bh };

  if (isWide) {
    var t_pulse = performance.now() / 1000;
    var pulse = 1 + 0.05 * Math.sin(t_pulse * 2.2);
    var pw = bw * pulse, ph = bh * pulse;
    c.shadowColor = 'rgba(50,216,210,0.6)';
    c.shadowBlur = 18 + 10 * Math.abs(Math.sin(t_pulse * 2.2));
    drawButton(c, (W - pw) / 2, byBase + (bh - ph) / 2, pw, ph, GF.t('play'), true);
    c.shadowColor = 'transparent'; c.shadowBlur = 0;
  } else {
    drawButton(c, (W - bw) / 2, byBase, bw, bh, GF.t('play'), true);
  }
}

// M2 — DAILY AIR SUPPLY panel (login reward + streak + overnight cache + quest).
// Draws a compact card: title, streak line, quest line, and either a COLLECT
// button (supply waiting) or a "come back tomorrow" line (already claimed).
function drawDailyPanel(c, cx, y, maxW) {
  c.textAlign = 'center'; c.textBaseline = 'top';
  var fsHead = GF.clamp(14 * GF.S, 11, 18);
  var fsBody = GF.clamp(12 * GF.S, 10, 16);
  var lh = GF.clamp(16 * GF.S, 12, 20);

  // Title
  c.font = 'bold ' + fsHead + 'px sans-serif';
  c.fillStyle = '#7af5ff';
  c.fillText(GF.t('daily_title'), cx, y);
  y += fsHead + GF.clamp(5 * GF.S, 3, 8);

  // Streak line
  c.font = fsBody + 'px sans-serif';
  c.fillStyle = '#bfe8f0';
  c.fillText(subst(GF.t('daily_streak'), { n: Math.max(1, dayStreak) }), cx, y);
  y += lh;

  // Quest line (✓ when done)
  var qStr = subst(questDoneToday ? GF.t('daily_quest_done') : GF.t('daily_quest'), { q: questText() });
  c.fillStyle = questDoneToday ? '#ffe06a' : '#bfe8f0';
  var qLines = wrapLines(c, qStr, maxW);
  for (var i = 0; i < qLines.length; i++) { c.fillText(qLines[i], cx, y); y += lh; }
  y += GF.clamp(4 * GF.S, 2, 7);

  if (dailyAvailable) {
    // Show the total the player is about to collect (supply + cache + quest bank).
    var supply = streakAir(dayStreak);
    var cache = Math.round(overnightCache);
    var total = supply + cache + questBankedAir;
    var bw = GF.clamp(230 * GF.S, 160, 300), bh = GF.clamp(46 * GF.S, 38, 56);
    var bx = cx - bw / 2;
    drawButton(c, bx, y, bw, bh, subst(GF.t('daily_collect'), { air: total }), true);
    layout.dailyBtn = { x: bx, y: y, w: bw, h: bh };
    y += bh + GF.clamp(4 * GF.S, 2, 7);
    if (cache > 0) {
      c.font = fsBody + 'px sans-serif';
      c.fillStyle = '#8fb6c2';
      c.fillText(subst(GF.t('daily_cache'), { air: cache }), cx, y);
      y += lh;
    }
  } else {
    // Already claimed today → point at tomorrow's (bigger) reward to seed return.
    c.font = fsBody + 'px sans-serif';
    c.fillStyle = '#7af5ff';
    c.fillText(GF.t('daily_collected'), cx, y);
    y += lh;
    var nextDay = Math.min(DAILY_MAX_DAYS, dayStreak + 1);
    c.fillStyle = '#8fb6c2';
    var nx = wrapLines(c, subst(GF.t('daily_next'), { n: nextDay, air: streakAir(nextDay) }), maxW);
    for (var j = 0; j < nx.length; j++) { c.fillText(nx[j], cx, y); y += lh; }
  }
  return y;
}

// BEST DEPTH chip + NEXT GOAL line. Shared by MENU + GAMEOVER. Returns next free Y.
function drawMetaBlock(c, cx, y, maxW) {
  c.textAlign = 'center';
  c.textBaseline = 'top';
  var fsHead = GF.clamp(14 * GF.S, 11, 18);
  // BEST DEPTH: Ln/5  ·  TANK 100→140
  c.font = 'bold ' + fsHead + 'px sans-serif';
  c.fillStyle = '#ffe06a';
  var bonus = careerO2Bonus();
  var bestStr = GF.t('best') + ': ' + (bestLevel > 0 ? bestLevel : 0) + '/' + MAX_LEVEL;
  if (bonus > 0) bestStr += '   ·   ' + GF.t('career_max') + ' ' + START_OXY + '→' + (START_OXY + bonus);
  c.fillText(bestStr, cx, y);
  y += fsHead + GF.clamp(7 * GF.S, 4, 11);
  // ENDLESS: once the player has a deepest-dive record, show it on its own line —
  // the owned number they keep coming back to beat.
  if (bestDepth > 0) {
    c.fillStyle = '#7af5ff';
    c.font = 'bold ' + GF.clamp(13 * GF.S, 11, 17) + 'px sans-serif';
    c.fillText(GF.t('best_dive') + ': ' + bestDepth + 'm', cx, y);
    y += GF.clamp(17 * GF.S, 13, 21);
  }
  // NEXT GOAL line (wrapped) — the concrete "what to aim for".
  var fsGoal = GF.clamp(13 * GF.S, 11, 17);
  c.font = (bestLevel >= MAX_LEVEL ? 'bold ' : '') + fsGoal + 'px sans-serif';
  c.fillStyle = bestLevel >= MAX_LEVEL ? '#7af5ff' : '#bfe8f0';
  var lines = wrapLines(c, nextGoalText(), maxW);
  var lh = GF.clamp(17 * GF.S, 13, 21);
  for (var i = 0; i < lines.length; i++) { c.fillText(lines[i], cx, y); y += lh; }
  return y;
}

function drawEnd(c) {
  drawBackground(c);
  drawGrid(c);
  drawChunks(c);
  if (gs === 'GAMEOVER') drawDiver(c);
  drawHUD(c);
  var W = GF.W, H = GF.H;
  c.fillStyle = 'rgba(4,6,15,0.78)';
  c.fillRect(0, 0, W, H);
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  var win = (gs === 'WON');
  c.fillStyle = '#fff';
  c.shadowColor = win ? 'rgba(255,224,106,0.7)' : 'rgba(255,77,94,0.6)';
  c.shadowBlur = 28 * GF.S;
  c.font = 'bold ' + GF.clamp(38 * GF.S, 24, 56) + 'px sans-serif';
  var title = win ? (fullWin ? GF.t('wonall') : GF.t('won')) : GF.t('gameover');
  c.fillText(title, W / 2, H * 0.40);
  c.shadowColor = 'transparent'; c.shadowBlur = 0;
  c.fillStyle = '#cfe8f0';
  c.font = GF.clamp(17 * GF.S, 13, 22) + 'px sans-serif';
  var line2;
  if (win) {
    var lvStr = isEndless() ? (GF.t('depth_m') + ' ' + depthMetres() + 'm')
                            : (GF.t('lvl') + ' ' + level + '/' + MAX_LEVEL);
    line2 = lvStr + '  ·  ' + GF.t('o2') + ' ' + Math.ceil(oxygen);
  } else {
    var deep = depthMetres();
    line2 = (loseCause === 'oxy' ? GF.t('cause_oxy') : GF.t('cause_crush')) + '  ·  ' + GF.t('depth_m') + ' ' + deep + 'm';
  }
  c.fillText(line2, W / 2, H * 0.475);

  // On the one-time campaign clear (surfaced Lvl 5), announce the Endless Descent
  // is now open so the player knows CONTINUE keeps diving rather than restarting.
  if (win && fullWin) {
    c.textAlign = 'center'; c.textBaseline = 'top';
    c.fillStyle = '#7af5ff';
    c.font = 'bold ' + GF.clamp(14 * GF.S, 11, 19) + 'px sans-serif';
    c.fillText(GF.t('endless_unlocked'), W / 2, H * 0.505);
  }

  // Reward feedback: a freshly-banked air milestone this run gets a gold banner
  // (and NEW BEST if the depth itself advanced) — makes the persistent meta payoff
  // legible at the exact moment it happens. ENDLESS adds a depth-record banner so
  // beating your all-time deepest dive is celebrated on win OR loss.
  c.textAlign = 'center'; c.textBaseline = 'top';
  var rewardY = (win && fullWin) ? H * 0.535 : H * 0.525;
  if (recordBeatenThisRun) {
    // Strongest payoff: a new all-time deepest dive (works on win and gameover).
    c.fillStyle = '#7af5ff';
    c.font = 'bold ' + GF.clamp(16 * GF.S, 12, 21) + 'px sans-serif';
    c.fillText(GF.t('new_record'), W / 2, rewardY);
  } else if (win && lastBankedAir > 0) {
    c.fillStyle = '#ffe06a';
    c.font = 'bold ' + GF.clamp(16 * GF.S, 12, 21) + 'px sans-serif';
    c.fillText(subst(GF.t('air_banked'), { air: lastBankedAir }), W / 2, rewardY);
  } else if (!win && bestBeatenThisRun) {
    c.fillStyle = '#7af5ff';
    c.font = 'bold ' + GF.clamp(15 * GF.S, 12, 20) + 'px sans-serif';
    c.fillText(GF.t('new_best'), W / 2, rewardY);
  }

  // Persistent meta line: BEST DEPTH + the concrete NEXT GOAL to chase next run.
  var maxW = Math.min(W * 0.86, 520 * GF.S);
  drawMetaBlock(c, W / 2, H * 0.565, maxW);

  var bw = GF.clamp(240 * GF.S, 170, 320), bh = GF.clamp(52 * GF.S, 40, 64);
  // WON always continues deeper now (campaign clear → Endless Descent → 6,7,8…),
  // so the win label is "DIVE DEEPER" once at/past Lvl 5, "CONTINUE" mid-campaign.
  var label;
  if (win) label = (fullWin || isEndless()) ? GF.t('cont_endless') : GF.t('cont');
  else label = GF.t('retry');
  drawButton(c, (W - bw) / 2, H * 0.72, bw, bh, label, true);
}

function drawTutorialPanel(c) {
