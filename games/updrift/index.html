  var W = GF.W, H = GF.H;
  c.fillStyle = 'rgba(4,6,15,0.92)';
  c.fillRect(0, 0, W, H);
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.fillStyle = '#7af5ff';
  c.font = 'bold ' + GF.clamp(24 * GF.S, 18, 30) + 'px sans-serif';
  c.fillText(GF.t('tut_title'), W / 2, H * 0.14);
  var maxW = Math.min(W * 0.86, 540 * GF.S);
  drawTutorialBlock(c, W / 2, H * 0.20, maxW);
  var bw = GF.clamp(200 * GF.S, 140, 260), bh = GF.clamp(48 * GF.S, 38, 58);
  drawButton(c, (W - bw) / 2, H * 0.74, bw, bh, GF.t('close'), true);
}

function draw(c) {
  if (gs === 'MENU') {
    drawMenu(c);
  } else if (gs === 'PLAYING') {
    drawBackground(c);
    drawGrid(c);
    drawActionGhost(c);   // clarity: show what the current tap will hit
    drawChunks(c);
    drawDiver(c);
    if (!onbActive && braceDanger && mode !== 'brace') drawBraceWarn(c);  // reactive "BRACE!" flag
    drawCoach(c);         // clarity: first-run gesture hint (fades after first action)
    drawHUD(c);
    drawOnboarding(c);    // hands-on action-gated first-run onboarding (over the HUD)
  } else {
    drawEnd(c);
  }
  if (tutorialOpen) drawTutorialPanel(c);
}

// ── PRESS PIPELINE ───────────────────────────────────────────────────────
GF.canvas.addEventListener('click', function (e) { onPress(e.clientX, e.clientY); });
GF.canvas.addEventListener('touchend', function (e) {
  if (!e.changedTouches || !e.changedTouches.length) return;
  var t = e.changedTouches[0];
  onPress(t.clientX, t.clientY);
}, { passive: true });

// ── INIT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'updrift',
  onReady: function () {
    recomputeLayout();
    loadMeta();
    refreshDaily();   // M2: roll today's daily/streak/quest + accrue overnight cache
    GF.persist('updrift_run_v1',
      function () {
        return { gs: gs, level: level, oxygen: oxygen, crushLives: crushLives,
                 grid: grid, diverCol: diverCol, diverRow: diverRow, mode: mode,
                 fullWin: fullWin, hardnessBias: hardnessBias, fallChance: fallChance };
      },
      function (s) {
        if (!s) return;
        level = s.level || 1;
        oxygen = (typeof s.oxygen === 'number') ? s.oxygen : START_OXY;
        crushLives = (typeof s.crushLives === 'number') ? s.crushLives : MAX_CRUSH_LIVES;
        mode = s.mode || 'dig';
        fullWin = !!s.fullWin;
        hardnessBias = s.hardnessBias || 0;
        fallChance = s.fallChance || FALL_CHANCE_BASE;
        diverCol = (typeof s.diverCol === 'number') ? s.diverCol : (GRID_W >> 1);
        diverRow = (typeof s.diverRow === 'number') ? s.diverRow : (GRID_H - 1);
        if (s.grid && s.grid.length === GRID_W * GRID_H) { grid = s.grid; }
        else buildLevel(level);
        chunks = [];
        gs = s.gs || 'MENU';
      }
    );
    if (gs === 'PLAYING' && (!grid || grid.length !== GRID_W * GRID_H)) { buildLevel(level); }
    if (gs !== 'PLAYING' && gs !== 'WON' && gs !== 'GAMEOVER') gs = 'MENU';
    tutorialOpen = false;
    // PLATFORM AUTOSTART (CLAUDE.md #9): on Yandex/CrazyGames/etc. (where
    // build_platforms.sh injects window.__GF_AUTOSTART) drop STRAIGHT into a
    // dive — no menu/title landing. The gallery never gets the flag, so it keeps
    // its menu. Suppress the tutorial overlay and start a run immediately.
    if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU') {
      try { localStorage.setItem('updrift_seen_tutorial', '1'); } catch (e) {}
      tutorialOpen = false;
      startGame();
    }
    // Suspend audio when the tab is hidden, resume on return (CLAUDE.md #8 — and
    // good battery hygiene). Mirrors the AudioContext lifecycle.
    try {
      document.addEventListener('visibilitychange', function () {
        if (!AC) return;
        try { if (document.hidden) AC.suspend(); else if (!audioMuted) AC.resume(); } catch (e) {}
      });
    } catch (e) {}
  },
  onUpdate: update,
  onDraw: draw,
});

// ── STATE EXPOSURE FOR RUNTIME GATE ──────────────────────────────────────
GF.exposeState(function () {
  return {
    gs: gs,
    // Progression proxy for the runtime gate: digging IS the core advance act,
    // so total actions this run is a monotone "score" the tester can track.
    score: actionsThisRun,
    oxygen: oxygen,
    crushLives: crushLives,
    level: level,
    diverRow: diverRow,
    diverCol: diverCol,
    mode: mode,
    chunks: chunks.length,
    // clarity/control-fix (iteration #3) — direct mode selection + audio
    firstActionDone: firstActionDone,
    modeSwitched: modeSwitched,
    audioMuted: audioMuted,
    // hands-on onboarding + reactive brace cue (iteration #5)
    onbActive: onbActive,
    onbStep: onbStep,
    braceDanger: braceDanger,
    bestLevel: bestLevel,
    careerO2Bonus: careerO2Bonus(),
    effectiveStartOxy: effectiveStartOxy(),
    // Endless Descent (playtime-deepening pass)
    bestDepth: bestDepth,
    depthMetres: depthMetres(),
    isEndless: isEndless(),
    recordBeatenThisRun: recordBeatenThisRun,
    ENDLESS_DEPTH_PER_LV: ENDLESS_DEPTH_PER_LV,
    // M2 — reason to return (daily/streak/cache/quest)
    dayStreak: dayStreak,
    dailyAvailable: dailyAvailable,
    dailyClaimedToday: dailyClaimedToday,
    overnightCache: Math.round(overnightCache),
    dailyRunBonus: dailyRunBonus,
    runStartBonus: runStartBonus,
    questId: questId,
    questKind: QUESTS[questId],
    questTarget: questTarget,
    questDoneToday: questDoneToday,
    questBankedAir: questBankedAir,
    DAILY_BASE: DAILY_BASE,
    DAILY_STEP: DAILY_STEP,
    DAILY_MAX_DAYS: DAILY_MAX_DAYS,
    CACHE_RATE_PER_HR: CACHE_RATE_PER_HR,
    CACHE_CAP: CACHE_CAP,
    QUEST_BONUS_AIR: QUEST_BONUS_AIR,
    GRID_W: GRID_W,
    GRID_H: GRID_H,
    START_OXY: START_OXY,
    OXY_DIG: OXY_DIG,
    OXY_BRACE: OXY_BRACE,
    OXY_BLAST: OXY_BLAST,
    MAX_CRUSH_LIVES: MAX_CRUSH_LIVES,
    ROCK_MAX_HP: ROCK_MAX_HP,
    FALL_CHANCE_BASE: FALL_CHANCE_BASE,
    FALL_TICK_MS: FALL_TICK_MS,
    O2_POCKET_REFILL: O2_POCKET_REFILL,
    MAX_LEVEL: MAX_LEVEL,
  };
});

})();
</script>
</body>
</html>
