<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>__GAME_TITLE__</title>
  <script src="/sdk.js"></script>
  <!-- build_platforms.sh substitutes the line above with the SDK <script>
       for the chosen platform. Recognised platforms today:
         yandex            → <script src="/sdk.js"></script>
         crazygames        → <script src="https://sdk.crazygames.com/...">
         gamedistribution  → <script src="https://html5.api.gamedistribution.com/...">
         gamepush          → <script async src="https://gamepush.com/sdk/game-score.js
                                                    ?projectId=...
                                                    &publicToken=...
                                                    &callback=onGPInit"></script>
                             plus a tiny shim defining onGPInit which sets
                             window.gp and dispatches a 'gpReady' event the
                             gf-lib startup listens for. -->
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── GAME-SPECIFIC CONFIG ─────────────────────────────────────────────────
// Localised strings — game-specific UI text, both languages required by Yandex.
var STRINGS = {
  en: {
    title: '__TITLE_EN__',
    sub:   '__SUB_EN__',
    play: 'PLAY', retry: 'RETRY',
    score: 'SCORE', best: 'BEST',
    gameover: 'GAME OVER',
  },
  ru: {
    title: '__TITLE_RU__',
    sub:   '__SUB_RU__',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ',
    score: 'ОЧКИ', best: 'РЕКОРД',
    gameover: 'ИГРА ОКОНЧЕНА',
  },
};

// AI sprites (loaded on boot; falls back to procedural drawing if missing).
// Generated by Shared/skills/game-factory/tools/gen_sprites.sh
var SPRITE_NAMES = []; // e.g. ['player', 'enemy', 'powerup']

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | PLAYING | GAMEOVER
var score = 0, best = 0;
var player = { x: 0, y: 0, vx: 0, vy: 0 };

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  score = 0;
  player.x = GF.cx; player.y = GF.cy;
  player.vx = 0; player.vy = 0;
  gs = 'PLAYING';
  // CG measures Gameplay Conversion + retention against these calls. Yandex
  // gets GameplayAPI.start via the same wrapper. Local builds no-op.
  GF.gameStarted();
}

function gameOver() {
  var newBest = score > best;
  if (newBest) {
    best = score;
    try { localStorage.setItem('__GAME_KEY___best', best); } catch (e) {}
  }
  gs = 'GAMEOVER';
  GF.gameEnded();
  // Celebrate genuine personal-best moments only — CG rejects games that
  // fire happytime() on every game-over.
  if (newBest && best > 0) GF.happytime();
}

// Screenshot helper — for take_screenshots.js to fast-forward into a busy
// game state. Override per game (e.g. call startLevel(n) instead of startGame()).
window._jumpLevel = function() { startGame(); };

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (gs !== 'PLAYING') return;

  // Movement input — keyboard + touch joystick
  var ax = 0, ay = 0;
  if (GF.keys['ArrowLeft']  || GF.keys['KeyA']) ax -= 1;
  if (GF.keys['ArrowRight'] || GF.keys['KeyD']) ax += 1;
  if (GF.keys['ArrowUp']    || GF.keys['KeyW']) ay -= 1;
  if (GF.keys['ArrowDown']  || GF.keys['KeyS']) ay += 1;
  if (GF.touch.active) { ax += GF.touch.dx; ay += GF.touch.dy; }
  var alen = Math.sqrt(ax*ax + ay*ay);
  if (alen > 0) { ax /= alen; ay /= alen; }

  player.vx = (player.vx + ax * 0.85 * GF.S) * 0.83;
  player.vy = (player.vy + ay * 0.85 * GF.S) * 0.83;
  player.x += player.vx;
  player.y += player.vy;

  // TODO: game logic (collisions, scoring, win/lose conditions)
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  // Clear
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'PLAYING') {
    drawHUD();
    drawPlayer();
    // TODO: drawWorld(), draw enemies/items
  }
  if (gs === 'MENU')     GF.drawOverlay({ title: GF.t('title'), sub: GF.t('sub'), btnText: GF.t('play'),  btnFn: startGame, bestText: best > 0 ? GF.t('best') + ': ' + best : null });
  if (gs === 'GAMEOVER') GF.drawOverlay({ title: GF.t('gameover'), sub: GF.t('score') + ': ' + score, btnText: GF.t('retry'), btnFn: startGame, bestText: GF.t('best') + ': ' + best });
}

function drawHUD() {
  var c = GF.ctx;
  var fs = GF.clamp(16 * GF.S, 12, 22);
  c.fillStyle = '#fff';
  c.font = 'bold ' + fs + 'px sans-serif';
  c.textAlign = 'left';
  c.textBaseline = 'top';
  c.fillText(GF.t('score') + ': ' + score, 12 * GF.S, 12 * GF.S);
}

function drawPlayer() {
  var size = 32 * GF.S;
  GF.drawSprite('player', player.x, player.y, size, function(c, x, y, s) {
    // Procedural fallback if sprite missing
    c.fillStyle = '#4dd0e1';
    c.beginPath(); c.arc(x, y, s/2, 0, Math.PI*2); c.fill();
  });
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: '__GAME_KEY__',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('__GAME_KEY___best') || '0') || 0; } catch (e) {}
    // ── Yandex 1.9 — RUN PROGRESS MUST PERSIST ACROSS RELOAD ──
    // Register save/load with the lib. Add every field that changes during a
    // run (level, score, lives, inventory, etc.) so a mid-run refresh picks
    // up where the player left off. Call GF.saveRun() after every state
    // change. Arms Dealer rejection 2026-05-11 (п. 1.9) — don't skip this.
    GF.persist('__GAME_KEY___run_v1',
      () => ({ gs: gs, score: score, /* TODO: add per-game state */ }),
      (s) => {
        if (!s) return;
        gs    = s.gs    || 'MENU';
        score = s.score || 0;
        // TODO: restore per-game state
      }
    );
    if (gs === 'PLAYING' || gs === 'MENU') gs = 'MENU';  // safe entry point
  },
  onUpdate: update,
  onDraw: draw,
});

// ── YANDEX MUST-HAVES — DON'T REMOVE WITHOUT READING ─────────────────────
// These four patterns prevent the most common moderation rejections.
//
// 1. ALL UI TEXT THROUGH GF.t() / STRINGS  (Yandex 8.2.3)
//    Never `fillText('DAMAGE: 5', ...)`. Always `fillText(GF.t('damage_label') + ': 5', ...)`
//    with both `en` AND `ru` entries in STRINGS. The Russian-build screenshots
//    must visibly read Russian — otherwise рейтинг 8.2.3 fail.
//
// 2. SAVE RUN STATE ACROSS RELOAD  (Yandex 1.9)
//    See GF.persist() above. Call GF.saveRun() inside every function that
//    mutates persisted state (startGame, advance level, gameover, buy, etc.).
//
// 3. FULLSCREEN-EXIT RESIZE  (Yandex 1.6.2.3)
//    Already handled in gf-lib via fullscreenchange + webkitfullscreenchange
//    + orientationchange + pageshow listeners. Don't override.
//
// 4. ADS ON USER-CLICK ONLY  (Yandex 4.4)
//    Never auto-fire `ysdk.adv.showFullscreenAdv` on a game event (battle
//    end, level up, death). Set a flag, then fire the ad inside the click
//    handler for the user's next button press (CONTINUE, NEXT LEVEL, etc.).
//    Pattern:
//      let _pendingAd = false;
//      function onBattleEnd() { _pendingAd = true; ... }      // mark
//      function onContinueClick() {                            // fire
//        if (_pendingAd && ysdk) {
//          _pendingAd = false;
//          ysdk.adv.showFullscreenAdv({ callbacks: { onClose: continueGame, onError: continueGame } });
//        } else { continueGame(); }
//      }
// ─────────────────────────────────────────────────────────────────────────

})();
</script>
</body>
</html>
