// ── PERSISTENT META (saved across sessions) ───────────────────────────────
var meta = {
  scrap: 0, bestDist: 0, totalDist: 0,
  carUp: {},                 // PER-CAR upgrades: carUp[carId] = {engine,nitro,armor,wheels,ramp}
  vehicle: 'buggy',
  ownedCars: ['buggy'],      // PURCHASED rides (scrap); daily-streak cars live in ownedDaily
  ownedDaily: [],            // daily-streak car ids the player has unlocked
  daily: { last: '', streak: 0 },
  itemsInv: [],              // CAR PARTS inventory: [{id,t,q}] found on the map or bought
  equip: {},                 // equip[carId] = [itemId, ...] (max 3 per car)
  shop: { day: '', offers: [] },  // daily rotating part shop
  prestige: {},              // prestige[carId] = stars (0..5)
  itemSeq: 1,
};
function freshUp() { return { engine: 0, nitro: 0, armor: 0, wheels: 0, ramp: 0 }; }
function ensureCarUp(id) { if (!meta.carUp[id]) meta.carUp[id] = freshUp(); return meta.carUp[id]; }
function curUp() { return ensureCarUp(meta.vehicle); }
function loadMeta() {
  try {
    var raw = localStorage.getItem('crash_buggy_meta_v1');
    if (raw) {
      var s = JSON.parse(raw);
      if (s && typeof s === 'object') {
        meta.scrap = s.scrap | 0; meta.bestDist = s.bestDist | 0; meta.totalDist = s.totalDist | 0;
        if (typeof s.vehicle === 'string') meta.vehicle = s.vehicle;
        if (s.daily) { meta.daily.last = s.daily.last || ''; meta.daily.streak = s.daily.streak | 0; }
        if (Array.isArray(s.ownedDaily)) meta.ownedDaily = s.ownedDaily.slice();
        if (Array.isArray(s.ownedCars) && s.ownedCars.length) meta.ownedCars = s.ownedCars.slice();
        else {
          // v2 -> v3 migration: rides used to unlock FREE at total-distance milestones;
          // grandfather in anything the player had already reached so nothing is taken away.
          var LEGACY_UNLOCK = { muscle: 2000, truck: 7000, sled: 18000 };
          meta.ownedCars = ['buggy'];
          for (var lid in LEGACY_UNLOCK) if ((s.totalDist | 0) >= LEGACY_UNLOCK[lid]) meta.ownedCars.push(lid);
          if (typeof s.vehicle === 'string' && s.vehicle.charAt(0) !== 'd' && meta.ownedCars.indexOf(s.vehicle) < 0) meta.ownedCars.push(s.vehicle);
        }
        if (Array.isArray(s.itemsInv)) meta.itemsInv = s.itemsInv.filter(function (it) { return it && it.id && it.t; });
        if (s.equip && typeof s.equip === 'object') for (var eid in s.equip) if (Array.isArray(s.equip[eid])) meta.equip[eid] = s.equip[eid].slice(0, 3);
        if (s.shop && typeof s.shop === 'object') meta.shop = { day: s.shop.day || '', offers: Array.isArray(s.shop.offers) ? s.shop.offers : [] };
        if (s.prestige && typeof s.prestige === 'object') for (var pid in s.prestige) meta.prestige[pid] = s.prestige[pid] | 0;
        if (typeof s.itemSeq === 'number') meta.itemSeq = s.itemSeq | 0;
        var isV2 = (s.carUp && typeof s.carUp === 'object') || Array.isArray(s.ownedDaily);
        if (s.carUp && typeof s.carUp === 'object') {       // v2 per-car upgrades
          for (var id in s.carUp) { var u = freshUp(); for (var k in u) if (typeof s.carUp[id][k] === 'number') u[k] = s.carUp[id][k] | 0; meta.carUp[id] = u; }
        } else if (s.up && typeof s.up === 'object') {       // migrate v1 global upgrades -> EQUIPPED car + buggy (so nobody feels their car got reset)
          var mk = function () { var u = freshUp(); for (var k2 in u) if (typeof s.up[k2] === 'number') u[k2] = s.up[k2] | 0; return u; };
          meta.carUp.buggy = mk();
          if (meta.vehicle && meta.vehicle !== 'buggy') meta.carUp[meta.vehicle] = mk();
        }
        // first load of the per-car/daily system: restart the daily-car streak at 0 so the chain
        // begins at day 1 (d1), instead of an old scrap-streak granting a late car instantly.
        if (!isV2) meta.daily.streak = 0;
      }
    }
  } catch (e) {}
  if (meta.ownedCars.indexOf('buggy') < 0) meta.ownedCars.unshift('buggy');
  if (!vehUnlocked(vehById(meta.vehicle))) meta.vehicle = 'buggy';   // never boot into a ride you don't own
  ensureCarUp('buggy'); ensureCarUp(meta.vehicle);
  recalcBonus();
}
function saveMeta() { try { localStorage.setItem('crash_buggy_meta_v1', JSON.stringify(meta)); } catch (e) {} }

// ── UPGRADE + VEHICLE CONFIG ──────────────────────────────────────────────
var UPGRADES = [

function upMaxed(u) { return curUp()[u.key] >= capFor(u.key); }   // max is PER-CAR (caps)

// Each car has its OWN upgrade tree (carUp) AND its own upgrade CAPS, so a new

  { id: 'truck',  price: 9000,  launchMul: 1.00, bounceMul: 1.38, armorAdd: 2, nitroAdd: 1, caps: { engine: 8,  nitro: 6, armor: 10, wheels: 10, ramp: 5 }, body: '#3fae5a', accent: '#bff0c8', wheel: '#15151b' },
  { id: 'sled',   price: 28000, launchMul: 1.46, bounceMul: 0.82, armorAdd: 0, nitroAdd: 2, caps: { engine: 12, nitro: 9, armor: 5,  wheels: 7,  ramp: 8 }, body: '#33c6e0', accent: '#e6fbff', wheel: '#16323a' },

var DAILY_CARS = [
  { id: 'd1', daily: 1, launchMul: 1.12, bounceMul: 1.06, armorAdd: 0, nitroAdd: 1, caps: { engine: 9,  nitro: 5, armor: 6,  wheels: 6,  ramp: 5 }, body: '#e84393', accent: '#ffd6ec', wheel: '#2b2b33' },
  { id: 'd2', daily: 2, launchMul: 1.04, bounceMul: 1.30, armorAdd: 1, nitroAdd: 0, caps: { engine: 8,  nitro: 5, armor: 7,  wheels: 9,  ramp: 5 }, body: '#00b894', accent: '#c8fff0', wheel: '#15151b' },
  { id: 'd3', daily: 3, launchMul: 1.10, bounceMul: 1.06, armorAdd: 2, nitroAdd: 1, caps: { engine: 8,  nitro: 6, armor: 9,  wheels: 7,  ramp: 5 }, body: '#0984e3', accent: '#cfeaff', wheel: '#16323a' },
  { id: 'd4', daily: 4, launchMul: 1.26, bounceMul: 1.02, armorAdd: 1, nitroAdd: 1, caps: { engine: 10, nitro: 6, armor: 7,  wheels: 7,  ramp: 6 }, body: '#fdcb6e', accent: '#fff3cf', wheel: '#3a2b00' },
  { id: 'd5', daily: 5, launchMul: 1.32, bounceMul: 1.12, armorAdd: 1, nitroAdd: 2, caps: { engine: 10, nitro: 7, armor: 7,  wheels: 7,  ramp: 7 }, body: '#a29bfe', accent: '#ece9ff', wheel: '#1d1d24' },
  { id: 'd6', daily: 6, launchMul: 1.32, bounceMul: 1.32, armorAdd: 3, nitroAdd: 2, caps: { engine: 11, nitro: 7, armor: 9,  wheels: 8,  ramp: 7 }, body: '#ff7675', accent: '#ffe0e0', wheel: '#1d1d24' },
  { id: 'd7', daily: 7, launchMul: 1.62, bounceMul: 1.30, armorAdd: 3, nitroAdd: 3, caps: { engine: 12, nitro: 9, armor: 10, wheels: 10, ramp: 8 }, body: '#ffd700', accent: '#fff3b0', wheel: '#2b2b33' },
];
var ALL_CARS = VEHICLES.concat(DAILY_CARS);
function vehById(id) { for (var i = 0; i < ALL_CARS.length; i++) if (ALL_CARS[i].id === id) return ALL_CARS[i]; return ALL_CARS[0]; }
function vehUnlocked(v) { return v.daily != null ? meta.ownedDaily.indexOf(v.id) >= 0 : meta.ownedCars.indexOf(v.id) >= 0; }
function curVeh() { return vehById(meta.vehicle); }
function capFor(key) { var cv = curVeh(); return (cv.caps && cv.caps[key] != null) ? cv.caps[key] : 8; }
function affordableNewCar() { for (var i = 0; i < VEHICLES.length; i++) { var v = VEHICLES[i]; if (meta.ownedCars.indexOf(v.id) < 0 && meta.scrap >= v.price) return v; } return null; }
// the car's identity at a glance — "+18% SPD +1 ARM" chips (top-2 strongest stats)
function carChips(v, maxN) {
  var ch = [];
  var sp = Math.round((v.launchMul - 1) * 100); if (sp) ch.push({ w: Math.abs(sp), t: (sp > 0 ? '+' : '') + sp + '% ' + GF.t('stSpd') });
  var bn = Math.round((v.bounceMul - 1) * 100); if (bn) ch.push({ w: Math.abs(bn) * 0.8, t: (bn > 0 ? '+' : '') + bn + '% ' + GF.t('stBnc') });
  if (v.armorAdd) ch.push({ w: v.armorAdd * 14, t: '+' + v.armorAdd + ' ' + GF.t('stArm') });
  if (v.nitroAdd) ch.push({ w: v.nitroAdd * 14, t: '+' + v.nitroAdd + ' ' + GF.t('stNit') });
  ch.sort(function (a, b) { return b.w - a.w; });
  return ch.slice(0, maxN || 2).map(function (x) { return x.t; }).join('  ');
}

// ── CAR PARTS (items) — found on the map (gold crates) or bought in the SHOP;
// equip up to 3 per car. One physical part can only be on one car at a time. ──
var ITEM_KEYS = ['turbo', 'tank', 'plate', 'spring', 'magnet', 'damp'];
var INV_CAP = 24, EQUIP_SLOTS = 3;
var _bonus = { spd: 0, nitro: 0, armor: 0, bounce: 0, scrap: 0, dmg: 1 };
function invById(id) { for (var i = 0; i < meta.itemsInv.length; i++) if (meta.itemsInv[i].id === id) return meta.itemsInv[i]; return null; }
function equipList(carId) { return meta.equip[carId] || (meta.equip[carId] = []); }
function equippedOnCurrent(id) { return equipList(meta.vehicle).indexOf(id) >= 0; }
function equippedAnywhere(id) { for (var car in meta.equip) if (meta.equip[car].indexOf(id) >= 0) return car; return null; }
function prestigeStars(carId) { return meta.prestige[carId] | 0; }
function recalcBonus() {
  var b = { spd: 0, nitro: 0, armor: 0, bounce: 0, scrap: 0, dmg: 1 };
  var ids = equipList(meta.vehicle);
  for (var i = 0; i < ids.length; i++) {
    var it = invById(ids[i]); if (!it) continue;
    var q = it.q | 0;
    if (it.t === 'turbo') b.spd += 0.05 * q;
    else if (it.t === 'tank') b.nitro += q;
    else if (it.t === 'plate') b.armor += q;
    else if (it.t === 'spring') b.bounce += 0.025 * q;
    else if (it.t === 'magnet') b.scrap += 0.12 * q;
    else if (it.t === 'damp') b.dmg *= Math.max(0.25, 1 - 0.15 * q);
  }
  var stars = prestigeStars(meta.vehicle);
  b.spd += 0.06 * stars; b.scrap += 0.08 * stars;
  _bonus = b;
}
function equipItemById(id) {
  if (equippedAnywhere(id)) { GF.sfx('error'); return; }
  var ids = equipList(meta.vehicle);
  if (ids.length >= EQUIP_SLOTS) { GF.sfx('error'); return; }
  ids.push(id); saveMeta(); recalcBonus(); GF.sfx('click');
  garTutAdvance('equip');
}
function unequipSlot(i) {
  var ids = equipList(meta.vehicle);
  if (i < 0 || i >= ids.length) return;
  ids.splice(i, 1); saveMeta(); recalcBonus(); GF.sfx('tap');
}
function tapInv(id) {
  var idx = equipList(meta.vehicle).indexOf(id);
  if (idx >= 0) { unequipSlot(idx); return; }
  if (equippedAnywhere(id)) { GF.sfx('error'); return; }   // on another car — unequip there first
  equipItemById(id);
}
function grantRandomItem(z, forceT, forceQ) {
  var t = forceT || ITEM_KEYS[RI(0, ITEM_KEYS.length - 1)];
  var r = Math.random() - z * 0.05;
  var q = forceQ || (r < 0.55 ? 1 : (r < 0.85 ? 2 : 3));
  if (meta.itemsInv.length >= INV_CAP) {                    // bag full -> auto-scrap, never wasted
    meta.scrap += 60 * q; saveMeta();
    GF.spawnFloat(sx(buggy.x), sy(buggy.y) - 40 * GF.S, '+' + (60 * q), '#ffd166');
    return null;
  }
  var it = { id: 'i' + (meta.itemSeq++), t: t, q: q };
  meta.itemsInv.push(it); saveMeta();
  GF.sfx('unlock');

// ── LIFECYCLE ─────────────────────────────────────────────────────────────

// ── WORLD GENERATION ──────────────────────────────────────────────────────

  if (roll < 0.22) { pushProp('tnt', x, -30, 30, 30, 1, 9); return; }

// ── DAILY ─────────────────────────────────────────────────────────────────
function todayStr() { try { var d = new Date(), m = d.getMonth() + 1, dd = d.getDate(); return d.getFullYear() + '-' + (m < 10 ? '0' + m : m) + '-' + (dd < 10 ? '0' + dd : dd); } catch (e) { return ''; } }  // LOCAL day (not UTC) so the daily resets at the player's midnight
function dailyReady() { return meta.daily.last !== todayStr(); }
function claimDaily() {
  if (!dailyReady()) { GF.sfx('error'); return; }
  var today = todayStr(), prev = meta.daily.last, streak = meta.daily.streak, cont = false;
  if (prev) { try { var pd = new Date(prev + 'T00:00:00'), td = new Date(today + 'T00:00:00'); cont = Math.round((td - pd) / 86400000) === 1; } catch (e) {} }
  streak = cont ? streak + 1 : 1;
  var reward = Math.min(400, 60 + (streak - 1) * 40);
  meta.daily.last = today; meta.daily.streak = streak; meta.scrap += reward;
  // grant the daily-streak car for this day (1..7) — return daily for a week to earn the Mega GT
  var day = Math.min(7, streak), dcar = DAILY_CARS[day - 1], gotCar = false;
  if (dcar && meta.ownedDaily.indexOf(dcar.id) < 0) { meta.ownedDaily.push(dcar.id); ensureCarUp(dcar.id); gotCar = true; }
  saveMeta();
  GF.sfx('reward'); flashScrap = reward; flashScrapT = 1.6;
  if (gotCar) { GF.sfx('unlock'); flashCar = dcar.id; flashCarT = 2.6; }
}

  c.fillStyle = '#9fb2c8'; c.font = clamp(12 * S, 10, 16) + 'px Inter, system-ui, sans-serif'; c.fillText(GF.t('earned'), W / 2, y0 + 30 * S);
  var bw = clamp(260 * S, 180, 380), bh = clamp(58 * S, 46, 74);
  bigBtn(c, GF.t('retry'), W / 2, H * 0.74, bw, bh, true, onRetry);
  bigBtn(c, GF.t('garage'), W / 2, H * 0.74 + bh + 14 * S, clamp(180 * S, 130, 260), clamp(50 * S, 40, 66), false, openGarage, !!tally.canBuy);

function onRetry() {

}

// ── HELP CARD ─────────────────────────────────────────────────────────────
function wrapText(c, text, x, y, maxW, lineH) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) { var probe = cur ? cur + ' ' + words[i] : words[i]; if (c.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; } else cur = probe; }
  if (cur) lines.push(cur);
  for (var j = 0; j < lines.length; j++) c.fillText(lines[j], x, y + j * lineH);
  return lines.length * lineH;
}
function drawHelpCard(c) {
  var W = GF.W, H = GF.H, S = GF.S;
  uiButtons = [];
  c.fillStyle = 'rgba(6,8,18,0.92)'; c.fillRect(0, 0, W, H);
  var cardW = Math.min(W * 0.9, 460 * S), cx0 = W / 2;
  c.textAlign = 'center'; c.textBaseline = 'alphabetic'; c.fillStyle = '#fff'; c.font = 'bold ' + clamp(22 * S, 17, 30) + 'px Inter, system-ui, sans-serif';
  var y = H * 0.16; c.fillText(GF.t('howto'), cx0, y); y += clamp(30 * S, 24, 40);
  var lines = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_garage', 'tut_tip'], lh = clamp(20 * S, 16, 26);
  c.font = clamp(14 * S, 12, 19) + 'px Inter, system-ui, sans-serif'; c.textAlign = 'left';
  for (var i = 0; i < lines.length; i++) { c.fillStyle = i === 5 ? '#ffd166' : '#cdd6e6'; var used = wrapText(c, GF.t(lines[i]), cx0 - cardW / 2, y, cardW, lh); y += used + 9 * S; }
  c.textAlign = 'center';
  bigBtn(c, GF.t('gotit'), W / 2, Math.min(y + 28 * S, H * 0.9), clamp(200 * S, 150, 300), clamp(54 * S, 44, 70), true, function () { helpOpen = false; GF.sfx('click'); });
}

// ── TUTORIAL (demo-hand, action-gated on the real launch) ─────────────────
function startTutorial() {
  GF.tutorial.start([
    { text: GF.t('holdRev'),
      target: function () { return { x: sx(buggy.x), y: sy(buggy.y) - 6 * GF.S, r: 34 * GF.S }; },
      gesture: 'tap', advance: 'manual', onAdvance: function () { seenTut = true; try { localStorage.setItem('crash_buggy_seen_tut', '1'); } catch (e) {} } },
  ], { storageKey: 'crash_buggy_seen_tut' });
}

// ── GARAGE TUTORIAL (demo-hand, action-gated: buy an upgrade -> equip a free
// part; then shop + ride-pricing callouts). Fires on the first garage visit
// where the player can actually afford an upgrade level, so every step is doable. ──
var garTutOn = false, garTutItemId = null;

function garRowTarget(pred) {
  var snapped = false;   // auto-scroll the row into view ONCE, then let the player scroll freely
  return function () {
    var r = null;
    for (var i = 0; i < garageRows.length; i++) if (pred(garageRows[i])) { r = garageRows[i]; break; }
    if (!r || !garageScroll) return { x: GF.W / 2, y: GF.H * 0.45, r: 40 * GF.S };
    var L = garageLayout(), mid = r.y + r.h / 2, syy = garageScroll.contentToScreenY(mid);
    if (!snapped && (syy < L.vpY + 30 * GF.S || syy > L.vpY + L.vpH - 30 * GF.S)) {

  };
}
function grantTutPart() {
  if (meta.itemsInv.length >= INV_CAP) return null;
  var it = { id: 'i' + (meta.itemSeq++), t: 'turbo', q: 1 };
  meta.itemsInv.push(it); saveMeta(); GF.sfx('unlock');
  return it;
}
function startGarageTutorial() {
  if (window._silent || GF.tutorial.active || garTutOn) return;
  try { if (localStorage.getItem('crash_buggy_garage_tut')) return; } catch (e) {}
  var buyKey = null;
  for (var i = 0; i < UPGRADES.length; i++) { var u = UPGRADES[i]; if (!upMaxed(u) && meta.scrap >= upCost(u)) { buyKey = u.key; break; } }
  if (!buyKey) return;                                   // broke: try again next garage visit
  var steps = [
    { text: GF.t('tut_g1'), gesture: 'tap', advance: 'manual', _kind: 'buy',
      target: garRowTarget(function (r) { return r.kind === 'buy' && r.key === buyKey; }),
      onAdvance: function () { var it = grantTutPart(); garTutItemId = it ? it.id : null; } },

      target: garRowTarget(function (r) { return r.kind === 'inv' && (!garTutItemId || r.id === garTutItemId); }) });
  }
  steps.push({ text: GF.t('tut_g3'), advance: 'auto', after: 3000,
    target: garRowTarget(function (r) { return r.kind === 'shop'; }) });
  steps.push({ text: GF.t('tut_g4'), advance: 'auto', after: 3400,
    target: garRowTarget(function (r) { return r.kind === 'veh' && vehById(r.id).daily == null && !vehUnlocked(vehById(r.id)); }),
    onAdvance: function () { garTutOn = false; } });

}
function garTutAdvance(kind) {
  if (!garTutOn || !GF.tutorial.active) return;

// ── INPUT ─────────────────────────────────────────────────────────────────
var downX = 0, downY = 0, dragScroll = false;
function onDown(x, y) {
  downX = x; downY = y; dragScroll = false;
  if (helpOpen) { for (var i = 0; i < uiButtons.length; i++) if (hit(uiButtons[i], x, y)) { uiButtons[i].fn(); return; } return; }
  if (GF.tutorial.active) { var b = GF.tutorial._skipBtn; if (b && hit(b, x, y)) { GF.tutorial.handleClick(x, y); return; } }
  if (gs === 'GARAGE') {
    for (var k = 0; k < uiButtons.length; k++) if (hit(uiButtons[k], x, y)) { GF.sfx('click'); uiButtons[k].fn(); return; }
    if (garageScroll && garageScroll.contains(x, y)) garageScroll.dragStart(y);
    return;
  }
  if (gs === 'PLAYING') {
    for (var h = 0; h < hudButtons.length; h++) if (hit(hudButtons[h], x, y)) { hudButtons[h].fn(); return; }
    if (phase === 'CHARGE') { held = true; if (charge === 0) { charge = 0.15; chargeDir = 1; } }
    else fireNitro();
    return;
  }
  for (var j = 0; j < uiButtons.length; j++) if (hit(uiButtons[j], x, y)) { GF.sfx('click'); uiButtons[j].fn(); return; }
}
function onMove(x, y) {
  if (gs === 'GARAGE' && garageScroll && garageScroll.isDragging()) {
    if (Math.abs(y - downY) > 6 * GF.S) dragScroll = true;
    garageScroll.dragMove(y);
  }
}
function onUp(x, y) {
  if (gs === 'GARAGE' && garageScroll) {
    var wasDrag = dragScroll; garageScroll.dragEnd();
    if (!wasDrag && garageScroll.contains(x, y)) {
      var cy = garageScroll.screenToContentY(y);
      for (var i = 0; i < garageRows.length; i++) {
        var r = garageRows[i];
        if (x >= r.x && x <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
          if (r.kind === 'buy') buyUpgrade(r.key);
          else if (r.kind === 'veh') equipVehicle(r.id);
          else if (r.kind === 'prestige') doPrestige();
          else if (r.kind === 'slot') unequipSlot(r.idx);
          else if (r.kind === 'inv') tapInv(r.id);
          else if (r.kind === 'shop') buyOffer(r.idx);
          return;
        }
      }
    }
    return;
  }
  if (gs === 'PLAYING' && phase === 'CHARGE' && held) launch();
}
var canvasEl = document.getElementById('c');
canvasEl.addEventListener('touchstart', function (e) { e.preventDefault(); var t = e.changedTouches[0]; onDown(t.clientX, t.clientY); }, { passive: false });
canvasEl.addEventListener('touchmove', function (e) { e.preventDefault(); var t = e.changedTouches[0]; onMove(t.clientX, t.clientY); }, { passive: false });
canvasEl.addEventListener('touchend', function (e) { e.preventDefault(); var t = e.changedTouches[0]; onUp(t.clientX, t.clientY); }, { passive: false });
canvasEl.addEventListener('touchcancel', function (e) { e.preventDefault(); var t = (e.changedTouches && e.changedTouches[0]) || { clientX: downX, clientY: downY }; onUp(t.clientX, t.clientY); held = false; }, { passive: false });
canvasEl.addEventListener('mousedown', function (e) { onDown(e.clientX, e.clientY); });
canvasEl.addEventListener('mousemove', function (e) { if (e.buttons) onMove(e.clientX, e.clientY); });
canvasEl.addEventListener('mouseup', function (e) { onUp(e.clientX, e.clientY); });
// mouse-wheel / trackpad scrolling for the garage list (drag already works; desktop
// players expect the wheel to scroll too — Tim 2026-06-10)
canvasEl.addEventListener('wheel', function (e) {
  e.preventDefault();
  if (gs !== 'GARAGE' || !garageScroll || helpOpen) return;
  var dy = e.deltaY;
  if (e.deltaMode === 1) dy *= 18; else if (e.deltaMode === 2) dy *= GF.H;   // lines/pages -> px
  garageScroll.handleWheel(dy);
}, { passive: false });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
document.addEventListener('keydown', function (e) {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Enter') {
    e.preventDefault();
    if (e.repeat) return;
    if (helpOpen) { helpOpen = false; return; }
    if (gs === 'MENU') startRun();
    else if (gs === 'GAMEOVER') onRetry();
    else if (gs === 'GARAGE') startRun();
    else if (gs === 'PLAYING') { if (phase === 'CHARGE') { held = true; if (charge === 0) { charge = 0.15; chargeDir = 1; } } else fireNitro(); }
  } else if (e.code === 'KeyM') { toggleMute(); }
});
document.addEventListener('keyup', function (e) {
  if ((e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Enter') && gs === 'PLAYING' && phase === 'CHARGE' && held) launch();
});

// ── SCREENSHOT / TEST HOOKS ───────────────────────────────────────────────
window._setupForScreenshot = function (level) {
  window._silent = true; seenTut = true; helpOpen = false;
  var lv = level || 3;
  meta.totalDist = Math.max(meta.totalDist, 2000);
  var su = ensureCarUp(meta.vehicle); su.engine = Math.max(su.engine, 4); su.nitro = Math.max(su.nitro, 2);
  resetRun();
  gs = 'PLAYING'; phase = 'FLIGHT';
  dist = 140 + lv * 70; zoneIdx = zoneOf(dist); prevZoneIdx = zoneIdx;
  buggy.x = startX + dist * PX_PER_M; buggy.y = -150; buggy.vx = 620; buggy.vy = -30;
  buggy.onGround = false; buggy.rot = -0.16;
  buggy.dmg = 0.5; buggy.parts.wheelF = false;   // battle-damaged: showcases breakability
  props = []; var bx = buggy.x;
  // a tall crate column the buggy is plowing through — fills the frame vertically
  for (var ci = 0; ci < 7; ci++) pushProp('crate', bx + 72, -34 - ci * 34, 34, 34, 1, 3);
  // a skyscraper (air obstacle) rising into the flight path on the right

  pushProp('tnt',   bx + 148, -150, 30, 30, 1, 9);
  pushProp('tire',  bx + 232, -210, 40, 40, 1, 5);
  pushProp('crate', bx - 34,  -120, 34, 34, 1, 3);
  pushProp('sign',  bx + 28,  -54, 10, 54, 0, 2);
  // ground clutter so the lower band is full of props, not bare grass
  pushProp('car',    bx + 110, -40, 78, 40, 3, 16);
  pushProp('barrel', bx + 256, -40, 28, 40, 1, 6);
  pushProp('cone',   bx + 320, -30, 24, 30, 0, 2); pushProp('cone', bx + 346, -30, 24, 30, 0, 2);
  pushProp('boost',  bx + 410, -14, 54, 14, 0, 4);
  pushProp('car',    bx - 132, -40, 78, 40, 3, 16);
  // aerial obstacles up in the sky (showcase the new content)
  pushAir('plane', bx + 150, -300, 132, 32, 2, 18);
  pushAir('bird',  bx - 60,  -250, 26, 18, 0, 4); pushAir('bird', bx - 26, -262, 26, 18, 0, 4);
  pushAir('comet', bx + 70,  -250, 30, 30, 1, 12);
  frontX = bx + 520; generateAhead();
  combo = 5; comboT = COMBO_WINDOW; runScrap = 240 + lv * 30; smashes = 12 + lv; nitro = 2;
  // explosion debris frozen mid-air around the buggy

  spawnPart(bx + 40, -120, WHEEL_R * 1.8, curVeh().wheel);   // the knocked-off front wheel tumbling

  launchFlash = 0.45;
  // force a tight, ground-anchored framed camera, then FREEZE so the live loop
  // can't drift it. Zoomed (1.5) so the action band fills the tall portrait frame
  // and the buggy sits ~mid-screen with skyline+ground props below.
  camScale = 1.5; scl = GF.S * camScale;
  camX = buggy.x - (GF.W * 0.32) / scl;
  camY = 0 - (GF.H * 0.82) / scl;
  window.__shotFreeze = true;
};
window._jumpLevel = function (n) {
  helpOpen = false; window.__shotFreeze = false;
  if (n === 99) { if (gs !== 'PLAYING') startRun(); endRun(); return; }
  window._setupForScreenshot(n || 3);
};
window._setLang = function (l) { GF.lang = (l === 'ru' ? 'ru' : 'en'); };
window._setState = function (s) { if (s) gs = s; };
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return 'Inter, system-ui, sans-serif'; };
window.__openTut = function () { helpOpen = true; };
window.__closeTut = function () { helpOpen = false; };
// ── TEST SEAMS (test-only; never used by gameplay) ────────────────────────
window.__cbAddItem = function (t, q) { var it = grantRandomItem(zoneIdx, t, q); return it && it.id; };
window.__cbTapInv = function (id) { tapInv(id); return equipList(meta.vehicle).slice(); };
window.__cbBuyOffer = function (i) { ensureShop(); buyOffer(i); return meta.shop.offers.map(function (o) { return { t: o.t, q: o.q, sold: o.sold }; }); };
window.__cbPrestige = function () { doPrestige(); return { stars: prestigeStars(meta.vehicle), up: curUp() }; };
window.__cbMaxUp = function () { var u = curUp(); for (var i = 0; i < UPGRADES.length; i++) u[UPGRADES[i].key] = capFor(UPGRADES[i].key); saveMeta(); recalcBonus(); };
window.__cbAddScrap = function (n) { meta.scrap += (n | 0); saveMeta(); return meta.scrap; };
window.__cbBuyCar = function (id) { equipVehicle(id); return { owned: meta.ownedCars.slice(), vehicle: meta.vehicle, scrap: meta.scrap }; };

// ── BOOT ──────────────────────────────────────────────────────────────────
loadMeta();
try { seenTut = (localStorage.getItem('crash_buggy_seen_tut') === '1'); } catch (e) {}

GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: [],
  saveKey: 'crash_buggy',
  onReady: function () {
    GF.persist('crash_buggy_run_v1',
      function () { return { gs: (gs === 'PLAYING' || gs === 'GAMEOVER') ? 'GARAGE' : gs }; },
      function (s) { if (s && s.gs === 'GARAGE') gs = 'GARAGE'; }
    );
    if (gs === 'PLAYING') gs = 'MENU';

    GF.startMusic({ preset: 'arcade', muted: audioMuted });

    if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU') startRun();

    GF.exposeState(function () {
      return {
        gs: gs, phase: phase, dist: dist, distance: dist, score: runScrap + Math.floor(dist * SCRAP_PER_M),
        bestDist: meta.bestDist, totalDist: meta.totalDist, runScrap: runScrap, scrap: meta.scrap,
        smashes: smashes, combo: combo, comboMult: comboMult(), nitro: nitro, nitroMax: statNitroMax(),
        zoneIdx: zoneIdx, zone: GF.t('z' + zoneIdx), props: props.length, debris: debris.length,
        dmg: +buggy.dmg.toFixed(2), partsLeft: (buggy.parts.wheelF + buggy.parts.wheelR + buggy.parts.cabin + buggy.parts.driver),
        spd: Math.round(Math.sqrt(buggy.vx * buggy.vx + buggy.vy * buggy.vy)), height: Math.round(-buggy.y), maxSpeed: Math.round(statMaxSpeed()),
        vehicle: meta.vehicle, up: curUp(), seenTut: seenTut, dailyStreak: meta.daily.streak, ownedDaily: meta.ownedDaily.length,
        ownedCars: meta.ownedCars.slice(), canBuy: (affordableNewCar() || {}).id || null, caps: curVeh().caps,
        items: meta.itemsInv.length, equipped: equipList(meta.vehicle).length, stars: prestigeStars(meta.vehicle),
        airTop: Math.round(airTop), airHigh: props.filter(function (p) { return p.air && !p.dead && -p.y > airTop * 0.5; }).length,
        bonus: { spd: +_bonus.spd.toFixed(2), nitro: _bonus.nitro, armor: _bonus.armor, scrap: +_bonus.scrap.toFixed(2) },
        unlockedVehicles: ALL_CARS.filter(vehUnlocked).map(function (v) { return v.id; }),
        GRAVITY: GRAVITY, LAUNCH_BASE: LAUNCH_BASE, LAUNCH_PER_LVL: LAUNCH_PER_LVL, NITRO_FORCE: NITRO_FORCE,
        BOUNCE: BOUNCE, ZONE_STEP: ZONE_STEP, SCRAP_PER_M: SCRAP_PER_M,
        statLaunch: Math.round(statLaunch()), statBounce: +statBounce().toFixed(2), statArmor: statArmor(),
      };
    });

    GF.exposeBot(
      function () {
        if (gs === 'MENU' || gs === 'GARAGE') return ['start'];
        if (gs === 'GAMEOVER') return ['retry'];
        if (phase === 'CHARGE') return ['launch'];
        if (phase === 'FLIGHT' && nitro > 0) return ['nitro'];
        return [];
      },
      function (a) {
        if (a === 'start' || a === 'retry') startRun();
        else if (a === 'launch') { charge = 0.9; chargeDir = 1; launch(); }
        else if (a === 'nitro') fireNitro();

    GF.exposeReach(function () {
      var W = GF.W, H = GF.H;

        var L = garageLayout();
        var items = garageRows.map(function (r, i) { return { id: (r.kind + '_' + (r.key || r.id || i)), x: r.x, y: r.y, w: r.w, h: r.h }; });
        uiButtons.forEach(function (b, i) { items.push({ id: 'pin_' + i, x: b.x, y: b.y, w: b.w, h: b.h, pinned: true }); });
        return { screen: 'garage', items: items, scrollId: 'garage', viewportH: L.vpH, screenH: H };
      }

    });
    GF.exposeTour([
      { name: 'menu', go: function () { gs = 'MENU'; helpOpen = false; } },
      { name: 'garage', go: function () { openGarage(); } },
      { name: 'gameover', go: function () { if (gs !== 'PLAYING') startRun(); endRun(); } },
    ]);
  },
  onUpdate: update,
  onDraw: draw,
});
