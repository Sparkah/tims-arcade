// ── PERSISTENT META (saved across sessions) ───────────────────────────────
var meta = {
  scrap: 0, bestDist: 0, totalDist: 0,
  carUp: {},                 // PER-CAR upgrades: carUp[carId] = {engine,nitro,armor,wheels,ramp}
  vehicle: 'buggy',
  ownedCars: ['buggy'],      // PURCHASED rides (scrap); daily-streak cars live in ownedDaily
  ownedDaily: [],            // daily-streak car ids the player has unlocked
  daily: { last: '', streak: 0 },
  itemsInv: [],              // CAR PARTS inventory: [{id,t,q}] found on the map or bought
  equip: {},                 // equip[carId] = [itemId, ...] (max 3 per car)
  shop: { day: '', offers: [] },  // daily rotating part shop
  prestige: {},              // prestige[carId] = stars (0..5)
  itemSeq: 1,
  quests: { day: '', list: [] }, // DAILY JOBS: [{t,goal,prog,reward,item,claimed}] seeded by local day
  idle: { since: 0, banked: 0 },  // OVERNIGHT ACCRUAL: crew scavenges scrap while away (capped)
  // M3 — MASTERY: lifetime XP earned from stunts -> permanent rank ladder -> global scrap %
  mastery: { xp: 0 },
  // M3 — weekly STUNT CARD: 3 escalating feats seeded by ISO week. Some track a
  // single run (best-of), some accumulate across the week. Reset each new week.
  stunts: { week: '', list: [] },
  // M3 — weekly EVENT: one world modifier picked by the ISO week, with a headline
  // target that grants a guaranteed rare part once (the FOMO return trigger).
  event: { week: '', prog: 0, claimed: false },
  // WRECK YARD: lifetime count of every prop type smashed across ALL runs. The core
  // destruction verb finally compounds into something owned + visible — see TROPHIES.
  wrecked: {},
};
function freshUp() { return { engine: 0, nitro: 0, armor: 0, wheels: 0, ramp: 0 }; }
function ensureCarUp(id) { if (!meta.carUp[id]) meta.carUp[id] = freshUp(); return meta.carUp[id]; }
function curUp() { return ensureCarUp(meta.vehicle); }
function loadMeta() {
  try {
    var raw = localStorage.getItem('crash_buggy_meta_v1');
    if (raw) {
      var s = JSON.parse(raw);
      if (s && typeof s === 'object') {
        meta.scrap = s.scrap | 0; meta.bestDist = s.bestDist | 0; meta.totalDist = s.totalDist | 0;
        if (typeof s.vehicle === 'string') meta.vehicle = s.vehicle;
        if (s.daily) { meta.daily.last = s.daily.last || ''; meta.daily.streak = s.daily.streak | 0; }
        if (Array.isArray(s.ownedDaily)) meta.ownedDaily = s.ownedDaily.slice();
        if (Array.isArray(s.ownedCars) && s.ownedCars.length) meta.ownedCars = s.ownedCars.slice();
        else {
          // v2 -> v3 migration: rides used to unlock FREE at total-distance milestones;
          // grandfather in anything the player had already reached so nothing is taken away.
          var LEGACY_UNLOCK = { muscle: 2000, truck: 7000, sled: 18000 };
          meta.ownedCars = ['buggy'];
          for (var lid in LEGACY_UNLOCK) if ((s.totalDist | 0) >= LEGACY_UNLOCK[lid]) meta.ownedCars.push(lid);
          if (typeof s.vehicle === 'string' && s.vehicle.charAt(0) !== 'd' && meta.ownedCars.indexOf(s.vehicle) < 0) meta.ownedCars.push(s.vehicle);
        }
        if (Array.isArray(s.itemsInv)) meta.itemsInv = s.itemsInv.filter(function (it) { return it && it.id && it.t; });
        if (s.equip && typeof s.equip === 'object') for (var eid in s.equip) if (Array.isArray(s.equip[eid])) meta.equip[eid] = s.equip[eid].slice(0, 3);
        if (s.shop && typeof s.shop === 'object') meta.shop = { day: s.shop.day || '', offers: Array.isArray(s.shop.offers) ? s.shop.offers : [] };
        if (s.prestige && typeof s.prestige === 'object') for (var pid in s.prestige) meta.prestige[pid] = s.prestige[pid] | 0;
        if (typeof s.itemSeq === 'number') meta.itemSeq = s.itemSeq | 0;
        if (s.quests && typeof s.quests === 'object' && Array.isArray(s.quests.list)) meta.quests = { day: s.quests.day || '', list: s.quests.list };
        if (s.idle && typeof s.idle === 'object') meta.idle = { since: s.idle.since | 0, banked: s.idle.banked | 0 };
        if (s.mastery && typeof s.mastery === 'object') meta.mastery = { xp: Math.max(0, s.mastery.xp | 0) };

// ── WORLD GENERATION ──────────────────────────────────────────────────────

}
function generateAhead() {

  var roll = Math.random();

  // M3 "TNT Frenzy" event widens the TNT band (double the blasts)

  }

// ── AERIAL OBSTACLES (high sky lane) ───────────────────────────────────────
function pushAir(type, x, y, w, h, mass, scrapVal, vx, vy) {

function spawnAir(x, z) {

// ── CAMERA ────────────────────────────────────────────────────────────────
function updateCamera() {
  var spd = Math.sqrt(buggy.vx * buggy.vx + buggy.vy * buggy.vy);
  var targetScale = clamp(1.34 - spd / 8200 - (-buggy.y) / 3600, 0.66, 1.46);
  camScale = lerp(camScale, targetScale, 0.07);
  scl = GF.S * camScale;
  camX = lerp(camX, buggy.x - (GF.W * 0.38) / scl, phase === 'CHARGE' ? 0.22 : 0.16);
  var rawCamY = buggy.y - (GF.H * 0.48) / scl;   // buggy ~48% when airborne
  var maxCamY = 0 - (GF.H * 0.74) / scl;          // ground pinned ~74% when low
  camY = Math.min(rawCamY, maxCamY);
}
function sx(wx) { return (wx - camX) * scl; }
function sy(wy) { return (wy - camY) * scl; }

// ── UPDATE ────────────────────────────────────────────────────────────────

  if (helpOpen) return;

  if (launchFlash > 0) launchFlash -= dt;
  // hurt driver drips red voxel flecks until the run ends (or he does)
  if ((buggy.bleeding || buggy.driverDead) && buggy.parts.driver) {
    buggy.bleedT -= dt;
    if (buggy.bleedT <= 0) { buggy.bleedT = buggy.driverDead ? 0.5 : 0.28; spawnPuff(buggy.x + R(-6, 6), buggy.y - BUGGY_H * 0.6, 1, '#c0392b'); }
  }

  if (phase === 'CHARGE') {

function drawMiniBuggyColored(c, X, Y, u, v) {

  voxBox(c, -w / 2, -h * 0.2, w, h * 0.5, v.body, 0.26);
  voxBox(c, -w * 0.18, -h * 0.62, w * 0.46, h * 0.45, v.accent, 0.2);
  c.fillStyle = '#f2c39b'; c.fillRect(-w * 0.02, -h * 0.92, 11 * u, 11 * u);

// WRECK YARD junk mountain for the menu — chunk count scales (log) with lifetime

// trophy families the player has actually smashed.
function drawWreckPile(c, X, baseY, u) {
  var total = trophyTotalWrecks();
  if (total <= 0) return;
  var n = Math.min(64, Math.round(6 + Math.log(1 + total) * 7));   // grows, capped
  // colours weighted by what THIS player wrecked most
  var pal = [], i;
  for (i = 0; i < TROPHIES.length; i++) { var cnt = wreckCount(TROPHIES[i].fam); if (cnt > 0) pal.push(TROPHIES[i].col); }
  if (!pal.length) pal = ['#b9803f'];
  var seed = 1337, rnd = function () { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };
  var W = Math.min(GF.W * 0.7, (90 + n * 2.2) * u * 0.5);          // heap half-width

  for (i = 0; i < n; i++) {

    var bx = X + fx * W;
    var by = baseY - rnd() * heap * pileH;
    var s = (3 + rnd() * 4) * u * 0.5;
    c.fillStyle = pal[(Math.floor(rnd() * pal.length)) % pal.length];
    c.globalAlpha = 0.78 + rnd() * 0.22;
    c.fillRect(bx - s / 2, by - s, s, s);
    // a darker facet for voxel read
    c.globalAlpha *= 0.5; c.fillStyle = '#000';

}

  var W = GF.W, S = GF.S, ir = clamp(13 * S, 11, 17), my = clamp(30 * S, 24, 46);

  uiButtons.push({ x: mx - mHalf, y: my - mHalf, w: mHalf * 2, h: mHalf * 2, fn: toggleMute });
  c.beginPath(); c.arc(qx, my, ir, 0, 6.28); c.fillStyle = 'rgba(20,28,44,0.6)'; c.fill(); c.strokeStyle = '#9fb2c8'; c.lineWidth = 1.4 * S; c.stroke();

// ── DAILY ─────────────────────────────────────────────────────────────────
function todayStr() { try { var d = new Date(), m = d.getMonth() + 1, dd = d.getDate(); return d.getFullYear() + '-' + (m < 10 ? '0' + m : m) + '-' + (dd < 10 ? '0' + dd : dd); } catch (e) { return ''; } }  // LOCAL day (not UTC) so the daily resets at the player's midnight
function dailyReady() { return meta.daily.last !== todayStr(); }
function claimDaily() {
  if (!dailyReady()) { GF.sfx('error'); return; }
  var today = todayStr(), prev = meta.daily.last, streak = meta.daily.streak, cont = false;
  if (prev) { try { var pd = new Date(prev + 'T00:00:00'), td = new Date(today + 'T00:00:00'); cont = Math.round((td - pd) / 86400000) === 1; } catch (e) {} }
  streak = cont ? streak + 1 : 1;
  var reward = Math.min(400, 60 + (streak - 1) * 40);
  meta.daily.last = today; meta.daily.streak = streak; meta.scrap += reward;
  // grant the daily-streak car for this day (1..7) — return daily for a week to earn the Mega GT
  var day = Math.min(7, streak), dcar = DAILY_CARS[day - 1], gotCar = false;
  if (dcar && meta.ownedDaily.indexOf(dcar.id) < 0) { meta.ownedDaily.push(dcar.id); ensureCarUp(dcar.id); gotCar = true; }
  saveMeta();
  GF.sfx('reward'); flashScrap = reward; flashScrapT = 1.6;
  if (gotCar) { GF.sfx('unlock'); flashCar = dcar.id; flashCarT = 2.6; }
  ensureIdle();   // claiming the daily also banks the overnight crew (so the menu is "clean" after)
}

// ── DAILY JOBS (quests) — 3 per local day, seeded so the FIRST is ~mostly done

// the 3rd). The unclaimed jobs are a concrete reason to come back tomorrow. ──
var QUEST_POOL = [
  { t: 'dist',  mk: function (h) { return 400 + (h % 5) * 200; },  rw: function (g) { return 120 + Math.floor(g / 6); } },
  { t: 'smash', mk: function (h) { return 25 + (h % 4) * 12; },     rw: function (g) { return 90 + g * 4; } },
  { t: 'nitro', mk: function (h) { return 4 + (h % 4) * 2; },       rw: function (g) { return 100 + g * 18; } },
  { t: 'tnt',   mk: function (h) { return 2 + (h % 3); },           rw: function (g) { return 130 + g * 40; } },
  { t: 'zone',  mk: function (h) { return 1 + (h % 4); },           rw: function (g) { return 110 + g * 70; } },
  { t: 'scrap', mk: function (h) { return 500 + (h % 5) * 250; },   rw: function (g) { return 80 + Math.floor(g / 8); } },
  { t: 'gold',  mk: function (h) { return 1 + (h % 3); },           rw: function (g) { return 120 + g * 60; } },
];
function ensureQuests() {

  var h = dayHash(d + 'q'), used = {}, list = [];
  for (var i = 0; i < 3; i++) {
    var qi = (h >> (i * 4)) % QUEST_POOL.length;
    while (used[qi]) qi = (qi + 1) % QUEST_POOL.length;   // 3 DISTINCT job types
    used[qi] = 1;
    var def = QUEST_POOL[qi], goal = def.mk((h >> (i * 3 + 1)) & 0xff);
    var q = { t: def.t, goal: goal, prog: 0, reward: def.rw(goal), item: i === 2, claimed: false };
    if (i === 0) q.prog = Math.floor(goal * 0.7);   // first job pre-filled ~70% — instant momentum

}
function questText(q) {
  if (q.t === 'zone') return GF.t('q_zone').replace('{z}', GF.t('z' + Math.min(7, q.goal)));
  return GF.t('q_' + q.t).replace('{n}', q.goal);
}

    var q = l[i];

    if (type === 'zone') { if (n > q.prog) { q.prog = Math.min(q.goal, n); changed = true; } }
    else { q.prog = Math.min(q.goal, q.prog + (n || 1)); changed = true; }
  }

}

  ensureQuests(); var q = meta.quests.list[i];
  if (!q || !questReady(q)) { GF.sfx('error'); return; }
  q.claimed = true; meta.scrap += q.reward;
  flashScrap = q.reward; flashScrapT = 1.6;
  if (q.item && meta.itemsInv.length < INV_CAP) { meta.itemsInv.push({ id: 'i' + (meta.itemSeq++), t: ITEM_KEYS[dayHash(todayStr() + 'qi') % ITEM_KEYS.length], q: 1 + (questsReadyCount() % 2) }); GF.sfx('unlock'); }
  saveMeta(); GF.sfx('reward');

// ── OVERNIGHT IDLE ACCRUAL — the crew scavenges scrap while you're away. Rate
// scales with your reach (bestDist); capped at ~10h (the cap IS the return
// trigger). Open tomorrow to a pile + COLLECT it. ──
var IDLE_CAP_S = 10 * 3600;          // 10 hours of accrual, then it stops (come back to collect)
// scrap/sec: tuned so a FULL 10h pile is a nice bonus (~540 at reach 0, ~3960 at reach 6km+),
// never an economy-breaker vs the car sinks (Muscle 2500 / Sled 28000) — it's a top-up, not a payday.
function idleRate() { return 0.015 + Math.min(0.9, meta.bestDist / 6000) * 0.095; }
function now() { return Date.now(); }
function ensureIdle() {            // bank whatever the crew earned since last seen, start a fresh window
  var t = now();
  if (!meta.idle.since) { meta.idle.since = t; saveMeta(); return; }
  var elapsed = Math.min(IDLE_CAP_S, Math.max(0, (t - meta.idle.since) / 1000));
  meta.idle.banked = Math.min(99999, (meta.idle.banked | 0) + Math.floor(elapsed * idleRate()));
  meta.idle.since = t; saveMeta();
}
function idlePreview() {           // unbanked scrap sitting in the crew's pile right now (for display)
  var t = now(), elapsed = meta.idle.since ? Math.min(IDLE_CAP_S, Math.max(0, (t - meta.idle.since) / 1000)) : 0;
  return (meta.idle.banked | 0) + Math.floor(elapsed * idleRate());
}
function idleFull() { return meta.idle.since && (now() - meta.idle.since) / 1000 >= IDLE_CAP_S; }
function collectIdle() {
  ensureIdle();
  var amt = meta.idle.banked | 0;
  if (amt <= 0) { GF.sfx('error'); return; }
  meta.scrap += amt; meta.idle.banked = 0; meta.idle.since = now();
  flashScrap = amt; flashScrapT = 1.8; saveMeta(); GF.sfx('reward'); GF.sfx('coin');
}

// ── M3: MASTERY RANK + WEEKLY STUNT CARD + WEEKLY EVENT ────────────────────
// A long-horizon depth layer layered on the proven loop: weekly STUNT feats pay
// scrap + lifetime MASTERY XP -> a permanent rank ladder granting a small global
// scrap %; a weekly EVENT modifier changes every run (FOMO return trigger) and
// hands a guaranteed rare part for hitting its goal. All seeded by ISO week so
// the content rotates on its own, no server.
function isoWeekStr() {
  // ISO-8601 week key "YYYY-Www" in LOCAL time, so the weekly card flips at the
  // player's Monday (rotation = the cross-session reason to return).
  try {
    var d = new Date(); d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7));      // shift to the week's Thursday
    var wk1 = new Date(d.getFullYear(), 0, 4);
    var wn = 1 + Math.round(((d - wk1) / 86400000 - 3 + ((wk1.getDay() + 6) % 7)) / 7);
    return d.getFullYear() + '-W' + (wn < 10 ? '0' + wn : wn);
  } catch (e) { return '1970-W01'; }
}
// MASTERY: cumulative XP -> rank. Rank N needs RANK_XP[N] total XP. +3% scrap/rank.
var RANK_XP = [0, 200, 600, 1400, 3000, 6000];      // 6 ranks (0..5)
function masteryRank() { var xp = meta.mastery.xp | 0, r = 0; for (var i = 1; i < RANK_XP.length; i++) if (xp >= RANK_XP[i]) r = i; return r; }
function masteryPerk() { return masteryRank() * 0.03; }                 // global scrap multiplier
function rankNextXp() { var r = masteryRank(); return r >= RANK_XP.length - 1 ? 0 : RANK_XP[r + 1]; }
function addMasteryXp(n) {
  if (n <= 0) return;
  var before = masteryRank();
  meta.mastery.xp = Math.min(999999, (meta.mastery.xp | 0) + (n | 0));
  if (masteryRank() > before) { GF.sfx('win'); GF.sfx('levelup'); flashRank = masteryRank(); flashRankT = 2.6; recalcBonus(); }
}
// WEEKLY STUNT CARD — 3 escalating feats. mode 'run' = single-run best (compare
// peak this run); mode 'week' = accumulate across the week. ──
var STUNT_POOL = [
  { t: 'far',    mode: 'run',  mk: function (h) { return 900 + (h % 6) * 250; }, xp: function (g) { return 60 + Math.floor(g / 12); }, rw: function (g) { return 140 + Math.floor(g / 5); } },
  { t: 'combo',  mode: 'run',  mk: function (h) { return 5 + (h % 4); },         xp: function (g) { return 70 + g * 12; },             rw: function (g) { return 150 + g * 20; } },
  { t: 'high',   mode: 'run',  mk: function (h) { return 350 + (h % 5) * 120; }, xp: function (g) { return 70 + Math.floor(g / 8); },  rw: function (g) { return 150 + Math.floor(g / 4); } },
  { t: 'zoneW',  mode: 'run',  mk: function (h) { return 2 + (h % 4); },         xp: function (g) { return 80 + g * 30; },             rw: function (g) { return 160 + g * 60; } },
  { t: 'smashW', mode: 'week', mk: function (h) { return 120 + (h % 6) * 60; },  xp: function (g) { return 80 + Math.floor(g / 3); },  rw: function (g) { return 200 + g * 2; } },
  { t: 'tntW',   mode: 'week', mk: function (h) { return 10 + (h % 6) * 4; },    xp: function (g) { return 90 + g * 8; },              rw: function (g) { return 220 + g * 18; } },
  { t: 'goldW',  mode: 'week', mk: function (h) { return 6 + (h % 5) * 3; },     xp: function (g) { return 90 + g * 12; },             rw: function (g) { return 220 + g * 26; } },
  { t: 'nitroW', mode: 'week', mk: function (h) { return 30 + (h % 6) * 12; },   xp: function (g) { return 80 + g * 3; },              rw: function (g) { return 200 + g * 6; } },
];
function ensureStunts() {
  var wk = isoWeekStr();
  if (meta.stunts.week === wk && meta.stunts.list && meta.stunts.list.length === 3) return;
  var h = dayHash(wk + 's'), used = {}, list = [];
  for (var i = 0; i < 3; i++) {
    var si = (h >> (i * 4)) % STUNT_POOL.length;
    while (used[si]) si = (si + 1) % STUNT_POOL.length;       // 3 distinct feats
    used[si] = 1;
    var def = STUNT_POOL[si], goal = def.mk((h >> (i * 3 + 1)) & 0xff);
    list.push({ t: def.t, mode: def.mode, goal: goal, prog: 0, xp: def.xp(goal), reward: def.rw(goal), claimed: false });
  }
  meta.stunts = { week: wk, list: list }; saveMeta();
}
function stuntText(q) {
  if (q.t === 'zoneW') return GF.t('sc_zoneW').replace('{z}', GF.t('z' + Math.min(7, q.goal)));
  return GF.t('sc_' + q.t).replace('{n}', q.goal);
}
function stuntReady(q) { return q.prog >= q.goal && !q.claimed; }
function stuntsReadyCount() { ensureStunts(); var n = 0, l = meta.stunts.list; for (var i = 0; i < l.length; i++) if (stuntReady(l[i])) n++; return n; }
function stuntsOpenCount() { ensureStunts(); var n = 0, l = meta.stunts.list; for (var i = 0; i < l.length; i++) if (!l[i].claimed) n++; return n; }
// advance weekly stunts. 'week' types add; 'run' types take the MAX seen (peak).
function stuntProgress(type, v, isRunPeak) {

    var q = l[i];
    if (q.t !== type || q.claimed || q.prog >= q.goal) continue;
    if (q.mode === 'run' || isRunPeak) { if (v > q.prog) { q.prog = Math.min(q.goal, v); changed = true; } }

  }
  if (changed) saveMeta();
}
function claimStunt(i) {

  if (!q || !stuntReady(q)) { GF.sfx('error'); return; }
  q.claimed = true; meta.scrap += q.reward;
  flashScrap = q.reward; flashScrapT = 1.6;
  saveMeta(); GF.sfx('reward');
  addMasteryXp(q.xp);     // the depth payoff: stunts feed the permanent rank
}
// WEEKLY EVENT — one world modifier active all week, picked by the ISO week. The
// modifier changes EVERY run; the headline target grants a guaranteed rare part. ──
var EVENTS = [
  { id: 'tnt',   goal: 14, gtype: 'tnt'   },   // blow up N TNT this week
  { id: 'grav',  goal: 2200, gtype: 'far' },   // reach N m total-best this week (run peak)
  { id: 'gold',  goal: 8,  gtype: 'gold'  },   // crack N gold crates this week
  { id: 'turbo', goal: 2000, gtype: 'far' },
  { id: 'combo', goal: 7,  gtype: 'combo' },   // hit a x7 combo (run peak)
];
function ensureEvent() {
  var wk = isoWeekStr();
  if (meta.event.week === wk) return;
  meta.event = { week: wk, prog: 0, claimed: false }; saveMeta();
}
function curEvent() { ensureEvent(); return EVENTS[dayHash(isoWeekStr() + 'e') % EVENTS.length]; }
function eventGoal() { return curEvent().goal; }
function eventReady() { ensureEvent(); return meta.event.prog >= eventGoal() && !meta.event.claimed; }
function eventProgress(gtype, v, isRunPeak) {
  ensureEvent(); var ev = curEvent();
  if (ev.gtype !== gtype || meta.event.claimed || meta.event.prog >= ev.goal) return;
  if (isRunPeak) { if (v > meta.event.prog) { meta.event.prog = Math.min(ev.goal, v); saveMeta(); } }
  else { meta.event.prog = Math.min(ev.goal, meta.event.prog + (v || 1)); saveMeta(); }
}
function claimEventReward() {
  if (!eventReady()) { GF.sfx('error'); return; }
  meta.event.claimed = true;
  // guaranteed RARE (tier 3) part — overflow auto-scraps like every other grant
  if (meta.itemsInv.length < INV_CAP) { meta.itemsInv.push({ id: 'i' + (meta.itemSeq++), t: ITEM_KEYS[dayHash(isoWeekStr() + 'ei') % ITEM_KEYS.length], q: 3 }); GF.sfx('unlock'); }
  else { meta.scrap += 680; }
  saveMeta(); GF.sfx('reward'); GF.sfx('win');
  addMasteryXp(120);
}
// event modifiers read live during a run (cheap getters, evaluated where they matter)
function evTntBonus() { return curEvent().id === 'tnt'; }            // double TNT spawn weight
function evGoldBonus() { return curEvent().id === 'gold'; }          // double gold-crate weight

// ── INPUT ─────────────────────────────────────────────────────────────────
var downX = 0, downY = 0, dragScroll = false;
function onDown(x, y) {
  downX = x; downY = y; dragScroll = false;
  if (helpOpen) { for (var i = 0; i < uiButtons.length; i++) if (hit(uiButtons[i], x, y)) { uiButtons[i].fn(); return; } return; }
  if (itemInfo) { for (var ii = 0; ii < infoButtons.length; ii++) if (hit(infoButtons[ii], x, y)) { GF.sfx('click'); infoButtons[ii].fn(); return; } itemInfo = null; return; }
  if (lbOpen) { for (var li = 0; li < lbButtons.length; li++) if (hit(lbButtons[li], x, y)) { GF.sfx('click'); lbButtons[li].fn(); return; } lbOpen = false; return; }
  if (GF.tutorial.active) { var b = GF.tutorial._skipBtn; if (b && hit(b, x, y)) { GF.tutorial.handleClick(x, y); return; } }
  if (gs === 'GARAGE') {
    for (var k = 0; k < uiButtons.length; k++) if (hit(uiButtons[k], x, y)) { GF.sfx('click'); uiButtons[k].fn(); return; }
    if (garageScroll && garageScroll.contains(x, y)) garageScroll.dragStart(y);
    return;
  }
  if (gs === 'PLAYING') {
    for (var h = 0; h < hudButtons.length; h++) if (hit(hudButtons[h], x, y)) { hudButtons[h].fn(); return; }
    if (phase === 'CHARGE') { held = true; if (charge === 0) { charge = 0.15; chargeDir = 1; } }
    else fireNitro();
    return;
  }
  for (var j = 0; j < uiButtons.length; j++) if (hit(uiButtons[j], x, y)) { GF.sfx('click'); uiButtons[j].fn(); return; }
}
function onMove(x, y) {
  if (gs === 'GARAGE' && garageScroll && garageScroll.isDragging()) {
    if (Math.abs(y - downY) > 6 * GF.S) dragScroll = true;
    garageScroll.dragMove(y);
  }
}
function onUp(x, y) {
  if (itemInfo || lbOpen) return;   // overlays own the input; handled in onDown
  if (gs === 'GARAGE' && garageScroll) {
    var wasDrag = dragScroll; garageScroll.dragEnd();
    if (!wasDrag && garageScroll.contains(x, y)) {
      var cy = garageScroll.screenToContentY(y);
      // (i) badges sit INSIDE item cells, so resolve them in a first pass or
      // the cell underneath would always swallow the tap.
      for (var p = 0; p < garageRows.length; p++) {
        var ri = garageRows[p];
        if (ri.kind === 'info' && x >= ri.x && x <= ri.x + ri.w && cy >= ri.y && cy <= ri.y + ri.h) {
          itemInfo = ri.info; infoButtons = []; GF.sfx('click'); return;
        }
      }
      for (var i = 0; i < garageRows.length; i++) {
        var r = garageRows[i];
        if (r.kind !== 'info' && x >= r.x && x <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
          if (r.kind === 'buy') buyUpgrade(r.key);
          else if (r.kind === 'veh') equipVehicle(r.id);
          else if (r.kind === 'prestige') doPrestige();
          else if (r.kind === 'slot') unequipSlot(r.idx);
          else if (r.kind === 'inv') tapInv(r.id);
          else if (r.kind === 'shop') buyOffer(r.idx);
          else if (r.kind === 'quest') claimQuest(r.idx);
          else if (r.kind === 'idle') collectIdle();
          else if (r.kind === 'stunt') claimStunt(r.idx);
          else if (r.kind === 'event') claimEventReward();
          return;

var canvasEl = document.getElementById('c');
canvasEl.addEventListener('touchstart', function (e) { e.preventDefault(); var t = e.changedTouches[0]; onDown(t.clientX, t.clientY); }, { passive: false });
canvasEl.addEventListener('touchmove', function (e) { e.preventDefault(); var t = e.changedTouches[0]; onMove(t.clientX, t.clientY); }, { passive: false });
canvasEl.addEventListener('touchend', function (e) { e.preventDefault(); var t = e.changedTouches[0]; onUp(t.clientX, t.clientY); }, { passive: false });
canvasEl.addEventListener('touchcancel', function (e) { e.preventDefault(); var t = (e.changedTouches && e.changedTouches[0]) || { clientX: downX, clientY: downY }; onUp(t.clientX, t.clientY); held = false; }, { passive: false });
canvasEl.addEventListener('mousedown', function (e) { onDown(e.clientX, e.clientY); });
canvasEl.addEventListener('mousemove', function (e) { if (e.buttons) onMove(e.clientX, e.clientY); });
canvasEl.addEventListener('mouseup', function (e) { onUp(e.clientX, e.clientY); });
// mouse-wheel / trackpad scrolling for the garage list (drag already works; desktop
// players expect the wheel to scroll too — Tim 2026-06-10)
canvasEl.addEventListener('wheel', function (e) {
  e.preventDefault();

  if (e.deltaMode === 1) dy *= 18; else if (e.deltaMode === 2) dy *= GF.H;   // lines/pages -> px
  garageScroll.handleWheel(dy);

document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
document.addEventListener('keydown', function (e) {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Enter') {
    e.preventDefault();
    if (e.repeat) return;
    if (helpOpen) { helpOpen = false; return; }
    if (itemInfo) { itemInfo = null; return; }
    if (lbOpen) { lbOpen = false; return; }
    if (gs === 'MENU') startRun();
    else if (gs === 'GAMEOVER') onRetry();
    else if (gs === 'GARAGE') startRun();
    else if (gs === 'PLAYING') { if (phase === 'CHARGE') { held = true; if (charge === 0) { charge = 0.15; chargeDir = 1; } } else fireNitro(); }
  } else if (e.code === 'KeyM') { toggleMute(); }
});
document.addEventListener('keyup', function (e) {
  if ((e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Enter') && gs === 'PLAYING' && phase === 'CHARGE' && held) launch();
});

// ── SCREENSHOT / TEST HOOKS ───────────────────────────────────────────────
window._setupForScreenshot = function (level) {
  window._silent = true; seenTut = true; helpOpen = false;
  var lv = level || 3;
  meta.totalDist = Math.max(meta.totalDist, 2000);
  var su = ensureCarUp(meta.vehicle); su.engine = Math.max(su.engine, 4); su.nitro = Math.max(su.nitro, 2);
  resetRun();
  gs = 'PLAYING'; phase = 'FLIGHT';
  dist = 140 + lv * 70; zoneIdx = zoneOf(dist); prevZoneIdx = zoneIdx;
  buggy.x = startX + dist * PX_PER_M; buggy.y = -150; buggy.vx = 620; buggy.vy = -30;
  buggy.onGround = false; buggy.rot = -0.16;
  buggy.dmg = 0.5; buggy.parts.wheelF = false;   // battle-damaged: showcases breakability
  props = []; var bx = buggy.x;
  // a tall crate column the buggy is plowing through — fills the frame vertically
  for (var ci = 0; ci < 7; ci++) pushProp('crate', bx + 72, -34 - ci * 34, 34, 34, 1, 3);
  // a skyscraper (air obstacle) rising into the flight path on the right
  pushProp('tower', bx + 196, -300, 70, 300, 3, 18);
  // mid + high props bracketing the buggy (no empty vertical gap)
  pushProp('tnt',   bx + 148, -150, 30, 30, 1, 9);
  pushProp('tire',  bx + 232, -210, 40, 40, 1, 5);
  pushProp('crate', bx - 34,  -120, 34, 34, 1, 3);
  pushProp('sign',  bx + 28,  -54, 10, 54, 0, 2);
  // ground clutter so the lower band is full of props, not bare grass
  pushProp('car',    bx + 110, -40, 78, 40, 3, 16);
  pushProp('barrel', bx + 256, -40, 28, 40, 1, 6);
  pushProp('cone',   bx + 320, -30, 24, 30, 0, 2); pushProp('cone', bx + 346, -30, 24, 30, 0, 2);
  pushProp('boost',  bx + 410, -14, 54, 14, 0, 4);
  pushProp('car',    bx - 132, -40, 78, 40, 3, 16);
  // aerial obstacles up in the sky (showcase the new content)
  pushAir('plane', bx + 150, -300, 132, 32, 2, 18);
  pushAir('bird',  bx - 60,  -250, 26, 18, 0, 4); pushAir('bird', bx - 26, -262, 26, 18, 0, 4);
  pushAir('comet', bx + 70,  -250, 30, 30, 1, 12);
  frontX = bx + 520; generateAhead();
  combo = 5; comboT = COMBO_WINDOW; runScrap = 240 + lv * 30; smashes = 12 + lv; nitro = 2;
  // explosion debris frozen mid-air around the buggy
  debris = [];
  for (var i = 0; i < 18; i++) spawnDebris(bx - 6, -170, 60, 90, i % 3 === 0 ? '#ff5a2e' : (i % 3 === 1 ? '#b9803f' : '#7b8aa0'), 1);
  spawnPart(bx + 40, -120, WHEEL_R * 1.8, curVeh().wheel);   // the knocked-off front wheel tumbling
  for (var j = 0; j < 8; j++) spawnFlame(bx - 26, buggy.y + R(-8, 10));
  launchFlash = 0.45;
  // force a tight, ground-anchored framed camera, then FREEZE so the live loop
  // can't drift it. Zoomed (1.5) so the action band fills the tall portrait frame
  // and the buggy sits ~mid-screen with skyline+ground props below.
  camScale = 1.5; scl = GF.S * camScale;
  camX = buggy.x - (GF.W * 0.32) / scl;
  camY = 0 - (GF.H * 0.82) / scl;
  window.__shotFreeze = true;
};
window._jumpLevel = function (n) {
  helpOpen = false; window.__shotFreeze = false;
  if (n === 99) { if (gs !== 'PLAYING') startRun(); endRun(); return; }
  window._setupForScreenshot(n || 3);
};
window._setLang = function (l) { GF.lang = (l === 'ru' ? 'ru' : 'en'); };
window._setState = function (s) { if (s) gs = s; };
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return 'Inter, system-ui, sans-serif'; };
window.__openTut = function () { helpOpen = true; };
window.__closeTut = function () { helpOpen = false; };
// ── TEST SEAMS (test-only; never used by gameplay) ────────────────────────
window.__cbAddItem = function (t, q) { var it = grantRandomItem(zoneIdx, t, q); return it && it.id; };
window.__cbTapInv = function (id) { tapInv(id); return equipList(meta.vehicle).slice(); };
window.__cbBuyOffer = function (i) { ensureShop(); buyOffer(i); return meta.shop.offers.map(function (o) { return { t: o.t, q: o.q, sold: o.sold }; }); };
window.__cbPrestige = function () { doPrestige(); return { stars: prestigeStars(meta.vehicle), up: curUp() }; };
window.__cbMaxUp = function () { var u = curUp(); for (var i = 0; i < UPGRADES.length; i++) u[UPGRADES[i].key] = capFor(UPGRADES[i].key); saveMeta(); recalcBonus(); };
window.__cbAddScrap = function (n) { meta.scrap += (n | 0); saveMeta(); return meta.scrap; };
window.__cbBuyCar = function (id) { equipVehicle(id); return { owned: meta.ownedCars.slice(), vehicle: meta.vehicle, scrap: meta.scrap }; };
// M3 test seams (test-only; never used by gameplay)
window.__cbMastery = function () { return { rank: masteryRank(), xp: meta.mastery.xp, perk: masteryPerk() }; };
window.__cbAddXp = function (n) { addMasteryXp(n | 0); return { rank: masteryRank(), xp: meta.mastery.xp }; };
window.__cbStunts = function () { ensureStunts(); return meta.stunts.list.map(function (q) { return { t: q.t, prog: q.prog, goal: q.goal, claimed: q.claimed }; }); };

// ── BOOT ──────────────────────────────────────────────────────────────────
loadMeta();
ensureIdle();      // bank whatever the crew scavenged while away into the holding pile (collect on the menu)
ensureQuests();    // seed today's daily jobs (first one ~70% pre-filled)
ensureStunts();    // M3: seed this week's stunt card (rotates by ISO week)

try { seenTut = (localStorage.getItem('crash_buggy_seen_tut') === '1'); } catch (e) {}

GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: [],
  saveKey: 'crash_buggy',
  onReady: function () {
    // Save the REAL screen. Restore into GARAGE only when the player genuinely
    // left there AND this isn't a platform build: __GF_AUTOSTART sessions must
    // ALWAYS land in gameplay (rule #9 boot-to-play). The old getter mapped
    // PLAYING/GAMEOVER -> 'GARAGE' ("come spend your scrap"), so EVERY return

      ['pointerdown','keydown','touchstart','mousedown'].forEach(function(ev){ document.addEventListener(ev, go, true); }); })();

    if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU') startRun();

    GF.exposeState(function () {
      return {
        gs: gs, phase: phase, dist: dist, distance: dist, score: runScrap + Math.floor(dist * SCRAP_PER_M),
        bestDist: meta.bestDist, totalDist: meta.totalDist, runScrap: runScrap, scrap: meta.scrap,
        smashes: smashes, combo: combo, comboMult: comboMult(), nitro: nitro, nitroMax: statNitroMax(),
        zoneIdx: zoneIdx, zone: GF.t('z' + zoneIdx), props: props.length, debris: debris.length,
        dmg: +buggy.dmg.toFixed(2), partsLeft: (buggy.parts.wheelF + buggy.parts.wheelR + buggy.parts.cabin + buggy.parts.driver),
        spd: Math.round(Math.sqrt(buggy.vx * buggy.vx + buggy.vy * buggy.vy)), height: Math.round(-buggy.y), maxSpeed: Math.round(statMaxSpeed()),
        vehicle: meta.vehicle, up: curUp(), seenTut: seenTut, dailyStreak: meta.daily.streak, ownedDaily: meta.ownedDaily.length,
        questsReady: questsReadyCount(), questsOpen: questsOpenCount(), idlePile: idlePreview(), idleFull: !!idleFull(),
        masteryRank: masteryRank(), masteryXp: meta.mastery.xp | 0, masteryPerk: +masteryPerk().toFixed(2),

        items: meta.itemsInv.length, equipped: equipList(meta.vehicle).length, stars: prestigeStars(meta.vehicle),
        wreckTotal: trophyTotalWrecks(), trophies: trophyTotalEarned(), trophyBonus: +trophyScrapBonus().toFixed(3),

    GF.exposeReach(function () {
      var W = GF.W, H = GF.H;
      if (lbOpen) {
        // leaderboard overlay owns the screen; its close button is the contract
        return { screen: 'leaderboard', items: lbButtons.map(function (b, i) { return { id: 'lb_' + i, x: b.x, y: b.y, w: b.w, h: b.h }; }), viewportH: H, screenH: H, scrollMaxY: 0 };
      }

        var items = garageRows.filter(function (r) { return r.kind !== 'info'; })
          .map(function (r, i) { return { id: (r.kind + '_' + (r.key || r.id || i)), x: r.x, y: r.y, w: r.w, h: r.h }; });
        uiButtons.forEach(function (b, i) { items.push({ id: 'pin_' + i, x: b.x, y: b.y, w: b.w, h: b.h, pinned: true }); });
        return { screen: 'garage', items: items, scrollId: 'garage', viewportH: L.vpH, screenH: H };
      }
      var its = uiButtons.map(function (b, i) { return { id: 'btn_' + i, x: b.x, y: b.y, w: b.w, h: b.h }; });
      return { screen: gs.toLowerCase(), items: its, viewportH: H, screenH: H, scrollMaxY: 0 };

      { name: 'leaderboard', go: function () { gs = 'MENU'; helpOpen = false; itemInfo = null; openLeaderboard(); } },
      { name: 'garage', go: function () { lbOpen = false; openGarage(); } },
      { name: 'gameover', go: function () { lbOpen = false; itemInfo = null; if (gs !== 'PLAYING') startRun(); endRun(); } },
    ]);
  },
  onUpdate: update,
  onDraw: draw,
});

})();
