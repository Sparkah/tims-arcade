// ── TUNABLES (exposed via GF.exposeState) ─────────────────────────────────
var GRAVITY = 1000;          // world-u/s^2 (down is +y; up is -y)
var LAUNCH_BASE = 880;       // launch speed (world-u/s) at full charge, lvl0
var LAUNCH_PER_LVL = 95;     // + launch speed per Engine level
var LAUNCH_ANGLE = 0.86;     // radians off horizontal (ramp), +per Ramp level
var CHARGE_RATE = 1.55;      // power meter 0->1 fill rate (then ping-pongs)
var NITRO_FORCE = 520;       // world-u/s impulse per nitro tap
var NITRO_BASE = 3;          // nitro charges per run at lvl0
var BOUNCE = 0.5;            // ground restitution, +per Wheels level
var GROUND_FRICTION = 0.84;  // horizontal damping per bounce
var AIR_DRAG = 0.18;         // horizontal air drag (per-second exponent)
var REST_SPEED = 55;         // world-u/s; below this + grounded = resting
var REST_SETTLE = 0.7;       // s under REST_SPEED before the run ends
var ARMOR_BASE = 1;          // prop mass smashable with little slow, +per Armor
var ZONE_STEP = 420;         // metres per zone
var SCRAP_PER_M = 0.45;      // scrap per metre at run end
var COMBO_WINDOW = 1.4;      // s; consecutive smashes keep the multiplier
var PX_PER_M = 10;           // world-u per metre
// hitboxes (world-u)
var BUGGY_W = 46, BUGGY_H = 30, WHEEL_R = 9;

// ── PERSISTENT META (saved across sessions) ───────────────────────────────
var meta = {
  scrap: 0, bestDist: 0, totalDist: 0,
  up: { engine: 0, nitro: 0, armor: 0, wheels: 0, ramp: 0 },
  vehicle: 'buggy',
  daily: { last: '', streak: 0 },
};
function loadMeta() {
  try {
    var raw = localStorage.getItem('crash_buggy_meta_v1');
    if (raw) {
      var s = JSON.parse(raw);
      if (s && typeof s === 'object') {
        meta.scrap = s.scrap | 0; meta.bestDist = s.bestDist | 0; meta.totalDist = s.totalDist | 0;
        if (s.up) for (var k in meta.up) if (typeof s.up[k] === 'number') meta.up[k] = s.up[k] | 0;
        if (typeof s.vehicle === 'string') meta.vehicle = s.vehicle;
        if (s.daily) { meta.daily.last = s.daily.last || ''; meta.daily.streak = s.daily.streak | 0; }
      }
    }
  } catch (e) {}
}
function saveMeta() { try { localStorage.setItem('crash_buggy_meta_v1', JSON.stringify(meta)); } catch (e) {} }

// ── UPGRADE + VEHICLE CONFIG ──────────────────────────────────────────────
var UPGRADES = [
  { key: 'engine', max: 8, base: 95,  growth: 1.55 },
  { key: 'nitro',  max: 5, base: 135, growth: 1.66 },
  { key: 'armor',  max: 6, base: 115, growth: 1.6  },
  { key: 'wheels', max: 6, base: 105, growth: 1.55 },
  { key: 'ramp',   max: 5, base: 150, growth: 1.62 },
];
function upCost(u) { return Math.floor(u.base * Math.pow(u.growth, meta.up[u.key])); }
function upMaxed(u) { return meta.up[u.key] >= u.max; }

var VEHICLES = [
  { id: 'buggy',  unlock: 0,     launchMul: 1.00, bounceMul: 1.00, armorAdd: 0, nitroAdd: 0, body: '#e8862e', accent: '#ffd166', wheel: '#2b2b33' },
  { id: 'muscle', unlock: 2000,  launchMul: 1.18, bounceMul: 0.92, armorAdd: 1, nitroAdd: 0, body: '#d23b3b', accent: '#ffe0e0', wheel: '#1d1d24' },
  { id: 'truck',  unlock: 7000,  launchMul: 1.00, bounceMul: 1.38, armorAdd: 2, nitroAdd: 1, body: '#3fae5a', accent: '#bff0c8', wheel: '#15151b' },
  { id: 'sled',   unlock: 18000, launchMul: 1.46, bounceMul: 0.82, armorAdd: 0, nitroAdd: 2, body: '#33c6e0', accent: '#e6fbff', wheel: '#16323a' },
];
function vehById(id) { for (var i = 0; i < VEHICLES.length; i++) if (VEHICLES[i].id === id) return VEHICLES[i]; return VEHICLES[0]; }
function vehUnlocked(v) { return meta.totalDist >= v.unlock; }
function curVeh() { return vehById(meta.vehicle); }

// effective stats (vehicle + upgrades)
function statLaunch() { return (LAUNCH_BASE + meta.up.engine * LAUNCH_PER_LVL) * curVeh().launchMul; }
function statNitroMax() { return NITRO_BASE + meta.up.nitro + curVeh().nitroAdd; }
function statBounce() { return Math.min(0.78, (BOUNCE + meta.up.wheels * 0.035) * curVeh().bounceMul); }
function statRollKeep() { return Math.min(0.988, 0.86 + meta.up.wheels * 0.016); }
function statArmor() { return ARMOR_BASE + meta.up.armor + curVeh().armorAdd; }
function statAngle() { return Math.min(1.18, LAUNCH_ANGLE + meta.up.ramp * 0.02); }

// ── GAME STATE ────────────────────────────────────────────────────────────
var gs = 'MENU';             // MENU | PLAYING | GAMEOVER | GARAGE
var phase = 'CHARGE';        // within PLAYING: CHARGE | FLIGHT | REST
var buggy = { x: 0, y: 0, vx: 0, vy: 0, rot: 0, vr: 0, onGround: false, restT: 0,
  dmg: 0, parts: { wheelF: true, wheelR: true, cabin: true, driver: true } };
var startX = 0, dist = 0, runScrap = 0, smashes = 0, combo = 0, comboT = 0;
var nitro = 0, zoneIdx = 0, prevZoneIdx = 0;
var charge = 0, chargeDir = 1, held = false;
var props = [], debris = [], frontX = 0;
var camX = 0, camY = 0, camScale = 1, scl = 1;
var bannerT = 0, nitroHint = false, nitroHintT = 0, launchFlash = 0;
var tally = { dist: 0, smashes: 0, comboBonus: 0, scrap: 0, t: 0, best: false };
var seenTut = false, helpOpen = false;
var flashScrap = 0, flashScrapT = 0;
var _pendingAd = false;

var rr = GF.rr, clamp = GF.clamp, lerp = GF.lerp;
function R(a, b) { return a + (b - a) * Math.random(); }
function RI(a, b) { return Math.floor(R(a, b + 1)); }

// ── AUDIO (gf-lib SFX + procedural arcade music bed) ──────────────────────
var audioMuted = GF.muted;
var sfxLast = {};
function sfxRL(name, gapMs) {
  var now = Date.now(); if (sfxLast[name] && now - sfxLast[name] < (gapMs || 70)) return;
  sfxLast[name] = now; GF.sfx(name);
}
function toggleMute() { audioMuted = GF.toggleMute(); GF.setMusicMuted(audioMuted); }

// ── BUTTON BOOKKEEPING ────────────────────────────────────────────────────
var uiButtons = [];          // overlay buttons (screen space)
var hudButtons = [];         // in-run HUD buttons (screen space)
var garageScroll = null;     // GF.makeScroll controller (lazy)
var garageRows = [];         // content-space buy/equip hit rects
function hit(b, x, y) { return x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }

// ── LIFECYCLE ─────────────────────────────────────────────────────────────
function resetRun() {
  startX = 200; buggy.x = startX; buggy.y = -BUGGY_H / 2; buggy.vx = 0; buggy.vy = 0;
  buggy.rot = 0; buggy.vr = 0; buggy.onGround = true; buggy.restT = 0;
  buggy.dmg = 0; buggy.parts = { wheelF: true, wheelR: true, cabin: true, driver: true };
  dist = 0; runScrap = 0; smashes = 0; combo = 0; comboT = 0;
  nitro = statNitroMax(); zoneIdx = 0; prevZoneIdx = 0;
  charge = 0; chargeDir = 1; held = false; bannerT = 0; launchFlash = 0;
  nitroHint = false; nitroHintT = 0;
  props = []; debris = []; frontX = startX - 100;
  camScale = 1; scl = GF.S; camX = buggy.x - (GF.W * 0.40) / Math.max(0.001, scl); camY = 0;
  generateAhead();
}
function startRun() {
  resetRun();
  gs = 'PLAYING'; phase = 'CHARGE';
  GF.gameStarted();
  GF.saveRun();
  if (!seenTut && !window._silent) startTutorial();
}
function launch() {
  if (phase !== 'CHARGE') return;
  var power = Math.max(0.34, charge);
  var spd = statLaunch() * power;
  var ang = statAngle();
  buggy.vx = Math.cos(ang) * spd;
  buggy.vy = -Math.sin(ang) * spd;
  buggy.onGround = false; buggy.restT = 0;
  phase = 'FLIGHT'; held = false; launchFlash = 0.5;
  nitroHint = nitro > 0; nitroHintT = 0;
  GF.setShake(0.45);
  GF.sfx('hit'); GF.sfx('levelup');
  spawnPuff(buggy.x - 18, buggy.y + 6, 14, '#cfd6e0');
  if (GF.tutorial.active) GF.tutorial.next();
}
function fireNitro() {
  if (window.__shotFreeze || phase === 'REST' || gs !== 'PLAYING') return;
  if (nitro <= 0) return;
  nitro--;
  var ang = 0.55;
  buggy.vx += Math.cos(ang) * NITRO_FORCE;
  buggy.vy -= Math.sin(ang) * NITRO_FORCE;
  if (buggy.onGround) { buggy.onGround = false; buggy.y -= 2; }
  buggy.restT = 0; launchFlash = 0.35;
  GF.setShake(0.3); sfxRL('spawn', 40);
  for (var i = 0; i < 10; i++) spawnFlame(buggy.x - 20, buggy.y + R(-6, 8));
  nitroHint = false;
}
function endRun() {
  phase = 'REST'; gs = 'GAMEOVER';
  var dScrap = Math.floor(dist * SCRAP_PER_M);
  var total = runScrap + dScrap;
  var newBest = dist > meta.bestDist;
  if (newBest) meta.bestDist = dist;
  var oldTotal = meta.totalDist;
  meta.totalDist += dist;
  meta.scrap += total;
  // did this run cross a vehicle-unlock milestone? (celebrate it on the run-end screen)
  var newVeh = null;
  for (var vi = 0; vi < VEHICLES.length; vi++) { var v = VEHICLES[vi]; if (v.unlock > 0 && oldTotal < v.unlock && meta.totalDist >= v.unlock) newVeh = v.id; }
  saveMeta(); GF.saveRun();
  tally = { dist: dist, smashes: smashes, comboBonus: dScrap, scrap: total, t: 0, best: newBest, newVeh: newVeh };
  _pendingAd = true;
  GF.gameEnded();
  if (newBest && dist > 0) GF.happytime();
  if (newVeh) { GF.sfx('unlock'); GF.sfx('reward'); } else GF.sfx(newBest ? 'win' : 'coin');
}

// ── WORLD GENERATION ──────────────────────────────────────────────────────
function zoneOf(d) { return Math.min(4, Math.floor(d / ZONE_STEP)); }
function pushProp(type, x, topY, w, h, mass, scrapVal) {
  props.push({ type: type, x: x, y: topY, w: w, h: h, dead: false, mass: mass, scrap: scrapVal, used: false });
}
function generateAhead() {
  var need = camX + (GF.W / Math.max(0.001, scl)) + 700;
  var guard = 0;
  while (frontX < need && guard++ < 80) {
    frontX += R(70, 190);
    var d = (frontX - startX) / PX_PER_M;
    spawnCluster(frontX, zoneOf(d));
  }
  var cullX = camX - 280;
  if (props.length > 240) props = props.filter(function (p) { return p.x + (p.w || 40) > cullX; });
}
function spawnCluster(x, z) {
  // AIR OBSTACLE: a tall skyscraper rising into the flight path (Highway onward,
  // denser in City/Sky). Hitting it slows you hard; smash through or clear the top.
  if (z >= 1 && Math.random() < 0.13 + z * 0.03) {
    var th = R(170, 200 + z * 55);
    pushProp('tower', x, -th, R(58, 84), th, z >= 3 ? 3 : 2, 12 + z * 2);
    return;
  }
  var roll = Math.random();
  if (roll < 0.10) { pushProp('boost', x, -14, 54, 14, 0, 4); return; }
  if (roll < 0.22) { pushProp('tnt', x, -30, 30, 30, 1, 9); return; }
  if (roll < 0.40) {
    var hw = z >= 3 ? 96 : 78, hh = z >= 3 ? 50 : 40;
    pushProp('car', x, -hh, hw, hh, 3, 16);
    if (Math.random() < 0.5) pushProp('crate', x + hw * 0.2, -hh - 34, 32, 32, 1, 3);
    return;
  }
  if (roll < 0.55) { pushProp('tire', x, Math.random() < 0.4 ? -R(60, 150) : -40, 40, 40, 1, 5); return; }
  if (roll < 0.74) {
    var n = RI(1, z >= 2 ? 4 : 3), cy = 0;
    for (var i = 0; i < n; i++) { pushProp('crate', x, cy - 34, 34, 34, 1, 3); cy -= 34; }
    return;
  }
  if (roll < 0.86) { pushProp('barrel', x, -40, 28, 40, 1, 6); return; }
  var cn = RI(2, 4);
  for (var j = 0; j < cn; j++) pushProp('cone', x + j * 26, -30, 24, 30, 0, 2);
  if (Math.random() < 0.4) pushProp('sign', x + cn * 26 + 14, -54, 10, 54, 0, 2);
}

// ── DEBRIS / FX (voxel chunks) ────────────────────────────────────────────
function spawnDebris(x, topY, w, h, color, n) {
  for (var i = 0; i < n; i++) {
    debris.push({ x: x + R(0, w), y: topY + R(0, h), vx: R(-160, 220) + buggy.vx * 0.25,
      vy: R(-360, -40) + buggy.vy * 0.2, size: R(5, 12), color: color, rot: R(0, 6.28), vr: R(-9, 9), life: 1 });
  }
  if (debris.length > 280) debris.splice(0, debris.length - 280);
}
function spawnFlame(x, y) {
  debris.push({ x: x, y: y, vx: R(-260, -90) + buggy.vx * 0.1, vy: R(-40, 60), size: R(5, 11),
    color: Math.random() < 0.5 ? '#ffb02e' : '#ff5a2e', rot: 0, vr: 0, life: 0.55, flame: true });
}
function spawnPuff(x, y, n, col) {
  for (var i = 0; i < n; i++) debris.push({ x: x, y: y, vx: R(-120, -20), vy: R(-90, 30),
    size: R(6, 13), color: col, rot: 0, vr: 0, life: 0.6, flame: true });
}
// bigger, longer-lived chunk — a detached vehicle part or car-wreck piece
function spawnPart(wx, wy, sz, color) {
  debris.push({ x: wx, y: wy, vx: buggy.vx * 0.35 + R(-140, 160), vy: buggy.vy * 0.25 + R(-300, -60),
    size: sz, color: color, rot: R(0, 6.28), vr: R(-13, 13), life: 2.4 });
  if (debris.length > 300) debris.splice(0, debris.length - 300);
}
function spawnCarWreck(p) {
  var cxp = p.x + p.w / 2;
  spawnPart(cxp - p.w * 0.18, p.y, p.w * 0.5, '#62718a');              // cabin chunk
  spawnPart(cxp + p.w * 0.18, p.y + p.h * 0.4, p.w * 0.5, '#7b8aa0');  // body chunk
  spawnPart(cxp - p.w * 0.26, p.y + p.h * 0.8, p.h * 0.42, '#1a1a20'); // wheel
  spawnPart(cxp + p.w * 0.26, p.y + p.h * 0.8, p.h * 0.42, '#1a1a20'); // wheel
  spawnDebris(p.x, p.y, p.w, p.h, '#7b8aa0', 8);
  spawnDebris(p.x + p.w * 0.2, p.y, p.w * 0.4, p.h * 0.4, 'rgba(190,215,255,0.7)', 5); // glass
}
// ── BUGGY DAMAGE / BREAKABILITY ────────────────────────────────────────────
// Big impacts crack the buggy and pop parts off (wheels -> cabin -> driver eject).
// Armor cushions it; a heavily-damaged buggy rolls to a stop sooner. Cosmetic
// spectacle that never ends a run early (the chassis keeps sliding).
function ejectPart(offX, offY, sz, color) { spawnPart(buggy.x + offX, buggy.y + offY, sz, color); }
function damageBuggy(amount) {
  amount = amount / (1 + statArmor() * 0.4);          // armor soaks damage
  buggy.dmg = Math.min(1.3, buggy.dmg + amount);
  var v = curVeh();
  if (buggy.parts.wheelF && buggy.dmg > 0.32) { buggy.parts.wheelF = false; ejectPart(-BUGGY_W * 0.42, BUGGY_H * 0.2, WHEEL_R * 1.8, v.wheel); sfxRL('hit', 80); }
  if (buggy.parts.wheelR && buggy.dmg > 0.58) { buggy.parts.wheelR = false; ejectPart(BUGGY_W * 0.42, BUGGY_H * 0.2, WHEEL_R * 1.8, v.wheel); sfxRL('hit', 80); }
  if (buggy.parts.cabin && buggy.dmg > 0.74) { buggy.parts.cabin = false; ejectPart(-BUGGY_W * 0.05, -BUGGY_H * 0.5, BUGGY_W * 0.42, v.accent); GF.setShake(0.4); sfxRL('hurt', 90); }
  if (buggy.parts.driver && buggy.dmg > 0.95) {
    buggy.parts.driver = false;
    ejectPart(0, -BUGGY_H * 0.9, 11, '#f2c39b');      // head
    ejectPart(0, -BUGGY_H * 0.6, 14, '#274b8f');      // torso
    GF.setShake(0.5); sfxRL('hurt', 90);
    GF.spawnFloat(sx(buggy.x), sy(buggy.y) - 30 * GF.S, GF.t('wrecked'), '#ff7a3c');
  }
}

// ── SMASH HANDLING ────────────────────────────────────────────────────────
function comboMult() { return Math.min(9, 1 + Math.floor(combo / 2)); }
function handleSmash(p) {
  if (p.dead) return;
  if (p.type === 'boost') {
    if (p.used) return; p.used = true; p.dead = true;
    buggy.vy = -Math.max(560, Math.abs(buggy.vy) * 0.5 + 520);
    buggy.onGround = false; buggy.restT = 0;
    GF.setShake(0.35); sfxRL('merge', 60);
    spawnPuff(buggy.x, 6, 12, '#7CFC9A');
    GF.spawnFloat(sx(buggy.x), sy(buggy.y) - 26 * GF.S, GF.t('boost'), '#7CFC9A');
    return;
  }
  p.dead = true; smashes++; combo++; comboT = COMBO_WINDOW;
  var mult = comboMult();
  var gain = Math.round(p.scrap * (1 + (mult - 1) * 0.35));
  runScrap += gain;
  var armor = statArmor(), col, n = 9, skipDebris = false;
  if (p.type === 'crate') { col = '#b9803f'; buggy.vx *= 0.99; }
  else if (p.type === 'barrel') { col = '#5a7d3a'; buggy.vx += 50; GF.setShake(0.3); sfxRL('hit', 50); }

// ── CAMERA ────────────────────────────────────────────────────────────────

  var rawCamY = buggy.y - (GF.H * 0.48) / scl;   // buggy ~48% when airborne

}
function sx(wx) { return (wx - camX) * scl; }
function sy(wy) { return (wy - camY) * scl; }

// ── UPDATE ────────────────────────────────────────────────────────────────
function update(dt) {

  if (launchFlash > 0) launchFlash -= dt;

  if (phase === 'CHARGE') {
    if (held) {

      sfxRL('tap', 90);
    }
    updateCamera(); updateDebris(dt); return;
  }

  // FLIGHT physics
  buggy.vy += GRAVITY * dt;
  buggy.vx *= Math.exp(-AIR_DRAG * dt);
  buggy.x += buggy.vx * dt;
  buggy.y += buggy.vy * dt;

  if (!buggy.onGround) {
    var targetRot = Math.atan2(buggy.vy, Math.max(40, buggy.vx)) * 0.6;

      buggy.vx *= GROUND_FRICTION;

}

  var bw = clamp(260 * S, 180, 380), bh = clamp(58 * S, 46, 74);
  bigBtn(c, GF.t('retry'), W / 2, H * 0.74, bw, bh, true, onRetry);
  bigBtn(c, GF.t('garage'), W / 2, H * 0.74 + bh + 14 * S, clamp(180 * S, 130, 260), clamp(50 * S, 40, 66), false, openGarage);
  drawMenuCorner(c);
}
function onRetry() {
  if (_pendingAd) { _pendingAd = false; GF.ads.interstitial({ onClose: function () { startRun(); } }); }
  else startRun();
}

// ── HELP CARD ─────────────────────────────────────────────────────────────
function wrapText(c, text, x, y, maxW, lineH) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) { var probe = cur ? cur + ' ' + words[i] : words[i]; if (c.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; } else cur = probe; }
  if (cur) lines.push(cur);
  for (var j = 0; j < lines.length; j++) c.fillText(lines[j], x, y + j * lineH);
  return lines.length * lineH;
}
function drawHelpCard(c) {
  var W = GF.W, H = GF.H, S = GF.S;
  uiButtons = [];
  c.fillStyle = 'rgba(6,8,18,0.92)'; c.fillRect(0, 0, W, H);
  var cardW = Math.min(W * 0.9, 460 * S), cx0 = W / 2;
  c.textAlign = 'center'; c.textBaseline = 'alphabetic'; c.fillStyle = '#fff'; c.font = 'bold ' + clamp(22 * S, 17, 30) + 'px Inter, system-ui, sans-serif';
  var y = H * 0.16; c.fillText(GF.t('howto'), cx0, y); y += clamp(30 * S, 24, 40);
  var lines = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'], lh = clamp(20 * S, 16, 26);
  c.font = clamp(14 * S, 12, 19) + 'px Inter, system-ui, sans-serif'; c.textAlign = 'left';
  for (var i = 0; i < lines.length; i++) { c.fillStyle = i === 4 ? '#ffd166' : '#cdd6e6'; var used = wrapText(c, GF.t(lines[i]), cx0 - cardW / 2, y, cardW, lh); y += used + 9 * S; }
  c.textAlign = 'center';
  bigBtn(c, GF.t('gotit'), W / 2, Math.min(y + 28 * S, H * 0.9), clamp(200 * S, 150, 300), clamp(54 * S, 44, 70), true, function () { helpOpen = false; GF.sfx('click'); });
}

// ── TUTORIAL (demo-hand, action-gated on the real launch) ─────────────────
function startTutorial() {
  GF.tutorial.start([
    { text: GF.t('holdRev'),
      target: function () { return { x: sx(buggy.x), y: sy(buggy.y) - 6 * GF.S, r: 34 * GF.S }; },
      gesture: 'tap', advance: 'manual', onAdvance: function () { seenTut = true; try { localStorage.setItem('crash_buggy_seen_tut', '1'); } catch (e) {} } },
  ], { storageKey: 'crash_buggy_seen_tut' });
}

// ── INPUT ─────────────────────────────────────────────────────────────────
var downX = 0, downY = 0, dragScroll = false;
function onDown(x, y) {
  downX = x; downY = y; dragScroll = false;
  if (helpOpen) { for (var i = 0; i < uiButtons.length; i++) if (hit(uiButtons[i], x, y)) { uiButtons[i].fn(); return; } return; }
  if (GF.tutorial.active) { var b = GF.tutorial._skipBtn; if (b && hit(b, x, y)) { GF.tutorial.handleClick(x, y); return; } }
  if (gs === 'GARAGE') {
    for (var k = 0; k < uiButtons.length; k++) if (hit(uiButtons[k], x, y)) { GF.sfx('click'); uiButtons[k].fn(); return; }
    if (garageScroll && garageScroll.contains(x, y)) garageScroll.dragStart(y);
    return;
  }
  if (gs === 'PLAYING') {
    for (var h = 0; h < hudButtons.length; h++) if (hit(hudButtons[h], x, y)) { hudButtons[h].fn(); return; }
    if (phase === 'CHARGE') { held = true; if (charge === 0) { charge = 0.15; chargeDir = 1; } }
    else fireNitro();
    return;
  }
  for (var j = 0; j < uiButtons.length; j++) if (hit(uiButtons[j], x, y)) { GF.sfx('click'); uiButtons[j].fn(); return; }
}
function onMove(x, y) {
  if (gs === 'GARAGE' && garageScroll && garageScroll.isDragging()) {
    if (Math.abs(y - downY) > 6 * GF.S) dragScroll = true;
    garageScroll.dragMove(y);
  }
}
function onUp(x, y) {
  if (gs === 'GARAGE' && garageScroll) {
    var wasDrag = dragScroll; garageScroll.dragEnd();
    if (!wasDrag && garageScroll.contains(x, y)) {
      var cy = garageScroll.screenToContentY(y);
      for (var i = 0; i < garageRows.length; i++) {
        var r = garageRows[i];
        if (x >= r.x && x <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
          if (r.kind === 'buy') buyUpgrade(r.key); else if (r.kind === 'veh') equipVehicle(r.id);
          return;
        }
      }
    }
    return;
  }
  if (gs === 'PLAYING' && phase === 'CHARGE' && held) launch();
}
var canvasEl = document.getElementById('c');
canvasEl.addEventListener('touchstart', function (e) { e.preventDefault(); var t = e.changedTouches[0]; onDown(t.clientX, t.clientY); }, { passive: false });
canvasEl.addEventListener('touchmove', function (e) { e.preventDefault(); var t = e.changedTouches[0]; onMove(t.clientX, t.clientY); }, { passive: false });
canvasEl.addEventListener('touchend', function (e) { e.preventDefault(); var t = e.changedTouches[0]; onUp(t.clientX, t.clientY); }, { passive: false });
canvasEl.addEventListener('touchcancel', function (e) { e.preventDefault(); var t = (e.changedTouches && e.changedTouches[0]) || { clientX: downX, clientY: downY }; onUp(t.clientX, t.clientY); held = false; }, { passive: false });
canvasEl.addEventListener('mousedown', function (e) { onDown(e.clientX, e.clientY); });
canvasEl.addEventListener('mousemove', function (e) { if (e.buttons) onMove(e.clientX, e.clientY); });
canvasEl.addEventListener('mouseup', function (e) { onUp(e.clientX, e.clientY); });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
document.addEventListener('keydown', function (e) {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Enter') {
    e.preventDefault();
    if (e.repeat) return;
    if (helpOpen) { helpOpen = false; return; }
    if (gs === 'MENU') startRun();
    else if (gs === 'GAMEOVER') onRetry();
    else if (gs === 'GARAGE') startRun();
    else if (gs === 'PLAYING') { if (phase === 'CHARGE') { held = true; if (charge === 0) { charge = 0.15; chargeDir = 1; } } else fireNitro(); }
  } else if (e.code === 'KeyM') { toggleMute(); }
});
document.addEventListener('keyup', function (e) {
  if ((e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Enter') && gs === 'PLAYING' && phase === 'CHARGE' && held) launch();
});

// ── SCREENSHOT / TEST HOOKS ───────────────────────────────────────────────
window._setupForScreenshot = function (level) {
  window._silent = true; seenTut = true; helpOpen = false;
  var lv = level || 3;
  meta.totalDist = Math.max(meta.totalDist, 2000);
  meta.up.engine = Math.max(meta.up.engine, 4); meta.up.nitro = Math.max(meta.up.nitro, 2);
  resetRun();
  gs = 'PLAYING'; phase = 'FLIGHT';
  dist = 140 + lv * 70; zoneIdx = zoneOf(dist); prevZoneIdx = zoneIdx;
  buggy.x = startX + dist * PX_PER_M; buggy.y = -150; buggy.vx = 620; buggy.vy = -30;
  buggy.onGround = false; buggy.rot = -0.16;
  buggy.dmg = 0.5; buggy.parts.wheelF = false;   // battle-damaged: showcases breakability
  props = []; var bx = buggy.x;
  // a tall crate column the buggy is plowing through — fills the frame vertically
  for (var ci = 0; ci < 7; ci++) pushProp('crate', bx + 72, -34 - ci * 34, 34, 34, 1, 3);
  // a skyscraper (air obstacle) rising into the flight path on the right
  pushProp('tower', bx + 196, -300, 70, 300, 3, 18);
  // mid + high props bracketing the buggy (no empty vertical gap)
  pushProp('tnt',   bx + 148, -150, 30, 30, 1, 9);
  pushProp('tire',  bx + 232, -210, 40, 40, 1, 5);
  pushProp('crate', bx - 34,  -120, 34, 34, 1, 3);
  pushProp('sign',  bx + 28,  -54, 10, 54, 0, 2);
  // ground clutter so the lower band is full of props, not bare grass
  pushProp('car',    bx + 110, -40, 78, 40, 3, 16);
  pushProp('barrel', bx + 256, -40, 28, 40, 1, 6);
  pushProp('cone',   bx + 320, -30, 24, 30, 0, 2); pushProp('cone', bx + 346, -30, 24, 30, 0, 2);
  pushProp('boost',  bx + 410, -14, 54, 14, 0, 4);
  pushProp('car',    bx - 132, -40, 78, 40, 3, 16);
  frontX = bx + 520; generateAhead();
  combo = 5; comboT = COMBO_WINDOW; runScrap = 240 + lv * 30; smashes = 12 + lv; nitro = 2;
  // explosion debris frozen mid-air around the buggy
  debris = [];
  for (var i = 0; i < 18; i++) spawnDebris(bx - 6, -170, 60, 90, i % 3 === 0 ? '#ff5a2e' : (i % 3 === 1 ? '#b9803f' : '#7b8aa0'), 1);
  spawnPart(bx + 40, -120, WHEEL_R * 1.8, curVeh().wheel);   // the knocked-off front wheel tumbling
  for (var j = 0; j < 8; j++) spawnFlame(bx - 26, buggy.y + R(-8, 10));
  launchFlash = 0.45;
  // force a tight, ground-anchored framed camera, then FREEZE so the live loop
  // can't drift it. Zoomed (1.5) so the action band fills the tall portrait frame
  // and the buggy sits ~mid-screen with skyline+ground props below.
  camScale = 1.5; scl = GF.S * camScale;
  camX = buggy.x - (GF.W * 0.32) / scl;
  camY = 0 - (GF.H * 0.82) / scl;
  window.__shotFreeze = true;
};
window._jumpLevel = function (n) {
  helpOpen = false; window.__shotFreeze = false;
  if (n === 99) { if (gs !== 'PLAYING') startRun(); endRun(); return; }
  window._setupForScreenshot(n || 3);
};
window._setLang = function (l) { GF.lang = (l === 'ru' ? 'ru' : 'en'); };
window._setState = function (s) { if (s) gs = s; };
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return 'Inter, system-ui, sans-serif'; };
window.__openTut = function () { helpOpen = true; };
window.__closeTut = function () { helpOpen = false; };

// ── BOOT ──────────────────────────────────────────────────────────────────
loadMeta();
try { seenTut = (localStorage.getItem('crash_buggy_seen_tut') === '1'); } catch (e) {}

GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: [],
  saveKey: 'crash_buggy',
  onReady: function () {
    GF.persist('crash_buggy_run_v1',
      function () { return { gs: (gs === 'PLAYING' || gs === 'GAMEOVER') ? 'GARAGE' : gs }; },
      function (s) { if (s && s.gs === 'GARAGE') gs = 'GARAGE'; }
    );
    if (gs === 'PLAYING') gs = 'MENU';

    GF.startMusic({ preset: 'arcade', muted: audioMuted });

    if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU') startRun();

    GF.exposeState(function () {
      return {
        gs: gs, phase: phase, dist: dist, distance: dist, score: runScrap + Math.floor(dist * SCRAP_PER_M),
        bestDist: meta.bestDist, totalDist: meta.totalDist, runScrap: runScrap, scrap: meta.scrap,
        smashes: smashes, combo: combo, comboMult: comboMult(), nitro: nitro, nitroMax: statNitroMax(),
        zoneIdx: zoneIdx, zone: GF.t('z' + zoneIdx), props: props.length, debris: debris.length,
        dmg: +buggy.dmg.toFixed(2), partsLeft: (buggy.parts.wheelF + buggy.parts.wheelR + buggy.parts.cabin + buggy.parts.driver),
        vehicle: meta.vehicle, up: meta.up, seenTut: seenTut,
        unlockedVehicles: VEHICLES.filter(vehUnlocked).map(function (v) { return v.id; }),
        GRAVITY: GRAVITY, LAUNCH_BASE: LAUNCH_BASE, LAUNCH_PER_LVL: LAUNCH_PER_LVL, NITRO_FORCE: NITRO_FORCE,
        BOUNCE: BOUNCE, ZONE_STEP: ZONE_STEP, SCRAP_PER_M: SCRAP_PER_M,
        statLaunch: Math.round(statLaunch()), statBounce: +statBounce().toFixed(2), statArmor: statArmor(),
      };
    });

    GF.exposeBot(
      function () {
        if (gs === 'MENU' || gs === 'GARAGE') return ['start'];
        if (gs === 'GAMEOVER') return ['retry'];
        if (phase === 'CHARGE') return ['launch'];
        if (phase === 'FLIGHT' && nitro > 0) return ['nitro'];
        return [];
      },
      function (a) {
        if (a === 'start' || a === 'retry') startRun();
        else if (a === 'launch') { charge = 0.9; chargeDir = 1; launch(); }
        else if (a === 'nitro') fireNitro();
      }
    );

    GF.exposeReach(function () {
      var W = GF.W, H = GF.H;
      if (gs === 'GARAGE') {
        var L = garageLayout();
        var items = garageRows.map(function (r, i) { return { id: (r.kind + '_' + (r.key || r.id || i)), x: r.x, y: r.y, w: r.w, h: r.h }; });
        uiButtons.forEach(function (b, i) { items.push({ id: 'pin_' + i, x: b.x, y: b.y, w: b.w, h: b.h, pinned: true }); });
        return { screen: 'garage', items: items, scrollId: 'garage', viewportH: L.vpH, screenH: H };
      }
      var its = uiButtons.map(function (b, i) { return { id: 'btn_' + i, x: b.x, y: b.y, w: b.w, h: b.h }; });
      return { screen: gs.toLowerCase(), items: its, viewportH: H, screenH: H, scrollMaxY: 0 };
    });
    GF.exposeTour([
      { name: 'menu', go: function () { gs = 'MENU'; helpOpen = false; } },
      { name: 'garage', go: function () { openGarage(); } },
      { name: 'gameover', go: function () { if (gs !== 'PLAYING') startRun(); endRun(); } },
    ]);
  },
  onUpdate: update,
  onDraw: draw,
});

// ── YANDEX MUST-HAVES (do not remove) ─────────────────────────────────────
// 1. All UI text via GF.t()/STRINGS (en+ru). 2. Run state persisted via
// GF.persist + saveRun() after transitions. 3. Fullscreen/orientation resize
// handled in gf-lib. 4. Ads fire only from the RETRY user click (onRetry),
// never auto. No console.* anywhere.
})();
</script>
