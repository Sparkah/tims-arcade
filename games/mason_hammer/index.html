<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// LOCALISATION
var STRINGS = {

    play: 'PLAY', retry: 'RETRY', next: 'NEXT LEVEL', again: 'PLAY AGAIN', menu: 'MENU',

  },

    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', next: 'ДАЛЬШЕ', again: 'ИГРАТЬ СНОВА', menu: 'МЕНЮ',
    won: 'КАМЕНЬ ПОКОРЁН', gameover: 'ПЛИТА РАЗБИТА',
    level_won: 'КУСОК ОТДЕЛЁН',
    level: 'УРОВЕНЬ', strikes: 'УДАРЫ', best: 'РЕКОРД',
    angle_hint: 'Выбери угол',
    cancel: 'ОТМЕНА',
    reason_vein: 'Трещина вошла в запретную жилу.',
    reason_budget: 'Удары кончились, а кусок не отделён.',
    'tut_title': 'Как играть',
    'tut_goal': 'Цель: Раскрой плиту так, чтобы отмеченный кусок был окружён трещинами со всех сторон.',
    'tut_controls': 'Управление: Коснись узла, затем выбери угол удара (45/90/135 град.). Работают и клавиши 1, 2, 3.',
    'tut_win': 'Победа: Отдели кусок за 5 ударов.',
    'tut_lose': 'Поражение: Трещина зашла в красную жилу ИЛИ удары кончились, а кусок не отделён.',
    'tut_tip': 'Совет: Подержи палец на угле, чтобы увидеть, куда разойдётся трещина, до удара.',
    'tut_step1': 'Это ваша КАМЕННАЯ ПЛИТА. Нужно отделить отмеченный кусок, расколов плиту.',
    'tut_step2': 'Нажмите узел на границе куска, чтобы выбрать место УДАРА.',
    'tut_step3': 'Выберите один из трёх углов (45°/90°/135°). Трещины расходятся от этой точки.',
    'tut_step4': 'Избегайте КРАСНЫХ ЖИЛ — трещина в них = поражение. Всего 5 ударов.',
    close: 'ЗАКРЫТЬ',
  },
};

// TUNABLES (per DESIGN.md)
var GRID_W         = 14;
var GRID_H         = 10;
var MAX_STRIKES    = 5;
var CRACK_LEN_MIN  = 3;
var CRACK_LEN_MAX  = 5;
var FORK_CHANCE    = 0.35;
var GRAIN_DENSITY  = 0.08;
var VEIN_DENSITY   = 0.28;
var LEVEL_COUNT    = 6;
var PREVIEW_ALPHA  = 0.45;

var ANGLE_LABELS = ['45', '90', '135'];

// GAME STATE
var gs = 'MENU';
var level = 1;
var strikes_left = MAX_STRIKES;
var chunk_sealed = false;
var best_level = 0;
var gameover_reason = '';
var hover_angle = -1;

var cells = [];
var nodes = [];
var edgeH = [];
var edgeV = [];
var selector = { open: false, nx: 0, ny: 0, x: 0, y: 0 };

// RNG
var rng = mulberry32(1);
function mulberry32(seed) {
  return function () {
    seed = (seed + 0x6D2B79F5) | 0;
    var t = seed;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function rint(min, maxIncl) { return min + Math.floor(rng() * (maxIncl - min + 1)); }

// LEVEL BUILD
function buildLevel(lv) {
  rng = mulberry32(lv * 7919 + 1337);
  cells = [];
  for (var y = 0; y < GRID_H; y++) {
    var row = [];
    for (var x = 0; x < GRID_W; x++) row.push({ vein: false, chunk: false, cracked: false });
    cells.push(row);
  }
  nodes = [];
  for (var ny = 0; ny <= GRID_H; ny++) {
    var nr = [];
    for (var nx = 0; nx <= GRID_W; nx++) nr.push({ grain: false });
    nodes.push(nr);
  }
  edgeH = [];
  for (var ey = 0; ey <= GRID_H; ey++) {
    var er = [];
    for (var ex = 0; ex < GRID_W; ex++) er.push(false);
    edgeH.push(er);
  }
  edgeV = [];
  for (var ey2 = 0; ey2 < GRID_H; ey2++) {
    var er2 = [];
    for (var ex2 = 0; ex2 <= GRID_W; ex2++) er2.push(false);
    edgeV.push(er2);
  }

  var cw = 3 + Math.floor((lv - 1) / 2);
  var ch = 3 + Math.floor(lv / 2);
  cw = Math.min(cw, 5); ch = Math.min(ch, 5);
  var placements = [
    { x: 0,            y: 0 },
    { x: GRID_W - cw,  y: 0 },
    { x: 0,            y: GRID_H - ch },
    { x: GRID_W - cw,  y: GRID_H - ch },
    { x: Math.floor((GRID_W - cw) / 2), y: 0 },
    { x: Math.floor((GRID_W - cw) / 2), y: GRID_H - ch },
  ];
  var p = placements[(lv - 1) % placements.length];
  for (var yy = p.y; yy < p.y + ch; yy++) {
    for (var xx = p.x; xx < p.x + cw; xx++) cells[yy][xx].chunk = true;
  }
  var totalCells = GRID_W * GRID_H;
  var targetVeins = Math.floor(totalCells * VEIN_DENSITY);
  var attempts = 0, veinCount = 0;
  while (veinCount < targetVeins && attempts < 800) {
    attempts++;
    var vx = rint(0, GRID_W - 1);
    var vy = rint(0, GRID_H - 1);
    if (cells[vy][vx].chunk) continue;
    if (cells[vy][vx].vein) continue;
    var adjChunk = false;
    var dirs4 = [[-1,0],[1,0],[0,-1],[0,1]];
    for (var di = 0; di < 4; di++) {
      var ax = vx + dirs4[di][0], ay = vy + dirs4[di][1];
      if (ax >= 0 && ax < GRID_W && ay >= 0 && ay < GRID_H && cells[ay][ax].chunk) { adjChunk = true; break; }
    }
    if (adjChunk) continue;
    cells[vy][vx].vein = true;
    veinCount++;
  }
  var totalNodes = (GRID_W + 1) * (GRID_H + 1);
  var targetGrains = Math.floor(totalNodes * GRAIN_DENSITY);
  var ga = 0, gc = 0;
  while (gc < targetGrains && ga < 600) {
    ga++;
    var gnx = rint(1, GRID_W - 1);
    var gny = rint(1, GRID_H - 1);
    if (nodes[gny][gnx].grain) continue;
    if (isChunkBorderNode(gnx, gny)) continue;
    nodes[gny][gnx].grain = true;
    gc++;
  }

  strikes_left = MAX_STRIKES;
  chunk_sealed = false;
  selector.open = false;
  hover_angle = -1;
}

function isChunkBorderNode(nx, ny) {
  var anyChunk = false, anyOther = false;
  for (var dy = -1; dy <= 0; dy++) {
    for (var dx = -1; dx <= 0; dx++) {
      var cx = nx + dx, cy = ny + dy;
      if (cx < 0 || cx >= GRID_W || cy < 0 || cy >= GRID_H) { anyOther = true; continue; }
      if (cells[cy][cx].chunk) anyChunk = true; else anyOther = true;
    }
  }
  return anyChunk && anyOther;
}

// CRACK PROPAGATION
function simulateStrike(nx, ny, angleIdx) {
  var seed = ((nx * 73856093) ^ (ny * 19349663) ^ ((level + 1) * 83492791) ^ (angleIdx + 1)) >>> 0;
  var localRng = mulberry32(seed);
  function lr() { return localRng(); }
  var edges = [];
  var hitVein = false;
  var len = CRACK_LEN_MIN + Math.floor(lr() * (CRACK_LEN_MAX - CRACK_LEN_MIN + 1));
  var sdx = 0, sdy = 0;
  if (angleIdx === 0) { sdx = 1; sdy = 0; }
  else if (angleIdx === 1) {
    if (lr() < 0.5) { sdx = 1; sdy = 0; } else { sdx = 0; sdy = 1; }
  } else { sdx = 1; sdy = 0; }

  var usedEdges = {};
  function edgeKey(e) { return e.type + ':' + e.x + ':' + e.y; }
  function edgeAdjCells(e) {
    if (e.type === 'h') return [{ x: e.x, y: e.y - 1 }, { x: e.x, y: e.y }];
    return [{ x: e.x - 1, y: e.y }, { x: e.x, y: e.y }];
  }
  function walk(startX, startY, dx, dy, remaining, forksAllowed) {
    var px = startX, py = startY;
    var sdx2 = dx, sdy2 = dy;
    while (remaining > 0) {
      var ntx = px + sdx2, nty = py + sdy2;
      if (ntx < 0 || ntx > GRID_W || nty < 0 || nty > GRID_H) return;
      if (nodes[nty] && nodes[nty][ntx] && nodes[nty][ntx].grain) return;
      var e;
      if (sdy2 === 0) e = { type: 'h', x: Math.min(px, ntx), y: py };
      else            e = { type: 'v', x: px, y: Math.min(py, nty) };
      var k = edgeKey(e);
      if (usedEdges[k]) return;
      usedEdges[k] = true;
      var adj = edgeAdjCells(e);
      for (var i = 0; i < adj.length; i++) {
        var cc = adj[i];
        if (cc.x >= 0 && cc.x < GRID_W && cc.y >= 0 && cc.y < GRID_H && cells[cc.y][cc.x].vein) hitVein = true;
      }
      edges.push(e);
      px = ntx; py = nty;
      if (forksAllowed > 0 && lr() < FORK_CHANCE && remaining > 1) {
        var pdx = sdy2, pdy = sdx2;
        if (lr() < 0.5) { pdx = -pdx; pdy = -pdy; }
        var forkLen = 1 + Math.floor(lr() * 2);
        walk(px, py, pdx, pdy, forkLen, 0);
      }
      if (angleIdx === 0) {
        if (sdx2 !== 0) { sdx2 = 0; sdy2 = 1; } else { sdx2 = 1; sdy2 = 0; }
      } else if (angleIdx === 2) {
        if (sdx2 !== 0) { sdx2 = 0; sdy2 = -1; } else { sdx2 = 1; sdy2 = 0; }
      }
      remaining--;
    }
  }
  walk(nx, ny, sdx, sdy, len, 1);
  return { edges: edges, hitVein: hitVein, length: edges.length };
}

function applyStrike(sim) {
  for (var i = 0; i < sim.edges.length; i++) {
    var e = sim.edges[i];
    if (e.type === 'h') edgeH[e.y][e.x] = true;
    else                edgeV[e.y][e.x] = true;
  }
  for (var j = 0; j < sim.edges.length; j++) {
    var e2 = sim.edges[j];
    var adj = (e2.type === 'h')
      ? [{ x: e2.x, y: e2.y - 1 }, { x: e2.x, y: e2.y }]
      : [{ x: e2.x - 1, y: e2.y }, { x: e2.x, y: e2.y }];
    for (var k = 0; k < adj.length; k++) {
      var cc = adj[k];
      if (cc.x >= 0 && cc.x < GRID_W && cc.y >= 0 && cc.y < GRID_H && !cells[cc.y][cc.x].chunk) {
        cells[cc.y][cc.x].cracked = true;
      }
    }
  }
  GF.spawnParticles(selector.x, selector.y, '#d6b27a', 18);
  GF.setShake(0.6);
  return { hitVein: sim.hitVein, sealed: isChunkSealed() };
}

function isChunkSealed() {
  for (var y = 0; y < GRID_H; y++) {
    for (var x = 0; x < GRID_W; x++) {
      if (!cells[y][x].chunk) continue;
      // top
      if (y > 0 && !cells[y - 1][x].chunk && !edgeH[y][x]) return false;
      // bottom
      if (y < GRID_H - 1 && !cells[y + 1][x].chunk && !edgeH[y + 1][x]) return false;
      // left
      if (x > 0 && !cells[y][x - 1].chunk && !edgeV[y][x]) return false;
      // right
      if (x < GRID_W - 1 && !cells[y][x + 1].chunk && !edgeV[y][x + 1]) return false;
    }
  }
  return true;
}

// LIFECYCLE
function chunkBorderTarget() {
  var L = computeLayout();
  for (var y = 0; y <= GRID_H; y++) {
    for (var x = 0; x <= GRID_W; x++) {
      if (typeof isChunkBorderNode === 'function' && isChunkBorderNode(x, y)) {
        return { x: L.gridX + x * L.cell, y: L.gridY + y * L.cell, r: L.cell * 0.6 };
      }
    }
  }
  return null;
}
function veinTargetFn() {
  // Find a forbidden vein cell to point at (if grid has any)
  var L = computeLayout();
  if (typeof forbidden_veins !== 'undefined' && Array.isArray(forbidden_veins) && forbidden_veins.length) {
    var v = forbidden_veins[0];
    return { x: L.gridX + (v.x + 0.5) * L.cell, y: L.gridY + (v.y + 0.5) * L.cell, r: L.cell * 0.7 };
  }
  return null;
}
function buildTutorialSteps() {
  var L = computeLayout();
  var slab = { x: L.gridX + L.cell * GRID_W / 2, y: L.gridY + L.cell * GRID_H / 2, r: L.cell * 1.6 };
  return [
    { text: GF.t('tut_step1'), target: slab,                advance: 'click_any' },
    { text: GF.t('tut_step2'), target: chunkBorderTarget,   advance: 'click_any' },
    { text: GF.t('tut_step3'), target: chunkBorderTarget,   advance: 'click_any' },
    { text: GF.t('tut_step4'), target: veinTargetFn,        advance: 'click_any' },
  ];
}
function reopenTutorial() {
  GF.tutorial.start(buildTutorialSteps(), { storageKey: 'mason_hammer_tutorial_v2', force: true });
}

function startGame() {
  level = 1;
  buildLevel(level);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
  GF.tutorial.start(buildTutorialSteps(), { storageKey: 'mason_hammer_tutorial_v2' });
}
function startLevel(lv) {
  level = lv;
  buildLevel(level);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}
function retryLevel() {
  buildLevel(level);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}
function nextLevel() {
  if (level >= LEVEL_COUNT) {
    if (level > best_level) {
      best_level = level;
      try { localStorage.setItem('mason_hammer_best', best_level); } catch (e) {}
    }
    gs = 'WIN';
    GF.gameEnded();
  } else {
    level++;
    buildLevel(level);
    gs = 'PLAYING';
  }
  GF.saveRun();
}
function gameOver(reason) {
  gameover_reason = reason;
  if (level > best_level) {
    best_level = level;
    try { localStorage.setItem('mason_hammer_best', best_level); } catch (e) {}
  }
  gs = 'GAMEOVER';
  GF.gameEnded();
  GF.saveRun();
}

// Screenshot helpers
window._jumpLevel = function (lv) {
  if (typeof lv === 'undefined') lv = 3;
  if (lv >= 99) {
    // Drive the game to a terminal state for the runtime gate
    level = LEVEL_COUNT;
    buildLevel(level);
    gs = 'WIN';
    GF.saveRun();
    return;
  }
  window._setupForScreenshot(lv);
};
window._setupForScreenshot = function (lv) {
  if (typeof lv === 'undefined') lv = 3;
  startLevel(Math.max(1, Math.min(LEVEL_COUNT, lv)));
  applyDemoStrikes();
  // Spend one strike (visually) to show real cracks on the slab
  strikes_left = Math.max(2, MAX_STRIKES - 2);
  // Place radial selector near the chunk so it dominates the gameplay
  var L = computeLayout();
  // Find a chunk-border node
  var nx = Math.floor(GRID_W / 2), ny = Math.floor(GRID_H / 2);
  for (var y = 0; y <= GRID_H; y++) {
    for (var x = 0; x <= GRID_W; x++) {
      if (isChunkBorderNode(x, y)) { nx = x; ny = y; y = 99; break; }
    }
  }
  selector.open = true;
  selector.nx = nx; selector.ny = ny;
  selector.x = L.gridX + nx * L.cell;
  selector.y = L.gridY + ny * L.cell;
  hover_angle = 1;
  gs = 'PLAYING';
};
function applyDemoStrikes() {
  // Crack a couple of safe edges so screenshots show cracks without ending the game.
  // We crack horizontal/vertical edges away from chunk borders to populate the slab.
  for (var i = 0; i < 7; i++) {
    var x = (i * 3 + 1) % GRID_W;
    var y = (i + 1) % (GRID_H - 1);
    if (y < 0 || y >= GRID_H) continue;
    if (cells[y][x].vein || cells[y][x].chunk) continue;
    cells[y][x].cracked = true;
    // crack the top horizontal edge of this cell (edgeH[y][x])
    if (y > 0) {
      var adjA = y > 0 ? cells[y - 1][x] : null;
      if (adjA && !adjA.vein && !adjA.chunk) edgeH[y][x] = true;
    }
  }
}

// INPUT
function onPointer(px, py) {
  // Interactive tutorial consumes clicks first
  if (GF.tutorial.handleClick(px, py)) return;
  if (gs === 'PLAYING' && helpBtnRect && inRect(px, py, helpBtnRect)) {
    reopenTutorial();
    return;
  }
  if (gs === 'MENU' && GF._menuPlayBtn && inRect(px, py, GF._menuPlayBtn)) {
    startGame();
    return;
  }
  if ((gs === 'LEVELEND' || gs === 'GAMEOVER' || gs === 'WIN') && GF._endBtn && inRect(px, py, GF._endBtn)) {
    GF._endBtn.fn();
    return;
  }
  if (gs !== 'PLAYING') return;

  var L = computeLayout();
  if (selector.open) {
    var cdx = px - selector.x, cdy = py - selector.y;
    var d = Math.sqrt(cdx * cdx + cdy * cdy);
    if (d < L.cell * 0.55) {
      selector.open = false; hover_angle = -1; return;
    }
    if (d > L.cell * 2.4) {
      selector.open = false; hover_angle = -1; return;
    }
    var a = wedgeFromPoint(cdx, cdy);
    if (a >= 0) {
      commitStrike(selector.nx, selector.ny, a);
      selector.open = false; hover_angle = -1;
    }
    return;
  }
  var node = nearestNode(px, py, L);
  if (!node) return;
  selector.open = true;
  selector.nx = node.nx; selector.ny = node.ny;
  selector.x = L.gridX + node.nx * L.cell;
  selector.y = L.gridY + node.ny * L.cell;
  hover_angle = -1;
}

function wedgeFromPoint(dx, dy) {
  if (dy > 0) return -1;
  var ang = Math.atan2(-dy, dx);
  var deg = ang * 180 / Math.PI;
  if (deg >= 30 && deg <= 70) return 2;
  if (deg > 70 && deg <= 110) return 1;
  if (deg > 110 && deg <= 150) return 0;
  return -1;
}

function nearestNode(px, py, L) {
  var gx = (px - L.gridX) / L.cell;
  var gy = (py - L.gridY) / L.cell;
  var nx = Math.round(gx);
  var ny = Math.round(gy);
  if (nx < 0 || nx > GRID_W || ny < 0 || ny > GRID_H) return null;
  var dx = (gx - nx) * L.cell;
  var dy = (gy - ny) * L.cell;
  if (Math.sqrt(dx * dx + dy * dy) > L.cell * 0.55) return null;
  return { nx: nx, ny: ny };
}

function commitStrike(nx, ny, angleIdx) {
  if (strikes_left <= 0) return;
  var sim = simulateStrike(nx, ny, angleIdx);
  var r = applyStrike(sim);
  strikes_left--;
  if (r.hitVein) {
    GF.spawnParticles(selector.x, selector.y, '#e74c5e', 32);
    GF.setShake(1.4);
    gameOver(GF.t('reason_vein'));
    return;
  }
  if (r.sealed) {
    chunk_sealed = true;
    GF.spawnParticles(selector.x, selector.y, '#48c9b0', 40);
    gs = 'LEVELEND';
    GF.gameEnded();
    GF.saveRun();
    return;
  }
  if (strikes_left <= 0 && !r.sealed) {
    gameOver(GF.t('reason_budget'));
    return;
  }
  GF.saveRun();
}

// Input wiring
GF.canvas.addEventListener('mousedown', function (e) { onPointer(e.clientX, e.clientY); });
GF.canvas.addEventListener('mousemove', function (e) {
  if (!selector.open || gs !== 'PLAYING' || GF.tutorial.active) return;
  var dx = e.clientX - selector.x, dy = e.clientY - selector.y;
  var d = Math.sqrt(dx * dx + dy * dy);
  if (d < 14 || d > 240) { hover_angle = -1; return; }
  hover_angle = wedgeFromPoint(dx, dy);
});
GF.canvas.addEventListener('touchstart', function (e) {
  if (!e.changedTouches || !e.changedTouches.length) return;
  var t0 = e.changedTouches[0];
  onPointer(t0.clientX, t0.clientY);
}, { passive: false });

document.addEventListener('keydown', function (e) {
  if (GF.tutorial.active) {
    // Only let keyboard advance through click_any / auto steps. click_target
    // steps require an actual pointer hit on the highlighted thing so the
    // player learns where to tap — blind advancing would defeat the lesson.
    var step = GF.tutorial.steps && GF.tutorial.steps[GF.tutorial.step];
    var canAdvance = step && (step.advance === 'click_any' || step.advance === 'auto');
    if (canAdvance && (e.code === 'Escape' || e.code === 'Enter' || e.code === 'Space')) {
      GF.tutorial.next();
    }
    return;
  }
  if (gs === 'MENU' && (e.code === 'Enter' || e.code === 'Space')) { startGame(); return; }
  if (gs === 'GAMEOVER' && (e.code === 'Enter' || e.code === 'KeyR')) { retryLevel(); return; }
  if (gs === 'LEVELEND' && (e.code === 'Enter' || e.code === 'Space')) { nextLevel(); return; }
  if (gs === 'WIN' && (e.code === 'Enter' || e.code === 'Space')) { startGame(); return; }
  if (gs === 'PLAYING' && selector.open) {
    if (e.code === 'Digit1' || e.code === 'Numpad1') { commitStrike(selector.nx, selector.ny, 0); selector.open = false; hover_angle = -1; }
    else if (e.code === 'Digit2' || e.code === 'Numpad2') { commitStrike(selector.nx, selector.ny, 1); selector.open = false; hover_angle = -1; }
    else if (e.code === 'Digit3' || e.code === 'Numpad3') { commitStrike(selector.nx, selector.ny, 2); selector.open = false; hover_angle = -1; }
    else if (e.code === 'Escape') { selector.open = false; hover_angle = -1; }
  }
});

// LAYOUT
function computeLayout() {
  var W = GF.W, H = GF.H;
  var hudH = GF.clamp(56 * GF.S, 40, 80);
  var pad = GF.clamp(14 * GF.S, 6, 22);
  var availW = W - pad * 2;
  var availH = H - hudH - pad * 2;
  var cell = Math.floor(Math.min(availW / GRID_W, availH / GRID_H));
  cell = Math.max(20, cell);
  var gridW = cell * GRID_W;
  var gridH = cell * GRID_H;
  var gridX = Math.floor((W - gridW) / 2);
  var gridY = hudH + pad + Math.floor((availH - gridH) / 2);
  return { gridX: gridX, gridY: gridY, cell: cell, hudH: hudH };
}

// DRAW
var closeBtn = null;
var helpBtnRect = null;

function draw(ctx) {
  ctx.fillStyle = '#1a1612';
  ctx.fillRect(0, 0, GF.W, GF.H);
  if (gs === 'PLAYING' || gs === 'LEVELEND' || gs === 'GAMEOVER') {
    drawSlab(ctx);
    drawHUD(ctx);
    if (selector.open && !GF.tutorial.active) drawSelector(ctx);
  }
  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'LEVELEND') drawLevelEnd(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
  if (gs === 'WIN') drawWon(ctx);
  GF.tutorial.draw(ctx);
}

function drawSlab(ctx) {
  var L = computeLayout();
  var grad = ctx.createLinearGradient(L.gridX, L.gridY, L.gridX, L.gridY + L.cell * GRID_H);
  grad.addColorStop(0, '#6e6258');
  grad.addColorStop(1, '#4a4138');
  ctx.fillStyle = grad;
  ctx.fillRect(L.gridX - 4, L.gridY - 4, L.cell * GRID_W + 8, L.cell * GRID_H + 8);

  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  var spRng = mulberry32(level * 99371);
  for (var i = 0; i < 220; i++) {
    var sx = L.gridX + spRng() * L.cell * GRID_W;
    var sy = L.gridY + spRng() * L.cell * GRID_H;
    ctx.beginPath();
    ctx.arc(sx, sy, 1 + spRng() * 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Forbidden veins
  for (var y = 0; y < GRID_H; y++) {
    for (var x = 0; x < GRID_W; x++) {
      if (!cells[y][x].vein) continue;
      var rx = L.gridX + x * L.cell, ry = L.gridY + y * L.cell;
      var rg = ctx.createRadialGradient(rx + L.cell / 2, ry + L.cell / 2, 2, rx + L.cell / 2, ry + L.cell / 2, L.cell);
      rg.addColorStop(0, 'rgba(231,76,94,0.85)');
      rg.addColorStop(1, 'rgba(120,20,30,0.15)');
      ctx.fillStyle = rg;
      ctx.fillRect(rx, ry, L.cell, L.cell);
      ctx.strokeStyle = 'rgba(255,70,90,0.9)';
      ctx.lineWidth = Math.max(1.5, L.cell * 0.06);
      ctx.beginPath();
      var vsRng = mulberry32((x * 73 + y * 131 + level) >>> 0);
      ctx.moveTo(rx + L.cell * 0.15, ry + L.cell * 0.5);
      for (var k = 1; k <= 4; k++) {
        ctx.lineTo(rx + (k / 4) * L.cell * 0.85 + L.cell * 0.1, ry + (0.3 + vsRng() * 0.5) * L.cell);
      }
      ctx.stroke();
    }
  }

  // Cracked-cell shading
  for (var y2 = 0; y2 < GRID_H; y2++) {
    for (var x2 = 0; x2 < GRID_W; x2++) {
      if (!cells[y2][x2].cracked || cells[y2][x2].vein) continue;
      var crx = L.gridX + x2 * L.cell, cry = L.gridY + y2 * L.cell;
      ctx.fillStyle = 'rgba(20,15,10,0.22)';
      ctx.fillRect(crx, cry, L.cell, L.cell);
    }
  }

  // Chunk highlight
  ctx.fillStyle = 'rgba(255,210,130,0.18)';
  for (var y3 = 0; y3 < GRID_H; y3++) {
    for (var x3 = 0; x3 < GRID_W; x3++) {
      if (!cells[y3][x3].chunk) continue;
      ctx.fillRect(L.gridX + x3 * L.cell, L.gridY + y3 * L.cell, L.cell, L.cell);
    }
  }
  // Chunk dashed border
  ctx.save();
  ctx.strokeStyle = '#ffd685';
  ctx.lineWidth = Math.max(2, L.cell * 0.08);
  if (ctx.setLineDash) ctx.setLineDash([Math.max(4, L.cell * 0.18), Math.max(4, L.cell * 0.12)]);
  for (var y4 = 0; y4 < GRID_H; y4++) {
    for (var x4 = 0; x4 < GRID_W; x4++) {
      if (!cells[y4][x4].chunk) continue;
      var bx = L.gridX + x4 * L.cell, by = L.gridY + y4 * L.cell;
      if (y4 === 0 || !cells[y4 - 1][x4].chunk) { ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx + L.cell, by); ctx.stroke(); }
      if (y4 === GRID_H - 1 || !cells[y4 + 1][x4].chunk) { ctx.beginPath(); ctx.moveTo(bx, by + L.cell); ctx.lineTo(bx + L.cell, by + L.cell); ctx.stroke(); }
      if (x4 === 0 || !cells[y4][x4 - 1].chunk) { ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx, by + L.cell); ctx.stroke(); }
      if (x4 === GRID_W - 1 || !cells[y4][x4 + 1].chunk) { ctx.beginPath(); ctx.moveTo(bx + L.cell, by); ctx.lineTo(bx + L.cell, by + L.cell); ctx.stroke(); }
    }
  }
  if (ctx.setLineDash) ctx.setLineDash([]);
  ctx.restore();

  // Grid lines
  ctx.strokeStyle = 'rgba(0,0,0,0.18)';
  ctx.lineWidth = 1;
  for (var gx = 0; gx <= GRID_W; gx++) {
    ctx.beginPath();
    ctx.moveTo(L.gridX + gx * L.cell, L.gridY);
    ctx.lineTo(L.gridX + gx * L.cell, L.gridY + GRID_H * L.cell);
    ctx.stroke();
  }
  for (var gy = 0; gy <= GRID_H; gy++) {
    ctx.beginPath();
    ctx.moveTo(L.gridX, L.gridY + gy * L.cell);
    ctx.lineTo(L.gridX + GRID_W * L.cell, L.gridY + gy * L.cell);
    ctx.stroke();
  }

  // Cracked edges
  ctx.strokeStyle = '#0a0907';
  ctx.lineWidth = Math.max(2.5, L.cell * 0.12);
  ctx.lineCap = 'round';
  for (var ey = 0; ey <= GRID_H; ey++) {
    for (var ex = 0; ex < GRID_W; ex++) {
      if (!edgeH[ey][ex]) continue;
      var x0 = L.gridX + ex * L.cell;
      var y0 = L.gridY + ey * L.cell;
      drawJaggedLine(ctx, x0, y0, x0 + L.cell, y0, (ex * 17 + ey * 31 + level) >>> 0);
    }
  }
  for (var ey2 = 0; ey2 < GRID_H; ey2++) {
    for (var ex2 = 0; ex2 <= GRID_W; ex2++) {
      if (!edgeV[ey2][ex2]) continue;
      var x1 = L.gridX + ex2 * L.cell;
      var y1 = L.gridY + ey2 * L.cell;
      drawJaggedLine(ctx, x1, y1, x1, y1 + L.cell, (ex2 * 23 + ey2 * 47 + level) >>> 0);
    }
  }

  // Grain markers
  ctx.strokeStyle = 'rgba(40,30,20,0.5)';
  ctx.lineWidth = Math.max(1.2, L.cell * 0.04);
  for (var nyy = 0; nyy <= GRID_H; nyy++) {
    for (var nxx = 0; nxx <= GRID_W; nxx++) {
      if (!nodes[nyy][nxx].grain) continue;
      var ngx = L.gridX + nxx * L.cell;
      var ngy = L.gridY + nyy * L.cell;
      var r = Math.max(3, L.cell * 0.16);
      ctx.beginPath();
      ctx.moveTo(ngx - r, ngy - r); ctx.lineTo(ngx + r, ngy + r);
      ctx.moveTo(ngx + r, ngy - r); ctx.lineTo(ngx - r, ngy + r);
      ctx.stroke();
    }
  }

  // Ghost preview
  if (selector.open && hover_angle >= 0) {
    var sim = simulateStrike(selector.nx, selector.ny, hover_angle);
    ctx.save();
    ctx.globalAlpha = PREVIEW_ALPHA;
    ctx.strokeStyle = sim.hitVein ? '#e74c5e' : '#ffd685';
    ctx.lineWidth = Math.max(3, L.cell * 0.14);
    ctx.lineCap = 'round';
    for (var pi = 0; pi < sim.edges.length; pi++) {
      var pe = sim.edges[pi];
      if (pe.type === 'h') {
        var px0 = L.gridX + pe.x * L.cell, py0 = L.gridY + pe.y * L.cell;
        ctx.beginPath(); ctx.moveTo(px0, py0); ctx.lineTo(px0 + L.cell, py0); ctx.stroke();
      } else {
        var px1 = L.gridX + pe.x * L.cell, py1 = L.gridY + pe.y * L.cell;
        ctx.beginPath(); ctx.moveTo(px1, py1); ctx.lineTo(px1, py1 + L.cell); ctx.stroke();
      }
    }
    ctx.restore();
  }
}

function drawJaggedLine(ctx, x0, y0, x1, y1, seed) {
  var jR = mulberry32(seed >>> 0);
  var dx = x1 - x0, dy = y1 - y0;
  var len = Math.sqrt(dx * dx + dy * dy);
  var steps = 5;
  var nx = -dy / len, ny = dx / len;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  for (var i = 1; i < steps; i++) {
    var t = i / steps;
    var jitter = (jR() - 0.5) * len * 0.18;
    ctx.lineTo(x0 + dx * t + nx * jitter, y0 + dy * t + ny * jitter);
  }
  ctx.lineTo(x1, y1);
  ctx.stroke();
}

function drawHUD(ctx) {
  var W = GF.W;
  var fs = GF.clamp(18 * GF.S, 13, 24);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e8d8a0';
  var hudY = GF.clamp(28 * GF.S, 22, 40);
  ctx.fillText(GF.t('level') + ' ' + level + ' / ' + LEVEL_COUNT, 18 * GF.S, hudY);

  ctx.textAlign = 'right';
  ctx.fillText(GF.t('strikes') + ':', W - 18 * GF.S - MAX_STRIKES * (fs + 6) - 4, hudY);
  for (var i = 0; i < MAX_STRIKES; i++) {
    var px = W - 18 * GF.S - (MAX_STRIKES - 1 - i) * (fs + 6) - fs / 2;
    var py = hudY;
    ctx.fillStyle = (i < strikes_left) ? '#ffd685' : '#5a4a3a';
    ctx.beginPath();
    ctx.arc(px, py, fs * 0.36, 0, Math.PI * 2);
    ctx.fill();
  }

  // Help (?) button
  var hbS = GF.clamp(36 * GF.S, 28, 48);
  helpBtnRect = { x: 14 * GF.S, y: GF.H - hbS - 14 * GF.S, w: hbS, h: hbS };
  ctx.fillStyle = 'rgba(255,214,133,0.15)';
  GF.rr(ctx, helpBtnRect.x, helpBtnRect.y, hbS, hbS, hbS / 2);
  ctx.fill();
  ctx.strokeStyle = '#ffd685';
  ctx.lineWidth = 1.5;
  GF.rr(ctx, helpBtnRect.x, helpBtnRect.y, hbS, hbS, hbS / 2);
  ctx.stroke();
  ctx.fillStyle = '#ffd685';
  ctx.font = 'bold ' + GF.clamp(20 * GF.S, 14, 26) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', helpBtnRect.x + hbS / 2, helpBtnRect.y + hbS / 2);
}

function drawSelector(ctx) {
  var L = computeLayout();
  var cx = selector.x, cy = selector.y;
  var ringR = Math.max(48, L.cell * 1.8);
  var innerR = Math.max(16, L.cell * 0.5);

  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  ctx.beginPath();
  ctx.arc(cx, cy, ringR + 8, 0, Math.PI * 2);
  ctx.fill();

  for (var i = 0; i < 3; i++) {
    var a0, a1;
    if (i === 0) { a0 = -Math.PI + 0.05; a1 = -Math.PI * 2 / 3; }
    else if (i === 1) { a0 = -Math.PI * 2 / 3 + 0.04; a1 = -Math.PI / 3 - 0.04; }
    else { a0 = -Math.PI / 3; a1 = -0.05; }
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, ringR, a0, a1, false);
    ctx.closePath();
    if (hover_angle === i) ctx.fillStyle = 'rgba(255,214,133,0.55)';
    else ctx.fillStyle = 'rgba(110,98,88,0.85)';
    ctx.fill();
    ctx.strokeStyle = '#1a1612';
    ctx.lineWidth = 2;
    ctx.stroke();
    var midA = (a0 + a1) / 2;
    var lx = cx + Math.cos(midA) * ringR * 0.62;
    var ly = cy + Math.sin(midA) * ringR * 0.62;
    ctx.fillStyle = '#1a1612';
    ctx.font = 'bold ' + GF.clamp(16 * GF.S, 12, 22) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ANGLE_LABELS[i] + ' deg', lx, ly);
  }

  ctx.fillStyle = 'rgba(40,30,20,0.85)';
  ctx.beginPath();
  ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#ffd685';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.strokeStyle = '#ffd685';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - innerR * 0.4, cy - innerR * 0.4);
  ctx.lineTo(cx + innerR * 0.4, cy + innerR * 0.4);
  ctx.moveTo(cx + innerR * 0.4, cy - innerR * 0.4);
  ctx.lineTo(cx - innerR * 0.4, cy + innerR * 0.4);
  ctx.stroke();

  ctx.fillStyle = '#e8d8a0';
  ctx.font = 'bold ' + GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(GF.t('angle_hint'), cx, cy + ringR + 8);
}

function drawMenu(ctx) {
  var W = GF.W, H = GF.H;
  ctx.fillStyle = '#1a1612';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,214,133,0.04)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#ffd685';
  var titleFs = GF.clamp(44 * GF.S, 26, 64);
  ctx.shadowColor = 'rgba(255,140,60,0.4)'; ctx.shadowBlur = 24 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillText(GF.t('title'), W / 2, H * 0.16 + titleFs);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#cfc0a0';
  ctx.font = GF.clamp(16 * GF.S, 12, 20) + 'px sans-serif';
  ctx.fillText(GF.t('sub'), W / 2, H * 0.16 + titleFs + 26);

  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  ctx.textAlign = 'left';
  ctx.fillStyle = '#e8d8a0';
  ctx.font = 'bold ' + GF.clamp(16 * GF.S, 12, 19) + 'px sans-serif';
  var px = W * 0.10;
  var pw = W * 0.80;
  var py = H * 0.38;
  ctx.fillText(GF.t('tut_title'), px, py);
  ctx.fillStyle = '#bfb4a0';
  ctx.font = GF.clamp(14 * GF.S, 11, 17) + 'px sans-serif';
  var lh = GF.clamp(22 * GF.S, 16, 28);
  py += lh + 4;
  for (var i = 0; i < lines.length; i++) {
    py = wrapText(ctx, lines[i], px, py, pw, lh) + 4;
  }

  var bw = GF.clamp(260 * GF.S, 180, 320);
  var bh = GF.clamp(58 * GF.S, 44, 72);
  var bx = (W - bw) / 2;
  var by = H * 0.85;
  GF.rr(ctx, bx, by, bw, bh, bh / 2);
  var grad = ctx.createLinearGradient(bx, by, bx, by + bh);
  grad.addColorStop(0, '#ffaa55'); grad.addColorStop(1, '#cc7733');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.fillStyle = '#1a1612';
  ctx.font = 'bold ' + GF.clamp(22 * GF.S, 16, 28) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), bx + bw / 2, by + bh / 2);
  GF._menuPlayBtn = { x: bx, y: by, w: bw, h: bh };

  if (best_level > 0) {
    ctx.fillStyle = '#9a8870';
    ctx.font = GF.clamp(13 * GF.S, 10, 16) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(GF.t('best') + ': ' + GF.t('level') + ' ' + best_level, W / 2, by + bh + 24);
  }
}

function drawLevelEnd(ctx) {
  var W = GF.W, H = GF.H;
  ctx.fillStyle = 'rgba(8,8,12,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#48c9b0';
  ctx.font = 'bold ' + GF.clamp(40 * GF.S, 24, 56) + 'px sans-serif';
  ctx.fillText(GF.t('level_won'), W / 2, H * 0.42);
  ctx.fillStyle = '#cfc0a0';
  ctx.font = GF.clamp(16 * GF.S, 12, 20) + 'px sans-serif';
  ctx.fillText(GF.t('level') + ' ' + level + ' / ' + LEVEL_COUNT, W / 2, H * 0.42 + 30);

  var bw = GF.clamp(260 * GF.S, 180, 320);
  var bh = GF.clamp(58 * GF.S, 44, 72);
  var bx = (W - bw) / 2;
  var by = H * 0.62;
  GF.rr(ctx, bx, by, bw, bh, bh / 2);
  var grad = ctx.createLinearGradient(bx, by, bx, by + bh);
  grad.addColorStop(0, '#48c9b0'); grad.addColorStop(1, '#2e8b76');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.fillStyle = '#0a0a14';
  ctx.font = 'bold ' + GF.clamp(20 * GF.S, 14, 26) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(level >= LEVEL_COUNT ? GF.t('again') : GF.t('next'), bx + bw / 2, by + bh / 2);
  GF._endBtn = { x: bx, y: by, w: bw, h: bh, fn: nextLevel };
}

function drawGameOver(ctx) {
  var W = GF.W, H = GF.H;
  ctx.fillStyle = 'rgba(8,4,4,0.78)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#e74c5e';
  ctx.font = 'bold ' + GF.clamp(40 * GF.S, 24, 56) + 'px sans-serif';
  ctx.fillText(GF.t('gameover'), W / 2, H * 0.42);
  ctx.fillStyle = '#cfc0a0';
  ctx.font = GF.clamp(15 * GF.S, 11, 19) + 'px sans-serif';
  ctx.fillText(gameover_reason || '', W / 2, H * 0.42 + 30);

  var bw = GF.clamp(260 * GF.S, 180, 320);
  var bh = GF.clamp(58 * GF.S, 44, 72);
  var bx = (W - bw) / 2;
  var by = H * 0.62;
  GF.rr(ctx, bx, by, bw, bh, bh / 2);
  var grad = ctx.createLinearGradient(bx, by, bx, by + bh);
  grad.addColorStop(0, '#e74c5e'); grad.addColorStop(1, '#a0303f');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + GF.clamp(20 * GF.S, 14, 26) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('retry'), bx + bw / 2, by + bh / 2);
  GF._endBtn = { x: bx, y: by, w: bw, h: bh, fn: retryLevel };
}

function drawWon(ctx) {
  var W = GF.W, H = GF.H;
  ctx.fillStyle = 'rgba(8,8,12,0.78)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#ffd685';
  ctx.font = 'bold ' + GF.clamp(48 * GF.S, 28, 64) + 'px sans-serif';
  ctx.shadowColor = 'rgba(255,140,60,0.5)'; ctx.shadowBlur = 24;
  ctx.fillText(GF.t('won'), W / 2, H * 0.42);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#cfc0a0';
  ctx.font = GF.clamp(16 * GF.S, 12, 20) + 'px sans-serif';
  ctx.fillText(GF.t('level') + ' ' + LEVEL_COUNT + ' / ' + LEVEL_COUNT, W / 2, H * 0.42 + 32);

  var bw = GF.clamp(260 * GF.S, 180, 320);
  var bh = GF.clamp(58 * GF.S, 44, 72);
  var bx = (W - bw) / 2;
  var by = H * 0.62;
  GF.rr(ctx, bx, by, bw, bh, bh / 2);
  var grad = ctx.createLinearGradient(bx, by, bx, by + bh);
  grad.addColorStop(0, '#ffaa55'); grad.addColorStop(1, '#cc7733');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.fillStyle = '#1a1612';
  ctx.font = 'bold ' + GF.clamp(20 * GF.S, 14, 26) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('again'), bx + bw / 2, by + bh / 2);
  GF._endBtn = { x: bx, y: by, w: bw, h: bh, fn: startGame };
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  var words = (text || '').split(' ');
  var line = '';
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, y);
      line = words[i];
      y += lineH;
    } else {
      line = test;
    }
  }
  if (line) { ctx.fillText(line, x, y); y += lineH; }
  return y;
}

function inRect(x, y, r) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

// Overlay click delegation. NOTE: GF.tutorial.handleClick is invoked
// ONLY in onPointer (mousedown/touchstart) — calling it here would
// double-fire because each tap dispatches mousedown→click in sequence.
// We gate these handlers on tutorial.active so menu/end buttons don't
// react while the tutorial overlay is up.
GF.canvas.addEventListener('click', function (e) {
  if (GF.tutorial.active) return;
  var px = e.clientX, py = e.clientY;
  if (gs === 'MENU' && GF._menuPlayBtn && inRect(px, py, GF._menuPlayBtn)) { startGame(); return; }
  if ((gs === 'LEVELEND' || gs === 'GAMEOVER' || gs === 'WIN') && GF._endBtn && inRect(px, py, GF._endBtn)) { GF._endBtn.fn(); return; }
});
GF.canvas.addEventListener('touchend', function (e) {
  if (GF.tutorial.active) return;
  if (!e.changedTouches || !e.changedTouches.length) return;
  var t0 = e.changedTouches[0];
  var px = t0.clientX, py = t0.clientY;
  if (gs === 'MENU' && GF._menuPlayBtn && inRect(px, py, GF._menuPlayBtn)) { startGame(); return; }
  if ((gs === 'LEVELEND' || gs === 'GAMEOVER' || gs === 'WIN') && GF._endBtn && inRect(px, py, GF._endBtn)) { GF._endBtn.fn(); }
}, { passive: false });

function update(dt) {
  GF.tutorial.update(dt);
  /* turn-based — no per-frame world updates */
}

// BOOT
GF.init({
  designW: 900,
  designH: 600,
  strings: STRINGS,
  sprites: [],
  saveKey: 'mason_hammer',
  onReady: function () {
    try { best_level = parseInt(localStorage.getItem('mason_hammer_best') || '0') || 0; } catch (e) {}

    GF.persist('mason_hammer_run_v1',
      function () {
        return {
          gs: gs, level: level, strikes_left: strikes_left, chunk_sealed: chunk_sealed,
          edgeH: edgeH, edgeV: edgeV,
        };
      },
      function (s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        level = s.level || 1;
        strikes_left = (typeof s.strikes_left === 'number') ? s.strikes_left : MAX_STRIKES;
        chunk_sealed = !!s.chunk_sealed;
        buildLevel(level);
        try {
          if (s.edgeH && s.edgeH.length === edgeH.length) edgeH = s.edgeH;
          if (s.edgeV && s.edgeV.length === edgeV.length) edgeV = s.edgeV;
        } catch (_) {}
      }
    );
    if (gs === 'PLAYING' && !cells.length) buildLevel(level);
    if (gs === 'PLAYING') gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// STATE EXPOSURE
GF.exposeState(function () {
  return {
    gs: gs,
    level: level,
    strikes_left: strikes_left,
    chunk_sealed: chunk_sealed,
    GRID_W: GRID_W,
    GRID_H: GRID_H,
    MAX_STRIKES: MAX_STRIKES,
    CRACK_LEN_MIN: CRACK_LEN_MIN,
    CRACK_LEN_MAX: CRACK_LEN_MAX,
    FORK_CHANCE: FORK_CHANCE,
    GRAIN_DENSITY: GRAIN_DENSITY,
    VEIN_DENSITY: VEIN_DENSITY,
    LEVEL_COUNT: LEVEL_COUNT,
    PREVIEW_ALPHA: PREVIEW_ALPHA,
  };
});

})();
</script>
</body>
