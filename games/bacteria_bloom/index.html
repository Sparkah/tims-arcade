<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bacteria Bloom</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #06121a; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── GAME-SPECIFIC CONFIG ─────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Bacteria Bloom',
    sub:   'Place bacteria, chain colonies, outbreak the dish',
    play: 'PLAY', retry: 'RETRY', next: 'NEXT ROUND',
    score: 'SCORE', best: 'BEST', round: 'ROUND', target: 'TARGET',
    gameover: 'DISH FILLED',
    hand: 'HAND', combo: 'OUTBREAK',
    target_hit: 'COLONY GROWN!',
    spreader_armed: 'SPREADER ARMED  x2 NEXT CHAIN',
    pick_row: 'TAP A ROW TO WIPE',
  },
  ru: {
    title: 'Цветение Бактерий',
    sub:   'Заражай чашку Петри цепной реакцией',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', next: 'ДАЛЕЕ',
    score: 'ОЧКИ', best: 'РЕКОРД', round: 'РАУНД', target: 'ЦЕЛЬ',
    gameover: 'ЧАШКА ЗАПОЛНЕНА',
    hand: 'РУКА', combo: 'ВСПЫШКА',
    target_hit: 'КОЛОНИЯ РАЗРОСЛАСЬ!',
    spreader_armed: 'УСИЛИТЕЛЬ ГОТОВ  x2 СЛЕДУЮЩАЯ ЦЕПЬ',
    pick_row: 'ВЫБЕРИ РЯД ДЛЯ ОЧИСТКИ',
  },
};

var SPRITE_NAMES = ['bacteria_red', 'bacteria_green', 'bacteria_blue', 'bacteria_yellow',
                    'card_mutation', 'card_antibiotic', 'card_spreader'];

var COLORS = {
  red:    { fill: '#ff5577', glow: '#ff8aa6', dim: '#7a1a30' },
  green:  { fill: '#5cf07e', glow: '#aaf7bc', dim: '#1d6a30' },
  blue:   { fill: '#4dc8ff', glow: '#9be3ff', dim: '#0e4a78' },
  yellow: { fill: '#ffd84d', glow: '#fff0a8', dim: '#7a5a10' },
  wild:   { fill: '#d678ff', glow: '#ecb5ff', dim: '#5a1a78' },
};
var COLOR_KEYS = ['red', 'green', 'blue', 'yellow'];

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';
var grid = [];
var GRID_N = 6;
var hand = [];
var HAND_MAX = 5;
var selectedCard = -1;
var score = 0, best = 0;
var round = 1;
var target = 30;
var spreaderArmed = false;
var turnCount = 0;
var turnsSinceSpecial = 0;
var lastChainCells = [];
var chainAnim = 0;
var roundAnim = 0;
var hoverCell = -1;

var layout = {
  gridX: 0, gridY: 0, gridSize: 0, cell: 0,
  handY: 0, cardW: 0, cardH: 0, cardGap: 0,
};

// ── HELPERS ──────────────────────────────────────────────────────────────
function rng(max) { return Math.floor(Math.random() * max); }

function pickColorKey() {
  var pool = round >= 2 ? COLOR_KEYS : ['red', 'green', 'blue'];
  return pool[rng(pool.length)];
}

function newColorCard() { return { kind: 'color', color: pickColorKey() }; }

function newSpecialCard() {
  var pool = ['mutation', 'antibiotic', 'spreader'];
  return { kind: pool[rng(pool.length)] };
}

function makeCardForDraw() {
  if (turnsSinceSpecial >= 4 + rng(2)) {
    turnsSinceSpecial = 0;
    return newSpecialCard();
  }
  turnsSinceSpecial++;
  return newColorCard();
}

function refillHand() {
  while (hand.length < HAND_MAX) hand.push(makeCardForDraw());
}

function emptyGrid() {
  grid = [];
  for (var i = 0; i < GRID_N * GRID_N; i++) grid.push(null);
}

function gridGet(r, c) {
  if (r < 0 || c < 0 || r >= GRID_N || c >= GRID_N) return undefined;
  return grid[r * GRID_N + c];
}
function gridSet(r, c, v) { grid[r * GRID_N + c] = v; }

function isFull() {
  for (var i = 0; i < grid.length; i++) if (!grid[i]) return false;
  return true;
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  score = 0;
  round = 1;
  target = 30;
  spreaderArmed = false;
  turnCount = 0;
  turnsSinceSpecial = 0;
  selectedCard = -1;
  hand = [];
  HAND_MAX = 5;
  emptyGrid();
  refillHand();
  for (var s = 0; s < 4; s++) {
    var r, c, tries = 0;
    do { r = rng(GRID_N); c = rng(GRID_N); tries++; }
    while (gridGet(r, c) && tries < 30);
    if (!gridGet(r, c)) gridSet(r, c, { color: pickColorKey() });
  }
  gs = 'PLAYING';
}

function nextRound() {
  round++;
  target = Math.round(target * 1.6);
  HAND_MAX = Math.max(3, 5 - Math.floor((round - 1) / 2));
  spreaderArmed = false;
  selectedCard = -1;
  hand = [];
  emptyGrid();
  refillHand();
  var starters = 3 + Math.min(3, round);
  for (var s = 0; s < starters; s++) {
    var r, c, tries = 0;
    do { r = rng(GRID_N); c = rng(GRID_N); tries++; }
    while (gridGet(r, c) && tries < 30);
    if (!gridGet(r, c)) gridSet(r, c, { color: pickColorKey() });
  }
  roundAnim = 1;
  gs = 'PLAYING';
}

function gameOver() {
  if (score > best) {
    best = score;
    try { localStorage.setItem('bacteria_bloom_best', best); } catch (e) {}
  }
  gs = 'GAMEOVER';
  if (window.GF && typeof window.GF.gameEnded === 'function') window.GF.gameEnded();
}

function checkRoundOutcome() {
  if (score >= target) {
    gs = 'ROUND_OVER';
    if (window.GF && typeof window.GF.gameEnded === 'function') window.GF.gameEnded();
    return;
  }
  if (isFull() || hand.length === 0) gameOver();
}

// ── CHAIN / PLACEMENT ────────────────────────────────────────────────────
function chainFrom(r, c, color) {
  // Place the new bacterium and look for adjacent SAME-COLOR cells. If at
  // least 2 same-color neighbours connect (3-in-a-row counting the new
  // placement), we trigger an outbreak that pops them all. Otherwise the
  // bacterium just stays — no infection, no score. This prevents the flood
  // fill bug where one placement infected the whole empty grid.
  var visited = {};
  var key = function(rr, cc) { return rr * 100 + cc; };
  var DIRS = [[1,0],[-1,0],[0,1],[0,-1]];

  gridSet(r, c, { color: color });
  visited[key(r, c)] = true;

  // Wild cards count as the placed color for matching purposes
  var matchColor = color;

  // BFS through cells that match (same color OR wild) — but never through empty cells
  var queue = [[r, c]];
  var matched = [{ r: r, c: c }];

  while (queue.length) {
    var p = queue.shift();
    var pr = p[0], pc = p[1];
    for (var d = 0; d < 4; d++) {
      var nr = pr + DIRS[d][0];
      var nc = pc + DIRS[d][1];
      if (nr < 0 || nc < 0 || nr >= GRID_N || nc >= GRID_N) continue;
      if (visited[key(nr, nc)]) continue;
      var ncell = gridGet(nr, nc);
      if (!ncell) continue;                            // skip empty
      if (ncell.color !== matchColor && ncell.color !== 'wild') continue;
      visited[key(nr, nc)] = true;
      matched.push({ r: nr, c: nc });
      queue.push([nr, nc]);
    }
  }

  // Need 3+ to trigger an outbreak (placement + 2 neighbours).
  // If fewer, the bacterium just sits — score 0, board fills up over time.
  return matched.length >= 3 ? matched : [];
}

function placeColorAt(r, c, color) {
  if (gridGet(r, c)) return false;
  var infected = chainFrom(r, c, color);

  var len = infected.length;
  var mult = 1 + Math.floor(len / 4);
  if (spreaderArmed) { mult *= 2; spreaderArmed = false; }
  var gain = len * mult;
  score += gain;

  // If outbreak triggered, clear the matched cells so the board doesn't fill up
  for (var i = 0; i < infected.length; i++) {
    gridSet(infected[i].r, infected[i].c, null);
    var cellPos = cellCenter(infected[i].r, infected[i].c);
    var col = COLORS[color] || COLORS.red;
    GF.spawnParticles(cellPos.x, cellPos.y, col.glow, 6);
  }
  var lastPos = cellCenter(infected[infected.length-1].r, infected[infected.length-1].c);
  GF.spawnFloat(lastPos.x, lastPos.y, '+' + gain + (mult > 1 ? '  x' + mult : ''),
                COLORS[color].glow);
  GF.setShake(Math.min(0.5, 0.05 + len * 0.04));

  lastChainCells = infected;
  chainAnim = 1;
  return true;
}

function applyMutationAt(r, c) {
  if (gridGet(r, c)) return false;
  var counts = {};
  var DIRS = [[1,0],[-1,0],[0,1],[0,-1]];
  var bestColor = null, bestN = 0;
  for (var d = 0; d < 4; d++) {
    var nr = r + DIRS[d][0], nc = c + DIRS[d][1];
    var n = gridGet(nr, nc);
    if (n && n.color !== 'wild') {
      counts[n.color] = (counts[n.color] || 0) + 1;
      if (counts[n.color] > bestN) { bestN = counts[n.color]; bestColor = n.color; }
    }
  }
  var color = bestColor || COLOR_KEYS[rng(COLOR_KEYS.length)];
  var cp = cellCenter(r, c);
  GF.spawnParticles(cp.x, cp.y, COLORS.wild.glow, 14);
  GF.setShake(0.3);
  return placeColorAt(r, c, color);
}

function applyAntibioticRow(rowIdx) {
  var wiped = 0;
  for (var c = 0; c < GRID_N; c++) {
    if (gridGet(rowIdx, c)) {
      var p = cellCenter(rowIdx, c);
      GF.spawnParticles(p.x, p.y, '#cfeafd', 8);
      gridSet(rowIdx, c, null);
      wiped++;
    }
  }
  GF.setShake(0.4);
  score += wiped * 2;
  GF.spawnFloat(layout.gridX + layout.gridSize / 2,
                layout.gridY + rowIdx * layout.cell + layout.cell / 2,
                '+' + (wiped * 2), '#cfeafd');
}

function applySpreader() {
  spreaderArmed = true;
  GF.spawnFloat(GF.cx, layout.handY - 30 * GF.S, 'X2 ARMED', '#ffd84d');
}

// ── INPUT ────────────────────────────────────────────────────────────────
function cellCenter(r, c) {
  return {
    x: layout.gridX + c * layout.cell + layout.cell / 2,
    y: layout.gridY + r * layout.cell + layout.cell / 2,
  };
}

function pointToCell(x, y) {
  if (x < layout.gridX || y < layout.gridY) return null;
  if (x >= layout.gridX + layout.gridSize || y >= layout.gridY + layout.gridSize) return null;
  var c = Math.floor((x - layout.gridX) / layout.cell);
  var r = Math.floor((y - layout.gridY) / layout.cell);
  if (r < 0 || c < 0 || r >= GRID_N || c >= GRID_N) return null;
  return { r: r, c: c };
}

function pointToCard(x, y) {
  if (y < layout.handY || y > layout.handY + layout.cardH) return -1;
  var totalW = hand.length * layout.cardW + (hand.length - 1) * layout.cardGap;
  var startX = (GF.W - totalW) / 2;
  if (x < startX) return -1;
  var rel = x - startX;
  var slot = layout.cardW + layout.cardGap;
  var idx = Math.floor(rel / slot);
  if (idx < 0 || idx >= hand.length) return -1;
  var local = rel - idx * slot;
  if (local > layout.cardW) return -1;
  return idx;
}

function handleTap(x, y) {
  if (gs === 'MENU' || gs === 'GAMEOVER' || gs === 'ROUND_OVER') return;

  if (gs === 'PICK_ROW') {
    var cell0 = pointToCell(x, y);
    if (cell0) {
      applyAntibioticRow(cell0.r);
      hand.splice(selectedCard, 1);
      selectedCard = -1;
      gs = 'PLAYING';
      turnCount++;
      refillHand();
      checkRoundOutcome();
    }
    return;
  }

  var ci = pointToCard(x, y);
  if (ci >= 0) {
    selectedCard = (selectedCard === ci) ? -1 : ci;
    return;
  }

  if (selectedCard < 0) return;

  var cell = pointToCell(x, y);
  if (!cell) return;

  var card = hand[selectedCard];
  if (!card) { selectedCard = -1; return; }

  if (card.kind === 'color') {
    if (gridGet(cell.r, cell.c)) return;
    if (placeColorAt(cell.r, cell.c, card.color)) {
      hand.splice(selectedCard, 1);
      selectedCard = -1;
      turnCount++;
      refillHand();
      checkRoundOutcome();
    }
  } else if (card.kind === 'mutation') {
    if (gridGet(cell.r, cell.c)) return;
    if (applyMutationAt(cell.r, cell.c)) {
      hand.splice(selectedCard, 1);
      selectedCard = -1;
      turnCount++;
      refillHand();
      checkRoundOutcome();
    }
  } else if (card.kind === 'antibiotic') {
    gs = 'PICK_ROW';
  } else if (card.kind === 'spreader') {
    applySpreader();
    hand.splice(selectedCard, 1);
    selectedCard = -1;
    turnCount++;
    refillHand();
  }
}

// Screenshot helper
window._jumpLevel = function(n) {
  startGame();
  if (n && n >= 2) round = n;
  emptyGrid();
  var mix = ['red','green','blue','yellow','red','green','blue','yellow','red','blue','green','yellow'];
  for (var i = 0; i < 16; i++) {
    var rr, cc, tries = 0;
    do { rr = rng(GRID_N); cc = rng(GRID_N); tries++; }
    while (gridGet(rr, cc) && tries < 30);
    if (!gridGet(rr, cc)) gridSet(rr, cc, { color: mix[i % mix.length] });
  }
  hand = [
    { kind: 'color', color: 'red' },
    { kind: 'color', color: 'blue' },
    { kind: 'mutation' },
    { kind: 'color', color: 'green' },
    { kind: 'spreader' },
  ];
  selectedCard = 1;
  score = 18 + rng(20);
  gs = 'PLAYING';
};

// ── LAYOUT ───────────────────────────────────────────────────────────────
function computeLayout() {
  var W = GF.W, H = GF.H;
  var hudH = Math.max(60, 80 * GF.S);
  var handH = Math.max(110, 130 * GF.S);
  var availH = H - hudH - handH - 20 * GF.S;
  var availW = W - 24 * GF.S;
  var size = Math.min(availW, availH);
  size = Math.min(size, 560 * GF.S);

  layout.gridSize = size;
  layout.cell = size / GRID_N;
  layout.gridX = (W - size) / 2;
  layout.gridY = hudH + ((H - hudH - handH) - size) / 2;

  var n = Math.max(5, hand.length || 5);
  var maxCardW = (W - 32 * GF.S) / n - 8 * GF.S;
  var idealCardW = Math.min(96 * GF.S, maxCardW);
  layout.cardW = Math.max(56, idealCardW);
  layout.cardH = layout.cardW * 1.3;
  layout.cardGap = 8 * GF.S;
  layout.handY = H - layout.cardH - 16 * GF.S;
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function drawBackground(ctx) {
  var grad = ctx.createRadialGradient(GF.cx, GF.cy, 30, GF.cx, GF.cy, Math.max(GF.W, GF.H) / 1.2);
  grad.addColorStop(0, '#0d2638');
  grad.addColorStop(1, '#04080d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GF.W, GF.H);

  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (var i = 0; i < 40; i++) {
    var x = (i * 173 + 53) % GF.W;
    var y = (i * 91 + 37) % GF.H;
    ctx.beginPath();
    ctx.arc(x, y, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBacterium(ctx, x, y, r, color) {
  var spriteName = 'bacteria_' + color;
  var img = GF.sprites && GF.sprites[spriteName];
  if (img && img.complete && img.naturalWidth > 0) {
    var size = r * 2.2;
    ctx.drawImage(img, x - size / 2, y - size / 2, size, size);
    return;
  }
  var col = COLORS[color] || COLORS.red;
  ctx.save();
  var grad = ctx.createRadialGradient(x, y, r * 0.2, x, y, r * 1.4);
  grad.addColorStop(0, col.glow);
  grad.addColorStop(0.5, col.fill);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r * 1.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = col.fill;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = col.glow;
  ctx.beginPath();
  ctx.arc(x - r * 0.3, y - r * 0.35, r * 0.32, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = col.dim;
  ctx.beginPath();
  ctx.arc(x + r * 0.2, y + r * 0.2, r * 0.22, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawGrid(ctx) {
  var pad = 8 * GF.S;
  var size = layout.gridSize + pad * 2;
  var x = layout.gridX - pad;
  var y = layout.gridY - pad;

  ctx.save();
  GF.rr(ctx, x, y, size, size, 18 * GF.S);
  var bg = ctx.createLinearGradient(x, y, x, y + size);
  bg.addColorStop(0, '#0c2230');
  bg.addColorStop(1, '#061119');
  ctx.fillStyle = bg;
  ctx.fill();

  ctx.lineWidth = 3 * GF.S;
  ctx.strokeStyle = 'rgba(150,210,230,0.25)';
  ctx.stroke();

  ctx.strokeStyle = 'rgba(120,180,210,0.1)';
  ctx.lineWidth = 1;
  for (var i = 1; i < GRID_N; i++) {
    var gx = layout.gridX + i * layout.cell;
    var gy = layout.gridY + i * layout.cell;
    ctx.beginPath(); ctx.moveTo(gx, layout.gridY); ctx.lineTo(gx, layout.gridY + layout.gridSize); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(layout.gridX, gy); ctx.lineTo(layout.gridX + layout.gridSize, gy); ctx.stroke();
  }

  for (var r = 0; r < GRID_N; r++) {
    for (var c = 0; c < GRID_N; c++) {
      var cell = gridGet(r, c);
      if (cell) {
        var cx0 = layout.gridX + c * layout.cell + layout.cell / 2;
        var cy0 = layout.gridY + r * layout.cell + layout.cell / 2;
        drawBacterium(ctx, cx0, cy0, layout.cell * 0.42, cell.color);
      }
    }
  }

  if (gs === 'PICK_ROW') {
    var t = (Date.now() / 200) % (Math.PI * 2);
    var alpha = 0.18 + Math.sin(t) * 0.06;
    for (var rr2 = 0; rr2 < GRID_N; rr2++) {
      var ry = layout.gridY + rr2 * layout.cell;
      ctx.fillStyle = 'rgba(180, 230, 255, ' + alpha + ')';
      ctx.fillRect(layout.gridX, ry, layout.gridSize, layout.cell);
    }
    ctx.fillStyle = '#cfeafd';
    ctx.font = 'bold ' + GF.clamp(18 * GF.S, 14, 26) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('pick_row'), GF.cx, layout.gridY - 22 * GF.S);
  }

  if (gs === 'PLAYING' && selectedCard >= 0 && hand[selectedCard] && hoverCell >= 0) {
    var card = hand[selectedCard];
    var hr = Math.floor(hoverCell / GRID_N);
    var hc = hoverCell % GRID_N;
    var hx = layout.gridX + hc * layout.cell;
    var hy = layout.gridY + hr * layout.cell;
    ctx.strokeStyle = card.kind === 'color' ? COLORS[card.color].glow :
                      card.kind === 'mutation' ? COLORS.wild.glow : '#cfeafd';
    ctx.lineWidth = 3 * GF.S;
    ctx.strokeRect(hx + 2, hy + 2, layout.cell - 4, layout.cell - 4);
  }

  if (chainAnim > 0 && lastChainCells.length) {
    for (var i2 = 0; i2 < lastChainCells.length; i2++) {
      var lc = lastChainCells[i2];
      var lcx = layout.gridX + lc.c * layout.cell + layout.cell / 2;
      var lcy = layout.gridY + lc.r * layout.cell + layout.cell / 2;
      ctx.beginPath();
      ctx.arc(lcx, lcy, layout.cell * 0.55 * (2 - chainAnim), 0, Math.PI * 2);
      var cell2 = gridGet(lc.r, lc.c);
      var col = cell2 ? COLORS[cell2.color] : COLORS.red;
      ctx.strokeStyle = col.glow;
      ctx.globalAlpha = chainAnim * 0.6;
      ctx.lineWidth = 2 * GF.S;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawCard(ctx, x, y, w, h, card, lifted) {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  GF.rr(ctx, x + 2, y + 4, w, h, 12 * GF.S);
  ctx.fill();

  GF.rr(ctx, x, y, w, h, 12 * GF.S);
  var bg;
  if (card.kind === 'color') {
    var col = COLORS[card.color];
    bg = ctx.createLinearGradient(x, y, x, y + h);
    bg.addColorStop(0, col.dim);
    bg.addColorStop(1, '#0a1820');
  } else if (card.kind === 'mutation') {
    bg = ctx.createLinearGradient(x, y, x, y + h);
    bg.addColorStop(0, COLORS.wild.dim);
    bg.addColorStop(1, '#1a0a25');
  } else if (card.kind === 'antibiotic') {
    bg = ctx.createLinearGradient(x, y, x, y + h);
    bg.addColorStop(0, '#1a3340');
    bg.addColorStop(1, '#08161e');
  } else if (card.kind === 'spreader') {
    bg = ctx.createLinearGradient(x, y, x, y + h);
    bg.addColorStop(0, '#3a2c08');
    bg.addColorStop(1, '#180e02');
  } else {
    bg = '#0a1820';
  }
  ctx.fillStyle = bg;
  ctx.fill();

  ctx.lineWidth = lifted ? 3 * GF.S : 1.5 * GF.S;
  ctx.strokeStyle = lifted ? '#fff' : 'rgba(180,210,230,0.4)';
  ctx.stroke();

  var ix = x + w / 2, iy = y + h * 0.42;
  var iconR = w * 0.28;

  if (card.kind === 'color') {
    drawBacterium(ctx, ix, iy, iconR, card.color);
  } else if (card.kind === 'mutation') {
    var spr = GF.sprites && GF.sprites['card_mutation'];
    if (spr && spr.complete && spr.naturalWidth > 0) {
      ctx.drawImage(spr, ix - iconR, iy - iconR, iconR * 2, iconR * 2);
    } else {
      var keys = ['red','green','blue','yellow'];
      for (var k = 0; k < 4; k++) {
        ctx.beginPath();
        ctx.arc(ix, iy, iconR * 0.8, k * Math.PI / 2, (k + 1) * Math.PI / 2);
        ctx.lineWidth = iconR * 0.35;
        ctx.strokeStyle = COLORS[keys[k]].glow;
        ctx.stroke();
      }
      ctx.fillStyle = COLORS.wild.glow;
      ctx.beginPath();
      ctx.arc(ix, iy, iconR * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (card.kind === 'antibiotic') {
    var spr2 = GF.sprites && GF.sprites['card_antibiotic'];
    if (spr2 && spr2.complete && spr2.naturalWidth > 0) {
      ctx.drawImage(spr2, ix - iconR, iy - iconR, iconR * 2, iconR * 2);
    } else {
      ctx.fillStyle = '#cfeafd';
      ctx.beginPath();
      ctx.arc(ix, iy, iconR * 0.8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0a1820';
      ctx.fillRect(ix - iconR * 0.18, iy - iconR * 0.5, iconR * 0.36, iconR);
      ctx.fillRect(ix - iconR * 0.5, iy - iconR * 0.18, iconR, iconR * 0.36);
    }
  } else if (card.kind === 'spreader') {
    var spr3 = GF.sprites && GF.sprites['card_spreader'];
    if (spr3 && spr3.complete && spr3.naturalWidth > 0) {
      ctx.drawImage(spr3, ix - iconR, iy - iconR, iconR * 2, iconR * 2);
    } else {
      ctx.fillStyle = '#ffd84d';
      ctx.beginPath();
      ctx.moveTo(ix - iconR * 0.3, iy - iconR * 0.7);
      ctx.lineTo(ix + iconR * 0.2, iy - iconR * 0.1);
      ctx.lineTo(ix - iconR * 0.05, iy);
      ctx.lineTo(ix + iconR * 0.4, iy + iconR * 0.7);
      ctx.lineTo(ix - iconR * 0.05, iy + iconR * 0.05);
      ctx.lineTo(ix + iconR * 0.15, iy);
      ctx.lineTo(ix - iconR * 0.25, iy - iconR * 0.1);
      ctx.closePath();
      ctx.fill();
    }
  }

  var label = '';
  if (card.kind === 'color') label = (card.color || '').toUpperCase().slice(0, 3);
  else if (card.kind === 'mutation') label = 'MUT';
  else if (card.kind === 'antibiotic') label = 'AB';
  else if (card.kind === 'spreader') label = 'X2';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + GF.clamp(11 * GF.S, 9, 16) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(label, x + w / 2, y + h - 8 * GF.S);

  ctx.restore();
}

function drawHand(ctx) {
  var n = hand.length;
  if (n === 0) return;
  var totalW = n * layout.cardW + (n - 1) * layout.cardGap;
  var startX = (GF.W - totalW) / 2;

  for (var i = 0; i < n; i++) {
    var card = hand[i];
    var cx = startX + i * (layout.cardW + layout.cardGap);
    var cy = layout.handY;
    var lifted = (i === selectedCard);
    if (lifted) cy -= 14 * GF.S;
    drawCard(ctx, cx, cy, layout.cardW, layout.cardH, card, lifted);
  }
}

function drawHUD(ctx) {
  var fs = GF.clamp(14 * GF.S, 11, 20);
  var fsBig = GF.clamp(20 * GF.S, 15, 28);
  ctx.font = 'bold ' + fsBig + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(GF.t('round') + ' ' + round, 16 * GF.S, 14 * GF.S);

  ctx.textAlign = 'right';
  ctx.fillText(score + ' / ' + target, GF.W - 16 * GF.S, 14 * GF.S);

  ctx.font = fs + 'px sans-serif';
  ctx.fillStyle = '#9bc';
  ctx.textAlign = 'left';
  ctx.fillText(GF.t('target') + ': ' + target, 16 * GF.S, 14 * GF.S + fsBig + 2);

  ctx.textAlign = 'right';
  ctx.fillText(GF.t('best') + ': ' + best, GF.W - 16 * GF.S, 14 * GF.S + fsBig + 2);

  if (spreaderArmed) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd84d';
    ctx.font = 'bold ' + GF.clamp(13 * GF.S, 10, 18) + 'px sans-serif';
    ctx.fillText(GF.t('spreader_armed'), GF.cx, 14 * GF.S + fsBig + 4);
  }
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  computeLayout();

  if (chainAnim > 0) chainAnim = Math.max(0, chainAnim - dt * 1.5);
  if (roundAnim > 0) roundAnim = Math.max(0, roundAnim - dt * 0.8);

  if (gs === 'PLAYING' && selectedCard >= 0 && GF.touch && GF.touch.active) {
    var cell = pointToCell(GF.touch.x, GF.touch.y);
    hoverCell = cell ? cell.r * GRID_N + cell.c : -1;
  } else {
    hoverCell = -1;
  }
}

// ── DRAW ROOT ────────────────────────────────────────────────────────────
function draw(ctx) {
  drawBackground(ctx);
  if (gs === 'MENU') {
    drawGrid(ctx);
    drawHand(ctx);
    GF.drawOverlay({
      title: GF.t('title'),
      sub: GF.t('sub'),
      btnText: GF.t('play'),
      btnFn: startGame,
      bestText: best > 0 ? GF.t('best') + ': ' + best : null,
    });
  } else if (gs === 'PLAYING' || gs === 'PICK_ROW') {
    drawHUD(ctx);
    drawGrid(ctx);
    drawHand(ctx);
  } else if (gs === 'ROUND_OVER') {
    drawHUD(ctx);
    drawGrid(ctx);
    drawHand(ctx);
    GF.drawOverlay({
      title: GF.t('target_hit'),
      sub: GF.t('round') + ' ' + round + '  -  ' + GF.t('score') + ': ' + score,
      btnText: GF.t('next'),
      btnFn: nextRound,
    });
  } else if (gs === 'GAMEOVER') {
    drawHUD(ctx);
    drawGrid(ctx);
    drawHand(ctx);
    GF.drawOverlay({
      title: GF.t('gameover'),
      sub: GF.t('score') + ': ' + score,
      btnText: GF.t('retry'),
      btnFn: startGame,
      bestText: GF.t('best') + ': ' + best,
    });
  }
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 720,
  designH: 1200,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'bacteria_bloom',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('bacteria_bloom_best') || '0') || 0; } catch (e) {}
    computeLayout();
    gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// Tap-to-place: extra pointer/touch listeners that don't conflict with the
// gf-lib joystick handlers.
var canvas = document.getElementById('c');
var touchStartX = 0, touchStartY = 0, touchMoved = false;
canvas.addEventListener('touchstart', function(e) {
  var t0 = e.changedTouches[0];
  touchStartX = t0.clientX; touchStartY = t0.clientY; touchMoved = false;
}, { passive: true });
canvas.addEventListener('touchmove', function(e) {
  var t0 = e.changedTouches[0];
  var dx = t0.clientX - touchStartX, dy = t0.clientY - touchStartY;
  if (Math.sqrt(dx*dx + dy*dy) > 18) touchMoved = true;
}, { passive: true });
canvas.addEventListener('touchend', function(e) {
  if (touchMoved) return;
  var t0 = e.changedTouches[0];
  handleTap(t0.clientX, t0.clientY);
}, { passive: true });

canvas.addEventListener('pointerdown', function(e) {
  if (e.pointerType === 'touch') return;
  handleTap(e.clientX, e.clientY);
});

})();
</script>
