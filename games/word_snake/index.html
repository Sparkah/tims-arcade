  'APPLE','BREAD','CANDY','DREAM','EARTH','FRUIT','GHOST','HEART','IGLOO','JELLY',

];
var WORDS_RU_ARR = [
  // RU 3-letter
  'Кот','Дом','Лес','Сон','Суп','Чай','Сыр','Мир','Мяч','Ряд',

  // RU 4-letter
  'Мама','Папа','Дома','Лето','Зима','Осень','Небо','Соль','Рыба','Мясо',
  'Сыры','Хлеб','Моло','Вода','Кофе','Саха','Соль','Луна','Звер','Слав',
  'Книг','Свет','Голо','Пале','Шапк','Окно','Рука','Нога','Спин','Серд',
  'Душа','Ночь','День','Миры','Игра','Сила','Слов','Путь','Мест','Шаги',
  'Свет','Своб','Любо','Радо','Песн','Искр','Огон','Буря','Снег','Дожд',
  'Гром','Кора','Лужа','Кожа','Кров','Икра','Крыл','Крас','Цвет','Царь',
  // RU 5-letter
  'Слово','Книга','Река','Море','Сказ','Песня','Светы','Мечт','Счас','Срок',
  'Сердц','Дух','Ябло','Слива','Груш','Грибы','Клены','Ребе','Рыбы','Реки',
  'Слоны','Мышь','Кошк','Друг','Милы','Юный','Слава','Брат','Сест','Лесы',
  'Поле','Горы','Реки','Море','Озер','Облак','Ветер','Мете','Небе','Солнц',
];

// Build Sets for O(1) word lookup (uppercased — letters are stored uppercase)
var WORDS_EN = new Set();
for (var ii = 0; ii < WORDS_EN_ARR.length; ii++) WORDS_EN.add(WORDS_EN_ARR[ii].toUpperCase());
var WORDS_RU = new Set();
for (var jj = 0; jj < WORDS_RU_ARR.length; jj++) WORDS_RU.add(WORDS_RU_ARR[jj].toUpperCase());

// Letter pools (weighted toward common letters)
// EN: skew toward vowels + common consonants
var POOL_EN = (
  'EEEEEEEEEEEAAAAAAAAA' +
  'IIIIIIIIIOOOOOOOOO' +
  'UUUUUUTTTTTTTTTNN' +
  'NNNNNNSSSSSSSRRRRRR' +
  'HHHHHLLLLDDDDCCCMMM' +
  'FFFGGGYYYWWWPPPBVKJXQZ'
).split('');
// RU: skew toward common cyrillic letters
var POOL_RU = (
  'ОООООООООО' +
  'ЕЕЕЕЕЕЕЕЕЕ' +
  'ААААААААА' +
  'ИИИИИИИИ' +
  'ННННННН' +
  'ТТТТТТСССССС' +
  'РРРРРВВВВЛЛЛЛ' +
  'КККМММДДДППП' +
  'УУЯЯББГГЫЫЗЗ' +
  'ЧЧЙЖХШЮЦЩЭФЪЬЁ'
).split('');

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | PLAYING | GAMEOVER
var score = 0, best = 0;
var words_made = 0;
var last_word = '';
var body = [];              // [{x, y}], head at index 0
var dir = { x: 1, y: 0 };
var nextDir = { x: 1, y: 0 };
var growQueue = 0;          // additional segments to add (from letter pickups + word bonuses)
var letters = [];           // [{x, y, ch}]
var buffer = '';            // last N letters eaten (uppercase)
var stepAccum = 0;
var inv_frames = 0;
var helpOpen = false;
var flashT = 0;             // word-bonus golden flash timer (seconds)
var floats = [];            // floating bonus text [{text, x, y, age, ttl}]
var helpBtn = null;         // hit rect for ? button

// Layout cache (recomputed in draw)
var _grid = { cell: 0, ox: 0, oy: 0, w: 0, h: 0 };

// ── HELPERS ──────────────────────────────────────────────────────────────
function isRussianLang() { return GF.lang === 'ru'; }
function activePool() { return isRussianLang() ? POOL_RU : POOL_EN; }
function activeDict() { return isRussianLang() ? WORDS_RU : WORDS_EN; }
function randLetter() {
  var p = activePool();
  return p[Math.floor(Math.random() * p.length)];
}
function cellOccupied(x, y) {
  for (var i = 0; i < body.length; i++) {
    if (body[i].x === x && body[i].y === y) return true;
  }
  for (var j = 0; j < letters.length; j++) {
    if (letters[j].x === x && letters[j].y === y) return true;
  }
  return false;
}
function spawnLetter() {
  // Find a free cell
  for (var tries = 0; tries < 80; tries++) {
    var x = Math.floor(Math.random() * GRID_W);
    var y = Math.floor(Math.random() * GRID_H);
    if (!cellOccupied(x, y)) {
      letters.push({ x: x, y: y, ch: randLetter() });
      return;
    }
  }
}
function refillLetters() {
  while (letters.length < LETTER_COUNT) {
    var before = letters.length;
    spawnLetter();
    if (letters.length === before) break; // grid full
  }
}

// Scan buffer for any dictionary match (longest substring first)
function checkBufferForWord() {
  var dict = activeDict();
  var buf = buffer;
  var n = buf.length;
  // Try longest suffix first (so 5-letter beats 3-letter inside the same buffer)
  for (var len = Math.min(n, BUFFER_MAX); len >= WORD_MIN_LEN; len--) {
    for (var start = 0; start + len <= n; start++) {
      var sub = buf.substring(start, start + len);
      if (dict.has(sub)) return sub;
    }
  }
  return null;
}

function triggerWordBonus(word) {
  words_made += 1;
  last_word = word;
  score += WORD_BONUS_SCORE + word.length * 10;
  growQueue += WORD_BONUS_GROW;
  inv_frames = INV_FRAMES;
  flashT = 0.7;
  buffer = '';
  GF.spawnFloat && GF.spawnFloat(GF.cx, GF.cy - 40 * GF.S, '+' + WORD_BONUS_SCORE + ' ' + word, '#ffd54a');
  GF.spawnParticles && GF.spawnParticles(GF.cx, GF.cy, '#ffd54a', 28);
  GF.setShake && GF.setShake(4);
  GF.saveRun && GF.saveRun();
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  score = 0;
  words_made = 0;
  last_word = '';
  buffer = '';
  growQueue = 0;
  stepAccum = 0;
  inv_frames = 0;
  flashT = 0;
  floats = [];
  body = [];
  var midX = Math.floor(GRID_W / 2);
  var midY = Math.floor(GRID_H / 2);
  for (var i = 0; i < START_LEN; i++) body.push({ x: midX - i, y: midY });
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  letters = [];
  refillLetters();
  gs = 'PLAYING';
  helpOpen = false;
  GF.gameStarted && GF.gameStarted();
  GF.saveRun && GF.saveRun();
}

function gameOver() {
  if (score > best) {
    best = score;
    try { localStorage.setItem('word_snake_best', best); } catch (e) {}
  }
  gs = 'GAMEOVER';
  GF.gameEnded && GF.gameEnded();
  GF.setShake && GF.setShake(8);
  GF.saveRun && GF.saveRun();
}

// Screenshot mode — when on, snake is frozen at a hand-painted photogenic
// pose so take_screenshots.js can drive arrow keys without crashing it.
var screenshotMode = false;
var _shotCallIdx = 0;

function _buildPose(variant) {
  // variant: 0..3 — 4 distinct photogenic snake poses
  body = [];
  letters = [];
  var midX = Math.floor(GRID_W / 2);
  var midY = Math.floor(GRID_H / 2);
  if (variant === 0) {
    // L-shape, head pointing right
    body.push({ x: midX, y: midY });
    for (var i = 1; i <= 6; i++) body.push({ x: midX - i, y: midY });
    for (var j = 1; j <= 6; j++) body.push({ x: midX - 6, y: midY - j });
    dir = { x: 1, y: 0 };
  } else if (variant === 1) {
    // S-shape across center, head pointing up
    body.push({ x: midX, y: midY - 2 });
    body.push({ x: midX, y: midY - 1 });
    body.push({ x: midX, y: midY });
    for (var a = 1; a <= 4; a++) body.push({ x: midX + a, y: midY });
    for (var b = 1; b <= 3; b++) body.push({ x: midX + 4, y: midY + b });
    for (var c = 1; c <= 4; c++) body.push({ x: midX + 4 - c, y: midY + 3 });
    dir = { x: 0, y: -1 };
  } else if (variant === 2) {
    // Spiral, head pointing left
    body.push({ x: midX - 3, y: midY });
    for (var d = 1; d <= 5; d++) body.push({ x: midX - 3 + d, y: midY });
    for (var e = 1; e <= 4; e++) body.push({ x: midX + 2, y: midY + e });
    for (var f = 1; f <= 7; f++) body.push({ x: midX + 2 - f, y: midY + 4 });
    for (var g = 1; g <= 4; g++) body.push({ x: midX - 5, y: midY + 4 - g });
    dir = { x: -1, y: 0 };
  } else {
    // Long zigzag, head pointing down
    body.push({ x: midX - 2, y: midY + 3 });
    body.push({ x: midX - 2, y: midY + 2 });
    body.push({ x: midX - 2, y: midY + 1 });
    body.push({ x: midX - 2, y: midY });
    for (var h = 1; h <= 4; h++) body.push({ x: midX - 2 - h, y: midY });
    for (var k = 1; k <= 3; k++) body.push({ x: midX - 6, y: midY - k });
    for (var m = 1; m <= 5; m++) body.push({ x: midX - 6 + m, y: midY - 3 });
    dir = { x: 0, y: 1 };
  }
  nextDir = { x: dir.x, y: dir.y };

  // Hand-placed letter pellets — different scatter per variant
  var demoSets = {
    en: [
      [['C',midX+3,midY-2],['A',midX+1,midY+3],['T',midX-8,midY+2],['D',midX+5,midY+1],['O',midX-3,midY+4],['G',midX+6,midY-4]],
      [['W',midX-5,midY-3],['O',midX-3,midY-5],['R',midX+6,midY-4],['D',midX-7,midY-2],['S',midX-1,midY-5],['E',midX+5,midY-2]],
      [['P',midX+6,midY-3],['L',midX-1,midY-5],['A',midX+6,midY+2],['Y',midX-7,midY-4],['F',midX-7,midY+2],['U',midX-1,midY+6]],
      [['B',midX+4,midY-5],['I',midX+6,midY+1],['G',midX-7,midY+1],['E',midX+5,midY+4],['A',midX-7,midY-2],['T',midX+2,midY-5]],
    ],
    ru: [
      [['С',midX+3,midY-2],['О',midX+1,midY+3],['Н',midX-8,midY+2],['К',midX+5,midY+1],['О',midX-3,midY+4],['Т',midX+6,midY-4]],
      [['Д',midX-5,midY-3],['О',midX-3,midY-5],['М',midX+6,midY-4],['Л',midX-7,midY-2],['Е',midX-1,midY-5],['С',midX+5,midY-2]],
      [['И',midX+6,midY-3],['Г',midX-1,midY-5],['Р',midX+6,midY+2],['А',midX-7,midY-4],['С',midX-7,midY+2],['Л',midX-1,midY+6]],
      [['М',midX+4,midY-5],['Я',midX+6,midY+1],['Ч',midX-7,midY+1],['Ё',midX+5,midY+4],['Ж',midX-7,midY-2],['У',midX+2,midY-5]],
    ],
  };
  var setKey = isRussianLang() ? 'ru' : 'en';
  var setList = demoSets[setKey][variant % demoSets[setKey].length];
  for (var li = 0; li < setList.length; li++) {
    var lx = setList[li][1], ly = setList[li][2];
    // Bounds + occupied guard
    if (lx >= 0 && lx < GRID_W && ly >= 0 && ly < GRID_H && !cellOccupied(lx, ly)) {
      letters.push({ x: lx, y: ly, ch: setList[li][0] });
    }
  }
  refillLetters();

  // Buffer + last-word per variant
  var bufBank = isRussianLang()
    ? ['СОНА', 'ДОМ', 'ИГРА', 'МЯЧ']
    : ['CATA', 'WORDS', 'PLAY', 'BIG'];
  var lastBank = isRussianLang()
    ? ['СОН', 'ДОМ', 'ИГРА', 'МЯЧ']
    : ['CAT', 'WORDS', 'PLAY', 'BIG'];
  buffer = bufBank[variant % bufBank.length];
  last_word = lastBank[variant % lastBank.length];

  score = 130 + variant * 60;
  words_made = 1 + variant;
  flashT = variant === 0 ? 0.6 : 0.2;
  inv_frames = variant === 0 ? 60 : 0;
}

window._jumpLevel = function(n) {
  if (n === undefined) n = 1;
  if (n >= 99) {
    // Force GAMEOVER
    if (gs !== 'PLAYING') startGame();
    gameOver();
    return;
  }
  // Reset to a clean PLAYING state, then build a hand-painted pose
  startGame();
  var variant = _shotCallIdx % 4;
  _shotCallIdx += 1;
  _buildPose(variant);
  gs = 'PLAYING';
  screenshotMode = true;
};
window._setupForScreenshot = function(n) {
  window._jumpLevel(n || 1);
  screenshotMode = true;
};

// ── INPUT ────────────────────────────────────────────────────────────────
function trySetDir(dx, dy) {
  // Reject 180° reversal
  if (dx === -dir.x && dy === -dir.y && body.length > 1) return;
  nextDir = { x: dx, y: dy };
}

document.addEventListener('keydown', function(e) {
  if (gs !== 'PLAYING') return;
  // In screenshot mode, arrow keys rotate the canned demo pose for shot 2.
  // Without this the screenshot tool's "shot 2 = after some key presses"
  // pattern would otherwise produce a byte-identical image to shot 1.
  if (screenshotMode) {
    if (e.code === 'ArrowUp' || e.code === 'ArrowDown' || e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
      var variant = _shotCallIdx % 4;
      _shotCallIdx += 1;
      _buildPose(variant);
    }
    return;
  }
  switch (e.code) {
    case 'ArrowLeft': case 'KeyA': trySetDir(-1, 0); e.preventDefault(); break;
    case 'ArrowRight': case 'KeyD': trySetDir(1, 0); e.preventDefault(); break;
    case 'ArrowUp': case 'KeyW': trySetDir(0, -1); e.preventDefault(); break;
    case 'ArrowDown': case 'KeyS': trySetDir(0, 1); e.preventDefault(); break;
  }
});

// Pointer / swipe handling — track swipe direction on the canvas
var swipeStart = null;
function onPointerDown(x, y) {
  // Help button?
  if (helpBtn && x >= helpBtn.x && x <= helpBtn.x + helpBtn.w && y >= helpBtn.y && y <= helpBtn.y + helpBtn.h) {
    helpOpen = !helpOpen;
    return true;
  }
  // Help-panel close click anywhere
  if (helpOpen) { helpOpen = false; return true; }
  if (gs === 'PLAYING') {
    swipeStart = { x: x, y: y };
  }
  return false;
}
function onPointerUp(x, y) {
  if (gs !== 'PLAYING' || !swipeStart) { swipeStart = null; return; }
  var dx = x - swipeStart.x;
  var dy = y - swipeStart.y;
  var ax = Math.abs(dx), ay = Math.abs(dy);
  if (Math.max(ax, ay) > 18) {
    if (ax > ay) trySetDir(dx > 0 ? 1 : -1, 0);
    else trySetDir(0, dy > 0 ? 1 : -1);
  }
  swipeStart = null;
}

var canvas = document.getElementById('c');
canvas.addEventListener('touchstart', function(e) {
  var t = e.changedTouches[0];
  onPointerDown(t.clientX, t.clientY);
}, { passive: true });
canvas.addEventListener('touchend', function(e) {
  var t = e.changedTouches[0];
  onPointerUp(t.clientX, t.clientY);
}, { passive: true });
canvas.addEventListener('mousedown', function(e) { onPointerDown(e.clientX, e.clientY); });
canvas.addEventListener('mouseup',   function(e) { onPointerUp(e.clientX, e.clientY); });

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  // Flashes / floats decay regardless of state so visual feedback finishes
  if (flashT > 0) flashT = Math.max(0, flashT - dt);
  for (var fi = floats.length - 1; fi >= 0; fi--) {
    floats[fi].age += dt;
    floats[fi].y -= 30 * dt;
    if (floats[fi].age > floats[fi].ttl) floats.splice(fi, 1);
  }

  if (gs !== 'PLAYING' || helpOpen) return;
  if (screenshotMode) return; // freeze world for screenshot tooling

  stepAccum += dt * 1000;
  if (stepAccum < STEP_MS) return;
  stepAccum -= STEP_MS;

  dir = nextDir;
  if (inv_frames > 0) inv_frames -= 1;

  var head = body[0];
  var nx = head.x + dir.x;
  var ny = head.y + dir.y;

  // Wrap edges (forgiving for endless feel — only tail kills you)
  if (nx < 0) nx = GRID_W - 1;
  if (nx >= GRID_W) nx = 0;
  if (ny < 0) ny = GRID_H - 1;
  if (ny >= GRID_H) ny = 0;

  // Self-collision (unless invincible)
  if (inv_frames <= 0) {
    for (var bi = 0; bi < body.length; bi++) {
      if (body[bi].x === nx && body[bi].y === ny) {
        gameOver();
        return;
      }
    }
  }

  // Move: prepend new head, conditionally pop tail
  body.unshift({ x: nx, y: ny });
  if (growQueue > 0) growQueue -= 1;
  else body.pop();

  // Letter pickup?
  for (var li = 0; li < letters.length; li++) {
    if (letters[li].x === nx && letters[li].y === ny) {
      var ch = letters[li].ch;
      letters.splice(li, 1);
      growQueue += 1;
      score += 5;
      buffer += ch;
      if (buffer.length > BUFFER_MAX) buffer = buffer.substring(buffer.length - BUFFER_MAX);
      // Check for word
      var hit = checkBufferForWord();
      if (hit) triggerWordBonus(hit);
      refillLetters();
      break;
    }
  }
  GF.saveRun && GF.saveRun();
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function computeGrid() {
  // Fit grid into available canvas with a HUD strip on top
  var hudH = 56 * GF.S;
  var availW = GF.W - 20 * GF.S;
  var availH = GF.H - hudH - 20 * GF.S;
  var cell = Math.floor(Math.min(availW / GRID_W, availH / GRID_H));
  if (cell < 8) cell = 8;
  var w = cell * GRID_W;
  var h = cell * GRID_H;
  var ox = Math.floor((GF.W - w) / 2);
  var oy = Math.floor(hudH + (availH - h) / 2);
  _grid.cell = cell; _grid.ox = ox; _grid.oy = oy; _grid.w = w; _grid.h = h;
}

function draw(ctx) {
  computeGrid();
  // Background
  var grad = ctx.createLinearGradient(0, 0, 0, GF.H);
  grad.addColorStop(0, '#0a1424');
  grad.addColorStop(1, '#06090f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GF.W, GF.H);

  // Grid frame
  drawGridFrame(ctx);

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawLetters(ctx);
    drawSnake(ctx);
    drawHUD(ctx);
    drawHelpButton(ctx);
    drawFloats(ctx);
  }
  if (helpOpen && gs === 'PLAYING') drawHelpPanel(ctx);

  if (gs === 'MENU') {
    GF.drawOverlay({
      title: GF.t('title'),
      sub: GF.t('sub'),
      btnText: GF.t('play'),
      btnFn: startGame,
      bestText: best > 0 ? GF.t('best') + ': ' + best : null,
    });
    drawTutorialOnMenu(ctx);
  }
  if (gs === 'GAMEOVER') {
    GF.drawOverlay({
      title: GF.t('gameover'),
      sub: GF.t('score') + ': ' + score,
      sub2: GF.t('words_label') + ': ' + words_made + (last_word ? '  (' + last_word + ')' : ''),
      btnText: GF.t('retry'),
      btnFn: startGame,
      bestText: GF.t('best') + ': ' + best,
    });
  }
}

function drawGridFrame(ctx) {
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (var x = 0; x <= GRID_W; x++) {
    ctx.beginPath();
    ctx.moveTo(_grid.ox + x * _grid.cell, _grid.oy);
    ctx.lineTo(_grid.ox + x * _grid.cell, _grid.oy + _grid.h);
    ctx.stroke();
  }
  for (var y = 0; y <= GRID_H; y++) {
    ctx.beginPath();
    ctx.moveTo(_grid.ox, _grid.oy + y * _grid.cell);
    ctx.lineTo(_grid.ox + _grid.w, _grid.oy + y * _grid.cell);
    ctx.stroke();
  }
  // Outer border
  ctx.strokeStyle = 'rgba(120, 200, 255, 0.35)';
  ctx.lineWidth = 2;
  ctx.strokeRect(_grid.ox - 1, _grid.oy - 1, _grid.w + 2, _grid.h + 2);
}

function drawLetters(ctx) {
  var c = _grid.cell;
  var fs = Math.max(10, Math.floor(c * 0.62));
  ctx.font = 'bold ' + fs + 'px system-ui, -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (var i = 0; i < letters.length; i++) {
    var L = letters[i];
    var cx = _grid.ox + L.x * c + c / 2;
    var cy = _grid.oy + L.y * c + c / 2;
    // Pellet circle
    ctx.fillStyle = 'rgba(255, 200, 60, 0.18)';
    ctx.beginPath(); ctx.arc(cx, cy, c * 0.42, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffd54a';
    ctx.fillText(L.ch, cx, cy + 1);
  }
}

function drawSnake(ctx) {
  var c = _grid.cell;
  var golden = flashT > 0;
  for (var i = body.length - 1; i >= 0; i--) {
    var seg = body[i];
    var cx = _grid.ox + seg.x * c + c / 2;
    var cy = _grid.oy + seg.y * c + c / 2;
    var pad = i === 0 ? 1 : 3;
    var fill;
    if (golden) fill = i === 0 ? '#fff8c4' : '#ffd54a';
    else fill = i === 0 ? '#7ee787' : (i % 2 === 0 ? '#3aa563' : '#2d8a52');
    ctx.fillStyle = fill;
    var r = Math.max(2, Math.floor(c * 0.15));
    GF.rr(ctx, cx - c / 2 + pad, cy - c / 2 + pad, c - pad * 2, c - pad * 2, r);
    ctx.fill();
    if (i === 0) {
      // Eyes
      ctx.fillStyle = '#0b1a0d';
      var ex = cx + dir.x * c * 0.18;
      var ey = cy + dir.y * c * 0.18;
      var perpX = -dir.y * c * 0.18;
      var perpY = dir.x * c * 0.18;
      ctx.beginPath(); ctx.arc(ex + perpX, ey + perpY, Math.max(1.5, c * 0.07), 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex - perpX, ey - perpY, Math.max(1.5, c * 0.07), 0, Math.PI * 2); ctx.fill();
    }
  }
  if (inv_frames > 0) {
    var head = body[0];
    var hx = _grid.ox + head.x * c + c / 2;
    var hy = _grid.oy + head.y * c + c / 2;
    ctx.strokeStyle = 'rgba(255, 215, 80, 0.7)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(hx, hy, c * 0.85, 0, Math.PI * 2); ctx.stroke();
  }
}

function drawHUD(ctx) {
  var fs = GF.clamp(15 * GF.S, 11, 20);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + fs + 'px system-ui, -apple-system, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  var pad = 12 * GF.S;
  ctx.fillText(GF.t('score') + ': ' + score, pad, pad);
  ctx.fillStyle = '#9ad';
  ctx.font = fs + 'px system-ui, sans-serif';
  ctx.fillText(GF.t('length_label') + ': ' + body.length, pad, pad + fs + 4);

  // Buffer top-right — reserve right edge BEYOND the ? button (button is
  // placed below the buffer, so the buffer can use the full right edge).
  var bfs = GF.clamp(16 * GF.S, 12, 22);
  ctx.textAlign = 'right';
  var rightX = GF.W - pad;
  ctx.font = bfs + 'px system-ui, sans-serif';
  ctx.fillStyle = '#9ad';
  ctx.fillText(GF.t('buffer_label') + ':', rightX, pad);
  ctx.font = 'bold ' + bfs + 'px ui-monospace, "SF Mono", Menlo, monospace';
  ctx.fillStyle = flashT > 0 ? '#ffd54a' : '#fff';
  ctx.fillText(buffer || '—', rightX, pad + bfs + 2);
  // Last word line — third row top-right
  if (last_word) {
    ctx.font = 'bold ' + GF.clamp(13 * GF.S, 10, 17) + 'px system-ui, sans-serif';
    ctx.fillStyle = '#ffd54a';
    ctx.fillText(GF.t('last_word_label') + ': ' + last_word, rightX, pad + bfs * 2 + 6);
  }
}

function drawHelpButton(ctx) {
  var size = GF.clamp(36 * GF.S, 28, 48);
  // Anchor under the right HUD column (label + buffer + last-word).
  var bfs = GF.clamp(16 * GF.S, 12, 22);
  var lhs = GF.clamp(13 * GF.S, 10, 17);
  var x = GF.W - 12 * GF.S - size;
  var y = 12 * GF.S + bfs * 2 + 6 + lhs + 10 * GF.S;
  helpBtn = { x: x, y: y, w: size, h: size };
  ctx.fillStyle = 'rgba(120, 200, 255, 0.18)';
  GF.rr(ctx, x, y, size, size, size * 0.3);
  ctx.fill();
  ctx.strokeStyle = 'rgba(120, 200, 255, 0.6)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#cfe8ff';
  ctx.font = 'bold ' + (size * 0.55) + 'px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', x + size / 2, y + size / 2 + 1);
}

function drawHelpPanel(ctx) {
  // Dark scrim
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var w = Math.min(560 * GF.S, GF.W - 32 * GF.S);
  var h = Math.min(360 * GF.S, GF.H - 60 * GF.S);
  var x = (GF.W - w) / 2;
  var y = (GF.H - h) / 2;
  ctx.fillStyle = '#10202e';
  GF.rr(ctx, x, y, w, h, 14);
  ctx.fill();
  ctx.strokeStyle = 'rgba(120, 200, 255, 0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Title
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.font = 'bold ' + GF.clamp(22 * GF.S, 16, 28) + 'px system-ui, sans-serif';
  ctx.fillText(GF.t('title'), x + w / 2, y + 18 * GF.S);
  // Lines
  ctx.font = GF.clamp(15 * GF.S, 12, 18) + 'px system-ui, sans-serif';
  ctx.fillStyle = '#cfe8ff';
  ctx.textAlign = 'left';
  var lh = GF.clamp(22 * GF.S, 18, 28);
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  var ly = y + 60 * GF.S;
  for (var i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], x + 20 * GF.S, ly + i * lh);
  }
  // Close hint
  ctx.fillStyle = '#9ad';
  ctx.textAlign = 'center';
  ctx.font = GF.clamp(13 * GF.S, 10, 15) + 'px system-ui, sans-serif';
  ctx.fillText('(' + GF.t('close') + ')', x + w / 2, y + h - 26 * GF.S);
}

function drawTutorialOnMenu(ctx) {
  // The overlay drew the title/sub/PLAY centered. We draw tutorial copy
  // BELOW the play button so it sits underneath without clashing.
  // We compute a y below the button area: GF.drawOverlay puts btn at cy + 20S
  // with btnH ~52S, then bestText at btnY+btnH+28S. So safe start = cy + 110S
  var startY = GF.cy + 110 * GF.S;
  // If screen short, draw above title instead — but the overlay sub is at
  // cy - 16S, so we keep it below.
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#9ad';
  var fs = GF.clamp(13 * GF.S, 10, 16);
  ctx.font = fs + 'px system-ui, sans-serif';
  var lh = fs + 5;
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  // Make sure we fit on screen
  var totalH = lines.length * lh;
  if (startY + totalH > GF.H - 12 * GF.S) {
    startY = GF.H - 12 * GF.S - totalH;
  }
  for (var i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], GF.cx, startY + i * lh);
  }
}

function drawFloats(ctx) {
  for (var i = 0; i < floats.length; i++) {
    var f = floats[i];
    var a = 1 - (f.age / f.ttl);
    ctx.fillStyle = 'rgba(255, 213, 74, ' + a.toFixed(3) + ')';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.text, f.x, f.y);
  }
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: [],
  saveKey: 'word_snake',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('word_snake_best') || '0') || 0; } catch (e) {}
    GF.persist('word_snake_run_v1',
      function() {
        return {
          gs: gs, score: score, words_made: words_made, last_word: last_word,
          body: body, dir: dir, growQueue: growQueue, letters: letters,
          buffer: buffer, inv_frames: inv_frames,
        };
      },
      function(s) {
        if (!s) return;
        // Be tolerant — fields can be missing on schema migration
        gs    = s.gs    || 'MENU';
        score = s.score || 0;
        words_made = s.words_made || 0;
        last_word = s.last_word || '';
        body = Array.isArray(s.body) && s.body.length ? s.body : [];
        dir = s.dir || { x: 1, y: 0 };
        nextDir = dir;
        growQueue = s.growQueue || 0;
        letters = Array.isArray(s.letters) ? s.letters : [];
        buffer = s.buffer || '';
        inv_frames = s.inv_frames || 0;
      }
    );
    // Always start on MENU on a fresh load — restored PLAYING is fine, but
    // if there's no body we treat as fresh.
    if (gs === 'PLAYING' && body.length === 0) gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// Expose state for the runtime gate + screenshot tool
GF.exposeState(function() {
  return {
    gs: gs,
    score: score,
    best: best,
    words_made: words_made,
    last_word: last_word,
    buffer: buffer,
    length: body.length,
    letters: letters.length,
    inv_frames: inv_frames,
  };
});

})();
</script>
</body>
