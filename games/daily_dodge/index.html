// ── UTILS ───────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
// Mulberry32 — deterministic seeded PRNG
function makeRng(seed) {
  var s = seed | 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    var t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function getDaySeed() {
  var d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}
function getDayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

var GAME_DURATION = 60;

  { id:'devotee',  name:'Devotee',    nameRu:'Преданный',  kind:'streak',   inner:'#e8eef2', outer:'#7d8c97', halo:'rgba(200,210,220,0.24)', glow:'#cdd5dc', threshold: 14 },

var endlessRng = makeRng(1);            // re-seeded per endless run from performance.now()

var player = { x:0, y:0, vx:0, vy:0 };

var particles = [];
var floats = [];
var buttons = [];
var screenShake = 0;

var dilationTimer = 0;          // seconds remaining in dilation

var COMBO_WINDOW = 1.5;         // seconds between close calls to keep combo alive
var comboCount = 0;             // current consecutive close-call streak
var comboTimer = 0;             // seconds remaining before combo resets
var comboBonus = 0;             // accumulated bonus score from combo multipliers
var maxComboThisRun = 0;        // peak streak this run (reported on game-over)
var bestComboEver = 0;          // best combo ever (persisted)
var comboFlash = 0;             // 0..1 visual pulse on combo pill, decays

// ── INPUT ───────────────────────────────────────────────────────────────────
var keys = {};
document.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  // iter#8 — Space detonates a primed combo bomb during play.
  if (e.code === 'Space' && gs === 'PLAYING') {
    if (detonateBomb()) e.preventDefault();
  }
});
document.addEventListener('keyup',   function(e) { keys[e.code] = false; });
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('wheel',     function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

// iter#7 — Offset-joystick model: finger anywhere on screen; drag delta steers.
// Player no longer occludes the finger (the old absolute-position scheme made
// the player chase touch.x/y and sit under your thumb, hiding incoming bullets).
var touch = { active: false, x: 0, y: 0, startX: 0, startY: 0, id: null };
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t0 = e.changedTouches[0];
  // Hit-test buttons first (menu/retry) — don't start steering if we tapped a button.
  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    if (t0.clientX >= b.x && t0.clientX <= b.x+b.w && t0.clientY >= b.y && t0.clientY <= b.y+b.h) { b.fn(); return; }
  }
  // iter#8 — tap on the armed BOMB pill detonates instead of starting steer.
  if (gs === 'PLAYING' && bombBtnRect && comboCount >= BOMB_THRESHOLD) {
    var br = bombBtnRect;
    if (t0.clientX >= br.x && t0.clientX <= br.x+br.w && t0.clientY >= br.y && t0.clientY <= br.y+br.h) {
      detonateBomb();
      return;
    }
  }
  touch.active = true; touch.id = t0.identifier;
  touch.startX = touch.x = t0.clientX;
  touch.startY = touch.y = t0.clientY;
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t0 = e.changedTouches[i];
    if (t0.identifier !== touch.id) continue;
    touch.x = t0.clientX; touch.y = t0.clientY;
  }
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === touch.id) touch.active = false;
  }
}, { passive: false });
canvas.addEventListener('click', function(e) {
  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    if (e.clientX >= b.x && e.clientX <= b.x+b.w && e.clientY >= b.y && e.clientY <= b.y+b.h) b.fn();
  }
  // iter#8 — click on armed BOMB pill detonates (desktop alt-path to Space).
  if (gs === 'PLAYING' && bombBtnRect && comboCount >= BOMB_THRESHOLD) {
    var br = bombBtnRect;
    if (e.clientX >= br.x && e.clientX <= br.x+br.w && e.clientY >= br.y && e.clientY <= br.y+br.h) {
      detonateBomb();
    }
  }
});

// ── ARENA ───────────────────────────────────────────────────────────────────
function arena() {
  var pad = 20 * S;
  var top = (HUD_H + 6) * S;
  return { x: pad, y: top, w: W - pad*2, h: H - top - pad };
}

// ── PRE-ROLL DAILY SPAWNS ───────────────────────────────────────────────────
// We pre-roll every spawn for the 60-second run from the daily seed, so
// every player on the same day faces the EXACT same pattern.
function buildDailySpawns() {
  spawners = [];
  rng = makeRng(seed);
  var t = 0.5;
  while (t < GAME_DURATION) {
    // Difficulty ramps over time
    var difficulty = clamp(t / 30, 0.4, 1.6);
    var kind = Math.floor(rng() * 4); // 0=normal, 1=fast small, 2=heavy slow, 3=spinner
    var burst = rng() < 0.18 + difficulty * 0.1;

    // Edge to spawn from: 0=top, 1=right, 2=bottom, 3=left
    var edge = Math.floor(rng() * 4);

    // Targeting offset along the edge (normalized 0..1)
    var u = rng();

    spawners.push({ t:t, kind:kind, edge:edge, u:u, difficulty: difficulty, burst:burst });

    var gap = clamp(0.55 - difficulty * 0.15, 0.18, 0.55) + rng() * 0.25;
    if (kind === 3) gap += 0.2;
    t += gap;
  }
  nextSpawnIdx = 0;
}

function spawnFromSpawner(sp) {
  var ar = arena();
  var ex, ey, vx, vy;
  if (sp.edge === 0)      { ex = ar.x + sp.u * ar.w; ey = ar.y - 16*S; vx = 0; vy = 1; }
  else if (sp.edge === 1) { ex = ar.x + ar.w + 16*S; ey = ar.y + sp.u * ar.h; vx = -1; vy = 0; }
  else if (sp.edge === 2) { ex = ar.x + sp.u * ar.w; ey = ar.y + ar.h + 16*S; vx = 0; vy = -1; }
  else                    { ex = ar.x - 16*S; ey = ar.y + sp.u * ar.h; vx = 1; vy = 0; }

  var speedBase = 110, r = 11;
  var color = '#e74c3c';
  if (sp.kind === 1) { speedBase = 200; r = 8;  color = '#f39c12'; }
  if (sp.kind === 2) { speedBase = 70;  r = 18; color = '#9b59b6'; }
  if (sp.kind === 3) { speedBase = 95;  r = 12; color = '#48c9b0'; }

  var sp2 = (speedBase + sp.difficulty * 30) * S;

  // For "spinner" kind, the projectile rotates its velocity over time
  var spinPhase = sp.kind === 3 ? rng() * Math.PI * 2 : 0;
  var aimWobble = (rng() - 0.5) * 0.6;

  // Compute base velocity with slight aim toward player area (use arena center as target)
  var tx = ar.x + ar.w/2, ty = ar.y + ar.h/2;
  var dx = tx - ex, dy = ty - ey;
  var L = Math.sqrt(dx*dx + dy*dy);
  if (L < 1) L = 1;
  var nx = dx / L, ny = dy / L;
  // mix straight-edge-perpendicular with toward-center
  vx = vx * 0.4 + nx * 0.6;
  vy = vy * 0.4 + ny * 0.6;
  // wobble
  var ca = Math.cos(aimWobble), sa = Math.sin(aimWobble);
  var rvx = vx * ca - vy * sa, rvy = vx * sa + vy * ca;
  vx = rvx * sp2; vy = rvy * sp2;

  bullets.push({ x:ex, y:ey, vx:vx, vy:vy, r:r*S, life: 12, kind:sp.kind, spinPhase:spinPhase, color:color });

  if (sp.burst) {
    // 3 extra bullets in a cone
    for (var i = -1; i <= 1; i += 2) {
      var ba = i * 0.35;
      var bca = Math.cos(ba), bsa = Math.sin(ba);
      var bvx = vx * bca - vy * bsa, bvy = vx * bsa + vy * bca;
      bullets.push({ x:ex, y:ey, vx:bvx, vy:bvy, r:r*S*0.85, life: 12, kind:sp.kind, spinPhase:spinPhase, color:color });
    }
  }
}

function startRun(mode) {
  runMode = (mode === 'ENDLESS') ? 'ENDLESS' : 'DAILY';
  seed = getDaySeed();
  if (runMode === 'DAILY') {
    buildDailySpawns();
  } else {
    spawners = []; nextSpawnIdx = 0;
    endlessRng = makeRng(((performance.now() | 0) ^ getDaySeed()) | 0);
    endlessSpawnTimer = 0.5;
  }
  var ar = arena();
  player.x = ar.x + ar.w/2; player.y = ar.y + ar.h/2;
  player.vx = 0; player.vy = 0;
  bullets = []; particles = []; floats = []; buttons = [];
  startTime = performance.now() / 1000;
  elapsed = 0; score = 0; screenShake = 0;
  liveRank = null;
  newBestPopped = false;
  newlyUnlockedSkin = null;
  closeCallCount = 0;
  timeDilation = 1; dilationTimer = 0;
  comboCount = 0; comboTimer = 0; comboBonus = 0; maxComboThisRun = 0; comboFlash = 0;
  // iter#8 — reset bomb state for the new run
  bombsUsed = 0; bombFlash = 0; bombHintPulse = 0; bombBtnRect = null;
  // iter#9 — reset revive state; new run gets a fresh extra life
  reviveUsed = false; reviveLoading = false; invulnUntil = 0; reviveBtnRect = null;
  // iter#5 — Bump the streak on the first run of the day (any mode).
  updateStreakOnPlay();
  gs = 'PLAYING';
  // Warm/refresh live-rank board in the background — non-blocking.
  fetchLeaderboard();
}
// iter#9 — Yandex SDK ad helpers. No-op fallbacks when SDK absent so the
// gallery iframe + local dev still work. All ad triggers are user-click
// (Yandex rule 4.4) and interstitials are throttled to ≥3min (rule 4.1).
function showInterstitial(onDone) {
  var now = performance.now();
  if (now - lastInterstitialMs < INTERSTITIAL_GAP_MS) { onDone && onDone(); return; }
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showFullscreenAdv) {
    onDone && onDone(); return;
  }
  lastInterstitialMs = now;
  try {
    window.ysdk.adv.showFullscreenAdv({
      callbacks: {
        onClose: function() { onDone && onDone(); },
        onError: function() { onDone && onDone(); },
      },
    });
  } catch(e) { onDone && onDone(); }
}
function showRewardedRevive() {
  if (reviveUsed || reviveLoading) return;
  reviveLoading = true;
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showRewardedVideo) {
    // No SDK (gallery preview / local dev) — grant the revive immediately so
    // the feature stays exercisable. In Yandex prod the real ad gates it.
    reviveLoading = false; doRevive(); return;
  }
  var rewarded = false;
  try {
    window.ysdk.adv.showRewardedVideo({
      callbacks: {
        onRewarded: function() { rewarded = true; },
        onClose:    function() {
          reviveLoading = false;
          if (rewarded) doRevive();
        },
        onError:    function() { reviveLoading = false; },
      },
    });
  } catch(e) { reviveLoading = false; }
}
function doRevive() {
  reviveUsed = true;
  // Recentre, clear active bullets, grant 3s of bullet pass-through.
  var ar = arena();
  player.x = ar.x + ar.w/2; player.y = ar.y + ar.h/2;
  player.vx = 0; player.vy = 0;
  bullets = [];
  spawnParticles(player.x, player.y, '#FFD700', 36);
  spawnFloat(player.x, player.y - 16*S, t('revive'), '#FFD700');
  invulnUntil = (performance.now() / 1000) + 3.0;
  gs = 'PLAYING';
}

// Promote a survived DAILY run into an ENDLESS continuation without resetting
// the player to centre. Keeps their position, particles, combo etc; the
// pre-rolled spawner pool drains naturally, then procedural takes over.
function continueIntoEndless() {
  runMode = 'ENDLESS';
  endlessRng = makeRng(((performance.now() | 0) ^ getDaySeed()) | 0);
  endlessSpawnTimer = 0.4;
  newBestPopped = false;
  gs = 'PLAYING';
}
window._jumpLevel = function(n) {
  // n=99 is the yandex-testing harness's "drop me into GAMEOVER" signal so
  // it can exercise the retry/cycle path. Default = start a fresh daily run.
  // We deliberately skip onRunEnded()'s leaderboard submit here because that
  // hits window.prompt() for a player name, which hangs in headless puppeteer
  // (no dialog handler). The state transition is all the gate needs.
  if (n === 99) {
    if (gs !== 'PLAYING') startRun('DAILY');
    score = Math.floor(elapsed * 10) + Math.floor(comboBonus);
    gs = 'GAMEOVER';
    return;
  }
  startRun('DAILY');
};
window._invincible = false;  // screenshot tool toggles this on
window._jumpEndless = function() { startRun('ENDLESS'); };
// Expose state to yandex-testing's gflib adapter so the runtime gate can drive
// real clicks across MENU → PLAYING → GAMEOVER cycles and verify all
// buttons stay live after reload + multi-cycle (the Spore Guard / Varnish
// Restore rejection class).
window.__gfState = function() { return { gs: gs, runMode: runMode, score: score, elapsed: elapsed, comboCount: comboCount, bombsUsed: bombsUsed }; };

// ── SKIN PERSISTENCE / UNLOCK CHECK (iter#2) ────────────────────────────────
function loadSkinState() {
  try {
    bestEverSeconds = parseFloat(localStorage.getItem('dodge_best_seconds')||'0') || 0;
    var savedId = localStorage.getItem('dodge_skin_id');
    if (savedId) {
      for (var i = 0; i < SKINS.length; i++) {
        if (SKINS[i].id === savedId && bestEverSeconds >= SKINS[i].threshold) {
          skinIdx = i; return;
        }
      }
    }
    // default: highest unlocked
    var best = 0;
    for (var j = 0; j < SKINS.length; j++) {
      if (bestEverSeconds >= SKINS[j].threshold) best = j;
    }
    skinIdx = best;
  } catch(e) { skinIdx = 0; bestEverSeconds = 0; }
}
function saveActiveSkin() {
  try { localStorage.setItem('dodge_skin_id', activeSkin().id); } catch(e) {}
}
function isSkinUnlocked(i) {
  var s = SKINS[i];
  if (s.kind === 'streak') return streak.best >= s.threshold;
  return bestEverSeconds >= s.threshold;
}

// ── iter#5 — STREAK PERSISTENCE / DAILY-CHECK ───────────────────────────────
// Consecutive-days-played counter. Bumps on the first run of any new day.
// If yesterday wasn't a play day, the streak resets to 1. Best is monotonic.
function loadStreak() {
  try {
    var raw = localStorage.getItem('dodge_streak');
    if (raw) {
      var s = JSON.parse(raw);
      if (s && typeof s.current === 'number') {
        streak = { current: s.current|0, best: (s.best|0) || (s.current|0), lastDate: s.lastDate || '' };
      }
    }
  } catch(e) {}
}
function getYesterdayKey() {
  var d = new Date(); d.setDate(d.getDate() - 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function updateStreakOnPlay() {
  var today = getDayKey();
  if (streak.lastDate === today) return; // already counted today
  if (streak.lastDate === getYesterdayKey()) {
    streak.current = (streak.current|0) + 1;
  } else {
    streak.current = 1;
  }
  if (streak.current > streak.best) streak.best = streak.current;
  streak.lastDate = today;
  try { localStorage.setItem('dodge_streak', JSON.stringify(streak)); } catch(e) {}
}
// Returns new skin name (display) if this run unlocked one, else null.
function checkUnlocksAfterRun(seconds) {
  var prevBest = bestEverSeconds;
  if (seconds <= prevBest) return null;
  bestEverSeconds = seconds;
  try { localStorage.setItem('dodge_best_seconds', String(seconds)); } catch(e) {}
  var unlocked = null;
  for (var i = 0; i < SKINS.length; i++) {
    if (prevBest < SKINS[i].threshold && seconds >= SKINS[i].threshold) {
      unlocked = SKINS[i];
    }
  }
  return unlocked;
}

function spawnParticles(x, y, color, n) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = (1.5 + Math.random() * 4) * S;
    particles.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      r:(2 + Math.random()*4)*S, color:color, life:1 });
  }
}
function spawnFloat(x, y, txt, col) {
  floats.push({ x:x, y:y, txt:txt, col:col||'#fff', life:1.4, vy:-2*S });
}

// ── iter#8 — COMBO BOMB ─────────────────────────────────────────────────────
// Spend a primed combo (≥ BOMB_THRESHOLD) to nuke every active bullet. Tactical
// resource: built by close-call chains (iter#3/#4), spent in clutch moments.
// Resets combo to 0 (you lose the multiplier — that's the trade) and awards a
// flat one-time bonus so the bomb still contributes something to score.
function detonateBomb() {
  if (gs !== 'PLAYING') return false;
  if (comboCount < BOMB_THRESHOLD) return false;
  // Vacate every bullet with a satisfying outward burst from its position.
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    spawnParticles(b.x, b.y, b.color || '#fff', 8);
    bullets.splice(i, 1);
  }
  // Big white flash burst at player position + screen flash.
  spawnParticles(player.x, player.y, '#fff', 30);
  bombFlash = 1;
  screenShake = 0.6;
  // Score bonus, then reset combo (the cost).
  comboBonus += BOMB_SCORE_BONUS;
  spawnFloat(player.x, player.y - 32 * S, t('bomb') + ' +' + BOMB_SCORE_BONUS, '#fff');
  comboCount = 0; comboTimer = 0; comboFlash = 1;
  bombsUsed++;
  return true;
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
var lastTs = 0;
var lastLiveRankAt = 0;
function update(dt) {
  if (gs !== 'PLAYING') return;

  // iter#3 — micro slow-mo on close call (decays smoothly back to 1.0)
  if (dilationTimer > 0) {
    dilationTimer -= dt;
    timeDilation = 0.55;
  } else {
    timeDilation = Math.min(1, timeDilation + dt * 4);
  }
  // Apply dilation to bullet motion (player keeps full responsiveness)
  var bdt = dt * timeDilation;

  // iter#4 — combo meter decay (chain expires after COMBO_WINDOW with no close call)
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { comboCount = 0; comboTimer = 0; }
  }
  if (comboFlash > 0) comboFlash = Math.max(0, comboFlash - dt * 3);
  // iter#8 — bomb flash + armed-pulse oscillator
  if (bombFlash > 0) bombFlash = Math.max(0, bombFlash - dt * 2.2);
  bombHintPulse = (bombHintPulse + dt * 3.0) % (Math.PI * 2);

  var now = performance.now() / 1000;
  elapsed = now - startTime;
  // Recompute projected daily rank ~4×/sec (cheap; just compares numbers)
  if (now - lastLiveRankAt > 0.25) {
    lastLiveRankAt = now;
    liveRank = computeLiveRank(Math.floor(elapsed * 10));
  }
  // DAILY mode terminates at 60s as a CLEARED state. ENDLESS mode has no
  // timer — survive as long as you can while difficulty climbs forever.
  if (runMode === 'DAILY' && elapsed >= GAME_DURATION) {
    score = Math.floor(elapsed * 10) + Math.floor(comboBonus);
    onRunEnded(true);
    return;
  }
  if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 6);

  // movement
  var ax = 0, ay = 0;
  if (keys['ArrowLeft']  || keys['KeyA']) ax -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) ax += 1;
  if (keys['ArrowUp']    || keys['KeyW']) ay -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) ay += 1;

  if (touch.active) {
    // Offset-joystick: drag delta from initial touch point steers the player.
    // Small deadzone, then linear ramp to a max range so a short drag = gentle
    // input, a long drag = full speed. Keeps finger off the player.
    var dx = touch.x - touch.startX, dy = touch.y - touch.startY;
    var L = Math.sqrt(dx*dx + dy*dy);
    var DEAD = 8 * S;
    var MAX_R = 70 * S;
    if (L > DEAD) {
      var mag = clamp((L - DEAD) / (MAX_R - DEAD), 0, 1);
      ax += (dx / L) * mag;
      ay += (dy / L) * mag;
    }
  }
  var alen = Math.sqrt(ax*ax + ay*ay);
  if (alen > 0) { ax /= alen; ay /= alen; }

  player.vx = (player.vx + ax * 0.9 * S) * 0.78;
  player.vy = (player.vy + ay * 0.9 * S) * 0.78;
  var spd = Math.sqrt(player.vx*player.vx + player.vy*player.vy);
  var max = PLAYER_SPEED * S;
  if (spd > max) { player.vx = player.vx/spd*max; player.vy = player.vy/spd*max; }

  player.x += player.vx; player.y += player.vy;

  var ar = arena(), pr = PLAYER_R * S;
  player.x = clamp(player.x, ar.x + pr, ar.x + ar.w - pr);
  player.y = clamp(player.y, ar.y + pr, ar.y + ar.h - pr);

  // process spawns
  if (runMode === 'DAILY') {
    while (nextSpawnIdx < spawners.length && spawners[nextSpawnIdx].t <= elapsed) {
      spawnFromSpawner(spawners[nextSpawnIdx++]);
    }
  } else {
    // iter#6 — Endless procedural spawning. Difficulty climbs uncapped on the
    // upper end so the game becomes genuinely harder past 60s; gap shrinks
    // toward a hard floor so the bullet density stays human-readable.
    endlessSpawnTimer -= dt;
    while (endlessSpawnTimer <= 0) {
      var ediff = clamp(elapsed / 30, 0.5, 4.0);
      spawnFromSpawner({
        t: elapsed,
        kind: Math.floor(endlessRng() * 4),
        edge: Math.floor(endlessRng() * 4),
        u: endlessRng(),
        difficulty: ediff,
        burst: endlessRng() < 0.18 + ediff * 0.08,
      });
      var egap = clamp(0.55 - ediff * 0.10, 0.10, 0.55) + endlessRng() * 0.20;
      endlessSpawnTimer += egap;
    }
  }

  // bullets
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    if (b.kind === 3) {
      // spinner — rotate velocity slowly
      b.spinPhase += bdt * 1.6;
      var r2 = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
      var ang = Math.atan2(b.vy, b.vx) + bdt * 1.0;
      b.vx = Math.cos(ang) * r2; b.vy = Math.sin(ang) * r2;
    }
    b.x += b.vx * bdt; b.y += b.vy * bdt;
    b.life -= bdt;

    var bar = arena();
    if (b.life <= 0 ||
        b.x < bar.x - 60*S || b.x > bar.x + bar.w + 60*S ||
        b.y < bar.y - 60*S || b.y > bar.y + bar.h + 60*S) {
      bullets.splice(i, 1); continue;
    }

    // collision
    var dx = player.x - b.x, dy = player.y - b.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    // ── Close-call (iter#3): bullet whizzed past inner ring without hitting ──
    var collideR = (PLAYER_R*S + b.r) * 0.8;
    var nearR    = (PLAYER_R*S + b.r) * 1.85;
    if (!b.closeCalled && dist < nearR && dist > collideR) {
      b.closeCalled = true;
      closeCallCount++;
      // Visual: a quick spark ring + a streak in the bullet's color
      spawnParticles(player.x, player.y, b.color || '#fff', 8);
      spawnFloat((player.x + b.x)/2, (player.y + b.y)/2 - 6*S, '!', '#fff');
      // Subtle micro slow-mo so the player feels the dodge
      dilationTimer = 0.09; // ~90 ms

      // iter#4 — close-call combo meter (chain near-misses for multiplier)
      comboCount++;
      comboTimer = COMBO_WINDOW;
      comboFlash = 1;
      if (comboCount > maxComboThisRun) maxComboThisRun = comboCount;
      // Award bonus only from x2 onward — x1 is just the close call itself
      if (comboCount >= 2) {
        var mult = comboCount;
        comboBonus += mult; // small per-tick bonus that scales with streak
        if (comboCount === 2 || comboCount === 5 || comboCount === 10 || comboCount === 20) {
          spawnFloat(player.x, player.y - 28*S, '×' + comboCount + '!', '#FFD700');
          spawnParticles(player.x, player.y, '#FFD700', 10);
        }
      }
    }
    if (dist < collideR) {
      if (window._invincible) {
        // pass through harmlessly (screenshot mode)
        bullets.splice(i, 1);
        continue;
      }
      // iter#9 — ad-revive grants 3s of bullet pass-through after rewarded ad
      var nowSec = performance.now() / 1000;
      if (invulnUntil > nowSec) {
        bullets.splice(i, 1);
        continue;
      }
      score = Math.floor(elapsed * 10) + Math.floor(comboBonus);
      spawnParticles(player.x, player.y, '#fff', 30);
      spawnParticles(player.x, player.y, '#e74c3c', 18);
      screenShake = 1.0;
      onRunEnded(false);
      return;
    }
  }

  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05*S;
    p.life -= dt * 1.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (var i = floats.length - 1; i >= 0; i--) {
    var f = floats[i];
    f.y += f.vy; f.life -= dt * 0.95;
    if (f.life <= 0) floats.splice(i, 1);
  }
}

function onRunEnded(survived) {
  var beatAllTime = false;
  // ENDLESS — track its own best, post to its own leaderboard. Daily/all-time
  // bests stay reserved for the 60s sprint so the two ladders never bleed.
  if (runMode === 'ENDLESS') {
    score = Math.floor(elapsed * 10) + Math.floor(comboBonus);
    try {
      var prevEB = parseInt(localStorage.getItem('dodge_endless_best')||'0')||0;
      if (score > prevEB) localStorage.setItem('dodge_endless_best', String(score));
      endlessBest = Math.max(prevEB, score);
      if (score > prevEB && prevEB > 0) beatAllTime = true;
    } catch(e) {}
  } else {
  // DAILY — update today + all-time
  try {
    var dayKey = getDayKey();
    var savedDay = localStorage.getItem('dodge_day_key');
    if (savedDay !== dayKey) {
      localStorage.setItem('dodge_day_key', dayKey);
      localStorage.setItem('dodge_day_best', '0');
    }
    var dayBest = parseInt(localStorage.getItem('dodge_day_best')||'0')||0;
    if (score > dayBest) localStorage.setItem('dodge_day_best', String(score));
    todayBest = Math.max(dayBest, score);

    var atime = parseInt(localStorage.getItem('dodge_alltime_best')||'0')||0;
    if (score > atime && atime > 0) beatAllTime = true; // require a prior best to celebrate
    if (score > atime) localStorage.setItem('dodge_alltime_best', String(score));
    allTimeBest = Math.max(atime, score);
    // Survive 60s of the daily → permanently unlock ENDLESS mode.
    if (survived && !endlessUnlocked) {
      endlessUnlocked = true;
      try { localStorage.setItem('dodge_endless_unlocked', '1'); } catch(e) {}
    }
  } catch(e) {}
  }
  if (beatAllTime && !newBestPopped) {
    newBestPopped = true;
    spawnFloat(player.x, player.y - 24, (lang === 'ru' ? 'НОВЫЙ РЕКОРД!' : 'NEW BEST!'), '#FFD700');
    spawnParticles(player.x, player.y, '#FFD700', 24);
  }
  // iter#3 — persist all-time best close-calls in a single run
  try {
    var prevBestCC = parseInt(localStorage.getItem('dodge_best_closecalls')||'0')||0;
    if (closeCallCount > prevBestCC) {
      localStorage.setItem('dodge_best_closecalls', String(closeCallCount));
      bestCloseCalls = closeCallCount;
    } else {
      bestCloseCalls = prevBestCC;
    }
  } catch(e) {}
  // iter#4 — persist all-time best combo (peak streak in any single run)
  try {
    var prevBestCombo = parseInt(localStorage.getItem('dodge_best_combo')||'0')||0;
    if (maxComboThisRun > prevBestCombo) {
      localStorage.setItem('dodge_best_combo', String(maxComboThisRun));
      bestComboEver = maxComboThisRun;
    } else {
      bestComboEver = prevBestCombo;
    }
  } catch(e) {}
  // iter#8 — persist all-time best bombs (most bombs detonated in a single run)
  try {
    var prevBestBombs = parseInt(localStorage.getItem('dodge_best_bombs')||'0')||0;
    if (bombsUsed > prevBestBombs) {
      localStorage.setItem('dodge_best_bombs', String(bombsUsed));
      bestBombs = bombsUsed;
    } else {
      bestBombs = prevBestBombs;
    }
  } catch(e) {}
  // iter#2 — check skin unlocks based on seconds survived this run
  newlyUnlockedSkin = checkUnlocksAfterRun(elapsed);
  if (newlyUnlockedSkin) {
    spawnFloat(player.x, player.y - 8, skinDisplayName(newlyUnlockedSkin) + ' ' + t('unlocked'), newlyUnlockedSkin.glow);
    spawnParticles(player.x, player.y, newlyUnlockedSkin.glow, 28);
    // auto-equip the freshly unlocked skin
    for (var k = 0; k < SKINS.length; k++) if (SKINS[k].id === newlyUnlockedSkin.id) { skinIdx = k; saveActiveSkin(); break; }
  }
  gs = survived ? 'CLEARED' : 'GAMEOVER';
  try{parent.postMessage({type:'gf:gameEnded'},'*')}catch(_){}
  submitAndFetchLeaderboard();
}

// ── LEADERBOARD ─────────────────────────────────────────────────────────────
var playerName = '';
var leaderboard = [];   // [{name, score, ts}]
var liveBoard = [];     // full top-N for live-rank computation during PLAYING
var liveRank = null;    // your projected daily rank computed against liveBoard each frame
var myRank = null;
var newBestPopped = false; // ensure NEW BEST! float fires only once per run

function ensurePlayerName() {
  if (playerName) return playerName;
  try { playerName = localStorage.getItem('dodge_name') || ''; } catch(e) {}
  if (!playerName) {
    var entered = (window.prompt(t('namePrompt'), 'Player') || '').trim().slice(0, 16);
    if (entered) {
      playerName = entered;
      try { localStorage.setItem('dodge_name', playerName); } catch(e) {}
    }
  }
  return playerName;
}

function leaderboardSlug() {
  return runMode === 'ENDLESS' ? 'daily_dodge_endless' : 'daily_dodge';
}
function fetchLeaderboard() {
  var date = runMode === 'ENDLESS' ? 'all' : getDayKey();
  return fetch('/api/scores?slug=' + leaderboardSlug() + '&date=' + date, { cache: 'no-store' })
    .then(function(r) { return r.ok ? r.json() : { entries: [] }; })
    .then(function(data) {
      var all = data.entries || [];
      leaderboard = all.slice(0, 5);
      // keep a fuller copy for live-rank during play (sorted desc by score)
      liveBoard = all.slice(0, 50).sort(function(a,b){ return b.score - a.score; });
    })
    .catch(function() { /* offline-tolerant */ });
}

// Compute the player's projected daily rank vs cached liveBoard entries.
// Returns null if board is empty (no rank to show).
function computeLiveRank(myScore) {
  if (!liveBoard || liveBoard.length === 0) return null;
  if (myScore <= 0) return null;
  // count entries with score strictly greater than mine; rank = that+1
  var ahead = 0;
  for (var i = 0; i < liveBoard.length; i++) {
    if (liveBoard[i].score > myScore) ahead++; else break;
  }
  return ahead + 1;
}

// ── SHARE CARD (client-side PNG render) ─────────────────────────────────────
// Renders 1200x630 OG-canonical PNG with brand + score + rank + URL.
// Web Share API on mobile (with file), download fallback elsewhere.
function generateShareCardBlob() {
  return new Promise(function(resolve) {
    var c = document.createElement('canvas');
    c.width = 1200; c.height = 630;
    var x = c.getContext('2d');

    // Background — neon synthwave gradient matching Daily Dodge's vibe
    var bgGrad = x.createLinearGradient(0, 0, 1200, 630);
    bgGrad.addColorStop(0, '#0a0a14');
    bgGrad.addColorStop(0.5, '#1a0a2a');
    bgGrad.addColorStop(1, '#0a0a14');
    x.fillStyle = bgGrad;
    x.fillRect(0, 0, 1200, 630);

    // Decorative grid (synthwave horizon)
    x.strokeStyle = 'rgba(77,208,225,0.2)';
    x.lineWidth = 1;
    for (var gx = 0; gx <= 1200; gx += 60) {
      x.beginPath(); x.moveTo(gx, 0); x.lineTo(gx, 630); x.stroke();
    }
    for (var gy = 0; gy <= 630; gy += 60) {
      x.beginPath(); x.moveTo(0, gy); x.lineTo(1200, gy); x.stroke();
    }

    // Brand mark — top-left
    x.fillStyle = '#4dd0e1';
    x.font = 'bold 24px -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif';
    x.textBaseline = 'top';
    x.textAlign = 'left';
    x.fillText(t('shareBrand'), 60, 60);

    // Game title
    x.fillStyle = '#fff';
    x.font = 'bold 88px -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif';
    x.shadowColor = 'rgba(77,208,225,0.6)';
    x.shadowBlur = 30;
    x.fillText(t('shareTitle'), 60, 160);

    x.fillStyle = '#FFD700';

    var scoreText = elapsed.toFixed(1) + 's';
    x.fillText(scoreText, 60, 280);
    var scoreWidth = x.measureText(scoreText).width;

    // "I survived" label above score
    x.fillStyle = '#9ab';
    x.font = '24px -apple-system, BlinkMacSystemFont, sans-serif';
    x.textBaseline = 'bottom';
    x.fillText(t('shareSurvived'), 60, 280);

    // Rank if available
    x.textBaseline = 'top';
    if (myRank) {
      x.fillStyle = '#48c9b0';
      x.font = 'bold 36px -apple-system, BlinkMacSystemFont, sans-serif';
      x.fillText('🏆 ' + t('shareRanked').replace('{rank}', myRank), 60, 440);
    }

    // Day seed
    x.fillStyle = '#5a5a72';
    x.font = '20px monospace';
    x.fillText(t('shareSeed').replace('{seed}', seed), 60, myRank ? 490 : 460);

    // URL bottom-right
    x.fillStyle = '#4dd0e1';
    x.font = 'bold 28px -apple-system, BlinkMacSystemFont, sans-serif';
    x.textAlign = 'right';
    x.textBaseline = 'bottom';
    x.fillText(t('shareCta'), 1140, 570);

    // Bottom hairline
    x.strokeStyle = 'rgba(77,208,225,0.4)';
    x.lineWidth = 2;
    x.beginPath(); x.moveTo(60, 590); x.lineTo(1140, 590); x.stroke();

    c.toBlob(function(blob) { resolve(blob); }, 'image/png', 0.92);
  });
}

function shareScoreCard() {
  generateShareCardBlob().then(function(blob) {
    if (!blob) return;
    var fileName = 'daily-dodge-' + getDayKey() + '-' + (playerName || 'me').replace(/\W/g, '_') + '.png';
    var file = new File([blob], fileName, { type: 'image/png' });

    // Try Web Share API with file (mobile + recent desktop)
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({
        files: [file],
        title: 'Daily Dodge — ' + elapsed.toFixed(1) + 's',
        text: "I survived " + elapsed.toFixed(1) + "s on today's Daily Dodge. Beat my score: game-factory.tech/p/daily_dodge",
      }).catch(function() { /* user cancelled — ignore */ });
      return;
    }

    // Fallback: trigger a download + copy URL to clipboard
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);

    // Also copy a shareable text to clipboard
    var shareText = "I survived " + elapsed.toFixed(1) + "s on today's Daily Dodge. Beat my score: https://game-factory.tech/p/daily_dodge";
    if (navigator.clipboard) {
      navigator.clipboard.writeText(shareText).catch(function(){});
    }
  });
}

function submitAndFetchLeaderboard() {
  var name = ensurePlayerName();
  var date = runMode === 'ENDLESS' ? 'all' : getDayKey();
  if (!name) { fetchLeaderboard(); return; }
  fetch('/api/scores', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ slug: leaderboardSlug(), date: date, name: name, score: score }),
    keepalive: true,
  })
  .then(function(r) { return r.ok ? r.json() : null; })
  .then(function(data) {
    if (data && data.rank) myRank = data.rank;
    return fetchLeaderboard();
  })
  .catch(function() { fetchLeaderboard(); });
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function drawArenaBg() {
  var ar = arena();
  // grid
  ctx.fillStyle = '#0c0c1c';
  ctx.fillRect(ar.x, ar.y, ar.w, ar.h);
  ctx.strokeStyle = 'rgba(72,201,176,0.10)';
  ctx.lineWidth = 1;
  var g = 50 * S;
  for (var x = ar.x; x <= ar.x + ar.w; x += g) {
    ctx.beginPath(); ctx.moveTo(x, ar.y); ctx.lineTo(x, ar.y+ar.h); ctx.stroke();
  }
  for (var y = ar.y; y <= ar.y + ar.h; y += g) {
    ctx.beginPath(); ctx.moveTo(ar.x, y); ctx.lineTo(ar.x+ar.w, y); ctx.stroke();
  }
  // border
  ctx.strokeStyle = 'rgba(120,200,255,0.18)';
  ctx.lineWidth = 2;
  ctx.strokeRect(ar.x, ar.y, ar.w, ar.h);

  // center logo (subtle day seed)
  ctx.font = clamp(11*S, 9, 14) + 'px monospace';
  ctx.fillStyle = 'rgba(120,200,255,0.18)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(t('daySeed') + ' ' + seed, ar.x + ar.w/2, ar.y + ar.h - 14*S);
}

function drawBullet(b) {
  ctx.save();
  ctx.translate(b.x, b.y);

  if (b.kind === 0) {
    // normal — red diamond
    ctx.shadowColor = b.color; ctx.shadowBlur = 8*S;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.moveTo(0, -b.r); ctx.lineTo(b.r, 0); ctx.lineTo(0, b.r); ctx.lineTo(-b.r, 0);
    ctx.closePath(); ctx.fill();
  } else if (b.kind === 1) {
    // small fast — orange dart
    ctx.shadowColor = b.color; ctx.shadowBlur = 6*S;
    ctx.fillStyle = b.color;
    var ang = Math.atan2(b.vy, b.vx);
    ctx.rotate(ang);
    ctx.beginPath();
    ctx.moveTo(b.r * 1.4, 0);
    ctx.lineTo(-b.r * 0.6, b.r * 0.8);
    ctx.lineTo(-b.r * 0.4, 0);
    ctx.lineTo(-b.r * 0.6, -b.r * 0.8);
    ctx.closePath(); ctx.fill();
  } else if (b.kind === 2) {
    // heavy slow — purple orb with halo
    ctx.fillStyle = 'rgba(155,89,182,0.25)';
    ctx.beginPath(); ctx.arc(0, 0, b.r * 1.6, 0, Math.PI*2); ctx.fill();
    ctx.shadowColor = b.color; ctx.shadowBlur = 12*S;
    var grd = ctx.createRadialGradient(-b.r*0.3, -b.r*0.3, 0, 0, 0, b.r);
    grd.addColorStop(0, '#d4a4f0'); grd.addColorStop(1, b.color);
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(0, 0, b.r, 0, Math.PI*2); ctx.fill();
  } else {
    // spinner — teal spiked star
    ctx.shadowColor = b.color; ctx.shadowBlur = 10*S;
    ctx.fillStyle = b.color;
    ctx.rotate(b.spinPhase);
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var a1 = (i/6) * Math.PI*2;
      var a2 = ((i+0.5)/6) * Math.PI*2;
      ctx.lineTo(Math.cos(a1)*b.r*1.1, Math.sin(a1)*b.r*1.1);
      ctx.lineTo(Math.cos(a2)*b.r*0.5, Math.sin(a2)*b.r*0.5);
    }
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

// ── iter#7 — Virtual joystick visual (mobile only; only while finger down) ──
// Shows the player where their finger started + where it's dragged to, so the
// offset-joystick model is discoverable. Skipped on desktop (mouse) entirely.
function drawJoystick() {
  if (!touch.active) return;
  var baseR = 36 * S;
  var thumbR = 18 * S;
  // base ring at start
  ctx.strokeStyle = 'rgba(77,208,225,0.45)';
  ctx.lineWidth = 2*S;
  ctx.beginPath(); ctx.arc(touch.startX, touch.startY, baseR, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'rgba(77,208,225,0.10)';
  ctx.beginPath(); ctx.arc(touch.startX, touch.startY, baseR, 0, Math.PI*2); ctx.fill();
  // thumb capped to base radius
  var dx = touch.x - touch.startX, dy = touch.y - touch.startY;
  var L = Math.sqrt(dx*dx + dy*dy);
  var tx2, ty2;
  if (L < 1) { tx2 = touch.startX; ty2 = touch.startY; }
  else {
    var cap = Math.min(L, baseR);
    tx2 = touch.startX + (dx/L) * cap;
    ty2 = touch.startY + (dy/L) * cap;
  }
  ctx.fillStyle = 'rgba(77,208,225,0.85)';
  ctx.beginPath(); ctx.arc(tx2, ty2, thumbR, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 1.5*S;
  ctx.beginPath(); ctx.arc(tx2, ty2, thumbR, 0, Math.PI*2); ctx.stroke();
}

function drawPlayer() {
  var r = PLAYER_R * S;
  var sk = activeSkin();
  // halo
  ctx.fillStyle = sk.halo;
  ctx.beginPath(); ctx.arc(player.x, player.y, r * 2.2, 0, Math.PI*2); ctx.fill();
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(player.x, player.y + r*0.6, r*0.9, r*0.35, 0, 0, Math.PI*2); ctx.fill();
  // body
  ctx.shadowColor = sk.glow; ctx.shadowBlur = 12*S;
  var grd = ctx.createRadialGradient(player.x - r*0.3, player.y - r*0.3, 0, player.x, player.y, r);
  grd.addColorStop(0, sk.inner); grd.addColorStop(1, sk.outer);
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(player.x, player.y, r, 0, Math.PI*2); ctx.fill();
  ctx.shadowColor = 'transparent';
  // ring
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5*S;
  ctx.beginPath(); ctx.arc(player.x, player.y, r * 0.7, 0, Math.PI*2); ctx.stroke();
}

function drawHUD() {
  var bh = HUD_H * S;
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, W, bh);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, bh); ctx.lineTo(W, bh); ctx.stroke();

  var pad = 14*S, fs = clamp(13*S, 11, 17), fy = bh*0.78;
  var bigFs = clamp(18*S, 14, 24);
  ctx.textBaseline = 'alphabetic';

  // time elapsed (left)
  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(t('time'), pad, bh*0.42);
  ctx.fillStyle = '#fff'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(elapsed.toFixed(1)+t('sec'), pad, fy);

  // today best (center) — endless mode shows endless all-time best instead
  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(runMode === 'ENDLESS' ? t('endlessBest') : t('best'), cx, bh*0.42);
  ctx.fillStyle = runMode === 'ENDLESS' ? '#ff5a8c' : '#48c9b0';
  ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(runMode === 'ENDLESS' ? endlessBest : todayBest, cx, fy);

  // current score (right)
  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(t('score'), W-pad, bh*0.42);
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(Math.floor(elapsed * 10) + Math.floor(comboBonus), W-pad, fy);

  // bottom timer bar — only in DAILY mode (endless has no fixed end)
  if (runMode === 'DAILY') {
    var tw = clamp(W*0.5, 200, 600), th = 6*S;
    var tx = cx - tw/2, ty = H - 14*S;
    rr(ctx, tx, ty, tw, th, th/2);
    ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill();
    rr(ctx, tx, ty, tw * (elapsed / GAME_DURATION), th, th/2);
    ctx.fillStyle = '#48c9b0'; ctx.fill();
  } else {
    // Endless badge bottom-center
    ctx.font = 'bold '+clamp(11*S,9,14)+'px sans-serif';
    ctx.fillStyle = 'rgba(255,90,140,0.65)';
    ctx.textAlign = 'center';
    ctx.fillText('— ' + t('endless') + ' —', cx, H - 14*S);
  }

  // Streak flame in HUD top-left corner (under the time block) if ≥ 3 days
  if (streak.current >= 3) {
    ctx.font = 'bold ' + clamp(11*S,9,14) + 'px sans-serif';
    ctx.fillStyle = '#ff8a3d';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('🔥 ' + streak.current, pad, bh + 4*S);
    ctx.textBaseline = 'alphabetic';
  }

  // ── Live daily rank pill (just below HUD, top-center) ────────────────────
  // Adds *social* pressure during play: shows your projected position vs
  // everyone else who's run today's seed already.
  if (liveRank && liveRank > 0) {
    var pillTxt = (lang === 'ru' ? '#' : '#') + liveRank + ' / ' + liveBoard.length;
    var labelTxt = (lang === 'ru' ? 'МЕСТО' : 'RANK');
    var pillFs = clamp(13*S, 11, 17);
    var lblFs  = clamp(10*S, 8, 13);
    ctx.font = 'bold ' + pillFs + 'px sans-serif';
    var pw = ctx.measureText(pillTxt).width + clamp(46*S, 36, 64);
    var ph = clamp(24*S, 20, 32);
    var px = cx - pw/2, py = bh + 6*S;
    rr(ctx, px, py, pw, ph, ph/2);
    ctx.fillStyle = liveRank === 1 ? 'rgba(255,215,0,0.18)' : 'rgba(72,201,176,0.14)';
    ctx.strokeStyle = liveRank === 1 ? 'rgba(255,215,0,0.6)' : 'rgba(72,201,176,0.5)';
    ctx.lineWidth = 1.2*S;
    ctx.fill(); ctx.stroke();
    // label inside pill, left
    ctx.font = 'bold ' + lblFs + 'px sans-serif';
    ctx.fillStyle = '#557';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(labelTxt, px + clamp(10*S, 8, 14), py + ph/2);
    // value, right
    ctx.font = 'bold ' + pillFs + 'px sans-serif';
    ctx.fillStyle = liveRank === 1 ? '#FFD700' : '#48c9b0';
    ctx.textAlign = 'right';
    ctx.fillText(pillTxt, px + pw - clamp(10*S, 8, 14), py + ph/2);
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
  }

  // ── Combo pill (iter#4) — visible only while a streak is alive ──────────
  // Sits on the right edge under the HUD, mirrors the live-rank pill on the
  // left/center. Width pulses on each new close-call (comboFlash decays).
  if (comboCount >= 2) {
    var cFs = clamp(13*S, 11, 17);
    var cLblFs = clamp(10*S, 8, 13);
    ctx.font = 'bold ' + cFs + 'px sans-serif';
    var valTxt = '×' + comboCount;
    var cw = ctx.measureText(valTxt).width + clamp(58*S, 44, 76);
    var ch = clamp(24*S, 20, 32);
    var pulse = 1 + comboFlash * 0.12;
    var cwp = cw * pulse, chp = ch * pulse;
    var cxp = W - pad - cwp, cyp = bh + 6*S - (chp - ch)/2;
    rr(ctx, cxp, cyp, cwp, chp, chp/2);
    var hot = comboCount >= 5;
    ctx.fillStyle = hot ? 'rgba(255,90,140,0.20)' : 'rgba(255,215,0,0.16)';
    ctx.strokeStyle = hot ? 'rgba(255,90,140,0.7)' : 'rgba(255,215,0,0.6)';
    ctx.lineWidth = 1.2*S;
    ctx.fill(); ctx.stroke();
    ctx.font = 'bold ' + cLblFs + 'px sans-serif';
    ctx.fillStyle = '#776';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(t('combo'), cxp + clamp(10*S, 8, 14), cyp + chp/2);
    ctx.font = 'bold ' + cFs + 'px sans-serif';
    ctx.fillStyle = hot ? '#ff5a8c' : '#FFD700';
    ctx.textAlign = 'right';
    ctx.fillText(valTxt, cxp + cwp - clamp(10*S, 8, 14), cyp + chp/2);
    // tiny depleting timer arc under the pill
    var frac = clamp(comboTimer / COMBO_WINDOW, 0, 1);
    var bw = cwp * 0.7, bh2 = 2.5*S;
    var bx = cxp + (cwp - bw)/2, by = cyp + chp + 3*S;
    rr(ctx, bx, by, bw, bh2, bh2/2);
    ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();
    rr(ctx, bx, by, bw * frac, bh2, bh2/2);
    ctx.fillStyle = hot ? '#ff5a8c' : '#FFD700'; ctx.fill();
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
  }

  // ── iter#8 — Bomb pill (under the combo pill on the right edge) ──────────
  // Armed at combo ≥ BOMB_THRESHOLD. Pulses to signal "ready". Tap or press
  // Space to detonate. The bombsUsed-this-run counter on the right edge
  // surfaces how aggressive your run has been.
  if (comboCount >= BOMB_THRESHOLD || bombsUsed > 0) {
    var armed = comboCount >= BOMB_THRESHOLD;
    var bFs = clamp(13*S, 11, 17);
    var bLblFs = clamp(9*S, 8, 12);
    ctx.font = 'bold ' + bFs + 'px sans-serif';
    var bvalTxt = armed ? '!' : ('×' + bombsUsed);
    var bw3 = ctx.measureText(bvalTxt).width + clamp(70*S, 56, 92);
    var bh3 = clamp(24*S, 20, 32);
    var pulseAmt = armed ? (1 + 0.12 * (0.5 + 0.5 * Math.sin(bombHintPulse * 2))) : 1;
    var bw3p = bw3 * pulseAmt, bh3p = bh3 * pulseAmt;
    var bxp = W - pad - bw3p, byp = bh + 6*S + clamp(34*S, 26, 42); // sit under combo pill
    rr(ctx, bxp, byp, bw3p, bh3p, bh3p/2);
    ctx.fillStyle = armed ? 'rgba(255,255,255,0.22)' : 'rgba(110,140,170,0.10)';
    ctx.strokeStyle = armed ? 'rgba(255,255,255,0.85)' : 'rgba(150,180,210,0.4)';
    ctx.lineWidth = 1.2*S;
    ctx.fill(); ctx.stroke();
    ctx.font = 'bold ' + bLblFs + 'px sans-serif';
    ctx.fillStyle = armed ? '#fff' : '#557';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(t('bomb'), bxp + clamp(10*S, 8, 14), byp + bh3p/2);
    ctx.font = 'bold ' + bFs + 'px sans-serif';
    ctx.fillStyle = armed ? '#fff' : '#7a8aa3';
    ctx.textAlign = 'right';
    ctx.fillText(bvalTxt, bxp + bw3p - clamp(10*S, 8, 14), byp + bh3p/2);
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
    // Persist pill rect for tap hit-test (touchstart). Only when armed.
    bombBtnRect = armed ? { x: bxp, y: byp, w: bw3p, h: bh3p } : null;
    // Tiny "TAP / SPACE" hint label below the pill when armed
    if (armed) {
      ctx.font = 'bold ' + clamp(8.5*S, 8, 11) + 'px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.textAlign = 'center';
      ctx.fillText(t('bombReady'), bxp + bw3p/2, byp + bh3p + clamp(10*S, 9, 14));
      ctx.textAlign = 'left';
    }
  } else {
    bombBtnRect = null;
  }

  // ── iter#8 — Bomb detonation flash overlay ──────────────────────────────
  if (bombFlash > 0) {
    ctx.fillStyle = 'rgba(255,255,255,' + (bombFlash * 0.55).toFixed(3) + ')';
    ctx.fillRect(0, 0, W, H);
  }
}

function drawOverlay(title, sub, btnText, btnFn, sub2) {
  buttons = [];
  ctx.fillStyle = 'rgba(5,5,16,0.88)';
  ctx.fillRect(0, 0, W, H);

  var titleFs = clamp(40*S, 24, 60);
  var subFs   = clamp(16*S, 12, 22);
  var btnW    = clamp(240*S, 160, 320), btnH = clamp(52*S, 40, 66);
  var btnX    = cx - btnW/2, btnY = cy + 26*S;

  ctx.shadowColor = 'rgba(77,208,225,0.5)'; ctx.shadowBlur = 30*S;
  ctx.font = 'bold '+titleFs+'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(title, cx, cy - 60*S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  if (sub)  { ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#9ab'; ctx.fillText(sub,  cx, cy - 24*S); }
  if (sub2) { ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#bcd'; ctx.fillText(sub2, cx, cy - 4*S);  }

  if (gs === 'MENU') {
    // ── iter#6 — Twin mode buttons on the menu (DAILY + ENDLESS) ─────────────
    var twoW = clamp(200*S, 140, 280), twoH = btnH;
    var gap2 = clamp(16*S, 10, 26);
    var totalW = twoW * 2 + gap2;
    var dX = cx - totalW/2, dY = btnY;
    var eX = dX + twoW + gap2, eY = btnY;
    // DAILY button (always enabled)
    var gradD = ctx.createLinearGradient(dX, dY, dX, dY+twoH);
    gradD.addColorStop(0, '#4dd0e1'); gradD.addColorStop(1, '#0288a8');
    rr(ctx, dX, dY, twoW, twoH, twoH/2);
    ctx.fillStyle = gradD; ctx.fill();
    ctx.font = 'bold '+subFs+'px sans-serif'; ctx.fillStyle = '#fff';
    ctx.textBaseline = 'middle';
    ctx.fillText(t('play'), dX + twoW/2, dY + twoH/2);
    buttons.push({ x:dX, y:dY, w:twoW, h:twoH, fn: function() { startRun('DAILY'); } });
    // ENDLESS button (locked until daily cleared at least once)
    rr(ctx, eX, eY, twoW, twoH, twoH/2);
    if (endlessUnlocked) {
      var gradE = ctx.createLinearGradient(eX, eY, eX, eY+twoH);
      gradE.addColorStop(0, '#ff5a8c'); gradE.addColorStop(1, '#7a1241');
      ctx.fillStyle = gradE; ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillText(t('endlessPlay'), eX + twoW/2, eY + twoH/2);
      buttons.push({ x:eX, y:eY, w:twoW, h:twoH, fn: function() { startRun('ENDLESS'); } });
    } else {
      ctx.fillStyle = 'rgba(40,40,60,0.7)'; ctx.fill();
      ctx.strokeStyle = 'rgba(120,120,160,0.4)'; ctx.lineWidth = 1.2*S; ctx.stroke();
      ctx.fillStyle = '#667';
      ctx.fillText('🔒 ' + t('endless'), eX + twoW/2, eY + twoH/2);
    }
    ctx.textBaseline = 'alphabetic';
    // Locked tagline below endless button
    if (!endlessUnlocked) {
      ctx.font = clamp(11*S,9,14)+'px sans-serif';
      ctx.fillStyle = '#557';
      ctx.fillText(t('endlessLocked'), eX + twoW/2, eY + twoH + 14*S);
    } else {
      ctx.font = clamp(11*S,9,14)+'px sans-serif';
      ctx.fillStyle = '#557';
      ctx.fillText(t('endlessBest')+': '+endlessBest, eX + twoW/2, eY + twoH + 14*S);
    }
  } else {
    var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY+btnH);
    grad.addColorStop(0, '#4dd0e1'); grad.addColorStop(1, '#0288a8');
    rr(ctx, btnX, btnY, btnW, btnH, btnH/2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.font = 'bold '+subFs+'px sans-serif'; ctx.fillStyle = '#fff';
    ctx.textBaseline = 'middle';
    ctx.fillText(btnText, cx, btnY + btnH/2);
    ctx.textBaseline = 'alphabetic';
    buttons.push({ x:btnX, y:btnY, w:btnW, h:btnH, fn:btnFn });
  }

  // Stats
  ctx.font = clamp(13*S,10,17)+'px sans-serif';
  ctx.fillStyle = '#557';
  ctx.fillText(t('best')+': '+todayBest+'   '+t('alltime')+': '+allTimeBest, cx, btnY+btnH+30*S);
  ctx.fillText(t('daySeed')+' '+seed, cx, btnY+btnH+50*S);
  // iter#5 — Streak readout on the menu (live flame + best)
  if (gs === 'MENU') {
    ctx.font = 'bold '+clamp(14*S,11,18)+'px sans-serif';
    ctx.fillStyle = streak.current >= 3 ? '#ff8a3d' : '#9ab';
    var streakTxt = '🔥 ' + streak.current + ' ' + t('daysStreak');
    if (streak.best > streak.current) streakTxt += '   ·   ' + t('bestStreak') + ': ' + streak.best;
    ctx.fillText(streakTxt, cx, btnY+btnH+74*S);
  }

  // ── Skins strip (iter#2 + iter#5) — menu only ────────────────────────────
  if (gs === 'MENU') {
    var skLabelFs = clamp(12*S, 10, 15);
    var skR = clamp(14*S, 11, 19);
    var skGap = clamp(10*S, 7, 16);
    var skTotalW = SKINS.length * (skR*2) + (SKINS.length - 1) * skGap;
    var skY = btnY + btnH + 116*S;
    var skX0 = cx - skTotalW/2 + skR;

    ctx.font = 'bold ' + skLabelFs + 'px sans-serif';
    ctx.fillStyle = '#9ab'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText(t('skins'), cx, skY - skR - 10*S);

    for (var si = 0; si < SKINS.length; si++) {
      var sk = SKINS[si];
      var sxC = skX0 + si * (skR*2 + skGap);
      var unlocked = isSkinUnlocked(si);
      var active = (si === skinIdx);
      // disc
      if (unlocked) {
        var sg = ctx.createRadialGradient(sxC - skR*0.3, skY - skR*0.3, 0, sxC, skY, skR);
        sg.addColorStop(0, sk.inner); sg.addColorStop(1, sk.outer);
        ctx.fillStyle = sg;
      } else {
        ctx.fillStyle = '#1a1a26';
      }
      ctx.beginPath(); ctx.arc(sxC, skY, skR, 0, Math.PI*2); ctx.fill();
      // ring
      ctx.lineWidth = active ? 2.4*S : 1.2*S;
      ctx.strokeStyle = active ? '#FFD700' : (unlocked ? 'rgba(255,255,255,0.4)' : 'rgba(120,120,160,0.4)');
      ctx.beginPath(); ctx.arc(sxC, skY, skR, 0, Math.PI*2); ctx.stroke();
      // padlock for locked
      if (!unlocked) {
        ctx.fillStyle = '#667';
        ctx.font = 'bold ' + (skR * 1.0) + 'px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🔒', sxC, skY + 1);
        ctx.textBaseline = 'alphabetic';
      }
      // label below
      ctx.font = clamp(10*S, 8, 13) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      if (unlocked) {
        ctx.fillStyle = active ? '#FFD700' : '#9bf';
        ctx.fillText(skinDisplayName(sk), sxC, skY + skR + 6*S);
      } else {
        ctx.fillStyle = '#557';
        var lockLabel = sk.kind === 'streak'
          ? (t('streakReq') + ' ' + sk.threshold + ' ' + t('days'))
          : (t('unlockAt') + ' ' + sk.threshold + 's');
        ctx.fillText(lockLabel, sxC, skY + skR + 6*S);
      }
      ctx.textBaseline = 'alphabetic';
      // tap target — only if unlocked
      if (unlocked) {
        var hitR = skR + 6*S;
        (function(idx){
          buttons.push({ x: sxC - hitR, y: skY - hitR, w: hitR*2, h: hitR*2, fn: function() {
            skinIdx = idx; saveActiveSkin();
          } });
        })(si);
      }
    }
    ctx.textAlign = 'center';
  }

  // ── Leaderboard (only on game-end overlays, not the menu) ────────────────
  if ((gs === 'GAMEOVER' || gs === 'CLEARED') && leaderboard.length > 0) {
    var lbX = cx, lbY = btnY + btnH + 90*S;
    var lbFs = clamp(14*S, 11, 18);
    var rowFs = clamp(13*S, 10, 16);
    var rowH  = clamp(20*S, 16, 24);

    ctx.font = 'bold ' + lbFs + 'px sans-serif';
    ctx.fillStyle = '#48c9b0';
    ctx.textAlign = 'center';
    ctx.fillText(t('leaderboard') + (myRank ? ' — ' + t('rank') + ': ' + myRank : ''), lbX, lbY);

    ctx.font = rowFs + 'px sans-serif';
    for (var i = 0; i < leaderboard.length; i++) {
      var entry = leaderboard[i];
      var rowY = lbY + (i + 1) * rowH + 6*S;
      var isMe = entry.name === playerName;
      ctx.fillStyle = isMe ? '#FFD700' : '#aab';
      ctx.textAlign = 'right';
      ctx.fillText((i + 1) + '.', cx - 80*S, rowY);
      ctx.textAlign = 'left';
      var displayName = entry.name + (isMe ? ' ('+t('you')+')' : '');
      ctx.fillText(displayName, cx - 70*S, rowY);
      ctx.textAlign = 'right';
      ctx.fillStyle = isMe ? '#FFD700' : '#9bf';
      ctx.fillText(entry.score, cx + 110*S, rowY);
    }
    ctx.textAlign = 'center';

    // ── Share button (only on game-end overlays, only after a real run) ────
    if (elapsed > 1) {
      var shareW = clamp(190*S, 130, 240), shareH = clamp(40*S, 32, 50);
      var shareX = cx - shareW/2;
      var shareY = lbY + (leaderboard.length + 1) * rowH + 18*S;
      rr(ctx, shareX, shareY, shareW, shareH, shareH/2);
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.strokeStyle = 'rgba(77,208,225,0.4)';
      ctx.lineWidth = 1.5*S;
      ctx.fill(); ctx.stroke();
      ctx.font = 'bold ' + clamp(14*S, 11, 18) + 'px sans-serif';
      ctx.fillStyle = '#4dd0e1';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('📤 ' + (lang === 'ru' ? 'Поделиться счётом' : 'Share my score'), cx, shareY + shareH/2);
      ctx.textBaseline = 'alphabetic';
      buttons.push({ x: shareX, y: shareY, w: shareW, h: shareH, fn: shareScoreCard });
    }
  }
}

// ── MAIN LOOP ───────────────────────────────────────────────────────────────
function frame(ts) {
  var dt = Math.min((ts - lastTs) / 1000, 0.08);
  lastTs = ts;

  update(dt);

  var sx = 0, sy = 0;
  if (screenShake > 0) { sx=(Math.random()-0.5)*screenShake*14*S; sy=(Math.random()-0.5)*screenShake*14*S; }

  ctx.save();
  ctx.translate(sx, sy);
  ctx.fillStyle = '#050510';
  ctx.fillRect(-20, -20, W+40, H+40);

  if (gs === 'PLAYING' || gs === 'GAMEOVER' || gs === 'CLEARED') {
    drawArenaBg();
    for (var i = 0; i < bullets.length; i++) drawBullet(bullets[i]);

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (gs === 'PLAYING') drawPlayer();

    for (var i = 0; i < floats.length; i++) {
      var f = floats[i];
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.font = 'bold '+clamp(15*S,11,22)+'px sans-serif';
      ctx.fillStyle = f.col; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(f.txt, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    if (gs === 'PLAYING') drawHUD();
    if (gs === 'PLAYING') drawJoystick();
  }
  ctx.restore();

  if (gs === 'MENU') {
    ctx.fillStyle = '#050510'; ctx.fillRect(0,0,W,H);
    drawOverlay(t('title'), t('sub'), t('play'), function() { startRun(); }, t('sub2'));
  }
  if (gs === 'GAMEOVER') {
    var comboLine = (maxComboThisRun >= 2)
      ? ('   ·   '+t('combo')+' ×'+maxComboThisRun+(bestComboEver>0?(' (best ×'+bestComboEver+')'):''))
      : '';
    var bombLine = (bombsUsed > 0)
      ? ('   ·   '+t('bombsUsed')+': '+bombsUsed+(bestBombs>bombsUsed?(' (best '+bestBombs+')'):''))
      : '';
    var modeTag = runMode === 'ENDLESS' ? ('['+t('endless')+'] ') : '';
    // iter#9 — RETRY click also shows a throttled interstitial (Yandex 4.1).
    drawOverlay(modeTag + t('youDied'), t('survived')+' '+elapsed.toFixed(1)+t('sec'), t('retry'),
      function() { showInterstitial(function() { startRun(runMode); }); }, t('score')+': '+score+'   ·   '+t('closeCalls')+': '+closeCallCount+(bestCloseCalls>0?(' (best '+bestCloseCalls+')'):'')+comboLine+bombLine);

    // iter#9 — EXTRA LIFE (rewarded ad). One revive per run; user-click only.
    if (!reviveUsed) {
      var rW = clamp(280*S, 200, 360), rH = clamp(46*S, 36, 56);
      var rX = cx - rW/2;
      var rY = H - rH - 18*S;
      reviveBtnRect = { x: rX, y: rY, w: rW, h: rH };
      rr(ctx, rX, rY, rW, rH, rH/2);
      var gradR = ctx.createLinearGradient(rX, rY, rX, rY+rH);
      gradR.addColorStop(0, '#FFD700'); gradR.addColorStop(1, '#8a6a00');
      ctx.fillStyle = gradR; ctx.fill();
      ctx.font = 'bold ' + clamp(15*S, 12, 19) + 'px sans-serif';
      ctx.fillStyle = '#1a1a2e';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('📺  ' + t('revive'), cx, rY + rH/2);
      ctx.textBaseline = 'alphabetic';
      buttons.push({ x: rX, y: rY, w: rW, h: rH, fn: showRewardedRevive });
    }
  }
  if (gs === 'CLEARED') {
    var comboLineC = (maxComboThisRun >= 2)
      ? ('   ·   '+t('combo')+' ×'+maxComboThisRun+(bestComboEver>0?(' (best ×'+bestComboEver+')'):''))
      : '';
    var bombLineC = (bombsUsed > 0)
      ? ('   ·   '+t('bombsUsed')+': '+bombsUsed+(bestBombs>bombsUsed?(' (best '+bestBombs+')'):''))
      : '';
    drawOverlay(t('cleared'), t('score')+': '+score, t('retry'),
      function() { startRun('DAILY'); }, t('closeCalls')+': '+closeCallCount+(bestCloseCalls>0?(' (best '+bestCloseCalls+')'):'')+comboLineC+bombLineC);
    // iter#6 — "Continue → Endless" CTA: after surviving 60s, let the player
    // keep going into Endless mode without bouncing back to the menu. The
    // daily score is already submitted; the endless run posts to its own slug.
    if (runMode === 'DAILY') {
      var ceW = clamp(280*S, 200, 360), ceH = clamp(46*S, 36, 56);
      var ceX = cx - ceW/2;
      // Place below the share button area; use a y based on screen height fallback
      var ceY = H - ceH - 18*S;
      rr(ctx, ceX, ceY, ceW, ceH, ceH/2);
      var gradCE = ctx.createLinearGradient(ceX, ceY, ceX, ceY+ceH);
      gradCE.addColorStop(0, '#ff5a8c'); gradCE.addColorStop(1, '#7a1241');
      ctx.fillStyle = gradCE; ctx.fill();
      ctx.font = 'bold ' + clamp(15*S, 12, 19) + 'px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(t('continueEndless'), cx, ceY + ceH/2);
      ctx.textBaseline = 'alphabetic';
      buttons.push({ x: ceX, y: ceY, w: ceW, h: ceH, fn: continueIntoEndless });
    }
  }

  requestAnimationFrame(frame);
}

// ── BOOT ────────────────────────────────────────────────────────────────────
var booted = false;
function boot() {
  if (booted) return;
  booted = true;
  seed = getDaySeed();
  try {
    // refresh today best per-day
    var dayKey = getDayKey();
    var savedDay = localStorage.getItem('dodge_day_key');
    if (savedDay !== dayKey) {
      localStorage.setItem('dodge_day_key', dayKey);
      localStorage.setItem('dodge_day_best', '0');
    }
    todayBest = parseInt(localStorage.getItem('dodge_day_best')||'0')||0;
    allTimeBest = parseInt(localStorage.getItem('dodge_alltime_best')||'0')||0;
    bestCloseCalls = parseInt(localStorage.getItem('dodge_best_closecalls')||'0')||0;
    bestComboEver = parseInt(localStorage.getItem('dodge_best_combo')||'0')||0;
    bestBombs = parseInt(localStorage.getItem('dodge_best_bombs')||'0')||0;
    endlessBest = parseInt(localStorage.getItem('dodge_endless_best')||'0')||0;
    endlessUnlocked = localStorage.getItem('dodge_endless_unlocked') === '1';
  } catch(e) {}
  loadStreak();
  loadSkinState();
  if (window.ysdk && window.ysdk.features && window.ysdk.features.LoadingAPI) {
    window.ysdk.features.LoadingAPI.ready();
  }
  gs = 'MENU';
  lastTs = performance.now();
  requestAnimationFrame(frame);
}

(function() {
  if (typeof YaGames === 'undefined') { setTimeout(boot, 3000); return; }
  YaGames.init().then(function(ysdk) {
    window.ysdk = ysdk;
    try {
      var l = ysdk.environment && ysdk.environment.i18n && ysdk.environment.i18n.lang;
      if (l) lang = l.startsWith('ru') ? 'ru' : 'en';
    } catch(e) {}
    boot();
  }).catch(function() { boot(); });
  setTimeout(boot, 3000);
})();

})();
</script>
