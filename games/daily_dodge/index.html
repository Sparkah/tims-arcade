// reward banner (login/idle/event/pass collect) - brief center-top confirmation.
function drawRewardBanner() {
  var n = nowSec();
  if (rewardBannerUntil <= n || !rewardBannerText) return;
  var a = Math.min(1, (rewardBannerUntil - n) / 0.4);
  ctx.save(); ctx.globalAlpha = a;
  var fs = clamp(20*S, 15, 28);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  var bw = ctx.measureText(rewardBannerText).width + clamp(70*S,50,90), bhh = clamp(52*S,42,66);
  var bx = cx - bw/2, by = H*0.5 - bhh/2;
  rr(ctx, bx, by, bw, bhh, bhh/2);
  ctx.fillStyle = 'rgba(10,16,28,0.97)'; ctx.fill();
  ctx.lineWidth = 2*S; ctx.strokeStyle = '#FFD700'; ctx.stroke();
  ctx.fillStyle = '#ffe27a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(rewardBannerText, cx, by + bhh/2);
  ctx.restore();
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

// Dodge Pass purchase - rewarded ad in prod, instant when no SDK (gallery/dev),
// with a no-fill watchdog so the button never sticks (Yandex 4.5/1.14).
function buyPass() {
  if (meta.pass) return;
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showRewardedVideo) { grantPass(); return; }
  var rewarded = false, opened = false, settled = false, wd = null;
  function settle(grant){ if(settled)return; settled=true; if(wd){clearTimeout(wd);wd=null;} if(grant) grantPass(); }
  wd = setTimeout(function(){ if(!opened) settle(true); }, 4500);
  try {
    pauseGameAudio();
    window.ysdk.adv.showRewardedVideo({ callbacks: {
      onOpen: function(){ opened=true; if(wd){clearTimeout(wd);wd=null;} },
      onRewarded: function(){ rewarded=true; },
      onClose: function(){ resumeGameAudio(); settle(rewarded); },
      onError: function(){ resumeGameAudio(); settle(true); },
    }});
  } catch(e) { resumeGameAudio(); settle(true); }
}

function drawOverlay(title, sub, btnText, btnFn, sub2) {
  buttons = [];
  ctx.fillStyle = 'rgba(5,5,16,0.88)';
  ctx.fillRect(0, 0, W, H);

  var titleFs = clamp(40*S, 24, 60);
  var subFs   = clamp(16*S, 12, 22);
  var btnW    = clamp(240*S, 160, 320), btnH = clamp(52*S, 40, 66);
  var btnX    = cx - btnW/2, btnY = cy + 26*S;
  var _menuBtnBottom = btnY + btnH; // updated below for MENU twin buttons

  // milestone - on the MENU, pull the whole block UP on wide/short desktop so
  // the LOADOUT button + skins + achievements strips all fit above the bottom
  // edge (the menu added a LOADOUT row; 1280x720 has dead space up top). Other
  // overlays (GAMEOVER/CLEARED) keep cy-anchored layout.
  var menuYoff = (gs === 'MENU' && (W / H > 1.15)) ? -clamp(124*S, 80, 180) : 0;

  ctx.shadowColor = 'rgba(77,208,225,0.5)'; ctx.shadowBlur = 30*S;
  ctx.font = 'bold '+titleFs+'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(title, cx, cy - 60*S + menuYoff);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  if (sub)  { ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#9ab'; ctx.fillText(sub,  cx, cy - 24*S + menuYoff); }
  if (sub2) { ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#bcd'; ctx.fillText(sub2, cx, cy - 4*S + menuYoff);  }

  if (gs === 'MENU') {
    // ── iter#6 - Twin mode buttons on the menu (DAILY + ENDLESS) ─────────────
    var wide = W / H > 1.15;
    var twoW = clamp((wide?280:200)*S, 140, 360), twoH = clamp((wide?70:52)*S, 40, 82);
    var gap2 = clamp(16*S, 10, 26);
    var totalW = twoW * 2 + gap2;
    // Lift into empty space on wide: keep below the text block, never overlap it.
    // menuYoff pulls the wide layout up so the LOADOUT + skins + achievements fit.
    var _subBottom = cy - 4*S + menuYoff + clamp(16*S, 12, 22);
    var _wideFloor = H * 0.50 + menuYoff;
    var dY = wide ? Math.max(_subBottom + twoH/2 + 16, _wideFloor) : btnY;
    var dX = cx - totalW/2;
    var eX = dX + twoW + gap2, eY = dY;
    // Pulse for the DAILY button on wide
    var _pt = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000;
    var _pk = Math.sin(_pt * 2.2);
    var _pp = wide ? (1 + 0.05 * _pk) : 1;
    var _dW = twoW * _pp, _dH = twoH * _pp;
    var _dX = cx - totalW/2 + twoW/2 - _dW/2, _dY = dY + twoH/2 - _dH/2;
    ctx.save();
    if (wide) { ctx.shadowColor = 'rgba(77,208,225,' + (0.4 + 0.28 * _pk).toFixed(3) + ')'; ctx.shadowBlur = (22 + 10 * _pk) * S; }
    var gradD = ctx.createLinearGradient(_dX, _dY, _dX, _dY+_dH);
    gradD.addColorStop(0, '#4dd0e1'); gradD.addColorStop(1, '#0288a8');
    rr(ctx, _dX, _dY, _dW, _dH, _dH/2);
    ctx.fillStyle = gradD; ctx.fill(); ctx.restore();
    ctx.font = 'bold '+subFs+'px sans-serif'; ctx.fillStyle = '#fff';
    ctx.textBaseline = 'middle';
    ctx.fillText('▶ ' + t('play'), cx - totalW/2 + twoW/2, dY + twoH/2);
    buttons.push({ x:dX, y:dY, w:twoW, h:twoH, fn: function() { startRun('DAILY'); } });
    _menuBtnBottom = dY + twoH;
    // ENDLESS button (locked until daily cleared at least once)
    rr(ctx, eX, eY, twoW, twoH, twoH/2);
    if (endlessUnlocked) {
      var gradE = ctx.createLinearGradient(eX, eY, eX, eY+twoH);
      gradE.addColorStop(0, '#ff5a8c'); gradE.addColorStop(1, '#7a1241');
      ctx.fillStyle = gradE; ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillText(t('endlessPlay'), eX + twoW/2, eY + twoH/2);
      buttons.push({ x:eX, y:eY, w:twoW, h:twoH, fn: function() { startRun('ENDLESS'); } });
    } else {
      ctx.fillStyle = 'rgba(40,40,60,0.7)'; ctx.fill();
      ctx.strokeStyle = 'rgba(120,120,160,0.4)'; ctx.lineWidth = 1.2*S; ctx.stroke();
      // VECTOR lock + centered label (no emoji, Build Hygiene #1)
      var elFs = subFs;
      ctx.font = 'bold ' + elFs + 'px sans-serif';
      var elTxt = t('endless');
      var elLkR = clamp(8*S, 6, 11);
      var elTxtW = ctx.measureText(elTxt).width;
      var elTot = elLkR*2 + 6*S + elTxtW;
      var elCx = eX + twoW/2 - elTot/2;
      drawIconLock(elCx + elLkR, eY + twoH/2, elLkR, '#8088a0');
      ctx.fillStyle = '#778'; ctx.textAlign = 'left';
      ctx.fillText(elTxt, elCx + elLkR*2 + 6*S, eY + twoH/2);
      ctx.textAlign = 'center';
    }
    ctx.textBaseline = 'alphabetic';
    // Locked tagline below endless button
    if (!endlessUnlocked) {
      ctx.font = clamp(11*S,9,14)+'px sans-serif';
      ctx.fillStyle = '#557';
      ctx.fillText(t('endlessLocked'), eX + twoW/2, dY + twoH + 14*S);
    } else {
      ctx.font = clamp(11*S,9,14)+'px sans-serif';
      ctx.fillStyle = '#557';
      ctx.fillText(t('endlessBest')+': '+endlessBest, eX + twoW/2, dY + twoH + 14*S);
    }
  } else {
    var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY+btnH);
    grad.addColorStop(0, '#4dd0e1'); grad.addColorStop(1, '#0288a8');
    rr(ctx, btnX, btnY, btnW, btnH, btnH/2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.font = 'bold '+subFs+'px sans-serif'; ctx.fillStyle = '#fff';
    ctx.textBaseline = 'middle';
    ctx.fillText(btnText, cx, btnY + btnH/2);
    ctx.textBaseline = 'alphabetic';
    buttons.push({ x:btnX, y:btnY, w:btnW, h:btnH, fn:btnFn });
  }

  // Stats - game-end overlays keep the original fixed-offset lines (they sit
  // above the revive button / leaderboard, already tuned). The MENU uses its
  // own height-aware stack below.
  if (gs !== 'MENU') {
    ctx.font = clamp(13*S,10,17)+'px sans-serif';
    ctx.fillStyle = '#557'; ctx.textAlign = 'center';
    ctx.fillText(t('best')+': '+todayBest+'   '+t('alltime')+': '+allTimeBest, cx, btnY+btnH+30*S);
    ctx.fillText(t('daySeed')+' '+seed, cx, btnY+btnH+50*S);
  }

  // ── MENU compact stack - overlap/deform fix (Yandex п.1.10.3 / п.1.6.2.3) ──
  // The old layout pinned each row at a fixed S-scaled offset from the button.
  // Fonts are min-clamped, so on small-S viewports (mobile portrait, wide
  // landscape) the rows collided, and the 9 per-disc skin labels were far wider
  // than the disc spacing and smeared together. Now a running Y cursor steps by
  // each row's REAL pixel height, strips are width-clamped to the canvas, skins
  // show ONE focused-name line, and any row that would cross the bottom edge is
  // skipped - nothing overlaps or runs off-screen at any aspect ratio.
  if (gs === 'MENU') {
    var marginX = clamp(16*S, 10, 30);
    var maxRowW = W - marginX * 2;
    var bottomLimit = H - platformSafeInsets().bottom - clamp(12*S, 8, 20);
    var yy = _menuBtnBottom + clamp(18*S, 12, 28);
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';

    // ── milestone - LOADOUT button (opens the meta hub). Pushed AFTER the PLAY
    // button (twin-button block above), so buttons[0] stays PLAY DAILY for the
    // yandex-testing adapter. Shows a claimable-quest badge.
    var loFs = clamp(15*S, 12, 19);
    var loH = clamp(46*S, 38, 58);
    var loW = clamp(280*S, 200, 360);
    if (yy + loH <= bottomLimit) {
      var loX = cx - loW/2, loY = yy;
      rr(ctx, loX, loY, loW, loH, loH/2);
      var gLo = ctx.createLinearGradient(loX, loY, loX, loY+loH);
      gLo.addColorStop(0, '#2a3a5e'); gLo.addColorStop(1, '#16203a');
      ctx.fillStyle = gLo; ctx.fill();
      ctx.lineWidth = 1.4*S; ctx.strokeStyle = 'rgba(120,200,255,0.55)'; ctx.stroke();
      var loIcR = clamp(11*S, 9, 15);
      var loTxt = (lang==='ru'?'СНАРЯЖЕНИЕ':'LOADOUT');
      ctx.font = 'bold ' + loFs + 'px sans-serif';
      var loTxtW = ctx.measureText(loTxt).width;
      var loTot = loIcR*2 + 10*S + loTxtW;
      var loCx0 = cx - loTot/2;
      drawGearIcon(meta.equipped[0] || 'shield', loCx0 + loIcR, loY + loH/2, loIcR, '#9ee6f0');
      ctx.fillStyle = '#dff1ff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(loTxt, loCx0 + loIcR*2 + 10*S, loY + loH/2 + 1);
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      // claimable-quest badge
      var loQc = questsClaimable();
      if (loQc > 0) {
        var lqR = clamp(10*S,8,13);
        var lqx = loX + loW - lqR*1.4, lqy = loY + lqR*1.0;
        ctx.beginPath(); ctx.arc(lqx, lqy, lqR, 0, Math.PI*2); ctx.fillStyle = '#ff5a8c'; ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = 'bold ' + clamp(12*S,9,15) + 'px sans-serif';
        ctx.textBaseline = 'middle'; ctx.fillText(String(loQc), lqx, lqy+0.5); ctx.textBaseline = 'alphabetic';
      }
      buttons.push({ x: loX, y: loY, w: loW, h: loH, fn: function(){ toggleLoadout(); } });
      yy += loH + clamp(16*S, 10, 22);
    }

    // today best / all-time
    var statFs = clamp(13*S, 11, 17);
    if (yy + statFs <= bottomLimit) {
      ctx.font = statFs + 'px sans-serif'; ctx.fillStyle = '#7081a0';
      ctx.fillText(t('best')+': '+todayBest+'   '+t('alltime')+': '+allTimeBest, cx, yy + statFs);
      yy += statFs + clamp(6*S, 4, 9);
    }
    // day seed
    if (yy + statFs <= bottomLimit) {
      ctx.font = statFs + 'px sans-serif'; ctx.fillStyle = '#557';
      ctx.fillText(t('daySeed') + ' ' + seed, cx, yy + statFs);
      yy += statFs + clamp(12*S, 8, 16);
    }
    // streak - VECTOR flame + centered text (no emoji, Build Hygiene #1)
    var stFs = clamp(14*S, 11, 18);
    if (yy + stFs <= bottomLimit) {
      ctx.font = 'bold ' + stFs + 'px sans-serif';
      ctx.fillStyle = streak.current >= 3 ? '#ff8a3d' : '#9ab';
      var streakTxt = streak.current + ' ' + t('daysStreak');
      if (streak.best > streak.current) streakTxt += '   ·   ' + t('bestStreak') + ': ' + streak.best;
      var stFlR = clamp(8*S, 6, 11);
      var stTxtW = ctx.measureText(streakTxt).width;
      var stTotalW = stFlR*2 + 6*S + stTxtW;
      var stCx = cx - stTotalW/2;
      drawIconFlame(stCx + stFlR, yy + stFs - stFs*0.36, stFlR, streak.current >= 3 ? '#ff8a3d' : '#8896ad');
      ctx.textAlign = 'left';
      ctx.fillText(streakTxt, stCx + stFlR*2 + 6*S, yy + stFs);
      ctx.textAlign = 'center';
      yy += stFs + clamp(18*S, 12, 24);
    }

    // ── Skins strip - one width-clamped disc row + a single focused-name line ─
    var skN = SKINS.length;
    var skLabelFs = clamp(12*S, 10, 14);
    var skNameFs  = clamp(12*S, 10, 15);
    var skGap = clamp(9*S, 5, 13);
    var skR   = clamp(14*S, 9, 19);
    var skNeed = skN * (skR*2) + (skN - 1) * skGap;
    if (skNeed > maxRowW) { var skf = maxRowW / skNeed; skR *= skf; skGap *= skf; }
    var skBlockH = skLabelFs + 8*S + skR*2 + 5*S + skNameFs;
    if (skR >= 5 && yy + skBlockH <= bottomLimit) {
      ctx.font = 'bold ' + skLabelFs + 'px sans-serif'; ctx.fillStyle = '#9ab';
      ctx.fillText(t('skins'), cx, yy + skLabelFs);
      var skCenterY = yy + skLabelFs + 8*S + skR;
      var skTotalW = skN * (skR*2) + (skN - 1) * skGap;
      var skX0 = cx - skTotalW/2 + skR;
      for (var si = 0; si < skN; si++) {
        var sk = SKINS[si];
        var sxC = skX0 + si * (skR*2 + skGap);
        var unlocked = isSkinUnlocked(si);
        var active = (si === skinIdx);
        if (unlocked) {
          var sg = ctx.createRadialGradient(sxC - skR*0.3, skCenterY - skR*0.3, 0, sxC, skCenterY, skR);
          sg.addColorStop(0, sk.inner); sg.addColorStop(1, sk.outer);
          ctx.fillStyle = sg;
        } else { ctx.fillStyle = '#1a1a26'; }
        ctx.beginPath(); ctx.arc(sxC, skCenterY, skR, 0, Math.PI*2); ctx.fill();
        ctx.lineWidth = active ? 2.4*S : 1.2*S;
        ctx.strokeStyle = active ? '#FFD700' : (unlocked ? 'rgba(255,255,255,0.4)' : 'rgba(120,120,160,0.4)');
        ctx.beginPath(); ctx.arc(sxC, skCenterY, skR, 0, Math.PI*2); ctx.stroke();
        if (!unlocked && skR >= 7) {
          drawIconLock(sxC, skCenterY, skR * 0.5, '#7a82a0');   // VECTOR lock (Build Hygiene #1)
        }
        // tap target - focus any disc for its name/req; unlocked ones also equip
        var hitR = skR + 6*S;
        (function(idx, unl){
          buttons.push({ x: sxC - hitR, y: skCenterY - hitR, w: hitR*2, h: hitR*2, fn: function() {
            skinFocusIdx = idx;
            if (unl) { skinIdx = idx; saveActiveSkin(); }
          } });
        })(si, unlocked);
      }
      // single focused-name line: equipped skin by default, or last-tapped disc
      var fIdx = (skinFocusIdx >= 0 && skinFocusIdx < skN) ? skinFocusIdx : skinIdx;
      var fSk = SKINS[fIdx];
      ctx.font = skNameFs + 'px sans-serif';
      if (isSkinUnlocked(fIdx)) {
        ctx.fillStyle = '#FFD700';
        ctx.fillText(skinDisplayName(fSk), cx, skCenterY + skR + 5*S + skNameFs);
      } else {
        ctx.fillStyle = '#779';
        var lk = fSk.kind === 'streak'
          ? (t('streakReq') + ' ' + fSk.threshold + ' ' + t('days'))
          : (t('unlockAt') + ' ' + fSk.threshold + 's');
        ctx.fillText(skinDisplayName(fSk) + ' - ' + lk, cx, skCenterY + skR + 5*S + skNameFs);
      }
      yy += skBlockH + clamp(16*S, 10, 22);
    }

    // ── Achievements strip - width-clamped badge row + tap tooltip ───────────
    var aN = ACHIEVEMENTS.length;
    var aLabelFs = clamp(12*S, 10, 15);
    var aGap = clamp(8*S, 5, 13);
    var aR   = clamp(13*S, 9, 18);
    var aNeed = aN * (aR*2) + (aN - 1) * aGap;
    if (aNeed > maxRowW) { var af = maxRowW / aNeed; aR *= af; aGap *= af; }
    var aBlockH = aLabelFs + 8*S + aR*2;
    if (aR >= 5 && yy + aBlockH <= bottomLimit) {
      ctx.font = 'bold ' + aLabelFs + 'px sans-serif'; ctx.fillStyle = '#9ab';
      ctx.fillText(t('achievements') + ' ' + countEarnedAch() + '/' + aN, cx, yy + aLabelFs);
      var aCenterY = yy + aLabelFs + 8*S + aR;
      var aTotalW = aN * (aR*2) + (aN - 1) * aGap;
      var aX0 = cx - aTotalW/2 + aR;
      for (var ax = 0; ax < aN; ax++) {
        var aEnt2 = ACHIEVEMENTS[ax];
        var axC = aX0 + ax * (aR*2 + aGap);
        var aOK = isAchEarned(aEnt2.id);
        var sq = aR * 1.55;
        rr(ctx, axC - sq/2, aCenterY - sq/2, sq, sq, aR * 0.45);
        if (aOK) {
          var ag = ctx.createLinearGradient(axC, aCenterY - sq/2, axC, aCenterY + sq/2);
          ag.addColorStop(0, aEnt2.color); ag.addColorStop(1, '#1a1a2e');
          ctx.fillStyle = ag; ctx.fill();
          ctx.strokeStyle = aEnt2.color; ctx.lineWidth = 1.2*S; ctx.stroke();
        } else {
          ctx.fillStyle = '#11111e'; ctx.fill();
          ctx.strokeStyle = 'rgba(120,120,160,0.35)'; ctx.lineWidth = 1.0*S; ctx.stroke();
        }
        ctx.font = 'bold ' + clamp(aR*0.85, 7, 14) + 'px sans-serif';
        ctx.fillStyle = aOK ? '#fff' : '#445';
        ctx.textBaseline = 'middle'; ctx.fillText(aEnt2.glyph, axC, aCenterY + 1); ctx.textBaseline = 'alphabetic';
        (function(idx2){
          buttons.push({ x: axC - sq, y: aCenterY - sq, w: sq*2, h: sq*2, fn: function() {
            achHoverIdx = (achHoverIdx === idx2) ? -1 : idx2;
          } });
        })(ax);
      }
      yy += aBlockH + clamp(6*S, 3, 9);
      // tooltip below the strip - only if it still fits above the bottom edge
      if (achHoverIdx >= 0 && achHoverIdx < aN) {
        var tEnt = ACHIEVEMENTS[achHoverIdx];
        var tipFs = clamp(11*S, 9, 14);
        if (yy + tipFs * 2 + 6*S <= bottomLimit) {
          ctx.font = 'bold ' + tipFs + 'px sans-serif';
          ctx.fillStyle = isAchEarned(tEnt.id) ? tEnt.color : '#9ab';
          ctx.fillText(t(tEnt.key + '_name'), cx, yy + tipFs);
          ctx.font = tipFs + 'px sans-serif'; ctx.fillStyle = '#778';
          ctx.fillText(t(tEnt.key + '_desc'), cx, yy + tipFs + tipFs + 4*S);
        }
      }
    }
    ctx.textAlign = 'center';
  }

  // iter#9 - EXTRA LIFE button (rendered AFTER drawOverlay returns in the
  // GAMEOVER branch) lives directly below RETRY at btnY+btnH+14 with height
  // ~clamp(42*S,34,54). The achievement row + leaderboard below need to
  // skip past it on GAMEOVER, otherwise their text bleeds under the button
  // (2026-05-15 Tim screenshot caught "ПОЛУЧЕНО: ПЕРВАЯ КРОВЬ" under it).
  var _reviveBlockH = (gs === 'GAMEOVER' && !reviveUsed)
    ? (clamp(42*S, 34, 54) + 14*S + 12*S)   // height + top gap + bottom gap
    : 0;
  // milestone - reserve room for the game-over meta summary (Cores + next-gear),
  // drawn in the frame loop just below the EXTRA LIFE button, so the achievement
  // row + leaderboard below drop past it and nothing overlaps.
  var _metaBlockH = (gs === 'GAMEOVER' || gs === 'CLEARED') ? clamp(96*S, 78, 120) : 0;
  _reviveBlockH += _metaBlockH;

  // ── Earned-this-run achievement row (iter#10) - GAMEOVER/CLEARED only ────
  if ((gs === 'GAMEOVER' || gs === 'CLEARED') && newlyEarnedAch && newlyEarnedAch.length > 0) {
    var ePadY = btnY + btnH + 56*S + _reviveBlockH;
    var eFs = clamp(11*S, 9, 14);
    ctx.font = 'bold ' + eFs + 'px sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    var names = [];
    for (var ei = 0; ei < newlyEarnedAch.length; ei++) {
      for (var ej = 0; ej < ACHIEVEMENTS.length; ej++) {
        if (ACHIEVEMENTS[ej].id === newlyEarnedAch[ei]) {
          names.push(t(ACHIEVEMENTS[ej].key + '_name'));
          break;
        }
      }
    }
    ctx.fillText(t('earned') + ': ' + names.join(' · '), cx, ePadY);
  }

  // ── Leaderboard (only on game-end overlays, not the menu) ────────────────
  if ((gs === 'GAMEOVER' || gs === 'CLEARED') && leaderboard.length > 0) {
    var lbX = cx, lbY = btnY + btnH + 90*S + _reviveBlockH;
    var lbFs = clamp(14*S, 11, 18);
    var rowFs = clamp(13*S, 10, 16);
    var rowH  = clamp(20*S, 16, 24);

    ctx.font = 'bold ' + lbFs + 'px sans-serif';
    ctx.fillStyle = '#48c9b0';
    ctx.textAlign = 'center';
    ctx.fillText(t('leaderboard') + (myRank ? ' - ' + t('rank') + ': ' + myRank : ''), lbX, lbY);

    ctx.font = rowFs + 'px sans-serif';
    for (var i = 0; i < leaderboard.length; i++) {
      var entry = leaderboard[i];
      var rowY = lbY + (i + 1) * rowH + 6*S;
      var isMe = entry.name === playerName;
      ctx.fillStyle = isMe ? '#FFD700' : '#aab';
      ctx.textAlign = 'right';
      ctx.fillText((i + 1) + '.', cx - 80*S, rowY);
      ctx.textAlign = 'left';
      var displayName = entry.name + (isMe ? ' ('+t('you')+')' : '');
      ctx.fillText(displayName, cx - 70*S, rowY);
      ctx.textAlign = 'right';
      ctx.fillStyle = isMe ? '#FFD700' : '#9bf';
      ctx.fillText(entry.score, cx + 110*S, rowY);
    }
    ctx.textAlign = 'center';

    // ── Share button (only on game-end overlays, only after a real run) ────
    if (elapsed > 1) {
      var shareW = clamp(190*S, 130, 240), shareH = clamp(40*S, 32, 50);
      var shareX = cx - shareW/2;
      var shareY = lbY + (leaderboard.length + 1) * rowH + 18*S;
      rr(ctx, shareX, shareY, shareW, shareH, shareH/2);
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.strokeStyle = 'rgba(77,208,225,0.4)';
      ctx.lineWidth = 1.5*S;
      ctx.fill(); ctx.stroke();
      // VECTOR share icon + centered label (no emoji, Build Hygiene #1)
      ctx.font = 'bold ' + clamp(14*S, 11, 18) + 'px sans-serif';
      var shTxt = (lang === 'ru' ? 'Поделиться счётом' : 'Share my score');
      var shIcR = clamp(7*S, 6, 10);
      var shTxtW = ctx.measureText(shTxt).width;
      var shTot = shIcR*2 + 8*S + shTxtW;
      var shCx = cx - shTot/2;
      drawIconShare(shCx + shIcR, shareY + shareH/2, shIcR, '#4dd0e1');
      ctx.fillStyle = '#4dd0e1';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(shTxt, shCx + shIcR*2 + 8*S, shareY + shareH/2);
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      buttons.push({ x: shareX, y: shareY, w: shareW, h: shareH, fn: shareScoreCard });
    }
  }
}

// ── MAIN LOOP ───────────────────────────────────────────────────────────────
function frame(ts) {
  var dt = Math.min((ts - lastTs) / 1000, 0.08);
  lastTs = ts;

  update(dt);

  var sx = 0, sy = 0;
  if (screenShake > 0) { sx=(Math.random()-0.5)*screenShake*14*S; sy=(Math.random()-0.5)*screenShake*14*S; }

  ctx.save();
  ctx.translate(sx, sy);
  ctx.fillStyle = '#050510';
  ctx.fillRect(-20, -20, W+40, H+40);

  if (gs === 'PLAYING' || gs === 'GAMEOVER' || gs === 'CLEARED') {
    drawArenaBg();
    for (var i = 0; i < bullets.length; i++) drawBullet(bullets[i]);

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (gs === 'PLAYING') drawPlayer();

    for (var i = 0; i < floats.length; i++) {
      var f = floats[i];
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.font = 'bold '+clamp(15*S,11,22)+'px sans-serif';
      ctx.fillStyle = f.col; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(f.txt, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    if (gs === 'PLAYING') drawHUD();
    if (gs === 'PLAYING') drawJoystick();
    if (gs === 'PLAYING') drawReviveBanner();
    if (gs === 'PLAYING') drawTutorialHud();   // milestone - hands-on demo hand + caption
  }
  ctx.restore();

  if (gs === 'MENU') {
    ctx.fillStyle = '#050510'; ctx.fillRect(0,0,W,H);
    drawOverlay(t('title'), t('sub'), t('play'), function() { startRun(); }, t('sub2'));
    // (The legacy 3-page text-tutorial overlay was removed - it is superseded by
    // the hands-on demo-HAND tutorial drawn in-run by drawTutorialHud(). The old
    // `if (tutorialActive) drawTutorial();` was already dead: tutorialActive is
    // never set true. tutorialActive/tutorialPage are retained only as state
    // fields read by the __gfState test hook.)
  }
  if (gs === 'GAMEOVER') {
    var comboLine = (maxComboThisRun >= 2)
      ? ('   ·   '+t('combo')+' ×'+maxComboThisRun+(bestComboEver>0?(' ('+t('bestShort')+' ×'+bestComboEver+')'):''))
      : '';
    var bombLine = (bombsUsed > 0)
      ? ('   ·   '+t('bombsUsed')+': '+bombsUsed+(bestBombs>bombsUsed?(' ('+t('bestShort')+' '+bestBombs+')'):''))
      : '';
    var modeTag = runMode === 'ENDLESS' ? ('['+t('endless')+'] ') : '';
    // iter#9 - RETRY click also shows a throttled interstitial (Yandex 4.1).
    drawOverlay(modeTag + t('youDied'), t('survived')+' '+elapsed.toFixed(1)+t('sec'), t('retry'),
      function() { showInterstitial(function() { startRun(runMode); }); }, t('score')+': '+score+'   ·   '+t('closeCalls')+': '+closeCallCount+(bestCloseCalls>0?(' ('+t('bestShort')+' '+bestCloseCalls+')'):'')+comboLine+bombLine);

    // iter#9 - EXTRA LIFE (rewarded ad). One revive per run; user-click only.
    // 2026-05-15: anchor to RETRY button so it's always visible on short
    // viewports (Yandex iframe / mobile portrait could push y=H-... off-screen).
    if (!reviveUsed) {
      // Position uses the RETRY button geometry drawn by drawOverlay above:
      //   btnW = clamp(240*S, 160, 320), btnH = clamp(52*S, 40, 66)
      //   btnX = cx - btnW/2, btnY = cy + 26*S
      var _btnW = clamp(240*S, 160, 320), _btnH = clamp(52*S, 40, 66);
      var _btnY = cy + 26*S;
      var rW = _btnW, rH = clamp(42*S, 34, 54);
      var rX = cx - rW/2;
      var rY = _btnY + _btnH + 14*S;
      reviveBtnRect = { x: rX, y: rY, w: rW, h: rH };
      rr(ctx, rX, rY, rW, rH, rH/2);
      var gradR = ctx.createLinearGradient(rX, rY, rX, rY+rH);
      gradR.addColorStop(0, '#FFD700'); gradR.addColorStop(1, '#8a6a00');
      ctx.fillStyle = gradR; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1.4 * S;
      ctx.stroke();
      ctx.fillStyle = '#1a1a2e';
      ctx.textBaseline = 'middle';
      // VECTOR play/TV icon + centered label (no emoji, Build Hygiene #1)
      ctx.font = 'bold ' + clamp(14*S, 11, 18) + 'px sans-serif';
      var rvTxt = t('revive');
      var rvIcR = clamp(8*S, 7, 11);
      var rvTxtW = ctx.measureText(rvTxt).width;
      var rvTot = rvIcR*2 + 8*S + rvTxtW;
      var rvCx = cx - rvTot/2;
      drawIconPlayTv(rvCx + rvIcR, rY + rH*0.34, rvIcR, '#1a1a2e');
      ctx.textAlign = 'left';
      ctx.fillText(rvTxt, rvCx + rvIcR*2 + 8*S, rY + rH*0.34);
      ctx.textAlign = 'center';
      ctx.font = clamp(10*S, 9, 12) + 'px sans-serif';
      ctx.fillText(t('reviveBtnSub'), cx, rY + rH*0.72);
      ctx.textBaseline = 'alphabetic';
      buttons.push({ x: rX, y: rY, w: rW, h: rH, fn: showRewardedRevive });
    }
    // milestone - game-over meta summary (Cores earned + next-gear progress),
    // just below RETRY (or the EXTRA LIFE button when shown).
    var _goBtnY = cy + 26*S, _goBtnH = clamp(52*S, 40, 66);
    var _goMetaY = reviveUsed
      ? (_goBtnY + _goBtnH + clamp(20*S, 14, 28))
      : (_goBtnY + _goBtnH + 14*S + clamp(42*S, 34, 54) + clamp(16*S, 12, 22));
    drawGameOverMeta(_goMetaY);
  }
  if (gs === 'CLEARED') {
    var comboLineC = (maxComboThisRun >= 2)
      ? ('   ·   '+t('combo')+' ×'+maxComboThisRun+(bestComboEver>0?(' ('+t('bestShort')+' ×'+bestComboEver+')'):''))
      : '';
    var bombLineC = (bombsUsed > 0)
      ? ('   ·   '+t('bombsUsed')+': '+bombsUsed+(bestBombs>bombsUsed?(' ('+t('bestShort')+' '+bestBombs+')'):''))
      : '';
    drawOverlay(t('cleared'), t('score')+': '+score, t('retry'),
      function() { startRun('DAILY'); }, t('closeCalls')+': '+closeCallCount+(bestCloseCalls>0?(' ('+t('bestShort')+' '+bestCloseCalls+')'):'')+comboLineC+bombLineC);
    // iter#6 - "Continue → Endless" CTA: after surviving 60s, let the player
    // keep going into Endless mode without bouncing back to the menu. The
    // daily score is already submitted; the endless run posts to its own slug.
    if (runMode === 'DAILY') {
      var ceW = clamp(280*S, 200, 360), ceH = clamp(46*S, 36, 56);
      var ceX = cx - ceW/2;
      // Place below the share button area; use a y based on screen height fallback
      var ceY = H - ceH - 18*S;
      rr(ctx, ceX, ceY, ceW, ceH, ceH/2);
      var gradCE = ctx.createLinearGradient(ceX, ceY, ceX, ceY+ceH);
      gradCE.addColorStop(0, '#ff5a8c'); gradCE.addColorStop(1, '#7a1241');
      ctx.fillStyle = gradCE; ctx.fill();
      ctx.font = 'bold ' + clamp(15*S, 12, 19) + 'px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(t('continueEndless'), cx, ceY + ceH/2);
      ctx.textBaseline = 'alphabetic';
      buttons.push({ x: ceX, y: ceY, w: ceW, h: ceH, fn: continueIntoEndless });
    }
    // milestone - game-over meta summary, below RETRY (CLEARED has no EXTRA LIFE).
    var _clBtnY = cy + 26*S, _clBtnH = clamp(52*S, 40, 66);
    drawGameOverMeta(_clBtnY + _clBtnH + clamp(20*S, 14, 28));
  }

  // milestone - Loadout overlay (meta hub). Drawn over the menu/paused-run; it
  // takes over buttons[] so the layer beneath can't fire. Opaque (Hygiene #12).
  if (loadoutOpen) drawLoadout();

  // iter#11 - mute pill (top-right, all states). Drawn last so it sits above
  // every overlay/HUD. Hit-tested via muteBtnRect by the input handlers.
  drawMuteButton();

  // milestone - drive the procedural music scheduler each frame (no-op until
  // the AudioContext exists, i.e. after the first user gesture).
  musTick();

  requestAnimationFrame(frame);
}

// ── iter#12 - Tutorial overlay renderer ─────────────────────────────────────
// Three-page modal: GOAL → COMBO → BOMB. Reuses the menu's button hit-test
// path: clears the buttons[] populated by drawOverlay/skins/achievements and
// pushes NEXT (or GOT IT on the last page) + SKIP, so the menu's PLAY DAILY
// and skin-tap targets can't fire while the tutorial is up. Word-wraps the
// body line so RU strings fit the panel.
function _wrapTextLines(text, maxW, fontPx) {
  ctx.font = fontPx + 'px sans-serif';
  var words = (text || '').split(' ');
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var test = cur ? (cur + ' ' + words[i]) : words[i];
    if (ctx.measureText(test).width <= maxW || !cur) { cur = test; }
    else { lines.push(cur); cur = words[i]; }
  }
  if (cur) lines.push(cur);
  return lines;
}
// (Removed: drawTutorial() - the legacy 3-page text-tutorial overlay renderer.
// Dead code since the hands-on demo-HAND tutorial took over (Build Hygiene #10:
// teach by DOING). Its only caller, `if (tutorialActive) drawTutorial();`, was
// unreachable - tutorialActive is never set true. The live first-run lesson is
// drawTutorialHud() / the TUT state machine, drawn in-run while gs==='PLAYING'.)

// iter#11 - top-right mute pill. Compact icon-only on PLAYING to stay clear
// of the HUD; widens to icon + label on MENU/GAMEOVER/CLEARED so the player
// can find it. Hit rect is screen-space (frame ctx.restore() has already
// run before this is called).
function drawMuteButton() {
  var inset = platformSafeInsets();
  var pad = clamp(10*S, 6, 16);
  var compact = (gs === 'PLAYING');
  var bH = clamp(compact ? 28*S : 30*S, compact ? 22 : 24, compact ? 36 : 40);
  var label = audioMuted ? t('soundOff') : t('soundOn');
  ctx.font = 'bold ' + clamp(12*S, 10, 15) + 'px sans-serif';
  var labelW = compact ? 0 : ctx.measureText(label).width + 8*S;
  var bW = clamp((compact ? 38 : 44 + labelW/S) * S, compact ? 30 : 76, compact ? 46 : 140);
  var bX = W - inset.right - pad - bW;
  var bY = pad;
  muteBtnRect = { x: bX, y: bY, w: bW, h: bH };
  // pill bg
  rr(ctx, bX, bY, bW, bH, bH/2);
  ctx.fillStyle = audioMuted ? 'rgba(40,18,30,0.78)' : 'rgba(12,28,40,0.78)';
  ctx.fill();
  ctx.lineWidth = 1.2 * S;
  ctx.strokeStyle = audioMuted ? 'rgba(255,90,140,0.55)' : 'rgba(77,208,225,0.55)';
  ctx.stroke();
  // VECTOR speaker icon + (label, non-compact) - no emoji (Build Hygiene #1)
  var icCol = audioMuted ? '#ff8aa8' : '#9ee6f0';
  var icR = clamp(8*S, 7, 11);
  if (compact) {
    drawIconSound(bX + bW/2, bY + bH/2, icR, icCol, audioMuted);
  } else {
    drawIconSound(bX + 16*S, bY + bH/2, icR, icCol, audioMuted);
    ctx.fillStyle = icCol;
    ctx.font = 'bold ' + clamp(12*S, 10, 15) + 'px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(label, bX + 30*S, bY + bH/2 + 1);
  }
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
}

// ── BOOT ────────────────────────────────────────────────────────────────────
var booted = false;
function boot() {
  if (booted) return;
  booted = true;
  seed = getDaySeed();
  try {
    // refresh today best per-day
    var dayKey = getDayKey();
    var savedDay = localStorage.getItem('dodge_day_key');
    if (savedDay !== dayKey) {
      localStorage.setItem('dodge_day_key', dayKey);
      localStorage.setItem('dodge_day_best', '0');
    }
    todayBest = parseInt(localStorage.getItem('dodge_day_best')||'0')||0;
    allTimeBest = parseInt(localStorage.getItem('dodge_alltime_best')||'0')||0;
    bestCloseCalls = parseInt(localStorage.getItem('dodge_best_closecalls')||'0')||0;
    bestComboEver = parseInt(localStorage.getItem('dodge_best_combo')||'0')||0;
    bestBombs = parseInt(localStorage.getItem('dodge_best_bombs')||'0')||0;
    endlessBest = parseInt(localStorage.getItem('dodge_endless_best')||'0')||0;
    endlessUnlocked = localStorage.getItem('dodge_endless_unlocked') === '1';
  } catch(e) {}
  loadStreak();
  loadSkinState();
  loadAchievements();
  loadMutePref();
  // ── milestone - load the retention meta + run the daily/idle hooks ──
  loadMeta();
  _bootBackfill = true; checkGearUnlocks(); _bootBackfill = false;  // backfill any owed gear silently
  ensureQuests();                       // roll today's quests if stale
  claimDailyLogin();                    // grant the daily-login reward (escalates with streak)
  // (idle Cores are collected when the player opens the Loadout - see toggleLoadout)
  // iter#12 / milestone - first-run tutorial: the new hands-on tutorial runs IN
  // the first DAILY run (see startTutorial), not as a menu modal. Keep the legacy
  // flag only for the webdriver/silent bypass.
  tutorialActive = false;
  tutorialPage = 0;
  if (window.ysdk && window.ysdk.features && window.ysdk.features.LoadingAPI) {
    window.ysdk.features.LoadingAPI.ready();
  }
  PLAT.loadingStop();                   // CrazyGames: signal the SDK the game is ready
  gs = 'MENU';
  // ▶ PLATFORM AUTOSTART (CLAUDE.md #9): Yandex/CrazyGames builds inject
  // window.__GF_AUTOSTART=1 next to the SDK tag - drop STRAIGHT into a run (no
  // menu landing). The gallery never gets the flag, so it keeps its menu. The
  // menu stays reachable in-run via the HOME button + on game-over.
  if (window.__GF_AUTOSTART && !window._silent) {
    startRun('DAILY');
  }
  lastTs = performance.now();
  requestAnimationFrame(frame);
}

(function() {
  // ── CrazyGames SDK init (milestone) - when the CG SDK tag is present (CG
  // build), initialise it + signal loading start, set the player's language,
  // then boot. Falls through to Yandex / plain boot otherwise. ──
  function initCrazyGames(next) {
    if (!(window.CrazyGames && window.CrazyGames.SDK)) return false;
    try {
      window.CrazyGames.SDK.init().then(function() {
        PLAT.cgReady = true;                         // SDK live - lifecycle/ad calls allowed now
        try {
          var cl = window.CrazyGames.SDK.environment && window.CrazyGames.SDK.environment.languageCode;
          if (cl) lang = (cl.indexOf('ru') === 0) ? 'ru' : 'en';
        } catch(e) {}
        PLAT.loadingStart();                          // signal SDK loading start (gated on cgReady)
        next();
      }).catch(function() { next(); });
    } catch(e) { next(); }
    return true;
  }
  // CrazyGames build path
  if (window.CrazyGames && window.CrazyGames.SDK) {
    if (initCrazyGames(boot)) { setTimeout(boot, 3000); return; }
  }
  // Yandex build path
  if (typeof YaGames === 'undefined') { boot(); return; }
  YaGames.init().then(function(ysdk) {
    window.ysdk = ysdk;
    try {
      var l = ysdk.environment && ysdk.environment.i18n && ysdk.environment.i18n.lang;
      if (l) lang = l.startsWith('ru') ? 'ru' : 'en';
    } catch(e) {}
    resolveYandexName();
    // Yandex 1.3 - pause/resume audio on the SDK's own pause/resume events
    try {
      ysdk.on && ysdk.on('game_api_pause', function(){ pauseGameAudio(); });
      ysdk.on && ysdk.on('game_api_resume', function(){ resumeGameAudio(); });
    } catch(e) {}
    boot();
  }).catch(function() { boot(); });
  setTimeout(boot, 3000);
})();

})();
</script>
