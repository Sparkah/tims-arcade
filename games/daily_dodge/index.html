<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daily Dodge</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050510; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function() {
'use strict';

// ── CANVAS / RESIZE ─────────────────────────────────────────────────────────
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H, cx, cy, S;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  S = Math.min(W / 800, H / 600);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);
resize();

// ── LOCALISATION ────────────────────────────────────────────────────────────
var lang = 'en';
var STRINGS = {
  en: {
    title: 'DAILY DODGE',
    sub:   'Same daily seed. Survive 60 seconds. Beat your time.',
    sub2:  'Today everyone races the same projectile pattern',
    play: 'PLAY', retry: 'RETRY',
    score: 'SCORE', best: 'TODAY BEST', alltime: 'ALL-TIME',
    time: 'TIME', survived: 'SURVIVED',
    youDied: 'YOU DIED',
    cleared: 'YOU SURVIVED 60 SECONDS!',
    daySeed: 'Day seed',
    leaderboard: 'TODAY’S TOP',
    rank: 'Your rank',
    namePrompt: 'Name for the global leaderboard:',
    you: 'YOU',
  },
  ru: {
    title: 'УВОРОТЫ ДНЯ',
    sub:   'Один сид на день. Выживи 60 секунд. Побей свой рекорд.',
    sub2:  'Сегодня у всех одинаковая комбинация снарядов',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ',
    score: 'ОЧКИ', best: 'РЕКОРД ДНЯ', alltime: 'ВСЕГО',
    time: 'ВРЕМЯ', survived: 'ВЫЖИЛ',
    youDied: 'ТЫ ПОГИБ',
    cleared: 'ВЫЖИЛ 60 СЕКУНД!',
    daySeed: 'Сид дня',
    leaderboard: 'ТОП ДНЯ',
    rank: 'Твоё место',
    namePrompt: 'Имя для общей таблицы лидеров:',
    you: 'ТЫ',
  },
};
function t(k) { return (STRINGS[lang] || STRINGS.en)[k] || k; }
window._setLang = function(l) { lang = (l === 'ru' ? 'ru' : 'en'); };

// ── UTILS ───────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
// Mulberry32 — deterministic seeded PRNG
function makeRng(seed) {
  var s = seed | 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    var t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function getDaySeed() {
  var d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}
function getDayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ── CONSTANTS ───────────────────────────────────────────────────────────────
var HUD_H = 56;
var PLAYER_R = 14;
var PLAYER_SPEED = 4.6;
var GAME_DURATION = 60;

// ── STATE ───────────────────────────────────────────────────────────────────
var gs = 'MENU';
var seed = 0;
var rng = makeRng(0);
var startTime = 0, elapsed = 0, score = 0;
var todayBest = 0, allTimeBest = 0;
var player = { x:0, y:0, vx:0, vy:0 };
var bullets = [];        // active projectiles { x,y,vx,vy,r,life,kind,spinPhase }
var spawners = [];       // pre-rolled spawn schedule for the day
var nextSpawnIdx = 0;
var particles = [];
var floats = [];
var buttons = [];
var screenShake = 0;

// ── INPUT ───────────────────────────────────────────────────────────────────
var keys = {};
document.addEventListener('keydown', function(e) { keys[e.code] = true; });
document.addEventListener('keyup',   function(e) { keys[e.code] = false; });
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('wheel',     function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

var touch = { active: false, x: 0, y: 0, id: null };
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t0 = e.changedTouches[0];
  touch.active = true; touch.id = t0.identifier;
  touch.x = t0.clientX; touch.y = t0.clientY;
  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    if (t0.clientX >= b.x && t0.clientX <= b.x+b.w && t0.clientY >= b.y && t0.clientY <= b.y+b.h) b.fn();
  }
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t0 = e.changedTouches[i];
    if (t0.identifier !== touch.id) continue;
    touch.x = t0.clientX; touch.y = t0.clientY;
  }
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === touch.id) touch.active = false;
  }
}, { passive: false });
canvas.addEventListener('click', function(e) {
  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    if (e.clientX >= b.x && e.clientX <= b.x+b.w && e.clientY >= b.y && e.clientY <= b.y+b.h) b.fn();
  }
});

// ── ARENA ───────────────────────────────────────────────────────────────────
function arena() {
  var pad = 20 * S;
  var top = (HUD_H + 6) * S;
  return { x: pad, y: top, w: W - pad*2, h: H - top - pad };
}

// ── PRE-ROLL DAILY SPAWNS ───────────────────────────────────────────────────
// We pre-roll every spawn for the 60-second run from the daily seed, so
// every player on the same day faces the EXACT same pattern.
function buildDailySpawns() {
  spawners = [];
  rng = makeRng(seed);
  var t = 0.5;
  while (t < GAME_DURATION) {
    // Difficulty ramps over time
    var difficulty = clamp(t / 30, 0.4, 1.6);
    var kind = Math.floor(rng() * 4); // 0=normal, 1=fast small, 2=heavy slow, 3=spinner
    var burst = rng() < 0.18 + difficulty * 0.1;

    // Edge to spawn from: 0=top, 1=right, 2=bottom, 3=left
    var edge = Math.floor(rng() * 4);

    // Targeting offset along the edge (normalized 0..1)
    var u = rng();

    spawners.push({ t:t, kind:kind, edge:edge, u:u, difficulty: difficulty, burst:burst });

    var gap = clamp(0.55 - difficulty * 0.15, 0.18, 0.55) + rng() * 0.25;
    if (kind === 3) gap += 0.2;
    t += gap;
  }
  nextSpawnIdx = 0;
}

function spawnFromSpawner(sp) {
  var ar = arena();
  var ex, ey, vx, vy;
  if (sp.edge === 0)      { ex = ar.x + sp.u * ar.w; ey = ar.y - 16*S; vx = 0; vy = 1; }
  else if (sp.edge === 1) { ex = ar.x + ar.w + 16*S; ey = ar.y + sp.u * ar.h; vx = -1; vy = 0; }
  else if (sp.edge === 2) { ex = ar.x + sp.u * ar.w; ey = ar.y + ar.h + 16*S; vx = 0; vy = -1; }
  else                    { ex = ar.x - 16*S; ey = ar.y + sp.u * ar.h; vx = 1; vy = 0; }

  var speedBase = 110, r = 11;
  var color = '#e74c3c';
  if (sp.kind === 1) { speedBase = 200; r = 8;  color = '#f39c12'; }
  if (sp.kind === 2) { speedBase = 70;  r = 18; color = '#9b59b6'; }
  if (sp.kind === 3) { speedBase = 95;  r = 12; color = '#48c9b0'; }

  var sp2 = (speedBase + sp.difficulty * 30) * S;

  // For "spinner" kind, the projectile rotates its velocity over time
  var spinPhase = sp.kind === 3 ? rng() * Math.PI * 2 : 0;
  var aimWobble = (rng() - 0.5) * 0.6;

  // Compute base velocity with slight aim toward player area (use arena center as target)
  var tx = ar.x + ar.w/2, ty = ar.y + ar.h/2;
  var dx = tx - ex, dy = ty - ey;
  var L = Math.sqrt(dx*dx + dy*dy);
  if (L < 1) L = 1;
  var nx = dx / L, ny = dy / L;
  // mix straight-edge-perpendicular with toward-center
  vx = vx * 0.4 + nx * 0.6;
  vy = vy * 0.4 + ny * 0.6;
  // wobble
  var ca = Math.cos(aimWobble), sa = Math.sin(aimWobble);
  var rvx = vx * ca - vy * sa, rvy = vx * sa + vy * ca;
  vx = rvx * sp2; vy = rvy * sp2;

  bullets.push({ x:ex, y:ey, vx:vx, vy:vy, r:r*S, life: 12, kind:sp.kind, spinPhase:spinPhase, color:color });

  if (sp.burst) {
    // 3 extra bullets in a cone
    for (var i = -1; i <= 1; i += 2) {
      var ba = i * 0.35;
      var bca = Math.cos(ba), bsa = Math.sin(ba);
      var bvx = vx * bca - vy * bsa, bvy = vx * bsa + vy * bca;
      bullets.push({ x:ex, y:ey, vx:bvx, vy:bvy, r:r*S*0.85, life: 12, kind:sp.kind, spinPhase:spinPhase, color:color });
    }
  }
}

function startRun() {
  seed = getDaySeed();
  buildDailySpawns();
  var ar = arena();
  player.x = ar.x + ar.w/2; player.y = ar.y + ar.h/2;
  player.vx = 0; player.vy = 0;
  bullets = []; particles = []; floats = []; buttons = [];
  startTime = performance.now() / 1000;
  elapsed = 0; score = 0; screenShake = 0;
  gs = 'PLAYING';
}
window._jumpLevel = function(/*n*/) { startRun(); };
window._invincible = false;  // screenshot tool toggles this on

function spawnParticles(x, y, color, n) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = (1.5 + Math.random() * 4) * S;
    particles.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      r:(2 + Math.random()*4)*S, color:color, life:1 });
  }
}
function spawnFloat(x, y, txt, col) {
  floats.push({ x:x, y:y, txt:txt, col:col||'#fff', life:1.4, vy:-2*S });
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
var lastTs = 0;
function update(dt) {
  if (gs !== 'PLAYING') return;

  var now = performance.now() / 1000;
  elapsed = now - startTime;
  if (elapsed >= GAME_DURATION) {
    score = Math.floor(elapsed * 10);
    onRunEnded(true);
    return;
  }
  if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 6);

  // movement
  var ax = 0, ay = 0;
  if (keys['ArrowLeft']  || keys['KeyA']) ax -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) ax += 1;
  if (keys['ArrowUp']    || keys['KeyW']) ay -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) ay += 1;

  if (touch.active) {
    var dx = touch.x - player.x, dy = touch.y - player.y;
    var L = Math.sqrt(dx*dx + dy*dy);
    if (L > 5*S) { ax += dx / L; ay += dy / L; }
  }
  var alen = Math.sqrt(ax*ax + ay*ay);
  if (alen > 0) { ax /= alen; ay /= alen; }

  player.vx = (player.vx + ax * 0.9 * S) * 0.78;
  player.vy = (player.vy + ay * 0.9 * S) * 0.78;
  var spd = Math.sqrt(player.vx*player.vx + player.vy*player.vy);
  var max = PLAYER_SPEED * S;
  if (spd > max) { player.vx = player.vx/spd*max; player.vy = player.vy/spd*max; }

  player.x += player.vx; player.y += player.vy;

  var ar = arena(), pr = PLAYER_R * S;
  player.x = clamp(player.x, ar.x + pr, ar.x + ar.w - pr);
  player.y = clamp(player.y, ar.y + pr, ar.y + ar.h - pr);

  // process spawns
  while (nextSpawnIdx < spawners.length && spawners[nextSpawnIdx].t <= elapsed) {
    spawnFromSpawner(spawners[nextSpawnIdx++]);
  }

  // bullets
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    if (b.kind === 3) {
      // spinner — rotate velocity slowly
      b.spinPhase += dt * 1.6;
      var r2 = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
      var ang = Math.atan2(b.vy, b.vx) + dt * 1.0;
      b.vx = Math.cos(ang) * r2; b.vy = Math.sin(ang) * r2;
    }
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.life -= dt;

    var bar = arena();
    if (b.life <= 0 ||
        b.x < bar.x - 60*S || b.x > bar.x + bar.w + 60*S ||
        b.y < bar.y - 60*S || b.y > bar.y + bar.h + 60*S) {
      bullets.splice(i, 1); continue;
    }

    // collision
    var dx = player.x - b.x, dy = player.y - b.y;
    if (Math.sqrt(dx*dx + dy*dy) < (PLAYER_R*S + b.r) * 0.8) {
      if (window._invincible) {
        // pass through harmlessly (screenshot mode)
        bullets.splice(i, 1);
        continue;
      }
      score = Math.floor(elapsed * 10);
      spawnParticles(player.x, player.y, '#fff', 30);
      spawnParticles(player.x, player.y, '#e74c3c', 18);
      screenShake = 1.0;
      onRunEnded(false);
      return;
    }
  }

  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05*S;
    p.life -= dt * 1.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (var i = floats.length - 1; i >= 0; i--) {
    var f = floats[i];
    f.y += f.vy; f.life -= dt * 0.95;
    if (f.life <= 0) floats.splice(i, 1);
  }
}

function onRunEnded(survived) {
  // Update best for today (per-seed) and all-time
  try {
    var dayKey = getDayKey();
    var savedDay = localStorage.getItem('dodge_day_key');
    if (savedDay !== dayKey) {
      localStorage.setItem('dodge_day_key', dayKey);
      localStorage.setItem('dodge_day_best', '0');
    }
    var dayBest = parseInt(localStorage.getItem('dodge_day_best')||'0')||0;
    if (score > dayBest) localStorage.setItem('dodge_day_best', String(score));
    todayBest = Math.max(dayBest, score);

    var atime = parseInt(localStorage.getItem('dodge_alltime_best')||'0')||0;
    if (score > atime) localStorage.setItem('dodge_alltime_best', String(score));
    allTimeBest = Math.max(atime, score);
  } catch(e) {}
  gs = survived ? 'CLEARED' : 'GAMEOVER';
  submitAndFetchLeaderboard();
}

// ── LEADERBOARD ─────────────────────────────────────────────────────────────
var playerName = '';
var leaderboard = [];   // [{name, score, ts}]
var myRank = null;

function ensurePlayerName() {
  if (playerName) return playerName;
  try { playerName = localStorage.getItem('dodge_name') || ''; } catch(e) {}
  if (!playerName) {
    var entered = (window.prompt(t('namePrompt'), 'Player') || '').trim().slice(0, 16);
    if (entered) {
      playerName = entered;
      try { localStorage.setItem('dodge_name', playerName); } catch(e) {}
    }
  }
  return playerName;
}

function fetchLeaderboard() {
  var date = getDayKey();
  return fetch('/api/scores?slug=daily_dodge&date=' + date, { cache: 'no-store' })
    .then(function(r) { return r.ok ? r.json() : { entries: [] }; })
    .then(function(data) { leaderboard = (data.entries || []).slice(0, 5); })
    .catch(function() { /* offline-tolerant */ });
}

function submitAndFetchLeaderboard() {
  var name = ensurePlayerName();
  var date = getDayKey();
  if (!name) { fetchLeaderboard(); return; }
  fetch('/api/scores', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ slug: 'daily_dodge', date: date, name: name, score: score }),
    keepalive: true,
  })
  .then(function(r) { return r.ok ? r.json() : null; })
  .then(function(data) {
    if (data && data.rank) myRank = data.rank;
    return fetchLeaderboard();
  })
  .catch(function() { fetchLeaderboard(); });
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function drawArenaBg() {
  var ar = arena();
  // grid
  ctx.fillStyle = '#0c0c1c';
  ctx.fillRect(ar.x, ar.y, ar.w, ar.h);
  ctx.strokeStyle = 'rgba(72,201,176,0.10)';
  ctx.lineWidth = 1;
  var g = 50 * S;
  for (var x = ar.x; x <= ar.x + ar.w; x += g) {
    ctx.beginPath(); ctx.moveTo(x, ar.y); ctx.lineTo(x, ar.y+ar.h); ctx.stroke();
  }
  for (var y = ar.y; y <= ar.y + ar.h; y += g) {
    ctx.beginPath(); ctx.moveTo(ar.x, y); ctx.lineTo(ar.x+ar.w, y); ctx.stroke();
  }
  // border
  ctx.strokeStyle = 'rgba(120,200,255,0.18)';
  ctx.lineWidth = 2;
  ctx.strokeRect(ar.x, ar.y, ar.w, ar.h);

  // center logo (subtle day seed)
  ctx.font = clamp(11*S, 9, 14) + 'px monospace';
  ctx.fillStyle = 'rgba(120,200,255,0.18)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(t('daySeed') + ' ' + seed, ar.x + ar.w/2, ar.y + ar.h - 14*S);
}

function drawBullet(b) {
  ctx.save();
  ctx.translate(b.x, b.y);

  if (b.kind === 0) {
    // normal — red diamond
    ctx.shadowColor = b.color; ctx.shadowBlur = 8*S;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.moveTo(0, -b.r); ctx.lineTo(b.r, 0); ctx.lineTo(0, b.r); ctx.lineTo(-b.r, 0);
    ctx.closePath(); ctx.fill();
  } else if (b.kind === 1) {
    // small fast — orange dart
    ctx.shadowColor = b.color; ctx.shadowBlur = 6*S;
    ctx.fillStyle = b.color;
    var ang = Math.atan2(b.vy, b.vx);
    ctx.rotate(ang);
    ctx.beginPath();
    ctx.moveTo(b.r * 1.4, 0);
    ctx.lineTo(-b.r * 0.6, b.r * 0.8);
    ctx.lineTo(-b.r * 0.4, 0);
    ctx.lineTo(-b.r * 0.6, -b.r * 0.8);
    ctx.closePath(); ctx.fill();
  } else if (b.kind === 2) {
    // heavy slow — purple orb with halo
    ctx.fillStyle = 'rgba(155,89,182,0.25)';
    ctx.beginPath(); ctx.arc(0, 0, b.r * 1.6, 0, Math.PI*2); ctx.fill();
    ctx.shadowColor = b.color; ctx.shadowBlur = 12*S;
    var grd = ctx.createRadialGradient(-b.r*0.3, -b.r*0.3, 0, 0, 0, b.r);
    grd.addColorStop(0, '#d4a4f0'); grd.addColorStop(1, b.color);
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(0, 0, b.r, 0, Math.PI*2); ctx.fill();
  } else {
    // spinner — teal spiked star
    ctx.shadowColor = b.color; ctx.shadowBlur = 10*S;
    ctx.fillStyle = b.color;
    ctx.rotate(b.spinPhase);
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var a1 = (i/6) * Math.PI*2;
      var a2 = ((i+0.5)/6) * Math.PI*2;
      ctx.lineTo(Math.cos(a1)*b.r*1.1, Math.sin(a1)*b.r*1.1);
      ctx.lineTo(Math.cos(a2)*b.r*0.5, Math.sin(a2)*b.r*0.5);
    }
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawPlayer() {
  var r = PLAYER_R * S;
  // halo
  ctx.fillStyle = 'rgba(77,208,225,0.18)';
  ctx.beginPath(); ctx.arc(player.x, player.y, r * 2.2, 0, Math.PI*2); ctx.fill();
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(player.x, player.y + r*0.6, r*0.9, r*0.35, 0, 0, Math.PI*2); ctx.fill();
  // body
  ctx.shadowColor = '#4dd0e1'; ctx.shadowBlur = 12*S;
  var grd = ctx.createRadialGradient(player.x - r*0.3, player.y - r*0.3, 0, player.x, player.y, r);
  grd.addColorStop(0, '#a3e3ec'); grd.addColorStop(1, '#0288a8');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(player.x, player.y, r, 0, Math.PI*2); ctx.fill();
  ctx.shadowColor = 'transparent';
  // ring
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5*S;
  ctx.beginPath(); ctx.arc(player.x, player.y, r * 0.7, 0, Math.PI*2); ctx.stroke();
}

function drawHUD() {
  var bh = HUD_H * S;
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, W, bh);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, bh); ctx.lineTo(W, bh); ctx.stroke();

  var pad = 14*S, fs = clamp(13*S, 11, 17), fy = bh*0.78;
  var bigFs = clamp(18*S, 14, 24);
  ctx.textBaseline = 'alphabetic';

  // time elapsed (left)
  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(t('time'), pad, bh*0.42);
  ctx.fillStyle = '#fff'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(elapsed.toFixed(1)+'s', pad, fy);

  // today best (center)
  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(t('best'), cx, bh*0.42);
  ctx.fillStyle = '#48c9b0'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(todayBest, cx, fy);

  // current score (right)
  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(t('score'), W-pad, bh*0.42);
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(Math.floor(elapsed * 10), W-pad, fy);

  // bottom timer bar
  var tw = clamp(W*0.5, 200, 600), th = 6*S;
  var tx = cx - tw/2, ty = H - 14*S;
  rr(ctx, tx, ty, tw, th, th/2);
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill();
  rr(ctx, tx, ty, tw * (elapsed / GAME_DURATION), th, th/2);
  ctx.fillStyle = '#48c9b0'; ctx.fill();
}

function drawOverlay(title, sub, btnText, btnFn, sub2) {
  buttons = [];
  ctx.fillStyle = 'rgba(5,5,16,0.88)';
  ctx.fillRect(0, 0, W, H);

  var titleFs = clamp(40*S, 24, 60);
  var subFs   = clamp(16*S, 12, 22);
  var btnW    = clamp(240*S, 160, 320), btnH = clamp(52*S, 40, 66);
  var btnX    = cx - btnW/2, btnY = cy + 26*S;

  ctx.shadowColor = 'rgba(77,208,225,0.5)'; ctx.shadowBlur = 30*S;
  ctx.font = 'bold '+titleFs+'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(title, cx, cy - 60*S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  if (sub)  { ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#9ab'; ctx.fillText(sub,  cx, cy - 24*S); }
  if (sub2) { ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#bcd'; ctx.fillText(sub2, cx, cy - 4*S);  }

  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY+btnH);
  grad.addColorStop(0, '#4dd0e1'); grad.addColorStop(1, '#0288a8');
  rr(ctx, btnX, btnY, btnW, btnH, btnH/2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold '+subFs+'px sans-serif'; ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(btnText, cx, btnY + btnH/2);
  ctx.textBaseline = 'alphabetic';

  buttons.push({ x:btnX, y:btnY, w:btnW, h:btnH, fn:btnFn });

  // Stats
  ctx.font = clamp(13*S,10,17)+'px sans-serif';
  ctx.fillStyle = '#557';
  ctx.fillText(t('best')+': '+todayBest+'   '+t('alltime')+': '+allTimeBest, cx, btnY+btnH+30*S);
  ctx.fillText(t('daySeed')+' '+seed, cx, btnY+btnH+50*S);

  // ── Leaderboard (only on game-end overlays, not the menu) ────────────────
  if ((gs === 'GAMEOVER' || gs === 'CLEARED') && leaderboard.length > 0) {
    var lbX = cx, lbY = btnY + btnH + 90*S;
    var lbFs = clamp(14*S, 11, 18);
    var rowFs = clamp(13*S, 10, 16);
    var rowH  = clamp(20*S, 16, 24);

    ctx.font = 'bold ' + lbFs + 'px sans-serif';
    ctx.fillStyle = '#48c9b0';
    ctx.textAlign = 'center';
    ctx.fillText(t('leaderboard') + (myRank ? ' — ' + t('rank') + ': ' + myRank : ''), lbX, lbY);

    ctx.font = rowFs + 'px sans-serif';
    for (var i = 0; i < leaderboard.length; i++) {
      var entry = leaderboard[i];
      var rowY = lbY + (i + 1) * rowH + 6*S;
      var isMe = entry.name === playerName;
      ctx.fillStyle = isMe ? '#FFD700' : '#aab';
      ctx.textAlign = 'right';
      ctx.fillText((i + 1) + '.', cx - 80*S, rowY);
      ctx.textAlign = 'left';
      var displayName = entry.name + (isMe ? ' ('+t('you')+')' : '');
      ctx.fillText(displayName, cx - 70*S, rowY);
      ctx.textAlign = 'right';
      ctx.fillStyle = isMe ? '#FFD700' : '#9bf';
      ctx.fillText(entry.score, cx + 110*S, rowY);
    }
    ctx.textAlign = 'center';
  }
}

// ── MAIN LOOP ───────────────────────────────────────────────────────────────
function frame(ts) {
  var dt = Math.min((ts - lastTs) / 1000, 0.08);
  lastTs = ts;

  update(dt);

  var sx = 0, sy = 0;
  if (screenShake > 0) { sx=(Math.random()-0.5)*screenShake*14*S; sy=(Math.random()-0.5)*screenShake*14*S; }

  ctx.save();
  ctx.translate(sx, sy);
  ctx.fillStyle = '#050510';
  ctx.fillRect(-20, -20, W+40, H+40);

  if (gs === 'PLAYING' || gs === 'GAMEOVER' || gs === 'CLEARED') {
    drawArenaBg();
    for (var i = 0; i < bullets.length; i++) drawBullet(bullets[i]);

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (gs === 'PLAYING') drawPlayer();

    for (var i = 0; i < floats.length; i++) {
      var f = floats[i];
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.font = 'bold '+clamp(15*S,11,22)+'px sans-serif';
      ctx.fillStyle = f.col; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(f.txt, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    if (gs === 'PLAYING') drawHUD();
  }
  ctx.restore();

  if (gs === 'MENU') {
    ctx.fillStyle = '#050510'; ctx.fillRect(0,0,W,H);
    drawOverlay(t('title'), t('sub'), t('play'), function() { startRun(); }, t('sub2'));
  }
  if (gs === 'GAMEOVER') {
    drawOverlay(t('youDied'), t('survived')+' '+elapsed.toFixed(1)+'s', t('retry'),
      function() { startRun(); }, t('score')+': '+score);
  }
  if (gs === 'CLEARED') {
    drawOverlay(t('cleared'), t('score')+': '+score, t('retry'),
      function() { startRun(); }, '');
  }

  requestAnimationFrame(frame);
}

// ── BOOT ────────────────────────────────────────────────────────────────────
var booted = false;
function boot() {
  if (booted) return;
  booted = true;
  seed = getDaySeed();
  try {
    // refresh today best per-day
    var dayKey = getDayKey();
    var savedDay = localStorage.getItem('dodge_day_key');
    if (savedDay !== dayKey) {
      localStorage.setItem('dodge_day_key', dayKey);
      localStorage.setItem('dodge_day_best', '0');
    }
    todayBest = parseInt(localStorage.getItem('dodge_day_best')||'0')||0;
    allTimeBest = parseInt(localStorage.getItem('dodge_alltime_best')||'0')||0;
  } catch(e) {}
  if (window.ysdk && window.ysdk.features && window.ysdk.features.LoadingAPI) {
    window.ysdk.features.LoadingAPI.ready();
  }
  gs = 'MENU';
  lastTs = performance.now();
  requestAnimationFrame(frame);
}

(function() {
  if (typeof YaGames === 'undefined') { setTimeout(boot, 3000); return; }
  YaGames.init().then(function(ysdk) {
    window.ysdk = ysdk;
    try {
      var l = ysdk.environment && ysdk.environment.i18n && ysdk.environment.i18n.lang;
      if (l) lang = l.startsWith('ru') ? 'ru' : 'en';
    } catch(e) {}
    boot();
  }).catch(function() { boot(); });
  setTimeout(boot, 3000);
})();

})();
</script>
