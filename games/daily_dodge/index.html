// ── AUDIO (iter#11) ─────────────────────────────────────────────────────────
// Procedural WebAudio SFX - no asset files (keeps zip size constant for
// Yandex). Lazy-init AudioContext on first user gesture (autoplay policy).
// Each call is a small chain of oscillators + envelopes so the close-call /
// combo / bomb / death / achievement moments get tactile audio without
// shipping samples. Mute toggle persists in `dodge_muted`; default = ON.
// window._silent=true (screenshot tool) keeps the channel fully muted.
var audioMuted = false;            // persisted player preference
var _ac = null;                    // AudioContext (lazy)
var _masterGain = null;            // master volume node
function loadMutePref() {
  try { audioMuted = localStorage.getItem('dodge_muted') === '1'; } catch(e) {}
}
function saveMutePref() {
  try { localStorage.setItem('dodge_muted', audioMuted ? '1' : '0'); } catch(e) {}
}
function ensureAudio() {
  if (window._silent) return null;
  if (_ac) return _ac;
  try {
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    _ac = new AC();
    _masterGain = _ac.createGain();
    _masterGain.gain.value = 0.32;
    _masterGain.connect(_ac.destination);
  } catch(e) { _ac = null; }
  return _ac;
}
function _audioResume() {
  // Browsers suspend the context until a user gesture. Resume on click/touch.
  if (_ac && _ac.state === 'suspended') { try { _ac.resume(); } catch(e) {} }
  // milestone - start the procedural background music on the first user gesture
  // (autoplay policy). musEnsure is a no-op once the context exists.
  if (typeof startMusic === 'function') startMusic();
}
function _beep(opts) {
  // opts: { freq, freq2, type, dur, vol, sweepCurve }
  if (audioMuted || window._silent) return;
  var ac = ensureAudio();
  if (!ac) return;
  var now = ac.currentTime;
  var dur = opts.dur || 0.12;
  var osc = ac.createOscillator();
  var g = ac.createGain();
  osc.type = opts.type || 'sine';
  osc.frequency.setValueAtTime(opts.freq, now);
  if (opts.freq2 != null) {
    if (opts.sweepCurve === 'exp') osc.frequency.exponentialRampToValueAtTime(opts.freq2, now + dur);
    else osc.frequency.linearRampToValueAtTime(opts.freq2, now + dur);
  }
  var vol = opts.vol != null ? opts.vol : 0.5;
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(vol, now + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.connect(g); g.connect(_masterGain);
  osc.start(now); osc.stop(now + dur + 0.02);
}
function _noise(opts) {
  // White-noise burst through a band-pass; used for whoosh / explosion.
  if (audioMuted || window._silent) return;
  var ac = ensureAudio();
  if (!ac) return;
  var now = ac.currentTime;
  var dur = opts.dur || 0.25;
  var sr = ac.sampleRate;
  var buf = ac.createBuffer(1, Math.floor(sr * dur), sr);
  var data = buf.getChannelData(0);
  for (var i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  var src = ac.createBufferSource();
  src.buffer = buf;
  var bp = ac.createBiquadFilter();
  bp.type = opts.filter || 'bandpass';
  bp.frequency.value = opts.freq || 600;
  bp.Q.value = opts.q || 0.7;
  var g = ac.createGain();
  var vol = opts.vol != null ? opts.vol : 0.4;
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(vol, now + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  src.connect(bp); bp.connect(g); g.connect(_masterGain);
  src.start(now); src.stop(now + dur + 0.02);
}
var Sfx = {
  click:       function() { _beep({ freq:780, freq2:920, type:'triangle', dur:0.06, vol:0.35, sweepCurve:'exp' }); },
  closeCall:   function() { _beep({ freq:1450, freq2:1820, type:'sine', dur:0.07, vol:0.28, sweepCurve:'exp' }); },
  comboStep:   function(mult) {
    var f = 520 + Math.min(mult, 20) * 55;
    _beep({ freq:f, freq2:f * 1.5, type:'square', dur:0.10, vol:0.32, sweepCurve:'exp' });
  },
  bomb: function() {
    _noise({ freq:380, q:0.5, dur:0.32, vol:0.55, filter:'lowpass' });
    _beep({ freq:120, freq2:38, type:'sawtooth', dur:0.34, vol:0.45, sweepCurve:'exp' });
  },
  death: function() {
    _beep({ freq:280, freq2:55, type:'sawtooth', dur:0.55, vol:0.55, sweepCurve:'exp' });
    _noise({ freq:220, q:0.4, dur:0.5, vol:0.32, filter:'lowpass' });
  },
  revive: function() {
    _beep({ freq:520, freq2:1040, type:'sine', dur:0.22, vol:0.42, sweepCurve:'exp' });
    setTimeout(function(){ _beep({ freq:1040, freq2:1560, type:'sine', dur:0.18, vol:0.36, sweepCurve:'exp' }); }, 110);
  },
  unlock: function() {
    // 3-note ascending arpeggio
    _beep({ freq:660, type:'triangle', dur:0.12, vol:0.40 });
    setTimeout(function(){ _beep({ freq:880,  type:'triangle', dur:0.12, vol:0.40 }); }, 90);
    setTimeout(function(){ _beep({ freq:1175, type:'triangle', dur:0.18, vol:0.40 }); }, 180);
  },
  achievement: function() {
    // Brighter 3-note chime - distinct from skin unlock so the layers feel separate
    _beep({ freq:784, type:'sine', dur:0.12, vol:0.38 });
    setTimeout(function(){ _beep({ freq:988,  type:'sine', dur:0.12, vol:0.38 }); }, 80);
    setTimeout(function(){ _beep({ freq:1318, type:'sine', dur:0.24, vol:0.42 }); }, 160);
  },
  cleared: function() {
    _beep({ freq:523, type:'triangle', dur:0.16, vol:0.42 });
    setTimeout(function(){ _beep({ freq:659, type:'triangle', dur:0.16, vol:0.42 }); }, 130);
    setTimeout(function(){ _beep({ freq:784, type:'triangle', dur:0.16, vol:0.42 }); }, 260);
    setTimeout(function(){ _beep({ freq:1047,type:'triangle', dur:0.30, vol:0.46 }); }, 390);
  },
  // meta - coin/claim chime (Cores reward) + a shield-block thunk
  reward: function() {
    _beep({ freq:880, freq2:1320, type:'triangle', dur:0.10, vol:0.34, sweepCurve:'exp' });
    setTimeout(function(){ _beep({ freq:1320, type:'sine', dur:0.12, vol:0.30 }); }, 70);
  },
  shieldBlock: function() {
    _beep({ freq:300, freq2:90, type:'square', dur:0.20, vol:0.42, sweepCurve:'exp' });
    _noise({ freq:900, q:0.8, dur:0.14, vol:0.22, filter:'bandpass' });
  },
  dash: function() { _beep({ freq:520, freq2:1100, type:'sine', dur:0.13, vol:0.30, sweepCurve:'exp' }); },
};

// ════════════════════════════════════════════════════════════════════════════
// ── BACKGROUND MUSIC (milestone) - procedural synthwave loop, zero assets ────
// ════════════════════════════════════════════════════════════════════════════
// Tim's rule: every game ships SFX + background MUSIC + a mute toggle. This is a
// self-contained WebAudio scheduler (rage_room pattern, #131): a driving ~118 BPM
// minor loop (kick + saw bass + hat + chord pads + an occasional lead arp) that
// matches Daily Dodge's neon vibe. No mp3, no credits, no bundle weight. Gated on
// audioMuted each tick; suspended on tab-hide / ad-open; started on first gesture.
// presubmit #12 sees BOTH markers (AudioContext + the `loop`/`music` identifier).
var MUS = { ctx:null, master:null, step:0, bar:0, nextT:0, started:false, bpm:118, loop:true };
// minor-key bass + lead note tables (A minor-ish) - 16-step patterns
var MUS_BASS = [110.0, 0, 0, 110.0, 0, 130.8, 0, 0, 98.0, 0, 0, 98.0, 0, 87.3, 0, 0];
var MUS_LEAD = [440.0, 523.3, 659.3, 523.3, 587.3, 659.3, 783.99, 659.3];
function musEnsure() {
  if (MUS.ctx) return MUS.ctx;
  if (window._silent) return null;
  try { MUS.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch(e) { MUS.ctx = null; return null; }
  MUS.master = MUS.ctx.createGain(); MUS.master.gain.value = 0; MUS.master.connect(MUS.ctx.destination);
  MUS.nextT = MUS.ctx.currentTime + 0.1;
  MUS.started = true;
  return MUS.ctx;
}
function musTone(freq, t, dur, type, gain, slideTo) {
  if (!MUS.ctx) return;
  var o = MUS.ctx.createOscillator(), g = MUS.ctx.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(gain, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(MUS.master); o.start(t); o.stop(t + dur + 0.02);
}
function musKick(t) {
  if (!MUS.ctx) return;
  var o = MUS.ctx.createOscillator(), g = MUS.ctx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(46, t + 0.16);
  g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
  o.connect(g); g.connect(MUS.master); o.start(t); o.stop(t + 0.2);
}
function musHat(t, loud) {
  if (!MUS.ctx) return;
  var o = MUS.ctx.createOscillator(), g = MUS.ctx.createGain();
  o.type = 'square'; o.frequency.setValueAtTime(8000, t);
  g.gain.setValueAtTime(loud ? 0.05 : 0.025, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
  o.connect(g); g.connect(MUS.master); o.start(t); o.stop(t + 0.05);
}
// Called every frame from the render loop. Schedules ~130ms ahead. Cheap.
function musTick() {
  if (!MUS.ctx) return;
  // volume gate: silent when muted, hidden, or held for an ad
  var target = (audioMuted || window._silent || audioHeld || document.hidden) ? 0 : 0.12;
  MUS.master.gain.value = target;
  if (target === 0) {
    // keep the clock from accumulating a catch-up burst while silent/suspended
    if (MUS.nextT < MUS.ctx.currentTime) MUS.nextT = MUS.ctx.currentTime + 0.05;
    return;
  }
  if (MUS.nextT < MUS.ctx.currentTime) MUS.nextT = MUS.ctx.currentTime + 0.05;
  var spb = 60 / MUS.bpm / 4; // 16th-note seconds

// Overnight / idle accrual - the Core Reactor generates Cores while away, capped
// at ~8h (the cap IS the return trigger; uncapped kills it). Collected on return.
var IDLE_RATE_PER_HR = 18;     // Cores/hour
var IDLE_CAP_HRS = 8;
function idlePending() {
  if (!meta.idleAt) return 0;
  var hrs = Math.min(IDLE_CAP_HRS, (Date.now() - meta.idleAt) / 3600000);

}

// ── M3 - FOMO EVENT + DODGE PASS ────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
// A rotating 3-day "Gauntlet" event: a named modifier window that pays +30% Cores
// and a one-time bonus chest. Manufactures urgency + freshness with no new code
// each cycle (the window + modifier rotate off the date).
var EVENTS = [
  { id:'storm',  en:'Bullet Storm',  ru:'Шторм Снарядов', enD:'Denser spawns, bigger Core payout.', ruD:'Плотнее снаряды, больше Ядер.' },
  { id:'mirror', en:'Mirror Run',    ru:'Зеркало',        enD:'The arena is mirrored. Stay sharp.',  ruD:'Арена отзеркалена. Будь начеку.' },
  { id:'swarm',  en:'Spinner Swarm', ru:'Рой Вертушек',   enD:'Spinners everywhere. Graze big.',     ruD:'Вертушки повсюду. Много касаний.' },
];
function eventWindow() {
  // 3-day windows since an epoch; which event = window index mod EVENTS.length.
  var epochDay = Math.floor(Date.UTC(2026,0,1) / 86400000);
  var today = Math.floor(Date.now() / 86400000);
  var win = Math.floor((today - epochDay) / 3);
  var dayInWin = (today - epochDay) - win * 3;     // 0,1,2
  return { id: 'evt' + win, def: EVENTS[((win % EVENTS.length)+EVENTS.length)%EVENTS.length], daysLeft: 3 - dayInWin };
}
function eventActive() { return true; } // an event is always running; rotates every 3 days
function eventBonusUnclaimed() {
  var w = eventWindow();
  return meta.eventClaimedDay !== w.id;
}
function claimEventBonus() {
  var w = eventWindow();
  if (meta.eventClaimedDay === w.id) return 0;
  meta.eventClaimedDay = w.id;
  var reward = 80;
  meta.cores += reward; saveMeta(); Sfx.unlock();
  return reward;
}

// ── ARENA ───────────────────────────────────────────────────────────────────
function arena() {
  var inset = platformSafeInsets();
  var pad = 20 * S;
  var top = (HUD_H + 6) * S;
  return { x: pad, y: top, w: W - pad*2 - inset.right, h: H - top - pad - inset.bottom };
}

// ── PRE-ROLL DAILY SPAWNS ───────────────────────────────────────────────────
// We pre-roll every spawn for the 60-second run from the daily seed, so
// every player on the same day faces the EXACT same pattern.
function buildDailySpawns() {
  spawners = [];
  rng = makeRng(seed);
  var t = 0.5;
  while (t < GAME_DURATION) {
    // Difficulty ramps over time
    var difficulty = clamp(t / 30, 0.4, 1.6);
    var kind = Math.floor(rng() * 4); // 0=normal, 1=fast small, 2=heavy slow, 3=spinner
    var burst = rng() < 0.18 + difficulty * 0.1;

    // Edge to spawn from: 0=top, 1=right, 2=bottom, 3=left
    var edge = Math.floor(rng() * 4);

    // Targeting offset along the edge (normalized 0..1)
    var u = rng();

    spawners.push({ t:t, kind:kind, edge:edge, u:u, difficulty: difficulty, burst:burst });

    var gap = clamp(0.55 - difficulty * 0.15, 0.18, 0.55) + rng() * 0.25;
    if (kind === 3) gap += 0.2;
    t += gap;
  }
  nextSpawnIdx = 0;
}

function spawnFromSpawner(sp) {
  var ar = arena();
  var ex, ey, vx, vy;
  if (sp.edge === 0)      { ex = ar.x + sp.u * ar.w; ey = ar.y - 16*S; vx = 0; vy = 1; }
  else if (sp.edge === 1) { ex = ar.x + ar.w + 16*S; ey = ar.y + sp.u * ar.h; vx = -1; vy = 0; }
  else if (sp.edge === 2) { ex = ar.x + sp.u * ar.w; ey = ar.y + ar.h + 16*S; vx = 0; vy = -1; }
  else                    { ex = ar.x - 16*S; ey = ar.y + sp.u * ar.h; vx = 1; vy = 0; }

  var speedBase = 110, r = 11;
  var color = '#e74c3c';
  if (sp.kind === 1) { speedBase = 200; r = 8;  color = '#f39c12'; }
  if (sp.kind === 2) { speedBase = 70;  r = 18; color = '#9b59b6'; }
  if (sp.kind === 3) { speedBase = 95;  r = 12; color = '#48c9b0'; }

  var sp2 = (speedBase + sp.difficulty * 30) * S;

  // For "spinner" kind, the projectile rotates its velocity over time
  var spinPhase = sp.kind === 3 ? rng() * Math.PI * 2 : 0;
  var aimWobble = (rng() - 0.5) * 0.6;

  // Compute base velocity with slight aim toward player area (use arena center as target)
  var tx = ar.x + ar.w/2, ty = ar.y + ar.h/2;
  var dx = tx - ex, dy = ty - ey;
  var L = Math.sqrt(dx*dx + dy*dy);
  if (L < 1) L = 1;
  var nx = dx / L, ny = dy / L;
  // mix straight-edge-perpendicular with toward-center
  vx = vx * 0.4 + nx * 0.6;
  vy = vy * 0.4 + ny * 0.6;

  var ca = Math.cos(aimWobble), sa = Math.sin(aimWobble);

  if (sp.burst) {

      var bca = Math.cos(ba), bsa = Math.sin(ba);

      bullets.push({ x:ex, y:ey, vx:bvx, vy:bvy, r:r*S*0.85, life: 12, kind:sp.kind, spinPhase:spinPhase, color:color });
    }
  }
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
var lastTs = 0;
var lastLiveRankAt = 0;
function update(dt) {

  // need to LOSE to reach the meta). Freeze the sim while it's open.
  if (loadoutOpen) return;

  // iter#3 - micro slow-mo on close call (decays smoothly back to 1.0). Time
  // Warp gear (runSlow) deepens the dip and is applied via the dilation floor.
  if (dilationTimer > 0) {

  }

  var bdt = dt * timeDilation;

  // iter#4 - combo meter decay (chain expires after COMBO_WINDOW with no close call)
  if (comboTimer > 0) {

  // and the daily spawners are suppressed (see "process spawns"). When the
  // tutorial finishes, the clock starts fresh from a real run. ──
  if (TUT.active) {
    TUT.t += dt;
    if (TUT.step <= 1) { startTime = now; }     // hold the clock during the lesson
    if (TUT.step === 0) {
      // advance once the player has actually steered a meaningful distance
      var msp = Math.sqrt(player.vx*player.vx + player.vy*player.vy);
      TUT.moveAccum += msp;

  // timer - survive as long as you can while difficulty climbs forever.

  if (keys['ArrowDown']  || keys['KeyS']) ay += 1;

  }
  var alen = Math.sqrt(ax*ax + ay*ay);
  if (alen > 0) { ax /= alen; ay /= alen; }

  player.vx = (player.vx + ax * 0.9 * S) * 0.78;
  player.vy = (player.vy + ay * 0.9 * S) * 0.78;
  var spd = Math.sqrt(player.vx*player.vx + player.vy*player.vy);
  var max = PLAYER_SPEED * S;
  if (spd > max) { player.vx = player.vx/spd*max; player.vy = player.vy/spd*max; }

  player.x += player.vx; player.y += player.vy;

  var ar = arena(), pr = PLAYER_R * S;
  player.x = clamp(player.x, ar.x + pr, ar.x + ar.w - pr);
  player.y = clamp(player.y, ar.y + pr, ar.y + ar.h - pr);

  // process spawns - suppressed during the scripted tutorial steps (the tutorial
  // controls the board: no bullets on the "move" step, one graze bullet on the
  // "graze" step) so the lesson is calm and guaranteed-completable.
  if (tutControlsSpawns()) {
    // tutorial drives spawns itself (tutMaybeSpawnGrazeBullet)
  } else if (runMode === 'DAILY') {
    while (nextSpawnIdx < spawners.length && spawners[nextSpawnIdx].t <= elapsed) {
      spawnFromSpawner(spawners[nextSpawnIdx++]);
    }
  } else {
    // iter#6 - Endless procedural spawning. Difficulty climbs uncapped on the
    // upper end so the game becomes genuinely harder past 60s; gap shrinks
    // toward a hard floor so the bullet density stays human-readable.
    endlessSpawnTimer -= dt;
    while (endlessSpawnTimer <= 0) {
      var ediff = clamp(elapsed / 30, 0.5, 4.0);
      spawnFromSpawner({
        t: elapsed,
        kind: Math.floor(endlessRng() * 4),
        edge: Math.floor(endlessRng() * 4),
        u: endlessRng(),
        difficulty: ediff,
        burst: endlessRng() < 0.18 + ediff * 0.08,
      });
      var egap = clamp(0.55 - ediff * 0.10, 0.10, 0.55) + endlessRng() * 0.20;
      endlessSpawnTimer += egap;
    }
  }

  // bullets
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    if (b.kind === 3) {
      // spinner - rotate velocity slowly
      b.spinPhase += bdt * 1.6;
      var r2 = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
      var ang = Math.atan2(b.vy, b.vx) + bdt * 1.0;
      b.vx = Math.cos(ang) * r2; b.vy = Math.sin(ang) * r2;
    }
    b.x += b.vx * bdt; b.y += b.vy * bdt;
    b.life -= bdt;

    var bar = arena();
    if (b.life <= 0 ||
        b.x < bar.x - 60*S || b.x > bar.x + bar.w + 60*S ||
        b.y < bar.y - 60*S || b.y > bar.y + bar.h + 60*S) {
      bullets.splice(i, 1); continue;
    }

    // collision
    var dx = player.x - b.x, dy = player.y - b.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    // ── Close-call (iter#3): bullet whizzed past inner ring without hitting ──
    // Grazer gear (runMagnet) widens the near-miss ring so grazes/combo come easier.
    var collideR = (PLAYER_R*S + b.r) * 0.8;
    var nearR    = (PLAYER_R*S + b.r) * (1.85 + runMagnet);
    if (!b.closeCalled && dist < nearR && dist > collideR) {
      b.closeCalled = true;
      closeCallCount++;
      // Visual: a quick spark ring + a streak in the bullet's color
      spawnParticles(player.x, player.y, b.color || '#fff', 8);
      spawnFloat((player.x + b.x)/2, (player.y + b.y)/2 - 6*S, '!', '#fff');
      // iter#11 - audio ping on every close call
      Sfx.closeCall();
      // milestone - tutorial "graze" step completes on the first close-call
      if (TUT.active && TUT.step === 1) tutNext();
      // Subtle micro slow-mo so the player feels the dodge (Time Warp extends it)
      dilationTimer = 0.09 + runSlow * 0.9; // ~90 ms, longer with Time Warp gear

      // iter#4 - close-call combo meter (chain near-misses for multiplier)
      comboCount++;
      comboTimer = COMBO_WINDOW;
      comboFlash = 1;
      if (comboCount > maxComboThisRun) maxComboThisRun = comboCount;
      // Award bonus only from x2 onward - x1 is just the close call itself
      if (comboCount >= 2) {
        var mult = comboCount * (1 + runComboBoost); // Overdrive gear enriches payout
        comboBonus += mult; // small per-tick bonus that scales with streak
        if (comboCount === 2 || comboCount === 5 || comboCount === 10 || comboCount === 20) {
          spawnFloat(player.x, player.y - 28*S, '×' + comboCount + '!', '#FFD700');
          spawnParticles(player.x, player.y, '#FFD700', 10);
          // iter#11 - milestone audio burst, pitch climbs with streak
          Sfx.comboStep(comboCount);
        }
      }
    }
    if (dist < collideR) {
      if (window._invincible) {
        // pass through harmlessly (screenshot mode)
        bullets.splice(i, 1);
        continue;
      }
      // milestone - no death during the scripted tutorial lesson (move/graze).
      // The bullet harmlessly clears so the player can't lose while learning.
      if (tutControlsSpawns()) {
        bullets.splice(i, 1);
        continue;
      }
      // iter#9 - ad-revive grants 3s of bullet pass-through after rewarded ad
      var nowS = performance.now() / 1000;
      if (invulnUntil > nowS) {
        bullets.splice(i, 1);
        continue;
      }
      // milestone - Shield/Aegis gear: absorb the hit, consume a charge, survive.
      if (runShield > 0) {
        runShield--;
        bullets.splice(i, 1);
        spawnParticles(player.x, player.y, '#4dd0e1', 22);
        shieldFlash = 1;
        screenShake = 0.5;
        Sfx.shieldBlock();
        invulnUntil = nowS + 0.6;   // brief i-frames so one dense burst doesn't drain every charge at once
        continue;
      }
      score = Math.floor(elapsed * 10) + Math.floor(comboBonus);
      spawnParticles(player.x, player.y, '#fff', 30);
      spawnParticles(player.x, player.y, '#e74c3c', 18);
      screenShake = 1.0;
      // iter#11 - death thud
      Sfx.death();
      onRunEnded(false);
      return;
    }
  }

  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05*S;
    p.life -= dt * 1.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (var i = floats.length - 1; i >= 0; i--) {
    var f = floats[i];
    f.y += f.vy; f.life -= dt * 0.95;
    if (f.life <= 0) floats.splice(i, 1);
  }
}

function onRunEnded(survived) {
  var beatAllTime = false;
  // ENDLESS - track its own best, post to its own leaderboard. Daily/all-time
  // bests stay reserved for the 60s sprint so the two ladders never bleed.
  if (runMode === 'ENDLESS') {
    score = Math.floor(elapsed * 10) + Math.floor(comboBonus);
    try {
      var prevEB = parseInt(localStorage.getItem('dodge_endless_best')||'0')||0;
      if (score > prevEB) localStorage.setItem('dodge_endless_best', String(score));
      endlessBest = Math.max(prevEB, score);
      if (score > prevEB && prevEB > 0) beatAllTime = true;
    } catch(e) {}
  } else {
  // DAILY - update today + all-time
  try {
    var dayKey = getDayKey();
    var savedDay = localStorage.getItem('dodge_day_key');
    if (savedDay !== dayKey) {
      localStorage.setItem('dodge_day_key', dayKey);
      localStorage.setItem('dodge_day_best', '0');
    }
    var dayBest = parseInt(localStorage.getItem('dodge_day_best')||'0')||0;
    if (score > dayBest) localStorage.setItem('dodge_day_best', String(score));
    todayBest = Math.max(dayBest, score);

    var atime = parseInt(localStorage.getItem('dodge_alltime_best')||'0')||0;
    if (score > atime && atime > 0) beatAllTime = true; // require a prior best to celebrate
    if (score > atime) localStorage.setItem('dodge_alltime_best', String(score));
    allTimeBest = Math.max(atime, score);
    // Survive 60s of the daily → permanently unlock ENDLESS mode.
    if (survived && !endlessUnlocked) {
      endlessUnlocked = true;
      try { localStorage.setItem('dodge_endless_unlocked', '1'); } catch(e) {}
    }
  } catch(e) {}
  }
  if (beatAllTime && !newBestPopped) {
    newBestPopped = true;
    spawnFloat(player.x, player.y - 24, (lang === 'ru' ? 'НОВЫЙ РЕКОРД!' : 'NEW BEST!'), '#FFD700');
    spawnParticles(player.x, player.y, '#FFD700', 24);
  }
  // iter#3 - persist all-time best close-calls in a single run
  try {
    var prevBestCC = parseInt(localStorage.getItem('dodge_best_closecalls')||'0')||0;
    if (closeCallCount > prevBestCC) {
      localStorage.setItem('dodge_best_closecalls', String(closeCallCount));
      bestCloseCalls = closeCallCount;
    } else {
      bestCloseCalls = prevBestCC;
    }
  } catch(e) {}
  // iter#4 - persist all-time best combo (peak streak in any single run)
  try {
    var prevBestCombo = parseInt(localStorage.getItem('dodge_best_combo')||'0')||0;
    if (maxComboThisRun > prevBestCombo) {
      localStorage.setItem('dodge_best_combo', String(maxComboThisRun));
      bestComboEver = maxComboThisRun;
    } else {
      bestComboEver = prevBestCombo;
    }
  } catch(e) {}
  // iter#8 - persist all-time best bombs (most bombs detonated in a single run)
  try {
    var prevBestBombs = parseInt(localStorage.getItem('dodge_best_bombs')||'0')||0;
    if (bombsUsed > prevBestBombs) {
      localStorage.setItem('dodge_best_bombs', String(bombsUsed));
      bestBombs = bombsUsed;
    } else {
      bestBombs = prevBestBombs;
    }
  } catch(e) {}
  // iter#2 - check skin unlocks based on seconds survived this run
  newlyUnlockedSkin = checkUnlocksAfterRun(elapsed);
  if (newlyUnlockedSkin) {
    spawnFloat(player.x, player.y - 8, skinDisplayName(newlyUnlockedSkin) + ' ' + t('unlocked'), newlyUnlockedSkin.glow);
    spawnParticles(player.x, player.y, newlyUnlockedSkin.glow, 28);
    // iter#11 - ascending arpeggio for cosmetic milestone
    Sfx.unlock();
    // auto-equip the freshly unlocked skin
    for (var k = 0; k < SKINS.length; k++) if (SKINS[k].id === newlyUnlockedSkin.id) { skinIdx = k; saveActiveSkin(); break; }
  }
  // iter#10 - Evaluate the 10 cross-axis achievements. Unified milestone layer
  // on top of every existing scoring axis (time, close-calls, combo, bombs,
  // endless, streak). Newly-earned ids pop a float per achievement and are
  // listed on the game-over overlay so the player sees the badge they earned.
  newlyEarnedAch = evaluateAchievements({
    elapsed: elapsed, survived: survived,
    closeCallCount: closeCallCount, maxComboThisRun: maxComboThisRun,
    bombsUsed: bombsUsed, runMode: runMode, score: score,
    streakCurrent: streak.current,
  });
  for (var ai = 0; ai < newlyEarnedAch.length; ai++) {
    var aEnt = null;
    for (var aj = 0; aj < ACHIEVEMENTS.length; aj++) if (ACHIEVEMENTS[aj].id === newlyEarnedAch[ai]) { aEnt = ACHIEVEMENTS[aj]; break; }
    if (!aEnt) continue;
    spawnFloat(player.x, player.y - 44 - ai * 18, t(aEnt.key + '_name'), aEnt.color);
    spawnParticles(player.x, player.y, aEnt.color, 18);
  }
  // iter#11 - single chime if any achievement landed (avoid stacked overlap)
  if (newlyEarnedAch.length > 0) Sfx.achievement();

  // ── milestone - META payout: accrue cumulative playtime, award Cores, bump ──
  // quests. This is the per-run hook that feeds the whole retention triangle.
  meta.totalPlaySec += elapsed;                          // cumulative play (folded at game-over, NOT per frame)
  coresEarnedRun = coresForRun(elapsed, survived, closeCallCount, bombsUsed);
  meta.cores += coresEarnedRun;
  meta.idleAt = Date.now();                              // reset the Core Reactor clock on each run
  saveMeta();
  // daily-quest progress (best-this-run for survive/combo; accumulate the rest)
  questBump('survive', Math.floor(elapsed));
  questBump('combo', maxComboThisRun);
  questBump('graze', closeCallCount);
  questBump('bomb', bombsUsed);
  questBump('play', 1);
  questBump('earn', coresEarnedRun);
  // playtime ladder may have just crossed a gear milestone (toast deferred to overlay)
  checkGearUnlocks();

  gs = survived ? 'CLEARED' : 'GAMEOVER';
  PLAT.gameplayStop();   // CrazyGames lifecycle (no-op on Yandex/gallery)
  try{parent.postMessage({type:'gf:gameEnded'},'*')}catch(_){}
  submitAndFetchLeaderboard();
}

var playerName = '';
var leaderboard = [];   // [{name, score, ts}]
var liveBoard = [];     // full top-N for live-rank computation during PLAYING
var liveRank = null;    // your projected daily rank computed against liveBoard each frame
var myRank = null;
var newBestPopped = false; // ensure NEW BEST! float fires only once per run

// Resolve a leaderboard handle WITHOUT a native browser dialog. A native name
// dialog is a Yandex п.1.14 violation ("browser notification"), so we never
// open one. Order: cached name -> Yandex player profile name (set async at boot
// by resolveYandexName) -> a stable auto-generated handle persisted locally.
function ensurePlayerName() {
  if (playerName) return playerName;
  try { playerName = localStorage.getItem('dodge_name') || ''; } catch(e) {}
  if (!playerName) {
    playerName = (lang === 'ru' ? 'Игрок' : 'Player') + (1000 + Math.floor(Math.random() * 9000));
    try { localStorage.setItem('dodge_name', playerName); } catch(e) {}
  }
  return playerName;
}
// Best-effort: adopt the player's real Yandex name when the SDK exposes it.
// Runs once at boot; overrides the auto-handle only if a real name comes back
// and the player has not already been given one this session.
function resolveYandexName() {
  if (!window.ysdk || !window.ysdk.getPlayer) return;
  try {
    window.ysdk.getPlayer({ scopes: false }).then(function(p) {
      var nm = (p && p.getName && p.getName() || '').trim();
      if (!nm) return;
      var hadCustom = false;
      try { hadCustom = !!localStorage.getItem('dodge_name') && !/^(Player|Игрок)\d{4}$/.test(localStorage.getItem('dodge_name')); } catch(e) {}
      if (hadCustom) return;
      playerName = nm.slice(0, 24);
      try { localStorage.setItem('dodge_name', playerName); } catch(e) {}
    }).catch(function() {});
  } catch(e) {}
}

function leaderboardSlug() {
  return runMode === 'ENDLESS' ? 'daily_dodge_endless' : 'daily_dodge';
}
function fetchLeaderboard() {
  var date = runMode === 'ENDLESS' ? 'all' : getDayKey();
  return fetch('/api/scores?slug=' + leaderboardSlug() + '&date=' + date, { cache: 'no-store' })
    .then(function(r) { return r.ok ? r.json() : { entries: [] }; })
    .then(function(data) {
      var all = data.entries || [];
      leaderboard = all.slice(0, 5);
      // keep a fuller copy for live-rank during play (sorted desc by score)
      liveBoard = all.slice(0, 50).sort(function(a,b){ return b.score - a.score; });
    })
    .catch(function() { /* offline-tolerant */ });
}

// Compute the player's projected daily rank vs cached liveBoard entries.
// Returns null if board is empty (no rank to show).
function computeLiveRank(myScore) {
  if (!liveBoard || liveBoard.length === 0) return null;
  if (myScore <= 0) return null;
  // count entries with score strictly greater than mine; rank = that+1
  var ahead = 0;
  for (var i = 0; i < liveBoard.length; i++) {
    if (liveBoard[i].score > myScore) ahead++; else break;
  }
  return ahead + 1;
}

// ── SHARE CARD (client-side PNG render) ─────────────────────────────────────
// Renders 1200x630 OG-canonical PNG with brand + score + rank + URL.
// Web Share API on mobile (with file), download fallback elsewhere.
function generateShareCardBlob() {
  return new Promise(function(resolve) {
    var c = document.createElement('canvas');
    c.width = 1200; c.height = 630;
    var x = c.getContext('2d');

    // Background - neon synthwave gradient matching Daily Dodge's vibe
    var bgGrad = x.createLinearGradient(0, 0, 1200, 630);
    bgGrad.addColorStop(0, '#0a0a14');
    bgGrad.addColorStop(0.5, '#1a0a2a');
    bgGrad.addColorStop(1, '#0a0a14');
    x.fillStyle = bgGrad;
    x.fillRect(0, 0, 1200, 630);

    // Decorative grid (synthwave horizon)
    x.strokeStyle = 'rgba(77,208,225,0.2)';
    x.lineWidth = 1;
    for (var gx = 0; gx <= 1200; gx += 60) {
      x.beginPath(); x.moveTo(gx, 0); x.lineTo(gx, 630); x.stroke();
    }
    for (var gy = 0; gy <= 630; gy += 60) {
      x.beginPath(); x.moveTo(0, gy); x.lineTo(1200, gy); x.stroke();
    }

    // Brand mark - top-left
    x.fillStyle = '#4dd0e1';
    x.font = 'bold 24px -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif';
    x.textBaseline = 'top';
    x.textAlign = 'left';
    x.fillText(t('shareBrand'), 60, 60);

    // Game title
    x.fillStyle = '#fff';
    x.font = 'bold 88px -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif';
    x.shadowColor = 'rgba(77,208,225,0.6)';
    x.shadowBlur = 30;
    x.fillText(t('shareTitle'), 60, 160);
    x.shadowColor = 'transparent'; x.shadowBlur = 0;

    // Score (prominent)
    x.fillStyle = '#FFD700';
    x.font = 'bold 140px -apple-system, BlinkMacSystemFont, sans-serif';
    var scoreText = elapsed.toFixed(1) + 's';
    x.fillText(scoreText, 60, 280);
    var scoreWidth = x.measureText(scoreText).width;

    // "I survived" label above score
    x.fillStyle = '#9ab';
    x.font = '24px -apple-system, BlinkMacSystemFont, sans-serif';
    x.textBaseline = 'bottom';
    x.fillText(t('shareSurvived'), 60, 280);

    // Rank if available - VECTOR trophy glyph (no emoji; this PNG renders on
    // headless Chrome where emoji = tofu, Build Hygiene #1).
    x.textBaseline = 'top';
    if (myRank) {
      x.save();
      x.translate(60 + 16, 440 + 18); x.scale(20/14, 20/14);
      x.fillStyle = '#FFD700'; x.strokeStyle = '#FFD700'; x.lineWidth = 1.8;
      x.beginPath(); x.moveTo(-7,-8.4); x.lineTo(7,-8.4); x.lineTo(5,1.4); x.quadraticCurveTo(0,5.6,-5,1.4); x.closePath(); x.fill();
      x.beginPath(); x.arc(-7,-4.9,3.9,Math.PI*0.5,Math.PI*1.5); x.stroke();
      x.beginPath(); x.arc(7,-4.9,3.9,-Math.PI*0.5,Math.PI*0.5); x.stroke();
      x.beginPath(); x.moveTo(0,5.6); x.lineTo(0,9.2); x.stroke(); x.fillRect(-5.6,9.2,11.2,2.8);
      x.restore();
      x.fillStyle = '#48c9b0';
      x.font = 'bold 36px -apple-system, BlinkMacSystemFont, sans-serif';
      x.textAlign = 'left';
      x.fillText(t('shareRanked').replace('{rank}', myRank), 60 + 44, 440);
    }

    // Day seed
    x.fillStyle = '#5a5a72';
    x.font = '20px monospace';
    x.fillText(t('shareSeed').replace('{seed}', seed), 60, myRank ? 490 : 460);

    // URL bottom-right
    x.fillStyle = '#4dd0e1';
    x.font = 'bold 28px -apple-system, BlinkMacSystemFont, sans-serif';
    x.textAlign = 'right';
    x.textBaseline = 'bottom';
    x.fillText(t('shareCta'), 1140, 570);

    // Bottom hairline
    x.strokeStyle = 'rgba(77,208,225,0.4)';
    x.lineWidth = 2;
    x.beginPath(); x.moveTo(60, 590); x.lineTo(1140, 590); x.stroke();

    c.toBlob(function(blob) { resolve(blob); }, 'image/png', 0.92);
  });
}

function shareScoreCard() {
  generateShareCardBlob().then(function(blob) {
    if (!blob) return;
    var fileName = 'daily-dodge-' + getDayKey() + '-' + (playerName || 'me').replace(/\W/g, '_') + '.png';
    var file = new File([blob], fileName, { type: 'image/png' });

    // Try Web Share API with file (mobile + recent desktop)
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({
        files: [file],
        title: 'Daily Dodge - ' + elapsed.toFixed(1) + 's',
        text: "I survived " + elapsed.toFixed(1) + "s on today's Daily Dodge. Beat my score: game-factory.tech/p/daily_dodge",
      }).catch(function() { /* user cancelled - ignore */ });
      return;
    }

    // Fallback: trigger a download + copy URL to clipboard
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);

    // Also copy a shareable text to clipboard
    var shareText = "I survived " + elapsed.toFixed(1) + "s on today's Daily Dodge. Beat my score: https://game-factory.tech/p/daily_dodge";
    if (navigator.clipboard) {
      navigator.clipboard.writeText(shareText).catch(function(){});
    }
  });
}

function submitAndFetchLeaderboard() {
  var name = ensurePlayerName();
  var date = runMode === 'ENDLESS' ? 'all' : getDayKey();
  if (!name) { fetchLeaderboard(); return; }
  fetch('/api/scores', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ slug: leaderboardSlug(), date: date, name: name, score: score }),
    keepalive: true,
  })
  .then(function(r) { return r.ok ? r.json() : null; })
  .then(function(data) {
    if (data && data.rank) myRank = data.rank;
    return fetchLeaderboard();
  })
  .catch(function() { fetchLeaderboard(); });
}

// ════════════════════════════════════════════════════════════════════════════
// ── VECTOR ICONS (milestone) - NEVER emoji (tofu on headless/Android, Build ──
// Hygiene #1). Each draws centered at (x,y) sized to radius r in color col.
// ════════════════════════════════════════════════════════════════════════════
function drawIconCore(x, y, r, col) {
  // the Cores currency - a faceted hex gem
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  for (var i=0;i<6;i++){ var a=-Math.PI/2 + i*Math.PI/3; var px=Math.cos(a)*r, py=Math.sin(a)*r; if(i)ctx.lineTo(px,py); else ctx.moveTo(px,py); }
  ctx.closePath();
  var g = ctx.createLinearGradient(0,-r,0,r); g.addColorStop(0,'#fff7c0'); g.addColorStop(1, col||'#FFD700');
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = Math.max(1, r*0.12); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = Math.max(1, r*0.08);
  ctx.beginPath(); ctx.moveTo(0,-r); ctx.lineTo(0,r); ctx.moveTo(-r*0.86,-r*0.5); ctx.lineTo(r*0.86,r*0.5); ctx.stroke();
  ctx.restore();
}
function drawIconSound(x, y, r, col, muted) {
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle = col; ctx.strokeStyle = col; ctx.lineWidth = Math.max(1.4, r*0.16); ctx.lineCap='round';
  // speaker body
  ctx.beginPath();
  ctx.moveTo(-r*0.85,-r*0.32); ctx.lineTo(-r*0.35,-r*0.32); ctx.lineTo(r*0.1,-r*0.7);
  ctx.lineTo(r*0.1,r*0.7); ctx.lineTo(-r*0.35,r*0.32); ctx.lineTo(-r*0.85,r*0.32); ctx.closePath(); ctx.fill();

    ctx.beginPath(); ctx.moveTo(r*0.35,-r*0.4); ctx.lineTo(r*0.85,r*0.4); ctx.moveTo(r*0.85,-r*0.4); ctx.lineTo(r*0.35,r*0.4); ctx.stroke();

function drawIconFlame(x, y, r, col) {
  ctx.save(); ctx.translate(x,y);

// Gear icon - switches on the gear id so each piece reads distinctly. Vector only.
function drawGearIcon(id, x, y, r, col) {
  ctx.save(); ctx.translate(x,y);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (id === 'shield' || id === 'aegis') {
    var g = ctx.createLinearGradient(0,-r,0,r); g.addColorStop(0,'#dffaff'); g.addColorStop(1, col);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.moveTo(0,-r); ctx.lineTo(r*0.8,-r*0.55); ctx.lineTo(r*0.8,r*0.25);
    ctx.quadraticCurveTo(r*0.5,r, 0,r); ctx.quadraticCurveTo(-r*0.5,r,-r*0.8,r*0.25); ctx.lineTo(-r*0.8,-r*0.55); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = Math.max(1.3,r*0.13);
    ctx.beginPath(); ctx.moveTo(0,-r*0.5); ctx.lineTo(0,r*0.5); ctx.stroke();
    if (id==='aegis'){ ctx.beginPath(); ctx.moveTo(-r*0.4,0); ctx.lineTo(r*0.4,0); ctx.stroke(); }
  } else if (id === 'magnet') {
    // a horseshoe magnet - the "grazer"
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(2, r*0.34);
    ctx.beginPath(); ctx.arc(0,0, r*0.6, Math.PI, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r*0.6,0); ctx.lineTo(-r*0.6,r*0.55); ctx.moveTo(r*0.6,0); ctx.lineTo(r*0.6,r*0.55); ctx.stroke();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(1.4,r*0.16);
    ctx.beginPath(); ctx.moveTo(-r*0.6,r*0.55); ctx.lineTo(-r*0.6,r*0.78); ctx.moveTo(r*0.6,r*0.55); ctx.lineTo(r*0.6,r*0.78); ctx.stroke();
  } else if (id === 'coremag') {
    drawIconCore(0,0,r*0.92, col);
  } else if (id === 'slow') {
    // a clock - Time Warp
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(1.6,r*0.16);
    ctx.beginPath(); ctx.arc(0,0,r*0.82,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-r*0.5); ctx.moveTo(0,0); ctx.lineTo(r*0.4,r*0.15); ctx.stroke();
  } else if (id === 'dash') {
    // a lightning bolt - Phase Dash
    var g2 = ctx.createLinearGradient(0,-r,0,r); g2.addColorStop(0,'#fff'); g2.addColorStop(1,col);
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.moveTo(r*0.18,-r); ctx.lineTo(-r*0.5,r*0.18); ctx.lineTo(-r*0.02,r*0.18);
    ctx.lineTo(-r*0.22,r); ctx.lineTo(r*0.55,-r*0.2); ctx.lineTo(r*0.05,-r*0.2); ctx.closePath(); ctx.fill();
  } else if (id === 'overdrive') {
    // a starburst - Overdrive
    ctx.fillStyle = col;
    ctx.beginPath();
    for (var i=0;i<10;i++){ var a=-Math.PI/2 + i*Math.PI/5; var rad=(i%2?r*0.42:r); var px=Math.cos(a)*rad, py=Math.sin(a)*rad; if(i)ctx.lineTo(px,py); else ctx.moveTo(px,py); }
    ctx.closePath(); ctx.fill();
  } else {
    ctx.fillStyle = col; ctx.beginPath(); ctx.arc(0,0,r*0.7,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
function gearName(d) { return lang==='ru' ? d.ru : d.en; }

// ── DRAW ────────────────────────────────────────────────────────────────────
function drawArenaBg() {
  var ar = arena();
  // grid
  ctx.fillStyle = '#0c0c1c';
  ctx.fillRect(ar.x, ar.y, ar.w, ar.h);
  ctx.strokeStyle = 'rgba(72,201,176,0.10)';
  ctx.lineWidth = 1;
  var g = 50 * S;
  for (var x = ar.x; x <= ar.x + ar.w; x += g) {
    ctx.beginPath(); ctx.moveTo(x, ar.y); ctx.lineTo(x, ar.y+ar.h); ctx.stroke();
  }
  for (var y = ar.y; y <= ar.y + ar.h; y += g) {
    ctx.beginPath(); ctx.moveTo(ar.x, y); ctx.lineTo(ar.x+ar.w, y); ctx.stroke();
  }
  // border
  ctx.strokeStyle = 'rgba(120,200,255,0.18)';
  ctx.lineWidth = 2;
  ctx.strokeRect(ar.x, ar.y, ar.w, ar.h);

  // center logo (subtle day seed)

  ctx.fillText(t('daySeed') + ' ' + seed, ar.x + ar.w/2, ar.y + ar.h - 14*S);
}

function drawBullet(b) {
  ctx.save();
  ctx.translate(b.x, b.y);

  if (b.kind === 0) {
    // normal - red diamond
    ctx.shadowColor = b.color; ctx.shadowBlur = 8*S;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.moveTo(0, -b.r); ctx.lineTo(b.r, 0); ctx.lineTo(0, b.r); ctx.lineTo(-b.r, 0);
    ctx.closePath(); ctx.fill();
  } else if (b.kind === 1) {
    // small fast - orange dart
    ctx.shadowColor = b.color; ctx.shadowBlur = 6*S;
    ctx.fillStyle = b.color;
    var ang = Math.atan2(b.vy, b.vx);
    ctx.rotate(ang);
    ctx.beginPath();
    ctx.moveTo(b.r * 1.4, 0);
    ctx.lineTo(-b.r * 0.6, b.r * 0.8);
    ctx.lineTo(-b.r * 0.4, 0);
    ctx.lineTo(-b.r * 0.6, -b.r * 0.8);
    ctx.closePath(); ctx.fill();
  } else if (b.kind === 2) {
    // heavy slow - purple orb with halo
    ctx.fillStyle = 'rgba(155,89,182,0.25)';
    ctx.beginPath(); ctx.arc(0, 0, b.r * 1.6, 0, Math.PI*2); ctx.fill();
    ctx.shadowColor = b.color; ctx.shadowBlur = 12*S;
    var grd = ctx.createRadialGradient(-b.r*0.3, -b.r*0.3, 0, 0, 0, b.r);
    grd.addColorStop(0, '#d4a4f0'); grd.addColorStop(1, b.color);
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(0, 0, b.r, 0, Math.PI*2); ctx.fill();
  } else {
    // spinner - teal spiked star
    ctx.shadowColor = b.color; ctx.shadowBlur = 10*S;
    ctx.fillStyle = b.color;
    ctx.rotate(b.spinPhase);
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var a1 = (i/6) * Math.PI*2;
      var a2 = ((i+0.5)/6) * Math.PI*2;
      ctx.lineTo(Math.cos(a1)*b.r*1.1, Math.sin(a1)*b.r*1.1);
      ctx.lineTo(Math.cos(a2)*b.r*0.5, Math.sin(a2)*b.r*0.5);
    }
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

// ── iter#7 - Virtual joystick visual (mobile only; only while finger down) ──
// Shows the player where their finger started + where it's dragged to, so the
// offset-joystick model is discoverable. Skipped on desktop (mouse) entirely.
function drawJoystick() {
  if (!touch.active) return;
  var baseR = 36 * S;
  var thumbR = 18 * S;
  // base ring at start
  ctx.strokeStyle = 'rgba(77,208,225,0.45)';
  ctx.lineWidth = 2*S;
  ctx.beginPath(); ctx.arc(touch.startX, touch.startY, baseR, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'rgba(77,208,225,0.10)';
  ctx.beginPath(); ctx.arc(touch.startX, touch.startY, baseR, 0, Math.PI*2); ctx.fill();
  // thumb capped to base radius
  var dx = touch.x - touch.startX, dy = touch.y - touch.startY;
  var L = Math.sqrt(dx*dx + dy*dy);
  var tx2, ty2;
  if (L < 1) { tx2 = touch.startX; ty2 = touch.startY; }
  else {
    var cap = Math.min(L, baseR);
    tx2 = touch.startX + (dx/L) * cap;
    ty2 = touch.startY + (dy/L) * cap;
  }
  ctx.fillStyle = 'rgba(77,208,225,0.85)';
  ctx.beginPath(); ctx.arc(tx2, ty2, thumbR, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 1.5*S;
  ctx.beginPath(); ctx.arc(tx2, ty2, thumbR, 0, Math.PI*2); ctx.stroke();
}

function drawPlayer() {
  var r = PLAYER_R * S;
  var sk = activeSkin();
  // halo
  ctx.fillStyle = sk.halo;
  ctx.beginPath(); ctx.arc(player.x, player.y, r * 2.2, 0, Math.PI*2); ctx.fill();
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(player.x, player.y + r*0.6, r*0.9, r*0.35, 0, 0, Math.PI*2); ctx.fill();
  // body
  ctx.shadowColor = sk.glow; ctx.shadowBlur = 12*S;
  var grd = ctx.createRadialGradient(player.x - r*0.3, player.y - r*0.3, 0, player.x, player.y, r);
  grd.addColorStop(0, sk.inner); grd.addColorStop(1, sk.outer);
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(player.x, player.y, r, 0, Math.PI*2); ctx.fill();
  ctx.shadowColor = 'transparent';
  // ring
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5*S;
  ctx.beginPath(); ctx.arc(player.x, player.y, r * 0.7, 0, Math.PI*2); ctx.stroke();
  // iter - visible rewarded-revive SHIELD (Yandex п.4.5.1: the reward must be
  // obvious). Pulsing gold ring while the 4s grant is active, so the player
  // can SEE the extra life they earned from the ad.
  var nowSec = performance.now() / 1000;
  if (invulnUntil > nowSec) {
    var remain = invulnUntil - nowSec;
    var pulse = 0.55 + 0.45 * Math.sin(nowSec * 9);
    ctx.save();
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 16*S;
    ctx.strokeStyle = 'rgba(255,215,0,' + (0.45 + 0.45 * pulse).toFixed(3) + ')';
    ctx.lineWidth = 2.6*S;
    ctx.beginPath(); ctx.arc(player.x, player.y, r * 1.7, 0, Math.PI*2); ctx.stroke();
    // depleting arc shows how much shield time is left (of 4s)
    ctx.strokeStyle = '#FFE066'; ctx.lineWidth = 3.2*S;
    ctx.beginPath();
    ctx.arc(player.x, player.y, r * 2.05, -Math.PI/2, -Math.PI/2 + Math.PI*2*(remain/4.0));
    ctx.stroke();
    ctx.restore();
  }
}

// iter - rewarded-revive confirmation banner (Yandex п.4.5.1: reward must be
// clear). Fires for ~2.2s right after the ad grants the extra life, centred
// and unmissable, so the player understands exactly what they got.
function drawReviveBanner() {
  var nowSec = performance.now() / 1000;
  if (reviveBannerUntil <= nowSec) return;
  var tleft = reviveBannerUntil - nowSec;
  var alpha = Math.min(1, tleft / 0.4);   // quick fade-out in the last 0.4s
  var fs = clamp(26*S, 18, 38);
  var bw = clamp(360*S, 240, 460), bh2 = clamp(56*S, 44, 70);
  var bx = cx - bw/2, by = (HUD_H * S) + clamp(18*S, 12, 30);
  ctx.save();
  ctx.globalAlpha = alpha;
  rr(ctx, bx, by, bw, bh2, bh2/2);
  var g = ctx.createLinearGradient(bx, by, bx, by + bh2);
  g.addColorStop(0, 'rgba(40,32,4,0.95)'); g.addColorStop(1, 'rgba(20,16,2,0.95)');
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2*S; ctx.stroke();
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 14*S;
  ctx.fillStyle = '#FFE066'; ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(t('reviveGranted'), cx, by + bh2/2);
  ctx.restore();
  ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'center';
}

function drawHUD() {
  var inset = platformSafeInsets();
  var bh = HUD_H * S;
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, W, bh);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, bh); ctx.lineTo(W, bh); ctx.stroke();

  // Reserve the compact mute button's top-right footprint during PLAYING so the
  // SCORE label/value never overlaps it (Yandex 1.10.3). Mirrors drawMuteButton's
  // compact width (clamp(38*S,30,46)) + its pad (clamp(10*S,6,16)) + an 8*S gap.
  var muteReserve = (gs === 'PLAYING') ? (clamp(10*S,6,16) + clamp(38*S,30,46) + 8*S) : 0;
  var pad = 14*S, rightX = W - pad - inset.right - muteReserve, fs = clamp(13*S, 11, 17), fy = bh*0.78;
  var bigFs = clamp(18*S, 14, 24);
  ctx.textBaseline = 'alphabetic';

  // time elapsed (left)
  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(t('time'), pad, bh*0.42);
  ctx.fillStyle = '#fff'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(elapsed.toFixed(1)+t('sec'), pad, fy);

  // today best (center) - endless mode shows endless all-time best instead
  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(runMode === 'ENDLESS' ? t('endlessBest') : t('best'), cx, bh*0.42);
  ctx.fillStyle = runMode === 'ENDLESS' ? '#ff5a8c' : '#48c9b0';
  ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(runMode === 'ENDLESS' ? endlessBest : todayBest, cx, fy);

  // current score (right)
  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(t('score'), rightX, bh*0.42);
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(Math.floor(elapsed * 10) + Math.floor(comboBonus), rightX, fy);

  // bottom timer bar - only in DAILY mode (endless has no fixed end)
  if (runMode === 'DAILY') {
    var tw = clamp(W*0.5, 200, 600), th = 6*S;
    var tx = cx - tw/2, ty = H - inset.bottom - 14*S;
    rr(ctx, tx, ty, tw, th, th/2);
    ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill();
    rr(ctx, tx, ty, tw * (elapsed / GAME_DURATION), th, th/2);
    ctx.fillStyle = '#48c9b0'; ctx.fill();
  } else {
    // Endless badge bottom-center
    ctx.font = 'bold '+clamp(11*S,9,14)+'px sans-serif';
    ctx.fillStyle = 'rgba(255,90,140,0.65)';
    ctx.textAlign = 'center';
    ctx.fillText('- ' + t('endless') + ' -', cx, H - inset.bottom - 14*S);
  }

  // Streak flame in HUD top-left corner (under the time block) if >= 3 days.
  // VECTOR flame icon (Build Hygiene #1) + the day count.
  if (streak.current >= 3) {
    var flR = clamp(7*S, 6, 10);
    drawIconFlame(pad + flR, bh + 4*S + flR, flR, '#ff8a3d');
    ctx.font = 'bold ' + clamp(11*S,9,14) + 'px sans-serif';
    ctx.fillStyle = '#ff8a3d';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(String(streak.current), pad + flR*2 + 4*S, bh + 4*S + flR + 1);
    ctx.textBaseline = 'alphabetic';
  }

  // ── Live daily rank pill (just below HUD, top-center) ────────────────────
  // Adds *social* pressure during play: shows your projected position vs
  // everyone else who's run today's seed already.
  if (liveRank && liveRank > 0) {
    var pillTxt = (lang === 'ru' ? '#' : '#') + liveRank + ' / ' + liveBoard.length;
    var labelTxt = (lang === 'ru' ? 'МЕСТО' : 'RANK');
    var pillFs = clamp(13*S, 11, 17);
    var lblFs  = clamp(10*S, 8, 13);
    ctx.font = 'bold ' + pillFs + 'px sans-serif';
    var pw = ctx.measureText(pillTxt).width + clamp(46*S, 36, 64);
    var ph = clamp(24*S, 20, 32);
    var px = cx - pw/2, py = bh + 6*S;
    rr(ctx, px, py, pw, ph, ph/2);
    ctx.fillStyle = liveRank === 1 ? 'rgba(255,215,0,0.18)' : 'rgba(72,201,176,0.14)';
    ctx.strokeStyle = liveRank === 1 ? 'rgba(255,215,0,0.6)' : 'rgba(72,201,176,0.5)';
    ctx.lineWidth = 1.2*S;
    ctx.fill(); ctx.stroke();
    // label inside pill, left
    ctx.font = 'bold ' + lblFs + 'px sans-serif';
    ctx.fillStyle = '#557';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(labelTxt, px + clamp(10*S, 8, 14), py + ph/2);
    // value, right
    ctx.font = 'bold ' + pillFs + 'px sans-serif';
    ctx.fillStyle = liveRank === 1 ? '#FFD700' : '#48c9b0';
    ctx.textAlign = 'right';
    ctx.fillText(pillTxt, px + pw - clamp(10*S, 8, 14), py + ph/2);
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
  }

  // ── Combo pill (iter#4) - visible only while a streak is alive ──────────
  // Sits on the right edge under the HUD, mirrors the live-rank pill on the
  // left/center. Width pulses on each new close-call (comboFlash decays).
  if (comboCount >= 2) {
    var cFs = clamp(13*S, 11, 17);
    var cLblFs = clamp(10*S, 8, 13);
    ctx.font = 'bold ' + cFs + 'px sans-serif';
    var valTxt = '×' + comboCount;
    var cw = ctx.measureText(valTxt).width + clamp(58*S, 44, 76);
    var ch = clamp(24*S, 20, 32);
    var pulse = 1 + comboFlash * 0.12;
    var cwp = cw * pulse, chp = ch * pulse;
    var cxp = rightX - cwp, cyp = bh + 6*S - (chp - ch)/2;
    rr(ctx, cxp, cyp, cwp, chp, chp/2);
    var hot = comboCount >= 5;
    ctx.fillStyle = hot ? 'rgba(255,90,140,0.20)' : 'rgba(255,215,0,0.16)';
    ctx.strokeStyle = hot ? 'rgba(255,90,140,0.7)' : 'rgba(255,215,0,0.6)';
    ctx.lineWidth = 1.2*S;
    ctx.fill(); ctx.stroke();
    ctx.font = 'bold ' + cLblFs + 'px sans-serif';
    ctx.fillStyle = '#776';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(t('combo'), cxp + clamp(10*S, 8, 14), cyp + chp/2);
    ctx.font = 'bold ' + cFs + 'px sans-serif';
    ctx.fillStyle = hot ? '#ff5a8c' : '#FFD700';
    ctx.textAlign = 'right';
    ctx.fillText(valTxt, cxp + cwp - clamp(10*S, 8, 14), cyp + chp/2);
    // tiny depleting timer arc under the pill
    var frac = clamp(comboTimer / COMBO_WINDOW, 0, 1);
    var bw = cwp * 0.7, bh2 = 2.5*S;
    var bx = cxp + (cwp - bw)/2, by = cyp + chp + 3*S;
    rr(ctx, bx, by, bw, bh2, bh2/2);
    ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();
    rr(ctx, bx, by, bw * frac, bh2, bh2/2);
    ctx.fillStyle = hot ? '#ff5a8c' : '#FFD700'; ctx.fill();
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
  }

  // ── iter#8 - Bomb pill (under the combo pill on the right edge) ──────────
  // Armed at combo ≥ BOMB_THRESHOLD. Pulses to signal "ready". Tap or press
  // Space to detonate. The bombsUsed-this-run counter on the right edge
  // surfaces how aggressive your run has been.
  if (comboCount >= BOMB_THRESHOLD || bombsUsed > 0) {
    var armed = comboCount >= BOMB_THRESHOLD;
    var bFs = clamp(13*S, 11, 17);
    var bLblFs = clamp(9*S, 8, 12);
    ctx.font = 'bold ' + bFs + 'px sans-serif';
    var bvalTxt = armed ? '!' : ('×' + bombsUsed);
    var bw3 = ctx.measureText(bvalTxt).width + clamp(70*S, 56, 92);
    var bh3 = clamp(24*S, 20, 32);
    var pulseAmt = armed ? (1 + 0.12 * (0.5 + 0.5 * Math.sin(bombHintPulse * 2))) : 1;
    var bw3p = bw3 * pulseAmt, bh3p = bh3 * pulseAmt;
    var bxp = rightX - bw3p, byp = bh + 6*S + clamp(34*S, 26, 42); // sit under combo pill
    rr(ctx, bxp, byp, bw3p, bh3p, bh3p/2);
    ctx.fillStyle = armed ? 'rgba(255,255,255,0.22)' : 'rgba(110,140,170,0.10)';
    ctx.strokeStyle = armed ? 'rgba(255,255,255,0.85)' : 'rgba(150,180,210,0.4)';
    ctx.lineWidth = 1.2*S;
    ctx.fill(); ctx.stroke();
    ctx.font = 'bold ' + bLblFs + 'px sans-serif';
    ctx.fillStyle = armed ? '#fff' : '#557';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(t('bomb'), bxp + clamp(10*S, 8, 14), byp + bh3p/2);
    ctx.font = 'bold ' + bFs + 'px sans-serif';
    ctx.fillStyle = armed ? '#fff' : '#7a8aa3';
    ctx.textAlign = 'right';
    ctx.fillText(bvalTxt, bxp + bw3p - clamp(10*S, 8, 14), byp + bh3p/2);
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
    // Persist pill rect for tap hit-test (touchstart). Only when armed.
    bombBtnRect = armed ? { x: bxp, y: byp, w: bw3p, h: bh3p } : null;
    // Tiny "TAP / SPACE" hint label below the pill when armed
    if (armed) {
      ctx.font = 'bold ' + clamp(8.5*S, 8, 11) + 'px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.textAlign = 'center';
      ctx.fillText(t('bombReady'), bxp + bw3p/2, byp + bh3p + clamp(10*S, 9, 14));
      ctx.textAlign = 'left';
    }
  } else {
    bombBtnRect = null;
  }

  // ════ milestone - META HUD: GEAR pill (mid-run access) + next-gear hint ════
  drawMetaHud();

  // ── iter#8 - Bomb detonation flash overlay ──────────────────────────────
  if (bombFlash > 0) {
    ctx.fillStyle = 'rgba(255,255,255,' + (bombFlash * 0.55).toFixed(3) + ')';
    ctx.fillRect(0, 0, W, H);
  }
}

// milestone - the in-run meta HUD. A GEAR pill (top-left, below the streak)
// opens the Loadout overlay WITHOUT losing (autostart-safe meta access, Build
// Hygiene #13); a "next gear in N min" hint sits bottom-left so the playtime
// ladder is ALWAYS a visible goal; shield pips show remaining charges.
function drawMetaHud() {
  var bh = HUD_H * S;
  var pad = 14*S;
  // ── GEAR pill (top-left, under the streak/time block) ──
  var pillFs = clamp(12*S, 10, 15);
  ctx.font = 'bold ' + pillFs + 'px sans-serif';
  var gtxt = (lang==='ru'?'СНАРЯЖ.':'GEAR');
  var icR = clamp(8*S, 7, 11);
  var gpw = icR*2 + 8*S + ctx.measureText(gtxt).width + 18*S;
  var gph = clamp(26*S, 22, 34);
  var gpx = pad, gpy = bh + (streak.current >= 3 ? clamp(26*S,20,34) : 6*S);
  loadoutBtnRect = { x: gpx, y: gpy, w: gpw, h: gph };
  rr(ctx, gpx, gpy, gpw, gph, gph/2);
  ctx.fillStyle = 'rgba(12,22,40,0.82)'; ctx.fill();
  ctx.lineWidth = 1.2*S; ctx.strokeStyle = 'rgba(120,200,255,0.5)'; ctx.stroke();
  drawGearIcon(meta.equipped[0] || 'shield', gpx + 12*S, gpy + gph/2, icR, '#9ee6f0');
  ctx.fillStyle = '#bfe6ff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + pillFs + 'px sans-serif';
  ctx.fillText(gtxt, gpx + 12*S + icR + 6*S, gpy + gph/2 + 1);
  // a claimable-quest badge on the pill
  var qc = questsClaimable();
  if (qc > 0) {
    var bgr = clamp(8*S, 7, 11);
    var bgx = gpx + gpw - bgr*0.7, bgy = gpy + bgr*0.5;
    ctx.beginPath(); ctx.arc(bgx, bgy, bgr, 0, Math.PI*2);
    ctx.fillStyle = '#ff5a8c'; ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + clamp(10*S,8,13) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.fillText(String(qc), bgx, bgy + 1);
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';

  // ── Shield pips next to the player (remaining charges this run) ──
  if (runShieldMax > 0) {
    var spR = clamp(4*S, 3, 6);
    var sp0 = player.x - (runShieldMax-1) * (spR*2.6)/2;
    for (var sp=0; sp<runShieldMax; sp++) {
      ctx.beginPath(); ctx.arc(sp0 + sp*spR*2.6, player.y - PLAYER_R*S - 12*S, spR, 0, Math.PI*2);
      ctx.fillStyle = sp < runShield ? '#4dd0e1' : 'rgba(80,110,140,0.35)';
      ctx.fill();
    }
  }

  // ── "next gear in N min" hint (bottom-left, above the timer bar) ──
  var ng = nextGear();
  if (ng) {
    var ngFs = clamp(11*S, 9, 14);
    ctx.font = 'bold ' + ngFs + 'px sans-serif';
    var mins = ng.minsLeft;
    var mtxt = mins >= 1 ? (Math.ceil(mins) + (lang==='ru'?' мин':'m')) : ('<1' + (lang==='ru'?' мин':'m'));
    var ngLabel = (lang==='ru'?'След. снаряж.: ':'Next gear: ');
    var ngIcR = clamp(7*S, 6, 10);
    var ngY = H - 30*S;
    drawGearIcon(ng.def.id, pad + ngIcR, ngY, ngIcR, ng.def.col);
    ctx.fillStyle = '#8fb0d8'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(ngLabel + gearName(ng.def) + '  ' + mtxt, pad + ngIcR*2 + 6*S, ngY);
    ctx.textBaseline = 'alphabetic';
  } else {
    // all gear owned - show Cores balance instead
    var cFs = clamp(11*S, 9, 14);
    ctx.font = 'bold ' + cFs + 'px sans-serif';
    drawIconCore(pad + clamp(7*S,6,10), H - 30*S, clamp(7*S,6,10), '#FFD700');
    ctx.fillStyle = '#ffe27a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(meta.cores + (lang==='ru'?' Ядер':' Cores'), pad + clamp(7*S,6,10)*2 + 6*S, H - 30*S);
    ctx.textBaseline = 'alphabetic';
  }

  // ── gear-unlock toast (center-top) ──
  var n = nowSec();
  if (newlyUnlockedGear && gearToastUntil > n) {
    var tA = Math.min(1, (gearToastUntil - n) / 0.5);
    var tFs = clamp(18*S, 14, 26);
    ctx.save(); ctx.globalAlpha = tA;
    var tw = clamp(360*S, 250, 460), th = clamp(54*S, 44, 70);
    var tx = cx - tw/2, ty = bh + clamp(40*S, 30, 56);
    rr(ctx, tx, ty, tw, th, 12*S);
    ctx.fillStyle = 'rgba(10,14,28,0.96)'; ctx.fill();
    ctx.lineWidth = 2*S; ctx.strokeStyle = newlyUnlockedGear.col; ctx.stroke();
    drawGearIcon(newlyUnlockedGear.id, tx + th*0.55, ty + th/2, clamp(13*S,10,18), newlyUnlockedGear.col);
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + clamp(12*S,10,15) + 'px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText((lang==='ru'?'НОВОЕ СНАРЯЖЕНИЕ':'GEAR UNLOCKED'), tx + th + 4*S, ty + th*0.36);
    ctx.fillStyle = newlyUnlockedGear.col; ctx.font = 'bold ' + clamp(15*S,12,20) + 'px sans-serif';
    ctx.fillText(gearName(newlyUnlockedGear), tx + th + 4*S, ty + th*0.70);
    ctx.restore();
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }
}

// ── milestone - GAME-OVER meta summary: "+N Cores earned" + the next-gear
// progress bar. The session-end hook (spec) - leaving plants the reason to
// return: you can SEE the gear you're climbing toward. Drawn under the EXTRA
// LIFE button on the GAMEOVER/CLEARED overlay. yBase = a safe Y below the buttons.
function drawGameOverMeta(yBase) {
  // "+N Cores earned this run" pill
  var pillFs = clamp(14*S, 11, 18);
  ctx.font = 'bold ' + pillFs + 'px sans-serif';
  var earnTxt = '+' + coresEarnedRun + (lang==='ru' ? ' Ядер' : ' Cores');
  var totTxt = (lang==='ru' ? 'всего ' : 'total ') + meta.cores;
  var icR = clamp(8*S, 7, 11);
  var earnW = ctx.measureText(earnTxt).width;
  var pillW = icR*2 + 10*S + earnW + 24*S;
  var pillH = clamp(34*S, 28, 44);
  var px = cx - pillW/2, py = yBase;
  rr(ctx, px, py, pillW, pillH, pillH/2);
  ctx.fillStyle = 'rgba(255,215,0,0.12)'; ctx.fill();
  ctx.lineWidth = 1.3*S; ctx.strokeStyle = 'rgba(255,215,0,0.55)'; ctx.stroke();
  drawIconCore(px + 14*S, py + pillH/2, icR, '#FFD700');
  ctx.fillStyle = '#ffe27a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(earnTxt, px + 14*S + icR + 8*S, py + pillH/2 + 1);
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  // total Cores subline
  ctx.font = clamp(10*S, 9, 13) + 'px sans-serif'; ctx.fillStyle = '#9a8a4a';
  ctx.fillText(totTxt, cx, py + pillH + clamp(13*S, 11, 16));

  // next-gear progress bar (the always-visible ladder goal)
  var ng = nextGear();
  var barY = py + pillH + clamp(26*S, 20, 34);
  var barW = clamp(300*S, 200, 380), barH = clamp(9*S, 7, 12);
  var bx = cx - barW/2;
  if (ng) {
    var prev = 0;
    // find the previous-owned threshold so the bar shows progress within the current gap
    for (var i=0;i<GEAR.length;i++){ if (ownsGear(GEAR[i].id)) prev = GEAR[i].min; }
    var cur = livePlaySec()/60;
    var frac = clamp((cur - prev) / (ng.def.min - prev), 0, 1);
    ctx.font = 'bold ' + clamp(11*S,9,14) + 'px sans-serif';
    ctx.fillStyle = '#8fb0d8'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    var minsLeft = ng.minsLeft >= 1 ? (Math.ceil(ng.minsLeft) + (lang==='ru'?' мин':'m')) : ('<1'+(lang==='ru'?' мин':'m'));
    ctx.fillText((lang==='ru'?'Следующее снаряжение: ':'Next gear: ') + gearName(ng.def) + ' - ' + minsLeft, cx, barY);
    var by2 = barY + clamp(8*S, 6, 11);
    rr(ctx, bx, by2, barW, barH, barH/2); ctx.fillStyle = 'rgba(255,255,255,0.10)'; ctx.fill();
    rr(ctx, bx, by2, barW*frac, barH, barH/2); ctx.fillStyle = ng.def.col; ctx.fill();
    // gear icon at the end of the bar
    drawGearIcon(ng.def.id, bx + barW + clamp(12*S,9,16), by2 + barH/2, clamp(8*S,6,11), ng.def.col);
  } else {
    ctx.font = 'bold ' + clamp(11*S,9,14) + 'px sans-serif';
    ctx.fillStyle = '#8fb0d8'; ctx.textAlign = 'center';
    ctx.fillText((lang==='ru'?'Всё снаряжение открыто - улучшай в СНАРЯЖЕНИИ':'All gear unlocked - upgrade it in LOADOUT'), cx, barY);
  }
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
}

// ── milestone - the hands-on tutorial HUD: an animated demo HAND performing the
// step's gesture + a slim caption pill naming it (Build Hygiene #10, Tim's
// "the hand is the good UX"). Drawn over the live run during the lesson steps.
function _tutHand(hx, hy, press) {
  // a small vector hand (pointing finger) with a press ripple
  ctx.save();
  ctx.translate(hx, hy);
  var s = clamp(S, 0.6, 1.6);
  if (press) {
    ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2*s;
    ctx.beginPath(); ctx.arc(0, 0, 16*s, 0, Math.PI*2); ctx.stroke();
  }
  // wrist/palm
  ctx.fillStyle = '#f3d9c0';
  rr(ctx, -8*s, 2*s, 16*s, 20*s, 6*s); ctx.fill();
  // index finger up
  ctx.fillStyle = '#ffe8d4';
  rr(ctx, -3*s, -16*s, 7*s, 22*s, 3.5*s); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 1.2*s;
  rr(ctx, -8*s, 2*s, 16*s, 20*s, 6*s); ctx.stroke();
  ctx.restore();
}
function drawTutorialHud() {
  if (!TUT.active) return;
  var hint = tutHandHint();
  // demo hand animation: for a drag, loop from->to along a dashed path; tap = press ripple.
  if (hint) {
    var ph = (TUT.t % 1.6) / 1.6;     // 0..1 loop
    if (hint.gesture === 'drag') {
      // dashed path from -> to
      ctx.save();
      ctx.setLineDash([6*S, 6*S]);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 2*S;
      ctx.beginPath(); ctx.moveTo(hint.from.x, hint.from.y); ctx.lineTo(hint.to.x, hint.to.y); ctx.stroke();
      ctx.setLineDash([]);
      // grab ring at from, drop ring at to
      ctx.strokeStyle = 'rgba(255,210,90,0.8)'; ctx.lineWidth = 2.4*S;
      ctx.beginPath(); ctx.arc(hint.from.x, hint.from.y, 14*S, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = 'rgba(120,255,170,0.8)'; ctx.lineWidth = 2.4*S;
      ctx.beginPath(); ctx.arc(hint.to.x, hint.to.y, 14*S, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
      // hand travels along the path
      var hx = hint.from.x + (hint.to.x - hint.from.x) * ph;
      var hy = hint.from.y + (hint.to.y - hint.from.y) * ph;
      _tutHand(hx + 10*S, hy + 10*S, ph < 0.12 || ph > 0.88);
    } else {
      var pr = (TUT.t % 1.2) < 0.5;
      _tutHand(hint.from.x + 10*S, hint.from.y + 10*S, pr);
    }
  }
  // caption pill - slim, anchored near the top of the arena (not a full panel)
  var caps = {
    en: ['Drag anywhere to STEER', 'Skim PAST a bullet to GRAZE', 'Now SURVIVE the stream!'],
    ru: ['Тащи, чтобы РУЛИТЬ', 'Пройди ВПЛОТНУЮ для КАСАНИЯ', 'Теперь ВЫЖИВИ в потоке!'],
  };
  var cap = (caps[lang] || caps.en)[clamp(TUT.step, 0, 2)];
  var capFs = clamp(15*S, 12, 20);
  ctx.font = 'bold ' + capFs + 'px sans-serif';
  var cw = ctx.measureText(cap).width + clamp(36*S, 26, 50);
  var chh = clamp(36*S, 30, 46);
  var ar2 = arena();
  var cxp = cx - cw/2, cyp = ar2.y + clamp(22*S, 14, 34);
  rr(ctx, cxp, cyp, cw, chh, chh/2);
  ctx.fillStyle = 'rgba(8,10,22,0.92)'; ctx.fill();
  ctx.lineWidth = 1.4*S; ctx.strokeStyle = 'rgba(77,208,225,0.6)'; ctx.stroke();
  ctx.fillStyle = '#dff1ff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(cap, cx, cyp + chh/2 + 1);
  // step pips under the pill
  var pipR = clamp(3.5*S, 3, 5), pipGap = clamp(10*S, 8, 14);
  var pipsW = TUT.STEPS*(pipR*2) + (TUT.STEPS-1)*pipGap;
  var pip0 = cx - pipsW/2 + pipR;
  for (var p=0;p<TUT.STEPS;p++) {
    ctx.beginPath(); ctx.arc(pip0 + p*(pipR*2+pipGap), cyp + chh + clamp(10*S,8,14), pipR, 0, Math.PI*2);
    ctx.fillStyle = (p === TUT.step) ? '#4dd0e1' : 'rgba(120,140,170,0.4)'; ctx.fill();
  }
  // light scrim so the board stays visible but the lesson reads (~0.18)
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

// ════════════════════════════════════════════════════════════════════════════
// ── LOADOUT OVERLAY (milestone) - the meta hub: GEAR / QUESTS / EXTRAS ───────
// ════════════════════════════════════════════════════════════════════════════
// Fully OPAQUE (Build Hygiene #12) sub-panel drawn over the menu OR a paused run.
// Reachable mid-run via the HUD GEAR pill, so an autostart player (no menu) can
// still reach the whole meta. Pushes its own controls into buttons[] (cleared +
// repopulated here because drawOverlay does not run during PLAYING).
function drawLoadout() {
  buttons = [];                                  // take over input
  // opaque full-screen fill (no bleed-through, Build Hygiene #12)
  ctx.fillStyle = '#06070f';
  ctx.fillRect(0, 0, W, H);

  var marginX = clamp(20*S, 12, 40);
  var topY = clamp(20*S, 12, 30);
  var colW = W - marginX*2;

  // ── header: title + Cores balance + close ──
  var titleFs = clamp(22*S, 17, 30);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(lang==='ru'?'СНАРЯЖЕНИЕ':'LOADOUT', marginX, topY);
  // Cores balance, top-right (icon + number)
  var balFs = clamp(17*S, 13, 22);
  ctx.font = 'bold ' + balFs + 'px sans-serif';
  var balTxt = String(meta.cores);
  var balIcR = clamp(9*S, 7, 12);
  var balTxtW = ctx.measureText(balTxt).width;
  var closeR = clamp(16*S, 13, 22);
  var balRight = W - marginX - closeR*2 - 10*S;
  drawIconCore(balRight - balTxtW - balIcR - 6*S, topY + balFs*0.5, balIcR, '#FFD700');
  ctx.fillStyle = '#ffe27a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(balTxt, balRight - balTxtW, topY + balFs*0.5);
  // close (X) button, top-right corner
  var clX = W - marginX - closeR, clY = topY + closeR*0.4;
  ctx.strokeStyle = '#9ab'; ctx.lineWidth = 2.4*S; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(clX-closeR*0.4, clY-closeR*0.4); ctx.lineTo(clX+closeR*0.4, clY+closeR*0.4);
  ctx.moveTo(clX+closeR*0.4, clY-closeR*0.4); ctx.lineTo(clX-closeR*0.4, clY+closeR*0.4); ctx.stroke();
  buttons.push({ x: clX-closeR, y: clY-closeR, w: closeR*2, h: closeR*2, fn: function(){ toggleLoadout(); } });

  // ── tab bar ──
  var tabY = topY + titleFs + clamp(14*S, 10, 20);
  var tabH = clamp(34*S, 28, 44);
  var tabLabels = [ (lang==='ru'?'СНАРЯЖ.':'GEAR'), (lang==='ru'?'ЗАДАЧИ':'QUESTS'), (lang==='ru'?'БОНУСЫ':'EXTRAS') ];
  var tabW = (colW - 2*8*S) / 3;
  ctx.font = 'bold ' + clamp(13*S, 10, 16) + 'px sans-serif';
  for (var ti=0; ti<3; ti++) {
    var tx = marginX + ti*(tabW + 8*S);
    var on = (loadoutTab === ti);
    rr(ctx, tx, tabY, tabW, tabH, 9*S);
    ctx.fillStyle = on ? 'rgba(77,208,225,0.20)' : 'rgba(255,255,255,0.05)'; ctx.fill();
    ctx.lineWidth = 1.4*S; ctx.strokeStyle = on ? 'rgba(77,208,225,0.7)' : 'rgba(255,255,255,0.12)'; ctx.stroke();
    var qbadge = (ti===1) ? questsClaimable() : 0;
    ctx.fillStyle = on ? '#9ee6f0' : '#8fa0b8';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(tabLabels[ti], tx + tabW/2, tabY + tabH/2);
    if (qbadge > 0) {
      var qbR = clamp(8*S,6,11);
      ctx.beginPath(); ctx.arc(tx + tabW - qbR*1.2, tabY + qbR*1.0, qbR, 0, Math.PI*2);
      ctx.fillStyle = '#ff5a8c'; ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold ' + clamp(9*S,8,12) + 'px sans-serif';
      ctx.fillText(String(qbadge), tx + tabW - qbR*1.2, tabY + qbR*1.0 + 0.5);
      ctx.font = 'bold ' + clamp(13*S, 10, 16) + 'px sans-serif';
    }
    (function(idx){ buttons.push({ x:tx, y:tabY, w:tabW, h:tabH, fn:function(){ loadoutTab=idx; Sfx.click(); } }); })(ti);
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';

  var bodyY = tabY + tabH + clamp(14*S, 10, 20);
  var bottomLimit = H - clamp(16*S, 10, 24);
  if (loadoutTab === 0) drawLoadoutGear(marginX, bodyY, colW, bottomLimit);
  else if (loadoutTab === 1) drawLoadoutQuests(marginX, bodyY, colW, bottomLimit);
  else drawLoadoutExtras(marginX, bodyY, colW, bottomLimit);

  // reward banner (login / idle collect) sits on top of the panel
  drawRewardBanner();
}

// GEAR tab - owned gear (equip toggle + upgrade) above, locked gear (with the
// playtime requirement) below. Equip slots shown at the very top.
function drawLoadoutGear(mx, y0, colW, bottomLimit) {
  // equipped-slots strip
  var slotFs = clamp(11*S, 9, 14);
  ctx.font = 'bold ' + slotFs + 'px sans-serif';
  ctx.fillStyle = '#8fa0b8'; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText((lang==='ru'?'ЭКИПИРОВАНО ':'EQUIPPED ') + meta.equipped.length + '/' + GEAR_SLOTS, mx, y0 + slotFs);
  var slY = y0 + slotFs + 8*S;
  var slSize = clamp(40*S, 30, 52);
  var slGap = clamp(12*S, 8, 18);
  for (var s=0;s<GEAR_SLOTS;s++) {
    var sx = mx + s*(slSize+slGap);
    rr(ctx, sx, slY, slSize, slSize, 9*S);
    var eid = meta.equipped[s];
    if (eid) {
      var ed = gearDef(eid);
      ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
      ctx.lineWidth = 1.6*S; ctx.strokeStyle = ed.col; ctx.stroke();
      drawGearIcon(eid, sx + slSize/2, slY + slSize/2, slSize*0.32, ed.col);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.02)'; ctx.fill();
      ctx.setLineDash([4*S,4*S]); ctx.lineWidth = 1.2*S; ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.stroke(); ctx.setLineDash([]);
    }

  // gear list (scrollless - fits 7 rows; rows clamp to bottomLimit)
  var rowY = slY + slSize + clamp(16*S, 10, 22);
  var rowH = clamp(52*S, 42, 64);
  var rowGap = clamp(8*S, 5, 12);
  ctx.textBaseline = 'middle';
  for (var i=0;i<GEAR.length;i++) {
    var d = GEAR[i];
    if (rowY + rowH > bottomLimit) break;

    var equ = isEquipped(d.id);
    rr(ctx, mx, rowY, colW, rowH, 10*S);
    ctx.fillStyle = owned ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.02)'; ctx.fill();
    ctx.lineWidth = 1.2*S; ctx.strokeStyle = equ ? d.col : (owned ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.07)'); ctx.stroke();
    // icon
    var icCol = owned ? d.col : 'rgba(140,150,170,0.5)';
    drawGearIcon(d.id, mx + rowH*0.5, rowY + rowH/2, rowH*0.28, icCol);
    // name + desc / lock req
    var nameFs = clamp(14*S, 11, 17);
    var descFs = clamp(10.5*S, 9, 13);
    ctx.textAlign = 'left';
    ctx.font = 'bold ' + nameFs + 'px sans-serif';
    ctx.fillStyle = owned ? '#fff' : '#8a93a8';

    ctx.fillText(gearName(d) + lvlTag, mx + rowH + 6*S, rowY + rowH*0.34);
    ctx.font = descFs + 'px sans-serif';
    ctx.fillStyle = owned ? '#8fa0b8' : '#6b7488';

    // truncate desc to fit before the action button zone

    ctx.fillText(sub, mx + rowH + 6*S, rowY + rowH*0.68);
    // action button (right): EQUIP/UNEQUIP + UPGRADE, or locked padlock

      ctx.fillStyle = equ ? 'rgba(77,208,225,0.22)' : 'rgba(255,255,255,0.06)'; ctx.fill();

  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

    'rgba(77,208,225,0.5)', !loggedToday
  );
  // Core Reactor (idle)

  card(
    (lang==='ru'?'Ядро-Реактор':'Core Reactor'),

    idle > 0 ? (lang==='ru'?'СОБРАТЬ':'COLLECT') : null,

    'rgba(255,90,140,0.5)', eventBonusUnclaimed()

  card(

              : (lang==='ru'?'Реклама: +25% Ядер навсегда + бонус':'Watch ad: +25% Cores forever + bonus'),
