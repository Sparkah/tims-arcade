<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gravity Mailman</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #04060f; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── LOCALISED STRINGS ────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Gravity Mailman',
    sub:   'Throw letters from a tiny planet — every delivery warps gravity.',
    play: 'PLAY', retry: 'RETRY',
    score: 'SCORE', best: 'BEST',
    gameover: 'OUT OF LETTERS', winTitle: 'MAIL DELIVERED!',
    delivered: 'DELIVERED', letters: 'LETTERS', lives: 'LIVES',
    'tut_goal':     'Goal: Deliver 12 letters to mailbox planets.',
    'tut_controls': 'Controls: Drag from mailman, release to throw.',
    'tut_win':      'Win: 12 successful deliveries.',
    'tut_lose':     'Lose: Run out of 17 letters or drop 5.',
    'tut_tip':      'Tip: Each delivery shifts mass — your home gravity weakens.',
    howto: 'HOW TO PLAY',
    closeBtn: 'GOT IT',
  },
  ru: {
    title: 'Гравитационный Почтальон',
    sub:   'Бросай письма с крошечной планеты — каждая доставка искривляет гравитацию.',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ',
    score: 'ОЧКИ', best: 'РЕКОРД',
    gameover: 'ПИСЬМА КОНЧИЛИСЬ', winTitle: 'ПОЧТА ДОСТАВЛЕНА!',
    delivered: 'ДОСТАВЛЕНО', letters: 'ПИСЬМА', lives: 'ЖИЗНИ',
    'tut_goal':     'Цель: Доставить 12 писем на планеты-ящики.',
    'tut_controls': 'Управление: Тяни от почтальона, отпусти — бросок.',
    'tut_win':      'Победа: 12 успешных доставок.',
    'tut_lose':     'Проигрыш: Кончатся 17 писем или пропустишь 5.',
    'tut_tip':      'Подсказка: Каждая доставка смещает массу — твоя гравитация слабеет.',
    howto: 'КАК ИГРАТЬ',
    closeBtn: 'ПОНЯЛ',
  },
};

// AI sprites (loaded on boot; falls back to procedural drawing if missing).
var SPRITE_NAMES = ['mailman', 'home_planet', 'mailbox', 'letter'];

// ── TUNABLES ─────────────────────────────────────────────────────────────
var LETTER_BUDGET     = 17;
var DELIVERY_TARGET   = 12;
var MAX_LIVES         = 5;
var HOME_MASS_INIT    = 1200;
var MAILBOX_MASS_INIT = 60;
var LETTER_MASS       = 60;
var GRAV_K            = 9000;
var THROW_MAX_POWER   = 9.5;
var HOME_RADIUS       = 70;
var MAILBOX_RADIUS    = 22;
var LETTER_RADIUS     = 7;
var MAX_LETTER_TIME   = 6.0;     // seconds before in-flight letter is auto-lost
var BOUNDS_PAD        = 200;     // off-screen pad before letter is lost

// ── PALETTE ──────────────────────────────────────────────────────────────
var COL_BG_TOP   = '#04060f';
var COL_BG_BOT   = '#0d1430';
var COL_HOME     = '#7fc4ff';
var COL_HOME_DEEP= '#1a3a6e';
var COL_MAILBOX  = '#ff8c42';
var COL_MAILBOX_DELIVERED = '#48c9b0';
var COL_LETTER   = '#fff5cc';
var COL_AIM_GOOD = '#48c9b0';
var COL_STAR     = '#ffffff';

// ── STATE ────────────────────────────────────────────────────────────────
var gs = 'MENU';                   // MENU | PLAYING | WIN | GAMEOVER
var showTutorial = false;          // overlay tutorial-only modal during PLAYING
var letters_remaining = LETTER_BUDGET;
var delivered = 0;
var lives = MAX_LIVES;
var bestScore = 0;
var seenTutorial = false;

// World — positions are computed in WORLD coords (origin = view centre),
// then translated each frame so that resize works without re-layout.
var home = { x: 0, y: 0, mass: HOME_MASS_INIT, r: HOME_RADIUS };
var mailboxes = [];                // {x, y, ang, orbR, mass, r, delivered}
var letter = null;                 // active letter in flight: {x,y,vx,vy,t}
var stars = [];                    // bg parallax stars

// Aim/drag input
var aim = { active: false, sx: 0, sy: 0, x: 0, y: 0 };

// Visual state
var massShiftFlash = 0;            // flashes home planet when mass leaves
var hudButtons = [];               // populated each frame for "?" hit-testing
var pendingTutorialDismiss = false;

// ── LAYOUT ───────────────────────────────────────────────────────────────
function worldScale() {
  // scale roughly 1 if screen ≈ 800x600
  return GF.S;
}

function homeWorld() {
  // home planet centred on screen
  return { cx: GF.cx, cy: GF.cy + 30 * GF.S, r: HOME_RADIUS * GF.S };
}

// Mailman position on top of home planet (always points up = -y)
function mailmanWorld() {
  var hw = homeWorld();
  return { x: hw.cx, y: hw.cy - hw.r - 14 * GF.S };
}

// ── SETUP ────────────────────────────────────────────────────────────────
function buildStars() {
  stars = [];
  var n = 80;
  for (var i = 0; i < n; i++) {
    stars.push({
      x: Math.random(), y: Math.random(),
      r: 0.5 + Math.random() * 1.6,
      a: 0.3 + Math.random() * 0.7,
    });
  }
}

function buildMailboxes() {
  mailboxes = [];
  // 5 mailboxes in orbit at varied radii / angles. Rotate slightly each round.
  var rngSeed = (Date.now() & 0xffff) ^ 0x5eed;
  function rng() {
    rngSeed = (rngSeed * 9301 + 49297) % 233280;
    return rngSeed / 233280;
  }
  var orbits = [
    { r: 200, ang: -Math.PI / 2 },
    { r: 240, ang: -Math.PI / 2 + 1.2 },
    { r: 220, ang: -Math.PI / 2 + 2.5 },
    { r: 270, ang: -Math.PI / 2 - 1.3 },
    { r: 200, ang: -Math.PI / 2 - 2.5 },
  ];
  for (var i = 0; i < orbits.length; i++) {
    var o = orbits[i];
    // tiny seeded jitter so each run feels fresh
    var rJ = o.r + (rng() - 0.5) * 30;
    var aJ = o.ang + (rng() - 0.5) * 0.4;
    mailboxes.push({
      orbR: rJ,
      ang: aJ,
      angVel: (rng() < 0.5 ? -1 : 1) * (0.06 + rng() * 0.10),
      mass: MAILBOX_MASS_INIT,
      r: MAILBOX_RADIUS,
      delivered: false,
    });
  }
}

function startGame() {
  letters_remaining = LETTER_BUDGET;
  delivered = 0;
  lives = MAX_LIVES;
  home.mass = HOME_MASS_INIT;
  letter = null;
  aim.active = false;
  massShiftFlash = 0;
  buildMailboxes();
  showTutorial = false;
  gs = 'PLAYING';
  GF.gameStarted();
}

function endGame(won) {
  var score = letters_remaining + lives * 50 + delivered * 10;
  if (score > bestScore) {
    bestScore = score;
    try { localStorage.setItem('gravity_mailman_best', bestScore); } catch (e) {}
  }
  gs = won ? 'WIN' : 'GAMEOVER';
  GF.setShake(won ? 0.6 : 0.4);
  GF.gameEnded();
}

// Screenshot helper — pre-load mid-action with letter mid-flight + 1 delivered.
window._jumpLevel = function(n) {
  startGame();
  if (n && n >= 99) {
    // Force a terminal state
    letters_remaining = 0;
    if (delivered < DELIVERY_TARGET) endGame(false);
    return;
  }
  // Pre-deliver a couple to dirty the field
  for (var i = 0; i < Math.min(2, mailboxes.length); i++) {
    mailboxes[i].delivered = true;
    mailboxes[i].mass = MAILBOX_MASS_INIT + LETTER_MASS;
  }
  delivered = 2;
  home.mass = HOME_MASS_INIT - LETTER_MASS * 2;
  letters_remaining = LETTER_BUDGET - 4;
  // spawn a letter mid-flight near the home planet
  var mw = mailmanWorld();
  letter = {
    x: mw.x + 80 * GF.S, y: mw.y - 40 * GF.S,
    vx: 3.5 * GF.S, vy: -2.5 * GF.S, t: 0,
  };
};
window._setupForScreenshot = function(level) { window._jumpLevel(level || 1); };

// ── INPUT ────────────────────────────────────────────────────────────────
function inputDown(x, y) {
  if (gs === 'MENU' || gs === 'WIN' || gs === 'GAMEOVER') return;
  // ignore if a letter is in flight
  if (letter) return;
  // ? button hit-test
  for (var i = 0; i < hudButtons.length; i++) {
    var b = hudButtons[i];
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
      b.fn();
      return;
    }
  }
  // tutorial panel close hit-test (handled in pendingTutorialDismiss)
  if (showTutorial) {
    pendingTutorialDismiss = true;
    return;
  }
  aim.active = true;
  aim.sx = x; aim.sy = y;
  aim.x = x; aim.y = y;
}

function inputMove(x, y) {
  if (!aim.active) return;
  aim.x = x; aim.y = y;
}

function inputUp(x, y) {
  if (showTutorial && pendingTutorialDismiss) {
    showTutorial = false;
    pendingTutorialDismiss = false;
    return;
  }
  if (!aim.active) return;
  aim.active = false;
  // compute throw vector
  var mw = mailmanWorld();
  var dx = aim.sx - aim.x;
  var dy = aim.sy - aim.y;
  var len = Math.sqrt(dx * dx + dy * dy);
  if (len < 6 * GF.S) return; // dead-zone tap
  var maxLen = 220 * GF.S;
  var p = Math.min(1, len / maxLen);
  var power = p * THROW_MAX_POWER;
  var nx = dx / len, ny = dy / len;
  letter = {
    x: mw.x + nx * (HOME_RADIUS * GF.S + 14 * GF.S),
    y: mw.y + ny * (HOME_RADIUS * GF.S + 14 * GF.S),
    vx: nx * power * GF.S,
    vy: ny * power * GF.S,
    t: 0,
  };
  letters_remaining--;
  GF.spawnParticles(mw.x, mw.y, COL_LETTER, 6);
}

GF.canvas.addEventListener('mousedown', function(e) { inputDown(e.clientX, e.clientY); });
window.addEventListener('mousemove', function(e) { inputMove(e.clientX, e.clientY); });
window.addEventListener('mouseup',   function(e) { inputUp(e.clientX, e.clientY); });
GF.canvas.addEventListener('touchstart', function(e) {
  if (!e.changedTouches.length) return;
  var t = e.changedTouches[0];
  // Mobile MENU/end-screen tap on PLAY button — inputDown skips MENU
  // entirely so we hit-test the menu rect here too. Otherwise touch
  // users can't even start the game.
  if (gs === 'MENU' && _menuPlayRect) {
    var r = _menuPlayRect;
    if (t.clientX >= r.x && t.clientX <= r.x + r.w &&
        t.clientY >= r.y && t.clientY <= r.y + r.h) {
      try { localStorage.setItem('gravity_mailman_seen_tutorial', '1'); } catch (_) {}
      seenTutorial = true;
      startGame();
      return;
    }
  }
  inputDown(t.clientX, t.clientY);
}, { passive: false });
GF.canvas.addEventListener('touchmove', function(e) {
  if (!e.changedTouches.length) return;
  var t = e.changedTouches[0];
  inputMove(t.clientX, t.clientY);
}, { passive: false });
GF.canvas.addEventListener('touchend', function(e) {
  if (!e.changedTouches.length) return;
  var t = e.changedTouches[0];
  inputUp(t.clientX, t.clientY);
}, { passive: false });

// ── PHYSICS ──────────────────────────────────────────────────────────────
function applyGravity(lx, ly) {
  // Returns acceleration (ax, ay) on a letter at (lx, ly) from home + all
  // mailbox planets, using inverse-square with softening.
  var ax = 0, ay = 0;
  var hw = homeWorld();
  // Home
  var dx = hw.cx - lx, dy = hw.cy - ly;
  var d2 = dx*dx + dy*dy + 400; // soften
  var d  = Math.sqrt(d2);
  var f  = (GRAV_K * home.mass) / (d2 * 1000);
  ax += (dx / d) * f;
  ay += (dy / d) * f;
  // Mailboxes
  for (var i = 0; i < mailboxes.length; i++) {
    var mb = mailboxes[i];
    var mw = mailboxWorld(mb);
    var dx2 = mw.x - lx, dy2 = mw.y - ly;
    var d22 = dx2*dx2 + dy2*dy2 + 200;
    var d3 = Math.sqrt(d22);
    var f2 = (GRAV_K * mb.mass) / (d22 * 1000);
    ax += (dx2 / d3) * f2;
    ay += (dy2 / d3) * f2;
  }
  return { ax: ax, ay: ay };
}

function mailboxWorld(mb) {
  var hw = homeWorld();
  return {
    x: hw.cx + Math.cos(mb.ang) * mb.orbR * GF.S,
    y: hw.cy + Math.sin(mb.ang) * mb.orbR * GF.S,
  };
}

function checkLetterCollisions() {
  if (!letter) return;
  var hw = homeWorld();
  // home planet collision = lost (ricochet back home = you fumbled)
  var hd = Math.sqrt((letter.x - hw.cx) * (letter.x - hw.cx) + (letter.y - hw.cy) * (letter.y - hw.cy));
  if (hd <= hw.r + LETTER_RADIUS * GF.S) {
    // miss — bounced into your own planet
    GF.spawnParticles(letter.x, letter.y, COL_LETTER, 10);
    GF.setShake(0.25);
    letter = null;
    lives--;
    return;
  }
  // mailbox collision
  for (var i = 0; i < mailboxes.length; i++) {
    var mb = mailboxes[i];
    if (mb.delivered) continue;
    var mw = mailboxWorld(mb);
    var dx = letter.x - mw.x, dy = letter.y - mw.y;
    var d  = Math.sqrt(dx * dx + dy * dy);
    if (d <= (mb.r + LETTER_RADIUS) * GF.S) {
      // delivery!
      mb.delivered = true;
      mb.mass += LETTER_MASS;
      home.mass = Math.max(200, home.mass - LETTER_MASS);
      delivered++;
      massShiftFlash = 1;
      GF.spawnParticles(mw.x, mw.y, COL_MAILBOX_DELIVERED, 18);
      GF.spawnFloat(mw.x, mw.y - 24 * GF.S, '+1', '#48c9b0');
      GF.setShake(0.35);
      letter = null;
      // Re-open a previously-delivered mailbox to keep play alive if needed
      if (delivered < DELIVERY_TARGET) {
        // Find next undelivered count needed:
        var undelivered = 0;
        for (var k = 0; k < mailboxes.length; k++) if (!mailboxes[k].delivered) undelivered++;
        if (undelivered === 0) {
          // refresh: reopen oldest 3 mailboxes (keep its accumulated mass!)
          for (var k2 = 0; k2 < Math.min(3, mailboxes.length); k2++) mailboxes[k2].delivered = false;
        }
      }
      return;
    }
  }
  // out-of-bounds = lost
  if (letter.x < -BOUNDS_PAD || letter.x > GF.W + BOUNDS_PAD ||
      letter.y < -BOUNDS_PAD || letter.y > GF.H + BOUNDS_PAD ||
      letter.t > MAX_LETTER_TIME) {
    GF.spawnParticles(letter.x, letter.y, '#ff5577', 12);
    GF.setShake(0.2);
    letter = null;
    lives--;
  }
}

// ── PREVIEW (predict trajectory under current planet masses) ─────────────
function predictTrajectory(sx, sy, vx, vy, steps) {
  var pts = [];
  var x = sx, y = sy;
  var vX = vx, vY = vy;
  var dtSim = 1 / 60;
  for (var i = 0; i < steps; i++) {
    var a = applyGravity(x, y);
    vX += a.ax * dtSim;
    vY += a.ay * dtSim;
    x  += vX;
    y  += vY;
    if (i % 3 === 0) pts.push({ x: x, y: y });
    // stop if hits home
    var hw = homeWorld();
    var hd = (x - hw.cx) * (x - hw.cx) + (y - hw.cy) * (y - hw.cy);
    if (hd <= hw.r * hw.r) break;
    if (x < -BOUNDS_PAD || x > GF.W + BOUNDS_PAD || y < -BOUNDS_PAD || y > GF.H + BOUNDS_PAD) break;
  }
  return pts;
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  if (gs !== 'PLAYING') return;

  // mailbox orbital motion
  for (var i = 0; i < mailboxes.length; i++) {
    mailboxes[i].ang += mailboxes[i].angVel * dt;
  }

  // letter physics
  if (letter) {
    var dtSim = Math.min(dt, 1 / 30);
    var sub = 4;
    for (var s = 0; s < sub; s++) {
      var a = applyGravity(letter.x, letter.y);
      letter.vx += a.ax * (dtSim / sub);
      letter.vy += a.ay * (dtSim / sub);
      letter.x  += letter.vx * (60 * dtSim / sub);
      letter.y  += letter.vy * (60 * dtSim / sub);
      letter.t  += dtSim / sub;
      checkLetterCollisions();
      if (!letter) break;
    }
  }

  if (massShiftFlash > 0) massShiftFlash = Math.max(0, massShiftFlash - dt * 1.6);

  // Terminal checks
  if (delivered >= DELIVERY_TARGET) { endGame(true); return; }
  if (lives <= 0) { endGame(false); return; }
  if (letters_remaining <= 0 && !letter) { endGame(false); return; }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function drawBg(ctx) {
  var grad = ctx.createLinearGradient(0, 0, 0, GF.H);
  grad.addColorStop(0, COL_BG_TOP);
  grad.addColorStop(1, COL_BG_BOT);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GF.W, GF.H);
  // stars
  for (var i = 0; i < stars.length; i++) {
    var st = stars[i];
    ctx.globalAlpha = st.a;
    ctx.fillStyle = COL_STAR;
    ctx.beginPath();
    ctx.arc(st.x * GF.W, st.y * GF.H, st.r * GF.S, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHome(ctx) {
  var hw = homeWorld();
  // mass scale visualisation: home shrinks slightly as mass leaves
  var massRatio = home.mass / HOME_MASS_INIT;
  var rEff = hw.r * (0.6 + massRatio * 0.4);

  GF.drawSprite('home_planet', hw.cx, hw.cy, rEff * 2, function(c, x, y, sz) {
    var grad = c.createRadialGradient(x - sz * 0.2, y - sz * 0.2, sz * 0.1, x, y, sz / 2);
    grad.addColorStop(0, COL_HOME);
    grad.addColorStop(1, COL_HOME_DEEP);
    c.fillStyle = grad;
    c.beginPath(); c.arc(x, y, sz / 2, 0, Math.PI * 2); c.fill();
    // crater detail
    c.fillStyle = 'rgba(0,0,0,0.18)';
    c.beginPath(); c.arc(x - sz * 0.18, y + sz * 0.12, sz * 0.07, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(x + sz * 0.20, y - sz * 0.05, sz * 0.05, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(x + sz * 0.05, y + sz * 0.22, sz * 0.04, 0, Math.PI * 2); c.fill();
  });

  // pulse ring on mass shift
  if (massShiftFlash > 0) {
    ctx.globalAlpha = massShiftFlash;
    ctx.strokeStyle = '#ffaa55';
    ctx.lineWidth = 3 * GF.S;
    ctx.beginPath();
    ctx.arc(hw.cx, hw.cy, rEff * (1 + (1 - massShiftFlash) * 0.5), 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // mailman
  var mm = mailmanWorld();
  var sz = 36 * GF.S;
  GF.drawSprite('mailman', mm.x, mm.y, sz, function(c, x, y, s) {
    // body
    c.fillStyle = '#1f4e7e';
    GF.rr(c, x - s * 0.30, y - s * 0.10, s * 0.60, s * 0.55, s * 0.10); c.fill();
    // head
    c.fillStyle = '#ffd9a8';
    c.beginPath(); c.arc(x, y - s * 0.25, s * 0.18, 0, Math.PI * 2); c.fill();
    // cap
    c.fillStyle = '#0a2540';
    GF.rr(c, x - s * 0.22, y - s * 0.45, s * 0.44, s * 0.18, s * 0.04); c.fill();
    // bag strap
    c.strokeStyle = '#7a4318';
    c.lineWidth = s * 0.06;
    c.beginPath(); c.moveTo(x - s * 0.22, y - s * 0.05); c.lineTo(x + s * 0.22, y + s * 0.20); c.stroke();
  });
}

function drawMailbox(ctx, mb) {
  var w = mailboxWorld(mb);
  var rPx = mb.r * GF.S;
  // small planet halo
  ctx.beginPath();
  ctx.arc(w.x, w.y, rPx * 1.4, 0, Math.PI * 2);
  ctx.fillStyle = mb.delivered ? 'rgba(72,201,176,0.20)' : 'rgba(255,140,66,0.18)';
  ctx.fill();
  GF.drawSprite('mailbox', w.x, w.y, rPx * 2, function(c, x, y, sz) {
    var grad = c.createRadialGradient(x - sz * 0.2, y - sz * 0.2, sz * 0.1, x, y, sz / 2);
    grad.addColorStop(0, mb.delivered ? COL_MAILBOX_DELIVERED : COL_MAILBOX);
    grad.addColorStop(1, mb.delivered ? '#0c4d3f' : '#7a3a14');
    c.fillStyle = grad;
    c.beginPath(); c.arc(x, y, sz / 2, 0, Math.PI * 2); c.fill();
    // mailbox slot icon
    c.fillStyle = 'rgba(0,0,0,0.6)';
    GF.rr(c, x - sz * 0.22, y - sz * 0.05, sz * 0.44, sz * 0.10, sz * 0.04); c.fill();
    if (mb.delivered) {
      c.fillStyle = '#fff';
      c.font = 'bold ' + (sz * 0.4) + 'px sans-serif';
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText('✓', x, y + sz * 0.04);
    }
  });
  // mass dot
  var massPct = (mb.mass - MAILBOX_MASS_INIT) / LETTER_MASS;
  if (massPct > 0) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + (10 * GF.S) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('+' + massPct, w.x, w.y + rPx * 1.7);
  }
}

function drawAim(ctx) {
  if (!aim.active) return;
  var mw = mailmanWorld();
  var dx = aim.sx - aim.x;
  var dy = aim.sy - aim.y;
  var len = Math.sqrt(dx * dx + dy * dy);
  if (len < 4) return;
  var maxLen = 220 * GF.S;
  var p = Math.min(1, len / maxLen);
  var nx = dx / len, ny = dy / len;
  var power = p * THROW_MAX_POWER;
  // trajectory preview
  var startX = mw.x + nx * (HOME_RADIUS * GF.S + 14 * GF.S);
  var startY = mw.y + ny * (HOME_RADIUS * GF.S + 14 * GF.S);
  var pts = predictTrajectory(startX, startY, nx * power * GF.S, ny * power * GF.S, 90);
  ctx.strokeStyle = COL_AIM_GOOD;
  ctx.lineWidth = 2 * GF.S;
  ctx.setLineDash([4 * GF.S, 6 * GF.S]);
  ctx.beginPath();
  for (var i = 0; i < pts.length; i++) {
    if (i === 0) ctx.moveTo(pts[i].x, pts[i].y);
    else ctx.lineTo(pts[i].x, pts[i].y);
  }
  ctx.stroke();
  ctx.setLineDash([]);
  // power arrow
  ctx.strokeStyle = '#fff5cc';
  ctx.lineWidth = 4 * GF.S;
  ctx.beginPath();
  ctx.moveTo(mw.x, mw.y);
  ctx.lineTo(mw.x + nx * Math.min(len, maxLen), mw.y + ny * Math.min(len, maxLen));
  ctx.stroke();
  // power dot at end
  ctx.fillStyle = '#fff5cc';
  ctx.beginPath();
  ctx.arc(mw.x + nx * Math.min(len, maxLen), mw.y + ny * Math.min(len, maxLen), 6 * GF.S, 0, Math.PI * 2);
  ctx.fill();
}

function drawLetter(ctx) {
  if (!letter) return;
  var sz = LETTER_RADIUS * 2 * GF.S * 1.6;
  // glow trail
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = '#fff5cc';
  ctx.beginPath();
  ctx.arc(letter.x, letter.y, sz, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  GF.drawSprite('letter', letter.x, letter.y, sz, function(c, x, y, s) {
    c.fillStyle = COL_LETTER;
    GF.rr(c, x - s / 2, y - s * 0.3, s, s * 0.6, s * 0.05); c.fill();
    c.strokeStyle = '#7a5a18';
    c.lineWidth = 1.5 * GF.S;
    c.beginPath();
    c.moveTo(x - s / 2, y - s * 0.3);
    c.lineTo(x, y + s * 0.05);
    c.lineTo(x + s / 2, y - s * 0.3);
    c.stroke();
  });
}

function drawHUD(ctx) {
  var s = GF.S;
  var pad = 14 * s;
  var fs = GF.clamp(15 * s, 11, 20);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textBaseline = 'top';

  // top-left: delivered / target
  ctx.textAlign = 'left';
  ctx.fillStyle = '#48c9b0';
  ctx.fillText(GF.t('delivered') + ': ' + delivered + ' / ' + DELIVERY_TARGET, pad, pad);

  // top-centre: letters left
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff5cc';
  ctx.fillText(GF.t('letters') + ': ' + letters_remaining, GF.cx, pad);

  // top-right: lives as hearts
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ff5577';
  var hearts = '';
  for (var i = 0; i < MAX_LIVES; i++) hearts += (i < lives) ? '♥ ' : '· ';
  ctx.fillText(GF.t('lives') + ': ' + hearts.trim(), GF.W - pad, pad);

  // ? button bottom-right (HUD)
  hudButtons = [];
  var btnSize = 36 * s;
  var bx = GF.W - btnSize - pad, by = GF.H - btnSize - pad;
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  GF.rr(ctx, bx, by, btnSize, btnSize, btnSize * 0.25);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (btnSize * 0.55) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', bx + btnSize / 2, by + btnSize / 2 + 1 * s);
  hudButtons.push({ x: bx, y: by, w: btnSize, h: btnSize, fn: function() { showTutorial = true; } });
}

function drawTutorialPanel(ctx, opts) {
  // opts.title text (e.g. STRINGS title or 'HOW TO PLAY')
  var s = GF.S;
  var W = Math.min(GF.W * 0.86, 540 * s);
  var H = Math.min(GF.H * 0.78, 360 * s);
  var x = GF.cx - W / 2;
  var y = GF.cy - H / 2;
  ctx.fillStyle = 'rgba(8,12,28,0.92)';
  GF.rr(ctx, x, y, W, H, 18 * s); ctx.fill();
  ctx.strokeStyle = 'rgba(127,196,255,0.45)';
  ctx.lineWidth = 2 * s;
  GF.rr(ctx, x, y, W, H, 18 * s); ctx.stroke();

  var titleFs = GF.clamp(22 * s, 16, 30);
  var lineFs  = GF.clamp(14 * s, 11, 18);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(opts.title || GF.t('howto'), GF.cx, y + 18 * s);

  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  ctx.font = lineFs + 'px sans-serif';
  ctx.fillStyle = '#cfe3ff';
  ctx.textAlign = 'left';
  var lx = x + 24 * s;
  var ly = y + 18 * s + titleFs + 18 * s;
  for (var i = 0; i < lines.length; i++) {
    wrapText(ctx, lines[i], lx, ly + i * (lineFs * 1.65), W - 48 * s, lineFs * 1.3);
  }

  // close button
  if (opts.btnFn) {
    var btnW = 200 * s, btnH = 46 * s;
    var btnX = GF.cx - btnW / 2;
    var btnY = y + H - btnH - 18 * s;
    var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
    grad.addColorStop(0, '#48c9b0'); grad.addColorStop(1, '#2c8b7a');
    GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + lineFs + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(opts.btnText || GF.t('closeBtn'), GF.cx, btnY + btnH / 2);
    return { btnX: btnX, btnY: btnY, btnW: btnW, btnH: btnH, btnFn: opts.btnFn };
  }
  return null;
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  var words = text.split(' ');
  var line = '';
  var ly = y;
  for (var n = 0; n < words.length; n++) {
    var testLine = line + words[n] + ' ';
    var metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && n > 0) {
      ctx.fillText(line, x, ly);
      line = words[n] + ' ';
      ly += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, ly);
}

function draw(ctx) {
  drawBg(ctx);

  // World draw layer
  if (gs === 'PLAYING' || gs === 'WIN' || gs === 'GAMEOVER') {
    // mailboxes (under home so home overlaps when close)
    for (var i = 0; i < mailboxes.length; i++) drawMailbox(ctx, mailboxes[i]);
    // home
    drawHome(ctx);
    // letter + aim
    drawLetter(ctx);
    if (gs === 'PLAYING' && !letter) drawAim(ctx);
    drawHUD(ctx);
  }

  if (gs === 'MENU') {
    // Title block (rendered via drawOverlay). We draw a background scene first
    // so the menu doesn't sit over a blank black canvas.
    // (Already drew bg.) Add silhouette of planets to give context.
    for (var k = 0; k < mailboxes.length; k++) {
      var w = mailboxWorld(mailboxes[k]);
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = COL_MAILBOX;
      ctx.beginPath();
      ctx.arc(w.x, w.y, mailboxes[k].r * GF.S, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    var hw = homeWorld();
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = COL_HOME_DEEP;
    ctx.beginPath();
    ctx.arc(hw.cx, hw.cy, hw.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Menu panel (manually drawn so we can include tutorial lines)
    drawMenuOverlay(ctx);
  }

  if (gs === 'WIN' || gs === 'GAMEOVER') {
    GF.drawOverlay({
      title: gs === 'WIN' ? GF.t('winTitle') : GF.t('gameover'),
      sub: GF.t('delivered') + ': ' + delivered + ' / ' + DELIVERY_TARGET,
      sub2: GF.t('score') + ': ' + (letters_remaining + lives * 50 + delivered * 10),
      btnText: GF.t('retry'),
      btnFn: function() { gs = 'MENU'; },
      bestText: GF.t('best') + ': ' + bestScore,
    });
  }

  // Tutorial overlay (ride on top during PLAYING)
  if (showTutorial && gs === 'PLAYING') {
    var tutBtn = drawTutorialPanel(ctx, {
      title: GF.t('howto'),
      btnText: GF.t('closeBtn'),
      btnFn: function() { showTutorial = false; },
    });
    // re-bind menu close click target via the existing checkButtons mechanism
    if (tutBtn) {
      // We don't have direct access to GF.buttons; we rely on inputUp's handling.
      _tutorialCloseRect = tutBtn;
    }
  } else {
    _tutorialCloseRect = null;
  }
}

// We track the tutorial close rect so we can hit-test on mousedown
var _tutorialCloseRect = null;
GF.canvas.addEventListener('click', function(e) {
  if (showTutorial && _tutorialCloseRect) {
    var r = _tutorialCloseRect;
    if (e.clientX >= r.btnX && e.clientX <= r.btnX + r.btnW &&
        e.clientY >= r.btnY && e.clientY <= r.btnY + r.btnH) {
      showTutorial = false;
    }
  }
});

function drawMenuOverlay(ctx) {
  var s = GF.S;
  // Dim background
  ctx.fillStyle = 'rgba(4,6,15,0.75)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(34 * s, 22, 50);
  var subFs   = GF.clamp(15 * s, 11, 19);
  var lineFs  = GF.clamp(14 * s, 11, 17);

  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = 'rgba(127,196,255,0.5)'; ctx.shadowBlur = 30 * s;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('title'), GF.cx, GF.cy - 150 * s);
  ctx.shadowBlur = 0;

  ctx.font = subFs + 'px sans-serif';
  ctx.fillStyle = '#9cb3d0';
  ctx.fillText(GF.t('sub'), GF.cx, GF.cy - 120 * s);

  // Tutorial lines
  ctx.font = lineFs + 'px sans-serif';
  ctx.fillStyle = '#cfe3ff';
  ctx.textAlign = 'left';
  var tutLines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  var maxW = Math.min(GF.W * 0.78, 520 * s);
  var lx = GF.cx - maxW / 2;
  var ly = GF.cy - 80 * s;
  for (var i = 0; i < tutLines.length; i++) {
    wrapText(ctx, tutLines[i], lx, ly + i * (lineFs * 1.7), maxW, lineFs * 1.3);
  }

  // PLAY button
  var btnW = GF.clamp(240 * s, 160, 320), btnH = GF.clamp(52 * s, 40, 66);
  var btnX = GF.cx - btnW / 2, btnY = GF.cy + 90 * s;
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#48c9b0'); grad.addColorStop(1, '#2c8b7a');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + GF.clamp(16 * s, 12, 22) + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), GF.cx, btnY + btnH / 2);

  // Best
  if (bestScore > 0) {
    ctx.font = GF.clamp(13 * s, 10, 17) + 'px sans-serif';
    ctx.fillStyle = '#7a8aa6';
    ctx.fillText(GF.t('best') + ': ' + bestScore, GF.cx, btnY + btnH + 28 * s);
  }

  // Hit-test the PLAY button using the gf-lib button system would conflict;
  // do a manual on-canvas click handler.
  _menuPlayRect = { x: btnX, y: btnY, w: btnW, h: btnH };
}
var _menuPlayRect = null;

GF.canvas.addEventListener('click', function(e) {
  if (gs === 'MENU' && _menuPlayRect) {
    var r = _menuPlayRect;
    if (e.clientX >= r.x && e.clientX <= r.x + r.w &&
        e.clientY >= r.y && e.clientY <= r.y + r.h) {
      try { localStorage.setItem('gravity_mailman_seen_tutorial', '1'); } catch (_) {}
      seenTutorial = true;
      startGame();
    }
  }
});

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'gravity_mailman',
  onReady: function() {
    try { bestScore = parseInt(localStorage.getItem('gravity_mailman_best') || '0') || 0; } catch (e) {}
    try { seenTutorial = localStorage.getItem('gravity_mailman_seen_tutorial') === '1'; } catch (e) {}
    buildStars();
    buildMailboxes();
    gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

// Expose state for runtime gate
GF.exposeState(function() {
  return {
    gs: gs,
    letters_remaining: letters_remaining,
    delivered: delivered,
    lives: lives,
    home_mass: home.mass,
    LETTER_BUDGET: LETTER_BUDGET,
    DELIVERY_TARGET: DELIVERY_TARGET,
    MAX_LIVES: MAX_LIVES,
    HOME_MASS_INIT: HOME_MASS_INIT,
    MAILBOX_MASS_INIT: MAILBOX_MASS_INIT,
    LETTER_MASS: LETTER_MASS,
    GRAV_K: GRAV_K,
    THROW_MAX_POWER: THROW_MAX_POWER,
    HOME_RADIUS: HOME_RADIUS,
    MAILBOX_RADIUS: MAILBOX_RADIUS,
  };
});

})();
</script>
