function curStrings() { return STRINGS[GF.lang] || STRINGS.en; }

// ── PERSISTENCE ────────────────────────────────────────────────────────────
function loadTutorialSeen() { try { return localStorage.getItem('deck_of_dread_seen_tutorial') === '1'; } catch (e) { return false; } }
function saveTutorialSeen() { try { localStorage.setItem('deck_of_dread_seen_tutorial', '1'); } catch (e) {} }

var META_KEY = 'deck_of_dread_meta_v1';
function loadMeta() {
  try {
    var raw = localStorage.getItem(META_KEY);
    if (!raw) return;
    var s = JSON.parse(raw);
    if (s && typeof s === 'object') {
      bestFloor = Math.max(0, s.bestFloor | 0);
      if (s.unlockedRelics) { for (var k in s.unlockedRelics) if (RELICS[k]) unlockedRelics[k] = true; }
    }
  } catch (e) {}
}
function saveMeta() {
  try { localStorage.setItem(META_KEY, JSON.stringify({ bestFloor: bestFloor, unlockedRelics: unlockedRelics })); } catch (e) {}
}

// ── DECK / CARD HELPERS ────────────────────────────────────────────────────
function shuffle(a) { for (var i = a.length - 1; i > 0; i--) { var j = (Math.random()*(i+1))|0; var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

function drawCards(n) {
  for (var i = 0; i < n; i++) {
    if (hand.length >= maxHandRender) break;
    if (deck.length === 0) {
      if (discard.length === 0) break;
      deck = discard; discard = []; shuffle(deck);
    }
    hand.push(deck.pop());
  }
}

function startPlayerTurn() {
  turnPhase = 'player';
  energy = energyPerTurn;
  if (ownsRelic('focus') && enemy && enemy.firstTurn) energy += 1;
  block = 0;
  firstAttackThisTurn = true;
  // discard old hand, draw fresh
  for (var i = 0; i < hand.length; i++) discard.push(hand[i]);
  hand.length = 0;
  drawCards(drawPerTurn);
  GF.saveRun();
}

// ── ENEMY / FLOOR SETUP ────────────────────────────────────────────────────
function pickMonsterKey(fl) {
  // boss every 5 floors
  if (fl % 5 === 0) return 'dreadlord';
  var pool = [];
  for (var k in MONSTERS) {
    var m = MONSTERS[k];
    if (m.boss) continue;
    if (fl >= m.minFloor) pool.push(k);
  }
  if (pool.length === 0) pool = ['ghoul'];
  return pool[(Math.random()*pool.length)|0];
}

function spawnEnemy(fl) {
  var key = pickMonsterKey(fl);
  var def = MONSTERS[key];
  var hp = Math.round((baseEnemyHP + fl * enemyHPGrowth) * def.hpMul);
  var dmg = Math.round((baseEnemyDmg + fl * dmgGrowth) * def.dmgMul);
  enemy = {
    key: key, def: def,
    hp: hp, maxHp: hp,
    dmg: Math.max(2, dmg),
    block: 0, poison: 0, weak: 0, buffed: 0,
    intent: null, firstTurn: true,
    wob: Math.random() * 6.28, defendStreak: 0,
  };
  chooseIntent();
  if (def.boss) { bannerTxt = curStrings().boss_in; bannerT = 2.2; GF.setShake(0.7); }
}

function chooseIntent() {
  var e = enemy, def = e.def, r = Math.random();
  var atk = { type:'attack', value: scaledEnemyDmg(), hits: 1 };
  if (def.multi) {
    // swarm: multi small hits
    var hits = 2 + ((Math.random()*2)|0);
    e.intent = { type:'attack', value: Math.max(2, Math.round(e.dmg * 0.6)), hits: hits };
    return;
  }
  if (def.boss) {
    // dread lord: mostly attack, sometimes enrage (buff)
    if (!e.buffed && r < 0.30) { e.intent = { type:'buff', value: 0, hits:0 }; return; }
    e.intent = atk; return;
  }
  if (def.canDefend && r < 0.32 && e.defendStreak < 1) { e.intent = { type:'defend', value: Math.round(e.dmg * 1.6), hits:0 }; e.defendStreak++; return; }
  if (def.canHex && r < 0.34) { e.intent = { type:'debuff', value: Math.max(2, Math.round(e.dmg*0.7)), hits:1 }; return; }
  e.defendStreak = 0;
  e.intent = atk;
}

function scaledEnemyDmg() {
  var d = enemy.dmg + (enemy.buffed || 0);
  return Math.max(1, d);
}

// ── CARD PLAY ──────────────────────────────────────────────────────────────
function canPlay(idx) {
  var key = hand[idx]; if (!key) return false;
  return energy >= CARDS[key].cost;
}

function dealToEnemy(amount, ignoreBlock) {
  var e = enemy; if (!e) return;
  var dmg = amount;
  if (e.weak > 0) { /* weak reduces enemy's outgoing; not incoming */ }
  if (!ignoreBlock && e.block > 0) {
    var absorbed = Math.min(e.block, dmg);
    e.block -= absorbed; dmg -= absorbed;
  }
  if (dmg > 0) {
    e.hp -= dmg;
    enemyHitFlash = 0.16;
    GF.spawnParticles(enemyX(), enemyY(), '#ff5252', 8);
    GF.spawnFloat(enemyX() + (Math.random()-0.5)*30*GF.S, enemyY() - 30*GF.S, '-' + dmg, '#ff7676');
    GF.setShake(0.12);
  }
}

function applyPoison(n) {
  if (ownsRelic('venomheart')) n += 1;
  enemy.poison += n;
  GF.spawnFloat(enemyX(), enemyY() - 6*GF.S, '+' + n + ' ' + curStrings().poison, '#9cff57');
}

function playCard(idx) {
  if (!canPlay(idx)) { flash(curStrings().no_energy); return; }
  var key = hand[idx], c = CARDS[key];
  energy -= c.cost;

  // damage
  if (c.dmg) {
    var dmg = c.dmg;
    if (c.kind === 'atk' && ownsRelic('kindling') && firstAttackThisTurn) dmg += 2;
    if (c.doubleIfPoison && enemy.poison > 0) dmg *= 2;
    var hits = c.hits || 1;
    for (var h = 0; h < hits; h++) dealToEnemy(dmg, !!c.ignoreBlock);
    if (c.kind === 'atk') firstAttackThisTurn = false;
  }
  if (c.blk) { block += c.blk; GF.spawnFloat(playerBarX(), playerBarY() - 18*GF.S, '+' + c.blk + ' ' + GF.t('block'), '#64b5f6'); }
  if (c.poison) applyPoison(c.poison);
  if (c.weak) { enemy.weak += c.weak; GF.spawnFloat(enemyX(), enemyY() + 14*GF.S, '+' + c.weak + ' ' + curStrings().weak, '#ce93d8'); }
  if (c.heal) { healPlayer(c.heal); }
  if (c.energy) { energy += c.energy; }

  // card play burst
  cardAnims.push({ x: enemyX(), y: enemyY(), t: 0.3 });
  GF.spawnParticles(enemyX(), enemyY() - 20*GF.S, '#ffd54f', 5);

  // move card to discard
  discard.push(key);
  hand.splice(idx, 1);

  // draw (after splice so it can refill)
  if (c.draw) drawCards(c.draw);

  // check enemy death
  if (enemy.hp <= 0) { winFight(); return; }
  GF.saveRun();
}

function healPlayer(n) {
  var before = playerHP;
  playerHP = Math.min(playerMaxHP, playerHP + n);
  var gained = Math.round(playerHP - before);
  if (gained > 0) GF.spawnFloat(playerBarX(), playerBarY() - 18*GF.S, '+' + gained, '#81c784');
}

function hurtPlayer(n) {
  if (_ssMode) return;
  var dmg = n;
  if (block > 0) { var ab = Math.min(block, dmg); block -= ab; dmg -= ab; }
  if (dmg > 0) {
    playerHP -= dmg; playerHitFlash = 0.2; GF.setShake(0.3);
    GF.spawnFloat(playerBarX(), playerBarY() - 18*GF.S, '-' + dmg, '#ff5252');
    GF.spawnParticles(playerBarX(), playerBarY(), '#ff5252', 6);
  }
  if (playerHP <= 0) { playerHP = 0; gameOver(); }
}

// ── END TURN → ENEMY ACTS ──────────────────────────────────────────────────
function endTurn() {
  if (turnPhase !== 'player' || gs !== 'PLAYING') return;
  // poison ticks on enemy first
  if (enemy.poison > 0) {
    enemy.hp -= enemy.poison;
    enemyHitFlash = 0.16;
    GF.spawnParticles(enemyX(), enemyY(), '#9cff57', 6);
    GF.spawnFloat(enemyX(), enemyY() - 30*GF.S, '-' + enemy.poison, '#9cff57');
    enemy.poison = Math.max(0, enemy.poison - 1);
    if (enemy.hp <= 0) { winFight(); return; }
  }
  turnPhase = 'enemy';
  enemyActTimer = 0.7;
  bannerTxt = curStrings().enemy_turn; bannerT = 0.9;
  GF.saveRun();
}

function resolveEnemyIntent() {
  var e = enemy, it = e.intent;
  if (!it) { startNextEnemyToPlayer(); return; }
  if (it.type === 'attack') {
    var hits = it.hits || 1;
    for (var h = 0; h < hits; h++) {
      var dmg = it.value;
      if (e.weak > 0) dmg = Math.max(1, Math.round(dmg * 0.75));
      hurtPlayer(dmg);
      if (gs !== 'PLAYING') return;
      if (ownsRelic('thorns')) { e.hp -= 3; enemyHitFlash = 0.16; GF.spawnFloat(enemyX(), enemyY()-30*GF.S, '-3', '#ff9c57'); if (e.hp <= 0) { winFight(); return; } }
    }
  } else if (it.type === 'defend') {
    e.block += it.value;
    GF.spawnFloat(enemyX(), enemyY() + 14*GF.S, '+' + it.value + ' ' + GF.t('block'), '#90caf9');
  } else if (it.type === 'buff') {
    e.buffed = (e.buffed || 0) + Math.max(2, Math.round(e.dmg * 0.5));
    GF.spawnFloat(enemyX(), enemyY() + 14*GF.S, '+DMG', '#ff8a80');
    GF.setShake(0.3);
  } else if (it.type === 'debuff') {
    // hex: damage + reduce next-turn energy
    hurtPlayer(it.value);
    if (gs !== 'PLAYING') return;
    pPoisonImmune = 0;
    e.hexPending = true;
    GF.spawnFloat(playerBarX(), playerBarY() - 34*GF.S, GF.t('intent_debuff'), '#ce93d8');
  }
  if (e.weak > 0) e.weak = Math.max(0, e.weak - 1);
  startNextEnemyToPlayer();
}

function startNextEnemyToPlayer() {
  if (gs !== 'PLAYING') return;
  enemy.firstTurn = false;
  chooseIntent();
  startPlayerTurn();
  // hex side effect: reduce energy this turn
  if (enemy.hexPending) { energy = Math.max(1, energy - 1); enemy.hexPending = false; }
}

// ── WIN FIGHT / REWARD ─────────────────────────────────────────────────────
function winFight() {
  if (ownsRelic('leech')) healPlayer(2);
  GF.spawnParticles(enemyX(), enemyY(), enemy.def.col, 26);
  GF.setShake(0.5);
  floor++;
  if (floor - 1 > bestFloor) { /* depth reached counts the floor just cleared */ }
  var clearedFloor = floor - 1;
  if (clearedFloor > bestFloor) { bestFloor = clearedFloor; if (!newBestFlashed) { newBestFlashed = true; } }
  // relic unlock at milestones
  pendingRelicOffer = (clearedFloor % relicEveryNFloors === 0);
  saveMeta();
  GF.happytime();
  openReward();
}

function rollRewardCards() {
  // rarity scales with depth
  var maxR = floor >= 8 ? 2 : floor >= 4 ? 2 : floor >= 2 ? 1 : 1;
  var weights = [];
  for (var i = 0; i < CARD_KEYS.length; i++) {
    var k = CARD_KEYS[i], c = CARDS[k];
    if (c.rarity > maxR) continue;
    // rarer cards weighted lower but available deeper
    var w = c.rarity === 0 ? 3 : c.rarity === 1 ? 4 : 3;
    for (var z = 0; z < w; z++) weights.push(k);
  }
  shuffle(weights);
  var out = [], seen = {};
  for (var j = 0; j < weights.length && out.length < rewardChoices; j++) {
    if (!seen[weights[j]]) { seen[weights[j]] = true; out.push(weights[j]); }
  }
  while (out.length < rewardChoices) out.push('strike');
  return out;
}

function rollRewardRelics() {
  var avail = [];
  for (var i = 0; i < RELIC_KEYS.length; i++) { var k = RELIC_KEYS[i]; if (!ownedRelics[k]) avail.push(k); }
  shuffle(avail);
  return avail.slice(0, Math.min(3, avail.length));
}

function openReward() {
  rewardCards = rollRewardCards();
  if (pendingRelicOffer) { rewardRelics = rollRewardRelics(); } else { rewardRelics = []; }
  gs = 'REWARD'; GF.saveRun();
}

function takeRewardCard(key) {
  discard.push(key);  // new card goes into the deck (discard, reshuffled next reshuffle)
  if (rewardRelics.length > 0) {
    // after card, still need relic pick → keep in REWARD but switch to relic mode
    rewardCards = [];   // hide cards; relics now shown
    pendingRelicOffer = false;
    GF.saveRun();
    return;
  }
  proceedToNextFloor();
}

function takeRewardRelic(key) {
  ownedRelics[key] = true;
  unlockedRelics[key] = true;
  if (key === 'vigor') { playerMaxHP += 8; healPlayer(8); }
  saveMeta();
  rewardRelics = [];
  proceedToNextFloor();
}

function skipRelic() { rewardRelics = []; proceedToNextFloor(); }

function proceedToNextFloor() {
  spawnEnemy(floor);
  // aegis relic: start fight with block
  block = 0;
  if (ownsRelic('aegis')) block = 5;
  startPlayerTurn();
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

// ── RELIC HELPERS ──────────────────────────────────────────────────────────
function ownsRelic(k) { return !!ownedRelics[k]; }

// ── LIFECYCLE ──────────────────────────────────────────────────────────────
function resetRun() {
  floor = 1;
  playerMaxHP = startHP;
  // vigor (if pre-equipped via blessing) handled at blessing pick; base each run
  playerHP = playerMaxHP;
  energy = energyPerTurn; block = 0;
  deck = START_DECK.slice(); shuffle(deck);
  hand.length = 0; discard.length = 0;
  ownedRelics = {};
  reviveUsed = false; reviveLoading = false;
  newBestFlashed = false; tutorialOpen = false; _ssMode = false;
  enemyHitFlash = 0; playerHitFlash = 0; cardAnims.length = 0;
  pendingRelicOffer = false; rewardRelics = []; rewardCards = [];
}

function applyStartBlessing(key) {
  // chosen on MENU if any relic unlocked; equips one for the run
  if (key && RELICS[key]) {
    ownedRelics[key] = true;
    if (key === 'vigor') { playerMaxHP += 8; playerHP = playerMaxHP; }
  }
}

function startGame(blessingKey) {
  resetRun();
  applyStartBlessing(blessingKey);
  spawnEnemy(floor);
  if (ownsRelic('aegis')) block = 5;
  startPlayerTurn();
  gs = 'PLAYING';
  GF.gameStarted(); GF.saveRun();
}

function gameOver() {
  if (floor - 1 > bestFloor) bestFloor = floor - 1;  // safety
  gs = 'GAMEOVER'; turnPhase = 'player';
  saveMeta(); GF.gameEnded(); GF.saveRun();
  if ((floor - 1) >= bestFloor && bestFloor > 0) GF.happytime();
}

function flash(msg) { floatMsg = msg; floatMsgT = 1.1; }

// ── ADS (Yandex) ────────────────────────────────────────────────────────────
function showInterstitial(onDone) {
  var now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  if (now - lastInterstitialMs < INTERSTITIAL_GAP_MS) { if (onDone) onDone(); return; }
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showFullscreenAdv) { if (onDone) onDone(); return; }
  lastInterstitialMs = now;
  var done = false, opened = false;
  var finish = function() { if (done) return; done = true; if (onDone) onDone(); };
  var watchdog = setTimeout(function() { if (!opened) finish(); }, 4500);
  try {
    window.ysdk.adv.showFullscreenAdv({ callbacks: {
      onOpen: function() { opened = true; },
      onClose: function() { clearTimeout(watchdog); finish(); },
      onError: function() { clearTimeout(watchdog); finish(); },
    }});
  } catch (e) { clearTimeout(watchdog); finish(); }
}
function showRewardedRevive() {
  if (reviveUsed || reviveLoading) return;
  reviveLoading = true;
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showRewardedVideo) { reviveLoading = false; doRevive(); return; }
  var rewarded = false, opened = false, done = false;
  var finish = function() { if (done) return; done = true; reviveLoading = false; if (rewarded) doRevive(); };
  var watchdog = setTimeout(function() { if (!opened) finish(); }, 4500);
  try {
    window.ysdk.adv.showRewardedVideo({ callbacks: {
      onOpen: function() { opened = true; },
      onRewarded: function() { rewarded = true; },
      onClose: function() { clearTimeout(watchdog); finish(); },
      onError: function() { clearTimeout(watchdog); finish(); },
    }});
  } catch (e) { clearTimeout(watchdog); finish(); }
}
function doRevive() {
  reviveUsed = true;
  playerHP = Math.max(1, Math.round(playerMaxHP * 0.6));
  // damp the enemy a touch so revive isn't instant re-death
  if (enemy) { enemy.buffed = 0; }
  GF.spawnParticles(playerBarX(), playerBarY(), '#81c784', 24);
  gs = 'PLAYING'; turnPhase = 'player';
  startPlayerTurn();
  GF.gameStarted(); GF.saveRun();
}

// ── SCREENSHOT / GATE HOOKS ─────────────────────────────────────────────────
window._setupForScreenshot = function(lv) {
  startGame();
  _ssMode = true;
  lv = lv || 8;
  floor = lv;
  // build a fat deck + relics so a deep, content-rich state shows
  ownedRelics = { kindling:true, thorns:true };
  unlockedRelics = { kindling:true, thorns:true, vigor:true };
  discard = ['cleave','venom','siphon','bulwark','shatter','drain','flurry','reap','pierce','quicken','focus','rampart'];
  deck = ['strike','strike','jab','guard','brace','hexbolt','cleave','venom'];
  playerMaxHP = startHP + 8; playerHP = Math.round(playerMaxHP * 0.62);
  // spawn a swarm/boss-ish enemy with a populated state
  spawnEnemy(floor);
  enemy.hp = Math.round(enemy.maxHp * 0.58);
  enemy.poison = 5; enemy.block = 6; enemy.weak = 1;
  enemy.intent = { type:'attack', value: scaledEnemyDmg(), hits: (enemy.def.multi ? 3 : 1) };
  // deal a rich hand
  energy = energyPerTurn;
  block = 7;
  hand = ['strike','cleave','guard','venom','siphon','shatter','focus'].slice(0, maxHandRender);
  bannerT = 0;
  turnPhase = 'player';
};
window._jumpLevel = function(n) {
  if (n >= 99) {
    // Drive straight into GAMEOVER so the terminal-state gate confirms it's
    // reachable from a single _jumpLevel(99) call (convention used by the gate).
    startGame();
    playerHP = 1; playerMaxHP = startHP; block = 0; _ssMode = false;
    hurtPlayer(999);   // lethal — sets gs='GAMEOVER' via playerHP<=0
    GF.saveRun();
    return;
  }

};

// ── COORDINATE HELPERS (used by fx + hit-tests) ─────────────────────────────
function enemyX() { return GF.cx; }
function enemyY() { return GF.H * 0.26; }
function playerBarX() { return GF.W * 0.30; }
function playerBarY() { return GF.H - handAreaH() - 26 * GF.S; }
function handAreaH() { return GF.clamp(CARD_H * GF.S + 18 * GF.S, 120, 200); }

// ── INPUT ────────────────────────────────────────────────────────────────
var helpBtn = null, endTurnBtn = null;
var uiButtons = [];
var cardRects = [];              // {idx, x, y, w, h}
var uiLockUntil = 0;

function uiHit(px, py) {
  for (var i = 0; i < uiButtons.length; i++) {
    var b = uiButtons[i];
    if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) { uiLockUntil = Date.now() + 350; b.fn(); return true; }
  }
  return false;
}

function onPress(px, py) {
  pulseT = 0;
  if (Date.now() < uiLockUntil) return;
  if (tutorialOpen) { tutorialOpen = false; return; }

  if (gs === 'MENU') { uiHit(px, py); return; }
  if (gs === 'GAMEOVER') { uiHit(px, py); return; }
  if (gs === 'REWARD') { uiHit(px, py); return; }

  if (gs === 'PLAYING') {
    // help button
    if (helpBtn && px >= helpBtn.x && px <= helpBtn.x + helpBtn.w && py >= helpBtn.y && py <= helpBtn.y + helpBtn.h) { tutorialOpen = true; return; }
    if (turnPhase !== 'player') return;
    // end turn
    if (endTurnBtn && px >= endTurnBtn.x && px <= endTurnBtn.x + endTurnBtn.w && py >= endTurnBtn.y && py <= endTurnBtn.y + endTurnBtn.h) { endTurn(); return; }
    // cards (iterate front-to-back; topmost rendered last so test reverse)
    for (var i = cardRects.length - 1; i >= 0; i--) {
      var r = cardRects[i];
      if (px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h) { playCard(r.idx); return; }
    }
  }
}

var _lastPressTs = 0, _lastPressX = -999, _lastPressY = -999;
function pressGuarded(x, y) {
  var now = Date.now();
  if (now - _lastPressTs < 250 && Math.abs(x - _lastPressX) < 14 && Math.abs(y - _lastPressY) < 14) return;
  _lastPressTs = now; _lastPressX = x; _lastPressY = y;
  onPress(x, y);
}
var _canvas = document.getElementById('c');
_canvas.addEventListener('pointerdown', function(e) { pressGuarded(e.clientX, e.clientY); }, { passive: true });
_canvas.addEventListener('click', function(e) { pressGuarded(e.clientX, e.clientY); });
document.addEventListener('keydown', function(e) {
  if (gs === 'PLAYING' && turnPhase === 'player') {
    if (e.code === 'Space' || e.code === 'Enter') { endTurn(); return; }
    var n = -1;
    if (e.code.indexOf('Digit') === 0) n = parseInt(e.code.slice(5), 10) - 1;
    if (n >= 0 && n < hand.length) playCard(n);
  }
});

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  pulseT += dt;
  if (bannerT > 0) bannerT = Math.max(0, bannerT - dt);
  if (floatMsgT > 0) floatMsgT = Math.max(0, floatMsgT - dt);
  if (enemyHitFlash > 0) enemyHitFlash = Math.max(0, enemyHitFlash - dt);
  if (playerHitFlash > 0) playerHitFlash = Math.max(0, playerHitFlash - dt);
  for (var i = cardAnims.length - 1; i >= 0; i--) { cardAnims[i].t -= dt; if (cardAnims[i].t <= 0) cardAnims.splice(i, 1); }
  if (enemy) enemy.wob += dt;

  if (gs !== 'PLAYING' || _ssMode || tutorialOpen) return;

  if (turnPhase === 'enemy') {
    enemyActTimer -= dt;
    if (enemyActTimer <= 0) { resolveEnemyIntent(); }
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  // background
  var g = ctx.createRadialGradient(GF.cx, GF.H*0.3, 0, GF.cx, GF.H*0.3, Math.max(GF.W, GF.H) * 0.85);
  g.addColorStop(0, '#171029'); g.addColorStop(0.6, '#0b0719'); g.addColorStop(1, '#05030d');
  ctx.fillStyle = g; ctx.fillRect(0, 0, GF.W, GF.H);
  drawGrid(ctx);

  if (gs === 'PLAYING' || gs === 'REWARD' || gs === 'GAMEOVER') {
    if (enemy) drawEnemy(ctx);
    drawCardAnims(ctx);
  }

  if (gs === 'PLAYING') {
    drawHUD(ctx);
    drawHand(ctx);
    if (bannerT > 0) drawBanner(ctx);
    if (floatMsgT > 0) drawFloatMsg(ctx);
    if (tutorialOpen) drawTutorialPanel(ctx);
  }
  if (gs === 'REWARD') drawReward(ctx);
  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
}

function drawGrid(ctx) {
  ctx.strokeStyle = 'rgba(120,90,200,0.05)'; ctx.lineWidth = 1;
  var step = 54 * GF.S;
  for (var x = (GF.cx % step); x < GF.W; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GF.H); ctx.stroke(); }
  for (var y = (GF.cy % step); y < GF.H; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GF.W, y); ctx.stroke(); }
}

// ── VECTOR ICON GLYPHS ──────────────────────────────────────────────────────
// Drawn shapes (NOT emoji) so the telegraphed intent + card types render
// crisply on every platform/font. type: 'sword'|'shield'|'spark'|'skull'|'heart'|'energy'
function drawGlyph(ctx, type, cx, cy, sz, col) {
  ctx.save();
  ctx.translate(cx, cy);
  var s = sz;
  if (type === 'sword') {
    // blade pointing up-left, crossguard, hilt
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(1.6, s*0.13); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(-s*0.42, s*0.42); ctx.lineTo(s*0.34, -s*0.42); ctx.stroke();      // blade
    ctx.beginPath(); ctx.moveTo(s*0.16, -s*0.50); ctx.lineTo(s*0.46, -s*0.20); ctx.stroke();        // tip flare
    ctx.beginPath(); ctx.moveTo(-s*0.50, s*0.12); ctx.lineTo(-s*0.12, s*0.50); ctx.stroke();         // crossguard
    ctx.beginPath(); ctx.moveTo(-s*0.42, s*0.42); ctx.lineTo(-s*0.58, s*0.58); ctx.stroke();         // pommel
  } else if (type === 'shield') {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(0, -s*0.55);
    ctx.lineTo(s*0.52, -s*0.32);
    ctx.lineTo(s*0.42, s*0.22);
    ctx.quadraticCurveTo(s*0.18, s*0.58, 0, s*0.62);
    ctx.quadraticCurveTo(-s*0.18, s*0.58, -s*0.42, s*0.22);
    ctx.lineTo(-s*0.52, -s*0.32);
    ctx.closePath(); ctx.fill();
    // inner notch
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    ctx.beginPath(); ctx.moveTo(0,-s*0.30); ctx.lineTo(s*0.22,-s*0.16); ctx.lineTo(0,s*0.30); ctx.lineTo(-s*0.22,-s*0.16); ctx.closePath(); ctx.fill();
  } else if (type === 'spark') {
    // 4-point star / sparkle
    ctx.fillStyle = col;
    ctx.beginPath();
    for (var i = 0; i < 8; i++) {
      var a = (Math.PI/4)*i - Math.PI/2, rr = (i%2 ? s*0.22 : s*0.6);
      var px = Math.cos(a)*rr, py = Math.sin(a)*rr;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.fill();
  } else if (type === 'skull') {
    // poison: skull head + jaw
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(0, -s*0.1, s*0.46, Math.PI, 0); ctx.lineTo(s*0.30, s*0.28); ctx.lineTo(-s*0.30, s*0.28); ctx.closePath(); ctx.fill();
    ctx.fillRect(-s*0.30, s*0.22, s*0.6, s*0.16);
    // eyes
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.arc(-s*0.18,-s*0.12,s*0.12,0,Math.PI*2); ctx.arc(s*0.18,-s*0.12,s*0.12,0,Math.PI*2); ctx.fill();
  } else if (type === 'heart') {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(0, s*0.5);
    ctx.bezierCurveTo(-s*0.7, -s*0.05, -s*0.35, -s*0.55, 0, -s*0.18);
    ctx.bezierCurveTo(s*0.35, -s*0.55, s*0.7, -s*0.05, 0, s*0.5);
    ctx.closePath(); ctx.fill();
  } else if (type === 'energy') {
    // lightning bolt
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(s*0.12,-s*0.55); ctx.lineTo(-s*0.30,s*0.08); ctx.lineTo(-s*0.02,s*0.08);
    ctx.lineTo(-s*0.12,s*0.55); ctx.lineTo(s*0.30,-s*0.08); ctx.lineTo(s*0.02,-s*0.08);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}
function kindGlyphType(kind) {
  return kind==='atk'?'sword':kind==='blk'?'shield':kind==='pois'?'skull':'spark';
}

// ── ENEMY DRAW (with telegraphed intent badge) ──────────────────────────────
function drawEnemy(ctx) {
  var e = enemy, ex = enemyX(), ey = enemyY();
  var r = ENEMY_SPRITE_R * GF.S * (e.def.boss ? 1.25 : 1) * (1 + 0.02*Math.sin(e.wob*2));
  var col = enemyHitFlash > 0 ? '#ffffff' : e.def.col;

  // aura
  var glow = ctx.createRadialGradient(ex, ey, 0, ex, ey, r * 2.4);
  glow.addColorStop(0, hexA(e.def.col, 0.4)); glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(ex, ey, r*2.4, 0, Math.PI*2); ctx.fill();

  GF.drawSprite(e.key, ex, ey, r * 2.2, function(c, x, y, sz) {
    monsterFallback(c, x, y, r, e, col);
  });

  // monster name
  ctx.fillStyle = '#e8e0ff'; ctx.font = 'bold ' + GF.clamp(15*GF.S, 12, 20) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t(e.def.name), ex, ey + r + 8*GF.S);

  // enemy HP bar (directly under monster)
  var bw = Math.min(GF.W * 0.6, 320*GF.S), bh = GF.clamp(16*GF.S, 12, 22);
  var bx = ex - bw/2, by = ey + r + 30*GF.S;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; GF.rr(ctx, bx, by, bw, bh, bh/2); ctx.fill();
  var frac = GF.clamp(e.hp / e.maxHp, 0, 1);
  var hg = ctx.createLinearGradient(bx, 0, bx+bw, 0); hg.addColorStop(0,'#ff5252'); hg.addColorStop(1,'#ff8a80');
  ctx.fillStyle = hg; GF.rr(ctx, bx, by, bw*frac, bh, bh/2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1; GF.rr(ctx, bx, by, bw, bh, bh/2); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(11*GF.S, 9, 15) + 'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(Math.max(0, Math.ceil(e.hp)) + ' / ' + e.maxHp, ex, by + bh/2 + 0.5);
  ctx.textBaseline = 'top';

  // status pips under HP bar (poison / weak / block) — drawn glyph + number
  var pipFs = GF.clamp(12*GF.S, 10, 16), pipGsz = pipFs * 1.05;
  ctx.font = 'bold ' + pipFs + 'px sans-serif'; ctx.textBaseline = 'middle';
  var pipCY = by + bh + 6*GF.S + pipGsz/2;
  var pips = [];

  if (e.weak > 0) pips.push({ g:null, n:GF.t('weak') + ' ' + e.weak, c:'#ce93d8' });
  if (pips.length) {
    // measure
    var widths = [], totalW = 0;
    for (var p = 0; p < pips.length; p++) {
      var nw = ctx.measureText(pips[p].n).width;
      var pw = (pips[p].g ? pipGsz + 3*GF.S : 0) + nw + 14*GF.S;
      widths.push(pw); totalW += pw;
    }
    var px = ex - totalW/2;
    for (var q = 0; q < pips.length; q++) {
      var cx0 = px + 5*GF.S;
      if (pips[q].g) { drawGlyph(ctx, pips[q].g, cx0 + pipGsz/2, pipCY, pipGsz, pips[q].c); cx0 += pipGsz + 3*GF.S; }
      ctx.fillStyle = pips[q].c; ctx.textAlign = 'left';
      ctx.fillText(pips[q].n, cx0, pipCY + 0.5); px += widths[q];
    }
    ctx.textAlign = 'center';
  }

  // ── INTENT BADGE (THE clarity device) — above the monster, always shown ──
  if (turnPhase === 'player' && e.intent) drawIntent(ctx, ex, ey - r - 18*GF.S, e.intent);
}

function drawIntent(ctx, x, y, it) {
  var gtype = 'sword', txt = '', col = '#ff5252', sub = '';
  if (it.type === 'attack') {
    gtype = 'sword'; col = '#ff5252';
    txt = '' + it.value + (it.hits > 1 ? '×' + it.hits : '');
    sub = curStrings().intent_attack;
  } else if (it.type === 'defend') {
    gtype = 'shield'; col = '#64b5f6'; txt = ''; sub = curStrings().intent_def;
  } else if (it.type === 'buff') {
    gtype = 'spark'; col = '#ffb74d'; txt = ''; sub = curStrings().intent_buff;
  } else if (it.type === 'debuff') {
    gtype = 'skull'; col = '#ce93d8'; txt = '' + it.value; sub = curStrings().intent_debuff;
  }
  var pulse = 0.7 + 0.3 * Math.sin(pulseT * 4);
  var fs = GF.clamp(30*GF.S, 22, 44);
  var gsz = fs * 0.92;
  // measure the number text only; icon is a drawn glyph of width ~gsz
  ctx.font = 'bold ' + fs + 'px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  var txtW = txt ? ctx.measureText(txt).width : 0;
  var gap = txt ? 8*GF.S : 0;
  var inner = gsz + gap + txtW;
  var w = inner + 28*GF.S, h = fs + 14*GF.S;
  var bx = x - w/2, by = y - h;
  ctx.save();
  ctx.shadowColor = col; ctx.shadowBlur = 16*GF.S*pulse;
  ctx.fillStyle = 'rgba(14,10,26,0.94)'; GF.rr(ctx, bx, by, w, h, 10*GF.S); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = col; ctx.lineWidth = 2.4*GF.S; GF.rr(ctx, bx, by, w, h, 10*GF.S); ctx.stroke();
  // draw glyph + number, centered as a group
  var startX = x - inner/2;
  drawGlyph(ctx, gtype, startX + gsz/2, by + h/2, gsz, col);
  if (txt) { ctx.fillStyle = col; ctx.textAlign = 'left'; ctx.fillText(txt, startX + gsz + gap, by + h/2 + 1); }
  ctx.restore();
  // sub label
  ctx.font = GF.clamp(11*GF.S, 9, 15) + 'px sans-serif'; ctx.fillStyle = '#b9aee0';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText(sub, x, by - 4*GF.S);
  ctx.textBaseline = 'top';
  // little pointer arrow toward monster
  ctx.fillStyle = col; ctx.beginPath();
  ctx.moveTo(x, by + h + 9*GF.S); ctx.lineTo(x - 7*GF.S, by + h); ctx.lineTo(x + 7*GF.S, by + h); ctx.closePath(); ctx.fill();
}

function monsterFallback(c, x, y, r, e, col) {
  c.save();
  c.translate(x, y);
  c.fillStyle = col; c.shadowColor = col; c.shadowBlur = 18 * GF.S;
  var key = e.key;
  if (key === 'swarm') {
    // cluster of blobs
    var n = 5;
    for (var i = 0; i < n; i++) {
      var a = (Math.PI*2/n)*i + e.wob*0.3, rr = r*0.55;
      var bx = Math.cos(a)*r*0.55, by = Math.sin(a)*r*0.5;
      c.beginPath(); c.arc(bx, by, rr*0.7, 0, Math.PI*2); c.fill();
    }
    c.beginPath(); c.arc(0, 0, r*0.6, 0, Math.PI*2); c.fill();
  } else if (key === 'brute') {
    // bulky hexagon
    c.beginPath();
    for (var h2 = 0; h2 < 6; h2++) { var ang = (Math.PI/3)*h2 + 0.4; var pxx=Math.cos(ang)*r, pyy=Math.sin(ang)*r*1.05; if(h2===0)c.moveTo(pxx,pyy);else c.lineTo(pxx,pyy); }
    c.closePath(); c.fill();
  } else if (key === 'dreadlord') {
    // jagged crown / spiked
    var spikes = 9;
    c.beginPath();
    for (var k = 0; k < spikes*2; k++) { var aa=(Math.PI/spikes)*k - Math.PI/2; var rad=(k%2?r*0.62:r*1.05); var pxx=Math.cos(aa)*rad, pyy=Math.sin(aa)*rad; if(k===0)c.moveTo(pxx,pyy);else c.lineTo(pxx,pyy); }
    c.closePath(); c.fill();
  } else if (key === 'hexer') {
    // diamond / hooded
    c.beginPath(); c.moveTo(0,-r*1.05); c.lineTo(r*0.85,0); c.lineTo(0,r*1.05); c.lineTo(-r*0.85,0); c.closePath(); c.fill();
  } else {
    // ghoul: rounded blob with drips
    c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(-r*0.45, r*0.55, r*0.28, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(r*0.5, r*0.5, r*0.22, 0, Math.PI*2); c.fill();
  }
  c.shadowBlur = 0;
  // eyes
  c.fillStyle = '#0a0008';
  c.beginPath(); c.arc(-r*0.30, -r*0.14, r*0.15, 0, Math.PI*2); c.arc(r*0.30, -r*0.14, r*0.15, 0, Math.PI*2); c.fill();
  // glowing pupils
  c.fillStyle = enemyHitFlash > 0 ? '#000' : '#ffe14d';
  c.beginPath(); c.arc(-r*0.30, -r*0.14, r*0.06, 0, Math.PI*2); c.arc(r*0.30, -r*0.14, r*0.06, 0, Math.PI*2); c.fill();
  // mouth (fangs) for menace
  c.strokeStyle = '#0a0008'; c.lineWidth = 2*GF.S;
  c.beginPath(); c.moveTo(-r*0.3, r*0.32); c.lineTo(0, r*0.45); c.lineTo(r*0.3, r*0.32); c.stroke();
  c.restore();
}

function drawCardAnims(ctx) {
  for (var i = 0; i < cardAnims.length; i++) {
    var a = cardAnims[i], k = a.t / 0.3;
    ctx.globalAlpha = k;
    ctx.strokeStyle = '#ffe14d'; ctx.lineWidth = 4*GF.S;
    ctx.beginPath(); ctx.arc(a.x, a.y, (1.3 - k) * 60*GF.S, 0.2, Math.PI*1.4); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ── HUD ──────────────────────────────────────────────────────────────────
function drawHUD(ctx) {
  // DEPTH top-center
  var fs = GF.clamp(15*GF.S, 12, 20);
  ctx.textBaseline = 'top'; ctx.textAlign = 'center';
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(20*GF.S, 15, 28) + 'px sans-serif';
  ctx.fillText(GF.t('depth') + ' ' + floor, GF.cx, 12*GF.S);
  if (bestFloor > 0) { ctx.font = GF.clamp(11*GF.S, 9, 15) + 'px sans-serif'; ctx.fillStyle = '#9a8fc0'; ctx.fillText(GF.t('best') + ' ' + bestFloor, GF.cx, 12*GF.S + GF.clamp(20*GF.S,15,28) + 2*GF.S); }

  // help button top-right
  var helpSz = GF.clamp(34*GF.S, 28, 44), pad = 12*GF.S;
  helpBtn = { x: GF.W - pad - helpSz, y: 10*GF.S, w: helpSz, h: helpSz };
  GF.rr(ctx, helpBtn.x, helpBtn.y, helpBtn.w, helpBtn.h, 8*GF.S);
  ctx.fillStyle = 'rgba(40,30,70,0.85)'; ctx.fill();
  ctx.strokeStyle = 'rgba(170,150,230,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#d8c8ff'; ctx.font = 'bold ' + (helpSz*0.55) + 'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('?', helpBtn.x + helpSz/2, helpBtn.y + helpSz/2 + 1);
  ctx.textBaseline = 'top';

  // relics top-left
  var relX = 12*GF.S, relSz = GF.clamp(26*GF.S, 20, 34), relGap = relSz + 6*GF.S;
  var rk = Object.keys(ownedRelics);
  for (var i = 0; i < rk.length; i++) drawRelicIcon(ctx, rk[i], relX + i*relGap, 10*GF.S, relSz);

  // player HP bar + energy (above the hand)
  var barY = playerBarY(), barH = GF.clamp(20*GF.S, 16, 28);
  var hpW = Math.min(GF.W * 0.46, 240*GF.S), hpX = 14*GF.S;
  // block pip on left of HP
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; GF.rr(ctx, hpX, barY, hpW, barH, barH/2); ctx.fill();
  var hpFrac = GF.clamp(playerHP / playerMaxHP, 0, 1), hpCol = hpFrac > 0.5 ? '#66bb6a' : hpFrac > 0.25 ? '#ffb300' : '#ef5350';
  if (playerHitFlash > 0) hpCol = '#fff';
  ctx.fillStyle = hpCol; GF.rr(ctx, hpX, barY, hpW*hpFrac, barH, barH/2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1; GF.rr(ctx, hpX, barY, hpW, barH, barH/2); ctx.stroke();
  var hpFs = GF.clamp(12*GF.S,10,16), heartSz = hpFs * 1.15;
  drawGlyph(ctx, 'heart', hpX + 10*GF.S + heartSz/2, barY + barH/2, heartSz, '#ff8a80');
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + hpFs + 'px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(Math.max(0,Math.ceil(playerHP)) + '/' + playerMaxHP, hpX + 10*GF.S + heartSz + 5*GF.S, barY + barH/2 + 0.5);
  ctx.textBaseline = 'top';

  // block pip
  if (block > 0) {
    var bFs = GF.clamp(15*GF.S,12,20), bSz = bFs * 1.1;
    drawGlyph(ctx, 'shield', hpX + hpW + 12*GF.S + bSz/2, barY + barH/2, bSz, '#64b5f6');
    ctx.fillStyle = '#64b5f6'; ctx.font = 'bold ' + bFs + 'px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('' + block, hpX + hpW + 12*GF.S + bSz + 4*GF.S, barY + barH/2);
    ctx.textBaseline = 'top';
  }

  // energy orb (right of HP, but left of end turn)
  var orbR = GF.clamp(20*GF.S, 16, 28);
  var orbX = GF.W - 14*GF.S - orbR;
  var orbY = barY + barH/2;
  // place end turn button to the LEFT of energy if room; else stack — keep simple: energy top-right of bar row
  ctx.save();
  ctx.shadowColor = '#7e57c2'; ctx.shadowBlur = 12*GF.S;
  var eg2 = ctx.createRadialGradient(orbX-orbR*0.3, orbY-orbR*0.3, orbR*0.1, orbX, orbY, orbR);
  eg2.addColorStop(0, '#8a5cf0'); eg2.addColorStop(1, '#4527a0');
  ctx.fillStyle = eg2; ctx.beginPath(); ctx.arc(orbX, orbY, orbR, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#b39ddb'; ctx.lineWidth = 2*GF.S; ctx.beginPath(); ctx.arc(orbX, orbY, orbR, 0, Math.PI*2); ctx.stroke();
  // faint bolt watermark behind the number
  ctx.globalAlpha = 0.30; drawGlyph(ctx, 'energy', orbX, orbY, orbR*1.5, '#fff'); ctx.globalAlpha = 1;
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(16*GF.S,13,22) + 'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(energy + '/' + energyPerTurn, orbX, orbY + 0.5);
  ctx.restore();
  ctx.textBaseline = 'top';

  // END TURN button — bottom-right above hand row? Put it on the HP row's center-right gap.
  // Place it spanning between block pip area and energy orb is cramped; instead put a wide bar just under HP, right side.
  var etW = GF.clamp(150*GF.S, 120, 190), etH = GF.clamp(44*GF.S, 38, 54);
  var etX = GF.W - 14*GF.S - etW, etY = barY - etH - 8*GF.S;
  // ensure it doesn't overlap depth (top) — it's mid screen-ish, fine
  endTurnBtn = { x: etX, y: etY, w: etW, h: etH };
  var canEnd = turnPhase === 'player';
  var eg = ctx.createLinearGradient(etX, etY, etX, etY+etH);
  if (canEnd) { eg.addColorStop(0, '#ff7043'); eg.addColorStop(1, '#e64a19'); } else { eg.addColorStop(0,'#555'); eg.addColorStop(1,'#3a3a3a'); }
  GF.rr(ctx, etX, etY, etW, etH, etH/2); ctx.fillStyle = eg; ctx.fill();
  ctx.fillStyle = canEnd ? '#fff' : '#999'; ctx.font = 'bold ' + GF.clamp(15*GF.S,12,20) + 'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(GF.t('endturn'), etX + etW/2, etY + etH/2 + 1);
  ctx.textBaseline = 'top';
}

function relicColor(k) {
  return { vigor:'#66bb6a', thorns:'#ff9c57', kindling:'#ffca28', aegis:'#64b5f6', focus:'#b39ddb', venomheart:'#9cff57', leech:'#ef9a9a' }[k] || '#fff';
}
// relics map to one of the drawn glyph shapes (no emoji)
function relicGlyphType(k) {
  return { vigor:'heart', thorns:'spark', kindling:'spark', aegis:'shield', focus:'energy', venomheart:'skull', leech:'skull' }[k] || 'spark';
}
function drawRelicIcon(ctx, k, x, y, sz) {
  GF.rr(ctx, x, y, sz, sz, 6*GF.S); ctx.fillStyle = 'rgba(20,14,36,0.9)'; ctx.fill();
  ctx.strokeStyle = relicColor(k); ctx.lineWidth = 1.5; ctx.stroke();
  drawGlyph(ctx, relicGlyphType(k), x + sz/2, y + sz/2, sz*0.56, relicColor(k));
}

// ── HAND (cards along the bottom) ───────────────────────────────────────────
function cardColor(kind) {
  return { atk:'#e53935', blk:'#1e88e5', pois:'#43a047', util:'#8e24aa' }[kind] || '#666';
}
function drawHand(ctx) {
  cardRects = [];
  var n = hand.length;
  if (n === 0) return;
  var cw = CARD_W * GF.S, ch = CARD_H * GF.S;
  // shrink to fit width
  var maxRowW = GF.W - 16*GF.S;
  var gap = 8*GF.S;
  var totalW = n*cw + (n-1)*gap;
  if (totalW > maxRowW) {
    var scale = maxRowW / totalW;
    cw *= scale; ch *= scale; gap *= scale;
    totalW = n*cw + (n-1)*gap;
  }
  var startX = GF.cx - totalW/2;
  var baseY = GF.H - ch - 12*GF.S;
  for (var i = 0; i < n; i++) {
    var key = hand[i], c = CARDS[key];
    var x = startX + i*(cw+gap);
    var y = baseY - (Math.abs(i-(n-1)/2) < 0.6 ? 6*GF.S : 0); // slight lift center
    var playable = energy >= c.cost;
    drawCard(ctx, x, y, cw, ch, key, playable);
    cardRects.push({ idx:i, x:x, y:y, w:cw, h:ch });
  }
}

function drawCard(ctx, x, y, w, h, key, playable) {
  var c = CARDS[key], col = cardColor(c.kind);
  ctx.save();
  if (!playable) ctx.globalAlpha = 0.5;
  // frame
  GF.rr(ctx, x, y, w, h, 9*GF.S);
  var grad = ctx.createLinearGradient(x, y, x, y+h);
  grad.addColorStop(0, 'rgba(40,34,60,0.98)'); grad.addColorStop(1, 'rgba(22,18,38,0.98)');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = col; ctx.lineWidth = 2.2*GF.S; GF.rr(ctx, x, y, w, h, 9*GF.S); ctx.stroke();
  // top color band
  GF.rr(ctx, x+3*GF.S, y+3*GF.S, w-6*GF.S, h*0.30, 6*GF.S);
  ctx.fillStyle = hexA(col, 0.85); ctx.fill();
  // energy cost orb (top-left)
  var costR = w*0.16;
  ctx.fillStyle = '#3a2a66'; ctx.beginPath(); ctx.arc(x + costR + 3*GF.S, y + costR + 3*GF.S, costR, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#cbb6ff'; ctx.lineWidth = 1.5*GF.S; ctx.beginPath(); ctx.arc(x + costR + 3*GF.S, y + costR + 3*GF.S, costR, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (costR*1.25) + 'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('' + c.cost, x + costR + 3*GF.S, y + costR + 3*GF.S + 0.5);
  // kind glyph (top-right) — drawn shape, not emoji
  var kgSz = w*0.20;
  drawGlyph(ctx, kindGlyphType(c.kind), x + w - 6*GF.S - kgSz/2, y + 5*GF.S + kgSz/2, kgSz, '#ffffff');
  // name
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(w*0.135, 9, 15) + 'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(GF.t('c_'+key+'_n'), x + w/2, y + h*0.34);
  // desc (wrapped)
  ctx.fillStyle = '#cdd6ea'; ctx.font = GF.clamp(w*0.105, 7, 12) + 'px sans-serif';
  var lines = wrapText(ctx, GF.t('c_'+key+'_d'), w - 10*GF.S);
  var ly = y + h*0.50, lh = GF.clamp(w*0.135, 9, 14);
  for (var i = 0; i < Math.min(lines.length, 4); i++) { ctx.fillText(lines[i], x + w/2, ly); ly += lh; }
  ctx.restore();
}

function wrapText(ctx, text, maxW) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var test = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width <= maxW || !cur) cur = test;
    else { lines.push(cur); cur = words[i]; }
  }
  if (cur) lines.push(cur);
  return lines;
}

function drawBanner(ctx) {
  var a = Math.min(1, bannerT);
  ctx.save(); ctx.globalAlpha = a;
  ctx.font = 'bold ' + GF.clamp(26*GF.S, 20, 40) + 'px sans-serif';
  ctx.fillStyle = '#ff5fa2'; ctx.shadowColor = '#ff1744'; ctx.shadowBlur = 20*GF.S;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(bannerTxt, GF.cx, GF.H * 0.46);
  ctx.restore(); ctx.shadowBlur = 0;
}

function drawFloatMsg(ctx) {
  ctx.save(); ctx.globalAlpha = Math.min(1, floatMsgT);
  ctx.font = 'bold ' + GF.clamp(16*GF.S, 13, 22) + 'px sans-serif';
  ctx.fillStyle = '#ffd54f'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(floatMsg, GF.cx, GF.H * 0.58);
  ctx.restore();
}

// ── BUTTON HELPER ──────────────────────────────────────────────────────────
function drawButton(ctx, x, y, w, h, label, fn, opts) {
  opts = opts || {};
  var enabled = opts.enabled !== false;
  var grad = ctx.createLinearGradient(x, y, x, y+h);
  if (!enabled) { grad.addColorStop(0,'#3a3f52'); grad.addColorStop(1,'#2b2f3e'); }
  else if (opts.accent === 'gold') { grad.addColorStop(0,'#ffca28'); grad.addColorStop(1,'#ffa000'); }
  else if (opts.accent === 'ghost') { grad.addColorStop(0,'rgba(60,52,90,0.7)'); grad.addColorStop(1,'rgba(40,34,64,0.7)'); }
  else { grad.addColorStop(0,'#7e3ff2'); grad.addColorStop(1,'#5a1bc8'); }
  GF.rr(ctx, x, y, w, h, Math.min(h/2, 16*GF.S)); ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = enabled ? (opts.accent === 'gold' ? '#3a2a00' : '#fff') : '#7a8096';
  ctx.font = 'bold ' + GF.clamp((opts.fs || 18) * GF.S, 13, 24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w/2, y + h/2 + 1);
  ctx.textBaseline = 'top';
  if (enabled && fn) uiButtons.push({ x:x, y:y, w:w, h:h, fn:fn });
}

// ── MENU ───────────────────────────────────────────────────────────────────
var menuBlessing = null;  // chosen blessing relic key on the menu
function drawMenu(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(5,3,13,0.92)'; ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(40*GF.S, 26, 58);
  ctx.shadowColor = 'rgba(255,59,107,0.55)'; ctx.shadowBlur = 28*GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif'; ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  var topY = GF.clamp(GF.H * 0.11, 48, 130);
  ctx.fillText(GF.t('title'), GF.cx, topY);
  ctx.shadowBlur = 0;
  ctx.font = GF.clamp(14*GF.S, 11, 19) + 'px sans-serif'; ctx.fillStyle = '#c9a0ff';
  ctx.fillText(GF.t('sub'), GF.cx, topY + titleFs * 0.55);

  var seen = loadTutorialSeen();
  var bodyFs = GF.clamp(12.5*GF.S, 10, 15);
  ctx.font = bodyFs + 'px sans-serif';
  var maxW = Math.min(GF.W * 0.88, 470*GF.S), lineH = bodyFs * 1.32, blockGap = bodyFs * 0.5;
  var keys = seen ? ['tut_goal', 'tut_controls', 'tut_tip'] : ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var y = topY + titleFs * 0.55 + GF.clamp(18*GF.S, 12, 28);
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (var k = 0; k < keys.length; k++) {
    var lines = wrapText(ctx, GF.t(keys[k]), maxW);
    ctx.fillStyle = (keys[k] === 'tut_tip') ? '#ffd54f' : '#cdd6ea';
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], GF.cx, y); y += lineH; }
    y += blockGap;
  }

  // blessing pick (if any unlocked relics)
  var uk = Object.keys(unlockedRelics);
  if (uk.length > 0) {
    ctx.fillStyle = '#b39ddb'; ctx.font = 'bold ' + GF.clamp(12*GF.S,10,16) + 'px sans-serif';
    ctx.fillText(GF.t('relic_sub'), GF.cx, y); y += lineH + 4*GF.S;
    var chipSz = GF.clamp(40*GF.S, 32, 52), chipGap = 10*GF.S;
    var showK = uk.slice(0, 4);
    var rowW = showK.length * chipSz + (showK.length-1)*chipGap;
    var rx = GF.cx - rowW/2;
    for (var r = 0; r < showK.length; r++) {
      var rk = showK[r], cx2 = rx + r*(chipSz+chipGap);
      var sel = menuBlessing === rk;
      GF.rr(ctx, cx2, y, chipSz, chipSz, 8*GF.S);
      ctx.fillStyle = sel ? hexA(relicColor(rk), 0.4) : 'rgba(20,14,36,0.9)'; ctx.fill();
      ctx.strokeStyle = relicColor(rk); ctx.lineWidth = sel ? 3 : 1.5; ctx.stroke();
      drawGlyph(ctx, relicGlyphType(rk), cx2 + chipSz/2, y + chipSz/2, chipSz*0.5, relicColor(rk));
      (function(theKey){ uiButtons.push({ x:cx2, y:y, w:chipSz, h:chipSz, fn:function(){ menuBlessing = (menuBlessing === theKey ? null : theKey); } }); })(rk);
    }
    y += chipSz + 6*GF.S;
    if (menuBlessing) { ctx.fillStyle = '#cdd6ea'; ctx.font = GF.clamp(11*GF.S,9,14)+'px sans-serif'; ctx.fillText(GF.t('r_'+menuBlessing+'_n') + ': ' + GF.t('r_'+menuBlessing+'_d'), GF.cx, y); y += lineH; }
  }

  var btnW = GF.clamp(230*GF.S, 170, 300), btnH = GF.clamp(56*GF.S, 50, 66), btnX = GF.cx - btnW/2;
  var btnY = Math.min(y + 12*GF.S, GF.H - btnH - 46*GF.S);
  drawButton(ctx, btnX, btnY, btnW, btnH, GF.t('play'), function() { saveTutorialSeen(); startGame(menuBlessing); });
  if (bestFloor > 0) {
    ctx.font = GF.clamp(13*GF.S, 10, 17) + 'px sans-serif'; ctx.fillStyle = '#8a7fb0'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(GF.t('best') + ': ' + GF.t('floor') + ' ' + bestFloor, GF.cx, btnY + btnH + 22*GF.S);
  }
}

// ── REWARD ───────────────────────────────────────────────────────────────────
function drawReward(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(5,3,13,0.9)'; ctx.fillRect(0, 0, GF.W, GF.H);

  var showRelics = rewardRelics.length > 0 && rewardCards.length === 0;
  var titleKey = showRelics ? 'relic_hdr' : 'reward_hdr';
  var subKey = showRelics ? 'relic_sub' : 'reward_sub';

  var titleFs = GF.clamp(28*GF.S, 20, 42);
  ctx.shadowColor = 'rgba(126,63,242,0.6)'; ctx.shadowBlur = 22*GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif'; ctx.fillStyle = showRelics ? '#ffca28' : '#c9a0ff'; ctx.textAlign='center'; ctx.textBaseline='top';
  var topY = GF.clamp(GF.H * 0.10, 30, 110);
  ctx.fillText(GF.t(titleKey), GF.cx, topY);
  ctx.shadowBlur = 0;
  ctx.font = GF.clamp(13*GF.S, 11, 17) + 'px sans-serif'; ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t(subKey), GF.cx, topY + titleFs + 4*GF.S);

  if (showRelics) {
    drawRelicChoices(ctx, topY + titleFs + 30*GF.S);
  } else {
    drawCardChoices(ctx, topY + titleFs + 30*GF.S);
  }
}

function drawCardChoices(ctx, topY) {
  var n = rewardCards.length;
  var cw = Math.min(GF.W * 0.27, CARD_W * GF.S * 1.15), ch = cw * (CARD_H/CARD_W);
  var gap = GF.clamp(12*GF.S, 8, 20);
  var totalW = n*cw + (n-1)*gap;
  if (totalW > GF.W - 20*GF.S) { var s = (GF.W - 20*GF.S)/totalW; cw*=s; ch*=s; gap*=s; totalW = n*cw + (n-1)*gap; }
  var startX = GF.cx - totalW/2, cy = topY + 10*GF.S;
  for (var i = 0; i < n; i++) {
    var key = rewardCards[i], x = startX + i*(cw+gap);
    drawCard(ctx, x, cy, cw, ch, key, true);
    (function(theKey){ uiButtons.push({ x:x, y:cy, w:cw, h:ch, fn:function(){ takeRewardCard(theKey); } }); })(key);
  }
}

function drawRelicChoices(ctx, topY) {
  var n = rewardRelics.length;
  var cardW = Math.min(GF.W * 0.86, 420*GF.S);
  var cardH = GF.clamp(72*GF.S, 60, 96), gap = 12*GF.S;
  var cardX = GF.cx - cardW/2, cy = topY + 10*GF.S;
  for (var i = 0; i < n; i++) {
    var key = rewardRelics[i], yy = cy + i*(cardH+gap);
    GF.rr(ctx, cardX, yy, cardW, cardH, 12*GF.S);
    var grad = ctx.createLinearGradient(cardX, yy, cardX, yy+cardH);
    grad.addColorStop(0,'rgba(34,28,56,0.96)'); grad.addColorStop(1,'rgba(20,16,36,0.96)');
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = relicColor(key); ctx.lineWidth = 2; ctx.stroke();
    // glyph
    var gr = cardH*0.32, gx = cardX + gr + 14*GF.S, gyc = yy + cardH/2;
    ctx.save(); ctx.shadowColor = relicColor(key); ctx.shadowBlur = 12*GF.S;
    drawGlyph(ctx, relicGlyphType(key), gx, gyc, gr*1.3, relicColor(key));
    ctx.restore();
    var tx = gx + gr + 14*GF.S;
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(16*GF.S,13,21)+'px sans-serif';
    ctx.fillText(GF.t('r_'+key+'_n'), tx, yy + cardH*0.20);
    ctx.fillStyle = '#9fb4d8'; ctx.font = GF.clamp(12*GF.S,10,15)+'px sans-serif';
    var dl = wrapText(ctx, GF.t('r_'+key+'_d'), cardW - (tx-cardX) - 14*GF.S);
    var dy = yy + cardH*0.5;
    for (var d = 0; d < Math.min(dl.length,2); d++) { ctx.fillText(dl[d], tx, dy); dy += GF.clamp(14*GF.S,11,17); }
    (function(theKey){ uiButtons.push({ x:cardX, y:yy, w:cardW, h:cardH, fn:function(){ takeRewardRelic(theKey); } }); })(key);
  }
  // skip button
  var sw = GF.clamp(140*GF.S,110,180), sh = GF.clamp(42*GF.S,36,52);
  var sx = GF.cx - sw/2, sy = cy + n*(cardH+gap) + 8*GF.S;
  if (sy + sh < GF.H - 14*GF.S) drawButton(ctx, sx, sy, sw, sh, GF.t('skip'), skipRelic, { accent:'ghost' });
}

// ── GAME OVER ─────────────────────────────────────────────────────────────────
function drawGameOver(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(8,3,10,0.9)'; ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(40*GF.S, 26, 58);
  ctx.shadowColor = 'rgba(255,59,107,0.5)'; ctx.shadowBlur = 26*GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif'; ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  var topY = GF.H * 0.24;
  ctx.fillText(GF.t('gameover'), GF.cx, topY);
  ctx.shadowBlur = 0;

  var subFs = GF.clamp(17*GF.S, 13, 23);
  ctx.font = subFs + 'px sans-serif'; ctx.fillStyle = '#bcd';
  ctx.fillText(GF.t('depth') + ' ' + (floor - 1), GF.cx, topY + titleFs*0.8);
  var reached = floor - 1;
  if (reached >= bestFloor && bestFloor > 0) {
    ctx.fillStyle = '#7CFC9A'; ctx.font = 'bold ' + subFs + 'px sans-serif';
    ctx.fillText(GF.t('newbest'), GF.cx, topY + titleFs*0.8 + subFs*1.6);
  } else if (bestFloor > 0) {
    ctx.fillStyle = '#9a8fc0'; ctx.font = subFs + 'px sans-serif';
    ctx.fillText(GF.t('best') + ' ' + GF.t('floor') + ' ' + bestFloor, GF.cx, topY + titleFs*0.8 + subFs*1.6);
  }

  var btnW = GF.clamp(230*GF.S, 170, 300), btnH = GF.clamp(54*GF.S, 50, 64), gapY = 11*GF.S;
  var items = [];
  if (!reviveUsed && reached >= 2) items.push({ l: GF.t('revive'), f: showRewardedRevive, o: { accent:'gold', enabled: !reviveLoading } });
  items.push({ l: GF.t('retry'), f: function() { showInterstitial(function(){ startGame(menuBlessing); }); } });
  items.push({ l: GF.t('menu'), f: function() { gs = 'MENU'; }, o: { accent:'ghost' } });
  var nb = items.length, stackH = nb*btnH + (nb-1)*gapY, bX = GF.cx - btnW/2;
  var minY = topY + titleFs*0.8 + subFs*3.0;
  var bY = GF.clamp(GF.cy, minY, GF.H - stackH - 26*GF.S);
  for (var i = 0; i < nb; i++) drawButton(ctx, bX, bY + i*(btnH+gapY), btnW, btnH, items[i].l, items[i].f, items[i].o || {});
}

// ── TUTORIAL PANEL (reopened via ? button) ──────────────────────────────────
function drawTutorialPanel(ctx) {
  ctx.fillStyle = 'rgba(5,3,13,0.94)'; ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(24*GF.S, 18, 34);
  ctx.font = 'bold ' + titleFs + 'px sans-serif'; ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.textBaseline='top';
  var topY = GF.clamp(GF.H * 0.10, 36, 120);
  ctx.fillText(GF.t('title'), GF.cx, topY);

  var bodyFs = GF.clamp(13*GF.S, 11, 17);
  ctx.font = bodyFs + 'px sans-serif';
  var maxW = Math.min(GF.W * 0.88, 480*GF.S), lineH = bodyFs * 1.34, blockGap = bodyFs * 0.55;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var y = topY + titleFs * 1.5;
  for (var k = 0; k < keys.length; k++) {
    var lines = wrapText(ctx, GF.t(keys[k]), maxW);
    ctx.fillStyle = (keys[k] === 'tut_tip') ? '#ffd54f' : '#cdd6ea';
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], GF.cx, y); y += lineH; }
    y += blockGap;
  }
  ctx.fillStyle = '#9ab'; ctx.font = bodyFs + 'px sans-serif';
  ctx.fillText(GF.t('close_hint'), GF.cx, Math.min(y + 8*GF.S, GF.H - 26*GF.S));
}

// ── helpers ─────────────────────────────────────────────────────────────────
function hexA(hex, a) {
  // hex like #rrggbb → rgba
  var h = hex.replace('#',''); if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  var r = parseInt(h.substr(0,2),16), g = parseInt(h.substr(2,2),16), b = parseInt(h.substr(4,2),16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'deck_of_dread',
  onReady: function() {
    loadMeta();
    GF.persist('deck_of_dread_run_v1',
      function() {
        if (gs !== 'PLAYING') return null;  // only persist an active run
        return {
          gs: gs, floor: floor,
          playerHP: playerHP, playerMaxHP: playerMaxHP, block: block, energy: energy,
          deck: deck, hand: hand, discard: discard,
          ownedRelics: ownedRelics, turnPhase: turnPhase,
          enemy: enemy ? { key:enemy.key, hp:enemy.hp, maxHp:enemy.maxHp, dmg:enemy.dmg, block:enemy.block, poison:enemy.poison, weak:enemy.weak, buffed:enemy.buffed, firstTurn:enemy.firstTurn, intent:enemy.intent } : null,
        };
      },
      function(s) {
        if (!s) return;
        floor = s.floor || 1;
        playerMaxHP = s.playerMaxHP || startHP; playerHP = (typeof s.playerHP === 'number') ? s.playerHP : playerMaxHP;
        block = s.block || 0; energy = (typeof s.energy === 'number') ? s.energy : energyPerTurn;
        deck = s.deck || []; hand = s.hand || []; discard = s.discard || [];
        ownedRelics = s.ownedRelics || {};
        turnPhase = 'player';
        if (s.enemy && MONSTERS[s.enemy.key]) {
          var def = MONSTERS[s.enemy.key];
          enemy = { key:s.enemy.key, def:def, hp:s.enemy.hp, maxHp:s.enemy.maxHp, dmg:s.enemy.dmg, block:s.enemy.block||0, poison:s.enemy.poison||0, weak:s.enemy.weak||0, buffed:s.enemy.buffed||0, intent:s.enemy.intent||null, firstTurn:!!s.enemy.firstTurn, wob:0, defendStreak:0 };
          if (!enemy.intent) chooseIntent();
        }
        gs = 'PLAYING';
      }
    );
    // If resumed mid-fight, keep player on their own turn (safe — Yandex 1.9).
    if (gs === 'PLAYING' && !enemy) { gs = 'MENU'; }
    if (gs === 'PLAYING') { turnPhase = 'player'; }
  },
  onUpdate: update,
  onDraw: draw,
});

// ── EXPOSE STATE (post-build-tester / DESIGN.md cross-check) ─────────────────
GF.exposeState(function() {
  return {
    gs: gs, floor: floor, bestFloor: bestFloor,
    playerHP: playerHP, playerMaxHP: playerMaxHP, energy: energy, block: block,
    enemyHP: enemy ? enemy.hp : 0, enemyMaxHP: enemy ? enemy.maxHp : 0,
    enemyKey: enemy ? enemy.key : null,
    enemyIntent: enemy && enemy.intent ? enemy.intent.type : null,
    enemyIntentValue: enemy && enemy.intent ? (enemy.intent.value|0) : 0,
    enemyPoison: enemy ? enemy.poison : 0, enemyBlockVal: enemy ? enemy.block : 0,
    handCount: hand.length, deckCount: deck.length, discardCount: discard.length,
    totalDeck: deck.length + hand.length + discard.length,
    cardPoolSize: CARD_KEYS.length, relicPoolSize: RELIC_KEYS.length,
    ownedRelicCount: Object.keys(ownedRelics).length,
    unlockedRelicCount: Object.keys(unlockedRelics).length,
    turnPhase: turnPhase, tutorialOpen: tutorialOpen,
    // tunables (DESIGN.md contract)
    startHP: startHP, energyPerTurn: energyPerTurn, handSize: handSize, drawPerTurn: drawPerTurn,
    baseEnemyHP: baseEnemyHP, enemyHPGrowth: enemyHPGrowth, baseEnemyDmg: baseEnemyDmg, dmgGrowth: dmgGrowth,
    rewardChoices: rewardChoices, relicEveryNFloors: relicEveryNFloors, startDeckSize: startDeckSize, maxHandRender: maxHandRender,
  };
});

// ── TEST / AUTOMATION HOOKS (safe to ship) ──────────────────────────────────
window._setLang = function(l) { GF.lang = l; };
window._setState = function(s) { gs = s; };
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'sans-serif'; };
window._start = function() { startGame(); };
window._uiButtons = function() { return uiButtons.map(function(b){ return { x:b.x, y:b.y, w:b.w, h:b.h }; }); };
window._cardRects = function() { return cardRects.slice(); };
window._endTurn = function() { endTurn(); };
window._playCard = function(i) { if (gs === 'PLAYING' && turnPhase === 'player') playCard(i|0); };
window._hurt = function(n) { hurtPlayer(n || 10); };
window._winFight = function() { if (gs === 'PLAYING') { enemy.hp = 0; winFight(); } };
window._setFloor = function(f) { floor = f|0; if (gs==='PLAYING') { spawnEnemy(floor); startPlayerTurn(); } };

})();
</script>
