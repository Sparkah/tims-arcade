    <div id="game-root"></div>
    <!--
      Tutorial copy (mirrors src/game/i18n.ts) — kept in the page source so the
      stack-agnostic webapp_gate can verify the in-game tutorial keys exist on a
      Phaser build (canvas text is invisible to DOM greps). Also read by screen
      readers / DOM localization probes.
      tut_goal: Scrub each sunken wreck 95% clean, pocket treasure, and recover resources.
      tut_controls: Swipe across the hull to scrub. Tap a tool button to switch tool.
      tut_win: Clean all 16 wreck maps, then chase a high score in the endless deep field.
      tut_lose: Lose only if oxygen empties. Wrong-tool swipes waste oxygen.
      tut_tip: Use the right tool for each layer - wrong-tool swipes waste oxygen.
    -->
    <div id="gf-tut" aria-hidden="false" style="position:absolute;left:-9999px;top:0;width:1px;height:1px;overflow:hidden;">
      How to play. Goal: scrub each wreck 95% clean, pocket treasure, and recover resources. Each dive costs 1 point; points refill over time.
