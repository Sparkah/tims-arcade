var ROLL_DRAG    = 0.30;   // passive ground roll drag (per second, fraction)
var AIR_DRAG     = 0.06;   // horizontal air drag fraction per second
var MAX_SPEED    = 560;    // px/s base top speed (base, +Engine)
var NITRO_FORCE  = 520;    // px/s impulse per nitro tap (forward + up)
var NITRO_BASE   = 2;      // nitro charges per run at level 0 (max 6)
var BOUNCE       = 0.28;   // ground restitution on a hard landing (base, +Wheels)
var TILT_RATE    = 3.4;    // rad/s the player can rotate the chassis in the air
var WHEEL_GRIP   = 9.0;    // how fast chassis angle eases to the slope on ground
var REST_SPEED   = 42;     // px/s; below this (grounded) the buggy is "resting"
var REST_SETTLE  = 1.1;    // s below REST_SPEED before the run ends
var SCRAP_PER_M  = 0.42;   // scrap per metre travelled

var ZONE_STEP    = 200;    // metres per biome
var LOOKAHEAD    = 0.40;   // camera lookahead as a fraction of screen width

// ── UTILS ───────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function lerp(a, b, x) { return a + (b - a) * x; }
function rr(c, x, y, w, h, r) {
  if (!(w > 0) || !(h > 0) || !isFinite(x) || !isFinite(y)) return;
  r = Math.max(0, Math.min(r, w / 2, h / 2)); if (!isFinite(r)) r = 0;
  c.beginPath(); c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r); c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r); c.arcTo(x, y, x + w, y, r); c.closePath();
}
function hit(b, x, y) { return b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }
// Mulberry32 deterministic PRNG (ported from noob_run)
function makeRng(seed) {
  var s = seed | 0;
  return function () {
    s = (s + 0x6D2B79F5) | 0; var t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1); t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

    var raw = localStorage.getItem('noob_rider_meta_v1');

      meta.vehicle = m.vehicle || 'buggy'; meta.lastDaily = m.lastDaily || 0;
      if (m.up) { for (var k in meta.up) if (typeof m.up[k] === 'number') meta.up[k] = m.up[k] | 0; }

  } catch (e) {}

  try { seenTut = localStorage.getItem('noob_rider_seen_tut') === '1'; } catch (e) {}
}

// ── DAILY HAUL (D1 hook seed) ───────────────────────────────────────────────
function dailyReady() { return (Date.now() - (meta.lastDaily || 0)) > 20 * 3600 * 1000; }
function claimDaily() {
  if (!dailyReady()) return;
  var amt = 120 + Math.floor((meta.bestDist || 0) * 0.25);
  meta.scrap += amt; meta.lastDaily = Date.now(); saveMeta();
  Sfx.reward ? Sfx.reward() : Sfx.buy();
  GF.spawnFloat(GF.W / 2, GF.H * 0.4, '+' + amt + ' ' + GF.t('scrap'), '#ffd166');
}

// ════════════════════════════════════════════════════════════════════════
//  TERRAIN GENERATION (continuous heightmap polyline + props + scrap arcs)
//  Adapted from noob_run's extendGround/spawnGroup to a horizontal driver:
//  the camera tracks the buggy X (with lookahead) instead of fixed scroll.
// ════════════════════════════════════════════════════════════════════════
function baseGroundY() { return GF.H * 0.66; }   // resting ground band (world == screen at y; world y is absolute)
// terrain stored in WORLD coords. We keep a rolling polyline; collisions sample it.

function terrYAt(x) {
  // linear-interpolate the ground polyline height at world-x
  if (terr.length === 0) return baseGroundY();
  if (x <= terr[0].x) return terr[0].y;
  if (x >= terr[terr.length - 1].x) return terr[terr.length - 1].y;
  // binary search
  var lo = 0, hi = terr.length - 1;
  while (hi - lo > 1) { var mid = (lo + hi) >> 1; if (terr[mid].x < x) lo = mid; else hi = mid; }
  var a = terr[lo], b = terr[hi];
  var t = (x - a.x) / Math.max(1e-3, (b.x - a.x));
  return a.y + (b.y - a.y) * t;
}
function terrSlopeAt(x) {
  var d = 6 * GF.S;
  return Math.atan2(terrYAt(x + d) - terrYAt(x - d), 2 * d);
}

function resetTerrain() {
  terr = []; props = []; coins = [];
  var S = GF.S, y0 = baseGroundY();
  // long flat runway under the start
  var x = -260 * S;
  terr.push({ x: x, y: y0 });
  x = GF.W * 1.1;
  terr.push({ x: x, y: y0 });   // flat tutorial runway
  genX = x;
  zoneIdx = 0; prevZoneIdx = -1;
}

// push a terrain point, return it
function pushPt(x, y) { var p = { x: x, y: y }; terr.push(p); return p; }

// generate one "segment" of terrain ahead of genX. Picks a feature based on the
// active biome's hazard pool and the run distance.
function genSegment() {
  var S = GF.S, r = rng();
  var lastY = terr[terr.length - 1].y;
  var biomeM = dist;                          // metres reached (drives difficulty)
  var z = zoneFor(Math.floor(camX / (ZONE_STEP * PX_PER_M * S)));   // biome at camera (visual)
  var zi = Math.floor((camX / S) / (ZONE_STEP * PX_PER_M));
  var d = clamp(dist / 700, 0, 1);            // 0..1 difficulty ramp
  var segW = (180 + r * 140) * S;             // segment length
  var x0 = genX;

  // choose a feature
  var pool = ['hill', 'hill', 'bump'];
  if (dist > 40) pool.push('ramp', 'crates');
  if (dist > 120) pool.push('gap', 'spike');
  if (dist > 260) pool.push('gap', 'ramp');
  var feature = pool[Math.floor(r * pool.length)];
  if (dist < 24) feature = 'hill';            // gentle ease-in

  var minY = GF.H * 0.40, maxY = GF.H * 0.82; // clamp ground band so it stays on screen

  if (feature === 'hill') {
    // a rolling hill: dip then rise
    var amp = (30 + r * (50 + 70 * d)) * S * (rng() < 0.5 ? -1 : 1);
    var midY = clamp(lastY + amp * 0.5, minY, maxY);
    var endY = clamp(lastY + amp, minY, maxY);
    pushPt(x0 + segW * 0.5, midY);
    pushPt(x0 + segW, endY);
    maybeCrates(x0 + segW * 0.55, endY, 0.4);

  } else if (feature === 'bump') {
    var by = clamp(lastY - (20 + r * 40) * S, minY, maxY);
    pushPt(x0 + segW * 0.4, by);
    pushPt(x0 + segW * 0.6, by);
    pushPt(x0 + segW, clamp(lastY + (r - 0.5) * 30 * S, minY, maxY));

  } else if (feature === 'ramp') {
    // a kicker ramp: gentle approach then a steep up-edge that launches you
    var ry = clamp(lastY, minY, maxY);
    pushPt(x0 + segW * 0.55, ry);
    var top = clamp(ry - (60 + r * 60 + 60 * d) * S, minY + 20 * S, maxY);
    pushPt(x0 + segW * 0.92, top);            // steep ramp lip
    // landing further on (drop)
    var land = clamp(top + (50 + r * 50) * S, minY, maxY);
    pushPt(x0 + segW + (90 + r * 80) * S, land);
    genX = terr[terr.length - 1].x;
    // a scrap arc to grab off the jump
    scrapArc(x0 + segW * 0.92, top - 60 * S, top - 150 * S, 5);
    return;

  } else if (feature === 'gap') {
    // a pit: terrain drops out of view then resumes on a landing platform.
    var pw = (90 + r * (60 + 120 * d)) * S;
    var edgeY = clamp(lastY, minY, maxY);
    pushPt(x0 + segW * 0.5, edgeY);           // approach to lip
    var lipX = x0 + segW * 0.6;
    pushPt(lipX, edgeY);
    // floor of the pit (deep, off-screen-ish) so falling in costs speed+damage
    var floorY = GF.H + 80 * S;
    pushPt(lipX + 2 * S, floorY);
    var landX = lipX + pw;
    pushPt(landX, floorY);
    pushPt(landX + 2 * S, clamp(edgeY + (r - 0.3) * 30 * S, minY, maxY));
    // lava in the pit in lava/void biomes (visual + damage tick)
    if (z.lava) props.push({ type:'lava', x: lipX, y: GF.H * 0.86, w: pw, h: 80 * S, phase: rng() * 6 });
    scrapArc(lipX + pw * 0.5, edgeY - 70 * S, edgeY - 150 * S, 5);
    genX = terr[terr.length - 1].x;
    return;

  } else if (feature === 'crates') {
    var cy = clamp(lastY + (r - 0.5) * 30 * S, minY, maxY);
    pushPt(x0 + segW, cy);
    maybeCrates(x0 + segW * 0.4, cy, 1.0);

  } else if (feature === 'spike') {
    var sy = clamp(lastY + (r - 0.5) * 20 * S, minY, maxY);
    pushPt(x0 + segW, sy);
    var n = 1 + (d > 0.4 ? Math.floor(rng() * 2) : 0);
    for (var i = 0; i < n; i++) {
      var sxk = x0 + segW * 0.45 + i * 30 * S;
      props.push({ type:'spike', x: sxk, w: 28 * S, h: (24 + 12 * d) * S, gy: terrYAt(sxk) });
    }
  }
  genX = terr[terr.length - 1].x;
}

function maybeCrates(x, gy, p) {
  if (rng() > p) return;
  var S = GF.S, n = 1 + Math.floor(rng() * 3);
  for (var i = 0; i < n; i++) {
    var cx0 = x + i * 30 * S;
    var tnt = rng() < 0.18;
    props.push({ type: tnt ? 'tnt' : 'crate', x: cx0, w: 28 * S, h: 28 * S, gy: terrYAt(cx0), dead:false });
  }
}
function scrapArc(x, y1, yTop, n) {
  var S = GF.S;
  for (var i = 0; i < n; i++) {
    var t = i / (n - 1);
    var yy = lerp(y1, yTop, Math.sin(t * Math.PI));
    coins.push({ x: x + (t - 0.5) * 120 * S, y: yy, taken: false });
  }
}

function ensureTerrain() {
  // keep terrain generated ~2 screens ahead of the camera; prune behind
  var aheadTo = camX + GF.W * 2.0;
  var guard = 0;
  while (genX < aheadTo && guard++ < 40) genSegment();
  // prune points well behind camera
  var cutX = camX - GF.W * 0.6;
  while (terr.length > 3 && terr[1].x < cutX) terr.shift();
  for (var i = props.length - 1; i >= 0; i--) if (props[i].x < cutX - 60 * GF.S) props.splice(i, 1);
  for (var j = coins.length - 1; j >= 0; j--) if (coins[j].x < cutX - 60 * GF.S) coins.splice(j, 1);
}

// ════════════════════════════════════════════════════════════════════════
//  RUN LIFECYCLE
// ════════════════════════════════════════════════════════════════════════
function startRun() {
  gs = 'PLAYING';
  dist = 0; runScrap = 0; smashes = 0; goT = 0; slow = 0;
  nitro = statNitroMax();
  zoneIdx = 0; prevZoneIdx = -1; bannerT = 0;
  debris = []; ragdoll = null;
  rng = makeRng((Date.now() & 0x7fffffff) ^ 0x9e3779b9);
  camX = 0; camY = 0;
  resetTerrain();
  // place the buggy on the runway
  var sx = GF.W * 0.32;
  buggy.x = sx; buggy.y = terrYAt(sx) - (BUGGY_H * 0.5 + WHEEL_R) * GF.S;
  buggy.vx = 60 * GF.S; buggy.vy = 0; buggy.ang = 0; buggy.vang = 0;
  buggy.onGround = true; buggy.dmg = 0; buggy.restT = 0; buggy.driverEjected = false;
  buggy.parts = { windshield:false, front:false, rear:false, cab:false, driver:false };
  ensureTerrain();
  GF.gameStarted();
  if (!seenTut && !window._silent) startTutorial();
}

function endRun() {
  if (gs === 'GAMEOVER') return;
  gs = 'GAMEOVER'; goT = 0;
  var banked = runScrap + Math.floor(dist * SCRAP_PER_M);
  runEndScrapBank = banked;
  meta.scrap += banked;
  meta.totalDist += Math.floor(dist);
  goNewBest = Math.floor(dist) > meta.bestDist;
  if (goNewBest) meta.bestDist = Math.floor(dist);
  // unlock check (vehicles unlock purely by bestDist; just play a stinger)
  saveMeta();
  Sfx.crash();
  GF.gameEnded();
  GF.ads.interstitial();   // capped + safe no-op; fires only at this natural break
}
function onRetry() { GF.gameStarted(); startRun(); }

// ── GARAGE ──────────────────────────────────────────────────────────────────
function openGarage() { gs = 'GARAGE'; helpOpen = false; if (garageScroll) garageScroll.scrollTo(0); }
function buyUpgrade(key) {
  var u = null; for (var i=0;i<UPGRADES.length;i++) if (UPGRADES[i].key===key) u=UPGRADES[i];
  if (!u) return;
  if (upLvl(key) >= u.max) return;
  var cost = upCost(u);
  if (meta.scrap < cost) { Sfx.click(); return; }
  meta.scrap -= cost; meta.up[key] = upLvl(key) + 1; saveMeta(); Sfx.buy();
  GF.spawnFloat(GF.W / 2, GF.H * 0.3, '-' + cost, '#ff9a6a');
}
function equipVehicle(id) {
  var v = vehById(id); if (!vehUnlocked(v)) { Sfx.click(); return; }
  meta.vehicle = id; saveMeta(); Sfx.unlock();
}

// ════════════════════════════════════════════════════════════════════════
//  PHYSICS + UPDATE
// ════════════════════════════════════════════════════════════════════════
function fireNitro() {
  if (nitro <= 0) return;
  nitro--;
  var a = buggy.ang;
  buggy.vx += Math.cos(a) * NITRO_FORCE * GF.S;
  buggy.vy += (Math.sin(a) - 0.5) * NITRO_FORCE * GF.S;   // forward + up bias
  Sfx.nitro();
  GF.setShake(0.5);
  for (var i = 0; i < 10; i++) GF.spawnParticles(sx(buggy.x) - Math.cos(a) * 30 * GF.S, sy(buggy.y) - Math.sin(a) * 30 * GF.S, '#7cd8ff', 1);
}

function addDamage(amount) {
  if (godMode) return;
  amount = amount / statArmor();
  buggy.dmg = clamp(buggy.dmg + amount, 0, 1.3);
  checkParts();
}
function shedPart(kind, col) {
  var S = GF.S, a = buggy.ang;
  debris.push({
    x: sx(buggy.x) + (rng() - 0.5) * 30 * S, y: sy(buggy.y) + (rng() - 0.5) * 16 * S,
    vx: -buggy.vx * 0.3 + (rng() - 0.5) * 120 * S, vy: -160 * S - rng() * 120 * S,
    w: (12 + rng() * 12) * S, h: (10 + rng() * 10) * S, rot: a, vrot: (rng() - 0.5) * 12,
    col: col, life: 2.2,
  });
}
function checkParts() {
  var p = buggy.parts;
  if (!p.windshield && buggy.dmg >= DMG_WIND) { p.windshield = true; GF.spawnParticles(sx(buggy.x), sy(buggy.y) - 14 * GF.S, '#bfe9ff', 8); }
  if (!p.front && buggy.dmg >= DMG_FRONT) { p.front = true; shedPart('front', curVeh().col); Sfx.metal(); }
  if (!p.rear && buggy.dmg >= DMG_REAR) { p.rear = true; shedPart('rear', curVeh().col2); Sfx.metal(); }
  if (!p.cab && buggy.dmg >= DMG_CAB) { p.cab = true; shedPart('cab', curVeh().col2); Sfx.metal(); GF.setShake(0.5); }
  if (!p.driver && buggy.dmg >= DMG_EJECT) {
    p.driver = true; buggy.driverEjected = true;
    ragdoll = { x: sx(buggy.x), y: sy(buggy.y) - 20 * GF.S, vx: -buggy.vx * 0.2 + 40 * GF.S, vy: -260 * GF.S, rot: 0, vrot: 8 };
    GF.spawnFloat(sx(buggy.x), sy(buggy.y) - 40 * GF.S, GF.t('wrecked'), '#ff6a6a');
    GF.setShake(0.8); Sfx.metal();
  }
}

// world->screen transform
function sx(wx) { return wx - camX; }
function sy(wy) { return wy - camY; }

function update(dt) {
  GF.tutorial.update(dt);
  if (slow > 0) { slow -= dt; dt *= 0.45; }
  if (bannerT > 0) bannerT -= dt;

  if (gs !== 'PLAYING') return;
  if (GF.tutorial.active && GF.tutorial.step === 0 && !window._silent) {
    // freeze the world until the player presses gas (tutorial step 1), but still
    // let the buggy settle visually
  }

  var S = GF.S, g = GRAVITY * S;

  // keyboard gas/brake/tilt
  var gas = gasHeld || GF.keys['ArrowRight'] || GF.keys['KeyD'] || touchZones.gas;
  var brake = brakeHeld || GF.keys['ArrowLeft'] || GF.keys['KeyA'] || touchZones.brake;
  var tiltUp = tiltUpHeld || GF.keys['KeyW'] || GF.keys['ArrowUp'];
  var tiltDown = tiltDownHeld || GF.keys['KeyS'] || GF.keys['ArrowDown'];

  // sample ground beneath the two wheel contact points
  var halfW = (BUGGY_W * 0.5) * S;
  var gyFront = terrYAt(buggy.x + halfW * Math.cos(buggy.ang));
  var gyRear = terrYAt(buggy.x - halfW * Math.cos(buggy.ang));
  var slope = terrSlopeAt(buggy.x);
  var contactY = Math.min(gyFront, gyRear) - (WHEEL_R) * S;   // chassis centre rest height
  var chassisRest = contactY - (BUGGY_H * 0.5) * S;

  var grounded = buggy.y >= chassisRest - 2 * S && buggy.vy >= -1;

  if (grounded) {
    // snap to slope, drive along it
    buggy.y = chassisRest;
    if (buggy.vy > 0) {
      // landing — convert downward speed into damage if hard
      var impact = buggy.vy / S;
      if (impact > 260) {
        var dmg = (impact - 260) / 900 * statLanding();
        if (dmg > 0.02) { addDamage(dmg); GF.setShake(clamp(dmg * 2, 0, 0.7)); if (dmg > 0.12) { slow = 0.12; Sfx.metal(); } }
      }
      buggy.vy = -buggy.vy * statBounce();
      if (Math.abs(buggy.vy) < 30 * S) buggy.vy = 0;
      if (impact > 120) Sfx.bounce();
    }
    buggy.onGround = true;
    // ease chassis angle to the slope
    buggy.ang = lerp(buggy.ang, slope, clamp(WHEEL_GRIP * dt, 0, 1));
    buggy.vang = 0;

    // drive force along the slope
    var fwd = Math.cos(slope), down = Math.sin(slope);
    if (gas) {
      buggy.vx += statAccel() * S * dt * fwd;
      buggy.vy += statAccel() * S * dt * down;
      if (rng() < 0.3) GF.spawnParticles(sx(buggy.x) - halfW, sy(buggy.y) + 10 * S, zoneFor(zoneIdx).accent, 1);
    }
    if (brake) {
      var sp = Math.sqrt(buggy.vx * buggy.vx + buggy.vy * buggy.vy);
      if (sp > 4 * S) {
        var bf = Math.min(sp, BRAKE_ACCEL * S * dt);
        buggy.vx -= bf * (buggy.vx / sp); buggy.vy -= bf * (buggy.vy / sp);
      }
    }
    // gravity pull along slope (so you slow uphill, speed downhill)
    buggy.vx += g * dt * Math.sin(slope) * Math.cos(slope) * 0.6;
    // roll drag
    var fr = zoneFor(zoneIdx).friction;
    var drag = Math.pow(1 - fr * (brake ? 1.4 : 1.0), dt);
    buggy.vx *= drag; buggy.vy *= drag;
    // wrecked buggy loses grip → extra drag
    if (buggy.dmg >= 1) { buggy.vx *= Math.pow(0.55, dt); }

    // cap top speed
    var top = statTop() * S;
    var spd = Math.sqrt(buggy.vx * buggy.vx + buggy.vy * buggy.vy);
    if (spd > top) { buggy.vx *= top / spd; buggy.vy *= top / spd; }

    // rest detection: rolled to a stop
    if (Math.abs(buggy.vx) < REST_SPEED * S && !gas) {
      buggy.restT += dt;
      if (buggy.restT >= REST_SETTLE) endRun();
    } else buggy.restT = 0;

  } else {
    // airborne
    buggy.onGround = false; buggy.restT = 0;
    buggy.vy += g * dt;
    buggy.vx *= Math.pow(1 - AIR_DRAG, dt);
    // player tilt control in the air
    if (tiltUp || (gas && !grounded)) buggy.vang -= TILT_RATE * dt * 1.0;     // gas in air = nose down
    if (tiltDown || (brake && !grounded)) buggy.vang += TILT_RATE * dt * 1.0; // brake in air = nose up
    // gentle auto-stabilise toward flight direction
    var flightAng = Math.atan2(buggy.vy, Math.max(1, Math.abs(buggy.vx))) * Math.sign(buggy.vx || 1);
    buggy.vang += (clamp(flightAng, -1.0, 1.0) - buggy.ang) * 1.2 * dt;
    buggy.vang *= Math.pow(0.5, dt);
    buggy.ang += buggy.vang * dt;
    buggy.ang = clamp(buggy.ang, -1.4, 1.4);
  }

  // integrate position
  buggy.x += buggy.vx * dt;
  buggy.y += buggy.vy * dt;

  // distance + scrap from distance
  var newDist = Math.max(dist, (buggy.x - GF.W * 0.32) / (PX_PER_M * S));
  if (newDist > dist) { dist = newDist; }

  // biome transition
  var zi = Math.floor(dist / ZONE_STEP);
  if (zi !== zoneIdx) {
    zoneIdx = zi;
    if (zi !== prevZoneIdx) { prevZoneIdx = zi; bannerT = 2.4; bannerKey = zoneFor(zi).key; Sfx.zone(); }
  }

  // camera follows with lookahead; vertical eases to keep buggy framed
  var targetCamX = buggy.x - GF.W * (0.32) + buggy.vx * LOOKAHEAD * 0.5;
  camX = lerp(camX, Math.max(camX, targetCamX), clamp(6 * dt, 0, 1));
  if (targetCamX < camX) camX = lerp(camX, targetCamX, clamp(3 * dt, 0, 1));
  var targetCamY = clamp(buggy.y - GF.H * 0.52, -GF.H * 0.5, GF.H * 0.5);
  camY = lerp(camY, targetCamY, clamp(4 * dt, 0, 1));

  ensureTerrain();
  collideProps(dt);
  collideCoins();
  updateDebris(dt);
  updateRagdoll(dt);

  // safety: if the buggy falls far below the world, treat as a hard stop
  if (buggy.y - camY > GF.H + 200 * S) { addDamage(0.3); buggy.vy = -200 * S; }
}

function collideProps(dt) {
  var S = GF.S, bw = (BUGGY_W * 0.5) * S, bh = (BUGGY_H * 0.6) * S;
  for (var i = 0; i < props.length; i++) {
    var p = props[i];
    if (p.dead) continue;
    if (p.type === 'lava') {
      // damage tick if the buggy overlaps the lava band
      if (buggy.x > p.x && buggy.x < p.x + p.w && sy(buggy.y) > sy(p.y) - 20 * S) {
        addDamage(0.10 * dt * 12); // ~ per second
        if (rng() < 0.5) GF.spawnParticles(sx(buggy.x), sy(p.y), '#ff9a3d', 1);
      }
      continue;
    }
    if (p.type === 'spike') {
      var sxp = p.x, syp = p.gy;
      if (Math.abs(buggy.x - sxp) < bw + p.w * 0.5 && buggy.y + bh > syp - p.h) {
        addDamage(0.20); GF.setShake(0.5); slow = 0.1; Sfx.metal(); p.dead = true;
        for (var k = 0; k < 8; k++) GF.spawnParticles(sx(sxp), sy(syp), '#8a8a9a', 1);
      }
      continue;
    }
    // crate / tnt — smashable
    var cx0 = p.x, cy0 = p.gy - p.h * 0.5;
    if (Math.abs(buggy.x - cx0) < bw + p.w * 0.5 && Math.abs(buggy.y - cy0) < bh + p.h * 0.6) {
      p.dead = true; smashes++;
      var gain = p.type === 'tnt' ? 12 : 6;
      runScrap += gain;
      GF.spawnFloat(sx(cx0), sy(cy0) - 14 * S, '+' + gain, '#ffd166');
      var col = p.type === 'tnt' ? '#ff7a3a' : '#c89a5a';
      for (var c = 0; c < 12; c++) GF.spawnParticles(sx(cx0), sy(cy0), col, 1);
      Sfx.smash();
      if (p.type === 'tnt') {
        // explosion: forward+up shove (the nitro-chain reward), small self-damage
        buggy.vx += 220 * S; buggy.vy -= 220 * S; GF.setShake(0.8); slow = 0.1;
        addDamage(0.05);
        for (var e = 0; e < 16; e++) GF.spawnParticles(sx(cx0), sy(cy0), '#ffcf6a', 1);
      } else {
        buggy.vx *= 0.97;   // minor slow
      }
    }
  }
}
function collideCoins() {
  var S = GF.S, rr2 = 26 * S;
  for (var i = 0; i < coins.length; i++) {
    var c = coins[i]; if (c.taken) continue;
    var dx = buggy.x - c.x, dy = buggy.y - c.y;
    if (dx * dx + dy * dy < rr2 * rr2) {
      c.taken = true; runScrap += 3;
      GF.spawnFloat(sx(c.x), sy(c.y), '+3', '#ffd166'); Sfx.coin();
    }
  }
}
function updateDebris(dt) {
  var S = GF.S;
  for (var i = debris.length - 1; i >= 0; i--) {
    var d = debris[i];
    d.vy += 900 * S * dt; d.x += d.vx * dt; d.y += d.vy * dt;
    d.rot += d.vrot * dt; d.life -= dt;
    if (d.life <= 0 || d.y > GF.H + 80 * S) debris.splice(i, 1);
  }
}
function updateRagdoll(dt) {
  if (!ragdoll) return; var S = GF.S;
  ragdoll.vy += 900 * S * dt; ragdoll.x += ragdoll.vx * dt; ragdoll.y += ragdoll.vy * dt;
  ragdoll.rot += ragdoll.vrot * dt;
  // bounce on the ground once
  var gy = sy(terrYAt(camX + ragdoll.x)) ;
  if (ragdoll.y > GF.H * 0.7 && ragdoll.vy > 0) { ragdoll.vy = -ragdoll.vy * 0.4; ragdoll.vx *= 0.6; ragdoll.vrot *= 0.6; }
  if (ragdoll.y > GF.H + 120 * S) ragdoll = null;
}

// ════════════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════════════
function draw(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  var z = zoneFor(zoneIdx);

  // sky gradient (per-biome)
  var sky = c.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, z.sky); sky.addColorStop(1, z.skyLo);
  c.fillStyle = sky; c.fillRect(0, 0, W, H);

  // parallax distant blocky skyline (two layers)
  drawParallax(c, z, 0.18, H * 0.50, z.hillLo, 70);
  drawParallax(c, z, 0.34, H * 0.58, z.hill, 54);

  // terrain fill
  drawTerrain(c, z);
  // lava bands + spikes + crates + coins (world props)
  drawProps(c, z);
  drawCoins(c);

  // the buggy (or wreck) + driver
  if (gs === 'PLAYING' || gs === 'GAMEOVER') drawBuggy(c);
  drawDebris(c);
  drawRagdoll(c);

  // HUD / overlays
  if (gs === 'PLAYING') drawHUD(c);
  drawBanner(c);

  if (gs === 'MENU') drawMenu(c);
  else if (gs === 'GARAGE') drawGarage(c);
  else if (gs === 'GAMEOVER') drawGameOver(c);

  if (helpOpen) drawHelpCard(c);
  GF.tutorial.draw(c);
}

function drawParallax(c, z, par, baseY, col, step) {
  var W = GF.W, H = GF.H, S = GF.S;
  var off = (camX * par) % (step * S * 2);
  c.fillStyle = col;
  var y = baseY;
  for (var x = -off - step * S * 2; x < W + step * S * 2; x += step * S * 2) {
    // blocky silhouette buildings/rocks
    var seed = Math.floor((x + camX * par) / (step * S)) * 0.7;
    var h = (40 + (Math.sin(seed) * 0.5 + 0.5) * 90) * S;
    c.fillRect(x, y - h, step * S * 1.3, h + H);
  }
}

function drawTerrain(c, z) {
  var W = GF.W, H = GF.H, S = GF.S;
  if (terr.length < 2) return;
  c.beginPath();
  var started = false;
  for (var i = 0; i < terr.length; i++) {
    var p = terr[i], X = sx(p.x), Y = sy(p.y);
    if (X < -40 * S && i + 1 < terr.length && sx(terr[i + 1].x) < -40 * S) continue;
    if (!started) { c.moveTo(X, Y); started = true; } else c.lineTo(X, Y);
    if (X > W + 80 * S) break;
  }
  c.lineTo(W + 80 * S, H + 80 * S);
  c.lineTo(-80 * S, H + 80 * S);
  c.closePath();
  var gr = c.createLinearGradient(0, sy(baseGroundY()) - 30 * S, 0, H);
  gr.addColorStop(0, z.ground); gr.addColorStop(1, z.groundLo);
  c.fillStyle = gr; c.fill();
  // grass/accent rim along the top edge
  c.strokeStyle = z.grass; c.lineWidth = Math.max(3, 6 * S);
  c.beginPath(); started = false;
  for (var j = 0; j < terr.length; j++) {
    var q = terr[j], QX = sx(q.x), QY = sy(q.y);
    if (QX < -40 * S) continue;
    if (!started) { c.moveTo(QX, QY); started = true; } else c.lineTo(QX, QY);
    if (QX > W + 80 * S) break;
  }
  c.stroke();
}

function drawProps(c, z) {
  var W = GF.W, H = GF.H, S = GF.S, now = performance.now() / 1000;
  for (var i = 0; i < props.length; i++) {
    var p = props[i]; if (p.dead) continue;
    var X = sx(p.x);
    if (X < -60 * S || X > W + 60 * S) continue;
    if (p.type === 'lava') {
      var ly = sy(p.y);
      var glow = c.createLinearGradient(0, ly - 10 * S, 0, ly + p.h);
      glow.addColorStop(0, '#ffd24a'); glow.addColorStop(0.3, '#ff6a1f'); glow.addColorStop(1, '#7a1a08');
      c.fillStyle = glow;
      c.beginPath(); c.moveTo(X, ly);
      for (var w = 0; w <= p.w; w += 14 * S) c.lineTo(X + w, ly + Math.sin(now * 3 + (p.phase || 0) + w * 0.04) * 4 * S);
      c.lineTo(X + p.w, ly + p.h); c.lineTo(X, ly + p.h); c.closePath(); c.fill();
    } else if (p.type === 'spike') {
      var gy = sy(p.gy);
      c.fillStyle = '#9aa0ad';
      c.beginPath(); c.moveTo(X - p.w * 0.5, gy); c.lineTo(X, gy - p.h); c.lineTo(X + p.w * 0.5, gy); c.closePath(); c.fill();
      c.fillStyle = '#6a707d';
      c.beginPath(); c.moveTo(X, gy - p.h); c.lineTo(X + p.w * 0.5, gy); c.lineTo(X + p.w * 0.18, gy); c.closePath(); c.fill();
    } else { // crate / tnt
      var cy = sy(p.gy) - p.h, ww = p.w;

      c.fillStyle = p.type === 'tnt' ? '#7a241b' : '#8a5e28';
      c.fillRect(X - ww * 0.5, cy + p.h * 0.7, ww, p.h * 0.3);

      c.strokeRect(X - ww * 0.5, cy, ww, p.h);

        c.beginPath(); c.moveTo(X - ww * 0.3, cy + p.h * 0.5); c.lineTo(X + ww * 0.3, cy + p.h * 0.5);
        c.moveTo(X - ww * 0.3, cy + p.h * 0.5); c.lineTo(X + ww * 0.3, cy + p.h * 0.5); c.stroke();

}
function drawCoins(c) {
  var W = GF.W, S = GF.S, now = performance.now() / 1000;
  for (var i = 0; i < coins.length; i++) {
    var co = coins[i]; if (co.taken) continue;
    var X = sx(co.x), Y = sy(co.y) + Math.sin(now * 4 + i) * 3 * S;
    if (X < -30 * S || X > W + 30 * S) continue;
    // scrap bolt: small hexagon
    c.save(); c.translate(X, Y);
    c.fillStyle = '#ffd166'; c.strokeStyle = '#c89a2e'; c.lineWidth = Math.max(1, 1.6 * S);
    c.beginPath();
    for (var a = 0; a < 6; a++) { var ang = a / 6 * Math.PI * 2 - Math.PI / 2, r = 9 * S; if (a === 0) c.moveTo(Math.cos(ang) * r, Math.sin(ang) * r); else c.lineTo(Math.cos(ang) * r, Math.sin(ang) * r); }
    c.closePath(); c.fill(); c.stroke();
    c.fillStyle = '#fff4c0'; c.beginPath(); c.arc(-2 * S, -2 * S, 2.4 * S, 0, Math.PI * 2); c.fill();
    c.restore();
  }
}

// ── the buggy (3 rects + 2 wheels + Noob driver), damage overlays ───────────
function drawBuggy(c) {
  var S = GF.S, v = curVeh();
  var bx = sx(buggy.x), by = sy(buggy.y);
  var w = BUGGY_W * S, h = BUGGY_H * S, wr = WHEEL_R * S;
  c.save();
  c.translate(bx, by);
  c.rotate(buggy.ang);

  // shadow
  c.save(); c.rotate(-buggy.ang);
  c.fillStyle = 'rgba(0,0,0,0.18)'; c.beginPath(); c.ellipse(0, h * 0.5 + wr * 0.8, w * 0.6, wr * 0.5, 0, 0, Math.PI * 2); c.fill();
  c.restore();

  // wheels (square-ish blocky wheels)
  drawWheel(c, -w * 0.34, h * 0.42, wr, buggy.x);
  drawWheel(c,  w * 0.34, h * 0.42, wr, buggy.x + 1);

  // chassis body
  var nubic = v.nubic;
  c.fillStyle = v.col;
  rr(c, -w * 0.5, -h * 0.5, w, h, 5 * S); c.fill();
  // lower shade
  c.fillStyle = v.col2;
  c.fillRect(-w * 0.5, h * 0.18, w, h * 0.32);

  // front bumper (sheds at DMG_FRONT)
  if (!buggy.parts.front) { c.fillStyle = v.col2; rr(c, w * 0.42, -h * 0.2, w * 0.14, h * 0.5, 3 * S); c.fill(); }
  // rear (sheds at DMG_REAR)
  if (!buggy.parts.rear) { c.fillStyle = v.col2; rr(c, -w * 0.56, -h * 0.2, w * 0.14, h * 0.5, 3 * S); c.fill(); }

  // cabin / roll cage (sheds at DMG_CAB) — and the Noob driver inside
  if (!buggy.parts.cab) {
    c.fillStyle = nubic ? '#1a0f2a' : '#2a3540';
    rr(c, -w * 0.16, -h * 0.95, w * 0.5, h * 0.55, 4 * S); c.fill();
    // windshield (cracks at DMG_WIND, gone visually as glass tint reduces)
    if (!buggy.parts.windshield) { c.fillStyle = 'rgba(180,230,255,0.55)'; rr(c, w * 0.04, -h * 0.86, w * 0.26, h * 0.34, 3 * S); c.fill(); }
    // driver (Noob head) peeking out
    if (!buggy.driverEjected) drawNoobHead(c, w * 0.06, -h * 0.74, w * 0.34, nubic);
  } else if (!buggy.driverEjected) {
    // cab gone: driver head exposed in the hole
    drawNoobHead(c, 0, -h * 0.4, w * 0.34, nubic);
  }

  // damage cracks + darkening overlay
  if (buggy.dmg > DMG_WIND) {
    c.globalAlpha = clamp((buggy.dmg - DMG_WIND) * 0.6, 0, 0.5);
    c.fillStyle = '#101018'; rr(c, -w * 0.5, -h * 0.5, w, h, 5 * S); c.fill();
    c.globalAlpha = 1;
    // hairline cracks
    c.strokeStyle = 'rgba(20,20,28,0.8)'; c.lineWidth = Math.max(1, 1.4 * S);
    c.beginPath(); c.moveTo(-w * 0.2, -h * 0.3); c.lineTo(0, 0); c.lineTo(w * 0.18, -h * 0.2); c.lineTo(w * 0.3, h * 0.1); c.stroke();
  }

  // nubic spikes (visual flavor on the Evil Nubic skin)
  if (nubic) {
    c.fillStyle = '#cf9bff';
    for (var sIdx = 0; sIdx < 4; sIdx++) {
      var px = -w * 0.4 + sIdx * w * 0.28;
      c.beginPath(); c.moveTo(px, -h * 0.5); c.lineTo(px + 6 * S, -h * 0.8); c.lineTo(px + 12 * S, -h * 0.5); c.closePath(); c.fill();
    }
  }

  c.restore();
}
function drawWheel(c, x, y, r, seed) {
  c.save(); c.translate(x, y);
  // spin based on distance
  c.rotate((buggy.x * 0.04) % (Math.PI * 2));
  c.fillStyle = '#1a1a22'; rr(c, -r, -r, r * 2, r * 2, r * 0.5); c.fill();
  c.fillStyle = '#3a3a46'; c.beginPath(); c.arc(0, 0, r * 0.5, 0, Math.PI * 2); c.fill();
  c.strokeStyle = '#55556a'; c.lineWidth = Math.max(1.5, r * 0.18);
  c.beginPath(); c.moveTo(-r * 0.7, 0); c.lineTo(r * 0.7, 0); c.moveTo(0, -r * 0.7); c.lineTo(0, r * 0.7); c.stroke();
  c.restore();
}
// Noob head — yellow cube + two dark eyes with white glints (ported from noob_run)
function drawNoobHead(c, x, y, size, nubic) {
  c.save(); c.translate(x, y);
  var w = size, h = size;
  c.fillStyle = nubic ? '#e8d0ff' : '#f4c542';
  rr(c, -w * 0.5, -h * 0.5, w, h, w * 0.16); c.fill();
  c.fillStyle = nubic ? '#c8a0ff' : '#d9a92e';
  c.fillRect(-w * 0.5, h * 0.34, w, h * 0.1);
  // eyes
  c.fillStyle = nubic ? '#3a0f4a' : '#16202c';
  c.fillRect(-w * 0.28, -h * 0.2, w * 0.16, h * 0.18);
  c.fillRect(w * 0.12, -h * 0.2, w * 0.16, h * 0.18);
  if (!nubic) {
    c.fillStyle = '#fff';
    c.fillRect(-w * 0.24, -h * 0.16, w * 0.05, h * 0.05);
    c.fillRect(w * 0.16, -h * 0.16, w * 0.05, h * 0.05);
  } else {
    // nubic: glowing eye dots + jagged mouth
    c.fillStyle = '#ff5ad0';
    c.fillRect(-w * 0.24, -h * 0.16, w * 0.06, h * 0.06);
    c.fillRect(w * 0.16, -h * 0.16, w * 0.06, h * 0.06);
    c.strokeStyle = '#3a0f4a'; c.lineWidth = Math.max(1, w * 0.06);
    c.beginPath(); c.moveTo(-w * 0.3, h * 0.18); c.lineTo(-w * 0.1, h * 0.06); c.lineTo(0, h * 0.2); c.lineTo(w * 0.1, h * 0.06); c.lineTo(w * 0.3, h * 0.18); c.stroke();
  }
  c.restore();
}
function drawDebris(c) {

    var d = debris[i];

// ── HUD (live distance, scrap, nitro pips, zone, mute, ?, garage) ───────────

  var qx = mx - ir * 2 - 18 * S;

  c.fillStyle = '#dfe7ff'; c.font = 'bold ' + clamp(17 * S, 13, 22) + 'px Inter, system-ui, sans-serif';
  c.textBaseline = 'middle'; c.fillText('?', qx, my + 1 * S); c.textBaseline = 'alphabetic';
  hudButtons.push({ x: qx - ir - 6 * S, y: my - ir - 6 * S, w: (ir + 6 * S) * 2, h: (ir + 6 * S) * 2, fn: function () { helpOpen = true; GF.tutorial.reopen(); } });

  // garage button top-left under zone label

  c.fillStyle = '#cdd6e6'; c.font = 'bold ' + clamp(13 * S, 11, 17) + 'px Inter, system-ui, sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle'; c.fillText(GF.t('garage'), gx + gw / 2, gy + gh / 2 + 1 * S);
  c.textBaseline = 'alphabetic';
  hudButtons.push({ x: gx, y: gy, w: gw, h: gh, fn: function () { GF.sfx('click'); openGarage(); } });

function drawControlPads(c) {

// ── MENU ────────────────────────────────────────────────────────────────────
function bigBtn(c, label, cx0, cy0, w, h, primary, fn) {
  var t = performance.now() / 1000, k = Math.sin(t * 2.2), p = primary ? 1 + 0.04 * k : 1;
  var bw = w * p, bh = h * p, bx = cx0 - bw / 2, by = cy0 - bh / 2;
  var grad = c.createLinearGradient(bx, by, bx, by + bh);
  if (primary) { grad.addColorStop(0, '#2ee07a'); grad.addColorStop(1, '#23a657'); }
  else { grad.addColorStop(0, '#3a4a60'); grad.addColorStop(1, '#2a3648'); }
  c.save(); if (primary) { c.shadowColor = 'rgba(46,224,122,' + (0.4 + 0.25 * k).toFixed(2) + ')'; c.shadowBlur = (20 + 8 * k) * GF.S; }
  rr(c, bx, by, bw, bh, bh / 2); c.fillStyle = grad; c.fill(); c.restore();
  c.fillStyle = '#fff'; c.font = 'bold ' + clamp((primary ? 22 : 18) * GF.S, 14, 30) + 'px Inter, system-ui, sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle'; c.fillText(label, cx0, cy0 + 1 * GF.S); c.textBaseline = 'alphabetic';
  uiButtons.push({ x: cx0 - w / 2, y: cy0 - h / 2, w: w, h: h, fn: fn });
}

// ── GARAGE (scrollable: 5 upgrade rows + 4 vehicle cards) ───────────────────
function garageLayout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var top = clamp(96 * S, 76, 130);
  var botBar = clamp(80 * S, 64, 110);
  return { x: W * 0.06, y: top, w: W * 0.88, vpH: H - top - botBar, rowH: clamp(64 * S, 52, 84), botBar: botBar };
}
function drawGarage(c) {
  var W = GF.W, H = GF.H, S = GF.S;
  uiButtons = []; garageRows = [];
  c.fillStyle = '#0c1322'; c.fillRect(0, 0, W, H);
  // header
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.font = 'bold ' + clamp(26 * S, 18, 36) + 'px Inter, system-ui, sans-serif'; c.fillStyle = '#fff';
  c.fillText(GF.t('garage'), W / 2, clamp(44 * S, 32, 60));
  c.font = 'bold ' + clamp(16 * S, 13, 22) + 'px Inter, system-ui, sans-serif'; c.fillStyle = '#ffd166';
  c.fillText(GF.t('scrap') + ': ' + meta.scrap, W / 2, clamp(72 * S, 54, 96));

  var L = garageLayout();
  if (!garageScroll) garageScroll = GF.makeScroll('garage', { x: L.x, y: L.y, w: L.w, h: L.vpH });
  garageScroll.setViewport({ x: L.x, y: L.y, w: L.w, h: L.vpH });

  // build content rows in CONTENT space (y from content top = 0)
  var cy = 8 * S, rowH = L.rowH, gapY = 10 * S;
  // upgrades
  for (var i = 0; i < UPGRADES.length; i++) {
    garageRows.push({ kind: 'buy', key: UPGRADES[i].key, u: UPGRADES[i], x: L.x, y: L.y + cy, w: L.w, h: rowH, cy: cy });
    cy += rowH + gapY;
  }
  // section gap + vehicle cards (2 per row)
  cy += 6 * S;
  var cardW = (L.w - 12 * S) / 2, cardH = clamp(96 * S, 78, 128);
  for (var v = 0; v < VEHICLES.length; v++) {
    var col = v % 2, row = Math.floor(v / 2);
    garageRows.push({ kind: 'veh', id: VEHICLES[v].id, veh: VEHICLES[v],
      x: L.x + col * (cardW + 12 * S), y: L.y + cy + row * (cardH + 10 * S), w: cardW, h: cardH, cy: cy + row * (cardH + 10 * S) });
  }
  var contentH = cy + Math.ceil(VEHICLES.length / 2) * (cardH + 10 * S) + 20 * S;
  garageScroll.setContentHeight(contentH);

  // draw scroll content. Inside begin()/end() the context is translated by
  // (vp.y - offset), so content is drawn in CONTENT space: y measured from the
  // region's content top (== row.cy). Screen-y = vp.y + cy - offset.
  garageScroll.begin(c);
  for (var r = 0; r < garageRows.length; r++) {
    var row2 = garageRows[r];
    if (row2.kind === 'buy') drawUpgradeRow(c, row2, row2.x, row2.cy);
    else drawVehicleCard(c, row2, row2.x, row2.cy);
  }
  garageScroll.end(c);
  garageScroll.draw(c);

  // bottom bar: big DRIVE button + BACK
  var bb = L.botBar, by = H - bb;
  c.fillStyle = '#0a0f1c'; c.fillRect(0, by, W, bb);
  bigBtn(c, GF.t('drive'), W * 0.62, by + bb / 2, clamp(180 * S, 130, 240), clamp(52 * S, 42, 70), true, function () { GF.sfx('click'); startRun(); });
  bigBtn(c, GF.t('back'), W * 0.24, by + bb / 2, clamp(120 * S, 90, 160), clamp(50 * S, 40, 66), false, function () { GF.sfx('click'); gs = 'MENU'; });
}
function drawUpgradeRow(c, row, x, y) {
  var S = GF.S, w = row.w, h = row.h, u = row.u, lvl = upLvl(u.key);
  c.fillStyle = 'rgba(28,38,54,0.9)'; rr(c, x, y, w, h, 10 * S); c.fill();
  c.textAlign = 'left'; c.textBaseline = 'alphabetic';
  c.fillStyle = '#fff'; c.font = 'bold ' + clamp(16 * S, 13, 21) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t(u.nameKey), x + 14 * S, y + 24 * S);
  c.fillStyle = '#8ba0b8'; c.font = clamp(12 * S, 10, 16) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t(u.descKey), x + 14 * S, y + 42 * S);
  // level pips
  for (var i = 0; i < u.max; i++) {
    c.beginPath(); c.arc(x + 16 * S + i * 16 * S, y + h - 14 * S, 4.5 * S, 0, Math.PI * 2);
    c.fillStyle = i < lvl ? '#2ee07a' : 'rgba(255,255,255,0.16)'; c.fill();
  }
  // buy button (right)
  var bw = clamp(96 * S, 76, 130), bh = clamp(40 * S, 32, 54), bx = x + w - bw - 12 * S, byb = y + h / 2 - bh / 2;
  var maxed = lvl >= u.max, cost = upCost(u), afford = meta.scrap >= cost;
  c.fillStyle = maxed ? '#2a3648' : (afford ? '#23a657' : '#4a3030');
  rr(c, bx, byb, bw, bh, bh / 2); c.fill();
  c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'bold ' + clamp(13 * S, 11, 17) + 'px Inter, system-ui, sans-serif';
  c.fillText(maxed ? GF.t('maxed') : (cost + ''), bx + bw / 2, byb + bh / 2 + 1 * S);
  if (!maxed) { c.font = clamp(9 * S, 8, 12) + 'px Inter, system-ui, sans-serif'; c.fillStyle = 'rgba(255,255,255,0.7)'; c.fillText(GF.t('scrap'), bx + bw / 2, byb + bh - 6 * S); }
  c.textBaseline = 'alphabetic'; c.textAlign = 'left';
}
function drawVehicleCard(c, row, x, y) {
  var S = GF.S, w = row.w, h = row.h, v = row.veh;
  var unlocked = vehUnlocked(v), equipped = meta.vehicle === v.id;
  c.fillStyle = equipped ? 'rgba(40,80,60,0.95)' : 'rgba(28,38,54,0.9)'; rr(c, x, y, w, h, 10 * S); c.fill();
  if (equipped) { c.strokeStyle = '#2ee07a'; c.lineWidth = Math.max(2, 2.4 * S); rr(c, x, y, w, h, 10 * S); c.stroke(); }
  // mini buggy preview
  c.save(); c.translate(x + 38 * S, y + h * 0.42);
  c.fillStyle = unlocked ? v.col : '#3a3a46'; rr(c, -24 * S, -10 * S, 48 * S, 20 * S, 4 * S); c.fill();
  c.fillStyle = unlocked ? (v.nubic ? '#1a0f2a' : '#2a3540') : '#2a2a32'; rr(c, -8 * S, -22 * S, 24 * S, 16 * S, 3 * S); c.fill();
  c.fillStyle = '#1a1a22'; c.beginPath(); c.arc(-14 * S, 12 * S, 8 * S, 0, Math.PI * 2); c.arc(14 * S, 12 * S, 8 * S, 0, Math.PI * 2); c.fill();
  c.restore();
  // name + state
  c.textAlign = 'left'; c.textBaseline = 'alphabetic';
  c.fillStyle = unlocked ? '#fff' : '#8a8a9a'; c.font = 'bold ' + clamp(14 * S, 11, 18) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t(v.nameKey), x + 70 * S, y + 28 * S);
  c.font = clamp(11 * S, 9, 15) + 'px Inter, system-ui, sans-serif';
  if (!unlocked) { c.fillStyle = '#ff9a6a'; c.fillText(GF.t('locked') + ' · ' + v.unlock + GF.t('dist'), x + 70 * S, y + 48 * S); }
  else if (equipped) { c.fillStyle = '#2ee07a'; c.fillText(GF.t('equipped'), x + 70 * S, y + 48 * S); }
  else { c.fillStyle = '#9cc'; c.fillText(GF.t('equip'), x + 70 * S, y + 48 * S); }
}

function drawGameOver(c) {
  var W = GF.W, H = GF.H, S = GF.S;
  uiButtons = [];
  goT += 1 / 60;
  c.fillStyle = 'rgba(8,10,22,0.82)'; c.fillRect(0, 0, W, H);
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.font = 'bold ' + clamp(34 * S, 22, 48) + 'px Inter, system-ui, sans-serif';
  c.fillStyle = goNewBest ? '#ffd166' : '#fff';
  c.shadowColor = goNewBest ? 'rgba(255,209,102,0.5)' : 'transparent'; c.shadowBlur = goNewBest ? 18 * S : 0;
  c.fillText(goNewBest ? GF.t('newBest') : GF.t('gameover'), W / 2, H * 0.28); c.shadowBlur = 0;
  // distance + banked scrap (count up)
  c.font = 'bold ' + clamp(44 * S, 28, 62) + 'px Inter, system-ui, sans-serif'; c.fillStyle = '#fff';
  c.fillText(Math.floor(dist) + ' ' + GF.t('dist'), W / 2, H * 0.40);
  var shown = Math.min(runEndScrapBank, Math.floor(runEndScrapBank * clamp(goT / 0.8, 0, 1)));
  c.font = clamp(18 * S, 14, 24) + 'px Inter, system-ui, sans-serif'; c.fillStyle = '#ffd166';
  c.fillText('+' + shown + ' ' + GF.t('scrap') + ' ' + GF.t('banked'), W / 2, H * 0.48);
  c.fillStyle = '#9ab'; c.font = clamp(13 * S, 11, 17) + 'px Inter, system-ui, sans-serif';
  c.fillText(GF.t('best') + ': ' + meta.bestDist + ' ' + GF.t('dist'), W / 2, H * 0.54);

  bigBtn(c, GF.t('retry'), W / 2, H * 0.65, clamp(240 * S, 170, 340), clamp(60 * S, 46, 80), true, function () { GF.sfx('click'); onRetry(); });
  bigBtn(c, GF.t('garage'), W * 0.32, H * 0.78, clamp(150 * S, 110, 200), clamp(50 * S, 40, 66), false, function () { GF.sfx('click'); openGarage(); });
  bigBtn(c, GF.t('menu'), W * 0.68, H * 0.78, clamp(150 * S, 110, 200), clamp(50 * S, 40, 66), false, function () { GF.sfx('click'); gs = 'MENU'; });
}

// ── HELP CARD (reference, reopened from ?) ──────────────────────────────────
function wrapText(c, text, x, y, maxW, lineH, center) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; } else cur = probe;
  }
  if (cur) lines.push(cur);
  var oldAlign = c.textAlign; if (center) c.textAlign = 'center';
  for (var j = 0; j < lines.length; j++) c.fillText(lines[j], center ? x + maxW / 2 : x, y + j * lineH);
  c.textAlign = oldAlign;
  return lines.length * lineH;
}
function drawHelpCard(c) {
  var W = GF.W, H = GF.H, S = GF.S;
  uiButtons = [];
  c.fillStyle = 'rgba(6,8,18,0.93)'; c.fillRect(0, 0, W, H);
  var cardW = Math.min(W * 0.9, 480 * S);
  c.textAlign = 'center'; c.textBaseline = 'alphabetic'; c.fillStyle = '#fff';
  c.font = 'bold ' + clamp(22 * S, 17, 30) + 'px Inter, system-ui, sans-serif';
  var y = H * 0.14; c.fillText(GF.t('howto'), W / 2, y); y += clamp(30 * S, 24, 40);
  var lines = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'], lh = clamp(20 * S, 16, 26);
  c.font = clamp(14 * S, 12, 19) + 'px Inter, system-ui, sans-serif'; c.textAlign = 'left';
  for (var i = 0; i < lines.length; i++) { c.fillStyle = i === 4 ? '#ffd166' : '#cdd6e6'; var used = wrapText(c, GF.t(lines[i]), W / 2 - cardW / 2, y, cardW, lh); y += used + 10 * S; }
  c.textAlign = 'center';
  bigBtn(c, GF.t('gotit'), W / 2, Math.min(y + 24 * S, H * 0.9), clamp(200 * S, 150, 300), clamp(54 * S, 44, 70), true, function () { helpOpen = false; GF.sfx('click'); });
}

// ── TUTORIAL (demo-hand, action-gated) ──────────────────────────────────────
function startTutorial() {
  GF.tutorial.start([
    { text: GF.t('holdGas'),
      target: function () { return { x: GF.W * 0.78, y: GF.H - clamp(58 * GF.S, 45, 85), r: 40 * GF.S }; },
      gesture: 'tap', advance: 'manual',
      onAdvance: function () { markTutSeen(); } },
    { text: GF.t('tapNitro'),
      target: function () { return { x: GF.W * 0.22, y: GF.H - clamp(58 * GF.S, 45, 85), r: 40 * GF.S }; },
      gesture: 'tap', advance: 'manual' },
    { text: GF.t('smashAll'), advance: 'auto', after: 2200,
      target: function () { return { x: GF.W / 2, y: GF.H * 0.5, r: 36 * GF.S }; } },
  ], { storageKey: 'noob_rider_seen_tut' });
}

// ════════════════════════════════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════════════════════════════════
var activeTouches = {};   // id -> 'gas' | 'brake'
var downX = 0, downY = 0, dragScroll = false;

function zoneForX(x) { return x > GF.W * 0.5 ? 'gas' : 'brake'; }

function onDown(x, y, id) {
  downX = x; downY = y; dragScroll = false;
  // help card swallows everything
  if (helpOpen) { for (var i = 0; i < uiButtons.length; i++) if (hit(uiButtons[i], x, y)) { uiButtons[i].fn(); return; } return; }
  // tutorial: let the skip button work; otherwise the actual gesture advances it
  if (GF.tutorial.active) { var b = GF.tutorial._skipBtn; if (b && hit(b, x, y)) { GF.tutorial.handleClick(x, y); return; } }

  if (gs === 'GARAGE') {
    for (var k = 0; k < uiButtons.length; k++) if (hit(uiButtons[k], x, y)) { GF.sfx('click'); uiButtons[k].fn(); return; }
    if (garageScroll && garageScroll.contains(x, y)) garageScroll.dragStart(y);
    return;
  }
  if (gs === 'PLAYING') {
    for (var h = 0; h < hudButtons.length; h++) if (hit(hudButtons[h], x, y)) { hudButtons[h].fn(); return; }
    // drive control: which half?
    var zone = zoneForX(x);
    if (id != null) activeTouches[id] = zone;
    if (zone === 'gas') touchZones.gas = true;
    else { touchZones.brake = true; if (buggy.onGround === false || true) fireNitro(); }  // tap brake side also fires nitro (matches spec)
    // tutorial advance on the real gesture
    if (GF.tutorial.active) {
      var st = GF.tutorial.step;
      if (st === 0 && zone === 'gas') GF.tutorial.next();
      else if (st === 1 && zone === 'brake') GF.tutorial.next();
    }
    return;
  }
  // MENU / GAMEOVER overlays
  for (var j = 0; j < uiButtons.length; j++) if (hit(uiButtons[j], x, y)) { GF.sfx('click'); uiButtons[j].fn(); return; }
}
function onMove(x, y, id) {
  if (gs === 'GARAGE' && garageScroll && garageScroll.isDragging()) {
    if (Math.abs(y - downY) > 6 * GF.S) dragScroll = true;
    garageScroll.dragMove(y);
    return;
  }
  if (gs === 'PLAYING' && id != null && activeTouches[id]) {
    // allow sliding between halves
    var zone = zoneForX(x);
    if (zone !== activeTouches[id]) {
      // release the old, acquire the new
      releaseTouchZone(id);
      activeTouches[id] = zone;
      if (zone === 'gas') touchZones.gas = true; else touchZones.brake = true;
    }
  }
}
function releaseTouchZone(id) {
  var z = activeTouches[id]; if (!z) return;
  // only clear the flag if no OTHER active touch still holds it
  var stillHeld = false;
  for (var k in activeTouches) { if (k != id && activeTouches[k] === z) stillHeld = true; }
  if (!stillHeld) { if (z === 'gas') touchZones.gas = false; else touchZones.brake = false; }
}
function onUp(x, y, id) {
  if (gs === 'GARAGE' && garageScroll) {
    var wasDrag = dragScroll; garageScroll.dragEnd();
    if (!wasDrag && garageScroll.contains(x, y)) {
      var cyc = garageScroll.screenToContentY(y);
      for (var i = 0; i < garageRows.length; i++) {
        var r = garageRows[i];
        var ry = r.y;   // r.y already in screen space at draw time; recompute content hit via cy
        // garageRows store y = L.y + cy; in content space the item top is cy (== r.cy)
        if (x >= r.x && x <= r.x + r.w && cyc >= r.cy && cyc <= r.cy + r.h) {
          if (r.kind === 'buy') buyUpgrade(r.key); else equipVehicle(r.id);
          return;
        }
      }
    }
    return;
  }
  if (gs === 'PLAYING') {
    if (id != null) { releaseTouchZone(id); delete activeTouches[id]; }
    else { touchZones.gas = false; touchZones.brake = false; }
  }
}

var canvasEl = document.getElementById('c');
canvasEl.addEventListener('touchstart', function (e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) { var t = e.changedTouches[i]; onDown(t.clientX, t.clientY, t.identifier); }
}, { passive: false });
canvasEl.addEventListener('touchmove', function (e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) { var t = e.changedTouches[i]; onMove(t.clientX, t.clientY, t.identifier); }
}, { passive: false });
canvasEl.addEventListener('touchend', function (e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) { var t = e.changedTouches[i]; onUp(t.clientX, t.clientY, t.identifier); }
}, { passive: false });
canvasEl.addEventListener('touchcancel', function (e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) { var t = e.changedTouches[i]; onUp(t.clientX, t.clientY, t.identifier); }
}, { passive: false });
canvasEl.addEventListener('mousedown', function (e) { onDown(e.clientX, e.clientY, 'mouse'); });
canvasEl.addEventListener('mousemove', function (e) { if (e.buttons) onMove(e.clientX, e.clientY, 'mouse'); });
canvasEl.addEventListener('mouseup', function (e) { onUp(e.clientX, e.clientY, 'mouse'); });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

document.addEventListener('keydown', function (e) {
  if (e.code === 'Space') {
    e.preventDefault(); if (e.repeat) return;
    if (helpOpen) { helpOpen = false; return; }
    if (gs === 'MENU' || gs === 'GARAGE') startRun();
    else if (gs === 'GAMEOVER') onRetry();
    else if (gs === 'PLAYING') { fireNitro(); if (GF.tutorial.active && GF.tutorial.step === 1) GF.tutorial.next(); }
    return;
  }
  if (e.code === 'KeyM') { toggleMute(); return; }
  if (e.code === 'Escape' && (gs === 'GARAGE')) { gs = 'MENU'; return; }
  if (gs === 'PLAYING' && (e.code === 'ArrowRight' || e.code === 'KeyD')) {
    if (GF.tutorial.active && GF.tutorial.step === 0) GF.tutorial.next();
  }
});

// ════════════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════════════
loadMeta();

GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: [],
  saveKey: 'noob_rider',
  onReady: function () {
    GF.lang = GF.lang;   // honour platform locale already set by gf-lib
    GF.persist('noob_rider_run_v1',
      function () { return { gs: (gs === 'PLAYING' || gs === 'GAMEOVER') ? 'GARAGE' : gs }; },
      function (s) { if (s && s.gs === 'GARAGE') gs = 'GARAGE'; }
    );
    if (gs === 'PLAYING') gs = 'MENU';

    GF.startMusic({ preset: 'arcade', muted: audioMuted });

    // platform builds: drop straight into gameplay (rule #9)
    if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU') startRun();

    // state getter for the QA/progression gate
    GF.exposeState(function () {
      return {
        gs: gs, dist: Math.floor(dist), distance: Math.floor(dist),
        score: runScrap + Math.floor(dist * SCRAP_PER_M), scrap: meta.scrap,
        bestDist: meta.bestDist, totalDist: meta.totalDist, runScrap: runScrap,
        smashes: smashes, nitro: nitro, nitroMax: statNitroMax(),
        zoneIdx: zoneIdx, zone: GF.t(zoneFor(zoneIdx).key),
        dmg: +buggy.dmg.toFixed(2), onGround: buggy.onGround, vx: Math.round(buggy.vx),
        vehicle: meta.vehicle, up: meta.up, seenTut: seenTut,
        props: props.length, coins: coins.length, debris: debris.length,
        unlockedVehicles: VEHICLES.filter(vehUnlocked).map(function (v) { return v.id; }),
        statTop: Math.round(statTop()), statAccel: Math.round(statAccel()), statArmor: +statArmor().toFixed(2),
      };
    });

    // bot contract for the autonomous progression probe (#276)
    GF.exposeBot(
      function () {
        if (gs === 'MENU' || gs === 'GARAGE') return ['start'];
        if (gs === 'GAMEOVER') return ['retry'];
        var a = ['gas'];
        if (nitro > 0) a.push('nitro');
        return a;
      },
      function (a) {
        if (a === 'start' || a === 'retry') startRun();
        else if (a === 'gas') { touchZones.gas = true; }
        else if (a === 'nitro') fireNitro();
      }
    );

    // reachability gate hooks
    GF.exposeReach(function () {
      var W = GF.W, H = GF.H;
      if (gs === 'GARAGE') {
        var L = garageLayout();
        // scrollable items reported in CONTENT space (y from the region content top = r.cy)
        var items = garageRows.map(function (r, i) { return { id: (r.kind + '_' + (r.key || r.id || i)), x: r.x, y: r.cy, w: r.w, h: r.h }; });
        uiButtons.forEach(function (b, i) { items.push({ id: 'pin_' + i, x: b.x, y: b.y, w: b.w, h: b.h, pinned: true }); });
        return { screen: 'garage', items: items, scrollId: 'garage', viewportH: L.vpH, screenH: H };
      }
      var its = uiButtons.map(function (b, i) { return { id: 'btn_' + i, x: b.x, y: b.y, w: b.w, h: b.h }; });
      return { screen: gs.toLowerCase(), items: its, viewportH: H, screenH: H, scrollMaxY: 0 };
    });
    GF.exposeTour([
      { name: 'menu', go: function () { gs = 'MENU'; helpOpen = false; } },
      { name: 'garage', go: function () { openGarage(); } },
      { name: 'gameover', go: function () { if (gs !== 'PLAYING') startRun(); endRun(); } },
    ]);
  },
  onUpdate: update,
  onDraw: draw,
});

// ── SCREENSHOT / TEST HOOKS ─────────────────────────────────────────────────
window._setupForScreenshot = function (level) {
  window._silent = true; seenTut = true; helpOpen = false;
  meta.bestDist = Math.max(meta.bestDist, 1200);
  meta.up.engine = Math.max(meta.up.engine, 3); meta.up.nitro = Math.max(meta.up.nitro, 2);
  startRun();
  // fast-forward into a denser mid-run state
  var lv = level || 3;
  buggy.vx = statTop() * GF.S * 0.85;
  for (var i = 0; i < 60 * (6 + lv); i++) { touchZones.gas = true; update(1 / 60); }
  touchZones.gas = false;
  buggy.dmg = Math.min(0.6, buggy.dmg + 0.4); checkParts();
};
window._jumpLevel = function (n) {
  // For the yandex-testing state-cycle gate, the gflib adapter calls
  // _jumpLevel(99) expecting the run to reach a TERMINAL (GAMEOVER) state.
  // n >= 50 → drive a bit then force the run to end so the cycle test can
  // verify PLAYING → GAMEOVER → RETRY. Smaller n → just jump into PLAYING.
  window._silent = true; seenTut = true;
  if (gs !== 'PLAYING') startRun();
  if ((n || 0) >= 50) { endRun(); return; }
  var steps = 60 * (4 + (n || 1) * 2);
  for (var i = 0; i < steps; i++) { touchZones.gas = true; update(1 / 60); }
  touchZones.gas = false;
};

// ── YANDEX MUST-HAVES (do not remove) ───────────────────────────────────────
// 1. All UI text via GF.t()/STRINGS (en+ru). 2. Run state persisted via
// GF.persist + saveMeta() after transitions. 3. Fullscreen/orientation resize
// handled in gf-lib (Math.max scaling, visualViewport). 4. Ads fire only from
// the natural game-over break via GF.ads.interstitial (capped), never auto /
// per-frame. No console.* anywhere.
})();
</script>
