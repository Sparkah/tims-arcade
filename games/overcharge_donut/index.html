<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Overcharge Donut</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0e0c1a; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── STRINGS ──────────────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Overcharge Donut',
    sub:   'Charge — release in the sweet spot — score',
    play: 'PLAY', retry: 'RETRY', next: 'NEXT LEVEL', menu: 'MENU',
    score: 'SCORE', best: 'BEST',
    level: 'LEVEL', lives: 'LIVES', quota: 'QUOTA',
    gameover: 'OUT OF LIVES',
    levelend: 'LEVEL CLEARED',
    won: 'ALL LEVELS CLEARED',
    perfect: 'PERFECT!', nice: 'NICE', wobble: 'WOBBLE', miss: 'MISS', boom: 'BOOM!',
    'tut_goal': 'GOAL: Land donuts in the rings to clear each level quota.',
    'tut_controls': 'CONTROLS: Hold mouse / tap to charge, release to launch.',
    'tut_win': 'WIN: Clear all 5 levels by hitting the ring quotas.',
    'tut_lose': 'LOSE: 3 misses (overshoot, undershoot, or a pad detonation).',
    'tut_tip': 'TIP: GREEN zone = perfect arc. RED edge = distance, DANGER detonates.',
    close: 'CLOSE',
    hold: 'HOLD TO CHARGE',
  },
  ru: {
    title: 'Перезаряд Пончика',
    sub:   'Заряжай — отпускай в нужный момент — очки',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', next: 'СЛЕД. УРОВЕНЬ', menu: 'МЕНЮ',
    score: 'ОЧКИ', best: 'РЕКОРД',
    level: 'УРОВЕНЬ', lives: 'ЖИЗНИ', quota: 'НОРМА',
    gameover: 'ЖИЗНИ КОНЧИЛИСЬ',
    levelend: 'УРОВЕНЬ ПРОЙДЕН',
    won: 'ВСЕ УРОВНИ ПРОЙДЕНЫ',
    perfect: 'ИДЕАЛ!', nice: 'ХОРОШО', wobble: 'ШАТКО', miss: 'МИМО', boom: 'БУМ!',
    'tut_goal': 'ЦЕЛЬ: Закидывай пончики в кольца, выполняя норматив уровня.',
    'tut_controls': 'УПРАВЛЕНИЕ: Удерживай мышь / тап для зарядки, отпусти для выстрела.',
    'tut_win': 'ПОБЕДА: Пройди все 5 уровней, выполнив все нормативы.',
    'tut_lose': 'ПРОИГРЫШ: 3 промаха (перелёт, недолёт или взрыв на платформе).',
    'tut_tip': 'СОВЕТ: ЗЕЛЁНАЯ зона — идеал. КРАСНАЯ — дальше, ДЕНДЖЕР — взрыв.',
    close: 'ЗАКРЫТЬ',
    hold: 'УДЕРЖИВАЙ',
  },
};

var SPRITE_NAMES = ['donut', 'launcher', 'ring', 'explosion'];

// ── CONSTANTS (DESIGN.md tunables) ───────────────────────────────────────
var LIVES = 3;
var MAX_LEVEL = 5;
var CHARGE_RATE = 0.6;            // charge units per frame at 60fps
var GREEN_ZONE  = [40, 60];
var MIN_FIRE_CHARGE = 8;          // below this, releaseDonut cancels (no fire-under-yourself)
var YELLOW_ZONE = [60, 80];
var RED_ZONE    = [80, 95];
var DANGER_ZONE = [95, 100];
var GRAVITY = 1100;               // px/s^2
var LAUNCH_BASE_VELOCITY = 340;
var RING_QUOTA = [3, 4, 5, 6, 7];
var WIND_LEVEL_START = 3;

var LAUNCH_ANGLE_DEG = 55;        // fixed launch angle, side-view feel

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';                  // MENU | PLAYING | LEVELEND | GAMEOVER | WON
var level = 1;
var lives = LIVES;
var score = 0, best = 0;
var levelHits = 0;
var quota = RING_QUOTA[0];
var charge = 0;                   // 0..100
var charging = false;
var donut = null;                 // {x,y,vx,vy,active,detonated,startX,startY,chargeAtRelease}
var rings = [];
var levelEndTimer = 0;
var lastResultText = '';
var lastResultColor = '#fff';
var resultFlashTimer = 0;
var showHelp = false;
var windTime = 0;

// Stored button bounds for click handling
var menuButton = null;
var endButton = null;

// Screenshot mode: when true, freeze donut + render decorative arc trail
var screenshotMode = false;
var screenshotArc = [];

// ── HELPERS ──────────────────────────────────────────────────────────────
function persistBest() {
  try { localStorage.setItem('overcharge_donut_best', best); } catch (e) {}
}
function loadBest() {
  try { best = parseInt(localStorage.getItem('overcharge_donut_best') || '0') || 0; } catch (e) {}
}

function resetCharge() {
  charge = 0;
  charging = false;
}

function launcherX() { return 90 * GF.S; }
function launcherY() { return GF.H - 110 * GF.S; }

function buildRingsForLevel(lv) {
  rings = [];
  var baseX = launcherX() + 220 * GF.S;
  var availW = Math.max(GF.W - baseX - 60 * GF.S, 200 * GF.S);
  var ringCount = 4;
  for (var i = 0; i < ringCount; i++) {
    var fx = i / (ringCount - 1);
    var rx = baseX + fx * availW;
    var ry = launcherY() - 10 * GF.S - (Math.sin(fx * Math.PI) * 30) * GF.S;
    var radius = (28 + i * 8) * GF.S;
    var pts = (ringCount - i) * 2;
    var drift = lv >= WIND_LEVEL_START ? (40 + lv * 10) * GF.S : 0;
    rings.push({
      baseX: rx, baseY: ry, x: rx, y: ry, r: radius, points: pts,
      drift: drift, dir: i % 2 === 0 ? 1 : -1, phase: i * 0.7,
    });
  }
}

function startGame() {
  level = 1;
  lives = LIVES;
  score = 0;
  levelHits = 0;
  quota = RING_QUOTA[0];
  donut = null;
  resetCharge();
  buildRingsForLevel(level);
  gs = 'PLAYING';
  showHelp = false;
  resultFlashTimer = 0;
  if (window.GF && GF.gameStarted) GF.gameStarted();
}

function nextLevel() {
  level += 1;
  if (level > MAX_LEVEL) {
    gs = 'WON';
    if (score > best) { best = score; persistBest(); }
    if (window.GF && GF.gameEnded) GF.gameEnded();
    return;
  }
  levelHits = 0;
  quota = RING_QUOTA[level - 1];
  donut = null;
  resetCharge();
  buildRingsForLevel(level);
  gs = 'PLAYING';
}

function gameOver() {
  if (score > best) { best = score; persistBest(); }
  gs = 'GAMEOVER';
  if (window.GF && GF.gameEnded) GF.gameEnded();
}

window._jumpLevel = function(n) {
  startGame();
  // Special: n >= 99 jumps to a terminal state for the runtime gate.
  if (n >= 99) {
    score = 50;
    lives = 0;
    gameOver();
    return;
  }
  // Otherwise this is the screenshot path — set up a populated mid-action frame.
  window._setupForScreenshot(n);
};

window._setupForScreenshot = function(n) {
  startGame();
  level = Math.max(2, Math.min(MAX_LEVEL, n || 3));
  quota = RING_QUOTA[level - 1];
  levelHits = Math.max(1, Math.floor(quota / 2));
  score = 30 + level * 18;
  buildRingsForLevel(level);
  // Place rings higher in the air so the upper region reads as gameplay.
  for (var ri = 0; ri < rings.length; ri++) {
    rings[ri].y -= 150 * GF.S;
    rings[ri].baseY -= 150 * GF.S;
  }
  screenshotMode = true;
  // Compute a fake parabolic arc from launcher up over rings[2]
  screenshotArc = [];
  var sx = launcherX();
  var sy = launcherY();
  var targetRing = rings[2] || rings[rings.length - 1];
  var ex = targetRing.x;
  var ey = targetRing.y;
  // peak in the middle, lifted
  var peakY = Math.min(sy, ey) - 180 * GF.S;
  var peakX = (sx + ex) / 2;
  for (var t = 0; t <= 1.001; t += 0.04) {
    // quadratic bezier through (sx,sy) -> (peakX, peakY) -> (ex,ey)
    var ax = (1 - t) * (1 - t) * sx + 2 * (1 - t) * t * peakX + t * t * ex;
    var ay = (1 - t) * (1 - t) * sy + 2 * (1 - t) * t * peakY + t * t * ey;
    screenshotArc.push({ x: ax, y: ay });
  }
  // Place a static donut at ~70% along the arc, near a ring
  var donutPos = screenshotArc[Math.floor(screenshotArc.length * 0.6)];
  donut = {
    x: donutPos.x,
    y: donutPos.y,
    vx: 0, vy: 0,
    active: false, detonated: false,
    startX: sx, startY: sy,
    chargeAtRelease: 50,
  };
  charge = 55;
  charging = true;
  // Burst at one of the rings as if a recent hit happened
  if (rings[1]) {
    for (var p = 0; p < 22; p++) GF.spawnParticles(rings[1].x, rings[1].y, p % 2 === 0 ? '#5fd76a' : '#ffd23f', 1);
    GF.spawnFloat(rings[1].x, rings[1].y - 30 * GF.S, '+5 PERFECT!', '#5fd76a');
  }
  // Result flash text for the HUD
  lastResultText = 'PERFECT! +5';
  lastResultColor = '#5fd76a';
  resultFlashTimer = 9999; // hold flash through screenshot capture
  GF.setShake(0.2);
};

// ── INPUT ───────────────────────────────────────────────────────────────
function inHelpButton(x, y) {
  var hb = helpButtonBounds();
  return x >= hb.x && x <= hb.x + hb.w && y >= hb.y && y <= hb.y + hb.h;
}

function inMenuButton(x, y) {
  if (!menuButton) return false;
  return x >= menuButton.x && x <= menuButton.x + menuButton.w &&
         y >= menuButton.y && y <= menuButton.y + menuButton.h;
}

function inEndButton(x, y) {
  if (!endButton) return false;
  return x >= endButton.x && x <= endButton.x + endButton.w &&
         y >= endButton.y && y <= endButton.y + endButton.h;
}

function pressDown(x, y) {
  if (gs === 'MENU') {
    if (inMenuButton(x, y)) startGame();
    return;
  }
  if (gs === 'GAMEOVER' || gs === 'WON') {
    if (inEndButton(x, y)) {
      if (gs === 'GAMEOVER') startGame();
      else gs = 'MENU';
    }
    return;
  }
  if (gs === 'LEVELEND') {
    nextLevel();
    return;
  }
  if (gs !== 'PLAYING') return;
  if (showHelp) { showHelp = false; return; }
  if (inHelpButton(x, y)) { showHelp = true; return; }
  if (donut && donut.active) return;
  if (!charging) {
    charging = true;
    charge = 0;
  }
}

function pressUp() {
  if (gs !== 'PLAYING') return;
  if (!charging) return;
  charging = false;
  releaseDonut(charge);
}

GF.canvas.addEventListener('mousedown', function(e) {
  e.preventDefault();
  pressDown(e.clientX, e.clientY);
});
GF.canvas.addEventListener('mouseup', function(e) {
  e.preventDefault();
  pressUp();
});
GF.canvas.addEventListener('mouseleave', function() {
  if (charging) pressUp();
});
GF.canvas.addEventListener('touchstart', function(e) {
  if (!e.changedTouches.length) return;
  var t = e.changedTouches[0];
  pressDown(t.clientX, t.clientY);
}, { passive: false });
GF.canvas.addEventListener('touchend', function() {
  pressUp();
}, { passive: false });
GF.canvas.addEventListener('touchcancel', function() {
  if (charging) pressUp();
}, { passive: false });

// ── PHYSICS ─────────────────────────────────────────────────────────────
function releaseDonut(c) {
  // 2026-05-15 — player reported "JUST FIRES UNDER YOURSELF" because a fast
  // tap (c≈0) launched the donut at 0.6× base velocity, landing right at the
  // launcher's feet. Below MIN_FIRE_CHARGE we cancel the shot instead so an
  // accidental tap doesn't burn a life. The velocity curve below is also
  // rescaled so the GREEN_ZONE (40-60) reliably reaches the first ring at
  // ~220*S px — old 0.6+1.6c/100 range was 161-206 px at c=40-60, undershooting
  // ring 1 every time.
  if (c < MIN_FIRE_CHARGE) {
    charging = false;
    charge = 0;
    return;
  }
  if (c >= DANGER_ZONE[0]) {
    detonatePad();
    return;
  }
  var ang = LAUNCH_ANGLE_DEG * Math.PI / 180;
  var velScale = 0.7 + (c / 100) * 2.0;
  var v = LAUNCH_BASE_VELOCITY * velScale * GF.S;
  // Spawn at the cannon muzzle, well above the ground threshold (launcherY-8*S),
  // otherwise the donut "lands" on frame 1 and every shot misses (2026-05-15 fix).
  var spawnX = launcherX() + Math.cos(ang) * 56 * GF.S;
  var spawnY = launcherY() - Math.sin(ang) * 56 * GF.S - 10 * GF.S;
  donut = {
    x: spawnX,
    y: spawnY,
    vx: Math.cos(ang) * v,
    vy: -Math.sin(ang) * v,
    active: true, detonated: false,
    startX: spawnX, startY: spawnY,
    chargeAtRelease: c,
  };
  GF.spawnParticles(spawnX, spawnY, '#ffd23f', 14);
  GF.setShake(0.4);
  charge = 0;
}

function detonatePad() {
  donut = {
    x: launcherX() + 8 * GF.S,
    y: launcherY() - 12 * GF.S,
    vx: 0, vy: 0,
    active: false, detonated: true,
  };
  for (var i = 0; i < 40; i++) {
    GF.spawnParticles(donut.x, donut.y, i % 2 === 0 ? '#ff5454' : '#ffd23f', 1);
  }
  GF.spawnFloat(donut.x, donut.y - 30 * GF.S, GF.t('boom'), '#ff5454');
  GF.setShake(1.4);
  loseLife('boom');
  charge = 0;
}

function loseLife(reason) {
  lives -= 1;
  lastResultText = GF.t(reason || 'miss');
  lastResultColor = '#ff5454';
  resultFlashTimer = 1.0;
  if (lives <= 0) {
    setTimeout(gameOver, 500);
  }
}

function donutLanded(x, landY) {
  var hit = null;
  for (var i = 0; i < rings.length; i++) {
    var r = rings[i];
    if (Math.abs(x - r.x) <= r.r * 0.95 && Math.abs(landY - r.y) <= r.r * 1.2) {
      hit = r; break;
    }
  }
  if (!hit) {
    GF.spawnParticles(x, landY, '#7a8aa0', 12);
    GF.spawnFloat(x, landY - 30 * GF.S, GF.t('miss'), '#7a8aa0');
    GF.setShake(0.3);
    loseLife('miss');
    return;
  }
  var c = donut.chargeAtRelease || 0;
  var pts = hit.points;
  var label = 'wobble';
  var col = '#ffd23f';
  if (c >= GREEN_ZONE[0] && c < GREEN_ZONE[1]) { pts += 3; label = 'perfect'; col = '#5fd76a'; }
  else if (c >= YELLOW_ZONE[0] && c < YELLOW_ZONE[1]) { pts += 1; label = 'nice'; col = '#ffd23f'; }
  else { label = 'wobble'; col = '#ff8c42'; }
  score += pts;
  levelHits += 1;
  GF.spawnParticles(hit.x, hit.y, col, 28);
  GF.spawnFloat(hit.x, hit.y - 36 * GF.S, '+' + pts + ' ' + GF.t(label), col);
  lastResultText = GF.t(label) + ' +' + pts;
  lastResultColor = col;
  resultFlashTimer = 1.0;
  GF.setShake(0.5);
  if (levelHits >= quota) {
    setTimeout(function() {
      if (gs === 'PLAYING') {
        gs = 'LEVELEND';
        levelEndTimer = 1.6;
      }
    }, 350);
  }
}

// ── UPDATE ──────────────────────────────────────────────────────────────
function update(dt) {
  if (gs === 'PLAYING') {
    windTime += dt;
    for (var i = 0; i < rings.length; i++) {
      var r = rings[i];
      if (r.drift > 0) {
        r.x = r.baseX + Math.sin(windTime * 1.3 + r.phase) * r.drift;
      }
    }
    if (charging && !screenshotMode) {
      charge += CHARGE_RATE * (dt * 60);
      if (charge >= 100) {
        charge = 100;
        charging = false;
        detonatePad();
      }
    }
    if (donut && donut.active && !screenshotMode) {
      donut.vy += GRAVITY * GF.S * dt;
      donut.x += donut.vx * dt;
      donut.y += donut.vy * dt;
      if (Math.random() < 0.4) {
        GF.spawnParticles(donut.x, donut.y, '#ffd6a8', 1);
      }
      var groundY = launcherY() - 8 * GF.S;
      var landed = false;
      for (var j = 0; j < rings.length; j++) {
        var rg = rings[j];
        if (Math.abs(donut.x - rg.x) < rg.r * 0.7 &&
            Math.abs(donut.y - rg.y) < rg.r * 0.6) {
          donut.active = false;
          donutLanded(donut.x, donut.y);
          landed = true;
          break;
        }
      }
      if (!landed && donut.y >= groundY) {
        donut.y = groundY;
        donut.active = false;
        donutLanded(donut.x, groundY);
      }
      if (!landed && donut.x > GF.W + 40 * GF.S) {
        donut.active = false;
        donutLanded(donut.x, groundY);
      }
    }
    if (!screenshotMode && resultFlashTimer > 0) resultFlashTimer = Math.max(0, resultFlashTimer - dt);
    // Keep visuals alive during screenshot capture
    if (screenshotMode) {
      if (rings[1] && Math.random() < 0.7) {
        GF.spawnParticles(rings[1].x, rings[1].y, Math.random() < 0.5 ? '#5fd76a' : '#ffd23f', 1);
      }
      if (donut && Math.random() < 0.4) {
        GF.spawnParticles(donut.x, donut.y, '#ffd6a8', 1);
      }
    }
  } else if (gs === 'LEVELEND') {
    levelEndTimer -= dt;
    if (levelEndTimer <= 0) nextLevel();
  }
}

// ── DRAW ────────────────────────────────────────────────────────────────
function drawSky() {
  var c = GF.ctx;
  var grad = c.createLinearGradient(0, 0, 0, GF.H);
  grad.addColorStop(0, '#1a1530');
  grad.addColorStop(0.5, '#2a1a3a');
  grad.addColorStop(1, '#3a2540');
  c.fillStyle = grad;
  c.fillRect(0, 0, GF.W, GF.H);
  // Stars
  c.fillStyle = 'rgba(255,255,255,0.22)';
  for (var i = 0; i < 80; i++) {
    var sx = (i * 137) % GF.W;
    var sy = (i * 53) % (GF.H * 0.7);
    c.fillRect(sx, sy, 2, 2);
  }
  // Distant background donut silhouettes
  c.save();
  c.globalAlpha = 0.14;
  for (var d = 0; d < 5; d++) {
    var bx = ((d * 211) % GF.W);
    var by = (60 + (d * 73) % (GF.H * 0.4)) * 1;
    var br = (30 + (d * 11) % 40) * GF.S;
    c.fillStyle = '#ff7eb6';
    c.beginPath(); c.arc(bx, by, br, 0, Math.PI * 2); c.fill();
    c.fillStyle = '#1a1428';
    c.beginPath(); c.arc(bx, by, br * 0.32, 0, Math.PI * 2); c.fill();
  }
  c.restore();
  // Soft horizon glow
  var horizonY = GF.H * 0.55;
  var hg = c.createLinearGradient(0, horizonY - 80 * GF.S, 0, horizonY + 60 * GF.S);
  hg.addColorStop(0, 'rgba(255, 126, 182, 0)');
  hg.addColorStop(0.5, 'rgba(255, 126, 182, 0.18)');
  hg.addColorStop(1, 'rgba(255, 126, 182, 0)');
  c.fillStyle = hg;
  c.fillRect(0, horizonY - 80 * GF.S, GF.W, 140 * GF.S);
}

function drawGround() {
  var c = GF.ctx;
  var groundY = launcherY() + 12 * GF.S;
  var g = c.createLinearGradient(0, groundY, 0, GF.H);
  g.addColorStop(0, '#3a2845');
  g.addColorStop(1, '#1a1020');
  c.fillStyle = g;
  c.fillRect(0, groundY, GF.W, GF.H - groundY);
  c.strokeStyle = 'rgba(255, 209, 102, 0.4)';
  c.lineWidth = 2 * GF.S;
  c.beginPath();
  c.moveTo(0, groundY);
  c.lineTo(GF.W, groundY);
  c.stroke();
}

function drawLauncher() {
  var c = GF.ctx;
  var lx = launcherX(), ly = launcherY();
  c.fillStyle = '#5a3f2a';
  GF.rr(c, lx - 36 * GF.S, ly + 4 * GF.S, 72 * GF.S, 14 * GF.S, 4 * GF.S);
  c.fill();
  GF.drawSprite('launcher', lx, ly - 22 * GF.S, 90 * GF.S, function(cx, x, y) {
    var ang = LAUNCH_ANGLE_DEG * Math.PI / 180;
    cx.save();
    cx.translate(x, y + 12 * GF.S);
    cx.rotate(-ang);
    cx.fillStyle = '#444';
    GF.rr(cx, -12 * GF.S, -56 * GF.S, 24 * GF.S, 70 * GF.S, 6 * GF.S);
    cx.fill();
    cx.fillStyle = '#666';
    GF.rr(cx, -16 * GF.S, -56 * GF.S, 32 * GF.S, 14 * GF.S, 4 * GF.S);
    cx.fill();
    cx.fillStyle = '#222';
    cx.beginPath();
    cx.arc(0, -56 * GF.S, 10 * GF.S, 0, Math.PI * 2);
    cx.fill();
    cx.restore();
    cx.fillStyle = '#3a2a1a';
    cx.beginPath();
    cx.arc(x, y + 28 * GF.S, 28 * GF.S, 0, Math.PI * 2);
    cx.fill();
  });
}

function chargeColor(v) {
  if (v < GREEN_ZONE[1]) return '#5fd76a';
  if (v < YELLOW_ZONE[1]) return '#ffd23f';
  if (v < RED_ZONE[1]) return '#ff8c42';
  return '#ff3838';
}

function drawCharging() {
  if (!charging) return;
  var c = GF.ctx;
  var ang = LAUNCH_ANGLE_DEG * Math.PI / 180;
  var muzzleX = launcherX() + Math.cos(ang) * 56 * GF.S;
  var muzzleY = launcherY() - Math.sin(ang) * 56 * GF.S - 10 * GF.S;
  var pulse = 4 + Math.sin(performance.now() * (0.005 + charge * 0.0008)) * 4;
  var color = chargeColor(charge);
  c.save();
  c.shadowColor = color;
  c.shadowBlur = (16 + pulse) * GF.S;
  c.fillStyle = color;
  c.beginPath();
  c.arc(muzzleX, muzzleY, (12 + pulse) * GF.S, 0, Math.PI * 2);
  c.fill();
  c.restore();
}

function drawChargeBar() {
  var c = GF.ctx;
  var pad = 16 * GF.S;
  var barW = Math.min(GF.W - 2 * pad, 360 * GF.S);
  var barH = 22 * GF.S;
  var x = (GF.W - barW) / 2;
  var y = GF.H - 56 * GF.S;
  c.fillStyle = 'rgba(8,8,18,0.7)';
  GF.rr(c, x - 4 * GF.S, y - 4 * GF.S, barW + 8 * GF.S, barH + 8 * GF.S, 8 * GF.S);
  c.fill();
  function zone(a, b, col) {
    var zx = x + (a / 100) * barW;
    var zw = ((b - a) / 100) * barW;
    c.fillStyle = col;
    c.fillRect(zx, y, zw, barH);
  }
  c.fillStyle = '#1a1428';
  c.fillRect(x, y, barW, barH);
  zone(0, GREEN_ZONE[0], '#1a3a1a');
  zone(GREEN_ZONE[0], GREEN_ZONE[1], '#5fd76a');
  zone(YELLOW_ZONE[0], YELLOW_ZONE[1], '#ffd23f');
  zone(RED_ZONE[0], RED_ZONE[1], '#ff8c42');
  zone(DANGER_ZONE[0], DANGER_ZONE[1], '#ff2222');
  var fillW = (charge / 100) * barW;
  var col = chargeColor(charge);
  var strobe = 1.0;
  if (charge >= YELLOW_ZONE[0]) {
    var sp = 0.005 + (charge - YELLOW_ZONE[0]) * 0.001;
    strobe = 0.5 + 0.5 * Math.abs(Math.sin(performance.now() * sp));
  }
  c.save();
  c.globalAlpha = strobe;
  c.fillStyle = col;
  c.fillRect(x, y, fillW, barH);
  c.restore();
  c.strokeStyle = '#fff';
  c.lineWidth = 2 * GF.S;
  c.beginPath();
  c.moveTo(x + fillW, y - 4 * GF.S);
  c.lineTo(x + fillW, y + barH + 4 * GF.S);
  c.stroke();
  c.strokeStyle = 'rgba(255,255,255,0.6)';
  c.lineWidth = 2 * GF.S;
  c.strokeRect(x, y, barW, barH);
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(11 * GF.S, 9, 16) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'bottom';
  c.fillText('GREEN', x + ((GREEN_ZONE[0] + GREEN_ZONE[1]) / 200) * barW, y - 6 * GF.S);
  c.fillText('YELLOW', x + ((YELLOW_ZONE[0] + YELLOW_ZONE[1]) / 200) * barW, y - 6 * GF.S);
  c.fillText('RED', x + ((RED_ZONE[0] + RED_ZONE[1]) / 200) * barW, y - 6 * GF.S);
  c.fillText('!', x + ((DANGER_ZONE[0] + DANGER_ZONE[1]) / 200) * barW, y - 6 * GF.S);
  if (!charging && (!donut || !donut.active)) {
    c.fillStyle = 'rgba(255,255,255,0.7)';
    c.font = 'bold ' + GF.clamp(13 * GF.S, 10, 18) + 'px sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'top';
    c.fillText(GF.t('hold'), GF.W / 2, y + barH + 8 * GF.S);
  }
}

function drawRings() {
  var c = GF.ctx;
  for (var i = 0; i < rings.length; i++) {
    var r = rings[i];
    GF.drawSprite('ring', r.x, r.y, r.r * 2.2, function(cx, x, y, s) {
      var rad = s / 2.2;
      var grad = cx.createRadialGradient(x, y, rad * 0.4, x, y, rad);
      grad.addColorStop(0, 'rgba(255, 209, 102, 0.05)');
      grad.addColorStop(1, 'rgba(255, 209, 102, 0.4)');
      cx.fillStyle = grad;
      cx.beginPath();
      cx.arc(x, y, rad, 0, Math.PI * 2);
      cx.fill();
      cx.strokeStyle = '#ffd166';
      cx.lineWidth = 5 * GF.S;
      cx.beginPath();
      cx.arc(x, y, rad, 0, Math.PI * 2);
      cx.stroke();
      cx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
      cx.lineWidth = 2 * GF.S;
      cx.beginPath();
      cx.arc(x, y, rad - 6 * GF.S, 0, Math.PI * 2);
      cx.stroke();
    });
    c.fillStyle = '#fff';
    c.font = 'bold ' + GF.clamp(13 * GF.S, 10, 18) + 'px sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText('+' + r.points, r.x, r.y);
    c.fillStyle = '#3a2a1a';
    c.fillRect(r.x - 3 * GF.S, r.y + r.r, 6 * GF.S, (launcherY() - r.y - r.r + 16 * GF.S));
  }
}

function drawArcTrail() {
  if (!screenshotMode || !screenshotArc.length) return;
  var c = GF.ctx;
  c.save();
  for (var i = 0; i < screenshotArc.length; i++) {
    var p = screenshotArc[i];
    var a = 0.15 + (i / screenshotArc.length) * 0.55;
    c.globalAlpha = a;
    c.fillStyle = i % 2 === 0 ? '#ff7eb6' : '#ffd6a8';
    c.beginPath();
    c.arc(p.x, p.y, (3 + (i / screenshotArc.length) * 4) * GF.S, 0, Math.PI * 2);
    c.fill();
  }
  c.restore();
}

function drawDonut() {
  if (!donut || donut.detonated) return;
  GF.drawSprite('donut', donut.x, donut.y, 40 * GF.S, function(cx, x, y, s) {
    var rad = s / 2;
    cx.save();
    cx.fillStyle = 'rgba(0,0,0,0.3)';
    cx.beginPath();
    cx.ellipse(x, y + rad * 0.5, rad * 0.9, rad * 0.3, 0, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = '#a87a52';
    cx.beginPath();
    cx.arc(x, y, rad, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = '#ff7eb6';
    cx.beginPath();
    cx.arc(x, y, rad * 0.85, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = '#1a1428';
    cx.beginPath();
    cx.arc(x, y, rad * 0.28, 0, Math.PI * 2);
    cx.fill();
    var colors = ['#5fd76a', '#ffd23f', '#4dafff', '#ffffff'];
    for (var i = 0; i < 8; i++) {
      var a = i * 0.7;
      var sx = x + Math.cos(a) * rad * 0.55;
      var sy = y + Math.sin(a) * rad * 0.55;
      cx.fillStyle = colors[i % colors.length];
      cx.fillRect(sx - 2 * GF.S, sy - 1 * GF.S, 5 * GF.S, 2 * GF.S);
    }
    cx.restore();
  });
}

function helpButtonBounds() {
  var sz = 32 * GF.S;
  return { x: GF.W - sz - 16 * GF.S, y: GF.H - sz - 80 * GF.S, w: sz, h: sz };
}

function drawHUD() {
  var c = GF.ctx;
  var pad = 12 * GF.S;
  var fs = GF.clamp(15 * GF.S, 11, 20);
  c.font = 'bold ' + fs + 'px sans-serif';
  c.fillStyle = '#fff';
  c.textAlign = 'left'; c.textBaseline = 'top';
  c.fillText(GF.t('level') + ' ' + level + '/' + MAX_LEVEL, pad, pad);
  c.fillText(GF.t('quota') + ': ' + levelHits + '/' + quota, pad, pad + fs * 1.3);
  c.textAlign = 'right';
  c.fillText(GF.t('score') + ': ' + score, GF.W - pad, pad);
  c.fillText(GF.t('best') + ': ' + best, GF.W - pad, pad + fs * 1.3);
  var lifeR = 10 * GF.S;
  var lifeGap = 26 * GF.S;
  var lifeY = pad + lifeR;
  var lifeStartX = GF.W / 2 - (LIVES - 1) * lifeGap / 2;
  for (var i = 0; i < LIVES; i++) {
    c.fillStyle = i < lives ? '#ff5454' : '#3a2a3a';
    c.beginPath();
    c.arc(lifeStartX + i * lifeGap, lifeY, lifeR, 0, Math.PI * 2);
    c.fill();
  }
  if (resultFlashTimer > 0 && lastResultText) {
    c.save();
    c.globalAlpha = Math.min(1, resultFlashTimer * 1.5);
    c.fillStyle = lastResultColor;
    c.font = 'bold ' + GF.clamp(28 * GF.S, 20, 40) + 'px sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(lastResultText, GF.W / 2, GF.H / 2 - 80 * GF.S);
    c.restore();
  }
  var hb = helpButtonBounds();
  c.fillStyle = 'rgba(8,8,18,0.7)';
  GF.rr(c, hb.x, hb.y, hb.w, hb.h, hb.h / 2); c.fill();
  c.strokeStyle = '#48c9b0'; c.lineWidth = 2 * GF.S;
  GF.rr(c, hb.x, hb.y, hb.w, hb.h, hb.h / 2); c.stroke();
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(16 * GF.S, 12, 22) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText('?', hb.x + hb.w / 2, hb.y + hb.h / 2);
}

function drawTutorialOverlay() {
  var c = GF.ctx;
  c.fillStyle = 'rgba(8,8,18,0.92)';
  c.fillRect(0, 0, GF.W, GF.H);
  var fs = GF.clamp(16 * GF.S, 11, 22);
  var lh = fs * 1.7;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(22 * GF.S, 16, 28) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'top';
  c.fillText(GF.t('title'), GF.cx, 24 * GF.S);
  var startY = GF.cy - (lh * keys.length) / 2;
  c.font = fs + 'px sans-serif';
  c.fillStyle = '#cde';
  for (var i = 0; i < keys.length; i++) {
    c.fillText(GF.t(keys[i]), GF.cx, startY + i * lh);
  }
  c.fillStyle = '#48c9b0';
  c.font = 'bold ' + fs + 'px sans-serif';
  c.fillText('— ' + GF.t('close') + ' —', GF.cx, GF.H - 60 * GF.S);
}

function drawMenuOverlay() {
  var c = GF.ctx;
  c.fillStyle = 'rgba(8,8,18,0.85)';
  c.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(38 * GF.S, 22, 56);
  var subFs = GF.clamp(15 * GF.S, 11, 20);
  c.shadowColor = 'rgba(255, 126, 182, 0.55)';
  c.shadowBlur = 24 * GF.S;
  c.font = 'bold ' + titleFs + 'px sans-serif';
  c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'top';
  c.fillText(GF.t('title'), GF.cx, 32 * GF.S);
  c.shadowColor = 'transparent'; c.shadowBlur = 0;
  c.font = subFs + 'px sans-serif';
  c.fillStyle = '#9ab';
  c.fillText(GF.t('sub'), GF.cx, 32 * GF.S + titleFs + 8 * GF.S);
  var tutFs = GF.clamp(14 * GF.S, 10, 18);
  c.font = tutFs + 'px sans-serif';
  c.fillStyle = '#cde';
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var lh = tutFs * 1.7;
  var startY = 32 * GF.S + titleFs + 8 * GF.S + subFs + 30 * GF.S;
  for (var i = 0; i < keys.length; i++) {
    c.fillText(GF.t(keys[i]), GF.cx, startY + i * lh);
  }
  var btnW = GF.clamp(240 * GF.S, 160, 320);
  var btnH = GF.clamp(54 * GF.S, 40, 66);
  var btnX = GF.cx - btnW / 2;
  var btnY = startY + lh * keys.length + 30 * GF.S;
  // clamp inside screen
  if (btnY + btnH + 50 * GF.S > GF.H) {
    btnY = GF.H - btnH - 50 * GF.S;
  }
  var grad = c.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#ff7eb6'); grad.addColorStop(1, '#d63384');
  GF.rr(c, btnX, btnY, btnW, btnH, btnH / 2);
  c.fillStyle = grad; c.fill();
  c.font = 'bold ' + GF.clamp(18 * GF.S, 14, 22) + 'px sans-serif';
  c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(GF.t('play'), GF.cx, btnY + btnH / 2);
  if (best > 0) {
    c.font = GF.clamp(12 * GF.S, 9, 16) + 'px sans-serif';
    c.fillStyle = '#778';
    c.textBaseline = 'top';
    c.fillText(GF.t('best') + ': ' + best, GF.cx, btnY + btnH + 12 * GF.S);
  }
  menuButton = { x: btnX, y: btnY, w: btnW, h: btnH };
}

function drawEndOverlay(titleKey, subText, accent) {
  var c = GF.ctx;
  c.fillStyle = 'rgba(8,8,18,0.88)';
  c.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(34 * GF.S, 22, 50);
  var subFs = GF.clamp(16 * GF.S, 12, 22);
  c.shadowColor = accent || 'rgba(255, 84, 84, 0.5)';
  c.shadowBlur = 24 * GF.S;
  c.font = 'bold ' + titleFs + 'px sans-serif';
  c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.fillText(GF.t(titleKey), GF.cx, GF.cy - 40 * GF.S);
  c.shadowColor = 'transparent'; c.shadowBlur = 0;
  c.font = subFs + 'px sans-serif';
  c.fillStyle = '#9ab';
  c.fillText(subText, GF.cx, GF.cy - 6 * GF.S);
  c.fillStyle = '#bcd';
  c.fillText(GF.t('best') + ': ' + best, GF.cx, GF.cy + 18 * GF.S);
  var btnW = GF.clamp(220 * GF.S, 160, 320);
  var btnH = GF.clamp(50 * GF.S, 40, 66);
  var btnX = GF.cx - btnW / 2;
  var btnY = GF.cy + 50 * GF.S;
  var grad = c.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#48c9b0'); grad.addColorStop(1, '#16a085');
  GF.rr(c, btnX, btnY, btnW, btnH, btnH / 2);
  c.fillStyle = grad; c.fill();
  c.font = 'bold ' + subFs + 'px sans-serif';
  c.fillStyle = '#fff'; c.textBaseline = 'middle';
  c.fillText(GF.t('retry'), GF.cx, btnY + btnH / 2);
  c.textBaseline = 'alphabetic';
  endButton = { x: btnX, y: btnY, w: btnW, h: btnH };
}

function drawLevelEnd() {
  var c = GF.ctx;
  c.fillStyle = 'rgba(8,8,18,0.78)';
  c.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(34 * GF.S, 22, 50);
  c.shadowColor = 'rgba(95, 215, 106, 0.55)'; c.shadowBlur = 24 * GF.S;
  c.font = 'bold ' + titleFs + 'px sans-serif';
  c.fillStyle = '#5fd76a'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(GF.t('levelend'), GF.cx, GF.cy);
  c.shadowColor = 'transparent'; c.shadowBlur = 0;
  c.font = GF.clamp(16 * GF.S, 12, 22) + 'px sans-serif';
  c.fillStyle = '#bcd';
  c.fillText(GF.t('level') + ' ' + level + ' → ' + (level + 1), GF.cx, GF.cy + 40 * GF.S);
}

function draw(ctx) {
  drawSky();
  drawGround();
  drawRings();
  drawArcTrail();
  drawLauncher();
  drawCharging();
  drawDonut();

  if (gs === 'PLAYING' || gs === 'LEVELEND') {
    drawHUD();
    drawChargeBar();
  }
  if (gs === 'PLAYING' && showHelp) {
    drawTutorialOverlay();
  }
  if (gs === 'MENU') drawMenuOverlay();
  if (gs === 'GAMEOVER') drawEndOverlay('gameover', GF.t('score') + ': ' + score);
  if (gs === 'WON') drawEndOverlay('won', GF.t('score') + ': ' + score, 'rgba(95, 215, 106, 0.5)');
  if (gs === 'LEVELEND') drawLevelEnd();
}

// ── BOOT ────────────────────────────────────────────────────────────────
GF.exposeState(function() {
  return {
    gs: gs, level: level, lives: lives, score: score,
    quota: quota, levelHits: levelHits, charge: charge,
    charging: charging,
    donutActive: !!(donut && donut.active),
    donutX: donut ? donut.x : null,
    donutY: donut ? donut.y : null,
    donutVx: donut ? donut.vx : null,
    donutVy: donut ? donut.vy : null,
  };
});

GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'overcharge_donut',
  onReady: function() {
    loadBest();
    gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

})();
</script>
</body>
