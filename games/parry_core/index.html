<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── GAME-SPECIFIC CONFIG ─────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Parry Core',
    sub:   'Deflect the swarm. Defend the core.',
    play: 'PLAY', retry: 'RETRY', shop: 'UPGRADES', back: 'BACK', menu: 'MENU',
    revive: '▶ REVIVE',
    score: 'SCORE', best: 'BEST', wave: 'WAVE', cores: 'CORES',
    gameover: 'GAME OVER',
    tap_prompt: 'TAP this side!',
    final: 'Score', reached: 'Wave', earned: '+%n CORES',
    nova_ready: 'NOVA READY — tap the core!',
    perfect: 'PERFECT!',
    boss_in: 'CORE BREAKER',
    boss_down: 'BREAKER DOWN!',
    tut_goal:     'Goal: Defend the core. Deflect projectiles streaking in from all 4 edges.',

    tut_perfect:  'Perfect: parry right at the outer ring for double points and faster NOVA charge.',

    up_core_n:    'Reinforced Core', up_core_d:   '+1 starting life',
    up_guard_n:   'Wide Guard',      up_guard_d:  'Wider, longer parry window',
    up_charge_n:  'Overcharge',      up_charge_d: 'NOVA charges faster',
    up_magnet_n:  'Core Magnet',     up_magnet_d: '+20% CORES earned',
    lvl: 'LVL', max: 'MAX', cost: 'COST',
  },
  ru: {
    title: 'Parry Core',
    sub:   'Отбивай рой. Защищай ядро.',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', shop: 'УЛУЧШЕНИЯ', back: 'НАЗАД', menu: 'МЕНЮ',
    revive: '▶ ОЖИВИТЬ',
    score: 'ОЧКИ', best: 'РЕКОРД', wave: 'ВОЛНА', cores: 'ЯДРА',
    gameover: 'ИГРА ОКОНЧЕНА',
    tap_prompt: 'НАЖМИ сюда!',
    final: 'Очки', reached: 'Волна', earned: '+%n ЯДЕР',
    nova_ready: 'NOVA ГОТОВА — нажми на ядро!',
    perfect: 'ИДЕАЛЬНО!',
    boss_in: 'РАЗЛОМЩИК ЯДРА',
    boss_down: 'РАЗЛОМЩИК ПАЛ!',
    tut_goal:     'Цель: защищай ядро. Отбивай снаряды, летящие со всех 4 сторон.',
    tut_controls: 'Управление: НАЖМИ на сторону, откуда летит угроза (или стрелки / WASD), чтобы поднять щит.',
    tut_perfect:  'Идеально: отбей ровно на внешнем кольце — двойные очки и быстрее заряд NOVA.',
    tut_nova:     'NOVA: отражения заряжают кольцо ядра. Когда оно засветится — НАЖМИ на ядро и очисти экран.',
    tut_boss:     'Каждая 5-я волна — Разломщик ядра. Отбивай его выстрелы, чтобы разбить.',
    tut_lose:     'Проигрыш: угроза, дошедшая до ядра, отнимает жизнь. Потеряй все жизни.',
    tut_shop:     'Совет: трать ЯДРА в УЛУЧШЕНИЯх — больше жизней, мягче тайминг, быстрее NOVA.',
    up_core_n:    'Усиленное ядро', up_core_d:   '+1 жизнь на старте',
    up_guard_n:   'Широкий щит',         up_guard_d:  'Шире и дольше окно отбива',
    up_charge_n:  'Перезаряд',           up_charge_d: 'NOVA заряжается быстрее',
    up_magnet_n:  'Магнит ядер',       up_magnet_d: '+20% ЯДЕР за забег',
    lvl: 'УРОВ', max: 'МАКС', cost: 'ЦЕНА',
  },
};

var SPRITE_NAMES = []; // procedural art

// ── TUNABLES (base = DESIGN.md contract; never mutated) ───────────────────
var LIVES          = 3;
var CORE_RADIUS    = 34;
var BASE_SPEED     = 95;
var SPAWN_INTERVAL = 1.5;
var RAMP_RATE      = 0.06;
var WAVE_THRESHOLD = 8;
var COMBO_STEP     = 0.5;
var SHIELD_WINDOW  = 0.42;
var PARRY_BAND     = 60;
var HEAVY_HITS     = 2;
var PERFECT_BAND   = 16;   // deflect within this of the outer ring = perfect
var NOVA_MAX       = 100;  // charge needed to fire a nova
var CHARGE_PARRY   = 7;    // charge per normal parry
var CHARGE_PERFECT = 15;   // charge per perfect parry
var NOVA_SCORE     = 18;   // points per threat a nova clears
var BOSS_EVERY     = 5;    // every Nth wave is a boss wave

// Effective stats (base + meta upgrades). Recomputed in applyUpgrades().
var effLives = LIVES, effShieldWin = SHIELD_WINDOW, effParryBand = PARRY_BAND,
    effPerfectBand = PERFECT_BAND, chargeMul = 1, novaMul = 1, coreMul = 1;

// Side indices: 0=top, 1=right, 2=bottom, 3=left
var SIDE_TOP = 0, SIDE_RIGHT = 1, SIDE_BOTTOM = 2, SIDE_LEFT = 3;
var SIDE_COLORS = ['#4dd0e1', '#ffb74d', '#ba68c8', '#81c784'];

// Threat types
var T_NORMAL = 'normal', T_DART = 'dart', T_HEAVY = 'heavy', T_SPLIT = 'split';
var THREAT_RADIUS = { normal: 13, dart: 9, heavy: 18, split: 13 };

// Meta upgrade catalogue
var UPGRADES = [
  { key: 'core',   max: 2, costs: [40, 110] },
  { key: 'guard',  max: 3, costs: [30, 80, 170] },
  { key: 'charge', max: 3, costs: [35, 95, 200] },
  { key: 'magnet', max: 3, costs: [50, 120, 240] },
];

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | SHOP | PLAYING | GAMEOVER
var score = 0, best = 0, wave = 1;
var lives = LIVES;
var comboCount = 0;         // consecutive parries
var comboMult = 1;          // score multiplier
var parriesThisWave = 0;
var threats = [];
var shields = [0, 0, 0, 0]; // remaining raised-time per side (sec)
var spawnTimer = 0;
var spawnInterval = SPAWN_INTERVAL;
var threatSpeed = BASE_SPEED;
var firstParryDone = false;
var tutorialOpen = false;
var pulseT = 0;
var charge = 0;             // nova charge 0..NOVA_MAX
var perfectCount = 0;       // perfect parries this run (feeds Cores earned)
var lastEarned = 0;         // Cores earned on the last run (gameover screen)
var novaFlash = 0;          // white-out timer after a nova
var perfectFlash = 0;       // perfect-parry flash timer
var boss = null;            // boss object during boss waves
var bossBanner = 0;         // banner timer when a boss spawns / dies
var bossBannerTxt = '';
var cores = 0;              // persistent meta currency
var upg = { core: 0, guard: 0, charge: 0, magnet: 0 };
var runCores = 0;           // cores already credited for the current run
// Ads (Yandex rewarded revive + throttled interstitial)
var reviveUsed = false;     // one rewarded revive per run
var reviveLoading = false;  // disables the REVIVE button while the ad loads
var lastInterstitialMs = -1e9;
var INTERSTITIAL_GAP_MS = 180000; // ≥3min between fullscreen ads (Yandex 4.1)
var _ssMode = false;        // screenshot capture: freeze world

function curStrings() { return STRINGS[GF.lang] || STRINGS.en; }

// ── PERSISTENCE ──────────────────────────────────────────────────────────
function loadTutorialSeen() {
  try { return localStorage.getItem('parry_core_seen_tutorial') === '1'; } catch (e) { return false; }
}
function saveTutorialSeen() {
  try { localStorage.setItem('parry_core_seen_tutorial', '1'); } catch (e) {}
}
function loadCores() {
  try { return parseInt(localStorage.getItem('parry_core_cores') || '0') || 0; } catch (e) { return 0; }
}
function saveCores() { try { localStorage.setItem('parry_core_cores', cores); } catch (e) {} }
function loadUpgrades() {
  try {
    var s = JSON.parse(localStorage.getItem('parry_core_upg') || '{}') || {};
    return { core: s.core | 0, guard: s.guard | 0, charge: s.charge | 0, magnet: s.magnet | 0 };
  } catch (e) { return { core: 0, guard: 0, charge: 0, magnet: 0 }; }
}
function saveUpgrades() { try { localStorage.setItem('parry_core_upg', JSON.stringify(upg)); } catch (e) {} }

// Translate effective stats from purchased upgrade levels.
function applyUpgrades() {
  effLives     = LIVES + upg.core;                 // 3..5
  effShieldWin = SHIELD_WINDOW + upg.guard * 0.07; // 0.42..0.63
  effParryBand = PARRY_BAND + upg.guard * 9;       // 60..87
  effPerfectBand = PERFECT_BAND + upg.guard * 4;   // 16..28
  chargeMul    = 1 + upg.charge * 0.30;            // 1..1.9
  novaMul      = 1 + upg.charge * 0.20;            // 1..1.6
  coreMul      = 1 + upg.magnet * 0.20;            // 1..1.6
}
function upgradeLevel(key) { return upg[key] | 0; }
function upgradeNextCost(u) {
  var lv = upgradeLevel(u.key);
  return lv >= u.max ? null : u.costs[lv];
}

// ── HELPERS ──────────────────────────────────────────────────────────────
function sideInward(side) {
  if (side === SIDE_TOP)    return { x: 0,  y: 1 };
  if (side === SIDE_RIGHT)  return { x: -1, y: 0 };
  if (side === SIDE_BOTTOM) return { x: 0,  y: -1 };
  return { x: 1, y: 0 }; // left
}

function spawnThreat(side, type, fromBoss) {
  if (side === undefined) side = (Math.random() * 4) | 0;
  if (type === undefined) {
    var r = Math.random();
    if (wave >= 2 && r < 0.18) type = T_DART;
    else if (wave >= 3 && r < 0.34) type = T_HEAVY;
    else if (wave >= 4 && r < 0.46) type = T_SPLIT;
    else type = T_NORMAL;
  }
  var inw = sideInward(side);
  var margin = 30;
  var sx, sy;
  if (side === SIDE_TOP)         { sx = GF.cx; sy = -margin * GF.S; }
  else if (side === SIDE_RIGHT)  { sx = GF.W + margin * GF.S; sy = GF.cy; }
  else if (side === SIDE_BOTTOM) { sx = GF.cx; sy = GF.H + margin * GF.S; }
  else                           { sx = -margin * GF.S; sy = GF.cy; }
  // Boss shots originate at the boss orb (so they read as "from the breaker").
  if (fromBoss && boss) { sx = boss.x; sy = boss.y; }
  var spdMul = (type === T_DART) ? 1.75 : (type === T_HEAVY) ? 0.7 : 1;
  threats.push({
    side: side, type: type,
    x: sx, y: sy,
    vx: inw.x, vy: inw.y,
    speed: threatSpeed * spdMul,
    r: THREAT_RADIUS[type] * GF.S,
    hits: (type === T_HEAVY) ? HEAVY_HITS : 1,
    staggered: false,
    deflected: false,
    dvx: 0, dvy: 0,
    spin: Math.random() * Math.PI * 2,
    fromBoss: !!fromBoss,
  });
}

// Convert a screen point to a side index (4 diagonal quadrants).
function pointToSide(px, py) {
  var dx = px - GF.cx, dy = py - GF.cy;
  if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? SIDE_RIGHT : SIDE_LEFT;
  return dy > 0 ? SIDE_BOTTOM : SIDE_TOP;
}

function novaReady() { return charge >= NOVA_MAX; }

// Raise a shield on `side` and try to parry the nearest matching threat.
function raiseShield(side) {
  if (gs !== 'PLAYING') return;
  shields[side] = effShieldWin;
  if (_ssMode) return;
  var target = null, bestD = 1e9;
  var bandPx = effParryBand * GF.S;
  for (var i = 0; i < threats.length; i++) {
    var t = threats[i];
    if (t.deflected || t.side !== side) continue;
    var d = GF.dist(t.x, t.y, GF.cx, GF.cy);
    if (d <= CORE_RADIUS * GF.S + bandPx && d < bestD) { target = t; bestD = d; }
  }
  if (target) {
    // Perfect = deflected near the outer ring (fast reaction).
    var ringPx = (CORE_RADIUS + effParryBand) * GF.S;
    var perfect = bestD >= ringPx - effPerfectBand * GF.S;
    parryThreat(target, perfect);
  }
}

function parryThreat(t, perfect) {
  var col = SIDE_COLORS[t.side];
  if (t.type === T_HEAVY && !t.staggered) {
    t.staggered = true;
    t.hits -= 1;
    GF.setShake(0.25);
    GF.spawnParticles(t.x, t.y, col, 8);
    return;
  }
  if (t.type === T_SPLIT) {
    t.deflected = true;
    sendOut(t, col);
    var adj1 = (t.side + 1) % 4, adj2 = (t.side + 3) % 4;
    spawnFork(t, adj1);
    spawnFork(t, adj2);
    awardParry(t, col, 6, perfect);
    return;
  }
  t.deflected = true;
  sendOut(t, col);
  awardParry(t, col, t.type === T_HEAVY ? 20 : t.type === T_DART ? 14 : 10, perfect);
}

function spawnFork(parent, side) {
  var inw = sideInward(side);
  var px = GF.cx - inw.x * (effParryBand + 40) * GF.S;
  var py = GF.cy - inw.y * (effParryBand + 40) * GF.S;
  threats.push({
    side: side, type: T_NORMAL,
    x: px, y: py,
    vx: inw.x, vy: inw.y,
    speed: threatSpeed * 0.85,
    r: THREAT_RADIUS.normal * GF.S,
    hits: 1, staggered: false, deflected: false,
    dvx: 0, dvy: 0, spin: 0, isFork: true, fromBoss: false,
  });
}

function sendOut(t, col) {
  var ang = Math.atan2(t.y - GF.cy, t.x - GF.cx) + (Math.random() - 0.5) * 0.8;
  var sp = (5 + Math.random() * 3) * GF.S;
  t.dvx = Math.cos(ang) * sp; t.dvy = Math.sin(ang) * sp;
  GF.spawnParticles(t.x, t.y, col, 14);
  GF.setShake(0.18);
}

function awardParry(t, col, base, perfect) {
  comboCount += 1;
  comboMult = 1 + (comboCount - 1) * COMBO_STEP;
  var mult = comboMult * (perfect ? 2 : 1);
  var gain = Math.round(base * mult);
  score += gain;
  parriesThisWave += 1;
  charge = Math.min(NOVA_MAX, charge + (perfect ? CHARGE_PERFECT : CHARGE_PARRY) * chargeMul);
  if (perfect) {
    perfectCount += 1;
    perfectFlash = 0.45;
    GF.spawnParticles(t.x, t.y, '#ffffff', 10);
    GF.spawnFloat(t.x, t.y - 22 * GF.S, curStrings().perfect, '#fff');
  }
  GF.spawnFloat(t.x, t.y - 14 * GF.S, '+' + gain, col);
  if (!firstParryDone) firstParryDone = true;

  // Boss damage: parrying a breaker shot chips its hull.
  if (boss && t.fromBoss) {
    boss.hp -= 1;
    GF.setShake(0.2);
    if (boss.hp <= 0) defeatBoss();
  }

  // Normal waves advance by parry count; boss waves advance on defeat.
  if (!boss && parriesThisWave >= WAVE_THRESHOLD) advanceWave();
  GF.saveRun();
}

function advanceWave() {
  parriesThisWave = 0;
  wave += 1;
  threatSpeed = BASE_SPEED * (1 + RAMP_RATE * (wave - 1) * 2.4);
  spawnInterval = Math.max(0.45, SPAWN_INTERVAL * (1 - RAMP_RATE * (wave - 1)));
  if (wave % BOSS_EVERY === 0) startBoss();
  else GF.spawnFloat(GF.cx, GF.cy - CORE_RADIUS * GF.S * 2.2, curStrings().wave + ' ' + wave, '#ffd54f');
}

// ── BOSS ─────────────────────────────────────────────────────────────────
function startBoss() {
  var side = (Math.random() * 4) | 0;
  var bx, by, off = 0.16;
  if (side === SIDE_TOP)         { bx = GF.cx; by = GF.H * off; }
  else if (side === SIDE_RIGHT)  { bx = GF.W * (1 - off); by = GF.cy; }
  else if (side === SIDE_BOTTOM) { bx = GF.cx; by = GF.H * (1 - off); }
  else                           { bx = GF.W * off; by = GF.cy; }
  var stage = wave / BOSS_EVERY; // 1, 2, 3...
  var hp = 6 + stage * 2;
  boss = {
    side: side, x: bx, y: by, baseX: bx, baseY: by,
    hp: hp, maxHp: hp, stage: stage,
    fireTimer: 1.4, telegraph: 0, bob: Math.random() * 6.28,
  };
  bossBanner = 1.6; bossBannerTxt = curStrings().boss_in;
  GF.setShake(0.4);
}

function defeatBoss() {
  if (!boss) return;
  GF.spawnParticles(boss.x, boss.y, '#ffd54f', 40);
  GF.setShake(0.7);
  score += 150;
  GF.spawnFloat(GF.cx, GF.cy - CORE_RADIUS * GF.S * 2.2, '+150', '#ffd54f');
  bossBanner = 1.6; bossBannerTxt = curStrings().boss_down;
  boss = null;
  // Roll into the next (normal) wave.
  parriesThisWave = 0;
  wave += 1;
  threatSpeed = BASE_SPEED * (1 + RAMP_RATE * (wave - 1) * 2.4);
  spawnInterval = Math.max(0.45, SPAWN_INTERVAL * (1 - RAMP_RATE * (wave - 1)));
  GF.happytime();
  GF.saveRun();
}

function updateBoss(dt) {
  if (!boss) return;
  boss.bob += dt * 2;
  // gentle bob along the edge so it reads as alive
  if (boss.side === SIDE_TOP || boss.side === SIDE_BOTTOM) boss.x = boss.baseX + Math.sin(boss.bob) * 40 * GF.S;
  else boss.y = boss.baseY + Math.sin(boss.bob) * 40 * GF.S;

  if (boss.telegraph > 0) {
    boss.telegraph -= dt;
    if (boss.telegraph <= 0) fireBossVolley();
    return;
  }
  boss.fireTimer -= dt;
  if (boss.fireTimer <= 0) {
    boss.telegraph = 0.55; // wind-up before each volley
    GF.setShake(0.15);
  }
}

function fireBossVolley() {
  var stage = boss.stage || 1;
  var shots = 1 + Math.min(2, stage); // 2..3
  // Main shot launches FROM the boss, aimed straight at the core so it is a
  // real threat (not a fly-by) and clearly approaches from the boss side.
  spawnThreat(boss.side, Math.random() < 0.35 ? T_DART : T_NORMAL, true);
  aimAtCore(threats[threats.length - 1]);
  // Extras spawn from random edges (already aim inward at the core).
  for (var i = 1; i < shots; i++) {
    spawnThreat((Math.random() * 4) | 0, Math.random() < 0.35 ? T_DART : T_NORMAL, true);
  }
  boss.fireTimer = Math.max(0.95, 1.8 - stage * 0.12);
}

// Re-point a threat's velocity straight at the core (keeps its `side` for parry
// matching). Boss shots use this so they actually pressure the core.
function aimAtCore(t) {
  var dx = GF.cx - t.x, dy = GF.cy - t.y;
  var mag = Math.sqrt(dx * dx + dy * dy) || 1;
  t.vx = dx / mag; t.vy = dy / mag;
}

// ── NOVA ─────────────────────────────────────────────────────────────────
function fireNova() {
  if (!novaReady() || gs !== 'PLAYING') return;
  var cleared = 0;
  for (var i = 0; i < threats.length; i++) {
    var t = threats[i];
    if (t.deflected) continue;
    t.deflected = true;
    var col = SIDE_COLORS[t.side];
    sendOut(t, col);
    cleared += 1;
    if (boss && t.fromBoss) { boss.hp -= 1; }
  }
  if (boss) { boss.hp -= Math.round(2 * novaMul); if (boss.hp <= 0) defeatBoss(); }
  var gain = Math.round(cleared * NOVA_SCORE * novaMul) + 20;
  score += gain;
  GF.spawnFloat(GF.cx, GF.cy - CORE_RADIUS * GF.S * 2.4, '+' + gain, '#ffd54f');
  GF.spawnParticles(GF.cx, GF.cy, '#ffd54f', 46);
  GF.setShake(0.6);
  novaFlash = 0.4;
  charge = 0;
  GF.saveRun();
}

function loseLife() {
  lives -= 1;
  comboCount = 0; comboMult = 1;
  GF.spawnParticles(GF.cx, GF.cy, '#ff5252', 26);
  GF.spawnFloat(GF.cx, GF.cy - CORE_RADIUS * GF.S, '-1', '#ff5252');
  GF.setShake(0.55);
  GF.saveRun();
  if (lives <= 0) gameOver();
}

// ── GAME LIFECYCLE ───────────────────────────────────────────────────────
function startGame() {
  applyUpgrades();
  score = 0; wave = 1; lives = effLives;
  comboCount = 0; comboMult = 1; parriesThisWave = 0;
  threats.length = 0;
  shields = [0, 0, 0, 0];
  spawnTimer = 0;
  spawnInterval = SPAWN_INTERVAL;
  threatSpeed = BASE_SPEED;
  charge = 0; perfectCount = 0; novaFlash = 0; perfectFlash = 0;
  boss = null; bossBanner = 0;
  runCores = 0; reviveUsed = false; reviveLoading = false;
  firstParryDone = false;
  tutorialOpen = false;
  _ssMode = false;
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

// Credit only the delta so a revived run pays out for its final score once
// (revives keep runCores, so re-entering gameOver tops up rather than re-pays).
function creditCores() {
  var earned = Math.round((Math.floor(score / 40) + wave * 3 + perfectCount) * coreMul);
  var delta = Math.max(0, earned - runCores);
  cores += delta; runCores = earned;
  saveCores();
  lastEarned = earned;
}

function gameOver() {
  var newBest = score > best;
  if (newBest) {
    best = score;
    try { localStorage.setItem('parry_core_best', best); } catch (e) {}
  }
  creditCores();
  gs = 'GAMEOVER';
  GF.gameEnded();
  GF.saveRun();
  if (newBest && best > 0) GF.happytime();
}

// ── ADS (Yandex) — all triggers user-initiated; interstitials throttled ─────
// No-op fallbacks keep the gallery iframe + local dev working. The rewarded
// revive grants locally (no SDK) so the feature stays testable; on Yandex the
// real ad gates it.
function showInterstitial(onDone) {
  var now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  if (now - lastInterstitialMs < INTERSTITIAL_GAP_MS) { if (onDone) onDone(); return; }
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showFullscreenAdv) { if (onDone) onDone(); return; }
  lastInterstitialMs = now;
  // No-fill watchdog: on no ad (always true in draft/preview) the SDK fires NO
  // callback, so onDone would never run and the caller could hang. Resume after
  // 4.5s unless the ad actually opened. (Yandex Rejection Patterns 4.5/1.14)
  var done = false, opened = false;
  var finish = function() { if (done) return; done = true; if (onDone) onDone(); };
  var watchdog = setTimeout(function() { if (!opened) finish(); }, 4500);
  try {
    window.ysdk.adv.showFullscreenAdv({ callbacks: {
      onOpen:  function() { opened = true; },
      onClose: function() { clearTimeout(watchdog); finish(); },
      onError: function() { clearTimeout(watchdog); finish(); },
    }});
  } catch (e) { clearTimeout(watchdog); finish(); }
}

function showRewardedRevive() {
  if (reviveUsed || reviveLoading) return;
  reviveLoading = true;
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showRewardedVideo) {
    reviveLoading = false; doRevive(); return; // local/gallery: grant so it's exercisable
  }
  var rewarded = false, opened = false, done = false;
  // No-fill watchdog: if the ad never opens, neither onClose nor onError fires,
  // so reviveLoading would stick true and the Revive button would stay dead
  // forever. Unstick after 4.5s unless the ad actually opened (4.5/1.14).
  var finish = function() { if (done) return; done = true; reviveLoading = false; if (rewarded) doRevive(); };
  var watchdog = setTimeout(function() { if (!opened) finish(); }, 4500);
  try {
    window.ysdk.adv.showRewardedVideo({ callbacks: {
      onOpen:     function() { opened = true; },
      onRewarded: function() { rewarded = true; },
      onClose:    function() { clearTimeout(watchdog); finish(); },
      onError:    function() { clearTimeout(watchdog); finish(); },
    }});
  } catch (e) { clearTimeout(watchdog); finish(); }
}

function doRevive() {
  reviveUsed = true;
  lives = Math.max(lives, 2);   // a cushion to actually keep playing
  threats.length = 0;
  shields = [0, 0, 0, 0];
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function buyUpgrade(u) {
  var lv = upgradeLevel(u.key);
  if (lv >= u.max) return;
  var c = u.costs[lv];
  if (cores < c) return;
  cores -= c;
  upg[u.key] = lv + 1;
  saveCores(); saveUpgrades();
  applyUpgrades();
  GF.spawnFloat(GF.cx, GF.cy, '-' + c, '#ffd54f');
}

// ── SCREENSHOT / GATE HOOKS ──────────────────────────────────────────────
window._setupForScreenshot = function(level) {
  startGame();
  _ssMode = true;
  wave = Math.max(2, (level || 5));
  parriesThisWave = 3;
  score = 240 + (level || 5) * 60;
  comboCount = 4; comboMult = 1 + 3 * COMBO_STEP;
  lives = 3;
  charge = NOVA_MAX; // show the nova-ready core glow in the framed shot
  threatSpeed = BASE_SPEED * (1 + RAMP_RATE * (wave - 1) * 2.4);
  spawnInterval = Math.max(0.45, SPAWN_INTERVAL * (1 - RAMP_RATE * (wave - 1)));
  firstParryDone = true;
  threats.length = 0;
  spawnThreat(SIDE_TOP, T_NORMAL);    threats[threats.length-1].x = GF.cx;                threats[threats.length-1].y = GF.cy - GF.H * 0.34;
  spawnThreat(SIDE_RIGHT, T_DART);    threats[threats.length-1].x = GF.cx + GF.W * 0.30;  threats[threats.length-1].y = GF.cy;
  spawnThreat(SIDE_BOTTOM, T_HEAVY);  threats[threats.length-1].x = GF.cx;                threats[threats.length-1].y = GF.cy + GF.H * 0.30;
  spawnThreat(SIDE_LEFT, T_SPLIT);    threats[threats.length-1].x = GF.cx - GF.W * 0.28;  threats[threats.length-1].y = GF.cy;
  spawnThreat(SIDE_RIGHT, T_NORMAL);  threats[threats.length-1].x = GF.cx + (CORE_RADIUS + PARRY_BAND - 6) * GF.S; threats[threats.length-1].y = GF.cy;
  spawnThreat(SIDE_TOP, T_DART);      threats[threats.length-1].x = GF.cx - GF.W * 0.06;  threats[threats.length-1].y = GF.cy - GF.H * 0.16;
  shields[SIDE_RIGHT] = effShieldWin;
};
window._jumpLevel = function(n) {
  if (n >= 99) {
    startGame();
    lives = 1;
    threats.length = 0;
    spawnThreat(SIDE_TOP, T_NORMAL);
    var tt = threats[threats.length - 1];
    tt.x = GF.cx; tt.y = GF.cy - (CORE_RADIUS + 2) * GF.S;
    tt.speed = BASE_SPEED * 4;
    GF.saveRun();
    return;
  }
  window._setupForScreenshot(n || 5);
};

// ── INPUT ────────────────────────────────────────────────────────────────
var helpBtn = null;
var uiButtons = [];         // menu/shop/gameover hit targets (rebuilt each draw)
var uiLockUntil = 0;        // absorb the mobile ~300ms delayed synthetic click

function uiHit(px, py) {
  for (var i = 0; i < uiButtons.length; i++) {
    var b = uiButtons[i];
    if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
      // A screen-changing tap. Lock input briefly so the trailing mobile
      // `click` (fires ~300ms after `pointerdown`) can't land on — and bounce
      // off — a button in the screen we just opened.
      uiLockUntil = Date.now() + 450;
      b.fn();
      return true;
    }
  }
  return false;
}

function onPress(px, py) {
  pulseT = 0;
  if (Date.now() < uiLockUntil) return;
  if (gs === 'MENU') {
    if (tutorialOpen) { tutorialOpen = false; return; }
    uiHit(px, py);
    return;
  }
  if (gs === 'SHOP') { uiHit(px, py); return; }
  if (gs === 'GAMEOVER') { uiHit(px, py); return; }
  if (gs === 'PLAYING') {
    if (tutorialOpen) { tutorialOpen = false; return; }
    if (helpBtn && px >= helpBtn.x && px <= helpBtn.x + helpBtn.w &&
        py >= helpBtn.y && py <= helpBtn.y + helpBtn.h) {
      tutorialOpen = true; return;
    }
    // Center tap fires nova when charged; otherwise raise the matching shield.
    var d = GF.dist(px, py, GF.cx, GF.cy);
    if (novaReady() && d <= (CORE_RADIUS + 20) * GF.S) { fireNova(); return; }
    raiseShield(pointToSide(px, py));
  }
}

var _lastPressTs = 0, _lastPressX = -999, _lastPressY = -999;
function pressGuarded(x, y) {
  var now = Date.now();
  if (now - _lastPressTs < 350 &&
      Math.abs(x - _lastPressX) < 14 && Math.abs(y - _lastPressY) < 14) return;
  _lastPressTs = now; _lastPressX = x; _lastPressY = y;
  onPress(x, y);
}
var _canvas = document.getElementById('c');
_canvas.addEventListener('pointerdown', function(e) { pressGuarded(e.clientX, e.clientY); }, { passive: true });
_canvas.addEventListener('click', function(e) { pressGuarded(e.clientX, e.clientY); });

// keyboard edge presses (edge-triggered) + space = nova
var keyHeld = { up: false, right: false, down: false, left: false };
document.addEventListener('keydown', function(e) {
  if (gs !== 'PLAYING' || tutorialOpen) return;
  var c = e.code;
  if (c === 'Space') { if (novaReady()) fireNova(); e.preventDefault(); return; }
  if ((c === 'ArrowUp'    || c === 'KeyW') && !keyHeld.up)    { keyHeld.up = true;    raiseShield(SIDE_TOP); }
  if ((c === 'ArrowRight' || c === 'KeyD') && !keyHeld.right) { keyHeld.right = true; raiseShield(SIDE_RIGHT); }
  if ((c === 'ArrowDown'  || c === 'KeyS') && !keyHeld.down)  { keyHeld.down = true;  raiseShield(SIDE_BOTTOM); }
  if ((c === 'ArrowLeft'  || c === 'KeyA') && !keyHeld.left)  { keyHeld.left = true;  raiseShield(SIDE_LEFT); }
});
document.addEventListener('keyup', function(e) {
  var c = e.code;
  if (c === 'ArrowUp'    || c === 'KeyW') keyHeld.up = false;
  if (c === 'ArrowRight' || c === 'KeyD') keyHeld.right = false;
  if (c === 'ArrowDown'  || c === 'KeyS') keyHeld.down = false;
  if (c === 'ArrowLeft'  || c === 'KeyA') keyHeld.left = false;
});

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  pulseT += dt;
  if (novaFlash > 0) novaFlash = Math.max(0, novaFlash - dt);
  if (perfectFlash > 0) perfectFlash = Math.max(0, perfectFlash - dt);
  if (bossBanner > 0) bossBanner = Math.max(0, bossBanner - dt);
  if (gs !== 'PLAYING') return;
  if (tutorialOpen) return;
  if (_ssMode) return;

  for (var s = 0; s < 4; s++) if (shields[s] > 0) shields[s] = Math.max(0, shields[s] - dt);

  if (boss) {
    updateBoss(dt);
  } else {
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnThreat();
      spawnTimer = spawnInterval * (0.75 + Math.random() * 0.5);
      if (wave >= 5 && Math.random() < 0.3) spawnThreat();
    }
  }

  var coreR = CORE_RADIUS * GF.S;
  for (var i = threats.length - 1; i >= 0; i--) {
    var t = threats[i];
    t.spin += dt * 4;
    if (t.deflected) {
      t.x += t.dvx; t.y += t.dvy;
      t.dvx *= 0.99; t.dvy *= 0.99;
      if (t.x < -60 || t.x > GF.W + 60 || t.y < -60 || t.y > GF.H + 60) threats.splice(i, 1);
      continue;
    }
    if (t.type === T_HEAVY && t.staggered) {
      t.x += t.vx * (t.speed * 0.25) * dt * GF.S;
      t.y += t.vy * (t.speed * 0.25) * dt * GF.S;
    } else {
      t.x += t.vx * t.speed * dt * GF.S;
      t.y += t.vy * t.speed * dt * GF.S;
    }
    var d = GF.dist(t.x, t.y, GF.cx, GF.cy);
    if (d <= coreR + t.r) {
      threats.splice(i, 1);
      loseLife();
      if (gs !== 'PLAYING') return;
    }
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  var g = ctx.createRadialGradient(GF.cx, GF.cy, 0, GF.cx, GF.cy, Math.max(GF.W, GF.H) * 0.7);
  g.addColorStop(0, '#10122a');
  g.addColorStop(1, '#070612');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawGuideRings(ctx);
    if (boss) drawBoss(ctx);
    drawShields(ctx);
    drawThreats(ctx);
    drawChargeRing(ctx);
    drawCore(ctx);
  }

  if (gs === 'PLAYING') {
    drawHUD(ctx);
    if (novaReady()) drawNovaPrompt(ctx);
    if (!firstParryDone) drawTapPrompt(ctx);
    if (bossBanner > 0) drawBossBanner(ctx);
    if (perfectFlash > 0) { ctx.fillStyle = 'rgba(255,255,255,' + (perfectFlash * 0.25) + ')'; ctx.fillRect(0, 0, GF.W, GF.H); }
    if (tutorialOpen) drawTutorialPanel(ctx);
  }

  if (novaFlash > 0) { ctx.fillStyle = 'rgba(255,230,140,' + (novaFlash) + ')'; ctx.fillRect(0, 0, GF.W, GF.H); }

  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'SHOP') drawShop(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
}

function drawGuideRings(ctx) {
  ctx.strokeStyle = 'rgba(120,140,200,0.10)';
  ctx.lineWidth = 1;
  for (var k = 1; k <= 3; k++) {
    ctx.beginPath();
    ctx.arc(GF.cx, GF.cy, (CORE_RADIUS + effParryBand * k * 0.9) * GF.S, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(140,160,220,0.18)';
  ctx.setLineDash([6 * GF.S, 8 * GF.S]);
  ctx.beginPath();
  ctx.arc(GF.cx, GF.cy, (CORE_RADIUS + effParryBand) * GF.S, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
}

var SIDE_ANGLE = [-Math.PI / 2, 0, Math.PI / 2, Math.PI]; // top,right,bottom,left
function drawShields(ctx) {
  var ringR = (CORE_RADIUS + effParryBand) * GF.S;
  for (var s = 0; s < 4; s++) {
    var raised = shields[s] > 0;
    var a0 = SIDE_ANGLE[s] - Math.PI / 4;
    var a1 = SIDE_ANGLE[s] + Math.PI / 4;
    ctx.beginPath();
    ctx.arc(GF.cx, GF.cy, ringR, a0, a1);
    if (raised) {
      var alpha = GF.clamp(shields[s] / effShieldWin, 0.2, 1);
      ctx.strokeStyle = SIDE_COLORS[s];
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 9 * GF.S;
      ctx.shadowColor = SIDE_COLORS[s];
      ctx.shadowBlur = 18 * GF.S;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    } else {
      ctx.strokeStyle = SIDE_COLORS[s];
      ctx.globalAlpha = 0.16;
      ctx.lineWidth = 5 * GF.S;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
}

// Charge ring sits just outside the core; sweeps full then glows gold.
function drawChargeRing(ctx) {
  var r = (CORE_RADIUS + 11) * GF.S;
  var frac = GF.clamp(charge / NOVA_MAX, 0, 1);
  ctx.beginPath();
  ctx.arc(GF.cx, GF.cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(120,140,200,0.18)';
  ctx.lineWidth = 4 * GF.S; ctx.stroke();
  if (frac > 0) {
    var full = frac >= 1;
    ctx.beginPath();
    ctx.arc(GF.cx, GF.cy, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * frac);
    ctx.strokeStyle = full ? '#ffd54f' : '#7ad7ff';
    ctx.lineWidth = 4 * GF.S;
    if (full) {
      ctx.shadowColor = '#ffd54f';
      ctx.shadowBlur = (10 + 6 * Math.sin(pulseT * 6)) * GF.S;
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

function drawCore(ctx) {
  var r = CORE_RADIUS * GF.S;
  var pulse = 1 + 0.06 * Math.sin(pulseT * 3);
  var ready = novaReady();
  var g = ctx.createRadialGradient(GF.cx, GF.cy, 0, GF.cx, GF.cy, r * 2.4 * pulse);
  if (ready) {
    g.addColorStop(0, 'rgba(255,220,120,0.65)');
    g.addColorStop(0.5, 'rgba(255,190,80,0.22)');
    g.addColorStop(1, 'rgba(255,190,80,0)');
  } else {
    g.addColorStop(0, 'rgba(120,200,255,0.55)');
    g.addColorStop(0.5, 'rgba(80,140,255,0.18)');
    g.addColorStop(1, 'rgba(80,140,255,0)');
  }
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(GF.cx, GF.cy, r * 2.4 * pulse, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = lives <= 1 ? '#ff7043' : (ready ? '#ffe082' : '#e3f2ff');
  ctx.beginPath(); ctx.arc(GF.cx, GF.cy, r * pulse, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = lives <= 1 ? '#ffab91' : (ready ? '#fff3c4' : '#90caf9');
  ctx.beginPath(); ctx.arc(GF.cx, GF.cy, r * 0.55 * pulse, 0, Math.PI * 2); ctx.fill();
}

function drawBoss(ctx) {
  var r = 26 * GF.S;
  var hpFrac = GF.clamp(boss.hp / boss.maxHp, 0, 1);
  // body
  ctx.save();
  ctx.translate(boss.x, boss.y);
  var tel = boss.telegraph > 0;
  ctx.fillStyle = tel ? '#ff5252' : '#e57373';
  ctx.shadowColor = tel ? '#ff1744' : '#b71c1c';
  ctx.shadowBlur = (tel ? 26 : 14) * GF.S;
  ctx.beginPath();
  for (var h = 0; h < 8; h++) {
    var a = (Math.PI / 4) * h + boss.bob * 0.4;
    var rr2 = r * (h % 2 ? 0.7 : 1);
    var x = Math.cos(a) * rr2, y = Math.sin(a) * rr2;
    if (h === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0, 0, r * 0.34, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // telegraph wind-up ring
  if (tel) {
    var tf = 1 - boss.telegraph / 0.55;
    ctx.beginPath();
    ctx.arc(boss.x, boss.y, r + r * 1.6 * tf, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,82,82,' + (0.6 * (1 - tf)) + ')';
    ctx.lineWidth = 3 * GF.S; ctx.stroke();
  }
  // hp bar above the boss
  var bw = 56 * GF.S, bh = 6 * GF.S, bx = boss.x - bw / 2, by = boss.y - r - 16 * GF.S;
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = '#ff5252'; ctx.fillRect(bx, by, bw * hpFrac, bh);
}

function drawThreats(ctx) {
  for (var i = 0; i < threats.length; i++) {
    var t = threats[i];
    var col = SIDE_COLORS[t.side];
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.spin);
    if (t.deflected) ctx.globalAlpha = 0.7;
    ctx.fillStyle = col;
    ctx.shadowColor = col; ctx.shadowBlur = 10 * GF.S;
    var r = t.r;
    if (t.type === T_DART) {
      ctx.beginPath();
      ctx.moveTo(r * 1.6, 0); ctx.lineTo(-r, r * 0.8); ctx.lineTo(-r, -r * 0.8);
      ctx.closePath(); ctx.fill();
    } else if (t.type === T_HEAVY) {
      ctx.beginPath();
      for (var h = 0; h < 6; h++) {
        var a = (Math.PI / 3) * h;
        var x = Math.cos(a) * r, y = Math.sin(a) * r;
        if (h === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = t.staggered ? '#fff' : 'rgba(0,0,0,0.35)';
      ctx.lineWidth = 3 * GF.S;
      ctx.beginPath(); ctx.arc(0, 0, r * 0.5, 0, Math.PI * 2); ctx.stroke();
    } else if (t.type === T_SPLIT) {
      ctx.beginPath(); ctx.arc(0, 0, r, -Math.PI / 2, Math.PI / 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(0, 0, r, Math.PI / 2, Math.PI * 1.5); ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0);
      ctx.closePath(); ctx.fill();
    }
    // boss-shot marker ring
    if (t.fromBoss && !t.deflected) {
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2 * GF.S;
      ctx.beginPath(); ctx.arc(0, 0, r * 1.5, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function drawHUD(ctx) {
  var fs = GF.clamp(17 * GF.S, 13, 24);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(GF.t('score') + ': ' + score, 14 * GF.S, 14 * GF.S);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#bcd';
  ctx.fillText(GF.t('wave') + ' ' + wave, GF.cx, 14 * GF.S);
  if (comboMult > 1) {
    ctx.fillStyle = '#ffd54f';
    ctx.font = 'bold ' + GF.clamp(14 * GF.S, 11, 19) + 'px sans-serif';
    ctx.fillText('x' + comboMult.toFixed(1), GF.cx, 14 * GF.S + fs + 4 * GF.S);
  }
  var pipR = GF.clamp(8 * GF.S, 6, 12);
  var gap = pipR * 2.6;
  var rightPad = 14 * GF.S;
  var helpSz = GF.clamp(30 * GF.S, 24, 40);
  helpBtn = { x: GF.W - rightPad - helpSz, y: 12 * GF.S, w: helpSz, h: helpSz };
  for (var i = 0; i < effLives; i++) {
    var px = GF.W - rightPad - helpSz - 16 * GF.S - i * gap - pipR;
    var py = 14 * GF.S + pipR;
    ctx.beginPath(); ctx.arc(px, py, pipR, 0, Math.PI * 2);
    ctx.fillStyle = i < lives ? '#ff5252' : 'rgba(255,82,82,0.22)';
    ctx.fill();
  }
  GF.rr(ctx, helpBtn.x, helpBtn.y, helpBtn.w, helpBtn.h, 7 * GF.S);
  ctx.fillStyle = 'rgba(40,48,80,0.85)'; ctx.fill();
  ctx.strokeStyle = 'rgba(160,180,230,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#cfe';
  ctx.font = 'bold ' + (helpSz * 0.55) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', helpBtn.x + helpSz / 2, helpBtn.y + helpSz / 2 + 1);
  ctx.textBaseline = 'top';
}

function drawNovaPrompt(ctx) {
  var pulse = 0.55 + 0.45 * Math.sin(pulseT * 6);
  ctx.font = 'bold ' + GF.clamp(15 * GF.S, 12, 21) + 'px sans-serif';
  ctx.fillStyle = 'rgba(255,213,79,' + (0.6 + 0.4 * pulse) + ')';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('nova_ready'), GF.cx, GF.H - 60 * GF.S);
}

function drawBossBanner(ctx) {
  var a = Math.min(1, bossBanner);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.font = 'bold ' + GF.clamp(28 * GF.S, 20, 42) + 'px sans-serif';
  ctx.fillStyle = '#ff5252';
  ctx.shadowColor = '#ff1744'; ctx.shadowBlur = 20 * GF.S;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(bossBannerTxt, GF.cx, GF.H * 0.3);
  ctx.restore();
  ctx.shadowBlur = 0;
}

function drawTapPrompt(ctx) {
  var near = null, nd = 1e9;
  for (var i = 0; i < threats.length; i++) {
    var t = threats[i];
    if (t.deflected) continue;
    var d = GF.dist(t.x, t.y, GF.cx, GF.cy);
    if (d < nd) { nd = d; near = t; }
  }
  if (!near) return;
  var ang = Math.atan2(near.y - GF.cy, near.x - GF.cx);
  var ar = (CORE_RADIUS + effParryBand + 34) * GF.S;
  var ax = GF.cx + Math.cos(ang) * ar, ay = GF.cy + Math.sin(ang) * ar;
  var pulse = 0.5 + 0.5 * Math.sin(pulseT * 5);
  ctx.save();
  ctx.translate(ax, ay);
  ctx.rotate(ang);
  ctx.globalAlpha = 0.6 + 0.4 * pulse;
  ctx.fillStyle = SIDE_COLORS[near.side];
  ctx.shadowColor = SIDE_COLORS[near.side]; ctx.shadowBlur = 16 * GF.S;
  var a = 14 * GF.S;
  ctx.beginPath();
  ctx.moveTo(a, 0); ctx.lineTo(-a, a * 0.8); ctx.lineTo(-a, -a * 0.8);
  ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  ctx.font = 'bold ' + GF.clamp(16 * GF.S, 12, 22) + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('tap_prompt'), GF.cx, GF.H - 38 * GF.S);
}

// ── BUTTON HELPER ─────────────────────────────────────────────────────────
function drawButton(ctx, x, y, w, h, label, fn, opts) {
  opts = opts || {};
  var enabled = opts.enabled !== false;
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  if (!enabled) { grad.addColorStop(0, '#3a3f52'); grad.addColorStop(1, '#2b2f3e'); }
  else if (opts.accent === 'gold') { grad.addColorStop(0, '#ffca28'); grad.addColorStop(1, '#ffa000'); }
  else if (opts.accent === 'ghost') { grad.addColorStop(0, 'rgba(60,70,100,0.6)'); grad.addColorStop(1, 'rgba(40,48,72,0.6)'); }
  else { grad.addColorStop(0, '#42a5f5'); grad.addColorStop(1, '#1e88e5'); }
  GF.rr(ctx, x, y, w, h, Math.min(h / 2, 16 * GF.S));
  ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = enabled ? (opts.accent === 'gold' ? '#3a2a00' : '#fff') : '#7a8096';
  ctx.font = 'bold ' + GF.clamp((opts.fs || 18) * GF.S, 13, 24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1);
  ctx.textBaseline = 'alphabetic';
  if (enabled && fn) uiButtons.push({ x: x, y: y, w: w, h: h, fn: fn });
}

function drawCoresChip(ctx, y) {
  ctx.font = 'bold ' + GF.clamp(16 * GF.S, 13, 22) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffd54f';
  ctx.fillText('◈ ' + cores + ' ' + GF.t('cores'), GF.cx, y);
}

// ── MENU + TUTORIAL ──────────────────────────────────────────────────────
function _wrapTextLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var test = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width <= maxW || !cur) cur = test;
    else { lines.push(cur); cur = words[i]; }
  }
  if (cur) lines.push(cur);
  return lines;
}

function drawMenu(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(7,6,18,0.9)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(40 * GF.S, 26, 60);
  ctx.shadowColor = 'rgba(80,180,255,0.5)'; ctx.shadowBlur = 28 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  var topY = GF.clamp(GF.H * 0.13, 50, 150);
  ctx.fillText(GF.t('title'), GF.cx, topY);
  ctx.shadowBlur = 0;
  ctx.font = GF.clamp(15 * GF.S, 12, 20) + 'px sans-serif';
  ctx.fillStyle = '#8fa';
  ctx.fillText(GF.t('sub'), GF.cx, topY + titleFs * 0.62);

  var bodyFs = GF.clamp(12.5 * GF.S, 10, 15);
  ctx.font = bodyFs + 'px sans-serif';
  var maxW = Math.min(GF.W * 0.88, 470 * GF.S);
  var lineH = bodyFs * 1.3;
  var blockGap = bodyFs * 0.5;
  var keys = ['tut_goal', 'tut_controls', 'tut_perfect', 'tut_nova', 'tut_boss', 'tut_lose', 'tut_shop'];
  var y = topY + titleFs * 0.62 + GF.clamp(22 * GF.S, 14, 34);
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (var k = 0; k < keys.length; k++) {
    var lines = _wrapTextLines(ctx, GF.t(keys[k]), maxW);
    ctx.fillStyle = (keys[k] === 'tut_shop' || keys[k] === 'tut_perfect') ? '#ffd54f' : '#cdd6ea';
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], GF.cx, y); y += lineH; }
    y += blockGap;
  }

  // Buttons must be taller than the moderation/real-thumb tap step (~43px on a
  // 393-wide phone) so a tap can't thread between them, and the edges stay
  // thumb-friendly. Min height 50 > grid step guarantees a hit.
  var btnW = GF.clamp(230 * GF.S, 170, 300), btnH = GF.clamp(54 * GF.S, 50, 64);
  var gapY = 12 * GF.S;
  // keep buttons on-screen even with the long tutorial block
  var stackH = btnH * 2 + gapY;
  var btnY = Math.min(y + 10 * GF.S, GF.H - stackH - 44 * GF.S);
  var btnX = GF.cx - btnW / 2;
  drawButton(ctx, btnX, btnY, btnW, btnH, GF.t('play'), function() { saveTutorialSeen(); startGame(); });
  drawButton(ctx, btnX, btnY + btnH + gapY, btnW, btnH, GF.t('shop'), function() { gs = 'SHOP'; }, { accent: 'ghost' });

  drawCoresChip(ctx, btnY + stackH + 22 * GF.S);
  if (best > 0) {
    ctx.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
    ctx.fillStyle = '#778'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, btnY + stackH + 44 * GF.S);
  }
}

function drawShop(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(7,6,18,0.95)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(28 * GF.S, 20, 40);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var topY = GF.clamp(GF.H * 0.06, 24, 70);
  ctx.fillText(GF.t('shop'), GF.cx, topY);
  drawCoresChip(ctx, topY + titleFs + 12 * GF.S);

  var rowH = GF.clamp(78 * GF.S, 62, 96);
  var rowW = Math.min(GF.W * 0.9, 460 * GF.S);
  var rowX = GF.cx - rowW / 2;
  var y = topY + titleFs + 34 * GF.S;
  var nameFs = GF.clamp(16 * GF.S, 12, 20);
  var descFs = GF.clamp(12 * GF.S, 10, 15);

  for (var i = 0; i < UPGRADES.length; i++) {
    var u = UPGRADES[i];
    var lv = upgradeLevel(u.key);
    var maxed = lv >= u.max;
    var nextCost = upgradeNextCost(u);
    GF.rr(ctx, rowX, y, rowW, rowH, 12 * GF.S);
    ctx.fillStyle = 'rgba(30,36,58,0.9)'; ctx.fill();
    ctx.strokeStyle = 'rgba(120,140,200,0.25)'; ctx.lineWidth = 1; ctx.stroke();

    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.font = 'bold ' + nameFs + 'px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(GF.t('up_' + u.key + '_n'), rowX + 14 * GF.S, y + 11 * GF.S);
    ctx.font = descFs + 'px sans-serif';
    ctx.fillStyle = '#9fb';
    ctx.fillText(GF.t('up_' + u.key + '_d'), rowX + 14 * GF.S, y + 11 * GF.S + nameFs + 6 * GF.S);

    // level pips
    var pipR = 5 * GF.S, pipY = y + rowH - 16 * GF.S;
    for (var p = 0; p < u.max; p++) {
      ctx.beginPath();
      ctx.arc(rowX + 18 * GF.S + p * pipR * 3, pipY, pipR, 0, Math.PI * 2);
      ctx.fillStyle = p < lv ? '#ffd54f' : 'rgba(255,213,79,0.22)';
      ctx.fill();
    }

    // buy button
    var bW = GF.clamp(96 * GF.S, 78, 130), bH = GF.clamp(44 * GF.S, 36, 56);
    var bX = rowX + rowW - bW - 12 * GF.S, bY = y + (rowH - bH) / 2;
    var label = maxed ? GF.t('max') : ('◈ ' + nextCost);
    var canBuy = !maxed && cores >= nextCost;
    (function(uu) {
      drawButton(ctx, bX, bY, bW, bH, label, canBuy ? function() { buyUpgrade(uu); } : null,
        { accent: maxed ? 'ghost' : 'gold', enabled: canBuy && !maxed, fs: 16 });
    })(u);

    y += rowH + 12 * GF.S;
  }

  var backW = GF.clamp(190 * GF.S, 150, 260), backH = GF.clamp(54 * GF.S, 50, 64);
  drawButton(ctx, GF.cx - backW / 2, Math.min(y + 8 * GF.S, GF.H - backH - 20 * GF.S), backW, backH,
    GF.t('back'), function() { gs = 'MENU'; }, { accent: 'ghost' });
}

function drawGameOver(ctx) {
  uiButtons = [];
  ctx.fillStyle = 'rgba(8,8,18,0.9)';
  ctx.fillRect(0, 0, GF.W, GF.H);

  var titleFs = GF.clamp(36 * GF.S, 22, 56);
  ctx.shadowColor = 'rgba(255,82,82,0.4)'; ctx.shadowBlur = 26 * GF.S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var topY = GF.H * 0.26;
  ctx.fillText(GF.t('gameover'), GF.cx, topY);
  ctx.shadowBlur = 0;

  var subFs = GF.clamp(17 * GF.S, 13, 23);
  ctx.font = subFs + 'px sans-serif';
  ctx.fillStyle = '#bcd';
  ctx.fillText(GF.t('final') + ': ' + score + '   •   ' + GF.t('reached') + ' ' + wave, GF.cx, topY + titleFs * 0.85);
  ctx.fillStyle = '#ffd54f';
  ctx.font = 'bold ' + subFs + 'px sans-serif';
  ctx.fillText(GF.t('earned').replace('%n', lastEarned), GF.cx, topY + titleFs * 0.85 + subFs * 1.5);

  var btnW = GF.clamp(230 * GF.S, 170, 300), btnH = GF.clamp(52 * GF.S, 48, 62), gapY = 11 * GF.S;
  var items = [];
  // Rewarded revive — one per run, the headline ad placement.
  if (!reviveUsed) items.push({ l: GF.t('revive'), f: showRewardedRevive, o: { accent: 'gold', enabled: !reviveLoading } });
  items.push({ l: GF.t('retry'), f: function() { showInterstitial(startGame); } });
  items.push({ l: GF.t('shop'),  f: function() { gs = 'SHOP'; }, o: { accent: reviveUsed ? 'gold' : 'ghost' } });
  items.push({ l: GF.t('menu'),  f: function() { gs = 'MENU'; }, o: { accent: 'ghost' } });

  var n = items.length;
  var stackH = n * btnH + (n - 1) * gapY;
  var btnX = GF.cx - btnW / 2;
  var minY = topY + titleFs * 0.85 + subFs * 2.4;
  var btnY = GF.clamp(GF.cy - 24 * GF.S, minY, GF.H - stackH - 52 * GF.S);
  for (var i = 0; i < n; i++) {
    drawButton(ctx, btnX, btnY + i * (btnH + gapY), btnW, btnH, items[i].l, items[i].f, items[i].o || {});
  }

  if (best > 0) {
    ctx.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
    ctx.fillStyle = '#778'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, btnY + stackH + 22 * GF.S);
  }
}

function drawTutorialPanel(ctx) {
  ctx.fillStyle = 'rgba(7,6,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var titleFs = GF.clamp(24 * GF.S, 18, 34);
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var topY = GF.clamp(GF.H * 0.1, 36, 120);
  ctx.fillText(GF.t('title'), GF.cx, topY);

  var bodyFs = GF.clamp(13 * GF.S, 11, 17);
  ctx.font = bodyFs + 'px sans-serif';
  var maxW = Math.min(GF.W * 0.88, 480 * GF.S);
  var lineH = bodyFs * 1.32;
  var blockGap = bodyFs * 0.55;
  var keys = ['tut_goal', 'tut_controls', 'tut_perfect', 'tut_nova', 'tut_boss', 'tut_lose', 'tut_shop'];
  var y = topY + titleFs * 1.5;
  for (var k = 0; k < keys.length; k++) {
    var lines = _wrapTextLines(ctx, GF.t(keys[k]), maxW);
    ctx.fillStyle = (keys[k] === 'tut_shop' || keys[k] === 'tut_perfect') ? '#ffd54f' : '#cdd6ea';
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], GF.cx, y); y += lineH; }
    y += blockGap;
  }
  ctx.fillStyle = '#9ab';
  ctx.font = bodyFs + 'px sans-serif';
  ctx.fillText(GF.lang === 'ru' ? '(нажмите, чтобы закрыть)' : '(tap anywhere to close)',
    GF.cx, Math.min(y + 8 * GF.S, GF.H - 26 * GF.S));
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 540,
  designH: 720,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'parry_core',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('parry_core_best') || '0') || 0; } catch (e) {}
    cores = loadCores();
    upg = loadUpgrades();
    applyUpgrades();
    GF.persist('parry_core_run_v2',
      function() {
        return { gs: gs, score: score, wave: wave, lives: lives,
                 comboCount: comboCount, comboMult: comboMult,
                 parriesThisWave: parriesThisWave, charge: charge,
                 perfectCount: perfectCount,
                 spawnInterval: spawnInterval, threatSpeed: threatSpeed,
                 firstParryDone: firstParryDone };
      },
      function(s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        score = s.score || 0;
        wave = s.wave || 1;
        lives = (typeof s.lives === 'number') ? s.lives : effLives;
        comboCount = s.comboCount || 0;
        comboMult = s.comboMult || 1;
        parriesThisWave = s.parriesThisWave || 0;
        charge = s.charge || 0;
        perfectCount = s.perfectCount || 0;
        spawnInterval = s.spawnInterval || SPAWN_INTERVAL;
        threatSpeed = s.threatSpeed || BASE_SPEED;
        firstParryDone = !!s.firstParryDone;
      }
    );
    // Resume to a safe screen instead of live combat (Yandex 1.9 best practice).
    if (gs === 'PLAYING') { threats.length = 0; shields = [0,0,0,0]; boss = null; gs = 'MENU'; }
  },
  onUpdate: update,
  onDraw: draw,
});

// Expose state for post-build-tester (DESIGN.md cross-check).
GF.exposeState(function() {
  return {
    gs: gs, score: score, wave: wave, lives: lives,
    comboCount: comboCount, comboMult: comboMult,
    parriesThisWave: parriesThisWave, threatCount: threats.length,
    charge: charge, novaReady: novaReady(), perfectCount: perfectCount,
    bossActive: !!boss, bossHp: boss ? boss.hp : 0, bossMaxHp: boss ? boss.maxHp : 0,
    cores: cores, upgrades: upg,
    spawnInterval: spawnInterval, threatSpeed: threatSpeed,
    tutorialOpen: tutorialOpen,
    LIVES: LIVES, CORE_RADIUS: CORE_RADIUS, BASE_SPEED: BASE_SPEED,
    SPAWN_INTERVAL: SPAWN_INTERVAL, RAMP_RATE: RAMP_RATE,
    WAVE_THRESHOLD: WAVE_THRESHOLD, COMBO_STEP: COMBO_STEP,
    SHIELD_WINDOW: SHIELD_WINDOW, PARRY_BAND: PARRY_BAND, HEAVY_HITS: HEAVY_HITS,
    NOVA_MAX: NOVA_MAX, BOSS_EVERY: BOSS_EVERY,
  };
});

// Test/automation hooks (safe to ship — platforms don't reject these).
window._setLang = function(l) { GF.lang = l; };
window._setState = function(s) { gs = s; };
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'sans-serif'; };
window._raiseShield = function(side) { raiseShield(side); };
window._fireNova = function() { charge = NOVA_MAX; fireNova(); };
window._forceBoss = function() { if (gs === 'PLAYING') { wave = BOSS_EVERY; startBoss(); } };

})();
</script>
