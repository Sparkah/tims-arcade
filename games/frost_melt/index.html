// ── TUNABLES (DESIGN.md §Tunables) ───────────────────────────────────────
var BRUSH_R       = 46;     // base wipe radius (design px)
var BRUSH_GROW    = 10;     // +radius per width-upgrade level
var STAGE_DONE    = 0.92;   // coverage fraction to auto-advance a stage
var COMBO_WINDOW  = 0.7;    // s gap before smoothness combo resets
var COMBO_MAX     = 5;      // smoothness multiplier cap
var COINS_BASE    = 12;     // base coins per relic before star+value scaling
var STAR3_COVER   = 0.93;   // coverage (×combo) for a 3-star appraisal
var MASK_CELLS    = 42;     // mask grid resolution (short axis) — finer = smoother wipe
var FIZZ_RATE     = 0.7;    // de-rust fizz spawn prob per sample
var UPGRADE_COST  = [60, 140, 260];  // tool upgrade ladder
var NUM_RELICS    = RELICS.length;
var SPEED_GROW    = 0.18;   // coverage boost per speed-upgrade level

var gs = 'MENU';            // MENU | PLAYING | APPRAISE | REVEAL

// active restoration
var relic = null;           // current RELICS entry
var relicIdx = 0;
var stageList = [];         // resolved stage keys for this relic
var stageI = 0;             // current stage index
var mask = null;            // Uint8Array of MASK cells (1 = grime present)
var maskW = 0, maskH = 0, maskTotal = 0, maskCleared = 0;
var coverage = 0;           // 0..1 cleared fraction this stage
var revealBuf = [];         // per-cell reveal alpha for smooth fade
var combo = 1, comboTimer = 0, comboPeak = 1;
var stagePeakSum = 0, stagePeakN = 0;  // accumulate avg combo across stages
var stageComboPeak = 1;                 // PEAK combo within the current stage

var gemSet = false, gemNeeded = false;

var toolRects = [];         // tool toolbar buttons

// ── PERSIST HELPERS ──────────────────────────────────────────────────────
function saveMeta() {
  try {
    localStorage.setItem('frost_melt_meta_v1', JSON.stringify({
      coins: coins, best: best, totalStars: totalStars, unlockedMax: unlockedMax,
      upWidth: upWidth, upSpeed: upSpeed, upShine: upShine,
    }));
  } catch (e) {}
}

// ── RELIC GEOMETRY ───────────────────────────────────────────────────────
function relicBox() {
  // The relic occupies a centered square in the upper-middle of the canvas.
  var W = GF.W, H = GF.H;
  var size = Math.min(W * 0.74, H * 0.40);
  var cx = W / 2;
  var cy = L.relicCy || (H * 0.40);
  return { cx: cx, cy: cy, r: size / 2, size: size };
}

// ── MASK (the erase grid) ─────────────────────────────────────────────────
// A square grid over the relic box. Cell value 1 = grime, 0 = cleaned. Only
// cells whose center falls inside the relic silhouette (insideRelic) count
// toward coverage so wiping empty corners doesn't finish the stage.
var hits = null;            // remaining wipe-passes per cell (multi-hit grime)
function stageHardness() {
  var k = stageList[stageI];
  var h = (STAGES[k] && STAGES[k].hard) || 1;
  return h;
}
function buildMask() {
  var box = relicBox();
  maskW = MASK_CELLS; maskH = MASK_CELLS;
  mask = new Uint8Array(maskW * maskH);
  revealBuf = new Float32Array(maskW * maskH);   // 0 = full grime → 1 = fully gone
  hits = new Float32Array(maskW * maskH);
  hitT = new Float32Array(maskW * maskH);        // fresh cooldown clocks each stage
  var hard = stageHardness();
  maskTotal = 0; maskCleared = 0;
  for (var gy = 0; gy < maskH; gy++) {
    for (var gx = 0; gx < maskW; gx++) {
      var fx = (gx + 0.5) / maskW, fy = (gy + 0.5) / maskH;  // 0..1 within box
      if (insideRelic(fx, fy)) {
        var idx = gy * maskW + gx;
        mask[idx] = 1;
        revealBuf[idx] = 0;
        hits[idx] = hard;
        maskTotal++;
      }
    }
  }
  coverage = 0;
}

// Silhouette test in normalized box space (0..1). Tuned to match each drawn
// SHAPE_FN so grime sits exactly ON the object (no oversized blob, no bleed).
// Coordinates here are in box-HALF units: x,y in -0.5..0.5, and the drawn shape
// uses radius r = box.r = 0.5*size, so a draw of `r*k` => threshold (0.5*k)^2.
function insideRelic(fx, fy) {
  var x = fx - 0.5, y = fy - 0.5;  // -0.5..0.5
  var s = relic ? relic.shape : 'coin';
  switch (s) {
    case 'coin':
      return x * x + y * y <= 0.33 * 0.33;          // disc ~0.64r
    case 'medal': case 'amulet':
      return x * x + (y - 0.06) * (y - 0.06) <= 0.27 * 0.27;  // tighter body ~0.52r
    case 'ring':
      var d = Math.sqrt(x * x + y * y); return d <= 0.36 && d >= 0.20;   // torus 0.70..0.44 r
    case 'gem':
      // faceted gem: top point y=-0.41r, widest ~0.74r → diamond test
      return (Math.abs(x) / 0.40 + Math.abs(y) / 0.42) <= 1 && y > -0.45;
    case 'spoon':
      var by = y - 0.18; if ((x * x) / 0.022 + (by * by) / 0.038 <= 1) return true; // bowl
      return Math.abs(x) <= 0.055 && y >= -0.40 && y <= 0.12;                        // handle
    case 'key':
      var ky = y + 0.21; if (x * x + ky * ky <= 0.018) return true;                  // head ring
      if (Math.abs(x) <= 0.05 && y >= -0.14 && y <= 0.34) return true;               // shaft
      return (y >= 0.20 && y <= 0.34 && x >= -0.02 && x <= 0.14);                    // teeth
    case 'watch':
      var dd = Math.sqrt(x * x + y * y);
      if (dd <= 0.40) return true;                                                    // case 0.8r
      return (Math.abs(x) <= 0.05 && y <= -0.36 && y >= -0.48);                       // crown stem
    case 'vase':
      var w = (0.10 + 0.30 * Math.sin((fy * 0.86 + 0.10) * Math.PI));                 // matches draw
      return Math.abs(x) <= w && fy > 0.06 && fy < 0.96;
    case 'goblet':
      if (fy < 0.28) return Math.abs(x) <= 0.28 - fy * 0.30;                          // cup taper
      if (fy < 0.62) return Math.abs(x) <= 0.07;                                      // stem
      return Math.abs(x) <= 0.22 && fy < 0.78;                                        // base
    case 'crown':
      if (fy < 0.30) return Math.abs(x) <= 0.35 && fy > 0.10 && (Math.sin(fx * Math.PI * 4 + 0.6) > -0.35);
      return Math.abs(x) <= 0.35 && fy >= 0.28 && fy < 0.70;                          // band
    case 'idol':
      if (Math.abs(x) <= 0.22 && fy > 0.40 && fy < 0.86) return true;                 // body
      return x * x + (y + 0.17) * (y + 0.17) <= 0.024;                                // head
    case 'hilt':
      if (Math.abs(x) <= 0.05 && y >= -0.15 && y <= 0.40) return true;                // grip
      if (Math.abs(y + 0.10) <= 0.04 && Math.abs(x) <= 0.30) return true;             // guard
      if (x * x + (y - 0.31) * (y - 0.31) <= 0.012) return true;                      // pommel
      return Math.abs(x) <= 0.045 && y <= -0.10 && y >= -0.31;                        // blade stub
    default:
      return x * x + y * y <= 0.34 * 0.34;
  }
}

var hitT = null;             // last-hit timestamp per cell (scrub cooldown)
var HIT_COOLDOWN = 70;       // ms before a cell can take another wipe-pass
// Wipe cells under a stroke at canvas (px,py) with radius rpx. Multi-hit grime
// wears down a pass at a time (rate-limited per cell) so tougher stages need
// real back-and-forth scrubbing. Returns count of cells FULLY cleared this call.
function wipeAt(px, py, rpx) {
  if (!mask) return 0;
  if (!hitT || hitT.length !== mask.length) hitT = new Float32Array(mask.length);
  var box = relicBox();
  var x0 = box.cx - box.size / 2, y0 = box.cy - box.size / 2;
  var touched = 0;
  var cw = box.size / maskW, ch = box.size / maskH;
  var rr = rpx, rr2 = rr * rr;
  var now = performance.now();
  var hard = stageHardness();
  var gx0 = Math.max(0, Math.floor((px - rr - x0) / cw));
  var gx1 = Math.min(maskW - 1, Math.ceil((px + rr - x0) / cw));
  var gy0 = Math.max(0, Math.floor((py - rr - y0) / ch));
  var gy1 = Math.min(maskH - 1, Math.ceil((py + rr - y0) / ch));
  for (var gy = gy0; gy <= gy1; gy++) {
    for (var gx = gx0; gx <= gx1; gx++) {
      var i = gy * maskW + gx;
      if (mask[i] !== 1) continue;
      var ccx = x0 + (gx + 0.5) * cw, ccy = y0 + (gy + 0.5) * ch;
      var dx = ccx - px, dy = ccy - py;
      if (dx * dx + dy * dy > rr2) continue;
      if (now - hitT[i] < HIT_COOLDOWN) continue;   // still cooling from last pass
      hitT[i] = now;
      hits[i] -= 1;
      touched++;
      // visual wear: lighten the grime toward gone as hits drop
      revealBuf[i] = GF.clamp(1 - hits[i] / hard, 0, 0.999) * 0.8;  // partial fade until cleared
      if (hits[i] <= 0) {
        mask[i] = 2;             // fully cleared (revealBuf finishes the fade in update)
        maskCleared++;
      }
    }
  }
  if (maskTotal > 0) coverage = maskCleared / maskTotal;
  return touched;
}

function brushRadius() {
  return (BRUSH_R + upWidth * BRUSH_GROW) * GF.S;
}

// ── LIFECYCLE ──────────────────────────────────────────────────────────────
function startRelic(idx) {
  relicIdx = GF.clamp(idx, 0, NUM_RELICS - 1);
  relic = RELICS[relicIdx];
  stageList = relic.stages.slice();
  stageI = 0;
  combo = 1; comboPeak = 1; comboTimer = 0; stageComboPeak = 1;
  stagePeakSum = 0; stagePeakN = 0; coverSum = 0; coverN = 0;
  gemSet = false; gemNeeded = stageList.indexOf('gem') >= 0;
  grimeSeed = (relicIdx + 1) * 9301 + 4929;
  stagePop = 0; poppedStage = -1;
  newUnlock = -1;
  lastSample = null;
  layout();
  buildMask();
  // if first stage is gem (rare), nothing to wipe — handled in update
  gs = 'PLAYING';
  if (!_restoring) GF.saveRun();   // restore applies saved stage/effort then saves once
  GF.gameStarted();
}
var _restoring = false;

function startGame() {
  // Always start a session at relic 0 for the satisfying quick-win ramp; the
  // player can skip ahead to any unlocked relic from the collection grid.
  startRelic(0);
}

function advanceStage() {
  // record this stage's PEAK combo (not the decayed end value) + its coverage
  stagePeakSum += Math.max(stageComboPeak, combo); stagePeakN++;
  coverSum += (stageList[stageI] === 'gem') ? 1 : coverage; coverN++;
  var bx = relicBox();
  GF.sfx('stageDone');
  // juicy clear: golden sparkle burst + a ring of motes + shake
  GF.spawnParticles(bx.cx, bx.cy, '#a8e8ff', 30);
  for (var s = 0; s < 14; s++) {
    var a = (s / 14) * Math.PI * 2;
    GF.spawnParticles(bx.cx + Math.cos(a) * bx.r * 0.6, bx.cy + Math.sin(a) * bx.r * 0.6, '#e0f8ff', 2);
  }
  GF.setShake(0.55);
  stagePop = 1; poppedStage = stageI;
  stageI++;
  combo = 1; comboTimer = 0; lastSample = null; stageComboPeak = 1;
  if (stageI >= stageList.length) { finishRelic(); return; }
  // next stage: gem stage needs no mask
  if (stageList[stageI] === 'gem') { gemSet = false; }
  else buildMask();
  GF.saveRun();
}

function finishRelic() {
  // Score = THOROUGHNESS (avg coverage across stages) × SMOOTHNESS (avg peak
  // combo). A clean, reasonably smooth restore reliably earns 3 stars so the
  // payoff feels EARNED, not punishing. Rushing (low coverage / jabby strokes)
  // visibly drops to 2 or 1 star.
  var avgCover = coverN > 0 ? coverSum / coverN : coverage;
  var avgCombo = stagePeakN > 0 ? stagePeakSum / stagePeakN : combo;
  comboPeak = avgCombo;
  var smooth = GF.clamp((avgCombo - 1) / 2.2, 0, 1);  // reaches 1.0 at combo ~3.2
  // thoroughness dominates (stages auto-advance at ~0.92, so a real clean is ~0.95+);
  // smoothness is the bonus that separates a careful 3-star from a hasty 2-star.
  var quality = GF.clamp(avgCover * 0.78 + smooth * 0.22 + upShine * 0.03, 0, 1);
  appraiseCover = quality;
  var stars = quality >= 0.82 ? 3 : quality >= 0.58 ? 2 : 1;
  appraiseStars = stars;
  // payout: scales with relic value + tier; even a 1-star pays a fair amount so
  // progress never stalls, but 3-star pays ~2.2x to reward care.
  var mult = stars === 3 ? 1.0 : stars === 2 ? 0.7 : 0.45;
  appraiseCoins = Math.round((COINS_BASE + relic.val) * mult * (1 + relicIdx * 0.08));
  coins += appraiseCoins;
  totalStars += stars;
  if (appraiseCoins > best) best = appraiseCoins;
  // unlock next relic tier(s) by coin gate
  for (var k = unlockedMax + 1; k < NUM_RELICS; k++) {
    if (coins >= RELICS[k].unlock) { unlockedMax = k; newUnlock = k; }
    else break;
  }
  saveMeta();
  appraiseT = 0; bigPop = 1;
  gs = 'APPRAISE';
  GF.sfx('appraise');
  GF.gameEnded();
  if (stars === 3) GF.happytime();
  GF.saveRun();
}

function toReveal() {
  gs = 'REVEAL';
  revealSlide = 0.0; revealAuto = 1;
  GF.saveRun();
}

function nextRelic() {
  // ALWAYS climb the ladder: the session walks up through escalating relics so
  // every restore is fresh content (the core "it stays interesting" lever). The
  // next relic is unlocked on arrival (coin gates only govern jump-ahead from the
  // collection grid). At the top of the ladder, loop to the start of the run.
  var n = relicIdx + 1;
  if (n >= NUM_RELICS) n = 0;
  if (n > unlockedMax) { unlockedMax = n; saveMeta(); }
  startRelic(n);
}

window._jumpLevel = function (n) { window._setupForScreenshot(n || 5); };
window._setupForScreenshot = function (lvl) {
  coins = 900; unlockedMax = 11; upWidth = 2; upSpeed = 1;
  // suppress tutorial so it never changes gs during screenshot capture
  try { localStorage.setItem('frost_melt_tut_v1', '1'); } catch (e) {}
  var idx = GF.clamp((lvl || 5) + 4, 4, NUM_RELICS - 1);
  startRelic(idx);
  // partially clean the relic for a busy mid-action frame: clear the LOWER ~55%
  // of grime cells directly (bypassing the scrub cooldown) so the half-restored
  // gleam shows for the promo shot.
  if (mask) {
    for (var c2 = 0; c2 < mask.length; c2++) {
      if (mask[c2] !== 1) continue;
      var gy = (c2 / maskW) | 0;
      if (gy > maskH * 0.45) { mask[c2] = 2; revealBuf[c2] = 1; maskCleared++; }
      else if (Math.random() < 0.3) { revealBuf[c2] = 0.5; }   // partial wear up top
    }
    if (maskTotal > 0) coverage = maskCleared / maskTotal;
  }
  combo = 3.4; comboPeak = 3.4; stageComboPeak = 3.4; comboTimer = COMBO_WINDOW;
  // spawn some particles for visual life
  var box = relicBox();
  for (var p = 0; p < 16; p++) GF.spawnParticles(box.cx + (Math.random() - 0.5) * box.size, box.cy + (Math.random() - 0.5) * box.size, '#ffe27a', 2);
};

// ── INPUT ──────────────────────────────────────────────────────────────────
function evtXY(e) {
  if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function hit(b, x, y) { return b && b.w && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }

function overlayDown(x, y) {
  // returns true if an overlay button consumed the press
  if (gs === 'MENU') {
    if (hit(muteBtn, x, y)) { toggleMute(); return true; }
    // collection cells
    for (var i = 0; i < shopRects.length; i++) {
      var rc = shopRects[i];
      if (hit(rc, x, y)) {
        if (rc.kind === 'play') { GF.sfx('tap'); startGame(); return true; }
        if (rc.kind === 'relic' && rc.idx <= unlockedMax) { GF.sfx('tap'); startRelic(rc.idx); return true; }
        if (rc.kind === 'relic') { hintMsg = GF.t('unlock') + ' ' + RELICS[rc.idx].unlock; hintT = 1.4; GF.sfx('error'); return true; }
      }
    }
    return false;
  }
  if (gs === 'APPRAISE') {
    if (appraiseT < 0.5) return true;  // wait for the pop
    if (hit(L.bigBtn, x, y)) { GF.sfx('tap'); toReveal(); return true; }
    return true;
  }
  if (gs === 'REVEAL') {
    if (hit(L.bigBtn, x, y)) { GF.sfx('tap'); nextRelic(); return true; }
    if (hit(shopBtn, x, y)) { GF.sfx('tap'); openShop(); return true; }
    return true;
  }
  // PLAYING handled separately
  return false;
}

function openShop() { shopOpen = true; gs = 'SHOP_OVERLAY'; }

function shopDown(x, y) {
  if (hit(L.bigBtn, x, y)) { GF.sfx('tap'); gs = 'REVEAL'; shopOpen = false; return; }
  for (var i = 0; i < shopRects.length; i++) {
    var rc = shopRects[i];
    if (hit(rc, x, y) && rc.kind === 'up') buyUpgrade(rc.up);
  }
}

function buyUpgrade(kind) {
  var lvl = kind === 'w' ? upWidth : kind === 's' ? upSpeed : upShine;
  if (lvl >= 3) { GF.sfx('error'); return; }
  var cost = UPGRADE_COST[lvl];
  if (coins < cost) { hintMsg = GF.t('notenough'); hintT = 1.4; GF.sfx('error'); return; }
  coins -= cost;
  if (kind === 'w') upWidth++; else if (kind === 's') upSpeed++; else upShine++;
  GF.sfx('unlock'); saveMeta();
}

function toggleMute() { GF.toggleMute(); GF.setMusicMuted(GF.muted); }

function onDown(x, y) {
  if (gs === 'SHOP_OVERLAY') { shopDown(x, y); return; }
  if (gs !== 'PLAYING') { overlayDown(x, y); return; }
  // HUD buttons
  if (hit(muteBtn, x, y)) { toggleMute(); return; }
  // tutorial gate (hands-on)
  if (GF.tutorial.active) {
    var sb = GF.tutorial._skipBtn;
    if (sb && x >= sb.x && x <= sb.x + sb.w && y >= sb.y && y <= sb.y + sb.h) { GF.tutorial.handleClick(x, y); return; }
    // let the wipe through; .next() fires from stage progress in update
  } else {
    if (hit(helpBtn, x, y)) { GF.tutorial.reopen(); return; }
    // tool buttons: tap to manually advance to that stage (only forward)
    for (var i = 0; i < toolRects.length; i++) {
      if (hit(toolRects[i], x, y)) {
        if (i > stageI && i < stageList.length) { while (stageI < i) advanceStageManual(); }
        return;
      }
    }
  }
  // gem stage: tap the relic socket to set the gem
  if (stageList[stageI] === 'gem') {
    var box = relicBox();
    if (GF.dist(x, y, box.cx, box.cy) <= box.r) { setGem(box); }
    return;
  }
  dragging = true; dragX = x; dragY = y;
  lastSample = { x: x, y: y, t: performance.now() };
  applyWipe(x, y, true);
}

function advanceStageManual() {
  // manual skip counts the stage as done (records peak combo + current coverage)
  stagePeakSum += Math.max(stageComboPeak, combo); stagePeakN++;
  coverSum += (stageList[stageI] === 'gem') ? 1 : coverage; coverN++;
  stageI++;
  combo = 1; comboTimer = 0; lastSample = null; stageComboPeak = 1;
  if (stageI >= stageList.length) { finishRelic(); return; }
  if (stageList[stageI] !== 'gem') buildMask();
  GF.saveRun();
}

function setGem(box) {
  gemSet = true;
  GF.sfx('coin');
  GF.spawnParticles(box.cx, box.cy - box.r * 0.1, relic.shine, 30);
  GF.setShake(0.6);
  // gem stage clears instantly
  setTimeout(function () {}, 0);
  advanceStage();
}

function onMove(x, y) {
  if (gs !== 'PLAYING' || !dragging) return;
  dragX = x; dragY = y;
  applyWipe(x, y, false);
}

function applyWipe(x, y, isStart) {
  if (stageList[stageI] === 'gem') return;
  var stg = STAGES[stageList[stageI]];
  var r = brushRadius();
  // interpolate between last sample and now so fast drags don't skip
  var n = 1, sx = x, sy = y;
  if (lastSample && !isStart) {
    var dx = x - lastSample.x, dy = y - lastSample.y;
    var d = Math.sqrt(dx * dx + dy * dy);
    n = Math.max(1, Math.floor(d / (r * 0.5)));
  }
  var clearedTotal = 0;
  for (var k = 0; k <= n; k++) {
    var px = lastSample ? lastSample.x + (x - lastSample.x) * (k / n) : x;
    var py = lastSample ? lastSample.y + (y - lastSample.y) * (k / n) : y;
    var cleared = wipeAt(px, py, r * (1 + upSpeed * SPEED_GROW * 0.0));  // radius is via brushRadius
    clearedTotal += cleared;
    if (cleared > 0 && Math.random() < 0.7) spawnStageFx(px, py, stg);
  }
  // speed upgrade: bonus clear of nearby cells
  if (upSpeed > 0 && clearedTotal > 0) wipeAt(x, y, r * (1 + upSpeed * SPEED_GROW));
  // smoothness combo
  var now = performance.now();
  if (lastSample) {
    var mvx = x - lastSample.x, mvy = y - lastSample.y;
    var moved = Math.sqrt(mvx * mvx + mvy * mvy);
    if (moved > 2 * GF.S && clearedTotal > 0) {
      combo = Math.min(COMBO_MAX, combo + 0.08);
      comboTimer = COMBO_WINDOW;
      if (combo > comboPeak) comboPeak = combo;
      if (combo > stageComboPeak) stageComboPeak = combo;
    }
  }
  lastSample = { x: x, y: y, t: now };
  // continuous ASMR wipe sound while productively cleaning (gf-lib rate-limits
  // these to ~90ms so they layer into a texture, not a machine-gun).
  if (clearedTotal > 0) GF.sfx(stg.sfx);

function spawnStageFx(px, py, stg) {
  if (stg.particle === 'dust') {
    GF.spawnParticles(px, py, Math.random() < 0.5 ? '#aedcf8' : '#cdeeff', 3);
  } else if (stg.particle === 'foam') {
    GF.spawnParticles(px, py, Math.random() < 0.5 ? '#dff0ff' : '#ffffff', 3);
  } else if (stg.particle === 'fizz') {
    GF.spawnParticles(px, py, Math.random() < 0.5 ? '#90d0f8' : '#c8ecff', 4);
  } else if (stg.particle === 'spark') {
    GF.spawnParticles(px, py, relic ? relic.shine : '#fff', 3);
  }
}

function onUp(x, y) {
  dragging = false;
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt) {
  if (stagePop > 0) stagePop = Math.max(0, stagePop - dt * 1.6);
  if (bigPop > 0) bigPop = Math.max(0, bigPop - dt * 1.4);
  if (hintT > 0) hintT = Math.max(0, hintT - dt);
  if (newUnlock >= 0) { /* keep until next relic */ }

  if (gs === 'APPRAISE') { appraiseT += dt; return; }
  if (gs === 'REVEAL') {
    if (revealAuto) {
      revealSlide += dt * 0.6;
      if (revealSlide >= 1) { revealSlide = 1; revealAuto = 0; }
    }
    return;
  }
  if (gs !== 'PLAYING') { GF.tutorial.update(dt); return; }
  GF.tutorial.update(dt);

  // reveal-buffer fade for cleared cells
  if (mask) {
    for (var i = 0; i < mask.length; i++) {
      if (mask[i] === 2 && revealBuf[i] < 1) revealBuf[i] = Math.min(1, revealBuf[i] + dt * 8);
    }
  }
  // combo decay — gentle, so lifting to reposition during a careful clean keeps
  // most of the combo (only sustained idleness / jabbing erodes it).
  if (comboTimer > 0) { comboTimer -= dt; }
  else combo = Math.max(1, combo - dt * 0.8);

  // tutorial step advancement (hands-on, action-gated). Step 0 (brush) completes
  // when the FIRST stage is half-cleared; step 1 (polish) only once we've actually
  // reached a later stage and made progress on it — so it can't auto-skip the
  // instant brush passes 0.55 (Codex review 2026-06-05).
  if (GF.tutorial.active) {
    var st = GF.tutorial.step;
    if (st === 0 && stageI === 0 && coverage >= 0.55) GF.tutorial.next();
    else if (st === 1 && stageI >= 1 && coverage >= 0.5) GF.tutorial.next();
  }

  // auto-advance stage at coverage target
  if (stageList[stageI] !== 'gem' && coverage >= STAGE_DONE) {
    advanceStage();
  }
}

// ── DRAW ──────────────────────────────────────────────────────────────────
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  L.topH = GF.clamp(54 * S, 40, 78);
  L.relicCy = H * 0.40;
  var box = relicBox();
  // stage progress bar under relic
  L.barY = box.cy + box.r + GF.clamp(22 * S, 16, 34);
  L.barW = Math.min(W * 0.7, 360 * S);
  L.barX = (W - L.barW) / 2;
  L.barH = GF.clamp(14 * S, 10, 20);
  // tool toolbar (lower thumb zone)
  L.toolY = H - GF.clamp(108 * S, 84, 150);
  L.toolH = GF.clamp(74 * S, 56, 100);
  // mute + help icons
  var ic = GF.clamp(34 * S, 26, 46);
  muteBtn = { x: W - ic - 12 * S, y: (L.topH - ic) / 2 + 4 * S, w: ic, h: ic, r: ic / 2 };
  helpBtn = { x: 12 * S, y: H - ic - 12 * S, w: ic, h: ic, r: ic / 2 };
  // big CTA button (appraise/reveal/shop overlays)
  var bw = GF.clamp(260 * S, 180, 420), bh = GF.clamp(58 * S, 46, 80);
  L.bigBtn = { x: (W - bw) / 2, y: H - bh - GF.clamp(40 * S, 28, 64), w: bw, h: bh };
  shopBtn = { x: (W - bw) / 2, y: L.bigBtn.y - bh - 14 * S, w: bw, h: bh * 0.84 };
}

function draw(ctx) {
  layout();
  drawBackground(ctx);

  if (gs === 'PLAYING') {
    drawRelicScene(ctx);
    drawTopBar(ctx);
    drawStageBar(ctx);
    drawToolbar(ctx);
    drawComboMeter(ctx);
    drawHelp(ctx);
    GF.tutorial.draw(ctx);
  }
  // APPRAISE / REVEAL / SHOP draw their OWN featured relic inside an opaque
  // panel — the gameplay scene is NOT drawn behind them (no grime bleed, no
  // mismatched ghost disc). Top bar stays for context.
  if (gs === 'APPRAISE' || gs === 'REVEAL' || gs === 'SHOP_OVERLAY') drawTopBar(ctx);
  if (gs === 'APPRAISE') drawAppraise(ctx);
  if (gs === 'REVEAL') drawReveal(ctx);
  if (gs === 'SHOP_OVERLAY') drawShop(ctx);
  if (gs === 'MENU') drawMenu(ctx);
  drawMute(ctx);
  if (hintT > 0) drawHint(ctx);
}

function drawBackground(ctx) {
  var W = GF.W, H = GF.H;
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#241d30'); g.addColorStop(0.55, '#1a1626'); g.addColorStop(1, '#120f1a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // workbench surface glow behind the relic
  var box = relicBox();
  var rg = ctx.createRadialGradient(box.cx, box.cy, box.r * 0.2, box.cx, box.cy, box.r * 2.2);
  rg.addColorStop(0, 'rgba(100,160,220,0.18)'); rg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
  // soft ice crack lines at the very bottom
  ctx.strokeStyle = 'rgba(120,180,240,0.18)'; ctx.lineWidth = 1;
  for (var i = 1; i < 5; i++) { var yy = H - i * 26 * GF.S; ctx.beginPath(); ctx.moveTo(0, yy); ctx.lineTo(W, yy); ctx.stroke(); }
}

// Draw the relic clean surface, then the grime layer masked by what is cleaned.
function drawRelicScene(ctx) {
  if (!relic) return;
  var box = relicBox();
  var stgKey = stageList[stageI] || 'polish';
  var atGem = stgKey === 'gem';

  // 1) clean / shiny base relic (fully drawn) — this is what's revealed.
  // Brightness ramps with completed stages AND the live coverage of the current
  // stage, so the metal visibly gleams more with every stroke (dull->shine).
  ctx.save();
  var nStages = stageList.length;
  var stageFrac = (gs === 'PLAYING' && !atGem) ? coverage : (atGem ? (gemSet ? 1 : 0.85) : 1);
  var prog;
  if (gs === 'APPRAISE' || gs === 'REVEAL' || gs === 'SHOP_OVERLAY') prog = 1;
  else if (nStages > 1) prog = GF.clamp((stageI + stageFrac) / nStages, 0, 1);
  else prog = stageFrac;
  drawRelicShape(ctx, box, relic, prog, (gemSet || (atGem && gemSet)) ? true : (gs !== 'PLAYING' && gemNeeded));
  ctx.restore();

  // 2) grime overlay for the CURRENT stage — ONLY while actively playing (never
  // bleeds onto the appraise / reveal overlays). Holes where cleaned. Clipped to
  // the relic silhouette (round shapes) so the dirt stops cleanly at the edge.
  if (gs === 'PLAYING' && !atGem && mask) {
    ctx.save();
    var clipped = hasShapePath(relic.shape);
    if (clipped) { shapePath(ctx, box, relic.shape); ctx.clip(); }
    drawGrimeLayer(ctx, box, STAGES[stgKey], clipped);
    ctx.restore();
  }

  // 3) stage-clear color pop flash
  if (stagePop > 0) {
    ctx.save();
    ctx.globalAlpha = stagePop * 0.5;
    clipRelic(ctx, box);
    var pg = ctx.createRadialGradient(box.cx, box.cy, 0, box.cx, box.cy, box.r);
    pg.addColorStop(0, 'rgba(255,255,255,' + (0.8 * stagePop) + ')');
    pg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = pg; ctx.fillRect(box.cx - box.r, box.cy - box.r, box.size, box.size);
    ctx.restore();
  }

  // 4) gem-stage prompt: pulsing socket
  if (atGem && !gemSet) {
    var pulse = 0.5 + 0.5 * Math.sin(performance.now() / 250);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,235,120,' + (0.6 + 0.4 * pulse) + ')';
    ctx.lineWidth = 3 * GF.S; ctx.setLineDash([6 * GF.S, 5 * GF.S]);
    ctx.beginPath(); ctx.arc(box.cx, box.cy - box.r * 0.08, box.r * 0.22 + pulse * 4 * GF.S, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }
}

function clipRelic(ctx, box) {
  // build a clip path matching insideRelic by sampling — cheap: just clip to a
  // rounded silhouette using the shape's bounding via per-shape path
  shapePath(ctx, box, relic.shape);
  ctx.clip();
}

// Cached soft-dab sprites (one per stage grime color) so the grime layer blits

  g.addColorStop(0, 'rgba(' + Math.round(gr.r * 0.62) + ',' + Math.round(gr.g * 0.62) + ',' + Math.round(gr.b * 0.62) + ',1)');
  g.addColorStop(0.55, 'rgba(' + Math.round(gr.r * 0.78) + ',' + Math.round(gr.g * 0.78) + ',' + Math.round(gr.b * 0.78) + ',0.85)');
  g.addColorStop(1, 'rgba(' + gr.r + ',' + gr.g + ',' + gr.b + ',0)');

  var cw = box.size / maskW, ch = box.size / maskH;

  // unpathed shapes use a tighter dab so grime hugs the mask silhouette.

}

// ── RELIC SHAPE RENDERING ───────────────────────────────────────────────────
// Build a clip path for a shape in box space.
function shapePath(ctx, box, shape) {
  var cx = box.cx, cy = box.cy, r = box.r;
  ctx.beginPath();
  switch (shape) {
    case 'coin':
      ctx.arc(cx, cy, r * 0.66, 0, Math.PI * 2); break;
    case 'medal': case 'amulet':
      ctx.arc(cx, cy + r * 0.12, r * 0.56, 0, Math.PI * 2); break;
    case 'ring':
      ctx.arc(cx, cy, r * 0.74, 0, Math.PI * 2); ctx.arc(cx, cy, r * 0.40, 0, Math.PI * 2, true); break;
    case 'gem':
      ctx.moveTo(cx, cy - r * 0.84); ctx.lineTo(cx + r * 0.78, cy - r * 0.1);
      ctx.lineTo(cx + r * 0.46, cy + r * 0.8); ctx.lineTo(cx - r * 0.46, cy + r * 0.8);
      ctx.lineTo(cx - r * 0.78, cy - r * 0.1); ctx.closePath(); break;
    case 'watch':
      ctx.arc(cx, cy, r * 0.8, 0, Math.PI * 2); break;
    case 'vase':
      var pts = [];
      for (var t = 0; t <= 1.001; t += 0.05) {
        var w = (0.10 + 0.30 * Math.sin((t * 0.86 + 0.10) * Math.PI)) * r * 2;
        var yy = cy - r * 0.88 + t * r * 1.76;
        if (t === 0) ctx.moveTo(cx + w / 2, yy); else ctx.lineTo(cx + w / 2, yy);
      }
      for (var t2 = 1; t2 >= -0.001; t2 -= 0.05) {
        var w2 = (0.10 + 0.30 * Math.sin((t2 * 0.86 + 0.10) * Math.PI)) * r * 2;
        var yy2 = cy - r * 0.88 + t2 * r * 1.76;
        ctx.lineTo(cx - w2 / 2, yy2);
      }
      ctx.closePath(); break;
    case 'goblet':
      // cup (bowl) + a generous body box covering stem+base
      ctx.moveTo(cx - r * 0.55, cy - r * 0.8); ctx.lineTo(cx + r * 0.55, cy - r * 0.8);
      ctx.quadraticCurveTo(cx + r * 0.42, cy - r * 0.1, cx + r * 0.1, cy - r * 0.05);
      ctx.lineTo(cx + r * 0.1, cy + r * 0.42);
      ctx.lineTo(cx + r * 0.44, cy + r * 0.6); ctx.lineTo(cx - r * 0.44, cy + r * 0.6);
      ctx.lineTo(cx - r * 0.1, cy + r * 0.42);
      ctx.lineTo(cx - r * 0.1, cy - r * 0.05);
      ctx.quadraticCurveTo(cx - r * 0.42, cy - r * 0.1, cx - r * 0.55, cy - r * 0.8); ctx.closePath(); break;
    case 'crown':
      // band + points as one bounding polygon
      var bx = cx - r * 0.72, bw = r * 1.44;
      ctx.moveTo(bx, cy + r * 0.42); ctx.lineTo(bx, cy - r * 0.12);
      for (var ci = 0; ci <= 4; ci++) {
        var pxc = bx + (ci / 4) * bw;
        ctx.lineTo(pxc, cy - r * 0.58);
        if (ci < 4) ctx.lineTo(bx + ((ci + 0.5) / 4) * bw, cy - r * 0.16);
      }
      ctx.lineTo(bx + bw, cy + r * 0.42); ctx.closePath(); break;
    case 'idol':
      // rounded body + head, generous box
      GF.rr(ctx, cx - r * 0.46, cy - r * 0.12, r * 0.92, r * 1.0, r * 0.18);
      ctx.moveTo(cx + r * 0.34, cy - r * 0.34); ctx.arc(cx, cy - r * 0.34, r * 0.34, 0, Math.PI * 2); break;
    default:
      // thin / compound shapes (spoon, key, hilt): no single faithful path — the
      // mask (insideRelic) already constrains grime; fall back to a loose circle.
      ctx.arc(cx, cy, r * 0.8, 0, Math.PI * 2); break;
  }
}

// Draw the full relic (clean base + shine), prog 0..1 governs overall polish.
var _shineProg = 1;   // read by shadeFill so the DULL state is flat/dark and the
                      // SHINE state is glossy — gives the before/after real punch.
function drawRelicShape(ctx, box, rel, prog, gemOn) {
  var cx = box.cx, cy = box.cy, r = box.r;
  _shineProg = prog;
  // base color blends dull→clean→shine with prog
  var col = prog < 0.5 ? lerpHex(rel.dull, rel.clean, prog / 0.5) : lerpHex(rel.clean, rel.shine, (prog - 0.5) / 0.5);
  ctx.save();
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  var fn = SHAPE_FN[rel.shape] || SHAPE_FN.coin;
  fn(ctx, cx, cy, r, col, rel, prog, gemOn);
  // shine sweep when polished — only for shapes we can faithfully clip, so the
  // moving gleam never shows outside a thin/compound relic (Codex review).
  if (prog > 0.6 && hasShapePath(rel.shape)) {
    ctx.save();
    shapePath(ctx, box, rel.shape); ctx.clip();
    var t = (performance.now() / 1400) % 1;
    var gx = cx - r + t * r * 2.4;
    var sg = ctx.createLinearGradient(gx - r * 0.3, cy - r, gx + r * 0.3, cy + r);
    sg.addColorStop(0, 'rgba(255,255,255,0)');
    sg.addColorStop(0.5, 'rgba(255,255,255,' + (0.35 * (prog - 0.6) / 0.4) + ')');
    sg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = sg; ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
    ctx.restore();
  }
  ctx.restore();
}

function shadeFill(ctx, cx, cy, r, col) {
  // highlight intensity ramps with polish: dull = matte/flat, shine = glossy.
  var hi = 0.06 + _shineProg * 0.42;        // 0.06 (dull) → 0.48 (mirror)
  var lo = 0.5 - _shineProg * 0.14;         // deeper shadow when dull
  var g = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
  g.addColorStop(0, lerpHex(col, '#ffffff', hi));
  g.addColorStop(0.55, col);
  g.addColorStop(1, lerpHex(col, '#000000', lo));
  ctx.fillStyle = g;
}

var SHAPE_FN = {
  coin: function (ctx, cx, cy, r, col) {
    shadeFill(ctx, cx, cy, r * 0.64, col);
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.64, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = r * 0.05; ctx.stroke();
    // inner emboss ring + star
    ctx.strokeStyle = lerpHex(col, '#000', 0.25); ctx.lineWidth = r * 0.03;
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2); ctx.stroke();
    star(ctx, cx, cy, r * 0.26, r * 0.12, lerpHex(col, '#000', 0.15));
  },
  medal: function (ctx, cx, cy, r, col) {
    // ribbon
    ctx.fillStyle = '#7a3a4a';
    ctx.beginPath(); ctx.moveTo(cx - r * 0.3, cy - r * 0.7); ctx.lineTo(cx + r * 0.3, cy - r * 0.7);
    ctx.lineTo(cx + r * 0.18, cy - r * 0.2); ctx.lineTo(cx - r * 0.18, cy - r * 0.2); ctx.closePath(); ctx.fill();
    shadeFill(ctx, cx, cy + r * 0.12, r * 0.5, col);
    ctx.beginPath(); ctx.arc(cx, cy + r * 0.12, r * 0.5, 0, Math.PI * 2); ctx.fill();
    star(ctx, cx, cy + r * 0.12, r * 0.3, r * 0.14, lerpHex(col, '#fff', 0.3));
  },
  ring: function (ctx, cx, cy, r, col, rel, prog, gemOn) {
    shadeFill(ctx, cx, cy, r, col);
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.7, 0, Math.PI * 2); ctx.arc(cx, cy, r * 0.44, 0, Math.PI * 2, true);
    ctx.fill('evenodd');
    // gem on top
    ctx.fillStyle = gemOn ? '#7ad8ff' : lerpHex(col, '#000', 0.2);
    ctx.beginPath(); ctx.arc(cx, cy - r * 0.62, r * 0.16, 0, Math.PI * 2); ctx.fill();
    if (gemOn) { ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(cx - r * 0.05, cy - r * 0.66, r * 0.05, 0, Math.PI * 2); ctx.fill(); }
  },
  spoon: function (ctx, cx, cy, r, col) {
    shadeFill(ctx, cx, cy, r, col);
    // bowl
    ctx.beginPath(); ctx.ellipse(cx, cy + r * 0.18, r * 0.28, r * 0.36, 0, 0, Math.PI * 2); ctx.fill();
    // handle
    ctx.fillStyle = ctx.fillStyle;
    rrFill(ctx, cx - r * 0.07, cy - r * 0.46, r * 0.14, r * 0.6, r * 0.07);
  },
  key: function (ctx, cx, cy, r, col) {
    shadeFill(ctx, cx, cy, r, col);
    // head ring
    ctx.beginPath(); ctx.arc(cx, cy - r * 0.42, r * 0.22, 0, Math.PI * 2); ctx.fill();
    ctx.save(); ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath(); ctx.arc(cx, cy - r * 0.42, r * 0.10, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    shadeFill(ctx, cx, cy, r, col);
    rrFill(ctx, cx - r * 0.06, cy - r * 0.2, r * 0.12, r * 0.62, r * 0.04);
    // teeth
    ctx.fillRect(cx, cy + r * 0.28, r * 0.18, r * 0.07);
    ctx.fillRect(cx, cy + r * 0.4, r * 0.12, r * 0.07);
  },
  watch: function (ctx, cx, cy, r, col, rel, prog, gemOn) {
    // crown stem
    ctx.fillStyle = lerpHex(col, '#000', 0.1);
    ctx.fillRect(cx - r * 0.06, cy - r * 0.92, r * 0.12, r * 0.18);
    shadeFill(ctx, cx, cy, r * 0.8, col);
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.8, 0, Math.PI * 2); ctx.fill();
    // face
    ctx.fillStyle = prog > 0.5 ? '#f4ead0' : '#9a8f78';
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.62, 0, Math.PI * 2); ctx.fill();
    // ticks + hands
    ctx.strokeStyle = '#3a2e1e'; ctx.lineWidth = r * 0.03;
    for (var i = 0; i < 12; i++) { var a = i / 12 * Math.PI * 2; ctx.beginPath(); ctx.moveTo(cx + Math.cos(a) * r * 0.55, cy + Math.sin(a) * r * 0.55); ctx.lineTo(cx + Math.cos(a) * r * 0.48, cy + Math.sin(a) * r * 0.48); ctx.stroke(); }
    ctx.lineWidth = r * 0.045; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - r * 0.4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + r * 0.3, cy); ctx.stroke();
    if (gemOn) { ctx.fillStyle = '#7ad8ff'; ctx.beginPath(); ctx.arc(cx, cy, r * 0.07, 0, Math.PI * 2); ctx.fill(); }
  },
  vase: function (ctx, cx, cy, r, col) {
    shadeFill(ctx, cx, cy, r, col);
    ctx.beginPath();
    for (var t = 0; t <= 1.001; t += 0.06) {
      var w = (0.10 + 0.30 * Math.sin((t * 0.86 + 0.10) * Math.PI)) * r * 2;
      var yy = cy - r * 0.88 + t * r * 1.76;
      if (t === 0) ctx.moveTo(cx + w / 2, yy); else ctx.lineTo(cx + w / 2, yy);
    }
    for (var t2 = 1; t2 >= -0.001; t2 -= 0.06) {
      var w2 = (0.10 + 0.30 * Math.sin((t2 * 0.86 + 0.10) * Math.PI)) * r * 2;
      var yy2 = cy - r * 0.88 + t2 * r * 1.76;
      ctx.lineTo(cx - w2 / 2, yy2);
    }
    ctx.closePath(); ctx.fill();
    // decorative band
    ctx.strokeStyle = lerpHex(col, '#000', 0.3); ctx.lineWidth = r * 0.05;
    ctx.beginPath(); ctx.moveTo(cx - r * 0.34, cy); ctx.lineTo(cx + r * 0.34, cy); ctx.stroke();
  },
  goblet: function (ctx, cx, cy, r, col) {
    shadeFill(ctx, cx, cy, r, col);
    // cup
    ctx.beginPath(); ctx.moveTo(cx - r * 0.55, cy - r * 0.78);
    ctx.lineTo(cx + r * 0.55, cy - r * 0.78);
    ctx.quadraticCurveTo(cx + r * 0.42, cy - r * 0.1, cx + r * 0.08, cy - r * 0.05);
    ctx.lineTo(cx - r * 0.08, cy - r * 0.05);
    ctx.quadraticCurveTo(cx - r * 0.42, cy - r * 0.1, cx - r * 0.55, cy - r * 0.78); ctx.closePath(); ctx.fill();
    // stem
    ctx.fillRect(cx - r * 0.08, cy - r * 0.05, r * 0.16, r * 0.5);
    // base
    ctx.beginPath(); ctx.ellipse(cx, cy + r * 0.5, r * 0.42, r * 0.12, 0, 0, Math.PI * 2); ctx.fill();
  },
  crown: function (ctx, cx, cy, r, col, rel, prog, gemOn) {
    shadeFill(ctx, cx, cy, r, col);
    var bx = cx - r * 0.7, bw = r * 1.4;
    ctx.beginPath();
    ctx.moveTo(bx, cy + r * 0.4);
    ctx.lineTo(bx, cy - r * 0.1);
    var pts = 4;
    for (var i = 0; i <= pts; i++) {
      var px = bx + (i / pts) * bw;
      ctx.lineTo(px, cy - r * 0.55);   // up to point
      if (i < pts) ctx.lineTo(bx + ((i + 0.5) / pts) * bw, cy - r * 0.15); // valley
    }
    ctx.lineTo(bx + bw, cy + r * 0.4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = lerpHex(col, '#000', 0.15);
    ctx.fillRect(bx, cy + r * 0.1, bw, r * 0.3);
    // gems on points
    var gc = gemOn ? ['#ff6a8a', '#7ad8ff', '#9aff8a'] : [lerpHex(col, '#000', 0.2), lerpHex(col, '#000', 0.2), lerpHex(col, '#000', 0.2)];
    for (var j = 0; j < pts; j++) { ctx.fillStyle = gc[j % gc.length]; ctx.beginPath(); ctx.arc(bx + ((j + 0.5) / pts) * bw, cy - r * 0.2, r * 0.07, 0, Math.PI * 2); ctx.fill(); }
  },
  gem: function (ctx, cx, cy, r, col, rel, prog, gemOn) {
    shadeFill(ctx, cx, cy, r, col);
    ctx.beginPath();
    ctx.moveTo(cx, cy - r * 0.82); ctx.lineTo(cx + r * 0.74, cy - r * 0.1);
    ctx.lineTo(cx + r * 0.44, cy + r * 0.78); ctx.lineTo(cx - r * 0.44, cy + r * 0.78);
    ctx.lineTo(cx - r * 0.74, cy - r * 0.1); ctx.closePath(); ctx.fill();
    // facets
    ctx.strokeStyle = lerpHex(col, '#fff', 0.4); ctx.lineWidth = r * 0.025;
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.74, cy - r * 0.1); ctx.lineTo(cx + r * 0.74, cy - r * 0.1);
    ctx.moveTo(cx, cy - r * 0.82); ctx.lineTo(cx - r * 0.3, cy - r * 0.1); ctx.lineTo(cx - r * 0.44, cy + r * 0.78);
    ctx.moveTo(cx, cy - r * 0.82); ctx.lineTo(cx + r * 0.3, cy - r * 0.1); ctx.lineTo(cx + r * 0.44, cy + r * 0.78);
    ctx.moveTo(cx - r * 0.3, cy - r * 0.1); ctx.lineTo(cx, cy + r * 0.78); ctx.lineTo(cx + r * 0.3, cy - r * 0.1);
    ctx.stroke();
    if (prog > 0.6) { ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(cx - r * 0.2, cy - r * 0.2, r * 0.08, 0, Math.PI * 2); ctx.fill(); }
  },
  amulet: function (ctx, cx, cy, r, col, rel, prog, gemOn) {
    // chain
    ctx.strokeStyle = lerpHex(col, '#000', 0.1); ctx.lineWidth = r * 0.05;
    ctx.beginPath(); ctx.arc(cx, cy - r * 0.1, r * 0.62, Math.PI * 1.2, Math.PI * 1.8); ctx.stroke();
    shadeFill(ctx, cx, cy + r * 0.1, r * 0.6, col);
    ctx.beginPath(); ctx.arc(cx, cy + r * 0.12, r * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = gemOn ? '#7ad89a' : lerpHex(col, '#000', 0.25);
    ctx.beginPath(); ctx.arc(cx, cy + r * 0.12, r * 0.24, 0, Math.PI * 2); ctx.fill();
    if (gemOn) { ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.beginPath(); ctx.arc(cx - r * 0.08, cy + r * 0.04, r * 0.07, 0, Math.PI * 2); ctx.fill(); }
  },
  idol: function (ctx, cx, cy, r, col) {
    shadeFill(ctx, cx, cy, r, col);
    // body
    rrFill(ctx, cx - r * 0.42, cy - r * 0.1, r * 0.84, r * 0.95, r * 0.16);
    // head
    ctx.beginPath(); ctx.arc(cx, cy - r * 0.34, r * 0.3, 0, Math.PI * 2); ctx.fill();
    // carved eyes
    ctx.fillStyle = lerpHex(col, '#000', 0.5);
    ctx.beginPath(); ctx.arc(cx - r * 0.1, cy - r * 0.36, r * 0.05, 0, Math.PI * 2); ctx.arc(cx + r * 0.1, cy - r * 0.36, r * 0.05, 0, Math.PI * 2); ctx.fill();
    ctx.fillRect(cx - r * 0.2, cy + r * 0.2, r * 0.4, r * 0.04);
    ctx.fillRect(cx - r * 0.2, cy + r * 0.4, r * 0.4, r * 0.04);
  },
  hilt: function (ctx, cx, cy, r, col) {
    shadeFill(ctx, cx, cy, r, col);
    // grip
    rrFill(ctx, cx - r * 0.1, cy - r * 0.15, r * 0.2, r * 0.7, r * 0.08);
    // guard
    rrFill(ctx, cx - r * 0.55, cy - r * 0.2, r * 1.1, r * 0.16, r * 0.07);
    // pommel
    ctx.beginPath(); ctx.arc(cx, cy + r * 0.62, r * 0.16, 0, Math.PI * 2); ctx.fill();
    // blade stub (top)
    ctx.fillStyle = lerpHex(col, '#cfd6e0', 0.6);
    ctx.beginPath(); ctx.moveTo(cx - r * 0.08, cy - r * 0.2); ctx.lineTo(cx + r * 0.08, cy - r * 0.2); ctx.lineTo(cx + r * 0.04, cy - r * 0.62); ctx.lineTo(cx - r * 0.04, cy - r * 0.62); ctx.closePath(); ctx.fill();
  },
};

function star(ctx, cx, cy, ro, ri, col) {
  ctx.fillStyle = col; ctx.beginPath();
  for (var i = 0; i < 10; i++) {
    var a = -Math.PI / 2 + i * Math.PI / 5;
    var rr = (i % 2 === 0) ? ro : ri;
    var x = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath(); ctx.fill();
}
function rrFill(ctx, x, y, w, h, r) { GF.rr(ctx, x, y, w, h, r); ctx.fill(); }

// ── HUD ──────────────────────────────────────────────────────────────────
function drawTopBar(ctx) {
  var W = GF.W, S = GF.S, th = L.topH;
  ctx.fillStyle = 'rgba(12,10,18,0.6)'; ctx.fillRect(0, 0, W, th);
  // coins (left) with vector coin icon
  var iy = th / 2 + 2 * S;
  drawCoinIcon(ctx, 20 * S, iy, 11 * S);
  ctx.fillStyle = '#ffe27a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(17 * S, 13, 23) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(coins, 36 * S, iy);
  // relic name + tier (center)
  if (relic) {
    ctx.fillStyle = '#eee'; ctx.textAlign = 'center';
    ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
    var nm = (GF.lang === 'ru' ? relic.nameRu : relic.nameEn);
    ctx.fillText(nm, W / 2, iy - 6 * S);
    ctx.fillStyle = '#9a8fb0'; ctx.font = GF.clamp(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';
    ctx.fillText((relicIdx + 1) + ' / ' + NUM_RELICS, W / 2, iy + 9 * S);
  }
}

function drawStageBar(ctx) {
  var S = GF.S;
  // overall stage dots
  var n = stageList.length, dotR = GF.clamp(5 * S, 4, 8);
  var gap = GF.clamp(20 * S, 14, 28);
  var totalW = (n - 1) * gap;
  var sx = GF.W / 2 - totalW / 2;
  var dotY = L.barY - GF.clamp(20 * S, 14, 28);
  for (var i = 0; i < n; i++) {
    var x = sx + i * gap;
    ctx.beginPath(); ctx.arc(x, dotY, dotR, 0, Math.PI * 2);
    ctx.fillStyle = i < stageI ? '#3fd07a' : i === stageI ? '#ffe27a' : 'rgba(255,255,255,0.22)';
    ctx.fill();
  }
  // current-stage coverage bar
  var frac = stageList[stageI] === 'gem' ? (gemSet ? 1 : 0) : coverage;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  GF.rr(ctx, L.barX, L.barY, L.barW, L.barH, L.barH / 2); ctx.fill();
  var fg = ctx.createLinearGradient(L.barX, 0, L.barX + L.barW, 0);
  fg.addColorStop(0, '#3fd07a'); fg.addColorStop(1, '#7af0a0');
  ctx.fillStyle = fg;
  GF.rr(ctx, L.barX, L.barY, Math.max(L.barH, L.barW * frac), L.barH, L.barH / 2); ctx.fill();
  // label
  ctx.fillStyle = '#cfc'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(Math.round(frac * 100) + '%', GF.W / 2, L.barY - 2 * S);
}

function drawComboMeter(ctx) {
  if (combo <= 1.05) return;
  var S = GF.S;
  var x = GF.W / 2, y = L.barY + L.barH + GF.clamp(20 * S, 14, 30);
  ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var sz = GF.clamp(15 * S, 12, 22) * (1 + (combo - 1) / COMBO_MAX * 0.4);
  ctx.font = 'bold ' + sz + 'px Inter, system-ui, sans-serif';
  ctx.save(); ctx.shadowColor = 'rgba(255,210,74,0.6)'; ctx.shadowBlur = 8 * S;
  ctx.fillText(GF.t('combo') + ' x' + combo.toFixed(1), x, y);
  ctx.restore();
}

function drawToolbar(ctx) {
  var S = GF.S, W = GF.W;
  toolRects = [];
  var n = stageList.length;
  var maxBtn = Math.min(n, 6);
  var bw = Math.min((W - 24 * S) / maxBtn, 86 * S);
  var totalW = bw * n + (n - 1) * 8 * S;
  if (totalW > W - 16 * S) { bw = (W - 16 * S - (n - 1) * 6 * S) / n; totalW = bw * n + (n - 1) * 6 * S; }
  var gap = (n > 1 && totalW > W - 16 * S) ? 6 * S : 8 * S;
  totalW = bw * n + (n - 1) * gap;
  var sx = (W - totalW) / 2;
  for (var i = 0; i < n; i++) {
    var x = sx + i * (bw + gap);
    var r = { x: x, y: L.toolY, w: bw, h: L.toolH, idx: i };
    toolRects.push(r);
    var active = i === stageI;
    var done = i < stageI;
    ctx.save();
    GF.rr(ctx, x, L.toolY, bw, L.toolH, 12 * S);
    ctx.fillStyle = active ? 'rgba(63,208,122,0.22)' : done ? 'rgba(63,208,122,0.10)' : 'rgba(255,255,255,0.06)';
    ctx.fill();
    ctx.lineWidth = 2 * S;
    ctx.strokeStyle = active ? '#3fd07a' : 'rgba(255,255,255,0.12)';
    ctx.stroke();
    // tool icon
    drawToolIcon(ctx, stageList[i], x + bw / 2, L.toolY + L.toolH * 0.38, bw * 0.22, active, done);
    // label
    ctx.fillStyle = active ? '#cfeedd' : done ? '#8fcfa8' : '#9a93ab';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(11 * S, 8, 14) + 'px Inter, system-ui, sans-serif';
    var lbl = GF.t(STAGES[stageList[i]].key);
    // shrink to fit
    var fs = GF.clamp(11 * S, 8, 14);
    while (ctx.measureText(lbl).width > bw - 6 * S && fs > 7) { fs--; ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif'; }
    ctx.fillText(lbl, x + bw / 2, L.toolY + L.toolH * 0.78);
    ctx.restore();
  }
}

function drawToolIcon(ctx, key, cx, cy, r, active, done) {
  ctx.save();
  var col = active ? '#7af0a0' : done ? '#6abb88' : '#b8b0c8';
  ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = Math.max(1.6, r * 0.18);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  if (key === 'brush') {
    // brush: handle + bristles
    ctx.beginPath(); ctx.moveTo(cx - r * 0.7, cy - r * 0.7); ctx.lineTo(cx + r * 0.1, cy + r * 0.1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + r * 0.1, cy + r * 0.1);
    ctx.lineTo(cx + r * 0.7, cy + r * 0.3); ctx.lineTo(cx + r * 0.3, cy + r * 0.7); ctx.closePath(); ctx.fill();
  } else if (key === 'scrub') {
    // sponge: rounded square + bubbles
    GF.rr(ctx, cx - r * 0.7, cy - r * 0.5, r * 1.4, r * 1.0, r * 0.25); ctx.fill();
    ctx.fillStyle = active ? '#1a2a20' : '#2a2436';
    ctx.beginPath(); ctx.arc(cx - r * 0.25, cy - r * 0.05, r * 0.14, 0, Math.PI * 2); ctx.arc(cx + r * 0.3, cy + r * 0.1, r * 0.12, 0, Math.PI * 2); ctx.fill();
  } else if (key === 'rust' || key === 'purify') {
    // wire brush / scraper: a flat head with prongs
    ctx.beginPath(); ctx.moveTo(cx - r * 0.6, cy - r * 0.6); ctx.lineTo(cx + r * 0.2, cy + r * 0.2); ctx.stroke();
    ctx.beginPath(); GF.rr(ctx, cx + r * 0.1, cy + r * 0.1, r * 0.7, r * 0.5, r * 0.1); ctx.fill();
    ctx.strokeStyle = active ? '#1a2a20' : '#2a2436';
    for (var i = 0; i < 3; i++) { var px = cx + r * 0.25 + i * r * 0.2; ctx.beginPath(); ctx.moveTo(px, cy + r * 0.6); ctx.lineTo(px, cy + r * 0.85); ctx.stroke(); }
  } else if (key === 'polish') {
    // polish cloth: circle + sparkle
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = active ? '#fffbe0' : '#e8e2f0';
    spark4(ctx, cx + r * 0.5, cy - r * 0.5, r * 0.4);
  } else if (key === 'gem') {
    // gem diamond
    ctx.beginPath(); ctx.moveTo(cx, cy - r * 0.7); ctx.lineTo(cx + r * 0.6, cy); ctx.lineTo(cx, cy + r * 0.7); ctx.lineTo(cx - r * 0.6, cy); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function spark4(ctx, cx, cy, r) {
  ctx.beginPath();
  ctx.moveTo(cx, cy - r); ctx.quadraticCurveTo(cx, cy, cx + r, cy);
  ctx.quadraticCurveTo(cx, cy, cx, cy + r); ctx.quadraticCurveTo(cx, cy, cx - r, cy);
  ctx.quadraticCurveTo(cx, cy, cx, cy - r); ctx.fill();
}

function drawCoinIcon(ctx, cx, cy, r) {
  ctx.save();
  var g = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
  g.addColorStop(0, '#ffe9a0'); g.addColorStop(1, '#d8a02a');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#b8821a'; ctx.lineWidth = Math.max(1, r * 0.12); ctx.stroke();
  ctx.fillStyle = '#b8821a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + (r * 1.1) + 'px serif'; ctx.fillText('$', cx, cy + r * 0.08);
  ctx.restore();
}

function drawHelp(ctx) {
  var b = helpBtn, S = GF.S;
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.arc(b.x + b.w / 2, b.y + b.h / 2, b.w / 2, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  ctx.fillStyle = '#cfc8dd'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + (b.w * 0.5) + 'px Inter, system-ui, sans-serif';
  ctx.fillText('?', b.x + b.w / 2, b.y + b.h / 2 + 1 * S);
  ctx.restore();
}

function drawMute(ctx) {
  var b = muteBtn; if (!b.w) return;
  GF.drawMuteIcon(ctx, b.x + b.w / 2, b.y + b.h / 2, b.w * 0.42, GF.muted);
}

function drawHint(ctx) {
  var S = GF.S, a = Math.min(1, hintT * 2);
  ctx.save(); ctx.globalAlpha = a;
  ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
  var w = ctx.measureText(hintMsg).width + 32 * S, h = GF.clamp(38 * S, 30, 50);
  var x = GF.W / 2 - w / 2, y = GF.H * 0.5;
  ctx.fillStyle = 'rgba(20,16,28,0.92)'; GF.rr(ctx, x, y, w, h, h / 2); ctx.fill();
  ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(hintMsg, GF.W / 2, y + h / 2);
  ctx.restore();
}

// ── APPRAISE / REVEAL OVERLAYS ──────────────────────────────────────────────
function drawAppraise(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  // near-opaque panel (no gameplay grime behind it)
  ctx.fillStyle = 'rgba(9,7,15,0.95)'; ctx.fillRect(0, 0, W, H);

  // 1) hero: the freshly restored relic, spotlit + gently bobbing
  var hb = { cx: W / 2, cy: H * 0.27, r: Math.min(W * 0.32, H * 0.16), size: 0 };
  hb.size = hb.r * 2;
  // warm spotlight
  var sg = ctx.createRadialGradient(hb.cx, hb.cy, 0, hb.cx, hb.cy, hb.r * 2.4);
  sg.addColorStop(0, 'rgba(255,225,140,0.22)'); sg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sg; ctx.fillRect(hb.cx - hb.r * 2.4, hb.cy - hb.r * 2.4, hb.r * 4.8, hb.r * 4.8);
  var bob = Math.sin(performance.now() / 700) * 3 * S;
  var hbb = { cx: hb.cx, cy: hb.cy + bob, r: hb.r, size: hb.size };
  drawRelicShape(ctx, hbb, relic, 1, gemNeeded);
  // sparkle motes around the hero (driven by particle system already; add subtle static glints)
  for (var g = 0; g < 3; g++) {
    var ga = performance.now() / 900 + g * 2.1;
    var gx = hb.cx + Math.cos(ga) * hb.r * 1.15, gy = hb.cy + Math.sin(ga * 1.3) * hb.r * 0.9;
    star(ctx, gx, gy, 4 * S, 1.6 * S, 'rgba(255,250,210,0.9)');
  }

  var cy = H * 0.50;
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(24 * S, 18, 36) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('appraised'), W / 2, cy - 34 * S);

  // 2) stars reveal one-by-one over the first ~0.9s
  var sR = GF.clamp(22 * S, 16, 32), sgap = sR * 2.7;
  for (var i = 0; i < 3; i++) {
    var on = i < appraiseStars;
    var revT = appraiseT - 0.18 - i * 0.22;          // each star pops in sequence
    var shown = revT > 0;
    var pop = shown ? (1 + 0.6 * Math.max(0, 1 - revT * 4)) : 0.0001;
    if (on && shown && revT < 0.06) { /* pop frame */ }
    var col = on ? (shown ? '#ffd24a' : 'rgba(255,255,255,0.10)') : 'rgba(255,255,255,0.12)';
    star(ctx, W / 2 + (i - 1) * sgap, cy + 8 * S, sR * (on ? pop : 1), sR * 0.45 * (on ? pop : 1), col);
  }
  // rating word (after stars)
  if (appraiseT > 0.7) {
    ctx.fillStyle = appraiseStars >= 3 ? '#ffe27a' : '#bfb6d0';
    ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
    var word = appraiseStars >= 3 ? GF.t('perfect') : appraiseStars === 2 ? GF.t('star_mid') : GF.t('star_lo');
    ctx.fillText(word, W / 2, cy + 48 * S);
  }

  // 3) coins count up
  var bp = 1 + bigPop * 0.4;
  var shownCoins = Math.min(appraiseCoins, Math.round(appraiseCoins * GF.clamp((appraiseT - 0.5) / 0.7, 0, 1)));
  drawCoinIcon(ctx, W / 2 - 58 * S, cy + 98 * S, 17 * S * bp);
  ctx.fillStyle = '#ffe27a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.save(); ctx.shadowColor = 'rgba(255,210,74,0.6)'; ctx.shadowBlur = 14 * S;
  ctx.font = 'bold ' + (GF.clamp(38 * S, 28, 56) * bp) + 'px Inter, system-ui, sans-serif';
  ctx.fillText('+' + shownCoins, W / 2 - 34 * S, cy + 98 * S);
  ctx.restore();

  // 4) newly unlocked relic banner
  if (newUnlock >= 0 && appraiseT > 1.0) {
    ctx.fillStyle = '#7af0a0'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
    var un = (GF.lang === 'ru' ? RELICS[newUnlock].nameRu : RELICS[newUnlock].nameEn);
    var pre = (GF.lang === 'ru' ? 'Открыто: ' : 'Unlocked: ');
    var full = pre + un;
    var unW = ctx.measureText(full).width;
    ctx.fillText(full, W / 2, cy + 146 * S);
    star(ctx, W / 2 - unW / 2 - 14 * S, cy + 146 * S, 6 * S, 2.6 * S, '#7af0a0');
    star(ctx, W / 2 + unW / 2 + 14 * S, cy + 146 * S, 6 * S, 2.6 * S, '#7af0a0');
  }
  // CTA
  drawBigButton(ctx, L.bigBtn, GF.t('next'), appraiseT >= 0.5);
}

function drawReveal(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(9,7,15,0.95)'; ctx.fillRect(0, 0, W, H);
  // title
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(22 * S, 17, 32) + 'px Inter, system-ui, sans-serif';
  ctx.fillText((GF.lang === 'ru' ? RELICS[relicIdx].nameRu : RELICS[relicIdx].nameEn), W / 2, H * 0.13);
  // before/after of the relic, split by revealSlide
  var box = { cx: W / 2, cy: H * 0.36, r: Math.min(W * 0.30, H * 0.18), size: 0 };
  box.size = box.r * 2;
  // draw dull (before) on whole, then clip-right to shiny (after)
  ctx.save();
  drawRelicShape(ctx, box, relic, 0.0, false);  // before (dull)
  // grime wash over the dull side so "before" looks genuinely filthy
  if (hasShapePath(relic.shape)) { shapePath(ctx, box, relic.shape); ctx.clip(); }
  var gw = ctx.createRadialGradient(box.cx, box.cy, box.r * 0.1, box.cx, box.cy, box.r);
  gw.addColorStop(0, 'rgba(40,30,16,0.55)'); gw.addColorStop(1, 'rgba(20,14,8,0.78)');
  ctx.fillStyle = gw; ctx.fillRect(box.cx - box.r, box.cy - box.r, box.size, box.size);
  ctx.restore();
  ctx.save();
  var splitX = box.cx - box.r + revealSlide * box.r * 2;
  ctx.beginPath(); ctx.rect(splitX, box.cy - box.r - 4 * S, box.cx + box.r - splitX + 8 * S, box.size + 8 * S); ctx.clip();
  drawRelicShape(ctx, box, relic, 1.0, gemNeeded);  // after (shiny) — paints over the wash
  ctx.restore();
  // divider line + handle
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2 * S;
  ctx.beginPath(); ctx.moveTo(splitX, box.cy - box.r - 4 * S); ctx.lineTo(splitX, box.cy + box.r + 4 * S); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(splitX, box.cy, 7 * S, 0, Math.PI * 2); ctx.fill();
  // labels
  ctx.fillStyle = '#9a93ab'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('before'), box.cx - box.r * 0.55, box.cy - box.r - 16 * S);
  ctx.fillStyle = '#ffe27a';
  ctx.fillText(GF.t('after'), box.cx + box.r * 0.55, box.cy - box.r - 16 * S);
  // shop + next buttons
  drawBigButton(ctx, shopBtn, GF.t('tools') + '  (' + coins + ')', true, true);
  drawBigButton(ctx, L.bigBtn, GF.t('next'), true);
}

function drawShop(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(10,8,16,0.92)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(24 * S, 18, 36) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('tools'), W / 2, H * 0.12);
  // coins
  drawCoinIcon(ctx, W / 2 - 34 * S, H * 0.18, 12 * S);
  ctx.fillStyle = '#ffe27a'; ctx.textAlign = 'left'; ctx.font = 'bold ' + GF.clamp(17 * S, 13, 23) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(coins, W / 2 - 16 * S, H * 0.18);
  shopRects = [];
  var ups = [
    { up: 'w', lvl: upWidth, name: GF.t('up_width'), desc: GF.t('up_width_d') },
    { up: 's', lvl: upSpeed, name: GF.t('up_speed'), desc: GF.t('up_speed_d') },
    { up: 'h', lvl: upShine, name: GF.t('up_shine'), desc: GF.t('up_shine_d') },
  ];
  var cardW = Math.min(W - 40 * S, 420 * S), cardH = GF.clamp(74 * S, 60, 100);
  var startY = H * 0.26;
  for (var i = 0; i < ups.length; i++) {
    var u = ups[i];
    var x = (W - cardW) / 2, y = startY + i * (cardH + 14 * S);
    var maxed = u.lvl >= 3;
    var cost = maxed ? 0 : UPGRADE_COST[u.lvl];
    ctx.save();
    GF.rr(ctx, x, y, cardW, cardH, 14 * S);
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
    // name + desc
    ctx.fillStyle = '#eee'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
    ctx.fillText(u.name, x + 16 * S, y + 12 * S);
    ctx.fillStyle = '#9a93ab'; ctx.font = GF.clamp(11 * S, 9, 15) + 'px Inter, system-ui, sans-serif';
    ctx.fillText(u.desc, x + 16 * S, y + 34 * S);
    // level pips
    for (var p = 0; p < 3; p++) {
      ctx.fillStyle = p < u.lvl ? '#3fd07a' : 'rgba(255,255,255,0.18)';
      ctx.beginPath(); ctx.arc(x + 18 * S + p * 14 * S, y + cardH - 16 * S, 4 * S, 0, Math.PI * 2); ctx.fill();
    }
    // buy button
    var bw = GF.clamp(96 * S, 70, 130), bh = GF.clamp(40 * S, 32, 54);
    var bx = x + cardW - bw - 14 * S, by = y + (cardH - bh) / 2;
    GF.rr(ctx, bx, by, bw, bh, bh / 2);
    var afford = !maxed && coins >= cost;
    ctx.fillStyle = maxed ? 'rgba(63,208,122,0.25)' : afford ? '#3fd07a' : 'rgba(255,255,255,0.10)';
    ctx.fill();
    ctx.fillStyle = maxed ? '#7af0a0' : afford ? '#0a1810' : '#7a7390';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px Inter, system-ui, sans-serif';
    ctx.fillText(maxed ? GF.t('mastered') : (GF.t('equip') + ' ' + cost), bx + bw / 2, by + bh / 2);
    ctx.restore();
    shopRects.push({ x: x, y: y, w: cardW, h: cardH, kind: 'up', up: u.up });
  }
  // back button
  drawBigButton(ctx, L.bigBtn, GF.t('back'), true);
}

function drawBigButton(ctx, b, label, enabled, secondary) {
  if (!b || !b.w) return;
  var S = GF.S;
  ctx.save();
  var pulse = enabled ? (1 + 0.02 * Math.sin(performance.now() / 350)) : 1;
  var w = b.w * pulse, h = b.h * pulse, x = b.x + b.w / 2 - w / 2, y = b.y + b.h / 2 - h / 2;
  GF.rr(ctx, x, y, w, h, h / 2);
  if (secondary) {
    ctx.fillStyle = 'rgba(255,255,255,0.10)'; ctx.fill();
    ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 2 * S; ctx.stroke();
    ctx.fillStyle = '#ffd24a';
  } else if (enabled) {
    var g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, '#3fe07a'); g.addColorStop(1, '#23a657');
    ctx.shadowColor = 'rgba(63,224,122,0.4)'; ctx.shadowBlur = 16 * S;
    ctx.fillStyle = g; ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = '#08220f';
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();
    ctx.fillStyle = '#6a6480';
  }
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(18 * S, 14, 26) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(label, b.x + b.w / 2, b.y + b.h / 2);
  ctx.restore();
}

// ── MENU (gallery landing: collection grid + PLAY) ──────────────────────────
function drawMenu(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  drawBackground(ctx);
  shopRects = [];
  // title
  ctx.save();
  ctx.shadowColor = 'rgba(255,210,74,0.4)'; ctx.shadowBlur = 24 * S;
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(34 * S, 24, 50) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('title'), W / 2, H * 0.10);
  ctx.restore();
  ctx.fillStyle = '#bfb6d0'; ctx.font = GF.clamp(13 * S, 11, 18) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('sub'), W / 2, H * 0.10 + 28 * S);
  // coins + best
  drawCoinIcon(ctx, W / 2 - 70 * S, H * 0.10 + 56 * S, 11 * S);
  ctx.fillStyle = '#ffe27a'; ctx.textAlign = 'left'; ctx.font = 'bold ' + GF.clamp(14 * S, 11, 19) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(coins + '', W / 2 - 54 * S, H * 0.10 + 56 * S);
  ctx.fillStyle = '#9a93ab'; ctx.textAlign = 'left';
  ctx.font = GF.clamp(12 * S, 10, 16) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('best') + ': ' + best, W / 2 + 14 * S, H * 0.10 + 56 * S);

  // collection grid (tap an unlocked relic to start it)
  var cols = 3;
  var gridY = H * 0.22, gridW = Math.min(W - 28 * S, 440 * S);
  var cell = (gridW - (cols - 1) * 10 * S) / cols;
  var gx0 = (W - gridW) / 2;
  var rows = Math.ceil(NUM_RELICS / cols);
  var maxRows = Math.floor((H * 0.62 - gridY) / (cell + 10 * S));
  rows = Math.min(rows, Math.max(3, maxRows));
  for (var i = 0; i < NUM_RELICS; i++) {
    var cc = i % cols, rr = (i / cols) | 0;
    if (rr >= rows) break;
    var x = gx0 + cc * (cell + 10 * S), y = gridY + rr * (cell + 10 * S);
    var unlocked = i <= unlockedMax;
    ctx.save();
    GF.rr(ctx, x, y, cell, cell, 12 * S);
    ctx.fillStyle = unlocked ? 'rgba(255,255,255,0.07)' : 'rgba(255,255,255,0.03)';
    ctx.fill();
    ctx.strokeStyle = unlocked ? 'rgba(255,210,74,0.4)' : 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
    if (unlocked) {
      // mini relic icon (shiny)
      var mb = { cx: x + cell / 2, cy: y + cell * 0.42, r: cell * 0.30, size: cell * 0.60 };
      ctx.save(); GF.rr(ctx, x, y, cell, cell, 12 * S); ctx.clip();
      drawRelicShape(ctx, mb, RELICS[i], 1.0, false);
      ctx.restore();
      ctx.fillStyle = '#cfc8dd'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      var fs = GF.clamp(10 * S, 8, 13); ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif';
      var nm = (GF.lang === 'ru' ? RELICS[i].nameRu : RELICS[i].nameEn);
      while (ctx.measureText(nm).width > cell - 6 * S && fs > 7) { fs--; ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif'; }
      ctx.fillText(nm, x + cell / 2, y + cell - 11 * S);
    } else {
      // lock icon + unlock cost
      drawLock(ctx, x + cell / 2, y + cell * 0.38, cell * 0.16);
      drawCoinIcon(ctx, x + cell / 2 - 14 * S, y + cell * 0.72, 7 * S);
      ctx.fillStyle = '#9a93ab'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + GF.clamp(10 * S, 8, 13) + 'px Inter, system-ui, sans-serif';
      ctx.fillText(RELICS[i].unlock + '', x + cell / 2 - 4 * S, y + cell * 0.72);
    }
    ctx.restore();
    shopRects.push({ x: x, y: y, w: cell, h: cell, kind: 'relic', idx: i });
  }

  // PLAY button (LAST uiButton — yandex-testing clicks it)
  // bottom margin uses H*0.14 so the button always falls within the mobile-gate
  // tap-sweep (cy +40% canvas height), regardless of aspect ratio.
  var bw = GF.clamp(280 * S, 200, 440), bh = GF.clamp(60 * S, 48, 84);
  var pb = { x: (W - bw) / 2, y: H - bh - Math.round(H * 0.14), w: bw, h: bh };
  drawBigButton(ctx, pb, GF.t('play'), true);
  shopRects.push({ x: pb.x, y: pb.y, w: pb.w, h: pb.h, kind: 'play' });
}

function drawLock(ctx, cx, cy, r) {
  ctx.save();
  ctx.strokeStyle = '#7a7390'; ctx.fillStyle = '#7a7390'; ctx.lineWidth = Math.max(1.5, r * 0.2);
  ctx.beginPath(); ctx.arc(cx, cy - r * 0.2, r * 0.55, Math.PI, 0); ctx.stroke();
  GF.rr(ctx, cx - r * 0.7, cy - r * 0.2, r * 1.4, r * 1.1, r * 0.2); ctx.fill();
  ctx.restore();
}

// ── TUTORIAL (demo-hand, hands-on, action-gated) ─────────────────────────────
function setupTutorial(force) {
  var box = relicBox();
  // target = relic center; gesture = drag across it
  var tgFn = function () { var b = relicBox(); return { x: b.cx - b.r * 0.4, y: b.cy, r: b.r * 0.35 }; };
  var toFn = function () { var b = relicBox(); return { x: b.cx + b.r * 0.4, y: b.cy, r: b.r * 0.35 }; };
  // Relic 0 is brush -> polish; teach the universal drag, then the polish shine.
  GF.tutorial.start([
    { text: GF.t('tut_brush'),  target: tgFn, target2: toFn, gesture: 'drag', advance: 'manual' },
    { text: GF.t('tut_polish'), target: tgFn, target2: toFn, gesture: 'drag', advance: 'manual' },
  ], { storageKey: 'frost_melt_tut_v1', force: force });
}

// ── BOOT ──────────────────────────────────────────────────────────────────
var cv = GF.canvas;
cv.addEventListener('mousedown', function (e) { var p = evtXY(e); onDown(p.x, p.y); });
cv.addEventListener('mousemove', function (e) { var p = evtXY(e); onMove(p.x, p.y); });
window.addEventListener('mouseup', function (e) { var p = evtXY(e); onUp(p.x, p.y); });
cv.addEventListener('touchstart', function (e) { e.preventDefault(); var p = evtXY(e); onDown(p.x, p.y); }, { passive: false });
cv.addEventListener('touchmove', function (e) { e.preventDefault(); var p = evtXY(e); onMove(p.x, p.y); }, { passive: false });
cv.addEventListener('touchend', function (e) { e.preventDefault(); var p = evtXY(e); onUp(p.x, p.y); }, { passive: false });

// ── CUSTOM SFX (ASMR per-tool) ─────────────────────────────────────────────
// Augment gf-lib's SFX library with restoration-flavoured stingers. gf-lib
// exposes GF.tone(freq,dur,type,gain,slideTo); compose layered textures here.
(function () {
  var orig = GF.sfx;
  var lastT = {};
  GF.sfx = function (name) {
    var now = performance.now();
    // rate-limit the continuous wiping sounds so streams don't pile up
    if (name === 'brushS' || name === 'scrubS' || name === 'fizzS' || name === 'polishS') {
      if (lastT[name] && now - lastT[name] < 90) return;
      lastT[name] = now;
    }
    switch (name) {
      case 'brushS':  GF.tone(2200 + Math.random() * 600, 0.06, 'sawtooth', 0.018); GF.tone(180, 0.05, 'triangle', 0.02); return;
      case 'scrubS':  GF.tone(360 + Math.random() * 120, 0.09, 'square', 0.022, 240); return;
      case 'fizzS':   GF.tone(3000 + Math.random() * 1200, 0.07, 'sawtooth', 0.016); return;
      case 'polishS': GF.tone(1400 + Math.random() * 800, 0.07, 'sine', 0.02, 2400); return;
      case 'stageDone': GF.arp([523, 784, 1047], 60, 0.16, 'triangle', 0.10); return;
      case 'appraise': GF.arp([523, 659, 880, 1175, 1568], 75, 0.20, 'sine', 0.13); return;
      default: return orig(name);
    }
  };
})();

GF.init({
  designW: 480,
  designH: 854,
  strings: STRINGS,
  sprites: [],
  saveKey: 'frost_melt',
  onReady: function () {
    // load meta (coins + unlocks + upgrades)
    try {
      var m = JSON.parse(localStorage.getItem('frost_melt_meta_v1') || '{}');
      coins = m.coins || 0; best = m.best || 0; totalStars = m.totalStars || 0;
      unlockedMax = m.unlockedMax || 0;
      upWidth = m.upWidth || 0; upSpeed = m.upSpeed || 0; upShine = m.upShine || 0;
    } catch (e) {}

    // procedural calm music bed (starts on first gesture, mute-aware)
    GF.startMusic({ preset: 'calm', muted: GF.muted });

    // Yandex 1.9 — persist run across reload
    GF.persist('frost_melt_run_v1',
      function () {
        if (gs !== 'PLAYING') return { gs: gs, relicIdx: relicIdx, coins: coins, unlockedMax: unlockedMax };
        return {
          gs: gs, relicIdx: relicIdx, stageI: stageI, coins: coins, unlockedMax: unlockedMax,
          upWidth: upWidth, upSpeed: upSpeed, upShine: upShine, best: best, totalStars: totalStars,
          gemSet: gemSet, combo: combo, comboPeak: comboPeak, stageComboPeak: stageComboPeak,
          stagePeakSum: stagePeakSum, stagePeakN: stagePeakN, coverSum: coverSum, coverN: coverN,
          maskCleared: maskCleared, // restore approximate progress
        };
      },
      function (s) {
        if (!s) return;
        coins = s.coins || coins; unlockedMax = s.unlockedMax || unlockedMax;
        if (typeof s.upWidth === 'number') { upWidth = s.upWidth; upSpeed = s.upSpeed; upShine = s.upShine; }
        if (typeof s.best === 'number') best = s.best;
        if (s.gs === 'PLAYING' && typeof s.relicIdx === 'number') {
          _restoring = true;
          startRelic(s.relicIdx);
          stageI = GF.clamp(s.stageI || 0, 0, stageList.length - 1);
          if (stageList[stageI] !== 'gem') buildMask();
          gemSet = !!s.gemSet;
          // restore in-progress effort so a reload near stage-end keeps the score
          stagePeakSum = s.stagePeakSum || 0; stagePeakN = s.stagePeakN || 0;
          coverSum = s.coverSum || 0; coverN = s.coverN || 0;
          combo = s.combo || 1; comboPeak = s.comboPeak || 1; stageComboPeak = s.stageComboPeak || 1;
          // partial coverage restore: re-clear maskCleared cells from the start
          var target = Math.min(s.maskCleared || 0, maskTotal);
          var idxs = [];
          for (var i = 0; i < mask.length; i++) if (mask[i] === 1) idxs.push(i);
          for (var k = 0; k < target && k < idxs.length; k++) { mask[idxs[k]] = 2; revealBuf[idxs[k]] = 1; maskCleared++; }
          if (maskTotal > 0) coverage = maskCleared / maskTotal;
          gs = 'PLAYING';
          GF.tutorial.active = false;
          _restoring = false;
          GF.saveRun();
        }
      }
    );

    // AUTOSTART (rule #9): platform builds drop straight into gameplay (no menu).
    if (window.__GF_AUTOSTART && !window._silent) {
      try { localStorage.setItem('frost_melt_tut_v1', '1'); } catch (e) {}
      if (gs !== 'PLAYING') { startRelic(0); }
      GF.tutorial.active = false;
    } else if (gs === 'PLAYING') {
      // resumed mid-run on the gallery — keep playing
    } else {
      gs = 'MENU';
    }

    // first-ever play on relic 0 shows the demo-hand tutorial
    var seen = false;
    try { seen = !!localStorage.getItem('frost_melt_tut_v1'); } catch (e) {}
    if (!seen && gs === 'PLAYING' && relicIdx === 0 && !(window.__GF_AUTOSTART && !window._silent)) {
      setupTutorial(true);
    }
  },
  onUpdate: update,
  onDraw: draw,
});

// hook startRelic to fire the tutorial on the very first relic-0 of a fresh save
var _origStartRelic = startRelic;
startRelic = function (idx) {
  _origStartRelic(idx);
  var seen = false;
  try { seen = !!localStorage.getItem('frost_melt_tut_v1'); } catch (e) {}
  if (!seen && idx === 0 && !(window.__GF_AUTOSTART && !window._silent)) {
    setupTutorial(false);
  }
};

// ── EXPOSE STATE (post-build-tester cross-checks vs DESIGN.md) ────────────
GF.exposeState(function () {
  return {
    gs: gs, coins: coins, best: best, totalStars: totalStars,
    relicIdx: relicIdx, stageI: stageI, stages: stageList.length,
    coverage: coverage, combo: combo, comboPeak: comboPeak,
    unlockedMax: unlockedMax, upWidth: upWidth, upSpeed: upSpeed, upShine: upShine,
    appraiseStars: appraiseStars, appraiseCoins: appraiseCoins,
    // tunables (DESIGN.md §Tunables)
    BRUSH_R: BRUSH_R, BRUSH_GROW: BRUSH_GROW, STAGE_DONE: STAGE_DONE,
    COMBO_WINDOW: COMBO_WINDOW, COMBO_MAX: COMBO_MAX, COINS_BASE: COINS_BASE,
    STAR3_COVER: STAR3_COVER, MASK_CELLS: MASK_CELLS, FIZZ_RATE: FIZZ_RATE,
    NUM_RELICS: NUM_RELICS,
    _isGem: stageList[stageI] === 'gem',
    _stageKey: stageList[stageI] || null,
  };
});

// post-build-tester seams: live UI rects + the relic geometry (hygiene #8)
window._rrBox = function () { return relicBox(); };
window._rrPlayBtn = function () {
  // mirror drawMenu's PLAY rect (must stay in sync with drawMenu pb calculation)
  var W = GF.W, H = GF.H, S = GF.S;
  var bw = GF.clamp(280 * S, 200, 440), bh = GF.clamp(60 * S, 48, 84);
  return { x: (W - bw) / 2, y: H - bh - Math.round(H * 0.14), w: bw, h: bh };
};
window._rrCtaBtn = function () { return L.bigBtn; };
window._rrToolRects = function () { return toolRects; };

})();
</script>
