<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── LOCALISATION (every player-facing string; en + ru) ─────────────────────
var STRINGS = {

  },
  ru: {

    sub: 'Тапай, чтобы прыгать по блочному обби. Как далеко убежит Ноуб?',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', menu: 'МЕНЮ',
    dist: 'М', best: 'РЕКОРД', score: 'ОЧКИ', gems: 'КАМНИ',
    gameover: 'РАЗБИЛСЯ', newBest: 'НОВЫЙ РЕКОРД!', banked: 'ИЗУМРУДЫ',
    nextZone: 'ДАЛЕЕ', zoneUnlocked: 'НОВАЯ ЗОНА', tapToJump: 'ТАП - ПРЫЖОК',
    nearMiss: 'КЛАСС!',
    mult: 'x',
    howto: 'КАК ИГРАТЬ', gotit: 'ПОНЯТНО',
    tut_goal:     'Цель: Беги блочным Ноубом как можно дальше по обби.',
    tut_controls: 'Управление: Тап (или Пробел) - прыжок; тап в воздухе - двойной прыжок; зажми или свайп вниз - быстрое падение.',
    tut_win:      'Победа: Финиша нет - бей рекорд дистанции и собирай изумруды, чтобы поднять множитель очков.',
    tut_lose:     'Поражение: Задел любую опасность - шипы, пилу, топор, пресс, лаву - или упал в яму.',
    tut_tip:      'Совет: Серии изумрудов и пролёты впритык поднимают множитель до x5; чем дальше, тем больше новых опасностей.',
    tut_step_jump: 'Тапни, чтобы перепрыгнуть',
    zone_grass: 'ЛУГ', zone_cave: 'ПЕЩЕРА', zone_lava: 'ПЕКЛО', zone_ice: 'ЛЕДНИК', zone_void: 'БЕЗДНА',
  },
};

// ── TUNABLES (exposed via GF.exposeState - see boot) ───────────────────────
var RUN_SPEED   = 300;    // px/s starting forward scroll speed (design units * S)
var SPEED_RAMP  = 15;     // px/s added per second survived (reaches MAX in ~24s)
var MAX_SPEED   = 660;    // px/s cap
var GRAVITY     = 2850;   // px/s^2 normal fall
var JUMP_V      = 1080;   // px/s upward impulse on a jump
var DBL_JUMP_V  = 980;    // px/s upward impulse on the air double-jump
var FAST_DROP_A = 4200;   // px/s^2 extra downward accel while holding drop
var GROUP_GAP   = 340;    // px starting horizontal gap between hazard groups
var GAP_MIN     = 200;    // px tightest gap at high distance
var EMERALD_RATE= 0.7;    // probability a group trails an emerald arc
var ZONE_STEP   = 280;    // metres between colour-zone changes
var MULT_MAX    = 5;      // emerald score multiplier cap
// hitboxes / sizes (design px; * S at runtime). Bumped 2026-06-05 so the hero +
// hazards READ at a glance (the old 34px cube was a tiny dot in a big empty frame).
var NOOB_W = 46, NOOB_H = 54, EMERALD_R = 14, SPIKE_W = 40, SAW_R = 32,
    AXE_R = 26, CRUSHER_W = 66, BLOCK = 40, GROUND_PAD = 8, PX_PER_M = 16;

// ── HAZARD-TYPE LADDER (distance metres a type is introduced) ──────────────
var HZ_SPIKE = 120, HZ_SAW = 240, HZ_AXE = 380, HZ_CRUSH = 540, HZ_COMBO = 700;

// ── ZONES (colour biomes) ──────────────────────────────────────────────────
var ZONES = [
  { key:'zone_grass', sky:'#7ec8f0', skyLo:'#bfe9ff', hill:'#5fae4e', hillLo:'#3f7e36', ground:'#7a4e2c', grass:'#5fae4e', accent:'#a8e55a' },
  { key:'zone_cave',  sky:'#1b2336', skyLo:'#2b3a57', hill:'#3a4a66', hillLo:'#27334a', ground:'#4a3b55', grass:'#6a5a78', accent:'#7cd8ff' },
  { key:'zone_lava',  sky:'#2a0f12', skyLo:'#5a1f1a', hill:'#6e2a22', hillLo:'#421813', ground:'#3a1f1a', grass:'#8a3a2a', accent:'#ffb14d' },
  { key:'zone_ice',   sky:'#163046', skyLo:'#2f6f93', hill:'#3d7aa0', hillLo:'#2a5572', ground:'#33536a', grass:'#7fd0e8', accent:'#9be7ff' },
  { key:'zone_void',  sky:'#120a1c', skyLo:'#2a1640', hill:'#3a2360', hillLo:'#241544', ground:'#2a1d3e', grass:'#7a5ad0', accent:'#c89bff' },
];
function zoneFor(idx) { var z = ZONES[((idx % ZONES.length) + ZONES.length) % ZONES.length]; return z; }

// ── STATE ───────────────────────────────────────────────────────────────────
var gs = 'MENU';                 // MENU | PLAYING | GAMEOVER
var rng = Math.random;           // active RNG (re-seeded per run)
var runSpeed = RUN_SPEED;
var worldX = 0;                  // total px scrolled this run
var dist = 0;                    // metres
var emeralds = 0;                // emeralds collected THIS run
var emeraldScore = 0;            // score contribution from emeralds (with multiplier)
var mult = 1;                    // emerald score multiplier (1..MULT_MAX)
var multProg = 0;               // progress toward next multiplier step
var chain = 0;                   // emerald/near-miss chain count
var bestDist = 0;                // PERSISTENT best distance
// (no persistent lifetime emerald counter — per design this is a pure 10-min loop;
//  the ONLY cross-session state is bestDist. In-run `emeralds` is session-only.)
var runEmeraldBank = 0;          // emeralds banked at game-over (for GO display)
var zoneIdx = 0, prevZoneIdx = 0;
var bannerT = 0, bannerTxt = '';
var startHintT = 0;
var slowmo = 0;                  // near-miss slow-motion timer (seconds, world runs slower)
var multPulse = 0;               // visual pulse when multiplier climbs
var nearMissFlash = 0;           // brief golden edge-flash on a near-miss (juice)

// player
var noob = { y:0, vy:0, onGround:true, jumps:0, squash:0, rot:0, dropping:false, runT:0, fellInPit:false };
var holdDown = false;            // fast-drop held
var godMode = false;             // screenshot/test only: skip death so a dense state can be built

// world entities (all in SCREEN x, scrolled left each frame)
var ground = [];                 // [{x,w}] solid floor spans (between them = pits)
var hazards = [];                // [{type,x,y,w,h,...}] type: spike|saw|axe|crusher|lava
var gemsArr = [];                // [{x,y,taken}]
var nextSpawnX = 0;
var spawnCount = 0;
var lastGroundEndX = 0;          // right edge of the furthest ground span (for continuity)

// menu/help
var seenTutorial = false;
var tutorialHelpOpen = false;    // ? help card (reference) on MENU/PLAYING

// buttons (declarative hit targets, rebuilt per overlay frame)
var uiButtons = [];              // overlay buttons (PLAY/RETRY/MENU/GOTIT)
var hudButtons = [];             // ? + mute, live during PLAYING

// audio (mute mirrors gf-lib SFX + music)
var audioMuted = false;

// ── UTILS ───────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function rr(c, x, y, w, h, r) {
  if (!(w > 0) || !(h > 0) || !isFinite(x) || !isFinite(y)) return;
  r = Math.max(0, Math.min(r, w/2, h/2));
  if (!isFinite(r)) r = 0;
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}
// Mulberry32 deterministic PRNG
function makeRng(seed) {
  var s = seed | 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    var t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ── PERSISTENCE (single best + lifetime emerald counter; NO per-frame writes) ─
function loadProgress() {
  try { bestDist = parseInt(localStorage.getItem('noob_run_best') || '0', 10) || 0; } catch (e) {}
  try { audioMuted = localStorage.getItem('gf_muted') === '1'; } catch (e) {}
  try { seenTutorial = localStorage.getItem('noob_run_seen_tut') === '1'; } catch (e) {}
}
function saveBest()  { try { localStorage.setItem('noob_run_best', String(bestDist)); } catch (e) {} }
function markTutorialSeen() { seenTutorial = true; try { localStorage.setItem('noob_run_seen_tut', '1'); } catch (e) {} }

// ── AUDIO (gf-lib SFX + procedural music bed) ──────────────────────────────
var Sfx = {
  jump:   function () { GF.tone(420, 0.10, 'square', 0.10, 700); },
  dbl:    function () { GF.tone(560, 0.11, 'triangle', 0.11, 920); },
  drop:   function () { GF.tone(620, 0.12, 'sawtooth', 0.08, 180); },
  land:   function () { GF.tone(180, 0.07, 'sine', 0.08, 110); },
  gem:    function () { GF.tone(1080, 0.07, 'sine', 0.10, 1560); },
  mult:   function () { GF.arp([784, 1047, 1319], 60, 0.13, 'triangle', 0.12); },
  near:   function () { GF.tone(900, 0.05, 'triangle', 0.05, 1200); },
  zone:   function () { GF.arp([523, 784, 1047], 80, 0.16, 'triangle', 0.13); },
  crash:  function () { GF.tone(280, 0.45, 'sawtooth', 0.14, 50); },
  click:  function () { GF.tone(660, 0.05, 'square', 0.06); },
};
function toggleMute() {
  audioMuted = GF.toggleMute();   // gf-lib flips + persists gf_muted, mutes SFX
  GF.setMusicMuted(audioMuted);   // mirror to the procedural music bed
  if (!audioMuted) Sfx.click();
}

// ── GEOMETRY ─────────────────────────────────────────────────────────────────
// Portrait runner. The resting ground sits in the MIDDLE of the frame (not the
// bottom) so the action fills the screen: jump room above, a deep pit you can
// actually SEE below. A vertical CAMERA follows the Noob so the world has life
// instead of a tiny cube bobbing against a static empty sky.
var camY = 0;          // visual-only vertical camera offset (does NOT affect collision)
function groundY()  { return GF.H * 0.60; }                              // top of the ground blocks (mid-frame)
function ceilY()    { return Math.max(GF.H * 0.07, 44 * GF.S); }         // top band (axes/crushers hang from here)
function playerX()  { return GF.W * 0.30; }                             // fixed run column
function noobBaseY(){ return groundY() - (NOOB_H * 0.5) * GF.S; }        // cube centre y when grounded
// camera target: ease toward the Noob when it climbs above the resting line so
// it stays framed mid-screen; never scrolls below the resting ground.
function camTarget() {
  var rest = noobBaseY();
  var rise = rest - noob.y;                 // how far above resting the Noob is
  return clamp(rise * 0.55, 0, GF.H * 0.26); // follow up to ~26% of height
}

// is there solid ground under screen-x px right now?
function groundUnder(px) {
  for (var i = 0; i < ground.length; i++) {
    var g = ground[i];
    if (px >= g.x && px <= g.x + g.w) return true;
  }
  return false;
}

// ── DIFFICULTY ───────────────────────────────────────────────────────────────
function diff() { return clamp(dist / 900, 0, 1); }
function curGap() { return (GROUP_GAP - (GROUP_GAP - GAP_MIN) * diff()) * GF.S; }
// which hazard types are unlocked at the current distance
function unlocked() {
  return {
    spike: dist >= HZ_SPIKE, saw: dist >= HZ_SAW, axe: dist >= HZ_AXE,
    crush: dist >= HZ_CRUSH, combo: dist >= HZ_COMBO,
  };
}

// ── SPAWNING ─────────────────────────────────────────────────────────────────
function resetSpawns() {
  ground = []; hazards = []; gemsArr = [];
  // start with a long safe runway under + ahead of the player
  var gy = GF.W * 1.4;
  ground.push({ x: -200 * GF.S, w: gy + 200 * GF.S });
  lastGroundEndX = gy;
  nextSpawnX = GF.W + 60 * GF.S;
  spawnCount = 0;
}
// extend ground from lastGroundEndX up to at least targetX, optionally leaving a pit of width pit
function extendGround(toX, pit) {
  if (pit && pit > 0) {
    // leave a gap [lastGroundEndX, lastGroundEndX+pit], then resume
    lastGroundEndX += pit;
  }
  if (toX > lastGroundEndX) {
    ground.push({ x: lastGroundEndX, w: toX - lastGroundEndX });
    lastGroundEndX = toX;
  }
}

function spawnGroup(x) {
  var u = unlocked(), d = diff(), gy = groundY(), S = GF.S;
  var r = rng();

  // ensure ground exists continuously up to just before this group's x
  extendGround(x - 4 * S, 0);

  // choose a pattern based on what's unlocked
  var choices = ['pit'];
  if (u.spike) choices.push('spike', 'spike');
  if (u.saw)   choices.push('saw');
  if (u.axe)   choices.push('axe');
  if (u.crush) choices.push('crush');
  if (u.combo) choices.push('combo', 'combo');
  if (spawnCount < 2) choices = ['pit'];  // ease-in: first couple are simple gaps

  var pick = choices[Math.floor(r * choices.length)];
  var safeY;   // y the emerald arc should hug (ground lane unless overhead hazard)
  var groupRight = x;

  if (pick === 'pit') {
    var pw = (70 + rng() * (60 + 70 * d)) * S;     // pit width grows with difficulty
    extendGround(x, pw);                            // pit is at [x-? ]; resume ground after
    extendGround(x + (90 + rng() * 60) * S, 0);     // landing platform
    groupRight = lastGroundEndX;
    // optional lava in the pit (always in lava zone; sometimes elsewhere once spikes unlock)
    if (u.spike && (zoneIdx % ZONES.length === 2 || rng() < 0.4)) {
      hazards.push({ type:'lava', x:x, y:gy + 6 * S, w:pw, h:60 * S, phase: rng()*6 });
    }
    safeY = noobBaseY() - 60 * S;                  // emeralds float over the gap (jump-arc)

  } else if (pick === 'spike') {
    var n = 1 + (d > 0.4 ? Math.floor(rng() * 2) : 0);
    extendGround(x + (n * SPIKE_W + 60) * S, 0);
    for (var i = 0; i < n; i++) {
      hazards.push({ type:'spike', x:x + i * SPIKE_W * S, y:gy, w:SPIKE_W * S, h:(26 + 14 * d) * S });
    }
    groupRight = x + n * SPIKE_W * S;
    safeY = noobBaseY() - 70 * S;

  } else if (pick === 'saw') {
    extendGround(x + (SAW_R * 2 + 80) * S, 0);
    var sawY = gy - SAW_R * S * 0.2;
    hazards.push({ type:'saw', x:x + SAW_R * S, y:sawY, r:SAW_R * S, spin:0,
                   bob: rng() < 0.4 ? (20 + rng()*26) * S : 0, phase: rng()*6, baseY: sawY });
    groupRight = x + SAW_R * 2 * S;
    safeY = noobBaseY() - 78 * S;

  } else if (pick === 'axe') {
    extendGround(x + 120 * S, 0);
    var len = (groundY() - ceilY()) * (0.6 + rng() * 0.25);
    hazards.push({ type:'axe', x:x + 40 * S, pivotY: ceilY(), len: len, r: AXE_R * S,
                   ang: 0, amp: 1.0 + rng() * 0.2, phase: rng() * Math.PI * 2, speed: 2.0 + d * 1.0 });
    groupRight = x + 80 * S;
    safeY = noobBaseY();                            // run under the arc

  } else if (pick === 'crush') {
    extendGround(x + (CRUSHER_W + 60) * S, 0);
    hazards.push({ type:'crush', x:x, y: ceilY(), w: CRUSHER_W * S, h: 46 * S,
                   topY: ceilY(), botY: groundY() - 46 * S, t: rng() * 4, speed: 1.6 + d * 0.9 });
    groupRight = x + CRUSHER_W * S;
    safeY = noobBaseY() - 64 * S;

  } else { // combo - a pit with a hazard guarding the takeoff/landing
    var cpw = (60 + rng() * 60) * S;
    // spike on the takeoff edge
    hazards.push({ type:'spike', x:x, y:gy, w:SPIKE_W * S, h:(24 + 12 * d) * S });
    extendGround(x + SPIKE_W * S, 0);
    extendGround(x + SPIKE_W * S, cpw);             // then a pit
    extendGround(x + SPIKE_W * S + cpw + 110 * S, 0);
    if (rng() < 0.6) hazards.push({ type:'lava', x:x + SPIKE_W * S, y:gy + 6 * S, w:cpw, h:60 * S, phase:rng()*6 });
    // a saw bobbing over the landing sometimes
    if (u.saw && rng() < 0.5) {
      var sY2 = groundY() - SAW_R * S * 1.3;
      hazards.push({ type:'saw', x:x + SPIKE_W * S + cpw + 50 * S, y:sY2, r:SAW_R * S * 0.85, spin:0, bob:0, phase:0, baseY:sY2 });
    }
    groupRight = lastGroundEndX;
    safeY = noobBaseY() - 80 * S;
  }

  // emerald arc along the safe path after the group
  if (rng() < EMERALD_RATE) {
    var cnt = 3 + Math.floor(rng() * 3);
    var ex0 = groupRight + 30 * S;
    var arcH = 30 * S;
    for (var e = 0; e < cnt; e++) {
      var tt = cnt > 1 ? e / (cnt - 1) : 0;
      gemsArr.push({ x: ex0 + e * 34 * S, y: safeY - Math.sin(tt * Math.PI) * arcH, taken:false });
    }
  }

  // make sure ground continues a bit past so the next extend has continuity
  extendGround(groupRight + 40 * S, 0);
  spawnCount++;
  nextSpawnX = Math.max(groupRight, lastGroundEndX) + curGap();
}

// ── LIFECYCLE ────────────────────────────────────────────────────────────────
function startRun() {
  rng = makeRng(((performance.now() | 0) ^ (Math.random() * 1e9 | 0)) | 0);
  runSpeed = RUN_SPEED;
  worldX = 0; dist = 0;
  emeralds = 0; emeraldScore = 0; mult = 1; multProg = 0; chain = 0;
  zoneIdx = 0; prevZoneIdx = 0;
  bannerT = 0; bannerTxt = ''; slowmo = 0; multPulse = 0;
  noob.y = noobBaseY(); noob.vy = 0; noob.onGround = true; noob.jumps = 0;
  noob.squash = 0; noob.rot = 0; noob.dropping = false; noob.runT = 0; noob.fellInPit = false;
  holdDown = false; camY = 0;
  startHintT = seenTutorial ? 1.4 : 0;
  resetSpawns();
  spawnGroup(nextSpawnX);
  spawnGroup(nextSpawnX);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function jump() {
  if (gs !== 'PLAYING') return false;
  if (noob.onGround || noob.jumps < 1) {
    var first = noob.onGround;
    noob.vy = -(first ? JUMP_V : DBL_JUMP_V) * GF.S;
    noob.onGround = false;
    noob.jumps = first ? 1 : 2;     // second tap = the double-jump
    noob.squash = first ? 0.55 : 0.45;
    noob.dropping = false; noob.fellInPit = false;   // a jump re-commits to the air
    startHintT = 0;
    // dust at the actual launch point (feet on the ground for the 1st jump, the
    // Noob's current feet for the airborne double-jump), plus a tiny camera kick.
    var footY = first ? (noobBaseY() + NOOB_H * 0.4 * GF.S) : (noob.y + NOOB_H * 0.4 * GF.S);
    GF.spawnParticles(playerX(), footY + camY, first ? '#cbb08a' : '#bfe9ff', first ? 8 : 11);
    GF.setShake(first ? 0.14 : 0.10);
    if (first) Sfx.jump(); else Sfx.dbl();
    // action-gated tutorial advances on the real jump
    if (GF.tutorial.active) GF.tutorial.next();
    return true;
  }
  return false;
}
// Begin a HOLD. Does NOT touch velocity — a quick tap-to-jump must NOT have its
// jump gutted (the old startDrop cut a rising jump to 30% on every tap = the
// single worst control-feel bug). Fast-drop engages from the hold only after a
// short threshold while airborne (see update()).
var holdStartT = 0;
function pressHold() {
  if (gs !== 'PLAYING') return;
  holdDown = true; holdStartT = performance.now();
}
// An EXPLICIT drop intent (swipe-down / ArrowDown / S): commit the slam now.
function commitDrop() {
  if (gs !== 'PLAYING') return;
  holdDown = true; holdStartT = 0;        // already past the threshold
  if (!noob.onGround) { noob.dropping = true; if (noob.vy < 0) noob.vy *= 0.4; Sfx.drop(); }
}
function endDrop() { holdDown = false; noob.dropping = false; }

function addEmerald(g) {
  g.taken = true;
  emeralds++;
  chain++;
  multProg++;
  if (mult < MULT_MAX && multProg >= 3) { multProg = 0; mult++; multPulse = 1; Sfx.mult(); }
  var gain = 10 * mult;
  emeraldScore += gain;
  GF.spawnFloat(g.x, g.y - 6 * GF.S + camY, '+' + gain, '#a8e55a');
  GF.spawnParticles(g.x, g.y + camY, '#39d353', 10);
  Sfx.gem();
}
function breakChain() { chain = 0; multProg = 0; if (mult > 1) { mult = 1; } }

function gameOver() {
  if (gs !== 'PLAYING') return;
  gs = 'GAMEOVER';
  runEmeraldBank = emeralds;
  if (Math.floor(dist) > bestDist) { bestDist = Math.floor(dist); saveBest(); }
  GF.spawnParticles(playerX(), noob.y + camY, '#ff5b6b', 34);
  GF.spawnParticles(playerX(), noob.y + camY, '#ffd24d', 18);
  GF.setShake(1.0);
  Sfx.crash();
  GF.gameEnded();
  GF.saveRun();
}

// ── COLLISION HELPERS ─────────────────────────────────────────────────────────
function noobRect() {
  var pr = NOOB_W * 0.5 * GF.S, hh = NOOB_H * 0.5 * GF.S;
  // shrink a touch for forgiveness
  return { x: playerX() - pr * 0.78, y: noob.y - hh * 0.86, w: pr * 1.56, h: hh * 1.72 };
}
function aabb(a, bx, by, bw, bh) {
  return a.x < bx + bw && a.x + a.w > bx && a.y < by + bh && a.y + a.h > by;
}
function axeHead(h) {
  var ang = Math.sin(h.phase) * h.amp;          // swing angle from vertical
  return { x: h.x + Math.sin(ang) * h.len, y: h.pivotY + Math.cos(ang) * h.len };
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update(dt) {
  // drive the demo-hand tutorial animation (pulse + gesture). Without this the
  // hand renders FROZEN - it must tick every frame.
  GF.tutorial.update(dt);
  // overlay-time animation continues (banner/pulse) even when not PLAYING
  if (bannerT > 0) bannerT -= dt;
  if (multPulse > 0) multPulse = Math.max(0, multPulse - dt * 2);
  if (nearMissFlash > 0) nearMissFlash = Math.max(0, nearMissFlash - dt * 2.6);
  if (startHintT > 0) startHintT -= dt;
  noob.runT += dt;
  if (gs !== 'PLAYING') return;

  // tutorial freezes the deadly part of the world (no-fail) until the player jumps
  var tut = GF.tutorial.active;

  // near-miss slow-mo eases the timescale
  if (slowmo > 0) slowmo = Math.max(0, slowmo - dt);
  var ts = slowmo > 0 ? 0.45 : 1;
  var sdt = dt * ts;

  // escalate speed (slower during the tutorial coach so the gap is jumpable calmly)
  if (!tut) runSpeed = Math.min(MAX_SPEED, runSpeed + SPEED_RAMP * sdt);
  var moveSpeed = tut ? RUN_SPEED * 0.62 : runSpeed;
  var dx = moveSpeed * GF.S * sdt;
  worldX += dx;
  dist = worldX / (PX_PER_M * GF.S);

  // zone / milestone
  zoneIdx = Math.floor(dist / ZONE_STEP);
  if (zoneIdx > prevZoneIdx) {
    prevZoneIdx = zoneIdx;
    var z = zoneFor(zoneIdx);
    bannerTxt = GF.t('zoneUnlocked') + ' - ' + GF.t(z.key);
    bannerT = 2.0; GF.setShake(0.25); Sfx.zone();
  }

  // physics: gravity + jump arc + fast-drop
  var prevNoobY = noob.y;                 // for the landing-crossing test below
  var g = GRAVITY;
  noob.vy += g * GF.S * sdt;
  // fast-drop accel only once the HOLD has lasted past a short threshold (a quick
  // tap-to-jump releases before this, so its jump stays full-height + responsive).
  var holding = holdDown && !noob.onGround && (holdStartT === 0 || (performance.now() - holdStartT) > 130);
  if (holding) { noob.vy += FAST_DROP_A * GF.S * sdt; noob.dropping = true; }
  noob.y += noob.vy * sdt;
  if (noob.squash > 0) noob.squash = Math.max(0, noob.squash - dt * 3);

  // ground / pit logic - is there floor right under the player column?
  var baseY = noobBaseY();
  var onFloorHere = groundUnder(playerX());
  // landing tolerance: only snap onto a platform if the Noob is at/just below the
  // platform's TOP face (it descended onto it), OR it crossed the top face this
  // frame (catches fast/fast-drop landings without tunnelling). Once it has dropped
  // deep into a gap, a platform edge scrolling under must NOT teleport it back up -
  // it keeps falling to its death. (Prevents the side-scroller "pit rescue pop".)
  var landTol = (NOOB_H * 0.5 + BLOCK) * GF.S;
  var crossedTop = (prevNoobY <= baseY + 1 && noob.y >= baseY);
  // latch: the moment the Noob is below the ground line with NO floor under it, it
  // has committed to the pit. A platform edge scrolling under afterwards must not
  // rescue it (no teleport-up). Cleared by a fresh jump / new run.
  if (!onFloorHere && noob.y > baseY + landTol) noob.fellInPit = true;
  if (noob.y >= baseY && noob.vy >= 0) {
    if (onFloorHere && !noob.fellInPit && (noob.y <= baseY + landTol || crossedTop)) {
      if (!noob.onGround && noob.vy > 200 * GF.S) { noob.squash = 0.7; Sfx.land(); GF.spawnParticles(playerX(), baseY + NOOB_H*0.4*GF.S + camY, '#cbb08a', 9); GF.setShake(clamp(noob.vy / (1600 * GF.S), 0.12, 0.4)); }
      noob.y = baseY; noob.vy = 0; noob.onGround = true; noob.jumps = 0; noob.dropping = false;
    } else {
      // over a pit (or already committed to the pit) → keep falling to the death line
      noob.onGround = false;
    }
  } else {
    noob.onGround = false;
  }
  // fall into pit / off the bottom = death. Ground sits mid-frame now, so let the
  // Noob visibly drop into the gap before it dies (the fall reads as a fall).
  if (!godMode && noob.y - NOOB_H * 0.5 * GF.S > groundY() + GF.H * 0.20) { gameOver(); return; }
  // in godMode (screenshot setup) keep the Noob on a valid floor so the sim survives
  if (godMode && noob.y > noobBaseY()) { noob.y = noobBaseY(); noob.vy = 0; noob.onGround = true; }

  // run tilt (visual): slight forward lean while airborne
  var targetRot = noob.onGround ? 0 : clamp(noob.vy / (1400 * GF.S), -0.35, 0.45);
  noob.rot += (targetRot - noob.rot) * Math.min(1, dt * 12);

  // vertical camera - ease toward the Noob when it climbs so the world has life
  // and a high jump shows the sky scrolling, not a static void. Visual only.
  camY += (camTarget() - camY) * Math.min(1, dt * 8);

  // scroll world left + update/recycle entities
  for (var i = ground.length - 1; i >= 0; i--) {
    ground[i].x -= dx;
    if (ground[i].x + ground[i].w < -80 * GF.S) ground.splice(i, 1);
  }
  lastGroundEndX -= dx;
  nextSpawnX -= dx;

  var nr = noobRect();
  for (var h = hazards.length - 1; h >= 0; h--) {
    var hz = hazards[h];
    hz.x -= dx;
    // animate
    if (hz.type === 'saw') { hz.spin += sdt * 12; if (hz.bob) hz.y = hz.baseY - Math.sin((hz.phase += sdt * 2)) * hz.bob; }
    else if (hz.type === 'axe') { hz.phase += sdt * hz.speed; }
    else if (hz.type === 'crush') { hz.t += sdt * hz.speed; }
    else if (hz.type === 'lava') { hz.phase += sdt * 3; }
    // collide (skip while tutorial coach is active - no-fail intro; and in godMode setup)
    if (!tut && !godMode) {
      if (hz.type === 'spike') {
        // triangle ~ treat as a rect band near the tip, forgiving
        if (aabb(nr, hz.x + hz.w * 0.18, hz.y - hz.h, hz.w * 0.64, hz.h)) { gameOver(); return; }
      } else if (hz.type === 'lava') {
        if (aabb(nr, hz.x, hz.y, hz.w, hz.h)) { gameOver(); return; }
      } else if (hz.type === 'saw') {
        var ddx = (playerX()) - hz.x, ddy = (noob.y) - hz.y, rr2 = (hz.r * 0.86 + NOOB_W * 0.36 * GF.S);
        if (ddx*ddx + ddy*ddy < rr2*rr2) { gameOver(); return; }
      } else if (hz.type === 'axe') {
        var head = axeHead(hz);
        var adx = playerX() - head.x, ady = noob.y - head.y, ar = hz.r + NOOB_W * 0.34 * GF.S;
        if (adx*adx + ady*ady < ar*ar) { gameOver(); return; }
      } else if (hz.type === 'crush') {
        var cyTop = hz.topY, cyBot = hz.botY;
        var tt = (Math.sin(hz.t) * 0.5 + 0.5);   // 0 up .. 1 down
        var cy = cyTop + (cyBot - cyTop) * tt;
        hz._cy = cy;
        if (aabb(nr, hz.x, cy, hz.w, hz.h)) { gameOver(); return; }
      }
    } else if (hz.type === 'crush') {
      hz._cy = hz.topY + (hz.botY - hz.topY) * (Math.sin(hz.t) * 0.5 + 0.5);
    }
    // near-miss detection (passing just over a ground hazard) → slow-mo + chain
    if (!tut && (hz.type === 'spike' || hz.type === 'saw') && !hz._scored && hz.x + (hz.w || hz.r*2) < playerX() && hz.x > playerX() - 120 * GF.S) {
      hz._scored = true;
      var topOfHaz = hz.type === 'spike' ? (hz.y - hz.h) : (hz.y - hz.r);
      if (!noob.onGround && (noob.y + NOOB_H*0.5*GF.S) < topOfHaz + 26 * GF.S && (noob.y + NOOB_H*0.5*GF.S) > topOfHaz - 60 * GF.S) {
        slowmo = Math.min(0.5, slowmo + 0.34); chain++; multPulse = Math.max(multPulse, 0.9);
        nearMissFlash = 1;
        // near-misses ALSO feed the multiplier (the tutorial tip promises this) —
        // a skilful close dodge is rewarded just like an emerald chain.
        multProg++;
        if (mult < MULT_MAX && multProg >= 3) { multProg = 0; mult++; multPulse = 1; Sfx.mult(); }
        GF.spawnFloat(playerX(), noob.y - NOOB_H*0.8*GF.S + camY, GF.t('nearMiss'), '#ffd24d');
        GF.spawnParticles(playerX(), noob.y + NOOB_H*0.3*GF.S + camY, '#ffd24d', 8);
        Sfx.near();
      }
    }
    if (hz.x + (hz.w || hz.r * 2 || 80 * GF.S) < -120 * GF.S) hazards.splice(h, 1);
  }

  // emeralds
  for (var e = gemsArr.length - 1; e >= 0; e--) {
    var gm = gemsArr[e];
    gm.x -= dx;
    if (!gm.taken) {
      var gdx = playerX() - gm.x, gdy = noob.y - gm.y, gr = (EMERALD_R * GF.S + NOOB_W * 0.45 * GF.S);
      if (gdx*gdx + gdy*gdy < gr*gr) addEmerald(gm);
    }
    if (gm.x < -60 * GF.S) gemsArr.splice(e, 1);
  }

  // spawn new groups as the spawn cursor approaches the right edge
  var guard = 0;
  while (nextSpawnX < GF.W + 120 * GF.S && guard++ < 8) spawnGroup(nextSpawnX);
  // also guarantee ground always extends past the right edge (avoids accidental gaps)
  if (lastGroundEndX < GF.W + 200 * GF.S) extendGround(GF.W + 240 * GF.S, 0);

  GF.gameStarted && 0; // no-op keep
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function drawNoob(c, cxp, cyp, s) {
  // s = block unit in px (NOOB_W*S). Blocky cube character: head + body + eyes.
  c.save();
  c.translate(cxp, cyp);
  c.rotate(noob.rot);
  // squash & stretch
  var sq = 1 - noob.squash * 0.4, st = 1 + noob.squash * 0.3;
  c.scale(st, sq);
  var w = NOOB_W * GF.S, h = NOOB_H * GF.S;
  // dark outline backing so the hero POPS against the bright sky (reads at a glance)
  c.fillStyle = '#14202c';
  rr(c, -w * 0.52, -h * 0.56, w * 1.04, h * 1.18, w * 0.16); c.fill();
  // body (lower block) - classic noob: yellowish head + cyan-ish shirt
  var bodyTop = -h * 0.04;
  c.fillStyle = '#3aa0c8'; // shirt
  c.fillRect(-w * 0.42, bodyTop, w * 0.84, h * 0.5);
  c.fillStyle = '#2b7e9e';
  c.fillRect(-w * 0.42, bodyTop + h * 0.5 - h * 0.16, w * 0.84, h * 0.16); // belt shade
  // legs
  c.fillStyle = '#2e6f3a';
  var legY = bodyTop + h * 0.5;
  var legSwing = noob.onGround ? Math.sin(noob.runT * 16) * w * 0.16 : w * 0.10;
  c.fillRect(-w * 0.34 + legSwing, legY, w * 0.26, h * 0.12);
  c.fillRect( w * 0.08 - legSwing, legY, w * 0.26, h * 0.12);
  // arms
  c.fillStyle = '#ffd9a8';
  var armSwing = noob.onGround ? Math.sin(noob.runT * 16) * w * 0.18 : -w * 0.12;
  c.fillRect(-w * 0.5, bodyTop + h * 0.04 - armSwing * 0.5, w * 0.12, h * 0.32);
  c.fillRect( w * 0.38, bodyTop + h * 0.04 + armSwing * 0.5, w * 0.12, h * 0.32);
  // head (upper block)
  c.fillStyle = '#f4c542'; // noob yellow
  rr(c, -w * 0.46, -h * 0.5, w * 0.92, h * 0.5, w * 0.14); c.fill();
  c.fillStyle = '#d9a92e';
  c.fillRect(-w * 0.46, -h * 0.06, w * 0.92, h * 0.04); // jaw shade
  // eyes (two dots) + smile
  c.fillStyle = '#16202c';
  c.fillRect(-w * 0.24, -h * 0.34, w * 0.12, h * 0.12);
  c.fillRect( w * 0.12, -h * 0.34, w * 0.12, h * 0.12);
  c.fillStyle = '#fff';
  c.fillRect(-w * 0.22, -h * 0.32, w * 0.04, h * 0.04);
  c.fillRect( w * 0.14, -h * 0.32, w * 0.04, h * 0.04);
  c.strokeStyle = '#7a4e12'; c.lineWidth = Math.max(1.2, w * 0.05);
  c.beginPath(); c.arc(0, -h * 0.14, w * 0.16, 0.15 * Math.PI, 0.85 * Math.PI); c.stroke();
  c.restore();
}

function drawEmerald(c, x, y, r, bob) {
  c.save();
  c.translate(x, y + Math.sin(bob) * 3 * GF.S);
  var rr2 = r;
  // faceted green diamond (vector, no emoji)
  c.beginPath();
  c.moveTo(0, -rr2);
  c.lineTo(rr2 * 0.8, -rr2 * 0.2);
  c.lineTo(rr2 * 0.5, rr2);
  c.lineTo(-rr2 * 0.5, rr2);
  c.lineTo(-rr2 * 0.8, -rr2 * 0.2);
  c.closePath();
  c.fillStyle = '#39d353'; c.fill();
  c.strokeStyle = '#1f8f33'; c.lineWidth = Math.max(1, r * 0.14); c.stroke();
  // top facet highlight
  c.beginPath();
  c.moveTo(0, -rr2); c.lineTo(rr2 * 0.8, -rr2 * 0.2); c.lineTo(0, -rr2 * 0.1); c.closePath();
  c.fillStyle = 'rgba(190,255,200,0.7)'; c.fill();
  c.restore();
}

// HUD gem icon (vector diamond, never emoji)
function drawGemIcon(c, x, y, r) {
  c.save(); c.translate(x, y);
  c.beginPath();
  c.moveTo(0, -r); c.lineTo(r * 0.78, -r * 0.15); c.lineTo(0, r); c.lineTo(-r * 0.78, -r * 0.15); c.closePath();
  c.fillStyle = '#39d353'; c.fill();
  c.strokeStyle = '#1f8f33'; c.lineWidth = Math.max(1, r * 0.16); c.stroke();
  c.restore();
}

function draw(c, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  var z = zoneFor(zoneIdx);
  // sky gradient - extend ABOVE the top so a camera-rise never reveals a hard edge
  var sky = c.createLinearGradient(0, -H * 0.4, 0, H);
  sky.addColorStop(0, z.sky); sky.addColorStop(1, z.skyLo);
  c.fillStyle = sky; c.fillRect(0, -H * 0.4, W, H * 1.4);
  // soft sun glow high in the sky (parallaxes slowly) - gives the void something
  var sunX = (W * 0.74 - (worldX * 0.03) % (W * 1.5));
  if (sunX < -W * 0.3) sunX += W * 1.5;
  var sunG = c.createRadialGradient(sunX, H * 0.20 + camY * 0.3, 0, sunX, H * 0.20 + camY * 0.3, H * 0.30);
  sunG.addColorStop(0, 'rgba(255,255,255,0.28)'); sunG.addColorStop(1, 'rgba(255,255,255,0)');
  c.fillStyle = sunG; c.fillRect(0, -H * 0.4, W, H);
  // drifting cloud bands (cheap, three rounded blobs) for parallax depth
  drawClouds(c, z, worldX * 0.06, H * 0.16 + camY * 0.25, 0.9);
  drawClouds(c, z, worldX * 0.11, H * 0.30 + camY * 0.4, 0.6);

  // ── NEAR WORLD (camera-followed) ───────────────────────────────────────────
  c.save();
  c.translate(0, camY);

  // parallax blocky hills (two layers) - scroll fraction of worldX
  drawHills(c, z, worldX * 0.25, z.hillLo, groundY() + 40 * S, 0.9);
  drawHills(c, z, worldX * 0.5, z.hill, groundY() + 16 * S, 1.2);

  // ground blocks - dirt body extends well below so the mid-frame ground reads as
  // a thick slab; the missing spans (pits) are deep dark gaps.
  var gy = groundY();
  var dirtBottom = H + camY + H * 0.3;
  // dark PIT-WELL behind the whole ground band: where a gap exists, the player
  // sees this bottomless void (not bright sky/hills) so pits read as real depth
  // in EVERY zone. A vertical fade sells the drop. Ground spans paint over it.
  var well = c.createLinearGradient(0, gy, 0, dirtBottom);
  well.addColorStop(0, 'rgba(0,0,0,0.55)'); well.addColorStop(0.5, 'rgba(0,0,0,0.78)'); well.addColorStop(1, 'rgba(0,0,0,0.92)');
  c.fillStyle = well; c.fillRect(0, gy, W, dirtBottom - gy);
  for (var i = 0; i < ground.length; i++) {
    var g = ground[i];
    if (g.x > W || g.x + g.w < 0) continue;
    // dirt
    c.fillStyle = z.ground;
    c.fillRect(g.x, gy, g.w, dirtBottom - gy);
    // grass cap (blocky, chunkier now)
    c.fillStyle = z.grass;
    c.fillRect(g.x, gy, g.w, 14 * S);
    c.fillStyle = 'rgba(255,255,255,0.10)';
    c.fillRect(g.x, gy, g.w, 4 * S);
    c.fillStyle = 'rgba(0,0,0,0.20)';
    c.fillRect(g.x, gy + 14 * S, g.w, 5 * S);
    // pit-edge shadow on the left/right faces so a gap reads as DEPTH
    c.fillStyle = 'rgba(0,0,0,0.22)';
    c.fillRect(g.x, gy, 5 * S, dirtBottom - gy);
    c.fillRect(g.x + g.w - 5 * S, gy, 5 * S, dirtBottom - gy);
    // block seams
    c.strokeStyle = 'rgba(0,0,0,0.10)'; c.lineWidth = 1;
    var seam = Math.floor(g.x / (BLOCK * S)) * (BLOCK * S);
    for (var sx = seam; sx < g.x + g.w; sx += BLOCK * S) {
      if (sx < g.x) continue;
      c.beginPath(); c.moveTo(sx, gy); c.lineTo(sx, dirtBottom); c.stroke();
    }
  }

  // hazards
  for (var h = 0; h < hazards.length; h++) {
    var hz = hazards[h];
    if (hz.x > W + 80 * S || (hz.x + (hz.w || hz.r * 2 || 80 * S)) < -80 * S) continue;
    if (hz.type === 'lava') drawLava(c, hz);
    else if (hz.type === 'spike') drawSpike(c, hz);
    else if (hz.type === 'saw') drawSaw(c, hz);
    else if (hz.type === 'axe') drawAxe(c, hz);
    else if (hz.type === 'crush') drawCrush(c, hz);
  }

  // emeralds
  for (var e = 0; e < gemsArr.length; e++) {
    var gm = gemsArr[e];
    if (gm.taken || gm.x < -40 * S || gm.x > W + 40 * S) continue;
    drawEmerald(c, gm.x, gm.y, EMERALD_R * S, noob.runT * 4 + e);
  }
  c.restore();   // end near-world camera

  // speed-lines as runSpeed ramps (juice) - fixed to the viewport, full-frame
  // streaks so the SPEED is felt across the whole screen, not a faint centre wisp.
  if (gs === 'PLAYING') {
    var spd = (runSpeed - RUN_SPEED) / (MAX_SPEED - RUN_SPEED);
    if (spd > 0.06) {
      c.save();
      c.lineCap = 'round';
      for (var sl = 0; sl < 7; sl++) {
        var seed = sl * 977;
        var ly = ((noob.runT * (260 + spd * 820) + seed) % (H * 1.1)) - H * 0.05;
        var len = (60 + spd * 150 + (seed % 60)) * S;
        var lx = W - ((noob.runT * (520 + spd * 1100) + seed * 1.7) % (W + len));
        c.strokeStyle = 'rgba(255,255,255,' + (0.05 + spd * 0.16).toFixed(3) + ')';
        c.lineWidth = (1.4 + spd * 2.0) * S;
        c.beginPath(); c.moveTo(lx + len, ly); c.lineTo(lx, ly); c.stroke();
      }
      c.restore();
    }
  }

  // near-miss golden edge-flash (fixed to viewport) - sells the close shave
  if (nearMissFlash > 0) {
    var nf = nearMissFlash;
    var vg = c.createRadialGradient(W * 0.5, H * 0.5, H * 0.30, W * 0.5, H * 0.5, H * 0.72);
    vg.addColorStop(0, 'rgba(255,210,77,0)');
    vg.addColorStop(1, 'rgba(255,210,77,' + (0.34 * nf).toFixed(3) + ')');
    c.fillStyle = vg; c.fillRect(0, 0, W, H);
  }

  // the Noob (in-world; the MENU draws its own preview Noob, so skip here on MENU)
  // - inside the camera transform so it stays glued to the ground it runs on.
  if (gs !== 'MENU') {
    c.save();
    c.translate(0, camY);
    // soft contact shadow on the ground line (reads the Noob against the sky + sells height)
    if (noob.onGround || (noob.y < noobBaseY() + 40 * S)) {
      var sh = clamp(1 - (noobBaseY() - noob.y) / (260 * S), 0.25, 1);
      c.fillStyle = 'rgba(0,0,0,' + (0.22 * sh).toFixed(3) + ')';
      c.beginPath();
      c.ellipse(playerX(), groundY() + 6 * S, NOOB_W * 0.46 * S * sh, NOOB_W * 0.16 * S * sh, 0, 0, Math.PI * 2);
      c.fill();
    }
    drawNoob(c, playerX(), noob.y, NOOB_W * S);
    c.restore();
  }

  // start hint
  if (startHintT > 0 && gs === 'PLAYING' && !GF.tutorial.active) {
    c.globalAlpha = clamp(startHintT, 0, 1);
    c.fillStyle = '#fff'; c.font = 'bold ' + clamp(16 * S, 13, 22) + 'px Inter, system-ui, sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(GF.t('tapToJump'), W * 0.5, H * 0.34);
    c.globalAlpha = 1; c.textBaseline = 'alphabetic';
  }

  // HUD
  if (gs === 'PLAYING') drawHUD(c);

  // zone banner
  if (bannerT > 0 && bannerTxt) {
    var a = clamp(bannerT / 0.5, 0, 1);
    c.globalAlpha = a;
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.font = 'bold ' + clamp(20 * S, 16, 30) + 'px Inter, system-ui, sans-serif';
    var bw = c.measureText(bannerTxt).width + 40 * S, bh = clamp(44 * S, 36, 56);
    var bx = W / 2 - bw / 2, by = H * 0.24;
    c.shadowColor = z.accent; c.shadowBlur = 16 * S;
    rr(c, bx, by, bw, bh, 12 * S); c.fillStyle = 'rgba(12,16,30,0.92)'; c.fill();
    c.shadowBlur = 0;
    c.strokeStyle = z.accent; c.lineWidth = 1.5 * S; rr(c, bx, by, bw, bh, 12 * S); c.stroke();
    c.fillStyle = '#fff'; c.fillText(bannerTxt, W / 2, by + bh / 2 + 1);
    c.globalAlpha = 1; c.textBaseline = 'alphabetic';
  }

  // overlays
  if (gs === 'MENU') drawMenu(c);
  else if (gs === 'GAMEOVER') drawGameOver(c);

  // tutorial demo-hand (drawn LAST so it's on top)
  GF.tutorial.draw(c);

  // help (?) card (reference) - over everything
  if (tutorialHelpOpen) drawHelpCard(c);
}

function drawHills(c, z, off, col, baseY, scale) {
  var W = GF.W, H = GF.H, S = GF.S;
  c.fillStyle = col;
  var span = 200 * S * scale;
  var start = -((off % span) + span);
  c.beginPath();
  c.moveTo(start, H);
  for (var x = start; x < W + span; x += span) {
    var hh = (40 + ((Math.sin(x * 0.013 + off * 0.0001) * 0.5 + 0.5)) * 70) * S * scale;
    c.lineTo(x + span * 0.5, baseY - hh);
    c.lineTo(x + span, baseY);
  }
  c.lineTo(W + span, H * 1.6); c.closePath(); c.fill();
}

// drifting soft cloud bands high in the sky - fills the upper void with parallax life
function drawClouds(c, z, off, baseY, scale) {
  var W = GF.W, S = GF.S;
  c.save();
  c.fillStyle = 'rgba(255,255,255,0.13)';
  var span = 260 * S * scale;
  var start = -((off % span) + span);
  for (var x = start; x < W + span; x += span) {
    var cx = x + span * 0.5;
    var cw = 70 * S * scale, ch = 20 * S * scale;
    c.beginPath();
    c.ellipse(cx, baseY, cw, ch, 0, 0, Math.PI * 2);
    c.ellipse(cx - cw * 0.6, baseY + ch * 0.3, cw * 0.55, ch * 0.7, 0, 0, Math.PI * 2);
    c.ellipse(cx + cw * 0.6, baseY + ch * 0.2, cw * 0.6, ch * 0.75, 0, 0, Math.PI * 2);
    c.fill();
  }
  c.restore();
}

function drawLava(c, hz) {
  var S = GF.S, gy = groundY();
  var grad = c.createLinearGradient(0, hz.y, 0, hz.y + hz.h);
  grad.addColorStop(0, '#ffcf3d'); grad.addColorStop(0.4, '#ff6a1a'); grad.addColorStop(1, '#8a1c08');
  c.fillStyle = grad; c.fillRect(hz.x, hz.y, hz.w, hz.h);
  // bubbling top
  c.fillStyle = '#ffe16a';
  for (var b = 0; b < hz.w; b += 14 * S) {
    var by = hz.y + Math.sin(hz.phase + b * 0.1) * 3 * S;
    c.fillRect(hz.x + b, by - 3 * S, 8 * S, 5 * S);
  }
}
function drawSpike(c, hz) {
  var S = GF.S;
  // danger base plate (reads RED = death from across the frame)
  c.fillStyle = '#8a2230'; c.fillRect(hz.x - 2 * S, hz.y - 2 * S, hz.w + 4 * S, 7 * S);
  // bright steel pyramids with a per-tip highlight
  var tips = Math.max(2, Math.round(hz.w / (15 * S)));
  var tw = hz.w / tips;
  for (var i = 0; i < tips; i++) {
    var x0 = hz.x + i * tw;
    c.beginPath();
    c.moveTo(x0, hz.y);
    c.lineTo(x0 + tw * 0.5, hz.y - hz.h);
    c.lineTo(x0 + tw, hz.y);
    c.closePath();
    c.fillStyle = '#d7dbe6'; c.fill();
    c.strokeStyle = '#5a5f6b'; c.lineWidth = 1.5 * S; c.stroke();
    // left-face shade for a 3D read
    c.beginPath();
    c.moveTo(x0, hz.y); c.lineTo(x0 + tw * 0.5, hz.y - hz.h); c.lineTo(x0 + tw * 0.5, hz.y);
    c.closePath(); c.fillStyle = 'rgba(0,0,0,0.16)'; c.fill();
  }
}
function drawSaw(c, hz) {
  var S = GF.S, r = hz.r;
  c.save(); c.translate(hz.x, hz.y); c.rotate(hz.spin);
  c.fillStyle = '#9aa0ad';
  var teeth = 10;
  c.beginPath();
  for (var i = 0; i < teeth * 2; i++) {
    var ang = (i / (teeth * 2)) * Math.PI * 2;
    var rad = (i % 2 === 0) ? r : r * 0.74;
    var px = Math.cos(ang) * rad, py = Math.sin(ang) * rad;
    if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
  }
  c.closePath(); c.fill();
  c.fillStyle = '#c0c5d0'; c.beginPath(); c.arc(0, 0, r * 0.5, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#c0392b'; c.beginPath(); c.arc(0, 0, r * 0.30, 0, Math.PI * 2); c.fill();  // red danger hub
  c.fillStyle = '#7a1d14'; c.beginPath(); c.arc(0, 0, r * 0.12, 0, Math.PI * 2); c.fill();
  c.restore();
}
function drawAxe(c, hz) {
  var S = GF.S;
  var ang = Math.sin(hz.phase) * hz.amp;
  var hx = hz.x + Math.sin(ang) * hz.len, hy = hz.pivotY + Math.cos(ang) * hz.len;
  // chain
  c.strokeStyle = '#6a6f7b'; c.lineWidth = 4 * S;
  c.beginPath(); c.moveTo(hz.x, hz.pivotY); c.lineTo(hx, hy); c.stroke();
  // axe head (blocky double blade)
  c.save(); c.translate(hx, hy); c.rotate(ang);
  c.fillStyle = '#b9bdc8';
  c.beginPath();
  c.moveTo(-hz.r * 1.4, 0); c.lineTo(-hz.r * 0.3, -hz.r * 0.7); c.lineTo(-hz.r * 0.3, hz.r * 0.7); c.closePath(); c.fill();
  c.beginPath();
  c.moveTo(hz.r * 1.4, 0); c.lineTo(hz.r * 0.3, -hz.r * 0.7); c.lineTo(hz.r * 0.3, hz.r * 0.7); c.closePath(); c.fill();
  c.fillStyle = '#5a4a32'; c.fillRect(-hz.r * 0.32, -hz.r * 0.9, hz.r * 0.64, hz.r * 1.8); // handle block
  c.restore();
}
function drawCrush(c, hz) {
  var S = GF.S, cy = (hz._cy != null) ? hz._cy : hz.topY;
  // guide rails (faint, full travel)
  c.fillStyle = 'rgba(0,0,0,0.16)';
  c.fillRect(hz.x - 4 * S, hz.topY, 4 * S, hz.botY - hz.topY + hz.h);
  c.fillRect(hz.x + hz.w, hz.topY, 4 * S, hz.botY - hz.topY + hz.h);
  // heavy STONE block (not muddy orange): grey body + hazard stripe + bevel
  c.fillStyle = '#6b7078'; c.fillRect(hz.x, cy, hz.w, hz.h);
  c.fillStyle = 'rgba(255,255,255,0.10)'; c.fillRect(hz.x, cy, hz.w, 5 * S);          // top light
  c.fillStyle = 'rgba(0,0,0,0.22)'; c.fillRect(hz.x, cy + hz.h - 6 * S, hz.w, 6 * S);  // bottom shade
  // yellow/black hazard band across the face
  c.fillStyle = '#f4c542'; c.fillRect(hz.x, cy + hz.h * 0.34, hz.w, hz.h * 0.26);
  c.fillStyle = '#1c1f26';
  var bw = hz.w / 6;
  for (var k = 0; k < 6; k++) if (k % 2 === 0) c.fillRect(hz.x + k * bw, cy + hz.h * 0.34, bw, hz.h * 0.26);
  // steel teeth on the bottom
  c.fillStyle = '#d7dbe6';
  var tw = hz.w / 5;
  for (var i = 0; i < 5; i++) {
    c.beginPath();
    c.moveTo(hz.x + i * tw, cy + hz.h);
    c.lineTo(hz.x + i * tw + tw * 0.5, cy + hz.h + 12 * S);
    c.lineTo(hz.x + i * tw + tw, cy + hz.h);
    c.closePath(); c.fill();
  }
}

// reusable big button (glow + breathing pulse); pushes a hit-rect to uiButtons
function pushButton(c, label, cxp, cyp, primary, fn) {
  var S = GF.S, W = GF.W;
  var wide = W / GF.H > 1.15;
  var bw = clamp((primary ? 260 : 220) * S, 170, 380), bh = clamp((primary ? 60 : 52) * S, 42, 78);
  var bx = cxp - bw / 2, by = cyp - bh / 2;
  var tnow = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000;
  var k = primary ? Math.sin(tnow * 2.2) : 0, p = 1 + 0.05 * k;
  var dw = bw * p, dh = bh * p, dx2 = cxp - dw / 2, dy2 = cyp - dh / 2;
  var grad = c.createLinearGradient(dx2, dy2, dx2, dy2 + dh);
  if (primary) { grad.addColorStop(0, '#7ed957'); grad.addColorStop(1, '#46a02a'); }
  else { grad.addColorStop(0, '#37425a'); grad.addColorStop(1, '#28324a'); }
  c.save();
  if (primary) { c.shadowColor = 'rgba(126,217,87,' + (0.4 + 0.28 * k).toFixed(3) + ')'; c.shadowBlur = (20 + 10 * k) * S; }
  rr(c, dx2, dy2, dw, dh, dh / 2); c.fillStyle = grad; c.fill();
  c.restore();
  c.fillStyle = '#fff'; c.font = 'bold ' + clamp((primary ? 22 : 18) * S, 14, 30) + 'px Inter, system-ui, sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(label, cxp, cyp + 1);
  c.textBaseline = 'alphabetic';
  uiButtons.push({ x: bx, y: by, w: bw, h: bh, fn: fn });
}

function wrapText(c, text, x, y, maxW, lineH) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  for (var j = 0; j < lines.length; j++) c.fillText(lines[j], x, y + j * lineH);
  return lines.length * lineH;
}

// ── TUTORIAL (animated demo-HAND, action-gated on the real jump) ────────────
function startTutorial() {
  // a hand taps to show JUMP; advances ONLY when jump() calls GF.tutorial.next().
  // Completing the single step marks the tutorial seen (so it shows ONCE, not on
  // every run). No force: respect the seen-flag on replays. The "?" card reopens it.
  GF.tutorial.start([
    { text: GF.t('tut_step_jump'),
      target: function () { return { x: playerX(), y: noobBaseY() - 8 * GF.S, r: 30 * GF.S }; },
      gesture: 'tap', advance: 'manual', onAdvance: markTutorialSeen },
  ], { storageKey: 'noob_run_seen_tut' });
}

// ── INPUT ──────────────────────────────────────────────────────────────────────
function hit(b, x, y) { return x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }
function handlePress(x, y) {
  // help card owns input
  if (tutorialHelpOpen) {
    for (var i = 0; i < uiButtons.length; i++) if (hit(uiButtons[i], x, y)) { uiButtons[i].fn(); return; }
    return;
  }
  // demo-hand tutorial: let its skip pill consume the tap; otherwise fall through
  // to jump() (which calls GF.tutorial.next() - the action-gated advance).
  if (GF.tutorial.active) {
    var b = GF.tutorial._skipBtn;
    if (b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { GF.tutorial.handleClick(x, y); return; }
  }
  // tutorial swallows taps but jump() drives the advance; let it through to jump
  if (gs === 'PLAYING') {
    for (var h = 0; h < hudButtons.length; h++) if (hit(hudButtons[h], x, y)) { hudButtons[h].fn(); return; }
    jump();
    return;
  }
  for (var j = 0; j < uiButtons.length; j++) if (hit(uiButtons[j], x, y)) { Sfx.click(); uiButtons[j].fn(); return; }
}

var canvasEl = document.getElementById('c');
var pointerDownAt = 0, pointerStartY = 0, didDrop = false;
canvasEl.addEventListener('touchstart', function (e) {
  e.preventDefault();
  var t0 = e.changedTouches[0];
  pointerDownAt = Date.now(); pointerStartY = t0.clientY; didDrop = false;
  handlePress(t0.clientX, t0.clientY);
  if (gs === 'PLAYING' && !tutorialHelpOpen) pressHold();   // hold (past threshold) = fast-drop; a quick tap stays a clean jump
}, { passive: false });
canvasEl.addEventListener('touchmove', function (e) {
  e.preventDefault();
  var t0 = e.changedTouches[0];
  if (gs === 'PLAYING' && !didDrop && (t0.clientY - pointerStartY) > 28 * GF.S) { didDrop = true; commitDrop(); }
}, { passive: false });
canvasEl.addEventListener('touchend', function (e) { e.preventDefault(); endDrop(); }, { passive: false });
canvasEl.addEventListener('mousedown', function (e) {
  pointerStartY = e.clientY; didDrop = false;
  handlePress(e.clientX, e.clientY);
  if (gs === 'PLAYING' && !tutorialHelpOpen) pressHold();
});
canvasEl.addEventListener('mouseup', function () { endDrop(); });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

document.addEventListener('keydown', function (e) {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    if (tutorialHelpOpen) return;
    if (gs === 'PLAYING') jump();
    else if (gs === 'GAMEOVER') startRun();
    else if (gs === 'MENU') { if (!seenTutorial) { startRun(); startTutorial(); } else startRun(); }
  } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
    e.preventDefault();
    if (gs === 'PLAYING') commitDrop();
  }
});
document.addEventListener('keyup', function (e) {
  if (e.code === 'ArrowDown' || e.code === 'KeyS') endDrop();
});

// ── SCREENSHOT / TEST HOOKS ──────────────────────────────────────────────────
window._setupForScreenshot = function (level) {
  window._silent = true;
  markTutorialSeen(); tutorialHelpOpen = false;
  startRun();
  var S = GF.S, gy = groundY(), W = GF.W, lv = level || 1;
  // a dense, mid-action state with the later hazards visible (>=70% gameplay)
  dist = 240 + lv * 130;
  worldX = dist * PX_PER_M * S;
  runSpeed = Math.min(MAX_SPEED, RUN_SPEED + lv * 130);
  zoneIdx = Math.floor(dist / ZONE_STEP); prevZoneIdx = zoneIdx;
  // hand-build a guaranteed, readable obstacle layout across the visible band so
  // the screenshot is never empty (random sim can fly hazards off-screen).
  ground = []; hazards = []; gemsArr = [];
  ground.push({ x: -200 * S, w: W * 0.46 + 200 * S });            // runway under the Noob
  // a pit with lava just ahead of the player
  var pitX = W * 0.46, pitW = 92 * S;
  hazards.push({ type:'lava', x: pitX, y: gy + 6 * S, w: pitW, h: 60 * S, phase: 0.4 });
  ground.push({ x: pitX + pitW, w: W * 0.9 });
  // spike cluster
  hazards.push({ type:'spike', x: W * 0.66, y: gy, w: SPIKE_W * S, h: 30 * S });
  hazards.push({ type:'spike', x: W * 0.66 + SPIKE_W * S, y: gy, w: SPIKE_W * S, h: 30 * S });
  // a saw on the ground
  hazards.push({ type:'saw', x: W * 0.86, y: gy - SAW_R * S * 0.2, r: SAW_R * S, spin: 0.6, bob: 0, phase: 0, baseY: gy - SAW_R * S * 0.2 });
  // a swing axe + crusher higher up for variety (unlocked at this distance)
  hazards.push({ type:'axe', x: W * 0.5, pivotY: ceilY(), len: (gy - ceilY()) * 0.66, r: AXE_R * S, ang: 0, amp: 1.1, phase: 0.5, speed: 2.4 });
  hazards.push({ type:'crush', x: W * 1.02, y: ceilY(), w: CRUSHER_W * S, h: 46 * S, topY: ceilY(), botY: gy - 46 * S, t: 0.6, speed: 1.8 });
  lastGroundEndX = W * 1.5; nextSpawnX = W * 1.6;
  // emerald arc over the pit (the jump-and-grab beat)
  var ey = noobBaseY() - 78 * S;
  for (var k = 0; k < 5; k++) gemsArr.push({ x: pitX + 6 * S + k * 30 * S, y: ey - Math.sin(k / 4 * Math.PI) * 30 * S, taken: false });
  // put the Noob mid-jump arcing over the lava toward the emeralds
  noob.onGround = false; noob.vy = -220 * S; noob.y = noobBaseY() - 72 * S; noob.rot = -0.16; noob.jumps = 1;
  mult = Math.min(MULT_MAX, 3); emeralds = 12 + lv * 4; emeraldScore = 240; multPulse = 0.4;
  startHintT = 0; bannerT = 0;   // clean frame for promo capture
  gs = 'PLAYING';
};
window._jumpLevel = function (n) {
  tutorialHelpOpen = false;
  if (n === 99) { if (gs !== 'PLAYING') startRun(); dist = Math.max(dist, 20); gameOver(); return; }
  startRun();
  dist = 100 + (n || 1) * 120; worldX = dist * PX_PER_M * GF.S;
  runSpeed = Math.min(MAX_SPEED, RUN_SPEED + (n || 1) * 90);
  zoneIdx = Math.floor(dist / ZONE_STEP); prevZoneIdx = zoneIdx;
  for (var i = 0; i < 30; i++) update(0.02);
};
window._setLang = function (l) { GF.lang = (l === 'ru' ? 'ru' : 'en'); };
window._setState = function (s) { if (s) gs = s; };
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return 'Inter, system-ui, sans-serif'; };
window.__openTut = function () { tutorialHelpOpen = true; };
window.__closeTut = function () { tutorialHelpOpen = false; };
window.__god = function (v) { godMode = !!v; };   // test-only: survive to inspect late-game spawns
// ── PLAYTEST SEAMS (test-only; never used by gameplay) ──────────────────────
window.__nrDbg = function () {
  return {
    gs: gs, dist: Math.floor(dist), runSpeed: runSpeed, mult: mult, emeralds: emeralds,
    onGround: noob.onGround, jumps: noob.jumps, noobY: noob.y, vy: noob.vy,
    baseY: noobBaseY(), groundY: groundY(), px: playerX(), S: GF.S, W: GF.W, H: GF.H,
    hazards: hazards.length, gems: gemsArr.length,
  };
};
window.__nrRestart = function () { startRun(); };
// A competent autopilot: scans the ground/hazards ahead of the run column and
// returns {jump,dbl,drop}. Used ONLY by the headless playtest to prove the
// game is survivable with skilled timing (fairness) and to drive long runs.
window.__nrAI = function () {
  if (gs !== 'PLAYING') return { jump:false, dbl:false, drop:false };
  var S = GF.S, px = playerX(), out = { jump:false, dbl:false, drop:false };
  var look = px + Math.max(90, runSpeed * 0.30) * S;   // reaction window scales with speed
  // 1) pit ahead? find nearest gap edge in [px, look]
  var floorAtLook = groundUnder(look);
  var floorNow = groundUnder(px + 6 * S);
  // find right edge of the ground span we're on / approaching → distance to pit
  var pitEdge = null;
  for (var step = 0; step < 40; step++) {
    var sx = px + step * 8 * S;
    if (sx > look) break;
    if (!groundUnder(sx)) { pitEdge = sx; break; }
  }
  // 2) nearest deadly ground hazard ahead (spike/saw/lava/crush low)
  var hzAhead = null;
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    var hx = h.x, hw = h.w || (h.r ? h.r * 2 : 30 * S);
    if (hx + hw < px) continue;
    if (hx > look + 40 * S) continue;
    // only count hazards that occupy the run lane low enough to need a jump
    if (h.type === 'spike' || h.type === 'saw' || h.type === 'lava') {
      if (hzAhead === null || hx < hzAhead.x) hzAhead = h;
    } else if (h.type === 'crush') {
      // jump only when it's near the floor (down); else run under
      var tt = (Math.sin(h.t) * 0.5 + 0.5);
      if (tt > 0.45 && (hzAhead === null || hx < hzAhead.x)) hzAhead = h;
    }
  }
  var threatX = null;
  if (pitEdge !== null) threatX = pitEdge;
  if (hzAhead) threatX = (threatX === null) ? hzAhead.x : Math.min(threatX, hzAhead.x);
  if (threatX !== null && noob.onGround) {
    var dxToThreat = threatX - px;
    if (dxToThreat < Math.max(70, runSpeed * 0.24) * S) out.jump = true;   // jump in time
  }
  // double-jump if airborne, descending, and a threat (esp. a wide pit) is still ahead under us
  if (!noob.onGround && noob.jumps < 2 && noob.vy > 0) {
    var stillPit = !groundUnder(px) && !groundUnder(px + 30 * S);
    if (stillPit) out.dbl = true;
  }
  // axes / high crushers: never drop here; keep it simple
  return out;
};

// ── BOOT ──────────────────────────────────────────────────────────────────────
loadProgress();

GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: [],
  saveKey: 'noob_run',
  onReady: function () {
    // Yandex 1.9 - persist run context across reload. A live run bounces to MENU
    // (safe entry); best/gems persist in their own keys.
    GF.persist('noob_run_run_v1',
      function () { return { gs: (gs === 'PLAYING' ? 'MENU' : gs) }; },
      function (s) { if (!s) return; gs = 'MENU'; }
    );
    if (gs === 'PLAYING') gs = 'MENU';

    var headless = false;
    try {
      headless = (navigator.webdriver === true) || window._silent ||
        (location && location.search && /[?&]notut(=|&|$)/.test(location.search)) ||
        (location && location.protocol === 'file:');
    } catch (e) {}

    // procedural arcade music bed (factory baseline). Starts on first gesture;
    // mirrors the mute pill (toggleMute also calls GF.setMusicMuted).
    GF.startMusic({ preset: 'arcade', muted: audioMuted });

    // Platform builds (Yandex/CrazyGames) inject window.__GF_AUTOSTART → drop the
    // player STRAIGHT into a run (no menu/title/tutorial landing). Gallery build
    // doesn't set the flag and keeps its menu. Never during screenshot runs.
    if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU') {
      startRun();
      if (!seenTutorial) startTutorial();   // demo-hand still teaches on first platform play
    }

    GF.exposeState(function () {
      return {
        gs: gs,
        dist: Math.floor(dist), distance: Math.floor(dist), score: Math.floor(dist) + emeraldScore,
        emeralds: emeralds, mult: mult, chain: chain,
        bestDist: bestDist, zoneIdx: zoneIdx,
        runSpeed: Math.round(runSpeed), onGround: noob.onGround, jumps: noob.jumps,
        hazards: hazards.length, gems: gemsArr.length, groundSpans: ground.length,
        seenTutorial: seenTutorial, tutorialActive: GF.tutorial.active,
        // hazard-types currently unlocked at this distance (loop-depth proof)
        unlocked: unlocked(),
        hazardTypes: (function () { var s = {}; for (var i = 0; i < hazards.length; i++) s[hazards[i].type] = 1; return Object.keys(s); })(),
        RUN_SPEED: RUN_SPEED, SPEED_RAMP: SPEED_RAMP, MAX_SPEED: MAX_SPEED,
        GRAVITY: GRAVITY, JUMP_V: JUMP_V, DBL_JUMP_V: DBL_JUMP_V, FAST_DROP_A: FAST_DROP_A,
        GROUP_GAP: GROUP_GAP, GAP_MIN: GAP_MIN, EMERALD_RATE: EMERALD_RATE,
        ZONE_STEP: ZONE_STEP, MULT_MAX: MULT_MAX,
        NOOB_W: NOOB_W, NOOB_H: NOOB_H, EMERALD_R: EMERALD_R, PX_PER_M: PX_PER_M,
      };
    });
  },
  onUpdate: update,
  onDraw: draw,
});

// ── YANDEX MUST-HAVES (do not remove) ─────────────────────────────────────────
// 1. All UI text via GF.t()/STRINGS (en+ru). 2. Run state persisted via
// GF.persist + saveRun() after transitions. 3. Fullscreen/orientation resize
// handled in gf-lib. 4. No ads in this build → no auto-fire ad risk. No console.*.
})();
</script>
