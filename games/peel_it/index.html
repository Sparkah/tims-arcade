<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function () {
'use strict';

// ── LOCALISED STRINGS ──────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Peel It!',
    sub: 'Peel the film off till it gleams',
    play: 'PLAY', retry: 'RETRY', next: 'NEXT', again: 'PLAY AGAIN',

    cleared: 'GLEAMING!', torn: 'TORN!', won: 'ALL GLEAMING!',

    drag_corner: 'Drag from the glowing corner',

    obj_phone: 'Phone', obj_watch: 'Smartwatch', obj_buds: 'Earbuds Case',
    obj_tablet: 'Tablet', obj_glasses: 'Sunglasses', obj_console: 'Handheld',
    obj_camera: 'Camera', obj_laptop: 'Laptop',

    tut_controls: 'Controls: Drag from the glowing corner along the dotted guide to peel.',

    tut_lose: 'Lose: 3 tears on one gadget, peel too fast or off the guide and it rips.',
    tut_tip: 'Tip: Slow, on-line drags earn 3 stars; stars buy steadier-hand upgrades.',
    howto: 'HOW TO PLAY', close: 'GOT IT',
  },
  ru: {
    title: 'Peel It!',
    sub: 'Сними плёнку до блеска',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ', next: 'ДАЛЬШЕ', again: 'СНАЧАЛА',
    level: 'УРОВЕНЬ', clean: 'ЧИСТО', coins: 'Монеты',
    cleared: 'СИЯЕТ!', torn: 'ПОРВАЛОСЬ!', won: 'ВСЁ СИЯЕТ!',
    stars: 'Звёзды', upgrade: 'УЛУЧШИТЬ', maxed: 'ВСЕ УЛУЧШЕНИЯ КУПЛЕНЫ',
    up_tolerance: 'Твёрдая рука', up_speed: 'Быстрый съём', up_auto: 'Авто-разглад',
    drag_corner: 'Тяните от светящегося угла',
    along_guide: 'Ведите вдоль пунктира, медленно и ровно',
    wipe_dust: 'Сотрите пыль',
    tears_used: 'Разрывов', total_coins: 'Всего монет',
    layer_film: 'Плёнка', layer_sticker: 'Наклейка', layer_dust: 'Пыль',
    obj_phone: 'Телефон', obj_watch: 'Часы', obj_buds: 'Кейс наушников',
    obj_tablet: 'Планшет', obj_glasses: 'Очки', obj_console: 'Консоль',
    obj_camera: 'Камера', obj_laptop: 'Ноутбук',
    tut_goal: 'Цель: Снимите все слои с гаджета, пока он не засияет на 100%.',
    tut_controls: 'Управление: Тяните от светящегося угла вдоль пунктира, чтобы отклеить.',
    tut_win: 'Победа: Очистите все слои на всех 8 гаджетах, не порвав плёнку.',
    tut_lose: 'Поражение: 3 разрыва на одном гаджете, рвёте, если тянете быстро или криво.',
    tut_tip: 'Совет: Медленные ровные движения дают 3 звезды; звёзды на улучшения.',
    howto: 'КАК ИГРАТЬ', close: 'ПОНЯТНО',
  },
};

var SPRITE_NAMES = [];

// ── TUNABLES (DESIGN.md — keep in sync) ──────────────────────────────────────
var TEAR_TOLERANCE_DEG = 32;     // max drag deviation from guide tangent before a tear
var MAX_PEEL_SPEED     = 900;    // design-px/sec; faster drag while peeling = tear
var CLEAN_TARGET_PCT   = 100;    // % of every layer that must be removed to clear
var MAX_TEARS          = 3;      // tears on an object before GAMEOVER
var TOTAL_OBJECTS      = 8;      // levels; clearing #8 = WON
var STAR_THRESHOLDS    = [0, 1, 2]; // tears used -> stars: 0->3*, 1->2*, 2->1*, 3->fail
var PEEL_REVEAL_RATE   = 1.0;    // progress per px of on-guide drag (scaled by path len)
var UPGRADE_COSTS      = { tolerance: 4, speed: 5, autoflatten: 7 };
var COIN_PER_STAR      = 2;      // coins per star on object clear
var START_CORNER_R     = 46;     // design-px tap radius to begin peeling a layer
var GUIDE_HIT_W        = 70;     // design-px half-width band around the guide

// Per-level definitions. layers listed start->finish (top covering peeled first).
// corner index 0..3 = TL, TR, BR, BL of the gadget rect.
var LEVELS = [
  { obj: 'phone',   shape: 'phone',   layers: ['film', 'sticker'] },
  { obj: 'watch',   shape: 'watch',   layers: ['film', 'sticker'] },
  { obj: 'buds',    shape: 'buds',    layers: ['film', 'dust'] },
  { obj: 'tablet',  shape: 'tablet',  layers: ['film', 'sticker', 'dust'] },
  { obj: 'glasses', shape: 'glasses', layers: ['film', 'dust'] },
  { obj: 'console', shape: 'console', layers: ['film', 'sticker', 'dust'] },
  { obj: 'camera',  shape: 'camera',  layers: ['film', 'sticker', 'dust'] },
  { obj: 'laptop',  shape: 'laptop',  layers: ['film', 'sticker', 'dust'] },
];
// difficulty ramp: later levels rotate the guide angle to a more awkward
// diagonal.
var LEVEL_DIAG = [0.10, 0.16, 0.20, 0.26, 0.32, 0.38, 0.44, 0.52];

// ── META / UPGRADES (persisted) ─────────────────────────────────────────────
var coins = 0;
var upgTolerance = 0;   // 0..3 each adds +6 deg tolerance
var upgSpeed = 0;       // 0..3 each adds +220 max peel speed
var upgAuto = 0;        // 0/1 auto-flatten: small auto progress assist while peeling

// ── GAME STATE ───────────────────────────────────────────────────────────────
var gs = 'MENU';        // MENU | PLAYING | LEVELEND | GAMEOVER | WON
var level = 1;
var tears = 0;
var starsEarned = 0;
var lastCoinsEarned = 0;

// current object geometry (screen px)
var objX = 0, objY = 0, objW = 0, objH = 0, objR = 0;
var layerDefs = [];     // [{type, prog(0..1), corner, diag}]
var activeLayer = 0;    // index of layer currently being peeled
var cleanPct = 0;       // 0..100 over all layers of current object

// drag state
var peeling = false;
var peelLayerIdx = -1;
var lastPX = 0, lastPY = 0, lastMoveTs = 0;
var peelSpeedAvg = 0;   // smoothed drag speed (design-px/sec) to avoid twitchy tears
var peelGrabProg = 0;   // progress at the moment of the current grab (grace baseline)
var moveCount = 0;      // moves since grab — first couple are noisy, give grace
var dragDirX = 0, dragDirY = 0;  // smoothed drag direction for tolerance checks
var tearFlash = 0;
var promptPulse = 0;
var revealedAt = -1;    // marks object fully clean (so clear fires once)

// layout (recomputed on resize)
var layout = { helpBtn: null };

// ── AUDIO (WebAudio peel + chime, no external files) ─────────────────────────
var actx = null, audioOn = true;
function ensureAudio() {
  if (actx) return;
  try {
    var AC = window.AudioContext || window.webkitAudioContext;
    if (AC) actx = new AC();
  } catch (e) { actx = null; }
}
function peelTick(intensity) {
  if (!actx || !audioOn) return;
  try {
    var dur = 0.05;
    var n = Math.floor(actx.sampleRate * dur);
    var buf = actx.createBuffer(1, n, actx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) { d[i] = (Math.random() * 2 - 1) * (1 - i / n); }
    var src = actx.createBufferSource(); src.buffer = buf;
    var flt = actx.createBiquadFilter(); flt.type = 'bandpass';
    flt.frequency.value = 1400 + intensity * 1200; flt.Q.value = 0.8;
    var g = actx.createGain(); g.gain.value = 0.10 + 0.06 * intensity;
    src.connect(flt); flt.connect(g); g.connect(actx.destination);
    src.start();
  } catch (e) {}
}
function chime(freq) {
  if (!actx || !audioOn) return;
  try {
    var o = actx.createOscillator(); var g = actx.createGain();
    o.type = 'sine'; o.frequency.value = freq || 880;
    g.gain.setValueAtTime(0.0001, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.18, actx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.42);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + 0.45);
  } catch (e) {}
}
function tearSound() {
  if (!actx || !audioOn) return;
  try {
    var o = actx.createOscillator(); var g = actx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(420, actx.currentTime);
    o.frequency.exponentialRampToValueAtTime(90, actx.currentTime + 0.18);
    g.gain.setValueAtTime(0.16, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.22);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + 0.24);
  } catch (e) {}
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function effTolerance() { return TEAR_TOLERANCE_DEG + upgTolerance * 6; }
function effMaxSpeed()  { return MAX_PEEL_SPEED + upgSpeed * 220; }

function layerColor(type) {
  if (type === 'film')    return { a: 'rgba(120,200,255,0.42)', b: 'rgba(80,150,220,0.30)' };
  if (type === 'sticker') return { a: 'rgba(255,235,180,0.95)', b: 'rgba(235,200,120,0.95)' };
  return { a: 'rgba(150,150,150,0.55)', b: 'rgba(110,110,110,0.45)' };  // dust
}
function layerLabelKey(type) {
  return type === 'film' ? 'layer_film' : (type === 'sticker' ? 'layer_sticker' : 'layer_dust');
}

// Corner coords for index 0..3 (TL,TR,BR,BL) of object rect, screen px.
function cornerXY(idx) {
  if (idx === 0) return [objX, objY];
  if (idx === 1) return [objX + objW, objY];
  if (idx === 2) return [objX + objW, objY + objH];
  return [objX, objY + objH];
}

// Build layer geometry for the current level.
function buildLevel(lv) {
  var L = LEVELS[lv - 1];
  layerDefs = [];
  var diag = LEVEL_DIAG[lv - 1] || 0.1;
  for (var i = 0; i < L.layers.length; i++) {
    var corner = (i % 2 === 0) ? 0 : 1;  // alternate TL / TR start corner
    layerDefs.push({ type: L.layers[i], prog: 0, corner: corner, diag: diag });
  }
  activeLayer = 0;
  tears = 0;
  cleanPct = 0;
  peeling = false;
  peelLayerIdx = -1;
  revealedAt = -1;
}

// Compute guide endpoints (screen px) for a layer based on its corner + diag.
function guidePoints(ld) {
  var c = cornerXY(ld.corner);
  var ax = c[0], ay = c[1];
  var bx, by;
  if (ld.corner === 0) {            // TL -> toward lower-right area
    bx = objX + objW; by = objY + objH * (0.45 + ld.diag);
  } else {                           // TR -> toward lower-left area
    bx = objX; by = objY + objH * (0.45 + ld.diag);
  }
  return [ax, ay, bx, by];
}

// ── LIFECYCLE ────────────────────────────────────────────────────────────────
function startGame() {
  ensureAudio();
  level = 1;
  buildLevel(level);
  recomputeLayout();
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}
function startLevel(lv) {
  level = GF.clamp(lv, 1, TOTAL_OBJECTS);
  buildLevel(level);
  recomputeLayout();
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}
function clearObject() {
  var used = tears;
  var st;
  if (used <= STAR_THRESHOLDS[0]) st = 3;
  else if (used <= STAR_THRESHOLDS[1]) st = 2;
  else if (used <= STAR_THRESHOLDS[2]) st = 1;
  else st = 0;
  starsEarned = st;
  lastCoinsEarned = st * COIN_PER_STAR;
  coins += lastCoinsEarned;
  chime(1046);
  GF.spawnFloat(GF.cx, objY + objH * 0.4, '+' + lastCoinsEarned + ' coins', '#ffd34d');
  GF.spawnParticles(GF.cx, objY + objH * 0.4, '#ffe08a', 30);
  GF.setShake(0.4);
  if (level >= TOTAL_OBJECTS) { gs = 'WON'; GF.gameEnded(); GF.happytime(); }
  else { gs = 'LEVELEND'; GF.gameEnded(); }
  GF.saveRun();
}
function nextLevel() {
  if (level >= TOTAL_OBJECTS) { startGame(); return; }
  startLevel(level + 1);
}
function retryLevel() {
  buildLevel(level);
  recomputeLayout();
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}
function addTear() {
  tears++;
  tearFlash = 1;
  tearSound();
  GF.setShake(0.6);
  GF.spawnParticles(lastPX, lastPY, '#ff7676', 16);
  if (tears >= MAX_TEARS) { gs = 'GAMEOVER'; GF.gameEnded(); }
  GF.saveRun();
}
function buyUpgrade(kind) {
  var cost = UPGRADE_COSTS[kind];
  if (coins < cost) return;
  if (kind === 'tolerance' && upgTolerance >= 3) return;
  if (kind === 'speed' && upgSpeed >= 3) return;
  if (kind === 'autoflatten' && upgAuto >= 1) return;
  coins -= cost;
  if (kind === 'tolerance') upgTolerance++;
  else if (kind === 'speed') upgSpeed++;
  else if (kind === 'autoflatten') upgAuto++;
  chime(660);
  GF.saveRun();
}

// Screenshot hook — populated mid-peel state with a big curled flap.
// A value > TOTAL_OBJECTS lands on the WON terminal so the runtime gate can
// verify a terminal state is reachable.
window._jumpLevel = function (n) {
  if (n && n > TOTAL_OBJECTS) {
    // drive a real terminal state so the runtime gate can verify reachability
    // + exercise the post-terminal RETRY button
    level = 1; buildLevel(level); recomputeLayout();
    tears = MAX_TEARS; gs = 'GAMEOVER';
    return;
  }
  startLevel(n || 4);
  if (layerDefs.length) {
    layerDefs[0].prog = 0.55;   // big flap mid-peel
    recomputeClean();
  }
};
window._setupForScreenshot = function (n) { window._jumpLevel(n || 4); };

// ── UPDATE ─────────────────────────────────────────────────────────────────
function update(dt) {
  promptPulse += dt;
  if (tearFlash > 0) tearFlash = Math.max(0, tearFlash - dt * 2.2);
  if (gs !== 'PLAYING') return;

  // auto-flatten assist: tiny passive progress on the active layer while peeling
  if (upgAuto > 0 && peeling && peelLayerIdx === activeLayer) {
    var ld = layerDefs[activeLayer];
    if (ld && ld.prog > 0.02 && ld.prog < 0.999) {
      ld.prog = Math.min(1, ld.prog + dt * 0.05);
      recomputeClean();
    }
  }
}

function recomputeClean() {
  if (!layerDefs.length) { cleanPct = 0; return; }
  var sum = 0;
  for (var i = 0; i < layerDefs.length; i++) sum += layerDefs[i].prog;
  cleanPct = (sum / layerDefs.length) * 100;
  // advance active-layer pointer past finished layers
  while (activeLayer < layerDefs.length && layerDefs[activeLayer].prog >= 0.999) {
    activeLayer++;
    if (activeLayer < layerDefs.length) chime(784);
  }
  if (activeLayer >= layerDefs.length && cleanPct >= CLEAN_TARGET_PCT - 0.1) {
    if (revealedAt < 0) { revealedAt = 1; clearObject(); }
  }
}

// ── INPUT ──────────────────────────────────────────────────────────────────
function hitHelp(x, y) {
  var b = layout.helpBtn;
  if (!b) return false;
  return x >= b.x && x <= b.x + b.s && y >= b.y && y <= b.y + b.s;
}
function hitOverlay(x, y) {
  for (var i = 0; i < overlayBtns.length; i++) {
    var b = overlayBtns[i].b;
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { overlayBtns[i].fn(); return true; }
  }
  return false;
}

function pointerDown(x, y) {
  ensureAudio();
  if (tutorialOpen) { hitOverlay(x, y); return; }
  if (gs === 'MENU' || gs === 'LEVELEND' || gs === 'GAMEOVER' || gs === 'WON') { hitOverlay(x, y); return; }
  if (gs !== 'PLAYING') return;
  if (hitHelp(x, y)) { tutorialOpen = true; return; }
  if (activeLayer >= layerDefs.length) return;
  var ld = layerDefs[activeLayer];
  var c = cornerXY(ld.corner);
  var r = START_CORNER_R * GF.S;
  var near = GF.dist(x, y, c[0], c[1]) <= r * 1.8;
  // allow grabbing once a peel is underway too
  if (near || ld.prog > 0.01) {
    peeling = true;
    peelLayerIdx = activeLayer;
    lastPX = x; lastPY = y; lastMoveTs = performance.now();
    peelSpeedAvg = 0;
    peelGrabProg = ld.prog;   // grace baseline for the first lift of this grab
    moveCount = 0;
    // seed drag direction with the guide direction so the first checks are sane
    var gp0 = guidePoints(ld);
    var gdx0 = gp0[2] - gp0[0], gdy0 = gp0[3] - gp0[1];
    var gl0 = Math.sqrt(gdx0 * gdx0 + gdy0 * gdy0) || 1;
    dragDirX = gdx0 / gl0; dragDirY = gdy0 / gl0;
  }
}

function pointerMove(x, y) {
  if (gs !== 'PLAYING' || !peeling || peelLayerIdx !== activeLayer) { lastPX = x; lastPY = y; return; }
  var ld = layerDefs[activeLayer];
  var gp = guidePoints(ld);
  var ax = gp[0], ay = gp[1], bx = gp[2], by = gp[3];
  var gdx = bx - ax, gdy = by - ay;
  var glen = Math.sqrt(gdx * gdx + gdy * gdy) || 1;
  var ux = gdx / glen, uy = gdy / glen;        // unit along guide

  var now = performance.now();
  var ddt = Math.max(0.001, (now - lastMoveTs) / 1000);
  var movePx = GF.dist(x, y, lastPX, lastPY) / GF.S;     // design px moved
  var instSpeed = movePx / ddt;                           // design-px/sec
  // smooth so a single fast frame / synthetic jump doesn't instantly tear
  peelSpeedAvg = peelSpeedAvg * 0.6 + instSpeed * 0.4;
  var speed = peelSpeedAvg;

  var relx = x - ax, rely = y - ay;
  var alongPx = (relx * ux + rely * uy);                 // screen px along guide
  var perpPx = Math.abs(relx * uy - rely * ux) / GF.S;   // deviation in design px
  var newProg = GF.clamp(alongPx / glen, 0, 1);
  // snap to fully-peeled once the front nears the end so the player doesn't
  // need pixel-perfect placement at the far corner to finish the layer.
  if (newProg >= 0.95) newProg = 1;

  moveCount++;
  var advancing = newProg > ld.prog + 0.0005;
  if (advancing) {
    // smoothed drag direction (accumulated, not single-frame) so genuine
    // continuous drags don't false-trigger on per-frame jitter
    var ddx = x - lastPX, ddy = y - lastPY;
    var dlen = Math.sqrt(ddx * ddx + ddy * ddy);
    if (dlen > 1) { dragDirX = dragDirX * 0.55 + (ddx / dlen) * 0.45; dragDirY = dragDirY * 0.55 + (ddy / dlen) * 0.45; }
    var ddl = Math.sqrt(dragDirX * dragDirX + dragDirY * dragDirY) || 1;
    var devDeg = Math.acos(GF.clamp((dragDirX * ux + dragDirY * uy) / ddl, -1, 1)) * 180 / Math.PI;
    // grace: the first lift of a grab is inherently noisy — only the hard
    // off-object band applies until the peel is established.
    var inGrace = (moveCount <= 3) || (newProg - peelGrabProg < 0.06);
    // tolerance band: perpendicular distance from the guide line is the
    // primary "off the dotted line" signal; angle + speed are secondary.
    var perpBand = GUIDE_HIT_W + upgTolerance * 14;       // upgrade widens band
    var tol = effTolerance();
    var tore = false;
    if (perpPx > perpBand) tore = true;                    // strayed off the line
    else if (!inGrace && devDeg > tol && perpPx > perpBand * 0.5) tore = true;  // wrong direction AND drifting
    else if (!inGrace && speed > effMaxSpeed()) tore = true;

    if (tore) {
      addTear();
      ld.prog = Math.max(0, ld.prog - 0.06);
      peeling = false;
      peelLayerIdx = -1;
      recomputeClean();
    } else {
      var prev = ld.prog;
      ld.prog = newProg;
      if (ld.prog - prev > 0.015) peelTick(GF.clamp((ld.prog - prev) * 6, 0, 1));
      if (ld.type === 'dust' && ld.prog - prev > 0.01) GF.spawnParticles(x, y, 'rgba(180,180,180,0.9)', 3);
      recomputeClean();
    }
  }
  lastPX = x; lastPY = y; lastMoveTs = now;
}

function pointerUp() {
  peeling = false;
  peelLayerIdx = -1;
}

GF.canvas.addEventListener('mousedown', function (e) { pointerDown(e.clientX, e.clientY); });
GF.canvas.addEventListener('mousemove', function (e) { pointerMove(e.clientX, e.clientY); });
window.addEventListener('mouseup', function () { pointerUp(); });
GF.canvas.addEventListener('touchstart', function (e) {
  if (!e.changedTouches || !e.changedTouches.length) return;
  e.preventDefault();
  var t = e.changedTouches[0];
  pointerDown(t.clientX, t.clientY);
}, { passive: false });
GF.canvas.addEventListener('touchmove', function (e) {
  if (!e.changedTouches || !e.changedTouches.length) return;
  e.preventDefault();
  var t = e.changedTouches[0];
  pointerMove(t.clientX, t.clientY);
}, { passive: false });
GF.canvas.addEventListener('touchend', function (e) { e.preventDefault(); pointerUp(); }, { passive: false });
GF.canvas.addEventListener('touchcancel', function () { pointerUp(); });

// ── LAYOUT ───────────────────────────────────────────────────────────────────
function recomputeLayout() {
  var W = GF.W, H = GF.H;
  var margin = GF.clamp(40 * GF.S, 20, 70);
  var maxW = Math.min(W - margin * 2, 560 * GF.S);
  objW = maxW;
  objH = Math.min(objW * 1.18, H * 0.52);
  objW = Math.min(objW, objH / 1.18);
  objX = (W - objW) / 2;
  objY = H * 0.26;
  objR = GF.clamp(28 * GF.S, 14, 40);
  var hs = GF.clamp(34 * GF.S, 26, 46);
  // help button: right-of-center, NOT a corner — reachable with a thumb
  layout.helpBtn = { x: W / 2 + GF.clamp(96 * GF.S, 70, 150), y: GF.clamp(14 * GF.S, 8, 24), s: hs };
}
window.addEventListener('resize', function () { recomputeLayout(); });
window.addEventListener('orientationchange', function () { setTimeout(recomputeLayout, 80); });

// ── DRAW ─────────────────────────────────────────────────────────────────────
function draw(c) {
  var W = GF.W, H = GF.H;
  var bg = c.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1b2230'); bg.addColorStop(0.55, '#141a26'); bg.addColorStop(1, '#0e131c');
  c.fillStyle = bg; c.fillRect(0, 0, W, H);

  if (gs === 'PLAYING' || gs === 'LEVELEND' || gs === 'GAMEOVER' || gs === 'WON') drawGadget(c);
  if (gs === 'PLAYING') {
    drawHUD(c);
    drawHelpBtn(c);
    if (tearFlash > 0) { c.fillStyle = 'rgba(255,60,60,' + (tearFlash * 0.28) + ')'; c.fillRect(0, 0, W, H); }
  }
  if (tutorialOpen) { drawTutorialPanel(c); return; }
  if (gs === 'MENU') drawMenu(c);
  if (gs === 'LEVELEND') drawLevelEnd(c);
  if (gs === 'GAMEOVER') drawGameOver(c);
  if (gs === 'WON') drawWon(c);
}

function drawGadget(c) {
  // drop shadow
  c.save();
  c.shadowColor = 'rgba(0,0,0,0.5)'; c.shadowBlur = 30 * GF.S; c.shadowOffsetY = 14 * GF.S;
  GF.rr(c, objX, objY, objW, objH, objR);
  c.fillStyle = '#0c1018'; c.fill();
  c.restore();

  // gleaming revealed surface (the "after")
  var g = c.createLinearGradient(objX, objY, objX + objW, objY + objH);
  g.addColorStop(0, '#3a4659'); g.addColorStop(0.45, '#5b7088'); g.addColorStop(1, '#28323f');
  GF.rr(c, objX, objY, objW, objH, objR);
  c.fillStyle = g; c.fill();
  drawGadgetDetail(c);

  // gloss streak on the revealed part
  c.save();
  GF.rr(c, objX, objY, objW, objH, objR); c.clip();
  var gl = c.createLinearGradient(objX, objY, objX + objW * 0.6, objY + objH * 0.6);
  gl.addColorStop(0, 'rgba(255,255,255,0.28)'); gl.addColorStop(0.3, 'rgba(255,255,255,0.06)'); gl.addColorStop(1, 'rgba(255,255,255,0)');
  c.fillStyle = gl; c.fillRect(objX, objY, objW, objH);
  c.restore();

  // draw remaining layers from deepest up to active so flap renders last
  for (var i = layerDefs.length - 1; i >= 0; i--) {
    if (i < activeLayer) continue;  // fully peeled
    drawLayer(c, layerDefs[i], i === activeLayer);
  }

  // outline
  GF.rr(c, objX, objY, objW, objH, objR);
  c.strokeStyle = 'rgba(255,255,255,0.18)'; c.lineWidth = 2 * GF.S; c.stroke();
}

function drawGadgetDetail(c) {
  var L = LEVELS[level - 1]; if (!L) return;
  c.save();
  GF.rr(c, objX, objY, objW, objH, objR); c.clip();
  var shape = L.shape;
  c.strokeStyle = 'rgba(255,255,255,0.12)'; c.lineWidth = 2 * GF.S;
  c.fillStyle = 'rgba(255,255,255,0.07)';
  if (shape === 'phone' || shape === 'tablet') {
    var cw = objW * 0.22, ch = objW * 0.22;
    GF.rr(c, objX + objW * 0.08, objY + objH * 0.05, cw, ch, 12 * GF.S); c.fill(); c.stroke();
    c.beginPath(); c.arc(objX + objW * 0.08 + cw * 0.32, objY + objH * 0.05 + ch * 0.32, cw * 0.16, 0, 7); c.fillStyle = 'rgba(0,0,0,0.35)'; c.fill();
  } else if (shape === 'watch') {
    c.beginPath(); c.arc(objX + objW / 2, objY + objH / 2, objW * 0.32, 0, 7); c.fillStyle = 'rgba(0,0,0,0.25)'; c.fill(); c.stroke();
  } else if (shape === 'buds') {
    c.beginPath(); c.ellipse(objX + objW * 0.35, objY + objH * 0.5, objW * 0.13, objH * 0.18, 0, 0, 7); c.fill(); c.stroke();
    c.beginPath(); c.ellipse(objX + objW * 0.65, objY + objH * 0.5, objW * 0.13, objH * 0.18, 0, 0, 7); c.fill(); c.stroke();
  } else if (shape === 'glasses') {
    c.beginPath(); c.ellipse(objX + objW * 0.3, objY + objH * 0.5, objW * 0.18, objH * 0.14, 0, 0, 7); c.stroke();
    c.beginPath(); c.ellipse(objX + objW * 0.7, objY + objH * 0.5, objW * 0.18, objH * 0.14, 0, 0, 7); c.stroke();
    c.beginPath(); c.moveTo(objX + objW * 0.48, objY + objH * 0.5); c.lineTo(objX + objW * 0.52, objY + objH * 0.5); c.stroke();
  } else if (shape === 'console') {
    GF.rr(c, objX + objW * 0.2, objY + objH * 0.18, objW * 0.6, objH * 0.42, 14 * GF.S); c.fill(); c.stroke();
    c.beginPath(); c.arc(objX + objW * 0.16, objY + objH * 0.72, objW * 0.07, 0, 7); c.stroke();
  } else if (shape === 'camera') {
    c.beginPath(); c.arc(objX + objW / 2, objY + objH * 0.52, objW * 0.26, 0, 7); c.fillStyle = 'rgba(0,0,0,0.3)'; c.fill(); c.stroke();
    c.beginPath(); c.arc(objX + objW / 2, objY + objH * 0.52, objW * 0.13, 0, 7); c.stroke();
  } else if (shape === 'laptop') {
    GF.rr(c, objX + objW * 0.12, objY + objH * 0.1, objW * 0.76, objH * 0.6, 8 * GF.S); c.fill(); c.stroke();
    c.fillStyle = 'rgba(255,255,255,0.05)'; c.fillRect(objX + objW * 0.1, objY + objH * 0.78, objW * 0.8, objH * 0.12);
  }
  c.restore();
}

// Draw one covering layer: covering only fills the UN-peeled half-plane (beyond
// the peel front), the revealed gleam shows through the rest, and a curled flap
// folds back over the revealed area from the front line.
function drawLayer(c, ld, isActive) {
  var gp = guidePoints(ld);
  var ax = gp[0], ay = gp[1], bx = gp[2], by = gp[3];

  var ux = bx - ax, uy = by - ay;
  var glen = Math.sqrt(ux * ux + uy * uy) || 1;
  ux /= glen; uy /= glen;
  var px = -uy, py = ux;                         // perpendicular
  var frontDist = ld.prog * glen;
  var fx = ax + ux * frontDist, fy = ay + uy * frontDist;
  var big = (objW + objH) * 1.2;

  // 1) covering — clipped to the un-peeled half-plane (front line -> b side)
  if (ld.prog < 0.999) {
    c.save();
    GF.rr(c, objX, objY, objW, objH, objR); c.clip();
    // half-plane on the far side of the front line (toward b)
    c.beginPath();
    c.moveTo(fx + px * big, fy + py * big);
    c.lineTo(fx - px * big, fy - py * big);
    c.lineTo(fx - px * big + ux * big, fy - py * big + uy * big);
    c.lineTo(fx + px * big + ux * big, fy + py * big + uy * big);
    c.closePath();
    c.clip();
    drawCovering(c, ld);
    c.restore();
  }

  // 2) bright reveal sheen along the freshly-peeled front edge
  if (ld.prog > 0.002 && ld.prog < 0.999) {
    c.save();
    GF.rr(c, objX, objY, objW, objH, objR); c.clip();
    var sheen = c.createLinearGradient(fx - ux * 40 * GF.S, fy - uy * 40 * GF.S, fx, fy);
    sheen.addColorStop(0, 'rgba(255,255,255,0)');
    sheen.addColorStop(1, 'rgba(255,255,255,0.45)');
    c.fillStyle = sheen;
    c.beginPath();
    c.moveTo(fx + px * big, fy + py * big);
    c.lineTo(fx - px * big, fy - py * big);
    c.lineTo(fx - px * big - ux * 50 * GF.S, fy - py * big - uy * 50 * GF.S);
    c.lineTo(fx + px * big - ux * 50 * GF.S, fy + py * big - uy * 50 * GF.S);
    c.closePath(); c.fill();
    c.restore();
  }

  // 3) curled flap (clipped to gadget so it doesn't overflow oddly, but folds
  //    back over the revealed region)
  if (ld.prog > 0.01 && ld.prog < 0.999 && ld.type !== 'dust') {
    drawFlap(c, ax, ay, fx, fy, px, py, ux, uy, ld);
  }

  // 4) glowing corner + dotted guide on the ACTIVE layer
  if (isActive && gs === 'PLAYING' && ld.prog < 0.999) {
    c.save();
    GF.rr(c, objX, objY, objW, objH, objR); c.clip();
    c.setLineDash([10 * GF.S, 8 * GF.S]);
    c.strokeStyle = 'rgba(255,255,255,0.7)'; c.lineWidth = 2.5 * GF.S;
    c.beginPath(); c.moveTo(fx, fy); c.lineTo(bx, by); c.stroke();
    c.setLineDash([]);
    c.restore();
    if (ld.prog < 0.06) {
      var pulse = 0.5 + 0.5 * Math.sin(promptPulse * 4);
      var rr2 = (START_CORNER_R + pulse * 12) * GF.S;
      c.save();
      c.strokeStyle = 'rgba(255,225,90,' + (0.6 + pulse * 0.35) + ')'; c.lineWidth = 3.5 * GF.S;
      c.shadowColor = '#ffe15a'; c.shadowBlur = 18 * GF.S;
      c.beginPath(); c.arc(ax, ay, rr2, 0, 7); c.stroke();
      c.restore();
      drawArrow(c, ax, ay, ax + ux * 64 * GF.S, ay + uy * 64 * GF.S, pulse);
    }
  }
}

// Fill the covering material (call within a clip). Assumes clip already set.
function drawCovering(c, ld) {
  var col = layerColor(ld.type);
  var lg = c.createLinearGradient(objX, objY, objX + objW, objY + objH);
  lg.addColorStop(0, col.a); lg.addColorStop(1, col.b);
  c.fillStyle = lg;
  c.fillRect(objX, objY, objW, objH);
  if (ld.type === 'film') {
    c.strokeStyle = 'rgba(255,255,255,0.14)'; c.lineWidth = 1.5 * GF.S;
    for (var s = 0; s < 5; s++) {
      var yy = objY + objH * (0.12 + s * 0.18);
      c.beginPath(); c.moveTo(objX, yy); c.lineTo(objX + objW, yy - objH * 0.05); c.stroke();
    }
    // bluish tint edge so the film reads as a distinct sheet
    c.fillStyle = 'rgba(90,160,220,0.18)';
    c.fillRect(objX, objY, objW, objH);
  } else if (ld.type === 'sticker') {
    c.fillStyle = 'rgba(80,60,20,0.22)';
    c.font = 'bold ' + GF.clamp(22 * GF.S, 12, 32) + 'px sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(GF.t(layerLabelKey(ld.type)).toUpperCase(), objX + objW / 2, objY + objH / 2);
    // sticker barcode bars
    c.fillStyle = 'rgba(60,45,15,0.35)';
    for (var bi = 0; bi < 10; bi++) c.fillRect(objX + objW * 0.32 + bi * objW * 0.04, objY + objH * 0.62, objW * 0.012, objH * 0.08);
    c.textAlign = 'left'; c.textBaseline = 'top';
  } else {
    c.fillStyle = 'rgba(90,90,90,0.45)';
    for (var d = 0; d < 60; d++) {
      var dx = objX + (Math.sin(d * 12.9) * 0.5 + 0.5) * objW;
      var dy = objY + (Math.cos(d * 7.3) * 0.5 + 0.5) * objH;
      c.fillRect(dx, dy, 3 * GF.S, 3 * GF.S);
    }
  }
}

function drawArrow(c, x0, y0, x1, y1, pulse) {
  c.save();
  c.strokeStyle = 'rgba(255,225,90,' + (0.7 + pulse * 0.3) + ')';
  c.fillStyle = c.strokeStyle;
  c.lineWidth = 4 * GF.S; c.lineCap = 'round';
  c.beginPath(); c.moveTo(x0, y0); c.lineTo(x1, y1); c.stroke();
  var a = Math.atan2(y1 - y0, x1 - x0);
  var hl = 14 * GF.S;
  c.beginPath();
  c.moveTo(x1, y1);
  c.lineTo(x1 - hl * Math.cos(a - 0.5), y1 - hl * Math.sin(a - 0.5));
  c.lineTo(x1 - hl * Math.cos(a + 0.5), y1 - hl * Math.sin(a + 0.5));
  c.closePath(); c.fill();
  c.restore();
}

// Curled flap: a sheet hinged at the front line (fx,fy) folding back toward the
// start corner (ax,ay), curling up so it reads as a lifted 3D peel.
function drawFlap(c, ax, ay, fx, fy, px, py, ux, uy, ld) {
  var span = Math.max(objW, objH) * 0.5;
  var h1x = fx + px * span, h1y = fy + py * span;
  var h2x = fx - px * span, h2y = fy - py * span;
  // fold length: how far the flap folds back (a fraction of how much is peeled)
  var peeledLen = GF.dist(ax, ay, fx, fy);
  var fold = Math.min(peeledLen * 0.85, Math.max(objW, objH) * 0.55);
  // curl lift offset (perpendicular to screen via slight up-left shift)
  var lift = 10 * GF.S;
  var t1x = h1x - ux * fold, t1y = h1y - uy * fold - lift;
  var t2x = h2x - ux * fold, t2y = h2y - uy * fold - lift;

  c.save();
  // shadow the flap casts on the revealed surface (offset toward corner)
  c.fillStyle = 'rgba(0,0,0,0.22)';
  c.beginPath();
  c.moveTo(h1x, h1y); c.lineTo(h2x, h2y);
  c.lineTo(t2x + ux * 6 * GF.S, t2y + 8 * GF.S); c.lineTo(t1x + ux * 6 * GF.S, t1y + 8 * GF.S);
  c.closePath(); c.fill();

  // flap underside gradient (darker near the curl tip)
  var fg = c.createLinearGradient(fx, fy, fx - ux * fold, fy - uy * fold - lift);
  if (ld.type === 'film') {
    fg.addColorStop(0, 'rgba(170,220,255,0.85)');
    fg.addColorStop(0.6, 'rgba(110,175,235,0.9)');
    fg.addColorStop(1, 'rgba(60,110,170,0.95)');
  } else {
    fg.addColorStop(0, 'rgba(255,240,195,0.97)');
    fg.addColorStop(0.6, 'rgba(235,200,120,0.97)');
    fg.addColorStop(1, 'rgba(190,150,80,0.98)');
  }
  c.beginPath();
  c.moveTo(h1x, h1y); c.lineTo(h2x, h2y);
  c.lineTo(t2x, t2y); c.lineTo(t1x, t1y);
  c.closePath();
  c.fillStyle = fg; c.fill();

  // bright curled top edge
  c.strokeStyle = 'rgba(255,255,255,0.7)'; c.lineWidth = 3.5 * GF.S; c.lineCap = 'round';
  c.beginPath(); c.moveTo(t1x, t1y); c.lineTo(t2x, t2y); c.stroke();
  // hinge crease line at the front
  c.strokeStyle = 'rgba(255,255,255,0.35)'; c.lineWidth = 2 * GF.S;
  c.beginPath(); c.moveTo(h1x, h1y); c.lineTo(h2x, h2y); c.stroke();
  c.restore();
}

// ── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD(c) {
  var W = GF.W, H = GF.H;
  var fs = GF.clamp(15 * GF.S, 11, 20);
  c.textBaseline = 'top';

  c.textAlign = 'left'; c.fillStyle = '#cfe0f2';
  c.font = 'bold ' + fs + 'px sans-serif';
  c.fillText(GF.t('level') + ' ' + level + '/' + TOTAL_OBJECTS, 12 * GF.S, 12 * GF.S);
  c.fillStyle = '#8aa0b8'; c.font = GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
  c.fillText(GF.t('obj_' + LEVELS[level - 1].obj), 12 * GF.S, 12 * GF.S + fs + 4 * GF.S);

  // top-center clean % meter
  var mw = GF.clamp(150 * GF.S, 110, 220), mh = GF.clamp(14 * GF.S, 10, 20);
  var mx = W / 2 - mw / 2, my = 16 * GF.S;
  GF.rr(c, mx, my, mw, mh, mh / 2); c.fillStyle = 'rgba(255,255,255,0.12)'; c.fill();
  var fillW = mw * GF.clamp(cleanPct / 100, 0, 1);
  if (fillW > 2) {
    GF.rr(c, mx, my, fillW, mh, mh / 2);
    var mg = c.createLinearGradient(mx, my, mx + mw, my);
    mg.addColorStop(0, '#4dd0e1'); mg.addColorStop(1, '#2ecc71');
    c.fillStyle = mg; c.fill();
  }
  c.fillStyle = '#fff'; c.font = 'bold ' + GF.clamp(11 * GF.S, 9, 15) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(Math.floor(cleanPct) + '% ' + GF.t('clean'), W / 2, my + mh / 2);
  c.textBaseline = 'top';

  // top-right tear meter (3 pips)
  var pipR = GF.clamp(8 * GF.S, 6, 12);
  var gap = pipR * 2.6;
  var startX = W - 16 * GF.S - gap * (MAX_TEARS - 1) - pipR;
  for (var i = 0; i < MAX_TEARS; i++) {
    var cxp = startX + i * gap, cyp = 22 * GF.S;
    c.beginPath(); c.arc(cxp, cyp, pipR, 0, 7);
    c.fillStyle = (i < tears) ? '#ff5b5b' : 'rgba(255,255,255,0.2)';
    c.fill();
    c.strokeStyle = 'rgba(255,255,255,0.3)'; c.lineWidth = 1.5 * GF.S; c.stroke();
  }

  // bottom-center coins + active hint
  c.textAlign = 'center';
  c.fillStyle = '#ffd34d'; c.font = 'bold ' + GF.clamp(15 * GF.S, 11, 20) + 'px sans-serif';
  c.fillText(GF.t('coins') + ': ' + coins, W / 2, H - GF.clamp(56 * GF.S, 40, 76));
  var hintKey = 'drag_corner';
  if (activeLayer < layerDefs.length) {
    var ald = layerDefs[activeLayer];
    if (ald.type === 'dust') hintKey = 'wipe_dust';
    else if (ald.prog > 0.05) hintKey = 'along_guide';
  }
  c.fillStyle = 'rgba(220,235,250,0.85)'; c.font = GF.clamp(13 * GF.S, 10, 17) + 'px sans-serif';
  c.fillText(GF.t(hintKey), W / 2, H - GF.clamp(32 * GF.S, 22, 44));
  c.textAlign = 'left';
}

function drawHelpBtn(c) {
  var b = layout.helpBtn;
  if (!b) return;
  GF.rr(c, b.x, b.y, b.s, b.s, GF.clamp(8 * GF.S, 5, 12));
  c.fillStyle = 'rgba(255,255,255,0.12)'; c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.4)'; c.lineWidth = 1.5 * GF.S; c.stroke();
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(20 * GF.S, 15, 28) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText('?', b.x + b.s / 2, b.y + b.s / 2 + 1);
  c.textAlign = 'left'; c.textBaseline = 'top';
}

// ── TEXT WRAP ───────────────────────────────────────────────────────────────
function wrapLines(c, text, maxW) {
  var words = String(text).split(' ');
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var test = cur ? cur + ' ' + words[i] : words[i];
    if (c.measureText(test).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = test;
  }
  if (cur) lines.push(cur);
  return lines;
}

// ── OVERLAYS ──────────────────────────────────────────────────────────────────
var overlayBtns = [];
var tutorialOpen = false;

function bigButton(c, label, cyPos, color) {
  var W = GF.W;
  var bw = GF.clamp(260 * GF.S, 180, 340), bh = GF.clamp(56 * GF.S, 44, 70);
  var bx = (W - bw) / 2, by = cyPos;
  var grad = c.createLinearGradient(bx, by, bx, by + bh);
  grad.addColorStop(0, color[0]); grad.addColorStop(1, color[1]);
  GF.rr(c, bx, by, bw, bh, bh / 2);
  c.fillStyle = grad; c.fill();
  c.fillStyle = '#fff';
  c.font = 'bold ' + GF.clamp(20 * GF.S, 15, 26) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(label, W / 2, by + bh / 2);
  c.textBaseline = 'top';
  return { x: bx, y: by, w: bw, h: bh };
}

function drawMenu(c) {
  overlayBtns = [];
  var W = GF.W, H = GF.H;
  c.fillStyle = 'rgba(10,14,22,0.90)'; c.fillRect(0, 0, W, H);
  var titleFs = GF.clamp(44 * GF.S, 28, 60);
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.shadowColor = 'rgba(77,208,225,0.5)'; c.shadowBlur = 28 * GF.S;
  c.fillStyle = '#fff'; c.font = 'bold ' + titleFs + 'px sans-serif';
  var topY = H * 0.12;
  c.fillText(GF.t('title'), W / 2, topY);
  c.shadowBlur = 0;
  c.fillStyle = '#7fc4e8'; c.font = GF.clamp(15 * GF.S, 11, 20) + 'px sans-serif';
  c.fillText(GF.t('sub'), W / 2, topY + GF.clamp(30 * GF.S, 20, 40));

  var lh = GF.clamp(20 * GF.S, 15, 26);
  var maxW = Math.min(W * 0.86, 520);
  var lx = W / 2 - maxW / 2;
  var ly = topY + GF.clamp(58 * GF.S, 44, 80);
  c.textAlign = 'left'; c.textBaseline = 'top';
  c.font = GF.clamp(14 * GF.S, 11, 19) + 'px sans-serif';
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  for (var i = 0; i < keys.length; i++) {
    c.fillStyle = (i === keys.length - 1) ? '#9bd6a0' : '#cfe3f2';
    var lines = wrapLines(c, GF.t(keys[i]), maxW);
    for (var j = 0; j < lines.length; j++) { c.fillText(lines[j], lx, ly); ly += lh; }
    ly += GF.clamp(5 * GF.S, 2, 7);
  }

  var playY = Math.max(ly + GF.clamp(16 * GF.S, 10, 26), H * 0.74);
  if (playY > H - GF.clamp(80 * GF.S, 60, 110)) playY = H - GF.clamp(80 * GF.S, 60, 110);
  overlayBtns.push({ b: bigButton(c, GF.t('play'), playY, ['#2ecc71', '#27ae60']), fn: function () { startGame(); } });
}

function drawStars(c, n, cxp, cyp, r) {
  for (var i = 0; i < 3; i++) {
    var x = cxp + (i - 1) * r * 2.6;
    c.fillStyle = (i < n) ? '#ffd34d' : 'rgba(255,255,255,0.18)';
    c.beginPath();
    for (var k = 0; k < 5; k++) {
      var a = -Math.PI / 2 + k * 2 * Math.PI / 5;
      var a2 = a + Math.PI / 5;
      c.lineTo(x + Math.cos(a) * r, cyp + Math.sin(a) * r);
      c.lineTo(x + Math.cos(a2) * r * 0.45, cyp + Math.sin(a2) * r * 0.45);
    }
    c.closePath(); c.fill();
  }
}

function drawLevelEnd(c) {
  overlayBtns = [];
  var W = GF.W, H = GF.H;
  c.fillStyle = 'rgba(8,14,20,0.82)'; c.fillRect(0, 0, W, H);
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.fillStyle = '#2ecc71'; c.font = 'bold ' + GF.clamp(42 * GF.S, 28, 58) + 'px sans-serif';
  c.shadowColor = 'rgba(46,204,113,0.5)'; c.shadowBlur = 24 * GF.S;
  c.fillText(GF.t('cleared'), W / 2, H * 0.20);
  c.shadowBlur = 0;
  drawStars(c, starsEarned, W / 2, H * 0.30, GF.clamp(20 * GF.S, 14, 28));
  c.fillStyle = '#ffd34d'; c.font = 'bold ' + GF.clamp(18 * GF.S, 13, 24) + 'px sans-serif';
  c.fillText('+' + lastCoinsEarned + ' ' + GF.t('coins') + '  (∑ ' + coins + ')', W / 2, H * 0.30 + GF.clamp(40 * GF.S, 30, 54));

  var upY = H * 0.50;
  var shopItem = pickUpgradeOffer();
  if (shopItem) {
    overlayBtns.push({
      b: bigButton(c, GF.t('upgrade') + ': ' + GF.t(shopItem.label) + ' (' + shopItem.cost + ')', upY, ['#f5a623', '#e08e1b']),
      fn: function () { buyUpgrade(shopItem.kind); }
    });
    c.fillStyle = '#9fb3c6'; c.font = GF.clamp(12 * GF.S, 10, 16) + 'px sans-serif';
    c.fillText(upgradeDesc(shopItem.kind), W / 2, upY + GF.clamp(64 * GF.S, 50, 82));
  } else {
    c.fillStyle = '#8fa6b8'; c.font = GF.clamp(14 * GF.S, 11, 18) + 'px sans-serif';
    c.fillText(GF.t('maxed'), W / 2, upY + GF.clamp(20 * GF.S, 14, 28));
  }

  overlayBtns.push({ b: bigButton(c, GF.t('next'), H * 0.70, ['#2ecc71', '#27ae60']), fn: nextLevel });
}

function pickUpgradeOffer() {
  var opts = [];
  if (upgTolerance < 3) opts.push({ kind: 'tolerance', cost: UPGRADE_COSTS.tolerance, label: 'up_tolerance' });
  if (upgSpeed < 3) opts.push({ kind: 'speed', cost: UPGRADE_COSTS.speed, label: 'up_speed' });
  if (upgAuto < 1) opts.push({ kind: 'autoflatten', cost: UPGRADE_COSTS.autoflatten, label: 'up_auto' });
  opts.sort(function (a, b) { return a.cost - b.cost; });
  for (var i = 0; i < opts.length; i++) if (coins >= opts[i].cost) return opts[i];
  return opts.length ? opts[0] : null;
}
function upgradeDesc(kind) {
  if (kind === 'tolerance') return GF.t('up_tolerance') + '  ' + upgTolerance + '/3';
  if (kind === 'speed') return GF.t('up_speed') + '  ' + upgSpeed + '/3';
  return GF.t('up_auto') + '  ' + upgAuto + '/1';
}

function drawGameOver(c) {
  overlayBtns = [];
  var W = GF.W, H = GF.H;
  c.fillStyle = 'rgba(20,8,8,0.84)'; c.fillRect(0, 0, W, H);
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.fillStyle = '#ff6b6b'; c.font = 'bold ' + GF.clamp(44 * GF.S, 28, 60) + 'px sans-serif';
  c.fillText(GF.t('torn'), W / 2, H * 0.30);
  c.fillStyle = '#fff'; c.font = GF.clamp(17 * GF.S, 12, 22) + 'px sans-serif';
  c.fillText(GF.t('tears_used') + ': ' + tears, W / 2, H * 0.30 + GF.clamp(42 * GF.S, 30, 56));
  c.fillStyle = '#c9a0a0'; c.font = GF.clamp(13 * GF.S, 10, 18) + 'px sans-serif';
  var ll = wrapLines(c, GF.t('tut_lose'), W * 0.8);
  var ty = H * 0.30 + GF.clamp(70 * GF.S, 52, 90);
  for (var i = 0; i < ll.length; i++) { c.fillText(ll[i], W / 2, ty); ty += GF.clamp(18 * GF.S, 14, 24); }
  overlayBtns.push({ b: bigButton(c, GF.t('retry'), H * 0.64, ['#e74c3c', '#c0392b']), fn: retryLevel });
}

function drawWon(c) {
  overlayBtns = [];
  var W = GF.W, H = GF.H;
  c.fillStyle = 'rgba(8,18,12,0.88)'; c.fillRect(0, 0, W, H);
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.fillStyle = '#2ecc71'; c.font = 'bold ' + GF.clamp(40 * GF.S, 26, 56) + 'px sans-serif';
  c.shadowColor = 'rgba(46,204,113,0.5)'; c.shadowBlur = 26 * GF.S;
  c.fillText(GF.t('won'), W / 2, H * 0.34);
  c.shadowBlur = 0;
  c.fillStyle = '#ffd34d'; c.font = 'bold ' + GF.clamp(18 * GF.S, 13, 24) + 'px sans-serif';
  c.fillText(GF.t('total_coins') + ': ' + coins, W / 2, H * 0.34 + GF.clamp(38 * GF.S, 28, 52));
  overlayBtns.push({ b: bigButton(c, GF.t('again'), H * 0.60, ['#2ecc71', '#27ae60']), fn: function () { startGame(); } });
}

function drawTutorialPanel(c) {
  overlayBtns = [];
  var W = GF.W, H = GF.H;
  c.fillStyle = 'rgba(6,10,16,0.94)'; c.fillRect(0, 0, W, H);
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.fillStyle = '#4dd0e1'; c.font = 'bold ' + GF.clamp(26 * GF.S, 18, 36) + 'px sans-serif';
  var topY = H * 0.16;
  c.fillText(GF.t('howto'), W / 2, topY);
  var lh = GF.clamp(22 * GF.S, 16, 28);
  var maxW = Math.min(W * 0.84, 520);
  var lx = W / 2 - maxW / 2;
  var ly = topY + GF.clamp(34 * GF.S, 24, 46);
  c.textAlign = 'left'; c.textBaseline = 'top';
  c.font = GF.clamp(15 * GF.S, 11, 20) + 'px sans-serif';
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  for (var i = 0; i < keys.length; i++) {
    c.fillStyle = (i === keys.length - 1) ? '#9bd6a0' : '#cfe3f2';
    var lines = wrapLines(c, GF.t(keys[i]), maxW);
    for (var j = 0; j < lines.length; j++) { c.fillText(lines[j], lx, ly); ly += lh; }
    ly += GF.clamp(6 * GF.S, 3, 9);
  }
  var closeY = Math.max(ly + GF.clamp(20 * GF.S, 12, 30), H * 0.76);
  if (closeY > H - GF.clamp(80 * GF.S, 60, 110)) closeY = H - GF.clamp(80 * GF.S, 60, 110);
  overlayBtns.push({ b: bigButton(c, GF.t('close'), closeY, ['#4dd0e1', '#2aa7bd']), fn: function () {
    tutorialOpen = false;
    try { localStorage.setItem('peel_it_seen_tutorial', '1'); } catch (e) {}
  } });
}

// ── INIT ──────────────────────────────────────────────────────────────────
GF.init({
  designW: 720,
  designH: 1280,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'peel_it',
  onReady: function () {
    GF.persist('peel_it_run_v1',
      function () {
        return {
          gs: (gs === 'PLAYING' || gs === 'GAMEOVER') ? 'MENU' : gs,
          level: level, coins: coins,
          upgTolerance: upgTolerance, upgSpeed: upgSpeed, upgAuto: upgAuto,
          lang: GF.lang,
        };
      },
      function (s) {
        if (!s) return;
        if (s.lang) GF.lang = s.lang;
        level = GF.clamp(s.level || 1, 1, TOTAL_OBJECTS);
        coins = s.coins || 0;
        upgTolerance = GF.clamp(s.upgTolerance || 0, 0, 3);
        upgSpeed = GF.clamp(s.upgSpeed || 0, 0, 3);
        upgAuto = GF.clamp(s.upgAuto || 0, 0, 1);
        gs = 'MENU';   // never resume into a live peel
      }
    );
    buildLevel(level || 1);
    recomputeLayout();
    gs = 'MENU';
    tutorialOpen = false;   // tutorial copy lives on the MENU itself
  },
  onUpdate: update,
  onDraw: draw,
});

// ── STATE EXPOSURE FOR RUNTIME GATE ──────────────────────────────────────────
GF.exposeState(function () {
  return {
    gs: gs,
    level: level,
    cleanPct: cleanPct,
    tears: tears,
    coins: coins,
    starsEarned: starsEarned,
    activeLayer: activeLayer,
    layers: layerDefs.length,
    peeling: peeling,
    objX: objX, objY: objY, objW: objW, objH: objH,
    activeGuide: (activeLayer < layerDefs.length) ? guidePoints(layerDefs[activeLayer]) : null,
    activeProg: (activeLayer < layerDefs.length) ? layerDefs[activeLayer].prog : 1,
    tutorialOpen: tutorialOpen,
    upgTolerance: upgTolerance,
    upgSpeed: upgSpeed,
    upgAuto: upgAuto,
    TEAR_TOLERANCE_DEG: TEAR_TOLERANCE_DEG,
    MAX_PEEL_SPEED: MAX_PEEL_SPEED,
    CLEAN_TARGET_PCT: CLEAN_TARGET_PCT,
    MAX_TEARS: MAX_TEARS,
    TOTAL_OBJECTS: TOTAL_OBJECTS,
    PEEL_REVEAL_RATE: PEEL_REVEAL_RATE,
    COIN_PER_STAR: COIN_PER_STAR,
    START_CORNER_R: START_CORNER_R,
    GUIDE_HIT_W: GUIDE_HIT_W,
    UPGRADE_COSTS: UPGRADE_COSTS,
    STAR_THRESHOLDS: STAR_THRESHOLDS,
  };
});

})();
</script>
