<html lang="en">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── LOCALISATION ─────────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Tier-1 Repaint',
    sub:   'Push 3 markets above 0.8% CTR with one shared card.',
    play: 'PLAY', retry: 'AGAIN', next: 'NEXT SEED',
    won: 'Tier-1 Repaint!',
    gameover: 'Out of swaps',
    swaps: 'Swaps', seed: 'Seed', seeds_won: 'Seeds won',
    slot_icon:  'Icon',
    slot_shot:  'Screenshot',
    slot_title: 'Title',
    slot_sub:   'Subtitle',
    market_us:  'US',
    market_jp:  'JP',
    market_br:  'BR',
    chip_pick:  'Pick a chip',
    chip_swap:  'Tap a slot to swap',
    tier1:      'Tier-1',
    'tut_goal':     'Goal: Push all 3 markets above 0.8% CTR with one shared card.',
    'tut_controls': 'Controls: Tap a chip, then tap a slot to swap it in.',
    'tut_win':      'Win: US, JP and BR all hit Tier-1 before 10 swaps.',
    'tut_lose':     'Lose: 10 swaps spent and a market is still below 0.8%.',
    'tut_tip':      'Tip: Markets like different tags. Find the overlap.',
  },
  ru: {
    title: 'Тир-1 Перекрас',
    sub:   'Подними CTR трёх рынков выше 0.8% одной картой.',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ', next: 'НОВЫЙ СИД',
    won: 'Тир-1 взят!',
    gameover: 'Свопы кончились',
    swaps: 'Свопы', seed: 'Сид', seeds_won: 'Сиды',
    slot_icon:  'Иконка',
    slot_shot:  'Скрин',
    slot_title: 'Назв.',
    slot_sub:   'Подзаг.',
    market_us:  'США',
    market_jp:  'ЯП',
    market_br:  'БР',
    chip_pick:  'Выбери чип',
    chip_swap:  'Тапни слот для свопа',
    tier1:      'Тир-1',
    'tut_goal':     'Цель: Подними CTR всех 3 рынков выше 0.8% одной картой.',
    'tut_controls': 'Управление: Тапни чип, потом тапни слот.',
    'tut_win':      'Победа: США, ЯП, БР — все в Тир-1 за 10 свопов.',
    'tut_lose':     'Поражение: 10 свопов — а рынок ниже 0.8%.',
    'tut_tip':      'Совет: Рынки разные — ищи общий чип.',
  },
};

// ── TUNABLES ─────────────────────────────────────────────────────────────
var SWAP_BUDGET             = 10;
var MARKET_COUNT            = 3;
var SLOT_COUNT              = 4;
var CHIP_COUNT_PER_SLOT     = 4;
var TASTE_VECTOR_DIMENSIONS = 4;
var TIER1_THRESHOLD         = 0.8;
var SCORE_REVEAL_MS         = 280;
var CHIP_HIGHLIGHT_LIFT     = 8;
var NOISE_AMPLITUDE         = 0.05;

// CTR-formula constants.
var CTR_BASELINE = 0.5;
var CTR_SCALE    = 0.18;
var CTR_MIN      = 0.1;
var CTR_MAX      = 2.5;

// Slot keys, in mock-card order.
var SLOT_KEYS = ['slot_icon', 'slot_shot', 'slot_title', 'slot_sub'];

// Chip pool. Each slot has CHIP_COUNT_PER_SLOT chips, each carries a
// tag-vector of length TASTE_VECTOR_DIMENSIONS. Tag-vectors are seeded.
var CHIP_LABELS = {
  0: [ // icon variants
    { en: 'Skull',   ru: 'Череп' },
    { en: 'Cat',     ru: 'Кот' },
    { en: 'Flag',    ru: 'Флаг' },
    { en: 'Coin',    ru: 'Монета' },
  ],
  1: [ // screenshot variants
    { en: 'Combat',  ru: 'Бой' },
    { en: 'Pet',     ru: 'Питомец' },
    { en: 'Crowd',   ru: 'Толпа' },
    { en: 'City',    ru: 'Город' },
  ],
  2: [ // title variants
    { en: 'Bold',    ru: 'Жирный' },
    { en: 'Kawaii',  ru: 'Каваи' },
    { en: 'Epic',    ru: 'Эпик' },
    { en: 'Idle',    ru: 'Идл' },
  ],
  3: [ // subtitle variants
    { en: 'PvP',     ru: 'ПвП' },
    { en: 'Cozy',    ru: 'Уют' },
    { en: 'Tycoon',  ru: 'Тайкун' },
    { en: 'Match-3', ru: 'Матч-3' },
  ],
};

// Market metadata.
var MARKET_KEYS   = ['market_us', 'market_jp', 'market_br'];
var MARKET_COLORS = ['#4dd0e1', '#f472b6', '#22c55e'];

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';                 // MENU | PLAYING | WON | GAMEOVER
var seed = 0;                    // current daily seed
var swaps_remaining = SWAP_BUDGET;
var seeds_won = 0;
var loadout = [0, 0, 0, 0];      // chip index per slot
var pendingChip = { slot: -1, idx: -1 };
var chipTags = [];               // chipTags[slot][chipIdx] = number[]
var marketTastes = [];           // marketTastes[m] = number[]
var marketCtrs = [0.5, 0.5, 0.5];
var marketCtrsDisplay = [0.5, 0.5, 0.5]; // animated readout
var lastSwapAt = 0;
var winFlash = 0;
var layout = {};

// ── SEEDED RANDOM ────────────────────────────────────────────────────────
function seedFromDate() {
  var d = new Date();
  return d.getUTCFullYear() * 10000 + (d.getUTCMonth()+1) * 100 + d.getUTCDate();
}
function mulberry32(s) {
  return function() {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    var t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ── SEED BUILD ───────────────────────────────────────────────────────────
function buildSeed(s) {
  seed = s;
  var rnd = mulberry32(s);
  // Per-market taste vectors: balanced around 0, range [-1..+1].
  marketTastes = [];
  for (var m = 0; m < MARKET_COUNT; m++) {
    var tv = [];
    for (var d = 0; d < TASTE_VECTOR_DIMENSIONS; d++) tv.push(rnd() * 2 - 1);
    marketTastes.push(tv);
  }
  // Per-chip tag vectors: positive only [0..1].
  chipTags = [];
  for (var slot = 0; slot < SLOT_COUNT; slot++) {
    var slotChips = [];
    for (var c = 0; c < CHIP_COUNT_PER_SLOT; c++) {
      var tv2 = [];
      for (var d2 = 0; d2 < TASTE_VECTOR_DIMENSIONS; d2++) tv2.push(rnd());
      slotChips.push(tv2);
    }
    chipTags.push(slotChips);
  }
}

function computeCtrFor(loadoutArr, marketIdx) {
  // Sum tags across the equipped chips for the loadout.
  var sumTags = new Array(TASTE_VECTOR_DIMENSIONS);
  for (var d = 0; d < TASTE_VECTOR_DIMENSIONS; d++) sumTags[d] = 0;
  for (var slot = 0; slot < SLOT_COUNT; slot++) {
    var tags = chipTags[slot][loadoutArr[slot]];
    for (var d2 = 0; d2 < TASTE_VECTOR_DIMENSIONS; d2++) sumTags[d2] += tags[d2];
  }
  // Dot product with market taste.
  var dot = 0;
  for (var d3 = 0; d3 < TASTE_VECTOR_DIMENSIONS; d3++) dot += sumTags[d3] * marketTastes[marketIdx][d3];
  var ctr = CTR_BASELINE + dot * CTR_SCALE;
  if (ctr < CTR_MIN) ctr = CTR_MIN;
  if (ctr > CTR_MAX) ctr = CTR_MAX;
  return ctr;
}

function recomputeAllCtrs() {
  for (var m = 0; m < MARKET_COUNT; m++) marketCtrs[m] = computeCtrFor(loadout, m);
}

// Brute-force solvability check.
function isSolvable() {
  var total = Math.pow(CHIP_COUNT_PER_SLOT, SLOT_COUNT);
  var attempt = [0, 0, 0, 0];
  for (var n = 0; n < total; n++) {
    var x = n;
    for (var s = 0; s < SLOT_COUNT; s++) {
      attempt[s] = x % CHIP_COUNT_PER_SLOT;
      x = Math.floor(x / CHIP_COUNT_PER_SLOT);
    }
    var allOk = true;
    for (var m = 0; m < MARKET_COUNT; m++) {
      if (computeCtrFor(attempt, m) < TIER1_THRESHOLD) { allOk = false; break; }
    }
    if (allOk) return true;
  }
  return false;
}

function buildSolvableSeed(startSeed) {
  var s = startSeed;
  for (var tries = 0; tries < 64; tries++) {
    buildSeed(s);
    if (isSolvable()) return;
    s++;
  }
}

// ── LIFECYCLE ────────────────────────────────────────────────────────────
function startSeed(s) {
  buildSolvableSeed(s);
  swaps_remaining = SWAP_BUDGET;
  // Random initial loadout (seeded so deterministic).
  var rnd = mulberry32(seed ^ 0x9e3779b9);
  loadout = [];
  for (var i = 0; i < SLOT_COUNT; i++) loadout.push(Math.floor(rnd() * CHIP_COUNT_PER_SLOT));
  pendingChip = { slot: -1, idx: -1 };
  recomputeAllCtrs();
  marketCtrsDisplay = marketCtrs.slice();
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
  recomputeLayout();
  GF.tutorial.start(buildTutorialSteps(), { storageKey: 'tier1_repaint_seen_tutorial' });
}

function startGame() { startSeed(seedFromDate()); }
function nextSeed()  { startSeed(seed + 1); }

function applySwap(slot, chipIdx) {
  if (gs !== 'PLAYING') return;
  if (loadout[slot] === chipIdx) return; // no-op
  loadout[slot] = chipIdx;
  swaps_remaining--;
  lastSwapAt = performance.now();
  recomputeAllCtrs();
  pendingChip = { slot: -1, idx: -1 };
  // Win check.
  var allOk = true;
  for (var m = 0; m < MARKET_COUNT; m++) {
    if (marketCtrs[m] < TIER1_THRESHOLD) { allOk = false; break; }
  }
  if (allOk) {
    gs = 'WON';
    seeds_won++;
    winFlash = 1;
    try { localStorage.setItem('tier1_repaint_seeds_won', String(seeds_won)); } catch (e) {}
    for (var b = 0; b < MARKET_COUNT; b++) {
      var mp = layout.markets && layout.markets[b];
      if (mp) GF.spawnParticles(mp.x + mp.w/2, mp.y + mp.h/2, MARKET_COLORS[b], 22);
    }
    GF.gameEnded();
  } else if (swaps_remaining <= 0) {
    gs = 'GAMEOVER';
    GF.gameEnded();
  }
  GF.saveRun();
}

// Screenshot helpers + runtime-gate jump.
window._jumpLevel = function (level) {
  if (level && level >= 90) {
    // Terminal — force GAMEOVER.
    startSeed(seedFromDate() + 7);
    var rnd = mulberry32(seed);
    loadout = [];
    for (var i = 0; i < SLOT_COUNT; i++) loadout.push(Math.floor(rnd() * CHIP_COUNT_PER_SLOT));
    recomputeAllCtrs();
    swaps_remaining = 0;
    var attempts = 0;
    while (attempts < 16) {
      var allOk2 = true;
      for (var mm = 0; mm < MARKET_COUNT; mm++) {
        if (marketCtrs[mm] < TIER1_THRESHOLD) { allOk2 = false; break; }
      }
      if (!allOk2) break;
      loadout[0] = (loadout[0] + 1) % CHIP_COUNT_PER_SLOT;
      recomputeAllCtrs();
      attempts++;
    }
    gs = 'GAMEOVER';
    if (GF.tutorial && GF.tutorial.active !== undefined) GF.tutorial.active = false;
    recomputeLayout();
    return;
  }
  startSeed(seedFromDate());
  swaps_remaining = Math.max(3, Math.floor(SWAP_BUDGET / 2));
  if (GF.tutorial && GF.tutorial.active !== undefined) GF.tutorial.active = false;
  recomputeLayout();
};
window._setupForScreenshot = function () {
  startSeed(seedFromDate());
  // Brute-force a "near-win" loadout that pleases 2 of 3 markets so the
  // screenshot looks tense (mid-puzzle, not solved).
  var total = Math.pow(CHIP_COUNT_PER_SLOT, SLOT_COUNT);
  var attempt = [0, 0, 0, 0];
  var bestLoadout = loadout.slice();
  var bestScore = -1e9;
  for (var n = 0; n < total; n++) {
    var x = n;
    for (var s = 0; s < SLOT_COUNT; s++) {
      attempt[s] = x % CHIP_COUNT_PER_SLOT;
      x = Math.floor(x / CHIP_COUNT_PER_SLOT);
    }
    var clears = 0, minCtr = Infinity;
    for (var m = 0; m < MARKET_COUNT; m++) {
      var c2 = computeCtrFor(attempt, m);
      if (c2 >= TIER1_THRESHOLD) clears++;
      if (c2 < minCtr) minCtr = c2;
    }
    var score = clears * 10 + minCtr;
    if (clears >= 2 && clears < MARKET_COUNT && score > bestScore) {
      bestScore = score;
      bestLoadout = attempt.slice();
    }
  }
  loadout = bestLoadout;
  swaps_remaining = Math.max(4, Math.floor(SWAP_BUDGET / 2));
  pendingChip = { slot: 2, idx: 1 };
  recomputeAllCtrs();
  marketCtrsDisplay = marketCtrs.slice();
  gs = 'PLAYING';
  if (GF.tutorial && GF.tutorial.active !== undefined) GF.tutorial.active = false;
  recomputeLayout();
};

// ── INPUT ────────────────────────────────────────────────────────────────
function onPress(x, y) {
  if (GF.tutorial.handleClick(x, y)) return;
  if (gs === 'MENU') {
    var pb = layout.menuPlayBtn;
    if (pb && x >= pb.x && x <= pb.x + pb.w && y >= pb.y && y <= pb.y + pb.h) {
      startGame();
    }
    return;
  }
  if (gs === 'PLAYING') {
    if (layout.helpBtn) {
      var h = layout.helpBtn;
      if (x >= h.x && x <= h.x + h.w && y >= h.y && y <= h.y + h.h) {
        GF.tutorial.start(buildTutorialSteps(), { storageKey: 'tier1_repaint_seen_tutorial', force: true });
        return;
      }
    }
    // Slot hit-test (commit pending chip if any).
    if (layout.slots) {
      for (var si = 0; si < layout.slots.length; si++) {
        var sl = layout.slots[si];
        if (x >= sl.x && x <= sl.x + sl.w && y >= sl.y && y <= sl.y + sl.h) {
          if (pendingChip.slot === si && pendingChip.idx >= 0) {
            applySwap(si, pendingChip.idx);
          } else {
            pendingChip = { slot: -1, idx: -1 };
          }
          return;
        }
      }
    }
    // Chip tray hit-test.
    if (layout.chips) {
      for (var ci = 0; ci < layout.chips.length; ci++) {
        var ch = layout.chips[ci];
        if (x >= ch.x && x <= ch.x + ch.w && y >= ch.y && y <= ch.y + ch.h) {
          pendingChip = { slot: ch.slot, idx: ch.idx };
          return;
        }
      }
    }
    return;
  }
  if (gs === 'WON' || gs === 'GAMEOVER') {
    var rb = layout.retryBtn, nb = layout.nextBtn;
    if (rb && x >= rb.x && x <= rb.x + rb.w && y >= rb.y && y <= rb.y + rb.h) {
      startGame();
      return;
    }
    if (nb && x >= nb.x && x <= nb.x + nb.w && y >= nb.y && y <= nb.y + nb.h) {
      nextSeed();
      return;
    }
  }
}

GF.canvas.addEventListener('mousedown', function (e) { onPress(e.clientX, e.clientY); });
GF.canvas.addEventListener('touchstart', function (e) {
  if (!e.changedTouches || !e.changedTouches.length) return;
  var t0 = e.changedTouches[0];
  onPress(t0.clientX, t0.clientY);
}, { passive: true });

// ── TUTORIAL ─────────────────────────────────────────────────────────────
function chipTarget() {
  if (!layout.chips || !layout.chips.length) return null;
  var c = layout.chips[1];
  return { x: c.x + c.w / 2, y: c.y + c.h / 2, r: Math.max(c.w, c.h) * 0.6 };
}
function slotTarget() {
  if (!layout.slots || !layout.slots.length) return null;
  var s = layout.slots[0];
  return { x: s.x + s.w / 2, y: s.y + s.h / 2, r: Math.max(s.w, s.h) * 0.55 };
}
function marketTarget() {
  if (!layout.markets || !layout.markets.length) return null;
  var sumX = 0, sumY = 0;
  for (var i = 0; i < layout.markets.length; i++) {
    sumX += layout.markets[i].x + layout.markets[i].w / 2;
    sumY += layout.markets[i].y + layout.markets[i].h / 2;
  }
  return { x: sumX / layout.markets.length, y: sumY / layout.markets.length, r: 100 * GF.S };
}
function buildTutorialSteps() {
  return [
    { text: GF.t('tut_goal'),     target: marketTarget, advance: 'click_any' },
    { text: GF.t('tut_controls'), target: chipTarget,   advance: 'click_any' },
    { text: GF.t('tut_tip'),      target: slotTarget,   advance: 'click_any' },
  ];
}

// ── LAYOUT ───────────────────────────────────────────────────────────────
function recomputeLayout() {
  var S = GF.S;
  var W = GF.W, H = GF.H;
  layout = {};

  var topH = Math.max(50 * S, 44);
  layout.topH = topH;

  var marketColW = Math.max(160 * S, Math.min(W * 0.30, 230));
  var verticalMarkets = (W >= 520);
  layout.verticalMarkets = verticalMarkets;

  // Card area (centered slots).
  var cardArea;
  if (verticalMarkets) {
    cardArea = { x: 12 * S, y: topH + 8 * S, w: W - marketColW - 24 * S };
  } else {
    cardArea = { x: 12 * S, y: topH + 8 * S, w: W - 24 * S };
  }

  // 4 slots in a 2x2 grid on the mock card.
  var grid = 2;
  var slotGap = 10 * S;
  var slotW = (cardArea.w - (grid - 1) * slotGap) / grid;
  var slotH = Math.min(slotW, Math.max(72 * S, 60));
  layout.slots = [];
  for (var i = 0; i < SLOT_COUNT; i++) {
    var row = Math.floor(i / grid), col = i % grid;
    layout.slots.push({
      x: cardArea.x + col * (slotW + slotGap),
      y: cardArea.y + row * (slotH + slotGap),
      w: slotW, h: slotH, idx: i,
    });
  }
  var cardBottom = cardArea.y + 2 * slotH + slotGap;

  var trayTop = cardBottom + 18 * S;
  var actionH = Math.max(40 * S, 36);
  var trayBottom = H - actionH - 14 * S;
  var trayH = trayBottom - trayTop;
  if (trayH < 200) trayH = 200;
  var rowGap = 6 * S;
  var rowH = (trayH - (SLOT_COUNT - 1) * rowGap) / SLOT_COUNT;
  rowH = Math.min(rowH, 84 * S);
  var chipGap = 6 * S;
  var rowLabelW = Math.max(58 * S, 46);
  var chipsRowW = cardArea.w - rowLabelW - 8 * S;
  var chipW = (chipsRowW - (CHIP_COUNT_PER_SLOT - 1) * chipGap) / CHIP_COUNT_PER_SLOT;
  chipW = Math.min(chipW, 110 * S);
  var chipH = Math.min(rowH - 6 * S, 70 * S);
  layout.chips = [];
  layout.chipRowLabels = [];
  for (var slot = 0; slot < SLOT_COUNT; slot++) {
    var ry = trayTop + slot * (rowH + rowGap);
    layout.chipRowLabels.push({ x: cardArea.x, y: ry, w: rowLabelW, h: rowH });
    for (var c = 0; c < CHIP_COUNT_PER_SLOT; c++) {
      layout.chips.push({
        slot: slot,
        idx: c,
        x: cardArea.x + rowLabelW + 4 * S + c * (chipW + chipGap),
        y: ry + (rowH - chipH) / 2,
        w: chipW,
        h: chipH,
      });
    }
  }

  // Market panels — right column on wide, bottom strip on narrow.
  layout.markets = [];
  if (verticalMarkets) {
    var mx = W - marketColW - 8 * S;
    var mTop = topH + 8 * S;
    var mAvailH = H - mTop - 14 * S;
    var mGap = 8 * S;
    var mH = (mAvailH - (MARKET_COUNT - 1) * mGap) / MARKET_COUNT;
    mH = Math.min(mH, 170 * S);
    for (var m = 0; m < MARKET_COUNT; m++) {
      layout.markets.push({
        x: mx,
        y: mTop + m * (mH + mGap),
        w: marketColW,
        h: mH,
        idx: m,
      });
    }
  } else {
    var mGap2 = 6 * S;
    var mPanelW = (W - 16 * S - (MARKET_COUNT - 1) * mGap2) / MARKET_COUNT;
    for (var m2 = 0; m2 < MARKET_COUNT; m2++) {
      layout.markets.push({
        x: 8 * S + m2 * (mPanelW + mGap2),
        y: trayBottom + 4 * S,
        w: mPanelW,
        h: actionH - 4 * S,
        idx: m2,
        compact: true,
      });
    }
  }

  var hb = Math.max(34 * S, 28);
  layout.helpBtn = { x: W - hb - 8 * S, y: 8 * S, w: hb, h: hb };

  var btnH = Math.max(46 * S, 40);
  var btnW = Math.min(220 * S, W * 0.42);
  var bGap = 12 * S;
  layout.retryBtn = { x: GF.cx - btnW - bGap / 2, y: GF.cy + 40 * S, w: btnW, h: btnH };
  layout.nextBtn  = { x: GF.cx + bGap / 2,          y: GF.cy + 40 * S, w: btnW, h: btnH };
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  GF.tutorial.update(dt);
  // Animate the CTR readout toward the true value.
  var rate = dt * 6;
  for (var m = 0; m < MARKET_COUNT; m++) {
    var d = marketCtrs[m] - marketCtrsDisplay[m];
    if (Math.abs(d) < 0.001) marketCtrsDisplay[m] = marketCtrs[m];
    else marketCtrsDisplay[m] += d * Math.min(1, rate);
  }
  if (winFlash > 0) winFlash = Math.max(0, winFlash - dt * 1.5);
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(ctx) {
  recomputeLayout();
  var bg = ctx.createLinearGradient(0, 0, 0, GF.H);
  bg.addColorStop(0, '#11132a');
  bg.addColorStop(0.55, '#0a0a18');
  bg.addColorStop(1, '#070712');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, GF.W, GF.H);

  if (gs === 'PLAYING' || gs === 'WON' || gs === 'GAMEOVER') {
    drawTopBar(ctx);
    drawMockCard(ctx);
    drawChipTray(ctx);
    drawMarketPanels(ctx);
    drawHelpBtn(ctx);
    GF.tutorial.draw(ctx);
  }

  if (gs === 'MENU')     drawMenuOverlay(ctx);
  if (gs === 'WON')      drawTerminalOverlay(ctx, true);
  if (gs === 'GAMEOVER') drawTerminalOverlay(ctx, false);
}

function drawTopBar(ctx) {
  var S = GF.S;
  ctx.fillStyle = 'rgba(28,30,55,0.55)';
  GF.rr(ctx, 8 * S, 8 * S, GF.W - 16 * S, layout.topH - 4 * S, 10 * S);
  ctx.fill();
  ctx.fillStyle = '#cde';
  ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  var midY = 8 * S + (layout.topH - 4 * S) / 2;
  var seedTxt = GF.t('seed') + ' ' + seed + '  ·  ' + GF.t('seeds_won') + ' ' + seeds_won;
  ctx.fillText(seedTxt, 18 * S, midY);
  var swapStr = GF.t('swaps') + ' ' + swaps_remaining + '/' + SWAP_BUDGET;
  ctx.fillStyle = swaps_remaining <= 2 ? '#f87171' : '#9ee493';
  ctx.font = 'bold ' + GF.clamp(15 * S, 12, 19) + 'px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(swapStr, layout.helpBtn.x - 12 * S, midY);
}

function drawMockCard(ctx) {
  var S = GF.S;
  if (!layout.slots.length) return;
  var x0 = layout.slots[0].x, y0 = layout.slots[0].y;
  var x1 = layout.slots[1].x + layout.slots[1].w;
  var y1 = layout.slots[3].y + layout.slots[3].h;
  var padding = 10 * S;
  ctx.fillStyle = 'rgba(36,40,72,0.62)';
  GF.rr(ctx, x0 - padding, y0 - padding, x1 - x0 + padding * 2, y1 - y0 + padding * 2, 14 * S);
  ctx.fill();
  ctx.strokeStyle = '#3a3d5c';
  ctx.lineWidth = 1.5 * S;
  ctx.stroke();

  for (var i = 0; i < SLOT_COUNT; i++) {
    var sl = layout.slots[i];
    var isPendingSlot = pendingChip.slot === i;
    var bgCol = isPendingSlot ? 'rgba(168,85,247,0.32)' : 'rgba(18,20,40,0.65)';
    ctx.fillStyle = bgCol;
    GF.rr(ctx, sl.x, sl.y, sl.w, sl.h, 10 * S);
    ctx.fill();
    ctx.strokeStyle = isPendingSlot ? '#e879f9' : '#4a5172';
    ctx.lineWidth = isPendingSlot ? 2.4 * S : 1.4 * S;
    ctx.stroke();
    var chip = CHIP_LABELS[i][loadout[i]];
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + GF.clamp(22 * S, 16, 30) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    var label = chip[GF.lang] || chip.en;
    ctx.fillText(label, sl.x + sl.w / 2, sl.y + sl.h / 2);
    ctx.fillStyle = '#9ab';
    ctx.font = GF.clamp(10 * S, 8, 13) + 'px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(GF.t(SLOT_KEYS[i]), sl.x + 8 * S, sl.y + 6 * S);
  }
}

function drawChipTray(ctx) {
  var S = GF.S;
  ctx.fillStyle = '#7a86b0';
  ctx.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  for (var i = 0; i < SLOT_COUNT; i++) {
    var lab = layout.chipRowLabels[i];
    ctx.fillText(GF.t(SLOT_KEYS[i]), lab.x + 4 * S, lab.y + lab.h / 2);
  }
  for (var c = 0; c < layout.chips.length; c++) {
    var ch = layout.chips[c];
    var equipped = (loadout[ch.slot] === ch.idx);
    var isPending = (pendingChip.slot === ch.slot && pendingChip.idx === ch.idx);
    var lift = isPending ? CHIP_HIGHLIGHT_LIFT * S : 0;
    var yy = ch.y - lift;
    var bgCol = isPending ? 'rgba(168,85,247,0.85)'
              : equipped  ? 'rgba(46,60,100,0.85)'
              :             'rgba(26,28,55,0.85)';
    ctx.fillStyle = bgCol;
    GF.rr(ctx, ch.x, yy, ch.w, ch.h, 10 * S);
    ctx.fill();
    ctx.strokeStyle = isPending ? '#e879f9'
                    : equipped  ? '#4dd0e1'
                    :             '#3a3d5c';
    ctx.lineWidth = isPending ? 2.5 * S : 1.2 * S;
    ctx.stroke();
    var label = (CHIP_LABELS[ch.slot][ch.idx])[GF.lang] || CHIP_LABELS[ch.slot][ch.idx].en;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, ch.x + ch.w / 2, yy + ch.h / 2);
    if (equipped) {
      ctx.fillStyle = '#4dd0e1';
      ctx.font = GF.clamp(9 * S, 7, 12) + 'px sans-serif';
      ctx.textBaseline = 'top'; ctx.textAlign = 'left';
      ctx.fillText('✓', ch.x + 6 * S, yy + 4 * S);
    }
  }
  // Hint line above tray.
  ctx.fillStyle = pendingChip.idx >= 0 ? '#e879f9' : '#7a86b0';
  ctx.font = GF.clamp(11 * S, 9, 14) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  var firstLab = layout.chipRowLabels[0];
  ctx.fillText(pendingChip.idx >= 0 ? GF.t('chip_swap') : GF.t('chip_pick'), firstLab.x + 4 * S, firstLab.y - 4 * S);
}

function drawMarketPanels(ctx) {
  var S = GF.S;
  for (var m = 0; m < MARKET_COUNT; m++) {
    var mp = layout.markets[m];
    var color = MARKET_COLORS[m];
    var ctr = marketCtrsDisplay[m];
    var pass = marketCtrs[m] >= TIER1_THRESHOLD;
    ctx.fillStyle = pass ? 'rgba(34,80,55,0.72)' : 'rgba(28,30,55,0.72)';
    GF.rr(ctx, mp.x, mp.y, mp.w, mp.h, 10 * S);
    ctx.fill();
    ctx.strokeStyle = pass ? '#22c55e' : color;
    ctx.lineWidth = pass ? 2.2 * S : 1.4 * S;
    ctx.stroke();
    if (mp.compact) {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(GF.t(MARKET_KEYS[m]), mp.x + 8 * S, mp.y + mp.h / 2);
      ctx.fillStyle = pass ? '#9ee493' : '#cde';
      ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px sans-serif';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText(ctr.toFixed(2) + '%', mp.x + mp.w - 8 * S, mp.y + mp.h / 2);
    } else {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + GF.clamp(15 * S, 12, 19) + 'px sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText(GF.t(MARKET_KEYS[m]), mp.x + 12 * S, mp.y + 10 * S);
      ctx.fillStyle = pass ? '#9ee493' : '#fff';
      ctx.font = 'bold ' + GF.clamp(26 * S, 18, 36) + 'px sans-serif';
      ctx.textAlign = 'right'; ctx.textBaseline = 'top';
      ctx.fillText(ctr.toFixed(2) + '%', mp.x + mp.w - 12 * S, mp.y + 6 * S);
      var barX = mp.x + 12 * S;
      var barY = mp.y + mp.h - 28 * S;
      var barW = mp.w - 24 * S;
      var barH = 10 * S;
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      GF.rr(ctx, barX, barY, barW, barH, barH / 2);
      ctx.fill();
      var fillRatio = Math.min(1, ctr / 1.5);
      var fillW = barW * fillRatio;
      ctx.fillStyle = pass ? '#22c55e' : color;
      GF.rr(ctx, barX, barY, fillW, barH, barH / 2);
      ctx.fill();
      var thrX = barX + barW * (TIER1_THRESHOLD / 1.5);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5 * S;
      ctx.beginPath();
      ctx.moveTo(thrX, barY - 3 * S);
      ctx.lineTo(thrX, barY + barH + 3 * S);
      ctx.stroke();
      ctx.fillStyle = pass ? '#9ee493' : '#7a86b0';
      ctx.font = GF.clamp(10 * S, 8, 13) + 'px sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
      ctx.fillText((pass ? '★ ' : '') + GF.t('tier1') + ' ' + TIER1_THRESHOLD.toFixed(1) + '%', barX, barY - 4 * S);
    }
  }
}

function drawHelpBtn(ctx) {
  var h = layout.helpBtn;
  var S = GF.S;
  ctx.beginPath();
  ctx.arc(h.x + h.w / 2, h.y + h.h / 2, h.w / 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(50,55,90,0.7)'; ctx.fill();
  ctx.lineWidth = 1.5 * S; ctx.strokeStyle = '#4dd0e1'; ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (h.h * 0.55) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', h.x + h.w / 2, h.y + h.h / 2);
}

function drawMenuOverlay(ctx) {
  ctx.fillStyle = 'rgba(8,8,18,0.92)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var S = GF.S;
  var titleFs = GF.clamp(38 * S, 22, 56);
  var subFs   = GF.clamp(16 * S, 12, 22);
  ctx.shadowColor = 'rgba(77,208,225,0.5)';
  ctx.shadowBlur = 28 * S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t('title'), GF.cx, GF.cy - 170 * S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = subFs + 'px sans-serif';
  ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t('sub'), GF.cx, GF.cy - 130 * S);
  var lines = [
    GF.t('tut_goal'), GF.t('tut_controls'), GF.t('tut_win'), GF.t('tut_lose'), GF.t('tut_tip'),
  ];
  var tfs = GF.clamp(15 * S, 12, 19);
  ctx.font = tfs + 'px sans-serif';
  ctx.fillStyle = '#cde';
  ctx.textAlign = 'left';
  var maxLineW = Math.min(GF.W - 40 * S, 640);
  var leftX = GF.cx - maxLineW / 2;
  var lineY = GF.cy - 80 * S;
  var lineH = tfs * 1.55;
  for (var i = 0; i < lines.length; i++) {
    ctx.fillText('• ' + lines[i], leftX, lineY + i * lineH);
  }
  var btnW = GF.clamp(240 * S, 160, 320);
  var btnH = GF.clamp(52 * S, 40, 66);
  var btnX = GF.cx - btnW / 2;
  var btnY = GF.cy + 95 * S;
  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  grad.addColorStop(0, '#22c55e');
  grad.addColorStop(1, '#15803d');
  GF.rr(ctx, btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold ' + subFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('play'), GF.cx, btnY + btnH / 2);
  ctx.textBaseline = 'alphabetic';
  layout.menuPlayBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  if (seeds_won > 0) {
    ctx.font = GF.clamp(13 * S, 10, 17) + 'px sans-serif';
    ctx.fillStyle = '#557';
    ctx.textAlign = 'center';
    ctx.fillText(GF.t('seeds_won') + ': ' + seeds_won, GF.cx, btnY + btnH + 26 * S);
  }
}

function drawTerminalOverlay(ctx, isWin) {
  ctx.fillStyle = 'rgba(8,8,18,0.86)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var S = GF.S;
  var titleFs = GF.clamp(34 * S, 20, 50);
  var subFs   = GF.clamp(16 * S, 12, 22);
  ctx.shadowColor = isWin ? 'rgba(34,197,94,0.55)' : 'rgba(239,68,68,0.45)';
  ctx.shadowBlur = 28 * S;
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t(isWin ? 'won' : 'gameover'), GF.cx, GF.cy - 80 * S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = subFs + 'px sans-serif';
  for (var m = 0; m < MARKET_COUNT; m++) {
    var line = GF.t(MARKET_KEYS[m]) + ': ' + marketCtrs[m].toFixed(2) + '%' +
               (marketCtrs[m] >= TIER1_THRESHOLD ? '  ★' : '');
    ctx.fillStyle = marketCtrs[m] >= TIER1_THRESHOLD ? '#9ee493' : '#f87171';
    ctx.fillText(line, GF.cx, GF.cy - 30 * S + m * (subFs + 4));
  }
  drawActionBtn(ctx, layout.retryBtn, GF.t('retry'), '#3b82f6', '#1d4ed8');
  drawActionBtn(ctx, layout.nextBtn,  GF.t('next'),  '#22c55e', '#15803d');
}

function drawActionBtn(ctx, b, txt, c1, c2) {
  var S = GF.S;
  var grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
  grad.addColorStop(0, c1); grad.addColorStop(1, c2);
  GF.rr(ctx, b.x, b.y, b.w, b.h, b.h / 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + GF.clamp(16 * S, 13, 21) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(txt, b.x + b.w / 2, b.y + b.h / 2);
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: [],
  saveKey: 'tier1_repaint',
  onReady: function () {
    try { seeds_won = parseInt(localStorage.getItem('tier1_repaint_seeds_won') || '0') || 0; } catch (e) {}
    buildSolvableSeed(seedFromDate());
    var rnd = mulberry32(seed ^ 0x9e3779b9);
    loadout = [];
    for (var i = 0; i < SLOT_COUNT; i++) loadout.push(Math.floor(rnd() * CHIP_COUNT_PER_SLOT));
    recomputeAllCtrs();
    marketCtrsDisplay = marketCtrs.slice();
    GF.persist('tier1_repaint_run_v1',
      function () {
        return {
          gs: gs, seed: seed,
          swaps_remaining: swaps_remaining,
          loadout: loadout.slice(),
          seeds_won: seeds_won,
        };
      },
      function (s) {
        if (!s) return;
        if (typeof s.seed === 'number' && s.seed === seedFromDate()) {
          buildSolvableSeed(s.seed);
          gs = (s.gs === 'PLAYING' || s.gs === 'WON' || s.gs === 'GAMEOVER') ? s.gs : 'MENU';
          swaps_remaining = (typeof s.swaps_remaining === 'number') ? s.swaps_remaining : SWAP_BUDGET;
          if (Array.isArray(s.loadout) && s.loadout.length === SLOT_COUNT) loadout = s.loadout.slice();
          seeds_won = s.seeds_won || seeds_won;
          recomputeAllCtrs();
          marketCtrsDisplay = marketCtrs.slice();
        }
      }
    );
    if (gs !== 'MENU' && gs !== 'PLAYING' && gs !== 'WON' && gs !== 'GAMEOVER') gs = 'MENU';
    recomputeLayout();
  },
  onUpdate: update,
  onDraw: draw,
});

// ── STATE EXPOSURE FOR RUNTIME GATE ──────────────────────────────────────
GF.exposeState(function () {
  return {
    gs: gs,
    seed: seed,
    swaps_remaining: swaps_remaining,
    seeds_won: seeds_won,
    loadout: loadout.slice(),
    marketCtrs: marketCtrs.slice(),
    pendingChipSlot: pendingChip.slot,
    pendingChipIdx: pendingChip.idx,
    SWAP_BUDGET: SWAP_BUDGET,
    MARKET_COUNT: MARKET_COUNT,
    SLOT_COUNT: SLOT_COUNT,
    CHIP_COUNT_PER_SLOT: CHIP_COUNT_PER_SLOT,
    TASTE_VECTOR_DIMENSIONS: TASTE_VECTOR_DIMENSIONS,
    TIER1_THRESHOLD: TIER1_THRESHOLD,
    SCORE_REVEAL_MS: SCORE_REVEAL_MS,
    CHIP_HIGHLIGHT_LIFT: CHIP_HIGHLIGHT_LIFT,
    NOISE_AMPLITUDE: NOISE_AMPLITUDE,
  };
});

})();
</script>
</body>
