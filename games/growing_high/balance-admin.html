<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Growing High Balance Admin</title>
    <link rel="stylesheet" href="./assets/balance-admin.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Growing High Balance Admin</h1>
        <p>Prototype crop table: days, grams, and radial root space</p>
      </div>
      <nav>
        <a href="./">Play</a>
        <button id="reset-defaults" type="button">Reset</button>
      </nav>
    </header>

    <main class="workspace">
      <section class="editor-panel" aria-label="Crop balance editor">
        <div class="toolbar">
          <label>
            Draft label
            <input id="draft-label" type="text" maxlength="60" value="Pit balance draft" />
          </label>
          <label>
            Preview season
            <select id="preview-season">
              <option>Spring</option>
              <option>Summer</option>
              <option>Autumn</option>
              <option>Winter</option>
            </select>
          </label>
          <button id="copy-json" type="button">Copy JSON</button>
          <button id="apply-preview" type="button">Refresh Preview</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Crop</th>
                <th>Grow days</th>
                <th>Sale p</th>
                <th>Seed p</th>
                <th>Sapling g</th>
                <th>Root radius px</th>
                <th>Harvest g</th>
                <th>Fruit g</th>
                <th>Fruit days</th>
                <th>Shelf days</th>
                <th>Season</th>
              </tr>
            </thead>
            <tbody id="crop-rows"></tbody>
          </table>
        </div>
      </section>

      <aside class="preview-panel" aria-label="Instant balance preview">
        <section class="summary">
          <h2 id="selected-title">Carrot</h2>
          <dl id="crop-preview"></dl>
        </section>

        <section class="share">
          <h2>Draft Payload</h2>
          <textarea id="payload-json" spellcheck="false"></textarea>
          <label>
            Shareable game URL
            <input id="share-url" readonly />
          </label>
          <label>
            Import JSON
            <textarea id="import-json" spellcheck="false"></textarea>
          </label>
          <button id="import-draft" type="button">Import Draft</button>
        </section>
      </aside>

      <section class="live-preview" aria-label="Live game preview">
        <iframe id="game-preview" title="Growing High preview" src="./?adminPreview=1"></iframe>
      </section>
    </main>

    <script type="module" src="./assets/balance-admin.js"></script>
  </body>
</html>
