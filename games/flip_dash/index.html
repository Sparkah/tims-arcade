    tut_win:      'Победа: Финиша нет — бей свой рекорд дистанции; сегодняшняя «трасса дня» одинакова для всех.',
    tut_lose:     'Поражение: Задел любой шип или балку — забег окончен.',

    howto: 'КАК ИГРАТЬ', gotit: 'ПОНЯТНО',
    zone_neon: 'НЕОН', zone_sunset: 'ЗАКАТ', zone_toxic: 'ТОКСИК', zone_ice: 'ЛЁД', zone_void: 'БЕЗДНА',
    skin_cyan: 'Циан', skin_magenta: 'Маджента', skin_gold: 'Золото', skin_lime: 'Лайм', skin_violet: 'Фиолет', skin_ember: 'Уголь',
  },
};

// ── TUNABLES (every one exposed via GF.exposeState — see boot) ─────────────
var RUN_SPEED      = 250;    // px/s starting forward scroll speed
var SPEED_RAMP     = 6;      // px/s added per second survived
var MAX_SPEED      = 620;    // px/s cap
var GRAVITY        = 2600;   // px/s^2 pull toward active surface
var FLIP_COOLDOWN  = 0.12;   // s anti double-fire debounce
var OBSTACLE_GAP   = 360;    // px starting horizontal gap between groups
var GAP_MIN        = 190;    // px tightest gap at high distance
var COIN_RATE      = 0.55;   // probability a slot drops a coin arc
var MILESTONE_STEP = 300;    // metres between biome unlocks
var SEED_TODAY     = 0;      // today's date int (set in boot)
// Hitboxes / sizes (design px; * S at runtime)
var PLAYER_R     = 16;
var CORRIDOR_PAD = 8;
var OBST_W       = 30;
var COIN_R       = 11;
var PX_PER_M     = 18;

// ── ZONES (biomes) ────────────────────────────────────────────────────────
var ZONES = [
  { key:'zone_neon',   bg:'#07101f', rail:'#1f6feb', glow:'#4dd0e1', obst:'#ff3b6b', accent:'#4dd0e1' },
  { key:'zone_sunset', bg:'#1a0d18', rail:'#ff7b3d', glow:'#ffb14d', obst:'#ff4d6d', accent:'#ffb14d' },
  { key:'zone_toxic',  bg:'#0a160c', rail:'#39d353', glow:'#a8e55a', obst:'#ff5cf0', accent:'#a8e55a' },
  { key:'zone_ice',    bg:'#08141a', rail:'#3dc6ff', glow:'#9be7ff', obst:'#ff8a3d', accent:'#9be7ff' },
  { key:'zone_void',   bg:'#120a1c', rail:'#9a5cff', glow:'#c89bff', obst:'#ff3b6b', accent:'#c89bff' },
];
function zoneFor(idx) { return ZONES[Math.min(idx, ZONES.length - 1)]; }

// ── SKINS (cosmetic; unlocked by spending banked coins) ───────────────────
var SKINS = [
  { id:'cyan',    key:'skin_cyan',    cost:0,    inner:'#bdf3fb', outer:'#0288a8', glow:'#4dd0e1' },
  { id:'magenta', key:'skin_magenta', cost:40,   inner:'#ffd0ef', outer:'#c8208f', glow:'#ff5cf0' },
  { id:'lime',    key:'skin_lime',    cost:90,   inner:'#eaffb0', outer:'#5a8a00', glow:'#a8e55a' },
  { id:'gold',    key:'skin_gold',    cost:160,  inner:'#fff3a8', outer:'#a8770a', glow:'#FFD700' },
  { id:'violet',  key:'skin_violet',  cost:260,  inner:'#e3d0ff', outer:'#6020c8', glow:'#aa5aff' },
  { id:'ember',   key:'skin_ember',   cost:400,  inner:'#ffd9bd', outer:'#c8400a', glow:'#ff7a3d' },
];

// ── STATE ─────────────────────────────────────────────────────────────────
var gs = 'MENU';                 // MENU | PLAYING | GAMEOVER
var mode = 'DAILY';              // DAILY | ENDLESS
var rng = Math.random;           // active RNG (seeded for daily)
var scrollSpeed = RUN_SPEED;     // current px/s (ramps)
var worldX = 0;                  // total px scrolled this run
var dist = 0;                    // metres = worldX / (PX_PER_M*S)
var coins = 0;                   // PERSISTENT coin bank
var runCoins = 0;                // coins collected this run
var dailyBest = 0;               // PB on today's seed (persistent)
var endlessBest = 0;             // best endless ever (persistent)
var zoneIdx = 0;                 // current biome index
var prevZoneIdx = 0;
var gravDir = 1;                 // +1 = pulled to floor (down), -1 = to ceiling
var flipCooldownT = 0;
var lastFlipFlash = 0;           // 0..1 visual pulse after a flip
var bannerT = 0;                 // milestone banner timer
var bannerTxt = '';
var startHintT = 0;              // "tap to flip" hint at run start

var player = { y:0, vy:0, tilt:0 };  // x is fixed; y/vy vertical
var obstacles = [];              // { x, y, w, h, surface } surface:'floor'|'ceil'|'mid'
var coinsArr = [];               // { x, y, taken }
var nextSpawnX = 0;              // SCREEN x at which to drop the next group
var spawnCount = 0;              // groups spawned (difficulty curve)

// Skin state
var equippedSkin = 'cyan';
var ownedSkins = { cyan: true };

// Revive (rewarded ad) — one per run
var reviveUsed = false, reviveLoading = false, invulnT = 0;
var reviveBtnRect = null;

// Tutorial overlay (MENU + reopen via ?)
var tutorialOpen = false;
var seenTutorial = false;

// Buttons (declarative hit targets, rebuilt per overlay frame)
var buttons = [];
var hudButtons = [];             // ? + mute, live during PLAYING

// Audio
var audioMuted = false, _ac = null, _master = null;

// ── UTILS ─────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function rr(c, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}
// Mulberry32 deterministic PRNG
function makeRng(seed) {
  var s = seed | 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    var t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function getDaySeed() {
  var d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}
function getDayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ── AUDIO (procedural WebAudio, no asset files) ───────────────────────────
function loadMute() { try { audioMuted = localStorage.getItem('flip_dash_muted') === '1'; } catch(e){} }
function saveMute() { try { localStorage.setItem('flip_dash_muted', audioMuted ? '1':'0'); } catch(e){} }
function ensureAudio() {
  if (window._silent) return null;
  if (_ac) return _ac;
  try {
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    _ac = new AC();
    _master = _ac.createGain(); _master.gain.value = 0.3; _master.connect(_ac.destination);
  } catch(e) { _ac = null; }
  return _ac;
}
function audioResume() { if (_ac && _ac.state === 'suspended') { try { _ac.resume(); } catch(e){} } }
function beep(o) {
  if (audioMuted || window._silent) return;
  var ac = ensureAudio(); if (!ac) return;
  var now = ac.currentTime, dur = o.dur || 0.1;
  var osc = ac.createOscillator(), g = ac.createGain();
  osc.type = o.type || 'sine';
  osc.frequency.setValueAtTime(o.freq, now);
  if (o.freq2 != null) osc.frequency.exponentialRampToValueAtTime(o.freq2, now + dur);
  var vol = o.vol != null ? o.vol : 0.4;
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(vol, now + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.connect(g); g.connect(_master);
  osc.start(now); osc.stop(now + dur + 0.02);
}
function noise(o) {
  if (audioMuted || window._silent) return;
  var ac = ensureAudio(); if (!ac) return;
  var now = ac.currentTime, dur = o.dur || 0.25, sr = ac.sampleRate;
  var buf = ac.createBuffer(1, Math.floor(sr*dur), sr), d = buf.getChannelData(0);
  for (var i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  var src = ac.createBufferSource(); src.buffer = buf;
  var bp = ac.createBiquadFilter(); bp.type = o.filter||'lowpass'; bp.frequency.value = o.freq||500; bp.Q.value = 0.6;
  var g = ac.createGain(); var vol = o.vol!=null?o.vol:0.4;
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(vol, now + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  src.connect(bp); bp.connect(g); g.connect(_master);
  src.start(now); src.stop(now + dur + 0.02);
}
var Sfx = {
  flip:  function(){ beep({ freq:540, freq2:880, type:'triangle', dur:0.09, vol:0.3 }); },
  coin:  function(){ beep({ freq:1180, freq2:1660, type:'sine', dur:0.07, vol:0.26 }); },
  zone:  function(){ beep({ freq:660, type:'triangle', dur:0.12, vol:0.36 });
                     setTimeout(function(){ beep({ freq:990, type:'triangle', dur:0.16, vol:0.36 }); }, 100); },
  crash: function(){ beep({ freq:300, freq2:50, type:'sawtooth', dur:0.5, vol:0.5 });
                     noise({ freq:220, dur:0.45, vol:0.3 }); },
  click: function(){ beep({ freq:760, freq2:900, type:'triangle', dur:0.06, vol:0.32 }); },
  buy:   function(){ beep({ freq:740, type:'sine', dur:0.1, vol:0.34 });
                     setTimeout(function(){ beep({ freq:1110, type:'sine', dur:0.14, vol:0.34 }); }, 80); },
  revive:function(){ beep({ freq:520, freq2:1040, type:'sine', dur:0.22, vol:0.4 }); },
};
function toggleMute() { audioMuted = !audioMuted; saveMute(); if (!audioMuted){ ensureAudio(); audioResume(); Sfx.click(); } }

// ── PERSISTENCE ───────────────────────────────────────────────────────────
function loadProgress() {
  try { coins = parseInt(localStorage.getItem('flip_dash_coins')||'0',10) || 0; } catch(e){}
  try { endlessBest = parseInt(localStorage.getItem('flip_dash_endless_best')||'0',10) || 0; } catch(e){}
  try {
    var rawD = localStorage.getItem('flip_dash_daily');
    if (rawD) { var o = JSON.parse(rawD); if (o && o.day === getDayKey()) dailyBest = o.best|0; }
  } catch(e){}
  try {
    var raw = localStorage.getItem('flip_dash_skins');
    if (raw) { var s = JSON.parse(raw); if (s) { ownedSkins = s.owned || { cyan:true }; equippedSkin = s.equipped || 'cyan'; } }
  } catch(e){}
  ownedSkins.cyan = true;
  try { seenTutorial = localStorage.getItem('flip_dash_seen_tutorial') === '1'; } catch(e){}
}
function saveCoins() { try { localStorage.setItem('flip_dash_coins', String(coins)); } catch(e){} }
function saveSkins() { try { localStorage.setItem('flip_dash_skins', JSON.stringify({ owned: ownedSkins, equipped: equippedSkin })); } catch(e){} }
function saveDailyBest() { try { localStorage.setItem('flip_dash_daily', JSON.stringify({ day: getDayKey(), best: dailyBest })); } catch(e){} }
function saveEndlessBest() { try { localStorage.setItem('flip_dash_endless_best', String(endlessBest)); } catch(e){} }
function markTutorialSeen() { seenTutorial = true; try { localStorage.setItem('flip_dash_seen_tutorial','1'); } catch(e){} }

function activeSkin() {
  for (var i=0;i<SKINS.length;i++) if (SKINS[i].id === equippedSkin) return SKINS[i];
  return SKINS[0];
}

// ── CORRIDOR GEOMETRY ─────────────────────────────────────────────────────
// Portrait corridor: avatar runs at a fixed screen X; floor at bottom, ceiling
// at top. A top band is reserved for the HUD; obstacles fill the play band.
function topY() { return Math.max(GF.H * 0.16, 96 * GF.S); }       // ceiling surface y
function botY() { return GF.H - Math.max(GF.H * 0.06, 30 * GF.S); } // floor surface y
function playerX() { return GF.W * 0.30; }                          // fixed run column
function floorLaneY() { return botY() - (PLAYER_R + CORRIDOR_PAD) * GF.S; }
function ceilLaneY()  { return topY()  + (PLAYER_R + CORRIDOR_PAD) * GF.S; }

// ── DIFFICULTY ────────────────────────────────────────────────────────────
function diff() { return clamp(dist / 800, 0, 1); }
function curGap() { return (OBSTACLE_GAP - (OBSTACLE_GAP - GAP_MIN) * diff()) * GF.S; }

// ── SPAWNING (single code path; screen-space x) ───────────────────────────
function resetSpawns() {
  obstacles = []; coinsArr = [];
  nextSpawnX = GF.W + 100 * GF.S;
  spawnCount = 0;
}
function spawnGroup(x) {
  var top = topY(), bot = botY(), bandH = bot - top;
  var r = rng(), d = diff(), ow = OBST_W * GF.S;
  var hMin = 40 * GF.S, hMax = (60 + 60 * d) * GF.S;
  function blockH() { return hMin + rng() * (hMax - hMin); }

  var pattern;
  if (spawnCount < 2) pattern = 0;          // ease-in
  else if (r < 0.34) pattern = 0;           // single block, one surface
  else if (r < 0.60) pattern = 1;           // staggered floor+ceiling
  else if (r < 0.82) pattern = 2;           // floating mid bar
  else pattern = 3;                         // pinch

  var safeSurface, extraW = 0;
  if (pattern === 0) {
    var onFloor = rng() < 0.5, h = blockH();
    if (onFloor) { obstacles.push({ x:x, y:bot - h, w:ow, h:h, surface:'floor' }); safeSurface = 'ceil'; }
    else         { obstacles.push({ x:x, y:top,     w:ow, h:h, surface:'ceil'  }); safeSurface = 'floor'; }
  } else if (pattern === 1) {
    var h1 = blockH(), h2 = blockH(), firstFloor = rng() < 0.5;
    if (firstFloor) {
      obstacles.push({ x:x, y:bot - h1, w:ow, h:h1, surface:'floor' });
      obstacles.push({ x:x + ow*2.8, y:top, w:ow, h:h2, surface:'ceil' });
    } else {
      obstacles.push({ x:x, y:top, w:ow, h:h1, surface:'ceil' });
      obstacles.push({ x:x + ow*2.8, y:bot - h2, w:ow, h:h2, surface:'floor' });
    }
    safeSurface = firstFloor ? 'ceil' : 'floor';
    extraW = ow * 2.8;
  } else if (pattern === 2) {
    var barH = (44 + rng() * 70 * (0.5 + d)) * GF.S;
    var slot = 0.30 + rng() * 0.40, cyc = top + bandH * slot;
    obstacles.push({ x:x, y:cyc - barH/2, w:ow * 1.2, h:barH, surface:'mid' });
    safeSurface = (slot < 0.5) ? 'floor' : 'ceil';
  } else {
    var hf = (40 + rng()*40*d) * GF.S, hc = (40 + rng()*40*d) * GF.S;
    obstacles.push({ x:x, y:bot - hf, w:ow, h:hf, surface:'floor' });
    obstacles.push({ x:x, y:top, w:ow, h:hc, surface:'ceil' });
    safeSurface = (hf < hc) ? 'floor' : 'ceil';
  }

  // coin arc along the safe lane after the group
  if (rng() < COIN_RATE) {
    var n = 3 + Math.floor(rng() * 3);
    var cy0 = (safeSurface === 'floor') ? bot - (PLAYER_R + CORRIDOR_PAD + 6) * GF.S
                                        : top + (PLAYER_R + CORRIDOR_PAD + 6) * GF.S;
    var cx0 = x + ow + extraW + 34 * GF.S;
    var arc = 26 * GF.S * (safeSurface === 'floor' ? -1 : 1);
    for (var i=0;i<n;i++) {
      var tt = n>1 ? i/(n-1) : 0;
      coinsArr.push({ x: cx0 + i * 34 * GF.S, y: cy0 + Math.sin(tt * Math.PI) * arc, taken:false });
    }
  }

  spawnCount++;
  nextSpawnX = x + extraW + curGap();
}

// ── GAME LIFECYCLE ────────────────────────────────────────────────────────
function startRun(m) {
  mode = (m === 'ENDLESS') ? 'ENDLESS' : 'DAILY';
  if (mode === 'DAILY') rng = makeRng(SEED_TODAY);
  else rng = makeRng(((performance.now()|0) ^ getDaySeed() ^ (Math.random()*1e9|0)) | 0);
  scrollSpeed = RUN_SPEED;
  worldX = 0; dist = 0; runCoins = 0;
  zoneIdx = 0; prevZoneIdx = 0;
  gravDir = 1; flipCooldownT = 0; lastFlipFlash = 0;
  bannerT = 0; bannerTxt = '';
  reviveUsed = false; reviveLoading = false; invulnT = 0; reviveBtnRect = null;
  startHintT = 1.6;
  player.y = floorLaneY(); player.vy = 0; player.tilt = 0;
  resetSpawns();
  // pre-spawn so the corridor isn't empty
  spawnGroup(nextSpawnX);
  spawnGroup(nextSpawnX);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function flip() {
  if (gs !== 'PLAYING') return false;
  if (flipCooldownT > 0) return false;
  gravDir = -gravDir;
  flipCooldownT = FLIP_COOLDOWN;
  lastFlipFlash = 1;
  startHintT = 0;
  player.vy = gravDir * 120 * GF.S;  // small kick off the surface
  GF.spawnParticles(playerX(), player.y, activeSkin().glow, 8);
  Sfx.flip();
  return true;
}

function gameOver() {
  if (gs !== 'PLAYING') return;
  gs = 'GAMEOVER';
  coins += runCoins; saveCoins();
  if (mode === 'DAILY') { if (dist > dailyBest) { dailyBest = Math.floor(dist); saveDailyBest(); } }
  else { if (dist > endlessBest) { endlessBest = Math.floor(dist); saveEndlessBest(); } }
  GF.spawnParticles(playerX(), player.y, '#ff3b6b', 36);
  GF.setShake(0.9);
  Sfx.crash();
  GF.gameEnded();
  GF.saveRun();
}

// Rewarded-ad revive (user-click only) — clears nearby obstacles, brief invuln
function requestRevive() {
  if (reviveUsed || reviveLoading) return;
  reviveLoading = true;
  GF.showAd('rewarded').then(function(res) {
    reviveLoading = false;
    if (res && (res.rewarded || !res.shown)) doRevive(); // local/no-SDK grants it
  });
}
function doRevive() {
  reviveUsed = true;
  for (var i = obstacles.length - 1; i >= 0; i--) {
    if (obstacles[i].x < GF.W + 220 * GF.S) obstacles.splice(i, 1);
  }
  nextSpawnX = Math.max(nextSpawnX, GF.W + 220 * GF.S);
  invulnT = 2.0; player.vy = 0;
  GF.spawnParticles(playerX(), player.y, '#FFD700', 30);
  Sfx.revive();
  gs = 'PLAYING';
  GF.gameStarted();
}

// ── UPDATE ────────────────────────────────────────────────────────────────
function update(dt) {
  if (lastFlipFlash > 0) lastFlipFlash = Math.max(0, lastFlipFlash - dt * 4);
  if (bannerT > 0) bannerT -= dt;
  if (startHintT > 0) startHintT -= dt;
  if (gs !== 'PLAYING') return;
  if (flipCooldownT > 0) flipCooldownT -= dt;
  if (invulnT > 0) invulnT -= dt;

  // escalate speed
  scrollSpeed = Math.min(MAX_SPEED, scrollSpeed + SPEED_RAMP * dt);
  var dx = scrollSpeed * GF.S * dt;
  worldX += dx;
  dist = worldX / (PX_PER_M * GF.S);

  // zone / milestone
  zoneIdx = Math.floor(dist / MILESTONE_STEP);
  if (zoneIdx > prevZoneIdx) {
    prevZoneIdx = zoneIdx;
    var z = zoneFor(zoneIdx);
    bannerTxt = GF.t('zoneUnlocked') + ' — ' + GF.t(z.key);
    bannerT = 2.2; GF.setShake(0.3); Sfx.zone();
  }

  // physics: gravity toward active surface, clamp to lanes
  player.vy += gravDir * GRAVITY * GF.S * dt;
  player.y += player.vy * dt;
  var fL = floorLaneY(), cL = ceilLaneY();
  if (player.y >= fL) { player.y = fL; if (player.vy > 0) player.vy = 0; }
  if (player.y <= cL) { player.y = cL; if (player.vy < 0) player.vy = 0; }
  var targetTilt = clamp(player.vy / (700 * GF.S), -0.5, 0.5);
  player.tilt += (targetTilt - player.tilt) * Math.min(1, dt * 12);

  // scroll world + recycle
  for (var i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= dx;
    if (obstacles[i].x + obstacles[i].w < -40 * GF.S) obstacles.splice(i, 1);
  }
  for (var j = coinsArr.length - 1; j >= 0; j--) {
    coinsArr[j].x -= dx;
    if (coinsArr[j].x < -40 * GF.S) coinsArr.splice(j, 1);
  }
  nextSpawnX -= dx;
  var guard = 0;
  while (nextSpawnX < GF.W + 60 * GF.S && guard++ < 8) spawnGroup(nextSpawnX);

  // coin pickups
  var px = playerX();
  for (var k = 0; k < coinsArr.length; k++) {
    var c = coinsArr[k];
    if (c.taken) continue;
    var ddx = c.x - px, ddy = c.y - player.y;
    var rad = (COIN_R + PLAYER_R) * GF.S;
    if (ddx*ddx + ddy*ddy <= rad*rad) {
      c.taken = true; runCoins++;
      GF.spawnParticles(c.x, c.y, '#FFD700', 7);
      GF.spawnFloat(c.x, c.y - 12*GF.S, '+1', '#FFD700');
      Sfx.coin();
    }
  }

  // collision (AABB) unless invulnerable
  if (invulnT <= 0) {
    var pr = PLAYER_R * GF.S;
    for (var m = 0; m < obstacles.length; m++) {
      var o = obstacles[m];
      if (px + pr > o.x && px - pr < o.x + o.w &&
          player.y + pr > o.y && player.y - pr < o.y + o.h) { gameOver(); break; }
    }
  }
}

// ── DRAW ──────────────────────────────────────────────────────────────────
function shade(hex, f) {
  var n = parseInt(hex.slice(1), 16);
  var r = clamp(Math.round(((n>>16)&255)*f),0,255);
  var g = clamp(Math.round(((n>>8)&255)*f),0,255);
  var b = clamp(Math.round((n&255)*f),0,255);
  return 'rgb('+r+','+g+','+b+')';
}
function draw(ctx) {
  var z = zoneFor(zoneIdx);
  var bgGrad = ctx.createLinearGradient(0, 0, 0, GF.H);
  bgGrad.addColorStop(0, shade(z.bg, 1.25));
  bgGrad.addColorStop(0.5, z.bg);
  bgGrad.addColorStop(1, shade(z.bg, 0.7));
  ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, GF.W, GF.H);

  drawCorridor(ctx, z);

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawObstacles(ctx, z);
    drawCoins(ctx);
    if (gs === 'PLAYING' || invulnT > 0) drawPlayer(ctx);
    drawHUD(ctx, z);
    drawBanner(ctx);
    drawStartHint(ctx);
  }
  if (gs === 'MENU')     drawMenu(ctx, z);
  if (gs === 'GAMEOVER') drawGameOver(ctx, z);
  if (tutorialOpen)      drawTutorialPanel(ctx, z);
}

function drawCorridor(ctx, z) {
  var top = topY(), bot = botY();
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.strokeStyle = z.rail; ctx.lineWidth = 2 * GF.S;
  var spacing = 70 * GF.S, off = (worldX * 0.5) % spacing;
  for (var x = -off; x < GF.W; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x - 18*GF.S, bot); ctx.stroke();
  }
  ctx.restore();
  ctx.save();
  ctx.shadowColor = z.glow; ctx.shadowBlur = 14 * GF.S;
  ctx.fillStyle = z.rail;
  ctx.fillRect(0, top - 4*GF.S, GF.W, 4*GF.S);
  ctx.fillRect(0, bot, GF.W, 4*GF.S);
  ctx.restore();
}

function drawObstacles(ctx, z) {
  for (var i=0;i<obstacles.length;i++) {
    var o = obstacles[i];
    ctx.save();
    ctx.shadowColor = z.obst; ctx.shadowBlur = 10 * GF.S;
    var grad = ctx.createLinearGradient(o.x, o.y, o.x, o.y + o.h);
    grad.addColorStop(0, shade(z.obst, 1.2));
    grad.addColorStop(1, shade(z.obst, 0.75));
    ctx.fillStyle = grad;
    rr(ctx, o.x, o.y, o.w, o.h, 5*GF.S); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.fillRect(o.x, o.y, o.w, 3*GF.S);
    ctx.restore();
  }
}
function drawCoins(ctx) {
  for (var i=0;i<coinsArr.length;i++) {
    var c = coinsArr[i];
    if (c.taken) continue;
    ctx.save();
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 8*GF.S;
    var r = COIN_R * GF.S;
    var grad = ctx.createRadialGradient(c.x, c.y, 1, c.x, c.y, r);
    grad.addColorStop(0, '#fff6c0'); grad.addColorStop(0.6, '#FFD700'); grad.addColorStop(1, '#c79a00');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}
function drawPlayer(ctx) {
  var px = playerX(), s = activeSkin(), sz = PLAYER_R * 2 * GF.S;
  ctx.save();
  ctx.globalAlpha = 0.35;
  var tg = ctx.createLinearGradient(px - sz*1.6, player.y, px, player.y);
  tg.addColorStop(0, 'rgba(255,255,255,0)'); tg.addColorStop(1, s.glow);
  ctx.fillStyle = tg;
  ctx.fillRect(px - sz*1.6, player.y - sz*0.32, sz*1.6, sz*0.64);
  ctx.globalAlpha = 1;

  ctx.translate(px, player.y); ctx.rotate(player.tilt);
  if (invulnT > 0) ctx.globalAlpha = 0.5 + 0.5 * Math.sin(performance.now()/60);
  ctx.shadowColor = s.glow; ctx.shadowBlur = (14 + lastFlipFlash * 16) * GF.S;
  var grad = ctx.createLinearGradient(-sz/2, -sz/2, sz/2, sz/2);
  grad.addColorStop(0, s.inner); grad.addColorStop(1, s.outer);
  ctx.fillStyle = grad;
  rr(ctx, -sz/2, -sz/2, sz, sz, 6*GF.S); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  rr(ctx, -sz/2 + 3*GF.S, -sz/2 + 3*GF.S, sz*0.4, sz*0.28, 3*GF.S); ctx.fill();
  // gravity arrow
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  var ay = gravDir > 0 ? sz*0.18 : -sz*0.18, dir = gravDir > 0 ? 1 : -1;
  ctx.beginPath();
  ctx.moveTo(0, ay + dir*5*GF.S);
  ctx.lineTo(-4*GF.S, ay - dir*3*GF.S);
  ctx.lineTo(4*GF.S, ay - dir*3*GF.S);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ── HUD ───────────────────────────────────────────────────────────────────
function drawHUD(ctx, z) {
  hudButtons = [];
  var pad = 12 * GF.S, S = GF.S;
  var distFs = clamp(40 * S, 26, 52);
  ctx.save();
  ctx.shadowColor = z.glow; ctx.shadowBlur = 10*S;
  ctx.fillStyle = '#fff';
  ctx.font = '900 ' + distFs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(Math.floor(dist) + ' ' + GF.t('dist'), GF.cx, pad);
  ctx.restore();

  var barW = clamp(160 * S, 110, 220), barH = 6 * S;
  var barX = GF.cx - barW/2, barY = pad + distFs + 6*S;
  var into = (dist % MILESTONE_STEP) / MILESTONE_STEP;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  rr(ctx, barX, barY, barW, barH, barH/2); ctx.fill();
  ctx.fillStyle = z.accent;
  rr(ctx, barX, barY, barW * into, barH, barH/2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = clamp(10*S,8,13) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('nextZone') + ': ' + GF.t(zoneFor(zoneIdx+1).key), GF.cx, barY + barH + 4*S);

  // mode + best (top-left)
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + clamp(13*S,11,16) + 'px sans-serif';
  ctx.fillStyle = z.accent;
  ctx.fillText(mode === 'DAILY' ? GF.t('daily') : GF.t('endless'), pad, pad);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = clamp(12*S,10,15) + 'px sans-serif';
  ctx.fillText(GF.t('best') + ': ' + (mode === 'DAILY' ? dailyBest : endlessBest), pad, pad + clamp(17*S,14,21));

  // coins (top-right)
  ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + clamp(15*S,12,19) + 'px sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('◉ ' + runCoins, GF.W - pad, pad);

  // ? + mute pills (top-right, under coins) — large tap targets
  var pillS = clamp(40*S, 40, 50);
  var qx = GF.W - pad - pillS, qy = pad + clamp(24*S,20,30);
  drawPill(ctx, qx, qy, pillS, '?', z);
  hudButtons.push({ x:qx, y:qy, w:pillS, h:pillS, fn:function(){ tutorialOpen = true; } });
  var mx = qx - pillS - 8*S, my = qy;
  drawPill(ctx, mx, my, pillS, audioMuted ? '✕' : '♪', z);
  hudButtons.push({ x:mx, y:my, w:pillS, h:pillS, fn:toggleMute });
}
function drawPill(ctx, x, y, s, label, z) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  rr(ctx, x, y, s, s, s*0.3); ctx.fill();
  ctx.strokeStyle = z.accent; ctx.lineWidth = 1.5*GF.S;
  rr(ctx, x, y, s, s, s*0.3); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (s*0.48) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + s/2, y + s/2 + 1*GF.S);
  ctx.restore();
}
function drawBanner(ctx) {
  if (bannerT <= 0) return;
  var a = clamp(bannerT / 2.2, 0, 1), pop = clamp((2.2 - bannerT) * 4, 0, 1);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.fillStyle = '#fff';
  ctx.shadowColor = zoneFor(zoneIdx).glow; ctx.shadowBlur = 18*GF.S;
  ctx.font = '900 ' + clamp(26*GF.S * (0.6 + pop*0.4), 18, 34) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(bannerTxt, GF.cx, GF.cy - GF.H * 0.12);
  ctx.restore();
}
function drawStartHint(ctx) {
  if (startHintT <= 0 || gs !== 'PLAYING') return;
  var a = clamp(startHintT / 1.6, 0, 1) * (0.6 + 0.4 * Math.sin(performance.now()/180));
  ctx.save();
  ctx.globalAlpha = a;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + clamp(18*GF.S,14,24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('tapToFlip'), GF.cx, GF.cy);
  ctx.restore();
}

// ── TEXT WRAP ─────────────────────────────────────────────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i=0;i<words.length;i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

// ── MENU OVERLAY ──────────────────────────────────────────────────────────
function drawMenu(ctx, z) {
  buttons = [];
  ctx.fillStyle = 'rgba(7,10,24,0.9)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var cx = GF.cx, W = GF.W, S = GF.S;
  var y = Math.max(GF.H * 0.055, 32 * S);

  ctx.save();
  ctx.shadowColor = z.glow; ctx.shadowBlur = 26*S;
  ctx.fillStyle = '#fff';
  var titleFs = clamp(46*S, 30, 60);
  ctx.font = '900 ' + titleFs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('title'), cx, y);
  ctx.restore();
  y += titleFs + 6*S;

  // everything below the title is centred (the save/restore above reverts
  // textAlign to the prior state, which can be left/right after a HUD draw)
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';

  ctx.fillStyle = z.accent;
  ctx.font = clamp(14*S,11,18) + 'px sans-serif';
  var subLines = wrapLines(ctx, GF.t('sub'), W * 0.82);
  for (var i=0;i<subLines.length;i++){ ctx.fillText(subLines[i], cx, y); y += clamp(18*S,15,22); }
  y += 8*S;

  // tutorial block (Goal/Controls/Win/Lose/Tip), wrapped
  var tutKeys = ['tut_goal','tut_controls','tut_win','tut_lose','tut_tip'];
  ctx.font = clamp(12.5*S,10.5,15) + 'px sans-serif';
  var tutMaxW = W * 0.86, lineH = clamp(16*S,13,19);
  for (var k=0;k<tutKeys.length;k++) {
    var lines = wrapLines(ctx, GF.t(tutKeys[k]), tutMaxW);
    ctx.fillStyle = (k===0) ? '#fff' : 'rgba(220,230,245,0.85)';
    for (var l=0;l<lines.length;l++){ ctx.fillText(lines[l], cx, y); y += lineH; }
    y += 3*S;
  }
  y += 6*S;

  // PLAY buttons (two, large)
  var btnW = clamp(260*S, 180, 320), btnH = clamp(54*S, 46, 64), bx = cx - btnW/2;
  drawButton(ctx, bx, y, btnW, btnH, GF.t('playDaily'), z.accent, true);
  buttons.push({ x:bx, y:y, w:btnW, h:btnH, fn:function(){ startRun('DAILY'); } });
  y += btnH + 12*S;
  drawButton(ctx, bx, y, btnW, btnH, GF.t('playEndless'), '#2a3550', false);
  buttons.push({ x:bx, y:y, w:btnW, h:btnH, fn:function(){ startRun('ENDLESS'); } });
  y += btnH + 14*S;

  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = clamp(12*S,10,15) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(GF.t('dailyBest') + ': ' + dailyBest + '   •   ' + GF.t('best') + ': ' + endlessBest + '   •   ◉ ' + coins, cx, y);
  y += clamp(20*S,16,26);

  drawSkinStrip(ctx, y, z);
}
function drawButton(ctx, x, y, w, h, label, color, primary) {
  ctx.save();
  if (primary) { ctx.shadowColor = color; ctx.shadowBlur = 18 * GF.S; }
  var grad = ctx.createLinearGradient(x, y, x, y+h);
  if (primary) { grad.addColorStop(0, shade(color,1.15)); grad.addColorStop(1, shade(color,0.7)); }
  else { grad.addColorStop(0, shade(color,1.3)); grad.addColorStop(1, color); }
  rr(ctx, x, y, w, h, h/2); ctx.fillStyle = grad; ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = primary ? '#07101f' : '#fff';
  ctx.font = '900 ' + clamp(18*GF.S,15,23) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w/2, y + h/2 + 1*GF.S);
  ctx.restore();
}
function drawSkinStrip(ctx, y, z) {
  var S = GF.S, cx = GF.cx;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = 'bold ' + clamp(13*S,11,16) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('skins'), cx, y);
  y += clamp(20*S,16,24);
  var n = SKINS.length;
  var cell = clamp(46*S, 38, 56), gap = clamp(8*S, 6, 12);
  var perRow = Math.max(1, Math.floor((GF.W * 0.92 + gap) / (cell + gap)));
  perRow = Math.min(perRow, n);
  for (var i=0;i<n;i++) {
    var row = Math.floor(i / perRow), col = i % perRow;
    var inRow = Math.min(perRow, n - row*perRow);
    var rowW = inRow * cell + (inRow-1) * gap;
    var sx = cx - rowW/2 + col * (cell + gap);
    var sy = y + row * (cell + clamp(22*S,18,28));
    drawSkinCell(ctx, sx, sy, cell, SKINS[i], z);
  }
}
function drawSkinCell(ctx, x, y, cell, s, z) {
  var owned = !!ownedSkins[s.id], equipped = (equippedSkin === s.id);
  ctx.save();
  ctx.fillStyle = equipped ? 'rgba(255,255,255,0.16)' : 'rgba(255,255,255,0.07)';
  rr(ctx, x, y, cell, cell, 8*GF.S); ctx.fill();
  if (equipped) { ctx.strokeStyle = z.accent; ctx.lineWidth = 2*GF.S; rr(ctx, x, y, cell, cell, 8*GF.S); ctx.stroke(); }
  var pad = cell*0.22;
  ctx.shadowColor = s.glow; ctx.shadowBlur = owned ? 8*GF.S : 0;
  var grad = ctx.createLinearGradient(x+pad, y+pad, x+cell-pad, y+cell-pad);
  grad.addColorStop(0, s.inner); grad.addColorStop(1, s.outer);
  ctx.fillStyle = owned ? grad : 'rgba(120,130,150,0.5)';
  rr(ctx, x+pad, y+pad*0.7, cell-pad*2, cell-pad*2, 5*GF.S); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + clamp(9*GF.S,8,12) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var lbl;
  if (equipped) lbl = GF.t('equipped');
  else if (owned) lbl = GF.t('equip');
  else { lbl = '◉' + s.cost; if (coins < s.cost) ctx.fillStyle = 'rgba(255,120,120,0.9)'; }
  ctx.fillText(lbl, x + cell/2, y + cell + 2*GF.S);
  ctx.restore();
  buttons.push({ x:x, y:y, w:cell, h:cell + clamp(14*GF.S,12,18), fn:function(){ onSkinTap(s); } });
}
function onSkinTap(s) {
  if (ownedSkins[s.id]) { equippedSkin = s.id; saveSkins(); Sfx.click(); return; }
  if (coins >= s.cost) {
    coins -= s.cost; ownedSkins[s.id] = true; equippedSkin = s.id;
    saveCoins(); saveSkins(); Sfx.buy();
    GF.spawnParticles(GF.cx, GF.cy, s.glow, 24);
  } else { Sfx.click(); }
}

// ── GAME OVER OVERLAY ─────────────────────────────────────────────────────

  buttons = [];
  ctx.fillStyle = 'rgba(7,10,24,0.86)';

  buttons.push({ x:bx, y:y, w:btnW, h:btnH, fn:function(){ startRun(mode); } });

  drawButton(ctx, mbx, y, mBtnW, mBtnH, GF.t('menu'), '#2a3550', false);
  buttons.push({ x:mbx, y:y, w:mBtnW, h:mBtnH, fn:function(){ gs='MENU'; GF.saveRun(); } });
}

// ── TUTORIAL PANEL (reopenable via ? ) ────────────────────────────────────
function drawTutorialPanel(ctx, z) {
  buttons = [];
  ctx.fillStyle = 'rgba(5,7,18,0.94)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var cx = GF.cx, S = GF.S, W = GF.W;
  var y = GF.H * 0.12;
  ctx.save();
  ctx.shadowColor = z.glow; ctx.shadowBlur = 20*S;
  ctx.fillStyle = '#fff';
  ctx.font = '900 ' + clamp(30*S,22,40) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('howto'), cx, y);
  ctx.restore();
  y += clamp(46*S,34,56);

  var tutKeys = ['tut_goal','tut_controls','tut_win','tut_lose','tut_tip'];
  ctx.font = clamp(14*S,12,18) + 'px sans-serif';
  var maxW = W * 0.84, lineH = clamp(19*S,16,24);
  for (var k=0;k<tutKeys.length;k++) {
    var lines = wrapLines(ctx, GF.t(tutKeys[k]), maxW);
    ctx.fillStyle = (k===0) ? '#fff' : 'rgba(220,230,245,0.9)';
    ctx.textAlign = 'center';
    for (var l=0;l<lines.length;l++){ ctx.fillText(lines[l], cx, y); y += lineH; }
    y += 6*S;
  }
  y += 10*S;
  var btnW = clamp(200*S,160,260), btnH = clamp(52*S,46,62), bx = cx - btnW/2;
  drawButton(ctx, bx, y, btnW, btnH, GF.t('gotit'), z.accent, true);
  buttons.push({ x:bx, y:y, w:btnW, h:btnH, fn:function(){ tutorialOpen = false; markTutorialSeen(); Sfx.click(); } });
}

// ── INPUT ROUTING ─────────────────────────────────────────────────────────
// ONE input: tap/click anywhere flips gravity during PLAYING. On overlays the
// same press routes to buttons (which take priority).
function handlePress(x, y) {
  ensureAudio(); audioResume();
  if (tutorialOpen) {
    for (var i=0;i<buttons.length;i++){ var b=buttons[i]; if (hit(b,x,y)){ b.fn(); return; } }
    return;
  }
  if (gs === 'PLAYING') {
    for (var h=0;h<hudButtons.length;h++){ var hb=hudButtons[h]; if (hit(hb,x,y)){ hb.fn(); return; } }
    flip();
    return;
  }
  for (var j=0;j<buttons.length;j++){ var bb=buttons[j]; if (hit(bb,x,y)){ Sfx.click(); bb.fn(); return; } }
}
function hit(b, x, y) { return x >= b.x && x <= b.x+b.w && y >= b.y && y <= b.y+b.h; }

var canvas = document.getElementById('c');
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t0 = e.changedTouches[0];
  handlePress(t0.clientX, t0.clientY);
}, { passive:false });
canvas.addEventListener('mousedown', function(e) { handlePress(e.clientX, e.clientY); });
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    if (gs === 'PLAYING') flip();
    else if (gs === 'GAMEOVER') startRun(mode);
    else if (gs === 'MENU' && !tutorialOpen) startRun('DAILY');
  }
});
document.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive:false });

// ── SCREENSHOT / TEST HOOKS ───────────────────────────────────────────────
window._setupForScreenshot = function(level) {
  window._silent = true;
  markTutorialSeen(); tutorialOpen = false;
  startRun('DAILY');
  var steps = 60 + (level||1) * 30;
  for (var i=0;i<steps;i++) update(0.02);
  // Make the shot read as a dynamic flip moment: place the avatar mid-corridor
  // travelling toward the ceiling (so the gravity arrow + motion streak show),
  // and guarantee a few coins + obstacles are on-screen ahead of it.
  gravDir = -1;
  player.y = topY() + (botY() - topY()) * 0.42;
  player.vy = -260 * GF.S;
  player.tilt = -0.32;
  lastFlipFlash = 0.7;
  if (obstacles.length < 3) { spawnGroup(GF.W * 0.78); spawnGroup(GF.W * 1.05); }
  // ensure a visible coin arc near the avatar's path
  var hasCoin = false;
  for (var ci=0; ci<coinsArr.length; ci++) { if (!coinsArr[ci].taken && coinsArr[ci].x < GF.W) { hasCoin = true; break; } }
  if (!hasCoin) {
    var cy = topY() + (botY()-topY()) * 0.30;
    for (var c=0;c<4;c++) coinsArr.push({ x: GF.W*0.58 + c*34*GF.S, y: cy + Math.sin(c/3*Math.PI)*22*GF.S, taken:false });
  }
  gs = 'PLAYING';
};
window._jumpLevel = function(n) {
  if (n === 99) {
    if (gs !== 'PLAYING') startRun('DAILY');
    dist = Math.max(dist, 30);
    gameOver();
    return;
  }
  startRun('DAILY');
  var steps = 40 + (n||1) * 20;
  for (var i=0;i<steps;i++) update(0.02);
};
window._jumpEndless = function() { startRun('ENDLESS'); };
window._invincible = false;
window._setLang = function(l) { GF.lang = (l === 'ru' ? 'ru' : 'en'); };
window._setState = function(s) { if (s) gs = s; };
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'sans-serif'; };
window.__openTut = function() { tutorialOpen = true; };
window.__closeTut = function() { tutorialOpen = false; };

// ── BOOT ──────────────────────────────────────────────────────────────────
SEED_TODAY = getDaySeed();
loadMute();
loadProgress();

GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: [],
  saveKey: 'flip_dash',
  onReady: function() {
    // Yandex 1.9 — persist run context across reload. A live run bounces to
    // MENU (safe entry); coins/skins/bests persist in their own keys.
    GF.persist('flip_dash_run_v1',
      function() { return { gs: (gs==='PLAYING'?'MENU':gs), mode: mode }; },
      function(s) { if (!s) return; mode = s.mode || 'DAILY'; gs = 'MENU'; }
    );
    if (gs === 'PLAYING') gs = 'MENU';
    var headless = false;
    try { headless = (navigator.webdriver === true) || window._silent ||
      (location && location.search && /[?&]notut(=|&|$)/.test(location.search)) ||
      (location && location.protocol === 'file:'); } catch(e){}
    if (!seenTutorial && !headless) tutorialOpen = true;
    GF.exposeState(function() {
      return {
        gs: gs, mode: mode,
        dist: Math.floor(dist), coins: coins, runCoins: runCoins,
        dailyBest: dailyBest, endlessBest: endlessBest, zoneIdx: zoneIdx,
        gravDir: gravDir, scrollSpeed: Math.round(scrollSpeed),
        obstacles: obstacles.length, coinsOnScreen: coinsArr.length,
        equippedSkin: equippedSkin, ownedSkins: Object.keys(ownedSkins).length,
        tutorialOpen: tutorialOpen, seenTutorial: seenTutorial,
        RUN_SPEED: RUN_SPEED, SPEED_RAMP: SPEED_RAMP, MAX_SPEED: MAX_SPEED,
        GRAVITY: GRAVITY, FLIP_COOLDOWN: FLIP_COOLDOWN,
        OBSTACLE_GAP: OBSTACLE_GAP, GAP_MIN: GAP_MIN, COIN_RATE: COIN_RATE,
        MILESTONE_STEP: MILESTONE_STEP, SEED_TODAY: SEED_TODAY,
        PLAYER_R: PLAYER_R, OBST_W: OBST_W, COIN_R: COIN_R, PX_PER_M: PX_PER_M,
      };
    });
  },
  onUpdate: update,
  onDraw: draw,
});

// ── YANDEX MUST-HAVES (do not remove) ─────────────────────────────────────
// 1. All UI text via GF.t()/STRINGS (en+ru). 2. Run state persisted via
// GF.persist + saveRun() after transitions. 3. Fullscreen/orientation resize
// handled in gf-lib. 4. Ads only on user click — requestRevive() fires from
// the EXTRA LIFE button handler, never auto. No console.* anywhere.
})();
</script>
