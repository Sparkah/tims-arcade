function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function rr(c, x, y, w, h, r) {
  // Defensive: an early autostart frame can pass NaN/0/negative dims before
  // layout settles → arcTo throws IndexSizeError and crashes the draw loop.
  if (!(w > 0) || !(h > 0) || !isFinite(x) || !isFinite(y)) return;
  r = Math.max(0, Math.min(r, w/2, h/2));
  if (!isFinite(r)) r = 0;
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}
// Mulberry32 deterministic PRNG
function makeRng(seed) {
  var s = seed | 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    var t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function getDaySeed() {
  var d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}
function getDayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ── AUDIO (procedural WebAudio, no asset files) ───────────────────────────
function loadMute() { try { audioMuted = localStorage.getItem('flip_dash_muted') === '1'; } catch(e){} }
function saveMute() { try { localStorage.setItem('flip_dash_muted', audioMuted ? '1':'0'); } catch(e){} }
function ensureAudio() {
  if (window._silent) return null;
  if (_ac) return _ac;
  try {
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    _ac = new AC();
    _master = _ac.createGain(); _master.gain.value = 0.3; _master.connect(_ac.destination);
  } catch(e) { _ac = null; }
  return _ac;
}
function audioResume() { if (_ac && _ac.state === 'suspended') { try { _ac.resume(); } catch(e){} } }
function beep(o) {
  if (audioMuted || window._silent) return;
  var ac = ensureAudio(); if (!ac) return;
  var now = ac.currentTime, dur = o.dur || 0.1;
  var osc = ac.createOscillator(), g = ac.createGain();
  osc.type = o.type || 'sine';
  osc.frequency.setValueAtTime(o.freq, now);
  if (o.freq2 != null) osc.frequency.exponentialRampToValueAtTime(o.freq2, now + dur);
  var vol = o.vol != null ? o.vol : 0.4;
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(vol, now + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.connect(g); g.connect(_master);
  osc.start(now); osc.stop(now + dur + 0.02);
}
function noise(o) {
  if (audioMuted || window._silent) return;
  var ac = ensureAudio(); if (!ac) return;
  var now = ac.currentTime, dur = o.dur || 0.25, sr = ac.sampleRate;
  var buf = ac.createBuffer(1, Math.floor(sr*dur), sr), d = buf.getChannelData(0);
  for (var i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  var src = ac.createBufferSource(); src.buffer = buf;
  var bp = ac.createBiquadFilter(); bp.type = o.filter||'lowpass'; bp.frequency.value = o.freq||500; bp.Q.value = 0.6;
  var g = ac.createGain(); var vol = o.vol!=null?o.vol:0.4;
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(vol, now + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  src.connect(bp); bp.connect(g); g.connect(_master);
  src.start(now); src.stop(now + dur + 0.02);
}

  // escalate speed — GEAR: Steady Pace softens the per-second ramp
  var rampMul = 1 - clamp(gearVal('slowramp'), 0, 60) / 100;
  scrollSpeed = Math.min(MAX_SPEED, scrollSpeed + SPEED_RAMP * rampMul * dt);
  var dx = scrollSpeed * (overT > 0 ? 1.55 : 1) * GF.S * dt;   // OVERDRIVE = faster scroll
  worldX += dx;
  dist = worldX / (PX_PER_M * GF.S);

  // zone / milestone
  zoneIdx = Math.floor(dist / MILESTONE_STEP);
  if (zoneIdx > prevZoneIdx) {
    prevZoneIdx = zoneIdx;
    var z = zoneFor(zoneIdx);
    bannerTxt = GF.t('zoneUnlocked') + ' — ' + GF.t(z.key);
    bannerT = 2.2; GF.setShake(0.3); Sfx.zone();
    questProgress('zone', zoneIdx);   // DAILY QUEST: reach zone N
  }

  // physics: gravity toward active surface — GEAR: Glider Core lightens it.
  var gMul = 1 - clamp(gearVal('glide'), 0, 60) / 100;
  player.vy += gravDir * GRAVITY * gMul * GF.S * dt;
  player.y += player.vy * dt;
  var fL = floorLaneY(), cL = ceilLaneY();
  if (player.y >= fL) { player.y = fL; if (player.vy > 0) player.vy = 0; }
  if (player.y <= cL) { player.y = cL; if (player.vy < 0) player.vy = 0; }
  var targetTilt = clamp(player.vy / (700 * GF.S), -0.5, 0.5);
  player.tilt += (targetTilt - player.tilt) * Math.min(1, dt * 12);

  // scroll world + recycle
  for (var i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= dx;
    if (obstacles[i].x + obstacles[i].w < -40 * GF.S) obstacles.splice(i, 1);
  }
  for (var j = coinsArr.length - 1; j >= 0; j--) {
    coinsArr[j].x -= dx;
    if (coinsArr[j].x < -40 * GF.S) coinsArr.splice(j, 1);
  }
  nextSpawnX -= dx;
  var guard = 0;
  while (nextSpawnX < GF.W + 60 * GF.S && guard++ < 8) spawnGroup(nextSpawnX);

  // coin pickups — GEAR: Coin Magnet widens the radius; Lucky Strike rolls a
  // bonus coin per pickup. Each coin still also advances the daily coin quest.
  var px = playerX();
  var magnet = gearVal('magnet');                          // extra px of reach
  var rad = (COIN_R + PLAYER_R + magnet) * GF.S;
  var doubleChance = gearVal('coindouble') / 100;          // chance of +1 bonus
  for (var k = 0; k < coinsArr.length; k++) {
    var c = coinsArr[k];
    if (c.taken) continue;
    var ddx = c.x - px, ddy = c.y - player.y;
    if (ddx*ddx + ddy*ddy <= rad*rad) {
      c.taken = true;
      var got = 1;
      if (doubleChance > 0 && rng() < doubleChance) got = 2;
      if (overT > 0) got *= 2;   // OVERDRIVE doubles coin value
      runCoins += got;
      GF.spawnParticles(c.x, c.y, got > 1 ? '#fff6c0' : '#FFD700', got > 1 ? 11 : 7);
      GF.spawnFloat(c.x, c.y - 12*GF.S, '+' + got, '#FFD700');
      Sfx.coin();
      questProgress('coins', got);   // DAILY QUEST: collect N coins today
    }
  }

  // collision (AABB) unless invulnerable — GEAR: Crash Cushion shrinks the
  // effective radius; Spark Shield consumes ONE crash per run (then brief invuln)
  // so runs stay losable after the save.
  if (invulnT <= 0) {
    var shrink = 1 - clamp(gearVal('cushion'), 0, 40) / 100;  // cap at 40% smaller
    var pr = PLAYER_R * GF.S * shrink;
    var grazeBand = 24 * GF.S;                    // a near-miss this close charges OVERDRIVE
    for (var m = 0; m < obstacles.length; m++) {
      var o = obstacles[m];
      if (!(px + pr > o.x && px - pr < o.x + o.w)) continue;   // not in this obstacle's column
      var hitY = (player.y + pr > o.y && player.y - pr < o.y + o.h);
      if (hitY) {
        if (shieldArmed) {
          shieldArmed = false;
          invulnT = gearVal('shield');           // post-save grace scales with level
          player.vy = 0;
          // clear the obstacle we hit + any overlapping it so we don't re-die instantly
          for (var sx = obstacles.length - 1; sx >= 0; sx--) {
            if (obstacles[sx].x < px + 120 * GF.S) obstacles.splice(sx, 1);
          }
          GF.spawnParticles(px, player.y, '#ff5cf0', 26);
          GF.setShake(0.5); Sfx.revive();
          break;
        }
        gameOver(); break;
      } else if (!o.grazed) {
        // skimmed past without hitting → graze charge (once per obstacle)
        var gap = (player.y < o.y) ? (o.y - (player.y + pr)) : ((player.y - pr) - (o.y + o.h));
        if (gap >= 0 && gap < grazeBand) {
          o.grazed = true;
          heat = Math.min(1, heat + GRAZE_GAIN);
          grazeFlash = 1;
          GF.spawnFloat(px + 16*GF.S, player.y - 20*GF.S, GF.t('graze'), '#7df9ff');
          Sfx.coin();
          if (heat >= 1) triggerOverdrive();
        }
      }
    }
  }
}

// ── DRAW ──────────────────────────────────────────────────────────────────
function shade(hex, f) {
  var n = parseInt(hex.slice(1), 16);
  var r = clamp(Math.round(((n>>16)&255)*f),0,255);
  var g = clamp(Math.round(((n>>8)&255)*f),0,255);
  var b = clamp(Math.round((n&255)*f),0,255);
  return 'rgb('+r+','+g+','+b+')';
}
function draw(ctx) {
  var z = zoneFor(zoneIdx);
  var bgGrad = ctx.createLinearGradient(0, 0, 0, GF.H);
  bgGrad.addColorStop(0, shade(z.bg, 1.25));
  bgGrad.addColorStop(0.5, z.bg);
  bgGrad.addColorStop(1, shade(z.bg, 0.7));
  ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, GF.W, GF.H);

  drawCorridor(ctx, z);

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawObstacles(ctx, z);
    drawCoins(ctx);
    if (gs === 'PLAYING' || invulnT > 0) drawPlayer(ctx);
    drawOverdrive(ctx, z);
    drawHUD(ctx, z);
    drawBanner(ctx);
    drawStartHint(ctx);
  }
  if (gs === 'MENU')     drawMenu(ctx, z);
  if (gs === 'GAMEOVER') drawGameOver(ctx, z);
  // GEAR/QUESTS overlay sits above the MENU; it owns input while open.
  if (metaOpen && gs === 'MENU') drawMetaOverlay(ctx, z);
  // non-blocking flourishes (drawn above everything except the tutorial gate)
  if (!metaOpen) {
    if (gearToast)      drawGearToast(ctx);
    else if (questToast) drawQuestToast(ctx);   // gear toast wins if both fire
    if (gs === 'MENU')  drawBootBanner(ctx, z);
  }
  if (tutorialOpen)      drawTutorialPanel(ctx, z);
}

// Synthwave skyline that frames the corridor on wide/desktop screens — the
// centred band is the neon track; the margins become a retro city + grid sky.
// Only called when gf-lib gives us side margins (offX>0); mobile is untouched.
function drawNeonMargins(ctx, fullW, fullH, offX, bandW) {
  var S = GF.S, horizon = fullH * 0.46;
  var sky = ctx.createLinearGradient(0, 0, 0, fullH);
  sky.addColorStop(0, '#1a0b2e'); sky.addColorStop(0.5, '#241046'); sky.addColorStop(1, '#0a0618');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, fullW, fullH);
  // sun glow behind the band
  var sun = ctx.createRadialGradient(fullW/2, horizon, 8*S, fullW/2, horizon, fullW*0.5);
  sun.addColorStop(0, 'rgba(255,94,160,0.33)'); sun.addColorStop(0.5, 'rgba(150,70,210,0.13)'); sun.addColorStop(1, 'rgba(150,70,210,0)');
  ctx.fillStyle = sun; ctx.fillRect(0, 0, fullW, fullH);
  // perspective grid below the horizon
  ctx.save();
  ctx.strokeStyle = 'rgba(125,249,255,0.16)'; ctx.lineWidth = 1.2 * S;
  for (var i = 1; i <= 9; i++) {
    var t = i / 9, gy = horizon + t * t * (fullH - horizon);
    ctx.globalAlpha = 0.5 * (1 - t * 0.55);
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(fullW, gy); ctx.stroke();
  }
  ctx.globalAlpha = 0.35;
  for (var v = -10; v <= 10; v++) {
    ctx.beginPath(); ctx.moveTo(fullW/2 + v * 7 * S, horizon); ctx.lineTo(fullW/2 + v * (fullW * 0.062), fullH); ctx.stroke();
  }
  ctx.restore();
  drawNeonSkyline(ctx, 0, offX, horizon, S);
  drawNeonSkyline(ctx, offX + bandW, fullW, horizon, S);
}
function drawNeonSkyline(ctx, mx0, mx1, horizon, S) {
  var mw = mx1 - mx0; if (mw < 30) return;
  var heights = [0.48, 0.82, 0.34, 0.66, 0.92, 0.52, 0.74, 0.40];
  var n = Math.max(3, Math.round(mw / (48 * S)));
  var bw = mw / n;
  ctx.save();
  for (var i = 0; i < n; i++) {
    var hh = (34 + heights[(i + (mx0 > 0 ? 3 : 0)) % heights.length] * 128) * S;
    var bx = mx0 + i * bw, by = horizon - hh;
    ctx.fillStyle = '#120a26';
    ctx.fillRect(bx + 2*S, by, bw - 4*S, hh + 4*S);
    ctx.fillStyle = (i % 2) ? 'rgba(255,94,160,0.7)' : 'rgba(125,249,255,0.7)';
    ctx.fillRect(bx + 2*S, by, bw - 4*S, 2.5*S);   // neon roof edge
    ctx.fillStyle = 'rgba(255,221,150,0.45)';       // lit windows
    var rows = Math.floor(hh / (18 * S));
    for (var w = 0; w < 3; w++) for (var hr = 0; hr < rows; hr++) {
      if (((i + w + hr) % 3) === 0) ctx.fillRect(bx + 9*S + w*(bw-18*S)/3, by + 9*S + hr*18*S, 4*S, 5*S);
    }
  }
  ctx.restore();
}

function drawCorridor(ctx, z) {
  var top = topY(), bot = botY();
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.strokeStyle = z.rail; ctx.lineWidth = 2 * GF.S;
  var spacing = 70 * GF.S, off = (worldX * 0.5) % spacing;
  for (var x = -off; x < GF.W; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x - 18*GF.S, bot); ctx.stroke();
  }
  ctx.restore();
  ctx.save();
  ctx.shadowColor = z.glow; ctx.shadowBlur = 14 * GF.S;
  ctx.fillStyle = z.rail;
  ctx.fillRect(0, top - 4*GF.S, GF.W, 4*GF.S);
  ctx.fillRect(0, bot, GF.W, 4*GF.S);
  ctx.restore();
}

function drawObstacles(ctx, z) {
  for (var i=0;i<obstacles.length;i++) {
    var o = obstacles[i];
    ctx.save();
    ctx.shadowColor = z.obst; ctx.shadowBlur = 10 * GF.S;
    var grad = ctx.createLinearGradient(o.x, o.y, o.x, o.y + o.h);
    grad.addColorStop(0, shade(z.obst, 1.2));
    grad.addColorStop(1, shade(z.obst, 0.75));
    ctx.fillStyle = grad;
    rr(ctx, o.x, o.y, o.w, o.h, 5*GF.S); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.fillRect(o.x, o.y, o.w, 3*GF.S);
    ctx.restore();
  }
}
function drawCoins(ctx) {
  for (var i=0;i<coinsArr.length;i++) {
    var c = coinsArr[i];
    if (c.taken) continue;
    ctx.save();
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 8*GF.S;
    var r = COIN_R * GF.S;
    var grad = ctx.createRadialGradient(c.x, c.y, 1, c.x, c.y, r);
    grad.addColorStop(0, '#fff6c0'); grad.addColorStop(0.6, '#FFD700'); grad.addColorStop(1, '#c79a00');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}
function drawPlayer(ctx) {
  var px = playerX(), s = activeSkin(), sz = PLAYER_R * 2 * GF.S;
  ctx.save();
  ctx.globalAlpha = 0.35;
  var tg = ctx.createLinearGradient(px - sz*1.6, player.y, px, player.y);
  tg.addColorStop(0, 'rgba(255,255,255,0)'); tg.addColorStop(1, s.glow);
  ctx.fillStyle = tg;
  ctx.fillRect(px - sz*1.6, player.y - sz*0.32, sz*1.6, sz*0.64);
  ctx.globalAlpha = 1;

  ctx.translate(px, player.y); ctx.rotate(player.tilt);
  if (invulnT > 0) ctx.globalAlpha = 0.5 + 0.5 * Math.sin(performance.now()/60);
  ctx.shadowColor = s.glow; ctx.shadowBlur = (14 + lastFlipFlash * 16) * GF.S;
  var grad = ctx.createLinearGradient(-sz/2, -sz/2, sz/2, sz/2);
  grad.addColorStop(0, s.inner); grad.addColorStop(1, s.outer);
  ctx.fillStyle = grad;
  rr(ctx, -sz/2, -sz/2, sz, sz, 6*GF.S); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  rr(ctx, -sz/2 + 3*GF.S, -sz/2 + 3*GF.S, sz*0.4, sz*0.28, 3*GF.S); ctx.fill();
  // gravity arrow
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  var ay = gravDir > 0 ? sz*0.18 : -sz*0.18, dir = gravDir > 0 ? 1 : -1;
  ctx.beginPath();
  ctx.moveTo(0, ay + dir*5*GF.S);
  ctx.lineTo(-4*GF.S, ay - dir*3*GF.S);
  ctx.lineTo(4*GF.S, ay - dir*3*GF.S);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ── HUD ───────────────────────────────────────────────────────────────────
function drawHUD(ctx, z) {
  hudButtons = [];
  var pad = 12 * GF.S, S = GF.S;
  var distFs = clamp(40 * S, 26, 52);
  ctx.save();
  ctx.shadowColor = z.glow; ctx.shadowBlur = 10*S;
  ctx.fillStyle = '#fff';
  ctx.font = '900 ' + distFs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(Math.floor(dist) + ' ' + GF.t('dist'), GF.cx, pad);
  ctx.restore();

  var barW = clamp(160 * S, 110, 220), barH = 6 * S;
  var barX = GF.cx - barW/2, barY = pad + distFs + 6*S;
  var into = (dist % MILESTONE_STEP) / MILESTONE_STEP;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  rr(ctx, barX, barY, barW, barH, barH/2); ctx.fill();
  ctx.fillStyle = z.accent;
  rr(ctx, barX, barY, barW * into, barH, barH/2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = clamp(10*S,8,13) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('nextZone') + ': ' + GF.t(zoneFor(zoneIdx+1).key), GF.cx, barY + barH + 4*S);

  // mode + best (top-left)
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + clamp(13*S,11,16) + 'px sans-serif';
  ctx.fillStyle = z.accent;
  ctx.fillText(mode === 'DAILY' ? GF.t('daily') : GF.t('endless'), pad, pad);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = clamp(12*S,10,15) + 'px sans-serif';
  ctx.fillText(GF.t('best') + ': ' + (mode === 'DAILY' ? dailyBest : endlessBest), pad, pad + clamp(17*S,14,21));

  // coins (top-right)
  ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + clamp(15*S,12,19) + 'px sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('◉ ' + runCoins, GF.W - pad, pad);

  // ? + mute pills (top-right, under coins) — large tap targets
  var pillS = clamp(40*S, 40, 50);
  var qx = GF.W - pad - pillS, qy = pad + clamp(24*S,20,30);
  drawPill(ctx, qx, qy, pillS, '?', z);
  hudButtons.push({ x:qx, y:qy, w:pillS, h:pillS, fn:function(){ tutorialOpen = true; } });
  var mx = qx - pillS - 8*S, my = qy;
  drawPill(ctx, mx, my, pillS, audioMuted ? '✕' : '♪', z);
  hudButtons.push({ x:mx, y:my, w:pillS, h:pillS, fn:toggleMute });

  // NEXT GEAR IN Nm — keep the playtime-reward goal visible mid-run (only while
  // the next ladder item is still locked). Left-anchored, under mode/best.
  var ng = nextGear();
  if (ng) {
    var left = Math.max(1, Math.ceil(ng.min - totalPlayMin()));
    var gy = pad + clamp(36*S,30,44), gr = clamp(7*S,6,9), gx = pad + gr;
    drawGearIcon(ctx, ng, gx, gy + gr, gr);
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(200,230,245,0.85)';
    ctx.font = clamp(10.5*S,9,13) + 'px sans-serif';
    ctx.fillText(GF.t('nextGearInHud') + ' ' + left + GF.t('minShort'), gx + gr + 5*S, gy + gr);
    ctx.textBaseline = 'top';
  }
}
function drawPill(ctx, x, y, s, label, z) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  rr(ctx, x, y, s, s, s*0.3); ctx.fill();
  ctx.strokeStyle = z.accent; ctx.lineWidth = 1.5*GF.S;
  rr(ctx, x, y, s, s, s*0.3); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (s*0.48) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + s/2, y + s/2 + 1*GF.S);
  ctx.restore();
}
function drawBanner(ctx) {
  if (bannerT <= 0) return;
  var a = clamp(bannerT / 2.2, 0, 1), pop = clamp((2.2 - bannerT) * 4, 0, 1);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.fillStyle = '#fff';
  ctx.shadowColor = zoneFor(zoneIdx).glow; ctx.shadowBlur = 18*GF.S;
  ctx.font = '900 ' + clamp(26*GF.S * (0.6 + pop*0.4), 18, 34) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(bannerTxt, GF.cx, GF.cy - GF.H * 0.12);
  ctx.restore();
}
// OVERDRIVE feedback: a left-rail charge meter (fills from grazes) + a screen
// surge while the boost is live. Read at a glance, which is what sells the hook.
function drawOverdrive(ctx, z) {
  var S = GF.S, W = GF.W, H = GF.H;
  if (overT > 0) {
    var pulse = 0.55 + 0.45 * Math.sin(performance.now() / 70);
    ctx.save();
    var vg = ctx.createLinearGradient(0, 0, W, 0);
    vg.addColorStop(0,   'rgba(125,249,255,' + (0.34 * pulse).toFixed(3) + ')');
    vg.addColorStop(0.5, 'rgba(125,249,255,0)');
    vg.addColorStop(1,   'rgba(125,249,255,' + (0.34 * pulse).toFixed(3) + ')');
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 0.45; ctx.strokeStyle = '#bff8ff'; ctx.lineWidth = 2 * S;
    var now = performance.now();
    for (var i = 0; i < 8; i++) {
      var sy = (i + 0.5) / 8 * H;
      var sx = W - (((now * 0.9) + i * 137) % (W + 240 * S));
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + 60 * S, sy); ctx.stroke();
    }
    ctx.restore();
  }
  if (gs !== 'PLAYING') return;
  var f = overT > 0 ? 1 : heat;
  if (f <= 0 && grazeFlash <= 0) return;
  var mx = 12 * S, mw = 7 * S, my = H * 0.37, mh = H * 0.26;
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  rr(ctx, mx, my, mw, mh, mw / 2); ctx.fill();
  if (f > 0) {
    var fh = mh * f;
    ctx.shadowColor = '#7df9ff';
    ctx.shadowBlur = (overT > 0 ? 16 : 6 + grazeFlash * 12) * S;
    ctx.fillStyle = overT > 0 ? '#bff8ff' : (f >= 1 ? '#7df9ff' : '#39d6e6');
    rr(ctx, mx, my + mh - fh, mw, fh, mw / 2); ctx.fill();
  }
  ctx.restore();
}

function drawStartHint(ctx) {
  if (startHintT <= 0 || gs !== 'PLAYING') return;
  var a = clamp(startHintT / 1.6, 0, 1) * (0.6 + 0.4 * Math.sin(performance.now()/180));
  ctx.save();
  ctx.globalAlpha = a;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + clamp(18*GF.S,14,24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('tapToFlip'), GF.cx, GF.cy);
  ctx.restore();
}

// ── TEXT WRAP ─────────────────────────────────────────────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i=0;i<words.length;i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

// ── MENU OVERLAY ──────────────────────────────────────────────────────────
function drawMenu(ctx, z) {
  buttons = [];
  ctx.fillStyle = 'rgba(7,10,24,0.9)';
  ctx.fillRect(0, 0, GF.W, GF.H);
  var cx = GF.cx, W = GF.W, S = GF.S;
  var y = Math.max(GF.H * 0.055, 32 * S);

  ctx.save();
  ctx.shadowColor = z.glow; ctx.shadowBlur = 26*S;
  ctx.fillStyle = '#fff';
  var titleFs = clamp(46*S, 30, 60);
  ctx.font = '900 ' + titleFs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('title'), cx, y);
  ctx.restore();
  y += titleFs + 6*S;

  // everything below the title is centred (the save/restore above reverts
  // textAlign to the prior state, which can be left/right after a HUD draw)
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';

  ctx.fillStyle = z.accent;
  ctx.font = clamp(14*S,11,18) + 'px sans-serif';
  var subLines = wrapLines(ctx, GF.t('sub'), W * 0.82);
  for (var i=0;i<subLines.length;i++){ ctx.fillText(subLines[i], cx, y); y += clamp(18*S,15,22); }
  y += 8*S;

  // tutorial block (Goal/Controls/Win/Lose/Tip), wrapped
  var tutKeys = ['tut_goal','tut_controls','tut_win','tut_lose','tut_tip'];
  ctx.font = clamp(12.5*S,10.5,15) + 'px sans-serif';
  var tutMaxW = W * 0.86, lineH = clamp(16*S,13,19);
  for (var k=0;k<tutKeys.length;k++) {
    var lines = wrapLines(ctx, GF.t(tutKeys[k]), tutMaxW);
    ctx.fillStyle = (k===0) ? '#fff' : 'rgba(220,230,245,0.85)';
    for (var l=0;l<lines.length;l++){ ctx.fillText(lines[l], cx, y); y += lineH; }
    y += 3*S;
  }
  y += 6*S;

  // PLAY buttons (two, large)
  var _wide = W / GF.H > 1.15;
  // On wide viewports enlarge ~1.35x and lift the block toward H*0.58 if there is empty space.
  var btnW = clamp((_wide ? 350 : 260)*S, 180, _wide ? 460 : 320);
  var btnH = clamp((_wide ? 73 : 54)*S, 46, _wide ? 94 : 64);
  var bx = cx - btnW/2;
  // Lift only into empty space below the tutorial; Math.max prevents going above it.
  var _clearMargin = btnH / 2 + 16;
  var _btnBlockY = _wide
    ? Math.max(y + _clearMargin - btnH / 2, GF.H * 0.54 - btnH)
    : y;
  // Primary DAILY button with desktop pulse+glow
  if (_wide) {
    var _t = performance.now() / 1000;
    var _p = 1 + 0.05 * Math.sin(_t * 2.2);
    var _k = 0.5 + 0.5 * Math.sin(_t * 2.2);
    var _dW = btnW * _p, _dH = btnH * _p;
    var _dX = cx - _dW / 2, _dY = _btnBlockY + btnH / 2 - _dH / 2;
    ctx.save();
    ctx.shadowColor = 'rgba(' + z.accent.replace(/[^0-9,]/g,'') + ',' + (0.4 + 0.3 * _k).toFixed(3) + ')';
    ctx.shadowColor = z.accent; // fallback: accent colour with built-in alpha won't parse above
    ctx.shadowBlur = (22 + 10 * _k) * S;
    var _grad = ctx.createLinearGradient(_dX, _dY, _dX, _dY+_dH);
    _grad.addColorStop(0, shade(z.accent,1.15)); _grad.addColorStop(1, shade(z.accent,0.7));
    rr(ctx, _dX, _dY, _dW, _dH, _dH/2); ctx.fillStyle = _grad; ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#07101f';
    ctx.font = '900 ' + clamp(24*S,18,30) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('▶ ' + GF.t('playDaily'), cx, _btnBlockY + btnH/2 + 1*S);
    ctx.restore();
    buttons.push({ x:bx, y:_btnBlockY, w:btnW, h:btnH, fn:function(){ startRun('DAILY'); } });
  } else {
    drawButton(ctx, bx, _btnBlockY, btnW, btnH, GF.t('playDaily'), z.accent, true);
    buttons.push({ x:bx, y:_btnBlockY, w:btnW, h:btnH, fn:function(){ startRun('DAILY'); } });
  }
  y = _btnBlockY + btnH + 12*S;
  drawButton(ctx, bx, y, btnW, btnH, GF.t('playEndless'), '#2a3550', false);
  buttons.push({ x:bx, y:y, w:btnW, h:btnH, fn:function(){ startRun('ENDLESS'); } });
  y += btnH + 10*S;

  // GEAR button — opens the meta overlay (gear ladder + daily quests). A red
  // badge shows the claimable-quest count to nudge the player in.
  var gBtnH = clamp(46*S, 42, 56);
  drawButton(ctx, bx, y, btnW, gBtnH, '     ' + GF.t('gear'), '#3a2f5a', false);  // pad for the vector cog
  drawCogGlyph(ctx, bx + btnW*0.5 - ctx.measureText(GF.t('gear')).width*0.5 - 14*S, y + gBtnH/2, clamp(10*S,8,13), '#e6dcff');
  var cqMenu = claimableQuests();
  if (cqMenu > 0) drawBadge(ctx, bx + btnW - 10*S, y + 4*S, cqMenu);
  buttons.push({ x:bx, y:y, w:btnW, h:gBtnH, fn:function(){ openMeta(); } });
  y += gBtnH + 12*S;

  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = clamp(12*S,10,15) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(GF.t('dailyBest') + ': ' + dailyBest + '   •   ' + GF.t('best') + ': ' + endlessBest + '   •   ◉ ' + coins, cx, y);
  y += clamp(20*S,16,26);

}
// small red count badge (claimable quests), drawn at a corner anchor
function drawBadge(ctx, cxp, cyp, n) {
  var S = GF.S, r = clamp(10*S, 8, 13);
  ctx.save();
  ctx.beginPath(); ctx.arc(cxp, cyp, r, 0, Math.PI*2);
  ctx.fillStyle = '#ff3b6b'; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + clamp(11*S,9,14) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(String(n), cxp, cyp + 0.5*S);
  ctx.restore();
}
// small vector cog (the GEAR button mark) — 8 trapezoid teeth + hub, no glyph font.
function drawCogGlyph(ctx, x, y, r, col) {
  ctx.save();
  ctx.fillStyle = col || '#fff';
  ctx.beginPath();
  for (var i=0;i<8;i++) {
    var a0 = (i/8)*Math.PI*2, a1 = ((i+0.5)/8)*Math.PI*2;
    var ro = r, ri = r*0.66;
    if (i===0) ctx.moveTo(x + Math.cos(a0)*ro, y + Math.sin(a0)*ro);
    else ctx.lineTo(x + Math.cos(a0)*ro, y + Math.sin(a0)*ro);
    ctx.lineTo(x + Math.cos(a0+0.18)*ro, y + Math.sin(a0+0.18)*ro);
    ctx.lineTo(x + Math.cos(a1)*ri, y + Math.sin(a1)*ri);
    ctx.lineTo(x + Math.cos(a1+0.22)*ri, y + Math.sin(a1+0.22)*ri);
  }
  ctx.closePath(); ctx.fill();
  // hub hole
  ctx.beginPath(); ctx.arc(x, y, r*0.34, 0, Math.PI*2);
  ctx.fillStyle = '#3a2f5a'; ctx.fill();
  ctx.restore();
}
function openMeta() { metaOpen = true; metaTab = 'gear'; Sfx.click(); }
function drawButton(ctx, x, y, w, h, label, color, primary) {
  ctx.save();
  if (primary) { ctx.shadowColor = color; ctx.shadowBlur = 18 * GF.S; }
  var grad = ctx.createLinearGradient(x, y, x, y+h);
  if (primary) { grad.addColorStop(0, shade(color,1.15)); grad.addColorStop(1, shade(color,0.7)); }
  else { grad.addColorStop(0, shade(color,1.3)); grad.addColorStop(1, color); }
  rr(ctx, x, y, w, h, h/2); ctx.fillStyle = grad; ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = primary ? '#07101f' : '#fff';
  ctx.font = '900 ' + clamp(18*GF.S,15,23) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w/2, y + h/2 + 1*GF.S);
  ctx.restore();
}
function drawSkinStrip(ctx, y, z) {
  var S = GF.S, cx = GF.cx;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = 'bold ' + clamp(13*S,11,16) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('skins'), cx, y);
  y += clamp(20*S,16,24);
  var n = SKINS.length;
  var cell = clamp(46*S, 38, 56), gap = clamp(8*S, 6, 12);
  var perRow = Math.max(1, Math.floor((GF.W * 0.92 + gap) / (cell + gap)));
  perRow = Math.min(perRow, n);
  for (var i=0;i<n;i++) {
    var row = Math.floor(i / perRow), col = i % perRow;
    var inRow = Math.min(perRow, n - row*perRow);
    var rowW = inRow * cell + (inRow-1) * gap;
    var sx = cx - rowW/2 + col * (cell + gap);
    var sy = y + row * (cell + clamp(22*S,18,28));
    drawSkinCell(ctx, sx, sy, cell, SKINS[i], z);
  }
}
function drawSkinCell(ctx, x, y, cell, s, z) {
  var owned = !!ownedSkins[s.id], equipped = (equippedSkin === s.id);
  ctx.save();
  ctx.fillStyle = equipped ? 'rgba(255,255,255,0.16)' : 'rgba(255,255,255,0.07)';
  rr(ctx, x, y, cell, cell, 8*GF.S); ctx.fill();
  if (equipped) { ctx.strokeStyle = z.accent; ctx.lineWidth = 2*GF.S; rr(ctx, x, y, cell, cell, 8*GF.S); ctx.stroke(); }
  var pad = cell*0.22;
  ctx.shadowColor = s.glow; ctx.shadowBlur = owned ? 8*GF.S : 0;
  var grad = ctx.createLinearGradient(x+pad, y+pad, x+cell-pad, y+cell-pad);
  grad.addColorStop(0, s.inner); grad.addColorStop(1, s.outer);
  ctx.fillStyle = owned ? grad : 'rgba(120,130,150,0.5)';
  rr(ctx, x+pad, y+pad*0.7, cell-pad*2, cell-pad*2, 5*GF.S); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + clamp(9*GF.S,8,12) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var lbl;
  if (equipped) lbl = GF.t('equipped');
  else if (owned) lbl = GF.t('equip');
  else { lbl = '◉' + s.cost; if (coins < s.cost) ctx.fillStyle = 'rgba(255,120,120,0.9)'; }
  ctx.fillText(lbl, x + cell/2, y + cell + 2*GF.S);
  ctx.restore();
  buttons.push({ x:x, y:y, w:cell, h:cell + clamp(14*GF.S,12,18), fn:function(){ onSkinTap(s); } });
}
function onSkinTap(s) {
  if (ownedSkins[s.id]) { equippedSkin = s.id; saveSkins(); Sfx.click(); return; }
  if (coins >= s.cost) {
    coins -= s.cost; ownedSkins[s.id] = true; equippedSkin = s.id;
    saveCoins(); saveSkins(); Sfx.buy();
    GF.spawnParticles(GF.cx, GF.cy, s.glow, 24);
  } else { Sfx.click(); }
}

// ── GEAR ICONS (vector — NEVER emoji, which tofu in the game font) ─────────
function drawGearIcon(ctx, def, x, y, r) {
  ctx.save();
  ctx.fillStyle = def.col;
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = Math.max(1, r * 0.14);
  ctx.lineJoin = 'round';
  var i, ang, rad, px, py;
  switch (def.shape) {
    case 'magnet': // horseshoe magnet (U with two prongs)
      ctx.lineWidth = r * 0.5; ctx.strokeStyle = def.col;
      ctx.beginPath(); ctx.arc(x, y - r*0.1, r*0.7, Math.PI, 0, false); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x - r*0.7, y - r*0.1); ctx.lineTo(x - r*0.7, y + r*0.7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + r*0.7, y - r*0.1); ctx.lineTo(x + r*0.7, y + r*0.7); ctx.stroke();
      ctx.lineWidth = r * 0.5; ctx.strokeStyle = '#e8eefc';
      ctx.beginPath(); ctx.moveTo(x - r*0.7, y + r*0.55); ctx.lineTo(x - r*0.7, y + r*0.7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + r*0.7, y + r*0.55); ctx.lineTo(x + r*0.7, y + r*0.7); ctx.stroke();
      break;
    case 'rocket': // upward chevron / rocket fin = head start
      ctx.beginPath(); ctx.moveTo(x, y - r); ctx.lineTo(x + r*0.7, y + r*0.5);
      ctx.lineTo(x, y + r*0.15); ctx.lineTo(x - r*0.7, y + r*0.5); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.moveTo(x, y - r*0.5); ctx.lineTo(x + r*0.28, y + r*0.1); ctx.lineTo(x - r*0.28, y + r*0.1); ctx.closePath(); ctx.fill();
      break;
    case 'coins': // two stacked coins
      ctx.beginPath(); ctx.ellipse(x, y + r*0.42, r*0.82, r*0.4, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(x, y - r*0.18, r*0.82, r*0.4, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.ellipse(x, y - r*0.18, r*0.4, r*0.18, 0, 0, Math.PI*2); ctx.stroke();
      break;
    case 'shield': // rounded shield (cushion)
      ctx.beginPath();
      ctx.moveTo(x, y - r); ctx.lineTo(x + r*0.8, y - r*0.55);
      ctx.lineTo(x + r*0.8, y + r*0.2); ctx.quadraticCurveTo(x + r*0.8, y + r*0.8, x, y + r);
      ctx.quadraticCurveTo(x - r*0.8, y + r*0.8, x - r*0.8, y + r*0.2);
      ctx.lineTo(x - r*0.8, y - r*0.55); ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'gauge': // speed gauge — arc + needle (steady pace)
      ctx.lineWidth = r * 0.26; ctx.strokeStyle = def.col;
      ctx.beginPath(); ctx.arc(x, y + r*0.2, r*0.78, Math.PI*1.15, Math.PI*1.85, false); ctx.stroke();
      ctx.lineWidth = Math.max(1, r*0.16); ctx.strokeStyle = '#fff';
      ctx.beginPath(); ctx.moveTo(x, y + r*0.2); ctx.lineTo(x - r*0.4, y - r*0.4); ctx.stroke();
      ctx.beginPath(); ctx.arc(x, y + r*0.2, r*0.16, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
      break;
    case 'aegis': // shield with a bolt (spark shield)
      ctx.beginPath();
      ctx.moveTo(x, y - r); ctx.lineTo(x + r*0.82, y - r*0.5);
      ctx.lineTo(x + r*0.82, y + r*0.25); ctx.quadraticCurveTo(x + r*0.82, y + r*0.85, x, y + r);
      ctx.quadraticCurveTo(x - r*0.82, y + r*0.85, x - r*0.82, y + r*0.25);
      ctx.lineTo(x - r*0.82, y - r*0.5); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#fff8'; ctx.strokeStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(x + r*0.12, y - r*0.45); ctx.lineTo(x - r*0.28, y + r*0.1);
      ctx.lineTo(x + r*0.02, y + r*0.1); ctx.lineTo(x - r*0.12, y + r*0.55);
      ctx.lineTo(x + r*0.3, y - r*0.05); ctx.lineTo(x - r*0.0, y - r*0.05); ctx.closePath(); ctx.fill();
      break;
    case 'wing': // wing / glider
      ctx.beginPath();
      ctx.moveTo(x - r, y + r*0.1);
      ctx.quadraticCurveTo(x, y - r*0.9, x + r, y - r*0.2);
      ctx.quadraticCurveTo(x + r*0.3, y + r*0.1, x + r*0.5, y + r*0.6);
      ctx.quadraticCurveTo(x - r*0.2, y + r*0.2, x - r, y + r*0.1);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'gem': // faceted gem (fortune)
      ctx.beginPath();
      ctx.moveTo(x, y - r); ctx.lineTo(x + r*0.85, y - r*0.25);
      ctx.lineTo(x + r*0.55, y + r*0.85); ctx.lineTo(x - r*0.55, y + r*0.85);
      ctx.lineTo(x - r*0.85, y - r*0.25); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath(); ctx.moveTo(x - r*0.85, y - r*0.25); ctx.lineTo(x + r*0.85, y - r*0.25);
      ctx.moveTo(x, y - r); ctx.lineTo(x, y + r*0.85); ctx.stroke();
      break;
    default:
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}

// ── META OVERLAY (GEAR ladder + DAILY quests) — reachable from MENU ─────────
function drawMetaOverlay(ctx, z) {
  buttons = [];
  metaTabRects = []; gearTileRects = []; gearUpRects = []; equipSlotRects = []; questClaimRects = []; metaCloseRect = null; metaContentRect = null;
  var S = GF.S, W = GF.W, H = GF.H, cx = GF.cx, ru = (GF.lang === 'ru');
  // full-canvas scrim (popup hygiene: OPAQUE wash so the MENU behind doesn't
  // bleed through the panel — 0.95 still ghosted the title/PLAY button glow)
  ctx.fillStyle = '#06081a'; ctx.fillRect(0, 0, W, H);

  var y = Math.max(H * 0.045, 26 * S);
  ctx.save();
  ctx.shadowColor = z.glow; ctx.shadowBlur = 20*S;
  ctx.fillStyle = '#fff';
  ctx.font = '900 ' + clamp(30*S,22,40) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('gear'), cx, y);
  ctx.restore();
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  y += clamp(38*S,28,48);

  // header: banked coins (spent on upgrades) + cumulative playtime
  var tm = Math.floor(totalPlayMin());
  var playStr = (tm >= 60 ? Math.floor(tm/60) + GF.t('hourShort') + ' ' + (tm%60) + GF.t('minShort') : tm + GF.t('minShort'));
  ctx.font = 'bold ' + clamp(15*S,12,19) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('◉ ' + coins + '      ' + GF.t('played') + ': ' + playStr, cx, y);
  y += clamp(24*S,19,30);

  // tab row (GEAR | QUESTS) with claimable badge on QUESTS
  var maxW = Math.min(W - 24*S, 460*S);
  var contentTop = y;
  var tabX = cx - maxW/2, tabH = clamp(36*S,30,46), tabGap = 8*S, tabW = (maxW - tabGap)/2;
  var cq = claimableQuests();
  var tabs = [ { id:'gear', label:GF.t('gearTab') }, { id:'quests', label:GF.t('questsTab'), badge:cq } ];
  for (var t=0;t<tabs.length;t++) {
    var on = (metaTab === tabs[t].id), bxx = tabX + t*(tabW + tabGap);
    rr(ctx, bxx, y, tabW, tabH, 9*S);
    ctx.fillStyle = on ? 'rgba(120,90,200,0.30)' : 'rgba(255,255,255,0.06)'; ctx.fill();
    ctx.strokeStyle = on ? z.accent : 'rgba(255,255,255,0.16)'; ctx.lineWidth = 1.5*S; rr(ctx, bxx, y, tabW, tabH, 9*S); ctx.stroke();
    ctx.fillStyle = on ? '#fff' : 'rgba(200,210,230,0.7)';
    ctx.font = 'bold ' + clamp(13*S,10.5,17) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(tabs[t].label, bxx + tabW/2, y + tabH/2);
    if (tabs[t].badge) drawBadge(ctx, bxx + tabW - 10*S, y + 6*S, tabs[t].badge);
    metaTabRects.push({ tab:tabs[t].id, x:bxx, y:y, w:tabW, h:tabH });
  }
  ctx.textBaseline = 'top';
  y += tabH + 12*S;

  // CLOSE button reserved at the bottom; content fills the space between.
  var closeH = clamp(48*S,44,58), closeW = clamp(200*S,170,280);
  var closeY = H - closeH - clamp(16*S,12,24);
  var contentBottom = closeY - 12*S;

  if (metaTab === 'gear') drawGearTab(ctx, z, y, contentBottom, maxW);
  else drawQuestsTab(ctx, z, y, contentBottom, maxW);

  drawButton(ctx, cx - closeW/2, closeY, closeW, closeH, GF.t('close'), z.accent, true);
  metaCloseRect = { x:cx - closeW/2, y:closeY, w:closeW, h:closeH };
  // content column — a tap OUTSIDE this band (side margins / above tabs / below
  // CLOSE) dismisses the overlay (standard modal-scrim behaviour).
  metaContentRect = { x:tabX, y:contentTop, w:maxW, h:(closeY + closeH) - contentTop };
}

// GEAR tab: next-gear progress + 3 equip slots + the 8-item ladder grid.
function drawGearTab(ctx, z, topY, bottomY, maxW) {
  var S = GF.S, cx = GF.cx, ru = (GF.lang === 'ru'), x = cx - maxW/2;
  var y = topY;

  // next-gear progress (the visible pull)
  var ng = nextGear();
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  if (ng) {
    var prevMin = 0;
    for (var pi=0;pi<GEAR_DEFS.length;pi++){ if (GEAR_DEFS[pi].id === ng.id) break; prevMin = GEAR_DEFS[pi].min; }
    var frac = clamp((totalPlayMin() - prevMin) / (ng.min - prevMin), 0, 1);
    var left = Math.max(1, Math.ceil(ng.min - totalPlayMin()));
    ctx.fillStyle = 'rgba(210,225,245,0.85)'; ctx.font = clamp(11.5*S,9.5,15) + 'px sans-serif';
    ctx.fillText(GF.t('nextGearIn') + ' ' + left + ' ' + GF.t('minShort'), x, y);
    var barW = maxW, barH = 7*S, barY = y + clamp(16*S,14,20);
    rr(ctx, x, barY, barW, barH, barH/2); ctx.fillStyle = 'rgba(255,255,255,0.13)'; ctx.fill();
    rr(ctx, x, barY, Math.max(barH, barW*frac), barH, barH/2); ctx.fillStyle = ng.col; ctx.fill();
  } else {
    ctx.fillStyle = '#a8e55a'; ctx.font = 'bold ' + clamp(12*S,10,15) + 'px sans-serif';
    ctx.fillText(GF.t('allGear'), x, y);
  }
  y += clamp(34*S,28,40);

  // equip slots row (3)
  ctx.fillStyle = 'rgba(180,190,210,0.8)'; ctx.font = 'bold ' + clamp(11*S,9,14) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.fillText(GF.t('equipped_slots'), x, y);
  y += clamp(16*S,14,20);
  var slotR = clamp(26*S,21,32), slotGap = clamp(20*S,12,30);
  var totalSlotsW = GEAR_SLOTS*(slotR*2) + (GEAR_SLOTS-1)*slotGap;
  var slotStartX = cx - totalSlotsW/2, slotsY = y + slotR;
  for (var s=0;s<GEAR_SLOTS;s++) {
    var scx = slotStartX + slotR + s*(slotR*2 + slotGap), scy = slotsY;
    var eid = meta ? meta.gear.equipped[s] : null;
    ctx.beginPath(); ctx.arc(scx, scy, slotR, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
    ctx.strokeStyle = eid ? GEAR_BY_ID[eid].col : 'rgba(255,255,255,0.22)'; ctx.lineWidth = 2*S;
    ctx.setLineDash(eid ? [] : [4*S,4*S]); ctx.stroke(); ctx.setLineDash([]);
    if (eid) drawGearIcon(ctx, GEAR_BY_ID[eid], scx, scy, slotR*0.6);
    equipSlotRects.push({ slot:s, x:scx - slotR, y:scy - slotR, w:slotR*2, h:slotR*2 });
  }
  y = slotsY + slotR + clamp(14*S,10,18);

  // gear grid — 4 cols × 2 rows. Tiles auto-size to fit the band [y, bottomY].
  var cols = 4, gap = clamp(7*S,5,10), pad = 0;
  var rows = Math.ceil(GEAR_DEFS.length / cols);
  var tileW = (maxW - gap*(cols-1)) / cols;
  var avail = bottomY - y;
  var tileH = clamp((avail - gap*(rows-1)) / rows, 60*S, 92*S);
  for (var i=0;i<GEAR_DEFS.length;i++) {
    var def = GEAR_DEFS[i], col = i % cols, row = Math.floor(i / cols);
    var bx = x + col*(tileW + gap), byy = y + row*(tileH + gap);
    var owned = !!(meta && meta.gear.owned[def.id]);
    var equipped = !!(meta && meta.gear.equipped.indexOf(def.id) >= 0);
    rr(ctx, bx, byy, tileW, tileH, 9*S);
    ctx.fillStyle = owned ? (equipped ? 'rgba(126,217,87,0.13)' : 'rgba(255,255,255,0.06)') : 'rgba(255,255,255,0.03)'; ctx.fill();
    ctx.strokeStyle = equipped ? '#a8e55a' : (owned ? 'rgba(150,160,200,0.5)' : 'rgba(255,255,255,0.12)'); ctx.lineWidth = 1.5*S;
    rr(ctx, bx, byy, tileW, tileH, 9*S); ctx.stroke();
    var icx = bx + tileW/2, icy = byy + tileH*0.30, ir = clamp(15*S,11,19);
    if (owned) {
      drawGearIcon(ctx, def, icx, icy, ir);
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillStyle = '#dce6f5'; ctx.font = 'bold ' + clamp(8.5*S,7.5,11) + 'px sans-serif';
      ctx.fillText(GF.t('lvl') + ' ' + (meta.gear.level[def.id]||1), icx, byy + tileH*0.52);
      // upgrade chip
      var cost = gearUpCost(def.id), maxed = !isFinite(cost);
      var afford = !!(meta && !maxed && coins >= cost);
      var chW = tileW - 8*S, chH = clamp(16*S,13,20), chX = bx + 4*S, chY = byy + tileH - chH - 4*S;
      rr(ctx, chX, chY, chW, chH, 5*S);
      ctx.fillStyle = maxed ? 'rgba(126,217,87,0.18)' : (afford ? 'rgba(255,215,0,0.20)' : 'rgba(255,255,255,0.05)'); ctx.fill();
      ctx.fillStyle = maxed ? '#a8e55a' : (afford ? '#FFD700' : '#7a8090'); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + clamp(8.5*S,7,11) + 'px sans-serif';
      ctx.fillText(maxed ? GF.t('maxed') : ('◉' + cost), chX + chW/2, chY + chH/2 + 0.5*S);
      gearTileRects.push({ id:def.id, x:bx, y:byy, w:tileW, h:tileH - chH - 6*S });
      gearUpRects.push({ id:def.id, x:chX, y:chY, w:chW, h:chH, afford:afford });
    } else {
      ctx.globalAlpha = 0.4; drawGearIcon(ctx, def, icx, icy, ir); ctx.globalAlpha = 1;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillStyle = '#8a909e';
      ctx.font = clamp(8.5*S,7.5,11) + 'px sans-serif';
      ctx.fillText(GF.t('playToUnlock') + ' ' + def.min + GF.t('minShort'), icx, byy + tileH*0.54);
    }
  }
  ctx.textBaseline = 'top';
}

// QUESTS tab: 3 daily quests, each a progress bar + a CLAIM button.
function drawQuestsTab(ctx, z, topY, bottomY, maxW) {
  var S = GF.S, cx = GF.cx, ru = (GF.lang === 'ru'), x = cx - maxW/2;
  var y = topY;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + clamp(13*S,11,17) + 'px sans-serif';
  ctx.fillText(GF.t('dailyQuests'), x, y);
  ctx.textAlign = 'right'; ctx.fillStyle = 'rgba(200,210,230,0.75)'; ctx.font = clamp(10.5*S,9,13) + 'px sans-serif';
  ctx.fillText(GF.t('resetsIn') + ' ' + Math.ceil(hoursToReset()) + GF.t('hourShort'), x + maxW, y + 2*S);
  y += clamp(24*S,20,30);

  var list = (meta && meta.quests.list) ? meta.quests.list : [];
  var rowGap = clamp(12*S,8,18);
  var rowH = clamp((bottomY - y - rowGap*2) / 3, 58*S, 96*S);
  for (var i=0;i<3;i++) {
    var q = list[i];
    var ry = y + i*(rowH + rowGap);
    rr(ctx, x, ry, maxW, rowH, 10*S);
    var done = q && questDone(q);
    ctx.fillStyle = done ? 'rgba(126,217,87,0.12)' : 'rgba(255,255,255,0.05)'; ctx.fill();
    ctx.strokeStyle = (done && !q.claimed) ? '#a8e55a' : 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1.5*S;
    rr(ctx, x, ry, maxW, rowH, 10*S); ctx.stroke();
    if (!q) continue;
    var pad = clamp(12*S,9,16);
    // label
    ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + clamp(12.5*S,10,16) + 'px sans-serif';
    var cbW = clamp(96*S,78,128);
    var labelMaxW = maxW - pad*2 - cbW - 10*S;
    var ll = wrapLines(ctx, questLabel(q), labelMaxW);
    var lh = clamp(15*S,12,19);
    for (var li=0; li<ll.length && li<2; li++) ctx.fillText(ll[li], x + pad, ry + clamp(9*S,7,13) + li*lh);
    // progress bar
    var barW = labelMaxW, barH = 7*S, barY = ry + rowH - clamp(18*S,15,24);
    rr(ctx, x + pad, barY, barW, barH, barH/2); ctx.fillStyle = 'rgba(255,255,255,0.13)'; ctx.fill();
    rr(ctx, x + pad, barY, Math.max(barH, barW*clamp(q.prog/q.target,0,1)), barH, barH/2);
    ctx.fillStyle = done ? '#a8e55a' : z.accent; ctx.fill();
    ctx.fillStyle = 'rgba(200,210,230,0.8)'; ctx.font = clamp(9.5*S,8,12.5) + 'px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(Math.min(q.prog, q.target) + '/' + q.target, x + pad, barY - clamp(9*S,7,12));
    // claim button
    var cbH = clamp(38*S,32,48), cbX = x + maxW - pad - cbW, cbY = ry + (rowH - cbH)/2;
    var can = done && !q.claimed;
    rr(ctx, cbX, cbY, cbW, cbH, 8*S);
    ctx.fillStyle = q.claimed ? 'rgba(126,217,87,0.10)' : (can ? 'rgba(126,217,87,0.28)' : 'rgba(255,255,255,0.05)'); ctx.fill();
    if (can) { ctx.strokeStyle = '#a8e55a'; ctx.lineWidth = 1.5*S; rr(ctx, cbX, cbY, cbW, cbH, 8*S); ctx.stroke(); }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (q.claimed) {
      ctx.fillStyle = '#a8e55a'; ctx.font = 'bold ' + clamp(10.5*S,9,14) + 'px sans-serif';
      ctx.fillText(GF.t('claimed'), cbX + cbW/2, cbY + cbH/2);
    } else if (can) {
      ctx.fillStyle = '#dfffd0'; ctx.font = 'bold ' + clamp(11.5*S,9.5,15) + 'px sans-serif';
      ctx.fillText(GF.t('claim'), cbX + cbW/2, cbY + cbH/2 - 6*S);
      ctx.fillStyle = '#FFD700'; ctx.font = clamp(9.5*S,8,12.5) + 'px sans-serif';
      ctx.fillText('◉ +' + q.reward, cbX + cbW/2, cbY + cbH/2 + 8*S);
    } else {
      ctx.fillStyle = 'rgba(200,210,230,0.7)'; ctx.font = 'bold ' + clamp(11*S,9,14) + 'px sans-serif';
      ctx.fillText('◉ +' + q.reward, cbX + cbW/2, cbY + cbH/2);
    }
    questClaimRects.push({ i:i, x:cbX, y:cbY, w:cbW, h:cbH, can:can });
  }
  ctx.textBaseline = 'top';
}

// ── WELCOME-BACK BANNER (login + streak + idle, shown once per boot) ────────
function drawBootBanner(ctx, z) {
  if (bootBannerT <= 0 || !meta) return;
  var S = GF.S, ru = (GF.lang === 'ru');
  var parts = [];
  var login = (meta.lastLoginReward || 0) + (meta.lastStreakBonus || 0);
  if (login > 0) parts.push(GF.t('dayStreak') + ' ' + meta.login.streak + ': +' + login);
  if (meta.pendingIdle > 0) parts.push('+' + meta.pendingIdle + ' ' + GF.t('awayBonus'));
  if (!parts.length) return;
  ctx.save();
  var a = clamp(bootBannerT / 0.6, 0, 1);
  ctx.globalAlpha = a;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + clamp(13*S,11,17) + 'px sans-serif';
  var title = GF.t('welcomeBack');
  var sub = parts.join('   •   ');
  var w = Math.min(GF.W - 28*S, Math.max(ctx.measureText(sub).width, ctx.measureText(title).width) + 36*S);

  rr(ctx, bx, by, w, h, 12*S); ctx.fillStyle = 'rgba(14,18,38,0.97)'; ctx.fill();

  ctx.strokeStyle = z.accent; ctx.lineWidth = 1.5*S; rr(ctx, bx, by, w, h, 12*S); ctx.stroke();

  ctx.fillStyle = '#FFD700'; ctx.font = clamp(11.5*S,9.5,15) + 'px sans-serif';
  ctx.fillText(sub, GF.cx, by + h*0.68);
  ctx.restore();
}

// ── INPUT ROUTING ─────────────────────────────────────────────────────────
// ONE input: tap/click anywhere flips gravity during PLAYING. On overlays the
// same press routes to buttons (which take priority).
function handlePress(x, y) {
  ensureAudio(); audioResume();
  if (tutorialOpen) {
    for (var i=0;i<buttons.length;i++){ var b=buttons[i]; if (hit(b,x,y)){ b.fn(); return; } }
    return;
  }
  // GEAR/QUESTS overlay owns input while open (tabs → upgrade → equip → slots →
  // claim → close). Taps that miss a target are swallowed (modal), never a flip.
  // Guard on gs==='MENU' so a stale flag can never trap input mid-run.
  if (metaOpen && gs === 'MENU') {
    handleMetaPress(x, y);
    return;
  }
  if (metaOpen) metaOpen = false;   // clear any stale overlay flag outside MENU
  if (gs === 'PLAYING') {
    for (var h=0;h<hudButtons.length;h++){ var hb=hudButtons[h]; if (hit(hb,x,y)){ hb.fn(); return; } }
    flip();
    return;
  }
  for (var j=0;j<buttons.length;j++){ var bb=buttons[j]; if (hit(bb,x,y)){ Sfx.click(); bb.fn(); return; } }
}
function hit(b, x, y) { return x >= b.x && x <= b.x+b.w && y >= b.y && y <= b.y+b.h; }
// Meta overlay press routing (priority: close → tabs → upgrade chips → tiles →
// equip slots → quest claims). All targets are rebuilt each draw frame.
function handleMetaPress(x, y) {
  if (metaCloseRect && hit(metaCloseRect, x, y)) { metaOpen = false; Sfx.click(); return; }
  for (var t=0;t<metaTabRects.length;t++){ if (hit(metaTabRects[t], x, y)){ metaTab = metaTabRects[t].tab; Sfx.click(); return; } }
  if (metaTab === 'gear') {
    for (var u=0;u<gearUpRects.length;u++){ var ur=gearUpRects[u]; if (hit(ur,x,y)){ if (ur.afford && buyGearUpgrade(ur.id)) { Sfx.buy(); GF.spawnParticles(x, y, GEAR_BY_ID[ur.id].col, 16); } else Sfx.click(); return; } }
    for (var ti=0;ti<gearTileRects.length;ti++){ if (hit(gearTileRects[ti], x, y)){ if (toggleEquipGear(gearTileRects[ti].id)) Sfx.click(); else Sfx.click(); return; } }
    for (var s=0;s<equipSlotRects.length;s++){ if (hit(equipSlotRects[s], x, y)){ unequipGearSlot(equipSlotRects[s].slot); Sfx.click(); return; } }
  } else {
    for (var q=0;q<questClaimRects.length;q++){ var qr=questClaimRects[q]; if (hit(qr,x,y)){ if (qr.can && claimQuest(qr.i) > 0) { Sfx.buy(); GF.spawnParticles(x, y, '#FFD700', 18); } else Sfx.click(); return; } }
  }
  // tap outside the content column (scrim / side margins) dismisses the overlay;
  // taps inside the column that miss a control are swallowed (no accidental close).
  if (metaContentRect && !hit(metaContentRect, x, y)) { metaOpen = false; Sfx.click(); return; }
}

var canvas = document.getElementById('c');
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t0 = e.changedTouches[0];
  // subtract the desktop-framing left margin so taps land in the centred band
  // (GF.offX is 0 on mobile/portrait, so the phone path is unchanged)
  handlePress(t0.clientX - GF.offX, t0.clientY);
}, { passive:false });
canvas.addEventListener('mousedown', function(e) { handlePress(e.clientX - GF.offX, e.clientY); });
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    if (metaOpen) { metaOpen = false; return; }   // keyboard "back" out of the GEAR overlay
    if (gs === 'PLAYING') flip();
    else if (gs === 'GAMEOVER') startRun(mode);
    else if (gs === 'MENU' && !tutorialOpen) startRun('DAILY');
  }
});
document.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive:false });
// Persist the in-progress run's playtime before the tab is hidden/closed so a
// refresh or app-switch mid-run banks it (GF.persist bounces a live run to MENU
// on reload, which would otherwise drop runPlaySec). Both events for coverage.
window.addEventListener('pagehide', function(){ bankRunPlaytime(); });
document.addEventListener('visibilitychange', function(){ if (document.visibilityState === 'hidden') bankRunPlaytime(); });

// ── SCREENSHOT / TEST HOOKS ───────────────────────────────────────────────
window._setupForScreenshot = function(level) {
  window._silent = true;
  markTutorialSeen(); tutorialOpen = false; metaOpen = false; bootBannerT = 0; gearToast = null; questToast = null;
  startRun('DAILY');
  var steps = 60 + (level||1) * 30;
  for (var i=0;i<steps;i++) update(0.02);
  // Make the shot read as a dynamic flip moment: place the avatar mid-corridor
  // travelling toward the ceiling (so the gravity arrow + motion streak show),
  // and guarantee a few coins + obstacles are on-screen ahead of it.
  gravDir = -1;
  player.y = topY() + (botY() - topY()) * 0.42;
  player.vy = -260 * GF.S;
  player.tilt = -0.32;
  lastFlipFlash = 0.7;
  if (obstacles.length < 3) { spawnGroup(GF.W * 0.78); spawnGroup(GF.W * 1.05); }
  // ensure a visible coin arc near the avatar's path
  var hasCoin = false;
  for (var ci=0; ci<coinsArr.length; ci++) { if (!coinsArr[ci].taken && coinsArr[ci].x < GF.W) { hasCoin = true; break; } }
  if (!hasCoin) {
    var cy = topY() + (botY()-topY()) * 0.30;
    for (var c=0;c<4;c++) coinsArr.push({ x: GF.W*0.58 + c*34*GF.S, y: cy + Math.sin(c/3*Math.PI)*22*GF.S, taken:false });
  }
  gs = 'PLAYING';
};
window._jumpLevel = function(n) {
  metaOpen = false; tutorialOpen = false;
  if (n === 99) {
    if (gs !== 'PLAYING') startRun('DAILY');
    dist = Math.max(dist, 30);
    gameOver();
    return;
  }
  startRun('DAILY');
  var steps = 40 + (n||1) * 20;
  for (var i=0;i<steps;i++) update(0.02);
};
window._jumpEndless = function() { startRun('ENDLESS'); };
window._invincible = false;
window._setLang = function(l) { GF.lang = (l === 'ru' ? 'ru' : 'en'); };
window._setState = function(s) { if (s) gs = s; };
window._getI18N = function() { return STRINGS; };
window._getFontBody = function() { return 'sans-serif'; };
window.__openTut = function() { tutorialOpen = true; };
window.__closeTut = function() { tutorialOpen = false; };

// ── META TEST HOOKS (drive the GEAR/QUEST systems without real-time waiting) ─
// Deep copy of meta + derived fields so a harness can assert WIRING, not just
// presence. No console output; never mutates state.
window._meta = function() {
  if (!meta) return null;
  var ng = nextGear();
  var copy = JSON.parse(JSON.stringify(meta));
  copy.coins = coins;
  copy.totalPlayMin = Math.floor(totalPlayMin());
  copy.runPlaySec = runPlaySec;
  copy.nextGear = ng ? { id: ng.id, min: ng.min } : null;
  copy.nextGearMin = ng ? Math.max(0, Math.ceil(ng.min - totalPlayMin())) : 0;
  copy.claimableQuests = claimableQuests();
  copy.ownedGearCount = Object.keys(meta.gear.owned).length;
  copy.shieldArmed = shieldArmed;
  copy.metaOpen = metaOpen; copy.metaTab = metaTab;
  return copy;
};
// Force cumulative playtime (seconds) and run the SAME unlock path update() uses.
window._addPlaytime = function(sec) {
  if (!meta) return 0;
  meta.totalPlaySec = Math.max(0, meta.totalPlaySec + (+sec || 0));
  var fresh = checkGearUnlocks();
  if (fresh.length) gearToast = { def: fresh[fresh.length - 1], t: 3.4 };
  saveMeta();
  return Object.keys(meta.gear.owned).length;
};
// Claim quest i if complete; returns coins granted (0 if not claimable).
window._claimQuest = function(i) { return claimQuest(i); };
// Force-complete quest i (so the CLAIM path can be exercised without grinding).
window._winQuest = function(i) {
  var q = meta && meta.quests.list && meta.quests.list[i];
  if (!q) return false; q.prog = q.target; saveMeta(); return true;
};
// Equip toggle / upgrade a gear by id (returns whether the action applied).
window._equipGear = function(id) { return toggleEquipGear(id); };
window._buyGear = function(id) { return buyGearUpgrade(id); };
// Grant coins (exercise upgrade-buy paths). No console output.
window._grantCoins = function(n) { coins += (+n || 0); saveCoins(); return coins; };
window._openMeta = function(tab) { metaOpen = true; metaTab = (tab === 'quests' ? 'quests' : 'gear'); };

// ── PROMO CAPTURE (?promo=climax) ──────────────────────────────────────────
// Boots straight into a run with a deterministic, hand-tuned corridor + an
// autopilot that flips floor<->ceiling to weave the obstacles and sweep coins,
// so Shared/skills/promo-video/tools/record_promo.js gets a clean 18s CG clip
// every time. STRICTLY gated on the query param (set in onReady); off the promo
// URL nothing here runs and gameplay is byte-for-byte the shipped behaviour.
//
// Autopilot timing — flip when the nearest un-passed obstacle on the player's
// CURRENT surface lane is inside a forward margin scaled by current speed, so a
// flip lands the cube on the clear lane before the obstacle reaches its column.
var _promoSeenObst = null;   // identity of the obstacle that last triggered a flip (no double-fire on the same one)
function promoSteer(dt) {
  if (gs !== 'PLAYING') return;
  var px = playerX(), pr = PLAYER_R * GF.S;
  // Which lane is the cube settling toward right now?
  var onFloor = (gravDir > 0);
  var laneY = onFloor ? floorLaneY() : ceilLaneY();
  // Forward look-ahead: react sooner when faster (cross time ~constant).
  var lookAhead = clamp(scrollSpeed * GF.S * 0.55, 120 * GF.S, 300 * GF.S);
  // Find the nearest obstacle AHEAD of the cube that overlaps the CURRENT lane.
  var threat = null, threatDx = Infinity;
  for (var i = 0; i < obstacles.length; i++) {
    var o = obstacles[i];
    if (o.x + o.w < px - pr) continue;                 // already passed
    var dxFront = o.x - (px + pr);                     // gap to its leading edge
    if (dxFront > lookAhead) continue;                 // too far to matter yet
    // does it occupy the lane the cube is heading to (y overlap with a margin)?
    if (o.y < laneY + pr * 1.25 && o.y + o.h > laneY - pr * 1.25) {
      if (dxFront < threatDx) { threatDx = dxFront; threat = o; }
    }
  }
  if (!threat) { _promoSeenObst = null; return; }
  // Only flip once per threatening obstacle, and only if the cooldown is ready.
  if (threat === _promoSeenObst) return;
  if (flipCooldownT > 0) return;
  // Confirm the OPPOSITE lane is clear across the threat's x-span before committing.
  var otherY = onFloor ? ceilLaneY() : floorLaneY();
  var spanL = threat.x - pr, spanR = threat.x + threat.w + pr;
  for (var j = 0; j < obstacles.length; j++) {
    var b = obstacles[j];
    if (b.x + b.w < spanL || b.x > spanR) continue;
    if (b.y < otherY + pr * 1.25 && b.y + b.h > otherY - pr * 1.25) return; // other lane blocked too — hold (shouldn't happen with promo spawner)
  }
  _promoSeenObst = threat;
  flip();
}

// Deterministic promo corridor: single-surface obstacles that ALWAYS leave one
// full lane clear (never a pinch), alternating floor/ceiling on a comfortable
// cadence, each with a coin arc on the clear lane. Replaces spawnGroup ONLY in
// promo mode so the weave reads cleanly and the cube can always survive.
var _promoSpawnSide = 0;   // 0 = block floor (fly ceiling), 1 = block ceiling
var _promoGroupN = 0;
function promoSpawnGroup(x) {
  var top = topY(), bot = botY(), ow = OBST_W * GF.S;
  var d = diff();
  // gentle height growth so it looks alive without getting unfair to the bot
  var h = (52 + 34 * d + ((_promoGroupN % 3) * 10)) * GF.S;
  var blockFloor = (_promoSpawnSide === 0);
  if (blockFloor) obstacles.push({ x:x, y:bot - h, w:ow, h:h, surface:'floor' });
  else            obstacles.push({ x:x, y:top,     w:ow, h:h, surface:'ceil'  });
  var safeSurface = blockFloor ? 'ceil' : 'floor';
  // coin arc hugging the clear lane just after the block (gives the sweep beat)
  var n = 4;
  var cy0 = (safeSurface === 'floor') ? bot - (PLAYER_R + CORRIDOR_PAD + 6) * GF.S
                                      : top + (PLAYER_R + CORRIDOR_PAD + 6) * GF.S;
  var cx0 = x + ow + 40 * GF.S;
  var arc = 24 * GF.S * (safeSurface === 'floor' ? -1 : 1);
  for (var i = 0; i < n; i++) {
    var tt = n > 1 ? i / (n - 1) : 0;
    coinsArr.push({ x: cx0 + i * 34 * GF.S, y: cy0 + Math.sin(tt * Math.PI) * arc, taken:false });
  }
  // comfortable, slightly-tightening gap; alternate the blocked side next time
  var gap = clamp((360 - 70 * d), 250, 360) * GF.S;
  _promoSpawnSide ^= 1; _promoGroupN++;
  nextSpawnX = x + gap;
}

function promoSetup() {
  promoActive = true;
  window._silent = true;          // hard-silence all SFX paths
  audioMuted = true;              // and the music bed (also -an + --mute-audio in recorder)
  try { GF.setMusicMuted(true); } catch (e) {}
  // hide the OS cursor (CG: no cursor in preview)
  try { var st = document.createElement('style'); st.textContent = 'html,body,canvas{cursor:none !important;}'; document.head.appendChild(st); } catch (e) {}
  // seed everything deterministically so frame N is identical run-to-run
  var PROMO_SEED = 0x5EED1234;
  SEED_TODAY = PROMO_SEED;
  rng = makeRng(PROMO_SEED);
  Math.random = makeRng(PROMO_SEED ^ 0x9E3779B9);   // particle/jitter determinism
  // suppress every overlay/banner so the clip is pure gameplay
  seenTutorial = true; tutorialOpen = false; metaOpen = false;
  bootBannerT = 0; gearToast = null; questToast = null;
  // swap in the clean promo corridor + kick off a DAILY run immediately
  spawnGroup = promoSpawnGroup;
  _promoSpawnSide = 0; _promoGroupN = 0; _promoSeenObst = null;
  startRun('DAILY');
  startHintT = 0;                 // no "TAP TO FLIP" coaching text in the clip
  // first ~1.2s reads as a clean establishing beat (pre-spawned blocks start
  // off-screen at GF.W+; the cube cruises the floor before the first reaches it)
}

// ── BOOT ──────────────────────────────────────────────────────────────────
SEED_TODAY = getDaySeed();
loadMute();
loadProgress();

GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: [],
  saveKey: 'flip_dash',
  drawMargins: drawNeonMargins,
  onReady: function() {
    // ?promo=climax — detected FIRST so it overrides every normal boot path
    // (tutorial gate, login banner, autostart). Gated strictly on the query
    // param: shipped/gallery builds never carry it, so this branch is dead code
    // for real players. Sets window._silent before music init = guaranteed mute.
    var _promo = false;
    try { _promo = (new URLSearchParams(location.search)).get('promo') === 'climax'; } catch (e) {}
    if (_promo) window._silent = true;
    // Yandex 1.9 — persist run context across reload. A live run bounces to
    // MENU (safe entry); coins/skins/bests persist in their own keys.
    GF.persist('flip_dash_run_v1',
      function() { return { gs: (gs==='PLAYING'?'MENU':gs), mode: mode }; },
      function(s) { if (!s) return; mode = s.mode || 'DAILY'; gs = 'MENU'; }
    );
    if (gs === 'PLAYING') gs = 'MENU';
    var headless = false;
    try { headless = (navigator.webdriver === true) || window._silent ||
      (location && location.search && /[?&]notut(=|&|$)/.test(location.search)) ||
      (location && location.protocol === 'file:'); } catch(e){}
    if (!seenTutorial && !headless) tutorialOpen = true;
    // GEAR + DAILY meta: load AFTER loadProgress (coins already in), then award
    // the boot-time reason-to-return (login/streak/idle). Banner suppressed in
    // headless/screenshot runs but the grants still apply deterministically.
    meta = loadMeta();
    claimOnOpen(!headless);
    // Procedural background-music bed (factory baseline). Begins on the first
    // user gesture; honours the same mute pill as the SFX (mirrored in toggleMute).
    GF.startMusic({ preset: 'synth', muted: audioMuted || _promo });
    // ?promo=climax wins over the menu/autostart paths: boot the deterministic
    // capture scene (silent, no cursor, autopilot weave). Returns early so the
    // normal autostart branch can't also fire.
    if (_promo) { promoSetup(); return; }
    // Platform builds (Yandex/CrazyGames) inject window.__GF_AUTOSTART so the
    // player drops STRAIGHT into a run — no menu/title/tutorial landing. The
    // gallery build doesn't set the flag and keeps its menu. Never fire during
    // screenshot runs (window._silent) or when restoring a mid-run (gs!=='MENU').
    if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU' && !metaOpen) {
      seenTutorial = true; markTutorialSeen(); tutorialOpen = false;
      startRun('DAILY');
    }
    GF.exposeState(function() {
      var ng = nextGear();
      return {
        gs: gs, mode: mode,
        // distance IS the score in this endless runner — alias it to the names the
        // playtest harness reads for its progression check (score/distance).
        dist: Math.floor(dist), distance: Math.floor(dist), score: Math.floor(dist),
        coins: coins, runCoins: runCoins,
        dailyBest: dailyBest, endlessBest: endlessBest, zoneIdx: zoneIdx,
        gravDir: gravDir, scrollSpeed: Math.round(scrollSpeed),
        obstacles: obstacles.length, coinsOnScreen: coinsArr.length,
        equippedSkin: equippedSkin, ownedSkins: Object.keys(ownedSkins).length,
        tutorialOpen: tutorialOpen, seenTutorial: seenTutorial,
        // GEAR + DAILY meta surfaced for the harness / dashboards
        totalPlaySec: Math.floor(totalPlaySec()), totalPlayMin: Math.floor(totalPlayMin()),
        gearOwned: meta ? Object.keys(meta.gear.owned).length : 0,
        gearEquipped: meta ? meta.gear.equipped.filter(Boolean).length : 0,
        nextGear: ng ? ng.id : null, nextGearMin: ng ? Math.max(0, Math.ceil(ng.min - totalPlayMin())) : 0,
        questsClaimable: claimableQuests(), streak: meta ? meta.login.streak : 0,
        metaOpen: metaOpen, metaTab: metaTab,
        RUN_SPEED: RUN_SPEED, SPEED_RAMP: SPEED_RAMP, MAX_SPEED: MAX_SPEED,
        GRAVITY: GRAVITY, FLIP_COOLDOWN: FLIP_COOLDOWN,
        OBSTACLE_GAP: OBSTACLE_GAP, GAP_MIN: GAP_MIN, COIN_RATE: COIN_RATE,
        MILESTONE_STEP: MILESTONE_STEP, SEED_TODAY: SEED_TODAY,
        PLAYER_R: PLAYER_R, OBST_W: OBST_W, COIN_R: COIN_R, PX_PER_M: PX_PER_M,
      };
    });
  },
  onUpdate: update,
  onDraw: draw,
});

// ── YANDEX MUST-HAVES (do not remove) ─────────────────────────────────────
// 1. All UI text via GF.t()/STRINGS (en+ru). 2. Run state persisted via
// GF.persist + saveRun() after transitions. 3. Fullscreen/orientation resize
// handled in gf-lib. 4. Ads only on user click — requestRevive() fires from
// the EXTRA LIFE button handler, never auto. No console.* anywhere.
})();
</script>
