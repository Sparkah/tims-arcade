<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tier-1 Localiser</title>
  <script src="/sdk.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0b18; position: fixed; touch-action: none; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── LOCALISED STRINGS ────────────────────────────────────────────────────
var STRINGS = {
  en: {
    title: 'Tier-1 Localiser',
    sub:   'Match glyph recipes across 5 regions',
    play: 'PLAY', retry: 'RETRY',
    score: 'SCORE', best: 'BEST',
    gameover: 'CHURN OVERFLOW',
    combo: 'COMBO',
    churn: 'CHURN',
    help: '?',
    col_us: 'US', col_eu: 'EU', col_jp: 'JP', col_kr: 'KR', col_cn: 'CN',
    g_trust: 'TRUST', g_hype: 'HYPE', g_clarity: 'CLARITY', g_status: 'STATUS', g_value: 'VALUE',
    tut_goal:     'Goal: Translate incoming hooks across 5 region columns by matching each card recipe.',
    tut_controls: 'Controls: Drag a glyph from your hand onto a hook card slot.',
    tut_win:      'Win: Endless score-attack — survive as long as possible and chain combos.',
    tut_lose:     'Lose: Any single region column collects 4 churned cards.',
    tut_tip:      'Tip: Each column header shows its recipe — match at least 2 of 3 slots to clear the card.',
  },
  ru: {
    title: 'Локализатор Tier-1',
    sub:   'Подбирай рецепты глифов для 5 регионов',
    play: 'ИГРАТЬ', retry: 'ЕЩЁ РАЗ',
    score: 'ОЧКИ', best: 'РЕКОРД',
    gameover: 'ПЕРЕПОЛНЕНИЕ',
    combo: 'КОМБО',
    churn: 'ПОТЕРИ',
    help: '?',
    col_us: 'США', col_eu: 'ЕС', col_jp: 'ЯП', col_kr: 'КОР', col_cn: 'КНР',
    g_trust: 'ДОВЕРИЕ', g_hype: 'ХАЙП', g_clarity: 'ЯСНО', g_status: 'СТАТУС', g_value: 'ВЫГОДА',
    tut_goal:     'Цель: Локализуй хуки в 5 региональных колонках, подбирая рецепт глифов.',
    tut_controls: 'Управление: Перетащи глиф из руки на пустой слот карты.',
    tut_win:      'Победа: Бесконечный счёт — продержись подольше и собирай комбо.',
    tut_lose:     'Поражение: Любая колонка собирает 4 неправильно собранных карты.',
    tut_tip:      'Совет: В шапке колонки виден рецепт — попади хотя бы в 2 из 3 слотов.',
  },
};

var SPRITE_NAMES = [];

// ── TUNABLES (mirror DESIGN.md) ──────────────────────────────────────────
var HAND_SIZE = 6;
var HOOK_DROP_INTERVAL_SEC = 4.0;
var MAX_CHURN_PER_COL = 4;
var COLUMN_COUNT = 5;
var SLOTS_PER_CARD = 3;
var GLYPH_TYPES = 5;
var SCORE_PER_MATCH = 10;
var COMBO_BONUS = 5;
var TOKENS_REFILL_ON_MATCH = 3;
var DIFFICULTY_STEP_SCORE = 60;
var MIN_MATCH_FRACTION = 0.66;
var MAX_CARDS_PER_COL = 4; // visual cap

// ── GLYPHS (5 colour-coded types) ────────────────────────────────────────
// Type indices 0..4 — trust, hype, clarity, status, value
var GLYPH_COLORS = ['#4dd0e1', '#ff6b9d', '#f4e285', '#a974ff', '#7be57b'];
var GLYPH_LABEL_KEYS = ['g_trust', 'g_hype', 'g_clarity', 'g_status', 'g_value'];
// Per-column recipe — fixed 3-slot mix per region.
var COLUMN_RECIPES = [
  [0, 2, 4], // US: trust + clarity + value
  [2, 0, 3], // EU: clarity + trust + status
  [1, 3, 2], // JP: hype + status + clarity
  [3, 1, 4], // KR: status + hype + value
  [4, 3, 1], // CN: value + status + hype
];
var COLUMN_LABEL_KEYS = ['col_us', 'col_eu', 'col_jp', 'col_kr', 'col_cn'];

// ── STATE ────────────────────────────────────────────────────────────────
var gs = 'MENU';
var score = 0, best = 0, combo = 0;
var dropTimer = 0;
var dropInterval = HOOK_DROP_INTERVAL_SEC;
var columns = [];      // columns[i] = array of cards (top of column = index 0)
var columnChurn = [];  // count of churned cards per column
var hand = [];         // glyph token indices in hand
var drag = null;       // { from, glyph, x, y } | null
var helpBtn = null;    // hit rect for ? button
var flash = [];        // ephemeral burst effects { x, y, life, color }

function makeCard(colIdx) {
  return {
    col: colIdx,
    slots: [-1, -1, -1],          // glyph index per slot, -1 = empty
    slotState: [0, 0, 0],         // 0 empty, 1 correct, 2 wrong
    locked: false,                 // true once all 3 slots filled
    churn: false,                  // true if locked as fail
    matched: false,                // true if locked as success (about to remove)
    fadeT: 0,                      // animation timer (>0 = fading out)
    bornT: 0,                      // born animation (drop-in)
  };
}

function randGlyph() {
  return (Math.random() * GLYPH_TYPES) | 0;
}

function refillHand(n) {
  for (var i = 0; i < n && hand.length < HAND_SIZE; i++) {
    hand.push(randGlyph());
  }
}

function freshState() {
  score = 0;
  combo = 0;
  dropTimer = 0;
  dropInterval = HOOK_DROP_INTERVAL_SEC;
  columns = [];
  columnChurn = [];
  for (var i = 0; i < COLUMN_COUNT; i++) {
    columns.push([]);
    columnChurn.push(0);
  }
  hand = [];
  refillHand(HAND_SIZE);
  drag = null;
}

function startGame() {
  freshState();
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

function gameOver() {
  if (score > best) {
    best = score;
    try { localStorage.setItem('tier1_localiser_best', best); } catch (e) {}
  }
  gs = 'GAMEOVER';
  drag = null;
  GF.saveRun();
}

// Screenshot helper — populate a busy mid-turn board for screenshots.
// Also accepts a numeric argument from the runtime gate: large values
// (>=99) force GAMEOVER so the terminal-state check can verify reachability.
// Different positive values plant different mid-game setups so successive
// screenshot calls can capture visually distinct frames.
window._jumpLevel = function(n) {
  if (typeof n === 'number' && n >= 99) {
    freshState();
    gs = 'PLAYING';
    // Saturate one column's churn counter so a single more mismatch ends it.
    columnChurn[0] = MAX_CHURN_PER_COL;
    gameOver();
    return;
  }
  freshState();
  gs = 'PLAYING';
  var variant = (typeof n === 'number' && n > 1) ? 2 : 1;
  // Plant cards per column with partial fills + some churn.
  for (var ci = 0; ci < COLUMN_COUNT; ci++) {
    var cardsHere = variant === 1 ? 2 : (ci % 2 === 0 ? 3 : 2);
    for (var k = 0; k < cardsHere; k++) {
      var card = makeCard(ci);
      var r = COLUMN_RECIPES[ci];
      if (k === 0) {
        // Top card always has 1 correct slot to show match colour.
        card.slots[0] = r[0]; card.slotState[0] = 1;
        if (variant === 2) {
          // In variant 2, top card has 2 correct slots — closer to clear.
          card.slots[1] = r[1]; card.slotState[1] = 1;
        } else if (ci % 2 === 0) {
          card.slots[1] = r[1]; card.slotState[1] = 1;
        } else {
          card.slots[1] = (r[1] + 1) % GLYPH_TYPES; card.slotState[1] = 2;
        }
      }
      card.bornT = 1.0; // skip born-in anim so the shot is settled
      columns[ci].push(card);
    }
  }
  if (variant === 1) {
    columnChurn[1] = 2;
    columnChurn[3] = 1;
    score = 75;
    combo = 3;
    hand = [0, 2, 4, 1, 3, 0];
  } else {
    columnChurn[0] = 1;
    columnChurn[2] = 3;
    columnChurn[4] = 1;
    score = 215;
    combo = 7;
    hand = [4, 1, 2, 3, 0, 2];
  }
};

// ── HOOK DROPS ───────────────────────────────────────────────────────────
function dropHook() {
  // Pick the column with the fewest cards (skip already-churned-out columns).
  var minLen = 99, candidates = [];
  for (var i = 0; i < COLUMN_COUNT; i++) {
    if (columnChurn[i] >= MAX_CHURN_PER_COL) continue;
    var len = columns[i].length;
    if (len < minLen) { minLen = len; candidates = [i]; }
    else if (len === minLen) candidates.push(i);
  }
  if (!candidates.length) return;
  var ci = candidates[(Math.random() * candidates.length) | 0];
  // Don't overflow the visual cap — if at cap, force-churn the bottom card.
  if (columns[ci].length >= MAX_CARDS_PER_COL) {
    columnChurn[ci]++;
    columns[ci].shift();
    if (columnChurn[ci] >= MAX_CHURN_PER_COL) { gameOver(); return; }
  }
  columns[ci].push(makeCard(ci));
}

// ── DRAG HIT-TESTING ─────────────────────────────────────────────────────
// Layout helpers (computed each draw, mirrored to globals so input matches).
var L = {
  colW: 0, colX: 0, colsY: 0, colsH: 0,
  headerH: 0, cardH: 0, cardW: 0,
  handY: 0, handH: 0, tokenSize: 0, tokenSpacing: 0,
};

function layout() {
  var hudH = Math.max(48, 56 * GF.S);
  var bottomPad = Math.max(12, 16 * GF.S);
  L.handH = Math.max(80, 110 * GF.S);
  L.handY = GF.H - L.handH - bottomPad;
  L.tokenSize = Math.min(L.handH * 0.78, (GF.W - 32) / (HAND_SIZE + 1));
  L.tokenSpacing = L.tokenSize + Math.max(6, 10 * GF.S);
  L.colsY = hudH + Math.max(6, 8 * GF.S);
  L.colsH = L.handY - L.colsY - Math.max(8, 12 * GF.S);
  var marginX = Math.max(8, 14 * GF.S);
  L.colW = (GF.W - marginX * 2) / COLUMN_COUNT;
  L.colX = marginX;
  L.headerH = Math.max(54, 64 * GF.S);
  L.cardH   = Math.max(58, 76 * GF.S);
  L.cardW   = Math.min(L.colW - Math.max(6, 10 * GF.S), 130 * GF.S);
}

function cardRect(ci, slotIdxInColumn) {
  var cx = L.colX + ci * L.colW + L.colW / 2;
  var cardY0 = L.colsY + L.headerH + Math.max(4, 6 * GF.S);
  var stride = L.cardH + Math.max(6, 8 * GF.S);
  return {
    x: cx - L.cardW / 2,
    y: cardY0 + slotIdxInColumn * stride,
    w: L.cardW,
    h: L.cardH,
  };
}

function slotRect(card, idxInColumn, slotI) {
  var r = cardRect(card.col, idxInColumn);
  var pad = Math.max(6, 8 * GF.S);
  var sw = (r.w - pad * (SLOTS_PER_CARD + 1)) / SLOTS_PER_CARD;
  var sh = Math.min(r.h - pad * 2, 44 * GF.S);
  var sy = r.y + (r.h - sh) / 2;
  return { x: r.x + pad + slotI * (sw + pad), y: sy, w: sw, h: sh };
}

function topCardIndex(ci) {
  // The "active" card for this column is the LAST in the array (visually
  // it's the bottom-most rendered card, closest to the hand — most natural
  // drop target). Returns -1 if none.
  var arr = columns[ci];
  if (!arr || !arr.length) return -1;
  return arr.length - 1;
}

function handTokenRect(i) {
  var totalW = hand.length * L.tokenSpacing - (L.tokenSpacing - L.tokenSize);
  var startX = GF.cx - totalW / 2;
  return {
    x: startX + i * L.tokenSpacing,
    y: L.handY + (L.handH - L.tokenSize) / 2,
    w: L.tokenSize,
    h: L.tokenSize,
  };
}

function hit(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

// ── INPUT (pointer abstraction over mouse + touch) ───────────────────────
var pointer = { x: 0, y: 0, down: false };

function onDown(x, y) {
  pointer.down = true; pointer.x = x; pointer.y = y;
  if (gs === 'MENU' || gs === 'GAMEOVER') return;
  // ? button
  if (helpBtn && hit(helpBtn, x, y)) {
    GF.tutorial.reopen();
    return;
  }
  // Pick up a hand token
  for (var i = 0; i < hand.length; i++) {
    var r = handTokenRect(i);
    if (hit(r, x, y)) {
      drag = { from: i, glyph: hand[i], x: x, y: y };
      return;
    }
  }
}

function onMove(x, y) {
  pointer.x = x; pointer.y = y;
  if (drag) { drag.x = x; drag.y = y; }
}

function onUp(x, y) {
  pointer.down = false;
  if (gs === 'PLAYING' && drag) {
    var dropped = tryDropOnSlot(x, y, drag.glyph);
    if (dropped >= 0) {
      hand.splice(drag.from, 1);
      GF.saveRun();
    }
  }
  drag = null;
  // Touch fallback for overlay buttons (PLAY / RETRY): the synthetic
  // `click` event isn't reliably fired on every mobile browser when the
  // canvas swallows touch events, so we hit-test clickBtns directly on
  // touchend / mouseup as well. (varnish_restore 2026-05-11 class.)
  if (gs === 'MENU' || gs === 'GAMEOVER') {
    for (var i = 0; i < clickBtns.length; i++) {
      var b = clickBtns[i];
      if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
        b.fn();
        return;
      }
    }
  }
}

// Returns the slot-index (0..2) on success, -1 on miss.
function tryDropOnSlot(x, y, glyph) {
  for (var ci = 0; ci < COLUMN_COUNT; ci++) {
    if (columnChurn[ci] >= MAX_CHURN_PER_COL) continue;
    var arr = columns[ci];
    for (var k = 0; k < arr.length; k++) {
      var card = arr[k];
      if (card.locked || card.matched) continue;
      for (var s = 0; s < SLOTS_PER_CARD; s++) {
        if (card.slotState[s] !== 0) continue;
        var sr = slotRect(card, k, s);
        if (hit(sr, x, y)) {
          // Lock-in
          card.slots[s] = glyph;
          var expected = COLUMN_RECIPES[card.col][s];
          card.slotState[s] = (glyph === expected) ? 1 : 2;
          // Burst feedback
          flash.push({
            x: sr.x + sr.w / 2, y: sr.y + sr.h / 2, life: 0.5,
            color: card.slotState[s] === 1 ? '#7be57b' : '#ff6b6b',
          });
          // Check completion
          var filled = 0, correct = 0;
          for (var j = 0; j < SLOTS_PER_CARD; j++) {
            if (card.slotState[j] !== 0) filled++;
            if (card.slotState[j] === 1) correct++;
          }
          if (filled === SLOTS_PER_CARD) {
            card.locked = true;
            var frac = correct / SLOTS_PER_CARD;
            if (frac >= MIN_MATCH_FRACTION) {
              card.matched = true;
              combo++;
              score += SCORE_PER_MATCH + (combo - 1) * COMBO_BONUS;
              refillHand(TOKENS_REFILL_ON_MATCH);
              // Tighten drops when crossing score thresholds.
              var step = Math.floor(score / DIFFICULTY_STEP_SCORE);
              dropInterval = Math.max(1.6, HOOK_DROP_INTERVAL_SEC - step * 0.35);
              card.fadeT = 0.4;
            } else {
              card.churn = true;
              combo = 0;
              columnChurn[card.col]++;
              if (columnChurn[card.col] >= MAX_CHURN_PER_COL) {
                gameOver();
                return s;
              }
              card.fadeT = 0.6;
            }
          }
          GF.saveRun();
          return s;
        }
      }
    }
  }
  return -1;
}

// Wire input listeners (mouse + touch overrides — gf-lib's joystick is wrong for us).
var canvas = document.getElementById('c');
canvas.addEventListener('mousedown', function(e) { onDown(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', function(e) { onMove(e.clientX, e.clientY); });
window.addEventListener('mouseup',   function(e) { onUp(e.clientX, e.clientY); });
canvas.addEventListener('touchstart', function(e) {
  if (e.changedTouches.length) {
    var t = e.changedTouches[0];
    onDown(t.clientX, t.clientY);
  }
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  if (e.changedTouches.length) {
    var t = e.changedTouches[0];
    onMove(t.clientX, t.clientY);
  }
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
  if (e.changedTouches.length) {
    var t = e.changedTouches[0];
    onUp(t.clientX, t.clientY);
  }
}, { passive: false });
canvas.addEventListener('touchcancel', function() { drag = null; pointer.down = false; });

// ── UPDATE ───────────────────────────────────────────────────────────────
function update(dt) {
  layout();
  if (gs !== 'PLAYING') return;

  // Card lifecycle (fade out matched + churned over time).
  for (var ci = 0; ci < COLUMN_COUNT; ci++) {
    var arr = columns[ci];
    for (var k = arr.length - 1; k >= 0; k--) {
      var card = arr[k];
      card.bornT = Math.min(1, card.bornT + dt * 4.0);
      if (card.matched) {
        card.fadeT -= dt;
        if (card.fadeT <= 0) arr.splice(k, 1);
      } else if (card.churn) {
        card.fadeT -= dt;
        // Churned cards stay (visual reminder) but stop being drop targets.
      }
    }
  }
  // Flash decay
  for (var f = flash.length - 1; f >= 0; f--) {
    flash[f].life -= dt;
    if (flash[f].life <= 0) flash.splice(f, 1);
  }
  // Hook drop tick
  dropTimer += dt;
  if (dropTimer >= dropInterval) {
    dropTimer = 0;
    dropHook();
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw(c) {
  // Background gradient
  var bgGrad = c.createLinearGradient(0, 0, 0, GF.H);
  bgGrad.addColorStop(0, '#0e1024');
  bgGrad.addColorStop(1, '#1a0e2a');
  c.fillStyle = bgGrad;
  c.fillRect(0, 0, GF.W, GF.H);

  // Soft grid
  c.strokeStyle = 'rgba(255,255,255,0.04)';
  c.lineWidth = 1;
  var gridStep = Math.max(40, 60 * GF.S);
  for (var gx = 0; gx <= GF.W; gx += gridStep) { c.beginPath(); c.moveTo(gx, 0); c.lineTo(gx, GF.H); c.stroke(); }
  for (var gy = 0; gy <= GF.H; gy += gridStep) { c.beginPath(); c.moveTo(0, gy); c.lineTo(GF.W, gy); c.stroke(); }

  if (gs === 'PLAYING' || gs === 'GAMEOVER') {
    drawColumns(c);
    drawHand(c);
    drawHUD(c);
    drawFlash(c);
    if (drag) drawDragGlyph(c);
  }

  if (gs === 'MENU')     drawMenu(c);
  if (gs === 'GAMEOVER') drawGameOver(c);
}

function drawHUD(c) {
  var fs = Math.max(14, 18 * GF.S) | 0;
  c.font = 'bold ' + fs + 'px sans-serif';
  c.textAlign = 'left';
  c.textBaseline = 'top';
  c.fillStyle = '#fff';
  c.fillText(GF.t('score') + ': ' + score, 14, 12);
  c.fillStyle = '#9ab';
  c.font = Math.max(11, 13 * GF.S) | 0 + 'px sans-serif';
  c.font = Math.round(Math.max(11, 13 * GF.S)) + 'px sans-serif';
  c.fillText(GF.t('best') + ': ' + best, 14, 12 + fs + 4);
  // Combo top-center
  if (combo >= 2) {
    c.font = 'bold ' + Math.round(Math.max(13, 16 * GF.S)) + 'px sans-serif';
    c.fillStyle = '#f4e285';
    c.textAlign = 'center';
    c.fillText(GF.t('combo') + ' x' + combo, GF.cx, 14);
  }
  // ? button top-right
  var hbW = Math.max(36, 42 * GF.S), hbH = hbW;
  helpBtn = { x: GF.W - hbW - 10, y: 10, w: hbW, h: hbH };
  c.fillStyle = 'rgba(255,255,255,0.08)';
  c.strokeStyle = 'rgba(255,255,255,0.25)';
  c.lineWidth = 2;
  roundRect(c, helpBtn.x, helpBtn.y, helpBtn.w, helpBtn.h, 8);
  c.fill(); c.stroke();
  c.fillStyle = '#fff';
  c.font = 'bold ' + Math.round(hbW * 0.55) + 'px sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(GF.t('help'), helpBtn.x + helpBtn.w / 2, helpBtn.y + helpBtn.h / 2);
  c.textBaseline = 'alphabetic';
}

function drawColumns(c) {
  for (var ci = 0; ci < COLUMN_COUNT; ci++) {
    var colCx = L.colX + ci * L.colW + L.colW / 2;
    // Header (region label + recipe ribbon + churn dots)
    var headerX = colCx - L.cardW / 2;
    var headerY = L.colsY;
    var blocked = columnChurn[ci] >= MAX_CHURN_PER_COL;
    c.fillStyle = blocked ? 'rgba(60,20,20,0.85)' : 'rgba(255,255,255,0.06)';
    c.strokeStyle = blocked ? '#ff5555' : 'rgba(255,255,255,0.18)';
    c.lineWidth = 1.5;
    roundRect(c, headerX, headerY, L.cardW, L.headerH, 10);
    c.fill(); c.stroke();
    // Region label
    c.fillStyle = '#fff';
    c.font = 'bold ' + Math.round(Math.max(13, 17 * GF.S)) + 'px sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'top';
    c.fillText(GF.t(COLUMN_LABEL_KEYS[ci]), colCx, headerY + 6);
    // Recipe ribbon (3 coloured chips)
    var recipe = COLUMN_RECIPES[ci];
    var ribbonY = headerY + L.headerH - Math.max(20, 26 * GF.S);
    var chipPad = 4;
    var chipW = (L.cardW - chipPad * (SLOTS_PER_CARD + 1)) / SLOTS_PER_CARD;
    var chipH = Math.max(14, 18 * GF.S);
    for (var s = 0; s < SLOTS_PER_CARD; s++) {
      var rx = headerX + chipPad + s * (chipW + chipPad);
      c.fillStyle = GLYPH_COLORS[recipe[s]];
      roundRect(c, rx, ribbonY, chipW, chipH, 5);
      c.fill();
    }
    // Churn dots (top-right of header)
    var dotR = Math.max(3, 4 * GF.S);
    for (var d = 0; d < MAX_CHURN_PER_COL; d++) {
      var dx = headerX + L.cardW - 8 - d * (dotR * 2 + 3);
      var dy = headerY + 8;
      c.beginPath();
      c.arc(dx, dy, dotR, 0, Math.PI * 2);
      c.fillStyle = d < columnChurn[ci] ? '#ff6b6b' : 'rgba(255,255,255,0.18)';
      c.fill();
    }
    // Cards
    var arr = columns[ci];
    for (var k = 0; k < arr.length; k++) {
      var card = arr[k];
      var rect = cardRect(ci, k);
      var alpha = 1;
      if (card.matched) alpha = Math.max(0, card.fadeT / 0.4);
      // Born-in scale
      var bornScale = card.bornT < 1 ? 0.6 + card.bornT * 0.4 : 1;
      c.save();
      c.globalAlpha = alpha;
      var bx = rect.x + rect.w * (1 - bornScale) / 2;
      var by = rect.y + rect.h * (1 - bornScale) / 2;
      var bw = rect.w * bornScale, bh = rect.h * bornScale;
      // Card body
      var cardCol;
      if (card.matched)     cardCol = 'rgba(50,90,50,0.85)';
      else if (card.churn)  cardCol = 'rgba(70,30,30,0.92)';
      else                  cardCol = 'rgba(255,255,255,0.10)';
      c.fillStyle = cardCol;
      c.strokeStyle = card.churn ? '#ff6b6b' : (card.matched ? '#7be57b' : 'rgba(255,255,255,0.20)');
      c.lineWidth = 1.5;
      roundRect(c, bx, by, bw, bh, 8);
      c.fill(); c.stroke();
      // Slots
      for (var sl = 0; sl < SLOTS_PER_CARD; sl++) {
        var sr = slotRect(card, k, sl);
        // Recipe hint colour (faint border = expected glyph)
        var expected = COLUMN_RECIPES[ci][sl];
        c.strokeStyle = GLYPH_COLORS[expected] + 'aa';
        c.lineWidth = 1.5;
        c.fillStyle = card.slotState[sl] === 0
          ? 'rgba(0,0,0,0.40)'
          : (card.slotState[sl] === 1 ? 'rgba(120,229,123,0.40)' : 'rgba(255,107,107,0.40)');
        roundRect(c, sr.x, sr.y, sr.w, sr.h, 5);
        c.fill(); c.stroke();
        if (card.slots[sl] >= 0) {
          drawGlyph(c, card.slots[sl], sr.x + sr.w / 2, sr.y + sr.h / 2, Math.min(sr.w, sr.h) * 0.78, false);
        }
      }
      c.restore();
    }
  }
}

function drawHand(c) {
  // Hand tray background
  c.fillStyle = 'rgba(255,255,255,0.04)';
  c.strokeStyle = 'rgba(255,255,255,0.10)';
  c.lineWidth = 1;
  roundRect(c, 6, L.handY - 4, GF.W - 12, L.handH + 8, 12);
  c.fill(); c.stroke();
  for (var i = 0; i < hand.length; i++) {
    if (drag && drag.from === i) continue;
    var r = handTokenRect(i);
    drawGlyph(c, hand[i], r.x + r.w / 2, r.y + r.h / 2, r.w, true);
  }
}

function drawDragGlyph(c) {
  drawGlyph(c, drag.glyph, drag.x, drag.y, L.tokenSize * 1.05, true);
}

function drawGlyph(c, idx, x, y, size, withLabel) {
  var col = GLYPH_COLORS[idx];
  // Token disc
  c.fillStyle = col;
  c.beginPath();
  c.arc(x, y, size * 0.46, 0, Math.PI * 2);
  c.fill();
  // Inner ring
  c.strokeStyle = 'rgba(255,255,255,0.85)';
  c.lineWidth = Math.max(1.5, size * 0.06);
  c.beginPath();
  c.arc(x, y, size * 0.30, 0, Math.PI * 2);
  c.stroke();
  // Glyph mark (5 distinct shapes for redundancy with colour)
  c.fillStyle = '#0d0d18';
  c.beginPath();
  if (idx === 0) {
    // diamond
    c.moveTo(x, y - size * 0.18);
    c.lineTo(x + size * 0.18, y);
    c.lineTo(x, y + size * 0.18);
    c.lineTo(x - size * 0.18, y);
    c.closePath();
  } else if (idx === 1) {
    // triangle up
    c.moveTo(x, y - size * 0.20);
    c.lineTo(x + size * 0.18, y + size * 0.14);
    c.lineTo(x - size * 0.18, y + size * 0.14);
    c.closePath();
  } else if (idx === 2) {
    // square
    c.rect(x - size * 0.16, y - size * 0.16, size * 0.32, size * 0.32);
  } else if (idx === 3) {
    // star (5-point simple)
    var spikes = 5, outerR = size * 0.20, innerR = size * 0.08;
    var rot = -Math.PI / 2;
    c.moveTo(x + Math.cos(rot) * outerR, y + Math.sin(rot) * outerR);
    for (var p = 0; p < spikes; p++) {
      rot += Math.PI / spikes;
      c.lineTo(x + Math.cos(rot) * innerR, y + Math.sin(rot) * innerR);
      rot += Math.PI / spikes;
      c.lineTo(x + Math.cos(rot) * outerR, y + Math.sin(rot) * outerR);
    }
    c.closePath();
  } else {
    // circle
    c.arc(x, y, size * 0.16, 0, Math.PI * 2);
  }
  c.fill();
  // Optional label below token
  if (withLabel) {
    c.fillStyle = '#e8e8f0';
    c.font = 'bold ' + Math.round(Math.max(8, size * 0.18)) + 'px sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'top';
    c.fillText(GF.t(GLYPH_LABEL_KEYS[idx]), x, y + size * 0.50);
  }
}

function drawFlash(c) {
  for (var i = 0; i < flash.length; i++) {
    var f = flash[i];
    var p = f.life / 0.5;
    c.globalAlpha = Math.max(0, p);
    c.strokeStyle = f.color;
    c.lineWidth = 3;
    c.beginPath();
    c.arc(f.x, f.y, (1 - p) * 30 + 8, 0, Math.PI * 2);
    c.stroke();
  }
  c.globalAlpha = 1;
}

function drawMenu(c) {
  // Dim scrim
  c.fillStyle = 'rgba(8,8,18,0.92)';
  c.fillRect(0, 0, GF.W, GF.H);
  var titleFs = Math.round(Math.max(22, 40 * GF.S));
  var subFs   = Math.round(Math.max(12, 16 * GF.S));
  var tipFs   = Math.round(Math.max(11, 14 * GF.S));
  c.textAlign = 'center';
  c.textBaseline = 'alphabetic';
  // Title
  c.fillStyle = '#fff';
  c.font = 'bold ' + titleFs + 'px sans-serif';
  c.shadowColor = 'rgba(77,208,225,0.45)'; c.shadowBlur = 24;
  c.fillText(GF.t('title'), GF.cx, GF.cy - 160 * GF.S);
  c.shadowColor = 'transparent'; c.shadowBlur = 0;
  // Sub
  c.fillStyle = '#9ab';
  c.font = subFs + 'px sans-serif';
  c.fillText(GF.t('sub'), GF.cx, GF.cy - 130 * GF.S);
  // Tutorial copy
  var lines = [
    GF.t('tut_goal'),
    GF.t('tut_controls'),
    GF.t('tut_win'),
    GF.t('tut_lose'),
    GF.t('tut_tip'),
  ];
  c.font = tipFs + 'px sans-serif';
  c.fillStyle = '#cfd5e8';
  var lineY = GF.cy - 90 * GF.S;
  for (var i = 0; i < lines.length; i++) {
    wrapText(c, lines[i], GF.cx, lineY, GF.W - 60, tipFs + 6);
    lineY += (tipFs + 8) * countWrap(c, lines[i], GF.W - 60);
  }
  // PLAY button
  var btnFn = function() {
    try { localStorage.setItem('tier1_localiser_seen_tutorial', '1'); } catch (e) {}
    startGame();
  };
  var btnWBase = Math.round(Math.max(160, 240 * GF.S));
  var btnHBase = Math.round(Math.max(40, 52 * GF.S));
  var isWide = GF.W / GF.H > 1.15;
  // On wide: lift button into empty space above H*0.60 floor, but never above text.
  // On portrait: keep original position unchanged.
  var btnCY = isWide
    ? Math.max(lineY + btnHBase / 2 + 16, GF.H * 0.60)
    : GF.cy + 130 * GF.S;

  if (isWide) {
    var t2 = performance.now() / 1000;
    var pulse = 1 + 0.05 * Math.sin(t2 * 2.2);
    var btnWDraw = btnWBase * 1.35 * pulse;
    var btnHDraw = btnHBase * 1.35 * pulse;
    var bxDraw = GF.cx - btnWDraw / 2;
    var byDraw = btnCY - btnHDraw / 2;
    var grad = c.createLinearGradient(bxDraw, byDraw, bxDraw, byDraw + btnHDraw);
    grad.addColorStop(0, '#4dd0e1'); grad.addColorStop(1, '#1f8a9a');
    c.save();
    c.shadowColor = 'rgba(77,208,225,0.55)';
    c.shadowBlur = 16 + 8 * Math.sin(t2 * 2.2);
    roundRect(c, bxDraw, byDraw, btnWDraw, btnHDraw, btnHDraw / 2);
    c.fillStyle = grad; c.fill();
    c.restore();
    c.fillStyle = '#fff';
    c.font = 'bold ' + Math.round(Math.max(12, 16 * GF.S)) + 'px sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText('▶ ' + GF.t('play'), GF.cx, btnCY);
    c.textBaseline = 'alphabetic';
    // stable hit-rect at base size
    registerBtn(GF.cx - btnWBase / 2, btnCY - btnHBase / 2, btnWBase, btnHBase, btnFn);
  } else {
    drawBigBtn(c, GF.t('play'), GF.cx, btnCY, btnFn);
  }
  // Best
  if (best > 0) {
    c.fillStyle = '#557';
    c.font = Math.round(Math.max(11, 13 * GF.S)) + 'px sans-serif';
    c.fillText(GF.t('best') + ': ' + best, GF.cx, btnCY + btnHBase / 2 + 28 * GF.S);
  }
}

function drawGameOver(c) {
  c.fillStyle = 'rgba(8,8,18,0.88)';
  c.fillRect(0, 0, GF.W, GF.H);
  var titleFs = Math.round(Math.max(22, 40 * GF.S));
  var subFs   = Math.round(Math.max(12, 16 * GF.S));
  c.textAlign = 'center';
  c.textBaseline = 'alphabetic';
  c.fillStyle = '#fff';
  c.font = 'bold ' + titleFs + 'px sans-serif';
  c.shadowColor = 'rgba(255,107,107,0.5)'; c.shadowBlur = 24;
  c.fillText(GF.t('gameover'), GF.cx, GF.cy - 60 * GF.S);
  c.shadowColor = 'transparent'; c.shadowBlur = 0;
  c.fillStyle = '#9ab';
  c.font = subFs + 'px sans-serif';
  c.fillText(GF.t('score') + ': ' + score, GF.cx, GF.cy - 20 * GF.S);
  c.fillStyle = '#bcd';
  c.fillText(GF.t('best') + ': ' + best, GF.cx, GF.cy + 4 * GF.S);
  drawBigBtn(c, GF.t('retry'), GF.cx, GF.cy + 70 * GF.S, startGame);
}

function drawBigBtn(c, label, x, y, fn) {
  var btnW = Math.round(Math.max(160, 240 * GF.S));
  var btnH = Math.round(Math.max(40, 52 * GF.S));
  var bx = x - btnW / 2, by = y - btnH / 2;
  var grad = c.createLinearGradient(bx, by, bx, by + btnH);
  grad.addColorStop(0, '#4dd0e1'); grad.addColorStop(1, '#1f8a9a');
  roundRect(c, bx, by, btnW, btnH, btnH / 2);
  c.fillStyle = grad; c.fill();
  c.fillStyle = '#fff';
  c.font = 'bold ' + Math.round(Math.max(12, 16 * GF.S)) + 'px sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(label, x, y);
  c.textBaseline = 'alphabetic';
  // Hook into gf-lib button system by replicating the registration the
  // overlay normally does. We use the canvas click handler.
  registerBtn(bx, by, btnW, btnH, fn);
}

// Lightweight one-shot button registry — cleared each frame.
var clickBtns = [];
function registerBtn(x, y, w, h, fn) { clickBtns.push({ x: x, y: y, w: w, h: h, fn: fn }); }
document.getElementById('c').addEventListener('click', function(e) {
  for (var i = 0; i < clickBtns.length; i++) {
    var b = clickBtns[i];
    if (e.clientX >= b.x && e.clientX <= b.x + b.w && e.clientY >= b.y && e.clientY <= b.y + b.h) {
      b.fn();
      return;
    }
  }
});

// Helpers
function roundRect(c, x, y, w, h, r) {
  if (w < 2 * r) r = w / 2;
  if (h < 2 * r) r = h / 2;
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function wrapText(c, text, x, y, maxW, lineH) {
  var words = String(text).split(/\s+/);
  var line = '', dy = 0;
  for (var i = 0; i < words.length; i++) {
    var probe = line ? line + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && line) {
      c.fillText(line, x, y + dy);
      line = words[i];
      dy += lineH;
    } else {
      line = probe;
    }
  }
  if (line) c.fillText(line, x, y + dy);
}

function countWrap(c, text, maxW) {
  var words = String(text).split(/\s+/);
  var line = '', n = 1;
  for (var i = 0; i < words.length; i++) {
    var probe = line ? line + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && line) {
      line = words[i];
      n++;
    } else {
      line = probe;
    }
  }
  return n;
}

// Clear one-shot buttons each frame BEFORE draw repopulates them.
function preDraw() { clickBtns = []; }

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'tier1_localiser',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('tier1_localiser_best') || '0') || 0; } catch (e) {}
    GF.persist('tier1_localiser_run_v1',
      function() {
        return {
          gs: gs, score: score, combo: combo,
          columns: columns, columnChurn: columnChurn,
          hand: hand, dropTimer: dropTimer, dropInterval: dropInterval,
        };
      },
      function(s) {
        if (!s) return;
        gs           = s.gs           || 'MENU';
        score        = s.score        || 0;
        combo        = s.combo        || 0;
        columns      = s.columns      || [];
        columnChurn  = s.columnChurn  || [];
        hand         = s.hand         || [];
        dropTimer    = s.dropTimer    || 0;
        dropInterval = s.dropInterval || HOOK_DROP_INTERVAL_SEC;
        // Defensive defaults if save shape is wrong
        if (columns.length !== COLUMN_COUNT) {
          columns = []; columnChurn = [];
          for (var i = 0; i < COLUMN_COUNT; i++) { columns.push([]); columnChurn.push(0); }
        }
      }
    );
    // Always boot to MENU so the tutorial is visible.
    gs = 'MENU';
  },
  onUpdate: update,
  onDraw: function(c) {
    preDraw();
    draw(c);
  },
});

// Expose state to runtime gate. Module-level (NOT inside onReady) so the
// gate can read it before the 3-second local-boot timeout elapses — the
// state vars start at defined defaults and getter is just a snapshot.
GF.exposeState(function() {
  return {
    gs: gs, score: score, best: best,
    combo: combo,
    columnChurn: columnChurn,
    hand_len: hand.length,
    columns_lengths: columns.map(function(a) { return a.length; }),
    dropInterval: dropInterval,
    HAND_SIZE: HAND_SIZE,
    MAX_CHURN_PER_COL: MAX_CHURN_PER_COL,
    COLUMN_COUNT: COLUMN_COUNT,
  };
});

})();
</script>
