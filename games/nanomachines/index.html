var START_INTEGRITY = 100;
var MAX_HEAT = 100;
var MAX_CLOG_LEVEL = 100;
var SWARM_SPEED = 188;
var PULSE_RADIUS = 76;
var PULSE_HEAT = 15;
var REPAIR_RATE = 24;
var PULSE_REPAIR_RATE = 56;
var CLOG_SPREAD_RATE = 2.7;
var CLEANUP_DAMAGE = 18;
var HEAT_DAMAGE = 24;
var SECTOR_CLEAR_RESTORE = 22;
var SWARM_RADIUS = 16;
var REPAIR_RADIUS = 30;
var DRONE_RADIUS = 18;
var HEAT_RADIUS = 34;
var CLOG_RADIUS = 26;
var CHANNEL_WIDTH = 72;

var MODULES = ['module_core', 'module_trace', 'module_valve', 'module_lattice', 'module_gate'];
var CHANNELS = [
  [[0.08,0.20],[0.25,0.31],[0.46,0.36],[0.66,0.30],[0.92,0.20]],
  [[0.10,0.76],[0.26,0.62],[0.44,0.54],[0.66,0.62],[0.92,0.76]],
  [[0.18,0.08],[0.26,0.31],[0.37,0.51],[0.44,0.74],[0.52,0.93]],
  [[0.84,0.08],[0.72,0.26],[0.61,0.47],[0.54,0.69],[0.41,0.92]],
  [[0.05,0.48],[0.22,0.45],[0.43,0.48],[0.63,0.46],[0.95,0.50]]
];
var REPAIR_SPOTS = [
  { x: 0.28, y: 0.31 }, { x: 0.48, y: 0.36 }, { x: 0.68, y: 0.30 },
  { x: 0.24, y: 0.63 }, { x: 0.45, y: 0.54 }, { x: 0.68, y: 0.62 },
  { x: 0.36, y: 0.50 }, { x: 0.58, y: 0.47 }, { x: 0.52, y: 0.76 },
  { x: 0.72, y: 0.24 }, { x: 0.22, y: 0.45 }, { x: 0.82, y: 0.50 }
];
var HEAT_SPOTS = [
  { x: 0.72, y: 0.40, phase: 0.2, period: 3.6 },
  { x: 0.35, y: 0.70, phase: 1.9, period: 3.2 },
  { x: 0.58, y: 0.23, phase: 2.7, period: 2.9 },
  { x: 0.18, y: 0.54, phase: 0.9, period: 3.1 }
];
var CLOG_SPOTS = [
  { x: 0.36, y: 0.50 }, { x: 0.63, y: 0.47 }, { x: 0.52, y: 0.72 },
  { x: 0.23, y: 0.31 }, { x: 0.76, y: 0.58 }
];

var scene = { x: 0, y: 0, w: 0, h: 0, top: 0, bottom: 0, ui: 1 };
var uiRects = {};
var gs = 'PLAYING';
var gameOverReason = 'reason_integrity';
var score = 0;
var best = 0;
var bestSector = 1;
var sector = 1;
var repairsDone = 0;
var repairTarget = 2;
var integrity = START_INTEGRITY;
var heat = 0;
var clogLevel = 8;
var swarm = { x: 0.18, y: 0.48, tx: 0.18, ty: 0.48, vx: 0, vy: 0, scale: 1 };
var repairs = [];
var drones = [];
var vents = [];
var clogs = [];
var pulseWaves = [];
var scanT = 0;
var sectorClearTimer = 0;
var pointer = null;
var archive = {};
var resumeRun = null;
var lastSfx = {};
var tutorialDone = false;
var coachStep = 0;
var coachPulse = 0;
var helpOpen = false;
var movedFlag = false;
var pulseFlag = false;
var repairedFlag = false;
var clogClearFlag = false;
var screenshotMode = false;
var rngSeed = 23817;
var lastSpace = false;

function rnd() {
  rngSeed = (rngSeed * 1664525 + 1013904223) >>> 0;
  return rngSeed / 4294967296;
}
function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
function lerp(a, b, t) { return a + (b - a) * t; }
function distPx(ax, ay, bx, by) {
  var dx = (ax - bx) * scene.w;
  var dy = (ay - by) * scene.h;
  return Math.sqrt(dx * dx + dy * dy);
}
function sfxRL(name, gap) {
  var last = lastSfx[name] || -99;
  if (scanT - last < gap) return;
  lastSfx[name] = scanT;
  GF.sfx(name);
}
function pct(v) { return Math.max(0, Math.round(v)); }
function moduleName(i) { return GF.t(MODULES[i % MODULES.length]); }

function layout() {
  var ui = clamp(Math.min(GF.W / 800, GF.H / 600), 0.62, 1.4);
  var compact = GF.W < 560;
  var top = (compact ? 104 : 70) * ui;
  var bottom = (compact ? 56 : 50) * ui;
  var pad = 10 * ui;
  scene.ui = ui;
  scene.top = top;
  scene.bottom = bottom;
  scene.x = pad;
  scene.y = top;
  scene.w = Math.max(240, GF.W - pad * 2);
  scene.h = Math.max(250, GF.H - top - bottom);
}
function sx(x) { return scene.x + x * scene.w; }
function sy(y) { return scene.y + y * scene.h; }
function fromScreen(x, y) {
  return {
    x: clamp((x - scene.x) / scene.w, 0.02, 0.98),
    y: clamp((y - scene.y) / scene.h, 0.04, 0.96)
  };
}
function rr(c, x, y, w, h, r) { GF.rr(c, x, y, w, h, r); }
function setFont(c, size, weight) {
  c.font = String(weight || 700) + ' ' + Math.round(size) + 'px system-ui, -apple-system, Segoe UI, sans-serif';
}
function fitText(c, text, x, y, maxW, size, color, align, weight) {
  var fs = size;
  c.textAlign = align || 'left';
  c.textBaseline = 'middle';
  c.fillStyle = color;
  while (fs > 8) {
    setFont(c, fs, weight || 700);
    if (c.measureText(text).width <= maxW) break;
    fs -= 1;
  }
  c.fillText(text, x, y);
}
function wrapLines(c, text, maxW) {
  var words = String(text).split(/\s+/);
  var lines = [];
  var cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (c.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

function getSave() {
  return {
    best: best,
    bestSector: bestSector,
    archive: archive,
    tutorialDone: tutorialDone,
    safeRun: gs === 'PLAYING' ? { sector: sector, score: score, repairsDone: repairsDone } : null
  };
}
function applySave(s) {
  if (!s || typeof s !== 'object') return;
  best = Math.max(0, Number(s.best) || 0);
  bestSector = Math.max(1, Number(s.bestSector) || 1);
  archive = s.archive && typeof s.archive === 'object' ? s.archive : {};
  tutorialDone = !!s.tutorialDone;
  resumeRun = s.safeRun || null;
}
function saveGame() { GF.saveRun(); }

function startGame(fromBoot) {
  gs = 'PLAYING';
  gameOverReason = 'reason_integrity';
  score = fromBoot && resumeRun ? Math.max(0, Number(resumeRun.score) || 0) : 0;
  sector = fromBoot && resumeRun ? clamp(Math.round(Number(resumeRun.sector) || 1), 1, 12) : 1;
  integrity = START_INTEGRITY;
  heat = 0;
  clogLevel = sector >= 4 ? 18 : 8;
  swarm.x = 0.18; swarm.y = 0.48; swarm.tx = swarm.x; swarm.ty = swarm.y;
  pulseWaves = [];
  helpOpen = false;
  sectorClearTimer = 0;
  movedFlag = false; pulseFlag = false; repairedFlag = false; clogClearFlag = false;
  coachStep = tutorialDone ? 99 : 0;
  startSector(sector);
  GF.gameStarted();
  saveGame();
}

function startSector(n) {
  sector = Math.max(1, Math.round(n || 1));
  repairsDone = 0;
  repairTarget = Math.min(6, 2 + Math.floor((sector - 1) / 2));
  repairs = [];
  drones = [];
  vents = [];
  clogs = [];
  var offset = Math.floor(rnd() * REPAIR_SPOTS.length);
  for (var i = 0; i < repairTarget + 1; i++) {
    var base = REPAIR_SPOTS[(offset + i * 3 + sector) % REPAIR_SPOTS.length];
    repairs.push({ x: base.x, y: base.y, progress: 0, done: false, module: (sector + i) % MODULES.length, scale: 1 });
  }
  var droneCount = sector >= 2 ? Math.min(5, 1 + Math.floor((sector - 2) / 2)) : 0;
  for (var d = 0; d < droneCount; d++) {
    drones.push({ path: (d + sector) % CHANNELS.length, t: rnd(), speed: 0.038 + sector * 0.004 + d * 0.003, phase: rnd() * 6.28 });
  }
  var ventCount = sector >= 3 ? Math.min(4, 1 + Math.floor((sector - 3) / 2)) : 0;
  for (var v = 0; v < ventCount; v++) {
    var hv = HEAT_SPOTS[(v + sector) % HEAT_SPOTS.length];
    vents.push({ x: hv.x, y: hv.y, phase: hv.phase + rnd(), period: Math.max(2.1, hv.period - sector * 0.06) });
  }
  var clogCount = sector >= 4 ? Math.min(5, 1 + Math.floor((sector - 4) / 2)) : 0;
  for (var c = 0; c < clogCount; c++) {
    var cg = CLOG_SPOTS[(c + sector) % CLOG_SPOTS.length];
    clogs.push({ x: cg.x, y: cg.y, r: CLOG_RADIUS, health: 100, pulse: 1 });
  }
}

function sectorClear() {
  sectorClearTimer = 1.3;
  score += 220 + sector * 60 + Math.round(integrity);
  integrity = Math.min(START_INTEGRITY, integrity + SECTOR_CLEAR_RESTORE);
  heat = Math.max(0, heat - 35);
  clogLevel = Math.max(0, clogLevel - 20);
  best = Math.max(best, score);
  bestSector = Math.max(bestSector, sector + 1);
  GF.juice.shake(6 * scene.ui, 180);
  GF.juice.flash('#c9fff0', 0.24, 190);
  GF.juice.floatText(sx(swarm.x), sy(swarm.y) - 28 * scene.ui, GF.t('sector_clear'), '#bafff0');
  GF.juice.particles.burst(sx(swarm.x), sy(swarm.y), '#64f4d0', 34, 180);
  GF.sfx('levelup');
  sector += 1;
  startSector(sector);
  saveGame();
}

function gameOver(reason) {
  if (gs === 'GAMEOVER') return;
  gs = 'GAMEOVER';
  gameOverReason = reason || 'reason_integrity';
  best = Math.max(best, score);
  bestSector = Math.max(bestSector, sector);
  GF.juice.shake(12 * scene.ui, 300);
  GF.juice.flash('#ff4466', 0.35, 260);
  GF.sfx('lose');
  GF.gameEnded();
  saveGame();
}

function completeRepair(r) {
  if (r.done) return;
  r.done = true;
  repairsDone += 1;
  repairedFlag = true;
  var moduleKey = MODULES[r.module % MODULES.length];
  archive[moduleKey] = (archive[moduleKey] || 0) + 1;
  score += 105 + sector * 14;
  best = Math.max(best, score);
  GF.juice.punch(r, 'scale', 1.28, 260, 'easeOutBack');
  GF.juice.particles.burst(sx(r.x), sy(r.y), '#74fbd8', 28, 140);
  GF.juice.floatText(sx(r.x), sy(r.y) - 34 * scene.ui, GF.t('repaired'), '#bafff0');
  GF.sfx('reward');
  saveGame();
  if (!tutorialDone && coachStep === 2) finishCoach();
  if (repairsDone >= repairTarget) sectorClear();
}

function pulse() {
  if (gs !== 'PLAYING' || helpOpen) return false;
  pulseFlag = true;
  heat = Math.min(MAX_HEAT + 45, heat + PULSE_HEAT);
  pulseWaves.push({ x: swarm.x, y: swarm.y, r: 4, a: 1 });
  GF.juice.shake(2 * scene.ui, 70);
  GF.juice.particles.burst(sx(swarm.x), sy(swarm.y), '#8cf9ff', 18, 95);
  GF.sfx('tap');
  var didWork = false;
  for (var i = 0; i < repairs.length; i++) {
    var r = repairs[i];
    if (r.done) continue;
    if (distPx(swarm.x, swarm.y, r.x, r.y) <= PULSE_RADIUS) {
      r.progress = Math.min(100, r.progress + PULSE_REPAIR_RATE);
      didWork = true;
      if (r.progress >= 100) completeRepair(r);
    }
  }
  for (var j = clogs.length - 1; j >= 0; j--) {
    var cl = clogs[j];
    if (distPx(swarm.x, swarm.y, cl.x, cl.y) <= PULSE_RADIUS + cl.r * 0.35) {
      cl.health -= 62;
      cl.pulse = 1.4;
      clogLevel = Math.max(0, clogLevel - 8);
      didWork = true;
      GF.juice.particles.burst(sx(cl.x), sy(cl.y), '#f3a6ff', 20, 110);
      if (cl.health <= 0) {
        clogs.splice(j, 1);
        clogClearFlag = true;
        score += 55;
        GF.sfx('pickup');
      }
    }
  }
  if (!didWork) {
    integrity = Math.max(0, integrity - 2.5);
    GF.sfx('error');
  }
  if (!tutorialDone && coachStep === 1) finishCoach();
  saveGame();
  return true;
}

function finishCoach() {
  coachStep += 1;
  if (coachStep >= 3) {
    tutorialDone = true;
    try { localStorage.setItem('nanomachines_tutorial_done_v1', '1'); } catch (e) {}
    saveGame();
  }
}

function updateInput(dt) {
  var ax = 0, ay = 0;
  if (GF.keys.ArrowLeft || GF.keys.KeyA) ax -= 1;
  if (GF.keys.ArrowRight || GF.keys.KeyD) ax += 1;
  if (GF.keys.ArrowUp || GF.keys.KeyW) ay -= 1;
  if (GF.keys.ArrowDown || GF.keys.KeyS) ay += 1;
  var sp = SWARM_SPEED * dt;
  var beforeX = swarm.x, beforeY = swarm.y;
  if (ax || ay) {
    var al = Math.sqrt(ax * ax + ay * ay) || 1;
    swarm.x = clamp(swarm.x + (ax / al) * sp / scene.w, 0.03, 0.97);
    swarm.y = clamp(swarm.y + (ay / al) * sp / scene.h, 0.05, 0.95);
    swarm.tx = swarm.x; swarm.ty = swarm.y;
  } else {
    var dx = (swarm.tx - swarm.x) * scene.w;
    var dy = (swarm.ty - swarm.y) * scene.h;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d > 2) {
      var k = Math.min(d, sp) / d;
      swarm.x += (dx * k) / scene.w;
      swarm.y += (dy * k) / scene.h;
    }
  }
  var moved = distPx(beforeX, beforeY, swarm.x, swarm.y);
  if (moved > 0.25) {
    movedFlag = true;
    if (!tutorialDone && coachStep === 0) finishCoach();
  }
  var space = !!GF.keys.Space;
  if (space && !lastSpace) pulse();
  lastSpace = space;
  if (GF.keys.KeyF) {
    GF.keys.KeyF = false;
    toggleFullscreen();
  }
}

function pathPoint(pathId, t) {
  var pts = CHANNELS[pathId % CHANNELS.length];
  var total = 0;
  for (var i = 1; i < pts.length; i++) {
    var dx = pts[i][0] - pts[i - 1][0];
    var dy = pts[i][1] - pts[i - 1][1];
    total += Math.sqrt(dx * dx + dy * dy);
  }
  var want = (t % 1) * total;
  var acc = 0;
  for (var j = 1; j < pts.length; j++) {
    var ax = pts[j - 1][0], ay = pts[j - 1][1];
    var bx = pts[j][0], by = pts[j][1];
    var seg = Math.sqrt((bx - ax) * (bx - ax) + (by - ay) * (by - ay));
    if (acc + seg >= want) {
      var k = (want - acc) / Math.max(seg, 0.0001);
      return { x: lerp(ax, bx, k), y: lerp(ay, by, k) };
    }
    acc += seg;
  }
  return { x: pts[pts.length - 1][0], y: pts[pts.length - 1][1] };
}

function isTutorialSafe() {
  return !tutorialDone && coachStep < 3 && scanT < 40;
}

function updateHazards(dt) {
  for (var i = 0; i < drones.length; i++) {
    var d = drones[i];
    d.t = (d.t + d.speed * dt) % 1;
    var p = pathPoint(d.path, d.t);
    d.x = p.x; d.y = p.y;
    if (distPx(swarm.x, swarm.y, d.x, d.y) < SWARM_RADIUS + DRONE_RADIUS) {
      if (!isTutorialSafe()) {
        integrity -= CLEANUP_DAMAGE * dt;
        heat += 6 * dt;
        sfxRL('hit', 0.42);
        GF.juice.shake(3 * scene.ui, 90);
      }
    }
  }
  for (var v = 0; v < vents.length; v++) {
    var hv = vents[v];
    var wave = Math.sin(scanT * Math.PI * 2 / hv.period + hv.phase);
    hv.active = wave > 0.38;
    if (hv.active && distPx(swarm.x, swarm.y, hv.x, hv.y) < SWARM_RADIUS + HEAT_RADIUS) {
      if (!isTutorialSafe()) {
        heat += 22 * dt;
        integrity -= HEAT_DAMAGE * dt * 0.55;
        sfxRL('hurt', 0.55);
      }
    }
  }
  var clogPressure = CLOG_SPREAD_RATE * dt * (1 + clogs.length * 0.28 + Math.max(0, sector - 4) * 0.07);
  clogLevel = Math.min(MAX_CLOG_LEVEL + 6, clogLevel + clogPressure);
  for (var c = 0; c < clogs.length; c++) {
    clogs[c].r = Math.min(CLOG_RADIUS + 12, clogs[c].r + dt * (1.2 + sector * 0.08));
    clogs[c].pulse = Math.max(1, clogs[c].pulse - dt * 2.2);
    if (distPx(swarm.x, swarm.y, clogs[c].x, clogs[c].y) < SWARM_RADIUS + clogs[c].r) {
      swarm.tx = swarm.x;
      if (!isTutorialSafe()) integrity -= 4 * dt;
    }
  }
  if (heat > MAX_HEAT) integrity -= (heat - MAX_HEAT) * 0.08 * dt;
  heat = Math.max(0, heat - (9 + sector * 0.2) * dt);
  if (integrity <= 0) gameOver('reason_integrity');
  if (clogLevel >= MAX_CLOG_LEVEL) gameOver('reason_clog');
}

function updateRepairs(dt) {
  for (var i = 0; i < repairs.length; i++) {
    var r = repairs[i];
    if (r.done) continue;
    var d = distPx(swarm.x, swarm.y, r.x, r.y);
    if (d <= REPAIR_RADIUS + SWARM_RADIUS * 0.9) {
      r.progress = Math.min(100, r.progress + REPAIR_RATE * dt);
      if (scanT % 0.17 < dt) GF.juice.particles.burst(sx(r.x), sy(r.y), '#74fbd8', 3, 70);
      if (r.progress >= 100) completeRepair(r);
    }
  }
}

function update(dt) {
  GF.juice.update(dt);
  var gdt = dt * GF.juice.timeScale;
  layout();
  scanT += gdt;
  coachPulse += gdt;
  if (gs !== 'PLAYING') return;
  if (sectorClearTimer > 0) sectorClearTimer = Math.max(0, sectorClearTimer - gdt);
  if (helpOpen) return;
  updateInput(gdt);
  updateRepairs(gdt);
  updateHazards(gdt);
  for (var i = pulseWaves.length - 1; i >= 0; i--) {
    pulseWaves[i].r += 220 * gdt;
    pulseWaves[i].a -= 2.2 * gdt;
    if (pulseWaves[i].a <= 0) pulseWaves.splice(i, 1);
  }
}

function drawBackground(c) {
  var g = c.createLinearGradient(0, 0, GF.W, GF.H);
  g.addColorStop(0, '#07141b');
  g.addColorStop(0.42, '#102631');
  g.addColorStop(1, '#170b22');
  c.fillStyle = g;
  c.fillRect(0, 0, GF.W, GF.H);
  c.save();
  c.beginPath();
  c.rect(scene.x, scene.y, scene.w, scene.h);
  c.clip();
  c.globalAlpha = 0.22;
  c.strokeStyle = '#6be1ff';
  c.lineWidth = Math.max(1, scene.ui);
  var gap = 42 * scene.ui;
  for (var x = scene.x - gap; x < scene.x + scene.w + gap; x += gap) {
    c.beginPath();
    c.moveTo(x + Math.sin(scanT * 0.4 + x) * 8, scene.y);
    c.lineTo(x - 80 * scene.ui, scene.y + scene.h);
    c.stroke();
  }
  c.globalAlpha = 0.17;
  c.strokeStyle = '#ff79c6';
  for (var y = scene.y + 22 * scene.ui; y < scene.y + scene.h; y += 48 * scene.ui) {
    c.beginPath();
    c.moveTo(scene.x, y + Math.sin(scanT + y) * 3);
    c.lineTo(scene.x + scene.w, y + Math.cos(scanT * 0.7 + y) * 4);
    c.stroke();
  }
  c.restore();
}

function drawChannels(c) {
  c.save();
  c.lineCap = 'round';
  c.lineJoin = 'round';
  for (var i = 0; i < CHANNELS.length; i++) {
    var pts = CHANNELS[i];
    c.beginPath();
    c.moveTo(sx(pts[0][0]), sy(pts[0][1]));
    for (var j = 1; j < pts.length; j++) c.lineTo(sx(pts[j][0]), sy(pts[j][1]));
    c.strokeStyle = 'rgba(115, 247, 224, 0.13)';
    c.lineWidth = CHANNEL_WIDTH * scene.ui;
    c.stroke();
    c.strokeStyle = 'rgba(32, 170, 195, 0.34)';
    c.lineWidth = (CHANNEL_WIDTH - 16) * scene.ui;
    c.stroke();
    c.strokeStyle = 'rgba(195, 255, 231, 0.38)';
    c.lineWidth = 2 * scene.ui;
    c.setLineDash([8 * scene.ui, 16 * scene.ui]);
    c.lineDashOffset = -scanT * 24 * scene.ui;
    c.stroke();
    c.setLineDash([]);
  }
  c.restore();
}

function drawRepair(c, r) {
  var x = sx(r.x), y = sy(r.y);
  var rad = REPAIR_RADIUS * scene.ui * r.scale;
  c.save();
  c.globalAlpha = r.done ? 0.35 : 1;
  var grd = c.createRadialGradient(x, y, 4, x, y, rad);
  grd.addColorStop(0, r.done ? '#d9fff7' : '#f7f3b2');
  grd.addColorStop(1, r.done ? 'rgba(84,255,211,0.12)' : 'rgba(255, 129, 210, 0.18)');
  c.fillStyle = grd;
  c.beginPath(); c.arc(x, y, rad, 0, Math.PI * 2); c.fill();
  c.strokeStyle = r.done ? '#84ffde' : '#ffd779';
  c.lineWidth = 2.5 * scene.ui;
  c.beginPath(); c.arc(x, y, rad * 0.74, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (r.progress / 100)); c.stroke();
  c.strokeStyle = r.done ? '#bafff0' : '#ff6ab7';
  c.lineWidth = 1.4 * scene.ui;
  for (var i = 0; i < 4; i++) {
    var a = scanT * 0.7 + i * Math.PI / 2;
    c.beginPath();
    c.moveTo(x + Math.cos(a) * rad * 0.25, y + Math.sin(a) * rad * 0.25);
    c.lineTo(x + Math.cos(a) * rad * 0.68, y + Math.sin(a) * rad * 0.68);
    c.stroke();
  }
  fitText(c, moduleName(r.module), x, y + rad + 14 * scene.ui, 88 * scene.ui, 10 * scene.ui, '#c9fff1', 'center', 750);
  c.restore();
}

function drawDrone(c, d) {
  var x = sx(d.x), y = sy(d.y);
  var r = DRONE_RADIUS * scene.ui;
  var a = scanT * 2.2 + d.phase;
  c.save();
  c.translate(x, y);
  c.rotate(a);
  c.fillStyle = '#f7f2ff';
  c.strokeStyle = '#624cff';
  c.lineWidth = 2 * scene.ui;
  c.beginPath();
  c.moveTo(r, 0);
  c.lineTo(-r * 0.55, r * 0.72);
  c.lineTo(-r * 0.35, 0);
  c.lineTo(-r * 0.55, -r * 0.72);
  c.closePath();
  c.fill(); c.stroke();
  c.fillStyle = '#ff4a8e';
  c.beginPath(); c.arc(0, 0, r * 0.25, 0, Math.PI * 2); c.fill();
  c.restore();
}

function drawVent(c, v) {
  var x = sx(v.x), y = sy(v.y);
  var r = HEAT_RADIUS * scene.ui;
  var hot = v.active ? 1 : 0.35 + 0.18 * Math.sin(scanT * 4 + v.phase);
  c.save();
  c.globalAlpha = 0.7 + 0.3 * hot;
  c.fillStyle = hot > 0.7 ? 'rgba(255, 103, 74, 0.24)' : 'rgba(255, 206, 91, 0.12)';
  c.beginPath(); c.arc(x, y, r * (0.85 + hot * 0.25), 0, Math.PI * 2); c.fill();
  c.strokeStyle = hot > 0.7 ? '#ff764d' : '#e5c55a';
  c.lineWidth = (1.5 + hot * 2) * scene.ui;
  for (var i = 0; i < 3; i++) {
    c.beginPath();
    c.arc(x, y, r * (0.28 + i * 0.24 + hot * 0.08), 0, Math.PI * 2);
    c.stroke();
  }
  c.restore();
}

function drawClog(c, cl) {
  var x = sx(cl.x), y = sy(cl.y);
  var r = cl.r * scene.ui * cl.pulse;
  c.save();
  c.fillStyle = 'rgba(203, 104, 255, 0.28)';
  c.strokeStyle = '#f3a6ff';
  c.lineWidth = 2 * scene.ui;
  c.beginPath();
  for (var i = 0; i < 8; i++) {
    var a = i / 8 * Math.PI * 2;
    var wob = r * (0.78 + 0.22 * Math.sin(scanT * 2 + i));
    var px = x + Math.cos(a) * wob;
    var py = y + Math.sin(a) * wob;
    if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
  }
  c.closePath();
  c.fill(); c.stroke();
  c.fillStyle = 'rgba(255,255,255,0.45)';
  c.beginPath(); c.arc(x - r * 0.2, y - r * 0.18, r * 0.16, 0, Math.PI * 2); c.fill();
  c.restore();
}

function drawSwarm(c) {
  var x = sx(swarm.x), y = sy(swarm.y);
  var r = SWARM_RADIUS * scene.ui * swarm.scale;
  c.save();
  var aura = c.createRadialGradient(x, y, 2, x, y, r * 2.6);
  aura.addColorStop(0, 'rgba(183,255,240,0.55)');
  aura.addColorStop(0.42, 'rgba(87,232,255,0.25)');
  aura.addColorStop(1, 'rgba(87,232,255,0)');
  c.fillStyle = aura;
  c.beginPath(); c.arc(x, y, r * 2.6, 0, Math.PI * 2); c.fill();
  for (var i = 0; i < 17; i++) {
    var a = i * 2.399 + scanT * (0.7 + (i % 3) * 0.12);
    var rr2 = r * (0.38 + (i % 5) * 0.15 + Math.sin(scanT * 2 + i) * 0.06);
    c.fillStyle = i % 3 === 0 ? '#fff7ad' : i % 3 === 1 ? '#5bf5ff' : '#9affcf';
    c.beginPath();
    c.arc(x + Math.cos(a) * rr2, y + Math.sin(a) * rr2, Math.max(2.2, r * 0.16), 0, Math.PI * 2);
    c.fill();
  }
  c.strokeStyle = heat > 85 ? '#ff6c59' : '#a8fff3';
  c.lineWidth = 2 * scene.ui;
  c.beginPath(); c.arc(x, y, r * (0.9 + Math.sin(scanT * 6) * 0.06), 0, Math.PI * 2); c.stroke();
  c.restore();
}

function drawPulseWaves(c) {
  c.save();
  for (var i = 0; i < pulseWaves.length; i++) {
    var p = pulseWaves[i];
    c.globalAlpha = Math.max(0, p.a);
    c.strokeStyle = '#8cf9ff';
    c.lineWidth = 3 * scene.ui;
    c.beginPath(); c.arc(sx(p.x), sy(p.y), p.r * scene.ui, 0, Math.PI * 2); c.stroke();
  }
  c.globalAlpha = 1;
  c.restore();
}

function drawBar(c, x, y, w, h, label, val, max, color) {
  rr(c, x, y, w, h, h * 0.45);
  c.fillStyle = 'rgba(2, 11, 16, 0.62)';
  c.fill();
  c.fillStyle = color;
  rr(c, x + 2, y + 2, Math.max(0, (w - 4) * clamp(val / max, 0, 1)), h - 4, h * 0.34);
  c.fill();
  fitText(c, label + ' ' + pct(val), x + w / 2, y + h / 2, w - 8, h * 0.54, '#f7fffb', 'center', 800);
}

function drawHud(c) {

  c.strokeStyle = panelStroke;
  c.lineWidth = 1 * ui;
  var leftW = compact ? GF.W * 0.47 - pad : 220 * ui;
  var rightW = compact ? GF.W * 0.47 - pad : 250 * ui;
  rr(c, pad, topY, leftW, pillH, 8 * ui); c.fill(); c.stroke();
  fitText(c, GF.t('sector') + ' ' + sector + '  ' + GF.t('score') + ' ' + score, pad + 10 * ui, topY + pillH / 2, leftW - 16 * ui, 13 * ui, '#e7fff8', 'left', 800);
  var rx = GF.W - rightW - pad;
  c.fillStyle = panelFill;
  c.strokeStyle = panelStroke;
  rr(c, rx, topY, rightW, pillH, 8 * ui); c.fill(); c.stroke();
  fitText(c, GF.t('best') + ' ' + best + '  ' + GF.t('best_sector') + ' ' + bestSector, rx + 10 * ui, topY + pillH / 2, rightW - 78 * ui, 12.5 * ui, '#d7e9ff', 'left', 760);
  uiRects.mute = { x: GF.W - 62 * ui, y: topY + 4 * ui, w: 28 * ui, h: 28 * ui };
  uiRects.help = { x: GF.W - 31 * ui, y: topY + 4 * ui, w: 28 * ui, h: 28 * ui };
  GF.drawMuteIcon(c, uiRects.mute.x + uiRects.mute.w / 2, uiRects.mute.y + uiRects.mute.h / 2, 11 * ui, GF.muted);
  c.fillStyle = '#f7fffb';
  c.beginPath(); c.arc(uiRects.help.x + uiRects.help.w / 2, uiRects.help.y + uiRects.help.h / 2, 12 * ui, 0, Math.PI * 2); c.fill();
  fitText(c, GF.t('help_btn'), uiRects.help.x + uiRects.help.w / 2, uiRects.help.y + uiRects.help.h / 2, 20 * ui, 17 * ui, '#091017', 'center', 900);
  var midY = compact ? topY + pillH + 7 * ui : topY;
  var midX = compact ? pad : GF.W / 2 - 135 * ui;
  var midW = compact ? GF.W - pad * 2 : 270 * ui;
  c.fillStyle = panelFill;
  c.strokeStyle = panelStroke;
  rr(c, midX, midY, midW, pillH, 8 * ui); c.fill(); c.stroke();
  fitText(c, GF.t('repairs') + ' ' + repairsDone + '/' + repairTarget, midX + midW / 2, midY + pillH / 2, midW - 16 * ui, 15 * ui, '#fff6ad', 'center', 850);
  var by = scene.y - (compact ? 32 * ui : 26 * ui);
  var bw = (GF.W - pad * 4) / 3;
  drawBar(c, pad, by, bw, 18 * ui, GF.t('integrity'), integrity, START_INTEGRITY, '#5df4bd');
  drawBar(c, pad * 2 + bw, by, bw, 18 * ui, GF.t('heat'), heat, MAX_HEAT, heat > 85 ? '#ff685a' : '#ffbe61');
  drawBar(c, pad * 3 + bw * 2, by, bw, 18 * ui, GF.t('clog'), clogLevel, MAX_CLOG_LEVEL, '#d87bff');
  var status = heat > 70 ? GF.t('pulse') + ' ' + GF.t('hot') : GF.t('pulse') + ' ' + GF.t('ready');
  fitText(c, status, scene.x + 10 * ui, GF.H - 22 * ui, 220 * ui, 13 * ui, '#cdfdf4', 'left', 800);
  var active = nearestRepair();
  var dist = active ? Math.round(distPx(swarm.x, swarm.y, active.x, active.y)) : 0;
  fitText(c, GF.t('target') + ' ' + dist, GF.W - 210 * ui, GF.H - 22 * ui, 200 * ui, 13 * ui, '#d7e9ff', 'right', 760);
  c.restore();
}

function nearestRepair() {
  var bestR = null, bestD = 99999;
  for (var i = 0; i < repairs.length; i++) {
    if (repairs[i].done) continue;
    var d = distPx(swarm.x, swarm.y, repairs[i].x, repairs[i].y);
    if (d < bestD) { bestD = d; bestR = repairs[i]; }
  }
  return bestR;
}

function drawCoach(c) {
  if (tutorialDone || coachStep >= 3 || gs !== 'PLAYING' || helpOpen) return;
  var ui = scene.ui;
  var key = coachStep === 0 ? 'coach_steer' : coachStep === 1 ? 'coach_pulse' : 'coach_repair';
  var r = nearestRepair();
  var tx = r ? sx(r.x) : sx(0.45), ty = r ? sy(r.y) : sy(0.5);
  c.save();
  c.strokeStyle = '#fff49b';
  c.lineWidth = 3 * ui;
  c.globalAlpha = 0.65 + Math.sin(coachPulse * 7) * 0.2;
  c.beginPath(); c.arc(tx, ty, (46 + Math.sin(coachPulse * 5) * 6) * ui, 0, Math.PI * 2); c.stroke();
  c.globalAlpha = 1;
  var w = Math.min(GF.W - 26 * ui, 360 * ui);
  var h = 50 * ui;
  var x = Math.min(Math.max(13 * ui, tx - w / 2), GF.W - w - 13 * ui);
  var y = Math.max(scene.y + 10 * ui, ty - 94 * ui);
  c.fillStyle = 'rgba(4, 13, 19, 0.82)';
  rr(c, x, y, w, h, 8 * ui); c.fill();
  c.strokeStyle = 'rgba(255,244,155,0.42)'; c.stroke();
  fitText(c, GF.t(key), x + w / 2, y + h / 2, w - 18 * ui, 13 * ui, '#fff7bd', 'center', 800);
  c.restore();
}

function drawHelp(c) {
  if (!helpOpen) return;
  var ui = scene.ui;
  c.save();
  c.fillStyle = 'rgba(1, 6, 12, 0.82)';
  c.fillRect(0, 0, GF.W, GF.H);
  var w = Math.min(GF.W - 24 * ui, 520 * ui);
  var x = GF.W / 2 - w / 2;
  setFont(c, 14 * ui, 700);
  var items = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var maxW = w - 34 * ui;
  var rows = [];
  var total = 48 * ui;
  for (var i = 0; i < items.length; i++) {
    var lines = wrapLines(c, GF.t(items[i]), maxW);
    rows.push(lines);
    total += lines.length * 18 * ui + 10 * ui;
  }
  total += 50 * ui;
  var y = Math.max(14 * ui, GF.H / 2 - total / 2);
  c.fillStyle = 'rgba(9, 22, 31, 0.94)';
  rr(c, x, y, w, total, 10 * ui); c.fill();
  c.strokeStyle = 'rgba(120,255,232,0.35)'; c.stroke();
  fitText(c, GF.t('title'), GF.W / 2, y + 25 * ui, w - 30 * ui, 20 * ui, '#f3fffb', 'center', 900);
  var yy = y + 58 * ui;
  c.textAlign = 'left';
  c.textBaseline = 'top';
  c.fillStyle = '#d8fff7';
  for (var j = 0; j < rows.length; j++) {
    for (var k = 0; k < rows[j].length; k++) {
      setFont(c, 13 * ui, 650);
      c.fillText(rows[j][k], x + 17 * ui, yy);
      yy += 18 * ui;
    }
    yy += 10 * ui;
  }
  uiRects.helpClose = { x: GF.W / 2 - 70 * ui, y: y + total - 42 * ui, w: 140 * ui, h: 32 * ui };
  c.fillStyle = '#82f5dc';
  rr(c, uiRects.helpClose.x, uiRects.helpClose.y, uiRects.helpClose.w, uiRects.helpClose.h, 8 * ui); c.fill();
  fitText(c, GF.t('close'), GF.W / 2, uiRects.helpClose.y + uiRects.helpClose.h / 2, uiRects.helpClose.w - 12 * ui, 14 * ui, '#071017', 'center', 850);
  c.restore();
}

function archiveText() {
  var out = [];
  for (var i = 0; i < MODULES.length; i++) {
    var key = MODULES[i];
    if (archive[key]) out.push(GF.t(key) + ' ' + archive[key]);
  }
  return out.length ? out.join(', ') : GF.t('none');
}

function drawGameOver(c) {
  if (gs !== 'GAMEOVER') return;
  var ui = scene.ui;
  c.save();
  c.fillStyle = 'rgba(2, 7, 13, 0.84)';
  c.fillRect(0, 0, GF.W, GF.H);
  fitText(c, GF.t('gameover'), GF.W / 2, GF.H / 2 - 82 * ui, Math.min(GF.W - 24 * ui, 520 * ui), 25 * ui, '#ffd7e8', 'center', 900);
  fitText(c, GF.t(gameOverReason), GF.W / 2, GF.H / 2 - 45 * ui, Math.min(GF.W - 24 * ui, 520 * ui), 14 * ui, '#ffd4c2', 'center', 760);
  fitText(c, GF.t('score') + ' ' + score + '  ' + GF.t('best') + ' ' + best, GF.W / 2, GF.H / 2 - 14 * ui, Math.min(GF.W - 24 * ui, 520 * ui), 14 * ui, '#e9fff8', 'center', 800);
  fitText(c, GF.t('archive') + ': ' + archiveText(), GF.W / 2, GF.H / 2 + 17 * ui, Math.min(GF.W - 24 * ui, 520 * ui), 12 * ui, '#cbe7ff', 'center', 650);
  uiRects.retry = { x: GF.W / 2 - 82 * ui, y: GF.H / 2 + 52 * ui, w: 164 * ui, h: 42 * ui };
  c.fillStyle = '#82f5dc';
  rr(c, uiRects.retry.x, uiRects.retry.y, uiRects.retry.w, uiRects.retry.h, 9 * ui); c.fill();
  fitText(c, GF.t('retry'), GF.W / 2, uiRects.retry.y + uiRects.retry.h / 2, uiRects.retry.w - 12 * ui, 16 * ui, '#071017', 'center', 900);
  c.restore();
}

function drawSectorBanner(c) {
  if (sectorClearTimer <= 0) return;
  var ui = scene.ui;
  var a = clamp(sectorClearTimer / 1.3, 0, 1);
  c.save();
  c.globalAlpha = a;
  c.fillStyle = 'rgba(6, 28, 30, 0.84)';
  rr(c, GF.W / 2 - 150 * ui, scene.y + scene.h * 0.24, 300 * ui, 62 * ui, 9 * ui); c.fill();
  fitText(c, GF.t('sector_clear'), GF.W / 2, scene.y + scene.h * 0.24 + 31 * ui, 270 * ui, 20 * ui, '#c8fff1', 'center', 900);
  c.restore();
}

function draw(c) {
  layout();
  c.clearRect(0, 0, GF.W, GF.H);
  c.save();
  c.translate(GF.juice.offsetX, GF.juice.offsetY);
  drawBackground(c);
  drawChannels(c);
  for (var i = 0; i < vents.length; i++) drawVent(c, vents[i]);
  for (var j = 0; j < clogs.length; j++) drawClog(c, clogs[j]);
  for (var k = 0; k < repairs.length; k++) drawRepair(c, repairs[k]);
  for (var d = 0; d < drones.length; d++) drawDrone(c, drones[d]);
  drawPulseWaves(c);
  drawSwarm(c);
  GF.juice.particles.draw(c);
  GF.juice.texts.draw(c);
  drawHud(c);
  drawSectorBanner(c);
  drawCoach(c);
  drawGameOver(c);
  c.restore();
  GF.juice.drawFlash(c);
  drawHelp(c);
}

function handleUi(x, y) {
  if (helpOpen) {
    var hc = uiRects.helpClose;
    if (hc && x >= hc.x && x <= hc.x + hc.w && y >= hc.y && y <= hc.y + hc.h) {
      helpOpen = false;
      GF.sfx('click');
      return true;
    }
    return true;
  }
  var m = uiRects.mute;
  if (m && x >= m.x && x <= m.x + m.w && y >= m.y && y <= m.y + m.h) {
    GF.toggleMute();
    GF.sfx('click');
    return true;
  }
  var h = uiRects.help;
  if (h && x >= h.x && x <= h.x + h.w && y >= h.y && y <= h.y + h.h) {
    helpOpen = true;
    GF.sfx('click');
    return true;
  }
  var r = uiRects.retry;
  if (gs === 'GAMEOVER' && r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
    startGame(false);
    GF.sfx('click');
    return true;
  }
  return false;
}

function onPointerDown(e) {
  e.preventDefault();
  layout();
  if (handleUi(e.clientX, e.clientY)) return;
  if (gs !== 'PLAYING') return;
  var p = fromScreen(e.clientX, e.clientY);
  swarm.tx = p.x; swarm.ty = p.y;
  pointer = { id: e.pointerId, x: e.clientX, y: e.clientY, moved: false };
  try { GF.canvas.setPointerCapture(e.pointerId); } catch (_) {}
}
function onPointerMove(e) {
  if (!pointer || pointer.id !== e.pointerId || gs !== 'PLAYING') return;
  e.preventDefault();
  var dx = e.clientX - pointer.x;
  var dy = e.clientY - pointer.y;
  if (Math.sqrt(dx * dx + dy * dy) > 8) pointer.moved = true;
  var p = fromScreen(e.clientX, e.clientY);
  swarm.tx = p.x; swarm.ty = p.y;
}
function onPointerUp(e) {
  if (!pointer || pointer.id !== e.pointerId) return;
  e.preventDefault();
  if (!pointer.moved && gs === 'PLAYING') pulse();
  pointer = null;
}
function onKeyDown(e) {
  if (e.code === 'Space') e.preventDefault();
}
function toggleFullscreen() {
  var root = document.documentElement;
  if (!document.fullscreenElement && root.requestFullscreen) root.requestFullscreen().catch(function() {});
  else if (document.exitFullscreen) document.exitFullscreen().catch(function() {});
}

function stateObject() {
  return {
    gs: gs,
    score: score,
    best: best,
    sector: sector,
    bestSector: bestSector,
    integrity: pct(integrity),
    heat: pct(heat),
    clogLevel: pct(clogLevel),
    repairsDone: repairsDone,
    repairTarget: repairTarget,
    archive: archive,
    swarm: { x: Number(swarm.x.toFixed(3)), y: Number(swarm.y.toFixed(3)) },
    drones: drones.length,
    vents: vents.length,
    clogs: clogs.length,
    helpOpen: helpOpen
  };
}
function renderText() {
  var active = nearestRepair();
  var payload = stateObject();
  payload.coordinateSystem = 'Normalized playfield coordinates: origin top-left, x right, y down.';
  payload.activeRepair = active ? {
    x: Number(active.x.toFixed(3)),
    y: Number(active.y.toFixed(3)),
    progress: pct(active.progress),
    module: moduleName(active.module)
  } : null;
  payload.visibleHazards = {
    drones: drones.map(function(d) { return { x: Number((d.x || 0).toFixed(3)), y: Number((d.y || 0).toFixed(3)) }; }),
    vents: vents.map(function(v) { return { x: v.x, y: v.y, active: !!v.active }; }),
    clogs: clogs.map(function(cl) { return { x: cl.x, y: cl.y, health: pct(cl.health) }; })
  };
  return JSON.stringify(payload);
}

function botActions() {
  if (gs === 'GAMEOVER') return ['retry'];
  var a = ['steer_repair', 'pulse', 'repair_target', 'wait'];
  if (clogs.length) a.push('clear_clog');
  if (sector < 6) a.push('jump_late');
  return a;
}
function botAct(action) {
  if (action === 'retry') { startGame(false); return true; }
  if (action === 'wait') { window.advanceTime(1000); return true; }
  if (action === 'steer_repair') {
    var r = nearestRepair();
    if (r) { swarm.tx = r.x; swarm.ty = r.y; swarm.x = lerp(swarm.x, r.x, 0.35); swarm.y = lerp(swarm.y, r.y, 0.35); }
    return true;
  }
  if (action === 'pulse') return pulse();
  if (action === 'repair_target') {
    var t = nearestRepair();
    if (t) {
      swarm.x = t.x; swarm.y = t.y; swarm.tx = t.x; swarm.ty = t.y;
      t.progress = Math.min(100, t.progress + 70);
      if (t.progress >= 100) completeRepair(t);
      return true;
    }
  }
  if (action === 'clear_clog') {
    if (!clogs.length) return false;
    swarm.x = clogs[0].x; swarm.y = clogs[0].y; swarm.tx = swarm.x; swarm.ty = swarm.y;
    return pulse();
  }
  if (action === 'jump_late') { setupForScreenshot(6); return true; }
  return false;
}

function setupForScreenshot(level) {
  screenshotMode = true;
  tutorialDone = true;
  coachStep = 99;
  helpOpen = false;
  gs = 'PLAYING';
  score = 760 + (level || 5) * 180;
  best = Math.max(best, score);
  bestSector = Math.max(bestSector, Math.max(1, Number(level) || 5));
  integrity = 82;
  heat = 38;
  clogLevel = 46;
  swarm.x = 0.46; swarm.y = 0.49; swarm.tx = swarm.x; swarm.ty = swarm.y;
  startSector(Math.max(1, Number(level) || 5));
  repairsDone = Math.min(1, repairTarget - 1);
  if (repairs[0]) { repairs[0].done = true; repairs[0].progress = 100; }
  if (repairs[1]) repairs[1].progress = 62;
  if (!clogs.length) {
    clogs.push({ x: 0.63, y: 0.47, r: CLOG_RADIUS + 8, health: 88, pulse: 1 });
  }
  archive.module_core = Math.max(archive.module_core || 0, 2);
  archive.module_trace = Math.max(archive.module_trace || 0, 1);
}

window._jumpLevel = function(n) { setupForScreenshot(Number(n) || 5); return stateObject(); };
window._setupForScreenshot = function(level) { setupForScreenshot(Number(level) || 5); return stateObject(); };
window.advanceTime = function(ms) {
  var total = Math.max(0, Number(ms) || 0);
  var step = 1 / 30;
  var count = Math.max(1, Math.ceil(total / 1000 / step));
  for (var i = 0; i < count; i++) update(step);
  draw(GF.ctx);
  return stateObject();
};
window.render_game_to_text = renderText;

GF.canvas.addEventListener('pointerdown', onPointerDown, { passive: false });
GF.canvas.addEventListener('pointermove', onPointerMove, { passive: false });
GF.canvas.addEventListener('pointerup', onPointerUp, { passive: false });
GF.canvas.addEventListener('pointercancel', onPointerUp, { passive: false });
document.addEventListener('keydown', onKeyDown);

GF.exposeState(stateObject);
GF.exposeBot(botActions, botAct);
GF.exposeReach(function() {
  return [
    { id: 'help', x: uiRects.help ? uiRects.help.x : 0, y: uiRects.help ? uiRects.help.y : 0, w: uiRects.help ? uiRects.help.w : 0, h: uiRects.help ? uiRects.help.h : 0, pinned: true },
    { id: 'mute', x: uiRects.mute ? uiRects.mute.x : 0, y: uiRects.mute ? uiRects.mute.y : 0, w: uiRects.mute ? uiRects.mute.w : 0, h: uiRects.mute ? uiRects.mute.h : 0, pinned: true }
  ];
});

GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  saveKey: 'nanomachines',
  onReady: function() {
    try {
      if (localStorage.getItem('nanomachines_tutorial_done_v1')) tutorialDone = true;
    } catch (e) {}
    GF.persist('nanomachines_run_v1', getSave, applySave);
    GF.bgMusic({ file: 'audio/bg_track.mp3', preset: 'synth', muted: GF.muted });
    startGame(true);
  },
  onUpdate: update,
  onDraw: draw
});

})();
</script>
</body>
