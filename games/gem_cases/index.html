function buildRanks(myVal) {
  // synthetic ladder around the player's value so the board always reads well;
  // tries GP for real entries first (best-effort, cached).
  if (!ranksFetched && GF.gp && GF.gp.isPresent) {
    ranksFetched = true;
    try { GF.gp.leaderboard.publish('score', myVal); } catch (e) {}
    GF.gp.leaderboard.fetch('score', 12).then(function (list) {
      if (list && list.length) ranksCache = list;
    });
  }
  if (ranksCache && ranksCache.length) {
    var rows = ranksCache.map(function (p) {
      return { name: (p.name || 'Player'), val: +(p.score || 0), me: false };
    });
    rows.push({ name: GF.t('you'), val: myVal, me: true });
    rows.sort(function (a, b) { return b.val - a.val; });
    return rows.slice(0, 10);
  }
  // local synthetic board
  var names = ['GemHunter', 'Sparkle', 'VaultKing', 'Prism', 'Faceted', 'Lumino', 'Carat', 'Geode', 'Opaline', 'Brilliant'];
  var seed = (meta && meta.bestStreak || 1) * 97 + 13;
  function rnd() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }
  var rows = [];
  var hi = Math.max(myVal * 1.8, 600);
  for (var i = 0; i < 9; i++) {
    rows.push({ name: names[i], val: Math.round(hi * (0.95 - i * 0.09) * (0.85 + rnd() * 0.3)), me: false });
  }
  rows.push({ name: GF.t('you'), val: myVal, me: true });
  rows.sort(function (a, b) { return b.val - a.val; });
  return rows.slice(0, 10);
}

// ── HELP ─────────────────────────────────────────────────────────────────────
function drawHelp(ctx) {
  var H = GF.H, S = GF.S, CX = L.CX, CW = L.CW;
  drawOverlayFrame(ctx, GF.t('help'), '#9aa6c0');
  var lines = [GF.t('tut1'), GF.t('tut2'), GF.t('tut3'), GF.t('tut4')];
  var fs = Math.round(GF.clamp(15 * S, 12, 19));
  var maxW = CW - L.pad * 2 - 8 * S;
  var x0 = CX + L.pad + 4 * S;
  var regionTop = GF.clamp(64 * S, 50, 92);
  var regionBot = H - Math.round(14 * S);
  // measure content height first (so we can clamp scroll), then draw clipped
  ctx.font = fs + 'px system-ui, sans-serif';
  var measuredY = 0;
  for (var mi = 0; mi < lines.length; mi++) measuredY = measureWrapHeight(ctx, lines[mi], maxW, fs + 7, measuredY) + fs + 10 * S;
  measuredY += 6 * S + fs + 4 * S + RARITY.length * (fs + 8 * S);
  scrollContentTop = regionTop;
  scrollMax = Math.max(0, Math.round(measuredY) - (regionBot - regionTop));
  scrollY = GF.clamp(scrollY, 0, scrollMax);
  ctx.save();
  ctx.beginPath(); ctx.rect(CX, regionTop, CW, regionBot - regionTop); ctx.clip();
  var y = regionTop - scrollY + Math.round(8 * S);
  ctx.fillStyle = '#cdd6e6'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = fs + 'px system-ui, sans-serif';
  for (var i = 0; i < lines.length; i++) {
    y = wrapText(ctx, lines[i], x0, y, maxW, fs + 7) + fs + 10 * S;
  }
  // rarity legend
  y += 6 * S;
  ctx.fillStyle = '#8893a8'; ctx.font = 'bold ' + Math.round(GF.clamp(12 * S, 10, 15)) + 'px system-ui, sans-serif';
  ctx.fillText(GF.t('value') + ':', x0, y); y += fs + 4 * S;
  for (var r = 0; r < RARITY.length; r++) {
    var rx = x0 + 4 * S, ry = y + r * (fs + 8 * S);
    drawMiniGem(ctx, rx + 8 * S, ry + fs * 0.5, 9 * S, RARITY[r].col);
    ctx.fillStyle = RARITY[r].col; ctx.font = '600 ' + fs + 'px system-ui, sans-serif';
    ctx.fillText(rarityName(r), rx + 24 * S, ry);
  }
  ctx.restore();
  if (scrollMax > 1) drawScrollHint(ctx, regionTop, regionBot);
  ctx.textBaseline = 'alphabetic';
}

// dry-run wrap to compute the y a wrapText() call would end at (no drawing)
function measureWrapHeight(ctx, text, maxW, lh, startY) {
  var words = String(text).split(' '), line = '', yy = startY;
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxW && line) { line = words[i]; yy += lh; }
    else line = test;
  }
  return yy;
}

function wrapText(ctx, text, x, y, maxW, lh) {
  var words = String(text).split(' '), line = '', yy = y;
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxW && line) { ctx.fillText(line, x, yy); line = words[i]; yy += lh; }
    else line = test;
  }
  if (line) ctx.fillText(line, x, yy);
  return yy;
}

// ════════════════════════════════════════════════════════════════════════════
// INPUT (unified mouse + touch). Single-tap model — no drag needed.
// ════════════════════════════════════════════════════════════════════════════
function evtXY(e) {
  if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}
function inRect(x, y, r) { return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

function onTap(x, y) {
  // tutorial intercepts first
  if (GF.tutorial.active) { if (GF.tutorial.handleClick(x, y)) return; }
  // set-complete celebration swallows taps while showing
  if (setCompleteFlash && setCompleteFlash.t < 2.8) { return; }

  // mute toggle — top-bar HUD, visible on main/reel/reveal (an overlay covers it,
  // so only honour the tap when no overlay is open). Checked first so it works
  // even mid-reveal / mid-spin.
  if (!overlay && inRect(x, y, hit.mute)) { GF.toggleMute(); GF.sfx('tap'); return; }

  // overlays
  if (overlay) {
    if (inRect(x, y, hit.close)) { overlay = null; scrollY = 0; saveMeta(); return; }
    if (overlay === 'VAULT' && hit.vtabs) {
      for (var i = 0; i < hit.vtabs.length; i++) { if (inRect(x, y, hit.vtabs[i])) { vaultTab = hit.vtabs[i].idx; scrollY = 0; return; } }
    }
    // tap outside any control while in RANKS/HELP/VAULT does nothing (stay open)
    return;
  }

  // reveal decision
  if (reveal) {
    if (inRect(x, y, hit.keep)) { keepGem(); return; }
    if (hit.socket && inRect(x, y, hit.socket)) { socketGem(); return; }
    if (inRect(x, y, hit.sell)) { sellGem(false); return; }
    if (inRect(x, y, hit.sell2x)) { watchSell2x(); return; }
    return;
  }

  // reel spinning — ignore taps
  if (reel) return;

  // THE MINE (idle screen): tap the mine to chip coins; tap an upgrade chip to buy.
  if (mineL) {
    if (mineL.pick && inRect(x, y, mineL.pick)) { buyPick(); return; }
    if (mineL.drill && inRect(x, y, mineL.drill)) { buyDrill(); return; }
    if (mineL.tap && inRect(x, y, mineL.tap)) { tapMine(); return; }
  }

  // pills
  if (hit.pills) {
    for (var p = 0; p < hit.pills.length; p++) {
      if (inRect(x, y, hit.pills[p])) {
        var id = hit.pills[p].id;
        if (id === 'DAILY') { if (dailyReady()) claimDaily(); }
        else if (id === 'VAULT') { overlay = 'VAULT'; vaultTab = curSet; scrollY = 0; }
        else if (id === 'RANKS') { overlay = 'RANKS'; scrollY = 0; }
        else if (id === 'HELP') { overlay = 'HELP'; scrollY = 0; }
        return;
      }
    }
  }

  // case selector
  if (hit.cases) {
    for (var c = 0; c < hit.cases.length; c++) {
      if (inRect(x, y, hit.cases[c])) {
        if (hit.cases[c].unlocked) { curSet = hit.cases[c].idx; }
        else { GF.spawnFloat(x, y, GF.t('locked'), '#ff8a8a'); }
        return;
      }
    }
  }

  // OPEN button (the hero)
  if (inRect(x, y, hit.open)) {
    if (hit.open.afford) startSpin(false);
    else watchFreeCase();          // can't afford → offer rewarded free case
    return;
  }
}

// ── POINTER: tap-vs-drag so overlays can drag-to-scroll without breaking taps ─
// On down we record the start. On move, if an overlay is open and the finger
// travels past a small threshold inside the scroll region, we enter drag-scroll
// mode (and that gesture will NOT fire a tap on release). A clean tap (little
// movement) still selects tabs / buttons exactly as before.
var DRAG_THRESH = 6;            // px before a press becomes a scroll drag
var ptr = { down: false, sx: 0, sy: 0, moved: false, lastY: 0 };
var cv = GF.canvas;
function pDown(x, y) {
  startMusicOnce();   // autoplay policy: kick the bg-music loop on the first gesture
  ptr.down = true; ptr.sx = x; ptr.sy = y; ptr.lastY = y; ptr.moved = false;
  dragScroll = null;
}
function pMove(x, y) {
  if (!ptr.down) return;
  var dy = y - ptr.lastY;
  if (!ptr.moved && Math.abs(y - ptr.sy) + Math.abs(x - ptr.sx) > DRAG_THRESH) {
    ptr.moved = true;
    // only start a scroll drag if an overlay with overflow is open and the press
    // began inside its scroll region (below the tabs/header)
    if (overlay && scrollMax > 1 && ptr.sy >= scrollContentTop) dragScroll = true;
  }
  if (dragScroll) { scrollY = GF.clamp(scrollY - dy, 0, scrollMax); }
  ptr.lastY = y;
}
function pUp(x, y) {
  if (!ptr.down) return;
  ptr.down = false;
  // a real tap (no significant drag) → dispatch the click logic
  if (!ptr.moved) onTap(ptr.sx, ptr.sy);
  dragScroll = null;
}
cv.addEventListener('mousedown', function (e) { var p = evtXY(e); pDown(p.x, p.y); });
cv.addEventListener('mousemove', function (e) { if (ptr.down) { var p = evtXY(e); pMove(p.x, p.y); } });
window.addEventListener('mouseup', function (e) { var p = evtXY(e); pUp(p.x, p.y); });
cv.addEventListener('touchstart', function (e) { e.preventDefault(); var p = evtXY(e); pDown(p.x, p.y); }, { passive: false });
cv.addEventListener('touchmove', function (e) { e.preventDefault(); var p = evtXY(e); pMove(p.x, p.y); }, { passive: false });
cv.addEventListener('touchend', function (e) { e.preventDefault(); var p = evtXY(e); pUp(p.x, p.y); }, { passive: false });
// desktop wheel scrolls an open overlay
cv.addEventListener('wheel', function (e) {
  if (overlay && scrollMax > 1) { scrollY = GF.clamp(scrollY + e.deltaY, 0, scrollMax); }
}, { passive: true });
// desktop: Space opens, Escape closes overlay
document.addEventListener('keydown', function (e) {
  if (e.code === 'Space') {
    e.preventDefault();
    startMusicOnce();   // first gesture may be a keypress on desktop
    if (GF.tutorial.active) { GF.tutorial.handleClick(L.ccx, GF.H - 40); return; }
    if (overlay) return;
    if (reveal) { var isNew = !(owned[reveal.gem.id] > 0); if (isNew) keepGem(); else sellGem(false); return; }
    if (!reel && coins >= SETS[curSet].cost) startSpin(false);
  } else if (e.code === 'Escape' || e.code === 'KeyP') {
    if (overlay) { overlay = null; scrollY = 0; }
  }
});

// ════════════════════════════════════════════════════════════════════════════
// SCREENSHOT / TEST HOOKS
// ════════════════════════════════════════════════════════════════════════════
// _setupForScreenshot(n): land on a juicy frame.
//   n=1 → mid-spin reel; n=2 → an EPIC reveal; n=3 → the Vault with gems;
//   n>=8 (loop-depth probe) → a rich late-game vault with multiple sets owned.
window._setupForScreenshot = function (n) {
  overlay = null; reel = null; reveal = null; scrollY = 0;
  try { localStorage.setItem('gem_cases_tut_v1', '1'); } catch (e) {}
  GF.tutorial.active = false;
  // give the player a healthy collection so frames look populated
  function grantSet(si, count) {
    var s = SETS[si];
    for (var i = 0; i < Math.min(count, s.gems.length); i++) { owned[s.gems[i].id] = (owned[s.gems[i].id] || 0) + 1; }
  }
  coins = 850;
  n = n || 1;
  if (n === 1) {
    // mid-spin reel of the Ember set
    curSet = 1; grantSet(0, 6); grantSet(1, 3);
    startSpin(false);
    if (reel) { reel.t = reel.dur * 0.62; layout(); reel.cardW = L.cardW + L.cardGap; reel.target = WIN_INDEX * reel.cardW + L.cardW / 2; reel.pos = reel.target * easeOutQuint(0.62); }
  } else if (n === 2) {
    // an EPIC reveal mid-rise
    curSet = 1; grantSet(0, 6); grantSet(1, 4);
    var g = pickGem(1, 3);   // epic
    reveal = { gem: g, rarity: 3, wasNew: true, t: 0.55, decided: false, autoT: 0 };
    newBurst = 0.7; burstSparkles(3);
  } else if (n === 3) {
    overlay = 'VAULT'; curSet = 0; vaultTab = 0; grantSet(0, 6); grantSet(1, 3);
  } else {
    // deep late-game: most of meadow+ember, some frost+cosmic — busy Vault + mine
    grantSet(0, 6); grantSet(1, 6); grantSet(2, 4); grantSet(3, 2);
    meta.setsDone['meadow'] = 1; meta.setsDone['ember'] = 1;
    // a built mine: socket a spread of gems so the wall + tier read as lived-in
    vein = { mossheart: 2, cloverstone: 1, sunard: 1, thorngleam: 1 };
    var emberGems = SETS[1].gems; if (emberGems[3]) vein[emberGems[3].id] = 1; if (emberGems[4]) vein[emberGems[4].id] = 1;
    pick = 3; drill = 2;
    overlay = 'VAULT'; vaultTab = 2; coins = 4200; opens = 60;
  }
  topRarity = Math.max(topRarity, 3);
  saveMeta();
};

window._jumpLevel = function (n) {
  if (n >= 99) {
    // terminal state for the harness: an EPIC reveal (a clear, settled "result"
    // frame). gs stays STATE_OPEN; we surface a DONE-style reveal.
    overlay = null; reel = null;
    var g = pickGem(Math.min(curSet, SETS.length - 1), 4);
    reveal = { gem: g, rarity: 4, wasNew: true, t: 0.6, decided: true, autoT: 0 };
    gs = 'DONE';
    return;
  }
  window._setupForScreenshot(n || 1);
};

// extra test seams (named like beast_bazaar's)
window._gemGrant = function (c) { coins += (+c || 0); saveMeta(); };
window.__vaultTab = function (i) { overlay = 'VAULT'; vaultTab = GF.clamp(i | 0, 0, SETS.length - 1); scrollY = 0; };
// test seam: set overlay scroll directly (exercise the scroll/clip path headless)
window.__setScroll = function (v) { scrollY = Math.max(0, +v || 0); };
// test seams for the QA harness: open an overlay by name + read live layout
window.__openOverlay = function (name) { overlay = (name === 'RANKS' || name === 'HELP' || name === 'VAULT') ? name : null; scrollY = 0; };
window.__L = function () { return { CX: L.CX, CW: L.CW, ccx: L.ccx, wide: L.wide, openX: L.openX, openW: L.openW, caseY: L.caseY }; };
window.__readScroll = function () { return { scrollY: scrollY, scrollMax: scrollMax, top: scrollContentTop }; };
window.__muteRect = function () { return hit.mute ? { x: hit.mute.x, y: hit.mute.y, w: hit.mute.w, h: hit.mute.h } : null; };
window.__forceBroke = function () { coins = 0; freeCaseCdUntil = 0; reel = null; reveal = null; overlay = null; saveMeta(); };
window._gemOpen = function () { if (!reel && !reveal) startSpin(true); };
// mine test seams
window._socket = function () { if (reveal && !reveal.decided) socketGem(); };
window._tapMine = function () { tapMine(); };
window._buyPick = function () { buyPick(); };
window._buyDrill = function () { buyDrill(); };
window._mineInfo = function () { return { count: veinCount(), tier: veinTier(), toNext: veinToNext(), value: veinValue(), perTap: minePerTap(), perHr: minePerHour(), pick: pick, drill: drill, mined: minedTotal }; };
window._gemInfo = function () {
  return {
    gs: gs, coins: coins, ownedCount: Object.keys(owned).filter(function (k) { return owned[k] > 0; }).length,
    opens: opens, topRarity: topRarity, collectionValue: collectionValue(),
    curSet: curSet, spinning: !!reel, revealing: !!reveal,
    veinCount: veinCount(), veinTier: veinTier(), veinValue: veinValue(), pick: pick, drill: drill,
    reelWinner: reel ? reel.winner.id : null, revealGem: reveal ? reveal.gem.id : null,
    hit: { open: hit.open, keep: hit.keep, socket: hit.socket, sell: hit.sell, pills: hit.pills, cases: hit.cases, mine: mineL },
    sets: SETS.map(function (s, i) { return { id: s.id, owned: setOwnedCount(i), total: s.gems.length, unlocked: setUnlocked(i), complete: setIsComplete(i) }; }),
  };
};

// ── BOT CONTRACT (progression_trials / progression_probe steering wheel) ─────
// getActions() = what's possible right now; doAction(a) performs one. Drives the
// FULL loop headless so the balance curve can be measured, not guessed.
GF.exposeBot && GF.exposeBot(
  function () {
    var acts = [];
    if (reveal && !reveal.decided) {
      var isNew = !(owned[reveal.gem.id] > 0);
      acts.push(isNew ? 'keep' : 'sell');
      if (veinCount() < 24 && (reveal.rarity >= 2 || isNew)) acts.push('socket'); // socket the good ones
    } else if (!reel) {
      if (coins >= SETS[curSet].cost) acts.push('open');
      else acts.push('free');                 // can't afford → rewarded free case path
      if (veinCount() > 0) acts.push('tap');   // chip the mine for coins
      if (coins >= pickCost() && pick < PICK_MAX) acts.push('pick');
      if (coins >= drillCost() && drill < DRILL_MAX) acts.push('drill');
    }
    return acts;
  },
  function (a) {
    if (a === 'open') { startSpin(false); }
    else if (a === 'free') { watchFreeCase(); }
    else if (a === 'keep') { keepGem(); }
    else if (a === 'socket') { socketGem(); }
    else if (a === 'sell') { sellGem(false); }
    else if (a === 'tap') { tapMine(); }
    else if (a === 'pick') { buyPick(); }
    else if (a === 'drill') { buyDrill(); }
  }
);

// ════════════════════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════════════════════
GF.init({
  designW: 393,
  designH: 852,
  strings: STRINGS,
  saveKey: 'gem_cases',
  onReady: function () {
    meta = loadMeta();
    coins = meta.coins; owned = meta.owned; opens = meta.opens; topRarity = meta.topRarity;
    // hydrate the live mine (M1 owned-meta) from persisted meta
    vein = meta.vein || {}; pick = meta.pick || 0; drill = meta.drill || 0; minedTotal = meta.minedTotal || 0;
    claimOnOpen();
    // Yandex 1.9 — persist the live session across reload (coins/owned/curSet/mine)
    GF.persist('gem_cases_run_v1',
      function () { return { coins: coins, owned: owned, opens: opens, topRarity: topRarity, curSet: curSet, vein: vein, pick: pick, drill: drill, minedTotal: minedTotal }; },
      function (st) {
        if (!st) return;
        if (typeof st.coins === 'number') coins = st.coins;
        if (st.owned) owned = st.owned;
        if (typeof st.opens === 'number') opens = st.opens;
        if (typeof st.topRarity === 'number') topRarity = st.topRarity;
        if (typeof st.curSet === 'number') curSet = GF.clamp(st.curSet, 0, SETS.length - 1);
        if (st.vein) vein = st.vein;
        if (typeof st.pick === 'number') pick = GF.clamp(st.pick, 0, PICK_MAX);
        if (typeof st.drill === 'number') drill = GF.clamp(st.drill, 0, DRILL_MAX);
        if (typeof st.minedTotal === 'number') minedTotal = st.minedTotal;
      }
    );
    // make sure curSet points at an unlocked case
    if (!setUnlocked(curSet)) curSet = 0;
    // welcome-back banner if there's anything to show
    if (idleClaim > 0 || dailyClaim > 0) bootBannerT = 4.0;
    // first-run tutorial: ONE screen + ONE action ("Tap OPEN").
    // Platform builds (Yandex/CrazyGames) set __GF_AUTOSTART → drop straight into
    // play with no tutorial gate (CLAUDE.md hard rule #9). The game has no menu
    // (gs is always OPEN), so "autostart" = suppress the tutorial overlay; the
    // help (?) pill keeps the how-to reachable in-game.
    layout();
    if (window.__GF_AUTOSTART && !window._silent) {
      try { localStorage.setItem('gem_cases_tut_v1', '1'); } catch (e) {}
      meta.seenTut = 1;
    } else {
      GF.tutorial.start([
        { text: GF.t('tapOpen'),
          target: function () { return { x: L.ccx, y: L.openY + L.openH / 2, r: Math.max(L.openW, L.openH) * 0.5 }; },
          advance: 'click_target', onAdvance: function () { meta.seenTut = 1; saveMeta(); } },
      ], { storageKey: 'gem_cases_tut_v1' });
    }
    saveMeta();
  },
  onUpdate: update,
  onDraw: draw,
});

// ── EXPOSE STATE (post-build-tester) ─────────────────────────────────────────
// score = collection value (the leaderboard metric + the thing that grows as
// the player opens & keeps). best = best collection value ever.
GF.exposeState(function () {
  return {
    gs: gs,
    score: collectionValue(),
    best: meta ? Math.max(meta.bestValue || 0, collectionValue()) : collectionValue(),
    coins: coins,
    opens: opens,
    ownedCount: Object.keys(owned).filter(function (k) { return owned[k] > 0; }).length,
    topRarity: topRarity,
    curSet: curSet,
    setsDone: setsCompletedCount(),
    veinCount: veinCount(),
    veinTier: veinTier(),
    pick: pick,
    drill: drill,
    spinning: !!reel,
    revealing: !!reveal,
  };
});

})();
</script>
