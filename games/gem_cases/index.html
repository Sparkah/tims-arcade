var GEM_BY_ID = {};
SETS.forEach(function (s, si) {
  s.idx = si;

  s.gems.forEach(function (g) {
    g.set = s.id; g.setIdx = si;
    g.value = RARITY[g.rarity].sval;       // collection value = rarity sell value

    s.byRarity[g.rarity].push(g);
  });

  // lower non-empty bucket so a roll never fails.
});

// ── AUDIO (WebAudio reveal chime; pitch/length scale with rarity) ────────────
var actx = null;
function audioCtx() {
  if (actx) return actx;
  try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { actx = null; }
  return actx;
}
function tone(freq, dur, type, vol, when) {
  var a = audioCtx(); if (!a) return;
  if (a.state === 'suspended') { try { a.resume(); } catch (e) {} }
  var t0 = a.currentTime + (when || 0);
  var o = a.createOscillator(), g = a.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || 0.18, t0 + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(a.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function tickSound() { tone(880 + Math.random() * 120, 0.04, 'square', 0.05); }
function revealChime(rarity) {
  // higher rarity → richer, longer, ascending arpeggio
  var base = [523, 587, 659, 784, 880, 988][rarity] || 523;
  var steps = [0, 4, 7, 12].slice(0, 2 + rarity);
  for (var i = 0; i < steps.length; i++) {
    var f = base * Math.pow(2, steps[i] / 12);
    tone(f, 0.28 + rarity * 0.08, rarity >= 3 ? 'triangle' : 'sine', 0.16, i * 0.07);
  }
  if (rarity >= 4) tone(base * 2, 0.5, 'sine', 0.1, 0.18);
}
function sellSound() { tone(660, 0.12, 'sine', 0.12); tone(990, 0.16, 'sine', 0.1, 0.06); }

// ── META PERSISTENCE ─────────────────────────────────────────────────────────
function defaultMeta() {
  return {
    coins: 120,
    owned: {},                 // gemId -> count
    opens: 0,
    topRarity: 0,
    setsDone: {},              // setId -> 1 once collection complete (reward claimed)
    bestValue: 0,              // best collection value (leaderboard score)
    lastClose: 0,
    lastDaily: '',             // UTC day the daily free case was claimed
    lastLoginDay: '',
    streak: 0,
    bestStreak: 0,
    seenTut: 0,
  };
}
function loadMeta() {
  var m = defaultMeta();
  try {
    var raw = localStorage.getItem(META_KEY);
    if (raw) {
      var s = JSON.parse(raw);
      if (s && typeof s === 'object') {
        m.coins = Math.max(0, +s.coins || 0);
        if (s.owned && typeof s.owned === 'object') {
          for (var k in s.owned) { if (GEM_BY_ID[k]) m.owned[k] = Math.max(0, +s.owned[k] || 0); }
        }
        m.opens = +s.opens || 0;
        m.topRarity = GF.clamp(+s.topRarity || 0, 0, 5);
        m.setsDone = (s.setsDone && typeof s.setsDone === 'object') ? s.setsDone : {};
        m.bestValue = +s.bestValue || 0;
        m.lastClose = +s.lastClose || 0;
        m.lastDaily = s.lastDaily || '';
        m.lastLoginDay = s.lastLoginDay || '';
        m.streak = +s.streak || 0;
        m.bestStreak = +s.bestStreak || 0;
        m.seenTut = +s.seenTut || 0;
      }
    }
  } catch (e) {}
  return m;
}
function saveMeta() {
  if (!meta) return;
  meta.coins = coins; meta.owned = owned; meta.opens = opens; meta.topRarity = topRarity;
  meta.bestValue = Math.max(meta.bestValue || 0, collectionValue());
  try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch (e) {}
}
window.addEventListener('pagehide', function () { try { meta.lastClose = Date.now(); saveMeta(); } catch (e) {} });
document.addEventListener('visibilitychange', function () { if (document.hidden) { try { meta.lastClose = Date.now(); saveMeta(); } catch (e) {} } });

function utcDayStr(off) {
  var d = new Date(); if (off) d.setUTCDate(d.getUTCDate() + off);
  return d.getUTCFullYear() + '-' + (d.getUTCMonth() + 1) + '-' + d.getUTCDate();
}

// ── DERIVED ──────────────────────────────────────────────────────────────────
function collectionValue() {
  var v = 0;
  for (var id in owned) { if (owned[id] > 0 && GEM_BY_ID[id]) v += GEM_BY_ID[id].value; }
  return v;
}
function setOwnedCount(si) {
  var s = SETS[si], n = 0;
  for (var i = 0; i < s.gems.length; i++) if (owned[s.gems[i].id] > 0) n++;
  return n;
}
function setIsComplete(si) { return setOwnedCount(si) >= SETS[si].gems.length; }
function setUnlocked(si) {
  if (si === 0) return true;
  return collectionValue() >= SETS[si].unlock || meta.setsDone[SETS[si - 1].id];
}
function setsCompletedCount() {
  var n = 0; for (var i = 0; i < SETS.length; i++) if (setIsComplete(i)) n++;
  return n;
}

// daily free case available?
function dailyReady() { return !meta || meta.lastDaily !== utcDayStr(0); }

// ── WELCOME-BACK / DAILY (the reason-to-return) ──────────────────────────────
function claimOnOpen() {
  idleClaim = 0; dailyClaim = 0; streakNow = meta.streak || 0;
  var now = Date.now();
  // overnight coin vein (idle), capped ~10h, scales with collection value
  if (meta.lastClose > 0) {
    var hrs = Math.min(10, (now - meta.lastClose) / 3600000);
    if (hrs >= 0.05) {
      var rate = 6 + Math.floor(collectionValue() / 300);   // coins/hour
      idleClaim = Math.round(hrs * rate);
      if (idleClaim > 0) { coins += idleClaim; }
    }
  }
  // login streak (the daily login bonus; day-7 gets a bigger pop)
  var today = utcDayStr(0);
  if (meta.lastLoginDay !== today) {
    if (meta.lastLoginDay === utcDayStr(-1)) meta.streak = (meta.streak || 0) + 1;
    else meta.streak = 1;
    meta.bestStreak = Math.max(meta.bestStreak || 0, meta.streak);
    meta.lastLoginDay = today;
    streakNow = meta.streak;
    dailyClaim = 30 + meta.streak * 15 + (meta.streak % 7 === 0 ? 120 : 0);
    coins += dailyClaim;
  }
  meta.lastClose = now;
  saveMeta();
}

// ════════════════════════════════════════════════════════════════════════════
// THE REEL — pre-roll the result by rarity-weighted RNG, then choreograph the
// strip to LAND on it with a CS:GO ease-out + a deliberate near-miss.
// ════════════════════════════════════════════════════════════════════════════
function rollRarity(setIdx) {
  // higher case tiers shift odds up: scale down common weight, scale up rare+.
  var shift = setIdx; // 0..4
  var w = [];
  var total = 0;
  for (var i = 0; i < RARITY.length; i++) {
    var base = RARITY[i].weight;
    // reduce commons, boost top tiers as the set index climbs
    var f = 1;
    if (i === 0) f = Math.max(0.35, 1 - shift * 0.14);
    else f = 1 + shift * (0.10 + i * 0.05);
    w[i] = base * f; total += w[i];
  }
  var r = Math.random() * total, acc = 0;
  for (var k = 0; k < w.length; k++) { acc += w[k]; if (r <= acc) return k; }
  return 0;
}
// pick a concrete gem of a given rarity from a set (fall to nearest lower bucket)
function pickGem(setIdx, rarity) {
  var s = SETS[setIdx];
  for (var r = rarity; r >= 0; r--) {
    if (s.byRarity[r] && s.byRarity[r].length) {
      var arr = s.byRarity[r];
      return arr[(Math.random() * arr.length) | 0];
    }
  }
  // ultimate fallback: any gem in the set
  return s.gems[(Math.random() * s.gems.length) | 0];
}
// a random gem (any rarity) of a set — used to fill the strip
function randGem(setIdx) {
  var s = SETS[setIdx];
  return s.gems[(Math.random() * s.gems.length) | 0];
}

var REEL_N = 48;                // cards on the strip
var WIN_INDEX = 41;            // the winner card index (under marker at stop)

function startSpin(isFree) {
  if (reel || reveal) return;
  var s = SETS[curSet];
  if (!isFree) {
    if (coins < s.cost) { GF.spawnFloat(GF.cx, GF.H * 0.5, GF.t('coins') + '!', '#ff6b6b'); return; }
    coins -= s.cost;
  }
  spinCount++; opens++; lifetimeOpens++;
  // pre-roll the result
  var rar = rollRarity(curSet);
  var winner = pickGem(curSet, rar);
  if (rar > topRarity) topRarity = rar;
  // build the strip; place winner at WIN_INDEX; engineer a near-miss: sometimes
  // drop a high-rarity gem 1-2 slots before the winner so it slides past.
  var cards = [];
  for (var i = 0; i < REEL_N; i++) {
    if (i === WIN_INDEX) { cards.push(winner); continue; }
    cards.push(randGem(curSet));
  }
  // near-miss: 55% of the time, force a >= rare gem just before the winner so
  // the eye catches it sliding past the marker (the tension beat).
  if (Math.random() < 0.55) {
    var nmOff = 1 + ((Math.random() < 0.5) ? 0 : 1);   // 1 or 2 slots before
    var nmRar = Math.min(5, Math.max(2, rar + (Math.random() < 0.5 ? 1 : 0)));
    cards[WIN_INDEX - nmOff] = pickGem(curSet, nmRar);
  }
  reel = {
    cards: cards,
    cardW: 0,               // set in draw (depends on layout)
    pos: 0,                 // current scroll offset (px)
    target: 0,              // final offset (px) — set after cardW known
    dur: 3.4 + Math.random() * 0.6,
    t: 0,
    started: false,
    winner: winner,
    rarity: rar,
    lastTick: -1,
    landed: false,
  };
  saveMeta();
}

// ease-out cubic for the reel deceleration
function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }
function easeOutQuint(x) { return 1 - Math.pow(1 - x, 5); }

function updateReel(dt) {
  if (!reel) return;
  reel.t += dt;
  var p = GF.clamp(reel.t / reel.dur, 0, 1);
  var e = easeOutQuint(p);
  reel.pos = reel.target * e;
  // tick on each card boundary crossed
  if (reel.cardW > 0) {
    var idx = Math.floor((reel.pos + reel.cardW * 0.5) / reel.cardW);
    if (idx !== reel.lastTick && p < 0.999) {
      reel.lastTick = idx;
      if (reel.t > 0.05) tickSound();
    }
  }
  if (p >= 1 && !reel.landed) {
    reel.landed = true;
    landReel();
  }
}

function landReel() {
  var g = reel.winner, rar = reel.rarity;
  var wasNew = !(owned[g.id] > 0);
  // reveal sequence
  reveal = { gem: g, rarity: rar, wasNew: wasNew, t: 0, decided: false, autoT: 0 };
  reel = null;
  // FX
  GF.setShake(0.5 + RARITY[rar].shake);
  burstSparkles(rar);
  GF.spawnParticles(GF.cx, GF.H * 0.40, RARITY[rar].glow, 24 + rar * 14);
  revealChime(rar);
  if (rar >= 4) { try { GF.happytime(); } catch (e) {} }
  if (wasNew) newBurst = 1.0;
}

// KEEP the revealed gem → add to collection
function keepGem() {
  if (!reveal || reveal.decided) return;
  var g = reveal.gem;
  var wasNew = !(owned[g.id] > 0);
  owned[g.id] = (owned[g.id] || 0) + 1;
  reveal.decided = true;
  if (wasNew) {
    GF.spawnFloat(GF.cx, GF.H * 0.34, GF.t('neww'), RARITY[reveal.rarity].glow);
    GF.spawnParticles(GF.cx, GF.H * 0.40, '#fff', 26);
    // set completion?
    if (setIsComplete(g.setIdx) && !meta.setsDone[g.set]) onSetComplete(g.setIdx);
  } else {
    GF.spawnFloat(GF.cx, GF.H * 0.34, GF.t('got'), '#cfe');
  }
  saveMeta();
  reveal = null;
}

// SELL the revealed gem → coins (with optional 2x via rewarded ad)
function sellGem(doubled) {
  if (!reveal || reveal.decided) return;
  var g = reveal.gem;
  var val = RARITY[reveal.rarity].sval;
  if (doubled) val *= 2;
  coins += val;
  reveal.decided = true;
  GF.spawnFloat(GF.cx, GF.H * 0.34, '+' + val, '#ffd24a');
  sellSound();
  saveMeta();
  reveal = null;
}

function onSetComplete(si) {
  var s = SETS[si];
  meta.setsDone[s.id] = 1;
  var reward = 200 + si * 350;
  coins += reward;
  setCompleteFlash = { si: si, reward: reward, t: 0 };
  GF.setShake(1.6);
  GF.spawnParticles(GF.cx, GF.H * 0.4, s.col, 60);
  try { GF.happytime(); } catch (e) {}
  revealChime(5);
  saveMeta();
}
var setCompleteFlash = null;

function burstSparkles(rar) {
  var n = 14 + rar * 10;
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = (1 + Math.random() * 4) * GF.S;
    sparkles.push({
      x: GF.cx, y: GF.H * 0.40,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1 * GF.S,
      r: (1.5 + Math.random() * 3.5) * GF.S, life: 1, col: Math.random() < 0.5 ? RARITY[rar].glow : '#ffffff',
    });
  }
}
function updateSparkles(dt) {
  for (var i = sparkles.length - 1; i >= 0; i--) {
    var p = sparkles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.06 * GF.S; p.life -= dt * 1.1;
    if (p.life <= 0) sparkles.splice(i, 1);
  }
}

// ════════════════════════════════════════════════════════════════════════════
// ADS (rewarded-only, Yandex 1.15-safe: base reward ALWAYS granted; the ad ONLY
// ADDS; never gates progress). Routes through the SDK via GF.showAd / native.
// ════════════════════════════════════════════════════════════════════════════
var freeCaseCdUntil = 0;       // cooldown for the rewarded "free case" button
var FREE_CASE_CD_MS = 90000;
var adLoading = false;

function nowMs() { return (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now(); }

// rewarded free open — non-RV fallback: if no ad fills, we STILL grant a free
// open after the cooldown (the cooldown is the limiter, not the ad).
function watchFreeCase() {
  if (adLoading || reel || reveal) return;
  if (nowMs() < freeCaseCdUntil) return;
  adLoading = true;
  freeCaseCdUntil = nowMs() + FREE_CASE_CD_MS;
  var done = false;
  var grant = function (ok) {
    if (done) return; done = true; adLoading = false;
    // base reward (the free open) ALWAYS granted; ad fill is a bonus path.
    pendingFree = true;
    startSpin(true);
    pendingFree = false;
  };
  // Yandex native path (best-effort), else GF.showAd, else immediate grant.
  if (window.ysdk && window.ysdk.adv && window.ysdk.adv.showRewardedVideo) {
    var rewarded = false, opened = false;
    var wd = setTimeout(function () { if (!opened) grant(true); }, 4500);
    try {
      window.ysdk.adv.showRewardedVideo({ callbacks: {
        onOpen: function () { opened = true; },
        onRewarded: function () { rewarded = true; },
        onClose: function () { clearTimeout(wd); grant(true); },
        onError: function () { clearTimeout(wd); grant(true); },
      } });
    } catch (e) { clearTimeout(wd); grant(true); }
  } else if (GF.showAd) {
    GF.showAd('rewarded').then(function () { grant(true); });
    setTimeout(function () { grant(true); }, 5000);
  } else {
    grant(true);
  }
}

// rewarded 2x coins on a sell — base sell ALWAYS happens; ad DOUBLES the bonus.
function watchSell2x() {
  if (!reveal || reveal.decided || adLoading) return;
  adLoading = true;
  var done = false;
  var fin = function () {
    if (done) return; done = true; adLoading = false;
    sellGem(true);   // doubled
  };
  if (window.ysdk && window.ysdk.adv && window.ysdk.adv.showRewardedVideo) {
    var opened = false;
    var wd = setTimeout(function () { if (!opened) fin(); }, 4500);
    try {
      window.ysdk.adv.showRewardedVideo({ callbacks: {
        onOpen: function () { opened = true; },
        onRewarded: function () {},
        onClose: function () { clearTimeout(wd); fin(); },
        onError: function () { clearTimeout(wd); fin(); },
      } });
    } catch (e) { clearTimeout(wd); fin(); }
  } else if (GF.showAd) {
    GF.showAd('rewarded').then(fin);
    setTimeout(fin, 5000);
  } else { fin(); }
}

// daily free case
function claimDaily() {
  if (!dailyReady() || reel || reveal) return;
  meta.lastDaily = utcDayStr(0);
  // the daily uses the player's CURRENT selected set, free of charge
  pendingFree = true;
  startSpin(true);
  pendingFree = false;
  saveMeta();
}

// IAP scaffold (coin pack). If GF exposes payments use them; else rewarded fallback.
function buyCoinPack() {
  // No real payment surface wired in GF — fall back to a rewarded "earn coins".
  // (Player-click only; clearly framed as ad, not a charge.)
  if (adLoading) return;
  adLoading = true;
  var done = false;
  var grant = function () { if (done) return; done = true; adLoading = false; coins += 500; GF.spawnFloat(GF.cx, GF.H * 0.45, '+500', '#ffd24a'); saveMeta(); };
  if (GF.showAd) { GF.showAd('rewarded').then(grant); setTimeout(grant, 5000); }
  else grant();
}

// ════════════════════════════════════════════════════════════════════════════
// LAYOUT — recomputed every draw from GF.W/H/S so it adapts to any viewport.
// Portrait-first (393x852). Top: coins+value bar. Mid: reel/reveal stage.
// Below stage: OPEN button (hero). Bottom: case selector strip. Pills: Vault, ?.
// ════════════════════════════════════════════════════════════════════════════
var L = {};
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  L.W = W; L.H = H; L.S = S;
  L.pad = Math.round(GF.clamp(14 * S, 8, 22));
  // top bar
  L.topH = Math.round(GF.clamp(54 * S, 40, 74));
  // pills row (under top bar): Vault | Ranks | Daily | ?
  L.pillY = L.topH + Math.round(6 * S);
  L.pillH = Math.round(GF.clamp(40 * S, 30, 52));
  // case selector strip at the bottom
  L.caseH = Math.round(GF.clamp(118 * S, 92, 150));
  L.caseY = H - L.caseH - L.pad;
  // OPEN button above the case strip
  L.openH = Math.round(GF.clamp(64 * S, 48, 86));
  L.openW = Math.round(GF.clamp(280 * S, 180, 460));
  L.openY = L.caseY - L.openH - Math.round(16 * S);
  L.openX = (W - L.openW) / 2;
  // the stage (reel / reveal) sits between pills and OPEN button
  L.stageTop = L.pillY + L.pillH + Math.round(10 * S);
  L.stageBot = L.openY - Math.round(12 * S);
  L.stageH = L.stageBot - L.stageTop;
  L.stageMidY = L.stageTop + L.stageH * 0.5;
  // reel geometry
  L.reelH = Math.round(GF.clamp(118 * S, 90, 150));
  L.reelY = L.stageMidY - L.reelH / 2;
  L.cardW = Math.round(GF.clamp(108 * S, 78, 140));
  L.cardGap = Math.round(6 * S);
  L.markerX = W / 2;
}

// ── DRAW HELPERS ─────────────────────────────────────────────────────────────
function shade(hex, f) {
  // lighten (f>0) / darken (f<0) a #rrggbb hex
  var n = parseInt(hex.slice(1), 16);
  var r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  if (f >= 0) { r += (255 - r) * f; g += (255 - g) * f; b += (255 - b) * f; }
  else { r *= (1 + f); g *= (1 + f); b *= (1 + f); }
  return 'rgb(' + (r | 0) + ',' + (g | 0) + ',' + (b | 0) + ')';
}

// Draw a faceted gem of the given shape at (cx,cy) radius rad.
function drawGem(ctx, cx, cy, rad, gem, rarity, glowAmt, tt) {
  var col = gem.col, rar = RARITY[rarity];
  // rarity glow halo
  if (glowAmt > 0) {
    var halo = ctx.createRadialGradient(cx, cy, rad * 0.3, cx, cy, rad * (1.7 + rarity * 0.18));
    var ga = (0.18 + rarity * 0.10) * glowAmt;
    halo.addColorStop(0, hexA(rar.glow, ga));
    halo.addColorStop(1, hexA(rar.glow, 0));
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(cx, cy, rad * (1.8 + rarity * 0.2), 0, Math.PI * 2); ctx.fill();
  }
  // mythic: animated rainbow shimmer ring + crown
  if (rarity >= 5) {
    var hue = ((tt || 0) * 90) % 360;
    ctx.save();
    ctx.lineWidth = Math.max(2, rad * 0.10);
    var rg = ctx.createConicGradient ? ctx.createConicGradient((tt || 0) * 2, cx, cy) : null;
    if (rg) { for (var h = 0; h <= 6; h++) rg.addColorStop(h / 6, 'hsl(' + ((hue + h * 60) % 360) + ',90%,62%)'); ctx.strokeStyle = rg; }
    else ctx.strokeStyle = 'hsl(' + hue + ',90%,62%)';
    ctx.beginPath(); ctx.arc(cx, cy, rad * 1.32, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }
  var pts = gemPath(gem.shape, cx, cy, rad);
  // base fill (radial: bright top-left facet → deeper base)
  var grd = ctx.createLinearGradient(cx - rad, cy - rad, cx + rad, cy + rad);
  grd.addColorStop(0, shade(col, 0.5));
  grd.addColorStop(0.45, col);
  grd.addColorStop(1, shade(col, -0.42));
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.fillStyle = grd; ctx.fill();
  // facet lines from centroid to each vertex (the "cut")
  ctx.strokeStyle = hexA('#ffffff', 0.22); ctx.lineWidth = Math.max(1, rad * 0.03);
  for (var f = 0; f < pts.length; f++) {
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(pts[f].x, pts[f].y); ctx.stroke();
  }
  // outline
  ctx.strokeStyle = shade(col, 0.35); ctx.lineWidth = Math.max(1.2, rad * 0.05);
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  for (var j = 1; j < pts.length; j++) ctx.lineTo(pts[j].x, pts[j].y);
  ctx.closePath(); ctx.stroke();
  // top-facet highlight (a brighter inner polygon, offset up-left)
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  for (var k = 0; k < pts.length; k++) {
    var hx = cx + (pts[k].x - cx) * 0.5 - rad * 0.12;
    var hy = cy + (pts[k].y - cy) * 0.5 - rad * 0.14;
    if (k === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
  }
  ctx.closePath();
  ctx.fillStyle = shade(col, 0.7); ctx.fill();
  ctx.restore();
  // inner sparkle (a small 4-point star glint)
  var sx = cx - rad * 0.22, sy = cy - rad * 0.26, ss = rad * 0.28;
  ctx.fillStyle = hexA('#ffffff', 0.92);
  ctx.beginPath();
  ctx.moveTo(sx, sy - ss); ctx.lineTo(sx + ss * 0.28, sy - ss * 0.28);
  ctx.lineTo(sx + ss, sy); ctx.lineTo(sx + ss * 0.28, sy + ss * 0.28);
  ctx.lineTo(sx, sy + ss); ctx.lineTo(sx - ss * 0.28, sy + ss * 0.28);
  ctx.lineTo(sx - ss, sy); ctx.lineTo(sx - ss * 0.28, sy - ss * 0.28);
  ctx.closePath(); ctx.fill();
}

// vertices for each gem shape (relative to center, radius rad)
function gemPath(shape, cx, cy, rad) {
  var p = [];
  function poly(n, rot, sq) {
    for (var i = 0; i < n; i++) {
      var a = rot + i / n * Math.PI * 2;
      p.push({ x: cx + Math.cos(a) * rad * (sq || 1), y: cy + Math.sin(a) * rad });
    }
  }
  if (shape === 'round') { poly(8, -Math.PI / 2); }
  else if (shape === 'hex') { poly(6, -Math.PI / 2); }
  else if (shape === 'emerald') {
    // rounded rectangle (octagon, wide) — emerald cut
    var w = rad * 0.92, h = rad * 1.04, c = rad * 0.3;
    p = [
      { x: cx - w + c, y: cy - h }, { x: cx + w - c, y: cy - h },
      { x: cx + w, y: cy - h + c }, { x: cx + w, y: cy + h - c },
      { x: cx + w - c, y: cy + h }, { x: cx - w + c, y: cy + h },
      { x: cx - w, y: cy + h - c }, { x: cx - w, y: cy - h + c },
    ];
  }
  else if (shape === 'teardrop') {
    p.push({ x: cx, y: cy - rad * 1.15 });   // point at top
    for (var i = 1; i <= 7; i++) {
      var a = -Math.PI / 2 + i / 7 * Math.PI * 2 * (5 / 6) + Math.PI * 0.16;
      p.push({ x: cx + Math.cos(a) * rad * 0.92, y: cy + rad * 0.18 + Math.sin(a) * rad * 0.92 });
    }
  }
  else if (shape === 'marquise') {
    // pointed oval (eye)
    p.push({ x: cx, y: cy - rad * 1.15 });
    p.push({ x: cx + rad * 0.6, y: cy });
    p.push({ x: cx, y: cy + rad * 1.15 });
    p.push({ x: cx - rad * 0.6, y: cy });
  }
  else if (shape === 'star') {
    for (var s = 0; s < 10; s++) {
      var ar = -Math.PI / 2 + s / 10 * Math.PI * 2;
      var rr2 = (s % 2 === 0) ? rad * 1.1 : rad * 0.5;
      p.push({ x: cx + Math.cos(ar) * rr2, y: cy + Math.sin(ar) * rr2 });
    }
  }
  else { poly(8, -Math.PI / 2); }
  return p;
}

function hexA(hex, a) {
  var n = parseInt(hex.slice(1), 16);
  return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';
}

// vector coin icon
function drawCoin(ctx, cx, cy, r) {
  var g = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
  g.addColorStop(0, '#ffe48a'); g.addColorStop(0.5, '#ffc23c'); g.addColorStop(1, '#e09a1a');
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = '#b8780f'; ctx.lineWidth = Math.max(1, r * 0.12); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.62, 0, Math.PI * 2); ctx.strokeStyle = hexA('#fff7d6', 0.6); ctx.lineWidth = Math.max(1, r * 0.1); ctx.stroke();
  // vector diamond emblem (no glyph - emoji/dingbat codepoints tofu on Yandex/Android fonts)
  var d = r * 0.52;
  ctx.beginPath();
  ctx.moveTo(cx, cy - d); ctx.lineTo(cx + d * 0.72, cy); ctx.lineTo(cx, cy + d); ctx.lineTo(cx - d * 0.72, cy);
  ctx.closePath(); ctx.fillStyle = '#9a6a0c'; ctx.fill();
}

function fmt(n) {
  n = Math.round(n);
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 10000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}

// ════════════════════════════════════════════════════════════════════════════
// MAIN UPDATE
// ════════════════════════════════════════════════════════════════════════════
function update(dt) {
  GF.tutorial.update(dt);
  if (bootBannerT > 0) bootBannerT -= dt;
  if (newBurst > 0) newBurst -= dt * 1.4;
  updateSparkles(dt);
  if (setCompleteFlash) { setCompleteFlash.t += dt; if (setCompleteFlash.t > 3.2) setCompleteFlash = null; }
  if (reveal) {
    reveal.t += dt;
    // auto-decide if untouched for a while so the loop keeps flowing (and the
    // automated tester accumulates collection/coins). Default = KEEP if new,
    // else SELL (a sensible auto-choice).
    reveal.autoT += dt;
    if (reveal.autoT > 4.5 && !reveal.decided) {
      var isNew = !(owned[reveal.gem.id] > 0);
      if (isNew) keepGem(); else sellGem(false);
    }
  }
  if (reel) updateReel(dt);
}

// ════════════════════════════════════════════════════════════════════════════
// MAIN DRAW
// ════════════════════════════════════════════════════════════════════════════
function draw(ctx, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  layout();
  // background — deep gradient + faint vignette
  var bg = ctx.createLinearGradient(0, 0, 0, H);
  var s = SETS[curSet];
  bg.addColorStop(0, '#0d1224');
  bg.addColorStop(0.5, '#0a0e1a');
  bg.addColorStop(1, '#080a14');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  drawBgGlow(ctx, s);

  drawTopBar(ctx);
  drawPills(ctx);
  drawStage(ctx, dt);
  drawOpenButton(ctx);
  drawCaseStrip(ctx);

  // boot welcome-back banner
  if (bootBannerT > 0 && !overlay && !reveal && !reel) drawBootBanner(ctx);
  // set-complete celebration
  if (setCompleteFlash) drawSetComplete(ctx);

  // sparkle layer (above stage, below overlays)
  for (var i = 0; i < sparkles.length; i++) {
    var p = sparkles[i];
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = p.col; ctx.fill();
  }
  ctx.globalAlpha = 1;

  // overlays
  if (overlay === 'VAULT') drawVault(ctx, dt);
  else if (overlay === 'RANKS') drawRanks(ctx);
  else if (overlay === 'HELP') drawHelp(ctx);

  // tutorial draws LAST
  GF.tutorial.draw(ctx);
}

function drawBgGlow(ctx, s) {
  var g = ctx.createRadialGradient(GF.cx, GF.H * 0.36, 10, GF.cx, GF.H * 0.36, GF.W * 0.9);
  g.addColorStop(0, hexA(s.col, 0.10));
  g.addColorStop(1, hexA(s.col, 0));
  ctx.fillStyle = g; ctx.fillRect(0, 0, GF.W, GF.H);
}

// reset click targets each frame (rebuilt in draw)
var hit = {};   // named rects for input

function drawTopBar(ctx) {
  var W = GF.W, S = GF.S, p = L.pad;
  var h = L.topH;
  // coins chip (left)
  var chipH = Math.round(GF.clamp(36 * S, 28, 48));
  var cy = h / 2;
  var cr = chipH * 0.36;
  ctx.font = 'bold ' + Math.round(GF.clamp(18 * S, 13, 24)) + 'px system-ui, sans-serif';
  var coinTxt = fmt(coins);
  var ctW = ctx.measureText(coinTxt).width;
  var chipW = cr * 2 + 12 * S + ctW + 22 * S;
  GF.rr(ctx, p, cy - chipH / 2, chipW, chipH, chipH / 2);
  ctx.fillStyle = 'rgba(20,26,44,0.92)'; ctx.fill();
  ctx.strokeStyle = hexA('#ffc23c', 0.5); ctx.lineWidth = 1.5; ctx.stroke();
  drawCoin(ctx, p + 12 * S + cr, cy, cr);
  ctx.fillStyle = '#ffe48a'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(coinTxt, p + 12 * S + cr * 2 + 8 * S, cy + 1);
  // collection value chip (right)
  ctx.font = '600 ' + Math.round(GF.clamp(11 * S, 9, 15)) + 'px system-ui, sans-serif';
  var lbl = GF.t('value');
  ctx.font = 'bold ' + Math.round(GF.clamp(17 * S, 12, 22)) + 'px system-ui, sans-serif';
  var valTxt = fmt(collectionValue());
  var vW = Math.max(ctx.measureText(valTxt).width, 50 * S);
  var vChipW = vW + 28 * S;
  var vx = W - p - vChipW;
  GF.rr(ctx, vx, cy - chipH / 2, vChipW, chipH, chipH / 2);
  ctx.fillStyle = 'rgba(20,26,44,0.92)'; ctx.fill();
  ctx.strokeStyle = hexA('#7ec8ff', 0.5); ctx.lineWidth = 1.5; ctx.stroke();
  // tiny gem glyph
  drawMiniGem(ctx, vx + 16 * S, cy, cr * 0.85, '#7ec8ff');
  ctx.fillStyle = '#cfe6ff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + Math.round(GF.clamp(16 * S, 12, 21)) + 'px system-ui, sans-serif';
  ctx.fillText(valTxt, vx + 16 * S + cr + 8 * S, cy + 1);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function drawMiniGem(ctx, cx, cy, r, col) {
  var pts = gemPath('round', cx, cy, r);
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  var g = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
  g.addColorStop(0, shade(col, 0.5)); g.addColorStop(1, shade(col, -0.3));
  ctx.fillStyle = g; ctx.fill();
}

function drawPills(ctx) {
  var W = GF.W, S = GF.S, p = L.pad;
  var y = L.pillY, h = L.pillH;
  // four pills: Vault | Ranks | Daily | ?
  var gap = Math.round(8 * S);
  var n = 4;
  var pw = (W - p * 2 - gap * (n - 1)) / n;
  hit.pills = [];
  var defs = [
    { id: 'VAULT', label: GF.t('vault'), col: '#7ec8ff', icon: 'vault' },
    { id: 'RANKS', label: GF.t('ranks'), col: '#b08bff', icon: 'ranks' },
    { id: 'DAILY', label: GF.t('dailyShort'), col: dailyReady() ? '#5ad24a' : '#5a6478', icon: 'daily', pulse: dailyReady() },
    { id: 'HELP',  label: '?',           col: '#9aa6c0', icon: 'help' },
  ];
  for (var i = 0; i < n; i++) {
    var x = p + i * (pw + gap);
    var d = defs[i];
    var pulse = d.pulse ? (0.5 + 0.5 * Math.sin(nowMs() / 300)) : 0;
    GF.rr(ctx, x, y, pw, h, Math.round(10 * S));
    ctx.fillStyle = 'rgba(18,24,40,0.9)'; ctx.fill();
    ctx.strokeStyle = hexA(d.col, 0.4 + pulse * 0.5); ctx.lineWidth = 1.5; ctx.stroke();
    // icon
    var iconR = h * 0.26;
    var ix = x + pw * 0.28, iy = y + h / 2;
    drawPillIcon(ctx, d.icon, ix, iy, iconR, d.col);
    // label
    ctx.fillStyle = d.col === '#5a6478' ? '#8893a8' : shade(d.col, 0.2);
    ctx.font = 'bold ' + Math.round(GF.clamp(11 * S, 8, 14)) + 'px system-ui, sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    var lab = d.label;
    // small badge: vault shows sets done
    ctx.fillText(lab, x + pw * 0.46, y + h / 2 + 1);
    hit.pills.push({ x: x, y: y, w: pw, h: h, id: d.id });
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function drawPillIcon(ctx, kind, cx, cy, r, col) {
  ctx.save();
  ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = Math.max(1.5, r * 0.16);
  if (kind === 'vault') {
    // gem cluster
    drawMiniGem(ctx, cx, cy - r * 0.1, r * 0.7, col);
    drawMiniGem(ctx, cx - r * 0.7, cy + r * 0.5, r * 0.45, shade(col, 0.2));
    drawMiniGem(ctx, cx + r * 0.7, cy + r * 0.5, r * 0.45, shade(col, -0.1));
  } else if (kind === 'ranks') {
    // podium bars
    ctx.fillRect(cx - r, cy + r * 0.1, r * 0.6, r * 0.7);
    ctx.fillRect(cx - r * 0.3, cy - r * 0.5, r * 0.6, r * 1.3);
    ctx.fillRect(cx + r * 0.4, cy - r * 0.1, r * 0.6, r * 0.9);
  } else if (kind === 'daily') {
    // gift box
    ctx.beginPath(); ctx.rect(cx - r, cy - r * 0.3, r * 2, r * 1.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy - r * 0.3); ctx.lineTo(cx, cy + r * 0.9); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - r, cy - r * 0.3); ctx.quadraticCurveTo(cx, cy - r * 1.1, cx, cy - r * 0.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + r, cy - r * 0.3); ctx.quadraticCurveTo(cx, cy - r * 1.1, cx, cy - r * 0.3); ctx.stroke();
  } else if (kind === 'help') {
    ctx.font = 'bold ' + (r * 2) + 'px system-ui, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', cx, cy + r * 0.05);
  }
  ctx.restore();
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

// ── THE STAGE — idle gem display, the spinning reel, or the reveal card ──────
function drawStage(ctx, dt) {
  if (reel) { drawReel(ctx, dt); return; }
  if (reveal) { drawReveal(ctx, dt); return; }
  drawIdleStage(ctx, dt);
}

// idle: a glowing "case" with the set's hero gem floating, inviting a tap
function drawIdleStage(ctx, dt) {
  var s = SETS[curSet], S = GF.S;
  var cx = GF.cx, cy = L.stageMidY;
  var tt = nowMs() / 1000;
  // soft pedestal glow
  var g = ctx.createRadialGradient(cx, cy + L.stageH * 0.18, 6, cx, cy + L.stageH * 0.18, L.stageH * 0.7);
  g.addColorStop(0, hexA(s.col, 0.22)); g.addColorStop(1, hexA(s.col, 0));
  ctx.fillStyle = g; ctx.fillRect(0, L.stageTop, GF.W, L.stageH);
  // the case (a faceted chest/crate drawn as a rounded box with gem facets)
  var bob = Math.sin(tt * 1.5) * 5 * S;
  var caseR = Math.min(L.stageH * 0.30, GF.W * 0.20);
  drawCaseIcon(ctx, cx, cy - L.stageH * 0.06 + bob, caseR, s);
  // set name + completion under the case
  var done = setOwnedCount(curSet), tot = s.gems.length;
  ctx.fillStyle = '#e8eefc'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + Math.round(GF.clamp(22 * S, 16, 30)) + 'px system-ui, sans-serif';
  ctx.fillText(GF.lang === 'ru' ? s.ru : s.en, cx, cy + L.stageH * 0.26);
  ctx.fillStyle = hexA(s.col, 0.9);
  ctx.font = '600 ' + Math.round(GF.clamp(13 * S, 10, 17)) + 'px system-ui, sans-serif';
  ctx.fillText(done + ' / ' + tot + '  ' + GF.t('collection'), cx, cy + L.stageH * 0.26 + Math.round(22 * S));
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function drawCaseIcon(ctx, cx, cy, r, s) {
  // crate body
  var w = r * 1.5, h = r * 1.15;
  ctx.save();
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(cx, cy + h * 0.95, w * 0.8, h * 0.22, 0, 0, Math.PI * 2); ctx.fill();
  // body gradient
  var g = ctx.createLinearGradient(cx, cy - h, cx, cy + h);
  g.addColorStop(0, shade(s.col, 0.25)); g.addColorStop(0.5, s.col); g.addColorStop(1, s.col2);
  GF.rr(ctx, cx - w, cy - h, w * 2, h * 2, r * 0.22);
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = shade(s.col2, -0.2); ctx.lineWidth = Math.max(2, r * 0.06); ctx.stroke();
  // lid line
  ctx.strokeStyle = hexA('#000', 0.25); ctx.lineWidth = Math.max(1.5, r * 0.04);
  ctx.beginPath(); ctx.moveTo(cx - w, cy - h * 0.32); ctx.lineTo(cx + w, cy - h * 0.32); ctx.stroke();
  // metal bands
  ctx.fillStyle = hexA('#1a1f30', 0.5);
  ctx.fillRect(cx - w * 0.5, cy - h, w * 0.16, h * 2);
  ctx.fillRect(cx + w * 0.34, cy - h, w * 0.16, h * 2);
  // central gem inlay (the set's rarest gem silhouette/lit)
  var hero = s.gems[s.gems.length - 1];
  var lit = owned[hero.id] > 0;
  drawGem(ctx, cx, cy + h * 0.05, r * 0.5, hero, hero.rarity, 0.7, nowMs() / 1000);
  // sparkle accents on the crate
  ctx.fillStyle = hexA('#fff', 0.5 + 0.3 * Math.sin(nowMs() / 250));
  star(ctx, cx - w * 0.62, cy - h * 0.55, r * 0.1);
  star(ctx, cx + w * 0.66, cy + h * 0.45, r * 0.08);
  ctx.restore();
}
function star(ctx, x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y - s); ctx.lineTo(x + s * 0.3, y - s * 0.3); ctx.lineTo(x + s, y);
  ctx.lineTo(x + s * 0.3, y + s * 0.3); ctx.lineTo(x, y + s); ctx.lineTo(x - s * 0.3, y + s * 0.3);
  ctx.lineTo(x - s, y); ctx.lineTo(x - s * 0.3, y - s * 0.3); ctx.closePath(); ctx.fill();
}

// ── THE REEL (the catch) ─────────────────────────────────────────────────────
function drawReel(ctx, dt) {
  var W = GF.W, S = GF.S;
  var rY = L.reelY, rH = L.reelH;
  var cardW = L.cardW, gap = L.cardGap;
  var stride = cardW + gap;
  reel.cardW = stride;
  // set the target offset so WIN_INDEX lands centered under the marker.
  // we want: pos_at_end such that center of WIN_INDEX card == markerX.
  // card i center (in strip space) = i*stride + cardW/2. Strip is drawn with
  // left edge at (markerX - pos). So screen center of card i = markerX - pos + i*stride + cardW/2.
  // For that to == markerX: pos = i*stride + cardW/2.  Add a small random jitter
  // (within +/- 30% of a card) so it doesn't always dead-center → more organic.
  if (reel.target === 0) {
    var jitter = (Math.random() - 0.5) * cardW * 0.5;
    reel.target = WIN_INDEX * stride + cardW / 2 + jitter;
  }
  // reel frame
  GF.rr(ctx, L.pad, rY - 10 * S, W - L.pad * 2, rH + 20 * S, 14 * S);
  ctx.fillStyle = 'rgba(6,9,18,0.85)'; ctx.fill();
  ctx.strokeStyle = 'rgba(120,140,180,0.25)'; ctx.lineWidth = 1.5; ctx.stroke();
  // clip to the reel window
  ctx.save();
  GF.rr(ctx, L.pad + 2, rY, W - L.pad * 2 - 4, rH, 10 * S);
  ctx.clip();
  // draw cards
  var leftEdge = L.markerX - reel.pos;
  var first = Math.max(0, Math.floor((reel.pos - L.markerX) / stride) - 1);
  var last = Math.min(reel.cards.length - 1, first + Math.ceil(W / stride) + 3);
  for (var i = first; i <= last; i++) {
    var x = leftEdge + i * stride;
    if (x + cardW < 0 || x > W) continue;
    drawReelCard(ctx, reel.cards[i], x, rY + 4 * S, cardW, rH - 8 * S);
  }
  ctx.restore();
  // fade edges
  var fg = ctx.createLinearGradient(L.pad, 0, L.pad + 60 * S, 0);
  fg.addColorStop(0, 'rgba(8,11,20,1)'); fg.addColorStop(1, 'rgba(8,11,20,0)');
  ctx.fillStyle = fg; ctx.fillRect(L.pad + 2, rY, 60 * S, rH);
  var fg2 = ctx.createLinearGradient(W - L.pad - 60 * S, 0, W - L.pad, 0);
  fg2.addColorStop(0, 'rgba(8,11,20,0)'); fg2.addColorStop(1, 'rgba(8,11,20,1)');
  ctx.fillStyle = fg2; ctx.fillRect(W - L.pad - 60 * S, rY, 60 * S, rH);
  // center marker (the fixed pointer)
  drawMarker(ctx, L.markerX, rY, rH);
  // spinning label
  ctx.fillStyle = '#9fb0cc'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + Math.round(GF.clamp(15 * S, 11, 20)) + 'px system-ui, sans-serif';
  ctx.fillText(GF.t('spinning'), W / 2, L.openY + L.openH / 2);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function drawReelCard(ctx, gem, x, y, w, h) {
  var rar = RARITY[gem.rarity];
  // card bg tinted by rarity
  GF.rr(ctx, x + 2, y, w - 4, h, 8 * GF.S);
  var g = ctx.createLinearGradient(x, y, x, y + h);
  g.addColorStop(0, shade(rar.col, -0.55)); g.addColorStop(1, shade(rar.col, -0.75));
  ctx.fillStyle = g; ctx.fill();
  // rarity strip at bottom
  ctx.fillStyle = rar.col; GF.rr(ctx, x + 2, y + h - 6 * GF.S, w - 4, 5 * GF.S, 2); ctx.fill();
  ctx.strokeStyle = hexA(rar.col, 0.55); ctx.lineWidth = 1.4;
  GF.rr(ctx, x + 2, y, w - 4, h, 8 * GF.S); ctx.stroke();
  // the gem
  drawGem(ctx, x + w / 2, y + h * 0.44, Math.min(w, h) * 0.30, gem, gem.rarity, 0.5, nowMs() / 1000);
}

function drawMarker(ctx, mx, y, h) {
  var S = GF.S;
  ctx.fillStyle = '#ffd24a';
  // top triangle
  ctx.beginPath(); ctx.moveTo(mx, y + 12 * S); ctx.lineTo(mx - 9 * S, y - 2 * S); ctx.lineTo(mx + 9 * S, y - 2 * S); ctx.closePath(); ctx.fill();
  // bottom triangle
  ctx.beginPath(); ctx.moveTo(mx, y + h - 12 * S); ctx.lineTo(mx - 9 * S, y + h + 2 * S); ctx.lineTo(mx + 9 * S, y + h + 2 * S); ctx.closePath(); ctx.fill();
  // center line
  ctx.strokeStyle = hexA('#ffd24a', 0.85); ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(mx, y + 10 * S); ctx.lineTo(mx, y + h - 10 * S); ctx.stroke();
}

// ── THE REVEAL (full-card flash + rise/scale-in + KEEP/SELL) ─────────────────
function drawReveal(ctx, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  var rar = RARITY[reveal.rarity];
  var t = reveal.t;
  // rarity-colored full flash (decays fast)
  var flash = GF.clamp(0.55 - t * 1.4, 0, 0.55);
  if (flash > 0) { ctx.fillStyle = hexA(rar.glow, flash); ctx.fillRect(0, L.stageTop - 20, W, L.stageH + 200); }
  // radial rarity backlight behind the gem
  var cx = GF.cx, cy = L.stageMidY - L.stageH * 0.04;
  var rg = ctx.createRadialGradient(cx, cy, 6, cx, cy, L.stageH * 0.7);
  rg.addColorStop(0, hexA(rar.glow, 0.30)); rg.addColorStop(1, hexA(rar.glow, 0));
  ctx.fillStyle = rg; ctx.fillRect(0, L.stageTop, W, L.stageH);
  // gem rises + scales in
  var inT = GF.clamp(t / 0.5, 0, 1);
  var scl = easeOutCubic(inT);
  var rise = (1 - scl) * 30 * S;
  var rad = Math.min(L.stageH * 0.26, W * 0.22) * (0.6 + 0.4 * scl);
  var rot = nowMs() / 1000;
  ctx.save();
  ctx.globalAlpha = inT;
  drawGem(ctx, cx, cy - rise, rad, reveal.gem, reveal.rarity, 1.0, rot);
  ctx.restore();
  // NEW! burst ring
  if (newBurst > 0 && reveal.wasNew) {
    var br = rad * (1.3 + (1 - newBurst) * 1.2);
    ctx.globalAlpha = Math.max(0, newBurst);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3 * S;
    ctx.beginPath(); ctx.arc(cx, cy - rise, br, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // name + rarity label
  if (inT > 0.6) {
    ctx.globalAlpha = GF.clamp((inT - 0.6) / 0.4, 0, 1);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + Math.round(GF.clamp(24 * S, 17, 33)) + 'px system-ui, sans-serif';
    ctx.fillText(GF.lang === 'ru' ? reveal.gem.ru : reveal.gem.en, cx, cy + rad + 30 * S);
    // rarity pill
    var rn = rarityName(reveal.rarity);
    ctx.font = 'bold ' + Math.round(GF.clamp(13 * S, 10, 17)) + 'px system-ui, sans-serif';
    var pw = ctx.measureText(rn).width + 24 * S, ph = Math.round(GF.clamp(24 * S, 18, 32));
    var px = cx - pw / 2, py = cy + rad + 40 * S;
    GF.rr(ctx, px, py, pw, ph, ph / 2); ctx.fillStyle = hexA(rar.col, 0.9); ctx.fill();
    ctx.fillStyle = reveal.rarity <= 1 ? '#1a2030' : '#fff'; ctx.textBaseline = 'middle';
    ctx.fillText(rn.toUpperCase(), cx, py + ph / 2 + 1);
    ctx.textBaseline = 'alphabetic';
    // owned dupe note
    if (!reveal.wasNew && owned[reveal.gem.id] > 0) {
      ctx.fillStyle = '#8a96ac'; ctx.font = '600 ' + Math.round(GF.clamp(12 * S, 9, 15)) + 'px system-ui, sans-serif';
      ctx.fillText(GF.t('dupe') + '  ×' + owned[reveal.gem.id], cx, py + ph + 18 * S);
    } else if (reveal.wasNew) {
      ctx.fillStyle = rar.glow; ctx.font = 'bold ' + Math.round(GF.clamp(13 * S, 10, 16)) + 'px system-ui, sans-serif';
      ctx.fillText(GF.t('neww'), cx, py + ph + 18 * S);
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }
  // KEEP / SELL buttons (occupy the OPEN button band + a row above the case strip)
  drawDecisionButtons(ctx);
}

function drawDecisionButtons(ctx) {
  var W = GF.W, S = GF.S;
  var gap = Math.round(12 * S);
  var bw = (L.openW - gap) / 2;
  var bh = L.openH;
  var y = L.openY;
  var x0 = (W - L.openW) / 2;
  var sval = RARITY[reveal.rarity].sval;
  // KEEP (left, green)
  drawBtn(ctx, x0, y, bw, bh, GF.t('keep'), '#2ee07a', '#23a657', '#06240f');
  // SELL (right, gold) with +N
  drawBtn(ctx, x0 + bw + gap, y, bw, bh, GF.t('sell') + '  +' + sval, '#ffd166', '#f0a93a', '#2a1c06');
  hit.keep = { x: x0, y: y, w: bw, h: bh };
  hit.sell = { x: x0 + bw + gap, y: y, w: bw, h: bh };
  // SELL 2x via ad — a slim button below, in the case-strip band, only if a sell makes sense
  var ay = L.caseY + Math.round(8 * S);
  var aw = GF.clamp(260 * S, 170, 380), ah = Math.round(GF.clamp(34 * S, 26, 44));
  var ax = (W - aw) / 2;
  GF.rr(ctx, ax, ay, aw, ah, ah / 2);
  ctx.fillStyle = 'rgba(40,30,12,0.92)'; ctx.fill();
  ctx.strokeStyle = hexA('#ffd166', 0.55); ctx.lineWidth = 1.4; ctx.stroke();
  ctx.fillStyle = '#ffd98a'; ctx.font = 'bold ' + Math.round(GF.clamp(13 * S, 10, 16)) + 'px system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('▶ ' + GF.t('ad2x') + ' (+' + (sval * 2) + ')', W / 2, ay + ah / 2);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  hit.sell2x = { x: ax, y: ay, w: aw, h: ah };
}

function drawBtn(ctx, x, y, w, h, label, c1, c2, txtCol) {
  var g = ctx.createLinearGradient(x, y, x, y + h);
  g.addColorStop(0, c1); g.addColorStop(1, c2);
  ctx.save();
  ctx.shadowColor = hexA(c1, 0.5); ctx.shadowBlur = 14 * GF.S;
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fillStyle = g; ctx.fill();
  ctx.restore();
  ctx.fillStyle = txtCol || '#fff'; ctx.font = 'bold ' + Math.round(GF.clamp(17 * GF.S, 13, 23)) + 'px system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

// ── OPEN BUTTON (the hero) ───────────────────────────────────────────────────
function drawOpenButton(ctx) {
  if (reel || reveal) return;   // stage owns this band during spin/reveal
  var s = SETS[curSet], S = GF.S;
  var x = L.openX, y = L.openY, w = L.openW, h = L.openH;
  var canAfford = coins >= s.cost;
  var pulse = canAfford ? (0.5 + 0.5 * Math.sin(nowMs() / 380)) : 0;
  var pw = w * (1 + 0.02 * pulse), ph = h * (1 + 0.02 * pulse);
  var px = GF.cx - pw / 2, py = y + h / 2 - ph / 2;
  var g = ctx.createLinearGradient(px, py, px, py + ph);
  if (canAfford) { g.addColorStop(0, shade(s.col, 0.3)); g.addColorStop(1, s.col2); }
  else { g.addColorStop(0, '#3a4256'); g.addColorStop(1, '#2a3142'); }
  ctx.save();
  if (canAfford) { ctx.shadowColor = hexA(s.col, 0.5 + pulse * 0.3); ctx.shadowBlur = (20 + 12 * pulse) * S; }
  GF.rr(ctx, px, py, pw, ph, ph / 2); ctx.fillStyle = g; ctx.fill();
  ctx.restore();
  // label: OPEN + cost (coin)
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + Math.round(GF.clamp(24 * S, 17, 32)) + 'px system-ui, sans-serif';
  if (canAfford) {
    ctx.fillText(GF.t('open'), GF.cx, y + h * 0.36);
    // cost row
    var cr = h * 0.16;
    ctx.font = 'bold ' + Math.round(GF.clamp(15 * S, 11, 20)) + 'px system-ui, sans-serif';
    var costTxt = fmt(s.cost);
    var tw = ctx.measureText(costTxt).width;
    var startX = GF.cx - (cr + 6 * S + tw) / 2;
    drawCoin(ctx, startX + cr, y + h * 0.70, cr);
    ctx.fillStyle = '#fff7d6'; ctx.textAlign = 'left';
    ctx.fillText(costTxt, startX + cr * 2 + 6 * S, y + h * 0.70 + 1);
    ctx.textAlign = 'center';
  } else {
    ctx.fillStyle = '#aab4c8';
    ctx.font = 'bold ' + Math.round(GF.clamp(18 * S, 13, 24)) + 'px system-ui, sans-serif';
    ctx.fillText(GF.t('open'), GF.cx, y + h * 0.38);
    ctx.font = '600 ' + Math.round(GF.clamp(12 * S, 9, 16)) + 'px system-ui, sans-serif';
    ctx.fillStyle = '#ff8a8a';
    ctx.fillText('▶ ' + GF.t('adFree'), GF.cx, y + h * 0.70);
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  hit.open = { x: x, y: y, w: w, h: h, afford: canAfford };
}

// ── CASE SELECTOR STRIP ──────────────────────────────────────────────────────
function drawCaseStrip(ctx) {
  if (reveal) return;  // the 2x-ad button uses this band during reveal
  var W = GF.W, S = GF.S, p = L.pad;
  var y = L.caseY, h = L.caseH;
  var n = SETS.length;
  var gap = Math.round(8 * S);
  // horizontal cards; if too many to fit, shrink (we only have 5 so they fit)
  var cw = (W - p * 2 - gap * (n - 1)) / n;
  hit.cases = [];
  for (var i = 0; i < n; i++) {
    var x = p + i * (cw + gap);
    var s = SETS[i];
    var unlocked = setUnlocked(i);
    var sel = i === curSet;
    var complete = setIsComplete(i);
    // card bg
    GF.rr(ctx, x, y, cw, h, Math.round(12 * S));
    var g = ctx.createLinearGradient(x, y, x, y + h);
    if (!unlocked) { g.addColorStop(0, '#161b2a'); g.addColorStop(1, '#10131f'); }
    else { g.addColorStop(0, shade(s.col2, -0.3)); g.addColorStop(1, '#10131f'); }
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = sel ? s.col : (unlocked ? hexA(s.col, 0.4) : 'rgba(80,90,110,0.3)');
    ctx.lineWidth = sel ? 2.5 : 1.4; ctx.stroke();
    // mini case icon
    var iconY = y + h * 0.30;
    if (unlocked) {
      drawMiniCase(ctx, x + cw / 2, iconY, Math.min(cw, h) * 0.20, s);
    } else {
      // lock glyph
      drawLock(ctx, x + cw / 2, iconY, Math.min(cw, h) * 0.16);
    }
    // name
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = unlocked ? '#dfe6f4' : '#6a7488';
    ctx.font = 'bold ' + Math.round(GF.clamp(12 * S, 9, 15)) + 'px system-ui, sans-serif';
    ctx.fillText(GF.lang === 'ru' ? s.ru : s.en, x + cw / 2, y + h * 0.60);
    // sub: cost (if unlocked) or unlock requirement
    ctx.font = '600 ' + Math.round(GF.clamp(10 * S, 8, 13)) + 'px system-ui, sans-serif';
    if (unlocked) {
      var prog = setOwnedCount(i) + '/' + s.gems.length;
      ctx.fillStyle = complete ? '#5ad24a' : hexA('#ffc23c', 0.9);
      // cost with tiny coin
      var costS = fmt(s.cost);
      ctx.fillText(costS, x + cw / 2, y + h * 0.76);
      ctx.fillStyle = complete ? '#5ad24a' : '#9aa6bd';
      ctx.fillText(prog, x + cw / 2, y + h * 0.90);
    } else {
      // compact unlock badge: a small gem + the value threshold (no long label,
      // which would overflow / collide on a ~70px-wide card in both langs).
      var ut = fmt(s.unlock);
      ctx.font = '600 ' + Math.round(GF.clamp(11 * S, 8, 14)) + 'px system-ui, sans-serif';
      var utw = ctx.measureText(ut).width;
      var gemR = 6 * S;
      var startUX = x + cw / 2 - (gemR + 4 * S + utw) / 2;
      drawMiniGem(ctx, startUX + gemR, y + h * 0.82, gemR, '#7ec8ff');
      ctx.fillStyle = hexA('#9ec8ff', 0.95); ctx.textAlign = 'left';
      ctx.fillText(ut, startUX + gemR * 2 + 4 * S, y + h * 0.82 + 1);
      ctx.textAlign = 'center';
    }
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    hit.cases.push({ x: x, y: y, w: cw, h: h, idx: i, unlocked: unlocked });
  }
}

function drawMiniCase(ctx, cx, cy, r, s) {
  var w = r * 1.4, h = r;
  var g = ctx.createLinearGradient(cx, cy - h, cx, cy + h);
  g.addColorStop(0, shade(s.col, 0.2)); g.addColorStop(1, s.col2);
  GF.rr(ctx, cx - w, cy - h, w * 2, h * 2, r * 0.25); ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = shade(s.col2, -0.2); ctx.lineWidth = Math.max(1, r * 0.08); ctx.stroke();
  ctx.strokeStyle = hexA('#000', 0.25); ctx.lineWidth = Math.max(1, r * 0.05);
  ctx.beginPath(); ctx.moveTo(cx - w, cy - h * 0.3); ctx.lineTo(cx + w, cy - h * 0.3); ctx.stroke();
  // gem dot
  drawMiniGem(ctx, cx, cy + h * 0.05, r * 0.4, shade(s.col, 0.4));
}

function drawLock(ctx, cx, cy, r) {
  ctx.strokeStyle = '#7a86a0'; ctx.fillStyle = '#7a86a0'; ctx.lineWidth = Math.max(1.5, r * 0.18);
  GF.rr(ctx, cx - r, cy - r * 0.2, r * 2, r * 1.5, r * 0.25); ctx.fillStyle = 'rgba(120,134,160,0.7)'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy - r * 0.2, r * 0.7, Math.PI, 0); ctx.stroke();
  ctx.fillStyle = '#10131f'; ctx.beginPath(); ctx.arc(cx, cy + r * 0.5, r * 0.22, 0, Math.PI * 2); ctx.fill();
}

// ── BOOT WELCOME-BACK BANNER ─────────────────────────────────────────────────
function drawBootBanner(ctx) {
  var parts = [];
  if (dailyClaim > 0) parts.push(GF.t('streakDay') + ' ' + streakNow + ' ' + GF.t('streakBonus') + ': +' + dailyClaim);
  if (idleClaim > 0) parts.push('+' + idleClaim + ' ' + GF.t('awayCoins'));
  if (!parts.length) return;
  var W = GF.W, S = GF.S;
  var a = GF.clamp(bootBannerT / 0.5, 0, 1);
  var bw = GF.clamp(330 * S, 220, 420), bh = GF.clamp(60 * S, 46, 78);
  var bx = (W - bw) / 2, by = L.stageTop + 6 * S;
  ctx.globalAlpha = a;
  GF.rr(ctx, bx, by, bw, bh, 14 * S);
  var g = ctx.createLinearGradient(bx, by, bx, by + bh);
  g.addColorStop(0, 'rgba(46,160,67,0.96)'); g.addColorStop(1, 'rgba(30,120,50,0.96)');
  ctx.fillStyle = g; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + Math.round(GF.clamp(14 * S, 11, 18)) + 'px system-ui, sans-serif';
  ctx.fillText(GF.t('welcomeBack') + '!', W / 2, by + bh * 0.34);
  ctx.font = '600 ' + Math.round(GF.clamp(12 * S, 9, 15)) + 'px system-ui, sans-serif';
  ctx.fillText(parts.join('   ·   '), W / 2, by + bh * 0.70);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

// ── SET-COMPLETE CELEBRATION ─────────────────────────────────────────────────
function drawSetComplete(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  var s = SETS[setCompleteFlash.si];
  var t = setCompleteFlash.t;
  var a = GF.clamp(t < 0.3 ? t / 0.3 : (t > 2.7 ? (3.2 - t) / 0.5 : 1), 0, 1);
  ctx.globalAlpha = a * 0.85;
  ctx.fillStyle = 'rgba(8,11,20,0.7)'; ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = a;
  ctx.fillStyle = s.col; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + Math.round(GF.clamp(30 * S, 20, 42)) + 'px system-ui, sans-serif';
  ctx.fillText(GF.t('complete'), GF.cx, H * 0.4);
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + Math.round(GF.clamp(18 * S, 13, 24)) + 'px system-ui, sans-serif';
  ctx.fillText((GF.lang === 'ru' ? s.ru : s.en), GF.cx, H * 0.4 + 36 * S);
  ctx.fillStyle = '#ffd24a'; ctx.font = 'bold ' + Math.round(GF.clamp(16 * S, 12, 22)) + 'px system-ui, sans-serif';
  ctx.fillText('+' + setCompleteFlash.reward + ' ' + GF.t('coins'), GF.cx, H * 0.4 + 64 * S);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

// ════════════════════════════════════════════════════════════════════════════
// OVERLAYS — VAULT (collection grids), RANKS (leaderboard), HELP
// All reachable via pills; all close via a top-right ✕ (Yandex 1.15).
// ════════════════════════════════════════════════════════════════════════════
function drawOverlayFrame(ctx, title, accent) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = '#070a13'; ctx.fillRect(0, 0, W, H);
  // header
  ctx.fillStyle = accent || '#7ec8ff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + Math.round(GF.clamp(22 * S, 16, 30)) + 'px system-ui, sans-serif';
  ctx.fillText(title, L.pad + 4 * S, GF.clamp(34 * S, 24, 50));
  // close ✕
  var cs = Math.round(GF.clamp(40 * S, 30, 54));
  var cxx = W - L.pad - cs, cyy = GF.clamp(34 * S, 24, 50) - cs / 2;
  GF.rr(ctx, cxx, cyy, cs, cs, cs / 2); ctx.fillStyle = 'rgba(40,46,64,0.9)'; ctx.fill();
  ctx.strokeStyle = 'rgba(150,160,180,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.strokeStyle = '#cfd6e4'; ctx.lineWidth = 2.4;
  var m = cs * 0.28;
  ctx.beginPath(); ctx.moveTo(cxx + m, cyy + m); ctx.lineTo(cxx + cs - m, cyy + cs - m); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cxx + cs - m, cyy + m); ctx.lineTo(cxx + m, cyy + cs - m); ctx.stroke();
  hit.close = { x: cxx, y: cyy, w: cs, h: cs };
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function drawVault(ctx, dt) {
  var W = GF.W, H = GF.H, S = GF.S;
  drawOverlayFrame(ctx, GF.t('vault'), '#7ec8ff');
  // set tabs
  var tabY = GF.clamp(60 * S, 46, 80);
  var tabH = Math.round(GF.clamp(36 * S, 28, 48));
  var n = SETS.length, gap = Math.round(6 * S);
  var tw = (W - L.pad * 2 - gap * (n - 1)) / n;
  hit.vtabs = [];
  for (var i = 0; i < n; i++) {
    var x = L.pad + i * (tw + gap);
    var s = SETS[i];
    var unlocked = setUnlocked(i);
    var sel = vaultTab === i;
    GF.rr(ctx, x, tabY, tw, tabH, 8 * S);
    ctx.fillStyle = sel ? hexA(s.col, 0.28) : 'rgba(20,26,42,0.9)'; ctx.fill();
    ctx.strokeStyle = sel ? s.col : 'rgba(80,90,110,0.3)'; ctx.lineWidth = sel ? 2 : 1; ctx.stroke();
    ctx.fillStyle = unlocked ? (sel ? shade(s.col, 0.3) : '#bcc6da') : '#6a7488';
    ctx.font = 'bold ' + Math.round(GF.clamp(11 * S, 8, 14)) + 'px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.lang === 'ru' ? s.ru : s.en, x + tw / 2, tabY + tabH / 2 + 1);
    hit.vtabs.push({ x: x, y: tabY, w: tw, h: tabH, idx: i });
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  // gem grid for the selected set
  var s2 = SETS[vaultTab];
  var gridTop = tabY + tabH + Math.round(18 * S);
  var cols = 3;
  var cellGap = Math.round(12 * S);
  var cellW = (W - L.pad * 2 - cellGap * (cols - 1)) / cols;
  var cellH = cellW * 1.18;
  var rows = Math.ceil(s2.gems.length / cols);
  for (var gi = 0; gi < s2.gems.length; gi++) {
    var gx = L.pad + (gi % cols) * (cellW + cellGap);
    var gy = gridTop + Math.floor(gi / cols) * (cellH + cellGap);
    drawVaultCell(ctx, s2.gems[gi], gx, gy, cellW, cellH, dt);
  }
  // footer: set value + completion reward state
  var fy = gridTop + rows * (cellH + cellGap) + Math.round(8 * S);
  var done = setOwnedCount(vaultTab), tot = s2.gems.length;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#aeb8cc'; ctx.font = '600 ' + Math.round(GF.clamp(13 * S, 10, 17)) + 'px system-ui, sans-serif';
  var line = done + ' / ' + tot + ' ' + GF.t('owned');
  if (setIsComplete(vaultTab)) line += '   ·   ' + GF.t('complete_b');
  if (fy < H - 30 * S) ctx.fillText(line, GF.cx, fy + 10 * S);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function drawVaultCell(ctx, gem, x, y, w, h, dt) {
  var ownedN = owned[gem.id] || 0;
  var rar = RARITY[gem.rarity];
  GF.rr(ctx, x, y, w, h, 10 * GF.S);
  if (ownedN > 0) {
    var g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, shade(rar.col, -0.55)); g.addColorStop(1, shade(rar.col, -0.78));
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = hexA(rar.col, 0.6); ctx.lineWidth = 1.5; ctx.stroke();
    drawGem(ctx, x + w / 2, y + h * 0.40, Math.min(w, h) * 0.27, gem, gem.rarity, 0.6, nowMs() / 1000);
    // name
    ctx.fillStyle = '#e6ecf8'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + Math.round(GF.clamp(11 * GF.S, 8, 14)) + 'px system-ui, sans-serif';
    ctx.fillText(GF.lang === 'ru' ? gem.ru : gem.en, x + w / 2, y + h * 0.74);
    // rarity + count
    ctx.fillStyle = rar.col; ctx.font = '600 ' + Math.round(GF.clamp(9 * GF.S, 7, 12)) + 'px system-ui, sans-serif';
    ctx.fillText(rarityName(gem.rarity), x + w / 2, y + h * 0.86);
    if (ownedN > 1) {
      // count badge
      ctx.fillStyle = hexA('#000', 0.5); ctx.beginPath(); ctx.arc(x + w - 14 * GF.S, y + 14 * GF.S, 11 * GF.S, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold ' + Math.round(GF.clamp(10 * GF.S, 8, 13)) + 'px system-ui, sans-serif';
      ctx.fillText('×' + ownedN, x + w - 14 * GF.S, y + 15 * GF.S);
    }
  } else {
    // dark silhouette + ?
    ctx.fillStyle = 'rgba(16,20,32,0.92)'; ctx.fill();
    ctx.strokeStyle = 'rgba(60,68,88,0.5)'; ctx.lineWidth = 1.2; ctx.stroke();
    // silhouette gem (flat dark)
    var pts = gemPath(gem.shape, x + w / 2, y + h * 0.40, Math.min(w, h) * 0.27);
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
    for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath(); ctx.fillStyle = 'rgba(40,46,64,0.9)'; ctx.fill();
    ctx.fillStyle = '#5a6478';
    ctx.font = 'bold ' + Math.round(GF.clamp(22 * GF.S, 16, 30)) + 'px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', x + w / 2, y + h * 0.40 + 1);
    // rarity hint only
    ctx.fillStyle = hexA(rar.col, 0.5); ctx.font = '600 ' + Math.round(GF.clamp(9 * GF.S, 7, 12)) + 'px system-ui, sans-serif';
    ctx.fillText(rarityName(gem.rarity), x + w / 2, y + h * 0.86);
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

// ── RANKS (leaderboard by collection value; GP if present else local) ────────
var ranksCache = null, ranksFetched = false;
function drawRanks(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  drawOverlayFrame(ctx, GF.t('ranks'), '#b08bff');
  var myVal = collectionValue();
  var rows = buildRanks(myVal);
  var top = GF.clamp(70 * S, 54, 96);
  var rowH = Math.round(GF.clamp(48 * S, 38, 62));
  ctx.textBaseline = 'middle';
  for (var i = 0; i < rows.length && top + i * (rowH + 6 * S) < H - 30 * S; i++) {
    var r = rows[i];
    var y = top + i * (rowH + 6 * S);
    GF.rr(ctx, L.pad, y, W - L.pad * 2, rowH, 10 * S);
    ctx.fillStyle = r.me ? 'rgba(176,139,255,0.20)' : 'rgba(20,26,42,0.9)'; ctx.fill();
    if (r.me) { ctx.strokeStyle = '#b08bff'; ctx.lineWidth = 2; ctx.stroke(); }
    // rank number
    ctx.fillStyle = i === 0 ? '#ffd24a' : (i === 1 ? '#cdd6e2' : (i === 2 ? '#e8985e' : '#8893a8'));
    ctx.font = 'bold ' + Math.round(GF.clamp(18 * S, 13, 24)) + 'px system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('#' + (i + 1), L.pad + 14 * S, y + rowH / 2 + 1);
    // name
    ctx.fillStyle = r.me ? '#e6dcff' : '#cdd6e6';
    ctx.font = (r.me ? 'bold ' : '600 ') + Math.round(GF.clamp(14 * S, 11, 18)) + 'px system-ui, sans-serif';
    ctx.fillText(r.me ? GF.t('you') : r.name, L.pad + 58 * S, y + rowH / 2 + 1);
    // value
    ctx.textAlign = 'right';
    ctx.fillStyle = '#7ec8ff';
    ctx.font = 'bold ' + Math.round(GF.clamp(15 * S, 11, 20)) + 'px system-ui, sans-serif';
    ctx.fillText(fmt(r.val), W - L.pad - 16 * S, y + rowH / 2 + 1);
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function buildRanks(myVal) {
  // synthetic ladder around the player's value so the board always reads well;
  // tries GP for real entries first (best-effort, cached).
  if (!ranksFetched && GF.gp && GF.gp.isPresent) {
    ranksFetched = true;
    try { GF.gp.leaderboard.publish('score', myVal); } catch (e) {}
    GF.gp.leaderboard.fetch('score', 12).then(function (list) {
      if (list && list.length) ranksCache = list;
    });
  }
  if (ranksCache && ranksCache.length) {
    var rows = ranksCache.map(function (p) {
      return { name: (p.name || 'Player'), val: +(p.score || 0), me: false };
    });
    rows.push({ name: GF.t('you'), val: myVal, me: true });
    rows.sort(function (a, b) { return b.val - a.val; });
    return rows.slice(0, 10);
  }
  // local synthetic board
  var names = ['GemHunter', 'Sparkle', 'VaultKing', 'Prism', 'Faceted', 'Lumino', 'Carat', 'Geode', 'Opaline', 'Brilliant'];
  var seed = (meta && meta.bestStreak || 1) * 97 + 13;
  function rnd() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }
  var rows = [];
  var hi = Math.max(myVal * 1.8, 600);
  for (var i = 0; i < 9; i++) {
    rows.push({ name: names[i], val: Math.round(hi * (0.95 - i * 0.09) * (0.85 + rnd() * 0.3)), me: false });
  }
  rows.push({ name: GF.t('you'), val: myVal, me: true });
  rows.sort(function (a, b) { return b.val - a.val; });
  return rows.slice(0, 10);
}

// ── HELP ─────────────────────────────────────────────────────────────────────
function drawHelp(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  drawOverlayFrame(ctx, GF.t('help'), '#9aa6c0');
  var lines = [GF.t('tut1'), GF.t('tut2'), GF.t('tut3'), GF.t('tut4')];
  var y = GF.clamp(78 * S, 60, 110);
  ctx.fillStyle = '#cdd6e6'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  var fs = Math.round(GF.clamp(15 * S, 12, 19));
  ctx.font = fs + 'px system-ui, sans-serif';
  var maxW = W - L.pad * 2 - 8 * S;
  for (var i = 0; i < lines.length; i++) {
    y = wrapText(ctx, lines[i], L.pad + 4 * S, y, maxW, fs + 7) + fs + 10 * S;
  }
  // rarity legend
  y += 6 * S;
  ctx.fillStyle = '#8893a8'; ctx.font = 'bold ' + Math.round(GF.clamp(12 * S, 10, 15)) + 'px system-ui, sans-serif';
  ctx.fillText(GF.t('value') + ':', L.pad + 4 * S, y); y += fs + 4 * S;
  for (var r = 0; r < RARITY.length; r++) {
    var rx = L.pad + 8 * S, ry = y + r * (fs + 8 * S);
    if (ry > H - 30 * S) break;
    drawMiniGem(ctx, rx + 8 * S, ry + fs * 0.5, 9 * S, RARITY[r].col);
    ctx.fillStyle = RARITY[r].col; ctx.font = '600 ' + fs + 'px system-ui, sans-serif';
    ctx.fillText(rarityName(r), rx + 24 * S, ry);
  }
  ctx.textBaseline = 'alphabetic';
}

function wrapText(ctx, text, x, y, maxW, lh) {
  var words = String(text).split(' '), line = '', yy = y;
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxW && line) { ctx.fillText(line, x, yy); line = words[i]; yy += lh; }
    else line = test;
  }
  if (line) ctx.fillText(line, x, yy);
  return yy;
}

// ════════════════════════════════════════════════════════════════════════════
// INPUT (unified mouse + touch). Single-tap model — no drag needed.
// ════════════════════════════════════════════════════════════════════════════
function evtXY(e) {
  if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}
function inRect(x, y, r) { return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

function onTap(x, y) {
  // tutorial intercepts first
  if (GF.tutorial.active) { if (GF.tutorial.handleClick(x, y)) return; }
  // set-complete celebration swallows taps while showing
  if (setCompleteFlash && setCompleteFlash.t < 2.8) { return; }

  // overlays
  if (overlay) {
    if (inRect(x, y, hit.close)) { overlay = null; saveMeta(); return; }
    if (overlay === 'VAULT' && hit.vtabs) {
      for (var i = 0; i < hit.vtabs.length; i++) { if (inRect(x, y, hit.vtabs[i])) { vaultTab = hit.vtabs[i].idx; return; } }
    }
    // tap outside any control while in RANKS/HELP/VAULT does nothing (stay open)
    return;
  }

  // reveal decision
  if (reveal) {
    if (inRect(x, y, hit.keep)) { keepGem(); return; }
    if (inRect(x, y, hit.sell)) { sellGem(false); return; }
    if (inRect(x, y, hit.sell2x)) { watchSell2x(); return; }
    return;
  }

  // reel spinning — ignore taps
  if (reel) return;

  // pills
  if (hit.pills) {
    for (var p = 0; p < hit.pills.length; p++) {
      if (inRect(x, y, hit.pills[p])) {
        var id = hit.pills[p].id;
        if (id === 'DAILY') { if (dailyReady()) claimDaily(); }
        else if (id === 'VAULT') { overlay = 'VAULT'; vaultTab = curSet; }
        else if (id === 'RANKS') { overlay = 'RANKS'; }
        else if (id === 'HELP') { overlay = 'HELP'; }
        return;
      }
    }
  }

  // case selector
  if (hit.cases) {
    for (var c = 0; c < hit.cases.length; c++) {
      if (inRect(x, y, hit.cases[c])) {
        if (hit.cases[c].unlocked) { curSet = hit.cases[c].idx; }
        else { GF.spawnFloat(x, y, GF.t('locked'), '#ff8a8a'); }
        return;
      }
    }
  }

  // OPEN button (the hero)
  if (inRect(x, y, hit.open)) {
    if (hit.open.afford) startSpin(false);
    else watchFreeCase();          // can't afford → offer rewarded free case
    return;
  }
}

var cv = GF.canvas;
cv.addEventListener('mousedown', function (e) { var p = evtXY(e); onTap(p.x, p.y); });
cv.addEventListener('touchstart', function (e) { e.preventDefault(); var p = evtXY(e); onTap(p.x, p.y); }, { passive: false });
// desktop: Space opens, Escape closes overlay
document.addEventListener('keydown', function (e) {
  if (e.code === 'Space') {
    e.preventDefault();
    if (GF.tutorial.active) { GF.tutorial.handleClick(GF.cx, GF.H - 40); return; }
    if (overlay) return;
    if (reveal) { var isNew = !(owned[reveal.gem.id] > 0); if (isNew) keepGem(); else sellGem(false); return; }
    if (!reel && coins >= SETS[curSet].cost) startSpin(false);
  } else if (e.code === 'Escape' || e.code === 'KeyP') {
    if (overlay) overlay = null;
  }
});

// ════════════════════════════════════════════════════════════════════════════
// SCREENSHOT / TEST HOOKS
// ════════════════════════════════════════════════════════════════════════════
// _setupForScreenshot(n): land on a juicy frame.
//   n=1 → mid-spin reel; n=2 → an EPIC reveal; n=3 → the Vault with gems;
//   n>=8 (loop-depth probe) → a rich late-game vault with multiple sets owned.
window._setupForScreenshot = function (n) {
  overlay = null; reel = null; reveal = null;
  try { localStorage.setItem('gem_cases_tut_v1', '1'); } catch (e) {}
  GF.tutorial.active = false;
  // give the player a healthy collection so frames look populated
  function grantSet(si, count) {
    var s = SETS[si];
    for (var i = 0; i < Math.min(count, s.gems.length); i++) { owned[s.gems[i].id] = (owned[s.gems[i].id] || 0) + 1; }
  }
  coins = 850;
  n = n || 1;
  if (n === 1) {
    // mid-spin reel of the Ember set
    curSet = 1; grantSet(0, 6); grantSet(1, 3);
    startSpin(false);
    if (reel) { reel.t = reel.dur * 0.62; layout(); reel.cardW = L.cardW + L.cardGap; reel.target = WIN_INDEX * reel.cardW + L.cardW / 2; reel.pos = reel.target * easeOutQuint(0.62); }
  } else if (n === 2) {
    // an EPIC reveal mid-rise
    curSet = 1; grantSet(0, 6); grantSet(1, 4);
    var g = pickGem(1, 3);   // epic
    reveal = { gem: g, rarity: 3, wasNew: true, t: 0.55, decided: false, autoT: 0 };
    newBurst = 0.7; burstSparkles(3);
  } else if (n === 3) {
    overlay = 'VAULT'; curSet = 0; vaultTab = 0; grantSet(0, 6); grantSet(1, 3);
  } else {
    // deep late-game: most of meadow+ember, some frost+cosmic — busy Vault
    grantSet(0, 6); grantSet(1, 6); grantSet(2, 4); grantSet(3, 2);
    meta.setsDone['meadow'] = 1; meta.setsDone['ember'] = 1;
    overlay = 'VAULT'; vaultTab = 2; coins = 4200; opens = 60;
  }
  topRarity = Math.max(topRarity, 3);
  saveMeta();
};

window._jumpLevel = function (n) {
  if (n >= 99) {
    // terminal state for the harness: an EPIC reveal (a clear, settled "result"
    // frame). gs stays STATE_OPEN; we surface a DONE-style reveal.
    overlay = null; reel = null;
    var g = pickGem(Math.min(curSet, SETS.length - 1), 4);
    reveal = { gem: g, rarity: 4, wasNew: true, t: 0.6, decided: true, autoT: 0 };
    gs = 'DONE';
    return;
  }
  window._setupForScreenshot(n || 1);
};

// extra test seams (named like beast_bazaar's)
window._gemGrant = function (c) { coins += (+c || 0); saveMeta(); };
window.__vaultTab = function (i) { overlay = 'VAULT'; vaultTab = GF.clamp(i | 0, 0, SETS.length - 1); };
window._gemOpen = function () { if (!reel && !reveal) startSpin(true); };
window._gemInfo = function () {
  return {
    gs: gs, coins: coins, ownedCount: Object.keys(owned).filter(function (k) { return owned[k] > 0; }).length,
    opens: opens, topRarity: topRarity, collectionValue: collectionValue(),
    curSet: curSet, spinning: !!reel, revealing: !!reveal,
    reelWinner: reel ? reel.winner.id : null, revealGem: reveal ? reveal.gem.id : null,
    hit: { open: hit.open, keep: hit.keep, sell: hit.sell, pills: hit.pills, cases: hit.cases },
    sets: SETS.map(function (s, i) { return { id: s.id, owned: setOwnedCount(i), total: s.gems.length, unlocked: setUnlocked(i), complete: setIsComplete(i) }; }),
  };
};

// ════════════════════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════════════════════
GF.init({
  designW: 393,
  designH: 852,
  strings: STRINGS,
  saveKey: 'gem_cases',
  onReady: function () {
    meta = loadMeta();
    coins = meta.coins; owned = meta.owned; opens = meta.opens; topRarity = meta.topRarity;
    claimOnOpen();
    // Yandex 1.9 — persist the live session across reload (coins/owned/curSet)
    GF.persist('gem_cases_run_v1',
      function () { return { coins: coins, owned: owned, opens: opens, topRarity: topRarity, curSet: curSet }; },
      function (st) {
        if (!st) return;
        if (typeof st.coins === 'number') coins = st.coins;
        if (st.owned) owned = st.owned;
        if (typeof st.opens === 'number') opens = st.opens;
        if (typeof st.topRarity === 'number') topRarity = st.topRarity;
        if (typeof st.curSet === 'number') curSet = GF.clamp(st.curSet, 0, SETS.length - 1);
      }
    );
    // make sure curSet points at an unlocked case
    if (!setUnlocked(curSet)) curSet = 0;
    // welcome-back banner if there's anything to show
    if (idleClaim > 0 || dailyClaim > 0) bootBannerT = 4.0;
    // first-run tutorial: ONE screen + ONE action ("Tap OPEN")
    layout();
    GF.tutorial.start([
      { text: GF.t('tapOpen'),
        target: function () { return { x: GF.cx, y: L.openY + L.openH / 2, r: Math.max(L.openW, L.openH) * 0.5 }; },
        advance: 'click_target', onAdvance: function () { meta.seenTut = 1; saveMeta(); } },
    ], { storageKey: 'gem_cases_tut_v1' });
    saveMeta();
  },
  onUpdate: update,
  onDraw: draw,
});

// ── EXPOSE STATE (post-build-tester) ─────────────────────────────────────────
// score = collection value (the leaderboard metric + the thing that grows as
// the player opens & keeps). best = best collection value ever.
GF.exposeState(function () {
  return {
    gs: gs,
    score: collectionValue(),
    best: meta ? Math.max(meta.bestValue || 0, collectionValue()) : collectionValue(),
    coins: coins,
    opens: opens,
    ownedCount: Object.keys(owned).filter(function (k) { return owned[k] > 0; }).length,
    topRarity: topRarity,
    curSet: curSet,
    setsDone: setsCompletedCount(),
    spinning: !!reel,
    revealing: !!reveal,
  };
});

})();
</script>
