var START_PATIENCE = 5;
var START_STAMINA = 8;
var START_INGREDIENTS = 2;
var START_CUSTOMS = 1;

var CARD_COUNT = 3;
var SUCCESS_RAPPORT = 2;

var ACTION_CARD_W = 154;
var ACTION_CARD_H = 86;
var ROUTE_NODE_RADIUS = 16;
var HOST_RADIUS = 38;
var PLAYER_RADIUS = 20;

  { key: 'spice', region: 'region_spice', dish: 'dish_spice', custom: 'custom_spice', ingredient: 'ingredient_spice', color: '#bf5f40', cloth: '#f0b05f' },

  { id: 'custom', label: 'action_custom', color: '#86c89a' },
  { id: 'dish', label: 'action_dish', color: '#e87165' }

var pointerDown = null;

var bestRoute = 1;

var nodeIndex = 0;

var wisps = [];

var rngSeed = 236;

function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function lerp(a, b, t) { return a + (b - a) * t; }
function rnd() {
  rngSeed = (rngSeed * 1664525 + 1013904223) >>> 0;
  return rngSeed / 4294967296;
}

function t(k) { return GF.t(k); }

function fs(n) {
  var boost = Math.min(GF.W, GF.H) < 430 ? 1.05 : 1;
  return Math.max(9, Math.round(n * scene.ui * boost));
}

function drawText(c, txt, x, y, size, color, align, weight) {
  c.font = (weight || '700') + ' ' + size + 'px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
  c.fillStyle = color;
  c.textAlign = align || 'left';
  c.textBaseline = 'alphabetic';
  c.fillText(txt, x, y);
}

function fitText(c, txt, x, y, maxW, size, color, align, weight) {
  var s = size;
  c.textAlign = align || 'left';
  c.textBaseline = 'alphabetic';
  do {
    c.font = (weight || '700') + ' ' + s + 'px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
    if (c.measureText(txt).width <= maxW || s <= 8) break;
    s -= 1;
  } while (s > 8);
  c.fillStyle = color;
  c.fillText(txt, x, y);
}

function wrapLines(c, txt, maxW, size, weight) {
  c.font = (weight || '650') + ' ' + size + 'px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
  var words = String(txt).split(/\s+/);
  var lines = [];
  var line = '';
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (c.measureText(test).width <= maxW || !line) {
      line = test;
    } else {
      lines.push(line);
      line = words[i];
    }
  }
  if (line) lines.push(line);
  return lines;
}

function roundRect(c, x, y, w, h, r) {
  GF.rr(c, x, y, w, h, r);
}

function saveMeta() {
  GF.saveRun();
}

function getMeta() {
  return {
    version: 1,
    bestScore: bestScore,
    bestRoute: bestRoute,
    journal: journal,
    tutorialDone: tutorialDone
  };
}

function applyMeta(meta) {
  if (!meta || typeof meta !== 'object') return;
  bestScore = Math.max(0, Number(meta.bestScore) || 0);
  bestRoute = Math.max(1, Number(meta.bestRoute) || 1);
  journal = meta.journal && typeof meta.journal === 'object' ? meta.journal : {};
  tutorialDone = !!meta.tutorialDone;
  coachStep = tutorialDone ? 4 : 0;
}

function routeTargetFor(level) {
  return BASE_ROUTE_TARGET + Math.floor((level - 1) * 1.55);
}

function pickRegion() {
  currentRegion = REGIONS[(routeIndex + routeLevel - 1) % REGIONS.length];
}

function pickCue() {
  if (!tutorialDone && coachStep === 0) return 'ingredient';
  if (!tutorialDone && coachStep === 1) return 'dish';
  if (!tutorialDone && coachStep === 2) return 'hospitality';
  var pool = CUE_TYPES.slice(0, Math.min(CUE_TYPES.length, 2 + Math.floor(routeLevel / 2)));
  var idx = (nodeIndex + routeLevel + Math.floor(rnd() * pool.length)) % pool.length;
  return pool[idx];
}

function startRun() {
  gs = 'PLAYING';
  score = 0;
  routeLevel = 1;
  routeIndex = 0;
  nodeIndex = 0;
  rapport = 0;
  routeTarget = routeTargetFor(routeLevel);
  patience = START_PATIENCE;
  stamina = START_STAMINA;
  ingredients = START_INGREDIENTS;
  customs = START_CUSTOMS;
  awkwardness = 0;
  currentCue = 'ingredient';
  lastAction = 'none';
  ribbons.length = 0;
  wisps.length = 0;
  routeClearFlash = 0;
  pickRegion();
  currentCue = pickCue();
  if (!started) {
    started = true;
    GF.gameStarted();
  }
}

function retry() {
  GF.sfx('click');
  startRun();
}

function discoverDish(region) {
  if (!journal[region.key]) {
    journal[region.key] = true;
    saveMeta();
  }
}

function journalNames() {
  var names = [];
  for (var i = 0; i < REGIONS.length; i++) {
    if (journal[REGIONS[i].key]) names.push(t(REGIONS[i].dish));
  }
  return names;
}

function pushRibbon(text, color) {
  ribbons.unshift({ text: text, color: color || '#f3d37a', life: 3.0 });
  if (ribbons.length > 4) ribbons.length = 4;
}

function addWisps(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    wisps.push({
      x: x,
      y: y,
      vx: (rnd() - 0.5) * 32,
      vy: -24 - rnd() * 42,
      r: 3 + rnd() * 6,
      life: 0.85 + rnd() * 0.6,
      color: color
    });
  }
}

function screenDishPoint() {
  return {
    x: scene.x + scene.w * 0.68,
    y: scene.y + scene.h * 0.48
  };
}

function updateBest() {
  var changed = false;
  if (score > bestScore) {
    bestScore = score;
    changed = true;
  }
  if (routeLevel > bestRoute) {
    bestRoute = routeLevel;
    pushRibbon(t('new_best'), '#ffe58a');
    changed = true;
  }
  if (changed) saveMeta();
}

function clearRoute() {
  routeClearFlash = 1.2;
  score += 90 + routeLevel * 40 + patience * 8 + stamina * 4;
  GF.sfx('levelup');
  GF.happytime();
  GF.spawnParticles(GF.cx, scene.y + scene.h * 0.45, '#f5d77b', 30);
  pushRibbon(t('result_route') + ' ' + routeLevel, '#ffe58a');
  routeLevel += 1;
  routeTarget = routeTargetFor(routeLevel);
  rapport = 0;
  routeIndex = (routeIndex + 1) % REGIONS.length;
  nodeIndex = 0;
  patience = Math.min(START_PATIENCE + 2, patience + 2);
  stamina = Math.min(START_STAMINA + 3, stamina + 3);
  ingredients = Math.min(6, ingredients + 1);
  customs = Math.min(5, customs + 1);
  awkwardness = 0;
  pickRegion();
  currentCue = pickCue();
  updateBest();
  saveMeta();
}

function gameOver(reason) {
  if (gs === 'GAMEOVER') return;
  gs = 'GAMEOVER';
  gameOverReason = reason;
  updateBest();
  GF.sfx('lose');
  GF.setShake(0.55);
  GF.gameEnded();
  GF.ads.interstitial();
}

function advanceNode() {
  nodeIndex += 1;
  if (rapport >= routeTarget) {
    clearRoute();
    return;
  }
  if (nodeIndex >= 5) {
    nodeIndex = 0;
    routeIndex = (routeIndex + 1) % REGIONS.length;
  }
  pickRegion();
  currentCue = pickCue();
}

function actionMatches(action, cue) {
  if (cue === 'ingredient') return action === 'ingredient';
  if (cue === 'custom') return action === 'custom';
  if (cue === 'hospitality') return action === 'custom';
  if (cue === 'dish') return action === 'dish';
  return false;
}

function coachAdvance(action, success) {
  if (tutorialDone) return;
  if (coachStep === 0 && action === 'ingredient' && success) coachStep = 1;
  else if (coachStep === 1 && action === 'dish' && success) coachStep = 2;
  else if (coachStep === 2 && action === 'custom' && success) coachStep = 3;
  else if (coachStep === 3) {
    coachStep = 4;
    tutorialDone = true;
    saveMeta();
  }
}

function chooseAction(actionId) {
  if (gs !== 'PLAYING' || helpOpen) return false;
  var idx = ACTIONS.findIndex(function(a) { return a.id === actionId; });
  if (idx >= 0) selectedAction = idx;
  var cue = currentCue;
  var matched = actionMatches(actionId, cue);
  var sp = screenDishPoint();
  var safeCoach = !tutorialDone && coachStep < 3;
  var canDish = ingredients > 0 && customs > 0;
  lastAction = actionId;

  if (actionId === 'dish' && !canDish) {
    matched = false;
    pushRibbon(t('result_empty'), '#ffac82');
  }

  if (matched) {
    var gain = actionId === 'dish' ? PERFECT_RAPPORT : SUCCESS_RAPPORT;
    if (cue === 'hospitality') gain = SUCCESS_RAPPORT;
    rapport += gain;
    stamina = Math.max(0, stamina - 1);
    awkwardness = Math.max(0, awkwardness - 1);
    score += 45 + gain * 18 + routeLevel * 7;
    if (actionId === 'ingredient') ingredients = Math.min(6, ingredients + 1);
    if (actionId === 'custom') customs = Math.min(5, customs + 1);
    if (actionId === 'dish') {
      ingredients = Math.max(0, ingredients - 1);
      customs = Math.max(0, customs - 1);
      discoverDish(currentRegion);
      pushRibbon(t('result_dish') + ': ' + t(currentRegion.dish), '#ffe08a');
      GF.sfx('reward');
      addWisps(sp.x, sp.y, currentRegion.cloth, 18);
    } else {
      pushRibbon(t('result_match') + ': ' + t(cueLabelKey(cue)), '#dff3b5');
      GF.sfx('coin');
      addWisps(sp.x, sp.y, ACTIONS[selectedAction].color, 10);
    }
    GF.spawnParticles(sp.x, sp.y, matched ? '#f6db75' : '#ff967a', 14);
    GF.spawnFloat(sp.x, sp.y - 16, '+' + gain + ' ' + t('rapport'), '#ffe58a');
    coachAdvance(actionId, true);
    advanceNode();
  } else {
    if (!safeCoach) {
      patience -= WRONG_PATIENCE_DAMAGE;
      stamina = Math.max(0, stamina - 1);
      awkwardness += 1;
      if (awkwardness >= MAX_AWKWARDNESS) {
        awkwardness = 0;
        patience -= 1;
      }
    } else {
      stamina = Math.max(1, stamina - 1);
    }
    pushRibbon(t('result_wrong') + ': ' + t(cueLabelKey(cue)), '#ffb09b');
    GF.sfx('hit');
    GF.setShake(0.2);
    GF.spawnFloat(sp.x, sp.y - 16, '-' + WRONG_PATIENCE_DAMAGE + ' ' + t('patience'), '#ffb09b');
    coachAdvance(actionId, false);
  }

  updateBest();
  saveMeta();
  if (patience <= 0) gameOver('reason_patience');
  else if (stamina <= 0 && rapport < routeTarget) gameOver('reason_stamina');
  return true;
}

function cueLabelKey(cue) {
  if (cue === 'ingredient') return 'type_ingredient';
  if (cue === 'custom') return 'type_custom';
  if (cue === 'dish') return 'type_dish';
  return 'type_hospitality';
}

function layout() {
  var minSide = Math.max(1, Math.min(GF.W, GF.H));
  var raw = Math.min(GF.W / 760, GF.H / 620);
  var ui = clamp(raw, 0.76, 1.22);
  if (minSide < 430) ui = Math.max(ui, 0.86);
  var top = Math.round(clamp(86 * ui, 70, 106));
  var bottom = Math.round(clamp(124 * ui, 102, 144));
  if (GF.W < 520) top = Math.round(clamp(126 * ui, 102, 124));
  scene.x = 0;
  scene.y = top;
  scene.w = GF.W;
  scene.h = Math.max(150, GF.H - top - bottom);
  scene.top = top;
  scene.bottom = bottom;
  scene.ui = ui;
  uiRects.help = { x: GF.W - 42 * ui, y: 9 * ui, w: 32 * ui, h: 32 * ui };
  uiRects.mute = { x: GF.W - 80 * ui, y: 9 * ui, w: 32 * ui, h: 32 * ui };
  uiRects.retry = { x: GF.cx - 78 * ui, y: GF.cy + 84 * ui, w: 156 * ui, h: 44 * ui };
  uiRects.helpClose = { x: GF.cx - 70 * ui, y: GF.cy + 148 * ui, w: 140 * ui, h: 38 * ui };

  actionRects.length = 0;
  var gap = clamp(8 * ui, 6, 13);
  var bottomY = scene.y + scene.h;
  var pad = 10 * ui;
  var cardH = clamp(ACTION_CARD_H * ui, 72, 96);
  var available = GF.W - pad * 2 - gap * (CARD_COUNT - 1);
  var cardW = Math.min(ACTION_CARD_W * ui, available / CARD_COUNT);
  cardW = Math.max(88 * ui, cardW);
  var totalW = cardW * CARD_COUNT + gap * (CARD_COUNT - 1);
  var startX = (GF.W - totalW) / 2;
  var y = bottomY + (scene.bottom - cardH) / 2;
  for (var i = 0; i < CARD_COUNT; i++) {
    actionRects.push({ x: startX + i * (cardW + gap), y: y, w: cardW, h: cardH });
  }
}

function eventPoint(e) {
  var r = GF.canvas.getBoundingClientRect();
  var sx = GF.W / Math.max(1, r.width);
  var sy = GF.H / Math.max(1, r.height);
  return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
}

function hitRect(p, r) {
  return p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
}

function onPointerDown(e) {
  e.preventDefault();
  pointerDown = eventPoint(e);
}

function onPointerUp(e) {
  e.preventDefault();
  var p = eventPoint(e);
  if (!pointerDown) pointerDown = p;
  pointerDown = null;
  if (hitRect(p, uiRects.mute)) {
    GF.toggleMute();
    GF.sfx('click');
    return;
  }
  if (helpOpen) {
    if (hitRect(p, uiRects.helpClose)) {
      helpOpen = false;
      GF.sfx('click');
    }
    return;
  }
  if (hitRect(p, uiRects.help)) {
    helpOpen = true;
    GF.sfx('click');
    return;
  }
  if (gs === 'GAMEOVER') {
    if (hitRect(p, uiRects.retry)) retry();
    return;
  }
  for (var i = 0; i < actionRects.length; i++) {
    if (hitRect(p, actionRects[i])) {
      chooseAction(ACTIONS[i].id);
      return;
    }
  }
}

function toggleFullscreen() {
  var el = document.documentElement;
  if (!document.fullscreenElement && el.requestFullscreen) {
    el.requestFullscreen().catch(function() {});
  } else if (document.exitFullscreen) {
    document.exitFullscreen().catch(function() {});
  }
}

function onKeyDown(e) {
  if (e.code === 'ArrowLeft') {
    selectedAction = (selectedAction + ACTIONS.length - 1) % ACTIONS.length;
    e.preventDefault();
  } else if (e.code === 'ArrowRight') {
    selectedAction = (selectedAction + 1) % ACTIONS.length;
    e.preventDefault();
  } else if (e.code === 'Space' || e.code === 'Enter') {
    if (helpOpen) helpOpen = false;
    else if (gs === 'GAMEOVER') retry();
    else chooseAction(ACTIONS[selectedAction].id);
    e.preventDefault();
  } else if (e.key === 'f' || e.key === 'F') {
    toggleFullscreen();
  }
}

function update(dt) {
  layout();
  visitPulse += dt;
  routeClearFlash = Math.max(0, routeClearFlash - dt);
  for (var i = ribbons.length - 1; i >= 0; i--) {
    ribbons[i].life -= dt;
    if (ribbons[i].life <= 0) ribbons.splice(i, 1);
  }
  for (var j = wisps.length - 1; j >= 0; j--) {
    var w = wisps[j];
    w.x += w.vx * dt;
    w.y += w.vy * dt;
    w.life -= dt;
    if (w.life <= 0) wisps.splice(j, 1);
  }
}

function drawBackground(c) {
  var g = c.createLinearGradient(0, 0, 0, GF.H);
  g.addColorStop(0, '#2a211c');
  g.addColorStop(0.42, '#3a3025');
  g.addColorStop(1, '#221f1b');
  c.fillStyle = g;
  c.fillRect(0, 0, GF.W, GF.H);
  c.fillStyle = 'rgba(246, 213, 130, 0.05)';
  for (var x = -60; x < GF.W + 80; x += 72) {
    c.beginPath();
    c.ellipse(x, scene.y + scene.h * 0.25 + Math.sin(x * 0.02) * 18, 70, 8, -0.35, 0, Math.PI * 2);
    c.fill();
  }
  c.fillStyle = 'rgba(126, 87, 53, 0.26)';
  for (var y = scene.y + 16; y < scene.y + scene.h; y += 38) {
    c.fillRect(0, y, GF.W, 2);
  }
}

function routePoint(i) {
  var pts = [
    [0.12, 0.68],
    [0.30, 0.42],
    [0.50, 0.58],
    [0.68, 0.35],
    [0.86, 0.55]
  ];
  var p = pts[i % pts.length];
  return { x: scene.x + scene.w * p[0], y: scene.y + scene.h * p[1] };
}

function drawRoute(c) {
  c.save();
  c.lineWidth = Math.max(6, 8 * scene.ui);
  c.strokeStyle = '#8a5e3e';
  c.lineCap = 'round';
  c.beginPath();
  for (var i = 0; i < 5; i++) {
    var p = routePoint(i);
    if (i === 0) c.moveTo(p.x, p.y);
    else c.lineTo(p.x, p.y);
  }
  c.stroke();
  c.lineWidth = Math.max(2, 3 * scene.ui);
  c.strokeStyle = '#d8aa65';
  c.stroke();
  for (var j = 0; j < 5; j++) {
    drawRouteNode(c, j, routePoint(j), j === nodeIndex);
  }
  c.restore();
}

function drawRouteNode(c, idx, p, active) {
  var r = ROUTE_NODE_RADIUS * scene.ui * (active ? 1.24 : 1);
  c.save();
  c.fillStyle = active ? currentRegion.cloth : '#5b4b39';
  c.strokeStyle = active ? '#fff0b0' : '#9e8156';
  c.lineWidth = active ? 3 : 2;
  c.beginPath();
  c.arc(p.x, p.y, r, 0, Math.PI * 2);
  c.fill();
  c.stroke();
  c.fillStyle = active ? '#3b241d' : '#e4d4b1';
  c.font = '800 ' + fs(12) + 'px sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(String(idx + 1), p.x, p.y + 0.5);
  c.restore();
}

function drawTraveler(c) {
  var p = routePoint(nodeIndex);
  var bob = Math.sin(visitPulse * 4) * 3 * scene.ui;
  var r = PLAYER_RADIUS * scene.ui;
  c.save();
  c.translate(p.x, p.y - r - 10 * scene.ui + bob);
  c.fillStyle = '#2a5d6d';
  c.beginPath();
  c.arc(0, -r * 0.16, r * 0.75, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = '#f2c181';
  c.beginPath();
  c.arc(0, -r * 0.82, r * 0.38, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = '#e7b45d';
  c.beginPath();
  c.moveTo(-r * 0.65, -r * 1.02);
  c.lineTo(r * 0.72, -r * 1.03);
  c.lineTo(r * 0.28, -r * 1.32);
  c.lineTo(-r * 0.42, -r * 1.32);
  c.closePath();
  c.fill();
  c.strokeStyle = '#f7e1a5';
  c.lineWidth = Math.max(2, 2 * scene.ui);
  c.beginPath();
  c.moveTo(-r * 0.95, -r * 0.12);
  c.lineTo(r * 0.95, -r * 0.12);
  c.stroke();
  c.restore();
}

function drawHost(c) {
  var x = scene.x + scene.w * 0.69;
  var y = scene.y + scene.h * 0.46;
  var r = HOST_RADIUS * scene.ui;
  c.save();
  c.fillStyle = 'rgba(0,0,0,0.16)';
  c.beginPath();
  c.ellipse(x, y + r * 1.02, r * 1.1, r * 0.24, 0, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = currentRegion.color;
  c.beginPath();
  c.arc(x, y, r, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = '#f1c58b';
  c.beginPath();
  c.arc(x, y - r * 0.36, r * 0.42, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = currentRegion.cloth;
  c.fillRect(x - r * 0.72, y + r * 0.08, r * 1.44, r * 0.48);
  c.strokeStyle = '#fff0bf';
  c.lineWidth = Math.max(2, 2 * scene.ui);
  c.strokeRect(x - r * 0.72, y + r * 0.08, r * 1.44, r * 0.48);
  drawCueIcon(c, currentCue, x, y - r * 1.42, r * 0.52, true);
  c.restore();
}

function drawCueIcon(c, cue, x, y, r, bright) {
  c.save();
  c.translate(x, y);
  c.fillStyle = bright ? '#fff1b9' : '#f3d68c';
  c.strokeStyle = bright ? '#5a3329' : '#7e5534';
  c.lineWidth = Math.max(2, 2 * scene.ui);
  if (cue === 'ingredient') {
    roundRect(c, -r * 0.9, -r * 0.18, r * 1.8, r * 0.72, r * 0.2);
    c.fill();
    c.stroke();
    c.beginPath();
    c.arc(-r * 0.38, -r * 0.18, r * 0.28, 0, Math.PI * 2);
    c.arc(r * 0.06, -r * 0.28, r * 0.24, 0, Math.PI * 2);
    c.arc(r * 0.44, -r * 0.1, r * 0.25, 0, Math.PI * 2);
    c.fillStyle = currentRegion.color;
    c.fill();
  } else if (cue === 'custom' || cue === 'hospitality') {
    c.beginPath();
    c.arc(0, 0, r * 0.74, 0, Math.PI * 2);
    c.fill();
    c.stroke();
    c.strokeStyle = currentRegion.color;
    c.beginPath();
    c.moveTo(-r * 0.52, -r * 0.04);
    c.quadraticCurveTo(0, -r * 0.48, r * 0.52, -r * 0.04);
    c.moveTo(-r * 0.35, r * 0.2);
    c.quadraticCurveTo(0, r * 0.42, r * 0.35, r * 0.2);
    c.stroke();
    if (cue === 'hospitality') {
      c.fillStyle = '#d9635b';
      c.beginPath();
      c.moveTo(0, -r * 0.1);
      c.bezierCurveTo(r * 0.5, -r * 0.56, r * 0.92, r * 0.06, 0, r * 0.62);
      c.bezierCurveTo(-r * 0.92, r * 0.06, -r * 0.5, -r * 0.56, 0, -r * 0.1);
      c.fill();
    }
  } else {
    c.beginPath();
    c.ellipse(0, r * 0.12, r, r * 0.54, 0, 0, Math.PI * 2);
    c.fill();
    c.stroke();
    c.fillStyle = currentRegion.color;
    c.beginPath();
    c.ellipse(0, 0, r * 0.58, r * 0.26, 0.2, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = '#fff2bf';
    c.beginPath();
    c.moveTo(-r * 0.45, -r * 0.54);
    c.quadraticCurveTo(-r * 0.25, -r * 0.92, -r * 0.05, -r * 0.54);
    c.moveTo(r * 0.08, -r * 0.56);
    c.quadraticCurveTo(r * 0.30, -r * 0.96, r * 0.52, -r * 0.56);
    c.stroke();
  }
  c.restore();
}

function drawScene(c) {
  c.save();
  c.beginPath();
  c.rect(scene.x, scene.y, scene.w, scene.h);
  c.clip();
  c.fillStyle = '#3b3025';
  c.fillRect(scene.x, scene.y, scene.w, scene.h);
  var rg = c.createRadialGradient(GF.cx, scene.y + scene.h * 0.46, 40, GF.cx, scene.y + scene.h * 0.5, Math.max(scene.w, scene.h) * 0.72);
  rg.addColorStop(0, '#5a4734');
  rg.addColorStop(1, '#2b281f');
  c.fillStyle = rg;
  c.fillRect(scene.x, scene.y, scene.w, scene.h);
  c.fillStyle = 'rgba(235, 198, 120, 0.12)';
  for (var i = 0; i < 8; i++) {
    var x = scene.x + ((i * 137) % Math.max(1, scene.w));
    var y = scene.y + ((i * 79) % Math.max(1, scene.h));
    c.beginPath();
    c.ellipse(x, y, 40 * scene.ui, 12 * scene.ui, i * 0.7, 0, Math.PI * 2);
    c.fill();
  }
  drawRoute(c);
  drawTraveler(c);
  drawHost(c);
  drawCuePanel(c);
  drawWisps(c);
  if (routeClearFlash > 0) {
    c.fillStyle = 'rgba(255,232,151,' + (0.18 * routeClearFlash) + ')';
    c.fillRect(scene.x, scene.y, scene.w, scene.h);
  }
  c.restore();
}

function drawCuePanel(c) {
  var ui = scene.ui;
  var w = Math.min(scene.w - 24 * ui, 360 * ui);
  var x = scene.x + 12 * ui;
  var y = scene.y + 14 * ui;
  var h = 88 * ui;
  roundRect(c, x, y, w, h, 8 * ui);
  c.fillStyle = 'rgba(36,28,23,0.78)';
  c.fill();
  c.strokeStyle = 'rgba(242,204,132,0.5)';
  c.lineWidth = 1.5;
  c.stroke();
  drawCueIcon(c, currentCue, x + 38 * ui, y + 43 * ui, 21 * ui, false);
  fitText(c, t('cue') + ': ' + t(cueLabelKey(currentCue)), x + 72 * ui, y + 30 * ui, w - 84 * ui, fs(13), '#ffe4a4', 'left', '800');
  var desc = t(currentRegion.region) + ' - ' + cueDetail();
  fitText(c, desc, x + 72 * ui, y + 56 * ui, w - 84 * ui, fs(11), '#d7ccb0', 'left', '650');
}

function cueDetail() {
  if (currentCue === 'ingredient') return t(currentRegion.ingredient);
  if (currentCue === 'custom' || currentCue === 'hospitality') return t(currentRegion.custom);
  return t(currentRegion.dish);
}

function drawWisps(c) {
  for (var i = 0; i < wisps.length; i++) {
    var w = wisps[i];
    c.globalAlpha = Math.max(0, Math.min(1, w.life));
    c.fillStyle = w.color;
    c.beginPath();
    c.arc(w.x, w.y, w.r * scene.ui, 0, Math.PI * 2);
    c.fill();
  }
  c.globalAlpha = 1;
}

function drawHud(c) {
  var ui = scene.ui;
  c.fillStyle = '#211a17';
  c.fillRect(0, 0, GF.W, scene.top);
  c.fillStyle = '#261f1a';
  c.fillRect(0, scene.y + scene.h, GF.W, scene.bottom);
  c.strokeStyle = '#604933';
  c.lineWidth = 2;
  c.beginPath();
  c.moveTo(0, scene.top - 1);
  c.lineTo(GF.W, scene.top - 1);
  c.moveTo(0, scene.y + scene.h + 1);
  c.lineTo(GF.W, scene.y + scene.h + 1);
  c.stroke();

  var narrow = GF.W < 520;
  if (narrow) {
    fitText(c, t('title'), 10 * ui, 22 * ui, GF.W - 96 * ui, fs(16), '#f7deaa', 'left', '850');
    fitText(c, t('route') + ' ' + routeLevel + '  ' + t('score') + ' ' + score, 10 * ui, 44 * ui, GF.W - 18 * ui, fs(12), '#dccaa9', 'left', '700');
    drawProgressBar(c, 12 * ui, 58 * ui, GF.W - 24 * ui, 16 * ui);
    fitText(c, t(currentRegion.region), GF.cx, 94 * ui, GF.W - 24 * ui, fs(13), '#f7d779', 'center', '800');
    fitText(c, compactResources(), GF.cx, 116 * ui, GF.W - 24 * ui, fs(11), patience <= 2 ? '#ffae9d' : '#d8e6c2', 'center', '700');
  } else {
    fitText(c, t('title'), 14 * ui, 25 * ui, Math.max(160, GF.W * 0.32), fs(16), '#f7deaa', 'left', '850');
    fitText(c, t('route') + ' ' + routeLevel + '  ' + t('score') + ' ' + score + '  ' + t('best') + ' ' + bestRoute, 14 * ui, 50 * ui, Math.max(190, GF.W * 0.38), fs(12), '#dccaa9', 'left', '700');
    drawProgressBar(c, GF.cx - GF.W * 0.17, 18 * ui, GF.W * 0.34, 17 * ui);
    fitText(c, t(currentRegion.region), GF.cx, 58 * ui, Math.max(180, GF.W * 0.36), fs(13), '#f7d779', 'center', '800');
    var rightX = GF.W - 92 * ui;
    fitText(c, t('patience') + ' ' + patience, rightX, 25 * ui, 92 * ui, fs(12), patience <= 2 ? '#ffae9d' : '#f3dbc1', 'right', '800');
    fitText(c, t('stamina') + ' ' + stamina, rightX, 46 * ui, 92 * ui, fs(12), stamina <= 2 ? '#ffae9d' : '#cce4c0', 'right', '800');
    fitText(c, t('ingredients') + ' ' + ingredients + '  ' + t('customs') + ' ' + customs, rightX, 67 * ui, 160 * ui, fs(11), '#d6cab2', 'right', '650');
  }
  drawIconButton(c, uiRects.help, t('help_btn'));
  GF.drawMuteIcon(c, uiRects.mute.x + uiRects.mute.w / 2, uiRects.mute.y + uiRects.mute.h / 2, uiRects.mute.w * 0.48, GF.muted);
  drawActionCards(c);
  drawRibbons(c);
}

function compactResources() {
  return t('patience') + ' ' + patience + '  ' + t('stamina') + ' ' + stamina + '  ' + t('ingredients') + ' ' + ingredients + '  ' + t('customs') + ' ' + customs;
}

function drawProgressBar(c, x, y, w, h) {
  roundRect(c, x, y, w, h, h / 2);
  c.fillStyle = '#3a3026';
  c.fill();
  var pct = clamp(rapport / Math.max(1, routeTarget), 0, 1);
  roundRect(c, x + 2, y + 2, Math.max(4, (w - 4) * pct), h - 4, (h - 4) / 2);
  c.fillStyle = '#e1b955';
  c.fill();
  c.strokeStyle = '#826439';
  c.lineWidth = 1;
  roundRect(c, x, y, w, h, h / 2);
  c.stroke();
  fitText(c, t('rapport') + ' ' + rapport + '/' + routeTarget, x + w / 2, y + h - 4, w - 12, fs(10), '#241c18', 'center', '850');
}

function drawIconButton(c, r, label) {
  roundRect(c, r.x, r.y, r.w, r.h, 7 * scene.ui);
  c.fillStyle = '#3c332a';
  c.fill();
  c.strokeStyle = '#c6a65f';
  c.lineWidth = 1.5;
  c.stroke();
  fitText(c, label, r.x + r.w / 2, r.y + r.h * 0.68, r.w - 6, fs(16), '#f6d988', 'center', '850');
}

function drawActionCards(c) {
  var ui = scene.ui;
  for (var i = 0; i < ACTIONS.length; i++) {
    var a = ACTIONS[i];
    var r = actionRects[i];
    var selected = i === selectedAction;
    var can = a.id !== 'dish' || (ingredients > 0 && customs > 0);
    roundRect(c, r.x, r.y, r.w, r.h, 8 * ui);
    c.fillStyle = can ? '#352a22' : '#2b2927';
    c.fill();
    c.strokeStyle = selected ? '#fff0a0' : 'rgba(216,178,96,0.45)';
    c.lineWidth = selected ? 3 : 1.5;
    c.stroke();
    c.fillStyle = can ? a.color : '#7d7167';
    c.globalAlpha = can ? 1 : 0.58;
    drawActionIcon(c, a.id, r.x + r.w / 2, r.y + r.h * 0.34, 20 * ui);
    c.globalAlpha = 1;
    fitText(c, t(a.label), r.x + r.w / 2, r.y + r.h * 0.67, r.w - 10 * ui, fs(12), can ? '#f8e6bc' : '#ada397', 'center', '850');
    var sub = a.id === 'ingredient' ? '+' + t('ingredients') : a.id === 'custom' ? '+' + t('customs') : '-1 / -1';
    fitText(c, sub, r.x + r.w / 2, r.y + r.h * 0.88, r.w - 10 * ui, fs(9), can ? '#c8bca2' : '#8e857a', 'center', '650');
  }
}

function drawActionIcon(c, id, x, y, r) {
  c.save();
  c.translate(x, y);
  if (id === 'ingredient') {
    c.fillStyle = '#cf7e42';
    c.beginPath();
    c.arc(-r * 0.42, 0, r * 0.42, 0, Math.PI * 2);
    c.arc(r * 0.05, -r * 0.18, r * 0.36, 0, Math.PI * 2);
    c.arc(r * 0.42, r * 0.1, r * 0.32, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = '#ffe6ad';
    c.lineWidth = 2;
    c.stroke();
  } else if (id === 'custom') {
    c.fillStyle = '#88c693';
    c.beginPath();
    c.arc(0, 0, r * 0.78, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = '#224a35';
    c.lineWidth = 2;
    c.beginPath();
    c.moveTo(-r * 0.45, -r * 0.1);
    c.quadraticCurveTo(0, -r * 0.48, r * 0.45, -r * 0.1);
    c.moveTo(-r * 0.34, r * 0.23);
    c.quadraticCurveTo(0, r * 0.44, r * 0.34, r * 0.23);
    c.stroke();
  } else {
    c.fillStyle = '#e87165';
    c.beginPath();
    c.ellipse(0, r * 0.14, r * 0.95, r * 0.55, 0, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = '#ffe8b2';
    c.lineWidth = 2;
    c.stroke();
    c.fillStyle = '#f6d27b';
    c.beginPath();
    c.ellipse(0, 0, r * 0.5, r * 0.24, 0.2, 0, Math.PI * 2);
    c.fill();
  }
  c.restore();
}

function drawRibbons(c) {
  var ui = scene.ui;
  var x = Math.max(12 * ui, GF.W - 260 * ui);
  var y = scene.y + scene.h - 18 * ui;
  for (var i = 0; i < ribbons.length; i++) {
    var rb = ribbons[i];
    var yy = y - i * 25 * ui;
    c.globalAlpha = Math.min(1, rb.life);
    roundRect(c, x, yy - 18 * ui, Math.min(244 * ui, GF.W - 24 * ui), 21 * ui, 6 * ui);
    c.fillStyle = 'rgba(32,25,21,0.78)';
    c.fill();
    fitText(c, rb.text, x + 10 * ui, yy - 3 * ui, Math.min(224 * ui, GF.W - 44 * ui), fs(10), rb.color, 'left', '750');
    c.globalAlpha = 1;
  }
}

function drawCoach(c) {
  if (tutorialDone || helpOpen || gs !== 'PLAYING') return;
  var keys = ['coach_ingredient', 'coach_dish', 'coach_custom', 'coach_risk'];
  var key = keys[Math.min(coachStep, keys.length - 1)];
  var ui = scene.ui;
  var w = Math.min(GF.W - 28 * ui, 420 * ui);
  var size = fs(12);
  var lines = wrapLines(c, t(key), w - 28 * ui, size, '800');
  var h = 24 * ui + lines.length * size * 1.35;
  var x = (GF.W - w) / 2;
  var y = scene.y + 8 * ui;
  if (GF.W >= 520) y = scene.y + scene.h - h - 14 * ui;
  roundRect(c, x, y, w, h, 8 * ui);
  c.fillStyle = 'rgba(32,25,20,0.88)';
  c.fill();
  c.strokeStyle = '#f2cb76';
  c.lineWidth = 2;
  c.stroke();
  for (var i = 0; i < lines.length; i++) {
    fitText(c, lines[i], x + 14 * ui, y + 22 * ui + i * size * 1.35, w - 28 * ui, size, '#ffe8ae', 'left', '800');
  }
}

function drawHelp(c) {
  var ui = scene.ui;
  c.fillStyle = 'rgba(18,14,12,0.76)';
  c.fillRect(0, 0, GF.W, GF.H);
  var w = Math.min(GF.W - 28 * ui, 520 * ui);
  var x = (GF.W - w) / 2;
  var size = fs(12);
  var entries = [
    ['tut_goal', '#ffe6a8'],
    ['tut_controls', '#d9e6c8'],
    ['tut_win', '#cde8b2'],
    ['tut_lose', '#ffb59f'],
    ['tut_tip', '#e9d8b7']
  ];
  var total = 48 * ui;
  var blocks = [];
  for (var i = 0; i < entries.length; i++) {
    var lines = wrapLines(c, t(entries[i][0]), w - 30 * ui, size, '650');
    blocks.push({ lines: lines, color: entries[i][1] });
    total += lines.length * size * 1.32 + 10 * ui;
  }
  total += 50 * ui;
  total = Math.min(total, GF.H - 24 * ui);
  var y = (GF.H - total) / 2;
  roundRect(c, x, y, w, total, 10 * ui);
  c.fillStyle = '#2b231d';
  c.fill();
  c.strokeStyle = '#e6bd71';
  c.lineWidth = 2;
  c.stroke();
  fitText(c, t('help_title'), x + 16 * ui, y + 30 * ui, w - 32 * ui, fs(17), '#ffe2a5', 'left', '850');
  var yy = y + 58 * ui;
  for (var b = 0; b < blocks.length; b++) {
    for (var l = 0; l < blocks[b].lines.length; l++) {
      fitText(c, blocks[b].lines[l], x + 16 * ui, yy, w - 32 * ui, size, blocks[b].color, 'left', '650');
      yy += size * 1.32;
    }
    yy += 10 * ui;
  }
  uiRects.helpClose = { x: GF.cx - 70 * ui, y: y + total - 45 * ui, w: 140 * ui, h: 34 * ui };
  roundRect(c, uiRects.helpClose.x, uiRects.helpClose.y, uiRects.helpClose.w, uiRects.helpClose.h, 8 * ui);
  c.fillStyle = '#f0c76f';
  c.fill();
  fitText(c, t('close'), GF.cx, uiRects.helpClose.y + 23 * ui, uiRects.helpClose.w - 12 * ui, fs(13), '#261d17', 'center', '850');
}

function drawGameOver(c) {
  var ui = scene.ui;
  c.fillStyle = 'rgba(18,13,11,0.78)';
  c.fillRect(0, 0, GF.W, GF.H);
  drawText(c, t('gameover'), GF.cx, GF.cy - 72 * ui, fs(25), '#ffe0b8', 'center', '850');
  fitText(c, t(gameOverReason), GF.cx, GF.cy - 38 * ui, Math.min(GF.W - 30 * ui, 440 * ui), fs(14), '#ffc0ac', 'center', '700');
  fitText(c, t('score') + ' ' + score + '  ' + t('best') + ' ' + bestRoute, GF.cx, GF.cy - 7 * ui, Math.min(GF.W - 30 * ui, 440 * ui), fs(14), '#e5ebcf', 'center', '800');
  var names = journalNames();
  fitText(c, t('journal') + ': ' + (names.length ? names.join(', ') : t('none')), GF.cx, GF.cy + 24 * ui, Math.min(GF.W - 30 * ui, 500 * ui), fs(11), '#d5c8ad', 'center', '650');
  var r = uiRects.retry;
  roundRect(c, r.x, r.y, r.w, r.h, 8 * ui);
  c.fillStyle = '#efc66e';
  c.fill();
  fitText(c, t('retry'), GF.cx, r.y + 29 * ui, r.w - 12 * ui, fs(15), '#251d17', 'center', '850');
}

function draw(c) {
  layout();
  drawBackground(c);
  drawScene(c);
  drawHud(c);
  drawCoach(c);
  if (helpOpen) drawHelp(c);
  if (gs === 'GAMEOVER') drawGameOver(c);
}

function stateObject() {
  return {
    gs: gs,
    score: score,
    bestScore: bestScore,
    bestRoute: bestRoute,
    routeLevel: routeLevel,
    routeIndex: routeIndex,
    routeTarget: routeTarget,
    rapport: rapport,
    patience: patience,
    stamina: stamina,
    ingredients: ingredients,
    customs: customs,
    awkwardness: awkwardness,
    region: currentRegion.key,
    cue: currentCue,
    nodeIndex: nodeIndex,
    journal: journalNames(),
    tutorialDone: tutorialDone,
    helpOpen: helpOpen,
    lastAction: lastAction
  };
}

function renderText() {
  var actions = ACTIONS.map(function(a, i) {
    return {
      id: a.id,
      selected: i === selectedAction,
      rect: actionRects[i] || null,
      available: a.id !== 'dish' || (ingredients > 0 && customs > 0)
    };
  });
  return JSON.stringify({
    coordinateSystem: 'canvas pixels, origin top-left, x right, y down',
    mode: gs,
    route: { level: routeLevel, target: routeTarget, rapport: rapport, nodeIndex: nodeIndex, region: currentRegion.key },
    resources: { patience: patience, stamina: stamina, ingredients: ingredients, customs: customs, awkwardness: awkwardness },
    cue: { type: currentCue, label: t(cueLabelKey(currentCue)), detail: cueDetail() },
    actions: actions,
    journal: journalNames(),
    score: score,
    helpOpen: helpOpen
  });
}

function botActions() {
  if (helpOpen) return ['close_help'];
  if (gs === 'GAMEOVER') return ['retry', 'advance'];
  return ['ingredient', 'custom', 'dish', 'best', 'wrong', 'help', 'advance'];
}

function botAct(action) {
  if (action === 'advance') {
    window.advanceTime(900);
    return true;
  }
  if (action === 'retry') {
    retry();
    return true;
  }
  if (action === 'help') {
    helpOpen = true;
    return true;
  }
  if (action === 'close_help') {
    helpOpen = false;
    return true;
  }
  if (action === 'best') {
    var best = currentCue === 'ingredient' ? 'ingredient' : currentCue === 'dish' ? 'dish' : 'custom';
    return chooseAction(best);
  }
  if (action === 'wrong') {
    var wrong = currentCue === 'ingredient' ? 'dish' : 'ingredient';
    return chooseAction(wrong);
  }
  return chooseAction(action);
}

function setupForScreenshot(level) {
  screenshotMode = true;
  routeLevel = Math.max(1, Number(level) || 4);
  routeTarget = routeTargetFor(routeLevel);
  routeIndex = (routeLevel - 1) % REGIONS.length;
  nodeIndex = Math.min(4, Math.max(0, routeLevel % 5));
  rapport = Math.max(1, routeTarget - 2);
  patience = START_PATIENCE;
  stamina = START_STAMINA + 1;
  ingredients = 3;
  customs = 2;
  awkwardness = 1;
  score = 420 + routeLevel * 95;
  gs = 'PLAYING';
  helpOpen = false;
  tutorialDone = true;
  coachStep = 4;
  journal = { spice: true, tea: true, noodle: routeLevel >= 4 };
  pickRegion();
  currentCue = routeLevel % 2 ? 'dish' : 'hospitality';
  pushRibbon(t('result_dish') + ': ' + t(currentRegion.dish), '#ffe08a');
  layout();
  draw(GF.ctx);
}

window._setupForScreenshot = function(level) { setupForScreenshot(level); };

window.advanceTime = function(ms) {
  var steps = Math.max(1, Math.round((Number(ms) || 0) / (1000 / 60)));
  for (var i = 0; i < steps; i++) update(1 / 60);
  draw(GF.ctx);
};

window.render_game_to_text = renderText;

GF.canvas.addEventListener('pointerdown', onPointerDown, { passive: false });
GF.canvas.addEventListener('pointerup', onPointerUp, { passive: false });
GF.canvas.addEventListener('pointercancel', function() { pointerDown = null; }, { passive: false });
document.addEventListener('keydown', onKeyDown);

GF.exposeState(stateObject);
GF.exposeBot(botActions, botAct);
GF.exposeReach(function() {
  var items = [
    { id: 'help', rect: uiRects.help, visible: true },
    { id: 'mute', rect: uiRects.mute, visible: true }
  ];
  for (var i = 0; i < actionRects.length; i++) {
    items.push({ id: ACTIONS[i].id, rect: actionRects[i], visible: gs === 'PLAYING' && !helpOpen });
  }
  if (gs === 'GAMEOVER') items.push({ id: 'retry', rect: uiRects.retry, visible: true });
  if (helpOpen) items.push({ id: 'helpClose', rect: uiRects.helpClose, visible: true });
  return { screen: helpOpen ? 'help' : gs, viewportW: GF.W, viewportH: GF.H, screenH: GF.H, scrollMaxY: 0, items: items };
});
GF.exposeTour([
  { action: 'best', expect: 'rapport changes' },
  { action: 'dish', expect: 'dish spends resources when cue matches' },
  { action: 'wrong', expect: 'patience pressure changes' },
  { action: 'retry', expect: 'fresh run after GAMEOVER' }
]);

GF.init({
  designW: 800,
  designH: 600,
  strings: STRINGS,
  saveKey: 'food_culture_rpg_v1',
  onReady: function() {
    GF.persist('food_culture_rpg_meta_v1', getMeta, applyMeta);
    startRun();
    GF.bgMusic({ file: 'audio/bg_track.mp3', preset: 'warm', muted: GF.muted });
  },
  onUpdate: update,
  onDraw: draw
});
})();
</script>
</body>
</html>
