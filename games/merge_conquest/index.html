            // Append this run to history, capped at 5 most recent.
            if (!Array.isArray(save.endlessHistory)) save.endlessHistory = [];
            save.endlessHistory.unshift({ score: endlessWave, ts: Date.now() });
            save.endlessHistory = save.endlessHistory.slice(0, 5);
            save.carryUnits = [];
            saveToDisk();
            gaProgress(GA_PROGRESSION_FAIL, "endless", "wave_" + (endlessWave + 1), "", endlessWave);
            gaEvent("endless:run_end", endlessWave);
            submitEndlessScoreToLeaderboard(endlessWave);
            fetchEndlessLeaderboard();
            return;
        }
        // Campaign path:
        gaProgress(GA_PROGRESSION_FAIL, "campaign", "level_" + (currentLevel + 1));
        gaEvent("campaign:level_fail", currentLevel + 1);
        save.carryUnits = [];
        saveToDisk();
    }
}

// AI Logic -- priority action helpers
function aiFinishWounded(state) {
    if (state.ap <= 0) return;
    var kills = [];
    for (var i = 0; i < grid.length; i++) {
        var cell = grid[i];
        if (cell.owner !== OWNER_AI || cell.tier === 0) continue;
        // v17 — healers don't initiate combat; they only heal in runHealerPass.
        if (cell.variant === VARIANT_HEALER) continue;
        var neighbors = getNeighbors(cell.col, cell.row);
        for (var j = 0; j < neighbors.length; j++) {
            var nb = getCell(neighbors[j].col, neighbors[j].row);
            if (canAttack(cell, nb) && nb.tier > 0 && nb.hp <= BASE_TIER_STATS[cell.tier].atk) {
                kills.push({ attacker: cell, target: nb, targetTier: nb.tier });
            }
        }
    }
    kills.sort(function(a, b) { return b.targetTier - a.targetTier; });
    for (var i = 0; i < kills.length && state.ap > 0; i++) {
        var k = kills[i];
        if (state.isUsed(k.attacker) || k.target.tier === 0) continue;
        doAttack(k.attacker, k.target);
        state.markUsed(k.attacker);
        state.ap--;
    }
}

function aiExpand(state) {
    if (state.ap <= 0) return;
    var expansions = [];
    for (var i = 0; i < grid.length; i++) {
        var cell = grid[i];
        if (cell.owner !== OWNER_AI || cell.tier === 0 || state.isUsed(cell)) continue;
        var neighbors = getNeighbors(cell.col, cell.row);
        for (var j = 0; j < neighbors.length; j++) {
            var nb = getCell(neighbors[j].col, neighbors[j].row);
            if (canAttack(cell, nb) && nb.tier === 0) {
                var nbNeighbors = getNeighbors(nb.col, nb.row);
                var score = 0;
                for (var k = 0; k < nbNeighbors.length; k++) {
                    var nnb = getCell(nbNeighbors[k].col, nbNeighbors[k].row);
                    if (nnb.owner !== OWNER_AI) score++;
                }
                expansions.push({ attacker: cell, target: nb, score: score });
            }
        }
    }
    expansions.sort(function(a, b) { return b.score - a.score; });
    for (var i = 0; i < expansions.length && state.ap > 0; i++) {
        var e = expansions[i];
        if (state.isUsed(e.attacker) || e.target.tier !== 0 || e.target.owner === OWNER_AI) continue;
        doAttack(e.attacker, e.target);
        state.markUsed(e.attacker);
        state.ap--;
    }
}

function aiMerge(state, reserveAP) {
    if (state.ap <= 0) return;
    var hasOtherOpportunities = false;
    if (reserveAP) {
        for (var i = 0; i < grid.length && !hasOtherOpportunities; i++) {
            var cell = grid[i];
            if (cell.owner !== OWNER_AI || cell.tier === 0 || state.isUsed(cell)) continue;
            var neighbors = getNeighbors(cell.col, cell.row);
            for (var j = 0; j < neighbors.length; j++) {
                var nb = getCell(neighbors[j].col, neighbors[j].row);
                if (canAttack(cell, nb)) { hasOtherOpportunities = true; break; }
            }
        }
    }
    var merges = [];
    for (var i = 0; i < grid.length; i++) {
        var cell = grid[i];
        if (cell.owner !== OWNER_AI || cell.tier === 0) continue;
        // v17 — healers don't initiate combat; they only heal in runHealerPass.
        if (cell.variant === VARIANT_HEALER) continue;
        var neighbors = getNeighbors(cell.col, cell.row);
        for (var j = 0; j < neighbors.length; j++) {
            var nb = getCell(neighbors[j].col, neighbors[j].row);
            if (canMerge(cell, nb)) {
                merges.push({ a: cell, b: nb, tier: cell.tier });
            }
        }
    }
    merges.sort(function(a, b) { return b.tier - a.tier; });
    for (var i = 0; i < merges.length && state.ap > 0; i++) {
        if (reserveAP && state.ap === 1 && hasOtherOpportunities) break;
        var m = merges[i];
        if (canMerge(m.a, m.b)) {
            doMerge(m.a, m.b);
            state.ap--;
        }
    }
}

function aiAttackWithAdvantage(state, cautiousOnly) {
    if (state.ap <= 0) return;
    var attacks = [];
    for (var i = 0; i < grid.length; i++) {
        var cell = grid[i];
        if (cell.owner !== OWNER_AI || cell.tier === 0 || state.isUsed(cell)) continue;
        var neighbors = getNeighbors(cell.col, cell.row);
        for (var j = 0; j < neighbors.length; j++) {
            var nb = getCell(neighbors[j].col, neighbors[j].row);
            if (!canAttack(cell, nb) || nb.tier === 0) continue;
            var myAtk = BASE_TIER_STATS[cell.tier].atk;
            var theirAtk = BASE_TIER_STATS[nb.tier].atk;
            var myHpAfter = cell.hp - theirAtk;
            var theirHpAfter = nb.hp - myAtk;
            var iSurvive = myHpAfter > 0;
            var theyDie = theirHpAfter <= 0;
            if (cautiousOnly) {
                // Only attack guaranteed kills
                if (theyDie) attacks.push({ attacker: cell, target: nb, score: iSurvive ? 3 : 1 });
            } else {
                if (iSurvive && theyDie) {
                    attacks.push({ attacker: cell, target: nb, score: 3 });
                } else if (!iSurvive && theyDie && cell.tier < nb.tier) {
                    attacks.push({ attacker: cell, target: nb, score: 1 });
                } else if (iSurvive && theirHpAfter <= nb.maxHp * 0.3) {
                    attacks.push({ attacker: cell, target: nb, score: 2 });
                }
            }
        }
    }
    attacks.sort(function(a, b) { return b.score - a.score; });
    for (var i = 0; i < attacks.length && state.ap > 0; i++) {
        var a = attacks[i];
        if (state.isUsed(a.attacker) || a.target.tier === 0) continue;
        doAttack(a.attacker, a.target);
        state.markUsed(a.attacker);
        state.ap--;
    }
}

function aiMoveToFront(state) {
    if (state.ap <= 0) return;
    for (var i = 0; i < grid.length && state.ap > 0; i++) {
        var cell = grid[i];
        if (cell.owner !== OWNER_AI || cell.tier === 0 || state.isUsed(cell)) continue;
        var onFront = false;
        var neighbors = getNeighbors(cell.col, cell.row);
        for (var j = 0; j < neighbors.length; j++) {
            var nb = getCell(neighbors[j].col, neighbors[j].row);
            if (nb.owner !== OWNER_AI) { onFront = true; break; }
        }
        if (onFront) continue;
        var bestMove = null, bestScore = -Infinity;
        for (var j = 0; j < neighbors.length; j++) {
            var nb = getCell(neighbors[j].col, neighbors[j].row);
            if (!canMove(cell, nb)) continue;
            var nbNeighbors = getNeighbors(nb.col, nb.row);
            var frontCount = 0;
            for (var k = 0; k < nbNeighbors.length; k++) {
                var nnb = getCell(nbNeighbors[k].col, nbNeighbors[k].row);
                if (nnb.owner !== OWNER_AI) frontCount++;
            }
            if (frontCount > bestScore) { bestScore = frontCount; bestMove = nb; }
        }
        if (bestMove && bestScore > 0) {
            doMove(cell, bestMove);
            state.markUsed(cell);
            state.ap--;
        }
    }
}

function aiTurn() {
    var level = LEVELS[currentLevel];
    var used = {};
    var state = {
        ap: level.aiAP,
        markUsed: function(cell) { used[cell.row * COLS + cell.col] = true; },
        isUsed: function(cell) { return !!used[cell.row * COLS + cell.col]; }
    };

    // v17 — reset shield uses + run healer pass before AI acts.
    resetTurnVariantState();
    runHealerPass(OWNER_AI);

    // Spawn AI units first
    spawnUnits(OWNER_AI);

    // v17 — Boss reinforcements. On boss levels (any level with a commander),
    // every 3rd turn the AI gets a wave of extra spawns. Telegraphed via a
    // floating-text banner so the player knows what just happened. This is
    // the "boss feels different" mechanic — without it, boss levels are just
    // levels with more starting tiles, which is the boredom-wall trap.
    var bossCmd = getCommanderForLevel && getCommanderForLevel(currentLevel);
    if (bossCmd && gameMode !== "endless" && turnNumber > 0 && (turnNumber % 3 === 0)) {
        // Extra wave: temporarily boost AI spawn count by 2 and re-run
        // spawnUnits. We use the same spawnUnits path so variant rolling
        // still applies (and rarer variants are more likely to appear here).
        var reinforceCount = 2;
        var emptyAi = [];
        for (var ei = 0; ei < grid.length; ei++) {
            if (grid[ei].owner === OWNER_AI && grid[ei].tier === 0) emptyAi.push(ei);
        }
        shuffle(emptyAi);
        var reinHp = aiHp(1);
        var reinSpawned = 0;
        for (var ri = 0; ri < emptyAi.length && reinSpawned < reinforceCount; ri++) {
            grid[emptyAi[ri]].tier = 1;
            grid[emptyAi[ri]].hp = reinHp;
            grid[emptyAi[ri]].maxHp = reinHp;
            grid[emptyAi[ri]].animScale = 0.1;
            grid[emptyAi[ri]].variant = rollAiVariant();
            grid[emptyAi[ri]].shieldUsedThisTurn = false;
            reinSpawned++;
        }
        if (reinSpawned > 0) {
            // Banner — re-use the existing aiTurnBanner channel.
            aiTurnBannerActive = true;
            aiTurnBannerAt = Date.now();
            // Floating text near the boss commander's portrait-ish area
            spawnFloatingText(Math.floor(COLS / 2), 0, currentLang === "ru" ? "ПОДКРЕПЛЕНИЕ!" : "REINFORCEMENTS!", "#E53935");
            SFX.enemyTurn && SFX.enemyTurn();
        }
    }

    var mode = level.aiBehavior;

    if (mode === "passive") {
        // Only expand into empty tiles
        aiExpand(state);
        aiMoveToFront(state);
    } else if (mode === "expand") {
        // Expand and merge, never attack units
        aiExpand(state);
        aiMerge(state, false);
        aiMoveToFront(state);
    } else if (mode === "cautious") {
        // Full system but only attacks guaranteed kills
        aiFinishWounded(state);
        aiExpand(state);
        aiMerge(state, true);
        aiAttackWithAdvantage(state, true); // cautious: only guaranteed kills
        aiMoveToFront(state);
    } else if (mode === "aggressive") {
        // Attack before merge (swapped priorities 3 and 4)
        aiFinishWounded(state);
        aiExpand(state);
        aiAttackWithAdvantage(state, false);
        aiMerge(state, false);
        aiMoveToFront(state);
    } else {
        // "full" -- standard priority order
        aiFinishWounded(state);
        aiExpand(state);
        aiMerge(state, true);
        aiAttackWithAdvantage(state, false);
        aiMoveToFront(state);
    }
}

function endTurn() {
    if (tutorialStep === 12) tutorialStep = 13; // v11.7: L2 tutorial done
    if (autoEndTurnTimer) {
        clearTimeout(autoEndTurnTimer);
        autoEndTurnTimer = 0;
    }
    selectedCell = null;
    SFX.endTurn();
    setTimeout(function(){ SFX.enemyTurn(); }, 140);
    // Snapshot grid state before AI turn to detect changed cells
    var beforeSnap = grid.map(function(c) { return { owner: c.owner, tier: c.tier }; });
    // AI turn
    aiTurn();
    // Build flash map: which cells changed owner or tier during AI turn
    aiTurnFlash = {};
    for (var _fi = 0; _fi < grid.length; _fi++) {
        if (grid[_fi].owner !== beforeSnap[_fi].owner || grid[_fi].tier !== beforeSnap[_fi].tier) {
            aiTurnFlash[_fi] = 1;
        }
    }
    turnNumber++;
    checkWinLose();
    if (gameState === STATE_PLAY) {
        // v17 — reset shield uses for the upcoming player turn.
        resetTurnVariantState();
        // Spawn player units at start of new turn
        spawnUnits(OWNER_PLAYER);
        // Reset player AP (with upgrade bonus)
        ap = getPlayerAP();
        // Show "Enemy Turn" banner so player can see what the AI did
        aiTurnBannerActive = true;
        aiTurnBannerAt = Date.now();
    }
}

// Drawing
function drawHex(cx, cy, size) {
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
        var angle = Math.PI / 180 * (60 * i - 30);
        var x = cx + size * Math.cos(angle);
        var y = cy + size * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
}

function getOwnerColor(owner) {
    if (owner === OWNER_PLAYER) return COLORS.player;
    if (owner === OWNER_AI) return COLORS.ai;
    return COLORS.neutral;
}

function getOwnerStroke(owner) {
    if (owner === OWNER_PLAYER) return COLORS.playerStroke;
    if (owner === OWNER_AI) return COLORS.aiStroke;
    return COLORS.neutralStroke;
}

function getOwnerHi(owner) {
    if (owner === OWNER_PLAYER) return COLORS.playerLight;
    if (owner === OWNER_AI) return COLORS.aiLight;
    return COLORS.neutralHi;
}

function shadeColor(hex, percent) {
    var num = parseInt(hex.replace("#",""), 16);
    var r = Math.min(255, Math.max(0, (num >> 16) + percent));
    var g = Math.min(255, Math.max(0, ((num >> 8) & 0xFF) + percent));
    var b = Math.min(255, Math.max(0, (num & 0xFF) + percent));
    return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function drawUnit(cx, cy, tier, owner, scale, hp, maxHp, variant) {
    if (tier <= 0) return;
    var s = HEX_SIZE * 0.5 * scale;
    var color = COLORS.tierColors[tier - 1];
    var glow = COLORS.tierGlow[tier - 1];

    ctx.save();
    ctx.translate(cx, cy);

    // Glow for T4/T5
    if (glow) {
        ctx.shadowBlur = tier === 5 ? 14 : 10;
        ctx.shadowColor = glow;
    }

    if (tier === 1) {
        // Recruit: simple sword per design spec
        ctx.fillStyle = color;
        ctx.fillRect(-2, -s * 0.7, 4, s * 1.1);
        ctx.fillStyle = "#555555";
        ctx.fillRect(-s * 0.35, s * 0.25, s * 0.7, 3);
        ctx.fillStyle = "#3D2B1A";
        ctx.fillRect(-2, s * 0.35, 4, s * 0.35);
        ctx.fillStyle = "#555555";
        ctx.beginPath();
        ctx.arc(0, s * 0.75, 2.5, 0, Math.PI * 2);
        ctx.fill();
    } else if (tier === 2) {
        // Soldier: shield + sword
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(-s * 0.1, -s * 0.6);
        ctx.lineTo(-s * 0.55, -s * 0.3);
        ctx.lineTo(-s * 0.45, s * 0.45);
        ctx.lineTo(-s * 0.1, s * 0.6);
        ctx.lineTo(s * 0.15, s * 0.45);
        ctx.lineTo(s * 0.25, -s * 0.3);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 2;
        ctx.stroke();
        // Shield cross
        ctx.strokeStyle = "#FFFFFF";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-s * 0.15, -s * 0.15);
        ctx.lineTo(-s * 0.15, s * 0.25);
        ctx.moveTo(-s * 0.35, s * 0.05);
        ctx.lineTo(s * 0.05, s * 0.05);
        ctx.stroke();
        // Sword (right, angled)
        ctx.save();
        ctx.translate(s * 0.35, -s * 0.1);
        ctx.rotate(0.35);
        ctx.fillStyle = color;
        ctx.fillRect(-1.5, -s * 0.65, 3, s * 0.85);
        ctx.fillStyle = "#555555";
        ctx.fillRect(-4, s * 0.1, 8, 2);
        ctx.fillStyle = "#3D2B1A";
        ctx.fillRect(-1.5, s * 0.15, 3, s * 0.25);
        ctx.restore();
    } else if (tier === 3) {
        // Knight: mounted silhouette
        var sc = 0.55;
        ctx.save();
        ctx.scale(sc, sc);
        ctx.fillStyle = "#3D2B1A";
        ctx.beginPath();
        ctx.ellipse(0, 8, 14, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(14, -2, 5, 4, -0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#3D2B1A";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-8, 14); ctx.lineTo(-8, 22);
        ctx.moveTo(-3, 14); ctx.lineTo(-3, 22);
        ctx.moveTo(5, 14); ctx.lineTo(5, 22);
        ctx.moveTo(10, 14); ctx.lineTo(10, 22);
        ctx.stroke();
        ctx.fillStyle = color;
        ctx.fillRect(-3, -10, 6, 14);
        ctx.beginPath();
        ctx.arc(0, -13, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = COLORS.text;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(6, -14); ctx.lineTo(18, -2);
        ctx.stroke();
        ctx.restore();
    } else if (tier === 4) {
        // Champion: armored figure with glow
        ctx.fillStyle = color;
        ctx.fillRect(-s * 0.35, -s * 0.35, s * 0.7, s * 0.75);
        ctx.beginPath();
        ctx.arc(0, -s * 0.45, s * 0.35, Math.PI, 0);
        ctx.fill();
        ctx.fillStyle = "#1A1A1A";
        ctx.fillRect(-s * 0.18, -s * 0.5, s * 0.36, 2);
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.arc(-s * 0.45, -s * 0.2, s * 0.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(s * 0.45, -s * 0.2, s * 0.2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#FFD700";
        ctx.fillRect(s * 0.55, -s * 0.7, 3, s * 1.1);
        ctx.fillStyle = "#555";
        ctx.fillRect(s * 0.4, s * 0.3, s * 0.35, 2);
        var darkerTC = shadeColor(color, -30);
        ctx.fillStyle = darkerTC;
        ctx.fillRect(-s * 0.28, s * 0.4, s * 0.22, s * 0.4);
        ctx.fillRect(s * 0.06, s * 0.4, s * 0.22, s * 0.4);
    } else if (tier === 6) {
        // T6 Dragon Lord (v11) — visually dominant: dual aura rings, dragon
        // silhouette with horns + wings, 8 orbital particles.
        var pulse6 = 0.45 + 0.35 * Math.sin(gameTime * 0.0035);
        ctx.globalAlpha = pulse6;
        // Outer ring (red)
        ctx.strokeStyle = "#FF3030";
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(0, 0, s * 1.45, 0, Math.PI * 2); ctx.stroke();
        // Inner ring (gold)
        ctx.strokeStyle = "#FFD700";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, s * 1.05, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 1;

        // Wings (behind body)
        ctx.fillStyle = shadeColor(color, -50);
        ctx.beginPath();
        ctx.moveTo(-s * 0.5, -s * 0.1);
        ctx.lineTo(-s * 1.1, -s * 0.6);
        ctx.lineTo(-s * 0.9, s * 0.2);
        ctx.closePath(); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(s * 0.5, -s * 0.1);
        ctx.lineTo(s * 1.1, -s * 0.6);
        ctx.lineTo(s * 0.9, s * 0.2);
        ctx.closePath(); ctx.fill();

        // Body (broad shoulders)
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.5);
        ctx.lineTo(-s * 0.65, s * 0.75);
        ctx.lineTo(s * 0.65, s * 0.75);
        ctx.closePath(); ctx.fill();

        // Head with horns
        ctx.fillStyle = shadeColor(color, -40);
        ctx.beginPath(); ctx.arc(0, -s * 0.5, s * 0.32, Math.PI, 0); ctx.fill();
        // Horns
        ctx.fillStyle = "#1A0A05";
        ctx.beginPath();
        ctx.moveTo(-s * 0.3, -s * 0.7); ctx.lineTo(-s * 0.45, -s * 1.05); ctx.lineTo(-s * 0.18, -s * 0.7);
        ctx.closePath(); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(s * 0.3, -s * 0.7); ctx.lineTo(s * 0.45, -s * 1.05); ctx.lineTo(s * 0.18, -s * 0.7);
        ctx.closePath(); ctx.fill();
        // Glowing red eyes
        ctx.shadowBlur = 8; ctx.shadowColor = "#FF2020";
        ctx.fillStyle = "#FF2020";
        ctx.beginPath(); ctx.arc(-s * 0.12, -s * 0.42, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(s * 0.12, -s * 0.42, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = glow ? 14 : 0;

        // Orbital particles (8, faster than T5)
        for (var di = 0; di < 8; di++) {
            var da = gameTime * 0.0028 + di * (Math.PI * 2 / 8);
            var dr = s * 0.7 + s * 0.4 * Math.sin(gameTime * 0.0015 + di);
            var dpx = Math.cos(da) * dr;
            var dpy = Math.sin(da) * dr;
            var dc = ["#FF6B35", "#FFD700", "#FF2020"][di % 3];
            ctx.fillStyle = dc;
            ctx.globalAlpha = 0.6 + 0.4 * Math.sin(gameTime * 0.006 + di);
            ctx.beginPath(); ctx.arc(dpx, dpy, 2, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
    } else if (tier === 5) {
        // War Mage: robed with magic aura
        var pulse = 0.4 + 0.3 * Math.sin(gameTime * 0.003);
        ctx.globalAlpha = pulse;
        ctx.strokeStyle = COLORS.tierGlow[4];
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0, 0, s * 1.2, 0, Math.PI * 2); ctx.stroke();
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.5;
        ctx.beginPath(); ctx.arc(0, 0, s * 0.85, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.6);
        ctx.lineTo(-s * 0.55, s * 0.7);
        ctx.lineTo(s * 0.55, s * 0.7);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = shadeColor(color, -40);
        ctx.beginPath(); ctx.arc(0, -s * 0.55, s * 0.3, Math.PI, 0); ctx.fill();
        ctx.fillStyle = "#1A1A1A";
        ctx.beginPath(); ctx.arc(0, -s * 0.42, s * 0.18, 0, Math.PI); ctx.fill();
        ctx.strokeStyle = "#3D2B1A"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-s * 0.5, -s * 0.6); ctx.lineTo(-s * 0.5, s * 0.8); ctx.stroke();
        ctx.shadowBlur = 6; ctx.shadowColor = "#FFD700";
        ctx.fillStyle = "#FFD700";
        ctx.beginPath(); ctx.arc(-s * 0.5, -s * 0.65, 3, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = glow ? 14 : 0;
        for (var pi = 0; pi < 6; pi++) {
            var pa = gameTime * 0.002 + pi * 1.05;
            var pr = s * 0.5 + s * 0.35 * Math.sin(gameTime * 0.001 + pi);
            var ppx = Math.cos(pa) * pr;
            var ppy = Math.sin(pa) * pr;
            var pc = ["#FFD700", "#FF6B35", "#FFFFFF"][pi % 3];
            ctx.fillStyle = pc;
            ctx.globalAlpha = 0.6 + 0.4 * Math.sin(gameTime * 0.005 + pi);
            ctx.beginPath(); ctx.arc(ppx, ppy, 1.5, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    ctx.shadowBlur = 0;
    ctx.restore();

    // Tier number badge
    var badgeX = cx + s * 0.65;
    var badgeY = cy + s * 0.55;
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.beginPath();
    ctx.arc(badgeX, badgeY, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.font = "700 9px " + FONT_BODY;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("T" + tier, badgeX, badgeY);

    // v17 — variant indicator (top-left of unit). Berserker = red dagger,
    // Healer = green cross, Shielder = blue shield. Pure visual signal so
    // players can see which enemy is which at a glance.
    if (variant) {
        var vx = cx - s * 0.6;
        var vy = cy - s * 0.55;
        var vr = 8;
        var vColor = variant === VARIANT_BERSERKER ? "#E53935"
                   : variant === VARIANT_HEALER    ? "#43A047"
                   : variant === VARIANT_SHIELDER  ? "#2196F3"
                   : "#888";
        ctx.fillStyle = vColor;
        ctx.beginPath();
        ctx.arc(vx, vy, vr, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.6)";
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = "#fff";
        ctx.font = "700 9px " + FONT_BODY;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        var glyph = variant === VARIANT_BERSERKER ? "!"
                  : variant === VARIANT_HEALER    ? "+"
                  : variant === VARIANT_SHIELDER  ? "◇"
                  : "?";
        ctx.fillText(glyph, vx, vy + 0.5);
    }

    // HP bar
    if (hp !== undefined && maxHp > 0) {
        var barW = 22, barH = 3;
        var barX = cx - barW / 2;
        var barY = cy + HEX_SIZE * 0.48;
        var hpRatio = Math.max(0, hp / maxHp);
        // Background
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
        // HP fill (green to red)
        if (hpRatio > 0.5) {
            ctx.fillStyle = "#4caf50";
        } else if (hpRatio > 0.25) {
            ctx.fillStyle = "#ff9800";
        } else {
            ctx.fillStyle = "#f44336";
        }
        ctx.fillRect(barX, barY, barW * hpRatio, barH);
    }
}

function drawStar(cx, cy, spikes, outerR, innerR) {
    var rot = Math.PI / 2 * 3;
    var step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(cx, cy - outerR);
    for (var i = 0; i < spikes; i++) {
        ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
        rot += step;
        ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
        rot += step;
    }
    ctx.closePath();
}

function drawActionBadge(cx, cy, type, color) {
    var label = type === "merge" ? t("action_merge") : (type === "attack" ? t("action_attack") : t("action_move"));
    var y = cy - HEX_SIZE * 0.58;
    var font = "800 " + (isPortraitLayout() ? "11px " : "10px ") + FONT_BODY;
    ctx.font = font;
    var w = Math.min(HEX_SIZE * 1.55, ctx.measureText(label).width + 12);
    var h = isPortraitLayout() ? 18 : 16;
    ctx.globalAlpha = 0.96;
    ctx.fillStyle = color;
    ctx.beginPath();
    roundRect(cx - w / 2, y - h / 2, w, h, 7);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = "#071018";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = fitFontToWidth(label, w - 6, font, 8);
    ctx.fillText(label, cx, y + 0.5);
}

function drawGrid() {
    for (var i = 0; i < grid.length; i++) {
        var cell = grid[i];
        var pos = hexToPixel(cell.col, cell.row);

        // Animate scale
        if (cell.animScale > 1.01) {
            cell.animScale += (1 - cell.animScale) * 0.15;
        } else if (cell.animScale < 0.99) {
            cell.animScale += (1 - cell.animScale) * 0.12;
        } else {
            cell.animScale = 1;
        }

        // Idle bob for units
        var bobY = 0;
        if (cell.tier > 0) {
            bobY = Math.sin(gameTime * 0.002 + cell.bobOffset) * 2;
        }

        var isSelected = selectedCell && selectedCell.col === cell.col && selectedCell.row === cell.row;
        var isHover = hoverCell && hoverCell.col === cell.col && hoverCell.row === cell.row;
        var highlightType = 0;
        var actionType = null;

        if (selectedCell && !isSelected && ap > 0) {
            var selCell = getCell(selectedCell.col, selectedCell.row);
            actionType = getActionType(selCell, cell);
            if (actionType === "merge") highlightType = 1;
            else if (actionType === "attack") highlightType = 2;
            else if (actionType === "move") highlightType = 3;
        }

        // v11.6: blocked cells render as dark rock tiles — completely
        // distinct visual + no unit can step on them.
        if (cell.blocked) {
            drawHex(pos.x, pos.y, HEX_SIZE - 2);
            ctx.fillStyle = "#2A2520";  // dark rock fill
            ctx.fill();
            ctx.strokeStyle = "#1A1612";
            ctx.lineWidth = 1.5;
            ctx.stroke();
            // Rock texture: 3 small grey blobs
            ctx.fillStyle = "#3A3530";
            ctx.beginPath(); ctx.arc(pos.x - HEX_SIZE * 0.3, pos.y - HEX_SIZE * 0.15, HEX_SIZE * 0.18, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(pos.x + HEX_SIZE * 0.25, pos.y + HEX_SIZE * 0.1, HEX_SIZE * 0.22, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#4A4540";
            ctx.beginPath(); ctx.arc(pos.x - HEX_SIZE * 0.05, pos.y + HEX_SIZE * 0.3, HEX_SIZE * 0.14, 0, Math.PI * 2); ctx.fill();
            continue; // skip unit/highlight rendering for blocked cells
        }

        // Hex background with 50% alpha per design spec
        drawHex(pos.x, pos.y, HEX_SIZE - 2);
        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = getOwnerColor(cell.owner);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Flash overlay for cells changed by AI this turn
        if (aiTurnBannerActive && aiTurnFlash[i]) {
            var flashProg = Math.min(1, (Date.now() - aiTurnBannerAt) / 900);
            ctx.globalAlpha = 0.45 * (1 - flashProg);
            ctx.fillStyle = COLORS.aiLight;
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        // Hover brighten
        if (isHover && !isSelected && gameState === STATE_PLAY) {
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = getOwnerHi(cell.owner);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        // Highlight
        if (isSelected) {
            ctx.strokeStyle = COLORS.selected;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 8;
            ctx.shadowColor = getOwnerHi(cell.owner);
            ctx.stroke();
            ctx.shadowBlur = 0;
        } else if (highlightType === 1) {
            ctx.strokeStyle = COLORS.mergeable;
            ctx.lineWidth = 3;
            ctx.stroke();
        } else if (highlightType === 2) {
            ctx.strokeStyle = COLORS.attackable;
            ctx.lineWidth = 3;
            ctx.stroke();
        } else if (highlightType === 3) {
            ctx.strokeStyle = COLORS.moveable;
            ctx.lineWidth = 2;
            ctx.stroke();
        } else {
            ctx.strokeStyle = getOwnerStroke(cell.owner);
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        ctx.restore();

        // Draw unit with bob
        if (cell.tier > 0) {
            drawUnit(pos.x, pos.y + bobY, cell.tier, cell.owner, cell.animScale, cell.hp, cell.maxHp, cell.variant);
        }

        if (actionType) {
            var badgeColor = actionType === "merge" ? COLORS.mergeable : (actionType === "attack" ? COLORS.attackable : COLORS.moveable);
            drawActionBadge(pos.x, pos.y, actionType, badgeColor);
        }
    }
}

function drawParticles() {
    for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.life--;
        if (p.life <= 0) {
            particles.splice(i, 1);
            continue;
        }
        var alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

function drawFloatingTexts() {
    for (var i = floatingTexts.length - 1; i >= 0; i--) {
        var ft = floatingTexts[i];
        ft.y -= 0.8;
        ft.life--;
        if (ft.life <= 0) {
            floatingTexts.splice(i, 1);
            continue;
        }
        var alpha = ft.life / ft.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = ft.color;
        ctx.font = "700 14px " + FONT_BODY;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(ft.text, ft.x, ft.y);
    }
    ctx.globalAlpha = 1;
}

function drawUI() {
    // Top bar per design spec
    var topH = isPortraitLayout() ? 50 : 42;
    ctx.fillStyle = COLORS.panel;
    ctx.fillRect(0, 0, W, topH);
    ctx.strokeStyle = COLORS.gridLine;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, topH); ctx.lineTo(W, topH); ctx.stroke();

    var playerTiles = 0, aiTiles = 0, playerUnits = 0, aiUnits = 0;
    for (var i = 0; i < grid.length; i++) {
        if (grid[i].owner === OWNER_PLAYER) { playerTiles++; if (grid[i].tier > 0) playerUnits++; }
        if (grid[i].owner === OWNER_AI) { aiTiles++; if (grid[i].tier > 0) aiUnits++; }
    }

    ctx.textBaseline = "middle";

    ctx.textAlign = "left";
    var playerText = isPortraitLayout()
        ? ("You " + playerTiles + "/" + playerUnits)
        : t("hud_player", { tiles: playerTiles, units: playerUnits });
    // Cap width at (W/2 - 80) so the text never bleeds into the centered
    // "Lv.X / TURN Y" cluster. Auto-shrinks under long translations.
    ctx.font = fitFontToWidth(playerText, (W / 2 - 80) - 12, "600 14px " + FONT_BODY, 10);
    ctx.fillStyle = COLORS.playerStroke;
    ctx.fillText(playerText, 12, topH / 2);

    // Level name (left-of-center) and turn counter (right-of-center)
    ctx.textAlign = "right";
    ctx.font = "600 12px " + FONT_BODY;
    ctx.fillStyle = COLORS.textDark;
    var levelLabel = (gameMode === "endless")
        ? t("endless_wave", { n: endlessWave + 1 })
        : t("hud_level", { level: currentLevel + 1, name: getLevelDisplayName(currentLevel) });
    ctx.fillText(levelLabel, W / 2 - 8, topH / 2);
    // Separator dot
    ctx.fillStyle = COLORS.gridLine;
    ctx.beginPath();
    ctx.arc(W / 2, topH / 2, 2, 0, Math.PI * 2);
    ctx.fill();
    // Turn number
    ctx.textAlign = "left";
    ctx.font = "700 13px " + FONT_TITLE;
    ctx.fillStyle = COLORS.gold;
    ctx.fillText(t("hud_turn", { turn: turnNumber }), W / 2 + 8, topH / 2);

    ctx.textAlign = "right";
    // v9: right-edge shifted W-44 → W-76 to clear the mute (W-66..W-40)
    // and hamburger (W-34..W-8) icons. RU enemy string is wider than EN
    // and was being overlaid by the mute icon. Shrink-to-fit guards
    // against further overflow.
    var enemyText = isPortraitLayout()
        ? ("Enemy " + aiTiles + "/" + aiUnits)
        : t("hud_enemy", { tiles: aiTiles, units: aiUnits });
    // v11.7: right-edge W-76 → W-108 to clear new missions icon (W-98..W-72).
    ctx.font = fitFontToWidth(enemyText, (W - 108) - (W / 2 + 80), "600 14px " + FONT_BODY, 10);
    ctx.fillStyle = COLORS.aiStroke;
    ctx.fillText(enemyText, W - 108, topH / 2);

    // Menu / Levels icon button — top-right corner. Single tap returns to
    // Level Select where Campaign + Endless + Upgrades nav lives. Without
    // this, the in-game flow had no escape hatch other than winning or
    // losing the current level, which meant new modes (Endless) were
    // undiscoverable mid-campaign. Added 2026-05-14.
    var menuBtnX = W - 34, menuBtnY = 8, menuBtnSize = 26;
    ctx.fillStyle = COLORS.panelAlt;
    ctx.beginPath();
    roundRect(menuBtnX, menuBtnY, menuBtnSize, menuBtnSize, 4);
    ctx.fill();
    ctx.strokeStyle = COLORS.gridLine;
    ctx.lineWidth = 1;
    ctx.beginPath();
    roundRect(menuBtnX, menuBtnY, menuBtnSize, menuBtnSize, 4);
    ctx.stroke();
    // Hamburger bars
    ctx.strokeStyle = COLORS.text;
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    var barX1 = menuBtnX + 6, barX2 = menuBtnX + menuBtnSize - 6;
    for (var bi = 0; bi < 3; bi++) {
      var barY = menuBtnY + 8 + bi * 5;
      ctx.beginPath();
      ctx.moveTo(barX1, barY);
      ctx.lineTo(barX2, barY);
      ctx.stroke();
    }

    // Mute toggle — sits left of the hamburger
    drawMuteToggle();
    drawMissionsHudBtn(); // v11.7: missions icon left of mute

    // v13.4: in WIN/LOSE the modal owns the bottom stack — skip End Turn,
    // AP pips, selected-unit chip, and the bottom hint so they don't bleed
    // through the defeat scrim (Tim's 2026-05-19 screenshot showed "Tap a
    // blue unit" + a fully-rendered End Turn button behind the modal).
    if (gameState === STATE_WIN || gameState === STATE_LOSE) return;

    // End Turn button (gold per design spec, pulse when AP=0)
    var endRect = getEndTurnRect();
    var btnX = endRect.x, btnY = endRect.y, btnW = endRect.w, btnH = endRect.h;
    if (ap === 0) {
        var pulse = 0.85 + 0.15 * Math.sin(gameTime * 0.005);
        ctx.shadowBlur = 10;
        ctx.shadowColor = COLORS.gold;
        ctx.globalAlpha = pulse;
    }
    ctx.fillStyle = COLORS.gold;
    ctx.beginPath();
    roundRect(btnX, btnY, btnW, btnH, 6);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    ctx.fillStyle = COLORS.bg;
    ctx.font = (isPortraitLayout() ? "800 18px " : "600 16px ") + FONT_BODY;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(t("hud_end_turn"), W / 2, btnY + btnH / 2);

    // AP counter — numeric label + pips in one centered group
    // v13.2 portrait: lifted from btnY-24 → btnY-50 so the new above-button
    // hint bar (btnY-28..btnY-2) doesn't collide with the pips.
    var apY = btnY - (isPortraitLayout() ? 50 : 20);
    var maxAp = getPlayerAP();
    var apLabel = t("hud_ap") + ": " + ap + "/" + maxAp;
    ctx.font = "600 12px " + FONT_BODY;
    var labelW = ctx.measureText(apLabel).width;
    var pipDiam = 10, pipGap = 4;
    var totalPipW = maxAp * pipDiam + (maxAp - 1) * pipGap;
    var groupW = labelW + 8 + totalPipW;
    var groupX = W / 2 - groupW / 2;
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillStyle = ap > 0 ? COLORS.text : COLORS.textDark;
    ctx.fillText(apLabel, groupX, apY);
    var pipStartX = groupX + labelW + 8 + pipDiam / 2;
    for (var i = 0; i < maxAp; i++) {
        var pipX = pipStartX + i * (pipDiam + pipGap);
        ctx.beginPath();
        ctx.arc(pipX, apY, pipDiam / 2, 0, Math.PI * 2);
        ctx.fillStyle = i < ap ? COLORS.gold : COLORS.panelAlt;
        ctx.fill();
        ctx.strokeStyle = i < ap ? "#D4B36A" : COLORS.gridLine;
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    // Selected unit info
    if (selectedCell) {
        var selCell = getCell(selectedCell.col, selectedCell.row);
        if (selCell.tier > 0) {
            // v13.2 portrait: 1-row chip ABOVE the AP/hint/EndTurn stack so
            // nothing overlaps. Was 48h two-line panel that collided with AP.
            var portrait = isPortraitLayout();
            ctx.fillStyle = "rgba(26,35,50,0.92)";
            var infoY = portrait ? (btnY - 100) : (H - 118);
            var infoH = portrait ? 36 : 48;
            var infoW = portrait ? Math.min(W - 16, 240) : 185;
            var infoX = portrait ? (W - infoW) / 2 : 8;
            ctx.beginPath();
            roundRect(infoX, infoY, infoW, infoH, 4);
            ctx.fill();
            ctx.fillStyle = COLORS.tierColors[selCell.tier - 1];
            ctx.textAlign = "left";
            if (portrait) {
                ctx.font = "700 12px " + FONT_BODY;
                ctx.textBaseline = "middle";
                var label = getTierName(selCell.tier) + " T" + selCell.tier;
                ctx.fillText(label, infoX + 10, infoY + 11);
                ctx.fillStyle = COLORS.textDark;
                ctx.font = "500 11px " + FONT_BODY;
                ctx.fillText(t("hud_unit_stats", { hp: selCell.hp, maxHp: selCell.maxHp, atk: TIER_STATS[selCell.tier].atk }),
                             infoX + 10, infoY + 26);
            } else {
                ctx.font = "600 13px " + FONT_BODY;
                ctx.fillText(getTierName(selCell.tier) + " (T" + selCell.tier + ")", 18, infoY + 14);
                ctx.fillStyle = COLORS.textDark;
                ctx.font = "400 11px " + FONT_BODY;
                ctx.fillText(t("hud_unit_stats", { hp: selCell.hp, maxHp: selCell.maxHp, atk: TIER_STATS[selCell.tier].atk }), 18, infoY + 32);
            }
        }
    }

    // v13.2: Suppress the bottom hint entirely while ANY tutorial step is
    // active — the tutorial banner is the source of truth and a competing
    // "Tap a blue unit" hint was leaking through during L2 step 12 ("Tap END
    // TURN").
    var tutorialActive = (tutorialStep >= 0 && tutorialStep < 3) ||
                          (tutorialStep >= 10 && tutorialStep <= 12);
    var hintH = isPortraitLayout() ? 26 : 28;
    // v13.2: in portrait, lift the hint to JUST ABOVE the End Turn button
    // instead of pinning it to the very bottom (iOS home indicator + Safari
    // home bar were clipping the old H-40 placement). No bg fill in portrait
    // either — keeps the bottom safe area visually clean.
    var hintY = isPortraitLayout() ? (btnY - hintH - 2) : (H - hintH);
    if (!isPortraitLayout()) {
        ctx.fillStyle = COLORS.bg;
        ctx.fillRect(0, H - hintH, W, hintH);
        ctx.strokeStyle = COLORS.gridLine;
        ctx.beginPath(); ctx.moveTo(0, H - hintH); ctx.lineTo(W, H - hintH); ctx.stroke();
    }
    var hintText = t("hud_hint");
    var hintColor = COLORS.textDark;
    if (isPortraitLayout()) {
        if (Date.now() < coachToast.until && coachToast.text) {
            hintText = coachToast.text;
            hintColor = coachToast.color;
        } else if (ap <= 0) {
            hintText = t("hud_hint_no_ap");
            hintColor = COLORS.gold;
        } else if (selectedCell) {
            hintText = t("hud_hint_selected");
            hintColor = COLORS.text;
        } else {
            hintText = t("hud_hint_pick");
            hintColor = COLORS.textDark;
        }
    }
    if (tutorialActive) return;
    ctx.fillStyle = hintColor;
    ctx.font = fitFontToWidth(hintText, W - 24, "700 12px " + FONT_BODY, 9);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(hintText, W / 2, hintY + hintH / 2);
}

function roundRect(x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
}

function drawCrossedSwords(cx, cy, size, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(cx - size, cy - size * 1.2);
    ctx.lineTo(cx + size * 0.3, cy + size * 0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - size * 0.2, cy - size * 0.1);
    ctx.lineTo(cx + size * 0.3, cy - size * 0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + size, cy - size * 1.2);
    ctx.lineTo(cx - size * 0.3, cy + size * 0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + size * 0.2, cy - size * 0.1);
    ctx.lineTo(cx - size * 0.3, cy - size * 0.5);
    ctx.stroke();
}

// ─── Menu button geometry (shared with handleClick) ──────────────────────
// Computed each frame so layout adapts to whether a resume button is present.
function getMenuButtonRects() {
    var cardW = 500, cardH = 420;
    var cardX = W / 2 - cardW / 2, cardY = H / 2 - cardH / 2;
    var resumable = hasResumableRun();

    var btnW = 240, btnH = 50;
    var btnX = W / 2 - btnW / 2;
    var primaryY = cardY + cardH - 130;
    var secondaryY = cardY + cardH - 72;

    return {
        cardX: cardX, cardY: cardY, cardW: cardW, cardH: cardH,
        resumable: resumable,
        primary: { x: btnX, y: primaryY, w: btnW, h: btnH },
        // Secondary only exists when resume is also rendered
        secondary: resumable ? { x: btnX + 30, y: secondaryY, w: btnW - 60, h: 38 } : null,
        // Prize chip (top-right of card) — bigger touch target for unclaimed
        prizeChip: { x: cardX + cardW - 200, y: cardY + 12, w: 188, h: 44 },
        // Streak chip (top-left of card)
        streakChip: { x: cardX + 12, y: cardY + 12, w: 160, h: 44 }
    };
}

function drawMenuScreen() {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, W, H);

    // Background decorative hexagons
    ctx.globalAlpha = 0.05;
    for (var i = 0; i < 12; i++) {
        var hx = Math.sin(gameTime * 0.0002 + i * 1.5) * 300 + W / 2;
        var hy = Math.cos(gameTime * 0.0003 + i * 1.1) * 200 + H / 2;
        drawHex(hx, hy, 25 + i * 4);
        ctx.strokeStyle = i % 2 === 0 ? COLORS.playerStroke : COLORS.aiStroke;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
    ctx.globalAlpha = 1;

    var rects = getMenuButtonRects();
    var cardX = rects.cardX, cardY = rects.cardY, cardW = rects.cardW, cardH = rects.cardH;

    // Card background per design spec
    ctx.fillStyle = COLORS.panel;
    ctx.beginPath();
    roundRect(cardX, cardY, cardW, cardH, 8);
    ctx.fill();
    ctx.strokeStyle = COLORS.gold;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Streak chip (top-left) — shows current day count
    drawStreakChip(rects.streakChip);

    // Prize chip (top-right) — today's unclaimed or tomorrow's preview
    drawPrizeChip(rects.prizeChip);

    // Title — adaptive font & size (Cinzel for Latin, Inter for Cyrillic)
    ctx.fillStyle = COLORS.gold;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    var titleText = t("menu_title");
    var titleFont = currentLang === "ru" ? FONT_BODY : FONT_TITLE;
    var titleSize = 40;
    ctx.font = "700 " + titleSize + "px " + titleFont;
    while (ctx.measureText(titleText).width > cardW - 40 && titleSize > 18) {
        titleSize -= 2;
        ctx.font = "700 " + titleSize + "px " + titleFont;
    }
    ctx.fillText(titleText, W / 2, cardY + 96);

    // Crossed swords emblem
    drawCrossedSwords(W / 2, cardY + 142, 16, COLORS.gold);

    // Instructions — condensed to 3 lines (was 4) to make room for chips/resume
    ctx.fillStyle = COLORS.textDark;
    ctx.font = "400 13px " + FONT_BODY;
    ctx.fillText(t("menu_line_1"), W / 2, cardY + 188);
    ctx.fillText(t("menu_line_2"), W / 2, cardY + 208);
    ctx.fillText(t("menu_line_3"), W / 2, cardY + 228);

    var p = rects.primary;
    if (rects.resumable) {
        // RESUME (primary, gold + pulse) — biggest retention lever
        var pulse = 0.85 + 0.15 * Math.sin(gameTime * 0.004);
        ctx.shadowBlur = 18 * pulse;
        ctx.shadowColor = "rgba(196,163,90,0.6)";
        ctx.fillStyle = COLORS.gold;
        ctx.beginPath();
        roundRect(p.x, p.y, p.w, p.h, 6);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "#D4B36A";
        ctx.lineWidth = 1;
        ctx.beginPath();
        roundRect(p.x, p.y, p.w, p.h, 6);
        ctx.stroke();

        ctx.fillStyle = COLORS.bg;
        ctx.font = "700 18px " + FONT_TITLE;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        var r = save.inProgressRun;
        var label = (r.mode === "endless")
            ? t("menu_resume_wave", { wave: (r.endlessWave || 0) + 1 })
            : t("menu_resume_level", { level: (r.currentLevel || 0) + 1 });
        ctx.fillText(label, p.x + p.w / 2, p.y + p.h / 2 - 8);
        ctx.font = "400 10px " + FONT_BODY;
        ctx.fillText(t("menu_resume_sub"), p.x + p.w / 2, p.y + p.h / 2 + 12);

        // PLAY (secondary)
        var s = rects.secondary;
        ctx.fillStyle = COLORS.panelAlt;
        ctx.beginPath();
        roundRect(s.x, s.y, s.w, s.h, 5);
        ctx.fill();
        ctx.strokeStyle = COLORS.gridLine;
        ctx.lineWidth = 1;
        ctx.beginPath();
        roundRect(s.x, s.y, s.w, s.h, 5);
        ctx.stroke();
        ctx.fillStyle = COLORS.text;
        ctx.font = "600 14px " + FONT_BODY;
        ctx.fillText(t("menu_play"), s.x + s.w / 2, s.y + s.h / 2);
    } else {
        // PLAY only (no resume) — original layout, single gold button
        ctx.shadowBlur = 14;
        ctx.shadowColor = "rgba(196,163,90,0.35)";
        ctx.fillStyle = COLORS.gold;
        ctx.beginPath();
        roundRect(p.x, p.y, p.w, p.h, 6);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "#D4B36A";
        ctx.lineWidth = 1;
        ctx.beginPath();
        roundRect(p.x, p.y, p.w, p.h, 6);
        ctx.stroke();

        ctx.fillStyle = COLORS.bg;
        ctx.font = "700 20px " + FONT_TITLE;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(t("menu_play"), p.x + p.w / 2, p.y + p.h / 2);
    }

    // Keyboard hint (desktop only — pointer-fine media)
    if (isDesktopInput()) {
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "400 10px " + FONT_BODY;
        ctx.textAlign = "center";
        ctx.globalAlpha = 0.7;
        ctx.fillText(t("keyboard_hint"), W / 2, cardY + cardH - 24);
        ctx.globalAlpha = 1;
    }

    // Version
    ctx.fillStyle = "#555555";
    ctx.font = "400 10px " + FONT_BODY;
    ctx.textAlign = "left";
    ctx.fillText("v8.0", cardX + 16, cardY + cardH - 12);
}

// Detect coarse vs fine pointer for keyboard-hint suppression on mobile.
// Cached on first call.
var _isDesktopInputCached = null;
function isDesktopInput() {
    if (_isDesktopInputCached !== null) return _isDesktopInputCached;
    try {
        _isDesktopInputCached = !!(window.matchMedia && window.matchMedia("(pointer: fine)").matches);
    } catch(e) {
        _isDesktopInputCached = false;
    }
    return _isDesktopInputCached;
}

function drawStreakChip(rect) {
    if (!save) return;
    var streak = save.loginStreak || 0;
    if (streak <= 0) return; // hide before first claim

    // v11.7: no outline + transparent bg so chip melts into the card
    // (was reading as "floating" outside the card on level select).
    ctx.fillStyle = COLORS.gold;
    ctx.font = "700 13px " + FONT_BODY;
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    var label = (streak >= 30) ? t("menu_streak_chip_max") : t("menu_streak_chip", { day: streak });
    ctx.fillText(label, rect.x + 10, rect.y + 16);

    var ms = getNextMilestoneFromStreak(streak);
    if (ms) {
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "400 10px " + FONT_BODY;
        ctx.fillText(t("menu_next_milestone", { day: ms.day, stars: ms.stars }), rect.x + 10, rect.y + 32);
    }
}

function drawPrizeChip(rect) {
    if (!save) return;
    var unclaimed = previewTodayBonus();
    var tomorrow = previewTomorrowBonus();

    if (unclaimed) {
        // Pulsing gold — "tap me" affordance
        var pulse = 0.7 + 0.3 * Math.sin(gameTime * 0.005);
        ctx.shadowBlur = 12 * pulse;
        ctx.shadowColor = "rgba(196,163,90,0.7)";
        ctx.fillStyle = COLORS.gold;
        ctx.beginPath(); roundRect(rect.x, rect.y, rect.w, rect.h, 6); ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = COLORS.bg;
        ctx.font = "700 13px " + FONT_BODY;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(t("menu_today_unclaimed", { stars: unclaimed.stars }), rect.x + rect.w / 2, rect.y + 16);
        ctx.font = "600 10px " + FONT_BODY;
        ctx.fillText(t("daily_bonus_day_label", { day: unclaimed.day }), rect.x + rect.w / 2, rect.y + 32);
    } else if (tomorrow) {
        // v11.7: claimed-today chip is now outline-less + transparent, melts into card.
        ctx.fillStyle = COLORS.gold;
        ctx.font = "700 12px " + FONT_BODY;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(t("menu_tomorrow", { day: tomorrow.day, stars: tomorrow.stars }), rect.x + rect.w / 2, rect.y + 16);
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "400 10px " + FONT_BODY;
        var claimedToday = save.loginStreak ? getDailyBonusStarsForStreak(save.loginStreak) : 0;
        ctx.fillText(t("menu_today_claimed", { stars: claimedToday }), rect.x + rect.w / 2, rect.y + 32);
    }
}

function getLevelSelectLayout() {
    // 4 rows of 5 level nodes (20 per page)
    // v13.3 portrait: shrink nodes + padX so the 5×4 grid still fits W=420
    // canvas (was 5*84 + 4*12 = 468px wide → 24px overflow each side).
    var portrait = isPortraitLayout();
    var nodeW = portrait ? 64 : 84;
    var nodeH = portrait ? 50 : 50;
    var padX  = portrait ? 8  : 12;
    var padY  = portrait ? 8  : 8;
    var totalW = 5 * nodeW + 4 * padX;
    var startX = W / 2 - totalW / 2;
    // v13.4: shift relative to the (now portrait-centered) card so nodes
    // follow the card down when it moves below the iPhone notch.
    var startY = getLevelSelectCardY() + (portrait ? 130 : 100);
    var startLevel = levelSelectPage * LEVELS_PER_PAGE;
    var endLevel = Math.min(startLevel + LEVELS_PER_PAGE, LEVELS.length);
    var nodes = [];
    for (var i = startLevel; i < endLevel; i++) {
        var localIdx = i - startLevel;
        var row = Math.floor(localIdx / 5);
        var col = localIdx % 5;
        nodes.push({
            x: startX + col * (nodeW + padX),
            y: startY + row * (nodeH + padY),
            w: nodeW, h: nodeH, level: i
        });
    }
    return nodes;
}

function getLevelSelectPageCount() {
    return Math.max(1, Math.ceil(LEVELS.length / LEVELS_PER_PAGE));
}

function syncLevelSelectPageToCurrent() {
    levelSelectPage = Math.floor(currentLevel / LEVELS_PER_PAGE);
    var pageCount = getLevelSelectPageCount();
    levelSelectPage = Math.max(0, Math.min(levelSelectPage, pageCount - 1));
}

function getLevelSelectNavRects() {
    // v8: bumped h 34→44 (Apple HIG / Material 48dp guideline) to reduce
    // mis-taps on mobile. Width kept; vertical spacing increased to 50px.
    // v13.3 portrait: shrink button widths and pull them in so prev/next +
    // the centered upgrades button fit the 420px canvas without overlap.
    // v13.4: positions are now anchored to getLevelSelectCardY() so the
    // nav follows the vertically-centered card on portrait.
    var cy = getLevelSelectCardY();
    if (isPortraitLayout()) {
        // v14.2: collapse to a SINGLE 4-button row inside the card. Previous
        // layout had Endless on its own row at cy+422 which sat 26px BELOW
        // the card edge (cardH=440 on portrait centered → endless poked
        // outside the gold border). Single row keeps everything inside.
        // Order matches landscape priority: Prev | Upgrades | Endless | Next.
        var rowY = cy + 380;
        return {
            prev:     { x: 8,             y: rowY, w: 64,  h: 44 },
            upgrades: { x: 80,            y: rowY, w: 110, h: 44 },
            endless:  { x: 198,           y: rowY, w: 110, h: 44 },
            next:     { x: W - 72,        y: rowY, w: 64,  h: 44 },
            // back retained for hit-test compatibility; not drawn since
            // v11.8a killed STATE_MENU. Place out-of-bounds.
            back:     { x: -1000, y: -1000, w: 0, h: 0 }
        };
    }
    return {
        prev:     { x: W / 2 - 175, y: cy + 338, w: 88,  h: 44 },
        next:     { x: W / 2 + 87,  y: cy + 338, w: 88,  h: 44 },
        upgrades: { x: W / 2 - 80,  y: cy + 338, w: 160, h: 44 },
        back:     { x: W / 2 - 124, y: cy + 392, w: 120, h: 44 },
        endless:  { x: W / 2 + 4,   y: cy + 392, w: 120, h: 44 }
    };
}

function drawLevelSelectButton(rect, label, enabled, fill) {
    ctx.globalAlpha = enabled ? 1 : 0.45;
    ctx.fillStyle = fill;
    ctx.beginPath();
    roundRect(rect.x, rect.y, rect.w, rect.h, 5);
    ctx.fill();
    ctx.strokeStyle = COLORS.gridLine;
    ctx.lineWidth = 1;
    ctx.beginPath();
    roundRect(rect.x, rect.y, rect.w, rect.h, 5);
    ctx.stroke();
    ctx.fillStyle = enabled ? COLORS.text : COLORS.textDark;
    ctx.font = "600 13px " + FONT_BODY;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.globalAlpha = 1;
}

function drawLockIcon(cx, cy, size) {
    // Padlock body
    ctx.fillStyle = COLORS.textDark;
    ctx.beginPath();
    roundRect(cx - size * 0.5, cy - size * 0.1, size, size * 0.8, 2);
    ctx.fill();
    // Shackle (arc)
    ctx.strokeStyle = COLORS.textDark;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy - size * 0.1, size * 0.32, Math.PI, 0);
    ctx.stroke();
    // Keyhole
    ctx.fillStyle = COLORS.panel;
    ctx.beginPath();
    ctx.arc(cx, cy + size * 0.2, size * 0.12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(cx - 1, cy + size * 0.2, 2, size * 0.2);
}

// v8 (2026-05-18): chips moved here from STATE_MENU (which never shows —
// game boots into STATE_PLAY since the Yandex 5.1.1 fix Feb/Mar 2026).
// Embedded INSIDE the card's header area (not floating above) so they
// feel like part of the lobby, not orphan banners.
// v11.5: Missions pill on level-select — top-center under title
function getMissionsPillRect() {
    return { x: W / 2 - 70, y: 100, w: 140, h: 22 };
}

function getLevelSelectChipRects() {
    var cardW = Math.min(560, W - 16);
    var cardX = W / 2 - cardW / 2;
    var cardY = getLevelSelectCardY();
    // v13.4 portrait: chips stack BELOW the title (was flanking it — title
    // "SELECT LEVEL" at 22px is too wide for the 420 canvas to fit chips on
    // both sides). Title at cardY+22, chips at cardY+50 in a single row.
    if (isPortraitLayout()) {
        var chipH = 32;
        var chipW = (cardW - 24 - 6) / 2; // 6px gap between chips
        return {
            streak: { x: cardX + 12,                   y: cardY + 52, w: chipW, h: chipH },
            prize:  { x: cardX + cardW - 12 - chipW,   y: cardY + 52, w: chipW, h: chipH }
        };
    }
    // Landscape: flank the title. Title centered at y=82, chips at y=64, h=36.
    var chipH = 36, chipW = 160;
    return {
        streak: { x: cardX + 12,                y: cardY + 14, w: chipW, h: chipH },
        prize:  { x: cardX + cardW - 12 - chipW, y: cardY + 14, w: chipW, h: chipH }
    };
}
function getLevelSelectCardY() {
    // v13.4 portrait: vertically center the lobby card instead of pinning
    // to y=50 — on tall phones the bottom half of the canvas was empty.
    var cardH = 440;
    if (isPortraitLayout()) return Math.max(20, Math.round((H - cardH) / 2));
    return 50;
}

// v17 — Codex entry button on level-select. Top-right corner so it doesn't
// fight the bottom nav row. Always available (the screen itself shows
// locked/unlocked silhouettes — no need to gate the button).
function getCodexButtonRect() {
    return { x: W - 56, y: 14, w: 44, h: 44 };
}
function drawCodexButton() {
    var r = getCodexButtonRect();
    ctx.fillStyle = COLORS.panelAlt;
    ctx.strokeStyle = "#C4A35A";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(r.x, r.y, r.w, r.h, 8);
    else ctx.rect(r.x, r.y, r.w, r.h);
    ctx.fill();
    ctx.stroke();
    // Book icon — two pages
    ctx.fillStyle = "#C4A35A";
    ctx.fillRect(r.x + 12, r.y + 13, 8, 18);
    ctx.fillRect(r.x + 24, r.y + 13, 8, 18);
    ctx.strokeStyle = "#2a3442";
    ctx.lineWidth = 1;
    ctx.strokeRect(r.x + 12, r.y + 13, 8, 18);
    ctx.strokeRect(r.x + 24, r.y + 13, 8, 18);
}

// v18.1 — a heart glyph for the lives readout. Drawn as a vector path (not an
// emoji) so it renders identically across platforms (Yandex flags inconsistent
// glyphs). Centered on (cx, cy); `size` is roughly the full height.
function drawHeart(cx, cy, size, fillStyle, strokeStyle) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.beginPath();
    ctx.moveTo(0, -size * 0.22);
    ctx.bezierCurveTo(-size * 0.52, -size * 0.55, -size * 0.58, size * 0.12, 0, size * 0.52);
    ctx.bezierCurveTo(size * 0.58, size * 0.12, size * 0.52, -size * 0.55, 0, -size * 0.22);
    ctx.closePath();
    if (fillStyle) { ctx.fillStyle = fillStyle; ctx.fill(); }
    if (strokeStyle) { ctx.strokeStyle = strokeStyle; ctx.lineWidth = 1.3; ctx.stroke(); }
    ctx.restore();
}

// v18.1 — persistent lives readout for the lobby. Before this, lives + the
// regen countdown were ONLY drawn on the defeat screen, so from the level-select
// hub the player had no idea how many lives they had or when the next one comes
// back. Renders a row of hearts (filled = available, hollow = spent) plus a gold
// regen countdown when not full. Centered just above the lobby card so it never
// collides with the card chips/title (1.10.3) or the top-right Codex button.
function drawLivesBar() {
    if (!save) return;
    refreshLives();
    var n = Math.max(0, Math.min(MAX_LIVES, save.lives | 0));
    var full = n >= MAX_LIVES;
    var regenMs = livesRegenMsLeft();
    var timerTxt = (!full && regenMs > 0) ? livesRegenLabel() : "";
    var hr = 6;        // heart half-height
    var gap = 19;      // spacing between heart centers
    ctx.save();
    ctx.font = "700 12px " + FONT_BODY;
    var tw = timerTxt ? (ctx.measureText(timerTxt).width + 9) : 0;
    var heartsSpan = (MAX_LIVES - 1) * gap;          // first-to-last heart centers
    var totalW = heartsSpan + hr * 2 + tw;
    var firstCx = W / 2 - totalW / 2 + hr;
    var cardY = getLevelSelectCardY();
    var cy = Math.max(hr + 8, cardY - 16);           // sit just above the card
    for (var i = 0; i < MAX_LIVES; i++) {
        var hx = firstCx + i * gap;
        if (i < n) drawHeart(hx, cy, hr, COLORS.aiLight, "rgba(11,22,34,0.55)");
        else       drawHeart(hx, cy, hr, "rgba(70,80,96,0.40)", "rgba(120,130,146,0.50)");
    }
    if (timerTxt) {
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillStyle = COLORS.gold;
        ctx.fillText(timerTxt, firstCx + heartsSpan + hr + 9, cy + 1);
    }
    ctx.restore();
}

function drawLevelSelectScreen() {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, W, H);

    // Background decorative hexagons (same as menu)
    ctx.globalAlpha = 0.04;
    for (var i = 0; i < 8; i++) {
        var hx = Math.sin(gameTime * 0.00015 + i * 2.0) * 350 + W / 2;
        var hy = Math.cos(gameTime * 0.00025 + i * 1.4) * 250 + H / 2;
        drawHex(hx, hy, 30 + i * 5);
        ctx.strokeStyle = i % 2 === 0 ? COLORS.playerStroke : COLORS.aiStroke;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Card background — v11.7: alpha 0.6 → 0.92 + gold border so chips look
    // truly embedded instead of floating outside.
    // v13.3 portrait: clamp cardW so it never overflows the canvas.
    // v13.4: cardY now comes from getLevelSelectCardY() so portrait centers
    // the lobby vertically. Title / star / line all draw RELATIVE to cardY.
    var portrait = isPortraitLayout();
    var cardW = Math.min(560, W - 16), cardH = 440;
    var cardX = W / 2 - cardW / 2, cardY = getLevelSelectCardY();
    ctx.fillStyle = COLORS.panel;
    ctx.globalAlpha = 0.92;
    ctx.beginPath();
    roundRect(cardX, cardY, cardW, cardH, 8);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = COLORS.gold;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    roundRect(cardX, cardY, cardW, cardH, 8);
    ctx.stroke();

    // ── v8 retention chips embedded in card header (flank the title) ─
    var chips = getLevelSelectChipRects();
    drawStreakChip(chips.streak);
    drawPrizeChip(chips.prize);

    // v18.1 — lives + regen countdown, above the card (see drawLivesBar).
    drawLivesBar();

    // Title — shrunk from 30→22 so it fits between the chips.
    // v13.4 portrait: chips stack BELOW the title, so the title can take the
    // full card width without colliding with chip text.
    ctx.fillStyle = COLORS.gold;
    ctx.font = "700 22px " + FONT_TITLE;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(t("level_select_title"), W / 2, cardY + 32);

    // v11.7: missions moved OUT of this crowded area — now lives on the
    // in-game HUD as an icon next to mute + hamburger (see drawMissionsBtn).

    // Star counter with icon
    var totalStars = getTotalStars();
    ctx.font = "600 14px " + FONT_BODY;
    var starText = totalStars + " / " + (LEVELS.length * 3);
    var starTextW = ctx.measureText(starText).width;
    var starCx = W / 2 - starTextW / 2 - 10;
    var starY = cardY + (portrait ? 102 : 72);
    ctx.fillStyle = "#FFD700";
    drawStar(starCx, starY, 5, 8, 4);
    ctx.fill();
    ctx.fillStyle = COLORS.text;
    ctx.fillText(starText, W / 2 + 4, starY);

    // Page indicator
    var pageCount = getLevelSelectPageCount();
    levelSelectPage = Math.max(0, Math.min(levelSelectPage, pageCount - 1));
    ctx.fillStyle = COLORS.textDark;
    ctx.font = "500 12px " + FONT_BODY;
    ctx.fillText(t("page_label", { page: levelSelectPage + 1, pages: pageCount }), W / 2, starY + 16);

    // Decorative line under header
    ctx.strokeStyle = COLORS.gold;
    ctx.globalAlpha = 0.3;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W / 2 - 100, starY + 24);
    ctx.lineTo(W / 2 + 100, starY + 24);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Level nodes
    var nodes = getLevelSelectLayout();
    for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        var levelIdx = n.level;
        var unlocked = isLevelUnlocked(levelIdx);
        var stars = save.levelStars[levelIdx];
        var ncx = n.x + n.w / 2;

        ctx.save();
        if (!unlocked) ctx.globalAlpha = 0.4;

        // Node background
        ctx.fillStyle = unlocked ? COLORS.panel : "#1A1E28";
        ctx.beginPath();
        roundRect(n.x, n.y, n.w, n.h, 6);
        ctx.fill();

        // Border -- gold if completed, subtle if unlocked, dark if locked
        if (stars > 0) {
            ctx.strokeStyle = COLORS.gold;
            ctx.lineWidth = 2;
        } else if (unlocked) {
            ctx.strokeStyle = COLORS.playerStroke;
            ctx.lineWidth = 1.5;
        } else {
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 1;
        }
        ctx.beginPath();
        roundRect(n.x, n.y, n.w, n.h, 6);
        ctx.stroke();

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        if (!unlocked) {
            // Lock icon
            drawLockIcon(ncx, n.y + 16, 14);
        } else {
            // Level number
            ctx.fillStyle = stars > 0 ? COLORS.gold : COLORS.text;
            ctx.font = "700 16px " + FONT_TITLE;
            ctx.fillText("" + (levelIdx + 1), ncx, n.y + 12);

            // Level name — v14.2: fit to node width so long names like
            // "Contested Ground" stop bleeding past the right edge into the
            // adjacent locked node on portrait (nodeW=64). fitFontToWidth
            // shrinks 8px → 7px → 6px as needed; if still too long, the
            // name is clipped via canvas clip().
            ctx.fillStyle = COLORS.text;
            ctx.font = fitFontToWidth(getLevelDisplayName(levelIdx), n.w - 6, "400 8px " + FONT_BODY, 6);
            ctx.save();
            ctx.beginPath();
            ctx.rect(n.x + 2, n.y + 18, n.w - 4, 14);
            ctx.clip();
            ctx.fillText(getLevelDisplayName(levelIdx), ncx, n.y + 25);
            ctx.restore();
        }

        // Grid size label
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "400 8px " + FONT_BODY;
        ctx.fillText(LEVELS[levelIdx].cols + "x" + LEVELS[levelIdx].rows, ncx, n.y + 34);

        // Stars display (always show 3 slots for unlocked levels)
        if (unlocked) {
            for (var s = 0; s < 3; s++) {
                var filled = s < stars;
                ctx.fillStyle = filled ? "#FFD700" : COLORS.panelAlt;
                drawStar(ncx - 14 + s * 14, n.y + 44, 5, 5, 2.5);
                ctx.fill();
            }
        }

        ctx.restore();
    }

    var nav = getLevelSelectNavRects();
    drawLevelSelectButton(nav.prev, t("nav_prev"), levelSelectPage > 0, COLORS.panelAlt);
    drawLevelSelectButton(nav.next, t("nav_next"), levelSelectPage < pageCount - 1, COLORS.panelAlt);
    // v17: progressive unlock drip — Upgrades hidden until L3 cleared, Endless
    // until L5 cleared. Locked buttons render greyed; tap shows a toast.
    drawLevelSelectButton(nav.upgrades, t("nav_upgrades"), isUpgradesUnlocked(), isUpgradesUnlocked() ? COLORS.playerStroke : COLORS.panelAlt);
    // v11.8a: Main Menu button removed — it went to a dead STATE_MENU that
    // bugged out after L1 win. Endless takes the full bottom row now.
    drawLevelSelectButton(nav.endless, t("nav_endless"), isEndlessUnlocked(), isEndlessUnlocked() ? COLORS.aiStroke : COLORS.panelAlt);

    // v11.8c: First-time upgrades nudge — pulsing ring + label on Upgrades
    // button as soon as the player has any unspent stars.
    // v18.1 fix: also require isUpgradesUnlocked(). The v17 unlock-drip greys
    // the Upgrades button until L3 is cleared, but this nudge predated that and
    // fired on the first earned star (L1/L2 win) — so it pulsed "Tap UPGRADES to
    // spend it" over a greyed, locked button. Only nudge once the button works.
    if (save && !save.upgradesTutorialShown && isUpgradesUnlocked() && getAvailableStars() > 0) {
        var ub = nav.upgrades;
        var pulse = 0.6 + 0.35 * Math.sin(gameTime * 0.006);
        ctx.save();
        ctx.globalAlpha = pulse;
        ctx.strokeStyle = COLORS.gold;
        ctx.lineWidth = 4;
        var pad = 6 + 2 * Math.sin(gameTime * 0.005);
        ctx.beginPath(); roundRect(ub.x - pad, ub.y - pad, ub.w + pad * 2, ub.h + pad * 2, 8); ctx.stroke();
        ctx.globalAlpha = 1;
        // Label above the button. v18.1: clamp the label's center so its box
        // stays fully on-screen — Upgrades is left-of-centre in the portrait nav
        // row, so a button-centred label ran off the left edge (text clipped).
        var labelY = ub.y - 14;
        ctx.font = "700 13px " + FONT_BODY;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        var nudgeText = t("tutorial_upgrades_nudge");
        var nw = ctx.measureText(nudgeText).width;
        var labelHalf = nw / 2 + 8;
        var labelCx = Math.max(labelHalf + 4, Math.min(W - labelHalf - 4, ub.x + ub.w / 2));
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(labelCx - nw / 2 - 8, labelY - 10, nw + 16, 20);
        ctx.fillStyle = COLORS.gold;
        ctx.fillText(nudgeText, labelCx, labelY);
        ctx.restore();
    }

    // Endless best score, rendered subtly under the Endless button
    if (save.endlessBest && save.endlessBest > 0) {
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "500 11px " + FONT_BODY;
        ctx.textAlign = "center";
        ctx.textBaseline = "alphabetic";
        ctx.fillText(t("endless_best") + ": " + save.endlessBest,
            nav.endless.x + nav.endless.w / 2, nav.endless.y + nav.endless.h + 14);
    }

    // v17 — Codex entry, top-right.
    drawCodexButton();
}

function drawUpgradesScreen() {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, W, H);

    // Background decorative hexagons
    ctx.globalAlpha = 0.03;
    for (var i = 0; i < 6; i++) {
        var hx = Math.sin(gameTime * 0.00012 + i * 1.8) * 300 + W / 2;
        var hy = Math.cos(gameTime * 0.0002 + i * 1.3) * 200 + H / 2;
        drawHex(hx, hy, 28 + i * 6);
        ctx.strokeStyle = COLORS.playerStroke;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Card background
    // v13.3 portrait: clamp so upgrades card fits the 420px canvas.
    // v13.4 portrait: vertically center the card.
    var cardW = Math.min(540, W - 16), cardH = 500;
    var cardX = W / 2 - cardW / 2;
    var cardY = isPortraitLayout() ? Math.max(20, Math.round((H - cardH) / 2)) : 30;
    ctx.fillStyle = COLORS.panel;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    roundRect(cardX, cardY, cardW, cardH, 8);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = COLORS.gridLine;
    ctx.lineWidth = 1;
    ctx.beginPath();
    roundRect(cardX, cardY, cardW, cardH, 8);
    ctx.stroke();

    // Title
    ctx.fillStyle = COLORS.gold;
    ctx.font = "700 28px " + FONT_TITLE;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(t("upgrades_title"), W / 2, cardY + 35);

    // Star counter with icon
    var avail = getAvailableStars();
    var spent = getSpentStars();
    ctx.fillStyle = "#FFD700";
    drawStar(W / 2 - 56, cardY + 66, 5, 8, 4);
    ctx.fill();
    ctx.fillStyle = COLORS.text;
    ctx.font = "600 14px " + FONT_BODY;
    ctx.fillText(t("upgrades_available", { value: avail }), W / 2 - 2, cardY + 66);
    ctx.fillStyle = COLORS.textDark;
    ctx.font = "400 11px " + FONT_BODY;
    ctx.fillText(t("upgrades_spent", { spent: spent, earned: getTotalStars() }), W / 2, cardY + 84);

    // Decorative line
    ctx.strokeStyle = COLORS.gold;
    ctx.globalAlpha = 0.3;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W / 2 - 80, cardY + 100);
    ctx.lineTo(W / 2 + 80, cardY + 100);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // v19 doctrine rows \u2014 leveled nodes grouped into 3 doctrines (tinted left bar).
    // perPage 5 leaves room under the rows for the Conquest badge + Respec/Ascend.
    var rowH = 50, startY = cardY + 112;
    var rowW = Math.min(500, W - 32), rowX = W / 2 - rowW / 2;
    var perPage = 5;
    var upgradesPageCount = Math.max(1, Math.ceil(BAL.nodes.length / perPage));
    upgradesPage = Math.max(0, Math.min(upgradesPage, upgradesPageCount - 1));
    var startNode = upgradesPage * perPage;
    var endNode = Math.min(startNode + perPage, BAL.nodes.length);
    for (var i = startNode; i < endNode; i++) {
        var nd = BAL.nodes[i];
        var doc = getDoctrineByKey(nd.doctrine);
        var lvl = doctrineLevel(nd.key);
        var maxLvl = doctrineMaxLevel(nd.key);
        var maxed = lvl >= maxLvl;
        var nextCost = maxed ? 0 : nodeStepCost(nd.key, lvl + 1);
        var canBuy = !maxed && avail >= nextCost;
        var owned = lvl > 0;
        var y = startY + (i - startNode) * rowH;

        // Row background + border (gold-tinted once invested)
        ctx.fillStyle = owned ? "rgba(196,163,90,0.08)" : COLORS.panel;
        ctx.beginPath(); roundRect(rowX, y, rowW, rowH - 6, 4); ctx.fill();
        ctx.strokeStyle = owned ? COLORS.gold : COLORS.gridLine;
        ctx.lineWidth = owned ? 1.5 : 1;
        ctx.beginPath(); roundRect(rowX, y, rowW, rowH - 6, 4); ctx.stroke();

        // Doctrine tint bar (left edge) shows which build path this node belongs to
        ctx.fillStyle = (doc && doc.tint) ? doc.tint : COLORS.gold;
        ctx.beginPath(); roundRect(rowX, y, 4, rowH - 6, 2); ctx.fill();

        // Name
        ctx.textAlign = "left"; ctx.textBaseline = "middle";
        ctx.fillStyle = owned ? COLORS.gold : COLORS.text;
        ctx.font = "600 13px " + FONT_BODY;
        ctx.fillText(getNodeName(nd), rowX + 14, y + 14);

        // Description + level "Lv X/Y"
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "400 11px " + FONT_BODY;
        ctx.fillText(getNodeDesc(nd) + "  \u00b7  " + t("doctrine_level", { lvl: lvl, max: maxLvl }), rowX + 14, y + 30);

        // Cost + buy/level-up button (right)
        var btnX2 = rowX + rowW - 68, btnY2 = y + 8, btnW2 = 56, btnH2 = 28;
        if (maxed) {
            ctx.fillStyle = COLORS.textDark;
            ctx.font = "600 12px " + FONT_BODY; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(t("doctrine_max"), btnX2 + btnW2 / 2, btnY2 + btnH2 / 2);
        } else {
            ctx.textAlign = "right"; ctx.textBaseline = "middle";
            var costX = rowX + rowW - 82;
            ctx.fillStyle = canBuy ? "#FFD700" : COLORS.textDark;
            drawStar(costX - 12, y + 22, 5, 6, 3); ctx.fill();
            ctx.fillStyle = canBuy ? COLORS.text : COLORS.textDark;
            ctx.font = "600 12px " + FONT_BODY;
            ctx.fillText(nextCost, costX + 2, y + 22);
            ctx.fillStyle = canBuy ? COLORS.playerStroke : COLORS.panelAlt;
            ctx.beginPath(); roundRect(btnX2, btnY2, btnW2, btnH2, 4); ctx.fill();
            if (canBuy) { ctx.strokeStyle = COLORS.playerLight; ctx.lineWidth = 1; ctx.beginPath(); roundRect(btnX2, btnY2, btnW2, btnH2, 4); ctx.stroke(); }
            ctx.fillStyle = canBuy ? "#fff" : COLORS.textDark;
            ctx.font = "600 12px " + FONT_BODY; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(owned ? t("doctrine_levelup") : t("upgrades_buy"), btnX2 + btnW2 / 2, btnY2 + btnH2 / 2);
        }
    }

    // v19 \u2014 Conquest Tier badge + Respec (always free) + Ascend (after campaign clear)
    var actY = startY + perPage * rowH + 2;
    if (conquestTier() > 0) {
        ctx.fillStyle = COLORS.gold; ctx.font = "700 12px " + FONT_BODY;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(t("conquest_tier", { n: conquestTier() }), W / 2, actY + 4);
        actY += 14;
    }
    var canA = canAscend();
    var respecEnabled = getSpentStars() > 0;
    var rspX, rspW2;
    if (canA) { rspX = rowX; rspW2 = rowW / 2 - 6; } else { rspW2 = Math.min(200, rowW); rspX = W / 2 - rspW2 / 2; }
    ctx.globalAlpha = respecEnabled ? 1 : 0.45;
    ctx.fillStyle = COLORS.panelAlt; ctx.beginPath(); roundRect(rspX, actY, rspW2, 30, 4); ctx.fill();
    ctx.strokeStyle = COLORS.gridLine; ctx.lineWidth = 1; ctx.beginPath(); roundRect(rspX, actY, rspW2, 30, 4); ctx.stroke();
    ctx.fillStyle = COLORS.text; ctx.font = "600 12px " + FONT_BODY; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(t("doctrine_respec"), rspX + rspW2 / 2, actY + 15);
