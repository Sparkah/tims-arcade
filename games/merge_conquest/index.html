function isSameCellPos(a, b) {
    return !!a && !!b && a.col === b.col && a.row === b.row;
}

function getTutorialAction() {
    // Steps 0-2 = L1 (merge then attack). Steps 10-12 = L2 (select / act / end).
    // Step 12 deliberately returns null (no target hex — ring is drawn around
    // the End Turn BUTTON separately, see drawTutorialEndTurnRing).
    var isL1 = tutorialStep >= 0 && tutorialStep < 3;
    var isL2 = tutorialStep >= 10 && tutorialStep <= 11;
    if (!isL1 && !isL2) return null;

    var sourceCell = null;
    var targetCell = null;

    if (tutorialStep === 0) {
        sourceCell = getCell(0, 2); // Bottom T1
        targetCell = getCell(0, 1); // Middle T1
        if (!sourceCell || !targetCell) return null;
        if (!canMerge(sourceCell, targetCell)) return null;
        return { source: sourceCell, target: targetCell };
    }

    if (tutorialStep === 1) {
        sourceCell = getCell(0, 1); // Resulting T2 after merge
        targetCell = getCell(0, 0); // Enemy T1
        if (!sourceCell || !targetCell) return null;
        if (!canAttack(sourceCell, targetCell)) return null;
        return { source: sourceCell, target: targetCell };
    }

    // v11.8d: L2 tutorial — return directed action target so the arrow + ring
    // can point at exactly the right hex per step.
    if (tutorialStep === 10) {
        // Step 10: point at the bottom-left player unit so they know to tap it.
        var s10 = getCell(0, 2);
        if (s10 && s10.owner === OWNER_PLAYER && s10.tier > 0) {
            return { source: s10, target: s10 };
        }
    }
    if (tutorialStep === 11) {
        // Step 11: source = selected unit; target = nearest enemy if attackable,
        // else any empty adjacent hex.
        if (!selectedCell) return null;
        var src = getCell(selectedCell.col, selectedCell.row);
        if (!src) return null;
        var neighbours = getNeighbors(src.col, src.row);
        // Prefer enemy target
        for (var ni = 0; ni < neighbours.length; ni++) {
            var nc = getCell(neighbours[ni].col, neighbours[ni].row);
            if (nc && nc.owner === OWNER_AI) return { source: src, target: nc };
        }
        // Fall back to empty adjacent
        for (var nj = 0; nj < neighbours.length; nj++) {
            var nc2 = getCell(neighbours[nj].col, neighbours[nj].row);
            if (nc2 && nc2.tier === 0 && nc2.owner === src.owner) return { source: src, target: nc2 };
        }
    }
    // Step 12 (END TURN button) handled separately — see drawTutorialEndTurnRing.

    return null;
}

function getTutorialTarget() {
    var action = getTutorialAction();
    if (!action) return null;

    var sourcePos = { col: action.source.col, row: action.source.row };
    var targetPos = { col: action.target.col, row: action.target.row };
    var sourceIsSelected = isSameCellPos(selectedCell, sourcePos);

    if (tutorialStep === 0 || tutorialStep === 1) {
        return sourceIsSelected ? targetPos : sourcePos;
    }
    // v11.8d: L2 tutorial — step 10 points at the unit to select; step 11
    // points at the merge/move/attack target after selection.
    if (tutorialStep === 10) return sourcePos;
    if (tutorialStep === 11) return sourceIsSelected ? targetPos : sourcePos;
    return null;
}

function drawTutorialOverlay() {
    var msg = null;
    if (tutorialStep >= 0 && tutorialStep < 3) {
        msg = [t("tutorial_1"), t("tutorial_2"), t("tutorial_3")][tutorialStep];
    } else if (tutorialStep === 10) msg = t("tutorial_l2_select");
    else if (tutorialStep === 11) msg = t("tutorial_l2_act");
    else if (tutorialStep === 12) msg = t("tutorial_l2_end");
    if (!msg) return;

    // Determine target hex for arrow pointer
    var targetCell = getTutorialTarget();
    var targetPos = targetCell ? hexToPixel(targetCell.col, targetCell.row) : null;

    // v8 fix: auto-wrap so text never overflows. Was hardcoded 300×48 →
    // tutorial_1 ("Only same-tier units can merge…") overflowed both edges.
    var tutFont = "600 13px " + FONT_BODY;
    var boxW = Math.min(W - 32, 560);   // wider, with margin
    var maxTextW = boxW - 28;            // leave 14px each side for accent + padding
    var lines = wrapTextLines(msg, maxTextW, tutFont);
    var lineH = 18;
    var boxH = lines.length * lineH + 22;
    var boxX = W / 2 - boxW / 2;
    var boxY = 56;
    // v13.2: For step 12 ("tap END TURN") the player's eye should travel
    // from the message DOWN to the gold button. Anchor the banner just above
    // the End Turn button instead of pinning it at the top of the grid.
    if (tutorialStep === 12) {
        var _endR = getEndTurnRect();
        boxY = Math.max(56, _endR.y - boxH - 14);
    }

    // Draw box
    ctx.fillStyle = "rgba(26,35,50,0.92)";
    ctx.beginPath();
    roundRect(boxX, boxY, boxW, boxH, 6);
    ctx.fill();
    ctx.strokeStyle = COLORS.gold;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    roundRect(boxX, boxY, boxW, boxH, 6);
    ctx.stroke();

    // Gold accent bar on left
    ctx.fillStyle = COLORS.gold;
    ctx.beginPath();
    roundRect(boxX, boxY, 4, boxH, 6);
    ctx.fill();

    // Message text (multi-line, centered)
    ctx.fillStyle = COLORS.text;
    ctx.font = tutFont;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    var startY = boxY + (boxH - lines.length * lineH) / 2 + lineH / 2;
    for (var li = 0; li < lines.length; li++) {
        ctx.fillText(lines[li], W / 2, startY + li * lineH);
    }

    // Arrow pointer from box to target hex
    if (targetPos) {
        var arrowStartX = W / 2;
        var arrowStartY = boxY + boxH;
        var arrowEndX = targetPos.x;
        var arrowEndY = targetPos.y - HEX_SIZE - 4;

        // Animated bob on the arrow tip
        var arrowBob = Math.sin(gameTime * 0.004) * 3;
        arrowEndY += arrowBob;

        // Draw arrow line (dashed)
        ctx.save();
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = COLORS.gold;
        ctx.globalAlpha = 0.6;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(arrowStartX, arrowStartY);
        ctx.lineTo(arrowEndX, arrowEndY - 6);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;

        // Arrow head triangle
        ctx.fillStyle = COLORS.gold;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.moveTo(arrowEndX, arrowEndY);
        ctx.lineTo(arrowEndX - 5, arrowEndY - 8);
        ctx.lineTo(arrowEndX + 5, arrowEndY - 8);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();

        // v11.8d: dramatic "TAP HERE" treatment — pulsing ring + shake +
        // floating "TAP HERE!" label. Was too subtle for new players.
        ctx.save();
        var shakeX = Math.sin(gameTime * 0.018) * 1.5;
        var shakeY = Math.cos(gameTime * 0.022) * 1.5;
        var ringPulse = 0.55 + 0.35 * Math.sin(gameTime * 0.006);

        // Outer expanding ring (largest, low alpha, breath)
        var breath = 1 + 0.08 * Math.sin(gameTime * 0.005);
        ctx.globalAlpha = ringPulse * 0.5;
        ctx.strokeStyle = COLORS.gold;
        ctx.lineWidth = 3;
        drawHex(targetPos.x + shakeX, targetPos.y + shakeY, (HEX_SIZE + 8) * breath);
        ctx.stroke();

        // Inner solid ring
        ctx.globalAlpha = ringPulse;
        ctx.lineWidth = 4;
        drawHex(targetPos.x + shakeX, targetPos.y + shakeY, HEX_SIZE + 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.restore();

        // "TAP HERE!" label below the target hex
        ctx.save();
        var labelPulse = 0.8 + 0.2 * Math.sin(gameTime * 0.008);
        ctx.globalAlpha = labelPulse;
        ctx.font = "700 14px " + FONT_BODY;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        var labelY = targetPos.y + HEX_SIZE + 18 + Math.sin(gameTime * 0.008) * 2;
        var labelText = currentLang === "ru" ? "НАЖМИ ЗДЕСЬ" : "TAP HERE";
        var lw = ctx.measureText(labelText).width;
        ctx.fillRect(targetPos.x - lw / 2 - 8, labelY - 10, lw + 16, 20);
        ctx.fillStyle = COLORS.gold;
        ctx.fillText(labelText, targetPos.x, labelY);
        ctx.globalAlpha = 1;
        ctx.restore();
    }

    // v11.8d: L2 tutorial step 12 = "tap END TURN" — pulsing ring around the
    // End Turn button so it's unmistakable.
    if (tutorialStep === 12) {
        drawTutorialEndTurnRing();
    }
}

function drawTutorialEndTurnRing() {
    // v13.2: read from getEndTurnRect() so the ring tracks the REAL button in
    // both portrait and landscape. Pre-v13 hardcoded landscape (W/2-65,H-72,
    // 130×38) → on portrait it drew a tiny ring floating off-target above the
    // wide gold button.
    var er = getEndTurnRect();
    var pulse = 0.7 + 0.3 * Math.sin(gameTime * 0.007);
    var breath = 1 + 0.08 * Math.sin(gameTime * 0.005);
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.strokeStyle = COLORS.gold;
    ctx.lineWidth = 4;
    var pad = 6 * breath;
    ctx.beginPath();
    roundRect(er.x - pad, er.y - pad, er.w + pad * 2, er.h + pad * 2, 8);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
}

function drawMissionsOverlay() {

        ctx.beginPath(); roundRect(pbX, pbY, pbW, pbH, 4); ctx.fill();

        ctx.fillStyle = done ? COLORS.gold : COLORS.playerStroke;
        if (ratio > 0) { ctx.beginPath(); roundRect(pbX, pbY, pbW * ratio, pbH, 4); ctx.fill(); }

            ctx.fillText(t("mission_claimed"), r.claim.x + r.claim.w / 2, r.claim.y + r.claim.h / 2);

    // All-3 bonus banner
    if (dm.allClaimed) {

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = COLORS.gold;
    ctx.font = "700 22px " + (currentLang === "ru" ? FONT_BODY : FONT_TITLE);
    ctx.fillText(t("bonus_calendar_title"), W / 2, py + 30);
    ctx.fillStyle = COLORS.textDark;
    ctx.font = "400 11px " + FONT_BODY;
    ctx.fillText(t("bonus_calendar_subtitle"), W / 2, py + 52);

    // 30-day grid (6 cols × 5 rows)
    var cols = 6, rows = 5;
    var gridW = panelW - 40;
    var cellW = (gridW - (cols - 1) * 6) / cols;
    var cellH = 56;
    var gridX = px + 20;
    var gridY = py + 78;

    var streak = save ? (save.loginStreak || 0) : 0;
    var claimedToday = save && save.lastLoginDay === getTodayDateStr();
    var todayDay = streak;       // streak == days claimed including today
    var milestones = { 2: true, 7: true, 14: true, 21: true, 30: true };

    for (var i = 0; i < 30; i++) {
        var day = i + 1;
        var row = Math.floor(i / cols);
        var col = i % cols;
        var cx = gridX + col * (cellW + 6);
        var cy = gridY + row * (cellH + 6);

        var stars = getDailyBonusStarsForStreak(day);
        var isMilestone = !!milestones[day];
        var isClaimed = day < todayDay || (day === todayDay && claimedToday);
        var isToday = day === todayDay && claimedToday;
        var isUnclaimedToday = day === (todayDay > 0 ? todayDay : 1) && !claimedToday && day === (streak > 0 ? streak + 1 : 1) - (streak > 0 ? 0 : 0);
        // Simpler logic: "today's unclaimed" = the day that would be next claim
        if (!claimedToday) {
            // If streak shows last claim was yesterday, next claim is streak+1
            var nextDay = (save && save.lastLoginDay === getYesterdayDateStr()) ? streak + 1 : 1;
            isToday = (day === nextDay);
        }

        // Cell background
        var fillC, strokeC, txtC;
        if (isToday) {
            fillC = COLORS.gold;
            strokeC = "#FFD700";
            txtC = COLORS.bg;
        } else if (isClaimed) {
            fillC = "rgba(196,163,90,0.08)";
            strokeC = "rgba(196,163,90,0.20)";
            txtC = COLORS.textDark;
        } else if (isMilestone) {
            fillC = "rgba(196,163,90,0.15)";
            strokeC = COLORS.gold;
            txtC = COLORS.gold;
        } else {
            fillC = COLORS.panelAlt;
            strokeC = COLORS.gridLine;
            txtC = COLORS.text;
        }

        if (isToday) {
            ctx.shadowBlur = 8;
            ctx.shadowColor = "rgba(196,163,90,0.7)";
        }
        ctx.fillStyle = fillC;
        ctx.beginPath(); roundRect(cx, cy, cellW, cellH, 4); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = strokeC;
        ctx.lineWidth = isToday || isMilestone ? 2 : 1;
        ctx.beginPath(); roundRect(cx, cy, cellW, cellH, 4); ctx.stroke();

        // Day label
        ctx.fillStyle = txtC;
        ctx.font = (isToday ? "700" : "600") + " 11px " + FONT_BODY;
        ctx.fillText("D" + day, cx + cellW / 2, cy + 14);

        // Star reward
        ctx.font = (isMilestone || isToday ? "700" : "600") + " 16px " + FONT_BODY;
        ctx.fillText("+" + stars + "★", cx + cellW / 2, cy + 33);

        // Claim/milestone marker bottom
        if (isClaimed && !isToday) {
            ctx.font = "600 10px " + FONT_BODY;
            ctx.fillText(t("bonus_calendar_claimed"), cx + cellW / 2, cy + 48);
        } else if (isToday) {
            ctx.font = "700 8px " + FONT_BODY;
            ctx.fillText(t("bonus_calendar_today"), cx + cellW / 2, cy + 48);
        } else if (isMilestone) {
            ctx.font = "700 10px " + FONT_BODY;
            ctx.fillStyle = COLORS.gold;
            ctx.fillText("★", cx + cellW / 2, cy + 48);
        }
    }

    // Close button (bottom-center, big mobile-friendly tap)
    var closeBtnW = 160, closeBtnH = 44;
    var closeBtnX = W / 2 - closeBtnW / 2;
    var closeBtnY = py + panelH - 56;
    ctx.fillStyle = COLORS.panelAlt;
    ctx.beginPath(); roundRect(closeBtnX, closeBtnY, closeBtnW, closeBtnH, 6); ctx.fill();
    ctx.strokeStyle = COLORS.gridLine;
    ctx.lineWidth = 1;
    ctx.beginPath(); roundRect(closeBtnX, closeBtnY, closeBtnW, closeBtnH, 6); ctx.stroke();
    ctx.fillStyle = COLORS.text;
    ctx.font = "600 13px " + FONT_BODY;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(t("bonus_calendar_close"), W / 2, closeBtnY + closeBtnH / 2);
}

// -- Commander portrait (geometric, no external assets) ------------------
function drawCommanderPortrait(cx, cy, radius, commander, defeated) {
    ctx.save();
    // Halo frame
    ctx.beginPath();
    ctx.arc(cx, cy, radius + 8, 0, Math.PI * 2);
    ctx.strokeStyle = defeated ? "#5A5A5A" : commander.accent;
    ctx.lineWidth = 3;
    ctx.stroke();

    // Background disc (hue darkened if defeated)
    var fillCol = defeated ? "#2A2A2A" : commander.hue;
    ctx.fillStyle = fillCol;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();

    // Head silhouette (helmet shape)
    ctx.fillStyle = defeated ? "#3A3A3A" : "#1A1F28";
    ctx.beginPath();
    ctx.arc(cx, cy - radius * 0.05, radius * 0.55, Math.PI * 1.05, Math.PI * 1.95);
    ctx.lineTo(cx + radius * 0.45, cy + radius * 0.35);
    ctx.lineTo(cx - radius * 0.45, cy + radius * 0.35);
    ctx.closePath();
    ctx.fill();

    // Visor slit
    ctx.fillStyle = defeated ? "#222" : commander.accent;
    ctx.fillRect(cx - radius * 0.32, cy - radius * 0.1, radius * 0.64, 3);

    // Crest accent — per-commander quick differentiator
    var accent = defeated ? "#666" : commander.accent;
    ctx.fillStyle = accent;
    ctx.strokeStyle = accent;
    ctx.lineWidth = 2;
    var crest = commander.crest;
    if (crest === "sword") {
        ctx.beginPath();
        ctx.moveTo(cx, cy - radius * 0.9);
        ctx.lineTo(cx - 3, cy - radius * 0.4);
        ctx.lineTo(cx + 3, cy - radius * 0.4);
        ctx.closePath();
        ctx.fill();
    } else if (crest === "raven") {
        ctx.beginPath();
        ctx.moveTo(cx - 10, cy - radius * 0.85);
        ctx.quadraticCurveTo(cx, cy - radius * 1.05, cx + 10, cy - radius * 0.85);
        ctx.lineTo(cx, cy - radius * 0.6);
        ctx.closePath();
        ctx.fill();
    } else if (crest === "shield") {
        ctx.beginPath();
        ctx.moveTo(cx, cy - radius * 0.95);
        ctx.lineTo(cx + 9, cy - radius * 0.75);
        ctx.lineTo(cx + 9, cy - radius * 0.55);
        ctx.lineTo(cx, cy - radius * 0.4);
        ctx.lineTo(cx - 9, cy - radius * 0.55);
        ctx.lineTo(cx - 9, cy - radius * 0.75);
        ctx.closePath();
        ctx.fill();
    } else if (crest === "crown") {
        ctx.beginPath();
        ctx.moveTo(cx - 12, cy - radius * 0.55);
        ctx.lineTo(cx - 12, cy - radius * 0.85);
        ctx.lineTo(cx - 6, cy - radius * 0.7);
        ctx.lineTo(cx, cy - radius * 0.95);
        ctx.lineTo(cx + 6, cy - radius * 0.7);
        ctx.lineTo(cx + 12, cy - radius * 0.85);
        ctx.lineTo(cx + 12, cy - radius * 0.55);
        ctx.closePath();
        ctx.fill();
    } else if (crest === "fangs") {
        ctx.beginPath();
        ctx.moveTo(cx - 10, cy - radius * 0.5);
        ctx.lineTo(cx - 6, cy - radius * 0.85);
        ctx.lineTo(cx - 2, cy - radius * 0.55);
        ctx.lineTo(cx + 2, cy - radius * 0.85);
        ctx.lineTo(cx + 6, cy - radius * 0.55);
        ctx.lineTo(cx + 10, cy - radius * 0.85);
        ctx.fill();
    } else if (crest === "flame") {
        ctx.beginPath();
        ctx.moveTo(cx, cy - radius * 0.95);
        ctx.quadraticCurveTo(cx + 12, cy - radius * 0.6, cx + 4, cy - radius * 0.45);
        ctx.quadraticCurveTo(cx, cy - radius * 0.7, cx - 4, cy - radius * 0.45);
        ctx.quadraticCurveTo(cx - 12, cy - radius * 0.6, cx, cy - radius * 0.95);
        ctx.fill();
    } else if (crest === "teeth") {
        for (var ti = 0; ti < 4; ti++) {
            var tx = cx - 12 + ti * 8;
            ctx.beginPath();
            ctx.moveTo(tx, cy - radius * 0.5);
            ctx.lineTo(tx + 3, cy - radius * 0.9);
            ctx.lineTo(tx + 6, cy - radius * 0.5);
            ctx.closePath();
            ctx.fill();
        }
    } else if (crest === "snowflake") {
        ctx.beginPath();
        for (var sa = 0; sa < 6; sa++) {
            var ang = sa * Math.PI / 3;
            ctx.moveTo(cx, cy - radius * 0.7);
            ctx.lineTo(cx + Math.cos(ang - Math.PI / 2) * 11, cy + Math.sin(ang - Math.PI / 2) * 11 - radius * 0.7);
        }
        ctx.stroke();
    } else if (crest === "tier") {
        ctx.font = "700 14px " + FONT_BODY;
        ctx.textAlign = "center";
        ctx.fillText("99", cx, cy - radius * 0.7);
    } else if (crest === "borscht") {
        // a bowl with steam
        ctx.beginPath();
        ctx.arc(cx, cy - radius * 0.6, 12, 0, Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(cx - 6, cy - radius * 0.85);
        ctx.quadraticCurveTo(cx - 4, cy - radius * 1.05, cx - 2, cy - radius * 0.85);
        ctx.moveTo(cx + 2, cy - radius * 0.9);
        ctx.quadraticCurveTo(cx + 4, cy - radius * 1.1, cx + 6, cy - radius * 0.9);
        ctx.stroke();
    }
    ctx.restore();
}

// Word-wrap helper for taunt quotes
// v9 (2026-05-18) — safety net for button labels that may overflow under
// other languages. Pass the desired font (e.g. "700 13px Inter"), max width,
// and minimum px size; returns the largest font string that fits, or the
// minimum-size font if the text never fits cleanly (truncate guard).
function fitFontToWidth(text, maxWidth, baseFont, minPx) {
    minPx = minPx || 9;
    // Extract size from baseFont (matches "<weight> <size>px <family>")
    var m = baseFont.match(/^(.*?)(\d+(?:\.\d+)?)px(.*)$/);
    if (!m) return baseFont;
    var prefix = m[1], sizeBase = parseFloat(m[2]), suffix = m[3];
    for (var s = sizeBase; s >= minPx; s--) {
        ctx.font = prefix + s + 'px' + suffix;
        if (ctx.measureText(text).width <= maxWidth) {
            return prefix + s + 'px' + suffix;
        }
    }
    return prefix + minPx + 'px' + suffix;
}

function wrapTextLines(text, maxWidth, font) {
    ctx.font = font;
    var words = text.split(/\s+/);
    var lines = [];
    var line = "";
    for (var i = 0; i < words.length; i++) {
        var w = words[i];
        var test = line ? (line + " " + w) : w;
        if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = w;
        } else {
            line = test;
        }
    }
    if (line) lines.push(line);
    return lines;
}

// v17 — NEW UNIT UNLOCKED reveal card. Painted as an overlay on top of the

// case the player doesn't realise it's tappable. Lives as an OVERLAY (not a

function drawTierUnlockOverlay() {
    if (!pendingTierUnlock) return;
    var tier = pendingTierUnlock.tier;

    // Full-canvas dim scrim
    ctx.fillStyle = "rgba(0,0,0,0.72)";
    ctx.fillRect(0, 0, W, H);

    // Card
    var cardW = Math.min(420, W - 32);
    var cardH = 320;
    var cardX = W / 2 - cardW / 2;
    var cardY = H / 2 - cardH / 2;
    ctx.fillStyle = COLORS.panel;
    ctx.strokeStyle = COLORS.tierColors[tier - 1] || COLORS.playerStroke;
    ctx.lineWidth = 3;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(cardX, cardY, cardW, cardH, 14);
    else ctx.rect(cardX, cardY, cardW, cardH);
    ctx.fill();
    ctx.stroke();

    // Title
    ctx.fillStyle = "#C4A35A";
    ctx.font = "bold 18px 'Cinzel', serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(t("new_unit_unlocked_title"), cardX + cardW / 2, cardY + 38);

    // Big unit preview — reuse the in-game drawUnit at large scale
    var previewCx = cardX + cardW / 2;
    var previewCy = cardY + 140;
    var saved = HEX_SIZE;
    HEX_SIZE = 80;
    drawUnit(previewCx, previewCy, tier, OWNER_PLAYER, 1.4, null, null);
    HEX_SIZE = saved;

    // Unit name
    var nameKey = "unit_t" + tier + "_name";
    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 22px 'Cinzel', serif";
    ctx.fillText(t(nameKey), cardX + cardW / 2, cardY + 222);

    // Recipe sub-line — "Merge two T(N-1)s to recruit"
    ctx.fillStyle = "#B0B0B0";
    ctx.font = "14px 'Inter', sans-serif";
    var sub = t("new_unit_unlocked_sub").replace("{N}", tier).replace("{N1}", tier - 1);
    ctx.fillText(sub, cardX + cardW / 2, cardY + 252);

    // Tap-to-continue hint
    ctx.fillStyle = "#C4A35A";
    ctx.font = "13px 'Inter', sans-serif";
    ctx.fillText(t("tap_to_advance"), cardX + cardW / 2, cardY + cardH - 26);

    // Auto-dismiss after 5s
    if (Date.now() - pendingTierUnlock.shownAt > 5000) {
        pendingTierUnlock = null;
    }
}

// v17 — resume-last-run modal. Shown once per fresh-session when a
// snapshot exists and was saved ≥ 30 min ago. Two buttons: Continue / New.
function getResumePromptRects() {
    var cardW = Math.min(360, W - 32);
    var cardH = 220;
    var cardX = W / 2 - cardW / 2;
    var cardY = H / 2 - cardH / 2;

    var btnH = 44;

    return {
        card: { x: cardX, y: cardY, w: cardW, h: cardH },
        yes:  { x: cardX + 12, y: btnY, w: btnW, h: btnH },
        no:   { x: cardX + 24 + btnW, y: btnY, w: btnW, h: btnH }
    };
}
function drawResumePromptOverlay() {
    if (!resumePromptVisible) return;
    if (!save || !save.inProgressRun) { resumePromptVisible = false; return; }
    var r = save.inProgressRun;
    var rects = getResumePromptRects();

    // Scrim
    ctx.fillStyle = "rgba(0,0,0,0.78)";
    ctx.fillRect(0, 0, W, H);

    // Card
    ctx.fillStyle = COLORS.panel;
    ctx.strokeStyle = "#C4A35A";
    ctx.lineWidth = 2;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(rects.card.x, rects.card.y, rects.card.w, rects.card.h, 12);
    else ctx.rect(rects.card.x, rects.card.y, rects.card.w, rects.card.h);
    ctx.fill();
    ctx.stroke();

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#C4A35A";
    ctx.font = "bold 20px serif";
    var title = currentLang === "ru" ? "Продолжить битву?" : "Continue your battle?";
    ctx.fillText(title, W / 2, rects.card.y + 38);

    // Subtitle — level or wave reference
    ctx.fillStyle = "#E0E0E0";
    ctx.font = "14px sans-serif";
    var sub;
    if (r.mode === "endless") {
        sub = currentLang === "ru"
            ? "Без конца · волна " + ((r.endlessWave || 0) + 1)
            : "Endless · wave " + ((r.endlessWave || 0) + 1);
    } else {
        sub = currentLang === "ru"
            ? "Уровень " + ((r.currentLevel || 0) + 1)
            : "Level " + ((r.currentLevel || 0) + 1);
    }
    ctx.fillText(sub, W / 2, rects.card.y + 76);

    // Time-away hint
    var awayMs = Math.max(0, Date.now() - (r.savedAt || Date.now()));
    var awayMin = Math.floor(awayMs / 60000);
    var awayLabel;
    if (awayMin < 60) awayLabel = awayMin + (currentLang === "ru" ? " мин назад" : " min ago");
    else if (awayMin < 1440) awayLabel = Math.floor(awayMin / 60) + (currentLang === "ru" ? " ч назад" : "h ago");
    else awayLabel = Math.floor(awayMin / 1440) + (currentLang === "ru" ? " дн назад" : "d ago");
    ctx.fillStyle = "#9CB7DB";
    ctx.font = "12px sans-serif";
    ctx.fillText(awayLabel, W / 2, rects.card.y + 100);

    // Buttons
    ctx.fillStyle = COLORS.gold;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(rects.yes.x, rects.yes.y, rects.yes.w, rects.yes.h, 8);
    else ctx.rect(rects.yes.x, rects.yes.y, rects.yes.w, rects.yes.h);
    ctx.fill();
    ctx.fillStyle = COLORS.bg;
    ctx.font = "bold 14px sans-serif";
    ctx.fillText(currentLang === "ru" ? "ПРОДОЛЖИТЬ" : "CONTINUE", rects.yes.x + rects.yes.w / 2, rects.yes.y + rects.yes.h / 2);

// Find next-affordable upgrade: cheapest unmet whose prerequisites are owned.
function getNextUpgrade() {
    // v19 -cheapest still-buyable doctrine node (drives the win-screen progress
    // widget). Returns a light {key,name_en,name_ru,cost} shape (getNodeName-safe).
    var best = null, bestCost = Infinity;
    for (var i = 0; i < BAL.nodes.length; i++) {
        var nd = BAL.nodes[i];
        if (doctrineLevel(nd.key) >= doctrineMaxLevel(nd.key)) continue;
        var c = nodeStepCost(nd.key, doctrineLevel(nd.key) + 1);
        if (c < bestCost) { bestCost = c; best = nd; }
    }
    if (!best) return null;
    return { key: best.key, name_en: best.name_en, name_ru: best.name_ru, cost: bestCost };
}

function drawEndlessEndScreen(won) {
    ctx.fillStyle = "rgba(0,0,0,0.78)";
    ctx.fillRect(0, 0, W, H);

    var cardW = ENDLESS_END_CARD.w, cardH = ENDLESS_END_CARD.h;
    var cardX = W / 2 - cardW / 2, cardY = H / 2 - cardH / 2;
    ctx.fillStyle = COLORS.panel;
    ctx.beginPath();
    roundRect(cardX, cardY, cardW, cardH, 10);
    ctx.fill();
    ctx.strokeStyle = won ? COLORS.gold : COLORS.aiStroke;
    ctx.lineWidth = 2;
    ctx.beginPath();
    roundRect(cardX, cardY, cardW, cardH, 10);
    ctx.stroke();

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // ── Title row ────────────────────────────────────────────────────────
    if (won) {
        ctx.shadowBlur = 10;
        ctx.shadowColor = COLORS.gold;
        ctx.fillStyle = COLORS.gold;
        ctx.font = "700 26px " + FONT_TITLE;
        ctx.fillText(t("endless_wave", { n: endlessWave + 1 }), W / 2, cardY + 38);
        ctx.shadowBlur = 0;
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "400 12px " + FONT_BODY;
        ctx.fillText(t("victory"), W / 2, cardY + 62);
    } else {
        ctx.shadowBlur = 8;
        ctx.shadowColor = COLORS.aiStroke;
        ctx.fillStyle = COLORS.aiStroke;
        ctx.font = "700 28px " + FONT_TITLE;
        ctx.fillText(t("defeat"), W / 2, cardY + 38);
        ctx.shadowBlur = 0;
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "400 12px " + FONT_BODY;
        ctx.fillText(t("endless_defeat"), W / 2, cardY + 62);
    }

    // ── Score block ─────────────────────────────────────────────────────
    var currentScore = won ? (endlessWave + 1) : endlessWave;
    var scoreY = cardY + 110;
    ctx.fillStyle = COLORS.gold;
    ctx.font = "700 44px " + FONT_TITLE;
    ctx.fillText("" + currentScore, W / 2, scoreY);

    ctx.fillStyle = COLORS.textDark;
    ctx.font = "500 11px " + FONT_BODY;
    ctx.fillText(t("endless_score").toUpperCase() + "  ·  " +
                 t("endless_best") + ": " + save.endlessBest,
                 W / 2, scoreY + 32);

    var isNewBest = currentScore >= save.endlessBest && save.endlessBest > 0 && !won;
    if (isNewBest) {
        ctx.fillStyle = COLORS.gold;
        ctx.font = "700 13px " + FONT_BODY;
        ctx.fillText("✦ " + t("endless_new_best") + " ✦", W / 2, scoreY + 52);
    } else {
        // Percentile hook for non-best runs (gives second-session target)
        var pctEndless = getPercentileForEndless(currentScore);
        var pctKey = pctEndless >= 90 ? "percentile_top" : "percentile_better";
        var pctVal = pctEndless >= 90 ? (100 - pctEndless) : pctEndless;
        ctx.fillStyle = COLORS.gold;
        ctx.font = "700 12px " + FONT_BODY;
        ctx.fillText(t(pctKey, { pct: pctVal }), W / 2, scoreY + 52);
    }

    // ── Split panels: leaderboard (left) + history (right) ──────────────
    var panelTop = cardY + 170;
    var panelH   = 200;
    var leftX    = cardX + 22;
    var rightX   = cardX + cardW / 2 + 6;
    var panelW   = cardW / 2 - 28;

    // Left panel: Top players (global leaderboard)
    ctx.fillStyle = COLORS.panelAlt;
    ctx.beginPath();
    roundRect(leftX, panelTop, panelW, panelH, 6);
    ctx.fill();

    ctx.textAlign = "left";
    ctx.fillStyle = COLORS.gold;
    ctx.font = "700 11px " + FONT_BODY;
    ctx.fillText("🏆 " + t("leaderboard_title").toUpperCase(), leftX + 10, panelTop + 14);

    var lbY = panelTop + 36;
    if (leaderboardCache.fetching && leaderboardCache.topEntries.length === 0) {
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "400 11px " + FONT_BODY;
        ctx.fillText(t("leaderboard_loading"), leftX + 10, lbY);
    } else if (leaderboardCache.error === 'not-created') {
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "italic 400 11px " + FONT_BODY;
        ctx.fillText(t("leaderboard_not_created"), leftX + 10, lbY);
    } else if (leaderboardCache.error || leaderboardCache.topEntries.length === 0) {
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "400 11px " + FONT_BODY;
        ctx.fillText(t("leaderboard_offline"), leftX + 10, lbY);
    } else {
        ctx.font = "500 11px " + FONT_BODY;
        var entries = leaderboardCache.topEntries.slice(0, 5);
        for (var i = 0; i < entries.length; i++) {
            var e = entries[i];
            var rowY = lbY + i * 20;
            // Rank
            ctx.fillStyle = i === 0 ? COLORS.gold : COLORS.textDark;
            ctx.font = (i === 0 ? "700" : "600") + " 11px " + FONT_BODY;
            ctx.fillText("#" + e.rank, leftX + 10, rowY);
            // Name (truncated to ~12 chars)
            ctx.fillStyle = COLORS.text;
            ctx.font = "400 11px " + FONT_BODY;
            var nameDisplay = e.name && e.name.length > 12 ? e.name.slice(0, 11) + '…' : (e.name || '—');
            ctx.fillText(nameDisplay, leftX + 38, rowY);
            // Score (right-aligned within panel)
            ctx.textAlign = "right";
            ctx.fillStyle = COLORS.gold;
            ctx.font = "700 11px " + FONT_BODY;
            ctx.fillText("" + e.score, leftX + panelW - 10, rowY);
            ctx.textAlign = "left";
        }
        // Player's rank line at bottom of panel
        var rankLineY = panelTop + panelH - 14;
        ctx.fillStyle = COLORS.playerLight;
        ctx.font = "600 11px " + FONT_BODY;
        var rankText;
        if (leaderboardCache.userRank) {
            rankText = t("you_rank", { n: leaderboardCache.userRank, total: leaderboardCache.totalEntries });
        } else {
            rankText = t("you_rank_unranked");
        }
        ctx.fillText(rankText, leftX + 10, rankLineY);
    }

    // Right panel: Recent runs (last 5 from save.endlessHistory)
    ctx.fillStyle = COLORS.panelAlt;
    ctx.beginPath();
    roundRect(rightX, panelTop, panelW, panelH, 6);
    ctx.fill();

    ctx.fillStyle = COLORS.playerLight;
    ctx.font = "700 11px " + FONT_BODY;
    ctx.fillText("⌛ " + t("recent_runs").toUpperCase(), rightX + 10, panelTop + 14);

    var history = Array.isArray(save.endlessHistory) ? save.endlessHistory : [];
    if (history.length === 0) {
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "italic 400 11px " + FONT_BODY;
        ctx.fillText(t("no_runs_yet"), rightX + 10, panelTop + 36);
    } else {
        for (var hi = 0; hi < Math.min(5, history.length); hi++) {
            var h = history[hi];
            var hY = panelTop + 36 + hi * 22;
            // Index (1 = most recent)
            ctx.fillStyle = hi === 0 ? COLORS.gold : COLORS.textDark;
            ctx.font = (hi === 0 ? "700" : "500") + " 11px " + FONT_BODY;
            ctx.fillText("·" + (hi + 1), rightX + 10, hY);
            // Wave count
            ctx.fillStyle = COLORS.text;
            ctx.font = "500 11px " + FONT_BODY;
            ctx.fillText(t("endless_wave", { n: h.score }), rightX + 36, hY);
            // Relative time (e.g. "2h" / "5m")
            if (h.ts) {
                var dtMs = Date.now() - h.ts;
                var rel;
                if (dtMs < 60000) rel = "<1m";
                else if (dtMs < 3600000) rel = Math.floor(dtMs / 60000) + "m";
                else if (dtMs < 86400000) rel = Math.floor(dtMs / 3600000) + "h";
                else rel = Math.floor(dtMs / 86400000) + "d";
                ctx.textAlign = "right";
                ctx.fillStyle = COLORS.textDark;
                ctx.font = "400 10px " + FONT_BODY;
                ctx.fillText(rel, rightX + panelW - 10, hY);
                ctx.textAlign = "left";
            }
        }
    }

    // ── Buttons ─────────────────────────────────────────────────────────
    var btns = getEndlessEndButtons(won);
    var primary = btns.primary, levels = btns.levels;

    ctx.shadowBlur = 10;
    ctx.shadowColor = won ? "rgba(196,163,90,0.55)" : "rgba(209,46,46,0.55)";
    ctx.fillStyle = won ? COLORS.gold : COLORS.aiStroke;
    ctx.beginPath();
    roundRect(primary.x, primary.y, primary.w, primary.h, 5);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = won ? COLORS.bg : "#fff";
    ctx.font = "700 13px " + FONT_BODY;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(won ? t("endless_continue") : t("endless_retry"), primary.x + primary.w / 2, primary.y + primary.h / 2);

    ctx.fillStyle = COLORS.panelAlt;
    ctx.beginPath();
    roundRect(levels.x, levels.y, levels.w, levels.h, 5);
    ctx.fill();
    ctx.fillStyle = COLORS.text;
    ctx.font = "600 13px " + FONT_BODY;
    ctx.fillText(t("btn_levels"), levels.x + levels.w / 2, levels.y + levels.h / 2);
}

function drawEndScreen(won) {
    if (gameMode === "endless") {
        drawEndlessEndScreen(won);
        return;
    }
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.fillRect(0, 0, W, H);

    // Card
    var cardW = Math.min(420, W - 16), cardH = 360;
    var cardX = W / 2 - cardW / 2, cardY = H / 2 - cardH / 2;
    ctx.fillStyle = COLORS.panel;
    ctx.beginPath();
    roundRect(cardX, cardY, cardW, cardH, 8);
    ctx.fill();
    ctx.strokeStyle = won ? "#FFD700" : COLORS.aiStroke;
    ctx.lineWidth = 2;
    ctx.beginPath();
    roundRect(cardX, cardY, cardW, cardH, 8);
    ctx.stroke();

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    if (won) {
        ctx.shadowBlur = 12;
        ctx.shadowColor = "#FFD700";
        ctx.fillStyle = "#FFD700";
        ctx.font = "700 38px " + FONT_TITLE;
        ctx.fillText(t("victory"), W / 2, cardY + 50);
        ctx.shadowBlur = 0;

        // Level name subtitle
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "400 13px " + FONT_BODY;
        ctx.fillText(t("level_label", { level: currentLevel + 1, name: getLevelDisplayName(currentLevel) }), W / 2, cardY + 76);

        // Crown emblem
        ctx.fillStyle = "#FFD700";
        ctx.beginPath();
        ctx.moveTo(W / 2 - 22, cardY + 112);
        ctx.lineTo(W / 2 - 22, cardY + 96);
        ctx.lineTo(W / 2 - 11, cardY + 105);
        ctx.lineTo(W / 2, cardY + 88);
        ctx.lineTo(W / 2 + 11, cardY + 105);
        ctx.lineTo(W / 2 + 22, cardY + 96);
        ctx.lineTo(W / 2 + 22, cardY + 112);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#E53935";
        ctx.beginPath(); ctx.arc(W / 2 - 11, cardY + 103, 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#2196F3";
        ctx.beginPath(); ctx.arc(W / 2, cardY + 95, 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#E53935";
        ctx.beginPath(); ctx.arc(W / 2 + 11, cardY + 103, 2, 0, Math.PI * 2); ctx.fill();

        // Stats
        var pt = 0;
        for (var i = 0; i < grid.length; i++) if (grid[i].owner === OWNER_PLAYER) pt++;
        var sy = cardY + 134;
        ctx.font = "400 13px " + FONT_BODY;

        // Stats in two columns for cleaner layout
        ctx.fillStyle = COLORS.textDark;
        ctx.textAlign = "right";
        ctx.fillText(t("stat_turns"), W / 2 - 8, sy);
        ctx.fillText(t("stat_units_lost"), W / 2 - 8, sy + 20);
        var totalTiles = LEVELS[currentLevel].cols * LEVELS[currentLevel].rows;
        ctx.fillText(t("stat_territory"), W / 2 - 8, sy + 40);
        ctx.fillText(t("stat_par"), W / 2 - 8, sy + 60);

        ctx.fillStyle = COLORS.text;
        ctx.textAlign = "left";
        ctx.fillText("" + turnNumber, W / 2 + 8, sy);
        ctx.fillText("" + playerUnitsLost, W / 2 + 8, sy + 20);
        ctx.fillText(pt + "/" + totalTiles, W / 2 + 8, sy + 40);
        ctx.fillText(t("par_turns", { value: LEVELS[currentLevel].parTurns }), W / 2 + 8, sy + 60);

        // Star rating (larger, more prominent)
        var stars = lastWinStars;
        var starY = sy + 92;
        ctx.textAlign = "center";
        for (var i = 0; i < 3; i++) {
            var filled = i < stars;
            var sx = W / 2 - 30 + i * 30;
            if (filled) {
                ctx.shadowBlur = 6;
                ctx.shadowColor = "#FFD700";
            }
            ctx.fillStyle = filled ? "#FFD700" : COLORS.panelAlt;
            drawStar(sx, starY, 5, 12, 6);
            ctx.fill();
            if (filled) {
                ctx.strokeStyle = "#B8860B";
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
        }

        // Upgrade progress widget
        var nextUp = getNextUpgrade();
        var widY = starY + 28;
        if (nextUp) {
            var availStars = getAvailableStars();
            var ratio = Math.max(0, Math.min(1, availStars / nextUp.cost));
            ctx.font = "400 10px " + FONT_BODY;
            ctx.fillStyle = COLORS.textDark;
            ctx.fillText(t("progress_label") + ": " + getNodeName(nextUp), W / 2, widY);
            // Bar background
            var barW = 200, barH = 6, barX = W / 2 - barW / 2, barY = widY + 12;
            ctx.fillStyle = COLORS.panelAlt;
            ctx.beginPath(); roundRect(barX, barY, barW, barH, 3); ctx.fill();
            // Bar fill
            ctx.fillStyle = ratio >= 1 ? "#FFD700" : COLORS.playerStroke;
            ctx.beginPath(); roundRect(barX, barY, barW * ratio, barH, 3); ctx.fill();
            // Count
            ctx.fillStyle = COLORS.text;
            ctx.font = "600 10px " + FONT_BODY;
            ctx.fillText(availStars + " / " + nextUp.cost + " ★", W / 2, barY + barH + 10);
        } else {
            ctx.font = "400 10px " + FONT_BODY;
            ctx.fillStyle = COLORS.textDark;
            ctx.fillText(t("progress_locked"), W / 2, widY + 6);
        }
    } else {
        ctx.shadowBlur = 10;
        ctx.shadowColor = COLORS.aiStroke;
        ctx.fillStyle = COLORS.aiStroke;
        ctx.font = "700 38px " + FONT_TITLE;
        ctx.fillText(t("defeat"), W / 2, cardY + 50);
        ctx.shadowBlur = 0;

        // Level name subtitle
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "400 13px " + FONT_BODY;
        ctx.fillText(t("level_label", { level: currentLevel + 1, name: getLevelDisplayName(currentLevel) }), W / 2, cardY + 76);

        // Broken sword emblem — shifted down (was poking into the level-label
        // text). Now sits in y=cardY+96..cardY+125 with text ending at +84.
        ctx.strokeStyle = COLORS.aiStroke;
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(W / 2 - 3, cardY + 125);
        ctx.lineTo(W / 2 - 3, cardY + 102);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(W / 2 + 4, cardY + 98);
        ctx.lineTo(W / 2 + 10, cardY + 96); // diagonal kept short so it cannot reach text row above
        ctx.stroke();
        ctx.fillStyle = "#555";
        ctx.fillRect(W / 2 - 9, cardY + 123, 12, 3);

        var pt = 0;
        for (var i = 0; i < grid.length; i++) if (grid[i].owner === OWNER_PLAYER) pt++;
        var sy = cardY + 140;
        ctx.font = "400 14px " + FONT_BODY;
        ctx.fillStyle = COLORS.textDark;
        ctx.fillText(t("survived_turns", { value: turnNumber }), W / 2, sy);
        ctx.fillText(t("territories_left", { value: pt }), W / 2, sy + 24);

        // Percentile hook — synthetic comparison (give the next-session target)
        var pctLose = getPercentileForCampaign(currentLevel);
        ctx.font = "700 13px " + FONT_BODY;
        ctx.fillStyle = COLORS.gold;
        var pctKey = pctLose >= 90 ? "percentile_top" : "percentile_better";
        var pctVal = pctLose >= 90 ? (100 - pctLose) : pctLose;
        ctx.fillText(t(pctKey, { pct: pctVal }), W / 2, sy + 50);

        // Hint text
        ctx.fillStyle = COLORS.textDark;
        ctx.font = "400 11px " + FONT_BODY;
        ctx.globalAlpha = 0.7;
        ctx.fillText(t("defeat_tip"), W / 2, sy + 78);
        ctx.globalAlpha = 1;
    }

    // Buttons (v8: btnH 36→44 for mobile touch — minimum 44pt per Apple HIG)
    var btnW2 = 110, btnH2 = 44;
    var btnY2 = cardY + cardH - 64;
    var hasNextLevel = won && currentLevel < LEVELS.length - 1;

    if (hasNextLevel) {
        // Three buttons: Retry | Next Level | Levels
        var totalBtnW = btnW2 * 3 + 16;
        var bx = W / 2 - totalBtnW / 2;

        ctx.fillStyle = COLORS.panelAlt;
        ctx.beginPath(); roundRect(bx, btnY2, btnW2, btnH2, 4); ctx.fill();
        ctx.fillStyle = COLORS.textDark; ctx.font = "600 13px " + FONT_BODY; ctx.textAlign = "center";
        ctx.fillText(t("btn_retry"), bx + btnW2 / 2, btnY2 + btnH2 / 2);

        bx += btnW2 + 8;
        // Next Level button with glow emphasis — shows countdown when auto-advance active
        var countdownActive = (autoAdvanceStartAt > 0 && !autoAdvancePaused);
        var nextLabel = t("btn_next_level");
        if (countdownActive) {
            var remainingMs = Math.max(0, AUTO_ADVANCE_MS - (Date.now() - autoAdvanceStartAt));
            var sec = Math.ceil(remainingMs / 1000);
            nextLabel = t("next_in", { sec: sec });
        }
        ctx.shadowBlur = countdownActive ? 14 : 8;
        ctx.shadowColor = "rgba(196,163,90,0.5)";
        ctx.fillStyle = COLORS.gold;
        ctx.beginPath(); roundRect(bx, btnY2, btnW2, btnH2, 4); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = COLORS.bg;
        ctx.font = fitFontToWidth(nextLabel, btnW2 - 14, "700 13px " + FONT_BODY, 9);
        ctx.fillText(nextLabel, bx + btnW2 / 2, btnY2 + btnH2 / 2);

        bx += btnW2 + 8;
        ctx.fillStyle = COLORS.panelAlt;
        ctx.beginPath(); roundRect(bx, btnY2, btnW2, btnH2, 4); ctx.fill();
        ctx.fillStyle = COLORS.textDark; ctx.font = "600 13px " + FONT_BODY;
        ctx.fillText(t("btn_levels"), bx + btnW2 / 2, btnY2 + btnH2 / 2);
    } else {
        if (won) {
            // Two buttons: Retry | Levels
            ctx.fillStyle = COLORS.playerStroke;
            ctx.beginPath(); roundRect(W / 2 - btnW2 - 8, btnY2, btnW2, btnH2, 4); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.font = "600 13px " + FONT_BODY; ctx.textAlign = "center";
            ctx.fillText(t("btn_retry"), W / 2 - btnW2 / 2 - 8, btnY2 + btnH2 / 2);

            ctx.fillStyle = COLORS.panelAlt;
            ctx.beginPath(); roundRect(W / 2 + 8, btnY2, btnW2, btnH2, 4); ctx.fill();
            ctx.fillStyle = COLORS.text;
            ctx.fillText(t("btn_levels"), W / 2 + btnW2 / 2 + 8, btnY2 + btnH2 / 2);
        } else {
            // v11.3: free-continue PRIMARY button when available — rendered
            // ABOVE the standard 3-button row, larger + pulsing gold so it's
            // the obvious next action. Hidden once consumed for the UTC day.
            var freeReady = canUseFreeContinue();
            if (freeReady) {
                var fcW = btnW2 * 2 + 8, fcH = btnH2 + 8;
                var fcX = W / 2 - fcW / 2, fcY = btnY2 - fcH - 10;
                var fcPulse = 0.85 + 0.15 * Math.sin(gameTime * 0.005);
                ctx.shadowBlur = 18 * fcPulse;
                ctx.shadowColor = "rgba(196,163,90,0.7)";
                ctx.fillStyle = COLORS.gold;
                ctx.beginPath(); roundRect(fcX, fcY, fcW, fcH, 6); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = COLORS.bg;
                ctx.font = "700 16px " + FONT_BODY; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(t("btn_free_continue"), W / 2, fcY + fcH / 2 - 7);
                ctx.font = "400 10px " + FONT_BODY;
                ctx.fillText(t("free_continue_sub"), W / 2, fcY + fcH / 2 + 11);
            }

            // Three buttons on defeat: Try Again | +1 Life (ad) | Levels
            var totalLoseBtnW = btnW2 * 3 + 16;
            var loseX = W / 2 - totalLoseBtnW / 2;
            // v18 — rewarded "+1 life" only offered when lives aren't full.
            var rewardedReady = canUseRewardedRetry() && save.lives < MAX_LIVES;
            var canRetry = hasLife();

            // Try Again — locked + relabelled "Out of lives" at 0 lives.
            if (canRetry) {
                ctx.fillStyle = COLORS.aiStroke;
                ctx.beginPath(); roundRect(loseX, btnY2, btnW2, btnH2, 4); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.font = "600 12px " + FONT_BODY;
                ctx.fillText(t("btn_try_again"), loseX + btnW2 / 2, btnY2 + btnH2 / 2);
            } else {
                ctx.fillStyle = "rgba(40,46,58,0.55)";
                ctx.beginPath(); roundRect(loseX, btnY2, btnW2, btnH2, 4); ctx.fill();
                ctx.fillStyle = "rgba(150,150,168,0.6)";
                ctx.font = fitFontToWidth(t("lives_out"), btnW2 - 8, "600 12px " + FONT_BODY, 9);
                ctx.fillText(t("lives_out"), loseX + btnW2 / 2, btnY2 + btnH2 / 2);
                ctx.font = "600 12px " + FONT_BODY;
            }

            loseX += btnW2 + 8;
            // v13.4: when the rewarded retry isn't available, the button must
            // LOOK dead — flat dark grey, no gold tint, no border. The old
            // dimmed-gold (alpha 0.45) still read as "tappable but greyed
            // out" and Tim repeatedly tried to use it.
            if (rewardedReady) {
                ctx.fillStyle = COLORS.gold;
                ctx.beginPath(); roundRect(loseX, btnY2, btnW2, btnH2, 4); ctx.fill();
                ctx.fillStyle = COLORS.bg;
                // Two-line label: line 1 makes it unambiguous that an AD plays,
                // line 2 names the reward. Yandex 4.5.1 — the RV trigger must
                // show both that it's an ad AND what the user gets.
                ctx.font = fitFontToWidth(t("btn_reward_retry"), btnW2 - 10, "700 13px " + FONT_BODY, 9);
                ctx.fillText(t("btn_reward_retry"), loseX + btnW2 / 2, btnY2 + btnH2 / 2 - 8);
                ctx.font = fitFontToWidth(t("btn_reward_retry_sub"), btnW2 - 8, "600 10px " + FONT_BODY, 8);
                ctx.fillText(t("btn_reward_retry_sub"), loseX + btnW2 / 2, btnY2 + btnH2 / 2 + 8);
                ctx.font = "600 12px " + FONT_BODY;
            } else {
                ctx.fillStyle = "rgba(40,46,58,0.55)";
                ctx.beginPath(); roundRect(loseX, btnY2, btnW2, btnH2, 4); ctx.fill();
                ctx.fillStyle = "rgba(140,140,160,0.45)";
                ctx.font = "600 12px " + FONT_BODY;
                ctx.fillText(t("btn_reward_used"), loseX + btnW2 / 2, btnY2 + btnH2 / 2);
            }

            loseX += btnW2 + 8;
            ctx.fillStyle = COLORS.panelAlt;
            ctx.beginPath(); roundRect(loseX, btnY2, btnW2, btnH2, 4); ctx.fill();
            ctx.fillStyle = COLORS.text;
            ctx.fillText(t("btn_levels"), loseX + btnW2 / 2, btnY2 + btnH2 / 2);

            // v18 — lives readout (count + regen countdown). Drawn just ABOVE the
            // defeat card (empty scrim there) so it can't overlap the card's
            // stats/tip lines — a 1.10.3 text-overlap would be a rejection.
            if (save.lives < MAX_LIVES) {
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.font = "700 12px " + FONT_BODY;
                ctx.fillStyle = (save.lives === 0) ? "#e6948f" : "rgba(230,220,200,0.92)";
                var llTxt = (save.lives === 0) ? t("lives_out")
                    : (t("lives_label") + ": " + save.lives + "/" + MAX_LIVES);
                if (livesRegenMsLeft() > 0) llTxt += "  ·  " + t("lives_next", { t: livesRegenLabel() });
                ctx.fillText(llTxt, W / 2, cardY - 14);
            }
        }
    }

    // v17 — Tomorrow's Challenge ribbon. Sits BELOW the card, outside its
    // frame, so the existing card layout is untouched. Pure FOMO hook on the
    // exit screen: gives players a reason to come back tomorrow when they're
    // most likely to bounce. Stub for now — tapping fires a soft toast.
    drawTomorrowsChallenge(cardX, cardY + cardH + 10, cardW);
}

// v17 — countdown to next UTC midnight + streak label. Lives outside the
// win/lose card so it works for both states without further layout pressure.
function getMsToNextUtcMidnight() {
    var now = new Date();
    var next = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() + 1, 0, 0, 0, 0);
    return Math.max(0, next - now.getTime());
}
function drawTomorrowsChallenge(x, y, w) {
    var h = 56;
    // Keep it on-screen on short viewports — clip y if it'd overflow
    if (y + h > H - 8) y = H - h - 8;
    ctx.fillStyle = "rgba(20,28,40,0.72)";
    ctx.strokeStyle = "rgba(196,163,90,0.45)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, w, h, 8);
    else ctx.rect(x, y, w, h);
    ctx.fill();
    ctx.stroke();

    // Icon area — gold star/clock glyph on the left
    ctx.fillStyle = "#C4A35A";
    ctx.beginPath();
    ctx.arc(x + 22, y + h / 2, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(11,22,34,0.9)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + 22, y + h / 2);
    ctx.lineTo(x + 22, y + h / 2 - 6);
    ctx.moveTo(x + 22, y + h / 2);
    ctx.lineTo(x + 28, y + h / 2);
    ctx.stroke();

    // Title
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#C4A35A";
    ctx.font = "bold 13px " + FONT_BODY;
    ctx.fillText(t("challenge_tomorrow_title"), x + 44, y + 17);

    // Countdown text
    var msLeft = getMsToNextUtcMidnight();
    var hLeft = Math.floor(msLeft / 3600000);
    var mLeft = Math.floor((msLeft % 3600000) / 60000);
    ctx.fillStyle = "#E0E0E0";
    ctx.font = "12px " + FONT_BODY;
    var sub = t("challenge_tomorrow_sub").replace("{H}", hLeft).replace("{M}", mLeft);
    ctx.fillText(sub, x + 44, y + 36);

    // Streak label (right side)
    if (save && save.challengeStreak > 0) {
        ctx.textAlign = "right";
        ctx.fillStyle = "#9CB7DB";
        ctx.font = "11px " + FONT_BODY;
        ctx.fillText(t("challenge_streak_label").replace("{N}", save.challengeStreak), x + w - 12, y + h / 2);
    }

    // Mark this end-screen view as "seen today" for streak math. We increment
    // the streak when the player returns on a subsequent day; here we just
    // record the date.
    if (save) {
        var todayUtc = new Date().toISOString().slice(0, 10);
        if (save.lastChallengeShownDate !== todayUtc) {
            // Streak math: if last shown was yesterday, +1. Else reset to 1.
            var y2 = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
            save.challengeStreak = (save.lastChallengeShownDate === y2) ? (save.challengeStreak + 1) : 1;
            save.lastChallengeShownDate = todayUtc;
            saveToDisk();
        }
    }
}

// v17 — Codex (roster) screen. Shows player + enemy units across all 6
// tiers with locked/unlocked state and the three enemy variants. Lives as
// STATE_CODEX so it has its own rect cache for click handling.
function getCodexTabRects() {
    var tabW = 140, tabH = 36;
    var tabsY = 64;
    return {
        player: { x: W / 2 - tabW - 6, y: tabsY, w: tabW, h: tabH },
        enemy:  { x: W / 2 + 6,         y: tabsY, w: tabW, h: tabH },
        back:   { x: 12, y: 12, w: 84, h: 36 }
    };
}
function getCodexUnitCardRects() {
    var cards = [];
    var perRow = 3;
    var startY = 130;
    var cardW = Math.min(120, (W - 60) / perRow);
    var cardH = 130;
    var gapX = 12, gapY = 12;
    var totalW = perRow * cardW + (perRow - 1) * gapX;
    var startX = W / 2 - totalW / 2;
    for (var i = 1; i <= V17_MAX_TIER; i++) {
        var idx = i - 1;
        var row = Math.floor(idx / perRow);
        var col = idx % perRow;
        cards.push({
            x: startX + col * (cardW + gapX),
            y: startY + row * (cardH + gapY),
            w: cardW, h: cardH, tier: i
        });
    }
    return cards;
}
function drawCodexScreen() {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, W, H);

    // Title
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#C4A35A";
    ctx.font = "bold 24px 'Cinzel', serif";
    ctx.fillText(t("codex_title"), W / 2, 30);

    var tabs = getCodexTabRects();
    // Back button (top-left)
    ctx.fillStyle = COLORS.panelAlt;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(tabs.back.x, tabs.back.y, tabs.back.w, tabs.back.h, 6);
    else ctx.rect(tabs.back.x, tabs.back.y, tabs.back.w, tabs.back.h);
    ctx.fill();
    ctx.fillStyle = COLORS.text;
    ctx.font = "600 12px " + FONT_BODY;
    ctx.fillText("← " + t("nav_prev"), tabs.back.x + tabs.back.w / 2, tabs.back.y + tabs.back.h / 2);

    // Tabs
    function drawTab(rect, label, isActive) {
        ctx.fillStyle = isActive ? COLORS.playerStroke : COLORS.panelAlt;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 6);
        else ctx.rect(rect.x, rect.y, rect.w, rect.h);
        ctx.fill();
        ctx.fillStyle = isActive ? "#fff" : COLORS.text;
        ctx.font = "600 13px " + FONT_BODY;
        ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);
    }
    drawTab(tabs.player, t("codex_tab_player"), codexTab === "player");
    drawTab(tabs.enemy,  t("codex_tab_enemy"),  codexTab === "enemy");

    // Unit cards
    var cards = getCodexUnitCardRects();
    var unlockedCap = maxUnlockedUnitTier();
    for (var i = 0; i < cards.length; i++) {
        var card = cards[i];
        var unlocked = card.tier <= unlockedCap;
        var owner = codexTab === "player" ? OWNER_PLAYER : OWNER_AI;

        // Card background
        ctx.fillStyle = unlocked ? COLORS.panel : COLORS.panelAlt;
        ctx.strokeStyle = unlocked ? COLORS.tierColors[card.tier - 1] : "#444";
        ctx.lineWidth = 2;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(card.x, card.y, card.w, card.h, 8);
        else ctx.rect(card.x, card.y, card.w, card.h);
        ctx.fill();
        ctx.stroke();

        // Unit sprite (or silhouette if locked)
        var unitCx = card.x + card.w / 2;
        var unitCy = card.y + 50;
        var savedHex = HEX_SIZE;
        HEX_SIZE = 50;
        if (unlocked) {
            drawUnit(unitCx, unitCy, card.tier, owner, 1.0, null, null, null);
        } else {
            // Silhouette: same shape, all grey, alpha reduced
            ctx.save();
            ctx.globalAlpha = 0.35;
            drawUnit(unitCx, unitCy, card.tier, owner, 1.0, null, null, null);
            ctx.restore();
            // Lock icon over the silhouette
            ctx.fillStyle = "rgba(0,0,0,0.55)";
            ctx.beginPath();
            ctx.arc(unitCx, unitCy, 14, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#C4A35A";
            ctx.font = "bold 16px " + FONT_BODY;
            ctx.fillText("🔒", unitCx, unitCy);
        }
        HEX_SIZE = savedHex;

        // Name
        var nameKey = (codexTab === "player" ? "unit_t" : "enemy_t") + card.tier + "_name";
        ctx.fillStyle = unlocked ? "#fff" : "#777";
        ctx.font = "bold 12px " + FONT_BODY;
        ctx.fillText(t(nameKey), card.x + card.w / 2, card.y + card.h - 30);

        // Stats line OR unlock-at line
        ctx.font = "10px " + FONT_BODY;
        ctx.fillStyle = unlocked ? "#B0B0B0" : "#666";
        if (unlocked) {
            ctx.fillText("HP " + BASE_TIER_STATS[card.tier].hp + " · ATK " + BASE_TIER_STATS[card.tier].atk, card.x + card.w / 2, card.y + card.h - 14);
        } else {
            ctx.fillText(t("codex_unlocks_at").replace("{N}", card.tier - 1), card.x + card.w / 2, card.y + card.h - 14);
        }
    }

    // Enemy variants section — only on enemy tab, after the main grid
    if (codexTab === "enemy") {
        var variantsY = cards[cards.length - 1].y + cards[cards.length - 1].h + 24;
        if (variantsY < H - 120) {
            ctx.font = "bold 14px " + FONT_BODY;
            ctx.fillStyle = "#C4A35A";
            ctx.textAlign = "center";
            ctx.fillText("✦", W / 2, variantsY);

            var vY = variantsY + 22;
            var variants = [
                { color: "#E53935", glyph: "!", nameKey: "variant_berserker", descKey: "variant_berserker_desc", unlocked: variantUnlockedAtCurrentLevel(VARIANT_BERSERKER) },
                { color: "#43A047", glyph: "+", nameKey: "variant_healer",    descKey: "variant_healer_desc",    unlocked: variantUnlockedAtCurrentLevel(VARIANT_HEALER) },
                { color: "#2196F3", glyph: "◇", nameKey: "variant_shielder",  descKey: "variant_shielder_desc",  unlocked: variantUnlockedAtCurrentLevel(VARIANT_SHIELDER) }
            ];
            for (var v = 0; v < variants.length; v++) {
                var vv = variants[v];
                var rowY = vY + v * 28;
                if (rowY + 22 > H - 8) break;
                // Badge
                ctx.fillStyle = vv.unlocked ? vv.color : "#444";
                ctx.beginPath();
                ctx.arc(40, rowY + 10, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#fff";
                ctx.font = "bold 12px " + FONT_BODY;
                ctx.fillText(vv.glyph, 40, rowY + 11);
                // Name + desc
                ctx.textAlign = "left";
                ctx.font = "bold 12px " + FONT_BODY;
                ctx.fillStyle = vv.unlocked ? "#fff" : "#666";
                ctx.fillText(t(vv.nameKey), 60, rowY + 6);
                ctx.font = "10px " + FONT_BODY;
                ctx.fillStyle = vv.unlocked ? "#B0B0B0" : "#555";
                ctx.fillText(t(vv.descKey), 60, rowY + 18);
                ctx.textAlign = "center";
            }
        }
    }
}

// Auto-advance / boss / world-clear transitions
function clearAutoAdvance() {
    autoAdvanceStartAt = 0;
    autoAdvancePaused = false;
}

function triggerNextLevel(userInitiated) {
    clearAutoAdvance();
    // Boss kill → world clear screen first
    if (worldClearCommander) {
        gameState = STATE_WORLD_CLEAR;
        return;
    }
    if (currentLevel >= LEVELS.length - 1) {
        // No next level — fall back to level select
        syncLevelSelectPageToCurrent();
        gameState = STATE_LEVEL_SELECT;
        return;
    }
    var nextIdx = currentLevel + 1;
    var nextCommander = getCommanderForLevel(nextIdx);
    var advance = function() {
        currentLevel = nextIdx;
        initGrid();
        saveInProgressRun();
        if (nextCommander) {
            pendingBossCommander = nextCommander;
            gameState = STATE_BOSS_INTRO;
        } else {
            gameState = STATE_PLAY;
        }
        gaTrackLevelStart("next_level");
    };
    // Yandex 4.4: only fire interstitials on user-initiated action, not auto-timer.
    if (userInitiated) withInterstitialAd(advance);
    else advance();
}

function continueAfterWorldClear() {
    worldClearCommander = null;
    if (currentLevel >= LEVELS.length - 1) {
        syncLevelSelectPageToCurrent();
        gameState = STATE_LEVEL_SELECT;
        return;
    }
    withInterstitialAd(function() {
        currentLevel++;
        initGrid();
        saveInProgressRun();
        gameState = STATE_PLAY;
        gaTrackLevelStart("world_clear");
    });
}

// Input handling
function hitRect(px, py, x, y, w, h) {
    return px >= x && px <= x + w && py >= y && py <= y + h;
}

function handleClick(px, py) {
    SFX.resume(); // browsers gate AudioContext.start until first user gesture
    if (yandexAdInProgress) return;
    if (aiTurnBannerActive) return;
    if (yandexPauseRequested && gameState === STATE_PLAY) {
        // Escape hatch: Yandex's game_api_resume sometimes never fires after an
        // ad / visibility change, which would lock the player on the "paused by
        // platform" screen forever. A tap while they're looking at the game means
        // "resume" — consume this tap (it just unpauses; the next tap plays).
        yandexPauseRequested = false;
        try { syncGameplayAPI(); } catch (e) {}
        return;
    }

    // v17 — NEW UNIT reveal card swallows any tap to dismiss.
    if (pendingTierUnlock) {
        pendingTierUnlock = null;
        SFX.select && SFX.select();
        return;
    }

    // v17 — Resume-last-run modal. Two explicit buttons; tap-outside is a
    // no-op so the player doesn't lose the snapshot by accident.
    if (resumePromptVisible) {
        var rp = getResumePromptRects();
        if (hitRect(px, py, rp.yes.x, rp.yes.y, rp.yes.w, rp.yes.h)) {
            SFX.select && SFX.select();
            resumePromptVisible = false;
            resumeRun();
            return;
        }
        if (hitRect(px, py, rp.no.x, rp.no.y, rp.no.w, rp.no.h)) {
            SFX.select && SFX.select();
            resumePromptVisible = false;
            clearInProgressRun();
            return;
        }
        return; // swallow taps inside the modal area
    }

    // v11.5: Missions overlay — check CLAIM button hits + Close, else dismiss
    if (showMissions) {
        var cb = getMissionsCloseRect();
        if (hitRect(px, py, cb.x, cb.y, cb.w, cb.h)) {
            SFX.select();
            showMissions = false;
            return;
        }
        var dm = ensureDailyMissions();
        if (dm) {
            var rows = getMissionRowRects();
            for (var mi = 0; mi < dm.missions.length && mi < 3; mi++) {
                var rr = rows[mi];
                var mm = dm.missions[mi];
                if (mm.progress >= mm.target && !mm.claimed &&
                    hitRect(px, py, rr.claim.x, rr.claim.y, rr.claim.w, rr.claim.h)) {
                    claimMission(mm.id);
                    SFX.star();
                    return;
                }
            }
        }
        // Tap outside any button — dismiss
        showMissions = false;
        return;
    }

    // Bonus calendar overlay swallows ALL taps to close — sits above modal.
    if (showBonusCalendar) {
        SFX.select();
        showBonusCalendar = false;
        return;
    }

    // Daily bonus modal eats the first tap.
    if (pendingDailyBonus) {
        pendingDailyBonus = null;
        return;
    }

    // v11.8a: STATE_MENU handler removed — state is unreachable in shipping
    // (boot goes straight to STATE_PLAY since Yandex 5.1.1 fix Feb 2026).

    if (gameState === STATE_LEVEL_SELECT) {
        // v17 — Codex top-right button. Tested before any chip/nav hit so it
        // wins even when partially overlapping the chip layout.
        var codexBtn = getCodexButtonRect();
        if (hitRect(px, py, codexBtn.x, codexBtn.y, codexBtn.w, codexBtn.h)) {
            SFX.select && SFX.select();
            codexTab = "player";
            gameState = STATE_CODEX;
            return;
        }
        // v8: retention chips above the card
        var lsChips = getLevelSelectChipRects();
        if (save && save.loginStreak > 0 && hitRect(px, py, lsChips.streak.x, lsChips.streak.y, lsChips.streak.w, lsChips.streak.h)) {
            showBonusCalendar = true;
            return;
        }
        if (previewTodayBonus() && hitRect(px, py, lsChips.prize.x, lsChips.prize.y, lsChips.prize.w, lsChips.prize.h)) {
            checkDailyBonus();
            return;
        }
        if (!previewTodayBonus() && hitRect(px, py, lsChips.prize.x, lsChips.prize.y, lsChips.prize.w, lsChips.prize.h)) {
            showBonusCalendar = true;
            return;
        }

        // Level nodes
        var nodes = getLevelSelectLayout();
        for (var i = 0; i < nodes.length; i++) {
            var n = nodes[i];
            if (hitRect(px, py, n.x, n.y, n.w, n.h) && isLevelUnlocked(n.level)) {
                // v18 — entering a level needs a life, same as the defeat-screen Try Again.
                // Without this, the lives/energy gate (and its +1-life rewarded ad + 30-min
                // regen — the monetization + D1/D7 return drivers) is bypassable straight
                // from the Levels tab, making the whole system inert. (#merge_conquest)
                if (!hasLife()) {
                    coachToast.text = t("lives_need");
                    coachToast.until = Date.now() + 2600;
                    return;
                }
                gameMode = "campaign";
                currentLevel = n.level;
                gameState = STATE_PLAY;
                initGrid();
                saveInProgressRun(); // user-initiated entry — resume snapshot
                gaTrackLevelStart("level_select");
                return;
            }
        }
        var nav = getLevelSelectNavRects();
        var pageCount = getLevelSelectPageCount();
        if (hitRect(px, py, nav.prev.x, nav.prev.y, nav.prev.w, nav.prev.h) && levelSelectPage > 0) {
            levelSelectPage--;
            return;
        }
        if (hitRect(px, py, nav.next.x, nav.next.y, nav.next.w, nav.next.h) && levelSelectPage < pageCount - 1) {
            levelSelectPage++;
            return;
        }
        if (hitRect(px, py, nav.upgrades.x, nav.upgrades.y, nav.upgrades.w, nav.upgrades.h)) {
            if (!isUpgradesUnlocked()) {
                showUnlockToast(t("unlocks_at_level").replace("{N}", V17_UPGRADES_UNLOCK_LEVEL));
                return;
            }
            upgradesPage = 0;
            gameState = STATE_UPGRADES;
            if (save && !save.upgradesTutorialShown) { // v11.8c
                save.upgradesTutorialShown = true;
                saveToDisk();
            }
            return;
        }
        // v11.8a: nav.back ("Main Menu") removed — was misleading + caused
        // a navigation bug after L1 win → Levels → Main Menu (restarted L1
        // tutorial with stale state). Endless button alone is enough.
        if (hitRect(px, py, nav.endless.x, nav.endless.y, nav.endless.w, nav.endless.h)) {
            if (!isEndlessUnlocked()) {
                showUnlockToast(t("unlocks_at_level").replace("{N}", V17_ENDLESS_UNLOCK_LEVEL));
                return;
            }
            // First-time players get a brief intro explaining the mode and
            // the global leaderboard, then they hit Start to actually begin.
            // Repeat players skip straight to startEndlessRun.
            if (!save.endlessIntroSeen) {
                gameState = STATE_ENDLESS_INTRO;
            } else {
                startEndlessRun();
            }
            return;
        }
        return;
    }

    if (gameState === STATE_CODEX) {
        var ct = getCodexTabRects();
        if (hitRect(px, py, ct.back.x, ct.back.y, ct.back.w, ct.back.h)) {
            SFX.select && SFX.select();
            gameState = STATE_LEVEL_SELECT;
            return;
        }
        if (hitRect(px, py, ct.player.x, ct.player.y, ct.player.w, ct.player.h)) {
            codexTab = "player";
            SFX.select && SFX.select();
            return;
        }
        if (hitRect(px, py, ct.enemy.x, ct.enemy.y, ct.enemy.w, ct.enemy.h)) {
            codexTab = "enemy";
            SFX.select && SFX.select();
            return;
        }
        // Tap anywhere else dismisses to level-select (mobile friendliness).
        return;
    }

    if (gameState === STATE_ENDLESS_INTRO) {
        // Single button: Start (centered, gold). Tap anywhere on the card
        // hits the button rect; tap outside the card returns to Level Select.
        var introBtnW = 200, introBtnH = 44;
        var introCardW = 460, introCardH = 280;
        var introCardX = W / 2 - introCardW / 2, introCardY = H / 2 - introCardH / 2;
        var introBtnX = W / 2 - introBtnW / 2, introBtnY = introCardY + introCardH - 64;
        if (hitRect(px, py, introBtnX, introBtnY, introBtnW, introBtnH)) {
            save.endlessIntroSeen = true;
            saveToDisk();
            startEndlessRun();
            return;
        }
        // Tap-outside-card = cancel back to Level Select
        if (px < introCardX || px > introCardX + introCardW ||
            py < introCardY || py > introCardY + introCardH) {
            gameState = STATE_LEVEL_SELECT;
        }
        return;
    }

    if (gameState === STATE_UPGRADES) {
        // v13.4: mirror drawUpgradesScreen's portrait-centered card origin
        // so click hit-tests track the new row + nav positions.
        var upgCardH = 500;
        var upgCardY = isPortraitLayout() ? Math.max(20, Math.round((H - upgCardH) / 2)) : 30;
        var rowH = 50, startY = upgCardY + 112;
        var rowW = Math.min(500, W - 32), rowX = W / 2 - rowW / 2;
        var upgradesNavY = upgCardY + 458;
        var avail = getAvailableStars();
        // v19 -the one-time conversion explainer eats the first tap when shown.
        if (!save.doctrineExplainerShown && save._preDoctrineBackup) {
            save.doctrineExplainerShown = true;
            saveToDisk();
            return;
        }
        // v19 -Ascend confirmation modal (mirror drawUpgradesScreen's rects).
        if (pendingAscendConfirm) {
            var cw = Math.min(360, W - 36), ch = 206, cx = W / 2 - cw / 2, cy = H / 2 - ch / 2;
            var cbY = cy + ch - 48, cbH = 36, cyesX = cx + 18, cyesW = cw / 2 - 28, cnoX = cx + cw / 2 + 10, cnoW = cw / 2 - 28;
            if (hitRect(px, py, cyesX, cbY, cyesW, cbH)) { ascend(); upgradesPage = 0; pendingAscendConfirm = false; return; }
            if (hitRect(px, py, cnoX, cbY, cnoW, cbH)) { pendingAscendConfirm = false; return; }
            return; // scrim absorbs other taps
        }
        var perPage = 5;
        var upgradesPageCount = Math.max(1, Math.ceil(BAL.nodes.length / perPage));
        upgradesPage = Math.max(0, Math.min(upgradesPage, upgradesPageCount - 1));
        var startNode = upgradesPage * perPage;
        var endNode = Math.min(startNode + perPage, BAL.nodes.length);
        for (var i = startNode; i < endNode; i++) {
            var nd = BAL.nodes[i];
            if (doctrineLevel(nd.key) >= doctrineMaxLevel(nd.key)) continue;
            var y = startY + (i - startNode) * rowH;
            var btnX2 = rowX + rowW - 68, btnY2 = y + 8, btnW2 = 56, btnH2 = 28;
            if (hitRect(px, py, btnX2, btnY2, btnW2, btnH2)) {
                buyDoctrineLevel(nd.key);
                return;
            }
        }
        // Respec / Ascend row (mirror drawUpgradesScreen's actY math)
        var actY = startY + perPage * rowH + 2;
        if (conquestTier() > 0) actY += 14;
        var canA = canAscend();
        var rspX, rspW2;
        if (canA) { rspX = rowX; rspW2 = rowW / 2 - 6; } else { rspW2 = Math.min(200, rowW); rspX = W / 2 - rspW2 / 2; }
        if (hitRect(px, py, rspX, actY, rspW2, 30)) {
            if (getSpentStars() > 0) respecDoctrines();
            return;
        }
        if (canA) {
            var ascX = rowX + rowW / 2 + 6, ascW = rowW / 2 - 6;
            if (hitRect(px, py, ascX, actY, ascW, 30)) { pendingAscendConfirm = true; return; }
        }
        if (hitRect(px, py, W / 2 - 170, upgradesNavY, 84, 44) && upgradesPage > 0) {
            upgradesPage--;
            return;
        }
        if (hitRect(px, py, W / 2 + 86, upgradesNavY, 84, 44) && upgradesPage < upgradesPageCount - 1) {
            upgradesPage++;
            return;
        }
        // Back button (v8: 30→44 tall)
        var bbtnX = W / 2 - 60, bbtnY = upgradesNavY, bbtnW = 120, bbtnH = 44;
        if (hitRect(px, py, bbtnX, bbtnY, bbtnW, bbtnH)) {
            syncLevelSelectPageToCurrent();
            gameState = STATE_LEVEL_SELECT;
            return;
        }
        return;
    }

    if (gameState === STATE_BOSS_INTRO) {
        // Tap anywhere on the card or on Begin button starts the battle
        gameState = STATE_PLAY;
        pendingBossCommander = null;
        return;
    }

    if (gameState === STATE_WORLD_CLEAR) {
        continueAfterWorldClear();
        return;
    }

    if (gameState === STATE_WIN || gameState === STATE_LOSE) {
        var cardH = 360;
        var cardY2 = H / 2 - cardH / 2;
        // v8: synced with drawEndScreen — btnH 36→44, btnY shifted to cardH-64
        var btnW2 = 110, btnH2 = 44, btnY2 = cardY2 + cardH - 64;
        var won = (gameState === STATE_WIN);

        // Endless mode end-screen: Next Wave / Play Again + Levels
        if (gameMode === "endless") {
            var endBtns = getEndlessEndButtons(won);
            if (hitRect(px, py, endBtns.primary.x, endBtns.primary.y, endBtns.primary.w, endBtns.primary.h)) {
                if (won) {
                    // Next wave — interstitial allowed (user click)
                    withInterstitialAd(function() { endlessNextWave(); });
                } else {
                    // Play Again — fresh endless run from wave 1
                    withInterstitialAd(function() { startEndlessRun(); });
                }
                return;
            }
            if (hitRect(px, py, endBtns.levels.x, endBtns.levels.y, endBtns.levels.w, endBtns.levels.h)) {
                gameMode = "campaign";
                withInterstitialAd(function() {
                    syncLevelSelectPageToCurrent();
                    gameState = STATE_LEVEL_SELECT;
                });
                return;
            }
            return;
        }

        var hasNextLevel = won && currentLevel < LEVELS.length - 1;

        // v14.1 bugfix: the Free Retry button lives ABOVE the standard
        // button row (fcY = btnY2 - fcH - 10). Pre-fix, the entire defeat
        // click-handler was gated by `py >= btnY2`, which silently swallowed
        // taps on the big gold Free Retry banner — Tim reported "first
        // death does nothing" on CG QA. Test it BEFORE the row gate.
        if (!won && canUseFreeContinue()) {
            var fcW0 = btnW2 * 2 + 8, fcH0 = btnH2 + 8;
            var fcX0 = W / 2 - fcW0 / 2, fcY0 = btnY2 - fcH0 - 10;
            if (hitRect(px, py, fcX0, fcY0, fcW0, fcH0)) {
                consumeFreeContinue();
                gameState = STATE_PLAY;
                initGrid();
                gaTrackLevelStart("free_continue");
                return;
            }
        }

        if (py >= btnY2 && py <= btnY2 + btnH2) {
            if (hasNextLevel) {
                // Three buttons
                var totalBtnW = btnW2 * 3 + 16;
                var bx = W / 2 - totalBtnW / 2;
                if (hitRect(px, py, bx, btnY2, btnW2, btnH2)) {
                    // Retry — cancel countdown
                    clearAutoAdvance();
                    worldClearCommander = null;
                    gameState = STATE_PLAY;
                    initGrid();
                    gaTrackLevelStart("retry");
                    return;
                }
                bx += btnW2 + 8;
                if (hitRect(px, py, bx, btnY2, btnW2, btnH2)) {
                    // Next Level — triggerNextLevel handles boss-intro / world-clear branching
                    triggerNextLevel(true); // user-initiated click → interstitial allowed
                    return;
                }
                bx += btnW2 + 8;
                if (hitRect(px, py, bx, btnY2, btnW2, btnH2)) {
                    // Levels
                    clearAutoAdvance();
                    worldClearCommander = null;
                    withInterstitialAd(function() {
                        syncLevelSelectPageToCurrent();
                        gameState = STATE_LEVEL_SELECT;
                    });
                    return;
                }
            } else {
                if (won) {
                    // Two buttons: Retry | Levels (or boss world-clear path)
                    if (hitRect(px, py, W / 2 - btnW2 - 8, btnY2, btnW2, btnH2)) {
                        clearAutoAdvance();
                        worldClearCommander = null;
                        gameState = STATE_PLAY;
                        initGrid();
                        gaTrackLevelStart("retry");
                        return;
                    }
                    if (hitRect(px, py, W / 2 + 8, btnY2, btnW2, btnH2)) {
                        // Final-level Levels button — also catches boss-on-last-level path
                        if (worldClearCommander) {
                            gameState = STATE_WORLD_CLEAR;
                            return;
                        }
                        withInterstitialAd(function() {
                            syncLevelSelectPageToCurrent();
                            gameState = STATE_LEVEL_SELECT;
                        });
                        return;
                    }
                } else {
                    // v11.3: free continue (1/day, no ad) above the 3-button row
                    if (canUseFreeContinue()) {
                        var fcW = btnW2 * 2 + 8, fcH = btnH2 + 8;
                        var fcX = W / 2 - fcW / 2, fcY = btnY2 - fcH - 10;
                        if (hitRect(px, py, fcX, fcY, fcW, fcH)) {
                            consumeFreeContinue();
                            gameState = STATE_PLAY;
                            initGrid();
                            gaTrackLevelStart("free_continue");
                            return;
                        }
                    }

                    // Three buttons on defeat: Retry | Rewarded | Levels
                    var totalLoseBtnW = btnW2 * 3 + 16;
                    var loseX = W / 2 - totalLoseBtnW / 2;

                    if (hitRect(px, py, loseX, btnY2, btnW2, btnH2)) {
                        // v18 — Try Again costs nothing extra, but needs a life.
                        // The defeat already spent one; at 0 lives the button is
                        // locked and the player must watch an ad (+1) or wait.
                        if (hasLife()) {
                            gameState = STATE_PLAY;
                            initGrid();
                            gaTrackLevelStart("retry");
                        } else {
                            coachToast.text = t("lives_need");
                            coachToast.until = Date.now() + 2600;
                        }
                        return;
                    }

                    loseX += btnW2 + 8;
                    // v18 — rewarded ad now grants +1 LIFE (honest reward; the old
