                    // "continue battle" silently restarted the level). Available
                    // whenever lives aren't full. Yandex 4.5: grant only on a full
                    // view; 1.15: regen is the free non-ad path.
                    if (hitRect(px, py, loseX, btnY2, btnW2, btnH2) && canUseRewardedRetry() && save.lives < MAX_LIVES) {
                        showRewardedRetryAd(function(rewarded) {
                            if (!rewarded) {
                                triggerRewardBanner(false);
                                return;
                            }
                            grantLife();
                            triggerRewardBanner(true); // "+1 LIFE!" — player stays on the defeat screen and can now Try Again
                        });
                        return;
                    }

                    loseX += btnW2 + 8;
                    if (hitRect(px, py, loseX, btnY2, btnW2, btnH2)) {
                        syncLevelSelectPageToCurrent();
                        gameState = STATE_LEVEL_SELECT;
                        return;
                    }
                }
            }
        }
        return;
    }

    if (gameState !== STATE_PLAY) return;

    // Mute toggle — left of hamburger
    var mr = getMuteBtnRect();
    if (hitRect(px, py, mr.x, mr.y, mr.w, mr.h)) {
        save.audioMuted = !save.audioMuted;
        SFX.setMute(save.audioMuted);
        saveToDisk();
        if (!save.audioMuted) SFX.select(); // confirm chirp when unmuting
        return;
    }

    // v11.7: Missions icon — left of mute
    var msb = getMissionsHudBtnRect();
    if (hitRect(px, py, msb.x, msb.y, msb.w, msb.h)) {
        showMissions = true;
        SFX.select();
        return;
    }

    // Menu / Levels icon — top-right of top bar. Single tap → Level Select
    // (which has Campaign / Upgrades / Endless nav). Added 2026-05-14 so
    // new modes are reachable without forcing a win/lose first.
    var menuBtnX = W - 34, menuBtnY = 8, menuBtnSize = 26;
    if (px >= menuBtnX && px <= menuBtnX + menuBtnSize && py >= menuBtnY && py <= menuBtnY + menuBtnSize) {
        if (tutorialStep >= 0 && tutorialStep < 2) return; // don't escape tutorial
        syncLevelSelectPageToCurrent();
        gameState = STATE_LEVEL_SELECT;
        selectedCell = null;
        return;
    }

    // Check End Turn button
    var ebtn = getEndTurnRect();
    var ebtnX = ebtn.x, ebtnY = ebtn.y, ebtnW = ebtn.w, ebtnH = ebtn.h;
    if (px >= ebtnX && px <= ebtnX + ebtnW && py >= ebtnY && py <= ebtnY + ebtnH) {
        if (tutorialStep >= 0 && tutorialStep < 2) return;
        endTurn();
        return;
    }

    var hex = pixelToHex(px, py);
    if (!hex) {
        if (selectedCell) showCoachToast("coach_adjacent", COLORS.gold);
        selectedCell = null;
        return;
    }

    var cell = getCell(hex.col, hex.row);
    var tutorialLocked = tutorialStep >= 0 && tutorialStep < 2;
    var tutorialAction = tutorialLocked ? getTutorialAction() : null;
    var clickedPos = { col: hex.col, row: hex.row };

    if (tutorialLocked) {
        if (!tutorialAction) return;
        var sourcePos = { col: tutorialAction.source.col, row: tutorialAction.source.row };
        var targetPos = { col: tutorialAction.target.col, row: tutorialAction.target.row };
        var isSourceClick = isSameCellPos(clickedPos, sourcePos);
        var isTargetClick = isSameCellPos(clickedPos, targetPos);

        if (tutorialStep === 0 || tutorialStep === 1) {
            if (!isSourceClick && !isTargetClick) return;
            // Keep tutorial selection locked to the required source unit.
            if (isSourceClick && isSameCellPos(selectedCell, sourcePos)) return;
            if (isSourceClick && !isSameCellPos(selectedCell, sourcePos)) {
                selectedCell = sourcePos;
                return;
            }
            if (isTargetClick && !isSameCellPos(selectedCell, sourcePos)) {
                selectedCell = sourcePos;
                return;
            }
        }
    }

    if (selectedCell) {
        var selCell = getCell(selectedCell.col, selectedCell.row);

        // Try merge
        if (ap > 0 && canMerge(selCell, cell)) {
            var wasTutorialFirstMerge = (tutorialStep === 0);
            doMerge(selCell, cell);
            ap--;
            selectedCell = null;
            if (wasTutorialFirstMerge) {
                tutorialStep = 1;
                // Celebration floating text + auto-select the newly-merged T2
                // for the attack step (so they only need 1 more tap).
                spawnFloatingText(cell.col, cell.row, "+1 TIER!", "#FFD700");
                selectedCell = { col: cell.col, row: cell.row };
            }
            if (tutorialStep === 11) tutorialStep = 12; // v11.7
            checkWinLose();
            scheduleAutoEndTurn();
            return;
        }

        // Try move
        if (ap > 0 && canMove(selCell, cell)) {
            doMove(selCell, cell);
            ap--;
            selectedCell = null;
            if (tutorialStep === 11) tutorialStep = 12; // v11.7
            scheduleAutoEndTurn();
            return;
        }

        // Try attack
        if (ap > 0 && canAttack(selCell, cell)) {
            doAttack(selCell, cell);
            ap--;
            selectedCell = null;
            if (tutorialStep === 1) tutorialStep = 2;
            if (tutorialStep === 11) tutorialStep = 12; // v11.7
            checkWinLose();
            scheduleAutoEndTurn();
            return;
        }

        // Clicked same cell - deselect
        if (hex.col === selectedCell.col && hex.row === selectedCell.row) {
            selectedCell = null;
            return;
        }

        showCoachToast(explainBlockedTap(selCell, cell), COLORS.gold);
        return;
    }

    // Select player unit
    if (cell.owner === OWNER_PLAYER && cell.tier > 0) {
        if (ap <= 0) {
            showCoachToast("coach_no_ap", COLORS.gold);
            return;
        }
        selectedCell = { col: hex.col, row: hex.row };
        SFX.select();
        // v11.7: L2 tutorial step 10 = "tap one of your units to select"
        if (tutorialStep === 10) tutorialStep = 11;
    } else {
        showCoachToast("coach_pick_unit", COLORS.gold);
        selectedCell = null;
    }
}

canvas.addEventListener("mousedown", function(e) {
    e.preventDefault();
    var pos = getCanvasPos(e);
    handleClick(pos.x, pos.y);
});

canvas.addEventListener("mousemove", function(e) {
    if (gameState === STATE_PLAY) {
        var pos = getCanvasPos(e);
        hoverCell = pixelToHex(pos.x, pos.y);
    }
});

canvas.addEventListener("touchstart", function(e) {
    e.preventDefault();
    var pos = getCanvasPos(e);
    handleClick(pos.x, pos.y);
}, { passive: false });

canvas.addEventListener("contextmenu", function(e) { e.preventDefault(); });
document.addEventListener("contextmenu", function(e) { e.preventDefault(); });
document.addEventListener("touchmove", function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener("wheel", function(e) { e.preventDefault(); }, { passive: false });
window.addEventListener("scroll", function(e) { window.scrollTo(0, 0); e.preventDefault(); }, false);
document.addEventListener("visibilitychange", function() {
    if (document.hidden) {
        yandexPauseRequested = true;
        pausePlatformAudio();
    } else {
        yandexPauseRequested = false;
        resumePlatformAudio();
    }
    syncGameplayAPI();
});

window.addEventListener("resize", resizeCanvas);

// Desktop keyboard shortcuts (v8 retention/QoL):
//   R     → retry current level/wave (from PLAY, LOSE, or WIN)
//   Space → end turn (PLAY only, gated by tutorial + animation locks)
//   Esc   → back to level select (from PLAY/WIN/LOSE/UPGRADES/ENDLESS_INTRO)
//           or to menu (from LEVEL_SELECT). No-op on MENU.
// Skips if game is in a system-pause or ad-in-progress state.
document.addEventListener("keydown", function(e) {
    if (yandexAdInProgress || yandexPauseRequested) return;
    // Don't hijack typing in any text input (defensive — game has none today).
    var tgt = e.target;
    if (tgt && (tgt.tagName === "INPUT" || tgt.tagName === "TEXTAREA" || tgt.isContentEditable)) return;

    var key = e.key;
    if (key === "r" || key === "R") {
        if (gameState === STATE_LOSE || gameState === STATE_WIN || gameState === STATE_PLAY) {
            if (tutorialStep >= 0 && tutorialStep < 2) return;
            // Retry restarts current level/wave (same logic as Retry button).
            // Endless retry restarts run from wave 0 — matches the on-screen button.
            if (gameMode === "endless" && gameState !== STATE_PLAY) {
                startEndlessRun();
            } else {
                initGrid();
                gameState = STATE_PLAY;
                gaTrackLevelStart("keyboard_retry");
            }
            e.preventDefault();
        }
    } else if (key === " " || key === "Spacebar") {
        if (gameState === STATE_PLAY && !aiTurnBannerActive && !animating) {
            if (tutorialStep >= 0 && tutorialStep < 2) return;
            endTurn();
            e.preventDefault();
        }
    }
    // v16: Escape used to map to STATE_LEVEL_SELECT with preventDefault — that
    // collides with the browser's reserved fullscreen-exit handler on
    // CrazyGames and can leave the canvas in a mismatched-viewport state. Use
    // the in-game back button (top-right) or browser back instead.
});

// Main loop
function gameLoop() {
    requestAnimationFrame(gameLoop);
    try {
    gameTime = Date.now();
    syncGameplayAPI();
    syncBannerVisibility();

    ctx.save();

    // Screen shake
    if (shakeTimer > 0) {
        shakeTimer--;
        var dx = (Math.random() - 0.5) * shakeIntensity * 2;
        var dy = (Math.random() - 0.5) * shakeIntensity * 2;
        ctx.translate(dx, dy);
    }

    // Auto-advance countdown tick — fire next-level transition when timer elapses
    if (gameState === STATE_WIN && autoAdvanceStartAt > 0 && !autoAdvancePaused) {
        if (Date.now() - autoAdvanceStartAt >= AUTO_ADVANCE_MS) {
            triggerNextLevel(false); // auto-fired, no interstitial (Yandex 4.4)
        }
    }

    // v11.8a: STATE_MENU render removed — state unreachable, drawMenuScreen
    // function kept for now (~150 LOC) but never called. Safe to delete in
    // a follow-up; keeping for one-pass to reduce diff blast radius.
    if (gameState === STATE_LEVEL_SELECT) {
        drawLevelSelectScreen();
    } else if (gameState === STATE_UPGRADES) {
        drawUpgradesScreen();
    } else if (gameState === STATE_BOSS_INTRO) {
        drawBossIntroScreen();
    } else if (gameState === STATE_WORLD_CLEAR) {
        drawWorldClearScreen();
    } else if (gameState === STATE_ENDLESS_INTRO) {
        drawEndlessIntroScreen();
    } else if (gameState === STATE_CODEX) {
        drawCodexScreen();
    } else if (gameState === STATE_PLAY) {
        if (aiTurnBannerActive && Date.now() - aiTurnBannerAt > 900) {
            aiTurnBannerActive = false;
            aiTurnFlash = {};
        }
        ctx.fillStyle = COLORS.bg;
        ctx.fillRect(0, 0, W, H);
        drawGrid();
        drawParticles();
        drawFloatingTexts();
        drawUI();
        drawAITurnBanner();
        drawTutorialOverlay();
        drawSystemPauseOverlay();
    } else if (gameState === STATE_WIN) {
        ctx.fillStyle = COLORS.bg;
        ctx.fillRect(0, 0, W, H);
        drawGrid();
        drawParticles();
        drawFloatingTexts();
        drawUI();
        drawEndScreen(true);
    } else if (gameState === STATE_LOSE) {
        ctx.fillStyle = COLORS.bg;
        ctx.fillRect(0, 0, W, H);
        drawGrid();
        drawParticles();
        drawFloatingTexts();
        drawUI();
        drawEndScreen(false);
    }

    drawRewardBanner();
    drawDailyBonusModal();
    drawBonusCalendarOverlay();
    drawMissionsOverlay();
    // v17 — overlays that sit ABOVE the game state. New-unit reveal first
    // (highest priority because it fires on level entry); challenge card
    // gets drawn inside drawEndScreen so it's bound to the win/lose context.
    drawTierUnlockOverlay();
    drawResumePromptOverlay();
    drawWelcomeBackOverlay();

    ctx.restore();
    } catch(e) {}
}

applyBrowserLanguageFallback();
loadSave();
// v11.8b: defer daily-bonus modal — only fire after the player has cleared
// at least their first level. Tim's playtest 2026-05-19: bonus popping
// before the game even starts is confusing and steals the first-frame WOW.
if (save && save.firstLevelComplete) checkDailyBonus();
resizeCanvas();
yandexCoreReady = true;

// Wait for SDK before starting game:
// 1. Ensures correct language from first visible frame (п. 2.14)
// 2. Ensures LoadingAPI.ready() fires before game is playable (п. 1.19)
var gameStarted = false;

// ── Promo capture mode ─────────────────────────────────────────────────
// `?promo=climax` boots into a hand-tuned mid-game state with high-tier
// units already deployed, then runs a scripted action sequence (merge →
// attack → merge → attack → merge → attack) over ~12 seconds — designed
// for headless capture into a short-form (TikTok / YT Shorts / IG Reels)
// gameplay highlight video.
//
// NOT user-facing. Never linked from menus or shipped in submission zips.
// Triggered only by explicit URL flag; capture script lives at
// `Games/7-merge-conquest/crazygames_promo/record_climax.js`.

function setupPromoClimax() {
    currentLevel = Math.min(50, LEVELS.length - 1); // mid-late level
    initGrid();

    // Wipe whatever the level seeded — install our hand-tuned tableau
    for (var i = 0; i < grid.length; i++) {
        grid[i].owner = OWNER_NEUTRAL;
        clearUnit(grid[i]);
    }

    function placePromo(col, row, owner, tier, hpOverride) {
        var c = getCell(col, row);
        if (!c || c.blocked) return;
        c.owner = owner;
        c.tier = tier;
        var maxHp = TIER_STATS[tier].hp;
        c.hp = (hpOverride !== undefined) ? hpOverride : maxHp;
        c.maxHp = maxHp;  // keep maxHp full so the wounded HP bar reads correctly
    }

    // Player squad — two mergeable T3 Knights + a T4 Champion poised to strike
    placePromo(2, 5, OWNER_PLAYER, 3);  // Knight A (will merge → T4)
    placePromo(3, 5, OWNER_PLAYER, 3);  // Knight B (merge target spawns T4 Champion #2)
    placePromo(3, 4, OWNER_PLAYER, 4);  // T4 Champion #1 (chains kills across enemy line)
    placePromo(4, 5, OWNER_PLAYER, 2);  // Soldier (mergeable backup)
    placePromo(4, 6, OWNER_PLAYER, 2);  // Soldier (merge partner)
    placePromo(1, 5, OWNER_PLAYER, 2);  // Soldier (reinforcement)

    // Enemy line — HP intentionally LOW so each attack kills in one hit and
    // the Champion captures the tile (moves to it), enabling chained sweeps.
    // T4 Champion atk = 5, so target HP must be ≤ 5 for one-shot kills.
    // maxHp displays full → wounded bars in the opening frame add tension.
    placePromo(4, 4, OWNER_AI, 3, 2);  // Knight (Champion target #1, dies)
    placePromo(5, 4, OWNER_AI, 2, 2);  // Soldier (target #2, dies)
    placePromo(3, 3, OWNER_AI, 3, 3);  // Knight (target #3, dies)
    placePromo(2, 4, OWNER_AI, 2, 2);  // Soldier (still standing at end)

    ap = 99;  // unlimited AP so the scripted sequence isn't gated
    turnNumber = 1;
    selectedCell = null;
    gameState = STATE_PLAY;
    shakeTimer = 0;

    // Brief settle then start the choreographed sequence
    setTimeout(runNextPromoStep, 1400);
}

var PROMO_ACTIONS = [
    // a → b. Each spans ~1.5s in the recorded clip. Particles + screen shake
    // fire from doAttack/doMerge directly so the visual juice is real.
    //
    // Choreography assumes ONE-SHOT kills (low enemy HP set above), so each
    // ATTACK captures the target tile and the Champion MOVES into it. That's
    // what enables chained kills across the enemy line.
    { delay: 1500, action: "merge",  a: [2, 5], b: [3, 5] },  // T3+T3 → T4 Champion #2 at (3,5)
    { delay: 1500, action: "attack", a: [3, 4], b: [4, 4] },  // Champion #1 kills+captures (4,4)
    { delay: 1500, action: "attack", a: [4, 4], b: [5, 4] },  // Champion #1 chains → (5,4)
    { delay: 1500, action: "attack", a: [3, 5], b: [3, 4] },  // Champion #2 advances to empty (3,4)
    { delay: 1500, action: "attack", a: [3, 4], b: [3, 3] },  // Champion #2 kills+captures (3,3)
    { delay: 1500, action: "merge",  a: [4, 5], b: [4, 6] }   // T2+T2 → T3 Knight at (4,6)
];
var promoStepIdx = 0;

function runNextPromoStep() {
    if (promoStepIdx >= PROMO_ACTIONS.length) return;
    var step = PROMO_ACTIONS[promoStepIdx++];
    var a = getCell(step.a[0], step.a[1]);
    var b = getCell(step.b[0], step.b[1]);
    if (a && b && a.tier > 0) {
        var act = getActionType(a, b);
        // Fall back to the script's intent if the runtime classifier disagrees,
        // since we've hand-placed the board to support each step.
        if (step.action === "merge" && (act === "merge" || a.tier === b.tier)) {
            doMerge(a, b);
        } else if (step.action === "attack" && (act === "attack" || act === "capture")) {
            doAttack(a, b);
        } else if (step.action === "move") {
            doMove(a, b);
        } else if (b.tier === 0 || b.owner !== a.owner) {
            doAttack(a, b);  // best-effort visual if cell shifted under us
        }
    }
    setTimeout(runNextPromoStep, step.delay);
}

function maybeRunPromoMode() {
    try {
        var p = new URLSearchParams(location.search);
        if (p.get("promo") === "climax") {
            setupPromoClimax();
            trySendLoadingReady();
            gameLoop();
            return true;
        }
    } catch (e) {}
    return false;
}

function startGameOnce() {
    if (gameStarted) return;
    gameStarted = true;
    initGameAnalytics();
    fetchLiveBalance();   // v19 live balance (Sheet -> JSON); non-blocking, baked-in fallback
    if (maybeRunPromoMode()) return;
    // v17 — auto-resume hook: if the player had a mid-level snapshot saved
    // and they've been away ≥ RESUME_GAP_MS, show a modal asking them to
    // continue or start fresh. We don't auto-resume because the snapshot
    // restarts the wave the player was on (not the exact mid-turn state), so
    // a player who quit recently mid-turn doesn't want to be teleported back.
    if (hasResumableRun() && save.inProgressRun && save.inProgressRun.savedAt &&
        (Date.now() - save.inProgressRun.savedAt) >= RESUME_GAP_MS) {
        resumePromptVisible = true;
    }
    // Skip menu/level-select — find the first unfinished level and start it
    currentLevel = 0;
    for (var i = 0; i < LEVELS.length; i++) {
        if (!save.levelStars[i] || save.levelStars[i] === 0) { currentLevel = i; break; }
        if (i === LEVELS.length - 1) currentLevel = LEVELS.length - 1; // all done — replay last
    }
    initGrid();
    gaTrackLevelStart("boot");
    // If first load lands on a boss level, show the boss intro first
    var bossCmd = getCommanderForLevel(currentLevel);
    if (bossCmd) {
        pendingBossCommander = bossCmd;
        gameState = STATE_BOSS_INTRO;
    }
    trySendLoadingReady();
    gameLoop();
}

var sdkTimeout = setTimeout(function() {
    yandexLoadingReadySent = true;
    startGameOnce();
}, 3000);

try {
    if (typeof YaGames !== "undefined" && YaGames.init) {
        YaGames.init().then(function(ysdk) {
            clearTimeout(sdkTimeout);
            yandexSDK = ysdk;
            yandexReady = true;
            window.ysdk = ysdk;
            applySdkLanguage(ysdk);

            if (ysdk.on) {
                ysdk.on("game_api_pause", function() {
                    yandexPauseRequested = true;
                    selectedCell = null;
                    pausePlatformAudio();
                    syncGameplayAPI();
                });
                ysdk.on("game_api_resume", function() {
                    yandexPauseRequested = false;
                    resumePlatformAudio();
                    syncGameplayAPI();
                });
            }

            startGameOnce();
            syncGameplayAPI();
            syncBannerVisibility();
        }).catch(function() {
            clearTimeout(sdkTimeout);
            yandexLoadingReadySent = true;
            startGameOnce();
        });
    } else if (window.CrazyGames && window.CrazyGames.SDK && typeof window.CrazyGames.SDK.init === "function") {
        // CrazyGames lifecycle — mirrors the Yandex path. loadingStart fires
        // immediately so the SDK knows boot has started; gameplayStart/Stop
        // are routed through syncGameplayAPI on state transitions; loadingStop
        // fires once after startGameOnce.
        try {
            if (window.CrazyGames.SDK.game && window.CrazyGames.SDK.game.loadingStart) {
                window.CrazyGames.SDK.game.loadingStart();
            }
        } catch (e) {}
        window.CrazyGames.SDK.init().then(function() {
            clearTimeout(sdkTimeout);
            crazygamesSDK = window.CrazyGames.SDK;
            crazygamesReady = true;
            yandexLoadingReadySent = true; // suppress the Yandex loading branch
            try {
                var info = crazygamesSDK.user && crazygamesSDK.user.systemInfo;
                if (info && info.countryCode && info.countryCode.toLowerCase() === "ru") {
                    currentLang = "ru";
                    document.documentElement.lang = "ru";
                }
            } catch (e) {}
            // v17 — fetch CG user identity for "Welcome back" header. Async,
            // best-effort; if it fails or returns null (guest user), we just
            // skip the welcome line. Doesn't block boot.
            try {
                if (crazygamesSDK.user && typeof crazygamesSDK.user.getUser === "function") {
                    crazygamesSDK.user.getUser().then(function(user) {
                        if (user && user.username) {
                            crazygamesUserName = String(user.username).slice(0, 24);
                        }
                    }).catch(function() {});
                }
            } catch (e) {}
            // v17 — cloud save: if a CG-side save exists, prefer it over the
            // localStorage one we loaded earlier. Async; if it arrives after
            // a few frames of gameplay, we'll patch save next time saveToDisk
            // runs. The user-visible effect is "your progress follows you
            // across devices."
            try {
                if (crazygamesSDK.data && typeof crazygamesSDK.data.getItem === "function") {
                    crazygamesSDK.data.getItem("mc_save_v1").then(function(value) {
                        if (!value) return;
                        try {
                            var cloudSave = JSON.parse(value);
                            // Only apply if cloud save has more progress than local
                            var cloudHi = cloudSave && typeof cloudSave.highestLevelCleared === "number" ? cloudSave.highestLevelCleared : -1;
                            var localHi = save && typeof save.highestLevelCleared === "number" ? save.highestLevelCleared : -1;
                            if (cloudHi > localHi) {
                                save = cloudSave;
                                applyCloudSaveSideEffects();
                            }
                        } catch (_) {}
                    }).catch(function() {});
                }
            } catch (e) {}
            startGameOnce();
            tryCgLoadingReady();
            syncGameplayAPI();
        }).catch(function() {
            clearTimeout(sdkTimeout);
            yandexLoadingReadySent = true;
            startGameOnce();
        });
    } else {
        clearTimeout(sdkTimeout);
        yandexLoadingReadySent = true;
        startGameOnce();
    }
} catch (e) {
    clearTimeout(sdkTimeout);
    yandexLoadingReadySent = true;
    startGameOnce();
}

// Defensive global error handler — prevents transient errors from being
// reported to CG's crash-rate metric. We swallow rather than rethrow because
// the gameLoop already has a try/catch around its body; anything reaching
// here is by definition something we couldn't predict or guard against
// locally, and a single bad frame shouldn't punish the entire session.
window.addEventListener("error", function(ev) {
    // Don't suppress development errors locally — only in production hosts.
    if (location.hostname === "localhost" || location.hostname === "127.0.0.1") return;
    ev.preventDefault();
});
window.addEventListener("unhandledrejection", function(ev) {
    if (location.hostname === "localhost" || location.hostname === "127.0.0.1") return;
    ev.preventDefault();
});

// Screenshot helpers — safe to ship, do nothing in production
function buildReadableState() {
    var visible = grid.map(function(c) {
        return { c: c.col, r: c.row, owner: c.owner, tier: c.tier, hp: c.hp };
    });
    var actions = [];
    if (selectedCell) {
        var selected = getCell(selectedCell.col, selectedCell.row);
        for (var i = 0; i < grid.length; i++) {
            var kind = getActionType(selected, grid[i]);
            if (kind) actions.push({ kind: kind, c: grid[i].col, r: grid[i].row });
        }
    }
    return {
        coordinateSystem: "hex offset grid, c increases right, r increases down",
        state: gameState,
        mode: gameMode,
        level: currentLevel + 1,
        turn: turnNumber,
        ap: ap,
        selected: selectedCell,
        actions: actions,
        grid: visible,
        portraitLayout: isPortraitLayout(),
        coach: Date.now() < coachToast.until ? coachToast.text : ""
    };
}
window.render_game_to_text = function() { return JSON.stringify(buildReadableState()); };
window.__gfState = buildReadableState;
window.advanceTime = function(ms) {
    gameTime += ms || 16;
    return buildReadableState();
};
window._jumpLevel = function(n) { currentLevel = n; initGrid(); };
window._setLang = function(lang) { currentLang = lang; };
// Test-only exposures: locale_overflow_check needs the i18n table + body font
// to measure translated button labels against button rects. Safe to ship.
window._getI18N = function() { return I18N; };
window._getFontBody = function() { return FONT_BODY; };
window._showBossIntro = function(worldIdx) {
    var lvl = (worldIdx === undefined ? 9 : worldIdx * 10 + 9);
    currentLevel = lvl;
    initGrid();
    pendingBossCommander = getCommanderForLevel(lvl);
    gameState = STATE_BOSS_INTRO;
};
window._showWorldClear = function(worldIdx) {
    var lvl = (worldIdx === undefined ? 9 : worldIdx * 10 + 9);
    worldClearCommander = getCommanderForLevel(lvl);
    gameState = STATE_WORLD_CLEAR;
};
window._forceWin = function() {
    for (var i = 0; i < grid.length; i++) {
        if (grid[i].owner === OWNER_AI) { grid[i].owner = OWNER_NEUTRAL; grid[i].tier = 0; }
    }
    checkWinLose();
};
window._getState = function() { return gameState; };
window._setState = function(s) { gameState = s; };
window._triggerRewardBanner = function(ok) { triggerRewardBanner(ok); };
// Test-only: drive + observe the rewarded-retry ad flow so the no-fill freeze
// (game hangs with no ad) is regression-testable without simulating canvas taps.
window._adState = function() { return { adInProgress: yandexAdInProgress, rewardedUsed: rewardedUsedThisRun, rewardedAvailable: isRewardedAvailable() }; };
window._fireRewardedRetry = function() { window.__lastRewardResult = undefined; showRewardedRetryAd(function(r) { window.__lastRewardResult = r; }); };
window._fireFullscreenAd = function() {
    window.__lastFullscreenDone = false;
    withInterstitialAd(function() { window.__lastFullscreenDone = true; });
};
// v18 lives test hooks
window._getLives = function() { refreshLives(); return { lives: save.lives, max: MAX_LIVES, regenMs: livesRegenMsLeft() }; };
window._setLives = function(n) { if (save) { save.lives = Math.max(0, Math.min(MAX_LIVES, n | 0)); save.livesRegenAt = save.lives >= MAX_LIVES ? 0 : (Date.now() + LIFE_REGEN_MS); saveToDisk(); } return window._getLives(); };
window._spendLife = function() { spendLife(); return window._getLives(); };
window._grantLife = function() { grantLife(); return window._getLives(); };
// v18 platform-pause test hooks (simulate a game_api_pause that never resumed)
window._setPaused = function(b) { yandexPauseRequested = !!b; };
window._getPaused = function() { return yandexPauseRequested; };
window._getMode = function() { return gameMode; };
window._getEndlessWave = function() { return endlessWave; };
window._getEndlessBest = function() { return save.endlessBest; };
window._getEndlessHistory = function() { return save.endlessHistory; };
window._getLeaderboardCache = function() { return leaderboardCache; };

function _reachRectFromGame(id, gx, gy, gw, gh) {
    var canvasEl = document.querySelector("canvas");
    if (!canvasEl || !W || !H) return null;
    var r = canvasEl.getBoundingClientRect();
    var sx = r.width / W;
    var sy = r.height / H;
    return {
        id: id,
        x: Math.round(r.left + (gx - gw / 2) * sx),
        y: Math.round(r.top + (gy - gh / 2) * sy),
        w: Math.round(gw * sx),
        h: Math.round(gh * sy),
        pinned: true
    };
}

window.__gfTour = function(i) {
    if (i === undefined) return ["menu"];
    gameState = STATE_MENU;
    selectedCell = null;
    return "menu";
};

window.__gfReach = function() {
    var vw = Math.max(1, Math.round(window.innerWidth || document.documentElement.clientWidth || W || 1));
    var vh = Math.max(1, Math.round(window.innerHeight || document.documentElement.clientHeight || H || 1));
    var primary = _reachRectFromGame("menu-primary", W / 2, H / 2 + 105, Math.min(260, W - 48), 56);
    return {
        screen: gameState === STATE_PLAY ? "play" : "menu",
        viewportW: vw,
        viewportH: vh,
        screenH: vh,
        scrollMaxY: 0,
        items: primary ? [primary] : []
    };
};
window._getCurrentLevel = function() { return currentLevel; };
window._getGrid = function() { return grid; };
window._hexToPixel = function(c, r) { return hexToPixel(c, r); };
window._getCanvasSize = function() { return { w: W, h: H, portraitLayout: isPortraitLayout() }; };
window._checkWinLose = function() { checkWinLose(); };
window._setCarry = function(tiers) {
    save.carryUnits = (tiers || []).map(function(tt) { return { tier: tt }; });
    saveToDisk();
};
})();
</script>
