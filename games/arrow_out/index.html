// ── PRNG (deterministic for daily; Math.random otherwise) ───────────────────
var _rngState = 0, _useSeed = false;
function seedRng(s) { _rngState = (s >>> 0) || 1; _useSeed = true; }
function clearSeed() { _useSeed = false; }
function rnd() {
  if (!_useSeed) return Math.random();
  var x = _rngState;
  x ^= x << 13; x ^= x >>> 17; x ^= x << 5;
  _rngState = x >>> 0;
  return (_rngState & 0xffffff) / 0x1000000;
}
function ri(n) { return Math.floor(rnd() * n); }

function dailyKey() {
  var d = new Date();
  return '' + d.getFullYear() + ('0' + (d.getMonth() + 1)).slice(-2) + ('0' + d.getDate()).slice(-2);
}
function dailySeed() {
  var k = dailyKey(), h = 2166136261;
  for (var i = 0; i < k.length; i++) { h ^= k.charCodeAt(i); h = (h * 16777619) >>> 0; }
  return h >>> 0;
}

// ── OCCUPANCY HELPERS ───────────────────────────────────────────────────────
function cellsOf(car) {
  if (car.len === 1) return [{ r: car.r, c: car.c }];
  return [{ r: car.r, c: car.c }, { r: car.long2.r, c: car.long2.c }];
}
function rebuildOcc() {
  occ = {};
  for (var i = 0; i < cars.length; i++) {
    var cl = cellsOf(cars[i]);
    for (var j = 0; j < cl.length; j++) occ[cl[j].r + ',' + cl[j].c] = cars[i];
  }
}
function carAt(r, c) { return occ[r + ',' + c] || null; }

// Is the lane from `car` to the board edge (facing dir) clear of OTHER cars?
function laneClear(car) {
  var dir = car.dir, dr = DR[dir], dc = DC[dir];
  var cl = cellsOf(car);
  for (var j = 0; j < cl.length; j++) {
    var r = cl[j].r + dr, c = cl[j].c + dc;
    while (r >= 0 && r < grid && c >= 0 && c < grid) {
      var o = occ[r + ',' + c];
      if (o && o.id !== car.id) return false;
      r += dr; c += dc;
    }
  }
  return true;
}
function anyFreeable() {
  for (var i = 0; i < cars.length; i++) {
    var car = cars[i];
    if (car.frost > 0) return true;  // a frosted car can always be tapped (crack) — never "stuck"
    if (laneClear(car)) return true;
  }
  return false;
}

// ── REVERSE-CONSTRUCTION GENERATOR (guaranteed solvable) ────────────────────
function genBoard(g, nCars, allowLong, allowFrost) {
  var tmpOcc = {};
  var placed = [];
  var r, c;

  function occAt(rr, cc) { return tmpOcc[rr + ',' + cc]; }
  function laneClearTmp(rr, cc, dir, len, longCell) {
    var dr = DR[dir], dc = DC[dir];
    var starts = [{ r: rr, c: cc }];
    if (len === 2 && longCell) starts.push(longCell);
    for (var s = 0; s < starts.length; s++) {
      var pr = starts[s].r + dr, pc = starts[s].c + dc;
      while (pr >= 0 && pr < g && pc >= 0 && pc < g) {
        if (occAt(pr, pc)) return false;
        pr += dr; pc += dc;
      }
    }
    return true;
  }

  var attempts = 0, maxAttempts = nCars * 80 + 400;
  while (placed.length < nCars && attempts < maxAttempts) {
    attempts++;
    var emptyList = [];
    for (r = 0; r < g; r++) for (c = 0; c < g; c++) if (!occAt(r, c)) emptyList.push({ r: r, c: c });
    if (!emptyList.length) break;
    var cellPick = emptyList[ri(emptyList.length)];
    r = cellPick.r; c = cellPick.c;

    var wantLong = allowLong && rnd() < 0.32;
    var dirs = [0, 1, 2, 3];
    for (var d2 = dirs.length - 1; d2 > 0; d2--) { var jj = ri(d2 + 1); var tt = dirs[d2]; dirs[d2] = dirs[jj]; dirs[jj] = tt; }

    var placedThis = false;
    for (var di = 0; di < dirs.length && !placedThis; di++) {
      var dir = dirs[di];
      if (wantLong) {
        // partner cell is BEHIND the head (opposite facing) so both share the lane
        var br = r - DR[dir], bc = c - DC[dir];
        if (br < 0 || br >= g || bc < 0 || bc >= g || occAt(br, bc)) continue;
        var longCell = { r: br, c: bc };
        if (!laneClearTmp(r, c, dir, 2, longCell)) continue;
        tmpOcc[r + ',' + c] = 1; tmpOcc[br + ',' + bc] = 1;
        placed.push({ r: r, c: c, dir: dir, len: 2, long2: longCell });
        placedThis = true;
      } else {
        if (!laneClearTmp(r, c, dir, 1, null)) continue;
        tmpOcc[r + ',' + c] = 1;
        placed.push({ r: r, c: c, dir: dir, len: 1, long2: null });
        placedThis = true;
      }
    }
  }

  var built = [], sol = [];
  for (var i = 0; i < placed.length; i++) {
    var p = placed[i];
    var frost = (allowFrost && i < placed.length - 1 && rnd() < 0.25) ? 1 : 0;
    built.push({
      id: ++carSeq, r: p.r, c: p.c, dir: p.dir, len: p.len,
      long2: p.long2 ? { r: p.long2.r, c: p.long2.c } : null,
      frost: frost,
      scale: 1, shakeT: 0, slideT: 0, sliding: false, alpha: 1, spawnT: 0,
    });
  }
  // solution = REVERSE of placement (last placed can leave first)
  for (var k = placed.length - 1; k >= 0; k--) sol.push(built[k].id);
  return { cars: built, solution: sol };
}

// Difficulty curve by level.
function levelSpec(lv) {
  var g = Math.min(GRID_MAX, GRID_MIN + Math.floor((lv - 1) / 1.6));
  if (lv === 1) g = 2;
  if (lv === 2) g = 3;
  g = Math.max(GRID_MIN, Math.min(GRID_MAX, g));
  var maxCars = g * g;
  var density = Math.min(0.78, 0.52 + lv * 0.02);
  var n = Math.max(2, Math.round(maxCars * density));
  n = Math.min(n, maxCars);
  return { g: g, n: n, allowLong: lv >= 4, allowFrost: lv >= 7 };
}

// ── LEVEL SETUP ─────────────────────────────────────────────────────────────
function startLevel(lv, opts) {
  opts = opts || {};
  level = lv;
  inDaily = !!opts.daily;
  if (inDaily) seedRng(opts.seed != null ? opts.seed : dailySeed());
  else clearSeed();

  var spec = inDaily ? { g: 5, n: 18, allowLong: true, allowFrost: true } : levelSpec(lv);
  if (!tutorialDone && !inDaily && lv === 1) spec = { g: 2, n: 3, allowLong: false, allowFrost: false };

  var gen = genBoard(spec.g, spec.n, spec.allowLong, spec.allowFrost);
  if (gen.cars.length < 2) gen = genBoard(spec.g, Math.max(2, spec.n - 2), false, false);

  grid = spec.g;
  cars = gen.cars;
  solution = gen.solution;
  rebuildOcc();
  for (var i = 0; i < cars.length; i++) { cars[i].scale = 0.01; cars[i].spawnT = 0.16 + i * 0.012; }

  starPar = cars.length;   // 3-star = a perfect non-redundant solve (each car once)
  moves = 0; stars = 0; carsLeft = cars.length;
  undosUsed = 0; hintsUsed = 0; history = [];
  clearCarCoins = 0;
  hintCarId = -1; gridlockPulse = 0; clearAnimT = 0;
  gs = 'PLAYING';
  GF.gameStarted();
  layout();
  saveAll();
}

// snapshot for undo
function snapshot() {
  var lite = [];
  for (var i = 0; i < cars.length; i++) {
    var c = cars[i];
    lite.push({ id: c.id, r: c.r, c: c.c, dir: c.dir, len: c.len, long2: c.long2 ? { r: c.long2.r, c: c.long2.c } : null, frost: c.frost });
  }
  history.push({ cars: lite, moves: moves, carsLeft: carsLeft });
  if (history.length > 250) history.shift();
}
function restoreSnapshot(snap) {
  var byId = {};
  for (var i = 0; i < cars.length; i++) byId[cars[i].id] = cars[i];
  var rebuilt = [];
  for (var j = 0; j < snap.cars.length; j++) {
    var s = snap.cars[j];
    var ex = byId[s.id];
    if (ex) {
      ex.r = s.r; ex.c = s.c; ex.dir = s.dir; ex.len = s.len;
      ex.long2 = s.long2 ? { r: s.long2.r, c: s.long2.c } : null;
      ex.frost = s.frost; ex.sliding = false; ex.slideT = 0; ex.alpha = 1; ex.scale = 1; ex.spawnT = 0;
      rebuilt.push(ex);
    } else {
      rebuilt.push({ id: s.id, r: s.r, c: s.c, dir: s.dir, len: s.len, long2: s.long2 ? { r: s.long2.r, c: s.long2.c } : null, frost: s.frost, scale: 1, shakeT: 0, slideT: 0, sliding: false, alpha: 1, spawnT: 0 });
    }
  }
  cars = rebuilt;
  moves = snap.moves; carsLeft = snap.carsLeft;
  rebuildOcc();
  for (var q = 0; q < cars.length; q++) { var ctr = cellCenter(cars[q]); cars[q].x = ctr.x; cars[q].y = ctr.y; }
}

// ── ACTIONS ─────────────────────────────────────────────────────────────────
function tapCar(car) {
  if (car.sliding) return;
  if (car.frost > 0) {
    snapshot();
    car.frost = 0;
    GF.sfx('hit');
    GF.juice.shake(3, 160);
    GF.juice.particles.burst(car.x, car.y, { count: 10, colors: ['#bfe9ff', '#ffffff', '#8ecae6'], speed: 120, gravity: 260, size: 4, life: 0.5 });
    GF.juice.punch(car, 'scale', 0.18, 240);
    hintCarId = -1;
    saveAll();
    return;
  }
  if (laneClear(car)) {
    snapshot();
    driveOff(car);
  } else {
    car.shakeT = SHAKE_MS / 1000;
    GF.sfx('error');
    GF.juice.shake(4, 150);
    GF.juice.flash('#ff5a5a', 90, 0.12);
  }
}
function driveOff(car) {
  car.sliding = true; car.slideT = 0;
  moves++;
  GF.sfx('coin');
  GF.juice.punch(car, 'scale', 0.16, 200);
  var cl = cellsOf(car);
  for (var j = 0; j < cl.length; j++) delete occ[cl[j].r + ',' + cl[j].c];
  hintCarId = -1;
  if (GF.tutorial.active) {
    var stepIdx = GF.tutorial.step;
    if (stepIdx === 0 || stepIdx === 1) GF.tutorial.next();
  }
  var earn = Math.max(1, Math.round((COIN_PER_CAR + lotBonus()) * (CFG.events.double_coins ? 2 : 1) * (CFG.tuning.coin_mult || 1)));
  coins += earn; clearCarCoins += earn;
  score += 5;
  GF.juice.floatText(car.x, car.y - board.cell * 0.3, '+' + earn, { color: '#ffd166', size: 17, rise: 40 });
  GF.juice.particles.burst(car.x, car.y, { count: 12, colors: ['#ffd166', '#ffe9a8', '#fff'], speed: 150, gravity: 380, size: 4, life: 0.5 });
  onCarCleared();               // M1: rescue a car into the owned collection
  saveAll();
}
function finalizeDriveOff(car) {
  var idx = cars.indexOf(car);
  if (idx >= 0) cars.splice(idx, 1);
  carsLeft = cars.length;
  rebuildOcc();
  if (carsLeft === 0 && gs === 'PLAYING') onLevelClear();
}
function onLevelClear() {
  var par = starPar;
  if (moves <= par) stars = 3;
  else if (moves <= Math.ceil(par * 1.4)) stars = 2;
  else stars = 1;
  var bonus = STAR_BONUS[stars] * (CFG.events.double_coins ? 2 : 1);
  clearCoinsGained = bonus;
  if (inDaily) {
    var dk = dailyKey();
    if (lastDaily !== dk) { coins += DAILY_BONUS; clearCoinsGained += DAILY_BONUS; lastDaily = dk; }
  }
  coins += bonus;
  score += stars * 25 + (inDaily ? 100 : 0);
  if (score > best) { best = score; try { localStorage.setItem('arrow_out_best', best); } catch (e) {} }
  gs = 'LEVELCLEAR';
  clearAnimT = 0;
  pendingAd = true;
  GF.sfx('win');
  GF.gameEnded();
  GF.juice.particles.burst(GF.cx, GF.cy - 40 * GF.S, { count: 46, colors: ['#ffd166', '#ff8fab', '#8ecae6', '#a0e7a0', '#caa8ff'], speed: 260, gravity: 300, size: 6, life: 1.1, angle: -Math.PI / 2, spread: Math.PI * 1.2 });
  GF.juice.flash('#fff3c4', 200, 0.25);
  if (GF.tutorial.active) GF.tutorial.next();
  saveAll();
}

function doUndo() {
  if (gs !== 'PLAYING' || !history.length) return;
  if (undosUsed >= FREE_UNDOS) {
    if (coins < UNDO_COST) { GF.sfx('error'); flashHud(); return; }
    coins -= UNDO_COST;
  }
  undosUsed++;
  restoreSnapshot(history.pop());
  GF.sfx('click');
  GF.juice.shake(2, 120);
  hintCarId = -1; gridlockPulse = 0;
  saveAll();
}
function doReset() {
  if (gs !== 'PLAYING') return;
  if (history.length) { restoreSnapshot(history[0]); history = []; }
  moves = 0; undosUsed = 0; hintsUsed = 0; clearCarCoins = 0;
  GF.sfx('click'); hintCarId = -1; gridlockPulse = 0;
  saveAll();
}
function doHint() {
  if (gs !== 'PLAYING') return;
  if (hintsUsed >= FREE_HINTS) {
    var hc = CFG.tuning.hint_cost || HINT_COST;
    if (coins < hc) { GF.sfx('error'); flashHud(); return; }
    coins -= hc;
  }
  hintsUsed++;
  var pick = null, s, i, k;
  for (s = 0; s < solution.length; s++) {
    var car = carById(solution[s]);
    if (car && car.frost === 0 && laneClear(car)) { pick = car; break; }
  }
  if (!pick) for (i = 0; i < cars.length; i++) { if (cars[i].frost === 0 && laneClear(cars[i])) { pick = cars[i]; break; } }
  if (!pick) for (k = 0; k < cars.length; k++) { if (cars[k].frost > 0) { pick = cars[k]; break; } }
  if (pick) { hintCarId = pick.id; hintT = 2.6; GF.sfx('pickup'); }
  saveAll();
}
function carById(id) { for (var i = 0; i < cars.length; i++) if (cars[i].id === id) return cars[i]; return null; }

var hudFlash = 0;
function flashHud() { hudFlash = 0.4; }

// ── BUY / EQUIP SKINS ───────────────────────────────────────────────────────
function buyOrEquip(skin) {
  if (ownedSkins[skin.id]) { equippedSkin = skin.id; bgKey = ''; GF.sfx('click'); saveAll(); return; }
  if (coins >= skin.price) {
    coins -= skin.price; ownedSkins[skin.id] = true; equippedSkin = skin.id; bgKey = '';
    GF.sfx('unlock');
    GF.juice.particles.burst(GF.cx, GF.cy, { count: 30, colors: ['#ffd166', '#ff8fab', '#8ecae6'], speed: 220, gravity: 300, size: 5, life: 0.9 });
    GF.funnel.mark('first_upgrade');
    saveAll();
  } else { GF.sfx('error'); flashHud(); }
}

// ── CAR COLLECTION ("My Lot") — owned-meta logic (M1) ───────────────────────
function modelById(id) { for (var i = 0; i < CAR_MODELS.length; i++) if (CAR_MODELS[i].id === id) return CAR_MODELS[i]; return null; }
function collectedCount() { var n = 0; for (var k in ownedCars) if (ownedCars[k]) n++; return n; }
// each model collected permanently boosts coins-per-clear (the lot bonus).
function lotBonus() { return collectedCount() * LOT_COIN_BONUS; }
// the next unclaimed milestone (for the session-end "reason to return" hook).
function nextMilestone() {
  for (var i = collectMs; i < LOT_MILESTONES.length; i++) {
    if (collectedCount() < LOT_MILESTONES[i].need) return LOT_MILESTONES[i];
  }
  // all collected up to here but milestones still unclaimed -> claimable
  return (collectMs < LOT_MILESTONES.length) ? LOT_MILESTONES[collectMs] : null;
}
// roll for a NEW model discovery on a clear. `guaranteed` forces a discovery
// (first clear of a session) so a returning player always sees a fresh car.
function tryDiscover(guaranteed) {
  // models not yet owned, weighted by rarity (commons fall first, epics chase)
  var pool = [], i, total = 0;
  for (i = 0; i < CAR_MODELS.length; i++) {
    if (!ownedCars[CAR_MODELS[i].id]) { var w = RAR_WEIGHT[CAR_MODELS[i].rar]; pool.push({ m: CAR_MODELS[i], w: w }); total += w; }
  }
  if (!pool.length) return null;                       // collection complete
  // base ~14% per clear; guaranteed forces it; never above 1
  if (!guaranteed && Math.random() > 0.14) return null;
  var roll = Math.random() * total, acc = 0, pick = pool[0].m;
  for (i = 0; i < pool.length; i++) { acc += pool[i].w; if (roll <= acc) { pick = pool[i].m; break; } }
  ownedCars[pick.id] = true;
  return pick;
}
// check whether collecting tipped us over a milestone -> pay the coin chest.
function checkLotMilestone() {
  var paid = false;
  while (collectMs < LOT_MILESTONES.length && collectedCount() >= LOT_MILESTONES[collectMs].need) {
    coins += LOT_MILESTONES[collectMs].reward;
    collectMs++; paid = true;
  }
  return paid;
}
// called from driveOff: fold discovery + toast + milestone into the clear event.
function onCarCleared() {
  var guaranteed = sessionFirstClear;
  sessionFirstClear = false;
  var found = tryDiscover(guaranteed);
  if (found) {
    collToast = { modelId: found.id, t: 2.8 };
    GF.sfx('unlock');
    GF.juice.floatText(GF.cx, GF.cy - board.cell * 0.9, GF.t('newcar'), { color: RAR_COL[found.rar], size: 16, rise: 36 });
    GF.juice.particles.burst(GF.cx, GF.cy - board.cell * 0.5, { count: 22, colors: [found.body, '#fff', RAR_COL[found.rar]], speed: 200, gravity: 280, size: 5, life: 0.9 });
    if (checkLotMilestone()) {
      GF.sfx('reward');
      GF.juice.floatText(GF.cx, GF.cy, GF.t('chestwon'), { color: '#ffd166', size: 18, rise: 44 });
    }
    GF.funnel.mark('first_upgrade');
  }
}

// ── PERSISTENCE (Yandex 1.9) ────────────────────────────────────────────────
function saveAll() { GF.saveRun(); }

// ── LAYOUT ──────────────────────────────────────────────────────────────────
var HUD_TOP = 0, HUD_BOT = 0;
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  HUD_TOP = clamp(58 * S, 46, 96);
  HUD_BOT = clamp(96 * S, 72, 150);
  var availW = W - 16 * S;
  var availH = H - HUD_TOP - HUD_BOT - 16 * S;
  var boardPx = Math.min(availW, availH) * 0.99;
  board.cell = boardPx / grid;
  board.x = (W - boardPx) / 2;
  board.y = HUD_TOP + 8 * S + (availH - boardPx) / 2;
  if (board.y < HUD_TOP + 6 * S) board.y = HUD_TOP + 6 * S;
  for (var i = 0; i < cars.length; i++) {
    var car = cars[i];
    if (!car.sliding) { var ctr = cellCenter(car); car.x = ctr.x; car.y = ctr.y; }
  }
}
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function cellCenter(car) {
  var cl = cellsOf(car), sx = 0, sy = 0;
  for (var j = 0; j < cl.length; j++) {
    sx += board.x + (cl[j].c + 0.5) * board.cell;
    sy += board.y + (cl[j].r + 0.5) * board.cell;
  }
  return { x: sx / cl.length, y: sy / cl.length };
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt) {
  GF.juice.update(dt);
  layout();
  GF.tutorial.update(dt);
  if (hudFlash > 0) hudFlash -= dt;
  if (hintT > 0) { hintT -= dt; if (hintT <= 0) hintCarId = -1; }
  if (collToast) { collToast.t -= dt; if (collToast.t <= 0) collToast = null; }

  for (var i = cars.length - 1; i >= 0; i--) {
    var car = cars[i];
    if (car.spawnT > 0) {
      car.spawnT -= dt;
      car.scale = car.scale < 1 ? Math.min(1, car.scale + dt * 5) : 1;
      if (car.spawnT <= 0) car.scale = 1;
    }
    if (car.shakeT > 0) car.shakeT -= dt;
    if (car.sliding) {
      car.slideT += dt;
      var k = Math.min(1, car.slideT / (SLIDE_MS / 1000));
      var ease = 1 - Math.pow(1 - k, 3);
      var start = cellCenter(car);
      var travel = (Math.max(grid, 4) + 1.5) * board.cell;
      car.x = start.x + DC[car.dir] * travel * ease;
      car.y = start.y + DR[car.dir] * travel * ease;
      car.alpha = 1 - Math.max(0, (k - 0.6) / 0.4);
      if (k >= 1) finalizeDriveOff(car);
    }
  }

  if (gs === 'PLAYING' && cars.length > 0) {
    var sliding = false;
    for (var s = 0; s < cars.length; s++) if (cars[s].sliding) { sliding = true; break; }
    if (!sliding && !anyFreeable()) gridlockPulse = Math.min(1, gridlockPulse + dt * 2);
    else gridlockPulse = Math.max(0, gridlockPulse - dt * 3);
  }
  if (gs === 'LEVELCLEAR') clearAnimT += dt;
}

// ── INPUT ───────────────────────────────────────────────────────────────────
function onPress(x, y) {
  if (muteHit(x, y)) { setMuted(GF.toggleMute()); return; }
  // tutorial: handle skip button + manual-step routing
  if (GF.tutorial.active) {
    var consumed = GF.tutorial.handleClick(x, y);
    if (consumed && !currentTutAdvanceManual()) return;
    // for manual steps, fall through so a board car tap can resolve
  }
  for (var i = 0; i < btns.length; i++) {
    var b = btns[i];
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { b.fn(); return; }
  }
  if (gs !== 'PLAYING') return;
  if (x < board.x || x > board.x + board.cell * grid || y < board.y || y > board.y + board.cell * grid) return;
  var c = Math.floor((x - board.x) / board.cell);
  var r = Math.floor((y - board.y) / board.cell);
  var car = carAt(r, c);
  if (car) tapCar(car);
}
function currentTutAdvanceManual() {
  if (!GF.tutorial.active) return false;
  var step = GF.tutorial.steps[GF.tutorial.step];
  return step && step.advance === 'manual';
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function draw(ctx) {
  var W = GF.W, H = GF.H;
  drawBackground(ctx, W, H);
  btns = [];

  drawBoardBase(ctx);
  for (var i = 0; i < cars.length; i++) drawCar(ctx, cars[i]);
  if (hintCarId >= 0) { var hc = carById(hintCarId); if (hc) drawHintRing(ctx, hc); }

  if (gs === 'PLAYING' || gs === 'LEVELCLEAR') drawHUD(ctx);

  GF.juice.particles.draw(ctx);
  GF.juice.texts.draw(ctx);

  if (gs === 'LEVELCLEAR') drawLevelClear(ctx);
  if (gs === 'HUB') drawHub(ctx);
  if (gs === 'GARAGE') drawGarage(ctx);
  if (gs === 'COLLECTION') drawCollection(ctx);

  if (gs === 'PLAYING') GF.tutorial.draw(ctx);

  drawCollToast(ctx);
  GF.juice.drawFlash(ctx);
}

function drawBackground(ctx, W, H) {
  var key = W + 'x' + H + '_' + equippedSkin;
  if (bgCanvas && bgKey === key) { ctx.drawImage(bgCanvas, 0, 0); return; }
  var bc = document.createElement('canvas'); bc.width = W; bc.height = H;
  var b = bc.getContext('2d');
  var pal = bgPalette();
  var g = b.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, pal.top); g.addColorStop(0.55, pal.mid); g.addColorStop(1, pal.bot);
  b.fillStyle = g; b.fillRect(0, 0, W, H);
  var rg = b.createRadialGradient(W * 0.5, H * 0.38, Math.min(W, H) * 0.1, W * 0.5, H * 0.5, Math.max(W, H) * 0.75);
  rg.addColorStop(0, 'rgba(255,220,150,0.10)'); rg.addColorStop(1, 'rgba(0,0,0,0.28)');
  b.fillStyle = rg; b.fillRect(0, 0, W, H);
  bgCanvas = bc; bgKey = key;
  ctx.drawImage(bc, 0, 0);
}
function bgPalette() {
  if (equippedSkin === 'neon') return { top: '#160a28', mid: '#1d0f3a', bot: '#0c0820' };
  if (equippedSkin === 'safari') return { top: '#3a3320', mid: '#2c2716', bot: '#1c180e' };
  if (equippedSkin === 'candy') return { top: '#3a1f2e', mid: '#2e1726', bot: '#1f0f1a' };
  return { top: '#3a2c20', mid: '#2c2118', bot: '#1c150f' };
}

function drawBoardBase(ctx) {
  var S = GF.S, x = board.x, y = board.y, cell = board.cell, side = cell * grid;
  ctx.save();
  GF.rr(ctx, x - 6 * S, y - 6 * S, side + 12 * S, side + 12 * S, 16 * S);
  ctx.fillStyle = 'rgba(20,16,12,0.55)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,236,200,0.10)'; ctx.lineWidth = Math.max(1, 1.2 * S);
  for (var i = 1; i < grid; i++) {
    ctx.beginPath(); ctx.moveTo(x + i * cell, y + 4 * S); ctx.lineTo(x + i * cell, y + side - 4 * S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 4 * S, y + i * cell); ctx.lineTo(x + side - 4 * S, y + i * cell); ctx.stroke();
  }
  var t = performance.now() / 1000;
  ctx.setLineDash([10 * S, 8 * S]); ctx.lineDashOffset = -t * 22;
  ctx.strokeStyle = 'rgba(255,209,102,0.40)'; ctx.lineWidth = Math.max(1.5, 2.4 * S);
  GF.rr(ctx, x - 6 * S, y - 6 * S, side + 12 * S, side + 12 * S, 16 * S); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function carColor(car) {
  var skin = SKINS[0];
  for (var i = 0; i < SKINS.length; i++) if (SKINS[i].id === equippedSkin) { skin = SKINS[i]; break; }
  return skin.bodies[car.id % skin.bodies.length];
}
function shade(hex, amt) {
  var h = hex.replace('#', '');
  if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  var r = parseInt(h.substr(0, 2), 16), g = parseInt(h.substr(2, 2), 16), b = parseInt(h.substr(4, 2), 16);
  r = clamp(Math.round(r + amt), 0, 255); g = clamp(Math.round(g + amt), 0, 255); b = clamp(Math.round(b + amt), 0, 255);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function drawCar(ctx, car) {
  var S = GF.S, cell = board.cell;
  var cx = car.x, cy = car.y;
  var safari = (equippedSkin === 'safari');
  var sx = 0;
  if (car.shakeT > 0) { var ph = car.shakeT / (SHAKE_MS / 1000); sx = Math.sin(performance.now() / 14) * 5 * S * ph; }
  var unit = cell * 0.82;
  var longAxisV = (car.dir === 0 || car.dir === 2);
  var w, h;
  if (car.len === 2) {
    if (longAxisV) { w = unit; h = cell * 1.74; } else { w = cell * 1.74; h = unit; }
  } else { w = unit; h = unit; }
  if (car.len === 1) { if (longAxisV) { h = unit * 1.04; w = unit * 0.84; } else { w = unit * 1.04; h = unit * 0.84; } }

  var sc = car.scale || 1;
  ctx.save();
  ctx.globalAlpha = car.alpha != null ? car.alpha : 1;
  ctx.translate(cx + sx, cy);
  ctx.scale(sc, sc);
  ctx.rotate(car.dir * Math.PI / 2);
  var lw = longAxisV ? w : h;
  var lh = longAxisV ? h : w;

  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  GF.rr(ctx, -lw / 2 + 3 * S, -lh / 2 + 5 * S, lw, lh, lw * 0.28); ctx.fill();

  var body = carColor(car);
  var grad = ctx.createLinearGradient(0, -lh / 2, 0, lh / 2);
  grad.addColorStop(0, shade(body, 28)); grad.addColorStop(1, shade(body, -26));
  ctx.fillStyle = grad;
  GF.rr(ctx, -lw / 2, -lh / 2, lw, lh, lw * 0.28); ctx.fill();
  ctx.strokeStyle = shade(body, -60); ctx.lineWidth = Math.max(1, 1.6 * S);
  GF.rr(ctx, -lw / 2, -lh / 2, lw, lh, lw * 0.28); ctx.stroke();

  // small windshield strip at the FRONT (toward up) for the cute car read.
  if (safari) {
    // critter ears + nose at the front
    ctx.fillStyle = shade(body, -16);
    ctx.beginPath(); ctx.arc(-lw * 0.30, -lh * 0.42, lw * 0.14, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(lw * 0.30, -lh * 0.42, lw * 0.14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = shade(body, -44);
    ctx.beginPath(); ctx.arc(0, -lh * 0.40, lw * 0.08, 0, Math.PI * 2); ctx.fill();
  } else {
    var glass = (equippedSkin === 'neon') ? 'rgba(120,240,255,0.9)' : 'rgba(200,232,255,0.92)';
    ctx.fillStyle = glass;
    GF.rr(ctx, -lw * 0.30, -lh * 0.44, lw * 0.60, lh * 0.18, lw * 0.08); ctx.fill();
    // headlights at the very front corners
    ctx.fillStyle = (equippedSkin === 'neon') ? '#faff66' : '#fff6c8';
    ctx.beginPath(); ctx.arc(-lw * 0.34, -lh * 0.47, lw * 0.075, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(lw * 0.34, -lh * 0.47, lw * 0.075, 0, Math.PI * 2); ctx.fill();
  }

  // ── DIRECTION ARROW — the defining read. A bold filled arrow on a tinted disc,
  // centered on the car, pointing toward the exit (up in local space). High
  // contrast (dark disc + white arrow + dark outline) so it pops on ANY body. ──
  var ar = lw * 0.30;                         // disc radius
  var discY = lh * 0.04;                      // sit just below center (windshield owns the top)
  ctx.beginPath(); ctx.arc(0, discY, ar, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(20,16,14,0.42)'; ctx.fill();
  // arrow (points up): shaft + head, filled white with a dark edge
  var aTip = discY - ar * 0.74, aBase = discY + ar * 0.70, hw = ar * 0.62;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, aTip);                         // tip
  ctx.lineTo(hw, aTip + hw * 1.05);            // right barb
  ctx.lineTo(hw * 0.42, aTip + hw * 1.05);
  ctx.lineTo(hw * 0.42, aBase);                // shaft right
  ctx.lineTo(-hw * 0.42, aBase);               // shaft left
  ctx.lineTo(-hw * 0.42, aTip + hw * 1.05);
  ctx.lineTo(-hw, aTip + hw * 1.05);           // left barb
  ctx.closePath();
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = 'rgba(30,22,18,0.85)'; ctx.lineWidth = Math.max(1.2, 1.8 * S);
  ctx.fill(); ctx.stroke();

  if (car.frost > 0) {
    ctx.globalAlpha = (car.alpha != null ? car.alpha : 1) * 0.82;
    ctx.fillStyle = 'rgba(200,235,255,0.6)';
    GF.rr(ctx, -lw / 2, -lh / 2, lw, lh, lw * 0.28); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = Math.max(1, 1.4 * S);
    ctx.beginPath();
    ctx.moveTo(-lw * 0.1, -lh * 0.4); ctx.lineTo(0, -lh * 0.05); ctx.lineTo(-lw * 0.18, lh * 0.2);
    ctx.moveTo(0, -lh * 0.05); ctx.lineTo(lw * 0.22, lh * 0.05);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

// Self-contained mini car for the collection lot grid (not board-bound).
// model=null draws a locked silhouette. `face` (0..3) lets the lot face cars in
// different ways so a returning player's lot reads as a real, varied parking lot.
function drawCollectionCar(ctx, cx, cy, size, model, face) {
  var S = GF.S;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate((face || 0) * Math.PI / 2);
  var w = size * 0.78, h = size * 0.92;
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.30)';
  GF.rr(ctx, -w / 2 + 2 * S, -h / 2 + 3 * S, w, h, w * 0.28); ctx.fill();
  if (!model) {
    // locked silhouette
    ctx.fillStyle = 'rgba(255,255,255,0.10)';
    GF.rr(ctx, -w / 2, -h / 2, w, h, w * 0.28); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1.4 * S;
    GF.rr(ctx, -w / 2, -h / 2, w, h, w * 0.28); ctx.stroke();
    ctx.rotate(-(face || 0) * Math.PI / 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + (size * 0.5) + 'px Inter, sans-serif';
    ctx.fillText('?', 0, 0); ctx.textBaseline = 'alphabetic';
    ctx.restore(); return;
  }
  var grad = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
  grad.addColorStop(0, shade(model.body, 28)); grad.addColorStop(1, shade(model.body, -26));
  ctx.fillStyle = grad;
  GF.rr(ctx, -w / 2, -h / 2, w, h, w * 0.28); ctx.fill();
  ctx.strokeStyle = shade(model.body, -60); ctx.lineWidth = Math.max(1, 1.6 * S);
  GF.rr(ctx, -w / 2, -h / 2, w, h, w * 0.28); ctx.stroke();
  // windshield / roof strip at the front
  ctx.fillStyle = model.roof;
  GF.rr(ctx, -w * 0.30, -h * 0.42, w * 0.60, h * 0.30, w * 0.08); ctx.fill();
  // headlights
  ctx.fillStyle = '#fff6c8';
  ctx.beginPath(); ctx.arc(-w * 0.32, -h * 0.46, w * 0.07, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(w * 0.32, -h * 0.46, w * 0.07, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// Brief "new car!" discovery toast (any state) — vector car + name on a pill.
function drawCollToast(ctx) {
  if (!collToast) return;
  var S = GF.S, W = GF.W;
  var m = modelById(collToast.modelId); if (!m) return;

function drawHintRing(ctx, car) {

// ── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD(ctx) {

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

}

function drawBottomBar(ctx) {

  ctx.fillStyle = 'rgba(16,12,9,0.55)'; ctx.fillRect(0, barY, W, HUD_BOT);

function bigButton(ctx, x, y, w, h, label, col, enabled, cost, pulse, icon, fn) {
  var S = GF.S;

  ctx.globalAlpha = enabled ? 1 : 0.4;

  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1.4 * S;

    ctx.fillText('' + cost, chipX + 16 * S, y + h * 0.5);

  ctx.restore();

}

// ── ICONS (vector — never emoji) ────────────────────────────────────────────
function drawCoinIcon(ctx, x, y, r) {
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = '#ffd166'; ctx.fill();
  ctx.strokeStyle = '#c79320'; ctx.lineWidth = Math.max(1, r * 0.18); ctx.stroke();
  ctx.fillStyle = '#c79320'; ctx.font = 'bold ' + (r * 1.3) + 'px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('$', x, y + r * 0.08);
  ctx.textBaseline = 'alphabetic'; ctx.restore();
}
function drawStarIcon(ctx, x, y, r, filled) {
  ctx.save(); ctx.translate(x, y); ctx.beginPath();
  for (var i = 0; i < 5; i++) {
    var a = -Math.PI / 2 + i * 2 * Math.PI / 5;
    ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    var a2 = a + Math.PI / 5;
    ctx.lineTo(Math.cos(a2) * r * 0.45, Math.sin(a2) * r * 0.45);
  }
  ctx.closePath();
  ctx.fillStyle = filled ? '#ffd24d' : 'rgba(255,255,255,0.18)';
  ctx.fill();
  if (filled) { ctx.strokeStyle = '#e0a93a'; ctx.lineWidth = Math.max(1, r * 0.12); ctx.stroke(); }
  ctx.restore();
}
function drawStarTargets(ctx, x, y, r) {
  var gap = r * 2.6;
  for (var i = 0; i < 3; i++) drawStarIcon(ctx, x + (i - 1) * gap, y, r, false);
}
function drawUndoIcon(ctx, r) {
  ctx.save(); ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(1.6, r * 0.28); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.arc(0, 0, r, Math.PI * 0.5, Math.PI * 1.9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-r * 0.1, -r); ctx.lineTo(0, -r * 0.5); ctx.lineTo(r * 0.5, -r * 0.7); ctx.stroke();
  ctx.restore();
}
function drawBulbIcon(ctx, r) {
  ctx.save();
  ctx.fillStyle = '#fff3b0';
  ctx.beginPath(); ctx.arc(0, -r * 0.2, r * 0.7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#d8c060'; ctx.fillRect(-r * 0.35, r * 0.4, r * 0.7, r * 0.4);
  ctx.strokeStyle = '#bda94e'; ctx.lineWidth = Math.max(1, r * 0.12);
  ctx.beginPath(); ctx.moveTo(-r * 0.3, r * 0.62); ctx.lineTo(r * 0.3, r * 0.62); ctx.stroke();
  ctx.restore();
}
function drawHelpIcon(ctx, cx, cy, r) {
  ctx.save(); ctx.fillStyle = 'rgba(255,255,255,0.14)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (r * 1.3) + 'px Inter, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

}
function drawPauseIcon(ctx, cx, cy, r) {

}
function pushBtn(x, y, w, h, fn, icon, ctx) {

// ── LEVEL-CLEAR OVERLAY ─────────────────────────────────────────────────────
function drawLevelClear(ctx) {

    var ease = pop < 1 ? 1 + (1 - pop) * 0.6 : 1;

  }

// ── COLLECTION ("My Lot") — the owned, persistent meta screen (M1) ──────────
var collScroll = null, collReturn = 'hub';
function openCollection(from) {

  if (!collScroll) collScroll = GF.makeScroll('coll', { x: 0, y: 0, w: 10, h: 10 });
}
function closeCollection() {

}
function drawCollection(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(8,6,5,0.96)'; ctx.fillRect(0, 0, W, H);     // OPAQUE overlay (hygiene)
  var have = collectedCount(), total = CAR_MODELS.length;
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.font = 'bold ' + clamp(26 * S, 20, 38) + 'px Inter, sans-serif';
  ctx.fillText(GF.t('mylot'), W / 2, clamp(42 * S, 34, 64));
  ctx.fillStyle = '#ffe9c8'; ctx.font = 'bold ' + clamp(15 * S, 12, 20) + 'px Inter, sans-serif';
  ctx.fillText(GF.t('collected') + ' ' + have + ' / ' + total + '   ·   +' + lotBonus() + ' ' + GF.t('lotbonus') + GF.t('perclear'), W / 2, clamp(68 * S, 56, 96));

  // next-milestone reward bar (the session-end "reason to return" hook surfaced)
  var nm = nextMilestone();
  var barY = clamp(86 * S, 74, 120), barH = clamp(14 * S, 10, 20);
  var barW = clamp(280 * S, 220, 420), barX = W / 2 - barW / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.10)'; GF.rr(ctx, barX, barY, barW, barH, barH / 2); ctx.fill();
  if (nm) {
    var prevNeed = collectMs > 0 ? LOT_MILESTONES[collectMs - 1].need : 0;
    var frac = clamp((have - prevNeed) / Math.max(1, nm.need - prevNeed), 0, 1);
    var fg = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    fg.addColorStop(0, '#ffd166'); fg.addColorStop(1, '#ff9f43');
    ctx.fillStyle = fg; GF.rr(ctx, barX, barY, Math.max(barH, barW * frac), barH, barH / 2); ctx.fill();
    ctx.fillStyle = '#bcd'; ctx.font = clamp(12 * S, 10, 16) + 'px Inter, sans-serif'; ctx.textAlign = 'center';
    var togo = Math.max(0, nm.need - have);
    ctx.fillText(GF.t('nextreward') + ': +' + nm.reward + '  ·  ' + togo + ' ' + GF.t('cars_to_go'), W / 2, barY + barH + clamp(15 * S, 12, 20));
  } else {
    ctx.fillStyle = '#2ee07a'; GF.rr(ctx, barX, barY, barW, barH, barH / 2); ctx.fill();
  }

  var topY = clamp(118 * S, 100, 156);
  var backH = clamp(50 * S, 42, 64);
  var botY = H - backH - 14 * S;
  var vpX = 14 * S, vpW = W - 28 * S, vpY = topY, vpH = botY - topY - 10 * S;
  collScroll.setViewport({ x: vpX, y: vpY, w: vpW, h: vpH });

  // responsive grid of model cards
  var cols = vpW < 360 * S ? 3 : 4;
  var cellW = vpW / cols, cellH = cellW * 1.12;
  var rows = Math.ceil(CAR_MODELS.length / cols);
  collScroll.setContentHeight(rows * cellH);
  collScroll.update();
  collScroll.begin(ctx);
  for (var i = 0; i < CAR_MODELS.length; i++) {
    var col = i % cols, row = Math.floor(i / cols);
    var cardX = vpX + col * cellW, cardY = row * cellH;
    drawModelCard(ctx, cardX, cardY, cellW, cellH, CAR_MODELS[i], i);
  }
  collScroll.end(ctx);
  collScroll.draw(ctx);

  var bw = clamp(220 * S, 170, 320), bx = W / 2 - bw / 2;
  overlayButton(ctx, bx, botY, bw, backH, GF.t('back'), '#5a4a8a', closeCollection);
}
function drawModelCard(ctx, x, yContent, w, h, model, idx) {
  var S = GF.S, pad = 6 * S;
  var screenY = yContent - collScroll.offset + collScroll.vp.y;
  var owned = !!ownedCars[model.id];
  ctx.save();
  ctx.fillStyle = owned ? 'rgba(46,224,122,0.10)' : 'rgba(255,255,255,0.04)';
  GF.rr(ctx, x + pad, screenY + pad, w - pad * 2, h - pad * 2, 12 * S); ctx.fill();
  ctx.strokeStyle = owned ? 'rgba(46,224,122,0.45)' : 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1.4 * S;
  GF.rr(ctx, x + pad, screenY + pad, w - pad * 2, h - pad * 2, 12 * S); ctx.stroke();
  var carSize = Math.min(w, h) * 0.46;
  drawCollectionCar(ctx, x + w / 2, screenY + h * 0.40, carSize, owned ? model : null, idx % 4);
  if (owned) {
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + clamp(11 * S, 9, 15) + 'px Inter, sans-serif';
    ctx.fillText(GF.t('cm_' + model.id), x + w / 2, screenY + h * 0.74);
    ctx.fillStyle = RAR_COL[model.rar]; ctx.font = clamp(9 * S, 8, 13) + 'px Inter, sans-serif';
    ctx.fillText(GF.t('rarity_' + ['common', 'rare', 'epic'][model.rar]), x + w / 2, screenY + h * 0.86);
  } else {
    ctx.fillStyle = '#7a8290'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = clamp(10 * S, 8, 14) + 'px Inter, sans-serif';
    ctx.fillText(GF.t('locked'), x + w / 2, screenY + h * 0.80);
  }
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ── GARAGE (skins, scrollable) ──────────────────────────────────────────────
var garageScroll = null, garageReturn = 'hub';
function openGarage(from) {
  GF.sfx('click'); garageReturn = from || 'hub'; gs = 'GARAGE';
  if (!garageScroll) garageScroll = GF.makeScroll('garage', { x: 0, y: 0, w: 10, h: 10 });
}
function closeGarage() {
  GF.sfx('click');
  gs = (garageReturn === 'levelclear') ? 'LEVELCLEAR' : 'HUB';
}
function drawGarage(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(8,6,5,0.96)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.font = 'bold ' + clamp(28 * S, 22, 40) + 'px Inter, sans-serif';
  ctx.fillText(GF.t('garage'), W / 2, clamp(46 * S, 36, 70));
  drawCoinIcon(ctx, W / 2 + 30 * S, clamp(78 * S, 60, 110), 9 * S);
  ctx.fillStyle = '#ffd166'; ctx.textAlign = 'left'; ctx.font = 'bold ' + clamp(18 * S, 14, 24) + 'px Inter, sans-serif';
  ctx.fillText('' + coins, W / 2 + 42 * S, clamp(78 * S, 60, 110)); ctx.textAlign = 'center';

  var topY = clamp(100 * S, 84, 140);
  var backH = clamp(50 * S, 42, 64);
  var botY = H - backH - 14 * S;
  var vpY = topY, vpH = botY - topY - 10 * S;
  var vpX = 14 * S, vpW = W - 28 * S;
  garageScroll.setViewport({ x: vpX, y: vpY, w: vpW, h: vpH });

  var cardH = clamp(86 * S, 70, 120), cardGap = 12 * S;
  garageScroll.setContentHeight(SKINS.length * (cardH + cardGap));
  garageScroll.update();

  garageScroll.begin(ctx);
  for (var i = 0; i < SKINS.length; i++) {
    var cy = i * (cardH + cardGap);
    drawSkinCard(ctx, vpX, cy, vpW, cardH, SKINS[i]);
  }
  garageScroll.end(ctx);
  garageScroll.draw(ctx);

  var bw = clamp(220 * S, 170, 320), bx = W / 2 - bw / 2;
  overlayButton(ctx, bx, botY, bw, backH, GF.t('back'), '#5a4a8a', closeGarage);
}
function drawSkinCard(ctx, x, yContent, w, h, skin) {
  var S = GF.S;
  var screenY = yContent - garageScroll.offset + garageScroll.vp.y;
  ctx.save();
  ctx.fillStyle = (equippedSkin === skin.id) ? 'rgba(46,224,122,0.12)' : 'rgba(255,255,255,0.05)';
  GF.rr(ctx, x, screenY, w, h, 14 * S); ctx.fill();
  ctx.strokeStyle = (equippedSkin === skin.id) ? '#2ee07a' : 'rgba(255,255,255,0.14)'; ctx.lineWidth = 1.6 * S;
  GF.rr(ctx, x, screenY, w, h, 14 * S); ctx.stroke();
  var sw = h * 0.7, sx = x + 12 * S, sy = screenY + (h - sw) / 2;
  for (var k = 0; k < 3; k++) {
    var bodyCol = skin.bodies[k % skin.bodies.length];
    var cc = sx + k * (sw * 0.42);
    ctx.fillStyle = shade(bodyCol, -10);
    GF.rr(ctx, cc, sy + sw * 0.1, sw * 0.36, sw * 0.78, sw * 0.14); ctx.fill();
    ctx.fillStyle = 'rgba(190,225,255,0.85)';
    GF.rr(ctx, cc + sw * 0.05, sy + sw * 0.16, sw * 0.26, sw * 0.22, sw * 0.05); ctx.fill();
  }
  ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + clamp(17 * S, 13, 23) + 'px Inter, sans-serif';
  var nameX = sx + sw + 18 * S;
  ctx.fillText(GF.t('skin_' + skin.id), nameX, screenY + h * 0.38);
  var btnW = clamp(96 * S, 78, 130), btnH = clamp(38 * S, 32, 50);
  var btnX = x + w - btnW - 12 * S, btnY = screenY + (h - btnH) / 2;
  var label, col;
  if (equippedSkin === skin.id) { label = GF.t('equip'); col = '#2a8a4a'; }
  else if (ownedSkins[skin.id]) { label = GF.t('equipBtn'); col = '#2a6a8a'; }
  else { label = GF.t('buy'); col = (coins >= skin.price) ? '#c98a2a' : '#555'; }
  if (!ownedSkins[skin.id]) {
    drawCoinIcon(ctx, nameX + 8 * S, screenY + h * 0.66, 7 * S);
    ctx.fillStyle = '#ffd166'; ctx.font = 'bold ' + clamp(14 * S, 11, 18) + 'px Inter, sans-serif';
    ctx.fillText('' + skin.price, nameX + 18 * S, screenY + h * 0.66);
  } else {
    ctx.fillStyle = '#8a9'; ctx.font = clamp(13 * S, 10, 17) + 'px Inter, sans-serif';
    ctx.fillText(GF.t('owned'), nameX, screenY + h * 0.66);
  }
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
  if (screenY + h > garageScroll.vp.y && screenY < garageScroll.vp.y + garageScroll.vp.h) {
    overlayButtonGarage(ctx, btnX, btnY, btnW, btnH, label, col, skin);
  }
}
function overlayButtonGarage(ctx, x, y, w, h, label, col, skin) {
  var S = GF.S;
  ctx.save();
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, shade(col, 26)); grad.addColorStop(1, shade(col, -22));
  ctx.fillStyle = grad; GF.rr(ctx, x, y, w, h, h * 0.3); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + clamp(13 * S, 11, 17) + 'px Inter, sans-serif';
  ctx.fillText(label, x + w / 2, y + h / 2); ctx.textBaseline = 'alphabetic';
  ctx.restore();
  btns.push({ x: x, y: y, w: w, h: h, fn: function () { if (equippedSkin === skin.id) { GF.sfx('click'); } else buyOrEquip(skin); } });
}

// ── TUTORIAL (interactive coach, action-gated) ──────────────────────────────
function startTutorial() {
  GF.tutorial.start([
    { text: GF.t('coach1'), target: function () { return freeableTargetRect(); }, gesture: 'tap', advance: 'manual' },
    { text: GF.t('coach2'), target: function () { return freeableTargetRect(); }, gesture: 'tap', advance: 'manual' },
    { text: GF.t('coach3'), advance: 'auto', after: 2600, onAdvance: function () { tutorialDone = true; GF.funnel.mark('tutorial_done'); saveAll(); } },
  ], { storageKey: 'arrow_out_tut_v1' });
  if (!GF.tutorial.active) { tutorialDone = true; GF.funnel.mark('tutorial_done'); }
}
function freeableTargetRect() {
  for (var i = 0; i < cars.length; i++) {
    var car = cars[i];
    if (car.frost === 0 && laneClear(car)) return { x: car.x, y: car.y, r: board.cell * 0.45 };
  }
  return { x: board.x + board.cell * grid / 2, y: board.y + board.cell * grid / 2, r: board.cell * 0.45 };
}

// ── SCREENSHOT / TEST SEAMS ─────────────────────────────────────────────────
window._setupForScreenshot = function (lv) {
  tutorialDone = true;
  try { localStorage.setItem('arrow_out_tut_v1', '1'); } catch (e) {}
  GF.tutorial.active = false;
  var L = (lv && lv > 0) ? lv : 6;
  coins = 180 + L * 12;
  startLevel(L, {});
  var toClear = Math.min(2, Math.max(0, cars.length - 4));
  for (var i = 0; i < toClear; i++) {
    for (var j = 0; j < cars.length; j++) {
      var car = cars[j];
      if (car.frost === 0 && laneClear(car)) {
        var cl = cellsOf(car); for (var k = 0; k < cl.length; k++) delete occ[cl[k].r + ',' + cl[k].c];
        cars.splice(j, 1); moves++; break;
      }
    }
  }
  carsLeft = cars.length; rebuildOcc(); layout();
  gs = 'PLAYING';
};
window._jumpLevel = function (n) { tutorialDone = true; try { localStorage.setItem('arrow_out_tut_v1', '1'); } catch (e) {} GF.tutorial.active = false; startLevel(n && n > 0 ? n : 6, {}); };
window._setLang = function (l) { GF.lang = (l === 'ru' ? 'ru' : 'en'); };
window._setState = function (s) {
  if (s === 'PLAYING') { gs = 'PLAYING'; }
  else if (s === 'LEVELCLEAR' || s === 'GAMEOVER' || s === 'WIN') { gs = 'LEVELCLEAR'; stars = 2; clearCoinsGained = 18; clearAnimT = 2; }
  else if (s === 'HUB' || s === 'MENU' || s === 'PAUSE') { gs = 'HUB'; }
  else if (s === 'GARAGE') { openGarage('hub'); }
  else if (s === 'COLLECTION') { openCollection('hub'); }
};
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return 'Inter, system-ui, sans-serif'; };

// ── BOOT ────────────────────────────────────────────────────────────────────
GF.init({
  designW: 700,
  designH: 980,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'arrow_out',
  onReady: function () {
    try { best = parseInt(localStorage.getItem('arrow_out_best') || '0') || 0; } catch (e) {}

    // Yandex 1.9 — persist full run state across reload
    GF.persist('arrow_out_run_v2',
      function () {
        return {
          level: level, coins: coins, best: best, score: score,
          equippedSkin: equippedSkin, ownedSkins: ownedSkins, lastDaily: lastDaily,
          tutorialDone: tutorialDone,
          ownedCars: ownedCars, collectMs: collectMs, lastSessionDay: lastSessionDay,
        };
      },
      function (s) {
        if (!s) return;
        level = s.level || 1; coins = s.coins || 0; best = s.best || 0; score = s.score || 0;
        equippedSkin = s.equippedSkin || 'pastel';
        ownedSkins = s.ownedSkins || { pastel: true }; ownedSkins.pastel = true;
        lastDaily = s.lastDaily || '';
        tutorialDone = !!s.tutorialDone;
        ownedCars = s.ownedCars || {};
        collectMs = s.collectMs || 0;
        lastSessionDay = s.lastSessionDay || '';
      }
    );
    // SESSION-END HOOK: a returning player (new calendar day) is GUARANTEED a
    // fresh discovery on their first clear back, so the lot visibly grows the
    // moment they return; same-day continues normally.
    var today = dailyKey();
    sessionFirstClear = (lastSessionDay !== today);
    lastSessionDay = today;
    try { if (best > 0) localStorage.setItem('arrow_out_best', best); } catch (e) {}

    GF.bgMusic({ file: 'audio/bg_track.mp3', preset: 'calm', muted: GF.muted });

    GF.remoteConfig('arrow_out', CFG, {
      clamps: { 'tuning.coin_mult': [0.5, 3], 'tuning.hint_cost': [1, 30] },
      onUpdate: function (c) { CFG = c; },
    }).then(function (c) { CFG = c; });

    // reachability hooks
    GF.exposeReach(function () {
      var S = GF.S;
      if (gs === 'GARAGE' && garageScroll) {
        var items = [];
        var cardH = clamp(86 * S, 70, 120), cardGap = 12 * S;
        var btnW = clamp(96 * S, 78, 130), btnH = clamp(38 * S, 32, 50);
        var vpW = GF.W - 28 * S;
        for (var i = 0; i < SKINS.length; i++) {
          var cy = i * (cardH + cardGap);
          items.push({ id: 'skin_' + SKINS[i].id, x: 14 * S + vpW - btnW - 12 * S, y: cy + (cardH - btnH) / 2, w: btnW, h: btnH });
        }
        var backH = clamp(50 * S, 42, 64);
        items.push({ id: 'back', x: GF.W / 2 - clamp(220 * S, 170, 320) / 2, y: GF.H - backH - 14 * S, w: clamp(220 * S, 170, 320), h: backH, pinned: true });
        return { screen: 'garage', items: items, scrollId: 'garage', viewportH: garageScroll.vp.h, screenH: GF.H };
      }
      var its = [];
      for (var b = 0; b < btns.length; b++) its.push({ id: 'b' + b, x: btns[b].x, y: btns[b].y, w: btns[b].w, h: btns[b].h });
      return { screen: gs.toLowerCase(), items: its, viewportH: GF.H, screenH: GF.H };
    });
    GF.exposeTour([
      { name: 'playing', go: function () { gs = 'PLAYING'; } },
      { name: 'hub', go: function () { gs = 'HUB'; } },
      { name: 'garage', go: function () { openGarage('hub'); } },
      { name: 'collection', go: function () { openCollection('hub'); } },
      { name: 'levelclear', go: function () { window._setState('LEVELCLEAR'); } },
    ]);
    GF.exposeState(function () { return { gs: gs, score: score, level: level, moves: moves, stars: stars, carsLeft: carsLeft, coins: coins, collected: collectedCount(), lotBonus: lotBonus() }; });
    GF.exposeBot(
      function () { return (gs === 'PLAYING' && cars.length) ? ['clear'] : []; },
      function () {
        for (var i = 0; i < cars.length; i++) {
          var car = cars[i];
          if (car.frost > 0) { tapCar(car); return; }
          if (laneClear(car)) { tapCar(car); return; }
        }
        doUndo();
      }
    );

    startLevel(tutorialDone ? Math.max(1, level) : 1, {});
    if (!tutorialDone) startTutorial();

    if (window.__GF_AUTOSTART && !window._silent) { gs = 'PLAYING'; }
  },
  onUpdate: update,
  onDraw: draw,
});

// route presses through onPress
(function () {
  GF.canvas.addEventListener('pointerdown', function (e) { onPress(e.clientX, e.clientY); }, { passive: true });
})();

// ── YANDEX MUST-HAVES (kept) ─────────────────────────────────────────────────
// 1. All UI text via GF.t()/STRINGS (en+ru). 2. GF.persist + GF.saveRun on every
// mutation. 3. Fullscreen-exit resize via gf-lib (not overridden). 4. Ads on user
// click only: interstitial fires on NEXT (onNext), rewarded on the bonus button
// (watchBonus). Never auto.

})();
</script>
