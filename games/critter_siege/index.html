    e_flyer: 'Летун', e_shielded: 'Щитовик', e_swarm: 'Рой', e_boss: 'Матка',
    newunit: 'Новый защитник', newfoe: 'Новая зверушка',
    embers: 'Угли', workshop: 'КУЗНЯ ОЧАГА', upgrade: 'УЛУЧШИТЬ',

    u_vigor: 'Сила очага', u_vigor_d: '+1 сердце в начале',
    u_wellspring: 'Источник сока', u_wellspring_d: '+15 сока, +1 к восполнению',
    u_fangs: 'Острые клыки', u_fangs_d: '+12% к урону защитников',
    u_claws: 'Быстрые когти', u_claws_d: '+8% к скорости стрельбы',
    u_harvest: 'Сбор углей', u_harvest_d: '+20% к добыче углей',
  },
};

var SPRITE_NAMES = ['zapper','bramble','splash','frost','saptap','howitzer',
  'crawler','runner','tank','flyer','shielded','swarmling','boss','hearth'];

// ── TUNABLES (DESIGN.md — every name here is exposed via __gfState) ──────────
var START_LIVES     = 5;
var SAP_START       = 60;
var SAP_REGEN       = 6;     // per second
var SAP_MAX         = 220;
var WAVE_COUNT      = 15;
var SPAWN_INTERVAL  = 1.30;  // base seconds between spawns at wave 1
var BREATHER_SEC    = 4.0;
var LANES           = 5;
var BOSS_EVERY      = 5;

var LANE_HIT_RADIUS = 26;
var CELL_ROWS       = 6;     // placement rows per lane (top kept clear for spawns)
var PROJECTILE_R    = 6;
var HEARTH_Y_FRAC   = 0.90;
var MAX_ENEMIES     = 40;
var MAX_PROJECTILES = 120;

// ── DEFENDER DEFINITIONS ────────────────────────────────────────────────────
var DEFS = {
  zapper:   { key:'d_zapper',   kind:'shooter', cost:10, rate:0.65, dmg:6,  range:99, color:'#5ad6ff', shot:'#bff0ff' },
  bramble:  { key:'d_bramble',  kind:'wall',    cost:12, hp:60,  thorn:2,            color:'#6bbf4a' },
  frost:    { key:'d_frost',    kind:'frost',   cost:22, rate:0.9, dmg:3,  range:99, slow:0.45, slowDur:1.6, color:'#7fd0ff', shot:'#dff4ff' },
  splash:   { key:'d_splash',   kind:'splash',  cost:28, rate:1.0, dmg:7,  range:99, splashR:0.7, color:'#ff9a4d', shot:'#ffd28a' },
  saptap:   { key:'d_saptap',   kind:'gen',     cost:18, hp:40,  genAmt:3, genRate:2.2, color:'#ffcf4a' },
  howitzer: { key:'d_howitzer', kind:'heavy',   cost:55, rate:1.6, dmg:26, range:99, pierce:3, color:'#c77dff', shot:'#efd6ff' },
};
var DEF_ORDER = ['zapper','bramble','frost','splash','saptap','howitzer'];

// Unlock schedule: wave at which each defender becomes available in the tray.
var DEF_UNLOCK_WAVE = { zapper:1, bramble:2, frost:3, splash:5, saptap:7, howitzer:11 };

// ── HEARTH WORKSHOP (M1 persistent owned meta) ──────────────────────────────
// Embers are minted from kills + wave clears and banked at run-end. They buy
// permanent upgrades, each OWNED across sessions and expressed in the game's own
// combat fabric (lives / SAP / defender damage / fire-rate). Order = tree order.
var UPGRADES = [
  { id:'vigor',      key:'u_vigor',      dkey:'u_vigor_d',      max:3, base:14, step:14, color:'#ff5a6e' },
  { id:'wellspring', key:'u_wellspring', dkey:'u_wellspring_d', max:4, base:12, step:12, color:'#ffd24a' },
  { id:'fangs',      key:'u_fangs',      dkey:'u_fangs_d',      max:5, base:10, step:9,  color:'#5ad6ff' },
  { id:'claws',      key:'u_claws',      dkey:'u_claws_d',      max:5, base:12, step:10, color:'#c77dff' },
  { id:'harvest',    key:'u_harvest',    dkey:'u_harvest_d',    max:4, base:16, step:16, color:'#ff9a4d' },
];
function upgById(id) { for (var i = 0; i < UPGRADES.length; i++) if (UPGRADES[i].id === id) return UPGRADES[i]; return null; }
function upgLevel(id) { return metaUpg[id] || 0; }
function upgCost(u) { var lv = upgLevel(u.id); return (lv >= u.max) ? -1 : u.base + u.step * lv; }
// Derived multipliers applied at run start / per defender.
function bonusLives()  { return upgLevel('vigor'); }
function bonusSapStart(){ return upgLevel('wellspring') * 15; }
function bonusSapRegen(){ return upgLevel('wellspring'); }
function dmgMult()     { return 1 + upgLevel('fangs') * 0.12; }
function rateMult()    { return 1 - upgLevel('claws') * 0.08; }   // lower cd = faster
function emberMult()   { return 1 + upgLevel('harvest') * 0.20; }

// ── ENEMY DEFINITIONS ───────────────────────────────────────────────────────
var ENS = {
  crawler:   { key:'e_crawler',  hp:12, spd:34, life:1, r:22, color:'#8ad17a', reward:3 },
  runner:    { key:'e_runner',   hp:9,  spd:64, life:1, r:18, color:'#f2d24a', reward:3 },
  tank:      { key:'e_tank',     hp:60, spd:24, life:1, r:30, color:'#b0794a', reward:8 },
  flyer:     { key:'e_flyer',    hp:16, spd:46, life:1, r:20, color:'#c98ff0', flying:true, reward:5 },
  shielded:  { key:'e_shielded', hp:22, shield:18, spd:30, life:1, r:24, color:'#7fa0c0', reward:6 },
  swarmling: { key:'e_swarm',    hp:5,  spd:50, life:1, r:14, color:'#e07a7a', reward:2 },
  boss:      { key:'e_boss',     hp:360, spd:18, life:2, r:40, color:'#d94a6a', boss:true, reward:40 },
};
// Enemy debut: first wave this type can appear in normal spawns.
var ENEMY_DEBUT = { crawler:1, runner:2, tank:4, flyer:6, shielded:8, swarmling:9 };

// ── GAME STATE ──────────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | PLAYING | GAMEOVER | WON | WORKSHOP
var wave = 1, lives = START_LIVES, sap = SAP_START, score = 0, kills = 0;
var bestWave = 0;
var embers = 0;             // banked meta currency (persistent)
var metaUpg = {};           // { upgradeId: level } (persistent)
var runEmbers = 0;          // Embers earned in the CURRENT run (banked on end)
var lastBanked = 0;         // Embers banked by the most recent run (for end screen)
var workshopFrom = 'MENU';  // where the workshop was opened from (return target)
var endless = false;
var breather = false, breatherT = 0;
var spawnTimer = 0, toSpawn = [], aliveThisWave = 0, waveTotal = 0;
var sel = 'zapper';         // currently selected defender key
var firstRunGuide = false;  // wave-1 guided hint

var enemies = [];           // active enemy objects
var defenders = [];         // active defenders (one per occupied cell)
var projectiles = [];       // active projectiles (pooled)
var grid = [];              // grid[lane][row] = defender ref or null

// pools
var enemyPool = [], projPool = [];

// layout (computed each frame)
var playX = 0, playY = 0, playW = 0, playH = 0;  // play area rect (above tray)
var laneW = 0, cellH = 0, topClear = 0, hearthY = 0, trayY = 0, trayH = 0;
var hearthPulse = 0;

// ── PERSISTENCE ─────────────────────────────────────────────────────────────
function loadBest() { try { bestWave = parseInt(localStorage.getItem('critter_siege_best') || '0') || 0; } catch (e) {} }
function saveBest() { try { localStorage.setItem('critter_siege_best', String(bestWave)); } catch (e) {} }

// Hearth Workshop meta save schema (embers + per-upgrade levels).
function loadMeta() {
  try {
    var raw = localStorage.getItem('critter_siege_meta_v1');
    if (raw) {
      var s = JSON.parse(raw);
      embers = Math.max(0, (s && s.embers) | 0);
      metaUpg = (s && s.upg) ? s.upg : {};
    }
  } catch (e) { embers = 0; metaUpg = {}; }
  // clamp loaded levels to current caps (forward-compat)
  for (var i = 0; i < UPGRADES.length; i++) {
    var u = UPGRADES[i];
    if (metaUpg[u.id]) metaUpg[u.id] = GF.clamp(metaUpg[u.id] | 0, 0, u.max);
  }
}
function saveMeta() {
  try { localStorage.setItem('critter_siege_meta_v1', JSON.stringify({ embers: embers | 0, upg: metaUpg })); } catch (e) {}
}
// Cheapest upgrade the player can still buy that they cannot yet afford or just afforded —
// drives the "Next upgrade: X (M more)" return hook on the end screen.
function nextUpgradeHint() {
  var best = null, bestCost = 1e9;
  for (var i = 0; i < UPGRADES.length; i++) {
    var u = UPGRADES[i]; var c = upgCost(u);
    if (c < 0) continue;                       // maxed
    if (c < bestCost) { bestCost = c; best = u; }
  }
  return best ? { u: best, cost: bestCost } : null;
}

// ── LAYOUT ──────────────────────────────────────────────────────────────────
function computeLayout() {
  var W = GF.W, H = GF.H;
  trayH = GF.clamp(H * 0.13, 78, 132);
  trayY = H - trayH;
  var topBar = GF.clamp(H * 0.085, 54, 96);
  playX = 0; playY = topBar; playW = W; playH = trayY - topBar;
  laneW = playW / LANES;
  topClear = playH * 0.06;                 // spawn strip at very top (no placement)
  hearthY = playY + playH * HEARTH_Y_FRAC; // breach line
  var gridTop = playY + topClear;
  cellH = (hearthY - gridTop) / CELL_ROWS;
}
function laneCenterX(lane) { return playX + lane * laneW + laneW / 2; }
function cellCenterY(row) { return playY + topClear + row * cellH + cellH / 2; }
function cellTopY(row) { return playY + topClear + row * cellH; }

// ── POOLING ─────────────────────────────────────────────────────────────────
function getEnemy() { return enemyPool.length ? enemyPool.pop() : {}; }
function freeEnemy(e) { if (enemyPool.length < 80) enemyPool.push(e); }
function getProj() { return projPool.length ? projPool.pop() : {}; }
function freeProj(p) { if (projPool.length < 160) projPool.push(p); }

// ── WAVE BUILDING ───────────────────────────────────────────────────────────
function enemyScale(w) { return Math.pow(1.08, w - 1); }   // hp growth
function spawnGap(w) { return Math.max(0.34, SPAWN_INTERVAL * Math.pow(0.94, w - 1)); }
function isBossWave(w) { return w % BOSS_EVERY === 0; }

// Build the spawn list for a wave: array of {type, lane}.
function buildWave(w) {
  var list = [];
  if (isBossWave(w)) {
    list.push({ type:'boss', lane:2 });
    var escorts = 4 + Math.floor(w / 5) * 3;
    for (var i = 0; i < escorts; i++) {
      var t = pickEnemyType(w, true);
      list.push({ type:t, lane: i % LANES });
    }
  } else {
    var count = 6 + w * 2 + Math.floor(w / 3) * 2;
    if (endless) count += 6;
    for (var j = 0; j < count; j++) {
      var ty = pickEnemyType(w, false);
      var ln = (Math.random() * LANES) | 0;
      if (ty === 'swarmling') {
        var n = 3 + ((Math.random() * 2) | 0);
        for (var k = 0; k < n && list.length < 120; k++) list.push({ type:'swarmling', lane:ln });
      } else {
        list.push({ type:ty, lane:ln });
      }
    }
  }
  // light shuffle so lanes interleave
  for (var s = list.length - 1; s > 0; s--) { var r = (Math.random() * (s + 1)) | 0; var tmp = list[s]; list[s] = list[r]; list[r] = tmp; }
  return list;
}

function pickEnemyType(w, isEscort) {
  var pool = [];
  function add(type, weight) { if (w >= (ENEMY_DEBUT[type] || 99)) for (var i = 0; i < weight; i++) pool.push(type); }
  add('crawler', 5);
  add('runner', w >= 2 ? 4 : 0);
  add('tank', w >= 4 ? 2 : 0);
  add('flyer', w >= 6 ? 3 : 0);
  add('shielded', w >= 8 ? 3 : 0);
  add('swarmling', w >= 9 ? (isEscort ? 1 : 2) : 0);
  if (!pool.length) pool.push('crawler');
  return pool[(Math.random() * pool.length) | 0];
}

function startWave(w) {
  wave = w;
  breather = false;
  toSpawn = buildWave(w);
  waveTotal = toSpawn.length;
  aliveThisWave = toSpawn.length;
  spawnTimer = 0.2;
  GF.sfx('spawn');
}

function spawnOne(spec) {
  if (enemies.length >= MAX_ENEMIES) return;   // hard cap (pooling guards perf)
  var def = ENS[spec.type];
  var e = getEnemy();
  e.type = spec.type; e.lane = spec.lane;
  e.hp = Math.round(def.hp * (def.boss ? Math.pow(1.5, Math.max(0, Math.floor(wave / BOSS_EVERY) - 1)) : enemyScale(wave)));
  e.maxhp = e.hp;
  e.shield = def.shield ? Math.round(def.shield * enemyScale(wave)) : 0;
  e.spd = def.spd * (endless ? 1.15 : 1) * (1 + (wave - 1) * 0.012);
  e.baseSpd = e.spd;
  e.r = def.r;
  e.flying = !!def.flying;
  e.boss = !!def.boss;
  e.life = def.life;
  e.reward = def.reward;
  e.x = laneCenterX(spec.lane);
  e.y = playY + topClear * 0.3;
  e.slowT = 0;
  e.bossDropT = 2.5;
  e.dead = false;
  e.hitFlash = 0;
  enemies.push(e);
}

// ── PLACEMENT ───────────────────────────────────────────────────────────────
function canAfford(key) { return sap >= DEFS[key].cost; }
function defUnlocked(key) { return wave >= (DEF_UNLOCK_WAVE[key] || 99); }
function unlockedList() { return DEF_ORDER.filter(defUnlocked); }

function placeAt(lane, row) {
  if (lane < 0 || lane >= LANES || row < 0 || row >= CELL_ROWS) return false;
  if (grid[lane][row]) return false;
  var d = DEFS[sel];
  if (!d || !defUnlocked(sel) || !canAfford(sel)) {
    if (d && !canAfford(sel)) GF.setShake(0.25);  // can't-afford feedback
    return false;
  }
  sap -= d.cost;
  var def = {
    key: sel, kind: d.kind, lane: lane, row: row,
    x: laneCenterX(lane), y: cellCenterY(row),
    cd: 0, hp: d.hp || 0, maxhp: d.hp || 0, genCd: d.genRate || 0,
    color: d.color, flash: 0, chew: 0,
  };
  defenders.push(def);
  grid[lane][row] = def;
  GF.spawnParticles(def.x, def.y, d.color, 10);
  GF.sfx('tap');
  firstRunGuide = false;
  GF.saveRun();
  return true;
}

function removeDefender(def) {
  grid[def.lane][def.row] = null;
  var i = defenders.indexOf(def);
  if (i >= 0) defenders.splice(i, 1);
}

// ── SHOOTING ────────────────────────────────────────────────────────────────
function fireProjectile(def, target) {
  if (projectiles.length >= MAX_PROJECTILES) return;
  var d = DEFS[def.key];
  var p = getProj();
  p.x = def.x; p.y = def.y - cellH * 0.3;
  p.dmg = d.dmg * dmgMult(); p.lane = def.lane;
  p.color = d.shot || '#fff';
  p.kind = def.kind;
  p.splashR = (d.splashR || 0) * laneW;
  p.slow = d.slow || 0; p.slowDur = d.slowDur || 0;
  p.pierce = d.pierce || 1; p.hits = 0;
  p.r = PROJECTILE_R * (def.kind === 'heavy' ? 1.8 : 1);
  var dx = target.x - p.x, dy = target.y - p.y;
  var dl = Math.max(1, Math.sqrt(dx * dx + dy * dy));
  var sp = (def.kind === 'splash') ? 360 : 520;
  p.vx = dx / dl * sp; p.vy = dy / dl * sp;
  p.dead = false;
  projectiles.push(p);
}

// nearest enemy in a defender's lane that is below the defender (descending)
function targetInLane(lane, fromY) {
  var best = null, bestY = 1e9;
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (e.dead || e.lane !== lane) continue;
    if (e.y < fromY - cellH * 0.1) continue;   // must be ahead (lower on screen)
    if (e.y < bestY) { bestY = e.y; best = e; }
  }
  return best;
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt) {
  GF.tutorial.update(dt);
  computeLayout();
  hearthPulse = Math.max(0, hearthPulse - dt * 2.5);
  if (gs !== 'PLAYING') return;
  if (GF.tutorial.active) return;   // freeze world while tutorial panel up

  sap = Math.min(SAP_MAX, sap + (SAP_REGEN + bonusSapRegen()) * dt);

  if (breather) {
    breatherT -= dt;
    if (breatherT <= 0) {
      var nextW = wave + 1;
      if (nextW > WAVE_COUNT && !endless) { winGame(); return; }
      startWave(nextW);
    }
  } else {
    if (toSpawn.length) {
      spawnTimer -= dt;
      if (spawnTimer <= 0) { spawnOne(toSpawn.shift()); spawnTimer = spawnGap(wave); }
    } else if (aliveThisWave <= 0 && enemies.length === 0) {
      // wave cleared
      bestWave = Math.max(bestWave, endless ? WAVE_COUNT + (wave - WAVE_COUNT) : wave);
      saveBest();
      // wave-clear Ember bonus (bosses pay extra), scaled by Ember Harvest.
      runEmbers += (3 + (isBossWave(wave) ? 6 : 0)) * emberMult();
      if (wave >= WAVE_COUNT && !endless) { winGame(); return; }
      breather = true; breatherT = BREATHER_SEC;
      GF.saveRun();
    }
  }

  updateDefenders(dt);
  updateEnemies(dt);
  updateProjectiles(dt);
}

function updateDefenders(dt) {
  for (var i = 0; i < defenders.length; i++) {
    var def = defenders[i];
    if (def.flash > 0) def.flash -= dt * 4;
    var d = DEFS[def.key];
    if (def.kind === 'gen') {
      def.genCd -= dt;
      if (def.genCd <= 0) {
        def.genCd = d.genRate;
        sap = Math.min(SAP_MAX, sap + d.genAmt);
        GF.spawnFloat(def.x, def.y - cellH * 0.4, '+' + d.genAmt, '#ffd24a');
        def.flash = 1;
      }
      continue;
    }
    if (def.kind === 'wall') continue;  // walls block + thorn (in enemy move)
    def.cd -= dt;
    if (def.cd <= 0) {
      var tgt = targetInLane(def.lane, def.y);
      if (tgt) { def.cd = d.rate * rateMult(); fireProjectile(def, tgt); def.flash = 1; }
    }
  }
}

function updateEnemies(dt) {
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    if (e.dead) { enemies.splice(i, 1); freeEnemy(e); continue; }
    if (e.hitFlash > 0) e.hitFlash -= dt * 6;
    var spd = e.spd;
    if (e.slowT > 0) { e.slowT -= dt; spd = e.spd * 0.55; }
    // wall blocking for non-flyers
    var blocked = false;
    if (!e.flying) {
      var lane = e.lane;
      for (var r = 0; r < CELL_ROWS; r++) {
        var g = grid[lane][r];
        if (g && g.kind === 'wall') {
          var cy = cellCenterY(r);
          if (e.y + e.r >= cy - cellH * 0.35 && e.y < cy + cellH * 0.2) {
            blocked = true;
            g.chew = (g.chew || 0) + dt;
            if (g.chew >= 0.4) {
              g.chew = 0; g.hp -= 6; g.flash = 1;
              dealDamage(e, DEFS[g.key].thorn || 2);
              if (g.hp <= 0) { GF.spawnParticles(g.x, g.y, '#6bbf4a', 14); removeDefender(g); }
            }
            break;
          }
        }
      }
    }
    if (!blocked) e.y += spd * dt;

    if (e.boss && !e.dead) {
      e.bossDropT -= dt;
      if (e.bossDropT <= 0) {
        e.bossDropT = 4.0;
        if (enemies.length < MAX_ENEMIES - 1) {
          for (var s = 0; s < 2; s++) spawnSwarmAt(e.y, (Math.random() * LANES) | 0);
        }
      }
    }

    if (e.y >= hearthY) {
      lives -= e.life;
      hearthPulse = 1;
      GF.setShake(e.boss ? 0.9 : 0.5);
      GF.spawnParticles(e.x, hearthY, '#ff6a4a', 16);
      e.dead = true; aliveThisWave--;
      if (lives <= 0) { lives = 0; gameOver(); return; }
    }
  }
}

function spawnSwarmAt(y, lane) {
  if (enemies.length >= MAX_ENEMIES) return;
  var def = ENS.swarmling;
  var e = getEnemy();
  e.type = 'swarmling'; e.lane = lane;
  e.hp = e.maxhp = Math.round(def.hp * enemyScale(wave));
  e.shield = 0; e.spd = e.baseSpd = def.spd; e.r = def.r;
  e.flying = false; e.boss = false; e.life = def.life; e.reward = def.reward;
  e.x = laneCenterX(lane); e.y = Math.max(playY + topClear, y - cellH);
  e.slowT = 0; e.dead = false; e.hitFlash = 0; e.bossDropT = 9;
  enemies.push(e);
  aliveThisWave++;
  waveTotal++;
}

function dealDamage(e, dmg) {
  if (e.dead) return;
  if (e.shield > 0) { e.shield -= dmg; if (e.shield < 0) { e.hp += e.shield; e.shield = 0; } }
  else e.hp -= dmg;
  e.hitFlash = 1;
  if (e.hp <= 0) killEnemy(e);
}

function killEnemy(e) {
  if (e.dead) return;
  e.dead = true;
  kills++;
  score += e.reward;
  sap = Math.min(SAP_MAX, sap + Math.round(e.reward * 0.5));
  // Embers: minted from each kill (boss pays a chunk), scaled by Ember Harvest.
  runEmbers += (e.boss ? 8 : 1) * emberMult();
  GF.spawnParticles(e.x, e.y, ENS[e.type].color, e.boss ? 26 : 9);
  GF.spawnFloat(e.x, e.y, '+' + Math.round(e.reward * 0.5), '#ffd24a');
  GF.sfx(e.boss ? 'levelup' : 'hit');
  aliveThisWave--;
  if (e.boss) GF.setShake(0.6);
}

function updateProjectiles(dt) {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    if (p.dead) { projectiles.splice(i, 1); freeProj(p); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.y < playY - 30 || p.x < -30 || p.x > GF.W + 30 || p.y > hearthY + 20) { p.dead = true; continue; }
    for (var j = 0; j < enemies.length; j++) {
      var e = enemies[j];
      if (e.dead || e.lane !== p.lane) continue;
      var dx = e.x - p.x, dy = e.y - p.y;
      var rr = e.r + p.r;
      if (dx * dx + dy * dy <= rr * rr) {
        if (p.kind === 'splash' && p.splashR > 0) {
          for (var k = 0; k < enemies.length; k++) {
            var e2 = enemies[k];
            if (e2.dead || e2.lane !== p.lane) continue;
            var ddx = e2.x - p.x, ddy = e2.y - p.y;
            if (ddx * ddx + ddy * ddy <= p.splashR * p.splashR) dealDamage(e2, p.dmg);
          }
          GF.spawnParticles(p.x, p.y, p.color, 8);
          p.dead = true; break;
        }
        dealDamage(e, p.dmg);
        if (p.slow > 0 && !e.dead) e.slowT = p.slowDur;
        GF.spawnParticles(p.x, p.y, p.color, 4);
        p.hits++;
        if (p.hits >= p.pierce) { p.dead = true; break; }
      }
    }
  }
}

// ── LIFECYCLE ───────────────────────────────────────────────────────────────
function newGrid() { grid = []; for (var l = 0; l < LANES; l++) { grid[l] = []; for (var r = 0; r < CELL_ROWS; r++) grid[l][r] = null; } }

function startGame() {
  endless = false;
  wave = 1; lives = START_LIVES + bonusLives(); sap = SAP_START + bonusSapStart(); score = 0; kills = 0;
  runEmbers = 0;
  enemies.length = 0; defenders.length = 0; projectiles.length = 0;
  newGrid();
  sel = 'zapper';
  computeLayout();
  startWave(1);
  firstRunGuide = true;
  gs = 'PLAYING';
  GF.sfx('spawn');
  GF.gameStarted();
  GF.saveRun();
}

function retry() { startGame(); }

function startEndless() {
  endless = true;
  lives = START_LIVES + bonusLives(); sap = SAP_START + bonusSapStart();
  enemies.length = 0; defenders.length = 0; projectiles.length = 0;
  newGrid();
  sel = 'zapper';
  computeLayout();
  breather = false;
  startWave(WAVE_COUNT + 1);
  gs = 'PLAYING';
  GF.gameStarted();
  GF.saveRun();
}

// Bank the current run's Embers into the persistent meta wallet (idempotent per run).
function bankEmbers() {
  lastBanked = Math.round(runEmbers);
  if (lastBanked > 0) { embers += lastBanked; saveMeta(); }
  runEmbers = 0;
}

function winGame() {
  bestWave = Math.max(bestWave, WAVE_COUNT);
  saveBest();
  bankEmbers();
  gs = 'WON';
  GF.sfx('win');
  GF.gameEnded();
  GF.happytime();
  GF.saveRun();
}

function gameOver() {
  bestWave = Math.max(bestWave, endless ? WAVE_COUNT + (wave - WAVE_COUNT) : wave);
  saveBest();
  bankEmbers();
  gs = 'GAMEOVER';
  GF.sfx('lose');
  GF.gameEnded();
  GF.saveRun();
}

function toMenu() { gs = 'MENU'; GF.saveRun(); }

// ── WORKSHOP (open / buy / close) ───────────────────────────────────────────
function openWorkshop(from) { workshopFrom = from || 'MENU'; gs = 'WORKSHOP'; GF.sfx('tap'); }
function closeWorkshop() { gs = (workshopFrom === 'PAUSE') ? 'PLAYING' : 'MENU'; GF.sfx('tap'); }
function buyUpgrade(u) {
  var c = upgCost(u);
  if (c < 0 || embers < c) { GF.setShake(0.2); return false; }
  embers -= c;
  metaUpg[u.id] = upgLevel(u.id) + 1;
  saveMeta();
  GF.sfx('levelup');
  // float the confirmation high (under the header), clear of the upgrade rows
  GF.spawnFloat(GF.cx, GF.H * 0.18, '+' + GF.t(u.key), u.color);
  return true;
}

// ── SCREENSHOT / GATE HOOKS ─────────────────────────────────────────────────
window._jumpLevel = function(n) {
  GF.tutorial.active = false;
  try { localStorage.setItem('critter_siege_seen_tutorial', '1'); } catch (e) {}
  if (n >= 90) {                       // gate sentinel → terminal screen
    startGame();
    lives = 0; gameOver();             // GAMEOVER is the gate-recognized terminal state
    return;
  }
  startGame();
  var w = GF.clamp(n || 4, 1, WAVE_COUNT);
  wave = w;
  startWave(w);
  populateField(w);
  gs = 'PLAYING';
};

window._setupForScreenshot = function(lvl) {
  try { localStorage.setItem('critter_siege_seen_tutorial', '1'); } catch (e) {}
  GF.tutorial.active = false;
  startGame();
  var w = GF.clamp(lvl || 9, 6, WAVE_COUNT);  // mid/late wave: many enemy types
  wave = w;
  computeLayout();
  startWave(w);
  populateField(w);
  gs = 'PLAYING';
};

// Fill the board with defenders + a spread of enemies + live projectiles so a
// screenshot reads as busy mid-wave (>=70% gameplay, multiple of each).
function populateField(w) {
  sap = SAP_MAX;
  var avail = unlockedList();
  var placements = [
    [0,5,'zapper'],[1,5,'bramble'],[2,5,'zapper'],[3,5,'frost'],[4,5,'zapper'],
    [0,3,'frost'],[2,3,'splash'],[4,3,'splash'],[1,2,'saptap'],[3,4,'howitzer'],
  ];
  for (var i = 0; i < placements.length; i++) {
    var pl = placements[i];
    var key = pl[2];
    if (avail.indexOf(key) < 0) key = avail[i % avail.length];
    if (!grid[pl[0]][pl[1]]) { sel = key; placeAt(pl[0], pl[1]); }
  }
  sel = avail[Math.min(3, avail.length - 1)];
  var types = ['crawler','runner','tank','flyer','shielded','swarmling'].filter(function(t){ return w >= (ENEMY_DEBUT[t]||1); });
  for (var n = 0; n < 16; n++) {
    if (enemies.length >= MAX_ENEMIES) break;
    var spec = { type: types[(Math.random()*types.length)|0], lane: (Math.random()*LANES)|0 };
    spawnOne(spec);
    enemies[enemies.length-1].y = playY + topClear + Math.random() * (hearthY - playY - topClear) * 0.85;
  }
  if (isBossWave(w) || w >= 10) { spawnOne({ type:'boss', lane:2 }); if (enemies.length) enemies[enemies.length-1].y = playY + playH*0.3; }
  // spawn projectiles and nudge them mid-flight so a screenshot catches active combat
  for (var f = 0; f < defenders.length; f++) {
    var def = defenders[f];
    if (def.kind === 'wall' || def.kind === 'gen') continue;
    var tgt = targetInLane(def.lane, def.y) || { x: def.x, y: def.y + cellH * 2.5 };
    fireProjectile(def, tgt);
    var pp = projectiles[projectiles.length - 1];
    if (pp) { var adv = 0.2 + Math.random() * 0.4; pp.x += pp.vx * adv * 0.4; pp.y += pp.vy * adv * 0.4; }
  }
  aliveThisWave = Math.max(aliveThisWave, enemies.length);
  waveTotal = Math.max(waveTotal, aliveThisWave + 6);
}

// ── DRAW ────────────────────────────────────────────────────────────────────
var _playBtn = null, _retryBtn = null, _menuBtn = null, _endlessBtn = null;
var _wonMenuBtn = null, _helpBtn = null, _trayBtns = [];
var _muteBtn = { x: 0, y: 0, w: 0, h: 0 };
var _workshopBtn = null, _shopBtns = [], _shopBackBtn = null, _pauseBtn = null;

function draw(ctx) {
  drawBg(ctx);
  if (gs === 'PLAYING' || gs === 'GAMEOVER' || gs === 'WON') {
    drawField(ctx);
    drawHUD(ctx);
    drawTray(ctx);
  }
  if (gs === 'MENU') drawMenu(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
  if (gs === 'WON') drawWon(ctx);
  if (gs === 'WORKSHOP') drawWorkshop(ctx);
  if (gs === 'PLAYING') GF.tutorial.draw(ctx);
}

function drawBg(ctx) {
  var W = GF.W, H = GF.H;
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#161b12'); g.addColorStop(0.55, '#11160f'); g.addColorStop(1, '#0c0f0a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}

function drawField(ctx) {
  var S = GF.S;
  for (var l = 0; l < LANES; l++) {
    var x = playX + l * laneW;
    ctx.fillStyle = (l % 2 === 0) ? 'rgba(120,160,90,0.05)' : 'rgba(120,160,90,0.09)';
    ctx.fillRect(x, playY, laneW, playH);
    ctx.strokeStyle = 'rgba(80,110,60,0.25)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, playY); ctx.lineTo(x, hearthY); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  for (var r = 0; r <= CELL_ROWS; r++) {
    var y = cellTopY(r);
    ctx.beginPath(); ctx.moveTo(playX, y); ctx.lineTo(playX + playW, y); ctx.stroke();
  }
  drawHearth(ctx);
  for (var i = 0; i < defenders.length; i++) drawDefender(ctx, defenders[i]);
  for (var j = 0; j < enemies.length; j++) drawEnemy(ctx, enemies[j]);
  for (var k = 0; k < projectiles.length; k++) drawProjectile(ctx, projectiles[k]);

  if (firstRunGuide && gs === 'PLAYING' && !GF.tutorial.active) {
    var gx = laneCenterX(2), gy = cellCenterY(4);
    var pulse = 0.5 + 0.5 * Math.sin(Date.now() / 250);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,235,90,' + (0.5 + 0.4 * pulse) + ')';
    ctx.lineWidth = 3 * S;
    ctx.setLineDash([6 * S, 5 * S]);
    GF.rr(ctx, gx - laneW * 0.42, gy - cellH * 0.42, laneW * 0.84, cellH * 0.84, 8 * S);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ffeb5a';
    ctx.font = 'bold ' + GF.clamp(13 * S, 10, 18) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(GF.lang === 'ru' ? 'Поставь сюда' : 'Tap to place', gx, gy - cellH * 0.5);
    ctx.restore();
  }
}

function drawHearth(ctx) {
  var S = GF.S, pulse = hearthPulse;
  var grd = ctx.createLinearGradient(0, hearthY - cellH * 0.5, 0, trayY);
  grd.addColorStop(0, 'rgba(255,170,60,' + (0.05 + pulse * 0.25) + ')');
  grd.addColorStop(1, 'rgba(255,120,40,' + (0.18 + pulse * 0.4) + ')');
  ctx.fillStyle = grd;
  ctx.fillRect(playX, hearthY, playW, trayY - hearthY + 2);
  ctx.strokeStyle = 'rgba(255,190,90,' + (0.7 + pulse * 0.3) + ')';
  ctx.lineWidth = (3 + pulse * 4) * S;
  ctx.shadowColor = '#ff9a3a'; ctx.shadowBlur = (14 + pulse * 20) * S;
  ctx.beginPath(); ctx.moveTo(playX + 4, hearthY); ctx.lineTo(playX + playW - 4, hearthY); ctx.stroke();
  ctx.shadowBlur = 0;
  GF.drawSprite('hearth', GF.cx, hearthY, GF.clamp(54 * S, 36, 80), function(c, x, y, s) {
    c.fillStyle = 'rgba(255,160,60,0.9)';
    c.beginPath(); c.arc(x, y, s * 0.35, 0, Math.PI * 2); c.fill();
    c.fillStyle = '#fff3d0';
    c.beginPath(); c.arc(x, y, s * 0.16, 0, Math.PI * 2); c.fill();
  });
}

function drawDefender(ctx, def) {
  var S = GF.S;
  var sz = Math.min(laneW, cellH) * 0.82;
  var x = def.x, y = def.y;
  if (def.flash > 0) { ctx.save(); ctx.shadowColor = def.color; ctx.shadowBlur = 14 * def.flash; }
  GF.drawSprite(def.key, x, y, sz, function(c, px, py, s) {
    var d = DEFS[def.key];
    if (d.kind === 'wall') {
      c.fillStyle = d.color;
      GF.rr(c, px - s * 0.42, py - s * 0.42, s * 0.84, s * 0.84, 6 * S); c.fill();
      c.fillStyle = 'rgba(0,0,0,0.25)';
      for (var t = 0; t < 4; t++) { c.beginPath(); c.moveTo(px - s*0.3 + t*s*0.2, py - s*0.42); c.lineTo(px - s*0.22 + t*s*0.2, py - s*0.55); c.lineTo(px - s*0.14 + t*s*0.2, py - s*0.42); c.fill(); }
    } else {
      c.fillStyle = d.color;
      c.beginPath(); c.arc(px, py, s * 0.4, 0, Math.PI * 2); c.fill();
      c.fillStyle = 'rgba(255,255,255,0.85)';
      c.fillRect(px - s * 0.07, py, s * 0.14, s * 0.34);
      c.fillStyle = '#0a0a14';
      c.beginPath(); c.arc(px - s*0.13, py - s*0.06, s*0.07, 0, Math.PI*2); c.fill();
      c.beginPath(); c.arc(px + s*0.13, py - s*0.06, s*0.07, 0, Math.PI*2); c.fill();
    }
  });
  if (def.flash > 0) ctx.restore();
  if ((def.kind === 'wall' || def.kind === 'gen') && def.maxhp > 0 && def.hp < def.maxhp) {
    var bw = sz * 0.8, bx = x - bw / 2, by = y + sz * 0.5;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx, by, bw, 4 * S);
    ctx.fillStyle = '#6bbf4a'; ctx.fillRect(bx, by, bw * GF.clamp(def.hp / def.maxhp, 0, 1), 4 * S);
  }
}

function drawEnemy(ctx, e) {
  var S = GF.S;
  var sz = e.r * 2 * S * 0.9;
  if (e.hitFlash > 0) { ctx.save(); ctx.shadowColor = '#fff'; ctx.shadowBlur = 12 * e.hitFlash; }
  GF.drawSprite(e.type, e.x, e.y, sz, function(c, x, y, s) {
    var d = ENS[e.type];
    c.fillStyle = (e.hitFlash > 0.5) ? '#ffffff' : d.color;
    c.beginPath(); c.arc(x, y, s * 0.45, 0, Math.PI * 2); c.fill();
    c.fillStyle = '#fff';
    c.beginPath(); c.arc(x - s*0.12, y - s*0.05, s*0.13, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(x + s*0.12, y - s*0.05, s*0.13, 0, Math.PI*2); c.fill();
    c.fillStyle = '#0a0a14';
    c.beginPath(); c.arc(x - s*0.12, y - s*0.02, s*0.06, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(x + s*0.12, y - s*0.02, s*0.06, 0, Math.PI*2); c.fill();
    if (e.flying) {
      c.fillStyle = 'rgba(255,255,255,0.5)';
      c.beginPath(); c.ellipse(x - s*0.42, y, s*0.18, s*0.3, 0.4, 0, Math.PI*2); c.fill();
      c.beginPath(); c.ellipse(x + s*0.42, y, s*0.18, s*0.3, -0.4, 0, Math.PI*2); c.fill();
    }
  });
  if (e.hitFlash > 0) ctx.restore();
  if (e.shield > 0) {
    ctx.strokeStyle = 'rgba(140,190,255,0.85)'; ctx.lineWidth = 2.5 * S;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * S * 0.95 + 3 * S, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
  }
  if (e.slowT > 0) {
    ctx.fillStyle = 'rgba(120,200,255,0.25)';
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * S, 0, Math.PI * 2); ctx.fill();
  }
  if (e.hp < e.maxhp || e.boss) {
    var bw = e.r * 2 * S, bx = e.x - bw / 2, by = e.y - e.r * S - 8 * S;
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(bx, by, bw, 4 * S);
    ctx.fillStyle = e.boss ? '#ff5a7a' : '#9be86a';
    ctx.fillRect(bx, by, bw * GF.clamp(e.hp / e.maxhp, 0, 1), 4 * S);
  }
}

function drawProjectile(ctx, p) {
  ctx.fillStyle = p.color;
  ctx.shadowColor = p.color; ctx.shadowBlur = 8 * GF.S;
  ctx.beginPath(); ctx.arc(p.x, p.y, p.r * GF.S, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
}

// ── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD(ctx) {
  var S = GF.S, W = GF.W;
  var pad = GF.clamp(12 * S, 8, 18);
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#ffd24a';
  ctx.font = 'bold ' + GF.clamp(26 * S, 18, 34) + 'px sans-serif';
  ctx.fillText(Math.floor(sap), pad, pad);
  var sapW = ctx.measureText(Math.floor(sap)).width;
  ctx.fillStyle = '#caa84a';
  ctx.font = 'bold ' + GF.clamp(12 * S, 9, 15) + 'px sans-serif';
  ctx.fillText(GF.t('sap'), pad + sapW + 5 * S, pad + GF.clamp(9 * S, 6, 13));

  var hs = GF.clamp(18 * S, 13, 24);
  var hx = W - pad - hs;
  for (var i = 0; i < START_LIVES; i++) {
    drawHeart(ctx, hx - i * (hs + 4 * S), pad + hs * 0.55, hs * 0.55, i < lives);
  }

  var cyTxt = pad + GF.clamp(2 * S, 1, 4);
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#eaeaf0';
  ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  var label;
  if (endless) label = GF.t('wave') + ' ' + wave + ' ∞';
  else label = GF.t('wave') + ' ' + wave + ' / ' + WAVE_COUNT;
  if (isBossWave(wave) && !endless) label += '  ' + GF.t('boss');
  ctx.fillText(label, GF.cx, cyTxt);
  var killed = waveTotal - Math.max(0, aliveThisWave);
  var frac = waveTotal > 0 ? GF.clamp(killed / waveTotal, 0, 1) : 0;
  var pbw = GF.clamp(150 * S, 110, 240), pbx = GF.cx - pbw / 2, pby = cyTxt + GF.clamp(20 * S, 15, 27);
  ctx.fillStyle = 'rgba(255,255,255,0.14)'; GF.rr(ctx, pbx, pby, pbw, 5 * S, 3 * S); ctx.fill();
  ctx.fillStyle = isBossWave(wave) ? '#ff6a8a' : '#7fd06a'; GF.rr(ctx, pbx, pby, pbw * frac, 5 * S, 3 * S); ctx.fill();

  var nx = upNextLabel();
  if (nx) {
    ctx.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px sans-serif';
    ctx.fillStyle = '#9fe8b5'; ctx.textAlign = 'center';
    ctx.fillText(GF.t('upnext') + ': ' + nx, GF.cx, pby + GF.clamp(10 * S, 7, 14));
  }

  if (breather) {
    ctx.fillStyle = 'rgba(255,210,90,0.95)';
    ctx.font = 'bold ' + GF.clamp(14 * S, 11, 19) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('wave') + ' ' + (wave + 1) + ' ' + GF.t('incoming') + '  ' + Math.ceil(breatherT), GF.cx, playY + playH * 0.2);
  }

  var qsz = GF.clamp(26 * S, 22, 34);
  var qx = W - pad - qsz, qy = pad + hs * 1.4 + GF.clamp(6 * S, 4, 10);
  _helpBtn = { x: qx, y: qy, w: qsz, h: qsz };
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  GF.rr(ctx, qx, qy, qsz, qsz, qsz / 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  ctx.fillStyle = '#dfe6f0';
  ctx.font = 'bold ' + GF.clamp(16 * S, 13, 22) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', qx + qsz / 2, qy + qsz / 2 + 1);

  // mute button (left of help button)
  var msz = qsz;
  var mx = qx - msz - GF.clamp(6 * S, 4, 10);
  _muteBtn = { x: mx, y: qy, w: msz, h: msz };
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  GF.rr(ctx, mx, qy, msz, msz, msz / 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  GF.drawMuteIcon(ctx, mx + msz / 2, qy + msz / 2, msz * 0.28, GF.muted);

  // Workshop / pause button (left of mute) — meta reachable mid-run (no need to lose)
  var wsz = msz;
  var wx = mx - wsz - GF.clamp(6 * S, 4, 10);
  _pauseBtn = { x: wx, y: qy, w: wsz, h: wsz };
  ctx.fillStyle = 'rgba(255,160,70,0.14)';
  GF.rr(ctx, wx, qy, wsz, wsz, wsz / 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,184,74,0.55)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  drawEmberGlyph(ctx, wx + wsz / 2, qy + wsz / 2 + wsz * 0.06, wsz * 0.24);
}

function upNextLabel() {
  var nw = wave + 1;
  for (var i = 0; i < DEF_ORDER.length; i++) {
    if (DEF_UNLOCK_WAVE[DEF_ORDER[i]] === nw) return GF.t(DEFS[DEF_ORDER[i]].key) + ' (' + GF.t('newunit') + ')';
  }
  if (isBossWave(nw) && !endless) return GF.t('e_boss');
  for (var t in ENEMY_DEBUT) { if (ENEMY_DEBUT[t] === nw) return GF.t(ENS[t].key); }
  return null;
}

function drawHeart(ctx, x, y, r, filled) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = filled ? '#ff5a6e' : 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.moveTo(0, r * 0.35);
  ctx.bezierCurveTo(r * 1.1, -r * 0.6, r * 0.5, -r * 1.2, 0, -r * 0.55);
  ctx.bezierCurveTo(-r * 0.5, -r * 1.2, -r * 1.1, -r * 0.6, 0, r * 0.35);
  ctx.fill();
  ctx.restore();
}

// ── TRAY ────────────────────────────────────────────────────────────────────
function drawTray(ctx) {
  var S = GF.S;
  _trayBtns = [];
  ctx.fillStyle = 'rgba(14,18,12,0.96)';
  ctx.fillRect(0, trayY, GF.W, trayH);
  ctx.strokeStyle = 'rgba(120,160,90,0.4)'; ctx.lineWidth = 2 * S;
  ctx.beginPath(); ctx.moveTo(0, trayY); ctx.lineTo(GF.W, trayY); ctx.stroke();

  var list = unlockedList();
  var n = list.length;
  var gap = GF.clamp(8 * S, 5, 12);
  var bw = (GF.W - gap * (n + 1)) / n;
  bw = Math.min(bw, GF.clamp(96 * S, 64, 120));
  var totalW = bw * n + gap * (n - 1);
  var startX = (GF.W - totalW) / 2;
  var by = trayY + GF.clamp(9 * S, 6, 14);
  var bh = trayH - GF.clamp(18 * S, 12, 26);

  for (var i = 0; i < n; i++) {
    var key = list[i];
    var d = DEFS[key];
    var bx = startX + i * (bw + gap);
    var seld = (key === sel);
    var afford = canAfford(key);
    ctx.fillStyle = seld ? 'rgba(255,255,255,0.16)' : 'rgba(255,255,255,0.06)';
    GF.rr(ctx, bx, by, bw, bh, 10 * S); ctx.fill();
    ctx.strokeStyle = seld ? d.color : (afford ? 'rgba(255,255,255,0.25)' : 'rgba(255,80,80,0.45)');
    ctx.lineWidth = seld ? 2.5 * S : 1.5 * S;
    GF.rr(ctx, bx, by, bw, bh, 10 * S); ctx.stroke();
    var iconSz = bh * 0.5;
    var icx = bx + bw / 2, icy = by + bh * 0.36;
    ctx.globalAlpha = afford ? 1 : 0.5;
    (function(dd){
      GF.drawSprite(key, icx, icy, iconSz, function(c, px, py, s) {
        if (dd.kind === 'wall') { c.fillStyle = dd.color; GF.rr(c, px - s*0.4, py - s*0.4, s*0.8, s*0.8, 4*S); c.fill(); }
        else { c.fillStyle = dd.color; c.beginPath(); c.arc(px, py, s*0.4, 0, Math.PI*2); c.fill(); }
      });
    })(d);
    ctx.globalAlpha = 1;
    ctx.fillStyle = afford ? '#ffd24a' : '#ff8080';
    ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(d.cost, icx, by + bh - GF.clamp(4 * S, 2, 7));
    _trayBtns.push({ x: bx, y: by, w: bw, h: bh, key: key });
  }
}

// ── MENU / OVERLAYS ─────────────────────────────────────────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

function drawScrim(ctx, a) { ctx.fillStyle = 'rgba(8,10,8,' + a + ')'; ctx.fillRect(0, 0, GF.W, GF.H); }

function drawMenu(ctx) {
  drawScrim(ctx, 0.86);
  var S = GF.S, W = GF.W, H = GF.H, cx = W / 2;
  var maxW = Math.min(W * 0.88, 440);
  ctx.shadowColor = 'rgba(255,150,60,0.55)'; ctx.shadowBlur = 28 * S;
  ctx.font = 'bold ' + GF.clamp(38 * S, 24, 52) + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var titleY = H * 0.07;
  ctx.fillText(GF.t('title'), cx, titleY);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  var motifY = titleY + GF.clamp(50 * S, 36, 66);
  var mcols = ['#8ad17a','#f2d24a','#c98ff0','#7fa0c0','#e07a7a'];
  for (var m = 0; m < 5; m++) {
    var mx = cx + (m - 2) * GF.clamp(34 * S, 24, 44);
    ctx.fillStyle = mcols[m];
    ctx.beginPath(); ctx.arc(mx, motifY, GF.clamp(12 * S, 9, 16), 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(mx - 3*S, motifY - 2*S, GF.clamp(3.5*S,2,5), 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx + 3*S, motifY - 2*S, GF.clamp(3.5*S,2,5), 0, Math.PI*2); ctx.fill();
  }

  var y = motifY + GF.clamp(28 * S, 20, 40);
  var fs = GF.clamp(14 * S, 11, 18);
  var lineH = fs * 1.3;
  ctx.font = fs + 'px sans-serif';
  ctx.textAlign = 'left';
  var lx = cx - maxW / 2;
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var cols = ['#9fe8b5', '#cfe0ff', '#cfe0ff', '#ff9c8e', '#ffe27a'];
  var seen = false; try { seen = !!localStorage.getItem('critter_siege_seen_tutorial'); } catch (e) {}
  if (seen) { keys = ['tut_goal', 'tut_controls']; cols = ['#9fe8b5', '#cfe0ff']; }
  for (var ki = 0; ki < keys.length; ki++) {
    var lines = wrapLines(ctx, GF.t(keys[ki]), maxW);
    ctx.fillStyle = cols[ki];
    for (var j = 0; j < lines.length; j++) { ctx.fillText(lines[j], lx, y); y += lineH; }
    y += lineH * 0.3;
  }

  var wide = W / H > 1.15;
  var bh = GF.clamp(58 * S, 46, 72);
  var bw = Math.min(W * 0.7, GF.clamp(280 * S, 200, 340));
  if (wide) { bw = bw * 1.4; bh = bh * 1.35; }
  var by = wide
    ? Math.max(y + bh / 2 + 16 * S, H * 0.58)
    : Math.min(y + GF.clamp(16 * S, 10, 26), H - bh - GF.clamp(56 * S, 42, 76));
  // Store stable hit-rect
  _playBtn = { x: cx - bw / 2, y: by, w: bw, h: bh };
  if (!wide) {
    drawBigButton(ctx, GF.t('play'), cx, by, bw, bh, '#e8932a', '#f0b85a');
  } else {
    // Pulsing draw for wide
    var t_cs = performance.now() / 1000;
    var pulse = 1 + 0.05 * Math.sin(t_cs * 2.2);
    var dW = bw * pulse, dH = bh * pulse;
    var dX = cx - dW / 2, dY = by - (dH - bh) / 2;
    var g = ctx.createLinearGradient(dX, dY, dX, dY + dH);
    g.addColorStop(0, '#f0b85a'); g.addColorStop(1, '#e8932a');
    ctx.shadowColor = '#e8932a'; ctx.shadowBlur = 18 + 10 * Math.sin(t_cs * 2.2);
    GF.rr(ctx, dX, dY, dW, dH, dH / 2); ctx.fillStyle = g; ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + GF.clamp(26 * S, 20, 36) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('play'), cx, dY + dH / 2 + 1);
  }

  var capY = by + bh + GF.clamp(12 * S, 8, 18);
  if (bestWave > 0) {
    ctx.fillStyle = '#9fb6a0';
    ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    var bwLbl = bestWave > WAVE_COUNT ? ('∞' + (bestWave - WAVE_COUNT)) : (bestWave + '/' + WAVE_COUNT);
    ctx.fillText(GF.t('best') + ': ' + bwLbl, cx, capY);
    capY += GF.clamp(20 * S, 14, 26);
  }

  // WORKSHOP button (the owned meta entry) — shows banked Embers right on it.
  var wbw = Math.min(W * 0.6, GF.clamp(230 * S, 170, 300));
  var wbh = GF.clamp(46 * S, 38, 58);
  var wby = Math.min(capY + GF.clamp(4 * S, 2, 8), H - wbh - GF.clamp(14 * S, 10, 22));
  _workshopBtn = { x: cx - wbw / 2, y: wby, w: wbw, h: wbh };
  GF.rr(ctx, _workshopBtn.x, wby, wbw, wbh, wbh / 2);
  ctx.fillStyle = 'rgba(255,160,70,0.16)'; ctx.fill();
  ctx.strokeStyle = '#ffb84a'; ctx.lineWidth = 2 * S; GF.rr(ctx, _workshopBtn.x, wby, wbw, wbh, wbh / 2); ctx.stroke();
  ctx.fillStyle = '#ffd27a';
  ctx.font = 'bold ' + GF.clamp(16 * S, 13, 21) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  drawEmberGlyph(ctx, cx - ctx.measureText(GF.t('workshopbtn')).width / 2 - GF.clamp(16 * S, 11, 20), wby + wbh / 2, GF.clamp(7 * S, 5, 10));
  ctx.fillText(GF.t('workshopbtn'), cx + GF.clamp(8 * S, 5, 12), wby + wbh / 2 + 1);
  ctx.fillStyle = '#ffcf7a';
  ctx.font = 'bold ' + GF.clamp(12 * S, 10, 15) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(embers + ' ' + GF.t('embers'), cx, wby + wbh + GF.clamp(6 * S, 4, 10));
}

// Small vector ember glyph (no emoji — headless/Android safe).
function drawEmberGlyph(ctx, x, y, r) {
  ctx.save();
  ctx.fillStyle = '#ff7a2a';
  ctx.beginPath();
  ctx.moveTo(x, y - r * 1.3);
  ctx.bezierCurveTo(x + r, y - r * 0.2, x + r * 0.7, y + r, x, y + r);
  ctx.bezierCurveTo(x - r * 0.7, y + r, x - r, y - r * 0.2, x, y - r * 1.3);
  ctx.fill();
  ctx.fillStyle = '#ffd24a';
  ctx.beginPath();
  ctx.moveTo(x, y - r * 0.4);
  ctx.bezierCurveTo(x + r * 0.5, y + r * 0.1, x + r * 0.35, y + r * 0.7, x, y + r * 0.7);
  ctx.bezierCurveTo(x - r * 0.35, y + r * 0.7, x - r * 0.5, y + r * 0.1, x, y - r * 0.4);
  ctx.fill();
  ctx.restore();
}

function drawBigButton(ctx, label, cx, y, w, h, c0, c1) {
  var S = GF.S, x = cx - w / 2;
  var g = ctx.createLinearGradient(x, y, x, y + h);
  g.addColorStop(0, c1); g.addColorStop(1, c0);
  ctx.shadowColor = c0; ctx.shadowBlur = 18 * S;
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fillStyle = g; ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + GF.clamp(20 * S, 15, 26) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, y + h / 2 + 1);
  return { x: x, y: y, w: w, h: h };
}

function drawSmallButton(ctx, label, cx, y, c) {
  var S = GF.S, w = GF.clamp(180 * S, 130, 240), h = GF.clamp(46 * S, 38, 58), x = cx - w / 2;
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fillStyle = c; ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + GF.clamp(16 * S, 12, 20) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, y + h / 2 + 1);
  return { x: x, y: y, w: w, h: h };
}

// Shared end-screen footer: Embers earned this run + the one-upgrade-away hook.
// This is the session-end "reason to return" — leaving plants the next goal.
function drawEndEmbers(ctx, yTop) {
  var S = GF.S, cx = GF.W / 2, y = yTop;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  if (lastBanked > 0) {
    ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif';
    var et = GF.t('earned') + ' +' + lastBanked + ' ' + GF.t('embers');
    var etw = ctx.measureText(et).width;
    drawEmberGlyph(ctx, cx - etw / 2 - GF.clamp(14 * S, 9, 18), y + GF.clamp(8 * S, 5, 12), GF.clamp(7 * S, 5, 10));
    ctx.fillStyle = '#ffd27a';
    ctx.fillText(et, cx, y); y += GF.clamp(24 * S, 18, 32);
  }
  var hint = nextUpgradeHint();
  if (hint) {
    var need = Math.max(0, hint.cost - embers);
    ctx.fillStyle = '#bcdcc0';
    ctx.font = GF.clamp(12 * S, 10, 16) + 'px sans-serif';
    var msg = (need <= 0)
      ? (GF.t('nextup') + ': ' + GF.t(hint.u.key) + ' - ' + GF.t('upgrade') + '!')
      : (GF.t('nextup') + ': ' + GF.t(hint.u.key) + ' (' + need + ' ' + GF.t('embers') + ')');
    ctx.fillText(msg, cx, y);
  }
  return y;
}

function drawGameOver(ctx) {
  drawScrim(ctx, 0.82);
  var S = GF.S, H = GF.H, cx = GF.W / 2;
  ctx.shadowColor = 'rgba(255,90,110,0.5)'; ctx.shadowBlur = 26 * S;
  ctx.font = 'bold ' + GF.clamp(38 * S, 24, 52) + 'px sans-serif';
  ctx.fillStyle = '#ff7a6c'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('gameover'), cx, H * 0.27);
  ctx.shadowBlur = 0;
  ctx.font = GF.clamp(17 * S, 13, 22) + 'px sans-serif';
  ctx.fillStyle = '#dcdce6';
  var wlbl = endless ? ('∞' + (wave - WAVE_COUNT)) : (wave + '/' + WAVE_COUNT);
  ctx.fillText(GF.t('reached') + ' ' + wlbl, cx, H * 0.27 + GF.clamp(50 * S, 38, 66));
  ctx.fillStyle = '#ffd24a';
  ctx.fillText(GF.t('score') + ': ' + score, cx, H * 0.27 + GF.clamp(78 * S, 58, 100));
  // Embers banked + next-upgrade hook (the reason to return)
  drawEndEmbers(ctx, H * 0.27 + GF.clamp(116 * S, 90, 144));
  var rbH = GF.clamp(54 * S, 44, 68);
  var ry0 = Math.min(H * 0.55, H - rbH * 3 - GF.clamp(56 * S, 40, 80));
  _retryBtn = drawBigButton(ctx, GF.t('retry'), cx, ry0, GF.clamp(240*S,180,320), rbH, '#e8932a', '#f0b85a');
  _workshopBtn = drawSmallButton(ctx, GF.t('workshopbtn') + '  (' + embers + ')', cx, ry0 + rbH + GF.clamp(12 * S, 8, 18), 'rgba(255,160,70,0.22)');
  _menuBtn = drawSmallButton(ctx, GF.t('menu'), cx, ry0 + rbH + GF.clamp(12 * S, 8, 18) + GF.clamp(58 * S, 46, 72), 'rgba(255,255,255,0.14)');
}

function drawWon(ctx) {
  drawScrim(ctx, 0.86);
  var S = GF.S, H = GF.H, cx = GF.W / 2;
  ctx.shadowColor = 'rgba(255,180,80,0.6)'; ctx.shadowBlur = 30 * S;
  ctx.font = 'bold ' + GF.clamp(36 * S, 24, 50) + 'px sans-serif';
  ctx.fillStyle = '#ffd27a'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('won'), cx, H * 0.25);
  ctx.shadowBlur = 0;
  ctx.font = GF.clamp(16 * S, 12, 21) + 'px sans-serif';
  ctx.fillStyle = '#dcdce6';
  ctx.fillText(GF.t('score') + ': ' + score, cx, H * 0.25 + GF.clamp(52 * S, 40, 70));
  drawEndEmbers(ctx, H * 0.25 + GF.clamp(86 * S, 66, 110));
  var ebH = GF.clamp(54 * S, 44, 68);
  var ey0 = Math.min(H * 0.52, H - ebH * 3 - GF.clamp(56 * S, 40, 80));
  _endlessBtn = drawBigButton(ctx, GF.t('endless'), cx, ey0, GF.clamp(250*S,190,330), ebH, '#3a78c8', '#5a98e8');
  _workshopBtn = drawSmallButton(ctx, GF.t('workshopbtn') + '  (' + embers + ')', cx, ey0 + ebH + GF.clamp(12 * S, 8, 18), 'rgba(255,160,70,0.22)');
  _wonMenuBtn = drawSmallButton(ctx, GF.t('menu'), cx, ey0 + ebH + GF.clamp(12 * S, 8, 18) + GF.clamp(58 * S, 46, 72), 'rgba(255,255,255,0.14)');
}

function drawWorkshop(ctx) {
  var S = GF.S, W = GF.W, H = GF.H, cx = W / 2;
  // Fully opaque backdrop (overlay hygiene — no bleed-through).
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a1208'); g.addColorStop(1, '#0c0a06');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  var pad = GF.clamp(16 * S, 11, 22);
  // Header
  ctx.shadowColor = 'rgba(255,150,60,0.5)'; ctx.shadowBlur = 20 * S;
  ctx.fillStyle = '#ffd27a';
  ctx.font = 'bold ' + GF.clamp(26 * S, 19, 34) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var hy = GF.clamp(18 * S, 12, 28);
  ctx.fillText(GF.t('workshop'), cx, hy);
  ctx.shadowBlur = 0;
  // Embers balance
  var balY = hy + GF.clamp(34 * S, 26, 46);
  ctx.font = 'bold ' + GF.clamp(20 * S, 15, 26) + 'px sans-serif';
  ctx.textBaseline = 'middle';
  var balTxt = embers + ' ' + GF.t('embers');
  var btw = ctx.measureText(balTxt).width;
  drawEmberGlyph(ctx, cx - btw / 2 - GF.clamp(16 * S, 11, 20), balY, GF.clamp(9 * S, 6, 12));
  ctx.fillStyle = '#ffcf7a'; ctx.textAlign = 'center';
  ctx.fillText(balTxt, cx + GF.clamp(8 * S, 5, 12), balY);

  // Tip line
  ctx.fillStyle = '#b8a98a';
  ctx.font = GF.clamp(11 * S, 9, 14) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var tipY = balY + GF.clamp(18 * S, 13, 24);
  var tipLines = wrapLines(ctx, GF.t('tip_workshop'), W * 0.86);
  for (var ti = 0; ti < tipLines.length; ti++) { ctx.fillText(tipLines[ti], cx, tipY); tipY += GF.clamp(15 * S, 12, 19); }

  // Upgrade rows
  _shopBtns = [];
  var backH = GF.clamp(46 * S, 38, 58);
  var listTop = tipY + GF.clamp(10 * S, 6, 14);
  var listBottom = H - backH - GF.clamp(24 * S, 16, 34);
  var rowGap = GF.clamp(9 * S, 5, 13);
  var rowH = Math.min(GF.clamp(74 * S, 58, 92), (listBottom - listTop - rowGap * (UPGRADES.length - 1)) / UPGRADES.length);
  var rx = pad, rw = W - pad * 2;
  for (var i = 0; i < UPGRADES.length; i++) {
    var u = UPGRADES[i];
    var ry = listTop + i * (rowH + rowGap);
    var lv = upgLevel(u.id);
    var cost = upgCost(u);
    var maxed = (cost < 0);
    var afford = (!maxed && embers >= cost);
    // row bg
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    GF.rr(ctx, rx, ry, rw, rowH, 12 * S); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.lineWidth = 1 * S;
    GF.rr(ctx, rx, ry, rw, rowH, 12 * S); ctx.stroke();
    // accent pip
    ctx.fillStyle = u.color;
    GF.rr(ctx, rx + GF.clamp(8 * S, 5, 12), ry + rowH * 0.22, GF.clamp(5 * S, 3, 7), rowH * 0.56, 3 * S); ctx.fill();
    // name + desc
    var tx = rx + GF.clamp(22 * S, 15, 30);
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillStyle = '#f0e8d8';
    ctx.font = 'bold ' + GF.clamp(15 * S, 12, 19) + 'px sans-serif';
    ctx.fillText(GF.t(u.key) + '  ' + GF.t('lvl') + ' ' + lv + '/' + u.max, tx, ry + GF.clamp(10 * S, 6, 14));
    ctx.fillStyle = '#a89a82';
    ctx.font = GF.clamp(11 * S, 9, 14) + 'px sans-serif';
    ctx.fillText(GF.t(u.dkey), tx, ry + GF.clamp(30 * S, 23, 40));
    // level dots
    var dotR = GF.clamp(3.5 * S, 2.5, 5), dotY = ry + rowH - GF.clamp(13 * S, 9, 18);
    for (var d2 = 0; d2 < u.max; d2++) {
      ctx.beginPath(); ctx.arc(tx + dotR + d2 * (dotR * 2 + 4 * S), dotY, dotR, 0, Math.PI * 2);
      ctx.fillStyle = d2 < lv ? u.color : 'rgba(255,255,255,0.18)'; ctx.fill();
    }
    // buy button
    var bbw = GF.clamp(96 * S, 74, 120), bbh = rowH - GF.clamp(20 * S, 13, 28);
    var bbx = rx + rw - bbw - GF.clamp(10 * S, 6, 14), bby = ry + (rowH - bbh) / 2;
    if (maxed) {
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      GF.rr(ctx, bbx, bby, bbw, bbh, bbh / 2); ctx.fill();
      ctx.fillStyle = '#9fe8b5';
      ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(GF.t('maxed'), bbx + bbw / 2, bby + bbh / 2 + 1);
    } else {
      var g2 = ctx.createLinearGradient(bbx, bby, bbx, bby + bbh);
      if (afford) { g2.addColorStop(0, '#f0b85a'); g2.addColorStop(1, '#e8932a'); }
      else { g2.addColorStop(0, 'rgba(120,110,90,0.5)'); g2.addColorStop(1, 'rgba(90,80,60,0.5)'); }
      GF.rr(ctx, bbx, bby, bbw, bbh, bbh / 2); ctx.fillStyle = g2; ctx.fill();
      ctx.fillStyle = afford ? '#fff' : 'rgba(255,255,255,0.5)';
      ctx.font = 'bold ' + GF.clamp(14 * S, 11, 18) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      drawEmberGlyph(ctx, bbx + bbw / 2 - ctx.measureText(String(cost)).width / 2 - GF.clamp(11 * S, 7, 14), bby + bbh / 2, GF.clamp(5.5 * S, 4, 8));
      ctx.fillText(cost, bbx + bbw / 2 + GF.clamp(6 * S, 4, 9), bby + bbh / 2 + 1);
      _shopBtns.push({ x: bbx, y: bby, w: bbw, h: bbh, id: u.id });
    }
  }

  // BACK button
  var backW = Math.min(W * 0.5, GF.clamp(200 * S, 150, 260));
  var backY = H - backH - GF.clamp(14 * S, 10, 22);
  _shopBackBtn = drawBigButton(ctx, GF.t('back'), cx, backY, backW, backH, '#3a4a5a', '#5a6a7a');
}

// ── INPUT ───────────────────────────────────────────────────────────────────
function hit(b, x, y) { return b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }

function onTap(x, y) {
  if (GF.tutorial.active) { GF.tutorial.handleClick(x, y); return; }

  if (gs === 'MENU') {
    if (hit(_playBtn, x, y)) startGame();
    else if (hit(_workshopBtn, x, y)) openWorkshop('MENU');
    return;
  }
  if (gs === 'WORKSHOP') {
    for (var si = 0; si < _shopBtns.length; si++) {
      if (hit(_shopBtns[si], x, y)) { var u = upgById(_shopBtns[si].id); if (u) buyUpgrade(u); return; }
    }
    if (hit(_shopBackBtn, x, y)) closeWorkshop();
    return;
  }
  if (gs === 'GAMEOVER') {
    if (hit(_retryBtn, x, y)) retry();
    else if (hit(_workshopBtn, x, y)) openWorkshop('MENU');
    else if (hit(_menuBtn, x, y)) toMenu();
    return;
  }
  if (gs === 'WON') {
    if (hit(_endlessBtn, x, y)) startEndless();
    else if (hit(_workshopBtn, x, y)) openWorkshop('MENU');
    else if (hit(_wonMenuBtn, x, y)) toMenu();
    return;
  }
  if (gs !== 'PLAYING') return;

  if (hit(_muteBtn, x, y)) { GF.toggleMute(); GF.setMusicMuted(GF.muted); return; }
  if (hit(_helpBtn, x, y)) { GF.tutorial.reopen(); return; }
  if (hit(_pauseBtn, x, y)) { openWorkshop('PAUSE'); return; }

  for (var i = 0; i < _trayBtns.length; i++) {
    if (hit(_trayBtns[i], x, y)) { sel = _trayBtns[i].key; firstRunGuide = false; return; }
  }

  if (y >= playY + topClear && y < hearthY && x >= playX && x < playX + playW) {
    var lane = GF.clamp(Math.floor((x - playX) / laneW), 0, LANES - 1);
    var row = Math.floor((y - (playY + topClear)) / cellH);
    if (row >= 0 && row < CELL_ROWS) placeAt(lane, row);
  }
}

GF.canvas.addEventListener('click', function(e) {
  var rect = GF.canvas.getBoundingClientRect();
  var sx = GF.canvas.width / rect.width, sy = GF.canvas.height / rect.height;
  onTap((e.clientX - rect.left) * sx, (e.clientY - rect.top) * sy);
});
GF.canvas.addEventListener('touchstart', function(e) {
  if (!e.changedTouches || !e.changedTouches.length) return;
  var t0 = e.changedTouches[0];
  var rect = GF.canvas.getBoundingClientRect();
  var sx = GF.canvas.width / rect.width, sy = GF.canvas.height / rect.height;
  onTap((t0.clientX - rect.left) * sx, (t0.clientY - rect.top) * sy);
}, { passive: true });

// ── STATE EXPOSURE (runtime gate cross-checks DESIGN.md) ────────────────────
GF.exposeState(function() {
  return {
    gs: gs,
    wave: wave,
    lives: lives,
    sap: Math.floor(sap),
    score: score,
    kills: kills,
    bestWave: bestWave,
    endless: endless,
    breather: breather,
    enemies: enemies.length,
    defenders: defenders.length,
    projectiles: projectiles.length,
    aliveThisWave: aliveThisWave,
    waveTotal: waveTotal,
    sel: sel,
    unlocked: unlockedList().length,
    isBoss: isBossWave(wave),
    embers: embers,
    runEmbers: Math.round(runEmbers),
    upgVigor: upgLevel('vigor'),
    upgWellspring: upgLevel('wellspring'),
    upgFangs: upgLevel('fangs'),
    upgClaws: upgLevel('claws'),
    upgHarvest: upgLevel('harvest'),
    upgTotal: upgLevel('vigor') + upgLevel('wellspring') + upgLevel('fangs') + upgLevel('claws') + upgLevel('harvest'),
    START_LIVES: START_LIVES,
    SAP_START: SAP_START,
    SAP_REGEN: SAP_REGEN,
    SAP_MAX: SAP_MAX,
    WAVE_COUNT: WAVE_COUNT,
    SPAWN_INTERVAL: SPAWN_INTERVAL,
    BREATHER_SEC: BREATHER_SEC,
    LANES: LANES,
    BOSS_EVERY: BOSS_EVERY,
    CELL_ROWS: CELL_ROWS,
    MAX_ENEMIES: MAX_ENEMIES,
    MAX_PROJECTILES: MAX_PROJECTILES,
  };
});
window._getI18N = function() { return STRINGS; };

// ── BOT CONTRACT (progression_trials steering wheel) ────────────────────────
// getActions() lists what the player could do now; doAction(a) performs one.
GF.exposeBot(
  function getActions() {
    if (gs === 'MENU') return ['play'];
    if (gs === 'GAMEOVER') return ['retry'];
    if (gs === 'WON') return ['endless'];
    if (gs !== 'PLAYING' || breather) return ['wait'];
    var acts = [];
    var list = unlockedList();
    // try to place the cheapest affordable defender in a lane that has an enemy
    for (var i = 0; i < list.length; i++) if (canAfford(list[i])) { acts.push('place:' + list[i]); }
    if (!acts.length) acts.push('wait');
    return acts;
  },
  function doAction(a) {
    if (a === 'play') { startGame(); return; }
    if (a === 'retry') { retry(); return; }
    if (a === 'endless') { startEndless(); return; }
    if (a === 'wait') return;
    if (a.indexOf('place:') === 0) {
      var key = a.slice(6);
      if (!DEFS[key] || !defUnlocked(key) || !canAfford(key)) return;
      sel = key;
      // aim at the lane with the most-advanced (lowest-on-screen) enemy
      var bestLane = 0, bestY = -1;
      for (var i = 0; i < enemies.length; i++) { var e = enemies[i]; if (!e.dead && e.y > bestY) { bestY = e.y; bestLane = e.lane; } }
      // first empty row from the bottom in that lane (defend deepest)
      for (var r = CELL_ROWS - 1; r >= 0; r--) { if (!grid[bestLane][r]) { placeAt(bestLane, r); return; } }
    }
  }
);

// ── META TEST SEAMS (headless verification only; no gameplay effect) ─────────
window._grantEmbers = function(n) { embers += (n | 0); saveMeta(); return embers; };
window._buyUpgrade = function(id) { var u = upgById(id); return u ? buyUpgrade(u) : false; };
window._openWorkshop = function() { openWorkshop('MENU'); };

// ── BOOT ────────────────────────────────────────────────────────────────────
GF.init({
  designW: 540,
  designH: 960,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'critter_siege',
  onReady: function() {
    loadBest();
    loadMeta();
    computeLayout();
    newGrid();
    GF.persist('critter_siege_run_v1',
      function() {
        return { gs: gs, wave: wave, lives: lives, sap: Math.floor(sap),
                 score: score, kills: kills, endless: endless, bestWave: bestWave };
      },
      function(s) {
        if (!s) return;
        bestWave = s.bestWave || bestWave;
        gs = 'MENU';  // transient board isn't restored; re-enter cleanly, best banked
      }
    );
    if (gs === 'PLAYING') gs = 'MENU';

    GF.startMusic({ preset: 'arcade', muted: GF.muted });

    GF.tutorial.start([
      { text: GF.t('tut_goal') + ' ' + GF.t('tut_controls'), advance: 'click_any' },
      { text: GF.t('tut_win') + '  ' + GF.t('tut_lose'), advance: 'click_any' },
      { text: GF.t('tut_tip'), advance: 'click_any' },
    ], { storageKey: 'critter_siege_seen_tutorial' });

    if (window.__GF_AUTOSTART && !window._silent) {
      GF.tutorial.active = false;
      try { localStorage.setItem('critter_siege_seen_tutorial', '1'); } catch (e) {}
      startGame();
    }
  },
  onUpdate: update,
  onDraw: draw,
});

})();
</script>
