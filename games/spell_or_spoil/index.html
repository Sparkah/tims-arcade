// Letters render dynamically on clean tiles, so only the rot/spore overlays are

var DICT = null;
function buildDict() {

// ── TUNABLES (named in DESIGN.md — exposed via __gfState) ─────────────────────
var GRID_N = 6;                 // 6×6 board
var ROT_LOSE_FRAC = 0.70;       // lose when rotCount/totalTiles >= this
var ROT_SPREAD_PER_TURN = 2;    // clean tiles the rot eats per turn (board 1)
var START_SEEDS = 2;            // rotten seed tiles a board opens with
var BOARD_QUOTA = 6;            // words to clear board 1
var QUOTA_STEP = 2;             // quota added per board
var MIN_WORD_LEN = 3;           // shortest accepted traced word
var CLEANSE_RADIUS = 1;         // rot within this many tiles of the path is cleansed
var SPORE_BOARD = 4;            // spore (rot-jump) tiles first appear on this board
var BLEACH_BOARD = 2;           // bleach (plus-blast) power tiles first appear here
var GOLD_CHANCE = 0.06;         // per fresh tile chance of a x2 gold tile
var TILE_GAP = 6;               // px gap between tiles (scaled by GF.S)

// derived per-board difficulty (recomputed in setBoardDifficulty)
var totalTiles = GRID_N * GRID_N;
var spreadPerTurn = ROT_SPREAD_PER_TURN;
var startSeeds = START_SEEDS;
var quota = BOARD_QUOTA;

// ── LETTER GENERATION (vowel-rich so words are findable) ──────────────────────
var BAG_EN = 'AAAAAEEEEEEIIIIIOOOOUUULLLNNNRRRSSSTTTDDGBCMPFHWY';
function randLetter() {
  return BAG_EN.charAt((Math.random() * BAG_EN.length) | 0);
}

// ── PROFANITY SCRUB ──────────────────────────────────────────────────────────
// Random fill can spell a slur across adjacent tiles on the *displayed* grid — a
// moderation/brand risk on the public gallery + store screenshots. Re-roll the
// LAST tile of any banned run until rows & columns read clean (diagonals aren't
// legible as words to a casual viewer, so we only scrub horizontal/vertical).
// Re-rolling the span END never touches the guaranteed opening word (row 0,
// cols 0-2): any matching span there is the safe word itself, and any span that
// includes a random tile ends outside cols 0-2 / row 0.
var BANNED = ['FUCK','SHIT','CUNT','SLUT','WHORE','WHOR','COCK','DICK','PUSSY','PUSS',
  'TWAT','JIZZ','BITCH','PORN','RAPE','NIGGER','NIGG','NIGR','FAGGOT','FAGG','COON',
  'KIKE','SPIC','CHINK','TRANNY','RETARD','ANUS','ARSE','TURD','SUCK','SEX','ASS','TIT','CUM','FAG','XXX'];
function bannedEnd(s) {
  for (var i = 0; i < BANNED.length; i++) {
    var k = s.indexOf(BANNED[i]);
    if (k >= 0) return k + BANNED[i].length - 1;
  }
  return -1;
}
function scrubProfanity() {
  if (!grid || !grid.length) return;
  for (var guard = 0; guard < 80; guard++) {
    var dirty = false;
    for (var r = 0; r < N; r++) {
      var s = '';
      for (var c = 0; c < N; c++) s += grid[r][c] ? grid[r][c].letter : ' ';
      var e = bannedEnd(s);
      if (e >= 0 && grid[r][e]) { grid[r][e].letter = randLetter(); dirty = true; }
    }
    for (var c2 = 0; c2 < N; c2++) {
      var sc = '';
      for (var r2 = 0; r2 < N; r2++) sc += grid[r2][c2] ? grid[r2][c2].letter : ' ';
      var e2 = bannedEnd(sc);
      if (e2 >= 0 && grid[e2] && grid[e2][c2]) { grid[e2][c2].letter = randLetter(); dirty = true; }
    }
    if (!dirty) break;
  }
}

// ── STATE ─────────────────────────────────────────────────────────────────────
var gs = 'MENU'; // MENU PLAYING GAMEOVER
var score = 0, best = 0;
var board = 1, wordsThisBoard = 0;
var rotCount = 0;             // number of rotten tiles currently on the board
var chain = 0;               // consecutive valid words without an invalid attempt
var boardFlash = 0;          // anim timer for the BOARD flash
var dangerPulse = 0;         // anim for the rot danger meter
var rotPulse = 0;            // anim for rotten tiles
var lastEvent = '';          // transient label (CLEANSE!/SPORE!/etc.) shown briefly
var lastEventT = 0;

// grid: array [row][col] of cell objects.
// cell = { letter, rot:bool, gold:bool, bleach:bool, spore:bool,
//          x,y (render px), tx,ty (target px), pop (spawn anim 0..1), rotAnim }
var grid = [];
var N = GRID_N;

// drag path
var path = [];               // array of {r,c}
var dragging = false;

var BEST_KEY = 'spell_or_spoil_best';
var SEEN_TUT_KEY = 'spell_or_spoil_seen_tutorial';
var MUTE_KEY = 'spell_or_spoil_muted';
var seenTut = false;
var showTutorialPanel = false;
var sfxMuted = false;

function saveBest() { try { localStorage.setItem(BEST_KEY, String(best)); } catch (e) {} }

// ── LAYOUT (board fits inside the canvas, portrait-first) ─────────────────────
var boardX = 0, boardY = 0, boardW = 0, boardH = 0, tileSize = 0;
var HUD_H = 104; // design-ish top band (scaled)
var FOOT_H = 70; // bottom band for PASS button
function computeLayout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var topPad = HUD_H * S;
  var sidePad = 14 * S;
  var bottomPad = FOOT_H * S;
  var availW = W - sidePad * 2;
  var availH = H - topPad - bottomPad;
  var tsW = (availW - (N + 1) * TILE_GAP * S) / N;
  var tsH = (availH - (N + 1) * TILE_GAP * S) / N;
  tileSize = Math.max(10, Math.min(tsW, tsH));
  boardW = N * tileSize + (N + 1) * TILE_GAP * S;
  boardH = N * tileSize + (N + 1) * TILE_GAP * S;
  boardX = (W - boardW) / 2;
  boardY = topPad + (availH - boardH) / 2;
}
function cellCenter(r, c) {
  var g = TILE_GAP * GF.S;
  return {
    x: boardX + g + c * (tileSize + g) + tileSize / 2,
    y: boardY + g + r * (tileSize + g) + tileSize / 2,
  };
}

// ── BOARD SETUP ────────────────────────────────────────────────────────────────
function setBoardDifficulty() {
  // escalate as boards climb (see DESIGN Ten-minute loop)
  startSeeds   = START_SEEDS + (board >= 3 ? 1 : 0) + Math.floor(Math.max(0, board - 3) / 2);
  spreadPerTurn = ROT_SPREAD_PER_TURN + Math.floor((board - 1) / 2); // +1 every 2 boards
  quota        = BOARD_QUOTA + (board - 1) * QUOTA_STEP;
}
function freshCell(r, c) {
  var ctr = cellCenter(r, c);
  var cell = {
    letter: randLetter(), rot: false, gold: false, bleach: false, spore: false,
    x: ctr.x, y: ctr.y - boardH, tx: ctr.x, ty: ctr.y, pop: 0, rotAnim: 0,
  };
  if (Math.random() < GOLD_CHANCE) cell.gold = true;
  // bleach power tiles appear from BLEACH_BOARD onward (rare)
  else if (board >= BLEACH_BOARD && Math.random() < 0.05) cell.bleach = true;
  return cell;
}
function makeRot(cell) {
  cell.rot = true; cell.gold = false; cell.bleach = false; cell.rotAnim = 0;
  // late boards: some rot tiles become spores (can jump)
  cell.spore = (board >= SPORE_BOARD && Math.random() < 0.30);
}
function makeClean(cell) {
  cell.rot = false; cell.spore = false; cell.letter = randLetter(); cell.pop = 1;
  if (Math.random() < GOLD_CHANCE) cell.gold = true;
}

function newBoard() {
  N = GRID_N;
  computeLayout();
  setBoardDifficulty();
  grid = [];
  for (var r = 0; r < N; r++) {
    var rowArr = [];
    for (var c = 0; c < N; c++) rowArr.push(freshCell(r, c));
    grid.push(rowArr);
  }
  // seed rot away from the top-left so an easy opening word is always available
  seedRot(startSeeds);
  ensureOpeningWord();
  scrubProfanity();
  recountRot();
}

function seedRot(n) {
  var placed = 0, tries = 0;
  while (placed < n && tries < 400) {
    tries++;
    var r = (Math.random() * N) | 0, c = (Math.random() * N) | 0;
    // keep seeds out of the top two rows so the opening is friendly
    if (r < 2) continue;
    var cell = grid[r][c];
    if (cell.rot) continue;
    makeRot(cell);
    placed++;
  }
}

// Guarantee a traceable 3-letter dictionary word in the top two rows on board
// open (time-to-first-fun). Overwrite three adjacent clean tiles with a word.
function ensureOpeningWord() {
  var seeds = ['cat', 'dog', 'sun', 'pen', 'rat', 'map', 'top', 'bed', 'net', 'cup', 'sea', 'pot', 'arm', 'ear', 'tea'];
  var w = seeds[(Math.random() * seeds.length) | 0];
  var r = 0, c = 0; // place horizontally along row 0
  for (var i = 0; i < w.length && c + i < N; i++) {
    var cell = grid[r][c + i];
    cell.rot = false; cell.spore = false; cell.gold = false; cell.bleach = false;
    cell.letter = w.charAt(i).toUpperCase();
  }
}

// ── GAME LIFECYCLE ──────────────────────────────────────────────────────────────
function startGame() {
  score = 0; board = 1; chain = 0;
  wordsThisBoard = 0;
  boardFlash = 0; lastEvent = ''; lastEventT = 0;
  path = []; dragging = false;
  showTutorialPanel = false;
  newBoard();
  gs = 'PLAYING';
  if (!seenTut) { seenTut = true; try { localStorage.setItem(SEEN_TUT_KEY, '1'); } catch (e) {} }
  GF.gameStarted();
  GF.saveRun();
}

function nextBoard() {
  board++;
  wordsThisBoard = 0;
  boardFlash = 1;
  newBoard();
  gs = 'PLAYING';
  sfxLevel();
  GF.setShake(0.4);
  GF.saveRun();
}

function gameOver() {
  var nb = score > best;
  if (nb) { best = score; saveBest(); }
  gs = 'GAMEOVER';
  sfxLose();
  GF.gameEnded();
  GF.saveRun();
  if (nb && best > 0) GF.happytime();
}

// ── ROT LOGIC (the non-timer spatial pressure) ───────────────────────────────────
function recountRot() {
  var n = 0;
  for (var r = 0; r < N; r++) for (var c = 0; c < N; c++) { if (grid[r][c] && grid[r][c].rot) n++; }
  rotCount = n;
  totalTiles = N * N;
}
function neighbours(r, c) {
  var out = [];
  for (var dr = -1; dr <= 1; dr++) for (var dc = -1; dc <= 1; dc++) {
    if (dr === 0 && dc === 0) continue;
    var nr = r + dr, nc = c + dc;
    if (nr >= 0 && nr < N && nc >= 0 && nc < N) out.push({ r: nr, c: nc });
  }
  return out;
}

// The rot takes its turn: each rotten tile tries to infect adjacent clean tiles;
// spore tiles can also jump to a distant clean tile. Spread budget per turn =
// spreadPerTurn (scales with board). Returns nothing; updates grid + rotCount.
function rotTurn() {
  // collect current rotten sources (snapshot so freshly-rotted tiles don't chain
  // within the same turn)
  var sources = [];
  for (var r = 0; r < N; r++) for (var c = 0; c < N; c++) {
    if (grid[r][c] && grid[r][c].rot) sources.push({ r: r, c: c, spore: grid[r][c].spore });
  }
  if (sources.length === 0) return;

  // build a list of candidate clean targets adjacent to any rot
  var candidates = [];
  for (var i = 0; i < sources.length; i++) {
    var nbs = neighbours(sources[i].r, sources[i].c);
    for (var j = 0; j < nbs.length; j++) {
      var t = grid[nbs[j].r][nbs[j].c];
      if (t && !t.rot) candidates.push(nbs[j]);
    }
  }
  // shuffle candidates and infect up to spreadPerTurn unique tiles
  shuffle(candidates);
  var infected = 0, seen = {};
  for (var k = 0; k < candidates.length && infected < spreadPerTurn; k++) {
    var key = candidates[k].r + ',' + candidates[k].c;
    if (seen[key]) continue;
    seen[key] = 1;
    var cell = grid[candidates[k].r][candidates[k].c];
    makeRot(cell);
    GF.spawnParticles(cell.x, cell.y, '#8a4fd8', 5);
    GF.spawnParticles(cell.x, cell.y, '#3a1d5e', 4);
    infected++;
  }

  // spore jump: each spore source has a chance to seed a new distant colony
  for (var s = 0; s < sources.length; s++) {
    if (!sources[s].spore) continue;
    if (Math.random() < 0.5) {
      var clean = [];
      for (var rr = 0; rr < N; rr++) for (var cc = 0; cc < N; cc++) {
        if (grid[rr][cc] && !grid[rr][cc].rot && !isAdjacentToRot(rr, cc)) clean.push({ r: rr, c: cc });
      }
      if (clean.length) {
        var pick = clean[(Math.random() * clean.length) | 0];
        var pc = grid[pick.r][pick.c];
        makeRot(pc);
        GF.spawnParticles(pc.x, pc.y, '#b06bff', 8);
        flashEvent('spore');
      }
    }
  }

  GF.setShake(0.28);
  sfxRot();
  recountRot();
  if (rotCount / totalTiles >= ROT_LOSE_FRAC) gameOver();
}
function isAdjacentToRot(r, c) {
  var nbs = neighbours(r, c);
  for (var i = 0; i < nbs.length; i++) { if (grid[nbs[i].r][nbs[i].c].rot) return true; }
  return false;
}
function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) { var j = (Math.random() * (i + 1)) | 0; var tmp = a[i]; a[i] = a[j]; a[j] = tmp; }
}

// PASS: skip spelling, let the rot advance one turn.
function passTurn() {
  if (gs !== 'PLAYING' || showTutorialPanel) return;
  path = []; dragging = false;
  rotTurn();
  GF.saveRun();
}

// ── WORD SUBMISSION ───────────────────────────────────────────────────────────
function currentWord() {
  var s = '';
  for (var i = 0; i < path.length; i++) {
    var p = path[i];
    var cell = grid[p.r] && grid[p.r][p.c];
    if (cell) s += cell.letter;
  }
  return s;
}
function submitWord() {
  var w = currentWord();
  if (isWord(w)) {
    acceptWord(w);
  } else {
    if (path.length > 0) { GF.setShake(0.2); chain = 0; sfxBad(); }
    path = []; dragging = false;
  }
}

function acceptWord(w) {
  var len = w.length;
  // gather flags from the path
  var hasGold = false, hasBleach = false;
  for (var i = 0; i < path.length; i++) {
    var p = path[i]; var cell = grid[p.r] && grid[p.r][p.c];
    if (!cell) continue;
    if (cell.gold) hasGold = true;
    if (cell.bleach) hasBleach = true;
  }
  chain++;

  // scoring: len^2 * 2, gold doubles, chain bonus, big long-word bonus
  var base = len * len * 2;
  var chainMult = 1 + (chain - 1) * 0.2;
  var longBonus = (len >= 5) ? 1.5 : 1;
  var pts = Math.round(base * chainMult * longBonus * (hasGold ? 2 : 1));
  score += pts;
  if (score > best) { best = score; saveBest(); }

  // CLEANSE: any rot used IN the path, or within CLEANSE_RADIUS of the path,
  // gets wiped (turned back into a clean letter tile).
  var cleansed = cleanseAroundPath();

  // bleach: plus-blast each neighbour of the bleach tiles for a bigger wipe
  if (hasBleach) { bleachBlast(); flashEvent('bleach'); }

  // burst & clear the traced tiles
  var midp = path[(path.length / 2) | 0];
  var mc = midp ? grid[midp.r] && grid[midp.r][midp.c] : null;
  for (var k = 0; k < path.length; k++) {
    var pp = path[k]; var cc = grid[pp.r] && grid[pp.r][pp.c];
    if (cc) {
      GF.spawnParticles(cc.x, cc.y, '#7fe3ff', 6);
      GF.spawnParticles(cc.x, cc.y, '#ffffff', 4);
      cc._cleared = true;
    }
  }
  if (mc) {
    var ft = '+' + pts + (chain > 1 ? '  x' + chain : '');
    GF.spawnFloat(mc.x, mc.y - tileSize * 0.4, ft, hasGold ? '#ffd54a' : '#9be7ff');
  }
  if (len >= 5) flashEvent('longword');
  else if (cleansed > 0) flashEvent('cleanse');
  sfxWash(len);

  // replace cleared tiles with fresh letters (drop in)
  refillCleared();

  path = []; dragging = false;
  wordsThisBoard++;

  recountRot();

  // board clear?
  if (wordsThisBoard >= quota) { nextBoard(); return; }

  // THEN the rot takes its turn (unless cleansing already wiped it all)
  rotTurn();
  GF.saveRun();
}

// Cleanse rot tiles that are in the path or within CLEANSE_RADIUS of any path
// tile. Returns the count cleansed.
function cleanseAroundPath() {
  var toClean = {};
  for (var i = 0; i < path.length; i++) {
    var p = path[i];
    // the path tile itself (in case a future variant lets you trace through rot)
    markCleanseRadius(p.r, p.c, toClean);
  }
  var n = 0;
  for (var key in toClean) {
    if (!toClean.hasOwnProperty(key)) continue;
    var parts = key.split(',');
    var r = +parts[0], c = +parts[1];
    var cell = grid[r] && grid[r][c];
    if (cell && cell.rot) {
      makeClean(cell);
      GF.spawnParticles(cell.x, cell.y, '#6fe39a', 7);
      GF.spawnParticles(cell.x, cell.y, '#caffd8', 4);
      n++;
    }
  }
  return n;
}
function markCleanseRadius(r, c, acc) {
  for (var dr = -CLEANSE_RADIUS; dr <= CLEANSE_RADIUS; dr++) {
    for (var dc = -CLEANSE_RADIUS; dc <= CLEANSE_RADIUS; dc++) {
      var nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < N && nc >= 0 && nc < N) acc[nr + ',' + nc] = 1;
    }
  }
}
// bleach: wipe rot in a plus around every neighbour of each path tile (bigger)
function bleachBlast() {
  for (var i = 0; i < path.length; i++) {
    var p = path[i];
    var pts = [{ r: p.r, c: p.c }].concat(neighbours(p.r, p.c));
    for (var j = 0; j < pts.length; j++) {
      var cell = grid[pts[j].r] && grid[pts[j].r][pts[j].c];
      if (cell && cell.rot) {
        makeClean(cell);
        GF.spawnParticles(cell.x, cell.y, '#aef7ff', 7);
      }
    }
  }
}

// replace tiles flagged _cleared with fresh letters that drop from above
function refillCleared() {
  for (var r = 0; r < N; r++) for (var c = 0; c < N; c++) {
    var cell = grid[r][c];
    if (cell && cell._cleared) {
      var nc = freshCell(r, c);
      grid[r][c] = nc;
    }
  }
  scrubProfanity();
}

function flashEvent(key) { lastEvent = key; lastEventT = 1; }

// ── ADJACENCY / PATH ─────────────────────────────────────────────────────────────
function adjacent(a, b) {
  return Math.abs(a.r - b.r) <= 1 && Math.abs(a.c - b.c) <= 1 && !(a.r === b.r && a.c === b.c);
}
function inPath(rc) {
  for (var i = 0; i < path.length; i++) if (path[i].r === rc.r && path[i].c === rc.c) return i;
  return -1;
}
function tileAt(px, py) {
  var best = null, bestD = tileSize * 0.46;
  for (var r = 0; r < N; r++) for (var c = 0; c < N; c++) {
    var cell = grid[r][c];
    if (!cell || cell.rot) continue; // rotten tiles not selectable
    var ctr = cellCenter(r, c);
    var dx = px - ctr.x, dy = py - ctr.y;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d < bestD) { bestD = d; best = { r: r, c: c }; }
  }
  return best;
}

// ── INPUT (drag-to-spell, mouse + touch) ─────────────────────────────────────────
var canvas = GF.canvas;
var pointerDown = false;

function localXY(clientX, clientY) {
  var rect = canvas.getBoundingClientRect();
  return { x: (clientX - rect.left) * (GF.W / rect.width), y: (clientY - rect.top) * (GF.H / rect.height) };
}
function onPressXY(x, y) {
  if (checkButtons(x, y)) return;       // overlay + HUD buttons first
  if (gs !== 'PLAYING') return;
  if (showTutorialPanel) { showTutorialPanel = false; return; }
  var rc = tileAt(x, y);
  if (rc) { path = [rc]; dragging = true; sfxTick(1); }
}
function onMoveXY(x, y) {
  if (gs !== 'PLAYING' || !dragging) return;
  var rc = tileAt(x, y);
  if (!rc) return;
  var idx = inPath(rc);
  if (idx === -1) {
    var last = path[path.length - 1];
    if (last && adjacent(last, rc)) { path.push(rc); sfxTick(path.length); }
  } else if (idx === path.length - 2) {
    path.pop(); // backtrack
  }
}
function onReleaseXY() {
  if (gs !== 'PLAYING') { dragging = false; return; }
  if (dragging) submitWord();
}

canvas.addEventListener('mousedown', function (e) { pointerDown = true; var p = localXY(e.clientX, e.clientY); onPressXY(p.x, p.y); });
canvas.addEventListener('mousemove', function (e) { if (!pointerDown) return; var p = localXY(e.clientX, e.clientY); onMoveXY(p.x, p.y); });
window.addEventListener('mouseup', function () { if (!pointerDown) return; pointerDown = false; onReleaseXY(); });

canvas.addEventListener('touchstart', function (e) {
  e.preventDefault();
  var t = e.changedTouches[0]; var p = localXY(t.clientX, t.clientY);
  onPressXY(p.x, p.y);
}, { passive: false });
canvas.addEventListener('touchmove', function (e) {
  e.preventDefault();
  var t = e.changedTouches[0]; var p = localXY(t.clientX, t.clientY);
  onMoveXY(p.x, p.y);
}, { passive: false });
canvas.addEventListener('touchend', function (e) {
  e.preventDefault();
  onReleaseXY();
}, { passive: false });

// declarative buttons populated by overlays / HUD each frame
var buttons = [];
function checkButtons(x, y) {
  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { b.fn(); return true; }
  }
  return false;
}

// ── SFX (procedural Web Audio, no asset files) ───────────────────────────────────
var _ac = null;
function loadMute() { try { sfxMuted = (localStorage.getItem(MUTE_KEY) === '1'); } catch (e) {} }
function saveMute() { try { localStorage.setItem(MUTE_KEY, sfxMuted ? '1' : '0'); } catch (e) {} }
function ac() {
  if (!_ac) { try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (_ac && _ac.state === 'suspended') { try { _ac.resume(); } catch (e) {} }
  return _ac;
}
function tone(freq, dur, type, gain) {
  if (sfxMuted) return;
  var c = ac(); if (!c) return;
  try {
    var g = c.createGain(); var t0 = c.currentTime;
    g.gain.setValueAtTime(gain, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    g.connect(c.destination);
    var o = c.createOscillator();
    o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
    o.connect(g); o.start(t0); o.stop(t0 + dur + 0.02);
  } catch (e) {}
}
function sfxTick(n) { tone(420 + Math.min(n, 10) * 40, 0.05, 'triangle', 0.07); }
function sfxWash(len) { tone(520 + len * 30, 0.12, 'triangle', 0.16); setTimeout(function () { tone(780 + len * 30, 0.14, 'sine', 0.12); }, 60); }
function sfxBad() { tone(150, 0.18, 'sawtooth', 0.13); }
function sfxRot() { tone(120, 0.22, 'sawtooth', 0.12); setTimeout(function () { tone(90, 0.18, 'sawtooth', 0.1); }, 70); }
function sfxLevel() { var notes = [523, 659, 784]; for (var i = 0; i < notes.length; i++) (function (idx, f) { setTimeout(function () { tone(f, 0.2, 'sine', 0.16); }, idx * 80); })(i, notes[i]); }
function sfxLose() { if (sfxMuted) return; var c = ac(); if (!c) return; try { var g = c.createGain(); var t0 = c.currentTime; g.gain.setValueAtTime(0.2, t0); g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.5); g.connect(c.destination); var o = c.createOscillator(); o.type = 'sawtooth'; o.frequency.setValueAtTime(380, t0); o.frequency.exponentialRampToValueAtTime(90, t0 + 0.45); o.connect(g); o.start(t0); o.stop(t0 + 0.5); } catch (e) {} }
function toggleMute() { sfxMuted = !sfxMuted; saveMute(); if (!sfxMuted) ac(); }

// ── UPDATE ─────────────────────────────────────────────────────────────────────
function update(dt) {
  if (boardFlash > 0) boardFlash = Math.max(0, boardFlash - dt * 1.3);
  if (lastEventT > 0) lastEventT = Math.max(0, lastEventT - dt * 0.8);
  dangerPulse += dt * 4;
  rotPulse += dt * 3;
  // animate cells sliding/popping toward target
  for (var r = 0; r < N; r++) for (var c = 0; c < N; c++) {
    var cell = grid[r] && grid[r][c];
    if (!cell) continue;
    cell.x += (cell.tx - cell.x) * Math.min(1, dt * 14);
    cell.y += (cell.ty - cell.y) * Math.min(1, dt * 14);
    if (cell.pop > 0) cell.pop = Math.max(0, cell.pop - dt * 3);
    if (cell.rot && cell.rotAnim < 1) cell.rotAnim = Math.min(1, cell.rotAnim + dt * 5);
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────────
function draw(ctx) {
  var W = GF.W, H = GF.H;
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#140a22'); g.addColorStop(1, '#0a0712');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  if (gs === 'PLAYING') {
    drawBoard(ctx);
    drawPath(ctx);
    drawHUD(ctx);
    drawFooter(ctx);
    if (boardFlash > 0) drawBoardFlash(ctx);
    if (showTutorialPanel) drawHelpPanel(ctx);
  } else if (gs === 'MENU') {
    drawMenu(ctx);
  } else if (gs === 'GAMEOVER') {
    drawBoard(ctx);
    drawEndOverlay(ctx);
  }
}

function tileColors(cell, selected) {
  if (cell.rot)    return { top: '#5a2f8a', bot: '#2c1248', text: '#000', edge: '#1a0a30' };
  if (selected)    return { top: '#ffe27a', bot: '#f5b942', text: '#3a2a06', edge: '#c98a1e' };
  if (cell.gold)   return { top: '#ffd54a', bot: '#e8a93a', text: '#4a3306', edge: '#b9821f' };
  if (cell.bleach) return { top: '#bfffff', bot: '#6fd8e8', text: '#063a42', edge: '#2f9fb0' };
  return { top: '#eaf6ff', bot: '#bfe0f5', text: '#123', edge: '#8fb8d6' };
}
function drawTile(ctx, cell, r, c, selected) {
  var s = tileSize, half = s / 2;
  var pop = cell.pop > 0 ? (1 + cell.pop * 0.12) : 1;
  var ds = s * pop;
  var x = cell.x - ds / 2, y = cell.y - ds / 2;
  var rad = Math.max(4, ds * 0.16);
  var col = tileColors(cell, selected);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  GF.rr(ctx, x + 2, y + 3, ds, ds, rad); ctx.fill();
  // body
  var grad = ctx.createLinearGradient(x, y, x, y + ds);
  grad.addColorStop(0, col.top); grad.addColorStop(1, col.bot);
  GF.rr(ctx, x, y, ds, ds, rad); ctx.fillStyle = grad; ctx.fill();
  ctx.lineWidth = Math.max(1, ds * 0.03); ctx.strokeStyle = col.edge; GF.rr(ctx, x, y, ds, ds, rad); ctx.stroke();

  if (cell.rot) {
    drawMold(ctx, x, y, ds, cell);
    return;
  }
  // glossy highlight
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  GF.rr(ctx, x + ds * 0.12, y + ds * 0.1, ds * 0.76, ds * 0.26, rad * 0.6); ctx.fill();
  // letter
  ctx.fillStyle = col.text;
  ctx.font = 'bold ' + (ds * 0.5) + 'px -apple-system, Segoe UI, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(cell.letter, cell.x, cell.y + ds * 0.02);
  // badges
  if (cell.gold) {
    ctx.fillStyle = '#b9261e'; ctx.font = 'bold ' + (ds * 0.2) + 'px sans-serif';
    ctx.fillText('x2', x + ds * 0.8, y + ds * 0.8);
  } else if (cell.bleach) {
    // small droplet glyph
    ctx.fillStyle = '#0a5a66'; ctx.font = 'bold ' + (ds * 0.22) + 'px sans-serif';
    ctx.fillText('✦', x + ds * 0.8, y + ds * 0.8);
  }
}
function drawMold(ctx, x, y, s, cell) {
  var a = cell.rotAnim;
  var spriteName = cell.spore ? 'spore' : 'rot';
  ctx.save();
  ctx.globalAlpha = 0.92 * a + 0.08;
  // AI mold sprite overlay (drawn over the dark rotten tile base); procedural
  // blobs are the fallback if the sprite 404s / hasn't loaded.
  GF.drawSprite(spriteName, x + s / 2, y + s / 2, s * 0.98, function (c, cxp, cyp, sz) {
    var bx = cxp - sz / 2, by = cyp - sz / 2;
    c.fillStyle = 'rgba(20,8,38,0.85)';
    var blobs = [[0.3, 0.35, 0.22], [0.66, 0.4, 0.18], [0.45, 0.68, 0.2], [0.72, 0.72, 0.14], [0.25, 0.62, 0.12]];
    for (var i = 0; i < blobs.length; i++) {
      c.beginPath(); c.arc(bx + sz * blobs[i][0], by + sz * blobs[i][1], sz * blobs[i][2], 0, 7); c.fill();
    }
    c.fillStyle = 'rgba(150,90,210,0.55)';
    c.beginPath(); c.arc(bx + sz * 0.4, by + sz * 0.4, sz * 0.05, 0, 7); c.fill();
    c.beginPath(); c.arc(bx + sz * 0.62, by + sz * 0.6, sz * 0.045, 0, 7); c.fill();
  });
  if (cell.spore) {
    // spore pulse ring to telegraph the jump threat (on top of sprite)
    ctx.globalAlpha = 0.6 + 0.4 * Math.sin(rotPulse * 2);
    ctx.strokeStyle = '#e0a0ff'; ctx.lineWidth = Math.max(1.5, s * 0.05);
    ctx.beginPath(); ctx.arc(x + s * 0.5, y + s * 0.5, s * 0.33, 0, 7); ctx.stroke();
  }

}
function drawBoard(ctx) {
  var rad = Math.max(6, 14 * GF.S);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  GF.rr(ctx, boardX - 4, boardY - 4, boardW + 8, boardH + 8, rad); ctx.fill();
  for (var r = 0; r < N; r++) for (var c = 0; c < N; c++) {
    var cell = grid[r] && grid[r][c];
    if (!cell) continue;
    var sel = inPath({ r: r, c: c }) !== -1;

  }
}
function drawPath(ctx) {
  if (path.length < 1) return;

  ctx.lineWidth = Math.max(4, tileSize * 0.18);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  for (var i = 0; i < path.length; i++) {
    var cell = grid[path[i].r] && grid[path[i].r][path[i].c];
    if (!cell) continue;
    if (i === 0) ctx.moveTo(cell.x, cell.y); else ctx.lineTo(cell.x, cell.y);
  }
  ctx.stroke();
  for (var j = 0; j < path.length; j++) {
    var cc = grid[path[j].r] && grid[path[j].r][path[j].c];
    if (!cc) continue;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.arc(cc.x, cc.y, tileSize * 0.1, 0, 7); ctx.fill();

function drawHUD(ctx) {
  var W = GF.W, S = GF.S;
  buttons = [];
  var pad = 12 * S;
  var fs = GF.clamp(15 * S, 12, 22);
  ctx.textBaseline = 'top';

  // LEFT: board + word quota meter

  ctx.font = 'bold ' + fs + 'px -apple-system, Segoe UI, sans-serif';
  ctx.fillText(GF.t('board') + ' ' + board, pad, pad);
  ctx.fillStyle = '#b39ad6'; ctx.font = (fs * 0.82) + 'px sans-serif';
  ctx.fillText(GF.t('words') + ' ' + wordsThisBoard + '/' + quota, pad, pad + fs * 1.25);
  var barW = 92 * S, barH = 6 * S, barY = pad + fs * 2.5;
  ctx.fillStyle = 'rgba(255,255,255,0.12)'; GF.rr(ctx, pad, barY, barW, barH, barH / 2); ctx.fill();
  var frac = Math.min(1, wordsThisBoard / quota);
  ctx.fillStyle = '#5fd38a'; GF.rr(ctx, pad, barY, Math.max(barH, barW * frac), barH, barH / 2); ctx.fill();

  // RIGHT: score + best
  ctx.textAlign = 'right'; ctx.fillStyle = '#ffffff';
  ctx.font = 'bold ' + (fs * 1.15) + 'px -apple-system, Segoe UI, sans-serif';
  ctx.fillText(score + '', W - pad, pad);
  ctx.fillStyle = '#b39ad6'; ctx.font = (fs * 0.78) + 'px sans-serif';
  ctx.fillText(GF.t('best') + ' ' + best, W - pad, pad + fs * 1.4);

  // CENTER: traced word, OR rot meter (lose-condition signal), OR event flash

  var cw = currentWord();
  if (cw) {
    var valid = isWord(cw);
    ctx.fillStyle = valid ? '#9be7ff' : '#ffffff';
    ctx.font = 'bold ' + GF.clamp(22 * S, 16, 32) + 'px -apple-system, Segoe UI, sans-serif';
    ctx.fillText(cw.toUpperCase(), W / 2, pad - 2 * S);
    if (valid) {
      ctx.fillStyle = '#6fe39a'; ctx.font = (fs * 0.8) + 'px sans-serif';
      ctx.fillText('✓', W / 2, pad + GF.clamp(22 * S, 16, 32));
    }
  } else if (lastEventT > 0 && lastEvent) {
    ctx.globalAlpha = Math.min(1, lastEventT * 1.4);
    var ecol = lastEvent === 'spore' ? '#c98bff' : (lastEvent === 'cleanse' ? '#6fe39a' : (lastEvent === 'bleach' ? '#7fe6ff' : '#ffd54a'));
    ctx.fillStyle = ecol; ctx.font = 'bold ' + GF.clamp(20 * S, 15, 28) + 'px -apple-system, Segoe UI, sans-serif';
    ctx.fillText(GF.t(lastEvent), W / 2, pad);
    ctx.globalAlpha = 1;
  } else {
    var pct = Math.round((rotCount / totalTiles) * 100);
    var near = (rotCount / totalTiles) >= (ROT_LOSE_FRAC - 0.12);
    ctx.fillStyle = near ? ('rgba(200,80,255,' + (0.6 + 0.4 * Math.sin(dangerPulse)) + ')') : '#9a86c0';
    ctx.font = 'bold ' + (fs * 0.95) + 'px -apple-system, Segoe UI, sans-serif';
    ctx.fillText((near ? GF.t('danger') + '  ' : GF.t('rot') + ' ') + pct + '%', W / 2, pad);
    // thin rot bar under the percent (toward the 70% lose line)
    var rbW = 110 * S, rbH = 5 * S, rbY = pad + fs * 1.35;
    ctx.fillStyle = 'rgba(255,255,255,0.10)'; GF.rr(ctx, W / 2 - rbW / 2, rbY, rbW, rbH, rbH / 2); ctx.fill();
    var rfrac = Math.min(1, (rotCount / totalTiles) / ROT_LOSE_FRAC);
    ctx.fillStyle = near ? '#d36bff' : '#8a4fd8'; GF.rr(ctx, W / 2 - rbW / 2, rbY, Math.max(rbH, rbW * rfrac), rbH, rbH / 2); ctx.fill();
  }

  // ? help + sound buttons (top, below the center line to avoid number overlap)
  var bs = GF.clamp(30 * S, 26, 40);
  var hx = W / 2 - bs * 1.2, hy = pad + GF.clamp(44 * S, 32, 56);
  drawIconButton(ctx, hx, hy, bs, '?', function () { showTutorialPanel = true; });
  var sx = W / 2 + bs * 0.2, sy = hy;
  drawIconButton(ctx, sx, sy, bs, sfxMuted ? '✕' : '♪', function () { toggleMute(); });
}
function drawIconButton(ctx, x, y, s, glyph, fn) {

  GF.rr(ctx, x, y, s, s, s * 0.28); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; GF.rr(ctx, x, y, s, s, s * 0.28); ctx.stroke();
  ctx.fillStyle = '#e6d6ff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + (s * 0.5) + 'px sans-serif';

  ctx.textBaseline = 'top';
  buttons.push({ x: x, y: y, w: s, h: s, fn: fn });
}

// PASS pill at the bottom (second control affordance, thumb-reachable)
function drawFooter(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  var bw = GF.clamp(170 * S, 130, 240), bh = GF.clamp(46 * S, 38, 58);
  var bx = W / 2 - bw / 2, by = H - bh - GF.clamp(14 * S, 10, 22);
  var grad = ctx.createLinearGradient(bx, by, bx, by + bh);
  grad.addColorStop(0, '#6a4fa0'); grad.addColorStop(1, '#473070');
  GF.rr(ctx, bx, by, bw, bh, bh / 2); ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = 'rgba(200,160,255,0.4)'; ctx.lineWidth = 1.5; GF.rr(ctx, bx, by, bw, bh, bh / 2); ctx.stroke();
  ctx.fillStyle = '#f0e6ff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(17 * S, 13, 22) + 'px -apple-system, Segoe UI, sans-serif';
  ctx.fillText(GF.t('pass') + '  ↻', W / 2, by + bh / 2 + 1);
  ctx.textBaseline = 'top';
  buttons.push({ x: bx, y: by, w: bw, h: bh, fn: passTurn });
}

function drawBoardFlash(ctx) {
  var a = boardFlash;
  ctx.globalAlpha = Math.min(1, a * 1.5);
  ctx.fillStyle = '#ffd54a';
  ctx.font = 'bold ' + GF.clamp(44 * GF.S, 28, 70) + 'px -apple-system, Segoe UI, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('boardflash') + ' ' + board, GF.W / 2, GF.H * 0.32);
  ctx.globalAlpha = 1; ctx.textBaseline = 'top';
}

// ── TEXT WRAP (measured physical lines) ──────────────────────────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

// ── MENU ─────────────────────────────────────────────────────────────────────
function drawMenu(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  buttons = [];
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(180,107,255,0.55)'; ctx.shadowBlur = 26 * S;
  ctx.font = 'bold ' + GF.clamp(40 * S, 24, 56) + 'px -apple-system, Segoe UI, sans-serif';
  ctx.textBaseline = 'alphabetic';
  var titleY = H * 0.13;
  ctx.fillText(GF.t('title'), W / 2, titleY);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#c8a9ff'; ctx.font = (GF.clamp(15 * S, 12, 20)) + 'px sans-serif';
  ctx.fillText(GF.t('sub'), W / 2, titleY + GF.clamp(26 * S, 18, 34));

  drawTilePreview(ctx, titleY + GF.clamp(44 * S, 30, 60));

  var startY = H * 0.30;
  drawTutorialBlock(ctx, startY, seenTut);

  var bw = GF.clamp(240 * S, 170, 320), bh = GF.clamp(56 * S, 46, 70);
  // Desktop-wide: enlarged + animated; mobile: unchanged
  var wide = W / H > 1.15;
  var drawBw = wide ? bw * 1.4 : bw, drawBh = wide ? bh * 1.4 : bh;
  var by = wide ? Math.max(H * 0.60, H * 0.56) : H * 0.76;
  var bx = W / 2 - drawBw / 2;
  if (wide) {
    var _t = performance.now() / 1000, _k = Math.sin(_t * 2.2), _p = 1 + 0.05 * _k;
    var _dw = drawBw * _p, _dh = drawBh * _p, _ax = W / 2 - _dw / 2, _ay = by + drawBh / 2 - _dh / 2;
    ctx.save();
    ctx.shadowColor = 'rgba(66,214,138,' + (0.4 + 0.28 * _k).toFixed(3) + ')'; ctx.shadowBlur = (22 + 10 * _k) * S;
    var _g = ctx.createLinearGradient(_ax, _ay, _ax, _ay + _dh);
    _g.addColorStop(0, '#42d68a'); _g.addColorStop(1, '#1f9e63');
    GF.rr(ctx, _ax, _ay, _dw, _dh, _dh / 2); ctx.fillStyle = _g; ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(22 * S, 16, 30) + 'px -apple-system, Segoe UI, sans-serif';
    ctx.fillText('▶ ' + GF.t('play'), W / 2, by + drawBh / 2 + 1);
    ctx.textBaseline = 'alphabetic';
    // Stable hit-rect at base size
    buttons.push({ x: W / 2 - bw / 2, y: by, w: bw, h: drawBh, fn: function () { startGame(); } });
  } else {
    drawBigButton(ctx, bx, by, bw, bh, GF.t('play'), function () { startGame(); });
  }
  if (best > 0) {
    ctx.fillStyle = '#8a7aac'; ctx.font = GF.clamp(13 * S, 10, 16) + 'px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(GF.t('best') + ': ' + best, W / 2, by + drawBh + GF.clamp(24 * S, 16, 30));
  }
}
function drawTilePreview(ctx, y) {
  var S = GF.S, demo = ['S', 'P', 'E', 'L', 'L'];
  var sz = GF.clamp(34 * S, 22, 46), gap = 6 * S;
  var totalW = demo.length * sz + (demo.length - 1) * gap;
  var x0 = GF.W / 2 - totalW / 2;
  for (var i = 0; i < demo.length; i++) {
    var x = x0 + i * (sz + gap);
    var rotten = i >= 3; // last two rotten to telegraph clean→mold contrast
    var rad = sz * 0.18;
    var col = rotten ? { top: '#5a2f8a', bot: '#2c1248', edge: '#1a0a30' }
                     : { top: '#eaf6ff', bot: '#bfe0f5', edge: '#8fb8d6', text: '#123' };
    var grad = ctx.createLinearGradient(x, y, x, y + sz);
    grad.addColorStop(0, col.top); grad.addColorStop(1, col.bot);
    GF.rr(ctx, x, y, sz, sz, rad); ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = col.edge; ctx.lineWidth = 1; GF.rr(ctx, x, y, sz, sz, rad); ctx.stroke();
    if (rotten) {
      ctx.fillStyle = 'rgba(20,8,38,0.85)';
      ctx.beginPath(); ctx.arc(x + sz * 0.42, y + sz * 0.45, sz * 0.24, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(x + sz * 0.66, y + sz * 0.62, sz * 0.16, 0, 7); ctx.fill();
      ctx.fillStyle = 'rgba(150,90,210,0.5)';
      ctx.beginPath(); ctx.arc(x + sz * 0.5, y + sz * 0.5, sz * 0.05, 0, 7); ctx.fill();
    } else {
      ctx.fillStyle = col.text; ctx.font = 'bold ' + (sz * 0.5) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(demo[i], x + sz / 2, y + sz / 2);
    }
  }
  ctx.textBaseline = 'alphabetic';
}
function drawTutorialBlock(ctx, startY, condensed) {
  var W = GF.W, S = GF.S;
  var maxW = Math.min(W - 40 * S, 460 * S);
  var x = W / 2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var fs = GF.clamp(14 * S, 11, 17);
  var lineH = fs * 1.32;
  var y = startY;

  if (condensed) {
    ctx.fillStyle = '#b39ad6'; ctx.font = fs + 'px sans-serif';
    var lines = wrapLines(ctx, GF.t('backReminder'), maxW);
    for (var i = 0; i < lines.length; i++) { ctx.fillText(lines[i], x, y); y += lineH; }
    return;
  }
  ctx.fillStyle = '#ffd54a'; ctx.font = 'bold ' + (fs * 1.05) + 'px sans-serif';
  ctx.fillText(GF.t('howto'), x, y); y += lineH * 1.25;

  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var colors = ['#eaf6ff', '#cfe8ff', '#bfe0a8', '#e0a8ff', '#ffe2a0'];
  ctx.font = fs + 'px sans-serif';
  for (var k = 0; k < keys.length; k++) {
    ctx.fillStyle = colors[k];
    var lns = wrapLines(ctx, GF.t(keys[k]), maxW);
    for (var j = 0; j < lns.length; j++) { ctx.fillText(lns[j], x, y); y += lineH; }
    y += lineH * 0.18;
  }
}
function drawHelpPanel(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(10,7,18,0.93)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#ffd54a'; ctx.font = 'bold ' + GF.clamp(22 * S, 16, 30) + 'px sans-serif';
  ctx.fillText(GF.t('howto'), W / 2, H * 0.13);
  drawTutorialBlock(ctx, H * 0.21, false);
  ctx.fillStyle = '#8a7aac'; ctx.font = GF.clamp(13 * S, 11, 16) + 'px sans-serif';
  ctx.fillText((GF.lang === 'ru' ? 'нажми, чтобы закрыть' : 'tap to close'), W / 2, H * 0.88);
  buttons.push({ x: 0, y: 0, w: W, h: H, fn: function () { showTutorialPanel = false; } });
}

// ── END OVERLAY (GAMEOVER) ─────────────────────────────────────────────────────────
function drawEndOverlay(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  buttons = [];
  ctx.fillStyle = 'rgba(10,7,18,0.86)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#c98bff';
  ctx.shadowColor = 'rgba(180,107,255,0.5)'; ctx.shadowBlur = 24 * S;
  ctx.font = 'bold ' + GF.clamp(42 * S, 28, 60) + 'px -apple-system, Segoe UI, sans-serif';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t('gameover'), W / 2, H * 0.32);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#cfc0e8'; ctx.font = 'bold ' + GF.clamp(18 * S, 14, 24) + 'px sans-serif';
  ctx.fillText(GF.t('board') + ' ' + board, W / 2, H * 0.32 + GF.clamp(34 * S, 24, 46));
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(24 * S, 18, 34) + 'px sans-serif';
  ctx.fillText(GF.t('score') + ': ' + score, W / 2, H * 0.32 + GF.clamp(64 * S, 46, 84));
  ctx.fillStyle = '#c8a9ff'; ctx.font = GF.clamp(16 * S, 12, 22) + 'px sans-serif';
  ctx.fillText(GF.t('best') + ': ' + best, W / 2, H * 0.32 + GF.clamp(92 * S, 66, 116));

  var bw = GF.clamp(240 * S, 170, 320), bh = GF.clamp(56 * S, 46, 70);
  var bx = W / 2 - bw / 2, by = H * 0.58;
  drawBigButton(ctx, bx, by, bw, bh, GF.t('retry'), function () { startGame(); });
}

function drawBigButton(ctx, x, y, w, h, label, fn) {
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, '#42d68a'); grad.addColorStop(1, '#1f9e63');
  GF.rr(ctx, x, y, w, h, h / 2); ctx.fillStyle = grad; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(20 * GF.S, 16, 28) + 'px -apple-system, Segoe UI, sans-serif';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1);
  ctx.textBaseline = 'alphabetic';
  buttons.push({ x: x, y: y, w: w, h: h, fn: fn });
}

// ── SCREENSHOT / TEST HOOKS ───────────────────────────────────────────────────────
// Land directly on a populated mid-play board with mold spreading + a partial
// traced word, for Yandex 5.1.1 >=70% gameplay screenshots. Portrait game.
window._setupForScreenshot = function (lvl) {
  startGame();
  board = Math.max(1, lvl || 4);
  setBoardDifficulty();
  wordsThisBoard = Math.min(quota - 1, Math.floor(board / 2) + 1);
  score = 1400 + board * 720;
  newBoard();
  // paint a chunky, visible rot region (a spreading colony) for the cover-state
  paintRotBlob();
  recountRot();
  // seed a plausible traced path across clean tiles near the mold
  path = [];
  outer:
  for (var r = 0; r < N; r++) {
    var run = [];
    for (var c = 0; c < N; c++) {
      var cell = grid[r][c];
      if (cell && !cell.rot) { run.push({ r: r, c: c }); if (run.length >= 4) { path = run.slice(0, 4); break outer; } }
      else run = [];
    }
  }
  // snap cells to targets so the screenshot isn't mid-slide
  for (var rr = 0; rr < N; rr++) for (var cc = 0; cc < N; cc++) { var ce = grid[rr][cc]; if (ce) { ce.x = ce.tx; ce.y = ce.ty; ce.pop = 0; ce.rotAnim = 1; } }
  gs = 'PLAYING';
};
function paintRotBlob() {
  // turn a diagonal-ish cluster in the lower-middle into rot, leaving the top
  // clear (so a traced word is visible) — looks like a colony eating the board
  var spots = [[3, 1], [3, 2], [4, 2], [4, 3], [5, 3], [2, 4], [3, 4], [4, 4], [5, 4], [4, 5], [5, 5], [2, 1]];
  for (var i = 0; i < spots.length; i++) {
    var r = spots[i][0], c = spots[i][1];
    if (r < N && c < N && grid[r][c]) { makeRot(grid[r][c]); if (board >= SPORE_BOARD && i % 4 === 0) grid[r][c].spore = true; }
  }
}

// _jumpLevel — gate harness contract:
//   n=99 → terminal (GAMEOVER), else → PLAYING at board n
window._jumpLevel = function (n) {
  if (n === 99 || n === 98) {
    startGame();
    // flood the board with rot to force the lose condition deterministically
    for (var r = 0; r < N; r++) for (var c = 0; c < N; c++) { if (grid[r][c]) makeRot(grid[r][c]); }
    recountRot();
    gameOver();
    return;
  }
  window._setupForScreenshot(n || 4);
};
window._setLang = function (l) { GF.lang = l; };
// audit hooks for the locale-overflow tool
window._setState = function (s) { gs = s; };
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return '-apple-system, Segoe UI, sans-serif'; };
// test-only geometry/grid readers (used by the headless playtest; harmless to ship)
window._cellCenters = function () {
  var out = [];
  for (var r = 0; r < N; r++) { var row = []; for (var c = 0; c < N; c++) { row.push(cellCenter(r, c)); } out.push(row); }
  return out;
};
window._forceHelp = function () { showTutorialPanel = true; };
window._gridSnapshot = function () {
  var out = [];
  for (var r = 0; r < N; r++) { var row = []; for (var c = 0; c < N; c++) { var ce = grid[r][c]; row.push(ce ? { l: ce.letter, rot: ce.rot } : null); } out.push(row); }
  return out;
};

// ── BOOT ─────────────────────────────────────────────────────────────────────
buildDict();
GF.init({
  designW: 480,
  designH: 820,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'spell_or_spoil',
  onReady: function () {
    try { best = parseInt(localStorage.getItem(BEST_KEY) || '0') || 0; } catch (e) {}
    try { seenTut = (localStorage.getItem(SEEN_TUT_KEY) === '1'); } catch (e) {}
    loadMute();
    computeLayout();
    // Yandex 1.9 — persist run across reload. Save board + progression + grid.
    GF.persist('spell_or_spoil_run_v1',
      function () {
        return {
          gs: gs, score: score, best: best, board: board,
          wordsThisBoard: wordsThisBoard, quota: quota,
          spreadPerTurn: spreadPerTurn, startSeeds: startSeeds,
          grid: serializeGrid(),
        };
      },
      function (s) {
        if (!s) return;
        best = s.best || best;
        if (s.gs === 'PLAYING' && s.grid && s.grid.length) {
          score = s.score || 0; board = s.board || 1;
          wordsThisBoard = s.wordsThisBoard || 0;
          quota = s.quota || BOARD_QUOTA;
          spreadPerTurn = s.spreadPerTurn || ROT_SPREAD_PER_TURN;
          startSeeds = s.startSeeds || START_SEEDS;
          N = GRID_N; computeLayout();
          deserializeGrid(s.grid);
          recountRot();
          gs = 'PLAYING';
        } else {
          gs = 'MENU';
        }
      }
    );
    if (gs !== 'PLAYING') gs = 'MENU';
  },
  onUpdate: update,
  onDraw: draw,
});

function serializeGrid() {
  var out = [];
  for (var r = 0; r < N; r++) {
    var row = [];
    for (var c = 0; c < N; c++) {
      var cell = grid[r] && grid[r][c];
      if (!cell) { row.push(null); continue; }
      row.push({ l: cell.letter, r: cell.rot ? 1 : 0, g: cell.gold ? 1 : 0, b: cell.bleach ? 1 : 0, s: cell.spore ? 1 : 0 });
    }
    out.push(row);
  }
  return out;
}
function deserializeGrid(data) {
  grid = [];
  for (var r = 0; r < data.length; r++) {
    var row = [];
    for (var c = 0; c < data[r].length; c++) {
      var d = data[r][c];
      var ctr = cellCenter(r, c);
      if (!d) { row.push(freshCell(r, c)); continue; }
      row.push({ letter: d.l || randLetter(), rot: !!d.r, gold: !!d.g, bleach: !!d.b, spore: !!d.s,
                 x: ctr.x, y: ctr.y, tx: ctr.x, ty: ctr.y, pop: 0, rotAnim: d.r ? 1 : 0 });
    }
    grid.push(row);
  }
}

// Expose state for the post-build-tester / yandex-testing harness (cross-checks DESIGN.md).
GF.exposeState(function () {
  return {
    gs: gs, score: score, best: best, board: board,
    wordsThisBoard: wordsThisBoard, quota: quota, chain: chain,
    rotCount: rotCount, totalTiles: totalTiles,
    rotFrac: totalTiles ? (rotCount / totalTiles) : 0,
    GRID_N: GRID_N, ROT_LOSE_FRAC: ROT_LOSE_FRAC,
    ROT_SPREAD_PER_TURN: ROT_SPREAD_PER_TURN, spreadPerTurn: spreadPerTurn,
    START_SEEDS: START_SEEDS, startSeeds: startSeeds,
    BOARD_QUOTA: BOARD_QUOTA, QUOTA_STEP: QUOTA_STEP,
    MIN_WORD_LEN: MIN_WORD_LEN, CLEANSE_RADIUS: CLEANSE_RADIUS,
    SPORE_BOARD: SPORE_BOARD, BLEACH_BOARD: BLEACH_BOARD,
    GOLD_CHANCE: GOLD_CHANCE,
  };
});

// keep layout correct on resize/orientation/fullscreen-exit
function reflow() {
  computeLayout();
  for (var r = 0; r < N; r++) for (var c = 0; c < N; c++) {
    var ce = grid[r] && grid[r][c];
    if (ce) { var ctr = cellCenter(r, c); ce.tx = ctr.x; ce.ty = ctr.y; ce.x = ctr.x; ce.y = ctr.y; }
  }
}
window.addEventListener('resize', reflow);
window.addEventListener('orientationchange', function () { setTimeout(reflow, 120); });

})();
</script>
