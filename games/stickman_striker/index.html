// AI sprites (procedural fallbacks everywhere; sprites are flavor, not load-bearing)
var SPRITE_NAMES = ['football', 'coin', 'star', 'striker', 'keeper', 'glass'];

// ── TUNABLES (exposed via __gfState for the gate / DESIGN cross-check) ─────
var BALL_BUDGET      = 5;
var GOAL_QUOTA       = 3;
var BONUS_EVERY      = 3;
var BONUS_BALLS      = 3;
var GOLD_EVERY       = 7;
var FLIGHT_T_BASE    = 0.95;
var FLIGHT_T_MIN     = 0.60;
var CURL_MAX         = 0.95;
var WALL_Z           = 0.55;
var KEEPER_Z         = 0.92;
var WALL_JUMP_H      = 0.62;   // airborne wall blocks roughly up to this band top
var KEEPER_TIER_MAX  = 5;
var COIN_GOAL        = 10;
var COIN_STAR        = 5;
var COIN_PANE        = 3;
var SKIN_COSTS       = [0, 150, 400, 1000];
var DAILY_BONUS_BASE = 25;
var BALL_R           = 0.07;   // world units (1 = goal half width / crossbar height)

var DESIGN_W = 540, DESIGN_H = 960;
var SAVE_KEY = 'stickman_striker';
var TUT_KEY  = 'ss_tut_v1';
var FONT     = 'system-ui, -apple-system, "Segoe UI", sans-serif';

// ── STATE ───────────────────────────────────────────────────────────────────
var gs = 'PLAYING';            // PLAYING | HUB | SHOP | LEVELWIN | LEVELFAIL
var level = 1, bestLevel = 1;
var ballsLeft = BALL_BUDGET, quota = GOAL_QUOTA, budget = BALL_BUDGET, goalsScored = 0;
var coins = 0, stars = 0, score = 0;
var streak = 0, bestStreak = 0;
var owned = [true, false, false, false], skin = 0;
var lastDaily = '', dailyStreak = 0;
var levelCoins = 0;            // coins earned this level (for the WIN card)
var cfg = null;                // current level config
var muted = false;
var helpOpen = false;
var rewardUsedThisLevel = false;

// ball / shot
var ball = { state: 'READY', u: 0, flightT: 0.8, aimX: 0, aimH: 0.5, curl: 0, wind: 0, loft: 0.4, spin: 0, dead: null, heldByKeeper: false, missWx: 0, missH: 0, crossed: {}, ringHit: false, starHit: false, netWx: 0, netH: 0 };
var pendingShot = null;        // staged at swipe end, fired at kick-anim contact
var kickT = -1;                // striker kick animation timer (-1 idle)
var resultT = 0;               // post-shot beat countdown
var resultType = '';
var timeScale = 1, zoomA = 0, crowdT = 0;

// world objects
var wallRows = [];             // [{z, men:[...], center}]
var keeper = null;
var ringObj = null;
var starTargets = [];
var panes = [];
var wind = 0;
var theme = 0;                 // 0 day | 1 night | 2 rain
var trail = [];
var confetti = [];
var rain = [];
var shards = [];
var netRipple = null;          // {x, y, t}
var flashMsg = null;
var toast = null;
var crowdDots = [];
var animT = 0;

// input / swipe
var swipe = null;              // {pts:[{x,y,t}]}
var uiRects = {};              // hit rects recomputed each draw, keyed by id
var lastKeys = {};

// layout cache
var V = {};
var lw = 0, lh = 0;

function t(k) { return GF.t(k); }
function fmt(s, map) { var out = s; for (var k in map) out = out.split(k).join(String(map[k])); return out; }
function sfx(n) { if (!window._silent) GF.sfx(n); }
function tone(f, d, w, g, sl) { if (!window._silent) GF.tone(f, d, w, g, sl); }
function arp(ns, st, d, w, g) { if (!window._silent) GF.arp(ns, st, d, w, g); }
function saveRun() { try { GF.saveRun(); } catch (e) {} }

// ── PSEUDO-3D PROJECTION ────────────────────────────────────────────────────
function fz(z) { var k = 0.9; return z * (1 + k) / (z + k); }       // perspective ease
function groundY(z) { return GF.lerp(V.nearY, V.farY, fz(z)); }
function latScale(z) { return GF.lerp(2.1, 1, fz(z)); }
function depthScale(z) { return GF.lerp(1, 0.46, fz(z)); }
function px(wx, z) { return GF.cx + wx * V.goalHalf * latScale(z); }
function hUnit(z) { return V.goalH * GF.lerp(1.7, 1, fz(z)); }
function py(z, h) { return groundY(z) - (h || 0) * hUnit(z); }

function layout() {
  var W = GF.W, H = GF.H;
  V.nearY = H * 0.795;
  V.farY  = H * 0.345;
  V.goalW = Math.min(W * 0.78, H * 0.46);
  V.goalHalf = V.goalW / 2;
  V.goalH = V.goalW * 0.31;
  V.goalTop = V.farY - V.goalH;
  V.ballX = GF.cx; V.ballY = V.nearY;
  V.ballR = Math.max(13, 26 * GF.S);
  lw = W; lh = H;
}

// ── LEVEL CONFIG ────────────────────────────────────────────────────────────
function levelCfg(n) {
  var bonus = (n % BONUS_EVERY === 0);
  var gold = (!bonus && n % GOLD_EVERY === 0);
  var c = {
    n: n,
    bonus: bonus,
    gold: gold,
    theme: Math.floor((n - 1) / 5) % 3,
    budget: bonus ? BONUS_BALLS : (BALL_BUDGET + Math.floor((n - 1) / 12)),
    quota: bonus ? 0 : (GOAL_QUOTA + Math.floor((n - 1) / 12)),
    keeperTier: bonus ? 0 : Math.max(1, Math.min(KEEPER_TIER_MAX, 1 + Math.floor((n - 1) / 4))),
    wallRows: [],
    ring: (!bonus && n >= 7),
    wind: 0,
  };
  if (!bonus) {
    if (n >= 2) {
      var men = Math.min(5, 2 + Math.floor(Math.max(0, n - 2) / 3));
      var mode = n < 4 ? 'static' : (n < 8 ? 'timed' : 'react');
      c.wallRows.push({ z: WALL_Z, men: men, mode: mode });
      if (n >= 8 && n % 2 === 0) c.wallRows.push({ z: WALL_Z + 0.09, men: Math.max(2, men - 1), mode: 'timed' });
    }
    c.wind = n >= 10 ? (0.12 + Math.min(0.38, (n - 10) * 0.03)) : (n === 9 ? 0.08 : 0);
  }
  return c;
}

function startLevel(n, keepToast) {
  level = Math.max(1, n | 0);
  if (level > bestLevel) bestLevel = level;
  cfg = levelCfg(level);
  theme = cfg.theme;
  budget = cfg.budget; ballsLeft = budget;
  quota = cfg.quota; goalsScored = 0;
  levelCoins = 0;
  rewardUsedThisLevel = false;
  wind = cfg.wind > 0 ? (Math.random() < 0.5 ? -cfg.wind : cfg.wind) : 0;
  wallRows = [];
  for (var i = 0; i < cfg.wallRows.length; i++) {
    var r = cfg.wallRows[i];
    wallRows.push(makeWallRow(r.z, r.men, r.mode));
  }
  keeper = cfg.bonus ? null : makeKeeper(cfg.keeperTier);
  ringObj = cfg.ring ? { x: 0, h: 0.55, r: 0.26, t: Math.random() * 6, speed: 0.55 + Math.min(0.5, level * 0.03), amp: 0.62, flash: 0 } : null;
  starTargets = cfg.bonus ? [] : [
    { x: -0.74, h: 0.72, r: 0.22, flash: 0 },
    { x:  0.74, h: 0.72, r: 0.22, flash: 0 },
  ];
  panes = [];
  if (cfg.bonus) {
    for (var pc = 0; pc < 4; pc++) for (var pr = 0; pr < 3; pr++) panes.push({ c: pc, r: pr, broken: false, t: 0 });
  }
  resetBall();
  trail = []; confetti = []; shards = [];
  netRipple = null; flashMsg = null;
  timeScale = 1; zoomA = 0; crowdT = 0;
  rebuildRain();
  if (!keepToast) {
    if (cfg.bonus) showToast(t('bonus_round'), '#9fe3ff');
    else if (cfg.gold) showToast(t('gold_level'), '#ffd86b');
  }
  gs = 'PLAYING';
  saveRun();
}

function makeWallRow(z, n, mode) {
  var center = (Math.random() * 0.5 - 0.25);
  var men = [];
  for (var i = 0; i < n; i++) {
    men.push({
      x: center + (i - (n - 1) / 2) * 0.17,
      off: (i - (n - 1) / 2) * 0.17,
      jumpT: -1,
      cycle: 1.3 + Math.random() * 0.8,
      phase: Math.random(),
      mode: mode,
      reacted: false,
      jumpDelay: 0,
      flinch: 0,
    });
  }
  return { z: z, men: men, center: center };
}

function makeKeeper(tier) {
  return {
    tier: tier,
    x: 0,
    react: Math.max(0.18, 0.5 - tier * 0.065),
    err: Math.max(0.15, 0.66 - tier * 0.105),
    speed: 1.05 + tier * 0.36,
    curlRead: GF.clamp(1.05 - tier * 0.1, 0.5, 0.95),
    state: 'IDLE',
    diveX: 0, diveT: 0, holdT: 0, predicted: 0, reactLeft: 0,
    holdX: 0, holdH: 0.3,
    swayT: Math.random() * 6,
  };
}

function resetBall() {
  ball.state = 'READY'; ball.u = 0; ball.dead = null; ball.heldByKeeper = false;
  ball.spin = 0; ball.crossed = {}; ball.ringHit = false; ball.starHit = false; ball.coachShot = false;
  pendingShot = null; kickT = -1; resultT = 0; resultType = '';
  for (var i = 0; i < wallRows.length; i++) {
    var row = wallRows[i];
    var shift = (Math.random() * 0.4 - 0.2);
    row.center = shift;
    for (var j = 0; j < row.men.length; j++) {
      var m = row.men[j];
      m.x = shift + m.off;
      m.jumpT = -1; m.reacted = false;
    }
  }
  if (keeper) { keeper.state = 'IDLE'; keeper.x = 0; keeper.diveT = 0; }
}

function rebuildRain() {
  rain = [];
  if (theme === 2) for (var i = 0; i < 64; i++) rain.push({ x: Math.random(), y: Math.random(), v: 0.9 + Math.random() * 0.7 });
}

// ── CROWD DOTS (precomputed deterministic) ─────────────────────────────────
(function () {
  var s = 12345;
  function rnd() { s = (s * 16807) % 2147483647; return (s & 0xffff) / 0x10000; }
  var cols = ['#e8d9c0', '#c8a888', '#8898b8', '#d88c8c', '#88c8a0', '#e8e0d0', '#b8a8d8', '#d8c890'];
  for (var i = 0; i < 260; i++) crowdDots.push({ x: rnd(), y: rnd(), c: cols[(rnd() * cols.length) | 0] });
})();

// ── KICK ────────────────────────────────────────────────────────────────────
function analyzeSwipe(pts) {
  if (!pts || pts.length < 2) return null;
  var a = pts[0], b = pts[pts.length - 1];
  var dx = b.x - a.x, dy = b.y - a.y;
  var len = Math.sqrt(dx * dx + dy * dy);
  var dur = Math.max(40, b.t - a.t);
  if (len < 18 * GF.S) return null;                       // too small: caller may treat as tap
  if (dy > -10) return null;                              // must move upward
  var ang = Math.atan2(dx, -dy);                          // 0 = straight up
  var aimX = GF.clamp(Math.tan(GF.clamp(ang, -1.25, 1.25)) * 1.35, -1.9, 1.9);
  var aimH = GF.clamp((len / (GF.H * 0.42)) * 1.55, 0.12, 1.62);
  var speed = len / dur;                                  // px per ms
  var flightT = GF.clamp(1.08 - speed * 0.45, FLIGHT_T_MIN, FLIGHT_T_BASE);
  // curl: signed perpendicular deviation of the mid path point from the chord
  var mid = pts[(pts.length / 2) | 0];
  var crossP = ((mid.x - a.x) * dy - (mid.y - a.y) * dx) / Math.max(1, len);
  var curl = GF.clamp((crossP / Math.max(1, len * 0.5)) * 2.4, -1, 1) * CURL_MAX;
  return { aimX: aimX, aimH: aimH, curl: curl, flightT: flightT };
}

function tapShot(x, y) {
  var aimX = GF.clamp((x - GF.cx) / V.goalHalf, -1.7, 1.7);
  var aimH = GF.clamp((V.farY - y) / V.goalH, 0.12, 1.5);
  return { aimX: aimX, aimH: aimH, curl: 0, flightT: 0.8 };
}

function doKick(shot) {
  if (gs !== 'PLAYING' || ball.state !== 'READY' || kickT >= 0) return false;
  pendingShot = shot;
  kickT = 0;
  sfx('tap');
  // coach advances on REAL kicks only (action-gated, advance:'manual').
  // Coach kicks don't consume the ball budget (player safe during tutorial).
  ball.coachShot = false;
  if (GF.tutorial.active) {
    var stp = GF.tutorial.steps[GF.tutorial.step];
    if (stp && stp._isKick) { ball.coachShot = true; GF.tutorial.next(); }
  }
  return true;
}

function launchBall() {
  var s = pendingShot; pendingShot = null;
  if (!s) return;
  ball.state = 'FLIGHT';
  ball.u = 0;
  ball.aimX = s.aimX; ball.aimH = s.aimH; ball.curl = s.curl; ball.flightT = s.flightT;
  ball.wind = wind;
  ball.loft = 0.30 + s.aimH * 0.22 + (s.flightT - FLIGHT_T_MIN) * 0.30;
  ball.spin = s.curl * 14 + 6;
  ball.crossed = {};
  ball.ringHit = false; ball.starHit = false;
  trail = [];
  tone(150, 0.10, 'sawtooth', 0.12, 70);
  tone(420, 0.06, 'triangle', 0.06, 240);
  GF.setShake(0.12);
  GF.spawnParticles(V.ballX, V.ballY, '#7ec850', 8);
  if (keeper) {
    var arrive = s.aimX + s.curl + wind;
    keeper.predicted = GF.clamp(arrive + (Math.random() * 2 - 1) * keeper.err - s.curl * (1 - keeper.curlRead), -1.15, 1.15);
    keeper.reactLeft = keeper.react;
    keeper.state = 'IDLE';
  }
  for (var i = 0; i < wallRows.length; i++) {
    for (var j = 0; j < wallRows[i].men.length; j++) {
      var m = wallRows[i].men[j];
      if (m.mode === 'react') { m.reacted = true; m.jumpDelay = wallRows[i].z * s.flightT - 0.24 + Math.random() * 0.12; }
    }
  }
}

function wxAt(u) { return ball.aimX * u + (ball.curl + ball.wind) * u * u; }
function hAt(u)  { return ball.aimH * u + ball.loft * 4 * u * (1 - u); }

// ── SHOT RESOLUTION ─────────────────────────────────────────────────────────
function resolveShot(type, opts) {
  opts = opts || {};
  resultType = type;
  ball.state = 'RESULT';
  resultT = type === 'goal' ? 1.25 : 0.85;
  var gained = 0;
  if (type === 'goal') {
    goalsScored++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    gained = COIN_GOAL * (cfg.gold ? 3 : 1) * (ball.ringHit ? 2 : 1);
    gained += Math.min(10, Math.max(0, streak - 1) * 2);
    if (ball.starHit) { gained += COIN_STAR; stars++; }
    score += 25;
    flash(t('goal_flash'), cfg.gold ? '#ffd86b' : '#7CFC9A');
    if (ball.starHit) floatAt(px(GF.clamp(ball.netWx, -1, 1), 1), py(1, 0.72) - 20 * GF.S, fmt(t('star_bonus'), { '%n': COIN_STAR }), '#ffe066');
    if (ball.ringHit) floatAt(GF.cx, py(1, 0.55), t('ring_bonus'), '#7fe7ff');
    if (cfg.gold) floatAt(GF.cx, py(1, 1.1), t('gold_goal'), '#ffd86b');
    goalCelebrate();
  } else if (type === 'smash') {
    gained = (opts.panes || 0) * COIN_PANE;
    score += 5 * (opts.panes || 0) + 2;
    if (gained > 0) flash(fmt(t('smash_coins'), { '%n': gained }), '#9fe3ff');
    streak = 0;
  } else {
    streak = 0;
    score += 1;
    if (type === 'save') { flash(t('saved_flash'), '#ff9a6a'); sfx('error'); }
    if (type === 'wall') { flash(t('wall_flash'), '#ff9a6a'); }
    if (type === 'miss') { flash(t('miss_flash'), '#9fb8d8'); crowdOoh(); }
    if (type === 'post') { flash(t('post_flash'), '#ffd86b'); }
    if (type === 'bar') { flash(t('bar_flash'), '#ffd86b'); }
  }
  if (gained > 0) {
    coins += gained; levelCoins += gained;
    floatAt(GF.W - 70 * GF.S, 44 * GF.S, '+' + gained, '#ffd86b');
    sfx('coin');
  }
  if (!ball.coachShot) ballsLeft--;        // coach kicks are free (budget frozen)
  saveRun();
}

function goalCelebrate() {
  timeScale = 0.22; zoomA = 1; crowdT = 1.4;
  netRipple = { x: px(GF.clamp(ball.netWx, -1, 1), 1), y: py(1, Math.min(ball.netH || 0.4, 0.95)), t: 0 };
  sfx('win');
  arp([262, 330, 392, 523, 659], 55, 0.3, 'sawtooth', 0.06);
  var gx = px(GF.clamp(ball.netWx, -1, 1), 1), gy = py(1, ball.netH || 0.4);

// ── DAILY BONUS ─────────────────────────────────────────────────────────────
function applyDaily() {
  var today = new Date().toISOString().slice(0, 10);
  if (lastDaily === today) return;
  var yest = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
  dailyStreak = (lastDaily === yest) ? dailyStreak + 1 : 1;
  lastDaily = today;
  var add = DAILY_BONUS_BASE * Math.min(7, dailyStreak);
  coins += add;
  showToast(fmt(t('daily'), { '%n': add, '%d': dailyStreak }), '#ffd86b');
  sfx('reward');
  saveRun();
}

  ], { storageKey: TUT_KEY, force: true });

// captions stay language-correct even if the locale settles after boot
function refreshCoachText() {

// ── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt) {
  if (window._screenshotFreeze) return;
  animT += dt;
  GF.tutorial.update(dt);
  var wdt = dt * timeScale;                  // world dt (slow-mo aware)
  timeScale += (1 - timeScale) * Math.min(1, dt * 3.4);
  if (zoomA > 0) zoomA = Math.max(0, zoomA - dt * 1.05);
  if (crowdT > 0) crowdT = Math.max(0, crowdT - dt);
  if (flashMsg && (flashMsg.t -= dt) <= 0) flashMsg = null;
  if (toast && (toast.t -= dt) <= 0) toast = null;

  updateConfetti(dt);
  updateShards(dt);
  updateRain(dt);
  if (netRipple && (netRipple.t += dt) > 1.4) netRipple = null;
  if (ringObj) { ringObj.t += wdt; ringObj.x = Math.sin(ringObj.t * ringObj.speed) * ringObj.amp; if (ringObj.flash > 0) ringObj.flash -= dt; }
  for (var st = 0; st < starTargets.length; st++) if (starTargets[st].flash > 0) starTargets[st].flash -= dt;

  if (gs !== 'PLAYING') return;

  // keyboard kicks (desktop alias of tap)
  if (ball.state === 'READY' && kickT < 0 && !GF.tutorial.active && !helpOpen) {
    if (keyEdge('ArrowLeft'))  doKick({ aimX: -0.74, aimH: 0.7, curl: 0, flightT: 0.74 });
    else if (keyEdge('ArrowRight')) doKick({ aimX: 0.74, aimH: 0.7, curl: 0, flightT: 0.74 });
    else if (keyEdge('ArrowUp'))    doKick({ aimX: 0, aimH: 0.9, curl: 0, flightT: 0.9 });
    else if (keyEdge('Space') || keyEdge('ArrowDown')) doKick({ aimX: 0, aimH: 0.3, curl: 0, flightT: 0.66 });
  }
  snapshotKeys();

  // striker kick animation -> launch at contact
  if (kickT >= 0) {
    kickT += dt;
    if (pendingShot && kickT >= 0.30) launchBall();
    if (kickT > 0.55) kickT = -1;
  }

  updateWall(wdt);
  updateKeeper(wdt);

  if (ball.state === 'FLIGHT') {
    var prevU = ball.u;
    ball.u += wdt / ball.flightT;
    var u = ball.u;
    trail.push({ x: px(wxAt(Math.min(u, 1.25)), Math.min(u, 1.25)), y: py(Math.min(u, 1.25), hAt(Math.min(u, 1.05))), t: 0 });
    if (trail.length > 26) trail.shift();
    // plane crossings (z == u since the flight param is depth)
    for (var i = 0; i < wallRows.length; i++) {
      var row = wallRows[i];
      if (prevU < row.z && u >= row.z && !ball.crossed['w' + i]) {
        ball.crossed['w' + i] = true;
        if (checkWallBlock(row)) return;
      }
    }
    if (ringObj && prevU < 0.985 && u >= 0.985) {
      var rwx = wxAt(0.985), rh = hAt(0.985);
      var dxr = rwx - ringObj.x, dhr = rh - ringObj.h;
      if (Math.sqrt(dxr * dxr + dhr * dhr) < ringObj.r) { ball.ringHit = true; ringObj.flash = 0.6; sfx('pickup'); }
    }
    if (keeper && prevU < KEEPER_Z && u >= KEEPER_Z && !ball.crossed.k) {
      ball.crossed.k = true;
      if (checkKeeperSave()) return;
    }
    if (prevU < 1 && u >= 1) { arriveAtGoal(); return; }
    if (u > 1.28) { ball.missWx = wxAt(1.25); ball.missH = 0; resolveShot('miss'); }
  } else if (ball.state === 'RESULT') {
    if (ball.dead) updateDeadBall(wdt);
    resultT -= dt;
    if (resultT <= 0) afterResult();
  }

  for (var tr = 0; tr < trail.length; tr++) trail[tr].t += dt;
}

function keyEdge(k) { return GF.keys[k] && !lastKeys[k]; }
function snapshotKeys() { lastKeys = {}; for (var k in GF.keys) lastKeys[k] = GF.keys[k]; }

function updateWall(wdt) {
  for (var i = 0; i < wallRows.length; i++) {
    var row = wallRows[i];
    for (var j = 0; j < row.men.length; j++) {
      var m = row.men[j];
      if (m.flinch > 0) m.flinch -= wdt;
      if (m.mode === 'static') continue;
      if (m.mode === 'timed') {
        m.phase += wdt / m.cycle;
        var ph = m.phase % 1;
        m.jumpT = ph < 0.42 ? ph / 0.42 : -1;
      } else if (m.mode === 'react') {
        if (m.reacted && ball.state === 'FLIGHT') {
          m.jumpDelay -= wdt;
          if (m.jumpDelay <= 0 && m.jumpT < 0) m.jumpT = 0;
        }
        if (m.jumpT >= 0) { m.jumpT += wdt / 0.55; if (m.jumpT > 1) { m.jumpT = -1; m.reacted = false; } }
      }
    }
  }
}

function jumpLift(m) {
  if (m.jumpT < 0) return 0;
  return Math.sin(Math.min(1, m.jumpT) * Math.PI) * 0.38;
}

function checkWallBlock(row) {
  var wx = wxAt(row.z), h = hAt(row.z);
  for (var j = 0; j < row.men.length; j++) {
    var m = row.men[j];
    var lift = jumpLift(m);
    var lo = lift > 0.02 ? lift * 0.62 : 0;       // airborne: feet rise, under-shots pass
    var hi = lift > 0.02 ? lift + WALL_JUMP_H : 0.45;
    if (Math.abs(wx - m.x) < 0.085 + BALL_R && h > lo - BALL_R && h < hi + BALL_R) {
      m.flinch = 0.6;
      deadBounce(row.z, h);
      tone(120, 0.12, 'square', 0.14, 60);
      GF.setShake(0.3);
      GF.spawnParticles(px(wx, row.z), py(row.z, h), '#ffffff', 10);
      resolveShot('wall');
      return true;
    }
  }
  return false;
}

function updateKeeper(wdt) {
  if (!keeper) return;
  keeper.swayT += wdt;
  if (keeper.state === 'IDLE') {
    if (ball.state === 'FLIGHT') {
      keeper.reactLeft -= wdt;
      if (keeper.reactLeft <= 0) { keeper.state = 'DIVE'; keeper.diveT = 0; }
      else keeper.x = Math.sin(keeper.swayT * 1.7) * 0.08;
    } else {
      keeper.x = Math.sin(keeper.swayT * 1.7) * 0.08;
    }
  }
  if (keeper.state === 'DIVE') {
    keeper.diveT += wdt;
    var dir = keeper.predicted - keeper.x;
    var step = keeper.speed * wdt;
    if (Math.abs(dir) <= step) keeper.x = keeper.predicted;
    else keeper.x += (dir > 0 ? 1 : -1) * step;
  }
  if (keeper.state === 'HOLD') keeper.holdT += wdt;
}

function checkKeeperSave() {
  var wx = wxAt(KEEPER_Z), h = hAt(KEEPER_Z);
  if (Math.abs(wx) > 1.18) return false;                     // clearly wide: keeper ignores
  var reach = 0.36 + keeper.tier * 0.03;
  var diving = keeper.state === 'DIVE';
  var lateral = Math.abs(wx - keeper.x);
  var reachH = diving ? 0.95 : 0.78;
  if (lateral < reach && h < reachH) {
    keeper.state = 'HOLD'; keeper.holdT = 0; keeper.holdX = wx; keeper.holdH = Math.max(0.18, Math.min(h, 0.8));
    ball.heldByKeeper = true;
    sfx('hit');
    GF.spawnParticles(px(wx, KEEPER_Z), py(KEEPER_Z, h), '#ffd86b', 6);
    resolveShot('save');
    return true;
  }
  return false;
}

function arriveAtGoal() {
  var wx = wxAt(1), h = hAt(1);
  if (cfg.bonus) {
    if (Math.abs(wx) < 1 && h < 1) {
      var broken = smashPanesAt(wx, h, ball.flightT < 0.72);
      ball.netWx = wx; ball.netH = h;
      netRipple = { x: px(wx, 1), y: py(1, Math.min(h, 0.95)), t: 0 };
      resolveShot('smash', { panes: broken });
      return;
    }
    ball.missWx = wx; ball.missH = h;
    resolveShot('miss');
    return;
  }
  for (var i = 0; i < starTargets.length; i++) {
    var stg = starTargets[i];
    var dxs = wx - stg.x, dhs = h - stg.h;
    if (Math.sqrt(dxs * dxs + dhs * dhs) < stg.r) { ball.starHit = true; stg.flash = 0.8; }
  }
  var postBand = 0.045;
  var inX = Math.abs(wx) < 1 - postBand, inH = h < 1 - postBand;
  var onPost = Math.abs(Math.abs(wx) - 1) <= postBand && h < 1 + postBand;
  var onBar = Math.abs(h - 1) <= postBand && Math.abs(wx) < 1 + postBand;
  if (onPost || onBar) {
    tone(1318, 0.16, 'square', 0.13, 1108);
    tone(659, 0.22, 'triangle', 0.08, 520);
    GF.setShake(0.5);
    GF.spawnParticles(px(wx, 1), py(1, Math.min(h, 1)), '#ffffff', 12);
    var inChance = cfg.gold ? 0.65 : 0.2;
    if (Math.random() < inChance) {
      flash(t('bounce_in'), '#ffd86b');
      goalIn(GF.clamp(wx, -0.9, 0.9), GF.clamp(h, 0.1, 0.9));
      return;
    }
    deadBounce(1, Math.min(h, 1));
    resolveShot(onPost ? 'post' : 'bar');
    return;
  }
  if (inX && inH) { goalIn(wx, h); return; }
  ball.missWx = wx; ball.missH = h;
  resolveShot('miss');
}

function goalIn(wx, h) {
  ball.u = 1;
  ball.netWx = wx; ball.netH = h;
  resolveShot('goal');
}

function smashPanesAt(wx, h, power) {
  var col = GF.clamp(((wx + 1) / 0.5) | 0, 0, 3);
  var row = GF.clamp((h / 0.3334) | 0, 0, 2);
  var broken = 0;
  for (var i = 0; i < panes.length; i++) {
    var p = panes[i];
    if (p.broken) continue;
    var hitP = (p.c === col && p.r === row);
    var near = power && (Math.abs(p.c - col) + Math.abs(p.r - row) === 1);
    if (hitP || near) {
      p.broken = true; p.t = 0; broken++;
      spawnShards(p);
    }
  }
  if (broken > 0) {
    arp([2093, 1661, 1245, 932], 26, 0.1, 'square', 0.09);
    GF.setShake(0.4);
  } else {
    sfx('tap');
  }
  return broken;
}

function paneRect(p) {
  var x0 = px(-1 + p.c * 0.5, 1), x1 = px(-1 + (p.c + 1) * 0.5, 1);
  var y0 = py(1, (p.r + 1) * 0.3334), y1 = py(1, p.r * 0.3334);
  return { x: x0, y: y0, w: x1 - x0, h: y1 - y0 };
}

function spawnShards(p) {
  var r = paneRect(p);
  for (var i = 0; i < 12; i++) {
    shards.push({
      x: r.x + Math.random() * r.w, y: r.y + Math.random() * r.h,
      vx: (Math.random() - 0.5) * 260 * GF.S, vy: (Math.random() * -120 - 30) * GF.S,
      s: (3 + Math.random() * 5) * GF.S, rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 14,
      life: 0.9 + Math.random() * 0.5,
    });
  }
}

function deadBounce(z, h) {
  ball.dead = { z: z, h: Math.max(0.05, h), t: 0, wx: wxAt(z) };
}

function updateDeadBall(wdt) {
  var d = ball.dead;
  d.t += wdt;
  d.z = Math.max(0.1, d.z - wdt * 0.55);
  d.h = Math.max(0, d.h - wdt * 1.6);
}

function updateConfetti(dt) {
  for (var i = confetti.length - 1; i >= 0; i--) {
    var c = confetti[i];
    c.x += c.vx * dt; c.y += c.vy * dt; c.vy += 560 * GF.S * dt;
    c.rot += c.vr * dt; c.life -= dt;
    if (c.life <= 0) confetti.splice(i, 1);
  }
}
function updateShards(dt) {
  for (var i = shards.length - 1; i >= 0; i--) {
    var s = shards[i];
    s.x += s.vx * dt; s.y += s.vy * dt; s.vy += 700 * GF.S * dt;
    s.rot += s.vr * dt; s.life -= dt;
    if (s.life <= 0) shards.splice(i, 1);
  }
}
function updateRain(dt) {
  for (var i = 0; i < rain.length; i++) {
    var r = rain[i];
    r.y += r.v * dt * 0.7; r.x -= dt * 0.04;
    if (r.y > 1) { r.y -= 1.05; r.x = Math.random(); }
    if (r.x < 0) r.x += 1;
  }
}

// ── DRAW ────────────────────────────────────────────────────────────────────
var THEMES = [
  { skyA: '#7ec8f0', skyB: '#bfe6ff', standA: '#4a5a78', standB: '#3c4a64', pitchA: '#5fb04a', pitchB: '#54a341', line: 'rgba(255,255,255,0.85)', glow: 0 },
  { skyA: '#0c1430', skyB: '#1c2c54', standA: '#222c44', standB: '#1a2236', pitchA: '#3e8a44', pitchB: '#357a3b', line: 'rgba(255,255,255,0.9)', glow: 1 },
  { skyA: '#3a4450', skyB: '#5a6670', standA: '#39424e', standB: '#2e363f', pitchA: '#47904c', pitchB: '#3d8042', line: 'rgba(255,255,255,0.8)', glow: 0 },
];

function draw(ctx) {
  if (lw !== GF.W || lh !== GF.H) layout();
  var th = THEMES[theme];

  // zoom toward goal on celebration
  var zf = 1 + 0.24 * zoomA;
  ctx.save();
  if (zf > 1.001) {
    var gx = GF.cx, gy = (V.farY + V.goalTop) / 2;
    ctx.translate(gx, gy); ctx.scale(zf, zf); ctx.translate(-gx, -gy);
  }

  drawBG(ctx, th);
  drawPitch(ctx, th);

  // far -> near
  var bz = currentBallZ();
  if (ballVisible() && bz > 1) drawBall(ctx);           // ball inside the net: behind it
  drawNet(ctx, th);
  drawGoalFrame(ctx, th);
  drawGlass(ctx);
  drawStarTargets(ctx);
  drawRing(ctx);
  if (ballVisible() && bz > KEEPER_Z && bz <= 1) drawBall(ctx);
  drawKeeper(ctx);
  if (ballVisible() && bz > WALL_Z && bz <= KEEPER_Z) drawBall(ctx);
  drawWall(ctx);
  if (ballVisible() && bz <= WALL_Z) drawBall(ctx);
  drawStriker(ctx);
  drawConfetti(ctx);
  drawShards(ctx);
  if (theme === 2) drawRain(ctx);

  ctx.restore();

  drawHUD(ctx);
  if (flashMsg) drawFlash(ctx);
  if (gs === 'HUB') drawHub(ctx);
  if (gs === 'SHOP') drawShop(ctx);
  if (gs === 'LEVELWIN') drawWin(ctx);
  if (gs === 'LEVELFAIL') drawFail(ctx);
  if (helpOpen) drawHelp(ctx);
  if (toast) drawToast(ctx);
  // coach: only while the ball is settable (not mid-flight) and no overlay
  if (GF.tutorial.active && gs === 'PLAYING' && ball.state === 'READY' && !helpOpen) {
    refreshCoachText();
    GF.tutorial.draw(ctx);
  }
}

function currentBallZ() {
  if (ball.dead) return ball.dead.z;
  if (ball.state === 'READY') return 0;
  if (ball.state === 'RESULT' && resultType === 'goal') return 1.06;
  return Math.min(ball.u, 1.3);
}
function ballVisible() {
  if (ball.heldByKeeper) return false;
  if (gs === 'LEVELWIN' || gs === 'LEVELFAIL') return false;
  return true;
}

function drawBG(ctx, th) {
  var W = GF.W, S = GF.S;
  var sky = ctx.createLinearGradient(0, 0, 0, V.farY);
  sky.addColorStop(0, th.skyA); sky.addColorStop(1, th.skyB);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, V.farY);
  if (theme === 1) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    for (var i = 0; i < 24; i++) {
      var sx = ((i * 73) % 97) / 97 * W, sy = ((i * 41) % 53) / 53 * V.farY * 0.5;
      ctx.fillRect(sx, sy, 2, 2);
    }
  }
  var sTop = V.farY * 0.42, sBot = V.farY;
  var stand = ctx.createLinearGradient(0, sTop, 0, sBot);
  stand.addColorStop(0, th.standA); stand.addColorStop(1, th.standB);
  ctx.fillStyle = stand;
  ctx.fillRect(0, sTop, W, sBot - sTop);
  var bandH = (sBot - sTop) * 0.78;
  for (var d = 0; d < crowdDots.length; d++) {
    var cd = crowdDots[d];
    var jy = crowdT > 0 ? Math.abs(Math.sin(animT * 11 + d)) * 4 * S * Math.min(1, crowdT) : 0;
    ctx.fillStyle = cd.c;
    ctx.globalAlpha = 0.85;
    ctx.fillRect(cd.x * W, sTop + cd.y * bandH - jy, 2.4 * S + 1, 2.4 * S + 1);
  }
  ctx.globalAlpha = 1;
  // ad-board strip (plain chevrons, no text)
  var abY = sBot - (sBot - sTop) * 0.16;
  ctx.fillStyle = theme === 1 ? '#16305a' : '#2563a8';
  ctx.fillRect(0, abY, W, sBot - abY);
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2 * S;
  var step = 26 * S;
  ctx.beginPath();
  for (var cx2 = -step; cx2 < W + step; cx2 += step) {
    ctx.moveTo(cx2, sBot - 2);
    ctx.lineTo(cx2 + step * 0.5, abY + 2);
  }
  ctx.stroke();
  if (th.glow) {
    drawFloodlight(ctx, W * 0.08, sTop * 0.45, 1);
    drawFloodlight(ctx, W * 0.92, sTop * 0.45, -1);
  }
}

function drawFloodlight(ctx, x, y, dir) {
  var S = GF.S;
  ctx.fillStyle = '#445';
  ctx.fillRect(x - 3 * S, y, 6 * S, V.farY * 0.42 - y);
  ctx.fillStyle = '#dde8ff';
  for (var i = 0; i < 3; i++) for (var j = 0; j < 2; j++) ctx.fillRect(x - 12 * S + i * 9 * S, y - 12 * S + j * 8 * S, 7 * S, 6 * S);
  var cone = ctx.createLinearGradient(x, y, x + dir * 60 * S, GF.H * 0.5);
  cone.addColorStop(0, 'rgba(220,235,255,0.20)');
  cone.addColorStop(1, 'rgba(220,235,255,0)');
  ctx.fillStyle = cone;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + dir * 140 * S, GF.H * 0.62);
  ctx.lineTo(x + dir * 320 * S, GF.H * 0.62);
  ctx.closePath();
  ctx.fill();
}

function drawPitch(ctx, th) {
  var W = GF.W, H = GF.H;
  ctx.fillStyle = th.pitchB;
  ctx.fillRect(0, V.farY, W, H - V.farY);
  for (var i = 0; i < 8; i++) {
    if (i % 2 === 0) continue;
    var z0 = 1 - i / 8, z1 = 1 - (i + 1) / 8;
    ctx.fillStyle = th.pitchA;
    ctx.beginPath();
    ctx.moveTo(0, groundY(z0));
    ctx.lineTo(W, groundY(z0));
    ctx.lineTo(W, groundY(z1));
    ctx.lineTo(0, groundY(z1));
    ctx.closePath();
    ctx.fill();
  }
  ctx.strokeStyle = th.line;
  ctx.lineWidth = Math.max(1.5, 2.4 * GF.S);
  line(ctx, 0, groundY(1), W, groundY(1));
  var bx = 1.9, bz = 0.62;
  line(ctx, px(-bx, 1), groundY(1), px(-bx, bz), groundY(bz));
  line(ctx, px(bx, 1), groundY(1), px(bx, bz), groundY(bz));
  line(ctx, px(-bx, bz), groundY(bz), px(bx, bz), groundY(bz));
  var sx6 = 1.25, sz6 = 0.8;
  line(ctx, px(-sx6, 1), groundY(1), px(-sx6, sz6), groundY(sz6));
  line(ctx, px(sx6, 1), groundY(1), px(sx6, sz6), groundY(sz6));
  line(ctx, px(-sx6, sz6), groundY(sz6), px(sx6, sz6), groundY(sz6));
  ctx.beginPath();
  ctx.arc(GF.cx, groundY(0.30), V.goalHalf * 0.5, Math.PI * 1.15, Math.PI * 1.85);
  ctx.stroke();
  ctx.fillStyle = th.line;
  ctx.beginPath(); ctx.ellipse(V.ballX, V.ballY + V.ballR * 0.9, 5 * GF.S, 2.2 * GF.S, 0, 0, 6.29); ctx.fill();
}

function line(ctx, x0, y0, x1, y1) { ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke(); }

function drawGoalFrame(ctx, th) {
  var S = GF.S;
  var gl = px(-1, 1), gr = px(1, 1);
  var gy = groundY(1), gt = py(1, 1);
  var postW = Math.max(3, 5 * S);
  var gold = cfg && cfg.gold;
  ctx.strokeStyle = gold ? '#ffd86b' : '#f8f8f8';
  ctx.lineWidth = postW;
  ctx.lineCap = 'round';
  if (gold) { ctx.shadowColor = '#ffd86b'; ctx.shadowBlur = 14 * S; }
  var bo = 9 * S;
  ctx.globalAlpha = 0.45;
  line(ctx, gl + bo, gy - bo * 0.6, gl + bo, gt + bo * 0.7);
  line(ctx, gr - bo, gy - bo * 0.6, gr - bo, gt + bo * 0.7);
  line(ctx, gl + bo, gt + bo * 0.7, gr - bo, gt + bo * 0.7);
  ctx.globalAlpha = 1;
  line(ctx, gl, gy, gl, gt);
  line(ctx, gr, gy, gr, gt);
  line(ctx, gl, gt, gr, gt);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.lineCap = 'butt';
}

function drawNet(ctx, th) {
  var S = GF.S;
  var gl = px(-1, 1), gr = px(1, 1);
  var gy = groundY(1), gt = py(1, 1);
  var bo = 9 * S;
  ctx.strokeStyle = 'rgba(235,240,255,0.42)';
  ctx.lineWidth = Math.max(1, 1.1 * S);
  var colsN = 10, rowsN = 6;
  function disp(x, y) {
    if (!netRipple) return { x: x, y: y };
    var dx = x - netRipple.x, dy = y - netRipple.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var w = Math.sin(dist * 0.045 / S - netRipple.t * 14) * Math.exp(-dist * 0.010 / S) * Math.exp(-netRipple.t * 2.6) * 10 * S;
    return { x: x + (dx / (dist + 1)) * w, y: y + (dy / (dist + 1)) * w };
  }
  for (var i = 0; i <= colsN; i++) {
    ctx.beginPath();
    for (var j = 0; j <= rowsN; j++) {
      var x = GF.lerp(gl + bo, gr - bo, i / colsN);
      var y = GF.lerp(gt + bo * 0.7, gy - bo * 0.4, j / rowsN);
      var p = disp(x, y);
      if (j === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }
  for (var j2 = 0; j2 <= rowsN; j2++) {
    ctx.beginPath();
    for (var i2 = 0; i2 <= colsN; i2++) {
      var x2 = GF.lerp(gl + bo, gr - bo, i2 / colsN);
      var y2 = GF.lerp(gt + bo * 0.7, gy - bo * 0.4, j2 / rowsN);
      var p2 = disp(x2, y2);
      if (i2 === 0) ctx.moveTo(p2.x, p2.y); else ctx.lineTo(p2.x, p2.y);
    }
    ctx.stroke();
  }
  ctx.globalAlpha = 0.5;
  line(ctx, px(-1, 1), gt, gl + bo, gt + bo * 0.7);
  line(ctx, px(1, 1), gt, gr - bo, gt + bo * 0.7);
  line(ctx, px(-1, 1), gy, gl + bo, gy - bo * 0.4);
  line(ctx, px(1, 1), gy, gr - bo, gy - bo * 0.4);
  ctx.globalAlpha = 1;
}

function drawGlass(ctx) {
  if (!cfg || !cfg.bonus) return;
  var S = GF.S;
  for (var i = 0; i < panes.length; i++) {
    var p = panes[i];
    if (p.broken) continue;
    var r = paneRect(p);
    var img = GF.sprites && GF.sprites.glass;
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.globalAlpha = 0.55;
      ctx.drawImage(img, r.x + 1, r.y + 1, r.w - 2, r.h - 2);
      ctx.globalAlpha = 1;
    } else {
      var g = ctx.createLinearGradient(r.x, r.y, r.x + r.w, r.y + r.h);
      g.addColorStop(0, 'rgba(180,225,255,0.38)');
      g.addColorStop(0.5, 'rgba(220,245,255,0.22)');
      g.addColorStop(1, 'rgba(160,210,250,0.38)');
      ctx.fillStyle = g;
      ctx.fillRect(r.x + 1, r.y + 1, r.w - 2, r.h - 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      line(ctx, r.x + r.w * 0.18, r.y + r.h * 0.78, r.x + r.w * 0.62, r.y + r.h * 0.16);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.75)';
    ctx.lineWidth = Math.max(1, 1.6 * S);
    ctx.strokeRect(r.x + 1, r.y + 1, r.w - 2, r.h - 2);
  }
}

function drawStarTargets(ctx) {
  var S = GF.S;
  for (var i = 0; i < starTargets.length; i++) {
    var st = starTargets[i];
    var x = px(st.x, 1), y = py(1, st.h);
    var r = st.r * V.goalH;
    var pulse = 0.6 + 0.4 * Math.sin(animT * 3 + i * 2);
    ctx.save();
    ctx.strokeStyle = st.flash > 0 ? '#ffffff' : '#ffe066';
    ctx.shadowColor = '#ffe066'; ctx.shadowBlur = 10 * S * pulse;
    ctx.lineWidth = Math.max(1.5, 2.4 * S);
    ctx.globalAlpha = 0.5 + 0.5 * pulse;
    ctx.beginPath(); ctx.arc(x, y, r, 0, 6.29); ctx.stroke();
    drawStarPath(ctx, x, y, r * 0.42);
    ctx.fillStyle = st.flash > 0 ? '#ffffff' : 'rgba(255,224,102,' + (0.55 + 0.45 * pulse).toFixed(3) + ')';
    ctx.fill();
    ctx.restore();
  }
}

function drawStarPath(ctx, x, y, r) {
  ctx.beginPath();
  for (var i = 0; i < 10; i++) {
    var ang = -Math.PI / 2 + i * Math.PI / 5;
    var rad = i % 2 === 0 ? r : r * 0.45;
    var sx = x + Math.cos(ang) * rad, sy = y + Math.sin(ang) * rad;
    if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
  }
  ctx.closePath();
}

function drawRing(ctx) {
  if (!ringObj) return;
  var S = GF.S;
  var x = px(ringObj.x, 0.985), y = py(0.985, ringObj.h);
  var r = ringObj.r * V.goalH;
  ctx.save();
  ctx.strokeStyle = ringObj.flash > 0 ? '#ffffff' : '#7fe7ff';
  ctx.shadowColor = '#7fe7ff'; ctx.shadowBlur = 12 * S;
  ctx.lineWidth = Math.max(2, 3.4 * S);
  ctx.globalAlpha = 0.9;
  ctx.beginPath(); ctx.arc(x, y, r, 0, 6.29); ctx.stroke();
  ctx.lineWidth = Math.max(1, 1.4 * S);
  ctx.globalAlpha = 0.45;
  ctx.beginPath(); ctx.arc(x, y, r * 0.8, 0, 6.29); ctx.stroke();
  ctx.restore();
}

// ── STICKMEN ────────────────────────────────────────────────────────────────
function stickHead(ctx, x, y, r) { ctx.beginPath(); ctx.arc(x, y, r, 0, 6.29); ctx.fill(); }

function drawWallMan(ctx, m, z) {
  var S = GF.S;
  var lift = jumpLift(m);
  var feetY = py(z, lift * 0.62);
  var hpx = hUnit(z) * 0.5;
  var x = px(m.x, z);
  var headR = hpx * 0.16;
  var col = m.flinch > 0 ? '#ff8a6a' : (theme === 1 ? '#dfe8ff' : '#22303e');
  // shadow stays on the ground
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(x, groundY(z) + 2 * S, hpx * 0.22, hpx * 0.07, 0, 0, 6.29); ctx.fill();
  ctx.strokeStyle = col; ctx.fillStyle = col;
  ctx.lineWidth = Math.max(2, hpx * 0.085);
  ctx.lineCap = 'round';
  var hipY = feetY - hpx * 0.45, shY = feetY - hpx * 0.78, headY = feetY - hpx * 0.88;
  var legSpread = lift > 0.02 ? hpx * 0.10 : hpx * 0.16;
  var legLift = lift > 0.02 ? hpx * 0.12 : 0;
  line(ctx, x, hipY, x - legSpread, feetY - legLift);
  line(ctx, x, hipY, x + legSpread, feetY - legLift);
  line(ctx, x, hipY, x, shY);
  if (lift > 0.02) {
    line(ctx, x, shY, x - hpx * 0.18, shY - hpx * 0.22);
    line(ctx, x, shY, x + hpx * 0.18, shY - hpx * 0.22);
  } else {
    line(ctx, x, shY, x - hpx * 0.10, hipY + hpx * 0.06);
    line(ctx, x, shY, x + hpx * 0.10, hipY + hpx * 0.06);
  }
  stickHead(ctx, x, headY - headR * 0.4, headR);
  ctx.lineCap = 'butt';
}

function drawWall(ctx) {
  for (var i = wallRows.length - 1; i >= 0; i--) {
    var row = wallRows[i];
    for (var j = 0; j < row.men.length; j++) drawWallMan(ctx, row.men[j], row.z);
  }
}

function drawKeeper(ctx) {
  if (!keeper) return;
  var S = GF.S;
  var z = KEEPER_Z;
  var hpx = hUnit(z) * 0.56;
  var x = px(keeper.x, z);
  var feetY = groundY(z);
  var col = '#ffd23c';
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(x, feetY + 2 * S, hpx * 0.3, hpx * 0.08, 0, 0, 6.29); ctx.fill();
  ctx.strokeStyle = col; ctx.fillStyle = col;
  ctx.lineWidth = Math.max(2, hpx * 0.085);
  ctx.lineCap = 'round';
  if (keeper.state === 'HOLD') {
    var hx = px(keeper.holdX, z);
    var hy = py(z, keeper.holdH);
    var shY2 = feetY - hpx * 0.6;
    line(ctx, hx, feetY - hpx * 0.34, hx - hpx * 0.14, feetY);
    line(ctx, hx, feetY - hpx * 0.34, hx + hpx * 0.14, feetY);
    line(ctx, hx, feetY - hpx * 0.34, hx, shY2);
    line(ctx, hx, shY2, hx - hpx * 0.2, hy);
    line(ctx, hx, shY2, hx + hpx * 0.2, hy);
    stickHead(ctx, hx, shY2 - hpx * 0.16, hpx * 0.14);
    drawBallShape(ctx, hx, hy, V.ballR * depthScale(z) * 0.9);
    ctx.lineCap = 'butt';
    return;
  }
  var diving = keeper.state === 'DIVE';
  var lean = diving ? GF.clamp(keeper.predicted * 1.1, -1, 1) : Math.sin(keeper.swayT * 1.7) * 0.12;
  var hipY = feetY - hpx * 0.42, shY = feetY - hpx * 0.74;
  var ox = lean * hpx * 0.4;
  line(ctx, x, hipY, x - hpx * 0.18 - ox * 0.3, feetY);
  line(ctx, x, hipY, x + hpx * 0.18 - ox * 0.3, feetY);
  line(ctx, x, hipY, x + ox, shY);
  if (diving) {
    line(ctx, x + ox, shY, x + ox + lean * hpx * 0.5, shY - hpx * 0.34);
    line(ctx, x + ox, shY, x + ox + lean * hpx * 0.42, shY - hpx * 0.1);
  } else {
    line(ctx, x + ox, shY, x + ox - hpx * 0.26, shY + hpx * 0.10);
    line(ctx, x + ox, shY, x + ox + hpx * 0.26, shY + hpx * 0.10);
  }
  stickHead(ctx, x + ox, shY - hpx * 0.16, hpx * 0.14);
  ctx.fillStyle = '#ff5a5a';
  if (diving) { ctx.beginPath(); ctx.arc(x + ox + lean * hpx * 0.5, shY - hpx * 0.34, hpx * 0.06, 0, 6.29); ctx.fill(); }
  ctx.lineCap = 'butt';
}

function drawStriker(ctx) {
  var S = GF.S;
  var hpx = V.goalH * 1.7 * 0.62;
  var baseX = V.ballX - 52 * S, baseY = V.ballY + 14 * S;
  var col = theme === 1 ? '#e8f0ff' : '#1a2430';
  var kt = kickT < 0 ? 0 : Math.min(1, kickT / 0.42);
  var ap = kt <= 0 ? 0 : (kt < 0.6 ? kt / 0.6 : 1);
  var x = GF.lerp(baseX, V.ballX - 16 * S, ap);
  var y = GF.lerp(baseY, V.ballY + 4 * S, ap);
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(x, y + 3 * S, hpx * 0.22, hpx * 0.06, 0, 0, 6.29); ctx.fill();
  ctx.strokeStyle = col; ctx.fillStyle = col;
  ctx.lineWidth = Math.max(3, hpx * 0.085);
  ctx.lineCap = 'round';
  var hipY = y - hpx * 0.42, shY = y - hpx * 0.74, headY = y - hpx * 0.86;
  var swing = kt < 0.6 ? 0 : Math.sin((kt - 0.6) / 0.4 * Math.PI);
  var runPh = kt > 0 && kt < 0.6 ? Math.sin(kt * 22) : 0;
  line(ctx, x, hipY, x - hpx * 0.14 + runPh * hpx * 0.08, y);
  var kickFootX = x + hpx * (0.16 + swing * 0.34), kickFootY = y - swing * hpx * 0.30;
  line(ctx, x, hipY, kickFootX, kickFootY);
  var leanB = -swing * hpx * 0.10;
  line(ctx, x, hipY, x + leanB, shY);
  line(ctx, x + leanB, shY, x - hpx * 0.22 - swing * hpx * 0.08, shY + hpx * 0.14);
  line(ctx, x + leanB, shY, x + hpx * 0.22 + swing * hpx * 0.06, shY + hpx * 0.02);
  stickHead(ctx, x + leanB, headY, hpx * 0.13);
  ctx.lineCap = 'butt';
}

// ── BALL ────────────────────────────────────────────────────────────────────
function drawBallShape(ctx, x, y, r) {
  var img = GF.sprites && GF.sprites.football;
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(ball.spin * (ball.u || 0));
    ctx.drawImage(img, -r, -r, r * 2, r * 2);
    ctx.restore();
  } else {
    ctx.fillStyle = '#f8f8f8';
    ctx.beginPath(); ctx.arc(x, y, r, 0, 6.29); ctx.fill();
    ctx.strokeStyle = '#222'; ctx.lineWidth = Math.max(1, r * 0.08);
    ctx.stroke();
    ctx.fillStyle = '#222';
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(ball.spin * (ball.u || 0));
    ctx.beginPath();
    for (var i = 0; i < 5; i++) {
      var a = -Math.PI / 2 + i * Math.PI * 2 / 5;
      var ppx = Math.cos(a) * r * 0.42, ppy = Math.sin(a) * r * 0.42;
      if (i === 0) ctx.moveTo(ppx, ppy); else ctx.lineTo(ppx, ppy);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  if (skin > 0) {
    ctx.save();
    ctx.strokeStyle = SKIN_COLS[skin];
    ctx.lineWidth = Math.max(1.5, r * 0.16);
    ctx.globalAlpha = 0.85;
    ctx.shadowColor = SKIN_COLS[skin]; ctx.shadowBlur = r * 0.8;
    ctx.beginPath(); ctx.arc(x, y, r * 1.02, 0, 6.29); ctx.stroke();
    ctx.restore();
  }
}

function skinTrailColor(i) {
  if (skin === 1) return 'rgba(255,' + (110 + i * 5) + ',40,';
  if (skin === 2) { var hue = ((animT * 240 + i * 22) % 360) | 0; return 'hsla(' + hue + ',95%,62%,'; }
  if (skin === 3) return 'rgba(255,214,90,';
  return 'rgba(255,255,255,';
}

function drawBall(ctx) {
  var S = GF.S;
  var z, h, x, y;
  if (ball.dead) {
    z = ball.dead.z; h = ball.dead.h;
    x = px(ball.dead.wx, z); y = py(z, h);
  } else if (ball.state === 'READY') {
    z = 0; h = 0;
    x = V.ballX; y = V.ballY;
  } else if (ball.state === 'RESULT' && resultType === 'goal') {
    z = 1.06; h = Math.max(0.08, (ball.netH || 0.4) - (1.25 - resultT) * 0.25);
    x = px(GF.clamp(ball.netWx || 0, -0.95, 0.95), 1); y = py(1, h);
  } else if (ball.state === 'RESULT' && (resultType === 'miss' || resultType === 'smash')) {
    var prog = 0.85 - resultT;
    z = Math.min(1.3, (resultType === 'smash' ? 1.04 : Math.max(ball.u, 1)) + prog * 0.3);
    h = Math.max(0, (resultType === 'smash' ? (ball.netH || 0.3) : (ball.missH || 0.2)) - prog * 0.9);
    x = px(resultType === 'smash' ? GF.clamp(ball.netWx, -0.95, 0.95) : (ball.missWx || 0), Math.min(z, 1.25)); y = py(Math.min(z, 1.25), h);
  } else if (ball.state === 'RESULT') {
    // save handled by keeper HOLD (ball hidden) or dead bounce above
    z = ball.u; h = hAt(Math.min(ball.u, 1));
    x = px(wxAt(Math.min(ball.u, 1)), Math.min(ball.u, 1)); y = py(Math.min(ball.u, 1), h);
  } else {
    var u = Math.min(ball.u, 1);
    z = u; h = hAt(u);
    x = px(wxAt(u), u); y = py(u, h);
  }
  var r = V.ballR * depthScale(Math.min(z, 1.25));
  if (ball.state === 'FLIGHT' || (ball.state === 'RESULT' && resultType === 'goal')) {
    for (var i = 0; i < trail.length; i++) {
      var tp = trail[i];
      var a = Math.max(0, 0.5 - tp.t * 0.8) * (i / trail.length);
      if (a <= 0.01) continue;
      ctx.fillStyle = skinTrailColor(i) + a.toFixed(3) + ')';
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, r * 0.62 * (i / trail.length + 0.25), 0, 6.29);
      ctx.fill();
    }
  }
  var shY = groundY(Math.min(z, 1.2));
  var shA = GF.clamp(0.35 - h * 0.16, 0.08, 0.35);
  ctx.fillStyle = 'rgba(0,0,0,' + shA.toFixed(2) + ')';
  ctx.beginPath(); ctx.ellipse(x, shY + 2 * S, r * 0.9, r * 0.3, 0, 0, 6.29); ctx.fill();
  drawBallShape(ctx, x, y, r);
  if (skin === 1 && ball.state === 'FLIGHT' && Math.random() < 0.4) {
    GF.spawnParticles(x, y, '#ff8a3c', 1);
  }
}

function drawConfetti(ctx) {
  for (var i = 0; i < confetti.length; i++) {
    var c = confetti[i];
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.globalAlpha = Math.min(1, c.life);
    ctx.fillStyle = c.c;
    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawShards(ctx) {
  for (var i = 0; i < shards.length; i++) {
    var s = shards[i];
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    ctx.globalAlpha = Math.max(0, Math.min(1, s.life)) * 0.85;
    ctx.fillStyle = 'rgba(200,235,255,0.9)';
    ctx.beginPath();
    ctx.moveTo(0, -s.s); ctx.lineTo(s.s * 0.7, s.s * 0.5); ctx.lineTo(-s.s * 0.6, s.s * 0.4);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawRain(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.strokeStyle = 'rgba(200,220,240,0.4)';
  ctx.lineWidth = Math.max(1, 1.2 * S);
  ctx.beginPath();
  for (var i = 0; i < rain.length; i++) {
    var r = rain[i];
    var x = r.x * W, y = r.y * H;
    ctx.moveTo(x, y);
    ctx.lineTo(x - 4 * S, y + 12 * S);
  }
  ctx.stroke();
}

// ── HUD ─────────────────────────────────────────────────────────────────────
function drawCoinIcon(ctx, x, y, r) {
  ctx.save();
  ctx.fillStyle = '#ffd86b';
  ctx.beginPath(); ctx.arc(x, y, r, 0, 6.29); ctx.fill();
  ctx.fillStyle = '#e8a93c';
  ctx.beginPath(); ctx.arc(x, y, r * 0.72, 0, 6.29); ctx.fill();
  ctx.fillStyle = '#ffe9a0';
  ctx.beginPath(); ctx.arc(x - r * 0.25, y - r * 0.3, r * 0.22, 0, 6.29); ctx.fill();
  ctx.restore();
}

function drawBallIcon(ctx, x, y, r, dim) {
  ctx.save();
  ctx.globalAlpha = dim ? 0.25 : 1;
  ctx.fillStyle = '#f4f4f4';
  ctx.beginPath(); ctx.arc(x, y, r, 0, 6.29); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(x, y, r * 0.34, 0, 6.29); ctx.fill();
  ctx.restore();
}

function pill(ctx, x, y, w, h, fill) {
  ctx.fillStyle = fill || 'rgba(10,16,26,0.62)';
  ctx.beginPath();
  var r = h / 2;
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  ctx.fill();
}

function drawHUD(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  uiRects = {};
  var fs = GF.clamp(16 * S, 13, 22);
  var pad = 10 * S;
  var topY = 10 * S;
  ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + fs + 'px ' + FONT;

  // level pill (top-left)
  var lvlTxt = fmt(t('lvl'), { '%n': level });
  var lw1 = ctx.measureText(lvlTxt).width;
  var ph = GF.clamp(34 * S, 28, 46);
  pill(ctx, pad, topY, lw1 + pad * 2, ph);
  ctx.fillStyle = '#ffffff'; ctx.textAlign = 'left';
  ctx.fillText(lvlTxt, pad * 2, topY + ph / 2);

  // coins pill (top-right)
  var cTxt = String(coins);
  var cw = ctx.measureText(cTxt).width;
  var coinR = ph * 0.32;
  var cpw = cw + coinR * 2 + pad * 2.4;
  var cpx = W - pad - cpw;
  pill(ctx, cpx, topY, cpw, ph);
  drawCoinIcon(ctx, cpx + pad + coinR * 0.8, topY + ph / 2, coinR);
  ctx.fillStyle = '#ffe9a0'; ctx.textAlign = 'left';
  ctx.fillText(cTxt, cpx + pad + coinR * 2, topY + ph / 2);

  // right-edge button stack: pause, help, mute
  var bs = GF.clamp(44 * S, 40, 56);
  var bx = W - pad - bs;
  var by = topY + ph + 8 * S;
  drawSquareBtn(ctx, bx, by, bs, 'pause');
  uiRects.pause = { x: bx, y: by, w: bs, h: bs };
  drawSquareBtn(ctx, bx, by + bs + 8 * S, bs, 'help');
  uiRects.help = { x: bx, y: by + bs + 8 * S, w: bs, h: bs };
  drawSquareBtn(ctx, bx, by + (bs + 8 * S) * 2, bs, 'mute');
  uiRects.mute = { x: bx, y: by + (bs + 8 * S) * 2, w: bs, h: bs };

  // streak flame (top-center)
  if (streak >= 2) {
    var sx = GF.cx, sy = topY + ph / 2;
    drawFlame(ctx, sx - 16 * S, sy, 11 * S);
    ctx.fillStyle = '#ff9a3c'; ctx.textAlign = 'left';
    ctx.font = 'bold ' + fs + 'px ' + FONT;
    ctx.fillText(fmt(t('streak'), { '%n': streak }), sx - 2 * S, sy);
  }

  // wind arrow (under streak)
  if (wind !== 0 && gs === 'PLAYING' && cfg && !cfg.bonus) {
    var wy = topY + ph + 14 * S;
    var mag = Math.abs(wind);
    var dir = wind > 0 ? 1 : -1;
    ctx.font = GF.clamp(12 * S, 10, 16) + 'px ' + FONT;
    ctx.fillStyle = '#cfe3ff'; ctx.textAlign = 'center';
    ctx.fillText(t('wind'), GF.cx, wy);
    var ax = GF.cx, ay = wy + 14 * S;
    var alen = (16 + mag * 50) * S;
    ctx.strokeStyle = '#cfe3ff'; ctx.lineWidth = Math.max(2, 2.6 * S); ctx.lineCap = 'round';
    line(ctx, ax - alen / 2 * dir, ay, ax + alen / 2 * dir, ay);
    ctx.beginPath();
    ctx.moveTo(ax + alen / 2 * dir, ay);
    ctx.lineTo(ax + (alen / 2 - 7 * S) * dir, ay - 5 * S);
    ctx.moveTo(ax + alen / 2 * dir, ay);
    ctx.lineTo(ax + (alen / 2 - 7 * S) * dir, ay + 5 * S);
    ctx.stroke();
    ctx.lineCap = 'butt';
  }

  // bottom: balls remaining + quota
  if ((gs === 'PLAYING' || gs === 'HUB') && cfg) {
    var qy = H - 34 * S;
    var br = GF.clamp(9 * S, 7, 13);
    var totalW = budget * (br * 2 + 6 * S) - 6 * S;
    var startX = GF.cx - totalW / 2 + br;
    for (var i = 0; i < budget; i++) drawBallIcon(ctx, startX + i * (br * 2 + 6 * S), qy - 16 * S, br, i >= ballsLeft);
    ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px ' + FONT;
    var danger = !cfg.bonus && (quota - goalsScored) >= ballsLeft && goalsScored < quota;
    ctx.fillStyle = danger ? '#ff7a6a' : '#eaf4ff';
    ctx.textAlign = 'center';
    if (cfg.bonus) {
      ctx.fillText(t('bonus_round'), GF.cx, qy + 4 * S);
    } else {
      ctx.fillText(fmt(t('goals_of'), { '%a': goalsScored, '%b': quota }), GF.cx, qy + 4 * S);
    }
  }

  // swipe trace while dragging
  if (swipe && swipe.pts.length > 1) {
    ctx.strokeStyle = 'rgba(255,255,255,0.65)';
    ctx.lineWidth = Math.max(3, 5 * S);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    for (var sp = 0; sp < swipe.pts.length; sp++) {
      var p = swipe.pts[sp];
      if (sp === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.lineCap = 'butt';
  }
  ctx.textBaseline = 'alphabetic';
}

function drawFlame(ctx, x, y, r) {
  ctx.save();
  ctx.fillStyle = '#ff9a3c';
  ctx.beginPath();
  ctx.moveTo(x, y - r);
  ctx.quadraticCurveTo(x + r * 0.9, y - r * 0.2, x + r * 0.45, y + r * 0.55);
  ctx.quadraticCurveTo(x + r * 0.2, y + r, x, y + r * 0.9);
  ctx.quadraticCurveTo(x - r * 0.2, y + r, x - r * 0.45, y + r * 0.55);
  ctx.quadraticCurveTo(x - r * 0.9, y - r * 0.2, x, y - r);
  ctx.fill();
  ctx.fillStyle = '#ffe066';
  ctx.beginPath(); ctx.arc(x, y + r * 0.35, r * 0.34, 0, 6.29); ctx.fill();
  ctx.restore();
}

function drawSquareBtn(ctx, x, y, s, kind) {
  var S = GF.S;
  ctx.fillStyle = 'rgba(10,16,26,0.62)';
  ctx.beginPath();
  var r = 10 * S;
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + s, y, x + s, y + s, r);
  ctx.arcTo(x + s, y + s, x, y + s, r);
  ctx.arcTo(x, y + s, x, y, r);
  ctx.arcTo(x, y, x + s, y, r);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.stroke();
  var cx2 = x + s / 2, cy2 = y + s / 2;
  if (kind === 'pause') {
    ctx.strokeStyle = '#eaf4ff'; ctx.lineWidth = Math.max(2, 2.6 * S); ctx.lineCap = 'round';
    for (var i = -1; i <= 1; i++) line(ctx, x + s * 0.28, cy2 + i * s * 0.18, x + s * 0.72, cy2 + i * s * 0.18);
    ctx.lineCap = 'butt';
  } else if (kind === 'help') {
    ctx.fillStyle = '#eaf4ff';
    ctx.font = 'bold ' + (s * 0.52) + 'px ' + FONT;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', cx2, cy2 + s * 0.02);
  } else if (kind === 'mute') {
    GF.drawMuteIcon(ctx, cx2, cy2, s * 0.3, muted);
  }
}

function drawFlash(ctx) {
  var S = GF.S;
  var a = Math.min(1, flashMsg.t / 0.3);
  var popT = 1.1 - flashMsg.t;
  var scale = popT < 0.18 ? 0.6 + (popT / 0.18) * 0.5 : 1.1 - Math.min(0.1, (popT - 0.18) * 0.2);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.translate(GF.cx, GF.H * 0.42);
  ctx.scale(scale, scale);
  ctx.font = 'bold ' + GF.clamp(46 * S, 30, 64) + 'px ' + FONT;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = Math.max(4, 7 * S);
  ctx.strokeStyle = 'rgba(8,12,20,0.85)';
  ctx.strokeText(flashMsg.text, 0, 0);
  ctx.fillStyle = flashMsg.col;
  ctx.fillText(flashMsg.text, 0, 0);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';
}

function drawToast(ctx) {
  var S = GF.S;
  var a = Math.min(1, toast.t / 0.4);
  var fs = GF.clamp(14 * S, 12, 18);
  ctx.font = 'bold ' + fs + 'px ' + FONT;
  var tw = ctx.measureText(toast.text).width;
  var ph = GF.clamp(36 * S, 30, 46);
  var pw = Math.min(GF.W * 0.92, tw + 36 * S);
  var x = GF.cx - pw / 2, y = GF.H - 96 * S;
  ctx.save();
  ctx.globalAlpha = a;
  pill(ctx, x, y, pw, ph, 'rgba(12,18,30,0.88)');
  ctx.fillStyle = toast.col;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var f2 = fs;
  while (ctx.measureText(toast.text).width > pw - 24 * S && f2 > 10) { f2--; ctx.font = 'bold ' + f2 + 'px ' + FONT; }
  ctx.fillText(toast.text, GF.cx, y + ph / 2);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';
}

// ── OVERLAYS ────────────────────────────────────────────────────────────────
function bigBtn(ctx, id, y, label, accent, w) {
  var S = GF.S;
  var bw = w || Math.min(GF.W * 0.86, 460 * S);
  var bh = GF.clamp(56 * S, 48, 72);
  var x = GF.cx - bw / 2;
  ctx.save();
  var grad = ctx.createLinearGradient(x, y, x, y + bh);
  if (accent === 'green') { grad.addColorStop(0, '#2ee07a'); grad.addColorStop(1, '#23a657'); }
  else if (accent === 'gold') { grad.addColorStop(0, '#ffd86b'); grad.addColorStop(1, '#d8a93c'); }
  else if (accent === 'blue') { grad.addColorStop(0, '#4da3ff'); grad.addColorStop(1, '#2a6fd8'); }
  else { grad.addColorStop(0, 'rgba(255,255,255,0.14)'); grad.addColorStop(1, 'rgba(255,255,255,0.07)'); }
  ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 8 * S; ctx.shadowOffsetY = 3 * S;
  ctx.fillStyle = grad;
  ctx.beginPath();
  var r = bh / 2;
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + bw, y, x + bw, y + bh, r);
  ctx.arcTo(x + bw, y + bh, x, y + bh, r);
  ctx.arcTo(x, y + bh, x, y, r);
  ctx.arcTo(x, y, x + bw, y, r);
  ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.fillStyle = accent === 'gold' ? '#3a2a08' : '#ffffff';
  var fs = GF.clamp(19 * S, 15, 26);
  ctx.font = 'bold ' + fs + 'px ' + FONT;
  while (ctx.measureText(label).width > bw - 36 * S && fs > 11) { fs--; ctx.font = 'bold ' + fs + 'px ' + FONT; }
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, GF.cx, y + bh / 2 + 1);
  ctx.textBaseline = 'alphabetic';
  uiRects[id] = { x: x, y: y, w: bw, h: bh };
  return y + bh;
}

function scrim(ctx, a) {
  ctx.fillStyle = 'rgba(6,10,18,' + (a || 0.78) + ')';
  ctx.fillRect(0, 0, GF.W, GF.H);
}

function cardTitle(ctx, text, y, col) {
  var S = GF.S;
  ctx.fillStyle = col || '#ffffff';
  var fs = GF.clamp(30 * S, 22, 42);
  ctx.font = 'bold ' + fs + 'px ' + FONT;
  var maxW = GF.W * 0.92;
  while (ctx.measureText(text).width > maxW && fs > 14) { fs--; ctx.font = 'bold ' + fs + 'px ' + FONT; }
  ctx.textAlign = 'center';
  ctx.fillText(text, GF.cx, y);
}

function drawHub(ctx) {
  var S = GF.S, H = GF.H;
  uiRects = {};
  scrim(ctx, 0.8);
  cardTitle(ctx, t('paused'), H * 0.16);
  ctx.font = GF.clamp(15 * S, 12, 20) + 'px ' + FONT;
  ctx.fillStyle = '#9fb8d8'; ctx.textAlign = 'center';
  ctx.fillText(fmt(t('best_streak'), { '%n': bestStreak }) + '   ' + fmt(t('stars_lbl'), { '%n': stars }), GF.cx, H * 0.16 + 30 * S);
  ctx.fillText(fmt(t('best_level'), { '%n': bestLevel }) + '   ' + fmt(t('day_streak'), { '%d': dailyStreak }), GF.cx, H * 0.16 + 52 * S);
  var y = H * 0.30;
  var gap = GF.clamp(16 * S, 12, 24);
  y = bigBtn(ctx, 'resume', y, t('resume'), 'green') + gap;
  y = bigBtn(ctx, 'shop', y, t('shop'), 'gold') + gap;
  y = bigBtn(ctx, 'howto', y, t('how_to'), 'blue') + gap;
  y = bigBtn(ctx, 'sound', y, muted ? t('sound_off') : t('sound_on'), 'plain') + gap;
}

function drawShop(ctx) {
  var S = GF.S, H = GF.H, W = GF.W;
  uiRects = {};
  scrim(ctx, 0.84);
  cardTitle(ctx, t('shop'), H * 0.10);
  ctx.font = 'bold ' + GF.clamp(17 * S, 14, 24) + 'px ' + FONT;
  ctx.textAlign = 'center';
  drawCoinIcon(ctx, GF.cx - 34 * S, H * 0.10 + 26 * S, 9 * S);
  ctx.fillStyle = '#ffe9a0';
  ctx.fillText(String(coins), GF.cx + 6 * S, H * 0.10 + 31 * S);
  var cardW = Math.min(W * 0.86, 460 * S);
  var btnH = GF.clamp(56 * S, 48, 72);
  var gap = GF.clamp(12 * S, 10, 18);
  var topListY = H * 0.10 + 48 * S;
  var availH = (H - 14 * S - btnH - gap) - topListY;
  var cardH = Math.min(GF.clamp(74 * S, 56, 96), (availH - gap * 3) / 4);
  var y = topListY;
  ctx.textBaseline = 'middle';
  for (var i = 0; i < 4; i++) {
    var x = GF.cx - cardW / 2;
    ctx.fillStyle = skin === i ? 'rgba(46,224,122,0.16)' : 'rgba(255,255,255,0.07)';
    ctx.strokeStyle = skin === i ? '#2ee07a' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = Math.max(1, 2 * S);
    ctx.beginPath();
    var r = 14 * S;
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + cardW, y, x + cardW, y + cardH, r);
    ctx.arcTo(x + cardW, y + cardH, x, y + cardH, r);
    ctx.arcTo(x, y + cardH, x, y, r);
    ctx.arcTo(x, y, x + cardW, y, r);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    var pr = cardH * 0.3;
    var pxx = x + cardH * 0.5, pyy = y + cardH / 2;
    ctx.save();
    ctx.shadowColor = SKIN_COLS[i]; ctx.shadowBlur = i > 0 ? pr : 0;
    ctx.fillStyle = '#f4f4f4';
    ctx.beginPath(); ctx.arc(pxx, pyy, pr, 0, 6.29); ctx.fill();
    ctx.restore();
    ctx.strokeStyle = SKIN_COLS[i]; ctx.lineWidth = Math.max(2, pr * 0.2);
    ctx.beginPath(); ctx.arc(pxx, pyy, pr, 0, 6.29); ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold ' + GF.clamp(17 * S, 13, 22) + 'px ' + FONT;
    ctx.textAlign = 'left';
    ctx.fillText(t(SKIN_KEYS[i]), x + cardH * 0.95, y + cardH * 0.32);
    ctx.font = GF.clamp(14 * S, 11, 18) + 'px ' + FONT;
    if (skin === i) { ctx.fillStyle = '#2ee07a'; ctx.fillText(t('equipped'), x + cardH * 0.95, y + cardH * 0.68); }
    else if (owned[i]) { ctx.fillStyle = '#9fb8d8'; ctx.fillText(t('equip'), x + cardH * 0.95, y + cardH * 0.68); }
    else {
      ctx.fillStyle = coins >= SKIN_COSTS[i] ? '#ffe9a0' : '#ff8a6a';
      drawCoinIcon(ctx, x + cardH * 0.95 + 7 * S, y + cardH * 0.68, 7 * S);
      ctx.fillText(fmt(t('buy_for'), { '%n': SKIN_COSTS[i] }), x + cardH * 0.95 + 18 * S, y + cardH * 0.68);
    }
    uiRects['skin' + i] = { x: x, y: y, w: cardW, h: cardH };
    y += cardH + gap;
  }
  ctx.textBaseline = 'alphabetic';
  bigBtn(ctx, 'back', y + gap * 0.5, t('back'), 'plain');
}

function drawWin(ctx) {
  var S = GF.S, H = GF.H;
  uiRects = {};
  scrim(ctx, 0.74);
  cardTitle(ctx, cfg.bonus ? t('bonus_done') : fmt(t('level_clear'), { '%n': level }), H * 0.3, '#7CFC9A');
  ctx.font = 'bold ' + GF.clamp(19 * S, 15, 26) + 'px ' + FONT;
  ctx.fillStyle = '#ffe9a0'; ctx.textAlign = 'center';
  ctx.fillText(fmt(t('coins_earned'), { '%n': levelCoins }), GF.cx, H * 0.3 + 44 * S);
  if (!cfg.bonus && ballsLeft > 0) {
    ctx.font = GF.clamp(15 * S, 12, 20) + 'px ' + FONT;
    ctx.fillStyle = '#9fb8d8';
    ctx.fillText(fmt(t('leftover'), { '%n': ballsLeft * 5 }), GF.cx, H * 0.3 + 72 * S);
  }
  bigBtn(ctx, 'next', H * 0.52, t('next'), 'green');
}

function drawFail(ctx) {
  var S = GF.S, H = GF.H;
  uiRects = {};
  scrim(ctx, 0.78);
  cardTitle(ctx, t('out_of_balls'), H * 0.28, '#ff8a6a');
  ctx.font = 'bold ' + GF.clamp(18 * S, 14, 24) + 'px ' + FONT;
  ctx.fillStyle = '#eaf4ff'; ctx.textAlign = 'center';
  ctx.fillText(fmt(t('goals_needed'), { '%a': goalsScored, '%b': quota }), GF.cx, H * 0.28 + 40 * S);
  var y = H * 0.46;
  if (!rewardUsedThisLevel) {
    y = bigBtn(ctx, 'plusballs', y, t('plus_balls'), 'gold') + GF.clamp(16 * S, 12, 24);
  }
  bigBtn(ctx, 'retry', y, t('retry'), 'green');
}

function drawHelp(ctx) {
  var S = GF.S, H = GF.H, W = GF.W;
  scrim(ctx, 0.86);
  cardTitle(ctx, t('help_title'), H * 0.10);
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var fs = GF.clamp(15 * S, 12, 19);
  ctx.font = fs + 'px ' + FONT;
  ctx.textAlign = 'left';
  var maxW = Math.min(W * 0.86, 480 * S);
  var x = GF.cx - maxW / 2;
  var y = H * 0.10 + 34 * S;
  var lineH = fs * 1.42;
  for (var i = 0; i < keys.length; i++) {
    var words = t(keys[i]).split(' ');
    var cur = '';
    ctx.fillStyle = i === 4 ? '#ffe9a0' : '#dfe9f8';
    for (var wd = 0; wd < words.length; wd++) {
      var probe = cur ? cur + ' ' + words[wd] : words[wd];
      if (ctx.measureText(probe).width > maxW && cur) { ctx.fillText(cur, x, y); y += lineH; cur = words[wd]; }
      else cur = probe;
    }
    if (cur) { ctx.fillText(cur, x, y); y += lineH; }
    y += lineH * 0.5;
    if (y > H * 0.80) break;
  }
  bigBtn(ctx, 'helpclose', Math.min(H * 0.86, y + 16 * S), t('close'), 'green');
}

// ── INPUT ───────────────────────────────────────────────────────────────────
var pointerDown = false;
function evtPos(e) {
  var rect = GF.canvas.getBoundingClientRect();
  var sx = GF.canvas.width / rect.width, sy = GF.canvas.height / rect.height;
  var tp = (e.touches && e.touches.length) ? e.touches[0]
        : (e.changedTouches && e.changedTouches.length) ? e.changedTouches[0]
        : null;
  var cx2 = tp ? tp.clientX : e.clientX, cy2 = tp ? tp.clientY : e.clientY;
  if (cx2 == null || cy2 == null) return { x: -1, y: -1 };
  return { x: (cx2 - rect.left) * sx, y: (cy2 - rect.top) * sy };
}
function hit(r, x, y) { return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

function onDown(x, y) {
  if (helpOpen) {
    if (hit(uiRects.helpclose, x, y)) { helpOpen = false; sfx('click'); }
    return;
  }
  // coach skip pill (manual steps fall through to the real swipe)
  if (GF.tutorial.active && gs === 'PLAYING') {
    var sb = GF.tutorial._skipBtn;
    if (sb && x >= sb.x && x <= sb.x + sb.w && y >= sb.y && y <= sb.y + sb.h) {
      GF.tutorial.handleClick(x, y);
      return;
    }
  }

  if (gs === 'HUB') {
    if (hit(uiRects.resume, x, y)) { gs = 'PLAYING'; sfx('click'); saveRun(); return; }
    if (hit(uiRects.shop, x, y)) { gs = 'SHOP'; sfx('click'); return; }
    if (hit(uiRects.howto, x, y)) { helpOpen = true; sfx('click'); return; }
    if (hit(uiRects.sound, x, y)) { muted = GF.toggleMute(); GF.setMusicMuted(muted); sfx('click'); return; }
    return;
  }
  if (gs === 'SHOP') {
    if (hit(uiRects.back, x, y)) { gs = 'HUB'; sfx('click'); return; }
    for (var i = 0; i < 4; i++) if (hit(uiRects['skin' + i], x, y)) { buySkin(i); return; }
    return;
  }
  if (gs === 'LEVELWIN') {
    if (hit(uiRects.next, x, y)) { clickNext(); }
    return;
  }
  if (gs === 'LEVELFAIL') {
    if (hit(uiRects.retry, x, y)) { clickRetry(); return; }
    if (!rewardUsedThisLevel && hit(uiRects.plusballs, x, y)) { clickPlusBalls(); return; }
    return;
  }

  // PLAYING
  if (hit(uiRects.pause, x, y)) { gs = 'HUB'; sfx('click'); return; }
  if (hit(uiRects.help, x, y)) { helpOpen = true; sfx('click'); return; }
  if (hit(uiRects.mute, x, y)) { muted = GF.toggleMute(); GF.setMusicMuted(muted); sfx('click'); return; }
  if (ball.state === 'READY' && kickT < 0) {
    swipe = { pts: [{ x: x, y: y, t: Date.now() }] };
  }
}

function onMove(x, y) {
  if (swipe) {
    var pts = swipe.pts;
    var last = pts[pts.length - 1];
    if (Math.abs(x - last.x) + Math.abs(y - last.y) > 3) pts.push({ x: x, y: y, t: Date.now() });
    if (pts.length > 64) pts.shift();
  }
}

function onUp(x, y) {
  if (!swipe) return;
  var pts = swipe.pts;
  pts.push({ x: x, y: y, t: Date.now() });
  swipe = null;
  if (gs !== 'PLAYING' || ball.state !== 'READY' || kickT >= 0) return;
  var shot = analyzeSwipe(pts);
  if (!shot) {
    var a = pts[0], b = pts[pts.length - 1];
    var moved = Math.abs(b.x - a.x) + Math.abs(b.y - a.y);
    var dur = b.t - a.t;
    if (moved < 24 * GF.S && dur < 420) shot = tapShot(b.x, b.y);
  }
  if (shot) doKick(shot);
}

GF.canvas.addEventListener('mousedown', function (e) { e.preventDefault(); var p = evtPos(e); pointerDown = true; onDown(p.x, p.y); });
window.addEventListener('mousemove', function (e) { if (!pointerDown) return; var p = evtPos(e); onMove(p.x, p.y); });
window.addEventListener('mouseup', function (e) { if (!pointerDown) return; pointerDown = false; var p = evtPos(e); onUp(p.x, p.y); });
GF.canvas.addEventListener('touchstart', function (e) { e.preventDefault(); var p = evtPos(e); pointerDown = true; onDown(p.x, p.y); }, { passive: false });
GF.canvas.addEventListener('touchmove', function (e) { e.preventDefault(); if (!pointerDown) return; var p = evtPos(e); onMove(p.x, p.y); }, { passive: false });
GF.canvas.addEventListener('touchend', function (e) { e.preventDefault(); if (!pointerDown) return; pointerDown = false; var p = evtPos(e); onUp(p.x, p.y); }, { passive: false });

// ── BOOT ────────────────────────────────────────────────────────────────────
GF.init({
  designW: DESIGN_W,
  designH: DESIGN_H,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: SAVE_KEY,
  onReady: function () {
    muted = !!GF.muted;
    GF.persist('stickman_striker_v1',
      function () {
        return {
          level: level, coins: coins, stars: stars,
          bestStreak: bestStreak, bestLevel: bestLevel,
          owned: owned, skin: skin,
          lastDaily: lastDaily, dailyStreak: dailyStreak,
        };
      },
      function (s) {
        if (!s) return;
        level = Math.max(1, s.level || 1);
        coins = Math.max(0, s.coins || 0);
        stars = Math.max(0, s.stars || 0);
        bestStreak = Math.max(0, s.bestStreak || 0);
        bestLevel = Math.max(1, s.bestLevel || 1);
        if (Array.isArray(s.owned) && s.owned.length === 4) { owned = s.owned.map(function (v) { return !!v; }); owned[0] = true; }
        skin = (typeof s.skin === 'number' && s.skin >= 0 && s.skin < 4 && owned[s.skin]) ? s.skin : 0;
        lastDaily = s.lastDaily || '';
        dailyStreak = Math.max(0, s.dailyStreak || 0);
      }
    );
    layout();
    // boot STRAIGHT into gameplay (no menu / title) - fresh safe level start
    startLevel(level, true);
    applyDaily();
    GF.startMusic({ preset: 'arcade', muted: GF.muted });
    GF.gameStarted();

    // first-run coach (suppressed on platform autostart per HARD RULE 9)
    if (window.__GF_AUTOSTART && !window._silent) {
      try { localStorage.setItem(TUT_KEY, '1'); } catch (e) {}
    } else if (!window._silent) {
      maybeStartCoach();
    }

    // ── STATE EXPOSURE (test gate / progression probe / DESIGN cross-check) ──
    GF.exposeState(function () {
      return {
        gs: gs, rawGs: gs,
        level: level, ballsLeft: ballsLeft, goalsScored: goalsScored, quota: quota, budget: budget,
        coins: coins, stars: stars, score: score, streak: streak,
        bestStreak: bestStreak, bestLevel: bestLevel, skin: skin,
        ballState: ball.state, wind: wind,
        bonus: !!(cfg && cfg.bonus), gold: !!(cfg && cfg.gold), theme: theme,
        wallMen: wallRows.reduce(function (a, r) { return a + r.men.length; }, 0),
        keeperTier: keeper ? keeper.tier : 0,
        BALL_BUDGET: BALL_BUDGET, GOAL_QUOTA: GOAL_QUOTA, BONUS_EVERY: BONUS_EVERY,
        BONUS_BALLS: BONUS_BALLS, GOLD_EVERY: GOLD_EVERY,
        FLIGHT_T_BASE: FLIGHT_T_BASE, FLIGHT_T_MIN: FLIGHT_T_MIN, CURL_MAX: CURL_MAX,
        WALL_Z: WALL_Z, KEEPER_Z: KEEPER_Z, WALL_JUMP_H: WALL_JUMP_H,
        KEEPER_TIER_MAX: KEEPER_TIER_MAX, COIN_GOAL: COIN_GOAL, COIN_STAR: COIN_STAR,
        COIN_PANE: COIN_PANE, SKIN_COSTS: SKIN_COSTS, DAILY_BONUS_BASE: DAILY_BONUS_BASE,
        BALL_R: BALL_R,
      };
    });

    // ── BOT CONTRACT (progression probe drives the full loop) ──
    GF.exposeBot(botActions, botAct);

    // ── REACHABILITY (all UI pinned; no scroll regions) ──
    GF.exposeReach(function () {
      var items = [], H = GF.H;
      function add(id, r) { if (r) items.push({ id: id, x: r.x, y: r.y, w: r.w, h: r.h, pinned: true }); }
      if (helpOpen) { add('helpclose', uiRects.helpclose); return { screen: 'HELP', items: items, viewportH: H, scrollMaxY: 0, screenH: H }; }
      if (gs === 'HUB') { add('resume', uiRects.resume); add('shop', uiRects.shop); add('howto', uiRects.howto); add('sound', uiRects.sound); return { screen: 'HUB', items: items, viewportH: H, scrollMaxY: 0, screenH: H }; }
      if (gs === 'SHOP') { for (var i = 0; i < 4; i++) add('skin' + i, uiRects['skin' + i]); add('back', uiRects.back); return { screen: 'SHOP', items: items, viewportH: H, scrollMaxY: 0, screenH: H }; }
      if (gs === 'LEVELWIN') { add('next', uiRects.next); return { screen: 'LEVELWIN', items: items, viewportH: H, scrollMaxY: 0, screenH: H }; }
      if (gs === 'LEVELFAIL') { add('retry', uiRects.retry); if (!rewardUsedThisLevel) add('plusballs', uiRects.plusballs); return { screen: 'LEVELFAIL', items: items, viewportH: H, scrollMaxY: 0, screenH: H }; }
      add('pause', uiRects.pause); add('help', uiRects.help); add('mute', uiRects.mute);
      return { screen: 'PLAYING', items: items, viewportH: H, scrollMaxY: 0, screenH: H };
    });

    GF.exposeTour([
      { name: 'playing', go: function () { window._silent = true; if (GF.tutorial) GF.tutorial.active = false; helpOpen = false; if (gs !== 'PLAYING') startLevel(level, true); window._silent = false; } },
      { name: 'hub', go: function () { window._silent = true; if (GF.tutorial) GF.tutorial.active = false; helpOpen = false; if (gs !== 'PLAYING' && gs !== 'HUB') startLevel(level, true); gs = 'HUB'; window._silent = false; } },
      { name: 'shop', go: function () { window._silent = true; if (GF.tutorial) GF.tutorial.active = false; helpOpen = false; gs = 'SHOP'; window._silent = false; } },
      { name: 'levelwin', go: function () { window._silent = true; if (GF.tutorial) GF.tutorial.active = false; helpOpen = false; if (gs !== 'PLAYING') startLevel(level, true); goalsScored = quota; levelCoins = 30; gs = 'LEVELWIN'; window._silent = false; } },
      { name: 'levelfail', go: function () { window._silent = true; if (GF.tutorial) GF.tutorial.active = false; helpOpen = false; if (gs !== 'PLAYING') startLevel(level, true); ballsLeft = 0; goalsScored = 0; gs = 'LEVELFAIL'; window._silent = false; } },
    ]);
  },
  onUpdate: function (dt) { update(dt); },
  onDraw: function (ctx) { draw(ctx); },
});

window.addEventListener('beforeunload', function () { try { saveRun(); } catch (e) {} });
window.addEventListener('pagehide', function () { try { saveRun(); } catch (e) {} });

// ── BOT (progression probe) ─────────────────────────────────────────────────
function botActions() {
  var a = [];
  if (helpOpen) { a.push('close_help'); return a; }
  if (gs === 'PLAYING') {
    if (ball.state === 'READY' && kickT < 0) a.push('kick_center', 'kick_left_corner', 'kick_right_corner', 'kick_low', 'kick_curl');
  } else if (gs === 'LEVELWIN') a.push('next');
  else if (gs === 'LEVELFAIL') a.push('retry');
  else if (gs === 'HUB') a.push('resume');
  else if (gs === 'SHOP') a.push('back');
  return a;
}
function botAct(action) {
  window._silent = true;
  if (GF.tutorial) GF.tutorial.active = false;
  if (action === 'close_help') helpOpen = false;
  else if (action === 'kick_center') doKick({ aimX: 0, aimH: 0.5, curl: 0, flightT: 0.78 });
  else if (action === 'kick_left_corner') doKick({ aimX: -0.74, aimH: 0.72, curl: 0, flightT: 0.68 });
  else if (action === 'kick_right_corner') doKick({ aimX: 0.74, aimH: 0.72, curl: 0, flightT: 0.68 });
  else if (action === 'kick_low') doKick({ aimX: 0.2, aimH: 0.16, curl: 0, flightT: 0.62 });
  else if (action === 'kick_curl') doKick({ aimX: 0.3, aimH: 0.6, curl: -0.6, flightT: 0.74 });
  else if (action === 'next' && gs === 'LEVELWIN') startLevel(level + 1, true);
  else if (action === 'retry' && gs === 'LEVELFAIL') startLevel(level, true);
  else if (action === 'resume' && gs === 'HUB') gs = 'PLAYING';
  else if (action === 'back' && gs === 'SHOP') gs = 'HUB';
  window._silent = false;
}

// ── TEST / SCREENSHOT SEAMS ─────────────────────────────────────────────────
window._setState = function (s) {
  window._silent = true;
  if (GF.tutorial) GF.tutorial.active = false;
  helpOpen = false;
  if (s === 'PLAYING' || s === 'PLAY') { if (gs !== 'PLAYING') startLevel(level, true); }
  else if (s === 'HUB' || s === 'SHOP') { if (gs !== 'PLAYING' && gs !== 'HUB' && gs !== 'SHOP') startLevel(level, true); gs = s; }
  else if (s === 'LEVELWIN' || s === 'WIN') { goalsScored = quota; levelCoins = 30; gs = 'LEVELWIN'; }
  else if (s === 'LEVELFAIL' || s === 'LOSE') { ballsLeft = 0; goalsScored = 0; gs = 'LEVELFAIL'; }
  else if (s === 'HELP') { helpOpen = true; }
  window._silent = false;
};
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return FONT; };
window._getUiRects = function () { return uiRects; };

window._jumpLevel = function (n) {
  window._setupForScreenshot((n | 0) > 0 ? (n | 0) : 5);
};

// land mid-flight on a dense late state (>=70% gameplay, populated frame)
window._setupForScreenshot = function (lvl) {
  window._silent = true;
  window._screenshotFreeze = false;
  try { localStorage.setItem(TUT_KEY, '1'); } catch (e) {}
  if (GF.tutorial) GF.tutorial.active = false;
  helpOpen = false;
  layout();
  startLevel((typeof lvl === 'number' && lvl > 0) ? lvl : 8, true);
  // progressed-session HUD
  coins = Math.max(coins, 184); stars = Math.max(stars, 6); streak = 3; score = 240;
  goalsScored = Math.max(1, Math.min(quota - 1, 2)); ballsLeft = Math.max(2, budget - 2);
  // stage a shot curling toward the top-right star target
  doKick({ aimX: 0.42, aimH: 0.78, curl: 0.32, flightT: 0.8 });
  launchBall();
  kickT = 0.31;                       // striker mid-swing
  // advance flight to just before the wall, with the wall jumping
  var steps = 30;
  for (var i = 0; i < steps; i++) {
    ball.u += (1 / 60) / ball.flightT;
    trail.push({ x: px(wxAt(ball.u), ball.u), y: py(ball.u, hAt(ball.u)), t: 0 });
    if (trail.length > 26) trail.shift();
  }
  for (var w = 0; w < wallRows.length; w++) for (var m = 0; m < wallRows[w].men.length; m++) { wallRows[w].men[m].jumpT = 0.5; }
  if (keeper) { keeper.state = 'DIVE'; keeper.predicted = 0.5; keeper.x = 0.28; }
  GF.spawnParticles(px(wxAt(ball.u), ball.u), py(ball.u, hAt(ball.u)), '#ffffff', 8);
  window._silent = false;
  window._screenshotFreeze = true;
};

window._smInfo = function () { try { return window.__gfState(); } catch (e) { return null; } };

})();
</script>
