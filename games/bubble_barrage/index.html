function initPools() {
  var i;
  for (i = 0; i < BUBBLE_CAP; i++) bubbles.push({ active: false, x: 0, y: 0, vx: 0, vy: 0, r: 0, hp: 0, maxHp: 0, type: 0, value: 0, scale: 1, wobble: 0, born: 0, leak: false });
  for (i = 0; i < RING_CAP; i++) rings.push({ active: false, x: 0, y: 0, r: 0, t: 0, dur: 0, col: '#fff' });
  for (i = 0; i < BEAM_CAP; i++) beams.push({ active: false, x1: 0, y1: 0, x2: 0, y2: 0, t: 0, dur: 0, col: '#fff', wide: 1 });
  for (i = 0; i < SHELL_CAP; i++) shells.push({ active: false, x: 0, y: 0, sx: 0, sy: 0, tx: 0, ty: 0, t: 0, dur: 0, splash: 0, dmg: 1, col: '#fff' });
  for (i = 0; i < ARC_CAP; i++) arcs.push({ active: false, x1: 0, y1: 0, x2: 0, y2: 0, t: 0, dur: 0, col: '#fff' });
  for (i = 0; i < 28; i++) bgBubbles.push({ x: Math.random(), y: Math.random(), r: 8 + Math.random() * 40, s: 0.018 + Math.random() * 0.035, a: 0.04 + Math.random() * 0.09 });
  for (i = 0; i < TURRET_TYPES.length; i++) {
    turrets.push({ id: TURRET_TYPES[i].id, owned: false, rate: 0, power: 0, range: 0, cd: 0, turn: 0, recoil: 0, glow: 0, x: 0, y: 0 });
  }
}
initPools();

function t(k) { return GF.t(k); }
function langObj() { return STRINGS[GF.lang] || STRINGS.en; }
function todayStr() {
  var d = new Date();
  var m = String(d.getMonth() + 1); if (m.length < 2) m = '0' + m;
  var day = String(d.getDate()); if (day.length < 2) day = '0' + day;
  return d.getFullYear() + '-' + m + '-' + day;
}
function seededRand() {
  rngState = (rngState * 1664525 + 1013904223) >>> 0;
  return rngState / 4294967296;
}
function rand() { return isDaily ? seededRand() : Math.random(); }
function clamp(v, lo, hi) { return GF.clamp(v, lo, hi); }
function nfmt(n) { return String(Math.floor(n)); }
function inRect(x, y, r) { return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
function turretById(id) {
  for (var i = 0; i < turrets.length; i++) if (turrets[i].id === id) return turrets[i];
  return null;
}
function typeById(id) {
  for (var i = 0; i < TURRET_TYPES.length; i++) if (TURRET_TYPES[i].id === id) return TURRET_TYPES[i];
  return TURRET_TYPES[0];
}
function bubbleTypeIndex(id) {
  for (var i = 0; i < BUBBLE_TYPES.length; i++) if (BUBBLE_TYPES[i].id === id) return i;
  return 0;
}
function activeBubbles() {
  var n = 0;
  for (var i = 0; i < bubbles.length; i++) if (bubbles[i].active) n++;
  return n;
}
function ownedTurretCount() {
  var n = 0;
  for (var i = 0; i < turrets.length; i++) if (turrets[i].owned) n++;
  return n;
}
function totalTurretLevels() {
  var n = 0;
  for (var i = 0; i < turrets.length; i++) n += turrets[i].rate + turrets[i].power + turrets[i].range + (turrets[i].owned ? 1 : 0);
  return n;
}
function turretTier(tu) {
  if (!tu.owned) return 0;
  var n = tu.rate + tu.power + tu.range;
  if (n >= 9) return 4;
  if (n >= 6) return 3;
  if (n >= 3) return 2;
  return 1;
}
function offlineRate() {
  var base = 0;
  for (var i = 0; i < turrets.length; i++) {
    var tu = turrets[i];
    if (!tu.owned) continue;
    base += (1 + tu.power * 0.55 + tu.rate * 0.28) * (1 + wave * 0.08);
  }
  return base * OFFLINE_RATE_MULT;
}
function saveNow() {
  lastSeen = Date.now();
  GF.saveRun();
}
function showMsg(key) {
  message = t(key);
  messageT = 2.1;
}
function stateForSave() {
  return {
    gs: (gs === 'OFFLINE' ? 'PLAYING' : gs),
    score: score,
    best: best,
    bestWave: bestWave,
    wave: wave,
    focus: focus,
    coins: coins,
    parts: parts,
    fever: fever,
    pendingOffline: pendingOffline,
    playSeconds: playSeconds,
    claimedParts: claimedParts,
    dailyDoneDay: dailyDoneDay,
    lastSeen: lastSeen || Date.now(),
    firstUpgradeMarked: firstUpgradeMarked,
    firstDeathMarked: firstDeathMarked,
    turrets: turrets.map(function (tu) {
      return { id: tu.id, owned: tu.owned, rate: tu.rate, power: tu.power, range: tu.range };
    }),
  };
}
function applySave(s) {
  if (!s) return;
  score = s.score || 0;
  best = s.best || 0;
  bestWave = s.bestWave || 1;
  wave = Math.max(1, s.wave || 1);
  focus = Math.max(30, s.focus || BASE_FOCUS);
  coins = Math.max(0, s.coins || 0);
  parts = Math.max(0, s.parts || 0);
  fever = clamp(s.fever || 0, 0, FEVER_MAX);
  pendingOffline = Math.max(0, s.pendingOffline || 0);
  playSeconds = Math.max(0, s.playSeconds || 0);
  dailyDoneDay = s.dailyDoneDay || '';
  lastSeen = s.lastSeen || 0;
  firstUpgradeMarked = !!s.firstUpgradeMarked;
  firstDeathMarked = !!s.firstDeathMarked;
  if (Array.isArray(s.claimedParts)) {
    for (var c = 0; c < 3; c++) claimedParts[c] = !!s.claimedParts[c];
  }
  if (Array.isArray(s.turrets)) {
    for (var i = 0; i < s.turrets.length; i++) {
      var src = s.turrets[i], tu = turretById(src.id);
      if (!tu) continue;
      tu.owned = !!src.owned;
      tu.rate = Math.max(0, src.rate || 0);
      tu.power = Math.max(0, src.power || 0);
      tu.range = Math.max(0, src.range || 0);
    }
  }
}
function computeOffline() {
  if (!lastSeen) return 0;
  var delta = Math.max(0, Math.min(Date.now() - lastSeen, OFFLINE_CAP_HOURS * 3600000));
  var bank = Math.floor((delta / 1000) * offlineRate());
  bank = bank >= 5 ? bank : 0;
  return Math.max(pendingOffline, bank);
}

function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var portrait = H >= W;
  var pad = clamp(12 * S, 8, 18);
  L.topH = portrait ? clamp(88 * S, 74, 112) : clamp(64 * S, 52, 78);
  L.bottomH = portrait ? clamp(86 * S, 72, 100) : clamp(62 * S, 50, 74);
  L.field.x = pad;
  L.field.y = L.topH + pad * 0.2;
  L.field.w = W - pad * 2;
  L.field.h = H - L.field.y - L.bottomH - pad * 0.6;
  L.mute = { x: W - pad - 42 * S, y: pad, w: 38 * S, h: 38 * S };
  L.help = { x: W - pad - 84 * S, y: pad, w: 38 * S, h: 38 * S };
  L.feverAd = { x: W * 0.5 - clamp(128 * S, 100, 160), y: H - L.bottomH + 18 * S, w: clamp(256 * S, 200, 320), h: clamp(42 * S, 36, 48) };
  placeTurrets();
}
function placeTurrets() {
  var f = L.field;
  var p = [
    { x: f.x + 20 * GF.S, y: f.y + f.h * 0.44 },
    { x: f.x + f.w - 20 * GF.S, y: f.y + f.h * 0.34 },
    { x: f.x + f.w * 0.28, y: f.y + f.h - 12 * GF.S },
    { x: f.x + f.w * 0.72, y: f.y + f.h - 12 * GF.S },
  ];
  for (var i = 0; i < turrets.length; i++) {
    turrets[i].x = p[i].x;
    turrets[i].y = p[i].y;
  }
}

function resetWaveState(daily) {
  isDaily = !!daily;
  if (isDaily) {
    var ds = todayStr().replace(/-/g, '');
    dailySeed = parseInt(ds, 10) || 20260612;
    rngState = dailySeed;
  }
  focus = Math.min(BASE_FOCUS, Math.max(55, focus || BASE_FOCUS));
  spawned = 0;
  spawnTimer = 0.1;
  combo = 0;
  comboT = 0;
  frenzyT = 0;
  rewardCooldown = 0;
  shotFreeze = false;
  for (var i = 0; i < bubbles.length; i++) bubbles[i].active = false;
  for (var r = 0; r < rings.length; r++) rings[r].active = false;
  for (var b = 0; b < beams.length; b++) beams[b].active = false;
  for (var s = 0; s < shells.length; s++) shells[s].active = false;
  for (var a = 0; a < arcs.length; a++) arcs[a].active = false;
  waveSize = WAVE_BASE + wave * WAVE_GROWTH + (isDaily ? 10 : 0);
  gs = 'PLAYING';
  GF.gameStarted();
  for (var n = 0; n < Math.min(waveSize, 8 + wave); n++) spawnBubble(true);
  saveNow();
}
function retryWave() {
  focus = BASE_FOCUS;
  resetWaveState(false);
}
function startNextWave() {
  wave += 1;
  focus = BASE_FOCUS;
  resetWaveState(false);
}
function startDailyWave() {
  if (dailyDoneDay === todayStr()) {
    showMsg('daily_done');
    GF.sfx('error');
    return;
  }
  focus = BASE_FOCUS;
  resetWaveState(true);
}
function completeWave() {
  var dailyBonus = isDaily ? Math.floor(80 + wave * 12) : 0;
  if (isDaily) {
    dailyDoneDay = todayStr();
    coins += dailyBonus;
    score += dailyBonus;
    GF.juice.floatText(GF.cx, L.field.y + 50 * GF.S, '+' + dailyBonus, { color: '#ffd85a', size: 28, life: 1.25 });
    GF.sfx('reward');
    showMsg('daily_bonus');
  } else {
    GF.sfx('levelup');
  }
  bestWave = Math.max(bestWave, wave);
  if (score > best) best = score;
  try { localStorage.setItem(BEST_KEY, JSON.stringify({ best: best, bestWave: bestWave })); } catch (e) {}
  gs = 'SHOP';
  isDaily = false;
  shopSeen = true;
  GF.juice.shake(4, 260);
  saveNow();
}
function gameOver() {
  if (gs === 'GAMEOVER') return;
  gs = 'GAMEOVER';
  bestWave = Math.max(bestWave, wave);
  if (score > best) best = score;
  try { localStorage.setItem(BEST_KEY, JSON.stringify({ best: best, bestWave: bestWave })); } catch (e) {}
  GF.gameEnded();
  GF.sfx('lose');
  GF.juice.flash('#ff4d7a', 240, 0.22);
  GF.juice.shake(12, 440);
  if (!firstDeathMarked) {
    firstDeathMarked = true;
    GF.funnel.mark('first_death');
  }
  saveNow();
}

function chooseBubbleType() {
  var pool = ['normal'];
  if (wave >= 2) pool.push('big');
  if (wave >= 3 || isDaily) pool.push('golden');
  if (wave >= 4) pool.push('armored');
  if (wave >= 5) pool.push('cluster');
  if (isDaily) pool.push('golden', 'golden');
  var pick = pool[(rand() * pool.length) | 0];
  return bubbleTypeIndex(pick);
}
function spawnBubble(immediate, forcedId, x, y) {
  var slot = null;
  for (var i = 0; i < bubbles.length; i++) {
    if (!bubbles[i].active) { slot = bubbles[i]; break; }
  }
  if (!slot) return null;
  var f = L.field;
  var typeIndex = forcedId ? bubbleTypeIndex(forcedId) : chooseBubbleType();
  var bt = BUBBLE_TYPES[typeIndex];
  var r = clamp(bt.r * GF.S, BUBBLE_RADIUS_MIN * GF.S, BUBBLE_RADIUS_MAX * GF.S);
  slot.active = true;
  slot.type = typeIndex;
  slot.r = r;
  slot.maxHp = bt.hp + Math.floor(Math.max(0, wave - 8) / 5);
  if (forcedId === 'mini') slot.maxHp = 1;
  slot.hp = slot.maxHp;
  slot.value = Math.floor(bt.value * (1 + wave * 0.08));
  slot.x = x != null ? x : f.x + r + rand() * Math.max(1, f.w - r * 2);
  slot.y = y != null ? y : (immediate ? f.y + r + rand() * Math.max(1, f.h * 0.72) : f.y - r - rand() * f.h * 0.2);
  var side = rand() < 0.5 ? -1 : 1;
  slot.vx = (18 + rand() * 42 + wave * 2) * side * GF.S;
  slot.vy = (24 + rand() * 36 + wave * 2.3) * GF.S;
  if (bt.id === 'golden') { slot.vx *= 1.25; slot.vy *= 1.2; }
  slot.scale = 0.2;
  slot.wobble = 0;
  slot.born = nowT + rand() * 9;
  slot.leak = false;
  GF.juice.tween(slot, { scale: 1 }, 420, 'easeOutElastic');
  spawned += forcedId ? 0 : 1;
  return slot;
}

function addRing(x, y, r, col) {
  var slot = null;
  for (var i = 0; i < rings.length; i++) {
    if (!rings[i].active) { slot = rings[i]; break; }
  }
  if (!slot) slot = rings[(Math.random() * rings.length) | 0];
  slot.active = true;

}
function addBeam(x1, y1, x2, y2, col, wide) {
  var slot = null;
  for (var i = 0; i < beams.length; i++) {
    if (!beams[i].active) { slot = beams[i]; break; }
  }
  if (!slot) slot = beams[(Math.random() * beams.length) | 0];
  slot.active = true;
  slot.x1 = x1; slot.y1 = y1; slot.x2 = x2; slot.y2 = y2; slot.t = 0; slot.dur = 0.16; slot.col = col; slot.wide = wide || 2;
}
function addArc(x1, y1, x2, y2, col) {

}
function addShell(x1, y1, x2, y2, splash, dmg, col) {
  var slot = null;

    if (!shells[i].active) { slot = shells[i]; break; }
  }
  if (!slot) return;

function findBubbleAt(x, y) {
  var bestHit = null, bestD = 999999;
  for (var i = 0; i < bubbles.length; i++) {
    var b = bubbles[i];
    if (!b.active) continue;
    var dx = x - b.x, dy = y - b.y;
    var rr = b.r * Math.max(0.7, b.scale) + 10 * GF.S;
    var d = dx * dx + dy * dy;
    if (d <= rr * rr && d < bestD) { bestD = d; bestHit = b; }
  }
  return bestHit;
}
function nearestBubble(x, y, range) {
  var hit = null, bestD = range * range;
  for (var i = 0; i < bubbles.length; i++) {
    var b = bubbles[i];
    if (!b.active) continue;
    var dx = x - b.x, dy = y - b.y;
    var d = dx * dx + dy * dy;
    if (d < bestD) { bestD = d; hit = b; }
  }
  return hit;
}
function jellyNeighbors(x, y, radius) {
  var r2 = radius * radius;
  for (var i = 0; i < bubbles.length; i++) {
    var b = bubbles[i];
    if (!b.active) continue;
    var dx = b.x - x, dy = b.y - y;
    if (dx * dx + dy * dy <= r2) {
      b.wobble = Math.max(b.wobble, 1);
      GF.juice.punch(b, 'scale', 0.11, 260);
    }
  }
}
function damageBubble(b, dmg, source, chainDepth) {
  if (!b || !b.active) return false;
  b.hp -= dmg;
  b.wobble = Math.max(b.wobble, 0.65);
  GF.juice.punch(b, 'scale', 0.16, 210);
  if (source === 'tap') {
    fever = clamp(fever + FEVER_PER_TAP + (BUBBLE_TYPES[b.type].id === 'golden' ? 5 : 0), 0, FEVER_MAX);
  }
  if (b.hp <= 0) {
    popBubble(b, source, chainDepth || 0);
    return true;
  }
  GF.sfx('hit');
  GF.juice.particles.burst(b.x, b.y, { count: 5, color: BUBBLE_TYPES[b.type].rim, speed: 90, gravity: 50, size: 2.4, life: 0.22 });
  return false;
}
function popBubble(b, source, chainDepth) {
  if (!b.active) return;
  var bt = BUBBLE_TYPES[b.type];
  var x = b.x, y = b.y, rr = b.r;
  b.active = false;
  combo = comboT > 0 ? combo + 1 : 1;
  comboT = COMBO_WINDOW;
  var mult = 1 + Math.min(combo, 20) * 0.05;
  var gain = Math.floor(b.value * mult * (frenzyT > 0 ? 1.25 : 1));
  coins += gain;
  score += gain;
  addRing(x, y, rr * 0.9, bt.rim);
  GF.juice.particles.burst(x, y, { count: 11 + Math.min(combo, 12), colors: [bt.rim, bt.col, '#ffffff'], speed: 230, gravity: 140, size: 4.2, life: 0.42 });
  GF.juice.particles.burst(x, y + rr * 0.25, { count: 7, colors: ['#b8fdff', bt.col], speed: 96, gravity: 360, size: 3.2, life: 0.65, angle: Math.PI / 2, spread: Math.PI * 0.85 });
  GF.juice.floatText(x, y - rr * 0.35, '+' + gain, { color: bt.id === 'golden' ? '#ffd85a' : '#eaffff', size: 17 + Math.min(combo, 8), life: 0.8 });
  GF.juice.punch(b, 'scale', 0.25, 180);
  if (source === 'tap') {
    var pitch = 430 + Math.min(combo, 18) * 24;
    GF.tone(pitch, 0.055, 'triangle', 0.08, pitch * 1.38);
  } else {
    GF.sfx(bt.id === 'golden' ? 'coin' : 'pickup');
  }
  if (combo === 5 || combo === 10 || combo === 20) {
    GF.juice.shake(combo >= 20 ? 11 : 6, 280);
    GF.juice.flash(combo >= 10 ? '#ffffff' : '#aefcff', 110, 0.14);
  }
  jellyNeighbors(x, y, rr * 2.5);
  if (bt.id === 'cluster') {
    for (var i = 0; i < 3; i++) {
      var a = -Math.PI / 2 + (i - 1) * 0.75;
      var nb = spawnBubble(true, 'mini', x + Math.cos(a) * rr * 0.65, y + Math.sin(a) * rr * 0.65);
      if (nb) {
        nb.vx = Math.cos(a) * 120 * GF.S;
        nb.vy = Math.sin(a) * 120 * GF.S + 38 * GF.S;
      }
    }
  }
  if (source === 'tesla' && chainDepth < 2) {
    var next = nearestBubble(x, y, 120 * GF.S);
    if (next) {
      addArc(x, y, next.x, next.y, '#c9b5ff');
      damageBubble(next, 1, 'tesla', chainDepth + 1);
    }
  }
  if (GF.tutorial.active && GF.tutorial.step === 0 && source === 'tap') {
    GF.tutorial.next();
  }
  savePulse = Math.max(savePulse, 7);
}

function fireTurret(tu, dt) {
  if (!tu.owned) return;
  var type = typeById(tu.id);
  var tier = turretTier(tu);
  var rate = type.rate * (1 + tu.rate * 0.22) * (frenzyT > 0 ? 1.55 : 1);
  tu.cd -= dt * rate;
  tu.glow = Math.max(0, tu.glow - dt * 2);
  tu.recoil = Math.max(0, tu.recoil - dt * 5);
  if (tu.cd > 0) return;
  var range = (type.range + tu.range * 34) * GF.S;
  var target = nearestBubble(tu.x, tu.y, range);
  if (!target) return;
  tu.cd = 1;
  tu.recoil = 1;
  tu.glow = 1;
  tu.turn = Math.atan2(target.y - tu.y, target.x - tu.x);
  var dmg = type.power + tu.power * 0.65 + (tier >= 3 ? 0.5 : 0);
  if (tu.id === 'dart') {
    addBeam(tu.x, tu.y, target.x, target.y, type.color, 2 + tier);
    damageBubble(target, Math.max(1, Math.round(dmg)), 'dart', 0);
    GF.sfx('tap');
  } else if (tu.id === 'laser') {
    addBeam(tu.x, tu.y, target.x, target.y, type.color, 5 + tier);
    damageBubble(target, Math.max(1, Math.floor(dmg)), 'laser', 0);
    var hit = 0;
    for (var i = 0; i < bubbles.length && hit < 2 + tier; i++) {
      var b = bubbles[i];
      if (!b.active || b === target) continue;
      var dLine = distToSegment(b.x, b.y, tu.x, tu.y, target.x, target.y);
      if (dLine < b.r + 12 * GF.S) { damageBubble(b, 1, 'laser', 0); hit++; }
    }
    GF.tone(620, 0.06, 'sawtooth', 0.045, 410);
  } else if (tu.id === 'mortar') {
    addShell(tu.x, tu.y, target.x, target.y, (70 + tu.range * 7) * GF.S, Math.max(1, Math.round(dmg)), type.color);
    GF.sfx('spawn');
  } else if (tu.id === 'tesla') {
    addArc(tu.x, tu.y, target.x, target.y, type.color);
    damageBubble(target, Math.max(1, Math.floor(dmg)), 'tesla', 0);
    GF.tone(780, 0.05, 'square', 0.045, 1180);
  }
}
function distToSegment(px, py, ax, ay, bx, by) {
  var vx = bx - ax, vy = by - ay, wx = px - ax, wy = py - ay;
  var len = vx * vx + vy * vy;
  var t0 = len > 0 ? clamp((wx * vx + wy * vy) / len, 0, 1) : 0;
  var x = ax + vx * t0, y = ay + vy * t0;
  var dx = px - x, dy = py - y;
  return Math.sqrt(dx * dx + dy * dy);
}
function updateShells(dt) {
  for (var i = 0; i < shells.length; i++) {
    var s = shells[i];
    if (!s.active) continue;
    s.t += dt / s.dur;
    var k = Math.min(1, s.t);
    var arc = Math.sin(k * Math.PI) * 70 * GF.S;
    s.x = GF.lerp(s.sx, s.tx, k);
    s.y = GF.lerp(s.sy, s.ty, k) - arc;
    if (k >= 1) {
      s.active = false;
      addRing(s.tx, s.ty, s.splash * 0.75, s.col);
      GF.juice.particles.burst(s.tx, s.ty, { count: 18, colors: [s.col, '#ffffff', '#b7f6ff'], speed: 240, gravity: 230, size: 4.5, life: 0.45 });
      GF.juice.shake(5, 210);
      for (var j = 0; j < bubbles.length; j++) {
        var b = bubbles[j];
        if (!b.active) continue;
        var dx = b.x - s.tx, dy = b.y - s.ty;
        if (dx * dx + dy * dy <= (s.splash + b.r) * (s.splash + b.r)) damageBubble(b, s.dmg, 'mortar', 0);
      }
    }
  }
}

function upgradeCost(tu, stat) {
  var type = typeById(tu.id);
  var idx = TURRET_TYPES.indexOf(type);
  var lv = tu[stat] || 0;
  return Math.floor((42 + idx * 24) * Math.pow(1.42, lv) * (stat === 'power' ? 1.18 : 1));
}

function buyTurret(tu) {

  GF.juice.particles.burst(tu.x || GF.cx, tu.y || GF.cy, { count: 28, colors: [type.color, '#ffffff', '#ffd85a'], speed: 250, gravity: 150, size: 5, life: 0.55 });

}

function claimOffline(mult) {

}

function update(dt) {
  GF.juice.update(dt);
  var gdt = dt * GF.juice.timeScale;
  nowT += dt;
  layout();
  if (messageT > 0) messageT -= dt;
  if (rewardCooldown > 0) rewardCooldown -= dt;
  GF.tutorial.update(dt);
  if (helpOpen) return;

  updateFx(gdt);
  if (gs !== 'PLAYING') return;

  playSeconds += gdt;
  savePulse += gdt;
  checkPlaytimeParts();
  if (comboT > 0) comboT -= gdt;
  else combo = 0;
  if (frenzyT > 0) frenzyT -= gdt;
  else if (fever >= FEVER_MAX) {
    fever = 0;
    frenzyT = FRENZY_SECONDS;
    GF.sfx('levelup');
    GF.juice.flash('#e8fff9', 170, 0.14);
    GF.juice.shake(7, 320);
  }

  if (!shotFreeze) {
    spawnTimer -= gdt;
    var active = activeBubbles();
    if (spawned < waveSize && spawnTimer <= 0 && active < Math.min(BUBBLE_CAP - 8, 12 + wave * 3)) {
      spawnBubble(false);
      spawnTimer = Math.max(0.18, 0.92 - wave * 0.035) * (frenzyT > 0 ? 0.82 : 1);
    }
    updateBubbles(gdt);
    for (var i = 0; i < turrets.length; i++) fireTurret(turrets[i], gdt);
    if (activeBubbles() > 34 + wave * 2) {
      focus -= gdt * (2 + wave * 0.25);
    }
  }
  updateShells(gdt);
  if (focus <= 0) gameOver();
  if (spawned >= waveSize && activeBubbles() === 0 && gs === 'PLAYING') completeWave();
  if (savePulse >= 10) {
    savePulse = 0;
    saveNow();
  }
}
function updateFx(dt) {
  var i;
  for (i = 0; i < rings.length; i++) {
    if (!rings[i].active) continue;
    rings[i].t += dt;
    if (rings[i].t >= rings[i].dur) rings[i].active = false;
  }
  for (i = 0; i < beams.length; i++) {
    if (!beams[i].active) continue;
    beams[i].t += dt;
    if (beams[i].t >= beams[i].dur) beams[i].active = false;
  }
  for (i = 0; i < arcs.length; i++) {
    if (!arcs[i].active) continue;
    arcs[i].t += dt;
    if (arcs[i].t >= arcs[i].dur) arcs[i].active = false;
  }
  for (i = 0; i < turrets.length; i++) {
    turrets[i].recoil = Math.max(0, turrets[i].recoil - dt * 5);
    turrets[i].glow = Math.max(0, turrets[i].glow - dt * 2);
  }
}
function updateBubbles(dt) {
  var f = L.field;
  for (var i = 0; i < bubbles.length; i++) {
    var b = bubbles[i];
    if (!b.active) continue;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.vx += Math.sin(nowT * 1.4 + b.born) * 4 * GF.S * dt;
    if (b.x < f.x + b.r) { b.x = f.x + b.r; b.vx = Math.abs(b.vx); }
    if (b.x > f.x + f.w - b.r) { b.x = f.x + f.w - b.r; b.vx = -Math.abs(b.vx); }
    if (b.y > f.y + f.h + b.r && !b.leak) {
      b.leak = true;
      b.active = false;
      focus -= FOCUS_LEAK + Math.min(8, wave);
      GF.sfx('hurt');
      GF.juice.shake(5, 220);
      GF.juice.floatText(b.x, f.y + f.h - 20 * GF.S, '-' + FOCUS_LEAK, { color: '#ff6f91', size: 18, life: 0.8 });
    }
    if (b.wobble > 0) b.wobble = Math.max(0, b.wobble - dt * 2.8);
  }
}
function checkPlaytimeParts() {
  var marks = [300, 900, 1500];
  for (var i = 0; i < marks.length; i++) {
    if (!claimedParts[i] && playSeconds >= marks[i]) {
      claimedParts[i] = true;
      parts += 1;
      showMsg('free_part');
      GF.sfx('reward');
      GF.juice.floatText(GF.cx, L.field.y + 70 * GF.S, '+1 ' + t('part'), { color: '#b8ff9d', size: 24, life: 1.2 });
      saveNow();
    }
  }
}

function onPointerDown(e) {
  if (e && e.preventDefault) e.preventDefault();
  var rect = GF.canvas.getBoundingClientRect();
  var sx = GF.canvas.width / Math.max(1, rect.width);
  var sy = GF.canvas.height / Math.max(1, rect.height);
  var x = (e.clientX - rect.left) * sx;
  var y = (e.clientY - rect.top) * sy;

  if (helpOpen) {
    helpOpen = false;
    GF.sfx('click');
    return;
  }
  if (L.mute && inRect(x, y, L.mute)) { GF.toggleMute(); GF.sfx('click'); return; }
  if (L.help && inRect(x, y, L.help)) { helpOpen = true; GF.sfx('click'); return; }

  if (gs === 'OFFLINE') {
    for (var oi = 0; oi < offlineButtons.length; oi++) {
      if (inRect(x, y, offlineButtons[oi])) { offlineButtons[oi].fn(); return; }
    }
    return;
  }
  if (gs === 'GAMEOVER') {
    for (var gi = 0; gi < gameoverButtons.length; gi++) {
      if (inRect(x, y, gameoverButtons[gi])) { gameoverButtons[gi].fn(); return; }
    }
    return;
  }
  if (gs === 'SHOP') {
    for (var si = 0; si < shopButtons.length; si++) {
      if (inRect(x, y, shopButtons[si])) { shopButtons[si].fn(); return; }
    }
    return;
  }
  if (gs !== 'PLAYING') return;
  if (L.feverAd && inRect(x, y, L.feverAd) && fever < FEVER_MAX && rewardCooldown <= 0) {
    refillFeverAd();
    GF.sfx('click');
    return;
  }
  var b = findBubbleAt(x, y);
  if (b) {
    damageBubble(b, 1 + (frenzyT > 0 ? 1 : 0), 'tap', 0);
    GF.juice.shake(combo >= 8 ? 4 : 1.5, 140);
    savePulse = Math.max(savePulse, 8);
    return;
  }
  if (GF.tutorial.active) GF.tutorial.handleClick(x, y);
}
GF.canvas.addEventListener('pointerdown', onPointerDown, { passive: false });

function draw(ctx) {
  layout();
  drawBackground(ctx);
  ctx.save();
  ctx.translate(GF.juice.offsetX, GF.juice.offsetY);
  drawPlayfield(ctx);
  drawTurrets(ctx);
  drawBubbles(ctx);
  drawShells(ctx);
  drawBeams(ctx);
  GF.juice.particles.draw(ctx);
  GF.juice.texts.draw(ctx);
  drawHUD(ctx);
  if (gs === 'SHOP') drawShop(ctx);
  if (gs === 'OFFLINE') drawOffline(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
  if (messageT > 0) drawMessage(ctx);
  ctx.restore();
  if (helpOpen) drawHelp(ctx);
  GF.tutorial.draw(ctx);
  GF.juice.drawFlash(ctx);
}
function drawBackground(ctx) {
  var W = GF.W, H = GF.H;
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#063746');
  g.addColorStop(0.48, '#0b6a72');
  g.addColorStop(1, '#102f50');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  for (var i = 0; i < bgBubbles.length; i++) {
    var p = bgBubbles[i];
    var x = p.x * W + Math.sin(nowT * 0.4 + i) * 22 * GF.S;
    var y = ((p.y + nowT * p.s) % 1.12 - 0.06) * H;
    ctx.globalAlpha = p.a;
    ctx.strokeStyle = '#d7ffff';
    ctx.lineWidth = 1.4 * GF.S;
    ctx.beginPath(); ctx.arc(x, y, p.r * GF.S, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
function drawPlayfield(ctx) {
  var f = L.field;
  ctx.save();
  ctx.fillStyle = 'rgba(218,255,255,0.12)';
  GF.rr(ctx, f.x, f.y, f.w, f.h, 18 * GF.S); ctx.fill();
  ctx.strokeStyle = 'rgba(220,255,255,0.22)';
  ctx.lineWidth = 2 * GF.S;
  GF.rr(ctx, f.x, f.y, f.w, f.h, 18 * GF.S); ctx.stroke();
  var gy = f.y + f.h - 18 * GF.S;
  ctx.strokeStyle = focus < 30 ? 'rgba(255,100,130,0.9)' : 'rgba(255,255,255,0.28)';
  ctx.setLineDash([7 * GF.S, 7 * GF.S]);
  ctx.beginPath(); ctx.moveTo(f.x + 12 * GF.S, gy); ctx.lineTo(f.x + f.w - 12 * GF.S, gy); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}
function drawBubbles(ctx) {
  for (var i = 0; i < bubbles.length; i++) {
    var b = bubbles[i];
    if (!b.active) continue;
    drawBubble(ctx, b);
  }
  for (var r = 0; r < rings.length; r++) drawRing(ctx, rings[r]);
}
function drawBubble(ctx, b) {
  var bt = BUBBLE_TYPES[b.type];

  GF.exposeReach(function () {
    var items = [];
    if (L.mute) items.push({ id: 'mute', x: L.mute.x, y: L.mute.y, w: L.mute.w, h: L.mute.h, pinned: true });
    if (L.help) items.push({ id: 'help', x: L.help.x, y: L.help.y, w: L.help.w, h: L.help.h, pinned: true });
    if (gs === 'PLAYING') {
      if (L.feverAd && fever < FEVER_MAX && rewardCooldown <= 0) items.push({ id: 'reward_frenzy', x: L.feverAd.x, y: L.feverAd.y, w: L.feverAd.w, h: L.feverAd.h, pinned: true });
    } else if (gs === 'SHOP') {
      for (var i = 0; i < shopButtons.length; i++) items.push({ id: 'shop_' + i, x: shopButtons[i].x, y: shopButtons[i].y, w: shopButtons[i].w, h: shopButtons[i].h, pinned: true });
    } else if (gs === 'OFFLINE') {
      for (var o = 0; o < offlineButtons.length; o++) items.push({ id: 'offline_' + o, x: offlineButtons[o].x, y: offlineButtons[o].y, w: offlineButtons[o].w, h: offlineButtons[o].h, pinned: true });
    } else if (gs === 'GAMEOVER') {
      for (var g = 0; g < gameoverButtons.length; g++) items.push({ id: 'gameover_' + g, x: gameoverButtons[g].x, y: gameoverButtons[g].y, w: gameoverButtons[g].w, h: gameoverButtons[g].h, pinned: true });
    }
    return { screen: gs, viewportH: GF.H, screenH: GF.H, items: items };
  });
  GF.exposeTour([
    { name: 'play', go: function () { helpOpen = false; if (gs !== 'PLAYING') resetWaveState(false); } },
    { name: 'shop', go: function () { helpOpen = false; gs = 'SHOP'; } },
    { name: 'offline', go: function () { helpOpen = false; pendingOffline = Math.max(pendingOffline, 120); gs = 'OFFLINE'; } },
    { name: 'gameover', go: function () { helpOpen = false; gs = 'GAMEOVER'; } },
  ]);
}
function exposeStateAndBot() {
  GF.exposeState(function () {
    return {
      gs: gs,
      score: Math.floor(score),
      wave: wave,
      level: wave,
      coins: Math.floor(coins),
      focus: Math.floor(focus),
      combo: combo,
      fever: Math.floor(fever),
      bubbles: activeBubbles(),
      turrets: ownedTurretCount(),
      turretPower: totalTurretLevels(),
      pendingOffline: pendingOffline,
    };
  });
  GF.exposeBot(function () {
    var actions = [];
    if (gs === 'PLAYING') actions.push('tap');
    if (gs === 'SHOP') actions.push('buy', 'next');
    if (gs === 'GAMEOVER') actions.push('retry');
    if (gs === 'OFFLINE') actions.push('collect');
    return actions;
  }, function (a) {
    if (a === 'tap' && gs === 'PLAYING') {
      var b = nearestBubble(GF.cx, GF.cy, Math.max(GF.W, GF.H));
      if (b) damageBubble(b, 2, 'tap', 0);
    } else if (a === 'buy' && gs === 'SHOP') {
      for (var i = 0; i < turrets.length; i++) {
        if (!turrets[i].owned) { coins += typeById(turrets[i].id).cost; buyTurret(turrets[i]); return; }
      }
      upgradeTurret(turrets[0], 'power');
    } else if (a === 'next' && gs === 'SHOP') startNextWave();
    else if (a === 'retry' && gs === 'GAMEOVER') retryWave();
    else if (a === 'collect' && gs === 'OFFLINE') claimOffline(1);
  });
}

window.render_game_to_text = function () {
  return JSON.stringify({
    coords: 'origin top-left, x right, y down',
    gs: gs,
    wave: wave,
    score: Math.floor(score),
    coins: Math.floor(coins),
    focus: Math.floor(focus),
    fever: Math.floor(fever),
    combo: combo,
    bubbles: bubbles.filter(function (b) { return b.active; }).slice(0, 12).map(function (b) {
      return { x: Math.round(b.x), y: Math.round(b.y), r: Math.round(b.r), hp: b.hp, type: BUBBLE_TYPES[b.type].id };
    }),
    turrets: turrets.map(function (tu) { return { id: tu.id, owned: tu.owned, rate: tu.rate, power: tu.power, range: tu.range }; }),
  });
};
window.advanceTime = function (ms) {
  var steps = Math.max(1, Math.round(ms / (1000 / 60)));
  for (var i = 0; i < steps; i++) update(1 / 60);
  draw(GF.ctx);
};
window._setupForScreenshot = function (level) {
  GF.tutorial.active = false;
  wave = Math.max(5, level || 5);
  coins = Math.max(coins, 900);
  for (var i = 0; i < turrets.length; i++) {
    turrets[i].owned = true;
    turrets[i].rate = Math.min(5, 1 + i + Math.floor(wave / 3));
    turrets[i].power = Math.min(5, 1 + Math.floor(wave / 4));
    turrets[i].range = Math.min(5, 1 + Math.floor(wave / 5));
  }
  resetWaveState(false);
  for (var b = 0; b < bubbles.length; b++) bubbles[b].active = false;
  spawned = waveSize;
  var f = L.field;
  for (var n = 0; n < Math.min(38, BUBBLE_CAP - 4); n++) {
    var id = ['normal', 'big', 'armored', 'golden', 'cluster'][n % 5];
    spawnBubble(true, id, f.x + f.w * (0.12 + (n % 6) * 0.15), f.y + f.h * (0.12 + ((n / 6) | 0) * 0.13));
  }
  combo = 8;
  fever = 70;
  frenzyT = 3;
  shotFreeze = false;
};
window._jumpLevel = function (n) { window._setupForScreenshot(n || 6); };
window._setState = function (s) { if (s) gs = s; };
window._getI18N = function () { return STRINGS; };
window._getFontBody = function () { return 'Inter, system-ui, sans-serif'; };
window.__debugSetLastSeen = function (msAgo) {
  lastSeen = Date.now() - Math.max(0, msAgo || 0);
  saveNow();
};

GF.init({
  designW: 393,
  designH: 852,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'bubble_barrage',
  onReady: function () {
    try {
      var rawBest = localStorage.getItem(BEST_KEY);
      if (rawBest) {
        var bs = JSON.parse(rawBest);
        best = bs.best || best;
        bestWave = bs.bestWave || bestWave;
      }
    } catch (e) {}
    GF.persist(SAVE_KEY, stateForSave, applySave);
    exposeStateAndBot();
    exposeReachability();
    GF.bgMusic({ file: 'audio/bg_track.mp3', preset: 'calm', muted: GF.muted });
    GF.remoteConfig('bubble_barrage', {
      tuning: { price_mult: 1, wave_mult: 1 },
      events: { golden_daily: true },
      daily: { seed: 0 },
      motd: { en: '', ru: '' },
      version: 0,
    }, {
      clamps: { 'tuning.price_mult': [0.8, 1.4], 'tuning.wave_mult': [0.8, 1.35] },
    }).then(function () {});
    pendingOffline = computeOffline();
    lastSeen = Date.now();
    if (pendingOffline > 0 && !window.__GF_AUTOSTART) {
      gs = 'OFFLINE';
    } else {
      resetWaveState(false);
    }
    if (window.__GF_AUTOSTART && !window._silent) {
      if (pendingOffline > 0) gs = 'OFFLINE';
      else resetWaveState(false);
    }
    startTutorial();
    saveNow();
  },
  onUpdate: update,
  onDraw: draw,
});

window.addEventListener('beforeunload', function () { saveNow(); });
document.addEventListener('visibilitychange', function () { if (document.hidden) saveNow(); });

})();
</script>
</body>
