// ── PERSIST ───────────────────────────────────────────────────────────────
function saveMeta() {

      upWidth: upWidth, upSpeed: upSpeed, upShine: upShine,

}

// ── JOB GEOMETRY ─────────────────────────────────────────────────────────
function jobBox() {
  var W = GF.W, H = GF.H;
  var size = Math.min(W * 0.74, H * 0.40);
  var cx = W / 2;
  var cy = L.jobCy || (H * 0.40);
  return { cx: cx, cy: cy, r: size / 2, size: size };
}

// ── MASK ──────────────────────────────────────────────────────────────────
var hits = null;
function stageHardness() {
  var k = stageList[stageI];
  var h = (STAGES[k] && STAGES[k].hard) || 1;
  return h;
}
function buildMask() {
  maskW = MASK_CELLS; maskH = MASK_CELLS;
  mask = new Uint8Array(maskW * maskH);
  revealBuf = new Float32Array(maskW * maskH);
  hits = new Float32Array(maskW * maskH);
  hitT = new Float32Array(maskW * maskH);
  var hard = stageHardness();
  maskTotal = 0; maskCleared = 0;
  for (var gy = 0; gy < maskH; gy++) {
    for (var gx = 0; gx < maskW; gx++) {
      var fx = (gx + 0.5) / maskW, fy = (gy + 0.5) / maskH;
      if (insideJob(fx, fy)) {
        var idx = gy * maskW + gx;
        mask[idx] = 1;
        revealBuf[idx] = 0;
        hits[idx] = hard;
        maskTotal++;
      }
    }
  }
  coverage = 0;
}

// Silhouette test for surface shapes
function insideJob(fx, fy) {
  var x = fx - 0.5, y = fy - 0.5;
  var s = job ? job.shape : 'path';
  switch (s) {
    case 'path':
      return Math.abs(x) <= 0.40 && Math.abs(y) <= 0.42;
    case 'steps':
      var step = Math.floor(fy * 4);
      var hw = 0.45 - step * 0.04;
      return Math.abs(x) <= hw && fy >= 0.04 && fy <= 0.96;
    case 'car':
      if (fy < 0.30) return Math.abs(x) <= 0.28 + fy * 0.4;
      return Math.abs(x) <= 0.40 && fy <= 0.85;
    case 'driveway':
      var wd = 0.25 + fy * 0.20;
      return Math.abs(x) <= wd && fy >= 0.02 && fy <= 0.97;
    case 'driveway2':
      return Math.abs(x) <= 0.44 && fy >= 0.02 && fy <= 0.97;
    case 'sidewalk':
      return Math.abs(x) <= 0.44 && Math.abs(y) <= 0.38;
    case 'roof':
      if (fy < 0.40) return Math.abs(x) <= (fy * 1.1);
      return Math.abs(x) <= 0.44 && fy <= 0.90;
    case 'lot':
    case 'lot2':
      return Math.abs(x) <= 0.44 && Math.abs(y) <= 0.44;
    case 'patio':
      if (Math.abs(x) <= 0.44 && y >= -0.1 && y <= 0.44) return true;
      return Math.abs(x) <= 0.22 && y >= -0.44 && y <= -0.1;
    case 'yard':
      return (x * x) / (0.44 * 0.44) + (y * y) / (0.42 * 0.42) <= 1;
    case 'road':
      return Math.abs(x) <= 0.44 && Math.abs(y) <= 0.40;
    case 'highway':
      return Math.abs(x) <= 0.45 && Math.abs(y) <= 0.44;
    case 'airport':
      return Math.abs(x) <= 0.45 && Math.abs(y) <= 0.44;
    default:
      return Math.abs(x) <= 0.42 && Math.abs(y) <= 0.42;
  }
}

var hitT = null;
var HIT_COOLDOWN = 70;
function wipeAt(px, py, rpx) {
  if (!mask) return 0;
  if (!hitT || hitT.length !== mask.length) hitT = new Float32Array(mask.length);
  var box = jobBox();
  var x0 = box.cx - box.size / 2, y0 = box.cy - box.size / 2;
  var touched = 0;
  var cw = box.size / maskW, ch = box.size / maskH;
  var rr = rpx, rr2 = rr * rr;
  var now = performance.now();
  var hard = stageHardness();
  var gx0 = Math.max(0, Math.floor((px - rr - x0) / cw));
  var gx1 = Math.min(maskW - 1, Math.ceil((px + rr - x0) / cw));
  var gy0 = Math.max(0, Math.floor((py - rr - y0) / ch));
  var gy1 = Math.min(maskH - 1, Math.ceil((py + rr - y0) / ch));
  for (var gy = gy0; gy <= gy1; gy++) {
    for (var gx = gx0; gx <= gx1; gx++) {
      var i = gy * maskW + gx;
      if (mask[i] !== 1) continue;
      var ccx = x0 + (gx + 0.5) * cw, ccy = y0 + (gy + 0.5) * ch;
      var dx = ccx - px, dy = ccy - py;
      if (dx * dx + dy * dy > rr2) continue;
      if (now - hitT[i] < HIT_COOLDOWN) continue;
      hitT[i] = now;
      hits[i] -= 1;
      touched++;
      revealBuf[i] = GF.clamp(1 - hits[i] / hard, 0, 0.999) * 0.8;
      if (hits[i] <= 0) {
        mask[i] = 2;
        maskCleared++;
      }
    }
  }
  if (maskTotal > 0) coverage = maskCleared / maskTotal;
  return touched;
}

function brushRadius() {
  return (BRUSH_R + upWidth * BRUSH_GROW) * GF.S;
}

// ── LIFECYCLE ──────────────────────────────────────────────────────────────
function startJob(idx) {
  jobIdx = GF.clamp(idx, 0, NUM_JOBS - 1);
  job = JOBS[jobIdx];
  stageList = job.stages.slice();
  stageI = 0;
  combo = 1; comboPeak = 1; comboTimer = 0; stageComboPeak = 1;
  stagePeakSum = 0; stagePeakN = 0; coverSum = 0; coverN = 0;
  snowSeed = (jobIdx + 1) * 9301 + 4929;
  stagePop = 0; poppedStage = -1;
  newUnlock = -1;
  lastSample = null;
  layout();
  buildMask();
  gs = 'PLAYING';
  if (!_restoring) GF.saveRun();
  GF.gameStarted();
}
var _restoring = false;

function startGame() {
  startJob(0);
}

function advanceStage() {
  stagePeakSum += Math.max(stageComboPeak, combo); stagePeakN++;
  coverSum += coverage; coverN++;
  var bx = jobBox();
  GF.sfx('stageDone');
  GF.spawnParticles(bx.cx, bx.cy, '#c8e8ff', 30);
  for (var s = 0; s < 14; s++) {
    var a = (s / 14) * Math.PI * 2;
    GF.spawnParticles(bx.cx + Math.cos(a) * bx.r * 0.6, bx.cy + Math.sin(a) * bx.r * 0.6, '#e8f4ff', 2);
  }
  GF.setShake(0.55);
  stagePop = 1; poppedStage = stageI;
  stageI++;
  combo = 1; comboTimer = 0; lastSample = null; stageComboPeak = 1;
  if (stageI >= stageList.length) { finishJob(); return; }
  buildMask();
  GF.saveRun();
}

function finishJob() {
  var avgCover = coverN > 0 ? coverSum / coverN : coverage;
  var avgCombo = stagePeakN > 0 ? stagePeakSum / stagePeakN : combo;
  comboPeak = avgCombo;
  var smooth = GF.clamp((avgCombo - 1) / 2.2, 0, 1);
  var quality = GF.clamp(avgCover * 0.78 + smooth * 0.22 + upShine * 0.03, 0, 1);
  appraiseCover = quality;
  var stars = quality >= 0.82 ? 3 : quality >= 0.58 ? 2 : 1;
  appraiseStars = stars;
  var mult = stars === 3 ? 1.0 : stars === 2 ? 0.7 : 0.45;
  appraiseCoins = Math.round((COINS_BASE + job.val) * mult * (1 + jobIdx * 0.08));
  coins += appraiseCoins;
  totalStars += stars;
  if (appraiseCoins > best) best = appraiseCoins;
  for (var k = unlockedMax + 1; k < NUM_JOBS; k++) {
    if (coins >= JOBS[k].unlock) { unlockedMax = k; newUnlock = k; }
    else break;
  }
  saveMeta();
  appraiseT = 0; bigPop = 1;
  gs = 'APPRAISE';
  GF.sfx('appraise');
  GF.gameEnded();
  if (stars === 3) GF.happytime();
  GF.saveRun();
}

function toReveal() {
  gs = 'REVEAL';
  revealSlide = 0.0; revealAuto = 1;
  GF.saveRun();
}

function nextJob() {
  var n = jobIdx + 1;
  if (n >= NUM_JOBS) n = 0;
  if (n > unlockedMax) { unlockedMax = n; saveMeta(); }
  startJob(n);
}

window._jumpLevel = function (n) { window._setupForScreenshot(n || 5); };
window._setupForScreenshot = function (lvl) {
  coins = 900; unlockedMax = 11; upWidth = 2; upSpeed = 1;
  try { localStorage.setItem('snow_day_tut_v1', '1'); } catch (e) {}
  var idx = GF.clamp((lvl || 5) + 4, 4, NUM_JOBS - 1);
  startJob(idx);
  if (mask) {
    for (var c2 = 0; c2 < mask.length; c2++) {
      if (mask[c2] !== 1) continue;
      var gy = (c2 / maskW) | 0;
      if (gy > maskH * 0.45) { mask[c2] = 2; revealBuf[c2] = 1; maskCleared++; }
      else if (Math.random() < 0.3) { revealBuf[c2] = 0.5; }
    }
    if (maskTotal > 0) coverage = maskCleared / maskTotal;
  }
  combo = 3.4; comboPeak = 3.4; stageComboPeak = 3.4; comboTimer = COMBO_WINDOW;
  var box = jobBox();
  for (var p = 0; p < 16; p++) GF.spawnParticles(box.cx + (Math.random() - 0.5) * box.size, box.cy + (Math.random() - 0.5) * box.size, '#c8e8ff', 2);
};

// ── INPUT ──────────────────────────────────────────────────────────────────
function evtXY(e) {
  if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function hit(b, x, y) { return b && b.w && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h; }

function overlayDown(x, y) {
  if (gs === 'MENU') {
    if (hit(muteBtn, x, y)) { toggleMute(); return true; }
    for (var i = 0; i < shopRects.length; i++) {
      var rc = shopRects[i];
      if (hit(rc, x, y)) {
        if (rc.kind === 'play') { GF.sfx('tap'); startGame(); return true; }
        if (rc.kind === 'job' && rc.idx <= unlockedMax) { GF.sfx('tap'); startJob(rc.idx); return true; }
        if (rc.kind === 'job') { hintMsg = GF.t('unlock') + ' ' + JOBS[rc.idx].unlock; hintT = 1.4; GF.sfx('error'); return true; }
      }
    }
    return false;
  }
  if (gs === 'APPRAISE') {
    if (appraiseT < 0.5) return true;
    if (hit(L.bigBtn, x, y)) { GF.sfx('tap'); toReveal(); return true; }
    return true;
  }
  if (gs === 'REVEAL') {
    if (hit(L.bigBtn, x, y)) { GF.sfx('tap'); nextJob(); return true; }
    if (hit(shopBtn, x, y)) { GF.sfx('tap'); openShop(); return true; }
    return true;
  }
  return false;
}

function openShop() { shopOpen = true; gs = 'SHOP_OVERLAY'; }

function shopDown(x, y) {
  if (hit(L.bigBtn, x, y)) { GF.sfx('tap'); gs = 'REVEAL'; shopOpen = false; return; }
  for (var i = 0; i < shopRects.length; i++) {
    var rc = shopRects[i];
    if (hit(rc, x, y) && rc.kind === 'up') buyUpgrade(rc.up);
  }
}

function buyUpgrade(kind) {
  var lvl = kind === 'w' ? upWidth : kind === 's' ? upSpeed : upShine;
  if (lvl >= 3) { GF.sfx('error'); return; }
  var cost = UPGRADE_COST[lvl];
  if (coins < cost) { hintMsg = GF.t('notenough'); hintT = 1.4; GF.sfx('error'); return; }
  coins -= cost;
  if (kind === 'w') upWidth++; else if (kind === 's') upSpeed++; else upShine++;
  GF.sfx('unlock'); saveMeta();
}

function toggleMute() { GF.toggleMute(); GF.setMusicMuted(GF.muted); }

function onDown(x, y) {
  if (gs === 'SHOP_OVERLAY') { shopDown(x, y); return; }
  if (gs !== 'PLAYING') { overlayDown(x, y); return; }
  if (hit(muteBtn, x, y)) { toggleMute(); return; }
  if (GF.tutorial.active) {
    var sb = GF.tutorial._skipBtn;
    if (sb && x >= sb.x && x <= sb.x + sb.w && y >= sb.y && y <= sb.y + sb.h) { GF.tutorial.handleClick(x, y); return; }
  } else {
    if (hit(helpBtn, x, y)) { GF.tutorial.reopen(); return; }
    for (var i = 0; i < toolRects.length; i++) {
      if (hit(toolRects[i], x, y)) {
        if (i > stageI && i < stageList.length) { while (stageI < i) advanceStageManual(); }
        return;
      }
    }
  }

  lastSample = { x: x, y: y, t: performance.now() };
  applyWipe(x, y, true);
}

function advanceStageManual() {
  stagePeakSum += Math.max(stageComboPeak, combo); stagePeakN++;
  coverSum += coverage; coverN++;
  stageI++;
  combo = 1; comboTimer = 0; lastSample = null; stageComboPeak = 1;
  if (stageI >= stageList.length) { finishJob(); return; }
  buildMask();
  GF.saveRun();
}

function onMove(x, y) {
  if (gs !== 'PLAYING' || !dragging) return;
  dragX = x; dragY = y;
  applyWipe(x, y, false);
}

function applyWipe(x, y, isStart) {
  var stg = STAGES[stageList[stageI]];
  var r = brushRadius();
  var n = 1;
  if (lastSample && !isStart) {
    var dx = x - lastSample.x, dy = y - lastSample.y;
    var d = Math.sqrt(dx * dx + dy * dy);
    n = Math.max(1, Math.floor(d / (r * 0.5)));
  }
  var clearedTotal = 0;
  for (var k = 0; k <= n; k++) {
    var px = lastSample ? lastSample.x + (x - lastSample.x) * (k / n) : x;
    var py = lastSample ? lastSample.y + (y - lastSample.y) * (k / n) : y;
    var cleared = wipeAt(px, py, r);
    clearedTotal += cleared;
    if (cleared > 0 && Math.random() < 0.7) spawnStageFx(px, py, stg);
  }
  if (upSpeed > 0 && clearedTotal > 0) wipeAt(x, y, r * (1 + upSpeed * SPEED_GROW));
  var now = performance.now();
  if (lastSample) {
    var mvx = x - lastSample.x, mvy = y - lastSample.y;
    var moved = Math.sqrt(mvx * mvx + mvy * mvy);
    if (moved > 2 * GF.S && clearedTotal > 0) {
      combo = Math.min(COMBO_MAX, combo + 0.08);
      comboTimer = COMBO_WINDOW;
      if (combo > comboPeak) comboPeak = combo;
      if (combo > stageComboPeak) stageComboPeak = combo;
    }
  }
  lastSample = { x: x, y: y, t: now };
  if (clearedTotal > 0) GF.sfx(stg.sfx);
}

function spawnStageFx(px, py, stg) {
  if (stg.particle === 'snow' || stg.particle === 'drift') {
    GF.spawnParticles(px, py, Math.random() < 0.5 ? '#ddeeff' : '#ffffff', 3);
  } else if (stg.particle === 'ice') {
    GF.spawnParticles(px, py, Math.random() < 0.5 ? '#aac8e8' : '#c8e0f8', 3);
  } else if (stg.particle === 'drip') {
    GF.spawnParticles(px, py, Math.random() < 0.5 ? '#88aacc' : '#aaccee', 4);
  } else if (stg.particle === 'grit') {
    GF.spawnParticles(px, py, Math.random() < 0.5 ? '#b8a880' : '#c8b890', 3);
  }
}

function onUp(x, y) {
  dragging = false;
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt) {
  if (stagePop > 0) stagePop = Math.max(0, stagePop - dt * 1.6);
  if (bigPop > 0) bigPop = Math.max(0, bigPop - dt * 1.4);
  if (hintT > 0) hintT = Math.max(0, hintT - dt);

  if (gs === 'APPRAISE') { appraiseT += dt; return; }
  if (gs === 'REVEAL') {
    if (revealAuto) {
      revealSlide += dt * 0.6;
      if (revealSlide >= 1) { revealSlide = 1; revealAuto = 0; }
    }
    return;
  }
  if (gs !== 'PLAYING') { GF.tutorial.update(dt); return; }
  GF.tutorial.update(dt);

  if (mask) {
    for (var i = 0; i < mask.length; i++) {
      if (mask[i] === 2 && revealBuf[i] < 1) revealBuf[i] = Math.min(1, revealBuf[i] + dt * 8);
    }
  }
  if (comboTimer > 0) { comboTimer -= dt; }
  else combo = Math.max(1, combo - dt * 0.8);

  if (GF.tutorial.active) {
    var st = GF.tutorial.step;
    if (st === 0 && stageI === 0 && coverage >= 0.55) GF.tutorial.next();
    else if (st === 1 && stageI >= 1 && coverage >= 0.5) GF.tutorial.next();
  }

  if (coverage >= STAGE_DONE) {
    advanceStage();
  }
}

// ── DRAW ──────────────────────────────────────────────────────────────────
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  L.topH = GF.clamp(54 * S, 40, 78);
  L.jobCy = H * 0.40;
  var box = jobBox();
  L.barY = box.cy + box.r + GF.clamp(22 * S, 16, 34);
  L.barW = Math.min(W * 0.7, 360 * S);
  L.barX = (W - L.barW) / 2;
  L.barH = GF.clamp(14 * S, 10, 20);
  L.toolY = H - GF.clamp(108 * S, 84, 150);
  L.toolH = GF.clamp(74 * S, 56, 100);
  var ic = GF.clamp(34 * S, 26, 46);
  muteBtn = { x: W - ic - 12 * S, y: (L.topH - ic) / 2 + 4 * S, w: ic, h: ic, r: ic / 2 };
  helpBtn = { x: 12 * S, y: H - ic - 12 * S, w: ic, h: ic, r: ic / 2 };
  var bw = GF.clamp(260 * S, 180, 420), bh = GF.clamp(58 * S, 46, 80);
  L.bigBtn = { x: (W - bw) / 2, y: H - bh - GF.clamp(40 * S, 28, 64), w: bw, h: bh };
  shopBtn = { x: (W - bw) / 2, y: L.bigBtn.y - bh - 14 * S, w: bw, h: bh * 0.84 };
}

function draw(ctx) {
  layout();
  drawBackground(ctx);

  if (gs === 'PLAYING') {
    drawJobScene(ctx);
    drawTopBar(ctx);
    drawStageBar(ctx);
    drawToolbar(ctx);
    drawComboMeter(ctx);
    drawHelp(ctx);
    GF.tutorial.draw(ctx);
  }
  if (gs === 'APPRAISE' || gs === 'REVEAL' || gs === 'SHOP_OVERLAY') drawTopBar(ctx);
  if (gs === 'APPRAISE') drawAppraise(ctx);
  if (gs === 'REVEAL') drawReveal(ctx);
  if (gs === 'SHOP_OVERLAY') drawShop(ctx);
  if (gs === 'MENU') drawMenu(ctx);
  drawMute(ctx);
  if (hintT > 0) drawHint(ctx);
}

function drawBackground(ctx) {
  var W = GF.W, H = GF.H;
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0d1a2e'); g.addColorStop(0.5, '#142038'); g.addColorStop(1, '#1a2848');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  var box = jobBox();
  var rg = ctx.createRadialGradient(box.cx, box.cy, box.r * 0.2, box.cx, box.cy, box.r * 2.2);
  rg.addColorStop(0, 'rgba(180,210,240,0.12)'); rg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(180,210,240,0.15)'; ctx.lineWidth = 1;
  for (var i = 1; i < 5; i++) { var yy = H - i * 26 * GF.S; ctx.beginPath(); ctx.moveTo(0, yy); ctx.lineTo(W, yy); ctx.stroke(); }
}

function drawJobScene(ctx) {
  if (!job) return;
  var box = jobBox();
  var stgKey = stageList[stageI] || 'shovel';

  ctx.save();
  var nStages = stageList.length;
  var stageFrac = gs === 'PLAYING' ? coverage : 1;
  var prog;
  if (gs === 'APPRAISE' || gs === 'REVEAL' || gs === 'SHOP_OVERLAY') prog = 1;
  else if (nStages > 1) prog = GF.clamp((stageI + stageFrac) / nStages, 0, 1);
  else prog = stageFrac;
  drawSurfaceShape(ctx, box, job, prog);
  ctx.restore();

  if (gs === 'PLAYING' && mask) {
    ctx.save();
    drawSnowLayer(ctx, box, STAGES[stgKey]);
    ctx.restore();
  }

  if (stagePop > 0) {
    ctx.save();
    ctx.globalAlpha = stagePop * 0.5;
    var pg = ctx.createRadialGradient(box.cx, box.cy, 0, box.cx, box.cy, box.r);
    pg.addColorStop(0, 'rgba(220,240,255,' + (0.8 * stagePop) + ')');
    pg.addColorStop(1, 'rgba(180,210,255,0)');
    ctx.fillStyle = pg; ctx.fillRect(box.cx - box.r, box.cy - box.r, box.size, box.size);
    ctx.restore();
  }
}

var _snowDabCache = {};
function snowDab(hex) {
  if (_snowDabCache[hex]) return _snowDabCache[hex];
  var S = 48;
  var cv = document.createElement('canvas'); cv.width = cv.height = S;
  var c = cv.getContext('2d');
  var gr = hexToRgb(hex);
  var g = c.createRadialGradient(S / 2, S / 2, 0, S / 2, S / 2, S / 2);
  g.addColorStop(0, 'rgba(' + Math.min(255, Math.round(gr.r * 1.1)) + ',' + Math.min(255, Math.round(gr.g * 1.05)) + ',' + Math.min(255, Math.round(gr.b * 1.0)) + ',1)');
  g.addColorStop(0.55, 'rgba(' + gr.r + ',' + gr.g + ',' + gr.b + ',0.88)');
  g.addColorStop(1, 'rgba(' + gr.r + ',' + gr.g + ',' + gr.b + ',0)');

}

function drawSnowLayer(ctx, box, stg) {
  if (!mask) return;
  var x0 = box.cx - box.size / 2, y0 = box.cy - box.size / 2;
  var cw = box.size / maskW, ch = box.size / maskH;
  var dab = Math.max(cw, ch) * 1.55;
  var sprite = snowDab(stg.grime || '#c8d8f0');
  var half = dab / 2;
  ctx.save();
  for (var gy = 0; gy < maskH; gy++) {
    for (var gx = 0; gx < maskW; gx++) {
      var i = gy * maskW + gx;
      if (mask[i] === 0) continue;
      var a = 1 - revealBuf[i];
      if (a <= 0.03) continue;
      var cxp = x0 + (gx + 0.5) * cw, cyp = y0 + (gy + 0.5) * ch;
      var nz = noise2(gx + snowSeed, gy * 1.3 + snowSeed * 0.5);
      ctx.globalAlpha = a * (0.75 + nz * 0.25);
      ctx.drawImage(sprite, cxp - half, cyp - half, dab, dab);
    }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function noise2(x, y) {

}
function hexToRgb(h) {

// ── SURFACE SHAPE RENDERING ─────────────────────────────────────────────────
function drawSurfaceShape(ctx, box, j, prog) {

  var col = prog < 0.5 ? lerpHex(j.dull, j.clean, prog / 0.5) : lerpHex(j.clean, j.shine, (prog - 0.5) / 0.5);
  ctx.save();
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  var fn = SURFACE_FN[j.shape] || SURFACE_FN.path;
  fn(ctx, cx, cy, r, col, j, prog);
  if (prog > 0.7) {
    ctx.save();
    surfacePath(ctx, box, j.shape);
    ctx.clip();

    var gx = cx - r + t * r * 2.4;
    var sg = ctx.createLinearGradient(gx - r * 0.3, cy - r, gx + r * 0.3, cy + r);
    sg.addColorStop(0, 'rgba(255,255,255,0)');
    sg.addColorStop(0.5, 'rgba(255,255,255,' + (0.2 * (prog - 0.7) / 0.3) + ')');
    sg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = sg; ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
    ctx.restore();
  }
  ctx.restore();

function surfacePath(ctx, box, shape) {
  var cx = box.cx, cy = box.cy, r = box.r;
  ctx.beginPath();
  switch (shape) {
    case 'path':
    case 'sidewalk':
    case 'lot': case 'lot2':
    case 'road': case 'highway': case 'airport':
      GF.rr(ctx, cx - r * 0.88, cy - r * 0.88, r * 1.76, r * 1.76, r * 0.10); break;
    case 'car':
      ctx.moveTo(cx - r * 0.38, cy - r * 0.82);
      ctx.lineTo(cx + r * 0.38, cy - r * 0.82);
      ctx.lineTo(cx + r * 0.82, cy - r * 0.30);
      ctx.lineTo(cx + r * 0.82, cy + r * 0.70);
      ctx.lineTo(cx - r * 0.82, cy + r * 0.70);
      ctx.lineTo(cx - r * 0.82, cy - r * 0.30);
      ctx.closePath(); break;
    case 'driveway': case 'driveway2':
      ctx.moveTo(cx - r * 0.52, cy - r * 0.90);
      ctx.lineTo(cx + r * 0.52, cy - r * 0.90);
      ctx.lineTo(cx + r * 0.88, cy + r * 0.90);
      ctx.lineTo(cx - r * 0.88, cy + r * 0.90);
      ctx.closePath(); break;
    case 'steps':
      for (var si = 0; si < 4; si++) {
        var sw = r * (1.76 - si * 0.18);
        var sy = cy - r * 0.88 + si * r * 0.44;
        if (si === 0) ctx.moveTo(cx - sw / 2, sy);
        ctx.lineTo(cx + sw / 2, sy); ctx.lineTo(cx + sw / 2, sy + r * 0.44);
        ctx.lineTo(cx - sw / 2, sy + r * 0.44); ctx.lineTo(cx - sw / 2, sy);
      }
      ctx.closePath(); break;
    case 'roof':
      ctx.moveTo(cx, cy - r * 0.88);
      ctx.lineTo(cx + r * 0.88, cy + r * 0.10);
      ctx.lineTo(cx + r * 0.88, cy + r * 0.88);
      ctx.lineTo(cx - r * 0.88, cy + r * 0.88);
      ctx.lineTo(cx - r * 0.88, cy + r * 0.10);
      ctx.closePath(); break;
    case 'patio':
      GF.rr(ctx, cx - r * 0.88, cy - r * 0.30, r * 1.76, r * 1.18, r * 0.10); break;
    case 'yard':
      ctx.ellipse(cx, cy, r * 0.88, r * 0.84, 0, 0, Math.PI * 2); break;

      GF.rr(ctx, cx - r * 0.85, cy - r * 0.85, r * 1.70, r * 1.70, r * 0.10); break;

    ctx.fillStyle = col;
    GF.rr(ctx, cx - r * 0.86, cy - r * 0.28, r * 1.72, r * 1.14, r * 0.08); ctx.fill();
    ctx.strokeStyle = lerpHex(col, '#000000', 0.14); ctx.lineWidth = r * 0.02;
    for (var ri2 = 0; ri2 < 3; ri2++) {
      for (var ci2 = 0; ci2 < 3; ci2++) {
        ctx.strokeRect(cx - r * 0.80 + ci2 * r * 0.56, cy - r * 0.22 + ri2 * r * 0.34, r * 0.50, r * 0.30);
      }
    }
  },
  yard: function (ctx, cx, cy, r, col) {
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.ellipse(cx, cy, r * 0.86, r * 0.82, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = lerpHex(col, '#000000', 0.10); ctx.lineWidth = r * 0.018;
    for (var gi = -3; gi <= 3; gi++) {
      ctx.beginPath(); ctx.moveTo(cx + gi * r * 0.24, cy - r * 0.80); ctx.lineTo(cx + gi * r * 0.24, cy + r * 0.80); ctx.stroke();
    }
  },
  road: function (ctx, cx, cy, r, col) {
    ctx.fillStyle = col;
    GF.rr(ctx, cx - r * 0.86, cy - r * 0.80, r * 1.72, r * 1.60, r * 0.06); ctx.fill();
    ctx.strokeStyle = lerpHex(col, '#ffffff', 0.25); ctx.lineWidth = r * 0.04;
    ctx.setLineDash([r * 0.12, r * 0.10]);
    ctx.beginPath(); ctx.moveTo(cx, cy - r * 0.80); ctx.lineTo(cx, cy + r * 0.80); ctx.stroke();
    ctx.setLineDash([]);
  },
  highway: function (ctx, cx, cy, r, col) {
    ctx.fillStyle = col;
    GF.rr(ctx, cx - r * 0.88, cy - r * 0.88, r * 1.76, r * 1.76, r * 0.04); ctx.fill();
    ctx.strokeStyle = lerpHex(col, '#ffffff', 0.22); ctx.lineWidth = r * 0.04;
    ctx.setLineDash([r * 0.14, r * 0.08]);
    ctx.beginPath(); ctx.moveTo(cx - r * 0.30, cy - r * 0.88); ctx.lineTo(cx - r * 0.30, cy + r * 0.88); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + r * 0.30, cy - r * 0.88); ctx.lineTo(cx + r * 0.30, cy + r * 0.88); ctx.stroke();
    ctx.setLineDash([]);
  },
  airport: function (ctx, cx, cy, r, col) {
    ctx.fillStyle = col;
    GF.rr(ctx, cx - r * 0.88, cy - r * 0.88, r * 1.76, r * 1.76, r * 0.04); ctx.fill();
    ctx.strokeStyle = lerpHex(col, '#ffffff', 0.30); ctx.lineWidth = r * 0.05;
    ctx.beginPath(); ctx.moveTo(cx, cy - r * 0.88); ctx.lineTo(cx, cy + r * 0.88); ctx.stroke();
    ctx.lineWidth = r * 0.035;
    for (var ai = -3; ai <= 3; ai++) {
      ctx.beginPath(); ctx.moveTo(cx + ai * r * 0.26, cy - r * 0.78); ctx.lineTo(cx + ai * r * 0.26, cy - r * 0.55); ctx.stroke();
    }
  },
};

// ── HUD ──────────────────────────────────────────────────────────────────
function drawTopBar(ctx) {

  ctx.fillStyle = '#c8e8ff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(17 * S, 13, 23) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(coins, 36 * S, iy);
  if (job) {
    ctx.fillStyle = '#eee'; ctx.textAlign = 'center';
    ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
    var nm = (GF.lang === 'ru' ? job.nameRu : job.nameEn);
    ctx.fillText(nm, W / 2, iy - 6 * S);
    ctx.fillStyle = '#7090b0'; ctx.font = GF.clamp(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';
    ctx.fillText((jobIdx + 1) + ' / ' + NUM_JOBS, W / 2, iy + 9 * S);
  }
}

function drawStageBar(ctx) {
  var S = GF.S;
  var n = stageList.length, dotR = GF.clamp(5 * S, 4, 8);
  var gap = GF.clamp(20 * S, 14, 28);
  var totalW = (n - 1) * gap;
  var sx = GF.W / 2 - totalW / 2;
  var dotY = L.barY - GF.clamp(20 * S, 14, 28);
  for (var i = 0; i < n; i++) {
    var x = sx + i * gap;
    ctx.beginPath(); ctx.arc(x, dotY, dotR, 0, Math.PI * 2);
    ctx.fillStyle = i < stageI ? '#60d0ff' : i === stageI ? '#c8eaff' : 'rgba(255,255,255,0.22)';
    ctx.fill();
  }
  var frac = coverage;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  GF.rr(ctx, L.barX, L.barY, L.barW, L.barH, L.barH / 2); ctx.fill();
  var fg = ctx.createLinearGradient(L.barX, 0, L.barX + L.barW, 0);
  fg.addColorStop(0, '#60d0ff'); fg.addColorStop(1, '#a0e8ff');
  ctx.fillStyle = fg;
  GF.rr(ctx, L.barX, L.barY, Math.max(L.barH, L.barW * frac), L.barH, L.barH / 2); ctx.fill();
  ctx.fillStyle = '#c0ecff'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(Math.round(frac * 100) + '%', GF.W / 2, L.barY - 2 * S);
}

function drawComboMeter(ctx) {
  if (combo <= 1.05) return;
  var S = GF.S;
  var x = GF.W / 2, y = L.barY + L.barH + GF.clamp(20 * S, 14, 30);
  ctx.fillStyle = '#80d4ff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var sz = GF.clamp(15 * S, 12, 22) * (1 + (combo - 1) / COMBO_MAX * 0.4);
  ctx.font = 'bold ' + sz + 'px Inter, system-ui, sans-serif';
  ctx.save(); ctx.shadowColor = 'rgba(100,200,255,0.6)'; ctx.shadowBlur = 8 * S;
  ctx.fillText(GF.t('combo') + ' x' + combo.toFixed(1), x, y);
  ctx.restore();
}

function drawToolbar(ctx) {
  var S = GF.S, W = GF.W;
  toolRects = [];
  var n = stageList.length;
  var bw = Math.min((W - 24 * S) / n, 86 * S);
  var totalW = bw * n + (n - 1) * 8 * S;
  if (totalW > W - 16 * S) { bw = (W - 16 * S - (n - 1) * 6 * S) / n; totalW = bw * n + (n - 1) * 6 * S; }
  var gap = (n > 1 && totalW > W - 16 * S) ? 6 * S : 8 * S;
  totalW = bw * n + (n - 1) * gap;
  var sx = (W - totalW) / 2;
  for (var i = 0; i < n; i++) {
    var x = sx + i * (bw + gap);
    var rr = { x: x, y: L.toolY, w: bw, h: L.toolH, idx: i };
    toolRects.push(rr);
    var active = i === stageI;
    var done = i < stageI;
    ctx.save();
    GF.rr(ctx, x, L.toolY, bw, L.toolH, 12 * S);
    ctx.fillStyle = active ? 'rgba(100,208,255,0.22)' : done ? 'rgba(100,208,255,0.10)' : 'rgba(255,255,255,0.06)';
    ctx.fill();
    ctx.lineWidth = 2 * S;
    ctx.strokeStyle = active ? '#60d0ff' : 'rgba(255,255,255,0.12)';
    ctx.stroke();
    drawToolIcon(ctx, stageList[i], x + bw / 2, L.toolY + L.toolH * 0.38, bw * 0.22, active, done);
    ctx.fillStyle = active ? '#b0e8ff' : done ? '#80c8e8' : '#9a93ab';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(11 * S, 8, 14) + 'px Inter, system-ui, sans-serif';
    var lbl = GF.t(STAGES[stageList[i]].key);
    var fs = GF.clamp(11 * S, 8, 14);
    while (ctx.measureText(lbl).width > bw - 6 * S && fs > 7) { fs--; ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif'; }
    ctx.fillText(lbl, x + bw / 2, L.toolY + L.toolH * 0.78);
    ctx.restore();
  }
}

function drawToolIcon(ctx, key, cx, cy, r, active, done) {
  ctx.save();
  var col = active ? '#a0e8ff' : done ? '#60c8e0' : '#b8b0c8';
  ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = Math.max(1.6, r * 0.18);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  if (key === 'shovel') {
    ctx.beginPath(); ctx.moveTo(cx - r * 0.7, cy - r * 0.7); ctx.lineTo(cx + r * 0.2, cy + r * 0.2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + r * 0.2, cy + r * 0.2);
    ctx.lineTo(cx + r * 0.8, cy + r * 0.0); ctx.lineTo(cx + r * 0.4, cy + r * 0.7);
    ctx.closePath(); ctx.fill();
  } else if (key === 'blower') {
    ctx.beginPath(); ctx.arc(cx - r * 0.1, cy, r * 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = active ? '#0d1a2e' : '#2a2436';
    ctx.beginPath(); ctx.arc(cx - r * 0.1, cy, r * 0.28, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(1.2, r * 0.14);
    ctx.beginPath(); ctx.moveTo(cx + r * 0.38, cy - r * 0.40); ctx.quadraticCurveTo(cx + r * 0.80, cy, cx + r * 0.38, cy + r * 0.40); ctx.stroke();
  } else if (key === 'scrape') {
    ctx.beginPath(); ctx.moveTo(cx - r * 0.7, cy - r * 0.5); ctx.lineTo(cx + r * 0.1, cy + r * 0.3); ctx.stroke();
    ctx.beginPath(); GF.rr(ctx, cx, cy - r * 0.1, r * 0.75, r * 0.45, r * 0.08); ctx.fill();
  } else if (key === 'melt') {
    ctx.lineWidth = Math.max(1.4, r * 0.16);
    for (var mi = 0; mi < 3; mi++) {
      var my = cy - r * 0.35 + mi * r * 0.35;
      ctx.beginPath(); ctx.moveTo(cx - r * 0.6, my);
      ctx.quadraticCurveTo(cx - r * 0.2, my - r * 0.22, cx, my);
      ctx.quadraticCurveTo(cx + r * 0.2, my + r * 0.22, cx + r * 0.6, my);
      ctx.stroke();
    }
  } else if (key === 'sand') {
    GF.rr(ctx, cx - r * 0.5, cy - r * 0.6, r * 1.0, r * 0.7, r * 0.2); ctx.fill();
    ctx.fillStyle = active ? '#ffe8a0' : '#c8b870';
    for (var si2 = 0; si2 < 4; si2++) {
      ctx.beginPath(); ctx.arc(cx - r * 0.2 + si2 * r * 0.14, cy + r * 0.2 + si2 * r * 0.18, r * 0.08, 0, Math.PI * 2); ctx.fill();
    }
  } else if (key === 'plow') {
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.7, cy - r * 0.1);
    ctx.lineTo(cx, cy + r * 0.5);
    ctx.lineTo(cx + r * 0.7, cy - r * 0.1);
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy + r * 0.5); ctx.lineTo(cx, cy - r * 0.6); ctx.stroke();
  }
  ctx.restore();
}

function drawCoinIcon(ctx, cx, cy, r) {
  ctx.save();
  var g = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
  g.addColorStop(0, '#e8f4ff'); g.addColorStop(1, '#60a0d0');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#4080b0'; ctx.lineWidth = Math.max(1, r * 0.12); ctx.stroke();
  ctx.fillStyle = '#2060a0'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + (r * 1.1) + 'px serif'; ctx.fillText('*', cx, cy + r * 0.08);
  ctx.restore();
}

function drawHelp(ctx) {
  var b = helpBtn, S = GF.S;
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.arc(b.x + b.w / 2, b.y + b.h / 2, b.w / 2, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
  ctx.fillStyle = '#c0d8f0'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + (b.w * 0.5) + 'px Inter, system-ui, sans-serif';

}

function drawMute(ctx) {

  GF.drawMuteIcon(ctx, b.x + b.w / 2, b.y + b.h / 2, b.w * 0.42, GF.muted);
}

function drawHint(ctx) {
  var S = GF.S, a = Math.min(1, hintT * 2);
  ctx.save(); ctx.globalAlpha = a;
  ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
  var w = ctx.measureText(hintMsg).width + 32 * S, h = GF.clamp(38 * S, 30, 50);
  var x = GF.W / 2 - w / 2, y = GF.H * 0.5;
  ctx.fillStyle = 'rgba(8,18,34,0.92)'; GF.rr(ctx, x, y, w, h, h / 2); ctx.fill();
  ctx.fillStyle = '#80d0ff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(hintMsg, GF.W / 2, y + h / 2);
  ctx.restore();
}

// ── APPRAISE / REVEAL OVERLAYS ───────────────────────────────────────────
function drawAppraise(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(5,10,22,0.96)'; ctx.fillRect(0, 0, W, H);

  var hb = { cx: W / 2, cy: H * 0.27, r: Math.min(W * 0.32, H * 0.16), size: 0 };
  hb.size = hb.r * 2;
  var sg = ctx.createRadialGradient(hb.cx, hb.cy, 0, hb.cx, hb.cy, hb.r * 2.4);
  sg.addColorStop(0, 'rgba(140,200,255,0.20)'); sg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sg; ctx.fillRect(hb.cx - hb.r * 2.4, hb.cy - hb.r * 2.4, hb.r * 4.8, hb.r * 4.8);
  var bob = Math.sin(performance.now() / 700) * 3 * S;
  var hbb = { cx: hb.cx, cy: hb.cy + bob, r: hb.r, size: hb.size };
  drawSurfaceShape(ctx, hbb, job, 1);
  for (var g = 0; g < 3; g++) {
    var ga = performance.now() / 900 + g * 2.1;
    var gx = hb.cx + Math.cos(ga) * hb.r * 1.15, gy = hb.cy + Math.sin(ga * 1.3) * hb.r * 0.9;
    snowflakeGlyph(ctx, gx, gy, 4 * S, 'rgba(200,240,255,0.9)');
  }

  var cy = H * 0.50;
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(24 * S, 18, 36) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('appraised'), W / 2, cy - 34 * S);

  var sR = GF.clamp(22 * S, 16, 32), sgap = sR * 2.7;
  for (var i = 0; i < 3; i++) {
    var on = i < appraiseStars;
    var revT = appraiseT - 0.18 - i * 0.22;
    var shown = revT > 0;
    var pop = shown ? (1 + 0.6 * Math.max(0, 1 - revT * 4)) : 0.0001;
    var col = on ? (shown ? '#80d8ff' : 'rgba(255,255,255,0.10)') : 'rgba(255,255,255,0.12)';
    snowflakeGlyph(ctx, W / 2 + (i - 1) * sgap, cy + 8 * S, sR * (on ? pop : 1), col);
  }
  if (appraiseT > 0.7) {
    ctx.fillStyle = appraiseStars >= 3 ? '#80d8ff' : '#bfb6d0';
    ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
    var word = appraiseStars >= 3 ? GF.t('perfect') : appraiseStars === 2 ? GF.t('star_mid') : GF.t('star_lo');
    ctx.fillText(word, W / 2, cy + 48 * S);
  }

  var bp = 1 + bigPop * 0.4;
  var shownCoins = Math.min(appraiseCoins, Math.round(appraiseCoins * GF.clamp((appraiseT - 0.5) / 0.7, 0, 1)));
  drawCoinIcon(ctx, W / 2 - 58 * S, cy + 98 * S, 17 * S * bp);
  ctx.fillStyle = '#80d8ff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.save(); ctx.shadowColor = 'rgba(100,200,255,0.6)'; ctx.shadowBlur = 14 * S;
  ctx.font = 'bold ' + (GF.clamp(38 * S, 28, 56) * bp) + 'px Inter, system-ui, sans-serif';
  ctx.fillText('+' + shownCoins, W / 2 - 34 * S, cy + 98 * S);
  ctx.restore();

  if (newUnlock >= 0 && appraiseT > 1.0) {
    ctx.fillStyle = '#a0e8ff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
    var un = (GF.lang === 'ru' ? JOBS[newUnlock].nameRu : JOBS[newUnlock].nameEn);
    var pre = (GF.lang === 'ru' ? 'Открыто: ' : 'Unlocked: ');
    ctx.fillText(pre + un, W / 2, cy + 146 * S);
  }
  drawBigButton(ctx, L.bigBtn, GF.t('next'), appraiseT >= 0.5);
}

function drawReveal(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(5,10,22,0.96)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(22 * S, 17, 32) + 'px Inter, system-ui, sans-serif';
  ctx.fillText((GF.lang === 'ru' ? JOBS[jobIdx].nameRu : JOBS[jobIdx].nameEn), W / 2, H * 0.13);
  var box = { cx: W / 2, cy: H * 0.36, r: Math.min(W * 0.30, H * 0.18), size: 0 };
  box.size = box.r * 2;
  ctx.save();
  drawSurfaceShape(ctx, box, job, 0.0);
  surfacePath(ctx, box, job.shape); ctx.clip();
  var gw = ctx.createRadialGradient(box.cx, box.cy, box.r * 0.1, box.cx, box.cy, box.r);
  gw.addColorStop(0, 'rgba(180,210,240,0.75)'); gw.addColorStop(1, 'rgba(160,190,220,0.90)');
  ctx.fillStyle = gw; ctx.fillRect(box.cx - box.r, box.cy - box.r, box.size, box.size);
  ctx.restore();
  ctx.save();
  var splitX = box.cx - box.r + revealSlide * box.r * 2;
  ctx.beginPath(); ctx.rect(splitX, box.cy - box.r - 4 * S, box.cx + box.r - splitX + 8 * S, box.size + 8 * S); ctx.clip();
  drawSurfaceShape(ctx, box, job, 1.0);
  ctx.restore();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2 * S;
  ctx.beginPath(); ctx.moveTo(splitX, box.cy - box.r - 4 * S); ctx.lineTo(splitX, box.cy + box.r + 4 * S); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(splitX, box.cy, 7 * S, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#9a93ab'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('before'), box.cx - box.r * 0.55, box.cy - box.r - 16 * S);
  ctx.fillStyle = '#80d8ff';
  ctx.fillText(GF.t('after'), box.cx + box.r * 0.55, box.cy - box.r - 16 * S);
  drawBigButton(ctx, shopBtn, GF.t('tools') + '  (' + coins + ')', true, true);
  drawBigButton(ctx, L.bigBtn, GF.t('next'), true);
}

function drawShop(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(6,12,24,0.94)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(24 * S, 18, 36) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('tools'), W / 2, H * 0.12);
  drawCoinIcon(ctx, W / 2 - 34 * S, H * 0.18, 12 * S);
  ctx.fillStyle = '#80d8ff'; ctx.textAlign = 'left'; ctx.font = 'bold ' + GF.clamp(17 * S, 13, 23) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(coins, W / 2 - 16 * S, H * 0.18);
  shopRects = [];
  var ups = [
    { up: 'w', lvl: upWidth, name: GF.t('up_width'), desc: GF.t('up_width_d') },
    { up: 's', lvl: upSpeed, name: GF.t('up_speed'), desc: GF.t('up_speed_d') },
    { up: 'h', lvl: upShine, name: GF.t('up_shine'), desc: GF.t('up_shine_d') },
  ];
  var cardW = Math.min(W - 40 * S, 420 * S), cardH = GF.clamp(74 * S, 60, 100);
  var startY = H * 0.26;
  for (var i = 0; i < ups.length; i++) {
    var u = ups[i];
    var x = (W - cardW) / 2, y = startY + i * (cardH + 14 * S);
    var maxed = u.lvl >= 3;
    var cost = maxed ? 0 : UPGRADE_COST[u.lvl];
    ctx.save();
    GF.rr(ctx, x, y, cardW, cardH, 14 * S);
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
    ctx.fillStyle = '#eee'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px Inter, system-ui, sans-serif';
    ctx.fillText(u.name, x + 16 * S, y + 12 * S);
    ctx.fillStyle = '#9a93ab'; ctx.font = GF.clamp(11 * S, 9, 15) + 'px Inter, system-ui, sans-serif';
    ctx.fillText(u.desc, x + 16 * S, y + 34 * S);
    for (var p = 0; p < 3; p++) {
      ctx.fillStyle = p < u.lvl ? '#60d0ff' : 'rgba(255,255,255,0.18)';
      ctx.beginPath(); ctx.arc(x + 18 * S + p * 14 * S, y + cardH - 16 * S, 4 * S, 0, Math.PI * 2); ctx.fill();
    }
    var bw = GF.clamp(96 * S, 70, 130), bh = GF.clamp(40 * S, 32, 54);
    var bx = x + cardW - bw - 14 * S, by = y + (cardH - bh) / 2;
    GF.rr(ctx, bx, by, bw, bh, bh / 2);
    var afford = !maxed && coins >= cost;
    ctx.fillStyle = maxed ? 'rgba(96,208,255,0.25)' : afford ? '#60d0ff' : 'rgba(255,255,255,0.10)';
    ctx.fill();
    ctx.fillStyle = maxed ? '#a0e8ff' : afford ? '#081820' : '#7a7390';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px Inter, system-ui, sans-serif';
    ctx.fillText(maxed ? GF.t('mastered') : (GF.t('equip') + ' ' + cost), bx + bw / 2, by + bh / 2);
    ctx.restore();
    shopRects.push({ x: x, y: y, w: cardW, h: cardH, kind: 'up', up: u.up });
  }
  drawBigButton(ctx, L.bigBtn, GF.t('back'), true);
}

function drawBigButton(ctx, b, label, enabled, secondary) {
  if (!b || !b.w) return;
  var S = GF.S;
  ctx.save();
  var pulse = enabled ? (1 + 0.02 * Math.sin(performance.now() / 350)) : 1;
  var w = b.w * pulse, h = b.h * pulse, x = b.x + b.w / 2 - w / 2, y = b.y + b.h / 2 - h / 2;
  GF.rr(ctx, x, y, w, h, h / 2);
  if (secondary) {
    ctx.fillStyle = 'rgba(255,255,255,0.10)'; ctx.fill();
    ctx.strokeStyle = '#60d0ff'; ctx.lineWidth = 2 * S; ctx.stroke();
    ctx.fillStyle = '#60d0ff';
  } else if (enabled) {
    var g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, '#50c8ff'); g.addColorStop(1, '#2090c0');
    ctx.shadowColor = 'rgba(80,200,255,0.4)'; ctx.shadowBlur = 16 * S;
    ctx.fillStyle = g; ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = '#04101e';
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();
    ctx.fillStyle = '#6a6480';
  }
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(18 * S, 14, 26) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(label, b.x + b.w / 2, b.y + b.h / 2);
  ctx.restore();
}

// ── MENU ────────────────────────────────────────────────────────────────────
function drawMenu(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  drawBackground(ctx);
  shopRects = [];
  ctx.save();
  ctx.shadowColor = 'rgba(100,200,255,0.4)'; ctx.shadowBlur = 24 * S;
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(34 * S, 24, 50) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('title'), W / 2, H * 0.10);
  ctx.restore();
  ctx.fillStyle = '#7090b0'; ctx.font = GF.clamp(13 * S, 11, 18) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('sub'), W / 2, H * 0.10 + 28 * S);
  drawCoinIcon(ctx, W / 2 - 70 * S, H * 0.10 + 56 * S, 11 * S);
  ctx.fillStyle = '#80d8ff'; ctx.textAlign = 'left'; ctx.font = 'bold ' + GF.clamp(14 * S, 11, 19) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(coins + '', W / 2 - 54 * S, H * 0.10 + 56 * S);
  ctx.fillStyle = '#7090b0'; ctx.textAlign = 'left';
  ctx.font = GF.clamp(12 * S, 10, 16) + 'px Inter, system-ui, sans-serif';
  ctx.fillText(GF.t('best') + ': ' + best, W / 2 + 14 * S, H * 0.10 + 56 * S);

  var cols = 3;
  var gridY = H * 0.22, gridW = Math.min(W - 28 * S, 440 * S);
  var cell = (gridW - (cols - 1) * 10 * S) / cols;
  var gx0 = (W - gridW) / 2;
  var rows = Math.ceil(NUM_JOBS / cols);
  var maxRows = Math.floor((H * 0.62 - gridY) / (cell + 10 * S));
  rows = Math.min(rows, Math.max(3, maxRows));
  for (var i = 0; i < NUM_JOBS; i++) {
    var cc = i % cols, rr = (i / cols) | 0;
    if (rr >= rows) break;
    var x = gx0 + cc * (cell + 10 * S), y = gridY + rr * (cell + 10 * S);
    var unlocked = i <= unlockedMax;
    ctx.save();
    GF.rr(ctx, x, y, cell, cell, 12 * S);
    ctx.fillStyle = unlocked ? 'rgba(255,255,255,0.07)' : 'rgba(255,255,255,0.03)';
    ctx.fill();
    ctx.strokeStyle = unlocked ? 'rgba(100,200,255,0.4)' : 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1.5 * S; ctx.stroke();
    if (unlocked) {
      var mb = { cx: x + cell / 2, cy: y + cell * 0.42, r: cell * 0.28, size: cell * 0.56 };
      ctx.save(); GF.rr(ctx, x, y, cell, cell, 12 * S); ctx.clip();
      drawSurfaceShape(ctx, mb, JOBS[i], 1.0);
      ctx.restore();
      ctx.fillStyle = '#c0d8f0'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      var fs = GF.clamp(10 * S, 8, 13); ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif';
      var nm = (GF.lang === 'ru' ? JOBS[i].nameRu : JOBS[i].nameEn);
      while (ctx.measureText(nm).width > cell - 6 * S && fs > 7) { fs--; ctx.font = 'bold ' + fs + 'px Inter, system-ui, sans-serif'; }
      ctx.fillText(nm, x + cell / 2, y + cell - 11 * S);
    } else {
      drawLock(ctx, x + cell / 2, y + cell * 0.38, cell * 0.16);
      drawCoinIcon(ctx, x + cell / 2 - 14 * S, y + cell * 0.72, 7 * S);
      ctx.fillStyle = '#7090b0'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + GF.clamp(10 * S, 8, 13) + 'px Inter, system-ui, sans-serif';
      ctx.fillText(JOBS[i].unlock + '', x + cell / 2 - 4 * S, y + cell * 0.72);
    }
    ctx.restore();
    shopRects.push({ x: x, y: y, w: cell, h: cell, kind: 'job', idx: i });
  }

  var bw = GF.clamp(280 * S, 200, 440), bh = GF.clamp(60 * S, 48, 84);
  var pb = { x: (W - bw) / 2, y: H - bh - Math.round(H * 0.14), w: bw, h: bh };
  drawBigButton(ctx, pb, GF.t('play'), true);
  shopRects.push({ x: pb.x, y: pb.y, w: pb.w, h: pb.h, kind: 'play' });
}

function drawLock(ctx, cx, cy, r) {
  ctx.save();
  ctx.strokeStyle = '#506888'; ctx.fillStyle = '#506888'; ctx.lineWidth = Math.max(1.5, r * 0.2);
  ctx.beginPath(); ctx.arc(cx, cy - r * 0.2, r * 0.55, Math.PI, 0); ctx.stroke();
  GF.rr(ctx, cx - r * 0.7, cy - r * 0.2, r * 1.4, r * 1.1, r * 0.2); ctx.fill();
  ctx.restore();
}

function snowflakeGlyph(ctx, cx, cy, r, col) {
  ctx.save();
  ctx.strokeStyle = col; ctx.lineWidth = Math.max(1.2, r * 0.18);
  ctx.lineCap = 'round';
  for (var ai = 0; ai < 6; ai++) {
    var ang = ai * Math.PI / 3;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(ang) * r, cy + Math.sin(ang) * r);
    ctx.stroke();
    var bx = cx + Math.cos(ang) * r * 0.6, by = cy + Math.sin(ang) * r * 0.6;
    var ba1 = ang + Math.PI / 4, ba2 = ang - Math.PI / 4;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(bx + Math.cos(ba1) * r * 0.30, by + Math.sin(ba1) * r * 0.30);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(bx + Math.cos(ba2) * r * 0.30, by + Math.sin(ba2) * r * 0.30);
    ctx.stroke();
  }
  ctx.restore();
}

// ── TUTORIAL ────────────────────────────────────────────────────────────────
function setupTutorial(force) {
  var tgFn = function () { var b = jobBox(); return { x: b.cx - b.r * 0.4, y: b.cy, r: b.r * 0.35 }; };
  var toFn = function () { var b = jobBox(); return { x: b.cx + b.r * 0.4, y: b.cy, r: b.r * 0.35 }; };
  GF.tutorial.start([
    { text: GF.t('tut_brush'),  target: tgFn, target2: toFn, gesture: 'drag', advance: 'manual' },
    { text: GF.t('tut_polish'), target: tgFn, target2: toFn, gesture: 'drag', advance: 'manual' },
  ], { storageKey: 'snow_day_tut_v1', force: force });
}

// ── BOOT ──────────────────────────────────────────────────────────────────
var cv = GF.canvas;
cv.addEventListener('mousedown', function (e) { var p = evtXY(e); onDown(p.x, p.y); });
cv.addEventListener('mousemove', function (e) { var p = evtXY(e); onMove(p.x, p.y); });
window.addEventListener('mouseup', function (e) { var p = evtXY(e); onUp(p.x, p.y); });
cv.addEventListener('touchstart', function (e) { e.preventDefault(); var p = evtXY(e); onDown(p.x, p.y); }, { passive: false });
cv.addEventListener('touchmove', function (e) { e.preventDefault(); var p = evtXY(e); onMove(p.x, p.y); }, { passive: false });
cv.addEventListener('touchend', function (e) { e.preventDefault(); var p = evtXY(e); onUp(p.x, p.y); }, { passive: false });

// ── CUSTOM SFX (ASMR snow tools) ──────────────────────────────────────────
(function () {
  var orig = GF.sfx;
  var lastT = {};
  GF.sfx = function (name) {
    var now = performance.now();
    if (name === 'shovelS' || name === 'blowerS' || name === 'scrapeS' || name === 'meltS' || name === 'sandS') {
      if (lastT[name] && now - lastT[name] < 90) return;
      lastT[name] = now;
    }
    switch (name) {
      case 'shovelS':  GF.tone(280 + Math.random() * 80, 0.07, 'sawtooth', 0.022, 180); GF.tone(120, 0.06, 'triangle', 0.018); return;
      case 'blowerS':  GF.tone(1800 + Math.random() * 400, 0.08, 'sawtooth', 0.014); return;
      case 'scrapeS':  GF.tone(2400 + Math.random() * 800, 0.06, 'square', 0.016); GF.tone(440, 0.05, 'sawtooth', 0.012); return;
      case 'meltS':    GF.tone(3200 + Math.random() * 1000, 0.05, 'sawtooth', 0.013); return;
      case 'sandS':    GF.tone(600 + Math.random() * 200, 0.09, 'sawtooth', 0.020, 400); return;
      case 'stageDone': GF.arp([440, 660, 880], 60, 0.16, 'triangle', 0.10); return;
      case 'appraise': GF.arp([440, 554, 740, 988, 1320], 75, 0.20, 'sine', 0.13); return;
      default: return orig(name);
    }
  };
})();

GF.init({
  designW: 480,
  designH: 854,
  strings: STRINGS,
  sprites: [],
  saveKey: 'snow_day',
  onReady: function () {
    try {
      var m = JSON.parse(localStorage.getItem('snow_day_meta_v1') || '{}');
      coins = m.coins || 0; best = m.best || 0; totalStars = m.totalStars || 0;
      unlockedMax = m.unlockedMax || 0;
      upWidth = m.upWidth || 0; upSpeed = m.upSpeed || 0; upShine = m.upShine || 0;
    } catch (e) {}

    GF.startMusic({ preset: 'calm', muted: GF.muted });

    GF.persist('snow_day_run_v1',
      function () {
        if (gs !== 'PLAYING') return { gs: gs, jobIdx: jobIdx, coins: coins, unlockedMax: unlockedMax };
        return {
          gs: gs, jobIdx: jobIdx, stageI: stageI, coins: coins, unlockedMax: unlockedMax,
          upWidth: upWidth, upSpeed: upSpeed, upShine: upShine, best: best, totalStars: totalStars,
          combo: combo, comboPeak: comboPeak, stageComboPeak: stageComboPeak,
          stagePeakSum: stagePeakSum, stagePeakN: stagePeakN, coverSum: coverSum, coverN: coverN,
          maskCleared: maskCleared,
        };
      },
      function (s) {
        if (!s) return;
        coins = s.coins || coins; unlockedMax = s.unlockedMax || unlockedMax;
        if (typeof s.upWidth === 'number') { upWidth = s.upWidth; upSpeed = s.upSpeed; upShine = s.upShine; }
        if (typeof s.best === 'number') best = s.best;
        if (s.gs === 'PLAYING' && typeof s.jobIdx === 'number') {
          _restoring = true;
          startJob(s.jobIdx);
          stageI = GF.clamp(s.stageI || 0, 0, stageList.length - 1);
          buildMask();
          stagePeakSum = s.stagePeakSum || 0; stagePeakN = s.stagePeakN || 0;
          coverSum = s.coverSum || 0; coverN = s.coverN || 0;
          combo = s.combo || 1; comboPeak = s.comboPeak || 1; stageComboPeak = s.stageComboPeak || 1;
          var target = Math.min(s.maskCleared || 0, maskTotal);
          var idxs = [];
          for (var i = 0; i < mask.length; i++) if (mask[i] === 1) idxs.push(i);
          for (var k = 0; k < target && k < idxs.length; k++) { mask[idxs[k]] = 2; revealBuf[idxs[k]] = 1; maskCleared++; }
          if (maskTotal > 0) coverage = maskCleared / maskTotal;
          gs = 'PLAYING';
          GF.tutorial.active = false;
          _restoring = false;
          GF.saveRun();
        }
      }
    );

    // AUTOSTART (rule #9)
    if (window.__GF_AUTOSTART && !window._silent) {
      try { localStorage.setItem('snow_day_tut_v1', '1'); } catch (e) {}
      if (gs !== 'PLAYING') { startJob(0); }
      GF.tutorial.active = false;
    } else if (gs === 'PLAYING') {
      // resumed mid-run
    } else {
      gs = 'MENU';
    }

    var seen = false;
    try { seen = !!localStorage.getItem('snow_day_tut_v1'); } catch (e) {}
    if (!seen && gs === 'PLAYING' && jobIdx === 0 && !(window.__GF_AUTOSTART && !window._silent)) {
      setupTutorial(true);
    }
  },
  onUpdate: update,
  onDraw: draw,
});

var _origStartJob = startJob;
startJob = function (idx) {
  _origStartJob(idx);
  var seen = false;
  try { seen = !!localStorage.getItem('snow_day_tut_v1'); } catch (e) {}
  if (!seen && idx === 0 && !(window.__GF_AUTOSTART && !window._silent)) {
    setupTutorial(false);
  }
};

// ── EXPOSE STATE ────────────────────────────────────────────────────────────
GF.exposeState(function () {
  return {
    gs: gs, coins: coins, best: best, totalStars: totalStars,
    jobIdx: jobIdx, stageI: stageI, stages: stageList.length,
    coverage: coverage, combo: combo, comboPeak: comboPeak,
    unlockedMax: unlockedMax, upWidth: upWidth, upSpeed: upSpeed, upShine: upShine,
    appraiseStars: appraiseStars, appraiseCoins: appraiseCoins,
    BRUSH_R: BRUSH_R, BRUSH_GROW: BRUSH_GROW, STAGE_DONE: STAGE_DONE,
    COMBO_MAX: COMBO_MAX, MASK_CELLS: MASK_CELLS, NUM_JOBS: NUM_JOBS,
    _stageKey: stageList[stageI] || null,
  };
});

window._sdBox = function () { return jobBox(); };
window._sdPlayBtn = function () {
  var W = GF.W, H = GF.H, S = GF.S;
  var bw = GF.clamp(280 * S, 200, 440), bh = GF.clamp(60 * S, 48, 84);
  return { x: (W - bw) / 2, y: H - bh - Math.round(H * 0.14), w: bw, h: bh };
};
window._sdCtaBtn = function () { return L.bigBtn; };
window._sdToolRects = function () { return toolRects; };

})();
</script>
