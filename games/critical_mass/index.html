<script src="./gf-lib.js"></script>
<script>
(function() {
'use strict';

// ── LOCALISED STRINGS (Yandex 8.2.3 — every UI string via GF.t) ───────────
var STRINGS = {

  },

    sub:   'Сбрасывайте ячейки. Охлаждайте ядро. Выполните норму.',
    play: 'Начать смену', retry: 'Новый реактор',
    score: 'Энергия', best: 'Рекорд',
    gameover: 'Расплавление',
    shift: 'Смена', heat: 'Жар', quota: 'Норма',
    shiftclear: 'Смена пройдена', endless: 'Бесконечно',
    paused: 'Пауза', resume: 'Продолжить',
    newtype_inert: 'Появились глухие ячейки - их нельзя сбросить, обходите их',
    newtype_volatile: 'Летучие ячейки быстро греют ядро - сбрасывайте их скорее',
    newtype_coolant: 'Ячейки охладителя - сбросьте их, чтобы сбросить жар',
    newtype_chain: 'Цепные ячейки взрывают соседей',
    newtype_rod: 'Нестабильные стержни заливают жар, когда кольцо пустеет!',
    tut_goal_l: 'Цель', tut_controls_l: 'Управление', tut_win_l: 'Победа', tut_lose_l: 'Поражение', tut_tip_l: 'Совет',
    tut_goal: 'Сбрасывайте совпадающие ячейки, чтобы вырабатывать энергию и выполнить норму.',
    tut_controls: 'Нажмите на ячейку, чтобы сбросить группу; перетащите соседние для обмена.',
    tut_win: 'Заполните шкалу Энергии до нормы, чтобы пройти смену. 6 смен, затем бесконечность.',
    tut_lose: 'Ядро расплавится, если Жар достигнет верха шкалы.',
    tut_tip: 'Копите группы охладителя (голубые) и сбрасывайте их в момент скачка жара.',
    coach_vent: 'Нажмите на светящуюся группу, чтобы сбросить её',
    coach_heat: 'Оставленные ячейки греют ядро - держите Жар низким',
    coach_power: 'Заполните Энергию, чтобы пройти смену',
    howto: 'Как играть', tapcont: 'нажмите, чтобы продолжить', close: 'Закрыть',
  },
};

var SPRITE_NAMES = []; // procedural art only

// ── TUNABLES (exposed via GF.exposeState for the gate / DESIGN cross-check) ──
var HEAT_MAX             = 100;
var QUOTA_BASE           = 50;
var QUOTA_STEP           = 28;
var MIN_CLUSTER          = 3;
var SPAWN_BASE_MS        = 1500;
var SPAWN_MIN_MS         = 520;
var HEAT_PER_CELL        = 0.55;
var VOLATILE_HEAT_MULT   = 3.2;
var VENT_POWER_BASE      = 4;
var VENT_POWER_PER_EXTRA = 3;
var COOLANT_DUMP         = 16;
var SHIFT_COOL           = 22;

var COLS = 6, ROWS = 9;
var SCRIPTED_SHIFTS = 6;

// Cell type ids
var T_FUEL = 0, T_INERT = 1, T_VOLATILE = 2, T_COOLANT = 3, T_CHAIN = 4, T_ROD = 5;

// Fuel colour palette (index = color id). Coolant uses its own cyan.
var FUEL_COLS = [
  { base: '#ff4d6d', glow: '#ff8095' },
  { base: '#ffd23f', glow: '#ffe488' },
  { base: '#3fd07a', glow: '#7ff0ad' },
  { base: '#7c5cff', glow: '#b6a4ff' },
];
var COOLANT_COL = { base: '#22c7e0', glow: '#8af0ff' };
var VOLATILE_TINT = '#ff7a18';
var CHAIN_CORE = '#ffffff';
var ROD_COL = { base: '#c9ff3f', glow: '#e8ff9a' };
var INERT_COL = '#454b5c';

// ── GAME STATE ───────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | PLAYING | SHIFTCLEAR | PAUSED | GAMEOVER
// ROWS x COLS, each cell = {t, c, rod?} or null. Initialised to a valid empty
// matrix at module load so state getters (exposeState) are safe before any seed.
var grid = (function () { var g = []; for (var r = 0; r < ROWS; r++) { g[r] = []; for (var c = 0; c < COLS; c++) g[r][c] = null; } return g; })();
var shift = 1;
var power = 0;
var quota = QUOTA_BASE;
var score = 0;
var bestScore = 0;
var bestShift = 0;
var heat = 0;
var spawnTimer = 0;
var spawnInterval = SPAWN_BASE_MS;
var colorCount = 3;        // active number of fuel colours (rises with shifts)
var seenTut = false;
var helpOpen = false;
var pausedFrom = 'PLAYING';

// coach (interactive in-play tutorial)
var coachOn = false, coachStep = 0;

// fx
var ventFlash = 0;          // 0..1 white flash on vent
var heatPulse = 0;          // pulse when heat spikes
var shiftClearT = 0;        // timer for the shift-clear banner
var newTypeBanner = null, newTypeT = 0;  // "new cell type" toast

// drag/swap tracking
var dragCell = null;        // {r,c,x,y} where a press began

// layout (rebuilt on resize)
var L = {};

// resume snapshot
var _resume = null;

// ── GRID HELPERS ───────────────────────────────────────────────────────────
function inBounds(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }
function cellAt(r, c) { return inBounds(r, c) ? grid[r][c] : null; }

function emptyGrid() {
  grid = [];
  for (var r = 0; r < ROWS; r++) { grid[r] = []; for (var c = 0; c < COLS; c++) grid[r][c] = null; }
}

// colour-group key: coolant is its own group; fuel/volatile/chain group by .c
function colorKey(cell) {
  if (cell.t === T_COOLANT) return 'cool';
  return 'f' + cell.c;
}

// flood-fill cluster of same colour group (volatile/chain count by their colour)
function clusterAt(r0, c0) {
  var start = cellAt(r0, c0);
  if (!start || start.t === T_INERT || start.t === T_ROD) return [];
  var key = colorKey(start);
  var seen = {}, stack = [[r0, c0]], out = [];
  while (stack.length) {
    var p = stack.pop(), r = p[0], cc = p[1], id = r * COLS + cc;
    if (seen[id]) continue; seen[id] = true;
    var cell = cellAt(r, cc);
    if (!cell || cell.t === T_INERT || cell.t === T_ROD) continue;
    if (colorKey(cell) !== key) continue;
    out.push([r, cc]);
    stack.push([r - 1, cc], [r + 1, cc], [r, cc - 1], [r, cc + 1]);
  }
  return out;
}

// list every ventable cluster (>= MIN_CLUSTER) right now, de-duped
function listClusters() {
  var seen = {}, res = [];
  for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) {
    var id = r * COLS + c;
    if (seen[id]) continue;
    var cell = grid[r][c];
    if (!cell || cell.t === T_INERT || cell.t === T_ROD) { seen[id] = true; continue; }
    var cl = clusterAt(r, c);
    for (var i = 0; i < cl.length; i++) seen[cl[i][0] * COLS + cl[i][1]] = true;
    if (cl.length >= MIN_CLUSTER) res.push(cl);
  }
  return res;
}

// gravity: cells fall down to fill gaps within each column
function applyGravity() {
  for (var c = 0; c < COLS; c++) {
    var write = ROWS - 1;
    for (var r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c]) { var cell = grid[r][c]; grid[r][c] = null; grid[write][c] = cell; write--; }
    }
  }
}

// heat accrual rate from current board (volatile weighted, inert light)
function heatRate() {
  var rate = 0;
  for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) {
    var cell = grid[r][c]; if (!cell) continue;
    if (cell.t === T_COOLANT) continue;
    if (cell.t === T_INERT) { rate += HEAT_PER_CELL * 0.5; continue; }
    if (cell.t === T_VOLATILE) { rate += HEAT_PER_CELL * VOLATILE_HEAT_MULT; continue; }
    rate += HEAT_PER_CELL;
  }
  return rate * (1 + (shift - 1) * 0.06);
}

// ── SPAWNING ───────────────────────────────────────────────────────────────
function rngColor() { return (Math.random() * colorCount) | 0; }
function rodTime() { return Math.max(6, 12 - shift); }

function makeCell() {
  var roll = Math.random();
  var canInert    = shift >= 2;
  var canVolatile = shift >= 3;
  var canCoolant  = shift >= 4;
  var canChain    = shift >= 5;
  var canRod      = shift >= 6;
  if (canRod && roll < 0.05) return { t: T_ROD, c: rngColor(), rod: 1, rodMax: rodTime() };
  if (canChain && roll < 0.11) return { t: T_CHAIN, c: rngColor() };
  if (canCoolant && roll < 0.20) return { t: T_COOLANT, c: -1 };
  if (canVolatile && roll < 0.30) return { t: T_VOLATILE, c: rngColor() };
  if (canInert && roll < 0.40) return { t: T_INERT, c: -1 };
  return { t: T_FUEL, c: rngColor() };
}

// drop one cell into a random non-full column; full board -> overflow heat
function spawnCell() {
  var cols = [];
  for (var c = 0; c < COLS; c++) { if (!grid[0][c]) cols.push(c); }
  if (!cols.length) { heat = Math.min(HEAT_MAX, heat + 6); heatPulse = 1; GF.setShake(0.4); return; }
  var c2 = cols[(Math.random() * cols.length) | 0];
  for (var r = ROWS - 1; r >= 0; r--) { if (!grid[r][c2]) { grid[r][c2] = makeCell(); break; } }
  if (heat > HEAT_MAX * 0.6) heatPulse = Math.max(heatPulse, 0.5);
}

// seed a starting board with guaranteed ventable clusters
function seedBoard(rowsFilled) {
  emptyGrid();
  var fillRows = rowsFilled || 4;
  for (var r = ROWS - fillRows; r < ROWS; r++) for (var c = 0; c < COLS; c++) grid[r][c] = { t: T_FUEL, c: rngColor() };
  ensureSolvable();
}

// guarantee a couple of vent-able clusters so the player is never stuck
function ensureSolvable() {
  if (listClusters().length >= 2) return;
  for (var k = 0; k < 2; k++) {
    var rr = ROWS - 1 - k;
    var col = rngColor();
    for (var c = 0; c < 3; c++) {
      if (cellAt(rr, c) && (cellAt(rr, c).t === T_INERT || cellAt(rr, c).t === T_ROD)) continue;
      grid[rr][c] = { t: T_FUEL, c: col };
    }
  }
}

// ── VENTING ─────────────────────────────────────────────────────────────────
function ventPower(n) { return VENT_POWER_BASE + (n - MIN_CLUSTER) * VENT_POWER_PER_EXTRA; }

function ventClusterAt(r, c) {
  var cell = cellAt(r, c);
  if (!cell || cell.t === T_INERT || cell.t === T_ROD) { GF.sfx('error'); return false; }
  var cl = clusterAt(r, c);
  if (cl.length < MIN_CLUSTER) { GF.sfx('error'); return false; }
  doVent(cl);
  return true;
}

function doVent(cl) {
  var anyCoolant = false, anyChain = false;
  var i, cell;
  for (i = 0; i < cl.length; i++) {
    cell = grid[cl[i][0]][cl[i][1]]; if (!cell) continue;
    if (cell.t === T_COOLANT) anyCoolant = true;
    if (cell.t === T_CHAIN) anyChain = true;
  }
  var toClear = {};
  for (i = 0; i < cl.length; i++) toClear[cl[i][0] * COLS + cl[i][1]] = cl[i];
  // chain: detonate orthogonal neighbours
  if (anyChain) {
    var extra = [];
    for (i = 0; i < cl.length; i++) {
      var r0 = cl[i][0], c0 = cl[i][1];
      var nb = [[r0 - 1, c0], [r0 + 1, c0], [r0, c0 - 1], [r0, c0 + 1]];
      for (var j = 0; j < nb.length; j++) { var nr = nb[j][0], nc = nb[j][1]; if (inBounds(nr, nc) && grid[nr][nc] && grid[nr][nc].t !== T_ROD) extra.push([nr, nc]); }
    }
    for (i = 0; i < extra.length; i++) toClear[extra[i][0] * COLS + extra[i][1]] = extra[i];
  }
  // chip inert cells orthogonally adjacent to the vented cluster
  for (i = 0; i < cl.length; i++) {
    var rr0 = cl[i][0], cc0 = cl[i][1];
    var adj = [[rr0 - 1, cc0], [rr0 + 1, cc0], [rr0, cc0 - 1], [rr0, cc0 + 1]];
    for (var a = 0; a < adj.length; a++) { var ar = adj[a][0], ac = adj[a][1]; if (inBounds(ar, ac) && grid[ar][ac] && grid[ar][ac].t === T_INERT) toClear[ar * COLS + ac] = [ar, ac]; }
  }

  var cleared = 0, fuelCleared = 0;
  for (var key in toClear) {
    var p = toClear[key]; var rr = p[0], cc = p[1]; var cc2 = grid[rr][cc]; if (!cc2) continue;
    GF.spawnParticles(cellCX(cc), cellCY(rr), ventTint(cc2), 6);
    if (cc2.t !== T_INERT) fuelCleared++;
    grid[rr][cc] = null; cleared++;
  }

  var n = Math.max(MIN_CLUSTER, fuelCleared);
  var gained = ventPower(n);
  if (anyChain) gained = Math.round(gained * 1.4);
  power += gained; score += gained;
  GF.spawnFloat(cellCX(cl[0][1]), cellCY(cl[0][0]) - 10 * GF.S, '+' + gained, '#ffe488');

  heat = Math.max(0, heat - 2.0);
  if (anyCoolant) { heat = Math.max(0, heat - COOLANT_DUMP); GF.spawnFloat(cellCX(cl[0][1]), cellCY(cl[0][0]) + 14 * GF.S, '-' + COOLANT_DUMP + '°', COOLANT_COL.glow); }

  ventFlash = Math.min(1, 0.5 + cleared * 0.04);
  if (anyChain) { GF.sfx('evolve'); GF.setShake(0.7); }
  else if (anyCoolant) GF.sfx('unlock');
  else GF.sfx('merge');

  applyGravity();
  ensureSolvable();

  if (coachOn && coachStep === 0) coachStep = 1;
  if (power >= quota && gs === 'PLAYING') clearShift();
  saveRunSoon();
}

function ventTint(cell) {
  if (cell.t === T_COOLANT) return COOLANT_COL.base;
  if (cell.t === T_VOLATILE) return VOLATILE_TINT;
  if (cell.t === T_INERT) return INERT_COL;
  if (cell.t === T_ROD) return ROD_COL.base;
  return FUEL_COLS[cell.c % FUEL_COLS.length].base;
}

// ── SWAP (drag between adjacent cells) ───────────────────────────────────────
function trySwap(r1, c1, r2, c2) {
  var a = cellAt(r1, c1), b = cellAt(r2, c2);
  if (!a || !b) return false;
  if (a.t === T_INERT || b.t === T_INERT || a.t === T_ROD || b.t === T_ROD) { GF.sfx('error'); return false; }
  grid[r1][c1] = b; grid[r2][c2] = a;
  GF.sfx('tap'); applyGravity(); ensureSolvable(); saveRunSoon();
  return true;
}

// ── SHIFT PROGRESSION ────────────────────────────────────────────────────────
function clearShift() {
  GF.sfx('win');
  heat = Math.max(0, heat - SHIFT_COOL);
  bestShift = Math.max(bestShift, shift);
  shiftClearT = 1.4;
  gs = 'SHIFTCLEAR';
  saveRunSoon();
}

function nextShift() {
  shift++;
  power = 0;
  quota = QUOTA_BASE + (shift - 1) * QUOTA_STEP;
  spawnInterval = Math.max(SPAWN_MIN_MS, SPAWN_BASE_MS - (shift - 1) * 170);
  colorCount = Math.min(FUEL_COLS.length, 3 + Math.floor((shift - 1) / 2));
  announceNewType(shift);
  gs = 'PLAYING';
  GF.gameStarted();
  saveRunSoon();
}

function announceNewType(sh) {
  var key = null;
  if (sh === 2) key = 'newtype_inert';
  else if (sh === 3) key = 'newtype_volatile';
  else if (sh === 4) key = 'newtype_coolant';
  else if (sh === 5) key = 'newtype_chain';
  else if (sh === 6) key = 'newtype_rod';
  if (key) { newTypeBanner = key; newTypeT = 3.0; }
}

// ── LIFECYCLE ──────────────────────────────────────────────────────────────
function startGame() {
  shift = 1; power = 0; score = 0; heat = 0;
  quota = QUOTA_BASE; spawnInterval = SPAWN_BASE_MS; spawnTimer = 0;
  colorCount = 3;
  newTypeBanner = null; newTypeT = 0; shiftClearT = 0; ventFlash = 0; heatPulse = 0;
  helpOpen = false;
  seedBoard(4);
  gs = 'PLAYING';
  if (!seenTut && !window._silent) startCoach();
  GF.gameStarted();
  saveRunSoon();
}

function gameOver() {
  var nb = score > bestScore;
  if (nb) bestScore = score;
  bestShift = Math.max(bestShift, shift);
  try { localStorage.setItem('critical_mass_best', bestScore); localStorage.setItem('critical_mass_bestshift', bestShift); } catch (e) {}
  gs = 'GAMEOVER';
  coachOn = false;
  GF.sfx('lose'); GF.setShake(1.1);
  GF.gameEnded();
  if (nb && bestScore > 0) GF.happytime();
  saveRunSoon();
}

// ── COACH (interactive tutorial over live play) ──────────────────────────────
function startCoach() {
  coachOn = true; coachStep = 0;
  for (var c = 0; c < 3; c++) grid[ROWS - 1][c] = { t: T_FUEL, c: 0 };
}
function coachTargetCluster() {
  var cls = listClusters();
  if (!cls.length) return null;
  var best = cls[0];
  for (var i = 1; i < cls.length; i++) if (cls[i].length > best.length) best = cls[i];
  var sx = 0, sy = 0;
  for (var j = 0; j < best.length; j++) { sx += cellCX(best[j][1]); sy += cellCY(best[j][0]); }
  return { x: sx / best.length, y: sy / best.length, r: L.cell * 0.7 };
}
function updateCoach() {
  if (!coachOn) return;
  if (coachStep >= 3) { coachOn = false; seenTut = true; try { localStorage.setItem('critical_mass_seen_tutorial', '1'); } catch (e) {} }
}

// ── LAYOUT ───────────────────────────────────────────────────────────────────
function layout() {
  var W = GF.W, H = GF.H, S = GF.S;
  var topH = Math.max(96 * S, H * 0.13);
  var pad = Math.max(8 * S, W * 0.025);
  var gw = W - pad * 2;
  var cell = Math.min(gw / COLS, (H - topH - pad) / ROWS);
  var gridW = cell * COLS, gridH = cell * ROWS;
  var gx = (W - gridW) / 2;
  var gy = topH + (H - topH - gridH) / 2;
  L.W = W; L.H = H; L.S = S;
  L.topH = topH; L.cell = cell; L.gx = gx; L.gy = gy; L.gridW = gridW; L.gridH = gridH;
  var br = Math.max(15 * S, 16);
  // keep button centre low enough that the top (y - r) never clips off-screen
  var btnY = Math.max(26 * S, br + 5);
  L.heatBar = { x: pad, y: 52 * S, w: W - pad * 2, h: 16 * S };
  L.btnMute = { x: W - pad - br, y: btnY, r: br };
  L.btnHelp = { x: W - pad - br * 3 - 8 * S, y: btnY, r: br };
  L.btnPause = { x: W - pad - br * 5 - 16 * S, y: btnY, r: br };
}

function cellCX(c) { return L.gx + c * L.cell + L.cell / 2; }
function cellCY(r) { return L.gy + r * L.cell + L.cell / 2; }
function pxToCell(x, y) {
  var c = Math.floor((x - L.gx) / L.cell);
  var r = Math.floor((y - L.gy) / L.cell);
  if (!inBounds(r, c)) return null;
  return { r: r, c: c };
}

// ── UPDATE ───────────────────────────────────────────────────────────────────
function update(dt) {
  if (ventFlash > 0) ventFlash = Math.max(0, ventFlash - dt * 3);
  if (heatPulse > 0) heatPulse = Math.max(0, heatPulse - dt * 2);
  if (newTypeT > 0) { newTypeT -= dt; if (newTypeT <= 0) newTypeBanner = null; }

  if (gs === 'SHIFTCLEAR') { shiftClearT -= dt; if (shiftClearT <= 0) nextShift(); return; }
  if (gs !== 'PLAYING') return;

  updateCoach();
  var frozen = coachOn;
  if (frozen) return;
  // screenshot freeze: hold the board static (no heat/spawn/meltdown) so the
  // capture lands on a populated mid-shift PLAYING frame with the gauge lit.
  if (window._screenshotFreeze) return;

  heat += dt * heatRate();

  // rods tick down; flood heat when expired
  var changed = false;
  for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) {
    var cell = grid[r][c];
    if (cell && cell.t === T_ROD) {
      cell.rod -= dt / cell.rodMax;
      if (cell.rod <= 0) {
        heat = Math.min(HEAT_MAX, heat + HEAT_MAX * 0.32);
        heatPulse = 1; GF.setShake(0.8); GF.sfx('hurt');
        GF.spawnParticles(cellCX(c), cellCY(r), ROD_COL.base, 14);
        grid[r][c] = null; changed = true;
      }
    }
  }
  if (changed) applyGravity();

  spawnTimer += dt * 1000;
  if (spawnTimer >= spawnInterval) { spawnTimer = 0; spawnCell(); applyGravity(); ensureSolvable(); }

  if (heat >= HEAT_MAX) { heat = HEAT_MAX; gameOver(); return; }
}

// ── DRAW ───────────────────────────────────────────────────────────────────
function draw(ctx) {
  var W = GF.W, H = GF.H;
  var bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0c1020'); bg.addColorStop(0.55, '#0a0a16'); bg.addColorStop(1, '#10060a');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  var hf = heat / HEAT_MAX;
  if (hf > 0.4) {
    ctx.save();
    ctx.globalAlpha = (hf - 0.4) * 0.5 + heatPulse * 0.25;
    var hg = ctx.createRadialGradient(W / 2, H * 0.6, 0, W / 2, H * 0.6, Math.max(W, H) * 0.7);
    hg.addColorStop(0, '#ff2a00'); hg.addColorStop(1, 'rgba(255,42,0,0)');
    ctx.fillStyle = hg; ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  if (gs === 'PLAYING' || gs === 'SHIFTCLEAR' || gs === 'PAUSED' || gs === 'GAMEOVER') {
    drawGridBg(ctx); drawCells(ctx); drawHUD(ctx);
    if (gs === 'PLAYING' && ventFlash > 0) { ctx.save(); ctx.globalAlpha = ventFlash * 0.25; ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H); ctx.restore(); }
  }
  if (coachOn && gs === 'PLAYING') drawCoach(ctx);
  if (gs === 'SHIFTCLEAR') drawShiftClear(ctx);
  if (newTypeBanner && newTypeT > 0 && (gs === 'PLAYING' || gs === 'SHIFTCLEAR')) drawNewTypeToast(ctx);

  if (gs === 'MENU')     drawMenu(ctx);
  if (gs === 'PAUSED')   GF.drawOverlay({ title: GF.t('paused'), sub: GF.t('shift') + ' ' + shift, btnText: GF.t('resume'), btnFn: function () { gs = pausedFrom; }, bestText: GF.t('best') + ': ' + bestScore });
  if (gs === 'GAMEOVER') GF.drawOverlay({ title: GF.t('gameover'), sub: GF.t('score') + ': ' + score + '  ·  ' + GF.t('shift') + ' ' + shift, btnText: GF.t('retry'), btnFn: function () { startGame(); }, bestText: GF.t('best') + ': ' + bestScore });

  if (helpOpen) drawHelp(ctx);
}

function drawGridBg(ctx) {
  var S = GF.S;
  ctx.save();
  GF.rr(ctx, L.gx - 4 * S, L.gy - 4 * S, L.gridW + 8 * S, L.gridH + 8 * S, 12 * S);
  ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fill();
  ctx.strokeStyle = 'rgba(120,160,255,0.10)'; ctx.lineWidth = 1;
  for (var c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(L.gx + c * L.cell, L.gy); ctx.lineTo(L.gx + c * L.cell, L.gy + L.gridH); ctx.stroke(); }
  for (var r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(L.gx, L.gy + r * L.cell); ctx.lineTo(L.gx + L.gridW, L.gy + r * L.cell); ctx.stroke(); }
  ctx.restore();
}

function drawCells(ctx) {
  var t = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000;
  var ready = {};
  var cls = listClusters();
  for (var k = 0; k < cls.length; k++) for (var m = 0; m < cls[k].length; m++) ready[cls[k][m][0] * COLS + cls[k][m][1]] = cls[k].length;
  for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) {
    var cell = grid[r][c]; if (!cell) continue;
    drawCell(ctx, cell, c, r, ready[r * COLS + c] || 0, t);
  }
}

function drawCell(ctx, cell, c, r, readyN, t) {
  var S = GF.S, sz = L.cell, x = L.gx + c * sz, y = L.gy + r * sz;
  var pad = sz * 0.07, ix = x + pad, iy = y + pad, iw = sz - pad * 2, ih = sz - pad * 2;
  var rad = sz * 0.22;
  ctx.save();
  if (cell.t === T_INERT) {
    GF.rr(ctx, ix, iy, iw, ih, rad); ctx.fillStyle = INERT_COL; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1.4 * S;
    ctx.beginPath(); ctx.moveTo(ix + iw * 0.3, iy + ih * 0.2); ctx.lineTo(ix + iw * 0.5, iy + ih * 0.55); ctx.lineTo(ix + iw * 0.35, iy + ih * 0.85); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ix + iw * 0.7, iy + ih * 0.15); ctx.lineTo(ix + iw * 0.6, iy + ih * 0.5); ctx.stroke();
    ctx.restore(); return;
  }

  var col, glow;
  if (cell.t === T_COOLANT) { col = COOLANT_COL.base; glow = COOLANT_COL.glow; }
  else if (cell.t === T_ROD) { col = ROD_COL.base; glow = ROD_COL.glow; }
  else { var fc = FUEL_COLS[cell.c % FUEL_COLS.length]; col = fc.base; glow = fc.glow; }

  if (readyN >= MIN_CLUSTER) { var pulse = 0.5 + 0.5 * Math.sin(t * 4 + (r + c)); ctx.shadowColor = glow; ctx.shadowBlur = (8 + pulse * 10) * S; }
  var grad = ctx.createLinearGradient(ix, iy, ix, iy + ih);
  grad.addColorStop(0, glow); grad.addColorStop(0.5, col); grad.addColorStop(1, col);
  GF.rr(ctx, ix, iy, iw, ih, rad); ctx.fillStyle = grad; ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  ctx.globalAlpha = 0.35; ctx.fillStyle = '#fff';
  GF.rr(ctx, ix + iw * 0.16, iy + ih * 0.12, iw * 0.4, ih * 0.22, rad * 0.5); ctx.fill();
  ctx.globalAlpha = 1;

  if (cell.t === T_VOLATILE) {
    var vp = 0.5 + 0.5 * Math.sin(t * 8 + r);
    ctx.strokeStyle = VOLATILE_TINT; ctx.lineWidth = (2 + vp * 1.6) * S;
    ctx.beginPath(); ctx.arc(x + sz / 2, y + sz / 2, iw * 0.42, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#fff';
    var mx = x + sz / 2, my = y + sz / 2, u = iw * 0.16;
    ctx.beginPath();
    ctx.moveTo(mx - u * 0.4, my - u * 1.5); ctx.lineTo(mx + u * 0.7, my - u * 0.2); ctx.lineTo(mx, my - u * 0.2);
    ctx.lineTo(mx + u * 0.4, my + u * 1.5); ctx.lineTo(mx - u * 0.7, my + u * 0.2); ctx.lineTo(mx, my + u * 0.2); ctx.closePath(); ctx.fill();
  } else if (cell.t === T_COOLANT) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    var dx = x + sz / 2, dy = y + sz / 2, dr = iw * 0.2;
    ctx.beginPath(); ctx.arc(dx, dy + dr * 0.3, dr, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(dx, dy - dr * 1.3); ctx.lineTo(dx - dr * 0.9, dy + dr * 0.4); ctx.lineTo(dx + dr * 0.9, dy + dr * 0.4); ctx.closePath(); ctx.fill();
  } else if (cell.t === T_CHAIN) {
    ctx.fillStyle = CHAIN_CORE; ctx.save(); ctx.translate(x + sz / 2, y + sz / 2);
    var sp = 0.6 + 0.4 * Math.sin(t * 6 + c);
    ctx.beginPath();
    for (var s = 0; s < 8; s++) { var ang = s / 8 * Math.PI * 2; var rr2 = (s % 2 === 0 ? iw * 0.3 : iw * 0.13) * sp; var px = Math.cos(ang) * rr2, py = Math.sin(ang) * rr2; if (s === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }
    ctx.closePath(); ctx.fill(); ctx.restore();
  } else if (cell.t === T_ROD) {
    var frac = Math.max(0, Math.min(1, cell.rod));
    ctx.save(); ctx.translate(x + sz / 2, y + sz / 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 3.4 * S;
    ctx.beginPath(); ctx.arc(0, 0, iw * 0.38, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = frac < 0.35 ? '#ff4d4d' : '#fff'; ctx.lineWidth = 3.4 * S; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(0, 0, iw * 0.38, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

function drawHUD(ctx) {
  var W = GF.W, S = GF.S;
  var pad = L.heatBar.x;
  var fs = GF.clamp(15 * S, 12, 20);
  ctx.font = 'bold ' + fs + 'px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#cfe0ff';
  var shLabel = (shift > SCRIPTED_SHIFTS) ? GF.t('endless') : (GF.t('shift') + ' ' + shift);
  ctx.fillText(shLabel + '  ·  ' + Math.floor(power) + '/' + quota, pad, 16 * S);
  ctx.textAlign = 'right'; ctx.fillStyle = '#9fb4d8';
  ctx.fillText(GF.t('score') + ' ' + score, L.btnPause.x - L.btnPause.r - 10 * S, 16 * S);

  var pbW = W - pad * 2, pbY = 38 * S, pbH = 6 * S;
  GF.rr(ctx, pad, pbY, pbW, pbH, pbH / 2); ctx.fillStyle = 'rgba(255,255,255,0.10)'; ctx.fill();
  var pf = Math.min(1, power / quota);
  if (pf > 0) { GF.rr(ctx, pad, pbY, pbW * pf, pbH, pbH / 2); ctx.fillStyle = '#ffe066'; ctx.fill(); }

  var hb = L.heatBar;
  GF.rr(ctx, hb.x, hb.y, hb.w, hb.h, hb.h / 2); ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();
  var hf = Math.min(1, heat / HEAT_MAX);
  if (hf > 0) {
    var hgrad = ctx.createLinearGradient(hb.x, 0, hb.x + hb.w, 0);
    hgrad.addColorStop(0, '#ffb13f'); hgrad.addColorStop(0.6, '#ff5a3c'); hgrad.addColorStop(1, '#ffffff');
    ctx.save();
    if (hf > 0.78) { ctx.shadowColor = '#ff3a1a'; ctx.shadowBlur = (8 + heatPulse * 14) * S; }
    GF.rr(ctx, hb.x, hb.y, hb.w * hf, hb.h, hb.h / 2); ctx.fillStyle = hgrad; ctx.fill();
    ctx.restore();
  }
  ctx.font = 'bold ' + GF.clamp(10 * S, 9, 13) + 'px sans-serif'; ctx.textAlign = 'left'; ctx.fillStyle = '#fff'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('heat'), hb.x + 6 * S, hb.y + hb.h / 2);
  ctx.textBaseline = 'top';
  if (hf > 0.85) {
    var blink = 0.5 + 0.5 * Math.sin((performance.now ? performance.now() : Date.now()) / 90);
    ctx.globalAlpha = blink; ctx.strokeStyle = '#ff5050'; ctx.lineWidth = 2 * S;
    GF.rr(ctx, hb.x, hb.y, hb.w, hb.h, hb.h / 2); ctx.stroke(); ctx.globalAlpha = 1;
  }

  drawCircBtn(ctx, L.btnPause, 'pause');
  drawCircBtn(ctx, L.btnHelp, 'help');
  drawCircBtn(ctx, L.btnMute, 'mute');
}

function drawCircBtn(ctx, b, kind) {
  ctx.save();
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1; ctx.stroke();
  if (kind === 'mute') { GF.drawMuteIcon(ctx, b.x, b.y, b.r * 0.6, GF.muted); }
  else if (kind === 'help') { ctx.fillStyle = '#cfe0ff'; ctx.font = 'bold ' + (b.r * 1.1) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('?', b.x, b.y + 1); }
  else if (kind === 'pause') { ctx.fillStyle = '#cfe0ff'; var bw = b.r * 0.22, bh = b.r * 0.7; ctx.fillRect(b.x - bw * 1.6, b.y - bh / 2, bw, bh); ctx.fillRect(b.x + bw * 0.6, b.y - bh / 2, bw, bh); }
  ctx.restore();
}

function drawCoach(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.save(); ctx.fillStyle = 'rgba(0,0,0,0.32)'; ctx.fillRect(0, 0, W, H); ctx.restore();
  var t = (performance.now ? performance.now() : Date.now()) / 1000;
  var pulse = 0.5 + 0.5 * Math.sin(t * 3.5);
  var msgKey, tgt;
  if (coachStep === 0) { msgKey = 'coach_vent'; tgt = coachTargetCluster(); }
  else if (coachStep === 1) { msgKey = 'coach_heat'; tgt = { x: L.heatBar.x + L.heatBar.w * 0.5, y: L.heatBar.y + L.heatBar.h / 2, r: 26 * S }; }
  else { msgKey = 'coach_power'; tgt = { x: L.gx + 50 * S, y: 41 * S, r: 22 * S }; }

  if (tgt) {
    ctx.save(); ctx.shadowColor = '#ffeb3b'; ctx.shadowBlur = 16; ctx.strokeStyle = '#ffeb3b';
    ctx.lineWidth = 3 + pulse * 1.5; ctx.globalAlpha = 0.9;
    ctx.beginPath(); ctx.arc(tgt.x, tgt.y, tgt.r + pulse * 10 * S, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
  }
  var msg = GF.t(msgKey);
  var fs = GF.clamp(15 * S, 12, 19);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  var tw = ctx.measureText(msg).width;
  var pw = tw + 28 * S, ph = 34 * S;
  var px = GF.clamp((tgt ? tgt.x : W / 2) - pw / 2, 8 * S, W - pw - 8 * S);
  var py = (tgt && tgt.y > H * 0.4) ? tgt.y - tgt.r - ph - 12 * S : (tgt ? tgt.y + tgt.r + 14 * S : H * 0.4);
  py = GF.clamp(py, 70 * S, H - ph - 12 * S);
  ctx.save(); ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 9 * S;
  GF.rr(ctx, px, py, pw, ph, ph / 2); ctx.fillStyle = 'rgba(16,20,30,0.94)'; ctx.fill(); ctx.restore();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(msg, px + pw / 2, py + ph / 2 + 1);
  if (coachStep >= 1) { ctx.font = (fs - 3) + 'px sans-serif'; ctx.fillStyle = '#9cc'; ctx.fillText(GF.t('tapcont'), W / 2, py + ph + 16 * S); }
  ctx.textBaseline = 'top';
}

function drawShiftClear(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  var a = Math.min(1, shiftClearT / 1.4) * Math.min(1, (1.4 - shiftClearT) * 4 + 0.3);
  ctx.save(); ctx.globalAlpha = Math.min(0.85, a);
  ctx.fillStyle = 'rgba(8,14,26,0.7)'; ctx.fillRect(0, H * 0.36, W, H * 0.2);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#7ff0ad'; ctx.font = 'bold ' + GF.clamp(30 * S, 22, 46) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(127,240,173,0.6)'; ctx.shadowBlur = 20 * S;
  ctx.fillText(GF.t('shiftclear'), W / 2, H * 0.43);
  ctx.shadowBlur = 0; ctx.fillStyle = '#cfe0ff'; ctx.font = 'bold ' + GF.clamp(16 * S, 12, 22) + 'px sans-serif';
  var nextShEnd = (shift + 1) > SCRIPTED_SHIFTS;
  ctx.fillText((nextShEnd ? GF.t('endless') : GF.t('shift') + ' ' + (shift + 1)) + '  ·  ' + GF.t('quota') + ' ' + (QUOTA_BASE + shift * QUOTA_STEP), W / 2, H * 0.5);
  ctx.restore(); ctx.textBaseline = 'top';
}

function drawNewTypeToast(ctx) {
  var W = GF.W, S = GF.S;
  var a = Math.min(1, newTypeT) * Math.min(1, (3.0 - newTypeT) * 3 + 0.2);
  ctx.save(); ctx.globalAlpha = Math.min(1, a);
  var msg = GF.t(newTypeBanner);
  var fs = GF.clamp(14 * S, 11, 18);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  var maxW = W * 0.84;
  var lines = wrapText(ctx, msg, maxW);
  var ph = lines.length * (fs + 4) + 16 * S, pw = maxW + 16 * S;
  var px = (W - pw) / 2, py = L.gy + L.gridH * 0.30;
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10 * S;
  GF.rr(ctx, px, py, pw, ph, 12 * S); ctx.fillStyle = 'rgba(28,18,10,0.95)'; ctx.fill(); ctx.shadowBlur = 0;
  ctx.strokeStyle = '#ff9a3c'; ctx.lineWidth = 1.5 * S; GF.rr(ctx, px, py, pw, ph, 12 * S); ctx.stroke();
  ctx.fillStyle = '#ffd9a0'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (var j = 0; j < lines.length; j++) ctx.fillText(lines[j], W / 2, py + 8 * S + j * (fs + 4));
  ctx.restore();
}

function wrapText(ctx, text, maxW) {
  var words = String(text).split(' '), lines = [], cur = '';
  for (var i = 0; i < words.length; i++) { var p = cur ? cur + ' ' + words[i] : words[i]; if (ctx.measureText(p).width > maxW && cur) { lines.push(cur); cur = words[i]; } else cur = p; }
  if (cur) lines.push(cur);
  return lines;
}

// ── MENU + HELP ──────────────────────────────────────────────────────────────
var menuPlayRect = null;
function drawMenu(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(8,8,18,0.9)'; ctx.fillRect(0, 0, W, H);
  var t = (performance.now ? performance.now() : Date.now()) / 1000;
  var cx = W / 2, cyE = H * 0.2, R = Math.min(W, H) * 0.11;
  var eg = ctx.createRadialGradient(cx, cyE, 0, cx, cyE, R * 1.6);
  eg.addColorStop(0, '#fff'); eg.addColorStop(0.4, '#ffb13f'); eg.addColorStop(0.8, '#ff4d3c'); eg.addColorStop(1, 'rgba(255,77,60,0)');
  ctx.save(); ctx.globalAlpha = 0.85 + 0.15 * Math.sin(t * 3); ctx.fillStyle = eg;
  ctx.beginPath(); ctx.arc(cx, cyE, R * 1.6, 0, Math.PI * 2); ctx.fill(); ctx.restore();

  ctx.shadowColor = 'rgba(255,120,60,0.5)'; ctx.shadowBlur = 28 * S;
  ctx.font = 'bold ' + GF.clamp(34 * S, 22, 52) + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(GF.t('title'), cx, H * 0.32);
  ctx.shadowBlur = 0;
  ctx.font = GF.clamp(13 * S, 11, 18) + 'px sans-serif'; ctx.fillStyle = '#9ab';
  ctx.fillText(GF.t('sub'), cx, H * 0.36);

  var rows = [
    [GF.t('tut_goal_l'), GF.t('tut_goal')],
    [GF.t('tut_controls_l'), GF.t('tut_controls')],
    [GF.t('tut_win_l'), GF.t('tut_win')],
    [GF.t('tut_lose_l'), GF.t('tut_lose')],
  ];
  var fs = GF.clamp(12 * S, 10, 15);
  var lineH = fs + 5 * S;
  var cardW = Math.min(W * 0.9, 460 * S);
  var cardX = cx - cardW / 2;
  var y = H * 0.42;
  ctx.textAlign = 'left';
  for (var i = 0; i < rows.length; i++) {
    ctx.font = 'bold ' + fs + 'px sans-serif'; ctx.fillStyle = '#ffd066';
    var lbl = rows[i][0] + ': '; ctx.fillText(lbl, cardX, y);
    var lblW = ctx.measureText(lbl).width;
    ctx.font = fs + 'px sans-serif'; ctx.fillStyle = '#cfe0ff';
    var lines = wrapText(ctx, rows[i][1], cardW - lblW);
    for (var ln = 0; ln < lines.length; ln++) ctx.fillText(lines[ln], ln === 0 ? cardX + lblW : cardX + 10 * S, y + ln * lineH);
    y += lines.length * lineH + 4 * S;
  }

  var bw = GF.clamp(248 * S, 180, 360), bh = GF.clamp(56 * S, 44, 76);
  var bx = cx - bw / 2, by = Math.min(H * 0.83, y + 18 * S);
  var k = Math.sin(t * 2.2);
  var grad = ctx.createLinearGradient(bx, by, bx, by + bh);
  grad.addColorStop(0, '#ff7a3c'); grad.addColorStop(1, '#e0432a');
  ctx.save(); ctx.shadowColor = 'rgba(255,120,60,' + (0.4 + 0.25 * k).toFixed(2) + ')'; ctx.shadowBlur = (20 + 10 * k) * S;
  GF.rr(ctx, bx, by, bw, bh, bh / 2); ctx.fillStyle = grad; ctx.fill(); ctx.restore();
  ctx.font = 'bold ' + GF.clamp(20 * S, 15, 28) + 'px sans-serif'; ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('▶ ' + GF.t('play'), cx, by + bh / 2);
  ctx.textBaseline = 'alphabetic';
  menuPlayRect = { x: bx, y: by, w: bw, h: bh };

  if (bestScore > 0) { ctx.font = GF.clamp(13 * S, 10, 17) + 'px sans-serif'; ctx.fillStyle = '#778'; ctx.fillText(GF.t('best') + ': ' + bestScore + '  ·  ' + GF.t('shift') + ' ' + bestShift, cx, by + bh + 24 * S); }
  drawCircBtn(ctx, L.btnMute, 'mute');
}

var helpCloseRect = null;
function drawHelp(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(6,8,16,0.94)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + GF.clamp(24 * S, 18, 34) + 'px sans-serif';
  ctx.fillText(GF.t('howto'), W / 2, H * 0.1);
  var rows = [
    [GF.t('tut_goal_l'), GF.t('tut_goal')],
    [GF.t('tut_controls_l'), GF.t('tut_controls')],
    [GF.t('tut_win_l'), GF.t('tut_win')],
    [GF.t('tut_lose_l'), GF.t('tut_lose')],
    [GF.t('tut_tip_l'), GF.t('tut_tip')],
  ];
  var fs = GF.clamp(14 * S, 11, 18), lineH = fs + 6 * S;
  var cardW = Math.min(W * 0.88, 480 * S), cardX = (W - cardW) / 2;
  var y = H * 0.2;
  ctx.textAlign = 'left';
  for (var i = 0; i < rows.length; i++) {
    ctx.font = 'bold ' + fs + 'px sans-serif'; ctx.fillStyle = '#ffd066';
    var lbl = rows[i][0] + ': '; ctx.fillText(lbl, cardX, y);
    var lblW = ctx.measureText(lbl).width;
    ctx.font = fs + 'px sans-serif'; ctx.fillStyle = '#cfe0ff';
    var lines = wrapText(ctx, rows[i][1], cardW - lblW);
    for (var ln = 0; ln < lines.length; ln++) ctx.fillText(lines[ln], ln === 0 ? cardX + lblW : cardX + 10 * S, y + ln * lineH);
    y += lines.length * lineH + 8 * S;
  }
  var bw = GF.clamp(180 * S, 130, 260), bh = GF.clamp(48 * S, 40, 64);
  var bx = W / 2 - bw / 2, by = Math.min(H * 0.86, y + 16 * S);
  GF.rr(ctx, bx, by, bw, bh, bh / 2); ctx.fillStyle = '#2ee07a'; ctx.fill();
  ctx.fillStyle = '#06210f'; ctx.font = 'bold ' + GF.clamp(17 * S, 14, 24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('close'), W / 2, by + bh / 2);
  ctx.textBaseline = 'top';
  helpCloseRect = { x: bx, y: by, w: bw, h: bh };
}

// ── INPUT ──────────────────────────────────────────────────────────────────
function evtPos(e) {
  var r = GF.canvas.getBoundingClientRect();
  var src = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
  return { x: (src.clientX - r.left) * (GF.canvas.width / r.width), y: (src.clientY - r.top) * (GF.canvas.height / r.height) };
}
function hitCirc(b, x, y) { var dx = x - b.x, dy = y - b.y; return dx * dx + dy * dy <= (b.r + 6 * GF.S) * (b.r + 6 * GF.S); }
function inRect(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

function onDown(x, y) {
  if (helpOpen) { if (helpCloseRect && inRect(helpCloseRect, x, y)) { helpOpen = false; GF.sfx('click'); } return; }
  // mute reachable on every screen
  if (L.btnMute && hitCirc(L.btnMute, x, y)) { GF.toggleMute(); GF.setMusicMuted(GF.muted); return; }
  if (gs === 'PLAYING' || gs === 'PAUSED' || gs === 'SHIFTCLEAR') {
    if (L.btnHelp && hitCirc(L.btnHelp, x, y)) { helpOpen = true; GF.sfx('click'); return; }
    if (L.btnPause && hitCirc(L.btnPause, x, y)) {
      if (gs === 'PLAYING') { pausedFrom = 'PLAYING'; gs = 'PAUSED'; } else if (gs === 'PAUSED') gs = pausedFrom;
      GF.sfx('click'); return;
    }
  }
  if (gs === 'MENU') { if (menuPlayRect && inRect(menuPlayRect, x, y)) { startGame(); } return; }
  if (gs === 'GAMEOVER' || gs === 'PAUSED') return; // gf overlay button handled via canvas click

  if (gs !== 'PLAYING') return;

  // coach info steps advance on any tap (steps 1 & 2)
  if (coachOn) {
    if (coachStep === 1) { coachStep = 2; return; }
    if (coachStep === 2) { coachStep = 3; updateCoach(); return; }
  }

  var cellPos = pxToCell(x, y);
  if (!cellPos) return;
  dragCell = { r: cellPos.r, c: cellPos.c, x: x, y: y };
}

function onMove(x, y) {
  if (gs !== 'PLAYING' || !dragCell) return;
  var dx = x - dragCell.x, dy = y - dragCell.y;
  var thresh = L.cell * 0.55;
  if (Math.abs(dx) < thresh && Math.abs(dy) < thresh) return;
  var tr = dragCell.r, tc = dragCell.c;
  if (Math.abs(dx) > Math.abs(dy)) tc += dx > 0 ? 1 : -1; else tr += dy > 0 ? 1 : -1;
  if (inBounds(tr, tc) && !(coachOn && coachStep === 0)) trySwap(dragCell.r, dragCell.c, tr, tc);
  dragCell = null; // one swap per drag
}

function onUp(x, y) {
  if (gs !== 'PLAYING') { dragCell = null; return; }
  if (dragCell) {
    var moved = Math.abs(x - dragCell.x) > L.cell * 0.55 || Math.abs(y - dragCell.y) > L.cell * 0.55;
    if (!moved) {
      var cellPos = pxToCell(x, y);
      if (cellPos) ventClusterAt(cellPos.r, cellPos.c);
    }
  }
  dragCell = null;
}

// save throttling (never per-frame)
var _saveQueued = false;
function saveRunSoon() { _saveQueued = true; }
function flushSave() { if (_saveQueued) { _saveQueued = false; try { GF.saveRun(); } catch (e) {} } }
setInterval(flushSave, 1200);

// ── BOT CONTRACT (progression probe #276) ───────────────────────────────────
function botActions() {
  if (gs === 'GAMEOVER') return [];
  if (gs === 'SHIFTCLEAR') return ['advance'];
  if (gs !== 'PLAYING') return ['start'];
  var cls = listClusters();
  var acts = [];
  for (var i = 0; i < cls.length; i++) acts.push('vent_' + cls[i][0][0] + '_' + cls[i][0][1]);
  if (!acts.length) acts.push('wait');
  return acts;
}
function botAct(a) {
  if (a === 'start') { startGame(); return; }
  if (a === 'advance') { if (gs === 'SHIFTCLEAR') nextShift(); return; }
  if (a === 'wait') return;
  if (a && a.indexOf('vent_') === 0) {
    var parts = a.split('_'); var r = parseInt(parts[1], 10), c = parseInt(parts[2], 10);
    if (coachOn) { coachStep = 3; coachOn = false; }
    ventClusterAt(r, c);
  }
}

// ── BOOT ─────────────────────────────────────────────────────────────────
GF.init({
  designW: 393,
  designH: 852,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'critical_mass',
  onReady: function () {
    try { bestScore = parseInt(localStorage.getItem('critical_mass_best') || '0') || 0; } catch (e) {}
    try { bestShift = parseInt(localStorage.getItem('critical_mass_bestshift') || '0') || 0; } catch (e) {}
    try { seenTut = !!localStorage.getItem('critical_mass_seen_tutorial'); } catch (e) {}
    layout();

    GF.persist('critical_mass_run_v1',
      function () {
        return {
          bestScore: bestScore, bestShift: bestShift, seenTut: seenTut,
          run: (gs === 'PLAYING' || gs === 'SHIFTCLEAR' || gs === 'PAUSED') ? {
            shift: shift, power: power, quota: quota, score: score, heat: heat,
            spawnInterval: spawnInterval, colorCount: colorCount,
            grid: grid, gs: (gs === 'PAUSED' ? pausedFrom : gs),
          } : null,
        };
      },
      function (s) {
        if (!s) return;
        bestScore = Math.max(bestScore, s.bestScore | 0);
        bestShift = Math.max(bestShift, s.bestShift | 0);
        if (s.seenTut) seenTut = true;
        _resume = s.run || null;
      }
    );

    // reactor tension fits the 'tense' preset
    GF.bgMusic({ file: 'audio/bg_track.mp3', preset: 'tense', muted: GF.muted });

    GF.exposeState(function () {
      return {
        gs: gs, shift: shift, power: Math.round(power), quota: quota,
        score: score, bestScore: bestScore, bestShift: bestShift,
        heat: Math.round(heat * 10) / 10, heatRate: Math.round(heatRate() * 100) / 100,
        cells: countCells(), clusters: listClusters().length,
        colorCount: colorCount, spawnInterval: Math.round(spawnInterval),
        coachOn: coachOn, coachStep: coachStep, seenTut: seenTut, helpOpen: helpOpen,
        HEAT_MAX: HEAT_MAX, QUOTA_BASE: QUOTA_BASE, QUOTA_STEP: QUOTA_STEP,
        MIN_CLUSTER: MIN_CLUSTER, SPAWN_BASE_MS: SPAWN_BASE_MS, SPAWN_MIN_MS: SPAWN_MIN_MS,
        HEAT_PER_CELL: HEAT_PER_CELL, VOLATILE_HEAT_MULT: VOLATILE_HEAT_MULT,
        VENT_POWER_BASE: VENT_POWER_BASE, VENT_POWER_PER_EXTRA: VENT_POWER_PER_EXTRA,
        COOLANT_DUMP: COOLANT_DUMP, SHIFT_COOL: SHIFT_COOL,
        COLS: COLS, ROWS: ROWS, SCRIPTED_SHIFTS: SCRIPTED_SHIFTS,
      };
    });
    GF.exposeBot(botActions, botAct);
    GF.exposeReach(function () {
      var items = [], H = GF.H;
      if (gs === 'PLAYING' || gs === 'SHIFTCLEAR' || gs === 'PAUSED') {
        items.push({ id: 'sys_mute', x: L.btnMute.x - L.btnMute.r, y: L.btnMute.y - L.btnMute.r, w: L.btnMute.r * 2, h: L.btnMute.r * 2, pinned: true });
        items.push({ id: 'sys_help', x: L.btnHelp.x - L.btnHelp.r, y: L.btnHelp.y - L.btnHelp.r, w: L.btnHelp.r * 2, h: L.btnHelp.r * 2, pinned: true });
        items.push({ id: 'sys_pause', x: L.btnPause.x - L.btnPause.r, y: L.btnPause.y - L.btnPause.r, w: L.btnPause.r * 2, h: L.btnPause.r * 2, pinned: true });
      }
      return { screen: helpOpen ? 'HELP' : gs, items: items, viewportH: H, scrollMaxY: 0, screenH: H };
    });
    GF.exposeTour([
      { name: 'playing', go: function () { window._setupForScreenshot(4); } },
      { name: 'late', go: function () { window._setupForScreenshot(6); } },
      { name: 'gameover', go: function () { gs = 'GAMEOVER'; } },
      { name: 'menu', go: function () { gs = 'MENU'; } },
    ]);

    if (window.__GF_AUTOSTART && !window._silent) { startGame(); }
    else { tryResume(); }
  },
  onUpdate: update,
  onDraw: draw,
});

function countCells() { var n = 0; for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) if (grid[r][c]) n++; return n; }

function tryResume() {
  if (_resume && _resume.grid && (_resume.shift | 0) >= 1) {
    shift = _resume.shift | 0; power = _resume.power || 0; quota = _resume.quota || QUOTA_BASE;
    score = _resume.score | 0; heat = _resume.heat || 0;
    spawnInterval = _resume.spawnInterval || SPAWN_BASE_MS; colorCount = _resume.colorCount || 3;
    grid = _resume.grid; gs = (_resume.gs === 'SHIFTCLEAR') ? 'PLAYING' : (_resume.gs || 'PLAYING');
    seenTut = true;
    if (countCells() === 0) seedBoard(4);
    ensureSolvable();
  }
}

// ── canvas input listeners ──
GF.canvas.addEventListener('mousedown', function (e) { e.preventDefault(); var p = evtPos(e); onDown(p.x, p.y); });
GF.canvas.addEventListener('mousemove', function (e) { if (!dragCell) return; var p = evtPos(e); onMove(p.x, p.y); });
GF.canvas.addEventListener('mouseup', function (e) { var p = evtPos(e); onUp(p.x, p.y); });
GF.canvas.addEventListener('touchstart', function (e) { e.preventDefault(); var p = evtPos(e); onDown(p.x, p.y); }, { passive: false });
GF.canvas.addEventListener('touchmove', function (e) { e.preventDefault(); var p = evtPos(e); onMove(p.x, p.y); }, { passive: false });
GF.canvas.addEventListener('touchend', function (e) { e.preventDefault(); var p = evtPos(e); onUp(p.x, p.y); }, { passive: false });

document.addEventListener('keydown', function (e) {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (gs === 'MENU') startGame();
    else if (gs === 'GAMEOVER') startGame();
    else if (gs === 'PAUSED') gs = pausedFrom;
  } else if (e.code === 'KeyP') {
    if (gs === 'PLAYING') { pausedFrom = 'PLAYING'; gs = 'PAUSED'; } else if (gs === 'PAUSED') gs = pausedFrom;
  } else if (e.code === 'KeyH') { helpOpen = !helpOpen; }
  else if (e.code === 'KeyM') { GF.toggleMute(); GF.setMusicMuted(GF.muted); }
});

window.addEventListener('resize', function () { layout(); });
window.addEventListener('orientationchange', function () { setTimeout(layout, 80); });
window.addEventListener('beforeunload', function () { try { GF.saveRun && GF.saveRun(); } catch (e) {} });
window.addEventListener('pagehide', function () { try { GF.saveRun && GF.saveRun(); } catch (e) {} });
document.addEventListener('visibilitychange', function () { if (document.hidden) { try { GF.saveRun && GF.saveRun(); } catch (e) {} } });

// ── SCREENSHOT ESCAPE HATCH (>=70% gameplay; populated mid-shift, meters lit) ──
window._setupForScreenshot = function (sh) {
  window._silent = true;
  try { localStorage.setItem('critical_mass_seen_tutorial', '1'); } catch (e) {}
  seenTut = true; coachOn = false; helpOpen = false;
  shift = (typeof sh === 'number' && sh > 0) ? sh : 4;
  bestShift = Math.max(bestShift, shift);
  quota = QUOTA_BASE + (shift - 1) * QUOTA_STEP;
  colorCount = Math.min(FUEL_COLS.length, 3 + Math.floor((shift - 1) / 2));
  spawnInterval = Math.max(SPAWN_MIN_MS, SPAWN_BASE_MS - (shift - 1) * 170);
  power = Math.round(quota * 0.55);
  score = 120 + shift * 60;
  heat = HEAT_MAX * 0.66;
  emptyGrid();
  for (var r = 2; r < ROWS; r++) for (var c = 0; c < COLS; c++) grid[r][c] = { t: T_FUEL, c: (Math.random() * colorCount) | 0 };
  for (var cc = 0; cc < 3; cc++) grid[ROWS - 1][cc] = { t: T_FUEL, c: 0 };
  for (var cc2 = 3; cc2 < 6; cc2++) grid[ROWS - 1][cc2] = { t: T_FUEL, c: 1 };
  for (var cc3 = 0; cc3 < 3; cc3++) grid[ROWS - 2][cc3] = { t: T_FUEL, c: 2 };
  if (shift >= 2) { grid[ROWS - 4][1] = { t: T_INERT, c: -1 }; grid[ROWS - 5][4] = { t: T_INERT, c: -1 }; }
  if (shift >= 3) { grid[ROWS - 3][2] = { t: T_VOLATILE, c: 0 }; grid[ROWS - 6][3] = { t: T_VOLATILE, c: 2 }; }
  if (shift >= 4) { grid[ROWS - 3][5] = { t: T_COOLANT, c: -1 }; grid[ROWS - 4][4] = { t: T_COOLANT, c: -1 }; grid[ROWS - 4][3] = { t: T_COOLANT, c: -1 }; }
  if (shift >= 5) { grid[ROWS - 5][2] = { t: T_CHAIN, c: 1 }; }
  if (shift >= 6) { grid[ROWS - 6][0] = { t: T_ROD, c: 3, rod: 0.42, rodMax: rodTime() }; }
  applyGravity();
  for (var i = 0; i < 10; i++) GF.spawnParticles(L.gx + Math.random() * L.gridW, L.gy + L.gridH * (0.4 + Math.random() * 0.5), FUEL_COLS[i % FUEL_COLS.length].base, 1);
  ventFlash = 0.5; heatPulse = 0.6;
  gs = 'PLAYING';
  window._screenshotFreeze = true;
  window._silent = false;
};

window._jumpLevel = function (n) {
  window._silent = true;
  if ((n | 0) >= 99) {
    if (gs === 'MENU' || gs === 'GAMEOVER') startGame();
    heat = HEAT_MAX; gameOver();
  } else {
    seenTut = true; coachOn = false;
    window._setupForScreenshot(Math.max(1, n | 0));
  }
  window._silent = false;
};
window._smInfo = function () { try { return window.__gfState(); } catch (e) { return null; } };

})();
</script>
