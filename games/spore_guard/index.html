<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Spore Guard</title>
    <!-- Yandex Games SDK (synchronous, per docs) -->
    <script src="/sdk.js"></script>
    <!-- Space Grotesk self-hosted (no external Google Fonts dependency) -->
    <script type="module" crossorigin src="./assets/index-ZgoCEFQc.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-vPQeujST.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Prevent browser scroll/pull-to-refresh except inside explicitly scrollable UI panels.
      const isAllowedScrollTarget = (target) =>
        target instanceof Element && !!target.closest('.allow-scroll');

      document.addEventListener('touchmove', function(e) {
        if (isAllowedScrollTarget(e.target)) return;
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('wheel', function(e) {
        if (isAllowedScrollTarget(e.target)) return;
        e.preventDefault();
      }, { passive: false });
      // Force scroll position to top if browser scrolls (moderator requirement)
      window.addEventListener('scroll', function(event) { window.scrollTo(0, 0); event.preventDefault(); }, false);
    </script>
  </body>
</html>
