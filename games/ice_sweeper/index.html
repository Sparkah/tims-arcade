// ── UTILS ───────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ── iter#4: DAILY SEED — same lake layout for every player today ────────────
// Mulberry32 deterministic PRNG seeded from YYYYMMDD ^ level so the dirty-tile
// pattern, wobble phases, and crack-pattern choices are identical for every
// player on the same calendar day. Chasing the same lake creates the
// "race-the-day" hook: come back tomorrow for a fresh layout.
function makeRng(seed) {
  var s = seed | 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    var t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function getDaySeed() {
  var d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}
function getDayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
var levelRng = Math.random; // re-bound per startLevel from daily seed ^ level

// ── CONSTANTS ───────────────────────────────────────────────────────────────
var HUD_H = 56;
var COLS_BASE = 8, ROWS_BASE = 11;
var CRACK_MAX = 3; // 0=clean dirty ice, 1=cracked, 2=chunked, 3=collected
var SHIP_SPEED_BASE = 5.0;
// iter#9: THICK ICE — ~20% of dirty tiles are thick and take CRACK_MAX+2 (5) hits.
// They show a distinct bright-blue surface + bolder cracks.  Clearing one pays +20 bonus pts.
var THICK_CRACK_MAX = 5;
var THICK_ICE_CHANCE = 0.20;
var THICK_ICE_BONUS = 20;

// iter#12: FROZEN ICE — 3rd breakable tier. ~8% of dirty tiles (non-overlapping
// with thick) are FROZEN SOLID. Requires 7 hits (FROZEN_CRACK_MAX). Deep violet
// glow, snowflake + X cross markings. On clear: +40 pts bonus AND +2 shards
// deposited directly into the meta-currency pool (reward for the hardest tiles).
// Compounds with all existing systems: chain multiplier applies, neighbour
// crack-boost is tileMax-aware, sound crack events scale.
var FROZEN_CRACK_MAX  = 7;
var FROZEN_ICE_CHANCE = 0.08;   // % of dirty tiles after thick allocation
var FROZEN_ICE_BONUS  = 40;
var FROZEN_SHARD_DROP = 2;      // extra shards granted to meta on clear

// iter#10: POWER-UP DROPS — ~8% of dirty tiles are "boost tiles" marked with
// a golden lightning icon. When cleared they drop a BOOST pickup that floats
// on the cleared tile position for 5s. Driving the ship over it collects it:
// grants +5s time and a 3s speed burst (1.7× normal speed). Only one boost
// active at a time (extras accumulate but never more than MAX_PICKUPS).
// Compounds with thick ice (thick tiles can also be boost tiles) and chain
// system (speed burst helps rack up chains during the window).
var BOOST_TILE_CHANCE  = 0.08;
var BOOST_TIME_ADD     = 5;       // seconds granted
var BOOST_SPEED_MULT   = 1.7;     // ship speed multiplier during boost
var BOOST_SPEED_DUR    = 3.0;     // seconds the speed boost lasts
var BOOST_PICKUP_LIFE  = 5.0;     // seconds pickup floats before expiry
var MAX_PICKUPS        = 4;       // max simultaneous pickups on grid

var shake = 0;

var pickups = [];

// iter#7: ACHIEVEMENTS — five persistent milestones with on-screen toast
// when first unlocked. Persisted as bitmask under 'ice_achievements'.
// Compounds with iter#1 (best), iter#3 (palette unlocks), iter#5 (chain
// tiers), iter#6 (best chain): each axis already encourages exploration;
// achievements layer concrete named goals over the top, so the player
// sees discrete unlock moments rather than a sea of numbers.
var ACHIEVEMENTS = [
  { id: 'first',    bit: 1,  icon: '🧹', nameKey: 'ach_first',    cond: function(ev){ return ev.firstClear === true; } },
  { id: 'combo',    bit: 2,  icon: '🔥', nameKey: 'ach_combo',    cond: function(ev){ return ev.chainHit >= 5; } },
  { id: 'inferno',  bit: 4,  icon: '☄️', nameKey: 'ach_inferno',  cond: function(ev){ return ev.chainHit >= 10; } },
  { id: 'score500', bit: 8,  icon: '🏆', nameKey: 'ach_score500', cond: function(ev){ return ev.score >= 500; } },
  { id: 'score1500',bit: 16, icon: '👑', nameKey: 'ach_score1500',cond: function(ev){ return ev.score >= 1500; } },
];
var achMask = 0;
var achToast = null; // { ach, life, pulse } — active unlock toast (top-of-screen)
function loadAchievements() {
  try { achMask = parseInt(localStorage.getItem('ice_achievements')||'0')||0; } catch(e) { achMask = 0; }
}
function saveAchievements() {
  try { localStorage.setItem('ice_achievements', String(achMask)); } catch(e) {}
}
function isAchUnlocked(a) { return (achMask & a.bit) !== 0; }
function fireAchievementToast(a) {
  achToast = { ach: a, life: 2.5, pulse: 0 };
}
// Call sites: tile-clear (firstClear + chainHit), level-clear (score), gameover (score)
function checkAchievements(ev) {
  for (var i = 0; i < ACHIEVEMENTS.length; i++) {
    var a = ACHIEVEMENTS[i];
    if (isAchUnlocked(a)) continue;
    if (a.cond(ev)) {
      achMask |= a.bit;
      saveAchievements();
      fireAchievementToast(a);
      SFX.achievement();
    }
  }
}

// iter#8: SFX — synthesized WebAudio sound design (no external assets).
// All sounds are short envelope-shaped oscillator blips so the bundle stays
// zero-asset. AudioContext is created lazily on first user gesture (Chrome
// autoplay policy). 'M' key (or sfxMute button on MENU/GAMEOVER) toggles a
// persistent mute, stored in 'ice_sfx_mute' localStorage. crack is throttled
// (≥70ms between plays) so contact-spam doesn't blow out the mixer.
var SFX = (function() {
  var ctx = null;
  var muted = false;
  try { muted = localStorage.getItem('ice_sfx_mute') === '1'; } catch(e) {}
  var lastCrack = 0;
  function ensureCtx() {
    if (ctx) return ctx;
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();
    } catch(e) { ctx = null; }
    return ctx;
  }
  function blip(freq, dur, type, gain, slide) {
    if (muted) return;
    var c = ensureCtx(); if (!c) return;
    try {
      if (c.state === 'suspended') c.resume();
      var t = c.currentTime;
      var osc = c.createOscillator();
      var g = c.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, t);
      if (slide) osc.frequency.linearRampToValueAtTime(slide, t + dur);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(Math.max(0.0001, gain || 0.18), t + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(g); g.connect(c.destination);
      osc.start(t); osc.stop(t + dur + 0.02);
    } catch(e) {}
  }
  function noise(dur, gain, hp) {
    if (muted) return;
    var c = ensureCtx(); if (!c) return;
    try {
      if (c.state === 'suspended') c.resume();
      var t = c.currentTime;
      var n = Math.max(1, Math.floor(c.sampleRate * dur));
      var buf = c.createBuffer(1, n, c.sampleRate);
      var data = buf.getChannelData(0);
      for (var i = 0; i < n; i++) data[i] = (Math.random()*2-1) * (1 - i/n);
      var src = c.createBufferSource(); src.buffer = buf;
      var g = c.createGain(); g.gain.value = gain || 0.12;
      if (hp) {
        var f = c.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
        src.connect(f); f.connect(g);
      } else { src.connect(g); }
      g.connect(c.destination);
      src.start(t);
    } catch(e) {}
  }
  function chord(freqs, dur, type, gain) {
    for (var i = 0; i < freqs.length; i++) blip(freqs[i], dur, type, (gain||0.14) / Math.max(1, freqs.length*0.7));
  }
  return {
    isMuted: function() { return muted; },
    toggleMute: function() {
      muted = !muted;
      try { localStorage.setItem('ice_sfx_mute', muted ? '1' : '0'); } catch(e) {}
      if (!muted) blip(660, 0.08, 'square', 0.14);
      return muted;
    },
    crack: function() {
      var now = performance.now();
      if (now - lastCrack < 70) return; lastCrack = now;
      noise(0.06, 0.08, 1800);
    },
    pop: function(chainN) {
      var base = 520 + Math.min(12, (chainN||1)) * 40;
      blip(base, 0.11, 'triangle', 0.18, base * 1.35);
    },
    chainTier: function(tier) {
      // tier 1: HOT (C-E-G), 2: BLAZE (E-G-B), 3: INFERNO (G-B-D + low rumble)
      if (tier === 1) chord([523, 659, 784], 0.22, 'triangle', 0.16);
      else if (tier === 2) { chord([659, 784, 988], 0.28, 'sawtooth', 0.14); noise(0.12, 0.06, 600); }
      else { chord([784, 988, 1175, 1568], 0.36, 'sawtooth', 0.14); noise(0.22, 0.10, 200); }
    },
    achievement: function() {
      // ascending arpeggio
      blip(523, 0.11, 'triangle', 0.18);
      setTimeout(function(){ blip(659, 0.11, 'triangle', 0.18); }, 90);
      setTimeout(function(){ blip(784, 0.11, 'triangle', 0.18); }, 180);
      setTimeout(function(){ blip(1047, 0.22, 'triangle', 0.20); }, 270);
    },
    newBest: function() {
      blip(880, 0.14, 'square', 0.16, 1320);
      setTimeout(function(){ blip(1320, 0.20, 'square', 0.16, 1760); }, 130);
    },
    levelEnd: function() {
      blip(523, 0.10, 'triangle', 0.18);
      setTimeout(function(){ blip(659, 0.10, 'triangle', 0.18); }, 90);
      setTimeout(function(){ blip(784, 0.18, 'triangle', 0.20); }, 180);
    },
    gameOver: function() {
      blip(330, 0.18, 'sawtooth', 0.16, 220);
      setTimeout(function(){ blip(220, 0.30, 'sawtooth', 0.16, 110); }, 160);
    },
    ui: function() { blip(880, 0.05, 'square', 0.10); },
    extraTime: function() {
      blip(659, 0.10, 'triangle', 0.18);
      setTimeout(function(){ blip(988, 0.16, 'triangle', 0.20); }, 90);
    },
    // iter#10: boost collected — bright electric zap
    boostCollect: function() {
      blip(1047, 0.06, 'square', 0.18);
      setTimeout(function(){ blip(1319, 0.06, 'square', 0.18); }, 50);
      setTimeout(function(){ blip(1760, 0.14, 'square', 0.22, 2200); }, 100);
      noise(0.08, 0.07, 1200);
    }
  };
})();

// prevents re-firing the same tier multiple times within a single chain run.
var chainTierShown = 0;          // 0 = none, 1 = HOT (x3), 2 = BLAZE (x5), 3 = INFERNO (x10)
var chainBannerText = '';
var chainBannerColor = '#FFD700';
var chainBannerLife = 0;
var chainBannerPulse = 0;

// iter#3: cosmetic HULL palette unlocks tied to BEST score thresholds.
// Player selects unlocked palette on MENU; selection persists; default is free.
var HULL_PALETTES = [
  { id: 'classic', name: 'hullClassic', unlockAt: 0,    body:'#e74c3c', stripe:'#c0392b', bow:'#bdc3c7' },
  { id: 'arctic',  name: 'hullArctic',  unlockAt: 300,  body:'#ecf0f1', stripe:'#3498db', bow:'#9bd8ff' },
  { id: 'sunset',  name: 'hullSunset',  unlockAt: 1000, body:'#f39c12', stripe:'#d35400', bow:'#ffd27f' },
];
var hullIdx = 0;
function isHullUnlocked(p) { return best >= p.unlockAt; }
function loadHullChoice() {
  try {
    var raw = localStorage.getItem('ice_palette');
    var n = parseInt(raw || '0');
    if (!isNaN(n) && n >= 0 && n < HULL_PALETTES.length && isHullUnlocked(HULL_PALETTES[n])) {
      hullIdx = n;
    } else {
      hullIdx = 0;
    }
  } catch(e) { hullIdx = 0; }
}
function selectHull(n) {
  if (n < 0 || n >= HULL_PALETTES.length) return;
  if (!isHullUnlocked(HULL_PALETTES[n])) return;
  hullIdx = n;
  try { localStorage.setItem('ice_palette', String(n)); } catch(e) {}
}

// ── iter#11: META-UPGRADES — persistent shard currency + 3 purchasable buffs ─
// Players earn shards each run: floor(score / 100), credited on GAMEOVER.
// Three upgrades, each with a max level; purchased on the MENU between runs.
// Persisted in localStorage: 'ice_shards' (integer) + 'ice_upgrades' (JSON).
//
// Upgrade defs:  id | name key | desc key | cost per lvl | max lvl | effect
//   upg_time:  +5s base time per level purchased (max 3 = +15s extra)
//   upg_thick: +50% thick-ice bonus per level (max 2 = THICK_ICE_BONUS * 2)
//   upg_speed: +8% ship speed per level (max 2 = +16%)
var META_UPGRADES = [
  { id:'upg_time',  nameKey:'upg_time',  descKey:'upg_time_desc',  cost:10, maxLvl:3 },
  { id:'upg_thick', nameKey:'upg_thick', descKey:'upg_thick_desc', cost:15, maxLvl:2 },
  { id:'upg_speed', nameKey:'upg_speed', descKey:'upg_speed_desc', cost:20, maxLvl:2 },
];
var metaShards = 0;
var metaUpgLvls = [0, 0, 0];  // parallel to META_UPGRADES

function loadMeta() {
  try { metaShards = Math.max(0, parseInt(localStorage.getItem('ice_shards') || '0') || 0); } catch(e) {}
  try {
    var raw = JSON.parse(localStorage.getItem('ice_upgrades') || '[]');
    if (Array.isArray(raw)) {
      for (var i = 0; i < META_UPGRADES.length; i++) {
        metaUpgLvls[i] = Math.min(META_UPGRADES[i].maxLvl, Math.max(0, parseInt(raw[i] || 0) || 0));
      }
    }
  } catch(e) {}
}
function saveMeta() {
  try { localStorage.setItem('ice_shards', String(metaShards)); } catch(e) {}
  try { localStorage.setItem('ice_upgrades', JSON.stringify(metaUpgLvls)); } catch(e) {}
}
function purchaseUpgrade(i) {
  var upg = META_UPGRADES[i];
  if (!upg) return;
  if (metaUpgLvls[i] >= upg.maxLvl) return;
  if (metaShards < upg.cost) return;
  metaShards -= upg.cost;
  metaUpgLvls[i]++;
  saveMeta();
  SFX.achievement();
}
// Computed effective values (applied in startLevel / game constants)
function metaExtraTime()  { return metaUpgLvls[0] * 5; }           // seconds
function metaThickMult()  { return 1 + metaUpgLvls[1] * 0.50; }   // multiplier on THICK_ICE_BONUS
function metaSpeedMult()  { return 1 + metaUpgLvls[2] * 0.08; }   // multiplier on SHIP_SPEED_BASE
// Credit shards earned this run (called at GAMEOVER before rendering)
function creditShardsForRun(runScore) {
  var earned = Math.max(0, Math.floor(runScore / 100));
  if (earned > 0) { metaShards += earned; saveMeta(); }
  return earned;
}

var touch = { active: false, dx: 0, dy: 0, sx: 0, sy: 0, id: null };

// ── LEVEL SETUP ─────────────────────────────────────────────────────────────
function gridArea() {
  var pad = 14 * S;
  var top = (HUD_H + 6) * S;
  return { x: pad, y: top, w: W - pad*2, h: H - top - pad };
}

function startLevel(lvl) {
  level = lvl;
  particles = []; floats = []; buttons = [];
  chain = 0; chainTimer = 0; shake = 0;
  chainTierShown = 0; chainBannerLife = 0;
  cleared = 0;
  newBestThisRun = false; newBestPulse = 0;
  newChainBestThisRun = false;
  // iter#11: reset shard-credit flag each run (level 1 resets on PLAY; subsequent
  // levels share the run so only reset on level 1 to avoid multi-crediting)
  if (lvl === 1) {
    shardsGrantedThisRun = false;
    // iter#13: reset per-run stats on new run start (level 1)
    frozenClearedRun = 0;
    thickClearedRun = 0;
    peakChainRun = 0;
    // iter#14: reset perfect-clear counter on new run
    perfectLevelsRun = 0;
  }
  // iter#14: reset banner on each level start
  perfectBannerLife = 0;
  // iter#10: reset pickups and active speed boost each level
  pickups = [];
  speedBoostTimer = 0;
  // iter#1: reset the rewarded-ad slot each level
  extraTimeUsed = false; extraTimeLoading = false;
  // iter#11: meta upgrade — upg_time adds extra start seconds
  timeLeft = Math.max(45, 100 - (lvl - 1) * 7) + metaExtraTime();

  // grid grows with level — adapt aspect ratio to viewport so the playfield fills the screen
  var ar = gridArea();
  var aspect = ar.w / ar.h;
  var baseCols, baseRows;
  if (aspect > 1.3) {
    // landscape — wide grid
    baseCols = 16; baseRows = 9;
  } else if (aspect < 0.75) {
    // portrait — tall grid
    baseCols = 8;  baseRows = 13;
  } else {
    // squarish
    baseCols = 11; baseRows = 11;
  }
  COLS = baseCols + Math.min(4, Math.floor((lvl-1)/2));
  ROWS = baseRows + Math.min(3, Math.floor((lvl-1)/3));

  // size tiles to fill the area, then re-derive cols/rows so we don't leave bars
  var tw = ar.w / COLS, th = ar.h / ROWS;
  TILE = Math.min(tw, th);
  // expand the smaller dimension to use more space
  if (tw < th) {
    ROWS = Math.floor(ar.h / TILE);
  } else {
    COLS = Math.floor(ar.w / TILE);
  }

  // tile dirty density grows with level
  var dirtyChance = clamp(0.55 + (lvl - 1) * 0.06, 0.55, 0.92);

  // iter#4: seed the level RNG from today's date ^ level so every player
  // races the SAME lake on the same calendar day. Layout, wobble phases,
  // and crack patterns are now deterministic per day.
  levelRng = makeRng((getDaySeed() ^ (lvl * 2654435761)) | 0);

  grid = [];
  totalDirty = 0;
  for (var r = 0; r < ROWS; r++) {
    var row = [];
    for (var c = 0; c < COLS; c++) {
      var dirty = levelRng() < dirtyChance;
      // iter#9: thick ice tiles take THICK_CRACK_MAX hits; ~20% of dirty tiles
      var thick = dirty && (levelRng() < THICK_ICE_CHANCE);
      // iter#12: frozen ice — 3rd tier, only on tiles that are NOT already thick
      var frozen = dirty && !thick && (levelRng() < FROZEN_ICE_CHANCE);
      // iter#10: boost tile — ~8% of dirty tiles drop a speed-boost pickup when cleared
      var boost = dirty && (levelRng() < BOOST_TILE_CHANCE);
      var tile = {
        state: dirty ? 0 : -1,  // -1 = clean from start
        wobble: levelRng() * Math.PI * 2,
        crackPattern: Math.floor(levelRng() * 3),
        chunkParts: [],
        thick: thick,           // iter#9: extra-hard tile flag
        frozen: frozen,         // iter#12: ultra-hard 3rd tier (7 hits)
        boost: boost,           // iter#10: drops speed-boost pickup on clear
      };
      if (dirty) totalDirty++;
      row.push(tile);
    }
    grid.push(row);
  }

  // place ship in middle
  var gx = ar.x + (ar.w - COLS*TILE)/2;
  var gy = ar.y + (ar.h - ROWS*TILE)/2;
  ship.x = gx + (COLS/2) * TILE;
  ship.y = gy + (ROWS/2) * TILE;
  ship.vx = 0; ship.vy = 0; ship.angle = 0;

  gs = 'PLAYING';
}

window._jumpLevel = function(n) {
  // n=99 = harness "drop me into GAMEOVER" (yandex-testing adapter compat).
  if (n === 99) { gs = 'GAMEOVER'; timeLeft = 0; return; }
  score = 0;
  startLevel(n);
};

// Expose game state for the post-build-tester / yandex-testing harness.
window.__gfState = function () {
  try {
    return {
      gs: gs,
      level: level,
      score: score,
      best: best,
      timeLeft: timeLeft,
      chain: (typeof chain !== 'undefined') ? chain : 0,
      bestChain: bestChain,
      chainTier: chainTierShown,
      hullIdx: hullIdx,
      hullsUnlocked: HULL_PALETTES.filter(isHullUnlocked).length,
      achMask: achMask,
      achUnlocked: ACHIEVEMENTS.filter(isAchUnlocked).length,
      daySeed: getDaySeed(),
      dayKey: getDayKey(),
      sfxMuted: SFX.isMuted(),
      thickTiles: (function(){ var n=0; for(var r=0;r<(grid||[]).length;r++) for(var c=0;c<(grid[r]||[]).length;c++) if(grid[r][c].thick) n++; return n; })(),
      frozenTiles: (function(){ var n=0; for(var r=0;r<(grid||[]).length;r++) for(var c=0;c<(grid[r]||[]).length;c++) if(grid[r][c].frozen) n++; return n; })(),
      boostTiles: (function(){ var n=0; for(var r=0;r<(grid||[]).length;r++) for(var c=0;c<(grid[r]||[]).length;c++) if(grid[r][c].boost) n++; return n; })(),
      speedBoostTimer: speedBoostTimer,
      pickupsOnGrid: pickups.length,
      metaShards: metaShards,
      metaUpgLvls: metaUpgLvls.slice(),
      frozenClearedRun: frozenClearedRun,
      thickClearedRun: thickClearedRun,
      peakChainRun: peakChainRun,
      perfectLevelsRun: perfectLevelsRun,
    };

};

// ── iter#1: Yandex ads (rewarded "Extra Time" + throttled interstitial) ─────
// All triggers are user-click only (Yandex 4.4); interstitial throttled to
// ≥3min between fullscreen ads (Yandex 4.1). When the SDK isn't present
// (gallery preview / local dev) helpers no-op for interstitial and grant
// the revive immediately for rewarded — keeps the feature exercisable.
var INTERSTITIAL_GAP_MS = 3 * 60 * 1000;
var lastInterstitialMs = -INTERSTITIAL_GAP_MS;
var extraTimeUsed = false;     // one "+15s" revive per level
var extraTimeLoading = false;  // disables button during ad load
var EXTRA_TIME_SEC = 15;

function showInterstitial(onDone) {
  var now = performance.now();
  if (now - lastInterstitialMs < INTERSTITIAL_GAP_MS) { onDone && onDone(); return; }
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showFullscreenAdv) { onDone && onDone(); return; }
  lastInterstitialMs = now;
  try {
    window.ysdk.adv.showFullscreenAdv({
      callbacks: { onClose: function(){ onDone && onDone(); }, onError: function(){ onDone && onDone(); } },
    });
  } catch(e) { onDone && onDone(); }
}
function showRewardedExtraTime() {
  if (extraTimeUsed || extraTimeLoading) return;
  extraTimeLoading = true;
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showRewardedVideo) {
    extraTimeLoading = false; grantExtraTime(); return;
  }
  var rewarded = false;
  try {
    window.ysdk.adv.showRewardedVideo({
      callbacks: {
        onRewarded: function() { rewarded = true; },
        onClose:    function() { extraTimeLoading = false; if (rewarded) grantExtraTime(); },
        onError:    function() { extraTimeLoading = false; },
      },
    });
  } catch(e) { extraTimeLoading = false; }
}
function grantExtraTime() {
  extraTimeUsed = true;
  timeLeft = EXTRA_TIME_SEC;
  gs = 'PLAYING';
  SFX.extraTime();
}

// ── GRID HELPERS ────────────────────────────────────────────────────────────
function gridOrigin() {
  var ar = gridArea();
  return {
    x: ar.x + (ar.w - COLS*TILE)/2,
    y: ar.y + (ar.h - ROWS*TILE)/2,
  };
}

function tileAt(x, y) {
  var o = gridOrigin();
  var c = Math.floor((x - o.x) / TILE);
  var r = Math.floor((y - o.y) / TILE);
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return null;
  return { c: c, r: r, tile: grid[r][c] };
}

function spawnChunkParts(o, c, r) {
  var t = grid[r][c];
  if (t.chunkParts.length) return;
  var px = o.x + c*TILE + TILE/2, py = o.y + r*TILE + TILE/2;
  for (var i = 0; i < 6; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = (1.5 + Math.random()*2.5) * S;
    t.chunkParts.push({ x: px, y: py, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 0.9, r: (TILE*0.18) });
  }
}

function spawnParticles(x, y, color, n) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = (1.5 + Math.random() * 3.5) * S;
    particles.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      r:(2 + Math.random()*4)*S, color:color, life:1 });
  }
}
function spawnFloat(x, y, txt, col) {
  floats.push({ x:x, y:y, txt:txt, col:col||'#fff', life:1.3, vy:-2*S });
}

// ── UPDATE ──────────────────────────────────────────────────────────────────
var lastTs = 0;
function update(dt) {
  // iter#7: tick achievement toast life in every state (so toasts fired at
  // GAMEOVER/LEVELEND still animate + decay even though physics is paused).
  if (achToast && achToast.life > 0) { achToast.life -= dt; achToast.pulse += dt * 6; if (achToast.life <= 0) achToast = null; }

  if (gs !== 'PLAYING') return;

  timeLeft -= dt;
  if (timeLeft <= 0) { timeLeft = 0; gs = 'GAMEOVER'; SFX.gameOver(); checkAchievements({ score: score }); try{parent.postMessage({type:'gf:gameEnded'},'*')}catch(_){}; return; }

  if (chainTimer > 0) { chainTimer -= dt; if (chainTimer <= 0) { chain = 0; chainTierShown = 0; } }
  if (chainBannerLife > 0) { chainBannerLife -= dt; chainBannerPulse += dt * 8; }
  // iter#14: tick perfect-lake banner
  if (perfectBannerLife > 0) { perfectBannerLife -= dt; perfectBannerPulse += dt * 7; }
  if (shake > 0) shake = Math.max(0, shake - dt * 8);
  // iter#10: tick speed-boost window
  if (speedBoostTimer > 0) speedBoostTimer = Math.max(0, speedBoostTimer - dt);
  // iter#10: animate pickups + check ship collection
  for (var pi = pickups.length - 1; pi >= 0; pi--) {
    var pk = pickups[pi];
    pk.life -= dt;
    pk.angle += dt * 3.5;
    if (pk.life <= 0) { pickups.splice(pi, 1); continue; }
    // collection radius ~= TILE * 0.55
    var dxp = ship.x - pk.x, dyp = ship.y - pk.y;
    if (dxp*dxp + dyp*dyp < (TILE * 0.55) * (TILE * 0.55)) {
      pickups.splice(pi, 1);
      // grant time bonus + speed burst
      timeLeft = Math.min(timeLeft + BOOST_TIME_ADD, 120);
      speedBoostTimer = BOOST_SPEED_DUR;
      SFX.boostCollect();
      spawnParticles(ship.x, ship.y, '#FFD700', 14);
      spawnParticles(ship.x, ship.y, '#ffffff', 8);
      spawnFloat(ship.x, ship.y - 20*S, t('boostPickup'), '#FFD700');
      spawnFloat(ship.x, ship.y - 36*S, t('boostTime'), '#2ecc71');
      shake = Math.max(shake, 0.22);
    }
  }

  // ship movement
  var ax = 0, ay = 0;
  if (keys['ArrowLeft']  || keys['KeyA']) ax -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) ax += 1;
  if (keys['ArrowUp']    || keys['KeyW']) ay -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) ay += 1;
  if (touch.active) { ax += touch.dx; ay += touch.dy; }
  var alen = Math.sqrt(ax*ax + ay*ay);
  if (alen > 0) { ax /= alen; ay /= alen; }

  // iter#10: speed boost multiplier active while speedBoostTimer > 0
  // iter#11: meta upg_speed stacks multiplicatively
  var sp = SHIP_SPEED_BASE * S * (speedBoostTimer > 0 ? BOOST_SPEED_MULT : 1) * metaSpeedMult();
  ship.vx = (ship.vx + ax * 0.9 * S) * 0.82;
  ship.vy = (ship.vy + ay * 0.9 * S) * 0.82;
  var spd = Math.sqrt(ship.vx*ship.vx + ship.vy*ship.vy);
  if (spd > sp) { ship.vx = ship.vx/spd*sp; ship.vy = ship.vy/spd*sp; }
  if (spd > 0.1) ship.angle = Math.atan2(ship.vy, ship.vx);
  ship.x += ship.vx; ship.y += ship.vy;

  var o = gridOrigin();
  var minX = o.x + TILE*0.42, maxX = o.x + COLS*TILE - TILE*0.42;
  var minY = o.y + TILE*0.42, maxY = o.y + ROWS*TILE - TILE*0.42;
  ship.x = clamp(ship.x, minX, maxX);
  ship.y = clamp(ship.y, minY, maxY);

  // crack the tile under the ship
  var hit = tileAt(ship.x, ship.y);
  // iter#9: thick tiles use THICK_CRACK_MAX; iter#12: frozen tiles use FROZEN_CRACK_MAX
  var hitMax = hit ? (hit.tile.frozen ? FROZEN_CRACK_MAX : (hit.tile.thick ? THICK_CRACK_MAX : CRACK_MAX)) : CRACK_MAX;
  if (hit && hit.tile.state >= 0 && hit.tile.state < hitMax) {
    hit.tile.state = Math.min(hitMax, hit.tile.state + spd * 0.06);
    if (hit.tile.state >= 1 && !hit.tile._cracked1) {
      hit.tile._cracked1 = true;
      spawnParticles(o.x + hit.c*TILE + TILE/2, o.y + hit.r*TILE + TILE/2,
        hit.tile.frozen ? '#cc88ff' : (hit.tile.thick ? '#aaddff' : '#bcd5e8'), 4);
      SFX.crack();
    }
    if (hit.tile.state >= 2 && !hit.tile._cracked2) {
      hit.tile._cracked2 = true;
      spawnParticles(o.x + hit.c*TILE + TILE/2, o.y + hit.r*TILE + TILE/2,
        hit.tile.frozen ? '#dd99ff' : (hit.tile.thick ? '#ddf0ff' : '#e7f0fa'), 6);
      spawnChunkParts(o, hit.c, hit.r);
      SFX.crack();
    }
    // iter#9: thick ice mid-point crack events (state>=3 and >=4)
    if (hit.tile.thick && hit.tile.state >= 3 && !hit.tile._cracked3) {
      hit.tile._cracked3 = true;
      spawnParticles(o.x + hit.c*TILE + TILE/2, o.y + hit.r*TILE + TILE/2, '#88ccff', 5);
      SFX.crack();
    }
    if (hit.tile.thick && hit.tile.state >= 4 && !hit.tile._cracked4) {
      hit.tile._cracked4 = true;
      spawnParticles(o.x + hit.c*TILE + TILE/2, o.y + hit.r*TILE + TILE/2, '#ffffff', 7);
      spawnChunkParts(o, hit.c, hit.r);
      SFX.crack();
    }
    // iter#12: frozen ice mid-point crack events (state>=3, >=4, >=5, >=6)
    if (hit.tile.frozen && hit.tile.state >= 3 && !hit.tile._cracked3) {
      hit.tile._cracked3 = true;
      spawnParticles(o.x + hit.c*TILE + TILE/2, o.y + hit.r*TILE + TILE/2, '#cc88ff', 5);
      SFX.crack();
    }
    if (hit.tile.frozen && hit.tile.state >= 4 && !hit.tile._cracked4) {
      hit.tile._cracked4 = true;
      spawnParticles(o.x + hit.c*TILE + TILE/2, o.y + hit.r*TILE + TILE/2, '#eeccff', 7);
      spawnChunkParts(o, hit.c, hit.r);
      SFX.crack();
    }
    if (hit.tile.frozen && hit.tile.state >= 5 && !hit.tile._cracked5) {
      hit.tile._cracked5 = true;
      spawnParticles(o.x + hit.c*TILE + TILE/2, o.y + hit.r*TILE + TILE/2, '#ffffff', 6);
      SFX.crack();
    }
    if (hit.tile.frozen && hit.tile.state >= 6 && !hit.tile._cracked6) {
      hit.tile._cracked6 = true;
      spawnParticles(o.x + hit.c*TILE + TILE/2, o.y + hit.r*TILE + TILE/2, '#cc88ff', 8);
      spawnChunkParts(o, hit.c, hit.r);
      SFX.crack();
    }
    if (hit.tile.state >= hitMax) {
      hit.tile.state = -1; // collected
      cleared++;
      // iter#13: accumulate per-run type counts for GAMEOVER summary
      if (hit.tile.frozen) frozenClearedRun++;
      else if (hit.tile.thick) thickClearedRun++;
      // iter#10: boost tiles drop a speed-boost pickup at their centre
      if (hit.tile.boost && pickups.length < MAX_PICKUPS) {
        pickups.push({
          x: o.x + hit.c*TILE + TILE/2,
          y: o.y + hit.r*TILE + TILE/2,
          life: BOOST_PICKUP_LIFE,
          angle: 0,
        });
      }
      var now = performance.now();
      if (chainTimer > 0) chain++;
      else chain = 1;
      SFX.pop(chain);
      chainTimer = 1.4;
      // iter#6: live-bump bestChain so the swatch on MENU/GAMEOVER reflects this run
      if (chain > bestChain) {
        bestChain = chain;
        newChainBestThisRun = true;
        try { localStorage.setItem('ice_chain_best', String(bestChain)); } catch(e) {}
      }
      // iter#13: track peak chain this run
      if (chain > peakChainRun) peakChainRun = chain;
      // iter#7: feed achievement checker — fires first-clear + chain milestone achievements
      checkAchievements({ firstClear: true, chainHit: chain, score: score });
      var pts = 8 + Math.floor(chain * 1.5);
      // iter#9: thick ice earns an extra bonus on clear
      // iter#11: meta upg_thick multiplies the thick-ice bonus
      if (hit.tile.thick) pts += Math.round(THICK_ICE_BONUS * metaThickMult());
      // iter#12: frozen ice earns a bigger bonus on clear (+40) AND drops 2 bonus shards directly
      if (hit.tile.frozen) {
        pts += FROZEN_ICE_BONUS;
        // direct shard drop: doesn't wait for end-of-run, credited immediately
        metaShards += FROZEN_SHARD_DROP;
        saveMeta();
      }
      score += pts;
      shake = hit.tile.frozen ? 0.30 : 0.18;
      var px = o.x + hit.c*TILE + TILE/2, py = o.y + hit.r*TILE + TILE/2;
      spawnParticles(px, py, '#ffffff', 8);
      if (hit.tile.frozen) {
        spawnParticles(px, py, '#cc88ff', 18);
        spawnParticles(px, py, '#eeccff', 10);
        spawnFloat(px, py - 34*S, t('frozenIce'), '#cc88ff');
        spawnFloat(px, py - 50*S, t('frozenBonus'), '#FFD700');
      } else if (hit.tile.thick) {
        spawnParticles(px, py, '#aaddff', 14);
        spawnFloat(px, py - 22*S, t('thickIce'), '#aaddff');
      } else {
        spawnParticles(px, py, '#88e0ff', 6);
      }
      spawnFloat(px, py - 8*S, (chain > 1 ? 'x'+chain+' ' : '') + '+'+pts, chain > 1 ? '#FFD700' : (hit.tile.frozen ? '#cc88ff' : (hit.tile.thick ? '#aaddff' : '#fff')));

      // iter#5: CHAIN MILESTONES — x3/x5/x10 fire banner + bonus + extra juice
      var milestoneTier = 0;
      if (chain >= 10) milestoneTier = 3;
      else if (chain >= 5) milestoneTier = 2;
      else if (chain >= 3) milestoneTier = 1;
      if (milestoneTier > chainTierShown) {
        chainTierShown = milestoneTier;
        var bonusPts = milestoneTier === 1 ? 25 : milestoneTier === 2 ? 75 : 200;
        score += bonusPts;
        SFX.chainTier(milestoneTier);
        chainBannerLife = 1.6;
        chainBannerPulse = 0;
        if (milestoneTier === 1) { chainBannerText = t('chainHot'); chainBannerColor = '#FFB347'; }
        else if (milestoneTier === 2) { chainBannerText = t('chainBlaze'); chainBannerColor = '#FF6B35'; shake = Math.max(shake, 0.28); }
        else { chainBannerText = t('chainInferno'); chainBannerColor = '#FF3030'; shake = Math.max(shake, 0.42); }
        // burst of fire-toned particles around the ship
        var burstN = milestoneTier === 3 ? 28 : milestoneTier === 2 ? 18 : 12;
        spawnParticles(ship.x, ship.y, chainBannerColor, burstN);
        spawnParticles(ship.x, ship.y, '#FFD700', Math.floor(burstN * 0.6));
        spawnFloat(ship.x, ship.y - 26*S, '+'+bonusPts, chainBannerColor);
      }

      // chain bonus to neighbours: if neighbour is at state >=2, advance it
      var dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (var d = 0; d < 4; d++) {
        var nc = hit.c + dirs[d][0], nr = hit.r + dirs[d][1];
        if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) continue;
        var nt = grid[nr][nc];
        // iter#9: respect thick-tile ceiling; iter#12: respect frozen ceiling
        var ntMax = nt.frozen ? FROZEN_CRACK_MAX : (nt.thick ? THICK_CRACK_MAX : CRACK_MAX);
        if (nt.state >= 1 && nt.state < ntMax) nt.state = Math.min(ntMax-0.05, nt.state + 0.4);
      }

      if (cleared >= totalDirty) {
        var bonus = Math.round(timeLeft * 6);
        score += bonus;
        spawnFloat(cx, cy - 30*S, t('bonus')+' +'+bonus, '#2ecc71');
        // iter#14: PERFECT LAKE — every tile cleared earns +5 shards bonus
        // This fires unconditionally since cleared >= totalDirty means ALL tiles gone.
        perfectLevelsRun++;
        metaShards += PERFECT_SHARD_BONUS;
        saveMeta();
        perfectBannerLife = 2.0;
        perfectBannerPulse = 0;
        spawnParticles(cx, cy, '#FFD700', 20);
        spawnParticles(cx, cy, '#ffffff', 12);
        SFX.achievement(); // re-use ascending arpeggio for the perfect-clear sting
        // iter#7: score-tier achievements at level end (bonus already in score)
        checkAchievements({ score: score });
        SFX.levelEnd();
        gs = 'LEVELEND';try{parent.postMessage({type:'gf:gameEnded'},'*')}catch(_){};
      }
    }
  }

  // animate particles
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05*S;
    p.life -= dt * 1.7;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (var i = floats.length - 1; i >= 0; i--) {
    var f = floats[i];
    f.y += f.vy; f.life -= dt * 0.95;
    if (f.life <= 0) floats.splice(i, 1);
  }
  // animate chunk pieces
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var ti = grid[r][c];
      ti.wobble += dt * 1.5;
      for (var k = ti.chunkParts.length - 1; k >= 0; k--) {
        var cp = ti.chunkParts[k];
        cp.x += cp.vx; cp.y += cp.vy;
        cp.vx *= 0.94; cp.vy *= 0.94;
        cp.life -= dt * 1.2;
        if (cp.life <= 0) ti.chunkParts.splice(k, 1);
      }
    }
  }
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function drawTile(x, y, t) {
  var size = TILE;
  if (t.state === -1) {
    // clean water — deep blue with subtle ripple
    var grd = ctx.createRadialGradient(x+size/2, y+size/2, 0, x+size/2, y+size/2, size*0.7);
    grd.addColorStop(0, '#1e4a78');
    grd.addColorStop(1, '#0e2a4a');
    ctx.fillStyle = grd;
    ctx.fillRect(x, y, size, size);

    // ripple
    var ph = Math.sin(t.wobble*0.6) * 0.3 + 0.5;
    ctx.strokeStyle = 'rgba(120,200,255,'+(0.18*ph)+')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x+size/2, y+size/2, size*0.2*ph, 0, Math.PI*2);
    ctx.stroke();
    return;
  }

  // iter#9: thick tiles use a different crack ceiling; iter#12: frozen tiles use FROZEN_CRACK_MAX
  var tileMax = t.frozen ? FROZEN_CRACK_MAX : (t.thick ? THICK_CRACK_MAX : CRACK_MAX);
  var s = clamp(t.state, 0, tileMax);
  var dirt = 0.85 - (s / tileMax) * 0.55;
  // base ice color (iter#9: thick ice is brighter/bluer; iter#12: frozen is violet-purple)
  var brown, blue;
  if (t.frozen) {
    // deep violet-purple crystalline ice — clearly distinct from thin (brown) and thick (cyan-blue)
    var prog = s / tileMax;
    var r = Math.round(80 + prog * 50);
    var g = Math.round(50 + prog * 40);
    var b = Math.round(140 + prog * 50);
    ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
  } else if (t.thick) {
    // bright glacial blue-white — stands out clearly from normal dirty tiles
    var prog = s / tileMax;
    brown = Math.round(120 + prog * 40);
    blue  = Math.round(200 + prog * 30);
    ctx.fillStyle = 'rgb(' + brown + ',' + Math.round(170 + prog*30) + ',' + blue + ')';
  } else {
    brown = Math.round(40 + dirt * 30);
    blue  = Math.round(80 + dirt * 50);
    ctx.fillStyle = 'rgb(' + brown + ',' + (brown+10) + ',' + blue + ')';
  }
  ctx.fillRect(x+1, y+1, size-2, size-2);

  // surface highlight
  var hlAlpha = t.frozen ? (0.45 * (1 - s/tileMax)) : (t.thick ? (0.38 * (1 - s/tileMax)) : (0.18 * dirt));
  var hl = ctx.createLinearGradient(x, y, x+size, y+size);
  hl.addColorStop(0, 'rgba(255,255,255,'+hlAlpha+')');
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hl;
  ctx.fillRect(x+1, y+1, size-2, size-2);

  // iter#12: frozen-ice border glow (pulsing violet ring — most dramatic of the 3 tiers)
  if (t.frozen && s < tileMax) {
    var frozenGlowA = 0.65 + 0.35 * Math.sin(t.wobble * 0.9);
    ctx.strokeStyle = 'rgba(180,80,255,' + frozenGlowA + ')';
    ctx.lineWidth = Math.max(2, size * 0.08);
    ctx.strokeRect(x+1, y+1, size-2, size-2);
    // inner glow pass for extra drama
    ctx.strokeStyle = 'rgba(220,160,255,' + (frozenGlowA * 0.5) + ')';
    ctx.lineWidth = Math.max(1, size * 0.04);
    ctx.strokeRect(x+3, y+3, size-6, size-6);
  }
  // iter#9: thick-ice border glow (cyan ring so player can identify before hitting)
  if (t.thick && s < tileMax) {
    var glowA = 0.55 + 0.35 * Math.sin(t.wobble * 1.2);
    ctx.strokeStyle = 'rgba(100,200,255,' + glowA + ')';
    ctx.lineWidth = Math.max(1.5, size * 0.055);
    ctx.strokeRect(x+1, y+1, size-2, size-2);
  }

  // iter#10: boost tiles have a pulsing golden border so players can route to them
  if (t.boost && t.state >= 0 && s < tileMax) {
    var boostGlowA = 0.60 + 0.35 * Math.sin(t.wobble * 2.2);
    ctx.strokeStyle = 'rgba(255,210,60,' + boostGlowA + ')';
    ctx.lineWidth = Math.max(1.5, size * 0.06);
    ctx.strokeRect(x+2, y+2, size-4, size-4);
    // small ⚡ mark in corner
    ctx.font = 'bold ' + Math.max(8, size * 0.38) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.globalAlpha = boostGlowA;
    ctx.fillText('⚡', x + size * 0.78, y + size * 0.22);
    ctx.globalAlpha = 1;
    ctx.textBaseline = 'alphabetic';
  }

  // dirt splotches (visible when state is 0-1 — for thick ice, scaled to progress)
  var splotchThreshold = (t.thick || t.frozen) ? (tileMax * 0.3) : 1.5;
  if (s < splotchThreshold && !t.thick && !t.frozen) {
    var seed = (t.crackPattern * 3 + 7) % 5;
    ctx.fillStyle = 'rgba(40,30,15,'+(0.45 - s*0.2)+')';
    for (var i = 0; i < 3; i++) {
      var sx = x + size * (0.25 + ((seed*i+i*3) % 7) / 14);
      var sy = y + size * (0.25 + ((seed*2+i*5) % 7) / 14);
      ctx.beginPath(); ctx.arc(sx, sy, size*0.10, 0, Math.PI*2); ctx.fill();
    }
  }
  // iter#9: thick ice has snowflake-style cross markings when fresh
  if (t.thick && s < 1.5) {
    ctx.strokeStyle = 'rgba(200,240,255,0.55)';
    ctx.lineWidth = Math.max(1, size*0.05);
    ctx.beginPath();
    ctx.moveTo(x+size*0.3, y+size*0.5); ctx.lineTo(x+size*0.7, y+size*0.5);
    ctx.moveTo(x+size*0.5, y+size*0.3); ctx.lineTo(x+size*0.5, y+size*0.7);
    ctx.moveTo(x+size*0.35, y+size*0.35); ctx.lineTo(x+size*0.65, y+size*0.65);
    ctx.moveTo(x+size*0.65, y+size*0.35); ctx.lineTo(x+size*0.35, y+size*0.65);
    ctx.stroke();
  }
  // iter#12: frozen ice has fuller snowflake + diamond markings when fresh (extra layers)
  if (t.frozen && s < 2.5) {
    var frkAlpha = 0.70 - (s / 2.5) * 0.45;
    ctx.strokeStyle = 'rgba(220,170,255,' + frkAlpha + ')';
    ctx.lineWidth = Math.max(1, size*0.055);
    ctx.beginPath();
    // main cross
    ctx.moveTo(x+size*0.25, y+size*0.5); ctx.lineTo(x+size*0.75, y+size*0.5);
    ctx.moveTo(x+size*0.5, y+size*0.25); ctx.lineTo(x+size*0.5, y+size*0.75);
    // diagonals
    ctx.moveTo(x+size*0.32, y+size*0.32); ctx.lineTo(x+size*0.68, y+size*0.68);
    ctx.moveTo(x+size*0.68, y+size*0.32); ctx.lineTo(x+size*0.32, y+size*0.68);
    // diamond ring
    ctx.moveTo(x+size*0.5, y+size*0.18); ctx.lineTo(x+size*0.82, y+size*0.5);
    ctx.lineTo(x+size*0.5, y+size*0.82); ctx.lineTo(x+size*0.18, y+size*0.5);
    ctx.closePath();
    ctx.stroke();
  }

  // cracks (visible when state >= 1, scaled to tileMax)
  if (s >= 1) {
    var ca = clamp((s - 1) / (tileMax - 1), 0.3, 1);
    // iter#9: thick ice cracks are bolder and cyan-tinted; iter#12: frozen cracks are violet
    ctx.strokeStyle = t.frozen ? ('rgba(210,140,255,'+ca+')') : (t.thick ? ('rgba(180,230,255,'+ca+')') : ('rgba(255,255,255,'+ca+')'));
    ctx.lineWidth = Math.max(1, size * (t.frozen ? 0.09 : (t.thick ? 0.07 : 0.04)));
    ctx.beginPath();
    var p = t.crackPattern;
    if (p === 0) {
      ctx.moveTo(x+size*0.2, y+size*0.5); ctx.lineTo(x+size*0.5, y+size*0.3);
      ctx.lineTo(x+size*0.5, y+size*0.7); ctx.lineTo(x+size*0.8, y+size*0.5);
      ctx.moveTo(x+size*0.5, y+size*0.3); ctx.lineTo(x+size*0.5, y+size*0.7);
    } else if (p === 1) {
      ctx.moveTo(x+size*0.2, y+size*0.2); ctx.lineTo(x+size*0.5, y+size*0.5);
      ctx.lineTo(x+size*0.8, y+size*0.2);
      ctx.moveTo(x+size*0.5, y+size*0.5); ctx.lineTo(x+size*0.5, y+size*0.85);
      ctx.moveTo(x+size*0.5, y+size*0.5); ctx.lineTo(x+size*0.2, y+size*0.85);
    } else {
      ctx.moveTo(x+size*0.5, y+size*0.15); ctx.lineTo(x+size*0.5, y+size*0.85);
      ctx.moveTo(x+size*0.15, y+size*0.5); ctx.lineTo(x+size*0.85, y+size*0.5);
      ctx.moveTo(x+size*0.5, y+size*0.5); ctx.lineTo(x+size*0.8, y+size*0.8);
    }
    ctx.stroke();
  }

  // chunk separation effect (state >= tileMax-1 for all tile types)
  var sepThreshold = (t.thick || t.frozen) ? (tileMax - 1) : 2;
  if (s >= sepThreshold) {
    var sep = (s - sepThreshold) * 0.5;
    ctx.fillStyle = t.frozen ? 'rgba(100,40,160,0.55)' : (t.thick ? 'rgba(40,90,130,0.45)' : 'rgba(40,55,80,0.45)');
    ctx.fillRect(x+size*0.5-1, y+1+sep, 2, size-2);
    ctx.fillRect(x+1+sep, y+size*0.5-1, size-2, 2);
  }

  // border
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x+0.5, y+0.5, size-1, size-1);

  // floating chunk pieces
  for (var k = 0; k < t.chunkParts.length; k++) {
    var cp = t.chunkParts[k];
    ctx.globalAlpha = Math.max(0, cp.life);
    ctx.fillStyle = '#dceaf7';
    ctx.beginPath(); ctx.arc(cp.x, cp.y, cp.r * (0.5 + 0.5*cp.life), 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawShip(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // shadow
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 8 * S;
  ctx.shadowOffsetY = 3 * S;

  // hull (iter#3: palette-driven; default = classic red icebreaker)
  var pal = HULL_PALETTES[hullIdx] || HULL_PALETTES[0];
  var sz = TILE * 0.46;
  ctx.fillStyle = pal.body;
  ctx.beginPath();
  ctx.moveTo(sz, 0);
  ctx.lineTo(sz*0.4, -sz*0.55);
  ctx.lineTo(-sz*0.7, -sz*0.55);
  ctx.lineTo(-sz*0.85, 0);
  ctx.lineTo(-sz*0.7, sz*0.55);
  ctx.lineTo(sz*0.4, sz*0.55);
  ctx.closePath();
  ctx.fill();

  ctx.shadowColor = 'transparent';

  // hull stripe
  ctx.fillStyle = pal.stripe;
  ctx.fillRect(-sz*0.85, -sz*0.12, sz*1.7, sz*0.24);

  // cabin
  ctx.fillStyle = '#34495e';
  rr(ctx, -sz*0.25, -sz*0.32, sz*0.55, sz*0.64, sz*0.1);
  ctx.fill();
  ctx.fillStyle = '#74b9ff';
  rr(ctx, -sz*0.18, -sz*0.25, sz*0.4, sz*0.5, sz*0.06);
  ctx.fill();

  // bow icebreaker
  ctx.fillStyle = pal.bow;
  ctx.beginPath();
  ctx.moveTo(sz*1.05, 0);
  ctx.lineTo(sz*0.7, -sz*0.18);
  ctx.lineTo(sz*0.7, sz*0.18);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawArena() {
  var o = gridOrigin();
  // water bg
  ctx.fillStyle = '#0e2640';
  ctx.fillRect(o.x - 8*S, o.y - 8*S, COLS*TILE + 16*S, ROWS*TILE + 16*S);
  // rim glow
  ctx.strokeStyle = 'rgba(120,200,255,0.18)';
  ctx.lineWidth = 2;
  ctx.strokeRect(o.x - 4*S, o.y - 4*S, COLS*TILE + 8*S, ROWS*TILE + 8*S);

  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      drawTile(o.x + c*TILE, o.y + r*TILE, grid[r][c]);
    }
  }
}

function drawHUD() {
  var bh = HUD_H * S;
  ctx.fillStyle = 'rgba(8,16,32,0.92)';
  ctx.fillRect(0, 0, W, bh);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, bh); ctx.lineTo(W, bh); ctx.stroke();

  var pad = 14*S, fs = clamp(13*S, 11, 17), fy = bh*0.78;
  var bigFs = clamp(18*S, 14, 24);
  ctx.textBaseline = 'alphabetic';

  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(t('level'), pad, bh*0.42);
  ctx.fillStyle = '#fff'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(level, pad, fy);

  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(t('score'), W-pad, bh*0.42);
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(score, W-pad, fy);

  // iter#2: BEST inline next to SCORE (small, below the score number)
  if (best > 0) {
    var bestFs = clamp(11*S, 9, 14);
    ctx.fillStyle = (score > best) ? '#2ecc71' : '#778';
    ctx.font = 'bold '+bestFs+'px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(t('best')+' '+best, W-pad, bh*0.96);
  }

  // clean meter
  var pct = totalDirty > 0 ? Math.round((cleared/totalDirty)*100) : 100;
  var mw = clamp(W*0.32, 110, 240), mh = 10*S;
  var mx = cx - mw/2, my = bh*0.58;
  ctx.fillStyle = '#666'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(t('clean')+' '+pct+'%', cx, bh*0.36);
  rr(ctx, mx, my, mw, mh, mh/2); ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();
  if (pct > 0) {
    var fg = ctx.createLinearGradient(mx, 0, mx+mw, 0);
    fg.addColorStop(0, '#4dd0e1'); fg.addColorStop(1, '#2ecc71');
    rr(ctx, mx, my, mw*pct/100, mh, mh/2); ctx.fillStyle = fg; ctx.fill();
  }

  // timer
  var tx = W*0.78;
  var tc = timeLeft < 12 ? '#e74c3c' : timeLeft < 25 ? '#f39c12' : '#aaa';
  ctx.fillStyle = tc; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(t('time'), tx, bh*0.42);
  ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(Math.ceil(timeLeft)+t('secAbbr'), tx, fy);

  // chain badge
  if (chain > 1 && chainTimer > 0) {
    var alpha = Math.min(1, chainTimer);
    ctx.globalAlpha = alpha;
    var by = H - 50*S;
    ctx.font = 'bold '+clamp(22*S,16,32)+'px sans-serif';
    ctx.fillStyle = '#FFD700'; ctx.textAlign = 'center';
    ctx.fillText(t('chain')+' x'+chain+'!', cx, by);
    ctx.globalAlpha = 1;
  }
}

function drawOverlay(title, sub, btnText, btnFn, sub2) {
  buttons = [];
  ctx.fillStyle = 'rgba(8,12,28,0.88)';
  ctx.fillRect(0, 0, W, H);

  var titleFs = clamp(38*S, 22, 56);
  var subFs   = clamp(16*S, 12, 22);
  var btnW    = clamp(240*S, 160, 320), btnH = clamp(52*S, 40, 66);
  var btnX    = cx - btnW/2, btnY = cy + 20*S;

  ctx.shadowColor = 'rgba(77,208,225,0.45)'; ctx.shadowBlur = 30*S;
  ctx.font = 'bold '+titleFs+'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(title, cx, cy - 50*S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  if (sub) {
    ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#9ab';
    ctx.fillText(sub, cx, cy - 16*S);
  }
  if (sub2) {
    ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#bcd';
    ctx.fillText(sub2, cx, cy + 2*S);
  }

  var grad = ctx.createLinearGradient(btnX, btnY, btnX, btnY+btnH);
  grad.addColorStop(0, '#4dd0e1'); grad.addColorStop(1, '#0288a8');
  rr(ctx, btnX, btnY, btnW, btnH, btnH/2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.font = 'bold '+subFs+'px sans-serif'; ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(btnText, cx, btnY + btnH/2);
  ctx.textBaseline = 'alphabetic';

  buttons.push({ x:btnX, y:btnY, w:btnW, h:btnH, fn:btnFn });

  if (best > 0) {
    ctx.font = clamp(13*S,10,17)+'px sans-serif'; ctx.fillStyle = '#557';
    ctx.fillText(t('best')+': '+best, cx, btnY+btnH+28*S);
  }
  // iter#6: BEST CHAIN stat — sits just under BEST score (or 28*S below the
  // button if best == 0). Green flash if the player just beat their chain
  // record this run. Tiny font, same alignment, never collides with hull
  // swatches (those anchor 36-56*S below this line — see drawHullSwatches).
  // Only rendered on MENU — on GAMEOVER the EXTRA TIME rewarded-ad button
  // (iter#1) sits at the same vertical band and would clip stat text.
  if (bestChain > 0 && gs === 'MENU') {
    var bcY = (best > 0) ? (btnY+btnH+44*S) : (btnY+btnH+28*S);
    ctx.font = clamp(12*S,9,16)+'px sans-serif';
    ctx.fillStyle = newChainBestThisRun ? '#2ecc71' : '#557';
    ctx.fillText(t('bestChain')+' x'+bestChain, cx, bcY);
  }
}

// ── iter#3: hull palette swatches (rendered below PLAY on MENU) ────────────
function drawHullSwatches() {
  // Anchor to MENU layout: PLAY button is at cy + 20*S, height clamp(52,40,66).
  // BEST line (if any) sits at btnY+btnH+28*S. Swatches go a bit further down.
  var btnW = clamp(240*S, 160, 320), btnH = clamp(52*S, 40, 66);
  var btnY = cy + 20*S;
  // iter#6: account for the new BEST CHAIN line under BEST score (each
  // stat line eats ~16*S vertical so swatches stay clear of the text).
  var statLines = (best > 0 ? 1 : 0) + (bestChain > 0 ? 1 : 0);
  var yBase = btnY + btnH + 36*S + statLines * 20*S;
  var sw = clamp(56*S, 44, 72), sh = clamp(46*S, 36, 60);
  var gap = clamp(14*S, 8, 18);
  var totalW = HULL_PALETTES.length * sw + (HULL_PALETTES.length - 1) * gap;
  var x0 = cx - totalW/2;
  // Guard against clipping: if too tall for viewport, shift up
  var maxY = H - sh - 12*S;
  if (yBase > maxY) yBase = maxY;
  var labelFs = clamp(10*S, 8, 13);
  for (var i = 0; i < HULL_PALETTES.length; i++) {
    var p = HULL_PALETTES[i];
    var x = x0 + i * (sw + gap);
    var unlocked = isHullUnlocked(p);
    var selected = (i === hullIdx);
    // card background
    rr(ctx, x, yBase, sw, sh, 8*S);
    ctx.fillStyle = unlocked ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.04)';
    ctx.fill();
    if (selected) {
      ctx.strokeStyle = '#4dd0e1';
      ctx.lineWidth = 2.5 * S;
      ctx.stroke();
    } else if (unlocked) {
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1 * S;
      ctx.stroke();
    } else {
      ctx.strokeStyle = 'rgba(255,255,255,0.10)';
      ctx.lineWidth = 1 * S;
      ctx.stroke();
    }
    // mini hull swatch — body + stripe
    ctx.save();
    if (!unlocked) ctx.globalAlpha = 0.35;
    var bx = x + sw*0.18, by = yBase + sh*0.35, bw = sw*0.64, bh = sh*0.28;
    rr(ctx, bx, by, bw, bh, bh*0.35);
    ctx.fillStyle = p.body; ctx.fill();
    ctx.fillStyle = p.stripe;
    ctx.fillRect(bx, by + bh*0.40, bw, bh*0.20);
    // bow nub
    ctx.fillStyle = p.bow;
    ctx.beginPath();
    ctx.moveTo(bx + bw, by + bh/2);
    ctx.lineTo(bx + bw - bw*0.16, by + bh*0.15);
    ctx.lineTo(bx + bw - bw*0.16, by + bh*0.85);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    // label (top of card)
    ctx.font = 'bold ' + labelFs + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (unlocked) {
      ctx.fillStyle = selected ? '#4dd0e1' : '#fff';
      ctx.fillText(t(p.name), x + sw/2, yBase + sh*0.14);
    } else {
      ctx.fillStyle = '#778';
      ctx.fillText(t(p.name), x + sw/2, yBase + sh*0.14);
      // lock requirement (bottom of card)
      ctx.fillStyle = '#aab';
      ctx.font = 'bold ' + clamp(9*S, 8, 12) + 'px sans-serif';
      ctx.fillText('🔒 ' + p.unlockAt, x + sw/2, yBase + sh*0.86);
    }
    ctx.textBaseline = 'alphabetic';
    if (unlocked) {
      buttons.push({ x:x, y:yBase, w:sw, h:sh, fn:(function(idx){ return function(){ selectHull(idx); }; })(i) });
    }
  }
}

// ── iter#11: META-UPGRADE shop panel (rendered on MENU below hull swatches) ──
// Shows shard balance + 3 upgrade cards. Each card: name, desc, level pips,
// cost. If maxed → greyed "MAX" pill. If affordable → lit "Buy" button.
// Click on an affordable non-maxed card calls purchaseUpgrade(i).
function drawUpgradeShop() {
  // Determine Y start: mirror drawHullSwatches anchor logic
  var btnW = clamp(240*S, 160, 320), btnH = clamp(52*S, 40, 66);
  var btnY = cy + 20*S;
  var statLines = (best > 0 ? 1 : 0) + (bestChain > 0 ? 1 : 0);
  var swatchH = clamp(46*S, 36, 60);
  var swatchY = btnY + btnH + 36*S + statLines * 20*S;
  if (swatchY > H - swatchH - 12*S) swatchY = H - swatchH - 12*S;
  var shopY = swatchY + swatchH + 18*S;

  // Guard: if shopY is too close to bottom, skip rendering
  var cardH = clamp(54*S, 42, 68);
  if (shopY + cardH + 30*S > H) return;

  // Shard balance header
  var headerFs = clamp(12*S, 9, 15);
  ctx.font = 'bold ' + headerFs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = 'rgba(100,210,255,0.75)';
  ctx.fillText('❄ ' + t('shards') + ': ' + metaShards + '  ' + t('upgrades'), cx, shopY);

  var cardY = shopY + 12*S;
  var cardW = clamp(108*S, 82, 138);
  var cardGap = clamp(10*S, 6, 14);
  var totalW = META_UPGRADES.length * cardW + (META_UPGRADES.length - 1) * cardGap;
  var x0 = cx - totalW / 2;
  var labelFs = clamp(10*S, 8, 13);
  var descFs  = clamp(9*S,  7, 11);

  for (var i = 0; i < META_UPGRADES.length; i++) {
    var upg = META_UPGRADES[i];
    var lvl_i = metaUpgLvls[i];
    var maxed = lvl_i >= upg.maxLvl;
    var affordable = !maxed && metaShards >= upg.cost;
    var cx_i = x0 + i * (cardW + cardGap);

    // Card background
    rr(ctx, cx_i, cardY, cardW, cardH, 7*S);
    ctx.fillStyle = maxed ? 'rgba(255,255,255,0.04)' : affordable ? 'rgba(77,208,225,0.10)' : 'rgba(255,255,255,0.05)';
    ctx.fill();
    ctx.strokeStyle = maxed ? 'rgba(255,255,255,0.12)' : affordable ? 'rgba(77,208,225,0.50)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = Math.max(1, 1.2*S);
    ctx.stroke();

    // Name
    ctx.font = 'bold ' + labelFs + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = maxed ? '#556' : '#cde';
    ctx.fillText(t(upg.nameKey), cx_i + cardW/2, cardY + 14*S);

    // Desc
    ctx.font = descFs + 'px sans-serif';
    ctx.fillStyle = maxed ? '#445' : '#89a';
    ctx.fillText(t(upg.descKey), cx_i + cardW/2, cardY + 24*S);

    // Level pips
    var pipR = clamp(4*S, 3, 5);
    var pipGap = pipR*2 + clamp(3*S, 2, 4);
    var pipTotalW = upg.maxLvl * pipR*2 + (upg.maxLvl-1) * (pipGap - pipR*2);
    var pipX0 = cx_i + cardW/2 - pipTotalW/2 + pipR;
    var pipY = cardY + 34*S;
    for (var p = 0; p < upg.maxLvl; p++) {
      ctx.beginPath();
      ctx.arc(pipX0 + p * pipGap, pipY, pipR, 0, Math.PI*2);
      ctx.fillStyle = p < lvl_i ? '#4dd0e1' : 'rgba(255,255,255,0.15)';
      ctx.fill();
    }

    // Buy / MAX pill
    var pillW = cardW * 0.68, pillH = clamp(18*S, 14, 22);
    var pillX = cx_i + cardW/2 - pillW/2;
    var pillY2 = cardY + cardH - pillH - 6*S;
    rr(ctx, pillX, pillY2, pillW, pillH, pillH/2);
    if (maxed) {
      ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();
      ctx.font = 'bold ' + descFs + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#667';
      ctx.fillText(t('upg_maxed'), cx_i + cardW/2, pillY2 + pillH/2);
    } else if (affordable) {
      var g2 = ctx.createLinearGradient(pillX, pillY2, pillX, pillY2+pillH);
      g2.addColorStop(0, '#4dd0e1'); g2.addColorStop(1, '#0288a8');
      ctx.fillStyle = g2; ctx.fill();
      ctx.font = 'bold ' + descFs + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText(t('upg_buy') + ' ' + upg.cost + '❄', cx_i + cardW/2, pillY2 + pillH/2);
      // Register click target
      buttons.push({ x: pillX, y: pillY2, w: pillW, h: pillH, fn: (function(idx){ return function(){ purchaseUpgrade(idx); }; })(i) });
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
      ctx.font = 'bold ' + descFs + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#556';
      ctx.fillText(upg.cost + '❄', cx_i + cardW/2, pillY2 + pillH/2);
    }
    ctx.textBaseline = 'alphabetic';
  }
}

// ── iter#4: Day-seed tag (rendered on MENU + GAMEOVER) ──────────────────────
function drawDaySeedTag() {
  var fs = clamp(11*S, 9, 14);
  ctx.save();
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = 'rgba(120,180,220,0.55)';
  // top-of-screen, just below safe margin — never collides with overlay title
  // because title sits at cy - 50*S and W centers are decoupled by Y.
  ctx.fillText(t('daySeed') + ' ' + getDaySeed(), cx, 22*S);
  ctx.restore();
}

// ── iter#7: ACHIEVEMENT toast + MENU badge row ─────────────────────────────
// Toast: top-of-screen golden pill, 2.5s decay, fades in alpha. Placement
// at y = 60*S so it sits BELOW the day-seed tag (22*S) and above the title
// (cy - 50*S on portrait phones — toast Y of ~60 keeps clear with margin).
// Pulse: scale-up bounce on appear, settles to 1.0.
function drawAchievementToast() {
  if (!achToast) return;
  var a = achToast.ach;
  var alpha = Math.min(1, achToast.life / 0.5);
  // bounce-in: scale 0.6 -> 1.0 over first 0.3s, then steady
  var t01 = Math.min(1, (2.5 - achToast.life) / 0.3);
  var scl = 0.6 + 0.4 * t01;
  var fs = clamp(14*S, 11, 18);
  var ftiny = clamp(11*S, 9, 14);
  var label = t(a.nameKey);
  var head  = t('achUnlocked');
  ctx.save();
  ctx.translate(cx, 60*S);
  ctx.scale(scl, scl);
  ctx.globalAlpha = alpha;
  // pill background
  var pillW = clamp(280*S, 220, 360);
  var pillH = clamp(48*S, 38, 60);
  var pillX = -pillW/2, pillY = -pillH/2;
  rr(ctx, pillX, pillY, pillW, pillH, pillH/2);
  var grad = ctx.createLinearGradient(0, pillY, 0, pillY+pillH);
  grad.addColorStop(0, '#FFD700');
  grad.addColorStop(1, '#a47100');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 1.5*S; ctx.stroke();
  // icon left, text right
  ctx.font = 'bold ' + clamp(22*S, 18, 28) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#1a1a2e';
  ctx.fillText(a.icon, pillX + 14*S, 0);
  ctx.font = 'bold ' + ftiny + 'px sans-serif';
  ctx.fillStyle = '#3a2a00';
  ctx.fillText(head, pillX + 46*S, -pillH*0.18);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.fillStyle = '#1a1a2e';
  ctx.fillText(label, pillX + 46*S, pillH*0.18);
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.restore();
  ctx.globalAlpha = 1;
}

// Compact achievement badge row — top of MENU, below day-seed tag, above
// title. Five emoji slots: dim if locked, full-colour if unlocked. Doesn't
// register click handlers (display-only) so it never collides with PLAY/
// hull-swatch hit zones.
function drawAchievementBadges() {
  var n = ACHIEVEMENTS.length;
  var slot = clamp(22*S, 18, 28);
  var gap = clamp(8*S, 6, 12);
  var totalW = n * slot + (n - 1) * gap;
  var x0 = cx - totalW/2;
  var y0 = 38*S; // just below day-seed tag (which sits at 22*S)
  for (var i = 0; i < n; i++) {
    var a = ACHIEVEMENTS[i];
    var unlocked = isAchUnlocked(a);
    var x = x0 + i * (slot + gap);
    ctx.save();
    ctx.globalAlpha = unlocked ? 1 : 0.28;
    ctx.font = 'bold ' + slot + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(a.icon, x + slot/2, y0 + slot/2);
    ctx.restore();
  }
  ctx.textBaseline = 'alphabetic';
}

// ── iter#10: draw floating BOOST pickups on the grid ────────────────────────
// Each pickup is a spinning ⚡ in a golden glow ring. Alpha fades as life
// decreases (last 1s fades out). Rendered during PLAYING before the ship.
function drawPickups() {
  for (var pi = 0; pi < pickups.length; pi++) {
    var pk = pickups[pi];
    var alpha = Math.min(1, pk.life);          // fade out last second
    var pulse = 1 + 0.18 * Math.sin(pk.angle * 1.8);
    var sz = TILE * 0.52 * pulse;
    ctx.save();
    ctx.translate(pk.x, pk.y);
    ctx.rotate(pk.angle * 0.4);
    ctx.globalAlpha = alpha;
    // golden glow ring
    ctx.beginPath();
    ctx.arc(0, 0, sz * 0.72, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,210,50,0.75)';
    ctx.lineWidth = Math.max(1.5, sz * 0.12);
    ctx.stroke();
    // fill ring
    ctx.beginPath();
    ctx.arc(0, 0, sz * 0.62, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,215,0,0.18)';
    ctx.fill();
    // bolt icon
    ctx.font = 'bold ' + Math.max(10, sz * 0.90) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = sz * 0.6;
    ctx.fillText('⚡', 0, 0);
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    ctx.restore();
    ctx.globalAlpha = 1;
  }
  // iter#10: draw active speed-boost HUD indicator (bottom of screen near chain)
  if (speedBoostTimer > 0) {
    var bAlpha = Math.min(1, speedBoostTimer * 2);
    var bFs = clamp(16*S, 12, 22);
    var bY = H - 72*S;
    ctx.globalAlpha = bAlpha;
    ctx.font = 'bold ' + bFs + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 10*S;
    ctx.fillText('⚡ ' + Math.ceil(speedBoostTimer) + t('secAbbr'), cx, bY);
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

// ── iter#13: Run summary stats row on GAMEOVER ─────────────────────────────
// Shows 3 compact stat chips below the score line and above the RETRY button:
//   [💜 N FROZEN]  [🧊 N THICK]  [⛓ xN CHAIN]
// Only the chips where N > 0 are rendered; if all zero (first run / no specials
// hit), the row is skipped entirely to avoid clutter.
// Y-position is anchored just below the score sub-line on the GAMEOVER overlay
// (cy - 16*S is the score line; chips sit at cy + 2*S, leaving the RETRY
// button at cy + 20*S clear below them).
function drawRunSummary() {
  // Only show on GAMEOVER and only if the player cleared any special tiles or
  // built a meaningful chain (peak >= 3)
  if (gs !== 'GAMEOVER') return;
  var hasData = frozenClearedRun > 0 || thickClearedRun > 0 || peakChainRun >= 3 || perfectLevelsRun > 0;
  if (!hasData) return;

  // Build the chip list
  var chips = [];
  if (frozenClearedRun > 0) chips.push({ icon: '💜', val: frozenClearedRun, label: t('runFrozen'), col: '#cc88ff' });
  if (thickClearedRun > 0)  chips.push({ icon: '🧊', val: thickClearedRun,  label: t('runThick'),  col: '#aaddff' });
  if (peakChainRun >= 3)    chips.push({ icon: '⛓',  val: 'x' + peakChainRun, label: t('runChain'), col: '#FFD700' });
  // iter#14: show perfect-lake count if player hit at least 1 this run
  if (perfectLevelsRun > 0) chips.push({ icon: '⭐', val: perfectLevelsRun, label: t('runPerfect'), col: '#FFD700' });
  if (chips.length === 0) return;

  var chipH = clamp(28*S, 22, 36);
  var chipPad = clamp(10*S, 7, 14);
  var fs = clamp(10*S, 8, 13);
  var iconFs = clamp(12*S, 10, 15);
  var gap = clamp(8*S, 5, 12);

  // Measure widths
  ctx.font = 'bold ' + fs + 'px sans-serif';
  var chipWidths = chips.map(function(c) {
    return chipPad * 2 + clamp(14*S, 11, 18) + chipPad * 0.6 + ctx.measureText(c.val + ' ' + c.label).width;
  });
  var totalW = chipWidths.reduce(function(a, b) { return a + b; }, 0) + gap * (chips.length - 1);
  var x0 = cx - totalW / 2;
  // Position: just above centre-overlay (between score sub-line and RETRY button)
  var rowY = cy + 4*S;

  for (var i = 0; i < chips.length; i++) {
    var ch = chips[i];
    var cw = chipWidths[i];
    var cx_chip = x0;

    // chip pill
    rr(ctx, cx_chip, rowY, cw, chipH, chipH / 2);
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.fill();
    ctx.strokeStyle = ch.col.replace(')', ',0.45)').replace('rgb', 'rgba');
    // strokeStyle is already hex; convert via opacity trick
    ctx.strokeStyle = 'rgba(200,200,200,0.30)';
    ctx.lineWidth = Math.max(1, 0.8*S);
    ctx.stroke();

    // icon
    ctx.font = 'bold ' + iconFs + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = ch.col;
    ctx.shadowColor = ch.col; ctx.shadowBlur = 6*S;
    ctx.fillText(ch.icon, cx_chip + chipH * 0.52, rowY + chipH / 2);
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

    // value + label
    ctx.font = 'bold ' + fs + 'px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillStyle = ch.col;
    ctx.fillText(ch.val, cx_chip + chipH * 0.90, rowY + chipH / 2 - clamp(3*S, 2, 4));
    ctx.font = clamp(9*S, 7, 11) + 'px sans-serif';
    ctx.fillStyle = 'rgba(200,210,230,0.65)';
    ctx.fillText(ch.label, cx_chip + chipH * 0.90, rowY + chipH / 2 + clamp(5*S, 4, 7));

    ctx.textBaseline = 'alphabetic';
    x0 += cw + gap;
  }
}

// ── iter#5: CHAIN MILESTONE banner — centre-top during PLAY ────────────────
// Fires when player crosses chain x3/x5/x10. Positioned below HUD so it never
// overlaps the score/timer (top 56*S) and clears the playfield centre so
// chunk action stays visible. Auto-decays in ~1.6s.
// iter#8: SFX mute toggle — small circular speaker icon top-right corner.
// Drawn on MENU / LEVELEND / GAMEOVER (states where drawOverlay resets
// the buttons array). Click toggles SFX.toggleMute().
function drawMuteToggle() {
  var sz = clamp(36*S, 28, 44);
  var pad = clamp(12*S, 8, 16);
  var x = W - sz - pad, y = pad;
  ctx.save();
  ctx.fillStyle = 'rgba(20,30,55,0.78)';
  ctx.strokeStyle = 'rgba(160,200,255,0.45)';
  ctx.lineWidth = Math.max(1, 1.4*S);
  ctx.beginPath(); ctx.arc(x + sz/2, y + sz/2, sz/2, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.font = 'bold '+clamp(18*S, 14, 22)+'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = SFX.isMuted() ? '#ff6b6b' : '#bcd5e8';
  ctx.fillText(SFX.isMuted() ? '🔇' : '🔊', x + sz/2, y + sz/2 + 1*S);
  ctx.restore();
  buttons.push({ x:x, y:y, w:sz, h:sz, fn: function(){ SFX.toggleMute(); } });
}

function drawChainBanner() {
  if (chainBannerLife <= 0) return;
  var alpha = Math.min(1, chainBannerLife / 0.5);
  var pulse = 1 + Math.sin(chainBannerPulse) * 0.10;
  var fs = clamp(30*S, 22, 46);
  var by = (HUD_H + 38) * S;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, by);
  ctx.scale(pulse, pulse);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = chainBannerColor;
  ctx.shadowBlur = 22*S;
  ctx.fillStyle = chainBannerColor;
  ctx.fillText(chainBannerText, 0, 0);
  ctx.restore();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

// ── iter#14: PERFECT LAKE banner — fires when all tiles cleared on a level ──
// Positioned below chain banner (HUD_H + 80*S) so they don't collide.
// Gold gradient pill with star icons. 2s lifetime, bounce-in scale + fade.
function drawPerfectBanner() {
  if (perfectBannerLife <= 0) return;
  var alpha = Math.min(1, perfectBannerLife / 0.4);
  var t01 = Math.min(1, (2.0 - perfectBannerLife) / 0.25);
  var scl = 0.5 + 0.5 * t01;
  var pulse = 1 + Math.sin(perfectBannerPulse) * 0.07;
  var by = (HUD_H + 80) * S;
  ctx.save();
  ctx.translate(cx, by);
  ctx.scale(scl * pulse, scl * pulse);
  ctx.globalAlpha = alpha;
  var pillW = clamp(260*S, 200, 340);
  var pillH = clamp(44*S, 34, 56);
  var pillX = -pillW / 2, pillY = -pillH / 2;
  rr(ctx, pillX, pillY, pillW, pillH, pillH / 2);
  var grad = ctx.createLinearGradient(0, pillY, 0, pillY + pillH);
  grad.addColorStop(0, '#FFD700');
  grad.addColorStop(1, '#b08a00');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1.5 * S; ctx.stroke();
  var fs = clamp(16*S, 12, 22);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#1a1400';
  ctx.shadowColor = 'rgba(255,255,200,0.6)'; ctx.shadowBlur = 8 * S;
  ctx.fillText('★ ' + t('perfectLake') + '  ' + t('perfectBonus'), 0, 0);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.restore();
  ctx.globalAlpha = 1;
}

// ── MAIN LOOP ───────────────────────────────────────────────────────────────
function frame(ts) {
  var dt = Math.min((ts - lastTs) / 1000, 0.08);
  lastTs = ts;

  update(dt);

  var sx = 0, sy = 0;
  if (shake > 0) { sx=(Math.random()-0.5)*shake*10*S; sy=(Math.random()-0.5)*shake*10*S; }

  ctx.save();
  ctx.translate(sx, sy);
  ctx.fillStyle = '#0a1530';
  ctx.fillRect(-20, -20, W+40, H+40);

  if (gs === 'PLAYING' || gs === 'LEVELEND') {
    drawArena();

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
    }
    ctx.globalAlpha = 1;

    for (var i = 0; i < floats.length; i++) {
      var f = floats[i];
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.font = 'bold '+clamp(14*S,11,20)+'px sans-serif';
      ctx.fillStyle = f.col; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(f.txt, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    drawPickups(); // iter#10: floating speed-boost collectibles
    drawShip(ship.x, ship.y, ship.angle);
    drawHUD();
    drawChainBanner(); // iter#5
    drawPerfectBanner(); // iter#14
  }
  ctx.restore();

  if (gs === 'MENU') {
    ctx.fillStyle = '#0a1530'; ctx.fillRect(0,0,W,H);
    drawOverlay(t('title'), t('sub'), t('play'), function() { score=0; startLevel(1); });
    drawHullSwatches();
    drawUpgradeShop(); // iter#11: meta-upgrade shop below hull swatches
    drawDaySeedTag(); // iter#4: small "Day seed YYYYMMDD" tag near top
    drawAchievementBadges(); // iter#7: 5 emoji badges below day-seed tag
    drawMuteToggle(); // iter#8
  }
  if (gs === 'LEVELEND') {
    drawOverlay(t('complete'), t('score')+': '+score, t('next'),
      function() { startLevel(level+1); });
    drawDaySeedTag();
    drawMuteToggle(); // iter#8
  }
  if (gs === 'GAMEOVER') {
    if (score > best && score > 0) {
      best = score;
      newBestThisRun = true;
      try { localStorage.setItem('ice_best', best); } catch(e) {}
      SFX.newBest();
    }
    // iter#11: credit shards once per session (idempotent via shardsGranted flag)
    if (!shardsGrantedThisRun && score > 0) {
      shardsGrantedThisRun = true;
      creditShardsForRun(score);
    }
    // iter#1: RETRY routes through throttled interstitial (Yandex 4.1)
    drawOverlay(t('gameover'), t('score')+': '+score, t('retry'),
      function() { showInterstitial(function() { score=0; startLevel(level); }); });
    drawDaySeedTag(); // iter#4
    drawRunSummary(); // iter#13: frozen/thick clears + peak chain row

    // iter#2: NEW BEST! banner above the title — pulses gold
    if (newBestThisRun) {
      newBestPulse += 0.08;
      var nbFs = clamp(22*S, 16, 32);
      var nbY = cy - 110*S;
      var nbPulse = 1 + Math.sin(newBestPulse) * 0.06;
      ctx.save();
      ctx.translate(cx, nbY);
      ctx.scale(nbPulse, nbPulse);
      ctx.font = 'bold '+nbFs+'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(255,215,0,0.7)'; ctx.shadowBlur = 18*S;
      ctx.fillStyle = '#FFD700';
      ctx.fillText('★ '+t('newBest')+' ★', 0, 0);
      ctx.restore();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    }

    // iter#1: EXTRA TIME (rewarded ad). One revive per level; user-click only.
    if (!extraTimeUsed) {
      var _btnW = clamp(240*S, 160, 320), _btnH = clamp(52*S, 40, 66);
      var _btnY = cy + 26*S;
      var rW = _btnW, rH = clamp(42*S, 34, 54);
      var rX = cx - rW/2;
      var rY = _btnY + _btnH + 14*S;
      rr(ctx, rX, rY, rW, rH, rH/2);
      var gradR = ctx.createLinearGradient(rX, rY, rX, rY+rH);
      gradR.addColorStop(0, '#FFD700'); gradR.addColorStop(1, '#8a6a00');
      ctx.fillStyle = gradR; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1.4 * S;
      ctx.stroke();
      ctx.font = 'bold ' + clamp(14*S, 11, 18) + 'px sans-serif';
      ctx.fillStyle = '#1a1a2e';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('📺  ' + t('extraTime'), cx, rY + rH/2);
      ctx.textBaseline = 'alphabetic';
      buttons.push({ x: rX, y: rY, w: rW, h: rH, fn: showRewardedExtraTime });
    }
    drawMuteToggle(); // iter#8
    // iter#11: shard balance indicator bottom-left on GAMEOVER
    if (metaShards > 0 || shardsGrantedThisRun) {
      var _sFs = clamp(11*S, 9, 14);
      ctx.font = 'bold ' + _sFs + 'px sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = 'rgba(100,210,255,0.65)';
      ctx.fillText('❄ ' + t('shards') + ': ' + metaShards, 14*S, H - 14*S);
      ctx.textBaseline = 'alphabetic';
    }
  }

  // iter#7: achievement toast rendered LAST so it sits above HUD / overlays
  drawAchievementToast();

  requestAnimationFrame(frame);
}

// ── BOOT ────────────────────────────────────────────────────────────────────
var booted = false;
function boot() {
  if (booted) return;
  booted = true;
  try { best = parseInt(localStorage.getItem('ice_best')||'0')||0; } catch(e) {}
  try { bestChain = parseInt(localStorage.getItem('ice_chain_best')||'0')||0; } catch(e) {}
  loadHullChoice();
  loadAchievements(); // iter#7
  loadMeta(); // iter#11: load persistent shards + upgrade levels
  if (window.ysdk && window.ysdk.features && window.ysdk.features.LoadingAPI) {
    window.ysdk.features.LoadingAPI.ready();
  }
  gs = 'MENU';
  lastTs = performance.now();
  requestAnimationFrame(frame);
}

(function() {
  if (typeof YaGames === 'undefined') { boot(); return; }
  YaGames.init().then(function(ysdk) {
    window.ysdk = ysdk;
    try {
      var l = ysdk.environment && ysdk.environment.i18n && ysdk.environment.i18n.lang;
      if (l) lang = l.startsWith('ru') ? 'ru' : 'en';
    } catch(e) {}
    boot();
  }).catch(function() { boot(); });
  setTimeout(boot, 3000);
})();

})();
</script>
</body>
