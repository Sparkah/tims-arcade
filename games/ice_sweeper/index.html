function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function platformSafeInsets() {
  var shortWide = W / Math.max(1, H) > 1.55 && H <= 720;
  return {
    right: shortWide ? clamp(W * 0.075, 52, 150) : 0,
    bottom: (shortWide || H < 620) ? clamp(H * 0.11, 48, 92) : 0
  };
}
function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ── iter#4: DAILY SEED - same lake layout for every player today ────────────
// Mulberry32 deterministic PRNG seeded from YYYYMMDD ^ level so the dirty-tile
// pattern, wobble phases, and crack-pattern choices are identical for every
// player on the same calendar day. Chasing the same lake creates the
// "race-the-day" hook: come back tomorrow for a fresh layout.
function makeRng(seed) {
  var s = seed | 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    var t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function getDaySeed() {
  var d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}
function getDayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
var levelRng = Math.random; // re-bound per startLevel from daily seed ^ level

var THICK_ICE_CHANCE = 0.20;
var THICK_ICE_BONUS = 20;

// glow, snowflake + X cross markings. On clear: +40 pts bonus AND +2 shards
// deposited directly into the meta-currency pool (reward for the hardest tiles).
// Compounds with all existing systems: chain multiplier applies, neighbour
// crack-boost is tileMax-aware, sound crack events scale.
var FROZEN_CRACK_MAX  = 7;
var FROZEN_ICE_CHANCE = 0.08;   // % of dirty tiles after thick allocation
var FROZEN_ICE_BONUS  = 40;
var FROZEN_SHARD_DROP = 2;      // extra shards granted to meta on clear

// milestone#3: LAYERED ICE - the player's headline request ("2-3 layered
// breakable layers, deeper layers reveal/score differently"). A layered tile
// is NOT just a hit-count variant: it is broken DOWN through 3 visually-distinct
// strata, each revealed only when the one above is gone, each scoring more:
//   layer 0  SNOW CRUST  (white, soft)   - 2 hits  -> +6 pts,  reveals blue ice
//   layer 1  BLUE ICE    (cyan, solid)   - 3 hits  -> +14 pts, reveals the core
//   layer 2  DEEP CORE   (gold, glowing) - 2 hits  -> +30 pts + 3 shards, DEEP CORE! banner
// The crack progress is per-layer; clearing the whole stack (all 7 hits) clears
// the tile. Deep cores feed the 'deep' daily quest. Sits OUTSIDE thick/frozen
// (a layered tile is none of those). ~9% of dirty tiles.
var LAYERED_ICE_CHANCE = 0.09;
var LAYER_HITS  = [2, 3, 2];          // hits to break each layer (total 7)
var LAYER_PTS   = [6, 14, 30];        // score per layer cleared
var LAYER_DEEP_SHARDS = 3;            // shards on smashing the deep core
function layeredTotalHits(){ return LAYER_HITS[0] + LAYER_HITS[1] + LAYER_HITS[2]; } // 7

// grants +5s time and a 3s speed burst (1.7× normal speed). Only one boost
// active at a time (extras accumulate but never more than MAX_PICKUPS).
// Compounds with thick ice (thick tiles can also be boost tiles) and chain

var BOOST_PICKUP_LIFE  = 5.0;     // seconds pickup floats before expiry
var MAX_PICKUPS        = 4;       // max simultaneous pickups on grid

// iter#7: ACHIEVEMENTS - five persistent milestones with on-screen toast
// when first unlocked. Persisted as bitmask under 'ice_achievements'.
// Compounds with iter#1 (best), iter#3 (palette unlocks), iter#5 (chain
// tiers), iter#6 (best chain): each axis already encourages exploration;
// achievements layer concrete named goals over the top, so the player
// sees discrete unlock moments rather than a sea of numbers.
var ACHIEVEMENTS = [
  { id: 'first',    bit: 1,  icon: '', nameKey: 'ach_first',    cond: function(ev){ return ev.firstClear === true; } },
  { id: 'combo',    bit: 2,  icon: '', nameKey: 'ach_combo',    cond: function(ev){ return ev.chainHit >= 5; } },
  { id: 'inferno',  bit: 4,  icon: '', nameKey: 'ach_inferno',  cond: function(ev){ return ev.chainHit >= 10; } },
  { id: 'score500', bit: 8,  icon: '', nameKey: 'ach_score500', cond: function(ev){ return ev.score >= 500; } },
  { id: 'score1500',bit: 16, icon: '', nameKey: 'ach_score1500',cond: function(ev){ return ev.score >= 1500; } },
];
var achMask = 0;
var achToast = null; // { ach, life, pulse } - active unlock toast (top-of-screen)
function loadAchievements() {
  try { achMask = parseInt(localStorage.getItem('ice_achievements')||'0')||0; } catch(e) { achMask = 0; }
}
function saveAchievements() {
  try { localStorage.setItem('ice_achievements', String(achMask)); } catch(e) {}
}
function isAchUnlocked(a) { return (achMask & a.bit) !== 0; }
function fireAchievementToast(a) {
  achToast = { ach: a, life: 2.5, pulse: 0 };
}
// Call sites: tile-clear (firstClear + chainHit), level-clear (score), gameover (score)
function checkAchievements(ev) {
  for (var i = 0; i < ACHIEVEMENTS.length; i++) {
    var a = ACHIEVEMENTS[i];
    if (isAchUnlocked(a)) continue;
    if (a.cond(ev)) {
      achMask |= a.bit;
      saveAchievements();
      fireAchievementToast(a);
      SFX.achievement();
    }
  }
}

// iter#8: SFX - synthesized WebAudio sound design (no external assets).
// All sounds are short envelope-shaped oscillator blips so the bundle stays
// zero-asset. AudioContext is created lazily on first user gesture (Chrome
// autoplay policy). 'M' key (or sfxMute button on MENU/GAMEOVER) toggles a
// persistent mute, stored in 'ice_sfx_mute' localStorage. crack is throttled
// (≥70ms between plays) so contact-spam doesn't blow out the mixer.
var SFX = (function() {
  var ctx = null;
  var muted = false;
  try { muted = localStorage.getItem('ice_sfx_mute') === '1'; } catch(e) {}
  var lastCrack = 0;
  function ensureCtx() {
    if (ctx) return ctx;
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();
    } catch(e) { ctx = null; }
    return ctx;
  }
  function blip(freq, dur, type, gain, slide) {
    if (muted) return;
    var c = ensureCtx(); if (!c) return;
    try {
      if (c.state === 'suspended') c.resume();
      var t = c.currentTime;
      var osc = c.createOscillator();
      var g = c.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, t);
      if (slide) osc.frequency.linearRampToValueAtTime(slide, t + dur);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(Math.max(0.0001, gain || 0.18), t + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(g); g.connect(c.destination);
      osc.start(t); osc.stop(t + dur + 0.02);
    } catch(e) {}
  }
  function noise(dur, gain, hp) {
    if (muted) return;
    var c = ensureCtx(); if (!c) return;
    try {
      if (c.state === 'suspended') c.resume();
      var t = c.currentTime;
      var n = Math.max(1, Math.floor(c.sampleRate * dur));
      var buf = c.createBuffer(1, n, c.sampleRate);
      var data = buf.getChannelData(0);
      for (var i = 0; i < n; i++) data[i] = (Math.random()*2-1) * (1 - i/n);
      var src = c.createBufferSource(); src.buffer = buf;
      var g = c.createGain(); g.gain.value = gain || 0.12;
      if (hp) {
        var f = c.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
        src.connect(f); f.connect(g);
      } else { src.connect(g); }
      g.connect(c.destination);
      src.start(t);
    } catch(e) {}
  }
  function chord(freqs, dur, type, gain) {
    for (var i = 0; i < freqs.length; i++) blip(freqs[i], dur, type, (gain||0.14) / Math.max(1, freqs.length*0.7));
  }
  return {
    isMuted: function() { return muted; },
    toggleMute: function() {
      muted = !muted;
      try { localStorage.setItem('ice_sfx_mute', muted ? '1' : '0'); } catch(e) {}
      if (!muted) blip(660, 0.08, 'square', 0.14);
      return muted;
    },
    crack: function() {
      var now = performance.now();
      if (now - lastCrack < 70) return; lastCrack = now;
      noise(0.06, 0.08, 1800);
    },
    pop: function(chainN) {
      var base = 520 + Math.min(12, (chainN||1)) * 40;
      blip(base, 0.11, 'triangle', 0.18, base * 1.35);
    },
    chainTier: function(tier) {
      // tier 1: HOT (C-E-G), 2: BLAZE (E-G-B), 3: INFERNO (G-B-D + low rumble)
      if (tier === 1) chord([523, 659, 784], 0.22, 'triangle', 0.16);
      else if (tier === 2) { chord([659, 784, 988], 0.28, 'sawtooth', 0.14); noise(0.12, 0.06, 600); }
      else { chord([784, 988, 1175, 1568], 0.36, 'sawtooth', 0.14); noise(0.22, 0.10, 200); }
    },
    achievement: function() {
      // ascending arpeggio
      blip(523, 0.11, 'triangle', 0.18);
      setTimeout(function(){ blip(659, 0.11, 'triangle', 0.18); }, 90);
      setTimeout(function(){ blip(784, 0.11, 'triangle', 0.18); }, 180);
      setTimeout(function(){ blip(1047, 0.22, 'triangle', 0.20); }, 270);
    },
    newBest: function() {
      blip(880, 0.14, 'square', 0.16, 1320);
      setTimeout(function(){ blip(1320, 0.20, 'square', 0.16, 1760); }, 130);
    },
    levelEnd: function() {
      blip(523, 0.10, 'triangle', 0.18);
      setTimeout(function(){ blip(659, 0.10, 'triangle', 0.18); }, 90);
      setTimeout(function(){ blip(784, 0.18, 'triangle', 0.20); }, 180);
    },
    gameOver: function() {
      blip(330, 0.18, 'sawtooth', 0.16, 220);
      setTimeout(function(){ blip(220, 0.30, 'sawtooth', 0.16, 110); }, 160);
    },
    ui: function() { blip(880, 0.05, 'square', 0.10); },
    extraTime: function() {
      blip(659, 0.10, 'triangle', 0.18);
      setTimeout(function(){ blip(988, 0.16, 'triangle', 0.20); }, 90);
    },
    // iter#10: boost collected - bright electric zap
    boostCollect: function() {
      blip(1047, 0.06, 'square', 0.18);
      setTimeout(function(){ blip(1319, 0.06, 'square', 0.18); }, 50);
      setTimeout(function(){ blip(1760, 0.14, 'square', 0.22, 2200); }, 100);
      noise(0.08, 0.07, 1200);
    }
  };
})();

// ── milestone#1: BACKGROUND MUSIC (procedural WebAudio loop - no asset file) ──
// Calm, drifting arctic-ambient bed: a slow sine pad arpeggio over a soft pulse,
// minor-key, ~76 BPM. Zero assets, respects the SAME mute flag as SFX
// (SFX.isMuted()), starts on the first user gesture (autoplay policy), suspends
// on tab-hide and during ads (Yandex 1.3 / 4.7). Satisfies the presubmit #12
// "background music" gate (both AudioContext + a music marker present).
// Pattern ref: Knowledge/Game Build Hygiene.md #197 (rage_room procedural fallback).
var MUS = { ctx:null, master:null, on:false, step:0, bar:0, nextT:0, timer:null, bpm:76, held:false };
// Cmin pentatonic-ish drift - gentle, non-fatiguing for a long casual session.
var MUS_PAD  = [130.81, 155.56, 196.00, 233.08];           // C3 Eb3 G3 Bb3 (slow pad cycle)
var MUS_ARP  = [523.25, 622.25, 783.99, 622.25, 698.46, 783.99, 932.33, 783.99]; // C5..Bb5 sparkle
var MUS_BASS = [65.41, 0, 0, 0, 98.00, 0, 0, 0];           // C2 / G2 every half-bar
function musEnsure() {
  if (MUS.ctx) return;
  try { MUS.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return; }
  MUS.master = MUS.ctx.createGain(); MUS.master.gain.value = 0; MUS.master.connect(MUS.ctx.destination);
}
function musTone(freq, t, dur, type, gain, slideTo) {
  if (!MUS.ctx) return;
  var o = MUS.ctx.createOscillator(), g = MUS.ctx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(gain, t + dur * 0.25);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(MUS.master); o.start(t); o.stop(t + dur + 0.03);
}
function musSchedule() {
  if (!MUS.ctx) { MUS.timer = setTimeout(musSchedule, 60); return; }
  // gentle bed; mute mirrors the SFX mute flag
  MUS.master.gain.value = SFX.isMuted() ? 0 : 0.16;
  if (MUS.nextT < MUS.ctx.currentTime) MUS.nextT = MUS.ctx.currentTime + 0.06; // no catch-up burst
  var spb = 60 / MUS.bpm / 2; // 8th-note seconds
  while (MUS.nextT < MUS.ctx.currentTime + 0.18) {
    var s = MUS.step % 8;
    if (s === 0) MUS.bar++;
    if (!SFX.isMuted()) {
      // soft pad chord at the top of each bar (long, overlapping)
      if (s === 0) {
        var root = MUS_PAD[MUS.bar % MUS_PAD.length];
        musTone(root, MUS.nextT, spb * 7, 'sine', 0.10);
        musTone(root * 1.5, MUS.nextT, spb * 7, 'sine', 0.05);
      }
      // bass pulse
      if (MUS_BASS[s]) musTone(MUS_BASS[s], MUS.nextT, spb * 1.6, 'triangle', 0.10);
      // sparse high arpeggio sparkle - only on alternate bar-pairs so it breathes
      if (MUS.bar % 2 === 0 && s % 2 === 0) musTone(MUS_ARP[(s + MUS.bar) % MUS_ARP.length], MUS.nextT, spb * 1.2, 'sine', 0.035);
    }
    MUS.nextT += spb; MUS.step++;
  }
  MUS.timer = setTimeout(musSchedule, 40);
}
function startMusic() {
  musEnsure(); if (!MUS.ctx) return;
  if (MUS.ctx.state === 'suspended' && !MUS.held) { try { MUS.ctx.resume(); } catch(e){} }
  if (MUS.on) return;
  MUS.on = true; MUS.step = 0; MUS.bar = 0; MUS.nextT = MUS.ctx.currentTime + 0.08;
  musSchedule();
}
// pauseAudio / resumeAudio - used by ad callbacks (4.7) + tab-hide (1.3). One
// audioHeld guard so a tab-hide during an ad doesn't double-resume.
function pauseAudio() {
  MUS.held = true;
  if (MUS.ctx && MUS.ctx.state === 'running') { try { MUS.ctx.suspend(); } catch(e){} }
}
function resumeAudio() {
  MUS.held = false;
  if (MUS.ctx && MUS.ctx.state === 'suspended' && !SFX.isMuted()) { try { MUS.ctx.resume(); } catch(e){} }
}

var chainBannerLife = 0;

// ── iter#11: META-UPGRADES - persistent shard currency + 3 purchasable buffs ─
// Players earn shards each run: floor(score / 100), credited on GAMEOVER.
// Three upgrades, each with a max level; purchased on the MENU between runs.
// Persisted in localStorage: 'ice_shards' (integer) + 'ice_upgrades' (JSON).
//
// Upgrade defs:  id | name key | desc key | cost per lvl | max lvl | effect
//   upg_time:  +5s base time per level purchased (max 3 = +15s extra)
//   upg_thick: +50% thick-ice bonus per level (max 2 = THICK_ICE_BONUS * 2)
//   upg_speed: +8% ship speed per level (max 2 = +16%)
var META_UPGRADES = [
  { id:'upg_time',  nameKey:'upg_time',  descKey:'upg_time_desc',  cost:10, maxLvl:3 },
  { id:'upg_thick', nameKey:'upg_thick', descKey:'upg_thick_desc', cost:15, maxLvl:2 },
  { id:'upg_speed', nameKey:'upg_speed', descKey:'upg_speed_desc', cost:20, maxLvl:2 },
];
var metaShards = 0;
var metaUpgLvls = [0, 0, 0];  // parallel to META_UPGRADES

function loadMeta() {
  try { metaShards = Math.max(0, parseInt(localStorage.getItem('ice_shards') || '0') || 0); } catch(e) {}
  try {
    var raw = JSON.parse(localStorage.getItem('ice_upgrades') || '[]');
    if (Array.isArray(raw)) {
      for (var i = 0; i < META_UPGRADES.length; i++) {
        metaUpgLvls[i] = Math.min(META_UPGRADES[i].maxLvl, Math.max(0, parseInt(raw[i] || 0) || 0));
      }
    }
  } catch(e) {}
}
function saveMeta() {
  try { localStorage.setItem('ice_shards', String(metaShards)); } catch(e) {}
  try { localStorage.setItem('ice_upgrades', JSON.stringify(metaUpgLvls)); } catch(e) {}
}
function purchaseUpgrade(i) {
  var upg = META_UPGRADES[i];
  if (!upg) return;
  if (metaUpgLvls[i] >= upg.maxLvl) return;
  if (metaShards < upg.cost) return;
  metaShards -= upg.cost;
  metaUpgLvls[i]++;
  saveMeta();
  SFX.achievement();
}
// Computed effective values (applied in startLevel / game constants)
function metaExtraTime()  { return metaUpgLvls[0] * 5; }           // seconds
function metaThickMult()  { return 1 + metaUpgLvls[1] * 0.50; }   // multiplier on THICK_ICE_BONUS
function metaSpeedMult()  { return 1 + metaUpgLvls[2] * 0.08; }   // multiplier on SHIP_SPEED_BASE
// Credit shards earned this run (called at GAMEOVER before rendering)
function creditShardsForRun(runScore) {
  var earned = Math.max(0, Math.floor(runScore / 100));
  // milestone#1: Prospector tool multiplies shard earnings
  // milestone#3: Frost Pass (+25% forever) + limited-time event (x2) stack
  earned = Math.round(earned * toolVal('shardMult', 1) * passShardMult() * eventShardMult());
  if (earned > 0) { metaShards += earned; saveMeta(); saveMeta2(); }
  return earned;
}

// ═══════════════════════════════════════════════════════════════════════════
// milestone#1 - CORE META LOOP: ICE TOOLS (playtime-milestone items)
// milestone#2 - REASON TO RETURN: daily login + streak + quests + idle accrual
//
// One unified persistent record `meta2` (localStorage 'ice_meta2'), versioned,
// corruption-safe (try/catch + clamps). The OLD shard pool (metaShards) and the
// 3 legacy upgrades stay as-is (additive) - shards are the single soft currency
// that BOTH the legacy upgrades and the new tool upgrades spend.
//
// The retention triangle:
//   playtime  -> unlocks tools on a fixed ladder ("next tool in N min" in-HUD)
//   daily     -> grants shards + a quest set + overnight idle haul (come-back)
//   equip+upg -> tools fold a passive boost into each run; shards upgrade them
// ═══════════════════════════════════════════════════════════════════════════

// Fixed TOOL ladder. Unlocked at cumulative playtime minutes. Each tool equips
// into one of TOOL_SLOTS (3) and folds a passive boost into the run at start.
// stat ids: crackMul (crack speed), deepMul (deep-layer crack), radius (neighbour
// boost), startTime (+sec), magnet (boost pull radius mult), shardMult.
// Icons are VECTOR-drawn (drawToolIcon) - NEVER emoji (Build Hygiene #1).
var TOOL_SLOTS = 3;
var TOOLS = [
  { id:'pick',    min:5,  col:'#ffcf5c', nameKey:'tool_pick',    descKey:'tool_pick_d',    stat:'crackMul',  per:0.18 },
  { id:'auger',   min:15, col:'#7fd0ff', nameKey:'tool_auger',   descKey:'tool_auger_d',   stat:'deepMul',   per:0.22 },
  { id:'crusher', min:25, col:'#b08bff', nameKey:'tool_crusher', descKey:'tool_crusher_d', stat:'radius',    per:0.18 },
  { id:'melt',    min:45, col:'#ff8f6b', nameKey:'tool_melt',    descKey:'tool_melt_d',    stat:'startTime', per:8    },
  { id:'magnet',  min:70, col:'#5ce0a8', nameKey:'tool_magnet',  descKey:'tool_magnet_d',  stat:'magnet',    per:0.35 },
  { id:'prosp',   min:100,col:'#ffd700', nameKey:'tool_prosp',   descKey:'tool_prosp_d',   stat:'shardMult', per:0.30 },
];
function toolDef(id){ for(var i=0;i<TOOLS.length;i++) if(TOOLS[i].id===id) return TOOLS[i]; return null; }

// Daily reward ladder (7-day cycle, escalating). Day 7 is the big payout.
var DAILY_REWARDS = [8, 12, 16, 22, 30, 40, 60];

var META2_V = 1;
var meta2 = null;     // populated by loadMeta2()
var toolBoostCache = {};  // folded per-run in resetToolBoosts()
var playSecSinceSave = 0; // throttle: flush playtime every ~10s, not per frame

function defaultMeta2() {
  return {
    v: META2_V,
    totalPlaySec: 0,           // cumulative playtime (slow climbing meter)
    tools: {},                 // { id: {lvl:1} } owned + upgrade level
    equipped: [null,null,null],// loadout (tool ids)
    lastDayKey: '',            // last calendar day we granted the daily
    streak: 0,                 // consecutive-day login streak
    dailyClaimed: false,       // claimed today's login reward yet
    questDayKey: '',           // day the current quest set was rolled
    quests: [],                // [{id, type, target, prog, reward, claimed}]
    lastSeenMs: 0,             // for overnight idle accrual
    idlePending: 0,            // shards waiting to be collected from the dock
  };
}
function loadMeta2() {
  try {
    var raw = JSON.parse(localStorage.getItem('ice_meta2') || 'null');
    if (raw && typeof raw === 'object') {
      meta2 = defaultMeta2();
      meta2.totalPlaySec = Math.max(0, +raw.totalPlaySec || 0);
      if (raw.tools && typeof raw.tools === 'object') {
        for (var id in raw.tools) {
          if (toolDef(id)) meta2.tools[id] = { lvl: Math.min(5, Math.max(1, (raw.tools[id] && +raw.tools[id].lvl) || 1)) };
        }
      }
      if (Array.isArray(raw.equipped)) {
        for (var i=0;i<TOOL_SLOTS;i++) {
          var e = raw.equipped[i];
          meta2.equipped[i] = (e && toolDef(e) && meta2.tools[e]) ? e : null;
        }
      }
      meta2.lastDayKey   = String(raw.lastDayKey || '');
      meta2.streak       = Math.max(0, +raw.streak || 0);
      meta2.dailyClaimed = !!raw.dailyClaimed;
      meta2.questDayKey  = String(raw.questDayKey || '');
      meta2.quests       = Array.isArray(raw.quests) ? raw.quests : [];
      meta2.lastSeenMs   = Math.max(0, +raw.lastSeenMs || 0);
      meta2.idlePending  = Math.max(0, Math.min(9999, +raw.idlePending || 0));
      return;
    }
  } catch(e) {}
  meta2 = defaultMeta2();
}
function saveMeta2() {
  if (!meta2) return;
  try { localStorage.setItem('ice_meta2', JSON.stringify(meta2)); } catch(e) {}
}

// ── playtime tools ──────────────────────────────────────────────────────────
function toolOwned(id){ return !!(meta2 && meta2.tools[id]); }
function toolLvl(id){ return (meta2 && meta2.tools[id]) ? meta2.tools[id].lvl : 0; }
function nextToolDef() {           // first not-yet-unlocked tool on the ladder
  for (var i=0;i<TOOLS.length;i++) if (!toolOwned(TOOLS[i].id)) return TOOLS[i];
  return null;
}
function playMinutes(){ return (meta2 ? meta2.totalPlaySec : 0) / 60; }
// Grant any tools whose playtime threshold is now met. Auto-equip the first ones
// into free slots so the boost is felt immediately. Fires an unlock toast.
function checkToolUnlocks() {
  if (!meta2) return;
  var mins = playMinutes();
  for (var i=0;i<TOOLS.length;i++) {
    var td = TOOLS[i];
    if (!toolOwned(td.id) && mins >= td.min) {
      meta2.tools[td.id] = { lvl: 1 };
      // auto-equip into first free slot
      for (var s=0;s<TOOL_SLOTS;s++) { if (!meta2.equipped[s]) { meta2.equipped[s] = td.id; break; } }
      saveMeta2();
      fireToolToast(td);
    }
  }
}
var toolToast = null; // { td, life }
function fireToolToast(td){ toolToast = { td: td, life: 3.0 }; SFX.achievement(); }
function toggleEquipTool(id) {
  if (!meta2 || !toolOwned(id)) return;
  var slot = meta2.equipped.indexOf(id);
  if (slot >= 0) { meta2.equipped[slot] = null; saveMeta2(); SFX.ui(); return; }
  // equip into a free slot, else replace slot 0 (oldest)
  var free = meta2.equipped.indexOf(null);
  if (free >= 0) meta2.equipped[free] = id;
  else meta2.equipped[0] = id;
  saveMeta2(); SFX.ui();
}
// Upgrade cost scales with tool tier (min) + level. Spends the shared shard pool.
function toolUpCost(id) {
  var td = toolDef(id); if (!td) return 9999;
  var lvl = toolLvl(id);
  return Math.round((6 + td.min * 0.30) * Math.pow(1.55, lvl - 1));
}
function upgradeTool(id) {
  if (!meta2 || !toolOwned(id)) return;
  var lvl = toolLvl(id); if (lvl >= 5) return;
  var cost = toolUpCost(id);
  if (metaShards < cost) return;
  metaShards -= cost; meta2.tools[id].lvl++;
  saveMeta(); saveMeta2(); SFX.achievement();
}
// Fold equipped tools' boosts into a cache once per run-start. Read via toolVal().
function resetToolBoosts() {
  toolBoostCache = { crackMul:1, deepMul:1, radius:0, startTime:0, magnet:1, shardMult:1 };
  if (!meta2) return;
  for (var s=0;s<TOOL_SLOTS;s++) {
    var id = meta2.equipped[s]; if (!id) continue;
    var td = toolDef(id); if (!td) continue;
    var lvl = toolLvl(id);
    var amount = td.per * lvl;
    if (td.stat === 'crackMul')  toolBoostCache.crackMul  += amount;
    else if (td.stat === 'deepMul')   toolBoostCache.deepMul   += amount;
    else if (td.stat === 'radius')    toolBoostCache.radius    += amount;
    else if (td.stat === 'startTime') toolBoostCache.startTime += amount;
    else if (td.stat === 'magnet')    toolBoostCache.magnet    += amount;
    else if (td.stat === 'shardMult') toolBoostCache.shardMult += amount;
  }
}
function toolVal(stat, base) {
  var v = toolBoostCache[stat];
  return (typeof v === 'number') ? v : (base != null ? base : 0);
}

// ── milestone#2: daily login + streak + idle ─────────────────────────────────
// Returns days-difference between two YYYY-MM-DD keys (0 same day, 1 consecutive).
function dayKeyDiff(a, b) {
  if (!a || !b) return 99;
  var pa = a.split('-'), pb = b.split('-');
  var da = Date.UTC(+pa[0], +pa[1]-1, +pa[2]);
  var db = Date.UTC(+pb[0], +pb[1]-1, +pb[2]);
  return Math.round((db - da) / 86400000);
}
function rollQuestsIfNewDay(dk) {
  if (!meta2) return;
  if (meta2.questDayKey === dk && meta2.quests && meta2.quests.length) return;
  // Deterministic-ish 3 quests; seeded from the day so all players share today's set.
  var rng = makeRng(getDaySeed() ^ 0x51ab);
  var pool = [
    { type:'clear',   target: 25 + Math.floor(rng()*20),  reward: 14, key:'questClear' },
    { type:'frozen',  target: 2 + Math.floor(rng()*3),    reward: 18, key:'questFrozen' },
    { type:'chain',   target: 5 + Math.floor(rng()*4),    reward: 16, key:'questChain' },
    { type:'perfect', target: 1 + Math.floor(rng()*2),    reward: 20, key:'questPerfect' },
    { type:'deep',    target: 3 + Math.floor(rng()*4),    reward: 22, key:'questDeep' },
  ];
  // pick 3 distinct
  var picks = [];
  while (picks.length < 3 && pool.length) picks.push(pool.splice(Math.floor(rng()*pool.length),1)[0]);
  meta2.quests = picks.map(function(q){ return { type:q.type, target:q.target, prog:0, reward:q.reward, claimed:false, key:q.key }; });
  meta2.questDayKey = dk;
  saveMeta2();
}
// Called at boot. Handles: streak update, overnight idle accrual, new-day quests.
// Sets dailyPopupQueued / idlePopupQueued so the MENU can show the popups.
var dailyPopupQueued = false;
var idlePopupQueued = false;
function processDailyOnBoot() {
  if (!meta2) return;
  var dk = getDayKey();
  var now = Date.now();
  // ── overnight idle accrual: dock collects shards while away (capped ~10h) ──
  // Rate: equipped Prospector boosts it; base ~1 shard / 8 min, capped at 75.
  if (meta2.lastSeenMs > 0) {
    var awaySec = Math.max(0, (now - meta2.lastSeenMs) / 1000);
    if (awaySec > 120) { // only if away > 2 min (avoid refresh spam)
      var IDLE_CAP_SEC = 10 * 3600;
      var capped = Math.min(awaySec, IDLE_CAP_SEC);
      var rate = 1 / (8 * 60); // shards per second
      var gained = Math.floor(capped * rate);
      if (gained > 0) { meta2.idlePending = Math.min(9999, meta2.idlePending + gained); }
    }
  }
  if (meta2.idlePending > 0) idlePopupQueued = true;

  // ── daily login + streak ──
  var diff = dayKeyDiff(meta2.lastDayKey, dk);
  if (meta2.lastDayKey === '' || diff >= 1) {
    // new calendar day (or first ever)
    if (diff === 1) meta2.streak = (meta2.streak || 0) + 1;       // consecutive
    else meta2.streak = 1;                                        // streak reset / first
    meta2.lastDayKey = dk;
    meta2.dailyClaimed = false;
    dailyPopupQueued = true;
  }
  rollQuestsIfNewDay(dk);
  meta2.lastSeenMs = now;
  saveMeta2();
}
function dailyRewardAmount() {
  var idx = ((meta2 ? meta2.streak : 1) - 1) % DAILY_REWARDS.length;
  if (idx < 0) idx = 0;
  return DAILY_REWARDS[idx];
}
function claimDailyReward() {
  if (!meta2 || meta2.dailyClaimed) return;
  metaShards += dailyRewardAmount();
  meta2.dailyClaimed = true;
  saveMeta(); saveMeta2(); SFX.newBest();
}
function collectIdle(multiplier) {
  if (!meta2 || meta2.idlePending <= 0) return 0;
  var amt = meta2.idlePending * (multiplier || 1);
  metaShards += amt; meta2.idlePending = 0;
  saveMeta(); saveMeta2(); SFX.extraTime();
  return amt;
}
// Quest progress: called from gameplay events. Updates in memory; saves only on
// a real change AND on completion (Build Hygiene #2 - never per-frame setItem).
function questProgress(type, n) {
  if (!meta2 || !meta2.quests) return;
  var changed = false, completedNow = false;
  for (var i=0;i<meta2.quests.length;i++) {
    var q = meta2.quests[i];
    if (q.type !== type || q.claimed) continue;
    if (q.prog >= q.target) continue;
    var before = q.prog;
    if (type === 'chain') { if (n > q.prog) { q.prog = Math.min(q.target, n); } } // chain = best-so-far
    else { q.prog = Math.min(q.target, q.prog + (n||1)); }
    if (q.prog !== before) { changed = true; if (q.prog >= q.target) completedNow = true; }
  }
  if (completedNow) { saveMeta2(); SFX.pop(3); }   // a save point + a chime when one fills
}
function claimableQuestCount() {
  if (!meta2 || !meta2.quests) return 0;
  var n = 0;
  for (var i=0;i<meta2.quests.length;i++) { var q = meta2.quests[i]; if (!q.claimed && q.prog >= q.target) n++; }
  return n;
}
function claimQuest(i) {
  if (!meta2 || !meta2.quests[i]) return;
  var q = meta2.quests[i];
  if (q.claimed || q.prog < q.target) return;
  q.claimed = true; metaShards += q.reward;
  saveMeta(); saveMeta2(); SFX.achievement();
}
// Persist meta at run-end (playtime + lastSeen). Idempotent.
function onRunEnd() {
  if (!meta2) return;
  meta2.lastSeenMs = Date.now();
  playSecSinceSave = 0;
  saveMeta2();
}
// Periodic in-play flush so a tab-close mid-run doesn't lose minutes of playtime
// (called from update each frame but only writes every ~10s - Build Hygiene #2).
function flushPlaytimeIfDue() {
  if (meta2 && playSecSinceSave >= 10) { playSecSinceSave = 0; meta2.lastSeenMs = Date.now(); saveMeta2(); }
}

var touch = { active: false, dx: 0, dy: 0, sx: 0, sy: 0, id: null };
// milestone#1/#2: dispatch a tap to the topmost interactive layer. Returns true
// if a meta/popup rect consumed it (so gameplay touch-steer is suppressed).
function dispatchOverlayTap(px, py) {
  // popups sit ABOVE everything (modal)
  if (popupRects.length) {
    for (var i = 0; i < popupRects.length; i++) {
      var r = popupRects[i];
      if (px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h) { r.fn(); return true; }
    }
    return true; // modal: swallow taps outside the buttons too
  }
  if (metaOpen) {
    for (var j = 0; j < metaRects.length; j++) {
      var m = metaRects[j];
      if (px >= m.x && px <= m.x + m.w && py >= m.y && py <= m.y + m.h) { m.fn(); return true; }
    }
    return true; // modal
  }
  return false;
}
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t0 = e.changedTouches[0];
  // tutorial first: let the real action fall through, block stray taps
  if (typeof handleTutorialTap === 'function' && handleTutorialTap(t0.clientX, t0.clientY)) return;
  if (dispatchOverlayTap(t0.clientX, t0.clientY)) return;
  touch.active = true; touch.id = t0.identifier;
  touch.sx = t0.clientX; touch.sy = t0.clientY;
  touch.dx = 0; touch.dy = 0;
  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    if (t0.clientX >= b.x && t0.clientX <= b.x+b.w && t0.clientY >= b.y && t0.clientY <= b.y+b.h) { SFX.ui(); b.fn(); }
  }
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t0 = e.changedTouches[i];
    if (t0.identifier !== touch.id) continue;
    var dx = t0.clientX - touch.sx, dy = t0.clientY - touch.sy;
    var d = Math.sqrt(dx*dx + dy*dy);
    if (d > 8) { touch.dx = dx / Math.max(d, 50); touch.dy = dy / Math.max(d, 50); }
  }
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === touch.id) {
      touch.active = false; touch.dx = 0; touch.dy = 0;
    }
  }
}, { passive: false });
canvas.addEventListener('click', function(e) {
  if (typeof handleTutorialTap === 'function' && handleTutorialTap(e.clientX, e.clientY)) return;
  if (dispatchOverlayTap(e.clientX, e.clientY)) return;
  for (var i = 0; i < buttons.length; i++) {
    var b = buttons[i];
    if (e.clientX >= b.x && e.clientX <= b.x+b.w && e.clientY >= b.y && e.clientY <= b.y+b.h) { SFX.ui(); b.fn(); }
  }
});

// ── LEVEL SETUP ─────────────────────────────────────────────────────────────
function gridArea() {
  var inset = platformSafeInsets();
  var pad = 14 * S;
  var top = (HUD_H + 6) * S;
  return { x: pad, y: top, w: W - pad*2 - inset.right, h: H - top - pad - inset.bottom };
}

function startLevel(lvl) {
  level = lvl;
  particles = []; floats = []; buttons = [];
  chain = 0; chainTimer = 0; shake = 0;
  chainTierShown = 0; chainBannerLife = 0;
  cleared = 0;
  newBestThisRun = false; newBestPulse = 0;
  newChainBestThisRun = false;
  // iter#11: reset shard-credit flag each run (level 1 resets on PLAY; subsequent
  // levels share the run so only reset on level 1 to avoid multi-crediting)
  if (lvl === 1) {
    shardsGrantedThisRun = false;
    // iter#13: reset per-run stats on new run start (level 1)
    frozenClearedRun = 0;
    thickClearedRun = 0;
    peakChainRun = 0;
    // iter#14: reset perfect-clear counter on new run
    perfectLevelsRun = 0;
  }
  // iter#14: reset banner on each level start
  perfectBannerLife = 0;
  // iter#10: reset pickups and active speed boost each level
  pickups = [];
  speedBoostTimer = 0;
  // iter#1: reset the rewarded-ad slot each level
  extraTimeUsed = false; extraTimeLoading = false;
  // milestone#1: fold equipped-tool boosts into this run (once, at level start)
  resetToolBoosts();
  // iter#11 + milestone#1: legacy upg_time + Slow-Melt Hull tool both add start seconds
  timeLeft = Math.max(45, 100 - (lvl - 1) * 7) + metaExtraTime() + toolVal('startTime', 0);
  // milestone#3: deep-core run stats reset on level 1 (shared run)
  if (lvl === 1) { deepCoresRun = 0; activateTutorialIfArmed(); }
  deepBannerLife = 0;

  // grid grows with level - adapt aspect ratio to viewport so the playfield fills the screen
  var ar = gridArea();
  var aspect = ar.w / ar.h;
  var baseCols, baseRows;
  if (aspect > 1.3) {
    // landscape - wide grid
    baseCols = 16; baseRows = 9;
  } else if (aspect < 0.75) {
    // portrait - tall grid
    baseCols = 8;  baseRows = 13;
  } else {
    // squarish
    baseCols = 11; baseRows = 11;
  }
  COLS = baseCols + Math.min(4, Math.floor((lvl-1)/2));
  ROWS = baseRows + Math.min(3, Math.floor((lvl-1)/3));

  // size tiles to fill the area, then re-derive cols/rows so we don't leave bars
  var tw = ar.w / COLS, th = ar.h / ROWS;
  TILE = Math.min(tw, th);
  // expand the smaller dimension to use more space
  if (tw < th) {
    ROWS = Math.floor(ar.h / TILE);
  } else {
    COLS = Math.floor(ar.w / TILE);
  }

  // tile dirty density grows with level
  var dirtyChance = clamp(0.55 + (lvl - 1) * 0.06, 0.55, 0.92);

  // iter#4: seed the level RNG from today's date ^ level so every player
  // races the SAME lake on the same calendar day. Layout, wobble phases,
  // and crack patterns are now deterministic per day.
  levelRng = makeRng((getDaySeed() ^ (lvl * 2654435761)) | 0);

  grid = [];
  totalDirty = 0;
  for (var r = 0; r < ROWS; r++) {
    var row = [];
    for (var c = 0; c < COLS; c++) {
      var dirty = levelRng() < dirtyChance;
      // iter#9: thick ice tiles take THICK_CRACK_MAX hits; ~20% of dirty tiles
      var thick = dirty && (levelRng() < THICK_ICE_CHANCE);
      // iter#12: frozen ice - 3rd tier, only on tiles that are NOT already thick
      var frozen = dirty && !thick && (levelRng() < FROZEN_ICE_CHANCE);
      // milestone#3: LAYERED ice - only on tiles that are NOT thick AND NOT frozen
      var layered = dirty && !thick && !frozen && (levelRng() < LAYERED_ICE_CHANCE);
      // iter#10: boost tile - ~8% of dirty tiles drop a speed-boost pickup when cleared
      // (layered tiles never carry a boost - their reward is the core)
      var boost = dirty && !layered && (levelRng() < BOOST_TILE_CHANCE);
      var tile = {
        state: dirty ? 0 : -1,  // -1 = clean from start
        wobble: levelRng() * Math.PI * 2,
        crackPattern: Math.floor(levelRng() * 3),
        chunkParts: [],
        thick: thick,           // iter#9: extra-hard tile flag
        frozen: frozen,         // iter#12: ultra-hard 3rd tier (7 hits)
        layered: layered,       // milestone#3: 3-strata breakable tile
        layer: 0,               // milestone#3: current exposed layer (0..2)
        deepDone: false,        // milestone#3: core smashed flag
        boost: boost,           // iter#10: drops speed-boost pickup on clear
      };
      if (dirty) totalDirty++;
      row.push(tile);
    }
    grid.push(row);
  }

  // place ship in middle
  var gx = ar.x + (ar.w - COLS*TILE)/2;
  var gy = ar.y + (ar.h - ROWS*TILE)/2;
  ship.x = gx + (COLS/2) * TILE;
  ship.y = gy + (ROWS/2) * TILE;
  ship.vx = 0; ship.vy = 0; ship.angle = 0;

  gs = 'PLAYING';
}

  // drive ONE layered tile through all 3 strata; returns the layer + score +
  // deepCore deltas so a headless test can prove the strata reveal correctly.
  testLayered: function(){
    if (!grid || !grid.length) return { err: 'no grid' };
    var o = gridOrigin(), tile=null, tr=-1, tc=-1;
    for (var r=0;r<ROWS&&!tile;r++) for (var c=0;c<COLS;c++){ if (grid[r][c].layered && grid[r][c].state>=0){ tile=grid[r][c]; tr=r; tc=c; break; } }
    if (!tile) return { err: 'no layered tile' };
    var sc0=score, deep0=deepCoresRun, layers=[];
    var hit={ c:tc, r:tr, tile:tile };
    // park the ship on the tile so the clear path runs
    ship.x=o.x+tc*TILE+TILE/2; ship.y=o.y+tr*TILE+TILE/2;
    // step state up to each boundary and invoke handleLayeredProgress

    for (var i=0;i<seq.length;i++){
      var prev=tile.state;

// ── iter#1: Yandex ads (rewarded "Extra Time" + throttled interstitial) ─────
// All triggers are user-click only (Yandex 4.4); interstitial throttled to
// ≥3min between fullscreen ads (Yandex 4.1). When the SDK isn't present
// (gallery preview / local dev) helpers no-op for interstitial and grant
// the revive immediately for rewarded - keeps the feature exercisable.
var INTERSTITIAL_GAP_MS = 3 * 60 * 1000;
var lastInterstitialMs = -INTERSTITIAL_GAP_MS;
var extraTimeUsed = false;     // one "+15s" revive per level
var extraTimeLoading = false;  // disables button during ad load
var EXTRA_TIME_SEC = 15;
// milestone#1: ad audio mute (Yandex 4.7). True while an ad is open so the
// visibilitychange handler doesn't fight the ad-pause.
var adAudioHeld = false;
function adPauseAudio(){ adAudioHeld = true; pauseAudio(); }
function adResumeAudio(){ adAudioHeld = false; resumeAudio(); }

function showInterstitial(onDone) {
  var now = performance.now();
  if (now - lastInterstitialMs < INTERSTITIAL_GAP_MS) { onDone && onDone(); return; }
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showFullscreenAdv) { onDone && onDone(); return; }
  lastInterstitialMs = now;
  // no-fill watchdog: if the ad never opens/closes (no fill, as in any preview),
  // resume after 4.5s so RETRY never hangs (Yandex 4.5/1.14).
  var settled = false, wd = null;
  function done() { if (settled) return; settled = true; if (wd) { clearTimeout(wd); wd = null; } adResumeAudio(); onDone && onDone(); }
  wd = setTimeout(done, 4500);
  try {
    window.ysdk.adv.showFullscreenAdv({
      callbacks: {
        onOpen:  function(){ if (wd) { clearTimeout(wd); wd = null; } adPauseAudio(); },
        onClose: function(){ done(); },
        onError: function(){ done(); },
      },
    });
  } catch(e) { done(); }
}
function showRewardedExtraTime() {
  if (extraTimeUsed || extraTimeLoading) return;
  extraTimeLoading = true;
  if (!window.ysdk || !window.ysdk.adv || !window.ysdk.adv.showRewardedVideo) {
    extraTimeLoading = false; grantExtraTime(); return;
  }
  var rewarded = false, opened = false, settled = false, adWatchdog = null;
  function settleExtraTime(grant) {
    if (settled) return; settled = true;
    if (adWatchdog) { clearTimeout(adWatchdog); adWatchdog = null; }
    extraTimeLoading = false;
    if (grant) grantExtraTime();
  }
  // No-fill guard: if the rewarded ad never OPENS within 4.5s (no ad fill, as in
  // any draft/preview), grant so the button never sticks dead. Matches no-SDK fallback.
  adWatchdog = setTimeout(function() { if (!opened) settleExtraTime(true); }, 4500);

// ── GRID HELPERS ────────────────────────────────────────────────────────────
function gridOrigin() {
  var ar = gridArea();
  return {
    x: ar.x + (ar.w - COLS*TILE)/2,
    y: ar.y + (ar.h - ROWS*TILE)/2,
  };
}

function tileAt(x, y) {
  var o = gridOrigin();
  var c = Math.floor((x - o.x) / TILE);
  var r = Math.floor((y - o.y) / TILE);
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return null;
  return { c: c, r: r, tile: grid[r][c] };
}

function spawnChunkParts(o, c, r) {
  var t = grid[r][c];
  if (t.chunkParts.length) return;
  var px = o.x + c*TILE + TILE/2, py = o.y + r*TILE + TILE/2;
  for (var i = 0; i < 6; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = (1.5 + Math.random()*2.5) * S;
    t.chunkParts.push({ x: px, y: py, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 0.9, r: (TILE*0.18) });
  }
}

function spawnParticles(x, y, color, n) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2;
    var sp = (1.5 + Math.random() * 3.5) * S;
    particles.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      r:(2 + Math.random()*4)*S, color:color, life:1 });
  }
}
function spawnFloat(x, y, txt, col) {
  floats.push({ x:x, y:y, txt:txt, col:col||'#fff', life:1.3, vy:-2*S });
}

// milestone#3: layered-tile progress. Detects when the accumulating `state`
// crosses a layer boundary, advances `tile.layer`, awards per-layer points, and
// fires the DEEP CORE reward (shards + banner + quest) when the core is smashed.
// Boundaries (cumulative hits): L0 ends at LAYER_HITS[0], L1 ends at
// LAYER_HITS[0]+LAYER_HITS[1]. The full clear (state>=7) is handled by the
// existing clear path below.

var LAYER_B1 = LAYER_HITS[0] + LAYER_HITS[1]; // 5
function handleLayeredProgress(hit, o, prevState) {
  var t = hit.tile;
  var px = o.x + hit.c*TILE + TILE/2, py = o.y + hit.r*TILE + TILE/2;
  // crossed into blue ice (layer 1)
  if (prevState < LAYER_B0 && t.state >= LAYER_B0 && t.layer < 1) {
    t.layer = 1;
    score += LAYER_PTS[0];
    spawnParticles(px, py, '#ffffff', 10);
    spawnChunkParts(o, hit.c, hit.r);
    spawnFloat(px, py - 18*S, '+' + LAYER_PTS[0], '#dbeafc');
    SFX.crack(); SFX.pop(1);
    shake = Math.max(shake, 0.18);
  }
  // crossed into the deep core (layer 2)
  if (prevState < LAYER_B1 && t.state >= LAYER_B1 && t.layer < 2) {
    t.layer = 2;
    score += LAYER_PTS[1];
    spawnParticles(px, py, '#9fdcff', 14);
    spawnParticles(px, py, '#ffffff', 8);
    spawnChunkParts(o, hit.c, hit.r);
    spawnFloat(px, py - 18*S, '+' + LAYER_PTS[1], '#7fd0ff');
    SFX.crack(); SFX.pop(2);

  }

// ── UPDATE ──────────────────────────────────────────────────────────────────

      var ti = grid[r][c];
      ti.wobble += dt * 1.5;
      for (var k = ti.chunkParts.length - 1; k >= 0; k--) {
        var cp = ti.chunkParts[k];
        cp.x += cp.vx; cp.y += cp.vy;
