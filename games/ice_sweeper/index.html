  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = Math.max(1, r*0.14);
  ctx.beginPath(); ctx.moveTo(0,-r); ctx.lineTo(0,r); ctx.moveTo(-r*0.42,0); ctx.lineTo(r*0.42,0); ctx.stroke();
  ctx.restore();
}
function icoBolt(x, y, r, col) {
  // lightning bolt (boost pickup)
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = col || '#FFD700';
  ctx.beginPath();
  ctx.moveTo(r*0.30, -r); ctx.lineTo(-r*0.40, r*0.15); ctx.lineTo(-r*0.02, r*0.15);
  ctx.lineTo(-r*0.28, r); ctx.lineTo(r*0.42, -r*0.18); ctx.lineTo(r*0.04, -r*0.18);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}
function icoSpeaker(x, y, r, muted) {
  // speaker cone + waves (or a slash when muted)
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = muted ? '#ff6b6b' : '#bcd5e8';
  ctx.strokeStyle = muted ? '#ff6b6b' : '#bcd5e8';
  ctx.lineWidth = Math.max(1.4, r*0.18); ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-r*0.7, -r*0.28); ctx.lineTo(-r*0.28, -r*0.28); ctx.lineTo(r*0.05, -r*0.6);
  ctx.lineTo(r*0.05, r*0.6); ctx.lineTo(-r*0.28, r*0.28); ctx.lineTo(-r*0.7, r*0.28);
  ctx.closePath(); ctx.fill();
  if (muted) {
    ctx.beginPath(); ctx.moveTo(r*0.3, -r*0.4); ctx.lineTo(r*0.75, r*0.4);
    ctx.moveTo(r*0.75, -r*0.4); ctx.lineTo(r*0.3, r*0.4); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(r*0.18, 0, r*0.4, -0.8, 0.8); ctx.stroke();
    ctx.beginPath(); ctx.arc(r*0.18, 0, r*0.7, -0.7, 0.7); ctx.stroke();
  }
  ctx.restore();
}
function icoCheck(x, y, r, col) {
  ctx.save(); ctx.translate(x, y);
  ctx.strokeStyle = col || '#2ecc71'; ctx.lineWidth = Math.max(1.6, r*0.26);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(-r*0.5, 0); ctx.lineTo(-r*0.1, r*0.45); ctx.lineTo(r*0.55, -r*0.5); ctx.stroke();
  ctx.restore();
}
function icoLock(x, y, r, col) {
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = col || '#8aa'; ctx.strokeStyle = col || '#8aa'; ctx.lineWidth = Math.max(1.2, r*0.16);
  rr(ctx, -r*0.55, -r*0.1, r*1.1, r*0.85, r*0.18); ctx.fill();
  ctx.beginPath(); ctx.arc(0, -r*0.1, r*0.38, Math.PI, 0); ctx.stroke();
  ctx.restore();
}
function icoStar(x, y, r, col) {
  ctx.save(); ctx.translate(x, y); ctx.fillStyle = col || '#FFD700';
  ctx.beginPath();
  for (var i = 0; i < 10; i++) {
    var ang = -Math.PI/2 + i * Math.PI/5;
    var rad = i % 2 === 0 ? r : r*0.45;
    ctx[i===0?'moveTo':'lineTo'](Math.cos(ang)*rad, Math.sin(ang)*rad);
  }
  ctx.closePath(); ctx.fill(); ctx.restore();
}
// milestone#1: per-tool vector icon (switched on tool id) - drawn in slots,
// collection cards and toasts. r ~= half the badge size.
function drawToolIcon(id, x, y, r) {
  ctx.save(); ctx.translate(x, y);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  var td = toolDef(id); var col = td ? td.col : '#ccc';
  if (id === 'pick') {                       // Heavy Pick - pickaxe
    ctx.strokeStyle = '#caa06a'; ctx.lineWidth = Math.max(2, r*0.22);
    ctx.beginPath(); ctx.moveTo(-r*0.1, -r*0.7); ctx.lineTo(r*0.05, r*0.8); ctx.stroke(); // handle
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(2, r*0.26);
    ctx.beginPath(); ctx.moveTo(-r*0.75, -r*0.35); ctx.quadraticCurveTo(0, -r*0.95, r*0.75, -r*0.35); ctx.stroke();
  } else if (id === 'auger') {               // Frost Auger - drill spiral
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(2, r*0.2);
    ctx.beginPath(); ctx.moveTo(0, -r*0.8); ctx.lineTo(0, r*0.4); ctx.stroke();
    ctx.beginPath();
    for (var a=0; a<4; a++){ var yy=-r*0.5+a*r*0.32; ctx.moveTo(-r*0.4, yy); ctx.lineTo(r*0.4, yy+r*0.16); }
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r*0.3, r*0.4); ctx.lineTo(0, r*0.85); ctx.lineTo(r*0.3, r*0.4); ctx.closePath(); ctx.fillStyle=col; ctx.fill();
  } else if (id === 'crusher') {             // Wide Crusher - hammer head
    ctx.fillStyle = col;
    rr(ctx, -r*0.7, -r*0.7, r*1.4, r*0.5, r*0.12); ctx.fill();
    ctx.strokeStyle = '#caa06a'; ctx.lineWidth = Math.max(2, r*0.22);
    ctx.beginPath(); ctx.moveTo(0, -r*0.2); ctx.lineTo(0, r*0.85); ctx.stroke();
  } else if (id === 'melt') {                // Slow-Melt Hull - sun/heat
    ctx.fillStyle = col; ctx.beginPath(); ctx.arc(0,0,r*0.45,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(1.5, r*0.14);
    for (var i=0;i<8;i++){ var ang=i*Math.PI/4; ctx.beginPath(); ctx.moveTo(Math.cos(ang)*r*0.62, Math.sin(ang)*r*0.62); ctx.lineTo(Math.cos(ang)*r*0.9, Math.sin(ang)*r*0.9); ctx.stroke(); }
  } else if (id === 'magnet') {              // Shard Magnet - horseshoe
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(2.4, r*0.3);
    ctx.beginPath(); ctx.arc(0, -r*0.1, r*0.55, Math.PI, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r*0.55, -r*0.1); ctx.lineTo(-r*0.55, r*0.6); ctx.moveTo(r*0.55, -r*0.1); ctx.lineTo(r*0.55, r*0.6); ctx.stroke();
    ctx.strokeStyle='#e74c3c'; ctx.beginPath(); ctx.moveTo(-r*0.55,r*0.6); ctx.lineTo(-r*0.55,r*0.75); ctx.stroke();
  } else if (id === 'prosp') {               // Prospector - gold nugget / gem
    icoShard(0, 0, r*0.85, col);
  } else {
    ctx.fillStyle = col; ctx.beginPath(); ctx.arc(0,0,r*0.6,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function drawTile(x, y, t) {
  var size = TILE;
  if (t.state === -1) {
    // clean water - deep blue with subtle ripple
    var grd = ctx.createRadialGradient(x+size/2, y+size/2, 0, x+size/2, y+size/2, size*0.7);
    grd.addColorStop(0, '#1e4a78');
    grd.addColorStop(1, '#0e2a4a');
    ctx.fillStyle = grd;
    ctx.fillRect(x, y, size, size);

    // ripple
    var ph = Math.sin(t.wobble*0.6) * 0.3 + 0.5;
    ctx.strokeStyle = 'rgba(120,200,255,'+(0.18*ph)+')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x+size/2, y+size/2, size*0.2*ph, 0, Math.PI*2);
    ctx.stroke();
    return;
  }

  // iter#9: thick tiles use a different crack ceiling; iter#12: frozen tiles use FROZEN_CRACK_MAX
  // milestone#3: layered tiles use layeredTotalHits()
  var tileMax = t.frozen ? FROZEN_CRACK_MAX : (t.thick ? THICK_CRACK_MAX : (t.layered ? layeredTotalHits() : CRACK_MAX));
  var s = clamp(t.state, 0, tileMax);
  var dirt = 0.85 - (s / tileMax) * 0.55;
  // base ice color (iter#9: thick ice is brighter/bluer; iter#12: frozen is violet-purple)
  var brown, blue;
  if (t.layered) {
    // milestone#3: colour by the CURRENTLY-EXPOSED layer so the player SEES the
    // strata change as they break down: snow crust -> blue ice -> gold core.
    var lyr = t.state >= LAYER_B1 ? 2 : (t.state >= LAYER_B0 ? 1 : 0);
    if (lyr === 0) ctx.fillStyle = '#dfeaf3';                 // snow crust (soft white)
    else if (lyr === 1) ctx.fillStyle = '#5aa7d8';           // blue ice
    else ctx.fillStyle = '#caa23a';                          // deep gold core
  } else if (t.frozen) {
    // deep violet-purple crystalline ice - clearly distinct from thin (brown) and thick (cyan-blue)
    var prog = s / tileMax;
    var r = Math.round(80 + prog * 50);
    var g = Math.round(50 + prog * 40);
    var b = Math.round(140 + prog * 50);
    ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
  } else if (t.thick) {
    // bright glacial blue-white - stands out clearly from normal dirty tiles
    var prog = s / tileMax;
    brown = Math.round(120 + prog * 40);
    blue  = Math.round(200 + prog * 30);
    ctx.fillStyle = 'rgb(' + brown + ',' + Math.round(170 + prog*30) + ',' + blue + ')';
  } else {
    brown = Math.round(40 + dirt * 30);
    blue  = Math.round(80 + dirt * 50);
    ctx.fillStyle = 'rgb(' + brown + ',' + (brown+10) + ',' + blue + ')';
  }
  ctx.fillRect(x+1, y+1, size-2, size-2);

  // surface highlight
  var hlAlpha = t.frozen ? (0.45 * (1 - s/tileMax)) : (t.thick ? (0.38 * (1 - s/tileMax)) : (0.18 * dirt));
  var hl = ctx.createLinearGradient(x, y, x+size, y+size);
  hl.addColorStop(0, 'rgba(255,255,255,'+hlAlpha+')');
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hl;
  ctx.fillRect(x+1, y+1, size-2, size-2);

  // iter#12: frozen-ice border glow (pulsing violet ring - most dramatic of the 3 tiers)
  if (t.frozen && s < tileMax) {
    var frozenGlowA = 0.65 + 0.35 * Math.sin(t.wobble * 0.9);
    ctx.strokeStyle = 'rgba(180,80,255,' + frozenGlowA + ')';
    ctx.lineWidth = Math.max(2, size * 0.08);
    ctx.strokeRect(x+1, y+1, size-2, size-2);
    // inner glow pass for extra drama
    ctx.strokeStyle = 'rgba(220,160,255,' + (frozenGlowA * 0.5) + ')';
    ctx.lineWidth = Math.max(1, size * 0.04);
    ctx.strokeRect(x+3, y+3, size-6, size-6);
  }
  // iter#9: thick-ice border glow (cyan ring so player can identify before hitting)
  if (t.thick && s < tileMax) {
    var glowA = 0.55 + 0.35 * Math.sin(t.wobble * 1.2);
    ctx.strokeStyle = 'rgba(100,200,255,' + glowA + ')';
    ctx.lineWidth = Math.max(1.5, size * 0.055);
    ctx.strokeRect(x+1, y+1, size-2, size-2);
  }

  // iter#10: boost tiles have a pulsing golden border so players can route to them
  if (t.boost && t.state >= 0 && s < tileMax) {
    var boostGlowA = 0.60 + 0.35 * Math.sin(t.wobble * 2.2);
    ctx.strokeStyle = 'rgba(255,210,60,' + boostGlowA + ')';
    ctx.lineWidth = Math.max(1.5, size * 0.06);
    ctx.strokeRect(x+2, y+2, size-4, size-4);
    // small bolt mark in corner (vector, not emoji)
    ctx.globalAlpha = boostGlowA;
    icoBolt(x + size * 0.76, y + size * 0.24, size * 0.16, '#FFD700');
    ctx.globalAlpha = 1;
  }

  // milestone#3: LAYERED tile decoration - a "stacked strata" look + concentric
  // rings that shrink as you break down toward the gold core, so the player can
  // both spot a layered tile and read how deep they've dug.
  if (t.layered && s < tileMax) {
    var lyrD = t.state >= LAYER_B1 ? 2 : (t.state >= LAYER_B0 ? 1 : 0);
    // outer pulsing border so the tile reads as "special" at a glance
    var layGlow = 0.55 + 0.30 * Math.sin(t.wobble * 1.4);
    ctx.strokeStyle = lyrD === 2 ? 'rgba(255,215,0,'+layGlow+')'
                    : lyrD === 1 ? 'rgba(140,210,255,'+layGlow+')'
                    : 'rgba(230,240,255,'+layGlow+')';
    ctx.lineWidth = Math.max(1.5, size * 0.06);
    ctx.strokeRect(x+2, y+2, size-4, size-4);
    // concentric inset rings = remaining layers (3 -> 2 -> 1)
    var ringsLeft = 3 - lyrD;
    ctx.strokeStyle = 'rgba(255,255,255,0.40)';
    ctx.lineWidth = Math.max(1, size * 0.03);
    for (var ri = 0; ri < ringsLeft; ri++) {
      var inset = size * (0.16 + ri * 0.12);
      ctx.strokeRect(x + inset, y + inset, size - inset*2, size - inset*2);
    }
    // gold core gets a glowing dot in the middle
    if (lyrD === 2) {
      ctx.save();
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = size * 0.5;
      ctx.fillStyle = '#fff3b0';
      ctx.beginPath(); ctx.arc(x+size/2, y+size/2, size*0.14, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // dirt splotches (visible when state is 0-1 - for thick ice, scaled to progress)
  var splotchThreshold = (t.thick || t.frozen) ? (tileMax * 0.3) : 1.5;
  if (s < splotchThreshold && !t.thick && !t.frozen && !t.layered) {
    var seed = (t.crackPattern * 3 + 7) % 5;
    ctx.fillStyle = 'rgba(40,30,15,'+(0.45 - s*0.2)+')';
    for (var i = 0; i < 3; i++) {
      var sx = x + size * (0.25 + ((seed*i+i*3) % 7) / 14);
      var sy = y + size * (0.25 + ((seed*2+i*5) % 7) / 14);
      ctx.beginPath(); ctx.arc(sx, sy, size*0.10, 0, Math.PI*2); ctx.fill();
    }
  }
  // iter#9: thick ice has snowflake-style cross markings when fresh
  if (t.thick && s < 1.5) {
    ctx.strokeStyle = 'rgba(200,240,255,0.55)';
    ctx.lineWidth = Math.max(1, size*0.05);
    ctx.beginPath();
    ctx.moveTo(x+size*0.3, y+size*0.5); ctx.lineTo(x+size*0.7, y+size*0.5);
    ctx.moveTo(x+size*0.5, y+size*0.3); ctx.lineTo(x+size*0.5, y+size*0.7);
    ctx.moveTo(x+size*0.35, y+size*0.35); ctx.lineTo(x+size*0.65, y+size*0.65);
    ctx.moveTo(x+size*0.65, y+size*0.35); ctx.lineTo(x+size*0.35, y+size*0.65);
    ctx.stroke();
  }
  // iter#12: frozen ice has fuller snowflake + diamond markings when fresh (extra layers)
  if (t.frozen && s < 2.5) {
    var frkAlpha = 0.70 - (s / 2.5) * 0.45;
    ctx.strokeStyle = 'rgba(220,170,255,' + frkAlpha + ')';
    ctx.lineWidth = Math.max(1, size*0.055);
    ctx.beginPath();
    // main cross
    ctx.moveTo(x+size*0.25, y+size*0.5); ctx.lineTo(x+size*0.75, y+size*0.5);
    ctx.moveTo(x+size*0.5, y+size*0.25); ctx.lineTo(x+size*0.5, y+size*0.75);
    // diagonals
    ctx.moveTo(x+size*0.32, y+size*0.32); ctx.lineTo(x+size*0.68, y+size*0.68);
    ctx.moveTo(x+size*0.68, y+size*0.32); ctx.lineTo(x+size*0.32, y+size*0.68);
    // diamond ring
    ctx.moveTo(x+size*0.5, y+size*0.18); ctx.lineTo(x+size*0.82, y+size*0.5);
    ctx.lineTo(x+size*0.5, y+size*0.82); ctx.lineTo(x+size*0.18, y+size*0.5);
    ctx.closePath();
    ctx.stroke();
  }

  // cracks (visible when state >= 1, scaled to tileMax)
  // milestone#3: layered tiles convey progress via strata rings, not crack lines.
  if (s >= 1 && !t.layered) {
    var ca = clamp((s - 1) / (tileMax - 1), 0.3, 1);
    // iter#9: thick ice cracks are bolder and cyan-tinted; iter#12: frozen cracks are violet
    ctx.strokeStyle = t.frozen ? ('rgba(210,140,255,'+ca+')') : (t.thick ? ('rgba(180,230,255,'+ca+')') : ('rgba(255,255,255,'+ca+')'));
    ctx.lineWidth = Math.max(1, size * (t.frozen ? 0.09 : (t.thick ? 0.07 : 0.04)));
    ctx.beginPath();
    var p = t.crackPattern;
    if (p === 0) {
      ctx.moveTo(x+size*0.2, y+size*0.5); ctx.lineTo(x+size*0.5, y+size*0.3);
      ctx.lineTo(x+size*0.5, y+size*0.7); ctx.lineTo(x+size*0.8, y+size*0.5);
      ctx.moveTo(x+size*0.5, y+size*0.3); ctx.lineTo(x+size*0.5, y+size*0.7);
    } else if (p === 1) {
      ctx.moveTo(x+size*0.2, y+size*0.2); ctx.lineTo(x+size*0.5, y+size*0.5);
      ctx.lineTo(x+size*0.8, y+size*0.2);
      ctx.moveTo(x+size*0.5, y+size*0.5); ctx.lineTo(x+size*0.5, y+size*0.85);
      ctx.moveTo(x+size*0.5, y+size*0.5); ctx.lineTo(x+size*0.2, y+size*0.85);
    } else {
      ctx.moveTo(x+size*0.5, y+size*0.15); ctx.lineTo(x+size*0.5, y+size*0.85);
      ctx.moveTo(x+size*0.15, y+size*0.5); ctx.lineTo(x+size*0.85, y+size*0.5);
      ctx.moveTo(x+size*0.5, y+size*0.5); ctx.lineTo(x+size*0.8, y+size*0.8);
    }
    ctx.stroke();
  }

  // chunk separation effect (state >= tileMax-1 for all tile types)
  var sepThreshold = (t.thick || t.frozen) ? (tileMax - 1) : 2;
  if (s >= sepThreshold && !t.layered) {
    var sep = (s - sepThreshold) * 0.5;
    ctx.fillStyle = t.frozen ? 'rgba(100,40,160,0.55)' : (t.thick ? 'rgba(40,90,130,0.45)' : 'rgba(40,55,80,0.45)');
    ctx.fillRect(x+size*0.5-1, y+1+sep, 2, size-2);
    ctx.fillRect(x+1+sep, y+size*0.5-1, size-2, 2);
  }

  // border
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x+0.5, y+0.5, size-1, size-1);

  // floating chunk pieces
  for (var k = 0; k < t.chunkParts.length; k++) {
    var cp = t.chunkParts[k];
    ctx.globalAlpha = Math.max(0, cp.life);
    ctx.fillStyle = '#dceaf7';
    ctx.beginPath(); ctx.arc(cp.x, cp.y, cp.r * (0.5 + 0.5*cp.life), 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawShip(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // shadow
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 8 * S;
  ctx.shadowOffsetY = 3 * S;

  // hull (iter#3: palette-driven; default = classic red icebreaker)
  var pal = HULL_PALETTES[hullIdx] || HULL_PALETTES[0];
  var sz = TILE * 0.46;
  ctx.fillStyle = pal.body;
  ctx.beginPath();
  ctx.moveTo(sz, 0);
  ctx.lineTo(sz*0.4, -sz*0.55);
  ctx.lineTo(-sz*0.7, -sz*0.55);
  ctx.lineTo(-sz*0.85, 0);
  ctx.lineTo(-sz*0.7, sz*0.55);
  ctx.lineTo(sz*0.4, sz*0.55);
  ctx.closePath();
  ctx.fill();

  ctx.shadowColor = 'transparent';

  // hull stripe
  ctx.fillStyle = pal.stripe;
  ctx.fillRect(-sz*0.85, -sz*0.12, sz*1.7, sz*0.24);

  // cabin
  ctx.fillStyle = '#34495e';
  rr(ctx, -sz*0.25, -sz*0.32, sz*0.55, sz*0.64, sz*0.1);
  ctx.fill();
  ctx.fillStyle = '#74b9ff';
  rr(ctx, -sz*0.18, -sz*0.25, sz*0.4, sz*0.5, sz*0.06);
  ctx.fill();

  // bow icebreaker
  ctx.fillStyle = pal.bow;
  ctx.beginPath();
  ctx.moveTo(sz*1.05, 0);
  ctx.lineTo(sz*0.7, -sz*0.18);
  ctx.lineTo(sz*0.7, sz*0.18);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawArena() {
  var o = gridOrigin();
  // water bg
  ctx.fillStyle = '#0e2640';
  ctx.fillRect(o.x - 8*S, o.y - 8*S, COLS*TILE + 16*S, ROWS*TILE + 16*S);
  // rim glow
  ctx.strokeStyle = 'rgba(120,200,255,0.18)';
  ctx.lineWidth = 2;
  ctx.strokeRect(o.x - 4*S, o.y - 4*S, COLS*TILE + 8*S, ROWS*TILE + 8*S);

  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      drawTile(o.x + c*TILE, o.y + r*TILE, grid[r][c]);
    }
  }
}

function drawHUD() {
  var inset = platformSafeInsets();
  var bh = HUD_H * S;
  ctx.fillStyle = 'rgba(8,16,32,0.92)';
  ctx.fillRect(0, 0, W, bh);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, bh); ctx.lineTo(W, bh); ctx.stroke();

  var pad = 14*S, rightX = W - pad - inset.right, fs = clamp(13*S, 11, 17), fy = bh*0.78;
  var bigFs = clamp(18*S, 14, 24);
  ctx.textBaseline = 'alphabetic';

  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(t('level'), pad, bh*0.42);
  ctx.fillStyle = '#fff'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(level, pad, fy);

  ctx.fillStyle = '#557'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(t('score'), rightX, bh*0.42);
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(score, rightX, fy);

  // iter#2: BEST inline next to SCORE (small, below the score number)
  if (best > 0) {
    var bestFs = clamp(11*S, 9, 14);
    ctx.fillStyle = (score > best) ? '#2ecc71' : '#778';
    ctx.font = 'bold '+bestFs+'px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(t('best')+' '+best, rightX, bh*0.96);
  }

  // clean meter
  var pct = totalDirty > 0 ? Math.round((cleared/totalDirty)*100) : 100;
  var mw = clamp(W*0.32, 110, 240), mh = 10*S;
  var mx = cx - mw/2, my = bh*0.58;
  ctx.fillStyle = '#666'; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(t('clean')+' '+pct+'%', cx, bh*0.36);
  rr(ctx, mx, my, mw, mh, mh/2); ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();
  if (pct > 0) {
    var fg = ctx.createLinearGradient(mx, 0, mx+mw, 0);
    fg.addColorStop(0, '#4dd0e1'); fg.addColorStop(1, '#2ecc71');
    rr(ctx, mx, my, mw*pct/100, mh, mh/2); ctx.fillStyle = fg; ctx.fill();
  }

  // timer
  var tx = Math.min(W*0.78, rightX - 10*S);
  var tc = timeLeft < 12 ? '#e74c3c' : timeLeft < 25 ? '#f39c12' : '#aaa';
  ctx.fillStyle = tc; ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(t('time'), tx, bh*0.42);
  ctx.font = 'bold '+bigFs+'px sans-serif';
  ctx.fillText(Math.ceil(timeLeft)+t('secAbbr'), tx, fy);

  // chain badge
  if (chain > 1 && chainTimer > 0) {
    var alpha = Math.min(1, chainTimer);
    ctx.globalAlpha = alpha;
    var by = H - 50*S;
    ctx.font = 'bold '+clamp(22*S,16,32)+'px sans-serif';
    ctx.fillStyle = '#FFD700'; ctx.textAlign = 'center';
    ctx.fillText(t('chain')+' x'+chain+'!', cx, by);
    ctx.globalAlpha = 1;
  }
}

function drawOverlay(title, sub, btnText, btnFn, sub2) {
  buttons = [];
  ctx.fillStyle = 'rgba(8,12,28,0.88)';
  ctx.fillRect(0, 0, W, H);

  var _wide = W / H > 1.15;
  var titleFs = clamp(38*S, 22, 56);
  var subFs   = clamp(16*S, 12, 22);
  // On wide viewports enlarge the PLAY button ~1.4x; mobile keeps original size.
  var btnW    = clamp((_wide ? 336 : 240)*S, 160, _wide ? 448 : 320);
  var btnH    = clamp((_wide ? 72 : 52)*S, 40, _wide ? 92 : 66);
  // Text block bottom: sub2 is lowest at cy+2*S; sub at cy-16*S. Use sub2 if present.
  var _textBlockBottom = sub2 ? (cy + 2*S + subFs) : sub ? (cy - 16*S + subFs) : (cy - 50*S + titleFs);
  // No tutorial text in this overlay, so the button is already in empty space.
  // Keep vertical position the same as mobile (cy+20*S) - just enlarge+animate on wide.
  var btnY = cy + 20*S;
  var btnX    = cx - btnW/2;

  ctx.shadowColor = 'rgba(77,208,225,0.45)'; ctx.shadowBlur = 30*S;
  ctx.font = 'bold '+titleFs+'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(title, cx, cy - 50*S);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  if (sub) {
    ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#9ab';
    ctx.fillText(sub, cx, cy - 16*S);
  }
  if (sub2) {
    ctx.font = subFs+'px sans-serif'; ctx.fillStyle = '#bcd';
    ctx.fillText(sub2, cx, cy + 2*S);
  }

  // Desktop: breathing pulse + glow drawn on top of stable hit-rect.
  var _drawW = btnW, _drawH = btnH, _drawX = btnX, _drawY = btnY;
  if (_wide && gs === 'MENU') {
    var _t = performance.now() / 1000;
    var _p = 1 + 0.05 * Math.sin(_t * 2.2);
    var _k = 0.5 + 0.5 * Math.sin(_t * 2.2);
    _drawW = btnW * _p; _drawH = btnH * _p;
    _drawX = cx - _drawW / 2; _drawY = btnY + btnH / 2 - _drawH / 2;
    ctx.save();
    ctx.shadowColor = 'rgba(77,208,225,' + (0.4 + 0.3 * _k).toFixed(3) + ')';
    ctx.shadowBlur = (22 + 10 * _k) * S;
  }
  var grad = ctx.createLinearGradient(_drawX, _drawY, _drawX, _drawY+_drawH);
  grad.addColorStop(0, '#4dd0e1'); grad.addColorStop(1, '#0288a8');
  rr(ctx, _drawX, _drawY, _drawW, _drawH, _drawH/2);
  ctx.fillStyle = grad; ctx.fill();
  if (_wide && gs === 'MENU') ctx.restore();
  ctx.font = 'bold '+clamp((_wide ? 22 : 16)*S, 12, _wide ? 28 : 22)+'px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(btnText, cx, btnY + btnH/2);
  ctx.textBaseline = 'alphabetic';

  buttons.push({ x:btnX, y:btnY, w:btnW, h:btnH, fn:btnFn });

  if (best > 0) {
    ctx.font = clamp(13*S,10,17)+'px sans-serif'; ctx.fillStyle = '#557';
    ctx.fillText(t('best')+': '+best, cx, btnY+btnH+28*S);
  }
  // iter#6: BEST CHAIN stat - sits just under BEST score (or 28*S below the
  // button if best == 0). Green flash if the player just beat their chain
  // record this run. Tiny font, same alignment, never collides with hull
  // swatches (those anchor 36-56*S below this line - see drawHullSwatches).
  // Only rendered on MENU - on GAMEOVER the EXTRA TIME rewarded-ad button
  // (iter#1) sits at the same vertical band and would clip stat text.
  if (bestChain > 0 && gs === 'MENU') {
    var bcY = (best > 0) ? (btnY+btnH+44*S) : (btnY+btnH+28*S);
    ctx.font = clamp(12*S,9,16)+'px sans-serif';
    ctx.fillStyle = newChainBestThisRun ? '#2ecc71' : '#557';
    ctx.fillText(t('bestChain')+' x'+bestChain, cx, bcY);
  }
}

// ── iter#3: hull palette swatches (rendered below PLAY on MENU) ────────────
function drawHullSwatches() {
  // Anchor to MENU layout: PLAY button is at cy + 20*S, height clamp(52,40,66).
  // BEST line (if any) sits at btnY+btnH+28*S. Swatches go a bit further down.
  var btnW = clamp(240*S, 160, 320), btnH = clamp(52*S, 40, 66);
  var btnY = cy + 20*S;
  // iter#6: account for the new BEST CHAIN line under BEST score (each
  // stat line eats ~16*S vertical so swatches stay clear of the text).
  var statLines = (best > 0 ? 1 : 0) + (bestChain > 0 ? 1 : 0);
  var yBase = btnY + btnH + 36*S + statLines * 20*S;
  var sw = clamp(56*S, 44, 72), sh = clamp(46*S, 36, 60);
  var gap = clamp(14*S, 8, 18);
  var totalW = HULL_PALETTES.length * sw + (HULL_PALETTES.length - 1) * gap;
  var x0 = cx - totalW/2;
  // Guard against clipping: if too tall for viewport, shift up
  var maxY = H - sh - 12*S;
  if (yBase > maxY) yBase = maxY;
  var labelFs = clamp(10*S, 8, 13);
  for (var i = 0; i < HULL_PALETTES.length; i++) {
    var p = HULL_PALETTES[i];
    var x = x0 + i * (sw + gap);
    var unlocked = isHullUnlocked(p);
    var selected = (i === hullIdx);
    // card background
    rr(ctx, x, yBase, sw, sh, 8*S);
    ctx.fillStyle = unlocked ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.04)';
    ctx.fill();
    if (selected) {
      ctx.strokeStyle = '#4dd0e1';
      ctx.lineWidth = 2.5 * S;
      ctx.stroke();
    } else if (unlocked) {
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1 * S;
      ctx.stroke();
    } else {
      ctx.strokeStyle = 'rgba(255,255,255,0.10)';
      ctx.lineWidth = 1 * S;
      ctx.stroke();
    }
    // mini hull swatch - body + stripe
    ctx.save();
    if (!unlocked) ctx.globalAlpha = 0.35;
    var bx = x + sw*0.18, by = yBase + sh*0.35, bw = sw*0.64, bh = sh*0.28;
    rr(ctx, bx, by, bw, bh, bh*0.35);
    ctx.fillStyle = p.body; ctx.fill();
    ctx.fillStyle = p.stripe;
    ctx.fillRect(bx, by + bh*0.40, bw, bh*0.20);
    // bow nub
    ctx.fillStyle = p.bow;
    ctx.beginPath();
    ctx.moveTo(bx + bw, by + bh/2);
    ctx.lineTo(bx + bw - bw*0.16, by + bh*0.15);
    ctx.lineTo(bx + bw - bw*0.16, by + bh*0.85);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    // label (top of card)
    ctx.font = 'bold ' + labelFs + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (unlocked) {
      ctx.fillStyle = selected ? '#4dd0e1' : '#fff';
      ctx.fillText(t(p.name), x + sw/2, yBase + sh*0.14);
    } else {
      ctx.fillStyle = '#778';
      ctx.fillText(t(p.name), x + sw/2, yBase + sh*0.14);
      // lock requirement (bottom of card) - vector lock, not emoji.
      // pass-gated hull shows a star (IAP) instead of a score threshold.
      var _lkFs = clamp(9*S, 8, 12);
      if (p.pass) {
        icoStar(x + sw/2, yBase + sh*0.86 - _lkFs*0.2, _lkFs*0.7, '#ffd86b');
      } else {
        icoLock(x + sw/2 - _lkFs*0.9, yBase + sh*0.86 - _lkFs*0.4, _lkFs*0.5, '#aab');
        ctx.fillStyle = '#aab';
        ctx.font = 'bold ' + _lkFs + 'px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(String(p.unlockAt), x + sw/2 - _lkFs*0.2, yBase + sh*0.86);
        ctx.textAlign = 'center';
      }
    }
    ctx.textBaseline = 'alphabetic';
    if (unlocked) {
      buttons.push({ x:x, y:yBase, w:sw, h:sh, fn:(function(idx){ return function(){ selectHull(idx); }; })(i) });
    }
  }
}

// ── iter#11: META-UPGRADE shop panel (rendered on MENU below hull swatches) ──
// Shows shard balance + 3 upgrade cards. Each card: name, desc, level pips,
// cost. If maxed → greyed "MAX" pill. If affordable → lit "Buy" button.
// Click on an affordable non-maxed card calls purchaseUpgrade(i).
function drawUpgradeShop() {
  // Determine Y start: mirror drawHullSwatches anchor logic
  var btnW = clamp(240*S, 160, 320), btnH = clamp(52*S, 40, 66);
  var btnY = cy + 20*S;
  var statLines = (best > 0 ? 1 : 0) + (bestChain > 0 ? 1 : 0);
  var swatchH = clamp(46*S, 36, 60);
  var swatchY = btnY + btnH + 36*S + statLines * 20*S;
  if (swatchY > H - swatchH - 12*S) swatchY = H - swatchH - 12*S;
  var shopY = swatchY + swatchH + 18*S;

  // Guard: if shopY is too close to bottom, skip rendering
  var cardH = clamp(54*S, 42, 68);
  if (shopY + cardH + 30*S > H) return;

  // Shard balance header
  var headerFs = clamp(12*S, 9, 15);
  ctx.font = 'bold ' + headerFs + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = 'rgba(100,210,255,0.75)';
  var _hdrTxt = t('shards') + ': ' + metaShards + '  ' + t('upgrades');
  var _hdrW = ctx.measureText(_hdrTxt).width;
  icoShard(cx - _hdrW/2 - headerFs*0.6, shopY - headerFs*0.35, headerFs*0.5, '#6fd3ff');
  ctx.textAlign = 'left';
  ctx.fillText(_hdrTxt, cx - _hdrW/2, shopY);
  ctx.textAlign = 'center';

  var cardY = shopY + 12*S;
  var cardW = clamp(108*S, 82, 138);
  var cardGap = clamp(10*S, 6, 14);
  var totalW = META_UPGRADES.length * cardW + (META_UPGRADES.length - 1) * cardGap;
  var x0 = cx - totalW / 2;
  var labelFs = clamp(10*S, 8, 13);
  var descFs  = clamp(9*S,  7, 11);

  for (var i = 0; i < META_UPGRADES.length; i++) {
    var upg = META_UPGRADES[i];
    var lvl_i = metaUpgLvls[i];
    var maxed = lvl_i >= upg.maxLvl;
    var affordable = !maxed && metaShards >= upg.cost;
    var cx_i = x0 + i * (cardW + cardGap);

    // Card background
    rr(ctx, cx_i, cardY, cardW, cardH, 7*S);
    ctx.fillStyle = maxed ? 'rgba(255,255,255,0.04)' : affordable ? 'rgba(77,208,225,0.10)' : 'rgba(255,255,255,0.05)';
    ctx.fill();
    ctx.strokeStyle = maxed ? 'rgba(255,255,255,0.12)' : affordable ? 'rgba(77,208,225,0.50)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = Math.max(1, 1.2*S);
    ctx.stroke();

    // Name
    ctx.font = 'bold ' + labelFs + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = maxed ? '#556' : '#cde';
    ctx.fillText(t(upg.nameKey), cx_i + cardW/2, cardY + 14*S);

    // Desc
    ctx.font = descFs + 'px sans-serif';
    ctx.fillStyle = maxed ? '#445' : '#89a';
    ctx.fillText(t(upg.descKey), cx_i + cardW/2, cardY + 24*S);

    // Level pips
    var pipR = clamp(4*S, 3, 5);
    var pipGap = pipR*2 + clamp(3*S, 2, 4);
    var pipTotalW = upg.maxLvl * pipR*2 + (upg.maxLvl-1) * (pipGap - pipR*2);
    var pipX0 = cx_i + cardW/2 - pipTotalW/2 + pipR;
    var pipY = cardY + 34*S;
    for (var p = 0; p < upg.maxLvl; p++) {
      ctx.beginPath();
      ctx.arc(pipX0 + p * pipGap, pipY, pipR, 0, Math.PI*2);
      ctx.fillStyle = p < lvl_i ? '#4dd0e1' : 'rgba(255,255,255,0.15)';
      ctx.fill();
    }

    // Buy / MAX pill
    var pillW = cardW * 0.68, pillH = clamp(18*S, 14, 22);
    var pillX = cx_i + cardW/2 - pillW/2;
    var pillY2 = cardY + cardH - pillH - 6*S;
    rr(ctx, pillX, pillY2, pillW, pillH, pillH/2);
    if (maxed) {
      ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fill();
      ctx.font = 'bold ' + descFs + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#667';
      ctx.fillText(t('upg_maxed'), cx_i + cardW/2, pillY2 + pillH/2);
    } else if (affordable) {
      var g2 = ctx.createLinearGradient(pillX, pillY2, pillX, pillY2+pillH);
      g2.addColorStop(0, '#4dd0e1'); g2.addColorStop(1, '#0288a8');
      ctx.fillStyle = g2; ctx.fill();
      ctx.font = 'bold ' + descFs + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      var _btxt = t('upg_buy') + ' ' + upg.cost;
      var _bw = ctx.measureText(_btxt).width;
      ctx.fillText(_btxt, cx_i + cardW/2 - descFs*0.4, pillY2 + pillH/2);
      icoShard(cx_i + cardW/2 + _bw/2 + descFs*0.1, pillY2 + pillH/2, descFs*0.5, '#eaf7ff');
      // Register click target
      buttons.push({ x: pillX, y: pillY2, w: pillW, h: pillH, fn: (function(idx){ return function(){ purchaseUpgrade(idx); }; })(i) });
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
      ctx.font = 'bold ' + descFs + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#556';
      ctx.fillText(String(upg.cost), cx_i + cardW/2 - descFs*0.3, pillY2 + pillH/2);
      icoShard(cx_i + cardW/2 + descFs*0.7, pillY2 + pillH/2, descFs*0.45, '#667');
    }
    ctx.textBaseline = 'alphabetic';
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// milestone#1/#2: META OVERLAY - Tools collection + equip slots + upgrade,
// plus a Quests tab. Fully OPAQUE fullscreen panel (Build Hygiene #12). Click
// targets rebuilt into metaRects each frame; dispatched from the input handlers.
// Designed to fit 393x852 (portrait phone) AND 1280x720 (wide desktop): a
// single centred column, capped width, scroll-free (content sized to fit).
// ═══════════════════════════════════════════════════════════════════════════
function drawMetaOverlay() {
  metaRects = [];
  // OPAQUE fill - no bleed-through of the screen beneath (#12)
  ctx.fillStyle = '#081226';
  ctx.fillRect(0, 0, W, H);
  // subtle top vignette so it reads as a panel, not a flat fill
  var vg = ctx.createLinearGradient(0, 0, 0, H);
  vg.addColorStop(0, 'rgba(40,80,130,0.25)'); vg.addColorStop(0.4, 'rgba(8,18,38,0)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);

  var colW = Math.min(W * 0.92, 520 * S);
  var colX = cx - colW / 2;
  var pad = 14 * S;
  var topY = clamp(34 * S, 24, 64);

  // ── header: title + shard balance + close ──
  var hFs = clamp(20 * S, 16, 26);
  ctx.font = 'bold ' + hFs + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#eaf4ff';
  ctx.fillText(metaTab === 'tools' ? t('tools') : t('quests'), colX, topY);
  // shard pill (right)
  var sFs = clamp(14 * S, 11, 18);
  ctx.font = 'bold ' + sFs + 'px sans-serif';
  var balTxt = String(metaShards);
  var balW = ctx.measureText(balTxt).width;
  var pillW2 = balW + sFs * 2.4, pillH2 = sFs * 1.7;
  var pillX2 = colX + colW - pillW2, pillY2b = topY - pillH2 / 2;
  rr(ctx, pillX2, pillY2b, pillW2, pillH2, pillH2 / 2);
  ctx.fillStyle = 'rgba(80,180,255,0.16)'; ctx.fill();
  icoShard(pillX2 + sFs * 0.9, topY, sFs * 0.55, '#6fd3ff');
  ctx.fillStyle = '#bfe6ff'; ctx.textAlign = 'left';
  ctx.fillText(balTxt, pillX2 + sFs * 1.5, topY);

  // ── tab switcher ──
  var tabY = topY + hFs * 1.4;
  var tabW = (colW - pad) / 2, tabH = clamp(34 * S, 28, 44);
  var tabs = [['tools', t('tools')], ['quests', t('questsBtn')]];
  for (var ti = 0; ti < 2; ti++) {
    var tx = colX + ti * (tabW + pad);
    var active = metaTab === tabs[ti][0];
    rr(ctx, tx, tabY, tabW, tabH, tabH / 2);
    ctx.fillStyle = active ? 'rgba(77,208,225,0.22)' : 'rgba(255,255,255,0.05)';
    ctx.fill();
    ctx.strokeStyle = active ? '#4dd0e1' : 'rgba(255,255,255,0.12)';
    ctx.lineWidth = active ? 2 * S : 1; ctx.stroke();
    ctx.font = 'bold ' + clamp(13 * S, 11, 16) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = active ? '#cdf3f7' : '#8aa';
    var lbl = tabs[ti][1];
    // quests claimable badge
    if (tabs[ti][0] === 'quests') {
      var cq = claimableQuestCount();
      if (cq > 0) lbl = lbl + '  (' + cq + ')';
    }
    ctx.fillText(lbl, tx + tabW / 2, tabY + tabH / 2);
    metaRects.push({ x: tx, y: tabY, w: tabW, h: tabH, fn: (function(tab){ return function(){ metaTab = tab; SFX.ui(); }; })(tabs[ti][0]) });
  }

  var contentY = tabY + tabH + pad;
  if (metaTab === 'tools') drawMetaTools(colX, colW, contentY, pad);
  else drawMetaQuests(colX, colW, contentY, pad);

  // ── close (back) button at the very bottom ──
  var bW = Math.min(colW, 320 * S), bH = clamp(48 * S, 40, 60);
  var bX = cx - bW / 2, bY2 = H - bH - clamp(16 * S, 10, 22);
  rr(ctx, bX, bY2, bW, bH, bH / 2);
  var bg = ctx.createLinearGradient(bX, bY2, bX, bY2 + bH);
  bg.addColorStop(0, '#4dd0e1'); bg.addColorStop(1, '#0288a8');
  ctx.fillStyle = bg; ctx.fill();
  ctx.font = 'bold ' + clamp(16 * S, 13, 20) + 'px sans-serif';
  ctx.fillStyle = '#06202a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(metaReturnState === 'PLAYING' ? t('play') : t('menuBtn'), cx, bY2 + bH / 2);
  metaRects.push({ x: bX, y: bY2, w: bW, h: bH, fn: closeMeta });
  ctx.textBaseline = 'alphabetic';
}

// TOOLS tab: 3 equip slots row + scrollable-free collection grid + upgrade.
function drawMetaTools(colX, colW, y, pad) {
  // ── equip slots row ──
  ctx.font = 'bold ' + clamp(11 * S, 9, 14) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#7da';
  ctx.fillText(t('slots'), colX, y);
  var slotY = y + 8 * S;
  var slotSz = clamp(58 * S, 44, 76);
  var slotGap = clamp(14 * S, 8, 20);
  var slotsW = TOOL_SLOTS * slotSz + (TOOL_SLOTS - 1) * slotGap;
  var slotX0 = cx - slotsW / 2;
  for (var s = 0; s < TOOL_SLOTS; s++) {
    var sx = slotX0 + s * (slotSz + slotGap);
    rr(ctx, sx, slotY, slotSz, slotSz, 12 * S);
    var eid = meta2 ? meta2.equipped[s] : null;
    ctx.fillStyle = eid ? 'rgba(77,208,225,0.14)' : 'rgba(255,255,255,0.04)';
    ctx.fill();
    ctx.strokeStyle = eid ? '#4dd0e1' : 'rgba(255,255,255,0.14)';
    ctx.lineWidth = eid ? 2 * S : 1; ctx.setLineDash(eid ? [] : [4 * S, 4 * S]);
    ctx.stroke(); ctx.setLineDash([]);
    if (eid) {
      drawToolIcon(eid, sx + slotSz / 2, slotY + slotSz * 0.42, slotSz * 0.26);
      ctx.font = 'bold ' + clamp(9 * S, 8, 12) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.fillStyle = '#cde';
      ctx.fillText(t('lvl') + toolLvl(eid), sx + slotSz / 2, slotY + slotSz - 7 * S);
      metaRects.push({ x: sx, y: slotY, w: slotSz, h: slotSz, fn: (function(id){ return function(){ toggleEquipTool(id); }; })(eid) });
    } else {
      ctx.fillStyle = '#566'; ctx.font = 'bold ' + clamp(20 * S, 16, 26) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('+', sx + slotSz / 2, slotY + slotSz / 2);
      ctx.textBaseline = 'alphabetic';
    }
  }

  // ── milestone#3: Frost Pass banner (value-positive IAP; rewarded economy is
  // already non-punishing). Shown if payments are available OR already owned. ──
  var gridY = slotY + slotSz + pad;
  var payAvail = !!(window.ysdk && window.ysdk.getPayments) || passOwned;
  if (payAvail) {
    var pbH = clamp(40 * S, 32, 52);
    rr(ctx, colX, gridY, colW, pbH, 10 * S);
    var pbg = ctx.createLinearGradient(colX, gridY, colX + colW, gridY);

    ctx.lineWidth = 1.2 * S; ctx.stroke();
    icoStar(colX + pbH * 0.5, gridY + pbH / 2, pbH * 0.26, '#ffd86b');
    ctx.font = 'bold ' + clamp(11 * S, 9, 14) + 'px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#ffe9a8';
    ctx.fillText(t('passTitle'), colX + pbH * 0.95, gridY + pbH * 0.34);
    ctx.font = clamp(9 * S, 7, 11) + 'px sans-serif'; ctx.fillStyle = '#cdb98a';
    ctx.fillText(t('passDesc'), colX + pbH * 0.95, gridY + pbH * 0.68);
    var btW = clamp(78 * S, 60, 104), btH = clamp(26 * S, 22, 34);
    var btX = colX + colW - btW - 8 * S, btY = gridY + pbH / 2 - btH / 2;
    rr(ctx, btX, btY, btW, btH, btH / 2);
    if (passOwned) {
      ctx.fillStyle = 'rgba(46,204,113,0.2)'; ctx.fill();
      ctx.fillStyle = '#7be0a0'; ctx.textAlign = 'center';
      ctx.font = 'bold ' + clamp(10 * S, 8, 13) + 'px sans-serif';
      ctx.fillText(t('passOwnedTxt'), btX + btW / 2, btY + btH / 2);
    } else {
      var gb = ctx.createLinearGradient(btX, btY, btX, btY + btH);
      gb.addColorStop(0, '#ffd86b'); gb.addColorStop(1, '#e0a512');
      ctx.fillStyle = gb; ctx.fill();
      ctx.fillStyle = '#3a2a00'; ctx.textAlign = 'center';
      ctx.font = 'bold ' + clamp(10 * S, 8, 13) + 'px sans-serif';
      ctx.fillText(t('buyPass'), btX + btW / 2, btY + btH / 2);
      metaRects.push({ x: btX, y: btY, w: btW, h: btH, fn: purchasePass });
    }
    ctx.textBaseline = 'alphabetic';
    gridY += pbH + pad * 0.8;
  }

  // ── collection grid: 2 cols of tool cards ──
  ctx.font = 'bold ' + clamp(11 * S, 9, 14) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#7da';
  ctx.fillText(t('collection') + '  (' + t('toolsHint').toLowerCase() + ' ' + toolsHintMins() + t('minShort') + ')', colX, gridY);
  var cardsTop = gridY + 8 * S;
  var cols = 2;
  var cardGap = clamp(10 * S, 6, 14);
  var cardW = (colW - cardGap) / cols;
  // available vertical space until the bottom button band
  var bottomBand = H - clamp(48 * S, 40, 60) - clamp(16 * S, 10, 22) - pad;
  var rowsN = Math.ceil(TOOLS.length / cols);
  var cardH = clamp(Math.min(72 * S, (bottomBand - cardsTop - (rowsN - 1) * cardGap) / rowsN), 48, 84);
  for (var i = 0; i < TOOLS.length; i++) {
    var td = TOOLS[i];
    var cc = i % cols, cr = (i / cols) | 0;
    var cardX = colX + cc * (cardW + cardGap);
    var cardYy = cardsTop + cr * (cardH + cardGap);
    var owned = toolOwned(td.id);
    var equippedNow = meta2 && meta2.equipped.indexOf(td.id) >= 0;
    rr(ctx, cardX, cardYy, cardW, cardH, 10 * S);
    ctx.fillStyle = owned ? (equippedNow ? 'rgba(77,208,225,0.12)' : 'rgba(255,255,255,0.06)') : 'rgba(255,255,255,0.03)';
    ctx.fill();
    ctx.strokeStyle = equippedNow ? '#4dd0e1' : (owned ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.08)');
    ctx.lineWidth = equippedNow ? 2 * S : 1; ctx.stroke();
    // icon
    ctx.save(); if (!owned) ctx.globalAlpha = 0.4;
    drawToolIcon(td.id, cardX + cardH * 0.42, cardYy + cardH * 0.42, cardH * 0.26);
    ctx.restore();
    var txX = cardX + cardH * 0.82;
    // name
    ctx.font = 'bold ' + clamp(11 * S, 9, 14) + 'px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = owned ? '#dfeefc' : '#778';
    ctx.fillText(t(td.nameKey), txX, cardYy + cardH * 0.30);
    // desc
    ctx.font = clamp(9 * S, 8, 12) + 'px sans-serif';
    ctx.fillStyle = owned ? '#8fb0c8' : '#667';
    ctx.fillText(t(td.descKey), txX, cardYy + cardH * 0.50);
    if (owned) {
      // lvl pips
      var lv = toolLvl(td.id);
      var pr = clamp(3 * S, 2.5, 4);
      for (var pp = 0; pp < 5; pp++) {
        ctx.beginPath(); ctx.arc(txX + pr + pp * pr * 2.6, cardYy + cardH * 0.66, pr, 0, Math.PI * 2);
        ctx.fillStyle = pp < lv ? '#4dd0e1' : 'rgba(255,255,255,0.16)'; ctx.fill();
      }
      // action pill: EQUIP/EQUIPPED (left) + UPGRADE (right) at the card bottom
      var actH = clamp(20 * S, 16, 26);
      var actY = cardYy + cardH - actH - 5 * S;
      var halfW = (cardW - cardH * 0.82 - 6 * S) / 2 - 3 * S;
      // equip toggle
      var eqX = txX;
      rr(ctx, eqX, actY, halfW, actH, actH / 2);
      ctx.fillStyle = equippedNow ? 'rgba(46,204,113,0.18)' : 'rgba(255,255,255,0.08)';
      ctx.fill();
      ctx.font = 'bold ' + clamp(9 * S, 7, 11) + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = equippedNow ? '#7be0a0' : '#bcd';
      ctx.fillText(equippedNow ? t('equipped') : t('equip'), eqX + halfW / 2, actY + actH / 2);
      metaRects.push({ x: eqX, y: actY, w: halfW, h: actH, fn: (function(id){ return function(){ toggleEquipTool(id); }; })(td.id) });
      // upgrade
      var upX = eqX + halfW + 6 * S;
      var maxed = lv >= 5;
      var cost = toolUpCost(td.id);
      var afford = !maxed && metaShards >= cost;
      rr(ctx, upX, actY, halfW, actH, actH / 2);
      ctx.fillStyle = maxed ? 'rgba(255,255,255,0.06)' : afford ? 'rgba(77,208,225,0.85)' : 'rgba(255,255,255,0.06)';
      ctx.fill();
      ctx.fillStyle = maxed ? '#667' : afford ? '#06202a' : '#667';
      if (maxed) ctx.fillText(t('upg_maxed'), upX + halfW / 2, actY + actH / 2);
      else {
        var ut = String(cost);
        var uw = ctx.measureText(ut).width;
        ctx.fillText(ut, upX + halfW / 2 - actH * 0.22, actY + actH / 2);
        icoShard(upX + halfW / 2 + uw / 2 + actH * 0.1, actY + actH / 2, actH * 0.28, afford ? '#06202a' : '#667');
      }
      if (afford) metaRects.push({ x: upX, y: actY, w: halfW, h: actH, fn: (function(id){ return function(){ upgradeTool(id); }; })(td.id) });
      ctx.textBaseline = 'alphabetic';
    } else {
      // locked: show unlock-at minutes
      var lkFs = clamp(10 * S, 8, 13);
      icoLock(txX + lkFs * 0.5, cardYy + cardH * 0.70, lkFs * 0.5, '#8aa');
      ctx.font = clamp(9 * S, 7, 12) + 'px sans-serif';
      ctx.textAlign = 'left'; ctx.fillStyle = '#8aa';
      ctx.fillText(t('play2unlock') + ' ' + td.min + t('minShort'), txX + lkFs * 1.2, cardYy + cardH * 0.73);
    }
  }
}
// minutes remaining to the next unlock (for the collection header hint)
function toolsHintMins() {
  var nd = nextToolDef();

// QUESTS tab: 3 daily quest cards + streak line.
function drawMetaQuests(colX, colW, y, pad) {
  // streak + reset note
  ctx.font = 'bold ' + clamp(11 * S, 9, 14) + 'px sans-serif';

  ctx.fillStyle = '#7da';

    ctx.font = 'bold ' + clamp(12 * S, 10, 15) + 'px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = q.claimed ? '#667' : '#e6f2ff';
    ctx.fillText(label, colX + pad, cardY + cardH * 0.34);
    // progress bar
    var barX = colX + pad, barY = cardY + cardH * 0.50, barW = colW - pad * 2 - clamp(90 * S, 70, 120), barH = clamp(8 * S, 6, 11);
    rr(ctx, barX, barY, barW, barH, barH / 2); ctx.fillStyle = 'rgba(255,255,255,0.10)'; ctx.fill();
    var frac = Math.min(1, q.prog / q.target);
    if (frac > 0) { rr(ctx, barX, barY, barW * frac, barH, barH / 2); ctx.fillStyle = done ? '#2ecc71' : '#4dd0e1'; ctx.fill(); }
    ctx.font = clamp(9 * S, 8, 12) + 'px sans-serif'; ctx.fillStyle = '#9ab'; ctx.textAlign = 'left';
    ctx.fillText(q.prog + ' / ' + q.target, barX, cardY + cardH * 0.80);

    var rwX = colX + colW - pad - clamp(82 * S, 64, 110);
    var rwW = clamp(82 * S, 64, 110), rwH = clamp(30 * S, 24, 40);
    var rwY = cardY + cardH / 2 - rwH / 2;
    rr(ctx, rwX, rwY, rwW, rwH, rwH / 2);
    if (q.claimed) {
      ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
      ctx.fillStyle = '#566'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + clamp(10 * S, 8, 13) + 'px sans-serif';
      icoCheck(rwX + rwW * 0.3, rwY + rwH / 2, rwH * 0.26, '#566');
      ctx.fillText(t('claimed'), rwX + rwW * 0.62, rwY + rwH / 2);
    } else if (done) {
      var g3 = ctx.createLinearGradient(rwX, rwY, rwX, rwY + rwH);
      g3.addColorStop(0, '#2ecc71'); g3.addColorStop(1, '#1c9e54');
      ctx.fillStyle = g3; ctx.fill();
      ctx.fillStyle = '#062012'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + clamp(11 * S, 9, 14) + 'px sans-serif';
      ctx.fillText(t('claim'), rwX + rwW / 2, rwY + rwH / 2);
      metaRects.push({ x: rwX, y: rwY, w: rwW, h: rwH, fn: (function(idx){ return function(){ claimQuest(idx); }; })(i) });
    } else {
      ctx.fillStyle = 'rgba(80,180,255,0.10)'; ctx.fill();
      ctx.fillStyle = '#bcd'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.font = 'bold ' + clamp(11 * S, 9, 14) + 'px sans-serif';
      var rt = '+' + q.reward;
      icoShard(rwX + rwW * 0.30, rwY + rwH / 2, rwH * 0.26, '#6fd3ff');
      ctx.fillText(rt, rwX + rwW * 0.48, rwY + rwH / 2);
    }
    ctx.textBaseline = 'alphabetic';
  }
  if (qs.length === 0) {
    ctx.font = clamp(13 * S, 11, 16) + 'px sans-serif'; ctx.fillStyle = '#8aa';
    ctx.textAlign = 'center'; ctx.fillText(t('comeBack'), cx, cardsTop + 40 * S);
  }
}
function questLabel(q) {
  if (q.type === 'clear')   return tf('questClear', { n: q.target });
  if (q.type === 'frozen')  return tf('questFrozen', { n: q.target });
  if (q.type === 'chain')   return tf('questChain', { n: q.target });
  if (q.type === 'perfect') return tf('questPerfect', { n: q.target });
  if (q.type === 'deep')    return tf('questDeep', { n: q.target });
  return '';
}

}

    ctx.strokeStyle=col; ctx.lineWidth=Math.max(1.4,r*0.16);

// ── iter#13: Run summary stats row on GAMEOVER ─────────────────────────────
// Shows 3 compact stat chips below the score line and above the RETRY button:
//   [shard N FROZEN]  [shard N THICK]  [chain xN CHAIN]
// Only the chips where N > 0 are rendered; if all zero (first run / no specials
// hit), the row is skipped entirely to avoid clutter.
// Y-position is anchored just below the score sub-line on the GAMEOVER overlay
// (cy - 16*S is the score line; chips sit at cy + 2*S, leaving the RETRY
// button at cy + 20*S clear below them).
function drawRunSummary() {
  // Only show on GAMEOVER and only if the player cleared any special tiles or
  // built a meaningful chain (peak >= 3)
  if (gs !== 'GAMEOVER') return;
  var hasData = frozenClearedRun > 0 || thickClearedRun > 0 || peakChainRun >= 3 || perfectLevelsRun > 0 || deepCoresRun > 0;
  if (!hasData) return;

  // Build the chip list (kind = vector icon selector, not emoji)
  var chips = [];
  if (frozenClearedRun > 0) chips.push({ kind:'frozen', val: frozenClearedRun, label: t('runFrozen'), col: '#cc88ff' });
  if (thickClearedRun > 0)  chips.push({ kind:'thick',  val: thickClearedRun,  label: t('runThick'),  col: '#aaddff' });
  if (deepCoresRun > 0)     chips.push({ kind:'deep',   val: deepCoresRun,     label: t('layer_core'),col: '#FFD700' });
  if (peakChainRun >= 3)    chips.push({ kind:'chain',  val: 'x' + peakChainRun, label: t('runChain'), col: '#FF8C42' });
  // iter#14: show perfect-lake count if player hit at least 1 this run
  if (perfectLevelsRun > 0) chips.push({ kind:'perfect',val: perfectLevelsRun, label: t('runPerfect'), col: '#FFD700' });
  if (chips.length === 0) return;

  var chipH = clamp(28*S, 22, 36);
  var chipPad = clamp(10*S, 7, 14);
  var fs = clamp(10*S, 8, 13);
  var iconFs = clamp(12*S, 10, 15);
  var gap = clamp(8*S, 5, 12);

  // Measure widths
  ctx.font = 'bold ' + fs + 'px sans-serif';
  var chipWidths = chips.map(function(c) {
    return chipPad * 2 + clamp(14*S, 11, 18) + chipPad * 0.6 + ctx.measureText(c.val + ' ' + c.label).width;
  });
  var totalW = chipWidths.reduce(function(a, b) { return a + b; }, 0) + gap * (chips.length - 1);
  var x0 = cx - totalW / 2;
  // Position: just above centre-overlay (between score sub-line and RETRY button)
  var rowY = cy + 4*S;

  for (var i = 0; i < chips.length; i++) {
    var ch = chips[i];
    var cw = chipWidths[i];
    var cx_chip = x0;

    // chip pill
    rr(ctx, cx_chip, rowY, cw, chipH, chipH / 2);
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.fill();
    ctx.strokeStyle = ch.col.replace(')', ',0.45)').replace('rgb', 'rgba');
    // strokeStyle is already hex; convert via opacity trick
    ctx.strokeStyle = 'rgba(200,200,200,0.30)';
    ctx.lineWidth = Math.max(1, 0.8*S);
    ctx.stroke();

    // icon (vector, not emoji)
    ctx.shadowColor = ch.col; ctx.shadowBlur = 6*S;
    var _icr = iconFs * 0.5;
    var _icx = cx_chip + chipH * 0.52, _icy = rowY + chipH / 2;
    if (ch.kind === 'frozen' || ch.kind === 'thick' || ch.kind === 'deep') icoShard(_icx, _icy, _icr, ch.col);
    else if (ch.kind === 'chain') { ctx.strokeStyle = ch.col; ctx.lineWidth = Math.max(1.4, _icr*0.4); ctx.beginPath(); ctx.arc(_icx - _icr*0.4, _icy, _icr*0.5, -0.6, 3.3); ctx.arc(_icx + _icr*0.4, _icy, _icr*0.5, Math.PI-0.6, Math.PI+3.3); ctx.stroke(); }
    else icoStar(_icx, _icy, _icr, ch.col);
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

    // value + label
    ctx.font = 'bold ' + fs + 'px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillStyle = ch.col;
    ctx.fillText(ch.val, cx_chip + chipH * 0.90, rowY + chipH / 2 - clamp(3*S, 2, 4));
    ctx.font = clamp(9*S, 7, 11) + 'px sans-serif';
    ctx.fillStyle = 'rgba(200,210,230,0.65)';
    ctx.fillText(ch.label, cx_chip + chipH * 0.90, rowY + chipH / 2 + clamp(5*S, 4, 7));

    ctx.textBaseline = 'alphabetic';
    x0 += cw + gap;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// milestone#3: HANDS-ON, ACTION-GATED TUTORIAL (Merge Guns style, Build Hygiene
// #10). Each step advances ONLY when the player performs the REAL action; an
// animated demo HAND SHOWS the gesture (Tim 2026-06-04 "the hand is the good
// ux"). Steps for a steering game:
//   0: drive onto a dirty tile to crack it      -> advances on first crack
//   1: keep rolling over it to clear it          -> advances on first cleared tile
//   2: chain neighbours / clear 3 more           -> advances after 3 clears
// A light scrim + slim caption above the hand; skip-x always works. First
// session only (localStorage flag), and never under __GF_AUTOSTART.
// ═══════════════════════════════════════════════════════════════════════════
var tutorialActive = false;
var tutArmed = false;   // first-session flag: activate when PLAYING begins
var tutStep = 0;
var tutPulse = 0;
var tutClears = 0;      // tiles cleared during the tutorial (for step 2)
var tutSkipRect = null;
var TUT_STEPS = [
  { textKey: 'tut_t_drive', gesture: 'drag' },
  { textKey: 'tut_t_clear', gesture: 'drag' },
  { textKey: 'tut_t_chain', gesture: 'drag' },
];
function maybeStartTutorial() {
  var seen = false;
  try { seen = localStorage.getItem('ice_tut_v2') === '1'; } catch(e) {}
  // ARM only: the tutorial activates the first time the player enters PLAYING
  // (so the MENU's PLAY button stays the first thing - the yandex-testing gflib
  // adapter finds PLAY by sweeping the menu center, and the gallery shows a menu).
  tutArmed = !seen;
  tutorialActive = false;
}
// called from startLevel when a real run begins on level 1
function activateTutorialIfArmed() {
  if (tutArmed && !window.__GF_AUTOSTART) { tutorialActive = true; tutArmed = false; tutStep = 0; tutClears = 0; }
}
function tutFinish() {
  tutorialActive = false;
  try { localStorage.setItem('ice_tut_v2', '1'); } catch(e) {}
}
function tutAdvance() {
  tutStep++;
  if (tutStep >= TUT_STEPS.length) tutFinish();
}
// Called from the gameplay events: a crack happened / a tile cleared.
function tutOnCrack() { if (tutorialActive && tutStep === 0) tutAdvance(); }
function tutOnClear() {
  if (!tutorialActive) return;
  if (tutStep === 1) { tutAdvance(); return; }
  if (tutStep === 2) { tutClears++; if (tutClears >= 3) tutAdvance(); }
}
// Tap handling: only the skip-x is interactive; all OTHER taps fall THROUGH to
// the real steering handlers (so the player learns by doing). Returns true only
// if the skip button consumed the tap.
function handleTutorialTap(px, py) {
  if (!tutorialActive || gs !== 'PLAYING') return false;
  if (tutSkipRect && px >= tutSkipRect.x && px <= tutSkipRect.x + tutSkipRect.w &&
      py >= tutSkipRect.y && py <= tutSkipRect.y + tutSkipRect.h) { tutFinish(); return true; }
  return false; // let steering through
}
function _tutHand(x, y, press) {
  ctx.save();
  ctx.translate(x, y);
  var k = press ? 0.88 : 1;
  ctx.scale(k * S, k * S);
  ctx.rotate(-0.26);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.shadowColor = 'rgba(0,0,0,0.32)'; ctx.shadowBlur = 7; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 4;
  ctx.fillStyle = '#ffd9b0'; ctx.strokeStyle = '#7a4e2c'; ctx.lineWidth = 2.4;
  rr(ctx, -15, 23, 30, 33, 13); ctx.fill(); ctx.stroke();                 // fist
  ctx.beginPath(); ctx.ellipse(-15, 31, 7, 10, -0.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); // thumb
  rr(ctx, -6, 0, 12, 30, 6); ctx.fill(); ctx.stroke();                    // index finger (tip at 0,0)
  ctx.shadowColor = 'transparent';
  ctx.restore();
}
function drawTutorial() {
  if (!tutorialActive) return;
  if (gs !== 'PLAYING') return; // only coach during live play, never over MENU/GAMEOVER
  tutPulse += 0.03;
  var step = TUT_STEPS[tutStep] || TUT_STEPS[0];
  // light scrim so the board stays visible
  ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillRect(0, 0, W, H);
  // demo: a hand dragging away from the ship toward a nearby dirty tile, looping
  var from = { x: ship.x, y: ship.y };
  var to = nearestDirtyForTut() || { x: ship.x + TILE * 1.6, y: ship.y };
  // highlight the target tile
  var pulse = 0.5 + 0.5 * Math.sin(tutPulse * 3.5);
  ctx.save();
  ctx.strokeStyle = '#ffeb3b'; ctx.shadowColor = '#ffeb3b'; ctx.shadowBlur = 16;
  ctx.lineWidth = 3 + pulse * 1.5; ctx.globalAlpha = 0.85;
  ctx.strokeRect(to.x - TILE/2, to.y - TILE/2, TILE, TILE);
  ctx.restore();
  // dashed path + hand drag
  ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 3 * S;
  ctx.setLineDash([7 * S, 7 * S]); ctx.lineDashOffset = -tutPulse * 36;
  ctx.beginPath(); ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y); ctx.stroke(); ctx.restore();
  var cyc = 2.2, tt = (tutPulse % cyc) / cyc, hx, hy, pr;
  if (tt < 0.18) { hx = from.x; hy = from.y; pr = true; }
  else if (tt < 0.7) { var kk = (tt - 0.18) / 0.52; hx = from.x + (to.x - from.x) * kk; hy = from.y + (to.y - from.y) * kk; pr = true; }
  else { hx = to.x; hy = to.y; pr = false; }
  _tutHand(hx, hy, pr);
  // slim caption pill above the action
  var capFs = clamp(14 * S, 12, 18) | 0;
  ctx.font = 'bold ' + capFs + 'px sans-serif';
  var capTxt = t(step.textKey);
  var capW = ctx.measureText(capTxt).width;
  var maxW = Math.min(W * 0.88, 460 * S);
  while (capW > maxW && capFs > 11) { capFs--; ctx.font = 'bold ' + capFs + 'px sans-serif'; capW = ctx.measureText(capTxt).width; }
  var skipTxt = (lang === 'ru' ? 'пропустить' : 'skip') + ' x';
  ctx.font = (capFs - 1) + 'px sans-serif';
  var skipW = ctx.measureText(skipTxt).width;
  var padX = 14 * S, gapX = 14 * S, pillH = clamp(32 * S, 27, 42);
  var pillW = capW + padX * 2 + gapX + skipW;
  var ay = Math.max((HUD_H + 70) * S, Math.min(from.y, to.y) - TILE - pillH);
  var ax = clamp(cx, pillW / 2 + 8 * S, W - pillW / 2 - 8 * S);
  rr(ctx, ax - pillW / 2, ay, pillW, pillH, pillH / 2);
  ctx.fillStyle = 'rgba(8,16,32,0.92)'; ctx.fill();
  ctx.strokeStyle = 'rgba(120,200,255,0.4)'; ctx.lineWidth = 1.2 * S; ctx.stroke();
  ctx.font = 'bold ' + capFs + 'px sans-serif'; ctx.fillStyle = '#eaf4ff';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(capTxt, ax - pillW / 2 + padX, ay + pillH / 2);
  // skip
  ctx.font = (capFs - 1) + 'px sans-serif'; ctx.fillStyle = '#88a';
  var skipX = ax - pillW / 2 + padX + capW + gapX;
  ctx.fillText(skipTxt, skipX, ay + pillH / 2);
  tutSkipRect = { x: skipX - 6 * S, y: ay, w: skipW + 12 * S, h: pillH };
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  // step dots
  var dotR = 3 * S, dgap = 9 * S, dN = TUT_STEPS.length;
  var dx0 = cx - ((dN - 1) * dgap) / 2;
  for (var di = 0; di < dN; di++) {
    ctx.beginPath(); ctx.arc(dx0 + di * dgap, ay - 10 * S, dotR, 0, Math.PI * 2);
    ctx.fillStyle = di === tutStep ? '#4dd0e1' : 'rgba(255,255,255,0.3)'; ctx.fill();
  }
}
// find the dirty tile nearest the ship to point the tutorial hand at
function nearestDirtyForTut() {
  if (!grid || !grid.length) return null;
  var o = gridOrigin();
  var best = null, bd = 1e9;
  for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) {
    if (grid[r][c].state < 0) continue;
    var tx = o.x + c * TILE + TILE / 2, ty = o.y + r * TILE + TILE / 2;
    var d = (tx - ship.x) * (tx - ship.x) + (ty - ship.y) * (ty - ship.y);
    if (d > 1 && d < bd) { bd = d; best = { x: tx, y: ty }; }
  }
  return best;
}

// ═══════════════════════════════════════════════════════════════════════════
// milestone#3: MONETIZATION - one-time "Frost Pass" (rewarded-only economy is
// already in place via the EXTRA TIME + DOUBLE-IDLE rewarded ads). The Pass is a
// value-positive, NON-punishing IAP: +25% shards earned forever + a one-time
// shard grant + a cosmetic gold hull, purchased via ysdk.payments. There is
// ALWAYS a non-RV path to play and earn (Yandex 1.15) - the Pass only sweetens.
// If payments are unavailable (gallery/preview), the buy button is hidden.
// ═══════════════════════════════════════════════════════════════════════════
var passOwned = false;
function loadPass() { try { passOwned = localStorage.getItem('ice_pass') === '1'; } catch(e) {} }
function grantPass() {
  if (passOwned) return;
  passOwned = true;
  metaShards += 50; // one-time welcome bundle
  try { localStorage.setItem('ice_pass', '1'); } catch(e) {}
  // auto-equip the exclusive gold hull
  for (var i = 0; i < HULL_PALETTES.length; i++) { if (HULL_PALETTES[i].pass) { selectHull(i); break; } }
  saveMeta(); SFX.newBest();
}
function passShardMult() { return passOwned ? 1.25 : 1; }
function purchasePass() {
  // real IAP via Yandex payments when present; otherwise no-op (button hidden).
  if (window.ysdk && window.ysdk.getPayments) {
    try {
      window.ysdk.getPayments({ signed: true }).then(function(p) {
        p.purchase({ id: 'frost_pass' }).then(function() { grantPass(); }).catch(function() {});
      }).catch(function() {});
    } catch(e) {}
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// milestone#3: LIMITED-TIME EVENT - a ~3-day "Aurora Rush" window. During the
// event, DEEP CORES and FROZEN tiles pay DOUBLE shards, and a banner advertises
// it on the MENU. The window is derived from the calendar (a 3-day cycle) so it
// turns on/off without server code and every player shares the same schedule.
// Manufactures urgency + freshness as base content thins (D30 sustain).
// ═══════════════════════════════════════════════════════════════════════════
var eventActive = false;
var eventDaysLeft = 0;
function refreshEvent() {
  // 3-day-on / 3-day-off cycle keyed off the day number since epoch.
  var dayNum = Math.floor(Date.now() / 86400000);
  var phase = dayNum % 6;          // 0..5
  eventActive = phase < 3;         // first 3 days of each 6-day cycle
  eventDaysLeft = eventActive ? (3 - phase) : 0;
}
function eventShardMult() { return eventActive ? 2 : 1; }
function drawEventBadge() {
  if (!eventActive) return;
  var bw = Math.min(W * 0.8, 320 * S), bh = clamp(30 * S, 24, 40);
  var bx = cx - bw / 2, by = clamp(56 * S, 44, 80);
  var pulse = 0.6 + 0.4 * Math.sin(performance.now() / 500);
  rr(ctx, bx, by, bw, bh, bh / 2);
  var g = ctx.createLinearGradient(bx, by, bx + bw, by);
  g.addColorStop(0, 'rgba(120,80,255,' + (0.5 + 0.3 * pulse) + ')');
  g.addColorStop(1, 'rgba(80,200,255,' + (0.5 + 0.3 * pulse) + ')');
  ctx.fillStyle = g; ctx.fill();
  ctx.font = 'bold ' + clamp(11 * S, 9, 14) + 'px sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(t('eventName') + ' · x2 ' + t('shards') + ' · ' + eventDaysLeft + t('eventDays'), cx, by + bh / 2);
  ctx.textBaseline = 'alphabetic';
}

// ── MAIN LOOP ───────────────────────────────────────────────────────────────
function frame(ts) {
  var dt = Math.min((ts - lastTs) / 1000, 0.08);
  lastTs = ts;

  update(dt);

  var sx = 0, sy = 0;
  if (shake > 0) { sx=(Math.random()-0.5)*shake*10*S; sy=(Math.random()-0.5)*shake*10*S; }

  // milestone#2: popup click-rects are rebuilt only by drawDailyPopups() on MENU;
  // clear them every frame so they never linger into PLAYING and swallow steering.
  if (!metaOpen) popupRects = [];

  ctx.save();
  ctx.translate(sx, sy);
  ctx.fillStyle = '#0a1530';
  ctx.fillRect(-20, -20, W+40, H+40);

  if (gs === 'PLAYING' || gs === 'LEVELEND') {
    drawArena();

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
    }
    ctx.globalAlpha = 1;

    for (var i = 0; i < floats.length; i++) {
      var f = floats[i];
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.font = 'bold '+clamp(14*S,11,20)+'px sans-serif';
      ctx.fillStyle = f.col; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(f.txt, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    drawPickups(); // iter#10: floating speed-boost collectibles
    drawShip(ship.x, ship.y, ship.angle);
    drawHUD();
    drawChainBanner(); // iter#5
    drawPerfectBanner(); // iter#14
    drawDeepBanner(); // milestone#3: DEEP CORE! banner
    if (gs === 'PLAYING') {
      drawToolHint();  // milestone#1: "next tool in Nm" hint
      drawMetaPill();  // milestone#1: in-run TOOLS pill (meta reachable, #13)
    }
  }
  ctx.restore();

  if (gs === 'MENU') {
    ctx.fillStyle = '#0a1530'; ctx.fillRect(0,0,W,H);
    drawOverlay(t('title'), t('sub'), t('play'), function() { score=0; startLevel(1); });
    drawHullSwatches();
    drawUpgradeShop(); // iter#11: meta-upgrade shop below hull swatches
    drawDaySeedTag(); // iter#4: small "Day seed YYYYMMDD" tag near top
    drawAchievementBadges(); // iter#7: 5 emoji badges below day-seed tag
    drawMuteToggle(); // iter#8
    drawMetaMenuButton(); // milestone#1/#2: TOOLS/QUESTS entry (top-left)
    drawEventBadge(); // milestone#3: limited-time event banner if active
    drawDailyPopups(); // milestone#2: daily-reward / idle-haul popups over MENU
  }
  if (gs === 'LEVELEND') {
    drawOverlay(t('complete'), t('score')+': '+score, t('next'),
      function() { startLevel(level+1); });
    drawDaySeedTag();
    drawMuteToggle(); // iter#8
  }
  if (gs === 'GAMEOVER') {
    if (score > best && score > 0) {
      best = score;
      newBestThisRun = true;
      try { localStorage.setItem('ice_best', best); } catch(e) {}
      SFX.newBest();
    }
    // iter#11: credit shards once per session (idempotent via shardsGranted flag)
    if (!shardsGrantedThisRun && score > 0) {
      shardsGrantedThisRun = true;
      creditShardsForRun(score);
    }
    // iter#1: RETRY routes through throttled interstitial (Yandex 4.1)
    drawOverlay(t('gameover'), t('score')+': '+score, t('retry'),
      function() { showInterstitial(function() { score=0; startLevel(level); }); });
    drawDaySeedTag(); // iter#4
    drawRunSummary(); // iter#13: frozen/thick clears + peak chain row

    // iter#2: NEW BEST! banner above the title - pulses gold
    if (newBestThisRun) {
      newBestPulse += 0.08;
      var nbFs = clamp(22*S, 16, 32);
      var nbY = cy - 110*S;
      var nbPulse = 1 + Math.sin(newBestPulse) * 0.06;
      ctx.save();
      ctx.translate(cx, nbY);
      ctx.scale(nbPulse, nbPulse);
      ctx.font = 'bold '+nbFs+'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(255,215,0,0.7)'; ctx.shadowBlur = 18*S;
      ctx.fillStyle = '#FFD700';
      var _nbW = ctx.measureText(t('newBest')).width;
      ctx.fillText(t('newBest'), 0, 0);
      icoStar(-_nbW/2 - nbFs*0.7, 0, nbFs*0.4, '#FFD700');
      icoStar( _nbW/2 + nbFs*0.7, 0, nbFs*0.4, '#FFD700');
      ctx.restore();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    }

    // iter#1: EXTRA TIME (rewarded ad). One revive per level; user-click only.
    if (!extraTimeUsed) {
      var _btnW = clamp(240*S, 160, 320), _btnH = clamp(52*S, 40, 66);
      var _btnY = cy + 26*S;
      var rW = _btnW, rH = clamp(42*S, 34, 54);
      var rX = cx - rW/2;
      var rY = _btnY + _btnH + 14*S;
      rr(ctx, rX, rY, rW, rH, rH/2);
      var gradR = ctx.createLinearGradient(rX, rY, rX, rY+rH);
      gradR.addColorStop(0, '#FFD700'); gradR.addColorStop(1, '#8a6a00');
      ctx.fillStyle = gradR; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1.4 * S;
      ctx.stroke();
      ctx.font = 'bold ' + clamp(14*S, 11, 18) + 'px sans-serif';
      ctx.fillStyle = '#1a1a2e';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      // vector "play/RV" triangle badge
      var _exFs = clamp(14*S, 11, 18);
      var _exTw = ctx.measureText(t('extraTime')).width;
      var _exIconX = cx - _exTw/2 - 14*S;
      ctx.save(); ctx.fillStyle = '#1a1a2e';
      ctx.beginPath(); ctx.moveTo(_exIconX - _exFs*0.3, rY+rH/2 - _exFs*0.4);
      ctx.lineTo(_exIconX + _exFs*0.45, rY+rH/2); ctx.lineTo(_exIconX - _exFs*0.3, rY+rH/2 + _exFs*0.4);
      ctx.closePath(); ctx.fill(); ctx.restore();
      ctx.fillText(t('extraTime'), cx + 8*S, rY + rH/2);
      ctx.textBaseline = 'alphabetic';
      buttons.push({ x: rX, y: rY, w: rW, h: rH, fn: showRewardedExtraTime });
    }
    drawMuteToggle(); // iter#8
    drawMetaMenuButton(); // milestone#1/#2: TOOLS/QUESTS reachable post-death too
    // iter#11: shard balance indicator bottom-left on GAMEOVER
    if (metaShards > 0 || shardsGrantedThisRun) {
      var _sFs = clamp(11*S, 9, 14);
      icoShard(14*S + _sFs*0.4, H - 14*S - _sFs*0.35, _sFs*0.5, '#6fd3ff');
      ctx.font = 'bold ' + _sFs + 'px sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = 'rgba(100,210,255,0.65)';
      ctx.fillText(t('shards') + ': ' + metaShards, 14*S + _sFs*1.0, H - 14*S);
      ctx.textBaseline = 'alphabetic';
    }
  }

  // milestone#1/#2: META OVERLAY sits above the menu/gameplay (but below toasts).
  if (metaOpen) drawMetaOverlay();

  // milestone#1: tool-unlock toast + iter#7 achievement toast rendered LAST so
  // they sit above HUD / overlays.
  drawToolToast();
  drawAchievementToast();
  // milestone#3: the action-gated tutorial overlay renders on the very top.
  if (typeof drawTutorial === 'function') drawTutorial();

  requestAnimationFrame(frame);
}

// ── BOOT ────────────────────────────────────────────────────────────────────
var booted = false;
function boot() {
  if (booted) return;
  booted = true;
  try { best = parseInt(localStorage.getItem('ice_best')||'0')||0; } catch(e) {}
  try { bestChain = parseInt(localStorage.getItem('ice_chain_best')||'0')||0; } catch(e) {}
  loadHullChoice();
  loadAchievements(); // iter#7
  loadMeta(); // iter#11: load persistent shards + upgrade levels
  loadMeta2(); // milestone#1/#2: tools + daily + quests + idle
  processDailyOnBoot(); // milestone#2: streak / idle accrual / new-day quests
  loadPass(); // milestone#3: one-time Frost Pass purchase flag
  refreshEvent(); // milestone#3: roll the limited-time event for this window
  if (window.ysdk && window.ysdk.features && window.ysdk.features.LoadingAPI) {
    window.ysdk.features.LoadingAPI.ready();
  }
  gs = 'MENU';
  lastTs = performance.now();
  requestAnimationFrame(frame);
  // milestone#3: hands-on, action-gated tutorial (first session only). Drives a
  // demo HAND; advances only on the REAL action. Started after the first frame
  // so layout() has run. Skipped under autostart (platform) - see below.
  maybeStartTutorial();
  // ▶ PLATFORM AUTOSTART (CLAUDE.md #9): platform builds drop STRAIGHT into a
  // run; the gallery keeps its menu. build_platforms.sh injects __GF_AUTOSTART.
  // The meta stays reachable in-run via the TOOLS pill (Build Hygiene #13).
  if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU') {
    tutArmed = false; tutorialActive = false; // no tutorial overlay on autostart platforms
    score = 0; startLevel(1);
  }
}

(function() {
  if (typeof YaGames === 'undefined') { boot(); return; }
  YaGames.init().then(function(ysdk) {
    window.ysdk = ysdk;
    try {
      var l = ysdk.environment && ysdk.environment.i18n && ysdk.environment.i18n.lang;
      if (l) lang = l.startsWith('ru') ? 'ru' : 'en';
    } catch(e) {}
    boot();
  }).catch(function() { boot(); });
  setTimeout(boot, 3000);
})();

})();
</script>
