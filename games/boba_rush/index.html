}

function drawShopCard(ctx, card, x, y, w, h) {
  var S = GF.S;
  var lvl = up[card.id];
  var maxed = lvl >= card.max;
  var cost = upCost(card);
  var afford = coins >= cost && !maxed;
  ctx.save();
  ctx.fillStyle = maxed ? 'rgba(255,255,255,0.16)' : (afford ? '#fff8ee' : 'rgba(255,255,255,0.5)');
  GF.rr(ctx, x, y, w, h, GF.clamp(12 * S, 8, 16)); ctx.fill();
  // name + desc
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = maxed ? '#fff' : '#4a3520';
  ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  ctx.fillText(GF.t(card.nameKey) + '  ' + 'Lv' + lvl + '/' + card.max, x + 14 * S, y + h * 0.18);
  ctx.fillStyle = maxed ? 'rgba(255,255,255,0.8)' : '#7a5a3a';
  ctx.font = GF.clamp(11 * S, 9, 15) + 'px sans-serif';
  ctx.fillText(GF.t(card.descKey), x + 14 * S, y + h * 0.56);
  // buy chip (right)
  var chipW = GF.clamp(78 * S, 60, 110), chipH = h * 0.56;
  var chipX = x + w - chipW - 12 * S, chipY = y + (h - chipH) / 2;
  ctx.fillStyle = maxed ? '#888' : (afford ? '#ffb300' : '#cbb89a');
  GF.rr(ctx, chipX, chipY, chipW, chipH, chipH / 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px sans-serif';
  ctx.fillText(maxed ? GF.t('maxed') : ('🪙' + cost), chipX + chipW / 2, chipY + chipH / 2);
  ctx.restore();
}

// ── TUTORIAL PANEL (menu block + in-play "?" panel) ────────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

// Returns total height; if draw=true paints starting at y.
function layoutTutorial(ctx, x, y, maxW, draw) {
  var S = GF.S;
  var lineH = GF.clamp(17 * S, 13, 22);
  var gap = GF.clamp(8 * S, 5, 12);
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var cols = ['#3a2a1a', '#3a2a1a', '#2e6a3a', '#9a3a2a', '#7a5a20'];
  ctx.font = GF.clamp(13.5 * S, 11, 18) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  var cy = y;
  for (var k = 0; k < keys.length; k++) {
    var lines = wrapLines(ctx, GF.t(keys[k]), maxW);
    if (draw) {
      ctx.fillStyle = cols[k];
      for (var j = 0; j < lines.length; j++) ctx.fillText(lines[j], x, cy + j * lineH);
    }
    cy += lines.length * lineH + gap;
  }
  return cy - y;
}

// in-play "?" panel
var tutBackRect = null;
function drawTutPanel(ctx, isMenu) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(40,24,14,0.86)';
  ctx.fillRect(0, 0, W, H);
  var pad = GF.clamp(22 * S, 14, 34);
  var maxW = Math.min(W - pad * 2, 460 * S);
  var x = GF.cx - maxW / 2;
  // measure to vertically center
  var totalH = layoutTutorial(ctx, x, 0, maxW, false);
  var titleFs = GF.clamp(24 * S, 18, 34);
  var startY = Math.max(H * 0.10, (H - totalH - titleFs * 3) / 2);
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillText(GF.t('title'), GF.cx, startY);
  layoutTutorial(ctx, x, startY + titleFs * 1.6, maxW, true);
  // close hint button
  var bw = Math.min(W * 0.6, 260 * S), bh = GF.clamp(48 * S, 38, 60);
  var bx = GF.cx - bw / 2, byy = startY + titleFs * 1.6 + totalH + GF.clamp(14 * S, 8, 22);
  byy = Math.min(byy, H - bh - 16 * S);
  ctx.fillStyle = '#ffb300';
  GF.rr(ctx, bx, byy, bw, bh, bh / 2); ctx.fill();
  ctx.fillStyle = '#4a3520'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  ctx.fillText(GF.t('tut_back'), GF.cx, byy + bh / 2);
  tutBackRect = { x: bx, y: byy, w: bw, h: bh };
}

// ── MENU ───────────────────────────────────────────────────────────────────
var menuPlayRect = null;
// CAFÉ-meta UI hit rects (rebuilt each draw frame)
var menuCafeRect = null;       // CAFÉ button on MENU
var cafePillRect = null;       // CAFÉ pause-pill mid-run (HUD)
var goCafeRect = null;         // CAFÉ link on GAMEOVER
var metaTabRects = [];         // [{tab,x,y,w,h}]
var metaCloseRect = null;
var metaContentRect = null;
var permRects = [];            // [{key,x,y,w,h,afford}] — permanent-upgrade buy chips
var toolTileRects = [];        // [{id,x,y,w,h}] — tap to equip/unequip
var toolUpRects = [];          // [{id,x,y,w,h,afford}] — tool upgrade chips
var equipSlotRects = [];       // [{slot,x,y,w,h}] — tap a filled slot to unequip
var taskClaimRects = [];       // [{i,x,y,w,h,can}] — claim button
var masteryRowRects = [];      // [{id,x,y,w,h,afford}] — endless mastery buy rows
var renownRect = null;         // [{x,y,w,h,can}] — prestige button
var VALID_TABS = { up:1, tools:1, master:1, tasks:1 };
function openCafe(tab) { metaOpen = true; metaTab = VALID_TABS[tab] ? tab : 'up'; beep(560, 0.05); }
function drawMenu(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(40,24,14,0.55)';
  ctx.fillRect(0, 0, W, H);

  // big glossy hero cup centerpiece
  drawHeroCup(ctx, GF.cx, H * 0.205, GF.clamp(120 * S, 80, 170));

  // title
  var titleFs = GF.clamp(40 * S, 26, 58);
  ctx.save();
  ctx.shadowColor = 'rgba(255,138,212,0.6)'; ctx.shadowBlur = 24 * S;
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = '900 ' + titleFs + 'px sans-serif';
  ctx.fillText(GF.t('title').toUpperCase(), GF.cx, H * 0.31);
  ctx.restore();
  ctx.fillStyle = '#ffe9c9'; ctx.font = 'bold ' + GF.clamp(14 * S, 11, 19) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('sub'), GF.cx, H * 0.31 + titleFs * 1.05);

  // tutorial block (condensed reminder for returning players)
  var pad = GF.clamp(20 * S, 12, 30);
  var maxW = Math.min(W - pad * 2, 440 * S);
  var tx = GF.cx - maxW / 2;
  var ty = H * 0.31 + titleFs * 1.05 + GF.clamp(26 * S, 18, 38);
  if (seenTutorial) {
    // condensed single reminder line
    ctx.fillStyle = '#fff';
    ctx.font = GF.clamp(13 * S, 11, 17) + 'px sans-serif';
    ctx.textAlign = 'center';
    var rem = wrapLines(ctx, GF.t('tut_goal') + ' ' + GF.t('tut_tip'), maxW);
    for (var i = 0; i < rem.length && i < 4; i++) ctx.fillText(rem[i], GF.cx, ty + i * GF.clamp(16 * S, 12, 20));
  } else {
    layoutTutorial(ctx, tx, ty, maxW, true);
  }

  // ── PLAY button — wide-desktop prominence fix ──────────────────────────
  var isWide = (GF.W / GF.H > 1.15);
  var baseBwBR = Math.min(W * 0.74, 320 * S), baseBhBR = GF.clamp(58 * S, 46, 74);
  // Measure tutorial block bottom (dry-run layoutTutorial)
  var tutTotalH = layoutTutorial(ctx, tx, ty, maxW, false);
  var tutBottomBR = ty + tutTotalH;
  var clearMarginBR = baseBhBR / 2 + 20;
  var wideFloorBR = H * 0.58;
  var bw, bh, byy;
  if (isWide) {
    bw = baseBwBR * 1.35; bh = baseBhBR * 1.35;
    byy = Math.max(tutBottomBR + clearMarginBR, wideFloorBR);
  } else {
    bw = baseBwBR; bh = baseBhBR;
    // PLAY is the primary action: keep it the moment the tutorial clears, but
    // pull it up into the easy-thumb band (~0.62H) so it sits ABOVE the café
    // button + stars line stacked below it. Reserve room below for café (cbh)
    // + stars + best so the whole stack fits on a phone.
    var reserveBelow = GF.clamp(46 * S, 40, 60) + GF.clamp(58 * S, 44, 76);
    byy = Math.min(Math.max(tutBottomBR + clearMarginBR, H * 0.60),
                   H - bh - reserveBelow - GF.clamp(18 * S, 12, 26));
  }
  var bx = GF.cx - bw / 2;
  if (isWide) {
    var tBR = performance.now() / 1000;
    var pulseBR = 1 + 0.05 * Math.sin(tBR * 2.2);
    var bwV = bw * pulseBR, bhV = bh * pulseBR;
    var bxV = GF.cx - bwV / 2, byV = byy + (bh - bhV) / 2;
    ctx.save();
    ctx.shadowColor = 'rgba(224,85,159,0.7)'; ctx.shadowBlur = (14 + 8 * Math.abs(Math.sin(tBR * 2.2))) * S;
    var gV = ctx.createLinearGradient(bxV, byV, bxV, byV + bhV);
    gV.addColorStop(0, '#ff8ad4'); gV.addColorStop(1, '#e0559f');
    ctx.fillStyle = gV; GF.rr(ctx, bxV, byV, bwV, bhV, bhV / 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(24 * S, 17, 30) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('▶ ' + GF.t('play'), GF.cx, byy + bh / 2);
  } else {
    var g = ctx.createLinearGradient(bx, byy, bx, byy + bh);
    g.addColorStop(0, '#ff8ad4'); g.addColorStop(1, '#e0559f');
    ctx.save();
    ctx.shadowColor = 'rgba(224,85,159,0.5)'; ctx.shadowBlur = 16 * S;
    ctx.fillStyle = g; GF.rr(ctx, bx, byy, bw, bh, bh / 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(20 * S, 15, 26) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(GF.t('play'), GF.cx, byy + bh / 2);
  }
  // Stable hit rect (non-pulsed position/size)
  menuPlayRect = { x: GF.cx - bw / 2, y: byy, w: bw, h: bh };

  // best line sits ABOVE the PLAY button (between PLAY and the tutorial)
  if (best > 0) {
    ctx.fillStyle = '#ffe9c9'; ctx.font = GF.clamp(13 * S, 10, 17) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, byy - 8 * S);
  }

  // ── CAFÉ button — opens the cross-session meta overlay (café upgrades +
  // tool ladder + daily tasks). Sits just BELOW PLAY so PLAY stays the primary
  // tap; a red badge shows claimable daily tasks; the banked Star count rides
  // below it.
  var cbw = bw, cbh = GF.clamp(46 * S, 40, 60);
  var cbx = GF.cx - cbw / 2, cby = byy + bh + GF.clamp(12 * S, 9, 18);
  var cg = ctx.createLinearGradient(cbx, cby, cbx, cby + cbh);
  cg.addColorStop(0, '#caa05a'); cg.addColorStop(1, '#9c7434');
  ctx.save();
  ctx.shadowColor = 'rgba(120,70,30,0.45)'; ctx.shadowBlur = 10 * S;
  ctx.fillStyle = cg; GF.rr(ctx, cbx, cby, cbw, cbh, cbh / 2); ctx.fill();
  ctx.restore();
  // vector star + label, centred as a group
  ctx.font = 'bold ' + GF.clamp(17 * S, 13, 22) + 'px sans-serif';
  var clabel = GF.t('cafe');
  var clw = ctx.measureText(clabel).width;
  var starR = GF.clamp(11 * S, 9, 15);
  var groupW = clw + starR * 2 + 10 * S;
  var gx0 = GF.cx - groupW / 2;
  drawStarIcon(ctx, gx0 + starR, cby + cbh / 2, starR, '#fff6c8');
  ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(clabel, gx0 + starR * 2 + 10 * S, cby + cbh / 2 + 1 * S);
  menuCafeRect = { x: cbx, y: cby, w: cbw, h: cbh };
  var cqMenu = claimableTasks();
  if (cqMenu > 0) drawBadge(ctx, cbx + cbw - 12 * S, cby + 6 * S, cqMenu);
  // banked Stars line under the café button
  ctx.fillStyle = '#ffe9c9'; ctx.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  var starTxt = (meta ? meta.stars : 0) + ' ' + GF.t('stars');
  drawStarIcon(ctx, GF.cx - ctx.measureText(starTxt).width / 2 - 9 * S, cby + cbh + GF.clamp(10 * S, 7, 14), GF.clamp(7 * S, 6, 10), '#ffd24a');
  ctx.fillText(starTxt, GF.cx + 6 * S, cby + cbh + GF.clamp(5 * S, 3, 8));
}

function drawHeroCup(ctx, x, y, sz) {
  // a big glossy boba cup overflowing with pearls — the hero object
  var w = sz, h = sz * 1.3;
  var bx = x - w / 2, by = y - h / 2;
  ctx.save();
  ctx.shadowColor = 'rgba(120,70,30,0.35)'; ctx.shadowBlur = 18; ctx.shadowOffsetY = 6;
  // cup
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  GF.rr(ctx, bx, by, w, h, w * 0.16); ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  // milk tea fill
  var fg = ctx.createLinearGradient(0, by + h * 0.2, 0, by + h);
  fg.addColorStop(0, '#e7c79a'); fg.addColorStop(1, '#c89a63');
  ctx.fillStyle = fg;
  GF.rr(ctx, bx + 4, by + h * 0.22, w - 8, h * 0.76, w * 0.12); ctx.fill();
  // pearls heap
  ctx.fillStyle = '#3a2a22';
  for (var i = 0; i < 16; i++) {
    var px = bx + w * (0.18 + (i % 5) * 0.16);
    var py = by + h * 0.84 - ((i / 5) | 0) * w * 0.13;
    ctx.beginPath(); ctx.arc(px, py, w * 0.07, 0, 6.28); ctx.fill();
  }
  // overflowing pearls on top
  ctx.fillStyle = '#4a342a';
  for (var k = 0; k < 6; k++) {
    var ox = x + (k - 2.5) * w * 0.14;
    var oy = by - w * 0.02 + Math.sin(k) * w * 0.04;
    ctx.beginPath(); ctx.arc(ox, oy, w * 0.066, 0, 6.28); ctx.fill();
  }
  // gloss
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  GF.rr(ctx, bx + w * 0.14, by + h * 0.10, w * 0.16, h * 0.7, w * 0.08); ctx.fill();
  // dome + straw
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.beginPath(); ctx.ellipse(x, by, w * 0.54, h * 0.10, 0, Math.PI, 0); ctx.fill();
  ctx.strokeStyle = '#ff8ad4'; ctx.lineWidth = w * 0.10; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x + w * 0.18, by - h * 0.2); ctx.lineTo(x - w * 0.06, by + h * 0.55); ctx.stroke();
  // outline
  ctx.strokeStyle = '#caa06a'; ctx.lineWidth = 3;
  GF.rr(ctx, bx, by, w, h, w * 0.16); ctx.stroke();
  // sparkle coins
  ctx.font = (w * 0.22) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('✨', x - w * 0.7, y - h * 0.2);
  ctx.fillText('🪙', x + w * 0.72, y + h * 0.05);
  ctx.restore();
}

// ── GAME OVER ──────────────────────────────────────────────────────────────
var goRetryRect = null;
function drawGameOver(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(40,24,14,0.86)';
  ctx.fillRect(0, 0, W, H);
  var titleFs = GF.clamp(38 * S, 26, 54);
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = '900 ' + titleFs + 'px sans-serif';
  ctx.fillText(GF.t('gameover'), GF.cx, H * 0.26);

  var fs = GF.clamp(18 * S, 14, 26);
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.fillStyle = '#ffd24a';
  ctx.fillText(GF.t('score') + ': ' + score(), GF.cx, H * 0.38);
  ctx.fillStyle = '#ffe9c9'; ctx.font = GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  ctx.fillText(GF.t('served') + ': ' + customersServed + '   🪙 ' + coins, GF.cx, H * 0.38 + fs * 1.5);
  ctx.fillStyle = '#fff';
  ctx.fillText(GF.t('best') + ': ' + best, GF.cx, H * 0.38 + fs * 2.8);

  // ── "+N Café Stars" line — the reason to return to the café. A glowing pill
  // banks-this-run's Stars (lastStarsEarned), the cross-session payoff.
  var starsY = H * 0.38 + fs * 4.3;
  var slabel = '+' + lastStarsEarned + ' ' + GF.t('starsBanked');
  ctx.font = 'bold ' + GF.clamp(17 * S, 13, 23) + 'px sans-serif';
  var slw = ctx.measureText(slabel).width;
  var sr = GF.clamp(11 * S, 9, 15);
  var pillW = slw + sr * 2 + 30 * S, pillH = GF.clamp(36 * S, 30, 46);
  var pillX = GF.cx - pillW / 2;
  ctx.save();
  ctx.shadowColor = 'rgba(255,210,74,0.55)'; ctx.shadowBlur = 14 * S;
  ctx.fillStyle = 'rgba(255,210,74,0.16)'; GF.rr(ctx, pillX, starsY, pillW, pillH, pillH / 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 1.6 * S; GF.rr(ctx, pillX, starsY, pillW, pillH, pillH / 2); ctx.stroke();
  ctx.restore();
  drawStarIcon(ctx, pillX + 14 * S + sr, starsY + pillH / 2, sr, '#ffd24a');
  ctx.fillStyle = '#ffe9a0'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(slabel, pillX + 14 * S + sr * 2 + 8 * S, starsY + pillH / 2 + 1 * S);

  // ── SESSION-END HOOK: the single cheapest next Café Mastery buy (the always-
  // visible "next thing" so leaving plants the reason to return — the endless
  // sink that fixes "nothing left to upgrade"). Hidden only if every track maxed.
  var cheap = cheapestMastery();
  if (cheap) {
    var have = meta ? meta.stars : 0;
    var ready = have >= cheap.cost;
    var htxt = GF.t('nextSpec') + ' ' + Math.max(0, cheap.cost - have) + (ready ? ' ✓' : '');
    ctx.font = GF.clamp(12.5 * S, 10, 16) + 'px sans-serif';
    var hw = ctx.measureText(htxt).width, hsr = GF.clamp(6.5 * S, 5.5, 9);
    var hlx = GF.cx - (hw + hsr * 2 + 6 * S) / 2;
    var hy = starsY + pillH + GF.clamp(16 * S, 12, 22);
    drawStarIcon(ctx, hlx + hsr, hy, hsr, ready ? '#9bd17a' : 'rgba(255,233,160,0.85)');
    ctx.fillStyle = ready ? '#bff0a0' : 'rgba(255,233,160,0.9)';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(htxt, hlx + hsr * 2 + 6 * S, hy + 0.5 * S);
  }

  // retry (bottom thumb zone — capped at H*0.85 center so it's inside the
  // gate's tap sweep band and easy to reach)
  var bw = Math.min(W * 0.74, 320 * S), bh = GF.clamp(58 * S, 46, 74);
  var bx = GF.cx - bw / 2, byy = Math.min(H - bh - GF.clamp(40 * S, 24, 64), H * 0.85 - bh / 2);
  var g = ctx.createLinearGradient(bx, byy, bx, byy + bh);
  g.addColorStop(0, '#ff8ad4'); g.addColorStop(1, '#e0559f');
  ctx.save();
  ctx.shadowColor = 'rgba(224,85,159,0.5)'; ctx.shadowBlur = 16 * S;
  ctx.fillStyle = g; GF.rr(ctx, bx, byy, bw, bh, bh / 2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(20 * S, 15, 26) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('retry'), GF.cx, byy + bh / 2);
  goRetryRect = { x: bx, y: byy, w: bw, h: bh };

  // CAFÉ link above retry (spend the Stars you just earned)
  var gobh = GF.clamp(40 * S, 34, 52), goby = byy - gobh - GF.clamp(12 * S, 8, 18);
  var gobw = Math.min(W * 0.6, 260 * S), gobx = GF.cx - gobw / 2;
  ctx.fillStyle = 'rgba(202,160,90,0.92)'; GF.rr(ctx, gobx, goby, gobw, gobh, gobh / 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('cafe'), GF.cx, goby + gobh / 2);
  var cqGo = claimableTasks();
  if (cqGo > 0) drawBadge(ctx, gobx + gobw - 12 * S, goby + 6 * S, cqGo);
  goCafeRect = { x: gobx, y: goby, w: gobw, h: gobh };
}

// ════════════════════════════════════════════════════════════════════════
// CAFÉ-META VECTOR ICONS (canvas paths — never emoji, which tofu in the font)
// ════════════════════════════════════════════════════════════════════════
// 5-point star (the Stars currency mark)
function drawStarIcon(ctx, x, y, r, col) {
  ctx.save();
  ctx.beginPath();
  for (var i = 0; i < 10; i++) {
    var ang = -Math.PI / 2 + i * Math.PI / 5;
    var rad = (i % 2 === 0) ? r : r * 0.45;
    var px = x + Math.cos(ang) * rad, py = y + Math.sin(ang) * rad;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = col || '#ffd24a'; ctx.fill();
  ctx.lineJoin = 'round'; ctx.lineWidth = Math.max(1, r * 0.12); ctx.strokeStyle = 'rgba(120,70,30,0.35)'; ctx.stroke();
  ctx.restore();
}
// small red count badge (claimable tasks)
function drawBadge(ctx, cxp, cyp, n) {
  var S = GF.S, r = GF.clamp(9 * S, 7, 12);
  ctx.save();
  ctx.beginPath(); ctx.arc(cxp, cyp, r, 0, 6.28); ctx.fillStyle = '#f4433a'; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(String(n), cxp, cyp + 0.5 * S);
  ctx.restore();
}
// ── MUTE TOGGLE (Yandex: every game exposes a mute control) ─────────────────
// Vector speaker icon ONLY (canvas paths, never an emoji glyph → no tofu).
// Unmuted = speaker + sound waves; muted = speaker + an X (slash). One tap
// flips BOTH the SFX gate and the music bed via setMuted(!muted).
function drawSpeakerIcon(ctx, x, y, r, isMuted, col) {
  ctx.save();
  ctx.translate(x, y);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  // speaker body (back box) + cone, pointing right
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(-r * 0.7, -r * 0.28);
  ctx.lineTo(-r * 0.28, -r * 0.28);
  ctx.lineTo(r * 0.12, -r * 0.62);
  ctx.lineTo(r * 0.12, r * 0.62);
  ctx.lineTo(-r * 0.28, r * 0.28);
  ctx.lineTo(-r * 0.7, r * 0.28);
  ctx.closePath();
  ctx.fill();
  if (isMuted) {
    // X to the right of the cone → clearly "off"
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(2, r * 0.18);
    ctx.beginPath();
    ctx.moveTo(r * 0.4, -r * 0.34); ctx.lineTo(r * 0.84, r * 0.34);
    ctx.moveTo(r * 0.84, -r * 0.34); ctx.lineTo(r * 0.4, r * 0.34);
    ctx.stroke();
  } else {
    // two concentric sound-wave arcs
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(1.5, r * 0.15);
    ctx.beginPath(); ctx.arc(r * 0.18, 0, r * 0.42, -Math.PI / 3.2, Math.PI / 3.2); ctx.stroke();
    ctx.beginPath(); ctx.arc(r * 0.18, 0, r * 0.72, -Math.PI / 3.2, Math.PI / 3.2); ctx.stroke();
  }
  ctx.restore();
}
// HUD mute pill — self-contained top-right position so it sits in the SAME
// spot on MENU and PLAYING (left of the CAFÉ/"?" cluster, above the queue).
// Sets muteRect for the hit-test; cleared to null when the pill is not drawn.
function drawMutePill(ctx) {
  var W = GF.W, S = GF.S;
  var cupR = GF.clamp(11 * S, 8, 15);
  var hr = GF.clamp(15 * S, 12, 20);                 // same radius as "?"/CAFÉ
  var my = 16 * S + cupR * 2 + hr + 6 * S;           // row-2 center (matches "?"/CAFÉ)
  var mx = W - hr - 12 * S - 2 * (hr * 2 + 8 * S);   // left of CAFÉ (which is left of "?")
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(mx, my, hr, 0, 6.28); ctx.fill();
  drawSpeakerIcon(ctx, mx, my, hr * 0.62, muted, '#7a4a20');
  ctx.restore();
  muteRect = { x: mx - hr * 1.5, y: my - hr * 1.5, w: hr * 3, h: hr * 3 };
}
// permanent café-upgrade glyphs (small vector marks per key)
function drawPermIcon(ctx, key, x, y, r, col) {
  ctx.save();
  ctx.fillStyle = col; ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = Math.max(1, r * 0.12); ctx.lineJoin = 'round';
  if (key === 'tipjar') {            // a coin
    ctx.beginPath(); ctx.arc(x, y, r * 0.85, 0, 6.28); ctx.fill(); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = 'bold ' + (r * 0.9) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  } else if (key === 'comfy') {      // a cushion / armchair
    GF.rr(ctx, x - r * 0.8, y - r * 0.2, r * 1.6, r * 0.9, r * 0.3); ctx.fill(); ctx.stroke();
    GF.rr(ctx, x - r * 0.8, y - r * 0.7, r * 0.45, r * 0.7, r * 0.2); ctx.fill(); ctx.stroke();
    GF.rr(ctx, x + r * 0.35, y - r * 0.7, r * 0.45, r * 0.7, r * 0.2); ctx.fill(); ctx.stroke();
  } else if (key === 'prep') {       // a counter / +slot box
    GF.rr(ctx, x - r * 0.85, y - r * 0.5, r * 1.7, r * 1.0, r * 0.2); ctx.fill(); ctx.stroke();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = r * 0.22; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x, y - r * 0.25); ctx.lineTo(x, y + r * 0.25); ctx.moveTo(x - r * 0.25, y); ctx.lineTo(x + r * 0.25, y); ctx.stroke();
  } else if (key === 'regulars') {   // chain links (loyalty)
    ctx.lineWidth = r * 0.28; ctx.strokeStyle = col;
    ctx.beginPath(); ctx.arc(x - r * 0.35, y, r * 0.45, 0, 6.28); ctx.stroke();
    ctx.beginPath(); ctx.arc(x + r * 0.35, y, r * 0.45, 0, 6.28); ctx.stroke();
  } else if (key === 'signature') {  // a star-stamped recipe card
    GF.rr(ctx, x - r * 0.8, y - r * 0.6, r * 1.6, r * 1.2, r * 0.2); ctx.fill(); ctx.stroke();
    drawStarIcon(ctx, x, y, r * 0.5, '#fff');
  }
  ctx.restore();
}
// café-tool glyphs (the 8 playtime-ladder items)
function drawToolIcon(ctx, def, x, y, r) {
  ctx.save();
  ctx.fillStyle = def.col; ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = Math.max(1, r * 0.13); ctx.lineJoin = 'round';
  switch (def.shape) {
    case 'card': // loyalty card with a star
      GF.rr(ctx, x - r * 0.9, y - r * 0.6, r * 1.8, r * 1.2, r * 0.22); ctx.fill(); ctx.stroke();
      drawStarIcon(ctx, x - r * 0.4, y, r * 0.4, '#fff');
      ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = r * 0.13;
      ctx.beginPath(); ctx.moveTo(x + r * 0.05, y - r * 0.18); ctx.lineTo(x + r * 0.6, y - r * 0.18);
      ctx.moveTo(x + r * 0.05, y + r * 0.15); ctx.lineTo(x + r * 0.6, y + r * 0.15); ctx.stroke();
      break;
    case 'shaker': // cocktail shaker (express)
      ctx.beginPath();
      ctx.moveTo(x - r * 0.5, y - r * 0.8); ctx.lineTo(x + r * 0.5, y - r * 0.8);
      ctx.lineTo(x + r * 0.62, y + r * 0.75); ctx.lineTo(x - r * 0.62, y + r * 0.75);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      GF.rr(ctx, x - r * 0.6, y - r, r * 1.2, r * 0.34, r * 0.12); ctx.fillStyle = '#fff'; ctx.fill(); ctx.stroke();
      break;
    case 'heart': // patience charm
      ctx.beginPath();
      ctx.moveTo(x, y + r * 0.7);
      ctx.bezierCurveTo(x - r * 1.1, y - r * 0.2, x - r * 0.4, y - r * 0.9, x, y - r * 0.3);
      ctx.bezierCurveTo(x + r * 0.4, y - r * 0.9, x + r * 1.1, y - r * 0.2, x, y + r * 0.7);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'jar': // jar of pearls (combo)
      GF.rr(ctx, x - r * 0.7, y - r * 0.5, r * 1.4, r * 1.2, r * 0.3); ctx.fill(); ctx.stroke();
      GF.rr(ctx, x - r * 0.5, y - r * 0.85, r * 1.0, r * 0.3, r * 0.1); ctx.fillStyle = '#fff'; ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#3a2a22';
      for (var pj = 0; pj < 5; pj++) {
        var jx = x - r * 0.4 + (pj % 3) * r * 0.4, jy = y + r * 0.1 + ((pj / 3) | 0) * r * 0.35;
        ctx.beginPath(); ctx.arc(jx, jy, r * 0.16, 0, 6.28); ctx.fill();
      }
      break;
    case 'straw': // golden straw (diagonal)
      ctx.strokeStyle = def.col; ctx.lineWidth = r * 0.45; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(x - r * 0.6, y + r * 0.8); ctx.lineTo(x + r * 0.3, y - r * 0.8); ctx.stroke();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = r * 0.16;
      ctx.beginPath(); ctx.moveTo(x - r * 0.45, y + r * 0.5); ctx.lineTo(x + r * 0.15, y - r * 0.45); ctx.stroke();
      break;
    case 'stamp': // lucky stamp (a star inside a ring)
      ctx.beginPath(); ctx.arc(x, y - r * 0.1, r * 0.75, 0, 6.28); ctx.fill(); ctx.stroke();
      drawStarIcon(ctx, x, y - r * 0.1, r * 0.4, '#fff');
      ctx.strokeStyle = def.col; ctx.lineWidth = r * 0.3; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(x, y + r * 0.62); ctx.lineTo(x, y + r * 0.95); ctx.stroke();
      break;
    case 'ice': // ice cube
      GF.rr(ctx, x - r * 0.7, y - r * 0.7, r * 1.4, r * 1.4, r * 0.25); ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      GF.rr(ctx, x - r * 0.45, y - r * 0.45, r * 0.4, r * 0.4, r * 0.12); ctx.fill();
      break;
    case 'book': // regulars book
      GF.rr(ctx, x - r * 0.75, y - r * 0.6, r * 1.5, r * 1.2, r * 0.12); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = r * 0.12;
      ctx.beginPath(); ctx.moveTo(x, y - r * 0.55); ctx.lineTo(x, y + r * 0.55); ctx.stroke();
      drawStarIcon(ctx, x + r * 0.38, y, r * 0.26, '#fff');
      break;
    default:
      ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28); ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}

// ════════════════════════════════════════════════════════════════════════
// CAFÉ OVERLAY — 3 tabs (UPGRADES / TOOLS / TASKS). FULLY OPAQUE backdrop so
// the MENU / paused run never bleeds through (popup hygiene). Reachable from
// the MENU café button, the GAMEOVER café link, and the mid-run café pill.
// ════════════════════════════════════════════════════════════════════════
function drawMetaOverlay(ctx) {
  var S = GF.S, W = GF.W, H = GF.H, cx = GF.cx;
  metaTabRects = []; permRects = []; toolTileRects = []; toolUpRects = []; equipSlotRects = []; taskClaimRects = [];
  masteryRowRects = []; renownRect = null;
  metaCloseRect = null; metaContentRect = null;
  // OPAQUE wash (solid fill, NOT <1 alpha) — flip_dash's <1.0 alpha ghosted.
  ctx.fillStyle = '#241510'; ctx.fillRect(0, 0, W, H);
  // warm header gradient strip
  var hg = ctx.createLinearGradient(0, 0, 0, H * 0.16);
  hg.addColorStop(0, '#3a2418'); hg.addColorStop(1, '#241510');
  ctx.fillStyle = hg; ctx.fillRect(0, 0, W, H * 0.16);

  var y = Math.max(H * 0.045, 22 * S);
  ctx.save();
  ctx.shadowColor = 'rgba(255,138,212,0.5)'; ctx.shadowBlur = 16 * S;
  ctx.fillStyle = '#fff';
  ctx.font = '900 ' + GF.clamp(28 * S, 20, 38) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(GF.t('cafe'), cx, y);
  ctx.restore();
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  y += GF.clamp(36 * S, 26, 46);

  // header: banked Stars + cumulative open-time
  var tm = Math.floor(totalPlayMin());
  var playStr = (tm >= 60 ? Math.floor(tm / 60) + GF.t('hourShort') + ' ' + (tm % 60) + GF.t('minShort') : tm + GF.t('minShort'));
  var hdr = '   ' + (meta ? meta.stars : 0) + '      ' + GF.t('played') + ': ' + playStr;
  ctx.font = 'bold ' + GF.clamp(15 * S, 12, 19) + 'px sans-serif';
  var hdrW = ctx.measureText(hdr).width;
  drawStarIcon(ctx, cx - hdrW / 2 + GF.clamp(7 * S, 6, 10), y + GF.clamp(8 * S, 6, 11), GF.clamp(7 * S, 6, 10), '#ffd24a');
  ctx.fillStyle = '#ffd24a'; ctx.textAlign = 'center';
  ctx.fillText(hdr, cx, y);
  y += GF.clamp(24 * S, 19, 30);

  // tab row (UPGRADES | TOOLS | TASKS) with claimable badge on TASKS
  var maxW = Math.min(W - 24 * S, 460 * S);
  var contentTop = y;
  var nTabs = 4, tabGap = 5 * S;
  var tabX = cx - maxW / 2, tabH = GF.clamp(34 * S, 28, 44), tabW = (maxW - tabGap * (nTabs - 1)) / nTabs;
  var cq = claimableTasks();
  var tabs = [
    { id: 'up',     label: GF.t('tabUpgrades') },
    { id: 'tools',  label: GF.t('tabGear') },
    { id: 'master', label: GF.t('tabMastery') },
    { id: 'tasks',  label: GF.t('tabQuests'), badge: cq }
  ];
  for (var t = 0; t < tabs.length; t++) {
    var on = (metaTab === tabs[t].id), bxx = tabX + t * (tabW + tabGap);
    GF.rr(ctx, bxx, y, tabW, tabH, 9 * S);
    ctx.fillStyle = on ? 'rgba(255,170,90,0.26)' : 'rgba(255,255,255,0.06)'; ctx.fill();
    ctx.strokeStyle = on ? '#ffb300' : 'rgba(255,255,255,0.16)'; ctx.lineWidth = 1.5 * S;
    GF.rr(ctx, bxx, y, tabW, tabH, 9 * S); ctx.stroke();
    ctx.fillStyle = on ? '#fff' : 'rgba(240,225,205,0.7)';
    // shrink the font to fit the longest label inside the (now narrower) 4-tab cell
    var tFs = GF.clamp(11 * S, 8, 15);
    ctx.font = 'bold ' + tFs + 'px sans-serif';
    while (tFs > 7 && ctx.measureText(tabs[t].label).width > tabW - 8 * S) { tFs -= 0.5; ctx.font = 'bold ' + tFs + 'px sans-serif'; }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(tabs[t].label, bxx + tabW / 2, y + tabH / 2 + 1 * S);
    if (tabs[t].badge) drawBadge(ctx, bxx + tabW - 9 * S, y + 6 * S, tabs[t].badge);
    metaTabRects.push({ tab: tabs[t].id, x: bxx, y: y, w: tabW, h: tabH });
  }
  ctx.textBaseline = 'top';
  y += tabH + 12 * S;

  // CLOSE button reserved at the bottom; content fills the space between.
  var closeH = GF.clamp(48 * S, 44, 58), closeW = GF.clamp(200 * S, 170, 280);
  var closeY = H - closeH - GF.clamp(16 * S, 12, 24);
  var contentBottom = closeY - 12 * S;

  if (metaTab === 'up')          drawUpgradesTab(ctx, y, contentBottom, maxW);
  else if (metaTab === 'tools')  drawToolsTab(ctx, y, contentBottom, maxW);
  else if (metaTab === 'master') drawMasteryTab(ctx, y, contentBottom, maxW);
  else                           drawTasksTab(ctx, y, contentBottom, maxW);

  // CLOSE
  var clg = ctx.createLinearGradient(cx - closeW / 2, closeY, cx - closeW / 2, closeY + closeH);
  clg.addColorStop(0, '#ffb300'); clg.addColorStop(1, '#e08e2a');
  ctx.fillStyle = clg; GF.rr(ctx, cx - closeW / 2, closeY, closeW, closeH, closeH / 2); ctx.fill();
  ctx.fillStyle = '#4a3520'; ctx.font = 'bold ' + GF.clamp(16 * S, 13, 21) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('cafeClose'), cx, closeY + closeH / 2);
  metaCloseRect = { x: cx - closeW / 2, y: closeY, w: closeW, h: closeH };
  metaContentRect = { x: tabX, y: contentTop, w: maxW, h: (closeY + closeH) - contentTop };
}

// UPGRADES tab — the 5 permanent café upgrades (Stars-bought, persist forever).
function drawUpgradesTab(ctx, topY, bottomY, maxW) {
  var S = GF.S, cx = GF.cx, x = cx - maxW / 2;
  var n = PERM_KEYS.length;
  var gap = GF.clamp(8 * S, 5, 12);
  var rowH = GF.clamp((bottomY - topY - gap * (n - 1)) / n, 52 * S, 78 * S);
  for (var i = 0; i < n; i++) {
    var key = PERM_KEYS[i], def = PERM_DEFS[key];
    var lvl = meta ? (meta.perm[key] || 0) : 0;
    var maxed = lvl >= def.max;
    var cost = permUpCost(key);
    var afford = !!(meta && !maxed && meta.stars >= cost);
    var ry = topY + i * (rowH + gap);
    GF.rr(ctx, x, ry, maxW, rowH, GF.clamp(11 * S, 8, 15));
    ctx.fillStyle = maxed ? 'rgba(155,209,122,0.13)' : 'rgba(255,255,255,0.06)'; ctx.fill();
    ctx.strokeStyle = maxed ? 'rgba(155,209,122,0.5)' : 'rgba(255,255,255,0.14)'; ctx.lineWidth = 1.4 * S;
    GF.rr(ctx, x, ry, maxW, rowH, GF.clamp(11 * S, 8, 15)); ctx.stroke();
    // icon
    var icR = GF.clamp(16 * S, 12, 21), icX = x + GF.clamp(14 * S, 10, 20) + icR, icY = ry + rowH / 2;
    drawPermIcon(ctx, key, icX, icY, icR, def.col);
    // name + level + desc
    var tx = icX + icR + GF.clamp(12 * S, 8, 16);
    var chipW = GF.clamp(76 * S, 60, 104), chipH = GF.clamp(30 * S, 26, 40);
    var chipX = x + maxW - chipW - GF.clamp(12 * S, 8, 16), chipY = ry + (rowH - chipH) / 2;
    var nameMaxW = chipX - tx - 8 * S;
    ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + GF.clamp(13.5 * S, 11, 18) + 'px sans-serif';
    ctx.fillText(GF.t('up_' + key) + '  ' + GF.t('lvl') + lvl + '/' + def.max, tx, ry + GF.clamp(9 * S, 6, 13));
    ctx.fillStyle = 'rgba(240,225,205,0.78)'; ctx.font = GF.clamp(10.5 * S, 9, 14) + 'px sans-serif';
    var descLines = wrapLines(ctx, GF.t('up_' + key + '_d').replace('{v}', permValueText(key)), nameMaxW);
    for (var dl = 0; dl < descLines.length && dl < 2; dl++) ctx.fillText(descLines[dl], tx, ry + rowH * 0.46 + dl * GF.clamp(13 * S, 11, 16));
    // buy chip
    GF.rr(ctx, chipX, chipY, chipW, chipH, chipH / 2);
    ctx.fillStyle = maxed ? 'rgba(155,209,122,0.2)' : (afford ? 'rgba(255,210,74,0.22)' : 'rgba(255,255,255,0.06)'); ctx.fill();
    if (afford) { ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 1.4 * S; GF.rr(ctx, chipX, chipY, chipW, chipH, chipH / 2); ctx.stroke(); }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (maxed) {
      ctx.fillStyle = '#9bd17a'; ctx.font = 'bold ' + GF.clamp(11 * S, 9, 15) + 'px sans-serif';
      ctx.fillText(GF.t('maxed'), chipX + chipW / 2, chipY + chipH / 2);
    } else {
      drawStarIcon(ctx, chipX + GF.clamp(15 * S, 12, 19), chipY + chipH / 2, GF.clamp(7 * S, 6, 9), afford ? '#ffd24a' : '#9c8a70');
      ctx.fillStyle = afford ? '#ffd24a' : '#9c8a70'; ctx.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('' + cost, chipX + GF.clamp(24 * S, 19, 30), chipY + chipH / 2 + 0.5 * S);
    }
    permRects.push({ key: key, x: chipX, y: chipY, w: chipW, h: chipH, afford: afford });
  }
  ctx.textBaseline = 'top';
}

// TOOLS tab — next-tool progress + 3 equip slots + the 8-item ladder grid.
function drawToolsTab(ctx, topY, bottomY, maxW) {
  var S = GF.S, cx = GF.cx, x = cx - maxW / 2;
  var y = topY;
  // next-tool progress (the visible pull)
  var ng = nextTool();
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  if (ng) {
    var prevMin = 0;
    for (var pi = 0; pi < TOOL_DEFS.length; pi++) { if (TOOL_DEFS[pi].id === ng.id) break; prevMin = TOOL_DEFS[pi].min; }
    var frac = GF.clamp((totalPlayMin() - prevMin) / (ng.min - prevMin), 0, 1);
    var leftMin = Math.max(1, Math.ceil(ng.min - totalPlayMin()));
    ctx.fillStyle = 'rgba(245,230,210,0.85)'; ctx.font = GF.clamp(11.5 * S, 9.5, 15) + 'px sans-serif';
    ctx.fillText(GF.t('nextTool') + ' ' + leftMin + ' ' + GF.t('minShort'), x, y);
    var barW = maxW, barH = 7 * S, barY = y + GF.clamp(16 * S, 14, 20);
    GF.rr(ctx, x, barY, barW, barH, barH / 2); ctx.fillStyle = 'rgba(255,255,255,0.13)'; ctx.fill();
    GF.rr(ctx, x, barY, Math.max(barH, barW * frac), barH, barH / 2); ctx.fillStyle = ng.col; ctx.fill();
  } else {
    ctx.fillStyle = '#9bd17a'; ctx.font = 'bold ' + GF.clamp(12 * S, 10, 15) + 'px sans-serif';
    ctx.fillText(GF.t('allTools'), x, y);
  }
  y += GF.clamp(34 * S, 28, 40);

  // equip slots row (3)
  ctx.fillStyle = 'rgba(220,205,185,0.8)'; ctx.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.fillText(GF.t('equippedTools'), x, y);
  y += GF.clamp(16 * S, 14, 20);
  var slotR = GF.clamp(26 * S, 21, 32), slotGap = GF.clamp(20 * S, 12, 30);
  var totalSlotsW = TOOL_SLOTS * (slotR * 2) + (TOOL_SLOTS - 1) * slotGap;
  var slotStartX = cx - totalSlotsW / 2, slotsY = y + slotR;
  for (var s = 0; s < TOOL_SLOTS; s++) {
    var scx = slotStartX + slotR + s * (slotR * 2 + slotGap), scy = slotsY;
    var eid = meta ? meta.tools.equipped[s] : null;
    ctx.beginPath(); ctx.arc(scx, scy, slotR, 0, 6.28);
    ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
    ctx.strokeStyle = eid ? TOOL_BY_ID[eid].col : 'rgba(255,255,255,0.22)'; ctx.lineWidth = 2 * S;
    ctx.setLineDash(eid ? [] : [4 * S, 4 * S]); ctx.stroke(); ctx.setLineDash([]);
    if (eid) drawToolIcon(ctx, TOOL_BY_ID[eid], scx, scy, slotR * 0.6);
    equipSlotRects.push({ slot: s, x: scx - slotR, y: scy - slotR, w: slotR * 2, h: slotR * 2 });
  }
  y = slotsY + slotR + GF.clamp(14 * S, 10, 18);

  // tool grid — 4 cols × 2 rows. Tiles auto-size to fit the band [y, bottomY].
  var cols = 4, gap = GF.clamp(7 * S, 5, 10);
  var rows = Math.ceil(TOOL_DEFS.length / cols);
  var tileW = (maxW - gap * (cols - 1)) / cols;
  var avail = bottomY - y;
  var tileH = GF.clamp((avail - gap * (rows - 1)) / rows, 62 * S, 96 * S);
  for (var i = 0; i < TOOL_DEFS.length; i++) {
    var def = TOOL_DEFS[i], col = i % cols, row = Math.floor(i / cols);
    var bx = x + col * (tileW + gap), byy = y + row * (tileH + gap);
    var owned = !!(meta && meta.tools.owned[def.id]);
    var equipped = !!(meta && meta.tools.equipped.indexOf(def.id) >= 0);
    GF.rr(ctx, bx, byy, tileW, tileH, 9 * S);
    ctx.fillStyle = owned ? (equipped ? 'rgba(155,209,122,0.14)' : 'rgba(255,255,255,0.06)') : 'rgba(255,255,255,0.03)'; ctx.fill();
    ctx.strokeStyle = equipped ? '#9bd17a' : (owned ? 'rgba(200,180,150,0.5)' : 'rgba(255,255,255,0.12)'); ctx.lineWidth = 1.5 * S;
    GF.rr(ctx, bx, byy, tileW, tileH, 9 * S); ctx.stroke();
    var icx = bx + tileW / 2, icy = byy + tileH * 0.28, ir = GF.clamp(15 * S, 11, 19);
    if (owned) {
      drawToolIcon(ctx, def, icx, icy, ir);
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillStyle = '#f0e1cd'; ctx.font = 'bold ' + GF.clamp(8.5 * S, 7.5, 11) + 'px sans-serif';
      ctx.fillText(GF.t('lvl') + ' ' + (meta.tools.level[def.id] || 1), icx, byy + tileH * 0.50);
      // upgrade chip
      var cost = toolUpCost(def.id), maxed = !isFinite(cost);
      var afford = !!(meta && !maxed && meta.stars >= cost);
      var chW = tileW - 8 * S, chH = GF.clamp(17 * S, 14, 22), chX = bx + 4 * S, chY = byy + tileH - chH - 4 * S;
      GF.rr(ctx, chX, chY, chW, chH, 5 * S);
      ctx.fillStyle = maxed ? 'rgba(155,209,122,0.18)' : (afford ? 'rgba(255,210,74,0.2)' : 'rgba(255,255,255,0.05)'); ctx.fill();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      if (maxed) {
        ctx.fillStyle = '#9bd17a'; ctx.font = 'bold ' + GF.clamp(8.5 * S, 7, 11) + 'px sans-serif';
        ctx.fillText(GF.t('maxed'), chX + chW / 2, chY + chH / 2 + 0.5 * S);
      } else {
        drawStarIcon(ctx, chX + chW / 2 - GF.clamp(11 * S, 9, 14), chY + chH / 2, GF.clamp(5.5 * S, 5, 7), afford ? '#ffd24a' : '#9c8a70');
        ctx.fillStyle = afford ? '#ffd24a' : '#9c8a70'; ctx.font = 'bold ' + GF.clamp(8.5 * S, 7, 11) + 'px sans-serif';
        ctx.fillText('' + cost, chX + chW / 2 + GF.clamp(4 * S, 3, 6), chY + chH / 2 + 0.5 * S);
      }
      toolTileRects.push({ id: def.id, x: bx, y: byy, w: tileW, h: tileH - chH - 6 * S });
      toolUpRects.push({ id: def.id, x: chX, y: chY, w: chW, h: chH, afford: afford });
    } else {
      ctx.globalAlpha = 0.4; drawToolIcon(ctx, def, icx, icy, ir); ctx.globalAlpha = 1;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillStyle = '#a89880';
      ctx.font = GF.clamp(8.5 * S, 7.5, 11) + 'px sans-serif';
      ctx.fillText(GF.t('playToUnlock') + ' ' + def.min + GF.t('minShort'), icx, byy + tileH * 0.52);
    }
  }
  ctx.textBaseline = 'top';
}

// MASTERY tab — the ENDLESS Stars sink (4 never-maxed tracks) + RENOWN prestige.
// The come-back-tomorrow answer to "I upgraded everything in 2 minutes": there is
// always a concrete next purchase, costs grow exponentially, prestige loops it.
function drawMasteryTab(ctx, topY, bottomY, maxW) {
  var S = GF.S, cx = GF.cx, x = cx - maxW / 2;
  var y = topY;
  // intro hint (the pitch: endless, save for tomorrow)
  ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillStyle = 'rgba(245,230,210,0.82)';
  ctx.font = GF.clamp(10.5 * S, 9, 13.5) + 'px sans-serif';
  var hintLines = wrapLines(ctx, GF.t('masteryHint'), maxW);
  for (var hl = 0; hl < hintLines.length && hl < 2; hl++) ctx.fillText(hintLines[hl], x, y + hl * GF.clamp(13 * S, 11, 16));
  y += GF.clamp(hintLines.length > 1 ? 30 * S : 18 * S, 16, 36);

  // reserve a renown strip at the bottom of the band
  var renH = GF.clamp(58 * S, 50, 72);
  var renY = bottomY - renH;
  var rowsBottom = renY - GF.clamp(10 * S, 7, 14);

  // 4 mastery rows
  var n = MASTERY_DEFS.length, gap = GF.clamp(8 * S, 5, 12);
  var rowH = GF.clamp((rowsBottom - y - gap * (n - 1)) / n, 46 * S, 70 * S);
  for (var i = 0; i < n; i++) {
    var def = MASTERY_DEFS[i], lvl = masteryLvl(def.id), maxed = lvl >= def.max;
    var cost = masteryCost(def.id);
    var afford = !!(meta && !maxed && meta.stars >= cost);
    var ry = y + i * (rowH + gap);
    GF.rr(ctx, x, ry, maxW, rowH, GF.clamp(10 * S, 8, 14));
    ctx.fillStyle = maxed ? 'rgba(155,209,122,0.12)' : 'rgba(255,255,255,0.06)'; ctx.fill();
    ctx.strokeStyle = maxed ? 'rgba(155,209,122,0.5)' : 'rgba(255,255,255,0.14)'; ctx.lineWidth = 1.4 * S;
    GF.rr(ctx, x, ry, maxW, rowH, GF.clamp(10 * S, 8, 14)); ctx.stroke();
    // icon (simple distinct vector glyph per track)
    var icR = GF.clamp(15 * S, 11, 20), icX = x + GF.clamp(13 * S, 10, 18) + icR, icY = ry + rowH / 2;
    drawMasteryIcon(ctx, def.id, icX, icY, icR, def.col);
    // name + level + desc
    var tx = icX + icR + GF.clamp(11 * S, 8, 15);
    var chipW = GF.clamp(78 * S, 62, 106), chipH = GF.clamp(30 * S, 26, 40);
    var chipX = x + maxW - chipW - GF.clamp(11 * S, 8, 15), chipY = ry + (rowH - chipH) / 2;
    var nameMaxW = chipX - tx - 8 * S;
    ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + GF.clamp(13 * S, 10.5, 17) + 'px sans-serif';
    ctx.fillText(GF.t('m_' + def.id) + '  ' + GF.t('lvl') + lvl, tx, ry + GF.clamp(8 * S, 6, 12));
    ctx.fillStyle = 'rgba(240,225,205,0.78)'; ctx.font = GF.clamp(10 * S, 8.5, 13) + 'px sans-serif';
    // show the value the NEXT level grants (or current at max)
    var shownV = maxed ? masteryValue(def.id, lvl) : masteryValue(def.id, lvl + 1);
    var dLines = wrapLines(ctx, GF.t('m_' + def.id + '_d').replace('{v}', shownV), nameMaxW);
    for (var dl = 0; dl < dLines.length && dl < 2; dl++) ctx.fillText(dLines[dl], tx, ry + rowH * 0.46 + dl * GF.clamp(12.5 * S, 10, 15));
    // buy chip
    GF.rr(ctx, chipX, chipY, chipW, chipH, chipH / 2);
    ctx.fillStyle = maxed ? 'rgba(155,209,122,0.2)' : (afford ? 'rgba(255,210,74,0.22)' : 'rgba(255,255,255,0.06)'); ctx.fill();
    if (afford) { ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 1.4 * S; GF.rr(ctx, chipX, chipY, chipW, chipH, chipH / 2); ctx.stroke(); }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (maxed) {
      ctx.fillStyle = '#9bd17a'; ctx.font = 'bold ' + GF.clamp(11 * S, 9, 15) + 'px sans-serif';
      ctx.fillText(GF.t('maxed'), chipX + chipW / 2, chipY + chipH / 2);
    } else {
      drawStarIcon(ctx, chipX + GF.clamp(15 * S, 12, 19), chipY + chipH / 2, GF.clamp(7 * S, 6, 9), afford ? '#ffd24a' : '#9c8a70');
      ctx.fillStyle = afford ? '#ffd24a' : '#9c8a70'; ctx.font = 'bold ' + GF.clamp(12 * S, 10, 16) + 'px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('' + cost, chipX + GF.clamp(24 * S, 19, 30), chipY + chipH / 2 + 0.5 * S);
    }
    masteryRowRects.push({ id: def.id, x: chipX, y: chipY, w: chipW, h: chipH, afford: afford });
  }

  // ── RENOWN (prestige) strip ──
  var ren = renownCount(), tot = totalMasteryLevels(), can = canRenown();
  GF.rr(ctx, x, renY, maxW, renH, GF.clamp(11 * S, 8, 15));
  ctx.fillStyle = can ? 'rgba(255,179,230,0.16)' : 'rgba(255,255,255,0.05)'; ctx.fill();
  ctx.strokeStyle = can ? '#ff8ad4' : 'rgba(255,255,255,0.14)'; ctx.lineWidth = 1.5 * S;
  GF.rr(ctx, x, renY, maxW, renH, GF.clamp(11 * S, 8, 15)); ctx.stroke();
  var rpad = GF.clamp(12 * S, 9, 16);
  ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillStyle = '#ffd9f2';
  ctx.font = 'bold ' + GF.clamp(13 * S, 10.5, 17) + 'px sans-serif';
  ctx.fillText('★ ' + GF.t('renown') + '  ' + ren, x + rpad, renY + GF.clamp(8 * S, 6, 12));
  ctx.fillStyle = 'rgba(255,225,245,0.8)'; ctx.font = GF.clamp(9.5 * S, 8, 12.5) + 'px sans-serif';
  var subTxt = can ? GF.t('renownReady').replace('{v}', 1)
                   : GF.t('renownLocked').replace('{v}', RENOWN_THRESHOLD) + ' (' + tot + '/' + RENOWN_THRESHOLD + ')';
  var btnW2 = GF.clamp(118 * S, 96, 150), btnH2 = GF.clamp(34 * S, 30, 44);
  var subLines = wrapLines(ctx, subTxt, maxW - rpad * 2 - btnW2 - 10 * S);
  for (var sl = 0; sl < subLines.length && sl < 2; sl++) ctx.fillText(subLines[sl], x + rpad, renY + renH * 0.46 + sl * GF.clamp(12 * S, 10, 15));
  // GAIN RENOWN button
  var btnX2 = x + maxW - btnW2 - rpad, btnY2 = renY + (renH - btnH2) / 2;
  GF.rr(ctx, btnX2, btnY2, btnW2, btnH2, btnH2 / 2);
  ctx.fillStyle = can ? 'rgba(255,138,212,0.32)' : 'rgba(255,255,255,0.05)'; ctx.fill();
  if (can) { ctx.strokeStyle = '#ff8ad4'; ctx.lineWidth = 1.6 * S; GF.rr(ctx, btnX2, btnY2, btnW2, btnH2, btnH2 / 2); ctx.stroke(); }
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = can ? '#fff' : 'rgba(240,225,205,0.5)';
  ctx.font = 'bold ' + GF.clamp(11.5 * S, 9, 15) + 'px sans-serif';
  ctx.fillText(GF.t('renownDo'), btnX2 + btnW2 / 2, btnY2 + btnH2 / 2 + 1 * S);
  renownRect = { x: btnX2, y: btnY2, w: btnW2, h: btnH2, can: can };
  ctx.textBaseline = 'top';
}

// simple distinct vector glyphs for the 4 mastery tracks (no emoji)
function drawMasteryIcon(ctx, id, cx, cy, r, col) {
  ctx.save();
  ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = Math.max(1.5, r * 0.16);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (id === 'speed') {            // lightning bolt
    ctx.beginPath();
    ctx.moveTo(cx + r * 0.18, cy - r * 0.7); ctx.lineTo(cx - r * 0.42, cy + r * 0.1);
    ctx.lineTo(cx + r * 0.02, cy + r * 0.1); ctx.lineTo(cx - r * 0.16, cy + r * 0.72);
    ctx.lineTo(cx + r * 0.5, cy - r * 0.18); ctx.lineTo(cx + r * 0.04, cy - r * 0.18);
    ctx.closePath(); ctx.fill();
  } else if (id === 'tips') {       // coin with $-ish slash
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.72, 0, 6.28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy - r * 0.5); ctx.lineTo(cx, cy + r * 0.5); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy - r * 0.18, r * 0.26, 1.6, 4.9); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy + r * 0.2, r * 0.26, -1.5, 1.7); ctx.stroke();
  } else if (id === 'room') {       // widening / chairs (two arcs + base)
    ctx.beginPath(); ctx.arc(cx - r * 0.34, cy + r * 0.05, r * 0.34, Math.PI, 0); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx + r * 0.34, cy + r * 0.05, r * 0.34, Math.PI, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - r * 0.72, cy + r * 0.45); ctx.lineTo(cx + r * 0.72, cy + r * 0.45); ctx.stroke();
  } else {                          // polish = sparkle / 4-point star
    ctx.beginPath();
    ctx.moveTo(cx, cy - r * 0.78); ctx.lineTo(cx + r * 0.2, cy - r * 0.2);
    ctx.lineTo(cx + r * 0.78, cy); ctx.lineTo(cx + r * 0.2, cy + r * 0.2);
    ctx.lineTo(cx, cy + r * 0.78); ctx.lineTo(cx - r * 0.2, cy + r * 0.2);
    ctx.lineTo(cx - r * 0.78, cy); ctx.lineTo(cx - r * 0.2, cy - r * 0.2);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

// TASKS tab — 3 daily tasks, each a progress bar + a CLAIM button.
function drawTasksTab(ctx, topY, bottomY, maxW) {
  var S = GF.S, cx = GF.cx, x = cx - maxW / 2;
  var y = topY;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(13 * S, 11, 17) + 'px sans-serif';
  ctx.fillText(GF.t('dailyTasks'), x, y);

  ctx.fillText(GF.t('resetsIn') + ' ' + Math.ceil(hoursToReset()) + GF.t('hourShort'), x + maxW, y + 2 * S);
  y += GF.clamp(24 * S, 20, 30);

  var list = (meta && meta.tasks.list) ? meta.tasks.list : [];
  var rowGap = GF.clamp(12 * S, 8, 18);
  var rowH = GF.clamp((bottomY - y - rowGap * 2) / 3, 58 * S, 100 * S);
  for (var i = 0; i < 3; i++) {
    var q = list[i];
    var ry = y + i * (rowH + rowGap);
    GF.rr(ctx, x, ry, maxW, rowH, 10 * S);
    var done = q && taskDone(q);
    ctx.fillStyle = done ? 'rgba(155,209,122,0.12)' : 'rgba(255,255,255,0.05)'; ctx.fill();
    ctx.strokeStyle = (done && !q.claimed) ? '#9bd17a' : 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1.5 * S;
    GF.rr(ctx, x, ry, maxW, rowH, 10 * S); ctx.stroke();
    if (!q) continue;
    var pad = GF.clamp(12 * S, 9, 16);
    var cbW = GF.clamp(96 * S, 78, 128);
    var labelMaxW = maxW - pad * 2 - cbW - 10 * S;
    // label
    ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + GF.clamp(12.5 * S, 10, 16) + 'px sans-serif';

    var lh = GF.clamp(15 * S, 12, 19);
    for (var li = 0; li < ll.length && li < 2; li++) ctx.fillText(ll[li], x + pad, ry + GF.clamp(9 * S, 7, 13) + li * lh);
    // progress bar
    var barW = labelMaxW, barH = 7 * S, barY = ry + rowH - GF.clamp(18 * S, 15, 24);
    GF.rr(ctx, x + pad, barY, barW, barH, barH / 2); ctx.fillStyle = 'rgba(255,255,255,0.13)'; ctx.fill();
    GF.rr(ctx, x + pad, barY, Math.max(barH, barW * GF.clamp(q.prog / q.target, 0, 1)), barH, barH / 2);
    ctx.fillStyle = done ? '#9bd17a' : '#ff8ad4'; ctx.fill();
    ctx.fillStyle = 'rgba(240,225,205,0.8)'; ctx.font = GF.clamp(9.5 * S, 8, 12.5) + 'px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(Math.min(q.prog, q.target) + '/' + q.target, x + pad, barY - GF.clamp(9 * S, 7, 12));
    // claim button
    var cbH = GF.clamp(38 * S, 32, 48), cbX = x + maxW - pad - cbW, cbY = ry + (rowH - cbH) / 2;
    var can = done && !q.claimed;
    GF.rr(ctx, cbX, cbY, cbW, cbH, 8 * S);
    ctx.fillStyle = q.claimed ? 'rgba(155,209,122,0.1)' : (can ? 'rgba(155,209,122,0.28)' : 'rgba(255,255,255,0.05)'); ctx.fill();
    if (can) { ctx.strokeStyle = '#9bd17a'; ctx.lineWidth = 1.5 * S; GF.rr(ctx, cbX, cbY, cbW, cbH, 8 * S); ctx.stroke(); }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (q.claimed) {

    } else if (can) {
      ctx.fillStyle = '#dfffd0'; ctx.font = 'bold ' + GF.clamp(11.5 * S, 9.5, 15) + 'px sans-serif';
      ctx.fillStyle = '#eaffd8';
      ctx.fillText(GF.t('claim'), cbX + cbW / 2, cbY + cbH / 2 - 6 * S);
      drawStarIcon(ctx, cbX + cbW / 2 - GF.clamp(13 * S, 10, 16), cbY + cbH / 2 + 8 * S, GF.clamp(5.5 * S, 5, 7), '#ffd24a');
      ctx.fillStyle = '#ffd24a'; ctx.font = GF.clamp(9.5 * S, 8, 12.5) + 'px sans-serif';
      ctx.fillText('+' + q.reward, cbX + cbW / 2 + GF.clamp(5 * S, 4, 7), cbY + cbH / 2 + 8 * S);
    } else {
      drawStarIcon(ctx, cbX + cbW / 2 - GF.clamp(13 * S, 10, 16), cbY + cbH / 2, GF.clamp(5.5 * S, 5, 7), 'rgba(240,225,205,0.7)');
      ctx.fillStyle = 'rgba(240,225,205,0.7)'; ctx.font = 'bold ' + GF.clamp(11 * S, 9, 14) + 'px sans-serif';
      ctx.fillText('+' + q.reward, cbX + cbW / 2 + GF.clamp(5 * S, 4, 7), cbY + cbH / 2);

}

// ════════════════════════════════════════════════════════════════════════
// INPUT — single tap handler, routed by state
// ════════════════════════════════════════════════════════════════════════
function hit(rect, x, y) {
  return rect && x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
}

// CAFÉ overlay press routing (priority: close → tabs → buy chips → tiles →
// equip slots → task claims → scrim-dismiss). Targets rebuilt each draw frame.
function handleMetaPress(x, y) {
  if (hit(metaCloseRect, x, y)) { metaOpen = false; beep(420, 0.05); return; }
  for (var t = 0; t < metaTabRects.length; t++) { if (hit(metaTabRects[t], x, y)) { metaTab = metaTabRects[t].tab; beep(520, 0.04); return; } }
  if (metaTab === 'up') {
    for (var p = 0; p < permRects.length; p++) {
      var pr = permRects[p];
      if (hit(pr, x, y)) {
        if (pr.afford && buyPermUpgrade(pr.key)) { beep(620, 0.08); beep(820, 0.07, 0.05); GF.spawnParticles(x, y, PERM_DEFS[pr.key].col, 14); }
        else beep(150, 0.08, 0, 'sawtooth');
        return;
      }
    }
  } else if (metaTab === 'tools') {
    for (var u = 0; u < toolUpRects.length; u++) {
      var ur = toolUpRects[u];
      if (hit(ur, x, y)) {
        if (ur.afford && buyToolUpgrade(ur.id)) { beep(620, 0.08); beep(820, 0.07, 0.05); GF.spawnParticles(x, y, TOOL_BY_ID[ur.id].col, 14); }
        else beep(150, 0.08, 0, 'sawtooth');
        return;
      }
    }
    for (var ti = 0; ti < toolTileRects.length; ti++) { if (hit(toolTileRects[ti], x, y)) { toggleEquipTool(toolTileRects[ti].id); beep(520, 0.05); return; } }
    for (var s = 0; s < equipSlotRects.length; s++) { if (hit(equipSlotRects[s], x, y)) { unequipToolSlot(equipSlotRects[s].slot); beep(420, 0.05); return; } }
  } else if (metaTab === 'master') {
    for (var mr = 0; mr < masteryRowRects.length; mr++) {
      var mrow = masteryRowRects[mr];
      if (hit(mrow, x, y)) {
        if (mrow.afford && buyMastery(mrow.id)) { beep(620, 0.08); beep(860, 0.07, 0.05); GF.spawnParticles(x, y, MASTERY_BY_ID[mrow.id].col, 14); }
        else beep(150, 0.08, 0, 'sawtooth');
        return;
      }
    }
    if (renownRect && hit(renownRect, x, y)) {
      if (renownRect.can && doRenown()) {
        beep(520, 0.1); beep(700, 0.1, 0.08); beep(940, 0.12, 0.16);
        GF.spawnParticles(x, y, '#ff8ad4', 26); GF.spawnParticles(x, y, '#ffd24a', 18);
        GF.setShake && GF.setShake(0.2);
        toolToast = null;  // avoid stacking
        renownToast = 3.4;
      } else beep(150, 0.08, 0, 'sawtooth');
      return;
    }
  } else {
    for (var q = 0; q < taskClaimRects.length; q++) {
      var qr = taskClaimRects[q];
      if (hit(qr, x, y)) {
        if (qr.can && claimTask(qr.i) > 0) { beep(660, 0.08); beep(900, 0.07, 0.05); GF.spawnParticles(x, y, '#ffd24a', 18); }
        else beep(420, 0.05);
        return;
      }
    }
  }
  // tap outside the content column dismisses (standard modal-scrim behaviour)
  if (metaContentRect && !hit(metaContentRect, x, y)) { metaOpen = false; beep(420, 0.05); return; }
}

function onPress(x, y) {
  // CAFÉ overlay owns input while open (on MENU or a paused run).
  if (metaOpen && (gs === 'MENU' || gs === 'PLAYING')) { handleMetaPress(x, y); return; }
  if (metaOpen) metaOpen = false;   // clear any stale overlay flag in other states

  // Mute toggle (shared across MENU + PLAYING; muteRect is null when hidden).
  // Flips BOTH SFX + music; a tiny click confirms only when turning sound ON.
  if (muteRect && hit(muteRect, x, y)) {
    setMuted(!muted);
    if (!muted) beep(660, 0.05);
    return;
  }

  if (gs === 'MENU') {
    if (hit(menuCafeRect, x, y)) { openCafe('up'); return; }
    if (hit(menuPlayRect, x, y)) {
      if (!seenTutorial) { seenTutorial = true; try { localStorage.setItem('boba_rush_seen_tutorial', '1'); } catch (e) {} }
      startGame();
    }
    return;
  }
  if (gs === 'GAMEOVER') {
    if (hit(goCafeRect, x, y)) { openCafe('up'); return; }
    if (hit(goRetryRect, x, y)) startGame();
    return;
  }
  if (gs === 'SHOP') {
    if (hit(shopContRect, x, y)) { closeShop(); return; }
    for (var i = 0; i < shopCardRects.length; i++) {
      if (hit(shopCardRects[i], x, y)) { applyUpgrade(shopCardRects[i].card); return; }
    }
    return;
  }
  // PLAYING
  if (showTut) {
    if (hit(tutBackRect, x, y)) showTut = false;
    else showTut = false; // any tap closes
    return;
  }
  // CAFÉ pause-pill → pause the rush + open the café meta
  if (hit(cafePillRect, x, y)) { openCafe('up'); return; }
  // "?" help
  if (hit(helpRect, x, y)) { showTut = true; return; }
  // trash cup
  if (hit(trashRect, x, y)) { trashCup(); return; }
  // ingredient buttons
  for (var b = 0; b < btnRects.length; b++) {
    var r = btnRects[b];
    if (hit(r, x, y)) {
      if (r.locked) {
        // show hint of when it unlocks
        var item = r.kind === 'base' ? baseById(r.id) : topById(r.id);
        var secs = Math.max(0, Math.ceil(item.unlockAt - elapsed));
        GF.spawnFloat(r.x + r.w / 2, r.y - 6 * GF.S, GF.t('locked') + ' ' + secs + 's', '#fff');
        beep(200, 0.06, 0, 'sawtooth');
      } else if (r.kind === 'base') addBase(r.id);
      else addTopping(r.id);
      return;
    }
  }
  // customers (serve) — tap test against each, larger hitbox
  for (var c = 0; c < queue.length; c++) {
    var cu = queue[c];
    if (cu.sx == null || cu.leaving > 0 || cu.angry > 0) continue;
    var cw = GF.clamp(70 * GF.S, 44, 96);
    var hb = cu.slotW ? Math.min(cu.slotW * 0.5, cw * 0.9) : cw * 0.8;
    var dx = x - cu.sx, dy = y - cu.sy;
    if (Math.abs(dx) <= hb && dy >= -cw * 1.2 && dy <= cw * 0.9) {
      serveCustomer(cu);
      return;
    }
  }
}

// wire pointer events (mouse + touch) — gf-lib has its own button system but
// we want full-canvas tap routing, so listen directly.
function canvasPos(e) {
  var rect = GF.canvas.getBoundingClientRect();
  var cxp, cyp;
  if (e.changedTouches && e.changedTouches.length) {
    cxp = e.changedTouches[0].clientX; cyp = e.changedTouches[0].clientY;
  } else { cxp = e.clientX; cyp = e.clientY; }
  // Subtract the desktop-framing left margin so taps land in the same centred
  // playfield band the game draws into (GF.offX is 0 on mobile/portrait).
  return { x: cxp - rect.left - GF.offX, y: cyp - rect.top };
}
GF.canvas.addEventListener('mousedown', function(e) { var p = canvasPos(e); onPress(p.x, p.y); });
GF.canvas.addEventListener('touchstart', function(e) {
  if (e.cancelable) e.preventDefault();
  var p = canvasPos(e); onPress(p.x, p.y);
}, { passive: false });

// ── SOUND (procedural Web Audio, no asset files) ───────────────────────────
var actx = null, muted = false;
// Single mute switch: flips the SFX gate (`beep` early-returns on `muted`),
// persists it, AND mirrors it to the procedural music bed so ONE mute
// silences both SFX and the background theme.
function setMuted(v) {
  muted = !!v;
  try { localStorage.setItem('boba_rush_muted', muted ? '1' : '0'); } catch (e) {}
  GF.setMusicMuted(muted);
}
function audioCtx() {
  if (!actx) {
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { actx = null; }
  }
  return actx;
}
function beep(freq, dur, delay, type) {
  if (muted) return;
  var a = audioCtx();
  if (!a) return;
  try {
    if (a.state === 'suspended') a.resume();
    var t0 = a.currentTime + (delay || 0);
    var osc = a.createOscillator();
    var gain = a.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.16, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain); gain.connect(a.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  } catch (e) {}
}
// tiny sprite-pop helper (visual only)
function spritePop(x, y) { GF.spawnParticles(x, y - 10 * GF.S, '#fff', 4); }

// ── BOOT ───────────────────────────────────────────────────────────────────
GF.init({
  designW: 480,
  designH: 854,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'boba_rush',
  drawMargins: drawCafeMargins,
  onReady: function() {
    try { best = parseInt(localStorage.getItem('boba_rush_best') || '0') || 0; } catch (e) {}
    try { seenTutorial = localStorage.getItem('boba_rush_seen_tutorial') === '1'; } catch (e) {}

    // ── CROSS-SESSION CAFÉ META: load AFTER best, then award the boot-time
    // reason-to-return (login/streak + overnight idle Stars). The WELCOME-BACK
    // banner is suppressed in headless / screenshot runs, but the grants still
    // apply deterministically so the test harness can observe them.
    var headless = false;
    try {
      headless = (navigator.webdriver === true) || window._silent ||
        (location && location.search && /[?&]notut(=|&|$)/.test(location.search)) ||
        (location && location.protocol === 'file:');
    } catch (e) {}
    meta = loadMeta();
    claimOnOpen(!headless);

    // Restore the persisted mute choice BEFORE starting music/SFX so a reload
    // honours it. The same flag gates `beep()` (SFX) and seeds GF.startMusic.
    try { muted = localStorage.getItem('boba_rush_muted') === '1'; } catch (e) {}

    // Background music theme (procedural, zero-asset). Begins on first user
    // gesture; seeded to the same mute state the SFX `beep()` honours so one
    // mute silences both. (mirror: see setMuted — calls GF.setMusicMuted too.)
    GF.startMusic({ preset: 'cozy', muted: muted });

    // Yandex 1.9 — persist a run across reload.
    GF.persist('boba_rush_run_v1',
      function() {
        if (gs !== 'PLAYING' && gs !== 'SHOP') return null;
        return {
          gs: gs, coins: coins, customersServed: customersServed, strikes: strikes,
          combo: combo, elapsed: elapsed, nextMilestone: nextMilestone, heat: heat,
          maxQueue: maxQueue, servesSinceShop: servesSinceShop, up: up,
          currentCup: currentCup,
          queue: queue.map(function(c) {
            return { id: c.id, order: c.order, patience: c.patience, patMax: c.patMax,
              vip: c.vip, hue: c.hue, phase: c.phase, born: c.born };
          })
        };
      },
      function(s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        coins = s.coins || 0; customersServed = s.customersServed || 0;
        strikes = s.strikes || 0; combo = s.combo || 0; elapsed = s.elapsed || 0;
        nextMilestone = s.nextMilestone || 10; heat = s.heat || 0;
        maxQueue = s.maxQueue || MAX_QUEUE; servesSinceShop = s.servesSinceShop || 0;
        if (s.up) up = s.up;
        if (s.currentCup) currentCup = s.currentCup;
        if (s.queue) {
          queue = s.queue.map(function(c) {
            return { id: c.id, order: c.order, patience: c.patience, patMax: c.patMax || BASE_PATIENCE,
              vip: c.vip, hue: c.hue || '#ff9aa2', phase: c.phase || 0,
              leaving: 0, angry: 0, bounce: 0, born: c.born || 0 };
          });
        }
        prevBaseCount = unlockedBases().length;
        prevTopCount = unlockedToppings().length;
        spawnTimer = 1.0;
      }
    );

    // Platform builds (Yandex/CrazyGames/etc.) set window.__GF_AUTOSTART so the
    // player drops STRAIGHT into gameplay — no menu/title/tutorial landing. The
    // gallery build leaves the flag unset and keeps its menu. Only autostart
    // from the fresh MENU state: if GF.persist just restored a live run
    // (gs === 'PLAYING'/'SHOP') we leave that resume untouched. Never fires
    // during the silent screenshot pipeline (window._silent).
    if (window.__GF_AUTOSTART && !window._silent && gs === 'MENU') {
      seenTutorial = true;                 // suppress the first-run tutorial copy
      try { localStorage.setItem('boba_rush_seen_tutorial', '1'); } catch (e) {}
      showTut = false;                     // ensure no "?" overlay is open
      startGame();                         // → gs === 'PLAYING', fresh shift
    }

    // ── PROMO CLIMAX (CrazyGames preview capture ONLY) ────────────────────────
    // STRICTLY gated on ?promo=climax — normal play, the gallery build, and any
    // shipped/platform build (which never carry this query param) are untouched.
    // Boots straight into a lively shift and DRIVES the real serving loop by
    // dispatching taps through the game's own onPress() handler at the live
    // station/customer hit-rects: pour a base -> add the topping(s) -> serve the
    // customer, on a steady cadence, so the clip shows cups being made, guests
    // served, and coins/combo climbing for ~18s. Deterministic (Math.random is
    // seeded). Silent + cursor-hidden per the CG spec.
    try {
      if (new URLSearchParams(location.search).get('promo') === 'climax') {
        setTimeout(setupPromoClimax, 60);
      }
    } catch (e) {}
  },
  onUpdate: update,
  onDraw: draw
});

// ── PROMO DRIVER (only ever reached via ?promo=climax) ──────────────────────
function setupPromoClimax() {
  // 1. Silent + no cursor (CG: no audio, no visible mouse).
  try { document.documentElement.style.cursor = 'none'; document.body.style.cursor = 'none'; } catch (e) {}
  var _st = document.createElement('style');
  _st.textContent = 'html,body,canvas{cursor:none !important}';
  document.head.appendChild(_st);
  setMuted(true);                 // mutes BOTH SFX (beep) and the music bed
  try { GF.setMusicMuted(true); } catch (e) {}

  // 2. Deterministic RNG so every recorded frame is bit-identical across runs.
  (function seedRandom() {
    var s = 0x1A2B3C4D >>> 0;
    Math.random = function() { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
  })();

  // 3. Make the shift IMMORTAL for the capture. walkOut() / gameOver() are inner
  // closure bindings that update() calls by name, so reassigning them here to
  // no-ops means a customer whose ring empties never walks out and the run can
  // never hit CLOSING TIME mid-clip (the frozen game-over screen was the dud
  // failure mode). We still refill patience each heartbeat so rings look healthy
  // rather than pinned empty. STRICTLY promo-only — nothing outside this code
  // path ever reassigns them.
  walkOut = function() {};
  gameOver = function() {};

  // 4. Suppress every overlay/menu and start a shift immediately.
  metaOpen = false; showTut = false; bootBannerT = 0; toolToast = null; taskToast = null;
  screenshotMode = false;
  startGame();                    // → gs = 'PLAYING', fresh first (plain) customer
  // Jump ~1.5 min in so green/milk/taro bases + pearls + jelly toppings are
  // unlocked — colourful, multi-ingredient cups read better on camera than the
  // plain-tea opening, without the late-game drain being so steep it outpaces
  // the scripted hands (we also refill patience below so the shift never ends).
  elapsed = 95;
  prevBaseCount = unlockedBases().length;
  prevTopCount  = unlockedToppings().length;
  spawnTimer = 0.3;
  maxQueue = MAX_QUEUE + 1;        // one extra slot so the counter looks full
  // pre-seed a full-ish counter so frame 1 already shows waiting guests
  for (var i = queue.length; i < maxQueue; i++) spawnCustomer();

  // 4. Synthesize taps through the REAL input handler at the live hit-rects.
  // btnRects / customer screen positions are rebuilt every draw frame, so by
  // the time this fires (post-settle) they're populated. We read the front
  // customer's order, tap its base button, tap each required topping button,
  // then tap the customer — exactly what a player does.
  function frontCustomer() {
    for (var i = 0; i < queue.length; i++) {
      var c = queue[i];
      if (c.leaving === 0 && c.angry === 0) return c;
    }
    return null;
  }
  function rectCenterFor(kind, id) {
    for (var b = 0; b < btnRects.length; b++) {
      var r = btnRects[b];
      if (r.kind === kind && r.id === id && !r.locked) return { x: r.x + r.w / 2, y: r.y + r.h / 2 };
    }
    return null;
  }
  // one full "make + serve" of the current front customer, taps staggered so
  // the pour / topping / serve each land on a distinct frame (visible motion).
  function serveFront() {
    var c = frontCustomer();
    if (!c) return;                         // nothing waiting → wait for next tick
    var seq = [];                           // [{at, fn}] relative ms
    var baseC = rectCenterFor('base', c.order.base);
    if (baseC) seq.push({ at: 0, fn: function() { onPress(baseC.x, baseC.y); } });
    else        seq.push({ at: 0, fn: function() { addBase(c.order.base); } });   // fallback: build directly
    var step = 150;
    for (var k = 0; k < c.order.toppings.length; k++) {
      (function(tid, when) {
        var tc = rectCenterFor('topping', tid);
        seq.push({ at: when, fn: function() { if (tc) onPress(tc.x, tc.y); else addTopping(tid); } });
      })(c.order.toppings[k], step * (k + 1));
    }
    // finally tap the customer to serve (use the real per-frame screen pos).
    var serveAt = step * (c.order.toppings.length + 1) + 120;
    seq.push({ at: serveAt, fn: function() {
      var cc = frontCustomer();             // re-resolve (positions update each frame)
      if (cc && cc.sx != null) onPress(cc.sx, cc.sy);
    } });
    for (var s = 0; s < seq.length; s++) {
      (function(item) { setTimeout(item.fn, item.at); })(seq[s]);
    }
  }

  // Keep the bar ALIVE for the whole capture: top up every waiting guest's
  // patience and zero the strikes each tick so nobody ever walks out and the
  // shift never hits CLOSING TIME mid-clip (a frozen game-over screen is the
  // failure mode we must avoid). The serve loop still empties + refills the
  // queue, so coins/combo/served keep climbing on camera — continuous play.
  function keepShiftLively() {
    if (gs === 'SHOP') { closeShop(); }     // the between-rush UPGRADE BAR pop freezes the view → dismiss instantly
    if (gs !== 'PLAYING') return;
    strikes = 0;
    servesSinceShop = 0;                     // never let the serve count reach SHOP_EVERY (no shop pop mid-clip)
    for (var i = 0; i < queue.length; i++) {
      var c = queue[i];
      if (c.leaving === 0 && c.angry === 0 && c.patience < 0.65) c.patience = 1;
    }
    // refill the counter so there's always someone to serve
    var waiting = 0;
    for (var j = 0; j < queue.length; j++) if (queue[j].leaving === 0 && queue[j].angry === 0) waiting++;
    if (waiting < 2) spawnCustomer();
  }

  // Cadence: a complete make+serve cycle ~ every 650ms keeps the scene busy
  // (cups flowing, coins ticking) without being frantic. First cycle after a
  // ~550ms beat so the opening frame reads as an establishing shot before the
  // hands start moving. keepShiftLively runs on a faster 220ms heartbeat so a
  // ring can never empty between serve cycles.
  var liveTimer = setInterval(keepShiftLively, 220);
  var promoTimer = setInterval(function() {
    if (gs === 'SHOP') { closeShop(); }     // skip the between-rush shop pop so play never stalls
    if (gs === 'GAMEOVER') { startGame(); elapsed = 95; spawnTimer = 0.3; maxQueue = MAX_QUEUE + 1; for (var i = queue.length; i < maxQueue; i++) spawnCustomer(); return; }
    if (gs === 'PLAYING') serveFront();
  }, 650);
  setTimeout(serveFront, 550);

  // Safety stop a bit past the 18s capture window so we never run unbounded.
  setTimeout(function() { try { clearInterval(promoTimer); clearInterval(liveTimer); } catch (e) {} }, 26000);
}

// ── STATE EXPOSURE (post-build-tester gate) ────────────────────────────────
GF.exposeState(function() {
  var ng = nextTool();
  return {
    gs: gs,
    coins: coins,
    best: best,
    customersServed: customersServed,
    strikes: strikes,
    combo: combo,
    elapsed: Math.round(elapsed),
    queueLen: queue.length,
    maxQueue: maxQueue,
    nextMilestone: nextMilestone,
    heat: +heat.toFixed(2),
    flavorsUnlocked: unlockedBases().length,
    toppingsUnlocked: unlockedToppings().length,
    upgrades: up,
    score: score(),
    // ── cross-session café meta surfaced for the harness / dashboards ──
    stars: meta ? meta.stars : 0,
    totalPlaySec: Math.floor(totalPlaySec()),
    totalPlayMin: Math.floor(totalPlayMin()),
    permLevels: meta ? meta.perm : null,
    gearOwned: meta ? Object.keys(meta.tools.owned).length : 0,
    gearEquipped: meta ? meta.tools.equipped.filter(Boolean).length : 0,
    nextGear: ng ? ng.id : null,
    nextGearMin: ng ? Math.max(0, Math.ceil(ng.min - totalPlayMin())) : 0,
    questsClaimable: claimableTasks(),
    streak: meta ? meta.login.streak : 0,
    lastStarsEarned: lastStarsEarned,
    // ── endless Café Mastery sink + prestige (M2) ──
    mastery: meta ? meta.mastery : null,
    masteryLevels: totalMasteryLevels(),
    renown: renownCount(),
    canRenown: canRenown(),
    nextSpecCost: (function() { var c = cheapestMastery(); return c ? c.cost : 0; })(),
    metaOpen: metaOpen,
    muted: muted
  };
});

// Persist the in-progress run's playtime before the tab is hidden/closed so a
// refresh or app-switch mid-run banks it (GF.persist bounces a live run to MENU
// on reload, which would otherwise drop runPlaySec). Both events for coverage.
window.addEventListener('pagehide', function() { bankRunPlaytime(); });
document.addEventListener('visibilitychange', function() { if (document.visibilityState === 'hidden') bankRunPlaytime(); });

})();
</script>
