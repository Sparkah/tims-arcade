// derived multipliers from upgrades
function serveSpeedMult() { return 1 + up.serve * 0.45; }     // affects serve-anim/coin pop only (cosmetic juice)
function drainMult()      { return 1 - up.drain * 0.16; }     // slower drain
function comboBonusMult() { return COMBO_MULT * (1 + up.combo * 0.6); }
function iceStart()       { return up.ice > 0; }              // cups pre-fill base hint

];

  var lvl = up[card.id];
  return UPGRADE_COSTS[Math.min(lvl, UPGRADE_COSTS.length - 1)];

// ── UNLOCK HELPERS ─────────────────────────────────────────────────────────
// The permanent café "Signature Menu" upgrade unlocks premium recipes from the
// START of a run (L1 taro base, L2 +pearls topping, L3 +pop premium topping),
// regardless of elapsed time. permSig is read from the cross-session meta.
function unlockedBases() {
  var sig = permSignature();
  var out = [];
  for (var i = 0; i < BASES.length; i++) {
    if (elapsed >= BASES[i].unlockAt || (sig >= 1 && BASES[i].id === 'taro')) out.push(BASES[i]);
  }
  return out;
}
function unlockedToppings() {
  var sig = permSignature();
  var out = [];
  for (var i = 0; i < TOPPINGS.length; i++) {
    var t = TOPPINGS[i];
    var sigOpen = (sig >= 2 && t.id === 'pearls') || (sig >= 3 && t.id === 'pop');
    if (elapsed >= t.unlockAt || sigOpen) out.push(t);
  }
  return out;
}
function baseById(id) { for (var i = 0; i < BASES.length; i++) if (BASES[i].id === id) return BASES[i]; return null; }
function topById(id)  { for (var i = 0; i < TOPPINGS.length; i++) if (TOPPINGS[i].id === id) return TOPPINGS[i]; return null; }

// ── ORDER GENERATION ───────────────────────────────────────────────────────
function makeOrder(isVip) {
  var bases = unlockedBases();
  var tops = unlockedToppings();
  var base = bases[(Math.random() * bases.length) | 0].id;
  var chosen = [];
  // how many toppings?
  var maxTop = 0;
  if (tops.length > 0) {
    if (elapsed >= TWO_TOPPING_AT) maxTop = 2;
    else maxTop = 1;
  }
  if (isVip) maxTop = Math.min(tops.length, 2 + (Math.random() < 0.5 ? 1 : 0));
  // pick toppings (some orders are plain even when toppings exist, early on)
  var wantCount;
  if (isVip) wantCount = Math.min(maxTop, tops.length);
  else {
    // early: chance of plain; later: more likely to want topping(s)
    var r = Math.random();
    if (tops.length === 0) wantCount = 0;
    else if (elapsed < 70) wantCount = r < 0.45 ? 0 : 1;
    else if (maxTop >= 2) wantCount = r < 0.2 ? 1 : 2;
    else wantCount = r < 0.18 ? 0 : 1;
  }
  var pool = tops.slice();
  for (var i = 0; i < wantCount && pool.length; i++) {
    var idx = (Math.random() * pool.length) | 0;
    chosen.push(pool[idx].id);
    pool.splice(idx, 1);
  }
  return { base: base, toppings: chosen };
}

// ── CUSTOMER SPAWN ─────────────────────────────────────────────────────────
function freeSlots() { return maxQueue - queue.length; }

function spawnCustomer() {
  if (queue.length >= maxQueue) {
    // overflow → heat spike (snowball pressure), no new customer placed
    heat = Math.min(1, heat + 0.34);
    GF.setShake(0.3);
    return;
  }
  // TOOL: Lucky Stamp — every Nth guest (N = toolVal) is a guaranteed easy VIP
  // (a plain order from a VIP = a fat, low-effort tip). N shrinks as the tool
  // levels up. 0 = tool not equipped.
  stampCounter++;
  var stampN = toolVal('stamp');
  var luckyGuest = stampN > 0 && (stampCounter % stampN === 0);
  var isVip = luckyGuest || (elapsed >= VIP_AT && Math.random() < 0.22);
  var order = luckyGuest ? { base: unlockedBases()[0].id, toppings: [] } : makeOrder(isVip);
  // Comfy Seats (permanent café upgrade) raises every guest's patience window.
  var pat = BASE_PATIENCE * (isVip ? 1.25 : 1) * permPatienceMult();
  // each creature gets a stable colour + bob phase for life
  var hueChoices = ['#ff9aa2', '#a0e7e5', '#ffd6a5', '#b5ead7', '#c7ceea', '#fdcb9e'];
  queue.push({
    id: nextCustomerId++,
    order: order,
    patience: 1,            // 0..1 fraction of pat
    patMax: pat,
    vip: isVip,
    hue: hueChoices[(Math.random() * hueChoices.length) | 0],
    phase: Math.random() * Math.PI * 2,
    leaving: 0,             // >0 = animating out (happy)
    angry: 0,              // >0 = animating out (walk-out)
    bounce: 0,             // serve squash
    born: elapsed
  });
}

// ── CURRENT-CUP HANDLING ───────────────────────────────────────────────────
function addBase(id) {
  // tapping a base sets/replaces the base (only one base per cup)
  currentCup.base = id;
  spritePop(L.cupX, L.cupY);
  beep(440, 0.05);
}
function addTopping(id) {
  if (!currentCup.base) { // need a base first — gentle nudge
    GF.spawnFloat(L.cupX, L.cupY - 30 * GF.S, GF.t('plain') + ' → base?', '#fff0a0');
    return;
  }
  if (currentCup.toppings.length >= 3) return;
  if (currentCup.toppings.indexOf(id) >= 0) return; // no dup topping
  currentCup.toppings.push(id);
  spritePop(L.cupX, L.cupY - 20 * GF.S);
  beep(560, 0.05);
}
function trashCup() {
  if (!currentCup.base && currentCup.toppings.length === 0) return;
  currentCup = { base: null, toppings: [] };
  if (iceStart()) currentCup.iceHint = true;
  GF.spawnParticles(L.cupX, L.cupY, '#9c8', 8);
  beep(180, 0.08);
}
function freshCup() {
  currentCup = { base: null, toppings: [] };
}

// ── ORDER MATCH ────────────────────────────────────────────────────────────
function cupMatchesOrder(cup, order) {
  if (cup.base !== order.base) return false;
  if (cup.toppings.length !== order.toppings.length) return false;
  // order-insensitive topping compare
  var a = cup.toppings.slice().sort();
  var b = order.toppings.slice().sort();
  for (var i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
  return true;
}

// ── SERVE ──────────────────────────────────────────────────────────────────
function serveCustomer(cust) {
  if (cust.leaving > 0 || cust.angry > 0) return;
  if (!currentCup.base) {
    GF.spawnFloat(cust.sx || GF.cx, (cust.sy || GF.cy) - 40 * GF.S, GF.t('sub'), '#fff0a0');
    return;
  }
  if (cupMatchesOrder(currentCup, cust.order)) {
    // correct!
    var perfect = cust.patience > 0.55;        // green ring = a "perfect" serve
    combo = Math.min(combo + 1, 99);
    comboEarned++;            // real earned streak (H2): the daily combo task tracks THIS, not the perk head-start
    // TOOL: Combo Jar — fattens the combo coin bonus (+%/lvl on top of the
    // in-run Loyalty Card upgrade). Applied as a multiplier on the combo step.
    var jar = 1 + toolVal('combojar') / 100;
    var mult = 1 + Math.min(combo - 1, COMBO_MAX_STEPS) * comboBonusMult() * jar;
    var pay = Math.round(COIN_PER_SERVE * mult);
    var tip = 0;
    if (perfect) tip = Math.round((cust.vip ? TIP_BONUS * 2 : TIP_BONUS) * mult);
    else if (cust.vip) tip = Math.round(TIP_BONUS * mult);
    // TOOL: Golden Straw — chance each serve pays a big bonus tip (50% of pay).
    var strawChance = toolVal('straw');
    var bigTip = 0;
    if (strawChance > 0 && Math.random() * 100 < strawChance) bigTip = Math.round(pay * 0.5) + 2;
    // MASTERY: Generous Tips — endless +%/lvl on every serve's payout.
    var gain = Math.round((pay + tip + bigTip) * masteryTipMult());
    coins += gain;
    customersServed++;
    servesSinceShop++;
    if (!runCountedThisRun) { runCountedThisRun = true; taskProgress('runs', 1); }  // H1: credit the daily 'runs' task on the FIRST real serve
    cust.leaving = 1;
    cust.bounce = 1;
    var px = cust.sx || GF.cx, py = cust.sy || GF.cy;
    GF.spawnParticles(px, py, '#ffd24a', 18);
    GF.spawnParticles(px, py, '#fff', 10);
    GF.spawnFloat(px, py - 46 * GF.S, '+' + gain + ' 🪙', '#ffd24a');
    if (tip > 0) GF.spawnFloat(px + 24 * GF.S, py - 22 * GF.S, '+tip', '#7CFC9A');
    if (bigTip > 0) GF.spawnFloat(px - 26 * GF.S, py - 22 * GF.S, '+' + bigTip + '!', '#ffe08a');
    if (combo >= 2) GF.spawnFloat(px - 18 * GF.S, py - 70 * GF.S, GF.t('combo') + ' x' + combo, '#ff8ad4');
    beep(660 + Math.min(combo, 8) * 40, 0.07);
    beep(880 + Math.min(combo, 8) * 40, 0.05, 0.04);
    GF.happytime && (combo >= 3) && GF.happytime();
    // TOOL: Express Shaker — a snappy serve calms the line: refund a small % of
    // patience to every OTHER waiting guest (keeps the rush survivable).
    // MASTERY: Smooth Service adds an endless +%/lvl refund on top.
    var refund = toolVal('shaker') / 100 + masterySpeedBonus();
    if (refund > 0) {
      for (var qi = 0; qi < queue.length; qi++) {
        var oc = queue[qi];
        if (oc === cust || oc.leaving > 0 || oc.angry > 0) continue;
        oc.patience = Math.min(1, oc.patience + refund);
      }
    }
    // DAILY TASKS fed from this REAL serve event.
    taskProgress('serve', 1);
    taskProgress('combo', comboEarned);
    if (perfect) taskProgress('perfect', 1);
    freshCup();
    if (iceStart()) currentCup.iceHint = true;
    // milestone
    if (customersServed >= nextMilestone) {
      GF.spawnFloat(GF.cx, GF.H * 0.30, GF.t('served') + ' ' + nextMilestone + '!', '#fff');
      GF.setShake(0.25);
      bumpMilestone();
    }
    // shop beat
    if (servesSinceShop >= SHOP_EVERY) {
      servesSinceShop = 0;
      openShop();
    }
    GF.saveRun();
  } else {
    // wrong — penalty, customer keeps waiting, cup trashed
    combo = 0; comboEarned = 0;
    cust.patience = Math.max(0.001, cust.patience - WRONG_TIME_LOSS / cust.patMax);
    var wx = cust.sx || GF.cx, wy = cust.sy || GF.cy;
    GF.spawnFloat(wx, wy - 40 * GF.S, GF.t('wrong'), '#ff6b6b');
    GF.spawnParticles(wx, wy, '#ff6b6b', 8);
    GF.setShake(0.35);
    beep(150, 0.12, 0, 'sawtooth');
    trashCup();
  }
}

function bumpMilestone() {
  if (nextMilestone < 25) nextMilestone = 25;
  else if (nextMilestone < 50) nextMilestone = 50;
  else if (nextMilestone < 100) nextMilestone = 100;
  else nextMilestone += 100;
}

// ── WALK-OUT ───────────────────────────────────────────────────────────────
function walkOut(cust) {
  cust.angry = 1;
  combo = 0; comboEarned = 0;
  strikes++;
  var px = cust.sx || GF.cx, py = cust.sy || GF.cy;
  GF.spawnFloat(px, py - 40 * GF.S, GF.t('walkout'), '#ff5555');
  GF.spawnParticles(px, py, '#ff5555', 14);
  GF.setShake(0.6);
  beep(200, 0.18, 0, 'sawtooth');
  beep(140, 0.22, 0.08, 'sawtooth');
  if (strikes >= STRIKES_TO_LOSE) gameOver();
  GF.saveRun();
}

// ── UNLOCK NOTICES ─────────────────────────────────────────────────────────
var prevBaseCount = 0, prevTopCount = 0;
function checkUnlocks() {
  var b = unlockedBases().length;
  var tp = unlockedToppings().length;
  if (b > prevBaseCount && prevBaseCount > 0) {
    GF.spawnFloat(GF.cx, GF.H * 0.62, GF.t('newflavor'), '#b89be0');
    beep(720, 0.1); beep(960, 0.08, 0.06);
  }
  if (tp > prevTopCount && prevTopCount > 0) {
    GF.spawnFloat(GF.cx, GF.H * 0.62, GF.t('newtopping'), '#ff8ad4');
    beep(720, 0.1); beep(960, 0.08, 0.06);
  }
  prevBaseCount = b; prevTopCount = tp;
}

// ── LIFECYCLE ──────────────────────────────────────────────────────────────
function startGame() {
  coins = 0; customersServed = 0; strikes = 0; combo = 0;
  elapsed = 0; spawnTimer = 0.6; heat = 0; nextMilestone = 10;
  queue = []; servesSinceShop = 0;
  up = { serve: 0, slot: 0, drain: 0, ice: 0, combo: 0 };
  // CROSS-SESSION CAFÉ META applied here (distinct from the in-run SHOP `up`):
  // Prep Station permanently raises the counter baseline; Tip Jar seeds coins;
  // Loyal Regulars seeds the combo streak. metaOpen never carries into a run.
  maxQueue = MAX_QUEUE + permPrepSlots() + masteryRoomSlots();
  coins = permStartCoins();
  combo = permStartCombo();
  stampCounter = 0;                       // re-arm the Lucky Stamp every shift
  runPlaySec = 0;
  comboEarned = 0; runCountedThisRun = false;
  metaOpen = false;
  screenshotMode = false;
  freshCup();
  prevBaseCount = unlockedBases().length;
  prevTopCount = unlockedToppings().length;
  showTut = false;
  gs = 'PLAYING';
  // first customer right away — wants a PLAIN tea (time-to-first-fun)
  var b0 = unlockedBases();
  var firstPat = BASE_PATIENCE * permPatienceMult();
  queue.push({
    id: nextCustomerId++, order: { base: b0[0].id, toppings: [] },
    patience: 1, patMax: firstPat, vip: false,
    hue: '#ff9aa2', phase: 0, leaving: 0, angry: 0, bounce: 0, born: 0
  });
  // TOOL: Regulars Book — open each shift with N customers already served
  // (a head-start toward the next milestone) plus the free starting combo.
  var book = toolVal('book');
  if (book > 0) {
    customersServed += book;
    combo = Math.max(combo, 1);
  }
  if (meta) { meta.lastSeen = Date.now(); saveMeta(); }
  // (the daily 'runs' task is credited on the first REAL serve — see serveCustomer — to prevent start-and-abandon farming, H1)
  GF.gameStarted();
  GF.saveRun();
}

function openShop() {
  gs = 'SHOP';
}
function closeShop() {
  gs = 'PLAYING';
  GF.gameStarted();
}

function gameOver() {
  if (gs === 'GAMEOVER') return;   // re-entry guard (C1): >=2 walk-outs in ONE frame must bank Stars + the coins-task ONCE, not per walk-out
  var newBest = score() > best;
  if (newBest) {
    best = score();
    try { localStorage.setItem('boba_rush_best', best); } catch (e) {}
  }
  // ── BANK CAFÉ STARS (the reason to return to the café) ──────────────────
  // Stars = floor(score/8) + customersServed, scaled up by the Loyalty Card
  // tool (+%/lvl). Folded into the cross-session meta; lastStarsEarned drives
  // the "+N Stars" line on the GAMEOVER screen.
  lastStarsEarned = 0;
  if (meta) {
    var baseStars = Math.floor(score() / 8) + customersServed;
    var loyalty = toolVal('loyalty');          // +%/lvl
    // MASTERY Star Polish + RENOWN prestige multiply banked Stars (endless sink income).
    var earned = Math.round(baseStars * (1 + loyalty / 100) * masteryStarMult());
    lastStarsEarned = Math.max(0, earned);
    meta.stars += lastStarsEarned;
    // DAILY TASK: coins earned across shifts today (count this shift's coins).
    taskProgress('coins', coins);
    bankRunPlaytime();                          // fold this run's real seconds in
    meta.lastSeen = Date.now();
    checkToolUnlocks();                         // a long final run may cross a tool milestone
    saveMeta();
  }
  gs = 'GAMEOVER';
  GF.gameEnded();
  if (newBest && best > 0) GF.happytime && GF.happytime();
  GF.saveRun();
}

function score() { return coins + customersServed * 5; }

function applyUpgrade(card) {
  if (up[card.id] >= card.max) return;
  var cost = upCost(card);
  if (coins < cost) { beep(150, 0.1, 0, 'sawtooth'); return; }
  coins -= cost;
  up[card.id]++;
  if (card.id === 'slot') maxQueue = MAX_QUEUE + up.slot + permPrepSlots() + masteryRoomSlots();
  GF.spawnParticles(GF.cx, GF.H * 0.5, '#ffd24a', 16);
  beep(620, 0.08); beep(820, 0.07, 0.05);
  GF.saveRun();
}

// A returning player always has a concrete next purchase = the come-back hook.
var MASTERY_DEFS = [
  { id:'speed',  col:'#a0e7e5', base:60,  growth:1.55, per:1.5, max:50 }, // +1.5%/lvl extra patience refunded on a serve

  { id:'polish', col:'#ffb3e6', base:70,  growth:1.55, per:2,   max:60 }  // +2%/lvl Café Stars banked
];
var MASTERY_BY_ID = {};
for (var _mi = 0; _mi < MASTERY_DEFS.length; _mi++) MASTERY_BY_ID[MASTERY_DEFS[_mi].id] = MASTERY_DEFS[_mi];

// forever). The long-horizon "one more prestige" return reason.
var RENOWN_THRESHOLD = 12;   // total mastery levels needed to prestige

function masteryLvl(id) { return (meta && meta.mastery && meta.mastery[id]) || 0; }
function masteryDef(id) { return MASTERY_BY_ID[id]; }
function masteryCost(id) {

}
function masteryValue(id, lvl) { var d = MASTERY_BY_ID[id]; return d ? d.per * (lvl == null ? masteryLvl(id) : lvl) : 0; }
function buyMastery(id) {

}
function totalMasteryLevels() {
  if (!meta || !meta.mastery) return 0;

}
// the single cheapest next mastery buy (the always-visible "next thing"), or null if all maxed
function cheapestMastery() {

function masterySpeedBonus()  { return masteryValue('speed') / 100; }   // extra serve patience refund (fraction)
function masteryTipMult()     { return 1 + masteryValue('tips') / 100; } // coin multiplier
function masteryRoomSlots()   { return masteryLvl('room'); }            // extra queue slots

var TOOL_BY_ID = {};

// ── BALANCE-CURVE BOT CONTRACT (progression_trials.js steering wheel) ────────

// order, then serve). 'shop' clears the between-rush beat; 'menu' boots a run.
(function() {
  if (!GF || typeof GF.exposeBot !== 'function') return;  // older gf-lib: probe is SOFT, skip
  function frontCustomer() {
    for (var i = 0; i < queue.length; i++) if (queue[i].leaving === 0 && queue[i].angry === 0) return queue[i];
    return null;
  }
  GF.exposeBot(
    function getActions() {
      if (gs === 'MENU' || gs === 'GAMEOVER') return ['start'];
      if (gs === 'SHOP') return ['continue'];
      if (gs !== 'PLAYING') return [];
      return frontCustomer() ? ['serveFront'] : ['wait'];
    },
    function doAction(a) {
      if (a === 'start') { startGame(); return; }
      if (a === 'continue') { closeShop(); return; }
      if (a === 'serveFront') {
        var c = frontCustomer(); if (!c) return;
        freshCup();
        addBase(c.order.base);
        for (var k = 0; k < c.order.toppings.length; k++) addTopping(c.order.toppings[k]);
        serveCustomer(c);
        return;
      }
    }
  );
})();

// ── UPDATE ─────────────────────────────────────────────────────────────────
function update(dt) {
  // toasts + welcome-back banner advance regardless of state (they can fire on
  // the MENU and must not freeze when the run is paused).
  if (toolToast) { toolToast.t -= dt; if (toolToast.t <= 0) toolToast = null; }
  if (taskToast) { taskToast.t -= dt; if (taskToast.t <= 0) taskToast = null; }
  if (renownToast > 0) renownToast = Math.max(0, renownToast - dt);
  if (bootBannerT > 0) bootBannerT = Math.max(0, bootBannerT - dt);

  if (gs !== 'PLAYING') return;
  if (showTut) return; // pause world while the in-play help panel is open
  if (metaOpen) return; // CAFÉ overlay open mid-run → fully paused (no drain/spawn/playtime)
  if (screenshotMode) return; // frozen for Yandex 5.1.1 capture (no drain/spawn/walk-out)

  elapsed += dt;
  checkUnlocks();

  // accrue REAL playtime toward the TOOL ladder; unlock any crossed milestone
  // mid-run (non-blocking toast) so the boost is felt immediately.
  runPlaySec += dt;
  var freshTools = checkToolUnlocks();
  if (freshTools.length) {
    toolToast = { def: freshTools[freshTools.length - 1], t: 3.4 };
    GF.setShake(0.25); beep(720, 0.1); beep(980, 0.09, 0.07);
  }

  // TOOL: Fresh Ice — gentler escalation (spawn cadence + patience ramp scale
  // down by %/lvl), so the late-game rush ramps up more slowly.
  var iceMul = 1 - GF.clamp(toolVal('ice'), 0, 60) / 100;

  // spawn cadence (ramps faster over time; Fresh Ice softens the ramp)
  var interval = Math.max(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL - elapsed * SPAWN_RAMP * iceMul);
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnCustomer();
    spawnTimer = interval;
  }

  // heat decays when there's room, persists while full
  if (freeSlots() > 0) heat = Math.max(0, heat - dt * 0.5);

  // patience drain (global ramp + per-upgrade + heat). The permanent ramp is
  // softened by Fresh Ice; the Patience Charm tool slows the whole drain.
  var patienceTool = 1 - GF.clamp(toolVal('patience'), 0, 60) / 100;
  var globalDecay = (PATIENCE_DECAY + elapsed * PATIENCE_RAMP * iceMul) * drainMult() * patienceTool;
  var heatMul = 1 + heat * (HEAT_DRAIN_MULT - 1);
  for (var i = queue.length - 1; i >= 0; i--) {
    var c = queue[i];
    if (c.bounce > 0) c.bounce = Math.max(0, c.bounce - dt * 3);
    if (c.leaving > 0) {
      c.leaving += dt * 2.2;
      if (c.leaving >= 2) queue.splice(i, 1);
      continue;
    }
    if (c.angry > 0) {
      c.angry += dt * 2.2;
      if (c.angry >= 2) queue.splice(i, 1);
      continue;
    }
    c.patience -= (globalDecay * heatMul) / c.patMax * dt;
    if (c.patience <= 0) {
      c.patience = 0;
      walkOut(c);
      if (gs === 'GAMEOVER') break;   // stop processing further walk-outs once the run has ended (C1 defence)
    }
  }
}

// DRAW
// ════════════════════════════════════════════════════════════════════════
function computeLayout() {
  var W = GF.W, H = GF.H, S = GF.S;
  L.W = W; L.H = H; L.S = S;
  // queue band: top ~46%; station: bottom
  L.queueTop = H * 0.135;
  L.queueBottom = H * 0.50;
  L.stationTop = H * 0.52;
  // current cup preview (above buttons)
  L.cupX = W * 0.5;
  L.cupY = H * 0.62;
  L.cupW = GF.clamp(110 * S, 70, 150);
  L.cupH = L.cupW * 1.25;
  // ingredient buttons region
  L.btnTop = H * 0.74;
  L.btnH = GF.clamp(64 * S, 46, 86);
  L.btnGap = GF.clamp(8 * S, 5, 12);
  L.btnPad = GF.clamp(10 * S, 6, 16);
}

// queue slot screen positions (assigns sx,sy to each customer)
function layoutQueue() {
  var n = maxQueue;
  var W = GF.W, S = GF.S;
  var slotW = W / n;
  for (var i = 0; i < queue.length; i++) {
    var c = queue[i];
    var slot = i; // FIFO left→right
    if (slot >= n) slot = n - 1;
    c.sx = slotW * (slot + 0.5);
    c.sy = GF.lerp(L.queueTop, L.queueBottom, 0.46);
    c.slotW = slotW;
  }
}

function draw(ctx) {
  computeLayout();
  drawBackground(ctx);

  if (gs === 'PLAYING' || gs === 'SHOP') {
    layoutQueue();
    drawCounter(ctx);
    drawQueue(ctx);
    drawStation(ctx);
    drawHUD(ctx);
    if (gs === 'SHOP') drawShop(ctx);
    if (showTut) drawTutPanel(ctx, false);
  }

  if (gs === 'MENU')     drawMenu(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);

  // Mute pill — same top-right spot on MENU + live play. Hidden (and its hit
  // target disarmed) behind the café overlay / SHOP / tutorial / game-over so
  // it never floats over a modal. (Yandex: every game exposes a mute toggle.)
  if ((gs === 'MENU' || gs === 'PLAYING') && !metaOpen && !showTut) drawMutePill(ctx);
  else muteRect = null;

  // CAFÉ overlay sits above MENU or a paused run (it owns input while open).
  if (metaOpen && (gs === 'MENU' || gs === 'PLAYING')) drawMetaOverlay(ctx);

  // welcome-back banner + non-blocking toasts on top of everything (suppressed
  // while the overlay is open so they don't fight the modal).
  if (!metaOpen) {
    if (bootBannerT > 0 && gs === 'MENU') drawBootBanner(ctx);
    if (toolToast) drawToolToast(ctx);
    else if (taskToast) drawTaskToast(ctx);
  }
  // RENOWN flash fires from INSIDE the overlay (prestige happens there), so it
  // draws on top of the modal too.
  if (renownToast > 0) drawRenownToast(ctx);
}

// Cozy boba-shop interior that FRAMES the playfield on wide/desktop screens.
// The bright centred band is the lit serving counter; these margins are the
// shop around it (warm wall, pendant lamps, shelved supply jars, a plant, a
// wood floor). Only called when gf-lib gives us side margins (offX>0) — mobile
// portrait never sees this, so the phone build is untouched. Pure shapes, no
// canvas text/emoji (tofu-safe).
function drawCafeMargins(ctx, fullW, fullH, offX, bandW) {
  var S = GF.S;
  var wall = ctx.createLinearGradient(0, 0, 0, fullH);
  wall.addColorStop(0, '#5b3a26'); wall.addColorStop(0.55, '#46291a'); wall.addColorStop(1, '#36200f');
  ctx.fillStyle = wall; ctx.fillRect(0, 0, fullW, fullH);
  // warm light pooled on the centre counter so the band reads as "lit"
  var glow = ctx.createRadialGradient(fullW/2, fullH*0.34, bandW*0.2, fullW/2, fullH*0.42, fullW*0.62);
  glow.addColorStop(0, 'rgba(255,214,150,0.30)'); glow.addColorStop(1, 'rgba(255,214,150,0)');
  ctx.fillStyle = glow; ctx.fillRect(0, 0, fullW, fullH);
  // wood floor along the bottom
  var floorY = fullH * 0.84;
  var floor = ctx.createLinearGradient(0, floorY, 0, fullH);
  floor.addColorStop(0, '#7a4d28'); floor.addColorStop(1, '#5b3618');
  ctx.fillStyle = floor; ctx.fillRect(0, floorY, fullW, fullH - floorY);
  ctx.fillStyle = 'rgba(255,235,200,0.12)'; ctx.fillRect(0, floorY, fullW, 3 * S);
  drawCafeSide(ctx, 0, offX, fullH, S, -1);
  drawCafeSide(ctx, offX + bandW, fullW, fullH, S, 1);
}
function drawCafeSide(ctx, mx0, mx1, fullH, S, dir) {
  var mw = mx1 - mx0; if (mw < 30) return;
  var cxm = (mx0 + mx1) / 2;
  // pendant lamp
  var lx = cxm + dir * mw * 0.04;
  ctx.strokeStyle = 'rgba(20,12,6,0.6)'; ctx.lineWidth = 2 * S;
  ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, fullH * 0.16); ctx.stroke();
  var lg = ctx.createRadialGradient(lx, fullH*0.185, 2*S, lx, fullH*0.185, 42*S);
  lg.addColorStop(0, 'rgba(255,206,120,0.55)'); lg.addColorStop(1, 'rgba(255,206,120,0)');
  ctx.fillStyle = lg; ctx.beginPath(); ctx.arc(lx, fullH*0.185, 42*S, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#2b1c10'; GF.rr(ctx, lx - 13*S, fullH*0.16, 26*S, 15*S, 7*S); ctx.fill();
  ctx.fillStyle = '#ffd98a'; ctx.beginPath(); ctx.arc(lx, fullH*0.16 + 16*S, 5*S, 0, 6.28); ctx.fill();
  // shelf + supply jars
  var shY = fullH * 0.42, shX0 = mx0 + mw * 0.15, shX1 = mx1 - mw * 0.15;
  ctx.fillStyle = '#3a2615'; ctx.fillRect(shX0, shY, shX1 - shX0, 7 * S);
  ctx.fillStyle = 'rgba(255,235,200,0.10)'; ctx.fillRect(shX0, shY, shX1 - shX0, 2 * S);
  var jarCols = ['#caa56a', '#b5764a', '#9bd17a'];
  var nj = Math.max(2, Math.min(3, Math.floor(mw / (44*S))));
  for (var j = 0; j < nj; j++) {
    var jx = shX0 + (j + 0.5) / nj * (shX1 - shX0);
    var jh = (26 + (j % 2) * 8) * S, jw = 18 * S;
    ctx.fillStyle = jarCols[j % jarCols.length];
    GF.rr(ctx, jx - jw/2, shY - jh, jw, jh, 4 * S); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.18)'; GF.rr(ctx, jx - jw/2 + 2*S, shY - jh + 2*S, 4*S, jh - 6*S, 2*S); ctx.fill();
    ctx.fillStyle = '#2b1c10'; GF.rr(ctx, jx - jw/2 - 1*S, shY - jh - 4*S, jw + 2*S, 5*S, 2*S); ctx.fill();
  }
  // potted plant low in the margin
  var px = cxm - dir * mw * 0.16, py = fullH * 0.62;
  ctx.fillStyle = '#6fae52';
  for (var k = 0; k < 6; k++) {
    var a = -1.7 + k * 0.5;
    var lxp = px + Math.cos(a) * 15 * S, lyp = py - 6*S + Math.sin(a) * 5 * S;
    ctx.save(); ctx.translate(lxp, lyp - 8*S); ctx.rotate(a);
    ctx.beginPath(); ctx.ellipse(0, 0, 5*S, 11*S, 0, 0, 6.28); ctx.fill(); ctx.restore();
  }
  ctx.fillStyle = '#5b3a1e'; GF.rr(ctx, px - 14*S, py, 28*S, 18*S, 4*S); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.10)'; GF.rr(ctx, px - 14*S, py, 28*S, 4*S, 2*S); ctx.fill();
}

function drawBackground(ctx) {
  var W = GF.W, H = GF.H;
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#ffe9c9');
  g.addColorStop(0.5, '#ffd9a8');
  g.addColorStop(1, '#f3b07a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // soft warm vignette
  var rg = ctx.createRadialGradient(W * 0.5, H * 0.34, H * 0.1, W * 0.5, H * 0.4, H * 0.8);
  rg.addColorStop(0, 'rgba(255,250,235,0.5)');
  rg.addColorStop(1, 'rgba(120,70,30,0.18)');
  ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
  // hanging string-light dots near top for cozy cafe vibe
  ctx.save();
  for (var i = 0; i < 7; i++) {
    var x = (i + 0.5) / 7 * W;
    var y = H * 0.045 + Math.sin(i * 1.3) * 6 * GF.S;
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = ['#ffd24a', '#ff8ad4', '#a0e7e5'][i % 3];
    ctx.beginPath(); ctx.arc(x, y, 4 * GF.S, 0, 6.28); ctx.fill();
    ctx.globalAlpha = 0.25; ctx.strokeStyle = '#7a4a20'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, y); ctx.stroke();
  }
  ctx.restore();
}

function drawCounter(ctx) {
  var W = GF.W, S = GF.S;
  var y = L.queueBottom;
  // wooden counter band separating queue from station
  var g = ctx.createLinearGradient(0, y, 0, y + 26 * S);
  g.addColorStop(0, '#b5763e');
  g.addColorStop(1, '#8a5325');
  ctx.fillStyle = g;
  ctx.fillRect(0, y, W, 26 * S);
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(0, y, W, 4 * S);
}

// ── QUEUE / CUSTOMERS ──────────────────────────────────────────────────────
function drawQueue(ctx) {
  for (var i = 0; i < queue.length; i++) drawCustomer(ctx, queue[i]);
}

function drawCustomer(ctx, c) {
  var S = GF.S;
  var x = c.sx, y = c.sy;
  if (x == null) return;
  var leaveOff = 0, alpha = 1, scale = 1;
  if (c.leaving > 0) { leaveOff = -c.leaving * 60 * S; alpha = Math.max(0, 1 - c.leaving / 2); scale = 1 + c.leaving * 0.1; }
  if (c.angry > 0)   { leaveOff = c.angry * 50 * S; alpha = Math.max(0, 1 - c.angry / 2); }
  var bob = Math.sin(elapsed * 2.5 + c.phase) * 3 * S;
  var squash = c.bounce > 0 ? (1 - c.bounce * 0.18) : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  var cw = GF.clamp(70 * S, 44, 96);

  // speech bubble (order) above head
  if (c.leaving === 0 && c.angry === 0) {
    drawOrderBubble(ctx, c, x, y - cw * 0.95 + bob);
  }

  // body
  var bodyY = y + bob + leaveOff;
  var spriteName = c.vip ? 'creature_vip' : 'creature';
  GF.drawSprite(spriteName, x, bodyY, cw * 1.1 * scale, function(g, sx, sy, ss) {
    drawCreatureFallback(g, sx, sy, ss, c, squash);
  });
  // if sprites exist they replace fallback; ensure vip glow regardless
  if (c.vip && c.leaving === 0 && c.angry === 0) {
    ctx.save();
    ctx.globalAlpha = alpha * (0.35 + 0.2 * Math.sin(elapsed * 4 + c.phase));
    ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 3 * S;
    ctx.beginPath(); ctx.arc(x, bodyY, cw * 0.62, 0, 6.28); ctx.stroke();
    ctx.restore();
  }

  // patience ring (around feet / base)
  if (c.leaving === 0 && c.angry === 0) {
    drawPatienceRing(ctx, x, bodyY + cw * 0.62, GF.clamp(28 * S, 18, 40), c.patience);
  }

  // happy/angry face emote on exit
  if (c.leaving > 0) { ctx.globalAlpha = alpha; ctx.font = (cw * 0.7) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('😋', x, bodyY); }
  if (c.angry > 0)   { ctx.globalAlpha = alpha; ctx.font = (cw * 0.7) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('😡', x, bodyY); }

  ctx.restore();
}

function drawCreatureFallback(g, x, y, s, c, squash) {
  var w = s * 0.5 * (squash ? (1 / squash) : 1);
  var h = s * 0.5 * (squash || 1);
  // body blob
  g.fillStyle = c.vip ? '#ffe08a' : c.hue;
  g.beginPath();
  g.ellipse(x, y, w, h, 0, 0, 6.28);
  g.fill();
  // belly highlight
  g.fillStyle = 'rgba(255,255,255,0.35)';
  g.beginPath(); g.ellipse(x - w * 0.25, y - h * 0.25, w * 0.4, h * 0.35, 0, 0, 6.28); g.fill();
  // eyes
  g.fillStyle = '#3a2a22';
  var ex = w * 0.32, ey = -h * 0.12, er = s * 0.05;
  g.beginPath(); g.arc(x - ex, y + ey, er, 0, 6.28); g.fill();
  g.beginPath(); g.arc(x + ex, y + ey, er, 0, 6.28); g.fill();
  // eye sparkle
  g.fillStyle = '#fff';
  g.beginPath(); g.arc(x - ex + er * 0.4, y + ey - er * 0.4, er * 0.4, 0, 6.28); g.fill();
  g.beginPath(); g.arc(x + ex + er * 0.4, y + ey - er * 0.4, er * 0.4, 0, 6.28); g.fill();
  // smile
  g.strokeStyle = '#3a2a22'; g.lineWidth = s * 0.03; g.lineCap = 'round';
  g.beginPath(); g.arc(x, y + h * 0.08, w * 0.32, 0.15 * Math.PI, 0.85 * Math.PI); g.stroke();
  // cheek blush
  g.fillStyle = 'rgba(255,120,120,0.4)';
  g.beginPath(); g.arc(x - w * 0.5, y + h * 0.05, w * 0.16, 0, 6.28); g.fill();
  g.beginPath(); g.arc(x + w * 0.5, y + h * 0.05, w * 0.16, 0, 6.28); g.fill();
}

function drawOrderBubble(ctx, c, x, y) {
  var S = GF.S;
  var base = baseById(c.order.base);
  var nTop = c.order.toppings.length;
  var iconR = GF.clamp(15 * S, 10, 22);
  var pad = GF.clamp(7 * S, 4, 11);
  var items = 1 + nTop;
  var bw = items * (iconR * 2 + pad) + pad;
  var bh = iconR * 2 + pad * 2;
  var bx = x - bw / 2, by = y - bh;
  // bubble
  ctx.save();
  ctx.fillStyle = '#fffdf8';
  ctx.shadowColor = 'rgba(120,70,30,0.25)'; ctx.shadowBlur = 6 * S; ctx.shadowOffsetY = 2 * S;
  GF.rr(ctx, bx, by, bw, bh, GF.clamp(10 * S, 6, 14));
  ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  // tail
  ctx.fillStyle = '#fffdf8';
  ctx.beginPath();
  ctx.moveTo(x - 5 * S, by + bh - 1);
  ctx.lineTo(x + 5 * S, by + bh - 1);
  ctx.lineTo(x, by + bh + 8 * S);
  ctx.closePath(); ctx.fill();
  // draw mini cup (base colour) + topping symbols
  var ix = bx + pad + iconR;
  var iy = by + bh / 2;
  drawMiniCup(ctx, ix, iy, iconR, base);
  for (var i = 0; i < nTop; i++) {
    ix += iconR * 2 + pad;
    var tp = topById(c.order.toppings[i]);
    drawToppingIcon(ctx, ix, iy, iconR * 0.92, tp);
  }
  ctx.restore();
}

function drawMiniCup(ctx, x, y, r, base) {
  ctx.save();
  // cup body
  var w = r * 1.4, h = r * 1.8;
  ctx.fillStyle = '#ffffff';
  GF.rr(ctx, x - w / 2, y - h / 2, w, h, r * 0.3);
  ctx.fill();
  // tea fill
  if (base) {
    ctx.fillStyle = base.col;
    GF.rr(ctx, x - w / 2 + 1, y - h * 0.18, w - 2, h * 0.66, r * 0.25);
    ctx.fill();
  }
  // outline
  ctx.strokeStyle = '#c9a06a'; ctx.lineWidth = 1.4;
  GF.rr(ctx, x - w / 2, y - h / 2, w, h, r * 0.3);
  ctx.stroke();
  // straw
  ctx.strokeStyle = base ? base.col2 : '#bbb'; ctx.lineWidth = r * 0.18;
  ctx.beginPath(); ctx.moveTo(x + w * 0.18, y - h * 0.55); ctx.lineTo(x - w * 0.05, y + h * 0.2); ctx.stroke();
  ctx.restore();
}

function drawToppingIcon(ctx, x, y, r, tp) {
  if (!tp) return;
  ctx.save();
  if (tp.id === 'pearls') {
    ctx.fillStyle = '#3a2a22';
    for (var i = 0; i < 4; i++) {
      var a = i / 4 * 6.28;
      ctx.beginPath(); ctx.arc(x + Math.cos(a) * r * 0.45, y + Math.sin(a) * r * 0.45, r * 0.34, 0, 6.28); ctx.fill();
    }
  } else if (tp.id === 'jelly') {
    ctx.fillStyle = tp.col;
    for (var j = 0; j < 3; j++) {
      GF.rr(ctx, x - r * 0.5 + j * r * 0.42 - r * 0.1, y - r * 0.3 + (j % 2) * r * 0.3, r * 0.5, r * 0.5, r * 0.12);
      ctx.fill();
    }
  } else if (tp.id === 'pop') {
    // popping pearls — bright with shine
    var grd = ctx.createRadialGradient(x - r * 0.2, y - r * 0.2, r * 0.1, x, y, r);
    grd.addColorStop(0, '#ffd24a'); grd.addColorStop(0.5, tp.col); grd.addColorStop(1, '#c0392b');
    ctx.fillStyle = grd;
    for (var k = 0; k < 3; k++) {
      var aa = k / 3 * 6.28;
      ctx.beginPath(); ctx.arc(x + Math.cos(aa) * r * 0.4, y + Math.sin(aa) * r * 0.4, r * 0.42, 0, 6.28); ctx.fill();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(x - r * 0.1, y - r * 0.15, r * 0.14, 0, 6.28); ctx.fill();
  } else if (tp.id === 'cream') {
    ctx.fillStyle = tp.col;
    ctx.beginPath();
    ctx.moveTo(x - r * 0.6, y + r * 0.4);
    ctx.bezierCurveTo(x - r * 0.6, y - r * 0.6, x + r * 0.6, y - r * 0.6, x + r * 0.6, y + r * 0.4);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#e8d8c0'; ctx.lineWidth = r * 0.08; ctx.stroke();
  }
  ctx.restore();
}

// patience ring
function drawPatienceRing(ctx, x, y, r, frac) {
  ctx.save();
  // track
  ctx.strokeStyle = 'rgba(60,40,30,0.22)'; ctx.lineWidth = 5 * GF.S;
  ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28); ctx.stroke();
  // fill (recolour green→amber→red)
  var col = frac > 0.55 ? '#4caf50' : frac > 0.28 ? '#ffb300' : '#f4433a';
  if (frac < 0.28) {
    // pulse when low
    var pl = 0.6 + 0.4 * Math.sin(elapsed * 9);
    ctx.globalAlpha = pl;
  }
  ctx.strokeStyle = col; ctx.lineWidth = 5 * GF.S; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(x, y, r, -Math.PI / 2, -Math.PI / 2 + frac * 6.28);
  ctx.stroke();
  ctx.restore();
}

// ── STATION (cup preview + ingredient buttons) ─────────────────────────────
var btnRects = []; // {x,y,w,h, kind:'base'|'topping', id, locked}
var trashRect = null;

function drawStation(ctx) {
  drawCupPreview(ctx);
  drawIngredientButtons(ctx);
}

function drawCupPreview(ctx) {
  var S = GF.S;
  var x = L.cupX, y = L.cupY, w = L.cupW, h = L.cupH;
  var base = currentCup.base ? baseById(currentCup.base) : null;
  ctx.save();
  // glossy big cup
  GF.drawSprite('cup', x, y, w * 1.5, function() {});
  // we draw the cup procedurally on top regardless (sprite optional accent)
  // cup body
  var bx = x - w / 2, by = y - h / 2;
  var bg = ctx.createLinearGradient(bx, by, bx + w, by);
  bg.addColorStop(0, 'rgba(255,255,255,0.95)');
  bg.addColorStop(0.5, 'rgba(255,255,255,0.78)');
  bg.addColorStop(1, 'rgba(255,255,255,0.95)');
  ctx.fillStyle = bg;
  GF.rr(ctx, bx, by, w, h, w * 0.16); ctx.fill();
  // tea fill
  if (base) {
    var fg = ctx.createLinearGradient(0, by + h * 0.18, 0, by + h);
    fg.addColorStop(0, base.col);
    fg.addColorStop(1, base.col2);
    ctx.fillStyle = fg;
    GF.rr(ctx, bx + 3, by + h * 0.20, w - 6, h * 0.78, w * 0.12); ctx.fill();
  }
  // toppings settle at bottom
  for (var i = 0; i < currentCup.toppings.length; i++) {
    drawToppingInCup(ctx, currentCup.toppings[i], bx, by, w, h, i);
  }
  // glossy highlight
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  GF.rr(ctx, bx + w * 0.14, by + h * 0.08, w * 0.16, h * 0.7, w * 0.08); ctx.fill();
  // dome lid + straw
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.beginPath(); ctx.ellipse(x, by, w * 0.52, h * 0.10, 0, Math.PI, 0); ctx.fill();
  ctx.fillStyle = base ? base.col2 : '#cdb38a';
  ctx.save();
  ctx.lineCap = 'round'; ctx.strokeStyle = '#ff8ad4'; ctx.lineWidth = w * 0.10;
  ctx.beginPath(); ctx.moveTo(x + w * 0.16, by - h * 0.16); ctx.lineTo(x - w * 0.06, by + h * 0.5); ctx.stroke();
  ctx.restore();
  // outline
  ctx.strokeStyle = '#caa06a'; ctx.lineWidth = 2.4 * S;
  GF.rr(ctx, bx, by, w, h, w * 0.16); ctx.stroke();

  // empty hint
  if (!base && currentCup.toppings.length === 0) {
    ctx.fillStyle = 'rgba(120,80,40,0.55)';
    ctx.font = 'bold ' + GF.clamp(13 * S, 10, 18) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('↓', x, y);
  }

  // trash ✕ tap target (top-right of cup)
  if (base || currentCup.toppings.length > 0) {
    var tr = GF.clamp(15 * S, 11, 21);
    var trx = x + w * 0.62, tryy = by + tr * 0.3;
    ctx.fillStyle = '#f4433a';
    ctx.beginPath(); ctx.arc(trx, tryy, tr, 0, 6.28); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.4 * S; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(trx - tr * 0.4, tryy - tr * 0.4); ctx.lineTo(trx + tr * 0.4, tryy + tr * 0.4);
    ctx.moveTo(trx + tr * 0.4, tryy - tr * 0.4); ctx.lineTo(trx - tr * 0.4, tryy + tr * 0.4);
    ctx.stroke();
    trashRect = { x: trx - tr * 1.4, y: tryy - tr * 1.4, w: tr * 2.8, h: tr * 2.8 };
  } else {
    trashRect = null;
  }
  ctx.restore();
}

function drawToppingInCup(ctx, id, bx, by, w, h, idx) {
  var tp = topById(id);
  if (!tp) return;
  var cy = by + h * 0.78 - idx * h * 0.12;
  ctx.save();
  if (id === 'pearls') {
    ctx.fillStyle = '#3a2a22';
    for (var i = 0; i < 7; i++) {
      var px = bx + w * (0.2 + (i % 4) * 0.2);
      var py = cy + ((i / 4) | 0) * w * 0.13;
      ctx.beginPath(); ctx.arc(px, py, w * 0.075, 0, 6.28); ctx.fill();
    }
  } else if (id === 'jelly') {
    ctx.fillStyle = tp.col;
    for (var j = 0; j < 5; j++) {
      GF.rr(ctx, bx + w * (0.18 + j * 0.14), cy, w * 0.11, w * 0.11, w * 0.03); ctx.fill();
    }
  } else if (id === 'pop') {
    for (var k = 0; k < 6; k++) {
      var grd = ctx.createRadialGradient(bx + w * (0.2 + (k % 3) * 0.22), cy, w * 0.02, bx + w * (0.2 + (k % 3) * 0.22), cy, w * 0.09);
      grd.addColorStop(0, '#ffd24a'); grd.addColorStop(1, tp.col);
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(bx + w * (0.2 + (k % 3) * 0.22), cy + ((k / 3) | 0) * w * 0.12, w * 0.07, 0, 6.28); ctx.fill();
    }
  } else if (id === 'cream') {
    ctx.fillStyle = tp.col;
    ctx.beginPath();
    ctx.moveTo(bx + w * 0.2, by + h * 0.22);
    ctx.bezierCurveTo(bx + w * 0.2, by + h * 0.05, bx + w * 0.8, by + h * 0.05, bx + w * 0.8, by + h * 0.22);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawIngredientButtons(ctx) {
  btnRects = [];
  var W = GF.W, S = GF.S;
  // Show ONLY currently-usable ingredients — never a wall of locked "soon"
  // slots (that reads as an unfinished demo, and the 🔒 glyph tofus on some
  // mobiles). New flavours appear + announce via the NEW TOOL toast as playtime
  // crosses each unlockAt; the full ladder lives in the MY CAFÉ menu. Buttons
  // keep a stable size (sized for a full 5-slot row) and the unlocked subset is
  // centred, so the bar looks intentional from the first serve.
  var rowKinds = [
    { kind: 'base', list: unlockedBases() },
    { kind: 'topping', list: unlockedToppings() }
  ];
  var SLOTS = 5;
  var pad = L.btnPad, gap = L.btnGap;
  var bw = (W - pad * 2 - gap * (SLOTS - 1)) / SLOTS;
  var bh = L.btnH;
  for (var r = 0; r < rowKinds.length; r++) {
    var list = rowKinds[r].list;
    var n = list.length;
    if (n === 0) continue;                       // no empty row on a fresh bar
    var rowW = n * bw + (n - 1) * gap;
    var startX = (W - rowW) / 2;                  // centre the unlocked buttons
    var rowY = L.btnTop + r * (bh + gap + 6 * S);
    for (var i = 0; i < n; i++) {
      var item = list[i];
      var bx = startX + i * (bw + gap);
      drawIngredientButton(ctx, bx, rowY, bw, bh, rowKinds[r].kind, item, false);
      btnRects.push({ x: bx, y: rowY, w: bw, h: bh, kind: rowKinds[r].kind, id: item.id, locked: false });
    }
  }
}

function drawIngredientButton(ctx, x, y, w, h, kind, item, locked) {
  var S = GF.S;
  ctx.save();
  // card
  var topCol, botCol;
  if (kind === 'base') { topCol = item.col; botCol = item.col2; }
  else { topCol = '#fff3e2'; botCol = '#f3dcc0'; }
  if (locked) { topCol = '#cdbfae'; botCol = '#b3a591'; }
  var g = ctx.createLinearGradient(0, y, 0, y + h);
  g.addColorStop(0, topCol); g.addColorStop(1, botCol);
  ctx.fillStyle = g;
  ctx.shadowColor = 'rgba(120,70,30,0.30)'; ctx.shadowBlur = 5 * S; ctx.shadowOffsetY = 2 * S;
  GF.rr(ctx, x, y, w, h, GF.clamp(12 * S, 8, 16)); ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  // top gloss
  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  GF.rr(ctx, x + 3, y + 3, w - 6, h * 0.34, GF.clamp(8 * S, 5, 12)); ctx.fill();

  // icon
  var icx = x + w / 2, icy = y + h * 0.40;
  if (locked) {
    ctx.fillStyle = 'rgba(60,40,30,0.5)';
    ctx.font = (h * 0.34) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🔒', icx, icy);
  } else if (kind === 'base') {
    drawMiniCup(ctx, icx, icy, h * 0.22, item);
  } else {
    drawToppingIcon(ctx, icx, icy, h * 0.26, item);
  }
  // label
  ctx.fillStyle = locked ? 'rgba(50,35,25,0.7)' : '#4a3520';
  ctx.font = 'bold ' + GF.clamp(11 * S, 8, 14) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  var label = locked ? GF.t('locked') : GF.t(item.key);
  ctx.fillText(label, icx, y + h - 4 * S);
  ctx.restore();
}

// ── HUD ────────────────────────────────────────────────────────────────────
var helpRect = null;
var muteRect = null;           // mute toggle pill (HUD top-right; null when not drawn)
function drawHUD(ctx) {
  var W = GF.W, S = GF.S;
  var fs = GF.clamp(17 * S, 13, 24);
  // coins top-left
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  GF.rr(ctx, 8 * S, 8 * S, ctx.measureText('🪙 ' + coins).width + 20 * S, fs + 12 * S, 10 * S);
  ctx.fillStyle = '#7a4a20'; ctx.fill ? 0 : 0;
  ctx.fillStyle = '#7a4a20';
  ctx.fillText('🪙 ' + coins, 18 * S, 14 * S);

  // strikes top-right (cups; lost ones greyed) — lose signal
  var sx = W - 12 * S;
  var cupR = GF.clamp(11 * S, 8, 15);
  ctx.textAlign = 'right';
  for (var i = 0; i < STRIKES_TO_LOSE; i++) {
    var lost = i < strikes;
    var cxp = sx - i * (cupR * 2 + 6 * S) - cupR;
    var cyp = 16 * S + cupR;
    ctx.globalAlpha = lost ? 0.28 : 1;
    ctx.font = (cupR * 2.1) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(lost ? '💔' : '❤️', cxp, cyp);
  }
  ctx.globalAlpha = 1;

  // "?" help button (under strikes, top-right)
  var hr = GF.clamp(15 * S, 12, 20);
  var hx = W - hr - 12 * S, hy = 16 * S + cupR * 2 + hr + 6 * S;
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(hx, hy, hr, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#7a4a20';
  ctx.font = 'bold ' + (hr * 1.3) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', hx, hy + hr * 0.05);
  helpRect = { x: hx - hr * 1.5, y: hy - hr * 1.5, w: hr * 3, h: hr * 3 };

  // CAFÉ pause-pill (left of "?") — pauses the rush + opens the café overlay so
  // the meta is reachable mid-run (not just from the menu). A vector star marks
  // it; a red badge shows claimable daily tasks.
  var cpr = hr;
  var cpx = hx - hr * 2 - 8 * S, cpy = hy;
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(cpx, cpy, cpr, 0, 6.28); ctx.fill();
  drawStarIcon(ctx, cpx, cpy, cpr * 0.74, '#ffb300');
  cafePillRect = { x: cpx - cpr * 1.5, y: cpy - cpr * 1.5, w: cpr * 3, h: cpr * 3 };
  var cqHud = claimableTasks();
  if (cqHud > 0) drawBadge(ctx, cpx + cpr * 0.9, cpy - cpr * 0.9, cqHud);

  // NEXT TOOL IN Nm — keep the playtime-reward goal visible mid-run (only while
  // the next ladder tool is still locked). Left-anchored, under the coin pill.
  var ng = nextTool();
  if (ng) {
    var leftMin = Math.max(1, Math.ceil(ng.min - totalPlayMin()));
    var gy = 8 * S + (fs + 12 * S) + 8 * S, gr = GF.clamp(8 * S, 6, 11), gx = 8 * S + gr + 4 * S;
    drawToolIcon(ctx, ng, gx, gy + gr, gr);
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(122,74,32,0.92)';
    ctx.font = 'bold ' + GF.clamp(10.5 * S, 9, 13) + 'px sans-serif';
    ctx.fillText(GF.t('nextToolHud') + ' ' + leftMin + GF.t('minShort'), gx + gr + 6 * S, gy + gr);
    ctx.textBaseline = 'top';
  }

  // next-goal banner (just under queue) + combo pill
  var by = L.queueBottom + 30 * S;
  var bannerTxt = GF.t('next') + ' ' + nextMilestone + '  (' + customersServed + ')';
  ctx.font = 'bold ' + GF.clamp(13 * S, 10, 18) + 'px sans-serif';
  var bwid = ctx.measureText(bannerTxt).width + 22 * S;
  ctx.fillStyle = 'rgba(122,74,32,0.85)';
  GF.rr(ctx, GF.cx - bwid / 2, by, bwid, GF.clamp(22 * S, 17, 28), 11 * S); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(bannerTxt, GF.cx, by + GF.clamp(11 * S, 8, 14));

  // combo pill
  if (combo >= 2) {
    var ptxt = GF.t('combo') + ' x' + combo;
    ctx.font = 'bold ' + GF.clamp(14 * S, 11, 19) + 'px sans-serif';
    var pw = ctx.measureText(ptxt).width + 18 * S;
    var pulse = 1 + 0.06 * Math.sin(elapsed * 10);
    ctx.save();
    ctx.translate(GF.cx, by - 16 * S);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#ff8ad4';
    GF.rr(ctx, -pw / 2, -11 * S, pw, 22 * S, 11 * S); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ptxt, 0, 0);
    ctx.restore();
  }
}

// ── SHOP (between-rush upgrade strip) ──────────────────────────────────────
var shopCardRects = [];
var shopContRect = null;
function drawShop(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  shopCardRects = [];
  // dim
  ctx.fillStyle = 'rgba(40,24,14,0.78)';
  ctx.fillRect(0, 0, W, H);

  var n = SHOP_CARDS.length;

  }
  // continue button (bottom thumb zone, within the safe sweep band)

  var bx = GF.cx - bw / 2, byy = Math.min(H - bh - GF.clamp(24 * S, 16, 40), H * 0.86 - bh / 2);
  var g = ctx.createLinearGradient(bx, byy, bx, byy + bh);
  g.addColorStop(0, '#4caf50'); g.addColorStop(1, '#2e8b3d');

  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(18 * S, 14, 24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('cont'), GF.cx, byy + bh / 2);
