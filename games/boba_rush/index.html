<script>
(function() {
'use strict';

// ════════════════════════════════════════════════════════════════════════
// BOBA RUSH — cozy bubble-tea bar. Tap a tea base, drop a topping, serve a
// customer before their patience ring empties. 3 walk-outs = game over.
// Portrait-first, two-input, endless escalating. Honors DESIGN.md.
// ════════════════════════════════════════════════════════════════════════

// ── LOCALISED STRINGS ─────────────────────────────────────────────────────
var STRINGS = {

  },

    sub: 'Нажми на чай, потом на гостя — подай!',

    score: 'ОЧКИ', best: 'РЕКОРД', coins: 'Монеты', served: 'Гости',
    gameover: 'БАР ЗАКРЫТ', strikes: 'Уходы',
    next: 'Цель:', combo: 'КОМБО', shop: 'УЛУЧШИТЬ БАР',
    cont: 'НАЗАД В РАБОТУ', buy: 'КУПИТЬ', owned: 'КУПЛЕНО', maxed: 'МАКС',
    locked: 'скоро', vip: 'VIP', wrong: 'Не тот напиток!', walkout: 'Гость ушёл!',
    newflavor: 'Новый вкус!', newtopping: 'Новый топпинг!',
    tut_goal: 'Цель: Управляй чайным баром — собери напиток для каждого гостя и подай, пока не опустело кольцо терпения.',
    tut_controls: 'Управление: Нажми на чай (потом топпинг), чтобы наполнить стакан, потом на гостя. Нажми ✕ на стакане, чтобы вылить.',
    tut_win: 'Победа: Бесконечно — бей рекорд (монеты + гости) и достигай целей. Новые вкусы открываются.',
    tut_lose: 'Поражение: 3 ухода гостей (терпение упало до нуля) — конец смены.',
    tut_tip: 'Совет: Подавай, пока кольцо зелёное, ради чаевых, и собирай комбо.',
    tut_back: 'НАЖМИ, ЧТОБЫ ЗАКРЫТЬ',
    up_serve: 'Быстрый налив', up_serve_d: 'Быстрее подача',
    up_slot: '+1 стойка', up_slot_d: 'Ещё одно место',
    up_drain: 'Мягкие кресла', up_drain_d: 'Терпение тает медленнее',
    up_ice: 'Авто-лёд', up_ice_d: 'Стакан наполовину готов',
    up_combo: 'Карта лояльности', up_combo_d: 'Больше бонус комбо',
    b_green: 'Зелёный', b_milk: 'Молочный', b_taro: 'Таро', b_matcha: 'Матча', b_mango: 'Манго',
    t_pearls: 'Жемчуг', t_jelly: 'Желе', t_pop: 'Лопающиеся', t_cream: 'Крем',
    plain: 'без топпинга'
  }
};

// ── SPRITES (procedural fallback if missing) ───────────────────────────────
var SPRITE_NAMES = ['cup', 'pearls', 'creature', 'creature_vip'];

// ── TUNABLES (from DESIGN.md) ──────────────────────────────────────────────
var BASE_PATIENCE      = 14;
var PATIENCE_DECAY     = 1.0;
var PATIENCE_RAMP      = 0.018;
var SPAWN_INTERVAL     = 4.2;
var SPAWN_RAMP         = 0.020;
var SPAWN_INTERVAL_MIN = 1.5;
var MAX_QUEUE          = 3;
var STRIKES_TO_LOSE    = 3;
var COIN_PER_SERVE     = 10;
var TIP_BONUS          = 6;
var COMBO_MULT         = 0.25;
var WRONG_TIME_LOSS    = 1.5;
var HEAT_DRAIN_MULT    = 1.6;
var FLAVOR_UNLOCK_TIMES  = [0, 25, 130, 320];
var TOPPING_UNLOCK_TIMES = [55, 95, 200, 270];
var UPGRADE_COSTS        = [40, 80, 140, 220, 320];
var SHOP_EVERY           = 8;   // serves between shop beats
var COMBO_MAX_STEPS      = 6;   // combo multiplier cap

// ── CONTENT TABLES ─────────────────────────────────────────────────────────
// Tea bases — colour + unlock order. First 2 available from the start so the
// game reads as a real bar immediately; taro/matcha/mango stagger in.
var BASES = [
  { id: 'green', key: 'b_green', col: '#9bd17a', col2: '#7bb85a', unlockAt: 0 },
  { id: 'milk',  key: 'b_milk',  col: '#efe2c9', col2: '#d8c4a0', unlockAt: 0 },
  { id: 'taro',  key: 'b_taro',  col: '#b89be0', col2: '#9a7bd0', unlockAt: 25 },
  { id: 'matcha',key: 'b_matcha',col: '#7fb069', col2: '#5f9049', unlockAt: 130 },
  { id: 'mango', key: 'b_mango', col: '#ffc24d', col2: '#ffa61f', unlockAt: 320 }
];
// Toppings — symbol drawn procedurally; unlock staggered.
var TOPPINGS = [
  { id: 'pearls', key: 't_pearls', col: '#3a2a22', unlockAt: 55 },
  { id: 'jelly',  key: 't_jelly',  col: '#ff7eb6', unlockAt: 95 },
  { id: 'pop',    key: 't_pop',    col: '#ff5a3c', unlockAt: 270, premium: true },
  { id: 'cream',  key: 't_cream',  col: '#fff6e8', unlockAt: 200 }
];
var TWO_TOPPING_AT = 200;   // 2-topping orders begin
var VIP_AT         = 240;   // VIPs begin arriving

// ── GAME STATE ─────────────────────────────────────────────────────────────
var gs = 'MENU';            // MENU | PLAYING | SHOP | GAMEOVER
var coins = 0, best = 0;
var customersServed = 0;
var strikes = 0;
var combo = 0;
var elapsed = 0;            // seconds since rush start
var spawnTimer = 0;
var heat = 0;               // queue-overflow pressure 0..1
var nextMilestone = 10;
var queue = [];             // active customers
var currentCup = { base: null, toppings: [] };
var maxQueue = MAX_QUEUE;
var servesSinceShop = 0;
var seenTutorial = false;
var showTut = false;        // "?" panel open during play
var nextCustomerId = 1;

// upgrade levels (each an index into a small ladder)
var up = { serve: 0, slot: 0, drain: 0, ice: 0, combo: 0 };

// derived multipliers from upgrades
function serveSpeedMult() { return 1 + up.serve * 0.45; }     // affects serve-anim/coin pop only (cosmetic juice)
function drainMult()      { return 1 - up.drain * 0.16; }     // slower drain
function comboBonusMult() { return COMBO_MULT * (1 + up.combo * 0.6); }
function iceStart()       { return up.ice > 0; }              // cups pre-fill base hint

// layout cache (recomputed each frame from GF.W/H)
var L = {};

// shop cards definition
var SHOP_CARDS = [
  { id: 'serve', max: 3, nameKey: 'up_serve', descKey: 'up_serve_d' },
  { id: 'slot',  max: 2, nameKey: 'up_slot',  descKey: 'up_slot_d' },
  { id: 'drain', max: 3, nameKey: 'up_drain', descKey: 'up_drain_d' },
  { id: 'ice',   max: 1, nameKey: 'up_ice',   descKey: 'up_ice_d' },
  { id: 'combo', max: 3, nameKey: 'up_combo', descKey: 'up_combo_d' }
];
function upCost(card) {
  var lvl = up[card.id];
  return UPGRADE_COSTS[Math.min(lvl, UPGRADE_COSTS.length - 1)];
}

// ── UNLOCK HELPERS ─────────────────────────────────────────────────────────
function unlockedBases() {
  var out = [];
  for (var i = 0; i < BASES.length; i++) if (elapsed >= BASES[i].unlockAt) out.push(BASES[i]);
  return out;
}
function unlockedToppings() {
  var out = [];
  for (var i = 0; i < TOPPINGS.length; i++) if (elapsed >= TOPPINGS[i].unlockAt) out.push(TOPPINGS[i]);
  return out;
}
function baseById(id) { for (var i = 0; i < BASES.length; i++) if (BASES[i].id === id) return BASES[i]; return null; }
function topById(id)  { for (var i = 0; i < TOPPINGS.length; i++) if (TOPPINGS[i].id === id) return TOPPINGS[i]; return null; }

// ── ORDER GENERATION ───────────────────────────────────────────────────────
function makeOrder(isVip) {
  var bases = unlockedBases();
  var tops = unlockedToppings();
  var base = bases[(Math.random() * bases.length) | 0].id;
  var chosen = [];
  // how many toppings?
  var maxTop = 0;
  if (tops.length > 0) {
    if (elapsed >= TWO_TOPPING_AT) maxTop = 2;
    else maxTop = 1;
  }
  if (isVip) maxTop = Math.min(tops.length, 2 + (Math.random() < 0.5 ? 1 : 0));
  // pick toppings (some orders are plain even when toppings exist, early on)
  var wantCount;
  if (isVip) wantCount = Math.min(maxTop, tops.length);
  else {
    // early: chance of plain; later: more likely to want topping(s)
    var r = Math.random();
    if (tops.length === 0) wantCount = 0;
    else if (elapsed < 70) wantCount = r < 0.45 ? 0 : 1;
    else if (maxTop >= 2) wantCount = r < 0.2 ? 1 : 2;
    else wantCount = r < 0.18 ? 0 : 1;
  }
  var pool = tops.slice();
  for (var i = 0; i < wantCount && pool.length; i++) {
    var idx = (Math.random() * pool.length) | 0;
    chosen.push(pool[idx].id);
    pool.splice(idx, 1);
  }
  return { base: base, toppings: chosen };
}

// ── CUSTOMER SPAWN ─────────────────────────────────────────────────────────
function freeSlots() { return maxQueue - queue.length; }

function spawnCustomer() {
  if (queue.length >= maxQueue) {
    // overflow → heat spike (snowball pressure), no new customer placed
    heat = Math.min(1, heat + 0.34);
    GF.setShake(0.3);
    return;
  }
  var isVip = elapsed >= VIP_AT && Math.random() < 0.22;
  var order = makeOrder(isVip);
  var pat = BASE_PATIENCE * (isVip ? 1.25 : 1);
  // each creature gets a stable colour + bob phase for life
  var hueChoices = ['#ff9aa2', '#a0e7e5', '#ffd6a5', '#b5ead7', '#c7ceea', '#fdcb9e'];
  queue.push({
    id: nextCustomerId++,
    order: order,
    patience: 1,            // 0..1 fraction of pat
    patMax: pat,
    vip: isVip,
    hue: hueChoices[(Math.random() * hueChoices.length) | 0],
    phase: Math.random() * Math.PI * 2,
    leaving: 0,             // >0 = animating out (happy)
    angry: 0,              // >0 = animating out (walk-out)
    bounce: 0,             // serve squash
    born: elapsed
  });
}

// ── CURRENT-CUP HANDLING ───────────────────────────────────────────────────
function addBase(id) {
  // tapping a base sets/replaces the base (only one base per cup)
  currentCup.base = id;
  spritePop(L.cupX, L.cupY);
  beep(440, 0.05);
}
function addTopping(id) {
  if (!currentCup.base) { // need a base first — gentle nudge
    GF.spawnFloat(L.cupX, L.cupY - 30 * GF.S, GF.t('plain') + ' → base?', '#fff0a0');
    return;
  }
  if (currentCup.toppings.length >= 3) return;
  if (currentCup.toppings.indexOf(id) >= 0) return; // no dup topping
  currentCup.toppings.push(id);
  spritePop(L.cupX, L.cupY - 20 * GF.S);
  beep(560, 0.05);
}
function trashCup() {
  if (!currentCup.base && currentCup.toppings.length === 0) return;
  currentCup = { base: null, toppings: [] };
  if (iceStart()) currentCup.iceHint = true;
  GF.spawnParticles(L.cupX, L.cupY, '#9c8', 8);
  beep(180, 0.08);
}
function freshCup() {
  currentCup = { base: null, toppings: [] };
}

// ── ORDER MATCH ────────────────────────────────────────────────────────────
function cupMatchesOrder(cup, order) {
  if (cup.base !== order.base) return false;
  if (cup.toppings.length !== order.toppings.length) return false;
  // order-insensitive topping compare
  var a = cup.toppings.slice().sort();
  var b = order.toppings.slice().sort();
  for (var i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
  return true;
}

// ── SERVE ──────────────────────────────────────────────────────────────────
function serveCustomer(cust) {
  if (cust.leaving > 0 || cust.angry > 0) return;
  if (!currentCup.base) {
    GF.spawnFloat(cust.sx || GF.cx, (cust.sy || GF.cy) - 40 * GF.S, GF.t('sub'), '#fff0a0');
    return;
  }
  if (cupMatchesOrder(currentCup, cust.order)) {
    // correct!
    combo = Math.min(combo + 1, 99);
    var mult = 1 + Math.min(combo - 1, COMBO_MAX_STEPS) * comboBonusMult();
    var pay = Math.round(COIN_PER_SERVE * mult);
    var tip = 0;
    if (cust.patience > 0.55) tip = Math.round((cust.vip ? TIP_BONUS * 2 : TIP_BONUS) * mult);
    else if (cust.vip) tip = Math.round(TIP_BONUS * mult);
    var gain = pay + tip;
    coins += gain;
    customersServed++;
    servesSinceShop++;
    cust.leaving = 1;
    cust.bounce = 1;
    var px = cust.sx || GF.cx, py = cust.sy || GF.cy;
    GF.spawnParticles(px, py, '#ffd24a', 18);
    GF.spawnParticles(px, py, '#fff', 10);
    GF.spawnFloat(px, py - 46 * GF.S, '+' + gain + ' 🪙', '#ffd24a');
    if (tip > 0) GF.spawnFloat(px + 24 * GF.S, py - 22 * GF.S, '+tip', '#7CFC9A');
    if (combo >= 2) GF.spawnFloat(px - 18 * GF.S, py - 70 * GF.S, GF.t('combo') + ' x' + combo, '#ff8ad4');
    beep(660 + Math.min(combo, 8) * 40, 0.07);
    beep(880 + Math.min(combo, 8) * 40, 0.05, 0.04);
    GF.happytime && (combo >= 3) && GF.happytime();
    freshCup();
    if (iceStart()) currentCup.iceHint = true;
    // milestone
    if (customersServed >= nextMilestone) {
      GF.spawnFloat(GF.cx, GF.H * 0.30, GF.t('served') + ' ' + nextMilestone + '!', '#fff');
      GF.setShake(0.25);
      bumpMilestone();
    }
    // shop beat
    if (servesSinceShop >= SHOP_EVERY) {
      servesSinceShop = 0;
      openShop();
    }
    GF.saveRun();
  } else {
    // wrong — penalty, customer keeps waiting, cup trashed
    combo = 0;
    cust.patience = Math.max(0.001, cust.patience - WRONG_TIME_LOSS / cust.patMax);
    var wx = cust.sx || GF.cx, wy = cust.sy || GF.cy;
    GF.spawnFloat(wx, wy - 40 * GF.S, GF.t('wrong'), '#ff6b6b');
    GF.spawnParticles(wx, wy, '#ff6b6b', 8);
    GF.setShake(0.35);
    beep(150, 0.12, 0, 'sawtooth');
    trashCup();
  }
}

function bumpMilestone() {
  if (nextMilestone < 25) nextMilestone = 25;
  else if (nextMilestone < 50) nextMilestone = 50;
  else if (nextMilestone < 100) nextMilestone = 100;
  else nextMilestone += 100;
}

// ── WALK-OUT ───────────────────────────────────────────────────────────────
function walkOut(cust) {
  cust.angry = 1;
  combo = 0;
  strikes++;
  var px = cust.sx || GF.cx, py = cust.sy || GF.cy;
  GF.spawnFloat(px, py - 40 * GF.S, GF.t('walkout'), '#ff5555');
  GF.spawnParticles(px, py, '#ff5555', 14);
  GF.setShake(0.6);
  beep(200, 0.18, 0, 'sawtooth');
  beep(140, 0.22, 0.08, 'sawtooth');
  if (strikes >= STRIKES_TO_LOSE) gameOver();
  GF.saveRun();
}

// ── UNLOCK NOTICES ─────────────────────────────────────────────────────────
var prevBaseCount = 0, prevTopCount = 0;
function checkUnlocks() {
  var b = unlockedBases().length;
  var tp = unlockedToppings().length;
  if (b > prevBaseCount && prevBaseCount > 0) {
    GF.spawnFloat(GF.cx, GF.H * 0.62, GF.t('newflavor'), '#b89be0');
    beep(720, 0.1); beep(960, 0.08, 0.06);
  }
  if (tp > prevTopCount && prevTopCount > 0) {
    GF.spawnFloat(GF.cx, GF.H * 0.62, GF.t('newtopping'), '#ff8ad4');
    beep(720, 0.1); beep(960, 0.08, 0.06);
  }
  prevBaseCount = b; prevTopCount = tp;
}

// ── LIFECYCLE ──────────────────────────────────────────────────────────────
function startGame() {
  coins = 0; customersServed = 0; strikes = 0; combo = 0;
  elapsed = 0; spawnTimer = 0.6; heat = 0; nextMilestone = 10;
  queue = []; servesSinceShop = 0; maxQueue = MAX_QUEUE;
  up = { serve: 0, slot: 0, drain: 0, ice: 0, combo: 0 };
  screenshotMode = false;
  freshCup();
  prevBaseCount = unlockedBases().length;
  prevTopCount = unlockedToppings().length;
  showTut = false;
  gs = 'PLAYING';
  // first customer right away — wants a PLAIN tea (time-to-first-fun)
  var b0 = unlockedBases();
  queue.push({
    id: nextCustomerId++, order: { base: b0[0].id, toppings: [] },
    patience: 1, patMax: BASE_PATIENCE, vip: false,
    hue: '#ff9aa2', phase: 0, leaving: 0, angry: 0, bounce: 0, born: 0
  });
  GF.gameStarted();
  GF.saveRun();
}

function openShop() {
  gs = 'SHOP';
}
function closeShop() {
  gs = 'PLAYING';
  GF.gameStarted();
}

function gameOver() {
  var newBest = score() > best;
  if (newBest) {
    best = score();
    try { localStorage.setItem('boba_rush_best', best); } catch (e) {}
  }
  gs = 'GAMEOVER';
  GF.gameEnded();
  if (newBest && best > 0) GF.happytime && GF.happytime();
  GF.saveRun();
}

function score() { return coins + customersServed * 5; }

function applyUpgrade(card) {
  if (up[card.id] >= card.max) return;
  var cost = upCost(card);
  if (coins < cost) { beep(150, 0.1, 0, 'sawtooth'); return; }
  coins -= cost;
  up[card.id]++;
  if (card.id === 'slot') maxQueue = MAX_QUEUE + up.slot;
  GF.spawnParticles(GF.cx, GF.H * 0.5, '#ffd24a', 16);
  beep(620, 0.08); beep(820, 0.07, 0.05);
  GF.saveRun();
}

// ── SCREENSHOT / GATE HOOKS ────────────────────────────────────────────────
// screenshotMode: when true, the world is frozen (no drain / no spawn / no
// walk-outs) so a populated PLAYING state stays put for Yandex 5.1.1 shots.
var screenshotMode = false;
// _jumpLevel(n): 1 = start a fresh rush; 2 = jump deep into a populated
// late-game rush (full queue, VIPs, premium toppings — for screenshots /
// loop-depth gate); 99 = force GAMEOVER (terminal-state gate).
window._jumpLevel = function(n) {
  if (n === 99) {
    if (gs === 'MENU') startGame();
    strikes = STRIKES_TO_LOSE;
    gameOver();
    return;
  }
  startGame();
  if (n && n >= 2) {
    screenshotMode = true;    // freeze drain/spawn so the dense frame holds
    // fast-forward into a dense, content-rich state
    elapsed = 300;            // all early flavours + toppings + 2-topping + VIP unlocked
    prevBaseCount = unlockedBases().length;
    prevTopCount = unlockedToppings().length;
    coins = 260; customersServed = 28; nextMilestone = 50;
    combo = 4; up.slot = 1; up.combo = 1; maxQueue = MAX_QUEUE + 1;
    queue = [];
    // fill the queue: a VIP + normals + a 2-topping order. Rings kept healthy
    // (green/amber, never near 0) so the frame reads as a busy-but-winning rush.
    var fills = [0.92, 0.74, 0.6, 0.82];
    var mk = function(vip, fi) {
      var o = makeOrder(vip);
      return { id: nextCustomerId++, order: o, patience: fills[fi] || 0.7,
        patMax: BASE_PATIENCE * (vip ? 1.25 : 1), vip: vip,
        hue: ['#ff9aa2','#a0e7e5','#ffd6a5','#c7ceea'][fi % 4],
        phase: fi * 1.4, leaving: 0, angry: 0, bounce: 0, born: elapsed };
    };
    queue.push(mk(true, 0));
    queue.push(mk(false, 1));
    if (maxQueue >= 3) queue.push(mk(false, 2));
    if (maxQueue >= 4) queue.push(mk(false, 3));
    // a partly-built cup in hand for a busy look (taro + pearls)
    currentCup = { base: 'taro', toppings: ['pearls'] };
  }
};
// _setupForScreenshot — alias used by the screenshot pipeline to land on a
// populated mid-rush state. Engages screenshotMode so the rings don't drain
// to a walk-out during the capture delay.
window._setupForScreenshot = function(lvl) {
  screenshotMode = true;
  window._jumpLevel(lvl && lvl >= 2 ? lvl : 2);
};

// ── UPDATE ─────────────────────────────────────────────────────────────────
function update(dt) {
  if (gs !== 'PLAYING') return;
  if (showTut) return; // pause world while the in-play help panel is open
  if (screenshotMode) return; // frozen for Yandex 5.1.1 capture (no drain/spawn/walk-out)

  elapsed += dt;
  checkUnlocks();

  // spawn cadence (ramps faster over time)
  var interval = Math.max(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL - elapsed * SPAWN_RAMP);
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnCustomer();
    spawnTimer = interval;
  }

  // heat decays when there's room, persists while full
  if (freeSlots() > 0) heat = Math.max(0, heat - dt * 0.5);

  // patience drain (global ramp + per-upgrade + heat)
  var globalDecay = (PATIENCE_DECAY + elapsed * PATIENCE_RAMP) * drainMult();
  var heatMul = 1 + heat * (HEAT_DRAIN_MULT - 1);
  for (var i = queue.length - 1; i >= 0; i--) {
    var c = queue[i];
    if (c.bounce > 0) c.bounce = Math.max(0, c.bounce - dt * 3);
    if (c.leaving > 0) {
      c.leaving += dt * 2.2;
      if (c.leaving >= 2) queue.splice(i, 1);
      continue;
    }
    if (c.angry > 0) {
      c.angry += dt * 2.2;
      if (c.angry >= 2) queue.splice(i, 1);
      continue;
    }
    c.patience -= (globalDecay * heatMul) / c.patMax * dt;
    if (c.patience <= 0) {
      c.patience = 0;
      walkOut(c);
    }
  }
}

// ════════════════════════════════════════════════════════════════════════
// DRAW
// ════════════════════════════════════════════════════════════════════════
function computeLayout() {
  var W = GF.W, H = GF.H, S = GF.S;
  L.W = W; L.H = H; L.S = S;
  // queue band: top ~46%; station: bottom
  L.queueTop = H * 0.135;
  L.queueBottom = H * 0.50;
  L.stationTop = H * 0.52;
  // current cup preview (above buttons)
  L.cupX = W * 0.5;
  L.cupY = H * 0.62;
  L.cupW = GF.clamp(110 * S, 70, 150);
  L.cupH = L.cupW * 1.25;
  // ingredient buttons region
  L.btnTop = H * 0.74;
  L.btnH = GF.clamp(64 * S, 46, 86);
  L.btnGap = GF.clamp(8 * S, 5, 12);
  L.btnPad = GF.clamp(10 * S, 6, 16);
}

// queue slot screen positions (assigns sx,sy to each customer)
function layoutQueue() {
  var n = maxQueue;
  var W = GF.W, S = GF.S;
  var slotW = W / n;
  for (var i = 0; i < queue.length; i++) {
    var c = queue[i];
    var slot = i; // FIFO left→right
    if (slot >= n) slot = n - 1;
    c.sx = slotW * (slot + 0.5);
    c.sy = GF.lerp(L.queueTop, L.queueBottom, 0.46);
    c.slotW = slotW;
  }
}

function draw(ctx) {
  computeLayout();
  drawBackground(ctx);

  if (gs === 'PLAYING' || gs === 'SHOP') {
    layoutQueue();
    drawCounter(ctx);
    drawQueue(ctx);
    drawStation(ctx);
    drawHUD(ctx);
    if (gs === 'SHOP') drawShop(ctx);
    if (showTut) drawTutPanel(ctx, false);
  }

  if (gs === 'MENU')     drawMenu(ctx);
  if (gs === 'GAMEOVER') drawGameOver(ctx);
}

function drawBackground(ctx) {
  var W = GF.W, H = GF.H;
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#ffe9c9');
  g.addColorStop(0.5, '#ffd9a8');
  g.addColorStop(1, '#f3b07a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // soft warm vignette
  var rg = ctx.createRadialGradient(W * 0.5, H * 0.34, H * 0.1, W * 0.5, H * 0.4, H * 0.8);
  rg.addColorStop(0, 'rgba(255,250,235,0.5)');
  rg.addColorStop(1, 'rgba(120,70,30,0.18)');
  ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
  // hanging string-light dots near top for cozy cafe vibe
  ctx.save();
  for (var i = 0; i < 7; i++) {
    var x = (i + 0.5) / 7 * W;
    var y = H * 0.045 + Math.sin(i * 1.3) * 6 * GF.S;
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = ['#ffd24a', '#ff8ad4', '#a0e7e5'][i % 3];
    ctx.beginPath(); ctx.arc(x, y, 4 * GF.S, 0, 6.28); ctx.fill();
    ctx.globalAlpha = 0.25; ctx.strokeStyle = '#7a4a20'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, y); ctx.stroke();
  }
  ctx.restore();
}

function drawCounter(ctx) {
  var W = GF.W, S = GF.S;
  var y = L.queueBottom;
  // wooden counter band separating queue from station
  var g = ctx.createLinearGradient(0, y, 0, y + 26 * S);
  g.addColorStop(0, '#b5763e');
  g.addColorStop(1, '#8a5325');
  ctx.fillStyle = g;
  ctx.fillRect(0, y, W, 26 * S);
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(0, y, W, 4 * S);
}

// ── QUEUE / CUSTOMERS ──────────────────────────────────────────────────────
function drawQueue(ctx) {
  for (var i = 0; i < queue.length; i++) drawCustomer(ctx, queue[i]);
}

function drawCustomer(ctx, c) {
  var S = GF.S;
  var x = c.sx, y = c.sy;
  if (x == null) return;
  var leaveOff = 0, alpha = 1, scale = 1;
  if (c.leaving > 0) { leaveOff = -c.leaving * 60 * S; alpha = Math.max(0, 1 - c.leaving / 2); scale = 1 + c.leaving * 0.1; }
  if (c.angry > 0)   { leaveOff = c.angry * 50 * S; alpha = Math.max(0, 1 - c.angry / 2); }
  var bob = Math.sin(elapsed * 2.5 + c.phase) * 3 * S;
  var squash = c.bounce > 0 ? (1 - c.bounce * 0.18) : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  var cw = GF.clamp(70 * S, 44, 96);

  // speech bubble (order) above head
  if (c.leaving === 0 && c.angry === 0) {
    drawOrderBubble(ctx, c, x, y - cw * 0.95 + bob);
  }

  // body
  var bodyY = y + bob + leaveOff;
  var spriteName = c.vip ? 'creature_vip' : 'creature';
  GF.drawSprite(spriteName, x, bodyY, cw * 1.1 * scale, function(g, sx, sy, ss) {
    drawCreatureFallback(g, sx, sy, ss, c, squash);
  });
  // if sprites exist they replace fallback; ensure vip glow regardless
  if (c.vip && c.leaving === 0 && c.angry === 0) {
    ctx.save();
    ctx.globalAlpha = alpha * (0.35 + 0.2 * Math.sin(elapsed * 4 + c.phase));
    ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 3 * S;
    ctx.beginPath(); ctx.arc(x, bodyY, cw * 0.62, 0, 6.28); ctx.stroke();
    ctx.restore();
  }

  // patience ring (around feet / base)
  if (c.leaving === 0 && c.angry === 0) {
    drawPatienceRing(ctx, x, bodyY + cw * 0.62, GF.clamp(28 * S, 18, 40), c.patience);
  }

  // happy/angry face emote on exit
  if (c.leaving > 0) { ctx.globalAlpha = alpha; ctx.font = (cw * 0.7) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('😋', x, bodyY); }
  if (c.angry > 0)   { ctx.globalAlpha = alpha; ctx.font = (cw * 0.7) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('😡', x, bodyY); }

  ctx.restore();
}

function drawCreatureFallback(g, x, y, s, c, squash) {
  var w = s * 0.5 * (squash ? (1 / squash) : 1);
  var h = s * 0.5 * (squash || 1);
  // body blob
  g.fillStyle = c.vip ? '#ffe08a' : c.hue;
  g.beginPath();
  g.ellipse(x, y, w, h, 0, 0, 6.28);
  g.fill();
  // belly highlight
  g.fillStyle = 'rgba(255,255,255,0.35)';
  g.beginPath(); g.ellipse(x - w * 0.25, y - h * 0.25, w * 0.4, h * 0.35, 0, 0, 6.28); g.fill();
  // eyes
  g.fillStyle = '#3a2a22';
  var ex = w * 0.32, ey = -h * 0.12, er = s * 0.05;
  g.beginPath(); g.arc(x - ex, y + ey, er, 0, 6.28); g.fill();
  g.beginPath(); g.arc(x + ex, y + ey, er, 0, 6.28); g.fill();
  // eye sparkle
  g.fillStyle = '#fff';
  g.beginPath(); g.arc(x - ex + er * 0.4, y + ey - er * 0.4, er * 0.4, 0, 6.28); g.fill();
  g.beginPath(); g.arc(x + ex + er * 0.4, y + ey - er * 0.4, er * 0.4, 0, 6.28); g.fill();
  // smile
  g.strokeStyle = '#3a2a22'; g.lineWidth = s * 0.03; g.lineCap = 'round';
  g.beginPath(); g.arc(x, y + h * 0.08, w * 0.32, 0.15 * Math.PI, 0.85 * Math.PI); g.stroke();
  // cheek blush
  g.fillStyle = 'rgba(255,120,120,0.4)';
  g.beginPath(); g.arc(x - w * 0.5, y + h * 0.05, w * 0.16, 0, 6.28); g.fill();
  g.beginPath(); g.arc(x + w * 0.5, y + h * 0.05, w * 0.16, 0, 6.28); g.fill();
}

function drawOrderBubble(ctx, c, x, y) {
  var S = GF.S;
  var base = baseById(c.order.base);
  var nTop = c.order.toppings.length;
  var iconR = GF.clamp(15 * S, 10, 22);
  var pad = GF.clamp(7 * S, 4, 11);
  var items = 1 + nTop;
  var bw = items * (iconR * 2 + pad) + pad;
  var bh = iconR * 2 + pad * 2;
  var bx = x - bw / 2, by = y - bh;
  // bubble
  ctx.save();
  ctx.fillStyle = '#fffdf8';
  ctx.shadowColor = 'rgba(120,70,30,0.25)'; ctx.shadowBlur = 6 * S; ctx.shadowOffsetY = 2 * S;
  GF.rr(ctx, bx, by, bw, bh, GF.clamp(10 * S, 6, 14));
  ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  // tail
  ctx.fillStyle = '#fffdf8';
  ctx.beginPath();
  ctx.moveTo(x - 5 * S, by + bh - 1);
  ctx.lineTo(x + 5 * S, by + bh - 1);
  ctx.lineTo(x, by + bh + 8 * S);
  ctx.closePath(); ctx.fill();
  // draw mini cup (base colour) + topping symbols
  var ix = bx + pad + iconR;
  var iy = by + bh / 2;
  drawMiniCup(ctx, ix, iy, iconR, base);
  for (var i = 0; i < nTop; i++) {
    ix += iconR * 2 + pad;
    var tp = topById(c.order.toppings[i]);
    drawToppingIcon(ctx, ix, iy, iconR * 0.92, tp);
  }
  ctx.restore();
}

function drawMiniCup(ctx, x, y, r, base) {
  ctx.save();
  // cup body
  var w = r * 1.4, h = r * 1.8;
  ctx.fillStyle = '#ffffff';
  GF.rr(ctx, x - w / 2, y - h / 2, w, h, r * 0.3);
  ctx.fill();
  // tea fill
  if (base) {
    ctx.fillStyle = base.col;
    GF.rr(ctx, x - w / 2 + 1, y - h * 0.18, w - 2, h * 0.66, r * 0.25);
    ctx.fill();
  }
  // outline
  ctx.strokeStyle = '#c9a06a'; ctx.lineWidth = 1.4;
  GF.rr(ctx, x - w / 2, y - h / 2, w, h, r * 0.3);
  ctx.stroke();
  // straw
  ctx.strokeStyle = base ? base.col2 : '#bbb'; ctx.lineWidth = r * 0.18;
  ctx.beginPath(); ctx.moveTo(x + w * 0.18, y - h * 0.55); ctx.lineTo(x - w * 0.05, y + h * 0.2); ctx.stroke();
  ctx.restore();
}

function drawToppingIcon(ctx, x, y, r, tp) {
  if (!tp) return;
  ctx.save();
  if (tp.id === 'pearls') {
    ctx.fillStyle = '#3a2a22';
    for (var i = 0; i < 4; i++) {
      var a = i / 4 * 6.28;
      ctx.beginPath(); ctx.arc(x + Math.cos(a) * r * 0.45, y + Math.sin(a) * r * 0.45, r * 0.34, 0, 6.28); ctx.fill();
    }
  } else if (tp.id === 'jelly') {
    ctx.fillStyle = tp.col;
    for (var j = 0; j < 3; j++) {
      GF.rr(ctx, x - r * 0.5 + j * r * 0.42 - r * 0.1, y - r * 0.3 + (j % 2) * r * 0.3, r * 0.5, r * 0.5, r * 0.12);
      ctx.fill();
    }
  } else if (tp.id === 'pop') {
    // popping pearls — bright with shine
    var grd = ctx.createRadialGradient(x - r * 0.2, y - r * 0.2, r * 0.1, x, y, r);
    grd.addColorStop(0, '#ffd24a'); grd.addColorStop(0.5, tp.col); grd.addColorStop(1, '#c0392b');
    ctx.fillStyle = grd;
    for (var k = 0; k < 3; k++) {
      var aa = k / 3 * 6.28;
      ctx.beginPath(); ctx.arc(x + Math.cos(aa) * r * 0.4, y + Math.sin(aa) * r * 0.4, r * 0.42, 0, 6.28); ctx.fill();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(x - r * 0.1, y - r * 0.15, r * 0.14, 0, 6.28); ctx.fill();
  } else if (tp.id === 'cream') {
    ctx.fillStyle = tp.col;
    ctx.beginPath();
    ctx.moveTo(x - r * 0.6, y + r * 0.4);
    ctx.bezierCurveTo(x - r * 0.6, y - r * 0.6, x + r * 0.6, y - r * 0.6, x + r * 0.6, y + r * 0.4);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#e8d8c0'; ctx.lineWidth = r * 0.08; ctx.stroke();
  }
  ctx.restore();
}

// patience ring
function drawPatienceRing(ctx, x, y, r, frac) {
  ctx.save();
  // track
  ctx.strokeStyle = 'rgba(60,40,30,0.22)'; ctx.lineWidth = 5 * GF.S;
  ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28); ctx.stroke();
  // fill (recolour green→amber→red)
  var col = frac > 0.55 ? '#4caf50' : frac > 0.28 ? '#ffb300' : '#f4433a';
  if (frac < 0.28) {
    // pulse when low
    var pl = 0.6 + 0.4 * Math.sin(elapsed * 9);
    ctx.globalAlpha = pl;
  }
  ctx.strokeStyle = col; ctx.lineWidth = 5 * GF.S; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(x, y, r, -Math.PI / 2, -Math.PI / 2 + frac * 6.28);
  ctx.stroke();
  ctx.restore();
}

// ── STATION (cup preview + ingredient buttons) ─────────────────────────────
var btnRects = []; // {x,y,w,h, kind:'base'|'topping', id, locked}
var trashRect = null;

function drawStation(ctx) {
  drawCupPreview(ctx);
  drawIngredientButtons(ctx);
}

function drawCupPreview(ctx) {
  var S = GF.S;
  var x = L.cupX, y = L.cupY, w = L.cupW, h = L.cupH;
  var base = currentCup.base ? baseById(currentCup.base) : null;
  ctx.save();
  // glossy big cup
  GF.drawSprite('cup', x, y, w * 1.5, function() {});
  // we draw the cup procedurally on top regardless (sprite optional accent)
  // cup body
  var bx = x - w / 2, by = y - h / 2;
  var bg = ctx.createLinearGradient(bx, by, bx + w, by);
  bg.addColorStop(0, 'rgba(255,255,255,0.95)');
  bg.addColorStop(0.5, 'rgba(255,255,255,0.78)');
  bg.addColorStop(1, 'rgba(255,255,255,0.95)');
  ctx.fillStyle = bg;
  GF.rr(ctx, bx, by, w, h, w * 0.16); ctx.fill();
  // tea fill
  if (base) {
    var fg = ctx.createLinearGradient(0, by + h * 0.18, 0, by + h);
    fg.addColorStop(0, base.col);
    fg.addColorStop(1, base.col2);
    ctx.fillStyle = fg;
    GF.rr(ctx, bx + 3, by + h * 0.20, w - 6, h * 0.78, w * 0.12); ctx.fill();
  }
  // toppings settle at bottom
  for (var i = 0; i < currentCup.toppings.length; i++) {
    drawToppingInCup(ctx, currentCup.toppings[i], bx, by, w, h, i);
  }
  // glossy highlight
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  GF.rr(ctx, bx + w * 0.14, by + h * 0.08, w * 0.16, h * 0.7, w * 0.08); ctx.fill();
  // dome lid + straw
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.beginPath(); ctx.ellipse(x, by, w * 0.52, h * 0.10, 0, Math.PI, 0); ctx.fill();
  ctx.fillStyle = base ? base.col2 : '#cdb38a';
  ctx.save();
  ctx.lineCap = 'round'; ctx.strokeStyle = '#ff8ad4'; ctx.lineWidth = w * 0.10;
  ctx.beginPath(); ctx.moveTo(x + w * 0.16, by - h * 0.16); ctx.lineTo(x - w * 0.06, by + h * 0.5); ctx.stroke();
  ctx.restore();
  // outline
  ctx.strokeStyle = '#caa06a'; ctx.lineWidth = 2.4 * S;
  GF.rr(ctx, bx, by, w, h, w * 0.16); ctx.stroke();

  // empty hint
  if (!base && currentCup.toppings.length === 0) {
    ctx.fillStyle = 'rgba(120,80,40,0.55)';
    ctx.font = 'bold ' + GF.clamp(13 * S, 10, 18) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('↓', x, y);
  }

  // trash ✕ tap target (top-right of cup)
  if (base || currentCup.toppings.length > 0) {
    var tr = GF.clamp(15 * S, 11, 21);
    var trx = x + w * 0.62, tryy = by + tr * 0.3;
    ctx.fillStyle = '#f4433a';
    ctx.beginPath(); ctx.arc(trx, tryy, tr, 0, 6.28); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.4 * S; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(trx - tr * 0.4, tryy - tr * 0.4); ctx.lineTo(trx + tr * 0.4, tryy + tr * 0.4);
    ctx.moveTo(trx + tr * 0.4, tryy - tr * 0.4); ctx.lineTo(trx - tr * 0.4, tryy + tr * 0.4);
    ctx.stroke();
    trashRect = { x: trx - tr * 1.4, y: tryy - tr * 1.4, w: tr * 2.8, h: tr * 2.8 };
  } else {
    trashRect = null;
  }
  ctx.restore();
}

function drawToppingInCup(ctx, id, bx, by, w, h, idx) {
  var tp = topById(id);
  if (!tp) return;
  var cy = by + h * 0.78 - idx * h * 0.12;
  ctx.save();
  if (id === 'pearls') {
    ctx.fillStyle = '#3a2a22';
    for (var i = 0; i < 7; i++) {
      var px = bx + w * (0.2 + (i % 4) * 0.2);
      var py = cy + ((i / 4) | 0) * w * 0.13;
      ctx.beginPath(); ctx.arc(px, py, w * 0.075, 0, 6.28); ctx.fill();
    }
  } else if (id === 'jelly') {
    ctx.fillStyle = tp.col;
    for (var j = 0; j < 5; j++) {
      GF.rr(ctx, bx + w * (0.18 + j * 0.14), cy, w * 0.11, w * 0.11, w * 0.03); ctx.fill();
    }
  } else if (id === 'pop') {
    for (var k = 0; k < 6; k++) {
      var grd = ctx.createRadialGradient(bx + w * (0.2 + (k % 3) * 0.22), cy, w * 0.02, bx + w * (0.2 + (k % 3) * 0.22), cy, w * 0.09);
      grd.addColorStop(0, '#ffd24a'); grd.addColorStop(1, tp.col);
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(bx + w * (0.2 + (k % 3) * 0.22), cy + ((k / 3) | 0) * w * 0.12, w * 0.07, 0, 6.28); ctx.fill();
    }
  } else if (id === 'cream') {
    ctx.fillStyle = tp.col;
    ctx.beginPath();
    ctx.moveTo(bx + w * 0.2, by + h * 0.22);
    ctx.bezierCurveTo(bx + w * 0.2, by + h * 0.05, bx + w * 0.8, by + h * 0.05, bx + w * 0.8, by + h * 0.22);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawIngredientButtons(ctx) {
  btnRects = [];
  var W = GF.W, S = GF.S;
  // two rows: bases (row 0), toppings (row 1)
  var rowKinds = [
    { kind: 'base', list: BASES },
    { kind: 'topping', list: TOPPINGS }
  ];
  for (var r = 0; r < rowKinds.length; r++) {
    var rk = rowKinds[r];
    var list = rk.list;
    var n = list.length;
    var pad = L.btnPad;
    var gap = L.btnGap;
    var avail = W - pad * 2 - gap * (n - 1);
    var bw = avail / n;
    var bh = L.btnH;
    var rowY = L.btnTop + r * (bh + gap + 6 * S);
    for (var i = 0; i < n; i++) {
      var item = list[i];
      var bx = pad + i * (bw + gap);
      var locked = elapsed < item.unlockAt;
      drawIngredientButton(ctx, bx, rowY, bw, bh, rk.kind, item, locked);
      btnRects.push({ x: bx, y: rowY, w: bw, h: bh, kind: rk.kind, id: item.id, locked: locked });
    }
  }
}

function drawIngredientButton(ctx, x, y, w, h, kind, item, locked) {
  var S = GF.S;
  ctx.save();
  // card
  var topCol, botCol;
  if (kind === 'base') { topCol = item.col; botCol = item.col2; }
  else { topCol = '#fff3e2'; botCol = '#f3dcc0'; }
  if (locked) { topCol = '#cdbfae'; botCol = '#b3a591'; }
  var g = ctx.createLinearGradient(0, y, 0, y + h);
  g.addColorStop(0, topCol); g.addColorStop(1, botCol);
  ctx.fillStyle = g;
  ctx.shadowColor = 'rgba(120,70,30,0.30)'; ctx.shadowBlur = 5 * S; ctx.shadowOffsetY = 2 * S;
  GF.rr(ctx, x, y, w, h, GF.clamp(12 * S, 8, 16)); ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  // top gloss
  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  GF.rr(ctx, x + 3, y + 3, w - 6, h * 0.34, GF.clamp(8 * S, 5, 12)); ctx.fill();

  // icon
  var icx = x + w / 2, icy = y + h * 0.40;
  if (locked) {
    ctx.fillStyle = 'rgba(60,40,30,0.5)';
    ctx.font = (h * 0.34) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🔒', icx, icy);
  } else if (kind === 'base') {
    drawMiniCup(ctx, icx, icy, h * 0.22, item);
  } else {
    drawToppingIcon(ctx, icx, icy, h * 0.26, item);
  }
  // label
  ctx.fillStyle = locked ? 'rgba(50,35,25,0.7)' : '#4a3520';
  ctx.font = 'bold ' + GF.clamp(11 * S, 8, 14) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  var label = locked ? GF.t('locked') : GF.t(item.key);
  ctx.fillText(label, icx, y + h - 4 * S);
  ctx.restore();
}

// ── HUD ────────────────────────────────────────────────────────────────────
var helpRect = null;
function drawHUD(ctx) {
  var W = GF.W, S = GF.S;
  var fs = GF.clamp(17 * S, 13, 24);
  // coins top-left
  ctx.font = 'bold ' + fs + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  GF.rr(ctx, 8 * S, 8 * S, ctx.measureText('🪙 ' + coins).width + 20 * S, fs + 12 * S, 10 * S);
  ctx.fillStyle = '#7a4a20'; ctx.fill ? 0 : 0;
  ctx.fillStyle = '#7a4a20';
  ctx.fillText('🪙 ' + coins, 18 * S, 14 * S);

  // strikes top-right (cups; lost ones greyed) — lose signal
  var sx = W - 12 * S;
  var cupR = GF.clamp(11 * S, 8, 15);
  ctx.textAlign = 'right';
  for (var i = 0; i < STRIKES_TO_LOSE; i++) {
    var lost = i < strikes;
    var cxp = sx - i * (cupR * 2 + 6 * S) - cupR;
    var cyp = 16 * S + cupR;
    ctx.globalAlpha = lost ? 0.28 : 1;
    ctx.font = (cupR * 2.1) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(lost ? '💔' : '❤️', cxp, cyp);
  }
  ctx.globalAlpha = 1;

  // "?" help button (under strikes, top-right)
  var hr = GF.clamp(15 * S, 12, 20);
  var hx = W - hr - 12 * S, hy = 16 * S + cupR * 2 + hr + 6 * S;
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(hx, hy, hr, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#7a4a20';
  ctx.font = 'bold ' + (hr * 1.3) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('?', hx, hy + hr * 0.05);
  helpRect = { x: hx - hr * 1.5, y: hy - hr * 1.5, w: hr * 3, h: hr * 3 };

  // next-goal banner (just under queue) + combo pill
  var by = L.queueBottom + 30 * S;
  var bannerTxt = GF.t('next') + ' ' + nextMilestone + '  (' + customersServed + ')';
  ctx.font = 'bold ' + GF.clamp(13 * S, 10, 18) + 'px sans-serif';
  var bwid = ctx.measureText(bannerTxt).width + 22 * S;
  ctx.fillStyle = 'rgba(122,74,32,0.85)';
  GF.rr(ctx, GF.cx - bwid / 2, by, bwid, GF.clamp(22 * S, 17, 28), 11 * S); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(bannerTxt, GF.cx, by + GF.clamp(11 * S, 8, 14));

  // combo pill
  if (combo >= 2) {
    var ptxt = GF.t('combo') + ' x' + combo;
    ctx.font = 'bold ' + GF.clamp(14 * S, 11, 19) + 'px sans-serif';
    var pw = ctx.measureText(ptxt).width + 18 * S;
    var pulse = 1 + 0.06 * Math.sin(elapsed * 10);
    ctx.save();
    ctx.translate(GF.cx, by - 16 * S);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#ff8ad4';
    GF.rr(ctx, -pw / 2, -11 * S, pw, 22 * S, 11 * S); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ptxt, 0, 0);
    ctx.restore();
  }
}

// ── SHOP (between-rush upgrade strip) ──────────────────────────────────────
var shopCardRects = [];
var shopContRect = null;
function drawShop(ctx) {
  var W = GF.W, H = GF.H, S = GF.S;
  shopCardRects = [];
  // dim
  ctx.fillStyle = 'rgba(40,24,14,0.78)';
  ctx.fillRect(0, 0, W, H);
  // title
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(26 * S, 18, 38) + 'px sans-serif';
  ctx.fillText(GF.t('shop'), GF.cx, H * 0.10);
  ctx.font = 'bold ' + GF.clamp(15 * S, 11, 20) + 'px sans-serif';
  ctx.fillStyle = '#ffd24a';
  ctx.fillText('🪙 ' + coins, GF.cx, H * 0.10 + GF.clamp(26 * S, 18, 36));

  // cards in a vertical list (thumb-reachable)
  var n = SHOP_CARDS.length;
  var cardH = GF.clamp(58 * S, 44, 78);
  var gap = GF.clamp(9 * S, 6, 14);
  var listTop = H * 0.18;
  var cardW = Math.min(W * 0.9, 420 * S);
  var cx0 = GF.cx - cardW / 2;
  for (var i = 0; i < n; i++) {
    var card = SHOP_CARDS[i];
    var y = listTop + i * (cardH + gap);
    drawShopCard(ctx, card, cx0, y, cardW, cardH);
    shopCardRects.push({ x: cx0, y: y, w: cardW, h: cardH, card: card });
  }
  // continue button (bottom thumb zone, within the safe sweep band)
  var bw = Math.min(W * 0.7, 300 * S), bh = GF.clamp(54 * S, 42, 66);
  var bx = GF.cx - bw / 2, byy = Math.min(H - bh - GF.clamp(24 * S, 16, 40), H * 0.86 - bh / 2);
  var g = ctx.createLinearGradient(bx, byy, bx, byy + bh);
  g.addColorStop(0, '#4caf50'); g.addColorStop(1, '#2e8b3d');
  ctx.fillStyle = g; GF.rr(ctx, bx, byy, bw, bh, bh / 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + GF.clamp(18 * S, 14, 24) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(GF.t('cont'), GF.cx, byy + bh / 2);
  shopContRect = { x: bx, y: byy, w: bw, h: bh };
}

function drawShopCard(ctx, card, x, y, w, h) {
  var S = GF.S;
  var lvl = up[card.id];
  var maxed = lvl >= card.max;
  var cost = upCost(card);
  var afford = coins >= cost && !maxed;
  ctx.save();
  ctx.fillStyle = maxed ? 'rgba(255,255,255,0.16)' : (afford ? '#fff8ee' : 'rgba(255,255,255,0.5)');
  GF.rr(ctx, x, y, w, h, GF.clamp(12 * S, 8, 16)); ctx.fill();
  // name + desc
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = maxed ? '#fff' : '#4a3520';
  ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  ctx.fillText(GF.t(card.nameKey) + '  ' + 'Lv' + lvl + '/' + card.max, x + 14 * S, y + h * 0.18);
  ctx.fillStyle = maxed ? 'rgba(255,255,255,0.8)' : '#7a5a3a';
  ctx.font = GF.clamp(11 * S, 9, 15) + 'px sans-serif';
  ctx.fillText(GF.t(card.descKey), x + 14 * S, y + h * 0.56);
  // buy chip (right)
  var chipW = GF.clamp(78 * S, 60, 110), chipH = h * 0.56;
  var chipX = x + w - chipW - 12 * S, chipY = y + (h - chipH) / 2;
  ctx.fillStyle = maxed ? '#888' : (afford ? '#ffb300' : '#cbb89a');
  GF.rr(ctx, chipX, chipY, chipW, chipH, chipH / 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(13 * S, 10, 17) + 'px sans-serif';
  ctx.fillText(maxed ? GF.t('maxed') : ('🪙' + cost), chipX + chipW / 2, chipY + chipH / 2);
  ctx.restore();
}

// ── TUTORIAL PANEL (menu block + in-play "?" panel) ────────────────────────
function wrapLines(ctx, text, maxW) {
  var words = String(text).split(/\s+/);
  var lines = [], cur = '';
  for (var i = 0; i < words.length; i++) {
    var probe = cur ? cur + ' ' + words[i] : words[i];
    if (ctx.measureText(probe).width > maxW && cur) { lines.push(cur); cur = words[i]; }
    else cur = probe;
  }
  if (cur) lines.push(cur);
  return lines;
}

// Returns total height; if draw=true paints starting at y.
function layoutTutorial(ctx, x, y, maxW, draw) {
  var S = GF.S;
  var lineH = GF.clamp(17 * S, 13, 22);
  var gap = GF.clamp(8 * S, 5, 12);
  var keys = ['tut_goal', 'tut_controls', 'tut_win', 'tut_lose', 'tut_tip'];
  var cols = ['#3a2a1a', '#3a2a1a', '#2e6a3a', '#9a3a2a', '#7a5a20'];
  ctx.font = GF.clamp(13.5 * S, 11, 18) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  var cy = y;
  for (var k = 0; k < keys.length; k++) {
    var lines = wrapLines(ctx, GF.t(keys[k]), maxW);
    if (draw) {
      ctx.fillStyle = cols[k];
      for (var j = 0; j < lines.length; j++) ctx.fillText(lines[j], x, cy + j * lineH);
    }
    cy += lines.length * lineH + gap;
  }
  return cy - y;
}

// in-play "?" panel
var tutBackRect = null;
function drawTutPanel(ctx, isMenu) {
  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(40,24,14,0.86)';
  ctx.fillRect(0, 0, W, H);
  var pad = GF.clamp(22 * S, 14, 34);
  var maxW = Math.min(W - pad * 2, 460 * S);
  var x = GF.cx - maxW / 2;
  // measure to vertically center
  var totalH = layoutTutorial(ctx, x, 0, maxW, false);
  var titleFs = GF.clamp(24 * S, 18, 34);
  var startY = Math.max(H * 0.10, (H - totalH - titleFs * 3) / 2);
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = 'bold ' + titleFs + 'px sans-serif';
  ctx.fillText(GF.t('title'), GF.cx, startY);
  layoutTutorial(ctx, x, startY + titleFs * 1.6, maxW, true);
  // close hint button
  var bw = Math.min(W * 0.6, 260 * S), bh = GF.clamp(48 * S, 38, 60);
  var bx = GF.cx - bw / 2, byy = startY + titleFs * 1.6 + totalH + GF.clamp(14 * S, 8, 22);
  byy = Math.min(byy, H - bh - 16 * S);
  ctx.fillStyle = '#ffb300';
  GF.rr(ctx, bx, byy, bw, bh, bh / 2); ctx.fill();
  ctx.fillStyle = '#4a3520'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + GF.clamp(15 * S, 12, 20) + 'px sans-serif';
  ctx.fillText(GF.t('tut_back'), GF.cx, byy + bh / 2);
  tutBackRect = { x: bx, y: byy, w: bw, h: bh };
}

// ── MENU ───────────────────────────────────────────────────────────────────
var menuPlayRect = null;

  var W = GF.W, H = GF.H, S = GF.S;
  ctx.fillStyle = 'rgba(40,24,14,0.55)';
  ctx.fillRect(0, 0, W, H);

  // big glossy hero cup centerpiece

  } else {

  }

  // PLAY button (bottom thumb zone — kept within H*0.86 so it's both

  var bw = Math.min(W * 0.74, 320 * S), bh = GF.clamp(58 * S, 46, 74);

  if (best > 0) {
    ctx.fillStyle = '#ffe9c9'; ctx.font = GF.clamp(13 * S, 10, 17) + 'px sans-serif';
    ctx.textBaseline = 'bottom';
    ctx.fillText(GF.t('best') + ': ' + best, GF.cx, byy - 8 * S);
  }
}

function drawHeroCup(ctx, x, y, sz) {
  // a big glossy boba cup overflowing with pearls — the hero object
  var w = sz, h = sz * 1.3;
  var bx = x - w / 2, by = y - h / 2;
  ctx.save();
  ctx.shadowColor = 'rgba(120,70,30,0.35)'; ctx.shadowBlur = 18; ctx.shadowOffsetY = 6;
  // cup
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  GF.rr(ctx, bx, by, w, h, w * 0.16); ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  // milk tea fill
  var fg = ctx.createLinearGradient(0, by + h * 0.2, 0, by + h);
  fg.addColorStop(0, '#e7c79a'); fg.addColorStop(1, '#c89a63');
  ctx.fillStyle = fg;
  GF.rr(ctx, bx + 4, by + h * 0.22, w - 8, h * 0.76, w * 0.12); ctx.fill();
  // pearls heap
  ctx.fillStyle = '#3a2a22';
  for (var i = 0; i < 16; i++) {
    var px = bx + w * (0.18 + (i % 5) * 0.16);
    var py = by + h * 0.84 - ((i / 5) | 0) * w * 0.13;
    ctx.beginPath(); ctx.arc(px, py, w * 0.07, 0, 6.28); ctx.fill();
  }
  // overflowing pearls on top
  ctx.fillStyle = '#4a342a';
  for (var k = 0; k < 6; k++) {
    var ox = x + (k - 2.5) * w * 0.14;
    var oy = by - w * 0.02 + Math.sin(k) * w * 0.04;
    ctx.beginPath(); ctx.arc(ox, oy, w * 0.066, 0, 6.28); ctx.fill();
  }
  // gloss
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  GF.rr(ctx, bx + w * 0.14, by + h * 0.10, w * 0.16, h * 0.7, w * 0.08); ctx.fill();
  // dome + straw
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.beginPath(); ctx.ellipse(x, by, w * 0.54, h * 0.10, 0, Math.PI, 0); ctx.fill();
  ctx.strokeStyle = '#ff8ad4'; ctx.lineWidth = w * 0.10; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x + w * 0.18, by - h * 0.2); ctx.lineTo(x - w * 0.06, by + h * 0.55); ctx.stroke();
  // outline
  ctx.strokeStyle = '#caa06a'; ctx.lineWidth = 3;
  GF.rr(ctx, bx, by, w, h, w * 0.16); ctx.stroke();
  // sparkle coins
  ctx.font = (w * 0.22) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('✨', x - w * 0.7, y - h * 0.2);
  ctx.fillText('🪙', x + w * 0.72, y + h * 0.05);
  ctx.restore();
}

// ════════════════════════════════════════════════════════════════════════
// INPUT — single tap handler, routed by state
// ════════════════════════════════════════════════════════════════════════
function hit(rect, x, y) {
  return rect && x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
}

function onPress(x, y) {
  if (gs === 'MENU') {
    if (hit(menuPlayRect, x, y)) {
      if (!seenTutorial) { seenTutorial = true; try { localStorage.setItem('boba_rush_seen_tutorial', '1'); } catch (e) {} }
      startGame();
    }
    return;
  }
  if (gs === 'GAMEOVER') {
    if (hit(goRetryRect, x, y)) startGame();
    return;
  }
  if (gs === 'SHOP') {
    if (hit(shopContRect, x, y)) { closeShop(); return; }
    for (var i = 0; i < shopCardRects.length; i++) {
      if (hit(shopCardRects[i], x, y)) { applyUpgrade(shopCardRects[i].card); return; }
    }
    return;
  }
  // PLAYING
  if (showTut) {
    if (hit(tutBackRect, x, y)) showTut = false;
    else showTut = false; // any tap closes
    return;
  }
  // "?" help
  if (hit(helpRect, x, y)) { showTut = true; return; }
  // trash cup
  if (hit(trashRect, x, y)) { trashCup(); return; }
  // ingredient buttons
  for (var b = 0; b < btnRects.length; b++) {
    var r = btnRects[b];
    if (hit(r, x, y)) {
      if (r.locked) {
        // show hint of when it unlocks
        var item = r.kind === 'base' ? baseById(r.id) : topById(r.id);
        var secs = Math.max(0, Math.ceil(item.unlockAt - elapsed));
        GF.spawnFloat(r.x + r.w / 2, r.y - 6 * GF.S, GF.t('locked') + ' ' + secs + 's', '#fff');
        beep(200, 0.06, 0, 'sawtooth');
      } else if (r.kind === 'base') addBase(r.id);
      else addTopping(r.id);
      return;
    }
  }
  // customers (serve) — tap test against each, larger hitbox
  for (var c = 0; c < queue.length; c++) {
    var cu = queue[c];
    if (cu.sx == null || cu.leaving > 0 || cu.angry > 0) continue;
    var cw = GF.clamp(70 * GF.S, 44, 96);
    var hb = cu.slotW ? Math.min(cu.slotW * 0.5, cw * 0.9) : cw * 0.8;
    var dx = x - cu.sx, dy = y - cu.sy;
    if (Math.abs(dx) <= hb && dy >= -cw * 1.2 && dy <= cw * 0.9) {
      serveCustomer(cu);
      return;
    }
  }
}

// wire pointer events (mouse + touch) — gf-lib has its own button system but
// we want full-canvas tap routing, so listen directly.
function canvasPos(e) {
  var rect = GF.canvas.getBoundingClientRect();
  var cxp, cyp;
  if (e.changedTouches && e.changedTouches.length) {
    cxp = e.changedTouches[0].clientX; cyp = e.changedTouches[0].clientY;
  } else { cxp = e.clientX; cyp = e.clientY; }
  return { x: cxp - rect.left, y: cyp - rect.top };
}
GF.canvas.addEventListener('mousedown', function(e) { var p = canvasPos(e); onPress(p.x, p.y); });
GF.canvas.addEventListener('touchstart', function(e) {
  if (e.cancelable) e.preventDefault();
  var p = canvasPos(e); onPress(p.x, p.y);
}, { passive: false });

// ── SOUND (procedural Web Audio, no asset files) ───────────────────────────
var actx = null, muted = false;
function audioCtx() {
  if (!actx) {
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { actx = null; }
  }
  return actx;
}
function beep(freq, dur, delay, type) {
  if (muted) return;
  var a = audioCtx();
  if (!a) return;
  try {
    if (a.state === 'suspended') a.resume();
    var t0 = a.currentTime + (delay || 0);
    var osc = a.createOscillator();
    var gain = a.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.16, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain); gain.connect(a.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  } catch (e) {}
}
// tiny sprite-pop helper (visual only)
function spritePop(x, y) { GF.spawnParticles(x, y - 10 * GF.S, '#fff', 4); }

// ── BOOT ───────────────────────────────────────────────────────────────────
GF.init({
  designW: 480,
  designH: 854,
  strings: STRINGS,
  sprites: SPRITE_NAMES,
  saveKey: 'boba_rush',
  onReady: function() {
    try { best = parseInt(localStorage.getItem('boba_rush_best') || '0') || 0; } catch (e) {}
    try { seenTutorial = localStorage.getItem('boba_rush_seen_tutorial') === '1'; } catch (e) {}

    // Yandex 1.9 — persist a run across reload.
    GF.persist('boba_rush_run_v1',
      function() {
        if (gs !== 'PLAYING' && gs !== 'SHOP') return null;
        return {
          gs: gs, coins: coins, customersServed: customersServed, strikes: strikes,
          combo: combo, elapsed: elapsed, nextMilestone: nextMilestone, heat: heat,
          maxQueue: maxQueue, servesSinceShop: servesSinceShop, up: up,
          currentCup: currentCup,
          queue: queue.map(function(c) {
            return { id: c.id, order: c.order, patience: c.patience, patMax: c.patMax,
              vip: c.vip, hue: c.hue, phase: c.phase, born: c.born };
          })
        };
      },
      function(s) {
        if (!s) return;
        gs = s.gs || 'MENU';
        coins = s.coins || 0; customersServed = s.customersServed || 0;
        strikes = s.strikes || 0; combo = s.combo || 0; elapsed = s.elapsed || 0;
        nextMilestone = s.nextMilestone || 10; heat = s.heat || 0;
        maxQueue = s.maxQueue || MAX_QUEUE; servesSinceShop = s.servesSinceShop || 0;
        if (s.up) up = s.up;
        if (s.currentCup) currentCup = s.currentCup;
        if (s.queue) {
          queue = s.queue.map(function(c) {
            return { id: c.id, order: c.order, patience: c.patience, patMax: c.patMax || BASE_PATIENCE,
              vip: c.vip, hue: c.hue || '#ff9aa2', phase: c.phase || 0,
              leaving: 0, angry: 0, bounce: 0, born: c.born || 0 };
          });
        }
        prevBaseCount = unlockedBases().length;
        prevTopCount = unlockedToppings().length;
        spawnTimer = 1.0;
      }
    );
  },
  onUpdate: update,
  onDraw: draw
});

// ── STATE EXPOSURE (post-build-tester gate) ────────────────────────────────
GF.exposeState(function() {
  return {
    gs: gs,
    coins: coins,
    best: best,
    customersServed: customersServed,
    strikes: strikes,
    combo: combo,
    elapsed: Math.round(elapsed),
    queueLen: queue.length,
    maxQueue: maxQueue,
    nextMilestone: nextMilestone,
    heat: +heat.toFixed(2),
    flavorsUnlocked: unlockedBases().length,
    toppingsUnlocked: unlockedToppings().length,
    upgrades: up,
    score: score()
  };
});

})();
</script>
