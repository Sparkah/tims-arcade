<!DOCTYPE html>
<html lang="en" data-theme="lab">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Sign in — Tim's Game Lab</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <meta name="theme-color" content="#0e0e12">

  <script>
    (function () {
      try {
        var t = localStorage.getItem('gallery-theme');
        if (t === 'lab' || t === 'brutalist' || t === 'editorial') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/style.css?v=f9ffd51e">
  <style>
    body { background: var(--bg); color: var(--ink); font-family: var(--font-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login {
      max-width: 380px; width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      padding: 32px 28px;
    }
    html[data-theme="brutalist"] .login { border-width: 2px; border-radius: 0; box-shadow: 8px 8px 0 var(--accent); }
    .login h1 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 26px;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      color: var(--ink);
    }
    html[data-theme="editorial"] .login h1 { font-style: italic; }
    html[data-theme="brutalist"] .login h1 { text-transform: uppercase; }
    .login p.sub {
      font-size: 14px;
      color: var(--ink-soft);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .login input[type=email] {
      width: 100%;
      padding: 11px 14px;
      font-family: var(--font-mono);
      font-size: 13px;
      background: var(--bg);
      border: 1px solid var(--rule);
      color: var(--ink);
      border-radius: var(--radius);
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    html[data-theme="brutalist"] .login input[type=email] { border-width: 2px; border-radius: 0; }
    .login input[type=email]:focus { border-color: var(--accent); }
    .login button.primary {
      width: 100%;
      padding: 11px;
      background: var(--ink);
      color: var(--bg-card);
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }
    .login button.primary:hover { background: var(--accent); }
    .login button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    html[data-theme="brutalist"] .login button.primary { background: var(--accent); color: var(--bg); border: 2px solid var(--ink); border-radius: 0; font-weight: 700; }
    html[data-theme="brutalist"] .login button.primary:hover { background: var(--ink); color: var(--accent); }

    .login .err {
      background: rgba(200,69,31,0.08);
      border: 1px solid var(--warn);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 13px;
      color: var(--warn);
      margin-bottom: 14px;
    }
    .login .ok {
      background: var(--accent-soft);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 14px;
      color: var(--accent);
      line-height: 1.5;
    }
    .login a.back {
      display: block;
      text-align: center;
      font-size: 13px;
      color: var(--ink-muted);
      margin-top: 18px;
      text-decoration: none;
    }
    .login a.back:hover { color: var(--ink); }
  </style>
</head>
<body>
  <div class="login">
    <h1>Sign in</h1>
    <p class="sub">We'll email you a one-time link. No password — your inbox is the password.</p>

    <div id="err" class="err" style="display:none"></div>
    <div id="form-wrap">
      <form id="login-form">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        <button type="submit" class="primary" id="submit-btn">Send sign-in link</button>
      </form>
    </div>
    <div id="ok" class="ok" style="display:none">
      Check your inbox.<br><span style="font-size:12px;opacity:0.85;display:block;margin-top:6px">The link works once and expires in 15 minutes.</span>
    </div>

    <a class="back" href="/">← back to gallery</a>
  </div>

  <script src="/posthog-init"></script>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('err')) {
      const errMap = {
        bad_token: 'That link looks malformed.',
        expired: 'That link expired or was already used. Try again.',
      };
      const e = document.getElementById('err');
      e.textContent = errMap[params.get('err')] || 'Sign-in failed.';
      e.style.display = 'block';
    }

    document.getElementById('login-form').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return;
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      if (window.posthog) posthog.capture('login_form_submitted');
      try {
        const r = await fetch('/api/auth/request', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        if (r.status === 204 || r.ok) {
          if (window.posthog) posthog.capture('login_link_sent');
          document.getElementById('form-wrap').style.display = 'none';
          document.getElementById('ok').style.display = 'block';
          // Dev-mode payload (only visible if AUTH_DEV_MODE=1 in CF env)
          try {
            const j = await r.json();
            if (j && j.devMagicLink) {
              const ok = document.getElementById('ok');
              ok.innerHTML += '<div style="margin-top:14px;font-size:11px;font-family:monospace;word-break:break-all;background:rgba(0,0,0,0.04);padding:8px;border-radius:4px"><strong>DEV mode:</strong><br><a href="' + j.devMagicLink + '">' + j.devMagicLink + '</a></div>';
            }
          } catch (e) { /* not JSON / 204 — fine */ }
        } else if (r.status === 429) {
          const e = document.getElementById('err');
          e.textContent = 'Too many sign-in requests. Wait a few minutes.';
          e.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Send sign-in link';
        } else {
          throw new Error('http ' + r.status);
        }
      } catch (e) {
        const errEl = document.getElementById('err');
        errEl.textContent = 'Couldn\'t send link. Try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send sign-in link';
      }
    });
  </script>
</body>
</html>
