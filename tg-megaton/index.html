<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#031009">
<title>Megaton</title>
<meta name="description" content="Drop one warhead, level the city, tune your nuke, and buy optional boosts with Telegram Stars.">
<meta property="og:image" content="https://game-factory.tech/tg-megaton/cover.png">
<script src="https://telegram.org/js/telegram-web-app.js?62"></script>
<script src="./config.js"></script>
<style>
  :root {
    color-scheme: dark;
    --bg: #031009;
    --panel: rgba(3, 18, 10, .94);
    --panel-2: rgba(7, 36, 20, .96);
    --line: rgba(84, 255, 150, .24);
    --text: #effff5;
    --muted: #9ac4aa;
    --green: #54ff96;
    --amber: #ffd24a;
    --red: #ff6a4a;
    --ink: #02120a;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    letter-spacing: 0;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }

  button {
    font: inherit;
    color: inherit;
    border: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #app, #game {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #game {
    border: 0;
    display: block;
    background: #031009;
  }

  .shop-fab {
    position: fixed;
    left: calc(10px + env(safe-area-inset-left));
    bottom: calc(10px + env(safe-area-inset-bottom));
    z-index: 8;
    min-width: 82px;
    min-height: 42px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: rgba(2, 18, 10, .84);
    color: var(--green);
    font-weight: 900;
    font-size: 13px;
    box-shadow: 0 10px 28px rgba(0, 0, 0, .32), inset 0 0 18px rgba(84, 255, 150, .08);
    backdrop-filter: blur(12px);
  }

  .shop-fab:active, .wide:active, .buy:active { transform: translateY(1px) scale(.985); }

  .screen {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: grid;
    place-items: center;
    padding: calc(16px + env(safe-area-inset-top)) 14px calc(16px + env(safe-area-inset-bottom));
    background: rgba(1, 8, 4, .74);
    backdrop-filter: blur(8px);
  }

  .screen[hidden] { display: none; }

  .panel {
    width: min(100%, 480px);
    max-height: min(760px, 94dvh);
    overflow: auto;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    box-shadow: 0 24px 80px rgba(0, 0, 0, .48), inset 0 0 40px rgba(84, 255, 150, .05);
    padding: 16px;
  }

  .head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  h1, h2, h3, p { margin: 0; }
  h1 {
    font-size: clamp(28px, 9vw, 48px);
    line-height: .95;
    letter-spacing: 0;
    text-transform: uppercase;
    color: var(--green);
  }

  .tag {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 0 10px;
    border: 1px solid rgba(255, 210, 74, .5);
    border-radius: 999px;
    color: var(--amber);
    font-size: 12px;
    font-weight: 850;
    white-space: nowrap;
  }

  .lede {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.42;
    margin-bottom: 14px;
  }

  .shop-list {
    display: grid;
    gap: 9px;
  }

  .shop-item {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    min-height: 74px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 255, 255, .045);
    padding: 11px;
  }

  .shop-item h3 {
    color: var(--text);
    font-size: 15px;
    line-height: 1.12;
  }

  .shop-item p {
    margin-top: 5px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.28;
  }

  .buy {
    min-width: 92px;
    min-height: 44px;
    border-radius: 8px;
    background: var(--amber);
    color: var(--ink);
    font-weight: 900;
    font-size: 13px;
  }

  .wide {
    width: 100%;
    min-height: 50px;
    margin-top: 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: rgba(84, 255, 150, .13);
    color: var(--green);
    font-weight: 900;
  }

  .fine {
    margin-top: 10px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
  }

  .fine a { color: var(--green); }

  #toast {
    position: fixed;
    left: 50%;
    bottom: calc(62px + env(safe-area-inset-bottom));
    z-index: 40;
    max-width: min(420px, calc(100% - 28px));
    transform: translateX(-50%);
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(1, 10, 5, .92);
    color: var(--text);
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.3;
    box-shadow: 0 16px 36px rgba(0, 0, 0, .4);
  }

  #toast[hidden] { display: none; }
</style>
</head>
<body>
<div id="app">
  <iframe id="game" src="./game/index.html?tg=1" allow="autoplay; fullscreen; gamepad"></iframe>
  <button class="shop-fab" type="button" id="shopBtn">SHOP</button>
</div>

<section class="screen" id="shopScreen" hidden>
  <div class="panel">
    <div class="head">
      <div>
        <h1>Megaton</h1>
        <p class="lede">Use Telegram Stars for optional caps and warhead tuning. Purchases apply immediately to this device.</p>
      </div>
      <span class="tag">Stars</span>
    </div>
    <div class="shop-list" id="shopList"></div>
    <button class="wide" type="button" id="closeShopBtn">Close</button>
    <p class="fine">Digital items are optional. <a href="./terms.html" target="_blank" rel="noopener">Terms</a></p>
  </div>
</section>

<div id="toast" hidden></div>

<script>
(function () {
  'use strict';
  var tg = window.Telegram && window.Telegram.WebApp;
  var HAS_TG = Boolean(tg && tg.initData);
  var game = document.getElementById('game');
  var shopScreen = document.getElementById('shopScreen');
  var shopList = document.getElementById('shopList');
  var toastEl = document.getElementById('toast');
  var toastTimer = 0;

  var PRODUCTS = {
    starter: {
      title: 'Starter Cache',
      desc: '1500 caps, Yield level 2, and +1 Luck.',
      stars: 25
    },
    caps_pack: {
      title: 'Caps Pack',
      desc: '5000 caps for the next upgrade wall.',
      stars: 49
    },
    warhead_tuning: {
      title: 'Warhead Tuning',
      desc: '+4 Yield, +2 Luck, and 1200 caps.',
      stars: 75
    },
    mirv_kit: {
      title: 'MIRV Kit',
      desc: '+1 MIRV, +2 Penetrator, +2 Flares, and 1800 caps.',
      stars: 99
    }
  };

  if (tg) {
    try {
      tg.ready();
      tg.expand();
      if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
      if (tg.setHeaderColor) tg.setHeaderColor('#031009');
      if (tg.setBackgroundColor) tg.setBackgroundColor('#031009');
    } catch (e) {}
  }

  function toast(msg, ms) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.hidden = false;
    toastTimer = setTimeout(function () { toastEl.hidden = true; }, ms || 2600);
  }

  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, function (ch) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
    });
  }

  function renderShop() {
    shopList.innerHTML = Object.keys(PRODUCTS).map(function (id) {
      var p = PRODUCTS[id];
      return '<div class="shop-item">' +
        '<div><h3>' + esc(p.title) + '</h3><p>' + esc(p.desc) + '</p></div>' +
        '<button class="buy" type="button" data-product="' + esc(id) + '">' + p.stars + ' Stars</button>' +
      '</div>';
    }).join('');
    Array.prototype.forEach.call(shopList.querySelectorAll('button[data-product]'), function (btn) {
      btn.addEventListener('click', function () { buyProduct(btn.getAttribute('data-product')); });
    });
  }

  function openShop() {
    renderShop();
    shopScreen.hidden = false;
  }

  function closeShop() {
    shopScreen.hidden = true;
  }

  async function buyProduct(id) {
    var product = PRODUCTS[id];
    if (!product) return;
    if (!HAS_TG) {
      toast('Open Megaton in Telegram to buy with Stars.');
      return;
    }
    try {
      toast('Opening Telegram Stars invoice...', 2200);
      var res = await fetch('/api/tg-invoice', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          game: 'megaton',
          productId: id,
          initData: tg.initData
        })
      });
      var data = await res.json().catch(function () { return {}; });
      if (!res.ok || !data.invoiceLink) throw new Error(data.error || 'invoice_failed');
      tg.openInvoice(data.invoiceLink, function (status) {
        if (status === 'paid') {
          // Fulfillment contract: the bot records the shared
          // megaton:<product>:... receipt payload, while this open Mini App
          // applies the purchased item immediately on the paid callback.
          applyProduct(id);
          toast('Purchase applied: ' + product.title);
          closeShop();
        } else if (status === 'cancelled') {
          toast('Invoice cancelled');
        } else {
          toast('Invoice status: ' + status);
        }
      });
    } catch (e) {
      toast('Payment setup failed: ' + e.message);
    }
  }

  function applyProduct(id) {
    var cw = game.contentWindow;
    try {
      if (cw && typeof cw.__tgApplyMegatonProduct === 'function' && cw.__tgApplyMegatonProduct(id)) return;
    } catch (e) {}
    try {
      var raw = localStorage.getItem('megaton_v5');
      var save = raw ? JSON.parse(raw) : {};
      if (id === 'starter') {
        save.money = Math.max(Number(save.money || 0) + 1500, 1500);
        save.powerLvl = Math.max(Number(save.powerLvl || 0), 2);
        save.luckLvl = Number(save.luckLvl || 0) + 1;
      } else if (id === 'caps_pack') {
        save.money = Number(save.money || 0) + 5000;
      } else if (id === 'warhead_tuning') {
        save.money = Number(save.money || 0) + 1200;
        save.powerLvl = Number(save.powerLvl || 0) + 4;
        save.luckLvl = Number(save.luckLvl || 0) + 2;
      } else if (id === 'mirv_kit') {
        save.money = Number(save.money || 0) + 1800;
        save.mirvLvl = Number(save.mirvLvl || 0) + 1;
        save.penLvl = Number(save.penLvl || 0) + 2;
        save.flareLvl = Number(save.flareLvl || 0) + 2;
      }
      save.tutDone = true;
      save.upgDone = true;
      save.tutStep = 4;
      localStorage.setItem('megaton_v5', JSON.stringify(save));
      game.contentWindow.location.reload();
    } catch (e) {}
  }

  document.getElementById('shopBtn').addEventListener('click', openShop);
  document.getElementById('closeShopBtn').addEventListener('click', closeShop);

  window.render_game_to_text = function () {
    try {
      var cw = game.contentWindow;
      if (cw && typeof cw.render_game_to_text === 'function') return cw.render_game_to_text();
    } catch (e) {}
    return JSON.stringify({ game: 'Megaton', screen: shopScreen.hidden ? 'game' : 'shop', telegram: HAS_TG });
  };

  window.advanceTime = function (ms) {
    try {
      var cw = game.contentWindow;
      if (cw && typeof cw.advanceTime === 'function') return cw.advanceTime(ms);
    } catch (e) {}
    return window.render_game_to_text();
  };
})();
</script>
</body>
</html>
