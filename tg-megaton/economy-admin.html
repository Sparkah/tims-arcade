<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Megaton Economy Admin</title>
<script src="./data/economy-missions.js"></script>
<style>
  :root { color-scheme: dark; --bg:#031009; --panel:#071b10; --line:rgba(84,255,150,.24); --text:#effff5; --muted:#9ac4aa; --green:#54ff96; --amber:#ffd24a; --red:#ff6a4a; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
  main { width:min(1060px,100%); margin:0 auto; padding:22px 16px 48px; }
  h1 { margin:0; color:var(--green); font-size:32px; line-height:1; text-transform:uppercase; }
  p { color:var(--muted); line-height:1.45; }
  a { color:var(--green); }
  .grid { display:grid; grid-template-columns:minmax(0,1fr) 280px; gap:14px; align-items:start; }
  .panel { border:1px solid var(--line); border-radius:8px; background:linear-gradient(180deg,rgba(10,48,31,.92),rgba(3,18,10,.96)); padding:14px; }
  textarea { width:100%; min-height:620px; resize:vertical; border:1px solid var(--line); border-radius:8px; background:#020b06; color:var(--text); padding:12px; font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  button { width:100%; min-height:42px; margin-top:8px; border:0; border-radius:8px; background:var(--green); color:#02120a; font-weight:900; cursor:pointer; }
  button.secondary { background:rgba(255,255,255,.08); color:var(--text); box-shadow:inset 0 0 0 1px var(--line); }
  button.warn { background:var(--amber); }
  button.danger { background:var(--red); color:#170402; }
  code { color:var(--amber); }
  .status { min-height:34px; margin-top:10px; color:var(--amber); font-size:13px; }
  .links { display:grid; gap:6px; margin-top:10px; font-size:13px; }
  .preview { margin-top:10px; display:grid; gap:8px; }
  .row { display:grid; grid-template-columns:1fr auto; gap:10px; border-radius:8px; background:rgba(255,255,255,.05); padding:8px; font-size:12px; }
  .row span { color:var(--muted); }
  @media (max-width: 820px) { .grid { grid-template-columns:1fr; } textarea { min-height:480px; } }
</style>
</head>
<body>
<main>
  <h1>Megaton Economy Admin</h1>
  <p>Local-only override editor for crate odds, weekly rewards, duplicate sell multipliers, and Telegram missions. Save here, then reload <a href="./" target="_blank" rel="noopener">Megaton</a> on localhost to test.</p>
  <div class="grid">
    <section class="panel">
      <textarea id="json"></textarea>
    </section>
    <aside class="panel">
      <button id="save">Save local override</button>
      <button class="secondary" id="reload">Reload default file</button>
      <button class="warn" id="copy">Copy JSON</button>
      <button class="danger" id="reset">Clear local override</button>
      <div class="status" id="status"></div>
      <p>Storage key: <code>megaton_economy_override</code></p>
      <div class="links">
        <a href="./data/sheet_template/chests.csv" target="_blank" rel="noopener">Chests CSV</a>
        <a href="./data/sheet_template/missions.csv" target="_blank" rel="noopener">Missions CSV</a>
        <a href="./data/sheet_template/weekly_rewards.csv" target="_blank" rel="noopener">Weekly rewards CSV</a>
        <a href="./data/sheet_template/duplicate_sell.csv" target="_blank" rel="noopener">Duplicate sell CSV</a>
      </div>
      <div class="preview" id="preview"></div>
    </aside>
  </div>
</main>
<script>
(function () {
  var LOCAL = /^(localhost|127\.0\.0\.1|0\.0\.0\.0)$/.test(location.hostname) || location.protocol === 'file:';
  var KEY = 'megaton_economy_override';
  var input = document.getElementById('json');
  var status = document.getElementById('status');
  var preview = document.getElementById('preview');

  function pretty(obj) {
    return JSON.stringify(obj || {}, null, 2);
  }

  function readCurrent() {
    if (LOCAL) {
      try {
        var raw = localStorage.getItem(KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
    }
    return window.MEGATON_ECONOMY_CONFIG || {};
  }

  function parseInput() {
    var obj = JSON.parse(input.value);
    if (!obj || typeof obj !== 'object' || Array.isArray(obj)) throw new Error('Root must be an object.');
    return obj;
  }

  function renderPreview(obj) {
    preview.textContent = '';
    var rows = [
      ['Drop tables', Object.keys(obj.dropTables || {}).join(', ')],
      ['Boxes', Object.keys(obj.boxes || {}).length],
      ['Missions', (obj.missions || []).length],
      ['Weekly reward rows', (obj.weeklyRewards || []).length]
    ];
    rows.forEach(function (row) {
      var el = document.createElement('div');
      el.className = 'row';
      el.innerHTML = '<strong></strong><span></span>';
      el.children[0].textContent = row[0];
      el.children[1].textContent = row[1];
      preview.appendChild(el);
    });
  }

  function load(obj, message) {
    input.value = pretty(obj);
    renderPreview(obj);
    status.textContent = message || '';
  }

  document.getElementById('save').addEventListener('click', function () {
    if (!LOCAL) {
      status.textContent = 'Save is disabled outside localhost.';
      return;
    }
    try {
      var obj = parseInput();
      localStorage.setItem(KEY, pretty(obj));
      renderPreview(obj);
      status.textContent = 'Saved. Reload the game tab to apply.';
    } catch (e) {
      status.textContent = 'Invalid JSON: ' + e.message;
    }
  });
  document.getElementById('reload').addEventListener('click', function () {
    load(window.MEGATON_ECONOMY_CONFIG || {}, 'Reloaded default file.');
  });
  document.getElementById('copy').addEventListener('click', function () {
    navigator.clipboard.writeText(input.value).then(function () {
      status.textContent = 'Copied JSON.';
    }, function () {
      status.textContent = 'Clipboard unavailable.';
    });
  });
  document.getElementById('reset').addEventListener('click', function () {
    if (LOCAL) localStorage.removeItem(KEY);
    load(window.MEGATON_ECONOMY_CONFIG || {}, 'Local override cleared.');
  });

  load(readCurrent(), LOCAL ? 'Editing local override.' : 'Read-only outside localhost.');
})();
</script>
</body>
</html>
