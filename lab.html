<!DOCTYPE html>
<html lang="en" data-theme="lab">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis — Tim's Game Lab</title>
  <meta name="description" content="How this game's idea was born. Source signals, synthesizer reasoning, alternatives considered, what got built.">
  <link rel="stylesheet" href="/style.css?v=4a0fe678">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    /* Genesis page — long-form idea-origin story per game. Drops technical
       artefacts (DESIGN, runtime gate) entirely; AI builds those daily,
       they're not the interesting story. The interesting story is where
       the idea came from + why the synthesizer chose it. */
    .lab-page { max-width: 760px; margin: 0 auto; padding: 32px 24px 80px; }
    .lab-back {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: var(--tracking-cap);
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
      margin-bottom: 24px;
    }
    .lab-back:hover { color: var(--ink); }
    .lab-eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .lab-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 42px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
    }
    .lab-hook {
      color: var(--ink-soft);
      font-size: 17px;
      line-height: 1.5;
      max-width: 60ch;
      margin: 0 0 28px;
    }
    .lab-cover {
      width: 100%;
      max-width: 520px;
      aspect-ratio: 800 / 470;
      background: var(--rule-soft) center/cover no-repeat;
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      margin-bottom: 28px;
    }
    .lab-cta {
      display: inline-block;
      background: var(--ink);
      color: var(--bg-card);
      font-family: var(--font-mono);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: var(--tracking-cap);
      padding: 12px 22px;
      border-radius: var(--radius);
      text-decoration: none;
      margin-top: 8px;
    }
    .lab-cta:hover { background: var(--accent); }
    .lab-section { margin: 44px 0; }
    .lab-section h2 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 14px;
    }
    .lab-section h2 .num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-right: 10px;
      vertical-align: 4px;
    }
    .lab-section p { line-height: 1.6; font-size: 15px; }
    .lab-section .lede { font-size: 16px; color: var(--ink-soft); }
    .source-card {
      display: block;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--ink);
    }
    .source-card:hover { border-color: var(--ink); }
    .source-card .src-where {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
      margin-bottom: 4px;
    }
    .source-card .src-title { font-weight: 500; font-size: 14px; line-height: 1.45; }
    .source-card .src-snippet { color: var(--ink-soft); font-size: 13px; line-height: 1.45; margin-top: 6px; }
    .reasoning {
      padding: 18px 22px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      margin: 14px 0;
    }
    .reasoning p { margin: 0 0 10px; }
    .reasoning p:last-child { margin-bottom: 0; }
    .reasoning .label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 6px;
      display: block;
    }
    .alt-list { list-style: none; padding: 0; margin: 14px 0 0; }
    .alt-list li {
      padding: 12px 16px;
      margin-bottom: 8px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
    }
    .alt-list li .alt-title {
      font-weight: 500;
      font-size: 14px;
    }
    .alt-list li .alt-hook {
      color: var(--ink-soft);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 4px;
    }
    .alt-list li .alt-mut {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-muted);
      margin-top: 6px;
    }
    .stat-row {
      display: flex; gap: 24px; flex-wrap: wrap;
      padding: 14px 0;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ink-muted);
    }
    .stat-row .stat strong {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      color: var(--ink);
      display: block;
      margin-bottom: 2px;
    }
    .iter {
      padding: 10px 14px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      margin-bottom: 6px;
      font-size: 13px;
      line-height: 1.5;
    }
    .empty { color: var(--ink-muted); font-style: italic; }
    .rename-note {
      padding: 12px 16px;
      margin-bottom: 16px;
      background: var(--rule-soft, rgba(14,14,18,0.06));
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      font-size: 13px;
      color: var(--ink-soft);
    }
  </style>
</head>
<body>
  <main class="lab-page">
    <a class="lab-back" href="/">← all specimens</a>
    <div id="content"><p class="empty">Loading genesis…</p></div>
  </main>

  <script>
    const slug = new URLSearchParams(location.search).get('slug') || '';
    const root = document.getElementById('content');

    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text != null) node.textContent = String(text);
      return node;
    }

    function txt(value) {
      return document.createTextNode(String(value == null ? '' : value));
    }

    function clearWith(node) {
      root.replaceChildren(node);
    }

    function emptyMessage(message, code) {
      const p = el('p', 'empty', message);
      if (code) {
        p.append(' ');
        p.append(el('code', '', code));
      }
      return p;
    }

    function safeExternalHref(raw) {
      if (!raw) return '';
      try {
        const url = new URL(String(raw), location.href);
        return (url.protocol === 'http:' || url.protocol === 'https:') ? url.href : '';
      } catch (_) {
        return '';
      }
    }

    function makeSection(num, titleParts) {
      const section = el('section', 'lab-section');
      const h2 = el('h2');
      h2.append(el('span', 'num', num));
      const parts = Array.isArray(titleParts) ? titleParts : [titleParts];
      for (const part of parts) h2.append(part instanceof Node ? part : txt(part));
      section.append(h2);
      return section;
    }

    function lede(text) {
      return el('p', 'lede', text);
    }

    function reasoning(label, text) {
      const box = el('div', 'reasoning');
      box.append(el('span', 'label', label));
      box.append(el('p', '', text || '—'));
      return box;
    }

    function sourceCard(source) {
      const href = safeExternalHref(source && source.url);
      const card = href ? document.createElement('a') : document.createElement('div');
      card.className = 'source-card';
      if (href) {
        card.href = href;
        card.target = '_blank';
        card.rel = 'noopener';
      }

      const label = sourceLabel(source && source.source) + (source && source.section ? ' · ' + source.section : '');
      card.append(el('div', 'src-where', label));
      card.append(el('div', 'src-title', source && source.title ? source.title : '(untitled)'));
      if (source && source.snippet) card.append(el('div', 'src-snippet', source.snippet));
      return card;
    }

    function statCell(label, value) {
      const cell = el('div', 'stat');
      cell.append(el('strong', '', value || 0));
      cell.append(txt(label));
      return cell;
    }

    async function safeFetch(path) {
      try { const r = await fetch(path, { cache: 'no-store' }); return r.ok ? r : null; } catch { return null; }
    }
    async function fetchJson(path) { const r = await safeFetch(path); return r ? await r.json() : null; }
    async function fetchText(path) { const r = await safeFetch(path); return r ? await r.text() : null; }

    function sourceLabel(s) {
      const map = { reddit: 'Reddit', telegram: 'Telegram', yandex_games: 'Yandex Games',
                    crazygames: 'CrazyGames', poki: 'Poki', itch_html5: 'Itch.io HTML5',
                    ideas_md: 'Tim\'s IDEAS.md', telegram_digest: 'Telegram digest' };
      return map[s] || s || 'Source';
    }

    async function render() {
      if (!slug || !/^[a-z0-9_-]+$/.test(slug)) {
        clearWith(emptyMessage('No slug given. Try', '?slug=battleships_skirmish'));
        return;
      }
      const [games, genesis, iterRaw, counts] = await Promise.all([
        fetchJson('/games.json'),
        fetchJson(`/games/${slug}/genesis.json`),
        fetchText(`/games/${slug}/iterations.log`),
        fetchJson('/api/counts'),
      ]);
      const game = games ? games.find(g => g.slug === slug) : null;
      if (!game) { clearWith(emptyMessage('Specimen not found.')); return; }
      const c = (counts && counts[slug]) || { likes: 0, dislikes: 0, plays: 0, comments: 0 };

      const fragment = document.createDocumentFragment();
      const builtOn = (genesis && genesis.built_on)
        ? new Date(genesis.built_on).toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' })
        : (game.addedDate ? new Date(game.addedDate).toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' }) : '—');
      const num = game.num ? '#' + String(game.num).padStart(3, '0') : '';

      fragment.append(el('div', 'lab-eyebrow', `specimen ${num} · genesis · built ${builtOn}`));
      fragment.append(el('h1', 'lab-title', game.title));
      fragment.append(el('p', 'lab-hook', game.hook || ''));
      const cover = el('div', 'lab-cover');
      cover.style.backgroundImage = `url('/thumbs/${encodeURIComponent(slug)}.png?v=1')`;
      fragment.append(cover);
      const play = el('a', 'lab-cta', '▶ Play this specimen');
      play.href = `/play.html?slug=${encodeURIComponent(slug)}`;
      fragment.append(play);

      if (genesis && genesis.rename_note) {
        fragment.append(el('div', 'rename-note', `📝 ${genesis.rename_note}`));
      }

      // ── 01 The signal ─────────────────────────────────────────────
      const signalSection = makeSection('01', 'The signal');
      signalSection.append(lede('Where the idea came from — actual posts, channels, trending pages the synthesizer was reading the morning this game was conceived.'));
      const sources = (genesis && Array.isArray(genesis.sources)) ? genesis.sources : [];
      if (sources.length === 0) {
        signalSection.append(el('p', 'empty', 'No source signals captured for this specimen.'));
      } else {
        for (const s of sources) signalSection.append(sourceCard(s));
      }
      fragment.append(signalSection);

      // ── 02 The synthesizer ───────────────────────────────────────
      const synthSection = makeSection('02', 'What the synthesizer was told');
      synthSection.append(lede('Each morning a multi-agent run scrapes 50 Telegram channels + 5 portals + 3 subreddits, then a single LLM call mutates the trending patterns into novel game ideas. The brief never changes:'));
      synthSection.append(reasoning('System brief', genesis && genesis.synthesizer_brief
        ? genesis.synthesizer_brief
        : 'Read the past 24 hours of indie-gamedev signals; mutate the patterns — do NOT clone them. Vanilla JS canvas only. Non-timer pressure required (turn budget / lives / score / scarcity, never "you have N seconds"). 30-second hook explainable in one sentence. No overlap with already-shipped games.'));
      fragment.append(synthSection);

      // ── 03 Why this idea ─────────────────────────────────────────
      const idea = (genesis && genesis.idea) || null;
      if (idea) {
        const em = el('em', '', 'this');
        const whySection = makeSection('03', ['Why ', em, ' idea']);
        whySection.append(reasoning('Mutation of', idea.mutation_of || '—'));
        whySection.append(reasoning('Why novel', idea.why_novel || '—'));
        if (idea.prototype) whySection.append(reasoning('Prototype scope', idea.prototype));
        fragment.append(whySection);
      }

      // ── 04 Alternatives ──────────────────────────────────────────
      const alts = (genesis && Array.isArray(genesis.alternatives)) ? genesis.alternatives : [];
      if (alts.length > 0) {
        const altSection = makeSection('04', 'What else was on the table that morning');
        altSection.append(lede("The synthesizer typically proposes 5-10 candidates. The leader picks the top 3 to build. These are the ones that didn't make today's cut."));
        const list = el('ul', 'alt-list');
        for (const alt of alts) {
          const item = document.createElement('li');
          item.append(el('div', 'alt-title', alt.title || '?'));
          if (alt.hook) item.append(el('div', 'alt-hook', alt.hook));
          if (alt.mutation_of) item.append(el('div', 'alt-mut', `↳ ${alt.mutation_of}`));
          list.append(item);
        }
        altSection.append(list);
        fragment.append(altSection);
      }

      // ── 05 What players did with it ──────────────────────────────
      const statsSection = makeSection('05', 'What players did with it');
      const stats = el('div', 'stat-row');
      stats.append(statCell('plays', c.plays), statCell('👍', c.likes), statCell('👎', c.dislikes), statCell('comments', c.comments));
      statsSection.append(stats);
      if (iterRaw && iterRaw.trim()) {
        const iterLead = lede('Iterations applied since launch (player-engagement-driven):');
        iterLead.style.marginTop = '18px';
        statsSection.append(iterLead);
        for (const line of iterRaw.split('\n').filter(l => l.trim())) {
          statsSection.append(el('div', 'iter', line));
        }
      }
      fragment.append(statsSection);

      const footer = el('section', 'lab-section');
      footer.style.marginTop = '48px';
      footer.style.paddingTop = '32px';
      footer.style.borderTop = '1px solid var(--rule)';
      const footerText = el('p');
      footerText.style.color = 'var(--ink-muted)';
      footerText.style.fontSize = '13px';
      footerText.append(txt('Every shipped specimen has a genesis. This is part of the public AI gamedev experiment at game-factory.tech — where ideas come from, why they get picked, what works. '));
      const browse = el('a', '', 'browse all specimens →');
      browse.href = '/';
      browse.style.color = 'var(--accent)';
      footerText.append(browse);
      footer.append(footerText);
      fragment.append(footer);

      root.replaceChildren(fragment);
    }
    render();
  </script>
</body>
</html>
