<!DOCTYPE html>
<html lang="en" data-theme="lab">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab — Tim's Game Lab</title>
  <meta name="description" content="Build journal — how this game was made. Source, design, runtime tests, iterations, player feedback.">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    /* Lab-specific layout — borrows the gallery's themed CSS variables but
       lays out a single long-form journal column. */
    .lab-page {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }
    .lab-back {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: var(--tracking-cap);
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
      margin-bottom: 24px;
    }
    .lab-back:hover { color: var(--ink); }
    .lab-eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .lab-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 42px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
    }
    .lab-hook {
      color: var(--ink-soft);
      font-size: 17px;
      line-height: 1.5;
      max-width: 60ch;
      margin: 0 0 28px;
    }
    .lab-cover {
      width: 100%;
      max-width: 520px;
      aspect-ratio: 800 / 470;
      background: var(--rule-soft) center/cover no-repeat;
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      margin-bottom: 32px;
    }
    .lab-section {
      margin: 36px 0;
    }
    .lab-section h2 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 12px;
    }
    .lab-section h2 .num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-right: 10px;
      vertical-align: 4px;
    }
    .lab-meta {
      display: flex; flex-wrap: wrap; gap: 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ink-muted);
      margin-bottom: 24px;
      padding: 14px 18px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
    }
    .lab-meta strong {
      color: var(--ink);
      font-weight: 500;
    }
    .lab-section p { line-height: 1.6; }
    .lab-section pre, .lab-section code {
      font-family: var(--font-mono);
      font-size: 12.5px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      color: var(--ink);
    }
    .lab-section pre {
      padding: 14px 16px;
      overflow-x: auto;
      max-height: 420px;
      overflow-y: auto;
      line-height: 1.55;
    }
    .lab-section code:not(pre code) {
      padding: 1px 6px;
    }
    .gate-results {
      display: grid; gap: 8px;
      margin: 12px 0;
    }
    .gate-row {
      display: grid; grid-template-columns: 56px 140px 1fr;
      gap: 12px; align-items: start;
      padding: 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      font-size: 13px;
    }
    .gate-row .v { font-family: var(--font-mono); font-size: 11px; font-weight: 700; }
    .gate-row .v.PASS { color: #2a7a3e; }
    .gate-row .v.WARN { color: #c8a020; }
    .gate-row .v.FAIL { color: #c8451f; }
    .gate-row .check { font-family: var(--font-mono); font-size: 12px; color: var(--ink-muted); }
    .stat-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 14px; margin: 16px 0 8px;
    }
    .stat-tile {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .stat-tile .num {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-tile .label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
      margin-top: 4px;
    }
    .lab-cta {
      display: inline-block;
      background: var(--ink);
      color: var(--bg-card);
      font-family: var(--font-mono);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: var(--tracking-cap);
      padding: 12px 22px;
      border-radius: var(--radius);
      text-decoration: none;
      margin-top: 12px;
    }
    .lab-cta:hover { background: var(--accent); }
    .empty {
      color: var(--ink-muted);
      font-style: italic;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <main class="lab-page">
    <a class="lab-back" href="/">← all specimens</a>
    <div id="content"><p class="empty">Loading journal…</p></div>
  </main>

  <script>
    // Lab page renders the public build journal for a single game.
    //
    // Data sources (all already produced by the factory; we just expose them):
    //   /games/<slug>/DESIGN.md             — the agent's design commitment
    //   /games/<slug>/runtime_gate.json     — webapp_gate.js findings
    //   /games/<slug>/iterations.log        — daily iteration history
    //   /games.json                          — manifest entry (title, hook, etc)
    //   /api/counts                          — engagement stats
    //   /api/comments?slug=…                 — player notes
    //
    // No PostHog API call here — that's admin-side. Lab is for public reading.

    const slug = new URLSearchParams(location.search).get('slug') || '';
    const root = document.getElementById('content');

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = String(s == null ? '' : s);
      return d.innerHTML;
    }

    function relTime(ts) {
      if (!ts) return '';
      const sec = Math.max(1, Math.round((Date.now() - ts) / 1000));
      if (sec < 60) return sec + 's ago';
      const min = Math.round(sec / 60);
      if (min < 60) return min + 'm ago';
      const hr = Math.round(min / 60);
      if (hr < 24) return hr + 'h ago';
      const d = Math.round(hr / 24);
      return d + 'd ago';
    }

    async function safeFetch(url, opts) {
      try {
        const r = await fetch(url, { cache: 'no-store', ...opts });
        if (!r.ok) return null;
        return r;
      } catch { return null; }
    }

    async function fetchText(path) {
      const r = await safeFetch(path);
      return r ? await r.text() : null;
    }
    async function fetchJson(path) {
      const r = await safeFetch(path);
      return r ? await r.json() : null;
    }

    // Tiny markdown-to-HTML — handles headers, code fences, bullets, bold/italic,
    // inline code, paragraphs. Not a full parser; enough for our DESIGN.md shape.
    function md(text) {
      if (!text) return '';
      const lines = text.split('\n');
      const out = [];
      let inFence = false;
      let fenceBuf = [];
      let para = [];
      const flushPara = () => {
        if (!para.length) return;
        const joined = para.join(' ').trim();
        if (joined) out.push('<p>' + inline(joined) + '</p>');
        para = [];
      };
      const inline = (s) => escapeHtml(s)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>');

      for (const raw of lines) {
        if (raw.startsWith('```')) {
          if (inFence) {
            out.push('<pre>' + escapeHtml(fenceBuf.join('\n')) + '</pre>');
            fenceBuf = []; inFence = false;
          } else {
            flushPara(); inFence = true;
          }
          continue;
        }
        if (inFence) { fenceBuf.push(raw); continue; }

        const m = /^(#{1,4})\s+(.*)$/.exec(raw);
        if (m) {
          flushPara();
          const lvl = Math.min(4, m[1].length + 1);
          out.push(`<h${lvl}>${inline(m[2])}</h${lvl}>`);
          continue;
        }
        const li = /^[\-\*]\s+(.*)$/.exec(raw);
        if (li) {
          flushPara();
          if (out[out.length - 1] !== '<ul>') {
            if (!out.length || !out[out.length - 1].startsWith('<ul>')) {
              out.push('<ul>');
            }
          }
          out.push('<li>' + inline(li[1]) + '</li>');
          continue;
        } else if (out.length && out[out.length - 1] === '<ul>') {
          // unmatched open — close it
        }
        // Close ul if this isn't a list line
        if (out.length && out[out.length - 1].startsWith('<li>') && !li) {
          // We're transitioning out of a list — close it
          // (simpler post-processing below catches this case)
        }

        if (raw.trim() === '') { flushPara(); continue; }
        para.push(raw);
      }
      flushPara();

      // Ensure <ul> tags are properly closed where needed
      let html = out.join('\n');
      // Normalize: ensure <ul> wraps consecutive <li>s and closes
      html = html.replace(/(<li>[^]*?<\/li>)(?:\n+)?(?!<li>)/g, '$1</ul>');
      // Remove duplicate ul opens
      html = html.replace(/<ul>\n<ul>/g, '<ul>');
      // Close any unclosed at end
      const opens = (html.match(/<ul>/g) || []).length;
      const closes = (html.match(/<\/ul>/g) || []).length;
      if (opens > closes) html += '</ul>'.repeat(opens - closes);
      return html;
    }

    async function render() {
      if (!slug || !/^[a-z0-9_-]+$/.test(slug)) {
        root.innerHTML = '<p class="empty">No slug given. Try <code>?slug=battleships_skirmish</code></p>';
        return;
      }

      // Fetch all the artefacts in parallel
      const [games, design, gateRaw, iterRaw, counts, commentsPayload] = await Promise.all([
        fetchJson('/games.json'),
        fetchText(`/games/${slug}/DESIGN.md`),
        fetchText(`/games/${slug}/runtime_gate.json`),
        fetchText(`/games/${slug}/iterations.log`),
        fetchJson('/api/counts'),
        fetchJson(`/api/comments?slug=${encodeURIComponent(slug)}&limit=10`),
      ]);

      const game = games ? games.find(g => g.slug === slug) : null;
      if (!game) {
        root.innerHTML = '<p class="empty">Specimen not found.</p>';
        return;
      }

      let gate = null;
      try { gate = gateRaw ? JSON.parse(gateRaw) : null; } catch {}

      const c = (counts && counts[slug]) || { likes: 0, dislikes: 0, plays: 0, comments: 0 };
      const comments = (commentsPayload && commentsPayload.comments) || [];

      // ── Build the page ─────────────────────────────────────────────
      const parts = [];

      const addedDate = game.addedDate ? new Date(game.addedDate).toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' }) : '—';
      const num = game.num ? '#' + String(game.num).padStart(3, '0') : '';

      parts.push(`<div class="lab-eyebrow">specimen ${num} · build journal · ${escapeHtml(addedDate)}</div>`);
      parts.push(`<h1 class="lab-title">${escapeHtml(game.title)}</h1>`);
      parts.push(`<p class="lab-hook">${escapeHtml(game.hook || '')}</p>`);
      parts.push(`<div class="lab-cover" style="background-image:url('/thumbs/${slug}.png?v=1')"></div>`);
      parts.push(`<a class="lab-cta" href="/play.html?slug=${encodeURIComponent(slug)}">▶ Play this specimen</a>`);

      // ── 01 The Idea ────────────────────────────────────────────────
      parts.push(`<section class="lab-section">
        <h2><span class="num">01</span>The Idea</h2>
        <p>This game's mechanic was proposed by the daily synthesizer pipeline — Russian indie-dev Telegram channels, CrazyGames trending, Poki popular, Itch.io HTML5 newest, and Reddit (r/WebGames + r/incremental_games + r/indiegamedev) all feed in. The synthesizer's job is to <em>mutate</em> what's trending, not clone it.</p>
        ${game.title_ru ? `<p><span class="lab-eyebrow" style="display:inline">RU</span> <strong>${escapeHtml(game.title_ru)}</strong> — ${escapeHtml(game.hook_ru || '')}</p>` : ''}
      </section>`);

      // ── 02 The Design Commitment ───────────────────────────────────
      parts.push(`<section class="lab-section">
        <h2><span class="num">02</span>Design commitments — what the agent promised</h2>
        ${design
          ? `<p>Before writing any code, the build agent filled out a <code>DESIGN.md</code> spec. The runtime gate cross-checks that the shipped game honours every commitment below.</p>${md(design)}`
          : '<p class="empty">No DESIGN.md captured for this specimen.</p>'}
      </section>`);

      // ── 03 The Build (gate results) ────────────────────────────────
      let gateBlock = '<p class="empty">No runtime gate results captured for this specimen yet.</p>';
      if (gate && Array.isArray(gate.findings)) {
        const rows = gate.findings.map(f => `
          <div class="gate-row">
            <span class="v ${escapeHtml(f.verdict || '')}">${escapeHtml(f.verdict || '?')}</span>
            <span class="check">${escapeHtml(f.check || '?')}</span>
            <span>${escapeHtml(f.detail || '')}</span>
          </div>
        `).join('');
        gateBlock = `<p>The runtime gate (modeled on anthropic-webapp-testing) loaded the game in headless Chrome, drove it through MENU → PLAYING → terminal state, and verified each commitment.</p>
          <div class="gate-results">${rows}</div>
          <p style="margin-top:14px;"><strong>Verdict:</strong> <code>${escapeHtml(gate.status || '?')}</code></p>`;
      }
      parts.push(`<section class="lab-section">
        <h2><span class="num">03</span>The Build — what the gate found</h2>
        ${gateBlock}
      </section>`);

      // ── 04 Iteration log ───────────────────────────────────────────
      parts.push(`<section class="lab-section">
        <h2><span class="num">04</span>Iteration log</h2>
        ${iterRaw && iterRaw.trim()
          ? `<pre>${escapeHtml(iterRaw)}</pre>`
          : '<p class="empty">No iterations applied yet. Iterations land daily on the most-engaged specimens.</p>'}
      </section>`);

      // ── 05 Player engagement ───────────────────────────────────────
      parts.push(`<section class="lab-section">
        <h2><span class="num">05</span>Player engagement</h2>
        <div class="stat-grid">
          <div class="stat-tile"><div class="num">${c.plays || 0}</div><div class="label">plays</div></div>
          <div class="stat-tile"><div class="num">${c.likes || 0}</div><div class="label">likes</div></div>
          <div class="stat-tile"><div class="num">${c.dislikes || 0}</div><div class="label">dislikes</div></div>
          <div class="stat-tile"><div class="num">${c.comments || 0}</div><div class="label">comments</div></div>
        </div>
      </section>`);

      // ── 06 Player notes ────────────────────────────────────────────
      parts.push(`<section class="lab-section">
        <h2><span class="num">06</span>Player notes</h2>
        ${comments.length === 0
          ? '<p class="empty">No player comments yet. Open the play page and leave the first.</p>'
          : comments.map(cm => {
              const emoji = cm.vote === 'like' ? '👍' : cm.vote === 'dislike' ? '👎' : '💬';
              return `<div class="gate-row" style="grid-template-columns:32px 1fr 80px;">
                <span style="font-size:14px;">${emoji}</span>
                <span>${escapeHtml(cm.comment)}</span>
                <span class="check" style="text-align:right;">${escapeHtml(relTime(cm.ts))}</span>
              </div>`;
            }).join('')}
      </section>`);

      parts.push(`<section class="lab-section" style="margin-top:48px; padding-top:32px; border-top:1px solid var(--rule);">
        <p style="color:var(--ink-muted); font-size:13px;">
          The lab exposes how each game was made — the prompt, the gate, the failures, the engagement. This is part of an
          ongoing public AI gamedev experiment. <a href="/" style="color:var(--accent);">browse all specimens →</a>
        </p>
      </section>`);

      root.innerHTML = parts.join('\n');
    }

    render();
  </script>
</body>
</html>
