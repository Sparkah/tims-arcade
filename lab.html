<!DOCTYPE html>
<html lang="en" data-theme="lab">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis — Tim's Game Lab</title>
  <meta name="description" content="How this game's idea was born. Source signals, synthesizer reasoning, alternatives considered, what got built.">
  <link rel="stylesheet" href="/style.css?v=f9ffd51e">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    /* Genesis page — long-form idea-origin story per game. Drops technical
       artefacts (DESIGN, runtime gate) entirely; AI builds those daily,
       they're not the interesting story. The interesting story is where
       the idea came from + why the synthesizer chose it. */
    .lab-page { max-width: 760px; margin: 0 auto; padding: 32px 24px 80px; }
    .lab-back {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: var(--tracking-cap);
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
      margin-bottom: 24px;
    }
    .lab-back:hover { color: var(--ink); }
    .lab-eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .lab-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 42px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
    }
    .lab-hook {
      color: var(--ink-soft);
      font-size: 17px;
      line-height: 1.5;
      max-width: 60ch;
      margin: 0 0 28px;
    }
    .lab-cover {
      width: 100%;
      max-width: 520px;
      aspect-ratio: 800 / 470;
      background: var(--rule-soft) center/cover no-repeat;
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      margin-bottom: 28px;
    }
    .lab-cta {
      display: inline-block;
      background: var(--ink);
      color: var(--bg-card);
      font-family: var(--font-mono);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: var(--tracking-cap);
      padding: 12px 22px;
      border-radius: var(--radius);
      text-decoration: none;
      margin-top: 8px;
    }
    .lab-cta:hover { background: var(--accent); }
    .lab-section { margin: 44px 0; }
    .lab-section h2 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 14px;
    }
    .lab-section h2 .num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-right: 10px;
      vertical-align: 4px;
    }
    .lab-section p { line-height: 1.6; font-size: 15px; }
    .lab-section .lede { font-size: 16px; color: var(--ink-soft); }
    .source-card {
      display: block;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--ink);
    }
    .source-card:hover { border-color: var(--ink); }
    .source-card .src-where {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
      margin-bottom: 4px;
    }
    .source-card .src-title { font-weight: 500; font-size: 14px; line-height: 1.45; }
    .source-card .src-snippet { color: var(--ink-soft); font-size: 13px; line-height: 1.45; margin-top: 6px; }
    .reasoning {
      padding: 18px 22px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      margin: 14px 0;
    }
    .reasoning p { margin: 0 0 10px; }
    .reasoning p:last-child { margin-bottom: 0; }
    .reasoning .label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 6px;
      display: block;
    }
    .alt-list { list-style: none; padding: 0; margin: 14px 0 0; }
    .alt-list li {
      padding: 12px 16px;
      margin-bottom: 8px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
    }
    .alt-list li .alt-title {
      font-weight: 500;
      font-size: 14px;
    }
    .alt-list li .alt-hook {
      color: var(--ink-soft);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 4px;
    }
    .alt-list li .alt-mut {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-muted);
      margin-top: 6px;
    }
    .stat-row {
      display: flex; gap: 24px; flex-wrap: wrap;
      padding: 14px 0;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ink-muted);
    }
    .stat-row .stat strong {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      color: var(--ink);
      display: block;
      margin-bottom: 2px;
    }
    .iter {
      padding: 10px 14px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      margin-bottom: 6px;
      font-size: 13px;
      line-height: 1.5;
    }
    .empty { color: var(--ink-muted); font-style: italic; }
    .rename-note {
      padding: 12px 16px;
      margin-bottom: 16px;
      background: var(--rule-soft, rgba(14,14,18,0.06));
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      font-size: 13px;
      color: var(--ink-soft);
    }
  </style>
</head>
<body>
  <main class="lab-page">
    <a class="lab-back" href="/">← all specimens</a>
    <div id="content"><p class="empty">Loading genesis…</p></div>
  </main>

  <script>
    const slug = new URLSearchParams(location.search).get('slug') || '';
    const root = document.getElementById('content');

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = String(s == null ? '' : s);
      return d.innerHTML;
    }

    function relTime(ts) {
      if (!ts) return '';
      const sec = Math.max(1, Math.round((Date.now() - ts) / 1000));
      if (sec < 60) return sec + 's ago';
      const min = Math.round(sec / 60);
      if (min < 60) return min + 'm ago';
      const hr = Math.round(min / 60);
      if (hr < 24) return hr + 'h ago';
      return Math.round(hr / 24) + 'd ago';
    }

    async function safeFetch(path) {
      try { const r = await fetch(path, { cache: 'no-store' }); return r.ok ? r : null; } catch { return null; }
    }
    async function fetchJson(path) { const r = await safeFetch(path); return r ? await r.json() : null; }
    async function fetchText(path) { const r = await safeFetch(path); return r ? await r.text() : null; }

    function sourceLabel(s) {
      const map = { reddit: 'Reddit', telegram: 'Telegram', yandex_games: 'Yandex Games',
                    crazygames: 'CrazyGames', poki: 'Poki', itch_html5: 'Itch.io HTML5',
                    ideas_md: 'Tim\'s IDEAS.md', telegram_digest: 'Telegram digest' };
      return map[s] || s;
    }

    async function render() {
      if (!slug || !/^[a-z0-9_-]+$/.test(slug)) {
        root.innerHTML = '<p class="empty">No slug given. Try <code>?slug=battleships_skirmish</code></p>';
        return;
      }
      const [games, genesis, iterRaw, counts] = await Promise.all([
        fetchJson('/games.json'),
        fetchJson(`/games/${slug}/genesis.json`),
        fetchText(`/games/${slug}/iterations.log`),
        fetchJson('/api/counts'),
      ]);
      const game = games ? games.find(g => g.slug === slug) : null;
      if (!game) { root.innerHTML = '<p class="empty">Specimen not found.</p>'; return; }
      const c = (counts && counts[slug]) || { likes: 0, dislikes: 0, plays: 0, comments: 0 };

      const parts = [];
      const builtOn = (genesis && genesis.built_on)
        ? new Date(genesis.built_on).toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' })
        : (game.addedDate ? new Date(game.addedDate).toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' }) : '—');
      const num = game.num ? '#' + String(game.num).padStart(3, '0') : '';

      parts.push(`<div class="lab-eyebrow">specimen ${num} · genesis · built ${escapeHtml(builtOn)}</div>`);
      parts.push(`<h1 class="lab-title">${escapeHtml(game.title)}</h1>`);
      parts.push(`<p class="lab-hook">${escapeHtml(game.hook || '')}</p>`);
      parts.push(`<div class="lab-cover" style="background-image:url('/thumbs/${slug}.png?v=1')"></div>`);
      parts.push(`<a class="lab-cta" href="/play.html?slug=${encodeURIComponent(slug)}">▶ Play this specimen</a>`);

      if (genesis && genesis.rename_note) {
        parts.push(`<div class="rename-note">📝 ${escapeHtml(genesis.rename_note)}</div>`);
      }

      // ── 01 The signal ─────────────────────────────────────────────
      parts.push(`<section class="lab-section">
        <h2><span class="num">01</span>The signal</h2>
        <p class="lede">Where the idea came from — actual posts, channels, trending pages the synthesizer was reading the morning this game was conceived.</p>`);
      const sources = (genesis && Array.isArray(genesis.sources)) ? genesis.sources : [];
      if (sources.length === 0) {
        parts.push('<p class="empty">No source signals captured for this specimen.</p>');
      } else {
        for (const s of sources) {
          const label = sourceLabel(s.source) + (s.section ? ' · ' + s.section : '');
          const title = s.title || '(untitled)';
          const url   = s.url || null;
          const snip  = s.snippet ? `<div class="src-snippet">${escapeHtml(s.snippet)}</div>` : '';
          if (url) {
            parts.push(`<a class="source-card" href="${escapeHtml(url)}" target="_blank" rel="noopener">
              <div class="src-where">${escapeHtml(label)}</div>
              <div class="src-title">${escapeHtml(title)}</div>
              ${snip}
            </a>`);
          } else {
            parts.push(`<div class="source-card">
              <div class="src-where">${escapeHtml(label)}</div>
              <div class="src-title">${escapeHtml(title)}</div>
              ${snip}
            </div>`);
          }
        }
      }
      parts.push(`</section>`);

      // ── 02 The synthesizer ───────────────────────────────────────
      parts.push(`<section class="lab-section">
        <h2><span class="num">02</span>What the synthesizer was told</h2>
        <p class="lede">Each morning a multi-agent run scrapes 50 Telegram channels + 5 portals + 3 subreddits, then a single LLM call mutates the trending patterns into novel game ideas. The brief never changes:</p>
        <div class="reasoning">
          <span class="label">System brief</span>
          <p>${escapeHtml(genesis && genesis.synthesizer_brief
              ? genesis.synthesizer_brief
              : 'Read the past 24 hours of indie-gamedev signals; mutate the patterns — do NOT clone them. Vanilla JS canvas only. Non-timer pressure required (turn budget / lives / score / scarcity, never "you have N seconds"). 30-second hook explainable in one sentence. No overlap with already-shipped games.')}</p>
        </div>
      </section>`);

      // ── 03 Why this idea ─────────────────────────────────────────
      const idea = (genesis && genesis.idea) || null;
      if (idea) {
        parts.push(`<section class="lab-section">
          <h2><span class="num">03</span>Why <em>this</em> idea</h2>
          <div class="reasoning">
            <span class="label">Mutation of</span>
            <p>${escapeHtml(idea.mutation_of || '—')}</p>
          </div>
          <div class="reasoning">
            <span class="label">Why novel</span>
            <p>${escapeHtml(idea.why_novel || '—')}</p>
          </div>
          ${idea.prototype ? `<div class="reasoning">
            <span class="label">Prototype scope</span>
            <p>${escapeHtml(idea.prototype)}</p>
          </div>` : ''}
        </section>`);
      }

      // ── 04 Alternatives ──────────────────────────────────────────
      const alts = (genesis && Array.isArray(genesis.alternatives)) ? genesis.alternatives : [];
      if (alts.length > 0) {
        parts.push(`<section class="lab-section">
          <h2><span class="num">04</span>What else was on the table that morning</h2>
          <p class="lede">The synthesizer typically proposes 5-10 candidates. The leader picks the top 3 to build. These are the ones that didn't make today's cut.</p>
          <ul class="alt-list">
            ${alts.map(a => `<li>
              <div class="alt-title">${escapeHtml(a.title || '?')}</div>
              ${a.hook ? `<div class="alt-hook">${escapeHtml(a.hook)}</div>` : ''}
              ${a.mutation_of ? `<div class="alt-mut">↳ ${escapeHtml(a.mutation_of)}</div>` : ''}
            </li>`).join('')}
          </ul>
        </section>`);
      }

      // ── 05 What players did with it ──────────────────────────────
      parts.push(`<section class="lab-section">
        <h2><span class="num">05</span>What players did with it</h2>
        <div class="stat-row">
          <div class="stat"><strong>${c.plays || 0}</strong>plays</div>
          <div class="stat"><strong>${c.likes || 0}</strong>👍</div>
          <div class="stat"><strong>${c.dislikes || 0}</strong>👎</div>
          <div class="stat"><strong>${c.comments || 0}</strong>comments</div>
        </div>
        ${iterRaw && iterRaw.trim() ? `
          <p class="lede" style="margin-top:18px;">Iterations applied since launch (player-engagement-driven):</p>
          ${iterRaw.split('\n').filter(l => l.trim()).map(l => `<div class="iter">${escapeHtml(l)}</div>`).join('')}
        ` : ''}
      </section>`);

      parts.push(`<section class="lab-section" style="margin-top:48px; padding-top:32px; border-top:1px solid var(--rule);">
        <p style="color:var(--ink-muted); font-size:13px;">
          Every shipped specimen has a genesis. This is part of the public AI gamedev experiment at game-factory.tech —
          where ideas come from, why they get picked, what works.
          <a href="/" style="color:var(--accent);">browse all specimens →</a>
        </p>
      </section>`);

      root.innerHTML = parts.join('\n');
    }
    render();
  </script>
</body>
</html>
