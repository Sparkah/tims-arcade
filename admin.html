<!DOCTYPE html>
<html lang="en" data-theme="lab">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin · Tim's Game Lab</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <meta name="theme-color" content="#0e0e12">

  <link rel="stylesheet" href="/style.css?v=4a0fe678">
  <style>
    body { background: var(--bg); color: var(--ink); font-family: var(--font-body); min-height: 100vh; }

    .admin-wrap { max-width: 1100px; margin: 30px auto; padding: 0 20px 60px; }
    .admin-wrap h1 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 36px;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .admin-wrap .sub {
      font-family: var(--font-mono);
      color: var(--ink-muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    .totals { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .stat {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      padding: 16px;
    }
    .stat .label {
      font-family: var(--font-mono);
      color: var(--ink-muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: var(--tracking-cap);
    }
    .stat .value {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 500;
      color: var(--ink);
      margin-top: 4px;
      letter-spacing: -0.02em;
    }
    .stat .value .unit { font-size: 14px; color: var(--ink-muted); font-weight: 400; margin-left: 4px; }

    h2 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 36px 0 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      overflow: hidden;
    }
    table th, table td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--rule-soft);
      font-size: 14px;
    }
    table th {
      font-family: var(--font-mono);
      color: var(--ink-muted);
      font-weight: 500;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: var(--tracking-cap);
      background: var(--bg);
    }
    table td { color: var(--ink); font-family: var(--font-body); }
    table td.num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; text-align: right; }
    table td.slug { color: var(--accent); font-family: var(--font-mono); font-size: 12px; }
    table tbody tr:last-child td { border-bottom: none; }
    table tbody tr:hover td { background: var(--rule-soft); }

    .ratio-cell {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
    }
    .ratio-cell.pos  { background: var(--accent-soft); color: var(--accent); }
    .ratio-cell.neg  { background: rgba(200,69,31,0.12); color: var(--warn); }
    .ratio-cell.zero { background: var(--rule-soft); color: var(--ink-muted); }

    .chart {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      padding: 16px 18px;
    }
    .chart-grid { display: flex; gap: 4px; align-items: flex-end; height: 140px; }
    .chart-bar {
      flex: 1;
      background: var(--accent);
      min-height: 2px;
      border-radius: 2px 2px 0 0;
      position: relative;
      opacity: 0.85;
    }
    .chart-bar:hover { opacity: 1; }
    .chart-bar .tip {
      position: absolute;
      bottom: 100%; left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      background: var(--ink);
      color: var(--bg-card);
      font-family: var(--font-mono);
      padding: 4px 8px;
      border-radius: var(--radius);
      font-size: 11px;
      margin-bottom: 6px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
      z-index: 5;
    }
    .chart-bar:hover .tip { opacity: 1; }
    .chart-labels {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-muted);
    }
    .chart-labels span { flex: 1; text-align: center; }

    .err {
      background: rgba(200,69,31,0.08);
      border: 1px solid var(--warn);
      padding: 16px;
      border-radius: var(--radius-card);
      color: var(--warn);
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .login-form { max-width: 320px; margin: 80px auto; font-family: var(--font-body); }
    .login-form input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      color: var(--ink);
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
    }
    .login-form input:focus { border-color: var(--accent); }
    .login-form button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: var(--ink);
      color: var(--bg-card);
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }
    .login-form button:hover { background: var(--accent); }
  </style>
</head>
<body>
<div class="admin-wrap">
  <h1>Tim's Game Lab — Admin</h1>
  <p class="sub" id="meta"></p>

  <div id="content"></div>
</div>

<script>
let lastLoadAt = 0;
let adminSignedIn = false;
const MIN_REFRESH_MS = 30 * 1000;   // don't refetch more than once per 30s

load();

// Auto-refresh when the tab comes back into focus, but only if data
// has been on screen for >30s. Server-side cache is 5 min anyway, so
// frequent tab-switches don't actually re-walk KV.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  if (!adminSignedIn) return;
  if (Date.now() - lastLoadAt < MIN_REFRESH_MS) return;
  load();
});

function showLogin(message = '') {
  adminSignedIn = false;
  const content = document.getElementById('content');
  const wrap = document.createElement('div');
  wrap.className = 'login-form';
  if (message) {
    const err = document.createElement('div');
    err.className = 'err';
    err.style.marginBottom = '12px';
    err.textContent = String(message);
    wrap.appendChild(err);
  }
  const form = document.createElement('form');
  form.id = 'admin-login-form';
  form.action = '/api/auth/request';
  form.method = 'POST';
  const label = document.createElement('label');
  label.htmlFor = 'admin-email';
  label.style.cssText = 'display:block;color:#8a8aa0;margin-bottom:8px;font-size:13px';
  label.textContent = 'Admin email';
  const inputEl = document.createElement('input');
  inputEl.id = 'admin-email';
  inputEl.name = 'email';
  inputEl.type = 'email';
  inputEl.autocomplete = 'username';
  inputEl.required = true;
  inputEl.enterKeyHint = 'done';
  inputEl.placeholder = 'you@example.com';
  const submit = document.createElement('button');
  submit.id = 'go';
  submit.type = 'submit';
  submit.textContent = 'Send sign-in link';
  form.append(label, inputEl, submit);
  const note = document.createElement('p');
  note.id = 'login-note';
  note.style.cssText = 'color:#8a8aa0;margin-top:10px;font-size:12px;line-height:1.4';
  note.textContent = 'Use an email listed in ADMIN_EMAILS.';
  wrap.append(form, note);
  content.replaceChildren(wrap);
  document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('admin-email');
    const btn = document.getElementById('go');
    const note = document.getElementById('login-note');
    const email = input.value.trim();
    if (!email) return;
    btn.disabled = true;
    btn.textContent = 'Sending...';
    note.textContent = 'Sending sign-in link...';
    try {
      const r = await fetch('/api/auth/request', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ email, next: '/admin.html' }),
      });
      if (r.ok || r.status === 204) {
        note.textContent = 'Check your inbox. The link expires in 15 minutes.';
        document.getElementById('admin-login-form').style.display = 'none';
        return;
      }
      if (r.status === 429) note.textContent = 'Too many sign-in requests. Wait a few minutes.';
      else if (r.status === 502) note.textContent = 'Sign-in email failed to send.';
      else note.textContent = 'Could not send sign-in link.';
    } catch (err) {
      note.textContent = 'Network error. Try again.';
    }
    btn.disabled = false;
    btn.textContent = 'Send sign-in link';
  });
}

function setContentMessage(text, options = {}) {
  const content = document.getElementById('content');
  if (!content) return;
  const node = adminPanelMessage(text, options);
  if (!options.error) {
    node.style.color = '#8a8aa0';
  }
  content.replaceChildren(node);
}

function renderMeta(d) {
  const meta = document.getElementById('meta');
  if (!meta) return;
  const signOut = document.createElement('a');
  signOut.href = '/api/auth/logout?return=/admin.html';
  signOut.style.cssText = 'color:var(--ink-muted);text-decoration:none';
  signOut.textContent = 'Sign out';
  meta.replaceChildren(
    `Refreshed ${new Date().toLocaleTimeString()} · ${d.perGame.length} games tracked · `,
    signOut
  );
}

function adminFetch(url, options = {}) {
  return fetch(url, {
    ...options,
    headers: { ...(options.headers || {}) },
    credentials: 'same-origin',
  });
}

async function load() {
  setContentMessage('Loading...');
  lastLoadAt = Date.now();
  try {
    const [statsRes, gamesRes, publishRes] = await Promise.all([
      adminFetch('/api/admin/stats', { cache: 'no-store' }),
      fetch('/games.json', { cache: 'no-store' }),
      adminFetch('/api/admin/publish-status', { cache: 'no-store' }),
    ]);
    if (statsRes.status === 403) {
      showLogin('Sign in with an allowed admin email.');
      return;
    }
    if (!statsRes.ok) {
      const err = await statsRes.json().catch(() => ({error: 'http ' + statsRes.status}));
      setContentMessage(`Error: ${err.error || statsRes.status}`, { error: true });
      return;
    }
    adminSignedIn = true;
    const stats = await statsRes.json();
    const games = gamesRes.ok ? await gamesRes.json() : [];
    adminTitleBySlug = Object.create(null);
    for (const g of games) adminTitleBySlug[g.slug] = g.title || g.slug;

    // Use games.json as the canonical list of slugs, merging in stats
    const statsBySlug = Object.create(null);
    for (const g of stats.perGame) statsBySlug[g.slug] = g;

    const merged = games.map(g => {
      const s = statsBySlug[g.slug] || { plays: 0, seconds: 0, likes: 0, dislikes: 0 };
      return {
        slug: g.slug, title: g.title,
        plays: s.plays, seconds: s.seconds, likes: s.likes, dislikes: s.dislikes,
        thumbCount: g.thumbCount || 1,
        variants: s.variants || {},
      };
    });
    stats.abGames = merged.filter(g => g.thumbCount > 1);
    // Sort by total seconds (desc), then plays
    merged.sort((a, b) => (b.seconds - a.seconds) || (b.plays - a.plays));

    stats.publishStatus = (publishRes && publishRes.ok) ? await publishRes.json().catch(() => null) : null;
    stats.perGame = merged;
    render(stats);
    tabifyContent();
    hydrateFeedbackImages();

    // Lazy-load user digests after stats render so the page paints immediately.
    loadUserDigests().catch(e => console.error('user-digests:', e));
    loadSuggestions().catch(e => console.error('suggestions:', e));
    loadUploads().catch(e => console.error('uploads:', e));
    loadHidden().catch(e => console.error('hidden:', e));
    loadRetention().catch(e => console.error('retention:', e));
    { const rb = document.getElementById('refresh-retention'); if (rb) rb.onclick = () => loadRetention(); }
    loadFunnel().catch(e => console.error('funnel:', e));
    { const fb = document.getElementById('refresh-funnel'); if (fb) fb.onclick = () => loadFunnel(); }
    loadLeastAttention().catch(e => console.error('least-attention:', e));
    { const lb = document.getElementById('refresh-least'); if (lb) lb.onclick = () => loadLeastAttention({ force: true }); }
  } catch (e) {
    setContentMessage(`Network error: ${e.message}`, { error: true });
  }
}

async function loadRetention() {
  const el = document.getElementById('retention-panel');
  if (!el) return;
  setAdminPanelMessage(el, 'Loading retention…');
  try {
    const r = await adminFetch('/api/admin/cohorts', { cache: 'no-store' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      setAdminPanelMessage(el, `Retention: ${err.error || r.status}`, { error: true });
      return;
    }
    const d = await r.json().catch(() => ({}));
    const horizons = Array.isArray(d && d.horizons) && d.horizons.length ? d.horizons : [1, 3, 7, 14, 30];
    const sum = (d && d.summary) || { byHorizon: {}, totalUsers: 0 };
    const byHorizon = (sum && sum.byHorizon) || {};
    const fragment = document.createDocumentFragment();

    const head = document.createElement('div');
    head.style.cssText = 'margin-bottom:8px;font-size:15px';
    horizons.forEach((h) => {
      const s = byHorizon['d' + h];
      const item = document.createElement('span');
      item.style.cssText = 'margin-right:20px';
      const label = document.createElement('b');
      label.style.cssText = 'color:var(--accent,#7cf)';
      label.textContent = `D${h}`;
      item.append(label, ' ');
      if (s) {
        const users = document.createElement('span');
        users.style.cssText = 'opacity:0.5;font-size:11px';
        users.textContent = `(n=${s.users})`;
        item.append(String(s.pct), '% ', users);
      } else {
        const pending = document.createElement('span');
        pending.style.opacity = '0.35';
        pending.textContent = 'pending';
        item.appendChild(pending);
      }
      head.appendChild(item);
    });
    fragment.appendChild(head);

    const meta = document.createElement('div');
    meta.style.cssText = 'opacity:0.55;font-size:11px;margin-bottom:10px';
    meta.textContent = `${sum.totalUsers || 0} unique users · internal excluded: ${(d && d.internalExcluded) || 0} · * low sample · "·" = cohort not mature yet`;
    fragment.appendChild(meta);

    const cohorts = Array.isArray(d && d.cohorts) ? d.cohorts.slice().reverse() : [];
    if (cohorts.length) {
      const table = document.createElement('table');
      table.style.cssText = 'border-collapse:collapse;font-family:var(--font-mono,monospace);font-size:12px';
      const thead = document.createElement('thead');
      const headRow = document.createElement('tr');
      const addHead = (text, align = 'left') => {
        const th = document.createElement('th');
        th.style.cssText = `text-align:${align};padding:3px 10px`;
        th.textContent = text;
        headRow.appendChild(th);
      };
      addHead('cohort (first seen)');
      addHead('users', 'right');
      horizons.forEach((h) => addHead(`D${h}`, 'right'));
      thead.appendChild(headRow);
      const tbody = document.createElement('tbody');
      const addCell = (row, text, align = 'left') => {
        const td = document.createElement('td');
        td.style.cssText = `text-align:${align};padding:3px 10px;border-bottom:1px solid var(--rule,#222)`;
        if (text !== null) td.textContent = String(text);
        row.appendChild(td);
        return td;
      };
      const appendRetentionCell = (row, value) => {
        const td = addCell(row, null, 'right');
        if (value === null || value === undefined) {
          const dot = document.createElement('span');
          dot.style.opacity = '0.3';
          dot.textContent = '·';
          td.appendChild(dot);
          return;
        }
        td.append(String(value.pct), '%');
        const ci = document.createElement('span');
        ci.style.cssText = 'opacity:0.4;font-size:11px';
        ci.textContent = ` ±${value.ciHalf}`;
        td.appendChild(ci);
        if (value.lowSample) {
          const low = document.createElement('span');
          low.title = 'low sample (n<10)';
          low.style.opacity = '0.5';
          low.textContent = '*';
          td.appendChild(low);
        }
      };
      cohorts.forEach((cohort) => {
        const c = cohort || {};
        const row = document.createElement('tr');
        addCell(row, c.date || '');
        addCell(row, c.n ?? '', 'right');
        const retention = (c && c.retention) || {};
        horizons.forEach((h) => appendRetentionCell(row, retention['d' + h]));
        tbody.appendChild(row);
      });
      table.append(thead, tbody);
      fragment.appendChild(table);
    } else {
      const empty = document.createElement('div');
      empty.style.cssText = 'opacity:0.5;font-style:italic';
      empty.textContent = 'No cohort data yet — accumulates as users play (first-seen + return days). Live since this deploy.';
      fragment.appendChild(empty);
    }

    const caveat = document.createElement('div');
    caveat.style.cssText = 'opacity:0.4;font-size:11px;margin-top:8px';
    caveat.textContent = String((d && d.caveat) || '');
    fragment.appendChild(caveat);
    el.replaceChildren(fragment);
  } catch (e) {
    setAdminPanelMessage(el, `Retention: ${e.message}`, { error: true });
  }
}

function disableGameTelemetryPanels() {
  const msg = 'Game analytics moved to GameAnalytics. Cloudflare is reserved for platform retention and operations.';
  const panels = [
    ['funnel-panel', 'funnel-slug', 'refresh-funnel'],
    ['level-funnel-panel', 'level-funnel-slug', 'refresh-level-funnel'],
  ];
  for (const [panelId, selectId, buttonId] of panels) {
    const panel = document.getElementById(panelId);
    if (panel) panel.replaceChildren(adminPanelMessage(msg));
    const sel = document.getElementById(selectId);
    if (sel) sel.disabled = true;
    const btn = document.getElementById(buttonId);
    if (btn) { btn.disabled = true; btn.style.opacity = '0.45'; btn.style.cursor = 'default'; }
  }
}

// Deprecated game funnel panels. Game analytics now belongs in GameAnalytics;
// Cloudflare is reserved for Game Factory platform retention and operations.
let funnelData = null;
let levelFunnelData = null;
async function loadFunnel() { disableGameTelemetryPanels(); }
function renderFunnel() { disableGameTelemetryPanels(); }
function populateLevelFunnelSelect(selected) {
  const sel = document.getElementById('level-funnel-slug');
  if (sel) { sel.replaceChildren(); sel.disabled = true; }
  return selected || '';
}
async function loadLevelFunnel() { disableGameTelemetryPanels(); }
function renderLevelFunnel() { disableGameTelemetryPanels(); }

// Titles for panels that load outside render(d)'s scope (least-attention).
let adminTitleBySlug = Object.create(null);

// Least attention - the bottom of the attention ranking (same data the
// public "Hidden Gems" shelf uses, honest label here). Sorted ascending so
// the most-neglected games lead; rows with zero votes AND zero comments are
// flagged since "0 likes / 0 comments" is the triage question.
async function loadLeastAttention({ force } = {}) {
  const el = document.getElementById('least-attention-panel');
  if (!el) return;
  setAdminPanelMessage(el, 'Loading least-attention ranking…');
  try {
    const r = await adminFetch('/api/least-attention?limit=100' + (force ? '&nocache=1' : ''), { cache: 'no-store' });
    if (!r.ok) {
      setAdminPanelMessage(el, `Least attention: http ${r.status}`, { error: true });
      return;
    }
    const d = await r.json().catch(() => ({}));
    const list = Array.isArray(d && d.games) ? d.games : [];
    if (!list.length) {
      setAdminPanelMessage(el, 'No eligible games (everything is either new, hidden, or external).');
      return;
    }
    const zeroSignal = list.filter(g => g.votes === 0 && g.comments === 0).length;
    const summary = document.createElement('p');
    summary.style.cssText = 'opacity:0.7;font-size:12px;margin:0 0 12px;';
    const zero = document.createElement('b');
    zero.textContent = String(zeroSignal);
    const zeroLabel = document.createElement('b');
    zeroLabel.textContent = '0 votes and 0 comments';
    summary.append(
      zero,
      ' of ',
      String(list.length),
      ' listed games have ',
      zeroLabel,
      ' · formula ',
      String((d && d.formula) || ''),
      ' · games newer than ',
      String((d && d.excludedNewerThanHours) || 48),
      'h excluded · same ranking feeds the public "Hidden Gems" shelf (bottom 12)'
    );

    const { table, tbody } = makeAdminTable(['Game', 'Attention', 'Plays', 'Votes', 'Comments', 'Days shipped', 'Flag']);
    table.querySelectorAll('th').forEach((th, index) => {
      if (index > 0) th.className = 'num';
    });
    list.forEach((rawGame) => {
      const g = rawGame || {};
      const slug = String(g.slug || '');
      const zero = g.votes === 0 && g.comments === 0;
      const row = document.createElement('tr');
      if (zero) row.style.background = 'rgba(200,69,31,0.05)';
      const gameCell = appendAdminCell(row, null);
      const title = document.createElement('div');
      title.style.cssText = 'color:var(--ink);font-weight:600';
      title.textContent = Object.prototype.hasOwnProperty.call(adminTitleBySlug, slug) ? adminTitleBySlug[slug] : slug;
      const slugLine = document.createElement('div');
      slugLine.className = 'slug';
      slugLine.style.cssText = 'font-size:11px';
      slugLine.textContent = slug;
      gameCell.append(title, slugLine);
      appendAdminCell(row, g.attention ?? '', { className: 'num' });
      appendAdminCell(row, g.plays ?? '', { className: 'num' });
      appendAdminCell(row, `👍${g.likes ?? 0} 👎${g.dislikes ?? 0}`, { className: 'num' });
      appendAdminCell(row, g.comments ?? '', { className: 'num' });
      appendAdminCell(row, g.daysSinceShip == null ? '?' : g.daysSinceShip, { className: 'num' });
      const flagCell = appendAdminCell(row, null, { className: 'num' });
      const flag = document.createElement('span');
      flag.className = zero ? 'ratio-cell neg' : 'ratio-cell zero';
      flag.textContent = zero ? 'no signal' : 'low';
      flagCell.appendChild(flag);
      tbody.appendChild(row);
    });
    el.replaceChildren(summary, table);
  } catch (e) {
    setAdminPanelMessage(el, `Least attention: ${e.message}`, { error: true });
  }
}

async function loadUserDigests({ force } = {}) {
  const el = document.getElementById('user-digests');
  if (!el) return;
  setAdminPanelMessage(el, 'Loading user digests…');
  try {
    const url = '/api/admin/user-digests' + (force ? '?nocache=1' : '');
    const r = await adminFetch(url, { cache: 'no-store' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      setAdminPanelMessage(el, `User digests: ${err.error || r.status}`, { error: true });
      return;
    }
    const d = await r.json().catch(() => ({}));
    const users = Array.isArray(d && d.users) ? d.users : [];
    if (users.length === 0) {
      setAdminPanelMessage(el, 'No user activity yet — PostHog hasn\'t recorded any persons.');
      return;
    }
    const summary = document.createElement('p');
    summary.style.cssText = 'opacity:0.7;font-size:12px;margin:0 0 14px;';
    const appendBold = (value) => {
      const b = document.createElement('b');
      b.textContent = String(value);
      summary.appendChild(b);
    };
    const totalUsers = (d && d.total_users) ?? users.length;
    const showing = (d && d.showing) ?? users.length;
    if (Number(totalUsers) > Number(showing)) {
      summary.append('Showing ');
      appendBold(showing);
      summary.append(' most recent of ');
      appendBold(totalUsers);
      summary.append(' persons');
    } else {
      appendBold(totalUsers);
      summary.append(' persons');
    }
    const generatedAt = new Date(d && d.generated_at);
    summary.append(' (');
    appendBold((d && d.identified) ?? 0);
    summary.append(' identified, ');
    appendBold((d && d.anonymous) ?? 0);
    summary.append(' anonymous) · generated ', Number.isFinite(generatedAt.getTime()) ? generatedAt.toLocaleTimeString() : '—');

    const fragment = document.createDocumentFragment();
    fragment.appendChild(summary);
    users.forEach((rawUser) => {
      const u = rawUser || {};
      const lastSeen = new Date(u.last_seen);
      const last = u.last_seen && Number.isFinite(lastSeen.getTime()) ? lastSeen.toLocaleString() : '—';
      const email = typeof u.email === 'string' ? u.email : '';
      const uid = typeof u.id === 'string' ? u.id : '';
      const idDisplay = email || (uid ? uid.slice(0, 12) + '…' : 'anon');
      const topEvents = u.top_events && typeof u.top_events === 'object' && !Array.isArray(u.top_events)
        ? Object.entries(u.top_events)
        .sort((a, b) => (Number(b[1]) || 0) - (Number(a[1]) || 0))
        .slice(0, 5)
        : [];
      const card = document.createElement('div');
      card.style.cssText = 'border:1px solid var(--rule);border-radius:6px;padding:14px 16px;margin-bottom:10px;background:var(--bg-card);';

      const head = document.createElement('div');
      head.style.cssText = 'display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;';
      const id = document.createElement('strong');
      id.style.cssText = 'font-family:var(--font-mono);font-size:13px;';
      id.textContent = idDisplay;
      const meta = document.createElement('span');
      meta.style.cssText = 'font-family:var(--font-mono);font-size:11px;opacity:0.6;';
      meta.textContent = `${u.event_count ?? 0} events · last ${last}`;
      head.append(id, meta);

      const digest = document.createElement('p');
      digest.style.cssText = 'margin:6px 0 10px;font-size:13px;line-height:1.5;';
      digest.textContent = String(u.digest || '');

      const events = document.createElement('div');
      topEvents.forEach(([k, v]) => {
        const tag = document.createElement('span');
        tag.style.cssText = 'font-family:var(--font-mono);font-size:11px;background:var(--rule-soft,rgba(14,14,18,0.06));padding:2px 6px;border-radius:3px;margin-right:4px;';
        tag.textContent = `${String(k)}·${String(v)}`;
        events.appendChild(tag);
      });

      card.append(head, digest, events);
      fragment.appendChild(card);
    });
    el.replaceChildren(fragment);
  } catch (e) {
    setAdminPanelMessage(el, `Failed to load digests: ${e.message}`, { error: true });
  }
}

function adminPanelMessage(text, options = {}) {
  const div = document.createElement('div');
  if (options.error) {
    div.className = 'err';
  } else {
    div.style.cssText = 'opacity:0.5;font-style:italic;padding:12px 0;';
  }
  div.textContent = String(text);
  return div;
}

function setAdminPanelMessage(el, text, options = {}) {
  el.replaceChildren(adminPanelMessage(text, options));
}

function makeAdminStatusBadge(text, background) {
  const span = document.createElement('span');
  span.style.cssText = `background:${background};color:#fff;padding:1px 6px;border-radius:3px;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;`;
  span.textContent = String(text);
  return span;
}

function appendAdminCell(row, text = '', options = {}) {
  const td = document.createElement('td');
  if (options.className) td.className = options.className;
  if (options.style) td.style.cssText = options.style;
  if (text !== null) td.textContent = String(text);
  row.appendChild(td);
  return td;
}

function makeAdminTable(headers) {
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  headers.forEach((header) => {
    const th = document.createElement('th');
    th.textContent = header;
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  const tbody = document.createElement('tbody');
  table.append(thead, tbody);
  return { table, tbody };
}

function adminNode(tag, options = {}, ...children) {
  const node = document.createElement(tag);
  if (options.className) node.className = options.className;
  if (options.style) node.style.cssText = options.style;
  if (options.text !== undefined) node.textContent = String(options.text);
  for (const child of children) {
    if (child === null || child === undefined) continue;
    node.append(child && child.nodeType ? child : document.createTextNode(String(child)));
  }
  return node;
}

async function loadSuggestions() {
  const el = document.getElementById('suggestions-panel');
  if (!el) return;
  setAdminPanelMessage(el, 'Loading suggestions…');
  try {
    const r = await adminFetch('/api/admin/suggestions?days=14', { cache: 'no-store' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      setAdminPanelMessage(el, `Suggestions: ${err.error || r.status}`, { error: true });
      return;
    }
    const d = await r.json().catch(() => ({}));
    const suggestions = Array.isArray(d && d.suggestions) ? d.suggestions : [];
    if (suggestions.length === 0) {
      setAdminPanelMessage(el, 'No suggestions yet — wait for someone to use the footer button on the gallery.');
      return;
    }
    const summary = document.createElement('p');
    summary.style.cssText = 'opacity:0.7;font-size:12px;margin:0 0 14px;';
    const newCount = document.createElement('b');
    newCount.textContent = String((d && d.new_count) ?? 0);
    const totalCount = document.createElement('b');
    totalCount.textContent = String((d && d.count) ?? suggestions.length);
    summary.append(newCount, ' new of ', totalCount, ' total in last ', String((d && d.days) ?? 14), ' days');

    const { table, tbody } = makeAdminTable(['When', 'Status', 'From', 'Suggestion', 'Actions']);
    suggestions.forEach((s) => {
      const ts = Number(s && s.ts);
      const ago = Math.max(0, Math.round((Date.now() - (Number.isFinite(ts) ? ts : Date.now())) / 60000));
      const agoStr = ago < 60 ? ago + 'm' : ago < 1440 ? Math.round(ago/60) + 'h' : Math.round(ago/1440) + 'd';
      const uid = typeof (s && s.uid) === 'string' ? s.uid : '';
      const idLabel = uid ? uid.slice(0, 8) : 'ip:' + String((s && s.ipHash) || '?');
      const status = s && s.status;
      const row = document.createElement('tr');
      appendAdminCell(row, `${agoStr} ago`, { style: 'color:#8a8aa0;font-size:12px;white-space:nowrap' });
      const statusCell = appendAdminCell(row, null);
      if (status === 'new') {
        statusCell.appendChild(makeAdminStatusBadge('new', '#2a7'));
      } else if (status === 'built') {
        const builtLabel = (s && s.builtSlug) ? `built→${String(s.builtSlug)}` : 'built';
        statusCell.appendChild(makeAdminStatusBadge(builtLabel, '#46a'));
      } else {
        statusCell.appendChild(makeAdminStatusBadge('dismissed', '#888'));
      }
      appendAdminCell(row, idLabel, { style: 'font-family:var(--font-mono);font-size:11px;opacity:0.6;' });
      appendAdminCell(row, (s && s.text) || '');

      const actionCell = appendAdminCell(row, null, { style: 'white-space:nowrap;font-size:11px;' });
      const makeButton = (act, label) => {
        const button = document.createElement('button');
        button.className = 'suggest-act';
        button.dataset.key = String((s && s.key) || '');
        button.dataset.act = act;
        button.textContent = label;
        return button;
      };
      if (status === 'new') {
        actionCell.append(makeButton('built', 'mark built'), document.createTextNode(' '), makeButton('dismissed', 'dismiss'));
      } else {
        actionCell.appendChild(makeButton('new', 'reopen'));
      }
      tbody.appendChild(row);
    });
    el.replaceChildren(summary, table);
  } catch (e) {
    setAdminPanelMessage(el, `Failed to load suggestions: ${e.message}`, { error: true });
  }
}

document.addEventListener('click', async (e) => {
  const t = e.target;
  if (t && t.classList && t.classList.contains('suggest-act')) {
    e.preventDefault();
    const id = t.dataset.key;
    const act = t.dataset.act;
    let builtSlug = null;
    if (act === 'built') {
      builtSlug = prompt('Built which game? (slug, optional)', '') || null;
    }
    t.disabled = true;
    const r = await adminFetch('/api/admin/suggestions', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ id, status: act, builtSlug }),
    });
    if (r.ok) loadSuggestions();
    else { t.disabled = false; alert('Failed: ' + r.status); }
  }
});

// Hidden games — hide/unhide a game from the public grid (KV-backed, instant).
async function loadHidden() {
  const el = document.getElementById('hidden-panel');
  if (!el) return;
  setAdminPanelMessage(el, 'Loading…');
  try {
    const [hidRes, gamesRes] = await Promise.all([
      adminFetch('/api/admin/hidden', { cache: 'no-store' }),
      fetch('/games.json', { cache: 'no-store' }),
    ]);
    if (!hidRes.ok) {
      const err = await hidRes.json().catch(() => ({}));
      setAdminPanelMessage(el, `Hidden: ${err.error || hidRes.status}`, { error: true });
      return;
    }
    const hiddenData = await hidRes.json().catch(() => ({}));
    const hidden = hiddenData && hiddenData.hidden;
    const hiddenList = Array.isArray(hidden) ? hidden.map((slug) => String(slug)) : [];
    const gamesJson = await gamesRes.json().catch(() => []);
    const allGames = Array.isArray(gamesJson) ? gamesJson.filter(Boolean) : [];
    const hset = new Set(hiddenList);
    const btn = 'font-size:11px;padding:4px 12px;border:1px solid var(--rule);background:transparent;color:var(--ink-soft);cursor:pointer;border-radius:4px;';
    // hidden first, then newest by num
    const list = [...allGames].sort((a, b) => {
      const ah = hset.has(String((a && a.slug) || '')), bh = hset.has(String((b && b.slug) || ''));
      if (ah !== bh) return ah ? -1 : 1;
      return (parseInt(b && b.num, 10) || 0) - (parseInt(a && a.num, 10) || 0);
    });
    const summary = document.createElement('p');
    summary.style.cssText = 'opacity:0.7;font-size:12px;margin:0 0 14px;';
    const hiddenCount = document.createElement('b');
    hiddenCount.textContent = String(hiddenList.length);
    summary.append(hiddenCount, ' hidden of ', String(allGames.length), '. Hidden games drop off the public grid instantly and are recorded as a low-quality signal for the factory.');

    const { table, tbody } = makeAdminTable(['Game', 'Slug', '', '']);
    list.forEach((g) => {
      const slug = String((g && g.slug) || '');
      const h = hset.has(slug);
      const row = document.createElement('tr');
      if (h) row.style.cssText = 'opacity:0.5;';
      appendAdminCell(row, (g && (g.title || g.slug)) || '');
      appendAdminCell(row, slug, { className: 'slug' });
      const statusCell = appendAdminCell(row, null);
      if (h) {
        const status = document.createElement('span');
        status.style.cssText = 'color:#f7768e;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;';
        status.textContent = 'hidden';
        statusCell.appendChild(status);
      }
      const actionCell = appendAdminCell(row, null, { style: 'text-align:right;' });
      const action = document.createElement('button');
      action.className = 'hide-act';
      action.dataset.slug = slug;
      action.dataset.act = h ? 'unhide' : 'hide';
      action.style.cssText = btn;
      action.textContent = h ? 'unhide' : 'hide';
      actionCell.appendChild(action);
      tbody.appendChild(row);
    });
    el.replaceChildren(summary, table);
  } catch (e) {
    setAdminPanelMessage(el, `Failed to load hidden: ${e.message}`, { error: true });
  }
}

// Delegated handler for the hidden-games panel (hide/unhide + its refresh btn).
document.addEventListener('click', async (e) => {
  const t = e.target;
  if (!t) return;
  if (t.id === 'refresh-hidden') { loadHidden(); return; }

      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ slug, hide }),

    if (r.ok) loadHidden();
    else { t.disabled = false; alert('Failed: ' + r.status); }
  }
});

async function loadUploads() {
  const el = document.getElementById('uploads-panel');
  if (!el) return;
  setAdminPanelMessage(el, 'Loading uploads…');
  try {
    const r = await adminFetch('/api/admin/uploads', { cache: 'no-store' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      setAdminPanelMessage(el, `Uploads: ${err.error || r.status}`, { error: true });
      return;
    }
    const d = await r.json().catch(() => ({}));
    const c = (d && d.counts) || {};
    const uploads = Array.isArray(d && d.uploads) ? d.uploads : [];
    const failures = Array.isArray(d && d.failures) ? d.failures : [];
    const fragment = document.createDocumentFragment();
    if (uploads.length === 0 && failures.length === 0) {
      setAdminPanelMessage(el, 'No uploads yet — send a developer the /submit link.');
      return;
    }
    if (uploads.length > 0) {
      const summary = document.createElement('p');
      summary.style.cssText = 'opacity:0.7;font-size:12px;margin:0 0 14px;';
      const pending = document.createElement('b');
      pending.textContent = String(c.pending || 0);
      summary.append(pending, ' pending · ', String(c.approved || 0), ' approved · ', String(c.rejected || 0), ' rejected · ', String(c.live || 0), ' live');
      fragment.appendChild(summary);
      uploads.forEach((upload) => fragment.appendChild(uploadCard(upload)));
    } else {
      fragment.appendChild(adminPanelMessage('No uploads yet — send a developer the /submit link.'));
    }
    if (failures.length) {
      const heading = document.createElement('div');
      heading.style.cssText = 'margin-top:24px;font-size:12px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;opacity:0.55;';
      heading.textContent = `Rejected at the gate (${failures.length}) — debug, not stored`;
      fragment.appendChild(heading);
      failures.forEach((failure) => fragment.appendChild(failCard(failure)));
    }
    el.replaceChildren(fragment);
  } catch (e) {
    setAdminPanelMessage(el, `Failed to load uploads: ${e.message}`, { error: true });
  }
}

function uploadCard(u) {
  u = u || {};
  const ts = Number(u.ts);
  const ago = Number.isFinite(ts) ? Math.max(0, Math.round((Date.now() - ts) / 60000)) : 0;
  const agoStr = ago < 60 ? ago + 'm' : ago < 1440 ? Math.round(ago / 60) + 'h' : Math.round(ago / 1440) + 'd';
  const status = String(u.status || '?');
  const statusColor = status === 'pending' ? '#c93' : status === 'approved' ? '#2a7' : status === 'rejected' ? '#a44' : status === 'live' ? '#46a' : '#888';
  const sizeBytes = Number(u.sizeBytes);
  const sizeMb = Number.isFinite(sizeBytes) && sizeBytes > 0 ? (sizeBytes / 1048576).toFixed(1) + ' MB' : '?';
  const scan = u.scan;
  const v = u.verdict;
  const vColor = v && v.decision === 'pass' ? '#5ad19a' : v && v.decision === 'reject' ? '#f7768e' : '#ffd23f';
  const btn = 'font-size:11px;padding:4px 10px;margin-right:6px;border:1px solid var(--rule);background:transparent;color:var(--ink-soft);cursor:pointer;border-radius:4px;';
  const card = document.createElement('div');
  card.style.cssText = 'border:1px solid var(--rule);border-radius:6px;padding:14px 16px;margin-bottom:10px;background:var(--bg-card);';

  const head = document.createElement('div');
  head.style.cssText = 'display:flex;justify-content:space-between;align-items:baseline;';
  const title = document.createElement('strong');
  title.style.cssText = 'font-size:14px;';
  title.textContent = String(u.title || u.slug || '');
  const badge = makeAdminStatusBadge(status, statusColor);
  badge.style.padding = '1px 7px';
  head.append(title, badge);

  const meta = document.createElement('div');
  meta.style.cssText = 'font-size:12px;opacity:0.7;margin-top:3px;';
  meta.textContent = `by ${u.author || '?'} · ${u.contact || ''} · ${u.genre || ''} · ${sizeMb} · ${agoStr} ago`;
  card.append(head, meta);

  if (u.hook) {
    const hook = document.createElement('div');
    hook.style.cssText = 'font-size:13px;margin-top:6px;';
    hook.textContent = String(u.hook);
    card.appendChild(hook);
  }

  const scanLine = document.createElement('div');
  scanLine.style.cssText = scan ? 'font-size:12px;margin-top:6px;' : 'font-size:12px;margin-top:6px;opacity:0.5;';
  if (scan) {
    const scanStatus = document.createElement('b');
    scanStatus.style.color = scan.blocked ? '#f7768e' : '#5ad19a';
    scanStatus.textContent = scan.blocked ? 'BLOCKED' : 'clean';
    scanLine.append('Scan: ', scanStatus, ` · ${((scan.counts && scan.counts.block) || 0)} block, ${((scan.counts && scan.counts.warn) || 0)} warn`);
  } else {
    scanLine.textContent = 'Scan: not run yet';
  }
  card.appendChild(scanLine);

  const verdictLine = document.createElement('div');
  verdictLine.style.cssText = 'font-size:12px;margin-top:4px;';
  if (u.reviewRequested) {
    verdictLine.style.color = '#ffd23f';
    verdictLine.textContent = '⏳ AI check queued — the worker is running it on your Mac…';
  } else if (v) {
    const verdict = document.createElement('b');
    verdict.style.color = vColor;
    verdict.textContent = String(v.decision || '?');
    verdictLine.append('AI verdict: ', verdict);
    if (Array.isArray(v.notes) && v.notes.length) {
      verdictLine.append(' — ', String(v.notes[0]).slice(0, 180));
    }
  } else {
    verdictLine.style.opacity = '0.5';
    verdictLine.textContent = 'AI verdict: not checked yet';
  }
  card.appendChild(verdictLine);

  if (u.publishError) {
    const pubErr = document.createElement('div');
    pubErr.style.cssText = 'font-size:12px;margin-top:4px;color:#f7768e;';
    pubErr.textContent = `Publish failed: ${u.publishError} — fix & click approve again.`;
    card.appendChild(pubErr);
  } else if (status === 'approved') {
    const publishing = document.createElement('div');
    publishing.style.cssText = 'font-size:12px;margin-top:4px;color:#ffd23f;';
    publishing.textContent = '⏳ Publishing to the sandbox host…';
    card.appendChild(publishing);
  }

  if (status === 'rejected' && u.rejectReason) {
    const rej = document.createElement('div');
    rej.style.cssText = 'font-size:12px;margin-top:4px;color:#c88;';
    rej.textContent = `Rejected: ${u.rejectReason}${u.emailed ? '' : ' (email pending)'}`;
    card.appendChild(rej);
  }

  const actions = document.createElement('div');
  actions.style.cssText = 'margin-top:10px;';
  const actionButton = (act, label) => {
    const button = document.createElement('button');
    button.className = 'upload-act';
    button.dataset.id = String(u.key || '');
    button.dataset.act = act;
    button.style.cssText = btn;
    button.textContent = label;
    return button;
  };
  if (status === 'pending' || status === 'approved') {
    actions.append(actionButton('approve', 'approve'), actionButton('reject', 'reject'), actionButton('request-review', '⚡ AI check'));
  } else {
    actions.appendChild(actionButton('reset', 'reopen'));
  }
  actions.appendChild(actionButton('reassign', 'reassign owner'));
  card.appendChild(actions);

  return card;
}

function failCard(f) {
  f = f || {};
  const ts = Number(f.ts);
  const ago = Number.isFinite(ts) ? Math.max(0, Math.round((Date.now() - ts) / 60000)) : 0;
  const agoStr = ago < 60 ? ago + 'm' : ago < 1440 ? Math.round(ago / 60) + 'h' : Math.round(ago / 1440) + 'd';
  const sizeBytes = Number(f.sizeBytes);
  const sizeMb = Number.isFinite(sizeBytes) && sizeBytes > 0 ? (sizeBytes / 1048576).toFixed(1) + ' MB' : '?';
  const card = document.createElement('div');
  card.style.cssText = 'border:1px solid #5a2a2a;border-radius:6px;padding:10px 14px;margin-bottom:8px;background:rgba(160,68,68,0.06);';

  const head = document.createElement('div');
  head.style.cssText = 'display:flex;justify-content:space-between;align-items:baseline;gap:10px;';
  const title = document.createElement('strong');
  title.style.cssText = 'font-size:13px;';
  title.textContent = String(f.title || '(untitled)');
  const error = document.createElement('span');
  error.style.cssText = 'font-size:11px;color:#f7768e;font-family:var(--font-mono);white-space:nowrap;';
  error.textContent = String(f.error || '?');
  head.append(title, error);

  const meta = document.createElement('div');
  meta.style.cssText = 'font-size:12px;opacity:0.7;margin-top:3px;';
  meta.append(String(f.email || '?'), ' · ', String(f.filename || ''), ' · ', sizeMb, ` · ${agoStr} ago`);
  if (f.detail) {
    const detail = document.createElement('code');
    detail.style.color = '#f7768e';
    detail.textContent = String(f.detail);
    meta.append(' → ', detail);
  }
  card.append(head, meta);

  const files = Array.isArray(f.files) ? f.files : [];
  if (files.length) {
    const details = document.createElement('details');
    details.style.cssText = 'margin-top:6px;';
    const summary = document.createElement('summary');
    summary.style.cssText = 'cursor:pointer;font-size:11px;opacity:0.55;';
    summary.textContent = `${files.length} files in zip`;
    const list = document.createElement('div');
    list.style.cssText = 'font-size:11px;font-family:var(--font-mono);opacity:0.7;margin-top:4px;word-break:break-all;line-height:1.6;';
    files.forEach((file, index) => {
      if (index) list.appendChild(document.createElement('br'));
      list.append(String(file));
    });
    details.append(summary, list);
    card.appendChild(details);
  }

  return card;
}

document.addEventListener('click', async (e) => {
  const t = e.target;
  if (t && t.classList && t.classList.contains('upload-act')) {
    e.preventDefault();
    const id = t.dataset.id;
    const act = t.dataset.act;
    let reason = null, email = null;
    if (act === 'reject') {
      reason = prompt('Reject reason (will be emailed to the submitter):', '');
      if (reason === null || reason.trim().length < 3) return;
    }
    if (act === 'reassign') {
      email = prompt('Reassign to which email? The game gets credited to this account and shows up when they sign in.', '');
      if (email === null || !email.trim()) return;
    }
    t.disabled = true;
    const r = await adminFetch('/api/admin/uploads', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ id, action: act, reason, email }),
    });
    if (r.ok) loadUploads();
    else { t.disabled = false; alert('Failed: ' + r.status); }
  }
});

async function hydrateFeedbackImages() {
  const imgs = Array.from(document.querySelectorAll('img.feedback-img[data-slug][data-id]'));
  await Promise.all(imgs.map(async img => {
    const slug = img.dataset.slug || '';
    const id = img.dataset.id || '';
    try {
      const r = await adminFetch(`/api/admin/feedback-image?slug=${encodeURIComponent(slug)}&id=${encodeURIComponent(id)}`, { cache: 'no-store' });
      if (!r.ok) return;
      const url = URL.createObjectURL(await r.blob());
      img.src = url;
      const a = img.closest('a.feedback-img-link');
      if (a) a.href = url;
    } catch (e) { /* best effort */ }
  }));
}

function safeAdminHref(url) {
  try {
    const parsed = new URL(String(url), location.href);
    return (parsed.protocol === 'http:' || parsed.protocol === 'https:') ? parsed.href : '';
  } catch (e) {
    return '';
  }
}

function renderPublishBoard(d) {
  const fragment = document.createDocumentFragment();
  const heading = adminNode('h2', { style: 'margin-top:36px' },
    'Publish board ',
    adminNode('span', { style: 'font-size:12px;color:#8a8aa0;font-weight:400', text: "— what's live / in moderation / ready, per platform" })
  );
  fragment.appendChild(heading);

  const ps = d.publishStatus;
  if (!ps || !ps.games) {
    fragment.appendChild(adminNode('p', {
      style: 'color:#8a8aa0;font-size:12px',
      text: 'publish-status.json not loaded — run build_dashboard.py + sync_games.sh.',
    }));
    return fragment;
  }

  const perGame = Array.isArray(d.perGame) ? d.perGame : [];
  const titleFor = (slug) => (perGame.find(x => x.slug === slug) || {}).title || slug;
  const sum = ps.summary || {};
  const sy = sum.yandex || {}, sc = sum.crazygames || {}, sgp = sum.gamepush || {};
  const platLabels = { yandex: 'Yandex', crazygames: 'CrazyGames', gamedistribution: 'GameDistribution', gamepush: 'GamePush' };
  const badge = (p) => {
    if (!p || !p.status) return adminNode('span', { style: 'color:#5a5a6a', text: '—' });
    const s = String(p.status);
    const href = safeAdminHref(p.url || p.developerUrl || '');
    const link = (text, style) => {
      if (!href) return adminNode('span', { style, text: text.replace(' ↗', '') });
      const a = adminNode('a', { style, text });
      a.href = href;
      a.target = '_blank';
      a.rel = 'noopener';
      return a;
    };
    if (s === 'live') return link('● live ↗', 'color:#3ad17a;font-weight:600;text-decoration:none');
    if (s === 'approved') return adminNode('span', { style: 'color:#3ad17a', text: '✓ approved' });
    if (s === 'submitted') return link('⏳ in mod ↗', 'color:#ffd23f;text-decoration:none');
    if (s === 'built') return adminNode('span', { style: 'color:#7aa2f7', text: '◆ ready' });
    if (s === 'rejected') return adminNode('span', { style: 'color:#f7768e', text: '✗ rejected' });
    if (s === 'removed') return adminNode('span', { style: 'color:#a55', text: '⊘ removed' });
    if (s === 'not_started' || s === 'n/a') return adminNode('span', { style: 'color:#5a5a6a', text: '—' });
    return adminNode('span', { style: 'opacity:0.6', text: s });
  };

  const summary = adminNode('p', { style: 'color:#8a8aa0;font-size:12px;margin:-6px 0 10px' });
  summary.textContent = `Source of truth (from status.json, generated ${String(ps.generated || '').slice(0, 16)}). Yandex ${sy.live || 0} live · ${sy.submitted || 0} in mod | CrazyGames ${sc.live || 0} live · ${sc.submitted || 0} in mod | GamePush ${sgp.built || 0} ready. Tell Claude "publish <game> to <platform>" — it auto-submits and updates this board.`;
  fragment.appendChild(summary);

  const ready = [];
  for (const slug of Object.keys(ps.games)) {
    const g = ps.games[slug] || {};
    if ((g.readyPlatforms || []).length && g.engagement) {
      ready.push({ title: titleFor(slug), eng: g.engagement, ready: g.readyPlatforms });
    }
  }
  ready.sort((a, b) => (b.eng.seconds - a.eng.seconds) || (b.eng.plays7d - a.eng.plays7d));
  const readyTop = ready.slice(0, 12);
  if (readyTop.length) {
    const box = adminNode('div', { style: 'background:rgba(122,162,247,0.08);border:1px solid rgba(122,162,247,0.25);border-radius:6px;padding:10px 12px;margin-bottom:14px' });
    box.appendChild(adminNode('div', {
      style: 'font-weight:600;color:#7aa2f7;font-size:13px;margin-bottom:6px',
      text: '◆ Ready to publish — built, has plays, missing platforms',
    }));
    readyTop.forEach((r) => {
      const line = adminNode('div', { style: 'font-size:12px;margin:3px 0' });
      line.append(
        adminNode('b', { style: 'color:#e7e7ee', text: r.title }),
        ' ',
        adminNode('span', { style: 'color:#8a8aa0', text: `${r.eng.plays7d}p · 👍${r.eng.likes}` }),
        ' → open on: ',
        (r.ready || []).map(p => platLabels[p] || p).join(', ')
      );
      box.appendChild(line);
    });
    fragment.appendChild(box);
  }

  const { table, tbody } = makeAdminTable(['Game', 'Yandex', 'CrazyGames', 'GameDistr.', 'GamePush', 'Other']);
  for (const slug of Object.keys(ps.games)) {
    const g = ps.games[slug] || {};
    const pl = g.platforms || {};
    const row = document.createElement('tr');
    const gameCell = appendAdminCell(row, null);
    gameCell.appendChild(adminNode('div', { style: 'color:#e7e7ee;font-weight:600', text: titleFor(slug) }));
    const slugLine = adminNode('div', { style: 'font-size:11px;color:#6a6a7a' });
    slugLine.append(String(slug));
    if (g.engagement) {
      slugLine.appendChild(adminNode('span', {
        style: 'font-size:11px;color:#8a8aa0',
        text: ` ${g.engagement.plays7d}p·👍${g.engagement.likes}/👎${g.engagement.dislikes}`,
      }));
    }
    gameCell.appendChild(slugLine);
    appendAdminCell(row, null).appendChild(badge(pl.yandex));
    appendAdminCell(row, null).appendChild(badge(pl.crazygames));
    appendAdminCell(row, null).appendChild(badge(pl.gamedistribution));
    appendAdminCell(row, null).appendChild(badge(pl.gamepush));
    const otherCell = appendAdminCell(row, null, { style: 'font-size:11px' });
    const other = g.other && typeof g.other === 'object' ? g.other : null;
    const otherKeys = other ? Object.keys(other) : [];
    if (!otherKeys.length) {
      otherCell.appendChild(adminNode('span', { style: 'color:#5a5a6a', text: '—' }));
    } else {
      otherKeys.forEach((k, index) => {
        const p = other[k] || {};
        if (index) otherCell.append(' ');
        otherCell.append(String(k), ':');
        const href = safeAdminHref(p.url || '');
        if (href) {
          const a = adminNode('a', { style: 'color:#3ad17a', text: `${p.status || '?'}↗` });
          a.href = href;
          a.target = '_blank';
          a.rel = 'noopener';
          otherCell.appendChild(a);
        } else {
          otherCell.append(String(p.status || '?'));
        }
      });
    }
    tbody.appendChild(row);
  }
  fragment.appendChild(table);

  const untracked = Array.isArray(ps.untracked) ? ps.untracked : [];
  if (untracked.length) {
    const p = adminNode('p', { style: 'color:#8a8aa0;font-size:11px;margin-top:8px' });
    p.append(
      adminNode('b', { text: `${untracked.length} untracked-but-played` }),
      ' (no status entry yet — publish candidates): ',
      untracked.slice(0, 10).map(u => `${u.slug} (${u.engagement && u.engagement.plays7d}p)`).join(', ')
    );
    fragment.appendChild(p);
  }
  return fragment;
}

function render(d) {
  const fmt = n => Math.round(Number(n) || 0).toLocaleString();
  const fmtMin = sec => {
    const value = Number(sec) || 0;
    return value < 60 ? value + 's' : value < 3600 ? Math.round(value / 60) + 'm' : (value / 3600).toFixed(1) + 'h';
  };
  const perGame = Array.isArray(d.perGame) ? d.perGame : [];
  const perDay = d.perDay || {};
  const dates = Object.keys(perDay);
  const dayValues = dates.map(date => (perDay[date] && perDay[date].totalSeconds) || 0);
  const maxDay = Math.max(1, ...dayValues);
  const totals = d.totals || {};

  renderMeta({ ...d, perGame });

  const h = d.highlights || {};
  const titleFor = slug => {
    const g = perGame.find(x => x.slug === slug);
    return g ? (g.title || slug) : slug;
  };
  const deltaSign = h.secondsDelta > 0 ? '↑' : h.secondsDelta < 0 ? '↓' : '·';
  const deltaCls = h.secondsDelta > 0 ? 'pos' : h.secondsDelta < 0 ? 'neg' : 'zero';
  const deltaTxt = `${deltaSign} ${fmtMin(Math.abs(h.secondsDelta || 0))} vs yesterday`;
  const fragment = document.createDocumentFragment();

  const pulse = adminNode('div', { className: 'pulse', style: 'background:linear-gradient(135deg,#14142a 0%,#1a1d3a 100%);border:1px solid rgba(77,208,225,0.18);border-radius:14px;padding:18px 22px;margin-bottom:24px' });
  const pulseHead = adminNode('div', { style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px' });
  const pulseTitle = adminNode('div', { style: 'font-size:18px;font-weight:700;color:#f7f7fa' }, "Today's Pulse ");
  pulseTitle.appendChild(adminNode('span', { style: 'color:#8a8aa0;font-weight:400;font-size:13px', text: h.todayDate || '' }));
  pulseHead.append(pulseTitle, adminNode('div', { className: `ratio-cell ${deltaCls}`, style: 'font-size:12px', text: deltaTxt }));
  const pulseGrid = adminNode('div', { style: 'display:grid;grid-template-columns:1fr 1fr;gap:24px' });
  const todayCol = adminNode('div');
  todayCol.append(
    adminNode('div', { style: 'color:#8a8aa0;font-size:12px;text-transform:uppercase;letter-spacing:0.06em', text: 'Today played' }),
    adminNode('div', { style: 'font-size:24px;font-weight:800;color:#4dd0e1;margin-top:2px', text: fmtMin(h.todaySeconds || 0) })
  );
  if (h.todayTop) {
    todayCol.appendChild(adminNode('div', { style: 'margin-top:6px' },
      adminNode('strong', { text: titleFor(h.todayTop.slug) }),
      ` · ${fmtMin(h.todayTop.seconds)} played today`
    ));
  } else {
    todayCol.appendChild(adminNode('div', { style: 'color:#6a6a82;margin-top:6px', text: 'No plays today yet' }));
  }
  if (h.newCommentsCount > 0) {
    todayCol.appendChild(adminNode('div', { style: 'margin-top:10px;font-size:13px;color:#ffd23f', text: `📝 ${h.newCommentsCount} new comment(s) in last 24h` }));
  }
  const queueCol = adminNode('div');
  queueCol.appendChild(adminNode('div', { style: 'color:#8a8aa0;font-size:12px;text-transform:uppercase;letter-spacing:0.06em', text: "Tomorrow's iteration queue" }));
  const queue = adminNode('div', { style: 'margin-top:6px;font-size:13px' });
  const iterationQueue = Array.isArray(h.iterationQueue) ? h.iterationQueue : [];
  if (iterationQueue.length) {
    iterationQueue.slice(0, 3).forEach((g, i) => {
      const row = adminNode('div', { style: `display:flex;justify-content:space-between;padding:6px 0;border-bottom:${i < Math.min(2, iterationQueue.length - 1) ? '1px solid rgba(255,255,255,0.04)' : 'none'}` });
      row.append(
        adminNode('span', {}, adminNode('strong', { text: `#${i + 1}` }), ` ${titleFor(g.slug)}`),
        adminNode('span', { style: 'color:#8a8aa0;font-size:12px', text: `${g.plays}p · ${g.avgSec}s avg · 👍${g.likes} · score ${Math.round(g.engagement)}` })
      );
      queue.appendChild(row);
    });

    queue.appendChild(adminNode('div', { style: 'color:#6a6a82', text: 'No games passed eligibility threshold (likes≥3 OR plays≥5+30s avg)' }));
  }
  queueCol.appendChild(queue);
  pulseGrid.append(todayCol, queueCol);
  pulse.append(pulseHead, pulseGrid);
  fragment.appendChild(pulse);

  const totalsGrid = adminNode('div', { className: 'totals' });
  const stat = (label, value) => adminNode('div', { className: 'stat' },
    adminNode('div', { className: 'label', text: label }),
    adminNode('div', { className: 'value', text: value })
  );
  totalsGrid.append(
    stat('Total plays', fmt(totals.plays)),
    stat('Total time', fmtMin(totals.seconds)),
    stat('👍 Likes', fmt(totals.likes)),
    stat('👎 Dislikes', fmt(totals.dislikes))

  fragment.appendChild(totalsGrid);

  fragment.appendChild(adminNode('h2', { text: 'Per-game (sorted by total time)' }));
  const gamesTable = makeAdminTable(['Game', 'Plays', 'Time', 'Avg/play', '👍', '👎', 'Net']);

    div.id = id;
    div.appendChild(adminPanelMessage(text));

  };

  fragment.append(
    sectionHeading('Least attention', '(attention = plays + votes*3 + comments*5, ascending; 48h grace; hidden/external excluded - triage: fix or kill)', 'refresh-least', '↻ Refresh'),

    const abTable = makeAdminTable(['Game', 'Variants', 'Click split', 'Total clicks', 'Winner']);

    abGames.forEach((g) => {

      const total = Object.values(variants).reduce((a, b) => a + b, 0);
      const variantNums = Array.from({ length: g.thumbCount }, (_, i) => i + 1);
      const winner = total > 0 ? variantNums.reduce((best, v) => (variants[v] || 0) > (variants[best] || 0) ? v : best, 1) : null;
      const row = document.createElement('tr');
      const gameCell = appendAdminCell(row, null);
      gameCell.append(adminNode('div', { style: 'color:#e7e7ee;font-weight:600', text: g.title || g.slug }), adminNode('div', { className: 'slug', style: 'font-size:11px', text: g.slug }));
      appendAdminCell(row, g.thumbCount, { className: 'num' });
      const splitCell = appendAdminCell(row, null);
      variantNums.forEach((v) => {
        const c = variants[v] || 0;
        const pct = total > 0 ? Math.round(c * 100 / total) : 0;
        splitCell.appendChild(adminNode('span', { style: `margin-right:10px;${winner === v ? 'font-weight:700;color:#2ecc71' : ''}`, text: `v${v}: ${c} (${pct}%)` }));
      });
      appendAdminCell(row, total, { className: 'num' });
      appendAdminCell(row, null).appendChild(winner ? adminNode('span', { className: 'ratio-cell pos', text: `v${winner}` }) : adminNode('span', { className: 'ratio-cell zero', text: 'no data' }));
      abTable.tbody.appendChild(row);
    });
    fragment.appendChild(abTable.table);

  fragment.append(
    sectionHeading('Retention (D1/D7)', '(anonymous cohorts — directional at low traffic)', 'refresh-retention', '↻ Refresh'),
    panel('retention-panel')
  );
  const funnelPanel = panel('funnel-panel', 'Loading...');
  const funnelHeading = adminNode('h2', { style: 'display:flex;align-items:center;justify-content:space-between;gap:12px;' });
  const funnelTitle = adminNode('span', {}, 'First-60s funnel ');
  funnelTitle.appendChild(adminNode('span', { style: 'opacity:0.5;font-weight:400;font-size:14px', text: '(boot to first input to alive 1/2/5 min - gallery sessions only)' }));
  const funnelSelect = adminNode('select', { style: 'font-family:var(--font-mono);font-size:11px;padding:6px 8px;border:1px solid var(--rule);background:var(--bg-card);color:var(--ink);border-radius:4px;max-width:260px;' });
  funnelSelect.id = 'funnel-slug';
  const funnelButton = adminNode('button', { style: miniButtonStyle, text: 'Refresh' });
  funnelButton.id = 'refresh-funnel';
  const controls = adminNode('span', { style: 'display:flex;align-items:center;gap:8px;' }, funnelSelect);
  controls.appendChild(funnelButton);
  funnelHeading.append(funnelTitle, controls);
  fragment.append(funnelHeading, funnelPanel);

  fragment.append(
    sectionHeading('User digests', '(PostHog-derived per-visitor summaries)', 'refresh-user-digests', '↻ Regenerate'),
    panel('user-digests')
  );

  const comments = Array.isArray(d.comments) ? d.comments : [];
  if (comments.length) {
    fragment.appendChild(adminNode('h2', { text: `Recent player comments (${comments.length})` }));
    const commentsTable = makeAdminTable(['When', 'Game', 'Vote', 'Comment', 'Image']);
    comments.forEach((c) => {
      const ts = Number(c.ts);
      const ago = Number.isFinite(ts) ? Math.round((Date.now() - ts) / 60000) : null;
      const agoStr = ago == null ? '?' : ago < 60 ? ago + 'm' : ago < 1440 ? Math.round(ago / 60) + 'h' : Math.round(ago / 1440) + 'd';
      const voteEmoji = c.vote === 'like' ? '👍' : c.vote === 'dislike' ? '👎' : '·';
      const imageIds = Array.isArray(c.imageIds) && c.imageIds.length ? c.imageIds : (c.imageId ? [c.imageId] : []);
      const row = document.createElement('tr');
      appendAdminCell(row, `${agoStr} ago`, { style: 'color:#8a8aa0;font-size:12px;white-space:nowrap' });
      appendAdminCell(row, c.slug || '', { className: 'slug' });
      appendAdminCell(row, voteEmoji);
      appendAdminCell(row, c.comment || '');
      const imgCell = appendAdminCell(row, null);
      if (imageIds.length) {
        const wrap = adminNode('div', { style: 'display:flex;gap:6px;flex-wrap:wrap;max-width:220px;' });
        imageIds.forEach((id, i) => {
          const a = adminNode('a', { className: 'feedback-img-link' });

          a.target = '_blank';

          a.title = `Screenshot ${i + 1}`;

          a.dataset.id = String(id);

        imgCell.appendChild(adminNode('span', { style: 'color:#3a3a45', text: '—' }));

    sectionHeading('Community uploads', '(submitted via /submit — review before publishing)', 'refresh-uploads', '↻ Refresh'),

    sectionHeading('Hidden games', '(curated out of the public grid — a low-quality signal for the factory)', 'refresh-hidden', '↻ Refresh'),
    panel('hidden-panel'),

  const chartGrid = adminNode('div', { className: 'chart-grid' });
  dates.forEach((date, i) => {
    const sec = dayValues[i];
    const bar = adminNode('div', { className: 'chart-bar', style: `height:${Math.max(2, (sec / maxDay) * 140)}px` });

    chartGrid.appendChild(bar);
  });
  const labels = adminNode('div', { className: 'chart-labels' });
  dates.forEach((date) => labels.appendChild(adminNode('span', { text: date.slice(5) })));
  chart.append(chartGrid, labels);
  fragment.appendChild(chart);

  document.getElementById('content').replaceChildren(fragment);
}

// Turn the long flat dashboard into tabs: a sticky button bar at the top, one
// panel per <h2> section (content before the first h2 = the "Pulse" tab). Runs
// AFTER render() each load; the async loaders (digests/uploads/suggestions)
// still populate their divs by id since the nodes are only re-parented, not
// removed. Best-effort: any error leaves the dashboard rendered flat.
function tabifyContent() {
  try {
    const content = document.getElementById('content');
    // Structural guard (NOT a dataset flag on #content): render() replaces
    // content children but not attributes, so a flag would survive the
    // visibilitychange re-render and make tabs vanish. Detect the tab bar
    // as a child instead — render() rebuilds flat children, so it re-tabs.
    if (!content || (content.firstElementChild && content.firstElementChild.dataset.tabbar === '1')) return;
    const kids = Array.from(content.children);
    if (kids.length < 3) return;
    const labelFor = (txt) => {
      const t = (txt || '').toLowerCase();
      if (t.includes('per-game')) return 'Games';
      if (t.includes('publish board')) return 'Publish';
      if (t.includes('least attention')) return 'Least attention';
      if (t.includes('a/b')) return 'A/B';
      if (t.includes('user digests')) return 'Digests';
      if (t.includes('player comments')) return 'Comments';
      if (t.includes('community uploads')) return 'Uploads';
      if (t.includes('player suggestions')) return 'Suggestions';
      if (t.includes('last 14 days')) return 'Trends';
      return (txt || 'Section').trim().split(/\s+/).slice(0, 2).join(' ') || 'Section';
    };
    const sections = [];
    let cur = { label: 'Pulse', nodes: [] };
    for (const node of kids) {
      if (node.tagName === 'H2') {
        if (cur.nodes.length) sections.push(cur);
        cur = { label: labelFor(node.textContent), nodes: [node] };
      } else {
        cur.nodes.push(node);
      }
    }
    if (cur.nodes.length) sections.push(cur);
    if (sections.length < 2) return;

    const bar = document.createElement('div');
    bar.dataset.tabbar = '1';
    bar.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin:0 0 20px;position:sticky;top:0;background:#0e0e12;padding:10px 0;z-index:5;border-bottom:1px solid rgba(255,255,255,0.08)';
    const panelsWrap = document.createElement('div');
    content.insertBefore(bar, content.firstChild);
    content.appendChild(panelsWrap);

    const activate = (idx) => {
      Array.from(panelsWrap.children).forEach((p, i) => { p.style.display = i === idx ? '' : 'none'; });
      Array.from(bar.children).forEach((b, i) => {
        const on = i === idx;
        b.style.background = on ? '#4dd0e1' : 'transparent';
        b.style.color = on ? '#0e0e12' : '#b8b8c8';
        b.style.borderColor = on ? '#4dd0e1' : 'rgba(255,255,255,0.15)';
        b.style.fontWeight = on ? '700' : '500';
      });
      try { sessionStorage.setItem('adminTab', String(idx)); } catch (e) {}
    };

    sections.forEach((s, i) => {
      const panel = document.createElement('div');
      panelsWrap.appendChild(panel);
      s.nodes.forEach(n => panel.appendChild(n));
      const btn = document.createElement('button');
      btn.textContent = s.label;
      btn.style.cssText = 'font-family:var(--font-mono,monospace);font-size:12px;padding:7px 14px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:#b8b8c8;cursor:pointer;border-radius:6px;letter-spacing:0.04em;white-space:nowrap';
      btn.addEventListener('click', () => activate(i));
      bar.appendChild(btn);
    });

    let saved = 0;
    try { saved = parseInt(sessionStorage.getItem('adminTab') || '0', 10) || 0; } catch (e) {}
    activate(saved >= 0 && saved < sections.length ? saved : 0);
  } catch (e) { /* best-effort: leave dashboard as-rendered */ }
}
</script>
</body>
</html>
