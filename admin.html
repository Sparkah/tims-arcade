<!DOCTYPE html>
<html lang="en" data-theme="lab">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin · Tim's Game Lab</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <meta name="theme-color" content="#0e0e12">

  <link rel="stylesheet" href="/style.css?v=4a0fe678">
  <style>
    body { background: var(--bg); color: var(--ink); font-family: var(--font-body); min-height: 100vh; }

    .admin-wrap { max-width: 1100px; margin: 30px auto; padding: 0 20px 60px; }
    .admin-wrap h1 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 36px;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .admin-wrap .sub {
      font-family: var(--font-mono);
      color: var(--ink-muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    .totals { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .stat {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      padding: 16px;
    }
    .stat .label {
      font-family: var(--font-mono);
      color: var(--ink-muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: var(--tracking-cap);
    }
    .stat .value {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 500;
      color: var(--ink);
      margin-top: 4px;
      letter-spacing: -0.02em;
    }
    .stat .value .unit { font-size: 14px; color: var(--ink-muted); font-weight: 400; margin-left: 4px; }

    h2 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 36px 0 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      overflow: hidden;
    }
    table th, table td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--rule-soft);
      font-size: 14px;
    }
    table th {
      font-family: var(--font-mono);
      color: var(--ink-muted);
      font-weight: 500;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: var(--tracking-cap);
      background: var(--bg);
    }
    table td { color: var(--ink); font-family: var(--font-body); }
    table td.num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; text-align: right; }
    table td.slug { color: var(--accent); font-family: var(--font-mono); font-size: 12px; }
    table tbody tr:last-child td { border-bottom: none; }
    table tbody tr:hover td { background: var(--rule-soft); }

    .ratio-cell {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
    }
    .ratio-cell.pos  { background: var(--accent-soft); color: var(--accent); }
    .ratio-cell.neg  { background: rgba(200,69,31,0.12); color: var(--warn); }
    .ratio-cell.zero { background: var(--rule-soft); color: var(--ink-muted); }

    .chart {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      padding: 16px 18px;
    }
    .chart-grid { display: flex; gap: 4px; align-items: flex-end; height: 140px; }
    .chart-bar {
      flex: 1;
      background: var(--accent);
      min-height: 2px;
      border-radius: 2px 2px 0 0;
      position: relative;
      opacity: 0.85;
    }
    .chart-bar:hover { opacity: 1; }
    .chart-bar .tip {
      position: absolute;
      bottom: 100%; left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      background: var(--ink);
      color: var(--bg-card);
      font-family: var(--font-mono);
      padding: 4px 8px;
      border-radius: var(--radius);
      font-size: 11px;
      margin-bottom: 6px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
      z-index: 5;
    }
    .chart-bar:hover .tip { opacity: 1; }
    .chart-labels {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-muted);
    }
    .chart-labels span { flex: 1; text-align: center; }

    .err {
      background: rgba(200,69,31,0.08);
      border: 1px solid var(--warn);
      padding: 16px;
      border-radius: var(--radius-card);
      color: var(--warn);
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .login-form { max-width: 320px; margin: 80px auto; font-family: var(--font-body); }
    .login-form input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      color: var(--ink);
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
    }
    .login-form input:focus { border-color: var(--accent); }
    .login-form button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: var(--ink);
      color: var(--bg-card);
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }
    .login-form button:hover { background: var(--accent); }
  </style>
</head>
<body>
<div class="admin-wrap">
  <h1>Tim's Game Lab — Admin</h1>
  <p class="sub" id="meta"></p>

  <div id="content"></div>
</div>

<script>
let lastLoadAt = 0;
let adminSignedIn = false;
const MIN_REFRESH_MS = 30 * 1000;   // don't refetch more than once per 30s

load();

// Auto-refresh when the tab comes back into focus, but only if data
// has been on screen for >30s. Server-side cache is 5 min anyway, so
// frequent tab-switches don't actually re-walk KV.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  if (!adminSignedIn) return;
  if (Date.now() - lastLoadAt < MIN_REFRESH_MS) return;
  load();
});

function showLogin(message = '') {
  adminSignedIn = false;
  document.getElementById('content').innerHTML = `
    <div class="login-form">
      ${message ? `<div class="err" style="margin-bottom:12px">${escapeHtml(message)}</div>` : ''}
      <form id="admin-login-form" action="/api/auth/request" method="POST">
        <label for="admin-email" style="display:block;color:#8a8aa0;margin-bottom:8px;font-size:13px">Admin email</label>
        <input id="admin-email" name="email" type="email" autocomplete="username" required enterkeyhint="done" placeholder="you@example.com">
        <button id="go" type="submit">Send sign-in link</button>
      </form>
      <p id="login-note" style="color:#8a8aa0;margin-top:10px;font-size:12px;line-height:1.4">Use an email listed in ADMIN_EMAILS.</p>
    </div>
  `;
  document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('admin-email');
    const btn = document.getElementById('go');
    const note = document.getElementById('login-note');
    const email = input.value.trim();
    if (!email) return;
    btn.disabled = true;
    btn.textContent = 'Sending...';
    note.textContent = 'Sending sign-in link...';
    try {
      const r = await fetch('/api/auth/request', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ email, next: '/admin.html' }),
      });
      if (r.ok || r.status === 204) {
        note.textContent = 'Check your inbox. The link expires in 15 minutes.';
        document.getElementById('admin-login-form').style.display = 'none';
        return;
      }
      if (r.status === 429) note.textContent = 'Too many sign-in requests. Wait a few minutes.';
      else if (r.status === 502) note.textContent = 'Sign-in email failed to send.';
      else note.textContent = 'Could not send sign-in link.';
    } catch (err) {
      note.textContent = 'Network error. Try again.';
    }
    btn.disabled = false;
    btn.textContent = 'Send sign-in link';
  });
}

function adminFetch(url, options = {}) {
  return fetch(url, {
    ...options,
    headers: { ...(options.headers || {}) },
    credentials: 'same-origin',
  });
}

async function load() {
  document.getElementById('content').innerHTML = '<p style="color:#8a8aa0">Loading...</p>';
  lastLoadAt = Date.now();
  try {
    const [statsRes, gamesRes, publishRes] = await Promise.all([
      adminFetch('/api/admin/stats', { cache: 'no-store' }),
      fetch('/games.json', { cache: 'no-store' }),
      adminFetch('/api/admin/publish-status', { cache: 'no-store' }),
    ]);
    if (statsRes.status === 403) {
      showLogin('Sign in with an allowed admin email.');
      return;
    }
    if (!statsRes.ok) {
      const err = await statsRes.json().catch(() => ({error: 'http ' + statsRes.status}));
      document.getElementById('content').innerHTML = `<div class="err">Error: ${escapeHtml(err.error || statsRes.status)}</div>`;
      return;
    }
    adminSignedIn = true;
    const stats = await statsRes.json();
    const games = gamesRes.ok ? await gamesRes.json() : [];
    adminTitleBySlug = {};
    for (const g of games) adminTitleBySlug[g.slug] = g.title || g.slug;

    // Use games.json as the canonical list of slugs, merging in stats
    const statsBySlug = {};
    for (const g of stats.perGame) statsBySlug[g.slug] = g;

    const merged = games.map(g => {
      const s = statsBySlug[g.slug] || { plays: 0, seconds: 0, likes: 0, dislikes: 0 };
      return {
        slug: g.slug, title: g.title,
        plays: s.plays, seconds: s.seconds, likes: s.likes, dislikes: s.dislikes,
        thumbCount: g.thumbCount || 1,
        variants: s.variants || {},
      };
    });
    stats.abGames = merged.filter(g => g.thumbCount > 1);
    // Sort by total seconds (desc), then plays
    merged.sort((a, b) => (b.seconds - a.seconds) || (b.plays - a.plays));

    stats.publishStatus = (publishRes && publishRes.ok) ? await publishRes.json().catch(() => null) : null;
    stats.perGame = merged;
    render(stats);
    tabifyContent();
    hydrateFeedbackImages();

    // Lazy-load user digests after stats render so the page paints immediately.
    loadUserDigests().catch(e => console.error('user-digests:', e));
    loadSuggestions().catch(e => console.error('suggestions:', e));
    loadUploads().catch(e => console.error('uploads:', e));
    loadHidden().catch(e => console.error('hidden:', e));
    loadRetention().catch(e => console.error('retention:', e));
    { const rb = document.getElementById('refresh-retention'); if (rb) rb.onclick = () => loadRetention(); }
    loadFunnel().catch(e => console.error('funnel:', e));
    { const fb = document.getElementById('refresh-funnel'); if (fb) fb.onclick = () => loadFunnel(); }
    loadLeastAttention().catch(e => console.error('least-attention:', e));
    { const lb = document.getElementById('refresh-least'); if (lb) lb.onclick = () => loadLeastAttention({ force: true }); }
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="err">Network error: ${e.message}</div>`;
  }
}

async function loadRetention() {
  const el = document.getElementById('retention-panel');
  if (!el) return;
  el.innerHTML = '<div style="opacity:0.5;font-style:italic;padding:12px 0;">Loading retention…</div>';
  try {
    const r = await adminFetch('/api/admin/cohorts', { cache: 'no-store' });
    if (!r.ok) { const e = await r.json().catch(() => ({})); el.innerHTML = `<div class="err">Retention: ${e.error || r.status}</div>`; return; }
    const d = await r.json();
    const H = d.horizons || [1, 3, 7, 14, 30];
    const cell = (x) => x === null ? '<span style="opacity:0.3">·</span>'
      : `${x.pct}%<span style="opacity:0.4;font-size:11px"> ±${x.ciHalf}</span>${x.lowSample ? '<span title="low sample (n<10)" style="opacity:0.5">*</span>' : ''}`;
    const sum = d.summary || { byHorizon: {}, totalUsers: 0 };
    const head = H.map(h => {
      const s = sum.byHorizon['d' + h];
      return `<span style="margin-right:20px"><b style="color:var(--accent,#7cf)">D${h}</b> ${s ? `${s.pct}% <span style="opacity:0.5;font-size:11px">(n=${s.users})</span>` : '<span style="opacity:0.35">pending</span>'}</span>`;
    }).join('');
    const rows = (d.cohorts || []).slice().reverse().map(c => {
      const cells = H.map(h => `<td style="text-align:right;padding:3px 10px;border-bottom:1px solid var(--rule,#222)">${cell(c.retention['d' + h])}</td>`).join('');
      return `<tr><td style="padding:3px 10px;border-bottom:1px solid var(--rule,#222)">${c.date}</td><td style="text-align:right;padding:3px 10px;border-bottom:1px solid var(--rule,#222)">${c.n}</td>${cells}</tr>`;
    }).join('');
    el.innerHTML =
      `<div style="margin-bottom:8px;font-size:15px">${head}</div>` +
      `<div style="opacity:0.55;font-size:11px;margin-bottom:10px">${sum.totalUsers} unique users · internal excluded: ${d.internalExcluded || 0} · * low sample · "·" = cohort not mature yet</div>` +
      (rows
        ? `<table style="border-collapse:collapse;font-family:var(--font-mono,monospace);font-size:12px"><thead><tr><th style="text-align:left;padding:3px 10px">cohort (first seen)</th><th style="text-align:right;padding:3px 10px">users</th>${H.map(h => `<th style="text-align:right;padding:3px 10px">D${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>`
        : '<div style="opacity:0.5;font-style:italic">No cohort data yet — accumulates as users play (first-seen + return days). Live since this deploy.</div>') +
      `<div style="opacity:0.4;font-size:11px;margin-top:8px">${d.caveat || ''}</div>`;
  } catch (e) {
    el.innerHTML = `<div class="err">Retention: ${e.message}</div>`;
  }
}

function disableGameTelemetryPanels() {
  const msg = 'Game analytics moved to GameAnalytics. Cloudflare is reserved for platform retention and operations.';
  const panels = [
    ['funnel-panel', 'funnel-slug', 'refresh-funnel'],
    ['level-funnel-panel', 'level-funnel-slug', 'refresh-level-funnel'],
  ];
  for (const [panelId, selectId, buttonId] of panels) {
    const panel = document.getElementById(panelId);
    if (panel) panel.innerHTML = `<div style="opacity:0.55;font-style:italic;padding:12px 0;">${msg}</div>`;
    const sel = document.getElementById(selectId);
    if (sel) sel.disabled = true;
    const btn = document.getElementById(buttonId);
    if (btn) { btn.disabled = true; btn.style.opacity = '0.45'; btn.style.cursor = 'default'; }
  }
}

// Deprecated game funnel panels. Game analytics now belongs in GameAnalytics;
// Cloudflare is reserved for Game Factory platform retention and operations.
let funnelData = null;
let levelFunnelData = null;
async function loadFunnel() { disableGameTelemetryPanels(); }
function renderFunnel() { disableGameTelemetryPanels(); }
function populateLevelFunnelSelect(selected) {
  const sel = document.getElementById('level-funnel-slug');
  if (sel) { sel.innerHTML = ''; sel.disabled = true; }
  return selected || '';
}
async function loadLevelFunnel() { disableGameTelemetryPanels(); }
function renderLevelFunnel() { disableGameTelemetryPanels(); }

// Titles for panels that load outside render(d)'s scope (least-attention).
let adminTitleBySlug = {};

// Least attention - the bottom of the attention ranking (same data the
// public "Hidden Gems" shelf uses, honest label here). Sorted ascending so
// the most-neglected games lead; rows with zero votes AND zero comments are
// flagged since "0 likes / 0 comments" is the triage question.
async function loadLeastAttention({ force } = {}) {
  const el = document.getElementById('least-attention-panel');
  if (!el) return;
  el.innerHTML = '<div style="opacity:0.5;font-style:italic;padding:12px 0;">Loading least-attention ranking…</div>';
  try {
    const r = await adminFetch('/api/least-attention?limit=100' + (force ? '&nocache=1' : ''), { cache: 'no-store' });
    if (!r.ok) { el.innerHTML = `<div class="err">Least attention: http ${r.status}</div>`; return; }
    const d = await r.json();
    const list = d.games || [];
    if (!list.length) {
      el.innerHTML = '<div style="opacity:0.5;font-style:italic;padding:12px 0;">No eligible games (everything is either new, hidden, or external).</div>';
      return;
    }
    const zeroSignal = list.filter(g => g.votes === 0 && g.comments === 0).length;
    const summary = `<p style="opacity:0.7;font-size:12px;margin:0 0 12px;">
      <b>${zeroSignal}</b> of ${list.length} listed games have <b>0 votes and 0 comments</b> ·
      formula ${escapeHtml(d.formula || '')} · games newer than ${d.excludedNewerThanHours || 48}h excluded ·
      same ranking feeds the public "Hidden Gems" shelf (bottom 12)
    </p>`;
    const rows = list.map(g => {
      const zero = g.votes === 0 && g.comments === 0;
      return `<tr${zero ? ' style="background:rgba(200,69,31,0.05)"' : ''}>
        <td><div style="color:var(--ink);font-weight:600">${escapeHtml(adminTitleBySlug[g.slug] || g.slug)}</div><div class="slug" style="font-size:11px">${escapeHtml(g.slug)}</div></td>
        <td class="num">${g.attention}</td>
        <td class="num">${g.plays}</td>
        <td class="num">👍${g.likes} 👎${g.dislikes}</td>
        <td class="num">${g.comments}</td>
        <td class="num">${g.daysSinceShip == null ? '?' : g.daysSinceShip}</td>
        <td class="num">${zero ? '<span class="ratio-cell neg">no signal</span>' : '<span class="ratio-cell zero">low</span>'}</td>
      </tr>`;
    }).join('');
    el.innerHTML = summary + `<table>
      <thead><tr><th>Game</th><th class="num">Attention</th><th class="num">Plays</th><th class="num">Votes</th><th class="num">Comments</th><th class="num">Days shipped</th><th class="num">Flag</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  } catch (e) {
    el.innerHTML = `<div class="err">Least attention: ${e.message}</div>`;
  }
}

async function loadUserDigests({ force } = {}) {
  const el = document.getElementById('user-digests');
  if (!el) return;
  el.innerHTML = '<div style="opacity:0.5;font-style:italic;padding:12px 0;">Loading user digests…</div>';
  try {
    const url = '/api/admin/user-digests' + (force ? '?nocache=1' : '');
    const r = await adminFetch(url, { cache: 'no-store' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      el.innerHTML = `<div class="err">User digests: ${err.error || r.status}</div>`;
      return;
    }
    const d = await r.json();
    if (!d.users || d.users.length === 0) {
      el.innerHTML = '<div style="opacity:0.5;font-style:italic;padding:12px 0;">No user activity yet — PostHog hasn\'t recorded any persons.</div>';
      return;
    }
    const totalLine = d.total_users > d.showing
      ? `Showing <b>${d.showing}</b> most recent of <b>${d.total_users}</b> persons`
      : `<b>${d.total_users}</b> persons`;
    const summary = `<p style="opacity:0.7;font-size:12px;margin:0 0 14px;">${totalLine} (<b>${d.identified}</b> identified, <b>${d.anonymous}</b> anonymous) · generated ${new Date(d.generated_at).toLocaleTimeString()}</p>`;
    const cards = d.users.map(u => {
      const last = u.last_seen ? new Date(u.last_seen).toLocaleString() : '—';
      const idDisplay = u.email || (u.id ? u.id.slice(0, 12) + '…' : 'anon');
      const topEvents = Object.entries(u.top_events || {})
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5)
        .map(([k, v]) => `<span style="font-family:var(--font-mono);font-size:11px;background:var(--rule-soft,rgba(14,14,18,0.06));padding:2px 6px;border-radius:3px;margin-right:4px;">${escapeHtml(k)}·${v}</span>`)
        .join('');
      return `<div style="border:1px solid var(--rule);border-radius:6px;padding:14px 16px;margin-bottom:10px;background:var(--bg-card);">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
          <strong style="font-family:var(--font-mono);font-size:13px;">${escapeHtml(idDisplay)}</strong>
          <span style="font-family:var(--font-mono);font-size:11px;opacity:0.6;">${u.event_count} events · last ${last}</span>
        </div>
        <p style="margin:6px 0 10px;font-size:13px;line-height:1.5;">${escapeHtml(u.digest)}</p>
        <div>${topEvents}</div>
      </div>`;
    }).join('');
    el.innerHTML = summary + cards;
  } catch (e) {
    el.innerHTML = `<div class="err">Failed to load digests: ${e.message}</div>`;
  }
}

document.addEventListener('click', (e) => {
  if (e.target && e.target.id === 'refresh-user-digests') {
    e.preventDefault();
    loadUserDigests({ force: true });
  }
  if (e.target && e.target.id === 'refresh-suggestions') {
    e.preventDefault();
    loadSuggestions();
  }
  if (e.target && e.target.id === 'refresh-uploads') {
    e.preventDefault();
    loadUploads();
  }
});

function adminPanelMessage(text, options = {}) {
  const div = document.createElement('div');
  if (options.error) {
    div.className = 'err';
  } else {
    div.style.cssText = 'opacity:0.5;font-style:italic;padding:12px 0;';
  }
  div.textContent = String(text);
  return div;
}

function setAdminPanelMessage(el, text, options = {}) {
  el.replaceChildren(adminPanelMessage(text, options));
}

function makeAdminStatusBadge(text, background) {
  const span = document.createElement('span');
  span.style.cssText = `background:${background};color:#fff;padding:1px 6px;border-radius:3px;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;`;
  span.textContent = String(text);
  return span;
}

function appendAdminCell(row, text = '', options = {}) {
  const td = document.createElement('td');
  if (options.className) td.className = options.className;
  if (options.style) td.style.cssText = options.style;
  if (text !== null) td.textContent = String(text);
  row.appendChild(td);
  return td;
}

function makeAdminTable(headers) {
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  headers.forEach((header) => {
    const th = document.createElement('th');
    th.textContent = header;
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  const tbody = document.createElement('tbody');
  table.append(thead, tbody);
  return { table, tbody };
}

async function loadSuggestions() {
  const el = document.getElementById('suggestions-panel');
  if (!el) return;
  setAdminPanelMessage(el, 'Loading suggestions…');
  try {
    const r = await adminFetch('/api/admin/suggestions?days=14', { cache: 'no-store' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      setAdminPanelMessage(el, `Suggestions: ${err.error || r.status}`, { error: true });
      return;
    }
    const d = await r.json().catch(() => ({}));
    const suggestions = Array.isArray(d && d.suggestions) ? d.suggestions : [];
    if (suggestions.length === 0) {
      setAdminPanelMessage(el, 'No suggestions yet — wait for someone to use the footer button on the gallery.');
      return;
    }
    const summary = document.createElement('p');
    summary.style.cssText = 'opacity:0.7;font-size:12px;margin:0 0 14px;';
    const newCount = document.createElement('b');
    newCount.textContent = String((d && d.new_count) ?? 0);
    const totalCount = document.createElement('b');
    totalCount.textContent = String((d && d.count) ?? suggestions.length);
    summary.append(newCount, ' new of ', totalCount, ' total in last ', String((d && d.days) ?? 14), ' days');

    const { table, tbody } = makeAdminTable(['When', 'Status', 'From', 'Suggestion', 'Actions']);
    suggestions.forEach((s) => {
      const ts = Number(s && s.ts);
      const ago = Math.max(0, Math.round((Date.now() - (Number.isFinite(ts) ? ts : Date.now())) / 60000));
      const agoStr = ago < 60 ? ago + 'm' : ago < 1440 ? Math.round(ago/60) + 'h' : Math.round(ago/1440) + 'd';
      const uid = typeof (s && s.uid) === 'string' ? s.uid : '';
      const idLabel = uid ? uid.slice(0, 8) : 'ip:' + String((s && s.ipHash) || '?');
      const status = s && s.status;
      const row = document.createElement('tr');
      appendAdminCell(row, `${agoStr} ago`, { style: 'color:#8a8aa0;font-size:12px;white-space:nowrap' });
      const statusCell = appendAdminCell(row, null);
      if (status === 'new') {
        statusCell.appendChild(makeAdminStatusBadge('new', '#2a7'));
      } else if (status === 'built') {
        const builtLabel = (s && s.builtSlug) ? `built→${String(s.builtSlug)}` : 'built';
        statusCell.appendChild(makeAdminStatusBadge(builtLabel, '#46a'));
      } else {
        statusCell.appendChild(makeAdminStatusBadge('dismissed', '#888'));
      }
      appendAdminCell(row, idLabel, { style: 'font-family:var(--font-mono);font-size:11px;opacity:0.6;' });
      appendAdminCell(row, (s && s.text) || '');

      const actionCell = appendAdminCell(row, null, { style: 'white-space:nowrap;font-size:11px;' });
      const makeButton = (act, label) => {
        const button = document.createElement('button');
        button.className = 'suggest-act';
        button.dataset.key = String((s && s.key) || '');
        button.dataset.act = act;
        button.textContent = label;
        return button;
      };
      if (status === 'new') {
        actionCell.append(makeButton('built', 'mark built'), document.createTextNode(' '), makeButton('dismissed', 'dismiss'));
      } else {
        actionCell.appendChild(makeButton('new', 'reopen'));
      }
      tbody.appendChild(row);
    });
    el.replaceChildren(summary, table);
  } catch (e) {
    setAdminPanelMessage(el, `Failed to load suggestions: ${e.message}`, { error: true });
  }
}

document.addEventListener('click', async (e) => {
  const t = e.target;
  if (t && t.classList && t.classList.contains('suggest-act')) {
    e.preventDefault();
    const id = t.dataset.key;
    const act = t.dataset.act;
    let builtSlug = null;
    if (act === 'built') {
      builtSlug = prompt('Built which game? (slug, optional)', '') || null;
    }
    t.disabled = true;
    const r = await adminFetch('/api/admin/suggestions', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ id, status: act, builtSlug }),
    });
    if (r.ok) loadSuggestions();
    else { t.disabled = false; alert('Failed: ' + r.status); }
  }
});

// Hidden games — hide/unhide a game from the public grid (KV-backed, instant).
async function loadHidden() {
  const el = document.getElementById('hidden-panel');
  if (!el) return;
  setAdminPanelMessage(el, 'Loading…');
  try {
    const [hidRes, gamesRes] = await Promise.all([
      adminFetch('/api/admin/hidden', { cache: 'no-store' }),
      fetch('/games.json', { cache: 'no-store' }),
    ]);
    if (!hidRes.ok) {
      const err = await hidRes.json().catch(() => ({}));
      setAdminPanelMessage(el, `Hidden: ${err.error || hidRes.status}`, { error: true });
      return;
    }
    const hiddenData = await hidRes.json().catch(() => ({}));
    const hidden = hiddenData && hiddenData.hidden;
    const hiddenList = Array.isArray(hidden) ? hidden.map((slug) => String(slug)) : [];
    const gamesJson = await gamesRes.json().catch(() => []);
    const allGames = Array.isArray(gamesJson) ? gamesJson.filter(Boolean) : [];
    const hset = new Set(hiddenList);
    const btn = 'font-size:11px;padding:4px 12px;border:1px solid var(--rule);background:transparent;color:var(--ink-soft);cursor:pointer;border-radius:4px;';
    // hidden first, then newest by num
    const list = [...allGames].sort((a, b) => {
      const ah = hset.has(String((a && a.slug) || '')), bh = hset.has(String((b && b.slug) || ''));
      if (ah !== bh) return ah ? -1 : 1;
      return (parseInt(b && b.num, 10) || 0) - (parseInt(a && a.num, 10) || 0);
    });
    const summary = document.createElement('p');
    summary.style.cssText = 'opacity:0.7;font-size:12px;margin:0 0 14px;';
    const hiddenCount = document.createElement('b');
    hiddenCount.textContent = String(hiddenList.length);
    summary.append(hiddenCount, ' hidden of ', String(allGames.length), '. Hidden games drop off the public grid instantly and are recorded as a low-quality signal for the factory.');

    const { table, tbody } = makeAdminTable(['Game', 'Slug', '', '']);
    list.forEach((g) => {
      const slug = String((g && g.slug) || '');
      const h = hset.has(slug);
      const row = document.createElement('tr');
      if (h) row.style.cssText = 'opacity:0.5;';
      appendAdminCell(row, (g && (g.title || g.slug)) || '');
      appendAdminCell(row, slug, { className: 'slug' });
      const statusCell = appendAdminCell(row, null);
      if (h) {
        const status = document.createElement('span');
        status.style.cssText = 'color:#f7768e;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;';
        status.textContent = 'hidden';
        statusCell.appendChild(status);
      }
      const actionCell = appendAdminCell(row, null, { style: 'text-align:right;' });
      const action = document.createElement('button');
      action.className = 'hide-act';
      action.dataset.slug = slug;
      action.dataset.act = h ? 'unhide' : 'hide';
      action.style.cssText = btn;
      action.textContent = h ? 'unhide' : 'hide';
      actionCell.appendChild(action);
      tbody.appendChild(row);
    });
    el.replaceChildren(summary, table);
  } catch (e) {
    setAdminPanelMessage(el, `Failed to load hidden: ${e.message}`, { error: true });
  }
}

// Delegated handler for the hidden-games panel (hide/unhide + its refresh btn).
document.addEventListener('click', async (e) => {
  const t = e.target;
  if (!t) return;
  if (t.id === 'refresh-hidden') { loadHidden(); return; }
  if (t.classList && t.classList.contains('hide-act')) {
    e.preventDefault();
    const slug = t.dataset.slug;
    const hide = t.dataset.act === 'hide';
    t.disabled = true;
    const r = await adminFetch('/api/admin/hidden', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ slug, hide }),
    });
    if (r.ok) loadHidden();
    else { t.disabled = false; alert('Failed: ' + r.status); }
  }
});

async function loadUploads() {
  const el = document.getElementById('uploads-panel');
  if (!el) return;
  el.innerHTML = '<div style="opacity:0.5;font-style:italic;padding:12px 0;">Loading uploads…</div>';
  try {
    const r = await adminFetch('/api/admin/uploads', { cache: 'no-store' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      el.innerHTML = `<div class="err">Uploads: ${err.error || r.status}</div>`;
      return;
    }
    const d = await r.json();
    const c = d.counts || {};
    const uploads = d.uploads || [];
    const failures = d.failures || [];
    let html = '';
    if (uploads.length === 0) {
      html += '<div style="opacity:0.5;font-style:italic;padding:12px 0;">No uploads yet — send a developer the /submit link.</div>';
    } else {
      html += `<p style="opacity:0.7;font-size:12px;margin:0 0 14px;"><b>${c.pending || 0}</b> pending · ${c.approved || 0} approved · ${c.rejected || 0} rejected · ${c.live || 0} live</p>`;
      html += uploads.map(uploadCard).join('');
    }
    if (failures.length) {
      html += `<div style="margin-top:24px;font-size:12px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;opacity:0.55;">Rejected at the gate (${failures.length}) — debug, not stored</div>`;
      html += failures.map(failCard).join('');
    }
    el.innerHTML = html || '<div style="opacity:0.5;font-style:italic;padding:12px 0;">No uploads yet — send a developer the /submit link.</div>';
  } catch (e) {
    el.innerHTML = `<div class="err">Failed to load uploads: ${e.message}</div>`;
  }
}

function uploadCard(u) {
  const ago = u.ts ? Math.round((Date.now() - u.ts) / 60000) : 0;
  const agoStr = ago < 60 ? ago + 'm' : ago < 1440 ? Math.round(ago / 60) + 'h' : Math.round(ago / 1440) + 'd';
  const colors = { pending: '#c93', approved: '#2a7', rejected: '#a44', live: '#46a' };
  const badge = `<span style="background:${colors[u.status] || '#888'};color:#fff;padding:1px 7px;border-radius:3px;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;">${escapeHtml(u.status)}</span>`;
  const sizeMb = u.sizeBytes ? (u.sizeBytes / 1048576).toFixed(1) + ' MB' : '?';
  const scan = u.scan;
  const scanLine = scan
    ? `<div style="font-size:12px;margin-top:6px;">Scan: <b style="color:${scan.blocked ? '#f7768e' : '#5ad19a'}">${scan.blocked ? 'BLOCKED' : 'clean'}</b> · ${(scan.counts && scan.counts.block) || 0} block, ${(scan.counts && scan.counts.warn) || 0} warn</div>`
    : '<div style="font-size:12px;margin-top:6px;opacity:0.5;">Scan: not run yet</div>';
  const v = u.verdict;
  const vColor = v && v.decision === 'pass' ? '#5ad19a' : v && v.decision === 'reject' ? '#f7768e' : '#ffd23f';
  const verdictLine = u.reviewRequested
    ? '<div style="font-size:12px;margin-top:4px;color:#ffd23f;">⏳ AI check queued — the worker is running it on your Mac…</div>'
    : v
    ? `<div style="font-size:12px;margin-top:4px;">AI verdict: <b style="color:${vColor}">${escapeHtml(v.decision || '?')}</b>${v.notes && v.notes.length ? ' — ' + escapeHtml(String(v.notes[0]).slice(0, 180)) : ''}</div>`
    : '<div style="font-size:12px;margin-top:4px;opacity:0.5;">AI verdict: not checked yet</div>';
  const pubErr = u.publishError
    ? `<div style="font-size:12px;margin-top:4px;color:#f7768e;">Publish failed: ${escapeHtml(u.publishError)} — fix &amp; click approve again.</div>`
    : (u.status === 'approved'
      ? '<div style="font-size:12px;margin-top:4px;color:#ffd23f;">⏳ Publishing to the sandbox host…</div>' : '');
  const btn = 'font-size:11px;padding:4px 10px;margin-right:6px;border:1px solid var(--rule);background:transparent;color:var(--ink-soft);cursor:pointer;border-radius:4px;';
  const actions = ((u.status === 'pending' || u.status === 'approved')
    ? `<button class="upload-act" data-id="${escapeHtml(u.key)}" data-act="approve" style="${btn}">approve</button>
       <button class="upload-act" data-id="${escapeHtml(u.key)}" data-act="reject" style="${btn}">reject</button>
       <button class="upload-act" data-id="${escapeHtml(u.key)}" data-act="request-review" style="${btn}">⚡ AI check</button>`
    : `<button class="upload-act" data-id="${escapeHtml(u.key)}" data-act="reset" style="${btn}">reopen</button>`)
    + `<button class="upload-act" data-id="${escapeHtml(u.key)}" data-act="reassign" style="${btn}">reassign owner</button>`;
  const rej = u.status === 'rejected' && u.rejectReason
    ? `<div style="font-size:12px;margin-top:4px;color:#c88;">Rejected: ${escapeHtml(u.rejectReason)}${u.emailed ? '' : ' (email pending)'}</div>` : '';
  return `<div style="border:1px solid var(--rule);border-radius:6px;padding:14px 16px;margin-bottom:10px;background:var(--bg-card);">
    <div style="display:flex;justify-content:space-between;align-items:baseline;">
      <strong style="font-size:14px;">${escapeHtml(u.title || u.slug)}</strong>${badge}
    </div>
    <div style="font-size:12px;opacity:0.7;margin-top:3px;">by ${escapeHtml(u.author || '?')} · ${escapeHtml(u.contact || '')} · ${escapeHtml(u.genre || '')} · ${sizeMb} · ${agoStr} ago</div>
    ${u.hook ? `<div style="font-size:13px;margin-top:6px;">${escapeHtml(u.hook)}</div>` : ''}
    ${scanLine}
    ${verdictLine}
    ${pubErr}
    ${rej}
    <div style="margin-top:10px;">${actions}</div>
  </div>`;
}

function failCard(f) {
  const ago = f.ts ? Math.round((Date.now() - f.ts) / 60000) : 0;
  const agoStr = ago < 60 ? ago + 'm' : ago < 1440 ? Math.round(ago / 60) + 'h' : Math.round(ago / 1440) + 'd';
  const sizeMb = f.sizeBytes ? (f.sizeBytes / 1048576).toFixed(1) + ' MB' : '?';
  const detail = f.detail ? ` → <code style="color:#f7768e;">${escapeHtml(String(f.detail))}</code>` : '';
  const files = (f.files && f.files.length)
    ? `<details style="margin-top:6px;"><summary style="cursor:pointer;font-size:11px;opacity:0.55;">${f.files.length} files in zip</summary><div style="font-size:11px;font-family:var(--font-mono);opacity:0.7;margin-top:4px;word-break:break-all;line-height:1.6;">${f.files.map(escapeHtml).join('<br>')}</div></details>`
    : '';
  return `<div style="border:1px solid #5a2a2a;border-radius:6px;padding:10px 14px;margin-bottom:8px;background:rgba(160,68,68,0.06);">
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;">
      <strong style="font-size:13px;">${escapeHtml(f.title || '(untitled)')}</strong>
      <span style="font-size:11px;color:#f7768e;font-family:var(--font-mono);white-space:nowrap;">${escapeHtml(f.error || '?')}</span>
    </div>
    <div style="font-size:12px;opacity:0.7;margin-top:3px;">${escapeHtml(f.email || '?')} · ${escapeHtml(f.filename || '')} · ${sizeMb} · ${agoStr} ago${detail}</div>
    ${files}
  </div>`;
}

document.addEventListener('click', async (e) => {
  const t = e.target;
  if (t && t.classList && t.classList.contains('upload-act')) {
    e.preventDefault();
    const id = t.dataset.id;
    const act = t.dataset.act;
    let reason = null, email = null;
    if (act === 'reject') {
      reason = prompt('Reject reason (will be emailed to the submitter):', '');
      if (reason === null || reason.trim().length < 3) return;
    }
    if (act === 'reassign') {
      email = prompt('Reassign to which email? The game gets credited to this account and shows up when they sign in.', '');
      if (email === null || !email.trim()) return;
    }
    t.disabled = true;
    const r = await adminFetch('/api/admin/uploads', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ id, action: act, reason, email }),
    });
    if (r.ok) loadUploads();
    else { t.disabled = false; alert('Failed: ' + r.status); }
  }
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function hydrateFeedbackImages() {
  const imgs = Array.from(document.querySelectorAll('img.feedback-img[data-slug][data-id]'));
  await Promise.all(imgs.map(async img => {
    const slug = img.dataset.slug || '';
    const id = img.dataset.id || '';
    try {
      const r = await adminFetch(`/api/admin/feedback-image?slug=${encodeURIComponent(slug)}&id=${encodeURIComponent(id)}`, { cache: 'no-store' });
      if (!r.ok) return;
      const url = URL.createObjectURL(await r.blob());
      img.src = url;
      const a = img.closest('a.feedback-img-link');
      if (a) a.href = url;
    } catch (e) { /* best effort */ }
  }));
}

function renderPublishBoard(d) {
  const ps = d.publishStatus;
  if (!ps || !ps.games) {
    return '<h2 style="margin-top:36px">Publish board</h2><p style="color:#8a8aa0;font-size:12px">publish-status.json not loaded — run build_dashboard.py + sync_games.sh.</p>';
  }
  const titleFor = (slug) => (d.perGame.find(x => x.slug === slug) || {}).title || slug;
  const sum = ps.summary || {};
  const sy = sum.yandex || {}, sc = sum.crazygames || {}, sgp = sum.gamepush || {};
  const platLabels = { yandex: 'Yandex', crazygames: 'CrazyGames', gamedistribution: 'GameDistribution', gamepush: 'GamePush' };
  const badge = (p) => {
    if (!p || !p.status) return '<span style="color:#5a5a6a">—</span>';
    const s = p.status, url = p.url || p.developerUrl;
    if (s === 'live') return url ? `<a href="${escapeHtml(url)}" target="_blank" style="color:#3ad17a;font-weight:600;text-decoration:none">● live ↗</a>` : '<span style="color:#3ad17a;font-weight:600">● live</span>';
    if (s === 'approved') return '<span style="color:#3ad17a">✓ approved</span>';
    if (s === 'submitted') return url ? `<a href="${escapeHtml(url)}" target="_blank" style="color:#ffd23f;text-decoration:none">⏳ in mod ↗</a>` : '<span style="color:#ffd23f">⏳ in mod</span>';
    if (s === 'built') return '<span style="color:#7aa2f7">◆ ready</span>';
    if (s === 'rejected') return '<span style="color:#f7768e">✗ rejected</span>';
    if (s === 'removed') return '<span style="color:#a55">⊘ removed</span>';
    if (s === 'not_started' || s === 'n/a') return '<span style="color:#5a5a6a">—</span>';
    return `<span style="opacity:0.6">${escapeHtml(s)}</span>`;
  };
  const ready = [];
  for (const slug of Object.keys(ps.games)) {
    const g = ps.games[slug];
    if ((g.readyPlatforms || []).length && g.engagement) {
      ready.push({ title: titleFor(slug), eng: g.engagement, ready: g.readyPlatforms });
    }
  }
  ready.sort((a, b) => (b.eng.seconds - a.eng.seconds) || (b.eng.plays7d - a.eng.plays7d));
  const readyTop = ready.slice(0, 12);
  const untracked = ps.untracked || [];
  const rows = Object.keys(ps.games).map(slug => {
    const g = ps.games[slug], pl = g.platforms || {};
    const other = g.other ? Object.keys(g.other).map(k => { const p = g.other[k]; return `${escapeHtml(k)}:${p.url ? `<a href="${escapeHtml(p.url)}" target="_blank" style="color:#3ad17a">${escapeHtml(p.status || '?')}↗</a>` : escapeHtml(p.status || '?')}`; }).join(' ') : '<span style="color:#5a5a6a">—</span>';
    const e = g.engagement;
    const eng = e ? `<span style="font-size:11px;color:#8a8aa0"> ${e.plays7d}p·👍${e.likes}/👎${e.dislikes}</span>` : '';
    return `<tr>
      <td><div style="color:#e7e7ee;font-weight:600">${escapeHtml(titleFor(slug))}</div><div style="font-size:11px;color:#6a6a7a">${escapeHtml(slug)}${eng}</div></td>
      <td>${badge(pl.yandex)}</td><td>${badge(pl.crazygames)}</td><td>${badge(pl.gamedistribution)}</td><td>${badge(pl.gamepush)}</td>
      <td style="font-size:11px">${other}</td>
    </tr>`;
  }).join('');
  return `
    <h2 style="margin-top:36px">Publish board <span style="font-size:12px;color:#8a8aa0;font-weight:400">— what's live / in moderation / ready, per platform</span></h2>
    <p style="color:#8a8aa0;font-size:12px;margin:-6px 0 10px">
      Source of truth (from status.json, generated ${escapeHtml((ps.generated || '').slice(0, 16))}). Yandex ${sy.live || 0} live · ${sy.submitted || 0} in mod &nbsp;|&nbsp; CrazyGames ${sc.live || 0} live · ${sc.submitted || 0} in mod &nbsp;|&nbsp; GamePush ${sgp.built || 0} ready. Tell Claude "publish &lt;game&gt; to &lt;platform&gt;" — it auto-submits and updates this board.
    </p>
    ${readyTop.length ? `<div style="background:rgba(122,162,247,0.08);border:1px solid rgba(122,162,247,0.25);border-radius:6px;padding:10px 12px;margin-bottom:14px">
      <div style="font-weight:600;color:#7aa2f7;font-size:13px;margin-bottom:6px">◆ Ready to publish — built, has plays, missing platforms</div>
      ${readyTop.map(r => `<div style="font-size:12px;margin:3px 0"><b style="color:#e7e7ee">${escapeHtml(r.title)}</b> <span style="color:#8a8aa0">${r.eng.plays7d}p · 👍${r.eng.likes}</span> → open on: ${r.ready.map(p => platLabels[p] || p).join(', ')}</div>`).join('')}
    </div>` : ''}
    <table>
      <thead><tr><th>Game</th><th>Yandex</th><th>CrazyGames</th><th>GameDistr.</th><th>GamePush</th><th>Other</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${untracked.length ? `<p style="color:#8a8aa0;font-size:11px;margin-top:8px"><b>${untracked.length} untracked-but-played</b> (no status entry yet — publish candidates): ${untracked.slice(0, 10).map(u => `${escapeHtml(u.slug)} (${u.engagement.plays7d}p)`).join(', ')}</p>` : ''}
  `;
}

function render(d) {
  const fmt = n => Math.round(n).toLocaleString();
  const fmtMin = sec => sec < 60 ? sec + 's' : sec < 3600 ? Math.round(sec/60) + 'm' : (sec/3600).toFixed(1) + 'h';
  const dates = Object.keys(d.perDay);
  const dayValues = dates.map(date => d.perDay[date].totalSeconds);
  const maxDay = Math.max(1, ...dayValues);

  document.getElementById('meta').innerHTML = `Refreshed ${new Date().toLocaleTimeString()} · ${d.perGame.length} games tracked · <a href="/api/auth/logout?return=/admin.html" style="color:var(--ink-muted);text-decoration:none">Sign out</a>`;

  // ── Daily highlights panel — morning scan ──────────────────────────────
  const h = d.highlights || {};
  const titleFor = slug => {
    const g = d.perGame.find(x => x.slug === slug);
    return g ? (g.title || slug) : slug;
  };
  const deltaSign = h.secondsDelta > 0 ? '↑' : h.secondsDelta < 0 ? '↓' : '·';
  const deltaCls = h.secondsDelta > 0 ? 'pos' : h.secondsDelta < 0 ? 'neg' : 'zero';
  const deltaTxt = `${deltaSign} ${fmtMin(Math.abs(h.secondsDelta || 0))} vs yesterday`;

  const todayTopHtml = h.todayTop
    ? `<div style="margin-top:6px"><strong>${escapeHtml(titleFor(h.todayTop.slug))}</strong> · ${fmtMin(h.todayTop.seconds)} played today</div>`
    : `<div style="color:#6a6a82;margin-top:6px">No plays today yet</div>`;

  const iterationHtml = (h.iterationQueue && h.iterationQueue.length)
    ? h.iterationQueue.slice(0, 3).map((g, i) =>
        `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:${i < Math.min(2, h.iterationQueue.length-1) ? '1px solid rgba(255,255,255,0.04)' : 'none'}">
          <span><strong>#${i+1}</strong> ${escapeHtml(titleFor(g.slug))}</span>
          <span style="color:#8a8aa0;font-size:12px">${g.plays}p · ${g.avgSec}s avg · 👍${g.likes} · score ${Math.round(g.engagement)}</span>
        </div>`
      ).join('')
    : `<div style="color:#6a6a82">No games passed eligibility threshold (likes≥3 OR plays≥5+30s avg)</div>`;

  document.getElementById('content').innerHTML = `
    <div class="pulse" style="background:linear-gradient(135deg,#14142a 0%,#1a1d3a 100%);border:1px solid rgba(77,208,225,0.18);border-radius:14px;padding:18px 22px;margin-bottom:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:18px;font-weight:700;color:#f7f7fa">Today's Pulse <span style="color:#8a8aa0;font-weight:400;font-size:13px">${escapeHtml(h.todayDate || '')}</span></div>
        <div class="ratio-cell ${deltaCls}" style="font-size:12px">${deltaTxt}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <div>
          <div style="color:#8a8aa0;font-size:12px;text-transform:uppercase;letter-spacing:0.06em">Today played</div>
          <div style="font-size:24px;font-weight:800;color:#4dd0e1;margin-top:2px">${fmtMin(h.todaySeconds || 0)}</div>
          ${todayTopHtml}
          ${h.newCommentsCount > 0 ? `<div style="margin-top:10px;font-size:13px;color:#ffd23f">📝 ${h.newCommentsCount} new comment(s) in last 24h</div>` : ''}
        </div>
        <div>
          <div style="color:#8a8aa0;font-size:12px;text-transform:uppercase;letter-spacing:0.06em">Tomorrow's iteration queue</div>
          <div style="margin-top:6px;font-size:13px">
            ${iterationHtml}
          </div>
        </div>
      </div>
    </div>

    <div class="totals">
      <div class="stat"><div class="label">Total plays</div><div class="value">${fmt(d.totals.plays)}</div></div>
      <div class="stat"><div class="label">Total time</div><div class="value">${fmtMin(d.totals.seconds)}</div></div>
      <div class="stat"><div class="label">👍 Likes</div><div class="value">${fmt(d.totals.likes)}</div></div>
      <div class="stat"><div class="label">👎 Dislikes</div><div class="value">${fmt(d.totals.dislikes)}</div></div>
    </div>

    <h2>Per-game (sorted by total time)</h2>
    <table>
      <thead><tr>
        <th>Game</th><th class="num">Plays</th><th class="num">Time</th>
        <th class="num">Avg/play</th><th class="num">👍</th><th class="num">👎</th><th class="num">Net</th>
      </tr></thead>
      <tbody>
        ${d.perGame.map(g => {
          const avg = g.plays > 0 ? Math.round(g.seconds / g.plays) : 0;
          const net = (g.likes || 0) - (g.dislikes || 0);
          const cls = net > 0 ? 'pos' : net < 0 ? 'neg' : 'zero';
          const dim = (g.plays + g.likes + g.dislikes) === 0 ? ' style="opacity:0.5"' : '';
          return `<tr${dim}>
            <td><div style="color:#e7e7ee;font-weight:600">${escapeHtml(g.title || g.slug)}</div><div class="slug" style="font-size:11px">${g.slug}</div></td>
            <td class="num">${fmt(g.plays)}</td>
            <td class="num">${fmtMin(g.seconds)}</td>
            <td class="num">${fmtMin(avg)}</td>
            <td class="num">${fmt(g.likes)}</td>
            <td class="num">${fmt(g.dislikes)}</td>
            <td class="num"><span class="ratio-cell ${cls}">${net > 0 ? '+' : ''}${net}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    ${renderPublishBoard(d)}

    <h2 style="display:flex;align-items:center;justify-content:space-between;">
      <span>Least attention <span style="opacity:0.5;font-weight:400;font-size:14px;">(attention = plays + votes*3 + comments*5, ascending; 48h grace; hidden/external excluded - triage: fix or kill)</span></span>
      <button id="refresh-least" style="font-family:var(--font-mono);font-size:11px;padding:6px 12px;border:1px solid var(--rule);background:transparent;color:var(--ink-soft);cursor:pointer;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;">↻ Refresh</button>
    </h2>
    <div id="least-attention-panel" style="margin-bottom:32px;">
      <div style="opacity:0.5;font-style:italic;padding:12px 0;">Loading…</div>
    </div>

    ${d.abGames && d.abGames.length ? `
    <h2>A/B thumbnail performance</h2>
    <p style="color:#8a8aa0;font-size:12px;margin:-6px 0 12px">
      Variants are picked at random per pageview, so impressions are roughly uniform —
      raw click counts are a directional CTR signal. Winning variant is bolded.
    </p>
    <table>
      <thead><tr>
        <th>Game</th><th class="num">Variants</th><th>Click split</th><th class="num">Total clicks</th><th>Winner</th>
      </tr></thead>
      <tbody>
        ${d.abGames.map(g => {
          const total = Object.values(g.variants).reduce((a, b) => a + b, 0);
          const variantNums = Array.from({length: g.thumbCount}, (_, i) => i + 1);
          const winner = total > 0
            ? variantNums.reduce((best, v) => (g.variants[v] || 0) > (g.variants[best] || 0) ? v : best, 1)
            : null;
          const split = variantNums.map(v => {
            const c = g.variants[v] || 0;
            const pct = total > 0 ? Math.round(c * 100 / total) : 0;
            const bold = winner === v ? 'font-weight:700;color:#2ecc71' : '';
            return `<span style="margin-right:10px;${bold}">v${v}: ${c} (${pct}%)</span>`;
          }).join('');
          return `<tr>
            <td><div style="color:#e7e7ee;font-weight:600">${escapeHtml(g.title || g.slug)}</div><div class="slug" style="font-size:11px">${g.slug}</div></td>
            <td class="num">${g.thumbCount}</td>
            <td>${split}</td>
            <td class="num">${total}</td>
            <td>${winner ? `<span class="ratio-cell pos">v${winner}</span>` : '<span class="ratio-cell zero">no data</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>` : ''}

    <h2 style="display:flex;align-items:center;justify-content:space-between;">
      <span>Retention (D1/D7) <span style="opacity:0.5;font-weight:400;font-size:14px;">(anonymous cohorts — directional at low traffic)</span></span>
      <button id="refresh-retention" style="font-family:var(--font-mono);font-size:11px;padding:6px 12px;border:1px solid var(--rule);background:transparent;color:var(--ink-soft);cursor:pointer;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;">↻ Refresh</button>
    </h2>
    <div id="retention-panel" style="margin-bottom:32px;">
      <div style="opacity:0.5;font-style:italic;padding:12px 0;">Loading…</div>
    </div>

    <h2 style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <span>First-60s funnel <span style="opacity:0.5;font-weight:400;font-size:14px;">(boot to first input to alive 1/2/5 min - gallery sessions only)</span></span>
      <span style="display:flex;align-items:center;gap:8px;">
        <select id="funnel-slug" style="font-family:var(--font-mono);font-size:11px;padding:6px 8px;border:1px solid var(--rule);background:var(--bg-card);color:var(--ink);border-radius:4px;max-width:260px;"></select>
        <button id="refresh-funnel" style="font-family:var(--font-mono);font-size:11px;padding:6px 12px;border:1px solid var(--rule);background:transparent;color:var(--ink-soft);cursor:pointer;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;">Refresh</button>
      </span>
    </h2>
    <div id="funnel-panel" style="margin-bottom:32px;">
      <div style="opacity:0.5;font-style:italic;padding:12px 0;">Loading...</div>
    </div>

    <h2 style="display:flex;align-items:center;justify-content:space-between;">
      <span>User digests <span style="opacity:0.5;font-weight:400;font-size:14px;">(PostHog-derived per-visitor summaries)</span></span>
      <button id="refresh-user-digests" style="font-family:var(--font-mono);font-size:11px;padding:6px 12px;border:1px solid var(--rule);background:transparent;color:var(--ink-soft);cursor:pointer;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;">↻ Regenerate</button>
    </h2>
    <div id="user-digests" style="margin-bottom:32px;">
      <div style="opacity:0.5;font-style:italic;padding:12px 0;">Loading…</div>
    </div>

    ${d.comments && d.comments.length ? `
    <h2>Recent player comments (${d.comments.length})</h2>
    <table>
      <thead><tr>
        <th>When</th><th>Game</th><th>Vote</th><th>Comment</th><th>Image</th>
      </tr></thead>
      <tbody>
        ${d.comments.map(c => {
          const ago = c.ts ? Math.round((Date.now() - c.ts) / 60000) : '?';
          const agoStr = ago < 60 ? ago + 'm' : ago < 1440 ? Math.round(ago/60) + 'h' : Math.round(ago/1440) + 'd';
          const voteEmoji = c.vote === 'like' ? '👍' : c.vote === 'dislike' ? '👎' : '·';
          const imageIds = Array.isArray(c.imageIds) && c.imageIds.length
            ? c.imageIds
            : (c.imageId ? [c.imageId] : []);
          const imgCell = imageIds.length
            ? `<div style="display:flex;gap:6px;flex-wrap:wrap;max-width:220px;">${imageIds.map((id, i) => {
                return `<a href="#" class="feedback-img-link" data-slug="${escapeHtml(c.slug)}" data-id="${escapeHtml(id)}" target="_blank" rel="noopener" title="Screenshot ${i + 1}"><img class="feedback-img" data-slug="${escapeHtml(c.slug)}" data-id="${escapeHtml(id)}" style="width:64px;height:48px;object-fit:cover;border:1px solid #2a2a35;border-radius:3px;display:block;background:#111" alt="screenshot ${i + 1}"></a>`;
              }).join('')}</div>`
            : '<span style="color:#3a3a45">—</span>';
          return `<tr>
            <td style="color:#8a8aa0;font-size:12px;white-space:nowrap">${agoStr} ago</td>
            <td class="slug">${escapeHtml(c.slug)}</td>
            <td>${voteEmoji}</td>
            <td>${escapeHtml(c.comment || '')}</td>
            <td>${imgCell}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>` : ''}

    <h2 style="display:flex;align-items:center;justify-content:space-between;">
      <span>Community uploads <span style="opacity:0.5;font-weight:400;font-size:14px;">(submitted via /submit — review before publishing)</span></span>
      <button id="refresh-uploads" style="font-family:var(--font-mono);font-size:11px;padding:6px 12px;border:1px solid var(--rule);background:transparent;color:var(--ink-soft);cursor:pointer;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;">↻ Refresh</button>
    </h2>
    <div id="uploads-panel" style="margin-bottom:32px;">
      <div style="opacity:0.5;font-style:italic;padding:12px 0;">Loading…</div>
    </div>

    <h2 style="display:flex;align-items:center;justify-content:space-between;">
      <span>Player suggestions <span style="opacity:0.5;font-weight:400;font-size:14px;">(from footer "Suggest a game" button)</span></span>
      <button id="refresh-suggestions" style="font-family:var(--font-mono);font-size:11px;padding:6px 12px;border:1px solid var(--rule);background:transparent;color:var(--ink-soft);cursor:pointer;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;">↻ Refresh</button>
    </h2>
    <div id="suggestions-panel" style="margin-bottom:32px;">
      <div style="opacity:0.5;font-style:italic;padding:12px 0;">Loading…</div>
    </div>

    <h2 style="display:flex;align-items:center;justify-content:space-between;">
      <span>Hidden games <span style="opacity:0.5;font-weight:400;font-size:14px;">(curated out of the public grid — a low-quality signal for the factory)</span></span>
      <button id="refresh-hidden" style="font-family:var(--font-mono);font-size:11px;padding:6px 12px;border:1px solid var(--rule);background:transparent;color:var(--ink-soft);cursor:pointer;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;">↻ Refresh</button>
    </h2>
    <div id="hidden-panel" style="margin-bottom:32px;">
      <div style="opacity:0.5;font-style:italic;padding:12px 0;">Loading…</div>
    </div>

    <h2>Last 14 days — total play time</h2>
    <div class="chart">
      <div class="chart-grid">
        ${dates.map((date, i) => {
          const sec = dayValues[i];
          const h = Math.max(2, (sec / maxDay) * 140);
          return `<div class="chart-bar" style="height:${h}px">
            <div class="tip">${date}: ${fmtMin(sec)}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="chart-labels">
        ${dates.map(d => `<span>${d.slice(5)}</span>`).join('')}
      </div>
    </div>
  `;
}

// Turn the long flat dashboard into tabs: a sticky button bar at the top, one
// panel per <h2> section (content before the first h2 = the "Pulse" tab). Runs
// AFTER render() each load; the async loaders (digests/uploads/suggestions)
// still populate their divs by id since the nodes are only re-parented, not
// removed. Best-effort: any error leaves the dashboard rendered flat.
function tabifyContent() {
  try {
    const content = document.getElementById('content');
    // Structural guard (NOT a dataset flag on #content): render() resets
    // content.innerHTML but not attributes, so a flag would survive the
    // visibilitychange re-render and make tabs vanish. Detect the tab bar
    // as a child instead — render() rebuilds flat children, so it re-tabs.
    if (!content || (content.firstElementChild && content.firstElementChild.dataset.tabbar === '1')) return;
    const kids = Array.from(content.children);
    if (kids.length < 3) return;
    const labelFor = (txt) => {
      const t = (txt || '').toLowerCase();
      if (t.includes('per-game')) return 'Games';
      if (t.includes('publish board')) return 'Publish';
      if (t.includes('least attention')) return 'Least attention';
      if (t.includes('a/b')) return 'A/B';
      if (t.includes('user digests')) return 'Digests';
      if (t.includes('player comments')) return 'Comments';
      if (t.includes('community uploads')) return 'Uploads';
      if (t.includes('player suggestions')) return 'Suggestions';
      if (t.includes('last 14 days')) return 'Trends';
      return (txt || 'Section').trim().split(/\s+/).slice(0, 2).join(' ') || 'Section';
    };
    const sections = [];
    let cur = { label: 'Pulse', nodes: [] };
    for (const node of kids) {
      if (node.tagName === 'H2') {
        if (cur.nodes.length) sections.push(cur);
        cur = { label: labelFor(node.textContent), nodes: [node] };
      } else {
        cur.nodes.push(node);
      }
    }
    if (cur.nodes.length) sections.push(cur);
    if (sections.length < 2) return;

    const bar = document.createElement('div');
    bar.dataset.tabbar = '1';
    bar.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin:0 0 20px;position:sticky;top:0;background:#0e0e12;padding:10px 0;z-index:5;border-bottom:1px solid rgba(255,255,255,0.08)';
    const panelsWrap = document.createElement('div');
    content.insertBefore(bar, content.firstChild);
    content.appendChild(panelsWrap);

    const activate = (idx) => {
      Array.from(panelsWrap.children).forEach((p, i) => { p.style.display = i === idx ? '' : 'none'; });
      Array.from(bar.children).forEach((b, i) => {
        const on = i === idx;
        b.style.background = on ? '#4dd0e1' : 'transparent';
        b.style.color = on ? '#0e0e12' : '#b8b8c8';
        b.style.borderColor = on ? '#4dd0e1' : 'rgba(255,255,255,0.15)';
        b.style.fontWeight = on ? '700' : '500';
      });
      try { sessionStorage.setItem('adminTab', String(idx)); } catch (e) {}
    };

    sections.forEach((s, i) => {
      const panel = document.createElement('div');
      panelsWrap.appendChild(panel);
      s.nodes.forEach(n => panel.appendChild(n));
      const btn = document.createElement('button');
      btn.textContent = s.label;
      btn.style.cssText = 'font-family:var(--font-mono,monospace);font-size:12px;padding:7px 14px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:#b8b8c8;cursor:pointer;border-radius:6px;letter-spacing:0.04em;white-space:nowrap';
      btn.addEventListener('click', () => activate(i));
      bar.appendChild(btn);
    });

    let saved = 0;
    try { saved = parseInt(sessionStorage.getItem('adminTab') || '0', 10) || 0; } catch (e) {}
    activate(saved >= 0 && saved < sections.length ? saved : 0);
  } catch (e) { /* best-effort: leave dashboard as-rendered */ }
}
</script>
</body>
</html>
