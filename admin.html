<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin · Tim's Game Lab</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <meta name="theme-color" content="#0a0a14">
  <link rel="stylesheet" href="/style.css">
  <style>
    .admin-wrap { max-width: 1100px; margin: 30px auto; padding: 0 20px 60px; }
    .admin-wrap h1 { font-size: 28px; margin-bottom: 4px; color: #f7f7fa; }
    .admin-wrap .sub { color: #8a8aa0; font-size: 13px; margin-bottom: 24px; }
    .totals { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .stat { background: #14142a; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; }
    .stat .label { color: #8a8aa0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat .value { font-size: 28px; font-weight: 800; color: #f7f7fa; margin-top: 4px; letter-spacing: -0.02em; }
    .stat .value .unit { font-size: 14px; color: #8a8aa0; font-weight: 600; margin-left: 4px; }

    h2 { font-size: 18px; color: #c0c0d0; margin: 30px 0 12px; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; background: #14142a; border-radius: 12px; overflow: hidden; }
    table th, table td { padding: 10px 14px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; }
    table th { color: #8a8aa0; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    table td { color: #e7e7ee; }
    table td.num { font-variant-numeric: tabular-nums; text-align: right; }
    table td.slug { color: #4dd0e1; font-family: monospace; font-size: 13px; }
    table tbody tr:last-child td { border-bottom: none; }
    table tbody tr:hover td { background: rgba(255,255,255,0.02); }

    .ratio-cell { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .ratio-cell.pos { background: rgba(46,204,113,0.15); color: #2ecc71; }
    .ratio-cell.neg { background: rgba(231,76,60,0.15); color: #e74c3c; }
    .ratio-cell.zero { background: rgba(255,255,255,0.05); color: #8a8aa0; }

    .chart { background: #14142a; border-radius: 12px; padding: 16px 18px; }
    .chart-grid { display: flex; gap: 4px; align-items: flex-end; height: 140px; }
    .chart-bar { flex: 1; background: linear-gradient(180deg, #4dd0e1 0%, #0288a8 100%); min-height: 2px; border-radius: 3px 3px 0 0; position: relative; }
    .chart-bar:hover { filter: brightness(1.2); }
    .chart-bar .tip { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); white-space: nowrap; background: #14142a; border: 1px solid rgba(255,255,255,0.08); padding: 4px 8px; border-radius: 6px; font-size: 11px; color: #e7e7ee; margin-bottom: 6px; opacity: 0; pointer-events: none; transition: opacity 0.1s; z-index: 5; }
    .chart-bar:hover .tip { opacity: 1; }
    .chart-labels { display: flex; gap: 4px; margin-top: 6px; font-size: 10px; color: #5a5a72; }
    .chart-labels span { flex: 1; text-align: center; }

    .err { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); padding: 16px; border-radius: 8px; color: #e74c3c; }
    .login-form { max-width: 320px; margin: 80px auto; }
    .login-form input { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: #e7e7ee; border-radius: 8px; font-size: 14px; outline: none; }
    .login-form input:focus { border-color: #4dd0e1; }
    .login-form button { width: 100%; margin-top: 10px; padding: 10px; background: #4dd0e1; color: #0a0a14; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
<div class="admin-wrap">
  <h1>Tim's Game Lab — Admin</h1>
  <p class="sub" id="meta"></p>

  <div id="content"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
let token = params.get('token') || sessionStorage.getItem('adminToken') || '';

if (!token) {
  showLogin();
} else {
  load();
}

function showLogin() {
  document.getElementById('content').innerHTML = `
    <div class="login-form">
      <p style="color:#8a8aa0;margin-bottom:10px;font-size:13px">Enter admin token:</p>
      <input id="tk" type="password" placeholder="ADMIN_TOKEN">
      <button id="go">Open</button>
    </div>
  `;
  document.getElementById('go').addEventListener('click', () => {
    token = document.getElementById('tk').value.trim();
    if (token) {
      sessionStorage.setItem('adminToken', token);
      load();
    }
  });
  document.getElementById('tk').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('go').click();
  });
}

async function load() {
  document.getElementById('content').innerHTML = '<p style="color:#8a8aa0">Loading…</p>';
  try {
    const [statsRes, gamesRes] = await Promise.all([
      fetch('/api/admin/stats?token=' + encodeURIComponent(token), { cache: 'no-store' }),
      fetch('/games.json', { cache: 'no-store' }),
    ]);
    if (statsRes.status === 403) {
      sessionStorage.removeItem('adminToken');
      showLogin();
      document.getElementById('content').insertAdjacentHTML('afterbegin', '<div class="err">Wrong token.</div>');
      return;
    }
    if (!statsRes.ok) {
      const err = await statsRes.json().catch(() => ({error: 'http ' + statsRes.status}));
      document.getElementById('content').innerHTML = `<div class="err">Error: ${err.error || statsRes.status}</div>`;
      return;
    }
    const stats = await statsRes.json();
    const games = gamesRes.ok ? await gamesRes.json() : [];

    // Use games.json as the canonical list of slugs, merging in stats
    const statsBySlug = {};
    for (const g of stats.perGame) statsBySlug[g.slug] = g;

    const merged = games.map(g => {
      const s = statsBySlug[g.slug] || { plays: 0, seconds: 0, likes: 0, dislikes: 0 };
      return {
        slug: g.slug, title: g.title,
        plays: s.plays, seconds: s.seconds, likes: s.likes, dislikes: s.dislikes,
        thumbCount: g.thumbCount || 1,
        variants: s.variants || {},
      };
    });
    stats.abGames = merged.filter(g => g.thumbCount > 1);
    // Sort by total seconds (desc), then plays
    merged.sort((a, b) => (b.seconds - a.seconds) || (b.plays - a.plays));

    stats.perGame = merged;
    render(stats);
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="err">Network error: ${e.message}</div>`;
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(d) {
  const fmt = n => Math.round(n).toLocaleString();
  const fmtMin = sec => sec < 60 ? sec + 's' : sec < 3600 ? Math.round(sec/60) + 'm' : (sec/3600).toFixed(1) + 'h';
  const dates = Object.keys(d.perDay);
  const dayValues = dates.map(date => d.perDay[date].totalSeconds);
  const maxDay = Math.max(1, ...dayValues);

  document.getElementById('meta').textContent = `Refreshed ${new Date().toLocaleTimeString()} · ${d.perGame.length} games tracked`;

  document.getElementById('content').innerHTML = `
    <div class="totals">
      <div class="stat"><div class="label">Total plays</div><div class="value">${fmt(d.totals.plays)}</div></div>
      <div class="stat"><div class="label">Total time</div><div class="value">${fmtMin(d.totals.seconds)}</div></div>
      <div class="stat"><div class="label">👍 Likes</div><div class="value">${fmt(d.totals.likes)}</div></div>
      <div class="stat"><div class="label">👎 Dislikes</div><div class="value">${fmt(d.totals.dislikes)}</div></div>
    </div>

    <h2>Per-game (sorted by total time)</h2>
    <table>
      <thead><tr>
        <th>Game</th><th class="num">Plays</th><th class="num">Time</th>
        <th class="num">Avg/play</th><th class="num">👍</th><th class="num">👎</th><th class="num">Net</th>
      </tr></thead>
      <tbody>
        ${d.perGame.map(g => {
          const avg = g.plays > 0 ? Math.round(g.seconds / g.plays) : 0;
          const net = (g.likes || 0) - (g.dislikes || 0);
          const cls = net > 0 ? 'pos' : net < 0 ? 'neg' : 'zero';
          const dim = (g.plays + g.likes + g.dislikes) === 0 ? ' style="opacity:0.5"' : '';
          return `<tr${dim}>
            <td><div style="color:#e7e7ee;font-weight:600">${escapeHtml(g.title || g.slug)}</div><div class="slug" style="font-size:11px">${g.slug}</div></td>
            <td class="num">${fmt(g.plays)}</td>
            <td class="num">${fmtMin(g.seconds)}</td>
            <td class="num">${fmtMin(avg)}</td>
            <td class="num">${fmt(g.likes)}</td>
            <td class="num">${fmt(g.dislikes)}</td>
            <td class="num"><span class="ratio-cell ${cls}">${net > 0 ? '+' : ''}${net}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    ${d.abGames && d.abGames.length ? `
    <h2>A/B thumbnail performance</h2>
    <p style="color:#8a8aa0;font-size:12px;margin:-6px 0 12px">
      Variants are picked at random per pageview, so impressions are roughly uniform —
      raw click counts are a directional CTR signal. Winning variant is bolded.
    </p>
    <table>
      <thead><tr>
        <th>Game</th><th class="num">Variants</th><th>Click split</th><th class="num">Total clicks</th><th>Winner</th>
      </tr></thead>
      <tbody>
        ${d.abGames.map(g => {
          const total = Object.values(g.variants).reduce((a, b) => a + b, 0);
          const variantNums = Array.from({length: g.thumbCount}, (_, i) => i + 1);
          const winner = total > 0
            ? variantNums.reduce((best, v) => (g.variants[v] || 0) > (g.variants[best] || 0) ? v : best, 1)
            : null;
          const split = variantNums.map(v => {
            const c = g.variants[v] || 0;
            const pct = total > 0 ? Math.round(c * 100 / total) : 0;
            const bold = winner === v ? 'font-weight:700;color:#2ecc71' : '';
            return `<span style="margin-right:10px;${bold}">v${v}: ${c} (${pct}%)</span>`;
          }).join('');
          return `<tr>
            <td><div style="color:#e7e7ee;font-weight:600">${escapeHtml(g.title || g.slug)}</div><div class="slug" style="font-size:11px">${g.slug}</div></td>
            <td class="num">${g.thumbCount}</td>
            <td>${split}</td>
            <td class="num">${total}</td>
            <td>${winner ? `<span class="ratio-cell pos">v${winner}</span>` : '<span class="ratio-cell zero">no data</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>` : ''}

    ${d.comments && d.comments.length ? `
    <h2>Recent player comments (${d.comments.length})</h2>
    <table>
      <thead><tr>
        <th>When</th><th>Game</th><th>Vote</th><th>Comment</th>
      </tr></thead>
      <tbody>
        ${d.comments.map(c => {
          const ago = c.ts ? Math.round((Date.now() - c.ts) / 60000) : '?';
          const agoStr = ago < 60 ? ago + 'm' : ago < 1440 ? Math.round(ago/60) + 'h' : Math.round(ago/1440) + 'd';
          const voteEmoji = c.vote === 'like' ? '👍' : c.vote === 'dislike' ? '👎' : '·';
          return `<tr>
            <td style="color:#8a8aa0;font-size:12px;white-space:nowrap">${agoStr} ago</td>
            <td class="slug">${escapeHtml(c.slug)}</td>
            <td>${voteEmoji}</td>
            <td>${escapeHtml(c.comment)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>` : ''}

    <h2>Last 14 days — total play time</h2>
    <div class="chart">
      <div class="chart-grid">
        ${dates.map((date, i) => {
          const sec = dayValues[i];
          const h = Math.max(2, (sec / maxDay) * 140);
          return `<div class="chart-bar" style="height:${h}px">
            <div class="tip">${date}: ${fmtMin(sec)}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="chart-labels">
        ${dates.map(d => `<span>${d.slice(5)}</span>`).join('')}
      </div>
    </div>
  `;
}
</script>
</body>
</html>
