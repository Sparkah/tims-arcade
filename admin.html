<!DOCTYPE html>
<html lang="en" data-theme="lab">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin · Tim's Game Lab</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <meta name="theme-color" content="#0e0e12">

  <script>
    (function () {
      try {
        var t = localStorage.getItem('gallery-theme');
        if (t === 'lab' || t === 'brutalist' || t === 'editorial') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="/style.css?v=2311cb67">
  <style>
    body { background: var(--bg); color: var(--ink); font-family: var(--font-body); min-height: 100vh; }

    .admin-wrap { max-width: 1100px; margin: 30px auto; padding: 0 20px 60px; }
    .admin-wrap h1 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 36px;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 4px;
    }
    html[data-theme="editorial"] .admin-wrap h1 { font-style: italic; font-weight: 900; }
    html[data-theme="brutalist"] .admin-wrap h1 { text-transform: uppercase; }
    .admin-wrap .sub {
      font-family: var(--font-mono);
      color: var(--ink-muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    .totals { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .stat {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      padding: 16px;
    }
    html[data-theme="brutalist"] .stat { border-width: 2px; border-radius: 0; }
    .stat .label {
      font-family: var(--font-mono);
      color: var(--ink-muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: var(--tracking-cap);
    }
    .stat .value {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 500;
      color: var(--ink);
      margin-top: 4px;
      letter-spacing: -0.02em;
    }
    .stat .value .unit { font-size: 14px; color: var(--ink-muted); font-weight: 400; margin-left: 4px; }

    h2 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 36px 0 12px;
    }
    html[data-theme="editorial"] h2 { font-style: italic; }
    html[data-theme="brutalist"] h2 { text-transform: uppercase; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      overflow: hidden;
    }
    html[data-theme="brutalist"] table { border-width: 2px; border-radius: 0; }
    table th, table td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--rule-soft);
      font-size: 14px;
    }
    table th {
      font-family: var(--font-mono);
      color: var(--ink-muted);
      font-weight: 500;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: var(--tracking-cap);
      background: var(--bg);
    }
    table td { color: var(--ink); font-family: var(--font-body); }
    table td.num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; text-align: right; }
    table td.slug { color: var(--accent); font-family: var(--font-mono); font-size: 12px; }
    table tbody tr:last-child td { border-bottom: none; }
    table tbody tr:hover td { background: var(--rule-soft); }

    .ratio-cell {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
    }
    html[data-theme="brutalist"] .ratio-cell { border-radius: 0; padding: 2px 6px; }
    .ratio-cell.pos  { background: var(--accent-soft); color: var(--accent); }
    .ratio-cell.neg  { background: rgba(200,69,31,0.12); color: var(--warn); }
    .ratio-cell.zero { background: var(--rule-soft); color: var(--ink-muted); }

    .chart {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-card);
      padding: 16px 18px;
    }
    html[data-theme="brutalist"] .chart { border-width: 2px; border-radius: 0; }
    .chart-grid { display: flex; gap: 4px; align-items: flex-end; height: 140px; }
    .chart-bar {
      flex: 1;
      background: var(--accent);
      min-height: 2px;
      border-radius: 2px 2px 0 0;
      position: relative;
      opacity: 0.85;
    }
    html[data-theme="brutalist"] .chart-bar { border-radius: 0; opacity: 1; }
    .chart-bar:hover { opacity: 1; }
    .chart-bar .tip {
      position: absolute;
      bottom: 100%; left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      background: var(--ink);
      color: var(--bg-card);
      font-family: var(--font-mono);
      padding: 4px 8px;
      border-radius: var(--radius);
      font-size: 11px;
      margin-bottom: 6px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
      z-index: 5;
    }
    .chart-bar:hover .tip { opacity: 1; }
    .chart-labels {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-muted);
    }
    .chart-labels span { flex: 1; text-align: center; }

    .err {
      background: rgba(200,69,31,0.08);
      border: 1px solid var(--warn);
      padding: 16px;
      border-radius: var(--radius-card);
      color: var(--warn);
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .login-form { max-width: 320px; margin: 80px auto; font-family: var(--font-body); }
    .login-form input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      color: var(--ink);
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
    }
    .login-form input:focus { border-color: var(--accent); }
    .login-form button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: var(--ink);
      color: var(--bg-card);
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }
    .login-form button:hover { background: var(--accent); }
    html[data-theme="brutalist"] .login-form input,
    html[data-theme="brutalist"] .login-form button { border-radius: 0; }
    html[data-theme="brutalist"] .login-form button { background: var(--accent); color: var(--bg); border: 2px solid var(--ink); font-weight: 700; }

    /* Theme switcher hidden 2026-05-07 (Lab-only public). Kept for re-enable. */
    .theme-switch { display: none !important; }

    .theme-switch.__legacy {
      position: fixed; top: 16px; right: 24px;
      z-index: 100;
      display: flex;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: 999px;
      padding: 3px;
    }
    .theme-switch button {
      padding: 5px 11px;
      background: none;
      border: none;
      color: var(--ink-muted);
      font-weight: 500;
      cursor: pointer;
      border-radius: 999px;
      transition: color 0.15s, background 0.15s;
    }
    .theme-switch button.active { background: var(--ink); color: var(--bg-card); }
    html[data-theme="brutalist"] .theme-switch { border-radius: 0; border-width: 2px; padding: 0; }
    html[data-theme="brutalist"] .theme-switch button { border-radius: 0; border-right: 2px solid var(--ink); }
    html[data-theme="brutalist"] .theme-switch button:last-child { border-right: none; }
    html[data-theme="brutalist"] .theme-switch button.active { background: var(--accent); color: var(--bg); }
  </style>
</head>
<body>
<nav class="theme-switch" id="theme-switch" aria-label="Theme switcher">
  <button data-theme-btn="lab"        class="active">Lab</button>
  <button data-theme-btn="brutalist">Raw</button>
  <button data-theme-btn="editorial">Print</button>
</nav>

<div class="admin-wrap">
  <h1>Tim's Game Lab — Admin</h1>
  <p class="sub" id="meta"></p>

  <div id="content"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
let token = params.get('token') || sessionStorage.getItem('adminToken') || '';

if (!token) {
  showLogin();
} else {
  load();
}

// Auto-refresh when the tab comes back into focus, but only if data
// has been on screen for >30s. Server-side cache is 5 min anyway, so
// frequent tab-switches don't actually re-walk KV.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  if (!token) return;
  if (Date.now() - lastLoadAt < MIN_REFRESH_MS) return;
  load();
});

// Theme switcher
(function () {
  const html = document.documentElement;
  const switchEl = document.getElementById('theme-switch');
  function setTheme(t) {
    html.setAttribute('data-theme', t);
    try { localStorage.setItem('gallery-theme', t); } catch (e) {}
    switchEl.querySelectorAll('button').forEach(b =>
      b.classList.toggle('active', b.dataset.themeBtn === t));
  }
  switchEl.addEventListener('click', e => {
    const btn = e.target.closest('button[data-theme-btn]');
    if (btn) setTheme(btn.dataset.themeBtn);
  });
  const current = html.getAttribute('data-theme') || 'lab';
  switchEl.querySelectorAll('button').forEach(b =>
    b.classList.toggle('active', b.dataset.themeBtn === current));
})();

function showLogin() {
  document.getElementById('content').innerHTML = `
    <div class="login-form">
      <p style="color:#8a8aa0;margin-bottom:10px;font-size:13px">Enter admin token:</p>
      <input id="tk" type="password" placeholder="ADMIN_TOKEN">
      <button id="go">Open</button>
    </div>
  `;
  document.getElementById('go').addEventListener('click', () => {
    token = document.getElementById('tk').value.trim();
    if (token) {
      sessionStorage.setItem('adminToken', token);
      load();
    }
  });
  document.getElementById('tk').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('go').click();
  });
}

let lastLoadAt = 0;
const MIN_REFRESH_MS = 30 * 1000;   // don't refetch more than once per 30s

async function load() {
  document.getElementById('content').innerHTML = '<p style="color:#8a8aa0">Loading…</p>';
  lastLoadAt = Date.now();
  try {
    const [statsRes, gamesRes] = await Promise.all([
      fetch('/api/admin/stats?token=' + encodeURIComponent(token), { cache: 'no-store' }),
      fetch('/games.json', { cache: 'no-store' }),
    ]);
    if (statsRes.status === 403) {
      sessionStorage.removeItem('adminToken');
      showLogin();
      document.getElementById('content').insertAdjacentHTML('afterbegin', '<div class="err">Wrong token.</div>');
      return;
    }
    if (!statsRes.ok) {
      const err = await statsRes.json().catch(() => ({error: 'http ' + statsRes.status}));
      document.getElementById('content').innerHTML = `<div class="err">Error: ${err.error || statsRes.status}</div>`;
      return;
    }
    const stats = await statsRes.json();
    const games = gamesRes.ok ? await gamesRes.json() : [];

    // Use games.json as the canonical list of slugs, merging in stats
    const statsBySlug = {};
    for (const g of stats.perGame) statsBySlug[g.slug] = g;

    const merged = games.map(g => {
      const s = statsBySlug[g.slug] || { plays: 0, seconds: 0, likes: 0, dislikes: 0 };
      return {
        slug: g.slug, title: g.title,
        plays: s.plays, seconds: s.seconds, likes: s.likes, dislikes: s.dislikes,
        thumbCount: g.thumbCount || 1,
        variants: s.variants || {},
      };
    });
    stats.abGames = merged.filter(g => g.thumbCount > 1);
    // Sort by total seconds (desc), then plays
    merged.sort((a, b) => (b.seconds - a.seconds) || (b.plays - a.plays));

    stats.perGame = merged;
    render(stats);

    // Lazy-load user digests after stats render so the page paints immediately.
    loadUserDigests().catch(e => console.error('user-digests:', e));
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="err">Network error: ${e.message}</div>`;
  }
}

async function loadUserDigests({ force } = {}) {
  const el = document.getElementById('user-digests');
  if (!el) return;
  el.innerHTML = '<div style="opacity:0.5;font-style:italic;padding:12px 0;">Loading user digests…</div>';
  try {
    const url = '/api/admin/user-digests?token=' + encodeURIComponent(token) + (force ? '&nocache=1' : '');
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      el.innerHTML = `<div class="err">User digests: ${err.error || r.status}</div>`;
      return;
    }
    const d = await r.json();
    if (!d.users || d.users.length === 0) {
      el.innerHTML = '<div style="opacity:0.5;font-style:italic;padding:12px 0;">No user activity yet — PostHog hasn\'t recorded any persons.</div>';
      return;
    }
    const totalLine = d.total_users > d.showing
      ? `Showing <b>${d.showing}</b> most recent of <b>${d.total_users}</b> persons`
      : `<b>${d.total_users}</b> persons`;
    const summary = `<p style="opacity:0.7;font-size:12px;margin:0 0 14px;">${totalLine} (<b>${d.identified}</b> identified, <b>${d.anonymous}</b> anonymous) · generated ${new Date(d.generated_at).toLocaleTimeString()}</p>`;
    const cards = d.users.map(u => {
      const last = u.last_seen ? new Date(u.last_seen).toLocaleString() : '—';
      const idDisplay = u.email || (u.id ? u.id.slice(0, 12) + '…' : 'anon');
      const topEvents = Object.entries(u.top_events || {})
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5)
        .map(([k, v]) => `<span style="font-family:var(--font-mono);font-size:11px;background:var(--rule-soft,rgba(14,14,18,0.06));padding:2px 6px;border-radius:3px;margin-right:4px;">${escapeHtml(k)}·${v}</span>`)
        .join('');
      return `<div style="border:1px solid var(--rule);border-radius:6px;padding:14px 16px;margin-bottom:10px;background:var(--bg-card);">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
          <strong style="font-family:var(--font-mono);font-size:13px;">${escapeHtml(idDisplay)}</strong>
          <span style="font-family:var(--font-mono);font-size:11px;opacity:0.6;">${u.event_count} events · last ${last}</span>
        </div>
        <p style="margin:6px 0 10px;font-size:13px;line-height:1.5;">${escapeHtml(u.digest)}</p>
        <div>${topEvents}</div>
      </div>`;
    }).join('');
    el.innerHTML = summary + cards;
  } catch (e) {
    el.innerHTML = `<div class="err">Failed to load digests: ${e.message}</div>`;
  }
}

document.addEventListener('click', (e) => {
  if (e.target && e.target.id === 'refresh-user-digests') {
    e.preventDefault();
    loadUserDigests({ force: true });
  }
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(d) {
  const fmt = n => Math.round(n).toLocaleString();
  const fmtMin = sec => sec < 60 ? sec + 's' : sec < 3600 ? Math.round(sec/60) + 'm' : (sec/3600).toFixed(1) + 'h';
  const dates = Object.keys(d.perDay);
  const dayValues = dates.map(date => d.perDay[date].totalSeconds);
  const maxDay = Math.max(1, ...dayValues);

  document.getElementById('meta').textContent = `Refreshed ${new Date().toLocaleTimeString()} · ${d.perGame.length} games tracked`;

  // ── Daily highlights panel — morning scan ──────────────────────────────
  const h = d.highlights || {};
  const titleFor = slug => {
    const g = d.perGame.find(x => x.slug === slug);
    return g ? (g.title || slug) : slug;
  };
  const deltaSign = h.secondsDelta > 0 ? '↑' : h.secondsDelta < 0 ? '↓' : '·';
  const deltaCls = h.secondsDelta > 0 ? 'pos' : h.secondsDelta < 0 ? 'neg' : 'zero';
  const deltaTxt = `${deltaSign} ${fmtMin(Math.abs(h.secondsDelta || 0))} vs yesterday`;

  const todayTopHtml = h.todayTop
    ? `<div style="margin-top:6px"><strong>${escapeHtml(titleFor(h.todayTop.slug))}</strong> · ${fmtMin(h.todayTop.seconds)} played today</div>`
    : `<div style="color:#6a6a82;margin-top:6px">No plays today yet</div>`;

  const iterationHtml = (h.iterationQueue && h.iterationQueue.length)
    ? h.iterationQueue.slice(0, 3).map((g, i) =>
        `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:${i < Math.min(2, h.iterationQueue.length-1) ? '1px solid rgba(255,255,255,0.04)' : 'none'}">
          <span><strong>#${i+1}</strong> ${escapeHtml(titleFor(g.slug))}</span>
          <span style="color:#8a8aa0;font-size:12px">${g.plays}p · ${g.avgSec}s avg · 👍${g.likes} · score ${Math.round(g.engagement)}</span>
        </div>`
      ).join('')
    : `<div style="color:#6a6a82">No games passed eligibility threshold (likes≥3 OR plays≥5+30s avg)</div>`;

  document.getElementById('content').innerHTML = `
    <div class="pulse" style="background:linear-gradient(135deg,#14142a 0%,#1a1d3a 100%);border:1px solid rgba(77,208,225,0.18);border-radius:14px;padding:18px 22px;margin-bottom:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:18px;font-weight:700;color:#f7f7fa">Today's Pulse <span style="color:#8a8aa0;font-weight:400;font-size:13px">${escapeHtml(h.todayDate || '')}</span></div>
        <div class="ratio-cell ${deltaCls}" style="font-size:12px">${deltaTxt}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <div>
          <div style="color:#8a8aa0;font-size:12px;text-transform:uppercase;letter-spacing:0.06em">Today played</div>
          <div style="font-size:24px;font-weight:800;color:#4dd0e1;margin-top:2px">${fmtMin(h.todaySeconds || 0)}</div>
          ${todayTopHtml}
          ${h.newCommentsCount > 0 ? `<div style="margin-top:10px;font-size:13px;color:#ffd23f">📝 ${h.newCommentsCount} new comment(s) in last 24h</div>` : ''}
        </div>
        <div>
          <div style="color:#8a8aa0;font-size:12px;text-transform:uppercase;letter-spacing:0.06em">Tomorrow's iteration queue</div>
          <div style="margin-top:6px;font-size:13px">
            ${iterationHtml}
          </div>
        </div>
      </div>
    </div>

    <div class="totals">
      <div class="stat"><div class="label">Total plays</div><div class="value">${fmt(d.totals.plays)}</div></div>
      <div class="stat"><div class="label">Total time</div><div class="value">${fmtMin(d.totals.seconds)}</div></div>
      <div class="stat"><div class="label">👍 Likes</div><div class="value">${fmt(d.totals.likes)}</div></div>
      <div class="stat"><div class="label">👎 Dislikes</div><div class="value">${fmt(d.totals.dislikes)}</div></div>
    </div>

    <h2>Per-game (sorted by total time)</h2>
    <table>
      <thead><tr>
        <th>Game</th><th class="num">Plays</th><th class="num">Time</th>
        <th class="num">Avg/play</th><th class="num">👍</th><th class="num">👎</th><th class="num">Net</th>
      </tr></thead>
      <tbody>
        ${d.perGame.map(g => {
          const avg = g.plays > 0 ? Math.round(g.seconds / g.plays) : 0;
          const net = (g.likes || 0) - (g.dislikes || 0);
          const cls = net > 0 ? 'pos' : net < 0 ? 'neg' : 'zero';
          const dim = (g.plays + g.likes + g.dislikes) === 0 ? ' style="opacity:0.5"' : '';
          return `<tr${dim}>
            <td><div style="color:#e7e7ee;font-weight:600">${escapeHtml(g.title || g.slug)}</div><div class="slug" style="font-size:11px">${g.slug}</div></td>
            <td class="num">${fmt(g.plays)}</td>
            <td class="num">${fmtMin(g.seconds)}</td>
            <td class="num">${fmtMin(avg)}</td>
            <td class="num">${fmt(g.likes)}</td>
            <td class="num">${fmt(g.dislikes)}</td>
            <td class="num"><span class="ratio-cell ${cls}">${net > 0 ? '+' : ''}${net}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    ${d.abGames && d.abGames.length ? `
    <h2>A/B thumbnail performance</h2>
    <p style="color:#8a8aa0;font-size:12px;margin:-6px 0 12px">
      Variants are picked at random per pageview, so impressions are roughly uniform —
      raw click counts are a directional CTR signal. Winning variant is bolded.
    </p>
    <table>
      <thead><tr>
        <th>Game</th><th class="num">Variants</th><th>Click split</th><th class="num">Total clicks</th><th>Winner</th>
      </tr></thead>
      <tbody>
        ${d.abGames.map(g => {
          const total = Object.values(g.variants).reduce((a, b) => a + b, 0);
          const variantNums = Array.from({length: g.thumbCount}, (_, i) => i + 1);
          const winner = total > 0
            ? variantNums.reduce((best, v) => (g.variants[v] || 0) > (g.variants[best] || 0) ? v : best, 1)
            : null;
          const split = variantNums.map(v => {
            const c = g.variants[v] || 0;
            const pct = total > 0 ? Math.round(c * 100 / total) : 0;
            const bold = winner === v ? 'font-weight:700;color:#2ecc71' : '';
            return `<span style="margin-right:10px;${bold}">v${v}: ${c} (${pct}%)</span>`;
          }).join('');
          return `<tr>
            <td><div style="color:#e7e7ee;font-weight:600">${escapeHtml(g.title || g.slug)}</div><div class="slug" style="font-size:11px">${g.slug}</div></td>
            <td class="num">${g.thumbCount}</td>
            <td>${split}</td>
            <td class="num">${total}</td>
            <td>${winner ? `<span class="ratio-cell pos">v${winner}</span>` : '<span class="ratio-cell zero">no data</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>` : ''}

    <h2 style="display:flex;align-items:center;justify-content:space-between;">
      <span>User digests <span style="opacity:0.5;font-weight:400;font-size:14px;">(PostHog-derived per-visitor summaries)</span></span>
      <button id="refresh-user-digests" style="font-family:var(--font-mono);font-size:11px;padding:6px 12px;border:1px solid var(--rule);background:transparent;color:var(--ink-soft);cursor:pointer;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;">↻ Regenerate</button>
    </h2>
    <div id="user-digests" style="margin-bottom:32px;">
      <div style="opacity:0.5;font-style:italic;padding:12px 0;">Loading…</div>
    </div>

    ${d.comments && d.comments.length ? `
    <h2>Recent player comments (${d.comments.length})</h2>
    <table>
      <thead><tr>
        <th>When</th><th>Game</th><th>Vote</th><th>Comment</th><th>Image</th>
      </tr></thead>
      <tbody>
        ${d.comments.map(c => {
          const ago = c.ts ? Math.round((Date.now() - c.ts) / 60000) : '?';
          const agoStr = ago < 60 ? ago + 'm' : ago < 1440 ? Math.round(ago/60) + 'h' : Math.round(ago/1440) + 'd';
          const voteEmoji = c.vote === 'like' ? '👍' : c.vote === 'dislike' ? '👎' : '·';
          const imgCell = c.imageId
            ? `<a href="/api/admin/feedback-image?token=${encodeURIComponent(token)}&slug=${encodeURIComponent(c.slug)}&id=${encodeURIComponent(c.imageId)}" target="_blank" rel="noopener"><img src="/api/admin/feedback-image?token=${encodeURIComponent(token)}&slug=${encodeURIComponent(c.slug)}&id=${encodeURIComponent(c.imageId)}" style="max-width:80px;max-height:60px;border:1px solid #2a2a35;border-radius:3px;display:block" alt="screenshot"></a>`
            : '<span style="color:#3a3a45">—</span>';
          return `<tr>
            <td style="color:#8a8aa0;font-size:12px;white-space:nowrap">${agoStr} ago</td>
            <td class="slug">${escapeHtml(c.slug)}</td>
            <td>${voteEmoji}</td>
            <td>${escapeHtml(c.comment || '')}</td>
            <td>${imgCell}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>` : ''}

    <h2>Last 14 days — total play time</h2>
    <div class="chart">
      <div class="chart-grid">
        ${dates.map((date, i) => {
          const sec = dayValues[i];
          const h = Math.max(2, (sec / maxDay) * 140);
          return `<div class="chart-bar" style="height:${h}px">
            <div class="tip">${date}: ${fmtMin(sec)}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="chart-labels">
        ${dates.map(d => `<span>${d.slice(5)}</span>`).join('')}
      </div>
    </div>
  `;
}
</script>
</body>
</html>
