<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Your games — Tim's Game Lab</title>
  <style>
    :root { --bg:#0e0e12; --panel:#16161d; --line:#26262f; --txt:#c9c9d4; --dim:#8a8a96; --accent:#7aa2f7; --ok:#5ad19a; --err:#f7768e; }
    * { box-sizing: border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--txt); margin:0; padding:24px; line-height:1.5; }
    main { max-width:640px; margin:0 auto; }
    h1 { font-size:24px; margin:0 0 4px; }
    .sub { color:var(--dim); margin:0 0 24px; font-size:14px; }
    a { color:var(--accent); }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-bottom:12px; }
    .card h3 { margin:0; font-size:16px; }
    .row { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
    .badge { font-size:10px; text-transform:uppercase; letter-spacing:0.05em; padding:2px 9px; border-radius:999px; font-weight:600; white-space:nowrap; }
    .hook { color:var(--dim); font-size:13px; margin-top:4px; }
    .stats { display:flex; gap:22px; margin-top:12px; }
    .stat .n { font-size:21px; font-weight:700; color:var(--txt); }
    .stat .l { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:0.04em; }
    .muted { color:var(--dim); font-size:12px; }
    .empty, .gate { text-align:center; padding:44px 16px; color:var(--dim); }
    .btn { display:inline-block; background:var(--accent); color:#06070d; padding:10px 18px; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px; margin-top:12px; }
    .foot { margin-top:24px; font-size:14px; }
  </style>
</head>
<body>
<main>
  <h1>Your games</h1>
  <p class="sub" id="who">Plays, play-time and likes for the games you've submitted.</p>
  <div id="content"><p class="muted">Loading…</p></div>
  <p class="foot"><a href="/">← back to gallery</a> &nbsp;·&nbsp; <a href="/submit">submit another game</a></p>
</main>
<script>
const $ = (id) => document.getElementById(id);
function fmtTime(sec){ if(!sec) return '0m'; const h=Math.floor(sec/3600), m=Math.round((sec%3600)/60); return h ? h+'h '+m+'m' : m+'m'; }
const STATUS_COLOR = { pending:'#c9933a', approved:'#5ad19a', live:'#7aa2f7', rejected:'#f7768e' };

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text != null) node.textContent = text;
  return node;
}

function buttonLink(href, text) {
  const a = el('a', 'btn', text);
  a.href = href;
  return a;
}

function playHref(g){
  // Prefer the TRACKED gallery surface for live games so plays / heartbeat /
  // votes / comments count - those KV counters are exactly the stats this
  // dashboard shows, so routing a creator to the raw sandbox host (untracked)
  // means their own numbers never move (Tim 2026-06-01). The raw sandboxUrl is
  // only a pre-deploy preview fallback for not-yet-live uploads.
  if (g.status === 'live' && g.slug) return '/play.html?slug=' + encodeURIComponent(g.slug);
  if (g.sandboxUrl && /^https:\/\//.test(g.sandboxUrl)) return g.sandboxUrl;
  return null;
}

function renderGate(message, href, label, className) {
  const box = el('div', className || 'gate');
  const p = el('p', '', message);
  box.appendChild(p);
  box.appendChild(buttonLink(href, label));
  return box;
}

function statBox(value, label) {
  const box = el('div', 'stat');
  box.appendChild(el('div', 'n', value));
  box.appendChild(el('div', 'l', label));
  return box;
}

function card(g){
  const color = STATUS_COLOR[g.status] || '#8a8a96';
  const href = playHref(g);
  const node = el('div', 'card');
  const row = el('div', 'row');
  row.appendChild(el('h3', '', g.title || 'Untitled game'));
  const badge = el('span', 'badge', g.status || 'unknown');
  badge.style.background = color;
  badge.style.color = '#06070d';
  row.appendChild(badge);
  node.appendChild(row);
  if (g.hook) node.appendChild(el('div', 'hook', g.hook));
  const stats = el('div', 'stats');
  stats.appendChild(statBox(String(g.plays || 0), 'plays'));
  stats.appendChild(statBox(fmtTime(g.seconds), 'play time'));
  stats.appendChild(statBox(String(g.likes || 0), 'likes'));
  node.appendChild(stats);
  if (g.status !== 'live') {
    const note = el('div', 'muted', 'Stats start counting once the game is reviewed and live.');
    note.style.marginTop = '10px';
    node.appendChild(note);
  }
  const foot = el('div', 'muted', g.slug || '');
  foot.style.marginTop = '8px';
  if (href) {
    foot.appendChild(document.createTextNode(' \u00a0·\u00a0 '));
    const play = el('a', '', 'play');
    play.href = href;
    if (href[0] !== '/') {
      play.target = '_blank';
      play.rel = 'noopener';
    }
    foot.appendChild(play);
  }
  node.appendChild(foot);
  return node;
}

async function load(){
  let d = { signed_in:false, games:[] };
  try { d = await (await fetch('/api/me/games', { cache:'no-store' })).json(); } catch {}
  const el = $('content');
  if (!d.signed_in){
    $('who').textContent = '';
    el.replaceChildren(renderGate('Sign in to see your games and how they\'re doing.', '/login?next=/creator', 'Sign in', 'gate'));
    return;
  }
  if (d.email) $('who').textContent = 'Signed in as ' + d.email + ' · plays, play-time and likes for the games you submitted.';
  if (!d.games.length){
    el.replaceChildren(renderGate('You haven\'t submitted any games yet.', '/submit', 'Submit a game', 'empty'));
    return;
  }
  el.replaceChildren(...d.games.map(card));
}
load();
</script>
</body>
</html>
