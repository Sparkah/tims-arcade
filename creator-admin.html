<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>Game admin -- Tim's Game Lab</title>
  <style>
    :root {
      color-scheme: dark;
      --bg:#0e0e12; --panel:#171821; --panel2:#20222c; --line:#313544;
      --ink:#f3f1e8; --muted:#a1a5b5; --accent:#7aa2f7; --good:#5ad19a;
      --warn:#ffd166; --bad:#f7768e; --field:#232731;
    }
    * { box-sizing: border-box; }
    html, body { margin:0; min-height:100%; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; line-height:1.45; }
    a { color:var(--accent); }
    button, input, textarea, select { font:inherit; }
    button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, canvas:focus-visible {
      outline:3px solid var(--accent); outline-offset:2px;
    }
    .top { display:flex; align-items:center; gap:14px; padding:14px 18px; border-bottom:1px solid var(--line); background:#11131a; position:sticky; top:0; z-index:5; }
    .brand { font-weight:700; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .top nav { margin-left:auto; display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .shell { display:grid; grid-template-columns:minmax(380px, 1fr) minmax(330px, 430px); gap:16px; padding:16px; max-width:1280px; margin:0 auto; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; }
    .bar, .tools, .actions { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .bar { margin-bottom:12px; }
    label { color:var(--muted); font-size:13px; display:block; }
    input, textarea, select { width:100%; margin-top:4px; color:var(--ink); background:#0f1118; border:1px solid var(--line); border-radius:7px; padding:9px 10px; }
    textarea { min-height:72px; resize:vertical; }
    select { min-width:130px; }
    button, .btn { border:1px solid var(--line); background:var(--panel2); color:var(--ink); border-radius:7px; padding:9px 12px; cursor:pointer; text-decoration:none; display:inline-block; }
    button.primary, .btn.primary { background:var(--accent); color:#06070d; border-color:transparent; font-weight:700; }
    button.good { background:var(--good); color:#06140d; border-color:transparent; font-weight:700; }
    button.danger { color:var(--bad); }
    button[aria-pressed="true"] { background:var(--ink); color:#080910; border-color:transparent; }
    button:disabled { opacity:.48; cursor:not-allowed; }
    .canvas-wrap { display:flex; justify-content:center; padding:12px; background:#0b0d12; border:1px solid var(--line); border-radius:8px; overflow:auto; }
    canvas { width:min(100%, 420px); aspect-ratio:360/640; max-height:calc(100vh - 230px); background:var(--field); border:4px solid #4b5261; border-radius:6px; touch-action:none; }
    h1, h2 { margin:0; }
    h1 { font-size:19px; }
    h2 { font-size:15px; margin-bottom:10px; }
    .hint, .status { color:var(--muted); font-size:13px; }
    .status[data-tone="ok"] { color:var(--good); }
    .status[data-tone="error"] { color:var(--bad); }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .stack { display:flex; flex-direction:column; gap:12px; }
    .gate { max-width:430px; margin:12vh auto; padding:22px; }
    .selection { border:1px solid var(--line); background:#10131a; padding:10px; border-radius:7px; color:var(--ink); margin-bottom:10px; }
    .json-preview { min-height:130px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; }
    .password-box { border:1px solid rgba(255,209,102,.45); background:rgba(255,209,102,.09); border-radius:8px; padding:10px; color:#ffe3a0; }
    .empty-note { color:var(--muted); font-size:13px; }
    .history-list { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px; max-block-size:340px; overflow-y:auto; scrollbar-gutter:stable; }
    .history-item { border:1px solid var(--line); background:#10131a; border-radius:8px; padding:10px; overflow-wrap:anywhere; }
    .history-item.player { margin-left:18px; background:#121827; border-color:rgba(122,162,247,.45); }
    .history-item.studio { margin-right:18px; }
    .history-item.failed { border-color:rgba(247,118,142,.55); }
    .history-head { display:flex; justify-content:space-between; gap:8px; flex-wrap:wrap; color:var(--muted); font-size:12px; }
    .history-version { color:var(--ink); font-weight:700; }
    .history-text { margin:6px 0 0; white-space:pre-wrap; font-size:13px; }
    @media (max-width: 860px) {
      .shell { grid-template-columns:1fr; padding:10px; }
      canvas { max-height:none; }
      .top { align-items:flex-start; flex-direction:column; }
      .top nav { margin-left:0; justify-content:flex-start; }
    }
  </style>
</head>
<body>
  <header class="top">
    <a href="/create">Create</a>
    <div class="brand" id="title">Game admin</div>
    <nav aria-label="Game admin links">
      <a id="playLink" href="/create">Play</a>
      <a href="/creator">Your games</a>
    </nav>
  </header>

  <main id="app">
    <section class="panel gate">
      <h1>Loading game admin</h1>
      <p class="hint">Opening the level builder...</p>
    </section>
  </main>

  <template id="adminShellTemplate">
    <div class="shell">
      <section class="stack" aria-label="Level builder workspace">
        <div class="panel bar">
          <label>Level<select id="levelSelect"></select></label>
          <button id="prevLevel" type="button">Prev</button>
          <button id="nextLevel" type="button">Next</button>
          <button id="addLevel" type="button">Add</button>
          <button id="duplicateLevel" type="button">Duplicate</button>
          <button id="deleteLevel" class="danger" type="button">Delete</button>
          <span id="status" class="status" role="status" aria-live="polite"></span>
        </div>
        <div class="panel tools" role="toolbar" aria-label="Level tools">
          <button type="button" data-tool="select" aria-pressed="true">Select</button>
          <button type="button" data-tool="player" aria-pressed="false">Player</button>
          <button type="button" data-tool="goal" aria-pressed="false">Goal</button>
          <button type="button" data-tool="wall" aria-pressed="false">Wall</button>
          <button type="button" data-tool="platform" aria-pressed="false">Platform</button>
          <button type="button" data-tool="hazard" aria-pressed="false">Hazard</button>
          <button type="button" data-tool="enemy" aria-pressed="false">Enemy</button>
          <button type="button" data-tool="coin" aria-pressed="false">Coin</button>
          <button type="button" data-tool="note" aria-pressed="false">Note</button>
        </div>
        <div class="canvas-wrap"><canvas id="field" width="360" height="640" tabindex="0" aria-label="Level layout canvas"></canvas></div>
      </section>
      <aside class="stack" aria-label="Inspector and game controls">
        <section class="panel">
          <h2>Selection</h2>
          <div id="selectedLabel" class="selection">Nothing selected</div>
          <div class="grid3">
            <label>X<input id="inX" type="number" step="1"></label>
            <label>Y<input id="inY" type="number" step="1"></label>
            <label>Value<input id="inValue" type="number" step="1"></label>
          </div>
          <div class="grid2" style="margin-top:8px">
            <label>Width<input id="inW" type="number" step="1"></label>
            <label>Height<input id="inH" type="number" step="1"></label>
          </div>
          <label style="margin-top:8px">Label<input id="inLabel" type="text" maxlength="60"></label>
          <div class="actions" style="margin-top:10px"><button id="deleteObj" class="danger" type="button">Delete selected</button></div>
        </section>
        <section class="panel">
          <h2>Level notes</h2>
          <label for="levelName">Name</label>
          <input id="levelName" type="text" maxlength="60">
          <label for="levelNotes" style="margin-top:8px">Designer notes</label>
          <textarea id="levelNotes" maxlength="500"></textarea>
        </section>
        <section class="panel">
          <h2>Save</h2>
          <div class="actions">
            <button id="saveLevels" class="primary" type="button">Save levels</button>
            <button id="resetPassword" type="button">Reset password</button>
          </div>
          <div id="passwordBox" style="margin-top:10px"></div>
          <p class="hint">Saved levels are delivered to the game wrapper. Games generated after this update know how to use them; older games may need Iterate once.</p>
        </section>
        <section class="panel"><h2>Update chat</h2><ol id="historyList" class="history-list" aria-label="Update history"></ol></section>
        <section class="panel" id="iterate">
          <h2>Iterate</h2>
          <form id="iterateForm" action="/api/gen/submit" method="post">
            <label for="iteratePrompt">Message builder</label>
            <textarea id="iteratePrompt" name="prompt" maxlength="500" placeholder="Make this game use my saved levels, add level select, and tune level 3 to be easier"></textarea>
            <button id="iterateBtn" class="good" type="submit" style="margin-top:10px">Iterate this game</button>
          </form>
          <p id="iterateHint" class="hint"></p>
        </section>
        <section class="panel">
          <h2>Level JSON</h2>
          <textarea id="jsonPreview" class="json-preview" readonly spellcheck="false"></textarea>
        </section>
      </aside>
    </div>
  </template>

  <script>
  (function () {
    'use strict';
    var FIELD_W = 360, FIELD_H = 640;
    var q = new URLSearchParams(location.search);
    var id = (q.get('id') || '').toLowerCase();
    var api = '/api/me/creation-admin';
    var app = document.getElementById('app');
    var titleEl = document.getElementById('title');
    var playLink = document.getElementById('playLink');
    var state = { game:null, levels:[], history:[], index:0, tool:'select', selected:null, drag:null, password:'', dirty:false, poll:null };
    var els = {};

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function num(v, fb) { var n = Number(v); return Number.isFinite(n) ? n : (fb || 0); }
    function clone(v) { return JSON.parse(JSON.stringify(v)); }
    function uuid() { return Math.random().toString(16).slice(2) + Date.now().toString(16); }
    function level() { return state.levels[state.index]; }
    function setStatus(msg, tone) { if (els.status) { els.status.textContent = msg || ''; els.status.dataset.tone = tone || ''; } }

    function defaultLevel(n) {
      return { name:'Level ' + n, width:FIELD_W, height:FIELD_H, player:{x:180,y:560}, goal:{x:180,y:100}, objects:[], notes:'' };
    }

    function post(body) {
      body.id = id;
      if (state.password && !body.password) body.password = state.password;
      return fetch(api, { method:'POST', credentials:'same-origin', headers:{ 'content-type':'application/json' }, body:JSON.stringify(body) })
        .then(function (r) { return r.json().then(function (d) { if (!r.ok || !d || d.ok === false) throw new Error((d && d.error) || ('request_' + r.status)); return d; }); });
    }

    function load() {
      if (!/^[0-9a-z]{8,40}$/.test(id)) { showGate('Bad admin link.'); return; }
      fetch(api + '?id=' + encodeURIComponent(id), { credentials:'same-origin', cache:'no-store' })
        .then(function (r) { return r.json().then(function (d) { if (!r.ok || !d.ok) throw new Error((d && d.error) || 'load_failed'); return d; }); })
        .then(mount)
        .catch(function () { showGate('Enter the admin password from your game email.'); });
    }

    function showGate(message) {
      var section = document.createElement('section');
      section.className = 'panel gate';
      var heading = document.createElement('h1');
      heading.textContent = 'Open game admin';
      var hint = document.createElement('p');
      hint.className = 'hint';
      hint.textContent = message || '';
      var form = document.createElement('form');
      form.id = 'passForm';
      var label = document.createElement('label');
      label.setAttribute('for', 'adminPass');
      label.textContent = 'Admin password';
      var input = document.createElement('input');
      input.id = 'adminPass';
      input.type = 'password';
      input.autocomplete = 'current-password';
      input.required = true;
      var button = document.createElement('button');
      button.className = 'primary';
      button.type = 'submit';
      button.style.width = '100%';
      button.style.marginTop = '12px';
      button.textContent = 'Open level builder';
      var foot = document.createElement('p');
      foot.className = 'hint';
      foot.textContent = 'If this is your game, signing in with the same email also opens it.';
      form.appendChild(label);
      form.appendChild(input);
      form.appendChild(button);
      section.appendChild(heading);
      section.appendChild(hint);
      section.appendChild(form);
      section.appendChild(foot);
      app.replaceChildren(section);
      document.getElementById('passForm').addEventListener('submit', function (event) {
        event.preventDefault();
        state.password = document.getElementById('adminPass').value;
        post({ action:'load' }).then(mount).catch(function () { showGate('Wrong password.'); });
      });
      document.getElementById('adminPass').focus();
    }

    function mount(data) {
      stopUpdatePoll();
      state.game = data.game;
      state.levels = Array.isArray(data.levels) && data.levels.length ? data.levels : [defaultLevel(1)];
      state.history = Array.isArray(data.history) ? data.history : [];
      state.index = 0; state.selected = null; state.dirty = false;
      titleEl.textContent = (state.game && (state.game.versionName || state.game.title) ? (state.game.versionName || state.game.title) : 'Game') + ' admin';
      if (state.game && state.game.playUrl) playLink.href = state.game.playUrl;
      renderShell(data.generatedPassword || '');
      bind();
      syncAll();
      renderHistory();
      setStatus('Loaded ' + state.levels.length + ' level' + (state.levels.length === 1 ? '' : 's') + '.', 'ok');
      var pendingJob = pendingJobFromHistory();
      if (pendingJob) {
        setStatus('Checking queued update...');
        startUpdatePoll(pendingJob);
      }
    }

    function renderShell(newPassword) {
      var template = document.getElementById('adminShellTemplate');
      app.replaceChildren(template.content.cloneNode(true));
      if (newPassword) showPassword(newPassword);
    }

    function showPassword(password) {
      var box = document.getElementById('passwordBox');
      if (!box) return;
      var panel = document.createElement('div');
      panel.className = 'password-box';
      var strong = document.createElement('strong');
      strong.textContent = 'Admin password';
      var code = document.createElement('code');
      code.textContent = String(password || '');
      var hint = document.createElement('div');
      hint.className = 'hint';
      hint.textContent = 'Save this now. It is only shown once.';
      panel.appendChild(strong);
      panel.appendChild(document.createElement('br'));
      panel.appendChild(code);
      panel.appendChild(hint);
      box.replaceChildren(panel);
    }
    function formatTime(ts) {
      if (!ts) return '';
      try { return new Date(ts).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); } catch (e) { return ''; }
    }
    function renderHistory() {
      if (!els.history) return;
      var items = (state.history || []).slice().sort(function (a, b) { return (a.ts || 0) - (b.ts || 0); });
      if (!items.length) {
        var empty = document.createElement('li');
        empty.className = 'empty-note';
        empty.textContent = 'No updates yet.';
        els.history.replaceChildren(empty);
        return;
      }
      var fragment = document.createDocumentFragment();
      items.forEach(function (item) {
        var role = item.role === 'player' ? 'player' : 'studio';
        var status = item.status === 'failed' || item.type === 'failed' ? ' failed' : '';
        var label = role === 'player' ? 'Player request' : (item.status === 'ready' ? 'Game update' : 'Builder');
        var text = item.summary || item.text || '';
        var version = item.versionName || (item.versionNumber ? ('Version ' + item.versionNumber) : 'Update');
        var row = document.createElement('li');
        row.className = 'history-item ' + role + status;
        var head = document.createElement('div');
        head.className = 'history-head';
        var labelWrap = document.createElement('span');
        var versionNode = document.createElement('span');
        versionNode.className = 'history-version';
        versionNode.textContent = version;
        labelWrap.appendChild(versionNode);
        labelWrap.appendChild(document.createTextNode(' · ' + label));
        var time = document.createElement('time');
        time.textContent = formatTime(item.ts);
        head.appendChild(labelWrap);
        head.appendChild(time);
        row.appendChild(head);
        if (text) {
          var body = document.createElement('p');
          body.className = 'history-text';
          body.textContent = text;
          row.appendChild(body);
        }
        fragment.appendChild(row);
      });
      els.history.replaceChildren(fragment);
      els.history.scrollTop = els.history.scrollHeight;
    }
    function pushHistoryEvent(item) {
      state.history = (state.history || []).filter(function (existing) { return existing.id !== item.id; });
      state.history.push(item);
      renderHistory();
    }
    function pendingJobFromHistory() {
      var terminal = {};
      (state.history || []).forEach(function (item) {
        if (item.jobId && (item.status === 'ready' || item.status === 'failed')) terminal[item.jobId] = true;
      });
      for (var i = (state.history || []).length - 1; i >= 0; i--) {
        var item = state.history[i];
        if (item && item.jobId && !terminal[item.jobId] && (item.status === 'queued' || item.status === 'building')) return item.jobId;
      }
      return '';
    }
    function stopUpdatePoll() {
      if (state.poll) { clearInterval(state.poll); state.poll = null; }
    }
    function refreshAdmin() {
      fetch(api + '?id=' + encodeURIComponent(id), { credentials:'same-origin', cache:'no-store' })
        .then(function (r) { return r.json().then(function (d) { if (!r.ok || !d.ok) throw new Error((d && d.error) || 'load_failed'); return d; }); })
        .then(mount)
        .catch(function () {
          if (state.password) post({ action:'load' }).then(mount).catch(function () {});
        });
    }
    function startUpdatePoll(jobId) {
      stopUpdatePoll();
      pollUpdate(jobId);
      state.poll = setInterval(function () { pollUpdate(jobId); }, 4000);
    }
    function pollUpdate(jobId) {
      fetch('/api/gen/status?id=' + encodeURIComponent(jobId), { cache:'no-store' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (s) {
          if (!s) return;
          if (s.status === 'ready') {
            stopUpdatePoll();
            setStatus((s.versionName || 'Update') + ' is ready.', 'ok');
            if (els.iterateHint) els.iterateHint.textContent = s.summary || 'Update finished.';
            refreshAdmin();
          } else if (s.status === 'failed') {
            stopUpdatePoll();
            pushHistoryEvent({
              id:'failed:' + jobId, role:'studio', type:'failed', status:'failed',
              versionNumber:s.versionNumber || 1, versionName:s.versionName || 'Update',
              summary:'Update failed. Tokens were refunded.', ts:Date.now(), jobId:jobId,
            });
            setStatus('Update failed. Tokens were refunded.', 'error');
            if (els.iterateHint) els.iterateHint.textContent = 'Try another change request.';
            var button = document.getElementById('iterateBtn'); if (button) button.disabled = false;
            refreshAdmin();
          } else {
            var phase = s.status === 'building' ? 'Building' : 'Queued';
            setStatus(phase + ' ' + (s.versionName || 'the update') + '...', '');
            if (els.iterateHint) els.iterateHint.textContent = 'This page will refresh when the update is ready.';
          }
        })
        .catch(function () {});
    }

    function bind() {
      els.canvas = document.getElementById('field'); els.ctx = els.canvas.getContext('2d');
      els.status = document.getElementById('status'); els.levelSelect = document.getElementById('levelSelect');
      els.selected = document.getElementById('selectedLabel'); els.json = document.getElementById('jsonPreview');
      els.history = document.getElementById('historyList'); els.iterateHint = document.getElementById('iterateHint');
      els.inputs = {
        x:document.getElementById('inX'),
        y:document.getElementById('inY'),
        w:document.getElementById('inW'),
        h:document.getElementById('inH'),
        value:document.getElementById('inValue'),
        label:document.getElementById('inLabel'),
      };
      document.querySelectorAll('[data-tool]').forEach(function (button) { button.addEventListener('click', function () { setTool(button.dataset.tool); }); });
      els.canvas.addEventListener('pointerdown', pointerDown);
      els.canvas.addEventListener('pointermove', pointerMove);
      els.canvas.addEventListener('pointerup', function () { state.drag = null; });
      els.canvas.addEventListener('pointercancel', function () { state.drag = null; });
      Object.keys(els.inputs).forEach(function (key) { els.inputs[key].addEventListener('input', applyInspector); });
      document.getElementById('levelName').addEventListener('input', function (event) { level().name = event.target.value; markDirty(); syncSelect(); });
      document.getElementById('levelNotes').addEventListener('input', function (event) { level().notes = event.target.value; markDirty(); syncPreview(); });
      els.levelSelect.addEventListener('change', function () { switchLevel(Number(els.levelSelect.value)); });
      document.getElementById('prevLevel').addEventListener('click', function () { switchLevel(state.index - 1); });
      document.getElementById('nextLevel').addEventListener('click', function () { switchLevel(state.index + 1); });
      document.getElementById('addLevel').addEventListener('click', function () { state.levels.push(defaultLevel(state.levels.length + 1)); switchLevel(state.levels.length - 1); markDirty(); });
      document.getElementById('duplicateLevel').addEventListener('click', function () { state.levels.splice(state.index + 1, 0, clone(level())); switchLevel(state.index + 1); markDirty(); });
      document.getElementById('deleteLevel').addEventListener('click', deleteCurrentLevel);
      document.getElementById('deleteObj').addEventListener('click', deleteSelected);
      document.getElementById('saveLevels').addEventListener('click', handleSaveLevels);
      document.getElementById('resetPassword').addEventListener('click', handleResetPassword);
      document.getElementById('iterateForm').addEventListener('submit', iterate);
      if (!state.game.owner) {
        document.getElementById('iterateBtn').disabled = true;
        document.getElementById('iterateHint').textContent = 'Sign in as the game owner to iterate. Password access can edit levels only.';
        document.getElementById('resetPassword').disabled = true;
      }
    }

    function setTool(tool) {
      state.tool = tool;
      document.querySelectorAll('[data-tool]').forEach(function (b) { b.setAttribute('aria-pressed', String(b.dataset.tool === tool)); });
    }
    function markDirty() { state.dirty = true; syncPreview(); }
    function syncAll() { syncSelect(); syncInspector(); syncLevelFields(); syncPreview(); draw(); }
    function syncSelect() {
      var fragment = document.createDocumentFragment();
      state.levels.forEach(function (lv, i) {
        var o = document.createElement('option');
        o.value = String(i);
        o.textContent = (i + 1) + '. ' + (lv.name || ('Level ' + (i + 1)));
        fragment.appendChild(o);
      });
      els.levelSelect.replaceChildren(fragment);
      els.levelSelect.value = String(state.index);
    }
    function syncLevelFields() {
      document.getElementById('levelName').value = level().name || '';
      document.getElementById('levelNotes').value = level().notes || '';
    }
    function syncPreview() { if (els.json) els.json.value = JSON.stringify({ schema:'game-factory-generic-levels-v1', levels:state.levels }, null, 2); }
    function switchLevel(i) { state.index = clamp(i, 0, state.levels.length - 1); state.selected = null; syncAll(); }
    function deleteCurrentLevel() {
      if (state.levels.length <= 1) { setStatus('At least one level is required.', 'error'); return; }
      state.levels.splice(state.index, 1); switchLevel(Math.min(state.index, state.levels.length - 1)); markDirty();
    }

    function fieldPoint(event) {
      var r = els.canvas.getBoundingClientRect();
      return { x: clamp((event.clientX - r.left) / r.width * FIELD_W, 0, FIELD_W), y: clamp((event.clientY - r.top) / r.height * FIELD_H, 0, FIELD_H) };
    }
    function hit(p) {
      var lv = level();
      for (var i = lv.objects.length - 1; i >= 0; i--) {
        var o = lv.objects[i];
        if (p.x >= o.x - o.w / 2 && p.x <= o.x + o.w / 2 && p.y >= o.y - o.h / 2 && p.y <= o.y + o.h / 2) return { kind:'object', index:i };
      }
      if (Math.hypot(p.x - lv.goal.x, p.y - lv.goal.y) < 20) return { kind:'goal' };
      if (Math.hypot(p.x - lv.player.x, p.y - lv.player.y) < 20) return { kind:'player' };
      return null;
    }
    function target(sel) {
      if (!sel) return null;
      if (sel.kind === 'player') return level().player;
      if (sel.kind === 'goal') return level().goal;
      if (sel.kind === 'object') return level().objects[sel.index];
      return null;
    }
    function addAt(tool, p) {
      if (tool === 'player') { level().player = p; return { kind:'player' }; }
      if (tool === 'goal') { level().goal = p; return { kind:'goal' }; }
      var size = tool === 'wall' ? { w:90, h:18 } : tool === 'platform' ? { w:95, h:16 } : tool === 'note' ? { w:90, h:30 } : { w:28, h:28 };
      var obj = { id:uuid(), type:tool, x:p.x, y:p.y, w:size.w, h:size.h, value:tool === 'coin' ? 1 : 0, label:'' };
      level().objects.push(obj);
      return { kind:'object', index:level().objects.length - 1 };
    }
    function pointerDown(event) {
      els.canvas.focus();
      var p = fieldPoint(event);
      var sel = state.tool === 'select' ? hit(p) : addAt(state.tool, p);
      state.selected = sel;
      var t = target(sel);
      if (t) {
        els.canvas.setPointerCapture(event.pointerId);
        state.drag = { id:event.pointerId, start:p, original:clone(t), sel:clone(sel) };
      }
      if (state.tool !== 'select') markDirty();
      syncInspector(); draw();
    }
    function pointerMove(event) {
      if (!state.drag || state.drag.id !== event.pointerId) return;
      var p = fieldPoint(event), dx = p.x - state.drag.start.x, dy = p.y - state.drag.start.y;
      var t = target(state.drag.sel);
      if (!t) return;
      t.x = clamp(state.drag.original.x + dx, 0, FIELD_W);
      t.y = clamp(state.drag.original.y + dy, 0, FIELD_H);
      markDirty(); syncInspector(); draw();
    }
    function syncInspector() {
      Object.keys(els.inputs || {}).forEach(function (k) { els.inputs[k].disabled = true; els.inputs[k].value = ''; });
      var sel = state.selected, t = target(sel);
      if (!sel || !t) { els.selected.textContent = 'Nothing selected'; return; }
      els.selected.textContent = sel.kind === 'object' ? (t.type + ' object') : sel.kind;
      els.inputs.x.disabled = els.inputs.y.disabled = false;
      els.inputs.x.value = Math.round(t.x); els.inputs.y.value = Math.round(t.y);
      if (sel.kind === 'object') {
        ['w','h','value','label'].forEach(function (k) { els.inputs[k].disabled = false; });
        els.inputs.w.value = Math.round(t.w); els.inputs.h.value = Math.round(t.h); els.inputs.value.value = Math.round(t.value || 0); els.inputs.label.value = t.label || '';
      }
    }
    function applyInspector() {
      var t = target(state.selected);
      if (!t) return;
      t.x = clamp(num(els.inputs.x.value, t.x), 0, FIELD_W);
      t.y = clamp(num(els.inputs.y.value, t.y), 0, FIELD_H);
      if (state.selected.kind === 'object') {
        t.w = clamp(num(els.inputs.w.value, t.w), 6, FIELD_W);
        t.h = clamp(num(els.inputs.h.value, t.h), 6, FIELD_H);
        t.value = clamp(Math.round(num(els.inputs.value.value, t.value || 0)), 0, 999);
        t.label = String(els.inputs.label.value || '').slice(0, 60);
      }
      markDirty(); draw();
    }
    function deleteSelected() {
      if (!state.selected || state.selected.kind !== 'object') { setStatus('Select an object to delete.', 'error'); return; }
      level().objects.splice(state.selected.index, 1); state.selected = null; markDirty(); syncInspector(); draw();
    }

    function draw() {
      var ctx = els.ctx, lv = level(); if (!ctx || !lv) return;
      ctx.clearRect(0, 0, FIELD_W, FIELD_H);
      ctx.fillStyle = '#232731'; ctx.fillRect(0, 0, FIELD_W, FIELD_H);
      ctx.strokeStyle = 'rgba(255,255,255,.08)'; ctx.lineWidth = 1;
      for (var x = 60; x < FIELD_W; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, FIELD_H); ctx.stroke(); }
      for (var y = 80; y < FIELD_H; y += 80) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(FIELD_W, y); ctx.stroke(); }
      lv.objects.forEach(function (o, i) { drawObj(ctx, o, state.selected && state.selected.kind === 'object' && state.selected.index === i); });
      drawPoint(ctx, lv.goal, '#5ad19a', 'G', state.selected && state.selected.kind === 'goal');
      drawPoint(ctx, lv.player, '#7aa2f7', 'P', state.selected && state.selected.kind === 'player');
      ctx.fillStyle = 'rgba(255,255,255,.7)'; ctx.font = '12px system-ui'; ctx.fillText(lv.name || ('Level ' + (state.index + 1)), 12, 22);
    }
    function drawPoint(ctx, p, color, label, selected) {
      ctx.beginPath(); ctx.arc(p.x, p.y, 14, 0, Math.PI * 2); ctx.fillStyle = color; ctx.fill();
      ctx.lineWidth = selected ? 4 : 2; ctx.strokeStyle = selected ? '#fff' : 'rgba(0,0,0,.45)'; ctx.stroke();
      ctx.fillStyle = '#081016'; ctx.font = 'bold 12px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(label, p.x, p.y + 1);
    }
    function drawObj(ctx, o, selected) {
      var colors = { wall:'#c7ccd8', platform:'#8bd17c', hazard:'#f7768e', enemy:'#ff9f43', coin:'#ffd166', note:'#b8a7ff' };
      ctx.save(); ctx.translate(o.x, o.y);
      ctx.fillStyle = colors[o.type] || '#ddd';
      ctx.strokeStyle = selected ? '#fff' : 'rgba(0,0,0,.45)';
      ctx.lineWidth = selected ? 4 : 2;
      if (o.type === 'coin' || o.type === 'enemy') { ctx.beginPath(); ctx.arc(0, 0, Math.max(o.w, o.h) / 2, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); }
      else { ctx.beginPath(); ctx.rect(-o.w / 2, -o.h / 2, o.w, o.h); ctx.fill(); ctx.stroke(); }
      if (o.label) { ctx.fillStyle = '#fff'; ctx.font = '10px system-ui'; ctx.textAlign = 'center'; ctx.fillText(o.label, 0, -o.h / 2 - 5); }
      ctx.restore();
    }

    function handleSaveLevels() {
      var button = document.getElementById('saveLevels');
      button.disabled = true; setStatus('Saving levels...');
      post({ action:'save-levels', levels:state.levels })
        .then(function (d) { state.dirty = false; setStatus('Saved ' + d.levels + ' levels.', 'ok'); })
        .catch(function (e) { setStatus(e.message || 'Save failed.', 'error'); })
        .then(function () { button.disabled = false; });
    }
    function handleResetPassword() {
      if (!confirm('Reset the admin password for this game? The new password is shown once.')) return;
      post({ action:'reset-password' }).then(function (d) { if (d.password) showPassword(d.password); setStatus('Password reset.', 'ok'); })
        .catch(function (e) { setStatus(e.message || 'Password reset failed.', 'error'); });
    }
    function iterate(event) {
      event.preventDefault();
      var prompt = document.getElementById('iteratePrompt').value.trim();
      if (prompt.length < 3) { setStatus('Add a change request first.', 'error'); return; }
      var button = document.getElementById('iterateBtn');
      button.disabled = true; setStatus('Sending iterate job...');
      fetch('/api/gen/submit', { method:'POST', credentials:'same-origin', headers:{ 'content-type':'application/json' }, body:JSON.stringify({ iterateId:id, prompt:prompt }) })
        .then(function (r) { return r.json().then(function (d) { if (!r.ok) throw new Error((d && d.error) || 'iterate_failed'); return d; }); })
        .then(function (d) {
          document.getElementById('iteratePrompt').value = '';
          pushHistoryEvent({
            id:'request:' + d.id, role:'player', type:'request', status:'queued',
            versionNumber:d.versionNumber || 1, versionName:d.versionName || 'Next version',
            text:prompt, summary:'', ts:Date.now(), jobId:d.id,
          });
          setStatus((d.versionName || 'Update') + ' queued.', 'ok');
          if (els.iterateHint) els.iterateHint.textContent = 'This page will refresh when the update is ready.';
          startUpdatePoll(d.id);
        })
        .catch(function (e) { setStatus(e.message || 'Could not iterate.', 'error'); button.disabled = false; });
    }

    load();
  })();
  </script>
</body>
</html>
