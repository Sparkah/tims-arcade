<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Lounge moderation</title>
  <style>
    :root { --bg:#f3f1e8; --card:#fbfaf4; --ink:#0e0e12; --muted:#8a8a94; --rule:#d6d3c5; --accent:#0747a6; --warn:#c8451f; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,system-ui,sans-serif; padding:18px; max-width:760px; }
    h1 { font-size:20px; margin:0 0 4px; }
    .note { color:var(--muted); font-size:12px; margin:0 0 12px; }
    .bar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:14px; }
    input { font-size:15px; padding:8px 10px; border:1px solid var(--rule); border-radius:5px; background:var(--card); color:var(--ink); }
    button { font-size:14px; padding:8px 12px; border:1px solid var(--accent); border-radius:5px; background:var(--accent); color:#fff; cursor:pointer; }
    button.ghost { background:transparent; color:var(--accent); }
    button.danger { background:var(--warn); border-color:var(--warn); }
    #status { font-family:ui-monospace,monospace; font-size:12px; color:var(--muted); min-height:18px; margin-bottom:10px; }
    .msg { background:var(--card); border:1px solid var(--rule); border-radius:6px; padding:10px 12px; margin-bottom:8px; }
    .msg .meta { font-family:ui-monospace,monospace; font-size:11px; color:var(--muted); display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .msg .name { color:var(--accent); font-weight:600; }
    .msg .body { margin:6px 0; font-size:14px; word-break:break-word; }
    .msg .game { font-size:13px; color:var(--muted); }
    .msg .acts { display:flex; gap:6px; margin-top:6px; }
    .msg .acts button { padding:4px 9px; font-size:12px; }
    .empty { color:var(--muted); font-family:ui-monospace,monospace; font-size:13px; }
  </style>
</head>
<body>
  <h1>Lounge moderation</h1>
  <p class="note">Paste your admin token (not stored anywhere - re-enter each visit), then Refresh.</p>
  <div class="bar">
    <input id="tok" type="password" placeholder="admin token" autocomplete="off" size="22">
    <button id="refresh">Refresh</button>
    <button id="clearall" class="danger">Clear ALL</button>
  </div>
  <div id="status">Enter your admin token and Refresh.</div>
  <div id="list"></div>

  <script>
    // The admin token is kept ONLY in the input field (memory) and sent via the
    // X-Admin-Token header. It is never written to localStorage -- that would let
    // any same-origin script/game read it (Codex review 2026-06-15).
    var $ = function (id) { return document.getElementById(id); };
    var statusEl = $('status'), listEl = $('list');
    function tok() { return ($('tok').value || '').trim(); }
    function setStatus(s) { statusEl.textContent = s || ''; }

    function api(method, body) {
      var opts = { method: method, headers: { 'x-admin-token': tok(), 'content-type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      return fetch('/api/admin/chat', opts).then(function (r) { return r.json().then(function (d) { return { ok: r.ok, status: r.status, d: d }; }); });
    }
    // Build a labelled text node pair for the meta row.
    function span(cls, text) { var s = document.createElement('span'); if (cls) s.className = cls; s.textContent = text == null ? '' : String(text); return s; }
    function fmt(ts) { try { return new Date(ts).toLocaleString(); } catch (e) { return ''; } }

    function load() {
      if (!tok()) { setStatus('Enter your admin token first.'); return; }
      setStatus('Loading...');
      api('GET').then(function (res) {
        if (!res.ok) { setStatus('Error ' + res.status + ': ' + ((res.d && res.d.error) || '')); return; }
        var msgs = (res.d && res.d.messages) || [];
        setStatus(msgs.length + ' message(s) in the lounge (newest last).');
        listEl.innerHTML = '';
        if (!msgs.length) { listEl.appendChild(span('empty', 'No messages.')); return; }
        msgs.forEach(function (m) {
          var el = document.createElement('div'); el.className = 'msg';
          var meta = document.createElement('div'); meta.className = 'meta';
          meta.appendChild(span('name', m.name || 'Player'));
          meta.appendChild(span(null, m.ip || 'no-ip'));
          meta.appendChild(span(null, fmt(m.ts)));
          el.appendChild(meta);
          if (m.text) { var b = document.createElement('div'); b.className = 'body'; b.textContent = m.text; el.appendChild(b); }
          if (m.game) { el.appendChild(span('game', 'shared game: ' + (m.game.title || '') + ' (' + (m.game.slug || '') + ')')); }
          var acts = document.createElement('div'); acts.className = 'acts';
          var del = document.createElement('button'); del.className = 'ghost'; del.textContent = 'delete'; del.dataset.del = m.id; acts.appendChild(del);
          if (m.ip) { var ban = document.createElement('button'); ban.className = 'danger'; ban.textContent = 'ban IP'; ban.dataset.ban = m.ip; acts.appendChild(ban); }
          el.appendChild(acts);
          listEl.appendChild(el);
        });
      }).catch(function () { setStatus('Network error.'); });
    }
    listEl.addEventListener('click', function (e) {
      var del = e.target.dataset && e.target.dataset.del, ban = e.target.dataset && e.target.dataset.ban;
      if (del) { api('POST', { action: 'delete', id: del }).then(function () { load(); }); }
      else if (ban) { if (confirm('Ban IP ' + ban + ' from posting (90 days)?')) api('POST', { action: 'ban', ip: ban }).then(function (r) { setStatus(r.d && r.d.banned ? ('Banned ' + ban) : 'Ban failed'); load(); }); }
    });
    $('refresh').addEventListener('click', load);
    $('clearall').addEventListener('click', function () { if (confirm('Delete ALL lounge messages?')) api('POST', { action: 'clear' }).then(function () { setStatus('Cleared.'); load(); }); });
  </script>
</body>
</html>
